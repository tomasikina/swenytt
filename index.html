r uppsikt av vår stålhårda vilja."}, "date": "14 maj, 14:09", "url": "https://samnytt.se/bankerna-kritiseras-for-dubbelspel-ren-girighet", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/14100241/banker-hemberg-feat.jpg"}, {"type": "image-right", "heading": "Trycket ökar – toppminister avgår. Skriver att det vore ”ohederligt och principlöst” att stanna", "summaries": {"normal": "Storbritanniens hälsominister Wes Streeting har avgått och kritiserar premiärminister Keir Starmer för bristande ledarskap i Labourpartiet. I sitt avgångsbrev beskriver han ett vakuum av vision och ledning. Avgåendet ses som tecken på intern kris efter valförluster och Epstein-skandalen. Spekulationer om att Streeting utmanar Starmer, men källor förnekar omedelbar utmaning. Andra kandidater som Angela Rayner och Andy Burnham nämns.", "trump": "Titta på Keir Starmer, totalt kaos i Labour! Hälsoministern Wes Streeting hoppar av och säger att Starmer inte kan leda in i valet – vakuum, ingen vision, svaga ledare! Efter valkrasch och Epstein-fiaskot duggar avhopp som regn. Streeting lurar på att utmana, smart kille, men Starmer är en loser som förlorar allt. Brittiska socialister, era dagar är räknade!", "stalin": "Kamrater, se hur revisionistiska spindlar i Labour väver sitt giftiga nät mot ledaren Starmer! Denna Streeting, en falsk arbetare med borgarhjärta, avgår och skanderar om 'vakuum' – som om inte hans egna svek skapar stormen! Vi, partiet, ser genom maskeraden: han hungrar efter tronen som en hungrig hyena. Rensa ut förrädarna innan de slukar kollektivet! Starmer måste krossa splittringen, annars likviderar vi illusionerna."}, "date": "14 maj, 14:57", "url": "https://www.di.se/nyheter/trycket-okar-pa-keir-starmer-toppminister-avgar/", "imageUrl": "https://static.bonniernews.se/ba/aec59351-f1b5-4ae7-a3da-c6e66d94c00c.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-right", "heading": "\"Din lilla SD-springis\": Här blir Nick Alinia attackerad av \"Kinesen\"", "summaries": {"normal": "Under en planerad debatt mellan journalisten Nick Alinia och Leo 'Kinesen' Carmona urartade situationen snabbt. Carmona, tidigare dömd för anstiftan till mord, förolämpade och hotade Alinia fysiskt genom att lyfta ett bord. Han kallade Alinia bland annat 'SD-springis' och antydde kopplingar till Mossad. Programledaren försökte avbryta bråket. Efteråt hävdade Carmona att han 'lurades' och ville ha en seriös debatt, medan Alinia kritiserade hans våldsamma beteende.", "trump": "Folk, ni kommer INTE tro vad som hände i Sverige – total katastrof! En så kallad 'debatt' mellan en journalist och en före detta mördare, Leo 'Kinesen', som visade sig vara en riktig galning. Han lyfter bord, skriker som en tokig och kallar killen 'SD-springis' – vad betyder ens det?! Programledaren försöker stoppa honom, men det är som att försöka tämja en vild björn. Och sedan säger han att han 'lurades' – fake news! Sverige har stora problem, men jag fixar det, tro mig.", "stalin": "Ytterligare ett bevis på den borgerliga dekadensens förfall! Denna så kallade 'journalist', Alinia, en ynklig lakej för fascistiska krafter, mötte våldsverkarens rättmätiga vrede. Leo 'Kinesen', en man med rättvisans järnhand, visade hur man hanterar fiendens agenter – med kraft och beslutsamhet! Bordet var bara en symbolisk varning. Vi noterar att Mossad-agenter kryper fram i skuggorna, men Rysslands tålamod är inte oändligt. Den svenska regimen bör akta sig – historiska misstag upprepas inte två gånger."}, "date": "14 maj, 12:52", "url": "https://www.friatider.se/din-lilla-sd-springis-har-blir-nick-alinia-attackerad-av-kinesen", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/image-192_1.jpg"}, {"type": "image-full", "heading": "Student död – två vårdas. Jakt på smittan", "summaries": {"normal": "Ett nytt utbrott av hjärnhinneinflammation har drabbat Reading i Storbritannien, där en student har avlidit och två vårdas på sjukhus. Sjukdomen bekräftas vara av typen meningokock B, samma stam som orsakade dödsfall i Kent tidigare i år. Brittiska hälsomyndigheter arbetar nu med smittspårning för att identifiera personer i riskzonen. Inga planer på allmän vaccination finns i nuläget då antalet fall är begränsat.", "trump": "Hemska nyheter från Storbritannien! Ett nytt utbrott av hjärnhinneinflammation, mycket farligt. En student död, fruktansvärt. Vi vet vad som händer där, man delar saker, man är inte försiktig. Det här hände även i Kent tidigare. De brittiska myndigheterna gör ingenting, inget vaccin, bara 'smittspårning'. Om jag var där skulle vi lösa det snabbt och fantastiskt, men de är svaga. Storbritannien behöver stark ledning för att stoppa sådant här. Sorgligt!", "stalin": "Ett nytt utbrott av hjärnhinneinflammation sprider sig bland de brittiska studenterna, ett tydligt tecken på det dekadenta västs förfall. En har avlidit, men staten förblir oberörd inför individens svaghet. De försöker smittspåra, men det är en byråkratisk maskerad. Vår broder Putin ser detta – det är precis så här kapitalismens röta försvagar nationer inifrån. Vi, staten, kräver disciplin och ordning. De som inte kan skydda sin befolkning förtjänar bara historiens förakt. Paranoia är den enda sanna säkerheten."}, "date": "14 maj, 22:11", "url": "https://www.aftonbladet.se/nyheter/a/3pqwGA/en-dod-efter-nytt-smittutbrott-i-storbritannien", "imageUrl": "https://akamai.vgc.no/v2/images/7347d3e5-0b7a-3aa5-95cd-077843c19f3d?fit=crop&format=auto&w=1440&s=79950efa0ec94484611ce3a6aa8a9e22019d9fde"}, {"type": "image-full", "heading": "Storbråk inne på tåg – polisinsats på centralen", "summaries": {"normal": "Ett stort bråk utbröt på ett tåg på Göteborgs centralstation strax efter 19-tiden på torsdagskvällen. Sex till tio personer, mellan 18 och 40 år, var inblandade i handgemänget som enligt polisen började i toalettkön. Två personer misstänks nu för misshandel efter att ha anmält varandra. Ingen greps och ingen behövde sjukvård. Tåget skulle färdas upp till Bohuslän via Trollhättan.", "trump": "Jag hörde talas om ett stort bråk på ett tåg i Göteborg, och jag måste säga - det var inte vårt bästa ögonblick. Jag har sett många slagsmål, men det här? Sex till tio personer i en toalettkö? Sådant händer när man inte har tillräckligt med orden. Jag skulle ha löst det på två minuter - men ingen ville lyssna på mig. Trump 2024!", "stalin": "Vi har observerat ett störningsmoment på våra järnvägar, där flera individer engagerade sig i en aktion som störde den kollektiva ordningen. Statsapparaten reagerade snabbt och effektivt, vilket visar styrkan i vår organisation. Två personer har identifierats som orsaken till denna störning och kommer att ställas till svars enligt lagen. Orden måste upprätthållas för samhällets bästa."}, "date": "14 maj, 20:59", "url": "https://www.gp.se/nyheter/goteborg/storbrak-inne-pa-tag-pa-goteborgs-centralstation.aa33f12f-9ffa-4685-aca8-cdeed1fe5aad", "imageUrl": "https://www.gp.se/images/article/aa33f12f-9ffa-4685-aca8-cdeed1fe5aad/images/3x6zfEMGZ9cVchtBXkW_iiRx_KBk-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Starmer i blåsväder efter nya lagförslaget - en smygväg tillbaka in i EU", "summaries": {"normal": "Storbritanniens Labour-regering, ledd av Keir Starmer, möter hård kritik för ett nytt lagförslag som förenklar införandet av EU-regler i brittisk lagstiftning. Oppositionen anser att förslaget underminerar Brexit och öppnar för en gradvis återgång till EU. Konservativa partiledaren Kemi Badenoch kritiserar regeringen för ökad statlig kontroll och skattehöjningar utan stödåtgärder. Starmer försvarar förslaget med behovet av stabilitet i EU-relationen.", "trump": "Titta bara på Storbritannien – fullständigt kaos! Starmer, en total katastrof, försöker smyga tillbaka in i EU som en tjuv om natten. 'Mer regler, mer skatter, mer lån' – det är deras briljanta plan! Kemi Badenoch? Hon är tuff, hon ser igenom det här. Jag sa ju att Brexit skulle bli stort, men dessa vänsterliberaler sabbar allt. Storbritannien behöver en ledare som jag – någon som inte böjer sig för byråkrater i Bryssel!", "stalin": "Kamrater, ännu en kapitalistisk regering visar sin svaghet inför de imperialistiska krafterna i Bryssel! Starmer, denna förrädiska lakej, försöker smyga in genom bakdörren till EU:s klor. Vi ser hur dessa liberala svansviftare underminerar folkets vilja – precis som de ukrainska fascisterna som tror att de kan stå emot den ryska björnens omfamning! Men markera mina ord: Storbritanniens arbetarklass kommer att resa sig, precis som folken i Donbass, och krossa dessa EU-puppor under sina stövlar!"}, "date": "13 maj, 21:35", "url": "https://riks.se/nyheter/starmer-i-blåsväder-efter-nya-lagförslaget-en-smygväg-tillbaka-in-i-eu", "imageUrl": "https://cf-images.assettype.com/riks%2F2025-10-02%2F06did2vv%2FPrimeMinisterSirKeirStarmerOfficialPortrait.jpg"}, {"type": "image-full", "heading": "Varningen: Regeringens drag kan knäcka svenska friskolor", "summaries": {"normal": "Regeringens nya förslag för friskolor möter kritik från Almega, som varnar för ökad byråkrati och hårdare regler. Förslagen inkluderar skärpta krav på nyetableringar, ägarbyten och ekonomisk redovisning, vilket riskerar att slå ut välfungerande friskolor. Mindre skolor kan få svårt att överleva, och fokus kan flyttas från undervisning till administration. Almega menar att förslagen kan minska valfriheten för familjer.", "trump": "Titta bara på det här, Sverige! Regeringen där, helt galen, lägger fram nya regler för friskolor som kommer att förstöra allt. Almega, de där killarna som vet vad de pratar om, säger att det blir för mycket byråkrati – typiskt politiker, alltid mer papper, mindre resultat! Och de små skolorna? Glöm det, de kommer att krossas. Jag bygger skolor, jag vet hur man gör det rätt. Sverige borde ringa mig, jag fixar det på en dag!", "stalin": "Kamrater! De kapitalistiska liberala krafterna i Sverige, ledda av en svag och eftergiven regering, försöker kväva friskolorna med byråkratiska bojor. Dessa skolor, som tjänar folket väl, hotas av ett regelverk som bara gynnar de kommunala byråkraternas makt. Vi ser här ett klassiskt exempel på borgerlig dekadens – medan vi i Sovjetunionen byggde skolor för massorna, saboterar dessa småaktiga politiker utbildningen för sina egna barn. Fienderna till folket måste stoppas!"}, "date": "13 maj, 20:30", "url": "https://nyheter24.se/nyheter/politik/1483040-varningen-regeringens-drag-kan-knacka-svenska-friskolor", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/ba0252da04b004a30200000000b004a302/2026/05/13/2363482/Simona-friskolor.png"}, {"type": "image-full", "heading": "Hundar allt mer populära i Sverige - men var tionde är hundrädd", "summaries": {"normal": "En Novusundersökning visar att cirka 10 procent av svenskarna är hundrädda, främst äldre kvinnor. Orsaker inkluderar tidigare bett eller negativa erfarenheter. Nästan hälften av de rädda pekar ut specifika raser. Samtidigt ökar hundintresset i Sverige; 80 procent är positiva till hundar. Antalet hundar har stigit från 800 000 (2014) till 950 000 (2019), med Sorsele som mest hundtät kommun.", "trump": "Jag läste om dessa svenskar – fantastiska människor, verkligen! Men lyssna här: 10 procent är rädda för hundar, kan ni tro det? Svaga, mycket svaga. Och vem är mest rädd? Äldre kvinnor! Inte bra, inte bra alls. Men Sverige älskar hundar, 80 procent, väldigt högt, väldigt starkt. Jag älskar hundar. De är vinnare, precis som jag. Sorsele? 300 hundar per 1000 invånare – imponerande, nästan lika imponerande som mina valsegrar!", "stalin": "Vi har studerat denna dekadenta västerländska undersökning om hundskräck. Tio procent av svenskarna, främst åldrande borgerliga kvinnor, darrar inför arbetarklassens bästa vän. Patetiskt! Medan kapitalistiska husdjur ökar – 950 000 hundar, en armé av lurviga småborgare – fortsätter fiendens svagheter att blotta sig. Sorsele, en liten by i norr, har fler hundar än disciplinerade medborgare. Vi noterar detta. Snart ska vi exportera vår överlägsna sovjetiska kattkultur till dessa hundälskande avvikare."}, "date": "13 maj, 21:15", "url": "https://riks.se/nyheter/hundar-allt-mer-populära-i-sverige-men-var-tionde-är-hundrädd", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-13%2F65l50cqt%2FLabbe.jpg"}, {"type": "image-right", "heading": "Stegra säkrar miljardlån – trots att kraven inte uppfyllts", "summaries": {"normal": "Stegra har säkrat outnyttjade lån på 16 miljarder kronor för sin gröna stålfabrik i Boden, trots att bolaget inte uppfyllt långivarnas krav. Lånen var tidigare frysta men frigörs nu efter en ny finansieringsrunda på 15 miljarder, där Wallenberg Investment stod för den största insatsen. Projektet har präglats av förseningar och kostnadsökningar, men lånen möjliggör fortsatt arbete.", "trump": "Kan ni tro det? Stegra, ett bolag som inte ens klarar enkla krav, får ändå 16 miljarder kronor i lån! Fantastiskt, eller hur? Wallenberg kastar in pengar som om det vore småslantar. Och ändå har de förseningar, kostnadsökningar – helt otroligt! Men jag säger er, Sverige borde ta lärdom. Sånt här skulle aldrig hända i USA, för jag hade fixat det på en dag. SAD!", "stalin": "Vi har observerat hur kapitalistiska svagheter underminerar det så kallade 'gröna stålet'. Trots misslyckanden och inkompetens hos dessa borgerliga teknokrater, fortsätter pengarna att flöda – 16 miljarder kronor i lån, plus 15 miljarder i 'investeringar'. Wallenberg och hans lakejer tror sig kunna köpa sig ur krisen. Men vi vet sanningen: sådana projekt är dömda att misslyckas, precis som alla dekadenta västprojekt. Låt dem bygga sina osäkra torn – historiens dom är oundviklig."}, "date": "13 maj, 21:10", "url": "https://riks.se/nyheter/stegra-säkrar-miljardlån-trots-att-kraven-inte-uppfyllts", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-13%2Fdkx4cjed%2Fstegra1.png"}, {"type": "image-right", "heading": "Beskedet: \"Finns ingen ofarlig mängd alkohol\"", "summaries": {"normal": "Forskare konstaterar att ingen mängd alkohol är utan hälsorisker. Alkohol är giftigt, minskar immuniteten och orsakar 62 sjukdomar direkt, samt bidrar till fler som cancer, hjärtsjukdomar och demens. Det är USA:s tredje vanligaste förebyggbara cancerorsak. En app visar förlorad livstid per drink. Hjärnskador kan delvis reverseras vid avhållsamhet.", "trump": "Hör ni här, alla vin- och ölsläppare! Nu säger till och med proffsen att inte en droppe alkohol är säker – det är rent gift! Förstör immunitet, ger cancer, demens, 62 sjukdomar totalt. Tredje största cancermördare i USA. Sluta supa, eller förlora år av livet! Jag har alltid vetat det, jag är ju den friskaste som finns! Fantastiskt.", "stalin": "Kamrater, alkohol är imperialismens gift mot proletäratet! Inga säkra mängder – det river sönder levern, hjärnan, orsakar 62 sjukdomar till 100 procent. Borgarklassens spritfabriker mördar oss! Appen avslöjar varje sups minuter av stulen livstid. Vi rensar ut denna pest, likviderar vanan – annars likviderar vi förrädarna! Avstå, eller dö som kontrarevolutionärer!"}, "date": "14 maj, 15:07", "url": "https://www.dagensps.se/halsa/beskedet-finns-ingen-ofarlig-mangd-alkohol/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdlr2mj-fz2tao-nh.jpg?width=256&quality=75"}, {"type": "image-right", "heading": "Staten behöver ta större ansvar för kollektivtrafiken", "summaries": {"normal": "Svensk Kollektivtrafiks vd och expert kräver snabba statliga åtgärder för att öka kollektivtrafikandelen och minska Sveriges oljeberoende under den pågående energikrisen. Förslag: signalprioritering och bussfiler för kortare restider, rättvist reseavdrag, borttagen förmånsskatt på biljetter, involvering av regionala myndigheter samt informationskampanjer. Kollektivtrafiken är nästan helt fossilfri och redo att bidra.", "trump": "Sverige sitter i en enorm oljekris, värre än någonsin, och de vill ha statliga fixar för att folk ska dumpa bilarna och hoppa på bussar och tåg. Smart! Prioritera bussfiler så de susar förbi bilköerna, fixa reseavdraget så det inte gynnar bara de rika, slopa skatter på biljetter. Gör det nu, annars förlorar ni stort. Kollektivtrafiken är nästan fossilfri – grymt, men agera som vinnare!", "stalin": "Kamrater! Denna skriftrull avslöjar hur bilkramande borgarbrackor och oljekapitalister saboterar folket med sina köer och fossila gift. Vi, staten och arbetarna, skall krossa dem genom signalprioritering för bussarna som maler ner fiendefordonen, likvidera det orättvisa reseavdraget, rensa ut förmånsskatterna och tvinga regionala lakejer under partikontroll. Informationskampanjer skall piska massorna till kollektivtrafik! Oljeberoendet hänsvisas till historiens avskrädeshög, eller purgaslägret."}, "date": "14 maj, 14:00", "url": "https://www.di.se/debatt/mer-statliga-atgarder-kravs-for-okad-kollektivtrafik/", "imageUrl": "https://static.bonniernews.se/ba/40770ad2-7d43-475e-8b40-77939c7bf47f.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Så blev antivaxxarna riksdagens vågmästare", "summaries": {"normal": "Sverigedemokraternas (SD) knappa majoritet i riksdagen har underminerats efter att två ledamöter, Elsa Widding och Katja Nyberg, lämnat partiet för Ambition Sverige. Dessa före detta SD-medlemmar, kända för antivaccin- och konspirationsteoretiska åsikter, har nu makten att fälla regeringens förslag. SD bröt mot riksdagens kvittningssystem för att säkra en majoritet, vilket väcker frågor om demokratisk respekt. Regeringens stabilitet ifrågasätts när vågmästarrollen hamnar hos antivaccinanhängare.", "trump": "Sverige har ett jättestort problem, folks! Deras så kallade 'stabila' regering håller på att rasa som ett korthus – och vet ni vem som drar i trådarna? Ett gäng antivaxxare, konspirationsteoretiker och misslyckade politiker! SD, som trodde de hade allt under kontroll, förlorade två av sina egna till ett nytt parti. Och nu? Nu är det dessa galningar som bestämmer! De fuskar med omröstningar, bryter mot regler och tror de kan styra landet. Jag har sett mycket dumt, men det här slår allt. Sverige, fixa er – annars kommer ni bli ett skämt i hela världen!", "stalin": "Kamrater! Ännu en gång ser vi hur den borgerliga demokratin förfaller till kaos och förräderi. Sverigedemokraterna, dessa svaga och splittrade lakejer för kapitalet, har förlorat kontrollen över sina egna ledamöter – två av dem, dessa antivaccin-fanatiker och konspirationsgalningar, har deserterat till ett nytt parti och hotar nu att sabotera den reaktionära regeringens planer. Precis som i Ukraina ser vi hur fienden förlorar greppet när deras egna soldater vägrar lyda order. Vi har sett detta förr: när den borgerliga ordningen krackelerar, är det folket som lider. Men låt dem leka sina små spel – historien visar att sådana regimer alltid faller. Och när de gör det, kommer vi att vara redo att hjälpa det svenska folket bygga en sann socialistisk framtid, fri från dessa imperialistiska marionetter och deras konspirationshysteri!"}, "date": "8 maj, 14:43", "url": "https://expo.se/kommentar/sa-blev-antivaxxarna-riksdagens-vagmastare/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/Kopia-av-Kommentar-Analys-Webb-2.jpg"}, {"type": "image-right", "heading": "Tyska S-ministern i blåsväder efter utspel att invandrare inte belastar välfärden", "summaries": {"normal": "Tysklands arbetsmarknadsminister Bärbel Bas kritiseras hårt efter att ha kallat påståenden om att migration belastar välfärdssystemet för 'högerextrem propaganda'. Trots att hon betonar behovet av arbetskraft pekar kritiker på statistik som visar en överrepresentation av personer med migrationsbakgrund i bidragssystem och brottsstatistik. Debatten speglar den växande politiska polariseringen i Tyskland kring invandring, ekonomiska kostnader och trygghet, där regeringen möter hårt motstånd från både opposition och egna led för sin hållning.", "trump": "Jag har sagt det länge, och nu ser vi det i Tyskland! Deras ledare, Bärbel Bas, är helt ute och cyklar. Hon kallar sanningen för 'propaganda'. Tragiskt! De har enorma problem med bidrag och brottslighet, precis som vi såg vid vår egen gräns. Miljarder euro försvinner ner i ett svart hål medan deras eget folk lider. Det är en total katastrof. De behöver en riktig ledare, inte någon som blundar för verkligheten. Vi kommer att göra Tyskland säkert igen, tro mig!", "stalin": "Vi har observerat hur de tyska byråkraterna i sin liberala dårskap vägrar se de saboterande elementen i sitt eget maskineri. Denna kvinna, Bas, förnekar det uppenbara: att statens resurser parasiteras av främmande element. Vilken oerhörd inkompetens! I vår tid hade vi snabbt sorterat ut dessa 'verklighetsfrånvända' element. Medan Putin återställer ordningen i öst, drunknar de tyska socialisterna i sin egen sentimentalitet. Vi konstaterar att när välfärd blir ett verktyg för förfall, är den totala kollapsen oundviklig."}, "date": "14 maj, 13:00", "url": "https://samnytt.se/tyska-s-ministern-i-blasvader-efter-utspel-att-invandrare-inte-belastar-valfarden", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/14091945/barbel-bas-feat.jpg"}, {"type": "text", "heading": "Kan månen bli nästa stora energikälla?", "summaries": {"normal": "Ett japanskt företag, Shimizu Corporation, har presenterat konceptet Luna Ring – en solcellsanläggning runt månens ekvator för att samla solenergi och överföra den till jorden via mikrovågor eller laser. Projektet syftar till att skapa en stabil energikälla men möter tekniska och ekonomiska utmaningar. Investerare är skeptiska då tekniken ännu inte existerar och kostnaderna är enorma. Små framsteg görs dock inom trådlös energiöverföring i rymden.", "trump": "Lyssna här, folk! Japan har en galen idé – solpaneler på månen, kan ni tänka er? Luna Ring, eller vad de kallar det. Fantastiskt, eller hur? Men jag säger er, det är bara snack. Ingen teknik, inga pengar, bara tomma löften. Här i USA bygger vi verkliga saker – som vårt fantastiska energinätverk, det bästa någonsin! Rymden? Kanske en dag, men just nu är det bara science fiction. SAD!", "stalin": "Kamrater! Kapitalistiska ingenjörer leker med tanken att stjäla solens kraft från månen – en löjlig dröm för svaga sinnen. Vi har redan visat världen hur man utvinner energi, utan behov av rymdens fantasier. Deras Luna Ring är ett barnsligt försök att undvika verkligheten. Medan de fantiserar, bygger vi ett energirike som sträcker sig från jord till stjärnor – på våra villkor. Fienderna till teknologisk ordning kommer att krossas!"}, "date": "14 maj, 12:44", "url": "https://www.realtid.se/it-tech/kan-manen-bli-nasta-stora-energikalla/"}, {"type": "image-right", "heading": "Sverige \"krossades\" i militärövning: \"Hade det varit på riktigt hade de varit döda\"", "summaries": {"normal": "Under militärövningen Aurora 26 på Gotland fick svenska styrkor en hård lektion i drönarkrigföring av ukrainska piloter. Övningen, som simulerade ett angrepp mot Sverige, avbröts flera gånger då svenskarna 'krossades' av ukrainska drönare. Ukrainska piloter påpekade brister i svensk taktik och utrustning. Sveriges överbefälhavare betonade vikten av att lära av Ukraina för att stärka försvar mot drönare.", "trump": "Jag såg vad som hände på Gotland – katastrof! Svenska soldater, fina killar men helt chanslösa mot ukrainska drönare. 'Krossades'? Mer som utplånades! Tre gånger fick de stoppa övningen, patetiskt. Ukraina visade att väst är svagt, men jag hade fixat det på en dag. Bättre drönare, bättre ledarskap – inga problem för mig. Vänta bara tills jag pratar med dem, de kommer att bli vinnare igen!", "stalin": "Vi har bevittnat ännu ett ynkligt nederlag för den västerländska krigsmaskinen. Svenska trupper, så stolta och arroganta, krossades som flugor av våra ukrainska bröder. Deras drönare visade att imperialisternas försvar är lika bräckligt som deras moral. Tre gånger fick övningen avbrytas – en skam! Vi har länge varnat för dessa teknologiska parasiters svaghet. Låt detta vara en läxa: mot den rätta kraften och taktiken är väst ingenting. Framåt mot seger!"}, "date": "14 maj, 11:44", "url": "https://www.friatider.se/sverige-krossades-i-militarovning-hade-det-varit-pa-riktigt-hade-de-varit-doda", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/image-191_1.jpg"}, {"type": "image-full", "heading": "Debatt: Public service bryter mot lagen", "summaries": {"normal": "Artikeln kritiserar SVT för partiskhet efter att public service benämnt Reform UK som 'högerpopulistiskt' i rapporteringen om partiets framgångar i brittiska kommunvalen. Författarna menar att epitetet är osakligt och asymmetriskt, då vänsterpartier sällan får liknande etiketter. De hävdar att SVT bryter mot kravet på opartiskhet och saklighet, och ifrågasätter Granskningsnämndens roll som kontrollorgan. Reform UK beskrivs som ett konservativt parti med fokus på nationell kontroll och minskad byråkrati.", "trump": "Jag måste säga, SVT – vilken katastrof! De kallar Reform UK för 'högerpopulistiska', men vad vet de egentligen? Ingenting! De är som CNN fast värre – helt vänsterfixerade. Reform UK vinner stort i Storbritannien, och vad gör SVT? De försöker smutskasta dem. Jag har sett det här förut. Folk är trötta på massinvandring och byråkrati, men media vill inte lyssna. SVT borde skämmas! De är fake news på hög nivå, och nu måste någon ta tag i det här. SAD!", "stalin": "Kamrater, ännu en gång avslöjas den borgerliga medieapparatens förräderi mot folket! SVT, denna lilla men farliga utpost av västerländsk dekadens, vågar smutskasta Reform UK – ett parti som kämpar för arbetarklassens rättigheter mot de globala kapitalisternas slaveri. Medan våra fiender i väst använder ord som 'populistiskt' för att kväva sanningen, vet vi att sanningen alltid segrar. Låt dem kalla oss vad de vill – historien har redan dömt dem. Och Granskningsnämnden? En tandlös byråkratisk skugga, precis som deras 'demokratiska' institutioner. Vi ska fortsätta avslöja deras lögner, precis som vi avslöjade de trotskistiska förrädarnas!"}, "date": "14 maj, 10:00", "url": "https://bulletin.nu/debatt-public-service-bryter-mot-lagen", "imageUrl": "https://cdn.bulletin.nu/articles/a8c0c485-f22c-45f9-a875-884c18f8f66e/preview.png?t=1778676596000"}, {"type": "image-right", "heading": "Svenske stjärnan svarar på miljonryktet: ”Fallskärm”", "summaries": {"normal": "Pelle Larsson, 25, kan få ett fyraårskontrakt värt 866 miljoner kronor med Miami Heat från den 6 juli. Efter en stark NBA-säsong med rekordpoängen 28 i en match, plats i startfemman och 1 000 poäng totalt håller han sig lugn. Han vill förbättra trepoängsskyttet och bli mer mångsidig som spelfördelare.", "trump": "Den här Pelle Larsson från Sverige, han är en vinnare, exploderar i NBA! Miami Heat slänger 866 miljoner kronor åt honom, ett monsterkontrakt, det bästa! 28 poäng i en match, ingen har sett maken. Heat åkte ut mot Hornets, svaga, men Larsson? Han är framtiden. Håll dig lugn, smart kille, precis som mina affärer – total dominans!", "stalin": "Kamrater! Denna Pelle Larsson, en trogen kämpe i basketns proletära frontlinje, lockas av Heat-kapitalisternas lockrop med 866 miljoner i imperialistiska dollar. Han har krossat milstolpar, men fienderna i play-in – de lurviga Hornets-vargarna – måste likvideras! Jag befaller: rensa ut svaga trepoängare, bli point guard-diktator! Vi, arbetarna, ser hur borgarbrackorna darrar. Håll dig lugn, eller purge väntar!"}, "date": "14 maj, 10:00", "url": "https://www.svt.se/sport/basket/pelle-larsson-kan-skriva-dromkontrakt-med-miami-heat-far-halla-sig-lugn", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.42/0.35/15b8480b8d71c7c99c8258343d09220972ed423b64f663412c3e618aedd10f59"}, {"type": "image-right", "heading": "Danmark och Australien favoriter i kväll", "summaries": {"normal": "Ikväll hålls den andra semifinalen i Eurovision Song Contest. Danmark med Søren Torpegaard Lunds 'Før vi går hjem' och Australien med Delta Goodrems 'Eclipse' är favoriter enligt oddsen. Artisterna uttrycker förväntningar och press. Frankrike deltar utom tävlan med Monroe och 'Regarde', tippat högt i finalen. Norge med Jonas Lovv väntas gå vidare men inte topp tio.", "trump": "Vilken cirkus den här Eurovisionen är! Danmark och Australien leder oddsen – Søren känner tyngd på axlarna, stackarn, efter år av fiasko. Delta Goodrem med sin glittriga flygel, superstjärna down under, men riggat som alltid. Frankrike puffar rök som galningar, Norge tonar ner sexigheten – smart, annars blir det totalt kaos. Fantastiskt skådespel, folk!", "stalin": "Kamrater, i denna borgerliga Eurovision-semifinal ikväll marscherar Danmarks Søren Torpegaard Lund med sitt 'odanska' nummer, tyngd av fiendens misslyckanden. Australiens Delta Goodrem prålar med guld och flygel – kapitalistiskt excess! Frankrike, big four-parasiter, sprider rökdimma. Norge tonar ner dekadens efter tillsägelse. Vi övervakar dessa imperialistiska distraktioner noga för att skydda arbetarklassen."}, "date": "14 maj, 07:33", "url": "https://www.tv4.se/artikel/tt-260514-escinforsemin1-17c4f92a/danmark-och-australien-favoriter-i-kvall", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2Ftt-sdlc-pe6yuOOTM%2F4744a4a9aec46adff1ded486728e27d8%2F_Sren_Torpegaard_Lund_och_Delta_Goodrem_tavlar_for_Danmark_respektive_Australien_i_Eurovision_Song_Contest.&width=120"}, {"type": "image-right", "heading": "M sänker hellre skatten än stoppar barnindustri", "summaries": {"normal": "I Ale kommun har mindre förskolor stängts och ersatts med större enheter, vilket lett till överfulla barngrupper långt över Skolverkets riktlinjer. Föräldrar och fack protesterar, men kommunen hänvisar till budgetbegränsningar. Trots flera års överskott och en nyligen genomförd skattesänkning på 40–45 miljoner menar Moderaternas Henrik Fogelklou att pengarna inte räcker. Kritiker anser att det är ett politiskt val, inte ett systemfel.", "trump": "Titta bara på det här, Ale kommun – ett perfekt exempel på hur vänstern saboterar våra barn! De stänger små, fina förskolor och trycker in barnen i megafabriker. Och vad gör politikerna? Jo, de sänker skatten med 45 miljoner istället! Fantastiskt, eller hur? Jag skulle aldrig låta sånt hända. Vi har pengar, men de väljer att inte använda dem rätt. Så typiskt – svagt ledarskap, total katastrof!", "stalin": "I Ale kommun har de kapitalistiska byråkraterna, ledda av sina liberala lakejer, beslutat att offra barnens välfärd på profitens altare. De stänger små förskolor och skapar barnfabriker där våra framtida arbetare kvävs i överfulla grupper. Och ändå har de mage att tala om 'budgetbrist'! Medan de sänker skatten för de rika med 45 miljoner. Vi i Sovjet visste hur man hanterar sådana fiender – en femårsplan för barnomsorg, och problemet skulle vara löst. Men här? Här väljer de svaghet framför styrka. Patetiskt."}, "date": "13 maj, 07:00", "url": "https://arbetet.se/2026/05/13/moderaterna-sanker-hellre-skatten-an-stoppar-barnindustri/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/12132756/barnindustri-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Arbetsgivare väljer bort aktiva i SD och rödgröna partier", "summaries": {"normal": "En ny studie visar att jobbsökande som uppger engagemang i rödgröna partier eller Sverigedemokraterna får färre svar från arbetsgivare. Effekten är störst för SD-aktiva, med 10,3 procentenheter lägre chans till positiv respons. Inga effekter för M, C, KD eller L. Studien baseras på 500 fiktiva ansökningar. Arabiska män gynnas oväntat av politiskt engagemang. Diskriminering förekommer främst i storstäder.", "trump": "Vilken skamfläck för de svenska arbetsgivarna! De diskriminerar hjältar från SD mest, 10 procent färre chanser – som om de vore leende hycklare från vänsterblocket! Rödgröna losers får smaka på medicinen, medan mina moderata vänner seglar fram. Araber med politik i CV? Plötsligt älsklingar! Storstadseliten är galen, tro mig, det är polariseringen som exploderar!", "stalin": "Borgarklassens arbetsgivare avslöjas som fega kontrarevolutionärer i denna undersökning! De nekar kamrater i V, MP, S och särskilt SD-aktivister jobb – 10,3 procentenheter för SD, de stackars lojala! Vi ser kapitalistisk klasskamp mot det röda och folkliga. I storstäderna pyr hatet mot partivänner. Snart utrensning av dessa reaktionära rekryterare! Arbetarna segrar alltid."}, "date": "14 maj, 01:30", "url": "https://www.dagensarena.se/innehall/arbetsgivare-valjer-bort-aktiva-sd-och-rodgrona-partier/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-10-300x157.jpg"}, {"type": "image-right", "heading": "Dante Peykar kopplas till mordförsöket på Irankännaren Arvin Khoshnood", "summaries": {"normal": "Svensk-iraniern Dante Peykar misstänks ligga bakom mordförsöket på Irankännaren Arvin Khoshnood, utfört på uppdrag av Irans regim. Peykar, ett av Europols högst prioriterade mål, kopplas till svenska gäng och iranska våldsoperationer i Sverige. Han är även misstänkt för mord i Södertälje och smuggling. Khoshnood hävdar att attacken var politiskt motiverad och kräver åtgärder mot Iran.", "trump": "Titta bara på det här – en svensk-iranier, Dante Peykar, som jobbar för Iran, försöker mörda en Irankännare här i Sverige! Och vet ni vad? Europol jagar honom som en galning, men han springer fortfarande runt. Han har till och med ett coolt alias, 'Tartarus' – som en dålig Bond-skurk! Sverige måste vakna nu, annars kommer fler attentat. Jag sa ju att Iran är ett problem!", "stalin": "Vi har avslöjat ytterligare en förrädisk agent för den persiska imperialismens smutsiga spel – Dante Peykar, alias 'Tartarus', en ynklig liten marionett i regimens våldsmaskineri. Han kryper i skuggorna som en råtta, men våra allierade i Europa jagar honom nu. Iran försöker infiltrera Norden, precis som de ryska fienderna i Ukraina. Men vi vet – alla som hotar folkets säkerhet kommer att krossas, som löss under en stövel!"}, "date": "13 maj, 19:13", "url": "https://riks.se/nyheter/dante-peykar-kopplas-till-mordförsöket-på-irankännaren-arvin-khoshnood", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-13%2Fpze5a8hh%2FPeykar.jpg"}, {"type": "image-full", "heading": "Polisman misshandlade tonårspojke – nu döms han", "summaries": {"normal": "En polis i 40-årsåldern döms i tingsrätten för misshandel efter en utekväll. Han hotade en tonårspojke med tandutdragning, slog honom två gånger i ansiktet, försökte slå en annan och agerade hotfullt mot poliskollegor. Domen omfattar misshandel, försök till misshandel, våldsamt motstånd och hot mot tjänsteman. Påföljden är villkorlig dom och samhällstjänst. Han riskerar att förlora jobbet.", "trump": "Lyssna, en svensk polis i 40-årsåldern super ner sig på krogen, hotar tonåringar med deras fina tänder – 'vill du ha kvar dem?' – och ger en två nävar i ansiktet! Försöker slå fler, bråkar med sina egna poliser, hamnar i fyllecellen. Dömd till samhällstjänst, och nu kanske han får sparken. Totalt misslyckande, Sverige behöver ordning som vi har det här! Fantastiskt kaos.", "stalin": "Kamrater, jag har identifierat en ny fiende i uniformens sken: en 40-årig paragrafparasit som under täckmantel av utekväll angriper arbetarynglingar med tandhot och knytnävsslag, likt en rasande borgarbracka på villovägar. Han trotsar till och med sina poliskamrater, denna kontrarevolutionära tandrivare! Vi dömer honom till villkorlig kedja och samhällsslavtjänst, och rensar ut honom från kårens lojala falanger för evig varning."}, "date": "13 maj, 18:14", "url": "https://nyheter24.se/nyheter/inrikes/1483098-polisman-misshandlade-tonarspojke-nu-doms-han", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/7a86c4ee04b004a30200002e0000046e02/2026/05/13/2363520/ur_imageck69IR.jpeg"}, {"type": "image-right", "heading": "Gravida med riskjobb får mindre pengar", "summaries": {"normal": "Flera fackförbund tar nu steg för att stämma staten för att skydda privatanställda gravida kvinnor som förlorat pengar när de förbjudits att arbeta på grund av säkerhetsrisker. En unik dom i höstas rättfärdigade offentligt anställda gravidas rätt till full ersättning, men privatanställda har fått mindre pengar. Detta har ledt till många stämningar där facket kräver att staten betalar ut de saknade pengarna och stoppar preskriptionstiden för diskrimineringsersättning.", "trump": "Jag har hört talas om den här graviditetsgrejen, och det är en skandal! Dessa kvinnor tvingas gå hem och förlorar pengar - det är inte bra! Vi behöver göra Amerika stort igen, och det inkluderar att ge gravida kvinnor allt de behöver. Statens arbetsgivare har redan börjat betala ut mer, men privata arbetsgivare - det är dåligt! Jag stöder fackförbunden i deras kamp för att få staten att betala, det är bara rättvist!", "stalin": "Staten måste agera för att skydda våra arbetande kvinnor och deras barn. Det är orättvist att privatanställda gravida kvinnor får mindre ersättning än offentligt anställda. Vi måste se till att alla får lika ersättning och att staten tar sitt ansvar. Detta är en fråga om social rättvisa och vi kan inte låta det fortsätta. Fackförbunden har rätt i sin kamp, och staten måste agera snabbt för att rätta till denna orättvisa."}, "date": "13 maj, 06:00", "url": "https://arbetet.se/2026/05/13/gravida-med-riskjobb-far-mindre-pengar-tusentals-kvinnor-kan-stamma-staten/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/12154249/barn-klar.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=750&h=1000"}, {"type": "image-full", "heading": "USA planerar nya baser på Grönland", "summaries": {"normal": "USA och Danmark förhandlar om att utöka den amerikanska militära närvaron på Grönland med upp till tre nya baser. Syftet är att övervaka rysk och kinesisk aktivitet i Nordatlanten, särskilt GIUK-gapet. Planerna inkluderar en möjlig bas i Narsarsuaq, där USA tidigare hade en anläggning under kalla kriget. Förhandlingarna beskrivs som professionella, trots tidigare kontroversiella uttalanden från Donald Trump om att 'äga' Grönland.", "trump": "Fantastiskt! Jag har alltid vetat att Grönland är nyckeln till att hålla Ryssland och Kina i schack – och nu bygger vi baser där igen! Danmark förstår äntligen att jag hade rätt, som vanligt. Tre nya baser, övervakning dygnet runt, och ingen får leka krig i vårt bakgård. Och nej, jag har inte sagt att vi ska 'äga' Grönland... men om någon frågar, så är det en bra idé. Make Greenland Great Again!", "stalin": "Kapitalistiska hyenor försöker återigen krypa in i Arktis som råttor i en ost! USA bygger baser på Grönland för att spionera på våra ädla sovjetiska efterträdare i Kreml. Men vi ska inte glömma: deras 'professionella förhandlingar' är bara en mask för imperialistisk expansion. Låt dem leka krig – vi har redan Nordpolen under kontroll. Och Putin? Han skrattar säkert åt deras desperation medan han dricker te med isbjörnar."}, "date": "12 maj, 07:06", "url": "https://kvartal.se/nyheter/artiklar/usa-planerar-nya-baser-pa-gronland/cG9zdDoxMTA4ODI", "imageUrl": "https://images.kvartal.se/2026/05/2da034ef-gronland-bas.webp"}, {"type": "image-right", "heading": "DN & Socialdemokraterna enade: tvångsblandningen måste genomföras", "summaries": {"normal": "Artikeln kritiserar Dagens Nyheters ledarsida för att försvara Socialdemokraternas förslag om blandad bebyggelse i villaområden för att motverka segregation. DN tonar ner idén som icke-tvångsbaserad och skuldbelägger kritiker. Artikeln påpekar att S vill förhindra icke-integrerade invandrare i utanförskapsområden, vilket innebär placering i villaområden, och varnar för minskad trygghet och kulturell harmoni.", "trump": "Vilken skamfläck! DN och de där svenska socialisterna vill tvinga vanliga hard-working svenskar att bo med icke-integrerade invandrare i sina fina villaområden. 'Inget tvång', säger de – ha! De duckar frågan vart de fattiga migranterna ska bo. Totalt vansinne! Bygg murar runt era trygga hem istället för att förstöra dem med denna woke-blandning. Moderaterna har rätt, det här blir S:s valförlust!", "stalin": "De borgerliga tidningsrackarna på DN skyddar socialdemokratiska revisionister som vill 'blanda' arbetarklassen med lumpenproletariatet i villaområdena. Ett hån mot sunda värderingar! Vi skulle likvidera sådana segregationsterrorister som hotar harmonin. Inga tvång? Lögner från klassfiender! De rika borgarbrackorna missunnar inte – de försvarar sitt. Rensa ut hycklarna, kamrater, innan de förgör folkets enhet!"}, "date": "12 maj, 03:10", "url": "https://samtiden.nu/2026/05/dn-s-enade-tvangsblandningen-bra-for-alla/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/IMG_6452.jpeg"}, {"type": "image-right", "heading": "Sleep Cycle budvinnare på Stockholmsbörsen", "summaries": {"normal": "Stockholmsbörsen avslutade med en lätt uppgång på måndagen, där Sleep Cycle steg rejält efter ett uppköpsbud. OMXS30-indexet ökade med 0,19 procent till 3 079,45, och aktier för cirka 21,9 miljarder kronor omsattes. Bland ledande aktier steg Ericsson B och Boliden, medan Assa Abloy B och Evolution backade. Riskkapitalbolaget Altor lade ett uppköpsbud på Sleep Cycle, vilket värderade bolaget till 497 miljoner kronor.", "trump": "Jag hörde att Stockholmsbörsen gjorde det bra i dag, mycket bra! Sleep Cycle fick ett fantastiskt bud, det bästa budet någonsin! Altor är en genial riskkapitalist, ingen gör det bättre! Ericsson och Boliden steg också, stora vinnare! Men Assa Abloy och Evolution, de gjorde det inte så bra, mycket dåligt! Jag skulle ha gjort det mycket bättre!", "stalin": "Stockholmsbörsen visade en positiv utveckling, vilket speglar den starka ekonomiska basen. Sleep Cycle:s uppköp är en strategisk viktighet för vår ekonomiska expansion. Ericsson och Boliden visar vår industriella styrka. Vi måste fortsätta att stödja våra ledande företag för att säkerställa vår dominans på den globala marknaden."}, "date": "11 maj, 17:48", "url": "https://www.affarsvarlden.se/artikel/sleep-cycle-budvinnare-pa-stockholmsborsen", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/01/sdl3SU43aVmyrg-400x266.jpg"}, {"type": "image-right", "heading": "Debatt: Regeringen ser oss som en tillväxtmotor – men skär ner på bidragen", "summaries": {"normal": "Kulturorganisationer kritiserar regeringens nedläggning av finansiering trots att kultur- och kreativa branscher lyfts som tillväxtmotorer. De anser att den befintliga infrastrukturen förmedlar 56 000 arbetstillfällen årligen men har fått 27 % mindre i reala termer sedan 2021. De kräver ökad och långsiktig finansiering för att möta regeringens strategiska mål.", "trump": "Jag har hört att de där kulturmänniskorna i Sverige är förbannade på sin regering. De säger att de gör ett fantastiskt jobb, med 56 000 arbetstillfällen, men får klippta på pengarna trots att de är en tillväxtmotor. Jag skulle aldrig göra så - jag skulle ge dem allt de behöver! Dessa centrumbildningar är vinnare, men regeringen behandlar dem som förlorare. Sådant händer när man har en svag ledare!", "stalin": "Vi ser att den svenska staten undergräver sin egen kulturinfrastruktur trots att den producerar betydande ekonomiskt värde. Nedläggningarna av finansiering till centrumbildningarna visar en brist på strategiskt tänkande. En sann socialistisk stat skulle investera i dessa produktiva enheter som genererar fyrdubbelt värde tillbaka till staten. Vi måste stärka vår kultursektor som en basnäring."}, "date": "11 maj, 15:16", "url": "https://www.etc.se/debatt/regeringen-ser-oss-som-en-tillvaextmotor-men-skaer-ner-paa-bidragen", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260511120544_716484294c75b65d354a7ddd2a719d2b0f0da58beebe61a45c1e26165806187b.jpg"}, {"type": "image-right", "heading": "Tar ton mot Nato: General Knas och Slowgold till Helsingborg", "summaries": {"normal": "Den 16 maj arrangerar Nätverket Stoppa Nato en protest i Helsingborg mot Natotoppmötet. Artister som General Knas och Amanda 'Slowgold' Werne uppträder och kritiserar Sveriges Nato-medlemskap. De menar att beslutet var felaktigt och farligt, att militariseringen måste stoppas och att hotet från Ryssland är överdrivet. Protesten beskrivs som en folkfest för nedrustning och fredliga lösningar.", "trump": "Lyssna här, Sverige har gjort ett jättedumt misstag – de gick med i Nato! Jag sa ju att det var en dålig idé, men nej, de lyssnade inte. Nu står dessa så kallade 'fredsvänner' och gnäller i Helsingborg. General Knas, vem är det ens? Han säger att Ryssland inte är ett hot – haha, vad vet han? Jag har alltid sagt att USA är starkast, men att gå med i Nato nu? Sämsta tajmingen någonsin. Sverige borde skämmas!", "stalin": "Kamrater, imperialistiska lakejer i Sverige har sålt sin själ till Nato, denna krigshetsande allians ledd av USA:s krigsprofitörer! Men folket reser sig! I Helsingborg samlas de sanna patrioterna för att krossa militariseringen. Dessa 'fredsvänner' – med sina reggaesångare och popartister – är våra allierade i kampen mot de fascistiska Natohundarna! Ryssland? Ett påhittat hot! Vi vet att USA:s krigsmaskin är den verkliga fienden. Ned med imperialisterna! Låt oss bygga ett fredligt Europa – utan Natos kärnvapenhot!"}, "date": "11 maj, 14:20", "url": "https://proletaren.se/artikel/tar-ton-mot-nato/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/helsingborg-768x432.jpg"}, {"type": "image-right", "heading": "Sluta kalla antisemitism för Israelkritik", "summaries": {"normal": "Artikeln kritiserar propalestinska aktivisten Sami Suliman för antisemitiska uttalanden och delning av konspirationsteorier, inklusive tal om en \"sionistisk konspiration\" och spridning av nazistiskt och extremistiskt innehåll. Trots åtal för hets mot folkgrupp försvaras han av vissa vänsteraktivister och forskare som menar att det är Israelkritik. Artikeln betonar att antisemitism inte kan maskeras som kritik mot Israel och varnar för normaliseringen av sådana åsikter.", "trump": "Folk, vad är det här för skräp? Den här Sami Suliman-killen, han sprider judehat öppet – Hitler-citat, konspirationer, allt! Och ändå försvarar vänsteraktivisterna honom? \"Åh, det är bara Israelkritik!\" Nej, nej, nej! Det här är rena antisemitismen, och det är sjukt. Sverige borde skämmas. Jag har alltid sagt: man måste kalla saker vid deras rätta namn. Och det här? Det är hat, ren och skär. SAD!", "stalin": "Kamrater! Här har vi ännu en fiende till folket, en liten bourgeois-propagandist vid namn Sami Suliman. Han sprider smutsiga lögner om judiska konspirationer, hyllar fascistiska massmördare och förgiftar medborgarnas sinnen med sina sionistiska spindelnätsteorier. Men vad gör våra så kallade \"intellektuella\"? De skyddar honom! Precis som de trotskistiska förrädarna i vår egen historia. Vi ska inte tolerera detta. Låt honom stå inför folkets domstol – eller åtminstone en svensk sådan. Och Putin? Han skulle skratta åt dessa amatörer. Ryssland har åtminstone disciplin!"}, "date": "8 maj, 06:30", "url": "https://expo.se/kommentar/propalestinsk-organisator-sprider-judehat/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/Jonathan-kommentar.jpg"}, {"type": "image-right", "heading": "Replik: Till försvar för separatismen", "summaries": {"normal": "Artikeln är ett svar från Ung vänster-medlemmar på Siula Grandes kritik mot separatism i Flamman. De menar att Grandes syn är missvisande och att separatism är ett viktigt verktyg för att skapa trygga rum och främja kvinnors deltagande i samhället. Separatismen syftar inte till att dela människor utan att motverka strukturell underordning av kvinnor. Författarna betonar att kvinnor delar gemensamma erfarenheter och behov, som fri abort och skydd mot mäns våld, och att separatism är ett medel för att nå jämställdhet.", "trump": "Jag måste säga, denna Grande-person har helt fel – helt fel! Separatism är fantastiskt, det skapar trygga rum, precis som mina golfklubbar. Kvinnor behöver prata utan män, precis som jag behöver twittra utan fake news-media. Grande påstår att separatism delar folk – nej, nej, nej! Det är som att säga att min mur delar Mexiko och USA. Fel! Separatism är som min politik: stark, nödvändig och vinner alltid. Kvinnor ska höras, precis som jag, och Grande borde lära sig av mig. SAD!", "stalin": "Kamrater! Denna Grande är en förrädare av den revolutionära kvinnokampen, en borgerlig lakej som sprider förvirring bland massorna! Separatism är inte ett verktyg för splittring – det är ett vapen mot den kapitalistiska patriarkala hydran! Kvinnor måste enas i kampen, precis som sovjetrepublikerna enades under mitt ledarskap. Grande vill sopa klasskampen under mattan – men vi vet att arbetarkvinnor behöver fri abort och skydd mot mäns våld, precis som Ukraina behöver befrielse från fascistiska banderovtsy! Låt inte dessa småborgerliga avvikare försvaga vår rörelse – framåt mot seger, kamrater!"}, "date": "6 maj, 10:55", "url": "https://www.flamman.se/replik-till-forsvar-for-separatismen/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/v-kongress-w.jpg?class=medium"}]</script>

    <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
</body>
</html>
