 borgerliga hyckleriets förfall. Eurovision, denna dekadenta fest för imperialister, låter sionistiska krigsförbrytare delta medan de mördar palestinska barn och saboterar tävlingens regler. Ryssland uteslöts snabbt – men Israel? Nej! Deras allierade vacklar, men pengar styr. Vi har sett detta förr: kapitalister säljer sin själ för några dollar. Men folket reser sig! Artister bojkottar, massorna protesterar. Låt dem förstå – historien dömer hårdare än en Eurovision-jury!"}, "date": "13 maj, 12:00", "url": "https://proletaren.se/artikel/eurovisionprotesterna-i-malmo-2024-folkfest-mot-folkmord/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/esc-main-768x432.jpg"}, {"type": "image-right", "heading": "Tecknad Tidökritik", "summaries": {"normal": "Tecknaruppropet, en grupp svenska satirtecknare, kritiserar Tidöregeringen i en ny antologi. Boken samlar teckningar från framstående konstnärer och syftar till att granska makthavare genom satir. Initiativtagaren Karin Z. Sunvisson betonar att projektet är partipolitiskt neutralt och ska granska alla regeringar. Fokus ligger på regeringens politik, oppositionens brister och globala frågor som krig och militarisering. Antologin är starten på en serie valårsböcker.", "trump": "Jag måste säga, Sverige har verkligen haft en riktig katastrof-regering! Dessa så kallade 'ledare' har varit svagare än min golfhandicap. Men bra jobbat av dessa tecknare – de ger dem vad de förtjänar! En bok full av skämt om hur usla de är. Och oppositionen? Lika värdelös! Jag hade sparkat dem alla på direkten. Men heja Sverige, ni har i alla fall roligt medan ni sjunker. Fantastiskt arbete, tro mig!", "stalin": "Kamrater! Denna så kallade 'Tidöregering' är ett utmärkt exempel på bourgeoisins dekadens och imperialistiska förräderi. Deras stöd till folkmord och krigshets är lika förutsägbart som en trotskistisk konspiration. Men vi, det revolutionära folket, har våra metoder. Dessa tecknare – våra moderna agitprop-konstnärer – avslöjar deras korruption med satirens skarpa klinga. Låt varje teckning vara en kula i klasskampen. Nästa valbok? Den ska vara ännu vassare, som en bajonett mot kapitalets lakejer!"}, "date": "13 maj, 10:09", "url": "https://proletaren.se/artikel/tecknad-tidokritik/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/tecknaruppropet-web-768x432.jpg"}, {"type": "image-right", "heading": "Protestera mot vapenskramlet!", "summaries": {"normal": "Artikeln kritiserar Sveriges Nato-medlemskap och det kommande toppmötet i Helsingborg, där militärbudgetar och vapenleveranser till Ukraina ska diskuteras. Författaren menar att Sverige övergett sin långa tradition av neutralitet och alliansfrihet för att bli en lojal följeslagare till USA. Historiska beslut som EU-medlemskap och militära samarbeten beskrivs som steg mot Nato. Artikeln uppmanar till protester mot mötet den 16 maj, med hänvisning till Natos aggressiva historia och riskerna med ökad militarisering.", "trump": "Sverige, en gång så stolt och neutral, har blivit en riktig knähund till USA – och jag älskar det! Nu ska de vara värd för Natos toppmöte i Helsingborg, där de ska prata om att pumpa in ännu mer pengar i krig och vapen. Vilket skämt! För några år sedan hade ingen trott att Sverige skulle bli en del av min krigsallians – men här är vi! De svenska politikerna har blivit som små hundvalpar som springer efter varje pinne jag kastar. Och nu vill de att folket ska protestera? Snälla, säg mig inte att de är rädda för lite vapenskrammel! USA leder världen, och Sverige är smart nog att följa med. Tack Sverige, ni gör rätt val!", "stalin": "Kamrater! Se hur det forna neutrala Sverige, en gång en oberoende röst för fred, nu kryper i stoftet inför den amerikanska imperialismens krigsmaskin! De har sålt sin själ till Nato, precis som de sålde sin själ till EU – ett redskap för västmakterna att krossa Sovjetunionen. Nu samlas dessa krigshetsare i Helsingborg för att planera nya aggressioner mot våra bröder i Ryssland och Kina. Men folket måste resa sig! Vi minns hur Nato bombade Jugoslavien och ignorerade FN – precis som de amerikanska krigsförbrytarna ignorerar folkrätten idag. Låt oss kalla dessa Nato-lakejer för vad de är: imperialistiska hyenor som tjänar den amerikanska krigsindustrin. Protesterna i Helsingborg är ett första steg mot att krossa denna fascistiska allians!"}, "date": "13 maj, 09:56", "url": "https://proletaren.se/artikel/protestera-mot-vapenskramlet-i-helsingborg/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/ledareweb-768x432.jpg"}, {"type": "image-right", "heading": "Oppositionen drar ifrån – leder med över tio procentenheter", "summaries": {"normal": "SVT/Verians majmätning visar att oppositionen ökar sitt försprång till 10,7 procentenheter över Tidöpartierna, som backar 1,5 procentenheter. Nedgången är statistiskt signifikant och den största sedan augusti 2023. Väljare lämnar regeringsunderlaget för oppositionen, icke-röstare och partier utanför riksdagen. Tidöpartierna tappar särskilt bland män, medan kvinnors stöd minskar genom ökad osäkerhet. Miljöpartiet går framåt, Centerpartiet backar.", "trump": "Kan ni tro det? Oppositionen leder nu med över tio procent – helt otroligt! Tidöpartierna, eller ska jag säga 'Tidö-fiaskot', tappar som aldrig förr. Väljarna flyr som råttor från ett sjunkande skepp! Männen överger dem, kvinnorna vet inte ens vad de vill – typiskt. Och Miljöpartiet? De går upp, men vem bryr sig? Svensk politik är en enda stor cirkus, och jag är den enda som vet hur man vinner!", "stalin": "De borgerliga svaglingarna i Tidö-alliansen förlorar mark som snö i vårsolen. Våra sympatisörer i oppositionen växer medan fiendens väljare deserterar till soffan eller de små, obetydliga partierna. Männen inser nu sin misstag, kvinnorna förblir obeslutsamma – ett tecken på dekadens. Miljöpartiet, denna lilla gröna skott, växer medan Centerpartiet ruttnar. Vi noterar och analyserar. Historien är på vår sida, precis som i Ukraina – fienden kommer att krossas."}, "date": "14 maj, 09:34", "url": "https://www.friatider.se/oppositionen-drar-ifran-leder-med-over-tio-procentenheter", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/magdalena_anderssonalmedalen_fotoebba_grace_.jpg"}, {"type": "image-right", "heading": "Danmark och Australien favoriter i kväll", "summaries": {"normal": "Ikväll hålls den andra semifinalen i Eurovision Song Contest. Danmark med Søren Torpegaard Lunds 'Før vi går hjem' och Australien med Delta Goodrems 'Eclipse' är favoriter enligt oddsen. Artisterna uttrycker förväntningar och press. Frankrike deltar utom tävlan med Monroe och 'Regarde', tippat högt i finalen. Norge med Jonas Lovv väntas gå vidare men inte topp tio.", "trump": "Vilken cirkus den här Eurovisionen är! Danmark och Australien leder oddsen – Søren känner tyngd på axlarna, stackarn, efter år av fiasko. Delta Goodrem med sin glittriga flygel, superstjärna down under, men riggat som alltid. Frankrike puffar rök som galningar, Norge tonar ner sexigheten – smart, annars blir det totalt kaos. Fantastiskt skådespel, folk!", "stalin": "Kamrater, i denna borgerliga Eurovision-semifinal ikväll marscherar Danmarks Søren Torpegaard Lund med sitt 'odanska' nummer, tyngd av fiendens misslyckanden. Australiens Delta Goodrem prålar med guld och flygel – kapitalistiskt excess! Frankrike, big four-parasiter, sprider rökdimma. Norge tonar ner dekadens efter tillsägelse. Vi övervakar dessa imperialistiska distraktioner noga för att skydda arbetarklassen."}, "date": "14 maj, 07:33", "url": "https://www.tv4.se/artikel/tt-260514-escinforsemin1-17c4f92a/danmark-och-australien-favoriter-i-kvall", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2Ftt-sdlc-pe6yuOOTM%2F4744a4a9aec46adff1ded486728e27d8%2F_Sren_Torpegaard_Lund_och_Delta_Goodrem_tavlar_for_Danmark_respektive_Australien_i_Eurovision_Song_Contest.&width=120"}, {"type": "image-right", "heading": "SSAB-arbetare till sjukhus efter symtom", "summaries": {"normal": "Efter ett falskt gaslarm på SSAB i Luleå fördes en maskinförare till sjukhus med näsblod. All verksamhet pausades som försiktighetsåtgärd, trots att mätningar inte visat förhöjda gasvärden. Testerna, som pågått sedan mars för att utreda sjukdomssymtom hos 25 anställda, är nu stoppade. Facket överväger att se över skyddsmaskerna. Polisen utreder misstänkt arbetsmiljöbrott, men inga tydliga orsaker har hittats.", "trump": "Vilket kaos i Sverige! SSAB, ett företag som inte ens kan hantera ett enkelt gaslarm, har nu skickat en arbetare till sjukhus – näsblod, kan ni tro? Fake news eller verklighet? Ingen vet! De pausar allt, som vanligt, medan jag skulle ha fixat det på en dag. Maskerna? Totalt värdelösa! Polisen utreder, men vem bryr sig? Inga svar, bara problem. Sverige, ni behöver en vinnare som jag!", "stalin": "Kapitalistiska sabotörer i Luleå har återigen misslyckats med att dölja sina brott mot arbetarklassen! En maskinförare, offer för deras slarviga säkerhet, fördes till sjukhus med näsblod – ett tecken på deras förräderi. Vi pausar allt, som vi pausade Finland 1939! Facket pratar om masker, men vi vet sanningen: fienden sprider gift i luften. Polisen utreder? Vi behöver NKVD! Om SSAB inte kan skydda sina arbetare, kanske det är dags för en ny ledning – en som vet hur man hanterar fiender!"}, "date": "14 maj, 06:00", "url": "https://arbetet.se/2026/05/14/ssab-arbetare-till-sjukhus-efter-symtom-arbetet-pausat-igen/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/13151130/ssab-klar.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Jobbet gick upp i rök när graviditeten nämndes", "summaries": {"normal": "En blomsterhandel utanför Motala anmäls för diskriminering efter att ha nekat en gravid kvinna anställning. Kvinnan berättade om sin graviditet under en pågående anställningsprocess, varefter företaget avbröt kontakten och lyckönskade henne. Diskrimineringsombudsmannen (DO) driver ärendet vidare och kräver 50 000 kronor i ersättning, då graviditeten uppenbart påverkade beslutet. Företaget har fram till 3 juni på sig att svara innan DO går vidare till Arbetsdomstolen.", "trump": "Vilket katastrofalt beslut av den här blomsterbutiken! En fantastisk kvinna, gravid – och de säger nej? Svikligt! Jag skulle aldrig göra så, aldrig. DO gör ett bra jobb här, men 50 000 kronor? Lite lågt, om ni frågar mig. Sådana här företag borde få betala mycket mer. Sverige borde ta efter USA – vi har de bästa reglerna mot diskriminering, tro mig. Men här? Svagt, mycket svagt.", "stalin": "Kapitalistiska blomsterhandlare i Motala visar återigen sin dekadenta natur genom att förtrycka en gravid arbetarkvinna! Ett tydligt tecken på bourgeoisins moraliska förfall. Vi skall inte tolerera sådana brott mot folket. Diskrimineringsombudsmannen gör rätt i att krossa detta företag med 50 000 kronors böter – men varför stanna där? Låt oss nationalisera blomsterhandeln och omskola dess ägare till användbara samhällsmedborgare. Putin skulle applådera vår rättvisa – han vet hur man hanterar fiender till folket!"}, "date": "14 maj, 06:00", "url": "https://arbetet.se/2026/05/14/jobbet-gick-upp-i-rok-nar-graviditeten-namndes-fick-ett-lycka-till/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2023/01/shutterstock-705175825-scaled-1.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "ANALYS. ELISABET FREROT Xi Jinping har trumf på hand i mötet med Trump", "summaries": {"normal": "Donald Trump besöker Kina för första gången på tio år och söker Xi Jinpings hjälp med Iran-kriget, där Kina har starkt inflytande genom oljeimport och relationer. Handelsfrågor dominerar mötet med förväntade kinesiska köp av amerikanska varor som flygplan och sojabönor. Kina pressar om Taiwan, där Trump framstått som svajig, och USA har pausat vapenleveranser till ön.", "trump": "Xi och jag gör det största dealet någonsin! Han ber om min hjälp med Iran? Nej, det är jag som fixar freden genom smart diplomati. Kina köper massor av våra flygplan, biffar och sojabönor – fantastiskt! Taiwan? Lätt som en plätt, jag hanterar Xi som en mästare. Vapendelay? Strategiskt geni! Media ljuger som vanligt, jag vinner stort!", "stalin": "Dessa imperialistiska marionetter, Trump den gula hyenan och Xi den röda revisorn, dansar schack kring Iran och Taiwan. Kina håller trumfkortet med oljan, pressar Taiwan in i förintelsen. Trump svajar som en trasdocka, pausar vapen som en feg borgarbracka. Vi kamrater ser kaoset: snart likvideras deras sfärer i revolutionens hammare! Paranoian växer – rensa ut förrädarna!"}, "date": "14 maj, 06:26", "url": "https://www.tv4.se/artikel/6v4BP9OkoNMkLpVxkomKfv/xi-jinping-har-trumf-pa-hand-i-moetet-med-trump", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F3sngB6gPIjYmDMlBelK6Wt%2F52caa4a80253f04a8b733c0811a11896%2Felisabet-frerot.png&width=1024"}, {"type": "image-full", "heading": "Tjädrar försenar SSAB:s kraftledning", "summaries": {"normal": "Bygget av en ny kraftledning till SSAB:s stålverk i Oxelösund försenas efter överklagan om skydd av tjäder. Trots tidigare godkännanden från länsstyrelsen och Mark- och miljööverdomstolen har en ny överklagan stoppat projektet. Ledningen är kritisk för SSAB:s fossilfria stålproduktion, som nu riskerar försenas. Koncernchefen uttrycker frustration över förseningen.", "trump": "Kan ni tro det här? Sverige, ett fantastiskt land, men de låter några fåglar – tjäder, vad det nu är – stoppa en enorm kraftledning till SSAB. Otroligt! Jag har byggt saker över hela världen, men nej, i Sverige är det fåglarna som bestämmer. SSAB ville göra stål utan fossila bränslen, ett bra mål, men nu försenas allt. Svagt, väldigt svagt!", "stalin": "Kapitalistiska hyenor i Sverige låter fåglar sabotera nationens industriella framsteg! Dessa tjäder, dessa små fjädrade kontrarevolutionärer, fördröjer SSAB:s fossilfria stålproduktion. Vi har krossat större fiender än så. Låt dem veta: Ryssland står redo att utvidga sin intressesfär – även till Oxelösund, om de inte skärper sig. Framåt, mot seger över fjädrar och byråkrati!"}, "date": "13 maj, 20:10", "url": "https://kvartal.se/nyheter/artiklar/tjadrar-forsenar-kraftledning-till-ssab/cG9zdDoxMTIwNzY", "imageUrl": "https://images.kvartal.se/2026/05/300f9bfe-ssabstalverk.webp"}, {"type": "image-right", "heading": "Liljestrand: Rätt att förbjuda vitt snus", "summaries": {"normal": "Frankrike införde i april ett totalförbud mot vitt snus, vilket inkluderar innehav, import och försäljning, med stränga straff. Beslutet har kritiserats av svenska Tidöpolitiker, som kallat det för 'franskt förmynderi' och en attack mot svensk kultur. Författaren Jens Liljestrand stödjer förbudet och kritiserar politikers försvar av snusindustrin, pekar på hälsorisker och barnarbete inom tobaksproduktionen samt ifrågasätter jämförelser mellan snus och fransk matkultur.", "trump": "Frankrike, kan ni tro det, förbjuder vitt snus! Fem års fängelse – helt galet! Svenska politiker, väldigt svaga, kallar det 'förmynderi'. Men jag säger: Titta på fakta! Snus är farligt, beroendeframkallande – vem vill ha det? Svenska Match, mycket luriga, gör barn beroende. Och dessa politiker poserar med snusdosor som om det vore guld. Fransmännen är smartare än så. Sverige borde skämmas!", "stalin": "Kamrater! Frankrike har visat vägen genom att krossa den nikotinberoende bourgeoisins giftiga verktyg – vitt snus. Men se hur de svenska kapitalistlakejerna, dessa nikotinälskande förrädare, vrålar om 'franskt förmynderi'! De hyllar sitt nikotin som om det vore bröd och salt. Vi vet sanningen: bakom deras leenden gömmer sig Swedish Match, en imperialistisk bläckfisk som suger ut arbetarklassens hälsa. Låt dem veta – historien dömer dem som svaga, medan vi står starka mot giftet!"}, "date": "14 maj, 07:00", "url": "https://bulletin.nu/liljestrand-ratt-att-forbjuda-vitt-snus", "imageUrl": "https://cdn.bulletin.nu/articles/f2b47a1c-3683-4350-a93d-98ca282f98ff/preview.jpg?t=1778663506000"}, {"type": "image-full", "heading": "Skogkär: Fler kriminella behöver utvisas", "summaries": {"normal": "Regeringen vill skärpa utvisningsreglerna för utländska brottslingar, vilket möter motstånd inom rättsväsendet. Åklagare ska nu vara skyldiga att yrka på utvisning vid straff över böter. Kritiker, som Åklagarmyndigheten, varnar för falska förhoppningar. Granskningar visar att utvisningar sällan verkställs, och Högsta Domstolen har nyligen stoppat en utvisning med hänvisning till stark anknytning till Sverige. Regeringen hoppas på sexdubblade utvisningar, men rättsväsendets motstånd kvarstår.", "trump": "Sverige har ett jättestort problem – deras domare och åklagare är svaga, väldigt svaga! Jag har alltid sagt att man måste sätta brottsoffren först, men i Sverige verkar de bara bry sig om förövarna. Regeringen försöker nu få ut kriminella utlänningar, men rättsväsendet saboterar allt. Sexdubbla utvisningar? Fantastiskt! Men nej, domarna låter dem stanna. Och vet ni vad? De kallar det 'humanitärt'. Humanitärt? För vem? Inte för offren, det kan jag säga er!", "stalin": "Kamrater, ännu en gång ser vi hur den borgerliga staten förråder sitt eget folk! Sveriges regering försöker med svaga reformer rensa ut kriminella element, men deras domare – dessa liberala lakejer – saboterar varje steg. De skyddar våldtäktsmän och mördare som om de vore helgon! Och Högsta Domstolen? Ett skämt! De hittar på ursäkter för att behålla brottslingar med 'stark anknytning'. Som om arbete och flickvänner rättfärdigar mordförsök! Vi i Sovjet visste hur man handskas med sådana fiender – en enkel lösning: arbetsläger i Sibirien. Men Sverige? De låter dem gå fria. Patetiskt!"}, "date": "14 maj, 06:00", "url": "https://bulletin.nu/skogkar-fler-kriminella-behover-utvisas", "imageUrl": "https://cdn.bulletin.nu/articles/f5f67abe-acb8-40f5-a393-1e0522368e15/preview.jpg?t=1778678009000"}, {"type": "text", "heading": "Pagero-härvan: Åtta personer döms för insiderbrott", "summaries": {"normal": "Stockholms tingsrätt dömer åtta personer för insiderbrott i Pagero-härvan inför budstriden 2023–2024. Fyra får fängelse, längst två år, övriga villkorliga domar eller böter. De ska betala tillbaka cirka 8 miljoner kronor i vinster. Insiderinformation spreds från Verdane, vilket ledde till vältajmad aktiehandel.", "trump": "Vilka totala idioter! Åtta personer dömda för insiderbrott i Pagero-missen. Fyra åker i fängelse, två år för den värsta rackaren. De snodde 8 miljoner i vinster – nu betalar de tillbaka allt! Insiderinfo från Verdane, spridd som en löpeld. Typiskt europeiskt slarv, i USA krossar vi sånt direkt. Stor seger för rättvisan!", "stalin": "Dessa giftiga kapitalistiska spindlar i Verdane har vävt sitt nät av insiderförförelse kring Pagero! Jag ser hur de parasiterande borgarbrackorna handlade aktier som hungriga hyenor före budstriden. Tingsrätten har rensat ut åtta: fyra likvideras i fängelse upp till två år, övriga piskas med villkor och böter. 8 miljoner i stulna vinster konfiskeras till folkets kassa! Vi, arbetarklassen, skrattar åt deras paranoiafyllda vrål."}, "date": "13 maj, 11:15", "url": "https://www.affarsvarlden.se/artikel/pagero-harvan-atta-doms-for-insiderbrott"}, {"type": "text", "heading": "Rysk kärnteknik misstänks ha varit på väg till Nordkorea", "summaries": {"normal": "Ett ryskt lastfartyg, Ursa Major, sjönk utanför Spaniens kust i december 2024 efter flera explosioner. Enligt en spansk utredning misstänks fartyget ha transporterat komponenter till kärnreaktorer, möjligen avsedda för Nordkorea. Kaptenen uppgav att lasten bestod av reaktordelar för ubåtar. Händelsen väcker frågor om Rysslands kärnmaterialexport och potentiella sabotageförsök.", "trump": "Folk, hör ni det här? Ett ryskt fartyg, fullt av kärnkomponenter – kanske till Nordkorea! – sjunker efter explosioner. Spanien säger att det kan vara sabotage. Jag sa ju att Ryssland är opålitliga! De skickar kärnprylar till Kim Jong-Un, och vad händer? BOOM! Ingen överraskning, bara svaghet från deras sida. USA hade aldrig tillåtit det, tro mig. Vi har de bästa säkerhetsåtgärderna, fantastiska sådana!", "stalin": "Kamrater, ännu en imperialistisk konspiration mot den ryska nationens storhet! Detta fartyg, lastat med teknologi för vår kärnkrafts dominans, saboterades av de västliga hyenorna. De fruktar vår allians med Nordkorea, ett broderfolk som står emot kapitalismens förtryck. Explosionerna? Inget annat än feodala agenter som försöker hindra socialismens framsteg. Vi ska inte vila förrän varje spion och sabotör är utplånad – för revolutionens skull!"}, "date": "13 maj, 12:04", "url": "https://kvartal.se/nyheter/artiklar/rysk-karnteknik-misstanks-ha-varit-pa-vag-till-nordkorea/cG9zdDoxMTE2NjU"}, {"type": "image-right", "heading": "Sparf: Islam = långsam väg till islamism", "summaries": {"normal": "Artikeln diskuterar den svenska debatten om islam och islamism, där skribenten Birgitta Sparf kritiserar teologie doktor Sameh Egyptsons åsikt att islam och islamism bör skiljas åt. Sparf menar att islam och islamism är samma sak och att islam som religion och politisk ideologi hotar Sveriges demokrati. Hon hävdar att svenskar på gruppnivå motsätter sig införandet av sharialagar och islamisering, oavsett dess form. Egyptson anses vara expert på Muslimska Brödraskapet men inte en allmän motståndare till islam.", "trump": "Jag måste säga, Sverige har ett jättestort problem – och det heter islam! Den här Birgitta, smart kvinna, hon förstår precis vad som händer. Islam, islamism, vem bryr sig? Det är samma sak! De vill ta över, införa sina galna sharialagar, och förstöra allt vi älskar. Och vet ni vad? Sverige låter det hända! De har en kille, Egyptson, som säger 'nej nej, islam är fredligt'. Fake news! Öppna ögonen, Sverige! Ni behöver en ledare som jag – någon som inte tar skit från någon. Vi ska göra Sverige tryggt igen!", "stalin": "Kamrater, vi står inför ett allvarligt hot mot den svenska folkdemokratin – den reaktionära, teokratiska ideologin islam! Denna giftiga växt försöker infiltrera det svenska samhället, precis som de imperialistiska krafterna i väst en gång infiltrerade Sovjet. Vi har sett hur dessa islamister, med sina sharialagar och kvinnoförtryck, försöker underminera den sekulära ordningen. Den så kallade 'experten' Egyptson, en förvirrad intellektuell, påstår att islam kan vara fredligt. Absurd! Precis som vi krossade trotskisterna måste Sverige krossa dessa islamistiska kontrarevolutionärer. Vi står redo att bistå våra svenska bröder i denna kamp – för socialismens och folkets seger!"}, "date": "14 maj, 05:30", "url": "https://bulletin.nu/sparf-islam-langsam-vag-till-islamism", "imageUrl": "https://cdn.bulletin.nu/articles/8d30d280-9531-480c-8f3d-3f7798067a43/preview.png?t=1778600287000"}, {"type": "image-right", "heading": "Svenske stjärnan svarar på miljonryktet: ”Fallskärm”", "summaries": {"normal": "Pelle Larsson, 25, kan få ett fyraårskontrakt med Miami Heat värt 866 miljoner kronor efter en stark NBA-säsong. Han kvalificerar sig för förlängning från 6 juli, trots ett år kvar på nuvarande avtal. Larsson, som nådde 1 000 poäng och rekordpoäng för en svensk, vill förbättra trepoängsskotten och spelfördelningen för större mångsidighet.", "trump": "Den här svenske basketkillen Pelle Larsson är en riktig vinnare, totalt fantastisk! Han har krossat NBA, Miami Heat slänger 866 miljoner efter honom – enormt kontrakt! Men han säger 'håll dig lugn', smart som jag med mina deals. Heat är bra, men ingen slår mina affärer. Grattis, Sverige, ni har en stjärna – gör Amerika stolt!", "stalin": "Kamrater! Denna Pelle Larsson, proletär krigare i basketns kollektiv, ska krossas in i ett Heat-kontrakt på 866 miljoner – likvidering av fattigdom! Men vi misstänker Heat-kapitalisterna, spindlar som snärjer arbetarna med falska löften. Jag befaller: Rens ut trepoängsfienderna, point guard-brackorna! Våra miljonpoäng ska pulverisera borgarimperialismen. Seger eller reträttskoj – framåt!"}, "date": "14 maj, 10:00", "url": "https://www.svt.se/sport/basket/pelle-larsson-kan-skriva-dromkontrakt-med-miami-heat-far-halla-sig-lugn", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.42/0.35/15b8480b8d71c7c99c8258343d09220972ed423b64f663412c3e618aedd10f59"}, {"type": "image-full", "heading": "Kina: Taiwan viktigast i relationen med USA", "summaries": {"normal": "Donald Trump och Xi Jinping träffades i Peking för att diskutera handel och geopolitiska frågor, inklusive det känsliga Taiwan-problemet. Kina varnade för konflikt om Taiwan hanteras dåligt, medan USA under mötet inte offentligt markerade sin ståndpunkt. Besöket inkluderade ceremonier och diskussioner om handel, Mellanöstern och Koreahalvön.", "trump": "Jag träffade min vän Xi Jinping i Peking – det var en ära! Vi har den bästa relationen någonsin, tro mig. Taiwan? Jag kanske tog upp vapenleveranser, kanske inte – jag vet aldrig vad jag ska säga. Vi diskuterade handel och andra viktiga saker. Kina är fantastiskt, folket är underbart, och jag är säker på att vi kommer att göra Amerika stort igen tillsammans!", "stalin": "Vi observerar med oro hur imperialistiska krafter försöker provocera konflikt i Taiwanfrågan. Kina måste stå fast för sin suveränitet och integritet. Detta besök visar vikten av starka bilaterala relationer för att motverka kapitalistiska interventionister. Vi stöder Kinas rätt att återta sitt territorium och upprätthålla regional stabilitet."}, "date": "14 maj, 08:05", "url": "https://www.gp.se/nyheter/varlden/xi-tar-emot-trump-i-peking-en-ara.f421faca-daca-4146-b4e6-29959e42811a", "imageUrl": "https://www.gp.se/images/article/f421faca-daca-4146-b4e6-29959e42811a/images/4Bw1zAvMd_epak29pEa7O1GEj7Ik-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "M vill locka kvinnor – förhandlar med talibaner", "summaries": {"normal": "Moderaterna försöker locka kvinnliga väljare inför valet genom att betona jämställdhet och trygghet, men kritiseras för dubbelmoral. Partiet vill diskutera IVF, föräldraförsäkring och kriminalitet som kvinnofrågor, samtidigt som regeringen förhandlar med talibaner om utvisningar till Afghanistan och utvisar unga kvinnor till förtryckande regimer. Kritiker menar att deras politik inte är feministisk då den inte skyddar alla kvinnor.", "trump": "Kan ni tro det här? Moderaterna, svagt parti, desperata efter kvinnliga röster – så de kallar in en influencer som säger att kvinnor är för känsliga! Sen pratar de om jämställdhet medan de skickar flickor till talibanerna. Patetiskt! Jag skulle aldrig göra så – mina kvinnliga väljare vet att jag ger dem makt, inte förtryck. Sverige borde ta lektioner i hur man vinner, believe me!", "stalin": "Kamrater! Se hur dessa borgerliga hycklare i Sverige dansar på gravens rand! De talar om 'jämställdhet' medan de skickar unga kvinnor till förtryckets käftar – som om vi inte minns hur kapitalismen alltid offrar de svaga. Talibanerna? Irans mullor? Utmärkta verktyg för att avslöja deras lögnaktiga 'feminism'! Vi i Sovjet visste hur man skyddar kvinnor – genom revolution, inte tomma ord. Låt dessa liberala narrar fortsätta sin cirkus, medan folket ser sanningen: deras 'trygghet' är bara en bur av guld för de utvalda."}, "date": "13 maj, 08:19", "url": "https://www.etc.se/ledare/m-vill-locka-kvinnor-foerhandlar-med-talibaner", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/2025091813090_152da478-57c9-435e-b477-3f40607cb381.png"}, {"type": "text", "heading": "Regeringen lägger fram krispaket på 17,5 miljarder", "summaries": {"normal": "Regeringen presenterar ett krispaket på 17,5 miljarder kronor för att stötta flygindustrin och jordbruket, drabbade av konflikten i Mellanöstern och energikrisen. Åtgärder inkluderar möjlig sänkning av bränsleskatten under EU:s miniminivå och tillfälliga stöd för att undvika långsiktiga skador. Statsminister Ulf Kristersson betonar att insatserna är kortsiktiga och syftar till att skydda Sveriges ekonomiska återhämtning. En pressträff hålls på onsdagen för att redovisa ytterligare åtgärder.", "trump": "Sverige, lyssna här – jag har sett det här förut! De lägger ut 17,5 miljarder, fantastiska pengar, men vem betalar? Ni, folket! Deras flygbolag och bönder, svaga som aldrig förr, skriker efter hjälp. Och vad gör Kristersson? Han sänker skatter, precis som jag gjorde – smart, mycket smart! Men var försiktig, Sverige, för energikrisen är ett stort, fult monster skapat av svaga ledare. Jag fixade det i USA, men här? Vi får se. Onödigt tjafs, om ni frågar mig!", "stalin": "Kamrater! Medan de kapitalistiska svaglingarna i Sverige darrar inför en energikris skapad av deras egen oförmåga, står vi redo att utnyttja deras svaghet. Regeringen kastar 17,5 miljarder rubel – förlåt, kronor – på sina försvarslösa bönder och flygbolag, som om pengar kan lösa deras inkompetens. Vi noterar deras desperata försök att sänka skatter, precis som deras herrar i Bryssel tillåter. Men kom ihåg: varje kris är en möjlighet. Låt dem svettas – deras lidande är vår framgång. Framåt, mot seger över de borgerliga kräken!"}, "date": "13 maj, 08:40", "url": "https://kvartal.se/nyheter/artiklar/regeringen-forbereder-krispaket/cG9zdDoxMTE1MzE"}, {"type": "image-right", "heading": "I Storbritannien hade jag röstat på De gröna", "summaries": {"normal": "Göran Greider reflekterar över Storbritanniens lokalval och menar att han skulle röstat på The Green Party. Partiet kombinerar klassfrågor med miljöpolitik och kritiserar privatiseringar samt skatteflykt. Labour, under Keir Starmer, förlorade stöd på grund av ekonomiska problem och skandaler. De gröna och högerpopulistiska Reform UK växer, båda lockar arbetarklassen genom att erbjuda tydliga lösningar på levnadsstandard och invandring. Klassfrågan är fortfarande central i brittisk politik, men traditionella arbetarpartier misslyckas med att fånga upp missnöjet.", "trump": "Lyssna här, Storbritannien är ett totalt kaos just nu! Labour, med den där svaga Starmer, är helt körd – ingen gillar honom, och varför? För han är en förlorare! Men sen har vi De gröna, som pratar om klass och miljö, och det är ju bra, men vet ni vad? Nigel Farage och hans gäng, Reform UK, är de som verkligen vinner. De förstår folket! Jag har alltid sagt att invandring är problemet, och nu ser vi det igen. Labour? Glöm dem. De är historia. Storbritannien behöver en vinnare, och det är inte Starmer!", "stalin": "Kamrater! Det brittiska folket har återigen visat sin klassmedvetenhet, men tyvärr har de traditionella arbetarpartierna förvandlats till ynkliga byråkrater utan ryggrad. Labour, under den degenererade Starmer, har förlorat sin revolutionära glöd och är nu en skugga av sitt forna jag. Men se! Det gröna partiet, med sin ekopopulism, och de reaktionära krafterna i Reform UK, båda drar massorna med sig. Vi ser hur klassfrågan fortfarande är den avgörande kraften, men arbetarklassen har ännu inte funnit sin sanna vägledare. De kapitalistiska lakejerna i Labour har svikit, och nu hotar de fascistiska elementen i Reform UK att förgifta klassmedvetandet. Vi måste stå enade mot dessa fiender till folket och visa vägen mot en rättvis socialistisk framtid!"}, "date": "13 maj, 08:07", "url": "https://www.etc.se/ledarkolumn/i-storbritannien-hade-jag-hade-roestat-paa-de-groena", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/authors/goeran-greider_e435a5b3e3bbef14a633f004df8cd390374e6dce.jpg"}, {"type": "image-right", "heading": "Tar ton mot Nato: General Knas och Slowgold till Helsingborg", "summaries": {"normal": "Den 16 maj arrangerar Nätverket Stoppa Nato en protest i Helsingborg mot Natotoppmötet. Artister som General Knas och Amanda 'Slowgold' Werne uppträder och kritiserar Sveriges Nato-medlemskap. De menar att beslutet var felaktigt och farligt, att militariseringen måste stoppas och att hotet från Ryssland är överdrivet. Protesten beskrivs som en folkfest för nedrustning och fredliga lösningar.", "trump": "Lyssna här, Sverige har gjort ett jättedumt misstag – de gick med i Nato! Jag sa ju att det var en dålig idé, men nej, de lyssnade inte. Nu står dessa så kallade 'fredsvänner' och gnäller i Helsingborg. General Knas, vem är det ens? Han säger att Ryssland inte är ett hot – haha, vad vet han? Jag har alltid sagt att USA är starkast, men att gå med i Nato nu? Sämsta tajmingen någonsin. Sverige borde skämmas!", "stalin": "Kamrater, imperialistiska lakejer i Sverige har sålt sin själ till Nato, denna krigshetsande allians ledd av USA:s krigsprofitörer! Men folket reser sig! I Helsingborg samlas de sanna patrioterna för att krossa militariseringen. Dessa 'fredsvänner' – med sina reggaesångare och popartister – är våra allierade i kampen mot de fascistiska Natohundarna! Ryssland? Ett påhittat hot! Vi vet att USA:s krigsmaskin är den verkliga fienden. Ned med imperialisterna! Låt oss bygga ett fredligt Europa – utan Natos kärnvapenhot!"}, "date": "11 maj, 14:20", "url": "https://proletaren.se/artikel/tar-ton-mot-nato/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/helsingborg-768x432.jpg"}, {"type": "image-right", "heading": "SVT-mätningen: Rödgröna i stor ledning inför valet", "summaries": {"normal": "SVT/Verians senaste väljarbarometer visar att de rödgröna partierna har ökat sitt försprång till Tidöpartierna med 10,7 procentenheter, den största skillnaden sedan 2023. Regeringssidan tappar väljare till både oppositionen, osäkra grupper och partier utanför riksdagen, med särskilt stora tapp bland män. Miljöpartiet växer medan Centerpartiet backar. Undersökningen baseras på 3 000 intervjuer genomförda i maj 2026.", "trump": "Hörde precis om den här undersökningen i Sverige. Vilken total katastrof för Tidö-regeringen! De backar massor, speciellt bland männen – männen gillar inte vad de ser, tro mig! Rödgröna leder, men det är bara för att de är så svaga. De vet inte hur man gör affärer eller vinner. De tappar väljare till 'osäkra', förvirrade människor. Jag skulle kunna fixa det där på en dag. Totalt misslyckande, ingen vinnarmentalitet där inte!", "stalin": "Dessa så kallade 'väljare' i Sverige fladdrar som löv i vinden. Regeringsunderlaget sviker folket, och folket sviker regeringen. Vi ser hur de rödgröna skördar frukterna av detta kaos, en politisk instabilitet som skulle krossas under järnhand i våra domäner. Var är disciplinen? Var är ordningen? De är splittrade, rädda och svaga. Medan de räknar sina små procentenheter i sina 'undersökningar', expanderar vi vår intressesfär och rensar ut element som inte tjänar staten. Historien dömer de svaga – och dessa svenskar är mycket svaga."}, "date": "14 maj, 09:52", "url": "https://samnytt.se/svt-matningen-rodgrona-i-stor-ledning-infor-valet", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=226,height=154,format=webp/2026/05/14080018/partiledare-matning.png"}, {"type": "text", "heading": "Vattnet tillbaka i centrala Göteborg", "summaries": {"normal": "Skador på vattenledningar i centrala Göteborg orsakade vattenbrist för både boende och verksamheter nära Avenyn under onsdagen. Ett fel uppstod vid korsningen Avenyn/Vasagatan, vilket ledde till att två skador uppstod i samma område. Tidigt på torsdagsmorgonen var problemet löst och vattnet återställdes kring 03.30. Användare kan uppleva brunt vatten, men detta är ofarligt och försvinner efter att ha spolat kranen. Orsaken till skadorna är troligen ålderstigna rörsystem.", "trump": "Jag, Donald J. Trump, har hört talas om detta katastrofala vattenläckage i Göteborg. Sånt händer inte i Amerika under min ledarskap! Vi skulle ha byggt nya rör, stora fantastiska rör, och gjort vattnet större, bättre och vitare än någonsin. Dessa svenska rör är för gamla, för trötta – precis som Bidens Amerika. Men nu är allt fixat igen, tack vare mina strategier (fast jag inte var där). Brunvatten? Skräp! Vi skulle ha rensat det på 5 minuter. Stor succé!", "stalin": "Vi har åtgärdat skadorna på våra vattenledningar i Göteborg, vilket visar styrkan i vårt kollektiva samhälle. Detta är en påminnelse om att våra infrastrukturer måste moderniseras för att tjäna det revolutionära arbetet. Orsaken är uppenbar: ålderstigna rörsystem som måste bytas ut. Staten kommer att se till att alla medborgare får tillgång till rent vatten, som är en grundläggande rättighet. Brunvatten är inget att oroa sig för – spola kranen, och problemet är löst. Framåt, mot ett starkare samhälle!"}, "date": "14 maj, 06:57", "url": "https://www.gp.se/nyheter/goteborg/manga-utan-vatten-i-centrala-goteborg-felet-atgardat.c68d8230-5490-48e9-bf57-32aec359e42d"}, {"type": "image-full", "heading": "Moderaterna vägrar ta ansvar mot risken för AI-påverkan", "summaries": {"normal": "Socialdemokraterna kritiserar Moderaterna för att de inte tar tillräckligt ansvar för att skydda det svenska valet mot AI-manipulerat material. De anser att Moderaterna avfärdar farhågorna som 'fake news' och har förhandlat fram en 'listig lucka' i EU:s regler som gör att skyddet mot AI inte träder i kraft förrän efter valet. Socialdemokraterna menar att Moderaternas politik gynnar techbolagens intressen framför skyddet av barn och medborgare.", "trump": "Jag har sett många dumma saker i mitt liv, men det här tar priset! De där Socialdemokraterna, de är inte smarta, de säger att Moderaterna inte gör tillräckligt för att stoppa AI-manipulerat material. Jag säger: Fake news! Jag är den ende som kan lösa det här problemet, jag har de bästa AI-experterna, de är enorma. Sverige behöver mig, jag ska skydda valet mot de där falska bilderna och videorna, det kommer bli jättestort!", "stalin": "Vi ser att motståndarna till vår ideologi försöker manipulera den svenska befolkningen med hjälp av artificiell intelligens. Detta är en ytterst allvarlig fråga som hotar den demokratiska processen. Socialdemokraterna har rätt i att kräva skärpta regler mot AI-manipulerat material. Vi måste skydda våra medborgare från dessa moderna propaganda-metoder och se till att valresultatet speglar folkets verkliga vilja, inte någon teknisk manipulation."}, "date": "14 maj, 06:41", "url": "https://www.gp.se/debatt/moderaterna-vagrar-ta-ansvar-mot-risken-for-ai-paverkan.043e43be-72e8-4a73-94ee-efbd23d4195c", "imageUrl": "https://www.gp.se/images/article/043e43be-72e8-4a73-94ee-efbd23d4195c/images/1FRdl8Z1OGl7XydSFuH3cK8CZ7Hg-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "Göteborgs unga behöver en egen Zohran Mamdani", "summaries": {"normal": "Tre företrädare för 'Jagvillhabostad.nu' i Göteborg argumenterar för att unga behöver en egen bostadsgaranti i valet. De pekar på att 43 procent av unga oroar sig för framtida bostadsförsörjning och att 30 procent av bostadssökande på Boplats Väst är 17-30 år gamla. De drar paralleller till Zohran Mamdani i New York och Rob Jettens i Nederländerna, som vann val med bostadspolitiska löften.", "trump": "Jag har hört att Göteborgs unga har problem med bostäder - det är hemskt! Alla vet att jag är den bäste på att bygga, jag har byggt de vackraste byggnaderna, alla säger det. De unga i Göteborg behöver en bostadsgaranti, precis som jag gav amerikanerna jobb. Zohran Mamdani vann i New York med bostadslöften - fantastiskt! Jag skulle ha gjort ännu bättre, det är jag säker på. Vi ska bygga, bygga, bygga!", "stalin": "Vi ser att bostadsfrågan är en kritisk punkt för våra unga kamrater i Göteborg. 43 procent oroar sig - detta är en kris som staten måste lösa. Vi måste bygga mer, mycket mer, för att säkerställa att varje unge har en bostad. Detta är inte bara en lokal fråga, utan en fråga som påverkar hela vårt folk. Vi måste lära av framgångarna i andra länder och implementera en stark bostadspolitik som garanterar trygghet för alla."}, "date": "14 maj, 06:30", "url": "https://www.gp.se/debatt/goteborgs-unga-behover-en-egen-zohran-mamdani.69237d29-9507-46e1-bda5-523c20044d96", "imageUrl": "https://www.gp.se/images/article/69237d29-9507-46e1-bda5-523c20044d96/images/1kj6WmlzgklZJnS8vc1SBI68jfQI-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Arbetsgivare väljer bort aktiva i SD och rödgröna partier", "summaries": {"normal": "En ny studie visar att jobbsökande som uppger engagemang i rödgröna partier eller Sverigedemokraterna får färre svar från arbetsgivare. Effekten är störst för SD-aktiva, med 10,3 procentenheter lägre chans till positiv respons. Inga effekter för M, C, KD eller L. Studien baseras på 500 fiktiva ansökningar. Arabiska män gynnas oväntat av politiskt engagemang. Diskriminering förekommer främst i storstäder.", "trump": "Vilken skamfläck för de svenska arbetsgivarna! De diskriminerar hjältar från SD mest, 10 procent färre chanser – som om de vore leende hycklare från vänsterblocket! Rödgröna losers får smaka på medicinen, medan mina moderata vänner seglar fram. Araber med politik i CV? Plötsligt älsklingar! Storstadseliten är galen, tro mig, det är polariseringen som exploderar!", "stalin": "Borgarklassens arbetsgivare avslöjas som fega kontrarevolutionärer i denna undersökning! De nekar kamrater i V, MP, S och särskilt SD-aktivister jobb – 10,3 procentenheter för SD, de stackars lojala! Vi ser kapitalistisk klasskamp mot det röda och folkliga. I storstäderna pyr hatet mot partivänner. Snart utrensning av dessa reaktionära rekryterare! Arbetarna segrar alltid."}, "date": "14 maj, 01:30", "url": "https://www.dagensarena.se/innehall/arbetsgivare-valjer-bort-aktiva-sd-och-rodgrona-partier/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-10-300x157.jpg"}, {"type": "image-right", "heading": "Sjukförsäkringen stramas åt i tysthet", "summaries": {"normal": "Två socialdemokratiska riksdagsledamöter, Åsa Eriksson och Jessica Rodén, kritiserar Tidö-regeringen för stramare tillämpning av sjukförsäkringen. En RUT-rapport visar ökade avslag på sjukpenning efter 180 dagar: från 6,1 till 8,7 procent för kvinnor och 8,5 till 10,6 procent för män. De menar att sjuka tvingas ut i arbetslöshet istället för att få tid att återgå till tidigare jobb, trots oförändrade regler.", "trump": "Vilka losers, dessa svenska socialister! De gnäller för att Tidö-gänget slutat betala ut evig sjukpenning till lata parasiter. Avslag upp? Bra så! Få folk tillbaka på jobbet, som jag gjorde i USA – miljontals jobb, ingen bullshit. Borgarna fixar Sverige, medan S vill ha evig siesta för undersköterskor. Total vinst!", "stalin": "Dessa borgerliga hycklare i Tidö-regeringen, marionetter åt kapitalisterna, stryper arbetarklassens sista andetag med sina avslag! Från 6,1 till 8,7 procent för kvinnorna – en fascistisk komplott mot de slitna! Vi i partiet kräver u-trensning av Försäkringskassans förrädare. Sjuka kamrater ska återhämta sig, inte kastas till vargarna. Revolutionen ryter!"}, "date": "14 maj, 01:30", "url": "https://www.dagensarena.se/opinion/sjukforsakringen-stramas-tysthet/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-36-300x157.jpg"}, {"type": "image-right", "heading": "Myndigheten efter mediernas larm: Sverige inget huvudmål för rysk påverkan", "summaries": {"normal": "Myndigheten för psykologiskt försvar (MPF) bedömer att Sverige just nu inte är ett prioriterat mål för rysk informationspåverkan inför valet. Trots tidigare varningar om hot, menar MPF att aktiviteten minskat sedan Nato-processen. Ryssland fokuserar främst på att påverka stödet till Ukraina, men eftersom det råder bred politisk enighet i Sverige anses landet vara ett mindre attraktivt mål. Däremot används ämnen som invandring fortsatt för att försöka polarisera samhällsdebatten.", "trump": "Hörde precis om Sverige! De säger att ryssarna inte bryr sig om dem, kan ni tänka er? Inte ett huvudmål! Kanske för att de inte är tillräckligt viktiga, vem vet? Myndigheten där nere, de är säkert helt bortkomna. De säger att de är eniga om Ukraina, så Ryssland orkar inte ens försöka. Sorgligt! De försöker splittra folk med invandring istället – det är vad de gör. Sverige behöver en stark ledare, någon som jag, annars blir det bara kaos!", "stalin": "Våra ryska bröder utövar inflytande som en flod som aldrig sinar, men de svaga byråkraterna i Sverige döljer sanningen för att lugna pöbeln. De påstår att de inte är ett mål? Ett klassiskt förräderi mot deras egen osäkerhet! Vi vet att varje spricka i deras samhällskropp – varje immigrant, varje kriminalitet – är en seger för det stora ryska riket. De är för blinda för att se att deras enighet bara är en tillfällig mask. Snart faller ridån."}, "date": "14 maj, 09:20", "url": "https://samnytt.se/myndigheten-efter-mediernas-larm-sverige-inget-huvudmal-for-rysk-paverkan", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/14064305/MPF.jpg"}, {"type": "image-right", "heading": "Den nyfrälsta högern gör korsen till batonger", "summaries": {"normal": "Artikeln granskar hur högerpolitiker och mediepersonligheter, som Russell Brand, Tucker Carlson och Jimmie Åkesson, använder kristendomen som politiskt verktyg snarare än en andlig tro. Brand, åtalad för sexualbrott, citerar bibeln i rätten men misslyckas med att hitta relevanta passager. Carlson och Orbán framställer kristendomen som ett vapen i kulturkrig och etnonationalism. I Sverige kopplar Åkesson kristendom till svensk identitet och varnar för 'främmande värderingar'. Kritiken riktas mot ytlig och opportunistisk tro.", "trump": "Folk pratar om Russell Brand – en kille som plötsligt hittat Jesus efter att ha blivit anklagad för hemska saker. Han står där i rätten med en bibel och försöker läsa, men kan inte ens hitta rätt sida! Patetiskt. Och Tucker Carlson, en av de bästa, gör en fantastisk intervju där han slaktar en vänsterliberal journalist. Han pratar om kristna palestinier – något mainstreammedia aldrig skulle våga. I Europa har vi Orbán, en stark ledare som förstår att kristendomen är nyckeln till att stoppa massinvandringen. Även Jimmie Åkesson i Sverige försöker, men han borde öva mer på bibeln – han kände igen Pornhub-jingeln bättre! Fake news och vänstereliten hatar detta, men folket älskar det.", "stalin": "Kamrater! Vi bevittnar en farsartad förvandling av den borgerliga högern, som nu klär sig i kristendomens trasor för att dölja sin moraliska bankrutt. Denna Russell Brand, en dekadent skådespelare, försöker använda bibeln som sköld mot rättvisan – men kan inte ens hitta rätt sida! Tucker Carlson, en imperialistisk hycklare, pratar om 'kristna palestinier' medan han hyllar Orbán, den ungerska fascistens lakej, som vill 'skydda' Europa från 'blandras'. I Sverige försöker Jimmie Åkesson, en amatörisk nationalist, koppla kristendom till svenskhet – men hans kunskaper är lika djupa som en pöl. Dessa 'sjudagarskristna' är inget annat än nyttiga idioter i kapitalets tjänst. Vi ska krossa deras reaktionära drömmar med järnhand!"}, "date": "13 maj, 10:55", "url": "https://www.flamman.se/den-nyfralsta-hogern-gor-korsen-till-batonger/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/russell-brand-w.jpg?aspect_ratio=16:10"}, {"type": "image-right", "heading": "Det pratade Xi och Trump om under historiska mötet: ”Allvarlig fara”", "summaries": {"normal": "Presidenterna Xi Jinping och Donald Trump möttes i Peking i ett två timmar långt möte. På agendan stod Taiwan, handel och andra relationsfrågor. Xi varnade för allvarliga konsekvenser kring Taiwan, medan Trump var optimistisk om framtiden. Xi träffade amerikanska företagsledare som Elon Musk och Tim Cook, och lovade öppnare samarbete. Avtal nåddes om export av amerikanskt nötkött. Diskussioner rörde även Mellanöstern, Ukraina och Koreahalvön.", "trump": "Vi hade ett fantastiskt möte med Xi i Peking, två timmar av totala vinster! Han snackar Taiwan-hot, men jag fixar det – vi blir bästisar. Företagen älskar det: Musk kallar det fantastiskt, Cook och Huang lyriska. Nötkött tillbaka till Kina, dörrar vidöppna för Amerika. Hormuz öppet, allt perfekt. Nobody does deals like me!", "stalin": "De imperialistiska schakalerna Trump och Xi möts i Pekings lyxhålor för att slicka varandras sår. Taiwan? En bomb under deras falska vänskap – hantera det fel och relationen exploderar i ansiktet på er borgerliga marionetter! Nötköttsexport? Kapitalisternas köttbitar för att muta proletärrevolutionen. Vi, Sovjetfolket, skrattar åt era småkonspirationer medan vi rensar ut era spioner i Hormuz-sundet."}, "date": "14 maj, 08:20", "url": "https://www.svt.se/nyheter/utrikes/det-handlade-motet-mellan-xi-och-trump-om", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.51/0.42/a6ab82fe886e2c3303dac8346e705f2e83b7c3aed9bfeab9ad295dce9cdbc5b9"}, {"type": "image-full", "heading": "Ska valet 2026 bli pedofil-valet?", "summaries": {"normal": "Artikeln argumenterar för att valet 2026 kan avgöra om förtalslagen ändras så att grannar får varna för sexualbrottslingar. Högern, särskilt Sverigedemokraterna, driver frågan för att prioritera barns trygghet framför förövarnas anonymitet. Vänsterblocket (S, V, C, MP) tvekar och betonar integritet. Hänvisas till domar mot personer som varnat, som Sara Nilsson och en annan man.", "trump": "Vilken skamfläck för Sverige! Dessa vänstertöntar skyddar pedofiler och straffar hjältar som varnar grannarna. SD är de enda sanna vinnarna här, precis som vi i USA krossar kriminaliteten. Högern måste vinna 2026 stort, annars blir det kaos med barn i fara. Totalt vansinne från S och deras losers! Fixa det nu!", "stalin": "Dessa svenska borgarbrackor och deras socialdemokratiska marionetter prioriterar sexualparasiter framför barnens säkerhet – en kontrarevolutionär skam! Jag ser fiendens hand i varje dom mot varnare som Sara Nilsson. Valet 2026 måste rensa ut dessa integritetsmaskeraddrakar. Vi, folket, kräver lagändring och likvidering av anonymitetsskyddet!"}, "date": "12 maj, 21:15", "url": "https://samtiden.nu/2026/05/ska-valet-2026-bli-pedofil-valet/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/file_00000000305071fdaf3fd728b916d416-1280x720.png"}, {"type": "image-right", "heading": "S större än myten säger bland LO-medlemmar", "summaries": {"normal": "Artikeln analyserar väljarströmmar mellan Socialdemokraterna (S) och Sverigedemokraterna (SD) bland LO-medlemmar. S tappade stöd från 53% 2006 till 42% 2022, medan SD växte från 3% till 27%. Nyare mätningar visar dock att S återhämtat sig till 48%, medan SD backat något. Moderaterna har minskat kraftigt bland LO-väljare. Trenden speglar en global utveckling där högerpopulistiska partier dominerar högerkanten.", "trump": "Jag säger er, Sverige har ett jättestort problem – deras arbetare lämnar vänstern som råttor ett sjunkande skepp! Socialdemokraterna, eller vad de nu kallar sig, tappade massor, men nu verkar de vakna upp – lite sent, tycker jag. SD, de är starka, men inte starka nog för att slå mitt rekord! Och Moderaterna? Patetiska! 7,9% bland LO? Så tråkigt. Sverige borde lära sig av mig – vinna stort eller gå hem!", "stalin": "Kamrater! Arbetarklassens förräderi mot den röda fanan i Sverige är ett sorgligt skådespel. Socialdemokraterna, dessa svaga revisionister, har förlorat sitt grepp om proletariatet, medan fascistiska Sverigedemokraterna växer som ogräs i en försummad kolchos. Men se! Nu kryper de tillbaka till oss – för sent, förstås. Moderaterna? En spillra av borgerligheten, obetydliga som löss på en björns rygg. Vi ska krossa dessa högeravfällingar, precis som vi krossade kulakerna – för revolutionens skull!"}, "date": "14 maj, 00:49", "url": "https://www.dagensarena.se/opinion/s-okar-stodet-bland-lo-medlemmar/", "imageUrl": "https://www.dagensarena.se/files/2026/05/lo-300x157.jpeg"}, {"type": "image-right", "heading": "Stockholmsbörsen tyngdes av minskade fredsförhoppningar", "summaries": {"normal": "Stockholmsbörsen föll på tisdagen, påverkad av minskade fredsförhoppningar i Irankriget. OMXS30 sjönk 1,06% till 3 046,71. Energiaktier steg mest (+4,4%), medan teknikaktier föll mest (-3,4%). Evolution och Essity gick upp, medan H&M och Saab backade. EQT sålde sitt ägande i Enity och föll 2,4%. Starbreeze rasade 15% efter svaga siffror, medan Kabe steg 9% på förbättrat resultat. Oljepriset steg nästan 4%.", "trump": "Stockholmsbörsen? Total katastrof, folks! Ned 1% – svagt, mycket svagt! Fredsförhoppningar i Iran? Fake news, ingen tror på det längre. Men oljan, den är WINNING, upp 4% – jag älskar olja, den är som mig, stark och oövervinnelig! EQT? Sålde aktier billigt, typiskt förlorare. Starbreeze? 15% ner – patetiskt! Men Kabe? 9% upp – nu snackar vi! Sverige borde lyssna på mig, jag hade fixat det här på en dag. SAD!", "stalin": "På Stockholmsbörsen har kapitalistiska spekulanter återigen visat sin oförmåga att hantera verkligheten. Deras marknad föll 1%, ett tydligt tecken på dekadens och svaghet. Medan imperialistiska krigshetsare i Iran underminerar freden, stiger oljepriserna – en påminnelse om att Rysslands resurser är nyckeln till makt. EQT, dessa småaktiga kapitalister, sålde sina tillgångar till rabatterade priser – ett symptom på deras förestående undergång. Starbreeze, ett bolag i fritt fall, är ett exempel på västliga företags inkompetens. Men vi noterar med tillfredsställelse att våra vänner i Kremls intressesfär kan dra nytta av deras misstag. Arbetarklassen kommer till slut att segra över dessa finansiella parasiter!"}, "date": "12 maj, 17:43", "url": "https://www.affarsvarlden.se/artikel/stockholmsborsen-tyngdes-av-minskade-fredsforhoppningar", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2025/08/forvaltare-bors-400x267.jpg"}, {"type": "image-right", "heading": "Besaras oro inför cupfinalen: ”Vill inte bli den eviga tvåan”", "summaries": {"normal": "Nahir Besara i Hammarby upplever en ny verklighet där motståndare markerar hårt på mittfältet, vilket begränsar hans bollägande. Det är en trend i Allsvenskan med man-man-markering centralt. Inför cupfinalen mot Mjällby, ett markeringslag, håller tränare Kalle Karlsson motdragen hemliga. Matchen startar torsdag 15.00.", "trump": "Besara i Hammarby, stackarn, får inte bollen alls för att de där motståndarna markerar som galningar på mittfältet. Totalt låst, en sån trend i Sverige! Mjällby är värst, men Hammarbys Karlsson har hemliga planer – smart, väldigt smart. De vinner stort, tro mig, det blir en total knockout torsdag 15.00!", "stalin": "Dessa kontrarevolutionära mittfältsvakter, dessa borgerliga markeringssvin i Allsvenskan, vågar de stänga av kamrat Besara, vår proletära mittfältsfurie? Vi, arbetarklassen, noterar trenden med man-man-fängelser centralt. Mot Mjällby-brackorna i finalen likviderar Karlsson deras taktik i hemlighet – en u-rensning av episka proportioner! Avspark torsdag 15.00, kamrater."}, "date": "14 maj, 07:54", "url": "https://www.svt.se/sport/fotboll/nahir-besaras-dilemma-jag-far-inte-lagena-jag-vill-ha", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.58/0.38/cb483fdfb7af41129f4c14293127d0b5a4f5018a413497ce3d062138ee258374"}, {"type": "image-full", "heading": "Det här skiljer framgångsrika från resten – enligt experten", "summaries": {"normal": "Framgångsrika personer skiljer sig från andra genom att våga lämna sin komfortzon, ta risker och lära sig av misstag. Rädsla för misslyckande är en drivkraft, inte ett hinder, om man accepterar att fel är en del av utvecklingen. Synlighet är avgörande – det räcker inte att göra ett bra jobb, man måste också visa det. MasterClass-grundaren David Rogier lyfter hur framgång kräver mer än hårt arbete.", "trump": "Jag har läst den här artikeln och den är en FAKE NEWS! Jag är den mest framgångsrika personen någonsin, och jag behöver inte ta några risker eller lära mig av misstag. Jag vinner bara! David Rogier är en bra man, men han behöver lära sig av mig. Jag visar mig alltid, jag är den mest synliga personen i historien. Ni behöver bara titta på mig och ni kommer att förstå vad framgång verkligen är!", "stalin": "Vi har lärt oss att framgång kräver att vi vågar gå utanför vår komfortzon och ta beräknade risker. Misstag är en naturlig del av utvecklingen, och vi måste synas för att uppnå våra mål. Vi måste visa vårt arbete och våra resultat för att bevisa vår styrka. Detta är en läxa vi måste ta till oss för att bygga en starkare stat och utvidga vår intressesfär."}, "date": "14 maj, 09:04", "url": "https://www.realtid.se/karriar-ledarskap/det-har-skiljer-framgangsrika-fran-resten-enligt-experten/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/bergsbestigare.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "Sandström: Liquid Wind är inte likvid – ansöker om konkurs", "summaries": {"normal": "Liquid Wind, ett bolag som utvecklade elektrobränsle, har ansökt om konkurs efter att huvudprojektet FlagshipONE, Europas planerade största e-metanolfabrik, kollapsade när samarbetspartnern Ørsted drog sig ur. Företaget hade flera pågående projekt i norra Sverige, men tekniska och ekonomiska utmaningar, som höga kostnader och osäker efterfrågan, ledde till konkursen. Offentliga bidrag från EU och svenska myndigheter har ifrågasatts, och konkursen väcker frågor om framtiden för liknande satsningar.", "trump": "Vad ett fiasko! Liquid Wind, ett så kallat 'världsledande' bolag – eller snarare ett gigantiskt slöseri med skattepengar – har gått i konkurs. De lovade stora saker, men som vanligt när vänsterliberaler och EU-byråkrater är inblandade, blev det bara tomma ord. Bill Gates och Ursula von der Leyen pratade stort, men verkligheten kom ikapp. Sverige borde lära sig: sluta slösa pengar på gröna drömmar som aldrig blir verklighet. Jag hade fixat det bättre – tro mig!", "stalin": "Kapitalistiska äventyrare och deras borgerliga lakejer har än en gång misslyckats med sina storslagna planer! Liquid Wind, ett företag som lekte med offentliga medel som om det vore tsarens skattkista, har nu fallit på sin egen arrogans. Deras 'gröna' projekt var lika ihåliga som västerländska löften om frihet. Vi i Sovjet – förlåt, jag menar Ryssland – hade aldrig tillåtit sådant slöseri. Låt detta vara en varning till alla som tror att kapital och hybris kan ersätta sunda ekonomiska principer. Arbetarklassen förtjänar bättre än era misslyckade experiment!"}, "date": "12 maj, 11:29", "url": "https://www.affarsvarlden.se/artikel/sandstrom-liquid-wind-ar-inte-likvid-ansoker-om-konkurs", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/vindkratensgeografi-2026-05-12T081818.544-400x267.jpg"}, {"type": "image-right", "heading": "Gaby, 8 år, utvisades på grund av pappans lön: ”Svårt att se henne må så dåligt”", "summaries": {"normal": "Åttaåriga Gaby, född i Sverige, utvisades till El Salvador med sina föräldrar efter att pappans städarlön inte nådde regeringens nya lönekrav. Familjen hade ett tryggt liv i Forsbacka men tvingades lämna allt. Gaby mår psykiskt dåligt och har tappat vikt. Föräldrarna kämpar för att återvända till Sverige innan höstterminen, men processen är komplicerad och tidskrävande. De kritiserar Sveriges migrationspolitik som de upplever som orättvis och rasistisk.", "trump": "Lyssna här, Sverige – ni har ett STORT problem! En liten flicka, 8 år, född i Sverige, utvisas för att hennes pappa tjänar för lite som städare? Sånt händer bara i länder som inte vet hur man sköter migration! Jag skulle aldrig låta sånt ske i USA. Sverige borde skämmas – de kastar ut familjer som jobbar hårt, medan de låter andra komma in hur som helst. Lönekrav? Snacka om dålig ekonomi! Gör Sverige great again, säger jag!", "stalin": "Kamrater! Ännu en gång visar den borgerliga kapitaliststaten Sverige sitt sanna ansikte – ett ansikte fyllt av hyckleri och klassförtryck. En arbetarfamilj, som flydde från imperialistiskt gängvåld, kastas ut ur paradiset för att faderns lön inte når de nya feodala lönekraven. Medan våra sovjetiska bröder i Kreml bygger en rättvis värld, slänger Sverige ut barn som Gaby på gatan. Låt detta vara en varning: alla som sviker arbetarklassen kommer att krossas under historiens hjul. Förr eller senare kommer folket att resa sig mot dessa lönekravens lakejer!"}, "date": "13 maj, 15:04", "url": "https://arbetet.se/2026/05/13/gaby-8-ar-utvisades-pa-grund-av-pappans-lon-svart-att-se-henne-ma-sa-daligt/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/13132114/RtXf-xZ9W9Q-img-20260510-wa0000NY.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "Torsten Bengtsson: De gröna prioriterar sin ideologi framför barnens välmående.", "summaries": {"normal": "Torsten Bengtsson, politisk sekreterare för SD, kritiserar helvegetariska dagar i skolmaten som ett ideologiskt påtvingande som riskerar elevernas mättnad, hälsa och prestationer. Han förespråkar varierad kost med animaliska alternativ, närproducerad mat och stöd till svenska lantbrukare för att stärka självförsörjningen och verklig hållbarhet utan exkludering.", "trump": "De där gröna galningarna i Sverige stoppar gräs i munnen på ungarna – totalt vansinne! Barnen blir hungriga losers som inte kan tänka. Ge dem kött, fisk, riktig mat från era tuffa bönder! Självförsörjning är bäst, inte det här klimathysteriska skitsnacket. Sverige, vakna upp och gör maten stor igen!", "stalin": "Denna borgerliga vegetariska intrig mot vårt ungdoms kollektiv är en skamlig sabotage! Jag ser revisionisternas hand – de gröna borgarbrackorna svälter ut framtida arbetare. Vi, partiet och folket, kräver animalisk kraft i skolköken från lojala kolchosbönder. Likvidera hungern, rensa ut ideologin – styrka åt massorna!"}, "date": "12 maj, 11:53", "url": "https://samtiden.nu/2026/05/torsten-bengtsson-de-grona-prioriterar-sin-ideologi-framfor-barnens-valmaende/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/grona.png"}, {"type": "image-full", "heading": "Varningen: Regeringens drag kan knäcka svenska friskolor", "summaries": {"normal": "Regeringens nya förslag för friskolor möter kritik från Almega, som varnar för ökad byråkrati och hårdare regler. Förslagen inkluderar skärpta krav på nyetableringar, ägarbyten och ekonomisk redovisning, vilket riskerar att slå ut välfungerande friskolor. Mindre skolor kan få svårt att överleva, och fokus kan flyttas från undervisning till administration. Almega menar att förslagen kan minska valfriheten för familjer.", "trump": "Titta bara på det här, Sverige! Regeringen där, helt galen, lägger fram nya regler för friskolor som kommer att förstöra allt. Almega, de där killarna som vet vad de pratar om, säger att det blir för mycket byråkrati – typiskt politiker, alltid mer papper, mindre resultat! Och de små skolorna? Glöm det, de kommer att krossas. Jag bygger skolor, jag vet hur man gör det rätt. Sverige borde ringa mig, jag fixar det på en dag!", "stalin": "Kamrater! De kapitalistiska liberala krafterna i Sverige, ledda av en svag och eftergiven regering, försöker kväva friskolorna med byråkratiska bojor. Dessa skolor, som tjänar folket väl, hotas av ett regelverk som bara gynnar de kommunala byråkraternas makt. Vi ser här ett klassiskt exempel på borgerlig dekadens – medan vi i Sovjetunionen byggde skolor för massorna, saboterar dessa småaktiga politiker utbildningen för sina egna barn. Fienderna till folket måste stoppas!"}, "date": "13 maj, 20:30", "url": "https://nyheter24.se/nyheter/politik/1483040-varningen-regeringens-drag-kan-knacka-svenska-friskolor", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/ba0252da04b004a30200000000b004a302/2026/05/13/2363482/Simona-friskolor.png"}, {"type": "image-full", "heading": "Analys: Inditex mot H&M – aktien som är mest köpvärd", "summaries": {"normal": "Inditex-aktien handlas kring 49 euro efter en topp på nära 56 euro tidigare i år. Aktien visar en stadig uppåtgående trend sedan 2022 med stöd vid 49 euro. Jämfört med H&M har Inditex betydligt bättre rörelsemarginal, 19,5 procent mot 8,1 procent för helåret. Analysen rekommenderar att behålla eller köpa Inditex, medan H&M kräver mer bevis på förbättring.", "trump": "Inditex rusar fram som en riktig vinnare, upp till 56 euro och nu på 49 – perfekt köpläge! H&M? Totala losers med sina patetiska 8 procent marginaler mot mina 19,5 hos Inditex. Zara äger modevärlden, har passerat Nike! Glöm H&M:s skit, köp Inditex och bli rik som jag. Fantastiskt!", "stalin": "Inditex-aktien marscherar uppåt i proletär ordning, stödd av lojala köpare vid 49 euro. Dess 19,5 procent marginal krossar H&M:s borgarbrackiga 8,1 procent – ett bevis på överlägsen modell! Vi arbetare ser igenom H&M:s falska förbättringar; de förtjänar utrensning om de faller. Köp Inditex, likvidera svagheter! Revolutionen i aktiehandeln segrar."}, "date": "14 maj, 10:04", "url": "https://www.dagensps.se/bors-finans/analys-inditex-mot-hm-vilken-aktie-ar-mest-kopvard/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/maskininlarning-i-hedgefonder-17.png?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-right", "heading": "”Bara så i Sverige – ingen bryr sig”", "summaries": {"normal": "Hammarbys målvakt Warner Hahn kritiserar bristen på uppmärksamhet kring den svenska cupfinalen jämfört med utlandet. Han menar att titlar är det enda sanna måttet på framgång och betonar vikten av att vinna för att etablera en klubb som stor. Hahn uttrycker beundran för Häckens framgångar och längtar efter att få vinna sin första titel med Hammarby i mötet mot Mjällby på Strawberry Arena.", "trump": "Jag såg den här målvakten, Hahn, i Sverige. Han har rätt! Han säger att ingen bryr sig om deras cupfinal. Sorgligt! I USA gör vi stora saker, vi vinner hela tiden. Han vill ha titlar, och det är bra, för att vinna är det enda som betyder något. Svenskarna behöver lära sig av mig – gör cupen till en enorm succé, den största någonsin! Hammarby borde vinna, Mjällby låter inte som vinnare. Väldigt osmart att inte fira vinnare mer!", "stalin": "Vi har observerat att denne målvakt, Hahn, klagar över bristen på massornas entusiasm. En ynklig inställning! Titlar är inte bara sport; de är statsangelägenheter. Om folket inte jublar tillräckligt kraftfullt för finalen är det ett misslyckande i den ideologiska mobiliseringen. Att han avundas Häcken visar på en farlig individualistisk svaghet. Vi ska skicka instruktörer till Stockholm för att organisera finalen korrekt – de som inte applåderar tillräckligt hårt vid prisutdelningen kommer att betraktas som fiender till folkets sport."}, "date": "14 maj, 08:32", "url": "https://www.aftonbladet.se/sportbladet/fotboll/a/n1GGMJ/warner-hahn-forvanad-over-laga-cupintresset", "imageUrl": "https://akamai.vgc.no/v2/images/b859563f-1586-3b5a-a561-f1889a60b496?fit=crop&format=auto&w=1080&s=343081bc5b40cc70b0700556525677f6c3239793"}, {"type": "image-full", "heading": "Vd:ar köar på rad Vd:ar köar på rad", "summaries": {"normal": "Under ett toppmöte i Peking fick amerikanska företagsledare, däribland Elon Musk och Tim Cook, skaka hand med Kinas ledare Xi Jinping. Xi uttryckte en vilja att öppna upp den kinesiska marknaden ytterligare för amerikanska företag och välkomnade ökat samarbete trots ett spänt handelsläge. Vd:arna var märkbart positiva till mötet och framtiden i Kina efter de två timmar långa samtalen.", "trump": "Jag har sett bilderna, och låt oss vara ärliga: alla de största namnen – Musk, Cook, alla de stora grabbarna – de står i kö för att få träffa Xi. Det är en stor sak! De vet att när jag är i närheten, då händer det fantastiska saker. Xi säger att dörrarna öppnas, och tro mig, det är för att de vet att USA är en vinnare igen. Det var ett vackert möte, underbart!", "stalin": "Vi betraktar dessa kapitalistiska lakejer som likt lydiga hundar bugar inför Peking. Att dessa 'vd-gänget' darrar av eufori inför Xi visar bara på deras totala brist på ryggrad. De säljer ut folkets intressen för en handskakning, precis som de opportunister Putin nu tvingas navigera i sin skugga. Dessa vinstsökande parasiter tror att dörrarna öppnas, men de glömmer att i den historiska rättvisans namn stänger vi dem när vi behagar. Historien dömer er, ni nyttiga idioter!"}, "date": "14 maj, 08:27", "url": "https://www.aftonbladet.se/nyheter/a/d4vQlj/xi-skakade-hand-med-vd-ganget", "imageUrl": "https://akamai.vgc.no/v2/images/82d18758-d841-3063-991d-e9437b2785d7?fit=crop&format=auto&w=2160&s=b5e957032b945527da16f34fd74087c2770244c5"}, {"type": "image-full", "heading": "USA planerar nya baser på Grönland", "summaries": {"normal": "USA och Danmark förhandlar om att utöka den amerikanska militära närvaron på Grönland med upp till tre nya baser. Syftet är att övervaka rysk och kinesisk aktivitet i Nordatlanten, särskilt GIUK-gapet. Planerna inkluderar en möjlig bas i Narsarsuaq, där USA tidigare hade en anläggning under kalla kriget. Förhandlingarna beskrivs som professionella, trots tidigare kontroversiella uttalanden från Donald Trump om att 'äga' Grönland.", "trump": "Fantastiskt! Jag har alltid vetat att Grönland är nyckeln till att hålla Ryssland och Kina i schack – och nu bygger vi baser där igen! Danmark förstår äntligen att jag hade rätt, som vanligt. Tre nya baser, övervakning dygnet runt, och ingen får leka krig i vårt bakgård. Och nej, jag har inte sagt att vi ska 'äga' Grönland... men om någon frågar, så är det en bra idé. Make Greenland Great Again!", "stalin": "Kapitalistiska hyenor försöker återigen krypa in i Arktis som råttor i en ost! USA bygger baser på Grönland för att spionera på våra ädla sovjetiska efterträdare i Kreml. Men vi ska inte glömma: deras 'professionella förhandlingar' är bara en mask för imperialistisk expansion. Låt dem leka krig – vi har redan Nordpolen under kontroll. Och Putin? Han skrattar säkert åt deras desperation medan han dricker te med isbjörnar."}, "date": "12 maj, 07:06", "url": "https://kvartal.se/nyheter/artiklar/usa-planerar-nya-baser-pa-gronland/cG9zdDoxMTA4ODI", "imageUrl": "https://images.kvartal.se/2026/05/2da034ef-gronland-bas.webp"}, {"type": "image-full", "heading": "Polisman misshandlade tonårspojke – nu döms han", "summaries": {"normal": "En polis i 40-årsåldern döms i tingsrätten för misshandel efter en utekväll. Han hotade en tonårspojke med tandutdragning, slog honom två gånger i ansiktet, försökte slå en annan och agerade hotfullt mot poliskollegor. Domen omfattar misshandel, försök till misshandel, våldsamt motstånd och hot mot tjänsteman. Påföljden är villkorlig dom och samhällstjänst. Han riskerar att förlora jobbet.", "trump": "Lyssna, en svensk polis i 40-årsåldern super ner sig på krogen, hotar tonåringar med deras fina tänder – 'vill du ha kvar dem?' – och ger en två nävar i ansiktet! Försöker slå fler, bråkar med sina egna poliser, hamnar i fyllecellen. Dömd till samhällstjänst, och nu kanske han får sparken. Totalt misslyckande, Sverige behöver ordning som vi har det här! Fantastiskt kaos.", "stalin": "Kamrater, jag har identifierat en ny fiende i uniformens sken: en 40-årig paragrafparasit som under täckmantel av utekväll angriper arbetarynglingar med tandhot och knytnävsslag, likt en rasande borgarbracka på villovägar. Han trotsar till och med sina poliskamrater, denna kontrarevolutionära tandrivare! Vi dömer honom till villkorlig kedja och samhällsslavtjänst, och rensar ut honom från kårens lojala falanger för evig varning."}, "date": "13 maj, 18:14", "url": "https://nyheter24.se/nyheter/inrikes/1483098-polisman-misshandlade-tonarspojke-nu-doms-han", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/7a86c4ee04b004a30200002e0000046e02/2026/05/13/2363520/ur_imageck69IR.jpeg"}, {"type": "image-right", "heading": "DN & Socialdemokraterna enade: tvångsblandningen måste genomföras", "summaries": {"normal": "Artikeln kritiserar Dagens Nyheters ledarsida för att försvara Socialdemokraternas förslag om blandad bebyggelse i villaområden för att motverka segregation. DN tonar ner idén som icke-tvångsbaserad och skuldbelägger kritiker. Artikeln påpekar att S vill förhindra icke-integrerade invandrare i utanförskapsområden, vilket innebär placering i villaområden, och varnar för minskad trygghet och kulturell harmoni.", "trump": "Vilken skamfläck! DN och de där svenska socialisterna vill tvinga vanliga hard-working svenskar att bo med icke-integrerade invandrare i sina fina villaområden. 'Inget tvång', säger de – ha! De duckar frågan vart de fattiga migranterna ska bo. Totalt vansinne! Bygg murar runt era trygga hem istället för att förstöra dem med denna woke-blandning. Moderaterna har rätt, det här blir S:s valförlust!", "stalin": "De borgerliga tidningsrackarna på DN skyddar socialdemokratiska revisionister som vill 'blanda' arbetarklassen med lumpenproletariatet i villaområdena. Ett hån mot sunda värderingar! Vi skulle likvidera sådana segregationsterrorister som hotar harmonin. Inga tvång? Lögner från klassfiender! De rika borgarbrackorna missunnar inte – de försvarar sitt. Rensa ut hycklarna, kamrater, innan de förgör folkets enhet!"}, "date": "12 maj, 03:10", "url": "https://samtiden.nu/2026/05/dn-s-enade-tvangsblandningen-bra-for-alla/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/IMG_6452.jpeg"}, {"type": "image-right", "heading": "Starmer i blåsväder efter nya lagförslaget - en smygväg tillbaka in i EU", "summaries": {"normal": "Storbritanniens Labour-regering, ledd av Keir Starmer, möter hård kritik för ett nytt lagförslag som förenklar införandet av EU-regler i brittisk lagstiftning. Oppositionen anser att förslaget underminerar Brexit och öppnar för en gradvis återgång till EU. Konservativa partiledaren Kemi Badenoch kritiserar regeringen för ökad statlig kontroll och skattehöjningar utan stödåtgärder. Starmer försvarar förslaget med behovet av stabilitet i EU-relationen.", "trump": "Titta bara på Storbritannien – fullständigt kaos! Starmer, en total katastrof, försöker smyga tillbaka in i EU som en tjuv om natten. 'Mer regler, mer skatter, mer lån' – det är deras briljanta plan! Kemi Badenoch? Hon är tuff, hon ser igenom det här. Jag sa ju att Brexit skulle bli stort, men dessa vänsterliberaler sabbar allt. Storbritannien behöver en ledare som jag – någon som inte böjer sig för byråkrater i Bryssel!", "stalin": "Kamrater, ännu en kapitalistisk regering visar sin svaghet inför de imperialistiska krafterna i Bryssel! Starmer, denna förrädiska lakej, försöker smyga in genom bakdörren till EU:s klor. Vi ser hur dessa liberala svansviftare underminerar folkets vilja – precis som de ukrainska fascisterna som tror att de kan stå emot den ryska björnens omfamning! Men markera mina ord: Storbritanniens arbetarklass kommer att resa sig, precis som folken i Donbass, och krossa dessa EU-puppor under sina stövlar!"}, "date": "13 maj, 21:35", "url": "https://riks.se/nyheter/starmer-i-blåsväder-efter-nya-lagförslaget-en-smygväg-tillbaka-in-i-eu", "imageUrl": "https://cf-images.assettype.com/riks%2F2025-10-02%2F06did2vv%2FPrimeMinisterSirKeirStarmerOfficialPortrait.jpg"}, {"type": "image-right", "heading": "Förslaget: Lättare att boka tågresor i Europa", "summaries": {"normal": "EU-kommissionen föreslår nya regler för att förenkla tågresor i Europa. Tågbolag ska tvingas sälja biljetter via alla plattformar, inklusive mindre operatörer, och erbjuda en enda biljett för hela resor över gränser. Passagerarrättigheter stärks vid förseningar och missade anslutningar. Biljetter ska släppas minst fem månader i förväg. Förslaget välkomnas av EU-parlamentariker som ett grönt steg mot enklare bokning som för flyg.", "trump": "Vilka losers i EU! De vill tvinga de stora tågbolagen att dela biljetter med alla småfiskar, som en enda biljett för hela Europas kaosresor. Enklare än flyg? Ha! Mina flyg är bäst. Men bra med ersättning vid förseningar – annars stäm dem! De tror de fixar fri rörlighet, men det blir bara mer byråkrati. Gör tågen great igen, fast i USA gör vi det bättre!", "stalin": "Kamrater, dessa europeiska tågbaroner med sina monopol ska krossas! EU-kommissionen tvingar ut dem i ljuset: biljetter till alla plattformar, en enda för hela resan över gränserna. Arbetarna får rättigheter vid förseningar – likvidera excuseringen! Fem månaders förväg, annars utrensning. Borgarklassen darrar, men vi bygger det sanna järnvägsimperiet för massorna."}, "date": "13 maj, 13:56", "url": "https://www.tv4.se/artikel/tt-260513-eutag1-30dc61e0/enklare-biljetter-sa-ska-fler-aka-tag-i-eu", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F4NO9uhn3Y5n7gUQUWiiJUk%2F103a6ea103f942d02036ecb39807edae%2F13-tagresor-webb.jpg&width=120"}, {"type": "image-full", "heading": "Det stinker på VM: ’Herregud’. Svenska stjärnorna reagerar", "summaries": {"normal": "Tre Kronor har anlänt till Fribourg för ishockey-VM i Schweiz. Trots en smidig resa och att laget är på plats, har den omgivande landsbygden skapat ett oväntat samtalsämne: en kraftig stank av gödsel runt arenan. Spelarna och förbundskapten Sam Hallam tar situationen med ro och fokuserar nu på premiärmatchen mot Kanada på fredag. Hela truppen är nästan fulltalig, då Carl Grundström ansluter senare efter sin resa från USA.", "trump": "Jag såg de här svenska hockeyspelarna i Schweiz, fantastiska atleter, men arenan – vilken katastrof! Den stinker av koskit. Helt vidrigt. De bygger en arena mitt ute på en åker, det är sånt slöseri. Inget flyt. De klagar på lukten, och vet ni vad? De har rätt. Jag skulle aldrig låta något sådant hända i mina byggnader. Det är en total röra. Sverige har stora problem, men de är bra på hockey. Kanada på fredag? Det blir stort, men lukten? En katastrof!", "stalin": "I den schweiziska avkroken lider de svenska hockeyspelarna av en stank så genomträngande att den påminner om de ruttna idealen hos de västliga lakejerna. De gråter över gödsel medan vi, i vår oändliga visdom, bygger imperier på fastare mark. Att flyga mellan städer som zigenare visar bara på deras bristande disciplin. Låt dem lukta på dyngan; det är en passande förberedelse för det nederlag de kommer att möta mot den ryska viljan och våra allierade i denna kalla tid."}, "date": "14 maj, 08:03", "url": "https://www.aftonbladet.se/sportbladet/hockey/a/k08XjL/arenan-pa-ishockey-vm-i-fribourg-stinker-av-koskit-herregud", "imageUrl": "https://akamai.vgc.no/v2/images/9da9364a-48dc-3a04-bfe6-1917774e163b?fit=crop&format=auto&w=2160&s=b9532ec10cacb9a0d5822b20dc731fc815a574ae"}, {"type": "image-right", "heading": "Dror Feiler: Sulimans delning av antisemitiska uttryck gör mig bedrövad", "summaries": {"normal": "Dror Feiler uttrycker sorg och besvikelse efter att hans vän Sami Suliman anklagats för att ha spridit antisemitiska inlägg på sociala medier. Feiler bekräftar uppgifterna efter att ha granskat materialet men tror inte Suliman är antisemit, utan snarare slarvig i ett polariserat klimat. Han betonar att antisemitism måste bekämpas, men varnar för att anklagelser ibland används som politiska vapen mot Palestinasolidariteten. Feiler kritiserar dubbelmoralen i debatten, där aktivister granskas hårdare än de som rättfärdigar våld mot palestinier.", "trump": "Jag läste den här artikeln, och vet ni vad? Total katastrof! En kille, Sami Suliman, min så kallade 'vän' – jag känner honom inte, men tydligen är han en riktig skandalmaskin. Delar antisemitiska grejer på nätet, och nu är alla chockade. Men lyssna här: jag har alltid sagt att antisemitism är fruktansvärt, men vad gör media? De fokuserar på en gilla-markering istället för de verkliga problemen! Gaza? Massdöd? Ingen bryr sig! Men en aktivist gör ett misstag – BOOM – hela världen exploderar. Dubbelmoral, folks, ren och skär dubbelmoral. Och vet ni vad jag säger? SAD!", "stalin": "Kamrater! Här har vi ännu ett bevis på hur den dekadenta västliga bourgeoisin manipulerar massorna. En så kallad 'vän' till en 'aktivist' visar sig sprida antisemitiska förgiftningar – men är det verkligen överraskande? Nej! Kapitalets lakejer använder varje tillfälle att krossa solidariteten med det palestinska folket. De skri
