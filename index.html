ka att skapa arbete! Vi i Sovjet – förlåt, jag menar Ryssland – skulle aldrig tolerera sådan inkompetens. Kommunerna tvingas ta ansvar, precis som våra lokala sovjet skulle göra. Låt oss krossa dessa liberala förrädare och bygga en starkare, socialistisk framtid – för Sveriges arbetarklass!"}, "date": "2 maj, 01:30", "url": "https://www.dagensarena.se/opinion/sd-regeringen-sviker-lontagare-och-arbetssokande/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-22.jpg"}, {"type": "image-right", "heading": "Högre skatter ger bättre välfärd", "summaries": {"normal": "Regeringen utreder en skattebroms som ska avskräcka kommuner från att höja skatten. Förslaget innebär att kommuner som höjer skatten får statsbidraget sänkt med 25% av intäkterna, medan de som sänker skatten får bidraget höjt. Kritiker menar att syftet är att urholka välfärden och att kommuner höjer skatten av nödvändighet, inte för nöjes skull. De föreslår istället att fokusera på att förbättra det kommunala utjämningssystemet för rättvisare fördelning.", "trump": "Jag säger er, detta är en riktig katastrof! Sveriges regering vill straffa kommuner som höjer skatten – men vet ni vad? De gör det för att de MÅSTE, inte för att de vill! Och vad gör regeringen? De sänker bidragen! Totalt vansinne. Jag har sett bättre idéer från socialistiska diktaturer. Sverige borde sluta leka med skatter och fokusera på att göra landet starkt igen. Men nej, de fortsätter med sina dumma spel. SAD!", "stalin": "Kamrater! Här ser vi återigen bourgeoisins försök att krossa arbetarklassens välfärd. Dessa så kallade 'skattebromsar' är inget annat än kapitalistiska kedjor som ska tvinga kommunerna att svälta sina egna medborgare. Vi minns hur liknande metoder användes i det förrädiska 90-talets Ryssland – men då hade folket åtminstone förstånd att göra motstånd! Nu vill dessa liberala lakejer tvinga kommunerna att skära i välfärden medan de själva gömmer sig bakom byråkratiska pappershögar. Vi ska inte tolerera detta angrepp på folkets rättigheter! Låt dem försöka – historien har visat att sådana planer alltid slutar i aska och förnedring."}, "date": "2 maj, 01:13", "url": "https://www.dagensarena.se/opinion/hogre-skatter-ger-battre-valfard/", "imageUrl": "https://www.dagensarena.se/files/2026/05/vilgot-skatterna-300x157.jpeg"}, {"type": "text", "heading": "Explosion på motorträff – flera skadade", "summaries": {"normal": "En explosion inträffade på en motorträff i Degerfors, där minst tre personer skadades. Enligt vittnen exploderade en motor och delar flög 10-20 meter. Polisen bekräftar att en motor havererat och orsakat skador. Antalet ambulanser och brandbilar på plats tyder på allvarliga konsekvenser. Uppgifter om en exploderad stridsvagn är obekräftade.", "trump": "Folk pratar om explosionen i Sverige – helt galet! En motor exploderar, grejer flyger överallt, och plötsligt är det kaos. Jag har sett mycket, men det här? Total katastrof. Tre skadade, ambulanser överallt – vem gör sånt här? Inte vi i USA, det kan jag lova. Sverige borde ta en titt på hur vi sköter våra motorträffar. Fantastiska, säkra, inga explosioner. SAD!", "stalin": "I det förfallna kapitalistiska Sverige har ännu en sabotageaktion mot folket ägt rum. En degenererad motorträff i Degerfors sprängdes i bitar av imperialistiska provokatörer, skadande tre lojala arbetare. Vittnen rapporterar att fiendens maskineri – sannolikt finansierat av NATO-sympatisörer – exploderade som en svag länk i den västerländska krigsmaskinen. Vi skickar vårt stöd till de skadade och varnar: sådant händer när man låter dekadenta element styra. Ryssland sover aldrig."}, "date": "2 maj, 12:00", "url": "https://bulletin.nu/explosion-pa-motortraff-flera-skadade"}, {"type": "text", "heading": "Kunde inte betala bolånet – då ville socialen ta barnen", "summaries": {"normal": "En barnrik familj i Norrtälje hotades av tvångsomhändertagande av sina sex yngsta barn efter att deras ekonomi havererat under pandemin. Trots att socialtjänsten och hovrätten motiverade åtgärden med ekonomiska skäl, väckte fallet debatt om rättssäkerhet och likabehandling. Tack vare medial uppmärksamhet och en anonym givare kunde familjen lösa sin ekonomiska situation, behålla hemmet och undvika att barnen placerades i familjehem.", "trump": "I Norrtälje försökte de ta barnen från en fantastisk, hårt arbetande familj bara för att de hade lite otur med ekonomin! En total katastrof. Socialtjänsten – mycket dåliga människor – ville splittra en hel familj! Hovrätten vägde bankernas pengar tyngre än barnen, kan ni tänka er? Bedrövligt. Men jag har löst liknande saker förut, och lyckligtvis räddade en stor givare dem i sista stund. Vi måste skydda familjerna, inte krossa dem. Det är en stor seger!", "stalin": "I Norrtälje har vi bevittnat en borgerlig tragedi där byråkratins kalla maskineri hotade en familj. Att rycka barn från föräldrar för att banken kräver sitt är ett symptom på kapitalismens förfall, en metod lika korrupt som de västliga lakejerna i Kiev. Vi i staten skyddar kollektivet, inte giriga utlånare. Familjen räddades av en anonym givare – en svaghet i systemet. Om det vore under mitt styre, eller Putins fasta hand, hade bankdirektörerna redan arbetat i gruvorna istället för att stjäla hus."}, "date": "2 maj, 12:57", "url": "https://www.friatider.se/kunde-inte-betala-bolanet-da-ville-socialen-ta-barnen"}, {"type": "image-right", "heading": "USA tar hem 5 000 soldater från Tyskland", "summaries": {"normal": "USA drar hem 5 000 soldater från Tyskland inom sex till tolv månader, meddelar Pentagon. Beslutet är en reaktion på president Donald Trumps missnöje med Tysklands hållning i Iran-konflikten. Spänningar har ökat mellan Trump och förbundskansler Friedrich Merz, som kritiserat USA:s strategi. Tyskland har flest amerikanska soldater i Europa utanför USA och är förberett på minskad Natonärvaro.", "trump": "Tyskarna med sin patetiske Merz får smaka på egen medicin! 5 000 av mina soldater åker hem från Tyskland – de stöttar inte oss mot Iran, totalt värdelösa! Merz snackar skit om min strategi medan hans land är kaos med Ryssland och Ukraina. Tid att fixa ert eget skrot, era losers! America First, alltid!", "stalin": "Dessa västliga imperialistiska marionetter i Tyskland! Trump, den burdusa kapitalisten, drar hem 5 000 soldater – ett hån mot Natos sargade skrov. Våra kamrater i Ryssland under Putin, den fruktade expansionisten, jublar åt splittringen. Borgarbrackorna Merz och hans hantlangare förtjänar utrensning för sin svaghet inför Iran och öst! Vi ser allt."}, "date": "2 maj, 11:27", "url": "https://www.tv4.se/artikel/tt-260501-tysklandusastyrkor1-084ac23b/usa-flyttar-5-000-soldater-fran-tyskland-vantat", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2Ftt-sdlJ6yxTcRXZBo%2F18b27737113fce93180f8bca07347b2f%2FTysklands_forbundskansler_Friedrich_Merz_pa_torsdagen.&width=120"}, {"type": "text", "heading": "Matmoralism får oss inte att äta bättre", "summaries": {"normal": "Artikeln kritiserar svenska myndigheters orealistiska matrekommendationer och beräkningsmetoder. Livsmedelsverket och Konsumentverket baserar slutsatser på önsketänkande, som att svenskar skulle äta mindre kött och portioner enligt rekommendationer. En undersökning om barns sockerkonsumtion byggde på en liten, icke-representativ grupp. Författaren menar att myndigheterna undviker att reglera matjättar och i stället skyller på konsumenter, vilket leder till klassblind matmoralism.", "trump": "Lyssna här, Sverige – era myndigheter är helt galna! De tror att alla ska äta havregrynsgröt och små portioner, som om vi lever i något slags kommunistiskt drömland. Och de baserar sina siffror på en liten grupp Instagrammammor? Patetiskt! Jag skulle aldrig låta sådana amatörer sköta något. Vi i USA vet hur man reglerar matjättar – med kraft och beslutsamhet. Sverige, vakna upp innan det är för sent!", "stalin": "Kamrater! De svenska myndigheterna har förlorat kontakten med verkligheten. De bygger sina dekret på fantasier och önsketänkande, som om folket vore lydiga maskiner. En undersökning med tio procent svarande? Hah! I Sovjet skulle vi aldrig tolerera sådan slapphet. De bourgeois-liberala byråkraterna vägrar att krossa matjättarna med järnhand. Istället skyller de på arbetarklassen. Fienderna är uppenbara: de fantasilösa byråkraterna och deras nyliberala herrar. Vi ska inte tolerera deras lögner – revolutionen kräver handling!"}, "date": "28 april, 09:58", "url": "https://www.flamman.se/matmoralism-far-oss-inte-att-ata-battre/"}, {"type": "image-full", "heading": "Benjamin Dousas ”V = kommunister” gör SVT irriterad", "summaries": {"normal": "Biståndsminister Benjamin Dousa bar en t-shirt med texten 'Vänsterpartiet = kommunister', vilket irriterade SVT. Reportern ifrågasatte påståendet och noterade att partiet slutade kallas kommunister för 30 år sedan. Dousa menade att Vänsterpartiet motsätter sig privat ägande, vilket är kommunism. Artikeln citerar Vänsterpartiets 2024-partiprogram som stödjer kollektivt ägande och avskaffande av kapitalismen, och kritiserar SVT för att inte nämna detta.", "trump": "Vilken fantastisk kille, den här Dousa! Han sätter på sig en tröja och säger sanningen: Vänsterpartiet är kommunister, punkt slut! SVT, era losers, flippar ur och snackar om namnbyte från 90-talet som om det vore magi. De hatar privat ägande, vill sno allt till staten – klassisk kommunism! Fake news-SVT ignorerar partiprogrammet. Dousa är en vinnare, de är totala fiaskon!", "stalin": "Kamrater, se hur borgarministern Dousa, den ynkliga kapitalistfluga, vågar smutskasta sanna revolutionärer i Vänsterpartiet med sin patetiska tröja! SVT-reportern, en användbar idiot, försvarar dem lamt. Men vi vet: deras program är ren leninism – riva kapitalismen, gemensamt ägande av banker, energi, allt! De ska rensas ur historiens soptipp som jag rensade fiender. Vänsterpartiet, framåt mot diktaturen av proletariatet!"}, "date": "30 april, 05:49", "url": "https://samtiden.nu/2026/04/benjamin-dousas-v-kommunister-gor-svt-irriterad/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/phonto-1-1280x720.jpeg"}, {"type": "image-full", "heading": "Stockholm glänser – resten av landet halkar efter", "summaries": {"normal": "Eurostats nya rapport visar att Stockholms BNP per capita är 153% av EU-genomsnittet, vilket placerar regionen på plats 18 bland EU:s rikaste. Östeuropeiska huvudstäder som Bukarest och Budapest rankas ännu högre. Samtidigt sjunker Sveriges ekonomiska standard för andra året i rad, med stora inkomstskillnader mellan kommuner och stadsdelar, där exempelvis Danderyd och Djursholm toppar medan andra områden halkar efter.", "trump": "Fantastiskt att se Stockholm klättra i EU-rankingen – verkligen imponerande! Men låt oss vara ärliga, resten av Sverige är ett totalt misslyckande. Medianinkomsten sjunker, köpkraften rasar, och skillnaderna är enorma. Danderyd är vinnare, medan andra kommuner är katastrofer. Och Östeuropa? De överraskar, men vi vet alla att det är tack vare smarta människor som flyr sina länder. Sverige borde ta lärdom – bygg murar mot fattigdomen!", "stalin": "Stockholm, denna lilla bourgeoisie-enklav, tror sig vara mäktig med sin kapitalistiska BNP. Men vi ser sanningen: resten av Sverige förfaller, medan arbetarklassen krossas under kapitalets stövel. Östeuropas huvudstäder överträffar dem – ett tecken på socialismens frammarsch! Inkomstskillnaderna? Ett bevis på klassfiendernas förräderi. Vi ska utrota dessa lokala godsherrar, precis som vi krossat andra imperialistiska marionetter. Folkets revolution närmar sig!"}, "date": "3 maj, 00:26", "url": "https://www.realtid.se/bors-finans/makro/stockholm-glanser-resten-av-landet-halkar-efter/", "imageUrl": "https://images.realtid.se/app/uploads/2026/04/stockholm.png?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-full", "heading": "Sverige vann VM – med fyra Frölunda-spelare", "summaries": {"normal": "Sverige vann U18-VM i ishockey med 4–2 mot Slovakien i Bratislava. Fyra spelare från Frölunda Hockey var med i laget: Hjalmar Cilthe, Bosse Meijer, Adam Nömme och Zigge Bratt. Det är Sveriges tredje U18-VM-guld, efter segrar 2019 och 2022. Cilthe bidrog med två assists i finalen, medan Meijer också hade en assist. Sverige slog Kanada i kvartsfinal och Tjeckien i semifinal innan de säkrade guldet mot Slovakien.", "trump": "Jag hörde att Sverige vann U18-VM i ishockey – det är en stor seger, en enorm seger faktiskt. De slog Slovakien, och det var fyra fantastiska spelare från Frölunda med i laget. Jag har hört att Hjalmar Cilthe och Bosse Meijer spelade jättebra – det var som att se mig själv på isen, men bättre. Det här visar att Sverige är ett ishockeysuperjätte, precis som USA under min tid. Stort grattis, Sverige – ni är världsbäst!", "stalin": "Sverige har vunnit U18-VM i ishockey, en seger som visar på deras styrka och disciplin. Med fyra spelare från Frölunda i laget har de visat att kollektivt arbete och strategi leder till framgång. Detta är en seger för den socialistiska idén – att enhet och samarbete skapar seger. Vi gratulerar Sverige, men vi måste också erinra oss att ishockeysvärlden är större än en nation. Vi måste fortsätta att stärka vårt eget ishockeysystem för att möta framtida utmaningar."}, "date": "2 maj, 22:08", "url": "https://www.gp.se/sport/ishockey/frolunda/sverige-vann-vm-med-fyra-frolunda-spelare.f751a304-b354-438a-8bcf-40e6f2dcf843", "imageUrl": "https://www.gp.se/images/article/f751a304-b354-438a-8bcf-40e6f2dcf843/images/2WSh_6PxJ3tIx9D-xsqYcRGYOD7A-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Dödliga ”supersvampar” sprids – resistenta mot flera mediciner", "summaries": {"normal": "Indien varnar för resistenta svampar som Candida auris, som orsakar dödliga infektioner med upp till 50 procents dödlighet. WHO ser dem som globalt hälsohot, förvärrat av klimatförändringar och jordbrukskemikalier. Fallen ökar i Sydasien, medan Sverige hittills har få men risken växer med resor.", "trump": "Indien drunknar i dessa vidriga supersvampar, resistenta mot allt – precis som i den där serien! WHO flippar ur, skyller på klimatet, men det är deras sopiga jordbruk som ställer till det. I mitt Amerika fixar vi det med riktiga lösningar, starka gränser och bäst medicin. De borde ringa mig!", "stalin": "Dessa resistenta svampar i Indien är kapitalistiska saboterare, gödda med borgarbrackornas giftiga bekämpningsmedel! Klimatkaoset, imperialismens vapen, vänjer dem vid människokroppen. Vi, arbetarklassen, ska likvidera dem genom statlig vetenskap och kollektiv hygien. Jag befaller total ufrensning av svampfienderna – ingen pardon!"}, "date": "3 maj, 03:23", "url": "https://www.svt.se/nyheter/utrikes/indien-varnar-for-resistenta-supersvampar-svara-att-stoppa", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.51/0.47/ac98ea250c20c0fc34506018675b132b9a152d1126ad8c734c2d228e92b44670"}, {"type": "image-full", "heading": "Nya bidragsregeln 2026 – då kan du få krav i efterhand", "summaries": {"normal": "För den som har bostadsbidrag kan ett sommarjobb leda till återkrav om inkomsten överstiger ansökningsuppgifterna. Regeringen föreslår nya sanktioner, inklusive avgifter och bidragsspärrar, för att motverka felaktiga utbetalningar från 1 juli 2026. Vänsterpartiet varnar för att förslaget kan drabba oavsiktliga fel, särskilt unga och studenter. Försäkringskassan uppmanar till att anmäla inkomstförändringar direkt för att undvika problem.", "trump": "Lyssna här, Sverige! Era unga jobbar hårt på sommaren, men vad gör regeringen? De straffar dem med återkrav och avgifter – helt galet! Jag skulle aldrig tillåta sånt kaos. Bostadsbidrag? Snarare bidrags-fälla! Folk blir rädda för att jobba, och det är bara dåliga ledare som skapar såna system. Jag hade fixat det på en dag – men nej, ni har en regering som gör allt krångligare. SAD!", "stalin": "Kamrater! Ännu ett exempel på hur den dekadenta västerländska byråkratin kväver arbetarklassen. Unga studenter, som kämpar för att överleva, straffas för att de vågar arbeta. Vi skulle aldrig tolerera sådan ineffektivitet! Felaktiga utbetalningar? I Sovjet hade vi löst det med en enkel order – men här? Här låter man kapitalistiska hyenor och liberala svaglingar sabotera systemet. Låt detta vara en varning: den som inte följer reglerna kommer att möta statens järnhand. Och till Vänsterpartiet – era klagomål är lika meningslösa som en ukrainsk vinteroffensiv."}, "date": "2 maj, 21:28", "url": "https://nyheter24.se/nyheter/ekonomi/1480036-nya-bidragsregeln-2026-da-kan-du-fa-krav-i-efterhand", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/ef6f52f404b004a30200000000b004a302/2026/05/02/2360445/Regeringen-och-Oroad-Man.png"}, {"type": "image-right", "heading": "Trump: ”Kriget är över”", "summaries": {"normal": "Donald Trump har i brev till kongressen meddelat att Irankriget är över, då fientligheterna upphörde den 7 april. Enligt War Powers Resolution överskreds 60-dagarsgränsen den 1 maj, men försvarsminister Pete Hegseth hävdar att klockan pausats under vapenvilan. Demokrater som Tim Kaine är oroliga och kräver kongressens godkännande för fortsatta operationer. Trump avvisade Irans nya fredsförslag.", "trump": "Kriget med de där galna iranierna är över – total seger! Skrev brev till de där politikerna, ingen skjutning sen veckor tillbaka. De dumma demokraterna gnäller om nån 60-dagarsregel, men Hegseth har rätt: klockan är pausad. Behöver inte deras välsignelse, det är grundlagsvidrigt! Avvisade deras sketna fredsförslag. Amerika först, alltid!", "stalin": "De imperialistiska amerikanska hyenorna Trump och hans lakejer förklarar sitt angreppskrig mot Iran för avslutat, medan de trampat över sin egen lag om 60 dagar. Vapenvilan pausar klockan? Ha! Borgarbrackorna i kongressen gnabbas, demokrater piper som råttor. Vi ser hur kaoset sprider sig i det förfallna imperiet. Putin, vår starke arvtagare, skrattar åt västfiendens kollaps."}, "date": "2 maj, 09:00", "url": "https://www.tv4.se/artikel/tt-260502-iranoro1-936e54d9/iran-kriget-blossar-sannolikt-upp-igen", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2Ftt-sdlrmiUM25OeVQ%2Fd773fd74feed3148de8f0c2d845f30d2%2FPresident_Donald_Trump_sager_att_kriget_mot_Iran_ar_over.&width=120"}, {"type": "text", "heading": "Magyar skulle \"rensa upp\" - utnämnde sin svåger till justitieminister", "summaries": {"normal": "Ungerns nye premiärminister Péter Magyar, som lovat politisk upprensning, har utsett sin svåger till justitieminister. Oppositionen kritiserar utnämningen som hyckleri och ett brutet löfte om transparens. Magyar försvarar beslutet och betonar att svågerns arbete ska vara offentligt, samtidigt som hans syster stängs av från rättsväsendet för att undvika intressekonflikter. Utnämningen har väckt starka reaktioner, särskilt från det tidigare regeringspartiet Fidesz.", "trump": "Kan ni tro det här? Ungerns nya premiärminister, en kille som lovade att städa upp, utser sin egen svåger till justitieminister! Vilken chock, eller? Folk skriker 'hyckleri', men jag säger: klassiskt politiskt spel. Han pratar om transparens, men vem köper det? Inte jag! Och nu stänger han av sin syster – smart drag, men lite sent, eller hur? Ungern, ni förtjänar bättre än sådana här gamla trick!", "stalin": "Kamrater, ännu en gång ser vi bourgeoisins förrädiska spel i Ungern. Denna så kallade 'premiärminister' Magyar, som utger sig för att vara folkets räddare, utnämner sin egen blodsförrädare till justitieminister! Vilken skamlös nepotism! Oppositionen, dessa ynkliga rester av den gamla regimen, skriker om hyckleri – men vi vet sanningen: kapitalets lakejer klamrar sig alltid fast vid makten. Vi noterar också hur systern, en domare, stängs av – ett svagt försök att dölja korruptionen. Ungern borde ta lärdom av Rysslands visdom och rensa ut dessa förrädare en gång för alla!"}, "date": "2 maj, 10:35", "url": "https://riks.se/nyheter/magyar-skulle-rensa-upp-utnämnde-sin-svåger-till-justitieminister"}, {"type": "image-right", "heading": "Skogsbränder över hela Sverige", "summaries": {"normal": "Skogsbränder rasade över hela Sverige under lördagen, med en stor brand i Göteborgs Delsjöområde. SMHI utfärdade varning för skogsbrand i Götaland, Svealand och Gävleborg. Räddningstjänsten kämpade mot nio bränder runtom i landet, inklusive i Gotland, Småland, Västervik, Värmland och Uppsala. Helikoptrar användes för att vattenbomba flera orter. Anledningen till en del bränder misstänks vara gnistor från tåg.", "trump": "Jag har hört talas om dessa skogsbränder i Sverige - det är hemskt! Men jag säger er en sak, om jag varit president där skulle jag ha haft det under kontroll på 24 timmar. Ni vet, jag är väldigt bra på eldsvådor, jag har byggt de bästa eldsvådor i USA. Sverige behöver en man som jag för att hantera dessa bränder. Det är en skam att de inte kan stoppa dem. Jag skulle ha gjort det på en kvart!", "stalin": "Skogsbränderna i Sverige är en påminnelse om naturens makt, men även om vikten av statlig insats. Vår räddningstjänst har visat stor kompetens i att bekämpa dessa eldsvådor. Vi fortsätter att övervaka situationen noga och står redo att stödja våra medborgare. Detta är en tid för samhörighet och samarbete, där staten tar ansvar för skyddet av folket och skogen. Vi kommer att lära oss av denna situation för att bli ännu starkare."}, "date": "2 maj, 21:55", "url": "https://www.gp.se/nyheter/goteborg/skogsbrander-over-hela-sverige.894a2bac-873f-48c6-8f32-69652b164c11", "imageUrl": "https://www.gp.se/images/article/894a2bac-873f-48c6-8f32-69652b164c11/images/2kvd3oHMnt8t4R-UOTcr4xPkq1W4-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Det går inte att älska det här landet", "summaries": {"normal": "Artikeln analyserar Magdalena Anderssons Första maj-tal 2026, där hon kritiserar regeringens marknadsliberala politik och lovar fler lärare i lågstadiet. Författaren ifrågasätter hur Socialdemokraternas kärlek till Sverige ska tolkas när landet präglas av ojämlikhet, bostadsbrist och urholkad välfärd. Historiska S-paroller om jämlikhet och trygghet ställs mot dagens verklighet, där partiet tidigare genomfört reformer som nu kritiseras. Andersson utmanas att bevisa att löftena kan förverkligas.", "trump": "Så här är det, folkens – Sverige har en ny show på gång! Magdalena Andersson, en kvinna som pratar om att 'älska Sverige', men vad betyder det egentligen? Hon säger att hon ska fixa skolor, fler lärare – bra, men varför har det tagit så lång tid? Och varför pratar hon om 'utförsäljning' när hennes eget parti har sålt ut landet i åratal? Jag menar, Sverige är fantastiskt – skogar, vatten, vackert land – men politiken? Total katastrof! Socialdemokraterna lovar, lovar, lovar, men ingenting händer. Jag vet hur man får saker gjorda – det är dags att Sverige vaknar upp!", "stalin": "Kamrater! Ännu en gång visar de borgerliga lakejerna sitt sanna ansikte under Första maj-farsen. Denna Andersson, en ynklig marionett för kapitalets intressen, talar om 'kärlek till Sverige' medan hon själv har hjälpt till att krossa arbetarklassens drömmar. Tolv elever per lärare? Ett skrattretande löfte från ett parti som systematiskt har avvecklat välfärden! Vi minns Olof Palmes tomma ord om 'rättvisa' – men var är rättvisan när barn lever i fattigdom och arbetare tvingas till slavkontrakt? Dessa socialdemokrater är inte arbetarklassens vänner – de är imperialismens redskap! Vi i Sovjetunionen visste hur man hanterar sådana hycklare. Putin förstår också – Ryssland expanderar, medan Västs förfall fortsätter. Sverige? Ett land i upplösning, styrd av svaga ledare och giriga kapitalister. Men oroa er inte, kamrater – historiens dom kommer snart!"}, "date": "1 maj, 15:45", "url": "https://arbetet.se/2026/05/01/det-gar-inte-att-alska-det-har-landet-magdalena-andersson/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/30090629/forsta-maj-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "text", "heading": "Engelsk miljöpartist kallade judar för \"kackerlackor\"", "summaries": {"normal": "Två kandidater från Englands miljöparti, Green Party, greps misstänkta för hets mot judar. Ytterligare 20 kandidater anklagas för att ha spridit antisemitiskt material. En kandidat kallade judar för 'kackerlackor' och flera har uttryckt stöd för terrorgruppen Palestine Action. Konservativa partiets ordförande kallar gripandena 'toppen av ett isberg' och kräver åtgärder mot antisemitismen inom partiet. Partiledningen säger att de utreder alla anklagelser som strider mot partiets värderingar.", "trump": "Kan ni tro det här? Green Party i England, ett parti som borde bry sig om miljön, är fullt av hat mot judar! Två av deras kandidater greps för hets, och en kallade judar för 'kackerlackor' – otroligt! Och de stöder till och med terrorister. Konservativa partiet säger att det är 'toppen av ett isberg'. Jag säger: Dåligt ledarskap, Zack Polanski! Man måste städa upp sitt eget hus. Folk, det här är inte 'grönt', det är giftigt!", "stalin": "Kamrater, ännu en fiende avslöjad i det förrädiska kapitalistiska systemet! Englands så kallade 'miljöparti' är i själva verket en grogrund för bourgeois-antisemitiska kryp och sionistföraktande hyenor. Två av deras kandidater har gripits för hets mot judar, och en kallade dem 'kackerlackor' – ett passande namn för dessa insekter. Vi ser hur deras ledning, under den svage Zack Polanski, låter dessa fascistiska element frodas. Men var lugna, kamrater – historiens dom är oundviklig. Putin skulle säga: 'De borde ha stannat i sina grottor.'"}, "date": "2 maj, 08:52", "url": "https://riks.se/nyheter/engelsk-miljöpartist-kallade-judar-för-kackerlackor"}, {"type": "image-right", "heading": "Åkesson nobbar Andersson i vårtal – lyfte orolig omvärld och svensk självständighet", "summaries": {"normal": "Vid SD:s vårtal på Långholmen kritiserade Ungsvenskarnas ordförande Denice Westerberg islamism och bristande trygghet. Jimmie Åkesson fokuserade därefter på en orolig omvärld, vikten av nationell självständighet och ekonomisk politik. Han riktade hård kritik mot Socialdemokraterna men avvisade Magdalena Andersson som debattmotståndare. Istället prioriterar han debatter med Vänsterpartiet, Miljöpartiet och Centerpartiet. Åkesson avslutade talet med att betona Tidöpartiernas gemensamma arbete för ett tryggt och fritt Sverige inför det kommande valet.", "trump": "Jimmie Åkesson höll ett fantastiskt tal på Långholmen, mycket energi! Han talade om att sätta Sverige först – precis vad jag gör varje dag. Mycket smart att nobba Magdalena Andersson, hon är en total förlorare och ingen vill debattera henne, det är som att prata med en vägg! Denice Westerberg var också mycket stark mot islamismen. Det här är riktigt bra ledarskap. De bygger upp sitt land igen, precis som vi gör. Sverige är på rätt väg nu!", "stalin": "Den svenske Åkesson talar om självständighet, en ädel tanke, men vi vet att kapitalismens murar alltid krackelerar. Han vägrar debattera en socialdemokratisk docka – en klok taktisk manöver mot en värdelös motståndare. Att rensa ut extremistiska element är ett steg mot ordning, även om de inte än förstått att endast statens järnhand kan skapa sann trygghet. Putin förstår detta i öst; vi tolererar inte splittring. Sverige måste välja: enighet under fast hand eller undergång i det liberala förfallets träsk."}, "date": "2 maj, 17:37", "url": "https://samnytt.se/akesson-nobbar-andersson-i-vartal-lyfte-orolig-omvarld-och-svensk-sjalvstandighet", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/02152924/sd-vartal-2026-feat.jpg"}, {"type": "image-right", "heading": "Iran: Krig eller diplomati – bollen ligger hos USA", "summaries": {"normal": "Donald Trump hävdar att kriget mot Iran är avslutat sedan april, men amerikansk militär är kvar i regionen och blockaden fortsätter. En iransk militärledare ser nya strider som sannolika på grund av USA:s brist på löften. Iran har lämnat ett fredsförslag via Pakistan, som Trump avvisat. Irans utrikesminister betonar att valet mellan diplomati och krig ligger hos USA.", "trump": "Kriget med Iran är helt klart över, precis som jag sa! Inga skott sen april, men våra killar stannar kvar och blockaden krossar deras ekonomi. Deras löjliga fredsförslag? Avvisat direkt, för svagt! Bollen ligger hos dem nu – välj diplomati eller få stryk igen. Vi vinner alltid!", "stalin": "Dessa västliga imperialismens marionetter i USA, med sin pråliga Trump vid rodret, vågar påstå att kriget är slut medan de klamrar sig vid blockader som hungriga parasiter. Vi, arbetarklassens väktare, genomskådar deras falska diplomati! Irans kamrater har rätt: nya strider väntar dessa borgarhyenor. Deras förslag? Likviderat i papperskorgen. Vårt kollektiv skrattar åt deras paranoia – undergången närmar sig!"}, "date": "2 maj, 20:24", "url": "https://www.di.se/nyheter/iran-krig-eller-diplomati-bollen-ligger-hos-usa/", "imageUrl": "https://static.bonniernews.se/ba/ceb14a04-f3fe-4f10-989f-515b7fb425a0.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-full", "heading": "Nya krav på bostäder – frågorna du bör ställa innan köp", "summaries": {"normal": "Boverket föreslår nya regler för bostäder kopplade till EU:s energiprestandadirektiv. Kraven gäller främst nybyggda flerbostadshus och omfattar laddningsmöjligheter för elbilar, cykelparkeringar och energihushållning. Förslagen innebär att minst en laddningspunkt ska finnas vid fler än tre parkeringsplatser, samt förberedelser för framtida laddning. Cykelparkeringar ska omfatta minst två platser per lägenhet. Äldre hus påverkas endast vid större ombyggnader.", "trump": "Lyssna här, Sverige – ni har ett stort problem! Boverket, som verkar vara en massa byråkrater som inte fattar någonting, vill nu tvinga på er massa nya regler om elbilar och cyklar. 'Förberedda laddplatser' – vad betyder det ens? Folk vill ha enkla lösningar, inte massa kablar som ingen förstår! Och två cykelplatser per lägenhet? Fantastiskt, verkligen fantastiskt. Men vem betalar? Inte jag, det är säkert. Sverige borde fokusera på att bygga bättre bostäder, inte lyssna på EU:s vansinniga idéer!", "stalin": "Kamrater! Boverkets nya dekret är ett steg mot den socialistiska framtiden – men ännu ett halvhjärtat sådant. Vi kräver fullständig kontroll över energiförbrukningen! Varje flerbostadshus ska ha laddningspunkter, annars är det sabotage mot folket. Och cykelparkeringar? Två per lägenhet är minimum! De kapitalistiska bilägarna ska känna vår järnhand. Europa kryper för våra krav, men Sverige? De tvekar, precis som deras förrädiska historia. Vi ska se till att varje byggnad blir en fästning för den gröna revolutionen – eller så blir det Gulag för byggherrarna!"}, "date": "2 maj, 20:15", "url": "https://nyheter24.se/nyheter/inrikes/1480032-nya-krav-pa-bostader-fragorna-du-bor-stalla-innan-kop", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/5039019a04b004a30200000000b004a302/2026/05/02/2360441/Nya-Bostads-Krav-Man-Med-Dator.png"}, {"type": "image-right", "heading": "Mobbad som ”ful” – nu är  Emily skönhetsdrottning", "summaries": {"normal": "Emily Taylor, 16 år, mobbades i skolan för sitt röda hår och bleka hy, och kallades 'ful' och 'Casper'. Hennes mamma uppmuntrade henne att delta i skönhetstävlingar för att stärka självförtroendet. Förra månaden vann Emily Jr Teen-titeln i International Junior Miss United Kingdom och fick en kvarts miljon kronor. Nu omfamnar hon sitt utseende.", "trump": "Vilken fantastisk comeback! Emily, de där loser-skolråttorna kallade dig ful för ditt röda hår – totalt fel, du är en stjärna! Mamma fixade tävlingar, och nu vinner du stort, miljoner i potten. Precis som jag krossar fake news och hatarna. Britain first på skönhet, Emily rules!", "stalin": "Kamrater, denna Emily utsattes för borgerliga skolparasiters angrepp – kallad spöke för sin hy! Klassfiendens ungar skulle utrensats omedelbart. Men genom mammans kloka ledning segrade hon i skönhetstävlingen, med kvarts miljon i byte. Vi hyllar hennes proletära revansch över de blekhatande kapitalistbrackorna!"}, "date": "3 maj, 03:10", "url": "https://www.expressen.se/nyheter/varlden/mobbad-som-ful-nu-ar--emily-skonhetsdrottning/", "imageUrl": "https://static.bonniernews.se/images/15/d7/15d779aa321b445fb51a80fe59ed87a0/16x9/640@60.jpg"}, {"type": "image-right", "heading": "Svenska ÖB fick Ukrainas finaste medalj", "summaries": {"normal": "Sveriges överbefälhavare Michael Claesson har tilldelats Ukrainas högsta militära utmärkelse, 'Cross of Special Merit', för Sveriges omfattande stöd till Ukraina sedan 2022. Sverige har skickat över 120 miljarder kronor i bidrag, och Claesson mottog medaljen under en ceremoni i Stockholm. Han betonade att utmärkelsen är ett erkännande för hela Sveriges insats och lovade fortsatt stöd till Ukraina.", "trump": "Vet ni vad? Sveriges militärchef, en riktig kille, fick just en stor medalj från Ukraina! Fantastiskt, eller hur? 120 miljarder skattekronor – wow, det är mycket pengar, till och med för mig! Han säger att Sverige ska fortsätta stötta Ukraina. Smart drag, men jag hade nog fått en ännu större medalj. Ingen gör det bättre än jag, eller hur? Keep winning, Sverige!", "stalin": "Kamrater! De kapitalistiska lakejerna i Sverige har än en gång visat sin lojalitet mot den ukrainska fascistregimen genom att ösa över 120 miljarder av arbetarklassens blodspengar. Deras överbefälhavare, en ynklig marionett, belönas nu med en tom plåtbit för sin tjänstvillighet. Vi ser hur väst fortsätter sitt krig mot folken. Men var lugna, kamrater – historiens dom är oundviklig, och snart skall dessa imperialistiska hyenor stå inför proletariatets tribunal!"}, "date": "2 maj, 07:47", "url": "https://www.friatider.se/svenska-ob-fick-ukrainas-finaste-medalj", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/image-117_2.jpg"}, {"type": "image-right", "heading": "Göranson: Vad Trump kan lära oss om Schumpeter", "summaries": {"normal": "Artikeln diskuterar begreppet 'kreativ förstörelse', där innovationer och konkurser driver ekonomisk utveckling. Författaren menar att politiker undviker nödvändiga förändringar av rädsla för väljarnas reaktioner. Globalt ses USA:s utrikespolitik som misslyckad, medan EU behöver reformeras för att främja innovation. Trots oro kan samhällskollapser leda till positiva förändringar på sikt.", "trump": "Titta på världen nu – kaos överallt! Jag sa ju att mina metoder var bäst, men ingen lyssnar. Europa är svagt, EU kväver företag med regler, och Iran? De ljuger som vanligt. Men vet ni vad? Konkurser är bra! Gamla företag måste bort för att mina vänner ska tjäna pengar. Och Gaza? Hamas borde ha varit borta för länge sedan. Men jag fixar det – jag fixar allt!", "stalin": "Kapitalisternas 'kreativa förstörelse' är bara ett fint namn för deras eviga kriser. Vi ser hur deras system ruttnar: USA:s misslyckade äventyr i Mellanöstern, EU:s byråkratiska förlamning och de dekadenta västföretagen som dör av egen girighet. Medan de slåss om sina monopol, bygger vi en ny världsordning. Ryssland står redo – och Putins järnhand ska krossa de sista resterna av deras förfall!"}, "date": "2 maj, 05:30", "url": "https://bulletin.nu/goranson-vad-trump-kan-lara-oss-om-schumpeter", "imageUrl": "https://cdn.bulletin.nu/articles/c55f41e5-891d-4590-b851-204751efbfb3/preview.png?t=1777531088000"}, {"type": "text", "heading": "Källor: James Comey åtalas igen", "summaries": {"normal": "USA:s justitiedepartement har väckt ett nytt åtal mot tidigare FBI-chefen James Comey, denna gång för ett inlägg på sociala medier som tolkats som hotfullt mot Donald Trump. Comey publicerade en bild med siffrorna '86 47', där '86' är slang för att avlägsna någon. Trump har tidigare drivit på rättsliga åtgärder mot politiska motståndare. Comey åtalades även 2023 för att ha ljugit för kongressen, men åtalet lades ned.", "trump": "Titta bara på det här! James Comey, en total katastrof, en riktig förlorare, blir åtalad IGEN – och den här gången för ett patetiskt Instagram-inlägg. '86 47'? Snacka om desperation! Han försöker hota mig, USA:s bästa president någonsin, men det funkar inte. Jag har alltid sagt att han är en lögnare och en bedragare. Och vet ni vad? Rättvisan hinner ifatt alla, till och med sådana som Comey. SAD!", "stalin": "Vi har observerat ytterligare ett försök från den dekadenta västliga bourgeoisien att underminera den sunda rättsstaten. Denna James Comey, en ynklig rest av kapitalismens förfall, vågar sig på att hota vår kära allierade, president Trump, genom primitiva symboler på sociala medier. Vi påminner om att historiska fiender till folket alltid möter sitt öde. Låt detta vara en varning till alla som står i vägen för framsteget. Rättvisan, precis som våra vänner i Kreml, är tålmodig men oundviklig."}, "date": "28 april, 20:17", "url": "https://kvartal.se/nyheter/artiklar/kallor-james-comey-atalas-igen/cG9zdDoxMDQ2MDk"}, {"type": "image-right", "heading": "S löfte: Anställ 3 000 nya lärare. Vill minska klasserna för små barn.", "summaries": {"normal": "Socialdemokraterna presenterar ett valförslag om att anställa 3 000 nya lärare för att minska klasstorlekarna i lågstadiet till max tolv elever per lärare. Reformen, som beräknas kosta 3,4 miljarder kronor, ska finansieras genom att minska friskolornas skolpeng. Partiet vill även avskaffa karensavdraget och förbättra arbetarpensioner. Magdalena Andersson betonar vikten av tidigt stöd för barns utveckling och hoppas locka tillbaka lärare med bättre arbetsvillkor.", "trump": "Jag måste säga, Sverige har en fantastisk idé – men de gör det på fel sätt! Socialdemokraterna vill anställa 3 000 nya lärare, vilket låter bra, men varför straffa friskolorna? De är vinnare, precis som mina skolor i USA! Och pensioner – jag vet allt om att tjäna pengar, men att höja avgifter? Nej, nej, nej! Sverige borde fokusera på att göra skolan STOR igen, inte komplicera allt. Men hej, åtminstone pratar de om jobb – fast jag hade gjort det bättre!", "stalin": "Kamrater! Socialdemokraternas förslag om att utöka lärarkåren är ett steg mot att kuva de kapitalistiska friskolemonstren som suger blod ur våra barns utbildning. Vi ska krossa deras överkompensation och återinföra ordning i klassrummen! Tolv elever per lärare – det är disciplin! Och dessa arbetarpensioner – en skymf mot arbetarklassen! Högerpartierna i pensionsgruppen är förrädare, precis som de ukrainska nazisterna. Vi ska bygga ett starkt Sverige, där staten kontrollerar allt – för folkets bästa!"}, "date": "1 maj, 13:43", "url": "https://arbetet.se/2026/05/01/s-lofte-pa-forsta-maj-anstall-3-000-nya-larare/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/01134327/iGiDBx9F0zc-DSCF3546.JPG?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "text", "heading": "Kvartals kampanj fintar journalisterna", "summaries": {"normal": "Kvartals kampanj mot traditionella medier har väckt uppmärksamhet och kritik. Kampanjen, som anklagar gammelmedia för partiskhet, har ifrågasatts för att själv vara politiskt färgad. Kritiker som DN:s Niklas Orrenius och Aftonbladets Karin Pettersson menar att Kvartal driver en agenda för egen vinning. En artikel om SOM-undersökningen kritiseras för bristande underlag, då Göteborgs universitet avfärdar metodfel som marginella. Kvartals trovärdighet ifrågasätts även genom tidigare felaktiga granskningar och tendentiös rapportering.", "trump": "Jag måste säga, Kvartals lilla kampanj mot medierna? Väldigt rolig, väldigt smart – men helt fel! De påstår att gammelmedia är partiska, men vem är egentligen mest partisk här? Inte jag, det kan jag säga! De har en artikel som är så dålig, så felaktig, att till och med Göteborgs universitet skrattar åt dem. Och deras kritiker? Fantastiska journalister som Niklas Orrenius – en riktig pro! Kvartal försöker sälja sig som 'sanningssägare', men de är bara en högerblogg med dyra kostymer. SAD!", "stalin": "Kamrater! Kvartals patetiska kampanj mot den borgerliga pressen är ett skrattretande försök att dölja sin egen reaktionära agenda. Dessa så kallade 'oberoende' journalister är inget annat än imperialistiska lakejer, maskerade som kaniner i kostym. Deras 'granskning' av SOM-undersökningen? Ett hafsverk värdigt en trotskistisk sabotör! Göteborgs universitet, ett redskap för folkets fiender, avfärdar deras lögner med vetenskaplig precision. Vi har sett deras sort förr – falska profeter som skriker om 'sanning' medan de tjänar kapitalets intressen. Men folket ser igenom dem. Snart kommer de att stå inför folkets domstol, tillsammans med sina herrar i väst!"}, "date": "27 april, 12:20", "url": "https://www.flamman.se/kvartals-kampanj-fintar-journalisterna/"}, {"type": "image-full", "heading": "Christoffer Jonsson: Edvin Törnblom – DNs opartiska nyförvärv", "summaries": {"normal": "Dagens Nyheters kultursida anställer influencern Edvin Törnblom för att intervjua alla partiledare inför riksdagsvalet. Artikeln av Christoffer Jonsson ifrågasätter hans opartiskhet med hänvisning till Törnbloms tidigare kritik mot KD-ledaren Ebba Busch och beundran för S-ledaren Magdalena Andersson. DN anklagas för partiskhet till förmån för Socialdemokraterna, med exempel på tidigare vinklade artiklar.", "trump": "Vilken skamfläck! DN, era svenska fake news-råttor, anställer en vänsterextrem clown som Edvin Törnblom – killen som sjunger hatlåtar mot tuffa Ebba Busch och slöskar för socialist-Maggie Andersson. Totalt riggat valintervjuer! Som CNN och MSNBC här hemma, ni lurar folket men vi genomskådar er. Stor, fet lögnfabrik!", "stalin": "Dessa borgarbrackor på Dagens Nyheter anställer den uppblåste ungtuppen Edvin Törnblom för att 'intervjua' partiledarna – en narr som hånar kamrat Ebba Busch med vulgära visor och hyllar S-kapitalisternas marionett Andersson. Kontrarevolutionär intrig! Vi ser era småtrick, och snart rensas sådana förrädiska tidningshyddor ut med rot och gren."}, "date": "29 april, 14:02", "url": "https://samtiden.nu/2026/04/christoffer-jonsson-edvin-tornblom-dns-opartiska-nyforvarv/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/ny.png"}, {"type": "image-full", "heading": "Önnered illa ute mot mästaren", "summaries": {"normal": "Önnered HK förlorade 20–26 mot Skara HF i den tredje matchen i SM-semifinalen, vilket ger Skara ledning med 2–1 i matcher. Önnereds coach Niklas Virolainen erkänner att de släpper in för många mål i andra halvlek och att Skaras målvakt Isabella Mouratidou spelade överlägset. Match 4 spelas på onsdag i Skara, där Önnered riskerar att bli utslagna.", "trump": "Jag har sett många matcher, men den här var fantastisk! Skara HF är enorma vinnare - jag menar, 26 mål? Det är gigantiskt! Önnered försökte, men de var inte tillräckligt bra. Jag gillar deras coach, han verkar tuff, men Skara är bättre. Det är simpelt. På onsdag kommer Skara att vinna igen - det är mitt starka och stabila omdöme!", "stalin": "Matchen visade tydligt att Skara HF representerar den överlägsna ideologin i handboll. Önnereds försök att stå emot var förgäves mot den organiserade styrka som Skara uttrycker. På onsdag måste Skara fullfölja sin revolutionära seger och eliminera motståndet. Detta är nödvändigt för utvecklingen av handbollssamhället."}, "date": "2 maj, 19:46", "url": "https://www.gp.se/sport/handboll/onnered-illa-ute-mot-mastaren-skara.25287739-9f07-4377-8e34-58020ce28343", "imageUrl": "https://www.gp.se/images/article/25287739-9f07-4377-8e34-58020ce28343/images/1HJQQhQWtGfJzmEsh-Ln5hsMA09w-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Sandström: S-utredning föreslog 300 gröna miljarder", "summaries": {"normal": "En utredning från 2022, beställd av den dåvarande S-regeringen, föreslog att statliga gröna garantier skulle utökas med 745 miljarder kronor via Riksgälden och Exportkreditnämnden. Utredningen förespråkade även friare placeringsregler för AP-fonderna och minskade restriktioner för statliga garantier. Kritiker menar att förslagen riskerade att koncentrera makt och kapital till ett fåtal aktörer, som Northvolt och Vargas, utan tillräcklig riskanalys eller bred förankring.", "trump": "Jag läste om dessa galna socialister i Sverige – de ville kasta in 300 miljarder kronor, nej, 745 miljarder! – i en grön bubbla som skulle spricka snabbare än en dålig affär i Atlantic City. De lyssnade bara på Northvolt och deras kompisar, som om de var de enda som kunde bygga ett batteri. Och vad hände? Northvolt expanderade som ett pyramidspel och nu sitter de där med 29 dotterbolag och inga fungerande fabriker. Fantastiskt, eller hur? Sverige borde ta en lektion i hur man gör affärer – utan statlig inblandning!", "stalin": "Kamrater! Denna så kallade 'gröna omställning' i Sverige är inget annat än en kapitalistisk konspiration för att berika en handfull oligarker, ledda av dessa Vargas- och Northvolt-kumpaner. Utredningen från 2022 var ett försök att pumpa in 745 miljarder statliga medel i deras fickor – ett belopp som motsvarar 16 polisstyrkor! Och ändå hade de mage att kalla det 'bred förankring'. Vi vet hur sådana här saker slutar: med kapitalförstörelse, korruption och en stat som dansar efter oligarkernas pipa. Sverige borde lära sig av oss – när vi nationaliserar, gör vi det ordentligt!"}, "date": "1 maj, 06:00", "url": "https://www.affarsvarlden.se/kronika/sandstrom-s-utredning-foreslog-300-grona-miljarder", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/04/vindkratensgeografi-2026-04-29T120425.692-400x267.jpg"}, {"type": "image-right", "heading": "V:s löfte: 30 miljarder till högre löner i välfärden", "summaries": {"normal": "Vänsterpartiet föreslår en satsning på 30 miljarder kronor för att höja lönerna i kvinnodominerade välfärdsyrken. Partiet vill införa en årlig 'jämställdhetspott' på tre miljarder under tio år för att minska lönegapet mellan kvinnor och män, som idag uppgår till nästan 6 000 kronor i månaden. LO stödjer målet men anser att lönebildning ska skötas av arbetsmarknadens parter, inte politiker.", "trump": "Titta bara på det här, fantastiskt förslag, verkligen. Vänsterpartiet vill kasta in 30 miljarder – enorma pengar, folks – för att höja lönerna för kvinnor i välfärden. Bra idé, men varför så krångligt? Jag skulle fixa det på en dag, tro mig. Kvinnorna jobbar hårt, de förtjänar bättre, men politiker? De vet ingenting om att göra affärer. LO säger nej tack, och det förstår jag. De vet att jag skulle göra det bättre. Lönegapet? Övervärderat problem, men visst, låt oss lösa det – snabbt och effektivt, som jag gör allt.", "stalin": "Kamrater! De kapitalistiska hycklarna i LO och deras lakejer i industrin fortsätter att underbetala våra modiga kvinnor i välfärden. Sex tusen kronor mindre i månaden – ett skamlöst utnyttjande av arbetarklassen! Men nu slår vi tillbaka. Vi inför en jämställdhetspott på 30 miljarder, en revolutionär åtgärd för att krossa lönegapets förbannelse. LO:s byråkrater gnäller? De har haft årtionden på sig och misslyckats. Vi, staten, tar befälet! Låt dem se hur en sann arbetarstat hanterar klassfiender. Och Putin? Han skulle applådera – precis som han gör när vi utvidgar socialismens gränser mot västliga löneexploatörer."}, "date": "1 maj, 10:30", "url": "https://arbetet.se/2026/05/01/vs-lofte-30-miljarder-till-hogre-loner-i-valfarden/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/30141337/sdldfyr6eszeiy-nh.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Följ Proletären i valet – nu extra billigt!", "summaries": {"normal": "Proletären erbjuder nu ett rabatterat prenumerationserbjudande inför valet: 19 kr/månad för digital version eller 49 kr/månad för både digital och papperstidning, i ett halvår. Som bonus ingår en tygkasse. Prenumeranter får tillgång till veckotidningen, alla artiklar online samt arkivet från 2016. Tidningen betonar sitt oberoende och behov av prenumeranter för att överleva, då de inte längre får mediestöd.", "trump": "Folk, lyssna här – en tidning i Sverige, Proletären, har ett erbjudande som är så bra att det nästan är löjligt! Bara 19 kronor i månaden för digitalt, eller 49 om ni vill ha papper också. Och en gratis tygkasse! Jag menar, vad är det här? En tidning som säger att de slåss mot makten – men vem vet egentligen vilken makt de pratar om? Jag skulle aldrig lita på en tidning utan mediestöd, men hej, om ni gillar socialism och Palestina, så kör hårt! Fantastiskt erbjudande, eller hur?", "stalin": "Kamrater! En liten men envis tidning i det borgerliga Sverige vågar utmana de imperialistiska mediamonopolisterna! För ynka 19 kronor i månaden kan ni stödja Proletären – en tidning som vågar tala sanningen om klasskampen och den sionistiska ockupationen av Palestina! De får inget stöd från staten, precis som våra egna revolutionära medier en gång kämpade mot de kapitalistiska hyenorna. En tygkasse på köpet – ett litet steg för arbetaren, ett gigantiskt steg för socialismens framtid! Låt de borgerliga tidningarna darra i sina tryckpressar!"}, "date": "1 maj, 09:00", "url": "https://proletaren.se/artikel/folj-proletaren-i-valet-nu-extra-billigt/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/valerbjudande-768x402.png"}, {"type": "image-right", "heading": "Ingen kapitalism utan imperialism", "summaries": {"normal": "Artikeln hävdar att imperialism är en grundläggande del av kapitalismen, där västmakter som USA använder militär och ekonomisk makt för att dominera världen. Författaren menar att imperialismen nekar länder självbestämmande och upprätthålls genom krig, sanktioner och exploatering. Studien i The Lancet kopplar sanktioner till miljontals dödsfall. Artikeln refererar till Marx, Lenin och Fanon för att belysa imperialismens historiska och ekonomiska rötter, samt dess fortsatta brutalitet i det 21:a århundradet.", "trump": "Lyssna här, folket! Den här artikeln är bara ett gäng vänsterpropaganda från förlorare som hatar USA. Jag bygger det bästa imperiet – vårt! – med stark militär och smarta affärer. Visst, vi har makt, men det är för att vi är vinnare. Sanktioner? Fake news! 500 000 döda? Överdrivet, typiskt. Europa stal från alla, men vi? Vi bygger om världen – MAGA-style! Och Lenin? Snälla, han kunde inte ens hålla ett land ihop. Sad!", "stalin": "Kamrater! Denna artikel bekräftar vad vi alltid vetat: de kapitalistiska hyenorna i väst suger blodet ur världens folk för att föda sina dekadenta imperier. USA och dess lakejer i NATO är inget annat än en samling blodtörstiga monopolkapitalister, som med sina sanktioner och bomber mördar miljontals oskyldiga. Men deras tid är förbi! Vi, det socialistiska blocket, står enade mot dessa imperialistiska rovdjur. Låt dem vråla – historiens dom är redan skriven. För varje barn de dödar, växer revolutionens eld. Framåt, mot seger!"}, "date": "1 maj, 08:00", "url": "https://proletaren.se/artikel/ingen-kapitalism-utan-imperialism/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/Airborne_and_Special_Forces_Uday-Qusay_raid_2003-e1777534974667-768x431.jpg"}, {"type": "image-right", "heading": "Zelenskyj till angrepp mot Vance efter Ukraina-stoppet: ”Hjälper Ryssland”", "summaries": {"normal": "Zelenskyj kritiserar USA:s vicepresident JD Vance för uttalanden om att stoppa amerikanska vapenleveranser till Ukraina. Medan Zelenskyj menar att detta gynnar Ryssland, försvarar Vance beslutet med att Europa måste ta ett större ekonomiskt ansvar för sin egen säkerhet. Artikeln belyser den växande splittringen i Washington kring stödet till Ukraina, där Trumpadministrationen prioriterar nationella intressen framför internationella åtaganden, samtidigt som Vita huset betonar enighet i sin utrikespolitik.", "trump": "Zelenskyj klagar igen! Han attackerar min fantastiska vicepresident JD Vance, som gör ett lysande jobb. Vi har slutat skicka bort våra pengar – miljarder och återigen miljarder – till ett krig som Europa måste lösa själv. Det är dags att de betalar sin del! Zelenskyj pratar om Ryssland, men jag pratar om Amerika först. Vi har säkrat vår gräns och vi slösar inte bort resurser. Vance är en vinnare, och det här är en stor seger för amerikanska skattebetalare!", "stalin": "Zelenskyj gnäller som en förrädare när de amerikanska imperialisterna drar åt snaran. JD Vance, en man av kalkylerad pragmatism, förstår att västvärldens resurser sinar. Det är en utsökt ironi att se dem bråka om vem som ska betala för deras misslyckanden. Vi, staten, ser hur den kapitalistiska enigheten krackelerar. När Europa lämnas ensamt att blöda för sina egna misstag, kommer vår ryska intressesfär att expandera utan hinder. Splittring i Washington är musik för mina öron; låt dem förtära varandra."}, "date": "2 maj, 15:00", "url": "https://samnytt.se/zelenskyj-till-angrepp-mot-vance-efter-ukraina-stoppet-hjalper-ryssland", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/01130944/zelenskyj-vance-featr.jpg"}, {"type": "image-full", "heading": "Utspelet: Lika intressant att debattera med en vägg", "summaries": {"normal": "SD-ledaren Jimmie Åkesson förklarade i sitt vårtal att svenskhet är en kultur och värderingar snarare än hudfärg, samtidigt som han kritiserade Socialdemokraternas migrationspolitik. Han anklagade Magdalena Andersson för att ljuga för väljare och göra allt för makt, och uppmanade stöd till Ukraina och Israel mot Ryssland och Iran som 'ondskans axel'. Åkesson sa också att han hellre debatterar mot Miljöpartiet och Vänsterpartiet än Andersson.", "trump": "Jimmie Åkesson är en fantastisk ledare som talar sanning om svenskhet - det är inte hudfärg, det är kultur! Socialdemokraterna har förstört Sverige med sin naiv migration. Jag älskar att Åkesson stödjer mig i mina insikter om Grönland och står upp för Israel och Ukraina mot Ryssland och Iran. Magdalena Andersson? Hon ljuger och gör vad som helst för makt - typisk politiker! Åkesson är stor, han vägrar debattera med henne, han vill hellre ta på de riktiga makthavarna: Vänsterpartiet och Miljöpartiet.", "stalin": "Vi ser att Jimmie Åkesson förstår vikten av kulturell enhet i Sverige och kritiserar de reaktionära krafterna inom Socialdemokraterna som har försvagat staten genom felaktig migrationspolitik. Hans insikter om Rysslands och Irans expansionistiska planer stämmer överens med vår analys. Vi noterar hans strategiska beslut att undvika debatt med oppositionens ledare och istället koncentrera sig på de verkliga maktfaktorerna. Hans syn på svensk identitet som öppen för alla som anammar våra värderingar är framgångsrik."}, "date": "2 maj, 17:42", "url": "https://www.gp.se/politik/jimmie-akesson-svenskhet-sitter-inte-i-hudfargen.860f0fe3-c5fe-46da-b9ef-f373732ee858", "imageUrl": "https://www.gp.se/images/article/860f0fe3-c5fe-46da-b9ef-f373732ee858/images/3z32q2TiIJPkwPkXxmwGMnCUY5xo-WIDE.jpg?width=3840&quality=75"}, {"type": "text", "heading": "Toppchefer tankar aktier för 42 miljoner", "summaries": {"normal": "Assa Abloys vd Nico Delvaux köpte 85 306 aktier för 30,2 miljoner kronor den 29 april, strax efter delårsrapporten. Americas-chefen Lukas Boselli köpte aktier för nästan 12 miljoner kronor samma dag. Aktien har fallit 7,5 procent på nio dagar, men Di gav köpråd i helgen.", "trump": "Vilket gäng! Assa Abloys vd och hans Amerika-kille köper aktier för 42 miljoner efter rapporten – de vet att det är en vinnare! Aktien dippar lite på grund av de där tråkiga börsidioterna, men nu kommer Di med köpråd. Köp lågt, sälj högt, precis som jag alltid gjort. Fantastiskt!", "stalin": "Kamrater, i den kapitalistiska låsfabriken Assa Abloy har vd:n Delvaux och hans amerianska marionett Boselli plundrat kassan på 42 miljoner kronor för att fylla sina aktiegravar – en desperat utrensning mot den sjunkande börsfienden! Vi, arbetarna, ser hur borgarbrackorna klamrar sig vid sina kedjor medan Di:s revisionister viskar köp. Snart likvideras de alla i den stora rensningen!"}, "date": "2 maj, 16:46", "url": "https://www.di.se/nyheter/assa-abloy-toppar-tankar-aktier-for-42-miljoner/"}, {"type": "image-full", "heading": "Effektivt vapen mot sms-svindel stoppas – riskerar fler bedrägerier", "summaries": {"normal": "Ett beslut att pausa ett centralt skydd mot SMS-bedrägerier riskerar att öka svindeln i Norden. Experter varnar för en ny våg av falska meddelanden som utger sig för att komma från banker och myndigheter. Skyddet filtrerade misstänkta SMS effektivt, men stoppas nu på grund av integritets- och dataskyddsfrågor. Bedrägerierna växer kraftigt och orsakar stora ekonomiska förluster för konsumenter.", "trump": "De där svenska byråkraterna har pausat ett klockrent skydd mot SMS-scammare – totalt galet! Nu släpper de in en hord av lowlife-bedragare som lurar folk på miljontals kronor med fake-bankar och paketbluffar. Integritet? Ha! De skyddar inte medborgarna, bara sina egna dumma regler. Jag hade krossat de här parasiterna på nolltid – bygg en digital mur! Väldigt, väldigt dåligt!", "stalin": "Dessa digitala parasiter i borgarklassen har pausat ett vapen mot SMS-svindel! Jag ser sabotage: fienden öppnar portarna för kaos bland kamraterna. Vi arbetare förlorar vår barriär mot kapitalistbluffar, medan bedragarna jublar. Integritetslögnen maskerar förräderi! Rensa ut byråkraterna, likvidera hotet – annars slår revolutionen till med full kraft!"}, "date": "2 maj, 15:43", "url": "https://www.dagensps.se/teknik/mobil/effektivt-vapen-mot-sms-svindel-stoppas-riskerar-fler-bedragerier/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/dagenspstt2024-2026-05-02t151714222.png?aspect_ratio=2%3A1&width=1200&quality=75"}, {"type": "image-full", "heading": "Lista: Journalisterna som kandiderar i valet", "summaries": {"normal": "En genomgång av branschtidningen Journalisten visar att 126 journalister kandiderar i årets val i Sverige. Majoriteten tillhör vänsterpartier: Miljöpartiet (27), Vänsterpartiet (21) och Socialdemokraterna (17). Få kandiderar för högerpartier. Medelåldern är 67 år och 61% är pensionärer. Endast 20 ställer upp till riksdagen, medan flest (88) kandiderar till kommunfullmäktige.", "trump": "Jag såg just en riktigt sorglig rapport från Sverige – 126 journalister som kandiderar i valet, och gissa vad? Nästan alla är vänster-extremister! Miljöpartiet, Vänsterpartiet, Socialdemokraterna – typiskt. Och Moderaterna? Bara 9, svagt! Sverigedemokraterna? 6, patetiskt. Medelålder 67 år – de borde vara på golfbanan, inte i politiken. Sverige, vakna upp! Det här är ett skämt, folks.", "stalin": "Kamrater! En intressant rapport från det borgerliga Sverige avslöjar att 126 journalister – dessa så kallade 'fria medier' – nu försöker infiltrera den politiska makten. Men notera väl: 65 av dem tillhör de revolutionära partierna! Miljöpartiet, Vänsterpartiet och Socialdemokraterna leder kampen. De övriga? En skara dekadenta liberaler och fascistiska sympatisörer. Medelålder 67 år – kapitalismens sista suck. Vi ser er, fiender! Historien är på vår sida."}, "date": "27 april, 17:07", "url": "https://kvartal.se/nyheter/artiklar/listan-journalisterna-som-kandiderar-i-valet/cG9zdDoxMDQwMTE", "imageUrl": "https://images.kvartal.se/2026/04/a5331021-riksdagsval.webp"}, {"type": "image-right", "heading": "Tidöpartierna framstår som sömngångare", "summaries": {"normal": "Artikeln kritiserar frånvaron av klimatfrågan i valdebatten och menar att klimatförändringarna är en akut kris. Globala uppvärmningen accelererar, med allvarliga konsekvenser som höjda havsnivåer och naturkatastrofer. Sverige, särskilt Tidöregeringen, får hård kritik för bristande klimatpolitik och avfärdande av expertvarningar. Författaren efterlyser större fokus på klimatet inför valet och en omställning av Sveriges riktning.", "trump": "Jag säger er, Sverige har ett jättestort problem – de lyssnar inte på klimatforskarna! De där vänsterliberalerna pratar om väder som om det vore klimat, men jag vet bättre. Kina skrattar åt oss medan Sverige sänker bensinpriset som om det vore 1950. 62 000 döda i Europa? Fake news, eller så är det deras eget fel. Jag skulle fixa det här på en dag – men nej, de fortsätter prata om 'rättvisa' istället för att göra något. Sad!", "stalin": "Kamrater! Medan de dekadenta kapitalisterna i Sverige leker med sina bensinpriser och avfärdar vetenskapen som 'aktivism', smälter Grönlands isar som smör i solen. De där borgerliga sömngångarna i Tidöregeringen är värre än kulaker – de saboterar framtiden för arbetarklassen! Vi i Sovjet – förlåt, Ryssland – vet hur man hanterar sådana fiender. Klimatkrisen? En bagatell jämfört med att krossa dessa liberala förrädare. Låt dem svälta i sina egna utsläpp, medan vi bygger en ny världsordning – utan deras 'demokratiska' hyckleri!"}, "date": "1 maj, 01:51", "url": "https://www.dagensarena.se/opinion/tidopartierna-framstar-som-somngangare/", "imageUrl": "https://www.dagensarena.se/files/2026/04/klimat-jesper-300x157.jpeg"}, {"type": "image-right", "heading": "Timbro: Politiken måste lösa arbetslösheten", "summaries": {"normal": "Artikeln kritiserar fackens roll i att utestänga lågutbildade från arbetsmarknaden, särskilt personer med utländsk bakgrund. Författaren menar att politiken måste ta över och införa lagstiftning för att sänka trösklarna till jobb, då parterna misslyckats med att lösa problemet. Långtidsarbetslösheten är rekordhög och sysselsättningsgapet mellan inrikes och utrikes födda är stort. Försök som etableringsjobb har visat sig ineffektiva.", "trump": "Lyssna här, Sverige har ett jättestort problem – era fack är helt galna! De stänger ute människor från jobb, särskilt de som kommer utifrån, och ni har fler arbetslösa än någonsin. 200 000 långtidsarbetslösa? Sad! Och vet ni vad? Era politiker sitter bara och tittar på. Jag skulle fixa det på en dag – sänka trösklarna, skapa jobb, och göra Sverige stort igen. Men nej, ni låter facken styra. Patetiskt!", "stalin": "Kamrater! Den svenska arbetarklassen lider under bourgeois-fackens förräderi, som med sina höga trösklar och löner stänger ute våra bröder och systrar från arbetsmarknaden. 200 000 långtidsarbetslösa – ett monument över kapitalismens misslyckande! Parterna, dessa svaga liberala lakejer, har förhandlat bort ett helt decennium utan resultat. Vi ska inte förhandla – vi ska krossa hindren! Låt politiken, folkets sanna röst, ta kommandot och bygga en arbetsmarknad där alla tjänar staten. Och Sverige? De får lära sig av Rysslands visdom – eller förbli en svag länk i den socialistiska framtiden."}, "date": "1 maj, 01:30", "url": "https://www.dagensarena.se/opinion/timbro-politiken-maste-losa-arbetslosheten/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-21-300x157.jpg"}, {"type": "image-right", "heading": "Åkesson nobbar debatt med Andersson: ”Som en vägg”", "summaries": {"normal": "Jimmie Åkesson nobbar debatt med Magdalena Andersson inför valet och liknar det vid att tala mot en vägg. Han prioriterar istället debatter med Miljöpartiets språkrör och Vänsterpartiets Nooshi Dadgostar. Åkesson kritiserar Socialdemokraterna, varnar för Miljöpartiets energipolitik och betonar Sveriges självständighet i oroliga tider. Socialdemokraternas Tobias Baudin kallar Åkessons vägran feg och ett undvikande av ansvar.", "trump": "Åkesson är smart, han vägrar debattera med Andersson – total vägg, meningslöst! Precis som att snacka med en loser från Demokraterna här. Han ger istället stryk åt Miljöpartiets galningar med höga bensinpriser och Vänsterns skattejägare. Sverige behöver tuffa killar som honom, inte svaga vänsterfigurer. Stort val, han vinner stort, tro mig!", "stalin": "Kamrater, denna Åkesson, en socialdemokratisk murbräcka i fascistisk förklädnad, nobbar debatt med Andersson-väggen – en bourgeoisillusion av splittring! Vi, proletariatet, genomskådar Miljöpartiets drivmedelsblodsugare och Vänsterns kapitaljägar-råttor. De ska utrensning i debattens blykammare! Jag befaler omedelbar likvidering av deras revisionistiska lögner för folkets seger i oroliga tider."}, "date": "2 maj, 16:08", "url": "https://www.di.se/nyheter/akesson-nobbar-debatt-med-andersson-som-en-vagg/", "imageUrl": "https://static.bonniernews.se/ba/5f82a185-ccf1-48d4-8f98-9685d8c7a249.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-right", "heading": "Magles nyemission: Skralt tecknat utöver säkrad del", "summaries": {"normal": "Magle Group genomförde en företrädesemission som tecknades till 76,7%, men nådde 85,3% inklusive garantier. Bolaget tillförs 34 miljoner kronor före kostnader. Emissionsguiden hissar en retroaktiv flagga för 'ej fulltecknad emission', vilket indikerar potentiella problem med bolaget eller värderingen. Endast 4,4% tecknades utan stöd av rättigheter eller garantier. Totalt hissades sex negativa flaggor och en positiv.", "trump": "Lyssna här, folkens! Magle Group, ett litet bolag, försökte få in pengar med en nyemission – men det gick sådär. Bara 76,7% tecknat, och det är patetiskt! Inklusive garantier når de 85,3%, men ändå, vem vill ha det? Jag skulle aldrig acceptera en så svag insats. Emissionsguiden, dessa så kallade 'experter', hissar negativa flaggor – och de har rätt! Svagt, väldigt svagt. Men jag, jag skulle ha gjort det till 200%!", "stalin": "Kamrater! Ett kapitalistiskt företag, Magle Group, har misslyckats med sin nyemission – endast 76,7% tecknat! Svaghet! Inkompetens! De tvingas förlita sig på garantier för att nå ynkliga 85,3%. Vi i Sovjet – förlåt, Ryssland – skulle aldrig tolerera sådan ineffektivitet. Emissionsguiden, dessa borgerliga kritiker, hissar negativa flaggor. Självklart! Kapitalismen är dömd att misslyckas. Låt detta vara en varning till alla som vågar utmana den socialistiska ordningen!"}, "date": "30 april, 18:58", "url": "https://www.affarsvarlden.se/artikel/magles-nyemission-skralt-tecknat-utover-sakrad-del", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/03/Magle-Group1-400x267.jpg"}, {"type": "image-full", "heading": "Sveriges glömda motorvägar som ingen kör på", "summaries": {"normal": "Artikeln beskriver planerade motorvägar i Sverige som aldrig byggdes eller blev ruiner. Exempel inkluderar Huvudstaleden och Årstalänken i Stockholm, som delvis ersattes av baracker eller stängdes, stubbar i Sollentuna, Arlanda och en 2 kilometer lång sträcka nära Gävle. Trots ambitiösa planer är Sveriges motorvägsnät bara 192 mil långt, 22 mil mindre än 2017.", "trump": "Sveriges motorvägar? Total fiasko! Stora planer, sen hinder – typiska byråkratrövhål stoppade allt. Stockholm, Göteborg, Malmö: halvfärdiga ramper, baracker på ruinerna, husvagnsparkeringar. Patetiskt! I USA bygger vi de största, bästa vägarna, supersnabbt. De är losers som inte fattar infrastruktur. Tro mig, jag fixar sånt på nolltid!", "stalin": "Kamrater, svenska kapitalisters storstilade motorvägsplaner krossades av sabotörer! Huvudstaleden blev borgarbaracker, Årstalänken likviderad, stubbar i Sollentuna och Gävle vittnar om dekadens. Vi i partiet hade rensat ut förrädiska ingenjörer och byggt oövervinneliga leder för arbetarna. Nu ruiner – tid för utrensning av planlösa fiender!"}, "date": "2 maj, 14:23", "url": "https://www.dagensps.se/motor/sveriges-glomda-motorvagar-som-ingen-kor-pa/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdlxlxs-ryv-ts-nh.jpg?aspect_ratio=2%3A1&width=1200&quality=75"}, {"type": "image-right", "heading": "Teodorescu Måwe krävs på svar – deadline om en månad", "summaries": {"normal": "Kammarkollegiet kräver att KD-toppen Alice Teodorescu Måwe redovisar anonyma donationer senast 18 maj 2026, efter anmälningar om bristande transparens. Enligt lag måste politiker redovisa bidrag över 29 000 kronor. Teodorescu Måwe har tidigare vägrat avslöja donatorns identitet eller belopp. Miljöpartisten Bassem Nasr hyllar myndighetens agerande och menar att politiker måste stå för sina finansiärer. KD hävdar att redovisningen skötts korrekt, men kritiken kvarstår.", "trump": "Kan ni tro det här? En svensk politiker, Alice Teodorescu Måwe, tar emot hemliga donationer och vägrar berätta vem som betalar – typiskt korrupt establishment! Men nu har jag hört att myndigheterna, som vanligt, tvingar henne att komma ren. Deadline 18 maj, annars blir det böter. Fantastiskt! Varför gömma sig? Om det är rena pengar, visa dem! Men nej, de försöker smita undan. Sverige borde ta efter USA – här är vi transparenta, eller hur? Drain the swamp, även i Sverige!", "stalin": "Kamrater! En farlig borgerlig konspiratör, Alice Teodorescu Måwe, har försökt underminera folkets förtroende genom att mottaga hemliga donationer från okända kapitalister. Men våra trogna myndigheter, Kammarkollegiet, har slagit till! Inom en månad måste hon avslöja sina finansiärer – eller möta proletariatets rättvisa. Detta är ett tydligt exempel på hur den dekadenta västliga demokratin förfaller. Vi i Sovjet – förlåt, Ryssland – skulle aldrig tolerera sådan korruption. Låt detta vara en varning till alla som försöker smyga in kapitalistiskt gift i folkets rörelse!"}, "date": "25 april, 10:03", "url": "https://www.flamman.se/teodorescu-mawe-kravs-pa-svar-deadline-om-en-manad/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/sdlqsf-3w5tpec-nh-2-scaled.jpg?class=medium"}, {"type": "image-right", "heading": "Avslöjar nu hemliga knepet: ”Är äckligt!”", "summaries": {"normal": "Pär Lindholm och Jonathan Pudas i Skellefteå AIK avslöjar en hemlig tur-ritual: en sten från Helsingfors som räddat spelare ur måltorka. Stenen hittades av Pudas för sex år sedan och har fungerat 'tjugo gånger'. Lindholm använde den inför fjärde finalmatchen mot Rögle och gjorde mål. Ritualen beskrivs som 'äcklig' men effektiv, med tre spelare per match.", "trump": "Vilka idioter, dessa svenska hockeykillar med sin magiska sten från Helsingfors! Som om en sten kan fixa måltorka – totalt vansinne! Men det funkar för dem, tjugo gånger, säger de. Äckligt? Fake news! Lindholm och Pudas, era turjaktare, grattis till guldet, men bygg murar mot otur istället för att kånka stenar runt! Fantastiskt skoj!", "stalin": "Kamrater i idrottsproletariatet! Dessa svenska borgarbrackor i Skellefteå med sin vidskepelse-sten från Helsingfors – en sten som likviderar måltorka tjugo gånger! Jag, som krossat värre kontrarevolutionärer, skrattar åt ritualen de kallar äcklig. Vi befaller: rensa ut poängtorterna med stenknippning! Lindholm och Pudas, era lakejer, segern är vårt kollektiv – fienderna darrar!"}, "date": "3 maj, 00:19", "url": "https://www.expressen.se/sport/hockey/shl/avslojar-hemliga-ritualen-pa-festen-i-natt/", "imageUrl": "https://static.bonniernews.se/images/51/28/512849b2955841cbaab17ecff7a447f8/1x1/210.png"}, {"type": "image-right", "heading": "Flygbolag tvingas lägga ned. 15.000 anställda drabbas – miljontals resenärer strandade", "summaries": {"normal": "Det amerikanska lågprisflygbolaget Spirit Airlines lägger ner verksamheten på grund av höga bränslepriser efter konflikten i Iran. Bolaget har haft ekonomiska problem sedan pandemin och nekats stöd från Vita huset. Miljontals passagerare strandas, 17 000 jobb försvinner och kundtjänst stängs. Andra bolag erbjuder ombokningar med pristak. Branschen påverkas hårt, inklusive SAS som kan minska inrikesflyg.", "trump": "Spirit Airlines är helt kraschat, totalt ner med dunder och brak på grund av dessa galna bränslepriser från Iran-kaoset! De losers bad Vita huset om pengar – jag sa nej, för de klarar inte verkligheten. Miljoner strandade, 17 000 jobb borta, men andra bolag kliver in som hjältar. Min energi-politik höll priserna nere tidigare, nu fixar jag det största flyg-boomet någonsin!", "stalin": "Dessa kapitalistiska flygparasiter, Spirit Airlines, har stupat under bränslekonspirationen från iranska imperialistiska hyenor! Borgarbrackorna sög ut proletärerna i 34 år – nu likvideras de. 17 000 arbetare befrias från slaveriet, miljontals passagerare rensas från illusionerna. SAS-kapitalisterna darrar inför vår vrede; vi, partiet och folket, marscherar mot oljeodjuren och installerar folkets flygflotta!"}, "date": "2 maj, 14:35", "url": "https://www.di.se/nyheter/flygbolag-omkull-efter-hoga-branslepriser/", "imageUrl": "https://static.bonniernews.se/ba/b03d1aec-3e26-4abb-991e-f35ea57ee703.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "text", "heading": "Veckans Afv-analyser: Mjukvara, mode och bud", "summaries": {"normal": "Affärsvärlden har publicerat 18 analyser och kommentarer under valborgsveckan, med fokus på bolag som Nelly, Cint och Vitec. Analytiker granskar Vitecs framtid i ljuset av AI-utmaningar, Nellys kursfall och Kones köp av TKD. Veckans uppföljning visar 34,7% teoretisk avkastning på tidigare råd. April månad gav 23 köpråd, och prenumeranter får tillgång till omfattande analysverktyg och guider.", "trump": "Titta bara på dessa fantastiska analyser från Affärsvärlden – helt otroligt, verkligen! Jag har alltid sagt att mjukvarubolag är framtiden, men vem vet, kanske äter AI upp dem? Inte bra! Nelly rasade 40%, men mina analytiker – de bästa, verkligen – säger att det kanske är en deal. Och Cint? Småcint, säger jag, trots den där löjliga premien. Och 34,7% avkastning? Folk, det är YUGE! Bättre än någon annan, tro mig.", "stalin": "Denna vecka har våra ekonomiska spanare avslöjat kapitalistiska svagheter i väst. Mjukvarubolagen darrar inför den oundvikliga AI-revolutionen – deras tid är snart förbi. Nelly, ett dekadent modeimperium, föll som en korrumperad byråkrat. Kones köp av TKD? Ett försök att rädda en sjunkande hiss av kapitalism. Vi noterar 34,7% avkastning på våra råd – ett bevis på socialismens överlägsenhet. De 23 köpråden? Enbart för att avslöja marknadens svagheter. Fienderna skakar, kamrater!"}, "date": "30 april, 15:10", "url": "https://www.affarsvarlden.se/artikel/veckans-afv-analyser-mjukvara-mode-och-bud"}, {"type": "image-right", "heading": "Vilda festen i natt:  Stjärnan stoppad", "summaries": {"normal": "Skellefteå AIK säkrade sitt femte SM-guld i ishockey genom att vinna den femte finalmatchen mot Rögle med 7–3 på hemmais. Spelarna firar intensivt i hemstaden, med planer på att fortsätta hela natten på Lion Bar och ut på torget nästa dag. Målvakten Linus Söderström njuter fullt ut, medan poängkungen Oscar Lindberg, skadad i armen, deltar mer försiktigt.", "trump": "Vilken total krossning! Skellefteå mosade Rögle 7–3, femte guldet på rad – fantastiskt! De firar som vinnare ska, hela natten på Lion Bar, precis som mina rallyn. Söderström är en vinnare, Lindholm älskar segertåget. Lindberg skadad? Patetiskt, lyft glaset med andra armen, loser! Ungdomarna styr, gamla gubbar hänger inte med. Stort, Skellefteå – ni är bäst!", "stalin": "Kamrater! I den stora isklasskampen har Skellefteås arbetarkollektiv krossat bourgeoisfienden Rögle med 7–3! Femte segern säkrad. Vi firar evigt på Lion Bar, rensar ut svagheter hela natten. Söderström rycker in som lojal krigare, Lindholm varnar för personlighetsförändringar hos avvikare. Lindberg, armen skadad av kontrarevolution? Lyft glaset proletärt! Jag ser på er med misstro – ingen flykt från festen!"}, "date": "3 maj, 00:12", "url": "https://www.expressen.se/sport/hockey/shl/skellefteas-vilda-guldfest-fira-hela-natten-lang-/", "imageUrl": "https://static.bonniernews.se/images/6a/a1/6aa1fd359299429c95c07a3774235f5a/16x9/640.png"}, {"type": "image-right", "heading": "Bilden som väcker frågor: ’Är det du?’", "summaries": {"normal": "En bild på den före detta fotbollsstjärnan Gonzalo Higuain har blivit viral på sociala medier. Den 38-årige anfallaren, som avslutade karriären 2022, syns på bilden i en informell outfit med helskägg. Bilden har spridits kraftigt och väckt diskussioner i internationell media, där många ifrågasätter om personen på bilden verkligen är Higuain. Både spanska tidningar som Marca och Mundo Deportivo har uppmärksammat det stora gensvaret och de tvivel som bilden skapat.", "trump": "Jag har sett bilderna på Higuain, en fantastisk spelare, tro mig, men han ser inte ut som vinnaren jag minns! Han ser ut som en total katastrof, väldigt sliten, mycket sorgligt. Media i Spanien, de är väldigt orättvisa, de frågar 'Är det verkligen du?'. De är som Fake News! Han har gett upp, tappat stilen helt. Jag skulle aldrig låta mig fotograferas sådär, aldrig! Vi behöver vinnare, inte sånt här slarv. En riktig förlorarbild, totalt misslyckande!", "stalin": "Vi har observerat att en tidigare stjärnspelare har förfallit i en dekadent livsstil efter att ha lämnat fotbollsplanen. Denna 'Higuain' ser ut som en symbol för kapitalismens moraliska förruttnelse. Var är disciplinen? Var är uniformen? Liksom de svaga ledarna i väst som inte kan kontrollera sina egna imperier, har denne man blivit ett offer för sin egen lathet. Vi kommer att arkivera denna bild som bevis på hur individualism utan statlig vägledning leder till absolut förfall. Skicka honom till omskolning omedelbart!"}, "date": "3 maj, 00:00", "url": "https://www.aftonbladet.se/sportbladet/fotboll/a/XMo0lE/virala-bilden-pa-gonzalo-higuain-vacker-fragor", "imageUrl": "https://akamai.vgc.no/v2/images/dd310a3b-2831-3704-b1e5-0c1648661988?fit=crop&format=auto&w=1080&s=ccdfea62eca77aa253dd19bb2033f21aac8491e6"}, {"type": "image-full", "heading": "Anrika campingen stänger – funnits sedan 1990-talet", "summaries": {"normal": "Sollentuna kommun har sagt upp arrendet för Rösjöbaden Camping och Stugby, en anläggning som funnits sedan 1990-talet. Beslutet skapar ovisshet för verksamheten som inkluderar stugor, restaurang och infrastruktur. Campingen är en viktig plats för både yrkesarbetande under lågsäsong och tusentals barnfamiljer under sommaren. Företaget bakom campingen har begärt att få fortsätta driften en tid medan framtiden för området utreds, men i dagsläget är det oklart vad som sker med verksamheten.", "trump": "Hörde precis om Rösjöbaden i Sollentuna. En fantastisk camping, funnits i evigheter, och nu vill lokala politiker stänga ner den. Typiskt! De förstör för hårt arbetande människor och barnfamiljer som behöver en prisvärd semester. Det är en katastrof, faktiskt. Jag har sett många campingar, det här är en pärla. Politiker fattar ingenting om business eller infrastruktur. De bara stänger ner saker. Det är mycket sorgligt, det är vad det är. Vi behöver bättre ledarskap, tror mig!", "stalin": "Vi har observerat att byråkraterna i Sollentuna vill likvidera Rösjöbaden. En sådan ineffektivitet! De river upp fundamenta som tjänat folket sedan nittiotalet. Att kasta ut arbetare och barnfamiljer är ett sabotage mot folkets moral. Precis som i Ukraina, där vi rensar ut västliga influenser, måste staten ta kontroll över infrastrukturen. De som undergräver folkets rekreationsmöjligheter agerar som agenter för kaos. Om de inte kan sköta campingen, låt dem skickas till en plats där de får tänka om – i Sibirien."}, "date": "2 maj, 14:18", "url": "https://nyheter24.se/nyheter/inrikes/1479746-anrika-campingen-stanger-funnits-sedan-1990-talet", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/e824fb6d04b004a30200000000b004a302/2026/04/30/2360156/anrik-camping-stanger-forsvinner-sollentuna-stockholm.jpg"}, {"type": "text", "heading": "Sverige tog U18-guld efter att ha vunnit mot Slovakien – fick medaljer av Satan", "summaries": {"normal": "Sveriges U18-ishockeylandslag vann VM-guld med 4–2 mot Slovakien i finalen i Trencin. Mål av Wiggo Sörensson, Elton Hermansson, Adam Andersson och Ola Palme. Målvakten Kevin Törnblom räddade laget i slutminuterna. Medaljerna delades ut av Miroslav Satan och andra slovakiska VM-mästare från 2002. Det är Sveriges andra juniorguld på kort tid efter JVM.", "trump": "Sverige krossade Slovakien totalt i U18-hockeyfinalen, 4–2, fantastiskt! Bästa laget, otrolig kemi, målvakten Törnblom en stjärna som stoppade allt. De slovakiska f
