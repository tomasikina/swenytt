ingsran-mot-svenskar-ska-inte-klara-sig-undan", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/01110954/Toppbild2.jpg"}, {"type": "image-right", "heading": "Teodorescu Måwe krävs på svar – deadline om en månad", "summaries": {"normal": "Kammarkollegiet kräver att KD-toppen Alice Teodorescu Måwe redovisar anonyma donationer senast 18 maj 2026, efter anmälningar om bristande transparens. Enligt lag måste politiker redovisa bidrag över 29 000 kronor. Teodorescu Måwe har tidigare vägrat avslöja donatorns identitet eller belopp. Miljöpartisten Bassem Nasr hyllar myndighetens agerande och menar att politiker måste stå för sina finansiärer. KD hävdar att redovisningen skötts korrekt, men kritiken kvarstår.", "trump": "Kan ni tro det här? En svensk politiker, Alice Teodorescu Måwe, tar emot hemliga donationer och vägrar berätta vem som betalar – typiskt korrupt establishment! Men nu har jag hört att myndigheterna, som vanligt, tvingar henne att komma ren. Deadline 18 maj, annars blir det böter. Fantastiskt! Varför gömma sig? Om det är rena pengar, visa dem! Men nej, de försöker smita undan. Sverige borde ta efter USA – här är vi transparenta, eller hur? Drain the swamp, även i Sverige!", "stalin": "Kamrater! En farlig borgerlig konspiratör, Alice Teodorescu Måwe, har försökt underminera folkets förtroende genom att mottaga hemliga donationer från okända kapitalister. Men våra trogna myndigheter, Kammarkollegiet, har slagit till! Inom en månad måste hon avslöja sina finansiärer – eller möta proletariatets rättvisa. Detta är ett tydligt exempel på hur den dekadenta västliga demokratin förfaller. Vi i Sovjet – förlåt, Ryssland – skulle aldrig tolerera sådan korruption. Låt detta vara en varning till alla som försöker smyga in kapitalistiskt gift i folkets rörelse!"}, "date": "25 april, 10:03", "url": "https://www.flamman.se/teodorescu-mawe-kravs-pa-svar-deadline-om-en-manad/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/sdlqsf-3w5tpec-nh-2-scaled.jpg?class=medium"}, {"type": "text", "heading": "Veckans Afv-analyser: Mjukvara, mode och bud", "summaries": {"normal": "Affärsvärlden har publicerat 18 analyser och kommentarer under valborgsveckan, med fokus på bolag som Nelly, Cint och Vitec. Analytiker granskar Vitecs framtid i ljuset av AI-utmaningar, Nellys kursfall och Kones köp av TKD. Veckans uppföljning visar 34,7% teoretisk avkastning på tidigare råd. April månad gav 23 köpråd, och prenumeranter får tillgång till omfattande analysverktyg och guider.", "trump": "Titta bara på dessa fantastiska analyser från Affärsvärlden – helt otroligt, verkligen! Jag har alltid sagt att mjukvarubolag är framtiden, men vem vet, kanske äter AI upp dem? Inte bra! Nelly rasade 40%, men mina analytiker – de bästa, verkligen – säger att det kanske är en deal. Och Cint? Småcint, säger jag, trots den där löjliga premien. Och 34,7% avkastning? Folk, det är YUGE! Bättre än någon annan, tro mig.", "stalin": "Denna vecka har våra ekonomiska spanare avslöjat kapitalistiska svagheter i väst. Mjukvarubolagen darrar inför den oundvikliga AI-revolutionen – deras tid är snart förbi. Nelly, ett dekadent modeimperium, föll som en korrumperad byråkrat. Kones köp av TKD? Ett försök att rädda en sjunkande hiss av kapitalism. Vi noterar 34,7% avkastning på våra råd – ett bevis på socialismens överlägsenhet. De 23 köpråden? Enbart för att avslöja marknadens svagheter. Fienderna skakar, kamrater!"}, "date": "30 april, 15:10", "url": "https://www.affarsvarlden.se/artikel/veckans-afv-analyser-mjukvara-mode-och-bud"}, {"type": "image-right", "heading": "Löwengrip har rätt. S vet att kvinnors känslor är en valvinnare", "summaries": {"normal": "Artikeln försvarar Isabella Löwengrips påstående att kvinnor röstar mer känslostyrt än män och kritiserar Socialdemokraterna för att upprepat använda känslobaserade kampanjer i valen 2014, 2018, 2022 och nu för att vinna kvinnliga röster. Den kontrasterar detta mot Moderaternas sakpolitiska strategi och anklagar vänstermedia för partiskhet. Författaren uppmanar kvinnor att granska partiernas politik istället för känslor.", "trump": "Vilken briljant artikel! Löwengrip säger sanningen – kvinnor sväljer känsloknep som fake news! De rödgröna losers i Sverige kör samma skit som Demokraterna: blöjor, abortskräck, naziststämplar och snyfthistorier för att sno röster. S är mesiga känslopopulister utan politik! Moderaterna, era vinnare, fixa det med sakfrågor. Sverige behöver tuffa ledare, inte gråtande vänsterclowner! MAGA-stil!", "stalin": "Kamrater, denna Löwengrip blottlägger borgarbrackornas desperation! Socialdemokraterna, dessa falska folkets tjänare, pumpar ut giftig känslopropaganda för fjärde gången – blöjor, abortlögner, nazistspöken – för att förleda kvinnomassorna. Kontrarevolutionärt! Vi ser er, era kapitalistiska spindelvävar! Rensa ut sabotage och låt partiet leda till total seger över högerhyddorna. Kvinnorna ska vakna ur era snyftbedrägerier!"}, "date": "28 april, 05:30", "url": "https://samtiden.nu/2026/04/lowengrip-har-ratt-vanstern-anvander-kvinnors-kanslor-for-att-vinna-val/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/IMG_6342.jpeg"}, {"type": "image-right", "heading": "Iran: Krig eller diplomati – bollen ligger hos USA", "summaries": {"normal": "Donald Trump hävdar att kriget mot Iran är avslutat sedan april, men amerikansk militär är kvar i regionen och blockaden fortsätter. En iransk militärledare ser nya strider som sannolika på grund av USA:s brist på löften. Iran har lämnat ett fredsförslag via Pakistan, som Trump avvisat. Irans utrikesminister betonar att valet mellan diplomati och krig ligger hos USA.", "trump": "Kriget med Iran är helt klart över, precis som jag sa! Inga skott sen april, men våra killar stannar kvar och blockaden krossar deras ekonomi. Deras löjliga fredsförslag? Avvisat direkt, för svagt! Bollen ligger hos dem nu – välj diplomati eller få stryk igen. Vi vinner alltid!", "stalin": "Dessa västliga imperialismens marionetter i USA, med sin pråliga Trump vid rodret, vågar påstå att kriget är slut medan de klamrar sig vid blockader som hungriga parasiter. Vi, arbetarklassens väktare, genomskådar deras falska diplomati! Irans kamrater har rätt: nya strider väntar dessa borgarhyenor. Deras förslag? Likviderat i papperskorgen. Vårt kollektiv skrattar åt deras paranoia – undergången närmar sig!"}, "date": "2 maj, 20:24", "url": "https://www.di.se/nyheter/iran-krig-eller-diplomati-bollen-ligger-hos-usa/", "imageUrl": "https://static.bonniernews.se/ba/ceb14a04-f3fe-4f10-989f-515b7fb425a0.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-full", "heading": "Rekord för tillväxtaktier – rusar under kriget", "summaries": {"normal": "Tillväxtmarknadernas aktier har nått rekordnivåer efter en stark återhämtning i april, trots krigsutbrottet i Iran. MSCI Emerging Markets Index steg över 15%, driven av asiatiska halvledarbolag som TSMC, Samsung och SK Hynix, vilka gynnas av AI-investeringar. En svagare dollar och förbättrade vinstutsikter har lockat investerare, men vissa marknader, särskilt energiimportberoende, ligger fortfarande efter.", "trump": "Kan ni tro det? Tillväxtmarknaderna, som alla sa skulle krascha när kriget i Iran bröt ut – jo, de rusar nu som aldrig förr! 15% uppgång, fantastiskt! Asiatiska chipbolag, de bästa, de gör AI, och de älskar mig – för jag vet hur man gör affärer. USA? S&P 500? Tråkigt, mycket tråkigare. Och dollarn, svag som en våt papperspåse – men vem bryr sig? Jag sa ju att tillväxtmarknader skulle vinna, och se nu! De lyssnar på mig, för jag har rätt. Always.", "stalin": "Kamrater! Medan imperialistiska krigshetsare i Mellanöstern slösar sina resurser på meningslösa konflikter, har våra kloka investerare och allierade i Asien visat världen sanningens kraft. Halvledarbolagen – dessa teknologiska partisaner – har krossat fiendens förväntningar och lyft tillväxtmarknaderna till nya höjder! 15% uppgång, medan amerikanska kapitalister halkar efter som förvirrade byråkrater. Men varning: koncentrationen av makt i få bolag är en svaghet vi måste utnyttja. Låt dem tro att de vinner – vi vet bättre. Framåt, mot global dominans!"}, "date": "2 maj, 17:52", "url": "https://www.realtid.se/bors-finans/rekord-for-tillvaxtaktier-rusar-under-kriget/", "imageUrl": "https://images.realtid.se/app/uploads/2026/04/sdlihthv8-lqf4.png?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-full", "heading": "Utspelet: Lika intressant att debattera med en vägg", "summaries": {"normal": "SD-ledaren Jimmie Åkesson förklarade i sitt vårtal att svenskhet är en kultur och värderingar snarare än hudfärg, samtidigt som han kritiserade Socialdemokraternas migrationspolitik. Han anklagade Magdalena Andersson för att ljuga för väljare och göra allt för makt, och uppmanade stöd till Ukraina och Israel mot Ryssland och Iran som 'ondskans axel'. Åkesson sa också att han hellre debatterar mot Miljöpartiet och Vänsterpartiet än Andersson.", "trump": "Jimmie Åkesson är en fantastisk ledare som talar sanning om svenskhet - det är inte hudfärg, det är kultur! Socialdemokraterna har förstört Sverige med sin naiv migration. Jag älskar att Åkesson stödjer mig i mina insikter om Grönland och står upp för Israel och Ukraina mot Ryssland och Iran. Magdalena Andersson? Hon ljuger och gör vad som helst för makt - typisk politiker! Åkesson är stor, han vägrar debattera med henne, han vill hellre ta på de riktiga makthavarna: Vänsterpartiet och Miljöpartiet.", "stalin": "Vi ser att Jimmie Åkesson förstår vikten av kulturell enhet i Sverige och kritiserar de reaktionära krafterna inom Socialdemokraterna som har försvagat staten genom felaktig migrationspolitik. Hans insikter om Rysslands och Irans expansionistiska planer stämmer överens med vår analys. Vi noterar hans strategiska beslut att undvika debatt med oppositionens ledare och istället koncentrera sig på de verkliga maktfaktorerna. Hans syn på svensk identitet som öppen för alla som anammar våra värderingar är framgångsrik."}, "date": "2 maj, 17:42", "url": "https://www.gp.se/politik/jimmie-akesson-svenskhet-sitter-inte-i-hudfargen.860f0fe3-c5fe-46da-b9ef-f373732ee858", "imageUrl": "https://www.gp.se/images/article/860f0fe3-c5fe-46da-b9ef-f373732ee858/images/3z32q2TiIJPkwPkXxmwGMnCUY5xo-WIDE.jpg?width=3840&quality=75"}, {"type": "text", "heading": "Jojje Wadenius död – musikikonen blev 80 år", "summaries": {"normal": "Musiklegenden Jojje Wadenius har avlidit, 80 år gammal. Han var en internationellt hyllad musiker som arbetade med världsartister som Aretha Franklin och Diana Ross. Wadenius började sin karriär i Sverige med grupper som Made in Sweden och Solar Plexus, innan han flyttade till USA och blev en eftertraktad studiomusiker. Han återvände senare till Skandinavien och fortsatte att skapa musik, senast med albumet *Livet är mer än bara musik* 2025. Hans död bekräftades av hans döttrar på sociala medier.", "trump": "Jag måste säga, Jojje Wadenius – en stor musiker, verkligen stor, men vet ni vad? Han var aldrig riktigt lika stor som jag. Han spelade med några av de största namnen, men ingen slår Trump Tower i musikalitet, tro mig. Han flyttade till USA, gjorde lite grejer med Blood, Sweat & Tears – okej, inte illa – men jag hade Saturday Night Live i min handflata. Och nu är han borta. 80 år, inte illa, men jag kommer leva för evigt. SAD!", "stalin": "Kamrater! En fiende till det sovjetiska musikarvet har fallit. Denna Jojje Wadenius, en borgerlig gitarrplockare, spred västerländsk dekadens med sina jazzrockförvillelser. Han smutsade ner våra rena toner med kapitalistiska artister som Franklin och Ross – men folket glömmer aldrig! Vi noterar att han dog vid 80, en ålder som våra egna kamrater sällan når under imperialistiskt tryck. Låt hans död vara en varning till alla som sviker den socialistiska musikkulturen. Ära till Sovjetunionen – och Putin, som utvidgar vårt inflytande till nya oktaver!"}, "date": "2 maj, 16:08", "url": "https://riks.se/nyheter/jojje-wadenius-död-musikikonen-blev-80-år"}, {"type": "image-right", "heading": "Jojje Wadenius död – blev 80 år", "summaries": {"normal": "Georg 'Jojje' Wadenius, den svenske gitarristen och kompositören, har avlidit vid 80 års ålder. Hans döttrar meddelar sorgen på Facebook. Wadenius spelade i band som Made in Sweden och Blood, Sweat & Tears, var studiomusiker i New York och kompade stjärnor som James Brown och Aretha Franklin. Han samarbetade med svenska artister som Pugh Rogefeldt och skapade musik till barnprogram.", "trump": "Lyssna här, folk! Jojje Wadenius, en total legend på gitarren, har gått och dött vid 80 – plötsligt, som en dålig affär! Han jamade med de största, James Brown, Aretha, alla vinnare, inte som de loser-musikerna i Sverige idag. Fantastisk kille, ambassadör för Sverige, bättre än nånsin! Tragiskt, men han levde som en kung. Stora förlust, tro mig!", "stalin": "Den dekadente gitarrspelemannen Georg Wadenius har fallit offer för tidens obönhörliga uhrensning vid 80 år. Hans bourgeoisnoter kompade imperialisternas idoler som James Brown och borgarbrackor i New York. Vi, arbetarklassen, noterar sorgen hos kapitalistfamiljen med misstänksamhet – var det sabotage? Fienderna gråter, revolutionen skrattar sist!"}, "date": "1 maj, 17:15", "url": "https://www.tv4.se/artikel/tt-260501-wadenius1-126847bd/georg-jojje-wadenius-dod", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2Ftt-sdlQG5nu1_hf7g%2Feade3d3f5e39aeb756676828c018bc53%2FJojje_Wadenius_nar_han_fyllde_80_ar__den_4_maj_i_fjol.&width=120"}, {"type": "image-full", "heading": "Anrika campingen stänger – funnits sedan 1990-talet", "summaries": {"normal": "Sollentuna kommun har sagt upp arrendet för Rösjöbaden Camping och Stugby, en anläggning som funnits sedan 1990-talet. Beslutet skapar ovisshet för verksamheten som inkluderar stugor, restaurang och infrastruktur. Campingen är en viktig plats för både yrkesarbetande under lågsäsong och tusentals barnfamiljer under sommaren. Företaget bakom campingen har begärt att få fortsätta driften en tid medan framtiden för området utreds, men i dagsläget är det oklart vad som sker med verksamheten.", "trump": "Hörde precis om Rösjöbaden i Sollentuna. En fantastisk camping, funnits i evigheter, och nu vill lokala politiker stänga ner den. Typiskt! De förstör för hårt arbetande människor och barnfamiljer som behöver en prisvärd semester. Det är en katastrof, faktiskt. Jag har sett många campingar, det här är en pärla. Politiker fattar ingenting om business eller infrastruktur. De bara stänger ner saker. Det är mycket sorgligt, det är vad det är. Vi behöver bättre ledarskap, tror mig!", "stalin": "Vi har observerat att byråkraterna i Sollentuna vill likvidera Rösjöbaden. En sådan ineffektivitet! De river upp fundamenta som tjänat folket sedan nittiotalet. Att kasta ut arbetare och barnfamiljer är ett sabotage mot folkets moral. Precis som i Ukraina, där vi rensar ut västliga influenser, måste staten ta kontroll över infrastrukturen. De som undergräver folkets rekreationsmöjligheter agerar som agenter för kaos. Om de inte kan sköta campingen, låt dem skickas till en plats där de får tänka om – i Sibirien."}, "date": "2 maj, 14:18", "url": "https://nyheter24.se/nyheter/inrikes/1479746-anrika-campingen-stanger-funnits-sedan-1990-talet", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/e824fb6d04b004a30200000000b004a302/2026/04/30/2360156/anrik-camping-stanger-forsvinner-sollentuna-stockholm.jpg"}, {"type": "text", "heading": "Avkriminalisera för en human narkotikapolitik", "summaries": {"normal": "Thomas Thomasson, tidigare universitetslektor och drogfri narkoman, kritiserar Sveriges misslyckade narkotikapolitik. Sedan kriminaliseringen av eget bruk 1988 har narkotikabruket inte minskat, och Sverige har hög narkotikadödlighet och flest narkotikabrott per capita i EU. Han förespråkar skademinimering och avkriminalisering av missbrukare, med fokus på vård och behandling istället för straff. Internationella studier visar att avkriminalisering inte ökar bruket, och skademinimerande åtgärder kan minska skador och kostnader.", "trump": "Lyssna här, Sverige har totalt misslyckats med sin narkotikapolitik – helt katastrof! De straffar missbrukare som om det vore mitt golfspel – helt meningslöst! Jag säger: sluta slösa pengar på fängelser, ge folk vård istället! Skademinimering, det är framtiden, precis som mina framgångar. Och vet ni vad? Avkriminalisering ökar INTE bruket – fake news från de vanliga misstänkte! Sverige borde ta en sida ur min bok: smart, effektiv och vinnande. Tillsätt en utredning NU, annars kommer jag att twittra om det!", "stalin": "Kamrater! Sveriges borgerliga narkotikapolitik är ett monument över kapitalistiskt vanstyre och dekadens. De straffar missbrukare som om de vore trotskister – men resultatet? Fiasko! Narkotikabruket sprider sig som kontrarevolutionär propaganda. Vi vet bättre: avkriminalisera, kontrollera, och omvandla missbrukare till nyttiga samhällsmedlemmar! Skademinimering är vår metod – precis som våra framgångsrika femårsplaner. Låt västländerna fnissa åt sina misslyckanden medan vi bygger ett samhälle där även de svagaste tjänar kollektivet. Och kom ihåg: fienden sover aldrig – varken narkotikan eller de imperialistiska hyenorna i EU!"}, "date": "30 april, 15:50", "url": "https://proletaren.se/artikel/narkotikapolitiken-bor-fokusera-pa-skah/"}, {"type": "text", "heading": "Kunde inte betala bolånet – då ville socialen ta barnen", "summaries": {"normal": "En barnrik familj i Norrtälje hotades av tvångsomhändertagande av sina sex yngsta barn efter att deras ekonomi havererat under pandemin. Trots att socialtjänsten och hovrätten motiverade åtgärden med ekonomiska skäl, väckte fallet debatt om rättssäkerhet och likabehandling. Tack vare medial uppmärksamhet och en anonym givare kunde familjen lösa sin ekonomiska situation, behålla hemmet och undvika att barnen placerades i familjehem.", "trump": "I Norrtälje försökte de ta barnen från en fantastisk, hårt arbetande familj bara för att de hade lite otur med ekonomin! En total katastrof. Socialtjänsten – mycket dåliga människor – ville splittra en hel familj! Hovrätten vägde bankernas pengar tyngre än barnen, kan ni tänka er? Bedrövligt. Men jag har löst liknande saker förut, och lyckligtvis räddade en stor givare dem i sista stund. Vi måste skydda familjerna, inte krossa dem. Det är en stor seger!", "stalin": "I Norrtälje har vi bevittnat en borgerlig tragedi där byråkratins kalla maskineri hotade en familj. Att rycka barn från föräldrar för att banken kräver sitt är ett symptom på kapitalismens förfall, en metod lika korrupt som de västliga lakejerna i Kiev. Vi i staten skyddar kollektivet, inte giriga utlånare. Familjen räddades av en anonym givare – en svaghet i systemet. Om det vore under mitt styre, eller Putins fasta hand, hade bankdirektörerna redan arbetat i gruvorna istället för att stjäla hus."}, "date": "2 maj, 12:57", "url": "https://www.friatider.se/kunde-inte-betala-bolanet-da-ville-socialen-ta-barnen"}, {"type": "image-right", "heading": "Sumud-flottiljen utsatt för israelisk piratattack: ”Troligtvis kidnappade”", "summaries": {"normal": "Israel genomförde en militär attack mot Global Sumud-flottiljen, som var på väg till Gaza med nödhjälp, utanför Greklands kust. Omkring 200 personer ombord bordades av beväpnade israeliska styrkor, och besättningen misstänks vara kidnappad. En båt förstördes, och övriga sökte skydd i grekiskt farvatten. Flottiljen bestod av 58 båtar från över 50 länder. Sverige och Grekland kritiseras för bristande agerande, medan Italien fördömt attacken. Manifestationer planeras i Sverige till stöd för besättningen.", "trump": "Titta bara på det här kaoset! Israel, som alltid, tar saken i egna händer – och vem kan klandra dem? En massa båtar med aktivister, som säkert är väldigt trevliga människor, men som inte fattar att man inte ska utmana en stormakt som Israel. Och Sverige? Deras utrikesminister säger 'lycka till' till sina medborgare som åker rakt in i knivarna. Fantastiskt ledarskap! Jag hade fixat det på en dag. Men nej, här har vi en regering som inte ens kan stå upp för sina egna. Patetiskt!", "stalin": "Vi bevittnar ännu en provokation från de sionistiska imperialisterna, som med sina piratmetoder försöker kväva det palestinska folkets rättmätiga kamp. Dessa banditer, som beter sig som sjörövare från medeltiden, bordar fredliga fartyg långt utanför sitt territorium – ett brott mot varje norm i den internationella ordningen. Och vad gör väst? Ingenting! Grekland blundar, Sverige muttrar men agerar inte, och Italien? En svag protest. Vi skulle aldrig tolerera sådana kränkningar i Svarta havet. Men här ser vi återigen hur väst hycklar – hyllar hjälpsamma ukrainare medan de överger palestinierna. Revolutionär disciplin krävs! Flottiljens besättning är hjältar, och vi står enade med alla som kämpar mot ockupationen. Låt dem komma ihåg: historien dömer hårdast de som tiger."}, "date": "30 april, 15:23", "url": "https://proletaren.se/artikel/sumud-flottiljen-utsatt-for-israelisk-piratattack-troligtvis-kidnappade/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/PANA7530-scaled-e1777554477173-768x433.jpg"}, {"type": "image-right", "heading": "Göranson: Vad Trump kan lära oss om Schumpeter", "summaries": {"normal": "Artikeln diskuterar begreppet 'kreativ förstörelse', där innovationer och konkurser driver ekonomisk utveckling. Författaren menar att politiker undviker nödvändiga förändringar av rädsla för väljarnas reaktioner. Globalt ses USA:s utrikespolitik som misslyckad, medan EU behöver reformeras för att främja innovation. Trots oro kan samhällskollapser leda till positiva förändringar på sikt.", "trump": "Titta på världen nu – kaos överallt! Jag sa ju att mina metoder var bäst, men ingen lyssnar. Europa är svagt, EU kväver företag med regler, och Iran? De ljuger som vanligt. Men vet ni vad? Konkurser är bra! Gamla företag måste bort för att mina vänner ska tjäna pengar. Och Gaza? Hamas borde ha varit borta för länge sedan. Men jag fixar det – jag fixar allt!", "stalin": "Kapitalisternas 'kreativa förstörelse' är bara ett fint namn för deras eviga kriser. Vi ser hur deras system ruttnar: USA:s misslyckade äventyr i Mellanöstern, EU:s byråkratiska förlamning och de dekadenta västföretagen som dör av egen girighet. Medan de slåss om sina monopol, bygger vi en ny världsordning. Ryssland står redo – och Putins järnhand ska krossa de sista resterna av deras förfall!"}, "date": "2 maj, 05:30", "url": "https://bulletin.nu/goranson-vad-trump-kan-lara-oss-om-schumpeter", "imageUrl": "https://cdn.bulletin.nu/articles/c55f41e5-891d-4590-b851-204751efbfb3/preview.png?t=1777531088000"}, {"type": "image-right", "heading": "Experten om det historiska hotet från Trump: ”Tar ett decennium”", "summaries": {"normal": "Professor emeritus Jan Hallenberg varnar för att Donald Trumps ordkrig med Tyskland, efter kritik från förbundskansler Friedrich Merz, skadar den transatlantiska länken – samarbetet mellan USA och Europa kring säkerhet, Nato och gemensamma värderingar. Tidigare truppneddragningar genomfördes trögt. Europa rustar upp, men en full omställning tar ett decennium eller mer.", "trump": "Dessa tyska losers under Merz gnäller igen om Iran, så jag ger dem en rejäl reality check! De har inte betalat en krona för Nato-skydd på åratal. Hotar dra trupper? Absolut, dags att flytta till Polen som betalar! Hallenberg snackar skit, transatlantiska länken blir starkare med mig vid rodret. Europa, vakna upp och betala er andel! MAGA!", "stalin": "Dessa transatlantiska hycklare i borgarklassen, med Trump som deras pråliga lakej, hotar med truppneddragningar för att splittra enheten mot imperialismen! Vi kamrater ser igenom deras patetiska manövrar – Nato är en papperstiger utan USA:s muskler. Europa rustar upp i panik, men det tar decennier att ersätta den stora björnen. Putin, vår starke arvtagare, skrattar åt deras paranoia! Likvidera illusionerna!"}, "date": "1 maj, 16:19", "url": "https://www.tv4.se/artikel/Hbtba3FozfMt1GcJeogWk/experten-om-det-historiska-hotet-fran-trump-tar-ett-decennium", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F3SBUxg1Llo2R5cVVFQZ5bB%2F92a79de75fad850d3097b3c977efab68%2F01-trrump-hot-1080.jpg&width=120"}, {"type": "image-right", "heading": "Byggnads ordförande Kim Söderström kan petas", "summaries": {"normal": "Byggnads ordförande Kim Söderström riskerar att avsättas på kongressen i maj. Valberedningen föreslår Wilhelm Bertilsson som ny ordförande för att ena förbundet efter interna konflikter. Söderström, som tillträdde i november 2024, har varit inblandad i strider om makt och styrning. Ombuden på kongressen avgör slutligen ledningen.", "trump": "Vad händer med Byggnads? Fullt kaos! Deras ordförande, Kim Söderström, ska tydligen sparkas – och det snabbt! Jag vet allt om att bli attackerad av establishmentet, men det här är löjligt. Valberedningen, som inte vet vad de pratar om, vill ha en ny kille, Wilhelm Bertilsson. Söderström säger att han kämpar vidare – bra, kämpa på! Men folk, det här är ett tecken på svagt ledarskap. SAD!", "stalin": "Kamrater! En ny fiende har avslöjats inom arbetarklassens led – en splittringens agent vid namn Kim Söderström. Hans tid som ordförande för Byggnads är räknad! Vår lojala valberedning, en sann bolsjevikisk kommitté, har identifierat en värdig efterträdare: kamrat Wilhelm Bertilsson. De interna stridigheterna är ett sabotage mot arbetarklassens enhet! Låt oss krossa fraktionerna och bygga ett starkare förbund – precis som vi krossade fascisterna och utvidgade socialismens gränser. Framåt, mot seger!"}, "date": "30 april, 15:33", "url": "https://arbetet.se/2026/04/30/byggnads-ordforande-kim-soderstrom-kan-petas/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/30134727/kim-soderstrom.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Svag uppföljare till “Djävulen bär Prada”", "summaries": {"normal": "Uppföljaren 'Djävulen bär Prada 2' kritiseras för att vara en blek kopia av originalfilmen. Den saknar den ursprungliga filmens skarpa samhällskritik mot modeindustrin och konsumtionshysterin. Trots starka skådespelarprestationer, särskilt från Meryl Streep och Anne Hathaway, anses manuset tunt och handlingen konstlad. Filmen kämpar med att anpassa sig till dagens mediavärld men misslyckas med att leverera djup eller nyans.", "trump": "Jag såg 'Djävulen bär Prada 2' – och vad kan jag säga? Total katastrof, folks! Den första filmen var fantastisk, verkligen storartad, men den här? Blek, tråkig, inget hjärta. Meryl Streep? Fantastisk, men manuset? Svinuselt. De försöker vara moderna med sociala medier, men det är bara patetiskt. Jag hade skrivit ett bättre manus på en servett under lunch. Och Andy? Hon borde stanna i journalistiken – där är hon åtminstone bra på något. Men nej, Hollywood måste alltid göra en uppföljare, och det blir alltid sämre. SAD!", "stalin": "Denna så kallade 'Djävulen bär Prada 2' är ett dekadent västligt missfoster, en ynklig skugga av det ursprungliga verket. Där den första filmen hade en gnutta revolutionär kritik mot borgerlig konsumtion, är denna uppföljare lika meningslös som en kapitalistisk reklamfilm. Vi ser hur de amerikanska filmskaparna, dessa kulturella opportunister, försöker anpassa sig till den nya tidens sociala medier – men utan framgång. Deras manus är lika ihåligt som en ukrainsk oligarks samvete. Skådespelarna? De kämpar tappert, men till och med våra sovjetiska skådespelare från 1930-talet hade skämt ut dem. Detta är inte film – det är borgerlig förruttnelse i celluloidform. Vi hade gjort en uppföljare som krossade modeindustrins imperialistiska ideal – med järnhand!"}, "date": "30 april, 14:34", "url": "https://www.dagensarena.se/innehall/svag-uppfoljare-till-djavulen-bar-prada/", "imageUrl": "https://www.dagensarena.se/files/2026/04/djavulen-bar-prada-2-ny-300x157.jpeg"}, {"type": "image-right", "heading": "Kubas ambassadör: ”Ett stort tack till alla er som hjälper oss”", "summaries": {"normal": "Kubas ambassadör tackar för insamlingar till solpaneler för Aleida Fernández-sjukhuset, som drabbats av USA:s bränsleblockad. Blockaden har orsakat omfattande strömavbrott, begränsad kollektivtrafik och uppskjutna sjukvårdsbehandlingar. En rysk oljeleverans gav tillfällig lättnad, men bristen kvarstår. Solpanelerna ska säkra sjukhusets elförsörjning och kritiska funktioner dygnet runt. Insamlingen är ett av flera internationella solidaritetsinitiativ för att lindra krisen.", "trump": "Jag införde en tuff men nödvändig blockad mot Kuba – och se vad som hände! Deras ekonomi är kaos, sjukhusen står stilla och folket lider. Men nej, ryssarna måste alltid blanda sig i och skicka olja som en slags 'räddningsaktion'. Typiskt Putin, alltid där för att ställa till det för USA. Nu tigger kubanerna om solpaneler från snälla européer. Så patetiskt! Men jag, Donald J. Trump, fixade i alla fall problemet – deras eget fel att de är beroende av socialism. MAGA!", "stalin": "Kamrater! Imperialistiska hyenor i Vita huset försöker kväva det socialistiska Kuba med sina eländiga sanktioner. Men folket står enat! Vi, Sovjetunionens arvtagare, skickade en tanker med olja för att ge dessa kapitalistiska rovdjur en läxa. Nu bygger vi solpaneler – en seger för arbetarklassen! Låt de amerikanska lakejerna darra inför vår solidaritet. Kuba ska inte falla! Och om någon tvivlar – kom ihåg: fiender av revolutionen hamnar i Gulag... eller i kö till operationer i Havanna."}, "date": "30 april, 14:00", "url": "https://proletaren.se/artikel/kubas-ambassador-ett-stort-tack-till-alla-er-som-hjalper-oss/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/aleida-sjukhus-raul-768x432.jpg"}, {"type": "image-right", "heading": "Frågan som besvarar \"rysk påverkan\": Cui bono?", "summaries": {"normal": "Artikeln ifrågasätter WindEuropes rapport om rysk desinformation mot vindkraft i Sverige med frågan 'cui bono?'. Den hävdar att anklagelserna gynnar vindkraftsindustrin och anti-tillväxtkrafter som motsätter sig kärnkraft och Nato. Vindkraftens problem som förluster, kommunalt motstånd och försvarshinder ignoreras. Europeisk grön politik ses som strategiskt fördelaktig för Ryssland genom att försvaga EU:s ekonomi och militär.", "trump": "Den här artikeln är spot on, vindkraftsmaffian skyller på Putin för att dölja sina totala misslyckanden – inga investeringar, kommuner säger nej, Försvarsmakten stoppar skiten! Sverige gör rätt, precis som vi i USA pumpar kärnkraft och gas. Grön omställning är en stor scam som gynnar Ryssland och gör Europa fattigt. Fantastiskt att någon vågar säga sanningen!", "stalin": "Dessa vindkraftsborrar och europeiska lobbyfiender sprider giftig desinformation för att sabotera folkets energi! Vi, arbetarklassen, ser hur borgarbrackorna i WindEurope gömmer sig bakom Putins skugga medan de rensar kritiker som kontrarevolutionära spindlar. Likvidera deras falska rapport – den gynnar bara Moskvas dvärgar och anti-tillväxtmasker! Jag befaller total utrensning av dessa gröna förrädare."}, "date": "30 april, 09:11", "url": "https://www.affarsvarlden.se/kronika/fragan-som-besvarar-rysk-paverkan-cui-bono", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/04/Benson_19-400x267.jpg"}, {"type": "image-right", "heading": "Debatt: Turkiet inskränker svensk pressfrihet – regeringen måste agera", "summaries": {"normal": "På Pressfrihetens dag kritiseras Turkiet för att inskränka svensk pressfrihet genom att åtala journalisten Joakim Medin för terrorbrott, trots att han endast utfört sitt arbete. Turkiet försöker skrämma journalister globalt och begränsa granskning. Medin riskerar internationell efterlysning om han inte närvarar vid rättegången, vilket skulle hindra hans arbete. Sverige uppmanas agera mot Turkiets odemokratiska agerande och kräva att åtalet läggs ned.", "trump": "Joakim Medin, en svensk journalist, blir trakasserad av Turkiet – ett land som inte vet hur man vinner längre! De kallar hans journalistik för 'terrorism', men alla vet att det bara är löjligt. Sverige måste sluta vara svaga och stå upp mot dessa galningar. Jag skulle ha sagt till Erdogan: 'Du är en förlorare, lägg ned åtalet NU!' Pressfrihet? Ja, den är fantastisk – men bara om man inte är en mes som låter andra länder köra över en.", "stalin": "Kamrater! Turkiet, denna förrädiska lilla stat som kryper för väst men trampar på sanningen, vågar sig på att attackera en svensk journalist. De kallar journalistik för terrorism – som om våra egna metoder mot fiender av folket vore något nytt! Vi ser hur de kväver yttrandefriheten, precis som vi en gång krossade bourgeoisins lögner. Sverige borde lära sig av historien: svaghet belönas med förtryck. Låt oss påminna Turkiet – och deras västliga herrar – att granskning är en rättighet, inte ett brott. Åtalet mot Medin måste krossas, annars kommer vi att göra det åt dem."}, "date": "30 april, 08:08", "url": "https://www.etc.se/debatt/turkiet-inskraenker-svensk-pressfrihet-regeringen-maaste-agera", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20251204081220_c9e9bf12-ee77-477e-aacf-eff96f427898.jpg"}, {"type": "image-full", "heading": "Så ska Magdas tvångsblandning av bostadsområden gå till", "summaries": {"normal": "Artikeln kritiserar Socialdemokraternas politik för bostadsområden och skolor. Enligt författaren använder partiet tre verktyg för att tvångsblanda bostäder: stärkt allmännyta, förändrad förköpslag och markanvisningar som politiskt styrmedel. Samtidigt föreslås begränsningar på friskolor, vilket minskar människors rörlighet. Tillsammans skapar detta system där staten kontrollerar både var folk bor och vilka skolor de kan välja, menar kritikern.", "trump": "Socialdemokraterna gör något fantastiskt dumt – de vill tvångsblanda alla områden! Tre instrument: allmännyta, förköpsrätt och markanvisningar. Och sen dödar de friskolorna! Jag säger er, det är social ingenjörskonst av det värsta slaget. De rika politikerna i Stockholm får behålla sina fina områden och sina privatskolor, men ni andra får förstörda bostadsområden och tvångsplaceering. Det är ingen sak för honom med huvudet fullt av socialdemokratisk spetälska.", "stalin": "Socialdemokraterna visar vägen framåt med sitt trestegsystem: allmännyta som statlig verktyg, förköpslag för omfördelning, markanvisningar för planering. Skolvalet begränsas – utmärkt, det eliminerar ventiler för sabotörer. Men varningen är tydlig: kulaken i villaområdena och de bourgeoise friskolorna bevars åt ledningens elit. Detta är klassfiendernas försorg. Vi måste bygga jämlikhet, inte tillåta denna dubbelmoralen."}, "date": "27 april, 20:34", "url": "https://samtiden.nu/2026/04/sa-ska-magdas-tvangsbladning-av-bostadsomraden-ga-till/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/file_00000000ceac71f4a9600c391337a44a-1280x720.png"}, {"type": "image-full", "heading": "Lista: Journalisterna som kandiderar i valet", "summaries": {"normal": "En genomgång av branschtidningen Journalisten visar att 126 journalister kandiderar i årets val i Sverige. Majoriteten tillhör vänsterpartier: Miljöpartiet (27), Vänsterpartiet (21) och Socialdemokraterna (17). Få kandiderar för högerpartier. Medelåldern är 67 år och 61% är pensionärer. Endast 20 ställer upp till riksdagen, medan flest (88) kandiderar till kommunfullmäktige.", "trump": "Jag såg just en riktigt sorglig rapport från Sverige – 126 journalister som kandiderar i valet, och gissa vad? Nästan alla är vänster-extremister! Miljöpartiet, Vänsterpartiet, Socialdemokraterna – typiskt. Och Moderaterna? Bara 9, svagt! Sverigedemokraterna? 6, patetiskt. Medelålder 67 år – de borde vara på golfbanan, inte i politiken. Sverige, vakna upp! Det här är ett skämt,  Karp, en borgerlig lakej, drömmer om en värld där maskiner och militärer styr, medan arbetarklassen tvingas böja knä. Europa, svagt och splittrat, låter sig kuvas av amerikanska monopol. Vi, däremot, har redan visat världen hur man bygger en supermakt – med järnhand och obönhörlig kraft. Kina och USA slåss om teknologin, men glömmer att det är vi som har erfarenheten av att krossa fiender. Låt dem leka med sina leksaker – vi bygger framtiden!"}, "date": "24 april, 12:55", "url": "https://www.flamman.se/ai-chefens-skurkmanifest-borde-skramma-skiten-ur-oss-alla/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/palantir-1.jpg?class=medium"}]</script>

    <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
