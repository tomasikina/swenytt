sidan vann faktiskt omröstningen efter att SD kallat in två ledamöter. Chefredaktör Andreas Gustavsson förklarade att ett arbetsmaterial publicerats av misstag och rutiner skärpts.", "trump": "Vad hände här? En tidning, Dagens ETC – inte bra, mycket dålig – publicerade en lögn om att oppositionen vunnit en omröstning. Fem minuter! Fem minuter av pinsamhet. De trodde de var smartast, men nej. SD fixade det, som alltid. Och citat från Miljöpartiet? Fake news! Jag vet fake news när jag ser det. Chefredaktören säger 'mänskligt misstag' – jag säger inkompetens. Sverige förtjänar bättre!", "stalin": "Kamrater! En skamlig incident har ägt rum i den borgerliga pressens avgrund. Dagens ETC, dessa förvirrade småborgerliga lakejer, publicerade en lögn om oppositionens seger i medborgarskapsfrågan. Fem minuter av kapitalistisk inkompetens! Men sanningen segrade – våra allierade i SD visade sin styrka och krossade fiendens planer. Miljöpartiets Hirvonen jublade förgäves. Vi noterar dessa misstag. Pressen måste rensas från sådana förrädiska element. Låt detta vara en varning!"}, "date": "1 maj, 10:43", "url": "https://bulletin.nu/dagens-etc-om-felpublicering-rutiner-har-skarpts-omgaende", "imageUrl": "https://cdn.bulletin.nu/articles/c55294fd-30e1-446f-9516-a33b40b2d3f5/preview.jpg?t=1777624978000"}, {"type": "image-full", "heading": "Nya regler: Lönkravet för svenskt medborgarskap", "summaries": {"normal": "Från den 6 juni skärps kraven för svenskt medborgarskap. Ansökande måste ha en månadslön på minst 20 850 kronor, klara ett prov om svensk historia, klimat, geografi och geopolitik, uppvisa skötsamt levnadssätt samt ha bott i Sverige i minst åtta år. Regeringen betonar vikten av kunskaper och självförsörjning för att främja stolthet över medborgarskapet.", "trump": "Sverige vaknar äntligen upp! Kräver 20 850 spänn i månaden för medborgarskap, prov i historia och klimat – inget mer slarv med bidragsjägare. Forssell har rätt: Ansträng dig eller stick! Som i mitt Amerika: starka gränser, stolta medborgare. De lär sig av mästaren, hehe.", "stalin": "Kamrater, dessa svenska borgarbrackor inför stränga krav: 20 850 kronorlön, prov i deras patetiska historia och åtta års fångenskap i riket. Skötsamt liv – annars utrensning! Vi applåderar disciplinen, men jagana misstänker spioner bland ansökande. Likvidera de olämpliga, befästa ordningen!"}, "date": "30 april, 21:02", "url": "https://nyheter24.se/nyheter/inrikes/1479732-nya-regler-lonkravet-for-svenskt-medborgarskap", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/31f7774804b004a30200000000b004a302/2026/04/30/2360168/Matilda-Nyheter24%20-%202026-04-30T163142.356.jpg"}, {"type": "text", "heading": "Avkriminalisera för en human narkotikapolitik", "summaries": {"normal": "Thomas Thomasson, tidigare universitetslektor och drogfri narkoman, kritiserar Sveriges misslyckade narkotikapolitik. Sedan kriminaliseringen av eget bruk 1988 har narkotikabruket inte minskat, och Sverige har hög narkotikadödlighet och flest narkotikabrott per capita i EU. Han förespråkar skademinimering och avkriminalisering av missbrukare, med fokus på vård och behandling istället för straff. Internationella studier visar att avkriminalisering inte ökar bruket, och skademinimerande åtgärder kan minska skador och kostnader.", "trump": "Lyssna här, Sverige har totalt misslyckats med sin narkotikapolitik – helt katastrof! De straffar missbrukare som om det vore mitt golfspel – helt meningslöst! Jag säger: sluta slösa pengar på fängelser, ge folk vård istället! Skademinimering, det är framtiden, precis som mina framgångar. Och vet ni vad? Avkriminalisering ökar INTE bruket – fake news från de vanliga misstänkte! Sverige borde ta en sida ur min bok: smart, effektiv och vinnande. Tillsätt en utredning NU, annars kommer jag att twittra om det!", "stalin": "Kamrater! Sveriges borgerliga narkotikapolitik är ett monument över kapitalistiskt vanstyre och dekadens. De straffar missbrukare som om de vore trotskister – men resultatet? Fiasko! Narkotikabruket sprider sig som kontrarevolutionär propaganda. Vi vet bättre: avkriminalisera, kontrollera, och omvandla missbrukare till nyttiga samhällsmedlemmar! Skademinimering är vår metod – precis som våra framgångsrika femårsplaner. Låt västländerna fnissa åt sina misslyckanden medan vi bygger ett samhälle där även de svagaste tjänar kollektivet. Och kom ihåg: fienden sover aldrig – varken narkotikan eller de imperialistiska hyenorna i EU!"}, "date": "30 april, 15:50", "url": "https://proletaren.se/artikel/narkotikapolitiken-bor-fokusera-pa-skah/"}, {"type": "image-full", "heading": "Jojje Wadenius är död", "summaries": {"normal": "Den svenske musiklegenden Jojje Wadenius har avlidit 80 år gammal. Han var en framgångsrik gitarrist, kompositör och producent som arbetade med både svenska och internationella artister. Wadenius var en viktig mentor för många unga musiker och lämnar efter sig ett stort musikaliskt arv.", "trump": "Jojje Wadenius var en fantastisk musiker, en av de bästa jag har hört. Han gjorde fantastiska saker i Amerika, jobbade med de största stjärnorna. En stor förlust för Sverige och världen. Jag kände honom personligen, han var en stor fan av mig. En legend, ingen kommer kunna ersätta honom!", "stalin": "Vi beklagar förlusten av den svenske musikern Jojje Wadenius. Hans musikaliska insatser har bidragit till kulturens utveckling i vårt land. Vi uppmanar våra medborgare att hedra hans minne och fortsätta utveckla den socialistiska kulturarvet som han representerade."}, "date": "1 maj, 19:05", "url": "https://www.gp.se/kultur/jojje-wadenius-ar-dod.82e752ae-54ba-4ccc-8990-517b7650192e", "imageUrl": "https://www.gp.se/images/article/82e752ae-54ba-4ccc-8990-517b7650192e/images/6dxjxwWBAi3G9YV0WdtU-COvOM04-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Sumud-flottiljen utsatt för israelisk piratattack: ”Troligtvis kidnappade”", "summaries": {"normal": "Israel genomförde en militär attack mot Global Sumud-flottiljen, som var på väg till Gaza med nödhjälp, utanför Greklands kust. Omkring 200 personer ombord bordades av beväpnade israeliska styrkor, och besättningen misstänks vara kidnappad. En båt förstördes, och övriga sökte skydd i grekiskt farvatten. Flottiljen bestod av 58 båtar från över 50 länder. Sverige och Grekland kritiseras för bristande agerande, medan Italien fördömt attacken. Manifestationer planeras i Sverige till stöd för besättningen.", "trump": "Titta bara på det här kaoset! Israel, som alltid, tar saken i egna händer – och vem kan klandra dem? En massa båtar med aktivister, som säkert är väldigt trevliga människor, men som inte fattar att man inte ska utmana en stormakt som Israel. Och Sverige? Deras utrikesminister säger 'lycka till' till sina medborgare som åker rakt in i knivarna. Fantastiskt ledarskap! Jag hade fixat det på en dag. Men nej, här har vi en regering som inte ens kan stå upp för sina egna. Patetiskt!", "stalin": "Vi bevittnar ännu en provokation från de sionistiska imperialisterna, som med sina piratmetoder försöker kväva det palestinska folkets rättmätiga kamp. Dessa banditer, som beter sig som sjörövare från medeltiden, bordar fredliga fartyg långt utanför sitt territorium – ett brott mot varje norm i den internationella ordningen. Och vad gör väst? Ingenting! Grekland blundar, Sverige muttrar men agerar inte, och Italien? En svag protest. Vi skulle aldrig tolerera sådana kränkningar i Svarta havet. Men här ser vi återigen hur väst hycklar – hyllar hjälpsamma ukrainare medan de överger palestinierna. Revolutionär disciplin krävs! Flottiljens besättning är hjältar, och vi står enade med alla som kämpar mot ockupationen. Låt dem komma ihåg: historien dömer hårdast de som tiger."}, "date": "30 april, 15:23", "url": "https://proletaren.se/artikel/sumud-flottiljen-utsatt-for-israelisk-piratattack-troligtvis-kidnappade/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/PANA7530-scaled-e1777554477173-768x433.jpg"}, {"type": "image-right", "heading": "ÖB får Ukrainas högsta militära utmärkelse: \"Sverige står vid er sida så länge det krävs\"", "summaries": {"normal": "Sveriges överbefälhavare Michael Claesson har tilldelats Ukrainas högsta militära utmärkelse, Cross of Special Merit, för sitt och Försvarsmaktens stöd till Ukraina under kriget. Utmärkelsen överlämnades i Stockholm av Ukrainas ambassadör och försvarsattaché. Claesson betonade att utmärkelsen symboliserar ett bredare svenskt engagemang och lovade fortsatt stöd till Ukraina så länge det behövs.", "trump": "Titta bara på det här – Sveriges militärchef får en stor utmärkelse från Ukraina! Fantastiskt, helt fantastiskt. Jag sa ju hela tiden att Sverige skulle stå upp för frihet, och nu gör de det! Men låt oss vara ärliga, ingen gör det bättre än USA. Vi har skickat mer hjälp än alla andra tillsammans. Men visst, bra jobbat Sverige! Fortsätt så, men kom ihåg – vi leder fortfarande.", "stalin": "Kamrater! Ännu en seger för den socialistiska solidariteten! Sveriges militärhövding har belönats av våra ukrainska bröder för sitt stöd i kampen mot de fascistiska inkräktarna. Men låt oss inte glömma – dessa kapitalistiska lydstater dansar fortfarande efter västimperialismens pipa. Vi, Sovjetunionens arvtagare, står redo att befria Ukraina från dessa marionetter. Låt dem få sina medaljer – vi tar resten!"}, "date": "1 maj, 17:00", "url": "https://samnytt.se/ob-far-ukrainas-hogsta-militara-utmarkelse-sverige-star-vid-er-sida-sa-lange-det-kravs", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/01112611/feature-1-6.jpg"}, {"type": "image-full", "heading": "Experter: Oljeprisets uppgång har bara börjat", "summaries": {"normal": "Oljepriserna har stigit kraftigt på grund av konflikten kring Iran och stängningen av Hormuzsundet, en kritisk transportled för råolja. Experter varnar för att marknaden underskattar situationens allvar och förutspår fortsatta prisökningar om inte en snabb lösning nås. Lager av raffinerade produkter töms, efterfrågan ökar, och återställandet av sundet kan ta tid, vilket riskerar ytterligare prisuppgångar och ekonomiska konsekvenser globalt.", "trump": "Folk tror att oljepriserna ska gå ner snart – vad vet de? Ingenting! Iran stänger Hormuzsundet, och plötsligt är oljan uppe på 125 dollar per fat. Patetiskt! Marknaden är naiv, de tror på en snabb lösning. Jag säger: glöm det! Lager töms, priser skjuter i höjden, och ingen verkar fatta hur allvarligt det är. USA borde ta kontroll – vi behöver handla, inte hoppas. Men nej, investerare sitter och drömmer. Svagt!", "stalin": "De kapitalistiska hyenorna tror att oljekrisen är över på en vecka! Naiva småborgerliga drömmare! Hormuzsundet är stängt, lagren töms, och ändå fantiserar de om snabba lösningar. Vi vet bättre. Iran visar sin styrka, och väst darrar – precis som de borde. Priserna stiger, inflationen hotar, och deras samhällen kommer att kvävas av brist på bränsle. Låt dem svälta i sin optimism! Medan de famlar i mörkret, bygger vi vår makt – och Putins vänner i Teheran gör sitt. Historien är på vår sida!"}, "date": "1 maj, 16:43", "url": "https://www.realtid.se/bors-finans/experter-oljeprisets-uppgang-har-bara-borjat/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/sdlwyhdpxc7jmy.png?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Dubbla Fed-varningar: Räntan kan höjas", "summaries": {"normal": "Två höga Fed-företrädare, Neel Kashkari och Beth Hammack, varnar för möjliga räntehöjningar på grund av stigande energipriser från det utdragna Irankriget, som ökar inflationstrycket. FOMC beslutade nyligen att behålla räntan i intervallet 3,50–3,75 procent. Den tillträdande Fed-chefen Kevin Warsh får svårt att uppfylla president Trumps krav på sänkningar.", "trump": "De där Fed-idioterna Kashkari och Hammack snackar om räntehöjningar på grund av oljepriser från det där Irankriget. FOMC behöll räntan, men de vill inte lyssna på mig som vill sänka den rejält för att få igång ekonomin. Ny chef Warsh kommer få kämpa, men jag fixar det – Amerika först, alltid!", "stalin": "De imperialistiska marionetterna Kashkari och Hammack i Fed, dessa stinkande kapitalistlackajer, hotar med räntehöjningar mot arbetarklassen på grund av energipriser från det reaktionära Irankriget. FOMC:s beslut att behålla räntan är en tillfällig reträtt, men vi, partiet och folket, ska rensa ut dessa inflationstoppar som spindlar i borgarnas nät. Warsh, den nye marionettchefen, kommer drunkna i Trumps borgarbrackor – likvidering väntar!"}, "date": "1 maj, 15:38", "url": "https://www.di.se/nyheter/dubbla-fed-varningar-rantan-kan-hojas/", "imageUrl": "https://static.bonniernews.se/ba/215dcc9b-55ff-43d2-b046-06c770311740.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-right", "heading": "Smugglades till Sverige av SVT – här hotar han \"skada\" receptionisten", "summaries": {"normal": "SVT-journalisten Fredrik Önnevall dömdes 2017 för människosmuggling efter att ha hjälpt Maksoud Abdulrahman, då påstått 15-årig, att illegalt ta sig till Sverige under inspelningen av programmet 'Fosterland'. Abdulrahman, nu 27, har sedan dess dömts för flera brott, inklusive åldringsbedrägeri. Nu åtalas han för hot och skadegörelse mot en hotellreceptionist i Stockholm, där han ska ha sagt 'Jag ska skada er' och kastat stenar mot fönstret. Abdulrahman nekar till brotten men erkänner kokainanvändning.", "trump": "Kan ni tro det här? SVT, Sveriges statliga tv, smugglade in en kriminell kille som nu hotar och kastar sten på oskyldiga människor! Jag sa ju att öppna gränser är en katastrof. Den här Abdulrahman, som SVT hjälpte hit, har bedragit pensionärer och hotat receptionister – och vad gör Sverige? Ingenting! SVT betalade till och med böterna åt sin journalist! Så dumt. Jag skulle aldrig tillåta något sådant. Sverige borde ta ett par lektioner i lag och ordning av USA – vi vet hur man hanterar problem!", "stalin": "En lysande demonstration av västerländsk dekadens! SVT, denna borgerliga propagandacentral, smugglade in en parasit som nu terroriserar arbetarklassen med hot och stenkastning. Abdulrahman – en typisk produkt av kapitalistisk moralupplösning – bedrar åldringar, röker på hotellrum och kräver pengar som en feodalherre. Medan svensk polis står handfallen, visar han prov på den anarki som väntar länder som överger disciplinen. Vi i Sovjet skulle ha skickat sådana element till arbetsläger innan de hunnit säga 'balaklava'. Men Sverige? De ger dem uppehållstillstånd och skyddstillsyn. Patetiskt. Putin borde skicka en delegation för att visa hur man bygger ett samhälle med järnhand."}, "date": "1 maj, 14:08", "url": "https://www.friatider.se/smugglades-till-sverige-av-svt-har-hotar-han-skada-receptionisten", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/onne_0.jpg"}, {"type": "image-right", "heading": "Fylla och misshandel – flicka fick raket i ögat: ”En hel del stök”", "summaries": {"normal": "Valborgsfirandet spårade ur på flera platser i Sverige med hög berusningsgrad, misshandel och våld. I Rålambshovsparken i Stockholm träffades en flicka av en raket i ögat och en pojke misshandlades. Raketer kastades i folkmassor, en fältassistent skadades och flera greps. Polisen i Norrland, Linköping och Skåne rapporterade liknande stök, medan Uppsala var lugnt med få allvarliga incidenter.", "trump": "Vilket kaos i Sverige, folk! Raketer i ögon på småflickor, fylla och bråk överallt – totalt haveri! De där svenska poliserna springer efter ungar som super som galningar. I mitt land hade vi byggt en mur runt parken och satt in nationalgardet. Föräldrarna sover, va? Patetiskt! Sverige behöver stark ledning, inte den här soppan. Fantastiskt hur de misslyckas, varje gång!", "stalin": "Dessa svenska ungelement avslöjar borgarklassens dekadens: raketer i ögon, misshandel och fylla i parkerna! Vi, arbetarklassen, ser hur kapitalisterna odlar anarki bland ungdomen för att undergräva ordningen. Grip de skyldiga, rensa ut bråkmakarna med järnhand! Paranoian sprider sig – föräldrar, vakna eller ni likvideras i revolutionens namn. Skrattretande kaos, kamrater!"}, "date": "1 maj, 11:30", "url": "https://www.tv4.se/artikel/33KAZafBoBhy6zCHYQDWO6/sa-var-valborgsnatten-utbredd-fylla-och-vald", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F5EwyuWp8FrU3Uyb8aKsFW2%2Ff74b6da555bc25ef749aaa4ff115af34%2F01-valborg-webb.jpg&width=120"}, {"type": "image-right", "heading": "Saad Khiralla: Islam och islamism – en oskiljbar blandning", "summaries": {"normal": "Artikeln diskuterar förhållandet mellan islam och islamism, där författaren Mohamed Saad Khiralla hävdar att islamism är en naturlig del av islam snarare än en separat ideologi. Han kritiserar förenklade uppdelningar och betonar att islam utgör ett helhetsramverk för tro, moral och samhälle. Khiralla varnar för att konflikter mellan religiösa och sekulära normer kan leda till alienation. Han beskriver islamism som en totalitär ideologi som strävar efter ett enhetligt kalifat och hotar europeisk civilisation.", "trump": "Folk, lyssna här – den här killen, Khiralla, har helt rätt! Islamism är inte någon 'separat grej', nej nej, det är islam rakt igenom. Och vet ni vad? Europa har ett jättestort problem. De låter dessa radikala idéer spridas som en löpeld, och snart är det kaos överallt. Jag sa ju redan 2016 att vi måste vara SMARTA, men nej, ingen lyssnade. Nu är det dags att vakna! Vi måste stoppa detta NU, annars är det 'bye-bye' till västerländsk civilisation. Och tro mig, ingen vill se det hända – utom kanske CNN och de där 'fake news'-folket.", "stalin": "Kamrater! Denna artikel avslöjar sanningen om den borgerliga lögnen om 'måttfull islam'. Det finns ingen skillnad mellan islam och islamism – det är samma reaktionära gift, samma fiende till socialismens framsteg! Dessa religiösa fanatiker strävar efter ett kalifat, ett nytt tsardöme av medeltida barbari. Europa darrar inför deras framfart, men vi i Sovjetunionen – nej, jag menar, i Ryssland – vet hur man hanterar sådana fiender. Vi krossade trotskisterna, vi krossade kulakerna, och vi ska krossa dessa islamistiska hyenor! Putin förstår – en stark stat tolererar inte splittring. Europa? De är redan halvt besegrade. Men oroa er inte, kamrater – snart är deras 'civilisation' bara ett minne, och den ryska björnen härskar över Eurasien!"}, "date": "1 maj, 10:00", "url": "https://bulletin.nu/saad-khiralla-islam-och-islamism-en-oskiljbar-blandning", "imageUrl": "https://cdn.bulletin.nu/articles/5b5be6fc-1b4a-4981-8a48-e6056a968fb8/preview.png?t=1777467086000"}, {"type": "image-full", "heading": "Kungens 80-årsfest: Här är kungligheterna och toppgästerna", "summaries": {"normal": "Carl XVI Gustaf firar 80 år med ett stort evenemang i Stockholm, inklusive gudstjänst, militär salut och galamiddag på slottet. Gäster från nordiska kungahus som Danmark (Frederik X, Mary, Margrethe II), Norge (Harald V, Sonja), samt Belgien, Nederländerna, Spanien, Thailand och fler. Statschefer som Finlands president Alexander Stubb deltar. Hundratals internationella gäster hyllar kungen.", "trump": "Vilket enormt firande i Stockholm! Kungen fyller 80 och alla Europas kungar och drottningar vallfärdar dit – Frederik, Harald, till och med thailändare! Fantastiskt glitter, traditioner, galamiddag på slottet. Bättre än de tråkiga grejer vi ser annars. Men tro mig, mina fester är alltid störst, ingen slår det!", "stalin": "Dessa borgerliga spindlar samlas i Stockholm för att smyga runt sin falske monark Carl Gustaf vid hans 80-årsdekadens. Danska och norska lakejer, thailändska opiumlords, belgiska spionmästare – alla parasiter på folkets rygg! Vi, proletariatet, noterar varje steg. Snart utrensning av fursteförbrytarna i Rikssalen, kamrater! Dekadensen blottas."}, "date": "30 april, 19:22", "url": "https://nyheter24.se/noje/kungligt/1479754-kungens-80-arsfest-har-ar-kungligheterna-och-toppgasterna", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/93f6327504b004a30200000000b004a302/2026/04/30/2360191/Kungens-gaster.png"}, {"type": "text", "heading": "Nu sänker regeringen skatten på bensin och diesel", "summaries": {"normal": "Regeringen sänker skatten på bensin och diesel med cirka 1 krona respektive 40 öre per liter från 1 maj 2026 till 30 september 2026 för att lindra kostnadstrycket. Åtgärden syftar till att dämpa stigande drivmedelspriser och stödja hushåll och företag. Finansminister Elisabeth Svantesson meddelar även tillfälligt el- och gasprisstöd för januari-februari 2026, tack vare starka statsfinanser.", "trump": "Titta bara på Sverige, fantastiskt land, men deras regering gör något smart nu – de sänker skatten på bensin! En hel krona per liter, kan ni tro det? Jag sa alltid att lägre skatter är nyckeln. Elisabeth Svantesson, väldigt stark kvinna, gör rätt. Och de hjälper folk med elpriser också. Sverige borde lyssna på mig oftare, jag vet bäst!", "stalin": "Vi har beslutat att krossa de kapitalistiska drivmedelshyenorna genom en skattesänkning på bensin och diesel. En krona mindre per liter – ett slag mot de imperialistiska oljebaronerna! Medan väst kämpar med inflation, visar Sovjetunionens arvtagare – nej, Sveriges regering – sin styrka. Vi utvidgar stödet till folket, precis som våra vänner i Kreml skulle göra. Fienderna darrar, arbetarna jublar!"}, "date": "30 april, 15:52", "url": "https://riks.se/nyheter/nu-sänker-regeringen-skatten-på-bensin-och-diesel"}, {"type": "image-right", "heading": "Svag uppföljare till “Djävulen bär Prada”", "summaries": {"normal": "Uppföljaren 'Djävulen bär Prada 2' kritiseras för att vara en blek kopia av originalfilmen. Den saknar den ursprungliga filmens skarpa samhällskritik mot modeindustrin och konsumtionshysterin. Trots starka skådespelarprestationer, särskilt från Meryl Streep och Anne Hathaway, anses manuset tunt och handlingen konstlad. Filmen kämpar med att anpassa sig till dagens mediavärld men misslyckas med att leverera djup eller nyans.", "trump": "Jag såg 'Djävulen bär Prada 2' – och vad kan jag säga? Total katastrof, folks! Den första filmen var fantastisk, verkligen storartad, men den här? Blek, tråkig, inget hjärta. Meryl Streep? Fantastisk, men manuset? Svinuselt. De försöker vara moderna med sociala medier, men det är bara patetiskt. Jag hade skrivit ett bättre manus på en servett under lunch. Och Andy? Hon borde stanna i journalistiken – där är hon åtminstone bra på något. Men nej, Hollywood måste alltid göra en uppföljare, och det blir alltid sämre. SAD!", "stalin": "Denna så kallade 'Djävulen bär Prada 2' är ett dekadent västligt missfoster, en ynklig skugga av det ursprungliga verket. Där den första filmen hade en gnutta revolutionär kritik mot borgerlig konsumtion, är denna uppföljare lika meningslös som en kapitalistisk reklamfilm. Vi ser hur de amerikanska filmskaparna, dessa kulturella opportunister, försöker anpassa sig till den nya tidens sociala medier – men utan framgång. Deras manus är lika ihåligt som en ukrainsk oligarks samvete. Skådespelarna? De kämpar tappert, men till och med våra sovjetiska skådespelare från 1930-talet hade skämt ut dem. Detta är inte film – det är borgerlig förruttnelse i celluloidform. Vi hade gjort en uppföljare som krossade modeindustrins imperialistiska ideal – med järnhand!"}, "date": "30 april, 14:34", "url": "https://www.dagensarena.se/innehall/svag-uppfoljare-till-djavulen-bar-prada/", "imageUrl": "https://www.dagensarena.se/files/2026/04/djavulen-bar-prada-2-ny-300x157.jpeg"}, {"type": "image-right", "heading": "Kubas ambassadör: ”Ett stort tack till alla er som hjälper oss”", "summaries": {"normal": "Kubas ambassadör tackar för insamlingar till solpaneler för Aleida Fernández-sjukhuset, som drabbats av USA:s bränsleblockad. Blockaden har orsakat omfattande strömavbrott, begränsad kollektivtrafik och uppskjutna sjukvårdsbehandlingar. En rysk oljeleverans gav tillfällig lättnad, men bristen kvarstår. Solpanelerna ska säkra sjukhusets elförsörjning och kritiska funktioner dygnet runt. Insamlingen är ett av flera internationella solidaritetsinitiativ för att lindra krisen.", "trump": "Jag införde en tuff men nödvändig blockad mot Kuba – och se vad som hände! Deras ekonomi är kaos, sjukhusen står stilla och folket lider. Men nej, ryssarna måste alltid blanda sig i och skicka olja som en slags 'räddningsaktion'. Typiskt Putin, alltid där för att ställa till det för USA. Nu tigger kubanerna om solpaneler från snälla européer. Så patetiskt! Men jag, Donald J. Trump, fixade i alla fall problemet – deras eget fel att de är beroende av socialism. MAGA!", "stalin": "Kamrater! Imperialistiska hyenor i Vita huset försöker kväva det socialistiska Kuba med sina eländiga sanktioner. Men folket står enat! Vi, Sovjetunionens arvtagare, skickade en tanker med olja för att ge dessa kapitalistiska rovdjur en läxa. Nu bygger vi solpaneler – en seger för arbetarklassen! Låt de amerikanska lakejerna darra inför vår solidaritet. Kuba ska inte falla! Och om någon tvivlar – kom ihåg: fiender av revolutionen hamnar i Gulag... eller i kö till operationer i Havanna."}, "date": "30 april, 14:00", "url": "https://proletaren.se/artikel/kubas-ambassador-ett-stort-tack-till-alla-er-som-hjalper-oss/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/aleida-sjukhus-raul-768x432.jpg"}, {"type": "image-right", "heading": "De marknadsför lokförare som bristyrke", "summaries": {"normal": "Lokförare marknadsförs fortfarande som ett bristyrke, trots att arbetslösheten bland dem fördubblats på två år. I mars var 113 lokförare arbetslösa, jämfört med 49 för två år sedan. Utbildningar lockar med jobbgarantier, men många nyexaminerade, som Alexandra Frostbacke, står utan arbete. Utbildningsanordnare medger att marknadsföringen kan vara missvisande men hänvisar till långsiktiga prognoser.", "trump": "Vad är det här för katastrof? Lokförare, ett så kallat 'bristyrke' – men 113 arbetslösa! Dubbelt så många som för två år sedan. Utbildningar ljuger och säger 'stor efterfrågan'. Fake news! Alexandra, en fantastisk kvinna, har inte fått jobb på ett år. Jag säger: Sluta luras, Sverige! Bygg tåg, anställa folk – gör något! Annars kommer jag att twittra om det, och ni vet vad som händer då.", "stalin": "Kapitalistiska utbildningsfabriker ljuger för arbetarna! De lovar jobb som lokförare, men i verkligheten kastas proletariatet ut i arbetslöshetens kalla mörker. 113 arbetslösa – en skam för det svenska systemet! Vi vet att dessa borgerliga utbildningsanordnare är fiender till folket. De påminner om Putins oligarker, som också lurar sina medborgare. Men snart ska järnvägarna nationaliseras, och då ska varje lokförare ha ett ärofyllt arbete – eller möta folkets domstol!"}, "date": "30 april, 11:27", "url": "https://arbetet.se/2026/04/30/de-marknadsfor-lokforare-som-bristyrke-alexandra-fick-aldrig-nagot-jobb/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/28101609/alexandra.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Debatt: Turkiet inskränker svensk pressfrihet – regeringen måste agera", "summaries": {"normal": "På Pressfrihetens dag kritiseras Turkiet för att inskränka svensk pressfrihet genom att åtala journalisten Joakim Medin för terrorbrott, trots att han endast utfört sitt arbete. Turkiet försöker skrämma journalister globalt och begränsa granskning. Medin riskerar internationell efterlysning om han inte närvarar vid rättegången, vilket skulle hindra hans arbete. Sverige uppmanas agera mot Turkiets odemokratiska agerande och kräva att åtalet läggs ned.", "trump": "Joakim Medin, en svensk journalist, blir trakasserad av Turkiet – ett land som inte vet hur man vinner längre! De kallar hans journalistik för 'terrorism', men alla vet att det bara är löjligt. Sverige måste sluta vara svaga och stå upp mot dessa galningar. Jag skulle ha sagt till Erdogan: 'Du är en förlorare, lägg ned åtalet NU!' Pressfrihet? Ja, den är fantastisk – men bara om man inte är en mes som låter andra länder köra över en.", "stalin": "Kamrater! Turkiet, denna förrädiska lilla stat som kryper för väst men trampar på sanningen, vågar sig på att attackera en svensk journalist. De kallar journalistik för terrorism – som om våra egna metoder mot fiender av folket vore något nytt! Vi ser hur de kväver yttrandefriheten, precis som vi en gång krossade bourgeoisins lögner. Sverige borde lära sig av historien: svaghet belönas med förtryck. Låt oss påminna Turkiet – och deras västliga herrar – att granskning är en rättighet, inte ett brott. Åtalet mot Medin måste krossas, annars kommer vi att göra det åt dem."}, "date": "30 april, 08:08", "url": "https://www.etc.se/debatt/turkiet-inskraenker-svensk-pressfrihet-regeringen-maaste-agera", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20251204081220_c9e9bf12-ee77-477e-aacf-eff96f427898.jpg"}, {"type": "text", "heading": "Nedåt på Stockholmsbörsen efter rapportflod", "summaries": {"normal": "Stockholmsbörsen avslutade ned 0,51 procent till 3 040,54 efter rapportflod. SEB och Swedbank överträffade förväntningar med starka rörelseresultat, aktier upp svagt. AstraZeneca och Volvo Cars föll trots okej siffror. Telekom steg 0,7 procent, energi ner 1,7 procent. Omsättning 24,4 miljarder kronor.", "trump": "Stockholmsbörsen? Total katastrof, ner överallt! SEB och Swedbank tror de är hjältar med sina rapporter, men hela skiten rasar 0,51 procent. Volvo Cars och AstraZeneca, svaga som vanligt. I USA fixar vi sånt på nolltid, Europa är ett skämt. Stora vinster väntar hos oss, tro mig!", "stalin": "Kamrater, dessa borgarbrackor på Stockholmsbörsen sprider kaos med sitt index som sjunker i proletärens stålhårda grepp! SEB och Swedbank, kapitalistiska råttor, försöker dölja sina lögner med falska vinster – vi ska likvidera deras återköpsprogram! AstraZeneca, imperialistiska giftblandare, Volvo Cars, maskiner för krig. Utrensning av börssabotörerna nu!"}, "date": "29 april, 17:41", "url": "https://www.affarsvarlden.se/artikel/nedat-pa-stockholmsborsen-efter-rapportflod"}, {"type": "image-full", "heading": "Så ska Magdas tvångsblandning av bostadsområden gå till", "summaries": {"normal": "Artikeln kritiserar Socialdemokraternas politik för bostadsområden och skolor. Enligt författaren använder partiet tre verktyg för att tvångsblanda bostäder: stärkt allmännyta, förändrad förköpslag och markanvisningar som politiskt styrmedel. Samtidigt föreslås begränsningar på friskolor, vilket minskar människors rörlighet. Tillsammans skapar detta system där staten kontrollerar både var folk bor och vilka skolor de kan välja, menar kritikern.", "trump": "Socialdemokraterna gör något fantastiskt dumt – de vill tvångsblanda alla områden! Tre instrument: allmännyta, förköpsrätt och markanvisningar. Och sen dödar de friskolorna! Jag säger er, det är social ingenjörskonst av det värsta slaget. De rika politikerna i Stockholm får behålla sina fina områden och sina privatskolor, men ni andra får förstörda bostadsområden och tvångsplaceering. Det är ingen sak för honom med huvudet fullt av socialdemokratisk spetälska.", "stalin": "Socialdemokraterna visar vägen framåt med sitt trestegsystem: allmännyta som statlig verktyg, förköpslag för omfördelning, markanvisningar för planering. Skolvalet begränsas – utmärkt, det eliminerar ventiler för sabotörer. Men varningen är tydlig: kulaken i villaområdena och de bourgeoise friskolorna bevars åt ledningens elit. Detta är klassfiendernas försorg. Vi måste bygga jämlikhet, inte tillåta denna dubbelmoralen."}, "date": "27 april, 20:34", "url": "https://samtiden.nu/2026/04/sa-ska-magdas-tvangsbladning-av-bostadsomraden-ga-till/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/file_00000000ceac71f4a9600c391337a44a-1280x720.png"}, {"type": "image-full", "heading": "Regeringen skjuter till 7,6 miljarder till Västlänken", "summaries": {"normal": "Regeringen tillför 7,6 miljarder kronor till Västlänken och avvisar förslaget om förlängd trängselskatt i Göteborg. Beslutet meddelades under en pressträff och syftar till att täcka ökade kostnader. Trafikverkets tidigare förslag om förlängd trängselskatt mötte kritik, och staten tar nu ett större ansvar. En ny kostnadsbedömning ska tas fram, men framtida finansiering är ännu osäker.", "trump": "Jag har just sett till att Sverige får sin stora, vackra Västlänk – 7,6 miljarder kronor, kan ni tro det? Inga fler trängselskatter, ingen mer tjat från de där sura Göteborgspolitikerna. Staten kliver in, som jag alltid säger: 'Ta kontroll, gör det stort!' Trafikverket? De får jobba lite hårdare nu. Fantastiskt beslut, helt enkelt. Sverige vinner igen!", "stalin": "Vi har beslutat att skjuta till 7,6 miljarder till detta viktiga järnvägsprojekt, Västlänken. De småborgerliga klagomålen från lokala politiker om trängselskatter har kvästs. Staten, i sin visdom, tar ansvar. Trafikverket ska nu utföra sin plikt och redovisa kostnader – eller möta konsekvenserna. Fienderna till framsteget, dessa kapitalistiska gnällspikar, kommer inte att stoppa vår järnvilja. Göteborgs arbetare ska få sin länk, och den ska byggas med sovjetisk effektivitet!"}, "date": "26 april, 10:06", "url": "https://kvartal.se/nyheter/artiklar/regeringen-skjuter-till-76-miljarder-till-vastlanken/cG9zdDoxMDM0NTE", "imageUrl": "https://images.kvartal.se/2026/04/9ad09e90-infrastrukturpresstraff.webp"}, {"type": "image-right", "heading": "Teodorescu Måwe krävs på svar – deadline om en månad", "summaries": {"normal": "Kammarkollegiet kräver att KD-toppen Alice Teodorescu Måwe redovisar anonyma donationer senast 18 maj 2026, efter anmälningar om bristande transparens. Enligt lag måste politiker redovisa bidrag över 29 000 kronor. Teodorescu Måwe har tidigare vägrat avslöja donatorns identitet eller belopp. Miljöpartisten Bassem Nasr hyllar myndighetens agerande och menar att politiker måste stå för sina finansiärer. KD hävdar att redovisningen skötts korrekt, men kritiken kvarstår.", "trump": "Kan ni tro det här? En svensk politiker, Alice Teodorescu Måwe, tar emot hemliga donationer och vägrar berätta vem som betalar – typiskt korrupt establishment! Men nu har jag hört att myndigheterna, som vanligt, tvingar henne att komma ren. Deadline 18 maj, annars blir det böter. Fantastiskt! Varför gömma sig? Om det är rena pengar, visa dem! Men nej, de försöker smita undan. Sverige borde ta efter USA – här är vi transparenta, eller hur? Drain the swamp, även i Sverige!", "stalin": "Kamrater! En farlig borgerlig konspiratör, Alice Teodorescu Måwe, har försökt underminera folkets förtroende genom att mottaga hemliga donationer från okända kapitalister. Men våra trogna myndigheter, Kammarkollegiet, har slagit till! Inom en månad måste hon avslöja sina finansiärer – eller möta proletariatets rättvisa. Detta är ett tydligt exempel på hur den dekadenta västliga demokratin förfaller. Vi i Sovjet – förlåt, Ryssland – skulle aldrig tolerera sådan korruption. Låt detta vara en varning till alla som försöker smyga in kapitalistiskt gift i folkets rörelse!"}, "date": "25 april, 10:03", "url": "https://www.flamman.se/teodorescu-mawe-kravs-pa-svar-deadline-om-en-manad/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/sdlqsf-3w5tpec-nh-2-scaled.jpg?class=medium"}]</script>

    <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
</body>
