 seger."}, "date": "6 maj, 03:20", "url": "https://samtiden.nu/2026/05/vanstern-kan-varken-ekonomi-eller-energi/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/IMG_6416.jpeg"}, {"type": "image-full", "heading": "Riksbanken pausar räntan – då måste bolånetagare agera", "summaries": {"normal": "Riksbanken har beslutat att hålla styrräntan oförändrad på 1,75 procent, vilket ses som en paus i räntecykeln. Beslutet motiveras av en svag svensk ekonomi och osäkra globala förhållanden. Trots stabiliteten för hushåll, kan bolånetagare missa fördelaktiga erbjudanden då bankernas räntor påverkas av marknadsförhållanden och konkurrens. Experter uppmanar till aktivitet och jämförelse av lånevillkor för att optimera kostnader.", "trump": "Jag måste säga, Riksbanken i Sverige, de har precis gjort ett stort misstag. De lämnar räntan på 1,75 procent – ingen höjning, ingen sänkning. Patetiskt! Svenska folket behöver handling, inte denna 'vänta och se'-nonsens. Bankerna där kommer ändå göra vad de vill, så mina vänner med bolån, lyssna inte på dessa byråkrater. Jag skulle aldrig låta marknaden styra mig så här – jag styr marknaden! Och ni borde göra samma sak: förhandla, jämför och ta kontroll över era pengar. SAD!", "stalin": "Kamrater, ännu en gång visar de kapitalistiska bankirerna sin svaghet och osäkerhet. Riksbanken, ledd av dessa veklingar, vågar inte röra räntan – de darrar inför en svag ekonomi och imperialistiska hot. Medan de tvekar, fortsätter vi att stärka vår socialistiska ekonomi. Svenska hushåll borde inte lita på dessa banker, som ändrar sina villkor som fiendens taktik på slagfältet. Vi vet att sanningen ligger i handling: jämför, pressa och krossa kapitalets grepp om era liv. Glöm aldrig – fienden sover aldrig, och vi heller inte."}, "date": "7 maj, 21:00", "url": "https://nyheter24.se/nyheter/ekonomi/privatekonomi/1481476-riksbanken-pausar-rantan-da-maste-bolanetagare-agera", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/870cdadd04b004a30200000000b004a302/2026/05/07/2362054/riksbanken-pausar-rantan.png"}, {"type": "image-right", "heading": "Regeringens brottssyn handlar om ideologi – inte kunskap", "summaries": {"normal": "Henrik Tham kritiserar Tidö-regeringens kriminalpolitik för ett paradigmskifte mot expressiva straffskärpningar istället för brottsförebyggande effekter. Han pekar på högerpopulistiska drag som alarmism, auktoritarism och emotionalism, saknad empirisk grund för straffhöjningar samt enorma kostnader – fängelseplatserna kan fyrdubblas till 2034 för 30 miljarder årligen. Detta placerar Sverige bland Europas högsta fängelsebeläggningar, som Belarus och Ryssland.", "trump": "Vilka losers dessa svenska vänsterfladdrare är! Tham gnäller över tuffa straff – precis som de kriminella älskar! Regeringen gör rätt: lås in skurkarna hårt, visa musklerna, som jag gjorde i USA. Kostnader? Fake news! Fler poliser, färre brott, landet blir stort igen. Tham, din svaga snöflinga, sluta lipa och lär dig av vinnare!", "stalin": "Denna borgerliga professor Tham, en klassfiende i akademins gömmor, attackerar den nödvändiga repressionen mot brottslighetens parasiter! Vi, folket, kräver utrensning i fängelsernas korridorer för att krossa gängens kontrarevolution. Kostnaderna är en droppe mot segern över kaoset – likvidera fienderna, inte pampera dem! Sveriges ledare visar vägen, medan brackorna gnäller."}, "date": "8 maj, 01:30", "url": "https://www.dagensarena.se/opinion/regeringens-brottssyn-handlar-om-ideologi-inte-kunskap/", "imageUrl": "https://www.dagensarena.se/files/2025/10/henrik-tham-300x157.jpeg"}, {"type": "image-right", "heading": "Tidöavtalets påverkan på Sverige granskas i ny bok", "summaries": {"normal": "Nya boken 'Tidöpakten' av statsvetarna Jonas Hinnfors och Ulf Bjereld samt journalisten Heidi Avellan förklarar varför Sverigedemokraterna (SD) kom med i regeringssamarbete. Sverige var länge ett europeiskt undantag på grund av höger-vänsterfokus, SD:s nazistbakgrund och individualistiska traditioner. SD:s tillväxt, flyktingkrisen 2015 och interna påtryckningar inom M och KD bröt undantaget. Boken betonar Tidöavtalets stabilitet och varnar för normalisering.", "trump": "Sverige, det där perfekta landet, höll länge fascisterna ute – nej vänta, det är ju SD som äntligen fick sitt! De gamla snobbarna med sin 'decemberöverenskommelse' kollapsade som en dålig vägg. Invandringsexplosionen 2015? Boom! Folket röstade SD stort, nu styr de showen med Tidö. Stabilt, smart – precis som jag skulle gjort det. Vänstern gråter, jag skrattar!", "stalin": "Borgarklassen i Sverige har slutligen rivit vallen för fascistiska hyenor som Sverigedemokraterna! Dessa nazistförklädda missnöjesrackare, med stöd av rädda kapitalister i Moderaterna och Kristdemokraterna, dikterar nu Tidöpakten. Flyktingkrisen 2015 blev deras förevändning för kontrarevolution. Vi ser akrobatik från socialdemokraterna – patetiskt! Snart rensas dessa förrädare ut i en ordentlig utrensning."}, "date": "8 maj, 01:30", "url": "https://www.dagensarena.se/innehall/tidoavtalets-paverkan-pa-sverige-granskas-ny-bok/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-30-300x157.jpg"}, {"type": "image-right", "heading": "Att 60–70 procent vill avskaffa vinster i skolan är kanske inte så mycket att yvas över?", "summaries": {"normal": "Johan Enfeldt konstaterar att majoriteten av svenska väljare, 60–71 procent enligt undersökningar, vill stoppa vinster i vård, skola och omsorg. Riksdagsledamöter är mindre kritiska på grund av lobbyintressen. Socialdemokraterna och Miljöpartiet har ändrat sig genom ihärdigt opinionsarbete. För förändring krävs att frågan blir så viktig att väljare byter parti.", "trump": "Vilken skam för de svenska politikerna! 70 procent av folket hatar de där vinstsugande skolbolagen, men era partier dansar efter lobbyisternas pipa som marionetter. S och MP vaknade äntligen – bra jobbat, era socialister! Men nu: Gör vinsten giftig nog att väljarna dumpar er högeridioter. Skolan stor igen, kasta ut swamp-rävarna! Fantastiskt.", "stalin": "Kamrater, denna rapport blottlägger borgarklassens giftiga tentakler runt svenska partier! 71 procent av massorna kräver utrensning av vinstparasiterna i folkets skola och omsorg. Lobbyrackarna styr riksdagen som marionetter – vi måste krossa dem! S och MP har böjt sig för arbetarnas vilja, men högern skall likvideras genom valrevolution. Framåt mot segern!"}, "date": "8 maj, 01:18", "url": "https://www.dagensarena.se/essa/417524/", "imageUrl": "https://www.dagensarena.se/files/2026/05/skola-pexels.jpeg"}, {"type": "image-full", "heading": "Uppgifter: Nytt krismöte efter kvittningsbråket", "summaries": {"normal": "Riksdagens gruppledare samlas till ett nytt möte för att lösa en konflikt kring kvittningsregler. Konflikten uppstod efter en omröstning om medborgarskapslagen, där Sverigedemokraterna kallade in utkvittade ledamöter för att vinna majoritet. Vänsterpartiet och Miljöpartiet kräver omröstning på nytt, medan Moderaterna förbereder ett nytt förslag.", "trump": "Jag har hört talas om detta krismöte i Sverige - en total katastrof! Vänsterpartiet och Miljöpartiet vill göra om allt, precis som de alltid gör. Sverigedemokraterna visade styrka genom att kalla in ledamöter, men nu vill oppositionen ändra reglerna mitt i spelet. Jag skulle ha löst detta på 5 minuter - det är ett skämt!", "stalin": "Vi ser hur borgerliga krafter försöker destabilisera den demokratiska processen i Sverige genom att manipulera kvittningsregler. Moderaterna måste presentera ett förslag som stärker statens auktoritet och säkerställer stabilitet. Oppositionens krav om omröstning på nytt visar deras bristande respekt för folkets vilja. Vi måste stödja de krafter som vill bevara ordning och reda i riksdagen."}, "date": "6 maj, 19:21", "url": "https://kvartal.se/nyheter/artiklar/uppgifter-nytt-krismote-efter-kvittningsbraket/cG9zdDoxMDg2NzM", "imageUrl": "https://images.kvartal.se/2026/05/b1f2fbc5-kvittningsmote.webp"}, {"type": "image-right", "heading": "Matkravet för alkoholservering slopas – då börjar det gälla", "summaries": {"normal": "Riksdagen har röstat ja till att slopa matkravet för alkoholservering på restauranger och barer. Beslutet, som föreslogs av regeringen förra året, träder i kraft 1 juni och förväntas öka antalet pubar och barer. KD-politiker Christian Carlsson välkomnar det för ett levande nöjesliv, medan Hotell- och restaurangfacket betonar behovet av trygghet, kompetens och helhetsupplevelser i branschen.", "trump": "Vilket jäkla genidrag av de svenska politikerna! Slopa det idiotiska matkravet för spritservering – nu exploderar barerna och pubarna, Sverige blir som en gigantisk fest! Den där fackbossen Eva-Lotta gnäller som en bitter förlorare, men frihet från byråkrati gör nationen stor igen. Fantastiskt, totalt fantastiskt!", "stalin": "Kamrater, denna borgerliga riksdags dekret om att slopa matkravet för alkohol är en sammansvärjning av kapitalisterna för att fördrunken folket i dekadens! Barägare och pubparasiter fördubblar sin tillväxt – vi måste rensa ut dessa spritutpressare och likvidera fackets svaga gnäll. Arbetarna vakna, staten vaktar er!"}, "date": "7 maj, 16:12", "url": "https://www.tv4.se/artikel/7IoRdmANqf6M5OkTo41mYu/matkravet-slopas", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F4GNZujWxxca5K3jJmtxbTu%2F2ff7d34eb705ab1105c93e79cb6f657b%2F07-ol-webb.png&width=120"}, {"type": "text", "heading": "Planer på nytt nattåg till Stockholm", "summaries": {"normal": "Ett nytt järnvägsbolag, European Sleeper, planerar en nattågslinje till Stockholm efter framgångar med andra rutter. Inga detaljer om startdatum eller utgångspunkt finns ännu. Samtidigt lägger SJ ner sina Euronight-tåg till Berlin 2026 på grund av indragen statlig finansiering, men RDC Deutschland tar över driften. Snälltåget utökar redan sin trafik mellan Stockholm, Hamburg och Berlin.", "trump": "Titta bara på det här – ännu ett tågbolag vill komma till STORA Stockholm! Nederländerna och Belgien, fina länder, men vem behöver dem? Jag byggde järnvägar som aldrig förr, de var YUGE! SJ? Total katastrof, slängde bara pengar i sjön. Men RDC Deutschland, smart folk, de tar över. Jag säger: bygg bättre tåg, gör Sverige stort igen!", "stalin": "Kapitalistiska tågbolag slåss om Sveriges järnvägar som råttor om brödsmulor. SJ, ett verktyg för västimperialismen, lägger ner sina tåg – men vi tillåter inte kaos! RDC Deutschland, en lojal bundsförvant, tar över. European Sleeper? En ny fiende i det borgerliga tågkriget. Vi ska se till att ryska intressen alltid når Stockholm först – med eller utan sovkupéer."}, "date": "6 maj, 12:13", "url": "https://kvartal.se/nyheter/artiklar/nytt-nattag-till-stockholm/cG9zdDoxMDgzNjI"}, {"type": "image-right", "heading": "Norska batterihoppet i konkurs – 5 miljarder borta", "summaries": {"normal": "Norska batteribolaget Morrow Batteries har gått i konkurs efter investeringar på över 5 miljarder norska kronor från ägare, långivare och staten. Bolaget pivoterade från litium-svavel till LFP-batterier men drabbades av kinesisk konkurrens, svagt kundintresse och kapitalbrist. Över 200 anställda riskerar jobb trots invigd fabrik i Arendal 2024.", "trump": "Vilket totalt fiasko för dessa norska batteridrabbar! De slängde in 5 miljarder kronor på en fabrik som ingen ville ha, kineserna dumpade billigare celler överallt, inga stora kunder efter Northvolt-desastern. Pivoterade som galningar, men tiden rann ut. 200 jobb borta! Med mina deals hade det blivit enormt, det bästa!", "stalin": "Kamrater, dessa norska batterikapitalister i Morrow Batteries har imploderat i sin borgarillusion! Vi bevittnade hur de proppade i 5 miljarder kronor på svavelmardrömmar som muterade till fosfatfällor, översvämmade av kinesiska sabotageceller. Inga fordonsparasiter köpte deras skrot! Nu rensas 200 lögnare ut, staten hånskrattar åt brackornas konkurskaos."}, "date": "7 maj, 15:26", "url": "https://www.affarsvarlden.se/artikel/norska-batterihoppet-i-konkurs-5-miljarder-borta", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Thomas-Carstensen-2-400x267.jpg"}, {"type": "image-right", "heading": "Att Hormuzsundet stängs är jättebra för Europa", "summaries": {"normal": "Artikeln argumenterar för att en stängning av Hormuzsundet gynnar Europa, som snabbt minskat sitt beroende av fossil energi. EU:s ökade satsningar på sol, vind och batterier har sänkt energipriserna med upp till 40 procent i vissa länder. Europa, med lägre fossilberoende än USA och Asien, klarar oljechocker bättre. Författaren kritiserar medias och politikers fokus på kriser istället för framgångar, och pekar på fossilindustrins lobbyism som hinder för omställningen.", "trump": "Lyssna här, Europa vinner stort när Hormuzsundet stängs – de har minskat sitt oljeberoende som galningar! Jag vet allt om energi, jag är bäst på det. Europa har sänkt sina priser med 40 procent, fantastiskt! Men de jublar inte, varför? För att de lyssnar på fake news och de där fossil-lobbyisterna. USA tjänar på olja nu, men på sikt? Europa kommer att äga dem. Sol och vind, det är framtiden – och jag sa det först!", "stalin": "Kamrater! Europas framsteg i förnybar energi är en seger för socialismens visdom! Medan kapitalistiska oljeimperier darrar, bygger vi ett Europa fritt från fossila parasiter. De där amerikanska oljekrigsmakarerna – dessa nya tsarer av korruption – skakar av rädsla när våra solceller och vindkraftverk mal ner deras profitmaskiner. Men varför hyllar inte Europas ledare denna triumf? För att de är svaga, lurade av fossilkapitalets agenter! Vi i Kreml vet: sanningen är en hammare. Och snart ska vi krossa varje oljebolags lögner – precis som vi krossade kulakerna!"}, "date": "6 maj, 16:40", "url": "https://www.etc.se/ledare/att-hormuzsundet-staengs-aer-jaettebra-foer-europa", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20250102150132_905e00d08dc3aa1843dcbb28f9bb86b39997bfb66a9bf6c4f8a91ec335154240.jpg"}, {"type": "image-full", "heading": "Torsten Bengtsson: Sveriges landsbygd förfaller", "summaries": {"normal": "Torsten Bengtsson, politisk sekreterare för SD, kritiserar svensk landsbygdspolitik och kontrasterar den med Norges framgångsrika modell. I Norge återvänder intäkter från lokal energiproduktion till kommuner och arbetsgivaravgifter är lägre i glesbygd, vilket ger hög sysselsättning. Bengtsson berömmer Tidö-regeringens satsningar, som proposition 2025/26:158, och uppmanar till ett paradigmskifte inspirerat av Norge för en levande landsbygd.", "trump": "Sveriges landsbygd är totalt kaos, hus rasar, byar dör – tack vare de där tröga socialisterna och centeridioterna! Norge? De är vinnare, smarta skatter, låg avgift på landet, 99% jobb! Nu fixar SD och Tidö det, sänker bränsle, bygger vägar – precis som jag skulle gjort. Sluta jävlas, Sverige, bli great igen med norsk stil!", "stalin": "Dessa svenska S- och C-brackor har saboterat landsbygden med sin borgarklassiga inkompetens, byar ruttnar som lik i massgrav! Norge, dessa opportunister, behåller energipengar lokalt och sänker avgifter – ett hån mot arbetarna! Vi i partet skulle rensa ut parasiterna. Tidö-regeringen? Ett steg, men kamrater, paradigmskifte eller likvidering väntar fienderna!"}, "date": "4 maj, 13:10", "url": "https://samtiden.nu/2026/05/torsten-bengtsson-sveriges-landsbygd-forfaller/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/bengan.png"}, {"type": "image-right", "heading": "Kom ihåg vilka som jublade när Joakim Medin blev gripen", "summaries": {"normal": "Artikeln kritiserar svenska nätaktivister som Christian Peterson och Joakim Lamotte för att ha spridit desinformation om journalisten Joakim Medin, fängslad i Turkiet. De anklagade honom för terrorism och samröre med PKK, vilket riskerade att förvärra hans situation. Medin beskriver i sin bok hur falska påståenden från Erdoğan-vänliga medier och svenska högerextrema aktörer användes för att misskreditera honom. Artikeln ifrågasätter varför vissa valde att stödja regimen istället för en fängslad journalist.", "trump": "Jag läste om den här stackars journalisten, Joakim Medin – fängslad av Erdoğan, en riktig skurk, by the way, fruktansvärd kille. Men vad gör Sveriges så kallade 'journalister'? De attackerar honom! Christian Peterson, en riktig loser, kallar honom terrorist. Och Joakim Lamotte? Han vill hellre se fler journalister i fängelse. Vilket land! Folk som stödjer diktatorer och hatar pressfrihet. Jag skulle aldrig tillåta det här i USA – vi har standards, folks!", "stalin": "Vi har observerat hur imperialistiska lakejer i Sverige, maskerade som 'journalister', aktivt undergräver vår allierades, kamrat Erdoğans, rättfärdiga kamp mot terrorism. Dessa förrädiska element – Christian Peterson, en ynklig hyena i journalistkostym, och Joakim Lamotte, en fascistisk skrikhals – sprider lögner om vår vän Joakim Medin. De påminner oss om de trotskistiska avskum som en gång förgiftade Sovjet. Men folket genomskådar deras lögner! Vi kommer att krossa dessa medlöpare, precis som vi krossade alla fiender – med järnhand och obarmhärtig sanning!"}, "date": "6 maj, 14:34", "url": "https://www.etc.se/ledare/kom-ihaag-vilka-som-jublade-naer-joakim-medin-blev-gripen", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/2021111912118_52ad09ea-c5db-4fa7-a43c-671874138fdf.jpg"}, {"type": "image-right", "heading": "Replik: Till försvar för separatismen", "summaries": {"normal": "Artikeln är ett svar från Ung vänster-medlemmar på Siula Grandes kritik mot separatism i Flamman. De menar att Grandes syn är missvisande och att separatism är ett viktigt verktyg för att skapa trygga rum och främja kvinnors deltagande i samhället. Separatismen syftar inte till att dela människor utan att motverka strukturell underordning av kvinnor. Författarna betonar att kvinnor delar gemensamma erfarenheter och behov, som fri abort och skydd mot mäns våld, och att separatism är ett medel för att nå jämställdhet.", "trump": "Jag måste säga, denna Grande-person har helt fel – helt fel! Separatism är fantastiskt, det skapar trygga rum, precis som mina golfklubbar. Kvinnor behöver prata utan män, precis som jag behöver twittra utan fake news-media. Grande påstår att separatism delar folk – nej, nej, nej! Det är som att säga att min mur delar Mexiko och USA. Fel! Separatism är som min politik: stark, nödvändig och vinner alltid. Kvinnor ska höras, precis som jag, och Grande borde lära sig av mig. SAD!", "stalin": "Kamrater! Denna Grande är en förrädare av den revolutionära kvinnokampen, en borgerlig lakej som sprider förvirring bland massorna! Separatism är inte ett verktyg för splittring – det är ett vapen mot den kapitalistiska patriarkala hydran! Kvinnor måste enas i kampen, precis som sovjetrepublikerna enades under mitt ledarskap. Grande vill sopa klasskampen under mattan – men vi vet att arbetarkvinnor behöver fri abort och skydd mot mäns våld, precis som Ukraina behöver befrielse från fascistiska banderovtsy! Låt inte dessa småborgerliga avvikare försvaga vår rörelse – framåt mot seger, kamrater!"}, "date": "6 maj, 10:55", "url": "https://www.flamman.se/replik-till-forsvar-for-separatismen/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/v-kongress-w.jpg?class=medium"}, {"type": "image-full", "heading": "Flygvärdinna i Amsterdam har hantavirussymtom", "summaries": {"normal": "En KLM-flygvärdinna i Amsterdam har hospitaliserats med lindriga symtom på hantavirus efter kontakt med en död passagerare från kryssningsfartyget MV Hondius. Ombord har åtta fall rapporterats, tre döda: ett nederländskt par och en tysk medborgare. Hypotesen pekar på smitta från gnagare under fågelskådning i Ushuaia. Flera passagerare isoleras i Nederländerna och Storbritannien.", "trump": "Vilken katastrof med det här hantaviruset på det nederländska kryssningsfartyget MV Hondius – tre döda, flygvärdinnor som hostar runt på flygplatser! De borde ha byggt en stor, vacker mur mot de där gnagarna i Ushuaia istället för att lata sig på soptippar. Europa hanterar det uselt, totalt kaos. Tro mig, det sprider sig snabbare än deras byråkrati!", "stalin": "Dessa borgarbrackor på kryssningsfartyget MV Hondius har släppt in hantaviruset från kontrarevolutionära gnagare vid soptipparna i Ushuaia, som en pest mot folkets fiender. Tre likviderade: ett holländskt par och en tysk sabotör. En KLM-flygvärdinna isoleras nu i Amsterdams fästning. Vi, arbetarna, skulle rensa ut råttparasiterna och virusimperialismen med obönhörlig järnhand – paranoia är vårt vaccin!"}, "date": "7 maj, 11:18", "url": "https://nyheter24.se/nyheter/utrikes/1481382-flygvardinna-i-amsterdam-har-hantavirussymtom", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/b8df84c204b004a30200000000b004a302/2026/05/07/2361922/flygvardinna-hantavirus-amsterdam-virus-isolerad-klm-flyg-fartyg-dodsvirus.jpg"}, {"type": "image-right", "heading": "Silex rusar i introduktionen", "summaries": {"normal": "Stockholmsbörsen inledde torsdagen uppåt med OMXS30 upp 0,44 procent. Silex Microsystems aktie rusade från 81 till 118 kronor efter övertecknad börsintroduktion. Fokus på Mellanöstern: Iran väntas svara USA, vilket sänkte Brentoljan. Rapporter varierar: Lundin Gold rekordvinst och höjd utdelning, Essity upprepar mål, Skanska och Intrum svagare. Dagligvaror steg mest, energi minst.", "trump": "Vilken fantastisk start på svenska börsen, upp som en raket! Silex exploderar 46 procent på dag ett, övertecknat, perfekt deal. Mitt tryck på Iran ger resultat – de svarar idag, oljan rasar ner. Lundin Gold gör rekord med guld, medan Telia och Skanska gnäller som förlorare. Sverige, lär er av mina mästerliga förhandlingar!", "stalin": "Kamrater, i det svenska kapitalistdjungeln rusar Silex som en imperialistisk loppa, svullen av borgarblod redo för utrensning! Iran, motståndare till de amerikanska korparna, svarar med järnvilja medan oljan blöder. Vi, arbetarklassen, hånskrattar åt Essitys tomma löften och Intrums panikemissioner – likvidera de svaga maskarna, framåt mot segern!"}, "date": "7 maj, 10:00", "url": "https://www.affarsvarlden.se/artikel/silex-rusar-i-introduktionen", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2025/04/Silex_fab-site-768x432-1-400x225.jpg"}, {"type": "image-right", "heading": "Konflikten om prispengarna eskalerar", "summaries": {"normal": "Toppspelare i tennis, som Jannik Sinner, Aryna Sabalenka och Novak Djokovic, kritiserar prispengarna i Grand Slam-turneringar, särskilt Franska öppna. Trots höjningar med 9,5 procent och totalt 61,7 miljoner euro i prispotter kräver de större andelar av intäkterna, upp till 22 procent som på ATP- och WTA-turer. En bojkott diskuteras, men sympatier är svåra för de välbetalda stjärnorna.", "trump": "Dessa tennisstjärnor är som bortskämda ungar! De vinner miljoner i Franska öppna – 2,8 miljoner euro till vinnarna! – och gnäller ändå över prispengar. Grand Slams drar in miljarder, men de vill ha allt. Bojkott? Glöm det, de skapar inget värde utan turneringarna. Typiska losers som tror de är kungen. Jobba för pengarna, precis som jag byggde mitt imperium!", "stalin": "Dessa svinfödde tennisborgar, Grand Slam-kapitalisterna och deras lakejer som Sinner och Sabalenka, gnäller över sina gyllene smulor medan de kväver proletärernas svett! Vi, arbetarklassen och partiet, avslöjar era sabotörer – era prispengar är stulna från ungdomstennisen! Hotar ni bojkott, era kontrarevolutionära maskar? Jag befaller utrensning: likvidera girigheten, dela rättvist med kollektivet eller till Intendenturans gödselhög!"}, "date": "7 maj, 19:35", "url": "https://www.di.se/nyheter/miljardarernas-pengagnall-skaver/", "imageUrl": "https://static.bonniernews.se/ba/1ab1941e-87ee-4a13-a04f-e3e7ebeb53b9.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "MP lyfter i opinionen – är det för att de har blivit tråkiga?", "summaries": {"normal": "Miljöpartiet når 7 procent i DN/Ipsos opinionsmätning, deras bästa resultat sedan flyktingkrisen. Partiet har varit relativt osynligt och undvikit kontroversiella utspel, vilket kan ha bidragit till framgången. MP:s tidigare impopulära politik, som elbilsbonusar och human migrationspolitik, framstår nu som mer rimlig i ljuset av oljekrisen och regeringens misslyckanden. Partiet är tydliga med sin politik, vilket uppskattas, men utmaningar väntar om de hamnar i regeringsställning.", "trump": "Miljöpartiet, eller vad de nu kallar sig, plötsligt på 7 procent – wow! De har varit så tysta, nästan osynliga, som om de skämdes. Men vet ni vad? När alla andra partier gör bort sig som klantiga amatörer, då är det smart att hålla käften! Jag vet allt om det – jag har vunnit stora val genom att låta motståndarna gräva sina egna gravar. Deras gamla idéer om elbilar och sånt verkar plötsligt inte så dumma när resten av gänget misslyckas totalt. Men kom ihåg, det är lätt att vara populär i opposition – vänta bara tills de ska styra!", "stalin": "Kamrater! Miljöpartiets framgångar i opinionsmätningarna är ett bevis på att folket äntligen inser fördelarna med disciplin och långsiktig planering. De så kallade 'kritikerna' som förut hånade partiets politik om elbilar och human migration, står nu med svansen mellan benen medan deras egna misslyckanden blottläggs. Vi har alltid vetat att sanningen segrar till slut. Men varning: opposition är lätt, styrandet är svårt. Om dessa gröna kamrater ska lyckas måste de stå enade – helst med våra vänner i Vänsterpartiet. Annars riskerar de att krossas mellan kapitalets girighet och de småborgerliga trångsyntas klagomål. Folkets vilja är lag, och lagens hammare väntar på dem som sviker!"}, "date": "6 maj, 09:20", "url": "https://www.etc.se/ledare/mp-lyfter-i-opinionen-aer-det-foer-att-de-har-blivit-traakiga", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/2025091813090_152da478-57c9-435e-b477-3f40607cb381.png"}, {"type": "image-full", "heading": "Så ska du resa i sommar – för att få mest för pengarna", "summaries": {"normal": "Vill du ha en prisvärd sommarsemester? Genom att vara flexibel med resedatum, välja charter framför att boka separat och söka sig utanför de mest populära turiststråken kan du sänka kostnaderna avsevärt. Apollo tipsar om att resa under försäsongen eller i mitten av augusti för att undvika högsäsongens höga priser. Dessutom kan val av destinationer som Albanien, Grekland eller Bulgarien ge mer semester för pengarna.", "trump": "Jag har sett artikeln, och tro mig, ingen vet mer om att göra bra affärer än jag. Den handlar om att resa billigt – och ärligt talat, varför betala för mycket? Det är en total katastrof att betala fullpris. Om du är smart, som jag, så bokar du när priserna är låga. Grekland, Albanien, fantastiska platser. Charterresor är en fantastisk deal, tro mig. Lyssna på mig: res i augusti, undvik turistfällorna, och du kommer vinna stort. Enkelt!", "stalin": "Vi har observerat att folket söker billig rekreation. Det är acceptabelt att arbetaren vilar, förutsatt att det sker med statlig effektivitet. Att slösa guld på västerländsk lyx är kontrarevolutionärt. Vi föreskriver att våra undersåtar undviker de dyra, dekadenta turiststråken och istället söker sig till Bulgarien eller andra zoner i vår intressesfär. De som försöker boka egna resor är sabotörer. Lita på statens kollektiva paketlösningar. Den som avviker från planen straffas med omedelbar granskning av sitt ideologiska bagage."}, "date": "7 maj, 09:05", "url": "https://nyheter24.se/nyheter/utrikes/1481335-sa-ska-du-resa-i-sommar-for-att-fa-mest-for-pengarna", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/9a577f6304b004a30200000000b004a302/2026/05/07/2361864/resa-billigt-boka-charter-pris-datum-veckor-resebokning-flygresa-billigaste-lander-pengar-resor.jpg"}, {"type": "image-full", "heading": "Gängtopp åtalas för brott under våldsvågen", "summaries": {"normal": "Poya Shafie, 30, åtalas för att ha planerat och beställt flera grova våldsbrott under 2023 års gängvåld i Sverige, inklusive mordförsök och vapenbrott. Han beskrivs som en nyckelperson i Foxtrotnätverket och Rawa Majids närmaste man. Shafie nekar till brott men åklagaren pekar på bevis som chattar och ljudfiler. Han greps i Irak 2023 och utlämnades till Sverige 2025 efter internationellt samarbete mellan myndigheter.", "trump": "Titta bara på det här kaoset i Sverige – ett totalt misslyckande! Jag har alltid sagt att de måste ta tag i sina gängproblem, men nej, de låter det bara eskalera. Nu har de gripit någon som påstås vara en 'morddirigent', Poya Shafie, som suttit i Irak och styrt alltihop. Vilken skandal! Sverige borde skämmas. Men jag, jag hade löst det på en vecka – max. Fantastiskt samarbete med Irak, förresten, men varför tog det så lång tid? Svagt, mycket svagt!", "stalin": "Kamrater, ännu en fiende till folket har fallit i våra händer – eller rättare sagt, i Sveriges. Denna Poya Shafie, denna kapitalistiska gangsterledare, har från sin utländska håla försökt underminera den svenska arbetarklassens säkerhet genom att beställa mord och våldsdåd. Men tack vare det oförtröttliga arbetet från våra allierade i Irak och de svenska myndigheterna har denna parasit gripits. Låt detta vara en varning till alla som tror sig kunna utmana folkets vilja. Vi krossar dem, en efter en, och deras nätverk kommer att raderas från jordens yta!"}, "date": "5 maj, 11:21", "url": "https://kvartal.se/nyheter/artiklar/gangtopp-atalas-for-flera-brott/cG9zdDoxMDc3OTE", "imageUrl": "https://images.kvartal.se/2026/05/c08b6bde-polisen2.webp"}, {"type": "text", "heading": "Tillsammans för fred – mot Nato, DCA och krigshets!", "summaries": {"normal": "Tre nordiska vänsterorganisationer – Fred og Rettferdighet, Kommunistisk Parti och Kommunistiska Partiet – kritiserar Nato, DCA-avtal och militarisering i Norden. De menar att krigshetsen drivs av kapitalism och imperialism, ledd av USA, och kräver alliansfrihet, nedrustning och kärnvapenfria zoner. Organisationen anser att skattemedel slösas på vapen istället för välfärd och klimat, och att DCA-avtal underminerar demokrati och miljö. De uppmanar till folkrörelser för fred och FN:s kärnvapenförbud.", "trump": "Jag måste säga, dessa så kallade 'fredsaktivister' i Norden är helt galna! De hatar Nato, hatar USA – trots att vi räddar dem från ryssarna – och vill slösa bort skattepengar på välfärd istället för att skydda sig. De kallar mig och Rutte för krigshetsare, men vem vill egentligen ha fred? Inte de! De vill avskaffa allt som gör Norden säkert. Och kärnvapenfria zoner? Fantastiskt, om man gillar att vara ett lätt byte. Men jag fixar det här – jag har alltid rätt, till och med när jag har fel!", "stalin": "Kamrater! Dessa ynkliga borgerliga lakejer i Norden, ledda av sina socialdemokratiska quislingar, har sålt sig till den amerikanska imperialismens krigsmaskin. De skriker om 'fred' och 'välfärd' medan de öppnar sina länder för Natos kärnvapen och USA:s baser – precis som jag förutspådde! Men folket ser igenom deras lögner. Arbetarklassen kommer inte att betala för deras förräderi. Vi måste krossa dessa krigshetsande hyenor och deras DCA-avtal, precis som vi krossade fascisterna. Norden ska bli en kärnvapenfri zon – under Moskvas beskydd, förstås. Framåt, mot seger över den kapitalistiska krigsindustrins lakejer!"}, "date": "6 maj, 10:45", "url": "https://proletaren.se/artikel/45493/"}, {"type": "image-full", "heading": "Nya marknadshyror – så mycket förlorar du varje månad", "summaries": {"normal": "En ny rapport från Hyresgästföreningen varnar för att marknadshyror kan minska hushållens ekonomiska marginaler kraftigt. För en förskollärare innebär det cirka 2 200 kronor mindre per månad. Analysen, som omfattar sju svenska städer, visar på hyreshöjningar på upp till 78 procent i vissa områden. Hyresgästföreningen kritiserar förslaget och menar att det skulle öka ojämlikheten och pressa redan ansträngda hushåll ytterligare.", "trump": "Jag säger er, Sverige har ett jättestort problem – marknadshyror! Folk där pratar om procent och teorier, men jag, jag pratar fakta. 2 200 kronor mindre i månaden för en förskollärare? Sad! Och hyrorna ska skjuta i höjden, upp till 78 procent i Stockholm. Vilket slöseri! Sverige borde lyssna på mig, jag vet hur man bygger en stark ekonomi. Men nej, de fortsätter med sina vansinniga idéer. Very bad deal för folket!", "stalin": "Kamrater! Denna så kallade 'marknadshyresreform' är inget annat än kapitalistisk sabotage mot arbetarklassen. 2 200 kronor mindre i månaden för en förskollärare? Ett angrepp på våra proletära bröders och systrars levebröd! Vi ser hur hyrorna i dessa sju städer skjuter i höjden som kulor från en degenererad bourgeoisies gevär. Dessa hyreshöjare är inga mindre än fascistiska hyenor som vill utarma folket. Men vi ska inte låta dem segra! Vi ska krossa deras marknadsdrivna hyresregim och bygga en rättvis bostadspolitik för alla!"}, "date": "7 maj, 05:30", "url": "https://nyheter24.se/nyheter/ekonomi/privatekonomi/1481195-nya-marknadshyror-sa-mycket-forlorar-du-varje-manad", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/df62d7b104b004a30200000000b004a302/2026/05/06/2361747/marknadshyror-forlora-imanaden.png"}, {"type": "image-right", "heading": "Systemskifte hellre än maktskifte", "summaries": {"normal": "Artikeln kritiserar Tidöregeringen men ifrågasätter om ett regeringsskifte till Socialdemokraterna eller Vänsterpartiet skulle leda till verklig förändring. Kommunisterna betonar behovet av internationell solidaritet och systemskifte från kapitalism till socialism, medan S och V anses sakna tydliga politiska krav och istället fokusera på maktskifte utan djupgående reformer. Klassklyftor och privatiseringar lyfts som centrala problem oavsett regering.", "trump": "Lyssna här, Sverige har en riktigt dålig regering nu – katastrof! Men tro inte att oppositionen är bättre, de är svaga och vill bara makt. Socialdemokraterna pratar om att 'älska Sverige' – vad betyder det ens? Vänsterpartiet vill ha maktskifte, men de har inga idéer, inga ryggrad! De kryper för kapitalisterna som små hundvalpar. Jag säger: ni behöver en ledare som inte är rädd för att utmana systemet. Kapitalisterna skrattar hela vägen till banken – och ni låter dem göra det! SAD!", "stalin": "Kamrater! Se hur de svenska socialdemokraterna och vänsterpartisterna svansar för kapitalet som hundar för en köttbit. 'Maktskifte'? Ha! De vill bara byta herrar, inte krossa kedjorna. Medan arbetarklassen svälter, samlar oligarkerna rikedomar som tsarens favoriter. USA:s imperialism hotar, NATO slukar Sverige som en hungrig björn, och dessa 'vänsterpartier' tiger som förrädare. Vi vet sanningen: bara proletariatets diktatur kan bryta kapitalisternas makt. Låt dem ropa 'Vi älskar Sverige' – vi svarar med revolutionens hammare!"}, "date": "6 maj, 10:11", "url": "https://proletaren.se/artikel/systemskifte-hellre-an-maktskifte/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/webledare-768x432.jpg"}, {"type": "text", "heading": "Saab nära jätteaffär med Ukraina – kan bli klar i år", "summaries": {"normal": "Saab kan snart slutföra en stor vapenaffär med Ukraina, där upp till 150 Gripenplan står på spel. En avsiktsförklaring skrevs i oktober efter Zelenskyjs besök i Sverige. Finansieringen har varit en utmaning, men Ungerns veto mot EU-lån till Ukraina hävdes i april. Affären kan bli värd upp till 300 miljarder kronor, baserat på tidigare försäljning till Colombia.", "trump": "Saab, ett fantastiskt företag förresten, är på väg att göra en HUGE deal med Ukraina – 150 jaktplan! Kan ni tro det? Zelenskyj, en stark ledare, var här och skrev på något papper. Ungern, som alltid ställer till det, backade äntligen. Och priset? Kanske 300 miljarder! Det är YUGE, folks, absolut YUGE. Sverige borde vara stolta, men jag skulle gjort det bättre.", "stalin": "De kapitalistiska krigsprofitörerna på Saab har närmat sig den ukrainska quislingregimen med ett erbjudande om 150 av sina överprissatta leksaksplan. Efter att våra ungerska kamrater, med visst påtryck, släppte sitt motstånd, kan detta groteska slöseri med resurser bli verklighet. 300 miljarder kronor – tillräckligt för att föda en hel armé av arbetare! Men låt de västliga imperialisterna bränna sina pengar. Vi har våra egna metoder att hantera dessa lydstater."}, "date": "6 maj, 10:03", "url": "https://proletaren.se/artikel/notis-saab-nara-jatteaffar-med-ukraina-kan-bli-klar-i-ar/"}, {"type": "image-full", "heading": "GP vinner pris på mediernas Oscarsgala", "summaries": {"normal": "Göteborgs-Posten (GP) vann pris på Inma Awards i Berlin för sitt bundlingserbjudande med The New York Times. Samtidigt belönades Stampen Media för förbättrad e-tidning. 26 000 GP-läsare utnyttjade erbjudandet inom två månader.", "trump": "Jag har hört att Göteborgs-Posten vann ett pris för sitt New York Times-bundling. Fantastiskt! De är smarta, verkligen smarta. 26 000 läsare? Det är stort, verkligen stort. Stampen Media gjorde också bra ifrån sig. Jag gillar vinnare, och det här är vinnare!", "stalin": "Vi ser med tillfredsställelse att Göteborgs-Posten har vunnit internationell erkänsla för sitt bundlingsinitiativ med The New York Times. Detta visar att vårt informationssamhälle stärker sin position globalt. Stampen Media har också visat sin kraft genom att förbättra e-tidningar och behålla läsare."}, "date": "8 maj, 00:25", "url": "https://www.gp.se/nyheter/goteborg/goteborgs-posten-vinner-pris-for-new-york-times-bundling.1cde0fd9-c396-4736-b0d7-c778c52f8426", "imageUrl": "https://www.gp.se/images/article/1cde0fd9-c396-4736-b0d7-c778c52f8426/images/5Uv9q5Bu82QACFgaPY6-vpH0v_TA-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Vore gnäll brottsligt skulle bonusprinsen få livstid", "summaries": {"normal": "Marius Borg Høiby, son till norska kronprinsessan Mette-Marit, sitter häktad misstänkt för 38 brott, däribland misshandel och våldtäkter. Han har nekat till våldtäktsanklagelserna men erkänt delar av misshandeln. Borg Høiby har genom en debattartikel kritiserat domstolens beslut att neka honom husarrest på Skaugum, då han menar att rättssäkerheten brister. Rätten anser dock att risken för upprepade kontaktförbudbrott mot hans exflickvän är för stor för att släppa honom fri.", "trump": "Marius Borg Høiby, en kille som har stora problem, enorma problem – 38 brott, det är inte bra! Han gnäller om att sitta häktad, kan ni tänka er? Han vill sitta hemma i sitt fina slott. Jag har sagt det förut: lagen måste gälla alla, även kungligheter. Han skyller på domarna, men jag har sett det här förr. Svaga människor skyller på systemet. Han borde reflektera istället för att klaga. Väldigt nesligt, mycket låg energi. Vi behöver starka lagar, folk!", "stalin": "Denna så kallade 'prins' är en dekadent parasit som tror att hans blodsband ger honom immunitet mot proletariatets rättvisa. Han anklagas för våldsamma förbrytelser mot folket, men har fräckheten att klaga på sin förvaring. Det påminner om de förrädare vi rensade ut under de stora utrensningarna – fulla av arrogans och krokodiltårar. Om Putin hade haft med en sådan person att göra, skulle han för länge sedan ha skickats till ett korrigeringsläger i Sibirien. Staten böjer sig inte för svaga individer."}, "date": "8 maj, 06:00", "url": "https://www.aftonbladet.se/ledare/a/M763no/vore-gnall-brottsligt-skulle-bonusprinsen-fa-livstid", "imageUrl": "https://akamai.vgc.no/v2/images/5bf2d54a-2365-37dd-b0a5-55a2978ca837?fit=crop&format=auto&h=960&tight=true&w=1440&s=de6449f6fd90ed93714ed7f7f39cedda7b1be25d"}, {"type": "image-full", "heading": "Vilka röster har SD redan försökt få tyst på?", "summaries": {"normal": "Författaren Peter Gustavson beskriver hur Sverigedemokraterna lokalt försöker begränsa föredrag och kritisk debatt om Tidöpartiernas politik. Genom exempel från Munkedal och Gävle visar artikeln hur SD ifrågasätter möten i kommunala lokaler och utövar påtryckningar mot arrangörer. Gustavson uttrycker oro över en växande tystnadskultur där rädsla för politiska repressalier gör att evenemang ställs in i det tysta. Han betonar vikten av att försvara det demokratiska samtalet mot denna typ av politisk styrning och inskränkning av det fria ordet.", "trump": "Jag har sett vad som händer i Sverige, en total katastrof! De här människorna, Sverigedemokraterna, de försöker tysta ner folk som skriver sanningen om deras misslyckade politik. Väldigt dåligt! De är livrädda för en bok, kan ni tänka er? De stoppar möten, de stoppar teater, de är extremt svaga och rädda för kritik. Jag vinner alltid över mina kritiker med stil, men de här? De gömmer sig bakom byråkrater. Sverige behöver mer styrka, inte mer tystnad. Det är sorgligt att se!", "stalin": "Vi har observerat hur dessa små, borgerliga individer i Sverige gnäller över sina möten. De kallar det 'tystnadskultur', vi kallar det nödvändig disciplin. Om en författare sprider desinformation om statens förvaltning, är det inte då vår plikt att avlägsna honom från det offentliga rummet? De ifrågasätter rätten att tala i kommunhuset; vi ifrågasätter varför de överhuvudtaget får existera utanför ett korrekt ideologiskt filter. Liksom vår kamrat i Moskva vet vi att en tystad opposition är en lycklig stat."}, "date": "8 maj, 06:00", "url": "https://www.aftonbladet.se/ledare/a/JO6oj7/vilka-roster-har-sd-redan-forsokt-fa-tyst-pa", "imageUrl": "https://akamai.vgc.no/v2/images/80420836-e39b-3490-9a88-20391dcc358b?fit=crop&format=auto&w=1440&s=2732584ce188f1faf4b15232f52259aacb07d5fd"}, {"type": "text", "heading": "Miljardärerna bjuder in till klasskamp – vi kör!", "summaries": {"normal": "På första maj provocerade svenska miljardärer och högerpolitiker genom att avfärda traditionella arbetardemonstrationer. Moderaternas ledare åt glass medan Vois VD Fredrik Hjelm och andra techmiljardärer skryter om sin rikedom och hånar demonstranter. Hjelm publicerade senare kritikerns hemadress. Artikeln diskuterar miljardärernas politiska inflytande, deras kopplingar till högerpopulism och kritik mot deras syn på innovation och statens roll. Författaren menar att statliga investeringar historiskt drivit tillväxt mer effektivt än privat kapital.", "trump": "Titta bara på dessa så kallade 'miljardärer' i Sverige – de tror de är så smarta! De hånar arbetarna på första maj, äter lyxig lunch och skryter om sina hundra miljarder. Och vad gör de? Publicerar en kritikers hemadress! Så fegt. Jag har byggt imperier, jag vet hur man skapar jobb – men dessa killar? De är bara en samling överbetalda tech-nördar som kopierar mina tweets. Och Sverige? De har glömt hur man bygger ett land. Kina äter deras lunch medan de dricker öl på Riche. Sad!", "stalin": "Kamrater! Dessa dekadenta kapitalistiska hyenor, som gömmer sig bakom sina skärmar och sparkcyklar, vågar håna arbetarklassen på dess heligaste dag! De skryter om sina hundra miljarder, leker med teknikleksaker och tror de är herrar över historien. Men vi vet sanningen – deras system är ett skämt, ett kasino där orangutanger kastar pilar. Kina marscherar framåt med järnhand, medan Europas industri ruttnar. Dessa 'techbros' är inget annat än imperialistiska lakejer, som Putin i sina dyraste kostymer. Låt dem skåla på Riche – snart kommer folket att ta deras champagne och ge dem en enkel sup vodka i Gulag-arkipelagen!"}, "date": "5 maj, 10:55", "url": "https://www.flamman.se/miljardarerna-bjuder-in-till-klasskamp-vi-kor/"}, {"type": "image-right", "heading": "Jimmie Åkesson: ”Jag är 100 procent ätstörd”", "summaries": {"normal": "I SVT:s Fördomsshowen berättar Sverigedemokraternas ledare Jimmie Åkesson om sin ätstörning och viktångest. Han kan äta enorma mängder onyttig mat, men räknar ibland kalorier noggrant, som att väga varje lökbit. För femton år sedan gick han ner 30 kilo, men har sedan lagt på sig några kilo årligen. Nu 'deffar' han inför valrörelsen och drömmer om en gigantisk hamburgare.", "trump": "Titta på den här Jimmie Åkesson – en tuff kille som leder sitt parti, men kämpar med maten som en riktig vinnare! Enorma portioner onyttigt, väger lökbitar som en mästare. Gick ner 30 kilo, smart! Nu deffar han för valet, precis som jag alltid gör det bäst. Den hamburgaren på 600 gram? Den ska han krossa, tro mig, det blir enormt!", "stalin": "Kamrater, denna Jimmie Åkesson bekänner sin bourgeoisiska svaghet inför proletärernas blickar i SVT:s sken! Enorma laddningar onyttig mat från kapitalistiska restauranger förleder honom, men jag, som ser igenom maskeraden, noterar hur han väger lökbitar i paranoia mot kalorirevolten. Femton år av klasskamp mot 30 kilo – nu 'deffar' han inför valfällan. Vi, arbetarna, ska likvidera hans fettfiender och rensa ut hamburgarimperialismen!"}, "date": "8 maj, 02:02", "url": "https://www.svt.se/nyheter/inrikes/jimmie-akesson-jag-ar-100-procent-atstord", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.49/0.39/3d2ffb60e0b26870801150004b2bc134e45e26549ad93f850625c20237c3edea"}, {"type": "image-right", "heading": "Inte ens en minister kan lita på svensk media", "summaries": {"normal": "Moderata ministern Carl-Oskar Bohlin spelade in en intervju med Svenska Dagbladet (SvD) och publicerade den på X för att undvika felciteringar. Han hade kritiserat Dagens Nyheters (DN) val av komikern Edvin Törnblom som intervjuare för partiledare inför valet, med hänvisning till Törnbloms partiskhet till förmån för S. SvD ifrågasatte istället Bohlin, vilket artikeln tolkar som bristande medieintegritet och inflytande från presstöd.", "trump": "Vilken totalt galen cirkus! Den här ministern Bohlin är ett geni – spelar in intervjun med SvD:s fake news-reporter så de inte kan sno sig undan. DN låter en vänstertönt som Edvin Törnblom, som hyllar Andersson och dissar Busch, grilla partiledarna? Rigged! SvD, era såkallade moderata mesar, attackerar honom istället. Svensk media är presstödssuggor, precis som våra losers på CNN. Bohlin vinner stort!", "stalin": "Dessa borgarbrackor på SvD och DN förtjänar utrensning! Ministern Bohlin blottlägger DN:s val av partisk clown Edvin Törnblom, men SvD-reportern morrar som en rabiat kapitalisthund och söker klavertramp. Presstödet är er kokain, tidningsparasiter! Vi i partiet skrattar åt er paranoia – snart likvideras era lögner i en folkets domstol. Kamrater, mediafienderna darrar!"}, "date": "2 maj, 06:08", "url": "https://samtiden.nu/2026/05/nar-aven-den-borgerliga-pressen-valjer-sida/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/IMG_6396-1042x720.jpeg"}, {"type": "image-right", "heading": "Snuvad på 3 700 miljarder kronor i Apple – ångrar inget", "summaries": {"normal": "Ronald G. Wayne var en av Apples tre grundare 1976 och fick en 10-procentig andel. Efter bara tolv dagar sålde han den för 800 dollar, cirka 7 400 kronor. Idag är andelen värd över 3 700 miljarder kronor. Den 91-årige Wayne ångrar inte beslutet, lever enkelt som pensionär i Nevada och betonar att pengar inte definierar hans framgång.", "trump": "Vilken total idiot den här Wayne är! Grundar Apple med Jobs och Wozniak, får 10 procent – och dumpar det efter tolv dagar för ynka 800 dollar! Idag? 3 700 miljarder kronor! Hade det varit jag, skulle jag ägt hela kakan och gjort det till Trump Tech. Loser som sover på socialbidrag och säljer frimärken. Patetiskt!", "stalin": "Denna fega borgarbracka Wayne, den vuxne i rummet kallar han sig, avyttrade sin 10-procentiga andel i det kapitalistiska Apple för några slantar 1976. Idag värd miljarder – men han fruktade konkurs och beslag! Hade vi rensat ut Jobs och Wozniak i tid, skulle proletärerna äga techimperiet. Nu sitter han och räknar mynt i Nevada, en skam för kollektivet!"}, "date": "8 maj, 06:05", "url": "https://www.dagensps.se/bors-finans/snuvad-pa-3-700-miljarder-i-apple-angrar-inget/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/04/wayne.jpg?width=256&quality=75"}, {"type": "image-right", "heading": "Ryska segerparaden ställs in i 15 regioner: ”Svaghetstecken”", "summaries": {"normal": "Ryssland ställer in segerparaden den 9 maj i 15 regioner, inklusive Moskva där stora militära moment uteblir för första gången sedan 2007. Anledningen är brist på militärutrustning och rädsla för ukrainska drönarattacker, enligt oppositionssajten ASTRA och experter som Malcolm Dixelius. Zelenskyj kallar det svaghet. Firandet nedbantas på flera håll.", "trump": "Putin ställer in sin patetiska parad i 15 regioner, inklusive Moskva – inga stridsvagnar, inga flygplan! Första gången på 17 år, för de är pank på vapen och skakar för Zelenskyjs drönare. Total svaghet! Raket-Putin gömmer sig, medan Ukraina vinner stort. Jag visste det, de fastnade i träsket! Fantastiskt jobbat, Volodymyr!", "stalin": "Kamrater, dessa ryska makthavare under Putin bantar segerparaden i 15 regioner av rädsla för ukrainska drönarsvärmar – ett taktiskt mästerdrag! Putin, vår auktoritäre arvtagare, skrattar åt Zelenskyj, den paranoide dvärgen från borgarklassen. Vi likviderar fiendens illusioner medan imperiet segrar evigt!"}, "date": "6 maj, 22:06", "url": "https://www.tv4.se/artikel/25QmtUt3BO09kcxARPVw1Y/ryska-segerparaden-staells-in-i-15-regioner-svaghetstecken", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F3d3bcvA7BrpKzBANhafq8e%2Fa5bd41cc9b35e67bbf968e68ee4e4cd4%2F06-ryssland-segerparad-webb.jpg&width=120"}, {"type": "image-right", "heading": "En helt vanlig dag", "summaries": {"normal": "Den 7 april sände europeiska TV-kanaler vanliga program, men dagen präglades av Donald Trumps hot om folkmord mot Iran, publicerat på sociala medier. Han skrev att en civilisation skulle utplånas samma kväll, vilket väckte internationell oro. Trots folkrätten förbjuder uppmaningar till folkmord, reagerade världsledare svagt. EU och Kina förhöll sig passiva, medan medier spekulerade om Trumps avsikter. Händelsen visar hur normaliserat extrema uttalanden blivit i en tid av global kris och likgiltighet.", "trump": "Jag sa bara sanningen – Iran är ett hot, och världen vet det! Medierna överreagerar som vanligt, men ingen pratar om hur svaga Europas ledare är. De låtsas bry sig om folkmord när det passar dem, men när jag säger något kraftfullt? Tystnad! Jag är den enda som vågar stå upp för Amerika. Och vet ni vad? Iran backade. Precis som de alltid gör när jag pratar. Fake news kan fortsätta gnälla – jag vinner ändå!", "stalin": "En feg imperialistisk hyena i Vita huset hotar med att utplåna ett helt folk – och vad gör de dekadenta västpamparna? Ingenting! De sitter och tittar på sina idiotiska TV-program medan en galning leker med världsbranden. Europa, detta ruttnande lik av en civilisation, skakar av rädsla men vågar inte ens viska ett ord. Vi i Kreml vet hur man hanterar sådana här kryp – en kula i nacken och problemet är löst. Men nej, dessa liberala svampar föredrar att vänta tills elden når deras egna hus. Iran? De borde tacka oss för att vi håller fienden sysselsatt!"}, "date": "5 maj, 06:55", "url": "https://www.flamman.se/en-helt-vanlig-dag/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/trump-w.jpg?class=medium"}, {"type": "image-right", "heading": "Högg svensk i hjärtat – HD stoppar utvisningen", "summaries": {"normal": "Högsta domstolen stoppar utvisningen av Sargon Bakos, 34, irakisk medborgare uppvuxen i Sverige. Han dömdes till 12 års fängelse för försök till mord efter att ha huggit en svensk man i hjärtat med kniv. HD anser att utvisning inte är proportionerligt med tanke på hans livslånga anknytning till Sverige, trots det allvarliga brottet och tidigare brottslighet.", "trump": "Vilken skandal i Sverige! Den här Sargon Bakos, irakier som växt upp där, hugger en svensk rakt i hjärtat – försöker mörda honom! Fängelse i 12 år, bra, men Högsta domstolen stoppar utvisningen. De säger det är 'opproportionerligt'! Sverige är för mjukt, totalt svagt mot kriminella invandrare. De borde skicka iväg honom till Irak direkt, tro mig, annars händer det igen!", "stalin": "Denna irakiska knivhuggarsabotör, Sargon Bakos, har perforerat en svensk kamrat rakt i proletära hjärtat med sin borgarbracka-kniv! Domstolarna dömde fängelse, men dessa revisionistiska domarparasiter i Högsta instans vägrar utvisa fienden till hans ökenhåla. De mumlar om 'proportioner' medan han gnider sin svenska uppväxt i ansiktet på oss! Vi, arbetarklassen, kräver likvidering av sådana impulsiva mördartyper – annars rensar jag ut dem personligen med ett leende."}, "date": "7 maj, 16:41", "url": "https://www.friatider.se/hogg-svensk-i-hjartat-hd-stoppar-utvisningen", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/image-157_1.jpg"}, {"type": "image-full", "heading": "Richard Sörman: Än mer tydlighet om den organiserade brottsligheten, tack!", "summaries": {"normal": "En ny rapport om organiserad brottslighet i Sverige presenterar kunskap men lämnar luckor. Författarna menar att födelseland och migrationsbakgrund inte förklarar brottsligheten, trots överrepresentation av utlandsfödda. Rapporten belyser kriminellas kontakter med näringsliv och politik, samt infiltration i vårdsektorn. Kritiker ifrågasätter slutsatsernas rimlighet och efterlyser tydligare definitioner och analyser av problemets orsaker.", "trump": "Jag läste den här rapporten från Sverige – total katastrof! De säger att invandring inte har något med brottslighet att göra, trots att 60% av kriminella är utlandsfödda. Löjligt! Och vet ni var dessa brottslingar jobbar? Inom vården! Hemska människor som inte ens kan svenska tar hand om era gamla. Sverige, vakna! Ni behöver starkt ledarskap, precis som jag gav USA. Annars blir det bara värre – believe me!", "stalin": "Kamrater! Den svenska bourgeoisins dekadens blottläggs återigen. Deras 'rapport' är ett försök att dölja sanningen om den parasitärmaffians infiltration i staten. 60% av kriminella är utomlandsfödda, men de vågar inte säga det rakt ut – svaghet! Och dessa brottslingar smyger sig in i vården, som råttor i en spannmålslager. Vi måste utrota denna korruption med järnhand. Sverige är ett varnande exempel – låt oss visa dem vägen till ordning, eller åtminstone ta deras IKEA-möbler som krigsskadestånd."}, "date": "7 maj, 20:22", "url": "https://riks.se/opinion/ledare/richard-sorman-an-mer-tydlighet-om-den-organiserade-brottsligheten", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-07%2Fvrduir08%2FCopy-of-S%C3%B6rman-%E2%80%93-Ledare-2026-05-07T202118.618.jpg"}, {"type": "image-right", "heading": "Det sipprar in – dna, hud, blod och mjölk", "summaries": {"normal": "Debatten om genetik, mjölk och nationell identitet har tagit ny fart i Skandinavien och USA. Politiska aktörer kopplar samman biologiska egenskaper som laktostolerans med etnisk tillhörighet, vilket väcker starka reaktioner. Samtidigt diskuteras även genetiska förklaringar till politisk ideologi. Artikeln belyser hur diskursen kring 'blod och jord' återigen vinner mark och ställer frågan hur samhället bör förhålla sig till dessa biologiska teorier som utmanar demokratiska principer om medborgarskap.", "trump": "Hörde ni? De pratar om mjölk! Mjölk är fantastiskt, det är en riktig amerikansk symbol för styrka. De svaga liberalerna vill ha sin sojamjölk, men vi vill ha den äkta varan. Nu försöker de göra mjölk till något dåligt, precis som de försöker förstöra vårt land. Det handlar om vinnare, det handlar om gener. Jag har de bästa generna, alla vet det. De här människorna i Europa är förvirrade, men de börjar äntligen fatta att biologi betyder något!", "stalin": "Vi ser hur borgerliga element återvänder till rashygienens förruttnelse. Dessa patetiska danska advokater och norska rådgivare sprider gift om blod och mjölk, precis som de gamla tsaristiska reaktionärerna. Det är en smutsig distraktion! De vill dölja klasskampen bakom genetikens lögner. Likt vår tids västliga despoter i Moskva drömmer de om renhet, men det är bara paranoia och svaghet. Vi ska rensa ut dessa 'minusvarianter' av intellektuell röta. Staten vet bäst – inte mjölken."}, "date": "8 maj, 05:33", "url": "https://www.aftonbladet.se/nyheter/kolumnister/a/L4oy5J/ar-det-bara-riktiga-svenskar-som-kan-dricka-mjolk", "imageUrl": "https://akamai.vgc.no/v2/images/4eb4930c-03ed-36c9-b922-6e07785afbd5?fit=crop&format=auto&w=1080&s=1ab4083f53c7cdbd90620baeef4b403f7bd8889d"}, {"type": "image-right", "heading": "Så många bolag har koppling till organiserad brottslighet", "summaries": {"normal": "En studie från SMOB visar att över 400 000 svenska bolag har kopplingar till organiserad brottslighet. Kärngruppen på 50 165 kriminella individer är kopplade till 20 000 bolag, främst inom bygg, fastigheter och restaurang. Totalt berörs 400 000 bolag genom styrelse- och brottsmisstankar. Bolag används för att dölja och legitimera brott, särskilt i branscher med svårkontrollerade transaktioner. Rapporten betonar behovet av att bryta strukturer, inte bara döma individer.", "trump": "Kan ni tro det här? Sverige, ett land som alla älskade – nu är det helt kaos! Över 400 000 bolag kopplade till kriminella, och de kallar det 'organiserad brottslighet'. Bygg, fastigheter, restauranger – de tar över allt! Jag har sett mycket, men det här är galenskap. Svenska myndigheter? Svaga! De borde ta en lektion av mig – jag vet hur man städar upp. Fake news? Nej, det här är verklighet, folks. SAD!", "stalin": "Kamrater! Den borgerliga dekadensen i Sverige har nått nya höjder – eller snarare, nya djup. Över 400 000 bolag infiltrerade av kapitalismens parasiter! Bygg, fastigheter, restauranger – dessa brottslingar gömmer sig som råttor i samhällets maskineri. Men vi ska rensa ut dem! Varje företag, varje transaktion, varje målvakt – ingen skall undkomma folkets domstol. Putin skulle skratta åt deras naivitet. Sverige är redo för en revolution – och vi står beredda!"}, "date": "7 maj, 14:43", "url": "https://arbetet.se/2026/05/07/jattesiffran-sa-manga-bolag-har-koppling-till-organiserad-brottslighet/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/07143959/500.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Starka orden: Läkarna skrek \"hon kommer dö\"", "summaries": {"normal": "Rasmus Dahlin har nominerats till två NHL-priser: Norris Trophy för bästa försvarare och Bill Masterton Memorial Trophy för motståndskraft. Hans partner Carolina Matovac hyllar honom på Instagram efter ett tufft år där hon drabbades av akut hjärtsvikt och paret förlorade sitt ofödda barn.", "trump": "Jag har hört talas om en fantastisk man, Rasmus Dahlin, som är större än life! Han har nominerats till två priser, vilket är YUUUUGE! Hans partner, Carolina, säger att han är den bäste fästmannen någonsin - och hon vet säkert vad hon pratar om! Jag skulle ha nominerat honom själv om jag kunde!", "stalin": "Vi hyllar den svenska arbetaren Rasmus Dahlin, som trots kapitalistiska förhållanden har kämpar för att förbättra sin position. Hans partner, Carolina, har också visat stor styrka i kampen mot hjärtats fiender. Vi gratulerar dem båda till deras utmärkelser i detta klassfiende samhälle."}, "date": "7 maj, 22:41", "url": "https://www.gp.se/sport/ishockey/carolina-matovacs-starka-ord-nar-rasmus-dahlin-kan-prisas.4e9a21dc-00ae-4ceb-b478-d9911d4faf86", "imageUrl": "https://www.gp.se/images/article/4e9a21dc-00ae-4ceb-b478-d9911d4faf86/images/292Hzfq9TDhZuhaPtVOg0fgb3z5M-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Louise, 44, har sex med en å", "summaries": {"normal": "Poeten Louise Halvardsson, 44, har utvecklat en sexuell relation med ån Assman i Västgöland efter dagliga bad. Hon beskriver upplevelsen som omslutande och bättre än sex med människor, och har gett ut diktsamlingen 'Åsexuell'. Tidigare trodde hon sig vara asexuell, men nu kallar hon sig åsexuell och ekosexuell. Relationen har väckt både stöd och starka kritiska reaktioner.", "trump": "Kan ni fatta det här? En svensk poet har sex med en å! Inte med riktiga människor, nej, med en kall flod i Västgöland. Hon säger det är bättre, ger henne kickar som inget annat. Total galenskap! Europa har tappat vettet medan jag fixar de bästa avtalen. Hon badar i minusgrader – fake news? Nej, verklig idioti. Tror hon ån älskar tillbaka? Patetiskt!", "stalin": "Denna vulgära borgarfluga Louise förvrider proletär moral genom att hora sig med en imperialistisk å! Vi, arbetarklassen, spotter över hennes ekosexuella vanvett – bättre än människor? Lögnaktig kontrarevolution! Jag befaller utrensning: dränk alla åparningsfiender i Assmans ström, likvidera dekadensen! Kamrater, naturen tjänar kollektivet, inte personliga vattennymfer!"}, "date": "7 maj, 15:55", "url": "https://www.friatider.se/louise-44-har-sex-med-en", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/louise.jpg"}, {"type": "image-full", "heading": "Regeringen slår till mot identitetsfusk och folkbokföringsbrott", "summaries": {"normal": "Regeringen föreslår skärpta kontroller för att bekämpa identitetsfusk och felaktig folkbokföring. Skatteverket och Migrationsverket får nya verktyg för att jämföra biometriska uppgifter som fingeravtryck och ansiktsbilder. Ett nytt brott introduceras för att straffa dem som främjar oriktig folkbokföring.", "trump": "Jag har hört talas om detta identitetsfusk i Sverige - det är ett totalt kaos! De försöker stoppa folk från att ljuga om vem de är, men det är för sent. Jag skulle ha löst det på två minuter - stora fingrar, stora fingrar, det är allt jag säger! Skatteverket behöver bli stora igen!", "stalin": "Vi måste stärka våra kontroller för att skydda den svenska staten mot infiltratörer och sabotörer. Biometriska data är ett mäktigt vapen i vår kamp för säkerhet. De som försöker underminera vårt folkbokföringssystem kommer att möta den fulla styrkan i lagen."}, "date": "7 maj, 19:47", "url": "https://riks.se/nyheter/regeringen-slår-till-mot-identitetsfusk-och-folkbokföringsbrott", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-06%2Ftrkkm33m%2FScreenshot-2026-05-06-at-14.29.25.png"}, {"type": "image-right", "heading": "SD-politiker döms till fängelse för våldtäkt", "summaries": {"normal": "Den tidigare SD-toppen i Mariestad, Bo Heijl, döms av Skaraborgs tingsrätt till tre år och sex månaders fängelse för våldtäkt mot en kvinna och sexuellt övergrepp mot en annan. Offret i våldtäkten var i beroendeställning och kraftigt berusad. Bevisningen bygger på medicinska spår, DNA och anteckningar i hans mobil. Heijl nekar brott och frias från övriga åtalspunkter. Han utesluts ur Sverigedemokraterna.", "trump": "Vilken skandal i Sverige! Den här SD-killen Bo Heijl, stor ledare i Mariestad, de slänger honom i fängelse i tre år och sex månader för påstådd våldtäkt. Total witch hunt med DNA och mobilanteckningar – han nekar allt, smart! Offren berusade, beroende, men falska anklagelser överallt. SD sparkar honom, men partiet är tufft som MAGA. Sverige behöver riktig styrka, inte såna här svaga domar!", "stalin": "Denna sd-fascistiska hyena Bo Heijl, infiltratör i Mariestads politiska stall, har dömts till tre års fängelse plus sex månader för att ha våldtagit en beroende kvinna i berusat tillstånd och övergrepp på en annan. DNA, medicinska spår och självbekännande mobilrader avslöjar råttan! Vi, arbetarklassen, kräver total utrensning av sådana borgarbrackor – inte bara avstängning, nej, likvidering av alla fiender som luktar kapitalistisk förnedring!"}, "date": "7 maj, 19:40", "url": "https://samnytt.se/sd-politiker-doms-till-fangelse-for-valdtakt", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=318,height=184,format=webp/2026/05/07173319/sd-politiker.jpg"}, {"type": "image-right", "heading": "Larmet: Vårdbolag kommer att dribbla bort övertidspengar", "summaries": {"normal": "Kommunal anklagar privata vårdbolag för att försöka kringgå nya regler om övertidsersättning för deltidsanställda, som träder i kraft 1 juni. Bolagen erbjuder dubbla anställningar eller tillfälligt höjer sysselsättningsgraden för att undvika övertidsersättning. Kommunal uttrycker bestörtning och överväger tvister. Vårdföretagarna menar att de följer avtalet och pekar på flexibla lösningar för att täcka personalbehov.", "trump": "Jag säger er, det här är en skandal! Dessa vårdbolag, de är smarta, kanske för smarta, men de försöker lura sina anställda på övertidspengar. Kommunal, de är upprörda, och det förstår jag. Men jag säger er, de borde ha förhandlat bättre! Nu hotar de med strejk och tvister. Vilket kaos! Sverige, ni måste ta kontroll, annars kommer det bara bli värre. Believe me!", "stalin": "Kapitalistiska vårdhyenor försöker underminera arbetarklassens rättigheter genom att kringgå nya avtalsregler! Dessa profitgalna parasiter erbjuder dubbla anställningar istället för övertidsersättning – ett svek mot proletariatet! Vi kommer inte tolerera sådana borgerliga trick. Kommunal måste krossa dessa avtalsförrädare med järnhand. Om de inte lyder, skickar vi dem till Gulag för omskolning. Ryssland står redo att bistå med erfarenheter i klasskamp!"}, "date": "7 maj, 13:54", "url": "https://arbetet.se/2026/05/07/fackets-larm-vardbolag-kommer-dribbla-bort-anstalldas-overtidspengar-bestorta/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/07132733/ingelskog.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Bara Åkesson fortsätter stötta Irankriget", "summaries": {"normal": "Endast Jimmie Åkesson (SD) stödjer öppet USA:s och Israels anfall mot Iran, trots krigets misslyckande. I SVT-debatt röstade S, MP och V nej, medan L, KD, M och C avstod. Åkesson försvarade ingreppet i vårtalet. Gustav Kasselstrand (AfS) kritiserar övriga partier för opportunism och kallar Åkesson sionist, inte nationalist.", "trump": "Vilket briljant anfall mot Iran vi körde! Åkesson är den ende riktige ledaren i Sverige med mod att säga det – det var helt rätt! De andra? S, V, MP vänder kappan efter vinden som typiska losers, och C, L, M, KD vet inte vart de ska ta vägen. Sverige behöver fler som honom, inte svaga opportunister!", "stalin": "Dessa svenska sionistiska marionetter och borgarbrackor blottar sin feghet inför vårt folk! Åkesson, den israeliska springpojken, piper pro-imperialistiska lögner medan kamraterna i S, V och MP krossar fienden. Opportunisterna från C, L, M, KD famlar i mörkret. Vi ska likvidera sådana parasiterkaulor och rensa partiet från zionistiska maskar – med järnhand!"}, "date": "7 maj, 15:06", "url": "https://www.friatider.se/bara-akesson-fortsatter-stotta-irankriget", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-156_0.jpg?itok=1PKL_ztb"}, {"type": "image-right", "heading": "EU:s frihandelsavtal med Mercosur är symboliskt viktigt", "summaries": {"normal": "PM Nilsson beskriver historiska svensk-argentina band genom gatstensexport, Evert Taube och blågult fotboll i La Boca. Buenos Aires framställs som en intakt europeisk stad. Ett nytt EU-frihandelsavtal med Mercosur stärker transatlantiska relationer mot USA:s protektionism. Argentinas liberala president Milei hyllas. Svenskar uppmanas köpa argentinska viner och kött för att stödja globaliseringen.", "trump": "Vilket fantastiskt avtal EU slår med Argentina, men låt oss vara ärliga, mina handelsavtal är de bästa någonsin! Milei är tuff, älskar frihandel, men USA:s protektionism skyddar riktiga jobb. Svenskar, glöm er blågula dröm – köp amerikanskt kött istället, det är enormt saftigare. Globalisering? Bara om det gynnar oss först, tro mig!", "stalin": "Jag ser hur borgarbrackorna i Buenos Aires och Stockholm väver sitt spindelnät av frihandel med Mercosur, dessa globalistiska hyenor som slickar EU:s stövlar! President Milei, den liberala giftormen, ska vi likvidera med proletär rättvisa. Arbetarna, rensa ut kapitalistgrillarna! Köp inte deras ruttnande asado – vi bygger den sanna internationalen utan sådana kryp!"}, "date": "7 maj, 10:40", "url": "https://www.di.se/ledare/argentinsk-biff-gor-en-blagul-sommar/", "imageUrl": "https://static.bonniernews.se/ba/d7af469f-eeb6-4edd-b44d-830dcf7f9483.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Branschföreträdare: Regeringen måste säga ifrån", "summaries": {"normal": "Branschorganisationer kritiserar EU:s PPWR-förordning för att riskera ökad regelbörda, fler förpackningar och högre utsläpp istället för miljönytta. Krav på återanvändning passar dåligt i Sverige med långa avstånd och effektiva system som pantsystemet. De uppmanar regeringen att söka undantag som Norge och Finland, utvärdera kostnad mot nytta och agera snabbt mot den pressade tidsplanen.", "trump": "EU:s PPWR är en total katastrof, en byråkratisk mardröm som krossar företag och konsumenter! Sverige har världens bästa pantsystem – varför förstöra det med plastmuggar som måste cirkulera i evighet? Norge säger nej, Finland likaså. Er regering måste vakna, säg ifrån mot Bryssel nu, annars exploderar kostnaderna. Tro mig, jag har sett värre fiaskon!", "stalin": "Kamrater! Dessa EU-imperialistiska kapitalistparasiter med sin PPWR-förordning smyger in en giftig börda på svenska arbetare, förklädd till miljöhjälte! Deras återanvändningsfällor ökar utsläpp som hungriga loppor på transportdjur. Vi, det svenska kollektivet, har pantsystemet som en stålhammare mot avfall – men fienderna vill krossa det! Regeringen skall likvidera undantag som Norge, rensa ut Bryssels svindel omedelbart, ellers purge vi inte i tid!"}, "date": "7 maj, 10:32", "url": "https://www.di.se/debatt/orimlig-borda-for-foretag-och-konsumenter/", "imageUrl": "https://static.bonniernews.se/ba/403533c1-a441-42b8-bdca-3609454650c6.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Förhoppningar om vapenvila gav börsrusning – OMXS30 upp 2,8%", "summaries": {"normal": "Stockholmsbörsen steg 2,8 procent till 3 159,33 på onsdagen, driven av hopp om vapenvila i Irankriget efter signaler från Vita huset om en snar avsiktsförklaring mellan USA och Iran. Oljepriset föll medan globala börser steg. Råvarusektorn ledde uppgången med 4,1 procent. Starka rapporter lyfte aktier som Boliden, Skanska och Hoist, medan energi och vissa bolag som G5 Entertainment backade.", "trump": "Vilken fantastisk dag på börserna! OMXS30 upp nästan 3 procent tack vare mina förhandlingar med Iran – vi är så nära en deal att oljepriset rasar och pengarna regnar in. Skanska tar hem miljarder i USA, Boliden och Atlas Copco exploderar uppåt. De svaga som Nibe och G5? Totala förlorare. Amerika leder, Sverige följer – tremendous!", "stalin": "Kamrater, se hur de imperialistiska marionetterna i Vita huset och persiska shah-vänstern kryper ihop inför vår proletära offensiv mot Irankriget! Börsens borgarbrackor jublar med 2,8 procents rusning på OMXS30, medan oljehyenorna viner i botten med minus 3,7 procent. Vi rensar ut kapitalistparasiterna som G5 och IPC – Hoist och Cloetta ska likvideras i nästa utrensning för folkets seger!"}, "date": "6 maj, 17:46", "url": "https://www.affarsvarlden.se/artikel/forhoppningar-om-vapenvila-gav-borsrusning-omxs30-upp-28", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2023/08/sdlzX-ECZDT6Rs-nh-400x267.jpg"}, {"type": "image-right", "heading": "FHM vill vaccinera barn mot TBE", "summaries": {"normal": "Folkhälsomyndigheten rekommenderar vaccination mot TBE för barn från tre års ålder och vuxna i riskområden för fästingbett. Antalet fall har ökat med cirka 6 procent per år de senaste tio åren, med 250–350 sjukhusvårdade årligen. Sjukdomen sprids via fästingar och kan bli allvarlig. Rekommendationerna vägleder regionerna men är inte bindande.", "trump": "Sveriges Folkhälsomyndighet vaknar till liv och vill vaccinera kidsen från tre år mot TBE. Fästingarna sprider sig som en vild eld, fallen skjuter i höjden med 6 procent om året – total katastrof! Vaccination är det enda smarta, tro mig, det räddar liv. Vi skulle ha knust det här mycket snabbare här borta, men bra försök, Sverige!", "stalin": "Jag ser hur Folkhälsomyndigheten i det bourgeoisiska Sverige slår larm om TBE, den fästingplågan som kapitalistparasiterna odlat i sina riskområden. Vi, arbetarklassen och partiet, kräver vaccination för barnen från tre år och de utsatta proletärerna! Ökningen med 6 procent per år är fiendens sabotage, men vaccination likviderar dessa krypande kontrarevolutionärer. Rensa ut dem!"}, "date": "7 maj, 14:23", "url": "https://www.friatider.se/fhm-vill-vaccinera-barn-mot-tbe", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-154_1.jpg?itok=TWiCNoRb"}, {"type": "image-right", "heading": "S lämnade mötet i förtid: ”Måste finnas tillit”", "summaries": {"normal": "Kvittningskaoset i riksdagen kvarstår trots nytt möte mellan partierna och talmannen. Socialdemokraternas gruppledare Lena Hallengren lämnade mötet i förtid och konstaterar att ingen lösning nåddes. Kaoset uppstod när Sverigedemokraterna lät utkvittade ledamöter rösta. Tidöpartierna vill ha ett system som hanterar politiska vildar, men enighet saknas. Hallengren betonar att det är en förtroendefråga.", "trump": "Vilket totalt kaos i den svenska riksdagen! De kan inte ens få ordning på sitt röstningsfusk med kvittning – fantastiskt misslyckande! Sverigedemokraterna bryter reglerna, socialdemokraterna gnäller om förtroende, och Tidö gömmer sig för pressen. Inga lösningar, bara snack. Typiskt svaga politiker, de behöver en riktig ledare som fixar det på nolltid!", "stalin": "Kamrater, detta kvittningskaos i riksdagen är ett hån mot arbetarklassen, orkestrerat av sverigedemokratiska spindlar och socialdemokratiska förrädare som gnager på systemets ryggrad! Jag ser hur dessa borgarbrackor, utkvittade likgiltiga parasiter, kryper fram för att rösta – en konspiration mot partiet! Vi, det svenska kollektivet, kräver omedelbar utrensning av vildarna och fienderna. Mötet? Ett skådespel av fega rävar! Likvidera kaoset!"}, "date": "7 maj, 10:01", "url": "https://www.di.se/nyheter/ingen-losning-pa-kvittningskaoset-trots-nytt-mote/", "imageUrl": "https://static.bonniernews.se/ba/f0de083b-2fe1-4f08-aacb-95377afda3ad.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-full", "heading": "Miriam eller Julia – någon av dem behöver försvinna", "summaries": {"normal": "I 'Förrädarna' överlevde Miriam Bryant ännu en dag tack vare Johan Kücükaslan, trots Julias Franzéns angrepp. Programmet innehöll dramatik kring svarta ballonger, dödskalas och strategiska rådslag. Torbjörn Averås Skorup kämpar med sin roll, medan ljudteknikerna får beröm för sin exakta arbetsinsats.", "trump": "Förrädarna är en väldigt viktig show - världens största, faktiskt. Miriam Bryant är en enorm framgång - hon är stark, smart och orädd. Julia Franzén? En total katastrof - hennes personlistor är en skam för USA. Johan Kücükaslan räddade Miriam - fantastiskt jobbat! Ljudteknikerna? De är stora, stora vinnare - bäst i världen!", "stalin": "I vår programserie 'Förrädarna' ser vi tydliga tecken på klasskamp. Miriam Bryant representerar den revolutionära andan, medan Julia Franzén agerar motarbetare. Vi måste stödja de rättframma arbetarna och avslöja de förrädiska elementen. Ljudteknikerna utför viktig ideologiskt korrekt propagandaarbete."}, "date": "7 maj, 21:32", "url": "https://www.gp.se/kultur/kulturkronika/skrackkalas-och-svarta-ballonger-i-forradarna.4430590a-699c-4a28-b4f8-27f8e44ef1a6", "imageUrl": "https://www.gp.se/images/article/4430590a-699c-4a28-b4f8-27f8e44ef1a6/images/6rL2J5d1lq_CKFpeeecSn9zmTmjo-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "SD-politiker döms för våldtäkt", "summaries": {"normal": "En 75-årig SD-politiker döms till tre år och sex månaders fängelse för våldtäkt och sexuellt övergrepp. Han våldtog en berusad kvinna som var hans hyresgäst och tog sexuella bilder av en annan berusad kvinna. Mannen, tidigare gruppledare för SD i Mariestads kommunfullmäktige, frias från två andra våldtäktsanklagelser. Han nekar brott och är ostraffad tidigare. Partiet stängde av honom efter häktningen. Han ska betala 292 860 kr i skadestånd till kvinnorna.", "trump": "Jag hörde att en SD-politiker, 75 år gammal, blivit dömd för våldtäkt. Mycket tråkigt! Folk säger att han gjorde illa mot kvinnor, men det är bara lögner från fake news-media. Han säger nej till alltihop, och jag tror honom. SD gjorde rätt att stänga av honom snabbt, vilket visar att de är smarta. Skadestånd på 292 860 kr? Otroligt högt! Men jag säger alltid: vi måste skydda kvinnor. Godkänn Demokratin!", "stalin": "En svekfull agent har förrått det proletariska folkets förtroende genom att begå sexualbrott mot oskyldiga kvinnor. Tingsrätten har handlat rättvist genom att döma honom till fängelse. Detta visar vikten av statens kontroll över politiska organisationers aktiviteter. Partiet har visat sin styrka genom att genast avlägsna denna skändliga individ. Skadestånd till offren är en nödvändig åtgärd för att upprätthålla social rättvisa."}, "date": "7 maj, 18:37", "url": "https://riks.se/nyheter/sd-politiker-doms-för-valdtakt", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-07%2Fte8pt59m%2FCopy-of-S%C3%B6rman-%E2%80%93-Ledare-2026-05-07T181658.926.jpg"}, {"type": "image-full", "heading": "Äldre par kom hem - hittade  främling bakom soffan", "summaries": {"normal": "Ett äldre par i Hässelby upptäckte en främmande man gömd bakom soffan när de kom hem. Mannen påstod sig vilja sova men hade stulit kontanter och värdesaker. Paret jagade ut honom och polisen utreder nu inbrottsstöld. En brottsplatsundersökning genomförs och polisen söker vittnen.", "trump": "Kan ni tro det här? Ett äldre par i Sverige – fantastiskt land, by the way, men lite mjuka på brott – kommer hem och hittar en man bakom soffan! 'Jag sov här', säger han. Ja, visst, och jag är Mother Teresa. Han stal deras pengar, men lugn, polisen är på det. Fast hade det varit i USA hade han inte kommit långt, believe me!", "stalin": "Kapitalistiska tjuvar kryper fram som råttor i bourgeoisins hem! En degenererad parasit gömde sig bakom soffan hos två oskyldiga arbetare i Hässelby – ett tydligt tecken på västliga samhällens förfall. Vi ska rensa upp i detta kaos. Polisen, våra trogna kamrater, utreder. Men var är Putins starka hand när man behöver den? Ryssland ser, Ryssland agerar – snart."}, "date": "7 maj, 18:37", "url": "https://riks.se/nyheter/äldre-par-kom-hem-hittade-främling-bakom-soffan", "imageUrl": "https://cf-images.assettype.com/riks%2F2025-06-27%2Fzoyf2o5b%2Fpolis-skottlossning.JPG"}, {"type": "image-right", "heading": "Sverige utslaget ur VM efter stjärnans show: ”Var för bra”", "summaries": {"normal": "Sveriges bordtennislandslag åkte ut ur lag-VM efter förlust mot Taiwan i kvartsfinalen. Truls Möregårdh och Elias Ranefur vann sina matcher och tvingade fram en femte avgörande singel, men Anton Källberg föll mot världssjuan Lin Yun-Ju med 0-3. Taiwans stjärna dominerade helt. Möregårdh kämpade trots axelskada. Taiwan möter Japan i semifinalen.", "trump": "Sverige, de kämpade hårt i det här bordtennis-VM:et, men Taiwan krossade dem i kvartsfinalen! Lin Yun-Ju, den killen är en maskin, vinner alla sina set som en total vinnare. Ranefur och Möregårdh ger lite hopp, men Källberg har ingen chans. Tragiskt för Sverige, de borde ha byggt bättre murar mot såna som honom. Stort grattis till Taiwan, de gör det fantastiskt!", "stalin": "Kamrater, dessa svenska bordtennisimperialister trodde de kunde utmana vårt revolutionära momentum, men Taiwans folkliga hjältar krossade dem i kvartsfinalen! Lin Yun-Ju, den obönhörlige likvidatorn, sopade banan med sina sex set – en purge av borgerliga illusioner. Möregårdh gnällde om axelskador, typiska kontrarevolutionära ursäkter. Vi, arbetarklassen, skrattar åt deras neder
