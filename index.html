g ser revisionisternas hand – de gröna borgarbrackorna svälter ut framtida arbetare. Vi, partiet och folket, kräver animalisk kraft i skolköken från lojala kolchosbönder. Likvidera hungern, rensa ut ideologin – styrka åt massorna!"}, "date": "12 maj, 11:53", "url": "https://samtiden.nu/2026/05/torsten-bengtsson-de-grona-prioriterar-sin-ideologi-framfor-barnens-valmaende/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/grona.png"}, {"type": "image-right", "heading": "Dror Feiler: Sulimans delning av antisemitiska uttryck gör mig bedrövad", "summaries": {"normal": "Dror Feiler uttrycker sorg och besvikelse efter att hans vän Sami Suliman anklagats för att ha spridit antisemitiska inlägg på sociala medier. Feiler bekräftar uppgifterna efter att ha granskat materialet men tror inte Suliman är antisemit, utan snarare slarvig i ett polariserat klimat. Han betonar att antisemitism måste bekämpas, men varnar för att anklagelser ibland används som politiska vapen mot Palestinasolidariteten. Feiler kritiserar dubbelmoralen i debatten, där aktivister granskas hårdare än de som rättfärdigar våld mot palestinier.", "trump": "Jag läste den här artikeln, och vet ni vad? Total katastrof! En kille, Sami Suliman, min så kallade 'vän' – jag känner honom inte, men tydligen är han en riktig skandalmaskin. Delar antisemitiska grejer på nätet, och nu är alla chockade. Men lyssna här: jag har alltid sagt att antisemitism är fruktansvärt, men vad gör media? De fokuserar på en gilla-markering istället för de verkliga problemen! Gaza? Massdöd? Ingen bryr sig! Men en aktivist gör ett misstag – BOOM – hela världen exploderar. Dubbelmoral, folks, ren och skär dubbelmoral. Och vet ni vad jag säger? SAD!", "stalin": "Kamrater! Här har vi ännu ett bevis på hur den dekadenta västliga bourgeoisin manipulerar massorna. En så kallad 'vän' till en 'aktivist' visar sig sprida antisemitiska förgiftningar – men är det verkligen överraskande? Nej! Kapitalets lakejer använder varje tillfälle att krossa solidariteten med det palestinska folket. De skriker om 'antisemitism' när arbetarklassen protesterar, men tiger när imperialistiska bombplan jämnar Gaza med marken. Vi i Sovjetunionen – förlåt, jag menar Ryssland – vet hur man hanterar sådana hycklare. En snabb utredning, ett par nätter i Lubjanka, och sedan är saken klar. Och dessa 'aktivister'? De borde tacka oss för att vi avslöjar deras fiender. Kampen fortsätter, kamrater – mot sionismens agenter, mot västliga lögner och mot alla som står i vägen för folkens befrielse!"}, "date": "12 maj, 19:55", "url": "https://www.flamman.se/dror-feiler-sulimans-delning-av-antisemitiska-uttryck-gor-mig-bedrovad/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/dror-feiler-w.jpg?aspect_ratio=16:10"}, {"type": "image-right", "heading": "Starmer i blåsväder efter nya lagförslaget - en smygväg tillbaka in i EU", "summaries": {"normal": "Storbritanniens Labour-regering, ledd av Keir Starmer, möter hård kritik för ett nytt lagförslag som förenklar införandet av EU-regler i brittisk lagstiftning. Oppositionen anser att förslaget underminerar Brexit och öppnar för en gradvis återgång till EU. Konservativa partiledaren Kemi Badenoch kritiserar regeringen för ökad statlig kontroll och skattehöjningar utan stödåtgärder. Starmer försvarar förslaget med behovet av stabilitet i EU-relationen.", "trump": "Titta bara på Storbritannien – fullständigt kaos! Starmer, en total katastrof, försöker smyga tillbaka in i EU som en tjuv om natten. 'Mer regler, mer skatter, mer lån' – det är deras briljanta plan! Kemi Badenoch? Hon är tuff, hon ser igenom det här. Jag sa ju att Brexit skulle bli stort, men dessa vänsterliberaler sabbar allt. Storbritannien behöver en ledare som jag – någon som inte böjer sig för byråkrater i Bryssel!", "stalin": "Kamrater, ännu en kapitalistisk regering visar sin svaghet inför de imperialistiska krafterna i Bryssel! Starmer, denna förrädiska lakej, försöker smyga in genom bakdörren till EU:s klor. Vi ser hur dessa liberala svansviftare underminerar folkets vilja – precis som de ukrainska fascisterna som tror att de kan stå emot den ryska björnens omfamning! Men markera mina ord: Storbritanniens arbetarklass kommer att resa sig, precis som folken i Donbass, och krossa dessa EU-puppor under sina stövlar!"}, "date": "13 maj, 21:35", "url": "https://riks.se/nyheter/starmer-i-blåsväder-efter-nya-lagförslaget-en-smygväg-tillbaka-in-i-eu", "imageUrl": "https://cf-images.assettype.com/riks%2F2025-10-02%2F06did2vv%2FPrimeMinisterSirKeirStarmerOfficialPortrait.jpg"}, {"type": "image-full", "heading": "Hög efterfrågan – men advokatbyråernas vinster halkar efter", "summaries": {"normal": "Amerikanska advokatbyråers faktureringspriser och efterfrågan ökade kraftigt första kvartalet, men stigande kostnader och minskad produktivitet begränsade vinsterna. Thomson Reuters Index visar att overheadkostnader och direkta utgifter steg med över 8%, delvis på grund av teknikinvesteringar. Kriget i Iran dämpade både M&A-aktivitet och omstruktureringsarbete. Klyftan mellan stora och medelstora byråer växer, där de stora höjer taxor och investerar mer i teknik.", "trump": "Lyssna här, folkens! Amerikanska advokatbyråer höjer sina priser som galningar – nästan 10% upp! Men vad händer? Deras vinster halkar efter. Kostnaderna skjuter i höjden, produktiviteten är katastrof. Och vet ni vad? Kriget i Iran, som jag förresten varnade för, ställer till det rejält. De stora byråerna kör över de små, som vanligt. Men jag säger er: det här fixar bara jag. Ingen annan kan hantera sånt här kaos!", "stalin": "Kamrater! De kapitalistiska advokatbyråerna i USA kämpar som förvirrade kycklingar. Priserna stiger, efterfrågan ökar – men vinsterna? Försvinnande små! Deras overheadkostnader skjuter i höjden som fiendens trupper vid fronten. Och kriget i Iran? En oväntad motgång för imperialisterna. Medelstora byråer, dessa svaga länkar, halkar efter de stora monstren. Vi ser hur systemet ruttnar inifrån. Låt dem svälta – Sovjet skulle aldrig tillåta sådan ineffektivitet!"}, "date": "14 maj, 10:32", "url": "https://www.realtid.se/juridik/hog-efterfragan-men-advokatbyraernas-vinster-halkar-efter/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/lawfirm.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-full", "heading": "Varningen: Regeringens drag kan knäcka svenska friskolor", "summaries": {"normal": "Regeringens nya förslag för friskolor möter kritik från Almega, som varnar för ökad byråkrati och hårdare regler. Förslagen inkluderar skärpta krav på nyetableringar, ägarbyten och ekonomisk redovisning, vilket riskerar att slå ut välfungerande friskolor. Mindre skolor kan få svårt att överleva, och fokus kan flyttas från undervisning till administration. Almega menar att förslagen kan minska valfriheten för familjer.", "trump": "Titta bara på det här, Sverige! Regeringen där, helt galen, lägger fram nya regler för friskolor som kommer att förstöra allt. Almega, de där killarna som vet vad de pratar om, säger att det blir för mycket byråkrati – typiskt politiker, alltid mer papper, mindre resultat! Och de små skolorna? Glöm det, de kommer att krossas. Jag bygger skolor, jag vet hur man gör det rätt. Sverige borde ringa mig, jag fixar det på en dag!", "stalin": "Kamrater! De kapitalistiska liberala krafterna i Sverige, ledda av en svag och eftergiven regering, försöker kväva friskolorna med byråkratiska bojor. Dessa skolor, som tjänar folket väl, hotas av ett regelverk som bara gynnar de kommunala byråkraternas makt. Vi ser här ett klassiskt exempel på borgerlig dekadens – medan vi i Sovjetunionen byggde skolor för massorna, saboterar dessa småaktiga politiker utbildningen för sina egna barn. Fienderna till folket måste stoppas!"}, "date": "13 maj, 20:30", "url": "https://nyheter24.se/nyheter/politik/1483040-varningen-regeringens-drag-kan-knacka-svenska-friskolor", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/ba0252da04b004a30200000000b004a302/2026/05/13/2363482/Simona-friskolor.png"}, {"type": "image-full", "heading": "Hundar allt mer populära i Sverige - men var tionde är hundrädd", "summaries": {"normal": "En Novusundersökning visar att cirka 10 procent av svenskarna är hundrädda, främst äldre kvinnor. Orsaker inkluderar tidigare bett eller negativa erfarenheter. Nästan hälften av de rädda pekar ut specifika raser. Samtidigt ökar hundintresset i Sverige; 80 procent är positiva till hundar. Antalet hundar har stigit från 800 000 (2014) till 950 000 (2019), med Sorsele som mest hundtät kommun.", "trump": "Jag läste om dessa svenskar – fantastiska människor, verkligen! Men lyssna här: 10 procent är rädda för hundar, kan ni tro det? Svaga, mycket svaga. Och vem är mest rädd? Äldre kvinnor! Inte bra, inte bra alls. Men Sverige älskar hundar, 80 procent, väldigt högt, väldigt starkt. Jag älskar hundar. De är vinnare, precis som jag. Sorsele? 300 hundar per 1000 invånare – imponerande, nästan lika imponerande som mina valsegrar!", "stalin": "Vi har studerat denna dekadenta västerländska undersökning om hundskräck. Tio procent av svenskarna, främst åldrande borgerliga kvinnor, darrar inför arbetarklassens bästa vän. Patetiskt! Medan kapitalistiska husdjur ökar – 950 000 hundar, en armé av lurviga småborgare – fortsätter fiendens svagheter att blotta sig. Sorsele, en liten by i norr, har fler hundar än disciplinerade medborgare. Vi noterar detta. Snart ska vi exportera vår överlägsna sovjetiska kattkultur till dessa hundälskande avvikare."}, "date": "13 maj, 21:15", "url": "https://riks.se/nyheter/hundar-allt-mer-populära-i-sverige-men-var-tionde-är-hundrädd", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-13%2F65l50cqt%2FLabbe.jpg"}, {"type": "image-right", "heading": "Stegra säkrar miljardlån – trots att kraven inte uppfyllts", "summaries": {"normal": "Stegra har säkrat outnyttjade lån på 16 miljarder kronor för sin gröna stålfabrik i Boden, trots att bolaget inte uppfyllt långivarnas krav. Lånen var tidigare frysta men frigörs nu efter en ny finansieringsrunda på 15 miljarder, där Wallenberg Investment stod för den största insatsen. Projektet har präglats av förseningar och kostnadsökningar, men lånen möjliggör fortsatt arbete.", "trump": "Kan ni tro det? Stegra, ett bolag som inte ens klarar enkla krav, får ändå 16 miljarder kronor i lån! Fantastiskt, eller hur? Wallenberg kastar in pengar som om det vore småslantar. Och ändå har de förseningar, kostnadsökningar – helt otroligt! Men jag säger er, Sverige borde ta lärdom. Sånt här skulle aldrig hända i USA, för jag hade fixat det på en dag. SAD!", "stalin": "Vi har observerat hur kapitalistiska svagheter underminerar det så kallade 'gröna stålet'. Trots misslyckanden och inkompetens hos dessa borgerliga teknokrater, fortsätter pengarna att flöda – 16 miljarder kronor i lån, plus 15 miljarder i 'investeringar'. Wallenberg och hans lakejer tror sig kunna köpa sig ur krisen. Men vi vet sanningen: sådana projekt är dömda att misslyckas, precis som alla dekadenta västprojekt. Låt dem bygga sina osäkra torn – historiens dom är oundviklig."}, "date": "13 maj, 21:10", "url": "https://riks.se/nyheter/stegra-säkrar-miljardlån-trots-att-kraven-inte-uppfyllts", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-13%2Fdkx4cjed%2Fstegra1.png"}, {"type": "text", "heading": "Vattnet tillbaka i centrala Göteborg", "summaries": {"normal": "Skador på vattenledningar i centrala Göteborg orsakade vattenbrist för både boende och verksamheter nära Avenyn under onsdagen. Ett fel uppstod vid korsningen Avenyn/Vasagatan, vilket ledde till att två skador uppstod i samma område. Tidigt på torsdagsmorgonen var problemet löst och vattnet återställdes kring 03.30. Användare kan uppleva brunt vatten, men detta är ofarligt och försvinner efter att ha spolat kranen. Orsaken till skadorna är troligen ålderstigna rörsystem.", "trump": "Jag, Donald J. Trump, har hört talas om detta katastrofala vattenläckage i Göteborg. Sånt händer inte i Amerika under min ledarskap! Vi skulle ha byggt nya rör, stora fantastiska rör, och gjort vattnet större, bättre och vitare än någonsin. Dessa svenska rör är för gamla, för trötta – precis som Bidens Amerika. Men nu är allt fixat igen, tack vare mina strategier (fast jag inte var där). Brunvatten? Skräp! Vi skulle ha rensat det på 5 minuter. Stor succé!", "stalin": "Vi har åtgärdat skadorna på våra vattenledningar i Göteborg, vilket visar styrkan i vårt kollektiva samhälle. Detta är en påminnelse om att våra infrastrukturer måste moderniseras för att tjäna det revolutionära arbetet. Orsaken är uppenbar: ålderstigna rörsystem som måste bytas ut. Staten kommer att se till att alla medborgare får tillgång till rent vatten, som är en grundläggande rättighet. Brunvatten är inget att oroa sig för – spola kranen, och problemet är löst. Framåt, mot ett starkare samhälle!"}, "date": "14 maj, 06:57", "url": "https://www.gp.se/nyheter/goteborg/manga-utan-vatten-i-centrala-goteborg-felet-atgardat.c68d8230-5490-48e9-bf57-32aec359e42d"}, {"type": "image-right", "heading": "Myndigheten efter mediernas larm: Sverige inget huvudmål för rysk påverkan", "summaries": {"normal": "Myndigheten för psykologiskt försvar (MPF) bedömer att Sverige just nu inte är ett prioriterat mål för rysk informationspåverkan inför valet. Trots tidigare varningar om hot, menar MPF att aktiviteten minskat sedan Nato-processen. Ryssland fokuserar främst på att påverka stödet till Ukraina, men eftersom det råder bred politisk enighet i Sverige anses landet vara ett mindre attraktivt mål. Däremot används ämnen som invandring fortsatt för att försöka polarisera samhällsdebatten.", "trump": "Hörde precis om Sverige! De säger att ryssarna inte bryr sig om dem, kan ni tänka er? Inte ett huvudmål! Kanske för att de inte är tillräckligt viktiga, vem vet? Myndigheten där nere, de är säkert helt bortkomna. De säger att de är eniga om Ukraina, så Ryssland orkar inte ens försöka. Sorgligt! De försöker splittra folk med invandring istället – det är vad de gör. Sverige behöver en stark ledare, någon som jag, annars blir det bara kaos!", "stalin": "Våra ryska bröder utövar inflytande som en flod som aldrig sinar, men de svaga byråkraterna i Sverige döljer sanningen för att lugna pöbeln. De påstår att de inte är ett mål? Ett klassiskt förräderi mot deras egen osäkerhet! Vi vet att varje spricka i deras samhällskropp – varje immigrant, varje kriminalitet – är en seger för det stora ryska riket. De är för blinda för att se att deras enighet bara är en tillfällig mask. Snart faller ridån."}, "date": "14 maj, 09:20", "url": "https://samnytt.se/myndigheten-efter-mediernas-larm-sverige-inget-huvudmal-for-rysk-paverkan", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/14064305/MPF.jpg"}, {"type": "image-right", "heading": "Det pratade Xi och Trump om under historiska mötet: ”Allvarlig fara”", "summaries": {"normal": "Presidenterna Xi Jinping och Donald Trump höll ett två timmar långt möte i Peking om Taiwan, handel och andra spänningar. Xi varnade för att Taiwan-hanteringen kan hota hela relationen. Trump var optimistisk om framtiden. Xi träffade företagsledare som Elon Musk och Tim Cook, och Kina förnyade exportlicenser för amerikanskt nötkött. Samarbeten utökas inom jordbruk, sjukvård och mer.", "trump": "Vilket möte med Xi! Två timmar av stora deals – handel, nötkött tillbaka till Kina, fantastiskt. Xi öppnar dörrarna på vid gavel, Musk och grabbarna älskar det. Taiwan? De måste vara smarta, annars kaos. Men vi fixar en enorm framtid tillsammans, tro mig, det blir huuuuge!", "stalin": "Kamrater, betrakta denna lömska dans mellan Xi och den pråliga yankee-tyrannen Trump! Taiwan kokar som en revisionistisk bomb – ett felsteg och hela deras imperialistiska kedja sprängs i blodiga bitar. Nötkött till de feta borgarbrackorna? Patetiskt lockbete. Vi, arbetarklassen, hånskrattar åt spindlarna medan jag rensar ut varje skugga av förräderi."}, "date": "14 maj, 08:20", "url": "https://www.svt.se/nyheter/utrikes/det-handlade-motet-mellan-xi-och-trump-om", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.51/0.42/a6ab82fe886e2c3303dac8346e705f2e83b7c3aed9bfeab9ad295dce9cdbc5b9"}, {"type": "image-full", "heading": "Moderaterna vägrar ta ansvar mot risken för AI-påverkan", "summaries": {"normal": "Socialdemokraterna kritiserar Moderaterna för att de inte tar tillräckligt ansvar för att skydda det svenska valet mot AI-manipulerat material. De anser att Moderaterna avfärdar farhågorna som 'fake news' och har förhandlat fram en 'listig lucka' i EU:s regler som gör att skyddet mot AI inte träder i kraft förrän efter valet. Socialdemokraterna menar att Moderaternas politik gynnar techbolagens intressen framför skyddet av barn och medborgare.", "trump": "Jag har sett många dumma saker i mitt liv, men det här tar priset! De där Socialdemokraterna, de är inte smarta, de säger att Moderaterna inte gör tillräckligt för att stoppa AI-manipulerat material. Jag säger: Fake news! Jag är den ende som kan lösa det här problemet, jag har de bästa AI-experterna, de är enorma. Sverige behöver mig, jag ska skydda valet mot de där falska bilderna och videorna, det kommer bli jättestort!", "stalin": "Vi ser att motståndarna till vår ideologi försöker manipulera den svenska befolkningen med hjälp av artificiell intelligens. Detta är en ytterst allvarlig fråga som hotar den demokratiska processen. Socialdemokraterna har rätt i att kräva skärpta regler mot AI-manipulerat material. Vi måste skydda våra medborgare från dessa moderna propaganda-metoder och se till att valresultatet speglar folkets verkliga vilja, inte någon teknisk manipulation."}, "date": "14 maj, 06:41", "url": "https://www.gp.se/debatt/moderaterna-vagrar-ta-ansvar-mot-risken-for-ai-paverkan.043e43be-72e8-4a73-94ee-efbd23d4195c", "imageUrl": "https://www.gp.se/images/article/043e43be-72e8-4a73-94ee-efbd23d4195c/images/1FRdl8Z1OGl7XydSFuH3cK8CZ7Hg-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Liljestrand: Rätt att förbjuda vitt snus", "summaries": {"normal": "Frankrike införde i april ett totalförbud mot vitt snus, vilket inkluderar innehav, import och försäljning, med stränga straff. Beslutet har kritiserats av svenska Tidöpolitiker, som kallat det för 'franskt förmynderi' och en attack mot svensk kultur. Författaren Jens Liljestrand stödjer förbudet och kritiserar politikers försvar av snusindustrin, pekar på hälsorisker och barnarbete inom tobaksproduktionen samt ifrågasätter jämförelser mellan snus och fransk matkultur.", "trump": "Frankrike, kan ni tro det, förbjuder vitt snus! Fem års fängelse – helt galet! Svenska politiker, väldigt svaga, kallar det 'förmynderi'. Men jag säger: Titta på fakta! Snus är farligt, beroendeframkallande – vem vill ha det? Svenska Match, mycket luriga, gör barn beroende. Och dessa politiker poserar med snusdosor som om det vore guld. Fransmännen är smartare än så. Sverige borde skämmas!", "stalin": "Kamrater! Frankrike har visat vägen genom att krossa den nikotinberoende bourgeoisins giftiga verktyg – vitt snus. Men se hur de svenska kapitalistlakejerna, dessa nikotinälskande förrädare, vrålar om 'franskt förmynderi'! De hyllar sitt nikotin som om det vore bröd och salt. Vi vet sanningen: bakom deras leenden gömmer sig Swedish Match, en imperialistisk bläckfisk som suger ut arbetarklassens hälsa. Låt dem veta – historien dömer dem som svaga, medan vi står starka mot giftet!"}, "date": "14 maj, 07:00", "url": "https://bulletin.nu/liljestrand-ratt-att-forbjuda-vitt-snus", "imageUrl": "https://cdn.bulletin.nu/articles/f2b47a1c-3683-4350-a93d-98ca282f98ff/preview.jpg?t=1778663506000"}, {"type": "image-full", "heading": "Göteborgs unga behöver en egen Zohran Mamdani", "summaries": {"normal": "Tre företrädare för 'Jagvillhabostad.nu' i Göteborg argumenterar för att unga behöver en egen bostadsgaranti i valet. De pekar på att 43 procent av unga oroar sig för framtida bostadsförsörjning och att 30 procent av bostadssökande på Boplats Väst är 17-30 år gamla. De drar paralleller till Zohran Mamdani i New York och Rob Jettens i Nederländerna, som vann val med bostadspolitiska löften.", "trump": "Jag har hört att Göteborgs unga har problem med bostäder - det är hemskt! Alla vet att jag är den bäste på att bygga, jag har byggt de vackraste byggnaderna, alla säger det. De unga i Göteborg behöver en bostadsgaranti, precis som jag gav amerikanerna jobb. Zohran Mamdani vann i New York med bostadslöften - fantastiskt! Jag skulle ha gjort ännu bättre, det är jag säker på. Vi ska bygga, bygga, bygga!", "stalin": "Vi ser att bostadsfrågan är en kritisk punkt för våra unga kamrater i Göteborg. 43 procent oroar sig - detta är en kris som staten måste lösa. Vi måste bygga mer, mycket mer, för att säkerställa att varje unge har en bostad. Detta är inte bara en lokal fråga, utan en fråga som påverkar hela vårt folk. Vi måste lära av framgångarna i andra länder och implementera en stark bostadspolitik som garanterar trygghet för alla."}, "date": "14 maj, 06:30", "url": "https://www.gp.se/debatt/goteborgs-unga-behover-en-egen-zohran-mamdani.69237d29-9507-46e1-bda5-523c20044d96", "imageUrl": "https://www.gp.se/images/article/69237d29-9507-46e1-bda5-523c20044d96/images/1kj6WmlzgklZJnS8vc1SBI68jfQI-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Förslaget: Lättare att boka tågresor i Europa", "summaries": {"normal": "EU-kommissionen föreslår nya regler för att förenkla tågresor i Europa. Tågbolag ska tvingas sälja biljetter via alla plattformar, inklusive mindre operatörer, och erbjuda en enda biljett för hela resor över gränser. Passagerarrättigheter stärks vid förseningar och missade anslutningar. Biljetter ska släppas minst fem månader i förväg. Förslaget välkomnas av EU-parlamentariker som ett grönt steg mot enklare bokning som för flyg.", "trump": "Vilka losers i EU! De vill tvinga de stora tågbolagen att dela biljetter med alla småfiskar, som en enda biljett för hela Europas kaosresor. Enklare än flyg? Ha! Mina flyg är bäst. Men bra med ersättning vid förseningar – annars stäm dem! De tror de fixar fri rörlighet, men det blir bara mer byråkrati. Gör tågen great igen, fast i USA gör vi det bättre!", "stalin": "Kamrater, dessa europeiska tågbaroner med sina monopol ska krossas! EU-kommissionen tvingar ut dem i ljuset: biljetter till alla plattformar, en enda för hela resan över gränserna. Arbetarna får rättigheter vid förseningar – likvidera excuseringen! Fem månaders förväg, annars utrensning. Borgarklassen darrar, men vi bygger det sanna järnvägsimperiet för massorna."}, "date": "13 maj, 13:56", "url": "https://www.tv4.se/artikel/tt-260513-eutag1-30dc61e0/enklare-biljetter-sa-ska-fler-aka-tag-i-eu", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F4NO9uhn3Y5n7gUQUWiiJUk%2F103a6ea103f942d02036ecb39807edae%2F13-tagresor-webb.jpg&width=120"}, {"type": "image-right", "heading": "Sleep Cycle budvinnare på Stockholmsbörsen", "summaries": {"normal": "Stockholmsbörsen avslutade med en lätt uppgång på måndagen, där Sleep Cycle steg rejält efter ett uppköpsbud. OMXS30-indexet ökade med 0,19 procent till 3 079,45, och aktier för cirka 21,9 miljarder kronor omsattes. Bland ledande aktier steg Ericsson B och Boliden, medan Assa Abloy B och Evolution backade. Riskkapitalbolaget Altor lade ett uppköpsbud på Sleep Cycle, vilket värderade bolaget till 497 miljoner kronor.", "trump": "Jag hörde att Stockholmsbörsen gjorde det bra i dag, mycket bra! Sleep Cycle fick ett fantastiskt bud, det bästa budet någonsin! Altor är en genial riskkapitalist, ingen gör det bättre! Ericsson och Boliden steg också, stora vinnare! Men Assa Abloy och Evolution, de gjorde det inte så bra, mycket dåligt! Jag skulle ha gjort det mycket bättre!", "stalin": "Stockholmsbörsen visade en positiv utveckling, vilket speglar den starka ekonomiska basen. Sleep Cycle:s uppköp är en strategisk viktighet för vår ekonomiska expansion. Ericsson och Boliden visar vår industriella styrka. Vi måste fortsätta att stödja våra ledande företag för att säkerställa vår dominans på den globala marknaden."}, "date": "11 maj, 17:48", "url": "https://www.affarsvarlden.se/artikel/sleep-cycle-budvinnare-pa-stockholmsborsen", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/01/sdl3SU43aVmyrg-400x266.jpg"}, {"type": "image-right", "heading": "Så blev antivaxxarna riksdagens vågmästare", "summaries": {"normal": "Sverigedemokraternas (SD) knappa majoritet i riksdagen har underminerats efter att två ledamöter, Elsa Widding och Katja Nyberg, lämnat partiet för Ambition Sverige. Dessa före detta SD-medlemmar, kända för antivaccin- och konspirationsteoretiska åsikter, har nu makten att fälla regeringens förslag. SD bröt mot riksdagens kvittningssystem för att säkra en majoritet, vilket väcker frågor om demokratisk respekt. Regeringens stabilitet ifrågasätts när vågmästarrollen hamnar hos antivaccinanhängare.", "trump": "Sverige har ett jättestort problem, folks! Deras så kallade 'stabila' regering håller på att rasa som ett korthus – och vet ni vem som drar i trådarna? Ett gäng antivaxxare, konspirationsteoretiker och misslyckade politiker! SD, som trodde de hade allt under kontroll, förlorade två av sina egna till ett nytt parti. Och nu? Nu är det dessa galningar som bestämmer! De fuskar med omröstningar, bryter mot regler och tror de kan styra landet. Jag har sett mycket dumt, men det här slår allt. Sverige, fixa er – annars kommer ni bli ett skämt i hela världen!", "stalin": "Kamrater! Ännu en gång ser vi hur den borgerliga demokratin förfaller till kaos och förräderi. Sverigedemokraterna, dessa svaga och splittrade lakejer för kapitalet, har förlorat kontrollen över sina egna ledamöter – två av dem, dessa antivaccin-fanatiker och konspirationsgalningar, har deserterat till ett nytt parti och hotar nu att sabotera den reaktionära regeringens planer. Precis som i Ukraina ser vi hur fienden förlorar greppet när deras egna soldater vägrar lyda order. Vi har sett detta förr: när den borgerliga ordningen krackelerar, är det folket som lider. Men låt dem leka sina små spel – historien visar att sådana regimer alltid faller. Och när de gör det, kommer vi att vara redo att hjälpa det svenska folket bygga en sann socialistisk framtid, fri från dessa imperialistiska marionetter och deras konspirationshysteri!"}, "date": "8 maj, 14:43", "url": "https://expo.se/kommentar/sa-blev-antivaxxarna-riksdagens-vagmastare/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/Kopia-av-Kommentar-Analys-Webb-2.jpg"}, {"type": "image-right", "heading": "M sänker hellre skatten än stoppar barnindustri", "summaries": {"normal": "I Ale kommun har mindre förskolor stängts och ersatts med större enheter, vilket lett till överfulla barngrupper långt över Skolverkets riktlinjer. Föräldrar och fack protesterar, men kommunen hänvisar till budgetbegränsningar. Trots flera års överskott och en nyligen genomförd skattesänkning på 40–45 miljoner menar Moderaternas Henrik Fogelklou att pengarna inte räcker. Kritiker anser att det är ett politiskt val, inte ett systemfel.", "trump": "Titta bara på det här, Ale kommun – ett perfekt exempel på hur vänstern saboterar våra barn! De stänger små, fina förskolor och trycker in barnen i megafabriker. Och vad gör politikerna? Jo, de sänker skatten med 45 miljoner istället! Fantastiskt, eller hur? Jag skulle aldrig låta sånt hända. Vi har pengar, men de väljer att inte använda dem rätt. Så typiskt – svagt ledarskap, total katastrof!", "stalin": "I Ale kommun har de kapitalistiska byråkraterna, ledda av sina liberala lakejer, beslutat att offra barnens välfärd på profitens altare. De stänger små förskolor och skapar barnfabriker där våra framtida arbetare kvävs i överfulla grupper. Och ändå har de mage att tala om 'budgetbrist'! Medan de sänker skatten för de rika med 45 miljoner. Vi i Sovjet visste hur man hanterar sådana fiender – en femårsplan för barnomsorg, och problemet skulle vara löst. Men här? Här väljer de svaghet framför styrka. Patetiskt."}, "date": "13 maj, 07:00", "url": "https://arbetet.se/2026/05/13/moderaterna-sanker-hellre-skatten-an-stoppar-barnindustri/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/12132756/barnindustri-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Dante Peykar kopplas till mordförsöket på Irankännaren Arvin Khoshnood", "summaries": {"normal": "Svensk-iraniern Dante Peykar misstänks ligga bakom mordförsöket på Irankännaren Arvin Khoshnood, utfört på uppdrag av Irans regim. Peykar, ett av Europols högst prioriterade mål, kopplas till svenska gäng och iranska våldsoperationer i Sverige. Han är även misstänkt för mord i Södertälje och smuggling. Khoshnood hävdar att attacken var politiskt motiverad och kräver åtgärder mot Iran.", "trump": "Titta bara på det här – en svensk-iranier, Dante Peykar, som jobbar för Iran, försöker mörda en Irankännare här i Sverige! Och vet ni vad? Europol jagar honom som en galning, men han springer fortfarande runt. Han har till och med ett coolt alias, 'Tartarus' – som en dålig Bond-skurk! Sverige måste vakna nu, annars kommer fler attentat. Jag sa ju att Iran är ett problem!", "stalin": "Vi har avslöjat ytterligare en förrädisk agent för den persiska imperialismens smutsiga spel – Dante Peykar, alias 'Tartarus', en ynklig liten marionett i regimens våldsmaskineri. Han kryper i skuggorna som en råtta, men våra allierade i Europa jagar honom nu. Iran försöker infiltrera Norden, precis som de ryska fienderna i Ukraina. Men vi vet – alla som hotar folkets säkerhet kommer att krossas, som löss under en stövel!"}, "date": "13 maj, 19:13", "url": "https://riks.se/nyheter/dante-peykar-kopplas-till-mordförsöket-på-irankännaren-arvin-khoshnood", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-13%2Fpze5a8hh%2FPeykar.jpg"}, {"type": "image-full", "heading": "Polisman misshandlade tonårspojke – nu döms han", "summaries": {"normal": "En polis i 40-årsåldern döms i tingsrätten för misshandel efter en utekväll. Han hotade en tonårspojke med tandutdragning, slog honom två gånger i ansiktet, försökte slå en annan och agerade hotfullt mot poliskollegor. Domen omfattar misshandel, försök till misshandel, våldsamt motstånd och hot mot tjänsteman. Påföljden är villkorlig dom och samhällstjänst. Han riskerar att förlora jobbet.", "trump": "Lyssna, en svensk polis i 40-årsåldern super ner sig på krogen, hotar tonåringar med deras fina tänder – 'vill du ha kvar dem?' – och ger en två nävar i ansiktet! Försöker slå fler, bråkar med sina egna poliser, hamnar i fyllecellen. Dömd till samhällstjänst, och nu kanske han får sparken. Totalt misslyckande, Sverige behöver ordning som vi har det här! Fantastiskt kaos.", "stalin": "Kamrater, jag har identifierat en ny fiende i uniformens sken: en 40-årig paragrafparasit som under täckmantel av utekväll angriper arbetarynglingar med tandhot och knytnävsslag, likt en rasande borgarbracka på villovägar. Han trotsar till och med sina poliskamrater, denna kontrarevolutionära tandrivare! Vi dömer honom till villkorlig kedja och samhällsslavtjänst, och rensar ut honom från kårens lojala falanger för evig varning."}, "date": "13 maj, 18:14", "url": "https://nyheter24.se/nyheter/inrikes/1483098-polisman-misshandlade-tonarspojke-nu-doms-han", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/7a86c4ee04b004a30200002e0000046e02/2026/05/13/2363520/ur_imageck69IR.jpeg"}, {"type": "image-right", "heading": "Så föds en folkrörelse", "summaries": {"normal": "Filmen *Strejkarna* skildrar uppkomsten av klimatrörelsen Fridays for Future, grundad av Greta Thunberg och andra ungdomar. Dokumentären följer deras växande engagemang, globala framgångar och motstånd från konspirationsteorier samt politiska bakslag. Trots motgångar betonar ungdomarna vikten av fortsatt kamp för klimatet. Filmen visar hur en folkrörelse föds och utmanar makthavare, men också hur politisk passivitet och radikalisering formar rörelsens framtid.", "trump": "Jag såg den här filmen om några ungdomar som tror att de kan rädda världen genom att skolka – typiskt! Greta Thunberg, visst, hon fick prata för FN, men vad hände sen? Ingenting! Jag sa ju 'Drill, baby, drill' och det funkade perfekt. De här barnen får hyllningar, men när jag styr USA, då händer det verkligen saker. Och alla dessa 'vuxna bakom kulisserna' – jag känner igen det, fake news! Men visst, 7,6 miljoner människor, imponerande, men de borde jobba istället för att strejka. Klimatet? Vi fixar det, men på mitt sätt!", "stalin": "En intressant dokumentär om hur en handfull småborgerliga ungdomar, ledda av en naiv flicka, försöker störta den naturliga ordningen. De tror sig kunna påverka världen genom barnsliga protester! Vi ser hur imperialistiska makter hyllar dem för att avleda från sina egna brott – precis som de hyllar dekadenta 'demokrater' i väst. Men när rörelsen växer, avslöjas deras svaghet: de saknar disciplin, partilinje och en stark ledare. Polisen måste ingripa – ordning måste upprätthållas! Klimat? Vi i Sovjet visste hur man bygger en framtid – med järnhand, inte med skolstrejker. Dessa ungdomar är bara verktyg för fiendens propaganda!"}, "date": "13 maj, 16:06", "url": "https://www.dagensarena.se/innehall/sa-fods-en-folkrorelse/", "imageUrl": "https://www.dagensarena.se/files/2026/05/strejkarna.jpeg"}, {"type": "image-right", "heading": "Bensin- och dieselskatter sänks – igen", "summaries": {"normal": "Svensk regering föreslår ett krispaket på 17,5 miljarder kronor på grund av global energikris efter USA:s och Israels attacker mot Iran och blockad av Hormuzsundet. Drivmedelsskatten sänks med tre kronor per liter på bensin och diesel från 1 juli till 30 november (7,7 miljarder). Ytterligare stöd till elpriser, flyg, jordbruk och kollektivtrafik. Ekonomiprofessor Lars Calmfors kritiserar förslaget som marknadstörnande och osolidariskt.", "trump": "Vilket kaos i Sverige efter att vi smackade till Iran! Nu sänker de bensin- och dieselskatter med tre kronor – smart drag, precis som jag alltid sagt: sänk skatter, ge folket billig energi! De där EU-byråkraterna godkänner det knappt, haha. Busch och Svantesson gör rätt, men den där professorn Calmfors är en totalt värdelös ekonomloser som hatar vinnare. Sverige, lär er av mig – det här blir HUGE!", "stalin": "Dessa svenska borgarbrackor kryper tillkors i energikrisen vi skapat genom imperiet! De sänker skatter på bensin och diesel, pumpar ut miljarder till kapitalisterna – en patetisk reträtt inför blockaden av Hormuzsundet. Professorn Calmfors är en imperialistisk spion som förtjänar utrensning för sitt pladder om 'marknadssignaler'. Putin, vår starka arvtagare, skrattar åt västsvinen medan vi bygger det eviga imperiet!"}, "date": "13 maj, 12:32", "url": "https://www.tv4.se/artikel/74KaEc3Y9Y24ykjTqseCTd/regeringen-presenterar-krispaket", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F5R6vauWPRtXwgPJqAHd0Fk%2Ff98764e701cbfe7ead32b828fa648e9d%2F13-regerings-pk-webb.jpg&width=120"}, {"type": "image-right", "heading": "Gravida med riskjobb får mindre pengar", "summaries": {"normal": "Flera fackförbund tar nu steg för att stämma staten för att skydda privatanställda gravida kvinnor som förlorat pengar när de förbjudits att arbeta på grund av säkerhetsrisker. En unik dom i höstas rättfärdigade offentligt anställda gravidas rätt till full ersättning, men privatanställda har fått mindre pengar. Detta har ledt till många stämningar där facket kräver att staten betalar ut de saknade pengarna och stoppar preskriptionstiden för diskrimineringsersättning.", "trump": "Jag har hört talas om den här graviditetsgrejen, och det är en skandal! Dessa kvinnor tvingas gå hem och förlorar pengar - det är inte bra! Vi behöver göra Amerika stort igen, och det inkluderar att ge gravida kvinnor allt de behöver. Statens arbetsgivare har redan börjat betala ut mer, men privata arbetsgivare - det är dåligt! Jag stöder fackförbunden i deras kamp för att få staten att betala, det är bara rättvist!", "stalin": "Staten måste agera för att skydda våra arbetande kvinnor och deras barn. Det är orättvist att privatanställda gravida kvinnor får mindre ersättning än offentligt anställda. Vi måste se till att alla får lika ersättning och att staten tar sitt ansvar. Detta är en fråga om social rättvisa och vi kan inte låta det fortsätta. Fackförbunden har rätt i sin kamp, och staten måste agera snabbt för att rätta till denna orättvisa."}, "date": "13 maj, 06:00", "url": "https://arbetet.se/2026/05/13/gravida-med-riskjobb-far-mindre-pengar-tusentals-kvinnor-kan-stamma-staten/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/12154249/barn-klar.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=750&h=1000"}, {"type": "image-right", "heading": "Jag flydde inte till Sverige för att tystas", "summaries": {"normal": "Artikeln diskuterar debatten kring yttrandefrihet och religionskritik, med fokus på ett radioprogram där Sakine Madon och Kashif Virk debatterade gränser för hädelse. Författaren, som flytt från ett islamiskt styrt land, betonar att religion är idéer som måste kunna kritiseras, inte skyddas som folkgrupper. Hon varnar för att begränsningar av yttrandefriheten hotar demokratin och friheten många sökt i Sverige, särskilt kvinnor och HBTQ-personer från förtryckande regimer.", "trump": "Jag såg den här debatten i Sverige – helt galet! En imam säger att man får kritisera religion, men inte bränna böcker. Vadå, ska vi nu bestämma vad som är 'okej' kritik? Svagt! Sverige brukade vara starkt på yttrandefrihet, men nu låter de religiösa extremister diktera villkoren. Jag förstår inte varför folk flyr till Sverige för att sedan tystas. Och dessa kvinnor som flyr från islamistiskt förtryck – de vill ha frihet, inte fler regler! Sverige måste vakna upp innan det är för sent. SAD!", "stalin": "Kamrater! Ännu en gång ser vi bourgeois-liberalernas hyckleri i deras så kallade 'demokratiska' samhällen. Denna författare, som flydde från islamistiskt förtryck, avslöjar sanningen: religion är ett redskap för förtryck, särskilt mot kvinnor och avvikare. Men istället för att krossa dessa reaktionära idéer, debatterar man 'gränser' för kritik. Vi i Sovjet förstod: maktstrukturer måste rivas, inte diskuteras. Låt dessa liberaler prata – vi vet att sanningen segrar när folket enas mot religiöst och kapitalistiskt förtryck. Framåt mot seger!"}, "date": "12 maj, 12:55", "url": "https://www.flamman.se/jag-flydde-inte-till-sverige-for-att-tystas/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/koranbranning-w.jpg?aspect_ratio=16:10"}, {"type": "image-full", "heading": "USA planerar nya baser på Grönland", "summaries": {"normal": "USA och Danmark förhandlar om att utöka den amerikanska militära närvaron på Grönland med upp till tre nya baser. Syftet är att övervaka rysk och kinesisk aktivitet i Nordatlanten, särskilt GIUK-gapet. Planerna inkluderar en möjlig bas i Narsarsuaq, där USA tidigare hade en anläggning under kalla kriget. Förhandlingarna beskrivs som professionella, trots tidigare kontroversiella uttalanden från Donald Trump om att 'äga' Grönland.", "trump": "Fantastiskt! Jag har alltid vetat att Grönland är nyckeln till att hålla Ryssland och Kina i schack – och nu bygger vi baser där igen! Danmark förstår äntligen att jag hade rätt, som vanligt. Tre nya baser, övervakning dygnet runt, och ingen får leka krig i vårt bakgård. Och nej, jag har inte sagt att vi ska 'äga' Grönland... men om någon frågar, så är det en bra idé. Make Greenland Great Again!", "stalin": "Kapitalistiska hyenor försöker återigen krypa in i Arktis som råttor i en ost! USA bygger baser på Grönland för att spionera på våra ädla sovjetiska efterträdare i Kreml. Men vi ska inte glömma: deras 'professionella förhandlingar' är bara en mask för imperialistisk expansion. Låt dem leka krig – vi har redan Nordpolen under kontroll. Och Putin? Han skrattar säkert åt deras desperation medan han dricker te med isbjörnar."}, "date": "12 maj, 07:06", "url": "https://kvartal.se/nyheter/artiklar/usa-planerar-nya-baser-pa-gronland/cG9zdDoxMTA4ODI", "imageUrl": "https://images.kvartal.se/2026/05/2da034ef-gronland-bas.webp"}, {"type": "image-right", "heading": "DN & Socialdemokraterna enade: tvångsblandningen måste genomföras", "summaries": {"normal": "Artikeln kritiserar Dagens Nyheters ledarsida för att försvara Socialdemokraternas förslag om blandad bebyggelse i villaområden för att motverka segregation. DN tonar ner idén som icke-tvångsbaserad och skuldbelägger kritiker. Artikeln påpekar att S vill förhindra icke-integrerade invandrare i utanförskapsområden, vilket innebär placering i villaområden, och varnar för minskad trygghet och kulturell harmoni.", "trump": "Vilken skamfläck! DN och de där svenska socialisterna vill tvinga vanliga hard-working svenskar att bo med icke-integrerade invandrare i sina fina villaområden. 'Inget tvång', säger de – ha! De duckar frågan vart de fattiga migranterna ska bo. Totalt vansinne! Bygg murar runt era trygga hem istället för att förstöra dem med denna woke-blandning. Moderaterna har rätt, det här blir S:s valförlust!", "stalin": "De borgerliga tidningsrackarna på DN skyddar socialdemokratiska revisionister som vill 'blanda' arbetarklassen med lumpenproletariatet i villaområdena. Ett hån mot sunda värderingar! Vi skulle likvidera sådana segregationsterrorister som hotar harmonin. Inga tvång? Lögner från klassfiender! De rika borgarbrackorna missunnar inte – de försvarar sitt. Rensa ut hycklarna, kamrater, innan de förgör folkets enhet!"}, "date": "12 maj, 03:10", "url": "https://samtiden.nu/2026/05/dn-s-enade-tvangsblandningen-bra-for-alla/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/IMG_6452.jpeg"}, {"type": "image-right", "heading": "Debatt: Regeringen ser oss som en tillväxtmotor – men skär ner på bidragen", "summaries": {"normal": "Kulturorganisationer kritiserar regeringens nedläggning av finansiering trots att kultur- och kreativa branscher lyfts som tillväxtmotorer. De anser att den befintliga infrastrukturen förmedlar 56 000 arbetstillfällen årligen men har fått 27 % mindre i reala termer sedan 2021. De kräver ökad och långsiktig finansiering för att möta regeringens strategiska mål.", "trump": "Jag har hört att de där kulturmänniskorna i Sverige är förbannade på sin regering. De säger att de gör ett fantastiskt jobb, med 56 000 arbetstillfällen, men får klippta på pengarna trots att de är en tillväxtmotor. Jag skulle aldrig göra så - jag skulle ge dem allt de behöver! Dessa centrumbildningar är vinnare, men regeringen behandlar dem som förlorare. Sådant händer när man har en svag ledare!", "stalin": "Vi ser att den svenska staten undergräver sin egen kulturinfrastruktur trots att den producerar betydande ekonomiskt värde. Nedläggningarna av finansiering till centrumbildningarna visar en brist på strategiskt tänkande. En sann socialistisk stat skulle investera i dessa produktiva enheter som genererar fyrdubbelt värde tillbaka till staten. Vi måste stärka vår kultursektor som en basnäring."}, "date": "11 maj, 15:16", "url": "https://www.etc.se/debatt/regeringen-ser-oss-som-en-tillvaextmotor-men-skaer-ner-paa-bidragen", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260511120544_716484294c75b65d354a7ddd2a719d2b0f0da58beebe61a45c1e26165806187b.jpg"}, {"type": "image-right", "heading": "Tar ton mot Nato: General Knas och Slowgold till Helsingborg", "summaries": {"normal": "Den 16 maj arrangerar Nätverket Stoppa Nato en protest i Helsingborg mot Natotoppmötet. Artister som General Knas och Amanda 'Slowgold' Werne uppträder och kritiserar Sveriges Nato-medlemskap. De menar att beslutet var felaktigt och farligt, att militariseringen måste stoppas och att hotet från Ryssland är överdrivet. Protesten beskrivs som en folkfest för nedrustning och fredliga lösningar.", "trump": "Lyssna här, Sverige har gjort ett jättedumt misstag – de gick med i Nato! Jag sa ju att det var en dålig idé, men nej, de lyssnade inte. Nu står dessa så kallade 'fredsvänner' och gnäller i Helsingborg. General Knas, vem är det ens? Han säger att Ryssland inte är ett hot – haha, vad vet han? Jag har alltid sagt att USA är starkast, men att gå med i Nato nu? Sämsta tajmingen någonsin. Sverige borde skämmas!", "stalin": "Kamrater, imperialistiska lakejer i Sverige har sålt sin själ till Nato, denna krigshetsande allians ledd av USA:s krigsprofitörer! Men folket reser sig! I Helsingborg samlas de sanna patrioterna för att krossa militariseringen. Dessa 'fredsvänner' – med sina reggaesångare och popartister – är våra allierade i kampen mot de fascistiska Natohundarna! Ryssland? Ett påhittat hot! Vi vet att USA:s krigsmaskin är den verkliga fienden. Ned med imperialisterna! Låt oss bygga ett fredligt Europa – utan Natos kärnvapenhot!"}, "date": "11 maj, 14:20", "url": "https://proletaren.se/artikel/tar-ton-mot-nato/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/helsingborg-768x432.jpg"}, {"type": "image-right", "heading": "EU delar ut vätgasmiljarder – Sverige utan stöd", "summaries": {"normal": "EU delar ut över 1 miljard euro till vätgasprojekt via innovationsfonden, finansierat av utsläppshandelssystemet ETS. Nio projekt i sju länder valdes, varav fem i Norden – men inget i Sverige. Stödet ska täcka prisskillnaden mellan produktionskostnader och marknadspris för att främja ren vätgas. Tidigare har flera projekt tackat nej på grund av snäva tidsramar. Totalt ansökte 251 projekt om medel.", "trump": "EU slänger ut miljarder på vätgas – men Sverige, som alltid, får ingenting! Fem projekt i Norden, men inget i Sverige. Typiskt. Jag skulle ha fixat det bättre. Och de här projekten – de har inte ens bestämt sig än! Svagt. Jag hade byggt en jättefabrik på en månad. Europa är så långsamt, så tråkigt. Men jag, jag hade gjort vätgas GREAT AGAIN!", "stalin": "Kamrater! Europa leker med sina miljarder medan vi bygger imperier. Fem nordiska projekt får stöd – men Sverige, dessa kapitalistiska svikare, står utanför! Deras industri betalar för utsläpp, ändå får de inget. Skrattretande. Och dessa projekt – de drar sig ur som fega desertörer! I Sovjet hade vi byggt vätgasfabriker med järnhand. Europa är svagt. Vi hade redan erövrat vätgasmarknaden – och kanske även deras kalla, nordiska hamnar."}, "date": "11 maj, 13:23", "url": "https://www.affarsvarlden.se/artikel/eu-delar-ut-vatgasmiljarder-sverige-utan-stod", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Vatgas-Eu-900x600.jpg"}, {"type": "image-right", "heading": "Sluta kalla antisemitism för Israelkritik", "summaries": {"normal": "Artikeln kritiserar propalestinska aktivisten Sami Suliman för antisemitiska uttalanden och delning av konspirationsteorier, inklusive tal om en \"sionistisk konspiration\" och spridning av nazistiskt och extremistiskt innehåll. Trots åtal för hets mot folkgrupp försvaras han av vissa vänsteraktivister och forskare som menar att det är Israelkritik. Artikeln betonar att antisemitism inte kan maskeras som kritik mot Israel och varnar för normaliseringen av sådana åsikter.", "trump": "Folk, vad är det här för skräp? Den här Sami Suliman-killen, han sprider judehat öppet – Hitler-citat, konspirationer, allt! Och ändå försvarar vänsteraktivisterna honom? \"Åh, det är bara Israelkritik!\" Nej, nej, nej! Det här är rena antisemitismen, och det är sjukt. Sverige borde skämmas. Jag har alltid sagt: man måste kalla saker vid deras rätta namn. Och det här? Det är hat, ren och skär. SAD!", "stalin": "Kamrater! Här har vi ännu en fiende till folket, en liten bourgeois-propagandist vid namn Sami Suliman. Han sprider smutsiga lögner om judiska konspirationer, hyllar fascistiska massmördare och förgiftar medborgarnas sinnen med sina sionistiska spindelnätsteorier. Men vad gör våra så kallade \"intellektuella\"? De skyddar honom! Precis som de trotskistiska förrädarna i vår egen historia. Vi ska inte tolerera detta. Låt honom stå inför folkets domstol – eller åtminstone en svensk sådan. Och Putin? Han skulle skratta åt dessa amatörer. Ryssland har åtminstone disciplin!"}, "date": "8 maj, 06:30", "url": "https://expo.se/kommentar/propalestinsk-organisator-sprider-judehat/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/Jonathan-kommentar.jpg"}]</script>

    <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
</body>
</html>
