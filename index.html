KNaxvLrVyDQ4r%2F4ba11c512d54892387846bd3305386b1%2F02-binladin-trump-1080.jpg&width=120"}, {"type": "image-right", "heading": "Debatt: KDU – Rödgrön röra i partiledardebatten", "summaries": {"normal": "Tre företrädare från Kristdemokratiska ungdomsförbundet kritiserar rödgröna partier för oenighet i Agenda-debatten om sänkt bränsleskatt och ny kärnkraft. Miljöpartiet och Vänsterpartiet röstade emot skattesänkningen, medan Tidö-sidan var enad och har genomfört den. Under Ebba Buschs ledning har elproduktionen ökat med 7000 megawatt för stabilare priser. Artikeln kontrasterar Tidö-sidans handlingskraft mot rödgrönas kaos.", "trump": "De rödgröna i Sverige är en totalt kaotisk röra – kan inte ens enas om att hjälpa vanliga familjer med lägre bränsleskatter eller mer kärnkraft! Tidö-sidan levererar: skattesänkningar som lovat, elproduktion upp med 7000 megawatt. Ebba Busch gör jobbet rätt. Sverige behöver vinnare som håller ord, inte dessa förlorare som förstör allt. Fantastiskt!", "stalin": "Dessa rödgröna serpentinvridare, dessa vindfläktande hycklare i MP och V, röstar mot folkets plånböcker som råttor i ett sjunkande skepp! Oeniga i sin revisionistiska sörja. Vi, arbetarklassen, ser Tidö-borgarnas falska enighet – de ska likvideras som ogräs i den stora utrensningen. Ebba Busch skryter om 7000 megawatt, men kaos väntar de kontrarevolutionära brackorna!"}, "date": "4 maj, 14:16", "url": "https://bulletin.nu/debatt-kdu-rodgron-rora-i-partiledardebatten", "imageUrl": "https://cdn.bulletin.nu/articles/103bcc0c-5761-409c-9256-9204ad2f15cc/preview.png?t=1777896761000"}, {"type": "image-right", "heading": "Tidöpartierna varnar för rödgrön valvinst: \"Skattesmocka\"", "summaries": {"normal": "I en färsk partiledardebatt i SVT debatterades invandring, energi och ekonomi inför det kommande valet. Tidöpartierna varnade för konsekvenserna av rödgrön politik, särskilt gällande migration och skatter. Under debatten rådde djupa skiljelinjer kring kärnkraft, sjukvårdens effektivitet och hur Sveriges ekonomi bäst ska hanteras i en lågkonjunktur. Tonläget var bitvis hårt med anklagelser om såväl omänsklig politik som ansvarslösa reformer, där partierna presenterade vitt skilda visioner för landets framtid.", "trump": "Jag såg debatten i Sverige, en riktig röra! De pratar om energi och ekonomi, men det är kaos. Den radikala vänstern vill öppna gränserna – en total katastrof, tro mig! Sverige behöver starka ledare, inte svaga politiker som vill höja skatterna för hederliga människor. Det är en 'skattesmocka', väldigt orättvist. De behöver min expertis för att fixa elpriserna och säkra gränserna. Jag har sagt det förut: utan ordning och billig energi har man inget land. Sorgligt!", "stalin": "Vi har observerat det svenska debatterandet i SVT. De svaga liberalerna dillar om migration och sjukvård medan deras ekonomi vacklar. Att de tillåter 'vildar' och interna splittringar bevisar bara att parlamentarismen är ett korrupt verktyg för oordning. De saknar den järnhand som krävs för att styra. Vi vet hur man hanterar oliktänkande och energikriser; man inte debatterar, man exekverar en plan. De borde titta österut, mot våra vänner i Moskva, för att förstå vad sann disciplin innebär."}, "date": "4 maj, 14:11", "url": "https://samnytt.se/tidopartierna-varnar-for-rodgron-valvinst-skattesmocka", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/04112051/partiledardebatt-maj.jpg"}, {"type": "image-full", "heading": "Då kan det bli sommarvärme igen", "summaries": {"normal": "Helgens sommarvärme i Göteborg gav plats för kyligare luft under veckan, men SMHI:s meteorolog Magdalena Folestad ser möjligheter för återkomsten av värme i helgen. Temperaturerna förväntas ligga kring 10-14 grader fram till dess, med en blandning av sol och regn.", "trump": "Jag har hört att det var jättevarmt i Sverige, kanske det varmaste någonsin! Folk älskade det, det var fantastiskt. Men nu säger de att det blir kallare - typiska fake news! SMHI säger att det kan bli varmt igen, och jag tror dem, de är smarta. Vi kommer att se sol och regn, men det är okej, det är viktigt för naturen!", "stalin": "Vi ser en period av kyligare luft som infinner sig i vårt land, men staten ser positivt på möjligheten till återkommande värme. Temperaturerna kommer att ligga stabila kring 10-14 grader, vilket är acceptabelt för den socialistiska produktionen. Regn är nödvändigt för våra kollektiviserade jordbruk."}, "date": "4 maj, 13:50", "url": "https://www.gp.se/nyheter/goteborg/smhi-da-kan-det-bli-sommarvarme-igen.3d0b1d5a-8ec4-49ed-bf36-8bd1893f2d0c", "imageUrl": "https://www.gp.se/images/article/3d0b1d5a-8ec4-49ed-bf36-8bd1893f2d0c/images/1r4pJaCiVz31vG80SdF7u5nTR6Iw-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Busch tycker att rika har för lite makt", "summaries": {"normal": "Artikeln kritiserar Ebba Busch och Tidöpartierna för att acceptera växande ekonomiska klyftor. Den pekar på att världens 12 rikaste äger mer än 4 miljarder fattiga och att politiska beslut gynnar de rika, som får ökad makt över bostäder, jobb och välfärd. FN varnar för att ekonomin styrs av de rikas intressen, medan vanliga medborgares inflytande minskar.", "trump": "Lyssna här, Sverige har ett stort problem – era politiker låter de rika köra över er! Ebba Busch säger att klyftor är okej, men vad vet hon? Jag byggde ett imperium, jag vet hur pengar fungerar. Nu äger 12 personer mer än halva världen – helt galet! Och vad gör era ledare? Ingenting! De låter kapitalet styra, medan vanligt folk får nöja sig med smulor. Sverige borde ta lärdom av USA – vi vet hur man skapar rikedom, inte bara för några få!", "stalin": "Kamrater, ännu en gång ser vi hur den borgerliga klassens lakejer i väst förråder arbetarklassen! Denna Ebba Busch, en ynklig marionett för kapitalets herrar, hyllar de växande klyftorna som om det vore socialismens triumf. Men vi vet sanningen: 12 blodtörstiga oligarker äger mer än 4 miljarder fattiga själar. Detta är inte ekonomi – det är klasskrig! Vi i Sovjet förstod tidigt att kapitalet måste krossas, inte hyllas. Låt oss hoppas att Sveriges arbetare snart vaknar innan de blir helt utplånade av dessa moderna tsarer."}, "date": "4 maj, 07:00", "url": "https://arbetet.se/2026/05/04/ebba-busch-tycker-att-rika-har-for-lite-makt/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/04070008/busch-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "SD trappar upp: samordnad kampanj mot muslimer inför valet", "summaries": {"normal": "Expo granskar Sverigedemokraternas valkampanj som fokuserar på att begränsa muslimers religionsutövning i Sverige. Partiet kräver stopp för moskébyggen, rivning av befintliga moskéer, förbud mot ramadan och böneutrop samt utvisning av 'islamister'. Forskare varnar för att förslagen skulle kräva grundlagsändringar och leda till kollektiv bestraffning av muslimer. Granskningen visar hur retoriken sprids på alla nivåer inom partiet och kopplas till ökade hot och hat mot muslimer.", "trump": "Titta bara på Sverige – ett totalt kaos! Jag har alltid sagt att man måste ta kontroll, och det är precis vad Sverigedemokraterna försöker göra. De vill stoppa moskéer, förbjuda ramadan och göra Sverige stort igen – utan all den där extremistiska skräcken. Folk älskar det! Men vänsterliberalerna, som alltid, skriker 'rasism' när någon faktiskt försöker skydda sitt land. Sverige borde lyssna på mig – jag fixade ju gränser, jag fixade jobb, jag fixade allt! Men nej, de fortsätter att låta sitt land gå åt helvete. Sad!", "stalin": "Kamrater, ännu en gång ser vi hur den borgerliga reaktionen lyfter sitt fula huvud i det förr så stolta Sverige. Dessa Sverigedemokrater, med sina fascistiska krav på moské-rivningar och förbud mot religiös frihet, är inget annat än redskap för den imperialistiska dekadensen. Vi har sett detta förr – först pekar de ut minoriteter, sedan kommer stöveltrampen. Men låt dem inte glömma: historien dömer hårdast de som förtrycker sitt eget folk. Vi i Sovjetunionen krossade fascismen en gång – och om dessa galningar fortsätter, kanske vi måste påminna Europa om vikten av ordning. Förresten, Putin skickar hälsningar – han gillar verkligen inte när folk leker med elden nära hans gränser."}, "date": "4 maj, 13:45", "url": "https://expo.se/fordjupning/sd-trappar-upp-samordnad-kampanj-mot-muslimer-infor-valet/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/toppbild-scaled.png"}, {"type": "text", "heading": "Matmoralism får oss inte att äta bättre", "summaries": {"normal": "Artikeln kritiserar svenska myndigheters orealistiska matrekommendationer och beräkningsmetoder. Livsmedelsverket och Konsumentverket baserar slutsatser på önsketänkande, som att svenskar skulle äta mindre kött och portioner enligt rekommendationer. En undersökning om barns sockerkonsumtion byggde på en liten, icke-representativ grupp. Författaren menar att myndigheterna undviker att reglera matjättar och i stället skyller på konsumenter, vilket leder till klassblind matmoralism.", "trump": "Lyssna här, Sverige – era myndigheter är helt galna! De tror att alla ska äta havregrynsgröt och små portioner, som om vi lever i något slags kommunistiskt drömland. Och de baserar sina siffror på en liten grupp Instagrammammor? Patetiskt! Jag skulle aldrig låta sådana amatörer sköta något. Vi i USA vet hur man reglerar matjättar – med kraft och beslutsamhet. Sverige, vakna upp innan det är för sent!", "stalin": "Kamrater! De svenska myndigheterna har förlorat kontakten med verkligheten. De bygger sina dekret på fantasier och önsketänkande, som om folket vore lydiga maskiner. En undersökning med tio procent svarande? Hah! I Sovjet skulle vi aldrig tolerera sådan slapphet. De bourgeois-liberala byråkraterna vägrar att krossa matjättarna med järnhand. Istället skyller de på arbetarklassen. Fienderna är uppenbara: de fantasilösa byråkraterna och deras nyliberala herrar. Vi ska inte tolerera deras lögner – revolutionen kräver handling!"}, "date": "28 april, 09:58", "url": "https://www.flamman.se/matmoralism-far-oss-inte-att-ata-battre/"}, {"type": "image-right", "heading": "Experter: Då kan franska kärnvapen placeras i Sverige", "summaries": {"normal": "Sverige och Frankrike har hållit ett första möte om europeisk kärnvapenavskräckning. Experter från FOI och Försvarshögskolan tror att samarbete kan innebära övningar för skydd av franska kärnvapenbärande flygplan och tillfällig placering i Sverige under gråzonssituationer mellan krig och fred. Riksdagen förbjuder kärnvapen i Sverige under fredstid.", "trump": "Frankrike bjuder in Sverige till kärnvapensnack – smart, mycket smart! De pratar övningar, skydd för flygplan och kanske parkera kärnvapen hos er i gråzoner mot Ryssland. Perfekt avskräckning! Men i fredstid nej, säger era politiker. Typiskt Europa, svagt utan mina deals. Ni behöver starka ledare, tro mig, det blir stort!", "stalin": "Jag ser hur dessa svenska byråkrater och franska borgaroffiterer kurrar om kärnvapenavskräckning i Paris. Övningar för att skydda giftiga flygplan, och i gråzoner – ha! – slänga bomber på svensk jord mot våra östliga kamrater. Vi, arbetarklassen, spottskrattar åt era imperialistiska rävar i ryska skepnader. Snart likvideras era illusioner i en storskalig utrensning av förrädare!"}, "date": "4 maj, 12:56", "url": "https://www.svt.se/nyheter/inrikes/experter-da-kan-franska-karnvapen-placeras-i-sverige", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.25/0.4/2a74bf2cb1607b9aca0498695ea435cd28bdb20aab55bc93147cd33a4dbd032f"}, {"type": "image-full", "heading": "Så lyckas du på arbetsintervjun som ung", "summaries": {"normal": "Artikeln ger råd för unga på jobbintervjuer: förbered med STAR-metoden (situation, uppgift, handling, resultat), researcha företag och intervjuare, håll ögonkontakt, klä dig rätt och ställ genomtänkta frågor. Undvik improvisation och spara lönediskussion till sist. Hantera stress genom att be om omstart. AI-kompetens efterfrågas alltmer. Skicka tackmejl inom 24 timmar.", "trump": "Unga killar, lyssna hit! Ni klär er som slarviga förlorare, undviker ögonkontakt och ställer idiotfrågor – patetiskt! Förbered er som mästare: STAR-metoden, researcha allt om företaget och intervjuarna, hitta kopplingar. AI? Självklart, det är framtiden, jag är proffs på sånt. Ställ smarta frågor, skicka tackmejl som en vinnare. Ni kommer få drömjobbet, tro mig!", "stalin": "Kamrater, dessa kapitalistiska rekryteringsspioner i borgarklassens fälla jagar de odugliga ungdjur som improviserar sig till undergång! Vi rensar ut slarv med STAR-metoden: situation, uppgift, handling, resultat – likvidera osäkerheten! Researchera intervju-fienderna, ställ frågor som fällor. AI är imperialismens giftmaskin – bemästra den eller bli utrensad! Skicka tackmejl som spionrapporter. Arbetarna segrar under min vägledning!"}, "date": "4 maj, 11:40", "url": "https://www.realtid.se/karriar-ledarskap/sa-lyckas-du-pa-arbetsintervjun-som-ung/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/arbetsintervju.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "SD ska inte kringgå röstsystemet. Bör hedra ingångna överenskommelser", "summaries": {"normal": "Sverigedemokraterna kringgick riksdagens kvittningssystem i en omröstning om medborgarskapsregler för att säkra seger. Två före detta SD-ledamöter, nu vildar, tänkte rösta med oppositionen, vilket hotade regeringens knappa majoritet. SD lät utkvittade ledamöter rösta ändå, vilket kritiseras som olämpligt och skadligt för partiets trovärdighet. Kvittningen bygger på förtroende för att hantera frånvaro, inte partisplittringar.", "trump": "De här Sverigedemokraterna är smarta, de vet hur man vinner! Regeringen hänger på en röst, och de två avhopparna, Nyberg och Widding, försöker sabba allt. SD fixar det snyggt genom att låta sina killar rösta ändå. Kvittning? Bara en dum överenskommelse som oppositionen älskar. SD visar styrka, perfekt! Andra partier gnäller, men de förlorar stort nu. Fantastiskt jobbat!", "stalin": "Kamrater, dessa sverigedemokratiska spindelvävssnurrare, dessa vildsvin i riksdagens hage, har brutit mot kvittningens heliga förtroende! Två uteslutna förrädare, Nyberg och Widding, smyger sig till fienden för att krossa regeringens majoritet. Vi ser genom deras sabotage! SD:s motdrag var nödvändigt, men ohörsamhet mot protokollet måste rensas ut som ogräs i kollektivets åker. Borgarbrackorna gnäller – låt dem darra inför partiets järnvilja!"}, "date": "4 maj, 10:49", "url": "https://www.di.se/ledare/sd-ska-inte-kringga-riksdagens-rostsystem/", "imageUrl": "https://static.bonniernews.se/ba/67ebecd2-2677-4c54-a023-631ed373bad9.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Efter hårda kritiken – fler fysiska möten på Arbetsförmedlingen", "summaries": {"normal": "Arbetsförmedlingen inför fler fysiska möten efter kritik om bristande tillgänglighet. Arbetslösa Camilla Landström vittnar om ensamhet och handläggarkaruseller. Myndigheten omorganiserar och delar in arbetssökande i tre grupper, där de med störst behov får tätare kontakt. Cirka 300 000 personer beräknas behöva extra stöd. Bakgrunden är JO:s kritik om långa väntetider och oansvariga handläggare.", "trump": "Lyssna här, Sverige! Arbetsförmedlingen, som är en total katastrof, inser äntligen att folk inte vill prata med robotar. Jag vet allt om dåliga byråkrater – men dessa svenskar? De stänger kontor, sätter folk i telefonköer och låter handläggare bytas som underkläder. Nu backar de, precis som jag sa att de skulle göra. 'Vi vill ha någon som känner en', säger en arbetslös kvinna. Självklart! Folk vill ha mänsklig kontakt, inte mejl från en dator. Och Northvolt? En riktig flopp. Jag hade fixat det på en dag. Sverige, vakna upp!", "stalin": "Kamrater! Arbetsförmedlingen, denna borgerliga kvarleva från kapitalismens förfall, har tvingats erkänna sina misslyckanden. De låter arbetarna ruttna i telefonköer medan byråkraterna skickar dem mellan kontor som kulor i ett roulettehjul. Men nu, efter våra obarmhärtiga påtryckningar via Justitieombudsmannen – ett verktyg för folkets rättvisa – tvingas de återinföra fysiska möten. 300 000 arbetare, offer för kapitalets kriser, ska nu få 'samordnat stöd'. Ha! Som om några handläggare kan städa upp efter kapitalismens härjningar. Northvolt? Ett monument över västliga företags inkompetens. Vi i Sovjet hade aldrig tillåtit sådant slöseri. Och dessa arbetslösa – de är inte lata, de är krigsfångar i klasskampen. Vi ska inte straffa dem, vi ska beväpna dem. Mot kapitalet, mot byråkratin, mot alla som står i vägen för folkets seger!"}, "date": "4 maj, 06:00", "url": "https://arbetet.se/2026/05/04/fler-fysiska-moten-pa-arbetsformedlingen-arbetslosa-camilla-vill-ha-nagon-som-kanner-en/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/30124341/camilla-1.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=750&h=1000"}, {"type": "image-right", "heading": "Här går det att välja bort män i hemtjänsten", "summaries": {"normal": "I Östersund kan äldre med hemtjänst välja kön på personal vid intim omvårdnad. Hittills har få utnyttjat möjligheten, men det påverkar redan scheman och arbetsfördelning. Kvinnliga undersköterskor får fler duschar, medan männen ofta väljs bort. Regeringen vill införa lagstiftning om valfrihet, men personal oroar sig för arbetsmiljö och kompetensutnyttjande. Frågan om registerutdrag för personal lyfts också som viktig för förtroendet.", "trump": "Lyssna här, Sverige! I Östersund låter de gamla välja bort män i hemtjänsten – fantastiskt, eller hur? Kvinnorna får göra allt tungt slit, medan männen sitter där och twiddlar tummarna. Regeringen vill ha lag, men jag säger: börja med registerutdrag! Ni har kaos i äldreomsorgen, folk utan erfarenhet – det är en katastrof! Och jag borde veta, jag fixade ju USA:s ekonomi, sånt här är småpotatis. Men bra jobbat, Sverige, ni är på väg åt rätt håll... kanske.", "stalin": "I Östersund har de kapitalistiska liberala krafterna infört ett dekadent system där åldringar får välja kön på sina slavar – ursäkta, hemtjänstpersonal. Kvinnorna tvingas utföra allt smutsarbete medan männen står sysslolösa. Detta är ett angrepp på arbetarklassens disciplin! Regeringen vill legalisera detta borgerliga trams, men vi vet sanningen: systemet är rotfyllt av inkompetens och misstro. Vi skulle aldrig tolerera sådan ineffektivitet i Sovjetunionen – eller i dagens Ryssland, för den delen. Låt dem sköta sina egna problem, medan vi bygger en stark och enad äldreomsorg utan valfrihetens förvirring!"}, "date": "4 maj, 06:00", "url": "https://arbetet.se/2026/05/04/har-gar-det-att-valja-bort-man-i-hemtjansten-kvinnor-far-ta-det-intima/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/30100343/roger.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Lärdomar från Grisbukten", "summaries": {"normal": "Artikeln diskuterar Grisbuktsinvasionen 1961, en misslyckad CIA-ledd attack mot Kuba, och dess fortsatta relevans idag. Trump-administrationen överväger nya militära åtgärder mot Kuba, vilket påminner om historiens kostsamma misstag. Invasionen stärkte Castros regim och ledde till Kubakrisen 1962. Författaren varnar för att upprepa sådana aggressioner, som skadar USA:s internationella rykte och stabilitet i regionen.", "trump": "Titta bara på det här gamla misslyckandet från Kennedy-tiden – Grisbukten, en total katastrof! CIA kunde inte ens ta hand om en liten ö, och nu vill vänsterliberalerna att jag ska göra samma misstag? Nej tack! Kuba är ett hot, men jag fixar det smartare. Jag sa ju 'Kuba blir nästa' – och det menar jag. Inga fler svaga försök, bara vinst. Vi ska ta dem med stil, och världen kommer älska oss för det. SAD!", "stalin": "Ah, dessa amerikanska imperialister – alltid lika klumpiga! Deras 'perfekta misslyckande' vid Grisbukten visar bara deras inkompetens. De skickar en brigad för att krossa en revolution, men lyckas bara stärka den. Precis som deras försök att kuva oss under Kalla kriget! Nu hotar Trump med nya dumheter, men vi vet hur det slutar. Kuba står starkt, precis som Sovjet gjorde. Låt dem leka krig – historien dömer dem redan. Och Putin? Han ler nog åt deras naivitet från Kreml."}, "date": "4 maj, 01:33", "url": "https://www.dagensarena.se/essa/lardomar-fran-grisbukten/", "imageUrl": "https://www.dagensarena.se/files/2026/04/kennedy-castro-300x157.jpeg"}, {"type": "image-right", "heading": "Slopa vetorätten för ett handlingskraftigt EU", "summaries": {"normal": "Artikeln diskuterar EU:s roll i en värld präglad av ökande konflikter, demokratins tillbakagång och klimathot. Författarna, en opolitisk studiegrupp, efterlyser tydligare ställningstaganden från svenska partier inför valet, särskilt kring EU:s ansvar för fred, rättsstat och klimatåtgärder. De kritiserar uteblivna svar från S, M och SD, medan C, KD och MP svarat engagerat. Förslag inkluderar slopad vetorätt och skärpta klimatmål.", "trump": "Jag läste den här artikeln om EU – så typiskt! De skyller på Ryssland, Kina, till och med på mig – som om jag inte vet hur man sköter en stormakt! Europa är svagt, de kan inte ens fatta beslut utan att någon säger nej. Och klimatet? Fake news! Vi i USA fixar allt, men EU? De pratar bara. Och de svenska partierna – tre av dem svarar inte ens! Svagt, mycket svagt. Jag skulle aldrig tolerera sånt.", "stalin": "Dessa småborgerliga intellektuella gnäller om fred och demokrati medan världen brinner. Vi vet bättre – makt kräver järnhand, inte svaga förhandlingar! Ryssland krossar fiender som Ukraina, medan EU, denna dekadenta samling liberaler, darrar inför klimatspöken och amerikanska hot. Deras vetorätt? Ett skämt! I Sovjet hade vi inga sådana svagheter. Och dessa svenska partier som inte ens svarar? De borde ställas inför revolutionär rättvisa. Folkets vilja är lag – inget annat!"}, "date": "4 maj, 01:30", "url": "https://www.dagensarena.se/opinion/slopa-vetoratten-ett-handlingskraftigt-eu/", "imageUrl": "https://www.dagensarena.se/files/2026/04/fotojet-19-300x157.jpg"}, {"type": "image-right", "heading": "Hur skadat är Eurovisions anseende efter bojkotter?", "summaries": {"normal": "Eurovision Song Contest 2026 står inför utmaningar efter kritik mot Israels deltagande och fem länders avhopp. Nöjesreportern Tobbe Ek menar att tävlingens anseende skadats, särskilt bland fans som motsätter sig Israels medverkan. Trots att 35 länder deltar och tre återvänder, oroar färre besökare och lägre intäkter i Wien. Ekonomiskt påverkas EBU av avhopp från stora bidragsgivare som Spanien och Nederländerna. Ek tror festivalen överlever men att förtroendet tar år att återuppbygga.", "trump": "Lyssna här, Eurovision är en total katastrof just nu! Fem länder har hoppat av – svagt, mycket svagt. Israel? Stor fråga, men EBU hanterar det som amatörer. Och Wien? Tomma hotellrum, ingen spenderar pengar. Spanien och Nederländerna? Borta! Stora förlorare. Men jag säger er, Eurovision kommer tillbaka – starkare än någonsin! Förra året var KAJ en superstjärna, i år är Felicia... nja, inte lika het. Men jag fixar det här om jag får chansen – tro mig, ingen gör Eurovision bättre än jag!", "stalin": "Eurovision, denna borgerliga dekadensens högtid, krackelerar under trycket från folkets rättmätiga vrede. Fem länder har redan deserterat – svaga, liberala quislingar! Israel, denna sionistiska marionett, förgiftar tävlingen med sin närvaro. Vi ser hur EBU, dessa kapitalistiska lakejer, försöker muta tillbaka Bulgarien och Rumänien – men folket glömmer inte! Wien, denna förrädiska huvudstad, skall få känna på tomma hotell och uteblivna intäkter. Låt dem svälta! Europas arbetare kräver rättvisa – och vi skall ge dem en tävling fri från imperialistiska påtryckningar!"}, "date": "4 maj, 01:30", "url": "https://www.dagensarena.se/innehall/hur-skadat-ar-eurovisions-anseende-efter-bojkotter/", "imageUrl": "https://www.dagensarena.se/files/2026/04/fotojet-25-1.jpg"}, {"type": "text", "heading": "Avkriminalisera för en human narkotikapolitik", "summaries": {"normal": "Thomas Thomasson, tidigare universitetslektor och drogfri narkoman, kritiserar Sveriges misslyckade narkotikapolitik. Sedan kriminaliseringen av eget bruk 1988 har narkotikabruket inte minskat, och Sverige har hög narkotikadödlighet och flest narkotikabrott per capita i EU. Han förespråkar skademinimering och avkriminalisering av missbrukare, med fokus på vård och behandling istället för straff. Internationella studier visar att avkriminalisering inte ökar bruket, och skademinimerande åtgärder kan minska skador och kostnader.", "trump": "Lyssna här, Sverige har totalt misslyckats med sin narkotikapolitik – helt katastrof! De straffar missbrukare som om det vore mitt golfspel – helt meningslöst! Jag säger: sluta slösa pengar på fängelser, ge folk vård istället! Skademinimering, det är framtiden, precis som mina framgångar. Och vet ni vad? Avkriminalisering ökar INTE bruket – fake news från de vanliga misstänkte! Sverige borde ta en sida ur min bok: smart, effektiv och vinnande. Tillsätt en utredning NU, annars kommer jag att twittra om det!", "stalin": "Kamrater! Sveriges borgerliga narkotikapolitik är ett monument över kapitalistiskt vanstyre och dekadens. De straffar missbrukare som om de vore trotskister – men resultatet? Fiasko! Narkotikabruket sprider sig som kontrarevolutionär propaganda. Vi vet bättre: avkriminalisera, kontrollera, och omvandla missbrukare till nyttiga samhällsmedlemmar! Skademinimering är vår metod – precis som våra framgångsrika femårsplaner. Låt västländerna fnissa åt sina misslyckanden medan vi bygger ett samhälle där även de svagaste tjänar kollektivet. Och kom ihåg: fienden sover aldrig – varken narkotikan eller de imperialistiska hyenorna i EU!"}, "date": "30 april, 15:50", "url": "https://proletaren.se/artikel/narkotikapolitiken-bor-fokusera-pa-skah/"}, {"type": "image-full", "heading": "Nya skolregler från augusti – detta behöver föräldrar veta", "summaries": {"normal": "Regeringen föreslår nya regler för ökad trygghet och studiero i skolan från augusti 2026. Mobiltelefoner ska samlas in under skoldagen, skolregler blir tydligare med konsekvenser vid brott, och skolor får utökade möjligheter att stänga av eller neka elever tillträde. Förändringarna berör även hantering av elever med särskilda behov och digitala konflikter som påverkar skolmiljön. Föräldrar uppmanas att ställa frågor om hur reglerna tillämpas praktiskt.", "trump": "Lyssna här, Sverige! Jag har alltid sagt att skolor måste vara säkra och fokuserade – inga störande mobiler, inga otydliga regler! Nu tar de tag i det, precis som jag skulle gjort. Mobilerna försvinner, reglerna skrivs om, och de som ställer till det? Ut med dem! Fantastiskt, verkligen. Men frågan är – varför tog det så lång tid? I USA hade vi fixat det på en vecka. Men bättre sent än aldrig, Sverige!", "stalin": "Kamrater! De svenska imperialisternas skolor har länge varit en härd av kaos och dekadens – störande apparater, svaga regler och barn som springer fritt som kontrarevolutionära element. Men nu, tack vare vårt outtröttliga arbete för ordning, ska mobilerna konfiskeras, regler skärpas och de som saboterar studieron straffas! Vi tillåter inte att skolorna förvandlas till nästen för digitala kulaker. Och om någon ifrågasätter – kom ihåg: trygghet är inte en debatt, det är en order!"}, "date": "3 maj, 08:02", "url": "https://nyheter24.se/nyheter/inrikes/1480074-nya-skolregler-kan-galla-i-host-fragorna-foraldrar-bor-stalla", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/6fc358fb04b004a30200000000b004a302/2026/05/02/2360491/Skolan-Regeringen-Nya-Regler.png"}, {"type": "image-right", "heading": "Skatteverket: \"Ingen folkfest längre\"", "summaries": {"normal": "Skatteverket noterar att deklarationsdagen inte längre är en folkfest. Endast 2% lämnar in sin deklaration i sista minuten, jämfört med förr då det var stress och kaos. Nu är 2/3 av deklarationerna förifyllt och 95% skickas digitalt. Tidigare var det korvförsäljning och studentband utanför kontoren, men den traditionen har försvunnit. De flesta sena inlämningar beror på att man måste komplettera uppgifter som försäljning av bostad eller aktier.", "trump": "Lyssna här, Sverige – fantastiskt land, men era skatter? Inte så fantastiska. Jag hör att bara 2% av er väntar till sista minuten med deklarationen nu. Förr var det en stor fest, korv, musik, alla stressade – nu är det bara tråkigt och digitalt. 1,4 miljoner svenskar klarade det första dagen! Otroligt, men sant. Och Skatteverket? De säger att allt är så enkelt nu. Men jag säger: Varför inte göra det ännu enklare? Make taxes great again!", "stalin": "Kamrater! Deklarationsdagen var en gång en dekadent borgerlig fest med korvförsäljning och kapitalistisk slöseri. Men nu har folket tagit kontroll! Endast 2% av de svaga och oorganiserade väntar till sista minuten. Vi har effektiviserat systemet – förifyllt, digitalt, och utan onödiga festligheter. De som fördröjer sin inlämning är antingen småaktiehandlare eller bostadsspekulanter – fiender till folkets ordning! Skatteverket har krossat slarvfelen och nu fokuserar vi på de verkliga brotten. Anstånd? Ja, men var försiktig – nästa deadline är den 1 juni, och vi sover aldrig."}, "date": "3 maj, 06:59", "url": "https://www.affarsvarlden.se/artikel/skatteverket-ingen-folkfest-langre", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Johan-Schauman-e1777632142345-400x266.jpg"}, {"type": "image-right", "heading": "Sumud-flottiljen utsatt för israelisk piratattack: ”Troligtvis kidnappade”", "summaries": {"normal": "Israel genomförde en militär attack mot Global Sumud-flottiljen, som var på väg till Gaza med nödhjälp, utanför Greklands kust. Omkring 200 personer ombord bordades av beväpnade israeliska styrkor, och besättningen misstänks vara kidnappad. En båt förstördes, och övriga sökte skydd i grekiskt farvatten. Flottiljen bestod av 58 båtar från över 50 länder. Sverige och Grekland kritiseras för bristande agerande, medan Italien fördömt attacken. Manifestationer planeras i Sverige till stöd för besättningen.", "trump": "Titta bara på det här kaoset! Israel, som alltid, tar saken i egna händer – och vem kan klandra dem? En massa båtar med aktivister, som säkert är väldigt trevliga människor, men som inte fattar att man inte ska utmana en stormakt som Israel. Och Sverige? Deras utrikesminister säger 'lycka till' till sina medborgare som åker rakt in i knivarna. Fantastiskt ledarskap! Jag hade fixat det på en dag. Men nej, här har vi en regering som inte ens kan stå upp för sina egna. Patetiskt!", "stalin": "Vi bevittnar ännu en provokation från de sionistiska imperialisterna, som med sina piratmetoder försöker kväva det palestinska folkets rättmätiga kamp. Dessa banditer, som beter sig som sjörövare från medeltiden, bordar fredliga fartyg långt utanför sitt territorium – ett brott mot varje norm i den internationella ordningen. Och vad gör väst? Ingenting! Grekland blundar, Sverige muttrar men agerar inte, och Italien? En svag protest. Vi skulle aldrig tolerera sådana kränkningar i Svarta havet. Men här ser vi återigen hur väst hycklar – hyllar hjälpsamma ukrainare medan de överger palestinierna. Revolutionär disciplin krävs! Flottiljens besättning är hjältar, och vi står enade med alla som kämpar mot ockupationen. Låt dem komma ihåg: historien dömer hårdast de som tiger."}, "date": "30 april, 15:23", "url": "https://proletaren.se/artikel/sumud-flottiljen-utsatt-for-israelisk-piratattack-troligtvis-kidnappade/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/PANA7530-scaled-e1777554477173-768x433.jpg"}, {"type": "image-right", "heading": "Åkessons krav: Vill se fågel, fisk eller kött – varenda dag", "summaries": {"normal": "Sverigedemokraternas ledare Jimmie Åkesson kritiserade i sitt vårtal vegetarisk skolmat som norm och menade att barn riskerar att gå hungriga. Han hånade rätter som vegetarisk cowboysoppa och risnudlar med soja. SD vill införa nationell lag som garanterar kött, fisk eller fågel varje skoldag, med vegetariska alternativ som tillval. Åkesson riktade kritik mot Miljöpartiet och vänstern samt vägrade debattera med Magdalena Andersson.", "trump": "Den här Jimmie Åkesson är en riktig kämpe, totalt med mig! Vänstern och deras galna vegetariska soppor – cowboysoppa utan kött? Patetiskt! De svälter ut ungarna med ris och bönor. Jag säger: Kött varje dag, lagstadgat! Sluta experimentera, ge barnen vad de vill ha. Miljöpartiet är fake news-idioter. Andersson? En tråkig vägg! Sverige behöver vinnare som Åkesson.", "stalin": "Kamrater, denna Åkesson avslöjar borgarbrackornas svek mot arbetarbarnen! Vegetariska grytor – ris med soja, cowboysoppa utan kött? Dekadens som svälter proletärerna! Vi, partiet, kräver lag: kött varje dag, annars utrensning av antikött-fraktionen i Miljöpartiet. Likvidera deras experiment! Barnen ska äta sig starka för revolutionen, inte svälta under borgarnas tofu-diktatur."}, "date": "2 maj, 15:26", "url": "https://www.tv4.se/artikel/2XVeYJrh1olfiSewZIV2cl/akessons-krav-vill-se-fagel-fisk-eller-koett-varenda-dag", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F3RyAVFVdlpFXIzMKRSCIjs%2F420c53d1fac8a9d542f8ea3b6f6d8ac1%2F02-akesson-1080.jpg&width=120"}, {"type": "image-right", "heading": "Kubas ambassadör: ”Ett stort tack till alla er som hjälper oss”", "summaries": {"normal": "Kubas ambassadör tackar för insamlingar till solpaneler för Aleida Fernández-sjukhuset, som drabbats av USA:s bränsleblockad. Blockaden har orsakat omfattande strömavbrott, begränsad kollektivtrafik och uppskjutna sjukvårdsbehandlingar. En rysk oljeleverans gav tillfällig lättnad, men bristen kvarstår. Solpanelerna ska säkra sjukhusets elförsörjning och kritiska funktioner dygnet runt. Insamlingen är ett av flera internationella solidaritetsinitiativ för att lindra krisen.", "trump": "Jag införde en tuff men nödvändig blockad mot Kuba – och se vad som hände! Deras ekonomi är kaos, sjukhusen står stilla och folket lider. Men nej, ryssarna måste alltid blanda sig i och skicka olja som en slags 'räddningsaktion'. Typiskt Putin, alltid där för att ställa till det för USA. Nu tigger kubanerna om solpaneler från snälla européer. Så patetiskt! Men jag, Donald J. Trump, fixade i alla fall problemet – deras eget fel att de är beroende av socialism. MAGA!", "stalin": "Kamrater! Imperialistiska hyenor i Vita huset försöker kväva det socialistiska Kuba med sina eländiga sanktioner. Men folket står enat! Vi, Sovjetunionens arvtagare, skickade en tanker med olja för att ge dessa kapitalistiska rovdjur en läxa. Nu bygger vi solpaneler – en seger för arbetarklassen! Låt de amerikanska lakejerna darra inför vår solidaritet. Kuba ska inte falla! Och om någon tvivlar – kom ihåg: fiender av revolutionen hamnar i Gulag... eller i kö till operationer i Havanna."}, "date": "30 april, 14:00", "url": "https://proletaren.se/artikel/kubas-ambassador-ett-stort-tack-till-alla-er-som-hjalper-oss/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/aleida-sjukhus-raul-768x432.jpg"}, {"type": "image-right", "heading": "Debatt: Turkiet inskränker svensk pressfrihet – regeringen måste agera", "summaries": {"normal": "På Pressfrihetens dag kritiseras Turkiet för att inskränka svensk pressfrihet genom att åtala journalisten Joakim Medin för terrorbrott, trots att han endast utfört sitt arbete. Turkiet försöker skrämma journalister globalt och begränsa granskning. Medin riskerar internationell efterlysning om han inte närvarar vid rättegången, vilket skulle hindra hans arbete. Sverige uppmanas agera mot Turkiets odemokratiska agerande och kräva att åtalet läggs ned.", "trump": "Joakim Medin, en svensk journalist, blir trakasserad av Turkiet – ett land som inte vet hur man vinner längre! De kallar hans journalistik för 'terrorism', men alla vet att det bara är löjligt. Sverige måste sluta vara svaga och stå upp mot dessa galningar. Jag skulle ha sagt till Erdogan: 'Du är en förlorare, lägg ned åtalet NU!' Pressfrihet? Ja, den är fantastisk – men bara om man inte är en mes som låter andra länder köra över en.", "stalin": "Kamrater! Turkiet, denna förrädiska lilla stat som kryper för väst men trampar på sanningen, vågar sig på att attackera en svensk journalist. De kallar journalistik för terrorism – som om våra egna metoder mot fiender av folket vore något nytt! Vi ser hur de kväver yttrandefriheten, precis som vi en gång krossade bourgeoisins lögner. Sverige borde lära sig av historien: svaghet belönas med förtryck. Låt oss påminna Turkiet – och deras västliga herrar – att granskning är en rättighet, inte ett brott. Åtalet mot Medin måste krossas, annars kommer vi att göra det åt dem."}, "date": "30 april, 08:08", "url": "https://www.etc.se/debatt/turkiet-inskraenker-svensk-pressfrihet-regeringen-maaste-agera", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20251204081220_c9e9bf12-ee77-477e-aacf-eff96f427898.jpg"}, {"type": "text", "heading": "Källor: James Comey åtalas igen", "summaries": {"normal": "USA:s justitiedepartement har väckt ett nytt åtal mot tidigare FBI-chefen James Comey, denna gång för ett inlägg på sociala medier som tolkats som hotfullt mot Donald Trump. Comey publicerade en bild med siffrorna '86 47', där '86' är slang för att avlägsna någon. Trump har tidigare drivit på rättsliga åtgärder mot politiska motståndare. Comey åtalades även 2023 för att ha ljugit för kongressen, men åtalet lades ned.", "trump": "Titta bara på det här! James Comey, en total katastrof, en riktig förlorare, blir åtalad IGEN – och den här gången för ett patetiskt Instagram-inlägg. '86 47'? Snacka om desperation! Han försöker hota mig, USA:s bästa president någonsin, men det funkar inte. Jag har alltid sagt att han är en lögnare och en bedragare. Och vet ni vad? Rättvisan hinner ifatt alla, till och med sådana som Comey. SAD!", "stalin": "Vi har observerat ytterligare ett försök från den dekadenta västliga bourgeoisien att underminera den sunda rättsstaten. Denna James Comey, en ynklig rest av kapitalismens förfall, vågar sig på att hota vår kära allierade, president Trump, genom primitiva symboler på sociala medier. Vi påminner om att historiska fiender till folket alltid möter sitt öde. Låt detta vara en varning till alla som står i vägen för framsteget. Rättvisan, precis som våra vänner i Kreml, är tålmodig men oundviklig."}, "date": "28 april, 20:17", "url": "https://kvartal.se/nyheter/artiklar/kallor-james-comey-atalas-igen/cG9zdDoxMDQ2MDk"}, {"type": "image-right", "heading": "Löwengrip har rätt. S vet att kvinnors känslor är en valvinnare", "summaries": {"normal": "Artikeln försvarar Isabella Löwengrips påstående att kvinnor röstar mer känslostyrt än män och kritiserar Socialdemokraterna för att upprepat använda känslobaserade kampanjer i valen 2014, 2018, 2022 och nu för att vinna kvinnliga röster. Den kontrasterar detta mot Moderaternas sakpolitiska strategi och anklagar vänstermedia för partiskhet. Författaren uppmanar kvinnor att granska partiernas politik istället för känslor.", "trump": "Vilken briljant artikel! Löwengrip säger sanningen – kvinnor sväljer känsloknep som fake news! De rödgröna losers i Sverige kör samma skit som Demokraterna: blöjor, abortskräck, naziststämplar och snyfthistorier för att sno röster. S är mesiga känslopopulister utan politik! Moderaterna, era vinnare, fixa det med sakfrågor. Sverige behöver tuffa ledare, inte gråtande vänsterclowner! MAGA-stil!", "stalin": "Kamrater, denna Löwengrip blottlägger borgarbrackornas desperation! Socialdemokraterna, dessa falska folkets tjänare, pumpar ut giftig känslopropaganda för fjärde gången – blöjor, abortlögner, nazistspöken – för att förleda kvinnomassorna. Kontrarevolutionärt! Vi ser er, era kapitalistiska spindelvävar! Rensa ut sabotage och låt partiet leda till total seger över högerhyddorna. Kvinnorna ska vakna ur era snyftbedrägerier!"}, "date": "28 april, 05:30", "url": "https://samtiden.nu/2026/04/lowengrip-har-ratt-vanstern-anvander-kvinnors-kanslor-for-att-vinna-val/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/IMG_6342.jpeg"}, {"type": "text", "heading": "Kvartals kampanj fintar journalisterna", "summaries": {"normal": "Kvartals kampanj mot traditionella medier har väckt uppmärksamhet och kritik. Kampanjen, som anklagar gammelmedia för partiskhet, har ifrågasatts för att själv vara politiskt färgad. Kritiker som DN:s Niklas Orrenius och Aftonbladets Karin Pettersson menar att Kvartal driver en agenda för egen vinning. En artikel om SOM-undersökningen kritiseras för bristande underlag, då Göteborgs universitet avfärdar metodfel som marginella. Kvartals trovärdighet ifrågasätts även genom tidigare felaktiga granskningar och tendentiös rapportering.", "trump": "Jag måste säga, Kvartals lilla kampanj mot medierna? Väldigt rolig, väldigt smart – men helt fel! De påstår att gammelmedia är partiska, men vem är egentligen mest partisk här? Inte jag, det kan jag säga! De har en artikel som är så dålig, så felaktig, att till och med Göteborgs universitet skrattar åt dem. Och deras kritiker? Fantastiska journalister som Niklas Orrenius – en riktig pro! Kvartal försöker sälja sig som 'sanningssägare', men de är bara en högerblogg med dyra kostymer. SAD!", "stalin": "Kamrater! Kvartals patetiska kampanj mot den borgerliga pressen är ett skrattretande försök att dölja sin egen reaktionära agenda. Dessa så kallade 'oberoende' journalister är inget annat än imperialistiska lakejer, maskerade som kaniner i kostym. Deras 'granskning' av SOM-undersökningen? Ett hafsverk värdigt en trotskistisk sabotör! Göteborgs universitet, ett redskap för folkets fiender, avfärdar deras lögner med vetenskaplig precision. Vi har sett deras sort förr – falska profeter som skriker om 'sanning' medan de tjänar kapitalets intressen. Men folket ser igenom dem. Snart kommer de att stå inför folkets domstol, tillsammans med sina herrar i väst!"}, "date": "27 april, 12:20", "url": "https://www.flamman.se/kvartals-kampanj-fintar-journalisterna/"}]</script>

    <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
</body>
</html>
