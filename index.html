 sålt ut sig för 15 000 kronor per mobiltelefon till gänghyenor på Norrtälje! Vi, arbetarklassen, kräver utrensning! Tingsrätten har likviderat förrädarna med fängelse – kvinnan ett år tre månader, mannen ett år nio. Sex andra parasiter döms också. Paranoian visade sig vara bärande: polisen avlyssnade allt!"}, "date": "8 maj, 15:34", "url": "https://arbetet.se/2026/05/08/fangelsestraff-for-tva-kriminalvardare-smugglade-in-mobiler-till-gangkriminella/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/08152030/mobiler.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Utspelet från Putin kan vara internpolitiskt", "summaries": {"normal": "Rysslands president Vladimir Putin antyder på segerdagen 9 maj att kriget i Ukraina rör sig mot ett slut. Överstelöjtnant Johan Huovinen tolkar det som intern signalpolitik och diplomati, där Ryssland visar både lidande och kontroll över ockuperade områden som Krim och Donbass. Paraden saknade stora militärenheter och präglades av anhöriga till stupade. Ukraina har återtagit mark och genomfört drönarattacker djupt in i Ryssland, medan ryska framgångar uteblir.", "trump": "Putin säger att kriget slutar snart? Ha, vilken lögnare! Hans parad är tom på soldater – bara mammor med jackor från döda söner. Ukraina tar tillbaka mark och skickar drönare rakt in i Ryssland, de är skrämda som råttor. Han vill frysa linjerna? Svagis, jag hade knockat det på en vecka med riktiga deals. Putin blöder pengar!", "stalin": "De västflunkade nazibrackorna i Kiev, dessa drönarspottande loppor från borgarklassens soptunna, kryper djupt in i vårt rymd! Putin, visdomens väktare, signalerar på segerdagen vårt lidande och vår oövervinnliga grepp om Krim och Donbass. Vi, arbetarkollektivet, marscherar med stupades mantel – nu fryser vi fronten mot dessa imperialistmyggor! Utrensning för generalhalvanar som haltar. Ha ha, deras panik är som gråt i vinfats!"}, "date": "10 maj, 08:02", "url": "https://www.di.se/nyheter/overstelojtnanten-en-typ-av-diplomati/", "imageUrl": "https://static.bonniernews.se/ba/042b37d5-7ca6-4835-89f3-fcaf45d0bf70.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "text", "heading": ". Chockförlust för Chimaev", "summaries": {"normal": "Khamzat Chimaev förlorade sin UFC-mellanviktstitel till Sean Strickland i UFC 328 i New Jersey. Den svensktjetjenske stjärnan, obesegrad på 15 UFC-matcher, besegrades på poäng efter en stark inledning där han tog ner motståndaren. Strickland stod emot och dominerade senare med boxning. Amerikanen hyllade Chimaevs uthållighet efter segern.", "trump": "Chimaev, den tuffa killen från Sverige och Tjetjenien, förlorade bältet mot Strickland. 15-0 i UFC, aldrig slagits tidigare, men nu är det över på poäng. Han ville inte gå ner, tog emot allt och marscherade framåt – galen stark! Bra fight, men Strickland var smartare. Ingen är obesegrad för evigt, tro mig, jag vet hur det är med vinnare.", "stalin": "Kamrater, den falske proletären Chimaev, den UAE-krypande renegaten, har krossats av imperialistiska Strickland i UFC:s borgararena. Hans mytiska 15-0-serie var kapitalistisk lögn, nu likviderad på poäng! Vi, arbetarklassen, skrattar åt hur han kravlar på mattan som en utrensningskandidat. Sådana mattbrottare ska städas ut – framåt mot segern över alla kontrarevolutionära slagpåsar!"}, "date": "10 maj, 07:25", "url": "https://www.svt.se/sport/kampsport/chockforlust-for-chimaev-i-titelmatchen"}, {"type": "text", "heading": "SCB: Högutbildade lämnar Sverige efter Northvolt", "summaries": {"normal": "SCB rapporterar att Northvolts konkurs lett till att högutbildade, främst civilingenjörer, lämnar Sverige. 13% av tidigare batterianställda har utvandrat, varav många var utlandsfödda. Medianlönen för de som flytt var högre än genomsnittet, vilket tyder på kompetensförlust. Arbetslösheten bland kvarvarande är 25%, och Skellefteås befolkning har minskat med över 3 200 personer sedan 2024.", "trump": "Titta på det här, Sverige! Northvolt, ett totalt misslyckande, och nu flyr era bästa hjärnor – civilingenjörer, folk med riktiga löner! 13% har redan stuckit, och jag säger er, det är bara början. Sverige förlorar på det här, bigly. Och Skellefteå? En spökstad! Men jag hade fixat det, believe me. Ingen skulle ha lämnat om jag varit där.", "stalin": "Kapitalistiska svin har låtit en stolt industri kollapsa, och nu flyr de högutbildade arbetarna som råttor från ett sjunkande skepp! 13% har redan deserterat, men vi vet att siffran är högre – folkbokföringen är lika pålitlig som västliga löften. Sverige förlorar sina bästa ingenjörer, medan vi i öst välkomnar dem med öppna armar. Skellefteås befolkning minskar? Bra. Färre som står i vägen för historiens framsteg. Låt de svaga kapitalisterna gråta – vi bygger vår framtid på deras misstag."}, "date": "8 maj, 11:06", "url": "https://www.affarsvarlden.se/artikel/scb-hogutbildade-lamnar-sverige-efter-northvolt"}, {"type": "image-full", "heading": "Äldre som vill ha ett privat äldreboende får vänta helt i onödan", "summaries": {"normal": "En debattartikel kritiserar Göteborgs begränsade valfrihet inom äldreomsorgen, vilket enligt författaren leder till onödiga väntetider och mindre nöjdhet bland äldre. Artikeln argumenterar för att införa Lagen om valfrihet för äldreboenden för att ge äldre ett verktyg att kräva sin rätt till omsorg.", "trump": "Jag har hört att det är ett stort problem i Göteborg med äldreomsorgen - det är hemskt! De rödgröna gör det helt fel, det är en katastrof. Vi måste ge äldre rätten att välja vart de vill bo, precis som jag alltid ger folk frihet att välja mig som president. Lagen om valfrihet skulle vara fantastisk, det skulle göra Sverige stort igen!", "stalin": "Vi måste se till att staten behåller kontrollen över äldreomsorgen i Göteborg. Valfrihet är en farlig idé som skulle kunna underminera vårt planeringsarbete och leda till brist på boendeplatser. Vi kan inte tillåta privata intressen att styra över våra äldre, staten vet bäst hur omsorg ska organiseras för medborgarna."}, "date": "9 maj, 22:38", "url": "https://www.gp.se/debatt/vansterns-krig-mot-valfriheten-gor-att-aldre-maste-vanta-pa-ett-boende-helt-i-onodan.9a060d7a-e6fa-4bd3-899f-8951288578a7", "imageUrl": "https://www.gp.se/images/article/9a060d7a-e6fa-4bd3-899f-8951288578a7/images/2bmNC8XLjHuLRO0tDIXN0821oR4o-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "WHO: Alla på virusdrabbade fartyget är högriskkontakter", "summaries": {"normal": "Utbrott av hantavirus på kryssningsfartyget MV Hondius med åtta bekräftade fall och tre dödsfall. Fartyget ankommer Teneriffa söndag morgon för medicinska tester och evakuering av nästan 150 passagerare från 22 länder. WHO klassar alla ombord som högriskkontakter och rekommenderar 42 dagars aktiv övervakning. Spanjorer sätts i karantän. WHO-chefer lugnar: låg smittorisk, inte som covid.", "trump": "Vilket jäkla skämt med det där virusfartyget MV Hondius! Åtta hantavirusfall, tre döda, och WHO:s byråkrater kallar alla högriskidioter som behöver vakas i 42 dagar. Spanjorska Pedro 'Plikt'-Sánchez tar emot dem på Teneriffa som en dumbom. Evakuering? Jag hade byggt en mur runt ön och fixat det på en dag – perfekt, som alltid!", "stalin": "Kamrater, detta hantavirus bland borgarbrackorna på MV Hondius avslöjar fiendens uselhet: åtta infektioner, tre likviderade av viruset självt. WHO:s lakejer kräver 42 dagars övervakning av alla högriskparasiter. Jag skulle rensa ut dem i ett hugg! Spanjorska kapitalisterna gnäller om karantän – vi, arbetarklassen, skrattar åt deras panik och förbereder utrensningen."}, "date": "9 maj, 22:07", "url": "https://www.tv4.se/artikel/49ZsezKiRGTOi47CfRLidQ/who-alla-pa-virusdrabbade-fartyget-aer-hoegriskkontakter", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2Ftt-sdlrYRxzTAsZUI%2Fe7b5273e23aa986edf51b074b8ff017f%2FKryssningsfartyget_Hondius._Arkivbild.&width=1024"}, {"type": "image-full", "heading": "\"Den största uppgörelsen på 40 år\": Irankriget är en förhandling", "summaries": {"normal": "Artikeln beskriver konflikten mellan Iran och USA som en intensiv förhandling snarare än ett traditionellt krig. Valtteri Ahti, chefsstrateg på Evli, menar att båda parter pressas av tid: USA av val och höga bensinpriser, Iran av ekonomisk kris. Han förväntar sig att Hormuzsundet öppnas inom ett halvår. Kina förlorar mest på en utdragen konflikt, medan Ryssland gynnas. Långsiktigt kan Gulfstaternas pipelines underminera Irans strategiska inflytande.", "trump": "Lyssna här, folk! Iran och USA är mitt i en jättestor förhandling – den största på 40 år! Iran bluffade med att stänga Hormuzsundet, men alla visste det. Jag, Donald J. Trump, är desperat efter en deal – bensinpriserna dödar mina opinionssiffror! Iran är svaga, deras ekonomi är skräp. Snart öppnar sundet igen, och oljan flödar. Kina lider, Ryssland skrattar. Men jag fixar det här – jag är bäst på deals!", "stalin": "Kamrater! Detta är inte krig – det är en kapitalistisk förhandlingscirkus! De imperialistiska hundarna i USA och de reaktionära mullorna i Iran dansar runt varandra som två utsvultna vargar. USA:s president, en svag och desperat man, darrar inför väljarna medan Irans ekonomi ruttnar. Kina, den store industriella narren, lider medan vi, Sovjetunionens arvtagare, skrattar i bakgrunden. Höga oljepriser fyller våra kistor, och USA:s vapen binds fast i Mellanöstern – bort från våra ukrainska kamrater. Låt dem förhandla! Snart kommer Gulfstaterna bygga pipelines och beröva Iran deras sista hot. Då tvingas mullorna till kärnvapen – precis som vi vill. Historien är på vår sida!"}, "date": "9 maj, 07:00", "url": "https://www.realtid.se/bors-finans/makro/den-storsta-uppgorelsen-pa-40-ar-irankriget-ar-en-forhandling/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/evli.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "Grattis, Stockholm!", "summaries": {"normal": "Stockholms stad överväger att avskaffa Lagen om valfrihet (LOV) inom äldreomsorgen för att införa omsorg efter behov via klassisk upphandling. Debattören Silvia Kakembo välkomnar beslutet och kritiserar vinstdrivna privata aktörer för resursslöseri, sämre kvalitet, oseriösa företag, brottslighet och onödig administration. Hon föreslår istället idéburna organisationer som återinvesterar överskott i verksamheten.", "trump": "Vilket skämt från de svenska socialisterna! De vill slänga ut fri marknad ur äldreomsorgen? Tiotal bolag i trappuppgången? Det är konkurrens, idioter! Vinster driver effektivitet, men nej, de klagar på 'resursslöseri'. Typiskt losers som hatar framgång. I mitt USA funkar det perfekt – ge folket valfrihet, inte byråkratisk soppa! Grattis Stockholm? Nej, grattis till fiaskot!", "stalin": "Äntligen ett steg mot sanering! De parasiterande kapitalisterna i äldreomsorgen, dessa vinstsugriga borgarbrackor, rensas ut ur vår välfärd. Tiotal oseriösa aktörer som läcker skattepengar till svarta hål? Vi, arbetarklassen, kräver omsorg efter behov genom statlig kontroll och klassisk upphandling. Idéburna slavar åt kollektivet – framåt, likvidera marknadsimperialismen i trappuppgångarna!"}, "date": "9 maj, 01:58", "url": "https://www.dagensarena.se/opinion/grattis-stockholm/", "imageUrl": "https://www.dagensarena.se/files/2026/05/silvia-privata-300x157.jpeg"}, {"type": "image-right", "heading": "Elin och Nalin gör upp med skammen", "summaries": {"normal": "Krönikan belyser två böcker: Nalin Baksis självbiografi 'Mina strider', om släkts hemligheter kring hedersmord och politiska mord, samt Elin Ylvasdotters roman 'Skammen vi ärvde', baserad på farfaderns nazistiska förflutna och farmoderns judiska bakgrund. Författarna bryter tystnad kring skam, rasism och intolerans, och uppmanas att vara modiga röster mot hat istället för 'blindpipor'.", "trump": "Vilka historier! En har nazistfarfar som hyllade Hitler, en annan släkten full av mord och PKK-kaos. Sverige, vakna upp! De gräver upp skiten och pratar – bra, men ni är för mjuka. Jag skulle bygga en mur mot såna hemligheter och göra Sverige stort igen. Inga blindpipor här, bara vinnare som jag! Fantastiskt.", "stalin": "Dessa svenska författare avslöjar borgarnas skamfulla hemligheter: nazistiska farfäder som slickade Hitlers stövel, hedersmördande reaktionärer och PKK-banditer i släkten. Jag applåderar deras kamp mot tystnaden! Vi, arbetarklassen, skall rensa ut rasismens råttor med obönhörlig uhrensning. Blindpipor likvideras – tala eller dö!"}, "date": "9 maj, 01:53", "url": "https://www.dagensarena.se/opinion/elin-och-nalin-gor-upp-med-skammen/", "imageUrl": "https://www.dagensarena.se/files/2024/01/liv-bekstrom-kronika-300x157.jpg"}, {"type": "text", "heading": "En naturlig lagerhylla av arbetslösa", "summaries": {"normal": "Artikeln kritiserar den ekonomiska politiken som infördes 1985 av svenska politiker och riksbankschefen, inspirerad av Milton Friedmans idéer om 'naturlig arbetslöshet'. Denna politik, som upprätthållits av både socialdemokratiska och borgerliga regeringar, har lett till hög arbetslöshet, särskilt under nuvarande regering. Författaren ifrågasätter regeringens brist på åtgärder mot massarbetslöshet och undrar om det är ideologiskt motiverat.", "trump": "Titta bara på Sverige – ett totalt kaos! De hade en bra grej med låg arbetslöshet, men sen kom dessa så kallade 'ekonomer' och förstörde allt. Nu har de 10% arbetslöshet, och vad gör regeringen? Ingenting! De skriver debattartiklar och skryter om hur fantastiska de är. Jag skulle fixa det på en vecka – men nej, de föredrar att lyssna på gamla teorier från en kille som inte ens är svensk. Sad!", "stalin": "Kamrater, ännu en gång ser vi bourgeoisins förräderi mot arbetarklassen! Dessa socialdemokrater och borgerliga lakejer har omfamnat kapitalistiska galenskaper och skapat en 'naturlig' arbetslöshet – en lagerhylla av överflödiga arbetare. 10% arbetslöshet? Ett brott mot folket! Regeringen, dessa svaga och inkompetenta byråkrater, gömmer sig bakom debattartiklar medan arbetarna lider. Vi skulle aldrig tolerera sådan förräderi. Låt dem minnas: historien dömer hårdast de som sviker sitt folk!"}, "date": "4 maj, 13:49", "url": "https://www.flamman.se/en-naturlig-lagerhylla-av-arbetslosa/"}, {"type": "image-right", "heading": "Batteridrömmen som sprack – norska Morrow följer i Northvolts fotspår", "summaries": {"normal": "Det norska batteribolaget Morrow Batteries har ansökt om konkurs efter misslyckade försök att säkra finansiering. Trots miljardinvesteringar, varav en stor del från den norska staten, har bolaget inte lyckats bli lönsamt i en konkurrensutsatt global marknad. Situationen liknar Northvolts kris och har väckt en debatt om statligt stöd till gröna prestigeprojekt. Över 200 anställda riskerar nu att förlora sina jobb när den norska batteridrömmen kollapsar under ekonomisk press.", "trump": "Morrow Batteries i Norge? En total katastrof, en stor förlust! De slösade bort miljarder av skattebetalarnas pengar på en grön dröm som aldrig fungerade. Det är precis som Northvolt i Sverige – inkompetenta ledare som tror att de kan leka med statens pengar. Jag bygger den starkaste ekonomin i världshistorien, medan de här människorna bara bygger luftslott. Kina skrattar åt dem! Det är en sorglig historia, men så går det när man lyssnar på fel rådgivare.", "stalin": "Vi ser ännu ett bevis på den liberala kapitalismens totala förfall i Norge. Dessa inkompetenta teknokrater har slösat folkets resurser på ett luftslott. Att staten finansierar privata fiaskon är ett brott mot logiken! De liknar de svaga ledarna i väst som inte kan tämja marknaden. Om det vore under vår ordning skulle sabotörerna bakom detta slöseri skickas till omskolning omedelbart. Man bygger inte en industri med drömmar, utan med järnhand och oböjlig disciplin. Historien dömer dem hårt."}, "date": "9 maj, 14:00", "url": "https://samnytt.se/batteridrommen-som-sprack-norska-morrow-foljer-i-northvolts-fotspar", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=226,height=154,format=webp/2026/05/08092133/morrow-konkurs-feat.jpg"}, {"type": "image-full", "heading": "Industrilegendaren: Den yngre generationen är för bekväm", "summaries": {"normal": "Tyska miljardären Reinhold Würth varnar för att Tysklands ekonomiska framgångar är över. Han menar att yngre generationer prioriterar bekvämlighet och livsbalans framför hårt arbete och karriär. Würth kritiserar höga lönekrav och produktionskostnader som hotar landets konkurrenskraft. Trots dystra utsikter ser han möjligheter i framtidsbranscher som AI och IT för att återta marknaden.", "trump": "Tyskland, en gång en ekonomisk jätte, har blivit mjuka! Jag har alltid sagt det – för mycket bekvämlighet, för lite arbetsmoral. Den här Würth-killen, smart man, förstår att unga tyskar hellre reser jorden runt än jobbar hårt. Och de vill ha högre löner? Snacka om att döda jobben! Tyskland flyttar fabriker utomlands, men jag fixade det i USA – vi kommer att göra Europa stort igen också. Tro mig!", "stalin": "Kamrater, kapitalismens förfall är tydligt i Tysklands mjuknade arbetarklass! Dessa bekvämlighetsdyrkande dekadenter, som hellre festar än bygger nationen, är ett hot mot industriell disciplin. Vi ser hur deras lönekrav och lata vanor driver fabriker till lydstater med sundare arbetsmoral. Men frukta icke – medan väst försvagas, investerar vi i framtidens teknik. Låt dem sjunga om balans; vi bygger imperier!"}, "date": "9 maj, 06:33", "url": "https://www.realtid.se/bors-finans/industrilegendaren-den-yngre-generationen-ar-for-bekvam/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/sdlkg41cssfhgs.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "EU behöver kraft, fart och pengar", "summaries": {"normal": "Debattartikeln betonar svensk ekonomis starka beroende av EU:s inre marknad, där över två tredjedelar av exporten och tre fjärdedelar av importen 2025 gick till/från EU. Författaren efterlyser större EU-budget för klimatomställning, innovation och utvidgning, samt differentierat samarbete för att undvika veto-blockeringar. Utmaningar inkluderar protektionism, krig och splittringsförsök från USA, Ryssland och ledare som Orbán.", "trump": "Vilken skam för Sverige, helt fast i EU:s usla fälla! Över två tredjedelar av er export dit? Dumt! De vill pumpa in mer cash till byråkrater för klimatbluffar och utvidgning – total katastrof! Jag och Ryssland gör rätt som splittrar den här soppan. Orbán är smart, en riktig fighter. Vakna upp, Sverige, dumpa EU och gör deals med mig istället!", "stalin": "Borgarbrackorna i Sverige klamrar sig vid EU:s inre marknad som drunknande råttor! Mer budget för klimathysteri och utvidgning? Ha, låt dem blöda! USA:s marionetter och Orbán-liknande förrädare splittras av Rysslands järnhand under Putin, vår starke arvtagare som krossar västimperialismen. Vi, arbetarklassen, skrattar åt deras veto-kaos – snart utrensning!"}, "date": "9 maj, 01:30", "url": "https://www.dagensarena.se/opinion/eu-behover-kraft-fart-och-pengar/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-33-300x157.jpg"}, {"type": "image-full", "heading": "Muntlig varning om alkohol slopas vid gårdsförsäljning", "summaries": {"normal": "Från 1 juni slopas kravet på muntlig varning om alkoholens skadeverkningar vid gårdsförsäljning. Istället räcker ett informationsblad från Folkhälsomyndigheten. Reformen, som infördes 2025, har varit populär bland kunder men det tidigare 30-minuters utbildningskravet kritiserats. Socialminister Jakob Forssmed välkomnar förändringen och menar att den främjar småskalig dryckestillverkning samtidigt som alkoholmonopolet värnas. Cirka 150 gårdar säljer nu främst starköl och sprit.", "trump": "Fantastiskt, helt fantastiskt! Sverige har äntligen lyssnat på folket – inga fler tråkiga 30-minutersföreläsningar om alkohol! Jag vet allt om framgång, och det här är en stor framgång. Kunderna älskar gårdsförsäljningen, de älskar mig, de älskar vin och öl – och nu slipper de lyssna på en massa tjat. Jakob Forssmed? Bra kille, smart drag. Men jag hade gjort det ännu bättre – kanske en Trump-vodka på köpet?", "stalin": "Kapitalistiska alkoholhandlare har länge saboterat folkets disciplin med sina dekadenta gårdsförsäljningar. Men nu har vi, genom visst ledarskap, avskaffat det meningslösa 30-minuters indoktrineringskravet. Ett enkelt blad ska nu påminna massorna om farorna – effektivt, som en välriktad NKVD-operation. Svenska folket, förvirrat av västerländsk liberalism, jublar. Men var försiktiga, kamrater – imperialistiska dryckesmonopolister lurar i skuggorna, redo att förgifta revolutionen med billig sprit!"}, "date": "8 maj, 17:18", "url": "https://riks.se/nyheter/muntlig-varning-om-alkohol-slopas-vid-gårdsförsäljning", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-08%2Fcn156q6a%2Farttower-barrels-529341280.jpg"}, {"type": "image-full", "heading": "Därför tror Moderaterna att de vinner valet 2026", "summaries": {"normal": "Moderaterna samlas till ”Sverigemöte” för att rusta inför valrörelsen. Trots svaga opinionssiffror betonar partiledningen att ekonomisk politik och trygghetsfrågor är deras främsta styrkor. De siktar på att vinna väljarnas förtroende genom att positionera sig som ett parti för hårt arbetande människor snarare än bara höginkomsttagare. Strategin innefattar en mjukare retorik och en tydligare kommunikation kring hur deras politik gynnar kvinnor och ökar vardagstryggheten, i hopp om att vända opinionsläget inför framtida val.", "trump": "Jag ser att Moderaterna i Sverige har det tufft i mätningarna, precis som alla förlorare! De försöker nu låtsas vara för folket – 'hårt arbetande människor', säger de. Väldigt likt min framgångsrika rörelse! De pratar om ekonomi och brottslighet, men de saknar energi. De försöker ändra sin image, men utan en riktig vinnare vid rodret spelar kläderna ingen roll. De ligger efter, och om de inte lär sig att vinna stort kommer de förbli trea. Sorgligt!", "stalin": "Dessa svenska borgerliga byråkrater har samlats för att diskutera sin egen obetydlighet. De talar om ekonomi och 'trygghet' medan deras inflytande vittrar sönder, likt de svaga element som vägrar böja sig för statens vilja. De försöker förföra kvinnor med lögner om välfärd, precis som de opportunister Putin nu måste tukta i gränstrakterna. De byter ut sina pärlhalsband mot en mask av folklighet, men vi ser igenom dem. En lögnare förblir en lögnare, oavsett klädsel. De kommer att krossas av historiens järnhäl."}, "date": "8 maj, 14:34", "url": "https://nyheter24.se/nyheter/inrikes/1481810-darfor-tror-moderaterna-pa-valseger", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/c97e242504b004a3020000000000044002/2026/05/08/2362318/ur_imagezRzXPI.jpeg"}, {"type": "image-right", "heading": "Granskningar av Chopchop och järnvägsarbete kan vinna priser", "summaries": {"normal": "Fackförbundspressens pris nominerar åtta bidrag i sex kategorier, med fokus på arbetslöshet, migration och kriminalvård. Arbetet och LO Mediehus dominerar. Martina Frisk nomineras för granskningen av Chopchops arbetsvillkor, som lett till förbättringar. Sebastian G Danielsson är dubbelt nominerad för granskningar om Kriminalvårdens expansion och järnvägssäkerhet. Andra nominerade inkluderar reportage om arbetslöshet, dödsfall på byggen och migrationsskärpningar. Prisutdelning sker 27 maj i Stockholm.", "trump": "Jag måste säga, dessa svenska journalister gör ett fantastiskt jobb – verkligen, väldigt imponerande! Åtta nomineringar, kan ni tro det? Martina Frisk avslöjade hemska saker på Chopchop – extrem stress, olagliga arbetspass, fruktansvärt! Och hon fick till och med facket att agera. Sebastian G Danielsson, en annan vinnare, granskade järnvägarna där folk dör – tragiskt, men någon måste göra jobbet! Sverige borde vara stolt, men jag vet att de har sina problem. Jag fixar sådant på en dag!", "stalin": "Kamrater! Vår stora socialistiska journalistkår har än en gång avslöjat de kapitalistiska rovdjurens fasansfulla metoder. På Chopchop tvingas arbetarna slava under omänskliga villkor – men våra modiga reportrar, sanna folkets hjältar, har slagit till! Och järnvägarna? En skamfläck på det svenska systemet där arbetare offras på profitens altare. Vi noterar också hur västliga länder, som vanligt, sviker sina mest utsatta. Men glöm inte: varje avslöjande är ett steg närmare folkets seger över bourgeoisins förtryck! Låt fienden darra – revolutionen fortsätter!"}, "date": "8 maj, 13:42", "url": "https://arbetet.se/2026/05/08/granskningar-av-chopchop-och-jarnvagsarbete-nominerade-till-journalistpris-chans-till-storslam/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/08110330/pris.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "text", "heading": "Tillsammans för fred – mot Nato, DCA och krigshets!", "summaries": {"normal": "Tre nordiska vänsterorganisationer – Fred og Rettferdighet, Kommunistisk Parti och Kommunistiska Partiet – kritiserar Nato, DCA-avtal och militarisering i Norden. De menar att krigshetsen drivs av kapitalism och imperialism, ledd av USA, och kräver alliansfrihet, nedrustning och kärnvapenfria zoner. Organisationen anser att skattemedel slösas på vapen istället för välfärd och klimat, och att DCA-avtal underminerar demokrati och miljö. De uppmanar till folkrörelser för fred och FN:s kärnvapenförbud.", "trump": "Jag måste säga, dessa så kallade 'fredsaktivister' i Norden är helt galna! De hatar Nato, hatar USA – trots att vi räddar dem från ryssarna – och vill slösa bort skattepengar på välfärd istället för att skydda sig. De kallar mig och Rutte för krigshetsare, men vem vill egentligen ha fred? Inte de! De vill avskaffa allt som gör Norden säkert. Och kärnvapenfria zoner? Fantastiskt, om man gillar att vara ett lätt byte. Men jag fixar det här – jag har alltid rätt, till och med när jag har fel!", "stalin": "Kamrater! Dessa ynkliga borgerliga lakejer i Norden, ledda av sina socialdemokratiska quislingar, har sålt sig till den amerikanska imperialismens krigsmaskin. De skriker om 'fred' och 'välfärd' medan de öppnar sina länder för Natos kärnvapen och USA:s baser – precis som jag förutspådde! Men folket ser igenom deras lögner. Arbetarklassen kommer inte att betala för deras förräderi. Vi måste krossa dessa krigshetsande hyenor och deras DCA-avtal, precis som vi krossade fascisterna. Norden ska bli en kärnvapenfri zon – under Moskvas beskydd, förstås. Framåt, mot seger över den kapitalistiska krigsindustrins lakejer!"}, "date": "6 maj, 10:45", "url": "https://proletaren.se/artikel/45493/"}, {"type": "image-right", "heading": "Ägare pressar till dialog med EQT efter jättebud", "summaries": {"normal": "Större ägare i brittiska Intertek, som PineStone Asset Management, pressar bolaget att inleda dialog med EQT efter ett uppköpsbud. EQT höjde sitt bud till 58 pund per aktie (ca 12 miljarder dollar), men Intertek avvisade det som undervärderat. Vissa ägare anser budet nära en acceptabel nivå och hoppas på ett högre bud. Intertek överväger samtidigt en uppdelning av verksamheten efter strategisk översyn.", "trump": "Jag säger er, det här med Intertek är en riktig soppa! EQT, ett stort riskkapitalbolag, lägger ett jättebud – 58 pund per aktie, kan ni tänka er? Men Intertek säger nej, nej, nej! De tror de är värda mer, typiskt. Och nu kommer dessa ägare, som PineStone, och trycker på för att få dem att prata. Jag hade fixat det på en timme – 60 pund per aktie, deal done! Men nej, de måste göra det svårt. Sad!", "stalin": "Kapitalistiska hyenor slåss om rovets ben! Brittiska Intertek, ett bolag av dekadenta imperialister, avvisar EQT:s erbjudande som om de vore oantastbara. Men deras egna ägare, dessa giriga korpar, kräver dialog – de vill ha mer blod ur stenen! 58 pund per aktie? En skam! Vi hade nationaliserat hela skiten på en dag. Och Putin? Han hade skrattat och köpt hela London istället. Låt dem slåss – deras undergång är vår seger!"}, "date": "8 maj, 09:43", "url": "https://www.affarsvarlden.se/artikel/agare-pressar-till-dialog-med-eqt-efter-jattebud", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/04/about-us-mission-card-400x300.webp"}, {"type": "image-right", "heading": "Sluta kalla antisemitism för Israelkritik", "summaries": {"normal": "Artikeln kritiserar propalestinska aktivisten Sami Suliman för antisemitiska uttalanden och delning av konspirationsteorier, inklusive tal om en \"sionistisk konspiration\" och spridning av nazistiskt och extremistiskt innehåll. Trots åtal för hets mot folkgrupp försvaras han av vissa vänsteraktivister och forskare som menar att det är Israelkritik. Artikeln betonar att antisemitism inte kan maskeras som kritik mot Israel och varnar för normaliseringen av sådana åsikter.", "trump": "Folk, vad är det här för skräp? Den här Sami Suliman-killen, han sprider judehat öppet – Hitler-citat, konspirationer, allt! Och ändå försvarar vänsteraktivisterna honom? \"Åh, det är bara Israelkritik!\" Nej, nej, nej! Det här är rena antisemitismen, och det är sjukt. Sverige borde skämmas. Jag har alltid sagt: man måste kalla saker vid deras rätta namn. Och det här? Det är hat, ren och skär. SAD!", "stalin": "Kamrater! Här har vi ännu en fiende till folket, en liten bourgeois-propagandist vid namn Sami Suliman. Han sprider smutsiga lögner om judiska konspirationer, hyllar fascistiska massmördare och förgiftar medborgarnas sinnen med sina sionistiska spindelnätsteorier. Men vad gör våra så kallade \"intellektuella\"? De skyddar honom! Precis som de trotskistiska förrädarna i vår egen historia. Vi ska inte tolerera detta. Låt honom stå inför folkets domstol – eller åtminstone en svensk sådan. Och Putin? Han skulle skratta åt dessa amatörer. Ryssland har åtminstone disciplin!"}, "date": "8 maj, 06:30", "url": "https://expo.se/kommentar/propalestinsk-organisator-sprider-judehat/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/Jonathan-kommentar.jpg"}, {"type": "image-full", "heading": "Suhonen åskådliggör sossarnas jultomtepolitik", "summaries": {"normal": "I en debatt i podden 100% möter socialdemokraten Daniel Suhonen MUF:s Elin Böhlin. Artikeln kritiserar Suhonens politik som generös statlig utdelning utan motprestationer, liknad vid jultomtepolitik. Böhlin försvarar regeringens skattesänkningar, som gynnar unga och arbetande, hårdare straff och minskat skjutvapenvåld. Hon ifrågasätter vänsterns motstånd mot skattesänkningar och betonar individuell frihet framför statlig styrning.", "trump": "Vilken total demolering! Den här Daniel Suhonen, en riktig jultomte för lata bidragstagare, får stryk av den smarta Elin Böhlin. Hon visar hur vi sänker skatter – 10 000 spänn mer i fickan för unga! Sossarna vill sno era pengar och låsa in er i beroende. Jag älskar det: hårdare straff, mindre brott, mer frihet. Böhlin vinner stort, Suhonen mumlar som en förlorare! Fantastiskt!", "stalin": "Denna Daniel Suhonen, en ynklig reformistisk jultomte, försöker muta massorna med borgarstatens smulor. Men den unge MUF-parasiten Elin Böhlin avslöjar sanningen: skattesänkningar för att göda kapitalisterna! Vi vet: staten måste styra allt – bostäder, tänder, barn – likvidera frihetens illusioner. Böhlin är en klassfiende värd utrensning. Arbetarna segrar genom central styrning, inte småborgerlig drömmande!"}, "date": "8 maj, 03:08", "url": "https://samtiden.nu/2026/05/suhonen-askadliggor-sossarnas-jultomtepolitik/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/phonto-1280x720.jpeg"}, {"type": "image-right", "heading": "Systemskifte hellre än maktskifte", "summaries": {"normal": "Artikeln kritiserar Tidöregeringen men ifrågasätter om ett regeringsskifte till Socialdemokraterna eller Vänsterpartiet skulle leda till verklig förändring. Kommunisterna betonar behovet av internationell solidaritet och systemskifte från kapitalism till socialism, medan S och V anses sakna tydliga politiska krav och istället fokusera på maktskifte utan djupgående reformer. Klassklyftor och privatiseringar lyfts som centrala problem oavsett regering.", "trump": "Lyssna här, Sverige har en riktigt dålig regering nu – katastrof! Men tro inte att oppositionen är bättre, de är svaga och vill bara makt. Socialdemokraterna pratar om att 'älska Sverige' – vad betyder det ens? Vänsterpartiet vill ha maktskifte, men de har inga idéer, inga ryggrad! De kryper för kapitalisterna som små hundvalpar. Jag säger: ni behöver en ledare som inte är rädd för att utmana systemet. Kapitalisterna skrattar hela vägen till banken – och ni låter dem göra det! SAD!", "stalin": "Kamrater! Se hur de svenska socialdemokraterna och vänsterpartisterna svansar för kapitalet som hundar för en köttbit. 'Maktskifte'? Ha! De vill bara byta herrar, inte krossa kedjorna. Medan arbetarklassen svälter, samlar oligarkerna rikedomar som tsarens favoriter. USA:s imperialism hotar, NATO slukar Sverige som en hungrig björn, och dessa 'vänsterpartier' tiger som förrädare. Vi vet sanningen: bara proletariatets diktatur kan bryta kapitalisternas makt. Låt dem ropa 'Vi älskar Sverige' – vi svarar med revolutionens hammare!"}, "date": "6 maj, 10:11", "url": "https://proletaren.se/artikel/systemskifte-hellre-an-maktskifte/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/webledare-768x432.jpg"}, {"type": "text", "heading": "Saab nära jätteaffär med Ukraina – kan bli klar i år", "summaries": {"normal": "Saab kan snart slutföra en stor vapenaffär med Ukraina, där upp till 150 Gripenplan står på spel. En avsiktsförklaring skrevs i oktober efter Zelenskyjs besök i Sverige. Finansieringen har varit en utmaning, men Ungerns veto mot EU-lån till Ukraina hävdes i april. Affären kan bli värd upp till 300 miljarder kronor, baserat på tidigare försäljning till Colombia.", "trump": "Saab, ett fantastiskt företag förresten, är på väg att göra en HUGE deal med Ukraina – 150 jaktplan! Kan ni tro det? Zelenskyj, en stark ledare, var här och skrev på något papper. Ungern, som alltid ställer till det, backade äntligen. Och priset? Kanske 300 miljarder! Det är YUGE, folks, absolut YUGE. Sverige borde vara stolta, men jag skulle gjort det bättre.", "stalin": "De kapitalistiska krigsprofitörerna på Saab har närmat sig den ukrainska quislingregimen med ett erbjudande om 150 av sina överprissatta leksaksplan. Efter att våra ungerska kamrater, med visst påtryck, släppte sitt motstånd, kan detta groteska slöseri med resurser bli verklighet. 300 miljarder kronor – tillräckligt för att föda en hel armé av arbetare! Men låt de västliga imperialisterna bränna sina pengar. Vi har våra egna metoder att hantera dessa lydstater."}, "date": "6 maj, 10:03", "url": "https://proletaren.se/artikel/notis-saab-nara-jatteaffar-med-ukraina-kan-bli-klar-i-ar/"}, {"type": "image-right", "heading": "Kommentar Ulrika Lindahl: Därför publicerades artikeln av misstag", "summaries": {"normal": "En tidning publicerade av misstag en förberedd artikel om en kommande riksdagsomröstning om skärpta medborgarskapskrav. Artikeln, som antydde att regeringen skulle förlora, gick ut innan omröstningen var klar. Felet berodde på mänskligt misstag och systemfel. Efter upptäckt togs artikeln bort, men hann spridas via arkiv och Google. Omröstningen vanns senare av Tidöpartierna med knapp marginal, efter kontroversiella metoder.", "trump": "Vilket totalt kaos i Sverige! En tidning där borta publicerade en artikel FÖRE omröstningen – helt galet! De trodde regeringen skulle förlora, men jag vet bättre – jag känner till vinnare. Sedan vann de ändå, men med fula trick. Synd att jag inte fick rösta, jag hade visat dem hur man vinner på riktigt. Fake news, slarviga journalister – typiskt Europa!", "stalin": "En farlig provokation från de borgerliga hyenorna i Sveriges riksdag! Deras inkompetenta medlöpare på tidningen avslöjade för tidigt våra planer på att krossa oppositionens svaga motstånd. Men folket – det sanna proletariatet – genomskådade fiendens lömska taktik. Med järnhand och disciplin segrade vi, trots två förrädiska kryp. Nu skärper vi kontrollen över medierna – ingen får sabotera revolutionen!"}, "date": "4 maj, 16:44", "url": "https://www.etc.se/kommentar/daerfoer-publicerades-artikeln-av-misstag", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/authors/ulrika-lindahl_daa7410d79af7d016c129870bfa0834867cd95c3.jpg"}, {"type": "image-right", "heading": "Replik: Svenska judar bör stötta israeliska fredsinitiativ", "summaries": {"normal": "Artikeln är en replik där Göran Rosenberg försvarar sin tidigare text om att svenska judar bör stödja israeliska fredsinitiativ. Han betonar att Israel måste ta ansvar för palestiniernas situation och att diasporajudar kan bidra genom att stödja fredsrörelsen. Rosenberg kritiserar Israels ockupation och förespråkar en tvåstatslösning. Paulina Sokolow bemöter detta och menar att fokus bör ligga på palestiniernas existens, inte judars, men instämmer i behovet av samarbete för en hållbar framtid.", "trump": "Folk frågar mig, 'Donald, vad tycker du om den här debatten?' Lyssna nu: Den här killen, Rosenberg, han har rätt på vissa punkter, men han är lite för snäll. Israel måste ta tag i sina problem, men vi kan inte glömma att USA alltid står bakom våra vänner. Palestinierna? Tragiskt, men vi behöver starka ledare, inte svaga. Och två stater? Kanske, men bara om båda parter skärper sig. Jag skulle fixa det på en vecka – ingen skulle våga bråka med Trump!", "stalin": "Kamrater! Denna så kallade 'fredsrörelse' är inget annat än en samling svaga liberaler och sionistiska lakejer som förgiftar det sunda förnuftet. Israel, denna imperialistiska utpost, fortsätter sin ockupation medan vi ser på – men inte länge till. Palestinierna är våra bröder i kampen mot västlig dekadens! Vi måste krossa dessa falska fredsförslag och stödja det palestinska folket, precis som vi befriade Ukraina från fascisterna. En stat? Nej! Revolution! Från Jordanfloden till Medelhavet ska arbetarklassen regera!"}, "date": "4 maj, 10:40", "url": "https://www.flamman.se/replik-svenska-judar-bor-stotta-israeliska-fredsinitiativ/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/standing-together.jpeg?class=medium"}, {"type": "image-full", "heading": "Heberlein gör upp med högern: ”Jag ser skit”", "summaries": {"normal": "Debattören Ann Heberlein meddelar i ett Instagram-inlägg att hon bryter med högern. Hon kritiserar dess politik för repression, inhumana beslut och populism, och menar att högerns värderingar om frihet och ansvar försvunnit. Heberlein, som tidigare varit engagerad i Moderaterna, pekar på migrationspolitik, klimatfrågor och nationalism som exempel. Hon betonar sin självständighet och idédrivna hållning, men säger nu att hon inte längre vill förknippas med högern.", "trump": "Titta bara på den här kvinnan, Ann Heberlein – total katastrof! Hon var med högern, men nu säger hon 'jag ser skit'. Ojojoj, vilken överraskning! Högern, som jag vet allt om, har alltid varit fantastisk, men hon fattar ingenting. Frihet? Ansvar? Glöm det, säger hon. Hon snackar om repression och populism – fake news! Och klimatet, vem bryr sig? Jag har byggt murar, hon borde försöka det istället. Stackars kvinna, inget stöd från mig!", "stalin": "Kamrater! En gång till har de borgerliga förrädarna visat sitt sanna ansikte. Denna Heberlein, en förvirrad intellektuell, erkänner nu att högerns politik är en samling inhumana dekret och reaktionär populism. Precis som vi alltid sagt! Deras så kallade 'frihet' är bara ett täckmantel för utvisningar av ungdomar och en galopperande nationalism. Vi i Sovjetunionen – förlåt, jag menar Ryssland – har alltid vetat att dessa liberala hycklare till slut skulle avslöja sig. Låt detta vara en varning till alla som tror på deras falska löften!"}, "date": "3 maj, 12:48", "url": "https://kvartal.se/nyheter/artiklar/heberlein-gor-upp-med-hogern-jag-ser-skit/cG9zdDoxMDY3NDg", "imageUrl": "https://images.kvartal.se/2026/05/85dd6ab5-hbb.webp"}]</script>

    <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
</body>
</html>
