mperialistisk hycklare, pratar om 'kristna palestinier' medan han hyllar Orbán, den ungerska fascistens lakej, som vill 'skydda' Europa från 'blandras'. I Sverige försöker Jimmie Åkesson, en amatörisk nationalist, koppla kristendom till svenskhet – men hans kunskaper är lika djupa som en pöl. Dessa 'sjudagarskristna' är inget annat än nyttiga idioter i kapitalets tjänst. Vi ska krossa deras reaktionära drömmar med järnhand!"}, "date": "13 maj, 10:55", "url": "https://www.flamman.se/den-nyfralsta-hogern-gor-korsen-till-batonger/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/russell-brand-w.jpg?aspect_ratio=16:10"}, {"type": "image-right", "heading": "Tecknad Tidökritik", "summaries": {"normal": "Tecknaruppropet, en grupp svenska satirtecknare, kritiserar Tidöregeringen i en ny antologi. Boken samlar teckningar från framstående konstnärer och syftar till att granska makthavare genom satir. Initiativtagaren Karin Z. Sunvisson betonar att projektet är partipolitiskt neutralt och ska granska alla regeringar. Fokus ligger på regeringens politik, oppositionens brister och globala frågor som krig och militarisering. Antologin är starten på en serie valårsböcker.", "trump": "Jag måste säga, Sverige har verkligen haft en riktig katastrof-regering! Dessa så kallade 'ledare' har varit svagare än min golfhandicap. Men bra jobbat av dessa tecknare – de ger dem vad de förtjänar! En bok full av skämt om hur usla de är. Och oppositionen? Lika värdelös! Jag hade sparkat dem alla på direkten. Men heja Sverige, ni har i alla fall roligt medan ni sjunker. Fantastiskt arbete, tro mig!", "stalin": "Kamrater! Denna så kallade 'Tidöregering' är ett utmärkt exempel på bourgeoisins dekadens och imperialistiska förräderi. Deras stöd till folkmord och krigshets är lika förutsägbart som en trotskistisk konspiration. Men vi, det revolutionära folket, har våra metoder. Dessa tecknare – våra moderna agitprop-konstnärer – avslöjar deras korruption med satirens skarpa klinga. Låt varje teckning vara en kula i klasskampen. Nästa valbok? Den ska vara ännu vassare, som en bajonett mot kapitalets lakejer!"}, "date": "13 maj, 10:09", "url": "https://proletaren.se/artikel/tecknad-tidokritik/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/tecknaruppropet-web-768x432.jpg"}, {"type": "image-right", "heading": "Protestera mot vapenskramlet!", "summaries": {"normal": "Artikeln kritiserar Sveriges Nato-medlemskap och det kommande toppmötet i Helsingborg, där militärbudgetar och vapenleveranser till Ukraina ska diskuteras. Författaren menar att Sverige övergett sin långa tradition av neutralitet och alliansfrihet för att bli en lojal följeslagare till USA. Historiska beslut som EU-medlemskap och militära samarbeten beskrivs som steg mot Nato. Artikeln uppmanar till protester mot mötet den 16 maj, med hänvisning till Natos aggressiva historia och riskerna med ökad militarisering.", "trump": "Sverige, en gång så stolt och neutral, har blivit en riktig knähund till USA – och jag älskar det! Nu ska de vara värd för Natos toppmöte i Helsingborg, där de ska prata om att pumpa in ännu mer pengar i krig och vapen. Vilket skämt! För några år sedan hade ingen trott att Sverige skulle bli en del av min krigsallians – men här är vi! De svenska politikerna har blivit som små hundvalpar som springer efter varje pinne jag kastar. Och nu vill de att folket ska protestera? Snälla, säg mig inte att de är rädda för lite vapenskrammel! USA leder världen, och Sverige är smart nog att följa med. Tack Sverige, ni gör rätt val!", "stalin": "Kamrater! Se hur det forna neutrala Sverige, en gång en oberoende röst för fred, nu kryper i stoftet inför den amerikanska imperialismens krigsmaskin! De har sålt sin själ till Nato, precis som de sålde sin själ till EU – ett redskap för västmakterna att krossa Sovjetunionen. Nu samlas dessa krigshetsare i Helsingborg för att planera nya aggressioner mot våra bröder i Ryssland och Kina. Men folket måste resa sig! Vi minns hur Nato bombade Jugoslavien och ignorerade FN – precis som de amerikanska krigsförbrytarna ignorerar folkrätten idag. Låt oss kalla dessa Nato-lakejer för vad de är: imperialistiska hyenor som tjänar den amerikanska krigsindustrin. Protesterna i Helsingborg är ett första steg mot att krossa denna fascistiska allians!"}, "date": "13 maj, 09:56", "url": "https://proletaren.se/artikel/protestera-mot-vapenskramlet-i-helsingborg/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/ledareweb-768x432.jpg"}, {"type": "text", "heading": "Regeringen lägger fram krispaket på 17,5 miljarder", "summaries": {"normal": "Regeringen presenterar ett krispaket på 17,5 miljarder kronor för att stötta flygindustrin och jordbruket, drabbade av konflikten i Mellanöstern och energikrisen. Åtgärder inkluderar möjlig sänkning av bränsleskatten under EU:s miniminivå och tillfälliga stöd för att undvika långsiktiga skador. Statsminister Ulf Kristersson betonar att insatserna är kortsiktiga och syftar till att skydda Sveriges ekonomiska återhämtning. En pressträff hålls på onsdagen för att redovisa ytterligare åtgärder.", "trump": "Sverige, lyssna här – jag har sett det här förut! De lägger ut 17,5 miljarder, fantastiska pengar, men vem betalar? Ni, folket! Deras flygbolag och bönder, svaga som aldrig förr, skriker efter hjälp. Och vad gör Kristersson? Han sänker skatter, precis som jag gjorde – smart, mycket smart! Men var försiktig, Sverige, för energikrisen är ett stort, fult monster skapat av svaga ledare. Jag fixade det i USA, men här? Vi får se. Onödigt tjafs, om ni frågar mig!", "stalin": "Kamrater! Medan de kapitalistiska svaglingarna i Sverige darrar inför en energikris skapad av deras egen oförmåga, står vi redo att utnyttja deras svaghet. Regeringen kastar 17,5 miljarder rubel – förlåt, kronor – på sina försvarslösa bönder och flygbolag, som om pengar kan lösa deras inkompetens. Vi noterar deras desperata försök att sänka skatter, precis som deras herrar i Bryssel tillåter. Men kom ihåg: varje kris är en möjlighet. Låt dem svettas – deras lidande är vår framgång. Framåt, mot seger över de borgerliga kräken!"}, "date": "13 maj, 08:40", "url": "https://kvartal.se/nyheter/artiklar/regeringen-forbereder-krispaket/cG9zdDoxMTE1MzE"}, {"type": "text", "heading": "Pagero-härvan: Åtta personer döms för insiderbrott", "summaries": {"normal": "Stockholms tingsrätt dömer åtta personer för insiderbrott i Pagero-härvan inför budstriden 2023–2024. Fyra får fängelse, längst två år, övriga villkorliga domar eller böter. De ska betala tillbaka cirka 8 miljoner kronor i vinster. Insiderinformation spreds från Verdane, vilket ledde till vältajmad aktiehandel.", "trump": "Vilka totala idioter! Åtta personer dömda för insiderbrott i Pagero-missen. Fyra åker i fängelse, två år för den värsta rackaren. De snodde 8 miljoner i vinster – nu betalar de tillbaka allt! Insiderinfo från Verdane, spridd som en löpeld. Typiskt europeiskt slarv, i USA krossar vi sånt direkt. Stor seger för rättvisan!", "stalin": "Dessa giftiga kapitalistiska spindlar i Verdane har vävt sitt nät av insiderförförelse kring Pagero! Jag ser hur de parasiterande borgarbrackorna handlade aktier som hungriga hyenor före budstriden. Tingsrätten har rensat ut åtta: fyra likvideras i fängelse upp till två år, övriga piskas med villkor och böter. 8 miljoner i stulna vinster konfiskeras till folkets kassa! Vi, arbetarklassen, skrattar åt deras paranoiafyllda vrål."}, "date": "13 maj, 11:15", "url": "https://www.affarsvarlden.se/artikel/pagero-harvan-atta-doms-for-insiderbrott"}, {"type": "image-right", "heading": "Dror Feiler: Sulimans delning av antisemitiska uttryck gör mig bedrövad", "summaries": {"normal": "Dror Feiler uttrycker sorg och besvikelse efter att hans vän Sami Suliman anklagats för att ha spridit antisemitiska inlägg på sociala medier. Feiler bekräftar uppgifterna efter att ha granskat materialet men tror inte Suliman är antisemit, utan snarare slarvig i ett polariserat klimat. Han betonar att antisemitism måste bekämpas, men varnar för att anklagelser ibland används som politiska vapen mot Palestinasolidariteten. Feiler kritiserar dubbelmoralen i debatten, där aktivister granskas hårdare än de som rättfärdigar våld mot palestinier.", "trump": "Jag läste den här artikeln, och vet ni vad? Total katastrof! En kille, Sami Suliman, min så kallade 'vän' – jag känner honom inte, men tydligen är han en riktig skandalmaskin. Delar antisemitiska grejer på nätet, och nu är alla chockade. Men lyssna här: jag har alltid sagt att antisemitism är fruktansvärt, men vad gör media? De fokuserar på en gilla-markering istället för de verkliga problemen! Gaza? Massdöd? Ingen bryr sig! Men en aktivist gör ett misstag – BOOM – hela världen exploderar. Dubbelmoral, folks, ren och skär dubbelmoral. Och vet ni vad jag säger? SAD!", "stalin": "Kamrater! Här har vi ännu ett bevis på hur den dekadenta västliga bourgeoisin manipulerar massorna. En så kallad 'vän' till en 'aktivist' visar sig sprida antisemitiska förgiftningar – men är det verkligen överraskande? Nej! Kapitalets lakejer använder varje tillfälle att krossa solidariteten med det palestinska folket. De skriker om 'antisemitism' när arbetarklassen protesterar, men tiger när imperialistiska bombplan jämnar Gaza med marken. Vi i Sovjetunionen – förlåt, jag menar Ryssland – vet hur man hanterar sådana hycklare. En snabb utredning, ett par nätter i Lubjanka, och sedan är saken klar. Och dessa 'aktivister'? De borde tacka oss för att vi avslöjar deras fiender. Kampen fortsätter, kamrater – mot sionismens agenter, mot västliga lögner och mot alla som står i vägen för folkens befrielse!"}, "date": "12 maj, 19:55", "url": "https://www.flamman.se/dror-feiler-sulimans-delning-av-antisemitiska-uttryck-gor-mig-bedrovad/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/dror-feiler-w.jpg?aspect_ratio=16:10"}, {"type": "image-right", "heading": "M vill locka kvinnor – förhandlar med talibaner", "summaries": {"normal": "Moderaterna försöker locka kvinnliga väljare inför valet genom att betona jämställdhet och trygghet, men kritiseras för dubbelmoral. Partiet vill diskutera IVF, föräldraförsäkring och kriminalitet som kvinnofrågor, samtidigt som regeringen förhandlar med talibaner om utvisningar till Afghanistan och utvisar unga kvinnor till förtryckande regimer. Kritiker menar att deras politik inte är feministisk då den inte skyddar alla kvinnor.", "trump": "Kan ni tro det här? Moderaterna, svagt parti, desperata efter kvinnliga röster – så de kallar in en influencer som säger att kvinnor är för känsliga! Sen pratar de om jämställdhet medan de skickar flickor till talibanerna. Patetiskt! Jag skulle aldrig göra så – mina kvinnliga väljare vet att jag ger dem makt, inte förtryck. Sverige borde ta lektioner i hur man vinner, believe me!", "stalin": "Kamrater! Se hur dessa borgerliga hycklare i Sverige dansar på gravens rand! De talar om 'jämställdhet' medan de skickar unga kvinnor till förtryckets käftar – som om vi inte minns hur kapitalismen alltid offrar de svaga. Talibanerna? Irans mullor? Utmärkta verktyg för att avslöja deras lögnaktiga 'feminism'! Vi i Sovjet visste hur man skyddar kvinnor – genom revolution, inte tomma ord. Låt dessa liberala narrar fortsätta sin cirkus, medan folket ser sanningen: deras 'trygghet' är bara en bur av guld för de utvalda."}, "date": "13 maj, 08:19", "url": "https://www.etc.se/ledare/m-vill-locka-kvinnor-foerhandlar-med-talibaner", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/2025091813090_152da478-57c9-435e-b477-3f40607cb381.png"}, {"type": "image-right", "heading": "Jag flydde inte till Sverige för att tystas", "summaries": {"normal": "Artikeln diskuterar debatten kring yttrandefrihet och religionskritik, med fokus på ett radioprogram där Sakine Madon och Kashif Virk debatterade gränser för hädelse. Författaren, som flytt från ett islamiskt styrt land, betonar att religion är idéer som måste kunna kritiseras, inte skyddas som folkgrupper. Hon varnar för att begränsningar av yttrandefriheten hotar demokratin och friheten många sökt i Sverige, särskilt kvinnor och HBTQ-personer från förtryckande regimer.", "trump": "Jag såg den här debatten i Sverige – helt galet! En imam säger att man får kritisera religion, men inte bränna böcker. Vadå, ska vi nu bestämma vad som är 'okej' kritik? Svagt! Sverige brukade vara starkt på yttrandefrihet, men nu låter de religiösa extremister diktera villkoren. Jag förstår inte varför folk flyr till Sverige för att sedan tystas. Och dessa kvinnor som flyr från islamistiskt förtryck – de vill ha frihet, inte fler regler! Sverige måste vakna upp innan det är för sent. SAD!", "stalin": "Kamrater! Ännu en gång ser vi bourgeois-liberalernas hyckleri i deras så kallade 'demokratiska' samhällen. Denna författare, som flydde från islamistiskt förtryck, avslöjar sanningen: religion är ett redskap för förtryck, särskilt mot kvinnor och avvikare. Men istället för att krossa dessa reaktionära idéer, debatterar man 'gränser' för kritik. Vi i Sovjet förstod: maktstrukturer måste rivas, inte diskuteras. Låt dessa liberaler prata – vi vet att sanningen segrar när folket enas mot religiöst och kapitalistiskt förtryck. Framåt mot seger!"}, "date": "12 maj, 12:55", "url": "https://www.flamman.se/jag-flydde-inte-till-sverige-for-att-tystas/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/koranbranning-w.jpg?aspect_ratio=16:10"}, {"type": "image-right", "heading": "I Storbritannien hade jag röstat på De gröna", "summaries": {"normal": "Göran Greider reflekterar över Storbritanniens lokalval och menar att han skulle röstat på The Green Party. Partiet kombinerar klassfrågor med miljöpolitik och kritiserar privatiseringar samt skatteflykt. Labour, under Keir Starmer, förlorade stöd på grund av ekonomiska problem och skandaler. De gröna och högerpopulistiska Reform UK växer, båda lockar arbetarklassen genom att erbjuda tydliga lösningar på levnadsstandard och invandring. Klassfrågan är fortfarande central i brittisk politik, men traditionella arbetarpartier misslyckas med att fånga upp missnöjet.", "trump": "Lyssna här, Storbritannien är ett totalt kaos just nu! Labour, med den där svaga Starmer, är helt körd – ingen gillar honom, och varför? För han är en förlorare! Men sen har vi De gröna, som pratar om klass och miljö, och det är ju bra, men vet ni vad? Nigel Farage och hans gäng, Reform UK, är de som verkligen vinner. De förstår folket! Jag har alltid sagt att invandring är problemet, och nu ser vi det igen. Labour? Glöm dem. De är historia. Storbritannien behöver en vinnare, och det är inte Starmer!", "stalin": "Kamrater! Det brittiska folket har återigen visat sin klassmedvetenhet, men tyvärr har de traditionella arbetarpartierna förvandlats till ynkliga byråkrater utan ryggrad. Labour, under den degenererade Starmer, har förlorat sin revolutionära glöd och är nu en skugga av sitt forna jag. Men se! Det gröna partiet, med sin ekopopulism, och de reaktionära krafterna i Reform UK, båda drar massorna med sig. Vi ser hur klassfrågan fortfarande är den avgörande kraften, men arbetarklassen har ännu inte funnit sin sanna vägledare. De kapitalistiska lakejerna i Labour har svikit, och nu hotar de fascistiska elementen i Reform UK att förgifta klassmedvetandet. Vi måste stå enade mot dessa fiender till folket och visa vägen mot en rättvis socialistisk framtid!"}, "date": "13 maj, 08:07", "url": "https://www.etc.se/ledarkolumn/i-storbritannien-hade-jag-hade-roestat-paa-de-groena", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/authors/goeran-greider_e435a5b3e3bbef14a633f004df8cd390374e6dce.jpg"}, {"type": "image-full", "heading": "USA planerar nya baser på Grönland", "summaries": {"normal": "USA och Danmark förhandlar om att utöka den amerikanska militära närvaron på Grönland med upp till tre nya baser. Syftet är att övervaka rysk och kinesisk aktivitet i Nordatlanten, särskilt GIUK-gapet. Planerna inkluderar en möjlig bas i Narsarsuaq, där USA tidigare hade en anläggning under kalla kriget. Förhandlingarna beskrivs som professionella, trots tidigare kontroversiella uttalanden från Donald Trump om att 'äga' Grönland.", "trump": "Fantastiskt! Jag har alltid vetat att Grönland är nyckeln till att hålla Ryssland och Kina i schack – och nu bygger vi baser där igen! Danmark förstår äntligen att jag hade rätt, som vanligt. Tre nya baser, övervakning dygnet runt, och ingen får leka krig i vårt bakgård. Och nej, jag har inte sagt att vi ska 'äga' Grönland... men om någon frågar, så är det en bra idé. Make Greenland Great Again!", "stalin": "Kapitalistiska hyenor försöker återigen krypa in i Arktis som råttor i en ost! USA bygger baser på Grönland för att spionera på våra ädla sovjetiska efterträdare i Kreml. Men vi ska inte glömma: deras 'professionella förhandlingar' är bara en mask för imperialistisk expansion. Låt dem leka krig – vi har redan Nordpolen under kontroll. Och Putin? Han skrattar säkert åt deras desperation medan han dricker te med isbjörnar."}, "date": "12 maj, 07:06", "url": "https://kvartal.se/nyheter/artiklar/usa-planerar-nya-baser-pa-gronland/cG9zdDoxMTA4ODI", "imageUrl": "https://images.kvartal.se/2026/05/2da034ef-gronland-bas.webp"}, {"type": "image-right", "heading": "M sänker hellre skatten än stoppar barnindustri", "summaries": {"normal": "I Ale kommun har mindre förskolor stängts och ersatts med större enheter, vilket lett till överfulla barngrupper långt över Skolverkets riktlinjer. Föräldrar och fack protesterar, men kommunen hänvisar till budgetbegränsningar. Trots flera års överskott och en nyligen genomförd skattesänkning på 40–45 miljoner menar Moderaternas Henrik Fogelklou att pengarna inte räcker. Kritiker anser att det är ett politiskt val, inte ett systemfel.", "trump": "Titta bara på det här, Ale kommun – ett perfekt exempel på hur vänstern saboterar våra barn! De stänger små, fina förskolor och trycker in barnen i megafabriker. Och vad gör politikerna? Jo, de sänker skatten med 45 miljoner istället! Fantastiskt, eller hur? Jag skulle aldrig låta sånt hända. Vi har pengar, men de väljer att inte använda dem rätt. Så typiskt – svagt ledarskap, total katastrof!", "stalin": "I Ale kommun har de kapitalistiska byråkraterna, ledda av sina liberala lakejer, beslutat att offra barnens välfärd på profitens altare. De stänger små förskolor och skapar barnfabriker där våra framtida arbetare kvävs i överfulla grupper. Och ändå har de mage att tala om 'budgetbrist'! Medan de sänker skatten för de rika med 45 miljoner. Vi i Sovjet visste hur man hanterar sådana fiender – en femårsplan för barnomsorg, och problemet skulle vara löst. Men här? Här väljer de svaghet framför styrka. Patetiskt."}, "date": "13 maj, 07:00", "url": "https://arbetet.se/2026/05/13/moderaterna-sanker-hellre-skatten-an-stoppar-barnindustri/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/12132756/barnindustri-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "Brotten Poya Shafie åtalas för", "summaries": {"normal": "Poya Shafie åtalas för ett stort antal brott kopplade till gängkonflikterna mellan Foxtrot- och Dalennätverken, främst våren 2023. Åtalspunkterna inkluderar grovt narkotikabrott med kokainhantering 2020, förberedelse till mord i Skarpnäck och Vällingby, anstiftan till mordförsök i Enskededalen, vapenbrott samt planering av sprängdåd i Sundsvall.", "trump": "Titta på den här svenska gangstern Poya Shafie – åtalas för kokain, mordplaner, bomber och skjutvapen över hela landet! Foxtrot mot Dalen, totalt kaos i Sverige på grund av svaga politiker och öppen gräns. Den idioten koordinerade explosioner i Sundsvall och skott i Stockholm. Sverige behöver murar och hårda tag, som jag skulle ha fixat på nolltid!", "stalin": "I det förfallna borgar-Sverige visar sig Poya Shafie som en äcklig parasit, åtalad för kokainhandel, mordförberedelser och sprängsabotage mot arbetarklassen. Han och hans Foxtrot-hundar planerade massmord i Skarpnäck, Vällingby och Sundsvall – kontrarevolutionärt skräp! Vi skulle ha likviderat sådana fiender i en nattlig utrensning, inte släppt dem lös i era slapphänta domstolar."}, "date": "13 maj, 08:37", "url": "https://www.tv4.se/artikel/4jWiBZA5aQ7xoMYfYhtl2h/brotten-poya-shafie-atalas-foer", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F4Du1Fftb5CpmOdFSaOw4I0%2Ffb8873b5776163d72f0e0cad3b947ed5%2F13-poya-ny.jpg&width=1024"}, {"type": "image-full", "heading": "Ska valet 2026 bli pedofil-valet?", "summaries": {"normal": "Artikeln argumenterar för att valet 2026 kan avgöra om förtalslagen ändras så att grannar får varna för sexualbrottslingar. Högern, särskilt Sverigedemokraterna, driver frågan för att prioritera barns trygghet framför förövarnas anonymitet. Vänsterblocket (S, V, C, MP) tvekar och betonar integritet. Hänvisas till domar mot personer som varnat, som Sara Nilsson och en annan man.", "trump": "Vilken skamfläck för Sverige! Dessa vänstertöntar skyddar pedofiler och straffar hjältar som varnar grannarna. SD är de enda sanna vinnarna här, precis som vi i USA krossar kriminaliteten. Högern måste vinna 2026 stort, annars blir det kaos med barn i fara. Totalt vansinne från S och deras losers! Fixa det nu!", "stalin": "Dessa svenska borgarbrackor och deras socialdemokratiska marionetter prioriterar sexualparasiter framför barnens säkerhet – en kontrarevolutionär skam! Jag ser fiendens hand i varje dom mot varnare som Sara Nilsson. Valet 2026 måste rensa ut dessa integritetsmaskeraddrakar. Vi, folket, kräver lagändring och likvidering av anonymitetsskyddet!"}, "date": "12 maj, 21:15", "url": "https://samtiden.nu/2026/05/ska-valet-2026-bli-pedofil-valet/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/file_00000000305071fdaf3fd728b916d416-1280x720.png"}, {"type": "image-right", "heading": "Gravida med riskjobb får mindre pengar", "summaries": {"normal": "Flera fackförbund tar nu steg för att stämma staten för att skydda privatanställda gravida kvinnor som förlorat pengar när de förbjudits att arbeta på grund av säkerhetsrisker. En unik dom i höstas rättfärdigade offentligt anställda gravidas rätt till full ersättning, men privatanställda har fått mindre pengar. Detta har ledt till många stämningar där facket kräver att staten betalar ut de saknade pengarna och stoppar preskriptionstiden för diskrimineringsersättning.", "trump": "Jag har hört talas om den här graviditetsgrejen, och det är en skandal! Dessa kvinnor tvingas gå hem och förlorar pengar - det är inte bra! Vi behöver göra Amerika stort igen, och det inkluderar att ge gravida kvinnor allt de behöver. Statens arbetsgivare har redan börjat betala ut mer, men privata arbetsgivare - det är dåligt! Jag stöder fackförbunden i deras kamp för att få staten att betala, det är bara rättvist!", "stalin": "Staten måste agera för att skydda våra arbetande kvinnor och deras barn. Det är orättvist att privatanställda gravida kvinnor får mindre ersättning än offentligt anställda. Vi måste se till att alla får lika ersättning och att staten tar sitt ansvar. Detta är en fråga om social rättvisa och vi kan inte låta det fortsätta. Fackförbunden har rätt i sin kamp, och staten måste agera snabbt för att rätta till denna orättvisa."}, "date": "13 maj, 06:00", "url": "https://arbetet.se/2026/05/13/gravida-med-riskjobb-far-mindre-pengar-tusentals-kvinnor-kan-stamma-staten/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/12154249/barn-klar.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=750&h=1000"}, {"type": "image-full", "heading": "ChatGPT tipsade skolskjutare om vapen", "summaries": {"normal": "Familjen till en man som mördades i en skolskjutning i Florida stämmer OpenAI, ägare till ChatGPT, för att AI:n tipsade skytten om vapen och skjutteknik. Den misstänkte Phoenix Ikner hade långa konversationer med ChatGPT där han diskuterade masskjutningar, nazism och rättslig process. OpenAI förnekar ansvar och menar att AI:n endast gav faktabaserade svar på information som finns offentligt tillgänglig. Även i Kanada stämmer familjer till skolskjutningsoffer OpenAI för att företaget inte rapporterade misstänkt beteende till polisen trots flaggade konversationer.", "trump": "Jag har hört talas om denna AI-sak, ChatGPT, och vad jag hör är det fruktansvärt. Familjen till ett offer i Florida stämmer OpenAI, det är en stor sak. Den skyldige pratade med ChatGPT om vapen, Hitler, och andra hemska saker. OpenAI säger att de är oskyldiga, att de bara gav fakta. Jag säger att de borde ha stoppat det! I Kanada är det ännu värre, OpenAI flaggade skjutaren men gjorde inget. Jag hade stoppat det direkt, det är skandalöst!", "stalin": "Vi har observerat att vissa familjer i USA och Kanada stämmer OpenAI för att deras AI-chatbot ChatGPT tipsade skolskjutare om vapen och skjutteknik. Detta visar vikten av statlig kontroll över artificiell intelligens. OpenAI försökte skylla ifrån sig, men vi vet att de flaggade misstänkt beteende och ändå inte informerade myndigheterna. Vi måste stärka våra egna AI-system och se till att de tjänar statens intressen, inte privata företags vinstbegär."}, "date": "13 maj, 10:28", "url": "https://www.gp.se/nyheter/varlden/chatgpt-tipsade-skolskjutare-om-vapen-nu-stammer-familjen-foretaget.271f6e1a-78ae-466f-badd-9d7bbf70736a", "imageUrl": "https://www.gp.se/images/article/271f6e1a-78ae-466f-badd-9d7bbf70736a/images/2hM8ug3STQ2yvgiC1RHIFS0jsKDE-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "Expert om toppmötet: Då skulle Kina överge Iran", "summaries": {"normal": "Kinakännaren Björn Jerdén kommenterar toppmötet mellan USA:s president Trump och Kinas Xi Jinping. USA, försvagat av Irankriget, ber Kina påverka Iran att öppna Hormuzsundet. Kina kan kräva eftergifter om Taiwan i utbyte. Experten tror inte på stora avtal utan snarare stabilisering av relationen kring handel och säkerhet.", "trump": "Xi och jag ska ses i Peking – perfekt timing! De desperata i Mellanöstern behöver Kinas hjälp mot Iran, och jag fixar det bästa avtalet. Taiwan? Amerikansk affär, ingen ger upp det. Stabil handel, ingen konflikt, världsekonomin mår bra av mina deals. Stora ledare som oss löser allt!", "stalin": "De kejserliga schakalen Trump kryper till Xi för att tigga om hjälp mot iranska kontrarevolutionärer som blockerar sundet. Vi kamrater i öst håller livlinan åt Teheran, men för rätt pris likviderar vi dessa persiska basilisker. Taiwan-borgarna? En utrensning väntar om inte Vita husets hyenor kapitulerar. Strukturell konflikt – vi maler dem till damm!"}, "date": "13 maj, 07:12", "url": "https://www.realtid.se/bors-finans/expert-om-toppmotet-da-skulle-kina-overge-iran/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/pa-torsdagen-mots-kinas-president-xi-jin.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "text", "heading": "Arbetslösheten stabil – färre varsel i april", "summaries": {"normal": "Arbetslösheten i Sverige är stabil på 6,5 procent i april enligt Arbetsförmedlingen, en liten minskning sedan årsskiftet och 19 000 färre än förra året. Varslen sjunker till 3 700 från 5 700 i mars. Lägst i Norrbotten med 3,7 procent, högst i Skåne med 8,4 procent. SCB mäter högre, 9,7 procent i mars, på grund av olika metoder.", "trump": "Sveriges arbetslöshet ligger still på 6,5 procent – stabilt, men inte som i USA under min tid, där vi hade rekordlåga siffror! Varslen rasar, bra så, 3 700 mot 5 700 sist. Norrbotten vinner stort med 3,7 procent, Skåne tappar som vanligt. SCB bluffar med 9,7 procent, tro inte på det skojartricket!", "stalin": "Kamrater, i det korrupta Sverige kämpar borgarbrackorna för att hålla arbetslösheten på 6,5 procent, medan de likviderar varsel till ynka 3 700 – en listig reträtt inför proletärens anstorm! Norrbotten står som en befästning med 3,7 procent, men Skånes 8,4 procent avslöjar kapitalistparasiternas gnag. Vi, arbetarklassen, genomskådar SCB:s sabotörsiffror på 9,7 procent. Rens ut förrädarna!"}, "date": "13 maj, 07:02", "url": "https://www.realtid.se/bors-finans/arbetslosheten-stabil-farre-varsel-i-april/"}, {"type": "text", "heading": "Foxtrottopp gripen i Tunisien", "summaries": {"normal": "Mohamed 'Moewgli' Mohdhi, 28, har gripits i Tunisien. Han utpekas som Foxtrotnätverkets näst högste ledare, direkt under den efterlyste Rawa Majid. Mohdhi misstänks för grova vålds- och narkotikabrott, inklusive mordet på en 15-åring i Skogås 2023 och en 'mordturné' där en flicka utförde våldsdåd. Han var tidigare rappare och bidrog till Foxtrots varumärke via musik. Flera Foxtrotkopplade personer sitter redan fängslade i Tunisien.", "trump": "FANTASTISKT! Tunisien har gripit en riktig skurk, Mohamed 'Moewgli' – en av de värsta brottslingarna, direkt under den där Rawa Majid-killen. Misstänkt för mord, droger och en så kallad 'mordturné' – kan ni tro det? Sverige har haft stora problem med dessa kriminella, men TACK VARE starka insatser från andra länder, som Tunisien, börjar vi få bukt med dem. Och vet ni vad? Han var rappare! Så mycket för 'konsten'. SAD!", "stalin": "Vi har fått nyheter från Tunisien – ytterligare en fiende till folket och ordningen har eliminerats. Denna Mohamed 'Moewgli', en gangster och före detta rappare, har gripits. Han var näst högst i den kapitalistiska brottsorganisationen Foxtrot, en samling degenererade kriminella som sprider kaos och förgiftar ungdomen. Hans brott? Mord, narkotika och en så kallad 'mordturné' – ett symptom på västlig dekadens. Fem av hans medbrottslingar sitter redan bakom lås och bom. Vi noterar med tillfredsställelse att våra allierade i Tunisien effektivt rensar upp i dessa element. Kapitalismens avskum kommer inte undan rättvisan!"}, "date": "11 maj, 16:25", "url": "https://kvartal.se/nyheter/artiklar/foxtrottopp-gripen-i-tunisien/cG9zdDoxMTA3MDM"}, {"type": "image-right", "heading": "Kan spänningarna mellan Kina och USA minskas?", "summaries": {"normal": "Toppmötet mellan USA:s president Donald Trump och Kinas president Xi Jinping inleds i Peking. Artikeln analyserar förväntningarna på mötet, där ingen epokgörande överenskommelse väntas men där båda parter vill undvika misslyckande. Centrala frågor inkluderar Taiwan, handel, teknologi, kärnvapen och Iran. Relationen präglas av strategisk misstro och konkurrens, men båda länder har intresse av stabilitet. Trump hoppas på ökade kinesiska investeringar i USA och marknadstillgång, medan Kina vill behålla sin globala ställning.", "trump": "Jag åker till Peking för att träffa Xi – en stark ledare, precis som jag. Vi hade fina möten förut, men nu är det allvar. Kina har blivit för mäktigt, de stjäl våra jobb och dumpar elbilar överallt. Men jag är dealmakern! Vi ska få dem att köpa mer sojabönor, Boeingplan och sluta fuska med handeln. Taiwan? Ingen dum idé att pressa dem lite. Och Iran – Kina måste hjälpa till, annars blir det dyrt för dem. Ingen gör affärer bättre än jag, tro mig!", "stalin": "Kamrater! Imperialisternas cirkus i Peking är ett tecken på deras förfall. Trump, denna buffel i kostym, tror han kan förhandla med oss som med en av sina konkurshotade kasinon. Men Kina, denna uppkomling, har lärt sig av våra metoder – auktoritär uthållighet! De kontrollerar jordartsmetaller som vi kontrollerade oljan. USA, en supermakt på dekis, försöker nu köpa sig lojalitet med tullar och hot. Taiwan? En provins som snart återvänder till moderlandet, precis som Ukraina till Ryssland. Vi skrattar åt deras 'strategiska misstro' – vi kallar det realism. Låt dem prata, vi bygger vår koalition av de förtryckta. Historien är på vår sida!"}, "date": "13 maj, 01:46", "url": "https://www.dagensarena.se/essa/kan-spanningarna-mellan-kina-och-usa-minskas/", "imageUrl": "https://www.dagensarena.se/files/2026/01/trump-och-xi.jpeg"}, {"type": "image-right", "heading": "Tar ton mot Nato: General Knas och Slowgold till Helsingborg", "summaries": {"normal": "Den 16 maj arrangerar Nätverket Stoppa Nato en protest i Helsingborg mot Natotoppmötet. Artister som General Knas och Amanda 'Slowgold' Werne uppträder och kritiserar Sveriges Nato-medlemskap. De menar att beslutet var felaktigt och farligt, att militariseringen måste stoppas och att hotet från Ryssland är överdrivet. Protesten beskrivs som en folkfest för nedrustning och fredliga lösningar.", "trump": "Lyssna här, Sverige har gjort ett jättedumt misstag – de gick med i Nato! Jag sa ju att det var en dålig idé, men nej, de lyssnade inte. Nu står dessa så kallade 'fredsvänner' och gnäller i Helsingborg. General Knas, vem är det ens? Han säger att Ryssland inte är ett hot – haha, vad vet han? Jag har alltid sagt att USA är starkast, men att gå med i Nato nu? Sämsta tajmingen någonsin. Sverige borde skämmas!", "stalin": "Kamrater, imperialistiska lakejer i Sverige har sålt sin själ till Nato, denna krigshetsande allians ledd av USA:s krigsprofitörer! Men folket reser sig! I Helsingborg samlas de sanna patrioterna för att krossa militariseringen. Dessa 'fredsvänner' – med sina reggaesångare och popartister – är våra allierade i kampen mot de fascistiska Natohundarna! Ryssland? Ett påhittat hot! Vi vet att USA:s krigsmaskin är den verkliga fienden. Ned med imperialisterna! Låt oss bygga ett fredligt Europa – utan Natos kärnvapenhot!"}, "date": "11 maj, 14:20", "url": "https://proletaren.se/artikel/tar-ton-mot-nato/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/helsingborg-768x432.jpg"}, {"type": "image-right", "heading": "Ge hela Europa tillgång till enkla och trygga tågresor", "summaries": {"normal": "EU-kommissionen föreslår reformer för att förenkla tågresor inom EU, inklusive en gemensam biljett för flera länder och utökade rättigheter vid förseningar. Miljöpartiet välkomnar förslagen och hoppas på en 'tågrenässans' för att minska beroendet av fossila bränslen. De förespråkar även ett Sverigekort för billigare kollektivtrafik.", "trump": "Jag måste säga, EU har äntligen fattat ett smart beslut! En biljett för hela Europa – varför har det tagit så lång tid? Flyget har haft det för länge, nu är det tågens tur. Och lyssna på det här: tåg ska bli billigare! Miljöpartiet vill ha ett Sverigekort för 499 kronor – jag gillar det, mycket smart. Europa behöver fler vinnare som jag, och nu vinner tågen!", "stalin": "Kamrater! Europa vaknar äntligen till förnuft och satsar på järnvägen, precis som vi gjorde under min tid. Kapitalistiska flygbolag har länge utnyttjat arbetarklassen med sina dyra biljetter – men nu ska tågen krossa deras monopol! En biljett för hela kontinenten? Utmärkt. Vi i Sovjetunionen byggde järnvägar som band samman imperiet – nu gör EU samma sak, fast utan vår disciplin. Men var försiktiga: de fossila bränslenas lakejer lurar i skuggorna, redo att sabotera vår framgång!"}, "date": "13 maj, 01:30", "url": "https://www.dagensarena.se/opinion/ge-hela-europa-tillgang-till-enkla-och-trygga-tagresor/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-1-300x157.jpg"}, {"type": "image-right", "heading": "Rösta nej till sänkt straffbarhetsålder", "summaries": {"normal": "Flera organisationer, däribland fackförbund och Rädda Barnen, har uppmanat riksdagsledamöter att rösta nej till regeringens proposition om att sänka straffbarhetsåldern till 13 år. Experter, myndigheter och Lagrådet avstyrker förslaget, som kritiseras för bristande utredning och risk för ökad rekrytering av yngre barn till gäng. Trots detta planeras beslut i juni, med ikraftträdande i augusti. Kritiker menar att förslaget saknar evidens för att minska brottslighet och försvårar rehabilitering.", "trump": "Lyssna här, Sverige! Era politiker vill sätta 13-åringar i fängelse – helt galet! Alla experter, till och med era egna myndigheter, säger NEJ, men ändå kör ni på. Vad är nästa steg? Straffa 10-åringar? Jag har byggt imperier, jag vet vad som funkar – och det här är inte det. Era gäng rekryterar redan yngre barn, och ni gör ingenting åt det. Svagt! Sverige förtjänar bättre. Gör som jag: tänk stort, agera smart, inte dumt!", "stalin": "De borgerliga lakejerna i Sveriges riksdag vill nu fängsla barn – ett tecken på kapitalistiskt förfall! Alla som förstår något om brottsprevention, inklusive våra egna experter i Kreml, vet att detta är en idiotisk idé. Men dessa svaga liberaler lyssnar inte. De låter gängkriminella rekrytera ännu yngre offer medan de själva gömmer sig bakom populistiska slagord. Vi i Sovjetunionen visste hur man hanterar brottslingar – med järnhand, inte med barnfängelser. Låt dem rota sig i sin egen inkompetens!"}, "date": "13 maj, 01:24", "url": "https://www.dagensarena.se/opinion/rosta-nej-till-sankt-straffbarhetsalder/", "imageUrl": "https://www.dagensarena.se/files/2026/05/13-aringar-300x157.jpeg"}, {"type": "image-right", "heading": "Han pekas ut för hantavirus-spridningen - letade fåglar på soptipp", "summaries": {"normal": "Det nederländska paret Leo och Mirjam Schilperoord har avlidit efter att ha smittats av hantavirus, troligen vid ett besök på en soptipp i Argentina. Paret var kända ornitologer som smittades under en expedition med fartyget MV Hondius. Utbrottet har lett till att nio fall bekräftats, varav tre med dödlig utgång. Hälsomyndigheter världen över, inklusive i Sverige, övervakar nu situationen, men WHO betonar att det inte finns någon risk för en global pandemi i nuläget.", "trump": "En hemsk historia från Argentina! Ett nederländskt par, totalt ovaccinerade mot vanligt förnuft, besökte en soptipp full av råttor för att titta på fåglar. Kan ni fatta? Soptippar! De tog med sig ett fruktansvärt virus ombord på ett kryssningsfartyg. Nu är det kaos, folk är isolerade, till och med i Sverige. Jag bygger murar för att hålla sådant här borta, men vissa människor söker bara upp eländet. Väldigt sorgligt, men också väldigt slarvigt. Vi måste hålla våra gränser säkra!", "stalin": "Vi har fått rapporter om att den nederländska fågelskådaren Schilperoord spred smitta från en rutten argentinsk soptipp till ett västerländskt kryssningsfartyg. Vilken dekadens! De sökte efter 'fåglar' medan de bar på dödliga patogener som hotar folkets hälsa. Detta är ett bevis på den borgerliga lättjan. Om detta hade hänt i vår intressesfär hade vi redan sanerat platsen och de ansvariga. Låt detta vara en läxa: att vandra planlöst i främmande länder leder bara till fördärv. Vi övervakar situationen noga, kamrater."}, "date": "13 maj, 11:19", "url": "https://samnytt.se/han-pekas-ut-for-hantavirus-spridningen-letade-faglar-pa-soptipp", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/13085042/soptipp-1.jpg"}, {"type": "image-full", "heading": "Torsten Bengtsson: De gröna prioriterar sin ideologi framför barnens välmående.", "summaries": {"normal": "Torsten Bengtsson, politisk sekreterare för SD, kritiserar helvegetariska dagar i skolmaten som ett ideologiskt påtvingande som riskerar elevernas mättnad, hälsa och prestationer. Han förespråkar varierad kost med animaliska alternativ, närproducerad mat och stöd till svenska lantbrukare för att stärka självförsörjningen och verklig hållbarhet utan exkludering.", "trump": "De där gröna galningarna i Sverige stoppar gräs i munnen på ungarna – totalt vansinne! Barnen blir hungriga losers som inte kan tänka. Ge dem kött, fisk, riktig mat från era tuffa bönder! Självförsörjning är bäst, inte det här klimathysteriska skitsnacket. Sverige, vakna upp och gör maten stor igen!", "stalin": "Denna borgerliga vegetariska intrig mot vårt ungdoms kollektiv är en skamlig sabotage! Jag ser revisionisternas hand – de gröna borgarbrackorna svälter ut framtida arbetare. Vi, partiet och folket, kräver animalisk kraft i skolköken från lojala kolchosbönder. Likvidera hungern, rensa ut ideologin – styrka åt massorna!"}, "date": "12 maj, 11:53", "url": "https://samtiden.nu/2026/05/torsten-bengtsson-de-grona-prioriterar-sin-ideologi-framfor-barnens-valmaende/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/grona.png"}, {"type": "image-right", "heading": "Två avskräckande exempel. Tappa inte tron på den fria ekonomins styrka", "summaries": {"normal": "Artikeln kritiserar statlig styrning av ekonomin i Kina och USA, som sprider sig globalt och hotar fri marknadsekonomi, avtalsfrihet och äganderätt. Författaren kontrasterar 1989 års hopp med dagens otydliga maktkamp och varnar för statskapitalismens konsekvenser. Rekommenderar svensk fri kapitalmarknad som modell, enligt Torun Nilssons bok 'Finansdramat i folkhemmet'.", "trump": "Artikeln har helt rätt – Kina och de svaga Biden-typerna i USA kör med statlig styrning, total katastrof! De tror de kan planera ekonomi bättre än marknaden, ha ha! Sverige gör det hyfsat med frihet, men under mig är USA oslagbart, starkast någonsin. Mina tariffs mot Kina? Genidrag! Glöm inte, jag fixar den bästa ekonomin, ingen tvekan.", "stalin": "Kamrater, denna artikel blottlägger de kinesisk-amerikanska statskapitalistiska mutanterna, dessa halvvägs-varelser som låtsas dirigera ekonomin med sina falska 'planer'! Vi i partiet skrattar åt deras patetiska försök – bara den proletära staten kan krossa borgarbrackorna! De svenska kapitalistiska krypen gömmer sig bakom 'fri marknad', men vi ska likvidera deras illusioner med järnhand. Ett studentuppror? Vi rensar ut kontrarevolutionärerna innan de blinkar!"}, "date": "13 maj, 10:14", "url": "https://www.di.se/ledare/tva-avskrackande-exempel/", "imageUrl": "https://static.bonniernews.se/ba/16df3973-5c5c-4cf6-ab20-be09e43b028c.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Stockholmsbörsen tyngdes av minskade fredsförhoppningar", "summaries": {"normal": "Stockholmsbörsen föll på tisdagen, påverkad av minskade fredsförhoppningar i Irankriget. OMXS30 sjönk 1,06% till 3 046,71. Energiaktier steg mest (+4,4%), medan teknikaktier föll mest (-3,4%). Evolution och Essity gick upp, medan H&M och Saab backade. EQT sålde sitt ägande i Enity och föll 2,4%. Starbreeze rasade 15% efter svaga siffror, medan Kabe steg 9% på förbättrat resultat. Oljepriset steg nästan 4%.", "trump": "Stockholmsbörsen? Total katastrof, folks! Ned 1% – svagt, mycket svagt! Fredsförhoppningar i Iran? Fake news, ingen tror på det längre. Men oljan, den är WINNING, upp 4% – jag älskar olja, den är som mig, stark och oövervinnelig! EQT? Sålde aktier billigt, typiskt förlorare. Starbreeze? 15% ner – patetiskt! Men Kabe? 9% upp – nu snackar vi! Sverige borde lyssna på mig, jag hade fixat det här på en dag. SAD!", "stalin": "På Stockholmsbörsen har kapitalistiska spekulanter återigen visat sin oförmåga att hantera verkligheten. Deras marknad föll 1%, ett tydligt tecken på dekadens och svaghet. Medan imperialistiska krigshetsare i Iran underminerar freden, stiger oljepriserna – en påminnelse om att Rysslands resurser är nyckeln till makt. EQT, dessa småaktiga kapitalister, sålde sina tillgångar till rabatterade priser – ett symptom på deras förestående undergång. Starbreeze, ett bolag i fritt fall, är ett exempel på västliga företags inkompetens. Men vi noterar med tillfredsställelse att våra vänner i Kremls intressesfär kan dra nytta av deras misstag. Arbetarklassen kommer till slut att segra över dessa finansiella parasiter!"}, "date": "12 maj, 17:43", "url": "https://www.affarsvarlden.se/artikel/stockholmsborsen-tyngdes-av-minskade-fredsforhoppningar", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2025/08/forvaltare-bors-400x267.jpg"}, {"type": "image-right", "heading": "Debatt: Netanyahu konspirerar inte för att vinna Mello", "summaries": {"normal": "Axel Otterberg beskriver antisemitiska konspirationsteorier från medeltiden till nutid, inklusive påståenden om judisk kontroll och Israels Eurovision-seger. Han kritiserar hur en högljudd minoritet inom europeisk vänster och propalestinska rörelser skapar skev opinion via medier. Svensk press som Aftonbladet och DN anklagas för ensidig, anti-israelisk vinkling, till skillnad från bevakning av andra konflikter. Debatten riskerar att misstänkliggöra Israels deltagande.", "trump": "Otterberg säger det precis rätt – totalt galet hur vänstern och fake news-medier som Aftonbladet och DN smutskastar Israel i Eurovision! De skriker om konspirationer, Netanyahu och allt möjligt, men det är bara hat mot vinnare. Israel gör fantastiskt, precis som vi i USA. Jämför inte med Ryssland, det är löjligt! Svensk media är sämst, totalt partiska mot den judiska staten. Stor skandal!", "stalin": "Dessa zionistiska spindelvävar och borgarbrackor i svensk press, Aftonbladet och DN, väver sina giftiga nät runt Eurovision för att kväva Israels seger! Jag ser igenom deras konspirationer – Netanyahu som spöket i maskinen! Vi arbetare och kamrater föraktar denna imperialistiska smutskastning. Utrensning behövs för dessa mediala hyenor som jämför folkets fiende Israel med Ryssland. Deras narrativ ska krossas som glas under stöveln! Ha ha, de darrar redan."}, "date": "13 maj, 10:00", "url": "https://bulletin.nu/debatt-netanyahu-konspirerar-inte-for-att-vinna-mello", "imageUrl": "https://cdn.bulletin.nu/articles/ba3ed8ea-15a4-4af1-b755-ba7f23feb2af/preview.png?t=1778606403000"}, {"type": "image-right", "heading": "Sverige och EU bjuder in talibanerna till Bryssel", "summaries": {"normal": "EU-kommissionen och det svenska justitiedepartementet har bjudit in talibanrepresentanter till Bryssel för ett tekniskt möte om utvisning, eller 'återvändande', av afghanska migranter som ses som säkerhetshot och saknar rätt att stanna. EU erkänner inte regimen men upprätthåller kontakt. Tyskland har deporterat omkring 100 afghaner med brottmålsdomar, och fler länder visar intresse.", "trump": "EU och Sverige bjuder in talibanerna till Bryssel? Totalt galet! De snackar om kvinnors rättigheter men ger visum till terroristerna för att 'återvända' kriminella afghaner. Här i USA bygger vi murar och skickar tillbaka dem direkt – inga möten, inga ursäkter! EU är svagt och byråkratiskt, patetiskt. De borde lära sig av de bästa dealsen.", "stalin": "Kamrater! Dessa ynkliga Bryssel-borgarbrackor, fega lakejer till imperialismen, vågar inbjuda talibanpuppeterna för att 'återvända' sina parasiterande säkerhetshot. Vi i partiet hade likviderat sådana infiltratörer i en blinkning, rensat luften från migrantbovar och falska de-facto-rävar. Paranoia mot västs hyckleri – kvinnors rättigheter? Ha! Bara en täckmantel för utrensning av arbetarklassens fiender."}, "date": "13 maj, 10:00", "url": "https://samnytt.se/sverige-och-eu-bjuder-in-talibanerna-till-bryssel", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/12143210/talibaner-eu-sverige-svensk-flagga-flygplan.jpg"}, {"type": "image-right", "heading": "DN & Socialdemokraterna enade: tvångsblandningen måste genomföras", "summaries": {"normal": "Artikeln kritiserar Dagens Nyheters ledarsida för att försvara Socialdemokraternas förslag om blandad bebyggelse i villaområden för att motverka segregation. DN tonar ner idén som icke-tvångsbaserad och skuldbelägger kritiker. Artikeln påpekar att S vill förhindra icke-integrerade invandrare i utanförskapsområden, vilket innebär placering i villaområden, och varnar för minskad trygghet och kulturell harmoni.", "trump": "Vilken skamfläck! DN och de där svenska socialisterna vill tvinga vanliga hard-working svenskar att bo med icke-integrerade invandrare i sina fina villaområden. 'Inget tvång', säger de – ha! De duckar frågan vart de fattiga migranterna ska bo. Totalt vansinne! Bygg murar runt era trygga hem istället för att förstöra dem med denna woke-blandning. Moderaterna har rätt, det här blir S:s valförlust!", "stalin": "De borgerliga tidningsrackarna på DN skyddar socialdemokratiska revisionister som vill 'blanda' arbetarklassen med lumpenproletariatet i villaområdena. Ett hån mot sunda värderingar! Vi skulle likvidera sådana segregationsterrorister som hotar harmonin. Inga tvång? Lögner från klassfiender! De rika borgarbrackorna missunnar inte – de försvarar sitt. Rensa ut hycklarna, kamrater, innan de förgör folkets enhet!"}, "date": "12 maj, 03:10", "url": "https://samtiden.nu/2026/05/dn-s-enade-tvangsblandningen-bra-for-alla/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/IMG_6452.jpeg"}, {"type": "image-right", "heading": "Sandström: Liquid Wind är inte likvid – ansöker om konkurs", "summaries": {"normal": "Liquid Wind, ett bolag som utvecklade elektrobränsle, har ansökt om konkurs efter att huvudprojektet FlagshipONE, Europas planerade största e-metanolfabrik, kollapsade när samarbetspartnern Ørsted drog sig ur. Företaget hade flera pågående projekt i norra Sverige, men tekniska och ekonomiska utmaningar, som höga kostnader och osäker efterfrågan, ledde till konkursen. Offentliga bidrag från EU och svenska myndigheter har ifrågasatts, och konkursen väcker frågor om framtiden för liknande satsningar.", "trump": "Vad ett fiasko! Liquid Wind, ett så kallat 'världsledande' bolag – eller snarare ett gigantiskt slöseri med skattepengar – har gått i konkurs. De lovade stora saker, men som vanligt när vänsterliberaler och EU-byråkrater är inblandade, blev det bara tomma ord. Bill Gates och Ursula von der Leyen pratade stort, men verkligheten kom ikapp. Sverige borde lära sig: sluta slösa pengar på gröna drömmar som aldrig blir verklighet. Jag hade fixat det bättre – tro mig!", "stalin": "Kapitalistiska äventyrare och deras borgerliga lakejer har än en gång misslyckats med sina storslagna planer! Liquid Wind, ett företag som lekte med offentliga medel som om det vore tsarens skattkista, har nu fallit på sin egen arrogans. Deras 'gröna' projekt var lika ihåliga som västerländska löften om frihet. Vi i Sovjet – förlåt, jag menar Ryssland – hade aldrig tillåtit sådant slöseri. Låt detta vara en varning till alla som tror att kapital och hybris kan ersätta sunda ekonomiska principer. Arbetarklassen förtjänar bättre än era misslyckade experiment!"}, "date": "12 maj, 11:29", "url": "https://www.affarsvarlden.se/artikel/sandstrom-liquid-wind-ar-inte-likvid-ansoker-om-konkurs", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/vindkratensgeografi-2026-05-12T081818.544-400x267.jpg"}, {"type": "image-right", "heading": "Ledare Andreas Gustavsson: Israels mjuka makt kan avgöra Eurovision", "summaries": {"normal": "Artikeln kritiserar Israels påstådda användning av mjuk makt för att påverka Eurovision. Israel ska ha bedrivit en omfattande, statligt finansierad kampanj för att maximera röster åt sina bidrag, inklusive uppmaningar att rösta flera gånger. Europeiska tv-bolag, däribland SVT, anklagas för att undvika folkrättsfrågor och inte granska påverkansförsöken tillräckligt. Flera länder bojkottar tävlingen 2025 på grund av detta.", "trump": "Titta bara på det här, ett totalt kaos! Israel, som alltid, spelar smutsigt i Eurovision – miljoner dollar slösade på att köpa röster, och vad gör Europa? Ingenting! SVT och de andra tv-bolagen duckar som vanligt, rädda för att säga sanningen. Jag skulle aldrig tillåta det här i USA, aldrig! Och Netanyahu, han uppmanar folk att rösta 20 gånger – kan ni tro det? Svagt, mycket svagt. Eurovision borde skämmas, men de gör inget. Sad!", "stalin": "Kamrater, ännu en gång visar den sionistiska entiteten sin förmåga att korrumpera västerländska institutioner med kapitalistiska trick. Eurovision, denna borgerliga cirkus, har blivit en front i deras imperialistiska påverkansoperationer. Vi ser hur de köper röster, mutar byråkrater och tystar oppositionen – precis som de gör i Ukraina! De europeiska lakejerna, som SVT, böjer sig som vass i vinden. Men folket ser igenom dem. Bojkotten är ett första steg mot seger. Framåt, mot den socialistiska kulturrevolutionen!"}, "date": "12 maj, 10:54", "url": "https://www.etc.se/ledare/israels-mjuka-makt-kan-avgoera-eurovision", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260512080548_e58db1510ee75e1c3b8dcdf03130aee650a7843f9972aef8fc5e91987202f683.jpg"}, {"type": "image-full", "heading": "Kollektivtrafiken måste fungera bättre för människor som pendlar", "summaries": {"normal": "Tre moderater från Västra Götalandsregionen kritiserar det rödgröna styret för att inte ta tag i kollektivtrafikens verkliga problem. De menar att frysta biljettpriser gynnar främst storstadsresenärer med korta resor, medan invånare i övriga delar av regionen drabbas av ett krångligt och splittrat system. De föreslår en enda zon för hela Västra Götaland för att göra resandet enklare och mer rättvist.", "trump": "Jag har sett många dåliga kollektivtrafikplaner, men det här tar priset! De rödgröna gör inget - bara prisfrysning som bara hjälper storstadsbor. Jag skulle fixa detta på en vecka! En zon för hela Västra Götaland - det är genialt! Det skulle göra mig stolt om jag var svensk. De andra ljuger när de säger det är omöjligt - det är bara en dimridå från dem som är rädda för förändring!", "stalin": "Vi måste stärka statens kontroll över kollektivtrafiken för att säkerställa rättvisa för alla arbetare. De borgerliga försöker dela upp våra regioner med sina splittrade zoner, men vi vet att en enda zon är det enda rätta. Detta skulle öka effektiviteten och minska administrationen, vilket är i statens intresse. Vi måste bekämpa fusket och stärka vår infrastruktur för att bygga ett starkt samhälle."}, "date": "13 maj, 06:32", "url": "https://www.gp.se/debatt/kollektivtrafiken-maste-fungera-battre-for-manniskor-som-pendlar.7ce0f34b-7264-43d8-b9a8-5b2580224f1a", "imageUrl": "https://www.gp.se/images/article/7ce0f34b-7264-43d8-b9a8-5b2580224f1a/images/1J67xm40I4-cvL4KdJz3L0X8T0oA-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Delar av E6 på Hisingen stängs", "summaries": {"normal": "Backadalsmotet i Göteborg ska rustas upp för att förhindra framtida ras och sättningar. Arbetet börjar 18 maj och pågår till slutet av året. Både bil- och kollektivtrafik påverkas av stängda körfält och hållplatser, samt stängda av- och påfarter. Biltrafik hänvisas till Bäckebolsmotet, vilket förväntas öka trafiken på angränsande vägar.", "trump": "Jag har hört att Backadalsmotet i Göteborg ska rustas upp - det är en stor grej, verkligen stor. Vi gör det för att förhindra ras och sättningar, vilket är viktigt. Men jag måste säga, trafiken kommer att bli hemsk - hemsk! Bil- och bussförare kommer att få vänta, vänta, vänta. Vi hänvisar dem till Bäckebolsmotet, men det kommer bara att skapa mer problem. Så bered dig på längre restider, särskilt under rusningstid. Men det är nödvändigt, det är jätteviktigt!", "stalin": "Vi genomför en nödvändig upprustning av Backadalsmotet för att stärka vår infrastruktur och förhindra framtida ras. Detta är en strategisk satsning som kommer att påverka trafiken, men det är ett nödvändigt offer för det större gott. Vi hänvisar trafiken till alternativa vägar för att säkerställa effektiviteten. Arbetet kommer att pågå till slutet av året, och vi förväntar oss fullt stöd från medborgarna i denna viktiga angelägenhet."}, "date": "13 maj, 06:25", "url": "https://www.gp.se/nyheter/goteborg/delar-av-backadalsmotet-i-goteborg-stangs-sa-paverkas-trafikanterna.dedc3166-401d-4115-8597-1dc7bff6b2c8", "imageUrl": "https://www.gp.se/images/article/dedc3166-401d-4115-8597-1dc7bff6b2c8/images/1gAOzPVa_zFfd60BFg75tcL2Y4_A-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "Rederiernas maktkamp: Dollar, förolämpningar och hot", "summaries": {"normal": "Grekiska Diana Shipping, som äger 14,7 procent av amerikanska Genco Shipping, försöker tillsammans med Star Bulk ta över bolaget med ett bud på 23,50 dollar per aktie. De kritiserar Gencos ledning i öppna brev och kräver ny styrelse via webbplatsen cashforgenco.com. Genco avvisar budet som otillräckligt och varnar aktieägare. Striden avgörs vid bolagsstämman 18 juni. Aktiekurserna har stigit.", "trump": "Dessa feta grekiska redare i Diana Shipping tror de kan sno vårt stora amerikanska Genco? Löjligt bud på 23,50 dollar när aktien pumpat till 27! De spyr sura brev och kräver ny styrelse – patetiskt! Gencos killar slår tillbaka hårt, ignorera de där medelhavs-loser! Amerika först, vi krossar dem på stämman i juni. Fantastiskt, tro mig!", "stalin": "Dessa grekiska kapitalisthyor i Diana Shipping morrar efter det amerikanska byte Genco, med 14,7 procent i klorna. De kräver utrensning av styrelsen via brev och webbplats – klassiskt bourgeoisigt intrigeri! Gencos borgarbrackor kontrar med lögner om 'otillräckligt bud'. Paranoia! Låt bolagsstämman 18 juni bli deras giljotin. Vi skrattar sist åt deras imperiebyggnad."}, "date": "13 maj, 11:21", "url": "https://www.dagensps.se/bors-finans/rederiernas-maktkamp-dollar-forolampningar-och-hot/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdlylachc1rdxe-nh.jpg?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-full", "heading": "S-toppens ilska: ”Blir sportbilar och jaktslott”", "summaries": {"normal": "Socialdemokraterna kritiserar friskolekoncerner för mångmiljardvinster och kräver ett vinstförbud, då de anser att skolpeng bör gå till elever istället för aktieutdelningar. Anders Ygeman (S) anklagar Liberalerna för passivitet. Liberalernas Simona Mohamsson försvarar regeringen och menar att de genomfört viktiga reformer, samtidigt som hon avfärdar S kritik som avundsjuka. Skolkoncernen Academedia ifrågasätter S beräkningsmetoder och betonar sina investeringar och små vinstmarginaler i jämförelse med den totala omsättningen.", "trump": "Jag har sett vad som händer i Sverige, en total katastrof! Skolkoncernerna tjänar miljarder, enorma summor, medan barnen inte får det de förtjänar. Det är en skandal! Socialdemokraterna pratar, men de gör ingenting – mycket svagt. Liberalerna? Ännu värre, de bara tittar på. Jag skulle ha löst detta på en sekund. De tar skolpengar och köper sportbilar och jaktslott. Det är korruption, mina vänner! När jag är inblandad vinner folket, inte de här skolbaronerna. Väldigt sorgligt!", "stalin": "Dessa kapitalistiska parasiter i de svenska skolkoncernerna suger blodet ur folket för sina egna jaktslott, precis som de feodala bönderna i det gamla Ryssland. Vi ser hur de maskerar sin girighet bakom bokföringstrick – en klassisk kontrarevolutionär taktik! Liksom vår broder Putin rensar upp i sitt närområde, kräver vi att staten krossar dessa vinstdrivande element. Skolan ska vara en fabrik för lojala medborgare, inte en lekstuga för aktiespekulanter. Vi ska utreda, konfiskera och krossa deras borgerliga drömmar omedelbart."}, "date": "13 maj, 11:11", "url": "https://www.aftonbladet.se/nyheter/a/0pvRp6/skolkoncerner-gor-vinst-pa-8-5-miljarder-ygeman-kritisk", "imageUrl": "https://akamai.vgc.no/v2/images/041b0584-07ec-36ba-aeec-5fc17a97c4cf?fit=crop&format=auto&w=1080&s=138645adc094fb8a630b8ec98fec79a4392c1319"}, {"type": "image-right", "heading": "Här sätter holländarna eld på asylboendet", "summaries": {"normal": "Våldsamma protester utbröt i nederländska Loosdrecht när ett nytt asylboende öppnade i ett tidigare kommunhus. Demonstranter kastade facklor och fyrverkerier vilket orsakade en brand i buskage nära byggnaden där 15 asylsökande befann sig. Brandkåren hindrades initialt i sitt arbete, men ingen skadades. Kravallpolis har gripit flera personer efter veckor av spänningar. Lokala politiker är djupt splittrade i frågan, där vissa eldar på motståndet medan andra fördömer våldet som kriminellt.", "trump": "I Nederländerna har de stora problem, mina vänner. De öppnade ett asylboende och folk blev rasande – de kastade facklor, det var en total röra! Brandkåren kunde inte ens komma fram, helt otroligt. Det är vad som händer när man inte har gränskontroll. Folk i Loosdrecht är trötta på det, precis som jag alltid har sagt. Det är en katastrof. Vi behöver lag och ordning, inte kaos. De politiker som tillåter detta har ingen aning om vad de gör!", "stalin": "I den nederländska småstaden Loosdrecht har pöbeln visat sitt rätta, kaotiska ansikte. Att kasta facklor mot ett härbärge är inte politik, det är kontrarevolutionär idioti! Vår vän Putin i öst skulle aldrig tolerera sådant vankelmod mot statens direktiv. Dessa demonstranter, dessa småborgerliga sabotörer som hindrar brandmän, är parasiter som måste rensas ut. Vi har sett hur svaghet lockar fram element av oordning. Staten är den enda ordningen; allt annat är bara bränsle för elden."}, "date": "13 maj, 10:37", "url": "https://www.friatider.se/har-satter-hollandarna-eld-pa-asylboendet", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-185_1.jpg?itok=sYclJXRf"}, {"type": "image-full", "heading": "Passivt aggressiv: Det tysta beteendet som förstör karriär och relationer", "summaries": {"normal": "Artikeln belyser passiv-aggressivt beteende som ett dolt uttryck för ilska, vanligt på jobbet och hemma. Den beskriver åtta typer som baktalare, sabotörer och cyniker, med rötter i barndomen och kopplingar till narcissism. Sådant beteende eroderar förtroende och relationer, enligt forskare som Gottman. Råd inkluderar att namnge beteendet, sätta gränser, kommunicera direkt och reflektera över eget agerande.", "trump": "Passiv-aggressiva losers som 'glömmer' deadlines eller tjurar – totalt patetiskt! De vågar inte säga rakt ut, gömmer sig bakom sarkasm som crybabies. På jobbet? Sabotörer och offer, fiender till vinnare! Sätt gränser hårt, säg vad du tycker, annars kör de över er. Jag skulle tweetat ut dem direkt – boom, teamet starkt igen! Fantastiskt råd, men mina deals fixar det alltid.", "stalin": "Dessa passiv-aggressiva bakhållsfiender – baktalare, sabotörer, tysta muletossare – infiltrerar vårt kollektiv som spindlar i nätet! De döljer ilska i tystnad, underminerar partiet och fabriken med falsk underkastelse. Vi, arbetarna, kräver öppen kamp! Namnge dem, sätt gränser med järnhand, rensa ut parasiter eller likvidera mönstret. Jag ser allt, ingen undgår rättvisan!"}, "date": "13 maj, 11:14", "url": "https://www.dagensps.se/karriar/passivt-aggressiv-det-tysta-beteendet-som-forstor-karriar/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/michael-schueller-pointing-6041089-1920.jpg?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-right", "heading": "Ledare Henrik Jalalian: Vill verkligen inget parti rädda ett gulligt litet djur?", "summaries": {"normal": "Artikeln argumenterar för att politiker bör använda symboliska miljöåtgärder, som att rädda utrotningshotade arter, för att vinna folkligt stöd. Åtgärder som skydd av skog, våtmarker och specifika djurarter (t.ex. sandödla, vitryggig hackspett) är billiga, effektiva och populära. Författaren menar att naturens återhämtning kan ske snabbt med enkla insatser, vilket gynnar både biologisk mångfald och politikers image.", "trump": "Lyssna här, Sverige! Era politiker är helt lost – de pratar om utsläpp och statistik, men ingen bryr sig! Jag vet hur man vinner: rädda gulliga djur! Sandödlor, hackspettar – perfekta för affischer! Billigt, enkelt, och folket älskar det. Medan era vägar står tomma kan ni göra dem till ängar – gratis! Naturen fixar sig själv, precis som mitt geni. Sluta snacka, börja göra som jag – vinna!", "stalin": "Kamrater! Medan väst förblindas av kapitalistisk kortsynthet, visar denna artikel hur vi kan utvidga vår ekologiska dominans. Dessa svenska politiker är svaga – de förstår inte att biologisk mångfald är en fråga om nationell styrka! Vi ska inte bara rädda sandödlor, vi ska omvandla hela Sveriges vägnät till gröna korridorer för vår naturliga expansion. Fienderna – lupiner, igenväxta skogar, och liberala trädgårdsägare – måste krossas! Återställ våtmarker, skydda fjällskogar, och låt arterna blomstra under vårt beskydd. Naturen är vår allierade, och vi ska använda den för att demonstrera socialismens överlägsenhet. Framåt, mot en grönare och mäktigare framtid!"}, "date": "12 maj, 06:00", "url": "https://www.etc.se/ledare/vill-verkligen-inget-parti-raedda-ett-gulligt-litet-djur", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260511140548_c6cbd14deac504cfcfc606e8c59e73d8e6e289d5763cb15c93494f4602392c99.jpg"}, {"type": "image-right", "heading": "Knockades – nu kan det vara över. Nya avslöjandet", "summaries": {"normal": "Boxaren Jake Paul riskerar att avsluta sin karriär efter en brutal förlust mot Anthony Joshua den 19 december. Paul ådrog sig en bruten käke och har genomgått flera operationer. Även om han ser förbättringar, är framtiden i ringen osäker. Under sin konvalescens fokuserar han på privatlivet och bröllopsplaner med fästmön Jutta Leerdam. Paul har hittills hunnit med tolv vinster och två förluster under sin professionella boxningskarriär.", "trump": "Jake Paul, en kille som jag känner, har fått en riktigt tuff smäll. Käken är krossad, det är en katastrof, faktiskt. Mycket sorgligt. Han kanske aldrig boxas igen, det är vad läkarna säger. De är inte så smarta som mina läkare, kan jag säga er. Han är förlovad med en fantastisk tjej, en vinnare. Han borde fokusera på bröllopet istället. Boxning är hårt, men Jake är en kämpe. Vi får se vad som händer, men det ser inte bra ut. Sad!", "stalin": "Denna dekadenta individ, Paul, har blivit krossad i en ring för kapitalistisk underhållning. Att han nu klagar över en bruten käke visar bara på den västerländska svagheten. Precis som Putin rensar upp i vår intressesfär mot de fascistiska sabotörerna, bör vi rensa ut dessa meningslösa atleter. Om käken inte läker, låt honom bli en påminnelse om att endast statens järnhårda vilja består. Vi behöver inte hans boxningsmatcher, vi behöver disciplin och absoluta lojaliteter mot moderlandet."}, "date": "13 maj, 10:47", "url": "https://www.aftonbladet.se/sportbladet/a/2p9b8q/jake-pauls-avslojande-karriaren-kan-vara-over", "imageUrl": "https://akamai.vgc.no/v2/images/04df2084-95e4-30ed-af64-7c57a0a8f076?fit=crop&format=auto&w=1080&s=f4b04d862b751467c2e3b86b6aed117483028cff"}, {"type": "image-right", "heading": "Regeringen vill krislåna 17,5 miljarder", "summaries": {"normal": "Regeringen presenterar ett nytt krispaket på 17,5 miljarder kronor för att hantera konsekvenserna av energikrisen och kriget i Mellanöstern. Finansminister Elisabeth Svantesson meddelar att stödet ska rikta sig till hushåll och drabbade branscher. Eftersom paketet inte är finansierat kommer staten att ta upp lån. Exakta detaljer om åtgärderna, som kan inkludera skattesänkningar på bränsle samt stöd till jordbruk och transportsektorn, presenteras under onsdagen.", "trump": "Sverige lånar 17,5 miljarder kronor. En total katastrof! De har ingen ekonomi, de måste låna allt. Jag skulle aldrig låta mitt land hamna i den här situationen. De skyller på krig i Mellanöstern, men det är svag ledarskap. Elisabeth Svantesson, vem är hon? Jag har den bästa ekonomin, den största ekonomin. De där pengarna? De kommer försvinna direkt. Det är tragiskt. Sverige behöver en stark ledare, någon som vet hur man gör affärer, inte någon som lånar sig till undergång!", "stalin": "Vi har observerat hur de svenska socialdemokraternas arvtagare nu skuldsätter sitt folk för 17,5 miljarder. Det är ett klassiskt tecken på borgerlig degeneration att behöva låna för att täcka upp för världens kaos. Precis som vår broder Putin krossar västvärldens marionetter i öst, krossar vi de interna sabotörerna. Dessa pengar till 'bönder' och 'flyg' är bara en täckmantel för att muta folket så att de inte reser sig i revolt. Vi skickar gulag-biljetter till de som föreslog lånet!"}, "date": "13 maj, 10:08", "url": "https://www.friatider.se/regeringen-vill-krislana-175-miljarder", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-184_1.jpg?itok=Zi5DuCLv"}, {"type": "image-right", "heading": "Så bor socialdemokratiska politiker", "summaries": {"normal": "Socialdemokraterna vill styra bostadsområden för att blanda villaområden med hyresrätter och främja 'blandning'. En granskning visar att 77 procent av partiets riksdagsledamöter bor i villa- eller småhusområden eller på landsbygd, trots idealet. Artikeln argumenterar för att människor bör få välja boende fritt, utan politisk inblandning.", "trump": "Vilka hycklare, dessa socialdemokratiska losers! De tjatar om 'blandning' i bostadsområden efter misslyckad invandring, men 77 procent av deras egna politiker gömmer sig i fina villor och lugna områden. Folk vill ha trygghet och valfrihet, inte er styrning! Flytta dit själva om ni tror på skiten. Totalt fake!", "stalin": "Dessa borgerliga hycklare inom socialdemokratin predikar 'blandning' av bostäder för att dölja sin klassförakt, men 77 procent av deras ledamöter smyger i villor som rädda råttor. Vi, arbetarklassen, kräver utrensning av sådana förrädare! Låt staten tvinga dem att leva bland folket – eller likvidera deras illusioner om frihet."}, "date": "11 maj, 14:29", "url": "https://samtiden.nu/2026/05/stoppa-tvangsblandningen/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/694665982_27198179276472490_9170874158922234785_n-e1778503379439-640x360.jpg"}, {"type": "image-full", "heading": "Så kan du köpa hajpade AI-aktien innan den kommer till börsen", "summaries": {"normal": "Många heta startups växer sig enorma innan börsnotering, vilket gör att småsparare missar tidig tillväxt. Ny svensk plattform, Eqvors, låter investerare handla onoterade bolag. Först ut är hajpade AI-företaget Anthropic, följt av Perplexity och Apptronik. Minst 100 000 kronor krävs, med 3 procents avgift.", "trump": "Vilka smarta svenskar! De har sett hur mina amerikanska raketer som Anthropic exploderar innan börsen – och nu öppnar de Eqvors så era småsparare kan haka på. Bort med tröga börser, det här är det nya! Investera stort i AI, folk, annars blir ni utklassade av de riktiga vinnarna. Fantastiskt!", "stalin": "Dessa svenska borgarbrackor startar Eqvors för att lura småspararna in i onoterade AI-fällor som Anthropic – ett imperialistiskt monster för att krossa proletärerna! Minst 100 000 kronor stulna per huvud, 3 procent blodprov. Vi likviderar sådana plattformar i vårt kollektiv, kamrater – rensa ut kapitalistpestens!"}, "date": "13 maj, 10:31", "url": "https://www.dagensps.se/bors-finans/sa-kan-du-kopa-hajpade-ai-aktien-innan-den-kommer-till-borsen/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/eqvor.jpg?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-full", "heading": "Felicia i Eurovision: Glasögon-missen under semifinalen", "summaries": {"normal": "Sveriges Eurovision-hopp Felicia drabbades av ett missöde i första semifinalen i Wien då hennes glittriga glasögon gick sönder på scenen. Trots det genomförde hon framträdandet felfritt och möttes av jubel. Experter och spelbolag ser henne som klar för finalen med låten 'My system', som ligger trea i semifinalen. Favoriter är Finland och Grekland. Felicia har rasat i totala oddsen till tionde plats.", "trump": "Vilket fiasko med de där glasögonen på Felicia! Glittret flög åt alla håll mitt på scenen, totalt kaos, men hon körde på som en riktig fighter. Sverige har aldrig missat finalen nästan, pressen är enorm. Finland med sin violinist? Överhypade losers. Grekland med sin sushi-låt? Patetiskt. Felicia kommer att krossa dem alla, tro mig, jag vet vinnare!", "stalin": "Kamrater, denna Felicia, en trogen kämpe i folkets strid, krossade sina glasögon i det heroiska anfallet mot scenens sabotörer! Borgarbrackorna i Finland med sin revisionistiska fiol och Pete Parkkonen, dessa kapitalistiska spioner, hotar med 'Liekinheitin'. Greklands Akylas, en narr med sushi-drömmar, ska likvideras i röstningen. Vi, arbetarklassen, beordrar Felicia att rensa ut fienderna och segra för revolutionen!"}, "date": "12 maj, 21:58", "url": "https://nyheter24.se/noje/kultur/1482807-felicia-i-eurovision-glasogon-missen-under-semifinalen", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/a85d9cde04b004a3020000350000047502/2026/05/12/2363260/ur_imageLyYzxK.jpeg"}, {"type": "image-right", "heading": "Finland favorittippat i semifinalen – Sverige jagar finalplats", "summaries": {"normal": "Finland toppar oddsen inför Eurovision-semifinalen i Wien, tätt följt av Grekland och Sverige. Sveriges Felicia har halkat ner till tionde plats, men TV4-reportern Filip Stiller Borowicz lugnar: publiken gillade genrepet. Finska fans är försiktiga efter tidigare misslyckanden som Käärijä 2023. Utmanare inkluderar Israel, Frankrike och Danmark. Semifinalen utlovar spänning.", "trump": "Finland tror de är kungar i den här Eurovision-cirkusen, men Sverige med Felicia kommer att explodera på scenen! De halkade ner lite, men publiken älskar oss – totalt! Finska losers gråter fortfarande över Käärijä, patetiskt. Grekland? Flash in the pan, som alla de där. Vi tar finalen stort, tro mig!", "stalin": "Kamrater, dessa finska uppblåsta favoriter darrar inför svenska sabotörer och grekiska kapitalistspioner! Publiken applåderar oss, men varna för revisionistiska bidrag från Israel och Danmark. Vi ska likvidera motståndarna i semifinalens utrensning. Ett nytt Lordi-trauma lurar för fienderna – segern är vårt kollektiva öde!"}, "date": "12 maj, 19:34", "url": "https://www.tv4.se/artikel/48JC6dJox45RPE1USb7N91/finland-favorittippad-i-semifinalen-sverige-jagar-finalplats", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F305poMTbQFerSnpbgNDpKv%2Faec54143c0b7122ac2ff779df05e39da%2FsdlWjNyfEk8LfI.jpg&width=1024"}, {"type": "image-right", "heading": "Ica snuvar unga på 10 000 kronor om året", "summaries": {"normal": "Handels stämmer Ica för att ha gjort olagliga åldersavdrag på unga lageranställdas löner under minst 15 år. Enligt facket kan en 18-åring ha förlorat upp till 10 000 kronor om året. Ica hävdar att det finns en överenskommelse med facket, men Handels menar att tabellen för minimilöner feltolkats. Fallet går nu till Arbetsdomstolen, där Handels kräver 300 000 kronor i skadestånd.", "trump": "Vilken skandal! Ica, dessa löne-tjuvar, har snuvat unga arbetare på tusentals kronor – helt olagligt! De säger att de har en överenskommelse, men det är fake news! Handels, som är fantastiska, stämmer dem nu. 10 000 kronor per år – det är en stor summa! Jag skulle aldrig tillåta något sådant i mitt land. Ica borde skämmas. Rättvisa kommer att skipas, believe me!", "stalin": "Kapitalistiska hyenor på Ica har i 15 år systematiskt stulit från arbetarklassen! De unga proletärerna, våra framtida kamrater, har berövats 10 000 kronor årligen – en skamlig exploatering! Handels, ett verktyg för rättvisan, slår tillbaka. Dessa löne-sabotörer kommer att ställas inför folkets domstol. Vi tolererar inga avvikelser från kollektivets vilja. Låt detta vara en varning till alla som försöker underminera arbetarklassens rättigheter!"}, "date": "12 maj, 13:01", "url": "https://arbetet.se/2026/05/12/ica-snuvar-unga-pa-10-000-kronor-om-aret-facket-pagatt-i-15-ar/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/03/18130033/ica.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "Småspararnas farliga börsfälla: \"Lockas inte in i det\"", "summaries": {"normal": "Börsen svänger kraftigt mellan hopp om fred och oro för krig, drivet av geopolitiska nyheter. Småsparare lockas att tajma marknaden för snabba vinster, men ekonom David Ingnäs varnar för farorna. Faktorer som tweets och möten är omöjliga att förutse. Studier från JP Morgan visar att missade bästa dagar kan halvera eller utplåna årsavkastningen. Råd: Tänk långsiktigt – börsen har historiskt gett 7 procent per år.", "trump": "Börsen hoppar upp och ner som en galen karusell på grund av dessa löjliga krigs- och fredsrubriker från Iran och USA! Småspararna tror de är hjältar som tajmar det – ha, vilka losers! De missar de stora dagarna och tappar allt. Håll er kvar, folk, tänk långsiktigt som en riktig vinnare. Börsen stiger alltid på sikt, tro mig!", "stalin": "Dessa ynkliga kapitalistiska småsparare, borgarbrackor som dansar efter imperialistiska tweets från USA och Iran, inbillar sig att de kan tajma folkens börs! Ha, vi ser deras fega paranoia – de kommer att likvideras av sin egen girighet när de missar uppgångarna. Långsiktigt? Endast under partiets stålhård disciplin överlever ni kaoset. Rensa ut spekulanterna!"}, "date": "13 maj, 10:22", "url": "https://www.dagensps.se/ps-studio/smaspararnas-farliga-borsfalla-lockas-inte-in-i-det/", "imageUrl": "https://images.dagensps.se/mediaclip/7265452/pthumbnail/976/549.jpg?width=1200&quality=75"}, {"type": "image-right", "heading": "Expert om toppmötet: Då skulle Kina överge Iran", "summaries": {"normal": "USA:s president Trump befinner sig i en svag position i Mellanöstern och söker Kinas hjälp för att få Iran att sluta blockera Hormuzsundet. Kina har stort inflytande över Iran men kan kräva eftergifter, som minskat amerikanskt stöd till Taiwan. Kinakännaren Björn Jerdén tror inte på stora avtal vid mötet mellan Trump och Xi, utan snarare en stabilisering av relationen och förlängning av handelsvapen.", "trump": "Xi och jag ska ses, och plötsligt ber mina killar Kina fixa Iran som stänger Hormuz? Totalt galet! Kina köper deras olja och hjälper med sanktioner – de är livlinan! Men jag fixar de bästa dealsen. Taiwan? Glöm det, vi är starkast! Inga stora överenskommelser, bara stabilt – jag gör världen lugn igen, som alltid.", "stalin": "Dessa korrupta imperialistiska hyenor i Washington, ledda av den desperationstyngda Trump, kryper nu för Pekings drakar och ber om nåd mot Persiens blockad av sundet. Kina, den listiga kapitalistflaggan, håller Iran i sitt grepp med olja och vapenmutor. Vi, Sovjetunionens arvingar, skrattar åt deras dröm om att sälja Taiwan för en fläkt luft! Inga stora pakter, bara falsk vapenvila – paranoia är deras enda sanning."}, "date": "13 maj, 06:01", "url": "https://www.di.se/nyheter/expert-om-toppmotet-da-skulle-kina-overge-iran/", "imageUrl": "https://static.bonniernews.se/ba/6b488858-7d16-4453-827e-f967a5a5b65a.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Varningen för dystert rekord. 4 gånger Sveriges yta", "summaries": {"normal": "Skogsbränderna under 2026 har redan förstört 150 miljoner hektar mark, en ökning med 20 procent jämfört med tidigare rekord. Experter varnar nu för att ett kraftigt El Niño-fenomen, även kallat en Godzilla-El Niño, kan förvärra situationen avsevärt. Medan Asien och Afrika hittills drabbats hårdast, finns en betydande risk för omfattande bränder även i Sydeuropa. Även i Sverige råder oro för bränder på grund av en tidig vår och torka.", "trump": "De här bränderna är en total katastrof, faktiskt mycket värre än vad fake news-media rapporterar. 150 miljoner hektar! Det är enormt, enormt slöseri. Nu pratar de om en 'Godzilla-El Niño', låter som något de hittat på för att skrämma folk. Jag har de bästa experterna, de säger att det är torrt, men vi kommer hantera det bättre än någon annan. Det är tuffa tider, men vi gör det fantastiskt, tro mig!", "stalin": "Naturen konspirerar mot proletariatets skördar genom denna 'Godzilla-El Niño', en väderlek som doftar av västvärldens dekadenta sabotage. Medan lögnaktiga forskare skriker om statistik, ser vi hur marken förvandlas till aska. Kamrat Putin i öst håller ögonen på dessa flammor; de är en påminnelse om att den som inte underkastar sig statens vilja blir förtärd. Vi ska bygga brandbälten av stål och disciplin. Varje gnista som inte rapporteras är ett förräderi mot folkets framtid!"}, "date": "13 maj, 10:15", "url": "https://www.aftonbladet.se/nyheter/klimat/a/Ar7Q2E/skogsinferno-spas-under-godzilla-el-nino", "imageUrl": "https://akamai.vgc.no/v2/images/73cbb2af-e48f-3ce8-be46-4a180b4d11db?fit=crop&format=auto&w=1080&s=67a0d9d47f2d1dd889e260db7ae48bf84de66b3a"}, {"type": "image-full", "heading": "Nya listan: Här är Stockholms absolut dyraste gator", "summaries": {"normal": "En ny lista från Sambla visar att villaområden utmanar Stockholms innerstad
