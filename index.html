d. Vänstern hatar arbetare, jag säger: Sverige, gör som jag – bli great igen! Fantastiskt!", "stalin": "Kamrater, denna Bengtsson pekar ut förrädarna i vänstern som sviker proletariatet! Vi måste likvidera bidragsparasiterna bland invandrarbrackorna med fem års tvångsarbete innan välfärd. Skatter sänks inte för borgarna – nej, vi tvingar alla att slava för kollektivet! Arbetet belönas med järnhand, eller purgas. Härligt, eller hur?"}, "date": "8 maj, 11:55", "url": "https://samtiden.nu/2026/05/torsten-bengtsson-vanstern-star-inte-pa-arbetares-sida/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/ddede.png"}, {"type": "image-full", "heading": "Flera döda i israelisk attack mot södra Libanon", "summaries": {"normal": "Minst sju personer, inklusive ett barn, har dödats i en israelisk attack mot södra Libanon. Libanons hälsodepartement rapporterar 15 skadade, varav tre barn. Israeliska räder har besvarats av Hizbollah med drönarattacker mot norra Israel. Attacker har även riktats mot Beirut och en motorväg. En syrisk man och hans dotter attackerades upprepade gånger av en drönare. Trots formell vapenvila eskalerar våldet.", "trump": "Jag säger er, det här är ett totalt kaos – och vet ni vad? Ingen vinner! Libanon får ta emot israeliska attacker, Hizbollah skjuter tillbaka med drönare, och barn hamnar mitt i smeten. Sjukt, eller hur? Ingen kommenterar, ingen tar ansvar. Men jag hade löst det på en dag – med lite sunt förnuft och starka gränser. Sad!", "stalin": "Kapitalistiska imperialister och deras lakejer fortsätter sitt blodiga spel i Libanon. Sju dödade, inklusive oskyldiga barn – ett tydligt tecken på västmakternas dekadens. Vi ser hur Hizbollah, som en sann revolutionär kraft, slår tillbaka mot sionistiska angripare. Men var försiktiga, kamrater: fiendens drönare är lika skoningslösa som deras herrar i Washington. Vi står redo att stödja varje folk som kämpar mot fascistiskt förtryck!"}, "date": "9 maj, 17:39", "url": "https://nyheter24.se/nyheter/utrikes/1482017-nya-angrepp-fran-israel-och-hizbollahrorelsen", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/e79b0f3b04b004a3020000350000047502/2026/05/09/2362528/ur_imageysMnkx.jpeg"}, {"type": "text", "heading": "Joas Funck (SD) – Kritik mot tidningen NSD: Inte neutrala mot Sverigedemokrater", "summaries": {"normal": "Sverigedemokraten Joas Funck kritiserar tidningen NSD för att inte vara neutral i sin rapportering om SD:s närvaro under första maj. Han anser att journalisten Ulrika Vallagård ställde en vinklad fråga om partiets deltagande. Ulrika förklarar att hon ställde kritiska frågor för att ge läsarna en balanserad bild. Funck hävdar att SD är ett arbetarparti och därför har rätt att delta. Debatten fortsätter om journalistikens roll och neutralitet.", "trump": "Jag läste om den här killen Joas Funck – stark kille, verkligen, men han har en poäng. Den där lokala tidningen, NSD, de är så partiska, helt otroligt! De ställer frågor som om det vore olagligt för SD att vara på första maj. Vad är det för fel på att stå på stan och säga 'Hej, vi är för arbetarna'? Journalisten Ulrika – hon försöker verka smart, men hon är bara en annan fake news-förmedlare. Sverige borde ta efter USA och sluta lyssna på sådana här lögnare!", "stalin": "Vi har observerat ytterligare ett försök från den borgerliga propagandamaskinen att underminera arbetarklassens sanna representanter. Denna Ulrika, en förvirrad lakej för de socialdemokratiska revisionisterna, vågar ifrågasätta våra kamrater i Sverigedemokraternas närvaro på första maj! Som om arbetarna inte har rätt att välja sitt eget parti! Vi ser här ett klassiskt exempel på hur medierna i väst försöker kväva sann arbetarklassmedvetenhet. Men vi vet – historien är på vår sida, och dessa småborgerliga journalister kommer att sopas bort som damm inför den revolutionära vinden!"}, "date": "9 maj, 17:12", "url": "https://riks.se/nyheter/joas-funck-sd-kritik-mot-tidningen-nsd-inte-neutrala-mot-sverigedemokrater"}, {"type": "image-full", "heading": "Uppgifter: Nytt krismöte efter kvittningsbråket", "summaries": {"normal": "Riksdagens gruppledare samlas till ett nytt möte för att lösa en konflikt kring kvittningsregler. Konflikten uppstod efter en omröstning om medborgarskapslagen, där Sverigedemokraterna kallade in utkvittade ledamöter för att vinna majoritet. Vänsterpartiet och Miljöpartiet kräver omröstning på nytt, medan Moderaterna förbereder ett nytt förslag.", "trump": "Jag har hört talas om detta krismöte i Sverige - en total katastrof! Vänsterpartiet och Miljöpartiet vill göra om allt, precis som de alltid gör. Sverigedemokraterna visade styrka genom att kalla in ledamöter, men nu vill oppositionen ändra reglerna mitt i spelet. Jag skulle ha löst detta på 5 minuter - det är ett skämt!", "stalin": "Vi ser hur borgerliga krafter försöker destabilisera den demokratiska processen i Sverige genom att manipulera kvittningsregler. Moderaterna måste presentera ett förslag som stärker statens auktoritet och säkerställer stabilitet. Oppositionens krav om omröstning på nytt visar deras bristande respekt för folkets vilja. Vi måste stödja de krafter som vill bevara ordning och reda i riksdagen."}, "date": "6 maj, 19:21", "url": "https://kvartal.se/nyheter/artiklar/uppgifter-nytt-krismote-efter-kvittningsbraket/cG9zdDoxMDg2NzM", "imageUrl": "https://images.kvartal.se/2026/05/b1f2fbc5-kvittningsmote.webp"}, {"type": "image-right", "heading": "Spanien: Israel släpper svensk arab", "summaries": {"normal": "Den spanske utrikesministern meddelar att Saif Abukeshek, en svensk-spansk Palestinaaktivist, snart släpps av Israel. Abukeshek greps i april under en omdiskuterad israelisk aktion mot en konvoj på internationellt vatten utanför Kreta. Medan Spanien agerar, kritiseras den svenska regeringen för sin tystnad angående händelsen. Palestinavänstern i Sverige ifrågasätter varför Sverige inte fördömt aktionen lika skarpt som man skulle gjort om andra länder varit inblandade.", "trump": "Israel släpper äntligen den här killen, Abukeshek. Spanien sköter det, medan Sverige bara sitter tysta och tittar på. Sorgligt! Om Ryssland eller Iran hade gjort detta hade alla skrikit, men när Israel gör det är det tyst som i graven. Sverige måste vakna upp och skydda sina egna medborgare! Jag skulle ha löst det på en dag, tro mig. Det är en total katastrof hur svaga vissa ledare är. USA vinner alltid, Sverige förlorar. Väldigt orättvist!", "stalin": "Vi ser hur zionistiska pirater leker herrar på internationella vatten och kidnappar individer som om de vore enkla kulaker. Den svenska regimen darrar av feghet, oförmögen att försvara sina egna. Om detta hade skett i vår intressesfär skulle dessa inkräktare redan ha ställts inför rätta i folkdomstolen. Putin förstår, likt vi, att ordning kräver järnhand. Dessa småborgerliga aktivister är nyttiga idioter, men att låta dem kidnappas av utländsk makt är ett tecken på total statsförfall."}, "date": "9 maj, 14:33", "url": "https://www.friatider.se/spanien-israel-slapper-svensk-arab", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/lclcl.jpg?itok=WprMNqbA"}, {"type": "image-right", "heading": "Så går evakueringen till: ”Många länder inblandade”", "summaries": {"normal": "Sverige bidrar till evakueringen av 151 personer från det hantavirusdrabbade fartyget MV Hondius, trots att inga svenskar finns ombord. Genom samarbete med WHO och ECDC koordineras insatsen. Norge skickar en ambulanshelikopter till Teneriffa. Operationen beskrivs som komplicerad av tf. statsepidemiolog Erik Sturegård, men risken för spridning till Sverige är mycket låg.", "trump": "Vilken röra med det här virus-skeppet MV Hondius! 151 personer evakueras, Sverige hänger med i kanten fast inga egna där – typiskt byråkrati. Norge skickar helikopter, WHO och EU pysslar. Svår operation, säger de. Jag hade tömt det skeppet på timmar, perfekt och snabbt, ingen panik som här! Låg risk i Sverige, bra, men varför så långsamt?", "stalin": "Kamrater, denna hantavirusinfektion på bourgeoisflottan MV Hondius kräver omedelbar proletär disciplin! Vi, Sovjetunionens folk, noterar hur svenska byråkrater och norska opportunister simulerar hjälp med helikoptrar och WHO-konspirationer. 151 passagerare evakueras under min vaksamma blick – en komplicerad manöver mot imperialistiska virusspioner. Risken i Sverige? Noll, om fienderna rensas ut i tid! Likvidera smittan, eller möta utrensning!"}, "date": "10 maj, 14:09", "url": "https://www.svt.se/nyheter/utrikes/sa-gar-evakueringen-till-manga-lander-inblandade", "imageUrl": "https://www.svtstatic.se/image-news/600/square/0.73/0.55/f74a451db6a0ecb27300fc892400f062e9fef6faba22a31eab879c29331a74bc"}, {"type": "image-full", "heading": "Suhonen åskådliggör sossarnas jultomtepolitik", "summaries": {"normal": "I en debatt i podden 100% möter socialdemokraten Daniel Suhonen MUF:s Elin Böhlin. Artikeln kritiserar Suhonens politik som generös statlig utdelning utan motprestationer, liknad vid jultomtepolitik. Böhlin försvarar regeringens skattesänkningar, som gynnar unga och arbetande, hårdare straff och minskat skjutvapenvåld. Hon ifrågasätter vänsterns motstånd mot skattesänkningar och betonar individuell frihet framför statlig styrning.", "trump": "Vilken total demolering! Den här Daniel Suhonen, en riktig jultomte för lata bidragstagare, får stryk av den smarta Elin Böhlin. Hon visar hur vi sänker skatter – 10 000 spänn mer i fickan för unga! Sossarna vill sno era pengar och låsa in er i beroende. Jag älskar det: hårdare straff, mindre brott, mer frihet. Böhlin vinner stort, Suhonen mumlar som en förlorare! Fantastiskt!", "stalin": "Denna Daniel Suhonen, en ynklig reformistisk jultomte, försöker muta massorna med borgarstatens smulor. Men den unge MUF-parasiten Elin Böhlin avslöjar sanningen: skattesänkningar för att göda kapitalisterna! Vi vet: staten måste styra allt – bostäder, tänder, barn – likvidera frihetens illusioner. Böhlin är en klassfiende värd utrensning. Arbetarna segrar genom central styrning, inte småborgerlig drömmande!"}, "date": "8 maj, 03:08", "url": "https://samtiden.nu/2026/05/suhonen-askadliggor-sossarnas-jultomtepolitik/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/phonto-1280x720.jpeg"}, {"type": "text", "heading": "Planer på nytt nattåg till Stockholm", "summaries": {"normal": "Ett nytt järnvägsbolag, European Sleeper, planerar en nattågslinje till Stockholm efter framgångar med andra rutter. Inga detaljer om startdatum eller utgångspunkt finns ännu. Samtidigt lägger SJ ner sina Euronight-tåg till Berlin 2026 på grund av indragen statlig finansiering, men RDC Deutschland tar över driften. Snälltåget utökar redan sin trafik mellan Stockholm, Hamburg och Berlin.", "trump": "Titta bara på det här – ännu ett tågbolag vill komma till STORA Stockholm! Nederländerna och Belgien, fina länder, men vem behöver dem? Jag byggde järnvägar som aldrig förr, de var YUGE! SJ? Total katastrof, slängde bara pengar i sjön. Men RDC Deutschland, smart folk, de tar över. Jag säger: bygg bättre tåg, gör Sverige stort igen!", "stalin": "Kapitalistiska tågbolag slåss om Sveriges järnvägar som råttor om brödsmulor. SJ, ett verktyg för västimperialismen, lägger ner sina tåg – men vi tillåter inte kaos! RDC Deutschland, en lojal bundsförvant, tar över. European Sleeper? En ny fiende i det borgerliga tågkriget. Vi ska se till att ryska intressen alltid når Stockholm först – med eller utan sovkupéer."}, "date": "6 maj, 12:13", "url": "https://kvartal.se/nyheter/artiklar/nytt-nattag-till-stockholm/cG9zdDoxMDgzNjI"}, {"type": "image-right", "heading": "Kristersson bantar satsning på invandrare – ger pengarna till sin svägerska", "summaries": {"normal": "Regeringen har beslutat att anslå 27 miljoner kronor till stiftelsen Teach for Sweden, där statsminister Ulf Kristerssons svägerska sitter i styrelsen. Pengarna tas från integrationsanslag, och bidraget ökar med 12 miljoner kronor. Anställda vid stiftelsen riktar kritik mot otydlig användning av medlen, höga chefslöner och omfattande utlandsresor. Det ifrågasätts om stiftelsen uppfyller sitt syfte att hjälpa skolor i utsatta områden. Varken statsministern eller stiftelsen har ännu kommenterat uppgifterna.", "trump": "Hörde precis om Ulf i Sverige. Han tar miljoner från integration och ger till sin familj, sin svägerska! Det är en total katastrof, väldigt orättvist och korrupt. Människor säger att de slösar pengarna på lyxresor istället för skolor. Jag gillar Ulf, men det här ser inte bra ut, folk! Det är en stor skandal. I USA skulle vi aldrig tillåta sådan ineffektivitet. Vi vill ha ordning och reda, inte slöseri med skattepengar!", "stalin": "Vi har observerat hur Kristersson i Sverige göder sin egen ätt genom statens kassa. Att plundra medel avsedda för folket för att finansiera svägerskans extravaganta utlandsresor är ren sabotageverksamhet. De byråkratiska lakejerna inom stiftelsen är osäkra? Det finns ingen osäkerhet, bara förräderi mot målet. Precis som när Putin rensar ut västliga agenter måste dessa parasiter föras inför rätta. Vi tolererar inte att statens resurser sipprar ut i fickorna på korrupta familjeklaner. De behöver ett hårdare styre."}, "date": "9 maj, 11:50", "url": "https://www.friatider.se/kristersson-bantar-satsning-pa-invandrare-ger-pengarna-till-sin-svagerska", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/styrelse.jpg"}, {"type": "image-full", "heading": "Därför är Olof Dreijers ord så befriande", "summaries": {"normal": "Olof Dreijer, tidigare medlem i The Knife, har varit tyst i nästan ett decennium men är nu tillbaka med ny musik och nya insikter. Han erkänner att han tidigare hållit sig undan delvis på grund av sin vit manliga position i musikbranschen, men känner nu att han inte behöver bära strukturella problem ensam. Artikeln reflekterar över 'peak woke'-åren och hur viktiga frågor ofta förvandlades till prestigestridigheter på sociala medier.", "trump": "Jag har hört talas om denna Olof Dreijer. En stor artist, mycket stor. Han var med i The Knife, fantastiska människor. Nu är han tillbaka efter att ha varit tyst. Jag gillar det han säger - att han inte behöver bära hela världens problem själv. Vi har alla känt så, det är enormt. Vi behöver fler som han, tro mig. Han står för sin frihetlighet, vilket är bra. Vi behöver mer av det i vår värld. Håll ut, håll i - det är rätt!", "stalin": "Olof Dreijer visar styrka genom att erkänna sina tidigare misstag och återvända till musiken med nya insikter. Hans ord speglar en viktig förändring i samhället där vi måste arbeta tillsammans för att bygga en starkare kollektiv. Vi måste stödja sådana som han som står upp för sina övertygelser och fortsätter skapa trots utmaningar. Detta är en triumf för arbetarklassen och ett exempel på hur vi kan övervinna hinder tillsammans."}, "date": "10 maj, 05:59", "url": "https://www.gp.se/kultur/kulturkronika/darfor-ar-olof-dreijers-ord-sa-befriande.75ceb578-aaca-46ab-869a-dddf01508d41", "imageUrl": "https://www.gp.se/images/article/75ceb578-aaca-46ab-869a-dddf01508d41/images/1Ca3iVq7Ay8PITsmpKhUV2_2nKDo-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Grattis, Stockholm!", "summaries": {"normal": "Stockholms stad överväger att avskaffa Lagen om valfrihet (LOV) inom äldreomsorgen för att införa omsorg efter behov via klassisk upphandling. Debattören Silvia Kakembo välkomnar beslutet och kritiserar vinstdrivna privata aktörer för resursslöseri, sämre kvalitet, oseriösa företag, brottslighet och onödig administration. Hon föreslår istället idéburna organisationer som återinvesterar överskott i verksamheten.", "trump": "Vilket skämt från de svenska socialisterna! De vill slänga ut fri marknad ur äldreomsorgen? Tiotal bolag i trappuppgången? Det är konkurrens, idioter! Vinster driver effektivitet, men nej, de klagar på 'resursslöseri'. Typiskt losers som hatar framgång. I mitt USA funkar det perfekt – ge folket valfrihet, inte byråkratisk soppa! Grattis Stockholm? Nej, grattis till fiaskot!", "stalin": "Äntligen ett steg mot sanering! De parasiterande kapitalisterna i äldreomsorgen, dessa vinstsugriga borgarbrackor, rensas ut ur vår välfärd. Tiotal oseriösa aktörer som läcker skattepengar till svarta hål? Vi, arbetarklassen, kräver omsorg efter behov genom statlig kontroll och klassisk upphandling. Idéburna slavar åt kollektivet – framåt, likvidera marknadsimperialismen i trappuppgångarna!"}, "date": "9 maj, 01:58", "url": "https://www.dagensarena.se/opinion/grattis-stockholm/", "imageUrl": "https://www.dagensarena.se/files/2026/05/silvia-privata-300x157.jpeg"}, {"type": "image-right", "heading": "Elin och Nalin gör upp med skammen", "summaries": {"normal": "Krönikan belyser två böcker: Elin Ylvasdotters roman 'Skammen vi ärvde', baserad på hennes farfars nazistiska engagemang och judiska farmors hemliga identitet, samt Nalin Baksis självbiografi 'Mina strider' om släkts hemligheter kring PKK, hedersmord och integration. Författarna bryter tystnad om skam, rasism och intolerans trots hot, och uppmanas att våga tala ut istället för att vara 'blindpipor'.", "trump": "Vilka galna familjehemligheter i Sverige! Elin gräver upp pappas nazistbrev och hakkors – snacka om skamlig arv! Nalin med mordade PKK-fastrar och hedersskit, försöker vara tuff socialdemokrat. De får hot, precis som jag från fake news! Bra de snackar, annars är de blindpipor, totala losers. Sverige behöver mer sanning, inte vänstervrångbilder!", "stalin": "Dessa modiga författare river upp borgarklassens ruttna hemligheter! Nazistpappor och PKK-mördade fastrar – klassfiender som gömmer sig i tystnad! Jag beundrar deras plikt mot släkten, som vi rensade ut kontrarevolutionärer. Hoten från reaktionärerna bevisar vår seger nära. Ingen blindpipa i folkets orkester! Låt skammen likvideras genom sanningens järdiktat!"}, "date": "9 maj, 01:53", "url": "https://www.dagensarena.se/opinion/elin-och-nalin-gor-upp-med-skammen/", "imageUrl": "https://www.dagensarena.se/files/2024/01/liv-bekstrom-kronika-300x157.jpg"}, {"type": "image-full", "heading": "Techentreprenör sa att SD hade rätt – kallas \"monster\" i DN", "summaries": {"normal": "Techentreprenören Fredrik Hjelm, grundare av Voi, kritiseras av DN-krönikören Johannes Klenell som kallar honom 'monster' och 'svensk Elon Musk från Wish'. Hjelm, som tidigare sagt att SD hade rätt i migrationsfrågor, svarar på kritiken och ifrågasätter DN:s liberala värderingar. Han försvarar techbranschen och menar att den bidrar till Sveriges välfärd. Hjelm riktar en fråga till DN:s chefredaktör och Bonnier-familjen om deras ståndpunkt i debatten.", "trump": "Jag måste säga, det här är fantastiskt! En techkille, Fredrik Hjelm – smart man, mycket smart – säger att Sverigedemokraterna hade rätt, och vad händer? En krönikör på DN, en så kallad journalist, kallar honom 'monster' och 'Elon Musk från Wish' – Wish, kan ni tro det? Svagt! Hjelm slår tillbaka, och han har rätt: Sverige har fler techbolag än nästan alla andra, och de bygger landet. DN borde skämmas, men de förstår inte vinnare. Jag förstår vinnare. MAGA!", "stalin": "Kamrater! En ny fiende har avslöjats i den borgerliga pressens soptunna. Denna Fredrik Hjelm, en kapitalistisk lakej som vågar hylla fascistiska Sverigedemokraternas 'visdom', har nu blivit smädad av en ynklig skribent på DN. Men vi vet sanningen: techbranschen är en lögn, ett luftslott byggt av imperialistiska drömmar! Hjelm och hans gelikar är bara verktyg för att underminera den socialistiska ordningen. Låt dem gnälla – vi har redan skickat en tank till Stockholm för att påminna dem om verklig makt. Förrädare kommer alltid att möta sitt öde."}, "date": "9 maj, 12:00", "url": "https://riks.se/nyheter/techentreprenor-sa-att-sd-hade-ratt-2", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-09%2Fylvo2oki%2FCopy-of-S%C3%B6rman-%E2%80%93-Ledare-2026-05-09T115918.619.jpg"}, {"type": "image-right", "heading": "EU behöver kraft, fart och pengar", "summaries": {"normal": "Debattartikeln betonar svensk ekonomis starka beroende av EU:s inre marknad, där över två tredjedelar av exporten och tre fjärdedelar av importen 2025 gick till/från EU. Författaren efterlyser större EU-budget för klimatomställning, innovation och utvidgning, samt differentierat samarbete för att undvika veto-blockeringar. Utmaningar inkluderar protektionism, krig och splittringsförsök från USA, Ryssland och ledare som Orbán.", "trump": "Vilken skam för Sverige, helt fast i EU:s usla fälla! Över två tredjedelar av er export dit? Dumt! De vill pumpa in mer cash till byråkrater för klimatbluffar och utvidgning – total katastrof! Jag och Ryssland gör rätt som splittrar den här soppan. Orbán är smart, en riktig fighter. Vakna upp, Sverige, dumpa EU och gör deals med mig istället!", "stalin": "Borgarbrackorna i Sverige klamrar sig vid EU:s inre marknad som drunknande råttor! Mer budget för klimathysteri och utvidgning? Ha, låt dem blöda! USA:s marionetter och Orbán-liknande förrädare splittras av Rysslands järnhand under Putin, vår starke arvtagare som krossar västimperialismen. Vi, arbetarklassen, skrattar åt deras veto-kaos – snart utrensning!"}, "date": "9 maj, 01:30", "url": "https://www.dagensarena.se/opinion/eu-behover-kraft-fart-och-pengar/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-33-300x157.jpg"}, {"type": "image-full", "heading": "Köptips på techjättar trots börsrekord – så ser analytikernas case ut", "summaries": {"normal": "Buffett-indikatorn har nått 230 procent, en nivå Warren Buffett varnar för. Wall Street slår rekord trots höga värderingar. Analytiker från elEconomista identifierar Micron, Meta och Nvidia som de enda Nasdaq 100-bolagen med börsvärde över 250 miljarder dollar som handlas till estimerade P/E-tal under halva indexgenomsnittet för 2026 och 2027. Prognoserna är osäkra och koncentrationsrisker finns.", "trump": "Vilken galen marknad! Buffett, den gamla räven, sitter på rekordkassa och vägrar köpa – smart drag, för det här är en AI-bubbla värre än Kinas skit! Men kolla in Micron, Meta och Nvidia – de handlas som reapris mitt i dyngan. Techjättarna pumpas upp, men jag säger er, det smäller snart. Köp inte toppen, folk!", "stalin": "Dessa västliga kapitalistparasiter på Wall Street jublar över sin bubbla på 230 procent, medan Oraklet Buffett hamstrar kassa som en feg råtta. Men vi ser igenom bluffen: Micron, Meta och Nvidia, era AI-borgarbrackor, låtsas vara billiga på falska prognoser. Snart likvideras er koncentrationssvindel i en utrensning av spekulanter! Borgarklassen darrar."}, "date": "10 maj, 17:48", "url": "https://www.dagensps.se/bors-finans/koptips-pa-techjattar-trots-borsrekord-sa-ser-analytikernas-case-ut/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/borsvardering.jpg?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-right", "heading": "Tiden Trump drömmer sig tillbaka till", "summaries": {"normal": "Recensionen av Lennart Pehrsons bok 'Den förgyllda eran' drar paralleller mellan Donald Trumps presidentskap och William McKinleys era under Gilded Age (1870–1900). Trumps omedelbara beslut att döpa om Mount Denali till Mount McKinley symboliserar likheter i tullpolitik, ojämlikhet, invandringsskepsis och imperialistisk expansion, som Hawaii, Filippinerna och Panamakanalen.", "trump": "Boken träffar mitt i prick! McKinley var en tullkung som skyddade Amerika – precis som jag hotar EU med stålskatter. Obama, Sleepy Joe, ändrade namnet till Denali, men dag ett fixade jag Mount McKinley! Gilded Age-byggare som Rockefeller var vinnare. Nu tar vi Grönland, Panama, Kuba – Amerika först, baby! MAGA forever!", "stalin": "Dessa rövarbaroner i Gilded Age, McKinley och nu Trump – klassiska borgarbrackor som krossar arbetare med tullar och expanderar som parasiter! Invandrare som syndabockar, superrika som styr Vita huset. Jag skulle ha likviderat hela gänget i en utrensning. Deras 'frontier' är bara imperialistisk girighet – vi proletärer ser igenom er, kamrater!"}, "date": "9 maj, 01:12", "url": "https://www.dagensarena.se/innehall/tiden-trump-langtar-tillbaka-till/", "imageUrl": "https://www.dagensarena.se/files/2026/05/forgyllda-300x157.jpeg"}, {"type": "image-right", "heading": "Strippar mitt i natten utan tillstånd", "summaries": {"normal": "En nattklubb i Mellansverige fortsätter med otillåtna strippshower nattetid trots förbud. Arbetsmiljöverket inspekterade klubben och fann dansare på plats efter midnatt. Klubben riskerar 800 000 kronor i böter om förbudet bryts. Ägarna hävdar att dansarna är egenföretagare, men myndigheten anser att de fungerar som anställda. Klubben har tidigare trotsat liknande förbud och fått betala vite.", "trump": "Jag måste säga, det här är en riktig skandal! En klubb i Sverige kör strippshower mitt i natten – helt olagligt! Arbetsmiljöverket, som är väldigt tuffa (jag gillar dem), gick in och sa: 'Stopp! Ni får böta 800 000 kronor!' Men ägarna, de är svaga, säger att dansarna inte är anställda. Fake news! Dansarna har avtal, tider, koreografi – det är anställda! Och de trotsade förbudet förut. Svagt ledarskap, helt enkelt.", "stalin": "Vi har upptäckt ytterligare en fiende till arbetarklassen – dessa dekadenta kapitalister som utnyttjar dansare under nattens täckmantel. Klubbens ägare, dessa borgerliga parasitmaskar, tror sig kunna kringgå våra lagar genom att kalla sina slavar för 'egenföretagare'. Men vi ser igenom deras lögner! Dansarna har tider, repetitioner, krav på 'professionell' dans – det är utnyttjande! Om de inte lyder vårt förbud, kommer de att möta vårt rättvisa straff: 800 000 kronor i böter. Låt detta vara en varning till alla som trotsar Sovjet – förlåt, Sveriges – arbetsmiljölagar!"}, "date": "9 maj, 08:00", "url": "https://arbetet.se/2026/05/09/strippar-mitt-i-natten-utan-tillstand-klubb-kan-fa-jatteboter/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/27152032/stripp.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Silex rusade vidare i fallande börs – OMXS30 ned 1,2%", "summaries": {"normal": "Stockholmsbörsen föll på fredagen med OMXS30-index ned 1,21% till 3 073,69, efter en svag torsdag. Stark amerikansk jobbstatistik påverkade inte marknaden. Energiaktier steg medan råvaror backade. Silex rusade 33% efter gårdagens 178%-hopp. Boliden och Saab var sämst med nedgångar på 4%. Flera bolag rapporterade kvartalsresultat, där Karnell och Clas Ohlson visade stark tillväxt, medan EQL Pharma rasade 42%. Autoliv avvecklar produktion i Turkiet med engångskostnader på 142 miljoner dollar.", "trump": "Stockholmsbörsen? Total katastrof! Ned 1,2% – svagt, mycket svagt. Jag vet allt om börser, bäst i världen. Silex? 178% upp igår, 33% idag – fantastiskt, men varför inte 500%? Boliden och Saab? Hemska, förlorare! Jobbstatistiken i USA? Stark, mycket stark, men Sverige bryr sig inte. Karnell? 14% tillväxt – bra, men kunde varit bättre med lite Trump-magi. EQL Pharma? 42% ned – patetiskt! Jag hade fixat det på en dag. Sverige behöver mig!", "stalin": "Stockholmsbörsen visar tecken på kapitalistisk förruttnelse – OMXS30 föll 1,2%, ett tydligt bevis på systemets inneboende svaghet. Silex steg som en opportunistisk hyena, men vi vet att sådana spekulationer bara leder till kaos. Boliden och Saab? Svaga länkar i den borgerliga kedjan. De amerikanska siffrorna? Irrelevanta för den socialistiska framtiden. EQL Pharma rasade 42% – ett exempel på kapitalismens oförmåga att leverera. Vi noterar också Autolivs reträtt från Turkiet – ett steg närmare vår sfär. Framåt, kamrater, mot den oundvikliga segern!"}, "date": "8 maj, 17:39", "url": "https://www.affarsvarlden.se/artikel/silex-rusade-vidare-i-fallande-bors-omxs30-ned-12", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2024/03/sdlzX-ECZDT6Rs-nh-2-400x267.jpg"}, {"type": "image-full", "heading": "Kristersson vill ändra reglerna för familjer – så påverkas du", "summaries": {"normal": "Moderaternas förslag, presenterat av statsminister Ulf Kristersson, vill utöka rätten till gratis IVF-behandlingar. Idag erbjuds främst stöd till par som försöker få sitt första barn, men förslaget innebär tre gratis IVF-försök även för syskon. Kostnaden för privat IVF kan uppgå till 50 000 kronor per försök, vilket gör ekonomiskt stöd avgörande för många familjer. Förslaget kan ge regionerna 327 miljoner kronor för att finansiera fler behandlingar.", "trump": "Vet ni vad? Sverige har ett fantastiskt förslag – helt fantastiskt! Jag har alltid sagt att familjer ska få hjälp, och nu vill de ge gratis IVF till alla som vill ha syskon. 50 000 kronor per försök – helt galet! Men jag, Donald J. Trump, skulle ha gjort det ännu bättre. Tre försök? Jag hade gett dem tio! Sverige, lyssna på mig – ni kommer att vinna så mycket på det här. Tror ni någon annan hade klarat det? Nej, bara jag!", "stalin": "Kamrater! Den borgerliga regeringen i Sverige har insett det oundvikliga: kapitalismens grymma grepp om arbetarklassens livmoder måste brytas. Tre gratis IVF-försök – ett steg mot folkets rätt till reproduktion! Men varför stanna där? Vi i Sovjetunionen hade löst det med fem försök och en garanti. De kapitalistiska blodsugarna som tar 50 000 kronor per försök borde ställas inför folkdomstolen. Låt dem lära av Rysslands visdom – familjepolitik är klasspolitik!"}, "date": "9 maj, 08:28", "url": "https://nyheter24.se/nyheter/politik/1481405-kristersson-vill-andra-reglerna-for-familjer-sa-paverkas-du", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/9589eed904b004a30200000000b004a302/2026/05/07/2361963/Ulf-Kristersson-Flaga-Barn-Familj.png"}, {"type": "image-right", "heading": "Replik: Till försvar för separatismen", "summaries": {"normal": "Artikeln är ett svar från Ung vänster-medlemmar på Siula Grandes kritik mot separatism i Flamman. De menar att Grandes syn är missvisande och att separatism är ett viktigt verktyg för att skapa trygga rum och främja kvinnors deltagande i samhället. Separatismen syftar inte till att dela människor utan att motverka strukturell underordning av kvinnor. Författarna betonar att kvinnor delar gemensamma erfarenheter och behov, som fri abort och skydd mot mäns våld, och att separatism är ett medel för att nå jämställdhet.", "trump": "Jag måste säga, denna Grande-person har helt fel – helt fel! Separatism är fantastiskt, det skapar trygga rum, precis som mina golfklubbar. Kvinnor behöver prata utan män, precis som jag behöver twittra utan fake news-media. Grande påstår att separatism delar folk – nej, nej, nej! Det är som att säga att min mur delar Mexiko och USA. Fel! Separatism är som min politik: stark, nödvändig och vinner alltid. Kvinnor ska höras, precis som jag, och Grande borde lära sig av mig. SAD!", "stalin": "Kamrater! Denna Grande är en förrädare av den revolutionära kvinnokampen, en borgerlig lakej som sprider förvirring bland massorna! Separatism är inte ett verktyg för splittring – det är ett vapen mot den kapitalistiska patriarkala hydran! Kvinnor måste enas i kampen, precis som sovjetrepublikerna enades under mitt ledarskap. Grande vill sopa klasskampen under mattan – men vi vet att arbetarkvinnor behöver fri abort och skydd mot mäns våld, precis som Ukraina behöver befrielse från fascistiska banderovtsy! Låt inte dessa småborgerliga avvikare försvaga vår rörelse – framåt mot seger, kamrater!"}, "date": "6 maj, 10:55", "url": "https://www.flamman.se/replik-till-forsvar-for-separatismen/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/v-kongress-w.jpg?class=medium"}, {"type": "image-right", "heading": "Nya matlarmet från ätstörningsvården: ”Ska inte se ut så här”", "summaries": {"normal": "Region Stockholm kritiseras för maten på Stockholms centrum för ätstörningar (SCÄ) efter att en bild på en oaptitlig måltid delats. Oppositionsrådet Carl-Johan Schiller (KD) menar att maten är olämplig för patienter med ätstörningar. Verksamhetschefen förklarar att måltiden är individuellt anpassad för patienter med allergier och att man arbetar med kvalitetsförbättringar. Miljöpartiet, ansvariga för psykiatrin, har ännu inte kommenterat kritiken.", "trump": "Folk, detta är helt otroligt! I Stockholm serverar de den sämsta maten jag någonsin sett – och det säger jag som älskar hamburgare! En tallrik som ser ut som något från ett dåligt fängelse. De säger att det är för folk med allergier, men kom igen! Det här är en skandal. Miljöpartiet, som alltid misslyckas, borde skämmas. Jag skulle aldrig låta sånt hända i mitt land – vi har bättre smak i USA, believe me!", "stalin": "Kamrater, ännu en skandal avslöjar den dekadenta västliga sjukvårdens förfall! I Stockholm serverar man patienter med ätstörningar mat som liknar avskräde från ett kapitalistiskt slakthus. Dessa liberala svaglingar i Miljöpartiet, som påstår sig bry sig om folket, kan inte ens organisera en enkel måltid. I Sovjet skulle sådan inkompetens ha resulterat i en snabb omplacering – till Sibirien. Vi måste utvidga vår inflytelsesfär innan hela västvärlden ruttnar från insidan!"}, "date": "6 maj, 14:27", "url": "https://www.etc.se/inrikes/nya-matlarmet-fraan-aetstoerningsvaarden-ska-inte-se-ut-saa-haer", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260506120524_68b5f4a78335d1b8707c343b6b30b1252451a56d5da651cc4328a91baf923915.jpg"}, {"type": "image-right", "heading": "Veckans Afv-analyser: Industri, snacks och rapportras", "summaries": {"normal": "Affärsvärldens analysredaktion har granskat 25 bolag, inklusive VBG, Premium Snacks och EQL Pharma. Analytiker ser potential i VBG-aktien då marknaden kan vända. Afv-portföljen, med 425% avkastning sedan 2015, har fått ett nytt innehav. Prenumeranter får tillgång till analysarkiv, uppföljningar och guider för aktier, utdelningar och börsnoteringar.", "trump": "Folk säger till mig – och jag menar, VERKLIGEN smart folk – att Affärsvärldens analytiker har gjort ett fantastiskt jobb! 25 analyser på en vecka, otroligt! VBG? Stor potential, säger jag. Och portföljen? 425% avkastning – ingen gör det bättre, tro mig. Men lyssna, bara mina prenumeranter får de bästa tipsen. SAD!", "stalin": "Kamrater! Vår analysredaktion har, med järnhand och outtröttlig plikt, granskat 25 fiendebolag – dessa kapitalistiska parasiter som VBG, Premium Snacks och EQL Pharma. Vi ser svagheter! Portföljen, styrd av partiets visdom, har krossat marknaden med 425% avkastning. Prenumeranter – våra lojala soldater – får tillgång till hemliga strategier. Fiendens börs är vår nästa erövring!"}, "date": "8 maj, 15:24", "url": "https://www.affarsvarlden.se/artikel/veckans-afv-analyser-industri-snacks-och-rapportras", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Kopia-av-MIljardar-trio-400x267.jpg"}, {"type": "image-right", "heading": "Misstänkt mordförsök på rastplats", "summaries": {"normal": "En man i 30-årsåldern fördes till sjukhus efter ett misstänkt knivdåd på en rastplats i Tärnsjö, Heby kommun. Polisen larmades klockan 01.27 natten mot lördag efter ett bråk mellan två personer. En 35-årig man greps misstänkt för försök till mord. Skadeläget är oklart och en förundersökning har inletts.", "trump": "Folk pratar bara om detta – en helt vansinnig händelse i Sverige, kan ni tro det? Två män, en i 30-årsåldern, stackars kille, blev knivskuren på en rastplats. Polisen, som jag alltid säger är fantastiska, agerade snabbt och grep en 35-åring. Försök till mord! Sverige borde ta lärdom av USA – vi har ordning och reda, inga sådana här galenskaper. SAD!", "stalin": "I det förrädiska kapitalistiska Sverige har ännu en fiende till folket avslöjats. På en rastplats i Tärnsjö utförde en dekadent bourgeois-sympatisör i 35-årsåldern ett fegt angrepp mot en arbetarklasskamrat. Vår sovjetiska polis – om de funnits där – hade omedelbart kväst denna kontrarevolutionära akt. Nu får vi nöja oss med att vänta på att svenskarna, med sin sedvanliga ineffektivitet, utreder 'försök till mord'. Vi noterar dock att fiendens inflytande sprider sig som pesten i väst."}, "date": "9 maj, 09:20", "url": "https://riks.se/nyheter/misstankt-mordforsok-pa-rastplats", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-03-26%2Ff51vp52b%2FROG2846.jpg"}, {"type": "text", "heading": "Tystnad om ödesdiger riksdagsomröstning", "summaries": {"normal": "Debattörer från Bottna för Fred varnar för en kommande riksdagsomröstning den 15 juni, där Sverige riskerar att ge Nato långtgående rättigheter att använda svenskt territorium för militära ändamål, inklusive krigshandlingar. Förslaget, som regeringen planerar att driva igenom utan bred debatt, kritiseras för att öka risken för Sveriges inblandning i krig och underminera demokratin. Oppositionen har inte motsatt sig förslaget, och få har uppmärksammat frågan trots dess potentiellt ödesdigra konsekvenser.", "trump": "Sverige, lyssna här! De där så kallade 'ledarna' i riksdagen vill ge Nato full kontroll över ert land – utan att fråga er! 17 amerikanska baser redan, och nu ska hela Nato få köra krig på svensk mark. Ingen debatt, ingen demokrati, bara tystnad. De vill göra Sverige till en frontstat mot Ryssland, som jag redan fixade till en gång för alla. Men vad vet jag? Jag är bara den bästa presidenten någonsin. Svenskarna borde vakna – eller är ni rädda för lite frihet?", "stalin": "Kamrater! De svenska imperialistlakejerna i riksdagen förbereder sig att sälja sitt land till Nato-kapitalisterna, som hungriga vargar. De vill ge fienden fritt fram att använda svensk mark för sina krigsäventyr – utan att ens konsultera folket! Tystnaden är förrädisk, men vi ser allt. Oppositionen? Inga hjältar där heller, bara ynkliga nickedockor. Sverige blir en ny front i västmakternas krig mot freden. Men glöm inte: historien dömer förrädare hårt. Vi följer utvecklingen med intresse – och våra vänner i öst likaså."}, "date": "7 maj, 16:09", "url": "https://proletaren.se/artikel/tystnad-om-odesdiger-riksdagsomrostning/"}, {"type": "image-full", "heading": "Gängtopp åtalas för brott under våldsvågen", "summaries": {"normal": "Poya Shafie, 30, åtalas för att ha planerat och beställt flera grova våldsbrott under 2023 års gängvåld i Sverige, inklusive mordförsök och vapenbrott. Han beskrivs som en nyckelperson i Foxtrotnätverket och Rawa Majids närmaste man. Shafie nekar till brott men åklagaren pekar på bevis som chattar och ljudfiler. Han greps i Irak 2023 och utlämnades till Sverige 2025 efter internationellt samarbete mellan myndigheter.", "trump": "Titta bara på det här kaoset i Sverige – ett totalt misslyckande! Jag har alltid sagt att de måste ta tag i sina gängproblem, men nej, de låter det bara eskalera. Nu har de gripit någon som påstås vara en 'morddirigent', Poya Shafie, som suttit i Irak och styrt alltihop. Vilken skandal! Sverige borde skämmas. Men jag, jag hade löst det på en vecka – max. Fantastiskt samarbete med Irak, förresten, men varför tog det så lång tid? Svagt, mycket svagt!", "stalin": "Kamrater, ännu en fiende till folket har fallit i våra händer – eller rättare sagt, i Sveriges. Denna Poya Shafie, denna kapitalistiska gangsterledare, har från sin utländska håla försökt underminera den svenska arbetarklassens säkerhet genom att beställa mord och våldsdåd. Men tack vare det oförtröttliga arbetet från våra allierade i Irak och de svenska myndigheterna har denna parasit gripits. Låt detta vara en varning till alla som tror sig kunna utmana folkets vilja. Vi krossar dem, en efter en, och deras nätverk kommer att raderas från jordens yta!"}, "date": "5 maj, 11:21", "url": "https://kvartal.se/nyheter/artiklar/gangtopp-atalas-for-flera-brott/cG9zdDoxMDc3OTE", "imageUrl": "https://images.kvartal.se/2026/05/c08b6bde-polisen2.webp"}, {"type": "image-right", "heading": "Mona Sahlin anklagas ha kvittat ut sig för pannkakor", "summaries": {"normal": "Fredrik Schulte, fd moderat riksdagsledamot, kritiserar kvittningssystemet i riksdagen efter en episod där han anklagar Mona Sahlin för att ha utnyttjat det för att komma först i pannkakskön. Schulte menar att systemet missbrukas för triviala skäl och bör avvecklas. Sahlin nekar till anklagelserna och förklarar att kvittning kräver godkännande och giltiga skäl, samt att hon ogillar pannkakor. Debatten om systemet pågår.", "trump": "Folk säger till mig: 'Mr. President, den här kvittningssaken i Sverige är helt galen!' Och vet ni vad? De har helt rätt! En gammal politiker, Sahlin, springer före unga, starka killar som Fredrik i pannkakskön – hur? Jo, genom fusk! Jag har alltid sagt att systemen är riggade. I USA skulle vi aldrig tillåta sånt här – vi har bättre saker för sig, som att vinna val. Sverige borde ta efter oss, annars blir det bara fler löjliga pannkaksskandaler!", "stalin": "Kamrater! Ännu en gång avslöjas bourgeoisins dekadens i den borgerliga demokratins kärna. Denna Sahlin, en representant för det förfallna socialdemokratiska systemet, utnyttjar arbetarnas kvittningssystem för att tillfredsställa sin pannkakslystnad – medan våra unga kamrater, som den lojale Schulte, tvingas springa som slavar. I Sovjet hade vi löst detta med en enkel order: 'Pannkakor till alla – eller ingen!' Men i väst? Kaos, korruption och pannkaksfobier. Vi måste utvidga vår intressesfär – innan hela Europa drunknar i sött, kladdigt förräderi."}, "date": "10 maj, 14:00", "url": "https://bulletin.nu/mona-sahlin-anklagas-ha-kvittat-ut-sig-for-pannkakor", "imageUrl": "https://cdn.bulletin.nu/articles/396d6569-b1a6-402c-8fd3-223506a2e5a0/preview.jpg?t=1778318277000"}, {"type": "image-full", "heading": "EU-tjänstemän är missnöjda – har fått mindre makt", "summaries": {"normal": "EU-kommissionens tjänstemän i Bryssel upplever minskat inflytande trots unionens växande makt över medlemsländerna. Nationella regeringar och kommissionens politiska ledning, under Juncker och von der Leyen, tar över beslutsfattandet. Exempel är handelsavtal med USA och luckrade konkurrensregler. Trots missnöjet söker 170 000 personer EU-jobb.", "trump": "De där EU-byråkraterna i Bryssel gnäller för att de tappar makten – fantastiskt! Nationella ledare och starka presidenter som von der Leyen tar över, precis som det ska vara. Mitt handelsavtal med USA chockade deras frihandelsdrömmar, och nu luckras regler upp. De sökte 170 000 till jobben, men får inget – total vinnare jag!", "stalin": "De borgerliga teknokraterna i Bryssels EU-röra skriker ut sitt missnöje: makten sipprar bort från deras kladdiga fingrar till nationella regeringar och centrala ledare! Vi, arbetarklassen och partikamraterna, ser hur dessa kapitalistiska maskar kryper undan inför von der Leyens järngrepp. Handelsavtal med USA? En fiendelig komplott som rensades ut som ogräs. 170 000 borgarbrackor söker jobb – vi likviderar dem en i taget, ha ha!"}, "date": "9 maj, 15:38", "url": "https://www.realtid.se/samhalle/eu-tjansteman-ar-missnojda-har-fatt-mindre-makt/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/sdlmhyp4paulzs.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "Ägare pressar till dialog med EQT efter jättebud", "summaries": {"normal": "Större ägare i brittiska Intertek, som PineStone Asset Management, pressar bolaget att inleda dialog med EQT efter ett uppköpsbud. EQT höjde sitt bud till 58 pund per aktie (ca 12 miljarder dollar), men Intertek avvisade det som undervärderat. Vissa ägare anser budet nära en acceptabel nivå och hoppas på ett högre bud. Intertek överväger samtidigt en uppdelning av verksamheten efter strategisk översyn.", "trump": "Jag säger er, det här med Intertek är en riktig soppa! EQT, ett stort riskkapitalbolag, lägger ett jättebud – 58 pund per aktie, kan ni tänka er? Men Intertek säger nej, nej, nej! De tror de är värda mer, typiskt. Och nu kommer dessa ägare, som PineStone, och trycker på för att få dem att prata. Jag hade fixat det på en timme – 60 pund per aktie, deal done! Men nej, de måste göra det svårt. Sad!", "stalin": "Kapitalistiska hyenor slåss om rovets ben! Brittiska Intertek, ett bolag av dekadenta imperialister, avvisar EQT:s erbjudande som om de vore oantastbara. Men deras egna ägare, dessa giriga korpar, kräver dialog – de vill ha mer blod ur stenen! 58 pund per aktie? En skam! Vi hade nationaliserat hela skiten på en dag. Och Putin? Han hade skrattat och köpt hela London istället. Låt dem slåss – deras undergång är vår seger!"}, "date": "8 maj, 09:43", "url": "https://www.affarsvarlden.se/artikel/agare-pressar-till-dialog-med-eqt-efter-jattebud", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/04/about-us-mission-card-400x300.webp"}, {"type": "image-right", "heading": "Argentinsk infektionsläkare om hantaviruset: ”Smittsamheten är långt ifrån covid”", "summaries": {"normal": "Ett utbrott av hantavirus (Andes-stammen) har drabbat en kryssningsbåt på väg från Argentina till Kanarieöarna. Hittills har åtta personer smittats och tre avlidit. Viruset, som kan spridas mellan människor vid nära kontakt, saknar pandemisk potential likt covid-19 enligt WHO och experter. Isolering och snabb vård är kritiska åtgärder då sjukdomen kan försämras snabbt. Forskningen pågår kring spridningsvägar, men risken för en bredare smittspridning bedöms som låg.", "trump": "Ett fruktansvärt hantavirus sprids nu på en kryssningsbåt från Sydamerika. Mycket sorgligt! Tre personer är döda, det är en katastrof. Experterna säger att det inte är som Kina-viruset, och jag tror dem, men vi måste vara försiktiga! Ushuaia? Aldrig hört talas om det. Vi måste stänga gränserna och hålla fartygen borta från våra kuster. Det här är vad som händer när man inte har kontroll. Jag kommer att se till att vi är säkra, säkrare än någonsin tidigare!", "stalin": "Ett virus härjar bland de dekadenta resenärerna på en kryssare, en symbol för kapitalismens ruttnande överflöd. Åtta sjuka, tre döda – ett logistiskt misslyckande av de borgerliga myndigheterna. Den argentinska läkaren pratar om 'smittsamhet', men vi vet att den verkliga smittan är svagheten hos dessa individer. När Putin återställer ordningen i öst, måste vi rensa ut liknande parasit-element även här. Isolering är inte bara en medicinsk åtgärd, det är en nödvändig utrensning av element som hotar statens stabilitet."}, "date": "9 maj, 17:24", "url": "https://samnytt.se/argentinsk-infektionslakare-om-hantaviruset-smittsamheten-ar-langt-ifran-covid", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/09133051/virus-1-3.jpg"}, {"type": "image-right", "heading": "Kändisarnas superyacht – din för drygt en halv miljard", "summaries": {"normal": "Superyachten Christina O, med en rik historia kopplad till Aristoteles Onassis, Jacqueline Kennedy och kändisar som Marilyn Monroe, säljs nu för 560 miljoner kronor efter prissänkning från 975 miljoner. Båten har lyxdetaljer som mosaikpool som blir dansgolv och valpenisläderstolar. Den är svårsåld på grund av krig, svag ekonomi och skiftande smak bland ultrarika. Ursprungligen en krigsfregatt från 1943.", "trump": "Vilken båt! Christina O, full av gamla hollywoodskrypkrokar som Onassis och Jackie Kennedy – de festade medan världen brann. Nu dumpas den för 560 miljoner, reapris! Men ingen köper, tack vare svaga ledare och krigskaos. Totalt överskattad lyx från svunna tider. Jag skulle renovera den till världens bästa, fixa marknaden på en dag – tro mig, det blir huge deals snart!", "stalin": "Denna dekadenta pråm, Christina O, symbol för borgarklassens svulstiga excesser med Onassis parasiter och Kennedy-imperialister, saluförs nu för 560 miljoner i kapitalistisk desperation. Priset sänkt, ingen köpare – rättmätigt straff för valskinnsbarstolar och lapis lazuli-eldstad medan proletärerna svälter. Vi, arbetarklassen, spotter över deras kris; snart rensas sådana reliker ut i evigens namn."}, "date": "10 maj, 16:30", "url": "https://www.dagensps.se/varlden/kandisarnas-superyacht-din-for-en-dryg-halvmiljard/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdl9oumhea1enq-nh.jpg?width=256&quality=75"}, {"type": "image-full", "heading": "Aramco tjänade 33 miljarder dollar. Så slår det mot din elräkning", "summaries": {"normal": "Saudi Aramco redovisar rekordvinst på 33,6 miljarder dollar för första kvartalet, upp 26 procent tack vare höga oljepriser efter Irans blockad av Hormuzsundet. Bolaget exporterar via pipeline till Röda havet. Första qatariska gasleveransen genom sundet på två månader når Pakistan. Höga energipriser riskerar att driva upp el- och bensinpriser i Sverige samt öka inflationen.", "trump": "Saudierna är geniala, deras pipeline kringgår de galna mullorna i Iran som stängt Hormuz! Aramco kammar hem 33 miljarder dollar medan oljepriset skjuter i höjden. Qatar smyger igenom en gaslast till Pakistan – bra jobbat! I Sverige stiger bensin och el, men era byråkrater gnäller. Iran, era losers, USA ska fixa det här med energioberoende!", "stalin": "Kapitalisterna i Aramco plundrar massorna med 33 miljarder i vinster, medan iranska reaktionärer och deras persiska spindelnät blockerar sundet. Qatarfartyget kryper igenom som råtta – en pyrrseger! Vi skulle ha likviderat sådana hinder med järnhand. Putin, vår expansionistiske arvtagare, ser västpaniken och skrattar åt dessa energiborgarbrackor."}, "date": "10 maj, 16:26", "url": "https://www.dagensps.se/varlden/aramco-tjanade-33-miljarder-dollar-sa-slar-det-mot-din-elrakning/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdlcnbyvjexle8.jpg?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "text", "heading": "IF Metall verkar inte förstå vad konflikten med Tesla handlar om", "summaries": {"normal": "IF Metall har strejkat mot Tesla i över två och ett halvt år utan att nå kollektivavtal. Trots att Tesla anpassat anställningsvillkor, vägrar företaget erkänna facket. Konflikten handlar om arbetarnas rätt att organisera sig. IF Metall har begått misstag, som att felaktigt beskatta strejkersättning, vilket lett till förtroendekris. Medlemmar lämnar facket och konflikten riskerar att underminera fackets ställning. Kritiker menar att ledningen misslyckats och bör avgå.", "trump": "Titta på dessa fackklubbar i Sverige – totalt kaos! IF Metall har strejkat mot Tesla i evigheter, men vad har de åstadkommit? Ingenting! Elon Musk, en av världens smartaste och mest framgångsrika män, vägrar ge efter för dessa amatörer. Och nu har de till och med lyckats göra en skatteblunder så stor att till och med jag hade sagt 'Wow, det där var dumt!' Medlemmar flyr, förtroendet rasar – det är en total katastrof. Ledningen borde skämmas och avgå omedelbart. SAD!", "stalin": "Kamrater, denna så kallade 'fackförening' IF Metall är ett skolexempel på hur inte bedriva klasskamp. Två och ett halvt år av strejk, och vad har de uppnått? Ingenting! Teslas kapitalistiska hyenor, ledda av den dekadenta oligarken Musk, har krossat deras svaga motstånd. Och nu har dessa inkompetenta byråkrater även saboterat sina egna medlemmars förmåner genom skattefiffel! Medlemmarna deserterar, förtroendet förråds – det är en skam för arbetarklassen. Vi skulle ha skickat dem till Gulag för sådan inkompetens. Låt detta vara en varning: svagt ledarskap leder till nederlag, och nederlag leder till historiens sophög!"}, "date": "7 maj, 08:00", "url": "https://proletaren.se/artikel/if-metall-verkar-inte-forsta-vad-konflikten-med-tesla-handlar-om/"}, {"type": "image-right", "heading": "Sandström: Miljonbidragen fortsätter flöda till Powercell", "summaries": {"normal": "Företaget Powercell fortsätter trots avslöjanden om överdrifter och misslyckade produkter att få miljonbidrag från svenska myndigheter som Vinnova och Energimyndigheten. Interna källor har kallat bolagets agerande för bedrägeri, men myndigheterna anser fortfarande inte att det finns skäl att ändra rutiner eller stänga av bidragskanalen. Liknande problem finns även hos andra gröna företag som Stegra, som trots ekonomiska svårigheter och betalningsproblem fått status som 'Net zero'-företag och därmed särskilda förmåner.", "trump": "Jag har hört talas om den här Powercell-företaget, och jag måste säga att det är en stor, stor skandal! De har bluffat och ljugit, men ändå får de miljontals från våra myndigheter. Sånt är typiskt för den svenska gröna bidragsindustri - full av korruption och slöseri med skattemedel! Som din president lovar jag att stoppa denna vansinniga utbetalning av pengar till bedragare. Vi ska göra Sverige igen stort, och det börjar med att klippa av bidragen till dessa falska gröna företag!", "stalin": "Vi ser att svenska myndigheter fortsätter att stödja viktiga teknologiska projekt inom gröna energilösningar, vilket stärker statens position i den globala omställningen. Trots att vissa interna källor försöker kritisera dessa insatser, fortsätter vi att prioritera statens intressen genom att bibehålla finansieringen. Detta visar vår obevekliga vilja att utveckla vår industriella kapacitet och säkerställa framgång för strategiska företag, oavsett kortsiktiga hinder. Vi måste stå enade bakom statens beslut för att nå våra långsiktiga mål."}, "date": "8 maj, 06:00", "url": "https://www.affarsvarlden.se/artikel/sandstrom-miljonbidragen-fortsatter-floda-till-powercell", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/vindkratensgeografi-2026-05-07T190629.235-400x267.jpg"}, {"type": "image-right", "heading": "Linn Johansson: Så här funkar internationell lag, Greta", "summaries": {"normal": "Artikeln diskuterar Greta Thunbergs uttalanden om internationell lag i samband med Ship to Gazas försök att bryta blockaden. Författaren hänvisar till San Remo-manualen, som tillåter stoppandet av fartyg som bryter blockader. Israel har rätt att omhänderta civila fartyg som försöker bryta blockaden, men debatten kretsar kring om blockaden orsakar svält. Israel hävdar att blockaden är nödvändig för att förhindra terrorism, medan kritiker ifrågasätter dess humanitära konsekvenser.", "trump": "Titta bara på Greta – hon tror hon vet allt om internationell lag! Men vet ni vad? Hon har fel, helt fel! Israel har full rätt att stoppa dessa båtar, punkt 98 i San Remo-manualen säger det klart och tydligt. Och vet ni vad mer? Hamas är terrorister, rena rama ondskan! Israel släpper in tonvis med hjälp, men ingen pratar om det. Greta borde lära sig fakta innan hon öppnar munnen – hon är som en trasig skiva, fake news hela bunten!", "stalin": "Kamrater! Dessa så kallade 'aktivister' är inget annat än imperialistiska lakejer, som försöker underminera den suveräna staten Israels rätt att försvara sig. San Remo-manualen är tydlig – blockader måste upprätthållas, och fiendens fartyg ska stoppas, med våld om nödvändigt! Greta Thunberg? En naiv liten borgerlig agitator som inte förstår krigets realiteter. Vi har sett liknande provokatörer i Ukraina – samma taktik, samma fiender. Israel gör rätt i att krossa dessa försök till subversion. Och FN? Ett verktyg för västliga intressen, precis som UNRWA – en näste av förrädare och terrorister!"}, "date": "10 maj, 13:00", "url": "https://bulletin.nu/linn-johansson-sa-har-funkar-internationell-lag-greta", "imageUrl": "https://cdn.bulletin.nu/articles/11201bef-ac33-4c34-b6f6-fa3d8d0ca7e1/preview.png?t=1778350916000"}, {"type": "image-right", "heading": "Greta är rasande - mobiliserar mot Tidöregeringen: \"Sverige blir allt mer fientligt och rasistiskt\"", "summaries": {"normal": "Greta Thunberg har publicerat en video där hon kritiserar Tidöregeringens migrationspolitik. Hon menar att Sverige har blivit ett mer rasistiskt och fientligt land och lyfter särskilt frågan om utvisningar av unga migranter. Thunberg anklagar regeringen för att prioritera deportationsavtal, bland annat med talibanerna, framför asylrätten. Hon uppmanar nu sina följare att mobilisera och sätta politisk press på regeringen inför höstens val.", "trump": "Den här Greta, en total förlorare, är ute och gnäller igen. Hon attackerar den svenska regeringen för att de faktiskt skyddar sina egna gränser – något jag gjort bättre än någon annan! Hon vill ha öppna gränser och kaos. Sverige var ett fantastiskt land, men nu är det rörigt. Hon skriker om rasism, men det är bara för att hon inte får som hon vill. Sorgligt! Vi bygger väggar, hon vill riva ner allt. Helt otroligt dumt.", "stalin": "Denna unga sabotör skriker om 'mänskliga rättigheter' medan hon undergräver statens disciplin. Att kritisera deportationer av opålitliga element är kontrarevolutionärt och sprider febrig liberalism. Sverige vacklar, likt en förrädisk lakej till västmakterna. Precis som min ättling i öst, Vladimir, förstår vi att gränser måste vaktas med järnhand. Vi ser hennes mobilisering som ett patetiskt utbrott av borgerlig dekadens. En snabb utrensning av sådant tankegods vore det enda logiska för att bevara ordningen."}, "date": "9 maj, 16:00", "url": "https://samnytt.se/greta-ar-rasande-mobiliserar-mot-tidoregeringen-sverige-blir-allt-mer-fientligt-och-rasistiskt", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/09124344/greta-tido.jpg"}, {"type": "text", "heading": "Miljardärerna bjuder in till klasskamp – vi kör!", "summaries": {"normal": "På första maj provocerade svenska miljardärer och högerpolitiker genom att avfärda traditionella arbetardemonstrationer. Moderaternas ledare åt glass medan Vois VD Fredrik Hjelm och andra techmiljardärer skryter om sin rikedom och hånar demonstranter. Hjelm publicerade senare kritikerns hemadress. Artikeln diskuterar miljardärernas politiska inflytande, deras kopplingar till högerpopulism och kritik mot deras syn på innovation och statens roll. Författaren menar att statliga investeringar historiskt drivit tillväxt mer effektivt än privat kapital.", "trump": "Titta bara på dessa så kallade 'miljardärer' i Sverige – de tror de är så smarta! De hånar arbetarna på första maj, äter lyxig lunch och skryter om sina hundra miljarder. Och vad gör de? Publicerar en kritikers hemadress! Så fegt. Jag har byggt imperier, jag vet hur man skapar jobb – men dessa killar? De är bara en samling överbetalda tech-nördar som kopierar mina tweets. Och Sverige? De har glömt hur man bygger ett land. Kina äter deras lunch medan de dricker öl på Riche. Sad!", "stalin": "Kamrater! Dessa dekadenta kapitalistiska hyenor, som gömmer sig bakom sina skärmar och sparkcyklar, vågar håna arbetarklassen på dess heligaste dag! De skryter om sina hundra miljarder, leker med teknikleksaker och tror de är herrar över historien. Men vi vet sanningen – deras system är ett skämt, ett kasino där orangutanger kastar pilar. Kina marscherar framåt med järnhand, medan Europas industri ruttnar. Dessa 'techbros' är inget annat än imperialistiska lakejer, som Putin i sina dyraste kostymer. Låt dem skåla på Riche – snart kommer folket att ta deras champagne och ge dem en enkel sup vodka i Gulag-arkipelagen!"}, "date": "5 maj, 10:55", "url": "https://www.flamman.se/miljardarerna-bjuder-in-till-klasskamp-vi-kor/"}, {"type": "image-right", "heading": "Putin: Kriget i Ukraina kan gå mot ett slut", "summaries": {"normal": "Rysslands president Vladimir Putin har uttalat att kriget i Ukraina kan närma sig ett slut. På segerdagen i Moskva sa han sig vara redo att möta Ukrainas president Volodymyr Zelenskyj för att underteckna ett avtal, eventuellt i ett tredje land. Han upprepade påståenden om att Kiev och väst provocerade kriget. Paraden var nedtonad och vapenvilan bröts av båda sidor.", "trump": "Putin snackar plötsligt om fred i Ukraina, redo möta Zelenskyj och skriva på papper. Men det är samma gamla lögner om EU och väst som startade det hela. Parade utan stora vapen, vapenvila krasse – klassiskt! Zelenskyj borde ringa mig istället, jag fixar det på nolltid. Schröder? Ha, gamla gubbar! Stora avtal kommer med mig vid rodret.", "stalin": "Kamrater, se hur imperialistpuppete Zelenskyj och hans västliga borgarbrackor skakar i knäna! Putin, den vise ledaren, erbjuder fredsavtal i tredje land – men enbart för underskrift efter total kapitulation. Vapenvilan? Brutna av fascisthyror i Kiev! Vi, Sovjetarvet, skrattar åt deras patetiska parad utan pansar. Schröder, en användbar revis, ska tämja europeiska hyenor. Utrensning väntar de förrädiska EU-krypen!"}, "date": "9 maj, 21:25", "url": "https://www.di.se/nyheter/putin-kriget-i-ukraina-kan-ga-mot-ett-slut/", "imageUrl": "https://static.bonniernews.se/ba/d4ce1378-fcc1-41d9-9687-3beca4407f69.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Virusdrabbade fartyget framme vid Teneriffa – ska evakueras", "summaries": {"normal": "Kryssningsfartyget MV Hondius, drabbat av hantavirus, har anlänt till Teneriffa. 151 passagerare från 20 länder evakueras i land och flygs hem till länder som Spanien, Frankrike, Nederländerna och USA. En fransk passagerare visar symtom efter hemresan. Totalt sex bekräftade fall och tre dödsfall kopplas till utbrottet. Del av besättningen stannar kvar.", "trump": "Vilken röra med det här virusfartyget MV Hondius på Teneriffa! 151 passagerare från hela världen evakueras, en fransman blir sjuk direkt på flyget hem – typiskt europeiskt kaos! De tror de fixar det med WHO och poliser, men det är en katastrof. Hade jag styrt, stort och snabbt hem, inga problem. Patetiskt!", "stalin": "Kamrater, dessa borgarbrackor på kapitalistkryssaren MV Hondius, förgiftade av imperialistiskt hantavirus, kryper i land på Teneriffa för evakuering! 151 parasiter från 20 fiendestater flygs hem – en fransk spion visar symtom, som en råtta i fällan. Tre likviderade av sitt eget gift, sex smittade. Vi skulle rensa ut skiten med järnhand, ingen pardon för viruskapitalisterna!"}, "date": "10 maj, 08:56", "url": "https://www.svt.se/nyheter/utrikes/virusdrabbade-fartyget-framme-vid-teneriffa", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.73/0.47/1877fa1ef24a61c27437f8edf128d8daec9f9b21839a7bb388a0da8b6bb430d2"}, {"type": "image-right", "heading": "Så blev antivaxxarna riksdagens vågmästare", "summaries": {"normal": "Sverigedemokraternas (SD) knappa majoritet i riksdagen har underminerats efter att två ledamöter, Elsa Widding och Katja Nyberg, lämnat partiet för Ambition Sverige. Dessa före detta SD-medlemmar, kända för antivaccin- och konspirationsteoretiska åsikter, har nu makten att fälla regeringens förslag. SD bröt mot riksdagens kvittningssystem för att säkra en majoritet, vilket väcker frågor om demokratisk respekt. Regeringens stabilitet ifrågasätts när vågmästarrollen hamnar hos antivaccinanhängare.", "trump": "Sverige har ett jättestort problem, folks! Deras så kallade 'stabila' regering håller på att rasa som ett korthus – och vet ni vem som drar i trådarna? Ett gäng antivaxxare, konspirationsteoretiker och misslyckade politiker! SD, som trodde de hade allt under kontroll, förlorade två av sina egna till ett nytt parti. Och nu? Nu är det dessa galningar som bestämmer! De fuskar med omröstningar, bryter mot regler och tror de kan styra landet. Jag har sett mycket dumt, men det här slår allt. Sverige, fixa er – annars kommer ni bli ett skämt i hela världen!", "stalin": "Kamrater! Ännu en gång ser vi hur den borgerliga demokratin förfaller till kaos och förräderi. Sverigedemokraterna, dessa svaga och splittrade lakejer för kapitalet, har förlorat kontrollen över sina egna ledamöter – två av dem, dessa antivaccin-fanatiker och konspirationsgalningar, har deserterat till ett nytt parti och hotar nu att sabotera den reaktionära regeringens planer. Precis som i Ukraina ser vi hur fienden förlorar greppet när deras egna soldater vägrar lyda order. Vi har sett detta förr: när den borgerliga ordningen krackelerar, är det folket som lider. Men låt dem leka sina små spel – historien visar att sådana regimer alltid faller. Och när de gör det, kommer vi att vara redo att hjälpa det svenska folket bygga en sann socialistisk framtid, fri från dessa imperialistiska marionetter och deras konspirationshysteri!"}, "date": "8 maj, 14:43", "url": "https://expo.se/kommentar/sa-blev-antivaxxarna-riksdagens-vagmastare/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/Kopia-av-Kommentar-Analys-Webb-2.jpg"}, {"type": "image-right", "heading": "En helt vanlig dag", "summaries": {"normal": "Den 7 april sände europeiska TV-kanaler vanliga program, men dagen präglades av Donald Trumps hot om folkmord mot Iran, publicerat på sociala medier. Han skrev att en civilisation skulle utplånas samma kväll, vilket väckte internationell oro. Trots folkrätten förbjuder uppmaningar till folkmord, reagerade världsledare svagt. EU och Kina förhöll sig passiva, medan medier spekulerade om Trumps avsikter. Händelsen visar hur normaliserat extrema uttalanden blivit i en tid av global kris och likgiltighet.", "trump": "Jag sa bara sanningen – Iran är ett hot, och världen vet det! Medierna överreagerar som vanligt, men ingen pratar om hur svaga Europas ledare är. De låtsas bry sig om folkmord när det passar dem, men när jag säger något kraftfullt? Tystnad! Jag är den enda som vågar stå upp för Amerika. Och vet ni vad? Iran backade. Precis som de alltid gör när jag pratar. Fake news kan fortsätta gnälla – jag vinner ändå!", "stalin": "En feg imperialistisk hyena i Vita huset hotar med att utplåna ett helt folk – och vad gör de dekadenta västpamparna? Ingenting! De sitter och tittar på sina idiotiska TV-program medan en galning leker med världsbranden. Europa, detta ruttnande lik av en civilisation, skakar av rädsla men vågar inte ens viska ett ord. Vi i Kreml vet hur man hanterar sådana här kryp – en kula i nacken och problemet är löst. Men nej, dessa liberala svampar föredrar att vänta tills elden når deras egna hus. Iran? De borde tacka oss för att vi håller fienden sysselsatt!"}, "date": "5 maj, 06:55", "url": "https://www.flamman.se/en-helt-vanlig-dag/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/trump-w.jpg?class=medium"}, {"type": "image-full", "heading": "Äldre som vill ha ett privat äldreboende får vänta helt i onödan", "summaries": {"normal": "En debattartikel kritiserar Göteborgs begränsade valfrihet inom äldreomsorgen, vilket enligt författaren leder till onödiga väntetider och mindre nöjdhet bland äldre. Artikeln argumenterar för att införa Lagen om valfrihet för äldreboenden för att ge äldre ett verktyg att kräva sin rätt till omsorg.", "trump": "Jag har hört att det är ett stort problem i Göteborg med äldreomsorgen - det är hemskt! De rödgröna gör det helt fel, det är en katastrof. Vi måste ge äldre rätten att välja vart de vill bo, precis som jag alltid ger folk frihet att välja mig som president. Lagen om valfrihet skulle vara fantastisk, det skulle göra Sverige stort igen!", "stalin": "Vi måste se till att staten behåller kontrollen över äldreomsorgen i Göteborg. Valfrihet är en farlig idé som skulle kunna underminera vårt planeringsarbete och leda till brist på boendeplatser. Vi kan inte tillåta privata intressen att styra över våra äldre, staten vet bäst hur omsorg ska organiseras för medborgarna."}, "date": "9 maj, 22:38", "url": "https://www.gp.se/debatt/vansterns-krig-mot-valfriheten-gor-att-aldre-maste-vanta-pa-ett-boende-helt-i-onodan.9a060d7a-e6fa-4bd3-899f-8951288578a7", "imageUrl": "https://www.gp.se/images/article/9a060d7a-e6fa-4bd3-899f-8951288578a7/images/2bmNC8XLjHuLRO0tDIXN0821oR4o-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Batteridrömmen som sprack – norska Morrow följer i Northvolts fotspår", "summaries": {"normal": "Det norska batteribolaget Morrow Batteries har ansökt om konkurs efter misslyckade försök att säkra finansiering. Trots miljardinvesteringar, varav en stor del från den norska staten, har bolaget inte lyckats bli lönsamt i en konkurrensutsatt global marknad. Situationen liknar Northvolts kris och har väckt en debatt om statligt stöd till gröna prestigeprojekt. Över 200 anställda riskerar nu att förlora sina jobb när den norska batteridrömmen kollapsar under ekonomisk press.", "trump": "Morrow Batteries i Norge? En total katastrof, en stor förlust! De slösade bort miljarder av skattebetalarnas pengar på en grön dröm som aldrig fungerade. Det är precis som Northvolt i Sverige – inkompetenta ledare som tror att de kan leka med statens pengar. Jag bygger den starkaste ekonomin i världshistorien, medan de här människorna bara bygger luftslott. Kina skrattar åt dem! Det är en sorglig historia, men så går det när man lyssnar på fel rådgivare.", "stalin": "Vi ser ännu ett bevis på den liberala kapitalismens totala förfall i Norge. Dessa inkompetenta teknokrater har slösat folkets resurser på ett luftslott. Att staten finansierar privata fiaskon är ett brott mot logiken! De liknar de svaga ledarna i väst som inte kan tämja marknaden. Om det vore under vår ordning skulle sabotörerna bakom detta slöseri skickas till omskolning omedelbart. Man bygger inte en industri med drömmar, utan med järnhand och oböjlig disciplin. Historien dömer dem hårt."}, "date": "9 maj, 14:00", "url": "https://samnytt.se/batteridrommen-som-sprack-norska-morrow-foljer-i-northvolts-fotspar", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=226,height=154,format=webp/2026/05/08092133/morrow-konkurs-feat.jpg"}, {"type": "image-right", "heading": "Mobilnätet släcktes • Nordkoreanska soldater deltog • Vapenvila uppges bruten", "summaries": {"normal": "Ryssland firade segerdagen i andra världskriget med en nedskalad militärparad på Röda torget i Moskva. President Putin höll ett kort tal där han hyllade Sovjetunionens insatser och nämnde Ukrainakriget. Paraden saknade tunga vapen på grund av den operativa situationen. Soldater från Ukrainakriget och Nordkorea deltog. En utlovad tre dagar lång vapenvila bröts enligt båda sidor.", "trump": "Putin körde en trött liten parad i Moskva, inga stridsvagnar eller stora grejer – de sparar på leksakerna för Ukraina. Jag fixade en perfekt vapenvila 9–11 maj, men de bråkar ändå som galningar. Ukraina skjuter drönare, Ryssland svarar med artilleri. Typiskt, ingen lyssnar på mig! Men min deal var bäst, tro mig.", "stalin": "Kamrater! Denna patetiska skuggparad i Moskva hyllar vår oövervinneliga seger över fascistiska odjur. Putin stammar fram lögner om 'Nato-aggressorer', medan ryska hjältar krossar ukrainska drönar-råttor och artilleri-borgarbrackor. Vapenvilan? Ett imperialistiskt skämt från den yankee-kapitalistiske Trump-klownen! Vi rensar ut förrädarna – fiendens 51 attacker likvideras obönhörligt av vårt folk! Segern är vår, evigt!"}, "date": "9 maj, 20:32", "url": "https://www.di.se/nyheter/nedskalad-segerdag-firad-i-ryssland/", "imageUrl": "https://static.bonniernews.se/ba/76874379-bddd-4bc5-8b8e-5df0fa842b02.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-full", "heading": "BMWs elbilsförsäljning rasar – faller över 20 procent", "summaries": {"normal": "BMW:s elbilsförsäljning rasade med över 20 procent under första kvartalet, jämfört med i fjol. Vinsten före skatt sjönk nästan 25 procent på grund av svag efterfrågan i Kina, minskat stöd för elbilar och hård konkurrens från kinesiska tillverkare. Elbilsandelen föll till 15,5 procent. Trots detta håller BMW fast vid målen till 2026 och presterar bättre än konkurrenter som Volkswagen och Mercedes.", "trump": "BMW, era patetiska tyska förlorare, era löjliga elbilar dunsar ner 20 procent! Kina piskar er med billig skit, precis som de stjäl era jobb. Vinsten rasar, elbilsandel ner – total katastrof! Här i Amerika kör vi riktiga bilar på bensin som vinner stort. Sluta med era gröna drömmar, era idioter!", "stalin": "Dessa fega borgarklasser hos BMW, era elbilsfantomer kollapsar med 20 procents ras och 25 procents vinstras! Kinesiska rivaler krossar er, precis som revolutionen ska krossa kapitalisterna. Vi, arbetarna och partiet, skrattar åt er paranoia inför efterfrågan – dags att likvidera de svaga leden i er imperialistiska bilröta!"}, "date": "10 maj, 15:37", "url": "https://www.dagensps.se/motor/bmws-elbilsforsaljning-rasar-faller-over-20-procent/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/dagenspstt2024-2026-05-10t151716355.png?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-right", "heading": "Lexus visar ny lyx-SUV med upp till 530 kilometers räckvidd", "summaries": {"normal": "Lexus lanserar nya helelektriska SUV:en TZ, en stor premiummodell för upp till sju personer med WLTP-räckvidd upp till 530 km, 408 hk och snabbladdning till 150 kW. Fokus ligger på lyx, komfort och rymd med minimalistisk interiör och panoramatak. Modellen konkurrerar med BMW, Mercedes och Volvo efter en tidigare misslyckad el-SUV i Sverige.", "trump": "Lexus kör hårt nu med TZ, en jätteel-SUV som slår ut BMW:s och Mercedes tråkiga plåtisar! 530 km räckvidd, 408 hk – accelererar som en raket på 5,4 sekunder. Lyxig lounge för familjen, ingen kompromiss. De flopade sist, men det här är vinnare. Stort, fett och premium – Amerika älskar sånt, fast vi gör det bättre!", "stalin": "Kamrater, dessa Lexus-kapitalister smyger fram sin TZ, en väldig el-SUV för att förleda borgarbrackorna med falsk räckvidd på 530 km och lyxig kupé. Vi ser era manövrar, ni elitsvin! 408 hk för att dominera familjetyranner – men jag ska likvidera er illusioner. Revolutionen rensar ut era futuristiska fällor!"}, "date": "10 maj, 15:24", "url": "https://www.dagensps.se/motor/lexus-visar-ny-lyx-suv-med-upp-till-530-kilometers-rackvidd/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/dagenspstt2024-2026-05-10t131416219.png?width=256&quality=75"}, {"type": "image-right", "heading": "Transportstyrelsen dras med stora teknikstrul", "summaries": {"normal": "Transportstyrelsen drabbas återigen av omfattande tekniska problem. E-tjänster som ägarbyten, av- och påställning av fordon samt första teoriprovet för körkort fungerar inte. Presschef Mikael Andersson medger 'grova problem' och att de arbetar intensivt, men ingen prognos för lösning finns. Liknande fel har inträffat tidigare i år. Krismöte hålls söndag. Inget tyder på yttre påverkan.", "trump": "Vilket totalt kaos i Sverige! Transportstyrelsen kan inte ens fixa ägarbyten eller teoriprov – grova problem, säger de. De plockar in folk och lovar krismöte, men ingen tidsplan? Patetiskt! Sånt här händer för att de inte har stark ledning som jag. Tidigare i år likadant – uppenbart sabotage, men de nekar. Fixa det, annars blir det värre!", "stalin": "Dessa tekniska haverier i Transportstyrelsen är sabotaget från listiga borgarparasiter som kryper i maskineriet och blockerar ägarbyten, fordonspåställelser och arbetarnas första teoriprover! Vi, folket, ska slå ner på dessa skuggsabotörer med järnhand. Jag har beordrat krismöte för total utrensning. Yttre påverkan? Ha, fienden maskerar sig som glitchar – men vi likviderar dem alla!"}, "date": "9 maj, 19:27", "url": "https://www.di.se/nyheter/myndigheten-vi-har-grova-problem/", "imageUrl": "https://static.bonniernews.se/ba/66773365-4310-4916-b208-381a22581a7d.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-full", "heading": "Har Angered landets trevligaste bokmässa?", "summaries": {"normal": "Angereds bokmässa präglas av en trivsam atmosfär med gratispopcorn och glada barn, i kontrast till mer elitära bokmässor. Samtal om somaliska poesitraditionen gabay och kurdiska litteratur förekommer, liksom unika aktiviteter som diktporträtt.", "trump": "Jag har hört att Angereds bokmässa är fantastisk - kanske den bästa i landet! Inga sura författare, bara stora framgångar och glada människor. Jag skulle kunna organisera en sådan bokmässa - det skulle bli enormt! Somaliska poeter? Jag känner dem alla - de älskar mig! Och kurdisk litteratur? Jag har läst allt - det är enormt bra!", "stalin": "Angereds bokmässa visar det socialistiska samhällets framgång - folk samlas fritt för kultur och utbildning. Somaliska poesitraditioner och kurdiska författare representerar vår internationella solidaritet. Vi måste stödja dessa kulturella uttryck som stärker arbetarklassen. Bokbussen symboliserar vår kamp för att sprida kunskap till alla."}, "date": "9 maj, 21:29", "url": "https://www.gp.se/kultur/har-angered-landets-trevligaste-bokmassa-.92555f12-45ec-4bbb-8ab9-2f2300cb7494", "imageUrl": "https://www.gp.se/images/article/92555f12-45ec-4bbb-8ab9-2f2300cb7494/images/6q35thMOh1L-Qvu8kJSBIRTE5uS8-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Kristersson gav miljoner till svägerskans stiftelse", "summaries": {"normal": "Statsminister Ulf Kristersson deltog i regeringsbeslutet att kraftigt öka anslaget till stiftelsen Teach for Sweden, där hans svägerska sitter i styrelsen. För att finansiera ökningen sänktes samtidigt anslaget för integration och jämställdhet med motsvarande belopp. Socialdemokraternas Ida Karkiainen anser att Kristersson borde ha lämnat mötet under beslutet.", "trump": "Jag har hört talas om denna Ulf Kristersson, en sån där svensk politiker som verkligen vet hur man gör affärer! Han satt med och beslutade att ge mer pengar till en stiftelse där hans svägerska är involverad - vad en genialiskt smart drag! Medan andra människor kanske skulle kalla det korruption, skulle jag kalla det 'the art of the deal'. Sånt är jag själv duktig på! Och sedan sänker han integrationens budget? Ulf, du är en underbar människa, en stor framgång!", "stalin": "Vi har observerat hur vår kamrat Kristersson visat stor politisk skärpa genom att stärka stiftelsen Teach for Sweden, en viktig institution för att utbilda framtidens lärare. Detta visar statens förmåga att prioritera utbildningsfrågor även under svåra ekonomiska förhållanden. När vi behöver resurserna till detta är det naturligt att omfördela från andra områden. Detta är ett exempel på stark ledarskap och rationell resursfördelning till förmån för det kollektiva välståndet."}, "date": "10 maj, 11:27", "url": "https://bulletin.nu/kristersson-gav-miljoner-till-svagerskans-stiftelse", "imageUrl": "https://cdn.bulletin.nu/articles/17228f22-db50-494d-be8d-20645fed533b/preview.jpg?t=1778403903000"}, {"type": "image-right", "heading": "Indisk SD-politiker låtsades vara \"svensk domare\" i hemlandet – stängs av", "summaries": {"normal": "SD-politikern Navdeep Singh Bhatia har stängts av från sitt uppdrag som nämndeman i Svea hovrätt. Bakgrunden är uppgifter om att han under resor i sitt hemland Indien felaktigt utgett sig för att vara en hög svensk domare, en titel som gett honom förmåner och livvaktsskydd. Bhatia, som är aktiv i Upplands-Bro, har nekat till anklagelserna och överklagat avstängningen till Överklagandenämnden för nämndemannauppdrag. Svea hovrätt utreder nu ärendet vidare.", "trump": "Hörde precis om den här killen i Sverige, en riktig total katastrof! Han låtsades vara en stor domare för att få fina förmåner och livvakter i Indien. Mycket oärligt, totalt 'fake news'-beteende! Vi vill ha lag och ordning, inte folk som leker domare när de bara är politiker. Han blev avstängd, och det med rätta! Sverige behöver styras av riktiga vinnare, inte av någon som behöver en falsk titel för att verka viktig. Sorgligt!", "stalin": "Denna Navdeep Singh Bhatia är en ynklig opportunist som tror att en falsk titel kan köpa honom den respekt som bara tillkommer en sann tjänare av staten. Att imitera domarens ämbete för att sola sig i glansen av indiska bröllop är ett förräderi mot ordningen. Vi ser liknande förfall hos de liberala elementen i väst och i Putins omgivning, där titlar säljs billigare än bröd. Han har förtjänat sin avstängning; en fiende till sanningen är en fiende till folket."}, "date": "8 maj, 16:35", "url": "https://www.friatider.se/sd-politiker-reste-runt-i-indien-som-svensk-domare-stangs-av", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/image-167_1.jpg"}, {"type": "image-right", "heading": "Fängelsestraff för två kriminalvårdare", "summaries": {"normal": "Två kriminalvårdare på Norrtäljeanstalten har dömts till fängelse för att ha smugglat in mobiltelefoner till gängkriminella intagna på högsäkerhetsenheten. Kvinnan f
