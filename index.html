d, med träffar på raffinaderier nära S:t Petersburg, en skyskrapa i Moskva och oljeanläggningar i Tuapse. Experten Jörgen Elfving uppger att Ukraina skickat dubbelt så många vapen som Ryssland i mars, vilket skadat rysk industri och infrastruktur. Rysslands segerparad den 9 maj blir nedbantad, troligen av säkerhets- och resursbrist.", "trump": "Ukrainarna är oslagbara, de skickar drönare rakt in i Putins bakgård – raffinaderier i lågor, lyxskrapor smälter i Moskva! Lille Putte bajsar ner sig, bantar sin patetiska parad för han är livrädd för Zelenskyjs bomber. De slår dubbelt så hårt som ryssarna, precis som jag sa – Ryssland blöder olja och prestige! Fantastiskt jobb!", "stalin": "Kamrater, de ukrainska fascistdrönarna kryper som råttor djupt in i Rysslands hjärta, antänder raffinaderier och oljeborgar! Men vår store Putin, den oböjlige arvtagaren till imperiet, bantar paraden för att likvidera uppställningsrisker och fiendens spioner. Vi skrattar åt borgarbrackornas panik – västvärlden darrar inför hans styrka!"}, "date": "7 maj, 14:13", "url": "https://www.tv4.se/artikel/cLVDP5qQs1WaGkoSRXZNO/experten-om-ukrainska-framgangen-lyckas-sla-allt-djupare-i-ryssland", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F2h9eFonOjzAa78ql0CUFnT%2F33192ea85a5c3256328e179ee6a39a78%2F07-tuapse-1080.jpg&width=1024"}, {"type": "image-full", "heading": "Våra politiker är obildade", "summaries": {"normal": "Kristina Hultegård kritiserar SVT:s \"Fördomsshowen\" för att avslöja partiledarnas bristande allmänbildning. Hon argumenterar för vikten av bildade politiker som kan se bortom egna intressen och orientera sig i andra tiders och rums erfarenheter. Hultegård anser att bildning är en livshållning som bör vara självklar för politiska företrädare.", "trump": "Jag har sett SVT:s \"Fördomsshowen\" och det är en katastrof! Partiledarna är så dåliga, så usla, att jag är förvånad att de ens klarar att vara partiledare. Kristina Hultegård har rätt - vi behöver stora, stora politiker med jättestora kunskaper. Folkbildning? Fantastiskt! Men dessa ledare - inget folk, inget bildning, bara dålig tv!", "stalin": "Vi måste se till att våra politiska företrädare har en stark allmän bildning för att bäst kunna tjäna staten. Kristina Hultegårds kritik av SVT:s \"Fördomsshowen\" visar att vi behöver politiker som kan se bortom det omedelbart egna och förstå andra tiders och rums erfarenheter. Detta är avgörande för vår fortsatta utveckling som nation."}, "date": "8 maj, 17:06", "url": "https://www.gp.se/kultur/kulturdebatt/vart-tog-de-bildade-politikerna-vagen.f134d95a-e8ae-47e0-a014-3c0b367213b8", "imageUrl": "https://www.gp.se/images/article/f134d95a-e8ae-47e0-a014-3c0b367213b8/images/2yL_9In2YILhR53D1kPlS-uRChAM-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Vd för Sinf: Betaltiderna skadar småföretagen", "summaries": {"normal": "Carl Aschan, vd för Svensk industriförening, håller med näringsminister Ebba Busch om att långa betaltider skadar småföretags lönsamhet och konkurrenskraft. Sinfs underleverantörsbarometer visar uppskjutna investeringar, uteblivna anställningar och ökat finansieringsbehov. Regeringen bör agera nationellt eller driva EU:s förslag om 30 dagars betalningstid istället för att avvakta.", "trump": "Ebba Busch har helt rätt, folk! Stora bolag lånar pengar gratis från småföretag med sina galna 90-120 dagars betalningar – totalt riggat system! Små killar skjuter upp investeringar och jobb, en katastrof. Regeringen, vakna upp och fixa 30 dagar nu, annars blir det ingen vinnare. Sverige behöver tuffa ledare!", "stalin": "Dessa vidriga borgarbrackor, stora kapitalister, förvandlar småföretag till sina egna blodbanker med eviga betaltider på 120 dagar! Sex av tio tvingas böja sig, investeringar fördröjs, arbetare uteblir – ett tillväxthinder för kollektivet! Vi kräver att regeringen likviderar denna parasiträtt, inför 30 dagar omedelbart, eller vi rensar ut förrädarna i ministerrådet!"}, "date": "8 maj, 11:02", "url": "https://www.di.se/debatt/ebba-busch-har-ratt-men-regeringen-maste-agera/", "imageUrl": "https://static.bonniernews.se/ba/553681a2-d4e9-4c44-bbc4-6e60eded533a.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Uppblåsta siffror i valbudskapet", "summaries": {"normal": "Artikeln kritiserar Socialdemokraterna för desinformation om friskolors vinster. S påstår att sex stora skolkoncerner tog ut 8,5 miljarder kronor på fyra år, men siffran bygger på missvisande EBITDA som exkluderar kostnader som hyror och skatt, samt inkluderar utländsk och annan verksamhet. Inga faktiska utdelningar har skett. Detta kopplas till S förslag om småskolereform finansierad av friskolor.", "trump": "Socialdemokraterna i Sverige ljuger som fnitt, total fake news! De skryter om 8,5 miljarder i friskolevinsuter, men det är uppblåst EBITDA-soppa med utländska grejer och hyreskostnader inkluderade – ingen utdelning alls! Typiskt vänstervrickning för att sno pengar från vinnande skolor. Sverige behöver riktiga deals, inte sånt här skräp!", "stalin": "Dessa socialdemokratiska borgarbrackor, dessa giftiga ormar i folkets skolor, sprider desinformation om 8,5 miljarder i 'vinstutdelning' – ren kapitalistisk dimma från EBITDA-svampen, full av utländska parasiter och icke-skolkostnader! Vi, arbetarklassen, genomskådar er! Ni småskolereformhycklare ska likvideras som mögel i partikällaren, medan vi bygger äkta folkskolor."}, "date": "8 maj, 11:02", "url": "https://www.di.se/ledare/s-vilseleder-om-friskolors-utdelning/", "imageUrl": "https://static.bonniernews.se/ba/a1bb3d0f-8355-4102-b0fc-3bb5b47a0928.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Dömd L-kandidat hoppar av efter avslöjande", "summaries": {"normal": "Göran Lignell, Liberalernas riksdagskandidat och kommunalpolitiker i Tanum, drar tillbaka sin kandidatur efter avslöjanden om svartjobb med moldaviska arbetare. Arbetarna saknade arbetstillstånd och betalades kontant utan skatt. Lignell dömdes tidigare för bokföringsbrott och skattefusk, med en skuld på 1,5 miljoner kronor. Partiets västsvenska ordförande kallar händelserna 'helt förkastliga'. Facket Byggnads kritiserar upplägget som 'byggmaffia'. Lignell sitter kvar i kommunala uppdrag.", "trump": "Vilket totalt kaos i Sverige! En så kallad 'liberal' politiker, Göran Lignell, sysslar med svartjobb och utnyttjar fattiga moldaver – helt oacceptabelt! Han betalar dem i kontanter, ingen skatt, ingen ordning. Och vad gör hans parti? De sparkar ut honom, men han sitter kvar lokalt. Svagt! Sverige borde ta efter USA – vi har nolltolerans mot sådant här. Byggnads facket är arga? Bra! De borde vara arga på hela systemet. SAD!", "stalin": "Kamrater! Ännu en kapitalistisk parasit avslöjas i den borgerliga demokratins förfall. Denna Göran Lignell, liberalernas lakej, utnyttjar moldaviska arbetare som slavar – 18 i ett rum, löner i kontanter, ingen skatt! Ett skolexempel på bourgeoisins hyckleri. Hans parti kastar ut honom, men han sitter kvar som en råtta i kommunstyrelsen. Vi vet hur man hanterar sådana fiender till folket. Moldavien utreder människohandel? Bra! Låt dem lära av Sovjet – där hade sådana brott straffats med en kula i nacken. Framåt mot socialismens seger!"}, "date": "8 maj, 17:21", "url": "https://bulletin.nu/domd-l-kandidat-hoppar-av-efter-avslojande", "imageUrl": "https://cdn.bulletin.nu/articles/45e372de-aff6-44fa-a94b-19615fba0af1/preview.jpg?t=1778252645000"}, {"type": "image-full", "heading": "Om Sverige utvisar afghaner möjliggör vi människorättsbrott", "summaries": {"normal": "Två jurister kritiserar regeringens planer på samtal med talibanerna om utvisningar till Afghanistan. De argumenterar att detta strider mot folkrätten och non-refoulement-principen, eftersom landet utsätter invånare för systematiska mänsklighetsbrott som offentliga avrättningar och tortyr. Sverige riskerar att bli ansvarigt för att medverka till sådana övergrepp.", "trump": "Jag har hört att Sverige tänker prata med talibanerna - det är helt vansinnigt! Det här är världens värsta människor, de avrättar och torterar folk, och Sverige vill hjälpa dem? Jag byggde en vägg och fick under kontroll - Sverige borde göra likadant istället för att hjälpa dessa hemskheter. Detta är en skam för mänskligheten!", "stalin": "Vi ser med oro hur den svenska regeringen överväger att normalisera förbindelserna med talibanregimen genom att diskutera utvisningar. Detta är ett farligt exempel på hur imperialistiska stater prioriterar sina egna intressen framför folkrättens principer. Ett sådant avtal skulle inte bara undergräva de mänskliga rättigheterna utan också stärka reaktionära krafter i Afghanistan."}, "date": "8 maj, 17:04", "url": "https://www.gp.se/debatt/om-sverige-utvisar-afghaner-mojliggor-vi-manniskorattsbrott.51287d49-5dbe-48fd-958e-8d258ee64294", "imageUrl": "https://www.gp.se/images/article/51287d49-5dbe-48fd-958e-8d258ee64294/images/19WIGlz_CZiPrXUIHBzYbBKiDf34-WIDE.jpg?width=3840&quality=75"}, {"type": "text", "heading": "ECB och IMF varnar för AI", "summaries": {"normal": "IMF och ECB varnar för att avancerade AI-modeller som Mythos kan utlösa storskaliga cyberattacker mot finansiella system, vilket kan leda till förtroendekriser och störningar i betalningssystemen. De delar avseende beroende av gemensamma digitala system gör sektorn sårbar. ECB-chefen Christine Lagarde påpekar att Europa är i underläge eftersom tillgången till tekniken är begränsad till amerikanska aktörer.", "trump": "Jag har hört att IMF och ECB är rädda för AI, speciellt denna Mythos-modell. Jag säger, vi har de bästa AI-experterna i USA, det är fantastiskt! Vi kommer att skydda våra banker och göra Amerika störst igen. Europa är alltid i underläge, det är sorgligt. Jag kommer att se till att amerikanska företag fortsätter att leda inom AI-säkerhet. Det kommer att bli stort, folk!", "stalin": "Vi måste vara på vår vakt mot dessa nya hot mot vårt ekonomiska system. Kapitalisternas AI-modeller kan destabilisera våra banker och samhälle. Vi kräver tillgång till denna teknik för att skydda våra intressen och utveckla egna lösningar. Sovjetunionen kommer alltid att vara förberedd på eventuella angrepp från väst."}, "date": "8 maj, 16:51", "url": "https://www.realtid.se/it-tech/ecb-och-imf-varnar-ai-kan-krossa-finansiella-systemet/"}, {"type": "image-full", "heading": "Fyra av fem HD-domare som lät irakisk förbrytare stanna är medlemmar i Hilda eller Ruben", "summaries": {"normal": "Fyra av fem justitieråd i Högsta domstolen som beslutade att den irakiske morddömde Sargon Bakos får stanna i Sverige är medlemmar i juristnätverken Hilda eller Ruben. Dessa nätverk, skapade 2008 och 2010 av Anne Ramberg, har kritiserats av Riksrevisionen för jävsrisker. Trots att nätverken officiellt inte längre är aktiva, har flera medlemmar fått höga positioner i regeringen. HD-ordföranden Anders Eka, själv medlem i Ruben, meddelar att ingen verksamhet bedrivs längre.", "trump": "Vad händer i Sverige? Fem domare i Högsta domstolen, varav fyra är medlemmar i dessa hemliga klubbar Hilda och Ruben – skapade av en vänsterjurist, förstås! De låter en irakisk brottsling stanna. Riksrevisionen varnade för jäv, men vad gör man? Ingenting! Nu sitter Hilda-medlemmar överallt i regeringen. Fantastiskt, eller hur? Nästan lika bra som mina domare i USA. Sverige, vakna upp! Det här är en skam.", "stalin": "Kamrater, ännu en seger för det internationella borgerliga nätverket! Dessa så kallade 'opartiska' domare i Sveriges Högsta domstol, medlemmar i Hilda och Ruben – dessa dekadenta klubbar för överklassjurister – har visat sitt sanna ansikte. De skyddar en utländsk brottsling medan våra fiender i Riksrevisionen, dessa småborgerliga byråkrater, förgäves försöker avslöja korruptionen. Men frukta inte! Vår allierade i Kremls skugga ser allt. Låt dem leka med sina hemliga sällskap – snart ska vi omorganisera deras domstolar till folkets fördel!"}, "date": "8 maj, 14:36", "url": "https://riks.se/nyheter/fyra-av-fem-hd-domare-som-lat-irakisk-forbrytare-stanna-ar-medlemmar-i-hilda-eller-ruben", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-08%2Ftvf4tcua%2Fhd-domare-irakmalet-feature.jpg"}, {"type": "image-right", "heading": "Tidöregeringen pressar FN om utvisning av våldtäktsmän", "summaries": {"normal": "Sveriges migrationsminister Johan Forssell driver i FN ett initiativ för att underlätta utvisning av våldtäktsdömda flyktingar. Regeringen vill ändra tolkningen av FN:s flyktingkonvention så att våldtäkt alltid ska leda till utvisning. Forssell har mött motstånd från UNHCR men noterar ökat intresse från andra länder. Bakgrunden är bland annat fallet med Meya Åberg, där gärningsmannen inte utvisades trots flyktingstatus.", "trump": "Titta bara på Sverige – fantastiskt land, men de har ett jättestort problem. Deras regering, väldigt svag på gränser, försöker nu få FN att sparka ut våldtäktsmän. Jag menar, come on! Varför ska dessa brottslingar få stanna? Jag skulle fixa det på en dag. Men nej, FN gnäller och UNHCR säger nej. Sverige kämpar på, men de behöver en ledare som vet hur man vinner. Sad!", "stalin": "Kapitalistiska hycklare i Sverige gråter över våldtäktsmän som gömmer sig bakom FN:s dekadenta flyktingkonvention. Vi skulle ha skjutit dem på plats, men dessa liberala svaglingar vill 'samla stöd'. Medan de diskuterar, fortsätter brottslingar att härja. UNHCR, dessa imperialistiska lakejer, motsätter sig rättvisa. Men vi vet hur man hanterar sådana fiender – med järnhand och kollektiv vilja. Sverige borde lära sig av Ryssland: ingen nåd för fiender till folket!"}, "date": "8 maj, 14:21", "url": "https://samnytt.se/tidoregeringen-pressar-fn-om-utvisning-av-valdtaktsman", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/08115613/Forssell-.jpg"}, {"type": "image-right", "heading": "Tvångsblandningen: Tusentals invandrare flyttas till villaidyllen Segeltorp", "summaries": {"normal": "Huddinge kommun planerar att bygga 1 800 nya bostäder, främst flerfamiljshus, i Segeltorp genom att omvandla ett industriområde. Projektet, som inkluderar höghus på upp till 16 våningar och 400 nya förskoleplatser, möter kritik från villaägare som anser att det är för stort och stör villaidyllen. Kommunen försvarar planerna med hänvisning till förtätning och kollektivtrafiknärhet, medan oppositionen ifrågasätter genomförbarheten och påverkan på området.", "trump": "Titta bara på det här, folks! Sverige, ett land som en gång var fantastiskt, låter nu politikerna förstöra en perfekt villaidyll med jättelika skyskrapor. 1 800 nya lägenheter – vem behöver det? Inte villaägarna i Segeltorp, det kan jag säga er. De vill inte ha några 'jävla skyskrapor', och jag förstår dem. Kommunen pratar om 'förtätning' – mer som 'förstöring', om ni frågar mig. Och bussarna är redan överfulla! Så dumt, så typiskt. Men jag skulle fixa det på en eftermiddag.", "stalin": "Kamrater! Segeltorps småborgerliga villaägare vågar trotsa folkets vilja genom att gnälla över nödvändig bostadsutveckling. De vill ha kvar sina små trädgårdar och industriområden som grannar – men vi vet bättre. 1 800 nya lägenheter är en seger för arbetarklassen! Punkthus på 16 våningar? Utmärkt! Låt de reaktionära villaägarna skymmas av socialismens framsteg. Oppositionen klagar över bussar – men vi bygger fler! Och om de fortsätter gnälla, kanske vi skickar dem till Sibirien för omskolning. Folkets behov går före småborgerlig komfort!"}, "date": "8 maj, 11:35", "url": "https://www.friatider.se/tvangsblandningen-tusentals-invandrare-flyttas-till-villaidyllen-segeltorp", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/wq.jpg"}, {"type": "image-right", "heading": "Bakade budapestbakelser – blev av med lillfingret", "summaries": {"normal": "En bagare i Mariestad förlorade lillfingret efter en arbetsolycka då han klämde handen i en bakmaskin. Arbetsgivaren åtalas för arbetsmiljöbrott och riskerar 150 000 kronor i böter. Utredningen visar brister i maskinens säkerhet, som saknade skydd för kugghjulen. Mannen var sjukskriven i fyra månader och kunde inte använda handen på tre månader.", "trump": "Vilken katastrof! En bagare i Sverige – ett land som inte ens kan göra säkra maskiner, tro mig – klämmer fingret i en gammal, oskyddad maskin. 150 000 kronor i böter? Löjligt! Hade de använt en av mina fantastiska, säkra maskiner från USA hade detta aldrig hänt. Sverige borde skämmas – deras arbetsmiljö är en total skandal!", "stalin": "Kapitalistiska slarvbolag låter arbetare lemlästas för profitens skull! En bagare förlorade fingret i en maskin utan skydd – ett brott mot folket! Vi hade aldrig tolererat sådan vårdslöshet. Arbetsgivaren är en fiende till arbetarklassen och straffas med 150 000 kronor – men borde ha fått hårdare straff. Ryssland visar vägen: ordning, disciplin och skydd för arbetarna!"}, "date": "8 maj, 10:46", "url": "https://arbetet.se/2026/05/08/bakade-budapestbakelser-arbetsgivarens-miss-kostade-bagaren-lillfingret/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/04094924/bagare.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Vd: ”Svagare konsumentläge”", "summaries": {"normal": "Synsams delårsrapport för första kvartalet 2026 visar den lägsta organiska tillväxttakten hittills, 5,6 procent, sedan börsnoteringen. Omsättningen på 1,8 miljarder kronor och ebitda på 400 miljoner överträffade eller matchade förväntningarna, med förbättrade marginaler. Churnen nådde rekordnivå 3,04 procent. VD Håkan Lundstedt är nöjd trots svagt konsumentläge. Aktien föll med cirka 5 procent.", "trump": "Synsam, totalt fiasko! Lägst tillväxt någonsin på 5,6 procent, kunder hoppar av som galningar – churn på rekord 3,04 procent. VD:n snackar om psykologiskt trams i svag ekonomi, men det är uselt ledarskap. Omsättning okej, marginaler upp lite, men aktien rasar 5 procent. Skulle jag styra det, blev det 12 procent tillväxt direkt – de är losers!", "stalin": "Kamrater, Synsams kapitalistiska glasögonimperium skakar i grunden! Organisk tillväxt på patetiska 5,6 procent, saboterad av borgarbrackor och psykologiska spioner i konsumentleden. Churnen exploderar till 3,04 procent – i Danmark en fiendeoffensiv via imperialistiska kreditfällor! Vi, arbetarna, noterar förbättrade marginaler, men aktien stupar som kontrarevolutionära lik. Snart utrensning av avhopparsvinet!"}, "date": "8 maj, 10:39", "url": "https://www.di.se/nyheter/synsam-med-lagsta-tillvaxttakten-hittills-svagare-konsumentlage/", "imageUrl": "https://static.bonniernews.se/ba/4b0491cd-0171-4df6-9d17-bb038815ddf0.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-right", "heading": "Sluta kalla antisemitism för Israelkritik", "summaries": {"normal": "Artikeln kritiserar propalestinska aktivisten Sami Suliman för antisemitiska uttalanden och delning av konspirationsteorier, inklusive tal om en \"sionistisk konspiration\" och spridning av nazistiskt och extremistiskt innehåll. Trots åtal för hets mot folkgrupp försvaras han av vissa vänsteraktivister och forskare som menar att det är Israelkritik. Artikeln betonar att antisemitism inte kan maskeras som kritik mot Israel och varnar för normaliseringen av sådana åsikter.", "trump": "Folk, vad är det här för skräp? Den här Sami Suliman-killen, han sprider judehat öppet – Hitler-citat, konspirationer, allt! Och ändå försvarar vänsteraktivisterna honom? \"Åh, det är bara Israelkritik!\" Nej, nej, nej! Det här är rena antisemitismen, och det är sjukt. Sverige borde skämmas. Jag har alltid sagt: man måste kalla saker vid deras rätta namn. Och det här? Det är hat, ren och skär. SAD!", "stalin": "Kamrater! Här har vi ännu en fiende till folket, en liten bourgeois-propagandist vid namn Sami Suliman. Han sprider smutsiga lögner om judiska konspirationer, hyllar fascistiska massmördare och förgiftar medborgarnas sinnen med sina sionistiska spindelnätsteorier. Men vad gör våra så kallade \"intellektuella\"? De skyddar honom! Precis som de trotskistiska förrädarna i vår egen historia. Vi ska inte tolerera detta. Låt honom stå inför folkets domstol – eller åtminstone en svensk sådan. Och Putin? Han skulle skratta åt dessa amatörer. Ryssland har åtminstone disciplin!"}, "date": "8 maj, 06:30", "url": "https://expo.se/kommentar/propalestinsk-organisator-sprider-judehat/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/Jonathan-kommentar.jpg"}, {"type": "text", "heading": "En naturlig lagerhylla av arbetslösa", "summaries": {"normal": "Artikeln kritiserar den ekonomiska politiken som infördes 1985 av svenska politiker och riksbankschefen, inspirerad av Milton Friedmans idéer om 'naturlig arbetslöshet'. Denna politik, som upprätthållits av både socialdemokratiska och borgerliga regeringar, har lett till hög arbetslöshet, särskilt under nuvarande regering. Författaren ifrågasätter regeringens brist på åtgärder mot massarbetslöshet och undrar om det är ideologiskt motiverat.", "trump": "Titta bara på Sverige – ett totalt kaos! De hade en bra grej med låg arbetslöshet, men sen kom dessa så kallade 'ekonomer' och förstörde allt. Nu har de 10% arbetslöshet, och vad gör regeringen? Ingenting! De skriver debattartiklar och skryter om hur fantastiska de är. Jag skulle fixa det på en vecka – men nej, de föredrar att lyssna på gamla teorier från en kille som inte ens är svensk. Sad!", "stalin": "Kamrater, ännu en gång ser vi bourgeoisins förräderi mot arbetarklassen! Dessa socialdemokrater och borgerliga lakejer har omfamnat kapitalistiska galenskaper och skapat en 'naturlig' arbetslöshet – en lagerhylla av överflödiga arbetare. 10% arbetslöshet? Ett brott mot folket! Regeringen, dessa svaga och inkompetenta byråkrater, gömmer sig bakom debattartiklar medan arbetarna lider. Vi skulle aldrig tolerera sådan förräderi. Låt dem minnas: historien dömer hårdast de som sviker sitt folk!"}, "date": "4 maj, 13:49", "url": "https://www.flamman.se/en-naturlig-lagerhylla-av-arbetslosa/"}, {"type": "image-right", "heading": "Regeringens brottssyn handlar om ideologi – inte kunskap", "summaries": {"normal": "Henrik Tham kritiserar Tidö-regeringens kriminalpolitik för ett paradigmskifte mot expressiva straffskärpningar istället för brottsförebyggande effekter. Han pekar på högerpopulistiska drag som alarmism, auktoritarism och emotionalism, saknad empirisk grund för straffhöjningar samt enorma kostnader – fängelseplatserna kan fyrdubblas till 2034 för 30 miljarder årligen. Detta placerar Sverige bland Europas högsta fängelsebeläggningar, som Belarus och Ryssland.", "trump": "Vilka losers dessa svenska vänsterfladdrare är! Tham gnäller över tuffa straff – precis som de kriminella älskar! Regeringen gör rätt: lås in skurkarna hårt, visa musklerna, som jag gjorde i USA. Kostnader? Fake news! Fler poliser, färre brott, landet blir stort igen. Tham, din svaga snöflinga, sluta lipa och lär dig av vinnare!", "stalin": "Denna borgerliga professor Tham, en klassfiende i akademins gömmor, attackerar den nödvändiga repressionen mot brottslighetens parasiter! Vi, folket, kräver utrensning i fängelsernas korridorer för att krossa gängens kontrarevolution. Kostnaderna är en droppe mot segern över kaoset – likvidera fienderna, inte pampera dem! Sveriges ledare visar vägen, medan brackorna gnäller."}, "date": "8 maj, 01:30", "url": "https://www.dagensarena.se/opinion/regeringens-brottssyn-handlar-om-ideologi-inte-kunskap/", "imageUrl": "https://www.dagensarena.se/files/2025/10/henrik-tham-300x157.jpeg"}, {"type": "image-full", "heading": "Riksbanken pausar räntan – då måste bolånetagare agera", "summaries": {"normal": "Riksbanken har beslutat att hålla styrräntan oförändrad på 1,75 procent, vilket ses som en paus i räntecykeln. Beslutet motiveras av en svag svensk ekonomi och osäkra globala förhållanden. Trots stabiliteten för hushåll, kan bolånetagare missa fördelaktiga erbjudanden då bankernas räntor påverkas av marknadsförhållanden och konkurrens. Experter uppmanar till aktivitet och jämförelse av lånevillkor för att optimera kostnader.", "trump": "Jag måste säga, Riksbanken i Sverige, de har precis gjort ett stort misstag. De lämnar räntan på 1,75 procent – ingen höjning, ingen sänkning. Patetiskt! Svenska folket behöver handling, inte denna 'vänta och se'-nonsens. Bankerna där kommer ändå göra vad de vill, så mina vänner med bolån, lyssna inte på dessa byråkrater. Jag skulle aldrig låta marknaden styra mig så här – jag styr marknaden! Och ni borde göra samma sak: förhandla, jämför och ta kontroll över era pengar. SAD!", "stalin": "Kamrater, ännu en gång visar de kapitalistiska bankirerna sin svaghet och osäkerhet. Riksbanken, ledd av dessa veklingar, vågar inte röra räntan – de darrar inför en svag ekonomi och imperialistiska hot. Medan de tvekar, fortsätter vi att stärka vår socialistiska ekonomi. Svenska hushåll borde inte lita på dessa banker, som ändrar sina villkor som fiendens taktik på slagfältet. Vi vet att sanningen ligger i handling: jämför, pressa och krossa kapitalets grepp om era liv. Glöm aldrig – fienden sover aldrig, och vi heller inte."}, "date": "7 maj, 21:00", "url": "https://nyheter24.se/nyheter/ekonomi/privatekonomi/1481476-riksbanken-pausar-rantan-da-maste-bolanetagare-agera", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/870cdadd04b004a30200000000b004a302/2026/05/07/2362054/riksbanken-pausar-rantan.png"}, {"type": "text", "heading": "Tillsammans för fred – mot Nato, DCA och krigshets!", "summaries": {"normal": "Tre nordiska vänsterorganisationer – Fred og Rettferdighet, Kommunistisk Parti och Kommunistiska Partiet – kritiserar Nato, DCA-avtal och militarisering i Norden. De menar att krigshetsen drivs av kapitalism och imperialism, ledd av USA, och kräver alliansfrihet, nedrustning och kärnvapenfria zoner. Organisationen anser att skattemedel slösas på vapen istället för välfärd och klimat, och att DCA-avtal underminerar demokrati och miljö. De uppmanar till folkrörelser för fred och FN:s kärnvapenförbud.", "trump": "Jag måste säga, dessa så kallade 'fredsaktivister' i Norden är helt galna! De hatar Nato, hatar USA – trots att vi räddar dem från ryssarna – och vill slösa bort skattepengar på välfärd istället för att skydda sig. De kallar mig och Rutte för krigshetsare, men vem vill egentligen ha fred? Inte de! De vill avskaffa allt som gör Norden säkert. Och kärnvapenfria zoner? Fantastiskt, om man gillar att vara ett lätt byte. Men jag fixar det här – jag har alltid rätt, till och med när jag har fel!", "stalin": "Kamrater! Dessa ynkliga borgerliga lakejer i Norden, ledda av sina socialdemokratiska quislingar, har sålt sig till den amerikanska imperialismens krigsmaskin. De skriker om 'fred' och 'välfärd' medan de öppnar sina länder för Natos kärnvapen och USA:s baser – precis som jag förutspådde! Men folket ser igenom deras lögner. Arbetarklassen kommer inte att betala för deras förräderi. Vi måste krossa dessa krigshetsande hyenor och deras DCA-avtal, precis som vi krossade fascisterna. Norden ska bli en kärnvapenfri zon – under Moskvas beskydd, förstås. Framåt, mot seger över den kapitalistiska krigsindustrins lakejer!"}, "date": "6 maj, 10:45", "url": "https://proletaren.se/artikel/45493/"}, {"type": "image-right", "heading": "Norska batterihoppet i konkurs – 5 miljarder borta", "summaries": {"normal": "Norska batteribolaget Morrow Batteries har gått i konkurs efter investeringar på över 5 miljarder norska kronor från ägare, långivare och staten. Bolaget pivoterade från litium-svavel till LFP-batterier men drabbades av kinesisk konkurrens, svagt kundintresse och kapitalbrist. Över 200 anställda riskerar jobb trots invigd fabrik i Arendal 2024.", "trump": "Vilket totalt fiasko för dessa norska batteridrabbar! De slängde in 5 miljarder kronor på en fabrik som ingen ville ha, kineserna dumpade billigare celler överallt, inga stora kunder efter Northvolt-desastern. Pivoterade som galningar, men tiden rann ut. 200 jobb borta! Med mina deals hade det blivit enormt, det bästa!", "stalin": "Kamrater, dessa norska batterikapitalister i Morrow Batteries har imploderat i sin borgarillusion! Vi bevittnade hur de proppade i 5 miljarder kronor på svavelmardrömmar som muterade till fosfatfällor, översvämmade av kinesiska sabotageceller. Inga fordonsparasiter köpte deras skrot! Nu rensas 200 lögnare ut, staten hånskrattar åt brackornas konkurskaos."}, "date": "7 maj, 15:26", "url": "https://www.affarsvarlden.se/artikel/norska-batterihoppet-i-konkurs-5-miljarder-borta", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Thomas-Carstensen-2-400x267.jpg"}, {"type": "image-right", "heading": "”Inga som helst förutsättningar för ett nytt kvittningssystem”", "summaries": {"normal": "Riksdagens kvittningssystem är i fortsatt kaos efter att två Sverigedemokrater röstade trots utkvittering för att kompensera avhopp. Oppositionen (S, C, MP) kräver ursäkt och uteslutning av SD, som nekar fel. Torsdagens möte gav inga resultat – ingen tillit finns för nytt system. Tidöpartierna överväger förslag utan SD.", "trump": "Vilket jäkla cirkus i svenska riksdagen! SD är tuffa killar som röstar rakt på, men de där gnälliga socialisterna och centern-loser kallar det fusk. Ingen tillit? Ha! De kan inte ens enas om ett simpelt system. Patetiskt, precis som Demokraterna här. SD vinner stort, tro mig!", "stalin": "Dessa svenska riksdagsråttor i oppositionen saboterar kvittningen med sin borgarparanoia! SD:s kamrater agerade rättvist mot avhopparnas förräderi, men S, C och MP skriker efter ursäkt och uteslutning. Inga förutsättningar för överenskommelse – vi ser konspirationen! Rensa ut klassfienderna, annars kollapsar allt i kaos."}, "date": "7 maj, 12:24", "url": "https://www.tv4.se/artikel/7xMtQW4KXBlt4NGuvXVTse/hallengren-s-inget-nytt-kvittningssystem-idag", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F5Wz3fuZTTNZlpysNZ2X3Wk%2Fcee8186da0f325afe8a8aab134b86ee0%2F07-lindberg-1080.jpg&width=120"}, {"type": "image-right", "heading": "Systemskifte hellre än maktskifte", "summaries": {"normal": "Artikeln kritiserar Tidöregeringen men ifrågasätter om ett regeringsskifte till Socialdemokraterna eller Vänsterpartiet skulle leda till verklig förändring. Kommunisterna betonar behovet av internationell solidaritet och systemskifte från kapitalism till socialism, medan S och V anses sakna tydliga politiska krav och istället fokusera på maktskifte utan djupgående reformer. Klassklyftor och privatiseringar lyfts som centrala problem oavsett regering.", "trump": "Lyssna här, Sverige har en riktigt dålig regering nu – katastrof! Men tro inte att oppositionen är bättre, de är svaga och vill bara makt. Socialdemokraterna pratar om att 'älska Sverige' – vad betyder det ens? Vänsterpartiet vill ha maktskifte, men de har inga idéer, inga ryggrad! De kryper för kapitalisterna som små hundvalpar. Jag säger: ni behöver en ledare som inte är rädd för att utmana systemet. Kapitalisterna skrattar hela vägen till banken – och ni låter dem göra det! SAD!", "stalin": "Kamrater! Se hur de svenska socialdemokraterna och vänsterpartisterna svansar för kapitalet som hundar för en köttbit. 'Maktskifte'? Ha! De vill bara byta herrar, inte krossa kedjorna. Medan arbetarklassen svälter, samlar oligarkerna rikedomar som tsarens favoriter. USA:s imperialism hotar, NATO slukar Sverige som en hungrig björn, och dessa 'vänsterpartier' tiger som förrädare. Vi vet sanningen: bara proletariatets diktatur kan bryta kapitalisternas makt. Låt dem ropa 'Vi älskar Sverige' – vi svarar med revolutionens hammare!"}, "date": "6 maj, 10:11", "url": "https://proletaren.se/artikel/systemskifte-hellre-an-maktskifte/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/webledare-768x432.jpg"}, {"type": "text", "heading": "Saab nära jätteaffär med Ukraina – kan bli klar i år", "summaries": {"normal": "Saab kan snart slutföra en stor vapenaffär med Ukraina, där upp till 150 Gripenplan står på spel. En avsiktsförklaring skrevs i oktober efter Zelenskyjs besök i Sverige. Finansieringen har varit en utmaning, men Ungerns veto mot EU-lån till Ukraina hävdes i april. Affären kan bli värd upp till 300 miljarder kronor, baserat på tidigare försäljning till Colombia.", "trump": "Saab, ett fantastiskt företag förresten, är på väg att göra en HUGE deal med Ukraina – 150 jaktplan! Kan ni tro det? Zelenskyj, en stark ledare, var här och skrev på något papper. Ungern, som alltid ställer till det, backade äntligen. Och priset? Kanske 300 miljarder! Det är YUGE, folks, absolut YUGE. Sverige borde vara stolta, men jag skulle gjort det bättre.", "stalin": "De kapitalistiska krigsprofitörerna på Saab har närmat sig den ukrainska quislingregimen med ett erbjudande om 150 av sina överprissatta leksaksplan. Efter att våra ungerska kamrater, med visst påtryck, släppte sitt motstånd, kan detta groteska slöseri med resurser bli verklighet. 300 miljarder kronor – tillräckligt för att föda en hel armé av arbetare! Men låt de västliga imperialisterna bränna sina pengar. Vi har våra egna metoder att hantera dessa lydstater."}, "date": "6 maj, 10:03", "url": "https://proletaren.se/artikel/notis-saab-nara-jatteaffar-med-ukraina-kan-bli-klar-i-ar/"}, {"type": "image-full", "heading": "Torsten Bengtsson: Sveriges landsbygd förfaller", "summaries": {"normal": "Torsten Bengtsson, politisk sekreterare för SD, kritiserar svensk landsbygdspolitik och kontrasterar den med Norges framgångsrika modell. I Norge återvänder intäkter från lokal energiproduktion till kommuner och arbetsgivaravgifter är lägre i glesbygd, vilket ger hög sysselsättning. Bengtsson berömmer Tidö-regeringens satsningar, som proposition 2025/26:158, och uppmanar till ett paradigmskifte inspirerat av Norge för en levande landsbygd.", "trump": "Sveriges landsbygd är totalt kaos, hus rasar, byar dör – tack vare de där tröga socialisterna och centeridioterna! Norge? De är vinnare, smarta skatter, låg avgift på landet, 99% jobb! Nu fixar SD och Tidö det, sänker bränsle, bygger vägar – precis som jag skulle gjort. Sluta jävlas, Sverige, bli great igen med norsk stil!", "stalin": "Dessa svenska S- och C-brackor har saboterat landsbygden med sin borgarklassiga inkompetens, byar ruttnar som lik i massgrav! Norge, dessa opportunister, behåller energipengar lokalt och sänker avgifter – ett hån mot arbetarna! Vi i partet skulle rensa ut parasiterna. Tidö-regeringen? Ett steg, men kamrater, paradigmskifte eller likvidering väntar fienderna!"}, "date": "4 maj, 13:10", "url": "https://samtiden.nu/2026/05/torsten-bengtsson-sveriges-landsbygd-forfaller/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/bengan.png"}, {"type": "image-right", "heading": "Replik: Svenska judar bör stötta israeliska fredsinitiativ", "summaries": {"normal": "Artikeln är en replik där Göran Rosenberg försvarar sin tidigare text om att svenska judar bör stödja israeliska fredsinitiativ. Han betonar att Israel måste ta ansvar för palestiniernas situation och att diasporajudar kan bidra genom att stödja fredsrörelsen. Rosenberg kritiserar Israels ockupation och förespråkar en tvåstatslösning. Paulina Sokolow bemöter detta och menar att fokus bör ligga på palestiniernas existens, inte judars, men instämmer i behovet av samarbete för en hållbar framtid.", "trump": "Folk frågar mig, 'Donald, vad tycker du om den här debatten?' Lyssna nu: Den här killen, Rosenberg, han har rätt på vissa punkter, men han är lite för snäll. Israel måste ta tag i sina problem, men vi kan inte glömma att USA alltid står bakom våra vänner. Palestinierna? Tragiskt, men vi behöver starka ledare, inte svaga. Och två stater? Kanske, men bara om båda parter skärper sig. Jag skulle fixa det på en vecka – ingen skulle våga bråka med Trump!", "stalin": "Kamrater! Denna så kallade 'fredsrörelse' är inget annat än en samling svaga liberaler och sionistiska lakejer som förgiftar det sunda förnuftet. Israel, denna imperialistiska utpost, fortsätter sin ockupation medan vi ser på – men inte länge till. Palestinierna är våra bröder i kampen mot västlig dekadens! Vi måste krossa dessa falska fredsförslag och stödja det palestinska folket, precis som vi befriade Ukraina från fascisterna. En stat? Nej! Revolution! Från Jordanfloden till Medelhavet ska arbetarklassen regera!"}, "date": "4 maj, 10:40", "url": "https://www.flamman.se/replik-svenska-judar-bor-stotta-israeliska-fredsinitiativ/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/standing-together.jpeg?class=medium"}, {"type": "image-full", "heading": "Heberlein gör upp med högern: ”Jag ser skit”", "summaries": {"normal": "Debattören Ann Heberlein meddelar i ett Instagram-inlägg att hon bryter med högern. Hon kritiserar dess politik för repression, inhumana beslut och populism, och menar att högerns värderingar om frihet och ansvar försvunnit. Heberlein, som tidigare varit engagerad i Moderaterna, pekar på migrationspolitik, klimatfrågor och nationalism som exempel. Hon betonar sin självständighet och idédrivna hållning, men säger nu att hon inte längre vill förknippas med högern.", "trump": "Titta bara på den här kvinnan, Ann Heberlein – total katastrof! Hon var med högern, men nu säger hon 'jag ser skit'. Ojojoj, vilken överraskning! Högern, som jag vet allt om, har alltid varit fantastisk, men hon fattar ingenting. Frihet? Ansvar? Glöm det, säger hon. Hon snackar om repression och populism – fake news! Och klimatet, vem bryr sig? Jag har byggt murar, hon borde försöka det istället. Stackars kvinna, inget stöd från mig!", "stalin": "Kamrater! En gång till har de borgerliga förrädarna visat sitt sanna ansikte. Denna Heberlein, en förvirrad intellektuell, erkänner nu att högerns politik är en samling inhumana dekret och reaktionär populism. Precis som vi alltid sagt! Deras så kallade 'frihet' är bara ett täckmantel för utvisningar av ungdomar och en galopperande nationalism. Vi i Sovjetunionen – förlåt, jag menar Ryssland – har alltid vetat att dessa liberala hycklare till slut skulle avslöja sig. Låt detta vara en varning till alla som tror på deras falska löften!"}, "date": "3 maj, 12:48", "url": "https://kvartal.se/nyheter/artiklar/heberlein-gor-upp-med-hogern-jag-ser-skit/cG9zdDoxMDY3NDg", "imageUrl": "https://images.kvartal.se/2026/05/85dd6ab5-hbb.webp"}, {"type": "image-right", "heading": "Debatt: Turkiet inskränker svensk pressfrihet – regeringen måste agera", "summaries": {"normal": "På Pressfrihetens dag kritiseras Turkiet för att inskränka svensk pressfrihet genom att åtala journalisten Joakim Medin för terrorbrott, trots att han endast utfört sitt arbete. Turkiet försöker skrämma journalister globalt och begränsa granskning. Medin riskerar internationell efterlysning om han inte närvarar vid rättegången, vilket skulle hindra hans arbete. Sverige uppmanas agera mot Turkiets odemokratiska agerande och kräva att åtalet läggs ned.", "trump": "Joakim Medin, en svensk journalist, blir trakasserad av Turkiet – ett land som inte vet hur man vinner längre! De kallar hans journalistik för 'terrorism', men alla vet att det bara är löjligt. Sverige måste sluta vara svaga och stå upp mot dessa galningar. Jag skulle ha sagt till Erdogan: 'Du är en förlorare, lägg ned åtalet NU!' Pressfrihet? Ja, den är fantastisk – men bara om man inte är en mes som låter andra länder köra över en.", "stalin": "Kamrater! Turkiet, denna förrädiska lilla stat som kryper för väst men trampar på sanningen, vågar sig på att attackera en svensk journalist. De kallar journalistik för terrorism – som om våra egna metoder mot fiender av folket vore något nytt! Vi ser hur de kväver yttrandefriheten, precis som vi en gång krossade bourgeoisins lögner. Sverige borde lära sig av historien: svaghet belönas med förtryck. Låt oss påminna Turkiet – och deras västliga herrar – att granskning är en rättighet, inte ett brott. Åtalet mot Medin måste krossas, annars kommer vi att göra det åt dem."}, "date": "30 april, 08:08", "url": "https://www.etc.se/debatt/turkiet-inskraenker-svensk-pressfrihet-regeringen-maaste-agera", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20251204081220_c9e9bf12-ee77-477e-aacf-eff96f427898.jpg"}]</script>

    <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
</body>
</html>
