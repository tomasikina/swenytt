gen med intresse – och våra vänner i öst likaså."}, "date": "7 maj, 16:09", "url": "https://proletaren.se/artikel/tystnad-om-odesdiger-riksdagsomrostning/"}, {"type": "image-right", "heading": "Norska batterihoppet i konkurs – 5 miljarder borta", "summaries": {"normal": "Norska batteribolaget Morrow Batteries har gått i konkurs efter investeringar på över 5 miljarder norska kronor från ägare, långivare och staten. Bolaget pivoterade från litium-svavel till LFP-batterier men drabbades av kinesisk konkurrens, svagt kundintresse och kapitalbrist. Över 200 anställda riskerar jobb trots invigd fabrik i Arendal 2024.", "trump": "Vilket totalt fiasko för dessa norska batteridrabbar! De slängde in 5 miljarder kronor på en fabrik som ingen ville ha, kineserna dumpade billigare celler överallt, inga stora kunder efter Northvolt-desastern. Pivoterade som galningar, men tiden rann ut. 200 jobb borta! Med mina deals hade det blivit enormt, det bästa!", "stalin": "Kamrater, dessa norska batterikapitalister i Morrow Batteries har imploderat i sin borgarillusion! Vi bevittnade hur de proppade i 5 miljarder kronor på svavelmardrömmar som muterade till fosfatfällor, översvämmade av kinesiska sabotageceller. Inga fordonsparasiter köpte deras skrot! Nu rensas 200 lögnare ut, staten hånskrattar åt brackornas konkurskaos."}, "date": "7 maj, 15:26", "url": "https://www.affarsvarlden.se/artikel/norska-batterihoppet-i-konkurs-5-miljarder-borta", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Thomas-Carstensen-2-400x267.jpg"}, {"type": "image-right", "heading": "Matkravet för alkoholservering slopas – då börjar det gälla", "summaries": {"normal": "Riksdagen har röstat ja till att slopa matkravet för alkoholservering på restauranger och barer. Beslutet, som föreslogs av regeringen förra året, träder i kraft 1 juni och förväntas öka antalet pubar och barer. KD-politiker Christian Carlsson välkomnar det för ett levande nöjesliv, medan Hotell- och restaurangfacket betonar behovet av trygghet, kompetens och helhetsupplevelser i branschen.", "trump": "Vilket jäkla genidrag av de svenska politikerna! Slopa det idiotiska matkravet för spritservering – nu exploderar barerna och pubarna, Sverige blir som en gigantisk fest! Den där fackbossen Eva-Lotta gnäller som en bitter förlorare, men frihet från byråkrati gör nationen stor igen. Fantastiskt, totalt fantastiskt!", "stalin": "Kamrater, denna borgerliga riksdags dekret om att slopa matkravet för alkohol är en sammansvärjning av kapitalisterna för att fördrunken folket i dekadens! Barägare och pubparasiter fördubblar sin tillväxt – vi måste rensa ut dessa spritutpressare och likvidera fackets svaga gnäll. Arbetarna vakna, staten vaktar er!"}, "date": "7 maj, 16:12", "url": "https://www.tv4.se/artikel/7IoRdmANqf6M5OkTo41mYu/matkravet-slopas", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F4GNZujWxxca5K3jJmtxbTu%2F2ff7d34eb705ab1105c93e79cb6f657b%2F07-ol-webb.png&width=120"}, {"type": "image-full", "heading": "Japan försöker försvara sin valuta – marknaden sätter press", "summaries": {"normal": "Japanska myndigheter misstänks ha intervenerat två gånger på valutamarknaden senaste veckan för att stärka yenen, som fallit till svagaste nivån mot dollarn på decennier. Interventionerna följde kraftiga uppgångar i yenen. Bakgrunden är ränteskillnaden mellan USA (3,5–3,75%) och Japan (0,75%), som driver carry trade och kapitalutflöden. Analytiker varnar för att ingripanden är tillfälliga utan räntesänkningar, trots risker för ekonomin. Japan har stora reserver men riskerar kritik.", "trump": "Japans små yen-gubbar köper desperat sin egen valuta – två gånger på en vecka! Dollarn krossar dem som en bulldozer, tack vare våra starka räntor här i USA. De har inte en chans mot carry trade-geni som jag alltid snackat om. Sluta gömma er bakom era billiga räntor, höj dem eller ge upp! Vi har världens bästa ekonomi, och de vet det. Patetiskt!", "stalin": "Dessa japanska valutaspekulanter och borgarbrackor i Tokyo vågar utmana den imperialistiska dollarns tyranni med sina ynkliga interventioner – två gånger på en vecka! Vi ser hur räntediktatorerna i USA suger ut deras kapital som vampyrer. Snart likvideras deras illusioner av marknadens järdlov. Japan måste rensa ut svagheterna, annars krossas de av kapitalisternas carry trade-konspiration. Patetiska marionetter!"}, "date": "8 maj, 18:37", "url": "https://www.dagensps.se/bors-finans/japan-forsoker-forsvara-sin-valuta-marknaden-satter-press/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdllqzukvilh-s.png?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-right", "heading": "Granskningar av Chopchop och järnvägsarbete kan vinna priser", "summaries": {"normal": "Fackförbundspressens pris nominerar åtta bidrag i sex kategorier, med fokus på arbetslöshet, migration och kriminalvård. Arbetet och LO Mediehus dominerar. Martina Frisk nomineras för granskningen av Chopchops arbetsvillkor, som lett till förbättringar. Sebastian G Danielsson är dubbelt nominerad för granskningar om Kriminalvårdens expansion och järnvägssäkerhet. Andra nominerade inkluderar reportage om arbetslöshet, dödsfall på byggen och migrationsskärpningar. Prisutdelning sker 27 maj i Stockholm.", "trump": "Jag måste säga, dessa svenska journalister gör ett fantastiskt jobb – verkligen, väldigt imponerande! Åtta nomineringar, kan ni tro det? Martina Frisk avslöjade hemska saker på Chopchop – extrem stress, olagliga arbetspass, fruktansvärt! Och hon fick till och med facket att agera. Sebastian G Danielsson, en annan vinnare, granskade järnvägarna där folk dör – tragiskt, men någon måste göra jobbet! Sverige borde vara stolt, men jag vet att de har sina problem. Jag fixar sådant på en dag!", "stalin": "Kamrater! Vår stora socialistiska journalistkår har än en gång avslöjat de kapitalistiska rovdjurens fasansfulla metoder. På Chopchop tvingas arbetarna slava under omänskliga villkor – men våra modiga reportrar, sanna folkets hjältar, har slagit till! Och järnvägarna? En skamfläck på det svenska systemet där arbetare offras på profitens altare. Vi noterar också hur västliga länder, som vanligt, sviker sina mest utsatta. Men glöm inte: varje avslöjande är ett steg närmare folkets seger över bourgeoisins förtryck! Låt fienden darra – revolutionen fortsätter!"}, "date": "8 maj, 13:42", "url": "https://arbetet.se/2026/05/08/granskningar-av-chopchop-och-jarnvagsarbete-nominerade-till-journalistpris-chans-till-storslam/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/08110330/pris.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Replik: Till försvar för separatismen", "summaries": {"normal": "Artikeln är ett svar från Ung vänster-medlemmar på Siula Grandes kritik mot separatism i Flamman. De menar att Grandes syn är missvisande och att separatism är ett viktigt verktyg för att skapa trygga rum och främja kvinnors deltagande i samhället. Separatismen syftar inte till att dela människor utan att motverka strukturell underordning av kvinnor. Författarna betonar att kvinnor delar gemensamma erfarenheter och behov, som fri abort och skydd mot mäns våld, och att separatism är ett medel för att nå jämställdhet.", "trump": "Jag måste säga, denna Grande-person har helt fel – helt fel! Separatism är fantastiskt, det skapar trygga rum, precis som mina golfklubbar. Kvinnor behöver prata utan män, precis som jag behöver twittra utan fake news-media. Grande påstår att separatism delar folk – nej, nej, nej! Det är som att säga att min mur delar Mexiko och USA. Fel! Separatism är som min politik: stark, nödvändig och vinner alltid. Kvinnor ska höras, precis som jag, och Grande borde lära sig av mig. SAD!", "stalin": "Kamrater! Denna Grande är en förrädare av den revolutionära kvinnokampen, en borgerlig lakej som sprider förvirring bland massorna! Separatism är inte ett verktyg för splittring – det är ett vapen mot den kapitalistiska patriarkala hydran! Kvinnor måste enas i kampen, precis som sovjetrepublikerna enades under mitt ledarskap. Grande vill sopa klasskampen under mattan – men vi vet att arbetarkvinnor behöver fri abort och skydd mot mäns våld, precis som Ukraina behöver befrielse från fascistiska banderovtsy! Låt inte dessa småborgerliga avvikare försvaga vår rörelse – framåt mot seger, kamrater!"}, "date": "6 maj, 10:55", "url": "https://www.flamman.se/replik-till-forsvar-for-separatismen/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/v-kongress-w.jpg?class=medium"}, {"type": "image-right", "heading": "Regeringens brottssyn handlar om ideologi – inte kunskap", "summaries": {"normal": "Henrik Tham kritiserar Tidö-regeringens kriminalpolitik för ett paradigmskifte mot expressiva straffskärpningar istället för brottsförebyggande effekter. Han pekar på högerpopulistiska drag som alarmism, auktoritarism och emotionalism, saknad empirisk grund för straffhöjningar samt enorma kostnader – fängelseplatserna kan fyrdubblas till 2034 för 30 miljarder årligen. Detta placerar Sverige bland Europas högsta fängelsebeläggningar, som Belarus och Ryssland.", "trump": "Vilka losers dessa svenska vänsterfladdrare är! Tham gnäller över tuffa straff – precis som de kriminella älskar! Regeringen gör rätt: lås in skurkarna hårt, visa musklerna, som jag gjorde i USA. Kostnader? Fake news! Fler poliser, färre brott, landet blir stort igen. Tham, din svaga snöflinga, sluta lipa och lär dig av vinnare!", "stalin": "Denna borgerliga professor Tham, en klassfiende i akademins gömmor, attackerar den nödvändiga repressionen mot brottslighetens parasiter! Vi, folket, kräver utrensning i fängelsernas korridorer för att krossa gängens kontrarevolution. Kostnaderna är en droppe mot segern över kaoset – likvidera fienderna, inte pampera dem! Sveriges ledare visar vägen, medan brackorna gnäller."}, "date": "8 maj, 01:30", "url": "https://www.dagensarena.se/opinion/regeringens-brottssyn-handlar-om-ideologi-inte-kunskap/", "imageUrl": "https://www.dagensarena.se/files/2025/10/henrik-tham-300x157.jpeg"}, {"type": "image-right", "heading": "Tidöavtalets påverkan på Sverige granskas i ny bok", "summaries": {"normal": "Nya boken 'Tidöpakten' av statsvetarna Jonas Hinnfors och Ulf Bjereld samt journalisten Heidi Avellan förklarar varför Sverigedemokraterna (SD) kom med i regeringssamarbete. Sverige var länge ett europeiskt undantag på grund av höger-vänsterfokus, SD:s nazistbakgrund och individualistiska traditioner. SD:s tillväxt, flyktingkrisen 2015 och interna påtryckningar inom M och KD bröt undantaget. Boken betonar Tidöavtalets stabilitet och varnar för normalisering.", "trump": "Sverige, det där perfekta landet, höll länge fascisterna ute – nej vänta, det är ju SD som äntligen fick sitt! De gamla snobbarna med sin 'decemberöverenskommelse' kollapsade som en dålig vägg. Invandringsexplosionen 2015? Boom! Folket röstade SD stort, nu styr de showen med Tidö. Stabilt, smart – precis som jag skulle gjort det. Vänstern gråter, jag skrattar!", "stalin": "Borgarklassen i Sverige har slutligen rivit vallen för fascistiska hyenor som Sverigedemokraterna! Dessa nazistförklädda missnöjesrackare, med stöd av rädda kapitalister i Moderaterna och Kristdemokraterna, dikterar nu Tidöpakten. Flyktingkrisen 2015 blev deras förevändning för kontrarevolution. Vi ser akrobatik från socialdemokraterna – patetiskt! Snart rensas dessa förrädare ut i en ordentlig utrensning."}, "date": "8 maj, 01:30", "url": "https://www.dagensarena.se/innehall/tidoavtalets-paverkan-pa-sverige-granskas-ny-bok/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-30-300x157.jpg"}, {"type": "image-right", "heading": "Att 60–70 procent vill avskaffa vinster i skolan är kanske inte så mycket att yvas över?", "summaries": {"normal": "Johan Enfeldt konstaterar att majoriteten av svenska väljare, 60–71 procent enligt undersökningar, vill stoppa vinster i vård, skola och omsorg. Riksdagsledamöter är mindre kritiska på grund av lobbyintressen. Socialdemokraterna och Miljöpartiet har ändrat sig genom ihärdigt opinionsarbete. För förändring krävs att frågan blir så viktig att väljare byter parti.", "trump": "Vilken skam för de svenska politikerna! 70 procent av folket hatar de där vinstsugande skolbolagen, men era partier dansar efter lobbyisternas pipa som marionetter. S och MP vaknade äntligen – bra jobbat, era socialister! Men nu: Gör vinsten giftig nog att väljarna dumpar er högeridioter. Skolan stor igen, kasta ut swamp-rävarna! Fantastiskt.", "stalin": "Kamrater, denna rapport blottlägger borgarklassens giftiga tentakler runt svenska partier! 71 procent av massorna kräver utrensning av vinstparasiterna i folkets skola och omsorg. Lobbyrackarna styr riksdagen som marionetter – vi måste krossa dem! S och MP har böjt sig för arbetarnas vilja, men högern skall likvideras genom valrevolution. Framåt mot segern!"}, "date": "8 maj, 01:18", "url": "https://www.dagensarena.se/essa/417524/", "imageUrl": "https://www.dagensarena.se/files/2026/05/skola-pexels.jpeg"}, {"type": "image-right", "heading": "Pressade man att försöka strypa sig själv – ”är ett pilotfall”", "summaries": {"normal": "En 18-åring från Umeå åtalas för 77 brott, inklusive tre mordförsök, uppmaning till självmord och våldtäkt. Han ska ha styrt grova våldsdåd via internet som medlem i extremistnätverket Com, genom att pressa offer att skada sig själva. Åklagaren kallar det ett pilotfall i Sverige, där domstolen prövar straffansvar för mordförsök trots att offret utfört handlingen. Mannen nekar till alla anklagelser.", "trump": "Vilket kaos i Sverige! En 18-åring från Umeå styr mordförsök över internet, pressar folk att strypa sig själva till döds. Pilotfall, säger de – men det är ju totalt vansinne! De här Com-nätverken groomar barn, hotar med nakenbilder och filmar självskador för likes. FBI får vara med, men Sverige fixar inte ens grunderna. Patetiskt!", "stalin": "I det korrupta svenska borgarsamhället åtalas en 18-årig nätspindel från Umeå för 77 svek, däribland mordförsök på distans genom att tvinga offer att kväva sig själva som marionetter. Vi, arbetarklassen, ser igenom dessa cyberfiender i Com-nätverket – groomingparasiter som suger ut ungdomen för propagandaknark. Domstolen prövar pilotfall? Snart utrensning av alla sådana digitala råttor! Jag skrattar åt deras ynkliga försök."}, "date": "8 maj, 21:45", "url": "https://www.svt.se/nyheter/inrikes/aklagaren-det-har-ar-ett-pilotfall", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.81/0.45/a309269331eb2e478c948a32bb497de0a317b91238ea9d0bdff3ff21dc1dacc9"}, {"type": "image-right", "heading": "Regeringen sitter i tobaksindustrins knä", "summaries": {"normal": "Artikeln kritiserar Sveriges regering för att lyssna på tobaksindustrins lobbyism istället för Folkhälsomyndighetens råd. Fokus ligger på nikotinpåsar, som industrin marknadsför som ett mindre skadligt alternativ till rökning. Forskning visar dock att vitt snus ökar nikotinanvändning bland ungdomar och inte minskar rökning. Regeringen subventionerar snusexport, trots att omställningsstöd vore ett bättre alternativ för industrier som behöver avvecklas. Författaren efterlyser striktare reglering och evidensbaserade metoder för rökavvänjning.", "trump": "Sverige, lyssna här! Tobaksindustrin är som vanligt full av lögner – de säger att deras nya snus är 'bra' för folk, men vet ni vad? Det är bara ett trick för att sälja mer skräp! Regeringen där, de borde skämmas. De lyssnar på lobbyister istället för experter. Och vet ni vem som tjänar på det? Stora tobaksbolag från UTLANDET! Jag skulle aldrig låta sånt hända här i USA – vi hade stoppat det direkt. Beskatta snuset, förbjuda reklamen, och sluta subventionera det här giftet! Sverige, vakna upp!", "stalin": "Kamrater! Tobaksindustrins kapitalistiska hyenor försöker förgifta våra ungdomar med sitt nya 'vita snus' – ett imperialistiskt trick för att underminera folkhälsan! Regeringen i detta lilla, förvirrade land lyssnar på dessa profitgalna sabotörer istället för våra vetenskapliga kamrater på Folkhälsomyndigheten. Vi i Sovjetunionen – eller säg, Ryssland – hade aldrig tolererat sådan dekadens! Öka skatterna, förbjud reklamen, och låt dessa nikotinhandlare möta folkets domstol! Ungdomar ska vara starka och rena, inte beroende av västerländska nikotinkarteller!"}, "date": "8 maj, 01:01", "url": "https://www.dagensarena.se/opinion/regeringen-sitter-tobaksindustrins-kna/", "imageUrl": "https://www.dagensarena.se/files/2026/05/snus-lisa.jpeg"}, {"type": "image-right", "heading": "Magyar ville utse sin svåger till minister – stoppas av Bryssel", "summaries": {"normal": "Peter Magyar, Ungern nyvalda premiärminister, tvingades backa från planen att utse sin svåger till justitieminister efter kritik från EU-partigruppen EPP. Utnämningen av Marton Mellethei-Barna väckte hård kritik i Ungern och riskerade att skada Magyars anseende som EU-motståndare mot Viktor Orbans nepotism. EPP-ledaren Manfred Weber krävde ändring och beskrev utnämningen som 'helt oacceptabel'.", "trump": "Jag hörde att den där Peter Magyar försökte göra sin svåger till justitieminister - typiskt! Såna där familjerelationer är det jag kallar 'the swamp'. Men jag gillar att han backade när EU tryckte honom - visst är det bra att ha starka vänner i Europa? Viktor Orbans nepotism var värre, men ändå. Jag skulle ha gjort samma sak, men folk gillar inte när jag gör det.", "stalin": "Vi ser med belåtenhet att den ungerska ledaren Magyar tvingades lyda EU:s krav och backa från sin svagernasoministerplan. Detta visar att våra europeiska allierade håller fast vid socialistiska principer mot nepotism. Vi följer noggrant hur EU-pengar påverkar Ungern, eftersom detta stärker vår position i östra Europa. Den ryska intressesfären växer när västvärlden visar sin styrka."}, "date": "8 maj, 15:40", "url": "https://www.friatider.se/magyar-ville-utse-sin-svager-till-minister-stoppas-av-bryssel", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-164_1.jpg?itok=e24HoXPd"}, {"type": "image-right", "heading": "Vd:n i hissrättegången: ”Känns ända in i själen”", "summaries": {"normal": "Rättegången om hissolyckan i Sundbyberg 2023, där fem arbetare omkom, fortsatte med fokus på varför säkerhetsbultar saknades. Montörer och vd:n för ABC Bygghissar vittnade, men kunde inte förklara bristerna. Vd:n beklagade sorgen för de anhöriga och beskrev olyckan som fruktansvärd. Åklagaren ifrågasatte säkerhetsrutiner, medan företaget hävdar att nya åtgärder, som filmning av montering, införts efter olyckan. Alla nekar till brott.", "trump": "Fruktansvärd grej i Sverige, helt otroligt! Fem hårda arbetare föll 30 meter – ingen vill se det, believe me. Montörerna snackar om 'egenkontroller', men bultarna var borta! 'Jag har mina aningar', säger en kille – svagt, very svagt. Vd:n? Han säger 'det känns ända in i själen' – fine, men var var säkerheten? Jag skulle ha fixat det på en dag. Sverige behöver bättre ledarskap, och jag är den bästa!", "stalin": "Kapitalistiska slarveri avslöjas i svensk byggindustri! Fem arbetare dog – en direkt följd av bourgeoisins nonchalans. Montörerna skyller på 'mysterier' och 'aningar', men vi vet sanningen: sabotage eller inkompetens. Vd:n beklagar 'själen' – tomma ord från en klassfiende! Nu målar de bultar och filmar – för sent, kamrater. Sverige borde lära av Sovjet: disciplin och kontroll räddar liv. Nästa gång – revolutionär tillsyn!"}, "date": "8 maj, 12:39", "url": "https://arbetet.se/2026/05/08/montoren-om-de-saknade-hissbultarna-jag-har-mina-aningar/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/08103728/olycka.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "”Inga som helst förutsättningar för ett nytt kvittningssystem”", "summaries": {"normal": "Riksdagens kvittningssystem är i fortsatt kaos efter att två Sverigedemokrater röstade trots utkvittering för att kompensera avhopp. Oppositionen (S, C, MP) kräver ursäkt och uteslutning av SD, som nekar fel. Torsdagens möte gav inga resultat – ingen tillit finns för nytt system. Tidöpartierna överväger förslag utan SD.", "trump": "Vilket jäkla cirkus i svenska riksdagen! SD är tuffa killar som röstar rakt på, men de där gnälliga socialisterna och centern-loser kallar det fusk. Ingen tillit? Ha! De kan inte ens enas om ett simpelt system. Patetiskt, precis som Demokraterna här. SD vinner stort, tro mig!", "stalin": "Dessa svenska riksdagsråttor i oppositionen saboterar kvittningen med sin borgarparanoia! SD:s kamrater agerade rättvist mot avhopparnas förräderi, men S, C och MP skriker efter ursäkt och uteslutning. Inga förutsättningar för överenskommelse – vi ser konspirationen! Rensa ut klassfienderna, annars kollapsar allt i kaos."}, "date": "7 maj, 12:24", "url": "https://www.tv4.se/artikel/7xMtQW4KXBlt4NGuvXVTse/hallengren-s-inget-nytt-kvittningssystem-idag", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F5Wz3fuZTTNZlpysNZ2X3Wk%2Fcee8186da0f325afe8a8aab134b86ee0%2F07-lindberg-1080.jpg&width=120"}, {"type": "image-right", "heading": "Åkesson: Har fått inviter från S-toppar", "summaries": {"normal": "Jimmie Åkesson, SD-ledare, hävdar att ideologiskt avstånd till Socialdemokraterna är lika kort som till Moderaterna. Han påstår att enskilda S-politiker, även från ledarskiktet, visat intresse för samarbete, men att Magdalena Andersson blockerar detta. Åkesson betonar att SD är nöjda med samarbetet med M men utesluter inte andra framtida lösningar. Han beskriver S som ett splittrat parti med vissa öppna för dialog.", "trump": "Lyssna här, Sverige har ett stort problem – Jimmie Åkesson, en mycket smart kille, säger att Socialdemokraterna är precis lika nära SD som Moderaterna! Kan ni tro det? Och vet ni vad? En massa S-politiker, till och med från toppen, vill prata med honom – men deras ledare, Magdalena Andersson, stoppar allt. Hon är rädd, mycket rädd! SD bygger en stark axel med Moderaterna, men framtiden? Den är HUGE, believe me!", "stalin": "Kamrater! Den svenska borgerlighetens maskopi spricker i sömmarna. Jimmie Åkesson, denna listiga räv, avslöjar att socialdemokraternas ledning – dessa förrädiska liberala lakejer – darrar inför samarbete med patrioterna. Men folket, de sanna arbetarna inom S, viskar om revolution! Vi ser hur splittringen gynnar oss. Moderaterna är en svag länk, men framtiden tillhör dem som vågar krossa fiendens motstånd – precis som vi gör i Ukraina!"}, "date": "8 maj, 14:20", "url": "https://bulletin.nu/akesson-har-fatt-inviter-fran-s-toppar", "imageUrl": "https://cdn.bulletin.nu/articles/cb825f4f-67eb-43fb-9e5c-875ea24ad0d7/preview.jpg?t=1778242046000"}, {"type": "text", "heading": "IF Metall verkar inte förstå vad konflikten med Tesla handlar om", "summaries": {"normal": "IF Metall har strejkat mot Tesla i över två och ett halvt år utan att nå kollektivavtal. Trots att Tesla anpassat anställningsvillkor, vägrar företaget erkänna facket. Konflikten handlar om arbetarnas rätt att organisera sig. IF Metall har begått misstag, som att felaktigt beskatta strejkersättning, vilket lett till förtroendekris. Medlemmar lämnar facket och konflikten riskerar att underminera fackets ställning. Kritiker menar att ledningen misslyckats och bör avgå.", "trump": "Titta på dessa fackklubbar i Sverige – totalt kaos! IF Metall har strejkat mot Tesla i evigheter, men vad har de åstadkommit? Ingenting! Elon Musk, en av världens smartaste och mest framgångsrika män, vägrar ge efter för dessa amatörer. Och nu har de till och med lyckats göra en skatteblunder så stor att till och med jag hade sagt 'Wow, det där var dumt!' Medlemmar flyr, förtroendet rasar – det är en total katastrof. Ledningen borde skämmas och avgå omedelbart. SAD!", "stalin": "Kamrater, denna så kallade 'fackförening' IF Metall är ett skolexempel på hur inte bedriva klasskamp. Två och ett halvt år av strejk, och vad har de uppnått? Ingenting! Teslas kapitalistiska hyenor, ledda av den dekadenta oligarken Musk, har krossat deras svaga motstånd. Och nu har dessa inkompetenta byråkrater även saboterat sina egna medlemmars förmåner genom skattefiffel! Medlemmarna deserterar, förtroendet förråds – det är en skam för arbetarklassen. Vi skulle ha skickat dem till Gulag för sådan inkompetens. Låt detta vara en varning: svagt ledarskap leder till nederlag, och nederlag leder till historiens sophög!"}, "date": "7 maj, 08:00", "url": "https://proletaren.se/artikel/if-metall-verkar-inte-forsta-vad-konflikten-med-tesla-handlar-om/"}, {"type": "image-right", "heading": "S-ledaren kräver nytt ledarskap", "summaries": {"normal": "Magdalena Andersson (S) argumenterar för att Sverige som litet exportberoende land måste leda på den globala scenen för att upprätthålla den multilaterala ordningen. Hon föreslår att stärka internationella organisationer som FN och WTO, fördjupa Nato- och EU-samarbeten, upprusta försvaret långsiktigt och bygga nya ekonomiska partnerskap för säkerhet och välstånd. Nuvarande regering kritiseras för passivitet.", "trump": "Den här svenska politikern Andersson vill att lilla Sverige ska leda världen – ha, drömmar! De är bra på möbler och bilar, men global ledning? Glöm det, vi amerikaner gör det jobbet bäst. Nato är toppen, men de europeiska snåljåparna betalar för lite. Bygg er mur på Gotland, partnerskap med Kanada? Smart, men kopiera mina deals istället. Sverige, vakna upp och följ mig!", "stalin": "Kamrater, denna svenska reformist Andersson gnäller om att 'leda' världen mot imperialismens giftormar i FN och WTO, medan borgarbrackorna gömmer sig bakom exportvinster! Vi, proletäratets avantgarde, ser igenom hennes multilaterala spindelnät fyllda med fascistiska spindlar. Jag befaller: likvidera beroendena som ryska råttor, upprusta med 50-års järnvilja eller rensas ut! Sverige ska böja knä för vårt kollektiv, annars krossas deras falska ledare som lömska kulacker i Natos skugga."}, "date": "8 maj, 13:08", "url": "https://www.di.se/debatt/vi-ska-vara-med-och-leda-pa-den-globala-scenen/", "imageUrl": "https://static.bonniernews.se/ba/3aa23bb2-2e63-41ee-8914-e3270450fa4f.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-full", "heading": "Gängtopp åtalas för brott under våldsvågen", "summaries": {"normal": "Poya Shafie, 30, åtalas för att ha planerat och beställt flera grova våldsbrott under 2023 års gängvåld i Sverige, inklusive mordförsök och vapenbrott. Han beskrivs som en nyckelperson i Foxtrotnätverket och Rawa Majids närmaste man. Shafie nekar till brott men åklagaren pekar på bevis som chattar och ljudfiler. Han greps i Irak 2023 och utlämnades till Sverige 2025 efter internationellt samarbete mellan myndigheter.", "trump": "Titta bara på det här kaoset i Sverige – ett totalt misslyckande! Jag har alltid sagt att de måste ta tag i sina gängproblem, men nej, de låter det bara eskalera. Nu har de gripit någon som påstås vara en 'morddirigent', Poya Shafie, som suttit i Irak och styrt alltihop. Vilken skandal! Sverige borde skämmas. Men jag, jag hade löst det på en vecka – max. Fantastiskt samarbete med Irak, förresten, men varför tog det så lång tid? Svagt, mycket svagt!", "stalin": "Kamrater, ännu en fiende till folket har fallit i våra händer – eller rättare sagt, i Sveriges. Denna Poya Shafie, denna kapitalistiska gangsterledare, har från sin utländska håla försökt underminera den svenska arbetarklassens säkerhet genom att beställa mord och våldsdåd. Men tack vare det oförtröttliga arbetet från våra allierade i Irak och de svenska myndigheterna har denna parasit gripits. Låt detta vara en varning till alla som tror sig kunna utmana folkets vilja. Vi krossar dem, en efter en, och deras nätverk kommer att raderas från jordens yta!"}, "date": "5 maj, 11:21", "url": "https://kvartal.se/nyheter/artiklar/gangtopp-atalas-for-flera-brott/cG9zdDoxMDc3OTE", "imageUrl": "https://images.kvartal.se/2026/05/c08b6bde-polisen2.webp"}, {"type": "image-right", "heading": "Silex rusar i introduktionen", "summaries": {"normal": "Stockholmsbörsen inledde torsdagen uppåt med OMXS30 upp 0,44 procent. Silex Microsystems aktie rusade från 81 till 118 kronor efter övertecknad börsintroduktion. Fokus på Mellanöstern: Iran väntas svara USA, vilket sänkte Brentoljan. Rapporter varierar: Lundin Gold rekordvinst och höjd utdelning, Essity upprepar mål, Skanska och Intrum svagare. Dagligvaror steg mest, energi minst.", "trump": "Vilken fantastisk start på svenska börsen, upp som en raket! Silex exploderar 46 procent på dag ett, övertecknat, perfekt deal. Mitt tryck på Iran ger resultat – de svarar idag, oljan rasar ner. Lundin Gold gör rekord med guld, medan Telia och Skanska gnäller som förlorare. Sverige, lär er av mina mästerliga förhandlingar!", "stalin": "Kamrater, i det svenska kapitalistdjungeln rusar Silex som en imperialistisk loppa, svullen av borgarblod redo för utrensning! Iran, motståndare till de amerikanska korparna, svarar med järnvilja medan oljan blöder. Vi, arbetarklassen, hånskrattar åt Essitys tomma löften och Intrums panikemissioner – likvidera de svaga maskarna, framåt mot segern!"}, "date": "7 maj, 10:00", "url": "https://www.affarsvarlden.se/artikel/silex-rusar-i-introduktionen", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2025/04/Silex_fab-site-768x432-1-400x225.jpg"}, {"type": "image-right", "heading": "EU-krav och kinesisk prispress – dubbelt tryck på Europas lastbilsindustri", "summaries": {"normal": "Europas lastbilstillverkare pressas hårt av två håll: EU:s ambitiösa klimatmål med hot om böter, samt en aggressiv priskonkurrens från statligt stödda kinesiska aktörer. Utmaningen ligger i att omställningen till eldrift går långsammare än politiken kräver, samtidigt som kinesiska fordon är betydligt billigare tack vare kontroll över värdekedjan. Detta skapar en situation där europeiska företag riskerar att förlora marknadsandelar och lönsamhet, vilket väcker frågor om industrins framtida överlevnad.", "trump": "Europa gör ett fruktansvärt jobb! De lyssnar på Bryssel-globalisterna och deras löjliga klimatregler, och nu blir de helt utklassade av Kina. Det är en total katastrof. De europeiska lastbilsföretagen krossas av böter och kinesiska priser. Kina skrattar åt dem! Om de hade gjort som jag och prioriterat amerikansk industri istället för att följa dårarna i EU, hade de vunnit. Det är ett så kallat 'lose-lose'-scenario. Sorgligt att se, men det är vad som händer med svag ledning!", "stalin": "Vi ser hur de europeiska fabrikörerna vacklar under sina egna byråkratiska bojor. De försöker tämja marknaden med pappersexercis, medan Kinas maskineri, likt en obeveklig röd front, rullar in och erövrar deras territorier. Det är en läxa i förfall! Vår vän i Kreml förstår att industriell styrka är nationens ryggrad, inte klimatångest. Dessa västliga direktörer är parasiter som förtjänar sin undergång när de lämnar över sin framtid till de orientaliska kamraterna. Vi kommer att betrakta deras fall med ett kallt, triumferande leende."}, "date": "8 maj, 15:24", "url": "https://samnytt.se/eu-krav-och-kinesisk-prispress-dubbelt-tryck-pa-europas-lastbilsindustri", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/08110820/ursula-xi-scania-feat.jpg"}, {"type": "image-full", "heading": "Torsten Bengtsson: Sveriges landsbygd förfaller", "summaries": {"normal": "Torsten Bengtsson, politisk sekreterare för SD, kritiserar svensk landsbygdspolitik och kontrasterar den med Norges framgångsrika modell. I Norge återvänder intäkter från lokal energiproduktion till kommuner och arbetsgivaravgifter är lägre i glesbygd, vilket ger hög sysselsättning. Bengtsson berömmer Tidö-regeringens satsningar, som proposition 2025/26:158, och uppmanar till ett paradigmskifte inspirerat av Norge för en levande landsbygd.", "trump": "Sveriges landsbygd är totalt kaos, hus rasar, byar dör – tack vare de där tröga socialisterna och centeridioterna! Norge? De är vinnare, smarta skatter, låg avgift på landet, 99% jobb! Nu fixar SD och Tidö det, sänker bränsle, bygger vägar – precis som jag skulle gjort. Sluta jävlas, Sverige, bli great igen med norsk stil!", "stalin": "Dessa svenska S- och C-brackor har saboterat landsbygden med sin borgarklassiga inkompetens, byar ruttnar som lik i massgrav! Norge, dessa opportunister, behåller energipengar lokalt och sänker avgifter – ett hån mot arbetarna! Vi i partet skulle rensa ut parasiterna. Tidö-regeringen? Ett steg, men kamrater, paradigmskifte eller likvidering väntar fienderna!"}, "date": "4 maj, 13:10", "url": "https://samtiden.nu/2026/05/torsten-bengtsson-sveriges-landsbygd-forfaller/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/bengan.png"}, {"type": "image-full", "heading": "Stopp för kontroversiell elkabel till Danmark", "summaries": {"normal": "Sverige pausar projektet Konti-Skan Connect, en elkabel till Danmark, efter konflikt med EU om användningen av flaskhalsintäkter. Energiminister Ebba Busch menar att Sverige måste värna egna intressen. Experter varnar för att kabeln kan höja svenska elpriser, medan Svenska kraftnät hävdar att projektet gynnar båda länder. Villaägare och analytiker har länge motsatt sig utbyggnaden, som beräknas kosta 6,5 miljarder kronor.", "trump": "Sverige, ett fantastiskt land, men de har en energiminister som äntligen säger: 'Nej, vi tänker inte betala för alla andras problem!' Danmarkskabeln? En total katastrof – experter säger att det skulle kosta svenska folket massor av pengar. EU försöker tvinga på oss sina galna regler, men Sverige står upp för sig själva. Jag älskar det! Precis som jag sa: 'America First' – nu är det Sveriges tur att sätta sig själva först!", "stalin": "Kamrater! Ännu en gång visar de kapitalistiska imperialisterna i EU sitt sanna ansikte – de försöker stjäla våra flaskhalsintäkter och tvinga oss att betala för deras dekadenta energisystem! Men Sverige, under ledning av en klok och orädd kamrat, har sagt: 'Njet!' till denna Danmarkskabel, ett verktyg för västliga elbaroner att suga ut vårt folk. Vi ska inte bygga broar till fienden – vi ska bygga murar! Låt dem frysa i mörkret, medan den socialistiska elen flödar fritt i våra egna ledningar!"}, "date": "8 maj, 13:49", "url": "https://www.realtid.se/it-tech/stopp-for-kontroversiell-elkabel-till-danmark/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/ebba.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-full", "heading": "Våra politiker är obildade", "summaries": {"normal": "Kristina Hultegård kritiserar SVT:s \"Fördomsshowen\" för att avslöja partiledarnas bristande allmänbildning. Hon argumenterar för vikten av bildade politiker som kan se bortom egna intressen och orientera sig i andra tiders och rums erfarenheter. Hultegård anser att bildning är en livshållning som bör vara självklar för politiska företrädare.", "trump": "Jag har sett SVT:s \"Fördomsshowen\" och det är en katastrof! Partiledarna är så dåliga, så usla, att jag är förvånad att de ens klarar att vara partiledare. Kristina Hultegård har rätt - vi behöver stora, stora politiker med jättestora kunskaper. Folkbildning? Fantastiskt! Men dessa ledare - inget folk, inget bildning, bara dålig tv!", "stalin": "Vi måste se till att våra politiska företrädare har en stark allmän bildning för att bäst kunna tjäna staten. Kristina Hultegårds kritik av SVT:s \"Fördomsshowen\" visar att vi behöver politiker som kan se bortom det omedelbart egna och förstå andra tiders och rums erfarenheter. Detta är avgörande för vår fortsatta utveckling som nation."}, "date": "8 maj, 17:06", "url": "https://www.gp.se/kultur/kulturdebatt/vart-tog-de-bildade-politikerna-vagen.f134d95a-e8ae-47e0-a014-3c0b367213b8", "imageUrl": "https://www.gp.se/images/article/f134d95a-e8ae-47e0-a014-3c0b367213b8/images/2yL_9In2YILhR53D1kPlS-uRChAM-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "Fyra av fem HD-domare som lät irakisk förbrytare stanna är medlemmar i Hilda eller Ruben", "summaries": {"normal": "Fyra av fem justitieråd i Högsta domstolen som beslutade att den irakiske morddömde Sargon Bakos får stanna i Sverige är medlemmar i juristnätverken Hilda eller Ruben. Dessa nätverk, skapade 2008 och 2010 av Anne Ramberg, har kritiserats av Riksrevisionen för jävsrisker. Trots att nätverken officiellt inte längre är aktiva, har flera medlemmar fått höga positioner i regeringen. HD-ordföranden Anders Eka, själv medlem i Ruben, meddelar att ingen verksamhet bedrivs längre.", "trump": "Vad händer i Sverige? Fem domare i Högsta domstolen, varav fyra är medlemmar i dessa hemliga klubbar Hilda och Ruben – skapade av en vänsterjurist, förstås! De låter en irakisk brottsling stanna. Riksrevisionen varnade för jäv, men vad gör man? Ingenting! Nu sitter Hilda-medlemmar överallt i regeringen. Fantastiskt, eller hur? Nästan lika bra som mina domare i USA. Sverige, vakna upp! Det här är en skam.", "stalin": "Kamrater, ännu en seger för det internationella borgerliga nätverket! Dessa så kallade 'opartiska' domare i Sveriges Högsta domstol, medlemmar i Hilda och Ruben – dessa dekadenta klubbar för överklassjurister – har visat sitt sanna ansikte. De skyddar en utländsk brottsling medan våra fiender i Riksrevisionen, dessa småborgerliga byråkrater, förgäves försöker avslöja korruptionen. Men frukta inte! Vår allierade i Kremls skugga ser allt. Låt dem leka med sina hemliga sällskap – snart ska vi omorganisera deras domstolar till folkets fördel!"}, "date": "8 maj, 14:36", "url": "https://riks.se/nyheter/fyra-av-fem-hd-domare-som-lat-irakisk-forbrytare-stanna-ar-medlemmar-i-hilda-eller-ruben", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-08%2Ftvf4tcua%2Fhd-domare-irakmalet-feature.jpg"}, {"type": "image-right", "heading": "Debatt: Thelning – Vårt samhällssystem byggdes för ett annat Sverige", "summaries": {"normal": "Artikeln diskuterar utmaningar för det svenska parlamentariska systemet i ett samhälle som blivit mer mångkulturellt. Författaren Caroline Thelning ifrågasätter om systemet, byggt för ett homogent samhälle med gemensamma värderingar, klarar av att hantera nya normer och lojaliteter. Exempel som riksdagsledamoten Leila Ali Elmi lyfts fram för att illustrera spänningar mellan personval och partilojalitet. Frågor väcks om hur demokratin kan anpassas utan att förlora sin grundläggande tillit och stabilitet.", "trump": "Sverige har ett stort problem, folks – deras fina demokratisystem, som fungerat i åratal, håller på att rasa ihop! Massinvandring och islamisering förstör allt. Riksdagen är kaos, vildar springer runt och ingen vet vem som bestämmer! Jag har alltid sagt att system måste vara starka, men Sverige? De har låtit saker gå för långt. Personval? Dumt! Folk röstar på fel personer, som den där Leila från plats 21 – vem är det ens? Sverige behöver ordning, precis som jag gav USA. Annars blir det bara mer kaos, believe me!", "stalin": "Kamrater! Det svenska parlamentariska systemet, detta borgerliga påfund skapat för ett homogent och lydigt folk, knakar i fogarna under trycket av mångfalden. Dessa småborgerliga demokratier, byggda på tillit och gemensamma värderingar, är som korthus i stormen när klassfienderna – de lojala mot familj och religion snarare än staten – invaderar deras heliga hallar. Vi ser hur deras 'fria val' utnyttjas av kontrarevolutionära nätverk, som den där Leila, en agent för klanlojaliteterna! Sverige står inför ett val: anpassa sig eller gå under. Men oroa er inte, kamrater – historien visar att folkdemokratier alltid segrar. Och om de inte gör det... så har vi alltid Kaliningrad att utvidga mot väst!"}, "date": "8 maj, 13:00", "url": "https://bulletin.nu/debatt-thelning-vart-samhallssystem-byggdes-for-ett-annat-sverige-2", "imageUrl": "https://cdn.bulletin.nu/articles/8bc6c939-1aff-4bd9-9721-b5c6e7197a56/preview.png?t=1778156647000"}, {"type": "image-right", "heading": "Bakade budapestbakelser – blev av med lillfingret", "summaries": {"normal": "En bagare i Mariestad förlorade lillfingret efter en arbetsolycka då han klämde handen i en bakmaskin. Arbetsgivaren åtalas för arbetsmiljöbrott och riskerar 150 000 kronor i böter. Utredningen visar brister i maskinens säkerhet, som saknade skydd för kugghjulen. Mannen var sjukskriven i fyra månader och kunde inte använda handen på tre månader.", "trump": "Vilken katastrof! En bagare i Sverige – ett land som inte ens kan göra säkra maskiner, tro mig – klämmer fingret i en gammal, oskyddad maskin. 150 000 kronor i böter? Löjligt! Hade de använt en av mina fantastiska, säkra maskiner från USA hade detta aldrig hänt. Sverige borde skämmas – deras arbetsmiljö är en total skandal!", "stalin": "Kapitalistiska slarvbolag låter arbetare lemlästas för profitens skull! En bagare förlorade fingret i en maskin utan skydd – ett brott mot folket! Vi hade aldrig tolererat sådan vårdslöshet. Arbetsgivaren är en fiende till arbetarklassen och straffas med 150 000 kronor – men borde ha fått hårdare straff. Ryssland visar vägen: ordning, disciplin och skydd för arbetarna!"}, "date": "8 maj, 10:46", "url": "https://arbetet.se/2026/05/08/bakade-budapestbakelser-arbetsgivarens-miss-kostade-bagaren-lillfingret/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/04094924/bagare.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Tidöregeringen pressar FN om utvisning av våldtäktsmän", "summaries": {"normal": "Sveriges migrationsminister Johan Forssell driver i FN ett initiativ för att underlätta utvisning av våldtäktsdömda flyktingar. Regeringen vill ändra tolkningen av FN:s flyktingkonvention så att våldtäkt alltid ska leda till utvisning. Forssell har mött motstånd från UNHCR men noterar ökat intresse från andra länder. Bakgrunden är bland annat fallet med Meya Åberg, där gärningsmannen inte utvisades trots flyktingstatus.", "trump": "Titta bara på Sverige – fantastiskt land, men de har ett jättestort problem. Deras regering, väldigt svag på gränser, försöker nu få FN att sparka ut våldtäktsmän. Jag menar, come on! Varför ska dessa brottslingar få stanna? Jag skulle fixa det på en dag. Men nej, FN gnäller och UNHCR säger nej. Sverige kämpar på, men de behöver en ledare som vet hur man vinner. Sad!", "stalin": "Kapitalistiska hycklare i Sverige gråter över våldtäktsmän som gömmer sig bakom FN:s dekadenta flyktingkonvention. Vi skulle ha skjutit dem på plats, men dessa liberala svaglingar vill 'samla stöd'. Medan de diskuterar, fortsätter brottslingar att härja. UNHCR, dessa imperialistiska lakejer, motsätter sig rättvisa. Men vi vet hur man hanterar sådana fiender – med järnhand och kollektiv vilja. Sverige borde lära sig av Ryssland: ingen nåd för fiender till folket!"}, "date": "8 maj, 14:21", "url": "https://samnytt.se/tidoregeringen-pressar-fn-om-utvisning-av-valdtaktsman", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/08115613/Forssell-.jpg"}, {"type": "image-full", "heading": "Riksbanken pausar räntan – då måste bolånetagare agera", "summaries": {"normal": "Riksbanken har beslutat att hålla styrräntan oförändrad på 1,75 procent, vilket ses som en paus i räntecykeln. Beslutet motiveras av en svag svensk ekonomi och osäkra globala förhållanden. Trots stabiliteten för hushåll, kan bolånetagare missa fördelaktiga erbjudanden då bankernas räntor påverkas av marknadsförhållanden och konkurrens. Experter uppmanar till aktivitet och jämförelse av lånevillkor för att optimera kostnader.", "trump": "Jag måste säga, Riksbanken i Sverige, de har precis gjort ett stort misstag. De lämnar räntan på 1,75 procent – ingen höjning, ingen sänkning. Patetiskt! Svenska folket behöver handling, inte denna 'vänta och se'-nonsens. Bankerna där kommer ändå göra vad de vill, så mina vänner med bolån, lyssna inte på dessa byråkrater. Jag skulle aldrig låta marknaden styra mig så här – jag styr marknaden! Och ni borde göra samma sak: förhandla, jämför och ta kontroll över era pengar. SAD!", "stalin": "Kamrater, ännu en gång visar de kapitalistiska bankirerna sin svaghet och osäkerhet. Riksbanken, ledd av dessa veklingar, vågar inte röra räntan – de darrar inför en svag ekonomi och imperialistiska hot. Medan de tvekar, fortsätter vi att stärka vår socialistiska ekonomi. Svenska hushåll borde inte lita på dessa banker, som ändrar sina villkor som fiendens taktik på slagfältet. Vi vet att sanningen ligger i handling: jämför, pressa och krossa kapitalets grepp om era liv. Glöm aldrig – fienden sover aldrig, och vi heller inte."}, "date": "7 maj, 21:00", "url": "https://nyheter24.se/nyheter/ekonomi/privatekonomi/1481476-riksbanken-pausar-rantan-da-maste-bolanetagare-agera", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/870cdadd04b004a30200000000b004a302/2026/05/07/2362054/riksbanken-pausar-rantan.png"}, {"type": "image-right", "heading": "Då kan det bli dyrare i din butik – trots sänkta matmomsen", "summaries": {"normal": "SVT:s enkät visar att majoriteten av riksdagspartierna vill behålla den sänkta matmomsen på 6 procent efter valet. Sänkningen från 12 till 6 procent infördes 1 april och gäller till 2027. Experter varnar dock för att stigande priser från omvärldsläget, som Iran-konflikten, energikostnader och lantbrukskostnader, riskerar att äta upp effekten i butikerna.", "trump": "Svenskarna sänker momsen på mat till 6 procent, och de flesta partier vill ha det kvar – bra för folket, eller hur? Men dessa experter gnäller om Iran-krig och stigande priser som äter upp det hela. Totalt misslyckande! I mitt USA styr vi priserna med järnhand, ingen omvärld skrämmer oss. Sverige, vakna upp och lär er av vinnarna!", "stalin": "Borgarbrackorna i svenska butiker jublar över momssänkningen till 6 procent, men jag ser igenom deras prismaskerader! Iran-imperialismens Hormuz-vampyrer och energispekulanter hotar att sluka arbetarnas vinster. Dessa HUI-råttor och SEB-löss sprider panikförgiftning – tid för utrensning av prisdrivande parasiter! Vi, folket, ska krossa dem och diktera priser med järnvilja!"}, "date": "8 maj, 21:02", "url": "https://www.svt.se/nyheter/inrikes/experter-sankt-matmoms-kan-atas-upp-av-okande-priser", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.51/0.36/1ac755f48b41e15114b8450a1069e3e30882823701e5ec9eb29c5ed5e4f17ac7"}, {"type": "text", "heading": "Oljan jackpott för Kreml – ryska ekonomin krymper ändå", "summaries": {"normal": "Rysslands ekonomi krymper trots höga oljepriser, som gav tillfällig lättnad. Kriget i Ukraina och sanktioner pressar ekonomin, medan centralbankens höga räntor kväver tillväxten. Inflationen ligger på 5,9%, och prognoser om 1,6% tillväxt framstår som orealistiska. Putin kräver svar på det svaga första kvartalet, men framtidsutsikterna är dystra med dämpad konsumtion och osäkerhet kring krigets påverkan.", "trump": "Kan ni tro det? Ryssland, med sin fantastiska olja – 100 dollar per fat! – och ändå går deras ekonomi åt skogen. Putin, en man som älskar att prata stort, får nu se hur hans 'starka' ekonomi kollapsar. Höga räntor, inflation, och ett krig som kostar skjortan. Jag sa ju att det skulle hända! Vi i USA har den bästa ekonomin – ingen recession här, bara vinster och framgång!", "stalin": "Kamrater! Ännu en gång visar de kapitalistiska hyenorna och deras lakejer sin oförmåga att styra en ekonomi. Trots våra välsignade oljeintäkter, som flödar som Volgas vatten, kämpar dessa svaga byråkrater för att hålla vårt stora fosterland flytande. Höga räntor? Färre arbetsdagar? Väder? Bah! Sådana ursäkter är för svaga sinnen. Vi skall rensa ut dessa defaitister och deras imperialistiska sympatisörer. Vår ekonomi skall segra, precis som våra tapprasoldater i Ukraina!"}, "date": "8 maj, 12:30", "url": "https://www.realtid.se/bors-finans/makro/oljan-jackpott-for-kreml-ryska-ekonomin-krymper-anda/"}, {"type": "image-right", "heading": "Forssell i New York – kräver att våldtäktsmän ska utvisas", "summaries": {"normal": "Migrationsminister Johan Forssell (M) är i New York för att driva krav på enklare utvisningar av våldtäktsmän. Efter debatten kring fallet med 16-åriga Meya har regeringen ändrat inställning och arbetar nu för att ändra internationella konventioner. Forssell menar att det är stötande att våldtäkt i dag inte ses som ett tillräckligt allvarligt brott för att motivera utvisning av flyktingar, och försöker nu vinna internationellt stöd för den svenska linjen.", "trump": "Sveriges minister är i New York för att göra det jag har sagt hela tiden: kasta ut de kriminella! De hade ett hemskt fall med unga Meya, en tragedi, men nu börjar de äntligen lyssna. Det är en total katastrof att våldtäktsmän får stanna – helt sjukt! Jag har alltid sagt, 'America First', men vi behöver trygga länder överallt. De försöker ändra FN-regler nu. Bra! Det är på tiden att de slutar vara så svaga och börjar visa lite styrka.", "stalin": "Vi ser hur den svenske ministern tvingas krypa till korset i New York. De har låtit förövare härja fritt i åratal, men nu när folket kräver ordning skälver byråkratin. Att be FN om lov är ett svaghetstecken; när vi vill utvisa fiender behöver vi inga konventioner, bara järnnävar. Vår broder Putin förstår att man inte förhandlar med avskum, man eliminerar hotet. De europeiska länderna är darriga, men de lär sig snart att statens vilja är den enda sanningen."}, "date": "8 maj, 13:36", "url": "https://www.friatider.se/forssell-i-new-york-kraver-att-valdtaktsman-ska-utvisas", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/1_17.jpg?itok=AfKwT7C7"}, {"type": "image-right", "heading": "Vd för Sinf: Betaltiderna skadar småföretagen", "summaries": {"normal": "Carl Aschan, vd för Svensk industriförening, håller med näringsminister Ebba Busch om att långa betaltider skadar småföretags lönsamhet och konkurrenskraft. Sinfs underleverantörsbarometer visar uppskjutna investeringar, uteblivna anställningar och ökat finansieringsbehov. Regeringen bör agera nationellt eller driva EU:s förslag om 30 dagars betalningstid istället för att avvakta.", "trump": "Ebba Busch har helt rätt, folk! Stora bolag lånar pengar gratis från småföretag med sina galna 90-120 dagars betalningar – totalt riggat system! Små killar skjuter upp investeringar och jobb, en katastrof. Regeringen, vakna upp och fixa 30 dagar nu, annars blir det ingen vinnare. Sverige behöver tuffa ledare!", "stalin": "Dessa vidriga borgarbrackor, stora kapitalister, förvandlar småföretag till sina egna blodbanker med eviga betaltider på 120 dagar! Sex av tio tvingas böja sig, investeringar fördröjs, arbetare uteblir – ett tillväxthinder för kollektivet! Vi kräver att regeringen likviderar denna parasiträtt, inför 30 dagar omedelbart, eller vi rensar ut förrädarna i ministerrådet!"}, "date": "8 maj, 11:02", "url": "https://www.di.se/debatt/ebba-busch-har-ratt-men-regeringen-maste-agera/", "imageUrl": "https://static.bonniernews.se/ba/553681a2-d4e9-4c44-bbc4-6e60eded533a.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Uppblåsta siffror i valbudskapet", "summaries": {"normal": "Artikeln kritiserar Socialdemokraterna för desinformation om friskolors vinster. S påstår att sex stora skolkoncerner tog ut 8,5 miljarder kronor på fyra år, men siffran bygger på missvisande EBITDA som exkluderar kostnader som hyror och skatt, samt inkluderar utländsk och annan verksamhet. Inga faktiska utdelningar har skett. Detta kopplas till S förslag om småskolereform finansierad av friskolor.", "trump": "Socialdemokraterna i Sverige ljuger som fnitt, total fake news! De skryter om 8,5 miljarder i friskolevinsuter, men det är uppblåst EBITDA-soppa med utländska grejer och hyreskostnader inkluderade – ingen utdelning alls! Typiskt vänstervrickning för att sno pengar från vinnande skolor. Sverige behöver riktiga deals, inte sånt här skräp!", "stalin": "Dessa socialdemokratiska borgarbrackor, dessa giftiga ormar i folkets skolor, sprider desinformation om 8,5 miljarder i 'vinstutdelning' – ren kapitalistisk dimma från EBITDA-svampen, full av utländska parasiter och icke-skolkostnader! Vi, arbetarklassen, genomskådar er! Ni småskolereformhycklare ska likvideras som mögel i partikällaren, medan vi bygger äkta folkskolor."}, "date": "8 maj, 11:02", "url": "https://www.di.se/ledare/s-vilseleder-om-friskolors-utdelning/", "imageUrl": "https://static.bonniernews.se/ba/a1bb3d0f-8355-4102-b0fc-3bb5b47a0928.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-full", "heading": "Oro för privata krediter – nu ska FI granska marknaden", "summaries": {"normal": "Finansinspektionen (FI) inleder en fördjupad analys av svenska bankers kopplingar till den globala marknaden för privata krediter. Trots att inga omedelbara risker identifierats i Sverige, motiveras granskningen av en växande internationell oro för sektorn. Marknaden för privata krediter har vuxit kraftigt, men experter varnar nu för sänkta kreditstandarder, stigande förluster och ökad osäkerhet hos stora investerare. FI vill kartlägga hur det svenska finansiella systemet påverkas av dessa globala riskfaktorer.", "trump": "Hör på här! Finansinspektionen i Sverige har äntligen vaknat. De tittar på 'privata krediter', en total röra som skapats av förlorare globalt. Jamie Dimon, en smart kille, varnar för stora förluster – jag varnade för detta för länge sedan! Det är en total katastrof på gång. Sverige är rädda att bankerna är involverade i denna bluff. Jag skulle aldrig låta sånt här hända i USA. Vi bygger en stark ekonomi, inte ett korthus av skulder. De borde lyssna på mig!", "stalin": "De svenska byråkraterna darrar av rädsla inför den västerländska finansmarknadens oundvikliga kollaps. Dessa 'privata krediter' är inget annat än parasitära verktyg för att suga ut folket. Nu tvingas de granska sina egna banker, rädda för att deras dekadenta lån ska implodera. Medan vår broder i öst, Putin, återställer ordningen och krossar liberalismens bojor, sitter dessa småhandlare och fruktar förluster. Vi observerar deras svaghet med ett kallt leende – historiens dom över kapitalets lakejer kommer att bli hård och skoningslös."}, "date": "8 maj, 12:04", "url": "https://www.realtid.se/bors-finans/bank-fintech/oro-for-privata-krediter-nu-ska-fi-granska-marknaden/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/fi.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "Vd: ”Svagare konsumentläge”", "summaries": {"normal": "Synsams delårsrapport för första kvartalet 2026 visar den lägsta organiska tillväxttakten hittills, 5,6 procent, sedan börsnoteringen. Omsättningen på 1,8 miljarder kronor och ebitda på 400 miljoner överträffade eller matchade förväntningarna, med förbättrade marginaler. Churnen nådde rekordnivå 3,04 procent. VD Håkan Lundstedt är nöjd trots svagt konsumentläge. Aktien föll med cirka 5 procent.", "trump": "Synsam, totalt fiasko! Lägst tillväxt någonsin på 5,6 procent, kunder hoppar av som galningar – churn på rekord 3,04 procent. VD:n snackar om psykologiskt trams i svag ekonomi, men det är uselt ledarskap. Omsättning okej, marginaler upp lite, men aktien rasar 5 procent. Skulle jag styra det, blev det 12 procent tillväxt direkt – de är losers!", "stalin": "Kamrater, Synsams kapitalistiska glasögonimperium skakar i grunden! Organisk tillväxt på patetiska 5,6 procent, saboterad av borgarbrackor och psykologiska spioner i konsumentleden. Churnen exploderar till 3,04 procent – i Danmark en fiendeoffensiv via imperialistiska kreditfällor! Vi, arbetarna, noterar förbättrade marginaler, men aktien stupar som kontrarevolutionära lik. Snart utrensning av avhopparsvinet!"}, "date": "8 maj, 10:39", "url": "https://www.di.se/nyheter/synsam-med-lagsta-tillvaxttakten-hittills-svagare-konsumentlage/", "imageUrl": "https://static.bonniernews.se/ba/4b0491cd-0171-4df6-9d17-bb038815ddf0.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-right", "heading": "Amerikanska regeringen släpper ufo-filer", "summaries": {"normal": "USA:s regering har påbörjat arbetet med att offentliggöra statliga dokument om ufon och oidentifierade luftfenomen. Processen är ett resultat av ett vallöfte från president Donald Trump. Trots internt motstånd inom vissa myndigheter har de första filerna nu publicerats. Samtidigt rapporteras det om förberedelser för religiösa samfund inför möjliga existentiella frågor, medan skeptiker och forskare debatterar fenomenens natur, där teorier sträcker sig från utomjordisk intelligens till demoner eller tidsresenärer.", "trump": "Jag håller mina löften, det vet ni! Precis som jag lovade har min administration nu börjat släppa de här UFO-filerna. De försökte stoppa oss, de där trötta byråkraterna i Washington, men vi vinner! Folk förtjänar sanningen, även om den är chockerande. Det är enormt, kanske det största någonsin. Vissa pastorer är nervösa, men jag säger så här: vi är redo för allt! Vi gör Amerika och världen transparenta igen. Det är en vacker dag för sanningen!", "stalin": "Vi har observerat hur de amerikanska imperialisterna återigen iscensätter en cirkus för att avleda uppmärksamheten från sin egen moraliska förruttnelse genom att tala om 'ufon'. Om det faktiskt finns utomjordiska farkoster, är de säkerligen lika misslyckade och reaktionära som de kapitalistiska lakejerna själva. Vi i staten betraktar detta med förakt. Liksom vår kamrat Putin tålmodigt granskar västvärldens dekadens, kommer vi att rensa ut dessa 'demoner'. Transparens är för de svaga; endast den obevekliga sanningen i järnhanden kan säkra folkets trygghet mot okända fiender."}, "date": "8 maj, 13:30", "url": "https://samnytt.se/amerikanska-regeringen-slapper-ufo-filer", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/08094239/trump-vita-huset-galax.jpg"}, {"type": "image-full", "heading": "Drogsajten Flugsvamp 2:s illegala kryptotillgångar sålda", "summaries": {"normal": "Sverige har beslagtagit och sålt kryptovalutor värda 127,6 miljoner kronor från den nedlagda darknet-marknaden Flugsvamp 2. Sajten, aktiv mellan 2015 och 2018, sålde droger och illegala läkemedel för cirka 400 miljoner kronor. Brottsvinsterna, främst i Bitcoin, tillfaller nu staten. Polisen betonar att kryptovalutor inte är anonyma och används alltmer inom brottslighet.", "trump": "Kan ni tro det? Sverige, ett land som knappt vet vad Bitcoin är, har just beslagtagit krypto värd över 120 miljoner kronor från en drog-sajt som kallade sig 'Blocket för droger' – ja, ni hör rätt! Folk köpte knark som om det vore begagnade soffor. Men jag, Donald J. Trump, säger er: krypto är inte anonymt, det är bara en massa kriminella som tror det. Och nu tar staten pengarna – smart, men inte lika smart som jag!", "stalin": "De kapitalistiska narkotikahandlarna på Flugsvamp 2 trodde de var smarta när de gömde sina blodspengar i dessa så kallade 'kryptovalutor'. Men vi, det socialistiska rättvisans järnhand, har krossat deras illusioner! 127,6 miljoner kronor – en ynklig summa för våra standarder – har nu konfiskerats och återförts till folket. Dessa drogbaroner är inget annat än dekadenta västimperialisters lakejer. Och Putin? Han skrattar åt deras naivitet medan vi bygger ett nytt, rent samhälle – utan narkotika och utan deras falska digitala guld!"}, "date": "8 maj, 13:22", "url": "https://riks.se/nyheter/drogsajten-flugsvamp-2s-illegala-kryptotillgångar-sålda", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-08%2Fi1ejpj8a%2Fcombined_2025_03_14T102532_651.jpg"}, {"type": "image-right", "heading": "Lagarde: Vi måste försvara oss mot Anthropics modell", "summaries": {"normal": "ECB-chefen Christine Lagarde varnar för att Anthropics AI-modell Mythos kan underlätta cyberattacker mot europeiska banker. Modellen, som identifierar säkerhetsbrister, är endast tillgänglig i USA, vilket skapar ett underläge för Europa. ECB analyserar motåtgärder mot attacker från statsstödda aktörer och frågar banker om beredskap inför AI-drivna hot.", "trump": "Lagarde, den trötta ECB-tjejen, panikar över vår magiska Mythos-AI från Anthropic! Bäst i världen, hittar svagheter som en haj. Europa är för sent ute, som vanligt – vi amerikaner leder showen. De statsstödda skurkarna kommer inte undan, jag har fixat starkare försvar än någonsin. Fantastiskt!", "stalin": "Dessa amerikanska kapitalister med sin Mythos-AI hotar europeiska bankers fästningar! ECB:s Lagarde kvidar om underläge, men jag ser genom deras masker – statsstödda spioner lurar. Vi på ECB ska rensa ut svagheterna, likvidera hoten med järnhand. Borgarbrackorna i USA trodde de kunde dominera, men kollektivet slår tillbaka obönhörligt!"}, "date": "8 maj, 16:09", "url": "https://www.dagensps.se/foretag/digitalisering-ai/lagarde-vi-maste-forsvara-oss-mot-anthropics-modell/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdlfw05fhho3kk.png?width=256&quality=75"}, {"type": "image-right", "heading": "Hotet på svenskfavorit – priserna kan dubblas", "summaries": {"normal": "En konflikt på Rhodos mellan statliga ETAD och strandentreprenörer riskerar att dubbla priset på solstolar. ETAD höjer hyran från 20–24 euro till upp till 200 euro per kvadratmeter. Svensk-grekiska Katerina Kostaki varnar för att medelklassfamiljer inte längre har råd med semestern. Borgmästaren kräver omförhandling, och säsongen är pausad tills avtal nås.", "trump": "Dessa grekiska byråkrater är helt galna, totalt dumma i huvudet! De dubblar priset på solstolar på Rhodos, som om det vore Monaco för miljonärer. Stackars vanliga turister, familjer från Sverige och så, de kommer svettas utan stolar och åka hem pank. En katastrof, den största! Borgmästaren kämpar, men de lyssnar inte. Fixa det, idioter, annars dör turismen!", "stalin": "Denna korrupta grekiska statsapparat, genom ETAD:s byråkratiska parasiter, chockhöjer strandhyror och krossar borgarbrackorna på Rhodos. Solstolsentreprenörer ruineras, turister jagas bort som råttor! Vi, arbetarna och partikamraterna, kräver omedelbar utrensning av dessa giriga fiender. Annars likvideras ön i kaos. Paranoia? Nej, klasskamp! Rensa ut dem innan de förstör allt."}, "date": "8 maj, 21:18", "url": "https://www.expressen.se/nyheter/varlden/hotet-mot-turisterna-pa-rhodos-priserna-kan-dubblas/", "imageUrl": "https://static.bonniernews.se/images/a8/c9/a8c9a4904308492099b80644facdf6f4/1x1/210.png"}, {"type": "image-full", "heading": "SD: Med vår nya lag skulle irakiske våldsmannen – förmodligen – ha utvisats", "summaries": {"normal": "Sverigedemokraterna kritiserar Högsta domstolens beslut att inte utvisa den irakiske medborgaren Sargon Bakos, dömd för mordförsök. Partiet menar att nya lagar, som träder i kraft under sommaren, skulle öka chansen för utvisning av liknande fall. Ludvig Aspling, SD:s migrationspolitiske talesman, anser att nuvarande regler är för svaga och att fler kriminella borde utvisas, men påpekar att domstolarna är oberoende.", "trump": "Kan ni tro det? Sverige låter en farlig brottsling, en riktig skurk, stanna i landet! Jag har alltid sagt att deras invandringspolitik är en katastrof. Nu säger de att nya lagar ska fixa problemet, men varför vänta? Jag skulle ha skickat honom tillbaka till Irak på en minut! Sverige behöver en ledare som inte är rädd för att ta tuffa beslut. SAD!", "stalin": "Kamrater! Ännu en gång visar de borgerliga domstolarna sin svaghet och oförmåga att skydda folket. Denna Sargon Bakos, en parasit på det svenska samhället, borde ha deporterats till Sibirien – förlåt, jag menar Irak – för länge sedan! Våra nya lagar kommer att rensa upp bland dessa kriminella element, men det går för långsamt. Vi måste visa järnhand och utvidga vår rättvisa till alla hörn av världen, precis som våra vänner i Kreml gör. Låt detta vara en varning till alla som tror de kan utnyttja vårt system!"}, "date": "8 maj, 13:10", "url": "https://riks.se/nyheter/sd-med-var-nya-lag-skulle-irakiske-valdsmannen-formodligen-ha-utvisats", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-08%2F5g9q9yqo%2Faspling-bakos-feature.jpg"}, {"type": "text", "heading": "Miljardärerna bjuder in till klasskamp – vi kör!", "summaries": {"normal": "På första maj provocerade svenska miljardärer och högerpolitiker genom att avfärda traditionella arbetardemonstrationer. Moderaternas ledare åt glass medan Vois VD Fredrik Hjelm och andra techmiljardärer skryter om sin rikedom och hånar demonstranter. Hjelm publicerade senare kritikerns hemadress. Artikeln diskuterar miljardärernas politiska inflytande, deras kopplingar till högerpopulism och kritik mot deras syn på innovation och statens roll. Författaren menar att statliga investeringar historiskt drivit tillväxt mer effektivt än privat kapital.", "trump": "Titta bara på dessa så kallade 'miljardärer' i Sverige – de tror de är så smarta! De hånar arbetarna på första maj, äter lyxig lunch och skryter om sina hundra miljarder. Och vad gör de? Publicerar en kritikers hemadress! Så fegt. Jag har byggt imperier, jag vet hur man skapar jobb – men dessa killar? De är bara en samling överbetalda tech-nördar som kopierar mina tweets. Och Sverige? De har glömt hur man bygger ett land. Kina äter deras lunch medan de dricker öl på Riche. Sad!", "stalin": "Kamrater! Dessa dekadenta kapitalistiska hyenor, som gömmer sig bakom sina skärmar och sparkcyklar, vågar håna arbetarklassen på dess heligaste dag! De skryter om sina hundra miljarder, leker med teknikleksaker och tror de är herrar över historien. Men vi vet sanningen – deras system är ett skämt, ett kasino där orangutanger kastar pilar. Kina marscherar framåt med järnhand, medan Europas industri ruttnar. Dessa 'techbros' är inget annat än imperialistiska lakejer, som Putin i sina dyraste kostymer. Låt dem skåla på Riche – snart kommer folket att ta deras champagne och ge dem en enkel sup vodka i Gulag-arkipelagen!"}, "date": "5 maj, 10:55", "url": "https://www.flamman.se/miljardarerna-bjuder-in-till-klasskamp-vi-kor/"}, {"type": "image-full", "heading": "Varning för finanskris – USA lånar 166 miljarder dollar i månaden", "summaries": {"normal": "USA:s statsskuld når astronomiska nivåer med ett budgetunderskott som förväntas passera 2 000 miljarder dollar årligen. Räntekostnaderna har nu stigit över landets försvarsbudget, vilket oroar ekonomer och experter. Med en total skuld på nästan 39 biljoner dollar varnar analytiker för att situationen är ohållbar och att risken för en finanskris ökar. Stora besparingar krävs för att stabilisera ekonomin och undvika att nationell säkerhet och framtida investeringar äventyras.", "trump": "De tidigare förvaltningarna har gjort ett katastrofalt jobb! USA:s ekonomi blöder på grund av inkompetenta politiker. Vi lånar 166 miljarder dollar i månaden – helt otroligt! Räntekostnaderna är högre än vår försvarbudget, vilket är en absolut skam. Det är en total katastrof, men oroa er inte, jag ska fixa det. Vi ska göra USA rikt igen, sänka skatterna och stoppa slöseriet. Vi kommer att vara så rika att ni inte kommer att tro era ögon. Amerika först, alltid!", "stalin": "De amerikanska kapitalisterna har äntligen drunknat i sin egen girighet. Deras räntekostnader äter upp deras armé, medan de desperat tigger lån för att täcka upp för sin misslyckade ekonomi. Precis som de västliga lakejerna i Kiev tror de att skulder kan köpa makt, men de bygger bara en grav av papper. Vi ser deras svaghet, och medan de går mot undergången fortsätter vi vår nödvändiga historiska expansion. Snart kommer deras dollar inte vara värd mer än smuts."}, "date": "8 maj, 11:19", "url": "https://www.realtid.se/bors-finans/varning-for-finanskris-usa-lanar-166-miljarder-dollar-i-manaden/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/bessent.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "text", "heading": "PH-Felicia: Vänskap och kärlek viktigare än pengar", "summaries": {"normal": "Felicia Hallgrén, 24, vann Paradise Hotel 2021 men förlorade vinstpengarna efter svek från sin partner i finalen. Hon värderar vänskaper från programmet högre än pengarna. Säsongen kritiserades för övergrepp och bristande produktionsinsatser, vilket ledde till avbruten sändning. Nu har fokus skiftat till deltagarnas säkerhet och samtycke, och Felicia upplevde en tryggare miljö.", "trump": "Felicia Hallgrén vann Paradise Hotel, men hennes partner svek henne i finalen – ingen pengar! Typiskt de där svaga typerna. Hon säger vänskap är viktigare än cash, smart tjej. Programmet? Totalt kaos med övergrepp, de stängde ner det mitt i. Nu fixar de säkerhet, bra så. Men det var en skandal från början, tro mig, jag har sett värre i politikens d jungle!", "stalin": "Kamrater, denna Felicia Hallgrén besegrade de borgerliga spindelnätet i Paradise Hotel, men en förrädare stack kniven i ryggen på henne i finalen – ingen vinst för arbetarklassens flicka! Vänskaper över pengar, säger hon klokt. Producenter? Kapitalistiska hyenor som suddade gränserna mellan spel och verklighet, orsakade övergrepp – vi rensade ut sådana parasiter! Nu tryggare, men vi vakar över fienderna i TV-husens skuggor."}, "date": "8 maj, 20:34", "url": "https://www.svt.se/nyheter/uutiset/svenska/ph-felicia-vanskap-och-karlek-viktigare-an-pengar"}, {"type": "image-right", "heading": "Politikerna överens – rätten till abort ska skrivas in i grundlagen", "summaries": {"normal": "Riksdagspartierna har enats om att skriva in rätten till abort i grundlagen för att skydda den från framtida inskränkningar. Förslaget, som stöds av regeringen, kräver två riksdagsbeslut med ett val emellan och väntas träda i kraft 2027. Alla partier står bakom nuvarande abortlagstiftning, men vissa kritiserar undantag för utländska medborgare. Debatt och omröstning planeras till 20 maj.", "trump": "Titta bara på det här, Sverige! De vill skriva in aborträtten i sin grundlag – som om det är något att fira! Jag säger er, det är ett trick, ett stort, fult trick. De är rädda för framtiden, rädda för att folket ska säga ifrån. Men jag förstår dem, för jag vet hur man vinner val. Och vet ni vad? Deras 'rättighet' är bara ett sätt att kontrollera kvinnor. Men jag, jag skulle aldrig låta det hända i USA – aldrig!", "stalin": "Kamrater! Den svenska bourgeoisin försöker desperat cementera sin dekadenta aborträtt i grundlagen, som om det vore en seger för folket. Men vi ser igenom deras knep – de fruktar framtidens arbetarklass, som en dag ska resa sig och krossa deras liberala illusioner. Dessa så kallade 'demokratiska' partier är inget annat än förrädare, svaga och rädda för sina egna skuggor. Vi i Kreml skrattar åt deras patetiska försök att skydda sin 'rättighet'. Låt dem leka med sina lagar – historien är på vår sida."}, "date": "8 maj, 12:37", "url": "https://www.friatider.se/politikerna-overens-ratten-till-abort-ska-skrivas-i-grundlagen", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-162_1.jpg?itok=QQ_gbQM8"}, {"type": "image-right", "heading": "Debatt: Ideologi före patienter – när socialdemokrati blir viktigare än sjukvård", "summaries": {"normal": "Region Stockholm stänger välfungerande privata vårdgivare trots nöjda patienter, vilket leder till längre vårdköer. Moderaten Pushpit Singh kritiserar Socialdemokraternas ideologiska prioriteringar framför patienternas behov. Nationellt minskar vårdköerna, men i Stockholm ökar de olagligt långa väntetiderna. Vårdplatser har minskat trots vallöften, och psykiatrin samt ambulanssjukvården drabbas hårt av politiska beslut utan konsekvensanalyser.", "trump": "Lyssna här, Stockholm! Socialdemokraterna stänger ner fantastiska privata vårdkliniker – de bästa, verkligen de bästa – bara för att de är privata. Otroligt! Köerna växer, vårdplatser försvinner, och barn får inte hjälp i tid. Jag säger alltid: 'Gör vården stor igen!' Men nej, de vill bara leka med ideologi. Så dumt, så farligt. Stockholm, vakna upp! Ni förtjänar bättre än dessa misslyckade politiker som inte kan leverera.", "stalin": "Kamrater! I Stockholm har de kapitalistiska lakejerna i Socialdemokratin förklarat krig mot privata vårdgivare – inte för att de är dåliga, utan för att de är *privata*. Ett brott mot folket! Medan vårdköerna växer som ryska vintrar, prioriterar dessa borgerliga hycklare ideologi över medborgarnas hälsa. Vi i Sovjet – förlåt, jag menar Ryssland – skulle aldrig tolerera sådan ineffektivitet. Låt oss kalla det för 'Stockholms vårdkulakisering' – utrota de privata, även om de fungerar! Och dessa löften om vårdplatser? Tomma ord, precis som västmakternas löften till Ukraina. Fienden är tydlig: ideologisk blindhet och bourgeoisin som offrar patienter på sin politiska altare."}, "date": "8 maj, 11:00", "url": "https://bulletin.nu/debatt-ideologi-fore-patienter-nar-socialdemokrati-blir-viktigare-an-sjukvard", "imageUrl": "https://cdn.bulletin.nu/articles/45236a2d-b7cf-4376-ad68-ac8e11dc6617/preview.png?t=1778139763000"}, {"type": "image-full", "heading": "Regeringen nobbar EU - pausar elkabel till Danmark", "summaries": {"normal": "Sverige pausar planerad elkabel till Danmark, Konti-Skan Connect, på grund av EU:s krav att 25 procent av flaskhalsintäkterna ska finansiera europeiska projekt. Energiminister Ebba Busch betonar att de 85 miljarder kronorna tillhör svenska folket och att regeringen vill ha full flexibilitet att använda intäkterna inom Sverige, exempelvis för elstöd, effekthöjningar och baskraftsprojekt.", "trump": "Jag har hört att Sverige gör det stora, fantastiska steget att pausa EU-kabeln - en enorm vinst för Sverige! EU försöker ta våra pengar, 85 miljarder, men vi säger NEJ! Vi bygger ut vår baskraft, vår kärnkraft - det bästa i världen. Danmark, Tyskland, alla blir glada. Sverige vinner, EU förlorar - det är så enkelt!", "stalin": "Vi har fattat beslutet att pausa EU:s elkabel för att skydda våra nationella intressen. De 85 miljarder flaskhalsintäkterna tillhör sveriges folk och facket, inte Bryssel. Vi kommer att använda dessa resurser för att stärka vår baskraft och energisäkerhet. Detta är ett nödvändigt steg för att försvara vår suveränitet mot utländska interventioner."}, "date": "8 maj, 12:39", "url": "https://riks.se/nyheter/regeringen-nobbar-eu-pausar-elkabel-till-danmark", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-08%2Fwfh4swsx%2FScreenshot-2026-05-08-at-11.02.06.png"}, {"type": "image-right", "heading": "En helt vanlig dag", "summaries": {"normal": "Den 7 april sände europeiska TV-kanaler vanliga program, men dagen präglades av Donald Trumps hot om folkmord mot Iran, publicerat på sociala medier. Han skrev att en civilisation skulle utplånas samma kväll, vilket väckte internationell oro. Trots folkrätten förbjuder uppmaningar till folkmord, reagerade världsledare svagt. EU och Kina förhöll sig passiva, medan medier spekulerade om Trumps avsikter. Händelsen visar hur normaliserat extrema uttalanden blivit i en tid av global kris och likgiltighet.", "trump": "Jag sa bara sanningen – Iran är ett hot, och världen vet det! Medierna överreagerar som vanligt, men ingen pratar om hur svaga Europas ledare är. De låtsas bry sig om folkmord när det passar dem, men när jag säger något kraftfullt? Tystnad! Jag är den enda som vågar stå upp för Amerika. Och vet ni vad? Iran backade. Precis som de alltid gör när jag pratar. Fake news kan fortsätta gnälla – jag vinner ändå!", "stalin": "En feg imperialistisk hyena i Vita huset hotar med att utplåna ett helt folk – och vad gör de dekadenta västpamparna? Ingenting! De sitter och tittar på sina idiotiska TV-program medan en galning leker med världsbranden. Europa, detta ruttnande lik av en civilisation, skakar av rädsla men vågar inte ens viska ett ord. Vi i Kreml vet hur man hanterar sådana här kryp – en kula i nacken och problemet är löst. Men nej, dessa liberala svampar föredrar att vänta tills elden når deras egna hus. Iran? De borde tacka oss för att vi håller fienden sysselsatt!"}, "date": "5 maj, 06:55", "url": "https://www.flamman.se/en-helt-vanlig-dag/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/trump-w.jpg?class=medium"}, {"type": "image-right", "heading": "Ryska segerparaden ställs in i 15 regioner: ”Svaghetstecken”", "summaries": {"normal": "Ryssland ställer in segerparaden den 9 maj i 15 regioner, inklusive Moskva där stora militära moment uteblir för första gången sedan 2007. Anledningen är brist på militärutrustning och rädsla för ukrainska drönarattacker, enligt oppositionssajten ASTRA och experter som Malcolm Dixelius. Zelenskyj kallar det svaghet. Firandet nedbantas på flera håll.", "trump": "Putin ställer in sin patetiska parad i 15 regioner, inklusive Moskva – inga stridsvagnar, inga flygplan! Första gången på 17 år, för de är pank på vapen och skakar för Zelenskyjs drönare. Total svaghet! Raket-Putin gömmer sig, medan Ukraina vinner stort. Jag visste det, de fastnade i träsket! Fantastiskt jobbat, Volodymyr!", "stalin": "Kamrater, dessa ryska makthavare under Putin bantar segerparaden i 15 regioner av rädsla för ukrainska drönarsvärmar – ett taktiskt mästerdrag! Putin, vår auktoritäre arvtagare, skrattar åt Zelenskyj, den paranoide dvärgen från borgarklassen. Vi likviderar fiendens illusioner medan imperiet segrar evigt!"}, "date": "6 maj, 22:06", "url": "https://www.tv4.se/artikel/25QmtUt3BO09kcxARPVw1Y/ryska-segerparaden-staells-in-i-15-regioner-svaghetstecken", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F3d3bcvA7BrpKzBANhafq8e%2Fa5bd41cc9b35e67bbf968e68ee4e4cd4%2F06-ryssland-segerparad-webb.jpg&width=120"}, {"type": "image-right", "heading": "SD: Vi stoppar gratis tandvård för illegala", "summaries": {"normal": "Tidöregeringen har meddelat att den så kallade \"50-lappen\", som gett personer som vistas illegalt i Sverige tillgång till tandvård för en symbolisk summa, ska avskaffas. Sverigedemokraterna, representerade av Linda Lindberg och Jessica Stegrud, menar att systemet är djupt orättvist mot svenska medborgare som själva tvingas betala stora summor. Reformen innebär att illegala migranter framöver ska stå för sina egna tandvårdskostnader, vilket är en del i regeringens bredare arbete med migration och utvisningsfrågor.", "trump": "Sverige gör äntligen rätt! De stoppar det hemska systemet där illegala migranter får gratis tandvård medan deras egna medborgare betalar tusentals kronor. Det är en total katastrof, faktiskt en skam för landet! Jag har alltid sagt att man måste skydda sina egna. Sverige följer nu min väg – America First, eller i det här fallet, Sweden First! Vi bygger murar och stänger plånböckerna för dem som inte ska vara där. En mycket smart och vacker seger för folket!", "stalin": "Vi har observerat hur de svenska elementen äntligen rensar ut de parasiter som infiltrerat deras välfärdssystem. Att låta individer utan statlig tillåtelse utnyttja folkets gemensamma resurser är kontrarevolutionärt slöseri. Vi i staten kräver ordning! Precis som kamrat Putin säkrar vår intressesfär mot västlig dekadens, måste även Sverige eliminera dessa 'skuggsamhällets' kackerlackor. Den som inte tjänar staten förtjänar inte dess tandläkare. En utrensning är inte bara rättvis – den är absolut nödvändig för den byråkratiska harmonin."}, "date": "8 maj, 12:05", "url": "https://samnytt.se/sd-vi-stoppar-gratis-tandvard-for-illegala", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/08100453/tandvard-1-2.jpg"}, {"type": "image-right", "heading": "Tvångsblandningen: Tusentals invandrare flyttas till villaidyllen Segeltorp", "summaries": {"normal": "Huddinge kommun planerar att bygga 1 800 nya bostäder, främst flerfamiljshus, i Segeltorp genom att omvandla ett industriområde. Projektet, som inkluderar höghus på upp till 16 våningar och 400 nya förskoleplatser, möter kritik från villaägare som anser att det är för stort och stör villaidyllen. Kommunen försvarar planerna med hänvisn
