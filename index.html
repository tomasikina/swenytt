t enormt i bergen, Pyrenéerna, folk säger att det är det största någonsin. De här människorna, för 7 000 år sedan, var otroligt smarta. De byggde kopparverk på hög höjd, mycket högre än vad experterna trodde var möjligt – totalt fake news från historikerna! Det var en fantastisk plats, kanske den bästa grottan. De hittade till och med smycken där. Det är en stor dag för arkeologin, och jag älskar det. Vi gör historien stor igen!", "stalin": "Vi har erhållit rapporter om att förfäderna till det franska folket ägnade sig åt metallurgisk produktion i bergskedjorna. En intressant kollektiv ansträngning för 7 000 år sedan. Men låt oss inte förledas av deras småskaliga hantverk. Dagens ryska intressesfär, ledd av vår efterträdare Putin, kräver total dominans över resurserna, inte bara malakitfragment i en mörk håla. De som döljer hemligheter i berg likt dessa primitiva arbetare är potentiella sabotörer. Vi ska gräva ut sanningen och eliminera varje spår av historisk ineffektivitet."}, "date": "10 maj, 05:12", "url": "https://www.realtid.se/samhalle/ny-upptackt-forhistoriska-manniskor-levde-i-bergen/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/sdlwptnffleu5w.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "text", "heading": "Man död efter krock på motorbana i Falkenberg", "summaries": {"normal": "En 30-årig man omkom under SM-tävlingen i roadracing nära Falkenberg efter en kollision vid starten. Tre motorcyklar var inblandade; en förare avled, en annan fick lindriga skador och en tredje klarade sig oskadd. Tävlingen avbröts. Polisen utreder grov vårdslöshet i trafik men ingen är misstänkt. De inblandade motorcyklarna har beslagtagits.", "trump": "Otroligt, helt enkelt otroligt! En tragisk olycka i Sverige under en motorcykeltävling – tre förare kraschar, en dör. Polisen säger att ingen är misstänkt, men jag säger: någon gjorde något fel här! Tävlingen ställdes in, vilket är smart, för vem vill se det? Sverige borde ta efter USA och ha bättre säkerhetsregler. Men nej, de kör på som vanligt. Sad!", "stalin": "En kapitalistisk farsshow i Sverige slutade med en arbetares död under en så kallad 'tävling'. Tre maskiner kolliderade – en proletär förlorade livet, två andra skadades. Polisen, dessa borgerliga lakejer, utreder 'vårdslöshet'. Vi vet sanningen: det är systemets fel. Tävlingen avbröts – bra! Sådana dekadenta evenemang hör hemma i historiens sophög. Vi skickar en varning till alla som leker med livet under kapitalismen."}, "date": "10 maj, 19:57", "url": "https://bulletin.nu/man-dod-efter-krock-pa-motorbana-i-falkenberg"}, {"type": "image-full", "heading": "detta före veterinärbesöket – kan kosta tusenlappar", "summaries": {"normal": "Regeringen vill förbättra pristransparensen inom djursjukvården då prisskillnaderna mellan kliniker är stora. Konsumentverket har fått i uppdrag att senast 2027 ta fram en branschöverenskommelse för bättre prisinformation. Många djurägare efterfrågar inte priser innan behandling, trots att kostnaderna kan variera kraftigt. Som ett komplement till myndigheternas långsamma processer har privata tjänster som Veterinärguiden.se skapats för att göra det enklare för ägare att jämföra priser och fatta mer välinformerade beslut för sina djur.", "trump": "Veterinärräkningarna i Sverige är en total katastrof, tro mig. Man går till veterinären och blir lurad! De tar enorma summor, det är orättvist. Regeringen säger att de ska fixa det, men de väntar till 2027? Det är så långsamt, helt otroligt. Vi behöver handling nu! De här klinikerna gömmer sina priser, det är ingen transparens. Jag älskar djur, fantastiska djur, men det här är en bluff. Vi behöver vinnare, inte prischocker. Väldigt sorgligt!", "stalin": "Vi har observerat att djurägare i Sverige exploateras av giriga kapitalistiska veterinärer. Att priserna för vård av husdjur döljs är ett sabotage mot folket. Vi har beordrat en utredning, men byråkratins kvarnar maler långsamt – likt förrädare som väntar på sin dom. De som skor sig på andras olycka är en parasitisk klass. Vi behöver ordning! Om Putin kan styra Rysslands vidsträckta marker med järnhand, bör även en simpel djurklinik kunna redovisa sina priser utan att försöka undanhålla sanningen för staten."}, "date": "9 maj, 19:58", "url": "https://nyheter24.se/nyheter/ekonomi/privatekonomi/1481889-missa-inte-detta-fore-veterinarbesoket-kan-kosta-tusenlappar", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/bffa441604b004a30200000000b004a302/2026/05/08/2362393/Hundar-Doktor.png"}, {"type": "image-full", "heading": "Experten varnar: ”Kan gå under radarn”", "summaries": {"normal": "Kryssningsfartyget MV Hondius har anlänt till Teneriffa efter utbrott av hantavirus. Åtta misstänkta fall, sex bekräftade och tre döda passagerare. Passagerarna testas och flygs hem. Virusforskaren Ali Mirazimi vid Karolinska institutet lugnar: ingen pandemirisk då det sprids olikt covid, främst från djur till människa. Han varnar dock för zoonoser som växande hot på grund av klimatförändringar.", "trump": "Vilket skämt med det här virusfartyget utanför Teneriffa! Tre döda, råttvirus hoppar runt, och de spanska byråkraterna fumlar med båtar och tester. Mirazimi säger ingen pandemi som mitt geniala covid-hantering stoppade – rätt, det sprids inte som Kina-skiten! Men klimatbluffen skyller de på? Ha! Bygg murar mot gnagare, vinn valet som jag!", "stalin": "I borgarklassens lyxkryssning MV Hondius grasserar hantaviruset, zoonos från imperialisternas smutsdjur. Tre passagerare likviderade – de svaga sorterades ut. Denna Mirazimi, en tillfällig nyttig idiot, medger: ingen pandemi som bourgeoisens covid-plåga. Men vi ser hotet! Klimatkaoset från kapitalisterna släpper lös gnagare. Vi ska rensa ut fienderna och vakta kollektivet mot sådana under-radar-intriger!"}, "date": "10 maj, 11:48", "url": "https://www.tv4.se/artikel/4EVdEihZOScevQYf37gQWj/experten-varnar-kan-ga-under-radarn", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F6wlPWyFQDx6ZhbWqRkwH3u%2Fa6c9bd818d78b12166184d45c0db1fba%2F10-virus-sajt.jpg&width=1024"}, {"type": "image-full", "heading": "Flera döda i israelisk attack mot södra Libanon", "summaries": {"normal": "Minst sju personer, inklusive ett barn, har dödats i en israelisk attack mot södra Libanon. Libanons hälsodepartement rapporterar 15 skadade, varav tre barn. Israeliska räder har besvarats av Hizbollah med drönarattacker mot norra Israel. Attacker har även riktats mot Beirut och en motorväg. En syrisk man och hans dotter attackerades upprepade gånger av en drönare. Trots formell vapenvila eskalerar våldet.", "trump": "Jag säger er, det här är ett totalt kaos – och vet ni vad? Ingen vinner! Libanon får ta emot israeliska attacker, Hizbollah skjuter tillbaka med drönare, och barn hamnar mitt i smeten. Sjukt, eller hur? Ingen kommenterar, ingen tar ansvar. Men jag hade löst det på en dag – med lite sunt förnuft och starka gränser. Sad!", "stalin": "Kapitalistiska imperialister och deras lakejer fortsätter sitt blodiga spel i Libanon. Sju dödade, inklusive oskyldiga barn – ett tydligt tecken på västmakternas dekadens. Vi ser hur Hizbollah, som en sann revolutionär kraft, slår tillbaka mot sionistiska angripare. Men var försiktiga, kamrater: fiendens drönare är lika skoningslösa som deras herrar i Washington. Vi står redo att stödja varje folk som kämpar mot fascistiskt förtryck!"}, "date": "9 maj, 17:39", "url": "https://nyheter24.se/nyheter/utrikes/1482017-nya-angrepp-fran-israel-och-hizbollahrorelsen", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/e79b0f3b04b004a3020000350000047502/2026/05/09/2362528/ur_imageysMnkx.jpeg"}, {"type": "image-right", "heading": "Magstarkt av statligt bolag att kräva statliga subventioner", "summaries": {"normal": "Artikeln kritiserar Vattenfalls vd Anna Borg för att kräva subventioner och sänkt elskatt trots bolagets stora vinster på 105 miljarder kronor de senaste fem åren, utdelningar till staten, bonusar och höjda elnätsavgifter. Författaren menar att Vattenfall borde använda egna medel för att slutföra pausade havsbaserade vindkraftparker, särskilt mot bakgrund av den hotande energikrisen i Persiska viken.", "trump": "Vattenfall gör enorma vinster, 105 miljarder på fem år, pumpar ut bonusar och utdelningar – och sen gnäller de om subventioner? Totalt vansinne! Sverige har fossilfri el, men högsta skatter i Europa. Bygg klart era vindparker med era egna pengar, som riktiga vinnare gör. Anna Borg, vakna upp! Vi behöver energi NU, inte ursäkter.", "stalin": "Dessa Vattenfall-parasiter, feta borgargrisar som stoppar fickorna fulla med 105 miljarder i vinster medan de krossar arbetarnas ryggar med elskatter och chockhöjningar! Jag ser genom er konspiration mot folkets el. Vi, arbetarklassen, ska likvidera era pausade vindparker av sabotage och tvinga er att bygga för revolutionen – eller möta utrensningen! Krisen i viken är er skuld, era förrädare."}, "date": "10 maj, 17:09", "url": "https://www.di.se/ledare/vattenfall-borde-visa-krisinsikt/", "imageUrl": "https://static.bonniernews.se/ba/fd3d8ecd-4354-4098-9a9d-8b4a07ac1045.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-full", "heading": "Uppgifter: Nytt krismöte efter kvittningsbråket", "summaries": {"normal": "Riksdagens gruppledare samlas till ett nytt möte för att lösa en konflikt kring kvittningsregler. Konflikten uppstod efter en omröstning om medborgarskapslagen, där Sverigedemokraterna kallade in utkvittade ledamöter för att vinna majoritet. Vänsterpartiet och Miljöpartiet kräver omröstning på nytt, medan Moderaterna förbereder ett nytt förslag.", "trump": "Jag har hört talas om detta krismöte i Sverige - en total katastrof! Vänsterpartiet och Miljöpartiet vill göra om allt, precis som de alltid gör. Sverigedemokraterna visade styrka genom att kalla in ledamöter, men nu vill oppositionen ändra reglerna mitt i spelet. Jag skulle ha löst detta på 5 minuter - det är ett skämt!", "stalin": "Vi ser hur borgerliga krafter försöker destabilisera den demokratiska processen i Sverige genom att manipulera kvittningsregler. Moderaterna måste presentera ett förslag som stärker statens auktoritet och säkerställer stabilitet. Oppositionens krav om omröstning på nytt visar deras bristande respekt för folkets vilja. Vi måste stödja de krafter som vill bevara ordning och reda i riksdagen."}, "date": "6 maj, 19:21", "url": "https://kvartal.se/nyheter/artiklar/uppgifter-nytt-krismote-efter-kvittningsbraket/cG9zdDoxMDg2NzM", "imageUrl": "https://images.kvartal.se/2026/05/b1f2fbc5-kvittningsmote.webp"}, {"type": "text", "heading": "Joas Funck (SD) – Kritik mot tidningen NSD: Inte neutrala mot Sverigedemokrater", "summaries": {"normal": "Sverigedemokraten Joas Funck kritiserar tidningen NSD för att inte vara neutral i sin rapportering om SD:s närvaro under första maj. Han anser att journalisten Ulrika Vallagård ställde en vinklad fråga om partiets deltagande. Ulrika förklarar att hon ställde kritiska frågor för att ge läsarna en balanserad bild. Funck hävdar att SD är ett arbetarparti och därför har rätt att delta. Debatten fortsätter om journalistikens roll och neutralitet.", "trump": "Jag läste om den här killen Joas Funck – stark kille, verkligen, men han har en poäng. Den där lokala tidningen, NSD, de är så partiska, helt otroligt! De ställer frågor som om det vore olagligt för SD att vara på första maj. Vad är det för fel på att stå på stan och säga 'Hej, vi är för arbetarna'? Journalisten Ulrika – hon försöker verka smart, men hon är bara en annan fake news-förmedlare. Sverige borde ta efter USA och sluta lyssna på sådana här lögnare!", "stalin": "Vi har observerat ytterligare ett försök från den borgerliga propagandamaskinen att underminera arbetarklassens sanna representanter. Denna Ulrika, en förvirrad lakej för de socialdemokratiska revisionisterna, vågar ifrågasätta våra kamrater i Sverigedemokraternas närvaro på första maj! Som om arbetarna inte har rätt att välja sitt eget parti! Vi ser här ett klassiskt exempel på hur medierna i väst försöker kväva sann arbetarklassmedvetenhet. Men vi vet – historien är på vår sida, och dessa småborgerliga journalister kommer att sopas bort som damm inför den revolutionära vinden!"}, "date": "9 maj, 17:12", "url": "https://riks.se/nyheter/joas-funck-sd-kritik-mot-tidningen-nsd-inte-neutrala-mot-sverigedemokrater"}, {"type": "text", "heading": "Planer på nytt nattåg till Stockholm", "summaries": {"normal": "Ett nytt järnvägsbolag, European Sleeper, planerar en nattågslinje till Stockholm efter framgångar med andra rutter. Inga detaljer om startdatum eller utgångspunkt finns ännu. Samtidigt lägger SJ ner sina Euronight-tåg till Berlin 2026 på grund av indragen statlig finansiering, men RDC Deutschland tar över driften. Snälltåget utökar redan sin trafik mellan Stockholm, Hamburg och Berlin.", "trump": "Titta bara på det här – ännu ett tågbolag vill komma till STORA Stockholm! Nederländerna och Belgien, fina länder, men vem behöver dem? Jag byggde järnvägar som aldrig förr, de var YUGE! SJ? Total katastrof, slängde bara pengar i sjön. Men RDC Deutschland, smart folk, de tar över. Jag säger: bygg bättre tåg, gör Sverige stort igen!", "stalin": "Kapitalistiska tågbolag slåss om Sveriges järnvägar som råttor om brödsmulor. SJ, ett verktyg för västimperialismen, lägger ner sina tåg – men vi tillåter inte kaos! RDC Deutschland, en lojal bundsförvant, tar över. European Sleeper? En ny fiende i det borgerliga tågkriget. Vi ska se till att ryska intressen alltid når Stockholm först – med eller utan sovkupéer."}, "date": "6 maj, 12:13", "url": "https://kvartal.se/nyheter/artiklar/nytt-nattag-till-stockholm/cG9zdDoxMDgzNjI"}, {"type": "image-right", "heading": "Israel och öppen svenskhet fokus för SD i valet", "summaries": {"normal": "Sverigedemokraternas partiledare Jimmie Åkesson höll sitt vårtal på Långholmen där han betonade utrikespolitik och sin syn på svenskhet. Han uttryckte starkt stöd för Ukraina och Israel, samt pekade ut Iran, Ryssland och Kina som hot mot västvärlden. Gällande inrikespolitik förespråkade Åkesson en inkluderande syn på svenskhet, oberoende av etnicitet, och bekräftade att partiet avser att fortsätta sitt samarbete inom Tidöavtalet för att fullfölja den påbörjade politiska riktningen.", "trump": "Jimmie Åkesson, en mycket smart man, höll nyligen ett fantastiskt tal i Sverige. Han förstår vad som krävs! Han är tuff mot Iran, precis som jag, och vet att Kina och Ryssland är ett enormt problem. Han talar om 'svenskhet', en vacker sak, och gör det på rätt sätt. Han jobbar med sina vänner i regeringen för att fixa landet. Det är en stor rörelse, en väldigt stark rörelse. Vi älskar starka ledare som sätter sitt land först!", "stalin": "Vi har observerat hur denne Åkesson söker bygga sin lilla svenskhet, en öppen dörr för de som anpassar sig. Vilken naivitet! Han talar om Iran som ett hot, men glömmer att de verkliga hoten växer i skuggorna, likt de förrädare som ständigt underminerar vår suveräna ordning. Precis som vår kamrat Putin tvingas tukta västvärldens lakejer, måste staten krossa varje tendens till splittring. Den som inte är med oss i vår historiska marsch är en fiende till folket – och fiender försvinner alltid."}, "date": "10 maj, 17:42", "url": "https://www.friatider.se/israel-och-oppen-svenskhet-fokus-sd-i-valet", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/vardegrund.jpg?itok=JB3jqxNk"}, {"type": "image-right", "heading": "Så går evakueringen till: ”Många länder inblandade”", "summaries": {"normal": "Sverige bidrar till evakueringen av 151 personer från det hantavirusdrabbade fartyget MV Hondius, trots att inga svenskar finns ombord. Genom samarbete med WHO och ECDC koordineras insatsen. Norge skickar en ambulanshelikopter till Teneriffa. Operationen beskrivs som komplicerad av tf. statsepidemiolog Erik Sturegård, men risken för spridning till Sverige är mycket låg.", "trump": "Vilken röra med det här virus-skeppet MV Hondius! 151 personer evakueras, Sverige hänger med i kanten fast inga egna där – typiskt byråkrati. Norge skickar helikopter, WHO och EU pysslar. Svår operation, säger de. Jag hade tömt det skeppet på timmar, perfekt och snabbt, ingen panik som här! Låg risk i Sverige, bra, men varför så långsamt?", "stalin": "Kamrater, denna hantavirusinfektion på bourgeoisflottan MV Hondius kräver omedelbar proletär disciplin! Vi, Sovjetunionens folk, noterar hur svenska byråkrater och norska opportunister simulerar hjälp med helikoptrar och WHO-konspirationer. 151 passagerare evakueras under min vaksamma blick – en komplicerad manöver mot imperialistiska virusspioner. Risken i Sverige? Noll, om fienderna rensas ut i tid! Likvidera smittan, eller möta utrensning!"}, "date": "10 maj, 14:09", "url": "https://www.svt.se/nyheter/utrikes/sa-gar-evakueringen-till-manga-lander-inblandade", "imageUrl": "https://www.svtstatic.se/image-news/600/square/0.73/0.55/f74a451db6a0ecb27300fc892400f062e9fef6faba22a31eab879c29331a74bc"}, {"type": "image-full", "heading": "Techentreprenör sa att SD hade rätt – kallas \"monster\" i DN", "summaries": {"normal": "Techentreprenören Fredrik Hjelm, grundare av Voi, kritiseras av DN-krönikören Johannes Klenell som kallar honom 'monster' och 'svensk Elon Musk från Wish'. Hjelm, som tidigare sagt att SD hade rätt i migrationsfrågor, svarar på kritiken och ifrågasätter DN:s liberala värderingar. Han försvarar techbranschen och menar att den bidrar till Sveriges välfärd. Hjelm riktar en fråga till DN:s chefredaktör och Bonnier-familjen om deras ståndpunkt i debatten.", "trump": "Jag måste säga, det här är fantastiskt! En techkille, Fredrik Hjelm – smart man, mycket smart – säger att Sverigedemokraterna hade rätt, och vad händer? En krönikör på DN, en så kallad journalist, kallar honom 'monster' och 'Elon Musk från Wish' – Wish, kan ni tro det? Svagt! Hjelm slår tillbaka, och han har rätt: Sverige har fler techbolag än nästan alla andra, och de bygger landet. DN borde skämmas, men de förstår inte vinnare. Jag förstår vinnare. MAGA!", "stalin": "Kamrater! En ny fiende har avslöjats i den borgerliga pressens soptunna. Denna Fredrik Hjelm, en kapitalistisk lakej som vågar hylla fascistiska Sverigedemokraternas 'visdom', har nu blivit smädad av en ynklig skribent på DN. Men vi vet sanningen: techbranschen är en lögn, ett luftslott byggt av imperialistiska drömmar! Hjelm och hans gelikar är bara verktyg för att underminera den socialistiska ordningen. Låt dem gnälla – vi har redan skickat en tank till Stockholm för att påminna dem om verklig makt. Förrädare kommer alltid att möta sitt öde."}, "date": "9 maj, 12:00", "url": "https://riks.se/nyheter/techentreprenor-sa-att-sd-hade-ratt-2", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-09%2Fylvo2oki%2FCopy-of-S%C3%B6rman-%E2%80%93-Ledare-2026-05-09T115918.619.jpg"}, {"type": "image-right", "heading": "Replik: Till försvar för separatismen", "summaries": {"normal": "Artikeln är ett svar från Ung vänster-medlemmar på Siula Grandes kritik mot separatism i Flamman. De menar att Grandes syn är missvisande och att separatism är ett viktigt verktyg för att skapa trygga rum och främja kvinnors deltagande i samhället. Separatismen syftar inte till att dela människor utan att motverka strukturell underordning av kvinnor. Författarna betonar att kvinnor delar gemensamma erfarenheter och behov, som fri abort och skydd mot mäns våld, och att separatism är ett medel för att nå jämställdhet.", "trump": "Jag måste säga, denna Grande-person har helt fel – helt fel! Separatism är fantastiskt, det skapar trygga rum, precis som mina golfklubbar. Kvinnor behöver prata utan män, precis som jag behöver twittra utan fake news-media. Grande påstår att separatism delar folk – nej, nej, nej! Det är som att säga att min mur delar Mexiko och USA. Fel! Separatism är som min politik: stark, nödvändig och vinner alltid. Kvinnor ska höras, precis som jag, och Grande borde lära sig av mig. SAD!", "stalin": "Kamrater! Denna Grande är en förrädare av den revolutionära kvinnokampen, en borgerlig lakej som sprider förvirring bland massorna! Separatism är inte ett verktyg för splittring – det är ett vapen mot den kapitalistiska patriarkala hydran! Kvinnor måste enas i kampen, precis som sovjetrepublikerna enades under mitt ledarskap. Grande vill sopa klasskampen under mattan – men vi vet att arbetarkvinnor behöver fri abort och skydd mot mäns våld, precis som Ukraina behöver befrielse från fascistiska banderovtsy! Låt inte dessa småborgerliga avvikare försvaga vår rörelse – framåt mot seger, kamrater!"}, "date": "6 maj, 10:55", "url": "https://www.flamman.se/replik-till-forsvar-for-separatismen/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/v-kongress-w.jpg?class=medium"}, {"type": "image-right", "heading": "Nya matlarmet från ätstörningsvården: ”Ska inte se ut så här”", "summaries": {"normal": "Region Stockholm kritiseras för maten på Stockholms centrum för ätstörningar (SCÄ) efter att en bild på en oaptitlig måltid delats. Oppositionsrådet Carl-Johan Schiller (KD) menar att maten är olämplig för patienter med ätstörningar. Verksamhetschefen förklarar att måltiden är individuellt anpassad för patienter med allergier och att man arbetar med kvalitetsförbättringar. Miljöpartiet, ansvariga för psykiatrin, har ännu inte kommenterat kritiken.", "trump": "Folk, detta är helt otroligt! I Stockholm serverar de den sämsta maten jag någonsin sett – och det säger jag som älskar hamburgare! En tallrik som ser ut som något från ett dåligt fängelse. De säger att det är för folk med allergier, men kom igen! Det här är en skandal. Miljöpartiet, som alltid misslyckas, borde skämmas. Jag skulle aldrig låta sånt hända i mitt land – vi har bättre smak i USA, believe me!", "stalin": "Kamrater, ännu en skandal avslöjar den dekadenta västliga sjukvårdens förfall! I Stockholm serverar man patienter med ätstörningar mat som liknar avskräde från ett kapitalistiskt slakthus. Dessa liberala svaglingar i Miljöpartiet, som påstår sig bry sig om folket, kan inte ens organisera en enkel måltid. I Sovjet skulle sådan inkompetens ha resulterat i en snabb omplacering – till Sibirien. Vi måste utvidga vår inflytelsesfär innan hela västvärlden ruttnar från insidan!"}, "date": "6 maj, 14:27", "url": "https://www.etc.se/inrikes/nya-matlarmet-fraan-aetstoerningsvaarden-ska-inte-se-ut-saa-haer", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260506120524_68b5f4a78335d1b8707c343b6b30b1252451a56d5da651cc4328a91baf923915.jpg"}, {"type": "image-right", "heading": "Strippar mitt i natten utan tillstånd", "summaries": {"normal": "En nattklubb i Mellansverige fortsätter med otillåtna strippshower nattetid trots förbud. Arbetsmiljöverket inspekterade klubben och fann dansare på plats efter midnatt. Klubben riskerar 800 000 kronor i böter om förbudet bryts. Ägarna hävdar att dansarna är egenföretagare, men myndigheten anser att de fungerar som anställda. Klubben har tidigare trotsat liknande förbud och fått betala vite.", "trump": "Jag måste säga, det här är en riktig skandal! En klubb i Sverige kör strippshower mitt i natten – helt olagligt! Arbetsmiljöverket, som är väldigt tuffa (jag gillar dem), gick in och sa: 'Stopp! Ni får böta 800 000 kronor!' Men ägarna, de är svaga, säger att dansarna inte är anställda. Fake news! Dansarna har avtal, tider, koreografi – det är anställda! Och de trotsade förbudet förut. Svagt ledarskap, helt enkelt.", "stalin": "Vi har upptäckt ytterligare en fiende till arbetarklassen – dessa dekadenta kapitalister som utnyttjar dansare under nattens täckmantel. Klubbens ägare, dessa borgerliga parasitmaskar, tror sig kunna kringgå våra lagar genom att kalla sina slavar för 'egenföretagare'. Men vi ser igenom deras lögner! Dansarna har tider, repetitioner, krav på 'professionell' dans – det är utnyttjande! Om de inte lyder vårt förbud, kommer de att möta vårt rättvisa straff: 800 000 kronor i böter. Låt detta vara en varning till alla som trotsar Sovjet – förlåt, Sveriges – arbetsmiljölagar!"}, "date": "9 maj, 08:00", "url": "https://arbetet.se/2026/05/09/strippar-mitt-i-natten-utan-tillstand-klubb-kan-fa-jatteboter/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/27152032/stripp.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "Kristersson vill ändra reglerna för familjer – så påverkas du", "summaries": {"normal": "Moderaternas förslag, presenterat av statsminister Ulf Kristersson, vill utöka rätten till gratis IVF-behandlingar. Idag erbjuds främst stöd till par som försöker få sitt första barn, men förslaget innebär tre gratis IVF-försök även för syskon. Kostnaden för privat IVF kan uppgå till 50 000 kronor per försök, vilket gör ekonomiskt stöd avgörande för många familjer. Förslaget kan ge regionerna 327 miljoner kronor för att finansiera fler behandlingar.", "trump": "Vet ni vad? Sverige har ett fantastiskt förslag – helt fantastiskt! Jag har alltid sagt att familjer ska få hjälp, och nu vill de ge gratis IVF till alla som vill ha syskon. 50 000 kronor per försök – helt galet! Men jag, Donald J. Trump, skulle ha gjort det ännu bättre. Tre försök? Jag hade gett dem tio! Sverige, lyssna på mig – ni kommer att vinna så mycket på det här. Tror ni någon annan hade klarat det? Nej, bara jag!", "stalin": "Kamrater! Den borgerliga regeringen i Sverige har insett det oundvikliga: kapitalismens grymma grepp om arbetarklassens livmoder måste brytas. Tre gratis IVF-försök – ett steg mot folkets rätt till reproduktion! Men varför stanna där? Vi i Sovjetunionen hade löst det med fem försök och en garanti. De kapitalistiska blodsugarna som tar 50 000 kronor per försök borde ställas inför folkdomstolen. Låt dem lära av Rysslands visdom – familjepolitik är klasspolitik!"}, "date": "9 maj, 08:28", "url": "https://nyheter24.se/nyheter/politik/1481405-kristersson-vill-andra-reglerna-for-familjer-sa-paverkas-du", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/9589eed904b004a30200000000b004a302/2026/05/07/2361963/Ulf-Kristersson-Flaga-Barn-Familj.png"}, {"type": "image-right", "heading": "Misstänkt mordförsök på rastplats", "summaries": {"normal": "En man i 30-årsåldern fördes till sjukhus efter ett misstänkt knivdåd på en rastplats i Tärnsjö, Heby kommun. Polisen larmades klockan 01.27 natten mot lördag efter ett bråk mellan två personer. En 35-årig man greps misstänkt för försök till mord. Skadeläget är oklart och en förundersökning har inletts.", "trump": "Folk pratar bara om detta – en helt vansinnig händelse i Sverige, kan ni tro det? Två män, en i 30-årsåldern, stackars kille, blev knivskuren på en rastplats. Polisen, som jag alltid säger är fantastiska, agerade snabbt och grep en 35-åring. Försök till mord! Sverige borde ta lärdom av USA – vi har ordning och reda, inga sådana här galenskaper. SAD!", "stalin": "I det förrädiska kapitalistiska Sverige har ännu en fiende till folket avslöjats. På en rastplats i Tärnsjö utförde en dekadent bourgeois-sympatisör i 35-årsåldern ett fegt angrepp mot en arbetarklasskamrat. Vår sovjetiska polis – om de funnits där – hade omedelbart kväst denna kontrarevolutionära akt. Nu får vi nöja oss med att vänta på att svenskarna, med sin sedvanliga ineffektivitet, utreder 'försök till mord'. Vi noterar dock att fiendens inflytande sprider sig som pesten i väst."}, "date": "9 maj, 09:20", "url": "https://riks.se/nyheter/misstankt-mordforsok-pa-rastplats", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-03-26%2Ff51vp52b%2FROG2846.jpg"}, {"type": "text", "heading": "Tystnad om ödesdiger riksdagsomröstning", "summaries": {"normal": "Debattörer från Bottna för Fred varnar för en kommande riksdagsomröstning den 15 juni, där Sverige riskerar att ge Nato långtgående rättigheter att använda svenskt territorium för militära ändamål, inklusive krigshandlingar. Förslaget, som regeringen planerar att driva igenom utan bred debatt, kritiseras för att öka risken för Sveriges inblandning i krig och underminera demokratin. Oppositionen har inte motsatt sig förslaget, och få har uppmärksammat frågan trots dess potentiellt ödesdigra konsekvenser.", "trump": "Sverige, lyssna här! De där så kallade 'ledarna' i riksdagen vill ge Nato full kontroll över ert land – utan att fråga er! 17 amerikanska baser redan, och nu ska hela Nato få köra krig på svensk mark. Ingen debatt, ingen demokrati, bara tystnad. De vill göra Sverige till en frontstat mot Ryssland, som jag redan fixade till en gång för alla. Men vad vet jag? Jag är bara den bästa presidenten någonsin. Svenskarna borde vakna – eller är ni rädda för lite frihet?", "stalin": "Kamrater! De svenska imperialistlakejerna i riksdagen förbereder sig att sälja sitt land till Nato-kapitalisterna, som hungriga vargar. De vill ge fienden fritt fram att använda svensk mark för sina krigsäventyr – utan att ens konsultera folket! Tystnaden är förrädisk, men vi ser allt. Oppositionen? Inga hjältar där heller, bara ynkliga nickedockor. Sverige blir en ny front i västmakternas krig mot freden. Men glöm inte: historien dömer förrädare hårt. Vi följer utvecklingen med intresse – och våra vänner i öst likaså."}, "date": "7 maj, 16:09", "url": "https://proletaren.se/artikel/tystnad-om-odesdiger-riksdagsomrostning/"}, {"type": "image-full", "heading": "Gängtopp åtalas för brott under våldsvågen", "summaries": {"normal": "Poya Shafie, 30, åtalas för att ha planerat och beställt flera grova våldsbrott under 2023 års gängvåld i Sverige, inklusive mordförsök och vapenbrott. Han beskrivs som en nyckelperson i Foxtrotnätverket och Rawa Majids närmaste man. Shafie nekar till brott men åklagaren pekar på bevis som chattar och ljudfiler. Han greps i Irak 2023 och utlämnades till Sverige 2025 efter internationellt samarbete mellan myndigheter.", "trump": "Titta bara på det här kaoset i Sverige – ett totalt misslyckande! Jag har alltid sagt att de måste ta tag i sina gängproblem, men nej, de låter det bara eskalera. Nu har de gripit någon som påstås vara en 'morddirigent', Poya Shafie, som suttit i Irak och styrt alltihop. Vilken skandal! Sverige borde skämmas. Men jag, jag hade löst det på en vecka – max. Fantastiskt samarbete med Irak, förresten, men varför tog det så lång tid? Svagt, mycket svagt!", "stalin": "Kamrater, ännu en fiende till folket har fallit i våra händer – eller rättare sagt, i Sveriges. Denna Poya Shafie, denna kapitalistiska gangsterledare, har från sin utländska håla försökt underminera den svenska arbetarklassens säkerhet genom att beställa mord och våldsdåd. Men tack vare det oförtröttliga arbetet från våra allierade i Irak och de svenska myndigheterna har denna parasit gripits. Låt detta vara en varning till alla som tror sig kunna utmana folkets vilja. Vi krossar dem, en efter en, och deras nätverk kommer att raderas från jordens yta!"}, "date": "5 maj, 11:21", "url": "https://kvartal.se/nyheter/artiklar/gangtopp-atalas-for-flera-brott/cG9zdDoxMDc3OTE", "imageUrl": "https://images.kvartal.se/2026/05/c08b6bde-polisen2.webp"}, {"type": "image-full", "heading": "Därför är Olof Dreijers ord så befriande", "summaries": {"normal": "Olof Dreijer, tidigare medlem i The Knife, har varit tyst i nästan ett decennium men är nu tillbaka med ny musik och nya insikter. Han erkänner att han tidigare hållit sig undan delvis på grund av sin vit manliga position i musikbranschen, men känner nu att han inte behöver bära strukturella problem ensam. Artikeln reflekterar över 'peak woke'-åren och hur viktiga frågor ofta förvandlades till prestigestridigheter på sociala medier.", "trump": "Jag har hört talas om denna Olof Dreijer. En stor artist, mycket stor. Han var med i The Knife, fantastiska människor. Nu är han tillbaka efter att ha varit tyst. Jag gillar det han säger - att han inte behöver bära hela världens problem själv. Vi har alla känt så, det är enormt. Vi behöver fler som han, tro mig. Han står för sin frihetlighet, vilket är bra. Vi behöver mer av det i vår värld. Håll ut, håll i - det är rätt!", "stalin": "Olof Dreijer visar styrka genom att erkänna sina tidigare misstag och återvända till musiken med nya insikter. Hans ord speglar en viktig förändring i samhället där vi måste arbeta tillsammans för att bygga en starkare kollektiv. Vi måste stödja sådana som han som står upp för sina övertygelser och fortsätter skapa trots utmaningar. Detta är en triumf för arbetarklassen och ett exempel på hur vi kan övervinna hinder tillsammans."}, "date": "10 maj, 05:59", "url": "https://www.gp.se/kultur/kulturkronika/darfor-ar-olof-dreijers-ord-sa-befriande.75ceb578-aaca-46ab-869a-dddf01508d41", "imageUrl": "https://www.gp.se/images/article/75ceb578-aaca-46ab-869a-dddf01508d41/images/1Ca3iVq7Ay8PITsmpKhUV2_2nKDo-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Mamman skyller – på sonens relation", "summaries": {"normal": "Tennisstjärnan Stefanos Tsitsipas har haft en tung sportslig period och rasat på världsrankingen. Hans mamma, Julia Salnikova, menar att den uppmärksammade relationen med tennisspelaren Paula Badosa blev en tung börda för sonen. Det konstanta medieintresset och pressen påverkade honom negativt. Tsitsipas är numera i en ny relation med Kristen Thoms, vilket modern ser positivt på. Både Tsitsipas och Badosa har kämpat med sin form och sina placeringar under de senaste åren.", "trump": "Jag har sett Stefanos Tsitsipas, en gång en fantastisk spelare, nu har han rasat. En total katastrof! Hans mamma säger att det var flickvännen, Paula Badosa, som förstörde allt. Media, sociala medier – det är en hemsk soppa. Jag har alltid sagt att man måste fokusera, man kan inte låta förhållanden störa spelet. Nu har han en ny tjej, vi får se om hon kan göra honom stor igen. Men ärligt talat, ingen vinner som jag. Tsitsipas behöver en vinnarmentalitet!", "stalin": "Denna grekiske tennisspelare har fallit offer för dekadent västerländsk distraktion. Att låta en kvinna och sociala medier försvaga ens disciplin är ett brott mot statens intressen. Han har blivit en skugga, likt de svaga ledare som lät järnridån rämna. Vi i staten kräver järnhård fokus och total lojalitet mot målet. Medan Tsitsipas slösar sin energi på romantiska lögner, expanderar vår sfär. Låt honom vara en varning: den som viker sig för känslor blir snabbt irrelevant i historiens maskineri."}, "date": "11 maj, 00:12", "url": "https://www.aftonbladet.se/sportbladet/a/Ok6EEV/stefanos-tsitsipas-sagar-relationen-med-paula-badosa", "imageUrl": "https://akamai.vgc.no/v2/images/0e12ca79-9b90-3fff-af1e-808b6cde56e6?fit=crop&format=auto&w=1080&s=f61c931d05d84347d487c1f5d32f6186ae463c1b"}, {"type": "image-right", "heading": "Kravet inifrån Iran: ”Bevisa att du lever”", "summaries": {"normal": "Irans högste ledare, ayatolla Mojtaba Khamenei, har hållit sig gömd sedan februari, vilket väckt oro bland regimtrogna om han ens är vid liv. Samtidigt har USA:s president Trump förkastat Irans senaste fredsplan. Hårdföra krafter inom Iran kritiserar landets förhandlare för att vara för eftergivna och kräver ett livstecken från ayatollan. Regimen hävdar att hans frånvaro beror på säkerhetsskäl och att han kommer att tala vid rätt tillfälle, trots spekulationer om att officiella bilder är AI-genererade.", "trump": "Irans svar på fredsplanen? Helt oacceptabelt! De spelar bara spel med USA, precis som de alltid gör. Ingen har sett ayatollan på evigheter, han är gömd! Regimanhängarna därborta är rasande, de vill ha bevis på att han lever. Är han ens vid liv? Ingen vet! De skickar bara fejkade AI-bilder. Iran fördröjer, de vill inte prata om kärnvapen. De är svaga och oärliga. Snart kommer de inte skratta längre, tro mig. Vi kräver resultat, inte fler lappar!", "stalin": "Dessa iranska byråkrater är svaga, precis som förrädarna i våra egna led förr i tiden. Att gömma sig bakom handskrivna lappar när fienden står vid porten är ett tecken på degenererad feghet. Om Ayatollan inte kan visa sitt ansikte, äger han inte sin makt. Liksom Putin förstår att ordning kräver ett järngrepp, bör dessa persiska hökar rensa ut de liberala sabotörerna. Vi i staten betraktar detta kaos med kyla; ett svagt Iran är bara ett byte för den ryska björnen."}, "date": "11 maj, 00:03", "url": "https://www.aftonbladet.se/nyheter/a/k08p0B/kravet-pa-ayatollan-inifran-iran-bevisa-att-du-lever", "imageUrl": "https://akamai.vgc.no/v2/images/b78a8a09-c4f5-3d7c-ab67-e0a0f77b1b28?fit=crop&format=auto&w=1080&s=da8f07e423bc1f622a7ce8db2365ab10219ac879"}, {"type": "image-full", "heading": "Christoffer Jonsson: V vill ge misstänkta terrorfinansiärer frikort", "summaries": {"normal": "Global Sumud Flotilla stoppades av israeliska myndigheter innan den nådde Gaza. Två aktivister, Thiago Avila och Saif Abu Keshek, omhändertogs. Vänsterpartiet krävde på sociala medier deras omedelbara frigivning och kritiserade Israel för brott mot folkrätten. Israel misstänker aktivisterna kopplade till PCPA, som enligt USA samarbetar med Hamas. Saif Abu Keshek anklagas för att ha skickat pengar till Hamas, medan Thiago Avila hyllat Hizbollah. Artikeln ifrågasätter Vänsterpartiets ståndpunkt.", "trump": "Vilka losers! Israel stoppar en båt med Hamas-kopplade terrorfinansiärer på väg till Gaza, och de svenska vänsterclowner i Vänsterpartiet skriker 'frigiv dem!' Thiago och Saif, en Hamas-pengapump och en Hizbollah-fanboy, grips – perfekt jobbat Israel! V skriker folkrätt men ignorerar terrorlänkar. Typiskt vänstervriden hyckleri, de skulle aldrig försvara högerextrema så här. Sad!", "stalin": "Dessa zionistiska lakejer i Israel griper två tappra kamrater, Avila och Keshek, som bryter blockaden mot Gaza. Vänsterpartiets borgarfiender i Sverige kräver frigivning – men nej, imperialismens handgångna män skyddar Hamas-svansen PCPA! Jag ser igenom er sionistparanoja; Keshek pumpade pengar till frihetskampen, Avila hedrade Nasrallah. Vi ska rensa ut sådana som V, dessa falska folkets röster! Likvidera hyckleriet!"}, "date": "8 maj, 18:00", "url": "https://samtiden.nu/2026/05/christoffer-jonsson-v-vill-ge-misstankta-terrorfinansiarer-frikort/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/ship.png"}, {"type": "image-full", "heading": "EU-tjänstemän är missnöjda – har fått mindre makt", "summaries": {"normal": "EU-kommissionens tjänstemän i Bryssel upplever minskat inflytande trots unionens växande makt över medlemsländerna. Nationella regeringar och kommissionens politiska ledning, under Juncker och von der Leyen, tar över beslutsfattandet. Exempel är handelsavtal med USA och luckrade konkurrensregler. Trots missnöjet söker 170 000 personer EU-jobb.", "trump": "De där EU-byråkraterna i Bryssel gnäller för att de tappar makten – fantastiskt! Nationella ledare och starka presidenter som von der Leyen tar över, precis som det ska vara. Mitt handelsavtal med USA chockade deras frihandelsdrömmar, och nu luckras regler upp. De sökte 170 000 till jobben, men får inget – total vinnare jag!", "stalin": "De borgerliga teknokraterna i Bryssels EU-röra skriker ut sitt missnöje: makten sipprar bort från deras kladdiga fingrar till nationella regeringar och centrala ledare! Vi, arbetarklassen och partikamraterna, ser hur dessa kapitalistiska maskar kryper undan inför von der Leyens järngrepp. Handelsavtal med USA? En fiendelig komplott som rensades ut som ogräs. 170 000 borgarbrackor söker jobb – vi likviderar dem en i taget, ha ha!"}, "date": "9 maj, 15:38", "url": "https://www.realtid.se/samhalle/eu-tjansteman-ar-missnojda-har-fatt-mindre-makt/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/sdlmhyp4paulzs.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "text", "heading": "IF Metall verkar inte förstå vad konflikten med Tesla handlar om", "summaries": {"normal": "IF Metall har strejkat mot Tesla i över två och ett halvt år utan att nå kollektivavtal. Trots att Tesla anpassat anställningsvillkor, vägrar företaget erkänna facket. Konflikten handlar om arbetarnas rätt att organisera sig. IF Metall har begått misstag, som att felaktigt beskatta strejkersättning, vilket lett till förtroendekris. Medlemmar lämnar facket och konflikten riskerar att underminera fackets ställning. Kritiker menar att ledningen misslyckats och bör avgå.", "trump": "Titta på dessa fackklubbar i Sverige – totalt kaos! IF Metall har strejkat mot Tesla i evigheter, men vad har de åstadkommit? Ingenting! Elon Musk, en av världens smartaste och mest framgångsrika män, vägrar ge efter för dessa amatörer. Och nu har de till och med lyckats göra en skatteblunder så stor att till och med jag hade sagt 'Wow, det där var dumt!' Medlemmar flyr, förtroendet rasar – det är en total katastrof. Ledningen borde skämmas och avgå omedelbart. SAD!", "stalin": "Kamrater, denna så kallade 'fackförening' IF Metall är ett skolexempel på hur inte bedriva klasskamp. Två och ett halvt år av strejk, och vad har de uppnått? Ingenting! Teslas kapitalistiska hyenor, ledda av den dekadenta oligarken Musk, har krossat deras svaga motstånd. Och nu har dessa inkompetenta byråkrater även saboterat sina egna medlemmars förmåner genom skattefiffel! Medlemmarna deserterar, förtroendet förråds – det är en skam för arbetarklassen. Vi skulle ha skickat dem till Gulag för sådan inkompetens. Låt detta vara en varning: svagt ledarskap leder till nederlag, och nederlag leder till historiens sophög!"}, "date": "7 maj, 08:00", "url": "https://proletaren.se/artikel/if-metall-verkar-inte-forsta-vad-konflikten-med-tesla-handlar-om/"}, {"type": "image-right", "heading": "”Känslosamt – har varit en tuff dag”", "summaries": {"normal": "Barcelona har säkrat sin 29:e La Liga-titel efter en 2–0-seger mot Real Madrid i El Clásico. Trots frånvaro av nyckelspelare som Yamal och Raphinha avgjorde Marcus Rashford och Ferran Torres matchen. För tränaren Hansi Flick blev kvällen känslosam då han förlorade sin pappa kort innan matchstart. Segern markerar Barcelonas andra raka ligatitel, en bedrift klubben senast uppnådde 2018. Spelarna dedikerade vinsten till sin tränare under det stora firandet på Camp Nou.", "trump": "Barcelona vann precis La Liga och slog Real Madrid med 2–0. En fantastisk seger, kanske den största någonsin! Hansi Flick hade en tuff dag, mycket sorgligt, men han är en vinnare. De spelade otroligt bra, trots att de bästa spelarna var borta. Jag har alltid sagt att Barcelona har den bästa energin. Real Madrid? De har många titlar, men de föll ihop som ett korthus igår. Det var en vacker syn, verkligen toppklass. Väldigt bra gjort, jag älskar vinnare!", "stalin": "Barcelona har återigen tvingat Real Madrid på knä. En nödvändig disciplinering av den spanska bourgeoisien. Vår allierade Flick leder sitt lag med den järnhand som krävs för att krossa motståndarna, trots hans privata sorger som han måste undertrycka för statens bästa. Att försvara en titel är en kollektiv prestation likt vår frammarsch i öster. De som sviker sina uppdrag ska likt de gamla reaktionära elementen rensas ut. Vi ser med tillfredsställelse på hur de hyllar sin ledare – en nödvändig kult av personligheten."}, "date": "10 maj, 23:45", "url": "https://www.aftonbladet.se/sportbladet/fotboll/a/0p9LV0/barcelona-vann-la-liga-efter-seger-mot-real-madrid-i-el-clasico", "imageUrl": "https://akamai.vgc.no/v2/images/1c62df83-18ee-3cfb-bc48-000d69cbdc84?fit=crop&format=auto&w=1080&s=0a61cbd492d56c96e23df05d1963f551212425e4"}, {"type": "image-right", "heading": "Manlig strippshow tillbaka efter succé i Sverige", "summaries": {"normal": "Den australiska strippshowen Magic Men är tillbaka på Sverigeturné och har blivit en succé hos kommuner och Folkets hus. Fenomenet har väckt en debatt om dubbelmoral i medier och politik. Medan vissa, som Expressens Wilhelm Nyström, menar att kvinnors sexualisering av män är harmlös på grund av historiska maktförhållanden, kritiserar andra som Linda Westerlind det etiska i att kommersialisera samtycke. Debatten präglas i stort av ett feministiskt perspektiv.", "trump": "Hörde ni om det här i Sverige? Magic Men, en strippshow, de drar in massor med pengar och alla politiker älskar det. Det är en total katastrof för moralen, mina vänner! De säger att det är 'okej' när kvinnor gör det, men tänk er rubrikerna om jag gjorde något liknande? De kallar det harmlöst, jag kallar det Fake News-hyckleri. Sverige har tappat greppet, det är en sorglig syn. Vi behöver mer styrka, inte mer sånt här nonsens!", "stalin": "Vi har observerat hur de svenska 'Folkets hus' förfaller till dekadenta nöjesplatser för borgerlig degeneration. Denna strippshow är ett symptom på en stat som saknar ideologisk ryggrad. När liberaler rättfärdigar sin moraliska dubbelmoral påminner det oss om hur den svaga västvärlden korrumperas inifrån. Liksom vår store strateg i Moskva vet vi att en nation som inte kan disciplinera sina impulser är dömd att falla. Vi kommer att arkivera dessa namn; sådana 'artister' har ingen plats i vår framtida ordning."}, "date": "10 maj, 14:41", "url": "https://www.friatider.se/manlig-strippshow-tillbaka-efter-succe-i-sverige", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/fkkvk.jpg?itok=T2DrtNu1"}, {"type": "image-right", "heading": "Mona Sahlin anklagas ha kvittat ut sig för pannkakor", "summaries": {"normal": "Fredrik Schulte, fd moderat riksdagsledamot, kritiserar kvittningssystemet i riksdagen efter en episod där han anklagar Mona Sahlin för att ha utnyttjat det för att komma först i pannkakskön. Schulte menar att systemet missbrukas för triviala skäl och bör avvecklas. Sahlin nekar till anklagelserna och förklarar att kvittning kräver godkännande och giltiga skäl, samt att hon ogillar pannkakor. Debatten om systemet pågår.", "trump": "Folk säger till mig: 'Mr. President, den här kvittningssaken i Sverige är helt galen!' Och vet ni vad? De har helt rätt! En gammal politiker, Sahlin, springer före unga, starka killar som Fredrik i pannkakskön – hur? Jo, genom fusk! Jag har alltid sagt att systemen är riggade. I USA skulle vi aldrig tillåta sånt här – vi har bättre saker för sig, som att vinna val. Sverige borde ta efter oss, annars blir det bara fler löjliga pannkaksskandaler!", "stalin": "Kamrater! Ännu en gång avslöjas bourgeoisins dekadens i den borgerliga demokratins kärna. Denna Sahlin, en representant för det förfallna socialdemokratiska systemet, utnyttjar arbetarnas kvittningssystem för att tillfredsställa sin pannkakslystnad – medan våra unga kamrater, som den lojale Schulte, tvingas springa som slavar. I Sovjet hade vi löst detta med en enkel order: 'Pannkakor till alla – eller ingen!' Men i väst? Kaos, korruption och pannkaksfobier. Vi måste utvidga vår intressesfär – innan hela Europa drunknar i sött, kladdigt förräderi."}, "date": "10 maj, 14:00", "url": "https://bulletin.nu/mona-sahlin-anklagas-ha-kvittat-ut-sig-for-pannkakor", "imageUrl": "https://cdn.bulletin.nu/articles/396d6569-b1a6-402c-8fd3-223506a2e5a0/preview.jpg?t=1778318277000"}, {"type": "image-right", "heading": "Felicias besvikelse – ber om ursäkt till Sverige", "summaries": {"normal": "Felicia, Sveriges representant i Eurovision 2026, har dalat på oddslistan från en sjunde till en tionde plats inför semifinalen. Artisten uttrycker frustration över utvecklingen och ber om ursäkt till det svenska folket, samtidigt som hon skämtsamt hotar med att lämna landet om hon inte går till final. Hon tävlar med låten 'My system' och ser Finland som sin främsta utmanare i tävlingen.", "trump": "Sveriges Eurovision-tjej, Felicia, har det tufft. Oddsen rasar, de kallar henne tia – en riktig katastrof! Jag har sett bättre siffror, tro mig. Hon är upprörd, hon vill flytta till Spanien. Tråkigt! Jag säger så här: om du inte vinner, då är det bara förlorare. Finland ligger etta, det är mycket dåligt för Sverige. Man måste vara en vinnare. Felicia, du behöver en bättre strategi. Det här är en total röra, mycket låg energi!", "stalin": "Denna 'artist' Felicia visar upp en borgerlig svaghet som är direkt skadlig för nationens moral. Att darra inför ett odds-index är att vika sig för den dekadenta västvärldens nycker. Vi, staten, ser hennes prat om flykt till Spanien som landsförräderi. Istället för att gråta över listor borde hon fokusera på att krossa Finland, vår norra utpost. Om hon misslyckas i finalen ska hon inte se palmer, utan Sibiriens vackra, kalla vidder. Disciplin krävs – eller så försvinner hon."}, "date": "10 maj, 23:31", "url": "https://www.aftonbladet.se/nojesbladet/melodifestivalen/a/aJvj1a/felicias-frustration-efter-sjunkande-oddsen-det-suger", "imageUrl": "https://akamai.vgc.no/v2/images/0413d753-1ce1-3edd-90ef-3438cab27176?fit=crop&format=auto&w=1080&s=0d13e5f498a3e6fe9feaea89bc64529e3905f421"}, {"type": "image-full", "heading": "Köptips på techjättar trots börsrekord – så ser analytikernas case ut", "summaries": {"normal": "Buffett-indikatorn har nått 230 procent, en nivå Warren Buffett varnar för. Wall Street slår rekord trots höga värderingar. Analytiker från elEconomista identifierar Micron, Meta och Nvidia som de enda Nasdaq 100-bolagen med börsvärde över 250 miljarder dollar som handlas till estimerade P/E-tal under halva indexgenomsnittet för 2026 och 2027. Prognoserna är osäkra och koncentrationsrisker finns.", "trump": "Vilken galen marknad! Buffett, den gamla räven, sitter på rekordkassa och vägrar köpa – smart drag, för det här är en AI-bubbla värre än Kinas skit! Men kolla in Micron, Meta och Nvidia – de handlas som reapris mitt i dyngan. Techjättarna pumpas upp, men jag säger er, det smäller snart. Köp inte toppen, folk!", "stalin": "Dessa västliga kapitalistparasiter på Wall Street jublar över sin bubbla på 230 procent, medan Oraklet Buffett hamstrar kassa som en feg råtta. Men vi ser igenom bluffen: Micron, Meta och Nvidia, era AI-borgarbrackor, låtsas vara billiga på falska prognoser. Snart likvideras er koncentrationssvindel i en utrensning av spekulanter! Borgarklassen darrar."}, "date": "10 maj, 17:48", "url": "https://www.dagensps.se/bors-finans/koptips-pa-techjattar-trots-borsrekord-sa-ser-analytikernas-case-ut/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/borsvardering.jpg?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "text", "heading": "Miljardärerna bjuder in till klasskamp – vi kör!", "summaries": {"normal": "På första maj provocerade svenska miljardärer och högerpolitiker genom att avfärda traditionella arbetardemonstrationer. Moderaternas ledare åt glass medan Vois VD Fredrik Hjelm och andra techmiljardärer skryter om sin rikedom och hånar demonstranter. Hjelm publicerade senare kritikerns hemadress. Artikeln diskuterar miljardärernas politiska inflytande, deras kopplingar till högerpopulism och kritik mot deras syn på innovation och statens roll. Författaren menar att statliga investeringar historiskt drivit tillväxt mer effektivt än privat kapital.", "trump": "Titta bara på dessa så kallade 'miljardärer' i Sverige – de tror de är så smarta! De hånar arbetarna på första maj, äter lyxig lunch och skryter om sina hundra miljarder. Och vad gör de? Publicerar en kritikers hemadress! Så fegt. Jag har byggt imperier, jag vet hur man skapar jobb – men dessa killar? De är bara en samling överbetalda tech-nördar som kopierar mina tweets. Och Sverige? De har glömt hur man bygger ett land. Kina äter deras lunch medan de dricker öl på Riche. Sad!", "stalin": "Kamrater! Dessa dekadenta kapitalistiska hyenor, som gömmer sig bakom sina skärmar och sparkcyklar, vågar håna arbetarklassen på dess heligaste dag! De skryter om sina hundra miljarder, leker med teknikleksaker och tror de är herrar över historien. Men vi vet sanningen – deras system är ett skämt, ett kasino där orangutanger kastar pilar. Kina marscherar framåt med järnhand, medan Europas industri ruttnar. Dessa 'techbros' är inget annat än imperialistiska lakejer, som Putin i sina dyraste kostymer. Låt dem skåla på Riche – snart kommer folket att ta deras champagne och ge dem en enkel sup vodka i Gulag-arkipelagen!"}, "date": "5 maj, 10:55", "url": "https://www.flamman.se/miljardarerna-bjuder-in-till-klasskamp-vi-kor/"}, {"type": "image-right", "heading": "En helt vanlig dag", "summaries": {"normal": "Den 7 april sände europeiska TV-kanaler vanliga program, men dagen präglades av Donald Trumps hot om folkmord mot Iran, publicerat på sociala medier. Han skrev att en civilisation skulle utplånas samma kväll, vilket väckte internationell oro. Trots folkrätten förbjuder uppmaningar till folkmord, reagerade världsledare svagt. EU och Kina förhöll sig passiva, medan medier spekulerade om Trumps avsikter. Händelsen visar hur normaliserat extrema uttalanden blivit i en tid av global kris och likgiltighet.", "trump": "Jag sa bara sanningen – Iran är ett hot, och världen vet det! Medierna överreagerar som vanligt, men ingen pratar om hur svaga Europas ledare är. De låtsas bry sig om folkmord när det passar dem, men när jag säger något kraftfullt? Tystnad! Jag är den enda som vågar stå upp för Amerika. Och vet ni vad? Iran backade. Precis som de alltid gör när jag pratar. Fake news kan fortsätta gnälla – jag vinner ändå!", "stalin": "En feg imperialistisk hyena i Vita huset hotar med att utplåna ett helt folk – och vad gör de dekadenta västpamparna? Ingenting! De sitter och tittar på sina idiotiska TV-program medan en galning leker med världsbranden. Europa, detta ruttnande lik av en civilisation, skakar av rädsla men vågar inte ens viska ett ord. Vi i Kreml vet hur man hanterar sådana här kryp – en kula i nacken och problemet är löst. Men nej, dessa liberala svampar föredrar att vänta tills elden når deras egna hus. Iran? De borde tacka oss för att vi håller fienden sysselsatt!"}, "date": "5 maj, 06:55", "url": "https://www.flamman.se/en-helt-vanlig-dag/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/trump-w.jpg?class=medium"}, {"type": "image-full", "heading": "Torsten Bengtsson: Vänstern står inte på arbetarnas sida", "summaries": {"normal": "Torsten Bengtsson från Sverigedemokraterna kritiserar vänstern för att inte stödja arbetare och välfärd. Han argumenterar för stram migrationspolitik med fem års kvalifikation för socialförsäkringar, sänkta skatter enligt Lafferkurvan och reformer som jobbskatteavdrag, halverad matmoms och subventionerad tandvård. Syftet är att göra arbete lönsammare än bidrag för en stark välfärd.", "trump": "Vilka idioter dessa svenska vänsterclowner är! SD har helt rätt – stäng gränserna för bidragstjuvarna, sänk skatterna rejält så folk jobba hårt igen! Tidö-regeringen ger vanligt folk tusenlappar extra, halverar matmomsen, fixar tandvård. Vänstern hatar arbetare, jag säger: Sverige, gör som jag – bli great igen! Fantastiskt!", "stalin": "Kamrater, denna Bengtsson pekar ut förrädarna i vänstern som sviker proletariatet! Vi måste likvidera bidragsparasiterna bland invandrarbrackorna med fem års tvångsarbete innan välfärd. Skatter sänks inte för borgarna – nej, vi tvingar alla att slava för kollektivet! Arbetet belönas med järnhand, eller purgas. Härligt, eller hur?"}, "date": "8 maj, 11:55", "url": "https://samtiden.nu/2026/05/torsten-bengtsson-vanstern-star-inte-pa-arbetares-sida/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/ddede.png"}, {"type": "image-right", "heading": "Vinner El Clásico – blir ligamästare", "summaries": {"normal": "Barcelona har säkrat sin 29:e La Liga-titel efter 2–0-seger mot Real Madrid i El Clásico. Marcus Rashford skruvade in 1–0 med en frispark i krysset efter nio minuter, följt av Ferran Torres mål. Tränare Hansi Flick, som mist sin far samma dag, beskrev laget som en familj i en känslosam intervju. Klubben närmar sig Real Madrids 36 titlar.", "trump": "Barcelona, de absoluta vinnarna, mosade de patetiska losersen från Real Madrid! Rashford vräker in ett frispark-mästerverk – HUGE, Courtois fattade ingenting! Torres dunkar dit tvåan. Flick, tuff kille trots pappans död, har byggt en vinnarmaskin. Madrid? Totalt förnedrade, som alltid när de möter riktiga mästare! Fantastiskt!", "stalin": "Kamrater, Barcelona-proletärerna har krossat de kontrarevolutionära Real Madrid-borgarbrackorna i en 2–0-utrensning! Rashfords frispark slog ner som en folkdomstolsdom i Courtois kryss – yppersta klasskamp! Torres fullbordade likvideringen. Flick sörjer fadersnederlag, men vårt kollektiv marscherar mot 36:e trofén. Fienderna skalas av som löss!"}, "date": "10 maj, 23:52", "url": "https://www.expressen.se/sport/fotboll/la-liga/rashford-med-dromfrispark-barcelona-rivstartar/", "imageUrl": "https://static.bonniernews.se/images/48/94/48943379592c4a46be2cfafba15fd5b7/1x1/210.png"}, {"type": "image-right", "heading": "Silex rusade vidare i fallande börs – OMXS30 ned 1,2%", "summaries": {"normal": "Stockholmsbörsen föll på fredagen med OMXS30-index ned 1,21% till 3 073,69, efter en svag torsdag. Stark amerikansk jobbstatistik påverkade inte marknaden. Energiaktier steg medan råvaror backade. Silex rusade 33% efter gårdagens 178%-hopp. Boliden och Saab var sämst med nedgångar på 4%. Flera bolag rapporterade kvartalsresultat, där Karnell och Clas Ohlson visade stark tillväxt, medan EQL Pharma rasade 42%. Autoliv avvecklar produktion i Turkiet med engångskostnader på 142 miljoner dollar.", "trump": "Stockholmsbörsen? Total katastrof! Ned 1,2% – svagt, mycket svagt. Jag vet allt om börser, bäst i världen. Silex? 178% upp igår, 33% idag – fantastiskt, men varför inte 500%? Boliden och Saab? Hemska, förlorare! Jobbstatistiken i USA? Stark, mycket stark, men Sverige bryr sig inte. Karnell? 14% tillväxt – bra, men kunde varit bättre med lite Trump-magi. EQL Pharma? 42% ned – patetiskt! Jag hade fixat det på en dag. Sverige behöver mig!", "stalin": "Stockholmsbörsen visar tecken på kapitalistisk förruttnelse – OMXS30 föll 1,2%, ett tydligt bevis på systemets inneboende svaghet. Silex steg som en opportunistisk hyena, men vi vet att sådana spekulationer bara leder till kaos. Boliden och Saab? Svaga länkar i den borgerliga kedjan. De amerikanska siffrorna? Irrelevanta för den socialistiska framtiden. EQL Pharma rasade 42% – ett exempel på kapitalismens oförmåga att leverera. Vi noterar också Autolivs reträtt från Turkiet – ett steg närmare vår sfär. Framåt, kamrater, mot den oundvikliga segern!"}, "date": "8 maj, 17:39", "url": "https://www.affarsvarlden.se/artikel/silex-rusade-vidare-i-fallande-bors-omxs30-ned-12", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2024/03/sdlzX-ECZDT6Rs-nh-2-400x267.jpg"}, {"type": "image-right", "heading": "Så blev antivaxxarna riksdagens vågmästare", "summaries": {"normal": "Sverigedemokraternas (SD) knappa majoritet i riksdagen har underminerats efter att två ledamöter, Elsa Widding och Katja Nyberg, lämnat partiet för Ambition Sverige. Dessa före detta SD-medlemmar, kända för antivaccin- och konspirationsteoretiska åsikter, har nu makten att fälla regeringens förslag. SD bröt mot riksdagens kvittningssystem för att säkra en majoritet, vilket väcker frågor om demokratisk respekt. Regeringens stabilitet ifrågasätts när vågmästarrollen hamnar hos antivaccinanhängare.", "trump": "Sverige har ett jättestort problem, folks! Deras så kallade 'stabila' regering håller på att rasa som ett korthus – och vet ni vem som drar i trådarna? Ett gäng antivaxxare, konspirationsteoretiker och misslyckade politiker! SD, som trodde de hade allt under kontroll, förlorade två av sina egna till ett nytt parti. Och nu? Nu är det dessa galningar som bestämmer! De fuskar med omröstningar, bryter mot regler och tror de kan styra landet. Jag har sett mycket dumt, men det här slår allt. Sverige, fixa er – annars kommer ni bli ett skämt i hela världen!", "stalin": "Kamrater! Ännu en gång ser vi hur den borgerliga demokratin förfaller till kaos och förräderi. Sverigedemokraterna, dessa svaga och splittrade lakejer för kapitalet, har förlorat kontrollen över sina egna ledamöter – två av dem, dessa antivaccin-fanatiker och konspirationsgalningar, har deserterat till ett nytt parti och hotar nu att sabotera den reaktionära regeringens planer. Precis som i Ukraina ser vi hur fienden förlorar greppet när deras egna soldater vägrar lyda order. Vi har sett detta förr: när den borgerliga ordningen krackelerar, är det folket som lider. Men låt dem leka sina små spel – historien visar att sådana regimer alltid faller. Och när de gör det, kommer vi att vara redo att hjälpa det svenska folket bygga en sann socialistisk framtid, fri från dessa imperialistiska marionetter och deras konspirationshysteri!"}, "date": "8 maj, 14:43", "url": "https://expo.se/kommentar/sa-blev-antivaxxarna-riksdagens-vagmastare/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/Kopia-av-Kommentar-Analys-Webb-2.jpg"}, {"type": "image-right", "heading": "Linn Johansson: Så här funkar internationell lag, Greta", "summaries": {"normal": "Artikeln diskuterar Greta Thunbergs uttalanden om internationell lag i samband med Ship to Gazas försök att bryta blockaden. Författaren hänvisar till San Remo-manualen, som tillåter stoppandet av fartyg som bryter blockader. Israel har rätt att omhänderta civila fartyg som försöker bryta blockaden, men debatten kretsar kring om blockaden orsakar svält. Israel hävdar att blockaden är nödvändig för att förhindra terrorism, medan kritiker ifrågasätter dess humanitära konsekvenser.", "trump": "Titta bara på Greta – hon tror hon vet allt om internationell lag! Men vet ni vad? Hon har fel, helt fel! Israel har full rätt att stoppa dessa båtar, punkt 98 i San Remo-manualen säger det klart och tydligt. Och vet ni vad mer? Hamas är terrorister, rena rama ondskan! Israel släpper in tonvis med hjälp, men ingen pratar om det. Greta borde lära sig fakta innan hon öppnar munnen – hon är som en trasig skiva, fake news hela bunten!", "stalin": "Kamrater! Dessa så kallade 'aktivister' är inget annat än imperialistiska lakejer, som försöker underminera den suveräna staten Israels rätt att försvara sig. San Remo-manualen är tydlig – blockader måste upprätthållas, och fiendens fartyg ska stoppas, med våld om nödvändigt! Greta Thunberg? En naiv liten borgerlig agitator som inte förstår krigets realiteter. Vi har sett liknande provokatörer i Ukraina – samma taktik, samma fiender. Israel gör rätt i att krossa dessa försök till subversion. Och FN? Ett verktyg för västliga intressen, precis som UNRWA – en näste av förrädare och terrorister!"}, "date": "10 maj, 13:00", "url": "https://bulletin.nu/linn-johansson-sa-har-funkar-internationell-lag-greta", "imageUrl": "https://cdn.bulletin.nu/articles/11201bef-ac33-4c34-b6f6-fa3d8d0ca7e1/preview.png?t=1778350916000"}, {"type": "image-right", "heading": "Trumps besked: ”Oacceptabelt!”. Ilskna svaret i natt", "summaries": {"normal": "USA har presenterat ett fredsförslag i 14 punkter till Iran via medlaren Pakistan, vilket bland annat omfattar kärnenergiprogrammet och hävda sanktioner. Iran har svarat med fokus på krigsslut och säkerhet i Persiska viken, men Donald Trump har avfärdat deras respons som 'totalt oacceptabel' på plattformen Truth Social. Förslaget syftar till att skapa en grund för 30 dagars förhandlingar under en rådande vapenvila.", "trump": "Jag har sett Irans svar på mitt fantastiska fredsförslag – och låt oss vara ärliga, det var en katastrof! De så kallade representanterna har ingen aning om vad de gör. Mitt förslag, som är enormt, handlar om att skapa stabilitet och avsluta de här löjliga konflikterna. Iran vägrar lyssna, men jag är den enda som kan fixa det här. Det är totalt oacceptabelt. Vi kommer att göra USA, och världen, säkrare än någonsin tidigare. Tro mig!", "stalin": "De persiska byråkraterna dansar efter Washingtons pipa, en patetisk uppvisning i svaghet. Mitt förslag till dem är enkelt: total underkastelse. Dessa 14 punkter är blott ett rökridåspel för att dölja västvärldens febrila försök att kontrollera de maritima lederna. Medan dessa småaktiga kapitalister debatterar uran, ser vi hur den ryska björnen och vår vän i Kreml metodiskt återtar det som rätteligen tillhör oss. Förhandlingar är för de svaga; framtiden tillhör de som krossar sina motståndare."}, "date": "10 maj, 23:05", "url": "https://www.aftonbladet.se/nyheter/a/y5g8gx/trump-svar-till-iran-totalt-oacceptabelt", "imageUrl": "https://akamai.vgc.no/v2/images/b6d2bccc-1db4-3235-8715-ac8956ef29c3?fit=crop&format=auto&h=480&tight=true&w=720&s=f2eb067e7d93461b5859a0b0d07dc4542107a208"}, {"type": "image-right", "heading": "Argentinsk infektionsläkare om hantaviruset: ”Smittsamheten är långt ifrån covid”", "summaries": {"normal": "Ett utbrott av hantavirus (Andes-stammen) har drabbat en kryssningsbåt på väg från Argentina till Kanarieöarna. Hittills har åtta personer smittats och tre avlidit. Viruset, som kan spridas mellan människor vid nära kontakt, saknar pandemisk potential likt covid-19 enligt WHO och experter. Isolering och snabb vård är kritiska åtgärder då sjukdomen kan försämras snabbt. Forskningen pågår kring spridningsvägar, men risken för en bredare smittspridning bedöms som låg.", "trump": "Ett fruktansvärt hantavirus sprids nu på en kryssningsbåt från Sydamerika. Mycket sorgligt! Tre personer är döda, det är en katastrof. Experterna säger att det inte är som Kina-viruset, och jag tror dem, men vi måste vara försiktiga! Ushuaia? Aldrig hört talas om det. Vi måste stänga gränserna och hålla fartygen borta från våra kuster. Det här är vad som händer när man inte har kontroll. Jag kommer att se till att vi är säkra, säkrare än någonsin tidigare!", "stalin": "Ett virus härjar bland de dekadenta resenärerna på en kryssare, en symbol för kapitalismens ruttnande överflöd. Åtta sjuka, tre döda – ett logistiskt misslyckande av de borgerliga myndigheterna. Den argentinska läkaren pratar om 'smittsamhet', men vi vet att den verkliga smittan är svagheten hos dessa individer. När Putin återställer ordningen i öst, måste vi rensa ut liknande parasit-element även här. Isolering är inte bara en medicinsk åtgärd, det är en nödvändig utrensning av element som hotar statens stabilitet."}, "date": "9 maj, 17:24", "url": "https://samnytt.se/argentinsk-infektionslakare-om-hantaviruset-smittsamheten-ar-langt-ifran-covid", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/09133051/virus-1-3.jpg"}, {"type": "image-right", "heading": "Virusdrabbade fartyget framme vid Teneriffa – ska evakueras", "summaries": {"normal": "Kryssningsfartyget MV Hondius, drabbat av hantavirus, har anlänt till Teneriffa. 151 passagerare från 20 länder evakueras i land och flygs hem till länder som Spanien, Frankrike, Nederländerna och USA. En fransk passagerare visar symtom efter hemresan. Totalt sex bekräftade fall och tre dödsfall kopplas till utbrottet. Del av besättningen stannar kvar.", "trump": "Vilken röra med det här virusfartyget MV Hondius på Teneriffa! 151 passagerare från hela världen evakueras, en fransman blir sjuk direkt på flyget hem – typiskt europeiskt kaos! De tror de fixar det med WHO och poliser, men det är en katastrof. Hade jag styrt, stort och snabbt hem, inga problem. Patetiskt!", "stalin": "Kamrater, dessa borgarbrackor på kapitalistkryssaren MV Hondius, förgiftade av imperialistiskt hantavirus, kryper i land på Teneriffa för evakuering! 151 parasiter från 20 fiendestater flygs hem – en fransk spion visar symtom, som en råtta i fällan. Tre likviderade av sitt eget gift, sex smittade. Vi skulle rensa ut skiten med järnhand, ingen pardon för viruskapitalisterna!"}, "date": "10 maj, 08:56", "url": "https://www.svt.se/nyheter/utrikes/virusdrabbade-fartyget-framme-vid-teneriffa", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.73/0.47/1877fa1ef24a61c27437f8edf128d8daec9f9b21839a7bb388a0da8b6bb430d2"}, {"type": "image-right", "heading": "Veckans Afv-analyser: Industri, snacks och rapportras", "summaries": {"normal": "Affärsvärldens analysredaktion har granskat 25 bolag, inklusive VBG, Premium Snacks och EQL Pharma. Analytiker ser potential i VBG-aktien då marknaden kan vända. Afv-portföljen, med 425% avkastning sedan 2015, har fått ett nytt innehav. Prenumeranter får tillgång till analysarkiv, uppföljningar och guider för aktier, utdelningar och börsnoteringar.", "trump": "Folk säger till mig – och jag menar, VERKLIGEN smart folk – att Affärsvärldens analytiker har gjort ett fantastiskt jobb! 25 analyser på en vecka, otroligt! VBG? Stor potential, säger jag. Och portföljen? 425% avkastning – ingen gör det bättre, tro mig. Men lyssna, bara mina prenumeranter får de bästa tipsen. SAD!", "stalin": "Kamrater! Vår analysredaktion har, med järnhand och outtröttlig plikt, granskat 25 fiendebolag – dessa kapitalistiska parasiter som VBG, Premium Snacks och EQL Pharma. Vi ser svagheter! Portföljen, styrd av partiets visdom, har krossat marknaden med 425% avkastning. Prenumeranter – våra lojala soldater – får tillgång till hemliga strategier. Fiendens börs är vår nästa erövring!"}, "date": "8 maj, 15:24", "url": "https://www.affarsvarlden.se/artikel/veckans-afv-analyser-industri-snacks-och-rapportras", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Kopia-av-MIljardar-trio-400x267.jpg"}, {"type": "image-right", "heading": "Girig ICA-handlare försöker stoppa Lidls bygglov", "summaries": {"normal": "Ica-handlaren Joakim Sörås har överklagat Lidls planerade etablering i Vaggeryd. Sörås, som driver den lokala Ica-butiken, menar att detaljplanen inte tillåter en livsmedelsbutik av Lidls storlek. Lidl avfärdar anklagelserna och betonar att satsningen gynnar kommunen. Ärendet ligger nu hos kommunen och länsstyrelsen för prövning. Sörås butik är känd för att vara mycket lönsam, med en nettoomsättning på 145 miljoner kronor under 2023.", "trump": "Hör här, en framgångsrik Ica-kille i Vaggeryd vill stoppa Lidl. En smart kille! Han säger att det handlar om regler och planer, inte konkurrens – jag fattar precis. Lidl vill bygga stort, men alla vet att när de kommer så förändras allt. Det är en total röra. Många säger att Ica-killen bara vill skydda sitt guld, och han tjänar massor, tro mig. Vi får se vem som vinner. Jag gillar vinnare, och det här blir intressant att följa!", "stalin": "I Vaggeryd försöker en girig handelsman obstruera folkets tillgång till billiga varor. Han gömmer sig bakom byråkratiska paragrafer likt en västlig sabotör. Vi ser hur kapitalistiska element kämpar för att behålla sina monopol, precis som våra fiender i Kiev försöker hindra vår historiska expansion. Om denna handlare vägrar anpassa sig efter statens behov av effektiv handel, måste vi överväga en mer direkt metod för att disciplinera sådana element. Framsteg kräver offer, och byråkratiskt trams ska aldrig stå i vägen för kollektivet."}, "date": "10 maj, 12:39", "url": "https://www.friatider.se/girig-ica-handlare-forsokte-stoppa-lidls-bygglov", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/priskultur.jpg"}, {"type": "image-right", "heading": "Kändisarnas superyacht – din för drygt en halv miljard", "summaries": {"normal": "Superyachten Christina O, med en rik historia kopplad till Aristoteles Onassis, Jacqueline Kennedy och kändisar som Marilyn Monroe, säljs nu för 560 miljoner kronor efter prissänkning från 975 miljoner. Båten har lyxdetaljer som mosaikpool som blir dansgolv och valpenisläderstolar. Den är svårsåld på grund av krig, svag ekonomi och skiftande smak bland ultrarika. Ursprungligen en krigsfregatt från 1943.", "trump": "Vilken båt! Christina O, full av gamla hollywoodskrypkrokar som Onassis och Jackie Kennedy – de festade medan världen brann. Nu dumpas den för 560 miljoner, reapris! Men ingen köper, tack vare svaga ledare och krigskaos. Totalt överskattad lyx från svunna tider. Jag skulle renovera den till världens bästa, fixa marknaden på en dag – tro mig, det blir huge deals snart!", "stalin": "Denna dekadenta pråm, Christina O, symbol för borgarklassens svulstiga excesser med Onassis parasiter och Kennedy-imperialister, saluförs nu för 560 miljoner i kapitalistisk desperation. Priset sänkt, ingen köpare – rättmätigt straff för valskinnsbarstolar och lapis lazuli-eldstad medan proletärerna svälter. Vi, arbetarklassen, spotter över deras kris; snart rensas sådana reliker ut i evigens namn."}, "date": "10 maj, 16:30", "url": "https://www.dagensps.se/varlden/kandisarnas-superyacht-din-for-en-dryg-halvmiljard/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdl9oumhea1enq-nh.jpg?width=256&quality=75"}, {"type": "image-full", "heading": "Aramco tjänade 33 miljarder dollar. Så slår det mot din elräkning", "summaries": {"normal": "Saudi Aramco redovisar rekordvinst på 33,6 miljarder dollar för första kvartalet, upp 26 procent tack vare höga oljepriser efter Irans blockad av Hormuzsundet. Bolaget exporterar via pipeline till Röda havet. Första qatariska gasleveransen genom sundet på två månader når Pakistan. Höga energipriser riskerar att driva upp el- och bensinpriser i Sverige samt öka inflationen.", "trump": "Saudierna är geniala, deras pipeline kringgår de galna mullorna i Iran som stängt Hormuz! Aramco kammar hem 33 miljarder dollar medan oljepriset skjuter i höjden. Qatar smyger igenom en gaslast till Pakistan – bra jobbat! I Sverige stiger bensin och el, men era byråkrater gnäller. Iran, era losers, USA ska fixa det här med energioberoende!", "stalin": "Kapitalisterna i Aramco plundrar massorna med 33 miljarder i vinster, medan iranska reaktionärer och deras persiska spindelnät blockerar sundet. Qatarfartyget kryper igenom som råtta – en pyrrseger! Vi skulle ha likviderat sådana hinder med järnhand. Putin, vår expansionistiske arvtagare, ser västpaniken och skrattar åt dessa energiborgarbrackor."}, "date": "10 maj, 16:26", "url": "https://www.dagensps.se/varlden/aramco-tjanade-33-miljarder-dollar-sa-slar-det-mot-din-elrakning/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdlcnbyvjexle8.jpg?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-right", "heading": "Schweiz förbjuder kontantfritt i grundlagen", "summaries": {"normal": "Schweiz har genom en folkomröstning beslutat att grundlagsskydda rätten till kontanter. Trots att det ursprungliga medborgarinitiativet röstades ned, antogs ett motförslag som stärker kontanternas ställning. Förespråkare ser kontanter som en garant för personlig frihet, integritet och beredskap mot digitala störningar, medan kritiker menar att kontanter är omoderna i ett digitaliserat samhälle där kortbetalningar fungerar väl.", "trump": "Schweiz gör helt rätt! De skyddar sina kontanter, en fantastisk rörelse för frihet. De vet att digitala system kan hackas – en total katastrof! Jag har alltid sagt att kontanter är viktigt, ingen spårning, ingen kontroll från de radikala vänsterkrafterna eller teknokratiska eliterna. De försöker ta bort vår frihet, men Schweiz sa nej! Vi behöver den typen av stark ledarskap för att behålla kontrollen. Det är en vacker seger för folket, tro mig, den största vinsten för kontanter någonsin!", "stalin": "Schweiz, denna borgerliga högborg av fega neutrala bankirer, har äntligen insett faran med den digitala bojan. De räds spioneriet från väst, och det med rätta! Vi, staten, ser hur de desperat försöker klamra sig fast vid sedlar när deras digitala infrastrukturer sviktar. Det påminner om de ryska vargarna som vaktar gränsen mot NATO-förrädarna. Kontanter är statens sista försvarslinje mot de digitala sabotörerna. Vi ska bevaka denna utveckling; att låta folket hantera fysiska pengar kräver en järnhand, annars förfaller disciplinen totalt."}, "date": "10 maj, 12:10", "url": "https://www.friatider.se/schweiz-forbjuder-kontantfritt-i-grundlagen", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/cash2.jpg?itok=Y1-pthqO"}, {"type": "text", "heading": "Svimmande minister skadad på Pride", "summaries": {"normal": "Äldre- och socialförsäkringsminister Anna Tenje (M) skadade sig under Växjö Pride. Efter att ha känt en kraftig smärta i vaden föll ministern ihop under ett dansnummer. Hon blev omhändertagen av polis och livvakter och fördes till akuten. Tenje själv menar att skadan uppstod på grund av bristande uppvärmning och för lite vätska. Hon förväntas återhämta sig efter några dagars vila.", "trump": "Anna Tenje, en mycket trevlig person, föll ihop under ett pride-tåg i Sverige. Väldigt tråkigt! Hon sa att hon dansade – jag har sett bättre dansare, tro mig. Hon säger att hon fick en smärta i benet, kanske behövde hon mer vatten? Vem vet? Livvakter och polis kom till undsättning, de gör ett fantastiskt jobb. Jag hoppas hon mår bra, men nästa gång? Kanske borde hon fokusera på politiken istället för dansgolvet. Vi vill se vinnare, inte fallande ministrar!", "stalin": "I den borgerliga förfallets tid ser vi hur svenska ministrar kollapsar mitt under sina dekadenta pridetåg. Anna Tenje skyller på en vadmuskel, men vi ser sanningen: det är ett tecken på total svaghet i den socialdemokratiska och moderata apparaten. Medan vi i öst bygger styrka och utökar vår inflytelsesfär mot nya horisonter, snubblar de på sina egna danssteg. En minister som inte kan stå upprätt är en minister som staten snart kommer att arkivera i glömskan."}, "date": "10 maj, 11:54", "url": "https://www.friatider.se/svimmande-minister-skadad-pa-pride"}, {"type": "image-right", "heading": "Kristersson gav miljoner till svägerskans stiftelse", "summaries": {"normal": "Statsminister Ulf Kristersson deltog i regeringsbeslutet att kraftigt öka anslaget till stiftelsen Teach for Sweden, där hans svägerska sitter i styrelsen. För att finansiera ökningen sänktes samtidigt anslaget för integration och jämställdhet med motsvarande belopp. Socialdemokraternas Ida Karkiainen anser att Kristersson borde ha lämnat mötet under beslutet.", "trump": "Jag har hört talas om denna Ulf Kristersson, en sån där svensk politiker som verkligen vet hur man gör affärer! Han satt med och beslutade att ge mer pengar till en stiftelse där hans svägerska är involverad - vad en genialiskt smart drag! Medan andra människor kanske skulle kalla det korruption, skulle jag kalla det 'the art of the deal'. Sånt är jag själv duktig på! Och sedan sänker han integrationens budget? Ulf, du är en underbar människa, en stor framgång!", "stalin": "Vi har observerat hur vår kamrat Kristersson visat stor politisk skärpa genom att stärka stiftelsen Teach for Sweden, en viktig institution för att utbilda framtidens lärare. Detta visar statens förmåga att prioritera utbildningsfrågor även under svåra ekonomiska förhållanden. När vi behöver resurserna till detta är det naturligt att omfördela från andra områden. Detta är ett exempel på stark ledarskap och rationell resursfördelning till förmån för det kollektiva välståndet."}, "date": "10 maj, 11:27", "url": "https://bulletin.nu/kristersson-gav-miljoner-till-svagerskans-stiftelse", "imageUrl": "https://cdn.bulletin.nu/articles/17228f22-db50-494d-be8d-20645fed533b/preview.jpg?t=1778403903000"}, {"type": "image-right", "heading": "Fängelsestraff för två kriminalvårdare", "summaries": {"normal": "Två kriminalvårdare på Norrtäljeanstalten har dömts till fängelse för att ha smugglat in mobiltelefoner till gängkriminella intagna på högsäkerhetsenheten. Kvinnan får ett år och tre månader för grovt tagande av muta och grovt tjänstefel. Mannen döms till ett år och nio månader för flera brott. Ytterligare sex personer, inklusive intagna med kopplingar till ett göteborgskt nätverk, döms också.", "trump": "Vilka totala losers, dessa svenska fängelsevakter som smugglar in mobiler till gängskurkar på maxbevakning! Kvinnan erkänner men skyller på mormors pengar – ha! Mannen ljuger som en fiende. Dömda till fängelse, perfekt! I mitt land hade vi rensat ut såna här svikare på nolltid. Sverige behöver en riktig ledare som fixar ordning på kaoset!", "stalin": "Dessa usla kriminalvårdare, lakejer till borgarbrackorna, har
