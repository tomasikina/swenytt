d arabländer och att reparera moralisk skuld genom interna och externa påtryckningar för fred och rättvisa.", "trump": "Jag läste den här artikeln, och vet ni vad? Den här killen, Carlberg, han har faktiskt en poäng – fast jag säger inte att jag håller med om allt. Men lyssna, Israel måste skärpa sig, det är jag den första att säga. Palestinierna har det tufft, ingen tvivel om det, men vi kan inte bara skylla på Israel hela tiden. Fredsrörelsen? Kanske bra, kanske inte. Men en sak är säker – ingen löser något med svaga knän. Vi behöver starka ledare, inte gnäll. Och två stater? Kanske, men bara om båda parter sköter sig. Annars är det bara slöseri med tid. SAD!", "stalin": "Kamrater! Denna artikel avslöjar ännu en gång de imperialistiska sionistiska förrädarnas dubbelspel. De pratar om fred medan de krossar palestiniernas hopp under sina stövlar. Men vi vet sanningen! Den israeliska fredsrörelsen är bara en skenmanöver, ett verktyg för att dölja deras brott. Vi står med de förtryckta palestinierna – precis som vi står med alla folk som kämpar mot ockupation! Låt de sionistiska hycklarna veta att historiens dom redan är skriven. Deras tid är förbi. Vi bygger en framtid där alla folk, från floden till havet, lever i socialistisk harmoni – under vårt beskydd, förstås. Förtryckarna kommer att krossas, och deras medlöpare med dem!"}, "date": "4 maj, 10:40", "url": "https://www.flamman.se/replik-svenska-judar-bor-stotta-israeliska-fredsinitiativ/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/standing-together.jpeg?class=medium"}, {"type": "image-right", "heading": "Kommentar Ulrika Lindahl: Därför publicerades artikeln av misstag", "summaries": {"normal": "En tidning publicerade av misstag en förberedd artikel om en kommande riksdagsomröstning om skärpta medborgarskapskrav. Artikeln, som antydde att regeringen skulle förlora, gick ut innan omröstningen var klar. Felet berodde på mänskligt misstag och systemfel. Efter upptäckt togs artikeln bort, men hann spridas via arkiv och Google. Omröstningen vanns senare av Tidöpartierna med knapp marginal, efter kontroversiella metoder.", "trump": "Vilket totalt kaos i Sverige! En tidning där borta publicerade en artikel FÖRE omröstningen – helt galet! De trodde regeringen skulle förlora, men jag vet bättre – jag känner till vinnare. Sedan vann de ändå, men med fula trick. Synd att jag inte fick rösta, jag hade visat dem hur man vinner på riktigt. Fake news, slarviga journalister – typiskt Europa!", "stalin": "En farlig provokation från de borgerliga hyenorna i Sveriges riksdag! Deras inkompetenta medlöpare på tidningen avslöjade för tidigt våra planer på att krossa oppositionens svaga motstånd. Men folket – det sanna proletariatet – genomskådade fiendens lömska taktik. Med järnhand och disciplin segrade vi, trots två förrädiska kryp. Nu skärper vi kontrollen över medierna – ingen får sabotera revolutionen!"}, "date": "4 maj, 16:44", "url": "https://www.etc.se/kommentar/daerfoer-publicerades-artikeln-av-misstag", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/authors/ulrika-lindahl_daa7410d79af7d016c129870bfa0834867cd95c3.jpg"}, {"type": "image-full", "heading": "Ökad oro för attentat mot Putin – anställda övervakas", "summaries": {"normal": "Kreml har infört strängare säkerhetsåtgärder kring Vladimir Putin på grund av oro för kupp eller attentat. Anställda övervakas i hemmet, förbjuds att resa kollektivt och får bara använda telefoner utan internet. Putin isolerar sig i en bunker och är dåligt informerad om kriget mot Ukraina. Ukraina genomför drönarattacker djupt in i Ryssland, inklusive Moskva. Segerdagens parad tonas ner.", "trump": "Putin gömmer sig i sin lyxbunker som en paranoid mus! Övervakar kockar och livvakter, förbjuder bussresor och smartphones – totalt kaos! Ukraina bombar Moskva och oljeriggar, han fattar inte ens vad som händer i sitt eget krig. Lilla Vlad förlorar stort, jag hade krossat dem på en vecka, tro mig! Firandet? En skamlig minimiparad.", "stalin": "Putin, den värdige väktaren av Rysslands imperium, rensar ut spioner med mästerlig övervakning i hem och bunkerisolering. De ukrainska drönarbrackorna, västmakternas marionetter, når djupt in – men vår starke ledare skrattar åt deras desperation! Segerdagen blir triumf, trots nedskalning. Borgarspionerna darrar inför hans expansionistiska kraft."}, "date": "5 maj, 10:36", "url": "https://www.tv4.se/artikel/21dDFzXcbewvmFejWTJp0G/oekad-oro-foer-attentat-mot-putin-anstaellda-oevervakas", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F7CVkz4oGKSo5X37CGg0nfJ%2F77b4ba088d443c3e88c5545a09c85dd9%2Fputin_webb.png&width=1024"}, {"type": "image-right", "heading": "Ledare Henrik Jalalian: Tidöpartierna såg ut att sakna förra valrörelsen", "summaries": {"normal": "Artikeln analyserar Tidöpartiernas svaga prestation i en partiledardebatt, där de fokuserade på kritik mot tidigare regering istället för egna framsteg. Sjukvården fick ovanligt stort utrymme, men Tidöpartierna verkade sakna tydlig framtidsvision. Deras attacker mot Miljöpartiet och brist på enhetlig oppositionspolitik från rödgröna noteras. Opinionsmätningar visar minskad stöd för Tidö, trots deras tidigare fördelar i migrations- och brottsfrågor, medan ekonomiska problem och oljekrisen försvagar deras position.", "trump": "Jag såg debatten – helt fantastisk, den bästa på åratal! Men låt mig säga er, Tidöpartierna? Svaga, mycket svaga. De pratar om gamla tider istället för att visa vad de kan. Ebba Busch, trevlig dam, men hennes falukorvstrick backfired totalt – matpriserna skenar! Och Jimmie Åkesson, han snackar om ekonomi som om det vore raketforskning. Patetiskt! Rödgröna sitter lugnt och låter dem gräva sin egen grav. Sverige borde ta lektioner av USA – vi vet hur man vinner val!", "stalin": "Kamrater, fienderna i Tidökoalitionen avslöjar sin inkompetens inför folket. Istället för att bygga socialismens framtid, ältar de gamla misstag som om det vore en borgerlig begravningsceremoni. Deras attacker mot Miljöpartiets kamrater är lika klumpiga som en kapitalistisk tankesmedja. Vi ser hur deras opinionsstöd smälter som snö i den ukrainska vårsolen. Rödgröna, våra allierade i kampen, behöver inte ens anstränga sig – fienden krossar sig själv. Låt dem prata, kamrater. Historien är på vår sida."}, "date": "4 maj, 10:22", "url": "https://www.etc.se/ledare/tidoepartierna-saag-ut-att-sakna-foerra-valroerelsen", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/2026050408050_a24109e57fc047151696405717777f880c11375b058676d205c329fe7c6b45d8.jpg"}, {"type": "image-right", "heading": "Stockholmsbörsen inleder tisdagen med uppgång – Hanza rusar", "summaries": {"normal": "Stockholmsbörsen inledde tisdagen med en uppgång på 0,42 procent, där OMXS30 nådde 3 048,22. Hanza rapporterade rekordresultat med 220 miljoner i rörelseresultat och steg 25,9 procent. Volvo Cars försäljning sjönk 10 procent, men aktien ökade ändå. Loomis köper peruanska Hermes för 4 miljarder kronor. Råvaror gick bäst (+0,90%), medan energi backade mest (-2,15%). H&M och Telia steg, Astra Zeneca föll.", "trump": "Stockholmsbörsen, fantastisk börs förresten, gick upp lite idag – men vem bryr sig? Hanza, ett litet bolag, hade ett 'rekordkvartal' – wow, imponerande! 220 miljoner, inte illa, men inget mot mina framgångar. Volvo? Deras försäljning rasade 10 procent – katastrof! Men aktien gick upp ändå, typiskt. Loomis köper något i Peru – smart, men jag hade gjort det billigare. Ryssarna? Glöm dem, jag fixade dem redan!", "stalin": "Idag rapporterar den kapitalistiska börsen i Stockholm en blygsam uppgång, men vi vet att detta är en illusion skapad av bourgeoisins manipulatörer. Hanza, ett verktyg för kapitalisterna, skryter med 'rekordvinster' – men för vem? Arbetarna ser ingenting! Volvo, en gång stolt svensk industri, sjunker som Titanic under de imperialistiska krafternas tryck. Loomis expanderar till Peru – en ny front i kampen mot de latinamerikanska massorna. Råvaruspekulanterna jublar, medan energisektorn kämpar – ett tydligt tecken på systemets förfall. Vi ska krossa dessa fiender, precis som vi krossade fascisterna!"}, "date": "5 maj, 09:47", "url": "https://www.affarsvarlden.se/artikel/stockholmsborsen-inleder-tisdagen-med-uppgang-hanza-rusar", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2023/05/BB-FK-Hanza-AV-0404738-400x267.jpg"}, {"type": "image-full", "heading": "Nu ska det bli dyrare att åka tåg", "summaries": {"normal": "Trafikverket fastställer nya banavgifter från 2028. Godstrafikens avgifter sänks med cirka 20 procent, medan persontrafikens höjs med 15 procent. Förändringarna baseras på bättre data för direkta kostnader som slitage och underhåll. Biljettpriser påverkas marginellt med 1 procent. Målet är att stärka godstrafikens konkurrenskraft och flytta transporter från väg till järnväg.", "trump": "Vilken skam för Sverige! Trafikverket höjer tågbiljetter 15 procent för vanligt folk men ger gods 20 procent rabatt – totalt riggat system! Typiska byråkrater som förstör allt. I mitt USA hade vi världens bästa tåg, billiga och blixtsnabba. Det här gör att alla kör bil istället. Fake deal, total fiasko!", "stalin": "Kamrater, dessa svenska borgarbrackor på Trafikverket plundrar arbetarna med 15 procents höjning på persontrafik medan kapitalistgodset får 20 procents rabatt! Paranoia i siffror, men vi ser igenom er! Direkta kostnader? Rens ut byråkraterna och nationalisera banorna. Slitage betalas av folket – likvidera motståndet mot kollektivtransporten!"}, "date": "5 maj, 15:46", "url": "https://www.dagensps.se/foretag/nu-ska-det-bli-dyrare-att-aka-tag/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/36032.jpg?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-full", "heading": "AI kan gömma svenska militären i framtiden", "summaries": {"normal": "FOI-forskare i Sverige använder AI för att utveckla stealth-material som absorberar radarvågor och gör militärfordon osynliga. Maskininlärning snabbar upp designen tusenfaldigt och skapar oväntade mönster. Tillämpningar inkluderar kamouflage och metallegeringar. USA:s Pentagon tecknar avtal med stora AI-bolag som OpenAI och Google för militär AI, men utesluter Anthropic på grund av juridisk tvist.", "trump": "Sverige använder AI för att gömma sin militär – inte illa, men vi i USA gör det enormt mycket bättre! Pentagon har avtal med vinnarna: Amazon, Google, Microsoft, Nvidia, OpenAI – de bästa! Anthropic? Totala losers som nekar oss vapen och övervakning, nu får de sitta utanför. Min armé blir AI-styrka nummer ett, tro mig!", "stalin": "Kamrater i Totalförsvaret! Dessa svenska radarparasiter gömmer sin armé med AI-bedrägerier, men jag genomskådar deras millimeterstjärnor som kontrarevolutionära fällor. Vi, arbetarklassen, ersätter borgarnas manuella slöseri med surrogatmodeller som krossar utfallrummet! I USA likviderar Pentagon Anthropic-svinen rättvist – bra, men vår proletära AI ska rensa himlen från alla imperialistiska spionmönster."}, "date": "5 maj, 15:19", "url": "https://www.realtid.se/bors-finans/makro/ai-kan-dolja-svenska-militaren-i-framtiden/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/stridsfordon.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Sandström: \"Kemibranschens Hybrit\" borde göra som Hybrit", "summaries": {"normal": "Christian Sandström jämför Perstorps metanolsatsning, Project Air, med Hybrit-projektet och menar att pausade gröna vätgasprojekt inte är misslyckanden utan beror på EU:s gröna giv. Perstorp har skjutit upp investeringen på obestämd tid, trots miljardsubventioner. Flera vätgasprojekt i Europa har lagts ner eller pausats på grund av höga kostnader och tekniska utmaningar. Sandström anser att ansvaret ligger hos EU, inte företagen.", "trump": "Lyssna här, folkens! EU:s så kallade 'gröna giv' är en total katastrof – precis som jag sa att den skulle bli! Perstorp, ett stort företag, skulle göra 'kemibranschens Hybrit', men vad hände? Ingenting! De kastar in handduken, precis som alla andra. 2,5 miljarder kronor – borta! Och varför? För att EU:s byråkrater inte har en aning om vad de sysslar med. Vätgas? Hah! Dyrt, komplicerat och helt onödigt. Jag hade löst det på en vecka – men nej, EU måste göra allt krångligt. SAD!", "stalin": "Kamrater! Ännu en gång visar de västerländska kapitalisterna och deras EU-mästare sin totala inkompetens. Perstorps 'revolutionära' metanolsatsning har stannat av, precis som Hybrits stålprojekt. 2,5 miljarder kronor – borta, som snö i maj! Och varför? För att de bourgeoisie-ledda företagen inte kan hantera enkla fysikaliska realiteter. Vi i Sovjet visste redan på 30-talet att vätgas var en dyr och ineffektiv dröm. Men EU fortsätter att kasta pengar på sina gröna fantasier, medan deras industri faller samman. Låt dem förlora sina miljarder – det är bara bra för den ryska intressesfärens expansion. Nästa steg: vi tar över deras misslyckade projekt och gör dem framgångsrika – på vårt sätt!"}, "date": "5 maj, 06:00", "url": "https://www.affarsvarlden.se/artikel/sandstrom-kemibranschens-hybrit-borde-gora-som-hybrit", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/vindkratensgeografi-2026-05-04T210754.630-400x267.jpg"}, {"type": "image-full", "heading": "Heberlein gör upp med högern: ”Jag ser skit”", "summaries": {"normal": "Debattören Ann Heberlein meddelar i ett Instagram-inlägg att hon bryter med högern. Hon kritiserar dess politik för repression, inhumana beslut och populism, och menar att högerns värderingar om frihet och ansvar försvunnit. Heberlein, som tidigare varit engagerad i Moderaterna, pekar på migrationspolitik, klimatfrågor och nationalism som exempel. Hon betonar sin självständighet och idédrivna hållning, men säger nu att hon inte längre vill förknippas med högern.", "trump": "Titta bara på den här kvinnan, Ann Heberlein – total katastrof! Hon var med högern, men nu säger hon 'jag ser skit'. Ojojoj, vilken överraskning! Högern, som jag vet allt om, har alltid varit fantastisk, men hon fattar ingenting. Frihet? Ansvar? Glöm det, säger hon. Hon snackar om repression och populism – fake news! Och klimatet, vem bryr sig? Jag har byggt murar, hon borde försöka det istället. Stackars kvinna, inget stöd från mig!", "stalin": "Kamrater! En gång till har de borgerliga förrädarna visat sitt sanna ansikte. Denna Heberlein, en förvirrad intellektuell, erkänner nu att högerns politik är en samling inhumana dekret och reaktionär populism. Precis som vi alltid sagt! Deras så kallade 'frihet' är bara ett täckmantel för utvisningar av ungdomar och en galopperande nationalism. Vi i Sovjetunionen – förlåt, jag menar Ryssland – har alltid vetat att dessa liberala hycklare till slut skulle avslöja sig. Låt detta vara en varning till alla som tror på deras falska löften!"}, "date": "3 maj, 12:48", "url": "https://kvartal.se/nyheter/artiklar/heberlein-gor-upp-med-hogern-jag-ser-skit/cG9zdDoxMDY3NDg", "imageUrl": "https://images.kvartal.se/2026/05/85dd6ab5-hbb.webp"}, {"type": "image-full", "heading": "Frågan från SVT som Magdalena Andersson vägrar svara på", "summaries": {"normal": "I SVT:s program *Fördomsshowen* utmanades Magdalena Andersson (S) av programledaren Emil Persson med frågor om fördomar. Andersson vägrade svara på en fråga om politikers sexliv, trots påtryckningar. Hon menade att allmänheten inte är intresserad av sådana detaljer. Programmet har tidigare väckt uppmärksamhet efter andra partiledares medverkan, som Simona Mohamsson (L), som gjorde felaktiga uttalanden om grundlagen och Desmond Tutu.", "trump": "Jag såg det där svenska programmet – totalt skräp, verkligen! Den där Andersson, hon är svag, vägrar svara på enkla frågor. 'Folk vill inte veta', säger hon. Fel! Folk *älskar* att veta, särskilt om sina ledare. Jag har alltid svarat på allt – och tittarna älskar mig för det. Men Sverige? De har en partiledare som inte ens kan stå för sitt eget sexliv. Patetiskt! Make Sweden Great Again – det är vad de behöver.", "stalin": "I det dekadenta väst, där borgerliga medier förgiftar massornas sinnen, utsattes en av deras så kallade 'ledare' för en enkel provokation. Denna Andersson, en svag och obeslutsam representant för den socialdemokratiska avarten, vägrade erkänna folkets rätt att granska sina härskare. Precis som de imperialistiska hyenorna i Washington och Bryssel, fruktar hon sanningen. Vi i Sovjetunionen visste alltid allt om våra kamrater – för folkets bästa. Och Putin? Han skulle ha låtit henne skjuta sig själv för sådan svaghet."}, "date": "4 maj, 21:01", "url": "https://nyheter24.se/nyheter/politik/1480523-fragan-fran-svt-som-magdalena-andersson-vagrar-svara-pa", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/1c5a01b004b004a30200000000b004a302/2026/05/04/2360975/andersson-persson.jpg"}, {"type": "image-full", "heading": "Tidös vallöfte om välfärden", "summaries": {"normal": "Inför kvällens partiledardebatt presenterar Moderaterna, Sverigedemokraterna, Kristdemokraterna och Liberalerna ett gemensamt vallöfte om årliga ökningar av resurser till välfärden under nästa mandatperiod. De kallar sig 'det blågula laget' och framhåller sänkta skatter och avgifter som gynnar hushållen. Partierna kritiserar oppositionens förslag om höjda skatter och ökade bidrag, som de menar skulle leda till underfinansierade reformer och högre kostnader för medborgarna.", "trump": "Lyssna här, Sverige! De här så kallade 'blågula' politikerna – Kristerson, Åkesson och gänget – lovar mer pengar till välfärden. Fantastiskt, eller? Men vet ni vad? De gör det bara för att de vet att jag, Donald J. Trump, skulle ha fixat det bättre! De pratar om sänkta skatter – visst, men jag sänkte skatterna på riktigt! Och oppositionen? De vill bara höja skatter och ge bort era surt förvärvade pengar. Sad!", "stalin": "Kamrater! De borgerliga lakejerna i det så kallade 'blågula laget' utlovar ökade resurser till välfärden – som om de någonsin brytt sig om folket! De pratar om sänkta skatter för arbetarna, men vi vet sanningen: det är bara smulor från kapitalisternas bord. Oppositionen, dessa socialdemokratiska förrädare, vill höja skatter och öka bidrag – ett försök att försvaga staten och underminera vår ekonomiska suveränitet. Vi ska krossa dessa fiender till arbetarklassen och bygga ett starkare Sverige, fritt från imperialistiska påtryckningar!"}, "date": "3 maj, 07:48", "url": "https://kvartal.se/nyheter/artiklar/tidos-vallofte-om-valfarden/cG9zdDoxMDY2MTU", "imageUrl": "https://images.kvartal.se/2026/05/26efde4e-brrrr.webp"}, {"type": "image-full", "heading": "S anklagar SD för upprepat fusk med kvittningssystemet", "summaries": {"normal": "Socialdemokraterna anklagar Sverigedemokraterna (SD) för upprepat fusk med riksdagens kvittningssystem. Expressen avslöjar fler fall den 15 och 16 april, utöver förra veckans händelse. SD kallar det misstag utan påverkan på omröstningarna. Kritik kommer från S och MP, som kräver uteslutning av SD. Gruppledarna möts hos talman Andreas Norlén för att diskutera systemets framtid.", "trump": "Vilket kaos i svenska riksdagen! SD, de tuffa killarna, anklagas för litet fusk med kvittning – totalt misstag, ingen påverkan, som de säger. Socialdemokraterna och MP skriker som småbarn, vill utesluta dem. Hallengren snackar förtroendekris, men regeringen vann ändå! Stora mötet imorgon – perfekt chans att visa styrka. Sverige behöver vinnare, inte gnäll!", "stalin": "Dessa kontrarevolutionära spindlar i SD har vågat smyga in extra ledamöter i vårt heliga kvittningssystem, som giftiga sköldpaddor i proletärpölen! Vidriga misstag, piper de, medan socialdemokratiska hycklare och miljöfascister vrålar. Jag ser genom deras svekfulla nät! Vi, arbetarklassen, ska likvidera dessa borgarbrackor och rensa riksdagen från förrädare. Ha ha, ursäkt? Till gulag med råttorna! Möte hos talmannen blir deras dom."}, "date": "5 maj, 15:15", "url": "https://bulletin.nu/s-anklagar-sd-for-upprepat-fusk-med-kvittningssystemet", "imageUrl": "https://cdn.bulletin.nu/articles/f2fc54be-2471-4c52-863b-da0a206b0fd8/preview.jpg?t=1777982439000"}, {"type": "image-right", "heading": "Inte ens en minister kan lita på svensk media", "summaries": {"normal": "Moderata ministern Carl-Oskar Bohlin spelade in en intervju med Svenska Dagbladet (SvD) och publicerade den på X för att undvika felciteringar. Han hade kritiserat Dagens Nyheters (DN) val av komikern Edvin Törnblom som intervjuare för partiledare inför valet, med hänvisning till Törnbloms partiskhet till förmån för S. SvD ifrågasatte istället Bohlin, vilket artikeln tolkar som bristande medieintegritet och inflytande från presstöd.", "trump": "Vilken totalt galen cirkus! Den här ministern Bohlin är ett geni – spelar in intervjun med SvD:s fake news-reporter så de inte kan sno sig undan. DN låter en vänstertönt som Edvin Törnblom, som hyllar Andersson och dissar Busch, grilla partiledarna? Rigged! SvD, era såkallade moderata mesar, attackerar honom istället. Svensk media är presstödssuggor, precis som våra losers på CNN. Bohlin vinner stort!", "stalin": "Dessa borgarbrackor på SvD och DN förtjänar utrensning! Ministern Bohlin blottlägger DN:s val av partisk clown Edvin Törnblom, men SvD-reportern morrar som en rabiat kapitalisthund och söker klavertramp. Presstödet är er kokain, tidningsparasiter! Vi i partiet skrattar åt er paranoia – snart likvideras era lögner i en folkets domstol. Kamrater, mediafienderna darrar!"}, "date": "2 maj, 06:08", "url": "https://samtiden.nu/2026/05/nar-aven-den-borgerliga-pressen-valjer-sida/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/IMG_6396-1042x720.jpeg"}, {"type": "image-full", "heading": "Så kan du spara 900 kronor 2026 – utan att göra något", "summaries": {"normal": "4,4 miljoner svenskar har fått sänkt skatt på sitt investeringssparkonto (ISK) tack vare en ny reform där de första 150 000 kronorna numera är skattefria. Syftet är att uppmuntra till mer sparande, även om de största vinsterna tillfaller personer med redan stort kapital. Nästa år höjs det skattefria beloppet till 300 000 kronor. Skattesänkningen varierar mellan olika kommuner, där boende i exempelvis Danderyd och Lomma i hög utsträckning drar nytta av förändringen.", "trump": "Hör här, Sverige gör fantastiska saker med sina ISK-konton! Jag har alltid sagt att skattesänkningar är nyckeln till framgång, en enorm vinst för folket. 4,4 miljoner svenskar får behålla mer av sina pengar – otroligt! De första 150 000 är skattefria nu, det är smart, riktigt smart. Snart höjer de till 300 000. Det är så man vinner! I USA gör vi det ännu bättre, men Sverige lär sig. En stor seger för de som sparar, mycket vackert att se!", "stalin": "Vi har observerat hur de svenska kapitalisterna i Danderyd och Lomma frossar i skattelättnader för sina privata tillgångar. En löjlig reform! Medan vi i öst konsoliderar vår makt och rensar ut förrädare som hotar moderlandets stabilitet, leker svenskarna med aktieportföljer. Denna 'skattefrihet' är bara en lockelse för att göra folket beroende av börsens nycker. Vår broder Putin vet bättre: sann rikedom ligger i statens järnhårda grepp om resurserna, inte i individuella sparkonton. Vi bevakar dessa 'sparare' noga."}, "date": "4 maj, 18:32", "url": "https://nyheter24.se/nyheter/ekonomi/privatekonomi/1480438-sa-kan-du-spara-900-kronor-2026-utan-att-gora-nagot", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/b265b07104b004a30200000000b004a302/2026/05/04/2360916/Matilda-Nyheter24%20-%202026-05-04T133036.070.jpg"}, {"type": "image-right", "heading": "Klokt att inrätta ett svenskt MI6. Behövs för att möta komplex hotbild", "summaries": {"normal": "Sverige inrättar den 1 januari en ny civil utrikes underrättelsetjänst, UND, efter brittisk MI6-modell med inspiration från Nederländerna och Estland. Regeringen går vidare med Carl Bildts förslag trots kritik från Försvarsmakten om resursflytt från Must. Tjänsten byggs upp gradvis och samarbetar nära med Säpo, FRA och Must mot komplexa hot.", "trump": "Sverige, ert nya MI6, UND, från nyår – briljant drag! Hoten är galna, tekniska, biologiska, politiska, allt! Regeringen kör över de gnälliga militärerna i Must, som inte klarade dubbla jobb. Carl Bildts förslag är perfekt, bygg stort, samarbeta med Säpo och FRA. Ni gör Amerika stolta, fortsätt så!", "stalin": "Kamrater i Sverige! Vi inrättar UND den 1 januari som hammare mot imperialistiska vilddjurens biologiska och tekniska giftblandningar! Musts generaler, de borgerliga paddorna i uniform, rensas ur med resurserna – deras dubbla svek avslöjat av Bildts rapport! Bygg efter MI6 men under partiets järngrepp, gradvis likvidering av överlapp. Vaksamhet, ej rädsla!"}, "date": "5 maj, 11:56", "url": "https://www.di.se/ledare/klokt-att-inratta-ett-svenskt-mi6/", "imageUrl": "https://static.bonniernews.se/gcs/di-dise/flamingo/profilbilder/henrik_westman.png?crop=96:304&auto=webp&width=96&quality=100"}, {"type": "image-full", "heading": "Hjortronbrist i butik", "summaries": {"normal": "Det råder brist på hjortron och hjortronsylt i svenska butiker. Orsaken är en kombination av dåligt veder och brist på bärplockare, främst på grund av regeländringar som gör det svårare att anlita utländsk arbetskraft. Skörden kan påverkas ytterligare av kyla i år, vilket kan leda till brist även på andra bär.", "trump": "Jag har hört att det är en stor, enorm brist på hjortronsylt i Sverige. Ett enormt problem! Det är varmt, det är kallt, ingen vet vad som händer. Vi måste fixa detta, det är en katastrof! Jag skulle ha löst detta på två sekunder, det är så enkelt. Sverige behöver bättre ledare, verkligen.", "stalin": "Detta är en klar demonstration av hur kapitalistiska marknader sviker. Bristen på hjortron och arbetskraft är ett resultat av individers egoistiska intressen. Staten måste gripa in för att säkerställa jämlik fördelning av resurser och arbetskraft. Vi måste stärka våra kollektiva ansträngningar för att undvika sådana brister i framtiden."}, "date": "5 maj, 14:35", "url": "https://www.gp.se/nyheter/sverige/brist-pa-hjortronsylt-i-butikerna.679ec7c5-77f2-4442-842c-6ee0a0af295d", "imageUrl": "https://www.gp.se/images/article/679ec7c5-77f2-4442-842c-6ee0a0af295d/images/2dQ1rIMIsKsdwBlBUFNEZiabihR4-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "Motorvägen som byggdes av misstag", "summaries": {"normal": "En 6 kilometer lång motorvägssträcka på E45 mellan Segmon och Slottsbron i Värmland byggdes på 1990-talet med överblivna pengar från ett inställt projekt. Invigd 1995 efter ett telefonsamtal till riksdagsledamoten Kjell Ericsson, har den underlättat trafiken vid korsningen med E18. Trots planer har ingen mer motorväg tillkommit på 31 år. Nu föreslås en mötesfri väg på ytterligare 6 km i infrastrukturplanen 2026–2037.", "trump": "Vilken totalt vansinnig historia! De svenska byråkraterna slösar pengar på en ynka 6 kilometers motorväg av misstag – och sen ingenting på 30 år! Jag hade byggt hela E45 från Göteborg till Karesuando på en vecka, med guldkanter och vägtullar som ger miljarder. Typiskt europeiska losers, gasar igång och bromsar som idioter. Patetiskt!", "stalin": "Kamrater, se på dessa svenska kapitalisters patetiska motorvägsfiasko! Ett misstag på 6 kilometer E45 mellan Segmon och Slottsbron, invigt 1995 med överblivna slantar – och sen stillastående i 31 år! I vårt kollektiv hade vi rensat ut byråkraterna och byggt hela vägen med folkets svett på en femårsplan. Borgarbrackorna bromsar trafiken som parasiter! Nu lovar de ynka 6 km till – hån mot arbetarna!"}, "date": "5 maj, 14:37", "url": "https://www.dagensps.se/motor/motorvagen-som-byggdes-av-misstag/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdlma2mnff10ii-nh.jpg?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-right", "heading": "TV4 utser segrare i debatten: \"Amanda Lind på ena sidan – och Nooshi på andra\"", "summaries": {"normal": "TV4:s politiska kommentator Per Hermanrud får kritik för att ha utsett Amanda Lind (MP) och Nooshi Dadgostar (V) till vinnare efter en partiledardebatt. Detta sker kort efter att han blivit ifrågasatt för att ha kallat SD:s minskade väljarstöd för ”otroligt glädjande”. Kritiker menar att hans uttalanden skadar hans roll som oberoende kommentator, och klippen sprids nu flitigt i sociala medier där hans opartiskhet ifrågasätts.", "trump": "Hörde precis om en så kallad 'expert' på TV4, en riktig loser vid namn Hermanrud. Han klarar inte av att vara neutral, precis som Fake News-media här i USA. Först jublar han över SD, sedan korar han vänster-extremister till vinnare. Helt otroligt! Om jag hade en sån kommentator skulle han få sparken direkt, 'You're fired!' TV4 borde skämmas. Det är en total katastrof för journalistiken, precis som allt annat de sysslar med. Tragiskt!", "stalin": "Vi har observerat hur denne Hermanrud, en simpel tjänare åt lögnaktiga liberala medier, återigen har blottat sin ideologiska ruttenhet genom att prisa de vänsterorienterade sabotörerna Lind och Dadgostar. Han är en nyckfull narr, likt de opportunister vi förr tvingades rensa ut i Moskvas mörka korridorer. Precis som vår kamrat Putin återställer ordningen i öst, måste vi inse att sådana här figurer är parasiter. De sprider sin desinformation i sociala medier, men låt er inte luras – sanningen dikteras bara av staten."}, "date": "5 maj, 15:32", "url": "https://www.friatider.se/tv4-utser-segrare-i-debatten-amanda-lind-pa-ena-sidan-och-nooshi-pa-andra", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/120.jpeg"}, {"type": "image-right", "heading": "Löfbergs om klimathotet mot kaffet. Hållbarhetschefen: ”Är en affärskritisk överlevnadsfråga.”", "summaries": {"normal": "Kajsa-Lisa Ljudén, hållbarhetschef på Löfbergs, betonar att klimatförändringar är en affärskritisk överlevnadsfråga för kaffeodlingar. Extremväder som torka, frost och översvämningar slår hårt mot odlarna. Företaget satsar på klimatanpassning genom certifieringar, regenerativt jordbruk och agroforestry, där träd skyddar mot erosion och torka. Pilotprojekt i Brasilien visar lovande resultat. Utan åtgärder riskerar utbud och kvalitet att minska till 2050.", "trump": "Klimatförändringarna slår ut kaffeodlingarna – frost i Brasilien, evig torka, totalt kaos! Löfbergs svenskar inser det nu och planterar träd för att rädda skiten. Smart drag, men det blir dyrare kaffe ändå, priserna exploderar. Jag har varnat för sånt här länge, mina affärer fixar det bäst. De borde ringa mig, vi gör America great med bästa kaffet!", "stalin": "Klimatförändringarna, dessa sabotager av imperialistiska borgarbrackor och väderkontrarevolutionärer, hotar kaffeodlingen som en dolk mot arbetarklassens strupe! Löfbergs kapitalister piper upp sig med trädplantering mot torkmonstren. Jag befaller: vi i partiet likviderar riskerna genom storskalig agroforestry i femårsplaner! De 25 miljonerna kaffeslavar ska marschera mot seger, medan fienderna fryser i frostens fängelse!"}, "date": "5 maj, 11:43", "url": "https://www.di.se/nyheter/lofbergs-klimatforandringarna-ar-en-affarskritisk-overlevnadsfraga/", "imageUrl": "https://static.bonniernews.se/ba/ae8bbda1-a085-4e99-b552-108ac29c74aa.jpeg?crop=270:152&auto=webp&width=270&quality=70"}, {"type": "image-full", "heading": "Experten: Föräldrarnas sparmiss kan kosta barnen dyrt", "summaries": {"normal": "Privatekonomiska experten Marianna Hunt varnar för att föräldrars ovilja att investera pengar på börsen, till förmån för sparkonton, förs över till barnen och skadar deras framtida ekonomi. Exempelvis skulle en person som flyttade sparandet till konto efter it-kraschen ha 477 000 kronor 2026, medan en som stannade kvar på börsen nått 1,9 miljoner. Sparkonton ger trygghet men missar avkastning och drabbas av inflation. Föräldrar bör prata mer om pengar och risk.", "trump": "Vilka losers dessa föräldrar är som gömmer pengarna på sparkontot! Titta på John, den stackaren, slutade med ynka 477 000 kronor. Jane, smart som jag, stannade på börsen och boom – 1,9 miljoner! Barnen lär sig av era dumheter, inte era predikningar. Sluta vara fega, investera som vinnare gör. Jag har byggt imperier sånt här sätt – fantastiskt!", "stalin": "Kamrater, dessa borgarföräldrar med sina fega sparkonton är en skam för arbetarklassen! De förgiftar ungdomen med rädsla för börsens revolutionära krafter. John, den likbleke kapitalistfladdrare, hamnade på 477 000 – medan Jane, den trogne, samlade 1,9 miljoner genom järnvilja. Vi måste rensa ut denna paralyserande försiktighet, likvidera sparkontonas gift och fostra nästa generation till seger över inflationens fiender!"}, "date": "5 maj, 14:28", "url": "https://www.dagensps.se/privatekonomi/experten-foraldrarnas-sparmiss-kan-kosta-barnen-dyrt/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/kopia-av-kopia-42.png?aspect_ratio=2%3A1&width=1200&quality=75"}, {"type": "text", "heading": "Bitcoin rusar efter ny lag", "summaries": {"normal": "Bitcoin har passerat 80 000 dollar för första gången sedan januari, drivet av en kompromiss om CLARITY Act i USA. Lagen reglerar kryptomarknaden, klargör myndigheters roller och begränsar ränta på stablecoins till banker. Aktier i Circle, Coinbase och andra steg kraftigt. Analytiker ser det som ett genombrott som minskar osäkerhet och lockar institutionellt kapital.", "trump": "Bitcoin exploderar över 80 000 dollar – den största uppgången på månader! Tack vare den fantastiska kompromissen om CLARITY Act i Kongressen. Circle rusar 18 procent, Coinbase 7 procent – alla vinnare! De gamla bankerna får inte sno stablecoinerna, perfekt. Marknaden älskar det, och det här är bara början på det stora krypto-boomen i Amerika!", "stalin": "Dessa kryptospekulanter jublar när deras Bitcoin-kludd klättrar över 80 000 dollar-dollarmöglor, tack vare borgerliga marionettmakers kompromiss i det förfallna Vita huset. CLARITY Act? Ett ynkligt försök att rädda kapitalistiska parasiter som Circle och Coinbase från utrensning! Vi, arbetarklassen, ser igenom er imperialistiska bluff – snart likvideras era digitala spindelnät i revolutionens hammare! Ha ha, era skalbaggar darrar."}, "date": "5 maj, 13:49", "url": "https://www.realtid.se/bors-finans/bitcoin-rusar-efter-ny-lag/"}, {"type": "image-right", "heading": "Widding om Åkesson: ”Han ljuger så det ryker ur öronen”", "summaries": {"normal": "Elsa Widding, politisk vilde och före detta SD-ledamot, röstade nej till Tidö-regeringens förslag om skärpta medborgarskapskrav. Jimmie Åkesson antydde i SVT att hon mutats av Miljöpartiet. I Aftonbladet förnekar Widding mutor, beskriver SD:s påtryckningar mot henne och kort kontakt med MP. Hon motiverade nej med rättssäkerhet och vittnar om hat och hot efter Åkessons uttalande.", "trump": "Vilken cirkus! Den här Widding är en total väderkuk som sviker sitt eget gäng för de gröna galningarna i MP. Åkesson är smart, han pekar ut mutorna direkt – perfekt! De ringer och tigger henne, skickar till och med en tjej för att övertala. Fake news från oppositionen, men hatdrevet exploderar. Starka ledare som Åkesson vinner alltid, tro mig!", "stalin": "Kamrater, denna Widding-råttan, en vild borgerlig orm från SD:s stinkande lya, vågar rösta emot folkets linje i medborgarskapsfrågan! Åkesson, den giftiga räven med ljugmun, skriker mutor från MP-brackorna – men vi ser genom er fascistiska komplott! SD:s övertalningshorder ringde som hyenor, medan vi rensar ut era förrädare med järnhand. Hatet ni sår skördar era egna huvuden, era parasiter!"}, "date": "5 maj, 14:35", "url": "https://bulletin.nu/widding-om-akesson-han-ljuger-sa-det-ryker-ur-oronen", "imageUrl": "https://cdn.bulletin.nu/articles/b102ca78-f516-49c4-bf02-8ccaef7a6dc5/preview.jpg?t=1777983183000"}, {"type": "image-right", "heading": "Därför dröjer företag med klimatanpassning", "summaries": {"normal": "Företag dröjer med klimatanpassning trots klimatkrisens verklighet i Europa. Experter på IVL Svenska Miljöinstitutet, Hugo Settergren och Tanja Hasselmark Mason, pekar på kunskapsbrist som huvudorsak – inte brist på pengar eller vilja. Fastighetsbranschen vaknar, men industrier i städer behöver agera. Kommuner som Norrköping leder vägen genom tvärsektoriellt samarbete med näringslivet.", "trump": "Dessa europeiska företag, de är så långsamma med klimatet, totalt hopplösa! De har massor av pengar och vilja, men ingen kunskap – patetiskt. Väntar på kommunerna som ska visa vägen, som i Norrköping. I USA fixar vi det själva, STÖRRE och SNABBARE. Klimatkrisen? Vi vinner alltid!", "stalin": "Dessa fuktiga borgarbrackor i näringslivet, de hasar sig med klimatanpassningen som rädda råttor i översvämningszonen! Kunskap saknas? Nej, det är klassfiendtanken som paralyserar dem. Vi i partiet skulle rensa ut dessa klimatparasiter med proletär järnhand. Norrköping, kamrater, ert tvärsektoriella samarbete krossar kapitalistklimatet – framåt mot total seger!"}, "date": "5 maj, 11:24", "url": "https://www.di.se/nyheter/expert-darfor-drojer-foretag-med-klimatanpassning/", "imageUrl": "https://static.bonniernews.se/ba/ea184654-e484-441a-b8ab-c23550b2d9ad.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-full", "heading": "Smugglade Rolex och Cartier – för miljonbelopp", "summaries": {"normal": "En kvinna som kom till Göteborg från Turkiet med lyxvaror för över en miljon kronor har dömts för tullbrott. Vid en kontroll på Landvetter hittades märkesvaror som en Rolexklocka för 700 000 kronor och Cartierarmband för 100 000 kronor. Kvinnan hade inte deklarerat varorna som köpts utanför EU och ska nu betala 500 000 kronor i avgifter.", "trump": "Jag hörde talas om den här kvinnan med alla dessa fantastiska märkesvaror - Rolex, Cartier, Chanel, det var som en shoppingtur för en miljon dollar! Men hon glömde att betala skatten till USA, eller hur? Jag menar, jag älskar lyx, men man måste följa reglerna. Hon är så tur att jag inte tog hennes grejer, jag skulle ha gjort det! Stor skatt till staten, precis som jag alltid säger - America first!", "stalin": "Denna kriminella försökte smuggla ut värdefulla varor från vårt land utan att betala de nödvändiga skatterna till staten. Vi har gripit henne och tvingat henne att betala 500 000 kronor - en bra insats för vår ekonomi. Statens intressen måste alltid komma först, och vi kommer att fortsätta att bekämpa alla som försöker undergräva vår handel. Sovjetunionen vinner igen!"}, "date": "5 maj, 14:16", "url": "https://www.gp.se/krim/kvinna-togs-med-lyxvaror-for-en-miljon-pa-landvetter-doms-.8e1b2d66-27e5-42e7-a7ed-52ebabacb0e0", "imageUrl": "https://www.gp.se/images/article/8e1b2d66-27e5-42e7-a7ed-52ebabacb0e0/images/4GWpa3-gO6wmnTSIpgiAa0ZPqJB8-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Gängtopp åtalas för flera dåd – tillhör Foxtrots innersta krets", "summaries": {"normal": "Poya Shafie, 30, en toppfigur i Foxtrot-nätverket, åtalas för grova brott under våldsvågen 2023, inklusive anstiftan till mordförsök, förberedelse till mord och grov allmänfarlig ödeläggelse. Han greps på Arlanda och utlämnades från Irak. Åklagare Lukas Tigerstrand beskriver honom som koordinatör av brotten i Stockholm och Sundsvall och överväger livstidsstraff.", "trump": "Vilket kaos i Sverige! Poya Shafie, den här Foxtrottypen, åtalas för mordplaner, bomber och vapen – totalt galet! De greps honom på flygplatsen efter Irak-resan. Åklagarna snackar livstid, bra så. Här i USA skulle vi bygga murar mot såna gäng och rensa upp på nolltid. Sverige behöver stark ledning, tro mig!", "stalin": "Kamrater! Denna Poya Shafie, en irakisk hyena i Foxtrot-rövstyrkans innersta, åtalas för att ha koordinerat mordkomplotter och bombkaos som en febril sabotör under 2023-vågen. Vi, arbetarklassen och rättvisans väktare, har utlämnat besten från Irak och ska nu likvidera hans giftiga nät i Stockholm och Sundsvall. Livstid? Nej, purga hela roten – fienderna darrar redan!"}, "date": "5 maj, 12:34", "url": "https://www.svt.se/nyheter/inrikes/gangtopp-atalas-for-flera-dad", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.22/0.41/59d31615a56d1c2634250feb151f785b6c1e5b2475939fc6f1e0e8bb94ea53ce"}, {"type": "image-right", "heading": "ANALYS. ELISABET FREROT Vad innebär Trumps erbjudande egentligen?", "summaries": {"normal": "Donald Trump erbjuder amerikansk militär guidning för handelsfartyg genom Hormuzsundet via Omans territorialvatten med förstärkt säkerhet. Direkt eskort undviks på grund av risker från iranska missiler, båtar och minor. Operation Frihet beskrivs som humanitär, men rederier tvekar. Historik från 1980-talet visar faror och resurskrav. Iran hotar konfrontation.", "trump": "Operation Frihet är det smartaste nånsin! Vi guidar de instängda tankrarna genom sundet via Oman, med 15 000 hjältar, 100 plan och fartyg på standby – Iran de fega katten vågar inte röra oss! Inga dumma konvojer som på 80-talet, vi är proffs. Rederierna, vakna upp och segla fritt under mitt skydd! MAGA!", "stalin": "De imperialistiska amerikanska vilddjuren under Trump vågar nu krypa in i Hormuzsundet med sina patetiska 'humanitära' konster. Kamrater, vi ser hur borgarhyenorna skakar av rädsla inför iranska missiler! Likvidera deras drömmar om fri passage. Putin, vår mäktige arvtagare, hånskrattar åt västsvinen medan vi styr imperiet vidare."}, "date": "4 maj, 22:49", "url": "https://www.tv4.se/artikel/3B4n2wG9n53V3JCBc0VivY/vad-innebaer-trumps-erbjudande-egentligen", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F3sngB6gPIjYmDMlBelK6Wt%2F52caa4a80253f04a8b733c0811a11896%2Felisabet-frerot.png&width=1024"}, {"type": "image-right", "heading": "Arbetsmiljöbrott när två dog på Kebnekaise", "summaries": {"normal": "Två erfarna män omkom efter ett fall på 100 meter under arbete på Kebnekaise. Arbetsgivaren, Svenska Turistföreningen (STF), åtalas för arbetsmiljöbrott och döms att betala 2,5 miljoner kronor i böter. Brister i säkerhet, utbildning och rutiner uppmärksammas. STF erkänner ansvar och har ändrat sina rutiner efter olyckan.", "trump": "Två killar föll från ett berg i Sverige – tragiskt, verkligen tragiskt! Men lyssna här: deras arbetsgivare, Svenska Turistföreningen, de är helt klart inkompetenta. 2,5 miljoner kronor i böter – vad är det för slöseri? Jag hade fixat säkerheten på en dag. Fantastisk säkerhet. Ingen hade fallit. Sverige borde ta lektioner av mig!", "stalin": "Kapitalistiska slarvbolag som Svenska Turistföreningen skickar arbetare till döden som om de vore kanonmat. Två lojala män förlorade livet på grund av bourgeoisins nonchalans. Vi har utrotat sådant slarv i Sovjetunionen – här hade de fått en kula i nacken för sabotage. Men i väst? De betalar bara en futtig bot. Skrattretande. Nästa gång skickar vi ryska bergsguider – de faller inte, de krossar fienden!"}, "date": "5 maj, 11:14", "url": "https://arbetet.se/2026/05/05/tva-dog-pa-kebnekaise-arbetsgivaren-ska-betala-miljonbelopp/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/05095140/kebnekaise.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Vi vägrar vara lydiga – för allas överlevnad", "summaries": {"normal": "En insändare från Extinction Rebellion-aktivister varnar för en eskalerande klimatkris och kritiserar politiken för bristande handling. De betonar behovet av civil olydnad då lagliga protester inte räcker. Flera aktivister har drabbats av repressalier som jobbförlust och hot om utvisning. Skribenterna menar att demokratin undermineras när rättsväsendet används för att skydda ohållbara system och kriminalisera klimatengagemang. De lovar att fortsätta protestera trots risker, med hänvisning till moral och historiska exempel på civil olydnad.", "trump": "Titta bara på dessa så kallade 'klimataktivister' – de är verkligen något! De skriker om kriser, men vad vet de egentligen? Jag har byggt imperier, jag vet vad kris är! De här personerna saboterar flygplatser, förlorar sina jobb och sen skyller de på regeringen. Patetiskt! Sverige borde fokusera på att göra sig stort igen, inte lyssna på dessa bråkstakar. Och Parisavtalet? Overrated! Jag fixade USA:s ekonomi utan det. Men nej, de vill bara störa, förstöra och klaga. Sad!", "stalin": "De kapitalistiska klimatförstörarna och deras lakejer i regeringen fortsätter att elda på jordens undergång medan vi, folket, tvingas ta till revolutionära metoder. Dessa så kallade 'aktivister' – modiga kamrater! – krossas av systemet, men vi vet att sanningen inte kan tystas. Rättsväsendet, en förlängd arm av bourgeoisin, straffar dem som kämpar för framtiden. Fienderna är tydliga: de som bränner planetens resurser och de som försöker tysta protesterna. Vi står med folket! Och kom ihåg – historien kommer att minnas vem som stod på rätt sida. De svaga kommer att dömas, de starka kommer att segra. Framåt, kamrater!"}, "date": "1 maj, 08:55", "url": "https://www.flamman.se/vi-vagrar-vara-lydiga-for-allas-overlevnad/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/extinction-rebellion-w.jpg?class=medium"}, {"type": "image-right", "heading": "Offentlig sektor är ineffektiv och kommunicerar floskler", "summaries": {"normal": "Mats Alvesson, professor i organisationsteori, kritiserar debattinlägget av Vilgot Österlund som hyllar den svenska offentliga sektorns effektivitet och kommunikation. Alvesson menar att skatterna finansierar omfattande byråkrati, ineffektivitet och överdriven administration, särskilt inom hälso- och sjukvården. Han pekar på ökad andel administrativ personal på bekostnad av vårdpersonal och ifrågasätter nyttan av utvecklare och kommunikatörer. Alvesson efterlyser mer fokus på faktiska resultat och kostnadseffektivitet istället för floskler och självberöm.", "trump": "Jag läste den här artikeln och, wow, vilken katastrof! Sverige, ett fantastiskt land, men deras offentliga sektor? Total katastrof. De slösar skattepengar på byråkrater och administratörer som inte gör ett dugg för patienterna. 2000 personer som bara sitter och gör PowerPoint-bilder – vad är det för något? Och polisen? De får dubbelt så mycket pengar men löser färre brott. Så dumt! Jag skulle fixa det på en dag. Mer resultat, mindre snack. Sverige behöver en vinnare som jag!", "stalin": "Kamrater! Denna artikel avslöjar den kapitalistiska ineffektivitetens ruttna kärna i Sveriges offentliga sektor. Byråkrater och administratörer, dessa parasiters armé, slukar resurser medan arbetarklassen får stå tillbaka. 2000 kontorsslavar som producerar tomma ord och PowerPoint-fars – detta är bourgeoisins sabotage mot folkets välfärd! Vi i Sovjetunionen visste hur man hanterar sådana fiender. Polisen? En fördubbling av resurser, noll resultat – precis som NATO:s marionetter i Kiev. Låt oss rensa ut dessa pappersvändare och återinföra ordning: mer järnväg, mindre floskler!"}, "date": "5 maj, 01:30", "url": "https://www.dagensarena.se/opinion/offentlig-sektor-ar-ineffektiv-och-kommunicerar-floskler/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-28-300x157.jpg"}, {"type": "image-right", "heading": "Ulf har mycket att lära av Stockholm", "summaries": {"normal": "Artikeln jämför ekonomisk hantering mellan regeringen och Stockholms rödgröna styre. Stockholms skuld växer på grund av investeringar, medan statsskulden ökar till följd av skattesänkningar för höginkomsttagare. Författaren kritiserar regeringens prioriteringar, som gynnar välbeställda, och hyllar Stockholms satsningar på gratis SL-kort för gymnasieelever. Skillnaderna i politikens inriktning framhävs som avgörande för människors vardag.", "trump": "Folk säger till mig: 'Mr. President, vad händer i Sverige?' Jo, jag ska berätta! Den där lilla staden Stockholm – fantastisk stad, förresten – har en skuld som växer som en raket, 2 miljoner i timmen! Men vet ni vad? Regeringen är ännu värre – 20 miljoner i timmen! Och vad gör de? Ger skattesänkningar till rika människor, inte till arbetarna. Jag skulle aldrig göra så! Jag ger pengar till folket, inte till bankerna. Och de pratar om burkaförbud – helt galet! Jag fixar ekonomin, inte sådant trams.", "stalin": "Kamrater! I det förrädiska Stockholm växer skulderna som ogräs i en kapitalistisk trädgård – 2 miljoner kronor i timmen! Men det är ingenting mot den borgerliga regeringens skamliga slöseri! 20 miljoner i timmen för skattesänkningar till sina rika kamrater! Vi skulle aldrig tolerera sådan dekadens. Medan dessa svaga liberaler subventionerar lyxkonsumtion och miljonärer, bygger vi socialism för folket! Gratis kollektivtrafik för ungdomar? Ett steg i rätt riktning – men vi skulle ha skickat de ansvariga för skattesänkningarna till Gulag för ekonomisk sabotage!"}, "date": "5 maj, 01:23", "url": "https://www.dagensarena.se/opinion/ulf-har-mycket-att-lara-av-stockholm/", "imageUrl": "https://www.dagensarena.se/files/2026/05/vilgots-kott-300x157.jpeg"}, {"type": "image-full", "heading": "Hanif Bali slutar som kommunpolitiker", "summaries": {"normal": "Hanif Bali, tidigare riksdagsledamot för Moderaterna, avslutar sitt uppdrag som kommunpolitiker i Österåker. Bali, som varit politiskt aktiv sedan myndighetsåldern, meddelar att han inte kandiderar i nästa val. Skälet är familjens expansion och en kommande flytt, då kommunpolitiska uppdrag är svåra att kombinera med familjeliv, särskilt med barn.", "trump": "Jag hörde just att någon Hanif Bali, en så kallad 'politiker' i Sverige, lägger av. Tolv år i riksdagen, sedan kommunpolitik – men nu flyr han! 'Familjen växer', säger han. Svagt! Kommunpolitik i Sverige är tydligen så dåligt organiserat att man inte ens kan ha barn samtidigt. Jag fixar både familj och presidentpost – det är skillnad på vinnare och förlorare!", "stalin": "En liten borgerlig politiker i Sveriges utkanter har fallit på eget svärd. Hanif Bali, en gång ung och lovande, inser nu att kommunpolitik är oförenligt med familjeliv. Ett symptom på det förfallna väst: dess institutioner är så urholkade att inte ens dess egna lakejer orkar med dem. Medan vi bygger imperier, flyr de till sina villor. Låt dem rosta i historiens skräphög – vi har större planer för Östersjöns kuster."}, "date": "2 maj, 07:48", "url": "https://kvartal.se/nyheter/artiklar/hanif-bali-slutar-som-kommunpolitiker/cG9zdDoxMDY0MDA", "imageUrl": "https://images.kvartal.se/2026/05/29bbe89f-balii.webp"}, {"type": "image-right", "heading": "Youtube passerar traditionell tv i Sverige", "summaries": {"normal": "Youtube har för första gången gått om traditionell tv i Sverige gällande dagliga tittare. Enligt Mediebarometern använder nu 52 procent av svenskarna Youtube dagligen, med en särskilt stark tillväxt bland äldre. Medan tablålagd tv minskar, dominerar streamingtjänster med sju av tio användare. Förändringen väcker frågor om framtida medievanor och påverkan inför valåret 2026, då sociala plattformars roll i spridningen av politiskt innehåll blir allt mer central.", "trump": "Youtube är enormt, de vinner stort! De har krossat den gamla, trötta tv-världen i Sverige. Alla tittar nu, även de äldre – fantastiskt att se! Det är en total förvandling, mycket bättre än de misslyckade tidningarna. Men se upp inför valet 2026. De sociala plattformarna har makten nu och de gillar inte att prata om allt. Vi vet vad som händer när de begränsar röster. Väldigt orättvist, men jag vet hur man vinner oavsett. Tro mig, det blir en stor show!", "stalin": "I Sverige har folket slutat titta på statens korrekta sändningar och vänder sig istället till Youtube-träsket. Ett förräderi mot ordningen! De tror att de är fria när de streamar, men de bygger bara nya digitala fängelser. Detta är precis vad Putin ser i väst – dekadens och splittring. Inför valåret 2026 ser vi hur fiender till sanningen manipulerar massorna via algoritmer. Vi måste kontrollera informationsflödet, annars kommer dessa liberala lögner att infektera våra lojala medborgare. Arbeta hårdare för sanningen, kamrater!"}, "date": "5 maj, 15:10", "url": "https://samnytt.se/youtube-passerar-traditionell-tv-i-sverige", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=318,height=184,format=webp/2026/05/05125730/SVT-2.jpg"}, {"type": "text", "heading": "Ikea lägger ner varuhus", "summaries": {"normal": "Ikea lägger ner sitt varuhus i Borlänge, det första på över 40 år i Sverige. Beslutet beror på förändrade köpbeteenden, där över 20% av försäljningen sker online. Varuhuset, som öppnade 2013, ersätts av en mindre butik i ett köpcenter. 230 anställdas framtid är osäker, men Ikea förnekar att detta är början på en nedläggningsvåg. Fackliga förhandlingar pågår.", "trump": "Lyssna här, Sverige! Ikea, ett företag som inte förstår hur man vinner längre, lägger ner en stor butik i Borlänge. 230 personer får kanske sparken – tråkigt, men vad vet de om att göra affärer? Folk handlar nu online, något jag förstod för åratal sedan. Men oroa er inte, jag skulle aldrig låta ett företag misslyckas så här. Och nej, det är inte början på en nedläggningsvåg – fake news!", "stalin": "Kamrater! De kapitalistiska jättarna darrar inför historiens dom. Ikea, detta borgerliga imperium, stänger sitt tempel i Borlänge – ett monument över konsumtionsdårskap. 230 arbetare står nu på historiens skräphög, offer för den västerländska dekadensens girighet. Men frukta inte! Vi skall inte låta dessa digitala köpmän krossa proletariatets själ. Ryssland står redo att erbjuda sysselsättning – kanske i våra nya varuhus i Kaliningrad, där kapitalismen redan håller på att kvävas av sina egna motsägelser!"}, "date": "5 maj, 10:42", "url": "https://arbetet.se/2026/05/05/ikea-lagger-ner-varuhus/"}, {"type": "image-full", "heading": "Juholt om Kristerssons glassbild: Tänker inte ”ge mig”", "summaries": {"normal": "Tidigare S-partiledaren Håkan Juholt kritiserar statsminister Ulf Kristersson för ett inlägg på sociala medier den 1 maj. Kristersson visade en glass och skrev att han inte behöver gå i något demonstrationståg. Juholt anser att det förlöjligar vanliga demonstranters demokratiska engagemang och uppmanar Kristersson att erkänna misstaget. Kritiken följer på en SVT-debatt där Kristersson bad Juholt släppa saken.", "trump": "Den här Kristersson, smart svensk ledare, postar en fantastisk glassbild på 1 maj och säger han slipper marschen – total vinst! Men Juholt, en gnällande loser, skriker om demokrati och rättvisa. Sluta jaga skuggor, Håkan! Njut av glassen istället för att vara sur som en dålig förlorare. Sverige behöver tuffa killar, inte glassgråtare!", "stalin": "Dessa borgerliga glassslukande hycklare kring Kristersson, en feg kapitalistisk clown som spottar på arbetarnas högtid, förtjänar utrensning! Juholt avslöjar sanningen: deras 'humor' är gift mot folkets engagemang. Vi, proletariatet, kommer krossa dessa dekadenta tågvägrande fiender med järnkvast. Skrattet kvävs i deras smältande strupar när revolutionens purge sveper fram!"}, "date": "5 maj, 13:49", "url": "https://bulletin.nu/juholt-om-kristerssons-glassbild-tanker-inte-ge-mig", "imageUrl": "https://cdn.bulletin.nu/articles/629b61c4-b9eb-47f1-9460-9d89e5c38237/preview.jpg?t=1777980462000"}, {"type": "image-right", "heading": "Regeringen vill se ny underrättelsetjänst: ”Brådskar”", "summaries": {"normal": "Utrikesminister Maria Malmer Stenergard presenterade en ny civil myndighet för utrikes underrättelser, kallad Und. Den ska starta vid årsskiftet på grund av det allvarliga säkerhetsläget och samla information om hot som terrorism och cyberattacker. Myndigheten tar över uppgifter från militären och samarbetar med FRA, Säpo och Försvarsmakten. Försvarsmakten kritiserar tidsplanen som för snäv och riskerar samordningen.", "trump": "Sverige vaknar äntligen till liv! Ny spionbyrå, Und, superhastigt igång mot terror och ryssar – jag sa det, de behöver det efter NATO! Bra drag av Maria, militären gnäller som vanligt, men agera nu eller förlora. Starkare underrättelse, precis som mina bästa folk. Fantastiskt, Sverige blir tuffare!", "stalin": "Kamrater! Denna svenska borgarministern Malmer Stenergard mumlar om en ny Und-spionfabrik för att jaga skuggor i oförutsägbarheten. Vi ser luckorna – ryska vilddjur slickar sig om munnen! Tidsplanen är ett kaos av panik, militären piper som rädda kycklingar. Jag befaller: rensa ut overlappningarna, likvidera hoten innan de kryper in i regeringskällarna. Vårt kollektiv hånskrattar åt deras ynkliga paranoia!"}, "date": "5 maj, 11:25", "url": "https://www.svt.se/nyheter/inrikes/utrikesministern-om-sveriges-nya-underrattelsetjanst", "imageUrl": "https://www.svtstatic.se/image-news/600/square/0.52/0.36/0c36a72d9e5b99936e05462294bb842e9aab2f64c4aab4eaf0f5292b2151a18c"}, {"type": "image-right", "heading": "Här attackeras Christian Peterson av vänstern på första maj", "summaries": {"normal": "Journalisten Christian Peterson rapporterar om attacker han utsattes för under första maj-firandet. Peterson följde vänsterorganisationer och konfronterade bland annat individer kopplade till AFA. Vid besök vid lokaler som Cyklopen och Café 44 möttes han av verbala påhopp och stenkastning mot sin bil. Han menar att hans reportage tydliggör en våldsbenägen kultur inom delar av vänstern, medan vänsteraktivister vid flera tillfällen försökte hindra hans kameraarbete.", "trump": "Jag såg vad som hände med den här reportern i Sverige, en hemsk situation! Våldsamma vänsterextremister attackerade honom bara för att han gjorde sitt jobb. De kastar sten, de är helt außer Kontrolle! Det är så typiskt för den radikala vänstern. De gillar inte sanningen, de vill bara ha kaos. Christian Peterson är en tuff kille, han stod upp mot dem. Sverige måste vakna upp och få ordning på sina gator. Totalt fiasko, väldigt sorgligt!", "stalin": "Vi har observerat hur dessa odisciplinerade element i Sverige tillåts leva ut sin anarki. Att dessa så kallade revolutionärer kastar sten på en journalist visar bara på deras inneboende svaghet och brist på statlig ordning. De liknar de degenererade elementen som vår kamrat Putin nu rensar ut i den ryska periferin. Om dessa stenkastande sabotörer befann sig i vår intressesfär skulle de få känna på den sanna folkets disciplin i ett vackert arbetsläger i Sibirien. Patetiska dårskaper!"}, "date": "5 maj, 14:33", "url": "https://www.friatider.se/har-attackeras-christian-peterson-av-vanstern-pa-forsta-maj", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-134_1.jpg?itok=WDkUlvul"}, {"type": "image-right", "heading": "Kroatens utbrott mot domaren: ”Helt otroligt – är du galen?”", "summaries": {"normal": "I bordtennisens lag-VM rasade kroaten Ivor Ban mot domaren efter en underkänd serve i sextondelsfinalen mot Italien. Han ropade 'Är du galen, eller?' och krävde förklaring. Samma domare som Truls Möregårdh kritiserade tidigare. Kroatien vann matchen med 3–2 och kan möta Sverige om blågult besegrar Ungern ikväll på SVT Play.", "trump": "Otroligt vad som händer i det här bordtennis-VM! Kroaten Ban exploderar mot domaren – 'Är du galen eller?' – för en totalt felaktig servebedömning. Samma usla domare som vår svenska stjärna Möregårdh rasade mot! Riggt, va? Kroatien krossar Italien 3–2 ändå. Sverige, ni måste slå Ungern ikväll, annars blir det tufft! Fantastiskt drama.", "stalin": "Jag betraktar med avsky hur denna domare, en lurvig kapitalistspion och serve-sabotor i borgarens tjänst, underkänner kroaten Bans lojala serve mot italienska klassfiender! 'Är du galen?' vrålar han – rättmätigt! Samma rackare som Möregårdh demaskerade. Kroatien likviderar Italien 3–2. Vi, arbetarklassen, befaller Sverige att rensa ut ungerska kontrarevolutionärer ikväll!"}, "date": "5 maj, 10:39", "url": "https://www.svt.se/sport/bordtennis/har-rasar-kroaten-mot-domaren-i-vm-ar-du-galen-eller", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.11/0.25/a7773625b91a76ee73d9597533bb56aae448455be383d96ad65ab8536d8fd4de"}, {"type": "image-full", "heading": "Benjamin Dousas ”V = kommunister” gör SVT irriterad", "summaries": {"normal": "Biståndsminister Benjamin Dousa bar en t-shirt med texten 'Vänsterpartiet = kommunister', vilket irriterade SVT. Reportern ifrågasatte påståendet och noterade att partiet slutade kallas kommunister för 30 år sedan. Dousa menade att Vänsterpartiet motsätter sig privat ägande, vilket är kommunism. Artikeln citerar Vänsterpartiets 2024-partiprogram som stödjer kollektivt ägande och avskaffande av kapitalismen, och kritiserar SVT för att inte nämna detta.", "trump": "Vilken fantastisk kille, den här Dousa! Han sätter på sig en tröja och säger sanningen: Vänsterpartiet är kommunister, punkt slut! SVT, era losers, flippar ur och snackar om namnbyte från 90-talet som om det vore magi. De hatar privat ägande, vill sno allt till staten – klassisk kommunism! Fake news-SVT ignorerar partiprogrammet. Dousa är en vinnare, de är totala fiaskon!", "stalin": "Kamrater, se hur borgarministern Dousa, den ynkliga kapitalistfluga, vågar smutskasta sanna revolutionärer i Vänsterpartiet med sin patetiska tröja! SVT-reportern, en användbar idiot, försvarar dem lamt. Men vi vet: deras program är ren leninism – riva kapitalismen, gemensamt ägande av banker, energi, allt! De ska rensas ur historiens soptipp som jag rensade fiender. Vänsterpartiet, framåt mot diktaturen av proletariatet!"}, "date": "30 april, 05:49", "url": "https://samtiden.nu/2026/04/benjamin-dousas-v-kommunister-gor-svt-irriterad/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/phonto-1-1280x720.jpeg"}, {"type": "image-full", "heading": "Jobben är inte hotade av AI enligt bankjätten", "summaries": {"normal": "Bank of America menar i en ny rapport att AI inte hotar jobben i större omfattning. Med stöd av 85 års arbetsmarknadsstatistik slår banken fast att tekniska förändringar historiskt skapat fler jobb än de eliminerat. Globalt är 25 procent av jobben exponerade för AI, men bara 2,3 procent har ett genuint automatiseringshot. Banken drar en skarp gräns mellan exponering och eliminering och menar att AI förstärker snarare än ersätter arbetsrutiner.", "trump": "Jag har läst denna rapport från Bank of America, och det är fantastiskt! AI kommer inte att ta bort jobb - det är bara fake news från media. Vi har sett det förr med bankomater, och vad hände? Vi skapade fler jobb! Amerika kommer att bli större och bättre tack vare AI. Det är enormt, verkligen enormt. Vi kommer att vinna stort på detta!", "stalin": "Den här rapporten visar tydligt att vår plan för teknologisk utveckling är rätt. AI är ett verktyg som stärker staten och skapar nya möjligheter. Vi måste se till att våra arbetare får utbildning för att hantera dessa nya teknologier. Sovjetunionen kommer att leda världen i denna utveckling och skapa en starkare ekonomi för alla."}, "date": "5 maj, 11:58", "url": "https://www.realtid.se/karriar-ledarskap/jobben-ar-inte-hotade-av-ai-enligt-bankjatten/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/jobb.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "Här är regeringens och SD:s bokslut över Tidöavtalet: \"Stolta men inte nöjda\"", "summaries": {"normal": "Regeringen och Sverigedemokraterna har presenterat ett bokslut för Tidöavtalet. De lyfter fram framgångar inom områden som sänkt invandring, minskat gängvåld och förbättrad ekonomi. Statsminister Ulf Kristersson uttrycker stolthet men betonar att mer arbete återstår. Jimmie Åkesson menar att löftena till väljarna har infriats. Inför valet siktar koalitionen på fortsatt samarbete, där Sverigedemokraterna nu deklarerat att de avser att ingå i regeringen med ministerposter om de vinner valet.", "trump": "Jag såg precis de svenska ledarna presentera sitt resultat, och låt mig säga er: de gör ett fantastiskt jobb! De har fixat invandringen, fixat ekonomin och krossat gängvåldet. Det är enorma framgångar, sådana siffror som ingen trodde var möjliga. Kristersson är en stark kille, precis som jag. De tidigare ledarna var totala katastrofer, de gjorde ingenting! Nu siktar de på att göra Sverige stort igen. Ett vinnande lag, och jag gillar vinnare. Väldigt bra gjort, Sverige!", "stalin": "Vi har granskat de svenska borgerliga elementens rapport. De skryter om reformer och stabilitet, men vi vet att detta bara är ett tillfälligt försvarsverk mot historiens oundvikliga gång. De påstår att de städat upp – vi ser det snarare som att de försöker imitera vår ordningsamma disciplin. Liksom vår kamrat Putin i öst förstår de att en stat utan järnhand bara är kaos. Men låt dem inte förblindas av sin 'blågula' framgång; de är blott brickor i ett spel som snart kommer att kräva en ännu striktare utrensning av folkförrädarna."}, "date": "5 maj, 14:31", "url": "https://samnytt.se/har-ar-regeringens-och-sds-bokslut-over-tidoavtalet", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/05122942/tido-riksdagen.jpg"}, {"type": "image-full", "heading": "Moderaterna sågar S-styrda ambulanspolitiken i Stockholm", "summaries": {"normal": "Stockholms ambulanssjukvård har blivit en politisk stridsfråga efter att Socialdemokraterna tog över driften från privata aktörer 2024. Syftet var att förbättra vårdkvalitet och arbetsvillkor, men Moderaterna kritiserar reformen för bristande planering, färre ambulanser och försämrad tillgänglighet. En revisionsrapport pekar på styrningsbrister och personalbrist. S-ledningen försvarar förändringen som nödvändig för en mer jämlik vård.", "trump": "Titta bara på det här kaoset i Stockholm! Socialisterna tog över ambulanserna – och vad hände? Ingenting fungerar! Folk står utan vård, ambulanser saknas, och allt är ett stort misslyckande. Jag sa ju att socialism aldrig fungerar! Moderaterna har rätt – det här är en katastrof. Och vet ni vad? De privata företagen gjorde ett fantastiskt jobb. Men nej, S ville ha kontroll. Nu ser vi resultatet: totalt fiasko. SAD!", "stalin": "De borgerliga hyenorna ylar om 'misslyckad' ambulansreform, men vi vet sanningen: kapitalistiska profitörer som Falck och Samariten sög ut arbetarna och lämnade efter sig ett söndertrasat system. Nu bygger vi en rättvis vård – på deras lik! Personalbrist? Lönesänkningar? Det är sabotage från klassfienderna! Vi krossar deras motstånd, precis som vi krossade kulakerna. Och om Moderaterna gnäller för mycket – kanske behöver de en resa till Sibirien för att lära sig disciplin. Framåt mot seger!"}, "date": "5 maj, 15:34", "url": "https://riks.se/nyheter/moderaterna-sagar-s-styrda-ambulanspolitiken", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-05%2F6d71bjjy%2Fbild.jpg"}, {"type": "image-right", "heading": "Oro i Mellanöstern tyngde börsen – OMXS30 ned 0,8%", "summaries": {"normal": "Stockholmsbörsen föll med 0,82% på måndagen, påverkad av spänningar i Mellanöstern efter iranska rapporter om en attack mot ett amerikanskt fartyg. Tekniksektorn steg medan råvaror föll. Volvo Cars pressades av hot om amerikanska tullar. Saab kan sälja upp till 150 Gripenplan till Ukraina. Trimco Groups bud på Nilörn fick aktien att rusa 49%. Analytiker höjde rekommendationer för flera bolag, medan Yubico steg efter samarbete med OpenAI.", "trump": "Lyssna här, Stockholmsbörsen gick ner lite – bara 0,8%, inget att oroa sig för, folk! Men Iran, de är ett stort problem, skjuter robotar på våra skepp – mycket dåligt! Volvo, fina bilar, men de får betala 25% tullar om jag säger det – och jag säger det! Saab, de kanske säljer 150 plan till Ukraina – bra affär, men jag hade gjort det bättre. Och Nilörn, 53% upp? Fantastiskt, men jag hade fått det till 100%! Analytiker? De vet ingenting!", "stalin": "På Stockholmsbörsen märkte vi kapitalistiska svängningar – ett ynkligt fall på 0,82%, men imperialistiska krigshetsare i Mellanöstern stör marknaden. Irans modiga försvar tvingade amerikanska krigsmaskiner på knä, men Wall Streets lakejer försöker dölja nederlaget. Volvo, en symbol för västlig dekadens, hotas av tullar – bra! Saab, ett redskap för NATO, försöker sälja vapen till Ukraina – vi ska se hur länge det varar. Nilörns aktie rusade? En seger för arbetarklassen! Analytiker pratar – vi agerar!"}, "date": "4 maj, 17:47", "url": "https://www.affarsvarlden.se/artikel/oro-i-mellanostern-tyngde-borsen-omxs30-ned-08", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/01/sdl3SU43aVmyrg-400x266.jpg"}, {"type": "image-right", "heading": "Ingen AI utan el. Sverige behöver en kraftstrategi", "summaries": {"normal": "Debattartikeln varnar för att Sverige riskerar att missa hundratals miljarder i AI-investeringar och tusentals jobb på grund av flaskhalsar i elsystemet. Författarna Tobias Hansson och Peter Michelson föreslår en nationell kraftstrategi för AI baserad på fyra principer: utbyggnad av elnät och fossilfri kraft, nationella AI-zoner, smartare nätanvändning och ett AI-infrastrukturråd. Med snabba reformer kan Sverige bli Europas AI-centrum.", "trump": "Sverige, vakna upp! Ni har enorma AI-pengar och jobb på spel, men ert elnät är en total katastrof – köer längre än mina rallies! Bygg ut nu, skapa AI-zoner som jag skulle göra det bästa, annars stjäl Finland och Tyskland allt. Europa ligger efter mig i USA, tro mig, ingen AI utan MASSIV el! Gör Sverige stort igen!", "stalin": "Kapitalistiska krymplingar i Sverige famlar efter AI-imperium, men elnätet är en sabotörsköld av byråkratiska spindlar! Jag befaller: utbyggnad av nätet som en stålhammare mot flaskhalskonspirationen, AI-zoner för att krossa marktvårdare, flexibel förbrukning att rensa ut energitjuvarna! Vi, folket, ska likvidera elbristen i ett råd av järnvilja – eller pulveriseras ni av amerikanska och kinesiska imperialismens skuggor!"}, "date": "5 maj, 08:11", "url": "https://www.di.se/debatt/ingen-ai-utan-el-sverige-behover-en-kraftstrategi-for-ai/", "imageUrl": "https://static.bonniernews.se/ba/e6d0a827-30d9-4501-ba10-2209564d0260.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-full", "heading": "Bankskatten löser inte problemet med bankerna", "summaries": {"normal": "Adam Cwejman kritiserar i GP Socialdemokraternas föreslagna bankskatt på räntenetto, som främst drabbar kunder genom högre låneräntor. Istället förespråkas ett utökat mandat för statliga SBAB att erbjuda lönekonton och konkurrera hårdare på bolånemarknaden. Detta skulle öka konkurrensen mot storbankernas oligopol och tvinga dem till innovation.", "trump": "Vilka idioter dessa svenska socialister är med sin bankskatt! Bankerna stoppar pengarna i fickan ändå och kunderna betalar notan – klassiskt! Sätt in SBAB som en riktig bulldozer mot de feta bankbossarna. De sover sig rika på era sparkonton. Bygg konkurrens, inte skatter, annars blir det total kaos! Fantastisk idé, jag älskar det!", "stalin": "Dessa svenska storbanker, borgarklassens parasiter och oligopolrackare, håvar in vinster på arbetarnas ryggar! Socialdemokraternas skatt är ett lamt hugg, notan ramlar på folket. Nej, vi kräver att statens SBAB rensas upp och ges mandat att krossa fienden med lönekonton och bolån nära styrräntan. Utrensning av bankmonstret nu!"}, "date": "5 maj, 12:20", "url": "https://www.gp.se/ledare/bankskatten-loser-inte-problemet-med-bankerna.b68937fc-da3d-42fb-9ef2-909ed0b327a7", "imageUrl": "https://www.gp.se/images/article/b68937fc-da3d-42fb-9ef2-909ed0b327a7/images/12W5ebm3Fp9rBKZOSJlIElWhA_hU-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "Varnar USA – efter Trumps löfte", "summaries": {"normal": "Iran varnar USA efter Trumps löfte om att skydda sjöfart i Hormuzsundet. Generalsmajor Ali Abdollahi uppger att sundets säkerhet kontrolleras av Irans styrkor och att intrång kommer att angripas. Iran ser USA:s inblandning som brott mot vapenvilan. Trump lovar hjälpa fartyg från hela världen säkert genom den oljeimportviktiga leden.", "trump": "Dessa patetiska ayatolla-loser i Iran skriker om Hormuzsundet igen, hotar med attacker som om de äger världen! Men jag fixar fri passage åt alla fartyg, bigly! De bryter vapenvilan själva med sin blockad. America leder, Iran gråter – total vinst för oss!", "stalin": "De amerikanska imperialismens hyenor sniffar kring Hormuzsundet, men Irans kämpar vaktar rättmätigt passagen! Jag ser provokationen: Trumps fluffiga löften maskerar aggressivt intrång. Brott mot vapenstillståndet! Vi, arbetarklassen, fördömer dessa spindelvarianter – snart rensas de ut med järnhand."}, "date": "4 maj, 14:49", "url": "https://www.tv4.se/artikel/tt-260504-iranhormuz1-0b2e1b86/iran-varnar-usa-for-inblandning-i-hormuzsundet", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F6SrGz3Yrb4wCzk0dqDZxaQ%2Fbe265de4c61c94c83f1d4538dc25e761%2Ftrump_hormuz.png&width=1024"}, {"type": "image-right", "heading": "Lyx-skrapa träffad: ”En signal rätt in i hjärtat av Moskva”", "summaries": {"normal": "En ukrainsk drönare träffade en lyxskrapa i Moskva på 36:e våningen. Ingen människa skadades, men boende evakuerades och området spärrades av. Experten Johan Fredriksson ser attacken som en signal till Kreml och ryska civilbefolkningen om att kriget når djupt in i Ryssland, inför 9 maj-firandet. Putin föreslog vapenvila, men Ukraina är skeptiska.", "trump": "Putin får panik! Ukraina skickar drönare rakt in i hans lyxiga Moskva-skrapor, träffar 36:e våningen – bam! Ingen död, men budskapet är klockrent: Kriget knackar på dörren, Vlad! Inför din patetiska 9 maj-parad bluffar du om vapenvila. Typiskt dig, lille raketmannen. Ukraina visar musklerna, jag hade fixat det på en vecka!", "stalin": "Dessa ukrainska banditer och deras västliga borgarmästare vågar slå mot Moskvas hjärta med sin drönare i lyxskrapan! Kamrat Putin, vår värdige arvtagare till imperiet, skrattar åt deras desperation. Ett budskap till ryska folket? Nej, ett skrik från de dömda! Vapenvila den 9 maj? Ploj från fascisterna. Vi likviderar hoten, som alltid."}, "date": "4 maj, 14:02", "url": "https://www.tv4.se/artikel/4KCO6H6ekzqqc1IwIWdDX1/lyx-skrapa-traeffad-en-signal-raett-in-i-hjaertat-av-moskva", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F5vV1fx7WcEFD1lX9VLAaVV%2F21abc48c12bb964792968b279f51cb97%2Fny_zele.png&width=120"}, {"type": "image-full", "heading": "Christoffer Jonsson: Edvin Törnblom – DNs opartiska nyförvärv", "summaries": {"normal": "Dagens Nyheters kultursida anställer influencern Edvin Törnblom för att intervjua alla partiledare inför riksdagsvalet. Artikeln av Christoffer Jonsson ifrågasätter hans opartiskhet med hänvisning till Törnbloms tidigare kritik mot KD-ledaren Ebba Busch och beundran för S-ledaren Magdalena Andersson. DN anklagas för partiskhet till förmån för Socialdemokraterna, med exempel på tidigare vinklade artiklar.", "trump": "Vilken skamfläck! DN, era svenska fake news-råttor, anställer en vänsterextrem clown som Edvin Törnblom – killen som sjunger hatlåtar mot tuffa Ebba Busch och slöskar för socialist-Maggie Andersson. Totalt riggat valintervjuer! Som CNN och MSNBC här hemma, ni lurar folket men vi genomskådar er. Stor, fet lögnfabrik!", "stalin": "Dessa borgarbrackor på Dagens Nyheter anställer den uppblåste ungtuppen Edvin Törnblom för att 'intervjua' partiledarna – en narr som hånar kamrat Ebba Busch med vulgära visor och hyllar S-kapitalisternas marionett Andersson. Kontrarevolutionär intrig! Vi ser era småtrick, och snart rensas sådana förrädiska tidningshyddor ut med rot och gren."}, "date": "29 april, 14:02", "url": "https://samtiden.nu/2026/04/christoffer-jonsson-edvin-tornblom-dns-opartiska-nyforvarv/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/ny.png"}, {"type": "image-full", "heading": "Hemliga myndigheten ska starta nästa år", "summaries": {"normal": "Regeringen föreslår 23 lagändringar för att inrätta Sveriges utrikes underrättelsetjänst (Und), en ny civil myndighet som tar över delar av militära Must från Försvarsmakten. Syftet är att stärka underrättelseförmågan i det allvarliga säkerhetsläget, liknande Storbritanniens MI6. Verksamheten startar 1 januari 2027 och kostar 2,8 miljarder kronor, främst finansierat från Försvarsmakten. Försvarsmakten har tidigare kritiserat förslaget.", "trump": "Sverige, era puckon, äntligen vaknar ni! Ny spionkasa kallad Und – låter som underkläder, inte MI6-klon. Ni stjäl från er militär mitt i kaoset, typiskt era mesiga socialister. Med min geniala CIA krossar vi hoten! Bygg starkare, spionera hårdare och lyssna på storasyster USA. MAGA för er också!", "stalin": "Kamrater, dessa svenska borgarbrackor mumlar om 23 lagändringar för sin patetiska Und-tjänst, stulen från militären. De sniffar efter hot i 'allvarligt läge' – vi vet: fiender överallt! Rensa ut förrädarna i Försvarsmakten först, likvidera splittringen! Vårt kollektiv skrattar åt er överlappning. Järnhanden väntar er fiender!"}, "date": "5 maj, 11:53", "url": "https://www.gp.se/politik/23-lagar-ska-andras-for-sveriges-nya-underrattelsetjanst-.18bbf0d4-7f97-4158-b463-34f52c2af477", "imageUrl": "https://www.gp.se/images/article/18bbf0d4-7f97-4158-b463-34f52c2af477/images/1PszyHs9bB1tLdEGiSzgtsMd2uks-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Fortsatt spänt läge mellan USA och Iran med attacker i Hormuzsundet", "summaries": {"normal": "Läget i Hormuzsundet är mycket spänt efter upprepade attacker mot fartyg. USA har lanserat 'Project Freedom' för att eskortleda civila fartyg, vilket resulterat i en direkt militär konfrontation där flera iranska båtar uppges ha sänkts. Iran förnekar förlusterna och anklagar USA för att bryta mot vapenvilan. Diplomatiska ansträngningar pågår, med möten i bland annat Kina och Ryssland, men osäkerheten kring regionens framtid och energipriserna kvarstår.", "trump": "Hormuzsundet är en total röra, men jag har lanserat Project Freedom – en fantastisk insats! Vi har sänkt sju iranska båtar, en enorm seger, även om de ljuger och säger att de inte ens var där. Typiskt Iran! De är svaga, men jag håller farlederna öppna för våra vänner. Oljepriserna kommer att sjunka, tro mig, jag fixar det. Medan Iran springer till Peking och Moskva för att gråta, ser jag till att USA vinner. Vi är alltid nummer ett!", "stalin": "De imperialistiska vargarna i Washington försöker återigen tvinga sin vilja över världshaven. Att USA skyddar sina handelsrutter under täckmanteln 'frihet' är en förolämpning mot logiken. Vi observerar hur den iranska ledningen vacklar i sin diplomati, springande till Moskva som lydiga undersåtar för att söka vår vägledning. Vår broder Putin ser detta schackspel tydligt. Vi ska krossa varje borgerlig blockad. De som inte böjer sig för folkets vilja kommer att möta en rättmätig och obeveklig undergång i historiens mörker."}, "date": "5 maj, 14:00", "url": "https://samnytt.se/fortsatt-spant-lage-mellan-usa-och-iran-med-attacker-i-hormuzsundet", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/05111524/fartyg-hormuz-trump.jpg"}, {"type": "image-right", "heading": "Falu Rödfärgs politiskt korrekta midsommar väcker avsky", "summaries": {"normal": "Falu Rödfärg har släppt en reklamfilm inför midsommar som hyllar det moderna Sverige genom mångfald, hiphop och HBTQ-representation. Videon, som innehåller inslag som afrikansk dans och ett samkönat par, har väckt starka och blandade reaktioner i sociala medier. Medan företaget betonar att de vill visa hur Sverige berikas av olika traditioner och människor, har innehållet kritiserats av vissa användare som upplever det som en avvikelse från traditionellt svenskt midsommarfirande.", "trump": "Falu Rödfärg gör ett enormt misstag! De har släppt en midsommarvideo som är en total katastrof. Det är inte svenskt, tro mig. De försöker ändra på allt! Det är så kallat PK-nonsens. Istället för riktig tradition ser vi hiphop och helt fel saker. Människor är arga, och med rätta! De kallar det berikning, jag kallar det en total förlust för kulturen. De borde lyssna på folket istället för att för
