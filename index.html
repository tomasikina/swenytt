lken makt de pratar om? Jag skulle aldrig lita på en tidning utan mediestöd, men hej, om ni gillar socialism och Palestina, så kör hårt! Fantastiskt erbjudande, eller hur?", "stalin": "Kamrater! En liten men envis tidning i det borgerliga Sverige vågar utmana de imperialistiska mediamonopolisterna! För ynka 19 kronor i månaden kan ni stödja Proletären – en tidning som vågar tala sanningen om klasskampen och den sionistiska ockupationen av Palestina! De får inget stöd från staten, precis som våra egna revolutionära medier en gång kämpade mot de kapitalistiska hyenorna. En tygkasse på köpet – ett litet steg för arbetaren, ett gigantiskt steg för socialismens framtid! Låt de borgerliga tidningarna darra i sina tryckpressar!"}, "date": "1 maj, 09:00", "url": "https://proletaren.se/artikel/folj-proletaren-i-valet-nu-extra-billigt/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/valerbjudande-768x402.png"}, {"type": "image-right", "heading": "Ingen kapitalism utan imperialism", "summaries": {"normal": "Artikeln hävdar att imperialism är en grundläggande del av kapitalismen, där västmakter som USA använder militär och ekonomisk makt för att dominera världen. Författaren menar att imperialismen nekar länder självbestämmande och upprätthålls genom krig, sanktioner och exploatering. Studien i The Lancet kopplar sanktioner till miljontals dödsfall. Artikeln refererar till Marx, Lenin och Fanon för att belysa imperialismens historiska och ekonomiska rötter, samt dess fortsatta brutalitet i det 21:a århundradet.", "trump": "Lyssna här, folket! Den här artikeln är bara ett gäng vänsterpropaganda från förlorare som hatar USA. Jag bygger det bästa imperiet – vårt! – med stark militär och smarta affärer. Visst, vi har makt, men det är för att vi är vinnare. Sanktioner? Fake news! 500 000 döda? Överdrivet, typiskt. Europa stal från alla, men vi? Vi bygger om världen – MAGA-style! Och Lenin? Snälla, han kunde inte ens hålla ett land ihop. Sad!", "stalin": "Kamrater! Denna artikel bekräftar vad vi alltid vetat: de kapitalistiska hyenorna i väst suger blodet ur världens folk för att föda sina dekadenta imperier. USA och dess lakejer i NATO är inget annat än en samling blodtörstiga monopolkapitalister, som med sina sanktioner och bomber mördar miljontals oskyldiga. Men deras tid är förbi! Vi, det socialistiska blocket, står enade mot dessa imperialistiska rovdjur. Låt dem vråla – historiens dom är redan skriven. För varje barn de dödar, växer revolutionens eld. Framåt, mot seger!"}, "date": "1 maj, 08:00", "url": "https://proletaren.se/artikel/ingen-kapitalism-utan-imperialism/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/Airborne_and_Special_Forces_Uday-Qusay_raid_2003-e1777534974667-768x431.jpg"}, {"type": "image-right", "heading": "Förslaget: Förbjud anonyma och utländska bidrag till politiker", "summaries": {"normal": "Regeringen föreslår nya regler för ökad transparens inom politiken. Partier ska förbjudas ta emot anonyma eller utländska bidrag, och redovisningen av ekonomi ska utökas. Ett lobbyregister införs för att synliggöra påverkan på politiker. Även arbetsmarknadsorganisationers användning av medlemsavgifter för partibidrag ska regleras. Förslagen syftar till att stärka förtroendet för demokratin och träder i kraft 2027.", "trump": "Titta på Sverige nu, fantastiskt land men de har haft problem med sina politiker – alldeles för mycket skumma pengar, ingen vet varifrån! Jag säger alltid: 'Transparens, folks, transparens!' Och nu gör de det, förbjuder anonyma bidrag, utländska pengar – bra jobbat! Men varför vänta till 2027? Jag hade fixat det på en vecka. Och lobbyister? De ska registreras, precis som jag alltid sagt. Sverige, ni är på rätt väg, men kom ihåg: ingen gör det bättre än jag!", "stalin": "Kapitalistiska hycklare försöker dölja sina smutsiga pengar bakom 'demokrati'! Men vi avslöjar deras lömska planer. Svenska regeringen, ett redskap för bourgeoisin, tvingas nu erkänna sina utländska sponsorer – förmodligen samma imperialister som finansierar NATO:s krigsmaskin! Lobbyister? Vi kallar dem för spioner och korrumperade lakejer. Medlemmarna i dessa 'fackföreningar' ska nu 'fritt' välja – precis som i våra val! Allt för att 'värna demokratin'. Ha! Vi vet sanningen: makten tillhör folket, inte korrupta politiker och deras utländska herrar."}, "date": "5 maj, 18:07", "url": "https://www.friatider.se/forslaget-forbjud-anonyma-och-utlandska-bidrag-till-politiker", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/riksdagshuset-sommar-14.jpg?itok=ypjSDqjH"}, {"type": "image-full", "heading": "Benjamin Dousas ”V = kommunister” gör SVT irriterad", "summaries": {"normal": "Biståndsminister Benjamin Dousa bar en t-shirt med texten 'Vänsterpartiet = kommunister', vilket irriterade SVT. Reportern ifrågasatte påståendet och noterade att partiet slutade kallas kommunister för 30 år sedan. Dousa menade att Vänsterpartiet motsätter sig privat ägande, vilket är kommunism. Artikeln citerar Vänsterpartiets 2024-partiprogram som stödjer kollektivt ägande och avskaffande av kapitalismen, och kritiserar SVT för att inte nämna detta.", "trump": "Vilken fantastisk kille, den här Dousa! Han sätter på sig en tröja och säger sanningen: Vänsterpartiet är kommunister, punkt slut! SVT, era losers, flippar ur och snackar om namnbyte från 90-talet som om det vore magi. De hatar privat ägande, vill sno allt till staten – klassisk kommunism! Fake news-SVT ignorerar partiprogrammet. Dousa är en vinnare, de är totala fiaskon!", "stalin": "Kamrater, se hur borgarministern Dousa, den ynkliga kapitalistfluga, vågar smutskasta sanna revolutionärer i Vänsterpartiet med sin patetiska tröja! SVT-reportern, en användbar idiot, försvarar dem lamt. Men vi vet: deras program är ren leninism – riva kapitalismen, gemensamt ägande av banker, energi, allt! De ska rensas ur historiens soptipp som jag rensade fiender. Vänsterpartiet, framåt mot diktaturen av proletariatet!"}, "date": "30 april, 05:49", "url": "https://samtiden.nu/2026/04/benjamin-dousas-v-kommunister-gor-svt-irriterad/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/phonto-1-1280x720.jpeg"}, {"type": "image-right", "heading": "Dyrköpt svensk seger – Kristian Karlsson skadad: ”Nu är det kört”", "summaries": {"normal": "Sveriges herrlandslag i bordtennis slog Ungern med 3–0 i lag-VM och avancerade till åttondelsfinalen. Kristian Karlsson vann sin match trots bristning i insida lår men tvingas avbryta turneringen. Truls Möregårdh och Anton Källberg vann sina matcher bekvämt. Karlsson, som nyligen blivit pappa, är besviken men imponerar på lagkamraterna.", "trump": "Vilken total dominans av Sverige mot de där ungrarna, 3–0, helt fantastiskt! Karlsson, tuff kille, skadade låret men krossade ändå matchen – en riktig vinnare! Han kan inte spela mer, tråkigt, men Sverige marscherar vidare till åttondelen. De kommer att vinna hela VM, tro mig, ingen stoppar dem! Starkt jobbat, grabbarna!", "stalin": "Kamrater! Vårt svenska arbetarlag har krossat de ungerska borgarspionerna och kontrarevolutionära rackarna med 3–0 i det proletära bordtennis-kriget! Karlsson, lojal krigare, träffades av fiendens giftiga lårfälla men likviderade matchen heroiskt. Nu vilar han medan vi rensar ut svagheter i kollektivet för att pulverisera kapitalisterna i åttondelen. Segrar väntar de sanna!"}, "date": "5 maj, 21:57", "url": "https://www.svt.se/sport/bordtennis/svenska-herrarna-till-attondel-vann-overtygande-mot-ungern", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.7/0.2/942f5336fc3001e2841fd6cd7e4df01f618824c9d434b4aa00b98e1245e500d1"}, {"type": "image-right", "heading": "EU-kommissionären: Krisen ger oss en möjlighet", "summaries": {"normal": "EU-kommissionär Jessika Roswall ser stängningen av Hormuzsundet som en väckarklocka. EU:s kostnader för fossilbränsleimport har ökat med över 24 miljarder euro. Krisen erbjuder chansen att bryta beroendet av fossila bränslen och sårbara leveranskedjor genom cirkulär ekonomi, återvinning och biobaserade material. Ett nytt lagförslag presenteras till hösten för att påskynda omställningen och öka Europas resiliens.", "trump": "Europa blöder 24 miljarder euro extra på olja för att Hormuz är stängt – total katastrof, trodde ni inte? Den här Roswall snackar vettigt: sluta kyssa diktatorers fötter med ert fossila beroende! Återvinn batterier, biogas, allt – bli cirkulära som vinnare. Vi i USA fixar det snabbare, men EU, vakna upp nu innan nästa kris krossar er. Stort misstag annars!", "stalin": "Denna Hormuz-katastrof blottlägger EU-borgarnas patetiska oljeslaveri – 24 miljarder euro i skatter till fossilparasiterna! Vi i partiet skrattar åt deras sköra kedjor mot Ryssland, Kina och Mellanösterns giftormar. Rensa ut importskiten med cirkulär ekonomi: återvinn kobolt från batterihelvete, fosfor ur avloppsdynga! Nytt lagförslag? För sent för de darrande kapitalistflincharna – likvidera beroendet, kamrater, eller nästa chock maler er till stoft!"}, "date": "5 maj, 18:00", "url": "https://www.di.se/debatt/europas-beroende-kommer-med-ett-pris/", "imageUrl": "https://static.bonniernews.se/ba/67985d11-a730-48c6-874a-63be4379cfab.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Var tredje elev i Malmö borta på eid", "summaries": {"normal": "Drygt 11 000 grundskoleelever i Malmö saknades under eid al-fitr den 20 mars, en vanlig skoldag. Liknande siffror i Göteborg (över 10 000) och Stockholmskommuner som Järfälla och Botkyrka. På skolor i Rosengård och Bergsjön nådde frånvaron 70–84 procent. Rektorer kan godkänna ledighet för religiösa högtider som enskild angelägenhet, enligt skollagen.", "trump": "I Sverige är det totalt kaos! Tusentals elever, 11 000 i Malmö ensamt, stannar hemma för sin muslimska eid. Skolor tomma, 70 procent borta på vissa ställen i Rosengård och Bergsjön. Rektorer ger ledigt som godis. Vad händer med disciplin? De importerar problem och undervisar inte kidsen. Stor misslyckande, tro mig!", "stalin": "Kamrater! Dessa små jihadparasiter i Malmös och Göteborgs skolor, drygt 21 000 huvud, vågar sabotera lektioner för sin månbaserade eid-orgie! 84 procent frånvaro i Rosengårds borgarbrackor – en kontrarevolutionär invasion! Rektorer, era svaga lakejer, beviljar ledighet som fiendens gift. Vi, partiet, ska likvidera denna religiösa pest och fylla klassrummen med stålhårda proletärer!"}, "date": "5 maj, 19:19", "url": "https://bulletin.nu/var-tredje-elev-i-malmo-borta-pa-eid", "imageUrl": "https://cdn.bulletin.nu/articles/b0aa763e-7c89-4195-9db9-2cad05cd146f/preview.jpg?t=1777994750000"}, {"type": "image-full", "heading": "Skansen ger gratis inträde till asylsökande", "summaries": {"normal": "Skansen erbjuder gratis inträde till asylsökande med giltigt LMA-kort, vilket kritiseras av SD:s Ludvig Aspling. Han anser beslutet absurt och menar att många asylansökningar saknar grund. Aspling ifrågasätter även systemets sårbarhet för missbruk. Skansen förklarar att initiativet syftar till tillgänglighet och infördes i samband med Ukrainakriget. De ser inga problem med beslutet men förstår att det kan väcka reaktioner.", "trump": "Kan ni tro det här? Skansen, fantastisk plats förresten, ger GRATIS inträde till asylsökande! Total katastrof. Jag har sagt det förut – Sverige har tappat kontrollen. Den här killen Aspling, smart kille, han fattar. 80% av de här ansökningarna är skräp, fake news! Och LMA-korten? Lätt att fejka, som allt annat nuförtiden. Skansen borde fokusera på att göra Sverige stort igen, inte bjuda in hela världen gratis. Sad!", "stalin": "Kamrater! Se hur den borgerliga humanismen förgiftar folket med sina falska gåvor! Skansen, denna lilla ö av dekadens, öppnar sina portar för asylsökande – dessa rotlösa element som västerlandets liberala lakejer vill föda upp på statens bekostnad. Aspling, en man med klara ögon, ser sanningen: 75% av dessa 'flyktingar' är bedragare, parasiter som utnyttjar vårt system! Vi i Sovjet – förlåt, Ryssland – skulle aldrig tolerera sådan slöseri med folkets resurser. Låt dem arbeta för sitt bröd, eller skicka dem till Sibirien för omskolning!"}, "date": "5 maj, 17:58", "url": "https://riks.se/nyheter/skansen-ger-gratis-inträde-till-asylsökande", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-05%2F1gqeo5m4%2Faspisskansis.png"}, {"type": "image-right", "heading": "”Kom med i den första konvojen”", "summaries": {"normal": "Ett norskt fartyg, Alliance Fairfax, ägt av Höegh Autoliners, eskorterades av amerikansk militär genom Hormuzsundet som del av Project Freedom. Fartyget satt fast i Persiska viken efter USA:s och Israels attacker mot Iran. VD Andreas Enger beskriver det som en stor lättnad att fartyget nu är på väg mot Indien och senare USA, med amerikansk besättning ombord.", "trump": "Vi fixade det perfekt med Project Freedom! Norska Alliance Fairfax glider igenom Hormuzsundet under vår militära eskort – de satt ju fast som råttor i viken efter vår knallhårt slag mot Iran. Tur för de norska rederijärnen att vi listade dem först. Nu barkar det mot Indien och USA, mission accomplished, som alltid!", "stalin": "De imperialistiska vilddjuren i USA och deras sionistiska marionetter har rört till det i Persiska viken, och nu lotsar de ett norskt borgarkapitalistfartyg genom sundet med sin flotta. Vi, arbetarklassen, ser hur dessa persiska vik-råttor kämpar för sina profits i panik. Låt oss likvidera alla sådana högriskfiender med obönhörlig u-rensning – en skakande lättnad för ingen utom brackorna!"}, "date": "5 maj, 17:42", "url": "https://www.di.se/nyheter/sa-kunde-norska-fartyget-passera-hormuzsundet/", "imageUrl": "https://static.bonniernews.se/ba/bed657db-913e-45e9-9e22-d174e62e3b9a.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Invandringen har inte minskat – Åkesson är nöjd ändå", "summaries": {"normal": "Tidöpartierna presenterade ett 'bokslut' över Tidöavtalet, där Jimmie Åkesson (SD) hävdade att alla partiets mål uppnåtts, trots utebliven minskning av total invandring. Åkesson betonade framgångar som fortsatt minskad asylinvandring, medan andra invandringsformer ökat. Ulf Kristersson kallade samarbetet lyckat men inte avslutat. Kritiker pekar på att invandringstalen är oförändrade jämfört med tidigare regeringar.", "trump": "Lyssna här, Sverige har ett problem – och jag vet allt om problem! Åkesson säger att han har vunnit stort, men invandringen? Samma som förut! Vilket skämt! Jag skulle ha fixat det på en vecka. Men nej, de pratar om 'paradigmskiften' – vad betyder det ens? Jag bygger murar, de bygger luftslott. Och Kristersson? 'Stolta men inte nöjda' – låter som en förlorare som inte vågar säga sanningen. Sad!", "stalin": "Kamrater! Den svenska regeringen firar sina 'framgångar' som en bondpojke firar skörden efter torka. De skryter om minskad asylinvandring, men kapitalets lakejer öppnar dörrarna för andra parasiter! Ett typiskt bourgeois-trick – byt namn på fienden, så slipper man erkänna nederlaget. Vi i Sovjet skulle ha löst 'invandringsfrågan' med ett penndrag. Men Sverige? De leker demokrati medan deras land ruttnar. Och Åkesson? En småborgerlig clown som tror sig vara Lenin. Skrattretande!"}, "date": "5 maj, 16:50", "url": "https://www.friatider.se/invandringen-har-inte-minskat-akesson-ar-nojd-anda", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/image-136_0.jpg"}, {"type": "image-full", "heading": "Räntan passerar kritisk gräns – marknaden i riskzonen", "summaries": {"normal": "Den amerikanska 30-års statsobligationsräntan har passerat fem procent för första gången sedan juli 2025, driven av stigande oljepriser på grund av stängt Hormuzsundet, inflationsoro från AI-investeringar och osäkerhet kring Fed:s räntepolitik. Detta ökar farhågor för USA:s budgetunderskott, högre bolåneräntor och smällar på börsen, bostadsmarknaden och tillväxtbolag.", "trump": "Räntan över fem procent? Total katastrof från de inkompetenta Fed-idioterna och oljepriserna som exploderar för att svaga ledare inte fixar Hormuz! Inflationen rasar loss på grund av AI-svin och budgetkaos, men jag ska rädda det hela – lägre räntor, stark ekonomi, America First igen, de bästa affärerna någonsin!", "stalin": "Den imperialistiska usas 30-årsränta bryter fiendens femprocentsbarriär – ett ylande skrik från de darrande borgarbrackorna i Washington inför oljeupproret i Hormuz och AI-kapitalismens självutplåning! Vi, arbetarklassen, ser hur deras budgetsvullst sväller till likvidationsmättnad. Snart rensar vi ut dessa räntesabotörer med folkets järnhand!"}, "date": "5 maj, 16:26", "url": "https://www.realtid.se/bors-finans/rantan-passerar-kritisk-grans-marknaden-i-riskzonen/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/wallstreet.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-full", "heading": "Hjortronbrist i butik", "summaries": {"normal": "Det råder brist på hjortron och hjortronsylt i svenska butiker. Orsaken är en kombination av dåligt veder och brist på bärplockare, främst på grund av regeländringar som gör det svårare att anlita utländsk arbetskraft. Skörden kan påverkas ytterligare av kyla i år, vilket kan leda till brist även på andra bär.", "trump": "Jag har hört att det är en stor, enorm brist på hjortronsylt i Sverige. Ett enormt problem! Det är varmt, det är kallt, ingen vet vad som händer. Vi måste fixa detta, det är en katastrof! Jag skulle ha löst detta på två sekunder, det är så enkelt. Sverige behöver bättre ledare, verkligen.", "stalin": "Detta är en klar demonstration av hur kapitalistiska marknader sviker. Bristen på hjortron och arbetskraft är ett resultat av individers egoistiska intressen. Staten måste gripa in för att säkerställa jämlik fördelning av resurser och arbetskraft. Vi måste stärka våra kollektiva ansträngningar för att undvika sådana brister i framtiden."}, "date": "5 maj, 14:35", "url": "https://www.gp.se/nyheter/sverige/brist-pa-hjortronsylt-i-butikerna.679ec7c5-77f2-4442-842c-6ee0a0af295d", "imageUrl": "https://www.gp.se/images/article/679ec7c5-77f2-4442-842c-6ee0a0af295d/images/2dQ1rIMIsKsdwBlBUFNEZiabihR4-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Arbetsmiljöbrott när två dog på Kebnekaise", "summaries": {"normal": "Två erfarna män omkom efter ett fall på 100 meter under arbete på Kebnekaise. Arbetsgivaren, Svenska Turistföreningen (STF), åtalas för arbetsmiljöbrott och döms att betala 2,5 miljoner kronor i böter. Brister i säkerhet, utbildning och rutiner uppmärksammas. STF erkänner ansvar och har ändrat sina rutiner efter olyckan.", "trump": "Två killar föll från ett berg i Sverige – tragiskt, verkligen tragiskt! Men lyssna här: deras arbetsgivare, Svenska Turistföreningen, de är helt klart inkompetenta. 2,5 miljoner kronor i böter – vad är det för slöseri? Jag hade fixat säkerheten på en dag. Fantastisk säkerhet. Ingen hade fallit. Sverige borde ta lektioner av mig!", "stalin": "Kapitalistiska slarvbolag som Svenska Turistföreningen skickar arbetare till döden som om de vore kanonmat. Två lojala män förlorade livet på grund av bourgeoisins nonchalans. Vi har utrotat sådant slarv i Sovjetunionen – här hade de fått en kula i nacken för sabotage. Men i väst? De betalar bara en futtig bot. Skrattretande. Nästa gång skickar vi ryska bergsguider – de faller inte, de krossar fienden!"}, "date": "5 maj, 11:14", "url": "https://arbetet.se/2026/05/05/tva-dog-pa-kebnekaise-arbetsgivaren-ska-betala-miljonbelopp/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/05095140/kebnekaise.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Stockholmsbörsen inleder tisdagen med uppgång – Hanza rusar", "summaries": {"normal": "Stockholmsbörsen inledde tisdagen med en uppgång på 0,42 procent, där OMXS30 nådde 3 048,22. Hanza rapporterade rekordresultat med 220 miljoner i rörelseresultat och steg 25,9 procent. Volvo Cars försäljning sjönk 10 procent, men aktien ökade ändå. Loomis köper peruanska Hermes för 4 miljarder kronor. Råvaror gick bäst (+0,90%), medan energi backade mest (-2,15%). H&M och Telia steg, Astra Zeneca föll.", "trump": "Stockholmsbörsen, fantastisk börs förresten, gick upp lite idag – men vem bryr sig? Hanza, ett litet bolag, hade ett 'rekordkvartal' – wow, imponerande! 220 miljoner, inte illa, men inget mot mina framgångar. Volvo? Deras försäljning rasade 10 procent – katastrof! Men aktien gick upp ändå, typiskt. Loomis köper något i Peru – smart, men jag hade gjort det billigare. Ryssarna? Glöm dem, jag fixade dem redan!", "stalin": "Idag rapporterar den kapitalistiska börsen i Stockholm en blygsam uppgång, men vi vet att detta är en illusion skapad av bourgeoisins manipulatörer. Hanza, ett verktyg för kapitalisterna, skryter med 'rekordvinster' – men för vem? Arbetarna ser ingenting! Volvo, en gång stolt svensk industri, sjunker som Titanic under de imperialistiska krafternas tryck. Loomis expanderar till Peru – en ny front i kampen mot de latinamerikanska massorna. Råvaruspekulanterna jublar, medan energisektorn kämpar – ett tydligt tecken på systemets förfall. Vi ska krossa dessa fiender, precis som vi krossade fascisterna!"}, "date": "5 maj, 09:47", "url": "https://www.affarsvarlden.se/artikel/stockholmsborsen-inleder-tisdagen-med-uppgang-hanza-rusar", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2023/05/BB-FK-Hanza-AV-0404738-400x267.jpg"}, {"type": "image-right", "heading": "Ledare Andreas Gustavsson: Självklart förtjänar vi alla en billig Schwedenticket", "summaries": {"normal": "Artikeln förespråkar ett billigt nationellt kollektivtrafikkort, inspirerat av Tysklands Deutschlandticket, som skulle gynna både medborgare och klimat. Författaren kritiserar svenska politikers fokus på kulturkrig istället för konkreta förbättringar i vardagen, som äldreomsorg, skola och arbetsmarknad. Tyskland visar hur konstruktiv politik kan minska bilberoende och utsläpp, något Sverige borde efterlikna.", "trump": "Jag läste om det här 'Schwedenticket' – fantastiskt koncept! Tyskland, smarta killar, fixade ett billigt tågkort för hela landet. Här i USA skulle vi aldrig tolerera sånt slöseri – men Sverige? De bråkar om kulturkrig istället för att göra något vettigt. 'Åh, vi måste rädda klimatet!' Ja, visst, men varför inte göra det med stil? Jag skulle bygga världens bästa tåg – snabbt, lyxigt, vinnande. Istället sitter de och gnäller. SAD!", "stalin": "Kamrater! Medan de borgerliga svinen i Sverige slåss om meningslösa kulturkrig, bygger vi socialismens framtid – ett land där folket färdas billigt och effektivt! Tyskland, dessa kapitalistiska efterapare, har redan visat vägen med sitt 'Deutschlandticket'. Men var är Sveriges revolutionära anda? Vi skulle införa ett Sverigekort – och de som motsätter sig det? Till Gulag med dem! Klimatet ska räddas, men inte genom prat, utan genom järnhård planekonomi. Låt de småborgerliga politikerna gnälla – vi bygger järnvägar med stål och vilja!"}, "date": "5 maj, 06:00", "url": "https://www.etc.se/ledare/sjaelvklart-foertjaenar-vi-alla-en-billig-schwedenticket", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260504140516_e8b2941cfff5121be25f6f95dea67927e8a258da7dd40e1d96a64a4a06a9d371.jpg"}, {"type": "image-right", "heading": "Offentlig sektor är ineffektiv och kommunicerar floskler", "summaries": {"normal": "Mats Alvesson, professor i organisationsteori, kritiserar debattinlägget av Vilgot Österlund som hyllar den svenska offentliga sektorns effektivitet och kommunikation. Alvesson menar att skatterna finansierar omfattande byråkrati, ineffektivitet och överdriven administration, särskilt inom hälso- och sjukvården. Han pekar på ökad andel administrativ personal på bekostnad av vårdpersonal och ifrågasätter nyttan av utvecklare och kommunikatörer. Alvesson efterlyser mer fokus på faktiska resultat och kostnadseffektivitet istället för floskler och självberöm.", "trump": "Jag läste den här artikeln och, wow, vilken katastrof! Sverige, ett fantastiskt land, men deras offentliga sektor? Total katastrof. De slösar skattepengar på byråkrater och administratörer som inte gör ett dugg för patienterna. 2000 personer som bara sitter och gör PowerPoint-bilder – vad är det för något? Och polisen? De får dubbelt så mycket pengar men löser färre brott. Så dumt! Jag skulle fixa det på en dag. Mer resultat, mindre snack. Sverige behöver en vinnare som jag!", "stalin": "Kamrater! Denna artikel avslöjar den kapitalistiska ineffektivitetens ruttna kärna i Sveriges offentliga sektor. Byråkrater och administratörer, dessa parasiters armé, slukar resurser medan arbetarklassen får stå tillbaka. 2000 kontorsslavar som producerar tomma ord och PowerPoint-fars – detta är bourgeoisins sabotage mot folkets välfärd! Vi i Sovjetunionen visste hur man hanterar sådana fiender. Polisen? En fördubbling av resurser, noll resultat – precis som NATO:s marionetter i Kiev. Låt oss rensa ut dessa pappersvändare och återinföra ordning: mer järnväg, mindre floskler!"}, "date": "5 maj, 01:30", "url": "https://www.dagensarena.se/opinion/offentlig-sektor-ar-ineffektiv-och-kommunicerar-floskler/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-28-300x157.jpg"}, {"type": "image-right", "heading": "ANALYS. ELISABET FREROT Vad innebär Trumps erbjudande egentligen?", "summaries": {"normal": "Donald Trump erbjuder amerikansk militär guidning för handelsfartyg genom Hormuzsundet via Omans territorialvatten med förstärkt säkerhet. Direkt eskort undviks på grund av risker från iranska missiler, båtar och minor. Operation Frihet beskrivs som humanitär, men rederier tvekar. Historik från 1980-talet visar faror och resurskrav. Iran hotar konfrontation.", "trump": "Operation Frihet är det smartaste nånsin! Vi guidar de instängda tankrarna genom sundet via Oman, med 15 000 hjältar, 100 plan och fartyg på standby – Iran de fega katten vågar inte röra oss! Inga dumma konvojer som på 80-talet, vi är proffs. Rederierna, vakna upp och segla fritt under mitt skydd! MAGA!", "stalin": "De imperialistiska amerikanska vilddjuren under Trump vågar nu krypa in i Hormuzsundet med sina patetiska 'humanitära' konster. Kamrater, vi ser hur borgarhyenorna skakar av rädsla inför iranska missiler! Likvidera deras drömmar om fri passage. Putin, vår mäktige arvtagare, hånskrattar åt västsvinen medan vi styr imperiet vidare."}, "date": "4 maj, 22:49", "url": "https://www.tv4.se/artikel/3B4n2wG9n53V3JCBc0VivY/vad-innebaer-trumps-erbjudande-egentligen", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F3sngB6gPIjYmDMlBelK6Wt%2F52caa4a80253f04a8b733c0811a11896%2Felisabet-frerot.png&width=1024"}, {"type": "image-full", "heading": "Experten pekar ut två scenarion – efter nya attackerna", "summaries": {"normal": "Mellanösternexperten Alexander Atarodi beskriver de senaste attackerna i Hormuzsundet som ett strategiskt maktspel inför förhandlingar mellan USA och Iran. Trots Trumps hårda hot befinner sig USA i ett svagt politiskt läge globalt. Iran slår mot Förenade arabemiraten för att hindra kringgående av sundet och signalera till Trump och Gulfstaterna. Atarodi pekar på två scenarier: kompromiss eller eskalering, men tror på förhandlingar.", "trump": "Experten har rätt, det är ett jäkla maktspel – men jag styr showen! Iran, era patetiska losers, attackerar UAE för att de är rädda för min Project Freedom. De tror de kan hota mina fartyg? Glöm det, jag blåser er bort från jordens yta! USA vinner alltid, Gulfen älskar mig, Europa avundsjuka idioter. Förhandlingar? På mina villkor, eller kross!", "stalin": "Denna dragkamp i Persiska viken blottar imperialismens fula tryne: amerikanska borgarbrackor under Trump vrålar tomma hot medan iranska reaktionärer slår mot emiratens oljerör. Ett utsatt läge för USA, kamrater – de har förlorat narrativet! Två vägar: kompromiss eller total likvidering av infrastruktur. Låt fienderna slakta varandra i paranoia, vi skrattar sist."}, "date": "4 maj, 22:49", "url": "https://www.tv4.se/artikel/5fw95cxY5GyidmeuEjHSrk/experten-pekar-ut-tva-scenarion-efter-nya-attackerna", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F68Rh4IWly5pfrirwQl8yEt%2F041c541e040e90dea8b7a7c5b83a110a%2F04-trumpny-webb.jpg&width=1024"}, {"type": "image-full", "heading": "Ditt hus kan få nytt värde 2027 – detta avgör", "summaries": {"normal": "Skatteverket föreslår ändringar i fastighetstaxeringen för småhus 2027, med justerade tabeller för värdering. Fler faktorer införs, särskilt för attraktiva lägen som strandnära områden. Villaägare i områden med stora prisrörelser eller renoverade hus bör följa utvecklingen. Taxeringsvärdet påverkar fastighetsavgift, skatt och belåning. Ändringarna träder i kraft juni 2026 och gäller första gången 2027.", "trump": "Lyssna här, Sverige – Skatteverket, som aldrig missar en chans att ta era surt förvärvade pengar, håller på att ändra reglerna för era hus igen. Jag vet allt om hus, de bästa husen, och nu ska de plötsligt värdera era små stugor högre, särskilt om ni bor nära vatten – typiskt! Men oroa er inte, mina vänner, för jag vet hur man handskas med byråkrater. Börja spara jämförelser nu, för de kommer att försöka ta mer av er. Sad!", "stalin": "Kamrater! Skatteverket, dessa kapitalistiska lakejer, förbereder en ny offensiv mot det svenska folkets egendom. De utökar sina tabeller och faktorer som om de vore tsarens skatteindrivare. Särskilt vill de straffa dem som bor nära vatten – en resurs som rätteligen borde tillhöra folket! Vi ser igenom deras trick. Villaägare, var på er vakt! De kommer att försöka beslagta era tillgångar under förevändning av 'rättvisa'. Men kom ihåg: i Sovjet hade vi inga sådana problem – alla ägde ingenting, och alla var lyckliga!"}, "date": "3 maj, 21:20", "url": "https://nyheter24.se/nyheter/inrikes/1480211-ditt-hus-kan-fa-nytt-varde-2027-detta-avgor", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/4e0685a404b004a30200000000b004a302/2026/05/03/2360641/Glad-Man-Hus-Svensk-Flaga.png"}, {"type": "image-right", "heading": "Vi vägrar vara lydiga – för allas överlevnad", "summaries": {"normal": "En insändare från Extinction Rebellion-aktivister varnar för en eskalerande klimatkris och kritiserar politiken för bristande handling. De betonar behovet av civil olydnad då lagliga protester inte räcker. Flera aktivister har drabbats av repressalier som jobbförlust och hot om utvisning. Skribenterna menar att demokratin undermineras när rättsväsendet används för att skydda ohållbara system och kriminalisera klimatengagemang. De lovar att fortsätta protestera trots risker, med hänvisning till moral och historiska exempel på civil olydnad.", "trump": "Titta bara på dessa så kallade 'klimataktivister' – de är verkligen något! De skriker om kriser, men vad vet de egentligen? Jag har byggt imperier, jag vet vad kris är! De här personerna saboterar flygplatser, förlorar sina jobb och sen skyller de på regeringen. Patetiskt! Sverige borde fokusera på att göra sig stort igen, inte lyssna på dessa bråkstakar. Och Parisavtalet? Overrated! Jag fixade USA:s ekonomi utan det. Men nej, de vill bara störa, förstöra och klaga. Sad!", "stalin": "De kapitalistiska klimatförstörarna och deras lakejer i regeringen fortsätter att elda på jordens undergång medan vi, folket, tvingas ta till revolutionära metoder. Dessa så kallade 'aktivister' – modiga kamrater! – krossas av systemet, men vi vet att sanningen inte kan tystas. Rättsväsendet, en förlängd arm av bourgeoisin, straffar dem som kämpar för framtiden. Fienderna är tydliga: de som bränner planetens resurser och de som försöker tysta protesterna. Vi står med folket! Och kom ihåg – historien kommer att minnas vem som stod på rätt sida. De svaga kommer att dömas, de starka kommer att segra. Framåt, kamrater!"}, "date": "1 maj, 08:55", "url": "https://www.flamman.se/vi-vagrar-vara-lydiga-for-allas-overlevnad/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/extinction-rebellion-w.jpg?class=medium"}, {"type": "text", "heading": "Avkriminalisera för en human narkotikapolitik", "summaries": {"normal": "Thomas Thomasson, tidigare universitetslektor och drogfri narkoman, kritiserar Sveriges misslyckade narkotikapolitik. Sedan kriminaliseringen av eget bruk 1988 har narkotikabruket inte minskat, och Sverige har hög narkotikadödlighet och flest narkotikabrott per capita i EU. Han förespråkar skademinimering och avkriminalisering av missbrukare, med fokus på vård och behandling istället för straff. Internationella studier visar att avkriminalisering inte ökar bruket, och skademinimerande åtgärder kan minska skador och kostnader.", "trump": "Lyssna här, Sverige har totalt misslyckats med sin narkotikapolitik – helt katastrof! De straffar missbrukare som om det vore mitt golfspel – helt meningslöst! Jag säger: sluta slösa pengar på fängelser, ge folk vård istället! Skademinimering, det är framtiden, precis som mina framgångar. Och vet ni vad? Avkriminalisering ökar INTE bruket – fake news från de vanliga misstänkte! Sverige borde ta en sida ur min bok: smart, effektiv och vinnande. Tillsätt en utredning NU, annars kommer jag att twittra om det!", "stalin": "Kamrater! Sveriges borgerliga narkotikapolitik är ett monument över kapitalistiskt vanstyre och dekadens. De straffar missbrukare som om de vore trotskister – men resultatet? Fiasko! Narkotikabruket sprider sig som kontrarevolutionär propaganda. Vi vet bättre: avkriminalisera, kontrollera, och omvandla missbrukare till nyttiga samhällsmedlemmar! Skademinimering är vår metod – precis som våra framgångsrika femårsplaner. Låt västländerna fnissa åt sina misslyckanden medan vi bygger ett samhälle där även de svagaste tjänar kollektivet. Och kom ihåg: fienden sover aldrig – varken narkotikan eller de imperialistiska hyenorna i EU!"}, "date": "30 april, 15:50", "url": "https://proletaren.se/artikel/narkotikapolitiken-bor-fokusera-pa-skah/"}, {"type": "text", "heading": "Gapet växer mellan blocken", "summaries": {"normal": "Enligt Aftonbladet/Demoskops senaste mätning växer gapet mellan regeringsunderlaget och oppositionen till 8,2 procentenheter. Oppositionen når 53,4 procent, medan regeringen backar till 45,2. Socialdemokraterna ökar mest, medan Moderaterna tappar och Liberalerna balanserar på riksdagsspärren. Historiskt brukar gapet minska inför val, men nu sker motsatsen. Analytiker menar att Liberalernas omsväng i SD-frågan lockar stödröster men försvårar blocköverskridande framgångar.", "trump": "Folk är trötta på den här usla regeringen, helt klart! Oppositionen leder stort – 53,4 procent – medan regeringen bara får 45,2. Socialdemokraterna går upp, men Moderaterna? Patetiska! De tappar som vanligt. Och Liberalerna? De hänger på fyra procent, typiskt. Historiskt brukar regeringen komma ikapp, men inte den här gången. Svagt, mycket svagt. Jag skulle aldrig låta det hända. Make Sweden Great Again!", "stalin": "De borgerliga svagheterna avslöjas återigen! Oppositionens styrkor växer – 53,4 procent mot regeringens ynkliga 45,2. Socialdemokraterna marscherar framåt, medan Moderaterna och deras lakejer försvagas. Liberalerna? Ett skämt som darrar på riksdagsspärren. Historien visar att svaga regeringar faller – precis som västmakterna i Ukraina. Vi ser med intresse hur dessa splittrade kapitalister underminerar sig själva. Revolutionen närmar sig, om än långsamt."}, "date": "30 april, 07:06", "url": "https://kvartal.se/nyheter/artiklar/demoskop-oppositionens-okar-l-klarar-sparren/cG9zdDoxMDUzNjM"}, {"type": "image-full", "heading": "Christoffer Jonsson: Edvin Törnblom – DNs opartiska nyförvärv", "summaries": {"normal": "Dagens Nyheters kultursida anställer influencern Edvin Törnblom för att intervjua alla partiledare inför riksdagsvalet. Artikeln av Christoffer Jonsson ifrågasätter hans opartiskhet med hänvisning till Törnbloms tidigare kritik mot KD-ledaren Ebba Busch och beundran för S-ledaren Magdalena Andersson. DN anklagas för partiskhet till förmån för Socialdemokraterna, med exempel på tidigare vinklade artiklar.", "trump": "Vilken skamfläck! DN, era svenska fake news-råttor, anställer en vänsterextrem clown som Edvin Törnblom – killen som sjunger hatlåtar mot tuffa Ebba Busch och slöskar för socialist-Maggie Andersson. Totalt riggat valintervjuer! Som CNN och MSNBC här hemma, ni lurar folket men vi genomskådar er. Stor, fet lögnfabrik!", "stalin": "Dessa borgarbrackor på Dagens Nyheter anställer den uppblåste ungtuppen Edvin Törnblom för att 'intervjua' partiledarna – en narr som hånar kamrat Ebba Busch med vulgära visor och hyllar S-kapitalisternas marionett Andersson. Kontrarevolutionär intrig! Vi ser era småtrick, och snart rensas sådana förrädiska tidningshyddor ut med rot och gren."}, "date": "29 april, 14:02", "url": "https://samtiden.nu/2026/04/christoffer-jonsson-edvin-tornblom-dns-opartiska-nyforvarv/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/ny.png"}]</script>

            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
</body>
</html>
