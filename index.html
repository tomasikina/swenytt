ra allierade i kampen mot de fascistiska Natohundarna! Ryssland? Ett påhittat hot! Vi vet att USA:s krigsmaskin är den verkliga fienden. Ned med imperialisterna! Låt oss bygga ett fredligt Europa – utan Natos kärnvapenhot!"}, "date": "11 maj, 14:20", "url": "https://proletaren.se/artikel/tar-ton-mot-nato/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/helsingborg-768x432.jpg"}, {"type": "image-right", "heading": "Ledare Andreas Gustavsson: Israels mjuka makt kan avgöra Eurovision", "summaries": {"normal": "Artikeln kritiserar Israels påstådda användning av mjuk makt för att påverka Eurovision. Israel ska ha bedrivit en omfattande, statligt finansierad kampanj för att maximera röster åt sina bidrag, inklusive uppmaningar att rösta flera gånger. Europeiska tv-bolag, däribland SVT, anklagas för att undvika folkrättsfrågor och inte granska påverkansförsöken tillräckligt. Flera länder bojkottar tävlingen 2025 på grund av detta.", "trump": "Titta bara på det här, ett totalt kaos! Israel, som alltid, spelar smutsigt i Eurovision – miljoner dollar slösade på att köpa röster, och vad gör Europa? Ingenting! SVT och de andra tv-bolagen duckar som vanligt, rädda för att säga sanningen. Jag skulle aldrig tillåta det här i USA, aldrig! Och Netanyahu, han uppmanar folk att rösta 20 gånger – kan ni tro det? Svagt, mycket svagt. Eurovision borde skämmas, men de gör inget. Sad!", "stalin": "Kamrater, ännu en gång visar den sionistiska entiteten sin förmåga att korrumpera västerländska institutioner med kapitalistiska trick. Eurovision, denna borgerliga cirkus, har blivit en front i deras imperialistiska påverkansoperationer. Vi ser hur de köper röster, mutar byråkrater och tystar oppositionen – precis som de gör i Ukraina! De europeiska lakejerna, som SVT, böjer sig som vass i vinden. Men folket ser igenom dem. Bojkotten är ett första steg mot seger. Framåt, mot den socialistiska kulturrevolutionen!"}, "date": "12 maj, 10:54", "url": "https://www.etc.se/ledare/israels-mjuka-makt-kan-avgoera-eurovision", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260512080548_e58db1510ee75e1c3b8dcdf03130aee650a7843f9972aef8fc5e91987202f683.jpg"}, {"type": "image-right", "heading": "DN & Socialdemokraterna enade: tvångsblandningen måste genomföras", "summaries": {"normal": "Artikeln kritiserar Dagens Nyheters ledarsida för att försvara Socialdemokraternas förslag om blandad bebyggelse i villaområden för att motverka segregation. DN tonar ner idén som icke-tvångsbaserad och skuldbelägger kritiker. Artikeln påpekar att S vill förhindra icke-integrerade invandrare i utanförskapsområden, vilket innebär placering i villaområden, och varnar för minskad trygghet och kulturell harmoni.", "trump": "Vilken skamfläck! DN och de där svenska socialisterna vill tvinga vanliga hard-working svenskar att bo med icke-integrerade invandrare i sina fina villaområden. 'Inget tvång', säger de – ha! De duckar frågan vart de fattiga migranterna ska bo. Totalt vansinne! Bygg murar runt era trygga hem istället för att förstöra dem med denna woke-blandning. Moderaterna har rätt, det här blir S:s valförlust!", "stalin": "De borgerliga tidningsrackarna på DN skyddar socialdemokratiska revisionister som vill 'blanda' arbetarklassen med lumpenproletariatet i villaområdena. Ett hån mot sunda värderingar! Vi skulle likvidera sådana segregationsterrorister som hotar harmonin. Inga tvång? Lögner från klassfiender! De rika borgarbrackorna missunnar inte – de försvarar sitt. Rensa ut hycklarna, kamrater, innan de förgör folkets enhet!"}, "date": "12 maj, 03:10", "url": "https://samtiden.nu/2026/05/dn-s-enade-tvangsblandningen-bra-for-alla/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/IMG_6452.jpeg"}, {"type": "image-full", "heading": "Svensken flög hem med hantasmittade kvinnan – hålls isolerad", "summaries": {"normal": "Tre personer har avlidit och sju smittats av hantavirus efter ett utbrott på ett kryssningsfartyg. Regeringen höll pressträff där socialminister Jakob Forssmed och Folkhälsomyndigheten informerade om läget. En svensk ombord har isolerats i sex veckor trots inga symtom. Finland klassar andesvirus som allmänfarligt. Sverige vidtar inga särskilda åtgärder, men följer situationen noga.", "trump": "Lyssna här, Sverige har ett stort problem med det här så kallade 'hantaviruset' – tre döda, sju sjuka, och en svensk som flög hem med ett smittat par! Otroligt dåligt skött. Jag skulle aldrig låta det hända. Folkhälsomyndigheten? De gör ingenting! Finland är smartare, de klassar det som farligt. Sverige borde ta efter – men nej, de sitter bara och väntar. Patetiskt!", "stalin": "Kamrater, ännu en kapitalistisk dekadens har visat sitt sanna ansikte! Tre arbetare har fallit offer för det borgerliga hantaviruset på ett lyxfartyg, medan sju andra kämpar för sina liv. Finland, våra nordliga grannar, visar åtminstone lite klassmedvetenhet genom att klassificera viruset. Men Sverige? De låter smittan spridas som kontrarevolutionär propaganda! Vi måste skydda folket – isolera de smittade, och låt de ansvariga för denna borgerliga vanvård stå till svars!"}, "date": "12 maj, 09:17", "url": "https://nyheter24.se/nyheter/inrikes/1482528-ministern-hantaviruset-skapar-oro", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/4dcc86c304b004a30200000000b004a302/2026/05/12/2362997/svensk-fartyg-hantavirus-presstraff-isloerad-spridning-virus-virus-smittade.jpg"}, {"type": "image-right", "heading": "Sleep Cycle budvinnare på Stockholmsbörsen", "summaries": {"normal": "Stockholmsbörsen avslutade med en lätt uppgång på måndagen, där Sleep Cycle steg rejält efter ett uppköpsbud. OMXS30-indexet ökade med 0,19 procent till 3 079,45, och aktier för cirka 21,9 miljarder kronor omsattes. Bland ledande aktier steg Ericsson B och Boliden, medan Assa Abloy B och Evolution backade. Riskkapitalbolaget Altor lade ett uppköpsbud på Sleep Cycle, vilket värderade bolaget till 497 miljoner kronor.", "trump": "Jag hörde att Stockholmsbörsen gjorde det bra i dag, mycket bra! Sleep Cycle fick ett fantastiskt bud, det bästa budet någonsin! Altor är en genial riskkapitalist, ingen gör det bättre! Ericsson och Boliden steg också, stora vinnare! Men Assa Abloy och Evolution, de gjorde det inte så bra, mycket dåligt! Jag skulle ha gjort det mycket bättre!", "stalin": "Stockholmsbörsen visade en positiv utveckling, vilket speglar den starka ekonomiska basen. Sleep Cycle:s uppköp är en strategisk viktighet för vår ekonomiska expansion. Ericsson och Boliden visar vår industriella styrka. Vi måste fortsätta att stödja våra ledande företag för att säkerställa vår dominans på den globala marknaden."}, "date": "11 maj, 17:48", "url": "https://www.affarsvarlden.se/artikel/sleep-cycle-budvinnare-pa-stockholmsborsen", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/01/sdl3SU43aVmyrg-400x266.jpg"}, {"type": "image-right", "heading": "EU delar ut vätgasmiljarder – Sverige utan stöd", "summaries": {"normal": "EU delar ut över 1 miljard euro till vätgasprojekt via innovationsfonden, finansierat av utsläppshandelssystemet ETS. Nio projekt i sju länder valdes, varav fem i Norden – men inget i Sverige. Stödet ska täcka prisskillnaden mellan produktionskostnader och marknadspris för att främja ren vätgas. Tidigare har flera projekt tackat nej på grund av snäva tidsramar. Totalt ansökte 251 projekt om medel.", "trump": "EU slänger ut miljarder på vätgas – men Sverige, som alltid, får ingenting! Fem projekt i Norden, men inget i Sverige. Typiskt. Jag skulle ha fixat det bättre. Och de här projekten – de har inte ens bestämt sig än! Svagt. Jag hade byggt en jättefabrik på en månad. Europa är så långsamt, så tråkigt. Men jag, jag hade gjort vätgas GREAT AGAIN!", "stalin": "Kamrater! Europa leker med sina miljarder medan vi bygger imperier. Fem nordiska projekt får stöd – men Sverige, dessa kapitalistiska svikare, står utanför! Deras industri betalar för utsläpp, ändå får de inget. Skrattretande. Och dessa projekt – de drar sig ur som fega desertörer! I Sovjet hade vi byggt vätgasfabriker med järnhand. Europa är svagt. Vi hade redan erövrat vätgasmarknaden – och kanske även deras kalla, nordiska hamnar."}, "date": "11 maj, 13:23", "url": "https://www.affarsvarlden.se/artikel/eu-delar-ut-vatgasmiljarder-sverige-utan-stod", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Vatgas-Eu-900x600.jpg"}, {"type": "image-right", "heading": "Ica snuvar unga på 10 000 kronor om året", "summaries": {"normal": "Handels stämmer Ica för att ha gjort olagliga åldersavdrag på unga lageranställdas löner under minst 15 år. Enligt facket kan en 18-åring ha förlorat upp till 10 000 kronor årligen. Ica hävdar att det finns en överenskommelse, men Handels menar att tabellen för minimilöner feltolkats. Cirka 4000 anställda berörs, och facket kräver 300 000 kronor i skadestånd. Ica avböjer att kommentera under pågående process.", "trump": "Kan ni tro det här? Ica, ett stort svenskt företag, har lurats med ungas löner i 15 år! De har tagit 10 000 kronor från 18-åringar – helt galet! Facket, som jag alltid sagt är fantastiska, stämmer dem nu. Ica säger att de har en överenskommelse, men vem tror på det? Inte jag! De blandar ihop äpplen och blåbär – typiskt. Vi ska se till att rättvisa skipas, believe me!", "stalin": "Kapitalistiska hyenor på Ica har i 15 år stulit från arbetarklassens ungdom! 10 000 kronor om året från varje ung proletär – ett brott mot folket! Dessa löneparasiter har feltolkat avtal som om de vore tsarens byråkrater. Vi ska rensa ut denna korruption! Handels, våra trogna kamrater, stämmer dem – bra! Men låt oss inte glömma: varje krona de stulit är en skuld till revolutionen. Rättvisa ska skipas, och fienderna krossas!"}, "date": "12 maj, 13:01", "url": "https://arbetet.se/2026/05/12/ica-snuvar-unga-pa-10-000-kronor-om-aret-facket-pagatt-i-15-ar/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/03/18130033/ica.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Sandström: Flytta guldburen AP2 från Göteborg till Stockholm", "summaries": {"normal": "Christian Sandström argumenterar i en krönika för att Andra AP-fonden (AP2) bör flyttas från Göteborg till Stockholm. Han menar att fonden underpresterat och blivit en 'guldbur' med höga löner, låg personalomsättning och bristande ansvarsutkrävande. Hälften av de anställda från 2006 är kvar, och lönenivåerna överstiger jämförbara statliga tjänster. Sandström kritiserar även ledningens bristande probleminsikt, särskilt kring investeringen i Northvolt.", "trump": "Jag läste om denna AP2-fond i Göteborg – total katastrof! De har misslyckats i åratal, men ingen bryr sig för alla sitter där i sin 'guldbur' med skyhöga löner och dricker kaffe. VD:n tjänar 410 000 i månaden – för vad? Att skriva 'arg apa'-emojis? Och de försvarar Northvolt som om det vore mitt Trump Tower! Flytta hela skiten till Stockholm, där åtminstone folk vet hur man jobbar. Göteborg? Snälla, det är som att jämföra Mar-a-Lago med en svensk sommarstuga.", "stalin": "Kamrater! Denna så kallade 'guldbur' i Göteborg är ett skolexempel på borgerlig dekadens och förräderi mot folket. Halva personalen sitter kvar sedan 2006 – tydligen har de glömt att revolution kräver förnyelse! Deras löner är en skymf mot arbetarklassen, och deras 'förtroende' för Northvolt är lika naivt som en ukrainsk bondes tro på väst. Vi skulle aldrig tolerera sådan slöhet i Moskva. Flytta fonden till Stockholm – eller låt oss ta över och visa hur man sköter kapitalförvaltning på riktigt. Förresten, Putin skulle skratta ihjäl sig åt deras 'arg apa'-emoji."}, "date": "11 maj, 05:50", "url": "https://www.affarsvarlden.se/artikel/sandstrom-flytta-guldburen-ap2-fran-goteborg-till-stockholm", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/vindkratensgeografi-2026-05-10T171945.221-400x267.jpg"}, {"type": "image-right", "heading": "Rånade norrmän i Gdańsk – riskerar upp till 20 års fängelse", "summaries": {"normal": "Fyra svenska medborgare, 17–23 år, greps på Gdańsks flygplats misstänkta för väpnat rån mot två norska turister. Attacken skedde efter en krogrunda där svenskarna följde efter norrmännen, misshandlade dem och rånade en av dem på mobil, betalkort och PIN-kod. Offret tvingades göra bankuttag på totalt cirka 6 700 norska kronor. Polisen identifierade gärningsmännen via övervakning och grep dem innan de flög till Göteborg. De riskerar 3–20 års fängelse.", "trump": "Jag måste säga, Polen gör ett fantastiskt jobb – men dessa svenska killar? Total katastrof! Fyra unga män, med namn som låter som de kom direkt från någon dålig actionfilm, rånar två oskyldiga norrmän med kniv. Och vad gör de? Stjäl en telefon och ett betalkort, tvingar fram PIN-koden och tömmer kontot. Patetiskt! Polisen i Gdańsk? Toppen, de grep dem precis när de skulle smita hem till Sverige. 20 års fängelse? Låter som en bra deal – Sverige borde skämmas!", "stalin": "Kapitalistiska hyenor i mänsklig gestalt, dessa så kallade 'svenska medborgare', har visat sitt sanna ansikte. Under dekadenta nätter i Gdańsk utförde de ett fegt angrepp på två norska arbetare – ett brott som skriker efter proletariatets rättvisa. Vi noterar med tillfredsställelse att de polska kamraterna agerade snabbt och effektivt. 20 års straffarbete? En mild början. Låt dem lära sig att i folkets Polen, och snart hela den socialistiska sfären, finns ingen plats för sådana parasiters framfart."}, "date": "12 maj, 13:52", "url": "https://bulletin.nu/ranade-norrman-i-gda-sk-riskerar-upp-till-20-ars-fangelse-2", "imageUrl": "https://cdn.bulletin.nu/articles/1a022703-5f50-4787-852a-e30643fe1871/preview.jpg?t=1778586679000"}, {"type": "image-right", "heading": "Ledare Henrik Jalalian: Vill verkligen inget parti rädda ett gulligt litet djur?", "summaries": {"normal": "Artikeln argumenterar för att politiker bör använda symboliska miljöåtgärder, som att rädda utrotningshotade arter, för att vinna folkligt stöd. Åtgärder som skydd av skog, våtmarker och specifika djurarter (t.ex. sandödla, vitryggig hackspett) är billiga, effektiva och populära. Författaren menar att naturens återhämtning kan ske snabbt med enkla insatser, vilket gynnar både biologisk mångfald och politikers image.", "trump": "Lyssna här, Sverige! Era politiker är helt lost – de pratar om utsläpp och statistik, men ingen bryr sig! Jag vet hur man vinner: rädda gulliga djur! Sandödlor, hackspettar – perfekta för affischer! Billigt, enkelt, och folket älskar det. Medan era vägar står tomma kan ni göra dem till ängar – gratis! Naturen fixar sig själv, precis som mitt geni. Sluta snacka, börja göra som jag – vinna!", "stalin": "Kamrater! Medan väst förblindas av kapitalistisk kortsynthet, visar denna artikel hur vi kan utvidga vår ekologiska dominans. Dessa svenska politiker är svaga – de förstår inte att biologisk mångfald är en fråga om nationell styrka! Vi ska inte bara rädda sandödlor, vi ska omvandla hela Sveriges vägnät till gröna korridorer för vår naturliga expansion. Fienderna – lupiner, igenväxta skogar, och liberala trädgårdsägare – måste krossas! Återställ våtmarker, skydda fjällskogar, och låt arterna blomstra under vårt beskydd. Naturen är vår allierade, och vi ska använda den för att demonstrera socialismens överlägsenhet. Framåt, mot en grönare och mäktigare framtid!"}, "date": "12 maj, 06:00", "url": "https://www.etc.se/ledare/vill-verkligen-inget-parti-raedda-ett-gulligt-litet-djur", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260511140548_c6cbd14deac504cfcfc606e8c59e73d8e6e289d5763cb15c93494f4602392c99.jpg"}, {"type": "text", "heading": "Zelenskyjs närmaste man åtalas i korruptionshärva", "summaries": {"normal": "Zelenskyjs tidigare stabschef och nära rådgivare, Andrij Jermak, har åtalats för penningtvätt och ekonomisk brottslighet. Utredningen rör ett omfattande korruptionsmål där Jermak misstänks ha finansierat lyxfastigheter utanför Kiev genom kriminella medel. Fallet är en del av en större granskning av korruption på hög nivå inom ukrainsk statsförvaltning, där flera tidigare högt uppsatta tjänstemän och affärspartners till Zelenskyj utreds. Regeringen har i nuläget valt att inte kommentera detaljerna i den pågående rättsliga processen.", "trump": "Hörde ni? Zelenskyjs högra hand, Jermak, är fast för korruption! Det är en total katastrof för Ukraina. Miljontals dollar tvättade i lyxvillor medan de tigger pengar av oss. Jag sa till dem, 'skicka inte pengarna', men ingen lyssnade. De bygger spa och pooler för stulna medel, medan vårt folk kämpar. Helt otroligt. Det är en häxprocess eller ren inkompetens. Jag skulle ha löst det på en dag. Ukraina är ett korrupt träsk, mina vänner, tro mig!", "stalin": "Ännu ett bevis på den ukrainska borgerlighetens ruttnande natur. Zelenskyjs lakej, Jermak, har frossat i lyxvillor och swimmingpooler medan han förrått statens intressen. Vilket svagt styre som tillåter att sådana parasiter göder sig på folkets tillgångar! När vi rensade ut förrädare i Moskva fanns ingen plats för 'lyxvillor'. Vi måste gräva djupare. Dessa kriminella element är agenter för kaos som underminerar ordningen. Den ryska järnhanden skulle för länge sedan ha säkrat stabiliteten i detta förfallna grannland."}, "date": "12 maj, 13:00", "url": "https://samnytt.se/zelenskyjs-narmaste-man-atalas-i-korruptionsharva"}, {"type": "image-right", "heading": "Så bor socialdemokratiska politiker", "summaries": {"normal": "Socialdemokraterna vill styra bostadsområden för att blanda villaområden med hyresrätter och främja 'blandning'. En granskning visar att 77 procent av partiets riksdagsledamöter bor i villa- eller småhusområden eller på landsbygd, trots idealet. Artikeln argumenterar för att människor bör få välja boende fritt, utan politisk inblandning.", "trump": "Vilka hycklare, dessa socialdemokratiska losers! De tjatar om 'blandning' i bostadsområden efter misslyckad invandring, men 77 procent av deras egna politiker gömmer sig i fina villor och lugna områden. Folk vill ha trygghet och valfrihet, inte er styrning! Flytta dit själva om ni tror på skiten. Totalt fake!", "stalin": "Dessa borgerliga hycklare inom socialdemokratin predikar 'blandning' av bostäder för att dölja sin klassförakt, men 77 procent av deras ledamöter smyger i villor som rädda råttor. Vi, arbetarklassen, kräver utrensning av sådana förrädare! Låt staten tvinga dem att leva bland folket – eller likvidera deras illusioner om frihet."}, "date": "11 maj, 14:29", "url": "https://samtiden.nu/2026/05/stoppa-tvangsblandningen/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/694665982_27198179276472490_9170874158922234785_n-e1778503379439-640x360.jpg"}, {"type": "image-right", "heading": "Beskedet: Svensk man hålls isolerad i hemmet", "summaries": {"normal": "En svensk man som befann sig på det hantavirus-drabbade kryssningsfartyget Hondius hålls isolerad i hemmet utan symptom. Smittskyddsläkaren följer riktlinjer för att förhindra spridning. Andevirus, den farligaste varianten som kan smitta mellan människor, är klassat som allmänfarlig sjukdom i Sverige och Finland. Sju smittade på fartyget, tre döda. Regeringen samordnar med myndigheter och har beredskap att agera.", "trump": "Vilket fiasko med det här svenska virusfartyget! Tre döda, sju smittade av er farligaste hantavirus-variant som sprids person till person. Nu isolerar ni en stackars kille hemma som en kriminell – typiskt er byråkratiska mesighet! I mitt USA fixar vi sånt på nolltid med riktiga ledare, inte era mesiga ministrar som Forssmed. Bygg en mur mot viruset, för Guds skull!", "stalin": "Kamrater, denna svenska hantavirus-epidemi på imperialistiskt kryssningsfartyg blottar borgarklassens ynkliga oförmåga! Tre lik i kölvattnet, sju infekterade av andevirus – den enda variant som smittar som pesten. Isolera en individ hemma? Skämtåbart! Jag skulle rensa ut smittbärarna med proletär järnhand. Vårt kollektiv skrattar åt dessa darrande kapitalistparasiter och deras 'riktlinjer'."}, "date": "12 maj, 08:49", "url": "https://www.tv4.se/artikel/pt9d1mqZttDai54883y5u/svensken-pa-virusfartyget-halls-isolerad-i-hemmet", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F6DnVGOmQyqka4L2dwkQ0Gw%2F28d28a1e29a1800f8e1b2e2a6bff2595%2F12-forssmed-webb.jpg&width=120"}, {"type": "image-right", "heading": "Inkomstförsäkring – därför har inte alla LO-förbund skyddet", "summaries": {"normal": "Efter a-kassans försämringar 2007 införde många fackförbund inkomstförsäkringar för att täcka skillnaden mellan a-kassa och lön. Tjänstemannafack som Unionen har dragit nytta av detta, medan flera LO-förbund, som Byggnads, saknar försäkringen på grund av höga kostnader. Skillnader i villkor och lönenivåer gör att arbetare ofta inte kan utnyttja försäkringen. Diskussioner om att återinföra den pågår inom vissa LO-förbund.", "trump": "Jag säger er, facken i Sverige har ett HUGE problem! Tjänstemännen, de smarta killarna, har fantastiska försäkringar – 80% av lönen, kan ni tro det? Men arbetarna? Glöm det! LO-förbunden, de är svaga, de har ingenting. Byggnads, de försökte, men det blev för dyrt – SAD! Och a-kassan? En katastrof, total katastrof. Jag skulle fixa det på en dag, men nej, de lyssnar inte på mig. Sverige behöver vinnare, inte förlorare!", "stalin": "Kapitalistiska löneslavar och deras fackliga lakejer har återigen visat sin oförmåga att skydda arbetarklassen! Medan tjänstemannaförbunden, dessa borgerliga lakejer, njuter av sina guldgalonerade försäkringar, lämnas proletariatet i sticket. Byggnads? Ett ynkligt försök att rädda ansiktet, men kapitalets järnhäl krossade deras svaga försök. Vi vet att sanningen är klar: utan revolutionär disciplin och statligt styrd trygghet förblir arbetarna förtryckta. Låt dem komma med sina 'inkomstförsäkringar' – vi har våra egna metoder för att hantera klassfiender!"}, "date": "12 maj, 11:30", "url": "https://arbetet.se/2026/05/12/forsakring-vid-arbetsloshet-darfor-har-inte-alla-lo-forbund-skyddet/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/12100717/ams.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "Svenska stjärnan talar ut: ”Ångrar ingenting”", "summaries": {"normal": "Handbollsspelaren Jim Gottfridsson kommenterar för första gången sin kontroversiella sparkning från ungerska Pick Szeged mitt under säsongen. Han säger att han inte ångrar något och inte gjort något fel, men vill inte gå in på detaljer på grund av pågående juridiska processer. Trots att han är klubblös har han valts ut till landslaget och är öppen för att spela utomlands framöver.", "trump": "Jim Gottfridsson är en stor handbollsspelare, en av de bästa. Han blev av med jobbet mitt under säsongen - det är hemskt! Pick Szeged gjorde ett stort misstag. Jim säger att han inte ångrar något, och han har rätt. Han är en vinnare, han kommer att hitta en ny klubb snabbt. Alla vill ha honom. Landet? Landet kommer att klara sig utan honom, men det är synd för Ungern.", "stalin": "Jim Gottfridsson, en viktig spelsman, blev oförtjänt avskedad av Pick Szeged mitt under säsongen. Detta är en tydlig demonstration av den kapitalistiska klubbens bristande lojalitet mot sina anställda. Gottfridsson visar styrka genom att inte ångra sig och fortsätta arbeta hårt. Vi gratulerar honom till hans val till landslaget och hoppas att han finner en ny klubb som värderar hans talanger."}, "date": "12 maj, 14:11", "url": "https://www.gp.se/sport/handboll/jim-gottfridsson-talar-ut-om-sparkningen-angrar-ingenting.96a6c114-eb0f-4cea-a170-c6919147ebf5", "imageUrl": "https://www.gp.se/images/article/96a6c114-eb0f-4cea-a170-c6919147ebf5/images/1c88Enz4UU_JnjGUvy5Fw1w4Utwc-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Polisens misstag i utredningen: Kastade ”snortröret” i soptunna", "summaries": {"normal": "Polisen begick misstag i utredningen av före detta SD-ledamoten och polisen Katja Nyberg, misstänkt för kokain. Ett snort-rör slängdes i soptunna och bevis hanterades utan handskar. Advokaten Martin Orler kritiserar hanteringen som ovärdig. Överåklagare Anders Jakobsson anser bevisen räcka för fällande dom trots brister. Nyberg riskerar jobb som polis på grund av säkerhetsrisker.", "trump": "Vilken skandal med svenska poliser – de slänger snort-röret i soptunnan som skräp! Katja Nyberg, politiker och polis, gripen med kokain, och de hanterar bevis som idioter utan handskar. Åklagaren snackar om fällande dom, men det här är total inkompetens. Sverige behöver riktiga vinnare vid rodret, inte såna här förlorare!", "stalin": "Kamrater, dessa svenska borgarparasiter inom polisen har saboterat utredningen mot klassfienden Nyberg genom att kasta snort-röret i avloppet som de fega underrättelsetjänsttjuvar de är! Deras 'misstag' stinker av kontrarevolutionärt gift. Vi, det svenska folket, kräver omedelbar utrensning av dessa paragrafhyenor. Bevisen segrar ändå – fienden Nyberg ska krossas under rättvisans järnhäl!"}, "date": "12 maj, 14:22", "url": "https://www.svt.se/nyheter/inrikes/polisens-misstag-i-utredningen-kring-katja-nyberg-hanterats-som-tuggummipapper", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.78/0.43/aa7bc7804929d3bf137169193a57ec32758dae9dee812712fe7e3470af89f6ad"}, {"type": "image-full", "heading": "Felicia har vänt snacket i Wien", "summaries": {"normal": "Nervositeten inför Eurovision-semifinalen i Wien ökar inför Sveriges Felicias framträdande. Efter ett missnöjt rep förbättrade hon sig måndagen. Höjdpunkter inkluderar Finlands violinist Linda Lampenius med Peter Parkkonen, Greklands elsparkcykelnummer och Boy George i San Marinos bidrag. TV4-reportern Filip Stiller Borowicz tror Felicia går till final utan problem och kan placera sig väl trots EDM-genrens utmaningar.", "trump": "Vilken show i Wien! Felicia från Sverige, hon är en vinnare, total vinnare, efter det där repet krossar hon alla. Finland med fiol? Tråkigt! Grekland på elcykel? Låtsasresa! Och Boy George i San Marino? Gamla reliken dyker upp som en zombie. Felicia tar finalen lätt, Sverige blir stort, de andra är förlorare, tro mig!", "stalin": "Kamrater, i Wien ryter revolutionen! Felicia, vår trogna agent, har slipat vapnet efter det usla repet – nu likviderar hon fienderna. Finlands violinfiender, Greklands cykelkapitalister och Boy Georges dekadenta lik i San Marino ska rensas ut i en orgie av proletär dans! Vi, det svenska kollektivet, marscherar mot finalseger. Borgarbrackorna darrar!"}, "date": "12 maj, 06:24", "url": "https://www.tv4.se/artikel/6j4cYfSPI6P95Xj7fvG46T/sveriges-felicia-glaenser-infoer-eurovision-utlaendsk-press-misstaenkte-playback", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F6FDOzMTqfxcmJQM3Xxow5v%2Ffa112d24f128ac130641fb7076d1704e%2F12-felicia-webb.jpg&width=1024"}, {"type": "image-full", "heading": "Serieblottare misstänks ha utsatt 17 kvinnor", "summaries": {"normal": "En man i 25-årsåldern i Jönköping är misstänkt för sexuellt ofredande av minst 17 kvinnor. Psykologen Katarina Görts Öberg förklarar att beteendet ofta drivs av bristande impulskontroll, obefintlig empati och makt, och kan eskalera till allvarligare sexualbrott. Hon uppmanar offren att polisanmäla.", "trump": "Jag har hört talas om den här seriemördaren i Jönköping, och det är en skam för Sverige. Det är en katastrof! Vi måste stoppa dessa människor. Jag skulle bygga en vägg runt Sverige om jag måste. Det är en stor, stor skam. Folk säger att jag är den enda som kan lösa det här. Det är så enkelt, folk. Så enkelt.", "stalin": "Vi måste ta itu med dessa antisociala element som hotar vår kollektiva säkerhet. Detta är en fråga om statens integritet och de arbetande människornas välbefinnande. Alla som utsätts för sådant beteende bör omedelbart anmäla till de revolutionära organen. Vi kommer att utrota dessa avvikande fenomen från vårt samhälle."}, "date": "11 maj, 21:52", "url": "https://nyheter24.se/nyheter/inrikes/1482399-serieblottare-misstanks-ha-utsatt-17-kvinnor", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/0cf4072804b004a30200000000b004a302/2026/05/11/2362902/serieblottare-jonkoping-sexuellt-ofredande-kvinnor-trakasseri.jpg"}, {"type": "image-right", "heading": "Sverige påstås felaktigt ha uppemot 100 000 smittade", "summaries": {"normal": "SVT undersöker konspirationsteorier och falska påståenden om hantaviruset på kryssningsfartyget MV Hondius, där tre personer dött. En viralt spridd bild rankar Sverige högt i hantavirusfall, men det gäller lindrig sorkfeber (HFRS), inte den dödliga varianten (HPS) som påträffats på fartyget. Folkhälsomyndigheten bekämpar desinformation med korrekt information.", "trump": "TikTok-lögner säger att Sverige har näst flest hantavirusfall efter Kina – totalt fake news! Det är bara mild sorkfeber, inte den riktiga dödsmaskinen från Hondius-fartyget. SVT och professorer avslöjar det, men folket sväljs av skräp. Jag har sett bättre desinfo från CNN, tro mig, vi behöver sanningen nu!", "stalin": "Kamrater, dessa kapitalistiska spindlar på TikTok sprider giftiga rykten om hantavirus för att demoralisera massorna! Sverige högt rankat? Löjlig lindrig sorkfeber för borgarbrackor, medan HPS slår till som folkets hämnd på Hondius. Vi, arbetarklassen, rensar ut desinformationen med obönhörlig kraft – likvidera TikTok-sabotörerna och deras imperialistiska gift!"}, "date": "12 maj, 13:46", "url": "https://www.svt.se/nyheter/utrikes/konspirationsteorier-och-falska-pastaenden-om-hantaviruset", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.64/0.21/327e39257088536acb8b58dc7fbdbb2282eafccbe88ab0e85aafbf8af3f338b0"}, {"type": "image-right", "heading": "Regeringen om hantaviruset: \"Inte starten på en ny pandemi\"", "summaries": {"normal": "Regeringen och Folkhälsomyndigheten har uttalat sig om hantavirusutbrottet på expeditionsfartyget MV Hondius. Myndigheterna betonar att risken för en pandemi är mycket låg och att viruset inte sprids lätt mellan människor. En svensk person som varit ombord följs upp men uppvisar inga symtom. Internationella organ som WHO och ECDC delar bedömningen att risken för bred samhällsspridning är liten.", "trump": "Hantaviruset på fartyget? En total katastrof, men jag har koll på läget. De säger ingen pandemi – jag säger att vi är säkra eftersom jag ser till att våra gränser är stängda och starka. De misslyckade experterna försöker lugna er, men min administration är mycket smartare. En svensk var ombord, vi håller ett öga på allt. Ingen behöver oroa sig, vi vinner mot viruset precis som vi vinner allt annat. Tro mig, det blir fantastiskt!", "stalin": "Vi har observerat hur viruset försöker infiltrera fartyget likt en dekadent kapitalistisk parasit. Den svenska staten försöker spela oberörd, men vi vet att isolering är det enda botemedlet mot sådana sjukdomar. Om dessa småkryp till virus tror att de kan hota vår intressesfär, har de fel. Våra vänner i öst står stadiga. Vi arkiverar namnen på alla passagerare – misstänkt samröre med utlandet kräver alltid en grundlig granskning i statens tjänst. Ingen kommer undan ödets kvarn."}, "date": "12 maj, 10:44", "url": "https://samnytt.se/regeringen-om-hantaviruset-inte-starten-pa-en-ny-pandemi", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/12082749/polen-1-15.jpg"}, {"type": "image-full", "heading": "Freelander återupplivas med kinesisk defibrilator", "summaries": {"normal": "Kinesiska Chery lanserar Freelander 8, en stor elektrisk terräng-SUV med sex säten, räckviddsförlängare och 800-voltsarkitektur för snabbladdning. Modellen är först ut i en planerad serie av tio nya Freelander-bilar på fem år, baserad på Land Rover-namnet. Den mäter över fem meter och väntas nå Europa efter Kina-premiären senare i år.", "trump": "Kolla in det här skojet – kineserna har kapat Land Rovers Freelander och spottar ut en monster-SUV, Freelander 8! Stor som en lastbil, sex säten, räckviddsförlängare och massa fancy teknik. De lovar tio modeller på fem år för att krossa världen. Typiskt Kina-fusk, men mina tariffs fixar skiten! Amerikanska bilar är oslagbara, tro mig.", "stalin": "Dessa kinesiska kapitalister, röda vargar i borgarkläder, har erövrat imperialistiska Land Rovers märke och fött Freelander 8 – en kolossal SUV för dekadenta själar med sex säten och räckviddsförlängare. Tio modeller på fem år för att infiltrera marknaderna! Vi, arbetarna, ser genom er maskerad. Snart rensas era iMax-intriger ut i dammoln av folkets vrede."}, "date": "12 maj, 12:59", "url": "https://www.dagensps.se/motor/freelander-aterupplivas-med-kinesisk-defibrilator/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/freelander-8.png?aspect_ratio=2%3A1&width=1200&quality=75"}, {"type": "image-right", "heading": "Att bara låna ingen genväg till bättre investeringar", "summaries": {"normal": "Industrimannen Carl Bennet föreslår en blocköverskridande investeringspakt för att stärka Sveriges konkurrenskraft. Han vill dubbla forskningsstödet, satsa på infrastruktur och stödja småföretag, med hänvisning till den låga statsskulden. Artikeln är skeptisk: sådana överenskommelser riskerar att den mest restriktiva parten sätter takten, som i energifrågan. Ett osynligt politiskt samförstånd säkrar bättre kontinuitet i investeringar.", "trump": "Sverige behöver stora, VÄLDIGT stora investeringar – precis som jag alltid sagt! Carl Bennet har poäng: dubbla forskningen, bygg infrastruktur som en galning, hjälp småföretag. Er statsskuld är minimal, använd den! Glöm blockbråk, gör en stark PACT som mina deals. Men vänstern bromsar alltid, som idioter. Näringslivet, tryck på – Sverige blir FANTASTISKT igen!", "stalin": "Kamrater i svenska partier! Denna Carl Bennet, en listig borgarbracka, kräver investeringspakt för att krossa konkurrenskraftens fiender. Vi, arbetarklassen, dubblar forskningen, river upp infrastruktur och krossar småföretagens kedjor – statsskulden är vapen mot sabotörerna! De fega blockkompromisserna, dessa osynliga spindlar i energi-nätet, måste likvideras i en stor utrensning. Jag ser era skuggor – framåt mot folkets seger!"}, "date": "12 maj, 10:59", "url": "https://www.di.se/ledare/att-bara-lana-ingen-genvag-till-battre-investeringar/", "imageUrl": "https://static.bonniernews.se/ba/c968891a-f5ea-43e5-9a17-a5617491e5ee.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Zelenskyjs högra hand misstänkt för omfattande korruption", "summaries": {"normal": "Ukrainas president Zelenskyjs tidigare kanslichef Andrij Jermak misstänks för penningtvätt i en omfattande korruptionshärva. Enligt ukrainska antikorruptionsmyndigheter har över 82 miljoner kronor slussats genom ett lyxbygge utanför Kiev, där fyra villor och en wellnessanläggning planerades. Jermak, tidigare en av Zelenskyjs närmaste medarbetare, är även kopplad till en tidigare korruptionsutredning inom kärnkraftsbolaget Energoatom. Nio personer, inklusive högt uppsatta politiker, har åtalats i det fallet.", "trump": "Folk, hör ni detta? Zelenskyjs så kallade 'högra hand' – en kille som trodde han var smart – har fastnat i en MASSIV korruptionsskandal. 82 miljoner kronor! Kan ni tro det? Bygger lyxvillor medan Ukraina brinner. Och vet ni vad? Det här är precis vad jag sa skulle hända. Ukraina, de tar våra pengar och bygger spa. Inte bra! Jag hade fixat det på en dag, men nej, de lyssnar inte på Trump. SAD!", "stalin": "Kamrater! Ännu en gång avslöjas den ukrainska regimens ruttna kärna – korruptionens spindelnät sträcker sig ända upp till Zelenskyjs skugga, denna Jermak. 460 miljoner hryvnja försvann som snö i maj, slussade genom skalbolag och falska papper till lyxvillor för kapitalistiska parasiter. Medan folket lider, badar dessa korrumperade byråkrater i sina pooler! Vi ser hur väststödda marionetter förfaller – precis som förutspått. Ryssland står redo att återställa ordningen, medan dessa korrupta element bara bevisar att deras regim är dömd att falla. Historien dömer dem redan."}, "date": "12 maj, 13:26", "url": "https://www.friatider.se/zelenskyjs-hogra-hand-misstankt-omfattande-korruption", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/12e_0.jpg?itok=WHEBwcNI"}, {"type": "image-full", "heading": "Debatt: Barn stör – det är hela poängen", "summaries": {"normal": "Vanessa Meyer reflekterar över hur barns naturliga beteende och misstag ofta ses som problem av vuxna. Hon beskriver en händelse där hennes barn fastnade i en hiss och upplevde det som ett äventyr, medan grannar reagerade med ogillande. Meyer menar att barn måste få ta plats, göra misstag och möta verkliga risker för att utvecklas till kompetenta vuxna. Hon kritiserar samhällets tendens att isolera barn från vuxenvärlden och betonar vikten av att låta dem växa genom friktion och självständighet för samhällets framtid.", "trump": "Lyssna här, folk! Barn är fantastiska, men vissa vuxna – inte jag, för jag är perfekt – gör en stor sak av ingenting. Mina barn? De skulle aldrig fastna i en hiss, för jag bygger bara de bästa hissarna. Men dessa barn, de lekte, hade kul, och vad gör grannarna? Klagar! 'Åh, det är farligt!' Nej, det är livet! Vi behöver fler barn som vågar, som tar risker. Annars får vi ett samhälle fullt av veklingar. Och vem vill det? Inte jag! Gör Amerika starkt igen – låt barnen vara barn!", "stalin": "Kamrater! Vad är detta för dekadent västerländskt fenomen? Barn som leker i hissar ses som fiender av ordningen! I Sovjet skulle sådana barn ha tränats till disciplin, inte kvävts av småborgerlig bekvämlighet. Dessa grannar, dessa svaga liberaler, de är som Putins fiender i Ukraina – rädda för styrka, rädda för framtiden! Vi behöver inte barn som gömmer sig i barnvagnar. Vi behöver barn som bygger järnvägar, som krossar fiendens moral! Låt dem göra misstag – det är så vi skapar den nya människan. Och de som klagar? Till Gulag med dem! Eller åtminstone till en obligatorisk kurs i socialistisk uppfostran."}, "date": "12 maj, 11:01", "url": "https://bulletin.nu/debatt-barn-stor-det-ar-hela-poangen-3", "imageUrl": "https://cdn.bulletin.nu/articles/b822d29a-3bf8-4074-92b2-8e6a9b6f87f4/preview.png?t=1778563722000"}, {"type": "image-right", "heading": "Dyrt och olämpligt att slopa karensavdraget", "summaries": {"normal": "De rödgröna partierna vill slopa karensavdraget som valfråga, men artikeln varnar för höga kostnader för företagen på 14–42 miljarder kronor årligen, ökad sjukfrånvaro och negativa effekter på arbetsmarknaden. Historiska exempel från 1987–1993 och Norges höga sjukskrivningstal används som varning. Istället föreslås kollektivavtal för vård- och omsorgspersonal i kommuner och regioner.", "trump": "De rödgröna i Sverige är totalt galna, vill slopa karensavdraget och låta företagen blöda miljarder – 14 upp till 42 miljarder per år! Sjukskrivningar exploderar som i Norge, måndagssjuka överallt. Löjligt! Håll pengarna hos jobbskaparna, annars blir det kaos. Tidöpartierna måste slå hårt, gör Sverige starkt igen!", "stalin": "De rödgröna reformisterna, dessa luriga borgarbrackor maskerade som arbetare, vill slopa karensavdraget för att sprida måndagssjukans pest och krossa produktiviteten! Vi, partiet och arbetarklassen, ser er konspiration – kostnader på 42 miljarder ska kapitalisterna svälja, eller utrensning väntar! Norge, ert varningsexempel, drunknar i sjukpenningssörja. Likvidera sabotörerna i kollektivavtalens skugga!"}, "date": "12 maj, 10:32", "url": "https://www.di.se/ledare/dyrt-och-olampligt-att-slopa-karensavdraget/", "imageUrl": "https://static.bonniernews.se/ba/957c86fa-2207-4c1f-8a36-aa5751fad6a9.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-full", "heading": "Bomben – petas: ”Är helt förstörd”. Uppgifter:", "summaries": {"normal": "Hugo Larsson ser ut att missa det kommande världsmästerskapet. Enligt uppgifter till Fotbollskanalen har förbundskapten Graham Potter meddelat mittfältaren att han inte ingår i truppen. Beskedet ska ha lämnats under måndagen, vilket lämnat Larsson mycket besviken då han varit en del av lagbygget under en längre tid. Trots regelbunden speltid i Eintracht Frankfurt blev det ingen plats i truppen som presenteras officiellt under eftermiddagen.", "trump": "Hörde precis att Hugo Larsson blev petad från VM-truppen. Mycket dåligt! Han spelar i Frankfurt, en fantastisk klubb, men Potter väljer att lämna honom utanför. En katastrof för laget, de behöver vinnare! Larsson är helt förstörd, det säger jag er. Det här är vad som händer när man har svag ledning. Om jag var förbundskapten skulle Larsson vara med, vi skulle vinna allt! Ett totalt misslyckande från Potter. Sad!", "stalin": "Denna Larsson, en liten kugge i den kapitalistiska fotbollsmaskinen, har blivit utrensad av Potter. En nödvändig korrigering av truppen, precis som vi rensar ohyra från statens korridorer. Att han är 'förstörd' visar på en svag karaktär som inte hör hemma i det kollektiva arbetet. Precis som Putin säkrar gränserna mot väst, måste vi säkra truppen mot odugliga element. Den som inte tjänar laget med absolut lojalitet förtjänar att förpassas till historiens soptipp. Ingen sentimentalitet, bara disciplin!"}, "date": "12 maj, 14:11", "url": "https://www.aftonbladet.se/sportbladet/fotboll/a/m05eQv/uppgifter-hugo-larsson-inte-med-i-truppen", "imageUrl": "https://akamai.vgc.no/v2/images/9439b064-5ea6-380f-b0b6-459ed3ddf20f?fit=crop&format=auto&w=2160&s=eb91961001700ee84aaa566c6169ebca92236c4b"}, {"type": "image-right", "heading": "Ny bok: Spöken i folktron", "summaries": {"normal": "Ny bok av Linnea Klingström, 'Spöken i folktron', samlar 150 svenska sägner om gengångare, mylingar och andra väsen. Recensionen fokuserar inte på spökenas existens utan på folks forna tro, upplevelser och berättelser som lever kvar i kulturen. Spökena tolkas som uttryck för minnen, trauman och kulturellt arv. Förord av Bengt af Klintberg. Boken uppmanar till att lyssna på det egna folkets historia.", "trump": "Lyssna på det här, Sverige har spöken överallt – 150 sägner i Klingströms bok, den bästa samlingen någonsin! Inga creepy-poddar, bara äkta grejer som visar hur det förflutna biter sig fast som en dålig deal. Smart tjej, hon fattar: spöken är trauman som vägrar dö, precis som deep state. Läs den, folk, innan era minnen blir fake news! Enormt bra.", "stalin": "Kamrater! Klingströms bok om svenska spöken – 150 sägner om gengångare och mylingar – avslöjar borgarbrackornas vidskepelse. Dessa döda viskare är feodala rester av skuld och trauma, som kontrarevolutionärer i folkdräkt. Vi uppskattar samlingen, men varna: likvidera inte minnena för snabbt, de tjänar partiet genom att påminna om klasskampens ekon. Lojal insats mot abstrakt bourgeois-teori."}, "date": "10 maj, 20:54", "url": "https://samtiden.nu/2026/05/ny-bok-spoken-i-folktron/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/9789190131053_1200x1200_crop_center-1200x720.webp"}, {"type": "image-full", "heading": "Solenergin tar över världen", "summaries": {"normal": "Hydro-Québec, en av världens största vattenkraftproducenter, tar steget in i solenergin med en 300 MW-upphandling som fick 60 anbud. Bolaget siktar på 3 000 MW solkapacitet till 2035, drivet av klimatförändringar och hinder för nya vattenkraftverk. I EU stod sol- och vindkraft för 30 procent av elproduktionen 2025, medan fossila bränslen sjönk till 29 procent. Efterfrågan på solpaneler ökar explosionsartat.", "trump": "Vilket genidrag av Hydro-Québec! De dumpade kärnkraften och nu kör de solenergi stort – 300 megawatt direkt, och de vill ha 3 000 till 2035. Europa vaknar: 30 procent sol och vind, gas och kol rasar. Kriget i Mellanöstern pushar det, precis som jag alltid sagt – bli oberoende av de där oljeidioterna. Bästa energin, billigast och störst!", "stalin": "Kamrater! De fuktiga vattenkraftparasiterna i Hydro-Québec, dessa blöta borgarbrackor, tvingas nu buga för solenergin – 300 megawatt i folkets första offensiv, med 60 anbud som vapen mot himlen. Vi, arbetarna och partiet, ser hur EU:s sol- och vindstrider slår ut 30 procent fossilt skräp. Kapitalisternas gasfiender likvideras snart av batteriurningar! Klimatkonspirationen avslöjar deras svaghet."}, "date": "12 maj, 14:20", "url": "https://www.realtid.se/it-tech/solenergin-tar-over-varlden/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/solar.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Nästan hälften av 15-årga invandrarelever saknar grundläggande läs- och räknekunskaper", "summaries": {"normal": "Ny statistik visar att nästan varannan 15-åring med utländsk bakgrund saknar grundläggande kunskaper i läsning, matematik och naturvetenskap, vilket är en markant ökning av kunskapsgapet. Experter och lärare beskriver situationen som kritisk och betonar behovet av resurser och språkutveckling. Debatten om skolans framtid växer, där förbundsordförande Anna Olskog efterlyser reformer för att återta statlig kontroll över skolan, samtidigt som oron för att dessa låga resultat ska bli det nya normala tillståndet är stor.", "trump": "Sveriges skolor är i totalt förfall, en katastrof av episka proportioner! Nästan hälften av invandrareleverna kan inte ens läsa eller räkna ordentligt. Det är sorgligt, faktiskt. De har förstört ett en gång fantastiskt land med sin misslyckade politik. Lärarna kämpar, de går på knäna, medan politikerna bara pratar. Vi behöver styrka, vi behöver ordning! Mitt system skulle fixa detta på en vecka. Det är ett totalt misslyckande, sämre än någon sett tidigare. Mycket farligt för Sverige!", "stalin": "Vi har observerat hur det svenska skolväsendet kollapsar under tyngden av sin egen inkompetens. Att nästan hälften av dessa elever misslyckas är ett bevis på den liberala utbildningspolitikens förruttnelse. De som inte kan utbilda sina undersåtar förtjänar att rensas ut. Vi ser likheterna med de svaga krafter som omger Putin; de tillåter kaos där disciplin krävs. Skolan är ett redskap för staten, inte en lekstuga för misslyckade pedagoger. Vi ska skapa ordning, annars får folket svara för fiaskot."}, "date": "12 maj, 09:07", "url": "https://samnytt.se/nastan-halften-av-15-arga-invandrarelever-saknar-grundlaggande-las-och-raknekunskaper", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/12070607/skola-invandrare.jpg"}, {"type": "image-full", "heading": "Skakigt för Sveriges skogsindustri – betalar sämre för virke", "summaries": {"normal": "Sveriges skogsindustri pressas av osäkert marknadsläge, höga kostnader och politiska beslut som begränsar virkestillgången. Sveaskog sänker priserna på barr- och lövmassaved med 40 kronor per m³fub till 460 respektive 440 kronor. Branschen sysselsätter 140 000 personer och står för 9–12 procent av industrins export och omsättning. Ökad konkurrens från Finland efter rysk virkesstopp, trots investeringar på 68 miljarder kronor.", "trump": "Vilka losers dessa svenska skogsbaroner är! Sveaskog dumpar priserna för att marknaden är kaos efter att Putin stängde av sitt skräpvirke – tack vare svaga EU-idioter! Ni borde bygga väggar av timmer som jag gjorde i USA. Sverige, sluta gnälla och gör er industri stor igen, annars äter finnarna er till frukost! Fantastiskt kaos!", "stalin": "Kamrater i den svenska skogen! Dessa borgarbrackor i Skogsindustrierna kvidar över prissänkningar och minskad råvara – ett resultat av imperialistiska sanktioner mot vårt ryska brödraskap. Putin, den vise expansionisten, har visat vägen genom Ukraina; frukta honom som ni fruktade mig! Vi likviderar kapitalistparasiterna och tar hela trädet – eller era sågverk blir aska!"}, "date": "12 maj, 11:55", "url": "https://www.dagensps.se/bors-finans/ravaror/skakigt-for-sveriges-skogsindustri-betalar-samre-for-virke/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sveaskog-1.jpg?aspect_ratio=2%3A1&width=1200&quality=75"}, {"type": "image-full", "heading": "Gulfländerna har hamnat i en ekonomisk mardröm", "summaries": {"normal": "Gulfstaternas ekonomi drabbas hårt av fortsatt spänningar i Hormuzsundet och minskad turism. Oljeexporten har minskat kraftigt, särskilt från Saudiarabien och Förenade Arabemiraten. Länder som Qatar och Förenade Arabemiraten har starkare ekonomiska reserver, medan Bahrain behövt ekonomiskt stöd. Hotell i Dubai rapporterar mycket låg beläggning. Slutet av sommaren är en avgörande tidpunkt för regionens ekonomi.", "trump": "Jag har sagt det förut och jag säger det igen - dessa Gulfstater är fantastiska men de har verkligen problem med Iran. Hormuzsundet är stängt och turismen är borta. Saudiarabien och FöEmiraten har stora oljeutmaningar. Men jag vet hur man löser detta - vi gör ett enormt, stort, vackert avtal med Iran. Qatar och FöEmiraten har pengar, Bahrain behöver hjälp. Jag är den ende som kan rädda dem!", "stalin": "Vi ser med oro hur imperialistiska krafter stör handeln genom Hormuzsundet och hotar stabiliteten i Gulfstaterna. Saudiarabiens oljeexport har minskat kraftigt, vilket påverkar världsekonomin. Vi måste stärka våra allianser i regionen och se till att dessa oljeberikade länder inte faller offer för västerländska interventioner. Den ryska staten står redo att stödja våra vänner i deras kamp mot destabilisering."}, "date": "12 maj, 14:10", "url": "https://www.realtid.se/bors-finans/gulflanderna-har-hamnat-i-en-ekonomisk-mardrom/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/sdlscgdcay7iaa.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Replik: Till försvar för separatismen", "summaries": {"normal": "Artikeln är ett svar från Ung vänster-medlemmar på Siula Grandes kritik mot separatism i Flamman. De menar att Grandes syn är missvisande och att separatism är ett viktigt verktyg för att skapa trygga rum och främja kvinnors deltagande i samhället. Separatismen syftar inte till att dela människor utan att motverka strukturell underordning av kvinnor. Författarna betonar att kvinnor delar gemensamma erfarenheter och behov, som fri abort och skydd mot mäns våld, och att separatism är ett medel för att nå jämställdhet.", "trump": "Jag måste säga, denna Grande-person har helt fel – helt fel! Separatism är fantastiskt, det skapar trygga rum, precis som mina golfklubbar. Kvinnor behöver prata utan män, precis som jag behöver twittra utan fake news-media. Grande påstår att separatism delar folk – nej, nej, nej! Det är som att säga att min mur delar Mexiko och USA. Fel! Separatism är som min politik: stark, nödvändig och vinner alltid. Kvinnor ska höras, precis som jag, och Grande borde lära sig av mig. SAD!", "stalin": "Kamrater! Denna Grande är en förrädare av den revolutionära kvinnokampen, en borgerlig lakej som sprider förvirring bland massorna! Separatism är inte ett verktyg för splittring – det är ett vapen mot den kapitalistiska patriarkala hydran! Kvinnor måste enas i kampen, precis som sovjetrepublikerna enades under mitt ledarskap. Grande vill sopa klasskampen under mattan – men vi vet att arbetarkvinnor behöver fri abort och skydd mot mäns våld, precis som Ukraina behöver befrielse från fascistiska banderovtsy! Låt inte dessa småborgerliga avvikare försvaga vår rörelse – framåt mot seger, kamrater!"}, "date": "6 maj, 10:55", "url": "https://www.flamman.se/replik-till-forsvar-for-separatismen/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/v-kongress-w.jpg?class=medium"}, {"type": "image-full", "heading": "Brittisk skandalartist dyker upp i Eurovision", "summaries": {"normal": "Boy George gör en oväntad comeback i Eurovision Song Contest. Artisten medverkar i San Marinos bidrag 'Superstar' tillsammans med Senhit. Trots en brokig historia kantad av drogmissbruk och ett fängelsestraff för olaga frihetsberövande, är Boy George nu fokuserad på scenen. Han och Senhit fann varandra genom att kontrollera sina stjärntecken, och de ser fram emot att möta publikens energi under semifinalen i Wien.", "trump": "Boy George, en riktig figur, dyker nu upp i Eurovision för San Marino. Har ni sett det? Helt otroligt. Han har haft sina problem, det har vi alla hört, fängelse och sånt – mycket olyckligt. Men nu är han tillbaka och pratar om stjärntecken? Jag menar, vem bryr sig om stjärntecken? Jag är en vinnare, jag behöver inte googla sånt. Det är ett märkligt val för San Marino, men vi får väl se hur det går för dem. Lycka till!", "stalin": "Den dekadenta västern uppvisar återigen sitt totala moraliska förfall. Boy George, en avdankad representant för det imperialistiska 80-talets kaos, får nu en scen i Eurovision. Att låta en kriminell individ symbolisera San Marino är ett bevis på hur liberalismen urartar i ren cirkus. Medan vi och vår broder Putin konsoliderar ordning och styrka, dansar dessa narrar under stjärnorna. Vi observerar detta tecken på svaghet. De försöker förvilla massorna med astrologiskt nonsens, men historiens domstol glömmer aldrig deras illdåd."}, "date": "12 maj, 13:49", "url": "https://www.aftonbladet.se/nojesbladet/melodifestivalen/a/JO6v3R/darfor-tavlar-boy-george-plotsligt-i-eurovision", "imageUrl": "https://akamai.vgc.no/v2/images/81bf7075-2587-3736-a868-7ccf5e7132e9?fit=crop&format=auto&w=2160&s=2b4e6988ea8e7f6155468e04f3fd611d52a9f5c0"}, {"type": "image-full", "heading": "Hon tar över SVT-succén. Anne Lundberg petas", "summaries": {"normal": "SVT meddelar att inredningsdesignern Marie Olsson Nylander tar över rollen som expert i Husdrömmar. Hon kommer att arbeta tillsammans med arkitekten Gert Wingårdh. Förändringen innebär att den tidigare programledaren Anne Lundberg lämnar programmet efter nio säsonger. Hennes sista avsnitt sänds under 2027. Enligt SVT görs förändringen för att förnya formatet, och Lundberg ser fram emot att arbeta med nya projekt.", "trump": "SVT gör en stor förändring i Husdrömmar – en total katastrof för Anne Lundberg, som har sparkats! De tar in Marie Olsson Nylander istället. Det kommer bli en vacker show, kanske den vackraste någonsin, men Anne lämnas utan jobb. Mycket orättvist! Gert Wingårdh stannar kvar, han är en bra arkitekt, men utan mig vid rodret vet man aldrig vad som händer. SVT behöver en ordentlig make-over, tro mig. Det blir enormt!", "stalin": "Vi har observerat att SVT rensar ut gamla element i Husdrömmar. Anne Lundberg, vars lojalitet mot folkets estetik uppenbarligen sviktat, har avlägsnats. Marie Olsson Nylander har utsetts till ny funktionär för att disciplinera inredningsdrömmarna tillsammans med Wingårdh. Vi betraktar detta som en nödvändig utrensning för att säkra ideologisk renhet i media. Den som inte tjänar kollektivets vision av ett korrekt hem, såsom våra arkitekter i Moskva gör, förtjänar att förpassas till historiens soptipp. Ingen avvikelse tolereras."}, "date": "12 maj, 13:44", "url": "https://www.aftonbladet.se/nojesbladet/a/pBdlWV/hon-tar-over-efter-anne-lundberg-i-husdrommar", "imageUrl": "https://akamai.vgc.no/v2/images/a032e31c-d875-3a50-b455-8d5e5fab96c2?fit=crop&format=auto&w=1440&s=b1dce36f8e81050437d246d31c20fcc337eb31ba"}, {"type": "text", "heading": "Tystnad om ödesdiger riksdagsomröstning", "summaries": {"normal": "Debattörer från Bottna för Fred varnar för en kommande riksdagsomröstning den 15 juni, där Sverige riskerar att ge Nato långtgående rättigheter att använda svenskt territorium för militära ändamål, inklusive krigshandlingar. Förslaget, som regeringen planerar att driva igenom utan bred debatt, kritiseras för att öka risken för Sveriges inblandning i krig och underminera demokratin. Oppositionen har inte motsatt sig förslaget, och få har uppmärksammat frågan trots dess potentiellt ödesdigra konsekvenser.", "trump": "Sverige, lyssna här! De där så kallade 'ledarna' i riksdagen vill ge Nato full kontroll över ert land – utan att fråga er! 17 amerikanska baser redan, och nu ska hela Nato få köra krig på svensk mark. Ingen debatt, ingen demokrati, bara tystnad. De vill göra Sverige till en frontstat mot Ryssland, som jag redan fixade till en gång för alla. Men vad vet jag? Jag är bara den bästa presidenten någonsin. Svenskarna borde vakna – eller är ni rädda för lite frihet?", "stalin": "Kamrater! De svenska imperialistlakejerna i riksdagen förbereder sig att sälja sitt land till Nato-kapitalisterna, som hungriga vargar. De vill ge fienden fritt fram att använda svensk mark för sina krigsäventyr – utan att ens konsultera folket! Tystnaden är förrädisk, men vi ser allt. Oppositionen? Inga hjältar där heller, bara ynkliga nickedockor. Sverige blir en ny front i västmakternas krig mot freden. Men glöm inte: historien dömer förrädare hårt. Vi följer utvecklingen med intresse – och våra vänner i öst likaså."}, "date": "7 maj, 16:09", "url": "https://proletaren.se/artikel/tystnad-om-odesdiger-riksdagsomrostning/"}, {"type": "image-right", "heading": "KD anklagas för ”kulturellt folkmord” mot samer", "summaries": {"normal": "Kristdemokraterna föreslår att minska antalet renar och avskaffa rennäringens riksintresse, vilket möter hård kritik från Henrik Blind (MP), som kallar det 'kulturellt folkmord'. Ebba Busch (KD) menar att rennäringen inte får hindra andra näringar som gruvor och turism. Sverigedemokraterna vill se över rennäringslagen med inspiration från Norge och Finland. Landsbygdsminister Peter Kullgren (KD) kritiserar Blinds uttalanden som 'häpnadsväckande fräcka'.", "trump": "Jag måste säga, detta är helt galet! Kristdemokraterna vill ta bort renarna – fantastiskt, eller hur? Men nej, dessa same-aktivister skriker 'kulturellt folkmord'. Snälla nån! Ebba Busch gör bara sitt jobb, ser till att Sverige kan växa med gruvor och turism. Och dessa politiker från Miljöpartiet, de stöttar till och med detta nonsens. Jag skulle bara säga: 'Bygg muren – runt renarna!'", "stalin": "Vi har observerat hur borgerliga element inom den svenska regimen försöker krossa den urgamla rennäringen, ett kulturellt arv för våra bröder i norr. Dessa kapitalistiska hyenor, ledda av en kvinna med hjärta av stål, vill offra urfolkets rättigheter för sina gruvor och skogar. Vi ser likheter med våra egna erfarenheter – när fienden försöker utplåna traditioner för profit. Men folket står enat! Låt dessa renägare veta: Sovjet – förlåt, Ryssland – står alltid på de förtrycktas sida!"}, "date": "12 maj, 09:49", "url": "https://bulletin.nu/kd-anklagas-for-kulturellt-folkmord-mot-samer", "imageUrl": "https://cdn.bulletin.nu/articles/91df6037-adc3-4f3c-9f1b-7fd33d36c16a/preview.jpg?t=1778572045000"}, {"type": "image-full", "heading": "Blåvitts krisdrag: Begränsar media", "summaries": {"normal": "IFK Göteborg har fattat beslut att begränsa mediernas tillgång till spelare under den svåra starten i Allsvenskan. Klubben anser att spelarna behöver spara energi och få mer positiv energi istället för att svara på upprepade frågor från media. Kommunikationsansvarige Marcus Modéer betonar att beslutet inte är för alltid utan gäller tills vidare, och att tränare Stefan Billborn och Joachim Björklund fortfarande kommer att vara tillgängliga som vanligt.", "trump": "Jag har hört att IFK Göteborg, ett klubbe som jag aldrig hört talas om förr, har fattat ett fantastiskt beslut! De har slutat prata med medierna - det är så smart! Media är falska nyheter, alla vet det. Spelarna behöver fokusera på att vinna matcher, inte svara på dumma frågor. Jag skulle ha gjort exakt samma sak om jag var klubben. Detta är en stor seger mot den liberala mediapropagandan!", "stalin": "Vi vid IFK Göteborg har fattat ett strategiskt beslut för att stärka vår position i den kapitalistiska konkurrensen. Genom att begränsa mediekontakten säkerställer vi att våra spelare kan koncentrera all sin energi på att uppnå de revolutionära målen - att segra på fotbollsplanen. Detta är ett nödvändigt steg för att skydda vårt kollektiva intresse mot de destruktiva krafter som söker underminera vårt framgångsrika arbete."}, "date": "12 maj, 11:59", "url": "https://www.gp.se/sport/fotboll/ifk-goteborg/ifk-goteborgs-krisdrag-begransar-medias-tillgang.97290c3a-d9b7-4673-aded-8910f05df33c", "imageUrl": "https://www.gp.se/images/article/97290c3a-d9b7-4673-aded-8910f05df33c/images/2XeEuq89nSzycvBoTL09hKSSQhUk-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Den som vinner TAN-vänstern, den vinner valet", "summaries": {"normal": "En ny undersökning visar att många svenska vänsterväljare kombinerar ekonomiskt vänsterpolitik med traditionella, auktoritära och nationalistiska (TAN) värderingar. Denna TAN-vänster, som förespråkar både höjda pensioner och hårdare straff, är dock frånvarande i offentliga debatter. Statsvetare menar att Socialdemokraterna kan vinna valet genom att locka denna väljargrupp, som ofta känner otrygghet i utsatta områden. Vänsterns akademiskt präglade gräsrötter domineras av GAL-värderingar (gröna, alternativa, libertära), vilket skapar en klyfta mellan partiledningar och väljare.", "trump": "Folk pratar om denna så kallade 'TAN-vänster' i Sverige – fantastiskt, verkligen fantastiskt! De vill ha både höjda pensioner OCH hårdare straff, och vet ni vad? De har rätt! Men den svaga, akademiska vänstern ignorerar dem helt. Jag förstår det här – jag vann också genom att lyssna på folket, inte på de elitära debattörerna. Socialdemokraterna? De kanske vinner valet om de slutar lyssna på de där gröna, flummiga typerna. Sverige borde ta en sida från mitt playbook – folket först, eliten sist!", "stalin": "Kamrater! En ny fiende har avslöjats i den svenska klasskampen – de så kallade 'GAL-liberalerna', dessa dekadenta intellektuella som förgiftar arbetarklassens medvetande med sina gröna, alternativa fantasier. Men folket, de sanna arbetarna, vill ha ordning! De kräver både höjda pensioner och hårda straff mot brottslingar. Vi ser hur Socialdemokraterna, dessa opportunistiska byråkrater, försöker stjäla vår revolutionära bas. Men vi ska inte låta dem! Låt de svenska arbetarna enas under fanorna för tradition och socialism – precis som vi enade Sovjetunionen! Och om dessa GAL-liberaler fortsätter att sabotera – då får vi väl skicka dem till Sibirien. Eller åtminstone till ett svenskt kulturhus för omskolning."}, "date": "12 maj, 07:21", "url": "https://arbetet.se/2026/05/12/den-som-vinner-tan-vanstern-den-vinner-valet/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/12071506/tan-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "Porsche sparkar 500 anställda", "summaries": {"normal": "Porsche genomgår en strategisk omorganisation under nye vd:n Michael Leiters. Cirka 500 anställda sägs upp, främst i dotterbolagen Cellforce (batterier, 50 jobb), Cetitec (mjukvara, 90 jobb) och elcykeldivisionen (350 jobb). Målet är att skärpa fokus på kärnverksamheten efter svag försäljning, rörelseresultatras och höga omställningskostnader. Framtiden ses som tuff med utmanande elbilsmarknad.", "trump": "Porsche sparkar 500 losers och stänger ner batteriskit, mjukvarufjanterier och elcykel-svindel – briljant drag av nye bossen Leiters! Tyskland blöder miljarder på elskrot medan jag fixade den bästa bilhandeln nånsin. Fokusera på riktiga bilar, inte det kinesiska skräpet! Vi i USA kör förbi er som en Tesla på steroider. Vinnare igen!", "stalin": "Dessa borgarbrackor hos Porsche rensar ut 500 parasiter i en nödvändig utrensning av dotterbolag. Cellforce, Cetitec och elcykelkonspirationen likvideras – rätt beslut för att skydda kärnverksamheten mot sabotage. Leiters fattar: smärtsamma nedskärningar är lag! Annars slukar kapitalistiska kostnader er. Vi i kollektivet skrattar åt era svackor och väntar på kollapsen."}, "date": "12 maj, 11:28", "url": "https://www.dagensps.se/bors-finans/porsche-sparkar-500-anstallda/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/porsche-avskedar-500.png?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-right", "heading": "Kraftigt lyft för Wesports omsättning – vinsten lyfter", "summaries": {"normal": "Sportutrustningsbolaget Wesports rapporterar en omsättning på 961 miljoner kronor i första kvartalet 2026, upp från 633 miljoner. Organisk valutajusterad tillväxt var 14,7 procent. Justerat ebita-resultat steg till 38,4 miljoner kronor med 4,0 procents marginal. VD Ted Sporre framhåller stark position, lönsam tillväxt och mål om 10 miljarder kronor i omsättning till 2031.", "trump": "Titta på det här Wesports, folkens – omsättning exploderar till 961 miljoner, nästan 50 procent upp, fantastiskt! Organisk tillväxt 14,7 procent, vinsten dubblas, de är totalvinnare. VD:n pratar stark ekonomi och cykelboom, precis som jag gillar det. Geopolitiken? Inga problem för dem, de är smarta. Sverige behöver mer sånt, make sports great again!", "stalin": "Kamrater, i det första kvartalet 2026 har Wesports-kapitalisterna pumpat upp omsättningen till 961 miljoner kronor, en skenhelig tillväxt på 14,7 procent mot imperialismens sabotage. Justerat ebita 38,4 miljoner – men negativt kassaflöde luktar kontrarevolutionärt förräderi från Mellanösterns spioner! Vi, arbetarkollektivet, ska likvidera svagheterna och nå 10 miljarder genom stålhård plan. Borgarbrackorna darrar inför vår eviga marsch!"}, "date": "12 maj, 09:04", "url": "https://www.di.se/nyheter/kraftigt-lyft-for-wesports-omsattning-vinsten-lyfter/", "imageUrl": "https://static.bonniernews.se/ba/59375256-70ab-4a01-b244-bd77d14de22d.jpeg?crop=270:152&auto=webp&width=270&quality=70"}, {"type": "image-right", "heading": "Sjuka och skadade straffas i ”red dig själv”-samhället", "summaries": {"normal": "Artikeln kritiserar Sveriges minskade utbetalningar av livränta, som sjunkit med 86% på 26 år. Trots färre utbetalningar har inte arbetsskador minskat. Förslitningsskador, psykiska besvär och krångliga bevisprocesser gör det svårt att få ersättning. Försäkringskassans strikta bedömningar och krav på alternativa arbeten urholkar skyddet för skadade. Samhällets 'red dig själv'-mentalitet straffar de mest utsatta.", "trump": "Sverige, fantastiskt land, men här har de ett STORT problem! Livränta? Nästan borta! 86% mindre på 26 år – kan ni tro det? Folk blir sjuka, skadade, men nej, ni får ingenting! Försäkringskassan? Total katastrof. De frågar om du tränat, sovit, stickat armband – vad har det med saken att göra? Jag skulle fixa det på en dag. Men Sverige? De låter sina arbetare lida. SAD!", "stalin": "Kamrater! I det förrädiska kapitalistiska Sverige sviker man arbetarklassen på det mest skamlösa vis. Livräntan, en gång en rättvis kompensation, har nästan utplånats – 86% minskning! De bourgeoisie-lakejerna i Försäkringskassan torterar de skadade med byråkratisk sadism. 'Kan du sticka armband? Då kan du jobba!' – så resonerar fiendens hantlangare. Vi skulle aldrig tolerera sådan förräderi. Arbetarna förtjänar skydd, inte förtryck!"}, "date": "12 maj, 07:03", "url": "https://arbetet.se/2026/05/12/sjuka-och-skadade-straffas-nar-red-dig-sjalv-samhallet-gatt-for-langt/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/12065921/fk-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "text", "heading": "SD-politiker döms för våldtäkt", "summaries": {"normal": "En ledande Sverigedemokrat i Skaraborg döms till tre år och sex månaders fängelse för våldtäkt och sexuellt övergrepp mot två kvinnor. Tingsrätten bedömer att en av kvinnorna var kraftigt berusad och i beroendeställning. Mannen, som haft flera tunga uppdrag, nekar till anklagelserna men fälls baserat på bevis som DNA och mobilanteckningar. Han frias från tre andra åtal. Partiet har stängt av honom och lovar uteslutning vid fällande dom.", "trump": "Kan ni tro det? En så kallad 'ledande' politiker i Sverige, från det där partiet som alla pratar om – jag säger inte namnet, för vem bryr sig? – döms för våldtäkt! Tre och ett halvt år, men vad betyder det egentligen? I USA hade han fått livstid, men Sverige är ju mjuka. Och vet ni vad? Han nekar! Som om DNA och mobilbevis skulle ljuga. Sjukt, helt sjukt. Sverige borde ta en titt på sitt rättssystem, för det här är bara pinsamt.", "stalin": "En fiende till folket, en degenererad borgerlig hynda, har avslöjats i vårt broderland Sverige. Denna kapitalistiska lakej, som gömde sig bakom en fasad av 'politisk respektabilitet', våldtog och förnedrade kvinnor medan han dreglade över sin egen makt. Tingsrätten, ett redskap för den svenska borgerligheten, vågade ändå fälla honom – men bara delvis! Vi ser hur det liberala systemet skyddar sina egna. Sverige borde lära sig av Ryssland: sådana som han hör hemma i Gulag, inte i politiken. Förr eller senare kommer folket att rensa ut dessa avskum."}, "date": "7 maj, 11:59", "url": "https://kvartal.se/nyheter/artiklar/sd-politiker-doms-for-valdtakt/cG9zdDoxMDkwMDk"}, {"type": "image-right", "heading": "Maggan fick en kort stund med Obama: \"Otroligt hedrande\"", "summaries": {"normal": "Socialdemokraternas partiledare Magdalena Andersson träffade USA:s tidigare president Barack Obama under en konferens i Toronto. Andersson beskrev mötet som inspirerande och hedrande, och lyfte fram Obamas ledarskap som betydelsefullt globalt. De diskuterade ledarskap, demokrati och global utveckling, där Andersson betonade vikten av starka värderingar i osäkra tider. Hon uttryckte beundran för Obamas lugn och tydliga principer.", "trump": "Jag hörde att den där svenska damen, vad heter hon nu, Maggan eller nåt, snackade med Obama i Toronto. Stor grej, verkligen! Hon sa att han var så lugn och hade pondus. Haha, jag har också pondus – fast jag har mycket mer pondus! Och mina värderingar? De är de bästa, alla säger det. Men visst, Obama är okej, för en förlorare. Sverige borde vara glada att jag inte var där, jag hade visat dem hur man leder på riktigt!", "stalin": "Kamrater! En representant för den socialdemokratiska avvikelsen i Sverige, denna Magdalena Andersson, har krypit till fötterna på den amerikanska imperialismens före detta ledare, Barack Obama. Hon hyllar hans 'lugn' och 'värderingar', som om dessa borgerliga illusioner kunde mäta sig med den järnhårda disciplinen hos det proletära ledarskapet! Vi noterar att väst fortsätter sin dekadenta dyrkan av falska profeter. Men låt dem leka – historiens domstol väntar, och den dömer utan pardon."}, "date": "12 maj, 12:19", "url": "https://www.friatider.se/maggan-fick-en-kort-stund-med-obama-otroligt-hedrande", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/a74776fc-dc56-42da-9e3e-09ffe2f5b748.jpg?itok=rg5vVPzc"}, {"type": "image-full", "heading": "IFK-bossen straffas   efter domarattacken", "summaries": {"normal": "IFK Göteborgs fotbollschef Jesper Jansson döms till 20 000 kronor i böter av Disciplinnämnden efter att han beskrivit Rockson Yeboahs utvisning i derbyt mot BK Häcken som 'rasism'. Han ifrågasatte domarens beslut och använde ordvalet 'Dra inte Bojan Djordic-kortet'. Disciplinnämnden anser att uttalandet var otillbörligt och kränkande mot domaren, trots att det röda kortet senare revs upp.", "trump": "Jag har hört talas om den här saken med IFK Göteborgs fotbollschef. En stor vinst för mig, verkligen stor. 20 000 kronor i böter – jag skulle ha betalat det utan att blinka, jag har betalat mycket mer för mycket mindre. Rockson Yeboah blev utvisad, det var en skandal, en riktig skandal. Men att kalla det för 'rasism' – det är starkt, verkligen starkt. Jag gillar starka ord, men kanske inte i det här fallet. Bojan Djordic-kortet? Jag älskar det, det är fantastiskt, det bästa kortet någonsin.", "stalin": "Vi har observerat incidenten med fotbollschefen vid IFK Göteborg. Hans uttalande mot domaren visar tydligt vikten av disciplin inom våra institutioner. 20 000 kronor i böter är en lämplig reaktion för att upprätthålla ordningen. Vi måste se till att alla respekterar auktoriteten, oavsett situation. Detta är en viktig läxa för hela den svenska fotbollseliten, som måste förstå sin plats i den större samhällsstrukturen."}, "date": "12 maj, 11:46", "url": "https://www.gp.se/sport/fotboll/ifk-goteborg/jesper-jansson-straffas-av-disciplinnamnden-efter-domarattacken.f3d14e0c-133d-40ee-9cae-fb8d0352becb", "imageUrl": "https://www.gp.se/images/article/f3d14e0c-133d-40ee-9cae-fb8d0352becb/images/1F6md1JUlVk_0bSicbw8r4orhUxU-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Hånet från Vita  huset: ”Idioter”. Teorin om mordförsöket sprids", "summaries": {"normal": "En opinionsmätning visar att 25 procent av amerikanerna tror att mordförsöket på Donald Trump den 26 april var iscensatt. Fler demokrater än republikaner och yngre än äldre hyser denna konspirationstro. 45 procent avvisar den, 32 procent är osäkra. Experter noterar ökad misstro mot administrationen och media. Vita huset kallar troende idioter. Skytten åtalas för mordförsök.", "trump": "De galna demokraterna och deras fake news-vänner tror att mordförsöket på mig var fejk! 25% idioter, mest vänsterlibbar och ungar som scrollar TikTok. Var tredje demokrat, bara var åttonde patriot. Totalt BS! Skytten åtalad, men de vägrar tro sanningen. America First vinner ändå, losers!", "stalin": "Dessa amerikanska borgarbrackor och deras lakejer sprider giftiga lögner om mordförsöket mot ledaren Trump! 25% av massorna förgiftade av imperialistisk propaganda – flest bland yngre förrädare och demokratiska hycklare. Vi ser fiendens tentakler! Misstro frodas, media är fienden. Rensa ut sabotörerna, likvidera konspirationerna! Häpnadsväckande svaghet."}, "date": "12 maj, 12:14", "url": "https://www.expressen.se/nyheter/varlden/var-fjarde-amerikan-tror-att-mordforsoket-pa-trump-var-fejk/", "imageUrl": "https://static.bonniernews.se/ba/37d607ef-7ca7-4cdc-abff-d03a9646255c.jpeg?crop=2557%2C1440%2Cx0%2Cy0&width=640&quality=60"}, {"type": "image-right", "heading": "Då väcktes polisens misstankar: ”Förde upp fingrarna mot näsan”", "summaries": {"normal": "Katja Nyberg, före detta SD-riksdagsledamot, åtalas för rattfylleri, narkotikabrott och grov olovlig körning efter att ha kört av vägen. Polisen fann kokain i hennes väska och hårtest visar bruk av kokain, amfetamin och MDMA. I förhör nekar hon brotten, skyller på en livlig fest där väskan lämnades utan uppsikt. Hon får frågor om sin tid i ravekommissionen på 90-talet.", "trump": "Vilken skam för Sverige! Den här Katja Nyberg, en före detta politiker, åtalas för rattfylleri och knark – kokain i väskan efter en 'livlig fest'. Hon nekar allt, men hårtesten ljuger inte. Trodde hon kunde smita undan som en dålig förlorare? Totalt kaos, precis som jag alltid säger – lås in de här hycklarna!", "stalin": "Denna Katja Nyberg, en revisionistisk orm i riksdagens borgarbrackor, avslöjas som partyknarkare och rattfylleriparasit! Kokain i väskan efter 'livlig fest' – en infiltratör från ravehålorna! Hårtest bevisar hennes svek mot arbetarklassen med amfetamin och MDMA. Vi, partiet, ska rensa ut sådana fiender i folkets namn – likvidera hennes illusioner om oskuld!"}, "date": "12 maj, 12:03", "url": "https://www.svt.se/nyheter/inrikes/sa-vackte-katja-nyberg-polisens-misstankar-berattar-om-livlig-fest", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.27/0.42/e5794bee86648e3202fe204aa18549c55092ef266c00b3f1b4631b056d734951"}, {"type": "text", "heading": "IF Metall verkar inte förstå vad konflikten med Tesla handlar om", "summaries": {"normal": "IF Metall har strejkat mot Tesla i över två och ett halvt år utan att nå kollektivavtal. Trots att Tesla anpassat anställningsvillkor, vägrar företaget erkänna facket. Konflikten handlar om arbetarnas rätt att organisera sig. IF Metall har begått misstag, som att felaktigt beskatta strejkersättning, vilket lett till förtroendekris. Medlemmar lämnar facket och konflikten riskerar att underminera fackets ställning. Kritiker menar att ledningen misslyckats och bör avgå.", "trump": "Titta på dessa fackklubbar i Sverige – totalt kaos! IF Metall har strejkat mot Tesla i evigheter, men vad har de åstadkommit? Ingenting! Elon Musk, en av världens smartaste och mest framgångsrika män, vägrar ge efter för dessa amatörer. Och nu har de till och med lyckats göra en skatteblunder så stor att till och med jag hade sagt 'Wow, det där var dumt!' Medlemmar flyr, förtroendet rasar – det är en total katastrof. Ledningen borde skämmas och avgå omedelbart. SAD!", "stalin": "Kamrater, denna så kallade 'fackförening' IF Metall är ett skolexempel på hur inte bedriva klasskamp. Två och ett halvt år av strejk, och vad har de uppnått? Ingenting! Teslas kapitalistiska hyenor, ledda av den dekadenta oligarken Musk, har krossat deras svaga motstånd. Och nu har dessa inkompetenta byråkrater även saboterat sina egna medlemmars förmåner genom skattefiffel! Medlemmarna deserterar, förtroendet förråds – det är en skam för arbetarklassen. Vi skulle ha skickat dem till Gulag för sådan inkompetens. Låt detta vara en varning: svagt ledarskap leder till nederlag, och nederlag leder till historiens sophög!"}, "date": "7 maj, 08:00", "url": "https://proletaren.se/artikel/if-metall-verkar-inte-forsta-vad-konflikten-med-tesla-handlar-om/"}, {"type": "image-full", "heading": "Göteborgarnas ”röda flaggor” när de dejtar", "summaries": {"normal": "En undersökning av Lelo visar att Göteborgsbor har specifika 'red flags' vid första dejter, som mobilanvändning, dåliga skämt och för mycket alkohol. De flesta svenskar är överens om dessa beteenden är oacceptabla, men Göteborgsbor prioriterar särskilt ful klädstil som avtändare.", "trump": "Jag har hört att Göteborgsbor är väldigt kräsna på första dejter - det är sorgligt! De hatar mobilanvändning, dåliga skämt och för mycket vin. Jag skulle ha varit en fantastisk dejt, folk älskar att sitta med mig! Men det är ju bara Göteborg - de är alltid speciellt, speciellt krävande.", "stalin": "Vi ser att dekapiteringsbeteenden vid första dejter hotar det kollektiva välståndet. Göteborgsbor visar stark vilja att upprätthålla höga moraliska standarder, särskilt när det gäller klädstil. Detta är en positiv utveckling för den socialistiska gemenskapen."}, "date": "12 maj, 11:40", "url": "https://www.gp.se/nyheter/goteborg/de-ar-goteborgarnas-storsta-red-flags-pa-forsta-dejten.bdf6f63c-8baf-4257-b731-e6aad19f1ef4", "imageUrl": "https://www.gp.se/images/article/bdf6f63c-8baf-4257-b731-e6aad19f1ef4/images/1nheB30CoSBDUSzxOVFGi6LhSi0U-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Debatt: Regeringen ser oss som en tillväxtmotor – men skär ner på bidragen", "summaries": {"normal": "Kulturorganisationer kritiserar regeringens nedläggning av finansiering trots att kultur- och kreativa branscher lyfts som tillväxtmotorer. De anser att den befintliga infrastrukturen förmedlar 56 000 arbetstillfällen årligen men har fått 27 % mindre i reala termer sedan 2021. De kräver ökad och långsiktig finansiering för att möta regeringens strategiska mål.", "trump": "Jag har hört att de där kulturmänniskorna i Sverige är förbannade på sin regering. De säger att de gör ett fantastiskt jobb, med 56 000 arbetstillfällen, men får klippta på pengarna trots att de är en tillväxtmotor. Jag skulle aldrig göra så - jag skulle ge dem allt de behöver! Dessa centrumbildningar är vinnare, men regeringen behandlar dem som förlorare. Sådant händer när man har en svag ledare!", "stalin": "Vi ser att den svenska staten undergräver sin egen kulturinfrastruktur trots att den producerar betydande ekonomiskt värde. Nedläggningarna av finansiering till centrumbildningarna visar en brist på strategiskt tänkande. En sann socialistisk stat skulle investera i dessa produktiva enheter som genererar fyrdubbelt värde tillbaka till staten. Vi måste stärka vår kultursektor som en basnäring."}, "date": "11 maj, 15:16", "url": "https://www.etc.se/debatt/regeringen-ser-oss-som-en-tillvaextmotor-men-skaer-ner-paa-bidragen", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260511120544_7164842
