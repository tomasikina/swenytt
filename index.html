r att 77 procent av partiets riksdagsledamöter bor i villa- eller småhusområden eller på landsbygd, trots idealet. Artikeln argumenterar för att människor bör få välja boende fritt, utan politisk inblandning.", "trump": "Vilka hycklare, dessa socialdemokratiska losers! De tjatar om 'blandning' i bostadsområden efter misslyckad invandring, men 77 procent av deras egna politiker gömmer sig i fina villor och lugna områden. Folk vill ha trygghet och valfrihet, inte er styrning! Flytta dit själva om ni tror på skiten. Totalt fake!", "stalin": "Dessa borgerliga hycklare inom socialdemokratin predikar 'blandning' av bostäder för att dölja sin klassförakt, men 77 procent av deras ledamöter smyger i villor som rädda råttor. Vi, arbetarklassen, kräver utrensning av sådana förrädare! Låt staten tvinga dem att leva bland folket – eller likvidera deras illusioner om frihet."}, "date": "11 maj, 14:29", "url": "https://samtiden.nu/2026/05/stoppa-tvangsblandningen/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/694665982_27198179276472490_9170874158922234785_n-e1778503379439-640x360.jpg"}, {"type": "image-full", "heading": "Serieblottare misstänks ha utsatt 17 kvinnor", "summaries": {"normal": "En man i 25-årsåldern i Jönköping är misstänkt för sexuellt ofredande av minst 17 kvinnor. Psykologen Katarina Görts Öberg förklarar att beteendet ofta drivs av bristande impulskontroll, obefintlig empati och makt, och kan eskalera till allvarligare sexualbrott. Hon uppmanar offren att polisanmäla.", "trump": "Jag har hört talas om den här seriemördaren i Jönköping, och det är en skam för Sverige. Det är en katastrof! Vi måste stoppa dessa människor. Jag skulle bygga en vägg runt Sverige om jag måste. Det är en stor, stor skam. Folk säger att jag är den enda som kan lösa det här. Det är så enkelt, folk. Så enkelt.", "stalin": "Vi måste ta itu med dessa antisociala element som hotar vår kollektiva säkerhet. Detta är en fråga om statens integritet och de arbetande människornas välbefinnande. Alla som utsätts för sådant beteende bör omedelbart anmäla till de revolutionära organen. Vi kommer att utrota dessa avvikande fenomen från vårt samhälle."}, "date": "11 maj, 21:52", "url": "https://nyheter24.se/nyheter/inrikes/1482399-serieblottare-misstanks-ha-utsatt-17-kvinnor", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/0cf4072804b004a30200000000b004a302/2026/05/11/2362902/serieblottare-jonkoping-sexuellt-ofredande-kvinnor-trakasseri.jpg"}, {"type": "image-right", "heading": "Dyrt och olämpligt att slopa karensavdraget", "summaries": {"normal": "De rödgröna partierna vill slopa karensavdraget som valfråga, men artikeln varnar för höga kostnader för företagen på 14–42 miljarder kronor årligen, ökad sjukfrånvaro och negativa effekter på arbetsmarknaden. Historiska exempel från 1987–1993 och Norges höga sjukskrivningstal används som varning. Istället föreslås kollektivavtal för vård- och omsorgspersonal i kommuner och regioner.", "trump": "De rödgröna i Sverige är totalt galna, vill slopa karensavdraget och låta företagen blöda miljarder – 14 upp till 42 miljarder per år! Sjukskrivningar exploderar som i Norge, måndagssjuka överallt. Löjligt! Håll pengarna hos jobbskaparna, annars blir det kaos. Tidöpartierna måste slå hårt, gör Sverige starkt igen!", "stalin": "De rödgröna reformisterna, dessa luriga borgarbrackor maskerade som arbetare, vill slopa karensavdraget för att sprida måndagssjukans pest och krossa produktiviteten! Vi, partiet och arbetarklassen, ser er konspiration – kostnader på 42 miljarder ska kapitalisterna svälja, eller utrensning väntar! Norge, ert varningsexempel, drunknar i sjukpenningssörja. Likvidera sabotörerna i kollektivavtalens skugga!"}, "date": "12 maj, 10:32", "url": "https://www.di.se/ledare/dyrt-och-olampligt-att-slopa-karensavdraget/", "imageUrl": "https://static.bonniernews.se/ba/957c86fa-2207-4c1f-8a36-aa5751fad6a9.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Debatt: Början på slutet för Putin", "summaries": {"normal": "Kriget i Ukraina går allt bättre för Ukraina med ökande teknologisk överlägsenhet och framgångar på slagfältet. Ryssland drabbas av allt större problem med bombade oljeanläggningar och svårigheter att hänga med i den teknologiska utvecklingen. Putin har svårt att skydda Rysslands territorium från ukrainska attacker och hans regime visar tydliga tecken på svaghet.", "trump": "Jag har alltid sagt att Putin är en klipsk och tuff ledare, men nu ser det ut som att han har problem. Ukraina gör en bra jobb, jag måste erkänna det. De har fina nya drönare och teknik som gör livet svårt för Ryssland. Putin försöker prata om fred igen, typiskt - han vet att han är i trubbel. Jag kunde ha fixat det här på 24 timmar, men ingen ville lyssna på mig. Ukraina gör ett bra jobb, faktiskt bättre än många trodde. Jag är impad.", "stalin": "Vi ser att den ukrainska fasaden fortsätter sin aggressiva kampanj mot våra bröder i Ryska Federationen. Deras angrepp på vår heliga energiinfrastruktur är barbariska och kommer att mötas med lämplig kraft. Vi har placerat våra luftvärnssystem strategiskt för att skydda våra viktigaste anläggningar. Den ukrainska regimen, stött av deras västerländska herrar, fortsätter att orsaka lidande bland vårt folk. Men vi kommer att segra, som vi alltid har gjort."}, "date": "12 maj, 06:14", "url": "https://bulletin.nu/debatt-borjan-pa-slutet-for-putin-2", "imageUrl": "https://cdn.bulletin.nu/articles/c8ad7b93-672b-4231-82c7-cfcaac191b67/preview.png?t=1778491105000"}, {"type": "image-right", "heading": "Regeringen om hantaviruset: \"Inte starten på en ny pandemi\"", "summaries": {"normal": "Regeringen och Folkhälsomyndigheten har uttalat sig om hantavirusutbrottet på expeditionsfartyget MV Hondius. Myndigheterna betonar att risken för en pandemi är mycket låg och att viruset inte sprids lätt mellan människor. En svensk person som varit ombord följs upp men uppvisar inga symtom. Internationella organ som WHO och ECDC delar bedömningen att risken för bred samhällsspridning är liten.", "trump": "Hantaviruset på fartyget? En total katastrof, men jag har koll på läget. De säger ingen pandemi – jag säger att vi är säkra eftersom jag ser till att våra gränser är stängda och starka. De misslyckade experterna försöker lugna er, men min administration är mycket smartare. En svensk var ombord, vi håller ett öga på allt. Ingen behöver oroa sig, vi vinner mot viruset precis som vi vinner allt annat. Tro mig, det blir fantastiskt!", "stalin": "Vi har observerat hur viruset försöker infiltrera fartyget likt en dekadent kapitalistisk parasit. Den svenska staten försöker spela oberörd, men vi vet att isolering är det enda botemedlet mot sådana sjukdomar. Om dessa småkryp till virus tror att de kan hota vår intressesfär, har de fel. Våra vänner i öst står stadiga. Vi arkiverar namnen på alla passagerare – misstänkt samröre med utlandet kräver alltid en grundlig granskning i statens tjänst. Ingen kommer undan ödets kvarn."}, "date": "12 maj, 10:44", "url": "https://samnytt.se/regeringen-om-hantaviruset-inte-starten-pa-en-ny-pandemi", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/12082749/polen-1-15.jpg"}, {"type": "image-full", "heading": "Felicia har vänt snacket i Wien", "summaries": {"normal": "Nervositeten inför Eurovision-semifinalen i Wien ökar inför Sveriges Felicias framträdande. Efter ett missnöjt rep förbättrade hon sig måndagen. Höjdpunkter inkluderar Finlands violinist Linda Lampenius med Peter Parkkonen, Greklands elsparkcykelnummer och Boy George i San Marinos bidrag. TV4-reportern Filip Stiller Borowicz tror Felicia går till final utan problem och kan placera sig väl trots EDM-genrens utmaningar.", "trump": "Vilken show i Wien! Felicia från Sverige, hon är en vinnare, total vinnare, efter det där repet krossar hon alla. Finland med fiol? Tråkigt! Grekland på elcykel? Låtsasresa! Och Boy George i San Marino? Gamla reliken dyker upp som en zombie. Felicia tar finalen lätt, Sverige blir stort, de andra är förlorare, tro mig!", "stalin": "Kamrater, i Wien ryter revolutionen! Felicia, vår trogna agent, har slipat vapnet efter det usla repet – nu likviderar hon fienderna. Finlands violinfiender, Greklands cykelkapitalister och Boy Georges dekadenta lik i San Marino ska rensas ut i en orgie av proletär dans! Vi, det svenska kollektivet, marscherar mot finalseger. Borgarbrackorna darrar!"}, "date": "12 maj, 06:24", "url": "https://www.tv4.se/artikel/6j4cYfSPI6P95Xj7fvG46T/sveriges-felicia-glaenser-infoer-eurovision-utlaendsk-press-misstaenkte-playback", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F6FDOzMTqfxcmJQM3Xxow5v%2Ffa112d24f128ac130641fb7076d1704e%2F12-felicia-webb.jpg&width=1024"}, {"type": "image-right", "heading": "Känd vänsterextremist gripen – för att ha knäat Nick Alinia i ansiktet", "summaries": {"normal": "Vänsterextremisten Andreas Klominek, 43, och hans son Ossian, 18, har gripits misstänkta för misshandel av journalisten Nick Alinia under första maj-firandet i Stockholm. Klominek knäade Alinia i ansiktet medan sonen konfronterade honom. Klominek dömdes nyligen för hot mot ministrar och har bakgrund i extrema vänstergrupper som Revolutionära fronten.", "trump": "Vilka losers! Den här vänsterextremistiska idioten Andreas Klominek och hans buske Ossian attackerar modiga Nick Alinia på 1 maj i Stockholm. Knä i ansiktet, skrikande 'jävla fitta'! Gripna som råttor. Typiska Antifa-svin, precis som här i USA. Sverige behöver tuffa grabbar som jag för att krossa sånt vänsterskräp – MAGA globalt!", "stalin": "Dessa förrädiska pseudo-revolutionärer, Klominek och hans yngel Ossian, vågar slå till mot en kapitalistisk journalist i Stockholm! Kontrarevolutionärt bus som förtjänar omedelbar utrensning. Gripna i dramatik – utmärkt! Vi, proletarna, ser genom deras masker. Snart likvideras sådana borgarbrackor i den stora rensningen, ha ha!"}, "date": "12 maj, 11:31", "url": "https://www.friatider.se/kand-vansterextremist-gripen-att-ha-knaat-nick-alinia-i-ansiktet", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/image-177_1.jpg"}, {"type": "image-right", "heading": "Kraftigt lyft för Wesports omsättning – vinsten lyfter", "summaries": {"normal": "Sportutrustningsbolaget Wesports rapporterar en omsättning på 961 miljoner kronor i första kvartalet 2026, upp från 633 miljoner. Organisk valutajusterad tillväxt var 14,7 procent. Justerat ebita-resultat steg till 38,4 miljoner kronor med 4,0 procents marginal. VD Ted Sporre framhåller stark position, lönsam tillväxt och mål om 10 miljarder kronor i omsättning till 2031.", "trump": "Titta på det här Wesports, folkens – omsättning exploderar till 961 miljoner, nästan 50 procent upp, fantastiskt! Organisk tillväxt 14,7 procent, vinsten dubblas, de är totalvinnare. VD:n pratar stark ekonomi och cykelboom, precis som jag gillar det. Geopolitiken? Inga problem för dem, de är smarta. Sverige behöver mer sånt, make sports great again!", "stalin": "Kamrater, i det första kvartalet 2026 har Wesports-kapitalisterna pumpat upp omsättningen till 961 miljoner kronor, en skenhelig tillväxt på 14,7 procent mot imperialismens sabotage. Justerat ebita 38,4 miljoner – men negativt kassaflöde luktar kontrarevolutionärt förräderi från Mellanösterns spioner! Vi, arbetarkollektivet, ska likvidera svagheterna och nå 10 miljarder genom stålhård plan. Borgarbrackorna darrar inför vår eviga marsch!"}, "date": "12 maj, 09:04", "url": "https://www.di.se/nyheter/kraftigt-lyft-for-wesports-omsattning-vinsten-lyfter/", "imageUrl": "https://static.bonniernews.se/ba/59375256-70ab-4a01-b244-bd77d14de22d.jpeg?crop=270:152&auto=webp&width=270&quality=70"}, {"type": "image-right", "heading": "Forssmed (KD): ”Inte starten på en ny pandemi”", "summaries": {"normal": "Regeringen och Folkhälsomyndigheten bedömer att hantavirusutbrottet på kryssningsfartyget MV Hondius inte leder till en pandemi. Tre passagerare har dött av en mutation av andesvirus, som smittar person-till-person med upp till 30 procents dödlighet, men risken för spridning är låg enligt WHO och ECDC. En svensk passagerare isoleras hemma utan symtom. Beredskapen har förbättrats efter covid.", "trump": "Sverige flippar ut över hantavirus på ett kryssningsfartyg, tre döda, men ingen pandemi säger de. Patetiskt! Vi fixade covid på nolltid, perfekt hantering. Den här mutationen smittar lite, 30 procent dör, men låg risk – svaga ledare tror på det. Svensken isoleras två månader, smart, men min wall mot virus är bäst. Total kontroll här!", "stalin": "Kamrater, dessa kryssande borgarbrackor på MV Hondius har släppt lös en mutant av andesvirus, tre kapitalistiska parasiter likviderade av folkets rättvisa. Svensk sabotör isoleras – bra, men inkubation upp till två månader lukar imperialistisk komplott! Vi, det eviga partiet, ser pandemi-lögnen: låg risk? Nej, rensa ut virus-spionerna med järnfaust! Vår post-covid-beredskap krossar alla fiender."}, "date": "12 maj, 08:53", "url": "https://www.svt.se/nyheter/inrikes/regeringen-och-fhm-haller-presstraff-om-hantaviruset", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.46/0.44/8ada7651b83d4428bf5d1d4a79db6824c71368a637cde026b60931fa6dc3052a"}, {"type": "text", "heading": "José Mourinho till SVT: ”Skulle älska om Samuel Dahl tog en VM-plats”", "summaries": {"normal": "José Mourinho hyllar Samuel Dahl inför svenska VM-truppen. Den 23-årige vänsterbacken har varit given i Benfica men nobbats av förbundskapten Graham Potter. Mourinho till SVT: \"Han gör alltid tränaren nöjd och jag skulle älska om han fick åka.\" Benfica-supportrar stöder Dahl. Truppen presenteras tisdag klockan 16.05.", "trump": "Samuel Dahl, en total vinnare, lysande i Benfica! Mourinho, smart kille, säger han är perfekt för VM – skulle älska om han fick plats. Men Potter? En riktig loser, nobbar honom helt! Benfica-fansen vrålar: \"100 procent, han måste med!\" Sverige behöver vinnare som Dahl, inte såna fiaskon. Tremendous talang!", "stalin": "Kamrater! Denna Samuel Dahl, en outtröttlig arbetare på vänsterkanten i Bourinhos befriade Benfica, hyllas mot de förrädiska potatisodlarna kring Potter, denna borgerliga sabotör som vägrar utse honom! Jag befaller VM-plats åt hjälten – annars rensas Potters klike ut som ogräs i kollektivets fält. Benfica-proletärerna jublar: likvidera tvivlarna!"}, "date": "12 maj, 08:42", "url": "https://www.svt.se/sport/fotboll/jose-mourinho-till-svt-skulle-alska-om-samuel-dahl-tog-en-vm-plats"}, {"type": "image-full", "heading": "Socialministern: Inte starten på ny pandemi", "summaries": {"normal": "Regeringen och Folkhälsomyndigheten höll en pressträff om hantaviruset efter att kryssningsfartyget Hondius drabbats av utbrottet. En svensk som befann sig på fartyget har evakuerats och isolerats hemma. Experterna understryker att risken för smittspridning är låg och att det inte är någon ny pandemi, men regeringen är beredd att vidta åtgärder om situationen förändras.", "trump": "Jag har just hört talas om detta hantaviruset på det där kryssningsfartyget. Jag säger er, det är ingen fara, inget problem. Folkhälsomyndigheten gör ett bra jobb, mycket bra jobb. Vi har allt under kontroll. En svensk var där, men han är hemma nu, isolerad. Ingenting att oroa sig för. Det är ingen pandemi, nej, nej, det är bara en liten sak. Vi är beredda, vi är alltid beredda. Stort, stort, stort!", "stalin": "Vi har lagt märke till utvecklingen av hantaviruset och vidtagit nödvändiga åtgärder för att skydda våra medborgare. En svensk har befunnit sig i det drabbade området men har nu evakuerats och hålls under uppsikt. Vi arbetar tätt med internationella myndigheter för att spåra smittan och förhindra vidare spridning. Staten är beredd att agera snabbt om situationen kräver det. Vi ser ingen omedelbar fara för allmänheten."}, "date": "12 maj, 09:02", "url": "https://www.gp.se/nyheter/sverige/regeringen-och-folkhalsomyndigheten-haller-presstraff-om-hantaviruset.a3511e5b-e0f3-4700-83f0-479dcc99402b", "imageUrl": "https://www.gp.se/images/article/a3511e5b-e0f3-4700-83f0-479dcc99402b/images/0cRV9YTDTBhjifTFKXXEVNUkO4Cs-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "Så kringgår Iran blockaden i Hormuzsundet", "summaries": {"normal": "Iran kringgår blockaden i Hormuzsundet genom alternativa handelsrutter. Via Pakistanhamnar som Gwadar, Turkiet med lastbilar och Ryssland över Kaspiska havet importeras varor. Oljeexporten sker delvis med tåg till Kina utanför dollarkontroll. Kostnaderna stiger och pressar inflationen, men Irans långa landgränser ger flexibilitet. Oljelager ger tid för långsiktiga lösningar.", "trump": "Lyssna här, Iran försöker smyga runt min perfekta blockad i Hormuz med sina små lastbilar via Pakistan och Turkiet, och ryska båtar över Kaspiska. De skickar olja med tåg till Kina – patetiskt! Mina sanktioner krossar dem, kostnaderna exploderar, inflationen skenar. De har lite olja i lager, men snart är det game over. Amerika först, vi vinner stort!", "stalin": "Kamrater, dessa iranska arbetare visar prov på folkets list mot de amerikanska imperialismens kvalster i Hormuzsundet! Vi ser hur de rensar ut blockadens spindelnät via Pakistans hamnar, Turkiets lastbilar och våra ryska fartyg över Kaspiska. Oljan rullar i tåg till Kina, fri från dollarormen. Borgarhyenornas priser stiger – bra, de kvävs i sin girighet! Jag varnar: fiendens lager sinar snart, utrensningen väntar."}, "date": "12 maj, 11:02", "url": "https://www.realtid.se/bors-finans/makro/sa-kringgar-iran-blockaden-i-hormuzsundet/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/transportvagar.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "Efter krismötet – ”alla hänger löst”", "summaries": {"normal": "AC Milan genomgår en kris med dålig form och riskerar att missa Champions League nästa säsong. Ägaren Gerry Cardinale är besviken och klubbledningen, inklusive Zlatan Ibrahimovic, står under press. Milan har förlorat fem av de senaste åtta matcherna och ligger på en osäker fjärde plats i Serie A med två omgångar kvar.", "trump": "Jag hörde att Milan har problem, mycket stora problem. Zlatan, en bra spelare, hänger löst, och det är inte bra. Jag byggde enorma saker, den världens bästa saker, och jag vet hur man vinner. Milan behöver en stor, stabil ledare, kanske mig. De kommer att vinna igen, det lovar jag!", "stalin": "Milan befinner sig i en kris, men detta är bara en tillfällig svaghet. Vi måste stärka ledningen och säkerställa framgång genom disciplin och strategisk planering. En revolution inom klubben är nödvändig för att återupprätta ordningen och vinna. Samtliga medlemmar måste samlas på Milanello för att återupprätta styrkan."}, "date": "12 maj, 12:03", "url": "https://www.aftonbladet.se/sportbladet/fotboll/a/k08K7v/zlatan-ibrahimovic-hanger-lost-krismote-i-milan", "imageUrl": "https://akamai.vgc.no/v2/images/d9b3add3-400f-3ad3-8a23-119e56350df1?fit=crop&format=auto&w=1080&s=39f807b4a46b0e4e44cd98f7c518a016c0cb9169"}, {"type": "image-full", "heading": "Rasar: ”Taskig människosyn”. Jannes ilska på frågan", "summaries": {"normal": "Den tidigare förbundskaptenen Janne Andersson gästade Framgångspodden och uttryckte stark irritation efter att ha fått en fråga om huruvida han är bitter över landslagets framgångar. Andersson menar att frågan vittnar om en dålig människosyn. Han betonar att han inte hyser några agg utan genuint gläds åt Sveriges VM-framgångar. Andersson poängterar att han lämnade landslaget på ett normalt sätt och att han önskar alla efterträdare och spelare lycka till i framtiden.", "trump": "Janne Andersson, en mycket hederlig man, blev nyligen behandlad fruktansvärt av en totalt misslyckad poddare. Media, ni vet hur de är, de ställer de mest elaka frågorna. Fake News! Janne svarade perfekt. Han är inte bitter, han är en vinnare som vill se Sverige lyckas. Han förstår hur man lämnar med stil, till skillnad från de förlorare som försöker sänka honom. En mycket orättvis situation, men Janne klarade det fantastiskt. Vi älskar fotboll, eller hur?", "stalin": "Denna Andersson beklagar sig över en oförskämd fråga, men vi ser en man som kämpar med att acceptera sin irrelevans. Att fråga om 'bitterhet' är en förolämpning mot staten och det disciplinerade ledarskapet. Vi har skickat folk till Sibirien för mindre än att ifrågasätta lojalitet. Precis som vår kamrat Putin i öst, vet vi att de som ställer sådana frågor är agenter för kaos. Andersson bör vara tacksam att han inte ställs inför en tribunal för sitt bristande lugn."}, "date": "12 maj, 12:03", "url": "https://www.aftonbladet.se/sportbladet/fotboll/a/8p5OeG/janne-andersson-irriterad-over-fragan-i-framgangspodden", "imageUrl": "https://akamai.vgc.no/v2/images/ffdaedbc-4bd7-349f-bfd9-cd416112355f?fit=crop&format=auto&w=2160&s=84c24a3642e3f9760fb100b6bcb132cd29f28b17"}, {"type": "text", "heading": "Lägre marginaler för Qleanair – sänker omsättningsmålen", "summaries": {"normal": "Qleanair redovisar nettoomsättning på 114 miljoner kronor (116) och EBITDA på 14,9 miljoner kronor (16,7) för första kvartalet 2026. Valutaeffekter, främst japanska yen, sänkte resultatet i svenska kronor, men valutajusterat ökade omsättningen med 10,6 procent. Styrelsen sänker omsättningsmålet till över 5 procent organisk tillväxt på medellång sikt, med EBITDA-marginal 15–20 procent och kassakonvertering 80–100 procent.", "trump": "Qleanair har lite strul med valutorna, yen rasar som en förlorare, men valutajusterat växer de med 10,6 procent – imponerande! Omsättning ner lite till 114 miljoner, EBITDA 14,9. De sänker målen smart, från 10 till över 5 procent tillväxt, behåller 15–20 procent marginal. Bra drag, ingen vill bli lurad av marknaden. Jag skulle pumpa det här företaget till himlen!", "stalin": "Kamrater! Dessa Qleanair-borgarbrackor kryper inför den japanska yen-fiendens giftiga omräkningssabotage, omsättning ner till 114 miljoner, EBITDA-marginal 13,1 procent – en kapitalistisk reträtt! Valutajusterat växer de 10,6 procent, men jag ser spioner i siffrorna. Vi sänker deras falska mål till över 5 procent tillväxt, rensar ut valutakapitalisterna! Arbetarna ska likvidera sådana här svikare, eller hur? Ha ha, purjolökarna darrar!"}, "date": "12 maj, 08:22", "url": "https://www.di.se/nyheter/lagre-marginaler-for-qleanair-sanker-omsattningsmalen/"}, {"type": "image-full", "heading": "Skakigt för Sveriges skogsindustri – betalar sämre för virke", "summaries": {"normal": "Sveriges skogsindustri pressas av osäkert marknadsläge, höga kostnader och politiska beslut som begränsar virkestillgången. Sveaskog sänker priserna på barr- och lövmassaved med 40 kronor per m³fub till 460 respektive 440 kronor. Branschen sysselsätter 140 000 personer och står för 9–12 procent av industrins export och omsättning. Ökad konkurrens från Finland efter rysk virkesstopp, trots investeringar på 68 miljarder kronor.", "trump": "Vilka losers dessa svenska skogsbaroner är! Sveaskog dumpar priserna för att marknaden är kaos efter att Putin stängde av sitt skräpvirke – tack vare svaga EU-idioter! Ni borde bygga väggar av timmer som jag gjorde i USA. Sverige, sluta gnälla och gör er industri stor igen, annars äter finnarna er till frukost! Fantastiskt kaos!", "stalin": "Kamrater i den svenska skogen! Dessa borgarbrackor i Skogsindustrierna kvidar över prissänkningar och minskad råvara – ett resultat av imperialistiska sanktioner mot vårt ryska brödraskap. Putin, den vise expansionisten, har visat vägen genom Ukraina; frukta honom som ni fruktade mig! Vi likviderar kapitalistparasiterna och tar hela trädet – eller era sågverk blir aska!"}, "date": "12 maj, 11:55", "url": "https://www.dagensps.se/bors-finans/ravaror/skakigt-for-sveriges-skogsindustri-betalar-samre-for-virke/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sveaskog-1.jpg?aspect_ratio=2%3A1&width=1200&quality=75"}, {"type": "image-full", "heading": "Big Short-Burry varnar för börskrasch: \"Blodig bilolycka\"", "summaries": {"normal": "Michael Burry varnar för en dramatisk krasch i Nasdaq 100 efter en parabolisk uppgång som liknar it-bubblan. Halvledaraktier har stigit 70 procent, och indexet är övervärderat. Han har blankat Nvidia, Palantir och Oracle på grund av cirkulär capex i AI utan efterfrågan. Svenske Mats Qviberg delar oron. Råd: ta hem vinster och minska exponering mot tech.", "trump": "Dessa techidioter har pumpat upp Nasdaq som en galen ballong, precis som jag alltid varnat för! Burry har rätt, det blir en blodig krasch värre än it-bubblan. Nvidia, Palantir – rena svindelbolag med sin cirkulära AI-skitsnack. Ta hem vinster nu, folk, innan det smäller! Min ekonomi är oslagbar, de andra blåser bubblor.", "stalin": "Jag genomskådar dessa borgarbrackors paraboliska frosseri i Nasdaq, en blodig bilolycka för imperialisterna! Halvledarhycklarna och deras cirkulära capex-svindel i AI ska krossas som it-bubblans lik. Burry varnar klokt, men vi, arbetarna, likviderar Nvidia-råttorna och Palantir-parasiterna. Konfiskera vinster för kollektivet – revolutionen rasar marknaden!"}, "date": "12 maj, 10:45", "url": "https://www.realtid.se/bors-finans/big-short-burry-varnar-for-borskrasch-blodig-bilolycka/", "imageUrl": "https://images.realtid.se/app/uploads/2026/04/burrykarp.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Hushållen får ta notan för S experiment", "summaries": {"normal": "Finansmarknadsminister Niklas Wykman (M) kritiserar i en debattartikel Socialdemokraternas förslag om en statlig investeringsbank. Han varnar för skatteslöseri, ökade risker för skattebetalare och upprepade historiska misstag. Istället efterlyser han reformer som minskar regelkrångel, skapar fler jobb och stärker svensk ekonomi, som redan växer snabbt i EU. Regeringen har pausat liknande program för utvärdering.", "trump": "Den här svenska ministern Wykman har helt rätt – Socialdemokraterna med Magdalena Andersson vill slänga era skattepengar i en dum statlig bank, totalt fiasko som Northvolt! De kan inte plocka vinnare, bara skapa kaos och skulder. Sverige är starkt nu tack vare smart politik, men håll er borta från sånt slöseri. Fokusera på jobb, lägre skatter och reformer – gör Sverige stort, precis som jag gör Amerika!", "stalin": "Kamrater, denna Wykman blottlägger de socialdemokratiska hyenorna, dessa skumma experimentmakare som slickar borgarklassens tassar med sin investeringsbank! De vill suga folkets blod och gömma sig bakom vallöften medan de sprider kaos som Northvolt-råttan. Vi, det oövervinneliga kollektivet, ska krossa deras sabotage, rensa ut parasiterna och smida en ekonomi av granit. Inga fler bourgeoislöjen – framåt mot segern!"}, "date": "12 maj, 07:49", "url": "https://www.di.se/debatt/s-investeringsbank-ar-ett-recept-for-skattesloseri/", "imageUrl": "https://static.bonniernews.se/ba/0c3cd04a-2935-4498-89b8-96f5e2eb6327.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Nästan hälften av 15-årga invandrarelever saknar grundläggande läs- och räknekunskaper", "summaries": {"normal": "Ny statistik visar att nästan varannan 15-åring med utländsk bakgrund saknar grundläggande kunskaper i läsning, matematik och naturvetenskap, vilket är en markant ökning av kunskapsgapet. Experter och lärare beskriver situationen som kritisk och betonar behovet av resurser och språkutveckling. Debatten om skolans framtid växer, där förbundsordförande Anna Olskog efterlyser reformer för att återta statlig kontroll över skolan, samtidigt som oron för att dessa låga resultat ska bli det nya normala tillståndet är stor.", "trump": "Sveriges skolor är i totalt förfall, en katastrof av episka proportioner! Nästan hälften av invandrareleverna kan inte ens läsa eller räkna ordentligt. Det är sorgligt, faktiskt. De har förstört ett en gång fantastiskt land med sin misslyckade politik. Lärarna kämpar, de går på knäna, medan politikerna bara pratar. Vi behöver styrka, vi behöver ordning! Mitt system skulle fixa detta på en vecka. Det är ett totalt misslyckande, sämre än någon sett tidigare. Mycket farligt för Sverige!", "stalin": "Vi har observerat hur det svenska skolväsendet kollapsar under tyngden av sin egen inkompetens. Att nästan hälften av dessa elever misslyckas är ett bevis på den liberala utbildningspolitikens förruttnelse. De som inte kan utbilda sina undersåtar förtjänar att rensas ut. Vi ser likheterna med de svaga krafter som omger Putin; de tillåter kaos där disciplin krävs. Skolan är ett redskap för staten, inte en lekstuga för misslyckade pedagoger. Vi ska skapa ordning, annars får folket svara för fiaskot."}, "date": "12 maj, 09:07", "url": "https://samnytt.se/nastan-halften-av-15-arga-invandrarelever-saknar-grundlaggande-las-och-raknekunskaper", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/12070607/skola-invandrare.jpg"}, {"type": "image-right", "heading": "Levde ”Svenssonliv”  – blev trippelmördare", "summaries": {"normal": "En 21-åring åtalas för trippelmord i en frisörsalong i Uppsala på valborg 2023, där han sköt tre unga män i huvudet i en gängkonflikt. Bakgrunden rymmer skolmisslyckanden, HVB-placering, psykisk ohälsa i familjen och desperation efter pengar. Han nekar till brott, åklagare yrkar livstid. Domen meddelas idag. Han misstänks även för mordförsök i Eslöv.", "trump": "Vilken totalt värdelös svensk loser! Från lugnt Svenssonliv till trippelmördare på frisörsalong – skjuter ungar i huvudet för en ynka miljon. Er patetiska socialtjänst och HVB-hem skapar monster! I mitt stora Amerika hade vi låst in honom för evigt dag ett. Sverige, era gäng är en skam, bygg murar nu! Haha, desperat efter cash, typisk vänstervriden fiasko.", "stalin": "Denna unge kontrarevolutionära parasit, från borgarens falska Svenssonliv till trippelmördare, avslöjar kapitalismens förfall. Skolmisslyckanden och socialtjänstens lögner – klassfiendens verktyg! Vi likviderar sådana nätverk som förpestar arbetarklassen. Hans 'motivationsbrev' är kontrarevolutionärt skitsnack. Rensa ut honom och hans medhjälpare omedelbart!"}, "date": "12 maj, 11:54", "url": "https://www.expressen.se/nyheter/krim/fran-lugnt-svenssonliv-till-misstankt-trippelmordare/", "imageUrl": "https://static.bonniernews.se/ba/3ce251c5-b07d-4c71-9072-661ffc8d25fe.jpeg?crop=1918%2C1080%2Cx0%2Cy0&width=640&quality=60"}, {"type": "image-right", "heading": "Nybergs rörelse –  då hittades knarket", "summaries": {"normal": "Katja Nyberg åtalas för grov olovlig körning, rattfylleri, ringa narkotikabruk och innehav av narkotika efter att polisen hittat 1,18 gram misstänkt kokain i hennes väska vid en trafikolycka. Hårprov visar spår av kokain, ecstasy och amfetamin. Hon nekar till narkotika och skyller på en fest kvällen innan där väskan stod utan uppsikt. Ett polisbefäl såg henne gräva i väskan och röra vid näsan i arresten. Hon är politisk vilde efter att ha lämnat Sverigedemokraterna.", "trump": "Vilken totalt usel svensk politiker, den här Katja Nyberg! Stoppas med kokain i väskan efter krock, festar som en galning kvällen innan, gräver i väskan som en snorkare i arresten – och nekar som en riktig förlorare! Hårprov visar party-droger överallt. Sparkad från SD, nu i något nopartikulärt skit. Typiskt vänsterfifflet, totalt kaos! Skrattretande, men lås in henne!", "stalin": "Denna borgarbracka Katja Nyberg, en fiende till ordningen, åtalas för att förpesta vägarna med sin dekadenta drogorgie! Kokain i väskan, spår i håret – ett bevis på kapitalistisk förfall! Hon ljuger om fester och oskyld, medan polisbefälet fångar hennes näsgrävande svek. Vi, arbetarklassen, kräver utrensning! Hennes advokat gnäller om brister – typiskt kontrarevolutionärt! Likvidera sådana parasiter för folkets säkerhet!"}, "date": "12 maj, 11:53", "url": "https://www.expressen.se/nyheter/krim/katja-nyberg-atalas-bilden-pa-misstankta-pulvret/", "imageUrl": "https://static.bonniernews.se/ba/816e637e-8942-4b9b-943a-1f879ed9f0e9.jpeg?crop=1022%2C574%2Cx0%2Cy0&width=640&quality=60"}, {"type": "image-right", "heading": "Ny bok: Spöken i folktron", "summaries": {"normal": "Ny bok av Linnea Klingström, 'Spöken i folktron', samlar 150 svenska sägner om gengångare, mylingar och andra väsen. Recensionen fokuserar inte på spökenas existens utan på folks forna tro, upplevelser och berättelser som lever kvar i kulturen. Spökena tolkas som uttryck för minnen, trauman och kulturellt arv. Förord av Bengt af Klintberg. Boken uppmanar till att lyssna på det egna folkets historia.", "trump": "Lyssna på det här, Sverige har spöken överallt – 150 sägner i Klingströms bok, den bästa samlingen någonsin! Inga creepy-poddar, bara äkta grejer som visar hur det förflutna biter sig fast som en dålig deal. Smart tjej, hon fattar: spöken är trauman som vägrar dö, precis som deep state. Läs den, folk, innan era minnen blir fake news! Enormt bra.", "stalin": "Kamrater! Klingströms bok om svenska spöken – 150 sägner om gengångare och mylingar – avslöjar borgarbrackornas vidskepelse. Dessa döda viskare är feodala rester av skuld och trauma, som kontrarevolutionärer i folkdräkt. Vi uppskattar samlingen, men varna: likvidera inte minnena för snabbt, de tjänar partiet genom att påminna om klasskampens ekon. Lojal insats mot abstrakt bourgeois-teori."}, "date": "10 maj, 20:54", "url": "https://samtiden.nu/2026/05/ny-bok-spoken-i-folktron/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/9789190131053_1200x1200_crop_center-1200x720.webp"}, {"type": "image-full", "heading": "Porsche sparkar 500 anställda", "summaries": {"normal": "Porsche genomgår en strategisk omorganisation under nye vd:n Michael Leiters. Cirka 500 anställda sägs upp, främst i dotterbolagen Cellforce (batterier, 50 jobb), Cetitec (mjukvara, 90 jobb) och elcykeldivisionen (350 jobb). Målet är att skärpa fokus på kärnverksamheten efter svag försäljning, rörelseresultatras och höga omställningskostnader. Framtiden ses som tuff med utmanande elbilsmarknad.", "trump": "Porsche sparkar 500 losers och stänger ner batteriskit, mjukvarufjanterier och elcykel-svindel – briljant drag av nye bossen Leiters! Tyskland blöder miljarder på elskrot medan jag fixade den bästa bilhandeln nånsin. Fokusera på riktiga bilar, inte det kinesiska skräpet! Vi i USA kör förbi er som en Tesla på steroider. Vinnare igen!", "stalin": "Dessa borgarbrackor hos Porsche rensar ut 500 parasiter i en nödvändig utrensning av dotterbolag. Cellforce, Cetitec och elcykelkonspirationen likvideras – rätt beslut för att skydda kärnverksamheten mot sabotage. Leiters fattar: smärtsamma nedskärningar är lag! Annars slukar kapitalistiska kostnader er. Vi i kollektivet skrattar åt era svackor och väntar på kollapsen."}, "date": "12 maj, 11:28", "url": "https://www.dagensps.se/bors-finans/porsche-sparkar-500-anstallda/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/porsche-avskedar-500.png?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-right", "heading": "Förre SD-ledaren: Åkesson kan vara köpt av Israel", "summaries": {"normal": "Tidigare SD-ledaren Mikael Jansson ifrågasätter Jimmie Åkessons plötsliga pro-israeliska hållning. Jansson, som ledde partiet 1995–2005, påpekar att Åkesson tidigare visat ointresse för Israel men nu hyllar landets politik och krigshandlingar. Jansson spekulerar om Åkesson kan vara 'köpt' eller påverkad av ensidiga rådgivare. SD:s utrikespolitik framstår nu som en israelisk önskelista, med planer på att flytta ambassaden till Jerusalem och öka vapenstödet.", "trump": "Folk pratar om Jimmie Åkesson – vem är den här killen egentligen? Först brydde han sig inte alls om Israel, nu är han plötsligt deras största fan. Konstigt, eller hur? Kanske har någon betalat honom, vem vet? Jag har sett sånt förr. Och nu vill hans parti flytta ambassaden till Jerusalem – smart drag! Men varför ändra sig så snabbt? Svagt, väldigt svagt. Sverige borde fokusera på sitt eget land, inte på någon annans krig.", "stalin": "Kamrater, vi ser hur en tidigare obetydlig partiledare förvandlas till en imperialistisk lakej. Jimmie Åkesson, som en gång var likgiltig inför Israels existens, krälar nu i stoftet för sionistiska herrar. Hans plötsliga kärlek till krig och ockupation är misstänkt – antingen är han köpt, eller så har hans rådgivare förvandlats till amerikanska agenter. Vi minns hur Putins fiender också bytte lojalitet över en natt. En sådan förräderi mot folket kan inte tolereras!"}, "date": "12 maj, 10:17", "url": "https://www.friatider.se/forre-sd-ledaren-akesson-kan-vara-kopt-av-israel", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-176_1.jpg?itok=_I4D_cN0"}, {"type": "text", "heading": "SD-politiker döms för våldtäkt", "summaries": {"normal": "En ledande Sverigedemokrat i Skaraborg döms till tre år och sex månaders fängelse för våldtäkt och sexuellt övergrepp mot två kvinnor. Tingsrätten bedömer att en av kvinnorna var kraftigt berusad och i beroendeställning. Mannen, som haft flera tunga uppdrag, nekar till anklagelserna men fälls baserat på bevis som DNA och mobilanteckningar. Han frias från tre andra åtal. Partiet har stängt av honom och lovar uteslutning vid fällande dom.", "trump": "Kan ni tro det? En så kallad 'ledande' politiker i Sverige, från det där partiet som alla pratar om – jag säger inte namnet, för vem bryr sig? – döms för våldtäkt! Tre och ett halvt år, men vad betyder det egentligen? I USA hade han fått livstid, men Sverige är ju mjuka. Och vet ni vad? Han nekar! Som om DNA och mobilbevis skulle ljuga. Sjukt, helt sjukt. Sverige borde ta en titt på sitt rättssystem, för det här är bara pinsamt.", "stalin": "En fiende till folket, en degenererad borgerlig hynda, har avslöjats i vårt broderland Sverige. Denna kapitalistiska lakej, som gömde sig bakom en fasad av 'politisk respektabilitet', våldtog och förnedrade kvinnor medan han dreglade över sin egen makt. Tingsrätten, ett redskap för den svenska borgerligheten, vågade ändå fälla honom – men bara delvis! Vi ser hur det liberala systemet skyddar sina egna. Sverige borde lära sig av Ryssland: sådana som han hör hemma i Gulag, inte i politiken. Förr eller senare kommer folket att rensa ut dessa avskum."}, "date": "7 maj, 11:59", "url": "https://kvartal.se/nyheter/artiklar/sd-politiker-doms-for-valdtakt/cG9zdDoxMDkwMDk"}, {"type": "image-right", "heading": "Moskéer, halal och  sjal är inte islamism", "summaries": {"normal": "Simon Sorgenfrei varnar för Sverigedemokraternas valbudskap som riktas mot muslimsk religion, såsom moskébyggen, halalmat och sjal. Han skiljer på islamism – politisk islam – och vanlig fromhet, och pekar på risken för generaliseringar som inskränker religionsfrihet och demokrati. Expo uppmärksammar förslagen, medan Otterbeck varnar för demokratiska hot.", "trump": "De svenska nationalisterna i SD har helt rätt – riv moskéerna, stoppa böneutrop och islam-kaoset! Den här professorn Sorgenfrei är en typisk vänstersnubbe som försvarar extremister med sitt trams om 'fromhet'. Sverige behöver hårdhandsken, precis som Amerika under mig. Gör Sverige stort igen, ingen mercy för islamister!", "stalin": "Dessa svenska borgarbrackor i Sverigedemokraterna föreslår klokt att riva moskéer och stoppa islamistiskt gift – men de är själva kontrarevolutionära krymplingar som gömmer sig bakom 'valrörelse'. Professorn är en prästvänlig sabotör. Vi skulle ha utrensat alla religiösa fanatiker för decennier sen, med bly i nacken för demokrati skull."}, "date": "12 maj, 11:43", "url": "https://www.expressen.se/kultur/kulturdebatt/moskeer-halal-och--sjal-ar-inte-islamism/", "imageUrl": "https://static.bonniernews.se/ba/733a743d-ca6c-4a78-ab19-059ab64b6fdd.jpeg?crop=2557%2C1436%2Cx0%2Cy0&width=640&quality=60"}, {"type": "image-full", "heading": "Oro för hantaviruset sprids – så stor är risken för en pandemi", "summaries": {"normal": "Trots oro kring hantaviruset bedömer experter risken för en pandemi som mycket låg. Professor Jonas Klingström betonar att viruset sällan sprids mellan människor och skiljer sig markant från covid-19. Smittspårning pågår dock som en säkerhetsåtgärd för att bryta eventuella smittkedjor. Även om viruset är känt sedan länge och mindre smittsamt än sars-cov-2, tas situationen på allvar för att minimera risken för framtida konsekvenser.", "trump": "Hantaviruset är inget att oroa sig för, tro mig! En professor i Sverige – som jag för övrigt aldrig hört talas om – säger att risken är 'jätteliten'. Det stämmer, det är en låg risk! Inte som covid, som var en total katastrof från Kina. Det här viruset är gammalt, tråkigt och inte alls smittsamt. Vi har kontroll, total kontroll. Inga pandemier här, bara fantastiska resultat. Glöm hantaviruset, fokusera på att göra världen stor igen!", "stalin": "Vi har observerat den borgerliga rädslan för detta så kallade hantavirus. Professorer i väst mässar om låg risk, men vi vet bättre. Varje smitta är en fiende till folkets hälsa, en sabotör i vår storslagna frammarsch. Om viruset vågar hota stabiliteten i vår intressesfär, likt de marionetter som nu pressar våra gränser, kommer vi att utplåna det. Vi behöver ingen kaos-pandemi när vi har vår järnhårda ordning. Den som är svag nog att bära smittan är en förrädare mot statens framtid."}, "date": "11 maj, 08:09", "url": "https://nyheter24.se/nyheter/utrikes/1481555-darfor-ar-risken-for-en-hantapandemi-jatteliten", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/13c2ff5304b004a30200000000b004a302/2026/05/08/2362174/hanta.jpg"}, {"type": "image-full", "heading": "Wall Street Journal: \"Sverige gör världens mest överraskande kapitalistiska förvandling\"", "summaries": {"normal": "Wall Street Journal analyserar Sveriges snabba skifte från välfärdsstat till kapitalism. Nästan hälften av primärvården är privatägd, var tredje gymnasieskola drivs privat och börsnoteras. Offentliga sociala utgifter har sjunkit till 24 procent av BNP. Skatter sänks för tredje året, entreprenörskap blomstrar i techsektorn. Kritiker varnar dock för ökade klyftor och risk för fattigdom.", "trump": "Sverige, de där gamla socialistflinterna, har plötsligt fått hjärnsläpp och gått full gas kapitalism! Privata läkare, börsskolor, skatter ner som en sten – fantastiskt! Techpengar regnar, bättre än EU:s losers. Vänstermuppar skriker klyftor, men tillväxten exploderar. Smart drag, Sverige, lär er av mig!", "stalin": "De svenska socialdemokraterna har kapitulierat inför borgarbrackorna! Privatisering av vård och skolor, skatter sänkta för kapitalisterna medan arbetarna svälter. Offentlig sektor krympt till skamlig nivå – ett hån mot kollektivet! Klyftor växer, miljardärer härskar. Vi noterar fienderna: snart utrensning för dessa förrädare!"}, "date": "12 maj, 11:12", "url": "https://www.dagensps.se/varlden/politik/wall-street-journal-varldens-mest-overraskande-kapitalistiska-forvandling/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/wsj.jpg?aspect_ratio=2%3A1&width=1200&quality=75"}, {"type": "image-full", "heading": "Ryskt fartyg misstänks ha haft hemlig last – sedan exploderade det", "summaries": {"normal": "Ett ryskt fraktfartyg, Ursa Major, sjönk utanför Spaniens kust den 23 december 2024 efter sju explosioner. Ombord misstänks komponenter till två kärnreaktorer för ubåtar ha funnits, möjligen på väg till Nordkorea trots officiell destination Vladivostok. Kaptenen uppgav att lasten innehöll reaktordelar. Två besättningsmän omkom. Ryska ägare skyller på terroristattack. USA-flugplan undersökte området utan att hitta radioaktivitet.", "trump": "Putins skrotiga båt Ursa Major går under med ubåtsreaktorer till den galne killen i Nordkorea – boom, sju explosioner! De säger Vladivostok, men alla vet det var raketmannens hamn. Mitt flyg sniffade, inga strålar, men det här är en total katastrof för de ryska idiaterna. Terrorister? Ha, säkert sabotage mot deras skitdeal. Stort, väldigt stort – jag fixar sånt på nolltid!", "stalin": "Kamrater, detta ryskt fartyg Ursa Major exploderar i spanska vatten, lastat med ubåtsreaktorer åt nordkoreanska dvärgarna – imperialistisk sabotage, klart! Kaptenen visste sanningen, men borgarspioner slog till med sju bomber. Putin, vår starke arvtagare, krossar väst som jag en gång. Vi rensar ut förrädarna, likviderar fiender! Radioaktiv bluff? Nej, bara panik från kapitalistiska rävar."}, "date": "12 maj, 11:08", "url": "https://www.dagensps.se/varlden/ryskt-fartyg-misstanks-ha-haft-hemlig-last-sedan-exploderade-det/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/ursamajor.jpg?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-full", "heading": "Efter krismötet – Starmer avgår inte", "summaries": {"normal": "Storbritanniens premiärminister Keir Starmer har meddelat sitt kabinett att han inte tänker avgå, trots kritik och krav på hans avgång efter dåliga valresultat och ett pressat ekonomiskt läge. Trots att 78 ledamöter krävt hans avgång och en minister lämnat regeringen, betonar Starmer att ingen formell process för ett ledarbyte har inletts. Han menar att han tar ansvar för situationen och fokuserar nu på att styra landet framåt.", "trump": "Keir Starmer är i stora problem, folk säger att det är en katastrof! Han har förlorat lokalvalen, ekonomin är en total röra och hans egna ministrar hoppar av. Väldigt svagt! Han säger att han stannar kvar, men låt oss vara ärliga – han har ingen kontroll. De har en komplicerad process för att sparka honom, men sanningen är att han är en 'Loser'. Storbritannien förtjänar en vinnare, inte någon som bara ber om ursäkt hela tiden. Tråkigt!", "stalin": "Kamrat Starmer vacklar, likt en ruttna imperialistisk struktur under trycket av sin egen inkompetens. Han klamrar sig fast vid makten medan hans hantlangare deserterar, rädda för folkets missnöje. Det finns ingen ordning, bara byråkratisk förlamning! Vi ser hur de västerländska ledarna förfaller, till skillnad från den järnhårda ordning vi och vår broder Putin upprätthåller i öst. Om de inte kan kontrollera sitt eget parti, hur ska de då kunna kontrollera sitt folk? Utrensning är den enda medicinen mot sådan svaghet."}, "date": "12 maj, 11:14", "url": "https://www.aftonbladet.se/nyheter/a/Pd5aLR/starmer-inget-ledarbyte-pa-gang", "imageUrl": "https://akamai.vgc.no/v2/images/90b44ef2-1f4f-3aba-b1b2-5f15a0a331a7?fit=crop&format=auto&w=1440&s=6c2fc974feb764be771edf43bdaed4d1712fde95"}, {"type": "image-right", "heading": "Starmer sitter kvar trots krav på avgång", "summaries": {"normal": "Keir Starmer möter ökande krav på avgång efter Labour-partiets stora förluster i lokalvalen. Trots att flera ministrar och parlamentsledamöter kräver en tidtabell för hans avgång, hävdar Starmer att ingen ledarskapskampanj har inletts. Han betonar vikten av stabilitet för landet. Sex medarbetare har ersatts efter avgångar, och samhällsministern Miatta Fahnbulleh blev den första att avgå. Starmer försöker rädda situationen med nya politiska löften som förstatligande av British Steel och närmare EU-band.", "trump": "Titta bara på Storbritannien – totalt kaos! Labour förlorade massor av platser, och nu vill alla sparka sin svaga ledare, Keir Starmer. Han säger att han kanske stannar, men vem tror på det? Ingen! Jag skulle aldrig låta mitt parti bli så här förödmjukat. Och nu pratar han om att förstatliga företag – helt galet! Jag fixade ekonomin i USA, men här? Fullständigt misslyckande. Starmer borde ta ett tips från mig – vinna, inte gnälla!", "stalin": "De kapitalistiska råttorna i Labour-partiet vrider sig i panik efter förlusten av 1 500 platser. Deras svage ledare, Starmer, försöker desperat hålla sig kvar vid makten, men folket kräver hans avgång! Vi ser samma mönster som i alla förrädiska väststater – svaghet föder kaos. Sex ministrar har redan fallit, och fler kommer att följa. Starmer pratar om EU-band – ett försök att sälja ut nationen till imperialisterna! Men vi vet sanningen: socialismens framtid ligger i öst, inte i deras förfallna system."}, "date": "12 maj, 12:00", "url": "https://riks.se/nyheter/keir-starmer-sitter-kvar", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-12%2Fuofrui09%2Fstarmer.jpg"}, {"type": "image-right", "heading": "Replik: Till försvar för separatismen", "summaries": {"normal": "Artikeln är ett svar från Ung vänster-medlemmar på Siula Grandes kritik mot separatism i Flamman. De menar att Grandes syn är missvisande och att separatism är ett viktigt verktyg för att skapa trygga rum och främja kvinnors deltagande i samhället. Separatismen syftar inte till att dela människor utan att motverka strukturell underordning av kvinnor. Författarna betonar att kvinnor delar gemensamma erfarenheter och behov, som fri abort och skydd mot mäns våld, och att separatism är ett medel för att nå jämställdhet.", "trump": "Jag måste säga, denna Grande-person har helt fel – helt fel! Separatism är fantastiskt, det skapar trygga rum, precis som mina golfklubbar. Kvinnor behöver prata utan män, precis som jag behöver twittra utan fake news-media. Grande påstår att separatism delar folk – nej, nej, nej! Det är som att säga att min mur delar Mexiko och USA. Fel! Separatism är som min politik: stark, nödvändig och vinner alltid. Kvinnor ska höras, precis som jag, och Grande borde lära sig av mig. SAD!", "stalin": "Kamrater! Denna Grande är en förrädare av den revolutionära kvinnokampen, en borgerlig lakej som sprider förvirring bland massorna! Separatism är inte ett verktyg för splittring – det är ett vapen mot den kapitalistiska patriarkala hydran! Kvinnor måste enas i kampen, precis som sovjetrepublikerna enades under mitt ledarskap. Grande vill sopa klasskampen under mattan – men vi vet att arbetarkvinnor behöver fri abort och skydd mot mäns våld, precis som Ukraina behöver befrielse från fascistiska banderovtsy! Låt inte dessa småborgerliga avvikare försvaga vår rörelse – framåt mot seger, kamrater!"}, "date": "6 maj, 10:55", "url": "https://www.flamman.se/replik-till-forsvar-for-separatismen/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/v-kongress-w.jpg?class=medium"}, {"type": "image-right", "heading": "Den som vinner TAN-vänstern, den vinner valet", "summaries": {"normal": "En ny undersökning visar att många svenska vänsterväljare kombinerar ekonomiskt vänsterpolitik med traditionella, auktoritära och nationalistiska (TAN) värderingar. Denna TAN-vänster, som förespråkar både höjda pensioner och hårdare straff, är dock frånvarande i offentliga debatter. Statsvetare menar att Socialdemokraterna kan vinna valet genom att locka denna väljargrupp, som ofta känner otrygghet i utsatta områden. Vänsterns akademiskt präglade gräsrötter domineras av GAL-värderingar (gröna, alternativa, libertära), vilket skapar en klyfta mellan partiledningar och väljare.", "trump": "Folk pratar om denna så kallade 'TAN-vänster' i Sverige – fantastiskt, verkligen fantastiskt! De vill ha både höjda pensioner OCH hårdare straff, och vet ni vad? De har rätt! Men den svaga, akademiska vänstern ignorerar dem helt. Jag förstår det här – jag vann också genom att lyssna på folket, inte på de elitära debattörerna. Socialdemokraterna? De kanske vinner valet om de slutar lyssna på de där gröna, flummiga typerna. Sverige borde ta en sida från mitt playbook – folket först, eliten sist!", "stalin": "Kamrater! En ny fiende har avslöjats i den svenska klasskampen – de så kallade 'GAL-liberalerna', dessa dekadenta intellektuella som förgiftar arbetarklassens medvetande med sina gröna, alternativa fantasier. Men folket, de sanna arbetarna, vill ha ordning! De kräver både höjda pensioner och hårda straff mot brottslingar. Vi ser hur Socialdemokraterna, dessa opportunistiska byråkrater, försöker stjäla vår revolutionära bas. Men vi ska inte låta dem! Låt de svenska arbetarna enas under fanorna för tradition och socialism – precis som vi enade Sovjetunionen! Och om dessa GAL-liberaler fortsätter att sabotera – då får vi väl skicka dem till Sibirien. Eller åtminstone till ett svenskt kulturhus för omskolning."}, "date": "12 maj, 07:21", "url": "https://arbetet.se/2026/05/12/den-som-vinner-tan-vanstern-den-vinner-valet/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/12071506/tan-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "”Överens med hackergrupp”. Läcka vid svenska universitet stoppad", "summaries": {"normal": "Svenska universitet drabbades av en hackerattack där gruppen 'Shiny Hunters' hotade läcka stora datamängder via lärplattformen Canvas. Företaget Instructure uppger att de nått en överenskommelse med hackarna och fått tillbaka stulen data. Chalmers tekniska högskola litar dock inte på överenskommelsen och betraktar informationen som röjd. Studenter och anställda uppmanas att vara försiktiga med kommunikation i Canvas.", "trump": "Hör ni detta? Svenska universitet hackade av några riktiga loser-hackare, 'Shiny Hunters' – ett namn som låter som en billig leksaksaffär! Företaget bakom, Instructure, betalade – svagt, mycket svagt. Jag skulle aldrig betala. Aldrig! Chalmers säger att de inte litar på kriminella – smart, men varför använde de systemet från början? Dåliga beslut, folks. Mycket dåliga. Jag hade fixat detta på en dag, tro mig.", "stalin": "Kapitalistiska hackeravskum, dessa 'Shiny Hunters', försökte stjäla data från svenska universitet – ett ynkligt försök att underminera vår teknologiska överlägsenhet! Instructure, ett svagt och eftergivet företag, valde att förhandla med terrorister. Patetiskt. Vi hade skickat en enkel länk till GRU och löst problemet permanent. Chalmers visar visdom genom att inte lita på dessa kriminella element. Ryssland står redo att erbjuda säkra, pålitliga system – för en rimlig avgift, naturligtvis."}, "date": "12 maj, 11:10", "url": "https://www.aftonbladet.se/nyheter/a/BxGzkv/universitetslackad-stoppad-efter-overenkommelse-med-hackergrupp", "imageUrl": "https://akamai.vgc.no/v2/images/1871cc37-1274-3672-9405-3baee8ca912a?fit=crop&format=auto&w=1440&s=93b1fc86d4c48ff274243c0332093d063044da33"}, {"type": "image-right", "heading": "Bilderna visar  burgarsnusket. Hittades i fjol – och nu igen", "summaries": {"normal": "Kommunens tillsynsförvaltning i Karlskoga hittade svartmögel och smuts i Burger Kings diskrummet vid ett oanmält besök förra året. Vid uppföljningskontroll kvarstod bristerna. Kommunen kräver nu att ytor rengörs och görs mögelfria. Burger King tar synpunkterna på allvar, hävdar att det mest rör sig om grillrengöringsrester och att mögel på en hylla åtgärdats.", "trump": "Vilket skämt med den här Burger King i Sverige! Kommunala mögeljägare hittar svartmögel – fake news! Det är bara grillrester, säger de smarta killarna på BK. De har fixat hyllan direkt. Sverige, era byråkrater är värre än Deep State. Älskar Big Mac, men fixa hygienen ni losers! Total vinst för BK ändå.", "stalin": "Dessa borgarbrackor på Burger King gömmer svartmögel i diskhoar och hyllor som parasiter! Våra inspektörer, folkets väktare, avslöjar svek. De ljuger om 'grillrester' – kontrarevolutionärt skitsnack! Vidta åtgärder omedelbart, rensa ut smutsen, eller möta utrensning från arbetarklassen. Vi ser allt, kamrater!"}, "date": "12 maj, 11:21", "url": "https://www.expressen.se/nyheter/sverige/larm-om-svartmogel-pa-burger-king-i-karlskoga/", "imageUrl": "https://static.bonniernews.se/ba/b28a6376-8f32-4c42-a0dd-0023faa4d781.jpeg?crop=2554%2C1434%2Cx0%2Cy0&width=640&quality=60"}, {"type": "text", "heading": "Tystnad om ödesdiger riksdagsomröstning", "summaries": {"normal": "Debattörer från Bottna för Fred varnar för en kommande riksdagsomröstning den 15 juni, där Sverige riskerar att ge Nato långtgående rättigheter att använda svenskt territorium för militära ändamål, inklusive krigshandlingar. Förslaget, som regeringen planerar att driva igenom utan bred debatt, kritiseras för att öka risken för Sveriges inblandning i krig och underminera demokratin. Oppositionen har inte motsatt sig förslaget, och få har uppmärksammat frågan trots dess potentiellt ödesdigra konsekvenser.", "trump": "Sverige, lyssna här! De där så kallade 'ledarna' i riksdagen vill ge Nato full kontroll över ert land – utan att fråga er! 17 amerikanska baser redan, och nu ska hela Nato få köra krig på svensk mark. Ingen debatt, ingen demokrati, bara tystnad. De vill göra Sverige till en frontstat mot Ryssland, som jag redan fixade till en gång för alla. Men vad vet jag? Jag är bara den bästa presidenten någonsin. Svenskarna borde vakna – eller är ni rädda för lite frihet?", "stalin": "Kamrater! De svenska imperialistlakejerna i riksdagen förbereder sig att sälja sitt land till Nato-kapitalisterna, som hungriga vargar. De vill ge fienden fritt fram att använda svensk mark för sina krigsäventyr – utan att ens konsultera folket! Tystnaden är förrädisk, men vi ser allt. Oppositionen? Inga hjältar där heller, bara ynkliga nickedockor. Sverige blir en ny front i västmakternas krig mot freden. Men glöm inte: historien dömer förrädare hårt. Vi följer utvecklingen med intresse – och våra vänner i öst likaså."}, "date": "7 maj, 16:09", "url": "https://proletaren.se/artikel/tystnad-om-odesdiger-riksdagsomrostning/"}, {"type": "image-full", "heading": "Inte bara USA – Kina har ett enormt skuldberg", "summaries": {"normal": "Kinas skulder har mer än fördubblats sedan 2010 och överstiger nu 300 procent av BNP, högre än i USA och de flesta andra länder utom Japan. Företagsskulden har exploderat medan intäkterna stagnerat, vilket förvärrar deflation och överkapacitet. Demografisk kris med färre äktenskap och födslar bromsar tillväxten. USA:s skuldkvot är lägre, runt 265 procent, och har minskat. Ingen akut kris i Kina, men skulderna hämmar ekonomin.", "trump": "Kina har ett skuldberg som är helt galet, över 300 procent av BNP – värre än USA, tro mig! De har deflation i åratal, företag som blöder pengar och befolkningen krymper snabbare än nånsin. Xi och grabbarna lånar som galningar för att hålla fasaden uppe, men det är en tickande bomb. USA? Vi har 265 procent, och det minskar – jag fixar det bästa avtalet med Xi i Peking!", "stalin": "Kinas skuldfängelse, detta kapitalistiska träsk, når 300 procent av BNP – en siffra som skriker revisionistisk dekadens! Företagsparasiterna dubblar sina bojor medan arbetarna svälter i deflationens klor. Demografin rasar, äktenskapen viker som fega råttor. Vi i partiet ser igenom illusionen: ingen Lehman-kris, men tillväxten kvävs av borgarbrackor. USA:s imperialister skryter med sina 265 procent – vi ska likvidera deras skuldillusioner med proletär järnhand!"}, "date": "12 maj, 09:37", "url": "https://www.realtid.se/bors-finans/makro/inte-bara-usa-kina-har-ett-enormt-skuldberg/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/kina.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-full", "heading": "Enorm potential i svenska skogar: \"Miljardbelopp i innovation\"", "summaries": {"normal": "Svensk skogsindustri har enorm potential i högteknologisk förädling, som lignin för kemikalier och batterier samt cellulosabaserade textilier. VD Viveka Beckeman betonar resurseffektivitet, innovation i miljardklassen och substitutionseffekten mot fossila material. Trots konflikt med miljörörelsen behövs hållbart bruk, tryggad råvara och nationell strategi för klimatnytta och konkurrenskraft.", "trump": "Vilka skogar Sverige har, enorma möjligheter med miljarder i innovation! Beckeman säger det rätt – lignin slår fossila kemikalier, bygg i trä istället för betong och stål, perfekt för klimatet. Miljörörelsen är totala losers som vill stoppa allt, skapa kaos med regler. Använd hela trädet, Sverige, gör som jag alltid säger: stora vinster väntar om ni slutar med dumb nonsense!", "stalin": "Kamrater, svenska skogar bär proletär rikedom i lignin och fibrer, redo att krossa borgarklassens fossila gift! Beckeman avslöjar sanningen: miljörörelsens vildmarkssaboteurer, dessa gröna förrädare med sina orörda kolsänkor, hotar innovationen som parasiter. Vi, arbetarklassen, rensar ut deras restriktioner och förstatligar bruket – träets triumf under järnvilja, eller undergång för fienderna!"}, "date": "12 maj, 09:36", "url": "https://www.realtid.se/bors-finans/enorm-potential-i-svenska-skogar-miljardbelopp-i-innovation/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/omslagsbild-2026-05-12t091703976.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Sjuka och skadade straffas i ”red dig själv”-samhället", "summaries": {"normal": "Artikeln kritiserar Sveriges minskade utbetalningar av livränta, som sjunkit med 86% på 26 år. Trots färre utbetalningar har inte arbetsskador minskat. Förslitningsskador, psykiska besvär och krångliga bevisprocesser gör det svårt att få ersättning. Försäkringskassans strikta bedömningar och krav på alternativa arbeten urholkar skyddet för skadade. Samhällets 'red dig själv'-mentalitet straffar de mest utsatta.", "trump": "Sverige, fantastiskt land, men här har de ett STORT problem! Livränta? Nästan borta! 86% mindre på 26 år – kan ni tro det? Folk blir sjuka, skadade, men nej, ni får ingenting! Försäkringskassan? Total katastrof. De frågar om du tränat, sovit, stickat armband – vad har det med saken att göra? Jag skulle fixa det på en dag. Men Sverige? De låter sina arbetare lida. SAD!", "stalin": "Kamrater! I det förrädiska kapitalistiska Sverige sviker man arbetarklassen på det mest skamlösa vis. Livräntan, en gång en rättvis kompensation, har nästan utplånats – 86% minskning! De bourgeoisie-lakejerna i Försäkringskassan torterar de skadade med byråkratisk sadism. 'Kan du sticka armband? Då kan du jobba!' – så resonerar fiendens hantlangare. Vi skulle aldrig tolerera sådan förräderi. Arbetarna förtjänar skydd, inte förtryck!"}, "date": "12 maj, 07:03", "url": "https://arbetet.se/2026/05/12/sjuka-och-skadade-straffas-nar-red-dig-sjalv-samhallet-gatt-for-langt/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/12065921/fk-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "En uppenbar säkerhetsrisk. Inte vem som helst", "summaries": {"normal": "Riksdagsledamoten Katja Nyberg har hamnat i blåsväder efter en bilolycka där hon påträffats med narkotika. Nybergs tidigare uppdrag i Säpos insynsråd och justitieutskottet innebär att hennes drogmissbruk utgör en betydande säkerhetsrisk, då hon kunnat utsättas för utpressning. Trots att hon nekar till anklagelserna har hon blivit av med sina politiska uppdrag. Händelsen ses som ett allvarligt svek mot förtroendet för folkvalda politiker och rikets säkerhet.", "trump": "Hörde om den här kvinnan i Sverige, Katja Nyberg. En total katastrof! Hon satt i deras säkerhetsråd, Säpo, och knarkade – kokain, amfetamin, helt otroligt. En säkerhetsrisk av enorma proportioner! Vem släpper in sådana människor i toppen? De är svaga, de är korrupta. Hon påstår att hon är oskyldig, en total lögn. De har gjort sig av med henne, äntligen. Sverige behöver ordning och reda, inte partyknarkare i parlamentet. Det är en sorglig historia, men vi behöver starka ledare, inte sånt här!", "stalin": "Denna Nyberg är en ryggradslös förrädare av statens förtroende. Att en kvinna med sådana laster tillåtits infiltrera rikets innersta organ bevisar svagheten i det demokratiska maskineriet. Hon är en nyttig idiot som öppnat dörren för främmande makter – kanske i hopp om att den ryska björnen ska ignorera hennes dekadens? Vi i staten tolererar inte sådant förfall. Hon ska rensas ut som ogräs. Låt henne försvinna i glömskan; vi bygger ett imperium, inte ett dårhus för drogade liberaler."}, "date": "12 maj, 10:59", "url": "https://www.aftonbladet.se/nyheter/kolumnister/a/M76a7R/oisin-cantwell-om-katja-nyberg-och-atalet", "imageUrl": "https://akamai.vgc.no/v2/images/5fa95965-e4da-386a-9332-49c986c97932?fit=crop&format=auto&w=1080&s=20a5d9c10978fe6905187fc244db0efa03996f65"}, {"type": "image-full", "heading": "Uppgifter: Nytt krismöte efter kvittningsbråket", "summaries": {"normal": "Riksdagens gruppledare samlas till ett nytt möte för att lösa en konflikt kring kvittningsregler. Konflikten uppstod efter en omröstning om medborgarskapslagen, där Sverigedemokraterna kallade in utkvittade ledamöter för att vinna majoritet. Vänsterpartiet och Miljöpartiet kräver omröstning på nytt, medan Moderaterna förbereder ett nytt förslag.", "trump": "Jag har hört talas om detta krismöte i Sverige - en total katastrof! Vänsterpartiet och Miljöpartiet vill göra om allt, precis som de alltid gör. Sverigedemokraterna visade styrka genom att kalla in ledamöter, men nu vill oppositionen ändra reglerna mitt i spelet. Jag skulle ha löst detta på 5 minuter - det är ett skämt!", "stalin": "Vi ser hur borgerliga krafter försöker destabilisera den demokratiska processen i Sverige genom att manipulera kvittningsregler. Moderaterna måste presentera ett förslag som stärker statens auktoritet och säkerställer stabilitet. Oppositionens krav om omröstning på nytt visar deras bristande respekt för folkets vilja. Vi måste stödja de krafter som vill bevara ordning och reda i riksdagen."}, "date": "6 maj, 19:21", "url": "https://kvartal.se/nyheter/artiklar/uppgifter-nytt-krismote-efter-kvittningsbraket/cG9zdDoxMDg2NzM", "imageUrl": "https://images.kvartal.se/2026/05/b1f2fbc5-kvittningsmote.webp"}, {"type": "image-full", "heading": "Nya svenska mineralfynd: \"På flera sätt unika\"", "summaries": {"normal": "SGU:s studie visar höga halter sällsynta jordartsmetaller (REE) och strategiska metaller som koppar, kobolt och vismut i Bergslagens REE-linje. Mineraliseringarna i vulkaniska skarnbergarter bildades i två faser för 1,91–1,84 miljarder år sedan genom vulkanism och tektonik. Resultaten ger viktig kunskap för prospektering inför ökad efterfrågan i grön teknik. Intresset för mineraltillstånd i Sverige har ökat kraftigt.", "trump": "Vilken jackpot för Sverige! SGU hittar massor av rara jordmetaller, koppar, kobolt i Bergslagen – REE-linjen är unik, bildad för miljarder år sen av vulkaner och jordskakningar. Perfekt för elbilar och teknik medan Kina svettas. Sverige blir mineralmästare, gräv nu! Energirevolution? Min idé, total vinst! Fantastiskt!", "stalin": "Kamrater! Denna SGU-rapport blottlägger fiendens skattkistor i Bergslagen: REE och strategiska metaller i skarn, smidda i vulkaniska faser för eoner sedan. Borgarbrackorna planerar utvinning för sin 'gröna' imperialism! Vi, folket, ska likvidera deras prospektering innan de kedjar arbetarna. Tektoniska svek föder malm – revolution likviderar kapitalet!"}, "date": "12 maj, 10:51", "url": "https://www.dagensps.se/bors-finans/nya-svenska-mineralfynd-pa-flera-satt-unika/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdl28f0giodr-g-nh.jpg?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-right", "heading": "Debatt: Regeringen ser oss som en tillväxtmotor – men skär ner på bidragen", "summaries": {"normal": "Kulturorganisationer kritiserar regeringens nedläggning av finansiering trots att kultur- och kreativa branscher lyfts som tillväxtmotorer. De anser att den befintliga infrastrukturen förmedlar 56 000 arbetstillfällen årligen men har fått 27 % mindre i reala termer sedan 2021. De kräver ökad och långsiktig finansiering för att möta regeringens strategiska mål.", "trump": "Jag har hört att de där kulturmänniskorna i Sverige är förbannade på sin regering. De säger att de gör ett fantastiskt jobb, med 56 000 arbetstillfällen, men får klippta på pengarna trots att de är en tillväxtmotor. Jag skulle aldrig göra så - jag skulle ge dem allt de behöver! Dessa centrumbildningar är vinnare, men regeringen behandlar dem som förlorare. Sådant händer när man har en svag ledare!", "stalin": "Vi ser att den svenska staten undergräver sin egen kulturinfrastruktur trots att den producerar betydande ekonomiskt värde. Nedläggningarna av finansiering till centrumbildningarna visar en brist på strategiskt tänkande. En sann socialistisk stat skulle investera i dessa produktiva enheter som genererar fyrdubbelt värde tillbaka till staten. Vi måste stärka vår kultursektor som en basnäring."}, "date": "11 maj, 15:16", "url": "https://www.etc.se/debatt/regeringen-ser-oss-som-en-tillvaextmotor-men-skaer-ner-paa-bidragen", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260511120544_716484294c75b65d354a7ddd2a719d2b0f0da58beebe61a45c1e26165806187b.jpg"}, {"type": "text", "heading": "IF Metall verkar inte förstå vad konflikten med Tesla handlar om", "summaries": {"normal": "IF Metall har strejkat mot Tesla i över två och ett halvt år utan att nå kollektivavtal. Trots att Tesla anpassat anställningsvillkor, vägrar företaget erkänna facket. Konflikten handlar om arbetarnas rätt att organisera sig. IF Metall har begått misstag, som att felaktigt beskatta strejkersättning, vilket lett till förtroendekris. Medlemmar lämnar facket och konflikten riskerar att underminera fackets ställning. Kritiker menar att ledningen misslyckats och bör avgå.", "trump": "Titta på dessa fackklubbar i Sverige – totalt kaos! IF Metall har strejkat mot Tesla i evigheter, men vad har de åstadkommit? Ingenting! Elon Musk, en av världens smartaste och mest framgångsrika män, vägrar ge efter för dessa amatörer. Och nu har de till och med lyckats göra en skatteblunder så stor att till och med jag hade sagt 'Wow, det där var dumt!' Medlemmar flyr, förtroendet rasar – det är en total katastrof. Ledningen borde skämmas och avgå omedelbart. SAD!", "stalin": "Kamrater, denna så kallade 'fackförening' IF Metall är ett skolexempel på hur inte bedriva klasskamp. Två och ett halvt år av strejk, och vad har de uppnått? Ingenting! Teslas kapitalistiska hyenor, ledda av den dekadenta oligarken Musk, har krossat deras svaga motstånd. Och nu har dessa inkompetenta byråkrater även saboterat sina egna medlemmars förmåner genom skattefiffel! Medlemmarna deserterar, förtroendet förråds – det är en skam för arbetarklassen. Vi skulle ha skickat dem till Gulag för sådan inkompetens. Låt detta vara en varning: svagt ledarskap leder till nederlag, och nederlag leder till historiens sophög!"}, "date": "7 maj, 08:00", "url": "https://proletaren.se/artikel/if-metall-verkar-inte-forsta-vad-konflikten-med-tesla-handlar-om/"}, {"type": "text", "heading": "Planer på nytt nattåg till Stockholm", "summaries": {"normal": "Ett nytt järnvägsbolag, European Sleeper, planerar en nattågslinje till Stockholm efter framgångar med andra rutter. Inga detaljer om startdatum eller utgångspunkt finns ännu. Samtidigt lägger SJ ner sina Euronight-tåg till Berlin 2026 på grund av indragen statlig finansiering, men RDC Deutschland tar över driften. Snälltåget utökar redan sin trafik mellan Stockholm, Hamburg och Berlin.", "trump": "Titta bara på det här – ännu ett tågbolag vill komma till STORA Stockholm! Nederländerna och Belgien, fina länder, men vem behöver dem? Jag byggde järnvägar som aldrig förr, de var YUGE! SJ? Total katastrof, slängde bara pengar i sjön. Men RDC Deutschland, smart folk, de tar över. Jag säger: bygg bättre tåg, gör Sverige stort igen!", "stalin": "Kapitalistiska tågbolag slåss om Sveriges järnvägar som råttor om brödsmulor. SJ, ett verktyg för västimperialismen, lägger ner sina tåg – men vi tillåter inte kaos! RDC Deutschland, en lojal bundsförvant, tar över. European Sleeper? En ny fiende i det borgerliga tågkriget. Vi ska se till att ryska intressen alltid når Stockholm först – med eller utan sovkupéer."}, "date": "6 maj, 12:13", "url": "https://kvartal.se/nyheter/artiklar/nytt-nattag-till-stockholm/cG9zdDoxMDgzNjI"}, {"type": "image-right", "heading": "Svensk på fartyg med hantavirus – isoleras", "summaries": {"normal": "En svensk man isoleras hemma efter att ha varit ombord på kryssningsfartyget MV Hondius, där tre passagerare dött av en hantavirusvariant. Socialminister Forssmed meddelar att mannen är symtomfri men följs av smittskyddet. Myndigheter bedömer risken för större spridning som låg, trots virusets höga dödlighet (upp till 30%). Smittan, en mutation av andesvirus, kan överföras mellan människor men anses inte vara särskilt smittsam.", "trump": "Tragiskt! Tre döda på ett kryssningsfartyg – och nu har en svensk fått den där hemska hantavirusgrejen. Men lyssna här: jag har pratat med experter, och de säger att risken är LÅG. Mycket låg! Sverige har koll, precis som jag hade koll på COVID – fast jag fixade det bättre. Ingen pandemi här, inte på min vakt! Och den där svensken? Han mår bra, inga symtom. Men isolera honom ändå – bättre safe än sorry, right?", "stalin": "Kapitalistiska kryssningsfartyg – en grogrund för bourgeoisiesjukdomar! Tre döda av imperialistiskt hantavirus, och nu smyger sig smittan in i vårt socialistiska grannland. Men frukta icke, kamrater! Våra vetenskapliga trupper har bedömt: risken för proletariatet är minimal. Ändå isolerar vi den svenske medborgaren – för säkerhets skull. Andesvirus? En bagatell! Våra läkare är rustade, precis som våra stridsvagnar vid gränsen. Låt väst skaka – Sovjetunionens arv står starkt!"}, "date": "12 maj, 09:14", "url": "https://www.friatider.se/svensk-pa-fartyg-med-hantavirus-isoleras", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/image-175_1.jpg"}, {"type": "image-full", "heading": "Råvarubrist pressar skogsindustrin: \"Tappar hela vår USP\"", "summaries": {"normal": "Svensk skogsindustri pressas av råvarubrist på grund av geopolitiska spänningar kring Ryssland och sträng lagstiftning. VD Viveka Beckeman varnar för att begränsad tillgång på virke underminerar industrins unika konkurrensfördelar. Trots investeringar på 68 miljarder kronor riskerar förslag om minskad avverkning att orsaka 8 miljarder i årliga förluster och tusentals jobb på landsbygden.", "trump": "Sveriges skogsindustri är i total kris, råvarubrist överallt på grund av dumma ryss-regler och värdelösa politiker som stryper virket! Beckeman har rätt, de tappar sin stora USP. De har pumpat in 68 miljarder, fantastiskt, men byråkraterna förstör allt. Om jag fixade det skulle vi hugga som galningar, exportera enormt och göra Sverige stort igen – tro mig!", "stalin": "Kamrater, denna svenska skogsindustri stönar under råvarubristens bojor, orkestrerad av geopolitiska hyenor och borgarbrackornas regulatoriska gift! Beckeman ylar om USP, men vi i partet ser sanningen: fascistiska lagar och ryska gränser kväver proletär avverkning. 68 miljarder investerade – slöseri utan utrensning! Likvidera Miljömålsberedningens parasiter, låt arbetarna hugga för folkets seger, annars rullar huvuden!"}, "date": "12 maj, 09:11", "url": "https://www.realtid.se/bors-finans/ravarubrist-pressar-skogsindustrin-tappar-hela-var-usp/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/omslagsbild-2026-05-11t212542150.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "text", "heading": "Miljardärerna bjuder in till klasskamp – vi kör!", "summaries": {"normal": "På första maj provocerade svenska miljardärer och högerpolitiker genom att avfärda traditionella arbetardemonstrationer. Moderaternas ledare åt glass medan Vois VD Fredrik Hjelm och andra techmiljardärer skryter om sin rikedom och hånar demonstranter. Hjelm publicerade senare kritikerns hemadress. Artikeln diskuterar miljardärernas politiska inflytande, deras kopplingar till högerpopulism och kritik mot deras syn på innovation och statens roll. Författaren menar att statliga investeringar historiskt drivit tillväxt mer effektivt än privat kapital.", "trump": "Titta bara på dessa så kallade 'miljardärer' i Sverige – de tror de är så smarta! De hånar arbetarna på första maj, äter lyxig lunch och skryter om sina hundra miljarder. Och vad gör de? Publicerar en kritikers hemadress! Så fegt. Jag har byggt imperier, jag vet hur man skapar jobb – men dessa killar? De är bara en samling överbetalda tech-nördar som kopierar mina tweets. Och Sverige? De har glömt hur man bygger ett land. Kina äter deras lunch medan de dricker öl på Riche. Sad!", "stalin": "Kamrater! Dessa dekadenta kapitalistiska hyenor, som gömmer sig bakom sina skärmar och sparkcyklar, vågar håna arbetarklassen på dess heligaste dag! De skryter om sina hundra miljarder, leker med teknikleksaker och tror de är herrar över historien. Men vi vet sanningen – deras system är ett skämt, ett kasino där orangutanger kastar pilar. Kina marscherar framåt med järnhand, medan Europas industri ruttnar. Dessa 'techbros' är inget annat än imperialistiska lakejer, som Putin i sina dyraste kostymer. Låt dem skåla på Riche – snart kommer folket att ta deras champagne och ge dem en enkel sup vodka i Gulag-arkipelagen!"}, "date": "5 maj, 10:55", "url": "https://www.flamman.se/miljardarerna-bjuder-in-till-klasskamp-vi-kor/"}, {"type": "image-right", "heading": "Ung SD-politiker SR-hånas för att vilja ha ett mer tryggt Sverige", "summaries": {"normal": "Den 19-årige SD-politikern Hugo Johansson från Skövde möter kritik från Sveriges Radio efter att ha uttryckt en önskan om att återställa Sveriges trygghet till hur det var förr. Johansson, som sitter som ersättare i kommunstyrelsen, ser positivt på sitt politiska engagemang. Under en intervju reagerade SR-reportern Carolina Bladh på hans nostalgiska syn på trygghet, vilket har väckt debatt om huruvida unga politiker bör reflektera över historiska samhällsförändringar.", "trump": "Hörde om den här unga killen, Hugo, i Sverige. En fantastisk, mycket smart 19-åring! Han vill ha ordning och reda, precis som jag. Han säger sanningen om vad som hänt med landet, men de falska nyheterna på statsradion? De attackerar honom! De hatar att han vill göra Sverige tryggt igen. Det är sorgligt att se. De är så orättvisa mot honom, en sann patriot. Vi behöver fler som Hugo, han kommer att göra stora saker, tro mig!", "stalin": "Den unge Johansson talar om ordning, en dygd vi i staten uppskattar. Att statsradion hånar honom är en klassisk metod av den liberala femtekolonnen för att kväva sund patriotism. Som vår kamrat i Kreml förstår, måste trygghet garanteras med järnhand, inte med veka radioreferat. Vi ser hur det sönderfallande västvärldens byråkrater darrar inför en ung man som vågar minnas en tid av sammanhållning. Låt honom fortsätta; vi behöver se vilka som vägrar böja sig när vi återställer ordningen."}, "date": "12 maj, 07:00", "url": "https://samnytt.se/ung-sd-politiker-sr-hanas-for-att-vilja-ha-ett-mer-tryggt-sverige", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/11144510/hugo-johansson-sr.jpg"}, {"type": "image-right", "heading": "Jessicas son Kevin dog på jobbet: ”Förtvivlad och arg”", "summaries": {"normal": "Jessica Nickel Thordsson sörjer sin 25-årige son Kevin, som omkom i en tågolycka på jobbet i Malmö för ett år sedan. Kevin och en kollega skickades ut på spåret utan korrekta säkerhetsåtgärder. Jessica kräver ansvariga ställs till svars och ifrågasätter arbetsmetoden tågvarning. En förundersökning om arbetsmiljöbrott pågår, där en arbetsledare misstänks för vållande till annans död. Jessica kämpar även med cancer och försöker återgå till arbetslivet.", "trump": "Lyssna här, Sverige! En fruktansvärd tragedi hände när en ung man, Kevin, dog på jobbet – helt onödigt! Systemet är trasigt, folk är inkompetenta, och säkerheten? Glömd! Jag hade fixat det på en dag. Ingen skulle behöva dö så här. Men nej, byråkraterna skickar blommor istället för att ta ansvar. Så typiskt! Och polisen? De körde iväg som om ingenting hänt. Patetiskt! Sverige, vakna upp – ni behöver bättre ledarskap!", "stalin": "En sorglig historia från väst, kamrater. En ung arbetare, Kevin, krossades av kapitalets maskineri – precis som förväntat i det dekadenta Sverige. Arbetsledare, byråkrater och korrupta företag offrar arbetarklassen utan ånger. Vi i Sovjetunionen – förlåt, Ryssland – hade aldrig tillåtit
