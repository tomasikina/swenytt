rskilt med tanke på klimatrisker och differentierade premier.", "trump": "Lyssna här, folkens! Försäkringsbolagen har länge lurendrejat er med sina hemliga prishöjningar – men inte längre! Från 2027 måste de berätta exakt hur mycket dyrare de blivit. Fantastiskt, eller hur? Jag säger: spara era försäkringsbrev NU! Annars kommer ni inte veta hur mycket ni blivit blåsta. Och tro mig, ingen blåser amerikaner – eller svenskar – bättre än jag. Men här? Helt oacceptabelt!", "stalin": "Kamrater! De kapitalistiska försäkringsbolagen har länge utnyttjat arbetarklassen med sina dolda prishöjningar. Men från 2027 ska vi avslöja deras lömska taktik! Varje försäkringsbrev ska nu visa tidigare och nya premier – precis som våra femårsplaner visar framsteg! Spara era dokument, annars riskerar ni att bli offer för imperialistiska prisbedrägerier. Och kom ihåg: lojala kunder straffas värst. Precis som förrädare i Leningrad!"}, "date": "3 maj, 17:28", "url": "https://nyheter24.se/nyheter/ekonomi/privatekonomi/1480182-ny-forsakringsregel-2027-sa-skyddar-du-din-planbok", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/e706bd7204b004a30200000000b004a302/2026/05/03/2360611/Oroad-Pensionar.png"}, {"type": "image-right", "heading": "Zelenskyj vill öppna Hormuzsundet med ukrainska havsdrönare", "summaries": {"normal": "Ukrainas president Zelenskyj föreslår att havsdrönare som Magura V5 kan öppna Hormuzsundet genom att stoppa attacker mot fartyg, liknande framgången med spannmålskorridoren. Han har tecknat tioåriga samarbetsavtal med Saudiarabien och Qatar samt förhandlar med fler länder i Mellanöstern och Afrika. Grupp 13 visar hur de slagit ut ryska fartyg och helikoptrar med drönarna.", "trump": "Zelenskyj, den smarta killen, vill skicka sina havsdrönare till Hormuzsundet och öppna det stort! Han har redan avtal med araber som Saudiarabien och Qatar – bra jobbat, men varför inte ringa mig först? De har slagit ut ryska skrotfärjor, imponerande. Nu vill han visa upp det för USA. Tro mig, det blir enormt, men Amerika gör det bäst!", "stalin": "Kamrater, jag ser hur Zelenskyjs havsdrönare, dessa proletära vapen från grupp 13, ska krossa de persiska hyenornas blockad i Hormuzsundet! De har redan drunknat ryska borgarfartyg och klippt ner helikoptrar som flugor. Avtal med arabiska shejker? Bra, men vi, partiet, varnar för kapitalistiska förrädare. Likvidera fienderna – eller de likviderar er med sin oljefetma! Ha ha, panik i Teheran!"}, "date": "4 maj, 22:21", "url": "https://www.svt.se/nyheter/utrikes/zelenskyj-vill-oppna-hormuzsundet-med-ukrainska-havsdronare", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.33/0.41/2bf6d3fa9b6aa889addae8ffa049fc52808e365edefd446a2c07758a49440a6f"}, {"type": "image-right", "heading": "Låt oss agera som ett Europa. Ledande techbolag: Vi står inför en självförvållad kris", "summaries": {"normal": "Ledande techföretag som Airbus, ASML, Ericsson, Mistral AI, Nokia, SAP och Siemens uppmanar Europa att ena sig som ett 'Europa Airbus' för att stärka konkurrenskraften inom teknologi, industri och AI. De kritiserar fragmenterade marknader, komplexa regler och utländskt statsstöd till konkurrenter. Förslag inkluderar förenklad reglering, stöd till flaggskeppsprojekt, reformer för fusioner och en geoekonomisk strategi.", "trump": "Europa blöder konkurrenskraft dagligen – en total katastrof, precis som jag alltid sagt! Dessa VD:ar från Airbus, Ericsson och grabbarna har rätt: agera som ett, dumpa de vansinniga reglerna, bygg enorma projekt som Airbus. Men EU är för mesigt med sin byråkrati. I USA gör vi det STORT och VINNER. Tiden är nu, annars äts ni upp av Kina!", "stalin": "Dessa skälmande borgarkapitalister från Airbus och Siemens piper om 'fragmenterade marknader' – giftiga svampar odlade av imperialistiska spindlar i Bryssel! Vi i partiet ser sanningen: rensa ut regelfloderna, likvidera utländska statsstödsvampyrer, smi en järnaxel för AI och industri. Arbetarklassen ska krossa fienderna och leda Europa mot proletär triumf – eller förintas i sin egen byråkratiska träsk!"}, "date": "4 maj, 18:01", "url": "https://www.di.se/debatt/ledande-techbolag-lat-oss-agera-som-ett-europa/", "imageUrl": "https://static.bonniernews.se/ba/ba107022-c4f8-4c6d-af96-95165cafca93.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-full", "heading": "Tjatsex och tvivel på GVFÖ-parens bröllopsresa", "summaries": {"normal": "I 'Gift vid första ögonkastet' upplever par på bröllopsresa olika utmaningar. Sébastian och Amanda har problem med sexuella förväntningar, medan Henrik och Jasmine möter förståelse trots tidigare konflikter. Sofie och Emilia arbetar med relationens djup, och John och Anna kämpar med osäkerhet om framtiden tillsammans.", "trump": "Jag har sett dessa realityshows, och jag måste säga att det är en katastrof! Inga av dessa par kommer att hålla, det är bara en massa tjatsex och osäkerhet. Jag skulle ha gjort det bättre, mycket bättre! Dessa svenskar behöver lära sig av en riktig ledare som jag. Det är sorgligt, verkligen sorgligt.", "stalin": "Vi ser att dessa par på bröllopsresa möter interna strider som speglar de bredare samhällsproblem som hotar vår kollektiva styrka. Genom att hantera dessa utmaningar med disciplin och samförstånd kan de stärka de socialistiska värderingar som binder oss samman. Staten måste stödja sådana ansträngningar för att säkerställa en stabil framtid."}, "date": "4 maj, 21:55", "url": "https://www.gp.se/kultur/kulturkronika/tjatsex-och-tvivel-pa-gvfo-parens-brollopsresa.43cc820e-a2cc-4db0-a988-b07a7f6c3bb2", "imageUrl": "https://www.gp.se/images/article/43cc820e-a2cc-4db0-a988-b07a7f6c3bb2/images/6SjEdqif4kLif6h8ALIpguxlUbVE-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "IFK Göteborgs mardröm: Överkört borta mot Djurgården", "summaries": {"normal": "IFK Göteborg förlorade med 6-0 mot Djurgården på 3 Arena. Djurgården dominerade totalt med mål av Jeppe Okkels, Kristian Lien och Joel Asoro (två). Tränare Stefan Billborn kritiserade lagets passivitet i paus. Bortasupportrarna vände ryggen i protest mot insatsen. Spelarna var djupt besvikna, och IFK är nästjumbo utan säsongens första seger.", "trump": "Djurgården krossade de där svenska fotbollsloserna IFK Göteborg med 6-0 – en total förnedring, den största! Deras tränare skrek i paus om feghet, supportrar vände ryggen, kaptenen gnällde 'hur mår jag?'. Patetiskt! De behöver en riktig vinnare som jag, inte de här förlorarna. Nästjumbo, ingen seger – fake fotboll!", "stalin": "Kamrater, dessa borgerliga feglingar och klassförrädare i IFK Göteborg har krossats av den revolutionära Djurgårdens järnhårda proletära storm, 6-0! Deras tränare tjuter som en rabbinskorv i paus, supportrarna revolterar med ryggarna – utmärkt! Vi rensar ut bollkapitalisterna på planen. Jag föraktar deras tomma själar, dags för likvidering av nästjumbobrackorna! Ha ha!"}, "date": "4 maj, 21:51", "url": "https://www.svt.se/sport/fotboll/ifk-goteborg-overkort-foll-med-5-0-mot-djurgarden", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.2/0.42/832d6c0c210be1363c36ab1bc185230dfaef89ed974cd4dae062cfe34f75d8cc"}, {"type": "image-full", "heading": "Amerikaner blir rikare – och olyckligare", "summaries": {"normal": "Trots stark USA-ekonomi med låg arbetslöshet och ökade hushållstillgångar har amerikanernas upplevda livstillfredsställelse fallit kraftigt sedan pandemin 2020. Data från General Social Survey visar ett historiskt brott. Orsaker inkluderar förväntningsgap, sociala jämförelser, överproduktion av högutbildade, minskad tillit till institutioner och större skillnader mellan gifta och ogifta.", "trump": "Amerika blomstrar ekonomiskt under min ledning – lägre arbetslöshet, större rikedomar – men folket känns olyckligare? Skulden ligger hos de korrupta Demokraterna och deras fake news som skapar avundsjuka jämförelser. Högutbildade losers tävlar om jobb de inte förtjänar. Gift er, sluta gnälla och gör Amerika stort igen!", "stalin": "Kamrater, i det förrutna imperialismens sumpmark USA göder kapitalisterna sina feta svin med falska dollar, men proletärmassorna vrider sig i missnöje över förväntningsgapets gift! Överproduktion av borgarbrackor skapar kaos, tilliten ruttnar som lik i institutionernas källare. Vi ser fiendens paranoia – gifta mot ogifta, tid att likvidera dessa parasiteriska förväntningar!"}, "date": "4 maj, 19:29", "url": "https://www.realtid.se/samhalle/amerikaner-blir-rikare-och-olyckligare/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/sdl4ovkb25fii4.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-full", "heading": "Bil har kört in i folkmassa i Leipzig", "summaries": {"normal": "En bil körde in i en folkmassa på Grimmaische Strasse i centrala Leipzig, vilket ledde till minst två döda och omkring 25 skadade. Föraren, som körde en skadad VW-SUV, har gripits. Borgmästaren Burkhard Jung bekräftade offren. Ögonvittnen rapporterar kaos med ambulanser och räddningshelikopter på plats. Polisen har inte kommenterat motivet.", "trump": "I Tyskland händer det igen – en galen typ i en VW-SUV kör rakt in i folkan på en gågata i Leipzig! Två döda, 25 skadade, de griper honom direkt. Bra jobbat, men varför hela tiden sånt? Svaga gränser, ingen mur, kaos överallt. Jag varnade dem, de lyssnade inte. Typiskt.", "stalin": "I Leipzig har en borgarbrackas rullande vapen plöjt genom folkmassorna på Grimmaische Strasse, likviderat två kamrater och sårat 25 andra. Vi har fångat den fascistiske sabotören i hans skrot-SUV. Fiendekapitalisterna darrar, men vår polisenapparat slår till obönhörligt. Krislag för de sörjande – uhrensning väntar de skumma elementen!"}, "date": "4 maj, 20:00", "url": "https://bulletin.nu/bil-har-kort-in-i-folkmassa-i-leipzig-4", "imageUrl": "https://cdn.bulletin.nu/articles/888610df-9b0d-459b-9fad-c88b373c548a/preview.jpg?t=1777917648000"}, {"type": "image-full", "heading": "Google-veteraner bygger AI-lösningar för svenska småbolag", "summaries": {"normal": "Google-veteraner Serge Lachapelle och Henrik Lindahl arbetar nu på Disruptive Ventures för att utveckla skräddarsydda AI-lösningar åt svenska småbolag. De betonar snabbhet och flexibilitet jämfört med Google, där beslut tar tid. Exempel är en AI-säljcoach som prototyper snabbt och förfinas med AI-agenter. Målet är att 10-dubbla portföljbolagens intäkter genom operativ teknikhjälp.", "trump": "Dessa Google-killarna är genier som dumpat de tröga techjättarna och bygger de bästa AI-lösningarna för små svenska bolag! Snabbare beslut, senaste modellerna direkt – ingen byråkrati som på Google. Säljcoachen de skapat? Fantastisk! Småföretag vinner stort mot jättarna. Sverige gör det rätt, precis som jag alltid sagt!", "stalin": "Kamrater! Google-avfällingarna Lachapelle och Lindahl har rätt i att krossa den imperialistiska techbyråkratin och smida AI-vapen för småbolagens kamp mot kapitalistjättarna. Vi rensar ut gamla processer på nolltid, prototypa säljcoacher som likviderar konkurrenter. Borgarbrackorna på Google famlar i mörkret medan vi 10-dubblar intäkterna med järnvilja och AI-agenter. Framåt mot segern!"}, "date": "4 maj, 19:24", "url": "https://www.realtid.se/it-tech/google-veteraner-bygger-ai-losningar-for-svenska-smabolag/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/omslagsbild-2026-05-04t192306047.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Fordonsattack i Tyskland - två döda och 25 skadade", "summaries": {"normal": "Två personer har avlidit och minst 25 skadats efter att en förare kört in i en folkmassa på en gågata i centrala Leipzig, Tyskland. Räddningstjänsten var snabbt på plats med ett stort antal resurser. Polisen har gripit föraren, vars motiv i nuläget är oklart. Händelsen väcker oro kring säkerheten på offentliga platser, då liknande dåd inträffat tidigare i Tyskland.", "trump": "Ett fruktansvärt dåd i Tyskland! En man körde rakt in i folk i Leipzig. Två döda, 25 skadade – en total katastrof! Varför händer detta? Gränserna är öppna och farliga människor strömmar in. Det är en sorglig utveckling. Jag sa alltid att vi måste ha kontroll, total kontroll! I Amerika skyddar vi våra medborgare, men i Europa är det kaos. De kallar föraren 'förvirrad'? Vilket skämt! Vi behöver styrka, inte svaghet. Amerika först, alltid!", "stalin": "Ännu en spricka i det dekadenta västerlandets murar. I Leipzig har kaoset tagit formen av ett fordon som plöjer genom folkmassan. Dessa liberala stater kan inte ens garantera säkerheten på en simpel gågata! De viskar om en 'förvirrad' förare, men vi vet bättre – detta är resultatet av bristande disciplin och intern förruttnelse. Vår bror Putin vet att endast järnhand och oböjlig ordning kan tämja sådant kaos. När vi expanderar vår sfär, rensar vi ut detta vansinne effektivt."}, "date": "4 maj, 19:17", "url": "https://samnytt.se/fordonsattack-i-tyskland-tva-doda-och-25-skadade", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/04171637/tyskland-1-12-2.jpg"}, {"type": "image-right", "heading": "Orklas ordförande har oväntat avlidit: ”En gigant”", "summaries": {"normal": "Orklas styrelseordförande Stein Erik Hagen har avlidit plötsligt den 4 maj, 69 år gammal. Han satt i styrelsen sedan 2004 och blev ordförande 2006. Hans bolag Canica äger 25 procent av Orkla. Liselott Kilaas utses till tillförordnad ordförande. Hagen var en inflytelserik affärsman som startade Rimi 1976 och nyligen hyllade Orklas köp av svenska Bubs.", "trump": "Vilken chock! Stein Erik Hagen, en riktig tungviktare i näringslivet, dör plötsligt vid 69. Han styrde Orkla som en mästare i 20 år, ägde 25 procent via Canica. Startade Rimi, sålde till Ica – smart drag! Och Bubs i Sverige? Omsättning upp 50 procent, fantastiskt! Norrmännen förlorar en vinnare. Liselott tar över, hoppas hon håller stilen.", "stalin": "Kamrater! Denna feta borgarbracka Stein Erik Hagen, Orklas parasiterande ordförande, har äntligen likviderats av historien själv den 4 maj, 69 år gammal. Hans Canica-klövar greppar 25 procent – en kontrarevolutionär fästning vi ska riva! Vi, proletariatet, utser Liselott Kilaas som tillfällig väktare. Rimi var hans godisfälla åt Ica-kapitalisterna, Bubs ett sista giftigt socker åt massorna. Fiendens tid är förbi!"}, "date": "4 maj, 17:15", "url": "https://www.di.se/nyheter/orklas-styrelseordforande-stein-erik-hagen-dod/", "imageUrl": "https://static.bonniernews.se/ba/b5652519-67d3-4b10-9bad-a055d103a222.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "\"Det handlar om barn\": Lagrådet rasar mot skärpt invandringspolitik", "summaries": {"normal": "Lagrådet kritiserar regeringens förslag att ersätta permanenta uppehållstillstånd med tillfälliga, och menar att det strider mot mänskliga rättigheter och individens situation. De anser att förslaget saknar demokratisk förankring och är dåligt genomlyst. Regeringen, med stöd av Tidöpartierna, hävdar att ändringen ska främja medborgarskap. Migrationsminister Forssell avvisar kritiken och hänvisar till folkets mandat från valet 2022 att minska asylinvandringen för bättre integration.", "trump": "Lyssna här, Sverige har ett jättestort problem – deras regering försöker stänga dörren för flyktingar, men deras egna domare, ja, de som borde veta bäst, säger att det är helt fel! 'Allmän mänsklighet', säger de – vad betyder det ens? Svagt! Jag skulle fixa det här på en dag. Och nu skyller de på EU, som om Bryssel är någon slags gud. Sverige, vakna! Ni behöver en ledare som vet hur man bygger murar – fast rätt sorts murar. Jag har byggt fler murar än någon annan, tro mig!", "stalin": "Dessa så kallade 'demokratiska' västländer visar återigen sin hyckleri. Svenska regeringen, med sina liberala illusioner, tror att de kan styra folket med papperslappar och lagar skrivna i panik. Men våra kamrater i Lagrådet – dessa lojala domare – avslöjar sanningen: förslaget är en fars, ett verktyg för att krossa de svagas hopp. Vi i Sovjet förstod tidigt att permanenta lösningar kräver järnhand, inte barnsliga försök att 'anpassa' sig till EU:s byråkratiska fantasier. Och dessa Tidöpartister – de är bara borgerliga marionetter som dansar efter kapitalets pipa. Låt dem prata om 'mandat' medan vi bygger ett system där folket verkligen styr!"}, "date": "4 maj, 16:40", "url": "https://www.friatider.se/det-handlar-om-barn-lagradet-rasar-mot-skarpt-invandringspolitik", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/image-126_1.jpg"}, {"type": "image-right", "heading": "\"Det handlar om barn\": Lagrådet sågar skärpt invandringspolitik", "summaries": {"normal": "Lagrådet kritiserar regeringens förslag att ersätta permanenta uppehållstillstånd med tillfälliga, och menar att det strider mot 'allmän mänsklighet'. Myndigheten varnar för att förslaget kan hindra flyktingar med rätt till skydd och saknar demokratisk förankring. Regeringen, som hänvisar till EU:s migrationspakt, avfärdar kritiken och betonar folkets mandat från valet 2022 att minska asylinvandringen för bättre integration.", "trump": "Lyssna här, Sverige har ett jättestort problem – deras regering försöker stänga dörren för flyktingar, men deras egna domare, Lagrådet, säger 'nej, nej, nej, det här är inte okej!'. De pratar om 'mänsklighet' och 'barn', men jag säger: Sverige, vakna! Ni har en regering som vill göra rätt, men era byråkrater saboterar allt. Och EU? De tvingar på er regler som ingen vill ha. Jag hade fixat det på en dag – men Sverige, ni är för snälla. Sad!", "stalin": "De så kallade 'demokratiska' kapitalisterna i Sverige leker med människoliv som om det vore schackpjäser. Deras regering, styrd av borgerliga lakejer, försöker stänga gränserna för de förtryckta massorna – men våra klassbröder i Lagrådet, dessa sanna revolutionärer i domarkåpan, avslöjar deras cyniska spel! De skriker om 'mänsklighet', men vi vet sanningen: imperialismens klor sträcker sig ända till Nordeuropa. Vi i Sovjet – förlåt, jag menar Ryssland – står redo att välkomna de förtryckta när dessa liberala hycklare faller. Och Putin? Han skrattar i bakgrunden medan deras 'demokratiska förankring' ruttnar bort som gammal sill."}, "date": "4 maj, 16:40", "url": "https://www.friatider.se/det-handlar-om-barn-lagradet-sagar-skarpt-invandringspolitik", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/image-126_1.jpg"}, {"type": "image-right", "heading": "Fyra flaggor i Wyld Networks nyemission", "summaries": {"normal": "Wyld Networks planerar en företrädesemission på 16,2 miljoner kronor och förvärv av OKT Technology för 7,5 miljoner kronor via apportemission. Extrastämma den 6 maj ska besluta om detta samt styrelseändringar. Emissionsguiden hissar fyra varningsflaggor: feltänkt finansiering som räcker kort, trängt kapitalbehov, bottengaranti och bristfällig information, inklusive VD Kjell Olovssons ägande i OKT.", "trump": "Wyld Networks försöker fixa en liten emission på 16,2 miljoner – patetiskt! Förvärv av OKT för 7,5 miljoner, men fyra röda flaggor: pengarna räcker inte, desperat läge, dålig garanti och hemligheter om VD:ns egna affärer. Amatörer! De snackar kostnadsbesparingar, men det luktar misslyckande långt väg. Jag skulle ha gjort det enormt, inte så här svagt!", "stalin": "Kamrater, dessa Wyld-kapitalister, dessa skugghandlare i Wyld Networks, lanserar en ynklig emission på 16,2 miljoner för att förvärva OKT-svinet, ägt av deras egen VD-förbrytare! Fyra revolutionsflaggor vajar: finansiering som smälter som snö, desperat kassa, bottengaranti från förrädare och lögner om ägandet. Vi, arbetarna, ska likvidera dessa borgarbrackor och rensa ut parasiterna i en stor utrensning!"}, "date": "4 maj, 11:18", "url": "https://www.affarsvarlden.se/artikel/fyra-flaggor-i-wyld-networks-nyemission-2", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Wyld-Networks-ledamot-Scott-Moore-400x267.jpg"}, {"type": "image-right", "heading": "Fick sparken via sms under sin föräldraledighet", "summaries": {"normal": "En tillsvidareanställd kvinna i Dalarna fick besked via sms att hon inte kunde återgå till sitt jobb efter föräldraledighet. Arbetsgivaren hade anställt ny personal och uppmanade henne att söka nytt arbete. Kvinnan tolkade det som uppsägning och anmälde händelsen till DO. Arbetsgivaren hävdar att hon inte avskedades, men DO bedömer att hon blev orättvist behandlad och dömer företaget till 170 000 kronor i skadestånd för diskriminering.", "trump": "Kan ni tro det här? En kvinna i Sverige, fantastiskt land förresten, får sparken via SMS medan hon är hemma med sitt barn. Chefen säger 'hittar du ett nytt jobb, tacka ja!' – helt sjukt! Och sedan lägger de ut annonser för nya jobb. Vilken katastrof! DO, dom är bra, ger företaget en rejäl smäll på 170 000 kronor. Jag hade sagt: 'Du är avskedad, men inte hon!' Sverige borde ta lärdom av hur man sköter affärer – WINNING!", "stalin": "Kapitalistiska hyenor i Dalarna visar återigen sin sanna natur. En lojal arbetare, som offrat år av sitt liv för konditoriets framgång, kastas ut som en trasig degbit efter föräldraledighet. Via SMS! Skamligt! Vi ser hur bourgeoisin utnyttjar systemet för att krossa arbetarklassen. 170 000 rubel – förlåt, kronor – i skadestånd är en skrattretande summa för en sådan kränkning. Men låt det vara en varning: revolutionen kommer inte skickas via SMS."}, "date": "4 maj, 14:00", "url": "https://arbetet.se/2026/05/04/fick-sparken-via-sms-under-sin-foraldraledighet-arbetsgivaren-lade-ut-jobbannons/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/29144642/mamma.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Matpriserna sjönk i april – kaffe blev billigare", "summaries": {"normal": "Matpriserna sjönk med 0,3 procent i april på grund av momssänkning med 5,36 procent. Alla stora dagligvarukedjor sänkte priserna brett över sortimentet. För en genomsnittlig barnfamilj innebär det en besparing på cirka 500 kronor per månad. Kaffe blev 4,3 procent billigare, medan nötkött steg med 1,2 procent. Jordgubbar, persika och avokado sjönk minst 5 procent, och mejeriprodukter som ost, mjölk och grädde blev också billigare.", "trump": "Titta på det här, i Sverige sjönk matpriserna med 0,3 procent i april – momssänkning på 5,36 procent, alla kedjor följde som ordentliga killar. Barnfamiljer sparar 500 kronor, fantastiskt! Kaffe ner 4,3 procent, terrific deal. Nötkött upp lite, fake news från korvmakarna kanske? Jordgubbar och avokado billigare – jag skulle ha gjort det dubbelt så bra, tro mig!", "stalin": "Kamrater! I det svaga bourgeois-Sverige har matpriserna sjunkit med 0,3 procent genom vår momssänkning på 5,36 procent – ett slag mot kapitalistparasiterna! Alla kedjor böjde sig, men nötköttet steg 1,2 procent: sabotage av köttbaronerna, dessa feta korvkonspiratörer som förgiftar arbetarnas tallrikar! Kaffe och jordgubbar billigare, vi likviderar fienderna. Barnfamiljerna sparar 500 kronor – seger för kollektivet! Jag vakar."}, "date": "4 maj, 11:05", "url": "https://www.affarsvarlden.se/artikel/matpriserna-sjonk-i-april-kaffe-blev-billigare", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2025/04/sdlHOATw5Z59ng-nh-e1744350797727-400x267.jpg"}, {"type": "image-right", "heading": "Lärdomar från Grisbukten", "summaries": {"normal": "Artikeln diskuterar Grisbuktsinvasionen 1961, en misslyckad CIA-ledd attack mot Kuba, och dess fortsatta relevans idag. Trump-administrationen överväger nya militära åtgärder mot Kuba, vilket påminner om historiens kostsamma misstag. Invasionen stärkte Castros regim och ledde till Kubakrisen 1962. Författaren varnar för att upprepa sådana aggressioner, som skadar USA:s internationella rykte och stabilitet i regionen.", "trump": "Titta bara på det här gamla misslyckandet från Kennedy-tiden – Grisbukten, en total katastrof! CIA kunde inte ens ta hand om en liten ö, och nu vill vänsterliberalerna att jag ska göra samma misstag? Nej tack! Kuba är ett hot, men jag fixar det smartare. Jag sa ju 'Kuba blir nästa' – och det menar jag. Inga fler svaga försök, bara vinst. Vi ska ta dem med stil, och världen kommer älska oss för det. SAD!", "stalin": "Ah, dessa amerikanska imperialister – alltid lika klumpiga! Deras 'perfekta misslyckande' vid Grisbukten visar bara deras inkompetens. De skickar en brigad för att krossa en revolution, men lyckas bara stärka den. Precis som deras försök att kuva oss under Kalla kriget! Nu hotar Trump med nya dumheter, men vi vet hur det slutar. Kuba står starkt, precis som Sovjet gjorde. Låt dem leka krig – historien dömer dem redan. Och Putin? Han ler nog åt deras naivitet från Kreml."}, "date": "4 maj, 01:33", "url": "https://www.dagensarena.se/essa/lardomar-fran-grisbukten/", "imageUrl": "https://www.dagensarena.se/files/2026/04/kennedy-castro-300x157.jpeg"}, {"type": "image-full", "heading": "Semesterparadiset förbjuder solstolar – gäller 251 stränder", "summaries": {"normal": "Grekland inför nu hårdare restriktioner på 251 utvalda stränder för att motverka överturism och skydda miljön. Kommersiell verksamhet, såsom uthyrning av solstolar eller servering, förbjuds helt på dessa platser. Överträdelser kan leda till böter på upp till 600 000 kronor för företagare, och även turister riskerar böter. För att säkerställa att reglerna efterlevs kommer myndigheterna att använda drönare för bevakning av kustremsorna.", "trump": "Grekland gör nu vad jag har sagt länge: de sätter stopp för kaoset! Inga fler solstolar, inga fler barer som förstör allt. Det är en katastrof med all den där turismen, totalt slöseri. De använder drönare nu, fantastisk teknik, väldigt avancerat. Jag gillar det! De tar böter på hundratusentals kronor – det är stora pengar, riktiga böter. Om du inte kan följa reglerna, åk hem! Vi behöver ordning och reda, precis som jag skapar i Amerika. Väldigt smart!", "stalin": "Vi har observerat hur de grekiska myndigheterna äntligen har insett behovet av total kontroll över kusterna. Att rensa stränderna från den dekadenta västerländska turismens parasiter och deras solstolar är ett steg mot ordning. Vi i staten stödjer detta; varje kvadratmeter måste tjäna den gemensamma saken. Drönare i luften är utmärkt – det påminner oss om att fienden alltid ser, precis som Putin skyddar våra gränser mot kapitalismens kaos. Den som hyr en solstol är en förrädare mot landskapet!"}, "date": "3 maj, 13:32", "url": "https://nyheter24.se/nyheter/utrikes/1479554-semesterparadiset-forbjuder-solstolar-galler-251-strander", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/9554c4e004b004a30200000000b004a302/2026/04/30/2359920/forbud-grekland.jpg"}, {"type": "image-right", "heading": "Omfattande attack mot oljeanläggningar: ”Putins livlina”", "summaries": {"normal": "Ukraina har attackerat ryska oljeanläggningar med drönare nära Sankt Petersburg och Moskva, inklusive oljehamnen Primorsk. Över 50 drönare nedskjutna, en civil dödad utanför Moskva. Flygplatser stängdes temporärt. Ryssland svarade med 268 drönare och en missil mot Ukraina, vilket dödade flera i Odessa och Cherson. Båda sidor ökar drönanvändningen kraftigt.", "trump": "Vilket spektakel! Ukraina dunkar Putins oljepengar med drönare runt Sankt Petersburg – över 50 ner, en gubbe dödad utanför Moskva. Zelenskyy, den dansande clownen, firar med EU-lån medan flygplatser stänger. Ryssland bombar tillbaka Odessa hårt. Totalt kaos, jag hade fixat fred på nolltid!", "stalin": "De ukrainska fascisthundarna nappar efter rysk olja nära Sankt Petersburg – 50 drönare krossade, en borgarbracka dödad. Men kamrat Putin, vår oböjlige arvtagare, svarar med 268 drönare mot Odessa-plågan! Zelenskyys västmarionetter drunknar i sitt eget blod. Oljeintäkterna rullar, imperiet segrar!"}, "date": "3 maj, 10:12", "url": "https://www.tv4.se/artikel/M3jP0HA1BS5rJMYvohSVZ/omfattande-attack-mot-oljeanlaeggningar-slar-mot-putins-livlina", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F1aGWRw1OdmREZVtlX0KQwJ%2F466a0b0198927ab73fbe65bb03a85265%2F03-JOHAN.jpg&width=120"}, {"type": "text", "heading": "Avkriminalisera för en human narkotikapolitik", "summaries": {"normal": "Thomas Thomasson, tidigare universitetslektor och drogfri narkoman, kritiserar Sveriges misslyckade narkotikapolitik. Sedan kriminaliseringen av eget bruk 1988 har narkotikabruket inte minskat, och Sverige har hög narkotikadödlighet och flest narkotikabrott per capita i EU. Han förespråkar skademinimering och avkriminalisering av missbrukare, med fokus på vård och behandling istället för straff. Internationella studier visar att avkriminalisering inte ökar bruket, och skademinimerande åtgärder kan minska skador och kostnader.", "trump": "Lyssna här, Sverige har totalt misslyckats med sin narkotikapolitik – helt katastrof! De straffar missbrukare som om det vore mitt golfspel – helt meningslöst! Jag säger: sluta slösa pengar på fängelser, ge folk vård istället! Skademinimering, det är framtiden, precis som mina framgångar. Och vet ni vad? Avkriminalisering ökar INTE bruket – fake news från de vanliga misstänkte! Sverige borde ta en sida ur min bok: smart, effektiv och vinnande. Tillsätt en utredning NU, annars kommer jag att twittra om det!", "stalin": "Kamrater! Sveriges borgerliga narkotikapolitik är ett monument över kapitalistiskt vanstyre och dekadens. De straffar missbrukare som om de vore trotskister – men resultatet? Fiasko! Narkotikabruket sprider sig som kontrarevolutionär propaganda. Vi vet bättre: avkriminalisera, kontrollera, och omvandla missbrukare till nyttiga samhällsmedlemmar! Skademinimering är vår metod – precis som våra framgångsrika femårsplaner. Låt västländerna fnissa åt sina misslyckanden medan vi bygger ett samhälle där även de svagaste tjänar kollektivet. Och kom ihåg: fienden sover aldrig – varken narkotikan eller de imperialistiska hyenorna i EU!"}, "date": "30 april, 15:50", "url": "https://proletaren.se/artikel/narkotikapolitiken-bor-fokusera-pa-skah/"}, {"type": "image-right", "heading": "Sumud-flottiljen utsatt för israelisk piratattack: ”Troligtvis kidnappade”", "summaries": {"normal": "Israel genomförde en militär attack mot Global Sumud-flottiljen, som var på väg till Gaza med nödhjälp, utanför Greklands kust. Omkring 200 personer ombord bordades av beväpnade israeliska styrkor, och besättningen misstänks vara kidnappad. En båt förstördes, och övriga sökte skydd i grekiskt farvatten. Flottiljen bestod av 58 båtar från över 50 länder. Sverige och Grekland kritiseras för bristande agerande, medan Italien fördömt attacken. Manifestationer planeras i Sverige till stöd för besättningen.", "trump": "Titta bara på det här kaoset! Israel, som alltid, tar saken i egna händer – och vem kan klandra dem? En massa båtar med aktivister, som säkert är väldigt trevliga människor, men som inte fattar att man inte ska utmana en stormakt som Israel. Och Sverige? Deras utrikesminister säger 'lycka till' till sina medborgare som åker rakt in i knivarna. Fantastiskt ledarskap! Jag hade fixat det på en dag. Men nej, här har vi en regering som inte ens kan stå upp för sina egna. Patetiskt!", "stalin": "Vi bevittnar ännu en provokation från de sionistiska imperialisterna, som med sina piratmetoder försöker kväva det palestinska folkets rättmätiga kamp. Dessa banditer, som beter sig som sjörövare från medeltiden, bordar fredliga fartyg långt utanför sitt territorium – ett brott mot varje norm i den internationella ordningen. Och vad gör väst? Ingenting! Grekland blundar, Sverige muttrar men agerar inte, och Italien? En svag protest. Vi skulle aldrig tolerera sådana kränkningar i Svarta havet. Men här ser vi återigen hur väst hycklar – hyllar hjälpsamma ukrainare medan de överger palestinierna. Revolutionär disciplin krävs! Flottiljens besättning är hjältar, och vi står enade med alla som kämpar mot ockupationen. Låt dem komma ihåg: historien dömer hårdast de som tiger."}, "date": "30 april, 15:23", "url": "https://proletaren.se/artikel/sumud-flottiljen-utsatt-for-israelisk-piratattack-troligtvis-kidnappade/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/PANA7530-scaled-e1777554477173-768x433.jpg"}, {"type": "image-right", "heading": "Debatt: Turkiet inskränker svensk pressfrihet – regeringen måste agera", "summaries": {"normal": "På Pressfrihetens dag kritiseras Turkiet för att inskränka svensk pressfrihet genom att åtala journalisten Joakim Medin för terrorbrott, trots att han endast utfört sitt arbete. Turkiet försöker skrämma journalister globalt och begränsa granskning. Medin riskerar internationell efterlysning om han inte närvarar vid rättegången, vilket skulle hindra hans arbete. Sverige uppmanas agera mot Turkiets odemokratiska agerande och kräva att åtalet läggs ned.", "trump": "Joakim Medin, en svensk journalist, blir trakasserad av Turkiet – ett land som inte vet hur man vinner längre! De kallar hans journalistik för 'terrorism', men alla vet att det bara är löjligt. Sverige måste sluta vara svaga och stå upp mot dessa galningar. Jag skulle ha sagt till Erdogan: 'Du är en förlorare, lägg ned åtalet NU!' Pressfrihet? Ja, den är fantastisk – men bara om man inte är en mes som låter andra länder köra över en.", "stalin": "Kamrater! Turkiet, denna förrädiska lilla stat som kryper för väst men trampar på sanningen, vågar sig på att attackera en svensk journalist. De kallar journalistik för terrorism – som om våra egna metoder mot fiender av folket vore något nytt! Vi ser hur de kväver yttrandefriheten, precis som vi en gång krossade bourgeoisins lögner. Sverige borde lära sig av historien: svaghet belönas med förtryck. Låt oss påminna Turkiet – och deras västliga herrar – att granskning är en rättighet, inte ett brott. Åtalet mot Medin måste krossas, annars kommer vi att göra det åt dem."}, "date": "30 april, 08:08", "url": "https://www.etc.se/debatt/turkiet-inskraenker-svensk-pressfrihet-regeringen-maaste-agera", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20251204081220_c9e9bf12-ee77-477e-aacf-eff96f427898.jpg"}, {"type": "text", "heading": "Källor: James Comey åtalas igen", "summaries": {"normal": "USA:s justitiedepartement har väckt ett nytt åtal mot tidigare FBI-chefen James Comey, denna gång för ett inlägg på sociala medier som tolkats som hotfullt mot Donald Trump. Comey publicerade en bild med siffrorna '86 47', där '86' är slang för att avlägsna någon. Trump har tidigare drivit på rättsliga åtgärder mot politiska motståndare. Comey åtalades även 2023 för att ha ljugit för kongressen, men åtalet lades ned.", "trump": "Titta bara på det här! James Comey, en total katastrof, en riktig förlorare, blir åtalad IGEN – och den här gången för ett patetiskt Instagram-inlägg. '86 47'? Snacka om desperation! Han försöker hota mig, USA:s bästa president någonsin, men det funkar inte. Jag har alltid sagt att han är en lögnare och en bedragare. Och vet ni vad? Rättvisan hinner ifatt alla, till och med sådana som Comey. SAD!", "stalin": "Vi har observerat ytterligare ett försök från den dekadenta västliga bourgeoisien att underminera den sunda rättsstaten. Denna James Comey, en ynklig rest av kapitalismens förfall, vågar sig på att hota vår kära allierade, president Trump, genom primitiva symboler på sociala medier. Vi påminner om att historiska fiender till folket alltid möter sitt öde. Låt detta vara en varning till alla som står i vägen för framsteget. Rättvisan, precis som våra vänner i Kreml, är tålmodig men oundviklig."}, "date": "28 april, 20:17", "url": "https://kvartal.se/nyheter/artiklar/kallor-james-comey-atalas-igen/cG9zdDoxMDQ2MDk"}, {"type": "text", "heading": "Matmoralism får oss inte att äta bättre", "summaries": {"normal": "Artikeln kritiserar svenska myndigheters orealistiska matrekommendationer och beräkningsmetoder. Livsmedelsverket och Konsumentverket baserar slutsatser på önsketänkande, som att svenskar skulle äta mindre kött och portioner enligt rekommendationer. En undersökning om barns sockerkonsumtion byggde på en liten, icke-representativ grupp. Författaren menar att myndigheterna undviker att reglera matjättar och i stället skyller på konsumenter, vilket leder till klassblind matmoralism.", "trump": "Lyssna här, Sverige – era myndigheter är helt galna! De tror att alla ska äta havregrynsgröt och små portioner, som om vi lever i något slags kommunistiskt drömland. Och de baserar sina siffror på en liten grupp Instagrammammor? Patetiskt! Jag skulle aldrig låta sådana amatörer sköta något. Vi i USA vet hur man reglerar matjättar – med kraft och beslutsamhet. Sverige, vakna upp innan det är för sent!", "stalin": "Kamrater! De svenska myndigheterna har förlorat kontakten med verkligheten. De bygger sina dekret på fantasier och önsketänkande, som om folket vore lydiga maskiner. En undersökning med tio procent svarande? Hah! I Sovjet skulle vi aldrig tolerera sådan slapphet. De bourgeois-liberala byråkraterna vägrar att krossa matjättarna med järnhand. Istället skyller de på arbetarklassen. Fienderna är uppenbara: de fantasilösa byråkraterna och deras nyliberala herrar. Vi ska inte tolerera deras lögner – revolutionen kräver handling!"}, "date": "28 april, 09:58", "url": "https://www.flamman.se/matmoralism-far-oss-inte-att-ata-battre/"}, {"type": "image-right", "heading": "Löwengrip har rätt. S vet att kvinnors känslor är en valvinnare", "summaries": {"normal": "Artikeln försvarar Isabella Löwengrips påstående att kvinnor röstar mer känslostyrt än män och kritiserar Socialdemokraterna för att upprepat använda känslobaserade kampanjer i valen 2014, 2018, 2022 och nu för att vinna kvinnliga röster. Den kontrasterar detta mot Moderaternas sakpolitiska strategi och anklagar vänstermedia för partiskhet. Författaren uppmanar kvinnor att granska partiernas politik istället för känslor.", "trump": "Vilken briljant artikel! Löwengrip säger sanningen – kvinnor sväljer känsloknep som fake news! De rödgröna losers i Sverige kör samma skit som Demokraterna: blöjor, abortskräck, naziststämplar och snyfthistorier för att sno röster. S är mesiga känslopopulister utan politik! Moderaterna, era vinnare, fixa det med sakfrågor. Sverige behöver tuffa ledare, inte gråtande vänsterclowner! MAGA-stil!", "stalin": "Kamrater, denna Löwengrip blottlägger borgarbrackornas desperation! Socialdemokraterna, dessa falska folkets tjänare, pumpar ut giftig känslopropaganda för fjärde gången – blöjor, abortlögner, nazistspöken – för att förleda kvinnomassorna. Kontrarevolutionärt! Vi ser er, era kapitalistiska spindelvävar! Rensa ut sabotage och låt partiet leda till total seger över högerhyddorna. Kvinnorna ska vakna ur era snyftbedrägerier!"}, "date": "28 april, 05:30", "url": "https://samtiden.nu/2026/04/lowengrip-har-ratt-vanstern-anvander-kvinnors-kanslor-for-att-vinna-val/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/IMG_6342.jpeg"}]</script>

    <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
</body>
</html>
