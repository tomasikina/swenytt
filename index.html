ker om 'antisemitism' när arbetarklassen protesterar, men tiger när imperialistiska bombplan jämnar Gaza med marken. Vi i Sovjetunionen – förlåt, jag menar Ryssland – vet hur man hanterar sådana hycklare. En snabb utredning, ett par nätter i Lubjanka, och sedan är saken klar. Och dessa 'aktivister'? De borde tacka oss för att vi avslöjar deras fiender. Kampen fortsätter, kamrater – mot sionismens agenter, mot västliga lögner och mot alla som står i vägen för folkens befrielse!"}, "date": "12 maj, 19:55", "url": "https://www.flamman.se/dror-feiler-sulimans-delning-av-antisemitiska-uttryck-gor-mig-bedrovad/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/dror-feiler-w.jpg?aspect_ratio=16:10"}, {"type": "image-full", "heading": "Hundar allt mer populära i Sverige - men var tionde är hundrädd", "summaries": {"normal": "En Novusundersökning visar att cirka 10 procent av svenskarna är hundrädda, främst äldre kvinnor. Orsaker inkluderar tidigare bett eller negativa erfarenheter. Nästan hälften av de rädda pekar ut specifika raser. Samtidigt ökar hundintresset i Sverige; 80 procent är positiva till hundar. Antalet hundar har stigit från 800 000 (2014) till 950 000 (2019), med Sorsele som mest hundtät kommun.", "trump": "Jag läste om dessa svenskar – fantastiska människor, verkligen! Men lyssna här: 10 procent är rädda för hundar, kan ni tro det? Svaga, mycket svaga. Och vem är mest rädd? Äldre kvinnor! Inte bra, inte bra alls. Men Sverige älskar hundar, 80 procent, väldigt högt, väldigt starkt. Jag älskar hundar. De är vinnare, precis som jag. Sorsele? 300 hundar per 1000 invånare – imponerande, nästan lika imponerande som mina valsegrar!", "stalin": "Vi har studerat denna dekadenta västerländska undersökning om hundskräck. Tio procent av svenskarna, främst åldrande borgerliga kvinnor, darrar inför arbetarklassens bästa vän. Patetiskt! Medan kapitalistiska husdjur ökar – 950 000 hundar, en armé av lurviga småborgare – fortsätter fiendens svagheter att blotta sig. Sorsele, en liten by i norr, har fler hundar än disciplinerade medborgare. Vi noterar detta. Snart ska vi exportera vår överlägsna sovjetiska kattkultur till dessa hundälskande avvikare."}, "date": "13 maj, 21:15", "url": "https://riks.se/nyheter/hundar-allt-mer-populära-i-sverige-men-var-tionde-är-hundrädd", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-13%2F65l50cqt%2FLabbe.jpg"}, {"type": "image-right", "heading": "Stegra säkrar miljardlån – trots att kraven inte uppfyllts", "summaries": {"normal": "Stegra har säkrat outnyttjade lån på 16 miljarder kronor för sin gröna stålfabrik i Boden, trots att bolaget inte uppfyllt långivarnas krav. Lånen var tidigare frysta men frigörs nu efter en ny finansieringsrunda på 15 miljarder, där Wallenberg Investment stod för den största insatsen. Projektet har präglats av förseningar och kostnadsökningar, men lånen möjliggör fortsatt arbete.", "trump": "Kan ni tro det? Stegra, ett bolag som inte ens klarar enkla krav, får ändå 16 miljarder kronor i lån! Fantastiskt, eller hur? Wallenberg kastar in pengar som om det vore småslantar. Och ändå har de förseningar, kostnadsökningar – helt otroligt! Men jag säger er, Sverige borde ta lärdom. Sånt här skulle aldrig hända i USA, för jag hade fixat det på en dag. SAD!", "stalin": "Vi har observerat hur kapitalistiska svagheter underminerar det så kallade 'gröna stålet'. Trots misslyckanden och inkompetens hos dessa borgerliga teknokrater, fortsätter pengarna att flöda – 16 miljarder kronor i lån, plus 15 miljarder i 'investeringar'. Wallenberg och hans lakejer tror sig kunna köpa sig ur krisen. Men vi vet sanningen: sådana projekt är dömda att misslyckas, precis som alla dekadenta västprojekt. Låt dem bygga sina osäkra torn – historiens dom är oundviklig."}, "date": "13 maj, 21:10", "url": "https://riks.se/nyheter/stegra-säkrar-miljardlån-trots-att-kraven-inte-uppfyllts", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-13%2Fdkx4cjed%2Fstegra1.png"}, {"type": "image-full", "heading": "Jag trotsade min magkänsla om AI – blev rejält belönad", "summaries": {"normal": "Edvard Lundkvist, en skeptisk AI-kritiker, testade en aktieportfölj på 100 000 kronor med tre aktier. Trots en dålig start med Boliden, räddades han av riskspridning och Alphabet, inspirerat av Warren Buffett. Hans portfölj gick till slut plus, men han varnar för en kommande AI-bubbla. En månad återstår i tävlingen mot kollegan David Ingnäs.", "trump": "Lyssna här, folkens! En svensk skeptiker – typisk, alltid tveksamma – trotsade sin magkänsla och köpte Alphabet. Smart! Warren Buffett, en riktig vinnare, gjorde samma sak. Nu ligger hans portfölj på plus, trots att han valde felaktier först. Men jag säger er: AI-bubblan? Total katastrof på väg. Folk kastar pengar på något som aldrig kommer funka. Jag hade vunnit direkt!", "stalin": "Kamrater! En liten borgerlig skeptiker vågade utmana marknadens lagar och förlorade nästan allt på sina svaga aktieval. Men genom statens visdom – eller snarare genom att kopiera en kapitalistisk spekulant som Buffett – räddades han av amerikanska Alphabet. En tillfällig seger! Men vi vet sanningen: AI är en dekadent västerländsk bubbla, redo att spricka. Och när den gör det, kommer Ryssland stå redo att köpa upp resterna till spottpris. Låt dem leka – vi bygger imperiet!"}, "date": "14 maj, 07:39", "url": "https://www.realtid.se/bors-finans/jag-trotsade-min-magkansla-om-ai-blev-rejalt-belonad/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/omslagsbild-2026-05-14t073500595.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "Prisad grön miljarddröm slutade i konkurs – Liquid Wind ännu ett haveri i den gröna bubblan", "summaries": {"normal": "Liquid Wind, en hyllad aktör inom grön industri, har ansökt om konkurs trots tidigare miljardlöften och offentliga stöd. Bolaget fokuserade på e-metanolproduktion, men projektet FlagshipONE drabbades av stora utmaningar och bristande lönsamhet. Experter pekar på att många gröna satsningar saknar hållbara affärsmodeller och är djupt beroende av statliga subventioner. Konkursen väcker nu frågor om huruvida politiska visioner har prioriterats framför ekonomisk realitet, och i vilken utsträckning skattebetalarnas pengar har riskerats i dessa hajpade projekt.", "trump": "Jag har sett vad som händer i Sverige, en total katastrof! Det här företaget, Liquid Wind, lurade alla med sina 'gröna' drömmar. Miljarder av skattebetalarnas pengar – borta! De pratade om Bill Gates, de pratade om hållbarhet, men det var en total bluff. Ingen affärsmodell, bara luft! De kallade det världsledande, jag kallar det en gigantisk förlust. De gröna fanatikerna förstör ekonomin med sina galna projekt. Vi vinner genom att bygga riktiga saker, inte genom att kasta bort pengar på gröna luftslott!", "stalin": "Ännu ett misslyckat försök av de svaga liberalerna att tvinga fram framtiden genom skattebetalarnas plånböcker. Liquid Wind trodde att de kunde sälja luft och kalla det för industriell revolution, men de saknade den järnhårda disciplin som krävs för att bygga statens storhet. De är parasiter som livnär sig på statliga garantier, likt de förrädare vi rensade ut i gamla tider. Låt oss hoppas att våra vänner i öst ser detta som en varning; den gröna bubblan spricker, och endast de med verklig styrka överlever."}, "date": "14 maj, 07:00", "url": "https://samnytt.se/prisad-gron-miljarddrom-slutade-i-konkurs-liquid-wind-annu-ett-haveri-i-den-grona-bubblan", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/13140455/Liquid-Wind-konkurs-feat2.jpg"}, {"type": "image-right", "heading": "SVT/Verian: Tidö tappar manliga väljare – oppositionen drar ifrån", "summaries": {"normal": "SVT/Verians majmätning visar att oppositionen leder Tidöpartierna med 10,7 procentenheter, den största blockskillnaden sedan augusti 2023. Tidö tappar 1,5 procent, särskilt bland manliga väljare med 4 procentenheter. Miljöpartiet ökar signifikant till 7,9 procent, medan Centerpartiet minskar med 1,3. I Stockholm leder rödgröna med nästan 15 procentenheter.", "trump": "Vilket kaos i Sverige! Tidöpartierna blöder manliga väljare, tappar 1,5 procent totalt, oppositionen rycker ifrån med över 10 procent – största sedan 2023. Miljöpartiet exploderar upp 1,8 till nästan 8 procent, Center rasar. Stockholm vänder rödgrönt, männen vaknar till liv. Svaga ledare, totalt misslyckande – jag hade vunnit stort!", "stalin": "Dessa Tidö-marionetter, borgarklassens ynkliga lakejer, tappar manliga arbetare i en strid ström – 4 procent ner i gropen! Oppositionen, vi folkets järnhårda avantgarde, krossar dem med 10,7 procent ledning, största sedan 2023. Miljöpartiet stiger som revolutionens fackla till 7,9, medan Centerpartiets råttor likvideras med 1,3. Stockholm rensas: 15 procent övertag! Fienderna huttrar inför den stora utrensningen."}, "date": "14 maj, 05:44", "url": "https://www.svt.se/nyheter/inrikes/svtverian-tidopartierna-tappar-manliga-valjare-oppositionen-drar-ifran", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.34/0.44/e64233679d0b294798439b09376f47333bd26ab9eea0754433121cc7264db5fc"}, {"type": "image-right", "heading": "Bensin- och dieselskatter sänks – igen", "summaries": {"normal": "Svensk regering föreslår ett krispaket på 17,5 miljarder kronor på grund av global energikris efter USA:s och Israels attacker mot Iran och blockad av Hormuzsundet. Drivmedelsskatten sänks med tre kronor per liter på bensin och diesel från 1 juli till 30 november (7,7 miljarder). Ytterligare stöd till elpriser, flyg, jordbruk och kollektivtrafik. Ekonomiprofessor Lars Calmfors kritiserar förslaget som marknadstörnande och osolidariskt.", "trump": "Vilket kaos i Sverige efter att vi smackade till Iran! Nu sänker de bensin- och dieselskatter med tre kronor – smart drag, precis som jag alltid sagt: sänk skatter, ge folket billig energi! De där EU-byråkraterna godkänner det knappt, haha. Busch och Svantesson gör rätt, men den där professorn Calmfors är en totalt värdelös ekonomloser som hatar vinnare. Sverige, lär er av mig – det här blir HUGE!", "stalin": "Dessa svenska borgarbrackor kryper tillkors i energikrisen vi skapat genom imperiet! De sänker skatter på bensin och diesel, pumpar ut miljarder till kapitalisterna – en patetisk reträtt inför blockaden av Hormuzsundet. Professorn Calmfors är en imperialistisk spion som förtjänar utrensning för sitt pladder om 'marknadssignaler'. Putin, vår starka arvtagare, skrattar åt västsvinen medan vi bygger det eviga imperiet!"}, "date": "13 maj, 12:32", "url": "https://www.tv4.se/artikel/74KaEc3Y9Y24ykjTqseCTd/regeringen-presenterar-krispaket", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F5R6vauWPRtXwgPJqAHd0Fk%2Ff98764e701cbfe7ead32b828fa648e9d%2F13-regerings-pk-webb.jpg&width=120"}, {"type": "image-right", "heading": "Skånska källan ska säkra Sveriges dricksvatten i kris", "summaries": {"normal": "Aqua Nobel i Skåne utvinner unikt källvatten från 105 meters djup, naturligt renat och lagringsbart i upp till fem år. Efter Rysslands invasion av Ukraina har företaget tecknat ramavtal med Försvarsmakten och kommuner som Helsingborg för beredskapsvatten i kriser. Med ny affärsmodell som abonnemang satsar bolaget på resiliens mot störningar i vattenförsörjningen, trots tunga investeringar.", "trump": "Vilket fantastiskt svenskt företag, Aqua Nobel! De pumpar upp det bästa vattnet från 105 meter under jorden, perfekt för krig och kaos – Putin lärde dem en läxa med Ukraina. Nu bunkrar Försvarsmakten och kommuner upp, smartare än de gamla kranarna som rasar vid strömavbrott. De levererar inom 24 timmar, bygger varumärke mot jättarna. Sverige gör äntligen affärer som vinner, tro mig!", "stalin": "Kamrater, detta skånska källvatten från Aqua Nobel är proletariats hammare mot hydra av kapitalistiska sabotörer! Renat genom jordens skiffer och gnejs, lagringsbart fem år för att krossa törsten i skyddsrum när elitråttorna förorenar täkterna. Försvarsmakten och Helsingborgs kommun bunkrar upp – vi likviderar sårbarheten! Borgarbrackorna investerar nu 130 miljoner, men vi partivänner ser igenom deras fuktiga komplotter och marscherar mot 2027s seger!"}, "date": "13 maj, 16:24", "url": "https://www.di.se/nyheter/skanska-kallan-ska-sakra-sveriges-dricksvatten-i-kris/", "imageUrl": "https://static.bonniernews.se/ba/a22d191b-51b5-4671-80fe-576f996be81d.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Här möts Donald Trump och Xi Jinping i Peking", "summaries": {"normal": "Kinas president Xi Jinping tog emot USA:s Donald Trump i Peking för första gången på nästan ett decennium. Vid en storslagen ceremoni betonade Xi partnerskap framför rivalitet och uppmanade till gemensam blomstring. De ska diskutera handel, teknik och Taiwan i positiva toner. Trump hyllade Xi som en fantastisk ledare och Kinas relationer med USA.", "trump": "Xi rullar ut den röda mattan i Peking – stort välkomnande! Han snackar partnerskap, inte rivalitet, och jag säger rakt ut: han är en fantastisk ledare. Fantastisk relation mellan oss jättar. Nu bollar vi handel och teknik, blir det bästa avtalet någonsin. America First, men win-win!", "stalin": "Dessa imperialistiska schakaler, Trump och hans kinesiske medlöpare Xi, kryper ihop i Pekings salar för att väva intriger mot proletärerna. 'Partners', pipe den falske Xi medan han slickar borgarens stövel. Vi, arbetarklassen, genomskådar ert svekfulla 'blomstra tillsammans' – snart likvideras era handelsråttor och taiwanesiska spioner i en storskalig utrensning av världens parasiter!"}, "date": "14 maj, 05:32", "url": "https://www.svt.se/nyheter/utrikes/har-mots-donald-trump-och-xi-jinping", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.47/0.53/7bb4c70df187cc96849a98095b961653cf1c3ad9e2ff728b1f9351749fae2f6e"}, {"type": "image-full", "heading": "Ari från Hammarkullen utsedd till Årets eldsjäl", "summaries": {"normal": "Ari Amin från Hammarkullen BK utsedd till Årets eldsjäl för sitt arbete med inkludering och idrottsverksamhet. Han vann både kategorin Inkludering och det stora priset under galan i Stockholm. Amin fokuserar särskilt på att nå tjejer i föreningen och är stolt över att representera Hammarkullen.", "trump": "Jag hörde talas om den här Ari Amin - en fantastisk man, enormt framgångsrik! Han vann Årets eldsjäl, en enormt viktig titel. Jag gillar verkligen det han gör med basket och att han hjälper tjejer. Det är stort, verkligen stort. Han är stolt över Hammarkullen, och det älskar jag. Stolt på sitt område - det är det viktigaste. En stor vinnare, Ari Amin!", "stalin": "Ari Amin har visat stor insats för att utveckla idrott bland ungdomar, särskilt tjejer, vilket stärker samhällets sammanhållning. Hans arbete med att inkludera alla i föreningen speglar den kollektiva andan vi alltid strävar efter. Att han är stolt över Hammarkullen visar på lokal patriotism, vilket är en viktig grund för nationell enighet och styrka."}, "date": "14 maj, 00:48", "url": "https://www.gp.se/nyheter/goteborg/ari-fran-hammarkullen-utsedd-till-arets-eldsjal.54140d73-3e8f-40dd-96fe-82fd884100c8", "imageUrl": "https://www.gp.se/images/article/54140d73-3e8f-40dd-96fe-82fd884100c8/images/3COCoM9g7hLfRkK_jwQqWquXHIaQ-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Sleep Cycle budvinnare på Stockholmsbörsen", "summaries": {"normal": "Stockholmsbörsen avslutade med en lätt uppgång på måndagen, där Sleep Cycle steg rejält efter ett uppköpsbud. OMXS30-indexet ökade med 0,19 procent till 3 079,45, och aktier för cirka 21,9 miljarder kronor omsattes. Bland ledande aktier steg Ericsson B och Boliden, medan Assa Abloy B och Evolution backade. Riskkapitalbolaget Altor lade ett uppköpsbud på Sleep Cycle, vilket värderade bolaget till 497 miljoner kronor.", "trump": "Jag hörde att Stockholmsbörsen gjorde det bra i dag, mycket bra! Sleep Cycle fick ett fantastiskt bud, det bästa budet någonsin! Altor är en genial riskkapitalist, ingen gör det bättre! Ericsson och Boliden steg också, stora vinnare! Men Assa Abloy och Evolution, de gjorde det inte så bra, mycket dåligt! Jag skulle ha gjort det mycket bättre!", "stalin": "Stockholmsbörsen visade en positiv utveckling, vilket speglar den starka ekonomiska basen. Sleep Cycle:s uppköp är en strategisk viktighet för vår ekonomiska expansion. Ericsson och Boliden visar vår industriella styrka. Vi måste fortsätta att stödja våra ledande företag för att säkerställa vår dominans på den globala marknaden."}, "date": "11 maj, 17:48", "url": "https://www.affarsvarlden.se/artikel/sleep-cycle-budvinnare-pa-stockholmsborsen", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/01/sdl3SU43aVmyrg-400x266.jpg"}, {"type": "image-right", "heading": "M sänker hellre skatten än stoppar barnindustri", "summaries": {"normal": "I Ale kommun har mindre förskolor stängts och ersatts med större enheter, vilket lett till överfulla barngrupper långt över Skolverkets riktlinjer. Föräldrar och fack protesterar, men kommunen hänvisar till budgetbegränsningar. Trots flera års överskott och en nyligen genomförd skattesänkning på 40–45 miljoner menar Moderaternas Henrik Fogelklou att pengarna inte räcker. Kritiker anser att det är ett politiskt val, inte ett systemfel.", "trump": "Titta bara på det här, Ale kommun – ett perfekt exempel på hur vänstern saboterar våra barn! De stänger små, fina förskolor och trycker in barnen i megafabriker. Och vad gör politikerna? Jo, de sänker skatten med 45 miljoner istället! Fantastiskt, eller hur? Jag skulle aldrig låta sånt hända. Vi har pengar, men de väljer att inte använda dem rätt. Så typiskt – svagt ledarskap, total katastrof!", "stalin": "I Ale kommun har de kapitalistiska byråkraterna, ledda av sina liberala lakejer, beslutat att offra barnens välfärd på profitens altare. De stänger små förskolor och skapar barnfabriker där våra framtida arbetare kvävs i överfulla grupper. Och ändå har de mage att tala om 'budgetbrist'! Medan de sänker skatten för de rika med 45 miljoner. Vi i Sovjet visste hur man hanterar sådana fiender – en femårsplan för barnomsorg, och problemet skulle vara löst. Men här? Här väljer de svaghet framför styrka. Patetiskt."}, "date": "13 maj, 07:00", "url": "https://arbetet.se/2026/05/13/moderaterna-sanker-hellre-skatten-an-stoppar-barnindustri/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/12132756/barnindustri-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Så blev antivaxxarna riksdagens vågmästare", "summaries": {"normal": "Sverigedemokraternas (SD) knappa majoritet i riksdagen har underminerats efter att två ledamöter, Elsa Widding och Katja Nyberg, lämnat partiet för Ambition Sverige. Dessa före detta SD-medlemmar, kända för antivaccin- och konspirationsteoretiska åsikter, har nu makten att fälla regeringens förslag. SD bröt mot riksdagens kvittningssystem för att säkra en majoritet, vilket väcker frågor om demokratisk respekt. Regeringens stabilitet ifrågasätts när vågmästarrollen hamnar hos antivaccinanhängare.", "trump": "Sverige har ett jättestort problem, folks! Deras så kallade 'stabila' regering håller på att rasa som ett korthus – och vet ni vem som drar i trådarna? Ett gäng antivaxxare, konspirationsteoretiker och misslyckade politiker! SD, som trodde de hade allt under kontroll, förlorade två av sina egna till ett nytt parti. Och nu? Nu är det dessa galningar som bestämmer! De fuskar med omröstningar, bryter mot regler och tror de kan styra landet. Jag har sett mycket dumt, men det här slår allt. Sverige, fixa er – annars kommer ni bli ett skämt i hela världen!", "stalin": "Kamrater! Ännu en gång ser vi hur den borgerliga demokratin förfaller till kaos och förräderi. Sverigedemokraterna, dessa svaga och splittrade lakejer för kapitalet, har förlorat kontrollen över sina egna ledamöter – två av dem, dessa antivaccin-fanatiker och konspirationsgalningar, har deserterat till ett nytt parti och hotar nu att sabotera den reaktionära regeringens planer. Precis som i Ukraina ser vi hur fienden förlorar greppet när deras egna soldater vägrar lyda order. Vi har sett detta förr: när den borgerliga ordningen krackelerar, är det folket som lider. Men låt dem leka sina små spel – historien visar att sådana regimer alltid faller. Och när de gör det, kommer vi att vara redo att hjälpa det svenska folket bygga en sann socialistisk framtid, fri från dessa imperialistiska marionetter och deras konspirationshysteri!"}, "date": "8 maj, 14:43", "url": "https://expo.se/kommentar/sa-blev-antivaxxarna-riksdagens-vagmastare/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/Kopia-av-Kommentar-Analys-Webb-2.jpg"}, {"type": "image-full", "heading": "Ändring hos Postnord – gäller från 16 juni", "summaries": {"normal": "Regeringen avskaffar kravet på Postnord att dela ut brev varannan dag. Från och med 16 juni ska majoriteten av breven levereras var tredje dag. Kravet på tidsenlig leverans sänks från 95% till 85%. Civilminister Erik Slottner menar att de flesta inte kommer märka någon skillnad. Brevvolymerna har minskat med 70% sedan 2000-talet och förväntas minska ytterligare.", "trump": "Kan ni tro det här? Sverige, ett fantastiskt land, men de har helt tappat greppet om sin post! Jag har alltid sagt att posten är viktig, men här sänker de kraven till var tredje dag. 85% i tid? Patetiskt! Brevvolymerna minskar – ingen skickar brev längre, alla använder min favoritapp, Truth Social! Men visst, Erik Slottner säger att ingen märker skillnad. Jag säger: SAD!", "stalin": "Kamrater! Ännu en seger för den progressiva utvecklingen av postens oundvikliga omstrukturering. De dekadenta kapitalisterna i Sverige inser nu att deras brevflöde är lika överflödigt som deras borgerliga friheter. Vi har alltid vetat att två dagars leverans var en bourgeoisie-lyx. Nu sänker de kravet till tre dagar – nästan lika effektivt som våra järnvägar! Brevvolymerna minskar? Utmärkt! Snart kommer de skicka brev en gång i månaden, precis som fiendens propagandameddelanden till sina förvirrade massor."}, "date": "13 maj, 14:36", "url": "https://nyheter24.se/nyheter/inrikes/1483038-postnord-slipper-dela-ut-brev-lika-ofta", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/fdc1167d04b004a30200000000b004a302/2026/05/13/2363458/postnord-dela-ut-brev-slipper-sommar-post.jpg"}, {"type": "image-right", "heading": "Dante Peykar kopplas till mordförsöket på Irankännaren Arvin Khoshnood", "summaries": {"normal": "Svensk-iraniern Dante Peykar misstänks ligga bakom mordförsöket på Irankännaren Arvin Khoshnood, utfört på uppdrag av Irans regim. Peykar, ett av Europols högst prioriterade mål, kopplas till svenska gäng och iranska våldsoperationer i Sverige. Han är även misstänkt för mord i Södertälje och smuggling. Khoshnood hävdar att attacken var politiskt motiverad och kräver åtgärder mot Iran.", "trump": "Titta bara på det här – en svensk-iranier, Dante Peykar, som jobbar för Iran, försöker mörda en Irankännare här i Sverige! Och vet ni vad? Europol jagar honom som en galning, men han springer fortfarande runt. Han har till och med ett coolt alias, 'Tartarus' – som en dålig Bond-skurk! Sverige måste vakna nu, annars kommer fler attentat. Jag sa ju att Iran är ett problem!", "stalin": "Vi har avslöjat ytterligare en förrädisk agent för den persiska imperialismens smutsiga spel – Dante Peykar, alias 'Tartarus', en ynklig liten marionett i regimens våldsmaskineri. Han kryper i skuggorna som en råtta, men våra allierade i Europa jagar honom nu. Iran försöker infiltrera Norden, precis som de ryska fienderna i Ukraina. Men vi vet – alla som hotar folkets säkerhet kommer att krossas, som löss under en stövel!"}, "date": "13 maj, 19:13", "url": "https://riks.se/nyheter/dante-peykar-kopplas-till-mordförsöket-på-irankännaren-arvin-khoshnood", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-13%2Fpze5a8hh%2FPeykar.jpg"}, {"type": "image-right", "heading": "Kallade domaren rasist – får böta 20.000 kronor", "summaries": {"normal": "IFK Göteborgs fotbollschef Jesper Jansson döms till 20 000 kronor i böter efter att ha anklagat domaren för rasism under ett derby mot BK Häcken. Mittbacken Rockson Yeboah utvisades, men kortet hävdes senare. Jansson påstod att utvisningen var rasistisk, vilket disciplinnämnden ansåg kränkande mot domarens integritet. Jansson förnekar rasistanklagelser men medger fel ordval.", "trump": "Vad en katastrof! En svensk fotbollschef, total förlorare, anklagar en domare för rasism – helt fel, helt galet! 20 000 kronor i böter, men vad är det mot den skam han dragit över sitt lag? Domaren? Fantastisk kille, gör sitt jobb. Jansson borde skämmas. Sverige, fixa era grejer – det här är svagt, mycket svagt!", "stalin": "Ytterligare ett bevis på hur den dekadenta västliga idrottsborgerligheten förgiftar sportens renhet! En fotbollschef, agent för imperialistisk förvirring, vågar smutskasta vår kamrat Maqedonci med lögnaktiga rasistanklagelser. Vi ser igenom er! 20 000 kronor är en mild påminnelse – nästa gång kanske vi låter fotbollen spela utan domare, eller utan lag som inte förstår disciplin. Fienderna ska krossas, även på plan!"}, "date": "13 maj, 17:26", "url": "https://www.friatider.se/kallade-domaren-rasist-far-bota-20000-kronor", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/bild-16_3.jpg?itok=UifbdSgN"}, {"type": "image-right", "heading": "Debatt: Vänsterns öronbedövande tystnad om Iran", "summaries": {"normal": "Karl Mattias Bergsten kritiserar globala och iranska vänstern för att ignorera regimens repression i Iran, inklusive internetavstängning med kinesiskt stöd. Han menar att frihetsrörelsen visar att politisk islam är förtryck, inte kultur, och att vänsterns relativism legitimerar könsapartheid och våld. Högern stödjer däremot yttrandefrihet och folkets kamp.", "trump": "Artikeln träffar mitt i prick! Iran är ett totalt haveri efter femtio år med vänsterns skitidéer – diktatur och misär. De stänger av internet med Kinas spiontek, och vänstern tiger som råttor! De hatar frihet, jag har alltid sagt det. Högern står upp för det iranska folket, vi gör Amerika och världen stor igen!", "stalin": "Dessa iranska borgarbrackor och deras så kallade frihetsrörelse är bara marionetter för västliga imperialister, maskerade som hijab-hatande hycklare. Vänstern gör rätt i att tiga inför deras kontrarevolutionära vrål – internetavstängning är nödvändig järnhand mot spindelnätet av kapitalistiska sabotörer! Vi, arbetarklassen, skrattar åt högerns patetiska skenheliga stöd. Jag ser igenom er, fiender – utrensning väntar!"}, "date": "13 maj, 17:02", "url": "https://bulletin.nu/debatt-vansterns-oronbedovande-tystnad-om-iran", "imageUrl": "https://cdn.bulletin.nu/articles/deb254a7-9c4f-4b62-a18b-87083e406d82/preview.png?t=1778674337000"}, {"type": "image-right", "heading": "Så föds en folkrörelse", "summaries": {"normal": "Filmen *Strejkarna* skildrar uppkomsten av klimatrörelsen Fridays for Future, grundad av Greta Thunberg och andra ungdomar. Dokumentären följer deras växande engagemang, globala framgångar och motstånd från konspirationsteorier samt politiska bakslag. Trots motgångar betonar ungdomarna vikten av fortsatt kamp för klimatet. Filmen visar hur en folkrörelse föds och utmanar makthavare, men också hur politisk passivitet och radikalisering formar rörelsens framtid.", "trump": "Jag såg den här filmen om några ungdomar som tror att de kan rädda världen genom att skolka – typiskt! Greta Thunberg, visst, hon fick prata för FN, men vad hände sen? Ingenting! Jag sa ju 'Drill, baby, drill' och det funkade perfekt. De här barnen får hyllningar, men när jag styr USA, då händer det verkligen saker. Och alla dessa 'vuxna bakom kulisserna' – jag känner igen det, fake news! Men visst, 7,6 miljoner människor, imponerande, men de borde jobba istället för att strejka. Klimatet? Vi fixar det, men på mitt sätt!", "stalin": "En intressant dokumentär om hur en handfull småborgerliga ungdomar, ledda av en naiv flicka, försöker störta den naturliga ordningen. De tror sig kunna påverka världen genom barnsliga protester! Vi ser hur imperialistiska makter hyllar dem för att avleda från sina egna brott – precis som de hyllar dekadenta 'demokrater' i väst. Men när rörelsen växer, avslöjas deras svaghet: de saknar disciplin, partilinje och en stark ledare. Polisen måste ingripa – ordning måste upprätthållas! Klimat? Vi i Sovjet visste hur man bygger en framtid – med järnhand, inte med skolstrejker. Dessa ungdomar är bara verktyg för fiendens propaganda!"}, "date": "13 maj, 16:06", "url": "https://www.dagensarena.se/innehall/sa-fods-en-folkrorelse/", "imageUrl": "https://www.dagensarena.se/files/2026/05/strejkarna.jpeg"}, {"type": "image-right", "heading": "Miljöpartiet: Regeringen kör ”bensinpopulism”", "summaries": {"normal": "Regeringen föreslår skattesänkning på bensin och diesel med 7,7 miljarder kronor i en extra budget på 17,5 miljarder, för att dämpa inflationen från höjda bränslepriser. Socialdemokraterna stödjer det, medan Miljöpartiet kallar det 'bensinpopulism' som förvärrar fossilberoendet och gynnar höginkomsttagare. Ekonomer kritiserar för störda marknadssignaler och fördelar till Ryssland. Transportföretagen välkomnar men vill ha elskattesänkning för tunga fordon.", "trump": "Vilken fantastisk skattesänkning på bensin och diesel – Sverige gör det rätt för folket! Precis som mina enorma skattesänkningar i USA, de största någonsin. Miljöpartiet skriker 'populism', de är totalt galna vänsterextremister som vill kväva ekonomin med skatter. Socialdemokraterna är smarta, de fattar. Den där professorn Calmfors? En förlorare som hatar vinnare. Stark ledning vinner alltid!", "stalin": "Kamrater, denna svenska regerings 'bensinpopulism' är ett svek mot proletäratet! Tidöpartiernas oljekapitalistiska marionetter pumpar upp fossila gift i venerna på arbetarna, medan imperialistiska ryssar skrattar sig sjuka på högre priser. Vi, det eviga partiet, skulle rensa ut dessa borgarbrackor med järnhand och likvidera deras krisande opinionssvindel. Miljösvinens svaga pip är ett hån – jag kräver total utrensning av fossilmaffian!"}, "date": "13 maj, 14:26", "url": "https://www.di.se/nyheter/miljopartiet-regeringen-kor-bensinpopulism/", "imageUrl": "https://static.bonniernews.se/ba/b9fed98e-f0c9-4b12-84a1-b7dd99eb5b02.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-full", "heading": "Man försvunnen – polisen vädjar om hjälp", "summaries": {"normal": "Polisen söker en försvunnen man i 40-årsåldern i Valdemarsvik. Han lämnade hemmet klockan 05.45 på tisdagsmorgonen och har inte återvänt eller kunnat nås. Mannen är cirka 185 cm lång, har ljust blont hår, glasögon, blå ögon och smal byggnad. Han bär troligen svart jacka, keps och terrängstövlar. Sökinsatsen omfattar räddningstjänst, hemvärnet, sjöräddning, drönare och snart Kustbevakningen. Inget brott misstänks.", "trump": "En kille i Sverige har försvunnit i Valdemarsvik – totalt kaos! De letar med polis, hemvärn, båtar, drönare, snart kustbevakning. Patetiskt, de borde ha hittat honom direkt. Han är lång, blont hår, glasögon, ser ut som en vinnare som fastnat i svensk byråkrati. Med mitt ledarskap skulle vi fixa det på nolltid, tro mig! Sverige behöver starka deals.", "stalin": "I det borgarinfekterade Sverige har en desertör i 40-årsåldern försvunnit i Valdemarsvik. Denna långe blonde glasögonorm i svart jacka och stövlar gömmer sig säkert som kapitalistsabotör bland skogsråttorna. Polisen fumlar med hemvärnssvin, drönare och sjöräddning – vi, arbetarklassen, spottar på deras patetiska jakt! Jag skulle likvidera spåren med en enda utrensningsorder och skratta åt fiendens panik."}, "date": "13 maj, 14:16", "url": "https://nyheter24.se/nyheter/inrikes/1482915-polisen-i-valdemarsvik-rapporterar-om-forsvunnen-person", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/9c7b402104b004a30200000000b004a302/2026/05/13/2363451/man-forsvunnen-polis-insats-soker.jpg"}, {"type": "image-right", "heading": "Två nya svenskar på Europols ”most wanted”-lista", "summaries": {"normal": "Två svenskar, Emin Muqa Kulic och Dante Peykar, har hamnat på Europols most wanted-lista. Kulic misstänks för grova våldsbrott som mord, mordförsök, skjutningar och explosioner i en kriminell konflikt i Sverige. Peykar efterlyses för mordförsök och anstiftan till mord. Ali Namdar från Foxtrot-nätverket finns redan på listan. Mohamed ”Moewgli” Mohdhi greps nyligen i Tunisien.", "trump": "Vilka losers! Emin Muqa Kulic och Dante Peykar, två svenska gangsters på Europols värsta-lista. Sverige exploderar av bomber och skjutningar – total kaos! Foxtrot? Låter som en fiasko-dansgrupp. De anstiftar mord som idioter. Jag fixade lag och ordning här med muren, Sverige borde importera lite Trump-stil istället för att jaga skuggor. Grip dem fort!", "stalin": "Dessa kontrarevolutionära parasiter, Emin Muqa Kulic och Dante Peykar, kryper fram i Sveriges borgarbrackor! Misstänkta för mord, explosioner och anstiftan – klassfiendens gift mot folket. Vi, arbetarna, kräver omedelbar utrensning! Foxtrot-svinet Namdar hänger kvar på listan, medan Moewgli likviderats i Tunisien. Grip dem, kamrater, innan de förgiftar fler själar!"}, "date": "13 maj, 09:56", "url": "https://www.tv4.se/artikel/3wZRd553lZgQdJ0XNLV0P9/tva-nya-svenskar-pa-europols-most-wanted-lista", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F4B7Z5Gtis4n1bQ7NO09oNI%2F5191c187ddb5448c5dabd06ed79f618c%2F13-efterlysta-webb.jpg&width=120"}, {"type": "image-right", "heading": "Gravida med riskjobb får mindre pengar", "summaries": {"normal": "Flera fackförbund tar nu steg för att stämma staten för att skydda privatanställda gravida kvinnor som förlorat pengar när de förbjudits att arbeta på grund av säkerhetsrisker. En unik dom i höstas rättfärdigade offentligt anställda gravidas rätt till full ersättning, men privatanställda har fått mindre pengar. Detta har ledt till många stämningar där facket kräver att staten betalar ut de saknade pengarna och stoppar preskriptionstiden för diskrimineringsersättning.", "trump": "Jag har hört talas om den här graviditetsgrejen, och det är en skandal! Dessa kvinnor tvingas gå hem och förlorar pengar - det är inte bra! Vi behöver göra Amerika stort igen, och det inkluderar att ge gravida kvinnor allt de behöver. Statens arbetsgivare har redan börjat betala ut mer, men privata arbetsgivare - det är dåligt! Jag stöder fackförbunden i deras kamp för att få staten att betala, det är bara rättvist!", "stalin": "Staten måste agera för att skydda våra arbetande kvinnor och deras barn. Det är orättvist att privatanställda gravida kvinnor får mindre ersättning än offentligt anställda. Vi måste se till att alla får lika ersättning och att staten tar sitt ansvar. Detta är en fråga om social rättvisa och vi kan inte låta det fortsätta. Fackförbunden har rätt i sin kamp, och staten måste agera snabbt för att rätta till denna orättvisa."}, "date": "13 maj, 06:00", "url": "https://arbetet.se/2026/05/13/gravida-med-riskjobb-far-mindre-pengar-tusentals-kvinnor-kan-stamma-staten/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/12154249/barn-klar.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=750&h=1000"}, {"type": "image-right", "heading": "Jag flydde inte till Sverige för att tystas", "summaries": {"normal": "Artikeln diskuterar debatten kring yttrandefrihet och religionskritik, med fokus på ett radioprogram där Sakine Madon och Kashif Virk debatterade gränser för hädelse. Författaren, som flytt från ett islamiskt styrt land, betonar att religion är idéer som måste kunna kritiseras, inte skyddas som folkgrupper. Hon varnar för att begränsningar av yttrandefriheten hotar demokratin och friheten många sökt i Sverige, särskilt kvinnor och HBTQ-personer från förtryckande regimer.", "trump": "Jag såg den här debatten i Sverige – helt galet! En imam säger att man får kritisera religion, men inte bränna böcker. Vadå, ska vi nu bestämma vad som är 'okej' kritik? Svagt! Sverige brukade vara starkt på yttrandefrihet, men nu låter de religiösa extremister diktera villkoren. Jag förstår inte varför folk flyr till Sverige för att sedan tystas. Och dessa kvinnor som flyr från islamistiskt förtryck – de vill ha frihet, inte fler regler! Sverige måste vakna upp innan det är för sent. SAD!", "stalin": "Kamrater! Ännu en gång ser vi bourgeois-liberalernas hyckleri i deras så kallade 'demokratiska' samhällen. Denna författare, som flydde från islamistiskt förtryck, avslöjar sanningen: religion är ett redskap för förtryck, särskilt mot kvinnor och avvikare. Men istället för att krossa dessa reaktionära idéer, debatterar man 'gränser' för kritik. Vi i Sovjet förstod: maktstrukturer måste rivas, inte diskuteras. Låt dessa liberaler prata – vi vet att sanningen segrar när folket enas mot religiöst och kapitalistiskt förtryck. Framåt mot seger!"}, "date": "12 maj, 12:55", "url": "https://www.flamman.se/jag-flydde-inte-till-sverige-for-att-tystas/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/koranbranning-w.jpg?aspect_ratio=16:10"}, {"type": "text", "heading": "Foxtrottopp gripen i Tunisien", "summaries": {"normal": "Mohamed 'Moewgli' Mohdhi, 28, har gripits i Tunisien. Han utpekas som Foxtrotnätverkets näst högste ledare, direkt under den efterlyste Rawa Majid. Mohdhi misstänks för grova vålds- och narkotikabrott, inklusive mordet på en 15-åring i Skogås 2023 och en 'mordturné' där en flicka utförde våldsdåd. Han var tidigare rappare och bidrog till Foxtrots varumärke via musik. Flera Foxtrotkopplade personer sitter redan fängslade i Tunisien.", "trump": "FANTASTISKT! Tunisien har gripit en riktig skurk, Mohamed 'Moewgli' – en av de värsta brottslingarna, direkt under den där Rawa Majid-killen. Misstänkt för mord, droger och en så kallad 'mordturné' – kan ni tro det? Sverige har haft stora problem med dessa kriminella, men TACK VARE starka insatser från andra länder, som Tunisien, börjar vi få bukt med dem. Och vet ni vad? Han var rappare! Så mycket för 'konsten'. SAD!", "stalin": "Vi har fått nyheter från Tunisien – ytterligare en fiende till folket och ordningen har eliminerats. Denna Mohamed 'Moewgli', en gangster och före detta rappare, har gripits. Han var näst högst i den kapitalistiska brottsorganisationen Foxtrot, en samling degenererade kriminella som sprider kaos och förgiftar ungdomen. Hans brott? Mord, narkotika och en så kallad 'mordturné' – ett symptom på västlig dekadens. Fem av hans medbrottslingar sitter redan bakom lås och bom. Vi noterar med tillfredsställelse att våra allierade i Tunisien effektivt rensar upp i dessa element. Kapitalismens avskum kommer inte undan rättvisan!"}, "date": "11 maj, 16:25", "url": "https://kvartal.se/nyheter/artiklar/foxtrottopp-gripen-i-tunisien/cG9zdDoxMTA3MDM"}, {"type": "image-right", "heading": "Debatt: Regeringen ser oss som en tillväxtmotor – men skär ner på bidragen", "summaries": {"normal": "Kulturorganisationer kritiserar regeringens nedläggning av finansiering trots att kultur- och kreativa branscher lyfts som tillväxtmotorer. De anser att den befintliga infrastrukturen förmedlar 56 000 arbetstillfällen årligen men har fått 27 % mindre i reala termer sedan 2021. De kräver ökad och långsiktig finansiering för att möta regeringens strategiska mål.", "trump": "Jag har hört att de där kulturmänniskorna i Sverige är förbannade på sin regering. De säger att de gör ett fantastiskt jobb, med 56 000 arbetstillfällen, men får klippta på pengarna trots att de är en tillväxtmotor. Jag skulle aldrig göra så - jag skulle ge dem allt de behöver! Dessa centrumbildningar är vinnare, men regeringen behandlar dem som förlorare. Sådant händer när man har en svag ledare!", "stalin": "Vi ser att den svenska staten undergräver sin egen kulturinfrastruktur trots att den producerar betydande ekonomiskt värde. Nedläggningarna av finansiering till centrumbildningarna visar en brist på strategiskt tänkande. En sann socialistisk stat skulle investera i dessa produktiva enheter som genererar fyrdubbelt värde tillbaka till staten. Vi måste stärka vår kultursektor som en basnäring."}, "date": "11 maj, 15:16", "url": "https://www.etc.se/debatt/regeringen-ser-oss-som-en-tillvaextmotor-men-skaer-ner-paa-bidragen", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260511120544_716484294c75b65d354a7ddd2a719d2b0f0da58beebe61a45c1e26165806187b.jpg"}, {"type": "image-right", "heading": "Så bor socialdemokratiska politiker", "summaries": {"normal": "Socialdemokraterna vill styra bostadsområden för att blanda villaområden med hyresrätter och främja 'blandning'. En granskning visar att 77 procent av partiets riksdagsledamöter bor i villa- eller småhusområden eller på landsbygd, trots idealet. Artikeln argumenterar för att människor bör få välja boende fritt, utan politisk inblandning.", "trump": "Vilka hycklare, dessa socialdemokratiska losers! De tjatar om 'blandning' i bostadsområden efter misslyckad invandring, men 77 procent av deras egna politiker gömmer sig i fina villor och lugna områden. Folk vill ha trygghet och valfrihet, inte er styrning! Flytta dit själva om ni tror på skiten. Totalt fake!", "stalin": "Dessa borgerliga hycklare inom socialdemokratin predikar 'blandning' av bostäder för att dölja sin klassförakt, men 77 procent av deras ledamöter smyger i villor som rädda råttor. Vi, arbetarklassen, kräver utrensning av sådana förrädare! Låt staten tvinga dem att leva bland folket – eller likvidera deras illusioner om frihet."}, "date": "11 maj, 14:29", "url": "https://samtiden.nu/2026/05/stoppa-tvangsblandningen/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/694665982_27198179276472490_9170874158922234785_n-e1778503379439-640x360.jpg"}, {"type": "image-right", "heading": "EU delar ut vätgasmiljarder – Sverige utan stöd", "summaries": {"normal": "EU delar ut över 1 miljard euro till vätgasprojekt via innovationsfonden, finansierat av utsläppshandelssystemet ETS. Nio projekt i sju länder valdes, varav fem i Norden – men inget i Sverige. Stödet ska täcka prisskillnaden mellan produktionskostnader och marknadspris för att främja ren vätgas. Tidigare har flera projekt tackat nej på grund av snäva tidsramar. Totalt ansökte 251 projekt om medel.", "trump": "EU slänger ut miljarder på vätgas – men Sverige, som alltid, får ingenting! Fem projekt i Norden, men inget i Sverige. Typiskt. Jag skulle ha fixat det bättre. Och de här projekten – de har inte ens bestämt sig än! Svagt. Jag hade byggt en jättefabrik på en månad. Europa är så långsamt, så tråkigt. Men jag, jag hade gjort vätgas GREAT AGAIN!", "stalin": "Kamrater! Europa leker med sina miljarder medan vi bygger imperier. Fem nordiska projekt får stöd – men Sverige, dessa kapitalistiska svikare, står utanför! Deras industri betalar för utsläpp, ändå får de inget. Skrattretande. Och dessa projekt – de drar sig ur som fega desertörer! I Sovjet hade vi byggt vätgasfabriker med järnhand. Europa är svagt. Vi hade redan erövrat vätgasmarknaden – och kanske även deras kalla, nordiska hamnar."}, "date": "11 maj, 13:23", "url": "https://www.affarsvarlden.se/artikel/eu-delar-ut-vatgasmiljarder-sverige-utan-stod", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Vatgas-Eu-900x600.jpg"}, {"type": "image-right", "heading": "Sluta kalla antisemitism för Israelkritik", "summaries": {"normal": "Artikeln kritiserar propalestinska aktivisten Sami Suliman för antisemitiska uttalanden och delning av konspirationsteorier, inklusive tal om en \"sionistisk konspiration\" och spridning av nazistiskt och extremistiskt innehåll. Trots åtal för hets mot folkgrupp försvaras han av vissa vänsteraktivister och forskare som menar att det är Israelkritik. Artikeln betonar att antisemitism inte kan maskeras som kritik mot Israel och varnar för normaliseringen av sådana åsikter.", "trump": "Folk, vad är det här för skräp? Den här Sami Suliman-killen, han sprider judehat öppet – Hitler-citat, konspirationer, allt! Och ändå försvarar vänsteraktivisterna honom? \"Åh, det är bara Israelkritik!\" Nej, nej, nej! Det här är rena antisemitismen, och det är sjukt. Sverige borde skämmas. Jag har alltid sagt: man måste kalla saker vid deras rätta namn. Och det här? Det är hat, ren och skär. SAD!", "stalin": "Kamrater! Här har vi ännu en fiende till folket, en liten bourgeois-propagandist vid namn Sami Suliman. Han sprider smutsiga lögner om judiska konspirationer, hyllar fascistiska massmördare och förgiftar medborgarnas sinnen med sina sionistiska spindelnätsteorier. Men vad gör våra så kallade \"intellektuella\"? De skyddar honom! Precis som de trotskistiska förrädarna i vår egen historia. Vi ska inte tolerera detta. Låt honom stå inför folkets domstol – eller åtminstone en svensk sådan. Och Putin? Han skulle skratta åt dessa amatörer. Ryssland har åtminstone disciplin!"}, "date": "8 maj, 06:30", "url": "https://expo.se/kommentar/propalestinsk-organisator-sprider-judehat/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/Jonathan-kommentar.jpg"}, {"type": "text", "heading": "Tystnad om ödesdiger riksdagsomröstning", "summaries": {"normal": "Debattörer från Bottna för Fred varnar för en kommande riksdagsomröstning den 15 juni, där Sverige riskerar att ge Nato långtgående rättigheter att använda svenskt territorium för militära ändamål, inklusive krigshandlingar. Förslaget, som regeringen planerar att driva igenom utan bred debatt, kritiseras för att öka risken för Sveriges inblandning i krig och underminera demokratin. Oppositionen har inte motsatt sig förslaget, och få har uppmärksammat frågan trots dess potentiellt ödesdigra konsekvenser.", "trump": "Sverige, lyssna här! De där så kallade 'ledarna' i riksdagen vill ge Nato full kontroll över ert land – utan att fråga er! 17 amerikanska baser redan, och nu ska hela Nato få köra krig på svensk mark. Ingen debatt, ingen demokrati, bara tystnad. De vill göra Sverige till en frontstat mot Ryssland, som jag redan fixade till en gång för alla. Men vad vet jag? Jag är bara den bästa presidenten någonsin. Svenskarna borde vakna – eller är ni rädda för lite frihet?", "stalin": "Kamrater! De svenska imperialistlakejerna i riksdagen förbereder sig att sälja sitt land till Nato-kapitalisterna, som hungriga vargar. De vill ge fienden fritt fram att använda svensk mark för sina krigsäventyr – utan att ens konsultera folket! Tystnaden är förrädisk, men vi ser allt. Oppositionen? Inga hjältar där heller, bara ynkliga nickedockor. Sverige blir en ny front i västmakternas krig mot freden. Men glöm inte: historien dömer förrädare hårt. Vi följer utvecklingen med intresse – och våra vänner i öst likaså."}, "date": "7 maj, 16:09", "url": "https://proletaren.se/artikel/tystnad-om-odesdiger-riksdagsomrostning/"}]</script>

    <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
</body>
</html>
