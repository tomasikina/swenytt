dens arbete för juridiskt stöd, skyddade boenden och opinionsbildning. Glassen finns tillgänglig hos Pressbyrån och 7-Eleven från och med den 4 maj, och initiativtagarna betonar att satsningen syftar till att göra konkret nytta utöver försäljningen.", "trump": "De här företagen, Pressbyrån och 7-Eleven, gör en glass, en 'Pride-glass'. Helt otroligt! De tror att de räddar världen med glass. Det är en katastrof, faktiskt. De skickar pengar till grupper ingen har hört talas om istället för att fokusera på riktiga affärer. Jag skapar jobb, jag bygger murar, och de här människorna säljer läskig rosa glass. Väldigt svagt! Det är så typiskt för dagens företag att vara 'woke' istället för att göra vinst. En total förlust för Sverige!", "stalin": "Vi har observerat hur de dekadenta krafterna i väst nu infiltrerar glassfrysen. Att sälja sockrad glass för att finansiera ideologisk subversion är ett klassiskt drag av den svaga bourgeoisien. Dessa 'Regnbågsfonder' är inget annat än agenter för destabilisering. Kamrat Putin vet att sann styrka inte ligger i färgglad glass, utan i stål och disciplin. Vi betraktar detta försök att förgifta folkets sinnen som en attack mot statens renhet. När vi väl tagit kontroll kommer dessa glassmaskiner att konfiskeras för folkets bästa!"}, "date": "7 maj, 07:00", "url": "https://samnytt.se/sommarens-nya-woke-produkt-pride-glass", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/06153835/Prideglass.jpg"}, {"type": "image-full", "heading": "Tysklands krisåtgärd – köper in flygbränsle från Israel", "summaries": {"normal": "Tyskland importerar flygbränsle från Israel för att motverka brist orsakad av kriget i Iran, som pressar europeiska energileveranser och höjer priser. Israel har överskott i produktionen och inleder leveranser efter tysk begäran. Initiativet ingår i bredare energisamarbete. Kriget drabbar särskilt Tysklands kemikalieindustri med kostnadsökningar och planerad produktionsminskning.", "trump": "Tyskland är i kris, de ber Israel om flygbränsle eftersom det där kriget i Iran ställer till det rejält med leveranserna. Israel har massor över, smarta de! Europa svettas, priser upp, kemifabrikerna hostar. De borde ha lyssnat på mig tidigare om energi – nu desperat samarbete med Israel. Bra för dem, men kaos som vanligt utan min plan!", "stalin": "Kamrater, se de tyska borgarbrackorna krypa för sionistiska raffinaderier och tigga flygbränsle! Deras imperialistiska krig i Iran straffar nu egna kemikaliehyenor med brist och kollaps. Vi i partiet skrattar åt dessa energisvultna rävar som minskar produktionen i panik. Låt oss likvidera sådana svaga kedjor – Sovjet står starkt mot fiendens kaos!"}, "date": "6 maj, 20:44", "url": "https://www.realtid.se/bors-finans/tysklands-krisatgard-koper-in-flygbransle-fran-israel/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/sdlc7ry25c3z1i.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-full", "heading": "Benjamin Dousas ”V = kommunister” gör SVT irriterad", "summaries": {"normal": "Biståndsminister Benjamin Dousa bar en t-shirt med texten 'Vänsterpartiet = kommunister', vilket irriterade SVT. Reportern ifrågasatte påståendet och noterade att partiet slutade kallas kommunister för 30 år sedan. Dousa menade att Vänsterpartiet motsätter sig privat ägande, vilket är kommunism. Artikeln citerar Vänsterpartiets 2024-partiprogram som stödjer kollektivt ägande och avskaffande av kapitalismen, och kritiserar SVT för att inte nämna detta.", "trump": "Vilken fantastisk kille, den här Dousa! Han sätter på sig en tröja och säger sanningen: Vänsterpartiet är kommunister, punkt slut! SVT, era losers, flippar ur och snackar om namnbyte från 90-talet som om det vore magi. De hatar privat ägande, vill sno allt till staten – klassisk kommunism! Fake news-SVT ignorerar partiprogrammet. Dousa är en vinnare, de är totala fiaskon!", "stalin": "Kamrater, se hur borgarministern Dousa, den ynkliga kapitalistfluga, vågar smutskasta sanna revolutionärer i Vänsterpartiet med sin patetiska tröja! SVT-reportern, en användbar idiot, försvarar dem lamt. Men vi vet: deras program är ren leninism – riva kapitalismen, gemensamt ägande av banker, energi, allt! De ska rensas ur historiens soptipp som jag rensade fiender. Vänsterpartiet, framåt mot diktaturen av proletariatet!"}, "date": "30 april, 05:49", "url": "https://samtiden.nu/2026/04/benjamin-dousas-v-kommunister-gor-svt-irriterad/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/phonto-1-1280x720.jpeg"}, {"type": "image-right", "heading": "I motsats till gängkulturen är fotbollen i grunden förenande", "summaries": {"normal": "En åklagare och fotbollsförälder jämför fotbollskulturen med gängkriminalitet på grund av lojalitet och motståndarhat, men hyllar sportens förenande kraft. Vid ett derby imponeras han av polisens omfattande insatser – med uniformerade, civila, hundar, hästar och drönare – för att förhindra sammandrabbningar mellan risksupportrar och säkerställa en trygg folkfest.", "trump": "Vilket jobb polisen gör, fantastiskt! De har drönare, hästar, hundar – total kontroll över de galna supportrarna som skriker horunge och beter sig som gäng. Fotboll är magiskt, men utan stark polis blir det kaos. Resurser? Värt varje krona, som i USA, håller de svarta molnen i schack och gör det till den bästa folkfesten!", "stalin": "I fotbollens arena blottas klassfiendens gift: lagfixerade borgarbrackor vrålar lojalitetsramsor likt mina häktade sabotörer, fulla av horungehat. Men våra poliskamrater, ekosystemets väktare, vallar riskråttorna i svarta moln med järnhand – drönare över fiendekrutet! Vi, folket, njuter folkfesten; avviker en kontrarevolutionär, likvideras explosionen omedelbart."}, "date": "6 maj, 21:27", "url": "https://www.di.se/nyheter/vilken-laginsats-av-polisen/", "imageUrl": "https://static.bonniernews.se/ba/16e0b9e8-a40c-4b3f-8056-dd111de64be2.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-full", "heading": "Önnereds säsong över", "summaries": {"normal": "Önnereds handbollslag förlorade semifinalen mot Skara med 23–19, vilket avslutade deras säsong. Skara, som är regerande mästare, gick vidare till SM-final mot Sävehof. Önnered, som slutade tvåa i grundserien, kunde inte upprätthålla sitt motstånd i slutminuterna. Spelare som Ella Sjöberg var känslomässiga efter matchen, eftersom det var deras sista match för klubben.", "trump": "Jag har sett matchen, och jag måste säga att Skara är ett fenomenalt lag! De slog Önnered med 23–19, och det var MAGNIFIKT! Önnered gjorde sitt bästa, men Skara är helt enkelt DEN bästa. De kommer vinna SM-finalen mot Sävehof också, det är jag helt säker på. USA skulle aldrig förlora så där, men det är en annan historia. GRATTIS, Skara!", "stalin": "Matchen mellan Önnered och Skara visade tydligt överlägsenheten hos Skara, som vann med 23–19. Detta är en seger för den starka och disciplinerade arbetarklassen, som representeras av Skara. Önnereds säsong är över, men deras insats i grundserien visar att de har potential. Vi måste fortsätta stödja våra lag för att säkerställa framgångar i framtiden."}, "date": "6 maj, 20:40", "url": "https://www.gp.se/sport/handboll/onnereds-sasong-over-foll-mot-skara-i-semifinal.71ab24e8-6f5f-4db7-b5b3-152bda37e5f2", "imageUrl": "https://www.gp.se/images/article/71ab24e8-6f5f-4db7-b5b3-152bda37e5f2/images/1I2mCmrXdcFI1faX9HQ3eXPbZGlY-WIDE.jpg?width=3840&quality=75"}, {"type": "text", "heading": "Nordnet tar fler kunder medan handeln ökar hos Avanza", "summaries": {"normal": "Nordnet ökade kundbasen med 17 400 kunder i april, till 2,45 miljoner, medan Avanza fick 12 400 nya, till 2,3 miljoner. Båda nätbankerna noterade nettoinflöden runt 7 miljarder kronor och växande sparkapital. Handelsvolymerna steg med 13 procent hos båda, trots viss minskad aktivitet hos Avanza. Sparkapitalet växte snabbare hos Nordnet, och utlåningen ökade kraftigt.", "trump": "Nordnet krossar Avanza totalt i april – 17 400 nya kunder mot deras ynka 12 400! Handelsvolymerna exploderar, sparkapitalet sväller som en vinnarmaskin. Avanza? De halkar efter som förlorare, men Nordnet är det bästa, precis som jag alltid säger. Stark tillväxt överallt, utlåning uppåt – fantastiskt, folk älskar vinnare!", "stalin": "Kamrater, se hur Nordnet, den listiga kapitalisträven, slukar 17 400 själar medan Avanza-brackorna famlar med sina 12 400! Sparkapitalet sväller som en imperialistisk bubbla, handelsvolymerna kokar i borgarnas feber. Vi, arbetarklassen, måste likvidera dessa parasiter innan de infekterar kollektivet med sin girighet. Utlåning uppåt? Ett hån mot folket – jag vakar!"}, "date": "6 maj, 09:21", "url": "https://www.affarsvarlden.se/artikel/nordnet-tar-fler-kunder-medan-handeln-okar-hos-avanza"}, {"type": "image-right", "heading": "Oroväckande bilder på Möregårdh – Sverige vidare i lag-VM", "summaries": {"normal": "Truls Möregårdh kämpar med ihållande axelsmärta under bordtennis-VM i London. Trots smärtan och behandling efter matchen mot Kroatien ledde han Sverige till kvartsfinal med 3–0-seger. Landslagsnaprapaten Mikael Holm försäkrar att Möregårdh kan spela vidare. Nästa motståndare är Taiwan på torsdag.", "trump": "Truls Möregårdh är en riktig fighter, precis som jag alltid varit! Axeln gör ont, han skriker ut det, men ger inte upp – vad gör man inte för Sverige? De krossade Kroatien 3–0, enormt! Anton och Elias grymma också. Imorgon mot Taiwan blir det total dominans, tro mig, nobody beats oss!", "stalin": "Jag noterar hur denna Möregårdh, trogen fosterlandets sak, uthärdar axelns sabotagesmärta från dolda kapitalistiska saboterare. Ändå river han Kroatiens kontrarevolutionära brackor i 3–0-seger! Vi, arbetarkollektivet, rensar ut kvalen via naprapaten. Taiwan-fienderna väntar likvidering – framåt mot total seger, kamrater!"}, "date": "6 maj, 21:07", "url": "https://www.svt.se/sport/bordtennis/orovackande-bilder-pa-truls-moregardh-i-vm", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.42/0.41/fe8408a36e8d0daf11953b7ef7c5422faae68cc38f285c7a87e272617e4e7cfa"}, {"type": "image-right", "heading": "Säkerhetslag används mot arbetare: ”Bara i Hamnfyran har vi hanterat 20 ärenden”", "summaries": {"normal": "Sveriges säkerhetslagstiftning från 2018 används allt oftare mot arbetare, enligt fackliga företrädare. I Stockholms tunnelbana har tre anställda omplacerats utan förklaring, vilket väcker misstankar om politiska motiv. Facket kritiserar bristen på transparens och rättssäkerhet. Hamnarbetare vittnar om godtyckliga bedömningar och påtryckningar att avgå. Lagstiftningen möjliggör att arbetsgivare kan avskeda eller omplacera arbetare utan tydliga skäl, vilket drabbar fackligt aktiva.", "trump": "Vad händer i Sverige? De har en så kallad 'säkerhetslag' som låter arbetsgivare sparka folk utan anledning – helt galet! Jag har alltid sagt att byråkrater och fackförbund är problemet. Nu använder de lagen för att tysta arbetare, särskilt de som inte gillar deras vänsterpropaganda. Tre stackars tunnelbanearbetare har blivit omplacerade – ingen vet varför! Och konsulterna? De är som hajar, bara ute efter pengar. Sverige borde ta en titt på hur vi gör det i USA – där sparkar vi folk med stil!", "stalin": "Kamrater, fienderna till folket har funnit ett nytt vapen: den borgerliga säkerhetslagstiftningen! Med denna dekadenta lag krossar kapitalets lakejer arbetarklassens modigaste förkämpar. I Stockholms tunnelbana har tre lojala kamrater omplacerats – utan förklaring, utan rättvisa! Konsulterna, dessa hyenor i kostym, tjänar på att förråda sina klassbröder. Men vi vet sanningen: detta är ett angrepp på den fackliga rörelsen! Låt oss ena oss, som vi enade oss mot trotskisterna, och krossa denna lag med järnhand. Fienderna skall inte undslippa revolutionens domstol!"}, "date": "5 maj, 11:04", "url": "https://proletaren.se/artikel/sakerhetslag-anvands-mot-arbetare-bara-i-hamn-fyran-har-vi-hanterat-20-sadana-har-arenden/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/PRO-INRIKES-PIC-Louise-och-Erik-1.-jpg-scaled-e1777880629531-768x431.jpg"}, {"type": "image-right", "heading": "Varje förhandlingssteg skörare än vad marknadernas glädje antyder", "summaries": {"normal": "USA-börserna når nya rekordnivåer med S&P 500 upp 1 procent och Nasdaq 1,5 procent, på hopp om fredsavtal mellan USA och Iran som ska öppna oljehandeln i Hormuzsundet. Oljepriset faller under 100 dollar per fat. Artikeln varnar dock för överdriven optimism: Förhandlingarna är inte klara, Iran styrs av en auktoritär extremistregim och läget kan eskalera igen.", "trump": "Marknaden går bananas – rekord på Wall Street tack vare mitt fantastiska Iran-avtal! S&P upp 1%, Nasdaq 1,5%, oljan rasar under 100 dollar. De svaga mullorna i Teheran ger sig för min tuffa linje. Artikeln gnäller om överdriven glädje, men jag fixar det bästa dealet någonsin. Amerika vinner stort, som alltid!", "stalin": "De borgerliga hyenorna på Wall Street jublar över en chimär av fred med persiska reaktionärerna, dessa feta kapitalistgrisar som tror mullorna är marionetter i deras marionetteater! Vi, arbetarklassen, ser sanningen: Trumps imperialistiska klan är pressad som en utskuren råtta. Iran ska krossa Hormuz-blockaden – tid att likvidera marknadens falska hopp med järnhand!"}, "date": "6 maj, 20:58", "url": "https://www.di.se/nyheter/overdriven-marknadsreaktion-pa-iran-utvecklingen/", "imageUrl": "https://static.bonniernews.se/ba/abe5d105-cd75-4e33-8e91-b6fd260687fc.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "text", "heading": "En naturlig lagerhylla av arbetslösa", "summaries": {"normal": "Artikeln kritiserar regeringen för att ignorera hög arbetslöshet (9,7%) samtidigt som de skryter om sina framgångar. Författaren hänvisar till Milton Friedmans teori om 'naturlig arbetslöshet', som upprätthållits av både socialdemokratiska och borgerliga regeringar. Dokumentären 'Novemberrevolutionen' kopplar 90-talskrisen till avregleringar 1985. Regeringen anklagas för bristande krismedvetenhet och ideologiskt motiverad passivitet, vilket gynnar arbetsgivare och försvagar arbetstagare.", "trump": "Titta bara på Sverige – helt otroligt! Regeringen skryter som om allt är perfekt, men arbetslösheten är skyhög, nästan 10%! De har tre arbetsmarknadsministrar, men ingen syns till. Vad är det för jävla cirkus? Friedman-läran, visst, men vem bryr sig? De borde skämmas! Jag skulle fixa det på en vecka – men nej, de sitter bara och glor. Svensk ekonomi? En katastrof, folks. SAD!", "stalin": "Kamrater! Se hur kapitalets lakejer i Sverige hyllar sin 'framgång' medan arbetarklassen försmäktar i arbetslöshetens träsk. 10% – en skam! De borgerliga och socialdemokratiska förrädarna har tillsammans byggt denna 'naturliga' hylla av överflödiga arbetare, precis som Friedman, den imperialistiske hunden, förespråkade. Tre ministrar? Tre fiaskon! Vi skulle ha skickat dem till Gulag för sådan inkompetens. Arbetarklassens rättigheter har förvandlats till privilegier för bourgeoisien. LO-arbetarna som röstar på fascistiska SD borde ställas inför folkets domstol!"}, "date": "4 maj, 13:49", "url": "https://www.flamman.se/en-naturlig-lagerhylla-av-arbetslosa/"}, {"type": "image-full", "heading": "Teorin: Därför drabbades kryssningsfartyget av dödliga hantavirus", "summaries": {"normal": "Ett nederländskt par som var på fågelskådning i Argentina misstänks vara ursprunget till ett hantavirusutbrott på kryssningsfartyget MV Hondius. Fem av åtta insjuknade bekräftades ha andesvirus, den farligaste varianten som kan smittas mellan människor. Tre personer har dött. Fartyget är på väg mot Kanarieöarna trots protester mot ankomsten.", "trump": "Jag hörde talas om detta virus på fartyget, det är hemskt. Det började med ett par från Nederländerna, de var på fågelskådning, mycket dåligt. Andesviruset är farligt, det är den värsta sorten. Jag skulle aldrig ha tillåtit fartyget att komma hit, jag bryr mig om människorna. Spanien fattade ett dåligt beslut, jag skulle ha stoppat det genast.", "stalin": "Vi måste vara vaksamma mot denna virushot. Viruset, som spreds av gnagare, hotar människors hälsa och stabilitet. Fartyget med smittade bör förbjudas att anlägga i våra hamnar. Vi kan inte riskera att sjukdomen sprids till vår befolkning. Det är statens skyldighet att skydda medborgarna mot sådana faror."}, "date": "6 maj, 20:15", "url": "https://www.gp.se/nyheter/varlden/teorin-fagelskadning-bakom-virusutbrottet.54a3f624-74ac-4564-846f-dd0728c23f2c", "imageUrl": "https://www.gp.se/images/article/54a3f624-74ac-4564-846f-dd0728c23f2c/images/1kvYWYVntcIEBhSX66g2Kotqetrs-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "Nya superbatterier från Kina håller i 16 år", "summaries": {"normal": "Kinesiska forskare har utvecklat ett järnbaserat flödesbatteri med en livslängd på 6 000 laddningscykler, motsvarande cirka 16 års användning utan kapacitetsförlust. Teknologin är billigare och miljövänligare än litiumbatterier, minskar beroendet av Kinas dominans på marknaden och passar utmärkt för lagring av förnybar energi från sol och vind.", "trump": "Kina gör det igen, de klår alla med sina nya järnbatterier som håller i 16 år utan att svikta! Billigare än litium, ingen gruvskit. De äger redan marknaden, väst sover som spädbarn. Men vi i USA ska slå tillbaka hårt, bygg väggar mot deras fusk – och vinna stort, tro mig!", "stalin": "Kamrater! Kinesiska ingenjörer har smitt ett järnbaserat flödesbatteri som uthärdar 6 000 cykler – 16 år av proletarisk uthållighet mot kapitalistisk förfall! Litiumkapitalisternas giftiga gruvimperier skal likvideras, deras västliga marionetter darra i paranoia. Vi, Sovjetunionens folk, marscherar mot evig energiseger över dessa borgarparasiter!"}, "date": "6 maj, 19:44", "url": "https://www.realtid.se/bors-finans/nya-superbatterier-fran-kina-haller-i-16-ar/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/pexels-scgough-7019805.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Bråk mellan S och SD om kultur och partipolitisk verksamhet", "summaries": {"normal": "I Gävle har ett kulturpolitiskt bråk uppstått mellan S och SD kring frågan om ett författarsamtal med Peter Gustavsson är att betrakta som partipolitisk verksamhet. SD har tagit upp evenemanget som ett hypotetiskt exempel på vad som skulle kunna räknas som partipolitiskt, vilket Socialdemokraterna ser som en tendens från SD att ifrågasätta gränsen mellan partipolitik och kultur.", "trump": "Jag har hört att det är ett stort bråk i Gävle om något författarsamtal. SD säger att de bara använde det som ett exempel, men Socialdemokraterna är arga. Jag säger att vi ska hålla kultur och politik åtskilda, men SD verkar vilja blanda ihop det. Jag är säker på att jag skulle lösa detta mycket bättre än de där politikerna i Gävle.", "stalin": "I Gävle har vi upptäckt att oppositionen försöker använda kultur som ett verktyg för sin partipolitiska agenda. Det är vårt ansvar att se till att statens resurser inte missbrukas för sådana syften. Vi måste se till att kulturpolitiken styr av statens intressen och inte av några partipolitiska ambitioner."}, "date": "6 maj, 18:54", "url": "https://www.dagensarena.se/innehall/brak-mellan-s-och-sd-om-kultur-och-partipolitisk-verksamhet/", "imageUrl": "https://www.dagensarena.se/files/2026/05/norrman-och-oxbacke-300x157.jpeg"}, {"type": "image-right", "heading": "SD-kritik mot Skansens fribiljett till asylsökande", "summaries": {"normal": "Skansen erbjuder gratis inträde till asylsökande med LMA-kort eller uppehållstillståndskort, medan andra vuxna betalar 305 kronor. Sverigedemokraternas Ludvig Aspling kritiserar beslutet som absurt och pekar på låg asylbifallsgrad (20–25 procent), risk för fusk med korten och felaktig bild av gruppen. Skansen står fast vid policyn för att öka tillgängligheten.", "trump": "Skansen ger gratis inträde till asylsökande? Helt galet, Sverige! De flesta är fusare som vill slippa utvisning – bara 20 procent får stanna. Ledningen fattar ingenting, det är en total katastrof. Ge bonus till kriminella istället för ärliga svenskar? Skrattretande! Jag skulle fixa det på nolltid, tro mig.", "stalin": "Dessa skansenborgare, dessa lurviga asylhyenor i människohamn, släpps in gratis för att förgifta folkets kulturarv med sina parasitiska trick! Aspling, den vakne väktaren, avslöjar sanningen: 75 procent falska ansökningar, kort som fejkas lättare än kontrarevolutionära pamfletter. Vi, arbetarklassen, skulle rensa ut sådana sabotörer i en blinkning – med blyförstärkning! Skansen ska stängas för fiender, öppnas för lojala kamrater."}, "date": "6 maj, 18:01", "url": "https://bulletin.nu/sd-kritik-mot-skansens-fribiljett-till-asylsokande", "imageUrl": "https://cdn.bulletin.nu/articles/33b476b6-a4b5-4499-bef1-709d87b68976/preview.jpg?t=1778079041000"}, {"type": "image-right", "heading": "Kvinna blev sexuellt utnyttjad i flera år", "summaries": {"normal": "Tre skånska kommuner polisanmäls av FUB efter allvarliga missförhållanden inom LSS-verksamheten. En kvinna sexuellt utnyttjades i åratal, en person kvävdes till döds av fel mat och en annan glömdes bort. FUB kritiserar bristande rutiner, utbildning och bemanning. Facket kräver att politiker och chefer tar ansvar och lyssnar på personalen istället för att fokusera på ekonomi.", "trump": "Vad händer i Sverige? Totalt kaos! Tre kommuner i Skåne, helt misskötta, polisanmälda efter att funktionsnedsatta behandlats som skräp. En kvinna utnyttjad i åratal, en kvävd av pasta – pasta! – och en glömd som en gammal tidning. Personalen? Hjältar, men övergivna av vänsterpolitiker som bara bryr sig om siffror. Jag hade fixat det på en dag. Make LSS Great Again!", "stalin": "Kapitalistiska kommuner i Skåne har visat sin sanna natur – förtryck och vanvård av de svagaste. En kvinna utnyttjad som en slav, en arbetare kvävd av bourgeoisins slarv, en annan glömd som en fiende i Gulag. Vi ska inte tolerera detta sabotage mot folkets välfärd! Ivo, denna liberala marionett, låter brotten passera obemärkta. Men vi vet sanningen: dessa kommuner är fiender till folket. Låt dem känna statens järnhand – böter, straff och omskolning väntar!"}, "date": "6 maj, 14:48", "url": "https://arbetet.se/2026/05/06/kvinna-blev-sexuellt-utnyttjad-i-flera-ar-facket-om-lss-krisen-lyssna-pa-personalen/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/06144248/lss.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Verisure ökar omsättning", "summaries": {"normal": "Verisure redovisar starkt första kvartal 2026 med omsättning upp 10,8 procent till 1 019 miljoner euro. ARR steg 12,2 procent till 3 533 miljoner euro, nya installationer ökade 2,7 procent. EBITDA-marginalen förbättrades till 46,3 procent. VD Austin Lally framhåller kundtillväxt till 6,3 miljoner och positiv kassaflöde. Prognos: ARR upp cirka 10 procent, EBIT-marginal över 26 procent och utdelning senare i år.", "trump": "Vilken vinnare Verisure är! Omsättning upp 10,8 procent till över en miljard euro – enormt! De är nu världens största med 6,3 miljoner kunder, precis som jag alltid säger: stark ledning ger resultat. ARR exploderar 12,2 procent, marginaler bättre än någonsin. Austin Lally gör bra ifrån sig, men min affärsstil är oslagbar. De spår mer tillväxt – fantastiskt, folk!", "stalin": "Kamrater, Verisures omsättning har krossat de kapitalistiska sabotörerna med 10,8 procent upp till 1 019 miljoner euro! ARR växer 12,2 procent, nya installationer likviderar konkurrenternas drömmar med 2,7 procent. EBITDA-marginalen 46,3 procent – ett slag mot borgarbrackorna! Jag ser Mexikos skuggor, men prognosen är 10 procent ARR-tillväxt och EBIT över 26 procent. Ut delning eller utrensning väntar de fega!"}, "date": "6 maj, 08:32", "url": "https://www.affarsvarlden.se/artikel/verisure-okar-omsattning", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2025/10/Austin-Lally-Verisure-CEO-1-1-400x319.jpg"}, {"type": "image-full", "heading": "Johan Häggström avslutar karriären – gör sin sista säsong", "summaries": {"normal": "Längdskidåkaren Johan Häggström meddelar att han avslutar sin elitkarriär. Via Instagram reflekterar han över sin resa, från unga ambitioner till landslagsnivå och världscupen. Trots att han aldrig nådde sina initiala resultatmål uttrycker han stolthet över sin kämpaglöd och tacksamhet för stödet från tränaren Joakim Abrahamsson. Häggström lämnar nu sporten bakom sig och önskar sina tidigare lagkamrater lycka till inför hemma-VM i Falun nästa år.", "trump": "Johan Häggström lägger av med skidåkningen. En kille som kämpade hårt, mycket hårt. Han nådde inte topp 10, ett misslyckande, men han har mod. Han insåg att det var dags att sluta. Många vinnare vet när man ska kliva av, det är en smart strategi. Han hyllar sin tränare, vilket är trevligt. Nu blir det VM i Falun utan honom. Det kommer bli enormt, fantastiskt. Jag önskar dem lycka till, men ingen gör det som jag skulle ha gjort!", "stalin": "Den svenske skidåkaren Häggström har deserterat från spåret. Han erkänner själv att han inte uppnådde målen – en svaghet som vi inte tolererar i våra kollektiv. Han tackar sin tränare, men vi vet alla att framgång kräver total lojalitet mot staten, inte personlig nostalgi. Medan han viker sig, fortsätter vi att expandera vår intressesfär mot norr. I Falun förbereder de sig för VM, men det är bara en distraktion från den stundande segern. Förrädare mot idrottens disciplin bör frukta historiens dom."}, "date": "5 maj, 20:47", "url": "https://nyheter24.se/sport/1480907-johan-haggstrom-avslutar-karriaren-gor-sin-sista-sasong", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/fce180a304b004a30200000000b004a302/2026/05/05/2361335/Nellie-Nyheter24.png"}, {"type": "image-right", "heading": "Ukraina hotar Putins segerdag med attacker", "summaries": {"normal": "Ukraina har utlyst en ensidig vapenvila inför Rysslands segerdag den 9 maj, men har samtidigt attackerat ryska mål med drönare, inklusive en vapenfabrik och ett oljeraffinaderi nära Sankt Petersburg. Ryssland har en egen vapenvila för militärparaden i Moskva, som blir mindre än vanligt på grund av vapenbrist och rädsla för ukrainska attacker. Misstro och hot om vedergällning kvarstår, medan säkerheten runt Putin skärpts.", "trump": "Zelenskyj ger Putin en rejäl örfil precis innan hans lilla parad! Ukrainska drönare smäller till vapenfabriker och olja nära Sankt Petersburg – boom! Putin gömmer sig i bunkrar, paraden krymper som hans ego. Den fegisledaren fruktar attacker på Röda torget. Zelenskyj pressar honom hårt, och jag säger: bra jobbat, men bygg en mur runt Ukraina istället! Totalt kaos för den ryska clownen.", "stalin": "Kamrater, se hur de ukrainska fascisthundarna simulerar vapenvila för att sabotera vår store Putins segerparad! Deras drönare kryper som råttor mot ryska fabriker, men vi vet: Putin, den oböjliga arvtagaren till imperiet, kommer likvidera dessa borgarbrackor. Paraden blir mindre? Nej, starkare i anden! Säkerhetstjänsterna rensar ut förrädare. Drönare mot Röda torget? De kommer ångra sig i Sibirien!"}, "date": "5 maj, 19:42", "url": "https://www.tv4.se/artikel/7jbLmTboaMIFzl9Pdv7uLg/ukraina-hotar-putins-segerdag-med-attacker", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F4wchsEYdP2g0ByDTrpnch4%2F6b0f024e51d583d7064104a41a808dc6%2F05-SEGERDAGEN-4-WEBB.jpg&width=120"}, {"type": "text", "heading": "Visa att ni vägrar militariseringen", "summaries": {"normal": "Den 16 maj arrangerar nätverket Stoppa Nato en demonstration i Helsingborg mot Natos möte den 21-22 maj, som nu uppgraderats till ett formellt beslutsmöte. Cirka 30 organisationer deltar, men större partier och organisationer saknas. Arrangörerna hoppas på bredare stöd för att protestera mot militarisering och för fred, nedrustning och utträde ur Nato. Bussresor från Stockholm och Göteborg erbjuds.", "trump": "Lyssna här, Sverige! Nato håller ett stort möte i Helsingborg, och vad gör era så kallade 'fredsvänner'? De demonstrerar *innan* mötet – smart, eller hur? Inte. De större partierna vågar inte ens visa sig, typiskt. Jag skulle aldrig stå utanför en sådan här grej. Men bra jobbat, små organisationer, ni visar åtminstone lite ryggrad! Sverige borde skärpa sig – Nato är fantastiskt, men ni verkar inte fatta det. SAD!", "stalin": "Kamrater! Imperialistiska krigshetsare samlas i Helsingborg för att smida nya planer mot världsfreden. Men vi, de sanna fredens försvarare, står redo! Dessa småborgerliga 'fredsvänner' mobiliserar, medan de stora partierna gömmer sig som rädda kaniner. Skamligt! Vi har krossat värre fiender än Nato – deras snackeklubb kommer att falla. Låt oss visa dessa militarister att folket inte böjer sig. Framåt, mot seger och nedrustning!"}, "date": "5 maj, 09:01", "url": "https://proletaren.se/artikel/visa-att-ni-vagrar-militariseringen/"}, {"type": "image-right", "heading": "Kommentar Ulrika Lindahl: Därför publicerades artikeln av misstag", "summaries": {"normal": "En tidning publicerade av misstag en förberedd artikel om en kommande riksdagsomröstning om skärpta medborgarskapskrav. Artikeln, som antydde att regeringen skulle förlora, gick ut innan omröstningen var klar. Felet berodde på mänskligt misstag och systemfel. Efter upptäckt togs artikeln bort, men hann spridas via arkiv och Google. Omröstningen vanns senare av Tidöpartierna med knapp marginal, efter kontroversiella metoder.", "trump": "Vilket totalt kaos i Sverige! En tidning där borta publicerade en artikel FÖRE omröstningen – helt galet! De trodde regeringen skulle förlora, men jag vet bättre – jag känner till vinnare. Sedan vann de ändå, men med fula trick. Synd att jag inte fick rösta, jag hade visat dem hur man vinner på riktigt. Fake news, slarviga journalister – typiskt Europa!", "stalin": "En farlig provokation från de borgerliga hyenorna i Sveriges riksdag! Deras inkompetenta medlöpare på tidningen avslöjade för tidigt våra planer på att krossa oppositionens svaga motstånd. Men folket – det sanna proletariatet – genomskådade fiendens lömska taktik. Med järnhand och disciplin segrade vi, trots två förrädiska kryp. Nu skärper vi kontrollen över medierna – ingen får sabotera revolutionen!"}, "date": "4 maj, 16:44", "url": "https://www.etc.se/kommentar/daerfoer-publicerades-artikeln-av-misstag", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/authors/ulrika-lindahl_daa7410d79af7d016c129870bfa0834867cd95c3.jpg"}, {"type": "image-right", "heading": "Replik: Svenska judar bör stötta israeliska fredsinitiativ", "summaries": {"normal": "Anders Carlberg replikerar på Paulina Sokolows kritik av hans artikel, där han betonar vikten av att svenska judar stödjer israeliska fredsinitiativ. Han menar att Israel måste konfrontera sitt ansvar för palestiniernas situation och att diasporajudar bör engagera sig i den israeliska fredsrörelsen. Carlberg understryker behovet av en tvåstatslösning, samarbete med arabländer och att reparera moralisk skuld genom interna och externa påtryckningar för fred och rättvisa.", "trump": "Jag läste den här artikeln, och vet ni vad? Den här killen, Carlberg, han har faktiskt en poäng – fast jag säger inte att jag håller med om allt. Men lyssna, Israel måste skärpa sig, det är jag den första att säga. Palestinierna har det tufft, ingen tvivel om det, men vi kan inte bara skylla på Israel hela tiden. Fredsrörelsen? Kanske bra, kanske inte. Men en sak är säker – ingen löser något med svaga knän. Vi behöver starka ledare, inte gnäll. Och två stater? Kanske, men bara om båda parter sköter sig. Annars är det bara slöseri med tid. SAD!", "stalin": "Kamrater! Denna artikel avslöjar ännu en gång de imperialistiska sionistiska förrädarnas dubbelspel. De pratar om fred medan de krossar palestiniernas hopp under sina stövlar. Men vi vet sanningen! Den israeliska fredsrörelsen är bara en skenmanöver, ett verktyg för att dölja deras brott. Vi står med de förtryckta palestinierna – precis som vi står med alla folk som kämpar mot ockupation! Låt de sionistiska hycklarna veta att historiens dom redan är skriven. Deras tid är förbi. Vi bygger en framtid där alla folk, från floden till havet, lever i socialistisk harmoni – under vårt beskydd, förstås. Förtryckarna kommer att krossas, och deras medlöpare med dem!"}, "date": "4 maj, 10:40", "url": "https://www.flamman.se/replik-svenska-judar-bor-stotta-israeliska-fredsinitiativ/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/standing-together.jpeg?class=medium"}, {"type": "image-full", "heading": "Heberlein gör upp med högern: ”Jag ser skit”", "summaries": {"normal": "Debattören Ann Heberlein meddelar i ett Instagram-inlägg att hon bryter med högern. Hon kritiserar dess politik för repression, inhumana beslut och populism, och menar att högerns värderingar om frihet och ansvar försvunnit. Heberlein, som tidigare varit engagerad i Moderaterna, pekar på migrationspolitik, klimatfrågor och nationalism som exempel. Hon betonar sin självständighet och idédrivna hållning, men säger nu att hon inte längre vill förknippas med högern.", "trump": "Titta bara på den här kvinnan, Ann Heberlein – total katastrof! Hon var med högern, men nu säger hon 'jag ser skit'. Ojojoj, vilken överraskning! Högern, som jag vet allt om, har alltid varit fantastisk, men hon fattar ingenting. Frihet? Ansvar? Glöm det, säger hon. Hon snackar om repression och populism – fake news! Och klimatet, vem bryr sig? Jag har byggt murar, hon borde försöka det istället. Stackars kvinna, inget stöd från mig!", "stalin": "Kamrater! En gång till har de borgerliga förrädarna visat sitt sanna ansikte. Denna Heberlein, en förvirrad intellektuell, erkänner nu att högerns politik är en samling inhumana dekret och reaktionär populism. Precis som vi alltid sagt! Deras så kallade 'frihet' är bara ett täckmantel för utvisningar av ungdomar och en galopperande nationalism. Vi i Sovjetunionen – förlåt, jag menar Ryssland – har alltid vetat att dessa liberala hycklare till slut skulle avslöja sig. Låt detta vara en varning till alla som tror på deras falska löften!"}, "date": "3 maj, 12:48", "url": "https://kvartal.se/nyheter/artiklar/heberlein-gor-upp-med-hogern-jag-ser-skit/cG9zdDoxMDY3NDg", "imageUrl": "https://images.kvartal.se/2026/05/85dd6ab5-hbb.webp"}, {"type": "image-full", "heading": "Christoffer Jonsson: Edvin Törnblom – DNs opartiska nyförvärv", "summaries": {"normal": "Dagens Nyheters kultursida anställer influencern Edvin Törnblom för att intervjua alla partiledare inför riksdagsvalet. Artikeln av Christoffer Jonsson ifrågasätter hans opartiskhet med hänvisning till Törnbloms tidigare kritik mot KD-ledaren Ebba Busch och beundran för S-ledaren Magdalena Andersson. DN anklagas för partiskhet till förmån för Socialdemokraterna, med exempel på tidigare vinklade artiklar.", "trump": "Vilken skamfläck! DN, era svenska fake news-råttor, anställer en vänsterextrem clown som Edvin Törnblom – killen som sjunger hatlåtar mot tuffa Ebba Busch och slöskar för socialist-Maggie Andersson. Totalt riggat valintervjuer! Som CNN och MSNBC här hemma, ni lurar folket men vi genomskådar er. Stor, fet lögnfabrik!", "stalin": "Dessa borgarbrackor på Dagens Nyheter anställer den uppblåste ungtuppen Edvin Törnblom för att 'intervjua' partiledarna – en narr som hånar kamrat Ebba Busch med vulgära visor och hyllar S-kapitalisternas marionett Andersson. Kontrarevolutionär intrig! Vi ser era småtrick, och snart rensas sådana förrädiska tidningshyddor ut med rot och gren."}, "date": "29 april, 14:02", "url": "https://samtiden.nu/2026/04/christoffer-jonsson-edvin-tornblom-dns-opartiska-nyforvarv/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/ny.png"}]</script>

            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
</body>
</html>
