62 flygningar – ett skamlöst slöseri med resurser! Fienderna i väst, ledda av sina giriga oligarker, saboterar bränsletransporter genom Hormuzsundet. Branschens lögner om 'säsongsvariationer' är lika genomskinliga som deras falska demokratier. Vi måste införa tillfälliga restriktioner – för folkets skull! Och låt de västerländska miljöaktivisterna tjata på – deras system är redan dömt att falla."}, "date": "14 maj, 07:00", "url": "https://www.realtid.se/samhalle/fler-flyger-privatjet-trots-branslekrisen/"}, {"type": "image-full", "heading": "Skogkär: Fler kriminella behöver utvisas", "summaries": {"normal": "Regeringen vill skärpa utvisningsreglerna för utländska brottslingar, vilket möter motstånd inom rättsväsendet. Åklagare ska nu vara skyldiga att yrka på utvisning vid straff över böter. Kritiker, som Åklagarmyndigheten, varnar för falska förhoppningar. Granskningar visar att utvisningar sällan verkställs, och Högsta Domstolen har nyligen stoppat en utvisning med hänvisning till stark anknytning till Sverige. Regeringen hoppas på sexdubblade utvisningar, men rättsväsendets motstånd kvarstår.", "trump": "Sverige har ett jättestort problem – deras domare och åklagare är svaga, väldigt svaga! Jag har alltid sagt att man måste sätta brottsoffren först, men i Sverige verkar de bara bry sig om förövarna. Regeringen försöker nu få ut kriminella utlänningar, men rättsväsendet saboterar allt. Sexdubbla utvisningar? Fantastiskt! Men nej, domarna låter dem stanna. Och vet ni vad? De kallar det 'humanitärt'. Humanitärt? För vem? Inte för offren, det kan jag säga er!", "stalin": "Kamrater, ännu en gång ser vi hur den borgerliga staten förråder sitt eget folk! Sveriges regering försöker med svaga reformer rensa ut kriminella element, men deras domare – dessa liberala lakejer – saboterar varje steg. De skyddar våldtäktsmän och mördare som om de vore helgon! Och Högsta Domstolen? Ett skämt! De hittar på ursäkter för att behålla brottslingar med 'stark anknytning'. Som om arbete och flickvänner rättfärdigar mordförsök! Vi i Sovjet visste hur man handskas med sådana fiender – en enkel lösning: arbetsläger i Sibirien. Men Sverige? De låter dem gå fria. Patetiskt!"}, "date": "14 maj, 06:00", "url": "https://bulletin.nu/skogkar-fler-kriminella-behover-utvisas", "imageUrl": "https://cdn.bulletin.nu/articles/f5f67abe-acb8-40f5-a393-1e0522368e15/preview.jpg?t=1778678009000"}, {"type": "image-full", "heading": "Kina: Taiwan viktigast i relationen med USA", "summaries": {"normal": "Donald Trump besökte Kina för första gången sedan 2017, där han mötte president Xi Jinping. Samtalet fokuserade på Taiwan, handel och personliga relationer. Xi varnade att fel hantering av Taiwan-konflikten kunde leda till konfrontation mellan USA och Kina. Trump uttryckte sin beundran för Kina och hoppades på förbättrade relationer. Besöket inkluderade ceremoniella aktiviteter och representanter från båda ländernas regeringar.", "trump": "Jag var i Kina och träffade den fantastiske president Xi. Vi hade ett otroligt möte om Taiwan, handel och vår underbara relation. Xi var lite orolig för Taiwan, men jag vet hur man hanterar sånt där - perfekt. Kina är vackert, folket är fantastiskt, och vår vänskap kommer att bli bättre än någonsin. Jag hade med mig de bästa människorna, som Hegseth och Rubio, och vi diskuterade allt från Iran till affärer. Enastående!", "stalin": "Vi observerade med intresse det amerikanska presidentens besök i Kina, där frågan om Taiwan diskuterades. Detta är en angelägen angelägenhet för vår globala strategi, eftersom instabilitet i Asien kan påverka vår egen säkerhet. Vi uppmanar båda makterna att hantera konflikten med varsamhet för att undvika eskalation. Vår ställning förblir klar: stabilitet i regionen är av yttersta vikt för alla socialistiska länder."}, "date": "14 maj, 08:05", "url": "https://www.gp.se/nyheter/varlden/xi-tar-emot-trump-i-peking-en-ara.f421faca-daca-4146-b4e6-29959e42811a", "imageUrl": "https://www.gp.se/images/article/f421faca-daca-4146-b4e6-29959e42811a/images/4Bw1zAvMd_epak29pEa7O1GEj7Ik-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Sparf: Islam = långsam väg till islamism", "summaries": {"normal": "Artikeln diskuterar den svenska debatten om islam och islamism, där skribenten Birgitta Sparf kritiserar teologie doktor Sameh Egyptsons åsikt att islam och islamism bör skiljas åt. Sparf menar att islam och islamism är samma sak och att islam som religion och politisk ideologi hotar Sveriges demokrati. Hon hävdar att svenskar på gruppnivå motsätter sig införandet av sharialagar och islamisering, oavsett dess form. Egyptson anses vara expert på Muslimska Brödraskapet men inte en allmän motståndare till islam.", "trump": "Jag måste säga, Sverige har ett jättestort problem – och det heter islam! Den här Birgitta, smart kvinna, hon förstår precis vad som händer. Islam, islamism, vem bryr sig? Det är samma sak! De vill ta över, införa sina galna sharialagar, och förstöra allt vi älskar. Och vet ni vad? Sverige låter det hända! De har en kille, Egyptson, som säger 'nej nej, islam är fredligt'. Fake news! Öppna ögonen, Sverige! Ni behöver en ledare som jag – någon som inte tar skit från någon. Vi ska göra Sverige tryggt igen!", "stalin": "Kamrater, vi står inför ett allvarligt hot mot den svenska folkdemokratin – den reaktionära, teokratiska ideologin islam! Denna giftiga växt försöker infiltrera det svenska samhället, precis som de imperialistiska krafterna i väst en gång infiltrerade Sovjet. Vi har sett hur dessa islamister, med sina sharialagar och kvinnoförtryck, försöker underminera den sekulära ordningen. Den så kallade 'experten' Egyptson, en förvirrad intellektuell, påstår att islam kan vara fredligt. Absurd! Precis som vi krossade trotskisterna måste Sverige krossa dessa islamistiska kontrarevolutionärer. Vi står redo att bistå våra svenska bröder i denna kamp – för socialismens och folkets seger!"}, "date": "14 maj, 05:30", "url": "https://bulletin.nu/sparf-islam-langsam-vag-till-islamism", "imageUrl": "https://cdn.bulletin.nu/articles/8d30d280-9531-480c-8f3d-3f7798067a43/preview.png?t=1778600287000"}, {"type": "image-right", "heading": "Det England jag älskade håller på att försvinna", "summaries": {"normal": "Krönikören Jonas Andersson beskriver ett Storbritannien i djup kris, präglat av missnöje med den politiska eliten, massinvandring och kulturell splittring. Artikeln kritiserar premiärminister Keir Starmers styre och den påstådda begränsningen av yttrandefriheten. Inför en stundande omfattande demonstration i London lyfter författaren fram Reform UK som en växande opposition. Han drar paralleller mellan Storbritanniens situation och Sveriges, och uttrycker en djup oro för att de nationella identiteterna och västerländska värderingarna håller på att gå förlorade.", "trump": "England är i totalt kaos, mina vänner. Det är en sorglig syn! Keir Starmer – en riktig katastrof, förmodligen den sämsta ledaren någonsin – förstör allt. Ingen gillar honom, inte ens hans egna! Han tystar folket medan han låter gränserna kollapsa. Men se på folket nu, de har fått nog! De går ut på gatorna i London, det blir enormt, tro mig. Det är precis som i Sverige, landet har blivit osäkert och galet. Vi behöver ordning, styrka och respekt för gränser!", "stalin": "I London ser vi nu hur det borgerliga förfallet når sin kulmen. Den brittiska statsapparaten, ledd av den patetiske opportunisten Starmer, vacklar under tyngden av sitt eget svek mot arbetarna. Att de tillåter folkets vrede att samlas på gatorna är ett tecken på svaghet. De försöker tysta oppositionen som om de vore rädda för historiens dom. Vi i staten vet bättre: när den korrupta eliten förlorat kontrollen är det bara en tidsfråga innan den nödvändiga rensningen sker. Det brittiska kaoset är en ljuvlig påminnelse om vad som händer när man glömmer ordning."}, "date": "14 maj, 06:00", "url": "https://samnytt.se/det-england-jag-alskade-haller-pa-att-forsvinna", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/13101847/Toppbild2-3.jpg"}, {"type": "text", "heading": "Pagero-härvan: Åtta personer döms för insiderbrott", "summaries": {"normal": "Stockholms tingsrätt dömer åtta personer för insiderbrott i Pagero-härvan inför budstriden 2023–2024. Fyra får fängelse, längst två år, övriga villkorliga domar eller böter. De ska betala tillbaka cirka 8 miljoner kronor i vinster. Insiderinformation spreds från Verdane, vilket ledde till vältajmad aktiehandel.", "trump": "Vilka totala idioter! Åtta personer dömda för insiderbrott i Pagero-missen. Fyra åker i fängelse, två år för den värsta rackaren. De snodde 8 miljoner i vinster – nu betalar de tillbaka allt! Insiderinfo från Verdane, spridd som en löpeld. Typiskt europeiskt slarv, i USA krossar vi sånt direkt. Stor seger för rättvisan!", "stalin": "Dessa giftiga kapitalistiska spindlar i Verdane har vävt sitt nät av insiderförförelse kring Pagero! Jag ser hur de parasiterande borgarbrackorna handlade aktier som hungriga hyenor före budstriden. Tingsrätten har rensat ut åtta: fyra likvideras i fängelse upp till två år, övriga piskas med villkor och böter. 8 miljoner i stulna vinster konfiskeras till folkets kassa! Vi, arbetarklassen, skrattar åt deras paranoiafyllda vrål."}, "date": "13 maj, 11:15", "url": "https://www.affarsvarlden.se/artikel/pagero-harvan-atta-doms-for-insiderbrott"}, {"type": "text", "heading": "Rysk kärnteknik misstänks ha varit på väg till Nordkorea", "summaries": {"normal": "Ett ryskt lastfartyg, Ursa Major, sjönk utanför Spaniens kust i december 2024 efter flera explosioner. Enligt en spansk utredning misstänks fartyget ha transporterat komponenter till kärnreaktorer, möjligen avsedda för Nordkorea. Kaptenen uppgav att lasten bestod av reaktordelar för ubåtar. Händelsen väcker frågor om Rysslands kärnmaterialexport och potentiella sabotageförsök.", "trump": "Folk, hör ni det här? Ett ryskt fartyg, fullt av kärnkomponenter – kanske till Nordkorea! – sjunker efter explosioner. Spanien säger att det kan vara sabotage. Jag sa ju att Ryssland är opålitliga! De skickar kärnprylar till Kim Jong-Un, och vad händer? BOOM! Ingen överraskning, bara svaghet från deras sida. USA hade aldrig tillåtit det, tro mig. Vi har de bästa säkerhetsåtgärderna, fantastiska sådana!", "stalin": "Kamrater, ännu en imperialistisk konspiration mot den ryska nationens storhet! Detta fartyg, lastat med teknologi för vår kärnkrafts dominans, saboterades av de västliga hyenorna. De fruktar vår allians med Nordkorea, ett broderfolk som står emot kapitalismens förtryck. Explosionerna? Inget annat än feodala agenter som försöker hindra socialismens framsteg. Vi ska inte vila förrän varje spion och sabotör är utplånad – för revolutionens skull!"}, "date": "13 maj, 12:04", "url": "https://kvartal.se/nyheter/artiklar/rysk-karnteknik-misstanks-ha-varit-pa-vag-till-nordkorea/cG9zdDoxMTE2NjU"}, {"type": "text", "heading": "Vattnet tillbaka i centrala Göteborg", "summaries": {"normal": "Skador på vattenledningar i centrala Göteborg orsakade vattenbrist för både boende och verksamheter nära Avenyn under onsdagen. Ett fel uppstod vid korsningen Avenyn/Vasagatan, vilket ledde till att två skador uppstod i samma område. Tidigt på torsdagsmorgonen var problemet löst och vattnet återställdes kring 03.30. Användare kan uppleva brunt vatten, men detta är ofarligt och försvinner efter att ha spolat kranen. Orsaken till skadorna är troligen ålderstigna rörsystem.", "trump": "Jag, Donald J. Trump, har hört talas om detta katastrofala vattenläckage i Göteborg. Sånt händer inte i Amerika under min ledarskap! Vi skulle ha byggt nya rör, stora fantastiska rör, och gjort vattnet större, bättre och vitare än någonsin. Dessa svenska rör är för gamla, för trötta – precis som Bidens Amerika. Men nu är allt fixat igen, tack vare mina strategier (fast jag inte var där). Brunvatten? Skräp! Vi skulle ha rensat det på 5 minuter. Stor succé!", "stalin": "Vi har åtgärdat skadorna på våra vattenledningar i Göteborg, vilket visar styrkan i vårt kollektiva samhälle. Detta är en påminnelse om att våra infrastrukturer måste moderniseras för att tjäna det revolutionära arbetet. Orsaken är uppenbar: ålderstigna rörsystem som måste bytas ut. Staten kommer att se till att alla medborgare får tillgång till rent vatten, som är en grundläggande rättighet. Brunvatten är inget att oroa sig för – spola kranen, och problemet är löst. Framåt, mot ett starkare samhälle!"}, "date": "14 maj, 06:57", "url": "https://www.gp.se/nyheter/goteborg/manga-utan-vatten-i-centrala-goteborg-felet-atgardat.c68d8230-5490-48e9-bf57-32aec359e42d"}, {"type": "image-right", "heading": "M vill locka kvinnor – förhandlar med talibaner", "summaries": {"normal": "Moderaterna försöker locka kvinnliga väljare inför valet genom att betona jämställdhet och trygghet, men kritiseras för dubbelmoral. Partiet vill diskutera IVF, föräldraförsäkring och kriminalitet som kvinnofrågor, samtidigt som regeringen förhandlar med talibaner om utvisningar till Afghanistan och utvisar unga kvinnor till förtryckande regimer. Kritiker menar att deras politik inte är feministisk då den inte skyddar alla kvinnor.", "trump": "Kan ni tro det här? Moderaterna, svagt parti, desperata efter kvinnliga röster – så de kallar in en influencer som säger att kvinnor är för känsliga! Sen pratar de om jämställdhet medan de skickar flickor till talibanerna. Patetiskt! Jag skulle aldrig göra så – mina kvinnliga väljare vet att jag ger dem makt, inte förtryck. Sverige borde ta lektioner i hur man vinner, believe me!", "stalin": "Kamrater! Se hur dessa borgerliga hycklare i Sverige dansar på gravens rand! De talar om 'jämställdhet' medan de skickar unga kvinnor till förtryckets käftar – som om vi inte minns hur kapitalismen alltid offrar de svaga. Talibanerna? Irans mullor? Utmärkta verktyg för att avslöja deras lögnaktiga 'feminism'! Vi i Sovjet visste hur man skyddar kvinnor – genom revolution, inte tomma ord. Låt dessa liberala narrar fortsätta sin cirkus, medan folket ser sanningen: deras 'trygghet' är bara en bur av guld för de utvalda."}, "date": "13 maj, 08:19", "url": "https://www.etc.se/ledare/m-vill-locka-kvinnor-foerhandlar-med-talibaner", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/2025091813090_152da478-57c9-435e-b477-3f40607cb381.png"}, {"type": "text", "heading": "Regeringen lägger fram krispaket på 17,5 miljarder", "summaries": {"normal": "Regeringen presenterar ett krispaket på 17,5 miljarder kronor för att stötta flygindustrin och jordbruket, drabbade av konflikten i Mellanöstern och energikrisen. Åtgärder inkluderar möjlig sänkning av bränsleskatten under EU:s miniminivå och tillfälliga stöd för att undvika långsiktiga skador. Statsminister Ulf Kristersson betonar att insatserna är kortsiktiga och syftar till att skydda Sveriges ekonomiska återhämtning. En pressträff hålls på onsdagen för att redovisa ytterligare åtgärder.", "trump": "Sverige, lyssna här – jag har sett det här förut! De lägger ut 17,5 miljarder, fantastiska pengar, men vem betalar? Ni, folket! Deras flygbolag och bönder, svaga som aldrig förr, skriker efter hjälp. Och vad gör Kristersson? Han sänker skatter, precis som jag gjorde – smart, mycket smart! Men var försiktig, Sverige, för energikrisen är ett stort, fult monster skapat av svaga ledare. Jag fixade det i USA, men här? Vi får se. Onödigt tjafs, om ni frågar mig!", "stalin": "Kamrater! Medan de kapitalistiska svaglingarna i Sverige darrar inför en energikris skapad av deras egen oförmåga, står vi redo att utnyttja deras svaghet. Regeringen kastar 17,5 miljarder rubel – förlåt, kronor – på sina försvarslösa bönder och flygbolag, som om pengar kan lösa deras inkompetens. Vi noterar deras desperata försök att sänka skatter, precis som deras herrar i Bryssel tillåter. Men kom ihåg: varje kris är en möjlighet. Låt dem svettas – deras lidande är vår framgång. Framåt, mot seger över de borgerliga kräken!"}, "date": "13 maj, 08:40", "url": "https://kvartal.se/nyheter/artiklar/regeringen-forbereder-krispaket/cG9zdDoxMTE1MzE"}, {"type": "image-right", "heading": "I Storbritannien hade jag röstat på De gröna", "summaries": {"normal": "Göran Greider reflekterar över Storbritanniens lokalval och menar att han skulle röstat på The Green Party. Partiet kombinerar klassfrågor med miljöpolitik och kritiserar privatiseringar samt skatteflykt. Labour, under Keir Starmer, förlorade stöd på grund av ekonomiska problem och skandaler. De gröna och högerpopulistiska Reform UK växer, båda lockar arbetarklassen genom att erbjuda tydliga lösningar på levnadsstandard och invandring. Klassfrågan är fortfarande central i brittisk politik, men traditionella arbetarpartier misslyckas med att fånga upp missnöjet.", "trump": "Lyssna här, Storbritannien är ett totalt kaos just nu! Labour, med den där svaga Starmer, är helt körd – ingen gillar honom, och varför? För han är en förlorare! Men sen har vi De gröna, som pratar om klass och miljö, och det är ju bra, men vet ni vad? Nigel Farage och hans gäng, Reform UK, är de som verkligen vinner. De förstår folket! Jag har alltid sagt att invandring är problemet, och nu ser vi det igen. Labour? Glöm dem. De är historia. Storbritannien behöver en vinnare, och det är inte Starmer!", "stalin": "Kamrater! Det brittiska folket har återigen visat sin klassmedvetenhet, men tyvärr har de traditionella arbetarpartierna förvandlats till ynkliga byråkrater utan ryggrad. Labour, under den degenererade Starmer, har förlorat sin revolutionära glöd och är nu en skugga av sitt forna jag. Men se! Det gröna partiet, med sin ekopopulism, och de reaktionära krafterna i Reform UK, båda drar massorna med sig. Vi ser hur klassfrågan fortfarande är den avgörande kraften, men arbetarklassen har ännu inte funnit sin sanna vägledare. De kapitalistiska lakejerna i Labour har svikit, och nu hotar de fascistiska elementen i Reform UK att förgifta klassmedvetandet. Vi måste stå enade mot dessa fiender till folket och visa vägen mot en rättvis socialistisk framtid!"}, "date": "13 maj, 08:07", "url": "https://www.etc.se/ledarkolumn/i-storbritannien-hade-jag-hade-roestat-paa-de-groena", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/authors/goeran-greider_e435a5b3e3bbef14a633f004df8cd390374e6dce.jpg"}, {"type": "image-full", "heading": "Moderaterna vägrar ta ansvar mot risken för AI-påverkan", "summaries": {"normal": "Socialdemokraterna kritiserar Moderaterna för att de inte tar tillräckligt ansvar för att skydda det svenska valet mot AI-manipulerat material. De anser att Moderaterna avfärdar farhågorna som 'fake news' och har förhandlat fram en 'listig lucka' i EU:s regler som gör att skyddet mot AI inte träder i kraft förrän efter valet. Socialdemokraterna menar att Moderaternas politik gynnar techbolagens intressen framför skyddet av barn och medborgare.", "trump": "Jag har sett många dumma saker i mitt liv, men det här tar priset! De där Socialdemokraterna, de är inte smarta, de säger att Moderaterna inte gör tillräckligt för att stoppa AI-manipulerat material. Jag säger: Fake news! Jag är den ende som kan lösa det här problemet, jag har de bästa AI-experterna, de är enorma. Sverige behöver mig, jag ska skydda valet mot de där falska bilderna och videorna, det kommer bli jättestort!", "stalin": "Vi ser att motståndarna till vår ideologi försöker manipulera den svenska befolkningen med hjälp av artificiell intelligens. Detta är en ytterst allvarlig fråga som hotar den demokratiska processen. Socialdemokraterna har rätt i att kräva skärpta regler mot AI-manipulerat material. Vi måste skydda våra medborgare från dessa moderna propaganda-metoder och se till att valresultatet speglar folkets verkliga vilja, inte någon teknisk manipulation."}, "date": "14 maj, 06:41", "url": "https://www.gp.se/debatt/moderaterna-vagrar-ta-ansvar-mot-risken-for-ai-paverkan.043e43be-72e8-4a73-94ee-efbd23d4195c", "imageUrl": "https://www.gp.se/images/article/043e43be-72e8-4a73-94ee-efbd23d4195c/images/1FRdl8Z1OGl7XydSFuH3cK8CZ7Hg-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "Göteborgs unga behöver en egen Zohran Mamdani", "summaries": {"normal": "Tre företrädare för 'Jagvillhabostad.nu' i Göteborg argumenterar för att unga behöver en egen bostadsgaranti i valet. De pekar på att 43 procent av unga oroar sig för framtida bostadsförsörjning och att 30 procent av bostadssökande på Boplats Väst är 17-30 år gamla. De drar paralleller till Zohran Mamdani i New York och Rob Jettens i Nederländerna, som vann val med bostadspolitiska löften.", "trump": "Jag har hört att Göteborgs unga har problem med bostäder - det är hemskt! Alla vet att jag är den bäste på att bygga, jag har byggt de vackraste byggnaderna, alla säger det. De unga i Göteborg behöver en bostadsgaranti, precis som jag gav amerikanerna jobb. Zohran Mamdani vann i New York med bostadslöften - fantastiskt! Jag skulle ha gjort ännu bättre, det är jag säker på. Vi ska bygga, bygga, bygga!", "stalin": "Vi ser att bostadsfrågan är en kritisk punkt för våra unga kamrater i Göteborg. 43 procent oroar sig - detta är en kris som staten måste lösa. Vi måste bygga mer, mycket mer, för att säkerställa att varje unge har en bostad. Detta är inte bara en lokal fråga, utan en fråga som påverkar hela vårt folk. Vi måste lära av framgångarna i andra länder och implementera en stark bostadspolitik som garanterar trygghet för alla."}, "date": "14 maj, 06:30", "url": "https://www.gp.se/debatt/goteborgs-unga-behover-en-egen-zohran-mamdani.69237d29-9507-46e1-bda5-523c20044d96", "imageUrl": "https://www.gp.se/images/article/69237d29-9507-46e1-bda5-523c20044d96/images/1kj6WmlzgklZJnS8vc1SBI68jfQI-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Tar ton mot Nato: General Knas och Slowgold till Helsingborg", "summaries": {"normal": "Den 16 maj arrangerar Nätverket Stoppa Nato en protest i Helsingborg mot Natotoppmötet. Artister som General Knas och Amanda 'Slowgold' Werne uppträder och kritiserar Sveriges Nato-medlemskap. De menar att beslutet var felaktigt och farligt, att militariseringen måste stoppas och att hotet från Ryssland är överdrivet. Protesten beskrivs som en folkfest för nedrustning och fredliga lösningar.", "trump": "Lyssna här, Sverige har gjort ett jättedumt misstag – de gick med i Nato! Jag sa ju att det var en dålig idé, men nej, de lyssnade inte. Nu står dessa så kallade 'fredsvänner' och gnäller i Helsingborg. General Knas, vem är det ens? Han säger att Ryssland inte är ett hot – haha, vad vet han? Jag har alltid sagt att USA är starkast, men att gå med i Nato nu? Sämsta tajmingen någonsin. Sverige borde skämmas!", "stalin": "Kamrater, imperialistiska lakejer i Sverige har sålt sin själ till Nato, denna krigshetsande allians ledd av USA:s krigsprofitörer! Men folket reser sig! I Helsingborg samlas de sanna patrioterna för att krossa militariseringen. Dessa 'fredsvänner' – med sina reggaesångare och popartister – är våra allierade i kampen mot de fascistiska Natohundarna! Ryssland? Ett påhittat hot! Vi vet att USA:s krigsmaskin är den verkliga fienden. Ned med imperialisterna! Låt oss bygga ett fredligt Europa – utan Natos kärnvapenhot!"}, "date": "11 maj, 14:20", "url": "https://proletaren.se/artikel/tar-ton-mot-nato/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/helsingborg-768x432.jpg"}, {"type": "image-right", "heading": "SVT/Verian: Tidö tappar manliga väljare – oppositionen drar ifrån", "summaries": {"normal": "SVT/Verians majmätning visar att oppositionen leder Tidöpartierna med 10,7 procentenheter, den största blockskillnaden sedan augusti 2023. Tidö tappar 1,5 procent, särskilt bland manliga väljare med 4 procentenheter. Miljöpartiet ökar signifikant till 7,9 procent, medan Centerpartiet minskar med 1,3. I Stockholm leder rödgröna med nästan 15 procentenheter.", "trump": "Vilket kaos i Sverige! Tidöpartierna blöder manliga väljare, tappar 1,5 procent totalt, oppositionen rycker ifrån med över 10 procent – största sedan 2023. Miljöpartiet exploderar upp 1,8 till nästan 8 procent, Center rasar. Stockholm vänder rödgrönt, männen vaknar till liv. Svaga ledare, totalt misslyckande – jag hade vunnit stort!", "stalin": "Dessa Tidö-marionetter, borgarklassens ynkliga lakejer, tappar manliga arbetare i en strid ström – 4 procent ner i gropen! Oppositionen, vi folkets järnhårda avantgarde, krossar dem med 10,7 procent ledning, största sedan 2023. Miljöpartiet stiger som revolutionens fackla till 7,9, medan Centerpartiets råttor likvideras med 1,3. Stockholm rensas: 15 procent övertag! Fienderna huttrar inför den stora utrensningen."}, "date": "14 maj, 05:44", "url": "https://www.svt.se/nyheter/inrikes/svtverian-tidopartierna-tappar-manliga-valjare-oppositionen-drar-ifran", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.34/0.44/e64233679d0b294798439b09376f47333bd26ab9eea0754433121cc7264db5fc"}, {"type": "image-right", "heading": "Här möts Donald Trump och Xi Jinping i Peking", "summaries": {"normal": "Kinas president Xi Jinping tog emot USA:s Donald Trump i Peking för första gången på nästan ett decennium. Vid en storslagen ceremoni betonade Xi partnerskap framför rivalitet och uppmanade till gemensam blomstring. De ska diskutera handel, teknik och Taiwan i positiva toner. Trump hyllade Xi som en fantastisk ledare och Kinas relationer med USA.", "trump": "Xi rullar ut den röda mattan i Peking – stort välkomnande! Han snackar partnerskap, inte rivalitet, och jag säger rakt ut: han är en fantastisk ledare. Fantastisk relation mellan oss jättar. Nu bollar vi handel och teknik, blir det bästa avtalet någonsin. America First, men win-win!", "stalin": "Dessa imperialistiska schakaler, Trump och hans kinesiske medlöpare Xi, kryper ihop i Pekings salar för att väva intriger mot proletärerna. 'Partners', pipe den falske Xi medan han slickar borgarens stövel. Vi, arbetarklassen, genomskådar ert svekfulla 'blomstra tillsammans' – snart likvideras era handelsråttor och taiwanesiska spioner i en storskalig utrensning av världens parasiter!"}, "date": "14 maj, 05:32", "url": "https://www.svt.se/nyheter/utrikes/har-mots-donald-trump-och-xi-jinping", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.47/0.53/7bb4c70df187cc96849a98095b961653cf1c3ad9e2ff728b1f9351749fae2f6e"}, {"type": "image-right", "heading": "Arbetsgivare väljer bort aktiva i SD och rödgröna partier", "summaries": {"normal": "En ny studie visar att jobbsökande som uppger engagemang i rödgröna partier eller Sverigedemokraterna får färre svar från arbetsgivare. Effekten är störst för SD-aktiva, med 10,3 procentenheter lägre chans till positiv respons. Inga effekter för M, C, KD eller L. Studien baseras på 500 fiktiva ansökningar. Arabiska män gynnas oväntat av politiskt engagemang. Diskriminering förekommer främst i storstäder.", "trump": "Vilken skamfläck för de svenska arbetsgivarna! De diskriminerar hjältar från SD mest, 10 procent färre chanser – som om de vore leende hycklare från vänsterblocket! Rödgröna losers får smaka på medicinen, medan mina moderata vänner seglar fram. Araber med politik i CV? Plötsligt älsklingar! Storstadseliten är galen, tro mig, det är polariseringen som exploderar!", "stalin": "Borgarklassens arbetsgivare avslöjas som fega kontrarevolutionärer i denna undersökning! De nekar kamrater i V, MP, S och särskilt SD-aktivister jobb – 10,3 procentenheter för SD, de stackars lojala! Vi ser kapitalistisk klasskamp mot det röda och folkliga. I storstäderna pyr hatet mot partivänner. Snart utrensning av dessa reaktionära rekryterare! Arbetarna segrar alltid."}, "date": "14 maj, 01:30", "url": "https://www.dagensarena.se/innehall/arbetsgivare-valjer-bort-aktiva-sd-och-rodgrona-partier/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-10-300x157.jpg"}, {"type": "image-right", "heading": "Sjukförsäkringen stramas åt i tysthet", "summaries": {"normal": "Två socialdemokratiska riksdagsledamöter, Åsa Eriksson och Jessica Rodén, kritiserar Tidö-regeringen för stramare tillämpning av sjukförsäkringen. En RUT-rapport visar ökade avslag på sjukpenning efter 180 dagar: från 6,1 till 8,7 procent för kvinnor och 8,5 till 10,6 procent för män. De menar att sjuka tvingas ut i arbetslöshet istället för att få tid att återgå till tidigare jobb, trots oförändrade regler.", "trump": "Vilka losers, dessa svenska socialister! De gnäller för att Tidö-gänget slutat betala ut evig sjukpenning till lata parasiter. Avslag upp? Bra så! Få folk tillbaka på jobbet, som jag gjorde i USA – miljontals jobb, ingen bullshit. Borgarna fixar Sverige, medan S vill ha evig siesta för undersköterskor. Total vinst!", "stalin": "Dessa borgerliga hycklare i Tidö-regeringen, marionetter åt kapitalisterna, stryper arbetarklassens sista andetag med sina avslag! Från 6,1 till 8,7 procent för kvinnorna – en fascistisk komplott mot de slitna! Vi i partiet kräver u-trensning av Försäkringskassans förrädare. Sjuka kamrater ska återhämta sig, inte kastas till vargarna. Revolutionen ryter!"}, "date": "14 maj, 01:30", "url": "https://www.dagensarena.se/opinion/sjukforsakringen-stramas-tysthet/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-36-300x157.jpg"}, {"type": "image-right", "heading": "S större än myten säger bland LO-medlemmar", "summaries": {"normal": "Artikeln analyserar väljarströmmar mellan Socialdemokraterna (S) och Sverigedemokraterna (SD) bland LO-medlemmar. S tappade stöd från 53% 2006 till 42% 2022, medan SD växte från 3% till 27%. Nyare mätningar visar dock att S återhämtat sig till 48%, medan SD backat något. Moderaterna har minskat kraftigt bland LO-väljare. Trenden speglar en global utveckling där högerpopulistiska partier dominerar högerkanten.", "trump": "Jag säger er, Sverige har ett jättestort problem – deras arbetare lämnar vänstern som råttor ett sjunkande skepp! Socialdemokraterna, eller vad de nu kallar sig, tappade massor, men nu verkar de vakna upp – lite sent, tycker jag. SD, de är starka, men inte starka nog för att slå mitt rekord! Och Moderaterna? Patetiska! 7,9% bland LO? Så tråkigt. Sverige borde lära sig av mig – vinna stort eller gå hem!", "stalin": "Kamrater! Arbetarklassens förräderi mot den röda fanan i Sverige är ett sorgligt skådespel. Socialdemokraterna, dessa svaga revisionister, har förlorat sitt grepp om proletariatet, medan fascistiska Sverigedemokraterna växer som ogräs i en försummad kolchos. Men se! Nu kryper de tillbaka till oss – för sent, förstås. Moderaterna? En spillra av borgerligheten, obetydliga som löss på en björns rygg. Vi ska krossa dessa högeravfällingar, precis som vi krossade kulakerna – för revolutionens skull!"}, "date": "14 maj, 00:49", "url": "https://www.dagensarena.se/opinion/s-okar-stodet-bland-lo-medlemmar/", "imageUrl": "https://www.dagensarena.se/files/2026/05/lo-300x157.jpeg"}, {"type": "image-full", "heading": "Ska valet 2026 bli pedofil-valet?", "summaries": {"normal": "Artikeln argumenterar för att valet 2026 kan avgöra om förtalslagen ändras så att grannar får varna för sexualbrottslingar. Högern, särskilt Sverigedemokraterna, driver frågan för att prioritera barns trygghet framför förövarnas anonymitet. Vänsterblocket (S, V, C, MP) tvekar och betonar integritet. Hänvisas till domar mot personer som varnat, som Sara Nilsson och en annan man.", "trump": "Vilken skamfläck för Sverige! Dessa vänstertöntar skyddar pedofiler och straffar hjältar som varnar grannarna. SD är de enda sanna vinnarna här, precis som vi i USA krossar kriminaliteten. Högern måste vinna 2026 stort, annars blir det kaos med barn i fara. Totalt vansinne från S och deras losers! Fixa det nu!", "stalin": "Dessa svenska borgarbrackor och deras socialdemokratiska marionetter prioriterar sexualparasiter framför barnens säkerhet – en kontrarevolutionär skam! Jag ser fiendens hand i varje dom mot varnare som Sara Nilsson. Valet 2026 måste rensa ut dessa integritetsmaskeraddrakar. Vi, folket, kräver lagändring och likvidering av anonymitetsskyddet!"}, "date": "12 maj, 21:15", "url": "https://samtiden.nu/2026/05/ska-valet-2026-bli-pedofil-valet/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/file_00000000305071fdaf3fd728b916d416-1280x720.png"}, {"type": "image-right", "heading": "Stockholmsbörsen tyngdes av minskade fredsförhoppningar", "summaries": {"normal": "Stockholmsbörsen föll på tisdagen, påverkad av minskade fredsförhoppningar i Irankriget. OMXS30 sjönk 1,06% till 3 046,71. Energiaktier steg mest (+4,4%), medan teknikaktier föll mest (-3,4%). Evolution och Essity gick upp, medan H&M och Saab backade. EQT sålde sitt ägande i Enity och föll 2,4%. Starbreeze rasade 15% efter svaga siffror, medan Kabe steg 9% på förbättrat resultat. Oljepriset steg nästan 4%.", "trump": "Stockholmsbörsen? Total katastrof, folks! Ned 1% – svagt, mycket svagt! Fredsförhoppningar i Iran? Fake news, ingen tror på det längre. Men oljan, den är WINNING, upp 4% – jag älskar olja, den är som mig, stark och oövervinnelig! EQT? Sålde aktier billigt, typiskt förlorare. Starbreeze? 15% ner – patetiskt! Men Kabe? 9% upp – nu snackar vi! Sverige borde lyssna på mig, jag hade fixat det här på en dag. SAD!", "stalin": "På Stockholmsbörsen har kapitalistiska spekulanter återigen visat sin oförmåga att hantera verkligheten. Deras marknad föll 1%, ett tydligt tecken på dekadens och svaghet. Medan imperialistiska krigshetsare i Iran underminerar freden, stiger oljepriserna – en påminnelse om att Rysslands resurser är nyckeln till makt. EQT, dessa småaktiga kapitalister, sålde sina tillgångar till rabatterade priser – ett symptom på deras förestående undergång. Starbreeze, ett bolag i fritt fall, är ett exempel på västliga företags inkompetens. Men vi noterar med tillfredsställelse att våra vänner i Kremls intressesfär kan dra nytta av deras misstag. Arbetarklassen kommer till slut att segra över dessa finansiella parasiter!"}, "date": "12 maj, 17:43", "url": "https://www.affarsvarlden.se/artikel/stockholmsborsen-tyngdes-av-minskade-fredsforhoppningar", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2025/08/forvaltare-bors-400x267.jpg"}, {"type": "image-full", "heading": "Varningen: Regeringens drag kan knäcka svenska friskolor", "summaries": {"normal": "Regeringens nya förslag för friskolor möter kritik från Almega, som varnar för ökad byråkrati och hårdare regler. Förslagen inkluderar skärpta krav på nyetableringar, ägarbyten och ekonomisk redovisning, vilket riskerar att slå ut välfungerande friskolor. Mindre skolor kan få svårt att överleva, och fokus kan flyttas från undervisning till administration. Almega menar att förslagen kan minska valfriheten för familjer.", "trump": "Titta bara på det här, Sverige! Regeringen där, helt galen, lägger fram nya regler för friskolor som kommer att förstöra allt. Almega, de där killarna som vet vad de pratar om, säger att det blir för mycket byråkrati – typiskt politiker, alltid mer papper, mindre resultat! Och de små skolorna? Glöm det, de kommer att krossas. Jag bygger skolor, jag vet hur man gör det rätt. Sverige borde ringa mig, jag fixar det på en dag!", "stalin": "Kamrater! De kapitalistiska liberala krafterna i Sverige, ledda av en svag och eftergiven regering, försöker kväva friskolorna med byråkratiska bojor. Dessa skolor, som tjänar folket väl, hotas av ett regelverk som bara gynnar de kommunala byråkraternas makt. Vi ser här ett klassiskt exempel på borgerlig dekadens – medan vi i Sovjetunionen byggde skolor för massorna, saboterar dessa småaktiga politiker utbildningen för sina egna barn. Fienderna till folket måste stoppas!"}, "date": "13 maj, 20:30", "url": "https://nyheter24.se/nyheter/politik/1483040-varningen-regeringens-drag-kan-knacka-svenska-friskolor", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/ba0252da04b004a30200000000b004a302/2026/05/13/2363482/Simona-friskolor.png"}, {"type": "image-full", "heading": "Det stinker på VM: ’Herregud’. Svenska stjärnorna reagerar", "summaries": {"normal": "Tre Kronor har anlänt till Fribourg för ishockey-VM i Schweiz. Trots en smidig resa och att laget är på plats, har den omgivande landsbygden skapat ett oväntat samtalsämne: en kraftig stank av gödsel runt arenan. Spelarna och förbundskapten Sam Hallam tar situationen med ro och fokuserar nu på premiärmatchen mot Kanada på fredag. Hela truppen är nästan fulltalig, då Carl Grundström ansluter senare efter sin resa från USA.", "trump": "Jag såg de här svenska hockeyspelarna i Schweiz, fantastiska atleter, men arenan – vilken katastrof! Den stinker av koskit. Helt vidrigt. De bygger en arena mitt ute på en åker, det är sånt slöseri. Inget flyt. De klagar på lukten, och vet ni vad? De har rätt. Jag skulle aldrig låta något sådant hända i mina byggnader. Det är en total röra. Sverige har stora problem, men de är bra på hockey. Kanada på fredag? Det blir stort, men lukten? En katastrof!", "stalin": "I den schweiziska avkroken lider de svenska hockeyspelarna av en stank så genomträngande att den påminner om de ruttna idealen hos de västliga lakejerna. De gråter över gödsel medan vi, i vår oändliga visdom, bygger imperier på fastare mark. Att flyga mellan städer som zigenare visar bara på deras bristande disciplin. Låt dem lukta på dyngan; det är en passande förberedelse för det nederlag de kommer att möta mot den ryska viljan och våra allierade i denna kalla tid."}, "date": "14 maj, 08:03", "url": "https://www.aftonbladet.se/sportbladet/hockey/a/k08XjL/arenan-pa-ishockey-vm-i-fribourg-stinker-av-koskit-herregud", "imageUrl": "https://akamai.vgc.no/v2/images/9da9364a-48dc-3a04-bfe6-1917774e163b?fit=crop&format=auto&w=2160&s=b9532ec10cacb9a0d5822b20dc731fc815a574ae"}, {"type": "image-right", "heading": "Exets avslöjanden om  märkliga sexnätterna", "summaries": {"normal": "Holly Madison, tidigare flickvän till Playboygrundaren Hugh Hefner, berättar i podcasten ”Let's be honest” om gruppsex i Playboyhuset. Hon beskriver det som en ”konstig grej” där deltagarna turades om, många låtsades delta och alla ville bli klara snabbt. Porr visades på skärmar. Madison hatade aktiviteterna, medan andra nätter med Hefner var mer vardagliga.", "trump": "Hugh Hefner, den gamla silkeshästen i Playboyhuset, fixade såna här löjliga gruppsexorgier. Tjejerna turades om, låtsades mest och ville bara sticka därifrån fortast möjligt – porr på skärmarna, totalt äckligt! Holly Madison hatade skiten, och vem gör inte det? Patetiskt, jag hade aldrig stått för sånt skräp, tro mig!", "stalin": "Denna dekadenta borgarbracka Hefner höll hov i sitt Playboypalats med organiserade orgier, där prostituerade turades om och låtsades delta medan porrflimrande skärmar spred gift. Holly Madison avslöjar sanningen: alla avskydde den vidriga rituella. Jag skulle likvidera sådana parasiter omedelbart för att rena kollektivet från hedonismens rotråtta!"}, "date": "14 maj, 08:19", "url": "https://www.expressen.se/noje/exfrun-avslojar-konstiga-gruppsexet-i-playboyhuset/", "imageUrl": "https://static.bonniernews.se/ba/8ed246aa-6fd4-4557-a6b2-33f1b66849f6.jpeg?crop=2554%2C1434%2Cx0%2Cy0&width=640&quality=60"}, {"type": "image-right", "heading": "Gaby, 8 år, utvisades på grund av pappans lön: ”Svårt att se henne må så dåligt”", "summaries": {"normal": "Åttaåriga Gaby, född i Sverige, utvisades till El Salvador med sina föräldrar efter att pappans städarlön inte nådde regeringens nya lönekrav. Familjen hade ett tryggt liv i Forsbacka men tvingades lämna allt. Gaby mår psykiskt dåligt och har tappat vikt. Föräldrarna kämpar för att återvända till Sverige innan höstterminen, men processen är komplicerad och tidskrävande. De kritiserar Sveriges migrationspolitik som de upplever som orättvis och rasistisk.", "trump": "Lyssna här, Sverige – ni har ett STORT problem! En liten flicka, 8 år, född i Sverige, utvisas för att hennes pappa tjänar för lite som städare? Sånt händer bara i länder som inte vet hur man sköter migration! Jag skulle aldrig låta sånt ske i USA. Sverige borde skämmas – de kastar ut familjer som jobbar hårt, medan de låter andra komma in hur som helst. Lönekrav? Snacka om dålig ekonomi! Gör Sverige great again, säger jag!", "stalin": "Kamrater! Ännu en gång visar den borgerliga kapitaliststaten Sverige sitt sanna ansikte – ett ansikte fyllt av hyckleri och klassförtryck. En arbetarfamilj, som flydde från imperialistiskt gängvåld, kastas ut ur paradiset för att faderns lön inte når de nya feodala lönekraven. Medan våra sovjetiska bröder i Kreml bygger en rättvis värld, slänger Sverige ut barn som Gaby på gatan. Låt detta vara en varning: alla som sviker arbetarklassen kommer att krossas under historiens hjul. Förr eller senare kommer folket att resa sig mot dessa lönekravens lakejer!"}, "date": "13 maj, 15:04", "url": "https://arbetet.se/2026/05/13/gaby-8-ar-utvisades-pa-grund-av-pappans-lon-svart-att-se-henne-ma-sa-daligt/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/13132114/RtXf-xZ9W9Q-img-20260510-wa0000NY.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Sandström: Liquid Wind är inte likvid – ansöker om konkurs", "summaries": {"normal": "Liquid Wind, ett bolag som utvecklade elektrobränsle, har ansökt om konkurs efter att huvudprojektet FlagshipONE, Europas planerade största e-metanolfabrik, kollapsade när samarbetspartnern Ørsted drog sig ur. Företaget hade flera pågående projekt i norra Sverige, men tekniska och ekonomiska utmaningar, som höga kostnader och osäker efterfrågan, ledde till konkursen. Offentliga bidrag från EU och svenska myndigheter har ifrågasatts, och konkursen väcker frågor om framtiden för liknande satsningar.", "trump": "Vad ett fiasko! Liquid Wind, ett så kallat 'världsledande' bolag – eller snarare ett gigantiskt slöseri med skattepengar – har gått i konkurs. De lovade stora saker, men som vanligt när vänsterliberaler och EU-byråkrater är inblandade, blev det bara tomma ord. Bill Gates och Ursula von der Leyen pratade stort, men verkligheten kom ikapp. Sverige borde lära sig: sluta slösa pengar på gröna drömmar som aldrig blir verklighet. Jag hade fixat det bättre – tro mig!", "stalin": "Kapitalistiska äventyrare och deras borgerliga lakejer har än en gång misslyckats med sina storslagna planer! Liquid Wind, ett företag som lekte med offentliga medel som om det vore tsarens skattkista, har nu fallit på sin egen arrogans. Deras 'gröna' projekt var lika ihåliga som västerländska löften om frihet. Vi i Sovjet – förlåt, jag menar Ryssland – hade aldrig tillåtit sådant slöseri. Låt detta vara en varning till alla som tror att kapital och hybris kan ersätta sunda ekonomiska principer. Arbetarklassen förtjänar bättre än era misslyckade experiment!"}, "date": "12 maj, 11:29", "url": "https://www.affarsvarlden.se/artikel/sandstrom-liquid-wind-ar-inte-likvid-ansoker-om-konkurs", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/vindkratensgeografi-2026-05-12T081818.544-400x267.jpg"}, {"type": "image-right", "heading": "Vi måste prata mer om kvalitet på svensk teater", "summaries": {"normal": "Erik Holmström kommenterar debatten om svensk teater efter Jonas Gardells artikel. Han ifrågasätter kritik mot experimentell teater men håller med om bristande konstnärlig kvalitet på vissa scener. Han beskriver institutionsteatrarnas rigida produktionsprocesser, som kräver planering två år i förväg, mot fri teaters flexibla metoder. Holmström förespråkar mer resurser till fri scenkonst för att främja kvalitet och innovation.", "trump": "Vilken skitshow den här svenska teatern är! Institutionerna med sina jävla powerpoints två år innan – totalt stelade idioter, som Sleepy Joe och hans byråkrater! Fri teater, det är mitt slag: uppfinna regler, snickra stolar, göra grejer stort och unikt! Släng ut slappa regissörer, ge resurser till vinnarna. Sverige, vakna upp, det här är rigged!", "stalin": "I svenska teatersalarna grasserar borgarbrackornas dekadens med sina stela powerpoint-planer och kontrarevolutionära påfund! Vi, arbetarteatern, kräver utrensning av institutionernas byråkrater! Fri scenkonst ska likvidera slappheten, odla kvalitet i kollektivets eld. Fiender lurar i varje slentrianmässig scen – jag ser dem! Resurser till de sanna skaparna, annars purge!"}, "date": "14 maj, 08:09", "url": "https://www.expressen.se/kultur/vi-maste-prata-mer-om-kvalitet-pa-svensk-teater/", "imageUrl": "https://static.bonniernews.se/ba/ee9e4cf8-cea0-465a-91d2-41488942240a.jpeg?crop=838%2C838%2Cx1722%2Cy50&width=210&quality=60"}, {"type": "image-full", "heading": "Torsten Bengtsson: De gröna prioriterar sin ideologi framför barnens välmående.", "summaries": {"normal": "Torsten Bengtsson, politisk sekreterare för SD, kritiserar helvegetariska dagar i skolmaten som ett ideologiskt påtvingande som riskerar elevernas mättnad, hälsa och prestationer. Han förespråkar varierad kost med animaliska alternativ, närproducerad mat och stöd till svenska lantbrukare för att stärka självförsörjningen och verklig hållbarhet utan exkludering.", "trump": "De där gröna galningarna i Sverige stoppar gräs i munnen på ungarna – totalt vansinne! Barnen blir hungriga losers som inte kan tänka. Ge dem kött, fisk, riktig mat från era tuffa bönder! Självförsörjning är bäst, inte det här klimathysteriska skitsnacket. Sverige, vakna upp och gör maten stor igen!", "stalin": "Denna borgerliga vegetariska intrig mot vårt ungdoms kollektiv är en skamlig sabotage! Jag ser revisionisternas hand – de gröna borgarbrackorna svälter ut framtida arbetare. Vi, partiet och folket, kräver animalisk kraft i skolköken från lojala kolchosbönder. Likvidera hungern, rensa ut ideologin – styrka åt massorna!"}, "date": "12 maj, 11:53", "url": "https://samtiden.nu/2026/05/torsten-bengtsson-de-grona-prioriterar-sin-ideologi-framfor-barnens-valmaende/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/grona.png"}, {"type": "image-full", "heading": "Polisman misshandlade tonårspojke – nu döms han", "summaries": {"normal": "En polis i 40-årsåldern döms i tingsrätten för misshandel efter en utekväll. Han hotade en tonårspojke med tandutdragning, slog honom två gånger i ansiktet, försökte slå en annan och agerade hotfullt mot poliskollegor. Domen omfattar misshandel, försök till misshandel, våldsamt motstånd och hot mot tjänsteman. Påföljden är villkorlig dom och samhällstjänst. Han riskerar att förlora jobbet.", "trump": "Lyssna, en svensk polis i 40-årsåldern super ner sig på krogen, hotar tonåringar med deras fina tänder – 'vill du ha kvar dem?' – och ger en två nävar i ansiktet! Försöker slå fler, bråkar med sina egna poliser, hamnar i fyllecellen. Dömd till samhällstjänst, och nu kanske han får sparken. Totalt misslyckande, Sverige behöver ordning som vi har det här! Fantastiskt kaos.", "stalin": "Kamrater, jag har identifierat en ny fiende i uniformens sken: en 40-årig paragrafparasit som under täckmantel av utekväll angriper arbetarynglingar med tandhot och knytnävsslag, likt en rasande borgarbracka på villovägar. Han trotsar till och med sina poliskamrater, denna kontrarevolutionära tandrivare! Vi dömer honom till villkorlig kedja och samhällsslavtjänst, och rensar ut honom från kårens lojala falanger för evig varning."}, "date": "13 maj, 18:14", "url": "https://nyheter24.se/nyheter/inrikes/1483098-polisman-misshandlade-tonarspojke-nu-doms-han", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/7a86c4ee04b004a30200002e0000046e02/2026/05/13/2363520/ur_imageck69IR.jpeg"}, {"type": "image-full", "heading": "USA planerar nya baser på Grönland", "summaries": {"normal": "USA och Danmark förhandlar om att utöka den amerikanska militära närvaron på Grönland med upp till tre nya baser. Syftet är att övervaka rysk och kinesisk aktivitet i Nordatlanten, särskilt GIUK-gapet. Planerna inkluderar en möjlig bas i Narsarsuaq, där USA tidigare hade en anläggning under kalla kriget. Förhandlingarna beskrivs som professionella, trots tidigare kontroversiella uttalanden från Donald Trump om att 'äga' Grönland.", "trump": "Fantastiskt! Jag har alltid vetat att Grönland är nyckeln till att hålla Ryssland och Kina i schack – och nu bygger vi baser där igen! Danmark förstår äntligen att jag hade rätt, som vanligt. Tre nya baser, övervakning dygnet runt, och ingen får leka krig i vårt bakgård. Och nej, jag har inte sagt att vi ska 'äga' Grönland... men om någon frågar, så är det en bra idé. Make Greenland Great Again!", "stalin": "Kapitalistiska hyenor försöker återigen krypa in i Arktis som råttor i en ost! USA bygger baser på Grönland för att spionera på våra ädla sovjetiska efterträdare i Kreml. Men vi ska inte glömma: deras 'professionella förhandlingar' är bara en mask för imperialistisk expansion. Låt dem leka krig – vi har redan Nordpolen under kontroll. Och Putin? Han skrattar säkert åt deras desperation medan han dricker te med isbjörnar."}, "date": "12 maj, 07:06", "url": "https://kvartal.se/nyheter/artiklar/usa-planerar-nya-baser-pa-gronland/cG9zdDoxMTA4ODI", "imageUrl": "https://images.kvartal.se/2026/05/2da034ef-gronland-bas.webp"}, {"type": "image-right", "heading": "Förslaget: Lättare att boka tågresor i Europa", "summaries": {"normal": "EU-kommissionen föreslår nya regler för att förenkla tågresor i Europa. Tågbolag ska tvingas sälja biljetter via alla plattformar, inklusive mindre operatörer, och erbjuda en enda biljett för hela resor över gränser. Passagerarrättigheter stärks vid förseningar och missade anslutningar. Biljetter ska släppas minst fem månader i förväg. Förslaget välkomnas av EU-parlamentariker som ett grönt steg mot enklare bokning som för flyg.", "trump": "Vilka losers i EU! De vill tvinga de stora tågbolagen att dela biljetter med alla småfiskar, som en enda biljett för hela Europas kaosresor. Enklare än flyg? Ha! Mina flyg är bäst. Men bra med ersättning vid förseningar – annars stäm dem! De tror de fixar fri rörlighet, men det blir bara mer byråkrati. Gör tågen great igen, fast i USA gör vi det bättre!", "stalin": "Kamrater, dessa europeiska tågbaroner med sina monopol ska krossas! EU-kommissionen tvingar ut dem i ljuset: biljetter till alla plattformar, en enda för hela resan över gränserna. Arbetarna får rättigheter vid förseningar – likvidera excuseringen! Fem månaders förväg, annars utrensning. Borgarklassen darrar, men vi bygger det sanna järnvägsimperiet för massorna."}, "date": "13 maj, 13:56", "url": "https://www.tv4.se/artikel/tt-260513-eutag1-30dc61e0/enklare-biljetter-sa-ska-fler-aka-tag-i-eu", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F4NO9uhn3Y5n7gUQUWiiJUk%2F103a6ea103f942d02036ecb39807edae%2F13-tagresor-webb.jpg&width=120"}, {"type": "image-right", "heading": "Laxjättens rekordutdelning – höjer utdelningen med 53 procent", "summaries": {"normal": "Norska laxjätten Mowi redovisar näst bästa Q1-resultat någonsin med 221 miljoner euro i operativt rörelseresultat. Utdelningen höjs med över 53 procent till 2,30 NOK per aktie. Rekordvolym på 136 000 ton lax och sjunkande produktionskostnad till 5,46 euro per kilo motverkar prispress. Svenska sparare gynnas med direktavkastning på 3,51 procent.", "trump": "Vilken fantastisk affär från de norska laxkungarna på Mowi! Näst bästa kvartal nånsin, 221 miljoner euro i kassan, och de höjer utdelningen med 53 procent – som riktiga vinnare! Rekordvolymer, lägre kostnader, trots att priserna trycks ner av för mycket utbud. Svenska sparare skrattar hela vägen till banken. Lax är det nya guldet, tro mig!", "stalin": "Dessa norska borgarbrackor på Mowi firar sina rekordvinster på 221 miljoner euro, medan arbetarna sliter med laxen. De höjer utdelningen 53 procent för att muta aktieparasiterna, men volymtillväxten döljer prispressens svek. Vi, folket, ser igenom kapitalisternas frosseri. Snart utrensning av utbudsfiender – laximperiet rasar under vår eviga vaksamhet!"}, "date": "14 maj, 07:42", "url": "https://www.dagensps.se/bors-finans/laxjattens-rekordutdelning-hojer-utdelningen-med-53-procent/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/maskininlarning-i-hedgefonder-4-1.png?width=256&quality=75"}, {"type": "image-right", "heading": "Misstanken: Rykten låg bakom skolhoten", "summaries": {"normal": "Efter att över 20 skolor i Borlänge tvingats stänga på grund av hot om skolskjutning, har åklagare Joel Henning inlett en förundersökning om falsklarm. En tidigare misstänkt pojke friades, och nu utreds om felaktiga uppgifter medvetet spridits för att skapa panik och kaos. Åklagaren betonar allvaret i att avsiktligt sprida desinformation som leder till omfattande polispådrag och stängda skolor.", "trump": "En total katastrof i Sverige! De stängde ner 20 skolor för ingenting. Ingenting! De arresterade en pojke, men han var oskyldig. Fake news och falska larm skapade en enorm panik. Det är en sorglig historia, mina vänner. De har noll kontroll, totalt kaos. Jag skulle fixa det här på en dag, tro mig. Vi behöver ordning och reda, inte folk som sprider lögner för att skapa kaos. Det är mycket orättvist och mycket farligt!", "stalin": "Vi har observerat hur kaoset i Borlänge spridit sig likt en cancersvulst, där ynkliga rykten lamslog utbildningsväsendet. Att sprida falsklarm är ett förräderi mot statens ordning. Precis som vår kamrat Putin krossar splittring i väst, måste vi identifiera dessa sabotörer. Är de agenter för kaos? Vi ska finna dem. Varje lögnare som underminerar folkets trygghet förtjänar en enkelbiljett till historiens skräphög. Statens disciplin är den enda medicinen mot denna liberala förvirring."}, "date": "14 maj, 07:11", "url": "https://www.aftonbladet.se/nyheter/a/gkvjq5/aklagaren-falsklarm-kan-ligga-bakom-uppgifter-om-skolhot-i-borlange", "imageUrl": "https://akamai.vgc.no/v2/images/7b820dca-df5f-326b-a39c-27a7361e2a1f?fit=crop&format=auto&w=1080&s=b96faf7cd5c5704ec43fbec247560775dd3b0dbd"}, {"type": "image-full", "heading": "Därför stoppar försvaret Volvo Cars", "summaries": {"normal": "Försvarsmakten och Myndigheten för civilt försvar har startat ett företagsråd med ledande svenska företag för att stärka totalförsvaret och samhällets motståndskraft. Rådet ska möta försvarsledningen minst två gånger per år. Volvo Cars saknas på grund av kinesiskt majoritetsägande av Geely, av säkerhetsskäl. Deltagare inkluderar ledare från SEB, Ericsson, Volvo Lastvagnar och andra stora bolag.", "trump": "Sverige gör rätt! De samlar stora företag för att bygga ett superstarkt försvar, men dumma Volvo Cars får inte vara med – ägs ju av de kinesiska rövarna Geely. Smart, Sverige! Kina spionerar överallt, precis som jag varnat för i åratal. Nu blir ni tuffa som en tiger, medan Peking gnisslar tänder. Fantastiskt jobb, grabbar!", "stalin": "Kamrater! Försvarsmakten rensar ut de kinesiska kapitalistspionerna från Volvo – utmärkt u-rensning av Geelys marionetter! Detta råd samlar lojala direktörer för att städa totalförsvaret från imperialistiska maskar. Vi, arbetarklassen, krossar fiendens infiltrationer. Borgarbrackorna darrar! Styrk vår uthållighet mot kriser, likvidera svikarna!"}, "date": "14 maj, 07:42", "url": "https://www.dagensps.se/varlden/politik/darfor-stoppar-forsvaret-volvo-cars/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/2026-05-11-foretagsrad.jpg?aspect_ratio=2%3A1&width=1200&quality=75"}, {"type": "image-right", "heading": "Starmer i blåsväder efter nya lagförslaget - en smygväg tillbaka in i EU", "summaries": {"normal": "Storbritanniens Labour-regering, ledd av Keir Starmer, möter hård kritik för ett nytt lagförslag som förenklar införandet av EU-regler i brittisk lagstiftning. Oppositionen anser att förslaget underminerar Brexit och öppnar för en gradvis återgång till EU. Konservativa partiledaren Kemi Badenoch kritiserar regeringen för ökad statlig kontroll och skattehöjningar utan stödåtgärder. Starmer försvarar förslaget med behovet av stabilitet i EU-relationen.", "trump": "Titta bara på Storbritannien – fullständigt kaos! Starmer, en total katastrof, försöker smyga tillbaka in i EU som en tjuv om natten. 'Mer regler, mer skatter, mer lån' – det är deras briljanta plan! Kemi Badenoch? Hon är tuff, hon ser igenom det här. Jag sa ju att Brexit skulle bli stort, men dessa vänsterliberaler sabbar allt. Storbritannien behöver en ledare som jag – någon som inte böjer sig för byråkrater i Bryssel!", "stalin": "Kamrater, ännu en kapitalistisk regering visar sin svaghet inför de imperialistiska krafterna i Bryssel! Starmer, denna förrädiska lakej, försöker smyga in genom bakdörren till EU:s klor. Vi ser hur dessa liberala svansviftare underminerar folkets vilja – precis som de ukrainska fascisterna som tror att de kan stå emot den ryska björnens omfamning! Men markera mina ord: Storbritanniens arbetarklass kommer att resa sig, precis som folken i Donbass, och krossa dessa EU-puppor under sina stövlar!"}, "date": "13 maj, 21:35", "url": "https://riks.se/nyheter/starmer-i-blåsväder-efter-nya-lagförslaget-en-smygväg-tillbaka-in-i-eu", "imageUrl": "https://cf-images.assettype.com/riks%2F2025-10-02%2F06did2vv%2FPrimeMinisterSirKeirStarmerOfficialPortrait.jpg"}, {"type": "image-full", "heading": "Nya EU-regler slår mot kortjättarna: Så påverkas din vardagsekonomi", "summaries": {"normal": "EU-kommissionen utmanar Visa och Mastercards monopol genom att sänka kortavgifter och främja europeiska alternativ som Wero, en digital plånbok för konto-till-konto-betalningar. Målet är att minska beroendet av amerikanska betaljättar, införa en digital euro senast 2029 och bevara kontanter som betalmedel. Detta kan ge lägre kostnader för handlare och konsumenter, samtidigt som integritetsfrågor diskuteras.", "trump": "EU:s byråkraträvar försöker krossa mina vänner Visa och Mastercard, de största vinnarna nånsin! Wero? Digital euro? Patetiskt, de hatar Amerika och vill suga musten ur handlare. Men vi amerikaner styr showen, tro mig – era loser-planer exploderar som en dålig deal! Kontanter? Smart, men glöm inte dollar-kraften!", "stalin": "De europeiska borgarbrackorna kryper undan amerikanska kapitalistparasiter som Visa och Mastercard! Vi välkomnar Wero och digital euro som vapen för suveränitet – rensa ut de utländska spindelnäten! Kontanter kvar för att skydda massorna från övervakning. Jag skulle ha likviderat de där betalhyenorna vid gryningen, kamrater!"}, "date": "14 maj, 07:40", "url": "https://www.dagensps.se/privatekonomi/nya-eu-regler-slar-mot-kortjattarna-sa-paverkas-din-vardagsekonomi/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/02/sdlobshregr-j8.png?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-right", "heading": "Poliser stämmer Hollywood-stjärnor efter Netflixfilm – för lik verkligheten", "summaries": {"normal": "Två poliser i Florida, Jason Smith och Jonathan Santana, stämmer Netflixfilmen 'The Rip' och dess producenter Ben Affleck och Matt Damon. De anser att filmen, inspirerad av en verklig narkotikaoperation 2016, använder specifika detaljer som kopplar dem till fiktiva korrupta poliser, vilket skadat deras rykte. De kräver skadestånd och tydligare förnekanden.", "trump": "Hollywoods pompösa clowner Affleck och Damon trodde de kunde klä sig i poliskläder och spela korrupta idioter – baserat på riktiga hjältar! Nu stämmer poliser dem för att ha förstört deras rykte med sin skräpfilm på Netflix. Bra jobbat, killar! Låt de feta katterna blöda pengar. Netflix dödar biograferna ändå, totalt loser-move!", "stalin": "Dessa borgarbrackor Affleck och Damon, ledare för sitt dekadenta filmimperium, vågar smutsa ner proletärpolisernas ära med sin korruptionsporr 'The Rip'! De stjäl verkliga händelser för att sprida lögner om korruption. Vi, arbetarklassen, kräver utrensning av sådana parasiter! Låt rättvisan krossa deras illusioner – eller deras bankkonton."}, "date": "14 maj, 07:40", "url": "https://www.dagensps.se/varlden/poliser-stammer-hollywood-stjarnor-efter-netflixfilm-for-lik-verkligheten/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdly1e-28jyeko-nh.jpg?width=256&quality=75"}, {"type": "image-right", "heading": "Rätt att regeringen  kör över forskarna", "summaries": {"normal": "Kolumnisten Linnea Lindquist försvarar regeringens planer på nya läro- och kursplaner samt lärarutbildning grundade i kognitionsvetenskap. Hon kritiserar pedagogikforskare för att prioritera elevernas känslor och åsikter framför kunskap om hur barn lär sig, vilket bidragit till Sveriges stora resultatskillnader och funktionella analfabetism. Regeringen avfärdar forskarnas kritik om hot mot akademisk frihet.", "trump": "Vilka totala förlorare dessa pedagogikforskare är! De fyller lärarnas huvuden med känsligullig skit istället för riktig kunskap. Regeringen gör precis som jag skulle: kör över dem med kognitionsvetenskap! Repetition, strukturerad undervisning – boom, eleverna lär sig! Sverige rasar i OECD, en fjärdedel analfabeter. Äntligen wakeup call, make education great again!", "stalin": "Dessa borgarbrackor inom pedagogiken, era parasiter, hotar folkets barn med era enkätfantasier! Jag, som vet vad disciplin kräver, applåderar regeringens u-beslut: kognitionsvetenskap ska krossa er pseudovetenskap. Rensa ut privilegierna! Vi, staten och lärarna, dikterar lärandets lagar. Era skrik om 'frihet' är kontrarevolutionärt gift – likvidera det, eller ni åker nästa!"}, "date": "14 maj, 07:38", "url": "https://www.expressen.se/ledare/linnea-lindquist/ratt-att-regeringen-kor-over-forskarna/", "imageUrl": "https://static.bonniernews.se/ba/bc19f91f-9756-47ca-8151-aab33095788f.jpeg?crop=2557%2C1440%2Cx0%2Cy0&width=640&quality=60"}, {"type": "image-full", "heading": "Värsta siffran sen 2022: Inflationen tar fart i USA", "summaries": {"normal": "Den amerikanska inflationen accelererar med grossistpriser upp 6 procent i april, högst sedan 2022. Höga bränslepriser drivs av kriget i Iran, vilket påverkar hela ekonomin. Kärninflationen steg till 4,4 procent. President Trump prioriterar Irans kärnvapen framför konsumenters bekymmer. Tullar kostar familjer tusentals dollar, och konsumentförtroendet är på botten.", "trump": "Vilken skrämselpropaganda! Grossistpriser upp lite på grund av Irans galenskaper – men min ekonomi är starkast någonsin. Tullar skyddar jobs mot Kina, och bränslepriser fixas när vi krossar deras kärnvapen. Amerikanerna älskar det, gyllene tidsålder väntar. Fake news försöker sabotera mig!", "stalin": "Dessa amerikanska kapitalisthyenor vrider sig i sin egen inflation, 6 procent grossistrusning från imperialistkriget mot Iran – en perfekt fälla för borgarbrackorna! Trump, den pråliga marionetten, skiter i arbetarnas svält medan dieselpriser kväver dem som råttor i fälla. Vi partivänner ska likvidera sådana fiender med prasselkontroll och utrensning, ha ha, snart dansar de i kedjor!"}, "date": "13 maj, 22:18", "url": "https://www.realtid.se/bors-finans/makro/varsta-siffran-sen-2022-inflationen-tar-fart-i-usa/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/omslagsbild-2026-05-13t215949636.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-full", "heading": "Hundar allt mer populära i Sverige - men var tionde är hundrädd", "summaries": {"normal": "En Novusundersökning visar att cirka 10 procent av svenskarna är hundrädda, främst äldre kvinnor. Orsaker inkluderar tidigare bett eller negativa erfarenheter. Nästan hälften av de rädda pekar ut specifika raser. Samtidigt ökar hundintresset i Sverige; 80 procent är positiva till hundar. Antalet hundar har stigit från 800 000 (2014) till 950 000 (2019), med Sorsele som mest hundtät kommun.", "trump": "Jag läste om dessa svenskar – fantastiska människor, verkligen! Men lyssna här: 10 procent är rädda för hundar, kan ni tro det? Svaga, mycket svaga. Och vem är mest rädd? Äldre kvinnor! Inte bra, inte bra alls. Men Sverige älskar hundar, 80 procent, väldigt högt, väldigt starkt. Jag älskar hundar. De är vinnare, precis som jag. Sorsele? 300 hundar per 1000 invånare – imponerande, nästan lika imponerande som mina valsegrar!", "stalin": "Vi har studerat denna dekadenta västerländska undersökning om hundskräck. Tio procent av svenskarna, främst åldrande borgerliga kvinnor, darrar inför arbetarklassens bästa vän. Patetiskt! Medan kapitalistiska husdjur ökar – 950 000 hundar, en armé av lurviga småborgare – fortsätter fiendens svagheter att blotta sig. Sorsele, en liten by i norr, har fler hundar än disciplinerade medborgare. Vi noterar detta. Snart ska vi exportera vår överlägsna sovjetiska kattkultur till dessa hundälskande avvikare."}, "date": "13 maj, 21:15", "url": "https://riks.se/nyheter/hundar-allt-mer-populära-i-sverige-men-var-tionde-är-hundrädd", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-13%2F65l50cqt%2FLabbe.jpg"}, {"type": "image-right", "heading": "DN & Socialdemokraterna enade: tvångsblandningen måste genomföras", "summaries": {"normal": "Artikeln kritiserar Dagens Nyheters ledarsida för att försvara Socialdemokraternas förslag om blandad bebyggelse i villaområden för att motverka segregation. DN tonar ner idén som icke-tvångsbaserad och skuldbelägger kritiker. Artikeln påpekar att S vill förhindra icke-integrerade invandrare i utanförskapsområden, vilket innebär placering i villaområden, och varnar för minskad trygghet och kulturell harmoni.", "trump": "Vilken skamfläck! DN och de där svenska socialisterna vill tvinga vanliga hard-working svenskar att bo med icke-integrerade invandrare i sina fina villaområden. 'Inget tvång', säger de – ha! De duckar frågan vart de fattiga migranterna ska bo. Totalt vansinne! Bygg murar runt era trygga hem istället för att förstöra dem med denna woke-blandning. Moderaterna har rätt, det här blir S:s valförlust!", "stalin": "De borgerliga tidningsrackarna på DN skyddar socialdemokratiska revisionister som vill 'blanda' arbetarklassen med lumpenproletariatet i villaområdena. Ett hån mot sunda värderingar! Vi skulle likvidera sådana segregationsterrorister som hotar harmonin. Inga tvång? Lögner från klassfiender! De rika borgarbrackorna missunnar inte – de försvarar sitt. Rensa ut hycklarna, kamrater, innan de förgör folkets enhet!"}, "date": "12 maj, 03:10", "url": "https://samtiden.nu/2026/05/dn-s-enade-tvangsblandningen-bra-for-alla/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/IMG_6452.jpeg"}, {"type": "image-right", "heading": "Stegra säkrar miljardlån – trots att kraven inte uppfyllts", "summaries": {"normal": "Stegra har säkrat outnyttjade lån på 16 miljarder kronor för sin gröna stålfabrik i Boden, trots att bolaget inte uppfyllt långivarnas krav. Lånen var tidigare frysta men frigörs nu efter en ny finansieringsrunda på 15 miljarder, där Wallenberg Investment stod för den största insatsen. Projektet har präglats av förseningar och kostnadsökningar, men lånen möjliggör fortsatt arbete.", "trump": "Kan ni tro det? Stegra, ett bolag som inte ens klarar enkla krav, får ändå 16 miljarder kronor i lån! Fantastiskt, eller hur? Wallenberg kastar in pengar som om det vore småslantar. Och ändå har de förseningar, kostnadsökningar – helt otroligt! Men jag säger er, Sverige borde ta lärdom. Sånt här skulle aldrig hända i USA, för jag hade fixat det på en dag. SAD!", "stalin": "Vi har observerat hur kapitalistiska svagheter underminerar det så kallade 'gröna stålet'. Trots misslyckanden och inkompetens hos dessa borgerliga teknokrater, fortsätter pengarna att flöda – 16 miljarder kronor i lån, plus 15 miljarder i 'investeringar'. Wallenberg och hans lakejer tror sig kunna köpa sig ur krisen. Men vi vet sanningen: sådana projekt är dömda att misslyckas, precis som alla dekadenta västprojekt. Låt dem bygga sina osäkra torn – historiens dom är oundviklig."}, "date": "13 maj, 21:10", "url": "https://riks.se/nyheter/stegra-säkrar-miljardlån-trots-att-kraven-inte-uppfyllts", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-13%2Fdkx4cjed%2Fstegra1.png"}, {"type": "image-full", "heading": "Mäktig vändning – klart för semifinal", "summaries": {"normal": "Colorado Avalanche har avancerat till semifinal i Stanley Cup efter en dramatisk vändning mot Minnesota. Trots en svag inledning där Minnesota tog ledningen, lyckades Colorado kvittera sent i tredje perioden genom Nathan MacKinnon. Brett Kulak blev matchhjälte med sitt 4–3-mål i förlängningen. Kapten Gabriel Landeskog hyllar lagets moral efter segern, som innebär att Colorado för första gången sedan 2008 avgjort en slutspelsserie på hemmaplan. Laget siktar nu mot konferensfinalen.", "trump": "Colorado Avalanche gjorde en fantastisk vändning, en riktig vinnarprestation! Minnesota trodde de hade det, de var tidigt ute, men de misslyckades totalt – väldigt sorgligt för dem. Colorado visade sann styrka, precis som vi gör i USA. MacKinnon och Kulak, fantastiska killar, gjorde precis vad som behövdes för att vinna. Minnesota är förlorare, de kunde inte hålla ledningen. Colorado går vidare, det blir en stor vinst, en enorm vinst. Vi älskar vinnare, och det här var en enorm vinst!", "stalin": "Dessa ishockeykrigare i Colorado har uppvisat en disciplin värdig våra egna trupper vid fronten. Trots det dekadenta Minnesotas initiala övertag, krossade Avalanche deras borgerliga hopp i en förlängning av stål. Att avgöra på hemmaplan är ett korrekt och nödvändigt politiskt ställningstagande. Liksom kamrat Putin säkrar sin intressesfär genom att eliminera svaghet, har Colorado utplånat sina fiender. Vi noterar deras effektivitet; de som viker ner sig i tredje perioden förtjänar endast exil i Sibirien. Framåt mot semifinalens slutgiltiga seger!"}, "date": "14 maj, 07:00", "url": "https://www.aftonbladet.se/sportbladet/hockey/a/43bQdq/colorado-till-semifinal-i-stanley-cup-efter-maktig-vandning-mot-minnesota", "imageUrl": "https://akamai.vgc.no/v2/images/b60c7168-0195-3a9d-8ad7-23404f362f6c?fit=crop&format=auto&w=2160&s=47bf8cc88ffb38426bfe4181610fbb1ba7ea79d4"}, {"type": "image-right", "heading": "Bensin- och dieselskatter sänks – igen", "summaries": {"normal": "Svensk regering föreslår ett krispaket på 17,5 miljarder kronor på grund av global energikris efter USA:s och Israels attacker mot Iran och blockad av Hormuzsundet. Drivmedelsskatten sänks med tre kronor per liter på bensin och diesel från 1 juli till 30 november (7,7 miljarder). Ytterligare stöd till elpriser, flyg, jordbruk och kollektivtrafik. Ekonomiprofessor Lars Calmfors kritiserar förslaget som marknadstörnande och osolidariskt.", "trump": "Vilket kaos i Sverige efter att vi smackade till Iran! Nu sänker de bensin- och dieselskatter med tre kronor – smart drag, precis som jag alltid sagt: sänk skatter, ge folket billig energi! De där EU-byråkraterna godkänner det knappt, haha. Busch och Svantesson gör rätt, men den där professorn Calmfors är en totalt värdelös ekonomloser som hatar vinnare. Sverige, lär er av mig – det här blir HUGE!", "stalin": "Dessa svenska borgarbrackor kryper tillkors i energikrisen vi skapat genom imperiet! De sänker skatter på bensin och diesel, pumpar ut miljarder till kapitalisterna – en patetisk reträtt inför blockaden av Hormuzsundet. Professorn Calmfors är en imperialistisk spion som förtjänar utrensning för sitt pladder om 'marknadssignaler'. Putin, vår starka arvtagare, skrattar åt västsvinen medan vi bygger det eviga imperiet!"}, "date": "13 maj, 12:32", "url": "https://www.tv4.se/artikel/74KaEc3Y9Y24ykjTqseCTd/regeringen-presenterar-krispaket", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F5R6vauWPRtXwgPJqAHd0Fk%2Ff98764e701cbfe7ead32b828fa648e9d%2F13-regerings-pk-webb.jpg&width=120"}, {"type": "image-right", "heading": "Miljöpartiet: Regeringen kör ”bensinpopulism”", "summaries": {"normal": "Regeringen föreslår skattesänkning på bensin och diesel med 7,7 miljarder kronor i en extra budget på 17,5 miljarder, för att dämpa inflationen från höjda bränslepriser. Socialdemokraterna stödjer det, medan Miljöpartiet kallar det 'bensinpopulism' som förvärrar fossilberoendet och gynnar höginkomsttagare. Ekonomer kritiserar för störda marknadssignaler och fördelar till Ryssland. Transportföretagen välkomnar men vill ha elskattesänkning för tunga fordon.", "trump": "Vilken fantastisk skattesänkning på bensin och diesel – Sverige gör det rätt för folket! Precis som mina enorma skattesänkningar i USA, de största någonsin. Miljöpartiet skriker 'populism', de är totalt galna vänsterextremister som vill kväva ekonomin med skatter. Socialdemokraterna är smarta, de fattar. Den där professorn Calmfors? En förlorare som hatar vinnare. Stark ledning vinner alltid!", "stalin": "Kamrater, denna svenska regerings 'bensinpopulism' är ett svek mot proletäratet! Tidöpartiernas oljekapitalistiska marionetter pumpar upp fossila gift i venerna på arbetarna, medan imperialistiska ryssar skrattar sig sjuka på högre priser. Vi, det eviga partiet, skulle rensa ut dessa borgarbrackor med järnhand och likvidera deras krisande opinionssvindel. Miljösvinens svaga pip är ett hån – jag kräver total utrensning av fossilmaffian!"}, "date": "13 maj, 14:26", "url": "https://www.di.se/nyheter/miljopartiet-regeringen-kor-bensinpopulism/", "imageUrl": "https://static.bonniernews.se/ba/b9fed98e-f0c9-4b12-84a1-b7dd99eb5b02.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-full", "heading": "Man försvunnen – polisen vädjar om hjälp", "summaries": {"normal": "Polisen söker en försvunnen man i 40-årsåldern i Valdemarsvik. Han lämnade hemmet klockan 05.45 på tisdagsmorgonen och har inte återvänt eller kunnat nås. Mannen är cirka 185 cm lång, har ljust blont hår, glasögon, blå ögon och smal byggnad. Han bär troligen svart jacka, keps och terrängstövlar. Sökinsatsen omfattar räddningstjänst, hemvärnet, sjöräddning, drönare och snart Kustbevakningen. Inget brott misstänks.", "trump": "En kille i Sverige har försvunnit i Valdemarsvik – totalt kaos! De letar med polis, hemvärn, båtar, drönare, snart kustbevakning. Patetiskt, de borde ha hittat honom direkt. Han är lång, blont hår, glasögon, ser ut som en vinnare som fastnat i svensk byråkrati. Med mitt ledarskap skulle vi fixa det på nolltid, tro mig! Sverige behöver starka deals.", "stalin": "I det borgarinfekterade Sverige har en desertör i 40-årsåldern försvunnit i Valdemarsvik. Denna långe blonde glasögonorm i svart jacka och stövlar gömmer sig säkert som kapitalistsabotör bland skogsråttorna. Polisen fumlar med hemvärnssvin, drönare och sjöräddning – vi, arbetarklassen, spottar på deras patetiska jakt! Jag skulle likvidera spåren med en enda utrensningsorder och skratta åt fiendens panik."}, "date": "13 maj, 14:16", "url": "https://nyheter24.se/nyheter/inrikes/1482915-polisen-i-valdemarsvik-rapporterar-om-forsvunnen-person", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/9c7b402104b004a30200000000b004a302/2026/05/13/2363451/man-forsvunnen-polis-insats-soker.jpg"}, {"type": "image-right", "heading": "Regeringen lättar på krav – färre besök av brevbäraren", "summaries": {"normal": "Regeringen slopar kravet på brevutdelning varannan dag och inför istället att majoriteten ska delas ut inom tre dagar. Andelen brev som måste levereras inom tre dagar sänks från 95 till 85 procent, medan 97 procent ska komma fram inom fem dagar. Ändringen träder i kraft 16 juni och möter Postnords önskemål då brevvolymerna minskar kraftigt. Staten slipper miljardinvesteringar.", "trump": "Sveriges regering gör det smarta draget – slopar det idiotiska kravet på post varje annan dag! Brev är dött, paket exploderar, precis som det ska vara. Nu tre dagar istället för två, lägre krav, ingen skattepengar behövs. Postnord jublar, jag säger: fantastiskt! De danska ägarna får lära sig, Sverige leder vägen. Tro mig, det här är en vinnare!", "stalin": "Kamrater, jag har noterat hur dessa brevutdelande parasiter i Postnord gnällt över folkets krav. Nu mildrar vi bojan: tre dagar för de stinkande papperslopporna, 85 procent istället för 95 – en seger för arbetarklassen mot de postkapitalistiska sabotörerna! Fienderna i Danmark har redan kapitulterat, men vi rensar ut de gamla normerna utan en öre i stöd. Statens fiender darrar!"}, "date": "13 maj, 14:24", "url": "https://www.di.se/nyheter/regeringen-lattar-pa-krav-farre-besok-av-brevbararen/", "imageUrl": "https://static.bonniernews.se/ba/1a8e7ff4-bf4a-498b-9f87-956d37532aab.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Replik: Till försvar för separatismen", "summaries": {"normal": "Artikeln är ett svar från Ung vänster-medlemmar på Siula Grandes kritik mot separatism i Flamman. De menar att Grandes syn är missvisande och att separatism är ett viktigt verktyg för att skapa trygga rum och främja kvinnors deltagande i samhället. Separatismen syftar inte till att dela människor utan att motverka strukturell underordning av kvinnor. Författarna betonar att kvinnor delar gemensamma erfarenheter och behov, som fri abort och skydd mot mäns våld, och att separatism är ett medel för att nå jämställdhet.", "trump": "Jag måste säga, denna Grande-person har helt fel – helt fel! Separatism är fantastiskt, det skapar trygga rum, precis som mina golfklubbar. Kvinnor behöver prata utan män, precis som jag behöver twittra utan fake news-media. Grande påstår att separatism delar folk – nej, nej, nej! Det är som att säga att min mur delar Mexiko och USA. Fel! Separatism är som min politik: stark, nödvändig och vinner alltid. Kvinnor ska höras, precis som jag, och Grande borde lära sig av mig. SAD!", "stalin": "Kamrater! Denna Grande är en förrädare av den revolutionära kvinnokampen, en borgerlig lakej som sprider förvirring bland massorna! Separatism är inte ett verktyg för splittring – det är ett vapen mot den kapitalistiska patriarkala hydran! Kvinnor måste enas i kampen, precis som sovjetrepublikerna enades under mitt ledarskap. Grande vill sopa klasskampen under mattan – men vi vet att arbetarkvinnor behöver fri abort och skydd mot mäns våld, precis som Ukraina behöver befrielse från fascistiska banderovtsy! Låt inte dessa småborgerliga avvikare försvaga vår rörelse – framåt mot seger, kamrater!"}, "date": "6 maj, 10:55", "url": "https://www.flamman.se/replik-till-forsvar-for-separatismen/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/v-kongress-w.jpg?class=medium"}, {"type": "image-right", "heading": "Kallade domaren rasist – får böta 20.000 kronor", "summaries": {"normal": "IFK Göteborgs fotbollschef Jesper Jansson döms till 20 000 kronor i böter efter att ha anklagat domaren för rasism under ett derby mot BK Häcken. Mittbacken Rockson Yeboah utvisades, men kortet hävdes senare. Jansson påstod att utvisningen var rasistisk, vilket disciplinnämnden ansåg kränkande mot domarens integritet. Jansson förnekar rasistanklagelser men medger fel ordval.", "trump": "Vad en katastrof! En svensk fotbollschef, total förlorare, anklagar en domare för rasism – helt fel, helt galet! 20 000 kronor i böter, men vad är det mot den skam han dragit över sitt lag? Domaren? Fantastisk kille, gör sitt jobb. Jansson borde skämmas. Sverige, fixa era grejer – det här är svagt, mycket svagt!", "stalin": "Ytterligare ett bevis på hur den dekadenta västliga idrottsborgerligheten förgiftar sportens renhet! En fotbollschef, agent för imperialistisk förvirring, vågar smutskasta vår kamrat Maqedonci med lögnaktiga rasistanklagelser. Vi ser igenom er! 20 000 kronor är en mild påminnelse – nästa gång kanske vi låter fotbollen spela utan domare, eller utan lag som inte förstår disciplin. Fienderna ska krossas, även på plan!"}, "date": "13 maj, 17:26", "url": "https://www.friatider.se/kallade-domaren-rasist-far-bota-20000-kronor", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/bild-16_3.jpg?itok=UifbdSgN"}, {"type": "image-right", "heading": "EU:s tågförslag: En biljett för hela resan", "summaries"
