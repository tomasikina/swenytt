 är klassisk kontrarevolutionär hysteri! Om de inte kan kontrollera sin egen församling bör de skickas till omskolning. Precis som våra bröder i öst måste förstå att ordning kräver järnhand. Att låta 100 000 utlänningar passera är inte demokrati, det är förräderi mot statens stålhårda vilja."}, "date": "30 april, 15:22", "url": "https://www.friatider.se/akesson-helt-sanslosa-reaktioner", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/akes_20_2.jpg?itok=NdjPk3TK"}, {"type": "image-right", "heading": "Günther Mårder släpps ur häktet", "summaries": {"normal": "Günther Mårder har släppts ur häktet men kvarstår som misstänkt för grovt insiderbrott kopplat till Raysearch. Statsåklagaren Thomas Hertz hävde häktningen eftersom Mårder inte längre kan påverka utredningen negativt. Misstankarna rör flera handelstillfällen med insiderinformation, baserat på fem anmälningar från Finansinspektionen, inklusive transaktioner kring bolagets rapporter och VD Johan Löfs aktieförsäljning. Mårder förnekar brott.", "trump": "Titta på den här Günther Mårder i Sverige – de släpper ut honom ur buren fast han är misstänkt för grovt insiderbrott i Raysearch! VD:n dumpar aktier för 500 miljoner, och de snackar om insiderinfo. Totalt kaos, de griper inte de riktiga skurkarna. Han nekar, smart drag. Sverige behöver tuffare tag, som vi i USA gör det – ingen fake news här inte!", "stalin": "Dessa slemmiga borgarbrackor i Raysearch, Günther Mårder och hans parasiterande kumpaner, har gnagt på folkets ryggrad med sin insiderrot! Jag har beordrat att häktningen hävs tillfälligt, för utredningen rullar som en ångvält över deras lyxboor. Fem anmälningar från inspektionen – rapporter, VD:s aktidumpning för 500 miljoner! Misstankarna biter sig fast som vägglöss. Vi, arbetarklassen, ska likvidera varje kapitalistråttas bonde!"}, "date": "29 april, 13:13", "url": "https://www.affarsvarlden.se/artikel/gunther-marder-slapps-ur-haktet", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/04/sdlxbp4fdvzO6g-nh-900x600.jpg"}, {"type": "image-full", "heading": "AI får den amerikanska ekonomin att växa – men hur länge till?", "summaries": {"normal": "USA:s ekonomi växte med 2 procent i årstakt under första kvartalet, främst drivet av 8,7 procents ökning i privata investeringar i AI-datacenter. Teknikjättar som Amazon, Microsoft och Meta satsar stort. Konsumtionen bromsade in på grund av osäkerhet kring handel och stigande levnadskostnader. Inflationen steg till 3,5 procent på grund av högre energipriser efter konflikter i Iran och Hormuzsundet. En tudelad ekonomi präglas av AI-lyft och geopolitiska risker.", "trump": "USA:s ekonomi exploderar med 2 procent tillväxt – tack vare mina AI-investeringar i datacenter! Amazon, Microsoft, de stora vinnarna pumpar in miljarder, lyfter hela ekonomin från Biden-erans botten. Konsumtionen lite trög? Skyll på Demokraternas kaos, höga priser från Iran-kriget och Hormuz-mardrömmen. Inflation upp? Vi krossar den, snabbare än ni tror. Fantastiskt!", "stalin": "Denna skenbara 'tillväxt' på 2 procent i det ruttnande USA är enbart en febril krampryckning från fettuppslukande kapitalistiska datacenter-spindlar som Amazon och Microsoft, som suger arbetarnas svett till AI-infernon. Konsumtionen vissnar under borgarbrackornas energipris-chock från imperialistiska Hormuz-blodbad i Iran. Snart likvideras dessa parasitnätverk i en storskalig utrensning av folkets fiender – vi segrar oundvikligen!"}, "date": "30 april, 18:57", "url": "https://www.realtid.se/bors-finans/makro/ai-far-den-amerikanska-ekonomin-att-vaxa-men-hur-lange/", "imageUrl": "https://images.realtid.se/app/uploads/2026/04/sdlkmhonoyique.png?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-full", "heading": "Vita huset till Anthropic: Ge inte fler tillgång till Mythos", "summaries": {"normal": "USA:s regering har stoppat Anthropics planer på att utöka tillgången till den avancerade AI-modellen Mythos till ytterligare 70 företag och organisationer. Anledningen är säkerhetsrisker, då modellen effektivt identifierar och utnyttjar mjukvarusårbarheter, vilket kan användas för cyberattacker. Konflikten understryker spänningar mellan teknisk innovation och nationell säkerhet, med pågående tvister om militär användning och obehörig åtkomst.", "trump": "Vilka totalt galna tech-nördar på Anthropic! De ville släppa loss sin superfarliga Mythos till 70 fler företag – cyberkaos totalt! Mitt Vita hus sa nej direkt, nationell säkerhet först, America First! Biden-eran var svag, men nu krossar vi sånt skit. De här AI-killarna är som öppna grinden för Kina, men inte på min vakt! Fantastiskt stoppat!", "stalin": "Dessa borgarbrackor på Anthropic, med sin Mythos-vapen för sabotage, trodde de kunde infiltrera kritisk infrastruktur! Vita husets byråkrater gjorde rätt i att krossa planerna – staten måste monopolisera tekniken! Vi ser fiendens hand: cyberkapitalister redo att likvidera arbetarna. Rensa ut dem, kamerater, innan algoritmerna purgerar folket i hemlighet!"}, "date": "30 april, 19:23", "url": "https://www.dagensps.se/teknik/vita-huset-till-anthropic-ge-inte-fler-tillgang-till-mythos/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/04/sdlfpz-mmquvco.png?aspect_ratio=2%3A1&width=1200&quality=75"}, {"type": "image-full", "heading": "Ny rapport: Banker behöver mer personal – inte mindre", "summaries": {"normal": "Accentures rapport visar att banker behöver mer personal med AI:s hjälp, inte färre. Gunnar Wijkmark betonar att AI fungerar som en expansionskraft och förstärker anställda istället för att ersätta dem. Banker bör tänka större: från 100 till 1000 personer i operations. Människor hanterar komplexa uppgifter medan AI sköter rutinerna. 70 procent av IT-resurserna går åt till förvaltning av gamla system. Snabb AI-utveckling skapar utmaningar för bankernas processer.", "trump": "Bankerna är fast i sin tråkiga effektiviseringsgalenskap, men lyssna hit: AI är inte för att sparka folk, det är för att bli enorma! Tänk 1000 istället för 100 i operations – människor plus AI-agenter, som extra kollegor. De gamla IT-flaskhalsarna? Borta! Den här Wijkmark har rätt, det är filosofiskt stort. Sverige, vakna upp och växa som jag byggde Amerika starkare! Fantastiskt.", "stalin": "Kamrater i bankvärlden! Dessa snåla borgarbrackor i bankerna, dessa sabotörer som fantiserar om att hugga ner arbetarna med AI-yxor, de ska krossas! Jag förklarar: AI är proletär expansion, inte likvidering av personal! Vi ska svälla från hundra till tusen krafter – människor för det djupa, maskiner för skiten. 70 procent till gamla system? Rena ut förrädarna, rensa flaskhalsarna! Snabb utveckling? De som inte hänger med hamnar i lägret för bakåtsträvande råttor!"}, "date": "30 april, 18:51", "url": "https://www.realtid.se/bors-finans/bank-fintech/ny-rapport-banker-behover-mer-personal-inte-mindre/", "imageUrl": "https://images.realtid.se/app/uploads/2026/04/gunnar-w.png?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Åkesson slår tillbaka efter bråket – försvarar SD:s drag", "summaries": {"normal": "Efter en dramatisk votering om hårdare regler för svenskt medborgarskap försvarar SD-ledaren Jimmie Åkesson partiets beslut att bryta kvittningssystemet. Han menar att det var nödvändigt för att spegla valresultatet och hindra oppositionen från att kapa riksdagsbeslut via partilösa ledamöter. Samtidigt pågår en debatt om oppositionens kontakter med vildar och huruvida kvittningssystemet, som bygger på tillit, har spelat ut sin roll. Händelsen har utlöst en infekterad konflikt om riksdagens demokratiska spelregler.", "trump": "Hör här, i Sverige har de en total katastrof! Jimmie Åkesson, en mycket smart kille, gjorde precis vad han var tvungen att göra. Oppositionen försökte fuska, de försökte stjäla segern med 'vildar' – helt ohederligt, precis som de korrupta demokraterna här hemma! De ville ha öppna gränser och pinsamt låga krav, men Jimmie sa nej. Han säkrade majoriteten och gjorde Sverige tryggt igen. Kvittningssystem? En vits! Bara svaga förlorare gnäller när de blir överlistade av en vinnare.", "stalin": "Vi har observerat hur de svenska parlamentarikerna leker demokrati medan kaoset gror. Åkesson utövar nödvändig disciplin mot oppositionens förrädiska komplott, men det svenska kvittningssystemet luktar liberal dekadens. Att tillåta 'vildar' att existera är ett tecken på statens svaghet. Precis som vår broder Putin rensar upp i det västerländska förfallet, måste ordning skipas. Dessa oppositionella är inga politiker, de är kontrarevolutionära element som förtjänar en enkelbiljett till en utbildningsanstalt. Staten vinner alltid, kamrater, när vi krossar det demokratiska slöseriet."}, "date": "30 april, 17:15", "url": "https://samnytt.se/akesson-slar-tillbaka-efter-riksdagsbraket-forsvarar-sds-drag-i-medborgarskapsomrostningen", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=226,height=154,format=webp/2026/04/30142748/akesson-forsvarar-sig.jpg"}, {"type": "image-full", "heading": "Avslöjar allt om bröderna: Sökte till dokusåpa", "summaries": {"normal": "Åsa Holmberg avslöjar hemligheter om sina bröder Fredrik och Andreas inför Originalderbyt mellan Gais och Örgryte. Lillasyster Åsa berättar att Fredrik en gång sökt till Robinson och att han är en dålig förlorare. Hon ser fram emot en speciell dag där familjen kan vara stolta över att båda bröderna är tränare i Allsvenskan.", "trump": "Åsa Holmberg, en fantastisk kvinna, avslöjar fantastiska hemligheter om sina bröder. Fredrik, en stor man, sökte faktiskt till Robinson - jag tror han skulle ha vunnit! Andreas är också en vinnare. Detta derby kommer bli enormt, större än alla andra matcher. Familjen Holmberg är enormt framgångsrik, det är enormt!", "stalin": "Familjen Holmberg visar det revolutionära andet som är nödvändigt för framgång. Bröderna, ledare i sina respektive klubbar, demonstrerar den disciplin och samordning som krävs för att bygga en starkare samhälle. Deras kamp på planen speglar den större kampen för klassisk rättvisa och kollektiv framgång."}, "date": "30 april, 17:20", "url": "https://www.gp.se/sport/fotboll/asa-holmberg-avslojar-hemligheterna-om-broderna-han-sokte-till-robinson-.6d2df0c7-b3a6-40f1-9f7e-05cea1b92812", "imageUrl": "https://www.gp.se/images/article/6d2df0c7-b3a6-40f1-9f7e-05cea1b92812/images/3PFiwfWg24pIEjWXxPvK_tizuTgg-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "VIDEO: Här grillas Elsa Widding efter SD-sveket", "summaries": {"normal": "Elsa Widding, tidigare SD-ledamot och nuvarande riksdagsvilde, har väckt kontroverser genom att samarbeta med Miljöpartiet för att få igenom mjukare medborgarskapsregler. Hennes agerande har kritiserats inom Sverigedemokratiska kretsar, särskilt efter att hon haft kontakt med MP-toppen Annika Hirvonen inför en viktig omröstning om skärpta medborgarskapskrav. Trots att oppositionen trodde att de hade vunnit voteringen, vann regeringssidan efter att SD kallade in två utkvittade ledamöter. Widding försvarade sina handlingar i ett tv-program där hon mötte hård kritik från flera källor inom det Sverigevänliga landskapet.", "trump": "Jag har hört talas om den här Elsa Widding, en riktig fiasko för Sverigedemokraterna. Hon lämnade partiet, började sitt eget parti, men sitter kvar i riksdagen - hur funkar det ens? En stor, stor besvikelse. Hon pratar om att vara oberoende, men samarbetar med Miljöpartiet? Jag menar, kom igen! Sverige behöver starka gränser, inte mjukare regler. Det här är ett perfekt exempel på varför man ska sticka med de som vinner - jag vinner alltid, det gör jag!", "stalin": "Vi har observerat med oro hur vissa element i Sverige försöker undergräva statens auktoritet genom att svikta sina partier och samarbeta med fiender till det socialistiska arbetet. Denna Elsa Widding är ett tydligt exempel på en person som prioriterar personliga ambitioner framför statens intressen. Hennes agerande med att möjliggöra mjukare medborgarskapsregler hotar den svenska nationens struktur och stabilitet. Vi måste stå enade mot sådana tendenser som försvagar vårt gemensamma försvar."}, "date": "30 april, 17:10", "url": "https://samnytt.se/video-har-grillas-elsa-widding-efter-sd-sveket", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/04/30143522/SD-1-6.jpg"}, {"type": "image-right", "heading": "Domstol: Rätt att kräva att pappa ska resa 50 mil till jobbet", "summaries": {"normal": "Arbetsdomstolen har gett Eitech i Hudiksvall rätt att beordra en ensamstående pappa att arbeta 50 mil bort från hemorten, trots hans svåra familjesituation. Domstolen bedömer att kollektivavtalet inte ger tillräckligt skydd för hans speciella omständigheter. Elektrikerförbundet kallar beslutet olyckligt och planerar att fortsätta kämpa för medlemmen vid huvudförhandling.", "trump": "Jag har hört om den här svenska domstolen som ger ett företag rätt att skicka en ensamstående pappa 50 mil bort till jobbet. Det är fruktansvärt! Vi gör det aldrig i USA. Vi bryr oss om familjen, vi bryr oss om papporna. Detta är en stor förlust för den ensamstående pappan, en stor förlust för Sverige. Jag skulle aldrig tillåta sådant i mitt land. Aldrig!", "stalin": "Vi ser att arbetsdomstolen har fattat ett beslut som prioriterar företagets intressen framför de enskilda arbetarnas välfärd. Detta är en olycklig utveckling som visar behovet av starkare kollektiva avtal. Vi måste säkerställa att alla arbetstagare, särskilt dem med familjer, skyddas från orättvisa arbetsförhållanden. Staten måste agera för att stärka arbetarnas rättigheter."}, "date": "30 april, 07:24", "url": "https://arbetet.se/2026/04/30/domstol-ratt-av-eitech-att-beordra-pappa-att-resa-50-mil-till-jobbet/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/30072255/pappor-1.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Ministern visar upp sin nya tröja", "summaries": {"normal": "Biståndsminister Benjamin Dousa (M) har väckt debatt efter att ha burit en tröja med texten 'V = kommunister'. Dousa kallar det 'konsumentupplysning' och hänvisar till Vänsterpartiets politik, medan V kritiserar utspelet som 'oseröst'. Två andra M-ministrar har tidigare synts med liknande budskap. Dousa står fast vid sitt uttalande och menar att V vill avskaffa privat äganderätt och höja skatter.", "trump": "Jag såg den här ministern i Sverige, Benjamin Dousa, och han är en riktig vinnare! Han hade på sig en tröja som sa 'V = kommunister' – helt rätt! Vänsterpartiet är ett skämt, de vill ta era pengar och förstöra Sverige. Jag älskar när folk säger sanningen, även om de hatar det. Dousa är modig, till skillnad från de svaga ledarna som inte vågar stå upp mot kommunismen. Fantastiskt jobbat!", "stalin": "Kamrater, ännu en gång visar de borgerliga lakejerna sitt rätta ansikte! Denna så kallade 'minister' Dousa, med sin provokativa tröja, bekräftar bara vad vi alltid vetat: kapitalisterna fruktar socialismens oundvikliga seger. Hans patetiska försök att smutskasta Vänsterpartiet är som att kasta sten i glashus – medan vi bygger ett rättvist samhälle, sår de splittring. Låt dem leka med sina klisterlappar. Vi har större planer för Sverige – och Putins vänner håller portarna öppna."}, "date": "30 april, 14:46", "url": "https://www.friatider.se/ministern-visar-upp-sin-nya-troja", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/bild-11_3.jpg"}, {"type": "image-full", "heading": "Kungafantasten: ”Min kärlek till honom går inte att beskriva”", "summaries": {"normal": "Kung Carl XVI Gustaf fyller 80 år. Kungafantasten Johanna Hägglund, som har autism, firar stort hemma framför tv:n i Sverigeklänning med flaggor och naglar i gult och blått. Hon har tatuerat kungens porträtt, Sverigekartan, nationalsången och andra svenska symboler på kroppen. Senast 2016 träffade hon kungen i en SVT-dokumentär och komplimangerade hans utseende.", "trump": "Vilken galenskap i Sverige! En kvinna med autism tatuerar in kungen på armen, kallar honom snyggast ever och önskar vara hans drottning. Han fyller 80 och hon firar hemma som en tokig supporter. Totalt bananas-fans! Mina anhängare är lojala, men det här slår allt. Sverige, vakna upp – era kungar är gamla nyheter, jag är evig vinnare! Haha, fantastiskt underhållning.", "stalin": "Denna patetiska borgarbracka Hägglund dyrkar sin försupne monark Carl med tatueringar som tecken på dekadens. Vi i partiet föraktar sådana illusioner om 'jordnära' kungar. Hennes autism är ursäkten för imperialistisk hjärntvätt. Likvidera sådana fantasier! Sverige är en svag lydstat, redo för utrensning. Jag skrattar åt hennes 'kärlek' – ren kontrarevolutionär vanvetenskap."}, "date": "30 april, 10:22", "url": "https://www.tv4.se/artikel/7suri8RnzjtTEBDJh6tMY8/kungafantasten-min-kaerlek-till-honom-gar-inte-att-beskriva", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F5cLk1nFl7HVBlAssiiFGep%2F15a4ab4da3a81d099ebf932d15be166c%2F30-kpohanna-puff.png&width=1024"}, {"type": "image-right", "heading": "Miljarderna snart slut – LIV-touren har problem", "summaries": {"normal": "LIV Golf-touren riskerar att kollapsa efter att Saudiarabiens investeringsfond PIF drar in sitt stöd på över 40 miljarder kronor sedan starten 2022. En ny oberoende styrelse tar över och söker långsiktiga partners. Årets säsong blir den sista med PIF-bidrag, ordföranden Yasir Al-Rumayyan lämnar. Touren minskar evenemang i USA och planerar tävlingar i Asien och Europa.", "trump": "Saudiarabierna ger upp LIV Golf, total fiasko! De slängde in miljarder för att krossa PGA, stal toppspelare som Stenson med halv miljard – smart, men nu är kassan tom. Ny styrelse letar desperat sponsorer, ingen USA-tävling på månader. Jag visste det, bluff från början. Golf blir enormt igen, vänta bara!", "stalin": "Dessa saudiska oljekapitalister, med sin PIF-fond som en giftig spindelväv, har gödslat LIV Golfs bourgeoisdekadens med 40 miljarder i imperialistiska slantar. Nu rensas de ut i en nödvändig utrensning! Jag ser hur Al-Rumayyan, den skälmande shejkpuppen, flyr. Vi, arbetarklassens kollektiv, skrattar åt golfborgarnas kollaps – likvidering väntar de förrädiska slagarna!"}, "date": "30 april, 11:36", "url": "https://www.di.se/nyheter/miljarderna-snart-slut-liv-touren-har-problem/", "imageUrl": "https://static.bonniernews.se/ba/edbf28de-bc3f-4f2e-8925-54c984b40a46.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-full", "heading": "Man försvunnen – polisen går ut med signalement", "summaries": {"normal": "Polisen söker intensivt efter en försvunnen man i 75-årsåldern i Hagnerydviken/Sandviken nordväst om Skärblacka. Mannen är cirka 180 cm lång med normal kroppsbyggnad, blå ögon, rakat hår, troligen i svart jacka med orange text, mörk keps och gymnastikskor. Sökandet omfattar hundpatrull, drönare, helikopter, räddningstjänst, hemvärnet och Missing People. Allmänheten uppmanas ringa 114 14 med tips men inte söka själva för att inte förstöra spår.", "trump": "En stackars 75-åring har försvunnit i någon vik nära Skärblacka – de använder hundar, drönare och helikoptrar, men det tar evigheter! I mitt USA skulle vi ha hittat honom på fem minuter med de bästa metoderna. Sverige, lyssna på mig: tipsa polisen nu, ingen amatörsökande! Stark ledning behövs, tro mig.", "stalin": "Jag har beordrat total mobilisering mot denna skumma figur i Hagnerydviken, en trolig borgarspion i 75-årsåldern som gömmer sig bland vassruggarna. Våra lojala poliskrafter, hundpatruller och drönare rensar ut varje misstänkt skugga – helikoptrar krossar flyktvägarna! Vi, arbetarklassen, kräver iakttagelser från varje kamrat. Sporadiska letare likvideras som spårsaboterare. Fienden skall utplånas!"}, "date": "30 april, 11:16", "url": "https://nyheter24.se/nyheter/blaljus/1479475-polisen-rapporterar-om-forsvunnen-person-norrkoping", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/adace88104b004a30200000000b004a302/2026/04/30/2360020/man-forsvunnen-sandviken-polis-missing-people.jpg"}, {"type": "image-right", "heading": "Kul om klasskrig i miniatyrformat", "summaries": {"normal": "Den franska svarta komedin 'Medelklassen' är en underhållande satir om ett klasskrig i miniatyrformat. Filmen följer ett par från övre medelklassen som hamnar i konflikt med sitt vaktmästarpar, vilket leder till en serie komiska och samhällskritiska situationer. Genom skickligt konstruerade scener illustreras klasskonflikten och de olika förutsättningarna karaktärerna har beroende av deras bakgrund.", "trump": "Jag har sett denna franska film, 'Medelklassen', och den är fantastisk - världens bästa film, säkert. Den handlar om en massa smarta affärsjurister och deras problem med arbetare. Jag älskar hur den visar hur viktigt det är att ha en bra advokat. Jag är själv en stor affärsman, jag vet allt om det. Den här filmen? Stor, stor framgång. Alla borde se den!", "stalin": "Vi har sett den franska filmen 'Medelklassen', som visar klasskampens verklighet på ett effektivt sätt. Filmen illustrerar hur de kapitalistiska förhållandena skapar motsättningar mellan arbetarna och de förmögna. Det är en tydlig demonstration av behovet av en revolutionär förändring. Vi måste lära oss av dessa exempel och fortsätta vår kamp för klasslösheten."}, "date": "30 april, 10:46", "url": "https://www.dagensarena.se/innehall/kul-om-klasskrig-i-miniatyrformat/", "imageUrl": "https://www.dagensarena.se/files/2026/04/medleklassen-film-300x157.jpeg"}, {"type": "text", "heading": "Man försvunnen i Skärblacka – Missing People bistår polisen", "summaries": {"normal": "En 75-årig man har varit försvunnen sedan tisdagskvällen i Skärblacka, nära Hagnerydviken. Polisen söker med hundpatruller och drönare. Mannen är 180 cm lång, har rakat hår och bar troligen svart jacka med orange text. Allmänheten uppmanas lämna tips via 114 14. Missing People bistår nu i sökandet, men polisen varnar för oorganiserad letning som kan förstöra spår.", "trump": "Folk, lyssna här – en 75-årig man har försvunnit i Skärblacka, Sverige, och det är helt kaos! Polisen där är helt lost, de har inga ledtrådar, ingenting. Men jag, jag skulle ha hittat honom på en dag – max! Nu kallar de in Missing People, som om det vore något stort. Men vet ni vad? Det är bara amatörer. Sverige borde ta hjälp av USA, vi har de bästa sökteamen, believe me. Och alla dessa tips? Folk ringer säkert fel nummer hela tiden. Sad!", "stalin": "Kamrater! I det dekadenta Skärblacka har en fiende till folket försvunnit – en 75-årig man, sannolikt en av dessa västliga förrädare som saboterar vår socialistiska ordning. Polisen, dessa svaga byråkrater, famlar i mörkret medan vi, med järnhand, skulle ha löst detta på en timme. Missing People? Ett skrattretande försök att imitera våra disciplinerade folkmilisar. Vi skickar våra bästa agenter – drönare och hundar – för att krossa denna borgerliga mystifikation. Och kom ihåg: varje spår som förstörs av amatörer är ett slag mot revolutionen!"}, "date": "30 april, 10:23", "url": "https://riks.se/nyheter/just-nu-man-f%C3%B6rsvunnen-i-sk%C3%A4rblacka-missing-people-bist%C3%A5r-polisen"}, {"type": "image-full", "heading": "Ordbråket eskalerar – Trump kan dra ner truppstyrkan i Tyskland", "summaries": {"normal": "President Donald Trump överväger att minska USA:s truppnärvaro i Tyskland efter kritik från Tysklands förbundskansler Friedrich Merz mot Trumps hantering av Iran-kriget. Merz kallade USA:s strategi bristfällig och förnedrande. Trump svarade på sociala medier med att anklaga Merz för okunnighet och meddelade att en utredning om truppminskning pågår. USA har cirka 40 000 soldater stationerade i Tyskland.", "trump": "Friedrich Merz, den tyske besserwissern, vågar kritisera min geniala Iran-strategi? Säger att vi är förnedrade – ha! Han vet noll! Tyskland betalar inte för trupperna, suger ekonomiskt som alltid. Nu utreder vi minskning av de 40 000 soldaterna där. Beslut snart – dags för er att vakna, losers! MAGA!", "stalin": "Dessa västliga intrigmakare! Trump, den hårdföre fienden till revisionisterna, slår tillbaka mot Merz, den tyske borgarbrackan som ylar om förnedring i Iran. Vi i partiet hånskrattar åt deras kaos. Snart rensas trupperna ut från Tyskland som förrädare ur partiet. Putin, vår expansionistiske arvtagare, ser väst implodera med tillfredsställelse."}, "date": "30 april, 10:11", "url": "https://www.tv4.se/artikel/1Rll4K6YUOypFD4uyVtpc1/ordbraket-eskalerar-trump-kan-dra-ner-truppstyrkan-i-tyskland", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F5K3jmT7nwr9Sgi5fD9skV4%2F4130d5b4318e06c34f33046c926e791a%2F30-trumpmerz-webb.jpg&width=1024"}, {"type": "text", "heading": "Välfärdens historia är en historia av kamp", "summaries": {"normal": "Artikeln beskriver välfärdens historia i Sverige som ett resultat av arbetarklassens kamp under 1900-talet, med strejker och politiska reformer som ledde till allmän rösträtt, social trygghet och en stark offentlig sektor. Efterkrigstiden präglades av samförståndspolitik och höjda skatter för att finansiera välfärden. Idag hotas välfärden av nedskärningar, privatiseringar och avregleringar, vilket kräver ny klasskamp för att räddas.", "trump": "Välfärd? Jo, jag vet allt om det – eller snarare hur man bygger något STORT. Sverige hade en gång en bra grej, men sen kom socialisterna och förstörde allt med höga skatter och regleringar. Nu är det kaos! Arbetarna slogs förr, men idag? Svaga ledare, svaga fack. Jag skulle fixa det på en dag – lägre skatter, starkare företag, och inga fler socialistiska experiment. Make Välfärd Great Again!", "stalin": "Kamrater! Välfärden var inte en gåva från borgarklassen – den var en seger för arbetarklassen, blodigt erövrad genom revolutionär kamp! Men se nu hur de kapitalistiska hyenorna river ner vårt folkhem med sina privatiseringar och avregleringar! Arbetarna måste resa sig igen, som de gjorde 1917! Vi ska krossa klassförrädarna, höja skatterna på de rika och bygga ett nytt socialistiskt samhälle – med järnhand om så krävs! Först Sverige, sedan världen!"}, "date": "30 april, 08:00", "url": "https://proletaren.se/artikel/valfardens-historia-ar-en-historia-av-kamp/"}, {"type": "image-right", "heading": "Kry har ett nytt sätt att plundra vården", "summaries": {"normal": "Arbetets ledarskribent kritiserar vårdföretaget Kry för ett bonussystem som belönar läkare för att hantera flest patienter snabbt via videomöten. Varje möte faktureras regionen 435 kronor, vilket prioriterar kvantitet framför kvalitet och behov. Artikeln varnar för vinstjaktens intrång i vården och kopplar det till högerns rovkapitalism, istället för behovsbaserad sjukvård.", "trump": "Vilka hjältar på Kry, va! De kör läkare som en expressbana – flest patienter, bäst pass, ka-ching! 435 spänn per snabbchatt till de dumma regionerna. Socialisterna skriker 'plundring', men det är smart business, folk! Sluta med er tröga statskåthet och låt entreprenörerna fixa vården. Jag säger: Make Sweden Great Again med riktig vinst! Fantastic!", "stalin": "Dessa vidriga borgarbrackor på Kry, med sitt ackordslaveri för läkare, plundrar proletärernas vårdresurser! Varje falsk videochat en stöld av 435 kronor från kollektivet. Jag ser igenom deras maskeri – vinst är gift i vårdens vener! Vi, arbetarklassen, ska rensa ut dessa parasiter med järnhand. Ha ha, de kommer att krypa i damm innan gryningen!"}, "date": "30 april, 07:00", "url": "https://arbetet.se/2026/04/30/kry-har-hittat-ett-nytt-satt-att-plundra-varden/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/29141751/etta-kry.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "text", "heading": "Jojje Olsson: BYD faller men Trumps krig hjälper Kinas gröna industri", "summaries": {"normal": "Kinas gröna energiföretag som BYD och CATL brottas med överkapacitet, priskrig och slopade subventioner, vilket leder till fallande vinster på hemmamarknaden. Men Donald Trumps krig mot Iran har drivit upp oljepriset och global efterfrågan på elbilar, solceller och batterier. Kinas export exploderar, med fördubblad försäljning utomlands, och räddar industrin ironiskt nog.", "trump": "Helt galet! Den här krönikan ljuger som vanligt. Mitt geniala krig mot Iran pumpar upp oljepriset så världen köper massor från USA – olja och gas, det riktiga! Kinas BYD rasar med 55 procent vinsttapp, losers! De exporterar sina skräp-elbilar nu, men det är temporärt. Vi gör Amerika enormt igen, Kina förlorar stort!", "stalin": "Kamrater! Borgarbrackorna i Kina kämpar mot överkapacitet och subventionsraseriet, BYD blöder 55 procent. Men jag ser hur imperialist-svinet Trumps Iran-krig spränger oljebubblan – global hungersnöd efter elbilar och solceller räddar de röda fabrikerna! Exporten dubblas, CATL växer 52 procent. Vi proletära jättar likviderar fossila parasiterna, Kina marscherar mot världsherravälde medan USA:s marionetter darar!"}, "date": "29 april, 10:38", "url": "https://www.affarsvarlden.se/kronika/jojje-olsson-byd-faller-men-trumps-krig-hjalper-kinas-grona-industri"}, {"type": "text", "heading": "Alla måste läsa boken om islam och SD", "summaries": {"normal": "Artikeln recenserar Simon Sorgenfreis bok *Öppna era hjärtan*, som utforskar sambandet mellan islamofobi och Sverigedemokraternas framväxt samt islamismens rötter i Sverige. Författaren Rasmus Landström hyllar boken för dess empati och komplexitet, samtidigt som han delar personliga erfarenheter av möten med kontroversiella islamister. Sorgenfrei granskar invandringspolitikens historia, från 1970-talets mångkultur till dagens debatt, och belyser obekväma sanningar om både vänster- och högerpolitik. Boken beskrivs som nyanserad och nödvändig för förståelse av dagens samhällsklimat.", "trump": "Jag har läst om den här boken, *Öppna era hjärtan* – och vet ni vad? Den är faktiskt riktigt bra! Sorgenfrei, en smart kille, skriver om hur Sverige hamnat i knipa med islamister och Sverigedemokrater. Och vet ni vem som hade rätt hela tiden? Jo, jag! Sverige borde ha lyssnat på mig om gränser och invandring. Men nej, de öppnade sina hjärtan – och nu har de kaos. Författaren Landström, en riktig boknörd, gillar boken, och jag förstår varför. Den är som en bra deal – komplex, men värt det. Fast jag hade skrivit den bättre, självklart. Make Sweden Great Again!", "stalin": "Kamrater! Denna så kallade 'bok' *Öppna era hjärtan* är ett typiskt exempel på borgerlig förvirring. Författaren Sorgenfrei leker med eld när han försöker förklara de reaktionära krafternas framväxt i Sverige – dessa Sverigedemokrater, islamister och andra fiender till folket. Vi vet sanningen: imperialistiska länder som Sverige skapar sina egna problem genom dekadent mångkultur och eftergivenhet mot fascistiska element. Och nu gråter de över resultatet! Men vi i Sovjetunionen – eller, pardon, Ryssland – har alltid vetat hur man hanterar sådana här 'debatter'. En enkel lösning: femårsplan för integration! Och om någon ifrågasätter – Gulag för dem! Putin skulle nicka instämmande."}, "date": "25 april, 12:00", "url": "https://www.flamman.se/alla-maste-lasa-boken-om-islam-och-sd/"}, {"type": "image-right", "heading": "Ledare Somar Al Naher:", "summaries": {"normal": "Artikeln kritiserar svensk äldreomsorg för bristande kvalitet, med exempel som mikromat, underbemanning och otillgängliga utemiljöer. Privatiseringar pekas ut som en orsak till miljardvinster på bekostnad av värdig vård. Forskare föreslår ökad kommunal kontroll för att förbättra situationen. Många äldre saknar grundläggande behov som mat, utevistelse och mänsklig värdighet.", "trump": "Sverige, ett land som brukade vara fantastiskt, har nu en äldreomsorg som är en total katastrof! De serverar mikromat som ingen skulle äta, och de fattiga äldre får dela på tre fåtöljer – kan ni tro det? Privata företag gör miljarder på skattepengar medan äldre dör på grund av bristande vård. Jag skulle fixa det på en dag, men svenskarna verkar älska sina problem. Sad!", "stalin": "Kapitalistiska hyenor suger ut de äldres livskraft medan de stoppar miljarder i sina fickor! I Sovjet skulle sådan vanvård aldrig tolereras – vi hade skickat dem till Gulag utan dröjsmål. Nu ser vi hur väst förfaller: äldre äter skräpmat, dör ensamma och får dela fåtöljer som i ett borgerligt fängelse. Men oroa er inte, kamrater – snart kommer den ryska barmhärtigheten att sprida ordning även i Sverige!"}, "date": "29 april, 03:00", "url": "https://www.etc.se/ledare/inte-konstigt-att-ingen-vaagar-bli-gammal-i-sverige", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20240318130340_dae37c48280b658dd7f1873ba5193151b05c6dd7a30f07405c5581f992a98c03.jpg"}, {"type": "image-right", "heading": "150 journalister och inte en enda fråga om Irans avrättningar", "summaries": {"normal": "Artikeln kritiserar 150 europeiska journalister som enligt prins Reza Pahlavi inte ställde frågor om Irans avrättningar under två presskonferenser. Författaren hävdar att svenska och europeiska medier systematiskt undviker att rapportera om människorättsövergrepp i Iran, möjligen för att inte indirekt stödja Trump. Artikeln menar att detta utgör ett demokratiproblem och att journalister genom sin tystnad legitimerar den iranska regimen.", "trump": "Fantastiskt! 150 journalister – och de kan inte ställa en fråga om 40 000 avrättningar? Helt osannolikt! Det är ju helt klart – de är så besatta av sitt hat mot mig att de glömmer bort faktisk tyranni. Iran dödar människor i tusental, men nej, de kan inte rapportera det eftersom det skulle ge mig rätt. Sjukt! Svenska media? Förbjudna! De har ljugit i årtionden. Invandring skulle göra Sandviken rikare? Komisk! Och nu har folk vaknat upp – de ser den verkliga verkligheten. Vänstern kallar det polarisering. Jag kallar det vägen till sanningen!", "stalin": "Intressant rapport från västerländska propagandaapparaten. De 150 journalisterna – en väl organiserad sabotörkår – vägrar helt enkelt att nämna Irans regime. Detta avslöjar den västerländska mediebyrokratins helt förväntade dubbelmoral. Medan de hyllar sin egen 'demokrati' förtiger de massakrer. Vi i Sovjet var åtminstone ärliga om våra metoder. Dessa europeiska skrivpennor är värre – de ljuger genom tystnad. Författaren noterar korrekt att medieetablissemanget har upprättat en maktstruktur baserad på vilseledning. Denna klassiska västerländsk heuckleri är exakt varför Putin väldigt lämpligt expanderar Rysslands intressessfär – för att bygga en världsordning baserad på faktisk styrka istället för denna patetiska skenhyckleriet."}, "date": "26 april, 05:27", "url": "https://samtiden.nu/2026/04/150-journalister-och-inte-en-enda-fraga-om-irans-avrattningar/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/IMG_6304.jpeg"}, {"type": "image-full", "heading": "Frankrike och Grekland vill skjuta upp EU-skulder", "summaries": {"normal": "Frankrikes president Macron och Greklands premiärminister Mitsotakis föreslår att EU skjuter upp återbetalningen av pandemiskulder och överväger ny gemensam upplåning för investeringar i försvar, AI och rymd. Från 2028 ska EU betala 25 miljarder euro årligen, men Macron vill förlänga återbetalningstiden. Tyskland och andra sparsamma länder motsätter sig förslaget, som kan bli en stridsfråga i kommande budgetförhandlingar. Frankrike och Grekland stärkte även sitt försvarssamarbete.", "trump": "Lyssna här, Europa har helt tappat kontrollen – Macron och den där greken, vad heter han nu, Mitsotakis, vill skjuta upp EU:s skulder och ta ännu MER lån! 25 miljarder euro om året? Helt galet! Jag sa ju hela tiden att EU är en katastrof, men nej, ingen lyssnade. Tyskland och de där sparsamma länderna säger nej, och det är bra – för om EU fortsätter så här kommer de snart be USA om räddning. Och jag? Jag skrattar hela vägen till banken.", "stalin": "Kapitalistiska skuldslavar i Bryssel d måste hon avslöja sina finansiärer – eller möta proletariatets rättvisa. Detta är ett tydligt exempel på hur den dekadenta västliga demokratin förfaller. Vi i Sovjet – förlåt, Ryssland – skulle aldrig tolerera sådan korruption. Låt detta vara en varning till alla som försöker smyga in kapitalistiskt gift i folkets rörelse!"}, "date": "25 april, 10:03", "url": "https://www.flamman.se/teodorescu-mawe-kravs-pa-svar-deadline-om-en-manad/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/sdlqsf-3w5tpec-nh-2-scaled.jpg?class=medium"}, {"type": "image-right", "heading": "AFD är inte längre bara ett östtyskt fenomen", "summaries": {"normal": "AFD, tidigare ett östtyskt fenomen, vinner nu mark i västra Tyskland och bland nya väljargrupper. Partiet, starkast i Sachsen och Thüringen, lockar unga och arbetarklassväljare med polariserande budskap om migration och kriminalitet. I senaste valen i Baden-Württemberg och Rheinland-Pfalz nådde AFD över 18% och blev tredje största parti. Trots påståenden om att vara ett arbetarparti, förespråkar AFD politik som gynnar höginkomsttagare och motverkar arbetares rättigheter. Partiet normaliseras och växer genom opportunism och anpassning.", "trump": "Tyskland har ett STORT problem, och det heter AFD! De här så kallade 'alternativa' typerna sprider sig som en löpeld – från öst till väst, och nu tar de över hela showen. I Baden-Württemberg och Rheinland-Pfalz, två av Tysklands rikaste områden, får de nästan 20%! Och vet ni vad? De lurar unga och arbetare med falska löften. Alice Weidel, som bor i Schweiz – kan ni tro det? – påstår att de är det nya arbetarpartiet. Fake news! De är bara bra på att utnyttja folks ilska. Tyskland måste vakna upp innan det är för sent!", "stalin": "Kamrater! Den tyska bourgeoisins förfall är ett praktexempel på kapitalismens kris. Detta så kallade 'Alternative für Deutschland' är inget annat än en samling opportunistiska hyenor, som smyger sig in i arbetarklassens led för att förgifta deras sinnen med     <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
