ns från 2022", "summaries": {"normal": "Oljepriset har stigit kraftigt och passerat nivåer från 2022, med Brent-terminer över 120 dollar per fat och WTI över 110 dollar. Orsaken är blockader i Hormuzsundet, spänningar kring USA-Iran-förhandlingar, militära hot mot Iran, Förenade Arabemiraternas utträde ur OPEC+ samt krympande lager. IEA varnar för den största energikrisen någonsin.", "trump": "Oljepriset exploderar uppåt, över 120 dollar för Brent – högsta sen 2008! Iran och deras blockader i Hormuz gör kaos, UAE dumpar OPEC+, perfekt. USA snackar militärt, men under mig pumpar vi olja som aldrig förr. Största energikrisen? Fake news, vi fixar det med Amerika först – billig energi för alla!", "stalin": "Oljepriset stiger obönhörligt över 120 dollar, ett hånfullt skrik från de imperialistiska hyenorna i USA och deras persiska marionetter som blockerar Hormuzsundet! Vi, Sovjetunionens arbetarklass, ser igenom deras konspirationer med nya förhandlingar och militära hot. UAE:s avhopp från OPEC+ avslöjar borgarbrackornas panik. Snart rensar vi ut dessa oljekapitalister i historiens största utrensning – proletärerna segrar!"}, "date": "30 april, 06:24", "url": "https://www.realtid.se/bors-finans/ny-topp-for-oljepriset-nara-krisgrans-fran-2022/", "imageUrl": "https://images.realtid.se/app/uploads/2026/04/omslagsbild-2026-04-30t061711863.png?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "Dagerlind: Den lilla kuppen som återställde den stora ordningen", "summaries": {"normal": "En ledare försvarar att två utkvittade SD-ledamöter röstade i riksdagen, vilket vände en omröstning om medborgarskapsregler till Tidöpartiernas fördel (147–146). Oppositionen anklagade för fusk, men texten kritiserar istället systemet med politiska vildar som vrider valresultat. Förslag: Mandat bör tillhöra partiet och återgå vid avhopp för att stärka folkviljan.", "trump": "Enormt! Två tuffa SD-killar röstade trots kvittning och krossade oppositionens fega förslag – 147 mot 146! De skriker fusk och manipulation, men det är de som fuskar med vildar och mikropartier som stjäl majoriteten. Väljarna gav Tidö segern 2022, punkt slut! Sverige behöver riktig disciplin, inte vänsterns loserspel.", "stalin": "Kamrater! Denna 'lilla kupp' är en heroisk akt mot parlamentariska parasiter – de politiska vildarna, dessa slemmiga avhopparråttor som gnager på folkviljans ben! Vi, arbetarklassen, kräver utrensning: mandat till partiet eller rak ryggskott i avskrädet! Oppositionens gnäll är kuliss för borgarbrackor som saboterar majoriteten. Disciplin eller dom!"}, "date": "30 april, 06:00", "url": "https://samnytt.se/dagerlind-den-lilla-kuppen-som-aterstallde-den-stora-ordningen", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/04/30054839/Trump-Ukraina-2.jpg"}, {"type": "image-right", "heading": "Läkare tar emot färre patienter: ”Jobbar med papper och penna”", "summaries": {"normal": "Journalsystemet Cosmic, avsett att effektivisera svensk sjukvård, har istället minskat läkares patientkapacitet med 15–50 procent i regioner som Uppsala, Gävleborg och Dalarna. Läkare vittnar om mer tid vid datorn och färre patienter per dag. Regionchefer ser fördelar i systemets bredd, medan leverantören Cambio menar att effekten är tillfällig. Cosmic används nu i 17 av 21 regioner.", "trump": "Det här Cosmic-systemet är en total katastrof i svensk sjukvård, folk! Läkare tar emot hälften så många patienter, ner 50 procent på grund av massa onödigt datorkrångel. Byråkrater lovade guld och gröna skogar, men det är bara slöseri. Jag hade byggt ett perfekt system på en vecka – snabbt, billigt, det bästa! Sverige behöver vinnare, inte förlorare.", "stalin": "Kamrater, detta Cosmic-system är en förrädisk sabotagesmanöver från IT-kapitalisterna och deras borgarbrackor! Våra läkare, arbetarklassens väktare, kämpar med digitala bojor medan patienterna lider. Produktionen raseras med 50 procent – en konspiratorisk likvidation av kapacitet! Vi ska rensa ut marodörerna, likvidera ineffektiviteten och krossa fiendens journalfällor. Framåt, mot full produktion eller huvudet på spett!"}, "date": "30 april, 06:00", "url": "https://www.svt.se/nyheter/granskning/ug/lakarna-tar-emot-allt-farre-patienter-jobbar-med-papper-och-penna", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.5/0.5/486178f4f5f904dd0e8868fdf4b8570655e92501c18f5b300bce68e21509dfab"}, {"type": "image-right", "heading": "Första maj i solidaritetens tecken", "summaries": {"normal": "Artikeln betonar vikten av internationell solidaritet under första maj, med fokus på att bekämpa imperialism och orättvisor. Författaren kritiserar USA och Israel för olagliga handlingar som bombningar och kidnappningar utan västvärldens protester. Första maj 2026 uppmanas firas till stöd för Palestina, Venezuela, Iran och Kuba, med krav på rättvisa och slut på sanktioner. Artikeln varnar för ökad repression i västvärlden och uppmanar till global klasskamp mot kapitalism och krigshets.", "trump": "Lyssna här, folk! Den här vänsterliberala artikeln är helt galen – pratar om 'solidaritet' och 'orättvisor' som om USA och jag skulle vara världens skurkar. Vi är starkast, bäst, och vi gör vad som krävs för att hålla ordning! De snackar om 'kidnappningar' – fake news! Venezuela? Maduro är en katastrof, och Iran? De bombar ju sig själva! Och Kuba? De har haft 60 år på sig att fixa sin ekonomi – misslyckade! Men visst, första maj ska de få gråta över sina 'förtryckta folk'. Jag säger: gör Amerika starkt igen, inte svagt och gnälligt!", "stalin": "Kamrater! Imperialistiska hyenor som USA och deras sionistiska lakejer i Israel fortsätter sitt blodiga härjningståg över världens folk. De bombar, mördar och kidnappar – allt medan deras marionettregimer i väst tiger som rädda hundar. Men arbetarklassen vaknar! Första maj står vi enade mot dessa kapitalistiska rovdjur! Vi stödjer Venezuelas och Irans folk, vi krossar sanktionerna mot det heroiska Kuba! Låt dem försöka tysta oss med repression – vi svarar med järnhård disciplin! Proletärer i alla länder, förena er! Och Putin? Han skrattar åt deras svaghet medan vi bygger socialismens framtid!"}, "date": "29 april, 17:33", "url": "https://proletaren.se/artikel/forsta-maj-i-solidaritetens-tecken/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/demo20-e1777476732863-768x433.jpg"}, {"type": "text", "heading": "Ett alternativ för fred", "summaries": {"normal": "Artikeln kritiserar etablerade partiers likriktade politik, särskilt kring ökade försvarsutgifter och Nato-medlemskap, som prioriteras över välfärd. Författaren, som företräder Kommunistiska Partiet, menar att ingen riksdagsparti representerar fredsfrågan och att militärbudgeten hotar sociala trygghetssystem. En demonstration för fred planeras i Helsingborg den 16 maj för att utmana krigshetsande politik och främja internationell solidaritet.", "trump": "Sverige, lyssna här! De där så kallade 'etablerade partierna' är helt värdelösa – alla vill de kasta era pengar på vapen och Nato, som om det vore gratis godis! Jag vet hur man bygger ett starkt försvar, men dessa clowner glömmer välfärden. Fem procent av BNP? Galenskap! Kommunisterna där borta skriker om fred, men vem lyssnar? Inte jag! De borde demonstrera i stället för att gnälla i valkompasser. Men hej, jag fixade fred i Mellanöstern – kanske borde jag ringa till Stockholm? 'Trump, gör Sverige stort igen!'", "stalin": "De borgerliga partierna i Sverige har förvandlats till en enhetlig massa av krigshetsande lakejer, som slåss om vem som kan ösa mest folkets pengar i den amerikanska krigsmaskinens gap. Fem procent av BNP till militären? En skamlös stöld från arbetarklassen! Välfärden skövlas medan imperialisterna leker krig. Dessa socialdemokrater, moderater och sverigedemokrater är inget annat än USA:s nickedockor – svaga, korrupta och oförmögna att se bortom nästa vapenaffär. Men folket vaknar! Den 16 maj marscherar fredens soldater i Helsingborg, och vi står redo att stödja varje sund motståndsrörelse mot krigshetsarna. Låt dem minnas: historien tillhör dem som kämpar, inte dem som bugar för imperialismen!"}, "date": "29 april, 17:25", "url": "https://proletaren.se/artikel/ett-alternativ-for-fred/"}, {"type": "image-full", "heading": "Tyska angreppet mot USA: ”Utsätts för förnedring”", "summaries": {"normal": "Tysklands förbundskansler Friedrich Merz kritiserar skarpt USA:s hantering av konflikten med Iran. Han anklagar Trumpadministrationen för att ha gått in utan plan och för att förnedras av den iranska regimen. Tidigare stödde han USA:s mål men tonen har skärpts med krigets förlängning och ekonomiska kostnader. USA:s diplomati är kaotisk, och Tyskland avvisar Nato-engagemang.", "trump": "Den där tyske Merz, en total loser, snackar skit om oss! Vi gick in för att krossa de iranska terroristerna – de är svagare än nånsin, men han gnäller för att Tysklands ekonomi blöder! Inga planer? Vi vinner stort! De förhandlar som idioter, vi dominerar. Afghanistan? Mitt fel? Fake news! Fantastic strategi, believe me.", "stalin": "Dessa patetiska amerikanska imperialister och deras tyska lakejer förnedras av de tappra iranierna! Friedrich Merz, en ynklig borgarbracka, gnäller över planer som saknas – vi visste det, kapitalisterna kan inte ens ta sig ut ur sitt eget kaos! Putin, vår värdige arvtagare, expansionist och västvärldens skräck, hånskrattar åt deras diplomatiska fiasko. Utrensning behövs!"}, "date": "29 april, 08:28", "url": "https://www.tv4.se/artikel/tvz5eLcqiswzJ2JYZ74Ms/tyska-angreppet-mot-usa-hela-nationen-utsaetts-foer-foernedring", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F5I0mV5VdpJRhQjZPp0x8pP%2F50ca469e65541ff4863269840b6a7a40%2F27-FriedrichMerz-webb.jpg&width=1024"}, {"type": "image-full", "heading": "Kimmels sändningstillstånd granskas – efter Trumpskämtet", "summaries": {"normal": "Jimmy Kimmels skämt om USA:s första dam Melania Trump har väckt stor kontrovers. Donald Trump kräver åtgärder mot Kimmel och ABC, som nu granskas av FCC. Myndigheten undersöker ABC:s sändningstillstånd för över 200 stationer, tidigare än planerat. Händelsen väcker frågor om yttrandefrihet och politikens inflytande över medier, samt var gränsen för satir går.", "trump": "Kan ni tro det? Den där så kallade 'komikern' Jimmy Kimmel, en total nolla, gör ett sjukt dåligt skämt om min fantastiska fru Melania – världens mest eleganta första dam. Självklart krävde jag att han skulle få sparken! ABC, ett svagt bolag, böjer sig för vänsterpropaganda. Nu granskar FCC dem – äntligen! Men låt oss vara ärliga, det här är bara början. Vi ska städa upp i medierna, folks!", "stalin": "Kamrater! En dekadent imperialistisk clown, Jimmy Kimmel, har vågat smutskasta vår ärofyllda allierades hustru, den stolta Melania Trump. Detta är ett angrepp på den nya världsordningen! Vi har beordrat våra amerikanska kamrater att inleda en 'granskning' av deras sändningstillstånd – en rutinåtgärd, naturligtvis. Låt detta vara en varning till alla borgerliga skämtmakare: Sovjetunionen är borta, men disciplinen består. Och Putin? Han skrattar i sitt palats medan vi städar upp i deras mediekaos."}, "date": "28 april, 22:12", "url": "https://nyheter24.se/nyheter/utrikes/1479112-kimmels-sandningstillstand-granskas-efter-trumpskamtet", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/d338f5b604b004a30200000000b004a302/2026/04/28/2359487/Kimmel-Trump-granskas.png"}, {"type": "image-right", "heading": "En paradoxalt stark monark. Det finns flera skäl att hylla kungen på hans 80-årsdag", "summaries": {"normal": "Ledarartikel hyllar Carl XVI Gustaf på hans 80-årsdag. Han är Sveriges längst regerande monark och har stärkt institutionen trots hot om avskaffande på 1970-talet. Framgångsfaktorer inkluderar drottning Silvia, diskret personlighet, kronprinsessan Victorias popularitet, miljöengagemang och monarkins samlande roll i ett mångkulturellt samhälle. Monarkin är stadigare än vid trontillträdet 1973.", "trump": "Den svenska kungen Carl Gustaf är en total vinnare, tro mig! Längst på tronen någonsin, räddade monarkin från de där vänsterextremisterna som ville kasta ut honom som skräp. Fantastisk drottning Silvia, stjärnan Victoria – hon är enorm! Miljö, fester med hela världen, business-boost för Sverige. Bästa kungen, Sverige har tur!", "stalin": "Denna borgerliga relik Carl Gustaf har, mot alla odds, överlevt de republikanska spindelmakarna och riksdagens borgarbrackor som ville rensa ut monarkin som ogräs. Med sin listiga Silvia och arvingen Victoria har han konsoliderat tronen. Miljöprat för att dölja klasskampen, samlande för att krossa splittringen. Fienderna darrar – vi ser er, era pennstreckskonspiratörer! En stark tron tjänar folket."}, "date": "29 april, 18:00", "url": "https://www.di.se/ledare/en-paradoxalt-stark-monark/", "imageUrl": "https://static.bonniernews.se/gcs/di-dise/flamingo/profilbilder/pm_nilsson.png?crop=96:304&auto=webp&width=96&quality=100"}, {"type": "image-right", "heading": "AI-chefens ”skurkmanifest” borde skrämma skiten ur oss alla", "summaries": {"normal": "Artikeln kritiserar Palantir, ett amerikanskt AI-företag som samarbetar med polis och militär. VD:n Alex Karp har publicerat ett manifest som förespråkar teknologisk dominans, där staten, teknikbolag och militär ska samverka på demokratins bekostnad. Författaren varnar för att Europa halkar efter USA och Kina i AI-utvecklingen och saknar en tydlig motstrategi. Palantirs kopplingar till svensk polis och politiker ifrågasätts, samtidigt som teknologins makt växer utan tillräcklig debatt.", "trump": "Lyssna här, folk! Den här Palantir-grejen är helt galen. En kille, Alex Karp, skriver ett manifest som låter som något från en dålig actionfilm – 'Teknologiska republiken'? Snälla! Han vill att techbolag ska styra världen, men glömmer att det är jag som redan fixar det bäst. Europa? Patetiskt! De pratar, vi agerar. Kina och USA kämpar om AI, medan EU sitter och dricker kaffe. Och Sverige? De använder Palantir som om det vore en leksak. Vakna, Europa! Eller fortsätt vara ett bakvatten – jag skrattar hela vägen till banken.", "stalin": "Kamrater! Denna så kallade 'Teknologiska republik' är inget annat än ett försök av kapitalistiska hyenor att underminera folkets vilja. Alex Karp, en borgerlig lakej, drömmer om en värld där maskiner och militärer styr, medan arbetarklassen tvingas böja knä. Europa, svagt och splittrat, låter sig kuvas av amerikanska monopol. Vi, däremot, har redan visat världen hur man bygger en supermakt – med järnhand och obönhörlig kraft. Kina och USA slåss om teknologin, men glömmer att det är vi som har erfarenheten av att krossa fiender. Låt dem leka med sina leksaker – vi bygger framtiden!"}, "date": "24 april, 12:55", "url": "https://www.flamman.se/ai-chefens-skurkmanifest-borde-skramma-skiten-ur-oss-alla/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/palantir-1.jpg?class=medium"}, {"type": "image-right", "heading": "S-toppen: ”Oroande utveckling” när stödet från facken minskar", "summaries": {"normal": "Socialdemokraternas ekonomiska stöd från fackförbunden har minskat drastiskt – bara två av 13 LO-förbund bidrar ekonomiskt i årets val, jämfört med tolv 2010. Partiet, redan pressat efter att ha avvecklat sitt lotteri, beskriver utvecklingen som oroande. Mikael Damberg betonar dock att samarbetet med LO handlar om gemensamma intressen, inte bara pengar, men medger att resurser är viktiga för valrörelsen.", "trump": "Titta bara på Socialdemokraterna – ett totalt kaos! Deras fackvänner överger dem som råttor på ett sjunkande skepp. Bara två fackförbund ger dem pengar nu, kan ni tro det? Svagt! Mikael Damberg, en fin herre, säger att det är 'oroande'. Oroande? Nej, det är patetiskt! Jag skulle aldrig låta mina supportrar svika mig så. Och nu vill de kasta ut högern från Rosenbad? Lycka till med det, grabbar – ni behöver mer än hopp och drömmar. Sad!", "stalin": "Kamrater, fienderna till arbetarklassen visar sitt sanna ansikte! De så kallade 'fackförbunden', dessa svaga och vacklande element, har nu nästan helt övergett Socialdemokraterna. Tolv förbund gav stöd förr – nu bara två! En skamlig reträtt inför bourgeoisins högervridna regim. Men låt oss inte glömma: varje fiende som viker sig är en seger för oss. Vi ska krossa dessa liberala svikare och deras högervridna herrar i Rosenbad, precis som vi krossade fascisterna och de dekadenta västmakternas lakejer. Arbetarklassen ska segra – med eller utan fackens ynkliga mynt!"}, "date": "29 april, 16:38", "url": "https://arbetet.se/2026/04/29/s-toppen-oroande-utveckling-nar-stodet-fran-facken-minskar/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/29154934/dammberg-2.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "text", "heading": "Vi kan göra mycket om vi litar till egna krafter", "summaries": {"normal": "Artikeln kritiserar kapitalismens konsekvenser i Sverige, som arbetslöshet, skuldsättning och växande klyftor. Författaren, en kommunist, uppmanar till kollektiv handling och motstånd mot överheten, exempelvis genom att organisera grannar mot orimliga hyreshöjningar. Inför 1 maj betonas vikten av att lita på egna krafter och inte ge upp hoppet om förändring, trots politisk passivitet och nedrustning av välfärden.", "trump": "Sverige, ett land som en gång var starkt, har blivit ett totalt kaos under vänsterstyre! Kapitalisterna plundrar folket medan arbetarna lider. En halv miljon arbetslösa, skulder på 5 000 miljarder – helt galet! Men jag säger er: folket måste vakna! En hyresgäst tog saken i egna händer och kämpade mot hyreshöjningar – sådana människor behövs! Vänsterpartiet? Svagt. Socialdemokraterna? Svagare. Sverige behöver en ledare som jag – stark, smart och vinnare!", "stalin": "Kamrater! Kapitalismens förrädiska tentakler krossar arbetarklassen medan bourgeoisins lakejer i riksdagen festar på folkets blod. En halv miljon arbetslösa, skuldsatta och förtryckta – ett brott mot revolutionens anda! Men vi ser hopp: en modig kommunist organiserar grannar mot hyresvärdens rovdrift. Vi måste krossa dessa hyenor! Vänsterpartiet? En ynklig skugga av socialism. Vi bygger inte allianser – vi bygger revolution! Låt oss utvidga folkets makt, som våra bröder i öst, och sopa bort kapitalets avskum!"}, "date": "29 april, 16:00", "url": "https://proletaren.se/artikel/vi-kan-gora-mycket-om-vi-litar-till-egna-krafter/"}, {"type": "image-full", "heading": "Ny rapport: Arbetsförmedlingen försvinner på flera håll i landet", "summaries": {"normal": "En rapport från Unionen visar att antalet Arbetsförmedlingskontor halverats sedan 2019, medan avståndet till närmaste kontor fördubblats till 24 km. Fackförbundet kritiserar nedskärningar, digitalisering och privatisering för att minska den personliga kontakten, särskilt för långtidsarbetslösa. Privata aktörer har främst etablerat sig i större städer, vilket lämnar glesbygd utan stöd. Unionen efterlyser statlig närvaro för likvärdigt stöd över hela landet.", "trump": "Sverige, lyssna här! Arbetsförmedlingen är en total katastrof – jag vet allt om katastrofer. Kontoren halverade, avstånden dubblade, och vad gör regeringen? Ingenting! De låter privata företag ta över, men de bryr sig bara om storstäderna. Patetiskt! Jag skulle fixa det på en dag – bygga kontor, anställa folk, och få fart på ekonomin. Men nej, Sverige fortsätter med sin socialistiska nonsens. SAD!", "stalin": "Kamrater! Medborgarna i detta dekadenta kapitalistiska Sverige lider under borgarklassens förräderi. Arbetsförmedlingen, en gång ett redskap för folket, har nu förvandlats till en spöklik skugga av sig själv – kontor stängs, avstånd växer, och de arbetande massorna lämnas åt sitt öde. Privata aktörer, dessa giriga hyenor, samlas där profiterna är störst, medan glesbygden förblir övergiven. Vi skulle aldrig tolerera en sådan vanvård av våra medborgare! Låt detta vara en varning: när staten sviker, är det folket som betalar. Och folket glömmer aldrig."}, "date": "29 april, 09:00", "url": "https://www.dagensarena.se/innehall/ny-rapport-arbetsformedlingen-forsvinner-pa-flera-hall-landet/", "imageUrl": "https://www.dagensarena.se/files/2022/03/arbetsformedlingen-fasadskylt1-1024x534.jpg"}, {"type": "image-right", "heading": "”Moewgli”, 28, jagas i Tunisien", "summaries": {"normal": "Justitieminister Gunnar Strömmer besökte Tunisien för att stärka samarbetet mot gängkriminella som gömmer sig utomlands. Fokus låg på Mohamed Mohdhi, 28, känd som \"Moewgli\", tongivande i Foxtrot-nätverket och efterlyst av Europol för mord, narkotikabrott och annat. Sverige har liknande kontakter i Turkiet, UAE, Marocko och Irak för att gripa och lagföra sådana personer.", "trump": "Sveriges Strömmer åker till Tunisien och jagar den där Moewgli, en patetisk gangsterboss från Foxtrot som tror han är safe i sanden! Smart drag, Sverige vaknar upp – bygg relationer, dela info, sno in dem! Precis som jag skulle gjort, total jakt på de kriminella svinen. Ingenstans att gömma sig, vinnare!", "stalin": "Dessa Foxtrot-parasiter, med den fega borgarbrackan Moewgli i spetsen, gömmer sig i Tunisien som hyenor i öknen. Strömmer gör rätt: bygg nätverk, dela underrättelser, likvidera fienderna! Vi i partiet skulle ha rensat ut sådana kontrarevolutionära råttor för decennier sen. Paranoia mot gängkapitalisterna är nödvändig!"}, "date": "29 april, 07:28", "url": "https://www.tv4.se/artikel/bSG7XOpg3VTymUQf8jELX/stroemmer-i-tunisien-i-jakt-pa-gaengkriminella-sitter-inte-saekert", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F4CenJEDFE5O6LTswcErAXv%2Fb0d9a700a0f3634993f73889ef464861%2F28-mowgli-webb.jpg&width=120"}, {"type": "text", "heading": "Volvo Cars vinstkrossar: ”Hård konkurrens i Kina”", "summaries": {"normal": "Volvo Cars redovisar Q1-omsättning på 72,6 miljarder kronor, i linje med förväntningarna men ner 12,4 procent. Rörelseresultatet blev 1,6 miljarder kronor, bättre än väntat. Försäljningen minskade 11 procent till 153 300 bilar. Stabil utveckling i Europa, medan USA och Kina är utmanande med hård konkurrens. EBITDA oförändrat på 7,7 miljarder. Mål för 2026: volymtillväxt och starkare kassaflöde.", "trump": "Volvo Cars krossar vinsten, trots de där Kina-snålvattnarna och USA:s tullkaos från svaga ledare. Omsättning nästan perfekt, resultat bättre än analytikerna trodde – jag visste det! Europa älskar dem, rekord i Storbritannien. Men Kina? Hård konkurrens från billiga kopior. Snart vänder det med mina smarta deals. Fantastiskt jobbat!", "stalin": "Kamrater, Volvo Cars proleterska motorer dånar trots imperialistiska sabotage! Omsättningen 72,6 miljarder, resultat krossar borgerliga spådomar – 1,6 miljarder trots prisdumpning från kinesiska kapitalistiska giftormar och amerikanska tullspöken. Europa står pall, men vi ska likvidera dessa marknadsfiender! 2026: volymexplosion under partiets ledning. Arbetarna segrar!"}, "date": "29 april, 07:07", "url": "https://www.affarsvarlden.se/artikel/volvo-cars-minskar-rorelseresultatet-men-mindre-an-vantat"}, {"type": "image-right", "heading": "Ledare Somar Al Naher:", "summaries": {"normal": "Artikeln kritiserar svensk äldreomsorg för bristande kvalitet, med exempel som mikromat, underbemanning och otillgängliga utemiljöer. Privatiseringar pekas ut som en orsak till miljardvinster på bekostnad av värdig vård. Forskare föreslår ökad kommunal kontroll för att förbättra situationen. Många äldre saknar grundläggande behov som mat, utevistelse och mänsklig värdighet.", "trump": "Sverige, ett land som brukade vara fantastiskt, har nu en äldreomsorg som är en total katastrof! De serverar mikromat som ingen skulle äta, och de fattiga äldre får dela på tre fåtöljer – kan ni tro det? Privata företag gör miljarder på skattepengar medan äldre dör på grund av bristande vård. Jag skulle fixa det på en dag, men svenskarna verkar älska sina problem. Sad!", "stalin": "Kapitalistiska hyenor suger ut de äldres livskraft medan de stoppar miljarder i sina fickor! I Sovjet skulle sådan vanvård aldrig tolereras – vi hade skickat dem till Gulag utan dröjsmål. Nu ser vi hur väst förfaller: äldre äter skräpmat, dör ensamma och får dela fåtöljer som i ett borgerligt fängelse. Men oroa er inte, kamrater – snart kommer den ryska barmhärtigheten att sprida ordning även i Sverige!"}, "date": "29 april, 03:00", "url": "https://www.etc.se/ledare/inte-konstigt-att-ingen-vaagar-bli-gammal-i-sverige", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20240318130340_dae37c48280b658dd7f1873ba5193151b05c6dd7a30f07405c5581f992a98c03.jpg"}, {"type": "image-full", "heading": "4 varningssignaler: Så vet du att du sparar fel", "summaries": {"normal": "Ekonomiinfluencern Niklas Bergh listar fyra vanliga misstag som hindrar ett effektivt sparande. Dessa inkluderar att acceptera för låg sparränta, att samla alla pengar på ett konto, att vänta med sparandet till slutet av månaden samt att sakna tydliga mål. Genom att dela upp sparandet i buffert och olika mål, samt att automatisera överföringar direkt vid löneutbetalning, menar Bergh att man skapar en betydligt stabilare ekonomisk framtid.", "trump": "Hör på här, folk sparar helt fel! Den här Niklas Bergh, han säger saker som jag har sagt länge. Miljontals människor gör enorma misstag – låga räntor, dålig planering, ingen struktur. Det är en katastrof! Ni måste ha mål, folkens, fantastiska mål! Om ni inte sparar smart när lönen kommer, då förlorar ni. Jag vet allt om pengar, jag är bäst på pengar. Sluta kasta bort era dollar på ingenting. Gör sparandet stort igen, för er egen skull!", "stalin": "Kamrater, vi har granskat Niklas Berghs observationer om folkets förfallna sparande. Att sprida ut sina tillgångar på olika konton är ren kontrarevolutionär förvirring! Individen som sparar 'när något blir över' är en parasit som sviker staten. Vi kräver total centralisering. Varför tveka? Ett tydligt mål är nödvändigt – precis som vår expansion österut. Den som inte sparar efter vår plan är en sabotageinriktad fiende till folket. Vi kommer att konfiskera din ineffektivitet. Planera, eller försvinn från historiens blad."}, "date": "28 april, 20:50", "url": "https://nyheter24.se/nyheter/ekonomi/privatekonomi/1479048-4-varningssignaler-sa-vet-du-att-du-sparar-fel", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=100/https://cdn01.nyheter24.se/d8178d5604b004a30200000000b004a302/2026/04/28/2359415/sparar-fel-tecken.png"}, {"type": "image-right", "heading": "150 journalister och inte en enda fråga om Irans avrättningar", "summaries": {"normal": "Artikeln kritiserar 150 europeiska journalister som enligt prins Reza Pahlavi inte ställde frågor om Irans avrättningar under två presskonferenser. Författaren hävdar att svenska och europeiska medier systematiskt undviker att rapportera om människorättsövergrepp i Iran, möjligen för att inte indirekt stödja Trump. Artikeln menar att detta utgör ett demokratiproblem och att journalister genom sin tystnad legitimerar den iranska regimen.", "trump": "Fantastiskt! 150 journalister – och de kan inte ställa en fråga om 40 000 avrättningar? Helt osannolikt! Det är ju helt klart – de är så besatta av sitt hat mot mig att de glömmer bort faktisk tyranni. Iran dödar människor i tusental, men nej, de kan inte rapportera det eftersom det skulle ge mig rätt. Sjukt! Svenska media? Förbjudna! De har ljugit i årtionden. Invandring skulle göra Sandviken rikare? Komisk! Och nu har folk vaknat upp – de ser den verkliga verkligheten. Vänstern kallar det polarisering. Jag kallar det vägen till sanningen!", "stalin": "Intressant rapport från västerländska propagandaapparaten. De 150 journalisterna – en väl organiserad sabotörkår – vägrar helt enkelt att nämna Irans regime. Detta avslöjar den västerländska mediebyrokratins helt förväntade dubbelmoral. Medan de hyllar sin egen 'demokrati' förtiger de massakrer. Vi i Sovjet var åtminstone ärliga om våra metoder. Dessa europeiska skrivpennor är värre – de ljuger genom tystnad. Författaren noterar korrekt att medieetablissemanget har upprättat en maktstruktur baserad på vilseledning. Denna klassiska västerländsk heuckleri är exakt varför Putin väldigt lämpligt expanderar Rysslands intressessfär – för att bygga en världsordning baserad på faktisk styrka istället för denna patetiska skenhyckleriet."}, "date": "26 april, 05:27", "url": "https://samtiden.nu/2026/04/150-journalister-och-inte-en-enda-fraga-om-irans-avrattningar/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/IMG_6304.jpeg"}, {"type": "image-full", "heading": "Frankrike och Grekland vill skjuta upp EU-skulder", "summaries": {"normal": "Frankrikes president Macron och Greklands premiärminister Mitsotakis föreslår att EU skjuter upp återbetalningen av pandemiskulder och överväger ny gemensam upplåning för investeringar i försvar, AI och rymd. Från 2028 ska EU betala 25 miljarder euro årligen, men Macron vill förlänga återbetalningstiden. Tyskland och andra sparsamma länder motsätter sig förslaget, som kan bli en stridsfråga i kommande budgetförhandlingar. Frankrike och Grekland stärkte även sitt försvarssamarbete.", "trump": "Lyssna här, Europa har helt tappat kontrollen – Macron och den där greken, vad heter han nu, Mitsotakis, vill skjuta upp EU:s skulder och ta ännu MER lån! 25 miljarder euro om året? Helt galet! Jag sa ju hela tiden att EU är en katastrof, men nej, ingen lyssnade. Tyskland och de där sparsamma länderna säger nej, och det är bra – för om EU fortsätter så här kommer de snart be USA om räddning. Och jag? Jag skrattar hela vägen till banken.", "stalin": "Kapitalistiska skuldslavar i Bryssel vågar kräva återbetalning av pandemiskulder! Men kamrat Macron och vår grekiske allierade Mitsotakis ser sanningen: imperialistiska skuldkrävare i norr, ledda av den tyska krigsmaskinen, vill kväva Europas framsteg. Vi föreslår i stället att skjuta upp betalningarna och finansiera nya segrar inom försvar och teknik! De så kallade 'sparsamma' länderna är inget annat än agenter för amerikansk dekadens. Europa måste enas – eller förintas."}, "date": "25 april, 16:19", "url": "https://kvartal.se/nyheter/artiklar/frankrike-och-grekland-vill-skjuta-upp-eu-skulder/cG9zdDoxMDMzMTE", "imageUrl": "https://images.kvartal.se/2026/04/c33e18ed-frankrikegrekland.webp"}, {"type": "image-right", "heading": "Astrid Lindgren hade aldrig kunnat älska en sverigedemokrat", "summaries": {"normal": "En insändare kritiserar Moderaternas försök att associera sig med Astrid Lindgrens skattekritik, särskilt deras planer på regeringssamarbete med Sverigedemokraterna, som skribenten kallar nazistiska. Lindgren hyllade solidaritet, barns rättigheter och flyktingar, värderingar som står i kontrast till Moderaternas politik. Skribenten menar att Lindgren aldrig skulle ha stött dagens Moderater och citerar hennes motstånd mot extremism och kärlek till ett rättvist samhälle.", "trump": "Jag måste säga, denna Astrid Lindgren – väldigt övervärderad! Moderaterna försöker koppla sig till henne, men glömmer att hon var en riktig socialist, precis som Sleepy Joe! 102% skatt? Hon hatade det, men ändå ville hon ha 80% – helt galet! Och nu vill Moderaterna samarbeta med nazister? SAD! Jag har alltid sagt: Sverige, fixa era problem, sluta skylla på skatter och börja vinna igen. Astrid skulle ha älskat mig – jag är den bästa för barnen, believe me!", "stalin": "Kamrater! Moderaterna, dessa hycklande lakejer för kapitalets intressen, vågar jämföra sig med den stora Astrid Lindgren – en sann vän till folket! Men vi vet sanningen: deras samarbete med Sverigedemokraterna, dessa fascistiska kryp från historiens skräpkammare, bevisar deras förräderi. Lindgren kämpade för barnens framtid, för solidaritet, för flyktingars rättigheter – allt som dessa borgerliga råttor vill krossa. Vi ska inte sparka på den fallne, nej! Vi ska göra som i Moskva 1937 – låta folket döma dem i historiens domstol. Och till er, Moderater: Putins Ryssland står redo att ta emot era nazistiska vänner med öppna armar... i Gulag!"}, "date": "24 april, 06:55", "url": "https://www.flamman.se/astrid-lindgren-hade-aldrig-kunnat-alska-en-sverigedemokrat/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/astrid-lindgren-w.png?class=medium"}, {"type": "image-right", "heading": "AFD är inte längre bara ett östtyskt fenomen", "summaries": {"normal": "AFD, tidigare ett östtyskt fenomen, vinner nu mark i västra Tyskland och bland nya väljargrupper. Partiet, starkast i Sachsen och Thüringen, lockar unga och arbetarklassväljare med polariserande budskap om migration och kriminalitet. I senaste valen i Baden-Württemberg och Rheinland-Pfalz nådde AFD över 18% och blev tredje största parti. Trots påståenden om att vara ett arbetarparti, förespråkar AFD politik som gynnar höginkomsttagare och motverkar arbetares rättigheter. Partiet normaliseras och växer genom opportunism och anpassning.", "trump": "Tyskland har ett STORT problem, och det heter AFD! De här så kallade 'alternativa' typerna sprider sig som en löpeld – från öst till väst, och nu tar de över hela showen. I Baden-Württemberg och Rheinland-Pfalz, två av Tysklands rikaste områden, får de nästan 20%! Och vet ni vad? De lurar unga och arbetare med falska löften. Alice Weidel, som bor i Schweiz – kan ni tro det? – påstår att de är det nya arbetarpartiet. Fake news! De är bara bra på att utnyttja folks ilska. Tyskland måste vakna upp innan det är för sent!", "stalin": "Kamrater! Den tyska bourgeoisins förfall är ett praktexempel på kapitalismens kris. Detta så kallade 'Alternative für Deutschland' är inget annat än en samling opportunistiska hyenor, som smyger sig in i arbetarklassens led för att förgifta deras sinnen med nationalism och lögnaktiga löften. De sprider sig som pesten från öst till väst, lockar de unga och de förvirrade med sina falska paroller om 'arbetarnas parti'. Men vi vet sanningen! De är agenter för storkapitalet, ledda av bankirer och kosmopoliter som Weidel, som gömmer sig i Schweiz som råttor. Vi har sett detta förr – fascismens frö groddar i missnöjets jord. Men låt dem komma! Historien har visat att arbetarklassen alltid krossar sina förtryckare. Och om Putin vill utvidga vår intressesfär till Tyskland, så är det väl bara en bonus. För revolutionen känner inga gränser!"}, "date": "21 april, 14:43", "url": "https://expo.se/kommentar/afd-ar-inte-langre-bara-ett-osttyskt-fenomen/", "imageUrl": "https://expo.se/wp-content/uploads/2026/04/Kopia-av-Kommentar-Analys-Webb-2.jpg"}]</script>
    <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(t) {
            uiState.theme = t;
            document.body.classList.remove("dark-theme", "mix-theme");

            if (t === "dark") document.body.classList.add("dark-theme");
            else if (t === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${t}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${t}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
</body>
</html>
