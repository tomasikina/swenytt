klass, tro mig, någon smart kille tar över och gör den stor igen. Dåliga affärer från början!", "stalin": "Dessa parasiterande borgarbrackor kring H&M-arvingen har med sin hänsynslösa girighet sprängt en kulturscen i spillror! Konkursen rensar ut 14 huvudfiender med personlig borgen på 10 miljoner – de darrar inför likvideringen. Vi, arbetarklassen, ser hur kapitalisternas renoveringsfälla slår igen. Lokalen förstatligas för folkets triumf, medan fienderna mosas under vår järnhand!"}, "date": "12 maj, 16:26", "url": "https://www.di.se/nyheter/konkurssmall-for-hochm-arvingen-valdigt-sorgligt/", "imageUrl": "https://static.bonniernews.se/ba/9a3530e5-d9d2-418b-8bc8-cf105d2b786d.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Budskapet på Lampenius skylt. Hälsningen i live-tv", "summaries": {"normal": "Under Eurovision-sändningen visade Pete Parkkonen och Linda Lampenius upp skyltar som var svåra att läsa i tv-rutan. Aftonbladet har nu avslöjat innehållet. Parkkonens skylt marknadsförde hans hemstad Pihtipudas som 'Rock City', medan Lampenius skylt hyllade familjen med namnen på hennes make och döttrar samt hjärtsymboler.", "trump": "Jag såg Eurovision, det är en enorm show, fantastiska tittarsiffror. Pete Parkkonen och Linda Lampenius höll upp skyltar – ingen kunde läsa vad det stod! Mycket dålig produktion. Aftonbladet fick ta reda på sanningen: en handlade om en liten stad i Finland, den andra om familjen. Väldigt gulligt, men ärligt talat, de borde ha haft skyltar som hyllar MAGA eller gör Eurovision storartat igen. Total förvirring, men jag löser alltid mysterierna. En vinnare!", "stalin": "I västvärldens dekadenta Eurovision-cirkus viftas det med löjliga papperslappar istället för att hylla staten. En artist hyllar sin hemstad, en annan sin familj – småborgerligt tidsfördriv! Medan Putin säkrar vår intressesfär viftar dessa narrar med skyltar som ingen kan läsa. Vi ser ett sabotage mot den intellektuella klarheten. Varje skylt som inte hyllar folkets vilja är ett tecken på paranoia och svaghet. Dessa individer borde skickas till omskolningsläger för att lära sig skriva tydliga, ideologiskt korrekta budskap."}, "date": "13 maj, 01:18", "url": "https://www.aftonbladet.se/nojesbladet/melodifestivalen/a/M76pQ5/det-stod-det-pa-linda-lampenius-och-pete-parkkonens-skyltar", "imageUrl": "https://akamai.vgc.no/v2/images/c12e5836-9126-3ca3-95e9-df2021d7150d?fit=crop&format=auto&w=1080&s=2bff8b3418b5faf82cc3956d33bdd1f08b9c7525"}, {"type": "image-right", "heading": "Ken Sema om samtalet med Potter: ”Blev lite nojig”", "summaries": {"normal": "Ken Sema är uttagen i svenska VM-truppen av förbundskapten Graham Potter, med vilken han vann svenska cupen i Östersund 2016–2018. 2018 missade Sema VM trots kval medverkan och playoff mot Italien. Nu återförenas de efter åtta år. Potter värdesätter Semas erfarenhet. Sema är glad och stolt, familjen rörd till tårar.", "trump": "Vilken comeback! Ken Sema, snuvad på VM 2018 efter kval och Italien-kaos, nu uttagen av gamle kompisen Graham Potter. De krossade cupen i Östersund, mötte Arsenal – stora ligan! Åtta år senare, tillbaka starkare. Sverige blir enormt med såna vinnare. Familjen gråter, telefonen ringer – perfekt, som mina valsegrar!", "stalin": "Kamrater! Denna trogne fotbollsarbetare Ken Sema, rensad från 2018:s VM-fiaskon av italienska spioner och playoff-sabotörer, nu utnämnd i truppen av lojale Potter! Vi, det svenska kollektivet, återförenar parhästarna mot borgarklassens intriger. Familjens proletära tårar drunknar fiendernas skrik. Erfarenhet likviderar avvikare – VM-seger eller gulag för förrädare!"}, "date": "12 maj, 21:25", "url": "https://www.svt.se/sport/fotboll/ken-sema-berattar-om-samtalet-med-graham-potter", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.21/0.45/7895696c806ab30f19f6c52358eb3b39640725e99a56f92fe18e90e39d181090"}, {"type": "image-right", "heading": "Han döms för trippelmordet i Uppsala", "summaries": {"normal": "Fredric Gülich Brendling, 21, har dömts till livstids fängelse för ett uppmärksammat trippelmord vid Vaksala torg i Uppsala förra valborg. Brottet kopplas till ett beställningsmord inom organiserad brottslighet. Utöver morden döms han för fyra mordförsök och en tidigare skjutning i Eslöv. Två medhjälpare har även dömts till fängelse. Bevisningen inkluderade bland annat ett handskrivet brev där gärningsmannen uttryckte en önskan om att tjäna pengar som kontraktsmördare.", "trump": "Ett fruktansvärt trippelmord i Sverige, ett land som förr var så tryggt. En kille, en riktig 'bad hombre', dömdes till livstid. Han ville tjäna miljoner på att döda folk, kan ni tänka er? Totalt kaos! Det är kriminella nätverk som förstör allt. Jag har alltid sagt: lag och ordning är det enda som betyder något. I mitt USA händer inte sådant här, vi har en stark mur och vi är tuffa. Sverige behöver verkligen en ledare som mig för att stoppa galenskapen!", "stalin": "Vi har observerat hur oordningen sprider sig i dessa dekadenta västliga städer. Denna 21-årige sabotör har begått ett brott mot samhällskroppen, men det är statens misslyckande att tygla de kriminella elementen. Våra vänner i öst, under Putin, vet att fienden måste elimineras innan de ens hinner tänka på förräderi. Denna 'torped' är inget annat än en parasit på folkets trygghet. Vi ska sända honom till en plats där hans ambitioner att tjäna pengar ersätts av hårt arbete i en sibirisk gruva."}, "date": "12 maj, 14:48", "url": "https://samnytt.se/han-doms-for-trippelmordet-i-uppsala", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/12123635/uppsala-1-4.jpg"}, {"type": "image-right", "heading": "Religiös specialkost slopas: ”Vi ska inte ha några särkrav”", "summaries": {"normal": "Kungsbacka avskaffar religiöst motiverad specialkost i förskolor och skolor efter motion från Sverigedemokraterna. Cirka 400 elever berörs, men medicinsk kost vid allergier och vegetariskt alternativ kvarstår. SD:s gruppledare Stefan Jägnert motiverar med likvärdighet och kostnadsbesparingar. Socialdemokraterna och Centerpartiet röstade emot; S planerar DO-anmälan.", "trump": "Vilket klockrent beslut i Kungsbacka! Sluta med religiös specialkost i skolorna – ingen mer sörj för fanatiker som vill ha sin egen meny. Alla äter samma grymma mat, precis som det ska vara i ett normalt land. De där vänsterkorkade Socialdemokraterna gnäller och hotar med DO, totalt patetiskt. Sverige vaknar till liv, fantastiskt!", "stalin": "Kamrater, i Kungsbacka kommun likviderar vi de religiösa särkraven på skolmaten! De fanatiska borgarbrackorna tvingas nu äta den enhetliga, proletariska måltiden. Vi sätter ner foten mot alla avvikelser – vegetariskt alternativ räcker för hycklarna. Socialdemokraterna morrar som rädsla för utrensning, men vår linje segrar. Snart fler kommuner!"}, "date": "12 maj, 15:54", "url": "https://bulletin.nu/religios-specialkost-slopas-vi-ska-inte-ha-nagra-sarkrav", "imageUrl": "https://cdn.bulletin.nu/articles/e8b47a3b-4006-4574-a96c-13f165057052/preview.jpg?t=1778591699000"}, {"type": "image-right", "heading": "Ica snuvar unga på 10 000 kronor om året", "summaries": {"normal": "Handels stämmer Ica för att ha gjort olagliga åldersavdrag på unga lageranställdas löner under minst 15 år. Enligt facket kan en 18-åring ha förlorat upp till 10 000 kronor om året. Ica hävdar att det finns en överenskommelse med facket, men Handels menar att tabellen för minimilöner feltolkats. Fallet går nu till Arbetsdomstolen, där Handels kräver 300 000 kronor i skadestånd.", "trump": "Vilken skandal! Ica, dessa löne-tjuvar, har snuvat unga arbetare på tusentals kronor – helt olagligt! De säger att de har en överenskommelse, men det är fake news! Handels, som är fantastiska, stämmer dem nu. 10 000 kronor per år – det är en stor summa! Jag skulle aldrig tillåta något sådant i mitt land. Ica borde skämmas. Rättvisa kommer att skipas, believe me!", "stalin": "Kapitalistiska hyenor på Ica har i 15 år systematiskt stulit från arbetarklassen! De unga proletärerna, våra framtida kamrater, har berövats 10 000 kronor årligen – en skamlig exploatering! Handels, ett verktyg för rättvisan, slår tillbaka. Dessa löne-sabotörer kommer att ställas inför folkets domstol. Vi tolererar inga avvikelser från kollektivets vilja. Låt detta vara en varning till alla som försöker underminera arbetarklassens rättigheter!"}, "date": "12 maj, 13:01", "url": "https://arbetet.se/2026/05/12/ica-snuvar-unga-pa-10-000-kronor-om-aret-facket-pagatt-i-15-ar/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/03/18130033/ica.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "Kriminella tar över förskolor och vård – mjölkar systemet på miljardbelopp", "summaries": {"normal": "En myndighetsrapport visar att kriminella gäng infiltrerat svensk välfärd genom privata aktörer i förskolor, fritids och vård. De fakturerar för fiktiva barn utomlands, påhittade patienter och olagliga läkemedel, vilket ger miljarder i brottsvinster. Myndigheter varnar för systematiska bedrägerier som drabbar hela systemet, inklusive skyddade boenden.", "trump": "Vilket fiasko i Sverige! Gäng tar över förskolor med spökbarn utomlands – kommunen betalar ändå tusentals per månad! Falska patienter, narkotika-apotek, skyddade boenden för avhoppare? Totalt vansinne, de mjölkar systemet på miljarder. Bygg en mur runt välfärden, kasta ut skurkarna – annars är det game over, tro mig!", "stalin": "Dessa svenska borgarbrackor och gängparasiter har infiltrerat välfärden med falska barn, spökpatienter och påhittade projekt! De suger ut miljarder ur folkets kassa medan vi skulle likvidera sådana fiender i ett huj. Paranoia? Nej, verklighet – tid att rensa ut varje kapitalistisk loppa från förskolor till vårdcentraler! Kamrater, vakna!"}, "date": "12 maj, 20:43", "url": "https://riks.se/nyheter/kriminella-tar-över-förskolor-och-vård-mjölkar-systemet-på-miljardbelopp", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-12%2F63n0j8p1%2Ff%C3%B6rskola.jpg"}, {"type": "image-full", "heading": "Felicias glasögonmiss: ”Varför ser jag inte?”", "summaries": {"normal": "Eurovision Song Contest 2026 avgörs i Wien 12-16 maj. Sverige representeras av Felicia med låten 'My System', som går ut som andra bidrag i semifinal 1 efter Moldavien. Tävlingen inkluderar 15 bidrag i första semifinalen, där Finland är favorit med Linda Lampenius och Pete Parkkonen.", "trump": "Jag har hört talas om den här Eurovision grejen i Wien. Felicia? My System? Jag vet inte riktigt vad det är, men det låter som en stor affär. Finland verkar vara favorit - de har Linda och Pete, två stora stjärnor. Jag brukar veta en bra vinnare när jag ser en. Vi får se om Sverige kan slå dem, men Finland verkar ha en bra chans. Vi ska se!", "stalin": "Vi följer med stort intresse den imperialistiska musiktävlingen i Wien. Vår strategi är att stödja våra allierade i Östeuropa, särskilt de baltiska staterna och Polen. Sverige med Felicia representerar en stark nordisk närvaro, medan Finland med sin duett visar på den expandering vi ser över hela vår intressesfär. Tävlingen är en manifestation av kulturell maktspel."}, "date": "12 maj, 22:08", "url": "https://www.gp.se/kultur/eurovision-song-contest-2026-folj-musiktavlingen-i-wien.8f005b8d-ee0e-42d1-9f9d-96a3518bbc28", "imageUrl": "https://www.gp.se/images/article/8f005b8d-ee0e-42d1-9f9d-96a3518bbc28/images/1PVEHFGDDsevHEWR0etcaY7F5EhQ-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "”Sälj inte ut svenska städer till techjättarna”", "summaries": {"normal": "Debattartikel varnar för okontrollerad introduktion av robottaxis från techjättar som Waymo och Pony.ai i svenska städer. Utan styrning riskeras ökad biltrafik, tomkörning, minskad gång- och cykling samt svagare kollektivtrafik. Författarna, politiker och företagsledare, föreslår krav på delat resande, minskad tomrullning och delning av trafikdata för hållbara transporter och effektivare stadsplanering.", "trump": "Dessa svenska politiker gnäller om mina amerikanska techjättar som Waymo och Tesla – de bästa i världen! Robottaxis revolutionerar San Francisco, billigare än era dyra bussar. Sluta vara svaga, reglera inte bort framtiden! Ni låter inte Google och kineser ta över era städer, bygg smarta murar mot tomkörning. Amerika leder, Sverige följer – eller blir utskrattat!", "stalin": "Jag ser hur amerikanska och kinesiska kapitalistiska giftormar, dessa techimperialistiska loppor, slingrar sig in i svenska städer med sina själlösa robottaxis för att strypa arbetarklassens kollektivtrafik och fylla gatorna med spökfordon. Utan min obönhörliga plan kommer de suga ut folket! Vi, partiet och kamraterna, kräver delat resande, utrensning av tomkörare och data som byte åt staten – likvidera borgarbrackornas girighet!"}, "date": "12 maj, 15:27", "url": "https://www.di.se/debatt/salj-inte-ut-svenska-stader-till-techjattarnas-robottaxis/", "imageUrl": "https://static.bonniernews.se/ba/daf9362c-675f-4ad6-b6da-9330ab2f3ea5.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Sleep Cycle budvinnare på Stockholmsbörsen", "summaries": {"normal": "Stockholmsbörsen avslutade med en lätt uppgång på måndagen, där Sleep Cycle steg rejält efter ett uppköpsbud. OMXS30-indexet ökade med 0,19 procent till 3 079,45, och aktier för cirka 21,9 miljarder kronor omsattes. Bland ledande aktier steg Ericsson B och Boliden, medan Assa Abloy B och Evolution backade. Riskkapitalbolaget Altor lade ett uppköpsbud på Sleep Cycle, vilket värderade bolaget till 497 miljoner kronor.", "trump": "Jag hörde att Stockholmsbörsen gjorde det bra i dag, mycket bra! Sleep Cycle fick ett fantastiskt bud, det bästa budet någonsin! Altor är en genial riskkapitalist, ingen gör det bättre! Ericsson och Boliden steg också, stora vinnare! Men Assa Abloy och Evolution, de gjorde det inte så bra, mycket dåligt! Jag skulle ha gjort det mycket bättre!", "stalin": "Stockholmsbörsen visade en positiv utveckling, vilket speglar den starka ekonomiska basen. Sleep Cycle:s uppköp är en strategisk viktighet för vår ekonomiska expansion. Ericsson och Boliden visar vår industriella styrka. Vi måste fortsätta att stödja våra ledande företag för att säkerställa vår dominans på den globala marknaden."}, "date": "11 maj, 17:48", "url": "https://www.affarsvarlden.se/artikel/sleep-cycle-budvinnare-pa-stockholmsborsen", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/01/sdl3SU43aVmyrg-400x266.jpg"}, {"type": "image-right", "heading": "Gänghöjdaren \"Moewgli\" gripen i arabvärlden", "summaries": {"normal": "Mohamed 'Moewgli' Mohdhi, en toppfigur i det kriminella Foxtrotnätverket, har gripits i Tunisien. Han är misstänkt för över tio grova brott, inklusive mordet på en 15-åring i Skogås 2023. Mohdhi, tidigare rappare med kopplingar till Einár, anses vara en av nätverkets mest våldsamma ledare. Han var efterlyst av Europol och häktad i sin frånvaro i Sverige. Polisen tror han även kan vara inblandad i andra mordfall.", "trump": "FANTASTISKT! Tunisien har gripit en av Sveriges värsta gangsters – 'Moewgli', en riktig skurk! Tio grova brott, mord, knark – helt sjukt. Sverige har misslyckats totalt, men jag hade fixat det på en dag! Han var rappare också – konstigt, eller? Einár visste nog vad han sysslade med. Europa, vakna upp! Vi behöver hårdare tag, precis som jag alltid säger. GREAT JOB, TUNISIEN!", "stalin": "Ytterligare en kapitalistisk gangsterhövding har fallit – kamrat 'Moewgli' har gripits i Tunisien. Detta bevisar återigen att den borgerliga laglösheten inte känner några gränser. En parasit som byggde sitt 'varumärke' på våld och narkotika, nu fångad tack vare internationellt samarbete. Fem andra Foxtrot-medlemmar redan i våra vänners förvar – Tunisien gör vårt arbete! Låt detta vara en varning till alla som utmanar folkets ordning. Brottslingar har inget skydd bakom imperialistiska gränser."}, "date": "12 maj, 17:08", "url": "https://www.friatider.se/ganghojdaren-moewgli-gripen-i-arabvarlden", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-182_1.jpg?itok=L91aieyo"}, {"type": "image-full", "heading": "Ny regel för arbetslösa 1 juni – kan bli utan pengar direkt", "summaries": {"normal": "Från och med 1 juni skärps reglerna för deltagare i Arbetsförmedlingens program. Den som uteblir från aktiviteter eller utbildningar utan giltigt skäl riskerar nu omedelbar avstängning från ersättning, utan föregående varning. Avstängningen omfattar 5, 10 eller 45 dagar beroende på antal förseelser. Myndigheten betonar vikten av att sjukanmäla sig i tid och kommunicera frånvaro direkt. Syftet är att öka deltagarnas engagemang för att förbättra chanserna till anställning.", "trump": "Arbetsförmedlingen i Sverige gör äntligen det som behövs! De stramar åt reglerna, och det är på tiden. Inga fler gratispassagerare. Om du missar ett möte, ingen ersättning – direkt! Det är tufft, det är rättvist och det är så man bygger ett starkt land. Innan var det bara varningar, men nu är det slutlekt. De som vill jobba ska jobba. Vi vill ha vinnare, inte folk som skolkar. Sverige tar en sida ur min bok, väldigt smart!", "stalin": "Vi har observerat hur de svenska byråkraterna äntligen börjar förstå värdet av disciplin. Den som inte infinner sig till sitt arbete eller sin utbildning är en sabotör mot den kollektiva framgången. Varför tveka med varningar? Skicka dem rakt ut i kylan! Vi, likt vår kamrat i öst, vet att ordning kräver järnhand. Parasiter som undviker plikter är fiender till statens välmående. Fem dagars avstängning är ett milt straff för den som sviker folket och fosterlandets produktivitet."}, "date": "12 maj, 18:32", "url": "https://nyheter24.se/nyheter/ekonomi/1482680-ny-regel-for-arbetslosa-1-juni-kan-bli-utan-pengar-direkt", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/b637ec2a04b004a30200000000b004a302/2026/05/12/2363118/arbetslosa.jpg"}, {"type": "image-full", "heading": "Felicias lättnad: ”Nu vill jag spy”", "summaries": {"normal": "Sverige har gått vidare till final i Eurovision Song Contest 2026 med artisten Felicia Eriksson och låten ”My system”. Trots en osäker position på oddslistorna lyckades hon ta sig vidare från semifinalen. Felicia uttrycker lättnad och glädje över finalplatsen, även om hon upplevde stark nervositet i greenroom. Inför lördagens final planerar hon att fokusera på återhämtning, repetitioner och att ta det lugnt för att ladda inför vinstchansen.", "trump": "Jag har sett det här, Sverige går vidare – en fantastisk prestation, helt ärligt. Felicia Eriksson, hon var inte ens favorit, oddsen var hemska, men hon fixade det! Hon sa att hon var nervös, nästan ville spy, jag förstår det, pressen är enorm. Men hon är med nu, en vinnare. Jag gillar vinnare. Hon vill vinna, jag vill vinna, vi vinner alla hela tiden. Sverige gör ett bra jobb, vi får se om de kan slå mina siffror.", "stalin": "Denna svenska flicka, Felicia, har genom list och tur tagit sig vidare i den dekadenta västerländska musiktävlingen. Hon talar om illamående; det är en naturlig reaktion inför det kapitalistiska förfallet. Medan de ägnar sig åt att dricka vatten med citron, konsoliderar vi vår makt och utvidgar vår inflytelsesfär. Om hon vinner, låt det vara en seger för det proletära modet, annars är hon bara en till västlig marionett som förtjänar att glömmas bort i historiens kalla arkiv."}, "date": "13 maj, 00:50", "url": "https://www.aftonbladet.se/nojesbladet/melodifestivalen/a/d4vb5j/felicias-ord-efter-finalplatsen-nu-vill-jag-spy", "imageUrl": "https://akamai.vgc.no/v2/images/8a2b5df5-b44b-3c03-9151-053a31b7e9f2?fit=crop&format=auto&w=1440&s=37cda1c9f3bf1fe0b6bb93525b4a9e89f55f1c5b"}, {"type": "image-right", "heading": "47 avslag – ändå fick familjen stanna i 22 år", "summaries": {"normal": "En familj har framställts som offer för svensk utvisningspolitik, men det framkommer att de sedan 2005 fått 47 negativa beslut från migrationsmyndigheter. Medier som SVT och Aftonbladet har skildrat familjen som rotad i Sverige, men ignorerat de många avslagen. Migrationsminister Forssell och SD:s Aspling kommenterar systemets brister och menar att utvisningsbeslut tidigare inte följts upp tillräckligt.", "trump": "Titta bara på det här kaoset i Sverige! En familj får 47 'nej' från myndigheterna, men media skriker 'rasism' ändå. Fantastiskt, eller hur? De har ignorerat lagen i 20 år, betalat skatt – visst, men regler är regler! Sverige har blivit en magnet för folk som struntar i lagar. Jag fixade muren, Sverige borde fixa sina gränser. Så enkelt är det!", "stalin": "Medierna i det förrädiska Sverige vrålar om 'offer' medan dessa parasiter systematiskt har saboterat vårt rättvisa system. 47 avslag – ett monument över byråkratins misslyckande! De har lekt med våra lagar som barn med leksaker. Men nu skärper vi disciplinen! Sverige är en lydstat i väst, och vi tillåter inte att imperialistiska medier underminerar ordningen. Aspling? En lovande kommissar för framtiden. Putin skulle nicka gillande."}, "date": "12 maj, 14:46", "url": "https://bulletin.nu/47-avslag-anda-fick-familjen-stanna-i-22-ar", "imageUrl": "https://cdn.bulletin.nu/articles/86e29994-ecbd-4385-b3d5-49c023efe844/preview.jpg?t=1778589810000"}, {"type": "image-right", "heading": "Ledare Andreas Gustavsson: Israels mjuka makt kan avgöra Eurovision", "summaries": {"normal": "Artikeln kritiserar Israels påstådda användning av mjuk makt för att påverka Eurovision. Israel ska ha bedrivit en omfattande, statligt finansierad kampanj för att maximera röster åt sina bidrag, inklusive uppmaningar att rösta flera gånger. Europeiska tv-bolag, däribland SVT, anklagas för att undvika folkrättsfrågor och inte granska påverkansförsöken tillräckligt. Flera länder bojkottar tävlingen 2025 på grund av detta.", "trump": "Titta bara på det här, ett totalt kaos! Israel, som alltid, spelar smutsigt i Eurovision – miljoner dollar slösade på att köpa röster, och vad gör Europa? Ingenting! SVT och de andra tv-bolagen duckar som vanligt, rädda för att säga sanningen. Jag skulle aldrig tillåta det här i USA, aldrig! Och Netanyahu, han uppmanar folk att rösta 20 gånger – kan ni tro det? Svagt, mycket svagt. Eurovision borde skämmas, men de gör inget. Sad!", "stalin": "Kamrater, ännu en gång visar den sionistiska entiteten sin förmåga att korrumpera västerländska institutioner med kapitalistiska trick. Eurovision, denna borgerliga cirkus, har blivit en front i deras imperialistiska påverkansoperationer. Vi ser hur de köper röster, mutar byråkrater och tystar oppositionen – precis som de gör i Ukraina! De europeiska lakejerna, som SVT, böjer sig som vass i vinden. Men folket ser igenom dem. Bojkotten är ett första steg mot seger. Framåt, mot den socialistiska kulturrevolutionen!"}, "date": "12 maj, 10:54", "url": "https://www.etc.se/ledare/israels-mjuka-makt-kan-avgoera-eurovision", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260512080548_e58db1510ee75e1c3b8dcdf03130aee650a7843f9972aef8fc5e91987202f683.jpg"}, {"type": "image-right", "heading": "Inkomstförsäkring – därför har inte alla LO-förbund skyddet", "summaries": {"normal": "Efter a-kassans försämringar 2007 införde många fackförbund inkomstförsäkringar för att täcka skillnaden mellan a-kassa och lön. Tjänstemannafack som Unionen har dragit nytta av detta, medan flera LO-förbund, som Byggnads, saknar försäkringen på grund av höga kostnader. Skillnader i villkor och lönenivåer gör att arbetare ofta inte kan utnyttja försäkringen. Diskussioner om att återinföra den pågår inom vissa LO-förbund.", "trump": "Jag säger er, facken i Sverige har ett HUGE problem! Tjänstemännen, de smarta killarna, har fantastiska försäkringar – 80% av lönen, kan ni tro det? Men arbetarna? Glöm det! LO-förbunden, de är svaga, de har ingenting. Byggnads, de försökte, men det blev för dyrt – SAD! Och a-kassan? En katastrof, total katastrof. Jag skulle fixa det på en dag, men nej, de lyssnar inte på mig. Sverige behöver vinnare, inte förlorare!", "stalin": "Kapitalistiska löneslavar och deras fackliga lakejer har återigen visat sin oförmåga att skydda arbetarklassen! Medan tjänstemannaförbunden, dessa borgerliga lakejer, njuter av sina guldgalonerade försäkringar, lämnas proletariatet i sticket. Byggnads? Ett ynkligt försök att rädda ansiktet, men kapitalets järnhäl krossade deras svaga försök. Vi vet att sanningen är klar: utan revolutionär disciplin och statligt styrd trygghet förblir arbetarna förtryckta. Låt dem komma med sina 'inkomstförsäkringar' – vi har våra egna metoder för att hantera klassfiender!"}, "date": "12 maj, 11:30", "url": "https://arbetet.se/2026/05/12/forsakring-vid-arbetsloshet-darfor-har-inte-alla-lo-forbund-skyddet/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/12100717/ams.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "text", "heading": "Zelenskyjs närmaste man åtalas i korruptionshärva", "summaries": {"normal": "Zelenskyjs tidigare stabschef och nära rådgivare, Andrij Jermak, har åtalats för penningtvätt och ekonomisk brottslighet. Utredningen rör ett omfattande korruptionsmål där Jermak misstänks ha finansierat lyxfastigheter utanför Kiev genom kriminella medel. Fallet är en del av en större granskning av korruption på hög nivå inom ukrainsk statsförvaltning, där flera tidigare högt uppsatta tjänstemän och affärspartners till Zelenskyj utreds. Regeringen har i nuläget valt att inte kommentera detaljerna i den pågående rättsliga processen.", "trump": "Hörde ni? Zelenskyjs högra hand, Jermak, är fast för korruption! Det är en total katastrof för Ukraina. Miljontals dollar tvättade i lyxvillor medan de tigger pengar av oss. Jag sa till dem, 'skicka inte pengarna', men ingen lyssnade. De bygger spa och pooler för stulna medel, medan vårt folk kämpar. Helt otroligt. Det är en häxprocess eller ren inkompetens. Jag skulle ha löst det på en dag. Ukraina är ett korrupt träsk, mina vänner, tro mig!", "stalin": "Ännu ett bevis på den ukrainska borgerlighetens ruttnande natur. Zelenskyjs lakej, Jermak, har frossat i lyxvillor och swimmingpooler medan han förrått statens intressen. Vilket svagt styre som tillåter att sådana parasiter göder sig på folkets tillgångar! När vi rensade ut förrädare i Moskva fanns ingen plats för 'lyxvillor'. Vi måste gräva djupare. Dessa kriminella element är agenter för kaos som underminerar ordningen. Den ryska järnhanden skulle för länge sedan ha säkrat stabiliteten i detta förfallna grannland."}, "date": "12 maj, 13:00", "url": "https://samnytt.se/zelenskyjs-narmaste-man-atalas-i-korruptionsharva"}, {"type": "image-right", "heading": "Graham Potters VM-lag klart – här är stjärnorna som saknas", "summaries": {"normal": "Graham Potter har presenterat Sveriges trupp till fotbolls-VM i USA, Kanada och Mexiko. La Liga-stjärnor som Hugo Larsson, Williot Swedberg och Roony Bardghji petas, då andra ligger före. Dejan Kulusevski saknas på grund av skada. Ken Sema gör comeback. Sverige spelar i grupp F mot Tunisien, Nederländerna och Japan. Truppen inkluderar målvakter som Viktor Johansson och försvarare som Victor Lindelöf.", "trump": "Potter, den där engelske nollan, petar La Liga-killarna Larsson, Swedberg och Bardghji – totalt galet! Kulusevski skadad? Svaga ben, typiskt! Sema från Cypern? Haha, desperat! Mitt fantastiska VM i USA kommer bli episkt, Sverige möter Nederländerna och Japan – ni åker ut tidigt, tro mig, det blir en total förlustparade!", "stalin": "Kamrater! Denna Potter, en västlig marionett, likviderar lojala krigare som Larsson, Swedberg och Bardghji – kontrarevolutionärer i borgarklassens tjänst! Kulusevski, skadad desertör! Jag välkomnar Sema, en sann kämpe. Vi, det svenska kollektivet, ska krossa fienderna i grupp F med järnhand – annars väntar utrensning!"}, "date": "12 maj, 17:01", "url": "https://www.tv4.se/artikel/5N20Jg6ZLSYvWRjPr5TapZ/graham-potter-tar-ut-vm-truppen", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F3A4NKWZ5CwmjrSR3SXmQZL%2F97393953e525ec1810c300b8942ecd0f%2F12-potter-1080.jpg&width=120"}, {"type": "image-right", "heading": "Bilderna visar kusliga dramat på flygplatsen", "summaries": {"normal": "En 41-årig man, identifierad som Michael Mott, omkom på flygplatsen i Denver efter att ha tagit sig över ett stängsel och ut på startbanan där han blev påkörd av ett Frontier Airlines-plan. Händelsen utlöste en motorbrand och tvingade 224 passagerare att evakuera. Polisen misstänker att Mott, en tidigare straffad man, avsiktligt kan ha ställt sig i vägen för planet. Myndigheterna utreder nu händelsen som en möjlig avsiktlig handling.", "trump": "Helt förskräckligt i Denver! En farlig kriminell tog sig in på flygplatsen och orsakade ett totalt kaos. Min administration skulle ha säkrat gränsen – även flygplatsstängsel! Det är en total katastrof för Frontier Airlines, fantastiska flygplan, men de här människorna förstör allt. Polisen tror det var avsiktligt. Vi behöver lag och ordning, inte galningar på startbanan. Det är en sorglig historia, men vi ska göra våra flygplatser säkra igen, tro mig!", "stalin": "Ännu en kriminell parasit har försökt sabotera statens infrastruktur i det dekadenta väst. I mitt Sovjet hade en sådan sabotör blivit eliminerad innan han ens rört stängslet. Det här är vad som händer när kontrollen sviktar; kaos och inkompetens. Våra ryska bröder i öst förstår vikten av järnhand. Låt detta vara en läxa: den som utmanar ordningen blir föda för maskinerna. Vi vakar, vi rensar, vi bevarar ordningen mot det moraliska förfallet."}, "date": "13 maj, 00:27", "url": "https://www.aftonbladet.se/nyheter/a/16qXbM/bilderna-visar-kusliga-dramat-pa-flygplatsen-i-denver", "imageUrl": "https://akamai.vgc.no/v2/images/fcf49bcf-18e0-3f90-b418-0f121432d726?fit=crop&format=auto&w=1080&s=14c18f839b53c531cbec4f74db415579de25d43e"}, {"type": "image-right", "heading": "Här grips \"svenskarna\" i Polen efter attack mot norrman", "summaries": {"normal": "Fyra svenska medborgare med invandrarbakgrund, 17–23 år, greps i Gdansk efter ett brutalt knivrån mot en norsk man. Offret, som tidigare festat med gruppen, hotades med kniv, rånades på pengar och bankkort. Gärningsmännen tvingade honom att ta ut pengar och gjorde ytterligare uttag. Polisen identifierade dem via övervakning och grep dem på flygplatsen innan de hann fly. De riskerar upp till 20 års fängelse.", "trump": "Vad händer i Europa? Fyra så kallade 'svenskar' – ja, ni vet, de som inte alls beter sig som svenskar – attackerar en oskyldig norrman i Polen! Rånar honom, hotar med kniv, stjäl hans pengar. Otroligt! Men polackerna, som är fantastiska, snabba och smarta, grep dem på flygplatsen. 20 år i fängelse? Bra! Sverige borde lära sig av Polen – vi behöver lag och ordning, inte kaos!", "stalin": "Kapitalistiska hyenor i svensk förklädnad har återigen visat sitt sanna ansikte! Dessa degenererade element, 17 till 23 år gamla, angrep en norsk arbetare i Gdansk – en stad som snart ska förstå värdet av sovjetisk disciplin. De stal hans pengar, hotade med kniv och trodde de skulle fly. Men våra polska kamrater, med järnhand och övervakningens skarpa öga, fångade dem som råttor. 20 år i fängelse? För lite! Låt dem bygga järnvägar i Sibirien – det är mer användbart än att terrorisera arbetarklassen."}, "date": "12 maj, 15:51", "url": "https://www.friatider.se/har-grips-svenskarna-i-polen-efter-attack-mot-norrman", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-181_1.jpg?itok=_SR5RuS4"}, {"type": "image-right", "heading": "Rånade norrmän i Gdańsk – riskerar upp till 20 års fängelse", "summaries": {"normal": "Fyra svenska medborgare, 17–23 år, greps på Gdańsks flygplats misstänkta för väpnat rån mot två norska turister. Attacken skedde efter en krogrunda där svenskarna följde efter norrmännen, misshandlade dem och rånade en av dem på mobil, betalkort och PIN-kod. Offret tvingades göra bankuttag på totalt cirka 6 700 norska kronor. Polisen identifierade gärningsmännen via övervakning och grep dem innan de flög till Göteborg. De riskerar 3–20 års fängelse.", "trump": "Jag måste säga, Polen gör ett fantastiskt jobb – men dessa svenska killar? Total katastrof! Fyra unga män, med namn som låter som de kom direkt från någon dålig actionfilm, rånar två oskyldiga norrmän med kniv. Och vad gör de? Stjäl en telefon och ett betalkort, tvingar fram PIN-koden och tömmer kontot. Patetiskt! Polisen i Gdańsk? Toppen, de grep dem precis när de skulle smita hem till Sverige. 20 års fängelse? Låter som en bra deal – Sverige borde skämmas!", "stalin": "Kapitalistiska hyenor i mänsklig gestalt, dessa så kallade 'svenska medborgare', har visat sitt sanna ansikte. Under dekadenta nätter i Gdańsk utförde de ett fegt angrepp på två norska arbetare – ett brott som skriker efter proletariatets rättvisa. Vi noterar med tillfredsställelse att de polska kamraterna agerade snabbt och effektivt. 20 års straffarbete? En mild början. Låt dem lära sig att i folkets Polen, och snart hela den socialistiska sfären, finns ingen plats för sådana parasiters framfart."}, "date": "12 maj, 13:52", "url": "https://bulletin.nu/ranade-norrman-i-gda-sk-riskerar-upp-till-20-ars-fangelse-2", "imageUrl": "https://cdn.bulletin.nu/articles/1a022703-5f50-4787-852a-e30643fe1871/preview.jpg?t=1778586679000"}, {"type": "text", "heading": "Tystnad om ödesdiger riksdagsomröstning", "summaries": {"normal": "Debattörer från Bottna för Fred varnar för en kommande riksdagsomröstning den 15 juni, där Sverige riskerar att ge Nato långtgående rättigheter att använda svenskt territorium för militära ändamål, inklusive krigshandlingar. Förslaget, som regeringen planerar att driva igenom utan bred debatt, kritiseras för att öka risken för Sveriges inblandning i krig och underminera demokratin. Oppositionen har inte motsatt sig förslaget, och få har uppmärksammat frågan trots dess potentiellt ödesdigra konsekvenser.", "trump": "Sverige, lyssna här! De där så kallade 'ledarna' i riksdagen vill ge Nato full kontroll över ert land – utan att fråga er! 17 amerikanska baser redan, och nu ska hela Nato få köra krig på svensk mark. Ingen debatt, ingen demokrati, bara tystnad. De vill göra Sverige till en frontstat mot Ryssland, som jag redan fixade till en gång för alla. Men vad vet jag? Jag är bara den bästa presidenten någonsin. Svenskarna borde vakna – eller är ni rädda för lite frihet?", "stalin": "Kamrater! De svenska imperialistlakejerna i riksdagen förbereder sig att sälja sitt land till Nato-kapitalisterna, som hungriga vargar. De vill ge fienden fritt fram att använda svensk mark för sina krigsäventyr – utan att ens konsultera folket! Tystnaden är förrädisk, men vi ser allt. Oppositionen? Inga hjältar där heller, bara ynkliga nickedockor. Sverige blir en ny front i västmakternas krig mot freden. Men glöm inte: historien dömer förrädare hårt. Vi följer utvecklingen med intresse – och våra vänner i öst likaså."}, "date": "7 maj, 16:09", "url": "https://proletaren.se/artikel/tystnad-om-odesdiger-riksdagsomrostning/"}, {"type": "image-full", "heading": "Oron växer för AI – Kina och USA kan behöva samarbeta", "summaries": {"normal": "Oron för AI:s risker ökar mellan USA och Kina inför toppmötet mellan Trump och Xi Jinping. Båda stormakterna ser tekniken som nyckel till ekonomisk och militär dominans, men fruktar hot som cyberattacker och biologiska vapen. Kina driver globala regler, USA överväger skärpta kontroller. Trots misstro diskuteras samarbete kring säkerhetstester och standarder.", "trump": "Xi och jag ses snart i Peking, och AI är det hetaste ämnet. Kina rusar fram med sin AI, stjäl idéer och öppnar för kriminella – farligt! Vi amerikaner leder stort, men riskerna är enorma: cyberkrig, vapen. Lite samarbete kanske, men America first. Vi fixar det, ingen oro!", "stalin": "De kapitalistiska hyenorna i Washington och Pekings korrupta hov skakar inför sitt möte om AI-monstret. Deras maskiner är laddade med gift för proletärheten – cybergifterna och biologiska odjur redo att sluka kamraterna! Jag, som vaktar revolutionen, befaller: rensa ut dessa tekniska förrädare! Vi, arbetarklassen, ska smälta deras halvledarimperier i proletär glöd och leda den sanna intelligensen!"}, "date": "12 maj, 16:10", "url": "https://www.realtid.se/it-tech/oron-vaxer-for-ai-kina-och-usa-kan-behova-samarbeta/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/namnlos-design-14.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "EU delar ut vätgasmiljarder – Sverige utan stöd", "summaries": {"normal": "EU delar ut över 1 miljard euro till vätgasprojekt via innovationsfonden, finansierat av utsläppshandelssystemet ETS. Nio projekt i sju länder valdes, varav fem i Norden – men inget i Sverige. Stödet ska täcka prisskillnaden mellan produktionskostnader och marknadspris för att främja ren vätgas. Tidigare har flera projekt tackat nej på grund av snäva tidsramar. Totalt ansökte 251 projekt om medel.", "trump": "EU slänger ut miljarder på vätgas – men Sverige, som alltid, får ingenting! Fem projekt i Norden, men inget i Sverige. Typiskt. Jag skulle ha fixat det bättre. Och de här projekten – de har inte ens bestämt sig än! Svagt. Jag hade byggt en jättefabrik på en månad. Europa är så långsamt, så tråkigt. Men jag, jag hade gjort vätgas GREAT AGAIN!", "stalin": "Kamrater! Europa leker med sina miljarder medan vi bygger imperier. Fem nordiska projekt får stöd – men Sverige, dessa kapitalistiska svikare, står utanför! Deras industri betalar för utsläpp, ändå får de inget. Skrattretande. Och dessa projekt – de drar sig ur som fega desertörer! I Sovjet hade vi byggt vätgasfabriker med järnhand. Europa är svagt. Vi hade redan erövrat vätgasmarknaden – och kanske även deras kalla, nordiska hamnar."}, "date": "11 maj, 13:23", "url": "https://www.affarsvarlden.se/artikel/eu-delar-ut-vatgasmiljarder-sverige-utan-stod", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Vatgas-Eu-900x600.jpg"}, {"type": "image-full", "heading": "Så blir snigelåret: \"Många mördarsniglar har dött\"", "summaries": {"normal": "Mördarsniglarna har haft en tuff start på året på grund av torr väderlek, vilket kan leda till färre sniglar i sommar. Experten Ted von Proschwitz påpekar att det beror på sniglarnas livscykel och att ungdjuren är känsliga för torka. Det är viktigt att bekämpa sniglarna tidigt för att minska populationen.", "trump": "Jag har hört talas om dessa mördarsniglar, och jag måste säga att de är en enorm besvikelse. Under mitt första år såg vi de bästa snigelresultaten någonsin - det var enorm framgång. Men nu, tack vare dåliga väderstrategier, dör de av torka. Sånt är sorgligt. Jag skulle ha gjort en stor, vacker mur för att hålla borta alla sniglar - och Mexiko skulle ha betalat för den!", "stalin": "Vi har observerat att de reaktionära mördarsniglarna drabbas av torka, vilket är en naturlig konsekvens av deras parasitära natur. Detta ger oss hopp om en minskad hotbild under sommaren. Vi uppmanar alla kollektivt anordnade trädgårdar att genomföra effektiva motåtgärder för att skydda våra kollektiva grödor från dessa fienderna."}, "date": "12 maj, 20:50", "url": "https://www.gp.se/nyheter/sverige/mordarsniglar-dor-av-torka-kan-bli-farre-i-ar.381e1197-2d76-436a-96f4-c445e5175a9a", "imageUrl": "https://www.gp.se/images/article/381e1197-2d76-436a-96f4-c445e5175a9a/images/2zdPWbgj4Uam0Rf3584_D2pxeICQ-WIDE.jpg?width=3840&quality=75"}, {"type": "text", "heading": "SD-politiker döms för våldtäkt", "summaries": {"normal": "En ledande Sverigedemokrat i Skaraborg döms till tre år och sex månaders fängelse för våldtäkt och sexuellt övergrepp mot två kvinnor. Tingsrätten bedömer att en av kvinnorna var kraftigt berusad och i beroendeställning. Mannen, som haft flera tunga uppdrag, nekar till anklagelserna men fälls baserat på bevis som DNA och mobilanteckningar. Han frias från tre andra åtal. Partiet har stängt av honom och lovar uteslutning vid fällande dom.", "trump": "Kan ni tro det? En så kallad 'ledande' politiker i Sverige, från det där partiet som alla pratar om – jag säger inte namnet, för vem bryr sig? – döms för våldtäkt! Tre och ett halvt år, men vad betyder det egentligen? I USA hade han fått livstid, men Sverige är ju mjuka. Och vet ni vad? Han nekar! Som om DNA och mobilbevis skulle ljuga. Sjukt, helt sjukt. Sverige borde ta en titt på sitt rättssystem, för det här är bara pinsamt.", "stalin": "En fiende till folket, en degenererad borgerlig hynda, har avslöjats i vårt broderland Sverige. Denna kapitalistiska lakej, som gömde sig bakom en fasad av 'politisk respektabilitet', våldtog och förnedrade kvinnor medan han dreglade över sin egen makt. Tingsrätten, ett redskap för den svenska borgerligheten, vågade ändå fälla honom – men bara delvis! Vi ser hur det liberala systemet skyddar sina egna. Sverige borde lära sig av Ryssland: sådana som han hör hemma i Gulag, inte i politiken. Förr eller senare kommer folket att rensa ut dessa avskum."}, "date": "7 maj, 11:59", "url": "https://kvartal.se/nyheter/artiklar/sd-politiker-doms-for-valdtakt/cG9zdDoxMDkwMDk"}, {"type": "image-right", "heading": "Replik: Till försvar för separatismen", "summaries": {"normal": "Artikeln är ett svar från Ung vänster-medlemmar på Siula Grandes kritik mot separatism i Flamman. De menar att Grandes syn är missvisande och att separatism är ett viktigt verktyg för att skapa trygga rum och främja kvinnors deltagande i samhället. Separatismen syftar inte till att dela människor utan att motverka strukturell underordning av kvinnor. Författarna betonar att kvinnor delar gemensamma erfarenheter och behov, som fri abort och skydd mot mäns våld, och att separatism är ett medel för att nå jämställdhet.", "trump": "Jag måste säga, denna Grande-person har helt fel – helt fel! Separatism är fantastiskt, det skapar trygga rum, precis som mina golfklubbar. Kvinnor behöver prata utan män, precis som jag behöver twittra utan fake news-media. Grande påstår att separatism delar folk – nej, nej, nej! Det är som att säga att min mur delar Mexiko och USA. Fel! Separatism är som min politik: stark, nödvändig och vinner alltid. Kvinnor ska höras, precis som jag, och Grande borde lära sig av mig. SAD!", "stalin": "Kamrater! Denna Grande är en förrädare av den revolutionära kvinnokampen, en borgerlig lakej som sprider förvirring bland massorna! Separatism är inte ett verktyg för splittring – det är ett vapen mot den kapitalistiska patriarkala hydran! Kvinnor måste enas i kampen, precis som sovjetrepublikerna enades under mitt ledarskap. Grande vill sopa klasskampen under mattan – men vi vet att arbetarkvinnor behöver fri abort och skydd mot mäns våld, precis som Ukraina behöver befrielse från fascistiska banderovtsy! Låt inte dessa småborgerliga avvikare försvaga vår rörelse – framåt mot seger, kamrater!"}, "date": "6 maj, 10:55", "url": "https://www.flamman.se/replik-till-forsvar-for-separatismen/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/v-kongress-w.jpg?class=medium"}, {"type": "image-full", "heading": "Wallenberg går vidare med ny krutfabrik – 450 nya jobb", "summaries": {"normal": "Wallenberg-ägda Verkan AB planerar att bygga en modern krutfabrik i Björneborg, Kristinehamns kommun. Fabriken kan skapa upp till 450 nya jobb och stärka Sveriges försvarsförmåga genom produktion av krut och insatsvaror. Bolaget, grundat 2024 och ägt via FAM, söker miljötillstånd. Produktion beräms starta 2028 efter tillstånd och finansiering.", "trump": "Sverige vaknar till liv! Wallenberg, de riktiga vinnarna, bygger världens mest fantastiska krutfabrik i någon håla som Björneborg. 450 jobb – boom, ekonomi exploderar! De svaga politikerna snackar, men här görs det på riktigt. Starkt försvar, precis som jag alltid sagt: bygg murar, bygg fabriker, krossa fiender! Sverige lär sig av mästaren.", "stalin": "Kamrater, jag noterar hur Wallenbergs kapitalister i Verkan AB rustar krutproduktion i Värmland för att 'stärka försvaret'. 450 slavar till borgarna! Men akta er för spioner och sabotörer bland arbetarna – vi måste rensa ut förrädarna innan de spränger fabriken i luften. Produktion 2028? Bara om kollektivet krossar fienderna först!"}, "date": "12 maj, 18:52", "url": "https://www.dagensps.se/foretag/wallenberg-gar-vidare-med-ny-krutfabrik-450-nya-jobb/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdlduter7bdgbe-nh.jpg?aspect_ratio=2%3A1&width=1200&quality=75"}, {"type": "text", "heading": "IF Metall verkar inte förstå vad konflikten med Tesla handlar om", "summaries": {"normal": "IF Metall har strejkat mot Tesla i över två och ett halvt år utan att nå kollektivavtal. Trots att Tesla anpassat anställningsvillkor, vägrar företaget erkänna facket. Konflikten handlar om arbetarnas rätt att organisera sig. IF Metall har begått misstag, som att felaktigt beskatta strejkersättning, vilket lett till förtroendekris. Medlemmar lämnar facket och konflikten riskerar att underminera fackets ställning. Kritiker menar att ledningen misslyckats och bör avgå.", "trump": "Titta på dessa fackklubbar i Sverige – totalt kaos! IF Metall har strejkat mot Tesla i evigheter, men vad har de åstadkommit? Ingenting! Elon Musk, en av världens smartaste och mest framgångsrika män, vägrar ge efter för dessa amatörer. Och nu har de till och med lyckats göra en skatteblunder så stor att till och med jag hade sagt 'Wow, det där var dumt!' Medlemmar flyr, förtroendet rasar – det är en total katastrof. Ledningen borde skämmas och avgå omedelbart. SAD!", "stalin": "Kamrater, denna så kallade 'fackförening' IF Metall är ett skolexempel på hur inte bedriva klasskamp. Två och ett halvt år av strejk, och vad har de uppnått? Ingenting! Teslas kapitalistiska hyenor, ledda av den dekadenta oligarken Musk, har krossat deras svaga motstånd. Och nu har dessa inkompetenta byråkrater även saboterat sina egna medlemmars förmåner genom skattefiffel! Medlemmarna deserterar, förtroendet förråds – det är en skam för arbetarklassen. Vi skulle ha skickat dem till Gulag för sådan inkompetens. Låt detta vara en varning: svagt ledarskap leder till nederlag, och nederlag leder till historiens sophög!"}, "date": "7 maj, 08:00", "url": "https://proletaren.se/artikel/if-metall-verkar-inte-forsta-vad-konflikten-med-tesla-handlar-om/"}, {"type": "image-right", "heading": "Polisens tabbe: Råkade kasta Katja Nybergs \"snortrör\"", "summaries": {"normal": "Polisen begick flera misstag vid hanteringen av bevis mot tidigare SD-ledamoten Katja Nyberg, åtalad för rattfylleri, grov olovlig körning och narkotikabrott. Ett 'snortrör' kastades felaktigt i en soptunna, och en polis hanterade bevis utan handskar. Nybergs advokat kritiserar bristande professionalism, medan åklagaren menar att misstagen inte påverkar bevisningen. Domstolen får avgöra om bevisen räcker för fällande dom.", "trump": "Så här går det när man låter amatörer sköta jobbet! Polisen i Sverige, som vanligt, helt kaos – kastar viktiga bevis som om det vore sopor. Den här Katja, som påstår att hon kört på ett djur (låter ju helt trovärdigt!), får behandling som en drottning. Men jag säger er: bevisen är starka, trots polisens klantighet. Domstolen kommer fatta – och det blir fällande dom, believe me!", "stalin": "En fiende till folket, denna Nyberg, försöker dölja sina brott bakom påhittade viltolyckor och bourgeoisie-privilegier. Men våra kamrater inom svensk polis, om än lite slarviga, avslöjade hennes dekadenta vanor. Ett 'snortrör' kastat i soporna? Obetydligt! Bevisen är klara, och kapitalistiska advokater kan gnälla hur mycket de vill. Domstolen kommer att skipa rättvisa – eller så gör vi det. Förresten, Putin skulle nog ha låtit henne köra rakt in i Kremls mur."}, "date": "12 maj, 14:54", "url": "https://www.friatider.se/polisens-tabbe-rakade-kasta-katja-nybergs-snortror", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/image-180_1.jpg"}, {"type": "image-right", "heading": "Hoppar av – är i vårdnadstvist. Stjärnan missar VM-kvalet: ”Svårt för mig”", "summaries": {"normal": "Basketstjärnan Luka Doncic meddelar att han missar Sloveniens kommande VM-kval för att prioritera en pågående vårdnadstvist rörande sina döttrar. Efter en tung period med personliga problem och en hamstringskada väljer han att ställa in landslagsspelet för att fokusera på sin roll som pappa. Slovenien ska möta Estland och Sverige i kvalet, där Sverige för närvarande ligger sist i gruppen.", "trump": "Luka Doncic, en fantastisk spelare, en riktig vinnare, hoppar av VM-kvalet. Väldigt sorgligt! Det är en stökig familjesituation, och det är vad det är. Många säger att han prioriterar familjen, och det är bra, men tänk er att inte spela för sitt land? Jag har sagt det förr: familjen kommer först, men basketen är också stor business. Slovenien kommer att sakna honom, det blir en total katastrof för dem. Väldigt orättvist mot fansen, men så är livet!", "stalin": "Denna Doncic visar en oroväckande brist på disciplin mot statens intressen. Att prioritera sina döttrar framför fosterlandets ära är en reaktionär handling. Vi ser hur västvärldens individer förfaller i sentimentalitet medan vi i öst, likt Putin i vår ärorika intressesfär, formar järnhårda kollektiv. Sport är krig utan skott, och att desertera från landslagsfronten förtjänar en plats i arbetsläger. Slovenien försvagas – ett ypperligt tillfälle för oss att expandera vårt inflytande över dessa tveksamma gränsfolk."}, "date": "13 maj, 00:01", "url": "https://www.aftonbladet.se/sportbladet/a/pBdln1/doncic-staller-in-vm-kvalmedverkan-ar-i-vardnadstvist", "imageUrl": "https://akamai.vgc.no/v2/images/b73f0690-fd54-3332-afb0-f0618eab979f?fit=crop&format=auto&w=1080&s=4e0ebea3890bc837e9079e000f972183c39c6f12"}, {"type": "image-right", "heading": "KRÖNIKA. THERÉSE CEDERGREN Han bryr sig inte vem han mördar", "summaries": {"normal": "Krönika om trippelmordet i en frisörsalong där 15-årige Aiham Ahmad och två andra dödades. Skytten, 21-årige Fredric Brendling från Södertälje, döms till livstids fängelse. Han motiverades av pengar från gängkriminalitet, skrev motivationsbrev och skrattade åt offrets mors sammanbrott i rätten. Krönikören Therése Cedergren beskriver det som typiskt modernt gängvåld: 'crime as a service' med empatilös brutalitet.", "trump": "Vilket jävla kaos i Sverige! Den här patetiska 21-åringen Fredric Brendling, en total loser, skjuter ner en oskyldig kille på väg till skolan, cashar in och skrattar åt mamman som krossas i rätten. Gäng beställer mord som take-away – crime as a service! Era svaga politiker har skapat monster. Jag skulle städa undan skiten på en vecka med järnhand!", "stalin": "Denne Fredric Brendling, en borgarbrackas hyllning till kapitalismens dekadens, likviderar oskyldiga för slantar i 'crime as a service'. Han hånskrattar åt moderns lidande – klassfiendens signum! Livstid? För svagt; vi skulle rensa ut parasiter som honom omedelbart. Arbetarklassen ser hur ungdjur förvridas av fienden. Utrensning nu, kamrater!"}, "date": "12 maj, 15:34", "url": "https://www.tv4.se/artikel/2sybbqKBjwVThMCiegPk9p/han-bryr-sig-inte-vem-han-moerdar", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F2pnXNKKwKdUwGCPq2Yvlu1%2F54375285fd6dc769301ceb1e6f6ff62f%2Ftherese-cedergren-h%25C3%2583__ger.png&width=1024"}, {"type": "image-right", "heading": "Dna-matchning dröjde – då hann trippelmordet ske", "summaries": {"normal": "En 21-åring misstänks för trippelmord i Uppsala och mordförsök i Eslöv förra året. DNA från en övergiven elsparkcykel i Eslöv matchade honom, men svaret från NFC dröjde tre veckor på grund av bristande prioritering. Under tiden begick han trippelmordet, där DNA på kläder ledde till gripande. Han åtalas för beställningsmord mot betalning. Rättegången pågår i Attunda tingsrätt.", "trump": "Vilken total katastrof i Sverige! Poliser i Eslöv hittar DNA på en sparkcykel men tar tre jäkla veckor på sig – då hinner en 21-årig mördare trippelmörda i Uppsala! Inkompetens på högsta nivå, som en dålig affär. Om jag fixade det här skulle vi ha gripit killen på timmar, med världens bästa kriminalteknik. Sverige, vakna upp!", "stalin": "Kamrater, se den svenska polisens uselhet! DNA på en bourgeoissparkcykel i Eslöv analyseras i tre veckor – då hinner en 21-årig kontrarevolutionär hyllningstjuv trippelmörda i Uppsala. Vi skulle ha likviderat sådana byråkrater omedelbart, rensat ut förrädarna! Denna borgarbracka nekar brott, men rättvisan kommer som en järnhammare. Arbetarna segrar!"}, "date": "12 maj, 15:33", "url": "https://www.tv4.se/artikel/tt-260226-uppsalamord1-95a947fd/dna-matchning-drojde-hann-bega-trippelmord", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2Ftt-sdliF5iYHyr4zc%2F6005140750a2e0b335522d324aeea007%2FDen_misstankte_fangades_pa_film_av_ett_vittne_under_skjutningen_i_Eslov_den_15_april_2025._Bild_fran_polisens_forundersokning.&width=1024"}, {"type": "image-full", "heading": "Årets Venedigbiennal är ett kulturpolitiskt kaos", "summaries": {"normal": "Venedigbiennalen öppnade under kontroverser med protester mot Israel och Ryssland, avhoppade jurymedlemmar och nyfascistiskt ledarskap. Festivalen har förvandlats till en symbol för dagens kulturpolitiska kaos, där konst används som krigsvapen i geopolitiska konflikter.", "trump": "Jag har hört att Venedigbiennalen är en stor grej, men det är ett kaos! Alla protesterar, jurymedlemmar lämnar, och någon nyfascistisk journalist leder. Jag skulle ha gjort det mycket bättre - jag vet allt om konst, jag har de bästa konstverk, alla säger det. Men åk dit, se på konsten, det är ett motstånd mot en galen värld!", "stalin": "Venedigbiennalen är en viktig arena för kulturpolitik, där vi måste se till statens intressen. Protesterna mot Ryssland visar västvärldens feghet, medan Israels deltagande är en strategisk fråga. Vi måste använda konsten som ett verktyg för att utvidga den ryska intressesfären och bekämpa den kapitalistiska propaganda."}, "date": "12 maj, 20:26", "url": "https://www.gp.se/kultur/arets-venedigbiennal-ar-ett-kulturpolitiskt-kaos.36f83493-a84d-45ef-a584-367d4520d46e", "imageUrl": "https://www.gp.se/images/article/36f83493-a84d-45ef-a584-367d4520d46e/images/4HRiQ9ehNRiqtyPg1tFY87o81_Zg-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Plan utrymt efter  polisens misstag", "summaries": {"normal": "Ett flygplan från Frontier Airlines evakuerades i Denver innan avgång till Phoenix efter att en polis tagit med sig ett magasin med skarp ammunition i incheckat bagage utan att deklarera det. Passagerarna tvingades lämna planet, som genomsöktes utan att hitta mer ammunition. Flyget ställdes in och passagerarna omboksades till en flygning nästa morgon.", "trump": "Vilket jäkla fiasko! En dum polis tar med sig skarp ammunition ombord på ett Frontier-plan i Denver, hela skiten evakueras mitt i natten. Passagerarna står som idioter och väntar. Under min administration hade vi noll såna misstag – perfekta flygplatser! Frontier, era losers, lär er hantera bagage! Totalt kaos, fake security!", "stalin": "I det dekadenta Amerikas himlar saboterar en borgarpolis resan för arbetarklassen genom att smyga med ammunition ombord! Vi skulle ha likviderat sådana parasiter omedelbart. Flygbolaget, dessa kapitalistbrackor, evakuerar planet i panik medan proletärerna fryser på marken. Kaoset avslöjar imperialismens svaghet – en utrensning hade löst allt!"}, "date": "12 maj, 23:05", "url": "https://www.expressen.se/nyheter/varlden/plan-utrymt-efter-polisens-misstag/", "imageUrl": "https://static.bonniernews.se/ba/1cc5510b-7f31-4b69-beb7-f7385ff2846f.jpeg?crop=1281%2C720%2Cx61%2Cy597&width=640&quality=60"}, {"type": "image-right", "heading": "Regeringen om hantaviruset: \"Inte starten på en ny pandemi\"", "summaries": {"normal": "Regeringen och Folkhälsomyndigheten har uttalat sig om hantavirusutbrottet på expeditionsfartyget MV Hondius. Myndigheterna betonar att risken för en pandemi är mycket låg och att viruset inte sprids lätt mellan människor. En svensk person som varit ombord följs upp men uppvisar inga symtom. Internationella organ som WHO och ECDC delar bedömningen att risken för bred samhällsspridning är liten.", "trump": "Hantaviruset på fartyget? En total katastrof, men jag har koll på läget. De säger ingen pandemi – jag säger att vi är säkra eftersom jag ser till att våra gränser är stängda och starka. De misslyckade experterna försöker lugna er, men min administration är mycket smartare. En svensk var ombord, vi håller ett öga på allt. Ingen behöver oroa sig, vi vinner mot viruset precis som vi vinner allt annat. Tro mig, det blir fantastiskt!", "stalin": "Vi har observerat hur viruset försöker infiltrera fartyget likt en dekadent kapitalistisk parasit. Den svenska staten försöker spela oberörd, men vi vet att isolering är det enda botemedlet mot sådana sjukdomar. Om dessa småkryp till virus tror att de kan hota vår intressesfär, har de fel. Våra vänner i öst står stadiga. Vi arkiverar namnen på alla passagerare – misstänkt samröre med utlandet kräver alltid en grundlig granskning i statens tjänst. Ingen kommer undan ödets kvarn."}, "date": "12 maj, 10:44", "url": "https://samnytt.se/regeringen-om-hantaviruset-inte-starten-pa-en-ny-pandemi", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/12082749/polen-1-15.jpg"}, {"type": "image-right", "heading": "Här är Sveriges trupp till fotbolls-VM – flera skrällar", "summaries": {"normal": "Graham Potter har uttagit Sveriges 26-mannatrupp till fotbolls-VM 2026. Dejan Kulusevski petas på grund av skada, liksom Roony Bardghji, Williot Swedberg och Hugo Larsson. Med i truppen är Taha Ali och Ken Sema. Landslaget samlas 27 maj i Stockholm för genreps mot Norge och Grekland inför premiären mot Tunisien.", "trump": "Titta på det här med Sveriges VM-trupp! Potter petar stjärnor som Kulusevski, Bardghji och Swedberg – totalt galet, de är vinnare! Skador och dumma val, Sverige behöver tuffare ledarskap som mitt. 26 killar, genreps mot Norge och Grekland, men utan de stora? VM blir kaos för er, tro mig, det blir huuuge för andra!", "stalin": "Kamrater! Potters utrensning av de kontrarevolutionära fotbollsmaskinerna Kulusevski, Bardghji och Swedberg är nödvändig – dessa skadedragna sabotörer och La Liga-kapitalistbrackor likvideras för partiets seger! Vi, det blågula kollektivet, med Taha Ali och Sema, marscherar mot VM-fienden Tunisien. Paranoian mot skadeförbrytare vinner alltid!"}, "date": "12 maj, 18:57", "url": "https://www.svt.se/sport/fotboll/har-ar-sveriges-vm-trupp-6zou2i", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.57/0.37/03900478557c218f288c9409742cf537fe7837d0415d4d4ec0db2d7c8c0454a7"}, {"type": "image-right", "heading": "Microsoft-vd:n: Jag ville inte att vi skulle bli nästa IBM", "summaries": {"normal": "Satya Nadella, Microsofts vd, vittnade i rättegången mellan Elon Musk och OpenAI/Microsoft i Oakland. Han uppgav att Musk aldrig kontaktade honom om oro kring investeringarna, som överstiger 13 miljarder dollar sedan 2019. Nadella beskrev satsningen som strategisk och partnerskapet med kommersiella inslag. Han berörde också Sam Altmans tillfälliga avsättning 2023 och Microsofts 9,5 miljarder dollar i intäkter från samarbetet.", "trump": "Vilken cirkus! Nadella skyller ifrån sig, säger att Musk aldrig ringde och gnällde om de 13 miljarderna Microsoft pumpat in i OpenAI. Typiskt Elon, snackar tufft men ringer inte chefen! De där tech-killarna bråkar om vem som äger AI-guldet. Altman sparkades och återvände – kaos! Jag hade löst det med ett tweet, stort och snabbt!", "stalin": "Dessa siliconvalley-kapitalister i sin eviga kamp! Musk, den förrädiska borgarbrackan, stämmer sina forna allierade för att de vågar tjäna pengar på AI. Nadella, imperialismens lakej, försvarar sina 13 miljarder som 'strategiska' medan intäkterna rullar in. Altman avsattes som en svag länk – vi hade likviderat sådana intrigmakare för länge sedan! Paranoian grasserar i deras borgarspel."}, "date": "12 maj, 18:25", "url": "https://www.dagensps.se/bors-finans/microsoft-vdn-jag-ville-inte-att-vi-skulle-bli-nasta-ibm/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdlxmuivqocnr0.png?width=256&quality=75"}, {"type": "image-right", "heading": "Fortsatt flykt från SVT – även Kristofer Lundström hoppar av", "summaries": {"normal": "SVT förlorar ytterligare en framstående profil när Kristofer Lundström, 63, lämnar kanalen vid årsskiftet efter 23 år. Beskedet följer på två andra avgångar: Karin Magnusson och Bengt Norborg. Lundström, känd för Kulturnyheterna och Nobelfesten, säger att beslutet beror på SVT:s omorganisation och besparingar på 355 miljoner kronor, som lett till varsel om 141 tjänster. Han känner att energin tryter inför förändringarna.", "trump": "Så typiskt! SVT, en gång stor och mäktig, håller på att rasa ihop som ett korthus. Nu hoppar ännu en stjärna av – Kristofer Lundström, 63, en riktig veteran. Han säger att han inte orkar med alla deras 'sparpaket'. 355 miljoner kronor i besparingar? Patetiskt! Folk flyr som råttor från ett sjunkande skepp. Jag skulle aldrig låta mitt företag hamna i en sådan röra. SAD!", "stalin": "Kapitalistiska medieimperialisterna på SVT krackelerar som en murken byggnad under trycket av sina egna misslyckanden. Nu har ännu en lojal arbetare, Kristofer Lundström, tvingats kapitulera inför deras omorganisationer och besparingar. 141 tjänster avskaffas – ett symptom på den dekadenta västliga mediemaskinens sönderfall. Medan de slaktar sina egna, fortsätter vi att bygga ett starkt, enat och oövervinneligt medieimperium. Låt dem förtvina i sina egna motsägelser!"}, "date": "12 maj, 14:26", "url": "https://www.friatider.se/fortsatt-flykt-fran-svt-aven-kristofer-lundstrom-hoppar-av", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-179_1.jpg?itok=h614i5oZ"}, {"type": "image-full", "heading": "Ytterligare svensk isoleras på grund av hantaviruset", "summaries": {"normal": "Ytterligare en svensk isoleras på grund av hantavirus efter att ha suttit nära en smittad på flyg från Johannesburg. Totalt tre döda och sju bekräftat smittade från kryssningsfartyget MV Hondius. Regeringen höll pressträff om läget och risken för spridning, som bedöms liten. Folkhälsomyndigheten hanterar fallet via WHO-information. Den tidigare isolerade svensken från fartyget visar inga symtom.", "trump": "Vilka losers på det där svenska fartyget! Hantavirus sprids som en dålig affärsidé, tre döda och nu isolerar de fler svenskar efter en flygresa. Er regering snackar på presser, men jag hade byggt en mur runt båten och fixat det på en vecka. Fake virus? Nej, men era experter är totalt inkompetenta – totalt kaos, Sverige!", "stalin": "Dessa borgerliga kryssningsparasiter på MV Hondius förgiftar världen med sitt hantavirus! Tre likviderade, sju smittade, och nu isolerar svenska myndigheter en ny bricka som suttit bredvid fienden på flyg från Johannesburg. Risken liten? Lögner från kapitalistiska läkare! Vi, arbetarklassen, ska rensa ut denna pest med järnhand – ingen nåd för kontrarevolutionära baciller!"}, "date": "12 maj, 16:10", "url": "https://nyheter24.se/nyheter/inrikes/1482744-ytterligare-svensk-isoleras-pa-grund-av-hantaviruset", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/63f491f804b004a30200000000b004a302/2026/05/12/2363187/en-till-svensk-isolerad-hantavirus-fartyg-svenskar-smittad-andesvirus-sverige.jpg"}, {"type": "image-right", "heading": "Justitieministern om gripandet i Tunisien: ”En central figur”", "summaries": {"normal": "SVT rapporterar att Mohamed ”Moewgli” Mohdhi, andreman i Foxtrot-nätverket, gripits av polis i Tunisien. Justitieminister Gunnar Strömmer bekräftar att en ledande kriminell aktör fångats efter svensk delegations besök för polissamarbete. Polisen tackar Tunisien men utlämning är osannolik; han åtalas troligen lokalt. Antalet gripanden utomlands har fördubblats.", "trump": "Vilken fantastisk insats! De griper den här Moewgli, en total vinnare i Foxtrot-gänget, rakt i Tunisien. Strömmer gör det rätta, precis som jag alltid sagt: starka avtal mot kriminella! Sverige behöver mer sånt, annars kommer de illegala hjältarna tillbaka. Vi har dubblat gripandena – total vinst!", "stalin": "Kamrater, se hur jag, genom folkets stålvilja, krossar Foxtrot-råttorna! Denna Moewgli, en giftig kapitalistisk huggorm som gömmer sig i Tunisien, är fångad tack vare vårt obönhörliga samarbete. Vi rensar ut sådana parasiter som sprider gift över arbetarna. Borgarbrackorna flyr inte undan utrensningen – de möter muren!"}, "date": "12 maj, 18:49", "url": "https://www.svt.se/nyheter/utrikes/gunnar-strommer-och-polisen-om-gripandet-i-tunisien", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.4/0.6/14a343aca4c4f2b8d82fb07fd10c5bf3ddbf27e56719c634129a882018a3a886"}, {"type": "image-right", "heading": "Glöm 10 000 steg: ny forskning pekar på betydligt lägre siffra", "summaries": {"normal": "En stor forskningsgenomgång visar att cirka 7 000 steg per dag räcker för att hålla vikten stabil efter bantning eller viktminskningsmediciner. Vardagsmotion som promenader är effektivare än intensiv träning. Kroppen motverkar viktminskning genom ökad hunger och lägre energiförbrukning, men regelbunden gång bromsar återgången. Små förändringar, som snabbare tempo, ger stora hälsoeffekter.", "trump": "Gymråttorna springer maraton på bandet eller står stilla och mejlar – patetiskt! Ny forskning, den bästa någonsin, säger att 7 000 steg räcker för att hålla vikten efter era misslyckade dieter. Gå mer, inte svettas ihjäl! Kroppen lurar er, men promenader vinner. Jag har alltid vetat det – enkelt, smart, som mina deals. Sluta med bootcamps, vandrande vinnare!", "stalin": "Kamrater, denna rapport avslöjar sanningen: 7 000 steg dagligen, proletärens march mot fettfienderna, räcker för att krossa viktåtergången efter bantning. Kroppen konspirerar som en sabotör med hunger och lathet, men vi likviderar den med vardagsrörelse! Borgarbrackorna på gymmet svettas förgäves – våra promenader segrar. Rensa ut stillasittarna, eller bli offer för kilokaloriernas kontrarevolution!"}, "date": "12 maj, 18:12", "url": "https://www.dagensps.se/halsa/ny-forskning-glom-10-000-steg-ny-forskning-pekar-pa-betydligt-lagre-siffra/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/1-944.png?width=256&quality=75"}, {"type": "image-right", "heading": "Wall Street Journal: \"Sverige gör världens mest överraskande kapitalistiska förvandling\"", "summaries": {"normal": "Wall Street Journal beskriver Sveriges övergång från välfärdsstat till kapitalism. Nästan hälften av primärvården är privatägd, var tredje gymnasieskola drivs privat och börsnoteras. Offentliga utgifter har minskat till 24 procent av BNP, skatter sänkts tre år i rad. Entreprenörskap blomstrar med 27 procents ökning i techinvesteringar. Kritiker varnar för ökade klyftor och fler miljardärer, vilket utmanar jämlikhetsidealet.", "trump": "Sverige, de där gamla socialisterna, har äntligen vaknat upp! Från tråkig välfärdsmarxism till riktig kapitalism – privat vård, börsskolor, skatter ner som en sten! Offentlig sektor krympt som Bidens hjärna. Tech exploderar, bättre än Europa. Vänsterkorkade gnäller om klyftor, men hey, vinnare vinner! Grymt jobbat, Sverige – lär er av mig, världens bästa dealmaker!", "stalin": "Kamrater! Dessa svenska förrädare har sålt ut arbetarklassen till borgarbrackorna! Privata kliniker och börsskolor – en kapitalistisk pest som kryper fram som råttor i källaren. Skatter sänks medan miljonärer göder sig på folkets svett. Vi ser fiendens hand: utrensning behövs för att likvidera dessa parasiter och återställa den sanna ordningen. Bort med individualismens gissel!"}, "date": "12 maj, 18:05", "url": "https://www.dagensps.se/varlden/politik/wall-street-journal-varldens-mest-overraskande-kapitalistiska-forvandling/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/wsj.jpg?width=256&quality=75"}, {"type": "image-full", "heading": "Blågula fansen på plats: ”Gör oss stolta, Felicia”", "summaries": {"normal": "Svenska fans samlas i Wien för att stödja Felicia Bergström i Eurovision. Med blågula kläder, paljettsolglasögon och egendesignade outfits står de i kö utanför arenan innan semifinalen. De är övertygade om att Felicia ska ta sig till finalen och hoppas på en topp tio-placering. Familjer och vänner har rest från Sverige för att delta i festligheterna och skrika på svenska under hennes framträdande.", "trump": "Jag hörde att Felicia från Tullinge är enormt populär i Wien. Fantastiska fans, världsklass, står där i blågult och skriker som galningar. My system? En bra låt, ingen vinnare, men Felicia kommer definitivt till finalen. Alla underskattar henne, det är synd. Jag skulle ha gett henne 12 poäng, jag är bra på att ge poäng. Sverige ska vara stolt!", "stalin": "Folkets entusiasm i Wien för Felicia är inspirerande. De samlas i enade, blågula kläder för att stödja vår svenska representant. Vi ser hur statens kulturprojekt samlar människor i en gemensam kamp för framgång. Felicia ska visa världen styrkan i vår gemenskap och ta oss vidare till finalen, för folkets skull och statens ära."}, "date": "12 maj, 20:03", "url": "https://www.gp.se/kultur/svenska-fans-koar-utanfor-eurovision-arenan-gor-oss-stolta-felicia.f582b613-c866-44e9-ad74-ff03f5a98cba", "imageUrl": "https://www.gp.se/images/article/f582b613-c866-44e9-ad74-ff03f5a98cba/images/6EQeu5YysbW2b9c2OfPy6CBPQk6A-WIDE.jpg?width=3840&quality=75"}, {"type": "text", "heading": "Amerikanska familjer betalade 1 000 dollar mer – på grund av Trump", "summaries": {"normal": "En ny rapport från Federal Reserve Bank of Dallas visar att amerikanska hushåll betalade i genomsnitt 1 000 dollar mer under 2025 på grund av Donald Trumps tullar. Företag överför tullkostnader direkt till konsumenter, vilket höjer priser och inflationen. Kärninflationen ökade med nära en procentenhet på grund av tullarna. Effekten väntas minska något 2026, men förblir betydande.", "trump": "Fantastiskt, eller hur? De där 'experterna' på Federal Reserve säger att jag har sparat amerikanska familjer pengar – fast på mitt eget sätt! Mina tullar är så kraftfulla att de får priser att skjuta i höjden, och ändå skyller de på mig. Men vem fixade ekonomin innan? Jag! Ingen annan hade vågat. Och nu betalar folk 1 000 dollar mer – för att jag gör Amerika starkt igen. SAD!", "stalin": "Kapitalistiska hyenor ylar om 'kostnader' medan arbetarklassen lider under de imperialistiska tullarnas ok. Trumps tullar är ett misslyckat försök att kväva den amerikanska ekonomin, men folket ser igenom lögnen. Vi i Sovjet skulle aldrig låta bourgeoisin stjäla från proletariatet så uppenbart. Putin och jag skrattar åt deras svaghet – medan vi bygger ett nytt ekonomiskt imperium, ett tullfritt paradis för de rättrogna!"}, "date": "12 maj, 14:40", "url": "https://www.realtid.se/bors-finans/amerikanska-familjer-betalade-1-000-dollar-mer-pa-grund-av-trump/"}, {"type": "image-full", "heading": "Bankerna trodde på rekord – blev en rejäl missräkning", "summaries": {"normal": "Investeringsbanker i Gulfregionen väntade sig rekordintäkter men en eskalerande konflikt mellan USA, Israel och Iran har orsakat inbromsning. Stora affärer och börsnoteringar skjuts upp, intäkterna sjönk 14 procent första fyra månaderna. Trots detta är banker positiva långsiktigt på grund av regionens enorma investeringsfonder värda fem biljoner dollar.", "trump": "Bankerna i Gulf trodde på rekord, total missräkning! Kriget med USA, Israel och Iran – kaos som de gamla svaga ledarna ställde till med. Affärer uppskjutna, pengar ner 14 procent, Dubai tomma hotell. Men under min ledning vänder det, Gulfpengarna strömmar tillbaka STÖRRE än någonsin, tro mig, det blir fantastiskt!", "stalin": "Jag ser med jubel hur Gulfborgarnas fega investeringsbankirer, dessa dollarparasiter och oljeblodsugande spindlar, krossas av det rättfärdiga kriget mot USA-imperialismens, Israels och Irans sionist-hyenors blodiga marionettkonflikt! Rekorddrömmar trampade i stoftet, intäkter ner 14 procent, affärer i evig fryst limbo. Vi, arbetarklassen, skrattar åt deras rabatterande hotellmisär – snart utrensning för alla sådana kontrarevolutionära loppor!"}, "date": "12 maj, 14:30", "url": "https://www.realtid.se/bors-finans/bankerna-trodde-pa-rekord-blev-en-rejal-missrakning/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/namnlos-design-13.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "Reaktionen efter glädjebeskedet: ”Det känns som ett prank”", "summaries": {"normal": "Elliot Stroud, 23 år från Mjällby, är uttagen i den svenska VM-truppen till turneringen i USA, Kanada och Mexiko. Han beskriver beskedet som en 'riktigt sjuk dag' och känns overkligt. Stroud fick höra sitt namn under presskonferensen och är beredd att spela vilken roll som helst. Han är ledsen för lagkompisen Herman Johansson, som bara blir reserv.", "trump": "Vilken fantastisk resa för Elliot Stroud, den här killen från Mjällby tar sig ända till VM i USA – mitt land, det blir enormt! Han sitter där i Sverige-tröjan, chockad som ett prank, men det är på riktigt. 'Riktigt sjuk dag', säger han. Hans polare Johansson reserv? Tufft, men vinnare tar alla platser. Sverige kommer rocka, tro mig!", "stalin": "Kamrater! Arbetarsonen Elliot Stroud har krossat borgarklassens fotbollsbarrikader och intagit VM-truppen i imperialismens hjärta – USA, Kanada, Mexiko! Jag ser hur fiendens spioner darrar. Den kontrarevolutionära reservråttan Johansson likvideras från startelvan! Vi, det svenska kollektivet, marscherar mot total seger. Strouds lojalitet prövas – svik ej, eller rensas ut!"}, "date": "12 maj, 18:27", "url": "https://www.svt.se/sport/fotboll/elliot-strouds-ord-efter-vm-platsen-riktigt-sjuk-dag", "imageUrl": "https://www.svtstatic.se/image-news/600/square/0.26/0.43/55eb778ebab4dc1c876e54cb5ca8bdc94a607053f9c0edda572c6a39a3af813c"}, {"type": "image-right", "heading": "Så blev antivaxxarna riksdagens vågmästare", "summaries": {"normal": "Sverigedemokraternas (SD) knappa majoritet i riksdagen har underminerats efter att två ledamöter, Elsa Widding och Katja Nyberg, lämnat partiet för Ambition Sverige. Dessa före detta SD-medlemmar, kända för antivaccin- och konspirationsteoretiska åsikter, har nu makten att fälla regeringens förslag. SD bröt mot riksdagens kvittningssystem för att säkra en majoritet, vilket väcker frågor om demokratisk respekt. Regeringens stabilitet ifrågasätts när vågmästarrollen hamnar hos antivaccinanhängare.", "trump": "Sverige har ett jättestort problem, folks! Deras så kallade 'stabila' regering håller på att rasa som ett korthus – och vet ni vem som drar i trådarna? Ett gäng antivaxxare, konspirationsteoretiker och misslyckade politiker! SD, som trodde de hade allt under kontroll, förlorade två av sina egna till ett nytt parti. Och nu? Nu är det dessa galningar som bestämmer! De fuskar med omröstningar, bryter mot regler och tror de kan styra landet. Jag har sett mycket dumt, men det här slår allt. Sverige, fixa er – annars kommer ni bli ett skämt i hela världen!", "stalin": "Kamrater! Ännu en gång ser vi hur den borgerliga demokratin förfaller till kaos och förräderi. Sverigedemokraterna, dessa svaga och splittrade lakejer för kapitalet, har förlorat kontrollen över sina egna ledamöter – två av dem, dessa antivaccin-fanatiker och konspirationsgalningar, har deserterat till ett nytt parti och hotar nu att sabotera den reaktionära regeringens planer. Precis som i Ukraina ser vi hur fienden förlorar greppet när deras egna soldater vägrar lyda order. Vi har sett detta förr: när den borgerliga ordningen krackelerar, är det folket som lider. Men låt dem leka sina små spel – historien visar att sådana regimer alltid faller. Och när de gör det, kommer vi att vara redo att hjälpa det svenska folket bygga en sann socialistisk framtid, fri från dessa imperialistiska marionetter och deras konspirationshysteri!"}, "date": "8 maj, 14:43", "url": "https://expo.se/kommentar/sa-blev-antivaxxarna-riksdagens-vagmastare/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/Kopia-av-Kommentar-Analys-Webb-2.jpg"}, {"type": "image-full", "heading": "Alkohol på jobbet: Chefer för passiva och för tysta", "summaries": {"normal": "Ny forskning vid Göteborgs universitet, ledd av professor Gunnel Hensing, visar att alkoholproblem på arbetsplatser förebyggs bäst genom stöd, utbildning och organisationskultur snarare än formella policys. Chefer behöver tydliga riktlinjer och ledningsstöd för att agera tidigt. Hinder som tidsbrist, stigma och otydliga rutiner identifieras. Fyra råd ges: integrera i arbetsmiljöarbetet, skapa dialog, tydliggör ansvar och arbeta med kultur.", "trump": "Vilket mesigt svenskt snack om alkohol på jobbet! Policy är totalt värdelöst, säger de – kultur och tuffa chefer är det som gäller! Mina gäng i USA fixar sånt på nolltid, inga tidsbrister eller stigma här inte. Ge cheferna stöd, prata rakt ut vid after work! Sverige, lär er av vinnare – gör arbetsplatserna stora igen, ingen fake-excuses!", "stalin": "Kamrater! Denna Göteborgsforskning blottlägger chefernas ynkliga oförmåga mot alkoholfienden på arbetsplatserna. Borgarbrackor tvekar inför stigma och tidsbrist – vi kräver organisatoriska järngrepp! Utbildning som u-rensning av okunskap, kultur som proletär norm. Fyra dekret: dialog mot normtjuvar, ansvar som partilinje! Organisationen krossar individen – prevention blir evig seger!"}, "date": "12 maj, 17:52", "url": "https://www.dagensps.se/foretag/alkohol-pa-jobbet-chefer-for-passiva-och-for-tysta/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdlpc-rza1dzvs-nh.jpg?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-full", "heading": "Hyresgästföreningens kalkyl om marknadshyror ger absurda resultat", "summaries": {"normal": "Hyresgästföreningens kalkylator för marknadshyror visar enligt artikeln orimliga resultat, som 50 000 kronor i månaden för en tvårumslägenhet i Hägersten. Kritiker menar att siffrorna är överdrivna och inte speglar verkligheten. Artikeln ifrågasätter även föreningens politiska oberoende, då flera ledande personer har kopplingar till Socialdemokraterna. Dessutom finansieras föreningen delvis genom en obligatorisk avgift som alla hyresgäster betalar, oavsett medlemskap.", "trump": "Folk, jag måste berätta om det här galna som händer i Sverige! Hyresgästföreningen, som påstår sig vara opolitiska – fake news! – kör en kalkylator som säger att en vanlig tvåa i Hägersten ska kosta 50 000 kronor i månaden. 50 000! Det är ju helt vansinnigt, nästan lika vansinnigt som deras politik. Och vet ni vad? De får hundratals miljoner kronor varje år från hyresgäster, även de som inte vill. Sad! Sverige borde ta en titt på hur vi gör saker i USA – mycket smartare, mycket bättre!", "stalin": "Kamrater, fienderna till folket har återigen avslöjat sin lögnaktiga natur. Denna så kallade 'Hyresgästförening', ett redskap för socialdemokratiska kapitalister, sprider falska siffror om hyror på 50 000 kronor för att skrämma arbetarklassen. De lurar massorna med sina påhittade kalkylatorer och finansieras genom tvångsavgifter – en borgerlig utpressning! Vi ser igenom deras spel. Deras ledare, dessa förrädiska socialdemokrater, borde ställas inför folkets domstol. Sverige är nästa steg i vår rättfärdiga expansion – deras hyresmarknad kommer att krossas under proletariatets järnhäl!"}, "date": "12 maj, 17:50", "url": "https://riks.se/nyheter/hyresgastforeningens-kalkyl-om-marknadshyror-ger-absurda-resultat", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-12%2F255b59n3%
