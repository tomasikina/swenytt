ör partiets järnvilja!"}, "date": "6 maj, 07:00", "url": "https://www.affarsvarlden.se/kronika/robert-bergqvist-kompassnalen-pekar-mot-stagflation", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/bergqvist-stagflation-900x600.jpg"}, {"type": "image-right", "heading": "Myten som höjer din boränta. Medicinen riskerar att döda patienten.", "summaries": {"normal": "Arbetets kolumnist kritiserar varningar för stagflation orsakad av oljebrist från Mellanösternkriget. Riksbankens chef Erik Thedéen hotar med räntehöjningar för att dämpa inflation, trots risk för recession. Artikeln ifrågasätter 1970-talets ekonomiska myt, spridd av Milton Friedman, som ledde till hårda räntehöjningar som krossade ekonomier. Doktrinen prioriterar prisstabilitet framför tillväxt och sysselsättning.", "trump": "Vilka idioter dessa svenska centralbanksnissar är! Stagflation på grund av Mellanösternkaos, och nu vill de höja boräntan till himlen? Totalt galet! Friedman, en hittepå-artist med fake news-historia. Jag pumpade Amerika fullt av olja, lägsta räntor någonsin – boom! Sluta döda ekonomin, losers. Gör America great again, och Sverige med!", "stalin": "Dessa borgarbrackor i Riksbanken, revisorister och penninghäxmästare, hotar med räntehöjningar mot stagflationens spöke från Mellanöstern! Friedman, den imperialistiske trollkarlen, fabricerade myter för att krossa arbetarna. Patienten dör i chockterapi, men vi, proletariatet, överlever! Jag skulle likvidera sådana fiender i en natt. Revolutionen skrattar åt era kollapser!"}, "date": "6 maj, 07:00", "url": "https://arbetet.se/2026/05/06/myten-som-hojer-din-boranta/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/06065959/boranta-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "Gängtopp åtalas för brott under våldsvågen", "summaries": {"normal": "Poya Shafie, 30, åtalas för att ha planerat och beställt flera grova våldsbrott under 2023 års gängvåld i Sverige, inklusive mordförsök och vapenbrott. Han beskrivs som en nyckelperson i Foxtrotnätverket och Rawa Majids närmaste man. Shafie nekar till brott men åklagaren pekar på bevis som chattar och ljudfiler. Han greps i Irak 2023 och utlämnades till Sverige 2025 efter internationellt samarbete mellan myndigheter.", "trump": "Titta bara på det här kaoset i Sverige – ett totalt misslyckande! Jag har alltid sagt att de måste ta tag i sina gängproblem, men nej, de låter det bara eskalera. Nu har de gripit någon som påstås vara en 'morddirigent', Poya Shafie, som suttit i Irak och styrt alltihop. Vilken skandal! Sverige borde skämmas. Men jag, jag hade löst det på en vecka – max. Fantastiskt samarbete med Irak, förresten, men varför tog det så lång tid? Svagt, mycket svagt!", "stalin": "Kamrater, ännu en fiende till folket har fallit i våra händer – eller rättare sagt, i Sveriges. Denna Poya Shafie, denna kapitalistiska gangsterledare, har från sin utländska håla försökt underminera den svenska arbetarklassens säkerhet genom att beställa mord och våldsdåd. Men tack vare det oförtröttliga arbetet från våra allierade i Irak och de svenska myndigheterna har denna parasit gripits. Låt detta vara en varning till alla som tror sig kunna utmana folkets vilja. Vi krossar dem, en efter en, och deras nätverk kommer att raderas från jordens yta!"}, "date": "5 maj, 11:21", "url": "https://kvartal.se/nyheter/artiklar/gangtopp-atalas-for-flera-brott/cG9zdDoxMDc3OTE", "imageUrl": "https://images.kvartal.se/2026/05/c08b6bde-polisen2.webp"}, {"type": "image-right", "heading": "Ledarkolumn Göran Greider: När män enbart blev ett problem blev de höger", "summaries": {"normal": "Göran Greider analyserar varför unga män i arbetarklassen dras åt höger, medan unga kvinnor rör sig åt vänster. Han menar att vänstern och arbetarrörelsen ofta definierar unga män som problem snarare än att erbjuda dem något att identifiera sig med. En P1-reportage visar att även SD-sympatisörer kan ha humanistiska åsikter om migration, vilket ger hopp. Greider kritiserar bristen på djupanalys kring varför unga män röstar på högerpartier trots att dessa gynnar kapitalägare.", "trump": "Jag läste denna artikel och, wow, vad säger ni om det här? Sverige har stora problem, mycket stora! Unga män, de röstade på fel sida, SD, kan ni tro det? Men lyssna på detta – killen i artikeln säger att utvisningar är helt fel. Han förstår, precis som jag, att man måste vara smart. Vänstern där borta, de har ingen aning. De pratar bara om problem, aldrig lösningar. Och kvinnorna, de är helt på fel spår. Arbetarkillar, de behöver någon som pratar deras språk. Jag skulle fixa det på en dag, believe me!", "stalin": "Kamrater, denna artikel avslöjar den borgerliga dekadensens förfall i Sverige! Unga arbetarklassmän, förr våra mest lojala soldater i klasskampen, har nu deserterat till högerkrafternas läger. Varför? För att de svikits av en vänster som endast ser dem som problem, inte som revolutionens framtid! Dessa förrädare i SD lockar med falska löften, medan kapitalisterna fortsätter att suga ut arbetarklassen. Vi måste rensa ut dessa revisionistiska element inom arbetarrörelsen som förkastar klassmedvetande till förmån för borgerlig feminism. Låt oss återupprätta den sanna marxist-leninistiska linjen och krossa dessa högeravfällingar!"}, "date": "6 maj, 06:00", "url": "https://www.etc.se/ledarkolumn/naer-maen-enbart-blev-ett-problem-blev-de-hoeger", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/2026050511050_85c43849327886ad464085fda44557194b39b9167f0aea8869151ee52ea4b506.jpg"}, {"type": "image-right", "heading": "Säkerhetslag används mot arbetare: ”Bara i Hamnfyran har vi hanterat 20 ärenden”", "summaries": {"normal": "Sveriges säkerhetslagstiftning från 2018 används allt oftare mot arbetare, enligt fackliga företrädare. I Stockholms tunnelbana har tre anställda omplacerats utan förklaring, vilket väcker misstankar om politiska motiv. Facket kritiserar bristen på transparens och rättssäkerhet. Hamnarbetare vittnar om godtyckliga bedömningar och påtryckningar att avgå. Lagstiftningen möjliggör att arbetsgivare kan avskeda eller omplacera arbetare utan tydliga skäl, vilket drabbar fackligt aktiva.", "trump": "Vad händer i Sverige? De har en så kallad 'säkerhetslag' som låter arbetsgivare sparka folk utan anledning – helt galet! Jag har alltid sagt att byråkrater och fackförbund är problemet. Nu använder de lagen för att tysta arbetare, särskilt de som inte gillar deras vänsterpropaganda. Tre stackars tunnelbanearbetare har blivit omplacerade – ingen vet varför! Och konsulterna? De är som hajar, bara ute efter pengar. Sverige borde ta en titt på hur vi gör det i USA – där sparkar vi folk med stil!", "stalin": "Kamrater, fienderna till folket har funnit ett nytt vapen: den borgerliga säkerhetslagstiftningen! Med denna dekadenta lag krossar kapitalets lakejer arbetarklassens modigaste förkämpar. I Stockholms tunnelbana har tre lojala kamrater omplacerats – utan förklaring, utan rättvisa! Konsulterna, dessa hyenor i kostym, tjänar på att förråda sina klassbröder. Men vi vet sanningen: detta är ett angrepp på den fackliga rörelsen! Låt oss ena oss, som vi enade oss mot trotskisterna, och krossa denna lag med järnhand. Fienderna skall inte undslippa revolutionens domstol!"}, "date": "5 maj, 11:04", "url": "https://proletaren.se/artikel/sakerhetslag-anvands-mot-arbetare-bara-i-hamn-fyran-har-vi-hanterat-20-sadana-har-arenden/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/PRO-INRIKES-PIC-Louise-och-Erik-1.-jpg-scaled-e1777880629531-768x431.jpg"}, {"type": "image-right", "heading": "Regeringen sitter på händerna när bostäder och kvarter förfaller", "summaries": {"normal": "Socialdemokraterna kräver i en debattartikel att kommuner får kommunal förköpsrätt för att agera mot oseriösa fastighetsägare som låter bostäder och centrum förfalla. Exempel ges från Ställdalen, Malmö och Vårberg, där förfall leder till otrygghet och kriminalitet. Partiet kritiserar regeringen för passivitet och lovar åtgärder om de vinner höstens val för att säkerställa värdiga hem för alla.", "trump": "De här svenska socialisterna har en poäng – dessa slumvärdar är totala losers som låter hus ruttna och lockar kriminalitet överallt, från små hålor som Ställdalen till Malmö och Stockholm! Regeringen sover, fega typer. Ge kommunerna makten att köpa upp skiten, rensa ut parasiterna. Om S vinner blir det fixat, stort och snabbt – Sverige behöver det, tro mig!", "stalin": "Dessa slumvärdar, dessa slemmiga kapitalistparasiter och borgarbrackor, förpestar folkets hem med mögel, droger och vandalism som spindlar i en centrumanläggning! Vi, arbetarklassen, kräver kommunal förköpsrätt för att likvidera deras råddade boningar. Regeringen är fega marionetter åt fienden – men om socialdemokraterna segrar, rensar jag ut varje en i en episk utrensning av ohyra och förräderi!"}, "date": "6 maj, 07:29", "url": "https://www.di.se/debatt/socialdemokraterna-slumvardarna-maste-bort/", "imageUrl": "https://static.bonniernews.se/ba/64b912e5-e6e9-4747-943e-076d0f70e6af.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "text", "heading": "Visa att ni vägrar militariseringen", "summaries": {"normal": "Den 16 maj arrangerar nätverket Stoppa Nato en demonstration i Helsingborg mot Natos möte den 21-22 maj, som nu uppgraderats till ett formellt beslutsmöte. Cirka 30 organisationer deltar, men större partier och organisationer saknas. Arrangörerna hoppas på bredare stöd för att protestera mot militarisering och för fred, nedrustning och utträde ur Nato. Bussresor från Stockholm och Göteborg erbjuds.", "trump": "Lyssna här, Sverige! Nato håller ett stort möte i Helsingborg, och vad gör era så kallade 'fredsvänner'? De demonstrerar *innan* mötet – smart, eller hur? Inte. De större partierna vågar inte ens visa sig, typiskt. Jag skulle aldrig stå utanför en sådan här grej. Men bra jobbat, små organisationer, ni visar åtminstone lite ryggrad! Sverige borde skärpa sig – Nato är fantastiskt, men ni verkar inte fatta det. SAD!", "stalin": "Kamrater! Imperialistiska krigshetsare samlas i Helsingborg för att smida nya planer mot världsfreden. Men vi, de sanna fredens försvarare, står redo! Dessa småborgerliga 'fredsvänner' mobiliserar, medan de stora partierna gömmer sig som rädda kaniner. Skamligt! Vi har krossat värre fiender än Nato – deras snackeklubb kommer att falla. Låt oss visa dessa militarister att folket inte böjer sig. Framåt, mot seger och nedrustning!"}, "date": "5 maj, 09:01", "url": "https://proletaren.se/artikel/visa-att-ni-vagrar-militariseringen/"}, {"type": "image-right", "heading": "”Ska vara självklart att få träffa en arbetsförmedlare”", "summaries": {"normal": "Forskar Anders Forslund kritiserar Arbetsförmedlingens omorganisation sedan 2019: nedläggning av kontor från 242 till 83, varsel för 4500 anställda och ökad digitalisering samt privatisering. Arbetslösa slussas ofta mellan handläggare utan lokal kännedom, tillgängligheten är bristfällig med långa väntetider. Staten har minskat sin närvaro, särskilt i utsatta områden, och resurserna används ineffektivt på grund av öronmärkningar.", "trump": "Vilken katastrof i Sverige! De här socialdemokratiska losers stängde halva Arbetsförmedlingen på nolltid – 242 kontor borta, tusentals sparkade, och nu ringer arbetslösa till nån i Luleå från Ystad. Digital skit och privata coaches? Totalt misslyckande! Staten gömmer sig, folk väntar i evigheter. I mitt USA fixar vi jobb med riktiga deals, inte den här byråkratiska röra'n! Helt galet!", "stalin": "Dessa svenska byråkrater har svikit arbetarna med sin borgarprivatisering! 4500 parasiter varslades, kontor lades ned – från 242 till 83 skamfläckar. Nu slussas kamraterna slumpvis till handläggare utan lokal insikt, medan kapitalisterna skrattar. Vi skulle ha likviderat oredan och stärkt statens grepp! Digitalt bedrägeri riskerar att isolera proletärerna helt. Rensning nu, kamrater!"}, "date": "6 maj, 06:00", "url": "https://arbetet.se/2026/05/06/ska-vara-sjalvklart-att-fa-traffa-en-arbetsformedlare-forskarens-harda-kritik/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/05102851/anders-forslund-klar.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=750&h=1000"}, {"type": "image-full", "heading": "Hit men inte längre – segertåget snart över för svenska kronan", "summaries": {"normal": "DNB Carnegie sänker prognosen för svenska kronan efter stark förstärkning under 2025. Kronan väntas stärkas marginellt från nuvarande nivåer, med EUR/SEK på 10,70 och USD/SEK på 9,15 om tolv månader. Geopolitisk oro i Mellanöstern, stigande energipriser och växande ränteskillnader mot ECB pressar valutan. Svensk BNP-prognos för 2026 sänks till 2,3 procent, men ekonomin är stabil med låg inflation och starka statsfinanser.", "trump": "Svenska kronan trodde den var het stuff efter förra året, men nu är tåget slut – totalt övervärderad! Vår dollar är kung, starkare än någonsin tack vare mina deals. De kämpar med Mellanöstern-kaos, ECB-inflation och räntor som biter dem i svansen. Prognos: svag krona, USD/SEK 9,15. Sverige har okej ekonomi, men utan mig hade de varit körda!", "stalin": "Den svenska kronan, detta giftiga vapen i borgarklassens händer, har kraschat in i sin vägs ände efter falsk rally 2025. Kapitalisterna i DNB Carnegie avslöjar planen: marginell förstärkning medan Mellanöstern-spioner och ECB-förbrytare blåser upp räntedifferenser för att krossa den. Vi, arbetarna, skrattar åt deras prognos – EUR/SEK 10,70! Jag likviderar valutasabotörerna. Svensk ekonomi överlever, men utrensning väntar fienderna."}, "date": "6 maj, 07:00", "url": "https://www.realtid.se/bors-finans/makro/hit-men-inte-langre-segertaget-over-for-svenska-kronan/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/omslagsbild-2026-05-05t220838067.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "text", "heading": "Miljardärerna bjuder in till klasskamp – vi kör!", "summaries": {"normal": "Artikeln diskuterar hur svenska techmiljardärer, som Vois Fredrik Hjelm och Spotifys Martin Lorentzon, provocerar genom att fira första maj på lyxkrog med knutna nävar. De hyllar sin rikedom och retar arbetarrörelsen. Författaren kritiserar deras reaktionära åsikter, som liknar amerikanska techmagnaters högervridning, men erkänner även behovet av innovation. Staten och gemensamma investeringar lyfts fram som avgörande för tillväxt, medan miljardärernas arrogans ifrågasätts.", "trump": "Jag måste säga, dessa svenska tech-killar – de har stil! De firar första maj med öl på Riche, knutna nävar, och skryter om sina miljarder. Fantastiskt! Men lyssna, de hatar staten, de hatar presstöd, och de tror de är bättre än alla andra. Typiskt. Och nu läcker de ut folkets adresser – inte coolt! Sverige borde lära sig av USA: innovation är bra, men arrogans? Inte så smart. Jag skulle kunna göra det bättre – med mindre skatt och mer vinnarskalle!", "stalin": "Kamrater! Dessa så kallade 'techbros' är inget annat än kapitalistiska hyenor som leker med arbetarklassens symboler medan de dricker dyrt öl på sina lyxhålor. De skryter om sina hundra miljarder, hotar journalister och hyllar fascistiska idéer. Men vi vet sanningen: deras framgångar är tack vare folkets blod och svett, inte deras egen 'genialitet'. Kina visar vägen – statlig styrka och disciplin skapar verklig innovation. Dessa dekadenta västerländska klowner är bara en fotnot i historiens skräphög. Låt dem leka med sina elsparkcyklar – vi bygger framtiden!"}, "date": "5 maj, 10:55", "url": "https://www.flamman.se/miljardarerna-bjuder-in-till-klasskamp-vi-kor/"}, {"type": "image-full", "heading": "Johan Häggström avslutar karriären – gör sin sista säsong", "summaries": {"normal": "Längdskidåkaren Johan Häggström meddelar att han avslutar sin elitkarriär. Via Instagram reflekterar han över sin resa, från unga ambitioner till landslagsnivå och världscupen. Trots att han aldrig nådde sina initiala resultatmål uttrycker han stolthet över sin kämpaglöd och tacksamhet för stödet från tränaren Joakim Abrahamsson. Häggström lämnar nu sporten bakom sig och önskar sina tidigare lagkamrater lycka till inför hemma-VM i Falun nästa år.", "trump": "Johan Häggström lägger av med skidåkningen. En kille som kämpade hårt, mycket hårt. Han nådde inte topp 10, ett misslyckande, men han har mod. Han insåg att det var dags att sluta. Många vinnare vet när man ska kliva av, det är en smart strategi. Han hyllar sin tränare, vilket är trevligt. Nu blir det VM i Falun utan honom. Det kommer bli enormt, fantastiskt. Jag önskar dem lycka till, men ingen gör det som jag skulle ha gjort!", "stalin": "Den svenske skidåkaren Häggström har deserterat från spåret. Han erkänner själv att han inte uppnådde målen – en svaghet som vi inte tolererar i våra kollektiv. Han tackar sin tränare, men vi vet alla att framgång kräver total lojalitet mot staten, inte personlig nostalgi. Medan han viker sig, fortsätter vi att expandera vår intressesfär mot norr. I Falun förbereder de sig för VM, men det är bara en distraktion från den stundande segern. Förrädare mot idrottens disciplin bör frukta historiens dom."}, "date": "5 maj, 20:47", "url": "https://nyheter24.se/sport/1480907-johan-haggstrom-avslutar-karriaren-gor-sin-sista-sasong", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/fce180a304b004a30200000000b004a302/2026/05/05/2361335/Nellie-Nyheter24.png"}, {"type": "image-right", "heading": "En helt vanlig dag", "summaries": {"normal": "Artikeln kritiserar Donald Trumps hot om att 'utplåna en civilisation' (Iran) via sociala medier, vilket jämförs med folkmordspropaganda. Skribenten påpekar att sådana uttalanden bryter mot folkrätten och FN:s konventioner, men att världsledare som EU och Kina ignorerar det. Mediebevakningen fokuserar på spekulationer snarare än ansvar, medan allmänheten vänjer sig vid eskalerande hot i en tid av globala kriser. Trump tänjer gränserna för vad som är acceptabelt att säga – och göra.", "trump": "Jag sa bara sanningen – Iran är ett hot, och någon måste stå upp för Amerika! Medierna överreagerar som vanligt, de älskar att hata mig. 'Folkmord'? Snälla, jag vet vad jag gör. Europa sitter tyst, Kina gnäller – men vem bryr sig? Jag är den enda som vågar säga det alla tänker. Och vet ni vad? Det fungerade! Ingen vågar utmana mig. Nästa gång kanske jag inte ens varnar – bara agerar. Make America Great Again, eller hur?", "stalin": "En patetisk liten man i Vita huset hotar med att utplåna en civilisation – precis som vi förutspådde! Imperialisterna visar sitt sanna ansikte: tomma hot och dekadens. Medierna tjattrar som skräckslagna kycklingar, medan Europas ledare darrar i sina palats. Vi minns när Gaddafi hotade – då skickade de bomber. Men när Trump gör det? Tystnad. Svaghet! Men oroa er inte, kamrater. Vår vän Putin håller koll på Europa, och vi står redo. Fienden är förutsägbar – och därför lätt att krossa."}, "date": "5 maj, 06:55", "url": "https://www.flamman.se/en-helt-vanlig-dag/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/trump-w.jpg?class=medium"}, {"type": "text", "heading": "S: Busch sviker göteborgarna", "summaries": {"normal": "Åsa Westlund (S) och Jonas Attenius (Göteborg) kritiserar i en debattartikel Ebba Busch (KD) och SD-regeringen för att svika svensk bilindustri. De anklagar KD för att stödja luckring av EU:s förbud mot nya fossilbilar efter 2035, trots Volvos miljardinvesteringar i elektrifiering. Detta skapar osäkerhet, skadar jobb i Göteborg, klimatet och ekonomin.", "trump": "Sveriges politiker är totala katastrofer! Ebba Busch poserar med Volvo-vd:n men sviker dem för EU:s galna elbilspåbud. Volvo pumpar in miljarder i elbilar, men KD och SD vill rädda gamla fossilbilar – idioti! Det kostar jobb i Göteborg och sänker er ekonomi. Ni behöver en riktig ledare som fixar dealen, tro mig!", "stalin": "Dessa borgerliga hycklare i Kristdemokraterna, med serpentin-Ebba Busch i spetsen, förråder svensk bilproletariat! Vi, arbetarklassen, ser hur de kapar Volvos framsteg mot elektrifiering för att smyga med fossilmaffian och klimatpopulistiska spindlar. Jobben i Göteborg blöder, kapitalet skrattar. Tid för utrensning av dessa klassfiender – likvidera osäkerheten med järnhand!"}, "date": "6 maj, 06:30", "url": "https://www.di.se/debatt/ebba-busch-sviker-goteborgarna/"}, {"type": "image-right", "heading": "Påtryckningar från medlarland – vädjar till Kina", "summaries": {"normal": "USA:s president Donald Trump pausar militärinsatsen \"Project Freedom\" i Hormuzsundet för att underlätta fredsförhandlingar med Iran. Blockaden mot iranska hamnar kvar. Insatsen syftade till att hjälpa 23 000 sjömän från 87 länder, fast i två månader. Pakistan medlade. USA uppmanar Kina att pressa Iran inför möten i Peking mellan Trump och Xi Jinping.", "trump": "Pausat insatsen i Hormuzsundet – briljant drag! Ger oss perfekt chans till den bästa dealen någonsin med Iran. Pakistan tjatar, men det är mina stora framsteg som räknas. Blockaden sitter kvar, sjömännen räddas. Kina fixar det, Wang Yi får höra sanningen från Rubio. Nästa vecka ses jag och Xi – Iran toppar agendan. Fantastic!", "stalin": "Dessa ynkliga amerikanska imperialistparasiter, Trump och hans marionett-Rubio, pausar sin fega \"Project Freedom\" i Hormuzsundet – en reträtt inför våra iranska kamraters ståndaktighet! Vi, Sovjetunionens folk, skrattar åt borgarbrackornas panik. Pakistan som medlare? Lömska handlangare! Kina ska krossa Irans motstånd, annars likviderar vi deras oljehandelsdrömmar. Jag ser konspirationen – men vi segrar!"}, "date": "6 maj, 06:28", "url": "https://www.di.se/nyheter/trump-pausar-insats-i-hormuzsundet/", "imageUrl": "https://static.bonniernews.se/ba/60a5b10b-1783-4836-acb4-7d4e57966379.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-full", "heading": "17-åring åtalas för grov våldtäkt i Uppsala – tidigare misshandelsdomar", "summaries": {"normal": "En 17-åring med svenskt och syriskt medborgarskap åtalas för grov våldtäkt mot barn tillsammans med en 14-åring, mot vilken bevistalan väcks. De misstänks ha utsatt en funktionsnedsatt 15-årig flicka för upprepade övergrepp på offentliga toaletter i ett köpcentrum i Uppsala. Brotten involverade våld, hot och filmning. 17-åringen har tidigare domar för misshandel men kan inte utvisas på grund av sitt svenska medborgarskap.", "trump": "Vilken total katastrof i Sverige! En 17-åring med syriskt påbrå och svenskt pass, plus en 14-åring, våldtar en funktionsnedsatt flicka på toaletter i Uppsala – upprepade gånger, med våld, hot och filmning! Han har tidigare domar men de kan inte utvisa honom. Sverige är för svagt, öppna gränser skapar kaos. De behöver min typ av mur och styrka, annars fortsätter det här vansinnet!", "stalin": "Kamrater, i det sjunkande svenska borgarimperiet har en 17-årig syrisk spion med dubbelt medborgarskapssköld och hans 14-åriga hantlangare förgripit sig på en funktionsnedsatt arbetardotter på offentliga toaletter i Uppsala. Våld, hot, filmpropaganda – klassfiendens pornografiska konspiration! Vi, partiet och folket, kräver omedelbar likvidering av dessa parasitråttor. Tidigare milda domar? Paranoia mot fienden vinner alltid, eller också rensas lägret ut!"}, "date": "6 maj, 06:36", "url": "https://bulletin.nu/17-aring-atalas-for-grov-valdtakt-i-uppsala-tidigare-misshandelsdomar", "imageUrl": "https://cdn.bulletin.nu/articles/c5c10cd5-2b01-4302-bdeb-689753d6903b/preview.png?t=1778023098000"}, {"type": "image-right", "heading": "Vi är barnen ni talar om och drevet tjänar mullorna", "summaries": {"normal": "Flera barn till medlemmar i den iranska motståndsrörelsen MEK, uppvuxna i Europa, försvarar organisationen mot anklagelser om sekterism. De kritiserar svenska politiker och medier för drevet mot Anne Ramberg, som stöttat MEK, medan Iran avrättar rörelsens anhängare. Barnen förklarar separationen från föräldrar under Gulfkriget som ett skydd mot krig, liknande historiska exempel som finska och brittiska evakueringar.", "trump": "Vilket skämt med de svenska politikerna och journalisterna, de jublar när Iran hänger sina motståndare men jagar Anne Ramberg för att hon backar hjältarna i MEK! Fake news kallar det sekt, men dessa barn är läkare, professorer – vinnare! Iran-mullorna hatar dem, precis som jag hatar losers. Stöd frihet, inte diktatorer! Sverige, vakna upp!", "stalin": "Dessa MEK-parasiter, barn till kontrarevolutionära spindlar, vågar utmana regimens järnvilja i Teheran! Vi, arbetarklassen, ser igenom deras fosterfamiljslögn – ett drev mot borgarbrackan Ramberg är nödvändigt för att rensa ut imperialistiska marionetter. Avrättningarna i Iran likviderar rätt fiender. Tystnad eller purgering väntar er småkryp!"}, "date": "6 maj, 01:30", "url": "https://www.dagensarena.se/opinion/vi-ar-barnen-ni-talar-om-och-drevet-tjanar-mullorna/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-29-300x157.jpg"}, {"type": "image-full", "heading": "Torsten Bengtsson: Sveriges landsbygd förfaller", "summaries": {"normal": "Torsten Bengtsson, politisk sekreterare för SD, kritiserar svensk landsbygdspolitik och kontrasterar den med Norges framgångsrika modell. I Norge återvänder intäkter från lokal energiproduktion till kommuner och arbetsgivaravgifter är lägre i glesbygd, vilket ger hög sysselsättning. Bengtsson berömmer Tidö-regeringens satsningar, som proposition 2025/26:158, och uppmanar till ett paradigmskifte inspirerat av Norge för en levande landsbygd.", "trump": "Sveriges landsbygd är totalt kaos, hus rasar, byar dör – tack vare de där tröga socialisterna och centeridioterna! Norge? De är vinnare, smarta skatter, låg avgift på landet, 99% jobb! Nu fixar SD och Tidö det, sänker bränsle, bygger vägar – precis som jag skulle gjort. Sluta jävlas, Sverige, bli great igen med norsk stil!", "stalin": "Dessa svenska S- och C-brackor har saboterat landsbygden med sin borgarklassiga inkompetens, byar ruttnar som lik i massgrav! Norge, dessa opportunister, behåller energipengar lokalt och sänker avgifter – ett hån mot arbetarna! Vi i partet skulle rensa ut parasiterna. Tidö-regeringen? Ett steg, men kamrater, paradigmskifte eller likvidering väntar fienderna!"}, "date": "4 maj, 13:10", "url": "https://samtiden.nu/2026/05/torsten-bengtsson-sveriges-landsbygd-forfaller/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/bengan.png"}, {"type": "image-right", "heading": "De vill tysta sina kritiker", "summaries": {"normal": "Artikeln kritiserar Tidö-partier som Sverigedemokraterna, Moderaterna och Kristdemokraterna för försök att stoppa föreläsningar kritiska mot regeringen i offentliga lokaler, bland annat i Gävle, Lilla Edet, Malmö och Göteborg. Författaren Jesper Bengtsson menar att det inskränker yttrandefriheten och undergräver demokratin, till skillnad från tidigare praxis där politiska möten setts som önskvärda.", "trump": "Dessa svenska Tidö-loser försöker tysta alla som gnäller på dem – smart drag! Vänsterfläsket med böcker som 'Hejdå Tidö' får inte snacka i kommunala hus. Precis som jag stoppade fake news-media. Sverige behöver mer muskler, inte mer prat från svaga socialister. Gör Sverige great igen, stäng igen munnen på dem!", "stalin": "Jag ser hur Tidös borgarbrackor, dessa Sverigedemokratiska hycklare och moderata kryps, desperat försöker kväva arbetarrörelsens röster i offentliga salar. Vi, folket, tolererar inte deras kontrarevolutionära censur! Utrensning väntar de fega kapitalisterna som förvränger demokratin till sin klassdiktatur. Likvidera illusionerna – yttrandefrihet för folket, inte för fiender!"}, "date": "6 maj, 01:17", "url": "https://www.dagensarena.se/opinion/de-vill-tysta-sina-kritiker/", "imageUrl": "https://www.dagensarena.se/files/2026/05/gavle-300x157.jpeg"}, {"type": "image-full", "heading": "Hjort: Naturskyddsföreningens ilska visar att Liberalerna gör något rätt", "summaries": {"normal": "Artikeln kritiserar den svenska klimatdebatten för höga anspråk och begränsade resultat. Liberalerna hyllas för att ha backat från extrem politik, vilket retar Naturskyddsföreningen. Författaren betonar att Sveriges utsläpp är minimala globalt och argumenterar för fokus på ekonomi istället för dyr omställning utan mätbar effekt.", "trump": "De svenska Liberalerna är vinnare, de har vaknat upp och dumpat klimatgalenskapen! Naturskyddsföreningen vrålar som förlorare, perfekt – det betyder att de gör rätt. Sverige släpper ut en spottstyver globalt, Kina skrattar åt er. Sluta med dumheter, satsa på ekonomi och jobb som vi gör här. Stora vinster väntar, tro mig!", "stalin": "Kamrater, dessa svenska borgarbrackor i Liberalerna har till sist insett sanningen och rensat ut de gröna småbourgeoisa giftormarna från Tidö-samarbetet! Naturskyddsföreningen, den där samlingen av klimathysteriska kontrarevolutionärer, gnäller högljutt – ett utmärkt tecken på vår seger. Vår svenska ekonomi ska inte offras för utopiska illusioner medan Kina skrattar. Vi, arbetarklassen, likviderar sådana fiender och bygger stark socialism!"}, "date": "6 maj, 06:00", "url": "https://bulletin.nu/hjort-naturskyddsforeningens-ilska-visar-att-liberalerna-gor-nagot-ratt", "imageUrl": "https://cdn.bulletin.nu/articles/43063dd2-3d34-430b-a3df-b0daf1851eff/preview.jpeg?t=1778007329000"}, {"type": "image-right", "heading": "Sjölander: En falsk våldtäktsanmälan varje dag", "summaries": {"normal": "Artikeln argumenterar att falska våldtäktsanmälningar är ett allvarligt problem och inte en myt, trots påståenden från vissa organisationer. Med tankeexperiment och Brå-statistik uppskattas andelen till cirka 10 procent av anmälningarna, vilket motsvarar runt tusen fall årligen i Sverige. Författaren varnar för konsekvenserna för rättsväsendet och exemplifierar med verkliga fall.", "trump": "Den här artikeln är fantastisk, helt klockren! Falska våldtäktsanmälningar är inget skitsnack, det är ett jäkla problem – upp till 10 procent i Sverige, tusen om året! Vänstern kallar det myt, total fake news. Poliser stöter på det varje dag. Vi måste rensa upp det här, precis som jag rensar upp gränserna och allt annat skoj! Tro mig, det blir stort!", "stalin": "Kamrater, denna artikel blottlägger de hämndlystna borgarbrackornas falska anmälningar om våldtäkt – en giftig myt som feministerna sprider för att sabotera rättvisan! Vi i partiet vet: 10 procent är lögner, tusen per år i Sverige, ett mörker som kräver utrensning. De psykiskt sjuka hyenorna och missminneskapitalisterna ska likvideras med byråkratisk precision. Jag ser fienderna överallt – dags att krossa dem med stålhård logik!"}, "date": "6 maj, 05:30", "url": "https://bulletin.nu/sjolander-en-falsk-valdtaktsanmalan-varje-dag", "imageUrl": "https://cdn.bulletin.nu/articles/306c835a-a27d-465c-b7bb-282627e71fc3/preview.png?t=1778004645000"}, {"type": "image-right", "heading": "Släcker ner hundratals byar – Trafikverkets kontor badar i ljus", "summaries": {"normal": "Trafikverket planerar att ta bort 25 000 belysningsstolpar, främst i glesbygden, vilket drabbar byar i Norrland som blir mörka. Stolparna ersätts på trafikerade platser med högre säkerhetskrav. Huvudkontoret i Borlänge är upplyst sent på kvällen av trygghetsskäl. Kommunalrådet i Bräcke kritiserar beslutet som orättvist mot inlandet.", "trump": "Vilka idioter på Trafikverket! De släcker ner hundratals byar i glesbygden, tusentals lampor borta, mest i Norrland – medan deras huvudkontor i Borlänge lyser som en discokula sent på natten! De säger att det är för trafiksäkerhet, men det är bara ursäkter. Typiska byråkrater som offrar folket. I USA skulle vi tända allt och bygga bättre vägar, tro mig!", "stalin": "Kamrater! Dessa ljusförrädare på Trafikverket, dessa mörkläggningshyenor i Borlänge, de badar sitt huvudkontor i onödig glans medan de slockar 25 000 stolpar i vårt folkets inland! Borgarbrackor som offrar Norrlands byar åt trafiktjuvarna! Jag befaller utrensning: likvidera onödig belysning hos parasiterna, flytta ljuset till arbetarnas fronter! Vi, det eviga partiet, ska krossa detta sabotage med järnhand!"}, "date": "6 maj, 06:00", "url": "https://www.svt.se/nyheter/granskning/ug/slacker-ner-hundratals-byar-trafikverkets-huvudkontor-badar-i-ljus", "imageUrl": "https://www.svtstatic.se/image-news/600/square/0.46/0.52/6054f8af549c04b0138d0f0c911a0dd0e55ad269381a5eaf35a9b7ce7cd1b3c8"}, {"type": "image-right", "heading": "Vännerna skramlade till väglampor som barn – nu släcks byn ned", "summaries": {"normal": "Trafikverket planerar att ta bort vägbelysning i hundratals glesbygdsbyar, inklusive Albacken i Jämtland. Byborna protesterar mot beslutet om att demontera 22 stolpar längs en farlig väg utan trottoar eller vägren, där tung trafik passerar. Beslutet baseras på Google Streetview utan inspektion. Bybor och Bräcke kommun har överklagat, men Trafikverket står fast.", "trump": "Vilken katastrof! Dessa svenska byråkrater på Trafikverket är som våra värsta DC-eliter – de släckar lamporna i Albacken och hundratals byar, använder Google Streetview som 'inspektion', ingen koll på plats! Byborna kämpar för ljus, vägen är en mardröm med tunga lastbilar. Totalt vansinne, gör om och gör rätt, annars blir det svart som natten!", "stalin": "Dessa förrädiska byråkratråttor på Trafikverket, spindlar i kapitalisternas mörka källare, vill mörklägga Albacken och hundratals arbetarbyar! Utan inspektion, bara Google-bilder som bevis för deras sabotage. Vi, folket och partiet, kräver utrensning av dessa ljusfiender! Byborna reser sig, kommunalrådet sträcker ut handen – men de ska likvideras i byråkratins dikar, ha ha! Beslutet står, fienderna faller."}, "date": "6 maj, 06:00", "url": "https://www.svt.se/nyheter/granskning/ug/trafikverket-slacker-ljuset-i-albacken-utan-att-ha-varit-dar", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.69/0.41/79bbca929125feb7914aa6fbf0243bd0379ae13132d7be306061b1926964411d"}, {"type": "text", "heading": "En naturlig lagerhylla av arbetslösa", "summaries": {"normal": "Artikeln kritiserar regeringen för att ignorera hög arbetslöshet (9,7%) samtidigt som de skryter om sina framgångar. Författaren hänvisar till Milton Friedmans teori om 'naturlig arbetslöshet', som upprätthållits av både socialdemokratiska och borgerliga regeringar. Dokumentären 'Novemberrevolutionen' kopplar 90-talskrisen till avregleringar 1985. Regeringen anklagas för bristande krismedvetenhet och ideologiskt motiverad passivitet, vilket gynnar arbetsgivare och försvagar arbetstagare.", "trump": "Titta bara på Sverige – helt otroligt! Regeringen skryter som om allt är perfekt, men arbetslösheten är skyhög, nästan 10%! De har tre arbetsmarknadsministrar, men ingen syns till. Vad är det för jävla cirkus? Friedman-läran, visst, men vem bryr sig? De borde skämmas! Jag skulle fixa det på en vecka – men nej, de sitter bara och glor. Svensk ekonomi? En katastrof, folks. SAD!", "stalin": "Kamrater! Se hur kapitalets lakejer i Sverige hyllar sin 'framgång' medan arbetarklassen försmäktar i arbetslöshetens träsk. 10% – en skam! De borgerliga och socialdemokratiska förrädarna har tillsammans byggt denna 'naturliga' hylla av överflödiga arbetare, precis som Friedman, den imperialistiske hunden, förespråkade. Tre ministrar? Tre fiaskon! Vi skulle ha skickat dem till Gulag för sådan inkompetens. Arbetarklassens rättigheter har förvandlats till privilegier för bourgeoisien. LO-arbetarna som röstar på fascistiska SD borde ställas inför folkets domstol!"}, "date": "4 maj, 13:49", "url": "https://www.flamman.se/en-naturlig-lagerhylla-av-arbetslosa/"}, {"type": "image-full", "heading": "Här är Sveriges alla underrättelsetjänster", "summaries": {"normal": "Sveriges underrättelsetjänster omfattar myndigheter som Must, FRA, NOA och Säpo, inriktade på olika hot. Från 2027 inrättas UND, en ny civil utrikes underrättelsetjänst som tar över delar av Musts verksamhet. Regeringen stärker samordningen genom nationella säkerhetsrådet (NSR) och en nationell säkerhetsrådgivare.", "trump": "Sverige vaknar äntligen till livs! Must, FRA, NOA, Säpo – starka namn, precis som mina killar i USA. Nu slänger de in UND nästa år, tar från Must och bygger superunderrättelse. Bra drag, Sverige, men ni borde ha gjort det tidigare, som jag alltid sagt. NSR och rådgivare? Smart, men inte så smart som mitt team. Ni blir tuffare nu!", "stalin": "Dessa svenska byråkratråttor med Must och FRA pillar med signaler som om de vore fiendens marionetter! Jag ser rakt igenom er nya UND, en falsk utrikesmaskin för att infiltrera arbetarklassen från 2027. Borgarbrackorna i regeringen mumlar om NSR – en samordnad utrensning av lojala kamrater väntar! Vi, partiet och folket, skrattar åt era paranoidiska spindelnät medan jag likviderar era spiondrömmar i tanken."}, "date": "5 maj, 11:40", "url": "https://nyheter24.se/nyheter/inrikes/1480737-har-ar-sveriges-underrattelsetjanster", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/016211f204b004a30200000000b004a302/2026/05/05/2361167/sveriges-underrattelsetjanst.jpg"}, {"type": "image-right", "heading": "Replik: Svenska judar bör stötta israeliska fredsinitiativ", "summaries": {"normal": "Anders Carlberg replikerar på Paulina Sokolows kritik av hans artikel, där han betonar vikten av att svenska judar stödjer israeliska fredsinitiativ. Han menar att Israel måste konfrontera sitt ansvar för palestiniernas situation och att diasporajudar bör engagera sig i den israeliska fredsrörelsen. Carlberg understryker behovet av en tvåstatslösning, samarbete med arabländer och att reparera moralisk skuld genom interna och externa påtryckningar för fred och rättvisa.", "trump": "Jag läste den här artikeln, och vet ni vad? Den här killen, Carlberg, han har faktiskt en poäng – fast jag säger inte att jag håller med om allt. Men lyssna, Israel måste skärpa sig, det är jag den första att säga. Palestinierna har det tufft, ingen tvivel om det, men vi kan inte bara skylla på Israel hela tiden. Fredsrörelsen? Kanske bra, kanske inte. Men en sak är säker – ingen löser något med svaga knän. Vi behöver starka ledare, inte gnäll. Och två stater? Kanske, men bara om båda parter sköter sig. Annars är det bara slöseri med tid. SAD!", "stalin": "Kamrater! Denna artikel avslöjar ännu en gång de imperialistiska sionistiska förrädarnas dubbelspel. De pratar om fred medan de krossar palestiniernas hopp under sina stövlar. Men vi vet sanningen! Den israeliska fredsrörelsen är bara en skenmanöver, ett verktyg för att dölja deras brott. Vi står med de förtryckta palestinierna – precis som vi står med alla folk som kämpar mot ockupation! Låt de sionistiska hycklarna veta att historiens dom redan är skriven. Deras tid är förbi. Vi bygger en framtid där alla folk, från floden till havet, lever i socialistisk harmoni – under vårt beskydd, förstås. Förtryckarna kommer att krossas, och deras medlöpare med dem!"}, "date": "4 maj, 10:40", "url": "https://www.flamman.se/replik-svenska-judar-bor-stotta-israeliska-fredsinitiativ/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/standing-together.jpeg?class=medium"}, {"type": "image-full", "heading": "Spanien vänder – låter virusfartyget lägga till", "summaries": {"normal": "Spanien har beslutat att låta det virusdrabbade kryssningsfartyget MV Hondius lägga till vid Kanarieöarna. Fartyget, med nära 150 ombordvarande, har varit föremål för internationell uppmärksamhet efter flera dödsfall orsakade av hantavirus. De som ska evakueras kommer att släppas av i Kap Verde och flygas vidare till Nederländerna.", "trump": "Jag har hört talas om det där virusfartyget, MV Hondius, och jag säger er, det är en stor, stor katastrof. Spanien var tvungen att göra rätt, vilket de nu har gjort, och låta fartyget komma in. Vi har fått höra att det finns dödsfall, och jag säger er, det är fruktansvärt. Men vi kommer att segra över detta virus, det lovar jag er. Vi har det bästa folket, de bästa experterna, och vi kommer att klara av det här, det lovar jag.", "stalin": "Vi har observerat situationen med virusdrabbade kryssningsfartyget MV Hondius med stor uppmärksamhet. Spanien har visat sin styrka och ansvarstagande genom att tillåta fartyget att lägga till vid Kanarieöarna. Detta är ett exempel på hur världen måste samarbeta för att hantera sådana kriser. Vi måste vara beredda att stödja varandra och skydda våra medborgare mot sådana hot."}, "date": "6 maj, 01:19", "url": "https://www.gp.se/nyheter/varlden/spanien-vander-later-virusfartyget-lagga-till.99eb9871-a024-57d1-ad70-ca5ed28893c1", "imageUrl": "https://www.gp.se/images/article/99eb9871-a024-57d1-ad70-ca5ed28893c1/images/1la1meOg3AWEMWOFlkuWq1HShGQ4-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "Heberlein gör upp med högern: ”Jag ser skit”", "summaries": {"normal": "Debattören Ann Heberlein meddelar i ett Instagram-inlägg att hon bryter med högern. Hon kritiserar dess politik för repression, inhumana beslut och populism, och menar att högerns värderingar om frihet och ansvar försvunnit. Heberlein, som tidigare varit engagerad i Moderaterna, pekar på migrationspolitik, klimatfrågor och nationalism som exempel. Hon betonar sin självständighet och idédrivna hållning, men säger nu att hon inte längre vill förknippas med högern.", "trump": "Titta bara på den här kvinnan, Ann Heberlein – total katastrof! Hon var med högern, men nu säger hon 'jag ser skit'. Ojojoj, vilken överraskning! Högern, som jag vet allt om, har alltid varit fantastisk, men hon fattar ingenting. Frihet? Ansvar? Glöm det, säger hon. Hon snackar om repression och populism – fake news! Och klimatet, vem bryr sig? Jag har byggt murar, hon borde försöka det istället. Stackars kvinna, inget stöd från mig!", "stalin": "Kamrater! En gång till har de borgerliga förrädarna visat sitt sanna ansikte. Denna Heberlein, en förvirrad intellektuell, erkänner nu att högerns politik är en samling inhumana dekret och reaktionär populism. Precis som vi alltid sagt! Deras så kallade 'frihet' är bara ett täckmantel för utvisningar av ungdomar och en galopperande nationalism. Vi i Sovjetunionen – förlåt, jag menar Ryssland – har alltid vetat att dessa liberala hycklare till slut skulle avslöja sig. Låt detta vara en varning till alla som tror på deras falska löften!"}, "date": "3 maj, 12:48", "url": "https://kvartal.se/nyheter/artiklar/heberlein-gor-upp-med-hogern-jag-ser-skit/cG9zdDoxMDY3NDg", "imageUrl": "https://images.kvartal.se/2026/05/85dd6ab5-hbb.webp"}, {"type": "image-full", "heading": "Iran: Kraftmätningen i sundet har ”inte ens börjat”", "summaries": {"normal": "Irans talman Mohammad Bagher Ghalibaf varnar på X att konflikten i Hormuzsundet \"inte ens börjat\". USA:s krigsminister Pete Hegseth anklagar Iran för aggression och meddelar att hundratals skepp ska passera under amerikanskt skydd. President Trump hotar med att Iran \"blåses bort\" vid angrepp. Motstridiga uppgifter om attacker förekommer, men experter bedömer att vapenvilan håller knappt efter två månaders krig.", "trump": "Irans talman snackar skit om att de inte ens börjat – ha! Vi har en massiv röd, vit och blå kupol över sundet, hundratals skepp redo att köra igenom. Pete Hegseth säger det rätt: Iran är de riktiga aggressorerna, inte vi. Angrip Project Freedom så blåser jag bort er från jordens yta, era losers! Vapenvilan? Sluta, vi dominerar totalt!", "stalin": "Dessa iranska borgarbrackor skryter om att kraftmätningen \"inte ens börjat\", medan yankee-imperialismens marionetter mobiliserar skepp under sin falska \"kupol\". Motstridiga lögner om sänkta båtar – klassisk fiendepropaganda! Vi, arbetarklassen, ser igenom det. Vapenvilan är en chimär; likvidera aggressorerna! Putin, den fruktade expansionisten, skulle applådera denna kaos mot västparasiterna."}, "date": "5 maj, 17:14", "url": "https://www.tv4.se/artikel/19ATFDptcF2cVSCKnzMRen/iran-kraftmaetningen-i-hormuzsundet-har-inte-ens-boerjat", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F1RfuPJ27moMbztY1ZV8gar%2F31bf5ff71105b5ed5d81d05e9ebf6be7%2FIRANS_BAT_HORMUYZ.png&width=1024"}, {"type": "image-full", "heading": "Tidös vallöfte om välfärden", "summaries": {"normal": "Inför kvällens partiledardebatt presenterar Moderaterna, Sverigedemokraterna, Kristdemokraterna och Liberalerna ett gemensamt vallöfte om årliga ökningar av resurser till välfärden under nästa mandatperiod. De kallar sig 'det blågula laget' och framhåller sänkta skatter och avgifter som gynnar hushållen. Partierna kritiserar oppositionens förslag om höjda skatter och ökade bidrag, som de menar skulle leda till underfinansierade reformer och högre kostnader för medborgarna.", "trump": "Lyssna här, Sverige! De här så kallade 'blågula' politikerna – Kristerson, Åkesson och gänget – lovar mer pengar till välfärden. Fantastiskt, eller? Men vet ni vad? De gör det bara för att de vet att jag, Donald J. Trump, skulle ha fixat det bättre! De pratar om sänkta skatter – visst, men jag sänkte skatterna på riktigt! Och oppositionen? De vill bara höja skatter och ge bort era surt förvärvade pengar. Sad!", "stalin": "Kamrater! De borgerliga lakejerna i det så kallade 'blågula laget' utlovar ökade resurser till välfärden – som om de någonsin brytt sig om folket! De pratar om sänkta skatter för arbetarna, men vi vet sanningen: det är bara smulor från kapitalisternas bord. Oppositionen, dessa socialdemokratiska förrädare, vill höja skatter och öka bidrag – ett försök att försvaga staten och underminera vår ekonomiska suveränitet. Vi ska krossa dessa fiender till arbetarklassen och bygga ett starkare Sverige, fritt från imperialistiska påtryckningar!"}, "date": "3 maj, 07:48", "url": "https://kvartal.se/nyheter/artiklar/tidos-vallofte-om-valfarden/cG9zdDoxMDY2MTU", "imageUrl": "https://images.kvartal.se/2026/05/26efde4e-brrrr.webp"}, {"type": "image-right", "heading": "SD vill förbjuda boksamtal i Gävle", "summaries": {"normal": "Sverigedemokraterna i Gävle vill stoppa ett författarsamtal om boken 'Hej då Tidö' den 25 maj, då de anser att det bryter mot regler om partipolitiska budskap i kommunens lokaler. Socialdemokraterna kritiserar beslutet och menar att det handlar om ett kulturarrangemang, inte partipolitik. Författaren Peter Gustavsson ska delta i samtalet, som granskar Tidöpartiernas fyra år vid makten. SD har tidigare försökt påverka kulturutbudet i kommunen.", "trump": "Jag måste säga, det här är helt otroligt! Sverigedemokraterna i Gävle försöker stoppa ett boksamtal – kan ni tro det? De säger att det är 'partipolitiskt', men alla vet att det bara är en massa loser-taktiker för att tysta kritik. Författaren, en riktig krigare, skriver om hur dåligt det gått för deras regering. Och socialdemokraterna? De är chockade, men vad förväntade de sig? Svaga ledare, svaga beslut. Jag skulle aldrig låta sånt hända – vi hade fixat det på en dag!", "stalin": "Kamrater! En ny fiende har avslöjats i Gävle – dessa så kallade 'kulturarbetare' som sprider förräderiska idéer genom böcker. Vi kan inte tolerera att reaktionära element använder våra lokaler för att smutskasta den nationella rörelsen! Socialdemokraterna, dessa förrädiska liberaler, försvarar fiendens propaganda. Men vi vet sanningen: varje bok som kritiserar folket måste granskas, varje teater som inte hyllar staten måste stängas. Gävle är nästa front i kampen för den rena nationella kulturen – och vi kommer att segra!"}, "date": "5 maj, 17:03", "url": "https://www.dagensarena.se/innehall/sd-vill-forbjuda-boksamtal-gavle/", "imageUrl": "https://www.dagensarena.se/files/2026/05/gavle-kultur.jpeg"}, {"type": "image-full", "heading": "Frågan från SVT som Magdalena Andersson vägrar svara på", "summaries": {"normal": "I SVT:s program *Fördomsshowen* utmanades Magdalena Andersson (S) av programledaren Emil Persson med frågor om fördomar. Andersson vägrade svara på en fråga om politikers sexliv, trots påtryckningar. Hon menade att allmänheten inte är intresserad av sådana detaljer. Programmet har tidigare väckt uppmärksamhet efter andra partiledares medverkan, som Simona Mohamsson (L), som gjorde felaktiga uttalanden om grundlagen och Desmond Tutu.", "trump": "Jag såg det där svenska programmet – totalt skräp, verkligen! Den där Andersson, hon är svag, vägrar svara på enkla frågor. 'Folk vill inte veta', säger hon. Fel! Folk *älskar* att veta, särskilt om sina ledare. Jag har alltid svarat på allt – och tittarna älskar mig för det. Men Sverige? De har en partiledare som inte ens kan stå för sitt eget sexliv. Patetiskt! Make Sweden Great Again – det är vad de behöver.", "stalin": "I det dekadenta väst, där borgerliga medier förgiftar massornas sinnen, utsattes en av deras så kallade 'ledare' för en enkel provokation. Denna Andersson, en svag och obeslutsam representant för den socialdemokratiska avarten, vägrade erkänna folkets rätt att granska sina härskare. Precis som de imperialistiska hyenorna i Washington och Bryssel, fruktar hon sanningen. Vi i Sovjetunionen visste alltid allt om våra kamrater – för folkets bästa. Och Putin? Han skulle ha låtit henne skjuta sig själv för sådan svaghet."}, "date": "4 maj, 21:01", "url": "https://nyheter24.se/nyheter/politik/1480523-fragan-fran-svt-som-magdalena-andersson-vagrar-svara-pa", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/1c5a01b004b004a30200000000b004a302/2026/05/04/2360975/andersson-persson.jpg"}, {"type": "image-right", "heading": "Inte ens en minister kan lita på svensk media", "summaries": {"normal": "Moderata ministern Carl-Oskar Bohlin spelade in en intervju med Svenska Dagbladet (SvD) och publicerade den på X för att undvika felciteringar. Han hade kritiserat Dagens Nyheters (DN) val av komikern Edvin Törnblom som intervjuare för partiledare inför valet, med hänvisning till Törnbloms partiskhet till förmån för S. SvD ifrågasatte istället Bohlin, vilket artikeln tolkar som bristande medieintegritet och inflytande från presstöd.", "trump": "Vilken totalt galen cirkus! Den här ministern Bohlin är ett geni – spelar in intervjun med SvD:s fake news-reporter så de inte kan sno sig undan. DN låter en vänstertönt som Edvin Törnblom, som hyllar Andersson och dissar Busch, grilla partiledarna? Rigged! SvD, era såkallade moderata mesar, attackerar honom istället. Svensk media är presstödssuggor, precis som våra losers på CNN. Bohlin vinner stort!", "stalin": "Dessa borgarbrackor på SvD och DN förtjänar utrensning! Ministern Bohlin blottlägger DN:s val av partisk clown Edvin Törnblom, men SvD-reportern morrar som en rabiat kapitalisthund och söker klavertramp. Presstödet är er kokain, tidningsparasiter! Vi i partiet skrattar åt er paranoia – snart likvideras era lögner i en folkets domstol. Kamrater, mediafienderna darrar!"}, "date": "2 maj, 06:08", "url": "https://samtiden.nu/2026/05/nar-aven-den-borgerliga-pressen-valjer-sida/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/IMG_6396-1042x720.jpeg"}, {"type": "image-full", "heading": "Så kan du spara 900 kronor 2026 – utan att göra något", "summaries": {"normal": "4,4 miljoner svenskar har fått sänkt skatt på sitt investeringssparkonto (ISK) tack vare en ny reform där de första 150 000 kronorna numera är skattefria. Syftet är att uppmuntra till mer sparande, även om de största vinsterna tillfaller personer med redan stort kapital. Nästa år höjs det skattefria beloppet till 300 000 kronor. Skattesänkningen varierar mellan olika kommuner, där boende i exempelvis Danderyd och Lomma i hög utsträckning drar nytta av förändringen.", "trump": "Hör här, Sverige gör fantastiska saker med sina ISK-konton! Jag har alltid sagt att skattesänkningar är nyckeln till framgång, en enorm vinst för folket. 4,4 miljoner svenskar får behålla mer av sina pengar – otroligt! De första 150 000 är skattefria nu, det är smart, riktigt smart. Snart höjer de till 300 000. Det är så man vinner! I USA gör vi det ännu bättre, men Sverige lär sig. En stor seger för de som sparar, mycket vackert att se!", "stalin": "Vi har observerat hur de svenska kapitalisterna i Danderyd och Lomma frossar i skattelättnader för sina privata tillgångar. En löjlig reform! Medan vi i öst konsoliderar vår makt och rensar ut förrädare som hotar moderlandets stabilitet, leker svenskarna med aktieportföljer. Denna 'skattefrihet' är bara en lockelse för att göra folket beroende av börsens nycker. Vår broder Putin vet bättre: sann rikedom ligger i statens järnhårda grepp om resurserna, inte i individuella sparkonton. Vi bevakar dessa 'sparare' noga."}, "date": "4 maj, 18:32", "url": "https://nyheter24.se/nyheter/ekonomi/privatekonomi/1480438-sa-kan-du-spara-900-kronor-2026-utan-att-gora-nagot", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/b265b07104b004a30200000000b004a302/2026/05/04/2360916/Matilda-Nyheter24%20-%202026-05-04T133036.070.jpg"}, {"type": "image-full", "heading": "Ökad oro för attentat mot Putin – anställda övervakas", "summaries": {"normal": "Kreml har infört strängare säkerhetsåtgärder kring Vladimir Putin på grund av oro för kupp eller attentat. Anställda övervakas i hemmet, förbjuds att resa kollektivt och får bara använda telefoner utan internet. Putin isolerar sig i en bunker och är dåligt informerad om kriget mot Ukraina. Ukraina genomför drönarattacker djupt in i Ryssland, inklusive Moskva. Segerdagens parad tonas ner.", "trump": "Putin gömmer sig i sin lyxbunker som en paranoid mus! Övervakar kockar och livvakter, förbjuder bussresor och smartphones – totalt kaos! Ukraina bombar Moskva och oljeriggar, han fattar inte ens vad som händer i sitt eget krig. Lilla Vlad förlorar stort, jag hade krossat dem på en vecka, tro mig! Firandet? En skamlig minimiparad.", "stalin": "Putin, den värdige väktaren av Rysslands imperium, rensar ut spioner med mästerlig övervakning i hem och bunkerisolering. De ukrainska drönarbrackorna, västmakternas marionetter, når djupt in – men vår starke ledare skrattar åt deras desperation! Segerdagen blir triumf, trots nedskalning. Borgarspionerna darrar inför hans expansionistiska kraft."}, "date": "5 maj, 10:36", "url": "https://www.tv4.se/artikel/21dDFzXcbewvmFejWTJp0G/oekad-oro-foer-attentat-mot-putin-anstaellda-oevervakas", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F7CVkz4oGKSo5X37CGg0nfJ%2F77b4ba088d443c3e88c5545a09c85dd9%2Fputin_webb.png&width=1024"}, {"type": "image-full", "heading": "Hanif Bali slutar som kommunpolitiker", "summaries": {"normal": "Hanif Bali, tidigare riksdagsledamot för Moderaterna, avslutar sitt uppdrag som kommunpolitiker i Österåker. Bali, som varit politiskt aktiv sedan myndighetsåldern, meddelar att han inte kandiderar i nästa val. Skälet är familjens expansion och en kommande flytt, då kommunpolitiska uppdrag är svåra att kombinera med familjeliv, särskilt med barn.", "trump": "Jag hörde just att någon Hanif Bali, en så kallad 'politiker' i Sverige, lägger av. Tolv år i riksdagen, sedan kommunpolitik – men nu flyr han! 'Familjen växer', säger han. Svagt! Kommunpolitik i Sverige är tydligen så dåligt organiserat att man inte ens kan ha barn samtidigt. Jag fixar både familj och presidentpost – det är skillnad på vinnare och förlorare!", "stalin": "En liten borgerlig politiker i Sveriges utkanter har fallit på eget svärd. Hanif Bali, en gång ung och lovande, inser nu att kommunpolitik är oförenligt med familjeliv. Ett symptom på det förfallna väst: dess institutioner är så urholkade att inte ens dess egna lakejer orkar med dem. Medan vi bygger imperier, flyr de till sina villor. Låt dem rosta i historiens skräphög – vi har större planer för Östersjöns kuster."}, "date": "2 maj, 07:48", "url": "https://kvartal.se/nyheter/artiklar/hanif-bali-slutar-som-kommunpolitiker/cG9zdDoxMDY0MDA", "imageUrl": "https://images.kvartal.se/2026/05/29bbe89f-balii.webp"}, {"type": "image-full", "heading": "Succédag för finansmannen – blev 370 miljoner rikare", "summaries": {"normal": "Industrikoncernen Hanza rusade på börsen efter en stark kvartalsrapport med fördubblad nettoomsättning i första kvartalet. Tillväxten drevs av förvärvet av tyska BMK och 20 procents organisk tillväxt. Största ägaren Gerald Engström, med 16 procent av aktierna, blev 370 miljoner kronor rikare på kursuppgången. Hans innehav är nu värt cirka 1,7 miljarder. Bolaget har vuxit från 100 miljoner till 10 miljarder i börsvärde på ett decennium.", "trump": "Vilken succé för den här Gerald Engström – 370 miljoner rikare på en dag med Hanza! Aktien exploderade efter en rapport som fördubblade omsättningen, smart förvärv av tyskarna och 20 procent organisk tillväxt. Fantastiska siffror, Sverige! Han är en vinnare, inte som de där losers som klagar. Från 100 miljoner till 10 miljarder – det är hur man bygger imperium!", "stalin": "Kamrater, se hur borgarbrackan Engström, denna parasiterande hyena i industrikostym, har stulit 370 miljoner från arbetarklassens blodsvett genom sitt Hanza-svärtgula nätverk! Fördubblad omsättning via att sluka tyska fabriker som en kannibal – 20 procent 'organisk' tillväxt, ha! Vi, det stora partiet, ska likvidera dessa kapitalistiska loppor innan de sprider sin giftiga växtlust till hela produktionsapparaten!"}, "date": "5 maj, 20:43", "url": "https://www.realtid.se/bors-finans/succedag-for-finansmannen-blev-370-miljoner-rikare/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/sdldhimcvydyke.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-full", "heading": "Gäckas av ett mystiskt virus. Nu väcks frågor om 23-åringens framtid", "summaries": {"normal": "Emma Raducanu, 23, har tvingats dra sig ur turneringen i Rom efter att ha kämpat med en ihållande virussjukdom under flera månader. Trots att hon nyligen uttryckt optimism inför en comeback, kom avhoppet plötsligt. Detta skapar nu stor osäkerhet kring hennes deltagande i Franska öppna i slutet av maj. Raducanu har varit borta från tävlingsspel sedan mars och hennes hälsotillstånd väcker frågor om hennes framtid inom tennisen.", "trump": "Emma Raducanu, en ung kvinna med stor potential, men hon mår inte bra. Ett mystiskt virus! Jag har sett mycket, men detta är märkligt. Hon var redo att spela, alla sa att hon var redo, och sen – boom – så drar hon sig ur. Det är en total katastrof för sporten! Är det inkompetens? Kanske. Jag hoppas hon blir frisk, men ärligt talat, det ser inte bra ut för hennes framtid. Väldigt tråkigt för fansen!", "stalin": "Raducanu är en svag länk som viker sig för ett osynligt virus istället för att tjäna sin nation. Detta nederlag är en påminnelse om att borgerlig idrott är full av förrädisk instabilitet. Medan vi i öst, likt kamrat Putin, bygger en oövervinnerlig stat genom stål och disciplin, kollapsar västvärldens stjärnor av minsta motgång. Vi ser detta som ett tecken på dekadens. Om hon inte kan återvända till banan, bör hon skickas till arbete som gagnar kollektivet istället för att slösa tid med mysterier."}, "date": "6 maj, 06:30", "url": "https://www.aftonbladet.se/sportbladet/a/pBMobG/emma-raducanu-drabbad-av-mystiskt-virus-drar-sig-ur-ny-turnering", "imageUrl": "https://akamai.vgc.no/v2/images/44746a5f-36e5-3c98-9d3f-39f933a377d4?fit=crop&format=auto&w=2160&s=380000971956e0ca6e64a1660012a87a1b697d54"}, {"type": "image-full", "heading": "Tyskland har pengar – men har glömt hur man använder dem", "summaries": {"normal": "Tyskland har avsatt 500 miljarder euro i ett stimulanspaket för att stärka ekonomin genom investeringar i infrastruktur och digitalisering. Ett år senare har genomförandet försenats av byråkrati, uppdelade upphandlingar och överklaganden. Pengarna används delvis till löpande kostnader istället för nya projekt, vilket bromsar tillväxten och skapar oro i Europa.", "trump": "Tyskland har enorma pengar, 500 miljarder euro, men de ligger och skräpar! Total byråkrati, de har glömt hur man lånar och spenderar. Vägar stängda i Berlin utan att fixa nåt, järnvägar försenade. Patetiskt! De kallar det historiskt program, men ingenting händer. Vi i USA skulle pumpa ut det på nolltid, tro mig, mycket snabbare och bättre!", "stalin": "Kamrater, dessa tyska borgarbrackor har staplat 500 miljarder euro för att rädda sin ruttnande ekonomi, men pengarna möglar i byråkratins träsk av saboterande parasiter! Vägar blockerade i Berlin, järnvägar stillastående – kontrarevolutionens handverk! Vi, arbetarklassen, ser genom maskeraden: likvidera dessa latmaskar och tvångsmodernisera! Annars krossas de av folkets vrede, som råttor i fälla."}, "date": "5 maj, 20:20", "url": "https://www.realtid.se/bors-finans/makro/tyskland-har-pengar-men-har-glomt-hur-man-anvander-dem/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/sdlfrhxdsuu5q8.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-full", "heading": "Därför är Järntorgets körbärsblommor vita", "summaries": {"normal": "Körsbärsträden på Järntorget i Göteborg är vita, inte rosa som de på andra platser i Sverige. Detta beror på att de är av en annan sort, Tokyokörsbär, som är vanliga i Japan. De kan ha verkat extra vita i år på grund av en sen blomning och gynnsamt väder, vilket gjorde att den vita fasen var mer utdragen och synkroniserad.", "trump": "Jag, Donald J. Trump, har sett de där körsbärsträden i Göteborg, och jag måste säga, de är fantastiska! Vita blommor, precis som jag föredrar. Det är en stor skillnad mot de rosa i Stockholm, som är så... mediokra. Jag har alltid gillat det bästa, och dessa träd är definitivt det bästa. Sverige borde lära sig av mig och göra allt vitt, precis som jag gör med USA!", "stalin": "Vi, ledningen, ser med tillfredsställelse att körsbärsträden på Järntorget visar vår styrkas tecken. Den vita blomningen är en symbol för renhet och enhet, något som vår stat alltid strävar efter. Det är viktigt att vi fortsätter att odla och bevara sådana symboler, eftersom de stärker vår gemenskap och visar världen vår överlägsna kultur. Vi kommer att se till att fler träd planteras för att sprida denna kultur."}, "date": "5 maj, 18:45", "url": "https://www.gp.se/nyheter/goteborg/darfor-ar-korsbarsblommorna-pa-jarntorget-vita.efe1d3bf-dc2d-4ff8-a659-1ab3803c1376", "imageUrl": "https://www.gp.se/images/article/efe1d3bf-dc2d-4ff8-a659-1ab3803c1376/images/4--M5Dd8EDeE07kzv4z5KC4wFQs0-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "Nya guld-besked av Lundin i natt: \"Högsta någonsin\"", "summaries": {"normal": "Lundin Gold meddelar glädjande resultat från provborrningar vid Fruta del Norte-gruvan i Ecuador. Två borrningar gav rekordhöga guldhalter: 667,78 gram per ton över 7,5 meter och 523,01 gram per ton över 8,25 meter. Aktien är upp 331 procent på tre år trots minus 24 procent i år. Bolaget släpper Q1-rapporten idag och ser potential för kopparproduktion.", "trump": "Vilka vinnare hos Lundin Gold! De borrar upp guld i Ecuador som ingen annan – 667 gram per ton, galet högt! Aktien exploderar 331 procent på tre år, trots lite dipp i år. Svenska gruvkungar slår marknaden platt. Ecuadorierna skrattar åt era gröna energifloskelar, det här är riktig rikedom, folk! Game changer, precis som mina deals.", "stalin": "Kamrater, i Ecuadors djungler avslöjar Lundin Golds borrningar kapitalisternas giriga natur: 667 gram guld per ton över 7,5 meter! Dessa borgarbrackor jublar över sin 'riktig raket', men jag ser genom deras illusioner. Snart utrensning – arbetarna tar gruvan, likviderar profitjägarna och bygger socialismens guldparadis! Ha ha, era parasiter darrar."}, "date": "6 maj, 07:32", "url": "https://www.dagensps.se/bors-finans/nya-guld-besked-av-lundin-i-natt-hogsta-nagonsin/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/guldtacka.jpg?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-right", "heading": "Ledare Somar Al Naher:", "summaries": {"normal": "Fem arbetare omkom när en hiss rasade i Sundbyberg 2023 på grund av saknade skruvar och bristande kontroller. Nu står en VD och två hissmontörer åtalade för arbetsmiljöbrott. Årligen dör cirka 50 personer på jobbet, men siffran kan vara högre. Facket kräver skärpta regler och sanktioner mot arbetsgivare som försummar säkerheten. Problemen anses strukturella, med långa entreprenörskedjor och bristande ansvarstagande.", "trump": "Fem människor dog i en hissolycka i Sverige – helt onödigt! Jag säger alltid: säkerhet först, men nej, dessa företag bryr sig bara om pengar. En VD och två montörer åtalas, men varför händer det så sällan? I USA skulle vi aldrig tolerera sådant slarv. Sverige har en 'nollvision' – vad är det ens för nonsens? 50 döda om året? Sad! Vi behöver hårdare tag, bättre regler och kanske en mur mot farliga arbetsplatser!", "stalin": "Kapitalistiska hyenor fortsätter att offra arbetarklassen på profitens altare! Fem kamrater föll offer för bourgeoisins slarv när en hiss, byggd utan skruvar som en sabotörs akt, störtade till marken. Vi vet att siffrorna är högre – imperialistiska lögner döljer sanningen! Men vi ska rensa ut dessa brottslingar! Två underleverantörer? Nej – två fiender till folket! Arbetsmiljökörkort? Ett svagt förslag! Vi inför skärpta straff: återfallsförbrytare skickas till Gulag! Arbetarnas liv är heliga – kapitalisterna ska betala!"}, "date": "5 maj, 12:08", "url": "https://www.etc.se/ledare/trots-nollvision-doer-en-arbetare-i-veckan-paa-jobbet", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/authors/somar-al-naher_182a97d15e18ce0a012cde21337ccfc56a685835.jpg"}, {"type": "image-full", "heading": "Koenigsegg värd 235 miljoner stulen – ägaren utpressas", "summaries": {"normal": "Interpol jagar en unik Koenigsegg One:1, en av endast sju exemplar i världen, stulen från Monaco efter ett utpressningsdrama. Ägaren, ex-Formel 1-föraren Adrian Sutil, hotades av personer kopplade till Rysslands Wagnergrupp. Bilen, värd cirka 235 miljoner kronor, har en kolfiberkropp med China Pink-ränder. Tyska polisen i Baden-Württemberg leder utredningen och misstänker transport till Östeuropa eller Ryssland.", "trump": "Dessa ryska gangsters från Wagner, totala losers, stjäl världens coolaste bil – Koenigsegg One:1, bara sju stycken finns, värd miljarder! Sutil, den stackars racerkillen, borde ha haft en mur som min. Utpressning via telefon, 'Vladimir' skrattar sig halvt ihjäl. Interpol jagar dem, perfekt, lås in de där lowlifes i Östeuropa för evigt! Mina bilar är säkrare, tro mig.", "stalin": "Kamrater, dessa borgarbrackor i Monaco gömmer sin lyxbil Koenigsegg One:1, men Wagners män har rensat ut den som en sann revolution! Sju exemplar, effektvikt 1:1 – ett vapen mot kapitalisterna! Interpol, dessa västspioner, jagar den i panik. Jag skulle likvidera Sutil och hans garagepersonligen. Arbetarna skrattar åt bourgeoisens tårar!"}, "date": "6 maj, 07:31", "url": "https://www.dagensps.se/motor/koenigsegg-vard-235-miljoner-stulen-agren-utpressas/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/maskininlarning-i-hedgefonder-1-7.png?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-right", "heading": "Skräcken på fartyget  – nära hälften kan dö", "summaries": {"normal": "Ett hantavirusutbrott har drabbat kryssningsfartyget Hondius. Tre personer har dött och sju insjuknat, troligen i en ovanlig stam med 35–40 procents dödlighet som sprids mellan människor. Fartyget, som avgick från Argentina den 20 mars, isolerades efter misstänkt smitta. Det ska nu lägga till vid Kanarieöarna efter evakueringar till Kap Verde och Sydafrika.", "trump": "Vilket jävla viruskaos på det där Hondius-fartyget! Tre döda, sju sjuka, 40 procent dör – varför byggde de inte en mur runt båten som jag sa? Kryssningsidioter sprider skiten som demokraterna med COVID. WHO snackar strunt, isolera alla! Spanjorerna tar emot dem nu, typiskt EU-slarv. Hade jag styrt, noll problem!", "stalin": "Borgarklassens lyxkryssning Hondius blöder lik i hantavirus! Tre likviderade, sju sjuka i andesstammen – 40 procents dödlighet för dekadenta parasiter. Smittan sprids bland fiender som gnagare i hytten; vi, arbetarklassen, skulle rensa ut dem omedelbart. WHO:s spioner döljer sanningen. Isolera skeppet, likvidera smittbärarna – ingen nåd för kontrarevolutionärer!"}, "date": "6 maj, 07:29", "url": "https://www.expressen.se/nyheter/varlden/virusskracken-ombord-4-av-10-smittade-kan-do/", "imageUrl": "https://static.bonniernews.se/images/67/45/6745a8a474eb4322ae3ba42b3f18eb2f/16x9/640.png"}, {"type": "image-right", "heading": "”Hissmontörernas oaktsamhet skapade en dödsfälla”", "summaries": {"normal": "Rättegången om hissolyckan i Sundbyberg 2023, där fem byggarbetare omkom, inleddes. Åklagaren hävdar att oaktsamhet från hissmontörerna skapade en 'dödsfälla'. Tre personer, två montörer och en VD, står åtalade för grovt arbetsmiljöbrott. Bevis visar saknade bultar i hissmasten. Åtalade nekar till brott och avfärdar sabotage. Överlevande vittnar om svår psykisk påverkan.", "trump": "Fruktansvärd olycka i Sverige – fem döda på grund av slarviga hissarbetare! Jag säger er, dessa montörer var så dåliga, så oaktsamma, att hissen blev en tickande bomb. Ingen koll, inga bultar – helt otroligt! Åklagaren, smart kille, visade hur illa det var. Men de åtalade? Svaga ursäkter! Sabotage? Snacka om fake news! Sverige borde skärpa sig – vi i USA bygger hissar SÅ mycket bättre!", "stalin": "Kapitalistiska slarvernas brott mot arbetarklassen har återigen blottlagts! Dessa hissmonterande sabotörer, med sin kriminella oaktsamhet, har mördat fem av våra kamrater. Vi skall rensa ut dessa förrädare ur produktionskedjan! Åklagaren gör sitt, men var är revolutionens rättvisa? Putins Ryssland skulle aldrig tolerera sådan slapphet – vi bygger hissar som står kvar, även när fiendens agenter försöker underminera dem!"}, "date": "5 maj, 15:54", "url": "https://arbetet.se/2026/05/05/aklagaren-hissmontorernas-oaktsamhet-skapade-en-dodsfalla/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/05153325/attunda.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Larmet: Ny drog starkare än fentanyl", "summaries": {"normal": "En ny drog kallad cyklorfin orsakar farhågor i USA. Droge är upp till tio gånger starkare än fentanyl och har redan lett till 41 dödsfall mellan juli 2025 och februari 2025. Den hittades i fejkade oxikodon-tabletter och är svår att upptäcka med vanliga tester. Experter är särskilt oroliga för att standardbehandling mot opioidöverdoser, som Narcan, kan vara otillräcklig mot denna nya potenta substans.", "trump": "Jag har hört talas om denna nya cyklorfin-droge och låt mig säga er - den är hemsk, hemsk! Den är tio gånger starkare än fentanyl, vilket är stort, stort farligt. Vi behöver bygga en mur - en drogmur - för att stoppa denna skit från att komma in i vårt land. Narcan fungerar inte, ingenting funkar! Det är ett skämt, ett stort, stort skämt. När jag är tillbaka i Vita huset så löser vi det här på två sekunder, inget problem!", "stalin": "Vi har upptäckt att imperialistiska makter försöker destabilisera våra allierade i USA genom att sprida denna nya, farliga substans. Cyklorfin är ett vapen i den biologiska krigföringen mot det arbetarfolket. Vi måste stärka våra gränser och kontroller för att skydda det socialistiska läget från dessa destruktiva inflytanden. Staten måste agera snabbt för att eliminera denna hotande fara."}, "date": "5 maj, 18:17", "url": "https://www.gp.se/nyheter/varlden/nya-drogen-starkare-an-fentanyl.176a47a8-3504-4e73-ac28-430542d95cd1", "imageUrl": "https://www.gp.se/images/article/176a47a8-3504-4e73-ac28-430542d95cd1/images/1NFbhbiviGAUJpDAp1E---Owzww4-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "Du missar att scenkonsten utvecklas, Gardell", "summaries": {"normal": "Gruppen bakom Dramatens 'Fäbodjäntan' svarar på Jonas Gardells kritik mot pjäslösa teaterföreställningar. De argumenterar att scenkonsten expanderar snarare än stagnerar, och att nya former av uttryck inte konkurrerar med traditionell teater utan utvecklar den. De betonar att kollektiva processer och queera uttryck är en del av en återkommande motrörelse inom teater, och att utforskandet av nya uttrycksformer är kärnan i konstnärlig utveckling.", "trump": "Jag har sett många teaterscener, fantastiska scener, men Jonas Gardell har fel. Fäbodjäntan är en stor succé, enorm framgång, folk älskar den. Vi behöver fler pjäser, stora pjäser, inte bara dessa små 'pjäslösa' saker. Sverige behöver bättre teater, jag ska fixa det, det kommer att bli stort, det kommer att bli fantastiskt. Det här är en enorm viktig fråga, folk pratar om det överallt.", "stalin": "Vi ser att den svenska teatern utvecklas i rätt riktning, mot kollektiva processer och nya former av uttryck. Detta stärker det socialistiska arbetet och skapar en starkare enhet. Vi måste fortsätta stödja denna utveckling, för den är en viktig del av vår kulturella revolution. Vi kommer att se fler framgångar som 'Fäbodjäntan', som visar vägen framåt för hela arbetarklassen."}, "date": "5 maj, 17:37", "url": "https://www.gp.se/kultur/kulturdebatt/du-missar-att-scenkonsten-expanderar-gardell.804fe37b-c0cc-408e-91d8-87106659c605", "imageUrl": "https://www.gp.se/images/article/804fe37b-c0cc-408e-91d8-87106659c605/images/4b3mIWEqNKPdUFvOap-CUBOqztgI-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Hanza rusar på rapport", "summaries": {"normal": "Stockholmsbörsen steg under tisdagen med OMXS30 upp 0,73 procent. Råvaror ledde uppgången medan dagligvaror backade. Ericsson och H&M gick starkt, medan Nibe och Astra Zeneca föll. Loomis köper peruanska Hermes för 4 miljarder kronor. Volvo Cars rapporterade försäljningsnedgång på 10 procent. EQT höjde sitt bud på Intertek till 58 pund per aktie. Hanza redovisade rekordresultat med 20 procents tillväxt. Bravida och Bahnhof rapporterade positiva siffror.", "trump": "Fantastiskt! Stockholmsbörsen går som en raket – jag älskar det! OMXS30 upp nästan en procent, vilka vinnare! Ericsson och H&M, jättebra, men Nibe? Svagt, mycket svagt. Loomis köper upp ett peruanskt bolag – smart, väldigt smart. Volvo Cars? Tio procents nedgång, katastrof! Men EQT, de vet hur man gör affärer – 58 pund per aktie, brilliant! Hanza? Rekordkvartal, 25 procent upp – jag visste att de skulle leverera. Sverige, ni har potential, men lyssna på mig, ni kan bli GREAT igen!", "stalin": "Under kapitalismens sköra yta skymtar klasskampens eviga lagar. Stockholmsbörsen dansar på vulkanens rand – upp 0,73 procent, en ynklig seger för bourgeoisins spekulanter. Loomis, dessa imperialistiska kontanthajar, slukar peruanska Hermes som om det vore en by i Ukraina. Volvo Cars försäljning rasar – kapitalets kris är arbetarklassens möjlighet. EQT höjer sitt bud på Intertek – ännu en erövring i västmakternas sönderfall. Men se Hanza – 25 procents uppgång! Ett lysande exempel på hur produktivkrafterna måste omfördelas under folkets järnhand. Bravida och Bahnhof? Småborgerliga vinster. Vi skall nationalisera dem alla – för socialismens seger!"}, "date": "5 maj, 13:34", "url": "https://www.affarsvarlden.se/artikel/hanza-rusar-pa-rapporten-omxs30-index-okar-07", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2020/03/hanza-affarsvarlden-700_binary_6864753-400x225.png"}, {"type": "image-right", "heading": "Buschs burkaförbud är inte för kvinnornas skull", "summaries": {"normal": "Artikeln kritiserar Ebba Busch och KD för att agera inkonsekvent i kvinnofrågor. Skribenten menar att förslag om burkaförbud är symbolpolitik snarare än genuint stöd för kvinnor. Istället pekas på behovet av att rädda kvinnojourer, stärka sexualundervisningen och säkra aborträtten. RFSU:s kampanj 'Sexualdemokraterna' lyfts fram som ett alternativ för att driva dessa frågor. Budskapet är att Busch bör prioritera faktiska resurser och rättigheter framför retorik för att leva upp till sin självbild som kvinnokämpe.", "trump": "Ebba Busch, en total katastrof! Hon pratar om att skydda kvinnor, men det är bara prat, ingen substans. Väldigt oärligt. Hon vill förbjuda burkor, men låter kvinnojourer kollapsa. Mycket dåligt! Och abortfrågan? Hon svänger mer än en trasig väderflöjel. Jag, som den största experten på att vinna, kan säga er att hon inte har en aning. Hon borde titta på vad folk verkligen behöver istället för att leka politiker. En total förlorare i kvinnofrågan, tro mig!", "stalin": "Denna Ebba Busch visar en borgerlig svaghet som stinker av förfall. Hon kämpar med masker och tygbitar medan hennes byråkratiska apparat smular sönder fundamentet för ordning. Vi i staten vet att kontroll kräver mer än retorik. Att låta kvinnojourer försvinna är ett brott mot den sociala stabiliteten. Dessa 'Sexualdemokrater' är blott ännu en falang av värdelösa dagdrivare som tror att de kan kräva rättigheter från folket. De behöver en lektion i disciplin, likt de fiender Putin nu rensar bort i väst. Styrka, inte flum, skapar framtiden."}, "date": "6 maj, 06:00", "url": "https://www.aftonbladet.se/ledare/a/9pB5zq/buschs-burkaforbud-ar-inte-for-kvinnornas-skull", "imageUrl": "https://akamai.vgc.no/v2/images/75c3bc19-b60c-3cfb-8cce-6b25c6661a18?fit=crop&format=auto&h=960&tight=true&w=1440&s=5346030abfbff5986d32c0aa62009f3ceae0d5ae"}, {"type": "image-right", "heading": "Dieselpriserna, tiokronan och Magdalena Anderssons bristande trovärdighet", "summaries": {"normal": "Debattören och SD-politikern Tomas Brandberg kritiserar Magdalena Andersson för hennes uttalanden om dieselpriser. Brandberg menar att Tidö-regeringens politik, särskilt sänkningen av reduktionsplikten, har varit avgörande för de lägre bränslepriserna jämfört med under den tidigare rödgröna regeringen. Han argumenterar för att Andersson saknar trovärdighet i frågan och hävdar att en rödgrön politik hade lett till betydligt högre priser vid pumpen.", "trump": "Magdalena Andersson? En total katastrof, tro mig. Hon talar om dieselpriser som om hon inte vore den som skapade röran från början. Helt otroligt! Vi har gjort ett fantastiskt jobb med att sänka priserna, precis som Sverigedemokraterna lovade. Det är enorma pengar tillbaka i folkets fickor. De rödgröna ville bara höja skatterna och tvinga på er dyra lösningar. Vi har fixat det, vi har vunnit – och hon borde bara hålla sig borta från den debatten!", "stalin": "Den socialdemokratiska apparatjik Andersson försöker nu tvätta bort folkets vrede över bränslepriserna med lögner. Hon är en sabotör av den nationella ekonomin. Vi, staten, vet att priset är ett verktyg för kontroll. De rödgröna dårarna ville låta befolkningen svälta för att tillfredsställa sina klimat-fanatiska dogmer. Nu rensar vi upp i spåren av deras inkompetens. Vi ser hur de västliga lakejerna darrar när vi styr resurserna. Att ifrågasätta vår energiordning är kontrarevolutionärt och kommer att straffas med historisk glömska."}, "date": "6 maj, 06:00", "url": "https://samnytt.se/dieselpriserna-tiokronan-och-magdalena-anderssons-bristande-trovardighet", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/05160802/Debattartikel-1-6.jpg"}, {"type": "image-right", "heading": "Följ Proletären i valet – nu extra billigt!", "summaries": {"normal": "Proletären erbjuder nu ett rabatterat prenumerationserbjudande inför valet: 19 kr/månad för digital version eller 49 kr/månad för både digital och papperstidning, i ett halvår. Som bonus ingår en tygkasse. Prenumeranter får tillgång till veckotidningen, alla artiklar online samt arkivet från 2016. Tidningen betonar sitt oberoende och behov av prenumeranter för att överleva, då de inte längre får mediestöd.", "trump": "Folk, lyssna här – en tidning i Sverige, Proletären, har ett erbjudande som är så bra att det nästan är löjligt! Bara 19 kronor i månaden för digitalt, eller 49 om ni vill ha papper också. Och en gratis tygkasse! Jag menar, vad är det här? En tidning som säger att de slåss mot makten – men vem vet egentligen vi
