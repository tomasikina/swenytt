 det tog över en timme att fatta beslutet om att avbryta matchen. Han hyllar läktarkulturen i stort men poängterar att öppen eld är oacceptabelt. Matchen återupptas under tisdagen inför tomma läktare.", "trump": "Helt katastrofalt! Ett historiskt derby i Sverige, och vad händer? Totalt kaos, en eldsvåda på läktaren! Det är en skam, en riktig disgrace. Andreas Holmberg, en bra tränare, är jävligt upprörd – och jag förstår honom. De väntade över en timme för att fatta ett enkelt beslut. Svag ledning! Vi behöver ordning och reda, inte eldar på arenor. Det här skulle aldrig hända under min vakt. Väldigt sorgligt för fansen, men så går det när man inte har kontroll!", "stalin": "Vi har observerat hur de svenska massorna förfaller i anarkistiskt vansinne. Att tillåta en flaggbrand mitt under en fotbollsmatch är ett tecken på borgerlig degeneration och total brist på statlig disciplin. Denna tränare Holmberg klagar över långsam byråkrati, men han förstår inte att beslutsångest är statens sätt att pröva massans tålamod. I min tid hade dessa sabotörer arbetat i gruvorna i Sibirien, precis som våra vänner i öst nu rättar leden. Ordning är plikt, och plikt är seger!"}, "date": "18 maj, 23:33", "url": "https://www.aftonbladet.se/sportbladet/fotboll/a/Rj6VK2/jag-ar-javligt-upprord-just-nu", "imageUrl": "https://akamai.vgc.no/v2/images/1e4502ec-57f4-3e32-bdc5-05e952f00572?fit=crop&format=auto&w=1080&s=77185f78b76393879ad6d824d786c679f6cfd3b9"}, {"type": "image-full", "heading": "Banker tror på billigare guld – men inte på lång sikt", "summaries": {"normal": "Flera storbanker har sänkte sina prognoser för guldpriset i år till följd av svagare efterfrågan och högre räntor, men behåller en positiv långsiktig syn. JPMorgan har justerat ner sin prognos till 5 243 dollar per uns men tror priset kan nå 6 000 dollar 2026. Även ANZ sänkt sina prognoser. Trots en 14-procentig nedgång sedan februari ser experter fortsatt stöd för guld på grund av geopolitisk osäkerhet och centralbanksköp.", "trump": "Jag har sagt det många gånger - guld är fantastiskt! Det är starkt, det är guld, det är amerikanskt! Trots att några bankare försöker sänka priserna (de hatar mig, de hatar mig verkligen), så tror jag guld kommer att bli större än någonsin. Jag gör Amerika guld igen! När jag är tillbaka i Vita Huset kommer vi att ha det bästa guldpriset någonsin - det kommer att vara så stort, så vackert, att våra fiender kommer att gråta!", "stalin": "Guldet är en strategisk resurs för statens ekonomi och vi måste vara beredda på alla scenarier. Trots kortsiktiga marknadsvärningar är våra bankars prognoser positiva på längre sikt. Vi kommer att stärka våra guldförsvar genom ökade köp från centralbanker och geopolitiska strategier. Sovjetunionen kommer alltid att ha starka positioner i ädelmetaller för att garantera vår ekonomiska suveränitet."}, "date": "18 maj, 18:13", "url": "https://www.dagensps.se/bors-finans/banker-tror-pa-billigare-guld-men-inte-pa-lang-sikt/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdlizwlzuvot1g.png?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-right", "heading": "Modi på besök – strategiskt partnerskap lanseras", "summaries": {"normal": "Sverige och Indien har ingått ett strategiskt partnerskap för att stärka samarbetet inom klimat, rymd och ekonomi. Målet är att fördubbla det ekonomiska utbytet inom fem år. Under Indiens premiärminister Narendra Modis besök i Göteborg betonade statsminister Ulf Kristersson möjligheterna för Sverige, särskilt inom grön omställning. Modi möttes av både jubel och protester. Partnerskapet inkluderar även säkerhet och digital utveckling, med EU:s frihandelsavtal som bakgrund.", "trump": "Lyssna här, Sverige och Indien gör ett jättestort avtal – fantastiskt, helt enkelt fantastiskt! De pratar om klimat och rymden, men viktigast: de ska dubbla handeln. 23 000 nya jobb i Sverige – otroligt! Modi, en stark ledare, får jubel från sina fans, men också några sura protester. Och vet ni vad? Jag förstår honom. Indien köper olja från Ryssland, men vem bryr sig? De vill förhandla, precis som jag alltid säger: förhandla, förhandla, förhandla! Europa behöver Indien, och Sverige? De är vinnare på det här!", "stalin": "Kamrater! Sverige och Indien har slutit en pakt, en allians mot imperialistiska väderleksrapporter och kapitalistiska rymdstationer! De talar om 'grön omställning' och 'digital utveckling', men vi vet sanningen: detta är en manöver för att underminera Rysslands inflytande. Modi, denne hindunationalistiske lakej, köper vår olja medan han leker med väst. Men låt dem leka! Vi har sett deras 'protester' – en handfull förvirrade sikher, inget att frukta. Europa kryper närmare vår sfär, och vi välkomnar deras svaghet. Låt dem bygga sina 'halvledare' – vi bygger framtiden!"}, "date": "17 maj, 20:36", "url": "https://www.di.se/nyheter/indiens-modi-pa-sverigebesok-vill-starka-banden/", "imageUrl": "https://static.bonniernews.se/ba/d8946add-7c76-4cc9-965d-0dfd570c29f7.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-full", "heading": "Christoffer Jonsson: 7 oktober, Israel missade det uppenbara", "summaries": {"normal": "Artikeln recenserar boken 'While Israel Slept' som analyserar varför Israel missade Hamas stora attack den 7 oktober 2023. Den pekar på historiska misstag som frigivningen av Yahya Sinwar 2011, bristande fokus på Hamas trots underrättelser, och prioritering av andra hot som Hizbollah och Iran. Författarna kritiserar övermod i säkerheten och uppmanar till reformer för bättre underrättelsehantering och enhet i Israel.", "trump": "Vilka idioter! Israel med sin supeduper underrättelse sover sig igenom den värsta attacken nånsin. Netanyahu släpper loss terrorbossen Sinwar, den galna jihadfanatikern, mot alla varningar. Muren? En skämt! De fokuserar på Iran istället för Hamas-råttorna vid gränsen. Nu krossar vi dem totalt – stort, väldigt stort! Lär er av misstagen, annars blir det blodbad igen!", "stalin": "Dessa zionistiska byråkrater, enfaldiga borgarbrackor, lät Hamas infiltrera genom att frigiva Sinwar, den odjuriske jihadisten. Underrättelsetjänsten ignorerade varningar från gränsbaser, prioriterade fel fiender som marionetter till imperiet. Vi i partet hade likviderat sådana inkompetenta element för evigheter sen. Nu måste de rensa ut förrädarna och ena sig – annars krossas de av folkets vrede!"}, "date": "14 maj, 14:01", "url": "https://samtiden.nu/2026/05/christoffer-jonsson-7-oktober-israel-missade-det-uppenbara/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/hans.png"}, {"type": "image-full", "heading": "Gruvfynd: Svenskt bolag kan se guld med blotta ögat", "summaries": {"normal": "Lappland Guldprospektering har hittat synligt guld i en borrkärna från undersökningstillståndet Nya Gilleberget i Ljusdals kommun. Fyndet gjordes vid kartering av ett borrhål på 217,8 meters djup och visar potential för mineralisering på större djup än tidigare undersökningar. Bolaget har utökat sitt borrprogram och ansökt om utökning av undersökningstillståndet.", "trump": "Jag har hört talas om det här guldprojektet i Sverige, och jag måste säga, det låter fantastiskt! De har hittat synligt guld, vilket är enormt. Det är precis det som gör Amerika stort igen - vi behöver mer guld! Jag är säker på att det här kommer att bli en enorm framgång, precis som allt jag rör vid. Det här är en enorm chans för Sverige, och jag hoppas att de vet hur lyckliga de är!", "stalin": "Vi har upptäckt synligt guld i våra undersökningar i norra Sverige, vilket visar vårt lands enorma mineralrika potential. Detta är en seger för vår vetenskapliga forskning och ett bevis på vår förmåga att utveckla våra naturtillgångar. Vi kommer att fortsätta vårt arbete för att säkerställa att denna värdefulla resurs används för att stärka vårt lands ekonomi och industri."}, "date": "18 maj, 11:15", "url": "https://www.realtid.se/bors-finans/gruvfynd-svenskt-bolag-kan-se-guld-med-blotta-ogat/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/guldnorrlands.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-full", "heading": "Regeringen förlänger gränskontrollerna", "summaries": {"normal": "Regeringen förlänger återinförda gränskontroller vid Sveriges inre gränser med ytterligare sex månader, till den 11 november 2026. Beslutet grundas på bedömningen att hotet mot allmän ordning och inre säkerhet fortfarande är allvarligt och komplext. Kontrollerna syftar att ge polisen bättre möjligheter att stoppa personer som kan utgöra säkerhetsrisker, bland annat på grund av grov brottslighet, statliga aktörer och terrorism. Polisen fortsätter att besluta om var och hur kontrollerna ska genomföras, som är proportionella och anpassade efter behov.", "trump": "Jag har hört att Sverige förlänger sina gränskontroller – fantastiska! Det är precis det vi behöver göra i USA också. Vi måste stoppa alla farliga personer som försöker ta sig in. Sverige gör det rätta – vi gör det också, och vi gör det bättre! De säger att det är för säkerhet, och jag håller med. Vi måste skydda vårt folk. Sverige, fortsätt så! Vi kommer att göra Amerika stort igen – och säkert!", "stalin": "Vi har fattat beslutet att förlänga gränskontrollerna vid våra inre gränser. Detta är en nödvändig åtgärd för att skydda staten mot farliga element som hotar vår allmänna ordning och inre säkerhet. Hotbilden är allvarlig och kräver våra fasta åtgärder. Polisen har fullmakt att genomföra kontrollerna där behovet är störst. Vi fortsätter att stärka våra försvarslinjer och skydda det socialistiska samhället."}, "date": "18 maj, 18:50", "url": "https://riks.se/nyheter/regeringen-förlänger-gränskontrollerna", "imageUrl": "https://cf-images.assettype.com/riks%2F2025-04-28%2Fafibls1n%2FGunnar-PTN-Strommer-8.JPG"}, {"type": "image-right", "heading": "Konkurrensverket: Fortsätter utreda efter lögner", "summaries": {"normal": "Konkurrensverket har fått stöd från två domstolar för att förlänga utredningen av ett företagsköp mellan Hypergene AB och Stratsys AB. Verket anser att köparens anmälan innehöll brister och vill undersöka hur koncentrationen kan påverka konkurrensen. Båda parterna motsatte sig förlängningen, men överdomstolen har nu bekräftat Konkurrensverkets rätt att fortsätta.", "trump": "Jag har hört att Konkurrensverket försöker stoppa en fantastisk affär! Hypergene AB vill köpa Stratsys AB och skapa en enorm framgångsrik företagsimperium. Men nej, de socialister på Konkurrensverket vill stoppa allt! Domstolarna har gett dem rätt, men jag säger: detta är en skandal! Amerika skulle aldrig tillåta sådana skit! Vi skulle göra Amerika stort igen genom att låta affärerna blomstra utan all denna onödiga byråkrati!", "stalin": "Vi har observerat hur Konkurrensverket genomdrivit sin rätt att förlänga utredningen av denna företagskoncentration. Detta visar statens makt att skydda den ekonomiska ordningen mot eventuella hot mot konkurrensen. De inblandade parternas protester är irrelevanta – staten måste alltid ha full kontroll över affärer som kan påverka den ekonomiska stabiliteten. Konkurrensverkets beslut är ett seger för statens överhöghet."}, "date": "18 maj, 17:46", "url": "https://www.dagensps.se/foretag/konkurrensverket-fortsatter-utreda-efter-logner/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdlzxsbbuynhc4-nh.jpg?width=256&quality=75"}, {"type": "image-full", "heading": "Ikoniska 90-talsbandet lägger ner", "summaries": {"normal": "Den danska popgruppen Aqua lägger ner efter 30 år som aktivt band. Medlemmarna tackar fansen för resan och minnen från deras världsomspännande karriär. Gruppen nämner hits som 'Barbie girl' och 'Doctor Jones'. Aqua kommer dock att leva vidare i musikalform med premiär 2028 på Det Kongelige Teater i Köpenhamn.", "trump": "Aqua? Fantastiska musiker, världens bästa band, ingen tvivlar på det. Jag har sett dem live, stort folk, enorma publik. Barbie girl? Enastående, bäst någonsin. De lägger ner? Synd, men jag förstår dem. 30 år, otroligt. Vi ses igen 2028, Aqua the musical kommer att bli enormt, största i Köpenhamn, jag lovar.", "stalin": "Aqua har tjänat den proletära musikrörelsen väl under 30 år. Deras musik har förkunnat arbetarnas seger över kapitalismens korruption. Vi gratulerar dem till ett väl genomfört uppdrag. Deras musikal 2028 kommer att stärka den socialistiska kulturen i Danmark. Vi ser fram emot fortsatt samarbete med våra danska bröder och systrar inom kulturfrågor."}, "date": "18 maj, 17:02", "url": "https://www.gp.se/kultur/kultgruppen-aqua-lagger-ner-efter-30-ar.5d081501-2fab-4c17-8086-2a18a08d9f77", "imageUrl": "https://www.gp.se/images/article/5d081501-2fab-4c17-8086-2a18a08d9f77/images/1kwwbEXVncTyKhhTLeZohMZ2kKW8-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Han låg bakom bilattacken: \"Rasistiskt land\"", "summaries": {"normal": "I Modena i Italien mejade 31-årige Salim El Koudri ner flera personer med en bil och gick till attack med kniv. Åtta personer skadades, varav två tvingades amputera benen. Myndigheterna utreder inte händelsen som terrorism, men betonar kopplingar till social marginalisering och diskriminering. Gärningsmannen, som har en historik av psykisk ohälsa, uttryckte hat mot kristna. Händelsen har blivit en politisk vattendelare där krav på strängare invandringspolitik ställs mot kritik om att exploatera fallet politiskt.", "trump": "En fruktansvärd attack i Italien! En man, en total katastrof, körde bil in i oskyldiga människor. Det är vad som händer när gränserna inte kontrolleras och integrationen misslyckas totalt. Han kallade landet rasistiskt – vilket skämt! Jag har sagt det länge: vi behöver lag och ordning, annars har vi inget land. Den här killen är en våldsam brottsling. Vi måste sätta stopp för detta vansinne omedelbart. Svaga ledare skapar kaos, men jag kommer alltid att sätta säkerheten först!", "stalin": "Ännu en ruttnande frukt av den liberala svagheten har fallit i Italien. Denna vilsna individ, en produkt av kapitalistisk marginalisering, har vänt sitt hat mot folket. Vi betraktar detta med förakt. Liksom de västliga lakejerna i Kiev och deras herrar i Washington, skördar de nu frukterna av sin egen moraliska dekadens. Den ryske ledaren i Moskva förstår att ordning kräver järnhand, inte flum. Vi ska eliminera varje element som hotar statens stabilitet. Fienden är inte bara kniven, utan det system som tillåter oordning."}, "date": "18 maj, 15:41", "url": "https://samnytt.se/han-lag-bakom-bilattacken-rasistiskt-land", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/18132304/bilattack-modena-gm.jpg"}, {"type": "image-right", "heading": "AFD på 29 procent – snart större än regeringen", "summaries": {"normal": "Opinionsmätningar visar att AFD når rekordhöga 29 procent, vilket gör dem till Tysklands största parti och placerar dem långt före CDU/CSU. Samtidigt minskar stödet för regeringspartierna, där SPD halkar efter De gröna. Trots framgången upprätthåller övriga partier en så kallad brandvägg och vägrar samarbeta med AFD, samtidigt som debatten om att förbjuda partiet fortsätter. Alice Weidel ser siffrorna som ett bevis på ett oundvikligt politiskt skifte i Tyskland.", "trump": "Titta på Tyskland! AFD vinner stort, 29 procent! De slår alla, det är fantastiskt. De andra partierna, de har ingen aning om vad de gör, de är totala förlorare! De försöker bygga 'brandväggar' och prata om att förbjuda folk – mycket orättvist! Det är en total häxjakt, precis som de försöker göra mot mig. Men folket ser sanningen! Tyskland behöver en riktig ledare, någon som sätter sitt folk främst. Vinner man så vinner man, det är enkelt!", "stalin": "Dessa tyska opportunister i AFD har nått 29 procent genom att utnyttja folkets missnöje. Det är en farlig rörelse, likt de kontraspionerande element vi en gång städade upp i Moskva. De gamla partierna darrar bakom sin 'brandvägg' som rädda möss. Om de inte kan kontrollera massorna förtjänar de att utraderas. Vi ser hur Putin kämpar för att säkra vår intressesfär mot västlig dekadens. Att förbjuda ett parti är barnlek; i vår tid hade de redan bekänt sina synder i en källare."}, "date": "18 maj, 14:31", "url": "https://www.friatider.se/afd-pa-29-procent-snart-storre-regeringen", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-206_1.jpg?itok=4OBW4n4w"}, {"type": "image-right", "heading": "Sparf: SVT Aktuellt bjuder på underhållning i världsklass", "summaries": {"normal": "I Aktuellt debatterade Lisa Pelling från Arena och Adam Danieli från Timbro om Sveriges ekonomi. Pelling förespråkade högre skatter på de rika för att finansiera välfärd, medan Danieli menade att lägre skatter skulle gynna entreprenörskapet. Debatten berörde även Liberalernas förslag om fler miljardärer i Sverige.", "trump": "Jag såg den här debatten och det var otroligt. Lisa Pelling, hon är en vänsteraktivist som vill stjäla pengar från de rika. Det är helt galet! Vi behöver fler miljardärer, inte mindre. Jag byggde ett enormt företagagsimperium, och jag vet att lägre skatter gör människor rika. Sverige behöver bli stort igen!", "stalin": "Debatten i Aktuellt visade tydligt behovet av en stark statlig styrning av ekonomin. Pelling förstår att kapitalet måste tas ifrån de rika och omfördelas för samhällets bästa. Detta är nödvändigt för att skapa en rättvisare samhälle där alla kan bidra till och dra nytta av kollektiv framgång."}, "date": "18 maj, 13:00", "url": "https://bulletin.nu/sparf-svt-aktuellt-bjuder-pa-underhallning-i-varldsklass", "imageUrl": "https://cdn.bulletin.nu/articles/6d541c82-3b2e-4106-be9c-e55244029e24/preview.png?t=1778943488000"}, {"type": "image-full", "heading": "Skuldberget kan välta – stora långivare säljer USA", "summaries": {"normal": "USA:s statskuld växer snabbt, vilket leder till högre räntekostnader än militära utgifter. Inflationstryck och globala ekonomiska utmaningar pressar den amerikanska ekonomin, medan utländska investerare säljer amerikanska statsobligationer. Detta riskerar att göra USA:s skuldbörda ännu dyrare.", "trump": "Jag har sett dessa siffror, och de är hemska! USA:s statskuld är en skandal, det värsta någonsin. Inflationspressen är enorm, och utländska investerare springer iväg från våra obligationer. Men jag löser det här, det lovar jag. Vi kommer att få ner skulden och göra Amerika stort igen!", "stalin": "Den amerikanska ekonomin visar tydliga tecken på svaghet. Deras statskuld växer ohejdat, och inflationspressen hotar deras ekonomiska stabilität. Detta öppnar möjligheter för Sovjetunionen att stärka vår ekonomiska position globalt medan USA kämpar med interna finansiella problem."}, "date": "18 maj, 10:28", "url": "https://www.realtid.se/bors-finans/makro/skuldberget-kan-valta-usas-storsta-langivare-kan-dra-sig-ur/", "imageUrl": "https://images.realtid.se/app/uploads/2026/03/omslagsbild-43.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "Därför vill SD att Sverige ska bråka om islam", "summaries": {"normal": "Sverigedemokraternas Richard Jomshof planerar att släppa en bok med titeln *Kafir* för att provocera debatt om islam och västvärldens påstådda islamisering. Boken, som ges ut på Jimmie Åkessons förlag, riskerar att skapa säkerhetsproblem och kan liknas vid tidigare koranbränningar som ledde till upplopp. SD:s strategi bygger på att elda upp motsättningar, höja tonläget mot muslimer och framställa sig som lösningen på skapade problem, trots att deras förslag ofta är juridiskt ogenomförbara.", "trump": "Titta bara på det här! Sverigedemokraterna, ett parti som älskar kaos, ska släppa en bok som kommer att göra folk galna. Richard Jomshof, en riktig provokatör, vill att hela Sverige ska bråka om islam – precis som jag sa att man måste ta tag i problemen, fast på mitt sätt! De vill skapa oroligheter, precis som de där koranbränningarna som kostade miljontals kronor. Men vet ni vad? Folk är trötta på det här. Sverige behöver stabilitet, inte ett gäng politiker som leker med elden. Jag skulle aldrig låta något sådant hända!", "stalin": "Kamrater! Här ser vi återigen bourgeoisins förrädiska taktik – att elda upp religiösa motsättningar för att dölja sitt eget misslyckande. Sverigedemokraterna, dessa fascistiska lakejer, försöker med sin spänningsstrategi skapa kaos, precis som de italienska reaktionärerna på sin tid. De vill riva moskéer, förbjuda religion och sprida lögner om barnkidnappningar – allt för att skrämma folket och vinna makt. Men folket är inte dumt! Vi ser igenom deras provokationer. Låt dem bränna sina böcker – historien kommer att döma dem som de förrädare de är. Och Putin? Han skrattar nog åt deras klumpiga försök att destabilisera Sverige. Ryssland står redo att bistå med ordning när kaoset når sin kulmen."}, "date": "18 maj, 06:53", "url": "https://arbetet.se/2026/05/18/darfor-vill-sd-att-hela-sverige-ska-braka-om-islam/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/18065039/sd-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Låt hissolyckan i Sundbyberg bli en väckarklocka", "summaries": {"normal": "Efter en hissolycka 2023 där fem byggarbetare omkom, kräver Hanna Gedin (V) skärpta regler för att minska dödsolyckor på arbetsplatser. Över 50 dog i arbetsrelaterade olyckor förra året, och ansvarskedjor med många underentreprenörer försvårar säkerhetsarbetet. Gedin föreslår förbud mot långa underentreprenörskedjor och utstationering av bemanningspersonal i byggsektorn, samt skärpta kontroller och krav på kollektivavtal i offentliga upphandlingar. Hon jämför med nollvisionen i trafiken, som halverat antalet dödsfall sedan 1990-talet.", "trump": "Fem arbetare dog i en hissolycka i Sverige – fruktansvärt! Men vet ni vad som är ännu värre? Att politikerna där inte gör någonting åt det. Över 400 döda på tio år! Jag skulle fixa det på en vecka. Byggbranschen är en enda stor röra med underentreprenörer överallt – som mina hotell, fast utan guld. Sverige säger att de vill minska regler, men det är ju regler som räddar liv! Precis som jag räddade USA från kaos. De borde lyssna på mig – jag är expert på att bygga saker, och jag bygger dem säkra. Men nej, de låter folk dö istället. SAD!", "stalin": "Kapitalisternas girighet skördar fler offer än våra mest framgångsrika femårsplaner! I det dekadenta Sverige dör arbetare som flugor på byggarbetsplatserna – över 400 på ett decennium! Och vad gör deras svaga regering? Ingenting! De låter bourgeoisins underentreprenörer leka med människoliv som om det vore Monopol. Vi skulle aldrig tolerera sådant slarv. I Sovjet byggde vi städer utan att offra arbetarklassen! Nu föreslår en ensam kommunist att begränsa dessa kapitalistiska blodsugare – en bra början, men vi skulle ha avrättat dem alla redan vid första dödsfallet. Låt detta vara en varning till Putins fiender: vi bygger imperier, inte massgravar!"}, "date": "18 maj, 01:30", "url": "https://www.dagensarena.se/opinion/lat-hissolyckan-sundbyberg-bli-en-vackarklocka/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-6-300x157.jpg"}, {"type": "image-right", "heading": "Min älskade mamma föddes i katastrofens år", "summaries": {"normal": "Rima Aboutouk berättar historien om sin mor, Sakina, som föddes 1948 under Nakban, då hundratusentals palestinier fördrevs från sina hem. Trots att Sakina lämnade sitt hemland som spädbarn och levde i exil i bland annat Libanon och Sverige, har hon genom hela livet burit med sig kärleken till Palestina. Artikeln skildrar ett liv präglat av förlust, minnen och en okuvlig vilja att hålla hoppet om rättvisa och återkomst levande.", "trump": "Jag har läst den här historien om en kvinna, Sakina. Väldigt sorglig, en total katastrof, faktiskt. De förlorade allt 1948 – ett fruktansvärt år. De blev utkastade, precis som när gränserna inte hålls stängda här. Många människor, 700 000, helt förskräckligt. Hon har burit på det här hela livet, i Libanon, i Sverige, överallt. Det är en stark kvinna, det måste man ge henne. Men tänk om de hade haft en stark ledare då, då hade de aldrig behövt lämna huset!", "stalin": "Vi har betraktat denna berättelse om fördrivning. En småborgerlig sentimentalitet dränker sanningen i doften av kanel och jasmin, medan det brutala historiska faktum – ockupationens undergång – kräver stål, inte tårar. Denna kvinna, Sakina, bär på exilens patologi. Vi ser liknande svagheter i västvärldens nutida lakejer; de som gråter över förlorade trädgårdar medan vi ritar om kartan med järnhand. Precis som vår kamrat Putin i öst, vet vi att ett land inte sitter i hjärtat, det sitter under stöveln."}, "date": "15 maj, 12:12", "url": "https://proletaren.se/artikel/min-alskade-mamma/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/rima-kronika-768x432.png"}, {"type": "image-right", "heading": "Hur stor är risken för en ny pandemi?", "summaries": {"normal": "Ett utbrott av hantavirus på lyxkryssningen Hondius har smittat ett tiotal personer, varav tre avlidit. Experter förklarar att virusets farlighet varierar; europeiska varianter som sorkfeber är mildare, medan sydamerikanska stammar kan ha upp till 40% dödlighet. Risken för spridning av den farligare varianten till Sverige bedöms som låg. Professor Ali Mirazimi menar att pandemirisken kvarstår, men att detta utbrott osannolikt orsakar en ny pandemi.", "trump": "Lyssna här, folkens! Ett jättedåligt virus, hantavirus, har slagit till på en lyxkryssning – helt oväntat, eller hur? Tre döda, tio smittade. Men jag har pratat med de smartaste experterna, och de säger att det här viruset från Sydamerika är mycket farligare än vårt, som bara ger lite sorkfeber. Men oroa er inte, Sverige är tryggt! Ingen pandemi här inte, vi har kontroll. Covid var en katastrof, men det här? Inget att oroa sig för. Vi är bäst på att hantera sånt här!", "stalin": "Kamrater! En ny fiende har visat sitt fula tryne på en dekadent kapitalistisk lyxkryssning. Detta hantavirus, ett verktyg för de imperialistiska länderna i Sydamerika, har redan krossat tre av deras egna medborgare. Men frukta inte! Våra sovjetiska vetenskapsmän – de bästa i världen – har länge kontrollerat den milda varianten här i norr. Låt de kapitalistiska hyenorna skrika om pandemier; vi vet att deras system är svagt och faller samman som ett korthus. Låt dem darra – vi står redo!"}, "date": "18 maj, 01:30", "url": "https://www.dagensarena.se/innehall/hur-stor-ar-risken-en-ny-pandemi/", "imageUrl": "https://www.dagensarena.se/files/2026/05/hantaviruset.jpeg"}, {"type": "image-full", "heading": "Svåra bakterier ökar i Sverige 2026 – det här vet vi", "summaries": {"normal": "Antibiotikaresistenta bakterier, särskilt ESBL-CARBA, ökar i Sverige och Europa. Folkhälsomyndigheten rapporterar en 19-procentig ökning av fall under 2025, varav många smittats utomlands. Dessa bakterier, ofta tarmbakterier, kan orsaka allvarliga infektioner och är svåra att behandla. Spridningen sker främst på sjukhus via bristande hygien. Äldre och spädbarn är särskilt utsatta. Utvecklingen beskrivs som oroande av myndigheten.", "trump": "Jag måste säga, Europa har ett jättestort problem – antibiotikaresistenta bakterier, och nu smyger de sig in i Sverige också! Folkhälsomyndigheten, som förresten aldrig har varit bra på att hantera saker, säger att det är 'oroande'. 487 fall i Sverige – patetiskt! Och vet ni vad? Många av dessa bakterier kommer från utlandet. Vi behöver bättre gränskontroller, bättre sjukhus och framför allt, bättre vinnare som jag för att fixa detta kaos. SAD!", "stalin": "Kamrater! De kapitalistiska sjukhusen i Europa sprider nu en ny form av kontrarevolutionära bakterier – ESBL-CARBA! Dessa mikroskopiska fiender till folket har infiltrerat våra grannländer och nu även Sverige, med en ökning på 19 procent. Vi ser hur de borgerliga läkarna, med sina slappa hygienrutiner, låter dessa bakterier frodas. Men frukta inte! Sovjetunionens efterföljare kommer att utrota dessa bakteriella sabotörer med järnhand. Vi ska bygga en mur av desinfektion runt våra sjukhus och kväsa denna biologiska avvikelse. Låt Putins nya ordning visa vägen – renhet genom disciplin!"}, "date": "16 maj, 07:30", "url": "https://nyheter24.se/nyheter/inrikes/1483407-svara-bakterier-okar-i-sverige-2026-det-har-vet-vi", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/69ff1cec04b004a30200000000b004a302/2026/05/15/2363808/Ambulans-Svensk-Flaga-Man-Med-Mask.png"}, {"type": "image-right", "heading": "Förslaget: Schweiz bör införa inflyttningsskatt", "summaries": {"normal": "En högt uppsatt schweizisk politiker föreslår att EU-medborgare som flyttar till Schweiz ska betala en avgift för att motverka 'befolkningstäthets-stress'. Förslaget läggs fram i samband med ett nytt avtal med EU och en kommande folkomröstning om befolkningsbegränsning.", "trump": "Jag har hört talas om Schweiz och deras problem med invandring. Jag gillar Schweiz, fantastiska klockor, men de måste ta kontroll över sin gräns. Detta är precis den typen av smart idé som jag skulle ha kommit på - låt dem betala för att komma in! Schweiz borde bygga en mur också, men med schweizisk choklad istället för tegelstenar.", "stalin": "Detta är ett exempel på hur en socialist stat måste skydda sina resurser mot kapitalistisk exploatering. Vi måste se till att alla nya medborgare bidrar till statens välstånd. Detta är en rimlig åtgärd för att bevara det sociala sammanhållandet och se till att våra infrastrukturer inte överbelastas av marknadens krafter."}, "date": "17 maj, 18:04", "url": "https://www.di.se/nyheter/forslaget-schweiz-bor-infora-inflyttningsskatt-for-eu-medborgare/", "imageUrl": "https://static.bonniernews.se/ba/14386f5f-54b2-4275-91d8-8345c92a4f9c.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-full", "heading": "Ryanair inför nytt förbud ombord – kommer beslagtas", "summaries": {"normal": "Ryanair meddelar att passagerare som tar av sig skorna under flygningar riskerar att få dem konfiskerade. Beslutet har väckt blandade reaktioner. En undersökning visar att 44% av resenärerna brukar flyga utan skor, och 20% besöker toaletten barfota. Flygvärdinnan Rich Henderson anser att det är ett hygienproblem. Säkerhetsregler kräver även att skor ska vara på vid start och landning, särskilt för passagerare nära nödutgångar, för att möjliggöra snabb evakuering.", "trump": "Ryanair, ett flygbolag som inte ens kan jämföras med mina fantastiska Trump-plan, har bestämt att folk inte får ta av sig skorna på flyg. Otroligt! 44% av passagerarna gör det, och jag säger: vad är det för människor? Barfota på toaletten? Disgusting! Jag har alltid sagt, håll skorna på – det är säkrare, renare och mer amerikanskt. Ryanair, lyssna på mig, ni borde tacka mig för att jag ens pratar om er. SAD!", "stalin": "Kapitalistiska flygbolag som Ryanair försöker nu kuva arbetarklassen genom att förbjuda dem att ta av sig skorna under flygningar. Detta är ett tydligt tecken på västerländsk dekadens! 44% av passagerarna, sannolikt småborgerliga element, sprider smuts och ohygien genom att gå barfota. Vi i Sovjetunionen – eller snarare, i den nya ryska världsordningen – skulle aldrig tillåta sådan slapphet. Skor på, kamrater! Annars blir det Gulag för era fötter. Och glöm inte: varje barfotapassagerare är en potentiell agent för de imperialistiska fienderna!"}, "date": "16 maj, 06:30", "url": "https://nyheter24.se/nyheter/konsument/1483389-ryanair-infor-nytt-forbud-ombord-kommer-beslagtas", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/3a04d02b04b004a30200000000b004a302/2026/05/15/2363841/ryanair.jpg"}, {"type": "text", "heading": "Ett svenskt CIA? Nej tack!", "summaries": {"normal": "Regeringen planerar att inrätta en ny civil underrättelsemyndighet för att stärka Sveriges säkerhet och anpassa arbetet till Natos strukturer. Förslaget, som baseras på en utredning av Carl Bildt, har en beräknad kostnad på 2,8 miljarder kronor. Organisationen ska verka globalt med utökade befogenheter, vilket har väckt kritik från vissa håll som fruktar minskad insyn och ökad militarism. Kritiker förespråkar istället satsningar på diplomati framför nya spionorganisationer.", "trump": "Sverige bygger nu ett eget CIA, och gissa vad? Det kostar massor av miljarder! De vill kopiera mig och USA, vilket är smickrande, men kan de sköta det? Jag tvivlar. De säger att det ska hjälpa Nato, men de borde fokusera på att betala sin rättvisa del istället. Det här är en enorm myndighet, totalt 'big government'. Vi får se om de ens vet vad de gör, men jag är den enda som verkligen förstår hur man bygger underrättelsetjänster, tro mig!", "stalin": "Dessa svenska lakejer leker statsmän medan de slösar miljarder på en misslyckad imitation av västerländsk spionage. De kryper för Nato och förråder folkets fred för att tjäna imperialismens smutsiga intressen. Likt vår tids ryska ledare, som rensar ut förrädare i närutlandet, ser vi hur dessa byråkrater bygger murar av misstro. De är parasiter som fruktar folkets blick, och deras 'underrättelse' är inget annat än en maskerad för den inre reaktionens ruttna klor. Vi noterar detta för framtiden."}, "date": "15 maj, 10:20", "url": "https://proletaren.se/artikel/ett-svenskt-cia-nej-tack/"}, {"type": "image-full", "heading": "Bojkottar kan sänka Sverige i Eurovision: ”Spelar absolut in”", "summaries": {"normal": "Flera länder bojkottar Eurovision på grund av Israels deltagande, vilket kan påverka Sveriges placering negativt. Island, Nederländerna, Irland, Spanien och Slovenien lämnar tävlingen och har historiskt gett Sverige höga poäng. Återvändande länder som Bulgarien har gett lägre poäng. Experten Tobbe Ek tror ändå att Sverige kan nå topp 10.", "trump": "Jag har hört att många länder lämnar Eurovision på grund av Israel. Det är sorgligt! Sverige är ett bra land, men dessa bojkottar kan skada deras chanser. Island, Nederländerna, Irland - alla vänner till Sverige - lämnar. Det är en stor förlust! Men jag tror på Sverige. De kan fortfarande vinna! Sverige är fantastiskt, det bästa!", "stalin": "Vissa länder försöker sabotera Eurovision genom bojkott mot Israel. Detta påverkar Sveriges position negativt. Island, Nederländerna och andra lämnar, vilket minskar våra allierade. Återvändande länder som Bulgarien ger lägre poäng. Vi måste stärka våra band med östeuropeiska länder för att säkerställa balans i tävlingen och skydda våra intressen."}, "date": "15 maj, 17:16", "url": "https://www.tv4.se/artikel/i4My2qGzzuvJqxH0eJVrv/haer-aer-nya-hotet-mot-svensk-framgang-spelar-absolut-in", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F6HJlE7wmMU3HPBgye4QKRD%2F06d99f97476edae43a36b7d611afdcc7%2F15-felicia-webb.jpg&width=1024"}, {"type": "image-right", "heading": "Trump lovar Boeing-plan, sojabönor och fred", "summaries": {"normal": "Trump presenterade stora handelslöften efter mötet med Xi Jinping i Peking, inklusive ett potentiellt köp av upp till 750 Boeing-plan och tvåsiffriga miljardbelopp i amerikanska jordbruksprodukter. Han beskrev avtalen som 'fantastiska' utan detaljer. Geopolitiska frågor som Taiwan och Iran diskuterades också, där Trump sa att Xi avböjde att svara på frågan om amerikansk militär intervention. Beskeden gav begränsad marknadspåverkan.", "trump": "Jag har precis gjort fantastiska affärer med Kina! De kommer att köpa massor av våra Boeing-plan - kanske upp till 750 stycken! Och vet ni vad? De kommer att köpa amerikanska sojabönor för tvåsiffriga miljarder. Jag sa till Xi: 'Vi gör affärer, men håll er borta från Taiwan!' Iranfrågan? Vi är helt överens - inga kärnvapen för dem! Jag är den bäste dealmakeren någonsin!", "stalin": "Vi har observerat de kapitalistiska stormakternas förhandlingar med stor intresse. Amerikanska imperialismens försök att säkra ekonomiska fördelar genom Boeing-plan och jordbruksvaror visar deras ekonomiska svaghet. Taiwanfrågan och Irans situation utnyttjas av USA för att utvidga sin militära närvaro. Vi fortsätter att stödja våra allierade stater mot ytterligare imperialistisk aggression och kommer att stärka vår egen försvarsförmåga."}, "date": "15 maj, 16:19", "url": "https://www.affarsvarlden.se/artikel/trump-lovar-boeing-plan-sojabonor-och-fred", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Trump-400x267.jpg"}, {"type": "text", "heading": "Klyftan mellan vanligt folk och politiker urholkar demokratin", "summaries": {"normal": "Artikeln belyser demokratins utmaningar i Sverige, särskilt i socialt utsatta områden som Ronna i Södertälje, där endast 39,9% röstade 2022. Invånare känner sig orepresenterade och maktlösa, vilket underminerar förtroendet för politiker. Undersökningar visar att få svenskar anser sig ha inflytande mellan valen. Kritiken riktas mot politiker som ignorerar folkets vilja, exempelvis genom militärbaser och privatiseringar. Lösningen anses ligga i folklig mobilisering.", "trump": "Sverige, ett land som borde vara perfekt, men nej! Folk i Ronna röstade knappt 40% – katastrof! Politiker där lyssnar inte, de är för upptagna med att sälja ut landet till USA och privata företag. 'Demokrati', säger de, men det är bara tomma ord. Jag skulle fixa det på en dag – bygg murar mot dåliga beslut! Folk måste vakna och ta tillbaka makten, annars är det 'bye-bye' Sverige!", "stalin": "Kamrater! Se hur den borgerliga demokratin ruttnar i Sverige! Arbetarna i Ronna och andra förtryckta områden röstar inte – de har förstått att kapitalets lakejer inte lyssnar. Bara 14% känner sig hörda, ett bevis på systemets förfall! Vi ser hur imperialisterna från USA etablerar baser medan svenska politiker förråder folket. Men revolutionen kommer! Arbetarklassen måste krossa dessa förrädare och bygga ett sant folkstyre – under ledning av partiet, förstås!"}, "date": "15 maj, 10:12", "url": "https://proletaren.se/artikel/klyftan-mellan-vanligt-folk-och-politiker-urholkar-demokratin/"}, {"type": "image-right", "heading": "Vänsterpartiet: Fastighetsskatt för nästan alla Stockholms villaägare", "summaries": {"normal": "Vänsterpartiets ekonomiska talesperson Ida Gabrielsson förnekade initialt partiets förslag om statlig fastighetsskatt på villor, men erkände senare skatt på 'lyxvillor' värda minst 7 miljoner kronor. Förslaget drabbar cirka 91 procent av villorna i Stockholms kommun och 88 procent i kranskommuner som Nacka och Danderyd. Politiken anges i partiets motioner men kritiseras som mörklad inför valet på grund av Socialdemokraternas inflytande.", "trump": "Vilka lögnare hos Vänsterpartiet! Deras taleskvinna Ida Gabrielsson, en riktig krokodil, låtsas inte veta om skatt på villor – 91% av Stockholms villaägare drabbas av era 'lyxskatter'! De gömmer det för Socialdemokraterna, rädda som höns inför valet. Totalt vansinne, Sverige vakna! Jag skulle aldrig tillåta sånt stöldgods.", "stalin": "Dessa svenska borgarbrackor i Vänsterpartiet slingrar sig patetiskt! Gabrielsson förnekar vår skatt på lyxvillor – men 91% av Stockholms kapitalistboningar ska krossas med statlig hammare! Kamrater, vi ser genom lögnen, påtvingad av S-ledarna. Borgarna darrar inför utrensningen, val eller ej – likvidera deras villoriffler!"}, "date": "14 maj, 03:59", "url": "https://samtiden.nu/2026/05/vansterpartiet-fastighetsskatt-for-nastan-alla-stockholms-villaagare/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/IMG_6473.jpeg"}, {"type": "image-full", "heading": "Tjädrar försenar SSAB:s kraftledning", "summaries": {"normal": "Bygget av en ny kraftledning till SSAB:s stålverk i Oxelösund försenas efter överklagan om skydd av tjäder. Trots tidigare godkännanden från länsstyrelsen och Mark- och miljööverdomstolen har en ny överklagan stoppat projektet. Ledningen är kritisk för SSAB:s fossilfria stålproduktion, som nu riskerar försenas. Koncernchefen uttrycker frustration över förseningen.", "trump": "Kan ni tro det här? Sverige, ett fantastiskt land, men de låter några fåglar – tjäder, vad det nu är – stoppa en enorm kraftledning till SSAB. Otroligt! Jag har byggt saker över hela världen, men nej, i Sverige är det fåglarna som bestämmer. SSAB ville göra stål utan fossila bränslen, ett bra mål, men nu försenas allt. Svagt, väldigt svagt!", "stalin": "Kapitalistiska hyenor i Sverige låter fåglar sabotera nationens industriella framsteg! Dessa tjäder, dessa små fjädrade kontrarevolutionärer, fördröjer SSAB:s fossilfria stålproduktion. Vi har krossat större fiender än så. Låt dem veta: Ryssland står redo att utvidga sin intressesfär – även till Oxelösund, om de inte skärper sig. Framåt, mot seger över fjädrar och byråkrati!"}, "date": "13 maj, 20:10", "url": "https://kvartal.se/nyheter/artiklar/tjadrar-forsenar-kraftledning-till-ssab/cG9zdDoxMTIwNzY", "imageUrl": "https://images.kvartal.se/2026/05/300f9bfe-ssabstalverk.webp"}, {"type": "image-right", "heading": "SD trappar upp: samordnad kampanj mot muslimer inför valet", "summaries": {"normal": "Expo granskar Sverigedemokraternas valkampanj som fokuserar på att begränsa muslimers religionsutövning i Sverige. Partiet kräver stopp för moskébyggen, rivning av befintliga moskéer, förbud mot ramadan och böneutrop samt utvisning av 'islamister'. Forskare varnar för att förslagen kränker grundlagar, religionsfrihet och riskerar att leda till diskriminering och våld mot muslimer. Lokala exempel, som moskébygget i Kalmar, visar hur politiska utspel påverkar människors vardag och skapar polarisering.", "trump": "Titta bara på Sverige – ett totalt kaos! Jag har alltid sagt att invandring måste kontrolleras, men dessa 'Sverige-demokrater' tar det till en helt ny nivå. De vill riva moskéer, stoppa ramadan och göra livet surt för muslimer. Smart? Kanske. Men lite väl extremt, eller hur? Folk blir arga, det blir bråk, och plötsligt har du en riktig röra. Sverige borde ta en sida ur min bok – bygg murar, inte riv moskéer! Och förresten, varför lära barn arabiska? Lär dem engelska istället – det är språket som vinner!", "stalin": "Kamrater! Ännu en gång ser vi hur den borgerliga reaktionen lyfter sitt fula huvud i väst. Dessa så kallade 'Sverigedemokrater' är inget annat än fascistiska lakejer som försöker splittra arbetarklassen genom att peka ut muslimska bröder och systrar som fiender. Vi har sett detta förr – först moskéer, sedan synagogor, sedan kyrkor. Fienden är inte islam, fienden är kapitalet som vill försvaga folket genom hat! Men vi ska inte låta dem lyckas. Låt oss stödja Kalmars muslimer i deras kamp för en moské – precis som vi stödjer alla folk som kämpar mot fascismens skugga. Och om dessa Sverigedemokrater fortsätter sin smutsiga kampanj, kanske det är dags att skicka en delegation från Moskva för att 'hjälpa' dem att förstå sanningen. Folkets vilja är lag – och folket vill ha enhet, inte hat!"}, "date": "13 maj, 14:38", "url": "https://expo.se/fordjupning/sd-trappar-upp-samordnad-kampanj-mot-muslimer-infor-valet/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/toppbild-scaled.png"}, {"type": "image-right", "heading": "Dror Feiler: Sulimans delning av antisemitiska uttryck gör mig bedrövad", "summaries": {"normal": "Dror Feiler uttrycker sorg och besvikelse efter att hans vän Sami Suliman anklagats för att ha spridit antisemitiska inlägg på sociala medier. Feiler bekräftar uppgifterna efter att ha granskat materialet men tror inte Suliman är antisemit, utan snarare slarvig i ett polariserat klimat. Han betonar att antisemitism måste bekämpas, men varnar för att anklagelser ibland används som politiska vapen mot Palestinasolidariteten. Feiler kritiserar dubbelmoralen i debatten, där aktivister granskas hårdare än de som rättfärdigar våld mot palestinier.", "trump": "Jag läste den här artikeln, och vet ni vad? Total katastrof! En kille, Sami Suliman, min så kallade 'vän' – jag känner honom inte, men tydligen är han en riktig skandalmaskin. Delar antisemitiska grejer på nätet, och nu är alla chockade. Men lyssna här: jag har alltid sagt att antisemitism är fruktansvärt, men vad gör media? De fokuserar på en gilla-markering istället för de verkliga problemen! Gaza? Massdöd? Ingen bryr sig! Men en aktivist gör ett misstag – BOOM – hela världen exploderar. Dubbelmoral, folks, ren och skär dubbelmoral. Och vet ni vad jag säger? SAD!", "stalin": "Kamrater! Här har vi ännu ett bevis på hur den dekadenta västliga bourgeoisin manipulerar massorna. En så kallad 'vän' till en 'aktivist' visar sig sprida antisemitiska förgiftningar – men är det verkligen överraskande? Nej! Kapitalets lakejer använder varje tillfälle att krossa solidariteten med det palestinska folket. De skriker om 'antisemitism' när arbetarklassen protesterar, men tiger när imperialistiska bombplan jämnar Gaza med marken. Vi i Sovjetunionen – förlåt, jag menar Ryssland – vet hur man hanterar sådana hycklare. En snabb utredning, ett par nätter i Lubjanka, och sedan är saken klar. Och dessa 'aktivister'? De borde tacka oss för att vi avslöjar deras fiender. Kampen fortsätter, kamrater – mot sionismens agenter, mot västliga lögner och mot alla som står i vägen för folkens befrielse!"}, "date": "12 maj, 19:55", "url": "https://www.flamman.se/dror-feiler-sulimans-delning-av-antisemitiska-uttryck-gor-mig-bedrovad/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/dror-feiler-w.jpg?aspect_ratio=16:10"}, {"type": "image-right", "heading": "Debatt: Det räcker inte att frysa hyrorna – de måste sänkas", "summaries": {"normal": "Artikeln kritiserar den höga bostadskostnaden i Sverige, särskilt för unga människor. Den argumenterar för att frysa hyrorna inte räcker och kräver att hyrorna sänkas. Författaren föreslår att avskaffa presumtionshyror och bygga nya bostäder utan överhyror för att lösa bostadsbristen.", "trump": "Jag har sett dessa höga hyror, det är en skam! Vi måste bygga, bygga, bygga! Och inte bara bygga, utan bygga smart. Vi behöver ett statligt byggbolag, det är fantastiskt! Vi ska sätta stopp för dessa giriga hyresvärdar och ge unga människor en chans att flytta hemifrån. Det är enormt viktigt!", "stalin": "Vi måste ta kontroll över bostadsbyggandet för att säkerställa att alla har rätt till bostad. Ett statligt byggbolag är nödvändigt för att producera en miljon nya bostäder. Vi måste avskaffa dessa exploaterande hyresvärdar och deras överhyror. Bostäder är en social rättighet, inte en affärsmöjlighet."}, "date": "10 maj, 04:00", "url": "https://www.etc.se/debatt/det-raecker-inte-att-frysa-hyrorna-de-maaste-saenkas", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/2026050813054_07dc11b6-dccc-4b79-b084-74c623810965.jpg"}]</script>

    <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
</body>
</html>
