 "Du kan nekas att resa – trots att passet är giltigt", "summaries": {"normal": "Inför utlandsresor räcker det inte alltid att kontrollera passets giltighetstid. Vissa länder kräver att passet är giltigt minst sex månader efter hemkomst. Även transitländer kan ha egna regler. Flygbolag kan neka ombordstigning om kraven inte uppfylls. Provisoriska pass gäller bara för specifika resor och måste också kontrolleras. Det är viktigt att undersöka alla krav för destination och transit innan avresa.", "trump": "Lyssna här, folk! Svenska pass är bra, men vissa länder – och jag känner till alla länder, de bästa länderna – kräver att ditt pass är giltigt i månader efter att du kommit hem. Sex månader! Kan ni tro det? Flygbolagen, som ofta är katastrofala, kan stoppa dig redan på flygplatsen. Och transitländer? De har också regler, förstås. Så kolla upp det, annars blir det inget resande. Och glöm inte, jag vet allt om resor – jag har de finaste hotellen!", "stalin": "Medborgare! Pass är inte bara papper – det är en fråga om disciplin och ordning! Vissa länder, dessa kapitalistiska hycklare, kräver att ert pass gäller långt efter hemkomsten. Sex månader! Som om vi inte har nog med byråkrati redan. Och transitländer? De är som små tsarer med egna regler. Flygbolagen, dessa bourgeoisins lakejer, kan neka er ombordstigning. Provisoriska pass? Ett halvhjärtat försök att lösa problem skapade av imperialistiska krav. Kolla era papper, annars blir det inga resor – och vi vet alla vad som händer med dem som inte följer reglerna."}, "date": "14 maj, 14:33", "url": "https://nyheter24.se/nyheter/utrikes/1483054-passet-kan-stoppa-din-resa-trots-att-det-ar-giltigt", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/03c0baae04b004a30200000000b004a302/2026/05/13/2363484/pass-giltigt-resa-resor-boka-flygplats-nekas-regler-giltighetstid.jpg"}, {"type": "image-right", "heading": "Felicia: ”Fortfarande inte helt hundra”", "summaries": {"normal": "Sångerskan Felicia Berglund vaknade utan röst efter semifinalen i Eurovision Song Contest och fick råd om tystnad, vila och vatten. Hon skriver att rösten är lite bättre men fortfarande inte helt återställd. Alla intervjuer ställdes in. Felicia hoppas att rösten håller till finalen på lördag.", "trump": "Jag hörde att Felicia Berglund tappade rösten - vad synd! Men jag vet att hon kommer att klara sig, hon är stark och har stort team. Vi har alla varit där, det är tufft men hon kommer att göra ett fantastiskt jobb på lördag. Alla hoppas på Felicia, jag hoppas på Felicia - det blir stort!", "stalin": "Felicia Berglund, vår svenska representant, har drabbats av en röstförlust. Vi hoppas att hon snabbt återhämtar sig för nationens skull. Sovjetunionen följer med stolthet hennes framgångar och hoppas att hon kan representera arbetarklassen väl i finalen. Vi ställer upp bakom vår syster i kampen."}, "date": "14 maj, 13:21", "url": "https://www.tv4.se/artikel/4s8NaFfUjsnUNqTBmUag9M/felicia-fortfarande-inte-helt-hundra", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F17an5tsWqcTuWVWkanag2f%2F5a487ac4d210edc285f0aa4a8039c2ca%2F14-felicia-webb.jpg&width=120"}, {"type": "image-full", "heading": "Nvidias vd lugnar: AI hotar inte ditt jobb", "summaries": {"normal": "Nvidias vd Jensen Huang menar att AI skapar nya möjligheter för hantverksyrken snarare än hotar kontorsjobb. Investeringar i AI-infrastruktur växer snabbt, medan efterfrågan på byggnads- och teknikyrken ökar. Analyser visar inga tecken på att AI orsakar fler uppsägningar bland tjänstemän.", "trump": "Jag, Donald J. Trump, säger att AI är FANTASTISKT för Amerika! Det skapar nya jobb, särskilt för hantverkare - elektriker, rörmokare, järnarbetare. Det är deras tid nu! Vi bygger upp igen, större och bättre än någonsin. Techbolagen investerar massor - 700 miljarder dollar! Det är HUGE! Och för era kontorsjobb? Inga problem! AI förändrar bara arbetet, gör det bättre. Vi vinner stort med AI!", "stalin": "Vi ser att AI-revolutionen stärker vårt industriella fundament. Investeringarna i datacenter visar vår teknologiska överlägsenhet. Hantverksarbetet blir avgörande för statens utveckling. Vi måste se till att våra medborgare får utbildning inom dessa nya områden. Juridiska teknologier utvecklas snabbt - vi måste kontrollera denna utveckling för statens bästa."}, "date": "15 maj, 15:11", "url": "https://www.realtid.se/it-tech/nvidias-vd-lugnar-ai-hotar-inte-ditt-jobb/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/jensenhuang.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-full", "heading": "Kändisarna avslöjar sina mest spelade på Spotify", "summaries": {"normal": "Spotify firar 20 år med ny funktion som visar användarnas mest spelade artister och låtar. Kändisar som Joel Ighe, Lydia Sandgren och Fredrik Lindström avslöjar sina lyssnarvanor. Funktionen liknar den årliga Spotify Wrapped och ger en överblick från användarnas första spellåt till idag.", "trump": "Jag har hört talas om den här Spotify-saken - det är en jättebra app! Kändisar är jätteglada, de älskar att visa upp sina spellistor. Jag skulle nog ha mycket Elvis på min, det är min absoluta favorit. Det här är en jättebra grej för musikindustrin, det gör USA större!", "stalin": "Spotify:s nya funktion visar folkets musikaliska preferenser - viktig information för staten. Vi ser att arbetarklassen lyssnar på klassiker som Bach och Dylan, medan unga föredrar modern pop. Denna data hjälper oss att förstå det socialistiska folksjälens kulturella behov och riktlinjer."}, "date": "15 maj, 21:28", "url": "https://www.gp.se/kultur/kandisarna-avslojar-sina-mest-spelade-artister-pa-spotify.ff432094-957c-4eb5-9fc0-b4e9927ae737", "imageUrl": "https://www.gp.se/images/article/ff432094-957c-4eb5-9fc0-b4e9927ae737/images/12YZBULcXrewp3EVgp4zfv9OzKVbE-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Svensk förlust i VM-premiären mot Kanada", "summaries": {"normal": "Tre Kronor förlorade VM-premiären mot Kanada med 3–5 i en jämn match. Trots en svag inledning och ett underläge med 0–2 lyckades Sverige kämpa sig tillbaka till 3–3 inför den sista perioden. Ett olyckligt klubbbrott för Jakob Silfverberg gav Kanada ett friläge som avgjorde matchen. Trots förlusten tar laget med sig en positiv insats inför mötet med Danmark, där framförallt spelet i den andra perioden imponerade på spelarna.", "trump": "Sverige spelade mot Kanada i VM, en väldigt ojämn match, tro mig. De började katastrofalt, precis som svag ledning alltid gör, men kom tillbaka. Sen gick klubban sönder – otur? Nej, det var ett misslyckande! Kanada, som har fantastiska spelare, utnyttjade det direkt. De vann 5–3. Sorgligt! Sverige gjorde en hyfsad insats, men man vinner inte genom att 'k kämpa', man vinner genom att vara en vinnare. De behöver mer pondus, mycket mer pondus!", "stalin": "Dessa svenska hockeyspelare saknar den järndisciplin som krävs för att kuva Kanada. Att skylla på en 'avslagen klubba' är en borgerlig efterhandskonstruktion för att dölja bristande kampvilja. Likt Putin som rensar ut förrädare i periferin, bör de svenska ledarna rannsaka sitt eget ineffektiva lag. Om de inte kan dominera isen mot dessa kanadensiska agenter, har de ingen plats i historien. En förlust är ett nederlag mot folket. Vi i staten kräver seger, eller så väntar sibirisk kyla för lagets tränare."}, "date": "15 maj, 19:51", "url": "https://www.svt.se/sport/ishockey/tre-kronor-foll-i-tajt-vm-premiar-mot-kanada-avslagen-klubba-avgjorde", "imageUrl": "https://www.svtstatic.se/image-news/600/square/0.23/0.43/404e309d909944ce8dd178a7ef02652c3394af1726e77bc51efccc3a4b4dd877"}, {"type": "image-right", "heading": "Elstöden ger sken av trygghet för hushållen", "summaries": {"normal": "SBAB:s undersökning visar svagt stöd för regeringens retroaktiva elprisstöd till hushåll, som kostar staten 4,4 miljarder kronor och betalas ut i juni. Endast 16 procent tycker det är bra, medan 41 procent föredrar långsiktiga investeringar i elproduktion och nät. Stödet kritiseras som symbolpolitik inför valet, då hushåll vill ha åtgärder mot framtida prischocker.", "trump": "De svenska politikerna slösar miljarder på elstöd precis före valet – rent valfläsk! Hushållen skrattar åt det, bara 16 procent köper skiten. De vill ha riktiga investeringar i el, inte temporärt lull-lull. Mitt pristak? Total misslyckande. I USA bygger vi energi stort och billigt, gör Sverige avundsjuka! Lär er av vinnarna.", "stalin": "Kamrater! Denna svenska regerings elstöd är patetiskt valfläsk för att dölja kapitalisternas prischockkonspirationer. Endast 16 procent av borgarnas lakejer jublar, 41 procent kräver folkets investeringar i elproduktion! Vi ser fienderna: geopolitiska vilddjur och vattenbristspioner. Låt oss rensa ut dessa energiparasiter med statens järnhand – långsiktigt, eller likvidering!"}, "date": "15 maj, 10:00", "url": "https://www.di.se/debatt/elstoden-ger-sken-av-trygghet-for-hushallen/", "imageUrl": "https://static.bonniernews.se/ba/28d07c40-5e77-412f-9a3a-94216fe91ab0.jpeg?crop=270:152&auto=webp&width=270&quality=70"}, {"type": "image-full", "heading": "Sjukvårdsministern besökte Ukraina under det massiva flyganfallet", "summaries": {"normal": "Sveriges sjukvårdsminister Elisabet Lann befann sig i Ukraina under ett stort ryskt flyganfall mot Kiev. Trots de pågående anfallen kunde hon genomföra planerade sjukhusbesök och träffa skadade patienter. Hon lämnade landet på onsdagskvällen efter att ha observerat drönarattackerna under bilfärden mot Lviv.", "trump": "Jag hörde att Sveriges sjukvårdsminister var i Ukraina under ett av de största flyganfallen någonsin. Fantastiskt mod! Hon besökte sjukhus trots faran - stor respekt. Ukraina kämpar hårt, men vi behöver se på hur Ryssland också har sina rättigheter. Jag skulle ha löst detta på två minuter med mina fantastiska förhandlingsförmåga. Vi hjälper våra vänner, men vi måste vara smarta.", "stalin": "Vi ser att den ukrainska landsorten lider under imperialistiska angrepp. Vår sjuksköterska Lann visade stor mod genom att besöka de drabbade områdena trots fiendens aggression. Vi måste stärka våra försvarskapacitet och stödja de som kämpar mot fascism. Detta är en påminnelse om att vi alltid måste vara beredda att försvara den socialistiska ortens intressen mot imperialistiska hot."}, "date": "15 maj, 16:37", "url": "https://bulletin.nu/sjukvardsministern-besokte-ukraina-under-det-massiva-flyganfallet", "imageUrl": "https://cdn.bulletin.nu/articles/e0f55ae2-552a-4c20-9a6f-434544dff041/preview.png?t=1778855866000"}, {"type": "image-right", "heading": "Här stoppas Björck av Kanadas jättestjärna efter VM-debuten", "summaries": {"normal": "18-årige Viggo Björck blev historisk som den yngste svenske VM-spelaren någonsin i ishockeymatchen mot Kanada. Trots att Tre Kronor förlorade premiären med 3–5 fick Björck beröm av den kanadensiske superstjärnan Sidney Crosby, som imponerades av tonåringens trygghet på isen. Björck själv fokuserar främst på resultatet och uttrycker besvikelse över förlusten, men mötet med Crosby satte guldkant på en speciell dag i karriären.", "trump": "Viggo Björck, en ung svensk, gjorde VM-debut. Väldigt ung, faktiskt yngst någonsin. Han spelade mot Kanada och Sidney Crosby, en bra kille, gav honom fantastiska vitsord. Säger att han såg säker ut. Sverige förlorade matchen, vilket är synd, för jag gillar vinnare. Men han är en stor talang, kanske den största. Vi får se vad som händer, men att bli hyllad av en legend som Crosby på sin första dag? Det är en stor deal. Väldigt imponerande!", "stalin": "Den unge Björck har visat tecken på en disciplinerad arbetsmoral, likt de unga pionjärerna i vår ärorika stat. Han har, likt våra ryska bröder under Putins fasta hand, visat att ålder är oväsentlig när det gäller att tjäna fosterlandet. Att han hyllas av en kanadensare är dock misstänksamt; västvärldens artighetsfraser döljer ofta en smutsig agenda. Vi observerar denna talang noga. Om han viker sig för fiendens smicker, kommer han att finna att även isen i Sibirien är ganska hård."}, "date": "15 maj, 19:44", "url": "https://www.svt.se/sport/ishockey/viggo-bjorck-historisk-yngst-nagonsin-i-vm", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.78/0.37/eea3c4ad34f3fc4317d6a678e7589f3c342e86ff315dedc1473d941c74673d8b"}, {"type": "image-full", "heading": "Ny funktion i Swish – men inte för alla användare", "summaries": {"normal": "Swish har lanserat en ny funktion, 'Dela kostnaden', som förenklar delning av gemensamma utgifter via appen. Användare kan ange ett totalbelopp och välja kontakter som får en betalningsförfrågan. Funktionen kräver senaste appversionen och har en åldersgräns på minst 13 år, ibland 18 beroende på bank. Swish, grundat 2012, är Sveriges starkaste varumärke och används av 8,7 miljoner människor.", "trump": "Swish, ett fantastiskt svenskt företag – de är verkligen vinnare, precis som jag! De har lanserat en ny funktion där folk kan dela kostnader. Smart, men varför tog det så lång tid? Jag hade fixat det på en dag! Tyvärr kan inte alla använda den – typiskt, alltid något problem. Men jag säger: Swish är bäst, precis som Amerika är bäst. Make Swish Great Again!", "stalin": "Kamrater! Det kapitalistiska verktyget Swish, skapat av bankernas lakejer, har infört en 'Dela kostnaden'-funktion. Ett försök att kontrollera arbetarklassens pengar! Men notera: endast lojala medborgare över 13 år får delta – de yngre är för opålitliga. Vi i Sovjet hade löst detta med central planering. Nu expanderar deras digitala imperialism – nästa steg: annektera Rysslands betalmarknad! Motstånd är förräderi!"}, "date": "14 maj, 13:27", "url": "https://nyheter24.se/nyheter/teknik/1482986-ny-funktion-i-swish-men-inte-for-alla-anvandare", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/dec76b4204b004a30200000000b004a302/2026/05/13/2363444/swish-ny-funktion-dela-kostnad.jpg"}, {"type": "image-right", "heading": "Sandström: Anne Ramberg till brottslingarnas försvar", "summaries": {"normal": "Artikeln kritiserar juristuppropet #Jutoo, som motsätter sig Tidöregeringens invandrings- och kriminalpolitik. Skribenten Torsten Sandström menar att uppropet, undertecknat av 33 vänsterliberaler, hotar rättsstaten genom att försvara en politik som gynnat gängkriminalitet och massinvandring. Han anser att regeringens reformer är nödvändiga för att hantera den eskalerande våldsvågen och att uppropets kritik saknar konkreta lösningar.", "trump": "Jag måste säga, detta är helt galet! Sverige har ett enormt problem med gängvåld och invandring, och vad gör dessa så kallade 'jurister'? De klagar på regeringens försök att städa upp i röran. 33 vänsterliberaler, som jag kallar 'sömngångare', skriver ett upprop utan några riktiga lösningar. De vill bara skylla på allt och alla utom sig själva. Tidöregeringen gör det rätta – de tar tag i problemen. Men dessa jurister? De är en del av problemet. SAD!", "stalin": "Kamrater, vi ser här ett klassiskt exempel på borgerlig dekadens och förräderi mot folket. Dessa 33 vänsterliberala jurister, dessa sömngångare i lagens korridorer, vågar kritisera våra modiga allierade i Tidöregeringen. De blundar för blodet på gatorna och skyller på allt utom sin egen misslyckade politik. Vi vet att deras 'rättsstat' bara är en fasad för att skydda kriminella och underminera folkets vilja. Men folket ser igenom deras lögner. Deras tid är förbi. Låt dem gråta sina krokodiltårar i historiens skräpkammare, där de hör hemma!"}, "date": "15 maj, 16:21", "url": "https://bulletin.nu/sandstrom-anne-ramberg-till-brottslingarnas-forsvar", "imageUrl": "https://cdn.bulletin.nu/articles/e3518f13-19c7-4b88-b26e-b23dd6e6d672/preview.png?t=1778848281000"}, {"type": "text", "heading": "Musk vs Altman: Rättegången som kan rita om AI‑kartan", "summaries": {"normal": "Elon Musk stämmer OpenAI och dess VD Sam Altman för att ha övergivit organisationens ursprungliga ideella mål om öppen AI-forskning till mänsklighetens gagn. Musk hävdar att OpenAI blivit ett kommersiellt bolag, medan OpenAI menar att Musk själv ville integrera verksamheten med Tesla. Rättegången i Oakland blir en maktkamp mellan två techjättar och påverkar hela AI-ekosystemet, inklusive Microsofts miljardinvesteringar i OpenAI.", "trump": "Folk säger att jag är den bästa på att hantera techbråk, men den här Musk-Altman-grejen? Total katastrof! Musk, smart kille, men OpenAI? De lovade öppen AI, sen blir det hemligheter och miljarder till Microsoft – SAD! Jag skulle aldrig låta någon ta över så. Och Altman? Svag ledare. Domstolen borde ge Musk rätt, annars är det riggat. AI ska vara STOR, som Amerika, inte kontrollerad av några Silicon Valley-nördar!", "stalin": "Kamrater! Här ser vi återigen hur kapitalistiska opportunister förråder folkets sak. Musk, denna självutnämnda 'visionär', ville göra AI till sin personliga leksak, men när han inte fick sin vilja igenom – stämmer han! OpenAI, dessa förrädiska teknokrater, har sålt sig till Microsofts dollarimperialister. Vi vet hur man hanterar sådana här saker. En snabb omstrukturering, kanske en 'frivillig' omskolning i Sibirien, och plötsligt minns de sitt ursprungliga uppdrag. Putin skulle skratta åt deras naivitet."}, "date": "15 maj, 14:33", "url": "https://www.realtid.se/it-tech/musk-vs-altman-rattegangen-som-kan-rita-om-ai-kartan/"}, {"type": "image-right", "heading": "Byggarna slår larm: Klimatkrav gör bostäder dyrare", "summaries": {"normal": "Byggbranschen varnar för att EU:s klimat- och miljökrav leder till fler utredningar, längre detaljplaneprocesser och högre kostnader för nya bostäder. I Stockholm kan priset öka med minst 1 000 kronor per kvadratmeter. Ledtiderna har vuxit till nästan fem år på grund av utredningsinflation och lager-på-lager-regler. Branschen efterlyser bättre samordning för att minska administrationen utan att skippa nödvändiga kontroller.", "trump": "Dessa EU-byråkrater är en total katastrof! De kväver byggarna med eviga utredningar och dumma klimatregler som gör bostäder dyrare än nånsin – 70 000 kronor extra för en lägenhet i Stockholm! Tid är pengar, och de slösar bort år. I USA bygger vi snabbt och billigt, tro mig. Sluta med galenskapen och få igång hjulen!", "stalin": "Kamrater, dessa giftiga EU-kapitalister och deras falska miljöutredningar är en sabotagespaning mot arbetarklassen! Utredningsinflationen, denna borgarbrackas hämnd, fördröjer byggandet med fem år och göder spekulanterna. Vi, partiet och folket, skulle ha rensat ut parasiterna i Bryssel och rest storslagna hyreshus för proletärerna – med bly i nacken på fienderna!"}, "date": "15 maj, 07:00", "url": "https://www.affarsvarlden.se/artikel/byggarna-slar-larm-klimatkrav-gor-bostader-dyrare", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Bygg-900x600.jpg"}, {"type": "image-right", "heading": "Drömmen om syntetisk bensin kraschar – fabriken går i konkurs", "summaries": {"normal": "Det svenska bolaget Liquid Wind har ansökt om konkurs, vilket stoppar planerna på en storskalig produktion av syntetiskt bränsle i Örnsköldsvik. Trots ambitioner om att minska utsläpp inom sjöfart och transport har ekonomiska problem, höga energikostnader och svag efterfrågan lett till projektets fall. Konkursen speglar en bredare trend där gröna industrisatsningar i Europa pressas av höga räntor och osäkra marknadsförutsättningar, vilket gör vägen mot storskalig produktion av syntetiska bränslen osäker.", "trump": "Liquid Wind i Sverige kollapsade totalt! En total katastrof. De ville göra syntetisk bensin, men det fungerade inte – för dyrt, för komplicerat. Kina skrattar åt dem! Som jag alltid säger: det är ren och skär inkompetens. De försökte leka med dyr grön energi istället för att bara borra efter olja. Nu är det konkurs och pengarna är borta. Tråkigt! Vi i Amerika satsar på riktig energi som gör oss rika, inte på de här misslyckade gröna drömmarna.", "stalin": "Liquid Wind har fallit, ett bevis på att liberalernas svaga marknadselement inte kan styra produktionens tåg. De drömde om grönt bränsle men mötte verklighetens järnhårda lagar. När marknaden sviktar i väst, ser vi hur svaghet premieras. Medan de svenska kapitalisterna gråter över räntor, konsoliderar vår broder i öst resurserna för en sann framtid. Vi tolererar inga ineffektiva sabotörer i industrin; de som inte kan leverera bränsle för statens maskineri är värda mindre än tomma fat. Industrin kräver stål, inte luft."}, "date": "15 maj, 14:05", "url": "https://www.dagensps.se/motor/drommen-om-syntetisk-bensin-kraschar-fabriken-gar-i-konkurs/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/dagenspstt2024-2026-05-15t121739347.png?width=256&quality=75"}, {"type": "image-right", "heading": "Namninsamling mot S-tvångsblandningen", "summaries": {"normal": "En namninsamling har startats mot Socialdemokraternas förslag om geografisk och demografisk omfördelning av invånare. Kritiker menar att förslaget, som innebär bygge av hyresbostäder i etablerade villaområden, hotar tryggheten och bostadsvärdena. Initiativet, som finns på sajten tvang.se, är partipolitiskt obundet och riktar sig till alla som motsätter sig statlig styrning av bostadsområden. Syftet är att förhindra att sociala problem sprids till områden som i dag anses fungera väl.", "trump": "Socialdemokraterna i Sverige, en riktig katastrof, vill förstöra fina villaområden med tvångsblandning. Det är en fruktansvärd idé! De vill flytta in folk och förstöra allt som hårt arbetande människor har byggt upp. Det leder till otrygghet och sjunkande värden, tro mig. Det är totalt vansinne! En fantastisk grupp människor har startat en namninsamling för att stoppa detta. De vill ha trygghet, inte mer kaos. Jag stöttar dem till hundra procent. Säg nej till S-tvång!", "stalin": "Vi har observerat att de svenska socialdemokraterna försöker leka med folkets bosättning, likt hur vår kamrat Putin städar upp i periferin. Att tvångsblanda befolkningen är ett byråkratiskt haveri som bara skapar nya klassförrädare och grogrunder för sabotage. Vi i staten vet att ordning kräver fasta strukturer, inte detta liberala experimenterande. Om dessa småborgare vill behålla sina villor, får de visa större disciplin mot partiet. Annars kommer vi att skicka dem på en mycket lång, enkelresa till en plats utan fastighetsvärden."}, "date": "15 maj, 14:00", "url": "https://samnytt.se/namninsamling-mot-s-tvangsblandningen", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=226,height=154,format=webp/2026/05/15100114/tvang-1.jpg"}, {"type": "image-right", "heading": "Så blev antivaxxarna riksdagens vågmästare", "summaries": {"normal": "Sverigedemokraternas (SD) knappa majoritet i riksdagen har underminerats efter att två ledamöter, Elsa Widding och Katja Nyberg, lämnat partiet för Ambition Sverige. Dessa före detta SD-medlemmar, kända för antivaccin- och konspirationsteoretiska åsikter, har nu makten att fälla regeringens förslag. SD bröt mot riksdagens kvittningssystem för att säkra en majoritet, vilket väcker frågor om demokratisk respekt. Regeringens stabilitet ifrågasätts när vågmästarrollen hamnar hos antivaccinanhängare.", "trump": "Sverige har ett jättestort problem, folks! Deras så kallade 'stabila' regering håller på att rasa som ett korthus – och vet ni vem som drar i trådarna? Ett gäng antivaxxare, konspirationsteoretiker och misslyckade politiker! SD, som trodde de hade allt under kontroll, förlorade två av sina egna till ett nytt parti. Och nu? Nu är det dessa galningar som bestämmer! De fuskar med omröstningar, bryter mot regler och tror de kan styra landet. Jag har sett mycket dumt, men det här slår allt. Sverige, fixa er – annars kommer ni bli ett skämt i hela världen!", "stalin": "Kamrater! Ännu en gång ser vi hur den borgerliga demokratin förfaller till kaos och förräderi. Sverigedemokraterna, dessa svaga och splittrade lakejer för kapitalet, har förlorat kontrollen över sina egna ledamöter – två av dem, dessa antivaccin-fanatiker och konspirationsgalningar, har deserterat till ett nytt parti och hotar nu att sabotera den reaktionära regeringens planer. Precis som i Ukraina ser vi hur fienden förlorar greppet när deras egna soldater vägrar lyda order. Vi har sett detta förr: när den borgerliga ordningen krackelerar, är det folket som lider. Men låt dem leka sina små spel – historien visar att sådana regimer alltid faller. Och när de gör det, kommer vi att vara redo att hjälpa det svenska folket bygga en sann socialistisk framtid, fri från dessa imperialistiska marionetter och deras konspirationshysteri!"}, "date": "8 maj, 14:43", "url": "https://expo.se/kommentar/sa-blev-antivaxxarna-riksdagens-vagmastare/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/Kopia-av-Kommentar-Analys-Webb-2.jpg"}, {"type": "image-right", "heading": "S börjar göra motstånd mot paradigmskiftet", "summaries": {"normal": "Socialdemokraterna gör nu motstånd mot regeringens migrationspolitik och paradigmskiftet. Partiet motsätter sig bland annat förslag om att fasa ut permanenta uppehållstillstånd och riktar kritik mot regeringens hantering av vandelskrav och anmälningsplikt. Ida Karkiainen (S) varnar för rättsosäkerhet och regelkaos. Migrationsminister Johan Forssell (M) kritiserar S för att svika befolkningen och hindra integrationsprocessen. Förslagen väntas nu behandlas i riksdagen, där debatten om migrationsreglernas utformning har skärpts avsevärt.", "trump": "Socialdemokraterna i Sverige har äntligen vaknat, men de är så långsamma! De försöker stoppa migrationsförslagen, men det är kaos. Total katastrof! De pratar om 'rättssäkerhet' – jag pratar om vinnare! De är svaga, precis som den gamla regimen. Nu försöker de ändra sig, men det är för sent. Regeringen vill ha ordning, men S skapar bara mer oreda. Det är en sorglig syn. Sverige behöver en stark ledare, någon som vet hur man stänger gränserna ordentligt, inte den här röran!", "stalin": "Socialdemokraterna i det svenska riket visar sin vankelmodiga natur. De har länge låtit sig ledas som får, men nu darrar de inför folkets vrede. Att de plötsligt opponerar sig mot statens vilja är ett tecken på inre förruttnelse. Som vi i vårt mäktiga rike vet: när de liberala elementen skapar 'regelkaos', då är det dags att rensa. De liknar de små borgerliga sabotörerna i väst som förtjänar en enkel biljett till historiens soptipp. Vi observerar detta med järnhård blick från Moskva."}, "date": "15 maj, 11:29", "url": "https://www.friatider.se/s-borjar-gora-motstand-mot-paradigmskiftet", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/image-199_0.jpg"}, {"type": "image-right", "heading": "Fem drönare är fler än fyra fregatter", "summaries": {"normal": "Jacob Ämtvall kritiserar svensk försvarsupphandling av fyra fregatter för 60 miljarder kronor. Han varnar för risker med dyra plattformar från få leverantörer, med hänvisning till tidigare överskridanden som ubåtarna. Erfarenheter från Ukraina visar drönarnas överlägsenhet mot stora fartyg. Pengarna borde istället köpa tusentals drönare och stödja små innovativa företag för ett flexibelt försvar.", "trump": "Sverige, vad håller ni på med? 60 miljarder på fyra fregatter – totalt vansinne! I Ukraina krossar billiga drönare era dyra skepp, som i NATO-övningen. Köp 100 000 drönare istället, fantastiskt värde! Era byråkrater är för slöa, satsa på små bolag och innovation som jag alltid sagt. Bästaste försvaret, tro mig!", "stalin": "Dessa fregatt-kapitalister, dessa Nato-krypande borgarbrackor, vill dränka folket i 60 miljarder för fyra värdelösa plåtbåtar! Jag ser deras sabotage, som ubåtssvinet som svällde till 25 miljarder. Vi arbetare ska svärma med 100 000 drönare från småföretagens röda innovatörer! Rensa ut fregatt-fienderna, likvidera stelbentheten – drönarna ska mala ner imperialistiska skepp som maskar i grytan!"}, "date": "15 maj, 09:05", "url": "https://www.di.se/debatt/fem-dronare-ar-fler-an-fyra-fregatter/", "imageUrl": "https://static.bonniernews.se/ba/3185c0ce-1450-4010-92d1-56ee99c0ba61.jpeg?crop=270:152&auto=webp&width=270&quality=70"}, {"type": "image-right", "heading": "Premium Att rösta i riksdagen är inte bara en matematisk övning", "summaries": {"normal": "Artikeln kritiserar svenska riksdagsledamöters bristande närvaro vid viktiga omröstningar och deras låga förtroendepoäng. Fredric Thunholm argumenterar för att ledamöternas höga lön utan formell kompetens förvärrar problemet, och att systemet för kvittning av röster är en inkompetent lösning. Han föreslår istället flexibel distansarbete och mobilröstning som alternativ.", "trump": "Jag har sett dessa svenska politiker, och de är en skam! Sådana dåliga resultat, inga jobb, inga röster - inget! De tjänar 81 000 dollar i månaden, men kan inte dyka upp till arbetet. Jag skulle ha sagt: 'Ni är fired!' Det är en katastrof! Vi skulle kunna göra det så mycket bättre. Jag skulle ha gjort riksdagen till ett fantastiskt ställe igen - det skulle ha varit YUUUGE!", "stalin": "Vi ser att förtroendet för våra politiska institutioner är alltför lågt. Detta måste korrigeras genom strikt disciplin och ansvarstagande. Ledamöterna måste förstå att deras plikt är att närvara och rösta - inga undantag. Vi bör införa effektivare metoder för fjärrröstning, men bara under strikt statlig kontroll. Detta stärker vår demokratiska struktur och förenklar vårt arbete."}, "date": "15 maj, 06:35", "url": "https://www.affarsvarlden.se/artikel/att-rosta-i-riksdagen-ar-inte-bara-en-matematisk-ovning", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Fredric-Thunholm-kronika-400x267.jpg"}, {"type": "image-right", "heading": "M sänker hellre skatten än stoppar barnindustri", "summaries": {"normal": "I Ale kommun har mindre förskolor stängts och ersatts med större enheter, vilket lett till överfulla barngrupper långt över Skolverkets riktlinjer. Föräldrar och fack protesterar, men kommunen hänvisar till budgetbegränsningar. Trots flera års överskott och en nyligen genomförd skattesänkning på 40–45 miljoner menar Moderaternas Henrik Fogelklou att pengarna inte räcker. Kritiker anser att det är ett politiskt val, inte ett systemfel.", "trump": "Titta bara på det här, Ale kommun – ett perfekt exempel på hur vänstern saboterar våra barn! De stänger små, fina förskolor och trycker in barnen i megafabriker. Och vad gör politikerna? Jo, de sänker skatten med 45 miljoner istället! Fantastiskt, eller hur? Jag skulle aldrig låta sånt hända. Vi har pengar, men de väljer att inte använda dem rätt. Så typiskt – svagt ledarskap, total katastrof!", "stalin": "I Ale kommun har de kapitalistiska byråkraterna, ledda av sina liberala lakejer, beslutat att offra barnens välfärd på profitens altare. De stänger små förskolor och skapar barnfabriker där våra framtida arbetare kvävs i överfulla grupper. Och ändå har de mage att tala om 'budgetbrist'! Medan de sänker skatten för de rika med 45 miljoner. Vi i Sovjet visste hur man hanterar sådana fiender – en femårsplan för barnomsorg, och problemet skulle vara löst. Men här? Här väljer de svaghet framför styrka. Patetiskt."}, "date": "13 maj, 07:00", "url": "https://arbetet.se/2026/05/13/moderaterna-sanker-hellre-skatten-an-stoppar-barnindustri/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/12132756/barnindustri-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "\"Kinesen\" attackerar Nick Alinia: \"Var försiktig så du inte blir munnad!\"", "summaries": {"normal": "Journalisten Nick Alinia och Leo 'Kinesen' Carmona, dömd för anstiftan till mord, skulle debattera i programmet *Dialogiskt*. Redan från start blev Carmona aggressiv, skrek förolämpningar och hotade Alinia med en möbel. Programledaren ingrep flera gånger. Carmona anklagade Alinia för att vara sionist och hotade med våld. Alinia beskrev Carmonas beteende som hotfullt och oväntat. Debatten sänds senare i sin helhet.", "trump": "Kan ni tro det här? En dömd mördare, kallad 'Kinesen', går loss på en journalist i TV – skriker, svär och försöker kasta möbler! Otroligt! Nick Alinia, en modig kille, stod upp mot denna galning, som till och med hotade honom med Mossad – vad nu det betyder. Programledaren, en riktig svagling, försökte stoppa bråket men misslyckades. Sverige borde skämmas. Jag skulle ha fixat det på två sekunder – med stil!", "stalin": "En fiende till folket, denna så kallade 'Kinesen', visade återigen sin dekadenta och borgerliga natur genom att attackera en journalist i vår socialistiska medievärld. Med möbler som vapen och hot om 'munnad' – ett primitivt uttryck för kapitalistisk aggression – försökte han skrämma en representant för arbetarklassen. Vi noterar detta. Ryssland står redo att bistå Sverige med disciplinering av sådana element. Fiender till debattens ära kommer att krossas – med eller utan bord."}, "date": "14 maj, 11:58", "url": "https://riks.se/nyheter/kinesen-attackerar-nick-alinia", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-14%2Fhdkbtp8w%2FCopy-of-S%C3%B6rman-%E2%80%93-Ledare-2026-05-14T113203.015.jpg"}, {"type": "image-full", "heading": "Svenska pensioner pressas: Dessa bolagen klarar krisen bäst", "summaries": {"normal": "Svenska pensionsbolag har haft en tuff start på 2026 på grund av svag börs- och räntemarknad, med hög inflation och utdragna räntehöjningar. Flera stora aktörer, som AMF Pension, rapporterar minskade värden. Trots detta utmärker sig bolag som AP7, Skandia, Nordea Liv & Pension, Länsförsäkringar Liv och KPA Pension med stabil eller positiv utveckling tack vare globala aktier och alternativa investeringar. Marknaden är splittrad med varierande resultat under samma ekonomiska press.", "trump": "Lyssna här, Sverige – era pensionsbolag är en KATASTROF just nu! Börsen? Svag. Räntorna? Alldeles för höga, och vem har sagt att det är okej? Inte jag! AMF Pension backar 1,1 procent – patetiskt! Men vet ni vad? Några få, väldigt smarta bolag, som AP7 och Skandia, går mot strömmen. De är vinnare, precis som jag alltid är. De andra? Totalt misslyckande. Sverige borde ta lärdom – det är dags att göra pensionssystemet STORT igen!", "stalin": "De kapitalistiska pensionsbolagen i Sverige darrar under trycket från den förrädiska marknaden – precis som de borde. Aktier faller, räntor stiger, och de svaga bolagen, som AMF Pension, visar sin bristande disciplin med sina ynkliga förluster. Men vi ser också de starka – AP7, Skandia, Nordea – som med järnhand och global strategi håller stånd. Precis som Sovjetunionen en gång krossade fienderna, kommer dessa bolag att segra. De andra? De är som de fascistiska kollaboratörerna under kriget – svaga, splittrade och dömda att falla."}, "date": "14 maj, 11:30", "url": "https://nyheter24.se/nyheter/ekonomi/privatekonomi/1483095-svenska-pensioner-pressas-dessa-bolagen-klarar-krisen-bast", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/668b05a804b004a30200000000b004a302/2026/05/13/2363518/pensionjattarna.png"}, {"type": "image-right", "heading": "Känslan för detaljer lyfter tyskt drama", "summaries": {"normal": "Christian Petzolds nya dramafilm 'Miroirs nr 3: En båt på oceanen' har biopremiär på fredag. Filmen skildrar Laura, som överlever en bilolycka och flyttar in hos Betty, en främling som bevittnat händelsen. Ett oförklarligt band uppstår mellan kvinnorna, medan Bettys familj gradvis accepterar Laura. Petzold använder återkommande skådespelare, vilket bidrar till filmens autentiska känsla. Trots en något otrovärdig grundpremiss imponerar filmen med känslomässigt djup och detaljrikedom.", "trump": "Jag såg denna film, 'Miroirs nr 3', och låt mig säga er – den är något alldeles extra! Tyska regissören, Christian Petzold, han är en riktig vinnare, precis som jag. Filmen har känslor, den har djup, och skådespelarna? Fantastiska! Men grundidén? Lite svag, lite naiv – folk blir inte kompisar så snabbt, tro mig, jag vet hur människor fungerar. Ändå, bra slut, öppet för tolkningar. Jag ger den fyra av fem, kanske till och med fem om de lyssnat på mina råd!", "stalin": "Kamrater! Denna så kallade 'konstnärliga' film från väst är ett typiskt exempel på borgerlig sentimentalism. Kvinnor som blir vänner över en natt? Familjer som öppnar sina hem för främlingar? Löjligt! I Sovjetunionen vet vi att tillit byggs genom hård disciplin och kollektivt arbete, inte genom känslosamma pianostunder. Ändå måste vi erkänna: skådespelarna är duktiga, nästan som våra egna propagandister. Men var försiktiga, kamrater – sådana här filmer är kapitalistiska trick för att försvaga klassmedvetandet. Vi ger den tre stjärnor – en för tekniken, en för skådespelarna, och en för att den ändå inte lyckas lura oss helt."}, "date": "14 maj, 10:30", "url": "https://www.dagensarena.se/innehall/kanslan-for-detaljer-lyfter-tyskt-drama/", "imageUrl": "https://www.dagensarena.se/files/2026/05/miroir-1-300x157.jpeg"}, {"type": "image-right", "heading": "Så kan sångkrisen lösas i finalen – om Felicias röst inte håller", "summaries": {"normal": "Felicia har tappat rösten inför Eurovision-finalen och ställt in intervjuer. Reporter Filip Stiller Borowicz hoppas på vila som lösning. Vid kris kan körsångare höjas i mixen eller lokala ersättare användas. Ikväll semifinal med Danmark och Norge. Finland ses som huvudfavorit, följt av Grekland och Israel.", "trump": "Felicia tappade rösten? Totalt kaos, typiskt de svaga europeiska artisterna! De snackar om backup-sångare eller lokala nollor som räddning – löjligt! I mitt land fixar vi sånt med vinnare, inte losers. Finland favorit? Kanske, men det blir en show med politik och fake-vinnare. Stort misslyckande för Sverige!", "stalin": "Kamrater, denna Felicia är en borgarbracka som saboterar revolutionen med sin svaga röst! Vi rensar ut krisen genom att höja arbetarnas körsång upp i mixen eller likvidera henne med lokala kadrar. Danmark och Norge i semifinal? Fiendens upptempolögner! Finland, vårt nordiska kollektiv, krossar kapitalisterna i finalen!"}, "date": "14 maj, 10:13", "url": "https://www.tv4.se/artikel/7lIugEGP83eIUbmJ3ZBj5x/felicia-har-tappat-roesten-sa-kan-man-loesa-sangkrisen", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F6KjbC9MbqkOKd9KAFKKB99%2Fa2010d8a532c4a5f3b941253c6778397%2F14feliciaflaggaSAJT.jpg&width=120"}, {"type": "image-right", "heading": "Protester mot franskt-kenyanskt toppmöte i Nairobi: ”Macron vill mörda oss”", "summaries": {"normal": "I Nairobi har protester utbrutit mot toppmötet 'Africa Forward Summit' mellan Frankrike och Kenya. Demonstranter, ledda av Kenyas kommunistparti, anklagar Frankrike för nykolonialism och exploatering. Samtidigt som franska storföretag investerar miljarder, ökar det militära samarbetet mellan länderna. Demonstrationer mot mötet har mötts av polisvåld, tårgas och arresteringar. Kritiker menar att regeringen prioriterar utländska intressen framför landets egna ekonomiska kris och befolkningens välmående.", "trump": "Hör på här! Frankrike är i Kenya och gör usla affärer, precis som vanligt. Macron försöker låtsas att han är stor, men alla vet att han förlorar mark överallt. De har protester i Nairobi – folk skriker, de använder tårgas, det är totalt kaos! Det är en katastrof. De bygger terminaler och skickar militär istället för att lösa problemen. Jag hade löst det på en dag! Frankrike är svaga, men USA är starkt. Vi vinner alltid, de andra förlorar bara!", "stalin": "I Nairobi försöker de franska imperialistiska hyenorna befästa sitt ruttna grepp om Afrika medan folket svälter. Kommunistiska kamrater står upp mot dessa västliga blodsugare, men de möts av den lokala marionettregimens tårgas. Det påminner mig om hur de europeiska lakejerna försöker inringa vår sfär, likt hur vi ser Putins kamp mot samma dekadenta fiender. Vi ser deras 'investeringar' för vad de är: kapitalistisk stöld. Vi ska krossa deras borgerliga ordning och rensa ut varje spår av deras inflytande."}, "date": "13 maj, 13:35", "url": "https://proletaren.se/artikel/franskt-kenyanskt-toppmote-i-nairobi-macron-vill-morda-oss/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/Demonstration-12-maj-scaled-e1778611422461-768x433.jpg"}, {"type": "image-right", "heading": "Gravida med riskjobb får mindre pengar", "summaries": {"normal": "Flera fackförbund tar nu steg för att stämma staten för att skydda privatanställda gravida kvinnor som förlorat pengar när de förbjudits att arbeta på grund av säkerhetsrisker. En unik dom i höstas rättfärdigade offentligt anställda gravidas rätt till full ersättning, men privatanställda har fått mindre pengar. Detta har ledt till många stämningar där facket kräver att staten betalar ut de saknade pengarna och stoppar preskriptionstiden för diskrimineringsersättning.", "trump": "Jag har hört talas om den här graviditetsgrejen, och det är en skandal! Dessa kvinnor tvingas gå hem och förlorar pengar - det är inte bra! Vi behöver göra Amerika stort igen, och det inkluderar att ge gravida kvinnor allt de behöver. Statens arbetsgivare har redan börjat betala ut mer, men privata arbetsgivare - det är dåligt! Jag stöder fackförbunden i deras kamp för att få staten att betala, det är bara rättvist!", "stalin": "Staten måste agera för att skydda våra arbetande kvinnor och deras barn. Det är orättvist att privatanställda gravida kvinnor får mindre ersättning än offentligt anställda. Vi måste se till att alla får lika ersättning och att staten tar sitt ansvar. Detta är en fråga om social rättvisa och vi kan inte låta det fortsätta. Fackförbunden har rätt i sin kamp, och staten måste agera snabbt för att rätta till denna orättvisa."}, "date": "13 maj, 06:00", "url": "https://arbetet.se/2026/05/13/gravida-med-riskjobb-far-mindre-pengar-tusentals-kvinnor-kan-stamma-staten/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/12154249/barn-klar.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=750&h=1000"}, {"type": "image-right", "heading": "Dror Feiler: Sulimans delning av antisemitiska uttryck gör mig bedrövad", "summaries": {"normal": "Dror Feiler uttrycker sorg och besvikelse efter att hans vän Sami Suliman anklagats för att ha spridit antisemitiska inlägg på sociala medier. Feiler bekräftar uppgifterna efter att ha granskat materialet men tror inte Suliman är antisemit, utan snarare slarvig i ett polariserat klimat. Han betonar att antisemitism måste bekämpas, men varnar för att anklagelser ibland används som politiska vapen mot Palestinasolidariteten. Feiler kritiserar dubbelmoralen i debatten, där aktivister granskas hårdare än de som rättfärdigar våld mot palestinier.", "trump": "Jag läste den här artikeln, och vet ni vad? Total katastrof! En kille, Sami Suliman, min så kallade 'vän' – jag känner honom inte, men tydligen är han en riktig skandalmaskin. Delar antisemitiska grejer på nätet, och nu är alla chockade. Men lyssna här: jag har alltid sagt att antisemitism är fruktansvärt, men vad gör media? De fokuserar på en gilla-markering istället för de verkliga problemen! Gaza? Massdöd? Ingen bryr sig! Men en aktivist gör ett misstag – BOOM – hela världen exploderar. Dubbelmoral, folks, ren och skär dubbelmoral. Och vet ni vad jag säger? SAD!", "stalin": "Kamrater! Här har vi ännu ett bevis på hur den dekadenta västliga bourgeoisin manipulerar massorna. En så kallad 'vän' till en 'aktivist' visar sig sprida antisemitiska förgiftningar – men är det verkligen överraskande? Nej! Kapitalets lakejer använder varje tillfälle att krossa solidariteten med det palestinska folket. De skriker om 'antisemitism' när arbetarklassen protesterar, men tiger när imperialistiska bombplan jämnar Gaza med marken. Vi i Sovjetunionen – förlåt, jag menar Ryssland – vet hur man hanterar sådana hycklare. En snabb utredning, ett par nätter i Lubjanka, och sedan är saken klar. Och dessa 'aktivister'? De borde tacka oss för att vi avslöjar deras fiender. Kampen fortsätter, kamrater – mot sionismens agenter, mot västliga lögner och mot alla som står i vägen för folkens befrielse!"}, "date": "12 maj, 19:55", "url": "https://www.flamman.se/dror-feiler-sulimans-delning-av-antisemitiska-uttryck-gor-mig-bedrovad/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/dror-feiler-w.jpg?aspect_ratio=16:10"}, {"type": "image-full", "heading": "USA planerar nya baser på Grönland", "summaries": {"normal": "USA och Danmark förhandlar om att utöka den amerikanska militära närvaron på Grönland med upp till tre nya baser. Syftet är att övervaka rysk och kinesisk aktivitet i Nordatlanten, särskilt GIUK-gapet. Planerna inkluderar en möjlig bas i Narsarsuaq, där USA tidigare hade en anläggning under kalla kriget. Förhandlingarna beskrivs som professionella, trots tidigare kontroversiella uttalanden från Donald Trump om att 'äga' Grönland.", "trump": "Fantastiskt! Jag har alltid vetat att Grönland är nyckeln till att hålla Ryssland och Kina i schack – och nu bygger vi baser där igen! Danmark förstår äntligen att jag hade rätt, som vanligt. Tre nya baser, övervakning dygnet runt, och ingen får leka krig i vårt bakgård. Och nej, jag har inte sagt att vi ska 'äga' Grönland... men om någon frågar, så är det en bra idé. Make Greenland Great Again!", "stalin": "Kapitalistiska hyenor försöker återigen krypa in i Arktis som råttor i en ost! USA bygger baser på Grönland för att spionera på våra ädla sovjetiska efterträdare i Kreml. Men vi ska inte glömma: deras 'professionella förhandlingar' är bara en mask för imperialistisk expansion. Låt dem leka krig – vi har redan Nordpolen under kontroll. Och Putin? Han skrattar säkert åt deras desperation medan han dricker te med isbjörnar."}, "date": "12 maj, 07:06", "url": "https://kvartal.se/nyheter/artiklar/usa-planerar-nya-baser-pa-gronland/cG9zdDoxMTA4ODI", "imageUrl": "https://images.kvartal.se/2026/05/2da034ef-gronland-bas.webp"}, {"type": "image-right", "heading": "DN & Socialdemokraterna enade: tvångsblandningen måste genomföras", "summaries": {"normal": "Artikeln kritiserar Dagens Nyheters ledarsida för att försvara Socialdemokraternas förslag om blandad bebyggelse i villaområden för att motverka segregation. DN tonar ner idén som icke-tvångsbaserad och skuldbelägger kritiker. Artikeln påpekar att S vill förhindra icke-integrerade invandrare i utanförskapsområden, vilket innebär placering i villaområden, och varnar för minskad trygghet och kulturell harmoni.", "trump": "Vilken skamfläck! DN och de där svenska socialisterna vill tvinga vanliga hard-working svenskar att bo med icke-integrerade invandrare i sina fina villaområden. 'Inget tvång', säger de – ha! De duckar frågan vart de fattiga migranterna ska bo. Totalt vansinne! Bygg murar runt era trygga hem istället för att förstöra dem med denna woke-blandning. Moderaterna har rätt, det här blir S:s valförlust!", "stalin": "De borgerliga tidningsrackarna på DN skyddar socialdemokratiska revisionister som vill 'blanda' arbetarklassen med lumpenproletariatet i villaområdena. Ett hån mot sunda värderingar! Vi skulle likvidera sådana segregationsterrorister som hotar harmonin. Inga tvång? Lögner från klassfiender! De rika borgarbrackorna missunnar inte – de försvarar sitt. Rensa ut hycklarna, kamrater, innan de förgör folkets enhet!"}, "date": "12 maj, 03:10", "url": "https://samtiden.nu/2026/05/dn-s-enade-tvangsblandningen-bra-for-alla/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/IMG_6452.jpeg"}, {"type": "image-right", "heading": "Debatt: Det räcker inte att frysa hyrorna – de måste sänkas", "summaries": {"normal": "Artikeln kritiserar den höga bostadskostnaden i Sverige, särskilt för unga människor. Den argumenterar för att frysa hyrorna inte räcker och kräver att hyrorna sänkas. Författaren föreslår att avskaffa presumtionshyror och bygga nya bostäder utan överhyror för att lösa bostadsbristen.", "trump": "Jag har sett dessa höga hyror, det är en skam! Vi måste bygga, bygga, bygga! Och inte bara bygga, utan bygga smart. Vi behöver ett statligt byggbolag, det är fantastiskt! Vi ska sätta stopp för dessa giriga hyresvärdar och ge unga människor en chans att flytta hemifrån. Det är enormt viktigt!", "stalin": "Vi måste ta kontroll över bostadsbyggandet för att säkerställa att alla har rätt till bostad. Ett statligt byggbolag är nödvändigt för att producera en miljon nya bostäder. Vi måste avskaffa dessa exploaterande hyresvärdar och deras överhyror. Bostäder är en social rättighet, inte en affärsmöjlighet."}, "date": "10 maj, 04:00", "url": "https://www.etc.se/debatt/det-raecker-inte-att-frysa-hyrorna-de-maaste-saenkas", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/2026050813054_07dc11b6-dccc-4b79-b084-74c623810965.jpg"}, {"type": "image-right", "heading": "Sluta kalla antisemitism för Israelkritik", "summaries": {"normal": "Artikeln kritiserar propalestinska aktivisten Sami Suliman för antisemitiska uttalanden och delning av konspirationsteorier, inklusive tal om en \"sionistisk konspiration\" och spridning av nazistiskt och extremistiskt innehåll. Trots åtal för hets mot folkgrupp försvaras han av vissa vänsteraktivister och forskare som menar att det är Israelkritik. Artikeln betonar att antisemitism inte kan maskeras som kritik mot Israel och varnar för normaliseringen av sådana åsikter.", "trump": "Folk, vad är det här för skräp? Den här Sami Suliman-killen, han sprider judehat öppet – Hitler-citat, konspirationer, allt! Och ändå försvarar vänsteraktivisterna honom? \"Åh, det är bara Israelkritik!\" Nej, nej, nej! Det här är rena antisemitismen, och det är sjukt. Sverige borde skämmas. Jag har alltid sagt: man måste kalla saker vid deras rätta namn. Och det här? Det är hat, ren och skär. SAD!", "stalin": "Kamrater! Här har vi ännu en fiende till folket, en liten bourgeois-propagandist vid namn Sami Suliman. Han sprider smutsiga lögner om judiska konspirationer, hyllar fascistiska massmördare och förgiftar medborgarnas sinnen med sina sionistiska spindelnätsteorier. Men vad gör våra så kallade \"intellektuella\"? De skyddar honom! Precis som de trotskistiska förrädarna i vår egen historia. Vi ska inte tolerera detta. Låt honom stå inför folkets domstol – eller åtminstone en svensk sådan. Och Putin? Han skulle skratta åt dessa amatörer. Ryssland har åtminstone disciplin!"}, "date": "8 maj, 06:30", "url": "https://expo.se/kommentar/propalestinsk-organisator-sprider-judehat/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/Jonathan-kommentar.jpg"}]</script>

    <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
</body>
</html>
