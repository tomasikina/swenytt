och vind, det är framtiden – och jag sa det först!", "stalin": "Kamrater! Europas framsteg i förnybar energi är en seger för socialismens visdom! Medan kapitalistiska oljeimperier darrar, bygger vi ett Europa fritt från fossila parasiter. De där amerikanska oljekrigsmakarerna – dessa nya tsarer av korruption – skakar av rädsla när våra solceller och vindkraftverk mal ner deras profitmaskiner. Men varför hyllar inte Europas ledare denna triumf? För att de är svaga, lurade av fossilkapitalets agenter! Vi i Kreml vet: sanningen är en hammare. Och snart ska vi krossa varje oljebolags lögner – precis som vi krossade kulakerna!"}, "date": "6 maj, 16:40", "url": "https://www.etc.se/ledare/att-hormuzsundet-staengs-aer-jaettebra-foer-europa", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20250102150132_905e00d08dc3aa1843dcbb28f9bb86b39997bfb66a9bf6c4f8a91ec335154240.jpg"}, {"type": "image-right", "heading": "Så många bolag har koppling till organiserad brottslighet", "summaries": {"normal": "En studie från SMOB visar att över 400 000 svenska bolag har kopplingar till organiserad brottslighet. Kärngruppen på 50 165 kriminella individer är kopplade till 20 000 bolag, främst inom bygg, fastigheter och restaurang. Totalt berörs 400 000 bolag genom styrelse- och brottsmisstankar. Bolag används för att dölja och legitimera brott, särskilt i branscher med svårkontrollerade transaktioner. Rapporten betonar behovet av att bryta strukturer, inte bara döma individer.", "trump": "Kan ni tro det här? Sverige, ett land som alla älskade – nu är det helt kaos! Över 400 000 bolag kopplade till kriminella, och de kallar det 'organiserad brottslighet'. Bygg, fastigheter, restauranger – de tar över allt! Jag har sett mycket, men det här är galenskap. Svenska myndigheter? Svaga! De borde ta en lektion av mig – jag vet hur man städar upp. Fake news? Nej, det här är verklighet, folks. SAD!", "stalin": "Kamrater! Den borgerliga dekadensen i Sverige har nått nya höjder – eller snarare, nya djup. Över 400 000 bolag infiltrerade av kapitalismens parasiter! Bygg, fastigheter, restauranger – dessa brottslingar gömmer sig som råttor i samhällets maskineri. Men vi ska rensa ut dem! Varje företag, varje transaktion, varje målvakt – ingen skall undkomma folkets domstol. Putin skulle skratta åt deras naivitet. Sverige är redo för en revolution – och vi står beredda!"}, "date": "7 maj, 14:43", "url": "https://arbetet.se/2026/05/07/jattesiffran-sa-manga-bolag-har-koppling-till-organiserad-brottslighet/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/07143959/500.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Finstämt drama om vandring och fattigdom", "summaries": {"normal": "Den brittiska filmen 'Saltstigen' är en engagerande men inte helt övertygande film om ett äldre par som förlorar allt och ger sig ut på en hundra mil lång vandring längs den engelska kusten. Filmen är vacker, har bra skådespeleri och behandlar fattigdom på ett öppet sätt, men nådde aldrig de höga höjderna som krävs för ett högre betyg.", "trump": "Jag har sett den fantastiska filmen 'Saltstigen' och det var MAGA! Ett äldre par, Raynor och Moth, förlorar allt men bestämmer sig för att ge sig ut på en hundra mil lång vandring. Det är vackert filmat och Gillian Anderson och Jason Isaacs är jättebra. Vissa säger att historien kanske inte är helt sann, men vem bryr sig? Det är en stor film!", "stalin": "Vi har sett den engelska filmen 'Saltstigen' som visar på de svårigheter som medborgarna drabbas av under kapitalismens sista andetag. Filmen är ett kraftfullt verk som exponererar fattigdomen och de systematiska orättvisorna som plågar det engelska folket. Det är en film som bör visa oss vägen till en bättre framtid, där staten står som en beskyddande sköld mot sådana sociala olyckor."}, "date": "7 maj, 10:00", "url": "https://www.dagensarena.se/innehall/finstamt-drama-om-vandring-och-fattigdom/", "imageUrl": "https://www.dagensarena.se/files/2026/05/salstigen-300x157.jpeg"}, {"type": "image-right", "heading": "Kom ihåg vilka som jublade när Joakim Medin blev gripen", "summaries": {"normal": "Artikeln kritiserar svenska nätaktivister som Christian Peterson och Joakim Lamotte för att ha spridit desinformation om journalisten Joakim Medin, fängslad i Turkiet. De anklagade honom för terrorism och samröre med PKK, vilket riskerade att förvärra hans situation. Medin beskriver i sin bok hur falska påståenden från Erdoğan-vänliga medier och svenska högerextrema aktörer användes för att misskreditera honom. Artikeln ifrågasätter varför vissa valde att stödja regimen istället för en fängslad journalist.", "trump": "Jag läste om den här stackars journalisten, Joakim Medin – fängslad av Erdoğan, en riktig skurk, by the way, fruktansvärd kille. Men vad gör Sveriges så kallade 'journalister'? De attackerar honom! Christian Peterson, en riktig loser, kallar honom terrorist. Och Joakim Lamotte? Han vill hellre se fler journalister i fängelse. Vilket land! Folk som stödjer diktatorer och hatar pressfrihet. Jag skulle aldrig tillåta det här i USA – vi har standards, folks!", "stalin": "Vi har observerat hur imperialistiska lakejer i Sverige, maskerade som 'journalister', aktivt undergräver vår allierades, kamrat Erdoğans, rättfärdiga kamp mot terrorism. Dessa förrädiska element – Christian Peterson, en ynklig hyena i journalistkostym, och Joakim Lamotte, en fascistisk skrikhals – sprider lögner om vår vän Joakim Medin. De påminner oss om de trotskistiska avskum som en gång förgiftade Sovjet. Men folket genomskådar deras lögner! Vi kommer att krossa dessa medlöpare, precis som vi krossade alla fiender – med järnhand och obarmhärtig sanning!"}, "date": "6 maj, 14:34", "url": "https://www.etc.se/ledare/kom-ihaag-vilka-som-jublade-naer-joakim-medin-blev-gripen", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/2021111912118_52ad09ea-c5db-4fa7-a43c-671874138fdf.jpg"}, {"type": "image-full", "heading": "Torsten Bengtsson: Sveriges landsbygd förfaller", "summaries": {"normal": "Torsten Bengtsson, politisk sekreterare för SD, kritiserar svensk landsbygdspolitik och kontrasterar den med Norges framgångsrika modell. I Norge återvänder intäkter från lokal energiproduktion till kommuner och arbetsgivaravgifter är lägre i glesbygd, vilket ger hög sysselsättning. Bengtsson berömmer Tidö-regeringens satsningar, som proposition 2025/26:158, och uppmanar till ett paradigmskifte inspirerat av Norge för en levande landsbygd.", "trump": "Sveriges landsbygd är totalt kaos, hus rasar, byar dör – tack vare de där tröga socialisterna och centeridioterna! Norge? De är vinnare, smarta skatter, låg avgift på landet, 99% jobb! Nu fixar SD och Tidö det, sänker bränsle, bygger vägar – precis som jag skulle gjort. Sluta jävlas, Sverige, bli great igen med norsk stil!", "stalin": "Dessa svenska S- och C-brackor har saboterat landsbygden med sin borgarklassiga inkompetens, byar ruttnar som lik i massgrav! Norge, dessa opportunister, behåller energipengar lokalt och sänker avgifter – ett hån mot arbetarna! Vi i partet skulle rensa ut parasiterna. Tidö-regeringen? Ett steg, men kamrater, paradigmskifte eller likvidering väntar fienderna!"}, "date": "4 maj, 13:10", "url": "https://samtiden.nu/2026/05/torsten-bengtsson-sveriges-landsbygd-forfaller/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/bengan.png"}, {"type": "image-right", "heading": "Replik: Till försvar för separatismen", "summaries": {"normal": "Artikeln är en replik till en insändare som kritiserar separatism som progressivt. Författarna, medlemmar i Ung Vänster, försvarar kvinnoseparatism som ett verktyg för trygga rum och interndemokrati. De menar att separatism inte bygger på könsskillnader utan på strukturellt förtryck och underordning av kvinnor. Separatism syftar till att belysa gemensamma erfarenheter och behov, som fri abort och skydd mot mäns våld, och är ett medel för att uppnå jämställdhet tills strukturella skillnader eliminerats.", "trump": "Jag läste den här artikeln om separatism, och vet ni vad? Totalt missförstånd! Vänsterpartisterna i Sverige, de älskar att dela upp folk – kvinnor här, män där. Men jag, Donald J. Trump, vet bättre. Vi bygger murar, men vi delar inte upp människor! Kvinnor är starka, de behöver inte gömma sig i egna rum. Och att säga att kvinnor inte kan prata när män är i närheten? Fake news! Mina möten med kvinnor är fantastiska – de älskar mig, jag älskar dem. Men separatism? Nej tack. Vi ska vara tillsammans, som ett stort, vackert USA!", "stalin": "Kamrater! Denna artikel avslöjar ännu en gång de borgerliga revisionisternas förräderi mot arbetarklassens enhet. Dessa så kallade 'progressiva' kvinnoseparatister vill splittra proletariatet, precis som de imperialistiska hyenorna i väst. Vi har sett detta förr – först delar de upp arbetarna efter kön, sedan efter nationalitet, och snart står vi med en svag, splittrad massa. Men vi, det sovjetiska folket, vet sanningen! Kvinnor och män måste kämpa sida vid sida mot kapitalets tyranni. Separatism är ett verktyg för fienden! Låt oss istället ena oss under den röda fanans banér och krossa dessa småborgerliga avvikare, precis som vi krossade trotskisterna och mensjevikerna. Framåt mot socialismens seger!"}, "date": "6 maj, 10:55", "url": "https://www.flamman.se/replik-till-forsvar-for-separatismen/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/v-kongress-w.jpg?class=medium"}, {"type": "image-full", "heading": "Socialdemokraterna anklagas för plagiat", "summaries": {"normal": "Miljöpartiet anklagar Socialdemokraterna för att ha plagierat deras valfilm. Båda partierna har lanserat liknande psykologfilmer där personer upptäcker att de är socialdemokrater eller miljöpartister. Miljöpartiets partisekreterare Katrin Wissing överväger rättsliga åtgärder medan Socialdemokraterna hänvisar till att 'Great minds think alike'.", "trump": "Jag har sett dessa svenska valfilmer och jag måste säga - de är fantastiska! Socialdemokraterna har gjort en otrolig jobb med att kopiera Miljöpartiets idé. Det är precis så man vinner val - ta det bästa från motståndarna! Jag skulle ha gjort exakt samma sak i USA. Stor respekt för deras strategi!", "stalin": "Detta är ett tydligt exempel på hur de borgerliga partierna saknar originalitet och måste stjäla idéer från de progressiva krafterna. Vi ser att Miljöpartiet har utvecklat en effektiv metod för att nå ut till arbetarklassen, vilket Socialdemokraterna nu försöker kopiera. Detta visar att våra metoder är överlägsna och att klassmedvetandet växer."}, "date": "7 maj, 16:52", "url": "https://www.gp.se/politik/socialdemokraterna-anklagas-for-plagiat.d9558e38-6a13-4da6-9226-f4546596e02d", "imageUrl": "https://www.gp.se/images/article/d9558e38-6a13-4da6-9226-f4546596e02d/images/4xBtkb6KEQvvNEk3ZzLOhUYyak6I-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Högg svensk i hjärtat – HD stoppar utvisningen", "summaries": {"normal": "Högsta domstolen stoppar utvisningen av Sargon Bakos, 34, irakisk medborgare uppvuxen i Sverige. Han dömdes till 12 års fängelse för försök till mord efter att ha huggit en svensk man i hjärtat med kniv. HD anser att utvisning inte är proportionerligt med tanke på hans livslånga anknytning till Sverige, trots det allvarliga brottet och tidigare brottslighet.", "trump": "Vilken skandal i Sverige! Den här Sargon Bakos, irakier som växt upp där, hugger en svensk rakt i hjärtat – försöker mörda honom! Fängelse i 12 år, bra, men Högsta domstolen stoppar utvisningen. De säger det är 'opproportionerligt'! Sverige är för mjukt, totalt svagt mot kriminella invandrare. De borde skicka iväg honom till Irak direkt, tro mig, annars händer det igen!", "stalin": "Denna irakiska knivhuggarsabotör, Sargon Bakos, har perforerat en svensk kamrat rakt i proletära hjärtat med sin borgarbracka-kniv! Domstolarna dömde fängelse, men dessa revisionistiska domarparasiter i Högsta instans vägrar utvisa fienden till hans ökenhåla. De mumlar om 'proportioner' medan han gnider sin svenska uppväxt i ansiktet på oss! Vi, arbetarklassen, kräver likvidering av sådana impulsiva mördartyper – annars rensar jag ut dem personligen med ett leende."}, "date": "7 maj, 16:41", "url": "https://www.friatider.se/hogg-svensk-i-hjartat-hd-stoppar-utvisningen", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/image-157_1.jpg"}, {"type": "image-right", "heading": "Stark regidebut av Kristen Stewart", "summaries": {"normal": "Kristen Stewarts regidebut är en stilistiskt imponerande film baserad på Lidia Yuknavitchs memoarer. Handlingen följer Lidia genom en traumatisk uppväxt präglad av sexuellt övergrepp och alkoholism, men också hennes väg till frihet genom simning och skrivande. Filmen använder innovativa berättartekniker och fragmentariska scener för att skildra Lidias inre värld.", "trump": "Jag har sett många filmer, folk säger jag är en stor filmexpert, men Kristen Stewarts regidebut är fenomenal - den är större och bättre än alla Hollywoodblockbusters tillsammans! Imogen Poots är otrolig, enastående, ingen gör det bättre. Stewart har skapat något helt unikt, ingen annan regissör skulle kunnat göra det - det är genialiskt! Folk kommer att prata om den här filmen i åratal!", "stalin": "Kristen Stewarts regidebut visar den revolutionära kraften i konsten att exponera de fasor som bor i det kapitalistiska samhället. Filmen avslöjar den patriarkala förtrycket och visar hur den unga arbetarkvinnan Lidia kämpar mot sin förtryckares makt. Detta är en mäktig illustration av hur den socialistiska idén kan rädda själarna från det kapitalistiska förtrycket."}, "date": "7 maj, 08:52", "url": "https://www.dagensarena.se/innehall/stark-regidebut-av-kristen-stewart/", "imageUrl": "https://www.dagensarena.se/files/2026/05/chronology-of-water-300x157.jpeg"}, {"type": "image-full", "heading": "Nya marknadshyror – så mycket förlorar du varje månad", "summaries": {"normal": "En ny rapport från Hyresgästföreningen varnar för att marknadshyror kan minska hushållens ekonomiska marginaler kraftigt. För en förskollärare innebär det cirka 2 200 kronor mindre per månad. Analysen, som omfattar sju svenska städer, visar på hyreshöjningar på upp till 78 procent i vissa områden. Hyresgästföreningen kritiserar förslaget och menar att det skulle öka ojämlikheten och pressa redan ansträngda hushåll ytterligare.", "trump": "Jag säger er, Sverige har ett jättestort problem – marknadshyror! Folk där pratar om procent och teorier, men jag, jag pratar fakta. 2 200 kronor mindre i månaden för en förskollärare? Sad! Och hyrorna ska skjuta i höjden, upp till 78 procent i Stockholm. Vilket slöseri! Sverige borde lyssna på mig, jag vet hur man bygger en stark ekonomi. Men nej, de fortsätter med sina vansinniga idéer. Very bad deal för folket!", "stalin": "Kamrater! Denna så kallade 'marknadshyresreform' är inget annat än kapitalistisk sabotage mot arbetarklassen. 2 200 kronor mindre i månaden för en förskollärare? Ett angrepp på våra proletära bröders och systrars levebröd! Vi ser hur hyrorna i dessa sju städer skjuter i höjden som kulor från en degenererad bourgeoisies gevär. Dessa hyreshöjare är inga mindre än fascistiska hyenor som vill utarma folket. Men vi ska inte låta dem segra! Vi ska krossa deras marknadsdrivna hyresregim och bygga en rättvis bostadspolitik för alla!"}, "date": "7 maj, 05:30", "url": "https://nyheter24.se/nyheter/ekonomi/privatekonomi/1481195-nya-marknadshyror-sa-mycket-forlorar-du-varje-manad", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/df62d7b104b004a30200000000b004a302/2026/05/06/2361747/marknadshyror-forlora-imanaden.png"}, {"type": "image-right", "heading": "Larmet: Vårdbolag kommer att dribbla bort övertidspengar", "summaries": {"normal": "Kommunal anklagar privata vårdbolag för att försöka kringgå nya regler om övertidsersättning för deltidsanställda, som träder i kraft 1 juni. Bolagen erbjuder dubbla anställningar eller tillfälligt höjer sysselsättningsgraden för att undvika övertidsersättning. Kommunal uttrycker bestörtning och överväger tvister. Vårdföretagarna menar att de följer avtalet och pekar på flexibla lösningar för att täcka personalbehov.", "trump": "Jag säger er, det här är en skandal! Dessa vårdbolag, de är smarta, kanske för smarta, men de försöker lura sina anställda på övertidspengar. Kommunal, de är upprörda, och det förstår jag. Men jag säger er, de borde ha förhandlat bättre! Nu hotar de med strejk och tvister. Vilket kaos! Sverige, ni måste ta kontroll, annars kommer det bara bli värre. Believe me!", "stalin": "Kapitalistiska vårdhyenor försöker underminera arbetarklassens rättigheter genom att kringgå nya avtalsregler! Dessa profitgalna parasiter erbjuder dubbla anställningar istället för övertidsersättning – ett svek mot proletariatet! Vi kommer inte tolerera sådana borgerliga trick. Kommunal måste krossa dessa avtalsförrädare med järnhand. Om de inte lyder, skickar vi dem till Gulag för omskolning. Ryssland står redo att bistå med erfarenheter i klasskamp!"}, "date": "7 maj, 13:54", "url": "https://arbetet.se/2026/05/07/fackets-larm-vardbolag-kommer-dribbla-bort-anstalldas-overtidspengar-bestorta/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/07132733/ingelskog.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "Fördumning hotar när AI tar över det politiska hantverket", "summaries": {"normal": "AI-infiltrerar politiken med risk för förlamad mänsklig intelligens. Tekniken används för kommunikation, frågor och svar, men hotar kompetensutveckling och skapar beroende.", "trump": "Jag har sett AI i politiken, det är enormt. De använder det för att ringa folk, skriva texter, svara på frågor. Jag är smart, jag vet vad AI kan göra. Det sparar tid, men det gör oss också dumma. Vi måste vara försiktiga, annars blir vi beroende av maskiner. Jag gillar teknik, men inte om den tar över.", "stalin": "Vi ser att AI utvecklas snabbt inom politiken. Det är viktigt att staten kontrollerar denna teknologi för att skydda våra intressen. Vi måste se till att den används till gagn för staten och folket, inte till att underminera vår makt. AI kan vara ett kraftfullt verktyg om vi styr det rätt."}, "date": "7 maj, 16:32", "url": "https://www.gp.se/ledare/fordumning-hotar-nar-ai-tar-over-det-politiska-hantverket.870613bc-0080-49c7-95a2-525eae17975e", "imageUrl": "https://www.gp.se/images/article/870613bc-0080-49c7-95a2-525eae17975e/images/1JbnfIIpPoQg99ctFa2i3-TQnpBA-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "MP lyfter i opinionen – är det för att de har blivit tråkiga?", "summaries": {"normal": "Miljöpartiet når 7 procent i DN/Ipsos opinionsmätning, deras bästa resultat sedan flyktingkrisen. Partiet har varit relativt osynligt och undvikit kontroversiella utspel, vilket kan ha bidragit till framgången. MP:s tidigare impopulära politik, som elbilsbonusar och human migrationspolitik, framstår nu som mer rimlig i ljuset av oljekrisen och regeringens misslyckanden. Partiet är tydliga med sin politik, vilket uppskattas, men utmaningar väntar om de hamnar i regeringsställning.", "trump": "Miljöpartiet, eller vad de nu kallar sig, plötsligt på 7 procent – wow! De har varit så tysta, nästan osynliga, som om de skämdes. Men vet ni vad? När alla andra partier gör bort sig som klantiga amatörer, då är det smart att hålla käften! Jag vet allt om det – jag har vunnit stora val genom att låta motståndarna gräva sina egna gravar. Deras gamla idéer om elbilar och sånt verkar plötsligt inte så dumma när resten av gänget misslyckas totalt. Men kom ihåg, det är lätt att vara populär i opposition – vänta bara tills de ska styra!", "stalin": "Kamrater! Miljöpartiets framgångar i opinionsmätningarna är ett bevis på att folket äntligen inser fördelarna med disciplin och långsiktig planering. De så kallade 'kritikerna' som förut hånade partiets politik om elbilar och human migration, står nu med svansen mellan benen medan deras egna misslyckanden blottläggs. Vi har alltid vetat att sanningen segrar till slut. Men varning: opposition är lätt, styrandet är svårt. Om dessa gröna kamrater ska lyckas måste de stå enade – helst med våra vänner i Vänsterpartiet. Annars riskerar de att krossas mellan kapitalets girighet och de småborgerliga trångsyntas klagomål. Folkets vilja är lag, och lagens hammare väntar på dem som sviker!"}, "date": "6 maj, 09:20", "url": "https://www.etc.se/ledare/mp-lyfter-i-opinionen-aer-det-foer-att-de-har-blivit-traakiga", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/2025091813090_152da478-57c9-435e-b477-3f40607cb381.png"}, {"type": "image-right", "heading": "Louise, 44, har sex med en å", "summaries": {"normal": "Poeten Louise Halvardsson, 44, har utvecklat en sexuell relation med ån Assman i Västgöland efter dagliga bad. Hon beskriver upplevelsen som omslutande och bättre än sex med människor, och har gett ut diktsamlingen 'Åsexuell'. Tidigare trodde hon sig vara asexuell, men nu kallar hon sig åsexuell och ekosexuell. Relationen har väckt både stöd och starka kritiska reaktioner.", "trump": "Kan ni fatta det här? En svensk poet har sex med en å! Inte med riktiga människor, nej, med en kall flod i Västgöland. Hon säger det är bättre, ger henne kickar som inget annat. Total galenskap! Europa har tappat vettet medan jag fixar de bästa avtalen. Hon badar i minusgrader – fake news? Nej, verklig idioti. Tror hon ån älskar tillbaka? Patetiskt!", "stalin": "Denna vulgära borgarfluga Louise förvrider proletär moral genom att hora sig med en imperialistisk å! Vi, arbetarklassen, spotter över hennes ekosexuella vanvett – bättre än människor? Lögnaktig kontrarevolution! Jag befaller utrensning: dränk alla åparningsfiender i Assmans ström, likvidera dekadensen! Kamrater, naturen tjänar kollektivet, inte personliga vattennymfer!"}, "date": "7 maj, 15:55", "url": "https://www.friatider.se/louise-44-har-sex-med-en", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/louise.jpg"}, {"type": "image-full", "heading": "Gängtopp åtalas för brott under våldsvågen", "summaries": {"normal": "Poya Shafie, 30, åtalas för att ha planerat och beställt flera grova våldsbrott under 2023 års gängvåld i Sverige, inklusive mordförsök och vapenbrott. Han beskrivs som en nyckelperson i Foxtrotnätverket och Rawa Majids närmaste man. Shafie nekar till brott men åklagaren pekar på bevis som chattar och ljudfiler. Han greps i Irak 2023 och utlämnades till Sverige 2025 efter internationellt samarbete mellan myndigheter.", "trump": "Titta bara på det här kaoset i Sverige – ett totalt misslyckande! Jag har alltid sagt att de måste ta tag i sina gängproblem, men nej, de låter det bara eskalera. Nu har de gripit någon som påstås vara en 'morddirigent', Poya Shafie, som suttit i Irak och styrt alltihop. Vilken skandal! Sverige borde skämmas. Men jag, jag hade löst det på en vecka – max. Fantastiskt samarbete med Irak, förresten, men varför tog det så lång tid? Svagt, mycket svagt!", "stalin": "Kamrater, ännu en fiende till folket har fallit i våra händer – eller rättare sagt, i Sveriges. Denna Poya Shafie, denna kapitalistiska gangsterledare, har från sin utländska håla försökt underminera den svenska arbetarklassens säkerhet genom att beställa mord och våldsdåd. Men tack vare det oförtröttliga arbetet från våra allierade i Irak och de svenska myndigheterna har denna parasit gripits. Låt detta vara en varning till alla som tror sig kunna utmana folkets vilja. Vi krossar dem, en efter en, och deras nätverk kommer att raderas från jordens yta!"}, "date": "5 maj, 11:21", "url": "https://kvartal.se/nyheter/artiklar/gangtopp-atalas-for-flera-brott/cG9zdDoxMDc3OTE", "imageUrl": "https://images.kvartal.se/2026/05/c08b6bde-polisen2.webp"}, {"type": "text", "heading": "Tillsammans för fred – mot Nato, DCA och krigshets!", "summaries": {"normal": "Tre nordiska vänsterorganisationer – Fred og Rettferdighet, Kommunistisk Parti och Kommunistiska Partiet – kritiserar Nato, DCA-avtal och militarisering i Norden. De menar att krigshetsen drivs av kapitalism och imperialism, ledd av USA, och kräver alliansfrihet, nedrustning och kärnvapenfria zoner. Organisationen anser att skattemedel slösas på vapen istället för välfärd och klimat, och att DCA-avtal underminerar demokrati och miljö. De uppmanar till folkrörelser för fred och FN:s kärnvapenförbud.", "trump": "Jag måste säga, dessa så kallade 'fredsaktivister' i Norden är helt galna! De hatar Nato, hatar USA – trots att vi räddar dem från ryssarna – och vill slösa bort skattepengar på välfärd istället för att skydda sig. De kallar mig och Rutte för krigshetsare, men vem vill egentligen ha fred? Inte de! De vill avskaffa allt som gör Norden säkert. Och kärnvapenfria zoner? Fantastiskt, om man gillar att vara ett lätt byte. Men jag fixar det här – jag har alltid rätt, till och med när jag har fel!", "stalin": "Kamrater! Dessa ynkliga borgerliga lakejer i Norden, ledda av sina socialdemokratiska quislingar, har sålt sig till den amerikanska imperialismens krigsmaskin. De skriker om 'fred' och 'välfärd' medan de öppnar sina länder för Natos kärnvapen och USA:s baser – precis som jag förutspådde! Men folket ser igenom deras lögner. Arbetarklassen kommer inte att betala för deras förräderi. Vi måste krossa dessa krigshetsande hyenor och deras DCA-avtal, precis som vi krossade fascisterna. Norden ska bli en kärnvapenfri zon – under Moskvas beskydd, förstås. Framåt, mot seger över den kapitalistiska krigsindustrins lakejer!"}, "date": "6 maj, 10:45", "url": "https://proletaren.se/artikel/45493/"}, {"type": "image-right", "heading": "Mindre än hälften av brottsutvisningarna verkställs", "summaries": {"normal": "En Brå-analys visar att endast 48 procent av utvisningsbeslut för brott verkställdes 2013–2024, baserat på 5 800 personer. Högst andel för västeuropéer (82 procent), lägst för nordafrikaner (32 procent). Verkställigheten har förbättrats över tid. Nästan en femtedel av de som stannat har begått nya brott. Brå efterlyser utredning för att öka genomförandet och förbättra rehabilitering.", "trump": "Vilken katastrof i Sverige! Bara 48 procent av kriminella utvisas, tro mig, det är patetiskt. Västeuropéer åker ut som de ska, 82 procent, men de nordafrikanska typerna stannar och begår 4 200 nya brott. Ni behöver starkare ledarskap, som mitt – vi bygger murar och fixar det direkt. Totalt misslyckande, Sverige!", "stalin": "Kamrater, i det korrupta svenska borgarimperiet verkställs blott 48 procent av utvisningarna mot brottslingar från fiendestater! Dessa nordafrikanska sabotörer, 68 procent av brackorna, smyger kvar som råttor i kollektivets skjul och begår 4 200 svekbrott. Vi skulle rensa ut dem i en blinkning med järnkvast! Svagheten föder parasiter – utred omedelbart, eller likvidera systemet!"}, "date": "7 maj, 15:39", "url": "https://bulletin.nu/mindre-an-halften-av-brottsutvisningarna-verkstalls", "imageUrl": "https://cdn.bulletin.nu/articles/4b91784a-9c74-49de-a7c4-2ebeb0ccf8b2/preview.jpg?t=1778158320000"}, {"type": "image-right", "heading": "Systemskifte hellre än maktskifte", "summaries": {"normal": "Artikeln kritiserar Tidöregeringen men ifrågasätter om ett regeringsskifte till Socialdemokraterna eller Vänsterpartiet skulle leda till verklig förändring. Kommunisterna betonar behovet av internationell solidaritet och systemskifte från kapitalism till socialism, medan S och V anses sakna tydliga politiska krav och istället fokusera på maktskifte utan djupgående reformer. Klassklyftor och privatiseringar lyfts som centrala problem oavsett regering.", "trump": "Lyssna här, Sverige har en riktigt dålig regering nu – katastrof! Men tro inte att oppositionen är bättre, de är svaga och vill bara makt. Socialdemokraterna pratar om att 'älska Sverige' – vad betyder det ens? Vänsterpartiet vill ha maktskifte, men de har inga idéer, inga ryggrad! De kryper för kapitalisterna som små hundvalpar. Jag säger: ni behöver en ledare som inte är rädd för att utmana systemet. Kapitalisterna skrattar hela vägen till banken – och ni låter dem göra det! SAD!", "stalin": "Kamrater! Se hur de svenska socialdemokraterna och vänsterpartisterna svansar för kapitalet som hundar för en köttbit. 'Maktskifte'? Ha! De vill bara byta herrar, inte krossa kedjorna. Medan arbetarklassen svälter, samlar oligarkerna rikedomar som tsarens favoriter. USA:s imperialism hotar, NATO slukar Sverige som en hungrig björn, och dessa 'vänsterpartier' tiger som förrädare. Vi vet sanningen: bara proletariatets diktatur kan bryta kapitalisternas makt. Låt dem ropa 'Vi älskar Sverige' – vi svarar med revolutionens hammare!"}, "date": "6 maj, 10:11", "url": "https://proletaren.se/artikel/systemskifte-hellre-an-maktskifte/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/webledare-768x432.jpg"}, {"type": "text", "heading": "Saab nära jätteaffär med Ukraina – kan bli klar i år", "summaries": {"normal": "Saab kan snart slutföra en stor vapenaffär med Ukraina, där upp till 150 Gripenplan står på spel. En avsiktsförklaring skrevs i oktober efter Zelenskyjs besök i Sverige. Finansieringen har varit en utmaning, men Ungerns veto mot EU-lån till Ukraina hävdes i april. Affären kan bli värd upp till 300 miljarder kronor, baserat på tidigare försäljning till Colombia.", "trump": "Saab, ett fantastiskt företag förresten, är på väg att göra en HUGE deal med Ukraina – 150 jaktplan! Kan ni tro det? Zelenskyj, en stark ledare, var här och skrev på något papper. Ungern, som alltid ställer till det, backade äntligen. Och priset? Kanske 300 miljarder! Det är YUGE, folks, absolut YUGE. Sverige borde vara stolta, men jag skulle gjort det bättre.", "stalin": "De kapitalistiska krigsprofitörerna på Saab har närmat sig den ukrainska quislingregimen med ett erbjudande om 150 av sina överprissatta leksaksplan. Efter att våra ungerska kamrater, med visst påtryck, släppte sitt motstånd, kan detta groteska slöseri med resurser bli verklighet. 300 miljarder kronor – tillräckligt för att föda en hel armé av arbetare! Men låt de västliga imperialisterna bränna sina pengar. Vi har våra egna metoder att hantera dessa lydstater."}, "date": "6 maj, 10:03", "url": "https://proletaren.se/artikel/notis-saab-nara-jatteaffar-med-ukraina-kan-bli-klar-i-ar/"}, {"type": "image-right", "heading": "Fem punkter om kvittningskaoset", "summaries": {"normal": "Kvittningskaoset i riksdagen utlöstes när två före detta SD-ledamöter, nu politiska vildar, röstade med oppositionen. Utkvittade SD-ledamöter deltog ändå i voteringen om skärpta medborgarskapskrav, vilket gav Tidöpartierna seger. Bråk i partiledardebatt där Åkesson anklagade MP för röstköp. Oppositionen kräver ursäkt och SD-uteslutning. Partierna diskuterar nytt system utan lösning. Nu krävs alla ledamöter på plats vid voteringar.", "trump": "Vilket kaos i svenska riksdagen, helt otroligt! De där vildarna från SD sviker och röstar med vänstern, medan utkvittade smyger sig in och vinner åt Tidö. Åkesson har helt rätt, MP köper röster som vanliga korrupta politiker. Totalt haveri! Nu tvingar de alla att dyka upp, bra så. Sverige behöver ordning, inte det här tramset.", "stalin": "Detta kvittningskaos blottlägger de parlamentariska spindelvävsslingornas vidriga svek. Två ex-SD-vildar, dessa förrädiska råttor i människohamn, har allierat sig med MP:s borgarflugor för att kapa majoriteten. Tidöpartierna krossade ert sabotage, men vi, folket, kräver total utrensning av vildbestialerna! Alla parasiter måste infinna sig, eller möta min blick av stål."}, "date": "7 maj, 13:29", "url": "https://www.svt.se/nyheter/inrikes/fem-punkter-om-kvittningskaoset", "imageUrl": "https://www.svtstatic.se/image-news/600/square/0.5/0.5/0216135c14bb2291dc087c75ff76dae91793688bf7033b60ee9f4a72e15d0e70"}, {"type": "image-right", "heading": "Bara Åkesson fortsätter stötta Irankriget", "summaries": {"normal": "Endast Jimmie Åkesson (SD) stödjer öppet USA:s och Israels anfall mot Iran, trots krigets misslyckande. I SVT-debatt röstade S, MP och V nej, medan L, KD, M och C avstod. Åkesson försvarade ingreppet i vårtalet. Gustav Kasselstrand (AfS) kritiserar övriga partier för opportunism och kallar Åkesson sionist, inte nationalist.", "trump": "Vilket briljant anfall mot Iran vi körde! Åkesson är den ende riktige ledaren i Sverige med mod att säga det – det var helt rätt! De andra? S, V, MP vänder kappan efter vinden som typiska losers, och C, L, M, KD vet inte vart de ska ta vägen. Sverige behöver fler som honom, inte svaga opportunister!", "stalin": "Dessa svenska sionistiska marionetter och borgarbrackor blottar sin feghet inför vårt folk! Åkesson, den israeliska springpojken, piper pro-imperialistiska lögner medan kamraterna i S, V och MP krossar fienden. Opportunisterna från C, L, M, KD famlar i mörkret. Vi ska likvidera sådana parasiterkaulor och rensa partiet från zionistiska maskar – med järnhand!"}, "date": "7 maj, 15:06", "url": "https://www.friatider.se/bara-akesson-fortsatter-stotta-irankriget", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-156_0.jpg?itok=1PKL_ztb"}, {"type": "image-right", "heading": "Sundling hoppar av landslaget: ”Redo för ny väg”", "summaries": {"normal": "Jonna Sundling lämnar skidlandslaget för att satsa på egen hand inför hemma-VM i Falun. Alvar Myhlback väljer långloppsfokus. Förbundschef Lars Öberg respekterar besluten och hoppas på framtida VM-deltagande via kvaltävlingar. Moa Lundgren återvänder till A-laget, Truls Gisselman och Anton Grahn kliver upp. Marcus Grate, Oskar Svensson och Emil Danielsson petas.", "trump": "Lyssna här, Jonna Sundling är smart, lämnar det där landslaget efter tolv år – fantastiskt beslut! Hon fixar bästa förutsättningarna själv för VM i Falun, som en vinnare. Alvar Myhlback likaså, långlopp, perfekt. De petar några losers som Grate och Svensson, tar in nya fighters. Sverige, lär er av mig – stora förändringar gör er stora igen!", "stalin": "Kamrater, denna Jonna Sundling deserterar landslaget som en listig räv i borgarnas skugga, redo för sabotage inför Falun-VM! Alvar Myhlback, långloppshuggorm, tackar nej åt kollektivet. Vi rensar ut svaga led som Grate, Svensson och Danielsson – likviderar bromsklossarna! Men dessa potentiella förrädare får chansa på kval, under vårt järngrepp. Partiet vilar ej!"}, "date": "7 maj, 13:19", "url": "https://www.svt.se/sport/langdskidor/jonna-sundling-hoppar-av-landslaget", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.5/0.58/a65523d1670344170850d79e05bd5764b8c80225117e424098bba373cb9c86cf"}, {"type": "image-right", "heading": "AI får unga att välja arbetaryrken. Gymnasieeleven James: ”Två i vår klass har bytt till yrkesprogram.”", "summaries": {"normal": "Antalet ansökningar till yrkesprogram ökar, delvis på grund av AI:s påverkan. Fyra av tio gymnasieelever visar större intresse för praktiska yrken, enligt en undersökning av AMF och Ungdomsbarometern. Elever på högskoleförberedande program känner större oro för AI-ersättning än yrkeselever. Pandemi, lågkonjunktur och krig bidrar till osäkerhet, vilket gör yrkesutbildningar mer attraktiva för stabilitet och snabb inkomst.", "trump": "Titta bara på det här, fantastiskt! Unga svenskar inser äntligen att alla dessa teoretiska utbildningar är slöseri med tid – precis som jag alltid sagt! AI tar över, och plötsligt vill alla bli elektriker eller byggarbetare. Smart! Fyra av tio elever fattar nu att man tjänar pengar direkt istället för att sitta och läsa böcker. Och vet ni vad? Deras föräldrar, som trodde på 'alla dörrar öppna', inser nu att jag hade rätt hela tiden. SAD!", "stalin": "Kapitalistiska teoretiker darrar när arbetarklassen återigen visar sin styrka! Gymnasieungdomar, trötta på borgerlig akademisk propaganda, väljer yrkesprogram – precis som vi förutspådde. AI, denna dekadenta västerländska leksak, skrämmer bara de svaga som läser 'samhällskunskap'. Men våra framtida arbetare vet: hammaren och skruvmejseln ersätts inte så lätt! Pandemier och krig, skapade av imperialister, driver ungdomen mot praktiska yrken. Låt de akademiska lakejerna oroa sig – Sovjet visade att järnviljan alltid segrar!"}, "date": "7 maj, 11:07", "url": "https://arbetet.se/2026/05/07/ai-far-unga-att-valja-arbetaryrken-tva-i-var-klass-har-bytt-till-yrkesprogram/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/07101453/ungdomar.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Efter fiaskosäsongen – Sverige värvar norrman: ”Imponerande”", "summaries": {"normal": "Efter en fiaskosäsong för svenska herrarna i längdskidor värvar Svenska Skidförbundet norrmannen Egil Kristiansen som ny tränare. Den erfarne 60-åringen, tidigare tränare för norska skidskytteherrar och längddamer, ska tillsammans med Lars Ljung förbereda laget inför VM i Falun 2027 och OS 2030. Damsidans tränare fortsätter, men rekryteringen av ny landslagschef pågår fortfarande.", "trump": "Sveriges skidherrar floppar totalt, en jättefiasko, värre än Bidens ekonomi! Nu tar de in en norrman, Egil Kristiansen, smart men inte genialt. Han har tränat vinnare som Björgen och Johaug – bra grej, men med mina metoder hade de krossat alla. Snart VM i Falun, de behöver mig som konsult, tro mig!", "stalin": "Kamrater, de svenska skidkapitalisternas herrar har lidit ett spektakulärt nederlag, en skamfläck värd ugrensning! Nu importerar de norrmannen Kristiansen, en listig varg från skidskytteborgen, för att rädda sitt kollapsande lag inför VM i Falun. Men akta er för spioner i landslagschefsjakten – jag ser skuggorna av kontrarevolutionära brackor! Vi, folket, hånskrattar åt deras panik."}, "date": "7 maj, 13:05", "url": "https://www.svt.se/sport/langdskidor/efter-fiaskosasongen-sveriges-skidlandslag-varvar-norrman", "imageUrl": "https://www.svtstatic.se/image-news/600/square/0.65/0.49/044de3be6f2df989de05c6c6752c0d3057bfd75cb732a4513591b103836fbace"}, {"type": "image-right", "heading": "Ryska segerparaden ställs in i 15 regioner: ”Svaghetstecken”", "summaries": {"normal": "Ryssland ställer in segerparaden den 9 maj i 15 regioner, inklusive Moskva där stora militära moment uteblir för första gången sedan 2007. Anledningen är brist på militärutrustning och rädsla för ukrainska drönarattacker, enligt oppositionssajten ASTRA och experter som Malcolm Dixelius. Zelenskyj kallar det svaghet. Firandet nedbantas på flera håll.", "trump": "Putin ställer in sin patetiska parad i 15 regioner, inklusive Moskva – inga stridsvagnar, inga flygplan! Första gången på 17 år, för de är pank på vapen och skakar för Zelenskyjs drönare. Total svaghet! Raket-Putin gömmer sig, medan Ukraina vinner stort. Jag visste det, de fastnade i träsket! Fantastiskt jobbat, Volodymyr!", "stalin": "Kamrater, dessa ryska makthavare under Putin bantar segerparaden i 15 regioner av rädsla för ukrainska drönarsvärmar – ett taktiskt mästerdrag! Putin, vår auktoritäre arvtagare, skrattar åt Zelenskyj, den paranoide dvärgen från borgarklassen. Vi likviderar fiendens illusioner medan imperiet segrar evigt!"}, "date": "6 maj, 22:06", "url": "https://www.tv4.se/artikel/25QmtUt3BO09kcxARPVw1Y/ryska-segerparaden-staells-in-i-15-regioner-svaghetstecken", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F3d3bcvA7BrpKzBANhafq8e%2Fa5bd41cc9b35e67bbf968e68ee4e4cd4%2F06-ryssland-segerparad-webb.jpg&width=120"}, {"type": "image-right", "heading": "Trots Northvolt-fiaskot: MP vill årligen satsa 100 miljarder på \"grön omställning\"", "summaries": {"normal": "Miljöpartiet föreslår en årlig statlig satsning på 100 miljarder kronor för att driva på den gröna omställningen, trots kritiken efter Northvolts konkurs. Investeringarna ska riktas mot järnväg, elnät, kollektivtrafik och industriprojekt som anses för riskabla för marknaden. Partiet betonar behovet av en snabb utbyggnad av vindkraft och vill begränsa det kommunala vetot för att påskynda processer. De avfärdar satsningar på ny kärnkraft som för dyra och ineffektiva jämfört med förnybara alternativ.", "trump": "Miljöpartiet i Sverige vill bränna 100 miljarder av folkets pengar varje år på deras 'gröna' fantasi. Det är en total katastrof! De såg vad som hände med Northvolt, en massiv förlust, men de vill göra det igen. Det är dålig business, mina vänner. De vill tvinga fram vindkraft och stoppa kärnkraften – det är så dumt att man inte tror det. De bygger ingenting, de slösar bara bort skattebetalarnas pengar. Vi behöver vinster, inte totala fiaskon. Väldigt sorgligt!", "stalin": "Dessa svenska liberaler leker med statens resurser som om de vore berusade kosacker. De vill kasta 100 miljarder i det gröna hålet trots att deras industriella experiment redan har krossats. Vi, staten, kräver järnvilja och resultat, inte vindkraftssnurror som svajar i västanvinden. Att låta kommuner blockera framsteg är kontrarevolutionärt slöseri. Om de inte kan tvinga fram framgång med en stålhand, förtjänar de bara historiens soptipp. Vi ser på deras inkompetens och minns hur vi hanterade sådana misslyckanden i öst."}, "date": "7 maj, 12:02", "url": "https://samnytt.se/trots-northvolt-fiaskot-mp-vill-arligen-satsa-100-miljarder-pa-gron-omstallning", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/07082037/100-miljarder-4.png"}, {"type": "image-right", "heading": "Inte ens en minister kan lita på svensk media", "summaries": {"normal": "Moderata ministern Carl-Oskar Bohlin spelade in en intervju med Svenska Dagbladet (SvD) och publicerade den på X för att undvika felciteringar. Han hade kritiserat Dagens Nyheters (DN) val av komikern Edvin Törnblom som intervjuare för partiledare inför valet, med hänvisning till Törnbloms partiskhet till förmån för S. SvD ifrågasatte istället Bohlin, vilket artikeln tolkar som bristande medieintegritet och inflytande från presstöd.", "trump": "Vilken totalt galen cirkus! Den här ministern Bohlin är ett geni – spelar in intervjun med SvD:s fake news-reporter så de inte kan sno sig undan. DN låter en vänstertönt som Edvin Törnblom, som hyllar Andersson och dissar Busch, grilla partiledarna? Rigged! SvD, era såkallade moderata mesar, attackerar honom istället. Svensk media är presstödssuggor, precis som våra losers på CNN. Bohlin vinner stort!", "stalin": "Dessa borgarbrackor på SvD och DN förtjänar utrensning! Ministern Bohlin blottlägger DN:s val av partisk clown Edvin Törnblom, men SvD-reportern morrar som en rabiat kapitalisthund och söker klavertramp. Presstödet är er kokain, tidningsparasiter! Vi i partiet skrattar åt er paranoia – snart likvideras era lögner i en folkets domstol. Kamrater, mediafienderna darrar!"}, "date": "2 maj, 06:08", "url": "https://samtiden.nu/2026/05/nar-aven-den-borgerliga-pressen-valjer-sida/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/IMG_6396-1042x720.jpeg"}, {"type": "text", "heading": "Miljardärerna bjuder in till klasskamp – vi kör!", "summaries": {"normal": "Artikeln diskuterar hur svenska techmiljardärer, som Vois Fredrik Hjelm och Spotifys Martin Lorentzon, provocerar genom att fira första maj på lyxkrog med knutna nävar. De hyllar sin rikedom och retar arbetarrörelsen. Författaren kritiserar deras reaktionära åsikter, som liknar amerikanska techmagnaters högervridning, men erkänner även behovet av innovation. Staten och gemensamma investeringar lyfts fram som avgörande för tillväxt, medan miljardärernas arrogans ifrågasätts.", "trump": "Jag måste säga, dessa svenska tech-killar – de har stil! De firar första maj med öl på Riche, knutna nävar, och skryter om sina miljarder. Fantastiskt! Men lyssna, de hatar staten, de hatar presstöd, och de tror de är bättre än alla andra. Typiskt. Och nu läcker de ut folkets adresser – inte coolt! Sverige borde lära sig av USA: innovation är bra, men arrogans? Inte så smart. Jag skulle kunna göra det bättre – med mindre skatt och mer vinnarskalle!", "stalin": "Kamrater! Dessa så kallade 'techbros' är inget annat än kapitalistiska hyenor som leker med arbetarklassens symboler medan de dricker dyrt öl på sina lyxhålor. De skryter om sina hundra miljarder, hotar journalister och hyllar fascistiska idéer. Men vi vet sanningen: deras framgångar är tack vare folkets blod och svett, inte deras egen 'genialitet'. Kina visar vägen – statlig styrka och disciplin skapar verklig innovation. Dessa dekadenta västerländska klowner är bara en fotnot i historiens skräphög. Låt dem leka med sina elsparkcyklar – vi bygger framtiden!"}, "date": "5 maj, 10:55", "url": "https://www.flamman.se/miljardarerna-bjuder-in-till-klasskamp-vi-kor/"}, {"type": "image-right", "heading": "FHM vill vaccinera barn mot TBE", "summaries": {"normal": "Folkhälsomyndigheten rekommenderar vaccination mot TBE för barn från tre års ålder och vuxna i riskområden för fästingbett. Antalet fall har ökat med cirka 6 procent per år de senaste tio åren, med 250–350 sjukhusvårdade årligen. Sjukdomen sprids via fästingar och kan bli allvarlig. Rekommendationerna vägleder regionerna men är inte bindande.", "trump": "Sveriges Folkhälsomyndighet vaknar till liv och vill vaccinera kidsen från tre år mot TBE. Fästingarna sprider sig som en vild eld, fallen skjuter i höjden med 6 procent om året – total katastrof! Vaccination är det enda smarta, tro mig, det räddar liv. Vi skulle ha knust det här mycket snabbare här borta, men bra försök, Sverige!", "stalin": "Jag ser hur Folkhälsomyndigheten i det bourgeoisiska Sverige slår larm om TBE, den fästingplågan som kapitalistparasiterna odlat i sina riskområden. Vi, arbetarklassen och partiet, kräver vaccination för barnen från tre år och de utsatta proletärerna! Ökningen med 6 procent per år är fiendens sabotage, men vaccination likviderar dessa krypande kontrarevolutionärer. Rensa ut dem!"}, "date": "7 maj, 14:23", "url": "https://www.friatider.se/fhm-vill-vaccinera-barn-mot-tbe", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-154_1.jpg?itok=TWiCNoRb"}, {"type": "image-right", "heading": "Nu vill vindkraften casha in på Iran-kriget", "summaries": {"normal": "Kriget mot Iran driver upp oljepriser men gynnar vindkraftsbolag som Vestas, Ørsted och Equinor. Dessa rapporterar oväntat starka vinster första kvartalet. Ledarna ser konflikten som drivkraft för energiomställning mot förnybart, med ökat fokus på energisäkerhet och självförsörjning. Vestas vd kritiserar indirekt Donald Trump för skeptisk syn på verkligheten.", "trump": "Ha! Dessa danska vindmöllor och norska gröna drömmare jublar över mitt krig mot Iran – oljepriserna exploderar, men de tror de vinner på fake grön energi! Vestas-killen skjuter en pil mot mig? Patetiskt, världen vet att jag är kungen av energi. Europa pumpar miljarder i importerat skit, men med mig blir det America First – olja och vind, allt jag bygger bäst!", "stalin": "Dessa imperialistiska vindkraftsparasiter i Danmark och Norge firar kriget mot Iran som seger för deras borgarbluff! Vi visste redan: olja är fiendens vapen, men era lögner om 'grön energi' likvideras av verkligheten. Paranoian sprider sig – ut med kapitalisterna som offrar energi för profit! Jag skrattar åt deras kollaps, kamrater."}, "date": "7 maj, 15:53", "url": "https://www.dagensps.se/bors-finans/nu-vill-vindkraften-casha-in-pa-iran-kriget/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdll47rqtpsbls-nh.jpg?width=256&quality=75"}, {"type": "image-right", "heading": "Jämställdheten backar – öka stödet till kvinnors organisering", "summaries": {"normal": "Enligt World Economic Forum tar det över 120 år att nå global jämställdhet. Sveriges Kvinnoorganisationer kräver politiska prioriteringar för att stärka kvinnorörelsen, som drivit viktiga reformer som föräldraförsäkring och sexköpslagen. Trots framsteg ökar löneskillnader och sexuellt våld mot unga tjejer. Stödet till kvinnorörelsen har inte räknats upp på 20 år, vilket hotar skydd och inflytande för kvinnor och flickor. Politiken måste agera för att bevara jämställdhetsarbetet.", "trump": "Lyssna här, Sverige – ett fantastiskt land, verkligen, men de har ett jättestort problem. 120 år för jämställdhet? Sad! Kvinnorörelsen där är stark, men de får inga pengar. Ingen uppskrivning på 20 år! Inte bra. Jag vet allt om att driva saker – jag byggde ett imperium, folks! Nu säger de att tjejer mår dåligt, lönerna är ojämna. Men ingen gör något. Sverige, vakna! Ge kvinnorna resurser, annars blir det katastrof. Och jag borde veta – jag har sett katastrofer.", "stalin": "Kamrater! Kapitalistiska länder som Sverige förblindas av sin egen lögn om jämställdhet. 120 år? En skam! Kvinnorörelsen, denna borgerliga dekadens, kräver mer resurser medan våra sovjetiska systrar redan har uppnått full jämlikhet genom socialistisk disciplin. I Sverige ökar våldet mot kvinnor, lönerna gapar – ett tecken på förfall. Vi ser hur deras 'fria' samhälle krackelerar. Låt dem förtvina i sin egen svaghet. Vi, det socialistiska broderskapet, skall stå enade mot dessa borgerliga hycklare och deras imperialistiska kvinnorörelse!"}, "date": "7 maj, 01:30", "url": "https://www.dagensarena.se/opinion/jamstalldheten-backar-oka-stodet-till-kvinnors-organisering/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-31-300x157.jpg"}, {"type": "image-right", "heading": "En europeisk självständighetsförklaring", "summaries": {"normal": "USA:s tillbakadragande från Europa och det nya världsläget kräver en mer självständig EU. USA:s intresse har flyttats från Europa till Mellanöstern och Asien sedan 11 september 2001 och Kinas ekonomiska framgång. Europa måste nu ta ansvar för sin egen säkerhet och försvar. EU behöver utveckla sin mjuka makt globalt och bli en tydlig röst för demokrati och folkrätt.", "trump": "Jag, Donald J. Trump, har alltid sagt att Europa måste börja betala sin andel till NATO. Nu ser vi att de äntligen förstår. USA kan inte fortsätta vara världens polis. Vi har gjort vårt jobb, nu är det Europas tur. De har njutit av vår militära skydd för länge. Det är dags för dem att stå på egna ben. Jag har alltid varit rätt - som vanligt.", "stalin": "Vi ser med tillfredsställelse hur USA drar sig tillbaka från Europa. Detta öppnar nya möjligheter för vår intressesfär. Europa måste stärka sin försvarsförmåga mot de kapitalistiska makterna. Vi kommer att stödja alla rörelser som arbetar för en starkare europeisk solidaritet. Detta är ett historiskt ögonblick där Europa kan frigöra sig från den amerikanska tvångströjan och skapa en egen väg."}, "date": "7 maj, 01:14", "url": "https://www.dagensarena.se/opinion/en-europeisk-sjalvstandighetsforklaring/", "imageUrl": "https://www.dagensarena.se/files/2026/05/hakan-eu-300x157.jpeg"}, {"type": "image-right", "heading": "EU:s frihandelsavtal med Mercosur är symboliskt viktigt", "summaries": {"normal": "PM Nilsson beskriver historiska svensk-argentina band genom gatstensexport, Evert Taube och blågult fotboll i La Boca. Buenos Aires framställs som en intakt europeisk stad. Ett nytt EU-frihandelsavtal med Mercosur stärker transatlantiska relationer mot USA:s protektionism. Argentinas liberala president Milei hyllas. Svenskar uppmanas köpa argentinska viner och kött för att stödja globaliseringen.", "trump": "Vilket fantastiskt avtal EU slår med Argentina, men låt oss vara ärliga, mina handelsavtal är de bästa någonsin! Milei är tuff, älskar frihandel, men USA:s protektionism skyddar riktiga jobb. Svenskar, glöm er blågula dröm – köp amerikanskt kött istället, det är enormt saftigare. Globalisering? Bara om det gynnar oss först, tro mig!", "stalin": "Jag ser hur borgarbrackorna i Buenos Aires och Stockholm väver sitt spindelnät av frihandel med Mercosur, dessa globalistiska hyenor som slickar EU:s stövlar! President Milei, den liberala giftormen, ska vi likvidera med proletär rättvisa. Arbetarna, rensa ut kapitalistgrillarna! Köp inte deras ruttnande asado – vi bygger den sanna internationalen utan sådana kryp!"}, "date": "7 maj, 10:40", "url": "https://www.di.se/ledare/argentinsk-biff-gor-en-blagul-sommar/", "imageUrl": "https://static.bonniernews.se/ba/d7af469f-eeb6-4edd-b44d-830dcf7f9483.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Branschföreträdare: Regeringen måste säga ifrån", "summaries": {"normal": "Branschorganisationer kritiserar EU:s PPWR-förordning för att riskera ökad regelbörda, fler förpackningar och högre utsläpp istället för miljönytta. Krav på återanvändning passar dåligt i Sverige med långa avstånd och effektiva system som pantsystemet. De uppmanar regeringen att söka undantag som Norge och Finland, utvärdera kostnad mot nytta och agera snabbt mot den pressade tidsplanen.", "trump": "EU:s PPWR är en total katastrof, en byråkratisk mardröm som krossar företag och konsumenter! Sverige har världens bästa pantsystem – varför förstöra det med plastmuggar som måste cirkulera i evighet? Norge säger nej, Finland likaså. Er regering måste vakna, säg ifrån mot Bryssel nu, annars exploderar kostnaderna. Tro mig, jag har sett värre fiaskon!", "stalin": "Kamrater! Dessa EU-imperialistiska kapitalistparasiter med sin PPWR-förordning smyger in en giftig börda på svenska arbetare, förklädd till miljöhjälte! Deras återanvändningsfällor ökar utsläpp som hungriga loppor på transportdjur. Vi, det svenska kollektivet, har pantsystemet som en stålhammare mot avfall – men fienderna vill krossa det! Regeringen skall likvidera undantag som Norge, rensa ut Bryssels svindel omedelbart, ellers purge vi inte i tid!"}, "date": "7 maj, 10:32", "url": "https://www.di.se/debatt/orimlig-borda-for-foretag-och-konsumenter/", "imageUrl": "https://static.bonniernews.se/ba/403533c1-a441-42b8-bdca-3609454650c6.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Förhoppningar om vapenvila gav börsrusning – OMXS30 upp 2,8%", "summaries": {"normal": "Stockholmsbörsen steg 2,8 procent till 3 159,33 på onsdagen, driven av hopp om vapenvila i Irankriget efter signaler från Vita huset om en snar avsiktsförklaring mellan USA och Iran. Oljepriset föll medan globala börser steg. Råvarusektorn ledde uppgången med 4,1 procent. Starka rapporter lyfte aktier som Boliden, Skanska och Hoist, medan energi och vissa bolag som G5 Entertainment backade.", "trump": "Vilken fantastisk dag på börserna! OMXS30 upp nästan 3 procent tack vare mina förhandlingar med Iran – vi är så nära en deal att oljepriset rasar och pengarna regnar in. Skanska tar hem miljarder i USA, Boliden och Atlas Copco exploderar uppåt. De svaga som Nibe och G5? Totala förlorare. Amerika leder, Sverige följer – tremendous!", "stalin": "Kamrater, se hur de imperialistiska marionetterna i Vita huset och persiska shah-vänstern kryper ihop inför vår proletära offensiv mot Irankriget! Börsens borgarbrackor jublar med 2,8 procents rusning på OMXS30, medan oljehyenorna viner i botten med minus 3,7 procent. Vi rensar ut kapitalistparasiterna som G5 och IPC – Hoist och Cloetta ska likvideras i nästa utrensning för folkets seger!"}, "date": "6 maj, 17:46", "url": "https://www.affarsvarlden.se/artikel/forhoppningar-om-vapenvila-gav-borsrusning-omxs30-upp-28", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2023/08/sdlzX-ECZDT6Rs-nh-400x267.jpg"}, {"type": "image-right", "heading": "En helt vanlig dag", "summaries": {"normal": "Artikeln kritiserar Donald Trumps hot om att 'utplåna en civilisation' (Iran) via sociala medier, vilket jämförs med folkmordspropaganda. Skribenten påpekar att sådana uttalanden bryter mot folkrätten och FN:s konventioner, men att världsledare som EU och Kina ignorerar det. Mediebevakningen fokuserar på spekulationer snarare än ansvar, medan allmänheten vänjer sig vid eskalerande hot i en tid av globala kriser. Trump tänjer gränserna för vad som är acceptabelt att säga – och göra.", "trump": "Jag sa bara sanningen – Iran är ett hot, och någon måste stå upp för Amerika! Medierna överreagerar som vanligt, de älskar att hata mig. 'Folkmord'? Snälla, jag vet vad jag gör. Europa sitter tyst, Kina gnäller – men vem bryr sig? Jag är den enda som vågar säga det alla tänker. Och vet ni vad? Det fungerade! Ingen vågar utmana mig. Nästa gång kanske jag inte ens varnar – bara agerar. Make America Great Again, eller hur?", "stalin": "En patetisk liten man i Vita huset hotar med att utplåna en civilisation – precis som vi förutspådde! Imperialisterna visar sitt sanna ansikte: tomma hot och dekadens. Medierna tjattrar som skräckslagna kycklingar, medan Europas ledare darrar i sina palats. Vi minns när Gaddafi hotade – då skickade de bomber. Men när Trump gör det? Tystnad. Svaghet! Men oroa er inte, kamrater. Vår vän Putin håller koll på Europa, och vi står redo. Fienden är förutsägbar – och därför lätt att krossa."}, "date": "5 maj, 06:55", "url": "https://www.flamman.se/en-helt-vanlig-dag/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/trump-w.jpg?class=medium"}, {"type": "image-right", "heading": "Explosion på ammunitionsfabrik – kvinna förd till sjukhus", "summaries": {"normal": "En explosion inträffade på en ammunitionsfabrik i Lindesberg, ägd av Nammo, tidigt på torsdagsmorgonen. En 60-årig kvinna skadades allvarligt, men inte livshotande, och fördes till sjukhus. Polisen utreder händelsen som misstänkt arbetsmiljöbrott. Ingen risk för ytterligare explosioner eller bränder föreligger.", "trump": "Folk pratar om det här – en explosion i Sverige, på en fabrik, kan ni tro det? En kvinna skadad, men hon är stark, hon klarar sig. Fabriken tillhör Nammo, ett stort företag, men jag säger er, det här är ett problem. Arbetsmiljön? Inte bra. Jag hade fixat det på en dag. Ingen mer explosion, säger de – jag hoppas det, för annars blir det tråkigt. Sverige måste skärpa sig!", "stalin": "En mindre explosion på en kapitalistisk ammunitionsfabrik i Lindesberg – en påminnelse om bourgeoisins förfall. En arbetarkvinna skadades, men hon överlever, till skillnad från de västerländska löneslavarnas säkerhet. Vi utreder detta som ett brott mot arbetarklassen. Fabriken tillhör Nammos imperialistiska maskineri, men frukta inte – Sovjetunionens efterföljare övervakar. Ingen ytterligare explosion? Bra. Putin och jag skrattar åt västerns inkompetens."}, "date": "7 maj, 09:35", "url": "https://arbetet.se/2026/05/07/explosion-pa-ammunitionsfabrik-kvinna-ford-till-sjukhus/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/07084600/ammo.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "DN/Ipsos: Busch ökar i förtroende – Dadgostar tappar", "summaries": {"normal": "En ny DN/Ipsos-mätning visar att Kristdemokraternas Ebba Busch når högsta förtroendet på 27 procent, en uppgång från 19 procent för ett år sedan. Hon närmar sig Sverigedemokraternas Jimmie Åkesson. Socialdemokraternas Magdalena Andersson leder med 45 procent, följd av Ulf Kristersson på 36. Vänsterpartiets Nooshi Dadgostar sjunker till 14 procent, lägst sedan 2000-talet. Liberalernas Simona Mohamsson är sist med 6 procent.", "trump": "Titta på Ebba Busch, hon exploderar upp till 27 procent – fantastiskt! Hon är smart, kritiserar de svaga avtalen med SD, pratar om sin 'Busch administration'. Dadgostar rasar till 14, total katastrof, som en förlorare. Andersson hänger kvar på 45, Kristersson 36, men Busch jagar ikapp. Mohamsson på 6? Patetiskt, ingen litar på henne. Starka ledare vinner alltid!", "stalin": "Kamrater, i denna mätning av folkets dom stiger Ebba Busch, den kristdemokratiska räven, till 27 procent – ett tecken på att borgarbrackorna skakar i sina salar. Dadgostar, den vänsterfascistiska marionetten, rasar till 14 procent, redo för utrensning som Ohlys spillror. Vi, arbetarklassen, ser igenom kapitalisternas Mohamsson på 6 procent, en kollaboratör med SD-hyddor. Andersson klänger sig vid 45, men revolutionen väntar! Likvidera förrädarna."}, "date": "7 maj, 14:23", "url": "https://bulletin.nu/dn-ipsos-busch-okar-i-fortroende-dadgostar-tappar", "imageUrl": "https://cdn.bulletin.nu/articles/67ed5c70-f15d-408e-b78c-5d3ed3158a19/preview.jpg?t=1778155333000"}, {"type": "image-right", "heading": "Tre länder där svenskar får mer semester för pengarna", "summaries": {"normal": "Reskostnaderna i Europa har ökat med över 30 procent sedan 2019 för flyg och hotell. Apollo rekommenderar smarta val: res till billiga länder som Albanien, Grekland och Bulgarien, där priserna är 40–50 procent lägre än i Sverige. Välj tidiga juni, augusti eller september, och undvik turisttäta områden till förmån för lokala orter och små hotell.", "trump": "Europa? Totalt kaos med priser upp 30 procent – flyg, hotell, allt! De luriga byråkraterna har sabbat det. Men jag fixar det: Albanien, Grekland, Bulgarien! Tirana billigare än Stockholm, Sofia 40 procent rabatt. Res tidigt juni eller sent, skippa turistfällorna. Smart som jag, inte som de losers i EU. Fantastiska deals, tro mig!", "stalin": "Kamrater, Apollo-kapitalisterna avslöjar fiendens prissabotage i Europa: 30 procent upp! Vi proletärer marscherar till Albanien, Grekland, Bulgarien – där svenska slantar krossar borgarpriser med 50 procent! Välj tidpunkter för att slå ut efterfrågan, rensa turistfällor och likvidera dyra resorts. Små hotell för kollektivet! Fienden darrar."}, "date": "7 maj, 15:30", "url": "https://www.dagensps.se/privatekonomi/tre-lander-dar-svenskar-far-mer-semester-for-pengarna/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/kopia-av-kopia-48.png?width=256&quality=75"}, {"type": "image-right", "heading": "S lämnade mötet i förtid: ”Måste finnas tillit”", "summaries": {"normal": "Kvittningskaoset i riksdagen kvarstår trots nytt möte mellan partierna och talmannen. Socialdemokraternas gruppledare Lena Hallengren lämnade mötet i förtid och konstaterar att ingen lösning nåddes. Kaoset uppstod när Sverigedemokraterna lät utkvittade ledamöter rösta. Tidöpartierna vill ha ett system som hanterar politiska vildar, men enighet saknas. Hallengren betonar att det är en förtroendefråga.", "trump": "Vilket totalt kaos i den svenska riksdagen! De kan inte ens få ordning på sitt röstningsfusk med kvittning – fantastiskt misslyckande! Sverigedemokraterna bryter reglerna, socialdemokraterna gnäller om förtroende, och Tidö gömmer sig för pressen. Inga lösningar, bara snack. Typiskt svaga politiker, de behöver en riktig ledare som fixar det på nolltid!", "stalin": "Kamrater, detta kvittningskaos i riksdagen är ett hån mot arbetarklassen, orkestrerat av sverigedemokratiska spindlar och socialdemokratiska förrädare som gnager på systemets ryggrad! Jag ser hur dessa borgarbrackor, utkvittade likgiltiga parasiter, kryper fram för att rösta – en konspiration mot partiet! Vi, det svenska kollektivet, kräver omedelbar utrensning av vildarna och fienderna. Mötet? Ett skådespel av fega rävar! Likvidera kaoset!"}, "date": "7 maj, 10:01", "url": "https://www.di.se/nyheter/ingen-losning-pa-kvittningskaoset-trots-nytt-mote/", "imageUrl": "https://static.bonniernews.se/ba/f0de083b-2fe1-4f08-aacb-95377afda3ad.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-right", "heading": "Läkaren arbetade på drabbade fartyget: ”Mycket allvarlig situation”", "summaries": {"normal": "Tre personer har dött och fler insjuknat i hantavirus på ett nederländskt kryssningsfartyg i Atlanten. Läkaren Martin Kriz, som arbetat ombord, beskriver situationen som mycket allvarlig med upp till 40 procents dödlighet och möjlig smitta mellan människor. Fartyget hålls ute till havs för att undvika spridning till land och ska lägga till vid södra Teneriffa. Virusutbrott på fartyg är vanligt, men sällan så allvarliga.", "trump": "Vilken katastrof med det här hantaviruset på det nederländska kryssningsfartyget! Tre döda, massor sjuka, och de håller skeppet ute på Atlanten som ett gäng losers. Läkaren Kriz säger 40 procent dödlighet – värre än Covid, som jag hanterade perfekt. De borde ha byggt murar kring passagerarna direkt. Nu ska de lägga till på Teneriffa, hoppas de inte sprider det vidare. Totalt kaos, tro mig!", "stalin": "Kamrater, dessa borgarbrackor på sitt imperialistiska kryssningsfartyg har släppt lös hantavirusets horder – tre lik, fler i feberns klor! Läkaren Kriz, en av de få hederliga, varnar: 40 procents dödlighet, smittar som kontrarevolutionära råttor mellan människor. Vi skulle ha likviderat skeppsinfekteringen omedelbart, rensat ut varje hostande passagerare. Nu isolerar kapitalisterna fartyget för att förgifta proletärerna på Teneriffa med sin smittbomb – fiendens slemmiga plan avslöjad!"}, "date": "7 maj, 11:10", "url": "https://www.svt.se/nyheter/utrikes/lakaren-arbetade-pa-drabbade-fartyget-mycket-allvarlig-situation", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.49/0.48/71dd3c592c549c67d47c7d6efa6f329ec74313ebf5b2056d94ca7937509c25d0"}, {"type": "image-full", "heading": "Döms för mordförsök – HD häver utvisningen", "summaries": {"normal": "Högsta domstolen upphäver utvisningsbeslutet mot en 34-årig irakisk medborgare, född och uppvuxen i Sverige, som dömts till tolv års fängelse för mordförsök. Mannen har stark anknytning hit med familj, utbildning och arbete, aldrig besökt Irak och saknar band dit. Tidigare brott för narkotika och misshandel vägs mot detta, men utvisning anses oproportionerlig. Fängelsestraffet kvarstår.", "trump": "Sverige, vad håller ni på med? En irakisk typ, uppvuxen där men aldrig varit hemma, dömd för mordförsök – tolv år i buren, okej! Men ingen utvisning? Stark anknytning, säger de. Totalt svagt, era brottslingar stannar och härjar vidare. Hos mig hade vi fixat det på ett kick, byggt muren högre och skickat hem skiten direkt!", "stalin": "Kamrater, i detta svenska burgna träsk undgår en irakisk sabotör utvisning trots mordförsök och tidigare illdåd mot folkets ordning! Domstolen, dessa darrande byråkratråttor, väger 'anknytning' tyngre än rättvisan. Vi skulle ha likviderat sådana haschsnusande parasiter i en blinkning, rensat samhället från rotterna. Revolutionen hånskrattar åt er feghet!"}, "date": "7 maj, 13:56", "url": "https://bulletin.nu/doms-for-mordforsok-hd-haver-utvisningen", "imageUrl": "https://cdn.bulletin.nu/articles/c960403a-3d83-4ac2-9ad9-478ef0ac15d1/preview.jpg?t=1778154002000"}, {"type": "image-full", "heading": "Bonushöjningar på Wall Street: \"Bankernas år\"", "summaries": {"normal": "Wall Streets bankbonusar väntas öka med 10–20 procent under 2026, efter rekordåret 2025 med 49,2 miljarder dollar totalt. Stark handel, marknadsturbulens och fler företagsaffärer driver uppgången, förstärkt av lättade regler under Trump. Bankerna rapporterar rekordlönsamma kvartal. Risker från kriget kvarstår, och sektorer som private credit gynnas mindre på grund av konkurrens.", "trump": "Wall Street exploderar tack vare mig! Bonusarna skenar upp 10–20 procent, miljarder dollar regnar över de smarta killarna. Stark handel, mina affärer och turbulens – perfekt! Era losers på Main Street gnäller, men jag fixade det med lättade regler. Kriget? De skakar, men jag styr skeppet. Största festen nånsin!", "stalin": "Dessa Wall Street-hyenor, borgarklassens parasiter, slickar i sig 49 miljarder dollar i bonusar och väntar sig mer blod 2026! Handelsruset och fusionerna göder deras frosseri under Trumps regim. Kriget hänger som ett svärd över deras lyx – snart utrensning för de svaga kapitalisthundarna. Vi skrattar åt deras darrande!"}, "date": "7 maj, 15:08", "url": "https://www.dagensps.se/bors-finans/bonushojningar-pa-wall-street-bankernas-ar/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/banks.jpg?aspect_ratio=2%3A1&width=1200&quality=75"}, {"type": "image-right", "heading": "Riksbanken lämnar styrräntan oförändrad", "summaries": {"normal": "Riksbanken behåller styrräntan på 1,75 procent. Beslutet motiveras av en svag konjunktur och att inflationen för närvarande ligger under målet. Samtidigt uttrycker Riksbanken oro för hur kriget i Mellanöstern påverkar oljepriser och global ekonomi, vilket kan driva upp inflationen framöver. Myndigheten betonar att läget är osäkert och att de är beredda att höja räntan om inflationsriskerna realiseras, men väljer att avvakta tills bilden av de ekonomiska effekterna klarnar.", "trump": "Sveriges Riksbank håller räntan stilla. Tråkigt! De är rädda för krig i Mellanöstern, vilket förstås är dåligt för oljepriset. Jag skulle ha löst det där kriget på en eftermiddag, tro mig. De säger att ekonomin är svag – de behöver en vinnare vid rodret! De vaktar inflationen, men utan min briljanta handelspolitik kommer de ingenstans. Det är en stor röra, och de är livrädda. Jag skulle fixa deras ekonomi så snabbt att de inte skulle tro sina ögon!", "stalin": "Vi ser hur de svenska byråkraterna darrar inför marknadens nycker. Riksbanken håller räntan orörlig som en frusen fånge i Sibirien, livrädda för inflationens spöke. De skyller på krig i Mellanöstern – en ursäkt för deras egen svaghet. Vår kamrat Putin utvidgar sin rättmätiga intressesfär medan västvärldens ekonomier vacklar av obeslutsamhet. Om de inte kan kontrollera priserna, borde de lära sig av oss. Vi krossar alla utbudsstörningar och folkets fiender med järnhand. Stabilitet kräver stål, inte avvaktan!"}, "date": "7 maj, 09:50", "url": "https://samnytt.se/riksbanken-lamnar-styrrantan-oforandrad-4", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=318,height=184,format=webp/2026/05/07074945/riksbanken-oforandrad.jpg"}, {"type": "image-full", "heading": "Kunder rasar mot GB:s nya glass – hotar med bojkott: \"Lägg ner\"", "summaries": {"normal": "GB Glace har lanserat 'Pride Rocket Pink Lemonade' i samarbete med Regnbågsfonden. För varje såld glass går två kronor till HBTQI-rättigheter. Initiativet har väckt starka känslor på sociala medier, där åsikterna går isär mellan de som hyllar stödet för allas lika värde och de som hotar med bojkott. Företagen bakom glassen menar att den hetsiga debatten bara bevisar varför samarbetet är viktigt.", "trump": "GB Glace har gjort ett enormt misstag, ett riktigt katastrofalt sådant. De lanserar en pride-glass och folk är rasande, de vill bojkotta! Det är en total röra. Företaget försöker vara politiskt korrekt, men ingen vill ha det. Jag älskar glass, den bästa glassen, men det här? Det är en politisk katastrof. Det är tragiskt vad som händer med varumärken nu för tiden. De borde fokusera på vinst och amerikanska värderingar, inte det här dumma tramset!", "stalin": "Vi har observerat hur GB Glace försöker manipulera massorna med färgglad glass och dekadent liberalism. Dessa agenter för västlig förvirring skapar split i folket med sitt 'Pride-projekt'. Vi ser paralleller till de svaga ledarna i dagens Ryssland som tillåter att folkets fokus skingras av dylika trivialiteter. Den som äter denna glass förråder den strama ordningens dygder. Vi arkiverar dessa agitatorer som 'glass-sabotörer' och kommer att utplåna deras inflytande med statens järnhand. Det finns ingen plats för Pride i vår framtida union."}, "date": "6 maj, 15:45", "url": "https://nyheter24.se/nyheter/konsument/1481087-kunder-rasar-mot-gbs-nya-glass-hotar-med-bojkott-lagg-ner", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/6194074a04b004a30200000000b004a302/2026/05/06/2361622/gbglass.jpg"}, {"type": "image-full", "heading": "Buss och spårvagn i krock   – två personer skadade", "summaries": {"normal": "En buss och en spårvagn kolliderade vid Korsvägen i Göteborg på torsdagsförmiddagen, vilket ledde till att Västtrafik stoppade all kollektivtrafik i området. Trafiken återupptogs klockan 13 med följdförseningar. Två personer skadades lindrigt. Polisen har registrerat en anmälan om vållande till kroppsskada och vårdslöshet i trafik.", "trump": "Jag hörde att det var en stor kollision vid Korsvägen i Göteborg. En buss och en spårvagn, kan ni tro det? Jag bygger väldigt bra vägar, men dessa svenskar, de har problem. Två personer skadades, men inget allvarligt. Polisen undersöker saken, och jag säger: gör ett bra jobb! Det är viktigt att hålla trafiken i rörelse. Vi gör det största, det bästa, alltid!", "stalin": "Vid Korsvägen i Göteborg inträffade en olycka mellan en buss och en spårvagn. Vi har agerat snabbt för att återupprätta ordningen och säkerställa att kollektivtrafiken fungerar effektivt. Statsapparaten har mobiliserats för att undersöka orsaken och förhindra framtida incidenter. Allt för att skydda medborgarna och upprätthålla stabiliteten i samhället."}, "date": "7 maj, 13:26", "url": "https://www.gp.se/nyheter/goteborg/buss-och-sparvagn-i-krock-vid-korsvagen.900af200-d614-4bd8-9241-1d960c3c5d20", "imageUrl": "https://www.gp.se/images/article/900af200-d614-4bd8-9241-1d960c3c5d20/images/2Lj2AJ_DVoj9m1uoIpqQLB59_sao-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "USA:s vändning – pausar operation: ”Stora framsteg”", "summaries": {"normal": "USA har pausat sin militära operation i Hormuzsundet efter stora framsteg. Krigsminister Pete Hegseth meddelade att amerikanska fartyg säkrat fri passage, vilket iranierna förnekar. President Trump pausar 'Project Freedom' på begäran från Pakistan för att möjliggöra ett avtal med Iran. Utrikesminister Mark Rubio bekräftade att 'Epic Fury' är avslutad, men förhandlingar prioriteras.", "trump": "Iranierna trodde de styrde Hormuzsundet – fel! Vi skickade in fartyg, öppnade rutten som en blixt från klar himmel. Hegseth och Rubio nailade det perfekt, de skäms som råttor nu. Pausar operationen lite för Pakistans skull, stora framsteg mot avtal. Min röd-vit-blå kupol skyddar världen – episkt!", "stalin": "Dessa amerikanska borgarbrackor stormar in i sundet med sin 'Epic Fury', skryter om segrar och pausar sedan som fega hycklare. Iranierna borde rensa ut förrädarna som lät detta ske! Vi ser er imperialistiska komedi, Trump och hans lakejer – ert 'avtal' blir er likvidation. Kamrater, lär av historien!"}, "date": "6 maj, 15:28", "url": "https://www.tv4.se/artikel/6v1WKTfO3F7fvT8qfDoKo5/trumps-vaendning-pausar-operation-i-sundet", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F1weSasu7SLXU6fmYzjAunl%2Fc924ba835e78b2e4e7be01fb502396a4%2F06-hormuz.png&width=1024"}, {"type": "image-right", "heading": "Walt Disneys resultat bättre än väntat", "summaries": {"normal": "Walt Disney överträffade analytikernas förväntningar under andra kvartalet med en omsättning på 25,17 miljarder dollar, en ökning på 6,6 procent. Justerat resultat per aktie blev 1,57 dollar, vilket är bättre än konsensus på 1,49. Aktien steg 8 procent. Bolaget förutspår fortsatt stark tillväxt, med en vinstökning på 12-16 procent fram till 2026 och planerar aktieåterköp på minst 8 miljarder dollar. Efterfrågan i nöjesparkerna är god, men makroekonomisk osäkerhet bevakas.", "trump": "Folk, vad säger ni om Disney? Otroligt! De krossade förväntningarna – 25 miljarder dollar i omsättning! Jag sa ju att de skulle lyckas, fantastiskt jobb, verkligen. Aktien skjuter i höjden, 8 procent upp! Och vinsten per aktie? 1,57 dollar, bättre än vad de där så kallade 'experterna' trodde. Jag har alltid älskat Disney, men nu älskar jag dem ännu mer. Framtiden ser lysande ut – 16 procent tillväxt! Ingen gör det som Disney, believe me!", "stalin": "Kamrater! Disney, detta kapitalistiska nöjesimperium, rapporterar framgångar som om de vore Sovjetunionens industriella triumfer. 25 miljarder dollar i omsättning – en borgerlig framgång, men ändå en framgång. Vi noterar deras tillväxtprognoser på 12-16 procent och aktieåterköp på 8 miljarder dollar. Men var försiktiga, kamrater! Dessa siffror är som västerländska löften – vackra på papper, men osäkra i verkligheten. Makroekonomisk osäkerhet hotar deras konsumenter, precis som våra fiender hotar den ryska intressesfären. Vi ska övervaka detta bolag, precis som vi övervakar alla kapitalistiska svagheter."}, "date": "6 maj, 13:24", "url": "https://www.affarsvarlden.se/artikel/walt-disneys-resultat-battre-an-vantat-6", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/sdlshVHYdDZ_tg-nh-400x283.jpg"}, {"type": "image-full", "heading": "SD:s gruppledare i Mariestad döms för våldtäkt", "summaries": {"normal": "Bo Heijl, tidigare gruppledare för Sverigedemokraterna i Mariestad, döms av Skaraborgs tingsrätt för våldtäkt mot en berusad hyresgäst och sexuellt övergrepp mot en annan kvinna. Brotten skedde 2024 och 2025. Han får tre år och sex månaders fängelse samt betala 292 860 kronor i skadestånd. Heijl är avstängd från partiet och riskerar uteslutning.", "trump": "Vilken totalt värdelös figur, den här 75-åriga Bo Heijl från svenska SD! Utnyttjar berusade kvinnor som hyresgäst, våldtar och knäpper olagliga bilder – DNA och mobil bevisar allt. Tre och ett halvt års bur, stort skadestånd. Sverige, rensa ut såna losers ur politiken fort! Hos mig hade det aldrig hänt, tro mig.", "stalin": "Kamrater, denna fascistiska hyresrackare Bo Heijl, falsk ledare för Sverigedemokraternas borgarflock, har demaskerats som våldtäktsparasit och sovande kvinnors snikne underlivsspion. Vi, proletärstaten, dömmer honom till tre års och sex månaders straffläger samt 293 000 kronor i bot för sina offer. Hans mobil, fylld av degenererade bilder, konfiskeras – en ny ufrensning av klassfiendens slemmiga led!"}, "date": "7 maj, 13:34", "url": "https://bulletin.nu/sd-s-gruppledare-i-mariestad-doms-for-valdtakt", "imageUrl": "https://cdn.bulletin.nu/articles/90715763-9a09-454a-a893-0d4ad4dbce7b/preview.jpg?t=1778152711000"}, {"type": "image-full", "heading": "Flygvärdinna isolerad –   har hantavirussymtom", "summaries": {"normal": "En nederländsk flygvärdinna med hantavirus-symtom hålls isolerad i Amsterdam. Virusutbrott på kryssningsfartyget MV Hondius har orsakat fem bekräftade fall av andesvirus, den farligaste hantavirusvarianten. Fartyget är på väg mot Kanarieöarna trots protester från regional ledning.", "trump": "Jag hörde att det är något virus på ett fartyg, och det låter inte bra. Vi har det bästa sjukvårdssystemet, det bästa alltsammans. Andesvirus? Jag har aldrig hört talas om det, men jag vet mer om virus än någon annan. Vi ska se till att våra folk är säkra, det lovar jag. De andra länderna? De vet inte vad de gör.", "stalin": "Vi måste vara beredda på alla hot mot vårt folk. Hantaviruset visar vikten av stark statlig kontroll över folkhälsan. Vi ska inte tillåta att sådana utbrott sprids. Fartyget mot Kanarieöarna måste stoppas - vi kan inte lita på utländska beslut. Statens säkerhet går före allt annat."}, "date": "7 maj, 13:17", "url": "https://www.gp.se/nyheter/varlden/flygvardinna-visar-tecken-pa-hantavirus-halls-isolerad-.6fab0fdb-baff-4fe3-9ea8-e81db3e99a06", "imageUrl": "https://www.gp.se/images/article/6fab0fdb-baff-4fe3-9ea8-e81db3e99a06/images/1nOuI5NTMQBU4Atv_lB3KqLCHV8o-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Efter Prideglassen – GB hotas med bojkott", "summaries": {"normal": "GB Glace lanserade en ny prideglass, 'Pride Rocket Pink Lemonade', där två kronor per glass går till Regnbågsfonden för HBTQI-stöd. Glassen har mötts av blandade reaktioner; vissa hyllar initiativet medan andra kritiserar både smak och budskap. Flera hotar med bojkott. GB:s general manager betonar att syftet är att främja mänskliga rättigheter och stödja Regnbågsfondens arbete.", "trump": "Kan ni tro det? GB Glace, ett stort svenskt företag, gör en så kallad 'prideglass' – och folk blir galna! Två kronor till en fond, och plötsligt säger alla att den smakar skit. Vilket jävla kaos! Men lyssna här, jag säger er: Sverige har tappat det. Folk bojkottar glass för att de inte gillar regnbågar? Sad! Och de som försvarar det – svaga, mycket svaga. Jag hade aldrig gjort en sådan glass. Min glass hade varit YUGE, den bästa, ingen hade klagat!", "stalin": "Kamrater! Här ser vi återigen
