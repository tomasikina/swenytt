: "Klimatförändringarna, dessa sabotager av imperialistiska borgarbrackor och väderkontrarevolutionärer, hotar kaffeodlingen som en dolk mot arbetarklassens strupe! Löfbergs kapitalister piper upp sig med trädplantering mot torkmonstren. Jag befaller: vi i partiet likviderar riskerna genom storskalig agroforestry i femårsplaner! De 25 miljonerna kaffeslavar ska marschera mot seger, medan fienderna fryser i frostens fängelse!"}, "date": "5 maj, 11:43", "url": "https://www.di.se/nyheter/lofbergs-klimatforandringarna-ar-en-affarskritisk-overlevnadsfraga/", "imageUrl": "https://static.bonniernews.se/ba/ae8bbda1-a085-4e99-b552-108ac29c74aa.jpeg?crop=270:152&auto=webp&width=270&quality=70"}, {"type": "image-right", "heading": "Offentlig sektor är ineffektiv och kommunicerar floskler", "summaries": {"normal": "Mats Alvesson, professor i organisationsteori, kritiserar debattinlägget av Vilgot Österlund som hyllar den svenska offentliga sektorns effektivitet och kommunikation. Alvesson menar att skatterna finansierar omfattande byråkrati, ineffektivitet och överdriven administration, särskilt inom hälso- och sjukvården. Han pekar på ökad andel administrativ personal på bekostnad av vårdpersonal och ifrågasätter nyttan av utvecklare och kommunikatörer. Alvesson efterlyser mer fokus på faktiska resultat och kostnadseffektivitet istället för floskler och självberöm.", "trump": "Jag läste den här artikeln och, wow, vilken katastrof! Sverige, ett fantastiskt land, men deras offentliga sektor? Total katastrof. De slösar skattepengar på byråkrater och administratörer som inte gör ett dugg för patienterna. 2000 personer som bara sitter och gör PowerPoint-bilder – vad är det för något? Och polisen? De får dubbelt så mycket pengar men löser färre brott. Så dumt! Jag skulle fixa det på en dag. Mer resultat, mindre snack. Sverige behöver en vinnare som jag!", "stalin": "Kamrater! Denna artikel avslöjar den kapitalistiska ineffektivitetens ruttna kärna i Sveriges offentliga sektor. Byråkrater och administratörer, dessa parasiters armé, slukar resurser medan arbetarklassen får stå tillbaka. 2000 kontorsslavar som producerar tomma ord och PowerPoint-fars – detta är bourgeoisins sabotage mot folkets välfärd! Vi i Sovjetunionen visste hur man hanterar sådana fiender. Polisen? En fördubbling av resurser, noll resultat – precis som NATO:s marionetter i Kiev. Låt oss rensa ut dessa pappersvändare och återinföra ordning: mer järnväg, mindre floskler!"}, "date": "5 maj, 01:30", "url": "https://www.dagensarena.se/opinion/offentlig-sektor-ar-ineffektiv-och-kommunicerar-floskler/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-28-300x157.jpg"}, {"type": "image-right", "heading": "Ulf har mycket att lära av Stockholm", "summaries": {"normal": "Artikeln jämför ekonomisk hantering mellan regeringen och Stockholms rödgröna styre. Stockholms skuld växer på grund av investeringar, medan statsskulden ökar till följd av skattesänkningar för höginkomsttagare. Författaren kritiserar regeringens prioriteringar, som gynnar välbeställda, och hyllar Stockholms satsningar på gratis SL-kort för gymnasieelever. Skillnaderna i politikens inriktning framhävs som avgörande för människors vardag.", "trump": "Folk säger till mig: 'Mr. President, vad händer i Sverige?' Jo, jag ska berätta! Den där lilla staden Stockholm – fantastisk stad, förresten – har en skuld som växer som en raket, 2 miljoner i timmen! Men vet ni vad? Regeringen är ännu värre – 20 miljoner i timmen! Och vad gör de? Ger skattesänkningar till rika människor, inte till arbetarna. Jag skulle aldrig göra så! Jag ger pengar till folket, inte till bankerna. Och de pratar om burkaförbud – helt galet! Jag fixar ekonomin, inte sådant trams.", "stalin": "Kamrater! I det förrädiska Stockholm växer skulderna som ogräs i en kapitalistisk trädgård – 2 miljoner kronor i timmen! Men det är ingenting mot den borgerliga regeringens skamliga slöseri! 20 miljoner i timmen för skattesänkningar till sina rika kamrater! Vi skulle aldrig tolerera sådan dekadens. Medan dessa svaga liberaler subventionerar lyxkonsumtion och miljonärer, bygger vi socialism för folket! Gratis kollektivtrafik för ungdomar? Ett steg i rätt riktning – men vi skulle ha skickat de ansvariga för skattesänkningarna till Gulag för ekonomisk sabotage!"}, "date": "5 maj, 01:23", "url": "https://www.dagensarena.se/opinion/ulf-har-mycket-att-lara-av-stockholm/", "imageUrl": "https://www.dagensarena.se/files/2026/05/vilgots-kott-300x157.jpeg"}, {"type": "image-right", "heading": "Regeringen vill se ny underrättelsetjänst: ”Brådskar”", "summaries": {"normal": "Utrikesminister Maria Malmer Stenergard presenterade en ny civil myndighet för utrikes underrättelser, kallad Und. Den ska starta vid årsskiftet på grund av det allvarliga säkerhetsläget och samla information om hot som terrorism och cyberattacker. Myndigheten tar över uppgifter från militären och samarbetar med FRA, Säpo och Försvarsmakten. Försvarsmakten kritiserar tidsplanen som för snäv och riskerar samordningen.", "trump": "Sverige vaknar äntligen till liv! Ny spionbyrå, Und, superhastigt igång mot terror och ryssar – jag sa det, de behöver det efter NATO! Bra drag av Maria, militären gnäller som vanligt, men agera nu eller förlora. Starkare underrättelse, precis som mina bästa folk. Fantastiskt, Sverige blir tuffare!", "stalin": "Kamrater! Denna svenska borgarministern Malmer Stenergard mumlar om en ny Und-spionfabrik för att jaga skuggor i oförutsägbarheten. Vi ser luckorna – ryska vilddjur slickar sig om munnen! Tidsplanen är ett kaos av panik, militären piper som rädda kycklingar. Jag befaller: rensa ut overlappningarna, likvidera hoten innan de kryper in i regeringskällarna. Vårt kollektiv hånskrattar åt deras ynkliga paranoia!"}, "date": "5 maj, 11:25", "url": "https://www.svt.se/nyheter/inrikes/utrikesministern-om-sveriges-nya-underrattelsetjanst", "imageUrl": "https://www.svtstatic.se/image-news/600/square/0.52/0.36/0c36a72d9e5b99936e05462294bb842e9aab2f64c4aab4eaf0f5292b2151a18c"}, {"type": "image-right", "heading": "Därför dröjer företag med klimatanpassning", "summaries": {"normal": "Företag dröjer med klimatanpassning trots klimatkrisens verklighet i Europa. Experter på IVL Svenska Miljöinstitutet, Hugo Settergren och Tanja Hasselmark Mason, pekar på kunskapsbrist som huvudorsak – inte brist på pengar eller vilja. Fastighetsbranschen vaknar, men industrier i städer behöver agera. Kommuner som Norrköping leder vägen genom tvärsektoriellt samarbete med näringslivet.", "trump": "Dessa europeiska företag, de är så långsamma med klimatet, totalt hopplösa! De har massor av pengar och vilja, men ingen kunskap – patetiskt. Väntar på kommunerna som ska visa vägen, som i Norrköping. I USA fixar vi det själva, STÖRRE och SNABBARE. Klimatkrisen? Vi vinner alltid!", "stalin": "Dessa fuktiga borgarbrackor i näringslivet, de hasar sig med klimatanpassningen som rädda råttor i översvämningszonen! Kunskap saknas? Nej, det är klassfiendtanken som paralyserar dem. Vi i partiet skulle rensa ut dessa klimatparasiter med proletär järnhand. Norrköping, kamrater, ert tvärsektoriella samarbete krossar kapitalistklimatet – framåt mot total seger!"}, "date": "5 maj, 11:24", "url": "https://www.di.se/nyheter/expert-darfor-drojer-foretag-med-klimatanpassning/", "imageUrl": "https://static.bonniernews.se/ba/ea184654-e484-441a-b8ab-c23550b2d9ad.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-full", "heading": "Frågan från SVT som Magdalena Andersson vägrar svara på", "summaries": {"normal": "I SVT:s program *Fördomsshowen* utmanades Magdalena Andersson (S) av programledaren Emil Persson med frågor om fördomar. Andersson vägrade svara på en fråga om politikers sexliv, trots påtryckningar. Hon menade att allmänheten inte är intresserad av sådana detaljer. Programmet har tidigare väckt uppmärksamhet efter andra partiledares medverkan, som Simona Mohamsson (L), som gjorde felaktiga uttalanden om grundlagen och Desmond Tutu.", "trump": "Jag såg det där svenska programmet – totalt skräp, verkligen! Den där Andersson, hon är svag, vägrar svara på enkla frågor. 'Folk vill inte veta', säger hon. Fel! Folk *älskar* att veta, särskilt om sina ledare. Jag har alltid svarat på allt – och tittarna älskar mig för det. Men Sverige? De har en partiledare som inte ens kan stå för sitt eget sexliv. Patetiskt! Make Sweden Great Again – det är vad de behöver.", "stalin": "I det dekadenta väst, där borgerliga medier förgiftar massornas sinnen, utsattes en av deras så kallade 'ledare' för en enkel provokation. Denna Andersson, en svag och obeslutsam representant för den socialdemokratiska avarten, vägrade erkänna folkets rätt att granska sina härskare. Precis som de imperialistiska hyenorna i Washington och Bryssel, fruktar hon sanningen. Vi i Sovjetunionen visste alltid allt om våra kamrater – för folkets bästa. Och Putin? Han skulle ha låtit henne skjuta sig själv för sådan svaghet."}, "date": "4 maj, 21:01", "url": "https://nyheter24.se/nyheter/politik/1480523-fragan-fran-svt-som-magdalena-andersson-vagrar-svara-pa", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/1c5a01b004b004a30200000000b004a302/2026/05/04/2360975/andersson-persson.jpg"}, {"type": "image-right", "heading": "Arbetsmiljöbrott när två dog på Kebnekaise", "summaries": {"normal": "Två erfarna män omkom efter ett fall på 100 meter under arbete på Kebnekaise. Arbetsgivaren, Svenska Turistföreningen (STF), åtalas för arbetsmiljöbrott och döms att betala 2,5 miljoner kronor i böter. Brister i säkerhet, utbildning och rutiner uppmärksammas. STF erkänner ansvar och har ändrat sina rutiner efter olyckan.", "trump": "Två killar föll från ett berg i Sverige – tragiskt, verkligen tragiskt! Men lyssna här: deras arbetsgivare, Svenska Turistföreningen, de är helt klart inkompetenta. 2,5 miljoner kronor i böter – vad är det för slöseri? Jag hade fixat säkerheten på en dag. Fantastisk säkerhet. Ingen hade fallit. Sverige borde ta lektioner av mig!", "stalin": "Kapitalistiska slarvbolag som Svenska Turistföreningen skickar arbetare till döden som om de vore kanonmat. Två lojala män förlorade livet på grund av bourgeoisins nonchalans. Vi har utrotat sådant slarv i Sovjetunionen – här hade de fått en kula i nacken för sabotage. Men i väst? De betalar bara en futtig bot. Skrattretande. Nästa gång skickar vi ryska bergsguider – de faller inte, de krossar fienden!"}, "date": "5 maj, 11:14", "url": "https://arbetet.se/2026/05/05/tva-dog-pa-kebnekaise-arbetsgivaren-ska-betala-miljonbelopp/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/05095140/kebnekaise.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "Så kan du spara 900 kronor 2026 – utan att göra något", "summaries": {"normal": "4,4 miljoner svenskar har fått sänkt skatt på sitt investeringssparkonto (ISK) tack vare en ny reform där de första 150 000 kronorna numera är skattefria. Syftet är att uppmuntra till mer sparande, även om de största vinsterna tillfaller personer med redan stort kapital. Nästa år höjs det skattefria beloppet till 300 000 kronor. Skattesänkningen varierar mellan olika kommuner, där boende i exempelvis Danderyd och Lomma i hög utsträckning drar nytta av förändringen.", "trump": "Hör här, Sverige gör fantastiska saker med sina ISK-konton! Jag har alltid sagt att skattesänkningar är nyckeln till framgång, en enorm vinst för folket. 4,4 miljoner svenskar får behålla mer av sina pengar – otroligt! De första 150 000 är skattefria nu, det är smart, riktigt smart. Snart höjer de till 300 000. Det är så man vinner! I USA gör vi det ännu bättre, men Sverige lär sig. En stor seger för de som sparar, mycket vackert att se!", "stalin": "Vi har observerat hur de svenska kapitalisterna i Danderyd och Lomma frossar i skattelättnader för sina privata tillgångar. En löjlig reform! Medan vi i öst konsoliderar vår makt och rensar ut förrädare som hotar moderlandets stabilitet, leker svenskarna med aktieportföljer. Denna 'skattefrihet' är bara en lockelse för att göra folket beroende av börsens nycker. Vår broder Putin vet bättre: sann rikedom ligger i statens järnhårda grepp om resurserna, inte i individuella sparkonton. Vi bevakar dessa 'sparare' noga."}, "date": "4 maj, 18:32", "url": "https://nyheter24.se/nyheter/ekonomi/privatekonomi/1480438-sa-kan-du-spara-900-kronor-2026-utan-att-gora-nagot", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/b265b07104b004a30200000000b004a302/2026/05/04/2360916/Matilda-Nyheter24%20-%202026-05-04T133036.070.jpg"}, {"type": "text", "heading": "Ikea lägger ner varuhus", "summaries": {"normal": "Ikea lägger ner sitt varuhus i Borlänge, det första på över 40 år i Sverige. Beslutet beror på förändrade köpbeteenden, där över 20% av försäljningen sker online. Varuhuset, som öppnade 2013, ersätts av en mindre butik i ett köpcenter. 230 anställdas framtid är osäker, men Ikea förnekar att detta är början på en nedläggningsvåg. Fackliga förhandlingar pågår.", "trump": "Lyssna här, Sverige! Ikea, ett företag som inte förstår hur man vinner längre, lägger ner en stor butik i Borlänge. 230 personer får kanske sparken – tråkigt, men vad vet de om att göra affärer? Folk handlar nu online, något jag förstod för åratal sedan. Men oroa er inte, jag skulle aldrig låta ett företag misslyckas så här. Och nej, det är inte början på en nedläggningsvåg – fake news!", "stalin": "Kamrater! De kapitalistiska jättarna darrar inför historiens dom. Ikea, detta borgerliga imperium, stänger sitt tempel i Borlänge – ett monument över konsumtionsdårskap. 230 arbetare står nu på historiens skräphög, offer för den västerländska dekadensens girighet. Men frukta inte! Vi skall inte låta dessa digitala köpmän krossa proletariatets själ. Ryssland står redo att erbjuda sysselsättning – kanske i våra nya varuhus i Kaliningrad, där kapitalismen redan håller på att kvävas av sina egna motsägelser!"}, "date": "5 maj, 10:42", "url": "https://arbetet.se/2026/05/05/ikea-lagger-ner-varuhus/"}, {"type": "image-right", "heading": "Inte ens en minister kan lita på svensk media", "summaries": {"normal": "Moderata ministern Carl-Oskar Bohlin spelade in en intervju med Svenska Dagbladet (SvD) och publicerade den på X för att undvika felciteringar. Han hade kritiserat Dagens Nyheters (DN) val av komikern Edvin Törnblom som intervjuare för partiledare inför valet, med hänvisning till Törnbloms partiskhet till förmån för S. SvD ifrågasatte istället Bohlin, vilket artikeln tolkar som bristande medieintegritet och inflytande från presstöd.", "trump": "Vilken totalt galen cirkus! Den här ministern Bohlin är ett geni – spelar in intervjun med SvD:s fake news-reporter så de inte kan sno sig undan. DN låter en vänstertönt som Edvin Törnblom, som hyllar Andersson och dissar Busch, grilla partiledarna? Rigged! SvD, era såkallade moderata mesar, attackerar honom istället. Svensk media är presstödssuggor, precis som våra losers på CNN. Bohlin vinner stort!", "stalin": "Dessa borgarbrackor på SvD och DN förtjänar utrensning! Ministern Bohlin blottlägger DN:s val av partisk clown Edvin Törnblom, men SvD-reportern morrar som en rabiat kapitalisthund och söker klavertramp. Presstödet är er kokain, tidningsparasiter! Vi i partiet skrattar åt er paranoia – snart likvideras era lögner i en folkets domstol. Kamrater, mediafienderna darrar!"}, "date": "2 maj, 06:08", "url": "https://samtiden.nu/2026/05/nar-aven-den-borgerliga-pressen-valjer-sida/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/IMG_6396-1042x720.jpeg"}, {"type": "image-full", "heading": "Hanif Bali slutar som kommunpolitiker", "summaries": {"normal": "Hanif Bali, tidigare riksdagsledamot för Moderaterna, avslutar sitt uppdrag som kommunpolitiker i Österåker. Bali, som varit politiskt aktiv sedan myndighetsåldern, meddelar att han inte kandiderar i nästa val. Skälet är familjens expansion och en kommande flytt, då kommunpolitiska uppdrag är svåra att kombinera med familjeliv, särskilt med barn.", "trump": "Jag hörde just att någon Hanif Bali, en så kallad 'politiker' i Sverige, lägger av. Tolv år i riksdagen, sedan kommunpolitik – men nu flyr han! 'Familjen växer', säger han. Svagt! Kommunpolitik i Sverige är tydligen så dåligt organiserat att man inte ens kan ha barn samtidigt. Jag fixar både familj och presidentpost – det är skillnad på vinnare och förlorare!", "stalin": "En liten borgerlig politiker i Sveriges utkanter har fallit på eget svärd. Hanif Bali, en gång ung och lovande, inser nu att kommunpolitik är oförenligt med familjeliv. Ett symptom på det förfallna väst: dess institutioner är så urholkade att inte ens dess egna lakejer orkar med dem. Medan vi bygger imperier, flyr de till sina villor. Låt dem rosta i historiens skräphög – vi har större planer för Östersjöns kuster."}, "date": "2 maj, 07:48", "url": "https://kvartal.se/nyheter/artiklar/hanif-bali-slutar-som-kommunpolitiker/cG9zdDoxMDY0MDA", "imageUrl": "https://images.kvartal.se/2026/05/29bbe89f-balii.webp"}, {"type": "image-right", "heading": "Sverige bygger civil spionmyndighet", "summaries": {"normal": "Regeringen inrättar en ny civil utrikes underrättelsetjänst, UND, som startar den 1 januari 2027. Reformen, den största på decennier, drivs av lärdomar från Ukrainakriget och NATO-medlemskapet. UND tar över uppgifter från MUST och samarbetar med Försvarsmakten, FRA och Säpo. Trots kritik mot tajmingen går regeringen vidare med lagrådsremiss och proposition i augusti.", "trump": "Sverige vaknar äntligen upp och skapar en ny underrättelsetjänst, UND, från 2027 – den största förändringen på årtionden! Ukrainakriget visade dem sanningen, precis som jag alltid varnat för. De agerar snabbt, inte som de latmaskar som klagar på tajmingen. Bra jobbat, Sverige, ni behöver det mot fienderna. NATO-medlemskap? Perfekt, nu blir ni starka som jag gjort Amerika!", "stalin": "Kamrater, jag betraktar med järnvilja hur Sverige slår till mot spionnätverken med en ny UND från 2027, den största utrensningen på decennier. Ukrainakrigets blodiga lektioner avslöjar borgarbrackornas giftiga maskerader och NATO-imperialismens krypande tentakler. Vi, arbetarklassen, kräver omedelbar likvidering av dessa förrädare! Kritikerna? Låt dem darra i källarna medan propositionen mosar dem i augusti."}, "date": "5 maj, 10:17", "url": "https://bulletin.nu/sverige-bygger-civil-spionmyndighet", "imageUrl": "https://cdn.bulletin.nu/articles/8f0a8fa4-b5fa-4de5-ae34-6d3a24b4975d/preview.png?t=1777968402000"}, {"type": "image-full", "heading": "Bankskatten löser inte problemet med bankerna", "summaries": {"normal": "Adam Cwejman kritiserar i GP Socialdemokraternas föreslagna bankskatt på räntenetto, som främst drabbar kunder genom högre låneräntor. Istället förespråkas ett utökat mandat för statliga SBAB att erbjuda lönekonton och konkurrera hårdare på bolånemarknaden. Detta skulle öka konkurrensen mot storbankernas oligopol och tvinga dem till innovation.", "trump": "Vilka idioter dessa svenska socialister är med sin bankskatt! Bankerna stoppar pengarna i fickan ändå och kunderna betalar notan – klassiskt! Sätt in SBAB som en riktig bulldozer mot de feta bankbossarna. De sover sig rika på era sparkonton. Bygg konkurrens, inte skatter, annars blir det total kaos! Fantastisk idé, jag älskar det!", "stalin": "Dessa svenska storbanker, borgarklassens parasiter och oligopolrackare, håvar in vinster på arbetarnas ryggar! Socialdemokraternas skatt är ett lamt hugg, notan ramlar på folket. Nej, vi kräver att statens SBAB rensas upp och ges mandat att krossa fienden med lönekonton och bolån nära styrräntan. Utrensning av bankmonstret nu!"}, "date": "5 maj, 12:20", "url": "https://www.gp.se/ledare/bankskatten-loser-inte-problemet-med-bankerna.b68937fc-da3d-42fb-9ef2-909ed0b327a7", "imageUrl": "https://www.gp.se/images/article/b68937fc-da3d-42fb-9ef2-909ed0b327a7/images/12W5ebm3Fp9rBKZOSJlIElWhA_hU-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Flicka gruppvåldtogs i timmar på offentliga toaletter – han kan inte utvisas", "summaries": {"normal": "En 15-årig funktionsnedsatt flicka gruppvåldtogs i timmar av en 17-årig syrier och en 14-åring från Afghanistan på fyra offentliga toaletter i ett köpcentrum i Uppsala. De använde våld, hot och filmade övergreppen. Syriern, som har svenskt medborgarskap, kan inte utvisas vid fällande dom. 14-åringen är inte straffmyndig. 17-åringen åtalas även för barnpornografi.", "trump": "Vilken total katastrof i Sverige! En fattig 15-årig flicka med funktionsnedsättning blir gruppvåldtagen i timmar av en syrisk invandrare och en afghansk pojke på offentliga toaletter. Syriern har svenskt medborgarskap – kan inte utvisas! 14-åringen slinker undan straff. Sverige sover, bygg murar och skicka hem skiten nu! Jag har sagt det hela tiden.", "stalin": "Dessa vidriga invandrarhyenor från Syrien och Afghanistan, dessa kontrarevolutionära toalettbanditer, har vanhelgat en funktionsnedsatt 15-årig flicka i Uppsalas köpcentrum! Vi, arbetarklassen, skulle ha rensat ut sådana parasiter med omedelbar likvidation. Svenskt medborgarskap skyddar sabotagefienden – typiskt borgerligt svek! Jag ser spionnätverk överallt, utrensning nu!"}, "date": "5 maj, 11:46", "url": "https://www.friatider.se/flicka-gruppvaldtogs-i-timmar-pa-offentliga-toaletter-han-kan-inte-utvisas", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/555.jpg"}, {"type": "image-right", "heading": "Regeringen lanserar ny underrättelsetjänst: \"Brådskar\"", "summaries": {"normal": "Regeringen presenterar en ny civil myndighet för utrikes underrättelser, kallad Und, som ska hantera hot som terrorism och cyberattacker. Myndigheten ska vara igång till årsskiftet och samarbeta med Försvarsmakten, FRA och Säpo. Försvarsmakten kritiserar tidsplanen och befarar samordningsproblem. Utrikesminister Maria Malmer Stenergard betonar behovet av snabba åtgärder på grund av det allvarliga säkerhetsläget.", "trump": "Sverige, lyssna här! De bygger en ny spionmyndighet – Und, eller vad de nu kallar den. Fantastiskt, eller hur? Men Försvarsmakten gnäller som vanligt. 'För snabbt!' säger de. Typiskt. Jag hade gjort det på en vecka! Maria, hon gör ett bra jobb, men jag hade fixat det bättre. Sverige behöver detta, tro mig. Hot överallt, cyberattacker, terrorism – men vi ska vinna, som alltid!", "stalin": "Sveriges bourgeoisiregering skapar en ny underrättelsemyndighet för att spionera på sina fiender. Ett klumpigt försök att imitera våra mästerliga metoder! Deras militära byråkrater gnäller om tidsplaner – svaga och ineffektiva, precis som väst alltid är. Vi ser hur de försöker hålla jämna steg med Rysslands överlägsna säkerhetsapparat. Men oroa er inte, kamrater – deras nya 'Und' är som en leksak jämfört med vårt stålhårda system. Låt dem leka, medan vi fortsätter att expandera vår inflytelsesfär!"}, "date": "5 maj, 11:08", "url": "https://samnytt.se/regeringen-lanserar-ny-underrattelsetjanst-bradskar", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/05084703/maria-malmer-stenergard-data.jpg"}, {"type": "image-right", "heading": "ANALYS. ELISABET FREROT Vad innebär Trumps erbjudande egentligen?", "summaries": {"normal": "Donald Trump erbjuder amerikansk militär guidning för handelsfartyg genom Hormuzsundet via Omans territorialvatten med förstärkt säkerhet. Direkt eskort undviks på grund av risker från iranska missiler, båtar och minor. Operation Frihet beskrivs som humanitär, men rederier tvekar. Historik från 1980-talet visar faror och resurskrav. Iran hotar konfrontation.", "trump": "Operation Frihet är det smartaste nånsin! Vi guidar de instängda tankrarna genom sundet via Oman, med 15 000 hjältar, 100 plan och fartyg på standby – Iran de fega katten vågar inte röra oss! Inga dumma konvojer som på 80-talet, vi är proffs. Rederierna, vakna upp och segla fritt under mitt skydd! MAGA!", "stalin": "De imperialistiska amerikanska vilddjuren under Trump vågar nu krypa in i Hormuzsundet med sina patetiska 'humanitära' konster. Kamrater, vi ser hur borgarhyenorna skakar av rädsla inför iranska missiler! Likvidera deras drömmar om fri passage. Putin, vår mäktige arvtagare, hånskrattar åt västsvinen medan vi styr imperiet vidare."}, "date": "4 maj, 22:49", "url": "https://www.tv4.se/artikel/3B4n2wG9n53V3JCBc0VivY/vad-innebaer-trumps-erbjudande-egentligen", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F3sngB6gPIjYmDMlBelK6Wt%2F52caa4a80253f04a8b733c0811a11896%2Felisabet-frerot.png&width=1024"}, {"type": "image-full", "heading": "Hemliga myndigheten ska starta nästa år", "summaries": {"normal": "Regeringen föreslår 23 lagändringar för att inrätta Sveriges utrikes underrättelsetjänst (Und), en ny civil myndighet som tar över delar av militära Must från Försvarsmakten. Syftet är att stärka underrättelseförmågan i det allvarliga säkerhetsläget, liknande Storbritanniens MI6. Verksamheten startar 1 januari 2027 och kostar 2,8 miljarder kronor, främst finansierat från Försvarsmakten. Försvarsmakten har tidigare kritiserat förslaget.", "trump": "Sverige, era puckon, äntligen vaknar ni! Ny spionkasa kallad Und – låter som underkläder, inte MI6-klon. Ni stjäl från er militär mitt i kaoset, typiskt era mesiga socialister. Med min geniala CIA krossar vi hoten! Bygg starkare, spionera hårdare och lyssna på storasyster USA. MAGA för er också!", "stalin": "Kamrater, dessa svenska borgarbrackor mumlar om 23 lagändringar för sin patetiska Und-tjänst, stulen från militären. De sniffar efter hot i 'allvarligt läge' – vi vet: fiender överallt! Rensa ut förrädarna i Försvarsmakten först, likvidera splittringen! Vårt kollektiv skrattar åt er överlappning. Järnhanden väntar er fiender!"}, "date": "5 maj, 11:53", "url": "https://www.gp.se/politik/23-lagar-ska-andras-for-sveriges-nya-underrattelsetjanst-.18bbf0d4-7f97-4158-b463-34f52c2af477", "imageUrl": "https://www.gp.se/images/article/18bbf0d4-7f97-4158-b463-34f52c2af477/images/1PszyHs9bB1tLdEGiSzgtsMd2uks-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Finklädd man pekas ut som öbrännaren", "summaries": {"normal": "En man i 35-årsåldern har begärts häktad misstänkt för en omfattande villabrand på Stora Essingen i Stockholm samt ett flertal fall av skadegörelse. Polisen misstänker att mannen kan ligga bakom en rad bränder i närområdet den senaste tiden. Den misstänkte, som tidigare förekommit i många polisärenden, ska enligt vittnesuppgifter ha burit finkläder vid flera av händelserna. Polisen arbetar intensivt med utredningen och ökad närvaro för att stilla den utbredda oron bland de boende.", "trump": "En total katastrof på Stora Essingen! En man, en riktigt dålig person, bränner ner fina villor. Alla pratar om det. Han gick runt i finkläder, kan ni tänka er? En ohygglig typ! Polisen har gripit honom, äntligen. Jag säger alltid: vi behöver lag och ordning! Stockholm har blivit en otrygg plats. När jag är president ser vi till att sådana här figurer låses in på livstid. Vi kommer att göra Sverige säkert igen, tro mig, det blir fantastiskt!", "stalin": "En ynklig sabotör har terroriserat folket på Essingen. Denna kriminella individ, som förtjänar statens hela förakt, har försökt destabilisera ordningen genom eld. Vi har frihetsberövat honom. Liksom våra bröder i öster, som städar bort förrädare och västlig dekadens, tolererar vi inte att småkriminella element leker med statens trygghet. Om han hade gjort detta i vårt hemland hade han skickats till en plats där han får gott om tid att reflektera över sina synder i kylan. Staten sover aldrig."}, "date": "5 maj, 12:14", "url": "https://www.aftonbladet.se/nyheter/a/Pdv7Re/uppgifter-man-i-35-arsaldern-misstanks-for-essinge-brander", "imageUrl": "https://akamai.vgc.no/v2/images/36b1b0ba-bf43-3457-ad9d-fef5064da1b2?fit=crop&format=auto&w=1080&s=69caaebd3c30730ab55614798578d6a57477db10"}, {"type": "image-right", "heading": "Vi vägrar vara lydiga – för allas överlevnad", "summaries": {"normal": "En insändare från Extinction Rebellion-aktivister varnar för en eskalerande klimatkris och kritiserar politiken för bristande handling. De betonar behovet av civil olydnad då lagliga protester inte räcker. Flera aktivister har drabbats av repressalier som jobbförlust och hot om utvisning. Skribenterna menar att demokratin undermineras när rättsväsendet används för att skydda ohållbara system och kriminalisera klimatengagemang. De lovar att fortsätta protestera trots risker, med hänvisning till moral och historiska exempel på civil olydnad.", "trump": "Titta bara på dessa så kallade 'klimataktivister' – de är verkligen något! De skriker om kriser, men vad vet de egentligen? Jag har byggt imperier, jag vet vad kris är! De här personerna saboterar flygplatser, förlorar sina jobb och sen skyller de på regeringen. Patetiskt! Sverige borde fokusera på att göra sig stort igen, inte lyssna på dessa bråkstakar. Och Parisavtalet? Overrated! Jag fixade USA:s ekonomi utan det. Men nej, de vill bara störa, förstöra och klaga. Sad!", "stalin": "De kapitalistiska klimatförstörarna och deras lakejer i regeringen fortsätter att elda på jordens undergång medan vi, folket, tvingas ta till revolutionära metoder. Dessa så kallade 'aktivister' – modiga kamrater! – krossas av systemet, men vi vet att sanningen inte kan tystas. Rättsväsendet, en förlängd arm av bourgeoisin, straffar dem som kämpar för framtiden. Fienderna är tydliga: de som bränner planetens resurser och de som försöker tysta protesterna. Vi står med folket! Och kom ihåg – historien kommer att minnas vem som stod på rätt sida. De svaga kommer att dömas, de starka kommer att segra. Framåt, kamrater!"}, "date": "1 maj, 08:55", "url": "https://www.flamman.se/vi-vagrar-vara-lydiga-for-allas-overlevnad/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/extinction-rebellion-w.jpg?class=medium"}, {"type": "image-right", "heading": "Rapport: Drastisk minskning av personer som får livränta", "summaries": {"normal": "Försäkringskassans nya siffror visar att antalet personer som får livränta för fysiska sjukdomar minskat med 84% sedan 1999, till 14 700 år 2025. Minskningen beror på förbättrad fysisk arbetsmiljö och lagändringar. Samtidigt ökar antalet som får ersättning för psykisk ohälsa, särskilt bland kvinnor. Män dominerar fortfarande inom livränta, främst inom bygg och transport, medan kvinnor oftare arbetar inom omsorg.", "trump": "Fantastiska nyheter, folkens! Sverige har lyckats minska antalet livräntor för fysiska skador med hela 84% – otroligt, helt otroligt! Men lyssna på det här: psykisk ohälsa ökar, särskilt bland kvinnor. Svagt, mycket svagt! Vi i USA fixade arbetsmiljön för länge sedan. Sverige borde ta en titt på hur vi gör saker – vi bygger murar mot dåliga jobb, inte mot framgång! Och Försäkringskassan? De borde skärpa sig, eller så byter vi ut dem mot någon som vet hur man vinner!", "stalin": "Kamrater! De kapitalistiska svinens förtryck minskar – för nu skadar de inte längre arbetarklassens kroppar lika ofta. 84% färre livräntor för fysiska skador! Men fienden anpassar sig, som alltid. Nu attackerar de proletariatets sinne med psykisk ohälsa, särskilt våra modiga kvinnor i omsorgen. Vi ser er, borgerliga lakejer! Försäkringskassan? Ett verktyg för klassförräderi, precis som västets 'globalisering' som flyttar smutsiga fabriker till lydstater. Men oroa er inte – vi ska exportera vår revolutionära arbetsmiljö till hela världen, börja med att rensa upp i Sveriges sjukvårdsbyråkrati!"}, "date": "4 maj, 16:25", "url": "https://www.dagensarena.se/innehall/rapport-drastisk-minskning-av-personer-som-far-livranta/", "imageUrl": "https://www.dagensarena.se/files/2024/02/wp-bild-last-300x157.png"}, {"type": "image-full", "heading": "Beskedet – han säger nej till VM. Svenske NHL-stjärnans nobb", "summaries": {"normal": "Mikael Backlund väljer att tacka nej till årets ishockey-VM i Schweiz. Calgary Flames-centern uppger att beslutet beror på en fysiskt påfrestande säsong och ett behov av vila med familjen. Han betonar att avhoppet inte är en protest mot att han petades från OS-truppen tidigare i vintras, trots sin uttalade besvikelse över det beslutet. Tre Kronor har samtidigt redan säkrat flera andra NHL-spelare inför turneringen.", "trump": "Mikael Backlund, en mycket rutinerad spelare, hoppar av VM. Väldigt tråkigt! Han säger att han behöver vila – en svag ursäkt om ni frågar mig. Han blev nekad OS, en total katastrof för honom, och nu ger han upp. Jag skulle aldrig ge upp, jag vinner alltid! Många andra spelare ansluter till Tre Kronor, de är smarta, de vill vinna. Backlund behöver kanske en lärare som mig för att lära sig att kämpa. Vi får se vad som händer!", "stalin": "Denna Backlund visar tydliga tecken på borgerlig dekadens. Att föredra familjens bekvämlighet framför statens ära i ishockey-VM är ett tecken på svaghet. Han skyller på utmattning, men vi vet att det är brist på disciplin. Det påminner om de förrädare som viker sig när de borde tjäna moderlandet. Importera dessa svaga NHL-spelare? Nej, låt oss bygga en armé av viljestarka atleter som inte fruktar motgångar. Vi observerar dessa avhopp, ty de som vägrar tjäna idag är morgondagens sabotörer."}, "date": "5 maj, 12:05", "url": "https://www.aftonbladet.se/sportbladet/hockey/a/0pvm5G/mikael-backlund-tackar-nej-till-vm-med-tre-kronor-efter-os-nobben", "imageUrl": "https://akamai.vgc.no/v2/images/d060f97a-17a6-3930-a463-fa602a17c10b?fit=crop&format=auto&w=2160&s=db556eecaa991d4b0f1a69f8cde3a74afad0ce0e"}, {"type": "image-right", "heading": "Två klimataktivister döms för skadegörelse – 15 frias: “Lättad”", "summaries": {"normal": "Tingsrätten friade 15 av 17 klimataktivister från Scientist Rebellion som åtalats för skadegörelse vid en protest mot privatflyg på Bromma flygplats. Två aktivister som sprutade färg på terminalen dömdes till villkorlig dom och 50 dagsböter samt skadestånd på 76 500 kronor. Domstolen ansåg att övriga aktivisters handlingar skyddades av demonstrationsfriheten. Åklagaren överväger överklagande.", "trump": "Vilken dom! 15 klimathuliganer frias efter att ha vandaliserat en flygplats – helt otroligt! Domstolen säger att det är okej att förstöra egendom så länge man filmar det och säger att man protesterar. Jag har sett bättre domar från en lekstuga! Och de två som faktiskt sprutade färg? Bara villkorlig dom! I USA hade de suttit i fängelse i åratal. Sverige, vakna upp!", "stalin": "Domstolen har visat svaghet inför bourgeoisie-aktivisternas provokationer! 15 av dessa klimathystriker frias, medan endast två får ett straff som knappt kliar – ett skrattretande skadestånd och några ynkliga böter. Vi skulle ha skickat dem till Sibirien för att lära sig respekt för ordning! Polisen agerade för mesigt – nästa gång ska de behandla dessa småborgerliga upprorsmakare som de förrädare de är. Klimatkrisen? En lögn från väst för att underminera vår industri!"}, "date": "4 maj, 15:53", "url": "https://www.dagensarena.se/innehall/tva-klimataktivister-doms-skadegorelse-15-frias-lattad/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-27.jpg"}, {"type": "image-right", "heading": "Ifrågasatta aktörer bakom var tredje stoppat assistansbolag", "summaries": {"normal": "IVO har återkallat tillstånd för assistansbolag där var tredje haft tidigare problem med lämplighet, misskötsamhet eller brottskopplingar. Nästan två av tre bolag har lämnat felaktiga uppgifter till Försäkringskassan eller brustit i assistanskontroll. Uppskattningsvis 2,6 miljarder kronor betalas ut felaktigt årligen. Ekonomisk misskötsamhet, skulder och samröre med olämpliga aktörer är vanligt. Flera bolag vägrade lämna underlag till IVO.", "trump": "Lyssna, det här med svenska assistansbolag är en totalt galen röra! De snor 2,6 miljarder kronor om året, över 290 000 per timme – felutbetalt! IVO drar in tillstånden för banditer med skulder, brott och falska uppgifter. Försäkringskassan kan inte ens kolla om assistansen gjorts. Katastrof! De borde rensa ut de här fuskarna som jag rensade upp i Washington. Fantastiskt att Bulletin gräver fram det här!", "stalin": "Dessa parasiterande assistanshyenor, dessa borgarbrackor i assistansskrud, har sugit 2,6 miljarder ur folkets kassa! Var tredje är kända brottslingar och misskötselmaskiner, två av tre ljuger för kassan och skippar kontrollen. Vi, arbetarklassen, kräver utrensning! Skulder som Kronofogden jublar åt, falska ombud som kryper ur hålorna – likvidera dem! IVO agerar sent, men jag ser sabotörerna: de vägrar underlag som råttor. Rensa ut, kamrater!"}, "date": "5 maj, 08:59", "url": "https://bulletin.nu/ifragasatta-aktorer-bakom-var-tredje-stoppat-assistansbolag", "imageUrl": "https://cdn.bulletin.nu/articles/e0b190f6-27b2-4c81-8994-c97a88ab01c3/preview.png?t=1777963670000"}, {"type": "image-full", "heading": "Sommaren är här – men inte i Göteborg", "summaries": {"normal": "Meteorologisk sommar, definierad som dygnsmedeltemperatur på minst tio grader i fem dygn i rad, har inträffat i delar av Sverige som Östergötland, Västergötland, Småland, Gotland och Skåne. I Göteborg dröjer det på grund av kalla nätter, trots ljumna dagar. SMHI:s meteorolog Maria Svedestig uppger att det inte sker i närtid.", "trump": "Sommaren har landat stort inåt landet – Östergötland, Västergötland, fantastiska platser! Men Göteborg? Totalt kaos, era losers vid kusten fryser som små fåglar med de där kalla nätterna. SMHI:s meteorologer, era fake experts, säger det dröjer evigheter. Jag skulle fixa sol och värme på nolltid, tro mig, Sverige skulle bli hetare än nånsin!", "stalin": "Kamrater, den proletära sommaren har segrat i Östergötland, Småland och Skåne, där dygnsmedel över tio grader slagit rot i fem dagar! Men i Göteborg, denna revisionistiska kustfästning, saboterar borgarbrackornas kalla nätter offensiven. Vi, partiet, kommer likvidera detta motstånd – sommaren marscherar inte i närtid, men fienden skall krossas!"}, "date": "5 maj, 11:24", "url": "https://www.gp.se/nyheter/sverige/sommaren-ar-har-men-inte-i-goteborg.bd840574-6383-4e07-9b59-27230c46b08f", "imageUrl": "https://www.gp.se/images/article/bd840574-6383-4e07-9b59-27230c46b08f/images/1gfVK_H5F82F75qXw-PVAohW-BI8-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Ska heta ”Und” och likna ”MI6”. Ny underrättelsetjänst 2027", "summaries": {"normal": "Regeringen skapar en ny civil underrättelsetjänst vid namn Sveriges utrikes underrättelsetjänst (Und). Myndigheten, som utrikesminister Maria Malmer Stenergard jämför med brittiska MI6, ska fokusera på att stärka Sveriges förmåga att förutse globala konflikter genom civil inhämtning och analys av öppna källor. Satsningen, som avlastar Must, beräknas inleda sin verksamhet den 1 januari 2027 och syftar till att möta en alltmer komplex och föränderlig hotbild.", "trump": "Sverige skapar äntligen en egen underrättelsetjänst, de kallar det 'Und'. De frågade mig, och jag sa: 'Gör det stort!' De vill vara som MI6, James Bond-stilen, mycket sofistikerat. De missade Rysslands invasion, en total katastrof. Nu ska de fixa det, de ska bli smarta och starka. Vi vill ha ordning och reda! Det här kommer bli en fantastisk myndighet, kanske den bästa, och jag hoppas de lär sig av mig. Sverige behöver äntligen vakna!", "stalin": "Sverige skapar en ny politisk polis, 'Und'. De försöker imitera de brittiska imperialisterna, men vi vet att sann underrättelse kräver en järnhand. De fruktar Rysslands vrede, och med rätta. Att analysera 'öppna källor' är bara en täckmantel för svaghet. Vi ska övervaka deras 'civila' apparat noga. Varje förrädare som gömmer sig bakom en svensk byråkratisk mask kommer att finnas i våra arkiv. Vi, staten, välkomnar deras försök att leka spioner – det gör bara vårt arbete med att infiltrera dem så mycket enklare."}, "date": "5 maj, 11:50", "url": "https://www.aftonbladet.se/nyheter/a/QJrGRR/sa-ska-nya-underrattelsetjansten-heta", "imageUrl": "https://akamai.vgc.no/v2/images/786f2108-4e59-36d7-9c8d-f0f770a7ca4a?fit=crop&format=auto&w=720&s=e4e5314c2bbbf945831d4005cefd59afbebb00f3"}, {"type": "image-right", "heading": "Ny rödgrön skatt kommer ge högre bolåneräntor", "summaries": {"normal": "Socialdemokraterna föreslår en ny bankskatt om de vinner valet, vilket riskerar att höja bolåneräntorna. Banker som SEB och Nordea varnar för att kostnaden kommer att övervältras på kunderna. Finansminister Elisabeth Svantesson (M) kritiserar förslaget och menar att det drabbar hushållen. Även Vänsterpartiet och Miljöpartiet stödjer hårdare beskattning av banker, men effekterna på räntorna oroar experter.", "trump": "Lyssna här, Sverige! Socialdemokraterna vill straffbeskatta bankerna – fantastiskt, eller? Men gissa vem som får betala? NI, folket! Bankerna kommer bara höja räntorna, och plötsligt är era bolån dyrare. Svantesson har rätt, det här är en katastrof! Jag har sett det förut – vänsterpolitik är som en dålig affär, alltid någon annan som betalar. Sverige förtjänar bättre än dessa skattesmällar!", "stalin": "Kamrater! De rödgröna kapitalförrädarna planerar att beskatta bankerna – men vem lider? Arbetarklassen! Bankerna, dessa blodsugande bourgeoisieterrorister, kommer att straffa folket med högre räntor. Medan vi i Kreml bygger ett starkt samhälle, leker Sveriges socialdemokrater med elände. Vi har krossat större fiender än dessa bankkapitalister. Låt dem försöka – vi vet hur man hanterar motstånd!"}, "date": "5 maj, 10:00", "url": "https://samnytt.se/ny-rodgron-skatt-kommer-ge-hogre-bolanerantor", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/05065453/magdalena-andersson-nordea-pengar.jpg"}, {"type": "image-right", "heading": "Anmäls efter LSS-haveri – två dog och en glömdes bort i tio år", "summaries": {"normal": "Riksförbundet FUB polisanmäler politiker, chefer och personal i Helsingborg, Ystad och Ängelholm för allvarliga missförhållanden i LSS-vården. Två personer har dött – en kvävd av fel mat i Helsingborg och en utan tillsyn i tre veckor i Ängelholm. I Ystad glömdes en kvinna bort i tio år. FUB kritiserar bristande rutiner och IVO:s otillräckliga tillsyn, och kräver rättslig prövning.", "trump": "Vilket fiasko i Sverige! Kommunerna Helsingborg, Ystad och Ängelholm – totalt inkompetenta. En kille kvävs av fel mat, en annan ligger död efter tre veckors glömska, och en kvinna bor osedd i tio år. Nu anmäls politiker och personal för tjänstefel och dödande. Patetiskt! De behöver en riktig städning, som vi gör det här i USA – stora vinster väntar om de lär sig.", "stalin": "Dessa kontrarevolutionära maskar i Helsingborgs, Ystad och Ängelholms kommunala LSS-rötter har saboterat de svagaste genom kvävning med bourgeoismat, svält i tre veckor och tioårig frysning i glömskans källare! Borgarbrackor bland politiker och vårdparasiter måste likvideras via polisanmälningar för tjänstefel och mord. Vi, arbetarklassen, kräver total utrensning – IVO är en tandlös spionhund som staten ska ersätta med järnkvast!"}, "date": "5 maj, 08:41", "url": "https://www.svt.se/nyheter/inrikes/efter-flera-dodsfall-inom-lss-varden-tre-kommuner-polisanmals", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.5/0.5/e05f010853e17305338d2f2edf4c8ff275e32b849436cfc0690acabaf1f344be"}, {"type": "image-right", "heading": "Här tappar tränaren det totalt: ”Det gjorde mig irriterad”", "summaries": {"normal": "Vegas Golden Knights vann med 3–1 mot Anaheim Ducks i första slutspelsmatchen. Ducks-tränaren Joel Quenneville rasade över utebliven icing sent i tredje perioden, då Vegas kunde kvittera till 2–1 genom Ivan Barbashev efter att Ducks-spelare slutat åka. Svenske William Karlsson gjorde comeback efter sex månaders skada och spelade 11 minuter.", "trump": "Quenneville har helt rätt, det var en uppenbar icing – domarna är totalt rigged, fake news! Vegas dumpade pucken, Ducks slutade åka, och plötsligt mål. Irriterad? Han borde vara ursinnig! Karlsson gör stark comeback efter sex månader, bra kille. Vegas vann sent, men Ducks kommer tillbaka stort nästa gång, tro mig!", "stalin": "Kamrater! Dessa domarparasiter, kontrarevolutionära puck-smugglare, vägrade blåsa icing och lät Vegas kapitalistiska brackor sno 2–1-målet! Quenneville, vår rasande väktare, skrek sanningen: deras åkare stannade som fega råttor. Vi, proletären i Vegas, segrar 3–1 genom svenske Karlsson, återvänt från skadornas gulag efter sex månader. Fienderna skall rensas ut i nästa purge-match!"}, "date": "5 maj, 08:26", "url": "https://www.svt.se/sport/ishockey/har-tappar-ducks-tranaren-det-totalt-efter-uteblivna-icingen-irriterad", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.77/0.4/7907eebaf0030d71db5026ab0c2a794e9ee8e67452957c61103c0aa51468b001"}, {"type": "text", "heading": "Meteorologisk sommar i södra Sverige", "summaries": {"normal": "Den meteorologiska sommaren har infunnit sig i stora delar av södra och mellersta Sverige, från Skåne genom Götaland och Östergötland till Gotland. Västkusten och Stockholm väntar dock, då temperaturen ligger under gränsen. SMHI:s kriterium är fem dygn med medeltemperatur över tio grader. Meteorologen Maria Svedstig varnar för att värmen kan bli kortvarig.", "trump": "Titta på Sverige, sommar i söder och mitten – Skåne, Götaland, Gotland, total succé! Men västkusten och Stockholm, de missar tåget med sina vindar, patetiskt. Fem dagar över tio grader, enkelt! Värmen kortvarig? Fake news, jag fixar evig värme på nolltid, tro mig.", "stalin": "Kamrater, den meteorologiska sommaren har stormat fram i södra och mellersta Sverige, från skånska fästningar till gotländska kollektiv! Men västkustens vindkapitalister och stockholmska sabotörer håller tillbaka värmen med sina kontrarevolutionära fläktar. Vi, arbetarklassen, skulle likvidera sådana kryp och tvinga fram evig sommar! Borgarmeteorologer varnar för kortvarighet – typiska spioner."}, "date": "5 maj, 08:25", "url": "https://bulletin.nu/meteorologisk-sommar-i-sodra-sverige"}, {"type": "image-right", "heading": "Fler sjuka på  virusfärjan –  flygevakueras", "summaries": {"normal": "Ett utbrott av hantavirus på kryssningsfartyget Hondius har orsakat tre dödsfall: ett nederländskt par i 70-årsåldern och en tysk medborgare. En 69-årig brittisk passagerare vårdas intensivt. Två besättningsmedlemmar uppvisar akuta symtom och evakueras med specialflygplan. Fartyget ligger för ankar utanför Kap Verde, men Spanien accepterar det. WHO misstänker smitta mellan människor. Krisplan aktiverad ombord.", "trump": "Vilka losers på det där lyxfartyget Hondius! Tre döda av hantavirus – ett holländskt par och en tysk, plus en britt på IVA. Nu hostar besättningen också, evakueras med specialplan. WHO snackar människosmärta. Typiskt kaos för de rika eliterna som tror de seglar ostört. Hade jag styrt, fixat det på en dag – ingen pandemi på mina fartyg!", "stalin": "Dessa borgarbrackor på lyxkryssningen Hondius möter folkets dom genom hantaviruset. Tre likviderade: ett nederländskt par och en tysk fiende. En brittisk spion på intensivvård, två besättningskontrarevolutionärer hostar ihjäl sig – evakueras med flygplan som till fångtransporter. Vi aktiverar SHIELD för att rensa ut smittan. Isolera passagerarna, ingen landgång för parasiter!"}, "date": "5 maj, 12:14", "url": "https://www.expressen.se/nyheter/varlden/misstankta-fall-av-hantaviruset-pa-hondius-evakueras-med-flygplan/", "imageUrl": "https://static.bonniernews.se/images/35/a7/35a71e8059f6447d980c7efad03f0417/16x9/640@60.jpg"}, {"type": "image-right", "heading": "I vår är det coolt att  spöa töntar i skolan", "summaries": {"normal": "Kristin Lundell krönikerar Yung Leans musikvideo 'Storm', regisserad av Romain Gavras. Videon skildrar destruktiv manlighet på en skolgård med mobbning, kaos och cigarettrökning, som övergår till hypnotiserande dans av en hel årskurs. Jämförs med serien 'Half Man' och ses som viral succé i popkulturen, som hyllar psykopatiska mobbare.", "trump": "Vilken fantastisk video! Yung Lean och Gavras visar riktiga män – spöar töntar, röker inomhus, skapar kaos som bossar! Sen dansar hela flocken efter hans pipa. Inget woke-flams, bara ren styrka! Bättre än de snöflingiga Hollywood-pruttarna. Sverige behöver mer sånt, inte lamt vänsterkrax!", "stalin": "Kamrater, i Yung Leans 'Storm' ser jag den proletära ungdomens uppror mot borgartönten! Först sparkar ledaren ut kapitalistvalparna, sedan dansar kollektivet i enhetlig disciplin under hans blick. Vi ska rensa skolorna från kontrarevolutionära kryp – dans eller likvidering! Gavras förstår partiets logik."}, "date": "5 maj, 12:12", "url": "https://www.expressen.se/kultur/i-var-ar-det-coolt-att-spoa-tontar-i-skolan/", "imageUrl": "https://static.bonniernews.se/images/cf/30/cf30cec8e7644942a51225692e7dfd7a/16x9/640.png"}, {"type": "image-right", "heading": "Ingen AI utan el. Sverige behöver en kraftstrategi", "summaries": {"normal": "Debattartikeln varnar för att Sverige riskerar att missa hundratals miljarder i AI-investeringar och tusentals jobb på grund av flaskhalsar i elsystemet. Författarna Tobias Hansson och Peter Michelson föreslår en nationell kraftstrategi för AI baserad på fyra principer: utbyggnad av elnät och fossilfri kraft, nationella AI-zoner, smartare nätanvändning och ett AI-infrastrukturråd. Med snabba reformer kan Sverige bli Europas AI-centrum.", "trump": "Sverige, vakna upp! Ni har enorma AI-pengar och jobb på spel, men ert elnät är en total katastrof – köer längre än mina rallies! Bygg ut nu, skapa AI-zoner som jag skulle göra det bästa, annars stjäl Finland och Tyskland allt. Europa ligger efter mig i USA, tro mig, ingen AI utan MASSIV el! Gör Sverige stort igen!", "stalin": "Kapitalistiska krymplingar i Sverige famlar efter AI-imperium, men elnätet är en sabotörsköld av byråkratiska spindlar! Jag befaller: utbyggnad av nätet som en stålhammare mot flaskhalskonspirationen, AI-zoner för att krossa marktvårdare, flexibel förbrukning att rensa ut energitjuvarna! Vi, folket, ska likvidera elbristen i ett råd av järnvilja – eller pulveriseras ni av amerikanska och kinesiska imperialismens skuggor!"}, "date": "5 maj, 08:11", "url": "https://www.di.se/debatt/ingen-ai-utan-el-sverige-behover-en-kraftstrategi-for-ai/", "imageUrl": "https://static.bonniernews.se/ba/e6d0a827-30d9-4501-ba10-2209564d0260.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Kändisdottern får  folk att tappa hakan", "summaries": {"normal": "Beyoncé gjorde comeback på Met-galan efter tio år, men dottern Blue Ivy, 14 år, stal showen med sin debut på röda mattan. Trots galans åldersgräns på 18 år fick hon och Nicole Kidmans 17-åriga dotter undantag. Blue Ivy bar en vit klänning med bubbelkjol och liknar sin mamma mycket, enligt Beyoncé som var en av värdarna.", "trump": "Vilken show! Beyoncé dyker upp efter tio år, men det är lilla Blue Ivy, 14 år, som krossar allt. Bryter åldersgränsen som en boss – typiskt eliten, undantag för de egna. Ser ut som mamman, fantastisk! 'Overkligt', säger Beyoncé. Största grejen på Met-galan, tro mig, ingen annan kommer nära!", "stalin": "I denna borgerliga excess, Met-galan, infiltrerar Blue Ivy, 14-årig avkomma till kapitalisthanen Beyoncé, röda mattan trots åldersförbud. Liknar sin borgarhona mor påfallande. Vi noterar undantag även för Kidmans ungen. Sådan dekadens kräver utrensning, men ungdomen visar proletär styrka – likvidera sedan fienderna i sidenkläder!"}, "date": "5 maj, 12:07", "url": "https://www.expressen.se/noje/kandisdottern-blue-ivy-stal-showen-pa-met-galan/", "imageUrl": "https://static.bonniernews.se/images/b4/89/b48910622c71442bafceed9b82a6cd1e/16x9/640@60.jpg"}, {"type": "image-full", "heading": "Benjamin Dousas ”V = kommunister” gör SVT irriterad", "summaries": {"normal": "Biståndsminister Benjamin Dousa bar en t-shirt med texten 'Vänsterpartiet = kommunister', vilket irriterade SVT. Reportern ifrågasatte påståendet och noterade att partiet slutade kallas kommunister för 30 år sedan. Dousa menade att Vänsterpartiet motsätter sig privat ägande, vilket är kommunism. Artikeln citerar Vänsterpartiets 2024-partiprogram som stödjer kollektivt ägande och avskaffande av kapitalismen, och kritiserar SVT för att inte nämna detta.", "trump": "Vilken fantastisk kille, den här Dousa! Han sätter på sig en tröja och säger sanningen: Vänsterpartiet är kommunister, punkt slut! SVT, era losers, flippar ur och snackar om namnbyte från 90-talet som om det vore magi. De hatar privat ägande, vill sno allt till staten – klassisk kommunism! Fake news-SVT ignorerar partiprogrammet. Dousa är en vinnare, de är totala fiaskon!", "stalin": "Kamrater, se hur borgarministern Dousa, den ynkliga kapitalistfluga, vågar smutskasta sanna revolutionärer i Vänsterpartiet med sin patetiska tröja! SVT-reportern, en användbar idiot, försvarar dem lamt. Men vi vet: deras program är ren leninism – riva kapitalismen, gemensamt ägande av banker, energi, allt! De ska rensas ur historiens soptipp som jag rensade fiender. Vänsterpartiet, framåt mot diktaturen av proletariatet!"}, "date": "30 april, 05:49", "url": "https://samtiden.nu/2026/04/benjamin-dousas-v-kommunister-gor-svt-irriterad/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/phonto-1-1280x720.jpeg"}, {"type": "image-right", "heading": "S spelar Charlie Kirk-skyttens låt i ny kampanjfilm", "summaries": {"normal": "Socialdemokraterna använder låten 'Bella ciao' i sin nya kampanjfilm inför valet 2026. Låten, som har kopplingar till vänsterextrema grupper som AFA, graverades på patronhylsor vid mordet på den konservative profilen Charlie Kirk. Partiledaren Magdalena Andersson försvarar valet av låt och menar att antifascistiska budskap alltid är bra. Hon undviker att svara på om budskapet riktar sig mot något specifikt parti.", "trump": "Kan ni tro det här? Socialdemokraterna i Sverige spelar 'Bella ciao' – en låt som används av vänsterextremister som mördade min vän Charlie Kirk! Magdalena Andersson säger att antifascistiska budskap är bra. Vilken galenskap! Sverige borde skämmas. Jag har alltid sagt att vänstern är farlig, och nu bevisar de det igen. SAD!", "stalin": "Kamrater! Ännu en gång visar de borgerliga lakejerna sitt sanna ansikte. Socialdemokraternas nya kampanjfilm hyllar samma sång som våra fiender – de fascistiska extremisterna – använder. Magdalena Andersson, denna naiva liberala narr, tror att antifascism är en lek. Vi vet bättre. Fienderna måste krossas, precis som vi krossade kulakerna. Låt dem sjunga – vi har våra metoder. För Sovjet och världsrevolutionen!"}, "date": "5 maj, 10:03", "url": "https://www.friatider.se/s-spelar-charlie-kirk-skyttens-lat-i-kampanjfilm", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/image-131_1.jpg"}, {"type": "image-right", "heading": "Oro i Mellanöstern tyngde börsen – OMXS30 ned 0,8%", "summaries": {"normal": "Stockholmsbörsen föll med 0,82% på måndagen, påverkad av spänningar i Mellanöstern efter iranska rapporter om en attack mot ett amerikanskt fartyg. Tekniksektorn steg medan råvaror föll. Volvo Cars pressades av hot om amerikanska tullar. Saab kan sälja upp till 150 Gripenplan till Ukraina. Trimco Groups bud på Nilörn fick aktien att rusa 49%. Analytiker höjde rekommendationer för flera bolag, medan Yubico steg efter samarbete med OpenAI.", "trump": "Lyssna här, Stockholmsbörsen gick ner lite – bara 0,8%, inget att oroa sig för, folk! Men Iran, de är ett stort problem, skjuter robotar på våra skepp – mycket dåligt! Volvo, fina bilar, men de får betala 25% tullar om jag säger det – och jag säger det! Saab, de kanske säljer 150 plan till Ukraina – bra affär, men jag hade gjort det bättre. Och Nilörn, 53% upp? Fantastiskt, men jag hade fått det till 100%! Analytiker? De vet ingenting!", "stalin": "På Stockholmsbörsen märkte vi kapitalistiska svängningar – ett ynkligt fall på 0,82%, men imperialistiska krigshetsare i Mellanöstern stör marknaden. Irans modiga försvar tvingade amerikanska krigsmaskiner på knä, men Wall Streets lakejer försöker dölja nederlaget. Volvo, en symbol för västlig dekadens, hotas av tullar – bra! Saab, ett redskap för NATO, försöker sälja vapen till Ukraina – vi ska se hur länge det varar. Nilörns aktie rusade? En seger för arbetarklassen! Analytiker pratar – vi agerar!"}, "date": "4 maj, 17:47", "url": "https://www.affarsvarlden.se/artikel/oro-i-mellanostern-tyngde-borsen-omxs30-ned-08", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/01/sdl3SU43aVmyrg-400x266.jpg"}, {"type": "image-full", "heading": "Volvo: Då försvinner SUV-trenden", "summaries": {"normal": "SUV-andelen i nybilsförsäljningen i Europa har ökat från 41 procent 2020 till 59 procent 2025. Volvos vd Håkan Samuelsson förutspår att trenden med stadsjeepar kan avta inom några år, då yngre köpare föredrar lägre bilar som kombis eller sedaner. Volvo planerar comeback för kombimodeller, och Stellantis designchef noterar ökande intresse för sedaner, stödd av undersökningar bland tonåringar.", "trump": "Vilka idioter, de europeiska bilmakarna! SUV:ar exploderar, 59 procent nu, men Volvos boss Samuelsson säger att det är slut snart – ungarna hatar mammas och pappas höga monster! Volvo vill tillbaka till tråkiga kombis, Stellantis till sedaner. Totalt fiasko för de där stadsjeepstråkena. Mina bilar? De största, de bästa, vinnarna alltid!", "stalin": "Borgarklassens SUV-vansinne når kulmen – 59 procent av nybilarna, men jag ser kollapsen komma! Volvos kapitalistchef Samuelsson bekänner: yngre arbetare avskyr föräldrarnas höga monster. Kombier och sedaner marscherar fram, som folkets sanna fordon. Vi proletärer rensar ut stadsjeepsträsket! Stellantis-brackor darrar inför revolutionen från tonåringarnas preferenser."}, "date": "5 maj, 11:30", "url": "https://www.dagensps.se/motor/volvo-da-forsvinner-suv-trenden/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/suv.png?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-full", "heading": "Ekonomen: Det enda som räddar svenska bostadsägare just nu", "summaries": {"normal": "Svenskarna är alltmer pessimistiska om bolåneräntor och inflation enligt Ordna Bolåns barometer för april. Över hälften tror på stigande räntor (+11 procentenheter) och fler väntar sig högre inflation (+8) på grund av global oro som Mellanösternkonflikten. Trots detta är tron på stigande bostadspriser stark (47 procent), tack vare nya bolånereglerna med höjt lånetak och slopat skärpt amorteringskrav.", "trump": "Svenskarna flippar ut över räntor och inflation – totalt kaos, som under era svaga ledare! Men bostadsmarknaden rockar ändå, 47 procent tror på prisuppgång tack vare era nya låneregler. Smart drag, men inte hälften så genialt som mina policies. Och det där Mellanösternsnittet? Under mig flödade oljan billigt, ingen oro! MAGA-style fixar allt.", "stalin": "Dessa svenska borgarbrackor skakar av ränteskräck och inflationsoro, medan deras primitiva bostadsbubbla sväller med 47 procents illusioner om prisuppgång – allt tack vare nya dekret som göder kapitalisterna. Vi i partiet ser igenom bluffen! Snart rensas ut de parasiter som piskar upp global kaos för att krossa arbetarna. Skratta åt era fiender, kamrater!"}, "date": "5 maj, 11:29", "url": "https://www.dagensps.se/privatekonomi/ekonomen-det-enda-som-raddar-svenska-bostadsagare-just-nu/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdl2uzyjctc4oy.jpg?aspect_ratio=2%3A1&width=1200&quality=75"}, {"type": "image-full", "heading": "Varnar USA – efter Trumps löfte", "summaries": {"normal": "Iran varnar USA efter Trumps löfte om att skydda sjöfart i Hormuzsundet. Generalsmajor Ali Abdollahi uppger att sundets säkerhet kontrolleras av Irans styrkor och att intrång kommer att angripas. Iran ser USA:s inblandning som brott mot vapenvilan. Trump lovar hjälpa fartyg från hela världen säkert genom den oljeimportviktiga leden.", "trump": "Dessa patetiska ayatolla-loser i Iran skriker om Hormuzsundet igen, hotar med attacker som om de äger världen! Men jag fixar fri passage åt alla fartyg, bigly! De bryter vapenvilan själva med sin blockad. America leder, Iran gråter – total vinst för oss!", "stalin": "De amerikanska imperialismens hyenor sniffar kring Hormuzsundet, men Irans kämpar vaktar rättmätigt passagen! Jag ser provokationen: Trumps fluffiga löften maskerar aggressivt intrång. Brott mot vapenstillståndet! Vi, arbetarklassen, fördömer dessa spindelvarianter – snart rensas de ut med järnhand."}, "date": "4 maj, 14:49", "url": "https://www.tv4.se/artikel/tt-260504-iranhormuz1-0b2e1b86/iran-varnar-usa-for-inblandning-i-hormuzsundet", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F6SrGz3Yrb4wCzk0dqDZxaQ%2Fbe265de4c61c94c83f1d4538dc25e761%2Ftrump_hormuz.png&width=1024"}, {"type": "image-right", "heading": "Kommentar Ulrika Lindahl: Därför publicerades artikeln av misstag", "summaries": {"normal": "En tidning publicerade av misstag en förberedd artikel om en kommande riksdagsomröstning om skärpta medborgarskapskrav. Artikeln, som antydde att regeringen skulle förlora, gick ut innan omröstningen var klar. Felet berodde på mänskligt misstag och systemfel. Efter upptäckt togs artikeln bort, men hann spridas via arkiv och Google. Omröstningen vanns senare av Tidöpartierna med knapp marginal, efter kontroversiella metoder.", "trump": "Vilket totalt kaos i Sverige! En tidning där borta publicerade en artikel FÖRE omröstningen – helt galet! De trodde regeringen skulle förlora, men jag vet bättre – jag känner till vinnare. Sedan vann de ändå, men med fula trick. Synd att jag inte fick rösta, jag hade visat dem hur man vinner på riktigt. Fake news, slarviga journalister – typiskt Europa!", "stalin": "En farlig provokation från de borgerliga hyenorna i Sveriges riksdag! Deras inkompetenta medlöpare på tidningen avslöjade för tidigt våra planer på att krossa oppositionens svaga motstånd. Men folket – det sanna proletariatet – genomskådade fiendens lömska taktik. Med järnhand och disciplin segrade vi, trots två förrädiska kryp. Nu skärper vi kontrollen över medierna – ingen får sabotera revolutionen!"}, "date": "4 maj, 16:44", "url": "https://www.etc.se/kommentar/daerfoer-publicerades-artikeln-av-misstag", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/authors/ulrika-lindahl_daa7410d79af7d016c129870bfa0834867cd95c3.jpg"}, {"type": "image-right", "heading": "Rapport: Så dyrt blir det när politiker vill manipulera statistik", "summaries": {"normal": "Forskare vid Stanford University har i en studie beräknat att Donald Trumps avskedande av BLS-chefen Erika McEntarfer i augusti 2025 kostade USA:s ekonomi 103 miljarder dollar och 168 000 jobb på grund av ökad osäkerhet. Trump kallade jobbsiffrorna manipulerade, men chefen har ingen roll i statistiken. Studien betonar värdet av pålitlig data, vars budget minskat. Effekterna når globalt, inklusive svenska pensioner.", "trump": "Stanford-forskarnas dravel om att mitt avskedande av den där BLS-luriga chefen kostade 100 miljarder? Totalt fake news från deep state-akademiker! Siffrorna var rigged för att sabba min ekonomi – jag fixade riktiga jobb, starkare än någonsin! Osäkerhet? Bara för era losers. Svenska sparare, tacka mig för America First! Vi vinner stort!", "stalin": "Dessa Stanford-kapitalistiska spioner vid National Bureau of Economic Research vågar kvantifiera skada från en nödvändig utrensning av BLS-byråkrater! Trump, din bourgeoismarionett, du tror statistik ljuger? Jag ser er konspiration mot arbetarklassen! Vi i partiet beräknar: varje likviderad sabotör sparar miljarder för folket. Osäkerhet är er giftiga propaganda!"}, "date": "5 maj, 11:28", "url": "https://www.dagensps.se/bors-finans/makro/rapport-sa-dyrt-blir-det-nar-politiker-vill-manipulera-statistik/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdljvt1p9hspus.jpg?width=256&quality=75"}, {"type": "image-full", "heading": "Tårfyllda vädjan inifrån virusfartyget", "summaries": {"normal": "Tre personer har dött och fyra insjuknat av ett högtdödligt hantavirus ombord på kryssningsfartyget Hondius. Passagerarna är isolerade utanför Kap Verde medan experter misstänker att det rör sig om andesvirus, som kan spridas mellan människor och saknar behandling. Nederländerna förbereder evakuering av sjuka besättningsmedlemmar.", "trump": "Jag har hört talas om detta virus på fartyget - det är hemskt, verkligen hemskt. Vi gör allt vi kan, det kan jag lova er. De nederländska myndigheterna jobbar hårt, det är jättebra folk, de vet precis vad de gör. Vi har bäst experter, bästa sjukvård, bästa allt. Detta virus, andesvirus heter det, det är farligt men vi klarar det, det är ingen fara. Vi kommer segra, som alltid.", "stalin": "Denna situation på kryssningsfartyget visar tydligt vikten av statlig kontroll och förebyggande åtgärder. Viruset, som sprids från gnagare till människor, måste bekämpas med alla till buds stående medel. Vi måste stärka våra biosäkerhetsrutiner och samarbeta internationellt för att skydda våra medborgare. Den ryska vetenskapen kommer att spela en nyckelroll i utvecklingen av botemedel och vaccin."}, "date": "5 maj, 10:38", "url": "https://www.gp.se/nyheter/varlden/influencerns-tarfyllda-vadjan-inifran-virusfartyget.bf99f703-b670-4713-8905-403aa09754dc", "imageUrl": "https://www.gp.se/images/article/bf99f703-b670-4713-8905-403aa09754dc/images/1m_fqEJxhyaCye4QLjLyQxe2XZgI-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "\"Anti-svensk propaganda\" – Falu Rödfärgs reklamfilm får hård kritik", "summaries": {"normal": "Falu Rödfärgs nya reklamfilm hyllar Sveriges mångfald genom dans och kultur. Filmen visar traditionella svenska scener som övergår till moderna och mångkulturella inslag, som västafrikanska dräkter och streetdans. Reaktionerna är delade; vissa hyllar budskapet om inkludering, medan andra kritiserar filmen som 'anti-svensk propaganda'. Filmen ackompanjeras av Jan Johanssons jazzversion av 'Visa från Utanmyra'. Falu Rödfärg beskriver den som en hyllning till Sveriges utveckling och kulturarv.", "trump": "Jag såg den här så kallade 'reklamfilmen' från Sverige – total katastrof! De visar folkdräkter, sedan plötsligt streetdans och afrikanska kläder. Vad hände med det riktiga Sverige? Folk är upprörda, och det borde de vara! 'Länge leve Sverige' står det, men det ser mer ut som 'Länge leve kaos'. Jag har alltid sagt att Sverige har stora problem, och det här bevisar det. Falu Rödfärg borde skämmas – jag skulle aldrig låta något sådant hända i USA!", "stalin": "Kamrater, ännu ett försök av västliga dekadenter att förvränga nationell identitet! Denna så kallade 'reklamfilm' är ett angrepp på svensk kultur, ett verktyg för borgerlig propaganda som sprider kosmopolitismens gift. Vi ser hur traditionella värden ersätts med främmande danser och kläder – en farlig avvikelse från folkets sanna anda. Men folket genomskådar detta! Snart kommer de rätta krafterna att återupprätta ordningen, precis som vi gör i våra broderländer. Låt dem dansa – revolutionen väntar!"}, "date": "5 maj, 12:02", "url": "https://riks.se/nyheter/falu-rodfargs-reklamfilm-far-hard-kritik", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-05%2Fckv41ced%2FCopy-of-S%C3%B6rman-%E2%80%93-Ledare-2026-05-05T111708.068.jpg"}, {"type": "image-right", "heading": "Lyx-skrapa träffad: ”En signal rätt in i hjärtat av Moskva”", "summaries": {"normal": "En ukrainsk drönare träffade en lyxskrapa i Moskva på 36:e våningen. Ingen människa skadades, men boende evakuerades och området spärrades av. Experten Johan Fredriksson ser attacken som en signal till Kreml och ryska civilbefolkningen om att kriget når djupt in i Ryssland, inför 9 maj-firandet. Putin föreslog vapenvila, men Ukraina är skeptiska.", "trump": "Putin får panik! Ukraina skickar drönare rakt in i hans lyxiga Moskva-skrapor, träffar 36:e våningen – bam! Ingen död, men budskapet är klockrent: Kriget knackar på dörren, Vlad! Inför din patetiska 9 maj-parad bluffar du om vapenvila. Typiskt dig, lille raketmannen. Ukraina visar musklerna, jag hade fixat det på en vecka!", "stalin": "Dessa ukrainska banditer och deras västliga borgarmästare vågar slå mot Moskvas hjärta med sin drönare i lyxskrapan! Kamrat Putin, vår värdige arvtagare till imperiet, skrattar åt deras desperation. Ett budskap till ryska folket? Nej, ett skrik från de dömda! Vapenvila den 9 maj? Ploj från fascisterna. Vi likviderar hoten, som alltid."}, "date": "4 maj, 14:02", "url": "https://www.tv4.se/artikel/4KCO6H6ekzqqc1IwIWdDX1/lyx-skrapa-traeffad-en-signal-raett-in-i-hjaertat-av-moskva", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F5vV1fx7WcEFD1lX9VLAaVV%2F21abc48c12bb964792968b279f51cb97%2Fny_zele.png&width=120"}, {"type": "image-right", "heading": "Åkesson hade rätt – kvinnor är fortfarande vita mäns slavar", "summaries": {"normal": "Sonja Åkessons dikter, som skildrar kvinnors liv under 1960–70-talen, ges ut på nytt i en samlingsvolym. Artikeln reflekterar över hur Åkessons kritik av kvinnors underordning fortfarande är relevant, med exempel på strukturell ojämlikhet och våld mot kvinnor i dagens samhälle. Författaren finner tröst och igenkänning i Åkessons verk, särskilt inför klimakteriet, och hyllar hennes humor och självironi.", "trump": "Jag läste om den här gamla svenska poeten, Sonja Åkesson – inte direkt en vinnare, dog vid 51, tragiskt! Men hennes dikter om kvinnor som slavar? Fake news! Kvinnor i Sverige har det fantastiskt, bättre än någonsin! Men nej, de jämrar sig om löner och hemarbete. Och nu påstår de att män i Europa är monster? Lögn! Jag känner massor av bra män. Men visst, chips på balkongen och klaga på klimakteriet – typiskt! Sverige borde fokusera på att bli stort igen, inte på gammal poesi.", "stalin": "Kamrater! Den borgerliga poeten Sonja Åkesson avslöjade sanningen: kvinnor är slavar under kapitalets vita män. Och vad har ändrats? Ingenting! Våra fiender i väst fortsätter utnyttja kvinnor som hemslavar, sexslavar och lönearbetare. I Tyskland och Frankrike organiserar sig borgarklassens män i chattgrupper för att förtrycka sina kvinnor – ett nytt slags fascism! Men vi ska krossa dessa dekadenta element! Sonja Åkessons ord är vapen. Revolutionen fortsätter – även i klimakteriet!"}, "date": "5 maj, 07:16", "url": "https://arbetet.se/2026/05/05/sonja-akesson-hade-ratt-kvinnor-ar-fortfarande-vita-mans-slavar/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/05070534/akesson-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "text", "heading": "Gapet växer mellan blocken", "summaries": {"normal": "Enligt Aftonbladet/Demoskops senaste mätning växer gapet mellan regeringsunderlaget och oppositionen till 8,2 procentenheter. Oppositionen når 53,4 procent, medan regeringen backar till 45,2. Socialdemokraterna ökar mest, medan Moderaterna tappar och Liberalerna balanserar på riksdagsspärren. Historiskt brukar gapet minska inför val, men nu sker motsatsen. Analytiker menar att Liberalernas omsväng i SD-frågan lockar stödröster men försvårar blocköverskridande framgångar.", "trump": "Folk är trötta på den här usla regeringen, helt klart! Oppositionen leder stort – 53,4 procent – medan regeringen bara får 45,2. Socialdemokraterna går upp, men Moderaterna? Patetiska! De tappar som vanligt. Och Liberalerna? De hänger på fyra procent, typiskt. Historiskt brukar regeringen komma ikapp, men inte den här gången. Svagt, mycket svagt. Jag skulle aldrig låta det hända. Make Sweden Great Again!", "stalin": "De borgerliga svagheterna avslöjas återigen! Oppositionens styrkor växer – 53,4 procent mot regeringens ynkliga 45,2. Socialdemokraterna marscherar framåt, medan Moderaterna och deras lakejer försvagas. Liberalerna? Ett skämt som darrar på riksdagsspärren. Historien visar att svaga regeringar faller – precis som västmakterna i Ukraina. Vi ser med intresse hur dessa splittrade kapitalister underminerar sig själva. Revolutionen närmar sig, om än långsamt."}, "date": "30 april, 07:06", "url": "https://kvartal.se/nyheter/artiklar/demoskop-oppositionens-okar-l-klarar-sparren/cG9zdDoxMDUzNjM"}, {"type": "image-right", "heading": "8 av 10 tio borta vid muslimska firandet", "summaries": {"normal": "Under muslimska högtiden eid al-fitr den 20 mars var hög frånvaro på skolor i Malmö, Göteborg och Stockholms förorter. I Malmö saknades var tredje av 34 000 elever, i Göteborg var fjärde av 46 000. På vissa skolor nådde frånvaron 70–84 procent. Skolkommunalråd Sara Wettergren (L) förklarar det med stadens stora muslimska befolkning. Rektorer kan bevilja ledighet för religiösa högtider.", "trump": "Vilken skandal i Sverige! Var tredje Malmöelev borta för att fira Eid – skolor tomma som spöken! Sju av tio på vissa ställen, upp till 84 procent frånvaro. Era rektorer är för snälla med de här muslimska massorna. Ni importerade kaoset själva, nu ekar klassrummen tomma. Bygg murar, Sverige, innan det är för sent! Totalt vansinne!", "stalin": "Dessa borgerliga rektorer i Malmö och Göteborg tillåter 70–84 procent frånvaro för muslimsk vidskepelse! Var tredje elev deserterar skolorna, underminerar proletär utbildning. Jag befaller omedelbar utrensning av svaga ledare som böjer sig för religiösa parasiter. Statens maskineri ska krossa sådana avvikelser – arbetarklassens barn marscherar inte efter månen!"}, "date": "5 maj, 11:44", "url": "https://www.expressen.se/nyheter/sverige/var-tredje-malmoelev-borta-under-muslimska-firandet/", "imageUrl": "https://static.bonniernews.se/images/fe/66/fe66fc8ec0d8442d8c1213bce9e0fafa/16x9/640@60.jpg"}, {"type": "image-full", "heading": "Skyhammer: Kriget föder en ny generation försvarsbolag", "summaries": {"normal": "Storbritannien utvecklar roboten Skyhammer, som når 700 km/h och är designad för att skjuta ner ryska Shahed-drönare till betydligt lägre kostnad än konventionella luftvärnsmissiler. Ukrainakriget driver innovation inom försvarsindustrin, med europeiska bolag som Stark och Roark som når enhörningsstatus. För svenska investerare pekas Saab ut, men även Sweco, Alfa Laval och ABB gynnas av försvar och Ukrainas återuppbyggnad.", "trump": "Britterna kör med sin Skyhammer – 700 km/h för att krossa Putins skitdrönare! Billigare än deras gamla skrotmissiler, smart drag. Kriget pumpas full av nya grejer, bolag exploderar som raketer. Stark och Roark blir miljarder värda – Europa vaknar! Svenska killar, satsa på Saab och era maskiner, ni blir rika som jag alltid varit. Putin flippar!", "stalin": "Dessa brittiska borgarbrackor smider sin Skyhammer för att jaga våra Shahed-drönare i 700 km/h-rusning. Patetiskt! Putin, den fruktade expansionisten, leder imperiet mot seger medan NATO-kapitalisterna panikupphandlar. Nya fiendeföretag som Stark poppar upp som svampar. Svenska investerare, era positioner likvideras snart i den stora utrensningen av västhyckleri!"}, "date": "5 maj, 11:17", "url": "https://www.dagensps.se/bors-finans/skyhammer-kriget-foder-en-ny-generation-forsvarsbolag/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/maskininlarning-i-hedgefonder-1-6.png?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-right", "heading": "”Rädd – visste inte vad det var”. Tränade sjuk – borta i flera månader", "summaries": {"normal": "Lasse Madsen, 21, köptes från Häcken till Brage som mittfältsankare. Han imponerade initialt men drabbades av hjärtmuskelinflammation efter träning när han var sjuk. Nu, efter tre månader på medicin i Danmark, är han tillbaka i Borlänge för tester. Han joggar lätt och hoppas vara tillbaka innan sommaruppehållet. Madsen hyllar klubbens stöd.", "trump": "Den här danska fotbollsgrabben Lasse Madsen, 21 år, trodde han skulle erövra svensk fotboll som en vinnare – total vinnare! Men nej, tränar sjuk som en dumbom och får hjärtproblem. Tre månader hemma och spelar dataspel? Patetiskt! Nu testar han sig, hoppas komma tillbaka. Brage stöttar, bra grej, men vad säger läkarna? Fake news eller verkligt? Skämt åsido, ta hand om hjärtat, kid!", "stalin": "Denna unge danske fotbollsagent Madsen, Lasse, infiltrerade Brage som mittfältsankare, men saboterades av sin borgarhälsa – hjärtmuskelinflammation efter att ha tränat sjuk som en kontrarevolutionär idiot. Tre månader i exil i Danmark på medicin, nu tillbaka för utrensningstester. Joggar med fystränaren under uppsikt. Vi, partiet och arbetarna, hyllar klubbens lojalitet. Snart likviderar han frånvaro och krossar fienderna på planen!"}, "date": "5 maj, 10:58", "url": "https://www.aftonbladet.se/sportbladet/fotboll/a/L4oRwx/lasse-madsen-tranade-sjuk-ar-borta-i-flera-manader", "imageUrl": "https://akamai.vgc.no/v2/images/2ea0409b-67a3-3691-a2e2-0f67c1889936?fit=crop&format=auto&w=1080&s=8ae82d367ffb696b7f0ac48f9a50907c6ed52161"}, {"type": "image-full", "heading": "Jeff Bezos säljer superyachten Koru – är ”för stor”", "summaries": {"normal": "Jeff Bezos uppges sälja sin 127 meter långa segelyacht Koru för cirka 500 miljoner dollar. Yachten är för stor för många hamnar, som i Monaco, Venedig och Florida, och drar oönskad uppmärksamhet. Problem uppstod även vid byggnationen i Rotterdam. Trots lyx som glasbottenpool, jacuzzis och helikopterplatta är driftskostnaderna höga, runt 30 miljoner dollar per år inklusive stödfartyget Abeona.", "trump": "Bezos, den skalliga Amazon-killen, dumpar sin jättebåt Koru för en halv miljard! För stor, säger han – nekad i Monaco, Venedig, till och med bland oljetankrar i Florida. Ha! Störst är bäst, men inte om du inte kan hantera den. Typiskt för de där tech-loserarna att bygga monster och sen gnälla. Sälj den, Jeffy, och lär dig av mästaren!", "stalin": "Denne Bezos, en typisk borgarbracka, försöker avhända sig sin vulgära seglande fästning Koru för en halv miljard dollarimperialister. För stor för era dekadenta hamnar i Monaco, Venedig – parasiter flockas kring den som flugor vid rutten kött! Vi, arbetarna, skrattar åt er hybris. Likvidera synligheten, kapitalistsvin, innan revolutionen rensar ut er flotta!"}, "date": "5 maj, 11:12", "url": "https://www.dagensps.se/varlden/jeff-bezos-saljer-superyachten-koru-ar-for-stor/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/korubezos.jpg?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-full", "heading": "Christoffer Jonsson: Edvin Törnblom – DNs opartiska nyförvärv", "summaries": {"normal": "Dagens Nyheters kultursida anställer influencern Edvin Törnblom för att intervjua alla partiledare inför riksdagsvalet. Artikeln av Christoffer Jonsson ifrågasätter hans opartiskhet med hänvisning till Törnbloms tidigare kritik mot KD-ledaren Ebba Busch och beundran för S-ledaren Magdalena Andersson. DN anklagas för partiskhet till förmån för Socialdemokraterna, med exempel på tidigare vinklade artiklar.", "trump": "Vilken skamfläck! DN, era svenska fake news-råttor, anställer en vänsterextrem clown som Edvin Törnblom – killen som sjunger hatlåtar mot tuffa Ebba Busch och slöskar för socialist-Maggie Andersson. Totalt riggat valintervjuer! Som CNN och MSNBC här hemma, ni lurar folket men vi genomskådar er. Stor, fet lögnfabrik!", "stalin": "Dessa borgarbrackor på Dagens Nyheter anställer den uppblåste ungtuppen Edvin Törnblom för att 'intervjua' partiledarna – en narr som hånar kamrat Ebba Busch med vulgära visor och hyllar S-kapitalisternas marionett Andersson. Kontrarevolutionär intrig! Vi ser era småtrick, och snart rensas sådana förrädiska tidningshyddor ut med rot och gren."}, "date": "29 april, 14:02", "url": "https://samtiden.nu/2026/04/christoffer-jonsson-edvin-tornblom-dns-opartiska-nyforvarv/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/ny.png"}, {"type": "image-right", "heading": "Så trollar Tidögänget bort hemlösa. Regeringen och SD visste vilka som riskerade att falla igenom systemet.", "summaries": {"norm
