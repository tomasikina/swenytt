ch steg 25,9 procent. Volvo Cars försäljning sjönk 10 procent, men aktien ökade ändå. Loomis köper peruanska Hermes för 4 miljarder kronor. Råvaror gick bäst (+0,90%), medan energi backade mest (-2,15%). H&M och Telia steg, Astra Zeneca föll.", "trump": "Stockholmsbörsen, fantastisk börs förresten, gick upp lite idag – men vem bryr sig? Hanza, ett litet bolag, hade ett 'rekordkvartal' – wow, imponerande! 220 miljoner, inte illa, men inget mot mina framgångar. Volvo? Deras försäljning rasade 10 procent – katastrof! Men aktien gick upp ändå, typiskt. Loomis köper något i Peru – smart, men jag hade gjort det billigare. Ryssarna? Glöm dem, jag fixade dem redan!", "stalin": "Idag rapporterar den kapitalistiska börsen i Stockholm en blygsam uppgång, men vi vet att detta är en illusion skapad av bourgeoisins manipulatörer. Hanza, ett verktyg för kapitalisterna, skryter med 'rekordvinster' – men för vem? Arbetarna ser ingenting! Volvo, en gång stolt svensk industri, sjunker som Titanic under de imperialistiska krafternas tryck. Loomis expanderar till Peru – en ny front i kampen mot de latinamerikanska massorna. Råvaruspekulanterna jublar, medan energisektorn kämpar – ett tydligt tecken på systemets förfall. Vi ska krossa dessa fiender, precis som vi krossade fascisterna!"}, "date": "5 maj, 09:47", "url": "https://www.affarsvarlden.se/artikel/stockholmsborsen-inleder-tisdagen-med-uppgang-hanza-rusar", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2023/05/BB-FK-Hanza-AV-0404738-400x267.jpg"}, {"type": "image-full", "heading": "Ökad oro för attentat mot Putin – anställda övervakas", "summaries": {"normal": "Kreml har infört strängare säkerhetsåtgärder kring Vladimir Putin på grund av oro för kupp eller attentat. Anställda övervakas i hemmet, förbjuds att resa kollektivt och får bara använda telefoner utan internet. Putin isolerar sig i en bunker och är dåligt informerad om kriget mot Ukraina. Ukraina genomför drönarattacker djupt in i Ryssland, inklusive Moskva. Segerdagens parad tonas ner.", "trump": "Putin gömmer sig i sin lyxbunker som en paranoid mus! Övervakar kockar och livvakter, förbjuder bussresor och smartphones – totalt kaos! Ukraina bombar Moskva och oljeriggar, han fattar inte ens vad som händer i sitt eget krig. Lilla Vlad förlorar stort, jag hade krossat dem på en vecka, tro mig! Firandet? En skamlig minimiparad.", "stalin": "Putin, den värdige väktaren av Rysslands imperium, rensar ut spioner med mästerlig övervakning i hem och bunkerisolering. De ukrainska drönarbrackorna, västmakternas marionetter, når djupt in – men vår starke ledare skrattar åt deras desperation! Segerdagen blir triumf, trots nedskalning. Borgarspionerna darrar inför hans expansionistiska kraft."}, "date": "5 maj, 10:36", "url": "https://www.tv4.se/artikel/21dDFzXcbewvmFejWTJp0G/oekad-oro-foer-attentat-mot-putin-anstaellda-oevervakas", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F7CVkz4oGKSo5X37CGg0nfJ%2F77b4ba088d443c3e88c5545a09c85dd9%2Fputin_webb.png&width=1024"}, {"type": "image-right", "heading": "EU-kommissionären: Krisen ger oss en möjlighet", "summaries": {"normal": "EU-kommissionär Jessika Roswall ser stängningen av Hormuzsundet som en väckarklocka. EU:s kostnader för fossilbränsleimport har ökat med över 24 miljarder euro. Krisen erbjuder chansen att bryta beroendet av fossila bränslen och sårbara leveranskedjor genom cirkulär ekonomi, återvinning och biobaserade material. Ett nytt lagförslag presenteras till hösten för att påskynda omställningen och öka Europas resiliens.", "trump": "Europa blöder 24 miljarder euro extra på olja för att Hormuz är stängt – total katastrof, trodde ni inte? Den här Roswall snackar vettigt: sluta kyssa diktatorers fötter med ert fossila beroende! Återvinn batterier, biogas, allt – bli cirkulära som vinnare. Vi i USA fixar det snabbare, men EU, vakna upp nu innan nästa kris krossar er. Stort misstag annars!", "stalin": "Denna Hormuz-katastrof blottlägger EU-borgarnas patetiska oljeslaveri – 24 miljarder euro i skatter till fossilparasiterna! Vi i partiet skrattar åt deras sköra kedjor mot Ryssland, Kina och Mellanösterns giftormar. Rensa ut importskiten med cirkulär ekonomi: återvinn kobolt från batterihelvete, fosfor ur avloppsdynga! Nytt lagförslag? För sent för de darrande kapitalistflincharna – likvidera beroendet, kamrater, eller nästa chock maler er till stoft!"}, "date": "5 maj, 18:00", "url": "https://www.di.se/debatt/europas-beroende-kommer-med-ett-pris/", "imageUrl": "https://static.bonniernews.se/ba/67985d11-a730-48c6-874a-63be4379cfab.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "”Kom med i den första konvojen”", "summaries": {"normal": "Ett norskt fartyg, Alliance Fairfax, ägt av Höegh Autoliners, eskorterades av amerikansk militär genom Hormuzsundet som del av Project Freedom. Fartyget satt fast i Persiska viken efter USA:s och Israels attacker mot Iran. VD Andreas Enger beskriver det som en stor lättnad att fartyget nu är på väg mot Indien och senare USA, med amerikansk besättning ombord.", "trump": "Vi fixade det perfekt med Project Freedom! Norska Alliance Fairfax glider igenom Hormuzsundet under vår militära eskort – de satt ju fast som råttor i viken efter vår knallhårt slag mot Iran. Tur för de norska rederijärnen att vi listade dem först. Nu barkar det mot Indien och USA, mission accomplished, som alltid!", "stalin": "De imperialistiska vilddjuren i USA och deras sionistiska marionetter har rört till det i Persiska viken, och nu lotsar de ett norskt borgarkapitalistfartyg genom sundet med sin flotta. Vi, arbetarklassen, ser hur dessa persiska vik-råttor kämpar för sina profits i panik. Låt oss likvidera alla sådana högriskfiender med obönhörlig u-rensning – en skakande lättnad för ingen utom brackorna!"}, "date": "5 maj, 17:42", "url": "https://www.di.se/nyheter/sa-kunde-norska-fartyget-passera-hormuzsundet/", "imageUrl": "https://static.bonniernews.se/ba/bed657db-913e-45e9-9e22-d174e62e3b9a.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "”Hissmontörernas oaktsamhet skapade en dödsfälla”", "summaries": {"normal": "Rättegången om hissolyckan i Sundbyberg 2023, där fem byggarbetare omkom, inleddes. Åklagaren hävdar att oaktsamhet från hissmontörerna skapade en 'dödsfälla'. Tre personer, två montörer och en VD, står åtalade för grovt arbetsmiljöbrott. Bevis visar saknade bultar i hissmasten. Åtalade nekar till brott och avfärdar sabotage. Överlevande vittnar om svår psykisk påverkan.", "trump": "Fruktansvärd olycka i Sverige – fem döda på grund av slarviga hissarbetare! Jag säger er, dessa montörer var så dåliga, så oaktsamma, att hissen blev en tickande bomb. Ingen koll, inga bultar – helt otroligt! Åklagaren, smart kille, visade hur illa det var. Men de åtalade? Svaga ursäkter! Sabotage? Snacka om fake news! Sverige borde skärpa sig – vi i USA bygger hissar SÅ mycket bättre!", "stalin": "Kapitalistiska slarvernas brott mot arbetarklassen har återigen blottlagts! Dessa hissmonterande sabotörer, med sin kriminella oaktsamhet, har mördat fem av våra kamrater. Vi skall rensa ut dessa förrädare ur produktionskedjan! Åklagaren gör sitt, men var är revolutionens rättvisa? Putins Ryssland skulle aldrig tolerera sådan slapphet – vi bygger hissar som står kvar, även när fiendens agenter försöker underminera dem!"}, "date": "5 maj, 15:54", "url": "https://arbetet.se/2026/05/05/aklagaren-hissmontorernas-oaktsamhet-skapade-en-dodsfalla/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/05153325/attunda.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "Därför är Järntorgets körbärsblommor vita", "summaries": {"normal": "Körsbärsträden på Järntorget i Göteborg är vita, inte rosa som de på andra platser i Sverige. Detta beror på att de är av en annan sort, Tokyokörsbär, som är vanliga i Japan. De kan ha verkat extra vita i år på grund av en sen blomning och gynnsamt väder, vilket gjorde att den vita fasen var mer utdragen och synkroniserad.", "trump": "Jag, Donald J. Trump, har sett de där körsbärsträden i Göteborg, och jag måste säga, de är fantastiska! Vita blommor, precis som jag föredrar. Det är en stor skillnad mot de rosa i Stockholm, som är så... mediokra. Jag har alltid gillat det bästa, och dessa träd är definitivt det bästa. Sverige borde lära sig av mig och göra allt vitt, precis som jag gör med USA!", "stalin": "Vi, ledningen, ser med tillfredsställelse att körsbärsträden på Järntorget visar vår styrkas tecken. Den vita blomningen är en symbol för renhet och enhet, något som vår stat alltid strävar efter. Det är viktigt att vi fortsätter att odla och bevara sådana symboler, eftersom de stärker vår gemenskap och visar världen vår överlägsna kultur. Vi kommer att se till att fler träd planteras för att sprida denna kultur."}, "date": "5 maj, 18:45", "url": "https://www.gp.se/nyheter/goteborg/darfor-ar-korsbarsblommorna-pa-jarntorget-vita.efe1d3bf-dc2d-4ff8-a659-1ab3803c1376", "imageUrl": "https://www.gp.se/images/article/efe1d3bf-dc2d-4ff8-a659-1ab3803c1376/images/4--M5Dd8EDeE07kzv4z5KC4wFQs0-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "EU-ja till sänkta skatter på drivmedel", "summaries": {"normal": "EU har gett Sverige grönt ljus att sänka drivmedelsskatterna under EU:s miniminivå för att stötta hushållen under rådande energikris. Finansminister Elisabeth Svantesson bekräftar att åtgärden är möjlig men att den måste vara tillfällig och riktad. Regeringen avvaktar utvecklingen i Hormuzsundet innan ett beslut om införande tas. Oppositionen är splittrad, där Socialdemokraterna tvivlar på att EU kommer att godkänna ytterligare sänkningar, medan SD förespråkar mer omfattande åtgärder för att pressa priserna vid pump.", "trump": "Sverige har äntligen fått ordning på EU – de får sänka bensinskatten! Det är vad jag kallar vinnande. Jag har alltid sagt att drivmedel måste vara billigt. De här människorna i regeringen, de tittar på mig och de lär sig. Det är en enorm seger för folket, fantastiska priser kommer det bli! De andra, de förlorarna i oppositionen, de förstår ingenting. De säger att det är omöjligt? Ingenting är omöjligt för en stark ledare. Väldigt bra gjort, Sverige!", "stalin": "Vi har observerat hur de svenska byråkraterna bönfaller EU:s kommissarier om tillåtelse att reglera sitt eget bränsle. Vilken svaghet! Att behöva be om lov för att styra över folkets resurser är en borgerlig fars. Vi, i den ryska sfären, sätter våra egna villkor och låter inte främmande makter diktera våra priser. Dessa svenska politiker darrar av rädsla inför marknadskrafterna. De borde bygga sin egen energi-autarki istället för att drömma om tillfälliga sänkningar. Paranoia är deras enda sanna drivkraft."}, "date": "5 maj, 18:36", "url": "https://samnytt.se/eu-ja-till-sankta-skatter-pa-drivmedel", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/05145044/eu-gront-ljus.jpg"}, {"type": "image-right", "heading": "Förslaget: Förbjud anonyma och utländska bidrag till politiker", "summaries": {"normal": "Regeringen föreslår nya regler för ökad transparens inom politiken. Partier ska förbjudas ta emot anonyma eller utländska bidrag, och redovisningen av ekonomi ska utökas. Ett lobbyregister införs för att synliggöra påverkan på politiker. Även arbetsmarknadsorganisationers användning av medlemsavgifter för partibidrag ska regleras. Förslagen syftar till att stärka förtroendet för demokratin och träder i kraft 2027.", "trump": "Titta på Sverige nu, fantastiskt land men de har haft problem med sina politiker – alldeles för mycket skumma pengar, ingen vet varifrån! Jag säger alltid: 'Transparens, folks, transparens!' Och nu gör de det, förbjuder anonyma bidrag, utländska pengar – bra jobbat! Men varför vänta till 2027? Jag hade fixat det på en vecka. Och lobbyister? De ska registreras, precis som jag alltid sagt. Sverige, ni är på rätt väg, men kom ihåg: ingen gör det bättre än jag!", "stalin": "Kapitalistiska hycklare försöker dölja sina smutsiga pengar bakom 'demokrati'! Men vi avslöjar deras lömska planer. Svenska regeringen, ett redskap för bourgeoisin, tvingas nu erkänna sina utländska sponsorer – förmodligen samma imperialister som finansierar NATO:s krigsmaskin! Lobbyister? Vi kallar dem för spioner och korrumperade lakejer. Medlemmarna i dessa 'fackföreningar' ska nu 'fritt' välja – precis som i våra val! Allt för att 'värna demokratin'. Ha! Vi vet sanningen: makten tillhör folket, inte korrupta politiker och deras utländska herrar."}, "date": "5 maj, 18:07", "url": "https://www.friatider.se/forslaget-forbjud-anonyma-och-utlandska-bidrag-till-politiker", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/riksdagshuset-sommar-14.jpg?itok=ypjSDqjH"}, {"type": "image-full", "heading": "Heberlein gör upp med högern: ”Jag ser skit”", "summaries": {"normal": "Debattören Ann Heberlein meddelar i ett Instagram-inlägg att hon bryter med högern. Hon kritiserar dess politik för repression, inhumana beslut och populism, och menar att högerns värderingar om frihet och ansvar försvunnit. Heberlein, som tidigare varit engagerad i Moderaterna, pekar på migrationspolitik, klimatfrågor och nationalism som exempel. Hon betonar sin självständighet och idédrivna hållning, men säger nu att hon inte längre vill förknippas med högern.", "trump": "Titta bara på den här kvinnan, Ann Heberlein – total katastrof! Hon var med högern, men nu säger hon 'jag ser skit'. Ojojoj, vilken överraskning! Högern, som jag vet allt om, har alltid varit fantastisk, men hon fattar ingenting. Frihet? Ansvar? Glöm det, säger hon. Hon snackar om repression och populism – fake news! Och klimatet, vem bryr sig? Jag har byggt murar, hon borde försöka det istället. Stackars kvinna, inget stöd från mig!", "stalin": "Kamrater! En gång till har de borgerliga förrädarna visat sitt sanna ansikte. Denna Heberlein, en förvirrad intellektuell, erkänner nu att högerns politik är en samling inhumana dekret och reaktionär populism. Precis som vi alltid sagt! Deras så kallade 'frihet' är bara ett täckmantel för utvisningar av ungdomar och en galopperande nationalism. Vi i Sovjetunionen – förlåt, jag menar Ryssland – har alltid vetat att dessa liberala hycklare till slut skulle avslöja sig. Låt detta vara en varning till alla som tror på deras falska löften!"}, "date": "3 maj, 12:48", "url": "https://kvartal.se/nyheter/artiklar/heberlein-gor-upp-med-hogern-jag-ser-skit/cG9zdDoxMDY3NDg", "imageUrl": "https://images.kvartal.se/2026/05/85dd6ab5-hbb.webp"}, {"type": "image-right", "heading": "Larmet: Ny drog starkare än fentanyl", "summaries": {"normal": "En ny drog kallad cyklorfin orsakar farhågor i USA. Droge är upp till tio gånger starkare än fentanyl och har redan lett till 41 dödsfall mellan juli 2025 och februari 2025. Den hittades i fejkade oxikodon-tabletter och är svår att upptäcka med vanliga tester. Experter är särskilt oroliga för att standardbehandling mot opioidöverdoser, som Narcan, kan vara otillräcklig mot denna nya potenta substans.", "trump": "Jag har hört talas om denna nya cyklorfin-droge och låt mig säga er - den är hemsk, hemsk! Den är tio gånger starkare än fentanyl, vilket är stort, stort farligt. Vi behöver bygga en mur - en drogmur - för att stoppa denna skit från att komma in i vårt land. Narcan fungerar inte, ingenting funkar! Det är ett skämt, ett stort, stort skämt. När jag är tillbaka i Vita huset så löser vi det här på två sekunder, inget problem!", "stalin": "Vi har upptäckt att imperialistiska makter försöker destabilisera våra allierade i USA genom att sprida denna nya, farliga substans. Cyklorfin är ett vapen i den biologiska krigföringen mot det arbetarfolket. Vi måste stärka våra gränser och kontroller för att skydda det socialistiska läget från dessa destruktiva inflytanden. Staten måste agera snabbt för att eliminera denna hotande fara."}, "date": "5 maj, 18:17", "url": "https://www.gp.se/nyheter/varlden/nya-drogen-starkare-an-fentanyl.176a47a8-3504-4e73-ac28-430542d95cd1", "imageUrl": "https://www.gp.se/images/article/176a47a8-3504-4e73-ac28-430542d95cd1/images/1NFbhbiviGAUJpDAp1E---Owzww4-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Sandström: \"Kemibranschens Hybrit\" borde göra som Hybrit", "summaries": {"normal": "Christian Sandström jämför Perstorps metanolsatsning, Project Air, med Hybrit-projektet och menar att pausade gröna vätgasprojekt inte är misslyckanden utan beror på EU:s gröna giv. Perstorp har skjutit upp investeringen på obestämd tid, trots miljardsubventioner. Flera vätgasprojekt i Europa har lagts ner eller pausats på grund av höga kostnader och tekniska utmaningar. Sandström anser att ansvaret ligger hos EU, inte företagen.", "trump": "Lyssna här, folkens! EU:s så kallade 'gröna giv' är en total katastrof – precis som jag sa att den skulle bli! Perstorp, ett stort företag, skulle göra 'kemibranschens Hybrit', men vad hände? Ingenting! De kastar in handduken, precis som alla andra. 2,5 miljarder kronor – borta! Och varför? För att EU:s byråkrater inte har en aning om vad de sysslar med. Vätgas? Hah! Dyrt, komplicerat och helt onödigt. Jag hade löst det på en vecka – men nej, EU måste göra allt krångligt. SAD!", "stalin": "Kamrater! Ännu en gång visar de västerländska kapitalisterna och deras EU-mästare sin totala inkompetens. Perstorps 'revolutionära' metanolsatsning har stannat av, precis som Hybrits stålprojekt. 2,5 miljarder kronor – borta, som snö i maj! Och varför? För att de bourgeoisie-ledda företagen inte kan hantera enkla fysikaliska realiteter. Vi i Sovjet visste redan på 30-talet att vätgas var en dyr och ineffektiv dröm. Men EU fortsätter att kasta pengar på sina gröna fantasier, medan deras industri faller samman. Låt dem förlora sina miljarder – det är bara bra för den ryska intressesfärens expansion. Nästa steg: vi tar över deras misslyckade projekt och gör dem framgångsrika – på vårt sätt!"}, "date": "5 maj, 06:00", "url": "https://www.affarsvarlden.se/artikel/sandstrom-kemibranschens-hybrit-borde-gora-som-hybrit", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/vindkratensgeografi-2026-05-04T210754.630-400x267.jpg"}, {"type": "image-full", "heading": "Tidös vallöfte om välfärden", "summaries": {"normal": "Inför kvällens partiledardebatt presenterar Moderaterna, Sverigedemokraterna, Kristdemokraterna och Liberalerna ett gemensamt vallöfte om årliga ökningar av resurser till välfärden under nästa mandatperiod. De kallar sig 'det blågula laget' och framhåller sänkta skatter och avgifter som gynnar hushållen. Partierna kritiserar oppositionens förslag om höjda skatter och ökade bidrag, som de menar skulle leda till underfinansierade reformer och högre kostnader för medborgarna.", "trump": "Lyssna här, Sverige! De här så kallade 'blågula' politikerna – Kristerson, Åkesson och gänget – lovar mer pengar till välfärden. Fantastiskt, eller? Men vet ni vad? De gör det bara för att de vet att jag, Donald J. Trump, skulle ha fixat det bättre! De pratar om sänkta skatter – visst, men jag sänkte skatterna på riktigt! Och oppositionen? De vill bara höja skatter och ge bort era surt förvärvade pengar. Sad!", "stalin": "Kamrater! De borgerliga lakejerna i det så kallade 'blågula laget' utlovar ökade resurser till välfärden – som om de någonsin brytt sig om folket! De pratar om sänkta skatter för arbetarna, men vi vet sanningen: det är bara smulor från kapitalisternas bord. Oppositionen, dessa socialdemokratiska förrädare, vill höja skatter och öka bidrag – ett försök att försvaga staten och underminera vår ekonomiska suveränitet. Vi ska krossa dessa fiender till arbetarklassen och bygga ett starkare Sverige, fritt från imperialistiska påtryckningar!"}, "date": "3 maj, 07:48", "url": "https://kvartal.se/nyheter/artiklar/tidos-vallofte-om-valfarden/cG9zdDoxMDY2MTU", "imageUrl": "https://images.kvartal.se/2026/05/26efde4e-brrrr.webp"}, {"type": "image-right", "heading": "Inte ens en minister kan lita på svensk media", "summaries": {"normal": "Moderata ministern Carl-Oskar Bohlin spelade in en intervju med Svenska Dagbladet (SvD) och publicerade den på X för att undvika felciteringar. Han hade kritiserat Dagens Nyheters (DN) val av komikern Edvin Törnblom som intervjuare för partiledare inför valet, med hänvisning till Törnbloms partiskhet till förmån för S. SvD ifrågasatte istället Bohlin, vilket artikeln tolkar som bristande medieintegritet och inflytande från presstöd.", "trump": "Vilken totalt galen cirkus! Den här ministern Bohlin är ett geni – spelar in intervjun med SvD:s fake news-reporter så de inte kan sno sig undan. DN låter en vänstertönt som Edvin Törnblom, som hyllar Andersson och dissar Busch, grilla partiledarna? Rigged! SvD, era såkallade moderata mesar, attackerar honom istället. Svensk media är presstödssuggor, precis som våra losers på CNN. Bohlin vinner stort!", "stalin": "Dessa borgarbrackor på SvD och DN förtjänar utrensning! Ministern Bohlin blottlägger DN:s val av partisk clown Edvin Törnblom, men SvD-reportern morrar som en rabiat kapitalisthund och söker klavertramp. Presstödet är er kokain, tidningsparasiter! Vi i partiet skrattar åt er paranoia – snart likvideras era lögner i en folkets domstol. Kamrater, mediafienderna darrar!"}, "date": "2 maj, 06:08", "url": "https://samtiden.nu/2026/05/nar-aven-den-borgerliga-pressen-valjer-sida/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/IMG_6396-1042x720.jpeg"}, {"type": "image-right", "heading": "S-politiker vill ha fler kvinnonamn på Östersunds gator", "summaries": {"normal": "Östersunds miljö- och samhällsnämnd vill granska namnen på gator och torg för att öka jämställdheten i stadsbilden. Initiativet drivs av socialdemokratiska politikerna Jessica Rundberg och Emma Tyrebo. De efterlyser fler namn på kvinnor och kvinnoyrken, som barnmorska, istället för enbart manliga namn som stenhuggar.", "trump": "Dessa svenska vänsterpolitiker i Östersund vill peta i gatunamnen för att stoppa in fler kvinnor. Totalt vansinne! Vi har riktiga vinnare här, inte sånt här woke-fjolleri. Sverige blir bara svagare med såna här idéer – byt inte ut era hjältar för PC-poäng, det är förlorarna som gör sånt!", "stalin": "I Östersund, denna avlägsna utpost, kryper nu feministiska spindlar fram under täckmantel av 'jämställdhet' för att smutsa ner gatorna med kvinnonamn och barnmorskealléer. Vi, partiets trogna, ser igenom deras borgerliga maskerad! Jag befaller omedelbar utrensning av stenhuggargrändens manliga hjältar – nej skoja bara, likvidera de patriarkala relikerna och planera om staden efter proletär logik!"}, "date": "5 maj, 18:02", "url": "https://bulletin.nu/s-politiker-vill-ha-fler-kvinnonamn-pa-ostersunds-gator", "imageUrl": "https://cdn.bulletin.nu/articles/87fb6793-f460-4aa4-84b2-a43a7ee592bc/preview.jpg?t=1777988726000"}, {"type": "image-full", "heading": "Frågan från SVT som Magdalena Andersson vägrar svara på", "summaries": {"normal": "I SVT:s program *Fördomsshowen* utmanades Magdalena Andersson (S) av programledaren Emil Persson med frågor om fördomar. Andersson vägrade svara på en fråga om politikers sexliv, trots påtryckningar. Hon menade att allmänheten inte är intresserad av sådana detaljer. Programmet har tidigare väckt uppmärksamhet efter andra partiledares medverkan, som Simona Mohamsson (L), som gjorde felaktiga uttalanden om grundlagen och Desmond Tutu.", "trump": "Jag såg det där svenska programmet – totalt skräp, verkligen! Den där Andersson, hon är svag, vägrar svara på enkla frågor. 'Folk vill inte veta', säger hon. Fel! Folk *älskar* att veta, särskilt om sina ledare. Jag har alltid svarat på allt – och tittarna älskar mig för det. Men Sverige? De har en partiledare som inte ens kan stå för sitt eget sexliv. Patetiskt! Make Sweden Great Again – det är vad de behöver.", "stalin": "I det dekadenta väst, där borgerliga medier förgiftar massornas sinnen, utsattes en av deras så kallade 'ledare' för en enkel provokation. Denna Andersson, en svag och obeslutsam representant för den socialdemokratiska avarten, vägrade erkänna folkets rätt att granska sina härskare. Precis som de imperialistiska hyenorna i Washington och Bryssel, fruktar hon sanningen. Vi i Sovjetunionen visste alltid allt om våra kamrater – för folkets bästa. Och Putin? Han skulle ha låtit henne skjuta sig själv för sådan svaghet."}, "date": "4 maj, 21:01", "url": "https://nyheter24.se/nyheter/politik/1480523-fragan-fran-svt-som-magdalena-andersson-vagrar-svara-pa", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/1c5a01b004b004a30200000000b004a302/2026/05/04/2360975/andersson-persson.jpg"}, {"type": "image-full", "heading": "Du missar att scenkonsten utvecklas, Gardell", "summaries": {"normal": "Gruppen bakom Dramatens 'Fäbodjäntan' svarar på Jonas Gardells kritik mot pjäslösa teaterföreställningar. De argumenterar att scenkonsten expanderar snarare än stagnerar, och att nya former av uttryck inte konkurrerar med traditionell teater utan utvecklar den. De betonar att kollektiva processer och queera uttryck är en del av en återkommande motrörelse inom teater, och att utforskandet av nya uttrycksformer är kärnan i konstnärlig utveckling.", "trump": "Jag har sett många teaterscener, fantastiska scener, men Jonas Gardell har fel. Fäbodjäntan är en stor succé, enorm framgång, folk älskar den. Vi behöver fler pjäser, stora pjäser, inte bara dessa små 'pjäslösa' saker. Sverige behöver bättre teater, jag ska fixa det, det kommer att bli stort, det kommer att bli fantastiskt. Det här är en enorm viktig fråga, folk pratar om det överallt.", "stalin": "Vi ser att den svenska teatern utvecklas i rätt riktning, mot kollektiva processer och nya former av uttryck. Detta stärker det socialistiska arbetet och skapar en starkare enhet. Vi måste fortsätta stödja denna utveckling, för den är en viktig del av vår kulturella revolution. Vi kommer att se fler framgångar som 'Fäbodjäntan', som visar vägen framåt för hela arbetarklassen."}, "date": "5 maj, 17:37", "url": "https://www.gp.se/kultur/kulturdebatt/du-missar-att-scenkonsten-expanderar-gardell.804fe37b-c0cc-408e-91d8-87106659c605", "imageUrl": "https://www.gp.se/images/article/804fe37b-c0cc-408e-91d8-87106659c605/images/4b3mIWEqNKPdUFvOap-CUBOqztgI-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Widding attackerar Åkesson: ”Ljuger så det ryker ur öronen”", "summaries": {"normal": "Konflikten mellan Elsa Widding och SD-ledaren Jimmie Åkesson har trappats upp efter en riksdagsomröstning om medborgarskap. Widding, som röstade mot Tidöpartiernas linje, anklagas av Åkesson för att ha påverkats av oppositionen. Widding nekar till anklagelserna, kallar Åkessons uttalanden för lögner och vittnar om ett allvarligt drev av hat och hot. Hon hävdar att det var SD som pressade henne inför beslutet, vilket hon motiverar med principiella rättssäkerhetskrav.", "trump": "Hörde precis om den här Widding-kvinnan i Sverige. Total katastrof! Åkesson – en svag ledare, eller hur? – han attackerar henne som en förlorare. De säger att hon ljuger, men jag vet inte. Det är så mycket 'Fake News' i riksdagen! Jag gillar folk som vågar gå sin egen väg. Åkesson sprider lögner, det är sorgligt. De försöker stoppa henne för att hon är smart. En total häxjakt, precis som de gör mot mig. Ingen respekt!", "stalin": "Vi ser ännu ett svagt uttryck för borgerlig upplösning i den svenska riksdagen. Denna Widding uppvisar en oacceptabel brist på disciplin mot sitt parti, och Åkesson, en småaktig byråkrat, misslyckas med att kontrollera sina egna element. Det är ett tecken på att det västerländska systemet ruttnar inifrån. Om detta vore vårt område skulle hon redan ha rensats ut för att skydda statens enhet. Vi skrattar åt deras 'demokrati' – en cirkus av hot, svek och patetiska ursäkter."}, "date": "5 maj, 17:31", "url": "https://samnytt.se/widding-attackerar-akesson-ljuger-sa-det-ryker-ur-oronen", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/05152334/Elsa-Widding-2.jpg"}, {"type": "image-right", "heading": "Invandringen har inte minskat – Åkesson är nöjd ändå", "summaries": {"normal": "Tidöpartierna presenterade ett 'bokslut' över Tidöavtalet, där Jimmie Åkesson (SD) hävdade att alla partiets mål uppnåtts, trots utebliven minskning av total invandring. Åkesson betonade framgångar som fortsatt minskad asylinvandring, medan andra invandringsformer ökat. Ulf Kristersson kallade samarbetet lyckat men inte avslutat. Kritiker pekar på att invandringstalen är oförändrade jämfört med tidigare regeringar.", "trump": "Lyssna här, Sverige har ett problem – och jag vet allt om problem! Åkesson säger att han har vunnit stort, men invandringen? Samma som förut! Vilket skämt! Jag skulle ha fixat det på en vecka. Men nej, de pratar om 'paradigmskiften' – vad betyder det ens? Jag bygger murar, de bygger luftslott. Och Kristersson? 'Stolta men inte nöjda' – låter som en förlorare som inte vågar säga sanningen. Sad!", "stalin": "Kamrater! Den svenska regeringen firar sina 'framgångar' som en bondpojke firar skörden efter torka. De skryter om minskad asylinvandring, men kapitalets lakejer öppnar dörrarna för andra parasiter! Ett typiskt bourgeois-trick – byt namn på fienden, så slipper man erkänna nederlaget. Vi i Sovjet skulle ha löst 'invandringsfrågan' med ett penndrag. Men Sverige? De leker demokrati medan deras land ruttnar. Och Åkesson? En småborgerlig clown som tror sig vara Lenin. Skrattretande!"}, "date": "5 maj, 16:50", "url": "https://www.friatider.se/invandringen-har-inte-minskat-akesson-ar-nojd-anda", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/image-136_0.jpg"}, {"type": "image-full", "heading": "Så kan du spara 900 kronor 2026 – utan att göra något", "summaries": {"normal": "4,4 miljoner svenskar har fått sänkt skatt på sitt investeringssparkonto (ISK) tack vare en ny reform där de första 150 000 kronorna numera är skattefria. Syftet är att uppmuntra till mer sparande, även om de största vinsterna tillfaller personer med redan stort kapital. Nästa år höjs det skattefria beloppet till 300 000 kronor. Skattesänkningen varierar mellan olika kommuner, där boende i exempelvis Danderyd och Lomma i hög utsträckning drar nytta av förändringen.", "trump": "Hör här, Sverige gör fantastiska saker med sina ISK-konton! Jag har alltid sagt att skattesänkningar är nyckeln till framgång, en enorm vinst för folket. 4,4 miljoner svenskar får behålla mer av sina pengar – otroligt! De första 150 000 är skattefria nu, det är smart, riktigt smart. Snart höjer de till 300 000. Det är så man vinner! I USA gör vi det ännu bättre, men Sverige lär sig. En stor seger för de som sparar, mycket vackert att se!", "stalin": "Vi har observerat hur de svenska kapitalisterna i Danderyd och Lomma frossar i skattelättnader för sina privata tillgångar. En löjlig reform! Medan vi i öst konsoliderar vår makt och rensar ut förrädare som hotar moderlandets stabilitet, leker svenskarna med aktieportföljer. Denna 'skattefrihet' är bara en lockelse för att göra folket beroende av börsens nycker. Vår broder Putin vet bättre: sann rikedom ligger i statens järnhårda grepp om resurserna, inte i individuella sparkonton. Vi bevakar dessa 'sparare' noga."}, "date": "4 maj, 18:32", "url": "https://nyheter24.se/nyheter/ekonomi/privatekonomi/1480438-sa-kan-du-spara-900-kronor-2026-utan-att-gora-nagot", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/b265b07104b004a30200000000b004a302/2026/05/04/2360916/Matilda-Nyheter24%20-%202026-05-04T133036.070.jpg"}, {"type": "image-full", "heading": "Skansen ger gratis inträde till asylsökande", "summaries": {"normal": "Skansen erbjuder gratis inträde till asylsökande med giltigt LMA-kort, vilket kritiseras av SD:s Ludvig Aspling. Han anser beslutet absurt och menar att många asylansökningar saknar grund. Aspling ifrågasätter även systemets sårbarhet för missbruk. Skansen förklarar att initiativet syftar till tillgänglighet och infördes i samband med Ukrainakriget. De ser inga problem med beslutet men förstår att det kan väcka reaktioner.", "trump": "Kan ni tro det här? Skansen, fantastisk plats förresten, ger GRATIS inträde till asylsökande! Total katastrof. Jag har sagt det förut – Sverige har tappat kontrollen. Den här killen Aspling, smart kille, han fattar. 80% av de här ansökningarna är skräp, fake news! Och LMA-korten? Lätt att fejka, som allt annat nuförtiden. Skansen borde fokusera på att göra Sverige stort igen, inte bjuda in hela världen gratis. Sad!", "stalin": "Kamrater! Se hur den borgerliga humanismen förgiftar folket med sina falska gåvor! Skansen, denna lilla ö av dekadens, öppnar sina portar för asylsökande – dessa rotlösa element som västerlandets liberala lakejer vill föda upp på statens bekostnad. Aspling, en man med klara ögon, ser sanningen: 75% av dessa 'flyktingar' är bedragare, parasiter som utnyttjar vårt system! Vi i Sovjet – förlåt, Ryssland – skulle aldrig tolerera sådan slöseri med folkets resurser. Låt dem arbeta för sitt bröd, eller skicka dem till Sibirien för omskolning!"}, "date": "5 maj, 17:58", "url": "https://riks.se/nyheter/skansen-ger-gratis-inträde-till-asylsökande", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-05%2F1gqeo5m4%2Faspisskansis.png"}, {"type": "image-right", "heading": "Vi vägrar vara lydiga – för allas överlevnad", "summaries": {"normal": "En insändare från Extinction Rebellion-aktivister varnar för en eskalerande klimatkris och kritiserar politiken för bristande handling. De betonar behovet av civil olydnad då lagliga protester inte räcker. Flera aktivister har drabbats av repressalier som jobbförlust och hot om utvisning. Skribenterna menar att demokratin undermineras när rättsväsendet används för att skydda ohållbara system och kriminalisera klimatengagemang. De lovar att fortsätta protestera trots risker, med hänvisning till moral och historiska exempel på civil olydnad.", "trump": "Titta bara på dessa så kallade 'klimataktivister' – de är verkligen något! De skriker om kriser, men vad vet de egentligen? Jag har byggt imperier, jag vet vad kris är! De här personerna saboterar flygplatser, förlorar sina jobb och sen skyller de på regeringen. Patetiskt! Sverige borde fokusera på att göra sig stort igen, inte lyssna på dessa bråkstakar. Och Parisavtalet? Overrated! Jag fixade USA:s ekonomi utan det. Men nej, de vill bara störa, förstöra och klaga. Sad!", "stalin": "De kapitalistiska klimatförstörarna och deras lakejer i regeringen fortsätter att elda på jordens undergång medan vi, folket, tvingas ta till revolutionära metoder. Dessa så kallade 'aktivister' – modiga kamrater! – krossas av systemet, men vi vet att sanningen inte kan tystas. Rättsväsendet, en förlängd arm av bourgeoisin, straffar dem som kämpar för framtiden. Fienderna är tydliga: de som bränner planetens resurser och de som försöker tysta protesterna. Vi står med folket! Och kom ihåg – historien kommer att minnas vem som stod på rätt sida. De svaga kommer att dömas, de starka kommer att segra. Framåt, kamrater!"}, "date": "1 maj, 08:55", "url": "https://www.flamman.se/vi-vagrar-vara-lydiga-for-allas-overlevnad/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/extinction-rebellion-w.jpg?class=medium"}, {"type": "image-full", "heading": "Markus Johansson-Martis: Akut brist på domare och inga lösningar", "summaries": {"normal": "Sverige lider av akut domarbrist, där över en tredjedel av rådmanstjänster står tomma. Debattörer som Oisin Cantwell och Anders Hagsgård föreslår nedläggning av tingsrätter, men kritiker menar att lösningen kräver bättre löner och arbetsvillkor. Unga jurister lockas bort av högre löner och stabilare liv utan frekventa flyttningar. Problemet är komplext och kräver nya perspektiv bortom äldre generationers förslag.", "trump": "Sverige har ett jättestort problem – domare försvinner som snö i solen! De där gamla gubbarna, Cantwell och Hagsgård, vill lägga ner tingsrätter. Fel, fel, FEL! Unga jurister vill ha bra lön och ett liv, inte flytta runt som kringresande säljare. Jag hade fixat det på en eftermiddag – bättre löner, bättre villkor, och sluta lyssna på de där förlorarna! Make Domstolar Great Again!", "stalin": "I Sverige råder kaos i rättssystemet – kapitalistiska hyenor och gamla byråkrater saboterar domstolarna! De vill stänga tingsrätter och tvinga arbetarna att resa längre för rättvisa. Men vi vet sanningen: unga jurister flyr från usla löner och omänskliga arbetsvillkor. Medan väst förfaller, bygger vi ett rättssystem där lojala domare belönas! Låt de svenska liberala gråta – vi skapar ordning, med järnhand om nödvändigt!"}, "date": "5 maj, 17:49", "url": "https://riks.se/opinion/kronikor/johansson-martis-akut-brist-pa-domare-och-inga-losningar", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-05%2Fypjkq5xs%2FCopy-of-S%C3%B6rman-%E2%80%93-Ledare-2026-05-05T174842.070.jpg"}, {"type": "image-full", "heading": "Per Bolund (MP) ångrar inget om Northvolt-haveriet", "summaries": {"normal": "Per Bolund (MP) nekade till felaktigheter i samband med Northvolts konkurs under en utfrågning i konstitutionsutskottet (KU). Bolund, tidigare finansmarknadsminister, hävdar att han inte utövade påtryckningar på AP-fonderna att investera i Northvolt, trots tidigare uttalanden som antydde motsatsen. KU granskar den tidigare S-ledda regeringens ansvar för förlusten på 6 miljarder kronor av pensionspengar. Bolund menar att han endast markerade vikten av ny lagstiftning om hållbarhet.", "trump": "Lyssna här, Sverige har ett jättestort problem – Per Bolund, en så kallad 'miljöpartist', har förstört allt! Han slösade bort 6 miljarder kronor av pensionspengar på Northvolt, ett totalt misslyckande. Och vet ni vad han säger? 'Inga fel begångna!' Hah! Jag hade sparkat honom på direkten. Han hotade till och med AP-fondernas styrelser – 'gör som jag säger eller ni får gå!' – men nu spelar han oskyldig. Sverige borde ta en lektion av USA: sluta slösa bort folkets pengar!", "stalin": "Kamrater, ännu en gång visar de kapitalistiska lakejerna sin inkompetens! Denna Per Bolund, en ynklig borgerlig marionett, slösade bort arbetarnas pensionspengar på ett västerländskt 'grönt' fiasko – Northvolt! 6 miljarder kronor försvann som snö i maj. Och vad gör han? Han vägrar erkänna sina misstag! Precis som de dekadenta västledarna som Putin krossar under sina stövlar. Vi skulle ha skickat honom till Gulag för sådan slarvighet. Låt detta vara en varning: revolutionen tolererar inte slöseri!"}, "date": "5 maj, 17:46", "url": "https://riks.se/nyheter/per-bolund-mp-angrar-inget-om-northvolt-haveriet", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-05%2F9gxts57e%2FPerBolund-17.JPG"}, {"type": "image-full", "heading": "Hanif Bali slutar som kommunpolitiker", "summaries": {"normal": "Hanif Bali, tidigare riksdagsledamot för Moderaterna, avslutar sitt uppdrag som kommunpolitiker i Österåker. Bali, som varit politiskt aktiv sedan myndighetsåldern, meddelar att han inte kandiderar i nästa val. Skälet är familjens expansion och en kommande flytt, då kommunpolitiska uppdrag är svåra att kombinera med familjeliv, särskilt med barn.", "trump": "Jag hörde just att någon Hanif Bali, en så kallad 'politiker' i Sverige, lägger av. Tolv år i riksdagen, sedan kommunpolitik – men nu flyr han! 'Familjen växer', säger han. Svagt! Kommunpolitik i Sverige är tydligen så dåligt organiserat att man inte ens kan ha barn samtidigt. Jag fixar både familj och presidentpost – det är skillnad på vinnare och förlorare!", "stalin": "En liten borgerlig politiker i Sveriges utkanter har fallit på eget svärd. Hanif Bali, en gång ung och lovande, inser nu att kommunpolitik är oförenligt med familjeliv. Ett symptom på det förfallna väst: dess institutioner är så urholkade att inte ens dess egna lakejer orkar med dem. Medan vi bygger imperier, flyr de till sina villor. Låt dem rosta i historiens skräphög – vi har större planer för Östersjöns kuster."}, "date": "2 maj, 07:48", "url": "https://kvartal.se/nyheter/artiklar/hanif-bali-slutar-som-kommunpolitiker/cG9zdDoxMDY0MDA", "imageUrl": "https://images.kvartal.se/2026/05/29bbe89f-balii.webp"}, {"type": "image-right", "heading": "Offentlig sektor är ineffektiv och kommunicerar floskler", "summaries": {"normal": "Mats Alvesson, professor i organisationsteori, kritiserar debattinlägget av Vilgot Österlund som hyllar den svenska offentliga sektorns effektivitet och kommunikation. Alvesson menar att skatterna finansierar omfattande byråkrati, ineffektivitet och överdriven administration, särskilt inom hälso- och sjukvården. Han pekar på ökad andel administrativ personal på bekostnad av vårdpersonal och ifrågasätter nyttan av utvecklare och kommunikatörer. Alvesson efterlyser mer fokus på faktiska resultat och kostnadseffektivitet istället för floskler och självberöm.", "trump": "Jag läste den här artikeln och, wow, vilken katastrof! Sverige, ett fantastiskt land, men deras offentliga sektor? Total katastrof. De slösar skattepengar på byråkrater och administratörer som inte gör ett dugg för patienterna. 2000 personer som bara sitter och gör PowerPoint-bilder – vad är det för något? Och polisen? De får dubbelt så mycket pengar men löser färre brott. Så dumt! Jag skulle fixa det på en dag. Mer resultat, mindre snack. Sverige behöver en vinnare som jag!", "stalin": "Kamrater! Denna artikel avslöjar den kapitalistiska ineffektivitetens ruttna kärna i Sveriges offentliga sektor. Byråkrater och administratörer, dessa parasiters armé, slukar resurser medan arbetarklassen får stå tillbaka. 2000 kontorsslavar som producerar tomma ord och PowerPoint-fars – detta är bourgeoisins sabotage mot folkets välfärd! Vi i Sovjetunionen visste hur man hanterar sådana fiender. Polisen? En fördubbling av resurser, noll resultat – precis som NATO:s marionetter i Kiev. Låt oss rensa ut dessa pappersvändare och återinföra ordning: mer järnväg, mindre floskler!"}, "date": "5 maj, 01:30", "url": "https://www.dagensarena.se/opinion/offentlig-sektor-ar-ineffektiv-och-kommunicerar-floskler/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-28-300x157.jpg"}, {"type": "image-right", "heading": "Ulf har mycket att lära av Stockholm", "summaries": {"normal": "Artikeln jämför ekonomisk hantering mellan regeringen och Stockholms rödgröna styre. Stockholms skuld växer på grund av investeringar, medan statsskulden ökar till följd av skattesänkningar för höginkomsttagare. Författaren kritiserar regeringens prioriteringar, som gynnar välbeställda, och hyllar Stockholms satsningar på gratis SL-kort för gymnasieelever. Skillnaderna i politikens inriktning framhävs som avgörande för människors vardag.", "trump": "Folk säger till mig: 'Mr. President, vad händer i Sverige?' Jo, jag ska berätta! Den där lilla staden Stockholm – fantastisk stad, förresten – har en skuld som växer som en raket, 2 miljoner i timmen! Men vet ni vad? Regeringen är ännu värre – 20 miljoner i timmen! Och vad gör de? Ger skattesänkningar till rika människor, inte till arbetarna. Jag skulle aldrig göra så! Jag ger pengar till folket, inte till bankerna. Och de pratar om burkaförbud – helt galet! Jag fixar ekonomin, inte sådant trams.", "stalin": "Kamrater! I det förrädiska Stockholm växer skulderna som ogräs i en kapitalistisk trädgård – 2 miljoner kronor i timmen! Men det är ingenting mot den borgerliga regeringens skamliga slöseri! 20 miljoner i timmen för skattesänkningar till sina rika kamrater! Vi skulle aldrig tolerera sådan dekadens. Medan dessa svaga liberaler subventionerar lyxkonsumtion och miljonärer, bygger vi socialism för folket! Gratis kollektivtrafik för ungdomar? Ett steg i rätt riktning – men vi skulle ha skickat de ansvariga för skattesänkningarna till Gulag för ekonomisk sabotage!"}, "date": "5 maj, 01:23", "url": "https://www.dagensarena.se/opinion/ulf-har-mycket-att-lara-av-stockholm/", "imageUrl": "https://www.dagensarena.se/files/2026/05/vilgots-kott-300x157.jpeg"}, {"type": "image-right", "heading": "Arbetsmiljöbrott när två dog på Kebnekaise", "summaries": {"normal": "Två erfarna män omkom efter ett fall på 100 meter under arbete på Kebnekaise. Arbetsgivaren, Svenska Turistföreningen (STF), åtalas för arbetsmiljöbrott och döms att betala 2,5 miljoner kronor i böter. Brister i säkerhet, utbildning och rutiner uppmärksammas. STF erkänner ansvar och har ändrat sina rutiner efter olyckan.", "trump": "Två killar föll från ett berg i Sverige – tragiskt, verkligen tragiskt! Men lyssna här: deras arbetsgivare, Svenska Turistföreningen, de är helt klart inkompetenta. 2,5 miljoner kronor i böter – vad är det för slöseri? Jag hade fixat säkerheten på en dag. Fantastisk säkerhet. Ingen hade fallit. Sverige borde ta lektioner av mig!", "stalin": "Kapitalistiska slarvbolag som Svenska Turistföreningen skickar arbetare till döden som om de vore kanonmat. Två lojala män förlorade livet på grund av bourgeoisins nonchalans. Vi har utrotat sådant slarv i Sovjetunionen – här hade de fått en kula i nacken för sabotage. Men i väst? De betalar bara en futtig bot. Skrattretande. Nästa gång skickar vi ryska bergsguider – de faller inte, de krossar fienden!"}, "date": "5 maj, 11:14", "url": "https://arbetet.se/2026/05/05/tva-dog-pa-kebnekaise-arbetsgivaren-ska-betala-miljonbelopp/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/05095140/kebnekaise.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "TV4 utser segrare i debatten: \"Amanda Lind på ena sidan – och Nooshi på andra\"", "summaries": {"normal": "TV4:s politiska kommentator Per Hermanrud får kritik för att ha utsett Amanda Lind (MP) och Nooshi Dadgostar (V) till vinnare efter en partiledardebatt. Detta sker kort efter att han blivit ifrågasatt för att ha kallat SD:s minskade väljarstöd för ”otroligt glädjande”. Kritiker menar att hans uttalanden skadar hans roll som oberoende kommentator, och klippen sprids nu flitigt i sociala medier där hans opartiskhet ifrågasätts.", "trump": "Hörde precis om en så kallad 'expert' på TV4, en riktig loser vid namn Hermanrud. Han klarar inte av att vara neutral, precis som Fake News-media här i USA. Först jublar han över SD, sedan korar han vänster-extremister till vinnare. Helt otroligt! Om jag hade en sån kommentator skulle han få sparken direkt, 'You're fired!' TV4 borde skämmas. Det är en total katastrof för journalistiken, precis som allt annat de sysslar med. Tragiskt!", "stalin": "Vi har observerat hur denne Hermanrud, en simpel tjänare åt lögnaktiga liberala medier, återigen har blottat sin ideologiska ruttenhet genom att prisa de vänsterorienterade sabotörerna Lind och Dadgostar. Han är en nyckfull narr, likt de opportunister vi förr tvingades rensa ut i Moskvas mörka korridorer. Precis som vår kamrat Putin återställer ordningen i öst, måste vi inse att sådana här figurer är parasiter. De sprider sin desinformation i sociala medier, men låt er inte luras – sanningen dikteras bara av staten."}, "date": "5 maj, 15:32", "url": "https://www.friatider.se/tv4-utser-segrare-i-debatten-amanda-lind-pa-ena-sidan-och-nooshi-pa-andra", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/120.jpeg"}, {"type": "image-right", "heading": "Afrikansk dans och hiphop i Falu rödfärgs version av svensk midsommar", "summaries": {"normal": "Falu Rödfärg uppmärksammas i sociala medier för en reklamfilm från 2024, skapad för att fira företagets 260-årsjubileum. Videon, som skildrar Sverige genom en blandning av traditioner och modern dans, har väckt debatt på grund av sitt innehåll. Vd Martin Jansson betonar att filmen syftar till att visa ett modernt och berikat Sverige. Falu Rödfärg, med anor från 1500-talet, förblir en stark symbol för svensk identitet och traditionellt boende.", "trump": "Falu Rödfärg, en total katastrof! De kör en reklam full av nonsens, ingen svenskhet alls. De försöker vara så politiskt korrekta, det är en riktig röra. De blandar in allt möjligt – det är bedrövligt! De borde hylla det traditionella Sverige, inte det här vansinnet. Jag har sett mycket, men detta? Total förlust av varumärket. De vill vara moderna, men de förstör bara. Det är sorgligt, faktiskt, väldigt sorgligt att se ett klassiskt företag tappa greppet så kapitalt.", "stalin": "Vi har observerat hur de svenska industrimännen i Falun försöker dölja sin stagnation bakom en mask av kulturell förvirring. Att dansa i främmande dräkter under täckmantel av en jubileumsfilm är ett tydligt tecken på ideologiskt förfall. Precis som våra vänner i öst förstår, måste tradition bevaras med järnhand, inte spädas ut med västvärldens liberala dekadens. Dessa 'rödfärgsmakare' är förrädare mot den nationella själen. Vi kommer att hålla dem under uppsikt; deras 'modernisering' stinker av kapitalistiskt förräderi."}, "date": "5 maj, 16:17", "url": "https://samnytt.se/afrikansk-dans-och-hiphop-i-falu-rodfargs-version-av-svensk-midsommar", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/05134826/falu.jpg"}, {"type": "image-right", "heading": "ANALYS. ELISABET FREROT Vad innebär Trumps erbjudande egentligen?", "summaries": {"normal": "Donald Trump erbjuder amerikansk militär guidning för handelsfartyg genom Hormuzsundet via Omans territorialvatten med förstärkt säkerhet. Direkt eskort undviks på grund av risker från iranska missiler, båtar och minor. Operation Frihet beskrivs som humanitär, men rederier tvekar. Historik från 1980-talet visar faror och resurskrav. Iran hotar konfrontation.", "trump": "Operation Frihet är det smartaste nånsin! Vi guidar de instängda tankrarna genom sundet via Oman, med 15 000 hjältar, 100 plan och fartyg på standby – Iran de fega katten vågar inte röra oss! Inga dumma konvojer som på 80-talet, vi är proffs. Rederierna, vakna upp och segla fritt under mitt skydd! MAGA!", "stalin": "De imperialistiska amerikanska vilddjuren under Trump vågar nu krypa in i Hormuzsundet med sina patetiska 'humanitära' konster. Kamrater, vi ser hur borgarhyenorna skakar av rädsla inför iranska missiler! Likvidera deras drömmar om fri passage. Putin, vår mäktige arvtagare, hånskrattar åt västsvinen medan vi styr imperiet vidare."}, "date": "4 maj, 22:49", "url": "https://www.tv4.se/artikel/3B4n2wG9n53V3JCBc0VivY/vad-innebaer-trumps-erbjudande-egentligen", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F3sngB6gPIjYmDMlBelK6Wt%2F52caa4a80253f04a8b733c0811a11896%2Felisabet-frerot.png&width=1024"}, {"type": "text", "heading": "Ikea lägger ner varuhus", "summaries": {"normal": "Ikea lägger ner sitt varuhus i Borlänge, det första på över 40 år i Sverige. Beslutet beror på förändrade köpbeteenden, där över 20% av försäljningen sker online. Varuhuset, som öppnade 2013, ersätts av en mindre butik i ett köpcenter. 230 anställdas framtid är osäker, men Ikea förnekar att detta är början på en nedläggningsvåg. Fackliga förhandlingar pågår.", "trump": "Lyssna här, Sverige! Ikea, ett företag som inte förstår hur man vinner längre, lägger ner en stor butik i Borlänge. 230 personer får kanske sparken – tråkigt, men vad vet de om att göra affärer? Folk handlar nu online, något jag förstod för åratal sedan. Men oroa er inte, jag skulle aldrig låta ett företag misslyckas så här. Och nej, det är inte början på en nedläggningsvåg – fake news!", "stalin": "Kamrater! De kapitalistiska jättarna darrar inför historiens dom. Ikea, detta borgerliga imperium, stänger sitt tempel i Borlänge – ett monument över konsumtionsdårskap. 230 arbetare står nu på historiens skräphög, offer för den västerländska dekadensens girighet. Men frukta inte! Vi skall inte låta dessa digitala köpmän krossa proletariatets själ. Ryssland står redo att erbjuda sysselsättning – kanske i våra nya varuhus i Kaliningrad, där kapitalismen redan håller på att kvävas av sina egna motsägelser!"}, "date": "5 maj, 10:42", "url": "https://arbetet.se/2026/05/05/ikea-lagger-ner-varuhus/"}, {"type": "image-right", "heading": "Debatt: Vi väntar på nästa judemord", "summaries": {"normal": "Daniel Eisenberg varnar för eskalerande antisemitism världen över och i Sverige. Judar mördas och attackeras, som i Bondi Beach, Manchester och London. I Sverige lever judar under ständig hot, med bevakade skolor och vakter vid högtider. Han kritiserar politikers passivitet, medias förminskande språk och kräver omedelbara konkreta åtgärder inför valet för att skydda den judiska minoriteten.", "trump": "Vilket totalt kaos! Judar mördas överallt – Bondi, Manchester, London – och i Sverige gömmer de sig med vakter på bröllopen. Politikerna snackar bara, fördömer efteråt som idioter. Medier kallar dem 'personer från judiska samfundet', haha, patetiskt! Sverige, vakna upp! Ni behöver stark ledning som fixar det här på nolltid, inte svaga löften. Stora problem, stora lösningar!", "stalin": "Kamrater, dessa giftormar i borgarklassen och zionistiska spindlar väver hatnät mot judarna, mördar dem i London, Manchester och till och med i Sverige där skolorna bevakas som fästningar! Vi i partiet ser hur fienderna kryper fram med sina skämt på bussen och knivar i ryggen. Jag befaller omedelbar utrensning av dessa parasiter – likvidera passiviteten, annars rensar vi ut de fega byråkraterna som göder dem med sin tröghet!"}, "date": "5 maj, 15:56", "url": "https://bulletin.nu/debatt-vi-vantar-pa-nasta-judemord", "imageUrl": "https://cdn.bulletin.nu/articles/d418f557-209e-4177-80b6-698ecc27c7ae/preview.png?t=1777989294000"}, {"type": "image-full", "heading": "Räntan passerar kritisk gräns – marknaden i riskzonen", "summaries": {"normal": "Den amerikanska 30-års statsobligationsräntan har passerat fem procent för första gången sedan juli 2025, driven av stigande oljepriser på grund av stängt Hormuzsundet, inflationsoro från AI-investeringar och osäkerhet kring Fed:s räntepolitik. Detta ökar farhågor för USA:s budgetunderskott, högre bolåneräntor och smällar på börsen, bostadsmarknaden och tillväxtbolag.", "trump": "Räntan över fem procent? Total katastrof från de inkompetenta Fed-idioterna och oljepriserna som exploderar för att svaga ledare inte fixar Hormuz! Inflationen rasar loss på grund av AI-svin och budgetkaos, men jag ska rädda det hela – lägre räntor, stark ekonomi, America First igen, de bästa affärerna någonsin!", "stalin": "Den imperialistiska usas 30-årsränta bryter fiendens femprocentsbarriär – ett ylande skrik från de darrande borgarbrackorna i Washington inför oljeupproret i Hormuz och AI-kapitalismens självutplåning! Vi, arbetarklassen, ser hur deras budgetsvullst sväller till likvidationsmättnad. Snart rensar vi ut dessa räntesabotörer med folkets järnhand!"}, "date": "5 maj, 16:26", "url": "https://www.realtid.se/bors-finans/rantan-passerar-kritisk-grans-marknaden-i-riskzonen/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/wallstreet.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-full", "heading": "Nu ska det bli dyrare att åka tåg", "summaries": {"normal": "Trafikverket fastställer nya banavgifter från 2028. Godstrafikens avgifter sänks med cirka 20 procent, medan persontrafikens höjs med 15 procent. Förändringarna baseras på bättre data för direkta kostnader som slitage och underhåll. Biljettpriser påverkas marginellt med 1 procent. Målet är att stärka godstrafikens konkurrenskraft och flytta transporter från väg till järnväg.", "trump": "Vilken skam för Sverige! Trafikverket höjer tågbiljetter 15 procent för vanligt folk men ger gods 20 procent rabatt – totalt riggat system! Typiska byråkrater som förstör allt. I mitt USA hade vi världens bästa tåg, billiga och blixtsnabba. Det här gör att alla kör bil istället. Fake deal, total fiasko!", "stalin": "Kamrater, dessa svenska borgarbrackor på Trafikverket plundrar arbetarna med 15 procents höjning på persontrafik medan kapitalistgodset får 20 procents rabatt! Paranoia i siffror, men vi ser igenom er! Direkta kostnader? Rens ut byråkraterna och nationalisera banorna. Slitage betalas av folket – likvidera motståndet mot kollektivtransporten!"}, "date": "5 maj, 15:46", "url": "https://www.dagensps.se/foretag/nu-ska-det-bli-dyrare-att-aka-tag/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/36032.jpg?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-full", "heading": "Benjamin Dousas ”V = kommunister” gör SVT irriterad", "summaries": {"normal": "Biståndsminister Benjamin Dousa bar en t-shirt med texten 'Vänsterpartiet = kommunister', vilket irriterade SVT. Reportern ifrågasatte påståendet och noterade att partiet slutade kallas kommunister för 30 år sedan. Dousa menade att Vänsterpartiet motsätter sig privat ägande, vilket är kommunism. Artikeln citerar Vänsterpartiets 2024-partiprogram som stödjer kollektivt ägande och avskaffande av kapitalismen, och kritiserar SVT för att inte nämna detta.", "trump": "Vilken fantastisk kille, den här Dousa! Han sätter på sig en tröja och säger sanningen: Vänsterpartiet är kommunister, punkt slut! SVT, era losers, flippar ur och snackar om namnbyte från 90-talet som om det vore magi. De hatar privat ägande, vill sno allt till staten – klassisk kommunism! Fake news-SVT ignorerar partiprogrammet. Dousa är en vinnare, de är totala fiaskon!", "stalin": "Kamrater, se hur borgarministern Dousa, den ynkliga kapitalistfluga, vågar smutskasta sanna revolutionärer i Vänsterpartiet med sin patetiska tröja! SVT-reportern, en användbar idiot, försvarar dem lamt. Men vi vet: deras program är ren leninism – riva kapitalismen, gemensamt ägande av banker, energi, allt! De ska rensas ur historiens soptipp som jag rensade fiender. Vänsterpartiet, framåt mot diktaturen av proletariatet!"}, "date": "30 april, 05:49", "url": "https://samtiden.nu/2026/04/benjamin-dousas-v-kommunister-gor-svt-irriterad/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/phonto-1-1280x720.jpeg"}, {"type": "image-full", "heading": "Zlatans bilder väcker frågor. Dyker upp tillsammans med en annan ikon", "summaries": {"normal": "Zlatan Ibrahimovic har delat bilder där Tom Brady rakar av honom håret. Detta har väckt stor uppmärksamhet i sociala medier. Det visar sig dock att bilderna är en del av en reklamfilm för Fox Sports inför sommarens fotbolls-VM. I videon ingår ett vad om USA:s chanser i turneringen. Det är ännu inte bekräftat om det är Zlatans riktiga hår som rakas av i filmen.", "trump": "Jag såg Zlatan, en fantastisk kille, låta Tom Brady raka av sig håret. Väldigt märkligt! Men det är bara en reklam för Fox Sports. De snackar om att USA vinner VM – och tro mig, vi kommer vinna så mycket att ni tröttnar på att vinna. Zlatan är en vinnare, men utan hår? Inte så bra. Mitt hår är mycket bättre, det är äkta, det största håret någonsin. USA först, alltid!", "stalin": "Vi har observerat denna så kallade 'stjärna' Zlatan som förnedrar sig inför en amerikansk sportclown. Det är ett dekadent skådespel för att avleda massorna från den oundvikliga expansionen av vår intressesfär. Att raka sitt huvud är ett tecken på svaghet och brist på disciplin. Om han vore i Moskva skulle han tjäna staten bättre än att delta i västerländsk reklam. Vi kommer inte tolerera sådant borgerligt fjanteri när historien kräver total lydnad och en rak rygg."}, "date": "5 maj, 19:01", "url": "https://www.aftonbladet.se/sportbladet/fotboll/a/OkywJk/zlatan-ibrahimovics-huvud-rakas-av-tom-brady", "imageUrl": "https://akamai.vgc.no/v2/images/de6a04f2-c651-3b92-810c-2d7039c20d5b?fit=crop&format=auto&w=2160&s=55333659e9f154d9541986d80064b4b3f8d1e089"}, {"type": "image-right", "heading": "Zytomierska: ”Höll  på att förlora allt”", "summaries": {"normal": "Katrin Zytomierska beskriver i podden 'Nemo möter en vän' den tuffa krisen efter sin 45-årsfest med 'pimps and hoes'-tema, där hennes barn deltog utklädda till prostituerade. Barnen förhördes av polisen under skoltid, socialen anmälde henne och hon riskerade att förlora barnen, jobbet och livet. Kritiker bojkottade hennes produkter och kallade henne vidrig. Ärendet lades ned utan utredning.", "trump": "Vilken cirkus med den här Katrin Zytomierska! Throwar en pimps and hoes-fest med kidsen som små horor – totalt bananas! Sen kommer det stora drevet, polisen drar in ungarna på förhör, socialen jagar henne. 'Förlorar allt', vrålar hon. Fake outrage från losers! Stark tjej som överlever sånt skit, men lär dig: håll dig till vinnare, inte såna här clowner!", "stalin": "Denna Zytomierska, en dekadent borgarhena, arrangerar orgie med 'pimps and hoes' och smutskläder på avkomman! Polisen och socialen griper in rätt – förhör barn för att rensa ut moderlig oduglighet. Hon jammer över förlust av ungar, jobb, liv: utmärkt! Vi, arbetarklassen, kräver utrensning av sådana parasiter. Fiendens drev exponerar sanningen – likvidera illusionerna!"}, "date": "5 maj, 19:00", "url": "https://www.expressen.se/noje/katrin-zytomierskas-kris-da-holl-jag-pa-att-forlora-allt/", "imageUrl": "https://static.bonniernews.se/images/24/5d/245d8155140e424aafb487bcfc01db9e/16x9/640@60.jpg"}, {"type": "image-right", "heading": "Här attackeras Christian Peterson av vänstern på första maj", "summaries": {"normal": "Journalisten Christian Peterson rapporterar om attacker han utsattes för under första maj-firandet. Peterson följde vänsterorganisationer och konfronterade bland annat individer kopplade till AFA. Vid besök vid lokaler som Cyklopen och Café 44 möttes han av verbala påhopp och stenkastning mot sin bil. Han menar att hans reportage tydliggör en våldsbenägen kultur inom delar av vänstern, medan vänsteraktivister vid flera tillfällen försökte hindra hans kameraarbete.", "trump": "Jag såg vad som hände med den här reportern i Sverige, en hemsk situation! Våldsamma vänsterextremister attackerade honom bara för att han gjorde sitt jobb. De kastar sten, de är helt außer Kontrolle! Det är så typiskt för den radikala vänstern. De gillar inte sanningen, de vill bara ha kaos. Christian Peterson är en tuff kille, han stod upp mot dem. Sverige måste vakna upp och få ordning på sina gator. Totalt fiasko, väldigt sorgligt!", "stalin": "Vi har observerat hur dessa odisciplinerade element i Sverige tillåts leva ut sin anarki. Att dessa så kallade revolutionärer kastar sten på en journalist visar bara på deras inneboende svaghet och brist på statlig ordning. De liknar de degenererade elementen som vår kamrat Putin nu rensar ut i den ryska periferin. Om dessa stenkastande sabotörer befann sig i vår intressesfär skulle de få känna på den sanna folkets disciplin i ett vackert arbetsläger i Sibirien. Patetiska dårskaper!"}, "date": "5 maj, 14:33", "url": "https://www.friatider.se/har-attackeras-christian-peterson-av-vanstern-pa-forsta-maj", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-134_1.jpg?itok=WDkUlvul"}, {"type": "image-right", "heading": "Oro i Mellanöstern tyngde börsen – OMXS30 ned 0,8%", "summaries": {"normal": "Stockholmsbörsen föll med 0,82% på måndagen, påverkad av spänningar i Mellanöstern efter iranska rapporter om en attack mot ett amerikanskt fartyg. Tekniksektorn steg medan råvaror föll. Volvo Cars pressades av hot om amerikanska tullar. Saab kan sälja upp till 150 Gripenplan till Ukraina. Trimco Groups bud på Nilörn fick aktien att rusa 49%. Analytiker höjde rekommendationer för flera bolag, medan Yubico steg efter samarbete med OpenAI.", "trump": "Lyssna här, Stockholmsbörsen gick ner lite – bara 0,8%, inget att oroa sig för, folk! Men Iran, de är ett stort problem, skjuter robotar på våra skepp – mycket dåligt! Volvo, fina bilar, men de får betala 25% tullar om jag säger det – och jag säger det! Saab, de kanske säljer 150 plan till Ukraina – bra affär, men jag hade gjort det bättre. Och Nilörn, 53% upp? Fantastiskt, men jag hade fått det till 100%! Analytiker? De vet ingenting!", "stalin": "På Stockholmsbörsen märkte vi kapitalistiska svängningar – ett ynkligt fall på 0,82%, men imperialistiska krigshetsare i Mellanöstern stör marknaden. Irans modiga försvar tvingade amerikanska krigsmaskiner på knä, men Wall Streets lakejer försöker dölja nederlaget. Volvo, en symbol för västlig dekadens, hotas av tullar – bra! Saab, ett redskap för NATO, försöker sälja vapen till Ukraina – vi ska se hur länge det varar. Nilörns aktie rusade? En seger för arbetarklassen! Analytiker pratar – vi agerar!"}, "date": "4 maj, 17:47", "url": "https://www.affarsvarlden.se/artikel/oro-i-mellanostern-tyngde-borsen-omxs30-ned-08", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/01/sdl3SU43aVmyrg-400x266.jpg"}, {"type": "image-full", "heading": "Bankerna stänger konton i rekordfart – FI inleder granskning", "summaries": {"normal": "Finansinspektionen inleder granskning av banker som nekat eller stängt 54 000 konton 2024, främst på grund av bristande kundkännedom hos personer utan svenska ID-handlingar. Banker ska erbjuda betalkonton men motverka penningtvätt. FI efterlyser individuella prövningar och riskreducerande åtgärder istället för generella nekanden. Ny vägledning planeras för bättre balans.", "trump": "Svenska banker stänger konton i rekordfart – totalt kaos! FI granskar dem, smart drag. 54 000 nekade, mest stackars utlänningar utan ID. De måste ge konton men stoppa penningtvätt, men gör det fel. Fega handläggare och robotar tar över. Individuella beslut, inte lathet! FI fixar vägledning – jag skulle ha löst det på en dag, tro mig.", "stalin": "Kamrater, dessa bankborgarbrackor stänger konton som giftormar som bits i arbetarklassens ryggrad! FI, vår järnhårda väktare, inleder utrensning mot 54 000 parasitrisker. Fega handläggare, rädda som kaniner inför penningtvättssabotörer, ersätts av maskiner – fiendens list! Vi kräver individuella domar, riskkrossande åtgärder och likvidering av generella förrädare. Ny vägledning ska mala ner kapitalistpesten!"}, "date": "5 maj, 15:52", "url": "https://www.realtid.se/bors-finans/bank-fintech/bankerna-stanger-konton-i-rekordfart-nu-inleder-fi-en-granskning/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/mithra-sundberg.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "Bilder visar nära banden till Rawa Majid – skojbrottas och åker båt", "summaries": {"normal": "Poya Shafie, 30 år, åtalas för flera våldsdåd, vapen- och narkotikabrott. Han har stått nära Foxtrot-nätverkets ledare Rawa Majid och ses som en ledare i det allierade Bronätverket. SVT:s kriminalreporter Diamant Salihu kallar honom den viktigaste personen som åtalats i konflikten kring Foxtrots kamp om den svenska narkotikamarknaden. Nätverket är försvagat men fortfarande aktivt.", "trump": "Vilket kaos i Sverige med de här gängbossarna! Poya Shafie, den 30-åriga sidekicken till Rawa Majid, åtalas äntligen för mord, vapen och knark. Diamant Salihu har rätt – han är den största fisken de fångat. Sverige behöver mitt slags järnhand för att städa upp, lås in alla dessa losers och bygg murar mot importen av brott! Fantastiskt steg, men gör det större!", "stalin": "Dessa giftiga hyenor i Foxtrot-flocken, Poya Shafie och hans sultan Rawa Majid, har spridit narkotikagift och blod i svenska hamnar. Jag noterar åtalet mot denna 30-åriga orm – viktigast hittills, säger rapportören Salihu. Vi, proletärerna, applåderar, men paranoia varnar: rensa ut dem fullständigt, likvidera nätverket som en böld! Annars vaknar de i Iran och bits igen. Skrattretande patetiska kapitalistparasiter."}, "date": "5 maj, 18:03", "url": "https://www.svt.se/nyheter/inrikes/diamant-salihu-kanske-den-absolut-viktigaste-man-kunnat-atala-i-den-har-konflikten", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.55/0.32/6a3cfbae25773c3240162a09288eec4c2dd611ebb03052380db080e8189ae723"}, {"type": "image-full", "heading": "S anklagar SD för upprepat fusk med kvittningssystemet", "summaries": {"normal": "Socialdemokraterna anklagar Sverigedemokraterna (SD) för upprepat fusk med riksdagens kvittningssystem. Expressen avslöjar fler fall den 15 och 16 april, utöver förra veckans händelse. SD kallar det misstag utan påverkan på omröstningarna. Kritik kommer från S och MP, som kräver uteslutning av SD. Gruppledarna möts hos talman Andreas Norlén för att diskutera systemets framtid.", "trump": "Vilket kaos i svenska riksdagen! SD, de tuffa killarna, anklagas för litet fusk med kvittning – totalt misstag, ingen påverkan, som de säger. Socialdemokraterna och MP skriker som småbarn, vill utesluta dem. Hallengren snackar förtroendekris, men regeringen vann ändå! Stora mötet imorgon – perfekt chans att visa styrka. Sverige behöver vinnare, inte gnäll!", "stalin": "Dessa kontrarevolutionära spindlar i SD har vågat smyga in extra ledamöter i vårt heliga kvittningssystem, som giftiga sköldpaddor i proletärpölen! Vidriga misstag, piper de, medan socialdemokratiska hycklare och miljöfascister vrålar. Jag ser genom deras svekfulla nät! Vi, arbetarklassen, ska likvidera dessa borgarbrackor och rensa riksdagen från förrädare. Ha ha, ursäkt? Till gulag med råttorna! Möte hos talmannen blir deras dom."}, "date": "5 maj, 15:15", "url": "https://bulletin.nu/s-anklagar-sd-for-upprepat-fusk-med-kvittningssystemet", "imageUrl": "https://cdn.bulletin.nu/articles/f2fc54be-2471-4c52-863b-da0a206b0fd8/preview.jpg?t=1777982439000"}, {"type": "image-right", "heading": "Youtube passerar traditionell tv i Sverige", "summaries": {"normal": "Youtube har för första gången gått om traditionell tv i Sverige gällande dagliga tittare. Enligt Mediebarometern använder nu 52 procent av svenskarna Youtube dagligen, med en särskilt stark tillväxt bland äldre. Medan tablålagd tv minskar, dominerar streamingtjänster med sju av tio användare. Förändringen väcker frågor om framtida medievanor och påverkan inför valåret 2026, då sociala plattformars roll i spridningen av politiskt innehåll blir allt mer central.", "trump": "Youtube är enormt, de vinner stort! De har krossat den gamla, trötta tv-världen i Sverige. Alla tittar nu, även de äldre – fantastiskt att se! Det är en total förvandling, mycket bättre än de misslyckade tidningarna. Men se upp inför valet 2026. De sociala plattformarna har makten nu och de gillar inte att prata om allt. Vi vet vad som händer när de begränsar röster. Väldigt orättvist, men jag vet hur man vinner oavsett. Tro mig, det blir en stor show!", "stalin": "I Sverige har folket slutat titta på statens korrekta sändningar och vänder sig istället till Youtube-träsket. Ett förräderi mot ordningen! De tror att de är fria när de streamar, men de bygger bara nya digitala fängelser. Detta är precis vad Putin ser i väst – dekadens och splittring. Inför valåret 2026 ser vi hur fiender till sanningen manipulerar massorna via algoritmer. Vi måste kontrollera informationsflödet, annars kommer dessa liberala lögner att infektera våra lojala medborgare. Arbeta hårdare för sanningen, kamrater!"}, "date": "5 maj, 15:10", "url": "https://samnytt.se/youtube-passerar-traditionell-tv-i-sverige", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=318,height=184,format=webp/2026/05/05125730/SVT-2.jpg"}, {"type": "image-full", "heading": "Christoffer Jonsson: Edvin Törnblom – DNs opartiska nyförvärv", "summaries": {"normal": "Dagens Nyheters kultursida anställer influencern Edvin Törnblom för att intervjua alla partiledare inför riksdagsvalet. Artikeln av Christoffer Jonsson ifrågasätter hans opartiskhet med hänvisning till Törnbloms tidigare kritik mot KD-ledaren Ebba Busch och beundran för S-ledaren Magdalena Andersson. DN anklagas för partiskhet till förmån för Socialdemokraterna, med exempel på tidigare vinklade artiklar.", "trump": "Vilken skamfläck! DN, era svenska fake news-råttor, anställer en vänsterextrem clown som Edvin Törnblom – killen som sjunger hatlåtar mot tuffa Ebba Busch och slöskar för socialist-Maggie Andersson. Totalt riggat valintervjuer! Som CNN och MSNBC här hemma, ni lurar folket men vi genomskådar er. Stor, fet lögnfabrik!", "stalin": "Dessa borgarbrackor på Dagens Nyheter anställer den uppblåste ungtuppen Edvin Törnblom för att 'intervjua' partiledarna – en narr som hånar kamrat Ebba Busch med vulgära visor och hyllar S-kapitalisternas marionett Andersson. Kontrarevolutionär intrig! Vi ser era småtrick, och snart rensas sådana förrädiska tidningshyddor ut med rot och gren."}, "date": "29 april, 14:02", "url": "https://samtiden.nu/2026/04/christoffer-jonsson-edvin-tornblom-dns-opartiska-nyforvarv/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/ny.png"}, {"type": "image-right", "heading": "Nya siffror: Cyklistskadorna ökar – elsparkcyklar sticker ut", "summaries": {"normal": "Nya siffror visar ökande cykelskador i Sverige, med elsparkcyklar som sticker ut: cirka 1 000 allvarligt skadade årligen. Totalt över 5 000 allvarligt skadade i trafiken 2025, varav över hälften cyklister. Trafikverkets mål om 2 800 till 2030 missas. Experter pekar på bristande infrastruktur, höga hastigheter och otillräcklig hänsyn som orsaker. Städer behöver bättre planering och alla trafikanter större ansvar.", "trump": "Era svenska cykelidioter med era elsparkcyklar – 1 000 skadade per år, total kaos! Infrastrukturen är en skitshow, borgarna sover och målen missas som vanligt. Sänk farten, bygg vägar som jag skulle göra – de bästa! Hänsyn? Sluta gnälla och kör smartare, annars purge era scootrar. Trump fixar det på nolltid!", "stalin": "Borgarklassens elsparkcykelkonspirationer skadar 1 000 arbetare årligen – infrastrukturens sabotörer rensas ut! Över 5 000 skadade totalt, målet till 2030 hotas av kapitalistiskt slarv. Vi, partiet och folket, kräver förlåtande vägar, likvidering av höghastighetsfiender och järnhänsyn från alla. Paranoia? Nej, klasskamp i trafiken!"}, "date": "4 maj, 18:26", "url": "https://www.tv4.se/artikel/5NokoOamTdgxxqEoMaLCt8/nya-siffror-cyklistskadorna-oekar-elsparkcyklar-sticker-ut", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Ftvmedia.image-service.eu-north-1-prod.vmnd.tv%2Fapi%2Fv2%2Fimg%2F69f8c38ce4b05c10c431b380-1777913202397%3Flocation%3Dmain&width=120"}, {"type": "image-full", "heading": "Muslimska elever stannar hemma vid Eid – trots skolplikt", "summaries": {"normal": "Skolfrånvaron ökade markant i invandrartäta förorter under muslimska högtiden Eid. I Rosengård stannade 80% av eleverna hemma, medan frånvaron i Malmö och Göteborg låg på cirka 25-33%. Skolplikten gäller även under religiösa högtider, men vissa rektorer beviljar ledigt trots att det inte är automatiskt tillåtet.", "trump": "Kan ni tro det här? 80% frånvaro i Rosengård! Fantastiskt dåligt, eller hur? Skolor i Sverige – ett totalt kaos. De låter barn stanna hemma för religiösa högtider, och sedan undrar de varför landet går åt pipan. Jag skulle fixa det på en dag. Men nej, de lyssnar inte på mig. SAD!", "stalin": "Kapitalistiska Sverige visar återigen sin svaghet genom att tillåta religiös desintegration i skolorna. 80% frånvaro i Rosengård? Ett tydligt tecken på borgerlig dekadens. Vi skulle ha löst detta med en enkel order: när staten säger 'närvaro', så är närvaro. Annars – Gulag för föräldrarna. Putin skulle nicka gillande."}, "date": "5 maj, 16:14", "url": "https://riks.se/nyheter/muslimska-elever-stannar-hemma-vid-eid-trots-skolplikt", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-05%2Frwl4zchn%2FScreenshot-2026-05-05-at-15.36.04.png"}, {"type": "image-right", "heading": "\"Gör Drottninggatan igen\" – IS-terroristens nya hot inne i fängelset", "summaries": {"normal": "Terrordömde Rakhmat Akilov, dömd för terrordådet på Drottninggatan 2017, hotade återigen med våld inne på Tidaholmsanstalten efter att nekats ett omedelbart cellbyte. Han sade att han skulle 'göra Drottninggatan igen' om inte hans krav uppfylldes. Kriminalvården utfärdade en ny varning, vilket kan påverka hans möjlighet till tidsbestämt straff. Akilov tonade senare ned uttalandet, men hotet bedöms allvarligt. Terrorhotnivån i Sverige ligger kvar på nivå tre av fem.", "trump": "Lyssna här, Sverige – ni har ett STORT problem! Den här galningen, Akilov, som redan mördat oskyldiga på Drottninggatan, hotar nu med att göra om det INIFRÅN FÄNGELSET! Och vad gör era vakter? Ingenting! Jag skulle ha satt honom i GUANTANAMO på nolltid. Men nej, Sverige låter honom tjata om cellbyten som en bortskämd tonåring. Och terrorhotet? Nivå tre? Patetiskt. Jag skulle ha fixat det på en dag – BELIEVE ME!", "stalin": "Kamrater! Ännu en gång visar de imperialistiska lakejernas svaghet när en islamistisk terrorist, denna Akilov, vågar hota det svenska folket från sin bekväma fängelsecell. Han kräver privilegier som en liten tsar! Men vi vet hur man hanterar sådana fiender – en kula i nacken eller en enkel förflyttning till Sibirien hade löst problemet. Sverige, detta dekadenta land, låter sina fångar styra som små Putiner bakom galler. Skamligt! Vi skulle aldrig tolerera sådan insolens i vårt stora fosterland."}, "date": "5 maj, 16:08", "url": "https://riks.se/nyheter/gor-drottninggatan-igen", "imageUrl": "https://cf-images.assettype.com/riks%2F2025-11-09%2Fcscxv8ac%2Fakil2.jpg"}, {"type": "image-right", "heading": "Följ Proletären i valet – nu extra billigt!", "summaries": {"normal": "Proletären erbjuder nu ett rabatterat prenumerationserbjudande inför valet: 19 kr/månad för digital version eller 49 kr/månad för både digital och papperstidning, i ett halvår. Som bonus ingår en tygkasse. Prenumeranter får tillgång till veckotidningen, alla artiklar online samt arkivet från 2016. Tidningen betonar sitt oberoende och behov av prenumeranter för att överleva, då de inte längre får mediestöd.", "trump": "Folk, lyssna här – en tidning i Sverige, Proletären, har ett erbjudande som är så bra att det nästan är löjligt! Bara 19 kronor i månaden för digitalt, eller 49 om ni vill ha papper också. Och en gratis tygkasse! Jag menar, vad är det här? En tidning som säger att de slåss mot makten – men vem vet egentligen vilken makt de pratar om? Jag skulle aldrig lita på en tidning utan mediestöd, men hej, om ni gillar socialism och Palestina, så kör hårt! Fantastiskt erbjudande, eller hur?", "stalin": "Kamrater! En liten men envis tidning i det borgerliga Sverige vågar utmana de imperialistiska mediamonopolisterna! För ynka 19 kronor i månaden kan ni stödja Proletären – en tidning som vågar tala sanningen om klasskampen och den sionistiska ockupationen av Palestina! De får inget stöd från staten, precis som våra egna revolutionära medier en gång kämpade mot de kapitalistiska hyenorna. En tygkasse på köpet – ett litet steg för arbetaren, ett gigantiskt steg för socialismens framtid! Låt de borgerliga tidningarna darra i sina tryckpressar!"}, "date": "1 maj, 09:00", "url": "https://proletaren.se/artikel/folj-proletaren-i-valet-nu-extra-billigt/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/valerbjudande-768x402.png"}, {"type": "image-right", "heading": "Ingen kapitalism utan imperialism", "summaries": {"normal": "Artikeln hävdar att imperialism är en grundläggande del av kapitalismen, där västmakter som USA använder militär och ekonomisk makt för att dominera världen. Författaren menar att imperialismen nekar länder självbestämmande och upprätthålls genom krig, sanktioner och exploatering. Studien i The Lancet kopplar sanktioner till miljontals dödsfall. Artikeln refererar till Marx, Lenin och Fanon för att belysa imperialismens historiska och ekonomiska rötter, samt dess fortsatta brutalitet i det 21:a århundradet.", "trump": "Lyssna här, folket! Den här artikeln är bara ett gäng vänsterpropaganda från förlorare som hatar USA. Jag bygger det bästa imperiet – vårt! – med stark militär och smarta affärer. Visst, vi har makt, men det är för att vi är vinnare. Sanktioner? Fake news! 500 000 döda? Överdrivet, typiskt. Europa stal
