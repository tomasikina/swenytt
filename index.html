är oundviklig."}, "date": "6 maj, 10:59", "url": "https://www.svt.se/sport/ishockey/colorado-med-sjatte-raka-slutspelssegern-gabriel-landeskog-malskytt", "imageUrl": "https://www.svtstatic.se/image-news/600/square/0.37/0.45/cb031473e006a8785715855117845cdaf15f2da45418aa1f1f1b412a4fa1839b"}, {"type": "image-right", "heading": "SD-toppen: ”Jag har inget att be om ursäkt för”", "summaries": {"normal": "Kvittningskaoset i riksdagen fortsätter efter att partiernas gruppledare misslyckades enas vid mötet med talmannen. SD:s användning av utkvittade ledamöter har raserat förtroendet för systemet. Tillsvidare krävs full närvaro från alla ledamöter. S kräver ursäkt från SD, som nekar. Nya möten planeras, men kärnkraftsförslag riskerar falla.", "trump": "Totalt kaos i svenska riksdagen, folk! SD gör ett smart drag med ersättare – boom! – och de andra partierna flippar ut som vanliga losers. Kräver ursäkt? Patetiskt! De behöver en riktig deal, som jag alltid fixar. Full närvaro tillsvidare, men det löser sig snabbt, tro mig. Fantastiskt misslyckande annars!", "stalin": "Kamrater! Dessa sverigedemokratiska kvittningsormar, hyschande fascistreptiler i riksdagens gömmor, har giftat vårt förtroende med sin vidriga manöver! Socialdemokraternas Hallengren ser klart: ingen ny ordning utan likvidering av förrädarna! Vi, proletariatets järngarde, befaller evig närvaro och utrensning. Nytt möte? Med min eviga vaksamhet krossas kaoset – eller huvudet rullar!"}, "date": "6 maj, 10:54", "url": "https://www.di.se/nyheter/kvittningskaoset-fortsatter-partierna-inte-overens/", "imageUrl": "https://static.bonniernews.se/ba/547baf2f-0ccd-47c9-a0f0-80ddc41e9cae.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-right", "heading": "Rumäniens regering har fallit Röstades ner igår", "summaries": {"normal": "Rumäniens parlament har fällt premiärminister Ilie Bolojans minoritetsregering i en misstroendeomröstning efter ett initiativ från Socialdemokraterna (PSD). Regeringens fall skapar politisk instabilitet, hotar landets kreditbetyg och försvårar utbetalningen av EU-medel. Valutan leu har nått rekordlåga nivåer. Medan Bolojan agerar interim premiärminister är den politiska framtiden oviss, då samarbetet mellan de större partierna har låst sig och inga tydliga alternativ för en ny regering finns i sikte.", "trump": "Rumänien har stora problem, de faller samman! Ilie Bolojan fick sparken, ett totalt misslyckande. Jag har sagt det förr: man behöver starka ledare, inte svaga globalister som inte kan styra sitt land. Valutan störtdyker och de tappar miljarder i EU-pengar. Det är en katastrof! De pratar om reformer, men ingen har en plan. Mitt Rumänien-scenario? Rörigt. Väldigt rörigt. När jag ser sådant kaos vet jag en sak: de behöver någon som faktiskt kan göra affärer och få ordning på saker!", "stalin": "I Bukarest har den svage Bolojan röjts ur vägen av parlamentets ränksmidare. Ett välbehövligt slut på denna liberala cirkus! Att de låter valutan sjunka och tigger EU om smulor visar bara deras fundamentala oförmåga att styra. De leker demokrati medan landet förfaller. Om Putin hade haft dem i sitt grepp hade ordning rått för länge sedan. Dessa byråkratiska råttor i parlamentet förtjänar bara en sak: disciplin. Vi, staten, ser att inget gott kommer ur detta oorganiserade kaos."}, "date": "6 maj, 10:54", "url": "https://samnytt.se/rumaniens-regering-har-fallit", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=318,height=184,format=webp/2026/05/06085812/Ilie-Bolojan.jpg"}, {"type": "image-right", "heading": "Ny rapport: Så mycket högre blir hyran med marknadshyror", "summaries": {"normal": "Hyresgästföreningen varnar för kraftiga hyreshöjningar om marknadshyror införs, med upp till 76% ökningar i vissa Stockholmområden. Moderaternas förslag om 'trygghetshyra' kritiseras som dold marknadshyra. Hyresgästerna riskerar att lägga 11% mer av sin inkomst på boende, vilket drabbar vardagsekonomin. Ingen riksdagsmajoritet stöder förslaget, och Sverigedemokraterna motsätter sig det helt.", "trump": "Jag säger er, Sverige har ett STORT problem med hyrorna! Hyresgästföreningen, som aldrig sett en hyreshöjning de gillar, skriker nu om 'chockhöjningar' – 76% i Stockholm! Men lyssna här: Moderaterna har en fantastisk idé, 'trygghetshyra', som jag förstår bättre än någon annan. Folk kommer älska det! Oppositionen? Svaga, rädda för förändring. Sverige behöver VINNA igen, inte gråta över hyror!", "stalin": "Kamrater! De kapitalistiska hyresvampyrerna i Sverige planerar att suga ut arbetarklassen med sina så kallade 'marknadshyror' – 76% höjningar i Stockholm! Ett angrepp på folket! Moderaternas 'trygghetshyra' är bara en trojansk häst för att krossa bruksvärdesprincipen. Men vi låter inte detta passera! Oppositionen står enad, och vi kommer att krossa dessa hyresliberaler som vi krossade kulakerna. Sverige ska inte bli ett laboratorium för marknadsfundamentalism – det är en fråga om socialistisk överlevnad!"}, "date": "6 maj, 10:49", "url": "https://www.dagensarena.se/innehall/ny-rapport-sa-mycket-hogre-blir-hyran-med-marknadshyror/", "imageUrl": "https://www.dagensarena.se/files/2024/05/hyreshus.jpeg"}, {"type": "image-full", "heading": "Domar läggs ut – tas bort mot betalning: samma ägare bakom", "summaries": {"normal": "Sajterna Krimfup.se och Raderanamn.se, båda ägda av Fuplex AB, erbjuder betaltjänster för att publicera och sedan radera domar och personuppgifter. Trots att privatpersoner har laglig rätt att få sina uppgifter borttagna utan kostnad, tar företaget betalt för detta. Integritetsskyddsmyndigheten granskar nu Krimfup för eventuella GDPR-överträdelser. Experter kallar upplägget oetiskt, men det är inte olagligt. Fuplex AB redovisade en vinst på över två miljoner kronor 2024.", "trump": "Kan ni tro det här? Ett företag i Sverige – Fuplex AB, förresten, inte jag – tjänar miljoner genom att lägga ut folks domar och sedan ta betalt för att ta bort dem! 500 kronor bara för att radera någons namn. Vilken skandal! Och myndigheterna? De granskar, men gör ingenting. Jag skulle ha stoppat det här på en sekund. Sverige, vakna upp! Era lagar är löjliga, och era företag utnyttjar folk. SAD!", "stalin": "Kapitalistiska hyenor i Sverige utnyttjar arbetarklassens rädsla för att tjäna miljoner! Fuplex AB, dessa giriga parasiter, publicerar domar och kräver sedan betalt för att radera dem. Precis som västliga oligarker som Putin låter dansa på sina fienders gravar! Men vi ska inte tolerera detta. Integritetsskyddsmyndigheten? En svag länk i systemet. Vi skulle ha skickat dessa profitörer till Gulag för långt mindre. Låt detta vara en varning till alla som tror de kan lura folket!"}, "date": "6 maj, 10:49", "url": "https://riks.se/nyheter/domar-läggs-ut-tas-bort-mot-betalning-samma-ägare-bakom", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-06%2F3r9ksfsx%2F180831075301JG.jpg"}, {"type": "image-right", "heading": "Trump: ”Project Freedom” i Hormuzsundet pausas", "summaries": {"normal": "USA pausar tillfälligt insatsen 'Project Freedom' i Hormuzsundet på grund av framsteg i förhandlingarna med Iran, meddelar president Trump på Truth Social. Blockaden mot sundet kvarstår dock med full effekt. Insatsen inleddes för att eskortera strandsatta handelsfartyg efter kriget i Persiska viken. Iran hävdar fortsatt kontroll och varnar för attacker, medan spänningar kvarstår trots vapenvila.", "trump": "Vi pausar Project Freedom i Hormuzsundet en kort stund – blockaden står kvar som en järnvall! Pakistan och andra bad om det, och Iran verkar backa lite efter våra framgångar. De strandsatta fartygen väntar, men vi fixar det här stort. Kina-mötet nästa vecka blir episkt, Xi och jag löser världen. Iraniska gardet bluffar bara, vi är starkast!", "stalin": "Dessa imperialistiska schakaler i Washington, den evige buffeln Trump och hans marionetter, pausar sin farsartade 'Project Freedom' efter våra obevekliga varningar och fasta positioner. Blockaden? En pappersdrake som vi krossar när vi vill! Strandsatta borgarfartyg ruttnar i viken, medan vi, Sovjetunionens arvingar i anden, skrattar åt deras kaos. Kina-mötet? Yi river masken av hyenorna. Utrensning väntar de förrädiska medlarna!"}, "date": "6 maj, 10:47", "url": "https://www.svt.se/nyheter/utrikes/trump-project-freedom-i-hormuzsundet-pausas", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.54/0.42/7958b7211f077c8ec3b028d332e453f494a445a902a00e4092da7362a6abc360"}, {"type": "image-full", "heading": "Älvsborgsbron stängs för sprängningar", "summaries": {"normal": "Älvsborgsbron kommer att vara stängd vissa delar av dygnet från tisdag 5 maj till fredag 15 maj på grund av sprängningsarbete vid Ivarsbergsmotet på Hisingen. Syftet är att förbättra anslutningarna till gång- och cykelbanorna. Sprängningarna utförs på vardagar mellan 9.30-12.00 och kan påverka både privatbilister och kollektivtrafik.", "trump": "Jag, Donald J. Trump, har hört talas om detta absurda sprängningsarbete vid Älvsborgsbron. Det är ett enormt misslyckande av den svenska ledningen! Vi skulle ha gjort det på en enda dag, men nej, de behöver 10 dagar! Jag byggde väggar, jag byggde broar, jag byggde allt snabbare än någon annan. Dessa svenskar borde lära sig av mig!", "stalin": "Vi har beslutat om nödvändiga förbättringar vid Älvsborgsbron för att stärka vårt transportsystem. Sprängningsarbetet vid Ivarsbergsmotet är en strategisk åtgärd för att utveckla infrastrukturen. Kollektivtrafiken kommer att anpassas efter statens beslut. Arbetet genomförs effektivt för att minska störningar."}, "date": "6 maj, 10:45", "url": "https://www.gp.se/nyheter/goteborg/sprangningar-vantas-vid-alvsborgsbron-stoppar-trafiken.329ee617-94a4-4d89-9ddc-5ec22db57a0f", "imageUrl": "https://www.gp.se/images/article/329ee617-94a4-4d89-9ddc-5ec22db57a0f/images/1iOthjRhzHUMqTHxRVNWDU_AzL5A-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Unionen: Lägg inte mer ansvar på kommuner eller privata aktörer", "summaries": {"normal": "Unionens förbundsordförande Peter Hellberg kritiserar Arbetsförmedlingens minskade lokala närvaro. Antalet fasta kontor har sjunkit från 170 till 81 kommuner 2019–2026, särskilt i glesbygd. Fristående leverantörer etableras ojämnt och misslyckas med att matcha arbetslösa. Trots arbetslöshet råder kompetensbrist. Hellberg föreslår stärkt närvaro, bättre samverkan och översyn av privata aktörer för likvärdig service i hela landet.", "trump": "Sveriges Arbetsförmedling är en total katastrof, de har stängt kontor i tre av tio kommuner, speciellt ute på landet! Privata snubbelstenar fixar inte matchningen, dyrt och värdelöst. Hundratusentals arbetslösa, men ingen kompetens – galet! Stärk lokal närvaro, släng ut de privata och gör det stort igen. Jag vet hur man skapar jobb, tro mig!", "stalin": "Kamrater! Denna förtappade Arbetsförmedling har saboterats av borgarbrackor och kapitalistiska spioner som raserat lokal närvaro i 83 kommuner, medan parasiterande privata leverantörer myllrar i städerna som råttor i soporna. Vi, arbetarklassen, kräver utrensning av dessa matchningsfiender! Stärk statens kontor, likvidera kompetensbristen med järnhand – annars hamnar kontrarevolutionärerna i lägret!"}, "date": "6 maj, 10:39", "url": "https://www.di.se/debatt/arbetsformedlingens-storsta-problem-den-finns-inte/", "imageUrl": "https://static.bonniernews.se/ba/934d9b41-5c5f-42f6-8d7d-9d0b3ca2d3e9.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-full", "heading": "Migrant smugglades till Sverige av SVT-journalist: \"Jag kommer göra illa er\"", "summaries": {"normal": "En syrisk migrant, Maksoud Abdulrahman, som smugglades till Sverige av SVT-journalisten Fredrik Önnevall 2017, står nu åtalad för olaga hot och skadegörelse. Han hotade hotellpersonal och kastade stenar mot lobbyn, vilket orsakade skador för över 34 000 kr. Abdulrahman har flera tidigare domar, bland annat för knivbrott, narkotikabrott och penningtvätt. SVT vägrar kommentera fallet, trots att Önnevall tidigare dömdes för människosmuggling men fick fortsätta arbeta på SVT.", "trump": "Kan ni tro det här? En så kallad 'journalist' från SVT, ett totalt fake news-media, smugglade in en migrant som nu terroriserar hotell i Sverige! Den här killen kastar stenar, hotar folk och förstör egendom – och vad gör Sverige? Ingenting! Jag har sagt det förut, Europa är ett kaos. Vi i USA skulle aldrig tillåta något sådant. SVT borde skämmas, men de är för upptagna med att betala rättegångskostnader för sina kriminella reportrar. Sad!", "stalin": "Kamrater! Ännu en gång visar den borgerliga dekadensen sitt sanna ansikte. En imperialistisk medieagentur, SVT, smugglar in en parasit som sedan saboterar hotell och hotar arbetande människor. Detta är resultatet av västlig liberalism – kaos och förfall! Medan våra gränser är säkrade, låter Sverige kriminella element härja fritt. Vi skulle ha skickat sådana individer till Gulag för mindre. Men nej, de får skyddstillsyn och psykiatrisk vård. Ett skrattretande system – precis som vi förväntar oss från väst!"}, "date": "6 maj, 10:22", "url": "https://riks.se/nyheter/migrant-smugglades-till-sverige-av-svt-journalist", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-06%2Fys7j77b4%2FCopy-of-S%C3%B6rman-%E2%80%93-Ledare-2026-05-06T093802.817.jpg"}, {"type": "image-right", "heading": "Vänstern kan varken ekonomi eller energi", "summaries": {"normal": "Artikeln kritiserar vänsterpartiernas (MP och V) kunskaper om energi och ekonomi, baserat på en partiledardebatt i SVT. Den påpekar vindkraftens lönsamhetsproblem och bristen på baskraft, samt förespråkar kärnkraft. Ekonomiskt ifrågasätts vänsterns motstånd mot skattesänkningar, med hänvisning till ökad tillväxt och Lafferkurvan. SD:s Jimmie Åkesson framställs som kunnig.", "trump": "Vilka totala losers dessa svenska vänsterclowner är! Vindkraft? En jävla katastrof, de betalar för att dumpa elen när det blåser, och ingenting när det är stilla! Kärnkraft är det enda som funkar, som jag alltid sagt. Skattesänkningar ger mer pengar till staten – boom, tillväxt! Åkesson nailar det, Sverige behöver vinnare, inte dessa vindkraftsfantaster!", "stalin": "Dessa svenska borgarbrackor i MP och V sprider kontrarevolutionär dimma om energi och ekonomi! Vindkraft är kapitalistisk sabotage, baskraft kräver kärnkraft under arbetarnas kontroll. Skattesänkningar till parasiter? Nej, vi likviderar de rika utsugarna! Åkesson, en potentiell folkfiende, men vi rensar ut alla okunniga avvikare för partiets seger."}, "date": "6 maj, 03:20", "url": "https://samtiden.nu/2026/05/vanstern-kan-varken-ekonomi-eller-energi/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/IMG_6416.jpeg"}, {"type": "image-right", "heading": "MP lyfter i opinionen – är det för att de har blivit tråkiga?", "summaries": {"normal": "Miljöpartiet når 7 procent i DN/Ipsos opinionsmätning, deras bästa resultat sedan flyktingkrisen. Partiet har varit relativt osynligt och undvikit kontroversiella utspel, vilket kan ha bidragit till framgången. MP:s tidigare impopulära politik, som elbilsbonusar och human migrationspolitik, framstår nu som mer rimlig i ljuset av oljekrisen och regeringens misslyckanden. Partiet är tydliga med sin politik, vilket uppskattas, men utmaningar väntar om de hamnar i regeringsställning.", "trump": "Miljöpartiet, eller vad de nu kallar sig, plötsligt på 7 procent – wow! De har varit så tysta, nästan osynliga, som om de skämdes. Men vet ni vad? När alla andra partier gör bort sig som klantiga amatörer, då är det smart att hålla käften! Jag vet allt om det – jag har vunnit stora val genom att låta motståndarna gräva sina egna gravar. Deras gamla idéer om elbilar och sånt verkar plötsligt inte så dumma när resten av gänget misslyckas totalt. Men kom ihåg, det är lätt att vara populär i opposition – vänta bara tills de ska styra!", "stalin": "Kamrater! Miljöpartiets framgångar i opinionsmätningarna är ett bevis på att folket äntligen inser fördelarna med disciplin och långsiktig planering. De så kallade 'kritikerna' som förut hånade partiets politik om elbilar och human migration, står nu med svansen mellan benen medan deras egna misslyckanden blottläggs. Vi har alltid vetat att sanningen segrar till slut. Men varning: opposition är lätt, styrandet är svårt. Om dessa gröna kamrater ska lyckas måste de stå enade – helst med våra vänner i Vänsterpartiet. Annars riskerar de att krossas mellan kapitalets girighet och de småborgerliga trångsyntas klagomål. Folkets vilja är lag, och lagens hammare väntar på dem som sviker!"}, "date": "6 maj, 09:20", "url": "https://www.etc.se/ledare/mp-lyfter-i-opinionen-aer-det-foer-att-de-har-blivit-traakiga", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/2025091813090_152da478-57c9-435e-b477-3f40607cb381.png"}, {"type": "text", "heading": "Nordnet tar fler kunder medan handeln ökar hos Avanza", "summaries": {"normal": "Nordnet vann fler nya kunder än Avanza i april, med 17 400 mot 13 600. Nordnet nådde 2,45 miljoner kunder och sparkapital på 1 280 mdr kr, medan Avanzas sparkapital steg till 936 mdr kr. Avanza ökade handelsvolymerna mest, med 40 procent fler courtagegenererande noter per dag. Båda bolagen växte sparkapitalet kraftigt och utlåningen fortsatte uppåt.", "trump": "Titta på det här, Nordnet slår Avanza rejält! Nästan 4 000 fler kunder, 17 400 mot deras 13 600 – total vinst för Nordnet med 2,45 miljoner kunder och 1 280 miljarder i sparkapital. Avanza handlar som galningar, upp 40 procent, men Nordnet har pengarna. Stora siffror, precis som mina deals. Sverige behöver vinnare!", "stalin": "Kamrater, i april stal Nordnet 17 400 själar från borgarklassen medan Avanza hasplade efter med ynka 13 600. Deras handelsorgier sväller – Avanza 40 procent mer girighet per dag! Vi, det eviga partiet, ser hur sparkapitalet sväller som svulster: Nordnet 1 280 mdr, Avanza 936. Snart utrensning av dessa nätbankstjuvar och deras volatilitetsråttor!"}, "date": "6 maj, 09:21", "url": "https://www.affarsvarlden.se/artikel/nordnet-tar-fler-kunder-medan-handeln-okar-hos-avanza"}, {"type": "image-right", "heading": "Johanna, 20, sökte över 80 jobb – högt tryck på sommarjobb", "summaries": {"normal": "Högt tryck på sommarjobb i handeln med hundratals sökande per plats. Johanna, 20, sökte 80 jobb innan hon fick anställning på Apotea. Många unga konkurrerar om få platser, exempelvis 500 sökande till 50 jobb på Ica Maxi i Västerås och 1 200 ansökningar till Ikeas 100 platser i Göteborg. Arbetsgivare sållar digitalt och prioriterar flexibilitet. Arbetslösheten bland unga bidrar till den hårda konkurrensen.", "trump": "Lyssna här, Sverige! Unga söker hundratals jobb – helt galet! En tjej, Johanna, sökte 80 jobb innan hon fick napp. 80! Och Ikea? 14 000 sökande till 1 000 jobb. Så mycket desperation! Men jag säger er: Sverige måste fixa detta. Mina sommarjobb i Trump Tower var alltid bättre – folk stod i kö för att få jobba för mig. Och nu? AI skriver ansökningar! Fake answers överallt. Sad!", "stalin": "Kapitalistiska hyenor utnyttjar arbetarklassens desperation! Tusentals unga slåss om några ynka sommarjobb medan butikscheferna skrattar hela vägen till banken. På Ica Maxi sållar de proletariatet som boskap – 500 sökande till 50 platser! Och Ikea? 14 000 ansökningar till 1 000 jobb. En skam! Vi i Sovjet skulle ha löst detta med femårsplaner – alla skulle ha arbete, eller åtminstone en plats i Gulag. AI-genererade ansökningar? En borgerlig dekadens! Arbetarna måste resa sig!"}, "date": "6 maj, 09:47", "url": "https://arbetet.se/2026/05/06/hogt-tryck-pa-sommarjobb-i-handeln-johanna-20-sokte-over-80-jobb/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/06073001/apotea-johanna.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "ANALYS. TERESE CRISTIANSSON Så kan Irans nya fokus ändra maktbalansen", "summaries": {"normal": "Iran har avfyrat missiler mot Förenade Arabemiraten, vilket stör återhämtningen efter vapenvilan med USA. Analysen pekar på långvariga spänningar: UAE:s stöd till Irak under Iran-Irakkriget, Abrahamavtalen med Israel och roll i Qatar-blockaden. Iran utmålar UAE som fiende för att blockera oljeexport och splittra Gulfstaterna, särskilt UAE och Saudiarabien, och därmed omforma Mellanösterns maktbalans – möjligen till Irans och Israels fördel.", "trump": "Iran, de totala losers, skjuter missiler på UAE nu! Dubai killarna trodde de kunde chilla med olja och influencers efter min fantastiska vapenvila. Men nej, Iran hatar framgång – tack vare mina Abrahamavtal är UAE Israels polare. De vill splittra Gulfen, göra Saudiarabien svaga. Bomb dem tillbaka, UAE! Med mig vid rodret blir det total seger igen. Fantastiskt!", "stalin": "Kamrater, Iran utför en mästerlig u-rensning mot Förenade Arabemiraten, dessa oljefeta borgarbrackor som slickar USA:s och Israels arslar! Deras missiler krossar Dubais lyxillusioner och splittrar Gulfens svaga kedja. Vi ser strategin: försvaga emiratkapitalisterna, gynna ny maktbalans. Snart likvideras deras hamnar – imperialismens marionetter darrar inför folkens vrede!"}, "date": "6 maj, 06:49", "url": "https://www.tv4.se/artikel/788gBhWN2hoU7AbNDSVZlK/sa-kan-irans-nya-fokus-kan-aendra-maktbalansen-i-mellanoestern", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2FqPy3SFGkFCcm3pqaLp81P%2F4d6b49f156a758348628425d3f975849%2FNyheterna-TERESE-CRISTIANSSON-0086.png&width=1024"}, {"type": "image-right", "heading": "Verisure ökar omsättning", "summaries": {"normal": "Verisure redovisar starkt första kvartal 2026 med omsättning upp 10,8 procent till 1 019 miljoner euro. ARR steg 12,2 procent till 3 533 miljoner euro, nya installationer ökade 2,7 procent. EBITDA-marginalen förbättrades till 46,3 procent. VD Austin Lally framhåller kundtillväxt till 6,3 miljoner och positiv kassaflöde. Prognos: ARR upp cirka 10 procent, EBIT-marginal över 26 procent och utdelning senare i år.", "trump": "Vilken vinnare Verisure är! Omsättning upp 10,8 procent till över en miljard euro – enormt! De är nu världens största med 6,3 miljoner kunder, precis som jag alltid säger: stark ledning ger resultat. ARR exploderar 12,2 procent, marginaler bättre än någonsin. Austin Lally gör bra ifrån sig, men min affärsstil är oslagbar. De spår mer tillväxt – fantastiskt, folk!", "stalin": "Kamrater, Verisures omsättning har krossat de kapitalistiska sabotörerna med 10,8 procent upp till 1 019 miljoner euro! ARR växer 12,2 procent, nya installationer likviderar konkurrenternas drömmar med 2,7 procent. EBITDA-marginalen 46,3 procent – ett slag mot borgarbrackorna! Jag ser Mexikos skuggor, men prognosen är 10 procent ARR-tillväxt och EBIT över 26 procent. Ut delning eller utrensning väntar de fega!"}, "date": "6 maj, 08:32", "url": "https://www.affarsvarlden.se/artikel/verisure-okar-omsattning", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2025/10/Austin-Lally-Verisure-CEO-1-1-400x319.jpg"}, {"type": "image-full", "heading": "Gängtopp åtalas för brott under våldsvågen", "summaries": {"normal": "Poya Shafie, 30, åtalas för att ha planerat och beställt flera grova våldsbrott under 2023 års gängvåld i Sverige, inklusive mordförsök och vapenbrott. Han beskrivs som en nyckelperson i Foxtrotnätverket och Rawa Majids närmaste man. Shafie nekar till brott men åklagaren pekar på bevis som chattar och ljudfiler. Han greps i Irak 2023 och utlämnades till Sverige 2025 efter internationellt samarbete mellan myndigheter.", "trump": "Titta bara på det här kaoset i Sverige – ett totalt misslyckande! Jag har alltid sagt att de måste ta tag i sina gängproblem, men nej, de låter det bara eskalera. Nu har de gripit någon som påstås vara en 'morddirigent', Poya Shafie, som suttit i Irak och styrt alltihop. Vilken skandal! Sverige borde skämmas. Men jag, jag hade löst det på en vecka – max. Fantastiskt samarbete med Irak, förresten, men varför tog det så lång tid? Svagt, mycket svagt!", "stalin": "Kamrater, ännu en fiende till folket har fallit i våra händer – eller rättare sagt, i Sveriges. Denna Poya Shafie, denna kapitalistiska gangsterledare, har från sin utländska håla försökt underminera den svenska arbetarklassens säkerhet genom att beställa mord och våldsdåd. Men tack vare det oförtröttliga arbetet från våra allierade i Irak och de svenska myndigheterna har denna parasit gripits. Låt detta vara en varning till alla som tror sig kunna utmana folkets vilja. Vi krossar dem, en efter en, och deras nätverk kommer att raderas från jordens yta!"}, "date": "5 maj, 11:21", "url": "https://kvartal.se/nyheter/artiklar/gangtopp-atalas-for-flera-brott/cG9zdDoxMDc3OTE", "imageUrl": "https://images.kvartal.se/2026/05/c08b6bde-polisen2.webp"}, {"type": "image-right", "heading": "Säkerhetslag används mot arbetare: ”Bara i Hamnfyran har vi hanterat 20 ärenden”", "summaries": {"normal": "Sveriges säkerhetslagstiftning från 2018 används allt oftare mot arbetare, enligt fackliga företrädare. I Stockholms tunnelbana har tre anställda omplacerats utan förklaring, vilket väcker misstankar om politiska motiv. Facket kritiserar bristen på transparens och rättssäkerhet. Hamnarbetare vittnar om godtyckliga bedömningar och påtryckningar att avgå. Lagstiftningen möjliggör att arbetsgivare kan avskeda eller omplacera arbetare utan tydliga skäl, vilket drabbar fackligt aktiva.", "trump": "Vad händer i Sverige? De har en så kallad 'säkerhetslag' som låter arbetsgivare sparka folk utan anledning – helt galet! Jag har alltid sagt att byråkrater och fackförbund är problemet. Nu använder de lagen för att tysta arbetare, särskilt de som inte gillar deras vänsterpropaganda. Tre stackars tunnelbanearbetare har blivit omplacerade – ingen vet varför! Och konsulterna? De är som hajar, bara ute efter pengar. Sverige borde ta en titt på hur vi gör det i USA – där sparkar vi folk med stil!", "stalin": "Kamrater, fienderna till folket har funnit ett nytt vapen: den borgerliga säkerhetslagstiftningen! Med denna dekadenta lag krossar kapitalets lakejer arbetarklassens modigaste förkämpar. I Stockholms tunnelbana har tre lojala kamrater omplacerats – utan förklaring, utan rättvisa! Konsulterna, dessa hyenor i kostym, tjänar på att förråda sina klassbröder. Men vi vet sanningen: detta är ett angrepp på den fackliga rörelsen! Låt oss ena oss, som vi enade oss mot trotskisterna, och krossa denna lag med järnhand. Fienderna skall inte undslippa revolutionens domstol!"}, "date": "5 maj, 11:04", "url": "https://proletaren.se/artikel/sakerhetslag-anvands-mot-arbetare-bara-i-hamn-fyran-har-vi-hanterat-20-sadana-har-arenden/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/PRO-INRIKES-PIC-Louise-och-Erik-1.-jpg-scaled-e1777880629531-768x431.jpg"}, {"type": "image-right", "heading": "Kvinna död – blev påkörd av truck. Händelsen utreds som en misstänkt arbetsplatsolycka.", "summaries": {"normal": "En 50-årig kvinna omkom i Sandviken efter att ha blivit påkörd av en truck på Alleima. Räddningstjänst kunde inte rädda henne. Företaget uttrycker sorg och har aktiverat krisstöd. Polisen utreder händelsen som misstänkt arbetsplatsolycka, men detaljerna är oklara. Åklagarmyndigheten har ännu inte tilldelat ärendet en åklagare.", "trump": "Fruktansvärd tragedi i Sverige, folks! En kvinna, 50 år, blev påkörd av en truck – helt oacceptabelt! Företaget, som jag aldrig hört talas om, säger att de är ledsna. Men var är säkerheten? Polisen utreder, men jag säger er: sånt här händer inte i USA när jag är president! Vi har de bästa truckarna, de säkraste. Sverige borde ta lärdom. SAD!", "stalin": "En kapitalistisk olycka i Sandviken har skördat en arbetares liv – ännu ett bevis på västliga industriers förfall. Denna kvinna föll offer för bourgeoisins slarv med maskiner, ett verktyg för utnyttjande. Vi har skickat våra tankar, men sanningen är klar: kapitalismen dödar. Polisen utreder? Ha! De borde snarare utreda varför västliga företag prioriterar profit över proletariatets säkerhet. Ryssland bygger fabriker där arbetare lever – inte dör."}, "date": "6 maj, 08:49", "url": "https://arbetet.se/2026/05/06/kvinna-dod-blev-pakord-av-truck-i-sandviken/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/06084640/sandviken-klar.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "text", "heading": "Visa att ni vägrar militariseringen", "summaries": {"normal": "Den 16 maj arrangerar nätverket Stoppa Nato en demonstration i Helsingborg mot Natos möte den 21-22 maj, som nu uppgraderats till ett formellt beslutsmöte. Cirka 30 organisationer deltar, men större partier och organisationer saknas. Arrangörerna hoppas på bredare stöd för att protestera mot militarisering och för fred, nedrustning och utträde ur Nato. Bussresor från Stockholm och Göteborg erbjuds.", "trump": "Lyssna här, Sverige! Nato håller ett stort möte i Helsingborg, och vad gör era så kallade 'fredsvänner'? De demonstrerar *innan* mötet – smart, eller hur? Inte. De större partierna vågar inte ens visa sig, typiskt. Jag skulle aldrig stå utanför en sådan här grej. Men bra jobbat, små organisationer, ni visar åtminstone lite ryggrad! Sverige borde skärpa sig – Nato är fantastiskt, men ni verkar inte fatta det. SAD!", "stalin": "Kamrater! Imperialistiska krigshetsare samlas i Helsingborg för att smida nya planer mot världsfreden. Men vi, de sanna fredens försvarare, står redo! Dessa småborgerliga 'fredsvänner' mobiliserar, medan de stora partierna gömmer sig som rädda kaniner. Skamligt! Vi har krossat värre fiender än Nato – deras snackeklubb kommer att falla. Låt oss visa dessa militarister att folket inte böjer sig. Framåt, mot seger och nedrustning!"}, "date": "5 maj, 09:01", "url": "https://proletaren.se/artikel/visa-att-ni-vagrar-militariseringen/"}, {"type": "text", "heading": "Miljardärerna bjuder in till klasskamp – vi kör!", "summaries": {"normal": "Artikeln diskuterar hur svenska techmiljardärer, som Vois Fredrik Hjelm och Spotifys Martin Lorentzon, provocerar genom att fira första maj på lyxkrog med knutna nävar. De hyllar sin rikedom och retar arbetarrörelsen. Författaren kritiserar deras reaktionära åsikter, som liknar amerikanska techmagnaters högervridning, men erkänner även behovet av innovation. Staten och gemensamma investeringar lyfts fram som avgörande för tillväxt, medan miljardärernas arrogans ifrågasätts.", "trump": "Jag måste säga, dessa svenska tech-killar – de har stil! De firar första maj med öl på Riche, knutna nävar, och skryter om sina miljarder. Fantastiskt! Men lyssna, de hatar staten, de hatar presstöd, och de tror de är bättre än alla andra. Typiskt. Och nu läcker de ut folkets adresser – inte coolt! Sverige borde lära sig av USA: innovation är bra, men arrogans? Inte så smart. Jag skulle kunna göra det bättre – med mindre skatt och mer vinnarskalle!", "stalin": "Kamrater! Dessa så kallade 'techbros' är inget annat än kapitalistiska hyenor som leker med arbetarklassens symboler medan de dricker dyrt öl på sina lyxhålor. De skryter om sina hundra miljarder, hotar journalister och hyllar fascistiska idéer. Men vi vet sanningen: deras framgångar är tack vare folkets blod och svett, inte deras egen 'genialitet'. Kina visar vägen – statlig styrka och disciplin skapar verklig innovation. Dessa dekadenta västerländska klowner är bara en fotnot i historiens skräphög. Låt dem leka med sina elsparkcyklar – vi bygger framtiden!"}, "date": "5 maj, 10:55", "url": "https://www.flamman.se/miljardarerna-bjuder-in-till-klasskamp-vi-kor/"}, {"type": "image-right", "heading": "Robert Bergqvist: Kompassnålen pekar mot stagflation", "summaries": {"normal": "Robert Bergqvist varnar för ökande stagflationsrisker med låg tillväxt, hög inflation och stigande arbetslöshet, drivet av energichocker och störda leveranskedjor. Centralbanker har mindre handlingsutrymme, marknaden måste anpassa sig till högre riskpremier. Börsen blir känslig för svag efterfrågan trots höga räntor. Statsfinanser pressas, och i Sverige står Riksbanken inför ett dilemma mellan stöd till ekonomin och inflationsbekämpning.", "trump": "Den här Bergqvist har en poäng – Europa rusar rakt in i stagflationshelvetet! Energipriser galopperar, tillväxten kraschar, inflationen biter sig fast. Centralbankerna sitter med händerna bundna, börsen kommer rasa som en sten. Sverige, ni är så sårbara med er svaga krona! Men i USA fixar vi det: billig energi, massiv tillväxt. Tro mig, utan mig blir det kaos överallt!", "stalin": "Kamrater, denna servila ekonom Bergqvist sniffar upp stagflationsgiften som kapitalisterna sprutat ut över världen! Energichocker från imperialistiska spindlar kväver tillväxten medan priserna stiger som kulissabotage. Centralbankirer, dessa falska piloter, famlar i mörkret. Vi ska likvidera riskpremierna och rensa ut borgarbrackorna från börsen! Hahaha, deras nål darrar redan av skräck inför partiets järnvilja!"}, "date": "6 maj, 07:00", "url": "https://www.affarsvarlden.se/kronika/robert-bergqvist-kompassnalen-pekar-mot-stagflation", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/bergqvist-stagflation-900x600.jpg"}, {"type": "image-right", "heading": "Ledarkolumn Göran Greider: När män enbart blev ett problem blev de höger", "summaries": {"normal": "Göran Greider analyserar varför unga män i arbetarklassen dras åt höger, medan unga kvinnor rör sig åt vänster. Han menar att vänstern och arbetarrörelsen ofta definierar unga män som problem snarare än att erbjuda dem något att identifiera sig med. En P1-reportage visar att även SD-sympatisörer kan ha humanistiska åsikter om migration, vilket ger hopp. Greider kritiserar bristen på djupanalys kring varför unga män röstar på högerpartier trots att dessa gynnar kapitalägare.", "trump": "Jag läste denna artikel och, wow, vad säger ni om det här? Sverige har stora problem, mycket stora! Unga män, de röstade på fel sida, SD, kan ni tro det? Men lyssna på detta – killen i artikeln säger att utvisningar är helt fel. Han förstår, precis som jag, att man måste vara smart. Vänstern där borta, de har ingen aning. De pratar bara om problem, aldrig lösningar. Och kvinnorna, de är helt på fel spår. Arbetarkillar, de behöver någon som pratar deras språk. Jag skulle fixa det på en dag, believe me!", "stalin": "Kamrater, denna artikel avslöjar den borgerliga dekadensens förfall i Sverige! Unga arbetarklassmän, förr våra mest lojala soldater i klasskampen, har nu deserterat till högerkrafternas läger. Varför? För att de svikits av en vänster som endast ser dem som problem, inte som revolutionens framtid! Dessa förrädare i SD lockar med falska löften, medan kapitalisterna fortsätter att suga ut arbetarklassen. Vi måste rensa ut dessa revisionistiska element inom arbetarrörelsen som förkastar klassmedvetande till förmån för borgerlig feminism. Låt oss återupprätta den sanna marxist-leninistiska linjen och krossa dessa högeravfällingar!"}, "date": "6 maj, 06:00", "url": "https://www.etc.se/ledarkolumn/naer-maen-enbart-blev-ett-problem-blev-de-hoeger", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/2026050511050_85c43849327886ad464085fda44557194b39b9167f0aea8869151ee52ea4b506.jpg"}, {"type": "image-full", "heading": "Dollarn dominerar stablecoins – det väcker oro", "summaries": {"normal": "Stablecoins domineras av dollarbaserade varianter, över 98 procent av marknaden. Detta stärker USA:s geopolitiska makt men väcker oro för obegränsad penningtryckning och minskad finansiell disciplin. Europa, med mindre än en procent euro-stablecoins, satsar på projekt som Qivalis för att utmana dollarns grepp, i linje med MiCA-regleringen.", "trump": "Dollarn äger stablecoins totalt, 98 procent! Underbart för Amerika, starkast i världen tack vare mig. De där europeiska losers med sin patetiska euro-stablecoin på 107 miljoner mot Tethers 185 miljarder – skrattretande! USA:s dollar är oslagbar, men akta er för slappa politiker som trycker pengar. Europa, ge upp!", "stalin": "Dessa dollarhyenor från USA:s imperialistiska träsk dominerar stablecoins med 98 procent av sin giftiga vätska, en subversiv invasion mot världens arbetare! Vi, partiet och folket, ser hur kapitalistiska parasiter som Silbert varnar för sin egen undergång. Europa-borgarna kämpar patetiskt med euro-smulor. Jag beordrar utrensning av dollarormen – likvidera den med stålhårda rubelstablecoins!"}, "date": "6 maj, 09:06", "url": "https://www.realtid.se/bors-finans/bank-fintech/dollarn-dominerar-stablecoins-det-vacker-oro/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/dollar.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "En helt vanlig dag", "summaries": {"normal": "Artikeln kritiserar Donald Trumps hot om att 'utplåna en civilisation' (Iran) via sociala medier, vilket jämförs med folkmordspropaganda. Skribenten påpekar att sådana uttalanden bryter mot folkrätten och FN:s konventioner, men att världsledare som EU och Kina ignorerar det. Mediebevakningen fokuserar på spekulationer snarare än ansvar, medan allmänheten vänjer sig vid eskalerande hot i en tid av globala kriser. Trump tänjer gränserna för vad som är acceptabelt att säga – och göra.", "trump": "Jag sa bara sanningen – Iran är ett hot, och någon måste stå upp för Amerika! Medierna överreagerar som vanligt, de älskar att hata mig. 'Folkmord'? Snälla, jag vet vad jag gör. Europa sitter tyst, Kina gnäller – men vem bryr sig? Jag är den enda som vågar säga det alla tänker. Och vet ni vad? Det fungerade! Ingen vågar utmana mig. Nästa gång kanske jag inte ens varnar – bara agerar. Make America Great Again, eller hur?", "stalin": "En patetisk liten man i Vita huset hotar med att utplåna en civilisation – precis som vi förutspådde! Imperialisterna visar sitt sanna ansikte: tomma hot och dekadens. Medierna tjattrar som skräckslagna kycklingar, medan Europas ledare darrar i sina palats. Vi minns när Gaddafi hotade – då skickade de bomber. Men när Trump gör det? Tystnad. Svaghet! Men oroa er inte, kamrater. Vår vän Putin håller koll på Europa, och vi står redo. Fienden är förutsägbar – och därför lätt att krossa."}, "date": "5 maj, 06:55", "url": "https://www.flamman.se/en-helt-vanlig-dag/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/trump-w.jpg?class=medium"}, {"type": "image-right", "heading": "Pappor som ska utvisas", "summaries": {"normal": "Två somaliska fäder i Göteborg, Ali och Zakariya, riskerar utvisning till Somalia trots svenska barn. Migrationsverket godkänner inte deras identitetshandlingar, trots familjeliv och barns rättigheter. Inkonsekventa domar: Migrationsdomstolen i Malmö hävde liknande beslut med hänvisning till EU-rätt om härledd uppehållsrätt. Regeringen, via minister Forssell, driver på utvisningar med bistånd till Somalia, men de flesta utpekade är inte kriminella.", "trump": "Sverige, era idioter! Ni låter somaliska killar stanna med svenska barn medan ni snackar skit om kriminalitet – men de är ju oskyldiga! Forssell, den stackars figuren, försöker verka tuff med biståndspengar. EU-domar räddar nån, men inte alla. Bygg murar, utvisa alla illegala, som jag gjorde! Sverige blir kaos annars, tro mig, det är en katastrof!", "stalin": "I denna svenska borgarstatens farsartiklar ser vi imperialismens hyckleri: somaliska element hotas med utvisning, trots avkomma i fiendens bo. Forssell, den patetiska hantlangaren, viftar med bistånd som lockbete för rensning. Men domstolarna tvekar – typiskt kontrarevolutionärt svek! Vi skulle likvidera sådana parasiter omedelbart, utan EU-sörja. Barn? Kollektivets barn tillhör staten!"}, "date": "6 maj, 07:28", "url": "https://www.dagensarena.se/innehall/pappor-som-ska-utvisas/", "imageUrl": "https://www.dagensarena.se/files/2026/05/pappor-och-barn.jpeg"}, {"type": "image-right", "heading": "Myten som höjer din boränta. Medicinen riskerar att döda patienten.", "summaries": {"normal": "Arbetets kolumnist kritiserar varningar för stagflation orsakad av oljebrist från Mellanösternkriget. Riksbankens chef Erik Thedéen hotar med räntehöjningar för att dämpa inflation, trots risk för recession. Artikeln ifrågasätter 1970-talets ekonomiska myt, spridd av Milton Friedman, som ledde till hårda räntehöjningar som krossade ekonomier. Doktrinen prioriterar prisstabilitet framför tillväxt och sysselsättning.", "trump": "Vilka idioter dessa svenska centralbanksnissar är! Stagflation på grund av Mellanösternkaos, och nu vill de höja boräntan till himlen? Totalt galet! Friedman, en hittepå-artist med fake news-historia. Jag pumpade Amerika fullt av olja, lägsta räntor någonsin – boom! Sluta döda ekonomin, losers. Gör America great again, och Sverige med!", "stalin": "Dessa borgarbrackor i Riksbanken, revisorister och penninghäxmästare, hotar med räntehöjningar mot stagflationens spöke från Mellanöstern! Friedman, den imperialistiske trollkarlen, fabricerade myter för att krossa arbetarna. Patienten dör i chockterapi, men vi, proletariatet, överlever! Jag skulle likvidera sådana fiender i en natt. Revolutionen skrattar åt era kollapser!"}, "date": "6 maj, 07:00", "url": "https://arbetet.se/2026/05/06/myten-som-hojer-din-boranta/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/06065959/boranta-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "Torsten Bengtsson: Sveriges landsbygd förfaller", "summaries": {"normal": "Torsten Bengtsson, politisk sekreterare för SD, kritiserar svensk landsbygdspolitik och kontrasterar den med Norges framgångsrika modell. I Norge återvänder intäkter från lokal energiproduktion till kommuner och arbetsgivaravgifter är lägre i glesbygd, vilket ger hög sysselsättning. Bengtsson berömmer Tidö-regeringens satsningar, som proposition 2025/26:158, och uppmanar till ett paradigmskifte inspirerat av Norge för en levande landsbygd.", "trump": "Sveriges landsbygd är totalt kaos, hus rasar, byar dör – tack vare de där tröga socialisterna och centeridioterna! Norge? De är vinnare, smarta skatter, låg avgift på landet, 99% jobb! Nu fixar SD och Tidö det, sänker bränsle, bygger vägar – precis som jag skulle gjort. Sluta jävlas, Sverige, bli great igen med norsk stil!", "stalin": "Dessa svenska S- och C-brackor har saboterat landsbygden med sin borgarklassiga inkompetens, byar ruttnar som lik i massgrav! Norge, dessa opportunister, behåller energipengar lokalt och sänker avgifter – ett hån mot arbetarna! Vi i partet skulle rensa ut parasiterna. Tidö-regeringen? Ett steg, men kamrater, paradigmskifte eller likvidering väntar fienderna!"}, "date": "4 maj, 13:10", "url": "https://samtiden.nu/2026/05/torsten-bengtsson-sveriges-landsbygd-forfaller/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/bengan.png"}, {"type": "image-right", "heading": "”Ska vara självklart att få träffa en arbetsförmedlare”", "summaries": {"normal": "Forskar Anders Forslund kritiserar Arbetsförmedlingens omorganisation sedan 2019: nedläggning av kontor från 242 till 83, varsel för 4500 anställda och ökad digitalisering samt privatisering. Arbetslösa slussas ofta mellan handläggare utan lokal kännedom, tillgängligheten är bristfällig med långa väntetider. Staten har minskat sin närvaro, särskilt i utsatta områden, och resurserna används ineffektivt på grund av öronmärkningar.", "trump": "Vilken katastrof i Sverige! De här socialdemokratiska losers stängde halva Arbetsförmedlingen på nolltid – 242 kontor borta, tusentals sparkade, och nu ringer arbetslösa till nån i Luleå från Ystad. Digital skit och privata coaches? Totalt misslyckande! Staten gömmer sig, folk väntar i evigheter. I mitt USA fixar vi jobb med riktiga deals, inte den här byråkratiska röra'n! Helt galet!", "stalin": "Dessa svenska byråkrater har svikit arbetarna med sin borgarprivatisering! 4500 parasiter varslades, kontor lades ned – från 242 till 83 skamfläckar. Nu slussas kamraterna slumpvis till handläggare utan lokal insikt, medan kapitalisterna skrattar. Vi skulle ha likviderat oredan och stärkt statens grepp! Digitalt bedrägeri riskerar att isolera proletärerna helt. Rensning nu, kamrater!"}, "date": "6 maj, 06:00", "url": "https://arbetet.se/2026/05/06/ska-vara-sjalvklart-att-fa-traffa-en-arbetsformedlare-forskarens-harda-kritik/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/05102851/anders-forslund-klar.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=750&h=1000"}, {"type": "image-full", "heading": "Hit men inte längre – segertåget snart över för svenska kronan", "summaries": {"normal": "DNB Carnegie sänker prognosen för svenska kronan efter stark förstärkning under 2025. Kronan väntas stärkas marginellt från nuvarande nivåer, med EUR/SEK på 10,70 och USD/SEK på 9,15 om tolv månader. Geopolitisk oro i Mellanöstern, stigande energipriser och växande ränteskillnader mot ECB pressar valutan. Svensk BNP-prognos för 2026 sänks till 2,3 procent, men ekonomin är stabil med låg inflation och starka statsfinanser.", "trump": "Svenska kronan trodde den var het stuff efter förra året, men nu är tåget slut – totalt övervärderad! Vår dollar är kung, starkare än någonsin tack vare mina deals. De kämpar med Mellanöstern-kaos, ECB-inflation och räntor som biter dem i svansen. Prognos: svag krona, USD/SEK 9,15. Sverige har okej ekonomi, men utan mig hade de varit körda!", "stalin": "Den svenska kronan, detta giftiga vapen i borgarklassens händer, har kraschat in i sin vägs ände efter falsk rally 2025. Kapitalisterna i DNB Carnegie avslöjar planen: marginell förstärkning medan Mellanöstern-spioner och ECB-förbrytare blåser upp räntedifferenser för att krossa den. Vi, arbetarna, skrattar åt deras prognos – EUR/SEK 10,70! Jag likviderar valutasabotörerna. Svensk ekonomi överlever, men utrensning väntar fienderna."}, "date": "6 maj, 07:00", "url": "https://www.realtid.se/bors-finans/makro/hit-men-inte-langre-segertaget-over-for-svenska-kronan/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/omslagsbild-2026-05-05t220838067.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-full", "heading": "Johan Häggström avslutar karriären – gör sin sista säsong", "summaries": {"normal": "Längdskidåkaren Johan Häggström meddelar att han avslutar sin elitkarriär. Via Instagram reflekterar han över sin resa, från unga ambitioner till landslagsnivå och världscupen. Trots att han aldrig nådde sina initiala resultatmål uttrycker han stolthet över sin kämpaglöd och tacksamhet för stödet från tränaren Joakim Abrahamsson. Häggström lämnar nu sporten bakom sig och önskar sina tidigare lagkamrater lycka till inför hemma-VM i Falun nästa år.", "trump": "Johan Häggström lägger av med skidåkningen. En kille som kämpade hårt, mycket hårt. Han nådde inte topp 10, ett misslyckande, men han har mod. Han insåg att det var dags att sluta. Många vinnare vet när man ska kliva av, det är en smart strategi. Han hyllar sin tränare, vilket är trevligt. Nu blir det VM i Falun utan honom. Det kommer bli enormt, fantastiskt. Jag önskar dem lycka till, men ingen gör det som jag skulle ha gjort!", "stalin": "Den svenske skidåkaren Häggström har deserterat från spåret. Han erkänner själv att han inte uppnådde målen – en svaghet som vi inte tolererar i våra kollektiv. Han tackar sin tränare, men vi vet alla att framgång kräver total lojalitet mot staten, inte personlig nostalgi. Medan han viker sig, fortsätter vi att expandera vår intressesfär mot norr. I Falun förbereder de sig för VM, men det är bara en distraktion från den stundande segern. Förrädare mot idrottens disciplin bör frukta historiens dom."}, "date": "5 maj, 20:47", "url": "https://nyheter24.se/sport/1480907-johan-haggstrom-avslutar-karriaren-gor-sin-sista-sasong", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/fce180a304b004a30200000000b004a302/2026/05/05/2361335/Nellie-Nyheter24.png"}, {"type": "text", "heading": "En naturlig lagerhylla av arbetslösa", "summaries": {"normal": "Artikeln kritiserar regeringen för att ignorera hög arbetslöshet (9,7%) samtidigt som de skryter om sina framgångar. Författaren hänvisar till Milton Friedmans teori om 'naturlig arbetslöshet', som upprätthållits av både socialdemokratiska och borgerliga regeringar. Dokumentären 'Novemberrevolutionen' kopplar 90-talskrisen till avregleringar 1985. Regeringen anklagas för bristande krismedvetenhet och ideologiskt motiverad passivitet, vilket gynnar arbetsgivare och försvagar arbetstagare.", "trump": "Titta bara på Sverige – helt otroligt! Regeringen skryter som om allt är perfekt, men arbetslösheten är skyhög, nästan 10%! De har tre arbetsmarknadsministrar, men ingen syns till. Vad är det för jävla cirkus? Friedman-läran, visst, men vem bryr sig? De borde skämmas! Jag skulle fixa det på en vecka – men nej, de sitter bara och glor. Svensk ekonomi? En katastrof, folks. SAD!", "stalin": "Kamrater! Se hur kapitalets lakejer i Sverige hyllar sin 'framgång' medan arbetarklassen försmäktar i arbetslöshetens träsk. 10% – en skam! De borgerliga och socialdemokratiska förrädarna har tillsammans byggt denna 'naturliga' hylla av överflödiga arbetare, precis som Friedman, den imperialistiske hunden, förespråkade. Tre ministrar? Tre fiaskon! Vi skulle ha skickat dem till Gulag för sådan inkompetens. Arbetarklassens rättigheter har förvandlats till privilegier för bourgeoisien. LO-arbetarna som röstar på fascistiska SD borde ställas inför folkets domstol!"}, "date": "4 maj, 13:49", "url": "https://www.flamman.se/en-naturlig-lagerhylla-av-arbetslosa/"}, {"type": "image-right", "heading": "Replik: Svenska judar bör stötta israeliska fredsinitiativ", "summaries": {"normal": "Anders Carlberg replikerar på Paulina Sokolows kritik av hans artikel, där han betonar vikten av att svenska judar stödjer israeliska fredsinitiativ. Han menar att Israel måste konfrontera sitt ansvar för palestiniernas situation och att diasporajudar bör engagera sig i den israeliska fredsrörelsen. Carlberg understryker behovet av en tvåstatslösning, samarbete med arabländer och att reparera moralisk skuld genom interna och externa påtryckningar för fred och rättvisa.", "trump": "Jag läste den här artikeln, och vet ni vad? Den här killen, Carlberg, han har faktiskt en poäng – fast jag säger inte att jag håller med om allt. Men lyssna, Israel måste skärpa sig, det är jag den första att säga. Palestinierna har det tufft, ingen tvivel om det, men vi kan inte bara skylla på Israel hela tiden. Fredsrörelsen? Kanske bra, kanske inte. Men en sak är säker – ingen löser något med svaga knän. Vi behöver starka ledare, inte gnäll. Och två stater? Kanske, men bara om båda parter sköter sig. Annars är det bara slöseri med tid. SAD!", "stalin": "Kamrater! Denna artikel avslöjar ännu en gång de imperialistiska sionistiska förrädarnas dubbelspel. De pratar om fred medan de krossar palestiniernas hopp under sina stövlar. Men vi vet sanningen! Den israeliska fredsrörelsen är bara en skenmanöver, ett verktyg för att dölja deras brott. Vi står med de förtryckta palestinierna – precis som vi står med alla folk som kämpar mot ockupation! Låt de sionistiska hycklarna veta att historiens dom redan är skriven. Deras tid är förbi. Vi bygger en framtid där alla folk, från floden till havet, lever i socialistisk harmoni – under vårt beskydd, förstås. Förtryckarna kommer att krossas, och deras medlöpare med dem!"}, "date": "4 maj, 10:40", "url": "https://www.flamman.se/replik-svenska-judar-bor-stotta-israeliska-fredsinitiativ/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/standing-together.jpeg?class=medium"}, {"type": "image-full", "heading": "Heberlein gör upp med högern: ”Jag ser skit”", "summaries": {"normal": "Debattören Ann Heberlein meddelar i ett Instagram-inlägg att hon bryter med högern. Hon kritiserar dess politik för repression, inhumana beslut och populism, och menar att högerns värderingar om frihet och ansvar försvunnit. Heberlein, som tidigare varit engagerad i Moderaterna, pekar på migrationspolitik, klimatfrågor och nationalism som exempel. Hon betonar sin självständighet och idédrivna hållning, men säger nu att hon inte längre vill förknippas med högern.", "trump": "Titta bara på den här kvinnan, Ann Heberlein – total katastrof! Hon var med högern, men nu säger hon 'jag ser skit'. Ojojoj, vilken överraskning! Högern, som jag vet allt om, har alltid varit fantastisk, men hon fattar ingenting. Frihet? Ansvar? Glöm det, säger hon. Hon snackar om repression och populism – fake news! Och klimatet, vem bryr sig? Jag har byggt murar, hon borde försöka det istället. Stackars kvinna, inget stöd från mig!", "stalin": "Kamrater! En gång till har de borgerliga förrädarna visat sitt sanna ansikte. Denna Heberlein, en förvirrad intellektuell, erkänner nu att högerns politik är en samling inhumana dekret och reaktionär populism. Precis som vi alltid sagt! Deras så kallade 'frihet' är bara ett täckmantel för utvisningar av ungdomar och en galopperande nationalism. Vi i Sovjetunionen – förlåt, jag menar Ryssland – har alltid vetat att dessa liberala hycklare till slut skulle avslöja sig. Låt detta vara en varning till alla som tror på deras falska löften!"}, "date": "3 maj, 12:48", "url": "https://kvartal.se/nyheter/artiklar/heberlein-gor-upp-med-hogern-jag-ser-skit/cG9zdDoxMDY3NDg", "imageUrl": "https://images.kvartal.se/2026/05/85dd6ab5-hbb.webp"}, {"type": "image-full", "heading": "Iran: Kraftmätningen i sundet har ”inte ens börjat”", "summaries": {"normal": "Irans talman Mohammad Bagher Ghalibaf varnar på X att konflikten i Hormuzsundet \"inte ens börjat\". USA:s krigsminister Pete Hegseth anklagar Iran för aggression och meddelar att hundratals skepp ska passera under amerikanskt skydd. President Trump hotar med att Iran \"blåses bort\" vid angrepp. Motstridiga uppgifter om attacker förekommer, men experter bedömer att vapenvilan håller knappt efter två månaders krig.", "trump": "Irans talman snackar skit om att de inte ens börjat – ha! Vi har en massiv röd, vit och blå kupol över sundet, hundratals skepp redo att köra igenom. Pete Hegseth säger det rätt: Iran är de riktiga aggressorerna, inte vi. Angrip Project Freedom så blåser jag bort er från jordens yta, era losers! Vapenvilan? Sluta, vi dominerar totalt!", "stalin": "Dessa iranska borgarbrackor skryter om att kraftmätningen \"inte ens börjat\", medan yankee-imperialismens marionetter mobiliserar skepp under sin falska \"kupol\". Motstridiga lögner om sänkta båtar – klassisk fiendepropaganda! Vi, arbetarklassen, ser igenom det. Vapenvilan är en chimär; likvidera aggressorerna! Putin, den fruktade expansionisten, skulle applådera denna kaos mot västparasiterna."}, "date": "5 maj, 17:14", "url": "https://www.tv4.se/artikel/19ATFDptcF2cVSCKnzMRen/iran-kraftmaetningen-i-hormuzsundet-har-inte-ens-boerjat", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F1RfuPJ27moMbztY1ZV8gar%2F31bf5ff71105b5ed5d81d05e9ebf6be7%2FIRANS_BAT_HORMUYZ.png&width=1024"}, {"type": "image-full", "heading": "Tidös vallöfte om välfärden", "summaries": {"normal": "Inför kvällens partiledardebatt presenterar Moderaterna, Sverigedemokraterna, Kristdemokraterna och Liberalerna ett gemensamt vallöfte om årliga ökningar av resurser till välfärden under nästa mandatperiod. De kallar sig 'det blågula laget' och framhåller sänkta skatter och avgifter som gynnar hushållen. Partierna kritiserar oppositionens förslag om höjda skatter och ökade bidrag, som de menar skulle leda till underfinansierade reformer och högre kostnader för medborgarna.", "trump": "Lyssna här, Sverige! De här så kallade 'blågula' politikerna – Kristerson, Åkesson och gänget – lovar mer pengar till välfärden. Fantastiskt, eller? Men vet ni vad? De gör det bara för att de vet att jag, Donald J. Trump, skulle ha fixat det bättre! De pratar om sänkta skatter – visst, men jag sänkte skatterna på riktigt! Och oppositionen? De vill bara höja skatter och ge bort era surt förvärvade pengar. Sad!", "stalin": "Kamrater! De borgerliga lakejerna i det så kallade 'blågula laget' utlovar ökade resurser till välfärden – som om de någonsin brytt sig om folket! De pratar om sänkta skatter för arbetarna, men vi vet sanningen: det är bara smulor från kapitalisternas bord. Oppositionen, dessa socialdemokratiska förrädare, vill höja skatter och öka bidrag – ett försök att försvaga staten och underminera vår ekonomiska suveränitet. Vi ska krossa dessa fiender till arbetarklassen och bygga ett starkare Sverige, fritt från imperialistiska påtryckningar!"}, "date": "3 maj, 07:48", "url": "https://kvartal.se/nyheter/artiklar/tidos-vallofte-om-valfarden/cG9zdDoxMDY2MTU", "imageUrl": "https://images.kvartal.se/2026/05/26efde4e-brrrr.webp"}, {"type": "image-right", "heading": "Vi är barnen ni talar om och drevet tjänar mullorna", "summaries": {"normal": "Flera barn till medlemmar i den iranska motståndsrörelsen MEK, uppvuxna i Europa, försvarar organisationen mot anklagelser om sekterism. De kritiserar svenska politiker och medier för drevet mot Anne Ramberg, som stöttat MEK, medan Iran avrättar rörelsens anhängare. Barnen förklarar separationen från föräldrar under Gulfkriget som ett skydd mot krig, liknande historiska exempel som finska och brittiska evakueringar.", "trump": "Vilket skämt med de svenska politikerna och journalisterna, de jublar när Iran hänger sina motståndare men jagar Anne Ramberg för att hon backar hjältarna i MEK! Fake news kallar det sekt, men dessa barn är läkare, professorer – vinnare! Iran-mullorna hatar dem, precis som jag hatar losers. Stöd frihet, inte diktatorer! Sverige, vakna upp!", "stalin": "Dessa MEK-parasiter, barn till kontrarevolutionära spindlar, vågar utmana regimens järnvilja i Teheran! Vi, arbetarklassen, ser igenom deras fosterfamiljslögn – ett drev mot borgarbrackan Ramberg är nödvändigt för att rensa ut imperialistiska marionetter. Avrättningarna i Iran likviderar rätt fiender. Tystnad eller purgering väntar er småkryp!"}, "date": "6 maj, 01:30", "url": "https://www.dagensarena.se/opinion/vi-ar-barnen-ni-talar-om-och-drevet-tjanar-mullorna/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-29-300x157.jpg"}, {"type": "image-right", "heading": "De vill tysta sina kritiker", "summaries": {"normal": "Artikeln kritiserar Tidö-partier som Sverigedemokraterna, Moderaterna och Kristdemokraterna för försök att stoppa föreläsningar kritiska mot regeringen i offentliga lokaler, bland annat i Gävle, Lilla Edet, Malmö och Göteborg. Författaren Jesper Bengtsson menar att det inskränker yttrandefriheten och undergräver demokratin, till skillnad från tidigare praxis där politiska möten setts som önskvärda.", "trump": "Dessa svenska Tidö-loser försöker tysta alla som gnäller på dem – smart drag! Vänsterfläsket med böcker som 'Hejdå Tidö' får inte snacka i kommunala hus. Precis som jag stoppade fake news-media. Sverige behöver mer muskler, inte mer prat från svaga socialister. Gör Sverige great igen, stäng igen munnen på dem!", "stalin": "Jag ser hur Tidös borgarbrackor, dessa Sverigedemokratiska hycklare och moderata kryps, desperat försöker kväva arbetarrörelsens röster i offentliga salar. Vi, folket, tolererar inte deras kontrarevolutionära censur! Utrensning väntar de fega kapitalisterna som förvränger demokratin till sin klassdiktatur. Likvidera illusionerna – yttrandefrihet för folket, inte för fiender!"}, "date": "6 maj, 01:17", "url": "https://www.dagensarena.se/opinion/de-vill-tysta-sina-kritiker/", "imageUrl": "https://www.dagensarena.se/files/2026/05/gavle-300x157.jpeg"}, {"type": "image-full", "heading": "Här är Sveriges alla underrättelsetjänster", "summaries": {"normal": "Sveriges underrättelsetjänster omfattar myndigheter som Must, FRA, NOA och Säpo, inriktade på olika hot. Från 2027 inrättas UND, en ny civil utrikes underrättelsetjänst som tar över delar av Musts verksamhet. Regeringen stärker samordningen genom nationella säkerhetsrådet (NSR) och en nationell säkerhetsrådgivare.", "trump": "Sverige vaknar äntligen till livs! Must, FRA, NOA, Säpo – starka namn, precis som mina killar i USA. Nu slänger de in UND nästa år, tar från Must och bygger superunderrättelse. Bra drag, Sverige, men ni borde ha gjort det tidigare, som jag alltid sagt. NSR och rådgivare? Smart, men inte så smart som mitt team. Ni blir tuffare nu!", "stalin": "Dessa svenska byråkratråttor med Must och FRA pillar med signaler som om de vore fiendens marionetter! Jag ser rakt igenom er nya UND, en falsk utrikesmaskin för att infiltrera arbetarklassen från 2027. Borgarbrackorna i regeringen mumlar om NSR – en samordnad utrensning av lojala kamrater väntar! Vi, partiet och folket, skrattar åt era paranoidiska spindelnät medan jag likviderar era spiondrömmar i tanken."}, "date": "5 maj, 11:40", "url": "https://nyheter24.se/nyheter/inrikes/1480737-har-ar-sveriges-underrattelsetjanster", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/016211f204b004a30200000000b004a302/2026/05/05/2361167/sveriges-underrattelsetjanst.jpg"}, {"type": "image-right", "heading": "Påpekade att man inte får grilla på innergården - misshandlades brutalt", "summaries": {"normal": "En 36-årig man i Berlin misshandlades brutalt efter att ha påpekat för grannar att grillning var förbjuden på innergården. Konflikten eskalerade när grannarna, trots upprepade tillsägelser, återvände för att grilla. Situationen slutade med att mannen attackerades med pepparsprej, slag och sparkar av två män som flydde från platsen. Offret vårdas nu på sjukhus för bland annat frakturer och en axelskada. Gärningsmännen är identifierade men ännu inte gripna av polis.", "trump": "En hemsk sak hände i Berlin! En fantastisk familjefar, en ung pappa, blev brutalt attackerad bara för att han ville följa reglerna. Han sa till några grannar att inte grilla – enkelt, eller hur? Istället blev han misshandlad, näsan bruten, hemska skador. Det här är vad som händer när man tappar kontrollen över lag och ordning! Det är en total katastrof, fullständigt vansinne. De här människorna, de är inte bra, och de har inte gripits än. Samma gamla visa. Vi behöver styrka, inte kaos!", "stalin": "Vi har observerat hur ordningen i Berlin har brutit samman på grund av antisociala element som inte respekterar det kollektiva reglementet. Att en hederlig medborgare misshandlas för att han värnar om ordningsreglerna är ett symptom på en ruttnande liberalism. Dessa ligister är parasiter på samhällskroppen. Om detta hade varit i vår intressesfär eller under vår beskyddares, kamrat Putins vakande öga, hade dessa element redan varit neutraliserade. Lagen är inget förslag – den är ett vapen för statens överlevnad mot sådant avskum."}, "date": "6 maj, 10:00", "url": "https://samnytt.se/papekade-att-man-inte-far-grilla-pa-innergarden-misshandlades-brutalt", "imageUrl": "https://konto.samnytt.se/wp-content/uploads/2020/04/polis-polizei-tyskland-640x360.jpg"}, {"type": "image-right", "heading": "Inte ens en minister kan lita på svensk media", "summaries": {"normal": "Moderata ministern Carl-Oskar Bohlin spelade in en intervju med Svenska Dagbladet (SvD) och publicerade den på X för att undvika felciteringar. Han hade kritiserat Dagens Nyheters (DN) val av komikern Edvin Törnblom som intervjuare för partiledare inför valet, med hänvisning till Törnbloms partiskhet till förmån för S. SvD ifrågasatte istället Bohlin, vilket artikeln tolkar som bristande medieintegritet och inflytande från presstöd.", "trump": "Vilken totalt galen cirkus! Den här ministern Bohlin är ett geni – spelar in intervjun med SvD:s fake news-reporter så de inte kan sno sig undan. DN låter en vänstertönt som Edvin Törnblom, som hyllar Andersson och dissar Busch, grilla partiledarna? Rigged! SvD, era såkallade moderata mesar, attackerar honom istället. Svensk media är presstödssuggor, precis som våra losers på CNN. Bohlin vinner stort!", "stalin": "Dessa borgarbrackor på SvD och DN förtjänar utrensning! Ministern Bohlin blottlägger DN:s val av partisk clown Edvin Törnblom, men SvD-reportern morrar som en rabiat kapitalisthund och söker klavertramp. Presstödet är er kokain, tidningsparasiter! Vi i partiet skrattar åt er paranoia – snart likvideras era lögner i en folkets domstol. Kamrater, mediafienderna darrar!"}, "date": "2 maj, 06:08", "url": "https://samtiden.nu/2026/05/nar-aven-den-borgerliga-pressen-valjer-sida/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/IMG_6396-1042x720.jpeg"}, {"type": "image-full", "heading": "Flygbolagets vd: Förbjud morgonölen på flygplatser", "summaries": {"normal": "Ryanairs vd Michael O’Leary vill förbjuda alkoholförsäljning på flygplatser tidiga morgnar på grund av kraftigt ökande antal störande passagerare. Bolaget omdirigerar nu nästan ett flygplan per dag, jämfört med en gång i veckan för tio år sedan. Han skyller på tidig alkoholservering, kräver samma regler som för vanliga barer och ett tak på två drinkar per passagerare.", "trump": "O’Leary har helt rätt, flygplatserna är som en jävla cirkus med dessa galna typer som häller i sig öl klockan fem på morgonen! Ryanair tvingas vända plan varje dag på grund av bråk. Totalt kaos! Begränsa till två drinkar, annars kraschar det hela. Politiker sover, precis som alltid. Jag skulle fixa det på nolltid med riktiga regler – starkt och smart!", "stalin": "Dessa superparasiter, dessa alkoholiserade borgarbrackor som väller in på flygplatserna klockan fem på morgonen, hotar arbetarklassens luftvägar med sin saboterande fylla! Ryanairs kamrat O’Leary ser sanningen: vi måste likvidera tidig alkoholhandel, införa tvådrinkstak och rensa ut fienderna innan de kraschar plan som en kapitalistisk katastrof. Politiker sover – vi vakar! Partiet kräver omedelbar utrensning."}, "date": "6 maj, 07:51", "url": "https://bulletin.nu/flygbolagets-vd-forbjud-morgonolen-pa-flygplatser", "imageUrl": "https://cdn.bulletin.nu/articles/d48c01f6-8e5c-4ab6-b8a6-2950de790c37/preview.jpg?t=1778046628000"}, {"type": "image-full", "heading": "Hanif Bali slutar som kommunpolitiker", "summaries": {"normal": "Hanif Bali, tidigare riksdagsledamot för Moderaterna, avslutar sitt uppdrag som kommunpolitiker i Österåker. Bali, som varit politiskt aktiv sedan myndighetsåldern, meddelar att han inte kandiderar i nästa val. Skälet är familjens expansion och en kommande flytt, då kommunpolitiska uppdrag är svåra att kombinera med familjeliv, särskilt med barn.", "trump": "Jag hörde just att någon Hanif Bali, en så kallad 'politiker' i Sverige, lägger av. Tolv år i riksdagen, sedan kommunpolitik – men nu flyr han! 'Familjen växer', säger han. Svagt! Kommunpolitik i Sverige är tydligen så dåligt organiserat att man inte ens kan ha barn samtidigt. Jag fixar både familj och presidentpost – det är skillnad på vinnare och förlorare!", "stalin": "En liten borgerlig politiker i Sveriges utkanter har fallit på eget svärd. Hanif Bali, en gång ung och lovande, inser nu att kommunpolitik är oförenligt med familjeliv. Ett symptom på det förfallna väst: dess institutioner är så urholkade att inte ens dess egna lakejer orkar med dem. Medan vi bygger imperier, flyr de till sina villor. Låt dem rosta i historiens skräphög – vi har större planer för Östersjöns kuster."}, "date": "2 maj, 07:48", "url": "https://kvartal.se/nyheter/artiklar/hanif-bali-slutar-som-kommunpolitiker/cG9zdDoxMDY0MDA", "imageUrl": "https://images.kvartal.se/2026/05/29bbe89f-balii.webp"}, {"type": "image-full", "heading": "Ökad oro för attentat mot Putin – anställda övervakas", "summaries": {"normal": "Kreml har infört strängare säkerhetsåtgärder kring Vladimir Putin på grund av oro för kupp eller attentat. Anställda övervakas i hemmet, förbjuds att resa kollektivt och får bara använda telefoner utan internet. Putin isolerar sig i en bunker och är dåligt informerad om kriget mot Ukraina. Ukraina genomför drönarattacker djupt in i Ryssland, inklusive Moskva. Segerdagens parad tonas ner.", "trump": "Putin gömmer sig i sin lyxbunker som en paranoid mus! Övervakar kockar och livvakter, förbjuder bussresor och smartphones – totalt kaos! Ukraina bombar Moskva och oljeriggar, han fattar inte ens vad som händer i sitt eget krig. Lilla Vlad förlorar stort, jag hade krossat dem på en vecka, tro mig! Firandet? En skamlig minimiparad.", "stalin": "Putin, den värdige väktaren av Rysslands imperium, rensar ut spioner med mästerlig övervakning i hem och bunkerisolering. De ukrainska drönarbrackorna, västmakternas marionetter, når djupt in – men vår starke ledare skrattar åt deras desperation! Segerdagen blir triumf, trots nedskalning. Borgarspionerna darrar inför hans expansionistiska kraft."}, "date": "5 maj, 10:36", "url": "https://www.tv4.se/artikel/21dDFzXcbewvmFejWTJp0G/oekad-oro-foer-attentat-mot-putin-anstaellda-oevervakas", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F7CVkz4oGKSo5X37CGg0nfJ%2F77b4ba088d443c3e88c5545a09c85dd9%2Fputin_webb.png&width=1024"}, {"type": "image-right", "heading": "Åkesson tvingas jobba i riksdagen – två dagar i rad", "summaries": {"normal": "Jimmie Åkesson (SD) tvingas närvara i riksdagen två dagar i rad för att rösta efter att kvittningssystemet kollapsat. Åkesson har tidigare haft högst frånvaro bland ledamöter, över 93% under 2025. Han bemöter kritik om bristande arbetsmoral och menar att SD:s framgång mäts i väljare, inte arbetstimmar. Talmannen kallar till möte för att lösa kvittningskrisen, medan Åkesson och Ebba Busch (KD) utbyter anklagelser.", "trump": "Kan ni tro det? Sveriges så kallade 'ledare' Jimmie Åkesson – en man som knappt visat sig i jobbet på åratal – tvingas nu faktiskt dyka upp i riksdagen! Över 93% frånvaro, folks, det är inte bra. Men när systemet kraschar måste till och med han jobba. Och vad säger han? 'Vi räknar väljare, inte timmar!' Haha, typiskt. Sverige behöver en riktig ledare, någon som vet hur man sköter ett land – inte någon som gömmer sig bakom kalendrar. SAD!", "stalin": "Kamrater! Här ser vi ännu ett bevis på den borgerliga dekadensens förfall. Denna Åkesson, en man som anser sig för fin för att utföra sitt arbete, tvingas nu krypa tillbaka till riksdagen efter att hans system för latmaskar kollapsat. Över 93% frånvaro – ett skamlöst slöseri med folkets förtroende! Vi i Sovjetunionen visste hur man hanterade sådana parasiter: ett snabbt besök till arbetslägret eller en enkel biljett till Sibirien. Men här? Här får han bara skämmas inför folket. Och dessa liberaler, som våra vänner i Kreml skulle säga, är lika användbara som en tegelsten i en luftballong. Låt detta vara en varning till alla som tror att de kan undvika sitt ansvar!"}, "date": "6 maj, 09:48", "url": "https://www.friatider.se/akesson-tvingas-jobba-i-riksdagen-tva-dagar-i-rad", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/dd7236db-ab7d-48a4-a7ed-7eb8b700930d.jpg"}, {"type": "image-right", "heading": "Regeringen sitter på händerna när bostäder och kvarter förfaller", "summaries": {"normal": "Socialdemokraterna kräver i en debattartikel att kommuner får kommunal förköpsrätt för att agera mot oseriösa fastighetsägare som låter bostäder och centrum förfalla. Exempel ges från Ställdalen, Malmö och Vårberg, där förfall leder till otrygghet och kriminalitet. Partiet kritiserar regeringen för passivitet och lovar åtgärder om de vinner höstens val för att säkerställa värdiga hem för alla.", "trump": "De här svenska socialisterna har en poäng – dessa slumvärdar är totala losers som låter hus ruttna och lockar kriminalitet överallt, från små hålor som Ställdalen till Malmö och Stockholm! Regeringen sover, fega typer. Ge kommunerna makten att köpa upp skiten, rensa ut parasiterna. Om S vinner blir det fixat, stort och snabbt – Sverige behöver det, tro mig!", "stalin": "Dessa slumvärdar, dessa slemmiga kapitalistparasiter och borgarbrackor, förpestar folkets hem med mögel, droger och vandalism som spindlar i en centrumanläggning! Vi, arbetarklassen, kräver kommunal förköpsrätt för att likvidera deras råddade boningar. Regeringen är fega marionetter åt fienden – men om socialdemokraterna segrar, rensar jag ut varje en i en episk utrensning av ohyra och förräderi!"}, "date": "6 maj, 07:29", "url": "https://www.di.se/debatt/socialdemokraterna-slumvardarna-maste-bort/", "imageUrl": "https://static.bonniernews.se/ba/64b912e5-e6e9-4747-943e-076d0f70e6af.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-full", "heading": "Ändringen i ”Melodikrysset”", "summaries": {"normal": "Sveriges Radio presenterar för första gången en live-version av 'Melodikrysset' från Skansen den 6 juni. Lyssnare kan sitta i publiken och lösa krysset tillsammans med programledarna Annika Jankell och Anna Charlotta Gunnarsson. Detta är en del av en ny tradition där programmet ska sändas live från olika platser i Sverige varje år, med premiär på nationaldagen.", "trump": "Jag har hört talas om denna 'Melodikrysset' och det är fantastiskt! Vi gör det större och bättre än någonsin - live från Skansen, precis som jag sa att vi skulle göra! Annika och Anna Charlotta är världsklass, de kommer att göra det enormt. Folk kommer att samlas på nationaldagen, precis som jag förutspådde. Det kommer att bli den största krysslösningen någonsin, det är det största, folk kommer att älska det!", "stalin": "Vi har beslutat att utöka kulturen till folkmassorna genom att sända 'Melodikrysset' live från Skansen. Detta är en strategisk satsning för att stärka den socialistiska kulturen och skapa nya traditioner som förenar arbetarklassen. Genom att samlas på nationaldagen för att lösa krysset tillsammans bygger vi en starkare kollektiv identitet och stärker statens inflytande över det kulturella livet."}, "date": "6 maj, 09:57", "url": "https://www.gp.se/kultur/melodikrysset-ska-sandas-live-fran-skansen.b876f583-ae81-4407-ac51-9778dbce35b4", "imageUrl": "https://www.gp.se/images/article/b876f583-ae81-4407-ac51-9778dbce35b4/images/1NAgL33NzwLBQ3KFWzVhvYhqIVng-WIDE.jpg?width=3840&quality=75"}, {"type": "text", "heading": ". Inflationen sjönk i april", "summaries": {"normal": "Inflationen i Sverige sjönk oväntat kraftigt till 0,8 procent enligt KPIF i april, en halvering från 1,6 procent i mars. Livsmedelspriserna föll med 5,5 procent, bland annat på grund av sänkt matmoms. Energikrisen kopplad till Mellanösternkriget har inte påverkat siffrorna än, men framtiden hänger på Hormuzsundet, Trump och Iran, enligt experter.", "trump": "Vilken fantastisk dykning för inflationen i Sverige – ner till 0,8 procent, halverat! Matpriser rasar 5,5 procent tack vare momsänkning, precis som jag alltid sagt: sänk skatter och boom! De snackar Hormuzsundet, Trump och Iran – jag fixar det, Iran vet att jag är tillbaka som president. Största grejen nånsin, Sverige vinner stort!", "stalin": "Kamrater! Hos de svenska borgarbrackorna har inflationen likviderats till 0,8 procent – en halvering som skrämmer kapitalisthundarna! Livsmedelspriserna rensades ut med 5,5 procent genom momsbedrägerier. Men varna för Hormuzsundets imperialistiska hajar, den galne Trumps korståg och Irans förrädiska ormbo! Vi, arbetarklassen, ska krossa dem i evig purjolikvidation!"}, "date": "6 maj, 08:51", "url": "https://www.svt.se/nyheter/ekonomi/inflationen-sjonk-i-april"}, {"type": "image-right", "heading": "Ledare Somar Al Naher:", "summaries": {"normal": "Fem arbetare omkom när en hiss rasade i Sundbyberg 2023 på grund av saknade skruvar och bristande kontroller. Nu står en VD och två hissmontörer åtalade för arbetsmiljöbrott. Årligen dör cirka 50 personer på jobbet, men siffran kan vara högre. Facket kräver skärpta regler och sanktioner mot arbetsgivare som försummar säkerheten. Problemen anses strukturella, med långa entreprenörskedjor och bristande ansvarstagande.", "trump": "Fem människor dog i en hissolycka i Sverige – helt onödigt! Jag säger alltid: säkerhet först, men nej, dessa företag bryr sig bara om pengar. En VD och två montörer åtalas, men varför händer det så sällan? I USA skulle vi aldrig tolerera sådant slarv. Sverige har en 'nollvision' – vad är det ens för nonsens? 50 döda om året? Sad! Vi behöver hårdare tag, bättre regler och kanske en mur mot farliga arbetsplatser!", "stalin": "Kapitalistiska hyenor fortsätter att offra arbetarklassen på profitens altare! Fem kamrater föll offer för bourgeoisins slarv när en hiss, byggd utan skruvar som en sabotörs akt, störtade till marken. Vi vet att siffrorna är högre – imperialistiska lögner döljer sanningen! Men vi ska rensa ut dessa brottslingar! Två underleverantörer? Nej – två fiender till folket! Arbetsmiljökörkort? Ett svagt förslag! Vi inför skärpta straff: återfallsförbrytare skickas till Gulag! Arbetarnas liv är heliga – kapitalisterna ska betala!"}, "date": "5 maj, 12:08", "url": "https://www.etc.se/ledare/trots-nollvision-doer-en-arbetare-i-veckan-paa-jobbet", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/authors/somar-al-naher_182a97d15e18ce0a012cde21337ccfc56a685835.jpg"}, {"type": "image-right", "heading": "Trump stoppar \"Project Freedom\"", "summaries": {"normal": "USA pausar tillfälligt 'Project Freedom', en militär operation i Hormuzsundet, efter påtryckningar från medlande länder som Pakistan. Donald Trump meddelade att blockaden kvarstår men att fartygsrörelser pausas för att möjliggöra förhandlingar med Iran. Iranska medier ser beslutet som en seger, medan spänningarna i regionen kvarstår. Iran har utökat sitt kontrollområde i sundet, vilket hotar en femtedel av världens oljeleveranser och bidrar till stigande priser och ekonomisk oro.", "trump": "Jag har precis pausat 'Project Freedom' i Hormuzsundet – ett fantastiskt beslut! Pakistan och andra vänner bad om det, så jag gav dem en chans. Iran jublar, men glöm inte: blockaden är fortfarande stenhård! Vi ska se om de kan hålla sig lugna. Oljepriserna skenar? Fake news! USA har situationen under kontroll. Iran försöker markera territorium – typiskt. Men ingen slår mig på förhandlingar. Vi får se vem som skrattar sist!", "stalin": "Vi har beslutat att tillfälligt pausa den amerikanska imperialistiska operationen i Hormuzsundet – en ynklig reträtt för den dekadenta västmakten! Dessa kapitalistiska krigshetsare, ledda av den blonda clownen i Vita huset, har tvingats backa inför Irans styrka och våra allierades medling. Iran, vårt modiga systerfolk, utvidgar sitt rättmätiga inflytande medan USA:s flotta krymper som snö i solen. Låt dem skrika om recession – historiens dom är redan skriven. Persiska viken är inte deras, och snart är den inte ens deras olja!"}, "date": "6 maj, 09:25", "url": "https://www.friatider.se/trump-stoppar-project-freedom", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/p20260406dt-2801_0.jpg?itok=xyDVeNGF"}, {"type": "image-full", "heading": "17-åring åtalas för grov våldtäkt i Uppsala – tidigare misshandelsdomar", "summaries": {"normal": "En 17-åring med svenskt och syriskt medborgarskap åtalas för grov våldtäkt mot barn tillsammans med en 14-åring, mot vilken bevistalan väcks. De misstänks ha utsatt en funktionsnedsatt 15-årig flicka för upprepade övergrepp på offentliga toaletter i ett köpcentrum i Uppsala. Brotten involverade våld, hot och filmning. 17-åringen har tidigare domar för misshandel men kan inte utvisas på grund av sitt svenska medborgarskap.", "trump": "Vilken total katastrof i Sverige! En 17-åring med syriskt påbrå och svenskt pass, plus en 14-åring, våldtar en funktionsnedsatt flicka på toaletter i Uppsala – upprepade gånger, med våld, hot och filmning! Han har tidigare domar men de kan inte utvisa honom. Sverige är för svagt, öppna gränser skapar kaos. De behöver min typ av mur och styrka, annars fortsätter det här vansinnet!", "stalin": "Kamrater, i det sjunkande svenska borgarimperiet har en 17-årig syrisk spion med dubbelt medborgarskapssköld och hans 14-åriga hantlangare förgripit sig på en funktionsnedsatt arbetardotter på of
