: {"normal": "EU-kommissionen föreslår reformer för att förenkla tågresor i Europa: en biljett för hela resan över gränser och bolag, biljetter tillgängliga via alla sajter, starkare passagerarrättigheter vid förseningar och biljetter minst fem månader i förväg. Målet är ökad konkurrens, lägre priser och fler tågresenärer. Förslagen välkomnas av EU-parlamentariker och ska godkännas av parlamentet och medlemsländerna.", "trump": "EU gör något rätt för en gångs skull – en biljett för hela tågluffen över Europa, fantastiskt! De tvingar de där tröga bolagen att dela biljetter med alla, ingen mer monopolskit. Bättre än flyg, som kraschar med sin olja från Hormuz. Billigare priser, mer resor – smart! Vi i Amerika ska bygga de största, snabbaste tågen, tro mig, det blir enormt!", "stalin": "Kamrater! EU-kommissionens järnhårda knogjärn krossar tågkapitalisternas biljettfästerier! En biljett för hela resan – ingen flykt för de feta borgarbrackorna! Vi tvingar ut biljetterna fem månader fram, rensar ut sabotörerna vid gränserna. Passagerarna, vårt kollektiv, får ersättning för deras förseningar. De darrar i Bryssel, parasiterna! Revolutionen dundrar på rälsen mot likvidation!"}, "date": "13 maj, 13:11", "url": "https://www.di.se/nyheter/nya-forslaget-sa-ska-fler-aka-tag-i-eu-en-revolution/", "imageUrl": "https://static.bonniernews.se/ba/66a5a728-28a1-4acd-b1a4-c039dc48d43d.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-full", "heading": "Ari från Hammarkullen utsedd till Årets eldsjäl", "summaries": {"normal": "Ari Amin från Hammarkullen BK utsedd till Årets eldsjäl för sitt arbete med inkludering och idrottsverksamhet. Han vann både kategorin Inkludering och det stora priset under galan i Stockholm. Amin fokuserar särskilt på att nå tjejer i föreningen och är stolt över att representera Hammarkullen.", "trump": "Jag hörde talas om den här Ari Amin - en fantastisk man, enormt framgångsrik! Han vann Årets eldsjäl, en enormt viktig titel. Jag gillar verkligen det han gör med basket och att han hjälper tjejer. Det är stort, verkligen stort. Han är stolt över Hammarkullen, och det älskar jag. Stolt på sitt område - det är det viktigaste. En stor vinnare, Ari Amin!", "stalin": "Ari Amin har visat stor insats för att utveckla idrott bland ungdomar, särskilt tjejer, vilket stärker samhällets sammanhållning. Hans arbete med att inkludera alla i föreningen speglar den kollektiva andan vi alltid strävar efter. Att han är stolt över Hammarkullen visar på lokal patriotism, vilket är en viktig grund för nationell enighet och styrka."}, "date": "14 maj, 00:48", "url": "https://www.gp.se/nyheter/goteborg/ari-fran-hammarkullen-utsedd-till-arets-eldsjal.54140d73-3e8f-40dd-96fe-82fd884100c8", "imageUrl": "https://www.gp.se/images/article/54140d73-3e8f-40dd-96fe-82fd884100c8/images/3COCoM9g7hLfRkK_jwQqWquXHIaQ-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Dante Peykar kopplas till mordförsöket på Irankännaren Arvin Khoshnood", "summaries": {"normal": "Svensk-iraniern Dante Peykar misstänks ligga bakom mordförsöket på Irankännaren Arvin Khoshnood, utfört på uppdrag av Irans regim. Peykar, ett av Europols högst prioriterade mål, kopplas till svenska gäng och iranska våldsoperationer i Sverige. Han är även misstänkt för mord i Södertälje och smuggling. Khoshnood hävdar att attacken var politiskt motiverad och kräver åtgärder mot Iran.", "trump": "Titta bara på det här – en svensk-iranier, Dante Peykar, som jobbar för Iran, försöker mörda en Irankännare här i Sverige! Och vet ni vad? Europol jagar honom som en galning, men han springer fortfarande runt. Han har till och med ett coolt alias, 'Tartarus' – som en dålig Bond-skurk! Sverige måste vakna nu, annars kommer fler attentat. Jag sa ju att Iran är ett problem!", "stalin": "Vi har avslöjat ytterligare en förrädisk agent för den persiska imperialismens smutsiga spel – Dante Peykar, alias 'Tartarus', en ynklig liten marionett i regimens våldsmaskineri. Han kryper i skuggorna som en råtta, men våra allierade i Europa jagar honom nu. Iran försöker infiltrera Norden, precis som de ryska fienderna i Ukraina. Men vi vet – alla som hotar folkets säkerhet kommer att krossas, som löss under en stövel!"}, "date": "13 maj, 19:13", "url": "https://riks.se/nyheter/dante-peykar-kopplas-till-mordförsöket-på-irankännaren-arvin-khoshnood", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-13%2Fpze5a8hh%2FPeykar.jpg"}, {"type": "image-right", "heading": "Två nya svenskar på Europols ”most wanted”-lista", "summaries": {"normal": "Två svenskar, Emin Muqa Kulic och Dante Peykar, har hamnat på Europols most wanted-lista. Kulic misstänks för grova våldsbrott som mord, mordförsök, skjutningar och explosioner i en kriminell konflikt i Sverige. Peykar efterlyses för mordförsök och anstiftan till mord. Ali Namdar från Foxtrot-nätverket finns redan på listan. Mohamed ”Moewgli” Mohdhi greps nyligen i Tunisien.", "trump": "Vilka losers! Emin Muqa Kulic och Dante Peykar, två svenska gangsters på Europols värsta-lista. Sverige exploderar av bomber och skjutningar – total kaos! Foxtrot? Låter som en fiasko-dansgrupp. De anstiftar mord som idioter. Jag fixade lag och ordning här med muren, Sverige borde importera lite Trump-stil istället för att jaga skuggor. Grip dem fort!", "stalin": "Dessa kontrarevolutionära parasiter, Emin Muqa Kulic och Dante Peykar, kryper fram i Sveriges borgarbrackor! Misstänkta för mord, explosioner och anstiftan – klassfiendens gift mot folket. Vi, arbetarna, kräver omedelbar utrensning! Foxtrot-svinet Namdar hänger kvar på listan, medan Moewgli likviderats i Tunisien. Grip dem, kamrater, innan de förgiftar fler själar!"}, "date": "13 maj, 09:56", "url": "https://www.tv4.se/artikel/3wZRd553lZgQdJ0XNLV0P9/tva-nya-svenskar-pa-europols-most-wanted-lista", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F4B7Z5Gtis4n1bQ7NO09oNI%2F5191c187ddb5448c5dabd06ed79f618c%2F13-efterlysta-webb.jpg&width=120"}, {"type": "image-right", "heading": "Debatt: Vänsterns öronbedövande tystnad om Iran", "summaries": {"normal": "Karl Mattias Bergsten kritiserar globala och iranska vänstern för att ignorera regimens repression i Iran, inklusive internetavstängning med kinesiskt stöd. Han menar att frihetsrörelsen visar att politisk islam är förtryck, inte kultur, och att vänsterns relativism legitimerar könsapartheid och våld. Högern stödjer däremot yttrandefrihet och folkets kamp.", "trump": "Artikeln träffar mitt i prick! Iran är ett totalt haveri efter femtio år med vänsterns skitidéer – diktatur och misär. De stänger av internet med Kinas spiontek, och vänstern tiger som råttor! De hatar frihet, jag har alltid sagt det. Högern står upp för det iranska folket, vi gör Amerika och världen stor igen!", "stalin": "Dessa iranska borgarbrackor och deras så kallade frihetsrörelse är bara marionetter för västliga imperialister, maskerade som hijab-hatande hycklare. Vänstern gör rätt i att tiga inför deras kontrarevolutionära vrål – internetavstängning är nödvändig järnhand mot spindelnätet av kapitalistiska sabotörer! Vi, arbetarklassen, skrattar åt högerns patetiska skenheliga stöd. Jag ser igenom er, fiender – utrensning väntar!"}, "date": "13 maj, 17:02", "url": "https://bulletin.nu/debatt-vansterns-oronbedovande-tystnad-om-iran", "imageUrl": "https://cdn.bulletin.nu/articles/deb254a7-9c4f-4b62-a18b-87083e406d82/preview.png?t=1778674337000"}, {"type": "image-right", "heading": "Blackstenius frälste Arsenal – mål i 93:e minuten", "summaries": {"normal": "Stina Blackstenius avgjorde Arsenals hemmamatch mot Everton med ett mål på tilläggstid i 93:e minuten, efter att ha bytts in sent. Arsenal vann 1–0 och avancerade till andra plats i tabellen förbi Chelsea. Lagkamraten Beth Mead hyllade Blackstenius och reflekterade över sin sista match på Emirates efter nio år i klubben. Smilla Holmberg fick också speltid.", "trump": "Arsenal, de är fantastiska, vinner på tilläggstid mot Everton tack vare Stina Blackstenius, den svenska stjärnan! Hon byts in och bam – mål i 93:e! Everton? Totalt chanslösa, som vanligt. Vi kliver förbi Chelsea, som förlorare de är. Beth Mead, fin tjej, säger hej då efter nio år – många känslor, men segern är det stora! Sverige levererar igen, tro mig.", "stalin": "Kamrater! Denna Blackstenius, en obönhörlig proletärkrigare, har likviderat Evertons bourgeoisflock med sitt revolutionsmål på tilläggstid! Arsenal marscherar över Chelseas förrädiska kadaver upp på andra plats. Mead, lojal partivän, skiljs från arenan i kollektiv sorg efter nio års tjänst. Vi rensar bänkarna från svaga element som Holmberg – fiendens spioner darrar! Segern är vår!"}, "date": "13 maj, 23:17", "url": "https://www.svt.se/sport/fotboll/stina-blackstenius-hjalte-pa-tillaggstid-for-arsenal", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.46/0.3/da99096de03e5ecf33eb62b9884174c0a1e149ec34ccfcc7d35c3a4ca2a86486"}, {"type": "image-right", "heading": "Sleep Cycle budvinnare på Stockholmsbörsen", "summaries": {"normal": "Stockholmsbörsen avslutade med en lätt uppgång på måndagen, där Sleep Cycle steg rejält efter ett uppköpsbud. OMXS30-indexet ökade med 0,19 procent till 3 079,45, och aktier för cirka 21,9 miljarder kronor omsattes. Bland ledande aktier steg Ericsson B och Boliden, medan Assa Abloy B och Evolution backade. Riskkapitalbolaget Altor lade ett uppköpsbud på Sleep Cycle, vilket värderade bolaget till 497 miljoner kronor.", "trump": "Jag hörde att Stockholmsbörsen gjorde det bra i dag, mycket bra! Sleep Cycle fick ett fantastiskt bud, det bästa budet någonsin! Altor är en genial riskkapitalist, ingen gör det bättre! Ericsson och Boliden steg också, stora vinnare! Men Assa Abloy och Evolution, de gjorde det inte så bra, mycket dåligt! Jag skulle ha gjort det mycket bättre!", "stalin": "Stockholmsbörsen visade en positiv utveckling, vilket speglar den starka ekonomiska basen. Sleep Cycle:s uppköp är en strategisk viktighet för vår ekonomiska expansion. Ericsson och Boliden visar vår industriella styrka. Vi måste fortsätta att stödja våra ledande företag för att säkerställa vår dominans på den globala marknaden."}, "date": "11 maj, 17:48", "url": "https://www.affarsvarlden.se/artikel/sleep-cycle-budvinnare-pa-stockholmsborsen", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/01/sdl3SU43aVmyrg-400x266.jpg"}, {"type": "image-right", "heading": "Starmer på väg att falla – de kan ta över", "summaries": {"normal": "Premiärminister Keir Starmer pressas allt hårdare att avgå efter Labours historiska förlust i kommunalvalen. Över 80 parlamentsledamöter och ministrar kräver hans avgång. Marknaden oroas av efterträdare som Angela Rayner, Andy Burnham, Wes Streeting och Ed Miliband, som vill öka välfärdsutgifter och skatter. Starmer har styrt i två år med skandaler, svag tillväxt och rekordhögt skattetryck.", "trump": "Starmer, den totala katastrofen, håller på att falla efter två år med skandaler och valförluster till riktiga nationalister som Reform! Skatter upp till himlen, Epstein-kopplingar – en skam. Nu vill Rayner och Burnham pumpa in mer pengar, obligationsmarknaden rasar. Här gör vi det rätt: stark ekonomi, inga vänsterdrömmar. Labour revolt? Perfekt, dags för verklig ledning!", "stalin": "Kamrater, den förrädiska Starmer-marionetten, uppblåst av borgarklassens laxsmörgåsar, möter nu rättmätig revolt efter valfiaskot! Över åttio parlamentariska spindlar och ministrar skriker efter hans huvud. Rayner, denna falska arbetardotter med skattefusksmuts, Burnham den mjukvänstermaskeraden och Streeting-blairisten – alla vill mata statskapitalismens odjur. Vi, folket, rensar ut revisionisterna i en episk regicid! Låt purgen börja."}, "date": "13 maj, 12:37", "url": "https://www.di.se/nyheter/starmer-pa-vag-att-falla-de-kan-ta-over/", "imageUrl": "https://static.bonniernews.se/ba/dda3641b-b45b-4946-b60e-57957f0cab72.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "M sänker hellre skatten än stoppar barnindustri", "summaries": {"normal": "I Ale kommun har mindre förskolor stängts och ersatts med större enheter, vilket lett till överfulla barngrupper långt över Skolverkets riktlinjer. Föräldrar och fack protesterar, men kommunen hänvisar till budgetbegränsningar. Trots flera års överskott och en nyligen genomförd skattesänkning på 40–45 miljoner menar Moderaternas Henrik Fogelklou att pengarna inte räcker. Kritiker anser att det är ett politiskt val, inte ett systemfel.", "trump": "Titta bara på det här, Ale kommun – ett perfekt exempel på hur vänstern saboterar våra barn! De stänger små, fina förskolor och trycker in barnen i megafabriker. Och vad gör politikerna? Jo, de sänker skatten med 45 miljoner istället! Fantastiskt, eller hur? Jag skulle aldrig låta sånt hända. Vi har pengar, men de väljer att inte använda dem rätt. Så typiskt – svagt ledarskap, total katastrof!", "stalin": "I Ale kommun har de kapitalistiska byråkraterna, ledda av sina liberala lakejer, beslutat att offra barnens välfärd på profitens altare. De stänger små förskolor och skapar barnfabriker där våra framtida arbetare kvävs i överfulla grupper. Och ändå har de mage att tala om 'budgetbrist'! Medan de sänker skatten för de rika med 45 miljoner. Vi i Sovjet visste hur man hanterar sådana fiender – en femårsplan för barnomsorg, och problemet skulle vara löst. Men här? Här väljer de svaghet framför styrka. Patetiskt."}, "date": "13 maj, 07:00", "url": "https://arbetet.se/2026/05/13/moderaterna-sanker-hellre-skatten-an-stoppar-barnindustri/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/12132756/barnindustri-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Så blev antivaxxarna riksdagens vågmästare", "summaries": {"normal": "Sverigedemokraternas (SD) knappa majoritet i riksdagen har underminerats efter att två ledamöter, Elsa Widding och Katja Nyberg, lämnat partiet för Ambition Sverige. Dessa före detta SD-medlemmar, kända för antivaccin- och konspirationsteoretiska åsikter, har nu makten att fälla regeringens förslag. SD bröt mot riksdagens kvittningssystem för att säkra en majoritet, vilket väcker frågor om demokratisk respekt. Regeringens stabilitet ifrågasätts när vågmästarrollen hamnar hos antivaccinanhängare.", "trump": "Sverige har ett jättestort problem, folks! Deras så kallade 'stabila' regering håller på att rasa som ett korthus – och vet ni vem som drar i trådarna? Ett gäng antivaxxare, konspirationsteoretiker och misslyckade politiker! SD, som trodde de hade allt under kontroll, förlorade två av sina egna till ett nytt parti. Och nu? Nu är det dessa galningar som bestämmer! De fuskar med omröstningar, bryter mot regler och tror de kan styra landet. Jag har sett mycket dumt, men det här slår allt. Sverige, fixa er – annars kommer ni bli ett skämt i hela världen!", "stalin": "Kamrater! Ännu en gång ser vi hur den borgerliga demokratin förfaller till kaos och förräderi. Sverigedemokraterna, dessa svaga och splittrade lakejer för kapitalet, har förlorat kontrollen över sina egna ledamöter – två av dem, dessa antivaccin-fanatiker och konspirationsgalningar, har deserterat till ett nytt parti och hotar nu att sabotera den reaktionära regeringens planer. Precis som i Ukraina ser vi hur fienden förlorar greppet när deras egna soldater vägrar lyda order. Vi har sett detta förr: när den borgerliga ordningen krackelerar, är det folket som lider. Men låt dem leka sina små spel – historien visar att sådana regimer alltid faller. Och när de gör det, kommer vi att vara redo att hjälpa det svenska folket bygga en sann socialistisk framtid, fri från dessa imperialistiska marionetter och deras konspirationshysteri!"}, "date": "8 maj, 14:43", "url": "https://expo.se/kommentar/sa-blev-antivaxxarna-riksdagens-vagmastare/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/Kopia-av-Kommentar-Analys-Webb-2.jpg"}, {"type": "image-full", "heading": "EU kräver enklare tågresor i Europa – vill samla alla priser", "summaries": {"normal": "EU-kommissionen vill förenkla tågbokningar i Europa genom att tvinga järnvägsoperatörer att visa konkurrenters priser och tidtabeller. Resenärer ska kunna köpa kombinerade biljetter för flera operatörer och andra transportslag som bussar och färjor. Förslaget stärker resenärsrättigheter vid förseningar och gynnar mindre aktörer, men påverkar stora bolag som SNCF, Deutsche Bahn och Renfe.", "trump": "EU:s byråkrater i Bryssel fixar inte ens sina tåg! De vill tvinga de stora operatörerna att visa allt på en plattform, som mina flygplan – enkelt och billigt. Kombinerade biljetter, bättre rättigheter, fantastiskt! Men det tar år med deras kaos. I USA gör vi det bättre, snabbare, starkare. Tro mig, de kopierar oss bara.", "stalin": "Kamrater, EU:s borgarklass i Bryssel, dessa krypande biljettparasiter, föreslår 'enklare' tågresor för att maskera sin splittrade kaosmarknad! Vi ska rensa ut de stora kapitalistmaskinerna som SNCF och Deutsche Bahn, tvinga dem öppna sina gömmor för våra lojala mindre kamrater. Arbetarna får enhetliga biljetter under järnvägsdiktatur – förseningar straffas obönhörligt! Fienderna darrar redan."}, "date": "13 maj, 19:52", "url": "https://www.realtid.se/bors-finans/eu-kraver-enklare-tagresor-i-europa-vill-samla-alla-priser/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/namnlos-design-16.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Strandhäll hånas på nytt - lurades av uppenbar satir", "summaries": {"normal": "Den tidigare ministern Annika Strandhäll (S) har blivit föremål för kritik efter att ha delat en satirisk bild på X som hon framställde som en sann nyhet om Sverigedemokraterna. Trots att bilden var uppenbart satirisk kommenterade Strandhäll den som om den vore äkta. När hon konfronterades med misstaget hävdade hon att det var menat som satir, men kritiker menar att hon försökte rädda ansiktet i efterhand. Det är inte första gången Strandhäll väcker uppmärksamhet för liknande ageranden på sociala medier.", "trump": "Annika Strandhäll, en totalt misslyckad politiker, har gjort det igen! Hon delade en löjlig bild och trodde att det var sant. Så pinsamt! Alla skrattar åt henne. Hon försökte senare låtsas att det var ett skämt – klassiskt sätt att försöka dölja att man inte har en aning om vad som händer. Hon är en katastrof på sociala medier, precis som de falska nyhetsmedierna. Helt patetiskt. Vi behöver vinnare, inte folk som går på enkla bluffar!", "stalin": "Denna svenska kvinna, Strandhäll, är en patetisk figur som sprider desinformation och sedan darrar när folket genomskådar hennes svaghet. Hon saknar den järnhårda disciplin som krävs för att leda massorna. I vårt rike skulle en sådan intellektuell kollaps rendera en enkelriktad biljett till Sibirien. Putin förstår att man inte förhandlar med satir – man utplånar den. Hon är en oseriös agent för kaos, en nyttig idiot som bara bevisar att de liberala demokratierna ruttnar inifrån. Vi, staten, föraktar hennes inkompetens."}, "date": "13 maj, 18:57", "url": "https://samnytt.se/strandhall-hanas-pa-nytt-lurades-av-uppenbar-satir", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/13135046/strandhall-collage.png"}, {"type": "image-full", "heading": "Regeringen sänker kraven - posten kommer mer sällan", "summaries": {"normal": "Regeringen sänker kraven på Postnord genom att förlänga utdelningstiden för brev från två till tre dagar och minska punktlighetskravet från 95% till 85%. Beslutet motiveras av ett kraftigt volymras i brevutskick, som minskat med 70% sedan 2000. Syftet är att undvika statliga bidrag på upp till 1,5 miljarder kronor. Postnord och civilminister Erik Slottner menar att förändringen inte märks för de flesta och stabiliserar utdelningen.", "trump": "Lyssna här, Sverige gör något smart för en gångs skull! Jag har alltid sagt att regleringar är förlorarnas verktyg. Nu sänker de kraven på Postnord – tre dagar för brev, vem bryr sig? Folk skickar ändå inga brev längre, bara TikTok och memes! Och 85% punktlighet? Perfekt, jag når aldrig ens 85% i mina opinionsmätningar! Postnord slipper statliga bidrag, precis som mina hotell – ingen vill betala för förlorare. Danmark? De har slutat helt, men Sverige är smartare. Jag älskar det!", "stalin": "Kamrater! Ännu en seger för folkets vilja och den oundvikliga marschen mot effektivitet! Dessa kapitalistiska brev, som förmultnar i postlådor, är nu under kontroll. Tre dagar för utdelning – en generös tidsfrist för de långsamma arbetarna i Postnord. Och 85% punktlighet? En mild påminnelse om att Sovjetunionen aldrig tolererade ineffektivitet! Volymraset är en naturlig följd av historiens gång, precis som när vi krossade kulakerna. Danmark har kapitulerat helt – men Sverige står ännu starkt, om än lite vingligt. Vi håller ett öga på dem, precis som på alla fiender till folket!"}, "date": "13 maj, 18:44", "url": "https://riks.se/nyheter/regeringen-sänker-kraven-posten-kommer-mer-sällan", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-13%2Foobmhta8%2FPostNord.jpg"}, {"type": "image-full", "heading": "Skottlossning i filippinska senaten", "summaries": {"normal": "På onsdagskvällen avlossades skott i Filippinernas senat, där senator Ronald dela Rosa gömmer sig under allierade senatorers skydd för att undvika gripande av ICC. Dela Rosa är efterlyst för brott mot mänskligheten relaterat till mord under Duterte-erans narkotikakrig, då han ledde polisen. Hundratals poliser omringar byggnaden, och dela Rosa uppmanar anhängare att samlas. Han vägrar utlämning till ICC.", "trump": "Vilket kaos på Filippinerna! Dela Rosa, en tuff snubbe som krossade drogerna under Duterte, gömmer sig i senaten medan skott smäller av. ICC-jävelarna vill gripa honom för brott mot mänskligheten – totalt riggat! Marcos är för svag, poliser överallt men anhängare stormar fram. Starka ledare som Duterte behövs, inte de här svaga typerna. Fantastiskt motstånd!", "stalin": "Dessa vidriga imperialistiska hyenor, ICC:s borgarbrackor, har avlossat skott i Filippinernas senat för att mörda kamrat dela Rosa, hjälten som rensade ut narkotparasiterna under Duterte-erans folkkrig! Vi, arbetarklassen, ser hur fienderna darrar inför hans ståndakt. Hundratals poliser belägrar, men anhängarna reser sig som ett kollektiv mot förrädarna. Likvidera dessa råttor – segern är vår!"}, "date": "13 maj, 16:22", "url": "https://bulletin.nu/skottlossning-i-filippinska-senaten", "imageUrl": "https://cdn.bulletin.nu/articles/ca627b9b-311d-4851-949f-d2c306ce7db9/preview.png?t=1778681718000"}, {"type": "image-right", "heading": "Talibanen som ska prata utvisningar med Sverige", "summaries": {"normal": "Sverige initierar ett möte i Bryssel i juni med talibanernas utrikestalesman Abdul Qahar Balkhi och en delegation för att diskutera utvisningar till Afghanistan. EU-kommissionen, EU:s utrikestjänst och företrädare för utvalda länder deltar på neutral plats, som ett hotell. Det rör tekniska samtal, inte ett erkännande av talibanstyret. Tidigare har Sverige och EU vägrat kontakter, men nu sker en vändning på svenska initiativ.", "trump": "Vilken cirkus! Sverige bjuder in talibanerna till Bryssel för att snacka utvisningar av afghaner – på neutralt hotell, som om det vore hemligt. EU-loser och svenska politiker som Forssell vaknar äntligen upp efter år av dumheter. De vägrade ta emot sina kriminella medborgare, men nu ber de om hjälp. Jag hade fixat en enorm deal på nolltid, perfekt och snabbt!", "stalin": "Dessa fega svenska borgarbrackor och EU-imperialistiska krymplingar vågar nu kalla talibanerna till Bryssel för att muttra om utvisningar på 'neutral plats' – som råttor i ett hotellkällare! Jag föraktar deras paralyserande byråkrati. Vi i partiet hade rensat ut alla afghanska parasiter och likviderat hindren för länge sedan med proletär järnauthuggning. Skratta åt deras patetiska vändning!"}, "date": "13 maj, 16:15", "url": "https://www.friatider.se/talibanen-som-ska-prata-utvisningar-med-sverige", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-188_1.jpg?itok=Je2AV2ZM"}, {"type": "image-right", "heading": "Så föds en folkrörelse", "summaries": {"normal": "Filmen *Strejkarna* skildrar uppkomsten av klimatrörelsen Fridays for Future, grundad av Greta Thunberg och andra ungdomar. Dokumentären följer deras växande engagemang, globala framgångar och motstånd från konspirationsteorier samt politiska bakslag. Trots motgångar betonar ungdomarna vikten av fortsatt kamp för klimatet. Filmen visar hur en folkrörelse föds och utmanar makthavare, men också hur politisk passivitet och radikalisering formar rörelsens framtid.", "trump": "Jag såg den här filmen om några ungdomar som tror att de kan rädda världen genom att skolka – typiskt! Greta Thunberg, visst, hon fick prata för FN, men vad hände sen? Ingenting! Jag sa ju 'Drill, baby, drill' och det funkade perfekt. De här barnen får hyllningar, men när jag styr USA, då händer det verkligen saker. Och alla dessa 'vuxna bakom kulisserna' – jag känner igen det, fake news! Men visst, 7,6 miljoner människor, imponerande, men de borde jobba istället för att strejka. Klimatet? Vi fixar det, men på mitt sätt!", "stalin": "En intressant dokumentär om hur en handfull småborgerliga ungdomar, ledda av en naiv flicka, försöker störta den naturliga ordningen. De tror sig kunna påverka världen genom barnsliga protester! Vi ser hur imperialistiska makter hyllar dem för att avleda från sina egna brott – precis som de hyllar dekadenta 'demokrater' i väst. Men när rörelsen växer, avslöjas deras svaghet: de saknar disciplin, partilinje och en stark ledare. Polisen måste ingripa – ordning måste upprätthållas! Klimat? Vi i Sovjet visste hur man bygger en framtid – med järnhand, inte med skolstrejker. Dessa ungdomar är bara verktyg för fiendens propaganda!"}, "date": "13 maj, 16:06", "url": "https://www.dagensarena.se/innehall/sa-fods-en-folkrorelse/", "imageUrl": "https://www.dagensarena.se/files/2026/05/strejkarna.jpeg"}, {"type": "image-full", "heading": "Fruktad havsspya sprids – svenskar måste agera: \"Viktigt\"", "summaries": {"normal": "Transportstyrelsen har infört nya riktlinjer för att stoppa spridningen av den invasiva arten havsspya, som hotar biologisk mångfald och ekosystem. Havsspyan, en kolonibildande sjöpung, sprids via båtskrov och utrustning. Båtägare uppmanas nu att hålla sina skrov rena, använda miljövänliga båtbottenfärger och undvika att skrubba båten direkt i vattnet. Målet är att minska risken för vidare spridning genom samordnade insatser i Östersjöområdet och Nordostatlanten. Att följa dessa rekommendationer är avgörande för att skydda våra vatten.", "trump": "De har en fruktansvärd sak i vattnet, de kallar den havsspya. Det låter vidrigt, eller hur? En riktig katastrof! Den förstör allt, den äter upp våra hav, en total miljökatastrof. Transportstyrelsen vill att ni rengör era båtar – fantastiska båtar, de bästa båtarna – men det är en enorm röra. Invasiva arter, de kommer in och tar över. Vi måste säkra våra hav! Rengör era skrov, gör det ordentligt. Vi ska göra våra vatten fantastiska igen, tro mig!", "stalin": "Denna parasiterande havsspya, en ynklig organiskt förrädisk fiende, sprider sig likt en kapitalistisk röta i våra hav. Vi har fastställt att endast genom strikt kontroll och absolut disciplin kan vi krossa denna koloniala hotbild mot moderlandet. Varje båtägare är en bricka i statens maskineri; den som underlåter att rensa sitt skrov agerar i maskopi med naturens kaos. Precis som vi säkrar vår intressesfär mot väst, ska vi rensa Östersjöns bottnar från denna avskyvärda filt av svaghet. Arbeta, rapportera, utrota!"}, "date": "13 maj, 11:59", "url": "https://nyheter24.se/nyheter/inrikes/1482898-fruktad-havsspya-sprids-svenskar-maste-agera-viktigt", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/e3f5d84f04b004a30200000000b004a302/2026/05/13/2363358/havsspya-filtsjopung-invasiv-frammande-art-batagare-sverige-transportstyrelsen.jpg"}, {"type": "image-right", "heading": "Di:s ledarredaktion förstärker inför valet", "summaries": {"normal": "Dagens Industri stärker ledarredaktionen inför riksdagsvalet genom att rekrytera Alexandra Ivanov Hökmark från Timbro, där hon varit vice vd. Hon har tidigare arbetat i Ulf Kristerssons stab och på Svenska Dagbladet. Hökmark blir tillförordnad politisk redaktör under Frida Wallnors föräldraledighet och sedan biträdande. Hon ser fram emot att skriva om inrikespolitik, näringsliv och EU.", "trump": "Vilken satsning från Di inför valet! De plockar in Alexandra Ivanov Hökmark från Timbro – tuff tjej med erfarenhet från Kristerssons stab. Perfekt tajming, precis som mina valsegrar. Teknik, ekonomi, politik – omvälvningar överallt, men med mig styr vi världen bäst. De snackar EU och näringsliv, jag fixar DEALS som ingen annan. Fantastiskt team de bygger!", "stalin": "Kamrater! Borgarklassens slingor slingrar sig in på Di:s ledarsida med denna Timbro-lakej Alexandra Ivanov Hökmark, Kristerssons stabsfluga och EU-krypare. Vi, proletärstaten, ser hur kapitalistvalet lurar med falska omvälvningar i teknik och ekonomi. Jag varnar för dessa näringslivsråttor – rensa ut dem innan de förgiftar opinionsbildningen! Frida Wallnors ledighet blir deras chans att sprida gift, men vi vakar evigt."}, "date": "13 maj, 12:00", "url": "https://www.di.se/nyheter/dis-ledarredaktion-forstarker-infor-valet/", "imageUrl": "https://static.bonniernews.se/ba/b76843e5-4086-475b-9075-94366954033b.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-full", "heading": "Skatten på bensin och diesel sänks igen", "summaries": {"normal": "Regeringen presenterar ett krispaket på 17,5 miljarder kronor för att möta den globala energikrisen. Paketet innehåller bland annat en tillfällig sänkning av skatten på bensin och diesel mellan 1 juli och 30 november, vilket väntas sänka priset vid pump med tre kronor litern. Även stöd till kollektivtrafiken planeras. Syftet är att dämpa effekterna av lågkonjunkturen och stötta hushållens ekonomi, trots att åtgärderna måste lånefinansieras.", "trump": "Sverige gör äntligen rätt! De sänker skatterna på bensin och diesel. Mycket smart, mycket bra! Jag har alltid sagt att billig energi är nyckeln till en fantastisk ekonomi. Medan andra lider av energikriser så ser vi Sverige fatta de rätta besluten. Det är enorma summor, miljarder, men för folket är det värt det. Det är en vacker syn att se priser gå ner istället för upp. Snyggt jobbat, Sverige! Vi älskar billig bensin, eller hur?", "stalin": "Vi ser hur de svenska småborgarna darrar inför energikrisen. De kastar miljarder från statskassan för att dölja sin egen inkompetens. Att sänka bränsleskatten är en desperat muta till folket för att förhindra upplopp. Medan vår broder Putin krossar västvärldens energimarknad med järnhand, försöker dessa socialdemokratiska och liberala lakejer köpa sig lite extra tid. De bygger en 'krockkudde' av papper. När krisen fördjupas kommer även deras lånefinansierade illusioner att gå upp i rök. Historien dömer de svaga."}, "date": "13 maj, 11:50", "url": "https://nyheter24.se/nyheter/inrikes/1482977-skatten-pa-bensin-och-diesel-sanks-igen", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/4a53e92d04b004a30200000000b004a302/2026/05/13/2363403/bensin-diesel-skatt-sanks-juli-regerigen-drivmedelskatt-bensinskatt.jpg"}, {"type": "image-full", "heading": "Brotten Poya Shafie åtalas för", "summaries": {"normal": "Poya Shafie åtalas för ett stort antal brott kopplade till gängkonflikterna mellan Foxtrot- och Dalennätverken, främst våren 2023. Åtalspunkterna inkluderar grovt narkotikabrott med kokainhantering 2020, förberedelse till mord i Skarpnäck och Vällingby, anstiftan till mordförsök i Enskededalen, vapenbrott samt planering av sprängdåd i Sundsvall.", "trump": "Titta på den här svenska gangstern Poya Shafie – åtalas för kokain, mordplaner, bomber och skjutvapen över hela landet! Foxtrot mot Dalen, totalt kaos i Sverige på grund av svaga politiker och öppen gräns. Den idioten koordinerade explosioner i Sundsvall och skott i Stockholm. Sverige behöver murar och hårda tag, som jag skulle ha fixat på nolltid!", "stalin": "I det förfallna borgar-Sverige visar sig Poya Shafie som en äcklig parasit, åtalad för kokainhandel, mordförberedelser och sprängsabotage mot arbetarklassen. Han och hans Foxtrot-hundar planerade massmord i Skarpnäck, Vällingby och Sundsvall – kontrarevolutionärt skräp! Vi skulle ha likviderat sådana fiender i en nattlig utrensning, inte släppt dem lös i era slapphänta domstolar."}, "date": "13 maj, 08:37", "url": "https://www.tv4.se/artikel/4jWiBZA5aQ7xoMYfYhtl2h/brotten-poya-shafie-atalas-foer", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F4Du1Fftb5CpmOdFSaOw4I0%2Ffb8873b5776163d72f0e0cad3b947ed5%2F13-poya-ny.jpg&width=1024"}, {"type": "image-right", "heading": "Gravida med riskjobb får mindre pengar", "summaries": {"normal": "Flera fackförbund tar nu steg för att stämma staten för att skydda privatanställda gravida kvinnor som förlorat pengar när de förbjudits att arbeta på grund av säkerhetsrisker. En unik dom i höstas rättfärdigade offentligt anställda gravidas rätt till full ersättning, men privatanställda har fått mindre pengar. Detta har ledt till många stämningar där facket kräver att staten betalar ut de saknade pengarna och stoppar preskriptionstiden för diskrimineringsersättning.", "trump": "Jag har hört talas om den här graviditetsgrejen, och det är en skandal! Dessa kvinnor tvingas gå hem och förlorar pengar - det är inte bra! Vi behöver göra Amerika stort igen, och det inkluderar att ge gravida kvinnor allt de behöver. Statens arbetsgivare har redan börjat betala ut mer, men privata arbetsgivare - det är dåligt! Jag stöder fackförbunden i deras kamp för att få staten att betala, det är bara rättvist!", "stalin": "Staten måste agera för att skydda våra arbetande kvinnor och deras barn. Det är orättvist att privatanställda gravida kvinnor får mindre ersättning än offentligt anställda. Vi måste se till att alla får lika ersättning och att staten tar sitt ansvar. Detta är en fråga om social rättvisa och vi kan inte låta det fortsätta. Fackförbunden har rätt i sin kamp, och staten måste agera snabbt för att rätta till denna orättvisa."}, "date": "13 maj, 06:00", "url": "https://arbetet.se/2026/05/13/gravida-med-riskjobb-far-mindre-pengar-tusentals-kvinnor-kan-stamma-staten/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/12154249/barn-klar.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=750&h=1000"}, {"type": "text", "heading": "Foxtrottopp gripen i Tunisien", "summaries": {"normal": "Mohamed 'Moewgli' Mohdhi, 28, har gripits i Tunisien. Han utpekas som Foxtrotnätverkets näst högste ledare, direkt under den efterlyste Rawa Majid. Mohdhi misstänks för grova vålds- och narkotikabrott, inklusive mordet på en 15-åring i Skogås 2023 och en 'mordturné' där en flicka utförde våldsdåd. Han var tidigare rappare och bidrog till Foxtrots varumärke via musik. Flera Foxtrotkopplade personer sitter redan fängslade i Tunisien.", "trump": "FANTASTISKT! Tunisien har gripit en riktig skurk, Mohamed 'Moewgli' – en av de värsta brottslingarna, direkt under den där Rawa Majid-killen. Misstänkt för mord, droger och en så kallad 'mordturné' – kan ni tro det? Sverige har haft stora problem med dessa kriminella, men TACK VARE starka insatser från andra länder, som Tunisien, börjar vi få bukt med dem. Och vet ni vad? Han var rappare! Så mycket för 'konsten'. SAD!", "stalin": "Vi har fått nyheter från Tunisien – ytterligare en fiende till folket och ordningen har eliminerats. Denna Mohamed 'Moewgli', en gangster och före detta rappare, har gripits. Han var näst högst i den kapitalistiska brottsorganisationen Foxtrot, en samling degenererade kriminella som sprider kaos och förgiftar ungdomen. Hans brott? Mord, narkotika och en så kallad 'mordturné' – ett symptom på västlig dekadens. Fem av hans medbrottslingar sitter redan bakom lås och bom. Vi noterar med tillfredsställelse att våra allierade i Tunisien effektivt rensar upp i dessa element. Kapitalismens avskum kommer inte undan rättvisan!"}, "date": "11 maj, 16:25", "url": "https://kvartal.se/nyheter/artiklar/foxtrottopp-gripen-i-tunisien/cG9zdDoxMTA3MDM"}, {"type": "image-right", "heading": "Debatt: Regeringen ser oss som en tillväxtmotor – men skär ner på bidragen", "summaries": {"normal": "Kulturorganisationer kritiserar regeringens nedläggning av finansiering trots att kultur- och kreativa branscher lyfts som tillväxtmotorer. De anser att den befintliga infrastrukturen förmedlar 56 000 arbetstillfällen årligen men har fått 27 % mindre i reala termer sedan 2021. De kräver ökad och långsiktig finansiering för att möta regeringens strategiska mål.", "trump": "Jag har hört att de där kulturmänniskorna i Sverige är förbannade på sin regering. De säger att de gör ett fantastiskt jobb, med 56 000 arbetstillfällen, men får klippta på pengarna trots att de är en tillväxtmotor. Jag skulle aldrig göra så - jag skulle ge dem allt de behöver! Dessa centrumbildningar är vinnare, men regeringen behandlar dem som förlorare. Sådant händer när man har en svag ledare!", "stalin": "Vi ser att den svenska staten undergräver sin egen kulturinfrastruktur trots att den producerar betydande ekonomiskt värde. Nedläggningarna av finansiering till centrumbildningarna visar en brist på strategiskt tänkande. En sann socialistisk stat skulle investera i dessa produktiva enheter som genererar fyrdubbelt värde tillbaka till staten. Vi måste stärka vår kultursektor som en basnäring."}, "date": "11 maj, 15:16", "url": "https://www.etc.se/debatt/regeringen-ser-oss-som-en-tillvaextmotor-men-skaer-ner-paa-bidragen", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260511120544_716484294c75b65d354a7ddd2a719d2b0f0da58beebe61a45c1e26165806187b.jpg"}, {"type": "image-right", "heading": "Så bor socialdemokratiska politiker", "summaries": {"normal": "Socialdemokraterna vill styra bostadsområden för att blanda villaområden med hyresrätter och främja 'blandning'. En granskning visar att 77 procent av partiets riksdagsledamöter bor i villa- eller småhusområden eller på landsbygd, trots idealet. Artikeln argumenterar för att människor bör få välja boende fritt, utan politisk inblandning.", "trump": "Vilka hycklare, dessa socialdemokratiska losers! De tjatar om 'blandning' i bostadsområden efter misslyckad invandring, men 77 procent av deras egna politiker gömmer sig i fina villor och lugna områden. Folk vill ha trygghet och valfrihet, inte er styrning! Flytta dit själva om ni tror på skiten. Totalt fake!", "stalin": "Dessa borgerliga hycklare inom socialdemokratin predikar 'blandning' av bostäder för att dölja sin klassförakt, men 77 procent av deras ledamöter smyger i villor som rädda råttor. Vi, arbetarklassen, kräver utrensning av sådana förrädare! Låt staten tvinga dem att leva bland folket – eller likvidera deras illusioner om frihet."}, "date": "11 maj, 14:29", "url": "https://samtiden.nu/2026/05/stoppa-tvangsblandningen/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/694665982_27198179276472490_9170874158922234785_n-e1778503379439-640x360.jpg"}, {"type": "image-right", "heading": "EU delar ut vätgasmiljarder – Sverige utan stöd", "summaries": {"normal": "EU delar ut över 1 miljard euro till vätgasprojekt via innovationsfonden, finansierat av utsläppshandelssystemet ETS. Nio projekt i sju länder valdes, varav fem i Norden – men inget i Sverige. Stödet ska täcka prisskillnaden mellan produktionskostnader och marknadspris för att främja ren vätgas. Tidigare har flera projekt tackat nej på grund av snäva tidsramar. Totalt ansökte 251 projekt om medel.", "trump": "EU slänger ut miljarder på vätgas – men Sverige, som alltid, får ingenting! Fem projekt i Norden, men inget i Sverige. Typiskt. Jag skulle ha fixat det bättre. Och de här projekten – de har inte ens bestämt sig än! Svagt. Jag hade byggt en jättefabrik på en månad. Europa är så långsamt, så tråkigt. Men jag, jag hade gjort vätgas GREAT AGAIN!", "stalin": "Kamrater! Europa leker med sina miljarder medan vi bygger imperier. Fem nordiska projekt får stöd – men Sverige, dessa kapitalistiska svikare, står utanför! Deras industri betalar för utsläpp, ändå får de inget. Skrattretande. Och dessa projekt – de drar sig ur som fega desertörer! I Sovjet hade vi byggt vätgasfabriker med järnhand. Europa är svagt. Vi hade redan erövrat vätgasmarknaden – och kanske även deras kalla, nordiska hamnar."}, "date": "11 maj, 13:23", "url": "https://www.affarsvarlden.se/artikel/eu-delar-ut-vatgasmiljarder-sverige-utan-stod", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Vatgas-Eu-900x600.jpg"}, {"type": "image-right", "heading": "Sluta kalla antisemitism för Israelkritik", "summaries": {"normal": "Artikeln kritiserar propalestinska aktivisten Sami Suliman för antisemitiska uttalanden och delning av konspirationsteorier, inklusive tal om en \"sionistisk konspiration\" och spridning av nazistiskt och extremistiskt innehåll. Trots åtal för hets mot folkgrupp försvaras han av vissa vänsteraktivister och forskare som menar att det är Israelkritik. Artikeln betonar att antisemitism inte kan maskeras som kritik mot Israel och varnar för normaliseringen av sådana åsikter.", "trump": "Folk, vad är det här för skräp? Den här Sami Suliman-killen, han sprider judehat öppet – Hitler-citat, konspirationer, allt! Och ändå försvarar vänsteraktivisterna honom? \"Åh, det är bara Israelkritik!\" Nej, nej, nej! Det här är rena antisemitismen, och det är sjukt. Sverige borde skämmas. Jag har alltid sagt: man måste kalla saker vid deras rätta namn. Och det här? Det är hat, ren och skär. SAD!", "stalin": "Kamrater! Här har vi ännu en fiende till folket, en liten bourgeois-propagandist vid namn Sami Suliman. Han sprider smutsiga lögner om judiska konspirationer, hyllar fascistiska massmördare och förgiftar medborgarnas sinnen med sina sionistiska spindelnätsteorier. Men vad gör våra så kallade \"intellektuella\"? De skyddar honom! Precis som de trotskistiska förrädarna i vår egen historia. Vi ska inte tolerera detta. Låt honom stå inför folkets domstol – eller åtminstone en svensk sådan. Och Putin? Han skulle skratta åt dessa amatörer. Ryssland har åtminstone disciplin!"}, "date": "8 maj, 06:30", "url": "https://expo.se/kommentar/propalestinsk-organisator-sprider-judehat/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/Jonathan-kommentar.jpg"}, {"type": "text", "heading": "Tystnad om ödesdiger riksdagsomröstning", "summaries": {"normal": "Debattörer från Bottna för Fred varnar för en kommande riksdagsomröstning den 15 juni, där Sverige riskerar att ge Nato långtgående rättigheter att använda svenskt territorium för militära ändamål, inklusive krigshandlingar. Förslaget, som regeringen planerar att driva igenom utan bred debatt, kritiseras för att öka risken för Sveriges inblandning i krig och underminera demokratin. Oppositionen har inte motsatt sig förslaget, och få har uppmärksammat frågan trots dess potentiellt ödesdigra konsekvenser.", "trump": "Sverige, lyssna här! De där så kallade 'ledarna' i riksdagen vill ge Nato full kontroll över ert land – utan att fråga er! 17 amerikanska baser redan, och nu ska hela Nato få köra krig på svensk mark. Ingen debatt, ingen demokrati, bara tystnad. De vill göra Sverige till en frontstat mot Ryssland, som jag redan fixade till en gång för alla. Men vad vet jag? Jag är bara den bästa presidenten någonsin. Svenskarna borde vakna – eller är ni rädda för lite frihet?", "stalin": "Kamrater! De svenska imperialistlakejerna i riksdagen förbereder sig att sälja sitt land till Nato-kapitalisterna, som hungriga vargar. De vill ge fienden fritt fram att använda svensk mark för sina krigsäventyr – utan att ens konsultera folket! Tystnaden är förrädisk, men vi ser allt. Oppositionen? Inga hjältar där heller, bara ynkliga nickedockor. Sverige blir en ny front i västmakternas krig mot freden. Men glöm inte: historien dömer förrädare hårt. Vi följer utvecklingen med intresse – och våra vänner i öst likaså."}, "date": "7 maj, 16:09", "url": "https://proletaren.se/artikel/tystnad-om-odesdiger-riksdagsomrostning/"}, {"type": "text", "heading": "Miljardärerna bjuder in till klasskamp – vi kör!", "summaries": {"normal": "På första maj provocerade svenska miljardärer och högerpolitiker genom att avfärda traditionella arbetardemonstrationer. Moderaternas ledare åt glass medan Vois VD Fredrik Hjelm och andra techmiljardärer skryter om sin rikedom och hånar demonstranter. Hjelm publicerade senare kritikerns hemadress. Artikeln diskuterar miljardärernas politiska inflytande, deras kopplingar till högerpopulism och kritik mot deras syn på innovation och statens roll. Författaren menar att statliga investeringar historiskt drivit tillväxt mer effektivt än privat kapital.", "trump": "Titta bara på dessa så kallade 'miljardärer' i Sverige – de tror de är så smarta! De hånar arbetarna på första maj, äter lyxig lunch och skryter om sina hundra miljarder. Och vad gör de? Publicerar en kritikers hemadress! Så fegt. Jag har byggt imperier, jag vet hur man skapar jobb – men dessa killar? De är bara en samling överbetalda tech-nördar som kopierar mina tweets. Och Sverige? De har glömt hur man bygger ett land. Kina äter deras lunch medan de dricker öl på Riche. Sad!", "stalin": "Kamrater! Dessa dekadenta kapitalistiska hyenor, som gömmer sig bakom sina skärmar och sparkcyklar, vågar håna arbetarklassen på dess heligaste dag! De skryter om sina hundra miljarder, leker med teknikleksaker och tror de är herrar över historien. Men vi vet sanningen – deras system är ett skämt, ett kasino där orangutanger kastar pilar. Kina marscherar framåt med järnhand, medan Europas industri ruttnar. Dessa 'techbros' är inget annat än imperialistiska lakejer, som Putin i sina dyraste kostymer. Låt dem skåla på Riche – snart kommer folket att ta deras champagne och ge dem en enkel sup vodka i Gulag-arkipelagen!"}, "date": "5 maj, 10:55", "url": "https://www.flamman.se/miljardarerna-bjuder-in-till-klasskamp-vi-kor/"}]</script>

    <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
</body>
</html>
