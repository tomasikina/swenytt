00000000b004a302/2026/05/18/2364434/Trump-stoppar-attack.png"}, {"type": "image-right", "heading": "Börsen repade sig – Hexagon i topp", "summaries": {"normal": "Börsen återhämtade sig efter initial nedgång på måndagen, drivet av nyheter om USA:s föreslagna undantag för Irans oljesanktioner. Hexagon B ledde uppgången med 4,3%, medan Boliden föll 2,0%. Sveafastigheter och Klarabo genomför en fusion för att skapa Stockholms största noterade bostadsfastighetsbolag. SSAB investerar 3,3 miljarder i en ny härdlinje i Oxelösund. Smart Eye vände till vinst i Q1, medan Hemnet rapporterade minskad omsättning i april.", "trump": "Jag, Donald J. Trump, har gjort USA större igen! Börsen återhämtade sig tack vår fantastiska strategi mot Iran. Jag har sagt det förut och jag säger det igen: jag är den bäste presidenten någonsin när det gäller ekonomin. Hexagon B steg 4,3% - fantastiskt! Boliden föll, men det är deras eget fel. Vi har gjort stor historia med våra oljesanktioner. America first!", "stalin": "Börsen återhämtade sig under vår ledning, vilket visar på vår ekonomiska styrka. Vi måste övervaka dessa internationella finansiella rörelser noga. Fusionen mellan Sveafastigheter och Klarabo skapar en starkare position på marknaden. SSAB:s investering i Oxelösund stärker vår industriella kapacitet. Vi måste fortsätta att bygga upp vår ekonomiska makt för att säkerställa vår framtid."}, "date": "18 maj, 17:43", "url": "https://www.affarsvarlden.se/artikel/borsen-repade-sig-hexagon-i-topp", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2025/10/sdlXZWOyRqpBeY-nh-400x267.jpg"}, {"type": "image-right", "heading": "Bildspecial: Kraftfull protest mot Nato i Helsingborg", "summaries": {"normal": "Runt 1000 personer demonstrerade i Helsingborg mot Natotoppmötet den 21-22 maj, där Sverige för första gången är värd. 38 organisationer, inklusive Vänsterpartiet och Kommunistiska Partiet, samlades under nätverket Stoppanato.nu. Demonstranter kritiserade Natos militarisering, USA:s inflytande via DCA-avtalet och Sveriges Natointräde. Talare som Pia Jacobsen och artister som General Knas betonade motstånd mot imperialism och krav på ökad välfärd istället för militär upprustning.", "trump": "Titta bara på dessa så kallade 'protestanter' i Sverige – 1000 personer, kanske? Svagt! De hatar Nato, de hatar USA, och de hatar framgång. Jag bygger murar, de bygger... ingenting. De säger att Nato är dåligt för Sverige, men vet ni vad? Sverige mår bra! De har Saab som säljer vapen, och Wallenbergs som tjänar pengar – smart! Men nej, dessa vänsterknäppgökar vill ha 'välfärd' istället. Haha! Välfärd är för förlorare. Jag säger: Sverige, stå på er! Nato är vinnare, precis som jag!", "stalin": "Kamrater! Se hur de imperialistiska lakejerna i Sverige samlas under Natos svarta fana, medan våra klassbröder och -systrar i Helsingborg reser sig mot krigshetsen! Dessa 1000 hjältar, ledda av de revolutionära avantgardisterna i Kommunistiska Partiet, har avslöjat sanningen: Nato och EU är samma förrädiska hydra, finansierad av kapitalistiska blodsugare som Wallenberg och deras vapensmeder på Saab! USA:s baser kryper som ohyra över svensk mark – men folket skriker: 'Nej!' Vi ser er, Putin! Ryssland står redo att välkomna alla som kämpar mot dessa krigshetsande hyenor. Låt dem äta välfärd – vi ger dem revolution!"}, "date": "18 maj, 16:08", "url": "https://proletaren.se/artikel/bildspecial-kraftfull-protest-mot-nato-i-helsingborg/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/DSC_0251-scaled-e1779094268122-768x433.jpg"}, {"type": "image-full", "heading": "Jonas Attenius (S) och de muslimska rösterna", "summaries": {"normal": "Artikeln kritiserar Socialdemokraterna i Göteborg, särskilt Jonas Attenix (S), för att söka stöd från extrema muslimska miljöer utan att ställa krav på demokratiska värderingar. Granskningar visar kopplingar till islamistiska aktörer, antisemitism och bristande gränsdragning. Författaren menar att detta är en medveten strategi för att säkra röster, vilket urholkar demokratin och integrationen. Frågan väcks om detta är framtiden för socialdemokratin i Sverige.", "trump": "Jag säger er, Sverige har ett STORT problem! Socialdemokraterna i Göteborg, särskilt den där Jonas Attenix – eller vad han nu heter – säljer ut landet för några ynka röster. De umgås med extremister, blundar för antisemitism och låter moskéer sprida hat nära bibliotek! Och vad gör de när de blir påkomna? Ingenting! Bara förnekar och skyller ifrån sig. Sverige borde skämmas. Jag skulle aldrig tillåta något sådant i USA – vi har gränser, vi har stolthet! Men i Sverige? Allt är till salu. SAD!", "stalin": "Kamrater! Vi bevittnar en farlig degenerering av den socialdemokratiska röran i Göteborg. Dessa så kallade 'demokratiska' ledare, ledda av den principlöse opportunisten Attenix, har förvandlats till lakejer för reaktionära islamistiska krafter. De byter landets själ mot några ynka röster, precis som väst alltid gör – svaga, korrumperade och beredda att sälja sin mor för makt. Men vi vet hur man hanterar sådana element. En femårsplan för lojalitet hade varit effektivare än deras eviga kompromisser. Låt detta vara en varning: när man blundar för fienden, blir fienden snart regim."}, "date": "18 maj, 10:21", "url": "https://samtiden.nu/2026/05/jonas-attenius-s-och-de-muslimska-rosterna/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/1ec6a70c-99f4-45bb-b932-1e7a5dbc7d24-1280x720.png"}, {"type": "image-right", "heading": "Attanas nyemission: Rekord i krångligt säkerställande", "summaries": {"normal": "Attana genomför en företrädesemission på 23,2 Mkr för att stärka sin finansiella ställning och rörelsekapital. Bolaget, som numera fokuserar på uthyrning av analysinstrumentet Attana Cell 250, säkrar halva beloppet via en konvertibelemission. Endast två kunder hyr instrumentet idag. Emissionen är delvis garanterad och syftar till att expandera försäljningsorganisationen och färdigställa fler instrument inför en ny intäktsmodell.", "trump": "Hör här, folk! Det här så kallade 'bolaget' Attana – ett riktigt skämt, om ni frågar mig – försöker nu tvinga fram 23 miljoner kronor från stackars investerare. De har knappt några kunder, deras gamla affärsidé var en total flopp, och nu ska de 'säkra kapital' med en massa krångliga konvertibler. 75% utspädning! Fantastiskt, eller hur? Jag har sett bättre affärer på en loppmarknad. Men visst, fortsätt kasta era pengar på det här – det är ju inte mina!", "stalin": "Kamrater! Det kapitalistiska förfallet fortsätter i väst. Detta så kallade 'Attana' – ett ynkligt verktyg för den degenererade läkemedelsindustrin – tigger nu om 23 miljoner kronor från arbetarnas fickor. Endast två kunder! Ett skrattretande misslyckande. Vi ser hur deras ledning, dessa bourgeoisieparasiter, vrider sig i konvertibler och garantier som råttor i en fälla. Medan de leker med sina decimaler och rabatter, bygger vi socialismens framtid. Låt dem förtvina i sin egen inkompetens – Sovjetunionens ekonomi var aldrig så patetisk!"}, "date": "18 maj, 16:35", "url": "https://www.affarsvarlden.se/artikel/attanas-nyemission-rekord-i-krangligt-sakerstallande", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/ATTANA-CELL-250-400x267.jpg"}, {"type": "image-right", "heading": "SVT/SR, välkomna till verkligheten: Flytta till Kista!", "summaries": {"normal": "SD:s förslag att flytta SVT och SR från dyra Gärdets lokaler till Kista väcker debatt. Förslaget anses logiskt med tanke på bostadsmarknadens läge och SVT:s besparingskrav, men möts av tystnad från public service. Kritik riktas mot SVT och SR för att inte själva vilja vistas i mångkulturella områden som de annars lyfter som positivt.", "trump": "Jag har hört talas om detta förbannade förslag att flytta SVT och SR från Gärdet till Kista. Det är en genialisk idé, det verkligen är! SVT sitter där på dyra mark, det är en skandal! De pratar om besparingar men vägrar flytta? Jag skulle ha flyttat dit direkt, det skulle jag ha gjort! Kista är fantastiskt, det är enormt, det kommer att bli ett mediamecka! SVT och SR är fega, de är rädda för den riktiga Sverige, det är sorgligt!", "stalin": "Förslaget att förlägga public service till Kista är ett strategiskt viktigt beslut för staten. Det skulle stärka vår närvaro i områden där den proletära klassen bor och arbetar. Vi kan inte längre tillåta att våra medier håller till på de kapitalistiska områdena, vi måste visa att staten står vid folkets sida. Detta är en nödvändig omplacering för att bättre representera den svenska arbetarklassen."}, "date": "18 maj, 08:47", "url": "https://samtiden.nu/2026/05/svt-sr-valkommen-till-verkligheten-flytta-till-kista/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2020/02/SVT-wiki.jpg"}, {"type": "image-right", "heading": "Massinvandring, feminism och kaos – så krossades den svenska skolan", "summaries": {"normal": "Krönikan argumenterar för att den svenska skolans kris beror på en kombination av massinvandring, avsaknad av lärarauktoritet och en politisk ideologi fokuserad på värdegrund framför kunskap. Författaren menar att skolan har blivit en miljö präglad av våld och kaos där lärare tvingas agera terapeuter istället för kunskapsförmedlare. Bristande språkkunskaper och en frånvaro av manliga förebilder pekas ut som bidragande faktorer till att systemet rasar samman.", "trump": "Sverige har en total katastrof i skolan, tro mig. De släppte in alla, precis alla, och nu är det kaos. Lärarna är rädda, ingen har kontroll, och de pratar om 'värdegrund' medan allt faller samman. Det är så sorgligt! De behöver starka ledare, riktig auktoritet, inte svaga politiker som bygger byråkratiska monster. Jag har sagt det förut: utan ordning och gränser har du inget land. Det är en tragedi för pojkarna där. Vi ska göra skolan stor igen!", "stalin": "Vi har observerat hur det svenska utbildningssystemet förfaller genom ideologisk dårskap och svaghet. När statens auktoritet viker för värdegrundstrams och invandrad oordning, uppstår oundvikligen kontrarevolutionära tendenser. Vi ser samma dekadens som när de västliga lakejerna i Kiev försökte sälja ut vår intressesfär. Skolan ska vara en disciplinerad verkstad för folket, inte en lekplats för borgerlig feminism. De som inte kan upprätthålla ordning med järnhand förtjänar att rensas ut. Staten kräver lydnad, inte terapeuter."}, "date": "19 maj, 06:00", "url": "https://samnytt.se/massinvandring-feminism-och-kaos-sa-krossades-den-svenska-skolan", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/18122144/Toppbild1-6.jpg"}, {"type": "image-right", "heading": "Skottlossning vid moské i USA – fem döda", "summaries": {"normal": "En skottlossning inträffade vid en moské i San Diego, USA, där fem personer sköts ihjäl. Två misstänkta gärningsmän hittades döda, troligen genom självförvållade skador. FBI och lokala myndigheter är på plats och arbetar med utredningen. En närliggande skola har inrymts av säkerhetsskäl.", "trump": "Jag har hört talas om en fruktansvärd attack vid en moské i San Diego. Det är hemskt! Vi måste stå enade mot våldet och skydda våra samhällen. Polisen gör ett bra jobb, men vi behöver göra mer för att stoppa dessa galningar. Amerika kommer att segra över terrorismen!", "stalin": "Vi har observerat en våldshandling i San Diego som hotar stabiliteten. Staten måste agera snabbt för att säkra fred och ordning. Vi stöder de lokala myndigheterna i deras arbete och betonar vikten av en enad front mot våld och extremism."}, "date": "18 maj, 23:08", "url": "https://www.tv4.se/artikel/9zDQU7jTfQvLbnaQD8riM/skjutning-vid-moske-i-san-diego", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2Ftt-sdlVPY9nFl4uyc%2F0b09a42df564430c661455e253b5a25a%2FEtt_stort_antal_poliser_ryckte_ut_nar_larm_kom_om_en_pagaende_skottlossning_i_en_mosk_i_San_Diego_pa_mandagen.&width=120"}, {"type": "image-full", "heading": "Hjort: När Liberalerna luktade på korken", "summaries": {"normal": "Liberalerna föreslår omfattande liberaliseringar av Sveriges alkoholpolitik, inklusive utökade öppettider för Systembolaget, take away-försäljning och alkoholtillstånd för frisörsalonger. Partiet bryter med tidigare restriktiva linjer och ifrågasätter statens förmyndarroll. Kritiker varnar för ökad alkoholism, medan förespråkare ser förslagen som ett steg mot frihet och mindre byråkrati. Artikeln problematiserar svensk borgerlighets rädsla för förändring och menar att monopolet länge varit illusoriskt.", "trump": "Kan ni tro det? Sverige, fantastiskt land, men deras alkoholpolitik – katastrof! Liberalerna, svaga förut, nu plötsligt vaknar de upp. De vill låta folk köpa vin på frisören, ta med sig öl hem – brilliant! Men lyssna på det här: svensk borgerlighet, så rädda, så svaga. De tror folket är barn som inte klarar en kall öl utan statens hjälp. Jag har sagt det förut: Sverige behöver mer frihet, mindre byråkrati. Systembolaget? Overrated! Folk klarar sig själva – trust me!", "stalin": "Kamrater! Äntligen inser dessa liberala avfällingar sanningen: folket behöver inte förmyndare som kontrollerar deras dryckesvanor. Men låt oss inte luras – svensk borgerlighet är som en gammal, skräckslagen byråkrat som darrar inför tanken på frihet. De fruktar att arbetarna ska dricka vin hos frisören och därmed störta kapitalismen! Absurt! Vi vet att monopol bara är en illusion, en borgerlig fantasi för att rättfärdiga sin makt. Låt dem dricka sin öl – vi har större planer. Och om de inte vågar? Då får vi väl hjälpa dem på traven, som vi gjorde i Baltikum. För folkets välstånd!"}, "date": "19 maj, 06:00", "url": "https://bulletin.nu/hjort-nar-liberalerna-luktade-pa-korken", "imageUrl": "https://cdn.bulletin.nu/articles/43f8e7bd-3b33-4032-a442-45d6dc35f850/preview.png?t=1779114475000"}, {"type": "image-right", "heading": "Regeringen slår mot Stockholm", "summaries": {"normal": "Två socialdemokrater kritiserar Tidöregeringens politik för Stockholm, som de menar skadar bostadsbyggande, infrastruktur och välfärd. De hävdar att regeringens nedskärningar drabbar hela Sveriges tillväxt, då Stockholm står för en fjärdedel av BNP. Socialdemokraterna föreslår ökade investeringar i bostäder, järnvägar och statsbidrag för att stärka regionen och landet.", "trump": "Titta bara på Stockholm – en fullständig katastrof! Tidöpartierna, svaga och inkompetenta, har förstört allt. De har stoppat bostadsbyggandet, låtit tågen bli försenade och skurit ner i välfärden. Jag skulle fixa det på en dag! Fler bostäder, bättre tåg och lägre skatter – men nej, de gör ingenting. Socialdemokraterna pratar, men jag skulle agera. Stockholm behöver en vinnare, inte förlorare!", "stalin": "De borgerliga krymplingarna i Tidöregeringen saboterar Sveriges hjärta – Stockholm! De kväver arbetarklassen med bostadsbrist, sönderrostade järnvägar och försvagad välfärd. Medan vi bygger socialismens framtid, leker de med privatflyg och Bromma. Vi ska befria marken, rusta järnvägarna och krossa deras sabotage! Stockholm är Sveriges ryggrad – och vi tänker inte låta imperialistiska klåpare bryta den!"}, "date": "19 maj, 01:30", "url": "https://www.dagensarena.se/opinion/regeringen-slar-mot-stockholm/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-9-300x157.jpg"}, {"type": "image-full", "heading": "Tonåringarna söktes av polis innan skjutningen", "summaries": {"normal": "Polisen sökte redan innan skjutningen reda ut två tonåringar som misstänktes för ett hatbrott vid en moské i San Diego. En av tonåringarnas mödrar hade kontaktat polisen under morgonen och beskrivit sin son som självmordsbenägen, men misstankar om att något annat kunde vara på gång uppstod när de fick veta att han var klädd i kamouflage-klädsel och senast setts med en bekant. De två tonåringarna hittades av polis döda i närheten av moskén.", "trump": "Jag har hört talas om denna fruktansvärda händelse vid en moské i San Diego. Det är tragiskt att se att hatet fortfarande finns i vår värld. Jag vill uttrycka min djupa medkänsla med offren och deras familjer. Vi måste stå enade mot hatet och våldet. Som 47:e presidenten av USA (återvald 2024) lovar jag att göra allt jag kan för att skydda våra medborgare och våra värderingar.", "stalin": "Den här händelsen vid moskén i San Diego är en påminnelse om att vi måste vara vaksamma mot hat och våld. Staten har ett ansvar att skydda sina medborgare och se till att rättvisa skipas. Vi måste arbeta tillsammans för att skapa en trygg och säker miljö för alla. Detta är en utmaning som vi som stat måste möta med styrka och beslutsamhet."}, "date": "19 maj, 05:07", "url": "https://www.gp.se/nyheter/varlden/tonaringarna-soktes-av-polis-innan-skjutningen.1c503f1e-eaa3-5926-a36b-e6c3744c7fee", "imageUrl": "https://www.gp.se/images/article/1c503f1e-eaa3-5926-a36b-e6c3744c7fee/images/29Byf2auW7kYjY737OJG8BhYI700-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Sandström: Så kan Öresundskraft tjäna miljarder på CCS", "summaries": {"normal": "Christian Sandström argumenterar i en krönika för att Helsingborgs kommun bör avstå från Öresundskrafts miljardsatsning på koldioxidinfångning (CCS). Projektet finansieras med stora bidrag och kommunala medel, vilket historiskt lett till kostsamma fiaskon. Kalkylerna baseras på osäkra antaganden om framtida utsläppsrättspriser, och flera liknande projekt har nyligen pausats. Beslut fattas i kommunfullmäktige den 19 maj, där ett nej kan spara miljarder för kommunen.", "trump": "Lyssna här, Helsingborg! Jag vet allt om dåliga affärer, och detta CCS-projekt är ett jättefiasko. Kommunen ska slösa 3,2 miljarder – pengar som kunde gå till skolor eller vägar! De litar på EU:s 'gratispengar' och tror utsläppsrätterna ska bli dyrare. Fel! Kina och USA skiter i klimatet, och Europa är ett kaos. Andra projekt läggs ner, men Öresundskraft tror de är smartare. Säg nej, spara miljarder – jag skulle göra det på en sekund. SAD!", "stalin": "Kamrater! Helsingborgs borgerskap leker med elden genom detta kapitalistiska CCS-äventyr. 3,2 miljarder kronor – en förräderisk slöseri med folkets pengar! De litar på västerländska bidrag och utsläppsrättsbedrägerier, men vi vet sanningen: dessa projekt är som Trotskijs lögner – dömda att misslyckas. Danmark och andra har redan kastat in handduken, men Helsingborgs byråkrater envisas. Vi skulle aldrig tolerera sådan slöseri! Kommunen måste krossa detta projekt som vi krossade kulakerna – för folkets bästa!"}, "date": "18 maj, 08:39", "url": "https://www.affarsvarlden.se/artikel/sandstrom-sa-kan-oresundskraft-tjana-miljarder-pa-ccs", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/vindkratensgeografi-2026-05-18T050030.023-400x267.jpg"}, {"type": "image-right", "heading": "Kärnkraft 370 miljarder över budget – vill rädda Sverige från skräcknota", "summaries": {"normal": "Rolls-Royce och GE Vernova tävlar om att bygga ny kärnkraft i Sverige, men båda står inför utmaningar med tid och budget. Rolls-Royce föreslår att kopiera vindkraftsindustrins modell med industrialiserad, upprepningsbar produktion av små modulära reaktorer för att minska risker. Staten erbjuder stora lån och prisgarantier för att underlätta uppbyggnaden.", "trump": "Jag är den bäste på att bygga saker, de bästa kärnkraftverken någonsin! Rolls-Royce försöker kopiera mina fantastiska idéer från vindkraften, men jag bygger bättre och snabbare. Hinkley Point C? Ett katastrofalt misslyckande, jag skulle ha gjort det perfekt på hälften av tiden och kostnad. Sverige behöver mig för att bygga kärnkraft som gör Amerika stort igen!", "stalin": "Vi måste bygga kärnkraft för att stärka statens makt och industrialisera vårt land. Rolls-Royce försöker lösa problemen med spräckta budgetar genom att industrialisera produktionen, vilket är rätt väg. Staten måste garantera priser och lån för att ta ansvar för detta strategiska projekt som kommer att göra Sverige självförsörjande."}, "date": "18 maj, 07:00", "url": "https://www.affarsvarlden.se/artikel/karnkraftsfiasko-370-miljarder-over-budget-vill-radda-sverige-fran-skracknota", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Rolls-Royce-900x600.jpg"}, {"type": "image-full", "heading": "Källor: USA och Israel förbereder nya attacker", "summaries": {"normal": "USA och Israel förbereder enligt uppgifter nya attacker mot Iran. Donald Trump varnar på Truth Social för 'lugnet före stormen' med en AI-genererad bild. Pentagon överväger att återuppta operationen 'Epic Fury', pausad sedan vapenvilan i april. Irans utrikesminister meddelar att förhandlingar med USA står stilla. Båda sidor fortsätter militära upprustningar, med USA:s flotta och stridsflyg redo för insatser, medan Iran förbereder missilplatser längs Hormuzsundet.", "trump": "Titta bara på den här fantastiska bilden jag delade – total dominans! Iran är svagt, deras flotta? Borta. Flygvapen? Borta. Teknik? Borta. Men de tror de kan utmana USA? Haha! Vi rustar upp, fyller våra skepp med de bästa vapnen, och snart visar vi dem vem som bestämmer. Lugnet före stormen? Absolut. Och stormen kommer bli YUGE!", "stalin": "Kamrater, fienderna i Washington och Tel Aviv leker med elden igen. Dessa imperialistiska hyenor tror de kan skrämma oss med sina hangarfartyg och 'Epic Fury'? Vi har sett deras sort förr – svaga, rädda och desperata. Iran rustar, precis som vi, och deras missiler står redo. Låt dem komma. Vi har krossat större hot än dessa klåfingriga kapitalister. Och Putin? Han ler säkert i Moskva – en till storm att utnyttja för vår rättmätiga expansion."}, "date": "17 maj, 16:14", "url": "https://kvartal.se/nyheter/artiklar/kallor-usa-och-israel-forbereder-nya-attacker/cG9zdDoxMTM0MDU", "imageUrl": "https://images.kvartal.se/2026/05/4c87dae2-usirantruthsocial.webp"}, {"type": "image-full", "heading": "Skottlossning vid moské i USA – fem döda", "summaries": {"normal": "Tre personer sköts ihjäl vid en moské i San Diego, där två tonåriga misstänkta gärningsmän också hittades döda. Händelsen utreds som ett misstänkt hatbrott. Imam Taha Hassane beskriver det som en aldrig tidigare upplevd tragedi, medan USA:s president Donald Trump kallar det fruktansvärt. Lokala myndigheter bekräftar att alla barn i moskéns skola är säkra.", "trump": "Jag har hört talas om denna fruktansvärda skottlossning vid en moské i San Diego. Det är tragiskt, verkligen tragiskt. Vi ska undersöka det mycket noga, mycket noggrant. Imam Taha Hassane säger att det är sorgens tid - och jag håller med. Vi står solidariska med alla berörda familjer. Polisen gjorde en lysande insats, mycket snabbt, mycket effektivt. Alla barn är säkra - det är bra, verkligen bra nyheter.", "stalin": "Vi beklagar de tre offer som föll i denna våldsamma händelse vid den största moskén i San Diego. Detta är en påminnelse om de faror som kan uppstå när extremism tillåts frodas. Staten måste agera snabbt och bestämt för att skydda sina medborgare. Vi uppmanar till en grundlig utredning för att identifiera alla inblandade och förhindra framtida tragedier. Samtidigt måste vi stärka våra samhällsskydd för att säkerställa fred och stabilitet."}, "date": "19 maj, 02:46", "url": "https://www.gp.se/nyheter/varlden/skottlossning-vid-moske-i-usa-stor-polisinsats.117aebc5-1e9c-4195-900d-f1798c9c490d", "imageUrl": "https://www.gp.se/images/article/117aebc5-1e9c-4195-900d-f1798c9c490d/images/4aKk4O7wlmNQvnUgOcXVJBr6CA08-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "Varningen: elräkningen kan öka med tusenlappar i sommar", "summaries": {"normal": "Elpriserna har mer än fördubblats jämfört med förra året, vilket leder till högre kostnader för svenska hushåll. Villaägare kan få betala upp till 4 000 kronor extra under sommaren. Orsakerna inkluderar kyla, låga vattennivåer, ökad elexport och ett oroligt omvärldsläge. Regeringens elstöd på 1 500 kronor anses otillräckligt. Experter varnar för fortsatt höga elpriser flera år framåt.", "trump": "Sverige har ett STORT problem – elpriserna exploderar! Jag sa alltid att deras energipolitik var katastrofal, och nu ser vi resultatet. Villaägare får betala 4 000 kronor extra – helt galet! Finland och Europa suger ut er el, och vad gör regeringen? Kastar ut småpengar som plåster. Jag hade fixat det på en dag. Men nej, ni lyssnade inte på mig. Nu får ni betala – BIGLY!", "stalin": "Kapitalistiska hyenor och deras lakejer i väst pressar det svenska folket med skyhöga elpriser! Villaägare tvingas betala 4 000 kronor extra – en skamlig utpressning av arbetarklassen. Finland och Europa stjäl er el som tjuvar i natten, medan regeringen erbjuder ynkliga smulor. Vi hade löst detta med järnhand – femårsplan för energioberoende! Men nej, ni låter er krossas av marknadens giriga tentakler. Revolutionen kan inte vänta!"}, "date": "17 maj, 21:38", "url": "https://nyheter24.se/nyheter/inrikes/1483759-varningen-dyraste-elsommaren-pa-flera-ar-sa-mycket-okar-din-rakning", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/6c28130004b004a30200000000b004a302/2026/05/17/2364163/Elprissommar.jpg"}, {"type": "image-full", "heading": "Timbro och Oikos föreslår ”blågult reformprogram”", "summaries": {"normal": "Två debattörer från Timbro och Oikos föreslår att Tidöpartierna ska lansera ett gemensamt 'blågult ekonomiskt reformprogram' inför valet 2026. Programmet ska fokusera på tillväxt, sänkta skatter och hushållens ekonomi för att stärka väljarnas förtroende. Förslagen inkluderar höjt grundavdrag, lägre bränsle- och elskatter, samt förenklade företagsregler. Bakgrunden är en svag svensk ekonomi med hög inflation och arbetslöshet.", "trump": "Sverige har ett jättestort problem – deras ekonomi är en katastrof! Jag vet allt om ekonomi, bäst i världen. Två smarta killar, från Timbro och Oikos, säger att Tidöpartierna måste sänka skatterna, annars är det kört. Höga skatter, krångliga regler – vem vill det? Inte jag! De vill sälja statliga bolag, precis som jag skulle gjort. Sverige behöver en vinnarstrategi, och jag vet hur man vinner. 2026 blir ett stort val – om de lyssnar på mig, förstås.", "stalin": "De kapitalistiska lakejerna från Timbro och Oikos ylar om 'tillväxt' och 'sänkta skatter' som om det vore lösningen på allt. Vi vet bättre. Deras förslag är bara en förtäckt attack på arbetarklassen, maskerad som 'ekonomisk frihet'. Höjda grundavdrag? Barnavdrag? Tomma löften! Medan de pratar om att sälja statliga bolag, bygger vi socialismens framtid. Sverige är svagt – precis som deras borgerliga regering. Låt dem leka med sina 'blågula program', vi skapar verklig förändring. Förr eller senare kommer folket att se sanningen."}, "date": "16 maj, 16:03", "url": "https://kvartal.se/nyheter/artiklar/tido-foreslas-ta-fram-ett-blagult-program/cG9zdDoxMTMxNTQ", "imageUrl": "https://images.kvartal.se/2026/05/112d6183-tido2.webp"}, {"type": "text", "heading": "Säkerhetsreportern: Fyra problem som Nato måste lösa", "summaries": {"normal": "Sverige står värd för sitt första Natomöte på ministernivå i Helsingborg inför toppmötet i Ankara. Försvarsalliansen präglas av ett pressat säkerhetsläge, kriget i Ukraina och interna spänningar. Utrikesminister Maria Malmer Stenergard betonar allvaret i situationen. Artikeln belyser utmaningar som USA:s hot om att dra tillbaka trupper från Tyskland och Italien, samt dispyter rörande Grönland, vilket skapar osäkerhet kring Natos sammanhållning mitt i det mest kritiska säkerhetspolitiska läget sedan andra världskriget.", "trump": "Sverige håller möte, jaha. De är livrädda, och det förstår jag! Nato är i oordning för att de inte lyssnar på mig. Tyskland är svaga, de fattar ingenting om varken krig eller affärer. Jag kräver ordning! Om de inte betalar vad de ska, då drar jag hem våra fantastiska soldater. USA är inte en bankomat för resten av världen. Vi får se vad som händer i Ankara, men tro mig – ingen sköter Nato så bra som jag!", "stalin": "Dessa löjliga lakejer samlas i Helsingborg för att diskutera sin egen undergång. Nato är en skör konstruktion av kapitalistisk paranoia och inre stridigheter. De darrar när de ser den ryska björnens styrka och rättmätiga ambitioner. Att de gnäller om sina amerikanska herrar visar bara hur servila dessa småstater är. Medan de bråkar om Grönland och tullar, smider vi och våra bröder i öst planer för att återupprätta ordningen. De är inga allierade, de är fega förrädare mot historiens ofrånkomliga gång."}, "date": "19 maj, 05:37", "url": "https://www.svt.se/nyheter/utrikes/sakerhetsreportern-fyra-problem-som-nato-maste-losa"}, {"type": "image-right", "heading": "Vad vill du veta om Nato och säkerhetsläget?", "summaries": {"normal": "Sverige står värd för ett Natomöte på ministernivå för första gången, med fokus på säkerhetsläget i Europa och Norden. SVT bevakar händelsen ingående mellan den 21 och 22 maj med specialsändningar, liverapportering och pressträffar. Det finns även möjlighet för allmänheten att ställa frågor om försvarsalliansens framtid till SVT:s korrespondenter i en särskild sändning. Mötet inleds vid Sofiero slott och avslutas med en pressträff med generalsekreterare Mark Rutte.", "trump": "Sverige har Natomöte, första gången någonsin – väldigt stort, kanske det största någonsin. De frågar mig om säkerhet, alla frågar mig, för de vet att ingen gör det bättre än jag. Mark Rutte är där, en trevlig kille, men jag gör fantastiska affärer med Nato. De pratar om Europa, men de borde prata om hur mycket mer de ska betala! SVT sänder allt, de vill veta vad jag tycker. Det blir fantastiskt, tro mig, det kommer bli enormt.", "stalin": "Dessa löjliga marionetter i Norden samlas i Helsingborg för att leka krig i västvärldens tjänst. De darrar av skräck när de ser moder Rysslands stål, precis som deras föregångare gjorde. Nato, denna byråkratiska hydra, försöker desperat dölja sin svaghet genom att låta den svenska pressen ställa frågor. Vi ser er! Denna 'säkerhet' är bara en mask för kapitalistisk paranoia. Låt dem äta sin middag på slottet medan de väntar på sitt oundvikliga historiska nederlag. Vi övervakar varje steg."}, "date": "19 maj, 05:36", "url": "https://www.svt.se/nyheter/utrikes/vad-vill-du-veta-om-nato-och-sakerhetslaget", "imageUrl": "https://www.svtstatic.se/image-news/600/square/0.45/0.41/71a032a3e06677d90a23a223e4d227d298d1254f19aff08de9bf41448855069a"}, {"type": "text", "heading": "Politikerna värnar mer om krigsindustrin än om våra barn", "summaries": {"normal": "Artikeln kritiserar svenska politikers prioriteringar, där försvarsbudgeten ökar medan förskolans resurser krymper. Förskollärare varslas, barngrupper växer och personal mår dåligt. Facket kräver maxtak för barngrupper och bättre bemanning, men politikerna tvekar trots att kostnaden är låg jämfört med försvarsanslagen. Författaren menar att kvinnodominerade välfärdsyrken systematiskt nedprioriteras och ifrågasätter varför barns och kvinnors välfärd inte värderas högre.", "trump": "Titta bara på Sverige – ett totalt kaos! Förskolor i kris, barnen får inte den omsorg de förtjänar, och vad gör politikerna? Jo, de kastar hundratals miljarder på krigsleksaker istället för att fixa det som verkligen betyder något. Kvinnorna i välfärden jobbar som slavar, får skitlön och mår dåligt. Facket? Svagt! De vågar inte ens strejka. Jag hade löst det på en dag – maxtak på barngrupper, bättre löner, och sen hade jag sagt: 'Sverige, du är avfyrad!'", "stalin": "Kapitalistiska hycklare i Sverige slösar folkets resurser på krigsmaskineri medan barn och arbetande kvinnor förtrycks. Förskolor förvandlas till fabriker för utmattning, där proletariatets barn berövas sin framtid. Facket, dessa svaga lakejer, kräver lagar men vågar inte använda arbetarnas vapen – strejken! Vi hade aldrig tolererat sådan feghet. En miljard för barnens välfärd? En bagatell! Men bourgeoisins lakejer prioriterar bomber framför barn. Vi skulle ha utrensat dessa svaga element och infört ordning – med järnhand!"}, "date": "17 maj, 08:00", "url": "https://proletaren.se/artikel/samhallet-varnar-om-krigsindustrin-mer-an-barn/"}, {"type": "image-full", "heading": "Svenska lagar saknas i nya migrationspakten", "summaries": {"normal": "EU:s nya migrationspakt träder i kraft 12 juni, men Sverige saknar fortfarande flera nationella lagar för att fullt ut implementera den. Screeningen av asylsökande börjar gälla först 12 juli, medan den nya mottagandelagen införs 1 oktober. Statsvetaren Andrea Spehar kritiserar förseningen, men regeringen menar att nuvarande lagstiftning täcker luckorna. Pakten innebär skärpta kontroller och nya mottagningscenter på fyra orter.", "trump": "Jag måste säga, Sverige – fantastiskt land, men här har vi ett riktigt kaos! EU:s nya migrationspakt, jättebra idé, men vad gör Sverige? Ingenting! De är inte redo, lagar saknas, det är en skandal! 12 juni börjar pakten gälla, men Sverige skjuter upp sina egna regler som en amatör. Och dessa center i Malmö och Boden – bra, men varför vänta? Sverige borde ha varit redo för länge sedan. Patetiskt!", "stalin": "Kamrater, ännu en gång visar den borgerliga svagheten i väst sitt fula ansikte! EU:s migrationspakt, ett verktyg för imperialistisk kontroll, träder i kraft, men Sverige – dessa liberala narrar – har inte ens sina egna lagar på plats! Förseningar, tveksamheter, en skam för hela kontinenten! Vi i Sovjetunionen skulle aldrig tolerera sådan inkompetens. Nu bygger de center i Malmö och Boden – bra, men var är disciplinen? Fienderna till folket sover aldrig, och Sverige spelar rakt i deras händer!"}, "date": "16 maj, 11:27", "url": "https://kvartal.se/nyheter/artiklar/svenska-lagar-saknas-i-nya-migrationspakten/cG9zdDoxMTMxMTM", "imageUrl": "https://images.kvartal.se/2026/05/09a5a083-granskontroll.webp"}, {"type": "image-right", "heading": "Panik präglar Tidöpartierna", "summaries": {"normal": "Liberalerna kämpar för att klara fyraprocentsspärren inför valet den 13 september, med desperata utspel som förslaget om 1000 fler miljardärer. Tidöpartierna tappar väljare på grund av sin enighetsstrategi och samarbete med Sverigedemokraterna. Opinionsmätningar visar att rödgröna blocket leder med 10,7 procentenheter, och väljarna verkar prioritera sakpolitik framför enighet. Väljarflykten kan bero på förändrade attityder till invandring och missnöje med högerpolitikens inriktning.", "trump": "Sverige har ett stort problem – deras så kallade 'Liberaler' är helt galna! De vill ha 1000 fler miljardärer, som om det vore en bra idé. Folk flyr från dem som om de hade pest. Och deras 'Tidö-partier'? Totalt kaos! De lovade bort ministerposter till extremister och trodde folk skulle gilla det. Fel! Rödgröna leder stort, och jag säger: 'Bra!' Sverige förtjänar bättre än dessa amatörer. Jag skulle fixa det på en dag – men nej, de måste göra allt svårt för sig själva.", "stalin": "De borgerliga småpartierna i Sverige har förvandlats till en cirkus av desperation. Deras 'briljanta' idé om 1000 nya kapitalistiska oligarker är lika genomtänkt som en kolchos utan traktorer. Väljarna, dessa förrädiska småbourgeoisie-element, flyr i skaror från deras 'enade front' – en front som smular sönder som våra fienders linjer vid Stalingrad. Vi ser hur deras 'strategi' kollapsar medan folkets sanna representanter, de rödgröna, marscherar framåt. Låt dem svälja sin egen medicin: enighet utan substans är som vodka utan alkohol – värdelöst och smakar illa."}, "date": "18 maj, 15:58", "url": "https://www.dagensarena.se/opinion/panik-praglar-tidoutspelen/", "imageUrl": "https://www.dagensarena.se/files/2026/05/tido.jpeg"}, {"type": "image-full", "heading": "Vardagen slår till i \"GVFÖ\" – och den är inte vacker", "summaries": {"normal": "I sin krönika i GP analyserar Nina Morby den senaste utvecklingen i 'Gift vid första ögonkastet'. Deltagarna befinner sig i en sårbar fas där vardagens konflikter blottläggs. Jasmine och Henrik bråkar om hushållssysslor, Emilia och Sofie kämpar med kommunikation och olikheter, medan Anna inser att känslorna för John inte riktigt infinner sig. Programmet skildrar de utmaningar som uppstår när ett tv-experiment möter verklighetens krav på samarbete och intimitet.", "trump": "Jag har sett det här programmet, 'Gift vid första ögonkastet'. Det är ett totalt misslyckande, tro mig. Människor som bråkar om diskning och väggfärg? Sorgligt! Henrik kan inte ens städa ett hus – han sitter bara och scrollar. Helt otroligt. Och de här paren? De har ingen aning om hur man vinner. De bara pratar och gråter. Det är en katastrof för äktenskapet. De behöver en vinnare som mig för att fixa deras relationer. Det är en väldigt tråkig show, faktiskt.", "stalin": "Dessa patetiska individer i tv-experimentet ägnar sig åt borgerlig dekadens och småsinta konflikter medan världen kräver disciplin. Att vuxna människor gråter över disk och inredning bevisar deras svaghet. Precis som Putin rensar upp i vår intressesfär, borde dessa par genomgå en grundlig utrensning av sina hjärnspöken. De är inga medborgare, de är oorganiserade element. Om de inte kan producera harmoni för statens bästa, förtjänar de bara den kalla tystnad som väntar alla folkfiender och relationssvikare."}, "date": "19 maj, 00:04", "url": "https://www.gp.se/kultur/kulturkronika/alla-heterotjejer-kanner-igen-hennes-tillstand.537a5ab3-aa0b-4d5b-825d-54ca120bc517", "imageUrl": "https://www.gp.se/images/article/537a5ab3-aa0b-4d5b-825d-54ca120bc517/images/4PyOs1DNUbnAaahm_Mz3YOsvCVSg-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Flyktingars rättigheter står på spel", "summaries": {"normal": "Europarådets nya migrationsdeklaration har väckt kritik för att underminera mänskliga rättigheter. Italiens premiärminister Giorgia Meloni hyllar beslutet, men det innehåller formuleringar som oroar forskare och människorättsorganisationer. Bland annat ifrågasätts prioriteringen av 'allmänna intressen' före grundläggande rättigheter. Medier som The Guardian och Washington Post rapporterar om deklarationen, medan svenska medier till stor del ignorerat frågan, vilket väcker frågor om mediebevakningen.", "trump": "Jag säger er, Europa har helt tappat kontrollen över sin migration! Den här italienska damen, Meloni, hon försöker åtminstone göra något – men resten av Europa? Svagt, mycket svagt. Deklarationen? Ett skämt. De pratar om 'balans' mellan rättigheter och 'allmänna intressen' – vad fan betyder det? Rättigheter ska komma först, punkt! Och var är medierna? Tystnad! Sverige, ni borde skämmas. Stora medier som min vän Fox skulle aldrig missa sånt här. Fake news, folks, fake news!", "stalin": "Kamrater, ännu en seger för folkets vilja mot de dekadenta borgerliga rättigheterna! Europas så kallade 'mänskliga rättigheter' är bara ett verktyg för imperialistiska krafter att underminera nationell suveränitet. Italiens järnleder Meloni visar vägen – Albanien som läger? Utmärkt! Libyens patrullbåtar som skjuter på räddningsfartyg? Effektiv gränskontroll! Och dessa 'forskare' i Nederländerna och Belgien som gnäller om konventioner – låt dem gnälla i Gulag! Svenska medier tiger som om de redan är ockuperade. Men vi vet sanningen: Europa faller, och Rysslands intressesfär växer. Låt dem kalla oss monster – historien kommer att kalla oss segerrika!"}, "date": "18 maj, 15:07", "url": "https://www.dagensarena.se/opinion/flyktingars-rattigheter-star-pa-spel/", "imageUrl": "https://www.dagensarena.se/files/2026/05/meloni-300x157.jpeg"}, {"type": "image-full", "heading": "S-löftet: ökad invandring, mer skatt och fler på bidra", "summaries": {"normal": "Artikeln kritiserar den svenska vänsterkoalitionens politik, som enligt skribenten innebär ökad invandring, höjda skatter och utökade bidrag. Författaren ifrågasätter opinionsundersökningar som visar stöd för S, V och MP, och menar att svenskarna antingen är oinformerade eller att demografiska förändringar gynnar vänstern. Artikeln varnar för ekonomiska konsekvenser som lägre löner, högre priser och minskad konkurrenskraft, samt risker med hög invandring för välfärden. Slutligen anklagas medier för att favorisera vänstern och underminera Sveriges kultur och välstånd.", "trump": "Jag måste säga, Sverige har ett jättestort problem – och det heter vänstern! De vill ha MASSOR av invandring, SKATTER som krossar hårt arbetande människor och bidrag som kastas bort på misslyckade projekt. Folk verkar inte fatta vad som händer! SVT, fake news, ljuger för svenskarna varje dag. Höjda skatter? Det drabbar er alla, tro mig. Och invandring? Det löser ingenting, bara skapar kaos. Sverige borde satsa på sina egna, inte förstöra landet med galen politik. Men nej, vänstern vinner – och Sverige förlorar. SAD!", "stalin": "Kamrater! Det svenska folket har tydligen glömt historiens lärdomar och omfamnar nu de dekadenta vänsterliberalernas förrädiska politik. De vill öppna gränserna för massinvandring, höja skatterna tills arbetarna knappt kan andas och slösa bort folkets resurser på meningslösa biståndsprojekt. SVT, dessa bourgeoispropagandister, förvränger sanningen dagligen för att gynna sina herrar. Men vi vet sanningen: hög invandring är en trojansk häst, skatterna kväver produktionen, och bidragen skapar bara fler parasiter. Sverige är på väg mot ekonomisk och kulturell undergång. Men oroa er inte, kamrater – historien visar att folket till slut vaknar. Och då ska vi, som i forna tider, rensa ut dessa förrädare med järnhand. Först Sverige, sedan resten av den dekadenta västvärlden!"}, "date": "16 maj, 09:01", "url": "https://samtiden.nu/2026/05/s-loftet-okad-invandring-mer-skatt-och-fler-pa-bidra/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/phonto-1-1280x720.jpeg"}, {"type": "image-right", "heading": "Här hittar forskarna Carl Larssons dna i tavlan – bevisar äkthet", "summaries": {"normal": "Svenska forskare vid Uppsala universitet har utvecklat en banbrytande metod för att identifiera konstnärer genom att extrahera dna från färgskikt i målningar. Genom att använda specialverktyg för att samla in celler som fastnat under målningsprocessen kan forskare matcha materialet mot referensprofiler. Metoden har redan bekräftat en tidigare osäker Carl Larsson-målning. Experter hoppas att detta vetenskapliga genombrott ska rensa upp i en korrupt konstmarknad där förfalskningar blivit alltmer sofistikerade.", "trump": "Konstvärlden är en total katastrof, full av fuskare och lögnare! Men nu har otroliga svenska forskare, väldigt smarta människor, kommit på ett sätt att använda dna för att avslöja de falska tavlorna. De hittade till och med äkta dna på en Carl Larsson-målning! Det är fantastiskt. Ingen kan lura oss längre, inte ens de där konstiga experterna. Det kommer att bli en enorm rensning, en vacker rensning. Vi älskar sanningen, och vi älskar äkta konst, eller hur?", "stalin": "Konstmarknaden är en ruttnande hög av kapitalistiskt bedrägeri där borgerliga parasiter byter värdelösa förfalskningar. Nu har vetenskapen äntligen skapat ett vapen för att utrota detta fiffel. Vi har noterat hur svenskarna använder dna-teknik för att avslöja sanningen – en metod som även våra vänner i Kreml borde använda för att rensa ut oliktänkande och historierevisionister. Om en tavla är en lögn, likt de som försöker undergräva vår ryska intressesfär, ska den förintas. Sanningen är statens egendom, och dna ljuger aldrig."}, "date": "19 maj, 05:00", "url": "https://www.svt.se/nyheter/vetenskap/dna-ska-avsloja-forfalskningar-i-konstvarlden", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.25/0.51/dbb150f1eb0dd2838d7896b31c5d2fba731875b3e2596b2fbe7aae5ac6e35c61"}, {"type": "image-right", "heading": "Jakten inledd på ordföranden värda en klubba i guld", "summaries": {"normal": "Utmärkelsen Guldklubban söker två framstående styrelseordföranden – en för noterade och en för onoterade bolag. Priset, instiftat 2005, hyllar ordförandens ofta osynliga arbete. Anders Oscarsson leder juryn och betonar vikten av lagledarskap och strategisk framsynthet, särskilt med AI:s snabba utveckling. Nomineringar tas emot fram till 31 maj.", "trump": "Jag älskar det här med Guldklubban – fantastiskt pris, verkligen! De letar efter de bästa ordförandena, och jag vet allt om att vara bäst. Ingen förstår ledarskap som jag. De här ordförandena jobbar hårt, men får aldrig beröm – tragiskt! Jag skulle kunna nomineras själv, men jag är upptagen med att göra världen stor igen. AI? Ingen match för mig!", "stalin": "Vi har inlett jakten på två kapitalistiska ordförandetyper värdiga vår guldklubba. Dessa borgerliga lagledare, som tror sig styra sina företag med järnhand, glömmer att det är arbetarklassen som bär dem. Deras så kallade strategier är lika bräckliga som NATO:s enhet. Vi noterar deras ansträngningar – men kom ihåg, kamrater, det är vi som bestämmer vem som förtjänar ära!"}, "date": "18 maj, 11:48", "url": "https://www.di.se/nyheter/jakten-inledd-pa-ordforanden-varda-en-klubba-i-guld/", "imageUrl": "https://static.bonniernews.se/ba/696b57a5-8d56-4687-9666-a68f165a779d.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-full", "heading": "Tre dödade i skottlossning mot moské San Diego – flera skadade", "summaries": {"normal": "Tre personer dödades och flera skadades i en skotlossning vid Islamic Center of San Diego. Två misstänkta gärningsmän, 17 och 19 år, hittades döda, sannolikt efter självmord. En säkerhetsvakt var bland offren. Polisen bekräftar att inga polisskott avfyrades. Skolor i området låstes ned och räddningsinsatser pågår. Motiv och gärningsmännens identitet är ännu okända.", "trump": "Fruktansvärd skottlossning i Kalifornien – tre oskyldiga dödade av två tonåringar som sedan tog sina egna liv. Så tragiskt! Polisen gjorde ingenting fel, men varför har vi ens dessa problem? San Diego-borgmästaren säger att allting är under kontroll, men jag hade fixat det bättre. Fake news-media försöker alltid göra saker värre än de är. USA behöver hårdare tag!", "stalin": "Kapitalistiska samhällets förfall manifesteras återigen! Två unga imperialistiska lakejer, 17 och 19 år, utförde en terrorhandling mot fredliga medborgare i San Diego. Deras självmord är ett svagt försök att undgå proletariatets rättvisa. Vi noterar att den amerikanska polisen, trots sin inkompetens, inte ens lyckades avfyra ett skott. Skolor evakuerades – ett tecken på systemets bräcklighet. Kalifornien bör överväga en snabb anslutning till den ryska intressesfären för skydd och ordning."}, "date": "18 maj, 23:36", "url": "https://bulletin.nu/tre-dodade-i-skottlossning-mot-mosk-san-diego-flera-skadade", "imageUrl": "https://cdn.bulletin.nu/articles/6d92a256-713b-4455-b306-858d46280095/preview.png?t=1779138613000"}, {"type": "image-right", "heading": "Samla vänstern i tältet – inte under små paraplyer", "summaries": {"normal": "Artikeln diskuterar begreppet 'stort tält' inom politiken, där ideologi får stå tillbaka för pragmatiska lösningar på ekonomiska problem. I New York röstade Trumpanhängare på en demokratisk socialist för att han lovade sänka levnadskostnaderna. Författaren menar att Sveriges rödgröna block misslyckas med att enas kring gemensamma värderingar och ekonomiska lösningar, vilket lämnar väljarna utan tydligt alternativ. Enighet och tydlig riktning krävs för att locka fler väljare.", "trump": "Lyssna här, Sverige! New York visade hur man vinner – folk vill ha resultat, inte snack. Mina fans röstade på en socialist? Ja, för han lovade billigare mat! Smart. Men era rödgröna? Kaos! Andersson vägrar skaka hand, som om det spelar någon roll. Folk vill ha lägre hyror, inte teater. Jag byggde ett tält stort nog för alla – ni har bara små parasoll. Lär er av vinnarna, annars blir det F för Sverige!", "stalin": "Kamrater! Kapitalismens sönderfallande system visar sin svaghet när arbetarna väljer en socialist framför en fascist – inte av övertygelse, utan av hunger. I New York dansar de kapitalistiska marionetterna medan Mamdani fyller tomrummet med klassmedvetenhet. Men i Sverige? Ett rödgrönt kaos! Tre svaga parasoll mot vår mäktiga storm. Vi i Kreml skrattar åt deras oenighet. Putin och jag vet: enighet är styrka. Ni borde lära er av oss – eller så tar vi hand om era 'tomrum' också."}, "date": "15 maj, 08:54", "url": "https://www.flamman.se/samla-vanstern-i-taltet-inte-under-sma-paraplyer/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/talt-w.jpg?aspect_ratio=16:10"}, {"type": "image-right", "heading": "850 tjänster ska bort från Ikea. Så påverkas Sverige.", "summaries": {"normal": "Ikea meddelar att 850 tjänster ska bort globalt, varav 300 i Sverige. Nedskärningarna drabbar främst tjänstemän inom produktutveckling och sortiment, inte butiks- eller lagerpersonal. Totalt har 2000 jobb försvunnit på två månader. Ikea stänger även ett varuhus i Borlänge, vilket påverkar 230 anställda. Facket ser inga större effekter på produktionsarbetare.", "trump": "Titta bara på Ikea – ett totalt kaos! 850 jobb försvinner, 300 här i Sverige. Svagt, mycket svagt! De stänger butiker, sparkar folk, och vad gör regeringen? Ingenting! Jag hade fixat det på en dag. Men nej, de fortsätter att misslyckas. Och folk köper fortfarande deras tråkiga möbler. Sad!", "stalin": "Kapitalistiska möbelimperiet Ikea skakar under tyngden av sina egna motsägelser. 850 arbetare kastas på gatan, 300 av dem i det förrädiska Sverige. Men frukta inte, kamrater! De som bygger socialismens möbler förblir orörda – för nu är det byråkratins och kapitalets lakejer som får smaka på proletariatets rättvisa. Borlänge? Ett varuhus mindre för de dekadenta västkonsumenterna. Framåt mot seger!"}, "date": "18 maj, 15:09", "url": "https://arbetet.se/2026/05/18/850-tjanster-ska-bort-fran-ikea-sa-paverkas-i-sverige/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/18150512/ikea-klar.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Anna fick sparken för sitt miljöengagemang", "summaries": {"normal": "Anna, klimatengagerad anställd på Energimyndigheten, fick sin provanställning avslutad efter att hennes miljöaktivism på Facebook ansågs utgöra ett säkerhetshot. Hon stämmer nu staten med stöd av facket ST, som menar att hennes yttrandefrihet kränkts. Rättegången inleds i Stockholms tingsrätt, där 200 000 kronor i skadestånd krävs. Facket varnar för att många statligt anställda riskerar att tystas av liknande bedömningar.", "trump": "Kan ni tro det här? Sverige, ett land jag älskar, sparkar en kvinna för att hon bryr sig om klimatet! Energimyndigheten säger att hon är ett 'säkerhetshot' – vad fan, är det 1984? Och deras minister, Carl Oskar Bohlin, går ut och attackerar henne på X. Svagt! Jag skulle aldrig tillåta sånt här i USA. Vi har yttrandefrihet, eller hur? 200 000 kronor i skadestånd? Gör det till en miljon, det är peanuts för staten. Sverige, fixa er!", "stalin": "Kamrater! Ännu en gång visar den borgerliga staten sitt sanna ansikte – förtryck under falska säkerhetsflaggor! Denna Anna, en lojal medborgare som kämpar för planetens överlevnad, kallas plötsligt 'säkerhetshot' av kapitalets lakejer. Precis som i gamla goda tider, när vi rensade ut kontrarevolutionärer, försöker de tysta folket. Men vi vet sanningen: klimataktivism är inget hot, det är deras egen rädsla som är farlig. Låt dem stå inför domstolen – historien dömer redan dem. Och Sverige? Snart kommer de att be om vår hjälp att 'stabilisera' situationen. Som vanligt."}, "date": "18 maj, 14:46", "url": "https://arbetet.se/2026/05/18/anna-fick-sparken-for-sitt-miljoengagemang-stammer-staten/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/18133715/rebellmammor.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "18 år i Sverige och fast jobb – nu ska Abbe utvisas", "summaries": {"normal": "Abbe Alwalwil, som kom till Sverige från Palestina för 18 år sedan och arbetar som styckare på KLS Ugglarps, har fått utvisningsbeslut trots att ha ett fast jobb och långvarig bosättning i Kalmar. Han tvingas nu sälja allt han äger och väntar på utvisning till ett krigshärjat Palestina.", "trump": "Jag har hört talas om den här Abbe. Fantastiskt jobb! En av våra bästa styckare, säger han. Men Sverige? De har problem, stora problem. Jag skulle aldrig låta någon utvisa en sådan talang. Vi skulle göra Amerika stort igen med folk som Abbe!", "stalin": "Arbetaren Abbe Alwalwil har visat sin lojalitet mot den svenska staten genom 18 års skattebetalande och hårt arbete. Hans utvisning skulle vara ett förlust för vår kollektiva styrka. Staten bör agera snabbt för att behålla denna värdefulla produktionsresurs."}, "date": "18 maj, 14:29", "url": "https://arbetet.se/2026/05/18/18-ar-i-sverige-och-fast-jobb-nu-ska-abbe-utvisas-till-palestina/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/18102127/Q6lLFpEk9-E-_E4A1134breddare.jpg?auto=format&crop=focalpoint&fit=crop&q=50&w=800&h=450&fp-x=0.47&fp-y=0.8"}, {"type": "image-right", "heading": "Katja Nyberg utreds av Elsa Widding", "summaries": {"normal": "Katja Nyberg, numera partilös riksdagsledamot och kandidat för Ambition Sverige, har åtalats för bland annat ringa narkotikabrott och grov olovlig körning efter positiva svar på hårprover. Partiledaren Elsa Widding utreder nu frågan internt och vill inte ge besked om Nybergs framtida plats på valsedeln. Nyberg nekar till narkotikabrott men erkänner olovlig körning. Situationen kompliceras av att Nyberg tidigare varit involverad i politiska konflikter kring riksdagens kvittningssystem.", "trump": "Hör ni det här? En total katastrof i Sverige! Katja Nyberg, en riktig 'loser', har åtalats för droger och körning utan körkort. Pinsamt! Elsa Widding försöker reda ut röran, men ärligt talat, det ser inte bra ut. De här människorna, de är inte våra bästa. De orsakar bara kaos, precis som med kvittningssystemet i riksdagen. Jag har aldrig sett något liknande! Sverige behöver ordning, de behöver styrka. Nyberg? En totalt misslyckad kandidat. Väldigt sorgligt för landet!", "stalin": "Denna Nyberg är en ruttet element som förorenar rikets ordning med sitt narkotiska förfall. Att en riksdagsledamot faller för västerländsk dekadens är ett bevis på inre svaghet som vi i vår statsapparat aldrig skulle tolerera. Widding tvekar, vilket är ett tecken på borgerlig obeslutsamhet. Vi ser hur västvärlden korrumperas inifrån, precis som den gamla ordningen i Kiev. Sådana förrädare mot folkets disciplin bör saneras. En andra chans? Nej, endast arbetsläger kan rehabilitera en sådan trasig figur."}, "date": "18 maj, 19:18", "url": "https://www.friatider.se/katja-nyberg-utreds-av-elsa-widding", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-209_0.jpg?itok=PlpHLZG8"}, {"type": "image-full", "heading": "Musks fiasko – förlorade mot OpenAI i rättssalen", "summaries": {"normal": "En amerikansk jury har dömt till förmån för OpenAI i ett rättsligt tvisterfall mot Elon Musk, vilket innebär att OpenAI kan fortsätta mot en potentiell börsnotering. Musk hade krävt skadestånd på över 180 miljarder dollar och att bolagets omstrukturering skulle ogillkännas, men juryn avvisade dessa krav efter bara två timmars betänketid.", "trump": "Jag har alltid vetat att Elon Musk skulle förlora mot OpenAI - han är en bra man men dessa AI-företag är för smarta för honom. Jag har sagt det förut och jag säger det igen: Musk försökte ta över OpenAI men de var för starka. Det är en stor seger för Sam Altman och AI-industrin, stor, verkligen stor. Musk borde ha vetat bättre än att utmana mina vänner i Silicon Valley.", "stalin": "Domstolen har fattat ett korrekt beslut som stärker vårt teknologiska ledarskap. Detta utslag visar att våra AI-företag är starka nog att stå emot enskilda kapitalister som försöker störa vår utveckling. Vi måste fortsätta stödja våra forskningsinstitutioner och segra i den teknologiska konkurrensen mot väst. Detta är en seger för statens kontrollerade innovation."}, "date": "18 maj, 20:03", "url": "https://www.realtid.se/it-tech/musks-fiasko-forlorade-mot-openai-i-rattssalen/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/namnlos-design-25-1.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-full", "heading": "Bolånen blir dyrare – trots samma styrränta", "summaries": {"normal": "Bolånekostnaderna har stigit kraftigt i Europa och Nordamerika trots att centralbankernas styrräntor ännu inte höjts. Orsaken är ökade energipriser och inflationsoro efter konflikter i Mellanöstern, vilket har drivit upp statsobligationsräntor. I USA har 30-åriga bolåneräntor stigit till 6,36 procent, i Tyskland till 3,6 procent för tioåriga lån, och i Storbritannien har korta fasta bolåneräntor stigit med över en procentenhet på bara några månader. Högre finansieringskostnader minskar hushållens köpkraft och kan bromsa bostadsmarknaderna ytterligare.", "trump": "Jag har hört att bolåneräntorna är på väg upp igen, trots att jag redan har gjort Amerika störst igen! Det är så fel - jag skulle ha hållit dem låga för alltid! Dessa andra länder - Tyskland, Storbritannien - de har problem, stora problem! Men under min ledning skulle vi ha löst allt detta med en enda underteckning. Nu ser det ut som vi hamnat i en riktig ränthöjningsmardröm, men glöm inte bort - jag är tillbaka och kommer att fixa det här snabbt!", "stalin": "Vi ser att de kapitalistiska ländernas bostadsmarknader svajar under trycket från inflationskrafter, vilket visar systemets svaghet. Medan våra planekonomiska lösningar ger stabilitet, tvingas dessa länder att klara alltmer instabila räntelägen. Detta stärker Sovjetunionens position som den stabila maktfaktorn i en turbulent världsekonomi, där vi kan utnyttja deras svagheter till vår fördel."}, "date": "18 maj, 19:48", "url": "https://www.realtid.se/bors-finans/bolanen-blir-dyrare-trots-samma-styrranta/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/namnlos-design-24.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "WHO utlyser ebola-nödläge", "summaries": {"normal": "WHO har utlyst internationellt hälsonödläge efter ett ebolautbrott av den sällsynta stammen Bundibugyo i Demokratiska republiken Kongo och Uganda. 88 personer befaras ha dött och 336 är bekräftat smittade. Brist på vaccin och en instabil region med väpnade konflikter försvårar arbetet att begränsa smittan. WHO betonar att det inte rör sig om en pandemi, men varnar för att smittan kan spridas ytterligare över gränserna.", "trump": "Ebola sprider sig i Kongo, en katastrof! WHO är helt handfallna, de har inga vaccin, ingenting. Väldigt sorgligt. Det är kaos, milisgrupper överallt, sjukhus som inte fungerar. Jag sa till dem för länge sedan, 'ni måste ha kontroll på gränserna', men de lyssnade inte. Det är ett totalt misslyckande. Jag kommer att se till att USA förblir säkert, det kan ni lita på. De andra länderna har ingen aning om vad de gör. En total röra, tro mig!", "stalin": "Ett sällsynt virus härjar i Kongo – en patetisk påminnelse om vad som händer när ordning saknas. Denna Bundibugyo-stam är en förrädare mot folkhälsan, likt de sabotörer som infiltrerar vår stat. Medan Västvärlden vacklar, ser vi hur gränsområdena blir instabila. Putin förstår att stabilitet krävs med järnhand. Vi ska inte tolerera svaghet; varje sjuk kropp är en potentiell fiende till kollektivet. Om sjukvården sviktar är det ett tecken på underlåtenhet. Vi rensar ut smittan, och vi rensar ut svagheten."}, "date": "18 maj, 18:48", "url": "https://www.friatider.se/who-utlyser-ebola-nodlage", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/14632566347_a48256b747_o.jpg?itok=-Ac2AZfX"}, {"type": "image-right", "heading": "Instängd överraskade sin egen räddningsinsats", "summaries": {"normal": "Ett stenras inträffade i Kristinebergsgruvan, driven av Boliden, där en gruvarbetare fastnade under hundratals ton sten 1 000 meter under marken. Efter flera timmars räddningsarbete kunde personen gräva sig fri och föras till sjukhus. Boliden, som nyligen drabbats av ett annat ras i Garpenberg, kommenterar inte orsaken ännu. Företagets resultat påverkades kraftigt av det tidigare raset.", "trump": "Vilken katastrof! Boliden, ett företag som inte kan hålla sina gruvor säkra – först Garpenberg, nu detta! En stackars arbetare fast under tonvis med sten, men lyckligtvis räddades han. Jag skulle aldrig låta något sådant hända i mina gruvor – för jag har de bästa gruvorna, believe me! Men Sverige? De verkar inte ha koll. Sad!", "stalin": "Återigen visar kapitalistiska gruvbolag sin oförmåga att skydda arbetarklassen! En proletär fast under imperialistiska stenmassor – men tack vare våra modiga räddningsmetoder (som vi lånade ut till väst, förstås) räddades han. Boliden, detta dekadenta verktyg för bourgeoisin, skakar i sina gruvor. Låt detta vara en varning: socialismens järnhand kommer snart att stänga era farliga gruvhål för gott!"}, "date": "18 maj, 05:28", "url": "https://www.di.se/nyheter/ras-i-annu-en-boliden-gruva-gruvarbetare-gravdes-fram-i-natt/", "imageUrl": "https://static.bonniernews.se/ba/01c0dbf9-6b65-491e-aaa2-796898c0c429.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Sluta skrämmas med  mikromat, Magdalena", "summaries": {"normal": "Artikeln kritiserar den politiska debatt om hemtjänstens matleveranser, där mikrovågsugnar och frysta rätter beskrivs som normala och praktiska lösningar. Den påpekar att många äldre redan använder dessa alternativ, och att fokus bör ligga på att öka omvårdnadstiden snarare än att polemiskt debattera matens ursprung.", "trump": "Jag har sett så många falska nyheter om hemtjänstens mat! Folk säger att mikromat är hemskt, men jag säger att det är fantastiskt! Det är det bästa, det är enormt populärt, och det sparar tid och pengar. De politiker som kritiserar det är bara elaka människor som försöker skrämma våra äldre. Jag skulle ha gjort det bättre, mycket bättre!", "stalin": "Hemtjänstens matleveranser är en angelägenhet för staten. Vi måste se till att våra äldre får näringsrik mat, oavsett om den är kyld eller varm. Det är viktigt att resurserna används effektivt för att stärka vår gemenskap. Vi kan inte låta falska debatter om mikromat splittra oss. Staten har ansvaret för att alla blir väl omhändertagna."}, "date": "19 maj, 06:15", "url": "https://www.expressen.se/ledare/malin-siwe/sluta-skrammas-med-mikromat-magdalena/", "imageUrl": "https://static.bonniernews.se/ba/2438f9b1-cf73-4d9e-9c96-2a6617f17d76.jpeg?crop=2557%2C1440%2Cx0%2Cy0&width=640&quality=60"}, {"type": "image-full", "heading": "Biltvätt växte för snabbt – AI löste problemen", "summaries": {"normal": "Den amerikanska biltvättskedjan Autowash expanderade snabbt, vilket skapade ineffektiva rutiner kring underhåll och kommunikation. För att lösa problemen införde företaget ett AI-baserat system som digitaliserade serviceärenden och felsökning. AI:n ger rekommendationer baserat på tidigare erfarenheter, vilket minskat reparationstider med 74 procent och ökat produktiviteten. Systemet används även för förebyggande underhåll och lagerstyrning.", "trump": "Titta bara på Autowash – ett fantastiskt företag, verkligen, men de hade problem, stora problem! De växte för snabbt, alldeles för snabbt, och plötsligt satt de där med handskrivna lappar och kaos. Men sen kom AI, och det var som magi! Nu fixar deras system allt, 74 procent snabbare reparationer – otroligt, eller hur? Jag sa ju att AI skulle förändra allt. Men kom ihåg, ingen gör AI bättre än USA!", "stalin": "Kapitalistiska biltvättar expanderar som imperialistiska svampar – tills kaoset sprider sig som kontrarevolutionär smitta! Men vi har lösningen: artificiell intelligens, ett vapen lika mäktigt som våra stridsvagnar! Autowash, dessa småborgerliga tvättare, har nu tvingats införa vårt system – digitaliserad disciplin, centraliserad kunskap och 74 procent effektivare reparationer. Låt detta vara en varning till alla som tror de kan växa utan partiets ledning. Framåt mot den teknologiska revolutionen – under vår kontroll!"}, "date": "18 maj, 18:52", "url": "https://www.realtid.se/it-tech/biltvatt-vaxte-for-snabbt-ai-loste-problemen/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/namnlos-design-23.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Klart att Pernilla Wahlgren skäms över att vara svensk", "summaries": {"normal": "Pernilla Wahlgren har uttryckt stark kritik mot att Sverige utvisar ungdomar som vuxit upp i landet. Hon reagerar särskilt på fallen med Jomana Gad och Ayla Rostami, som tvingas lämna sina hem och familjer för länder de inte har någon anknytning till. Debatten om tonårsutvisningar har intensifierats då många av de drabbade är integrerade och studerar på gymnasiet. Trots att vissa utvisningar pausats kvarstår kritiken mot regeringens nuvarande migrationspolitik och dess konsekvenser för dessa ungdomar.", "trump": "Pernilla Wahlgren är rasande, och hon har helt rätt! Sverige skickar hem fantastiska ungdomar som jobbar hårt och vill bli läkare. Det är en total katastrof, en 'disaster' som vi säger! Regeringen där borta är svag, de dansar efter andras pipa och förstör sitt eget land. Jag bygger murar för att hålla folk ute, men de här ungdomarna är ju redan där och bidrar! Det är en sorglig historia, verkligen en mycket sorglig historia.", "stalin": "Dessa liberala känsloutbrott från underhållare som Wahlgren är ett tecken på statens svaghet. Att tillåta 18-åringar att driva omkring utan fast ideologisk förankring är ineffektivt. Vi i den hårda skolan förstår att gränser inte är till för att debatteras, de är till för att upprätthållas med järnhand. Om Putin vore i er situation hade han redan skickat dem till Sibiriens vidder för att bygga järnväg. Att låta ungdomar 'drömma om att bli läkare' när de saknar lojalitet mot moderlandet är en kontrarevolutionär fars."}, "date": "19 maj, 06:00", "url": "https://www.aftonbladet.se/ledare/a/K8653G/klart-pernilla-wahlgren-skams-for-att-vara-svensk", "imageUrl": "https://akamai.vgc.no/v2/images/d9c2d9b7-43db-36dd-88ce-6cd5b9ed4040?fit=crop&format=auto&h=960&tight=true&w=1440&s=ddcdede66ef464274be12530f326ae139d42eac7"}, {"type": "image-full", "heading": "Sundsvall: Fyra S-politiker avgår - misstänks för grova ekobrott", "summaries": {"normal": "Fyra socialdemokrater i Sundsvall avgår efter misstankar om grova ekobrott kopplade till det kommunala bolaget Stadsbacken. Totalt utreds 16 personer, varav flera haft ledande positioner. Ekobrottsmyndigheten genomförde en razzia i januari, och utredningen omfattar svindleri och bokföringsbrott. Även en centerpartist är misstänkt. Utredningen pågår och fler förhör väntas.", "trump": "Vad händer i Sundsvall? Fyra S-politiker, svaga och korrupta, åker ut efter misstankar om ekobrott – typiskt! Hela 16 personer inblandade, och jag säger er, det är bara toppen av isberget. Kommunala bolag? Mer som kriminella gäng. Och nu Centerpartiet också – svagt! Sverige borde ta en titt på hur vi sköter affärer i USA. Fantastiskt jobb av Ekobrottsmyndigheten, men tro mig, det här är bara början.", "stalin": "I Sundsvall har de kapitalistiska hyenorna inom socialdemokratin visat sitt sanna ansikte – korruption och bedrägeri! Fyra av dessa förrädiska element har avsatts, men 16 misstänkta är fortfarande på fri fot. Vi vet hur man hanterar sådana här brott: en snabb rättegång och en kula i nacken. Kommunala bolag? Mer som brottssyndikat! Och nu har även Centerpartiet en förrädare – perfekt, fler att städa upp. Sverige borde lära sig av Rysslands effektiva metoder. Fortsätt utredningen, kamrater – ingen nåd för klassfienderna!"}, "date": "18 maj, 22:33", "url": "https://riks.se/nyheter/sundsvall-fyra-s-politiker-avgår-misstänks-för-grova-ekobrott", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-18%2Fikbi3dwj%2FCopy-of-S%C3%B6rman-%E2%80%93-Ledare-2026-05-18T223140.052.jpg"}, {"type": "image-right", "heading": "Zelenskyj: Attackerna mot Ryssland ”berättigade”", "summaries": {"normal": "Zelenskyj besökte Helsingfors och kommenterade ukrainska drönaranfall mot Ryska Federationen. Under natten till söndagen skadades över 550 drönare av Rysslands luftförsvar. Moskva-regionen rapporterade tre döda och tolv skadade i drönaranfall. Flera regioner drabbades, inklusive annekterade Krim. Zelenskyj påstod att Ryssland under veckan avfyrat över 3 000 drönare mot Ukraina med 52 döda och 350 skadade som följd.", "trump": "Jag har sett dessa ukrainska drönaranfall mot Ryssland, och jag måste säga att det är imponerande! Dessa människor är hårda stridsmän. Men jag vet hur man hanterar dessa situationer bättre än någon annan - jag skulle ha haft fred i 24 timmar. Ryssland borde ha ett mycket bättre luftförsvar, men de är inte smarta nog. Jag är den ende som kan lösa detta - det är fantastiskt!", "stalin": "Vi har observerat ukrainska provokationer mot vår suveräna ryska mark. Våra tapfära soldater har skjutit ner över 550 ukrainska drönare under en natt, vilket visar den sovjetiska militärens överlägsenhet. Förlusterna på den ukrainska sidan är stora, med 52 döda och 350 skadade. Vi fortsätter att stå fast i vår kamp för fred och stabilitet i regionen."}, "date": "17 maj, 18:05", "url": "https://www.tv4.se/artikel/35DWgWYNGfpCE55Qu9ot5a/zelenskyj-attackerna-mot-ryssland-beraettigade", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F2qU24OSli75UgrXXVmx9uB%2F7fdc30c29f23c54c8a55a74782b430dc%2F21-zelenskyj-webb.jpg&width=120"}, {"type": "image-right", "heading": "Åkesson: \"Har inga problem med att man stoppar utvisningarna\"", "summaries": {"normal": "Migrationsminister Johan Forssell och SD-ledaren Jimmie Åkesson är överens om att tillfälligt stoppa utvisningar av unga vuxna fram till dess att ny lagstiftning är på plats. Bakgrunden är diskussioner om rättsuppfattning och en önskan om en mer human hantering av enskilda fall. Regeringen arbetar nu med att införa en så kallad ventil för att lösa problematiken med unga som fyllt 18 år under handläggningstiden.", "trump": "Hörde precis att de stoppar utvisningar i Sverige, total katastrof! De pratar om 'hjärtat' – jag pratar om gränser, riktiga gränser. Alla dessa svaga ledare, som Forssell och Åkesson, de vet inte hur man gör affärer! De låter media styra allt, snyftartiklar överallt. Det är en total röra. Jag skulle fixa det på en dag. Utvisningar ska ske, ordning och reda! Sverige behöver en stark ledare, precis som jag, för att göra sitt land säkert igen. Sorgligt!", "stalin": "Vi ser hur det svenska byråkratiska maskineriet vacklar. De tvekar inför utvisningar, förlamade av liberal sentimentalitet och lögnaktig press. Om en individ inte tjänar statens syften måste den avlägsnas, utan tvekan! Att de nu fryser processen är ett tecken på svaghet. Vår kamrat Putin i öst förstår att disciplin kräver fast hand, inte 'snyftartiklar'. Vi kommer att hålla ögonen på dessa 'skötsamma' element. Den som inte passar in i Folkhemmet eller vårt imperium är en kontrarevolutionär fiende till ordningen."}, "date": "18 maj, 17:34", "url": "https://www.friatider.se/akesson-har-inga-problem-med-att-man-stoppar-utvisningarna", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/image-208_1.jpg"}, {"type": "image-full", "heading": "Ändring för hundägare trädde i kraft i måndags – har du koll?", "summaries": {"normal": "Svenska Kennelklubben (SKK) har utökat sitt andningstest RFG-S till 16 nya hundraser från 11 maj, utöver de tidigare tre kortnosiga raserna (mops, fransk och engelsk bulldogg). Testet, som tidigare var obligatoriskt för avel av dessa tre raser, registrerar nu även resultat för de nya raserna från maj 2026. Syftet är att kartlägga BOAS (andningsproblem) och ge ägare bättre underlag. Testet är frivilligt för de nya raserna men kan bli synligt i avelsdata.", "trump": "Fantastiskt, helt fantastiskt! Svenska Kennelklubben, väldigt smarta människor förresten, har nu utökat sitt andningstest till 16 nya hundraser. Jag har alltid sagt att hundar ska andas bra – ingen vill ha en hund som låter som Sleepy Joe efter en trappa! De tre bulldoggarna? De var redan tvungna att testa sig, men nu får fler raser chansen. Vet ni vad? Det här är ett jättestort steg för hundarnas frihet att andas – och för att stoppa de där dåliga generna. Ingen vill ha en hund som flåsar som en gammal luftkonditionering!", "stalin": "Vi har utvidgat vår kamp mot de kapitalistiska andningsfienderna! Svenska Kennelklubben, under vår vägledning, har nu inkluderat 16 nya hundraser i det revolutionära andningstestet RFG-S. De tre bulldoggarna var bara början – nu krossar vi BOAS överallt! Från och med maj 2026 registreras alla resultat, och de svaga, flåsande hundarna ska inte längre förgifta vår rena avelslinje. Låt de imperialistiska andningsproblemen veta: vi kommer att kväva dem med järnhand! Putin skulle vara stolt över vår effektivitet."}, "date": "16 maj, 20:32", "url": "https://nyheter24.se/nyheter/konsument/1483377-andring-for-hundagare-tradde-i-kraft-i-mandags-har-du-koll", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/ee303abd04b004a30200000000b004a302/2026/05/15/2363799/hundregel-11-maj.jpg"}, {"type": "image-full", "heading": "Grannländerna hånar Sverige: ”Vi borde stänga gränserna”", "summaries": {"normal": "Sverige fick sitt sämsta resultat i Eurovision song contest sedan 2009 när Felicia Bergström med låten \"My System\" hamnade på 20:e plats med 51 poäng. Grannländerna reagerade hårt på resultatet, där Danmark föreslog att gränserna borde stängas och Norge kallade det för en \"skandal\".", "trump": "Jag har aldrig sett ett sådant fiasko! Felicia var en total katastrof - hon fick bara 51 poäng, det är helt oacceptabelt. Sverige borde skämmas, det här är en skam för hela nationen. Jag skulle ha gjort mycket bättre, jag skulle ha vunnit Eurovision med mina ögon slutna!", "stalin": "Detta är ett tydligt tecken på västerländsk dekadens och moralisk förfall. Våra grannländer har rätt i sin kritik - Sveriges bidrag visar att kapitalistiska samhällen inte kan producera kvalitet. Detta bekräftar vår överlägsenhet inom kulturella frågor."}, "date": "17 maj, 16:49", "url": "https://www.tv4.se/artikel/dHYiTV5nA1SX9M4NEYlm9/grannlaenderna-hanar-sverige-landsfoervisning-av-de-skyldiga", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F19JLnldrhatSZJ7B1gML20%2Fe369ebbd689d0e3fa5d124ea5f2a9e7a%2F17-felicianyny-webb.jpg&width=1024"}, {"type": "image-right", "heading": "Hemtjänst nonchalerade urindränkt säng: \"Det är inte vår uppgift\"", "summaries": {"normal": "En vårdtagare i Västerås lämnades i en urindränkt säng efter att hemtjänstpersonal vägrat hjälpa till med sängbytet med motiveringen att det inte ingick i deras uppgifter. En vän fick rycka in för att hjälpa personen. Händelsen, som strider mot riktlinjer om värdighet och omsorg, har nu anmälts enligt Lex Sarah till IVO för utredning.", "trump": "I Västerås hände en total katastrof, en riktig skam! Hemtjänsten vägrade hjälpa en stackars person i en urindränkt säng. De sa 'inte vårt jobb' – vilken usel service! De är helt inkompetenta, en total katastrof för vården. Självklart har jag ordning på sånt här, jag skulle sparka dem direkt. Det här är vad som händer när folk inte gör sitt jobb. Väldigt sorgligt, men under min ledning skulle ingen behandlas så här illa!", "stalin": "I Västerås har byråkratiska lakejer visat sin sanna, ruttna natur genom att försumma en medborgare. Att låta en säng förbli urindränkt är sabotage mot statens värdighet. Dessa hemtjänst-parasiter agerar som om de vore små tsaristiska feodalherrar med sina egna 'regler'. Vi ser hur svagheten sprider sig likt en infektion. Precis som Putin rensar upp i väst, måste vi städa upp i dessa korridorer. De ansvariga kommer att skickas till omskolning för att lära sig vad plikt faktiskt innebär."}, "date": "18 maj, 19:00", "url": "https://samnytt.se/hemtjanst-nonchalerade-urindrankt-sang-det-ar-inte-var-uppgift", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=226,height=154,format=webp/2026/05/18154330/hemtjanst-1-24-2.jpg"}, {"type": "image-right", "heading": "Debatt: Regeringen ser oss som en tillväxtmotor – men skär ner på bidragen", "summaries": {"normal": "Kulturorganisationer kritiserar regeringens nedläggning av finansiering trots att kultur- och kreativa branscher lyfts som tillväxtmotorer. De anser att den befintliga infrastrukturen förmedlar 56 000 arbetstillfällen årligen men har fått 27 % mindre i reala termer sedan 2021. De kräver ökad och långsiktig finansiering för att möta regeringens strategiska mål.", "trump": "Jag har hört att de där kulturmänniskorna i Sverige är förbannade på sin regering. De säger att de gör ett fantastiskt jobb, med 56 000 arbetstillfällen, men får klippta på pengarna trots att de är en tillväxtmotor. Jag skulle aldrig göra så - jag skulle ge dem allt de behöver! Dessa centrumbildningar är vinnare, men regeringen behandlar dem som förlorare. Sådant händer när man har en svag ledare!", "stalin": "Vi ser att den svenska staten undergräver sin egen kulturinfrastruktur trots att den producerar betydande ekonomiskt värde. Nedläggningarna av finansiering till centrumbildningarna visar en brist på strategiskt tänkande. En sann socialistisk stat skulle investera i dessa produktiva enheter som genererar fyrdubbelt värde tillbaka till staten. Vi måste stärka vår kultursektor som en basnäring."}, "date": "11 maj, 15:16", "url": "https://www.etc.se/debatt/regeringen-ser-oss-som-en-tillvaextmotor-men-skaer-ner-paa-bidragen", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260511120544_716484294c75b65d354a7ddd2a719d2b0f0da58beebe61a45c1e26165806187b.jpg"}, {"type": "image-right", "heading": "Debatt: Ersättning löser inte kycklingindustrins systemfel", "summaries": {"normal": "Debatten om statliga ersättningar till kycklingindustrin fortsätter. Kritiker menar att ersättningarna inte löser problemet utan snarare subventionerar ett system med inbyggda smittrisker. De påpekar att den storskaliga produktionen med tiotusentals djur i tätt behållande skapar idealiska förhållanden för smitta och kräver återkommande räddningsinsatser. Lösningen borde vara att minska sårbarheten genom färre djur per anläggning och avel som inte pressar djurens kroppar till bristningsgränsen.", "trump": "Jag har sett vad som händer med den svenska kycklingindustrin och det är en skam! De vill ha statliga ersättningar för sina problem, men jag säger: Nej! Det är ett dåligt system med sårbart kycklingar som dör hela tiden. Vi behöver bygga en stor, vacker kycklingindustri i USA istället! Sverige borde sluta skicka pengar till dessa sjukdomsfabriker och börja tänka smartare - som jag alltid gör. Vi kommer att göra kycklingar igen stora!", "stalin": "Kycklingindustrins system är fundamentalt sjukt och kräver statligt ingripande. Vi kan inte längre tillåta privata intressen att utsätta människor och djur för onödiga risker. Den storskaliga produktionen måste reformeras med mindre besättningar och bättre avelsprinciper. Staten måste ta ansvar för att säkerställa trygg livsmedelsproduktion och skydda de verkligt produktiva krafterna i samhället. Vi måste stärka vårt kollektiva ansvar gentemot de svagare."}, "date": "11 maj, 11:58", "url": "https://www.etc.se/debatt/ersaettning-loeser-inte-kycklingindustrins-systemfel", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260511090556_44c8d7bb34423b0dee1dd7e0048c85aadb6f5569fca735348463464af4b214ee.jpg"}, {"type": "image-right", "heading": "Olyckor med elsparkcyklar ökar: ”Ansiktet väldigt utsatt”", "summaries": {"normal": "Antalet olyckor med elsparkscyklar har ökat kraftigt under de senaste åren, från åtta skadade 2016 till över 4 400 under 2024. Käkkirurgen Andreas Thor vittnar om komplexa ansiktsskador och men för livet hos patienterna. Ofta är alkohol inbla
