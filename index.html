 från alla, men vi? Vi bygger om världen – MAGA-style! Och Lenin? Snälla, han kunde inte ens hålla ett land ihop. Sad!", "stalin": "Kamrater! Denna artikel bekräftar vad vi alltid vetat: de kapitalistiska hyenorna i väst suger blodet ur världens folk för att föda sina dekadenta imperier. USA och dess lakejer i NATO är inget annat än en samling blodtörstiga monopolkapitalister, som med sina sanktioner och bomber mördar miljontals oskyldiga. Men deras tid är förbi! Vi, det socialistiska blocket, står enade mot dessa imperialistiska rovdjur. Låt dem vråla – historiens dom är redan skriven. För varje barn de dödar, växer revolutionens eld. Framåt, mot seger!"}, "date": "1 maj, 08:00", "url": "https://proletaren.se/artikel/ingen-kapitalism-utan-imperialism/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/Airborne_and_Special_Forces_Uday-Qusay_raid_2003-e1777534974667-768x431.jpg"}, {"type": "image-full", "heading": "Motorvägen som byggdes av misstag", "summaries": {"normal": "En 6 kilometer lång motorvägssträcka på E45 mellan Segmon och Slottsbron i Värmland byggdes på 1990-talet med överblivna pengar från ett inställt projekt. Invigd 1995 efter ett telefonsamtal till riksdagsledamoten Kjell Ericsson, har den underlättat trafiken vid korsningen med E18. Trots planer har ingen mer motorväg tillkommit på 31 år. Nu föreslås en mötesfri väg på ytterligare 6 km i infrastrukturplanen 2026–2037.", "trump": "Vilken totalt vansinnig historia! De svenska byråkraterna slösar pengar på en ynka 6 kilometers motorväg av misstag – och sen ingenting på 30 år! Jag hade byggt hela E45 från Göteborg till Karesuando på en vecka, med guldkanter och vägtullar som ger miljarder. Typiskt europeiska losers, gasar igång och bromsar som idioter. Patetiskt!", "stalin": "Kamrater, se på dessa svenska kapitalisters patetiska motorvägsfiasko! Ett misstag på 6 kilometer E45 mellan Segmon och Slottsbron, invigt 1995 med överblivna slantar – och sen stillastående i 31 år! I vårt kollektiv hade vi rensat ut byråkraterna och byggt hela vägen med folkets svett på en femårsplan. Borgarbrackorna bromsar trafiken som parasiter! Nu lovar de ynka 6 km till – hån mot arbetarna!"}, "date": "5 maj, 14:37", "url": "https://www.dagensps.se/motor/motorvagen-som-byggdes-av-misstag/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdlma2mnff10ii-nh.jpg?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-right", "heading": "Klokt att inrätta ett svenskt MI6. Behövs för att möta komplex hotbild", "summaries": {"normal": "Sverige inrättar den 1 januari en ny civil utrikes underrättelsetjänst, UND, efter brittisk MI6-modell med inspiration från Nederländerna och Estland. Regeringen går vidare med Carl Bildts förslag trots kritik från Försvarsmakten om resursflytt från Must. Tjänsten byggs upp gradvis och samarbetar nära med Säpo, FRA och Must mot komplexa hot.", "trump": "Sverige, ert nya MI6, UND, från nyår – briljant drag! Hoten är galna, tekniska, biologiska, politiska, allt! Regeringen kör över de gnälliga militärerna i Must, som inte klarade dubbla jobb. Carl Bildts förslag är perfekt, bygg stort, samarbeta med Säpo och FRA. Ni gör Amerika stolta, fortsätt så!", "stalin": "Kamrater i Sverige! Vi inrättar UND den 1 januari som hammare mot imperialistiska vilddjurens biologiska och tekniska giftblandningar! Musts generaler, de borgerliga paddorna i uniform, rensas ur med resurserna – deras dubbla svek avslöjat av Bildts rapport! Bygg efter MI6 men under partiets järngrepp, gradvis likvidering av överlapp. Vaksamhet, ej rädsla!"}, "date": "5 maj, 11:56", "url": "https://www.di.se/ledare/klokt-att-inratta-ett-svenskt-mi6/", "imageUrl": "https://static.bonniernews.se/gcs/di-dise/flamingo/profilbilder/henrik_westman.png?crop=96:304&auto=webp&width=96&quality=100"}, {"type": "image-full", "heading": "AI kan gömma svenska militären i framtiden", "summaries": {"normal": "FOI-forskare i Sverige använder AI för att utveckla stealth-material som absorberar radarvågor och gör militärfordon osynliga. Maskininlärning snabbar upp designen tusenfaldigt och skapar oväntade mönster. Tillämpningar inkluderar kamouflage och metallegeringar. USA:s Pentagon tecknar avtal med stora AI-bolag som OpenAI och Google för militär AI, men utesluter Anthropic på grund av juridisk tvist.", "trump": "Sverige använder AI för att gömma sin militär – inte illa, men vi i USA gör det enormt mycket bättre! Pentagon har avtal med vinnarna: Amazon, Google, Microsoft, Nvidia, OpenAI – de bästa! Anthropic? Totala losers som nekar oss vapen och övervakning, nu får de sitta utanför. Min armé blir AI-styrka nummer ett, tro mig!", "stalin": "Kamrater i Totalförsvaret! Dessa svenska radarparasiter gömmer sin armé med AI-bedrägerier, men jag genomskådar deras millimeterstjärnor som kontrarevolutionära fällor. Vi, arbetarklassen, ersätter borgarnas manuella slöseri med surrogatmodeller som krossar utfallrummet! I USA likviderar Pentagon Anthropic-svinen rättvist – bra, men vår proletära AI ska rensa himlen från alla imperialistiska spionmönster."}, "date": "5 maj, 15:19", "url": "https://www.realtid.se/bors-finans/makro/ai-kan-dolja-svenska-militaren-i-framtiden/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/stridsfordon.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Widding om Åkesson: ”Han ljuger så det ryker ur öronen”", "summaries": {"normal": "Elsa Widding, politisk vilde och före detta SD-ledamot, röstade nej till Tidö-regeringens förslag om skärpta medborgarskapskrav. Jimmie Åkesson antydde i SVT att hon mutats av Miljöpartiet. I Aftonbladet förnekar Widding mutor, beskriver SD:s påtryckningar mot henne och kort kontakt med MP. Hon motiverade nej med rättssäkerhet och vittnar om hat och hot efter Åkessons uttalande.", "trump": "Vilken cirkus! Den här Widding är en total väderkuk som sviker sitt eget gäng för de gröna galningarna i MP. Åkesson är smart, han pekar ut mutorna direkt – perfekt! De ringer och tigger henne, skickar till och med en tjej för att övertala. Fake news från oppositionen, men hatdrevet exploderar. Starka ledare som Åkesson vinner alltid, tro mig!", "stalin": "Kamrater, denna Widding-råttan, en vild borgerlig orm från SD:s stinkande lya, vågar rösta emot folkets linje i medborgarskapsfrågan! Åkesson, den giftiga räven med ljugmun, skriker mutor från MP-brackorna – men vi ser genom er fascistiska komplott! SD:s övertalningshorder ringde som hyenor, medan vi rensar ut era förrädare med järnhand. Hatet ni sår skördar era egna huvuden, era parasiter!"}, "date": "5 maj, 14:35", "url": "https://bulletin.nu/widding-om-akesson-han-ljuger-sa-det-ryker-ur-oronen", "imageUrl": "https://cdn.bulletin.nu/articles/b102ca78-f516-49c4-bf02-8ccaef7a6dc5/preview.jpg?t=1777983183000"}, {"type": "image-full", "heading": "Hjortronbrist i butik", "summaries": {"normal": "Det råder brist på hjortron och hjortronsylt i svenska butiker. Orsaken är en kombination av dåligt veder och brist på bärplockare, främst på grund av regeländringar som gör det svårare att anlita utländsk arbetskraft. Skörden kan påverkas ytterligare av kyla i år, vilket kan leda till brist även på andra bär.", "trump": "Jag har hört att det är en stor, enorm brist på hjortronsylt i Sverige. Ett enormt problem! Det är varmt, det är kallt, ingen vet vad som händer. Vi måste fixa detta, det är en katastrof! Jag skulle ha löst detta på två sekunder, det är så enkelt. Sverige behöver bättre ledare, verkligen.", "stalin": "Detta är en klar demonstration av hur kapitalistiska marknader sviker. Bristen på hjortron och arbetskraft är ett resultat av individers egoistiska intressen. Staten måste gripa in för att säkerställa jämlik fördelning av resurser och arbetskraft. Vi måste stärka våra kollektiva ansträngningar för att undvika sådana brister i framtiden."}, "date": "5 maj, 14:35", "url": "https://www.gp.se/nyheter/sverige/brist-pa-hjortronsylt-i-butikerna.679ec7c5-77f2-4442-842c-6ee0a0af295d", "imageUrl": "https://www.gp.se/images/article/679ec7c5-77f2-4442-842c-6ee0a0af295d/images/2dQ1rIMIsKsdwBlBUFNEZiabihR4-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Här är regeringens och SD:s bokslut över Tidöavtalet: \"Stolta men inte nöjda\"", "summaries": {"normal": "Regeringen och Sverigedemokraterna har presenterat ett bokslut för Tidöavtalet. De lyfter fram framgångar inom områden som sänkt invandring, minskat gängvåld och förbättrad ekonomi. Statsminister Ulf Kristersson uttrycker stolthet men betonar att mer arbete återstår. Jimmie Åkesson menar att löftena till väljarna har infriats. Inför valet siktar koalitionen på fortsatt samarbete, där Sverigedemokraterna nu deklarerat att de avser att ingå i regeringen med ministerposter om de vinner valet.", "trump": "Jag såg precis de svenska ledarna presentera sitt resultat, och låt mig säga er: de gör ett fantastiskt jobb! De har fixat invandringen, fixat ekonomin och krossat gängvåldet. Det är enorma framgångar, sådana siffror som ingen trodde var möjliga. Kristersson är en stark kille, precis som jag. De tidigare ledarna var totala katastrofer, de gjorde ingenting! Nu siktar de på att göra Sverige stort igen. Ett vinnande lag, och jag gillar vinnare. Väldigt bra gjort, Sverige!", "stalin": "Vi har granskat de svenska borgerliga elementens rapport. De skryter om reformer och stabilitet, men vi vet att detta bara är ett tillfälligt försvarsverk mot historiens oundvikliga gång. De påstår att de städat upp – vi ser det snarare som att de försöker imitera vår ordningsamma disciplin. Liksom vår kamrat Putin i öst förstår de att en stat utan järnhand bara är kaos. Men låt dem inte förblindas av sin 'blågula' framgång; de är blott brickor i ett spel som snart kommer att kräva en ännu striktare utrensning av folkförrädarna."}, "date": "5 maj, 14:31", "url": "https://samnytt.se/har-ar-regeringens-och-sds-bokslut-over-tidoavtalet", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/05122942/tido-riksdagen.jpg"}, {"type": "image-full", "heading": "Experten: Föräldrarnas sparmiss kan kosta barnen dyrt", "summaries": {"normal": "Privatekonomiska experten Marianna Hunt varnar för att föräldrars ovilja att investera pengar på börsen, till förmån för sparkonton, förs över till barnen och skadar deras framtida ekonomi. Exempelvis skulle en person som flyttade sparandet till konto efter it-kraschen ha 477 000 kronor 2026, medan en som stannade kvar på börsen nått 1,9 miljoner. Sparkonton ger trygghet men missar avkastning och drabbas av inflation. Föräldrar bör prata mer om pengar och risk.", "trump": "Vilka losers dessa föräldrar är som gömmer pengarna på sparkontot! Titta på John, den stackaren, slutade med ynka 477 000 kronor. Jane, smart som jag, stannade på börsen och boom – 1,9 miljoner! Barnen lär sig av era dumheter, inte era predikningar. Sluta vara fega, investera som vinnare gör. Jag har byggt imperier sånt här sätt – fantastiskt!", "stalin": "Kamrater, dessa borgarföräldrar med sina fega sparkonton är en skam för arbetarklassen! De förgiftar ungdomen med rädsla för börsens revolutionära krafter. John, den likbleke kapitalistfladdrare, hamnade på 477 000 – medan Jane, den trogne, samlade 1,9 miljoner genom järnvilja. Vi måste rensa ut denna paralyserande försiktighet, likvidera sparkontonas gift och fostra nästa generation till seger över inflationens fiender!"}, "date": "5 maj, 14:28", "url": "https://www.dagensps.se/privatekonomi/experten-foraldrarnas-sparmiss-kan-kosta-barnen-dyrt/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/kopia-av-kopia-42.png?aspect_ratio=2%3A1&width=1200&quality=75"}, {"type": "image-right", "heading": "Löfbergs om klimathotet mot kaffet. Hållbarhetschefen: ”Är en affärskritisk överlevnadsfråga.”", "summaries": {"normal": "Kajsa-Lisa Ljudén, hållbarhetschef på Löfbergs, betonar att klimatförändringar är en affärskritisk överlevnadsfråga för kaffeodlingar. Extremväder som torka, frost och översvämningar slår hårt mot odlarna. Företaget satsar på klimatanpassning genom certifieringar, regenerativt jordbruk och agroforestry, där träd skyddar mot erosion och torka. Pilotprojekt i Brasilien visar lovande resultat. Utan åtgärder riskerar utbud och kvalitet att minska till 2050.", "trump": "Klimatförändringarna slår ut kaffeodlingarna – frost i Brasilien, evig torka, totalt kaos! Löfbergs svenskar inser det nu och planterar träd för att rädda skiten. Smart drag, men det blir dyrare kaffe ändå, priserna exploderar. Jag har varnat för sånt här länge, mina affärer fixar det bäst. De borde ringa mig, vi gör America great med bästa kaffet!", "stalin": "Klimatförändringarna, dessa sabotager av imperialistiska borgarbrackor och väderkontrarevolutionärer, hotar kaffeodlingen som en dolk mot arbetarklassens strupe! Löfbergs kapitalister piper upp sig med trädplantering mot torkmonstren. Jag befaller: vi i partiet likviderar riskerna genom storskalig agroforestry i femårsplaner! De 25 miljonerna kaffeslavar ska marschera mot seger, medan fienderna fryser i frostens fängelse!"}, "date": "5 maj, 11:43", "url": "https://www.di.se/nyheter/lofbergs-klimatforandringarna-ar-en-affarskritisk-overlevnadsfraga/", "imageUrl": "https://static.bonniernews.se/ba/ae8bbda1-a085-4e99-b552-108ac29c74aa.jpeg?crop=270:152&auto=webp&width=270&quality=70"}, {"type": "image-right", "heading": "Falu Rödfärgs politiskt korrekta midsommar väcker avsky", "summaries": {"normal": "Falu Rödfärg har släppt en reklamfilm inför midsommar som hyllar det moderna Sverige genom mångfald, hiphop och HBTQ-representation. Videon, som innehåller inslag som afrikansk dans och ett samkönat par, har väckt starka och blandade reaktioner i sociala medier. Medan företaget betonar att de vill visa hur Sverige berikas av olika traditioner och människor, har innehållet kritiserats av vissa användare som upplever det som en avvikelse från traditionellt svenskt midsommarfirande.", "trump": "Falu Rödfärg gör ett enormt misstag! De har släppt en midsommarvideo som är en total katastrof. Det är inte svenskt, tro mig. De försöker ändra på allt! Det är så kallat PK-nonsens. Istället för riktig tradition ser vi hiphop och helt fel saker. Människor är arga, och med rätta! De kallar det berikning, jag kallar det en total förlust för kulturen. De borde lyssna på folket istället för att försöka vara så extremt politiskt korrekta. Väldigt sorgligt, faktiskt!", "stalin": "Vi har observerat hur det svenska företaget Falu Rödfärg försöker korrumpera folkets hjärtan med sin dekadenta propaganda. De ersätter den ädla traditionen med en svag och kosmopolitisk soppa av hiphop och moraliskt förfall. Sådana avvikelser från den sunda folklinjen är tecken på en stat i fritt fall. Likt Putin som rensar ut västliga influenser, måste folket se dessa agitatorer för vad de är: sabotörer av den nationella enigheten. Vi betraktar detta som ett misslyckat ideologiskt experiment som förtjänar hård kritik."}, "date": "5 maj, 13:25", "url": "https://www.friatider.se/falu-rodfargs-politiskt-korrekta-midsommar-vacker-avsky", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/image-133_1.jpg"}, {"type": "image-right", "heading": "Därför dröjer företag med klimatanpassning", "summaries": {"normal": "Företag dröjer med klimatanpassning trots klimatkrisens verklighet i Europa. Experter på IVL Svenska Miljöinstitutet, Hugo Settergren och Tanja Hasselmark Mason, pekar på kunskapsbrist som huvudorsak – inte brist på pengar eller vilja. Fastighetsbranschen vaknar, men industrier i städer behöver agera. Kommuner som Norrköping leder vägen genom tvärsektoriellt samarbete med näringslivet.", "trump": "Dessa europeiska företag, de är så långsamma med klimatet, totalt hopplösa! De har massor av pengar och vilja, men ingen kunskap – patetiskt. Väntar på kommunerna som ska visa vägen, som i Norrköping. I USA fixar vi det själva, STÖRRE och SNABBARE. Klimatkrisen? Vi vinner alltid!", "stalin": "Dessa fuktiga borgarbrackor i näringslivet, de hasar sig med klimatanpassningen som rädda råttor i översvämningszonen! Kunskap saknas? Nej, det är klassfiendtanken som paralyserar dem. Vi i partiet skulle rensa ut dessa klimatparasiter med proletär järnhand. Norrköping, kamrater, ert tvärsektoriella samarbete krossar kapitalistklimatet – framåt mot total seger!"}, "date": "5 maj, 11:24", "url": "https://www.di.se/nyheter/expert-darfor-drojer-foretag-med-klimatanpassning/", "imageUrl": "https://static.bonniernews.se/ba/ea184654-e484-441a-b8ab-c23550b2d9ad.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Åkesson hade rätt – kvinnor är fortfarande vita mäns slavar", "summaries": {"normal": "Sonja Åkessons dikter, som skildrar kvinnors liv under 1960–70-talen, ges ut på nytt i en samlingsvolym. Artikeln reflekterar över hur Åkessons kritik av kvinnors underordning fortfarande är relevant, med exempel på strukturell ojämlikhet och våld mot kvinnor i dagens samhälle. Författaren finner tröst och igenkänning i Åkessons verk, särskilt inför klimakteriet, och hyllar hennes humor och självironi.", "trump": "Jag läste om den här gamla svenska poeten, Sonja Åkesson – inte direkt en vinnare, dog vid 51, tragiskt! Men hennes dikter om kvinnor som slavar? Fake news! Kvinnor i Sverige har det fantastiskt, bättre än någonsin! Men nej, de jämrar sig om löner och hemarbete. Och nu påstår de att män i Europa är monster? Lögn! Jag känner massor av bra män. Men visst, chips på balkongen och klaga på klimakteriet – typiskt! Sverige borde fokusera på att bli stort igen, inte på gammal poesi.", "stalin": "Kamrater! Den borgerliga poeten Sonja Åkesson avslöjade sanningen: kvinnor är slavar under kapitalets vita män. Och vad har ändrats? Ingenting! Våra fiender i väst fortsätter utnyttja kvinnor som hemslavar, sexslavar och lönearbetare. I Tyskland och Frankrike organiserar sig borgarklassens män i chattgrupper för att förtrycka sina kvinnor – ett nytt slags fascism! Men vi ska krossa dessa dekadenta element! Sonja Åkessons ord är vapen. Revolutionen fortsätter – även i klimakteriet!"}, "date": "5 maj, 07:16", "url": "https://arbetet.se/2026/05/05/sonja-akesson-hade-ratt-kvinnor-ar-fortfarande-vita-mans-slavar/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/05070534/akesson-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Så trollar Tidögänget bort hemlösa. Regeringen och SD visste vilka som riskerade att falla igenom systemet.", "summaries": {"normal": "Artikeln kritiserar skärpta folkbokföringsregler som drabbat hemlösa, som Lena, genom att avregistrera dem som 'försvunna'. Detta försvårar deras kontakt med myndigheter och vård. Trots att konsekvenserna var kända inför lagändringen, genomfördes den. Samtidigt ökar hemlösheten och vräkningarna i Sverige. Ebba Busch menar att ökade inkomstklyftor är acceptabla om de fattigaste får det bättre, men artikeln ifrågasätter regeringens agerande när utsatta grupper aktivt missgynnas.", "trump": "Lyssna här, Sverige! Ni har ett STORT problem. Era politiker, svaga som alltid, skärper regler som straffar de hemlösa – de som redan har det tufft! Och Ebba Busch? Hon säger att rika kan bli rikare, så länge de fattiga också får lite. Men vad händer? Jo, folk ramlar mellan stolarna, barn blir hemlösa, och ingen gör något! Jag skulle fixa det på en dag. Men nej, Sverige fortsätter med sina katastrofala beslut. SAD!", "stalin": "Kamrater! Se hur den borgerliga regeringen i Sverige, med sina dekadenta liberala idéer, straffar de arbetande massorna! De hemlösa, dessa offer för kapitalets grymhet, avregistreras som 'försvunna' – ett brott mot folket! Och vad säger deras ledare? 'Det är okej att rika blir rikare!' Medan barn vräks och familjer krossas, fortsätter dessa hycklare att tala om 'ordning'. Vi i Sovjet skulle aldrig tolerera sådan förtryck! Låt oss visa dem hur man hanterar klassfiender – med järnhand!"}, "date": "5 maj, 06:56", "url": "https://arbetet.se/2026/05/05/sa-trollar-tidoganget-bort-hemlosa/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/05065247/hemlosa-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "Varnar USA – efter Trumps löfte", "summaries": {"normal": "Iran varnar USA efter Trumps löfte om att skydda sjöfart i Hormuzsundet. Generalsmajor Ali Abdollahi uppger att sundets säkerhet kontrolleras av Irans styrkor och att intrång kommer att angripas. Iran ser USA:s inblandning som brott mot vapenvilan. Trump lovar hjälpa fartyg från hela världen säkert genom den oljeimportviktiga leden.", "trump": "Dessa patetiska ayatolla-loser i Iran skriker om Hormuzsundet igen, hotar med attacker som om de äger världen! Men jag fixar fri passage åt alla fartyg, bigly! De bryter vapenvilan själva med sin blockad. America leder, Iran gråter – total vinst för oss!", "stalin": "De amerikanska imperialismens hyenor sniffar kring Hormuzsundet, men Irans kämpar vaktar rättmätigt passagen! Jag ser provokationen: Trumps fluffiga löften maskerar aggressivt intrång. Brott mot vapenstillståndet! Vi, arbetarklassen, fördömer dessa spindelvarianter – snart rensas de ut med järnhand."}, "date": "4 maj, 14:49", "url": "https://www.tv4.se/artikel/tt-260504-iranhormuz1-0b2e1b86/iran-varnar-usa-for-inblandning-i-hormuzsundet", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F6SrGz3Yrb4wCzk0dqDZxaQ%2Fbe265de4c61c94c83f1d4538dc25e761%2Ftrump_hormuz.png&width=1024"}, {"type": "image-right", "heading": "Rapport: Drastisk minskning av personer som får livränta", "summaries": {"normal": "Försäkringskassans nya siffror visar att antalet personer som får livränta för fysiska sjukdomar minskat med 84% sedan 1999, till 14 700 år 2025. Minskningen beror på förbättrad fysisk arbetsmiljö och lagändringar. Samtidigt ökar antalet som får ersättning för psykisk ohälsa, särskilt bland kvinnor. Män dominerar fortfarande inom livränta, främst inom bygg och transport, medan kvinnor oftare arbetar inom omsorg.", "trump": "Fantastiska nyheter, folkens! Sverige har lyckats minska antalet livräntor för fysiska skador med hela 84% – otroligt, helt otroligt! Men lyssna på det här: psykisk ohälsa ökar, särskilt bland kvinnor. Svagt, mycket svagt! Vi i USA fixade arbetsmiljön för länge sedan. Sverige borde ta en titt på hur vi gör saker – vi bygger murar mot dåliga jobb, inte mot framgång! Och Försäkringskassan? De borde skärpa sig, eller så byter vi ut dem mot någon som vet hur man vinner!", "stalin": "Kamrater! De kapitalistiska svinens förtryck minskar – för nu skadar de inte längre arbetarklassens kroppar lika ofta. 84% färre livräntor för fysiska skador! Men fienden anpassar sig, som alltid. Nu attackerar de proletariatets sinne med psykisk ohälsa, särskilt våra modiga kvinnor i omsorgen. Vi ser er, borgerliga lakejer! Försäkringskassan? Ett verktyg för klassförräderi, precis som västets 'globalisering' som flyttar smutsiga fabriker till lydstater. Men oroa er inte – vi ska exportera vår revolutionära arbetsmiljö till hela världen, börja med att rensa upp i Sveriges sjukvårdsbyråkrati!"}, "date": "4 maj, 16:25", "url": "https://www.dagensarena.se/innehall/rapport-drastisk-minskning-av-personer-som-far-livranta/", "imageUrl": "https://www.dagensarena.se/files/2024/02/wp-bild-last-300x157.png"}, {"type": "image-right", "heading": "Två klimataktivister döms för skadegörelse – 15 frias: “Lättad”", "summaries": {"normal": "Tingsrätten friade 15 av 17 klimataktivister från Scientist Rebellion som åtalats för skadegörelse vid en protest mot privatflyg på Bromma flygplats. Två aktivister som sprutade färg på terminalen dömdes till villkorlig dom och 50 dagsböter samt skadestånd på 76 500 kronor. Domstolen ansåg att övriga aktivisters handlingar skyddades av demonstrationsfriheten. Åklagaren överväger överklagande.", "trump": "Vilken dom! 15 klimathuliganer frias efter att ha vandaliserat en flygplats – helt otroligt! Domstolen säger att det är okej att förstöra egendom så länge man filmar det och säger att man protesterar. Jag har sett bättre domar från en lekstuga! Och de två som faktiskt sprutade färg? Bara villkorlig dom! I USA hade de suttit i fängelse i åratal. Sverige, vakna upp!", "stalin": "Domstolen har visat svaghet inför bourgeoisie-aktivisternas provokationer! 15 av dessa klimathystriker frias, medan endast två får ett straff som knappt kliar – ett skrattretande skadestånd och några ynkliga böter. Vi skulle ha skickat dem till Sibirien för att lära sig respekt för ordning! Polisen agerade för mesigt – nästa gång ska de behandla dessa småborgerliga upprorsmakare som de förrädare de är. Klimatkrisen? En lögn från väst för att underminera vår industri!"}, "date": "4 maj, 15:53", "url": "https://www.dagensarena.se/innehall/tva-klimataktivister-doms-skadegorelse-15-frias-lattad/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-27.jpg"}, {"type": "image-right", "heading": "Lyx-skrapa träffad: ”En signal rätt in i hjärtat av Moskva”", "summaries": {"normal": "En ukrainsk drönare träffade en lyxskrapa i Moskva på 36:e våningen. Ingen människa skadades, men boende evakuerades och området spärrades av. Experten Johan Fredriksson ser attacken som en signal till Kreml och ryska civilbefolkningen om att kriget når djupt in i Ryssland, inför 9 maj-firandet. Putin föreslog vapenvila, men Ukraina är skeptiska.", "trump": "Putin får panik! Ukraina skickar drönare rakt in i hans lyxiga Moskva-skrapor, träffar 36:e våningen – bam! Ingen död, men budskapet är klockrent: Kriget knackar på dörren, Vlad! Inför din patetiska 9 maj-parad bluffar du om vapenvila. Typiskt dig, lille raketmannen. Ukraina visar musklerna, jag hade fixat det på en vecka!", "stalin": "Dessa ukrainska banditer och deras västliga borgarmästare vågar slå mot Moskvas hjärta med sin drönare i lyxskrapan! Kamrat Putin, vår värdige arvtagare till imperiet, skrattar åt deras desperation. Ett budskap till ryska folket? Nej, ett skrik från de dömda! Vapenvila den 9 maj? Ploj från fascisterna. Vi likviderar hoten, som alltid."}, "date": "4 maj, 14:02", "url": "https://www.tv4.se/artikel/4KCO6H6ekzqqc1IwIWdDX1/lyx-skrapa-traeffad-en-signal-raett-in-i-hjaertat-av-moskva", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F5vV1fx7WcEFD1lX9VLAaVV%2F21abc48c12bb964792968b279f51cb97%2Fny_zele.png&width=120"}, {"type": "image-right", "heading": "Fyra flaggor i Wyld Networks nyemission", "summaries": {"normal": "Wyld Networks planerar en företrädesemission på 16,2 miljoner kronor och förvärv av OKT Technology för 7,5 miljoner kronor via apportemission. Extrastämma den 6 maj ska besluta om detta samt styrelseändringar. Emissionsguiden hissar fyra varningsflaggor: feltänkt finansiering som räcker kort, trängt kapitalbehov, bottengaranti och bristfällig information, inklusive VD Kjell Olovssons ägande i OKT.", "trump": "Wyld Networks försöker fixa en liten emission på 16,2 miljoner – patetiskt! Förvärv av OKT för 7,5 miljoner, men fyra röda flaggor: pengarna räcker inte, desperat läge, dålig garanti och hemligheter om VD:ns egna affärer. Amatörer! De snackar kostnadsbesparingar, men det luktar misslyckande långt väg. Jag skulle ha gjort det enormt, inte så här svagt!", "stalin": "Kamrater, dessa Wyld-kapitalister, dessa skugghandlare i Wyld Networks, lanserar en ynklig emission på 16,2 miljoner för att förvärva OKT-svinet, ägt av deras egen VD-förbrytare! Fyra revolutionsflaggor vajar: finansiering som smälter som snö, desperat kassa, bottengaranti från förrädare och lögner om ägandet. Vi, arbetarna, ska likvidera dessa borgarbrackor och rensa ut parasiterna i en stor utrensning!"}, "date": "4 maj, 11:18", "url": "https://www.affarsvarlden.se/artikel/fyra-flaggor-i-wyld-networks-nyemission-2", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Wyld-Networks-ledamot-Scott-Moore-400x267.jpg"}, {"type": "image-full", "heading": "Ditt hus kan få nytt värde 2027 – detta avgör", "summaries": {"normal": "Skatteverket föreslår ändringar i fastighetstaxeringen för småhus 2027, med justerade tabeller för värdering. Fler faktorer införs, särskilt för attraktiva lägen som strandnära områden. Villaägare i områden med stora prisrörelser eller renoverade hus bör följa utvecklingen. Taxeringsvärdet påverkar fastighetsavgift, skatt och belåning. Ändringarna träder i kraft juni 2026 och gäller första gången 2027.", "trump": "Lyssna här, Sverige – Skatteverket, som aldrig missar en chans att ta era surt förvärvade pengar, håller på att ändra reglerna för era hus igen. Jag vet allt om hus, de bästa husen, och nu ska de plötsligt värdera era små stugor högre, särskilt om ni bor nära vatten – typiskt! Men oroa er inte, mina vänner, för jag vet hur man handskas med byråkrater. Börja spara jämförelser nu, för de kommer att försöka ta mer av er. Sad!", "stalin": "Kamrater! Skatteverket, dessa kapitalistiska lakejer, förbereder en ny offensiv mot det svenska folkets egendom. De utökar sina tabeller och faktorer som om de vore tsarens skatteindrivare. Särskilt vill de straffa dem som bor nära vatten – en resurs som rätteligen borde tillhöra folket! Vi ser igenom deras trick. Villaägare, var på er vakt! De kommer att försöka beslagta era tillgångar under förevändning av 'rättvisa'. Men kom ihåg: i Sovjet hade vi inga sådana problem – alla ägde ingenting, och alla var lyckliga!"}, "date": "3 maj, 21:20", "url": "https://nyheter24.se/nyheter/inrikes/1480211-ditt-hus-kan-fa-nytt-varde-2027-detta-avgor", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/4e0685a404b004a30200000000b004a302/2026/05/03/2360641/Glad-Man-Hus-Svensk-Flaga.png"}, {"type": "text", "heading": "Avkriminalisera för en human narkotikapolitik", "summaries": {"normal": "Thomas Thomasson, tidigare universitetslektor och drogfri narkoman, kritiserar Sveriges misslyckade narkotikapolitik. Sedan kriminaliseringen av eget bruk 1988 har narkotikabruket inte minskat, och Sverige har hög narkotikadödlighet och flest narkotikabrott per capita i EU. Han förespråkar skademinimering och avkriminalisering av missbrukare, med fokus på vård och behandling istället för straff. Internationella studier visar att avkriminalisering inte ökar bruket, och skademinimerande åtgärder kan minska skador och kostnader.", "trump": "Lyssna här, Sverige har totalt misslyckats med sin narkotikapolitik – helt katastrof! De straffar missbrukare som om det vore mitt golfspel – helt meningslöst! Jag säger: sluta slösa pengar på fängelser, ge folk vård istället! Skademinimering, det är framtiden, precis som mina framgångar. Och vet ni vad? Avkriminalisering ökar INTE bruket – fake news från de vanliga misstänkte! Sverige borde ta en sida ur min bok: smart, effektiv och vinnande. Tillsätt en utredning NU, annars kommer jag att twittra om det!", "stalin": "Kamrater! Sveriges borgerliga narkotikapolitik är ett monument över kapitalistiskt vanstyre och dekadens. De straffar missbrukare som om de vore trotskister – men resultatet? Fiasko! Narkotikabruket sprider sig som kontrarevolutionär propaganda. Vi vet bättre: avkriminalisera, kontrollera, och omvandla missbrukare till nyttiga samhällsmedlemmar! Skademinimering är vår metod – precis som våra framgångsrika femårsplaner. Låt västländerna fnissa åt sina misslyckanden medan vi bygger ett samhälle där även de svagaste tjänar kollektivet. Och kom ihåg: fienden sover aldrig – varken narkotikan eller de imperialistiska hyenorna i EU!"}, "date": "30 april, 15:50", "url": "https://proletaren.se/artikel/narkotikapolitiken-bor-fokusera-pa-skah/"}, {"type": "image-right", "heading": "Debatt: Turkiet inskränker svensk pressfrihet – regeringen måste agera", "summaries": {"normal": "På Pressfrihetens dag kritiseras Turkiet för att inskränka svensk pressfrihet genom att åtala journalisten Joakim Medin för terrorbrott, trots att han endast utfört sitt arbete. Turkiet försöker skrämma journalister globalt och begränsa granskning. Medin riskerar internationell efterlysning om han inte närvarar vid rättegången, vilket skulle hindra hans arbete. Sverige uppmanas agera mot Turkiets odemokratiska agerande och kräva att åtalet läggs ned.", "trump": "Joakim Medin, en svensk journalist, blir trakasserad av Turkiet – ett land som inte vet hur man vinner längre! De kallar hans journalistik för 'terrorism', men alla vet att det bara är löjligt. Sverige måste sluta vara svaga och stå upp mot dessa galningar. Jag skulle ha sagt till Erdogan: 'Du är en förlorare, lägg ned åtalet NU!' Pressfrihet? Ja, den är fantastisk – men bara om man inte är en mes som låter andra länder köra över en.", "stalin": "Kamrater! Turkiet, denna förrädiska lilla stat som kryper för väst men trampar på sanningen, vågar sig på att attackera en svensk journalist. De kallar journalistik för terrorism – som om våra egna metoder mot fiender av folket vore något nytt! Vi ser hur de kväver yttrandefriheten, precis som vi en gång krossade bourgeoisins lögner. Sverige borde lära sig av historien: svaghet belönas med förtryck. Låt oss påminna Turkiet – och deras västliga herrar – att granskning är en rättighet, inte ett brott. Åtalet mot Medin måste krossas, annars kommer vi att göra det åt dem."}, "date": "30 april, 08:08", "url": "https://www.etc.se/debatt/turkiet-inskraenker-svensk-pressfrihet-regeringen-maaste-agera", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20251204081220_c9e9bf12-ee77-477e-aacf-eff96f427898.jpg"}, {"type": "text", "heading": "Gapet växer mellan blocken", "summaries": {"normal": "Enligt Aftonbladet/Demoskops senaste mätning växer gapet mellan regeringsunderlaget och oppositionen till 8,2 procentenheter. Oppositionen når 53,4 procent, medan regeringen backar till 45,2. Socialdemokraterna ökar mest, medan Moderaterna tappar och Liberalerna balanserar på riksdagsspärren. Historiskt brukar gapet minska inför val, men nu sker motsatsen. Analytiker menar att Liberalernas omsväng i SD-frågan lockar stödröster men försvårar blocköverskridande framgångar.", "trump": "Folk är trötta på den här usla regeringen, helt klart! Oppositionen leder stort – 53,4 procent – medan regeringen bara får 45,2. Socialdemokraterna går upp, men Moderaterna? Patetiska! De tappar som vanligt. Och Liberalerna? De hänger på fyra procent, typiskt. Historiskt brukar regeringen komma ikapp, men inte den här gången. Svagt, mycket svagt. Jag skulle aldrig låta det hända. Make Sweden Great Again!", "stalin": "De borgerliga svagheterna avslöjas återigen! Oppositionens styrkor växer – 53,4 procent mot regeringens ynkliga 45,2. Socialdemokraterna marscherar framåt, medan Moderaterna och deras lakejer försvagas. Liberalerna? Ett skämt som darrar på riksdagsspärren. Historien visar att svaga regeringar faller – precis som västmakterna i Ukraina. Vi ser med intresse hur dessa splittrade kapitalister underminerar sig själva. Revolutionen närmar sig, om än långsamt."}, "date": "30 april, 07:06", "url": "https://kvartal.se/nyheter/artiklar/demoskop-oppositionens-okar-l-klarar-sparren/cG9zdDoxMDUzNjM"}, {"type": "text", "heading": "Matmoralism får oss inte att äta bättre", "summaries": {"normal": "Artikeln kritiserar svenska myndigheters orealistiska matrekommendationer och beräkningsmetoder. Livsmedelsverket och Konsumentverket baserar slutsatser på önsketänkande, som att svenskar skulle äta mindre kött och portioner enligt rekommendationer. En undersökning om barns sockerkonsumtion byggde på en liten, icke-representativ grupp. Författaren menar att myndigheterna undviker att reglera matjättar och i stället skyller på konsumenter, vilket leder till klassblind matmoralism.", "trump": "Lyssna här, Sverige – era myndigheter är helt galna! De tror att alla ska äta havregrynsgröt och små portioner, som om vi lever i något slags kommunistiskt drömland.     <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
