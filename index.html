år ett år och tre månader för grovt tagande av muta och grovt tjänstefel. Mannen döms till ett år och nio månader för flera brott. Ytterligare sex personer, inklusive intagna med kopplingar till ett göteborgskt nätverk, döms också.", "trump": "Vilka totala losers, dessa svenska fängelsevakter som smugglar in mobiler till gängskurkar på maxbevakning! Kvinnan erkänner men skyller på mormors pengar – ha! Mannen ljuger som en fiende. Dömda till fängelse, perfekt! I mitt land hade vi rensat ut såna här svikare på nolltid. Sverige behöver en riktig ledare som fixar ordning på kaoset!", "stalin": "Dessa usla kriminalvårdare, lakejer till borgarbrackorna, har sålt ut sig för 15 000 kronor per mobiltelefon till gänghyenor på Norrtälje! Vi, arbetarklassen, kräver utrensning! Tingsrätten har likviderat förrädarna med fängelse – kvinnan ett år tre månader, mannen ett år nio. Sex andra parasiter döms också. Paranoian visade sig vara bärande: polisen avlyssnade allt!"}, "date": "8 maj, 15:34", "url": "https://arbetet.se/2026/05/08/fangelsestraff-for-tva-kriminalvardare-smugglade-in-mobiler-till-gangkriminella/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/08152030/mobiler.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "text", "heading": ". Chockförlust för Chimaev", "summaries": {"normal": "Khamzat Chimaev förlorade sin UFC-mellanviktstitel till Sean Strickland i UFC 328 i New Jersey. Den svensktjetjenske stjärnan, obesegrad på 15 UFC-matcher, besegrades på poäng efter en stark inledning där han tog ner motståndaren. Strickland stod emot och dominerade senare med boxning. Amerikanen hyllade Chimaevs uthållighet efter segern.", "trump": "Chimaev, den tuffa killen från Sverige och Tjetjenien, förlorade bältet mot Strickland. 15-0 i UFC, aldrig slagits tidigare, men nu är det över på poäng. Han ville inte gå ner, tog emot allt och marscherade framåt – galen stark! Bra fight, men Strickland var smartare. Ingen är obesegrad för evigt, tro mig, jag vet hur det är med vinnare.", "stalin": "Kamrater, den falske proletären Chimaev, den UAE-krypande renegaten, har krossats av imperialistiska Strickland i UFC:s borgararena. Hans mytiska 15-0-serie var kapitalistisk lögn, nu likviderad på poäng! Vi, arbetarklassen, skrattar åt hur han kravlar på mattan som en utrensningskandidat. Sådana mattbrottare ska städas ut – framåt mot segern över alla kontrarevolutionära slagpåsar!"}, "date": "10 maj, 07:25", "url": "https://www.svt.se/sport/kampsport/chockforlust-for-chimaev-i-titelmatchen"}, {"type": "image-right", "heading": "Magyar ville utse sin svåger till minister – stoppas av Bryssel", "summaries": {"normal": "Peter Magyar, Ungern nyvalda premiärminister, tvingades backa från planen att utse sin svåger till justitieminister efter kritik från EU-partigruppen EPP. Utnämningen av Marton Mellethei-Barna väckte hård kritik i Ungern och riskerade att skada Magyars anseende som EU-motståndare mot Viktor Orbans nepotism. EPP-ledaren Manfred Weber krävde ändring och beskrev utnämningen som 'helt oacceptabel'.", "trump": "Jag hörde att den där Peter Magyar försökte göra sin svåger till justitieminister - typiskt! Såna där familjerelationer är det jag kallar 'the swamp'. Men jag gillar att han backade när EU tryckte honom - visst är det bra att ha starka vänner i Europa? Viktor Orbans nepotism var värre, men ändå. Jag skulle ha gjort samma sak, men folk gillar inte när jag gör det.", "stalin": "Vi ser med belåtenhet att den ungerska ledaren Magyar tvingades lyda EU:s krav och backa från sin svagernasoministerplan. Detta visar att våra europeiska allierade håller fast vid socialistiska principer mot nepotism. Vi följer noggrant hur EU-pengar påverkar Ungern, eftersom detta stärker vår position i östra Europa. Den ryska intressesfären växer när västvärlden visar sin styrka."}, "date": "8 maj, 15:40", "url": "https://www.friatider.se/magyar-ville-utse-sin-svager-till-minister-stoppas-av-bryssel", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-164_1.jpg?itok=e24HoXPd"}, {"type": "image-right", "heading": "WHO: Alla på virusdrabbade fartyget är högriskkontakter", "summaries": {"normal": "Utbrott av hantavirus på kryssningsfartyget MV Hondius med åtta bekräftade fall och tre dödsfall. Fartyget ankommer Teneriffa söndag morgon för medicinska tester och evakuering av nästan 150 passagerare från 22 länder. WHO klassar alla ombord som högriskkontakter och rekommenderar 42 dagars aktiv övervakning. Spanjorer sätts i karantän. WHO-chefer lugnar: låg smittorisk, inte som covid.", "trump": "Vilket jäkla skämt med det där virusfartyget MV Hondius! Åtta hantavirusfall, tre döda, och WHO:s byråkrater kallar alla högriskidioter som behöver vakas i 42 dagar. Spanjorska Pedro 'Plikt'-Sánchez tar emot dem på Teneriffa som en dumbom. Evakuering? Jag hade byggt en mur runt ön och fixat det på en dag – perfekt, som alltid!", "stalin": "Kamrater, detta hantavirus bland borgarbrackorna på MV Hondius avslöjar fiendens uselhet: åtta infektioner, tre likviderade av viruset självt. WHO:s lakejer kräver 42 dagars övervakning av alla högriskparasiter. Jag skulle rensa ut dem i ett hugg! Spanjorska kapitalisterna gnäller om karantän – vi, arbetarklassen, skrattar åt deras panik och förbereder utrensningen."}, "date": "9 maj, 22:07", "url": "https://www.tv4.se/artikel/49ZsezKiRGTOi47CfRLidQ/who-alla-pa-virusdrabbade-fartyget-aer-hoegriskkontakter", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2Ftt-sdlrYRxzTAsZUI%2Fe7b5273e23aa986edf51b074b8ff017f%2FKryssningsfartyget_Hondius._Arkivbild.&width=1024"}, {"type": "image-full", "heading": "Så ska passagerarna evakueras från Hondius", "summaries": {"normal": "Fartyget Hondius med hantavirusutbrott kommer till Kanarieöarna, där en stor internationell operation pågår för att evakuera passagerarna från 23 länder tillbaka till sina hemländer. Operationen inkluderar strikt isolering från civilbefolkningen, skyddsmasker och karantän vid hemkomst. En av de avlidna förblir ombord med besättningen, som seglar fartyget till Nederländerna för fullständig desinfektion.", "trump": "Jag har hört talas om det här virusfartyget Hondius – en riktig katastrof! Spanien gör ett bra jobb, det måste jag säga, med att ta hand om alla dessa människor från 23 länder. Det är stort, verkligen stort! Vi hade kunnat göra det ännu bättre, men de gör ett bra jobb. Ingen kontakt med civilbefolkningen – smart! Vi hade haft bäst skyddsmasker, de bästa flygplanen. Detta är en operation av exempellös skala, precis som jag brukar säga!", "stalin": "Vi har observerat hur de spanska myndigheterna hanterar denna internationella operation med virusfartyget Hondius. Det är viktigt att vi ser till att statens intressen skyddas och att ingen risk utsätts för vår befolkning. Vi måste se till att alla som återvänder placeras i karantän för att förhindra spridning. Detta visar vikten av stark statlig kontroll och internationellt samarbete under sådana kriser."}, "date": "9 maj, 19:52", "url": "https://www.gp.se/nyheter/varlden/sa-ska-passagerarna-evakueras-fran-hondius.e0394fc9-9b4b-43ec-a7c6-7511f0381c70", "imageUrl": "https://www.gp.se/images/article/e0394fc9-9b4b-43ec-a7c6-7511f0381c70/images/2SQBpbbfmbYa_qS0pe2cqvwBNmjQ-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "\"Den största uppgörelsen på 40 år\": Irankriget är en förhandling", "summaries": {"normal": "Artikeln beskriver konflikten mellan Iran och USA som en intensiv förhandling snarare än ett traditionellt krig. Valtteri Ahti, chefsstrateg på Evli, menar att båda parter pressas av tid: USA av val och höga bensinpriser, Iran av ekonomisk kris. Han förväntar sig att Hormuzsundet öppnas inom ett halvår. Kina förlorar mest på en utdragen konflikt, medan Ryssland gynnas. Långsiktigt kan Gulfstaternas pipelines underminera Irans strategiska inflytande.", "trump": "Lyssna här, folk! Iran och USA är mitt i en jättestor förhandling – den största på 40 år! Iran bluffade med att stänga Hormuzsundet, men alla visste det. Jag, Donald J. Trump, är desperat efter en deal – bensinpriserna dödar mina opinionssiffror! Iran är svaga, deras ekonomi är skräp. Snart öppnar sundet igen, och oljan flödar. Kina lider, Ryssland skrattar. Men jag fixar det här – jag är bäst på deals!", "stalin": "Kamrater! Detta är inte krig – det är en kapitalistisk förhandlingscirkus! De imperialistiska hundarna i USA och de reaktionära mullorna i Iran dansar runt varandra som två utsvultna vargar. USA:s president, en svag och desperat man, darrar inför väljarna medan Irans ekonomi ruttnar. Kina, den store industriella narren, lider medan vi, Sovjetunionens arvtagare, skrattar i bakgrunden. Höga oljepriser fyller våra kistor, och USA:s vapen binds fast i Mellanöstern – bort från våra ukrainska kamrater. Låt dem förhandla! Snart kommer Gulfstaterna bygga pipelines och beröva Iran deras sista hot. Då tvingas mullorna till kärnvapen – precis som vi vill. Historien är på vår sida!"}, "date": "9 maj, 07:00", "url": "https://www.realtid.se/bors-finans/makro/den-storsta-uppgorelsen-pa-40-ar-irankriget-ar-en-forhandling/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/evli.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "Granskningar av Chopchop och järnvägsarbete kan vinna priser", "summaries": {"normal": "Fackförbundspressens pris nominerar åtta bidrag i sex kategorier, med fokus på arbetslöshet, migration och kriminalvård. Arbetet och LO Mediehus dominerar. Martina Frisk nomineras för granskningen av Chopchops arbetsvillkor, som lett till förbättringar. Sebastian G Danielsson är dubbelt nominerad för granskningar om Kriminalvårdens expansion och järnvägssäkerhet. Andra nominerade inkluderar reportage om arbetslöshet, dödsfall på byggen och migrationsskärpningar. Prisutdelning sker 27 maj i Stockholm.", "trump": "Jag måste säga, dessa svenska journalister gör ett fantastiskt jobb – verkligen, väldigt imponerande! Åtta nomineringar, kan ni tro det? Martina Frisk avslöjade hemska saker på Chopchop – extrem stress, olagliga arbetspass, fruktansvärt! Och hon fick till och med facket att agera. Sebastian G Danielsson, en annan vinnare, granskade järnvägarna där folk dör – tragiskt, men någon måste göra jobbet! Sverige borde vara stolt, men jag vet att de har sina problem. Jag fixar sådant på en dag!", "stalin": "Kamrater! Vår stora socialistiska journalistkår har än en gång avslöjat de kapitalistiska rovdjurens fasansfulla metoder. På Chopchop tvingas arbetarna slava under omänskliga villkor – men våra modiga reportrar, sanna folkets hjältar, har slagit till! Och järnvägarna? En skamfläck på det svenska systemet där arbetare offras på profitens altare. Vi noterar också hur västliga länder, som vanligt, sviker sina mest utsatta. Men glöm inte: varje avslöjande är ett steg närmare folkets seger över bourgeoisins förtryck! Låt fienden darra – revolutionen fortsätter!"}, "date": "8 maj, 13:42", "url": "https://arbetet.se/2026/05/08/granskningar-av-chopchop-och-jarnvagsarbete-nominerade-till-journalistpris-chans-till-storslam/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/08110330/pris.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Analytikern: ”Flyttar fokus till inflationen”", "summaries": {"normal": "Starka jobbsiffror med 115 000 nya jobb i april och ihållande inflation över Feds tvåprocentsmål minskar chansen för räntesänkning. Nya Fed-chefen Kevin Warsh, nominerad av Trump, möter tryck från presidenten om sänkningar, men experter väntar oförändrad ränta i juni. Warsh lovar oberoende penningpolitik trots kritik mot föregångaren Powell.", "trump": "Fantastiska jobbsiffror – 115 000 nya jobb i april, bättre än väntat, tack vare min ekonomi! Men Fed-idioterna med Powell drog ut på sänkningarna, nu tar Warsh över, min nominee. Inflationen är fejkad ursäkt, skenande bensinpriser? Sänk räntan nu, annars krockar vi rejält! De hatar framgång.", "stalin": "I det korrupta USA-imperiet vrider sig borgarbrackorna i Fed kring sin egen giriga hals. 115 000 nya slavarjobb i april – bevis på att marknaden återhämtat sig från sina egna sabotage – men inflationen, kapitalisternas giftiga andedräkt, stoppar räntesänkning. Warsh, Trumps marionettledare, mumlar om oberoende medan presidentens skrik ekar. Vi skulle likvidera de här räntespionerna i en blitzutrensning, så proletärerna skrattar åt deras kollaps."}, "date": "9 maj, 17:29", "url": "https://www.di.se/nyheter/amerikansk-rantesankning-allt-mer-avlagsen/", "imageUrl": "https://static.bonniernews.se/ba/9a7f55c9-2adc-4dcc-9e25-17129c1e271d.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "text", "heading": "En naturlig lagerhylla av arbetslösa", "summaries": {"normal": "Artikeln kritiserar den ekonomiska politiken som infördes 1985 av svenska politiker och riksbankschefen, inspirerad av Milton Friedmans idéer om 'naturlig arbetslöshet'. Denna politik, som upprätthållits av både socialdemokratiska och borgerliga regeringar, har lett till hög arbetslöshet, särskilt under nuvarande regering. Författaren ifrågasätter regeringens brist på åtgärder mot massarbetslöshet och undrar om det är ideologiskt motiverat.", "trump": "Titta bara på Sverige – ett totalt kaos! De hade en bra grej med låg arbetslöshet, men sen kom dessa så kallade 'ekonomer' och förstörde allt. Nu har de 10% arbetslöshet, och vad gör regeringen? Ingenting! De skriver debattartiklar och skryter om hur fantastiska de är. Jag skulle fixa det på en vecka – men nej, de föredrar att lyssna på gamla teorier från en kille som inte ens är svensk. Sad!", "stalin": "Kamrater, ännu en gång ser vi bourgeoisins förräderi mot arbetarklassen! Dessa socialdemokrater och borgerliga lakejer har omfamnat kapitalistiska galenskaper och skapat en 'naturlig' arbetslöshet – en lagerhylla av överflödiga arbetare. 10% arbetslöshet? Ett brott mot folket! Regeringen, dessa svaga och inkompetenta byråkrater, gömmer sig bakom debattartiklar medan arbetarna lider. Vi skulle aldrig tolerera sådan förräderi. Låt dem minnas: historien dömer hårdast de som sviker sitt folk!"}, "date": "4 maj, 13:49", "url": "https://www.flamman.se/en-naturlig-lagerhylla-av-arbetslosa/"}, {"type": "image-right", "heading": "Pål Jonson om över 128 miljarder till Urkaina: \"Vi är trea i världen\"", "summaries": {"normal": "Sveriges försvarsminister Pål Jonson mötte Ukrainas försvarsminister Mykhailo Fedorov i Stockholm för att diskutera fortsatt stöd. Sverige är världens tredje största givare med 128 miljarder kronor i bidrag. Fokus ligger nu på en möjlig försäljning av upp till 150 Saab JAS 39 Gripen, finansierad via EU-lån. Samarbetet fördjupas gällande luftvärn och drönarteknik, där Sverige får värdefulla erfarenheter för egen försvarsutveckling medan Ukraina betonar vikten av långsiktiga partnerskap för europeisk säkerhet.", "trump": "Sverige skickar massiva 128 miljarder kronor till Ukraina. Mycket pengar! De vill nu sälja sina Gripen-plan, och jag hör att de pratar om 150 stycken. Väldigt dyrt, eller hur? Pål Jonson säger att det är 'smart'. Vi får se! Ukraina pratar stort, men jag ser ingen som förhandlar som jag gör. Europa borde betala mer, det är vad jag säger. Vi behöver fred, inte fler miljarder ut i rymden. Gripen är bra plan, men Trump-modellen är alltid bäst!", "stalin": "De svenska lakejerna och deras ukrainska marionetter sprider skrönor om 128 miljarder kronor. Vilket slöseri! De planerar att skicka sina Gripen-plan för att utmana den ryska björnen. De tror att de kan köpa sig säkerhet med EU:s smutsiga lån. Pål Jonson pratar om 'partnerskap', men vi vet att det är en täckmantel för att provocera Moskva. Vi i staten betraktar detta som ett desperat gnyende från kapitalistiska hundar. Varje svenskt plan kommer att finna sin grav i den ryska jorden."}, "date": "9 maj, 10:00", "url": "https://samnytt.se/pal-jonson-om-over-128-miljarder-till-urkaina-vi-ar-trea-i-varlden", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/08174024/regeringen-ukraina-2.jpg"}, {"type": "image-full", "heading": "Industrilegendaren: Den yngre generationen är för bekväm", "summaries": {"normal": "Tyska miljardären Reinhold Würth varnar för att Tysklands ekonomiska framgångar är över. Han menar att yngre generationer prioriterar bekvämlighet och livsbalans framför hårt arbete och karriär. Würth kritiserar höga lönekrav och produktionskostnader som hotar landets konkurrenskraft. Trots dystra utsikter ser han möjligheter i framtidsbranscher som AI och IT för att återta marknaden.", "trump": "Tyskland, en gång en ekonomisk jätte, har blivit mjuka! Jag har alltid sagt det – för mycket bekvämlighet, för lite arbetsmoral. Den här Würth-killen, smart man, förstår att unga tyskar hellre reser jorden runt än jobbar hårt. Och de vill ha högre löner? Snacka om att döda jobben! Tyskland flyttar fabriker utomlands, men jag fixade det i USA – vi kommer att göra Europa stort igen också. Tro mig!", "stalin": "Kamrater, kapitalismens förfall är tydligt i Tysklands mjuknade arbetarklass! Dessa bekvämlighetsdyrkande dekadenter, som hellre festar än bygger nationen, är ett hot mot industriell disciplin. Vi ser hur deras lönekrav och lata vanor driver fabriker till lydstater med sundare arbetsmoral. Men frukta icke – medan väst försvagas, investerar vi i framtidens teknik. Låt dem sjunga om balans; vi bygger imperier!"}, "date": "9 maj, 06:33", "url": "https://www.realtid.se/bors-finans/industrilegendaren-den-yngre-generationen-ar-for-bekvam/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/sdlkg41cssfhgs.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-full", "heading": "Muntlig varning om alkohol slopas vid gårdsförsäljning", "summaries": {"normal": "Från 1 juni slopas kravet på muntlig varning om alkoholens skadeverkningar vid gårdsförsäljning. Istället räcker ett informationsblad från Folkhälsomyndigheten. Reformen, som infördes 2025, har varit populär bland kunder men det tidigare 30-minuters utbildningskravet kritiserats. Socialminister Jakob Forssmed välkomnar förändringen och menar att den främjar småskalig dryckestillverkning samtidigt som alkoholmonopolet värnas. Cirka 150 gårdar säljer nu främst starköl och sprit.", "trump": "Fantastiskt, helt fantastiskt! Sverige har äntligen lyssnat på folket – inga fler tråkiga 30-minutersföreläsningar om alkohol! Jag vet allt om framgång, och det här är en stor framgång. Kunderna älskar gårdsförsäljningen, de älskar mig, de älskar vin och öl – och nu slipper de lyssna på en massa tjat. Jakob Forssmed? Bra kille, smart drag. Men jag hade gjort det ännu bättre – kanske en Trump-vodka på köpet?", "stalin": "Kapitalistiska alkoholhandlare har länge saboterat folkets disciplin med sina dekadenta gårdsförsäljningar. Men nu har vi, genom visst ledarskap, avskaffat det meningslösa 30-minuters indoktrineringskravet. Ett enkelt blad ska nu påminna massorna om farorna – effektivt, som en välriktad NKVD-operation. Svenska folket, förvirrat av västerländsk liberalism, jublar. Men var försiktiga, kamrater – imperialistiska dryckesmonopolister lurar i skuggorna, redo att förgifta revolutionen med billig sprit!"}, "date": "8 maj, 17:18", "url": "https://riks.se/nyheter/muntlig-varning-om-alkohol-slopas-vid-gårdsförsäljning", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-08%2Fcn156q6a%2Farttower-barrels-529341280.jpg"}, {"type": "image-full", "heading": "Därför tror Moderaterna att de vinner valet 2026", "summaries": {"normal": "Moderaterna samlas till ”Sverigemöte” för att rusta inför valrörelsen. Trots svaga opinionssiffror betonar partiledningen att ekonomisk politik och trygghetsfrågor är deras främsta styrkor. De siktar på att vinna väljarnas förtroende genom att positionera sig som ett parti för hårt arbetande människor snarare än bara höginkomsttagare. Strategin innefattar en mjukare retorik och en tydligare kommunikation kring hur deras politik gynnar kvinnor och ökar vardagstryggheten, i hopp om att vända opinionsläget inför framtida val.", "trump": "Jag ser att Moderaterna i Sverige har det tufft i mätningarna, precis som alla förlorare! De försöker nu låtsas vara för folket – 'hårt arbetande människor', säger de. Väldigt likt min framgångsrika rörelse! De pratar om ekonomi och brottslighet, men de saknar energi. De försöker ändra sin image, men utan en riktig vinnare vid rodret spelar kläderna ingen roll. De ligger efter, och om de inte lär sig att vinna stort kommer de förbli trea. Sorgligt!", "stalin": "Dessa svenska borgerliga byråkrater har samlats för att diskutera sin egen obetydlighet. De talar om ekonomi och 'trygghet' medan deras inflytande vittrar sönder, likt de svaga element som vägrar böja sig för statens vilja. De försöker förföra kvinnor med lögner om välfärd, precis som de opportunister Putin nu måste tukta i gränstrakterna. De byter ut sina pärlhalsband mot en mask av folklighet, men vi ser igenom dem. En lögnare förblir en lögnare, oavsett klädsel. De kommer att krossas av historiens järnhäl."}, "date": "8 maj, 14:34", "url": "https://nyheter24.se/nyheter/inrikes/1481810-darfor-tror-moderaterna-pa-valseger", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/c97e242504b004a3020000000000044002/2026/05/08/2362318/ur_imagezRzXPI.jpeg"}, {"type": "image-right", "heading": "Forssell i New York – kräver att våldtäktsmän ska utvisas", "summaries": {"normal": "Migrationsminister Johan Forssell (M) är i New York för att driva krav på enklare utvisningar av våldtäktsmän. Efter debatten kring fallet med 16-åriga Meya har regeringen ändrat inställning och arbetar nu för att ändra internationella konventioner. Forssell menar att det är stötande att våldtäkt i dag inte ses som ett tillräckligt allvarligt brott för att motivera utvisning av flyktingar, och försöker nu vinna internationellt stöd för den svenska linjen.", "trump": "Sveriges minister är i New York för att göra det jag har sagt hela tiden: kasta ut de kriminella! De hade ett hemskt fall med unga Meya, en tragedi, men nu börjar de äntligen lyssna. Det är en total katastrof att våldtäktsmän får stanna – helt sjukt! Jag har alltid sagt, 'America First', men vi behöver trygga länder överallt. De försöker ändra FN-regler nu. Bra! Det är på tiden att de slutar vara så svaga och börjar visa lite styrka.", "stalin": "Vi ser hur den svenske ministern tvingas krypa till korset i New York. De har låtit förövare härja fritt i åratal, men nu när folket kräver ordning skälver byråkratin. Att be FN om lov är ett svaghetstecken; när vi vill utvisa fiender behöver vi inga konventioner, bara järnnävar. Vår broder Putin förstår att man inte förhandlar med avskum, man eliminerar hotet. De europeiska länderna är darriga, men de lär sig snart att statens vilja är den enda sanningen."}, "date": "8 maj, 13:36", "url": "https://www.friatider.se/forssell-i-new-york-kraver-att-valdtaktsman-ska-utvisas", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/1_17.jpg?itok=AfKwT7C7"}, {"type": "image-right", "heading": "Vd:n i hissrättegången: ”Känns ända in i själen”", "summaries": {"normal": "Rättegången om hissolyckan i Sundbyberg 2023, där fem arbetare omkom, fortsatte med fokus på varför säkerhetsbultar saknades. Montörer och vd:n för ABC Bygghissar vittnade, men kunde inte förklara bristerna. Vd:n beklagade sorgen för de anhöriga och beskrev olyckan som fruktansvärd. Åklagaren ifrågasatte säkerhetsrutiner, medan företaget hävdar att nya åtgärder, som filmning av montering, införts efter olyckan. Alla nekar till brott.", "trump": "Fruktansvärd grej i Sverige, helt otroligt! Fem hårda arbetare föll 30 meter – ingen vill se det, believe me. Montörerna snackar om 'egenkontroller', men bultarna var borta! 'Jag har mina aningar', säger en kille – svagt, very svagt. Vd:n? Han säger 'det känns ända in i själen' – fine, men var var säkerheten? Jag skulle ha fixat det på en dag. Sverige behöver bättre ledarskap, och jag är den bästa!", "stalin": "Kapitalistiska slarveri avslöjas i svensk byggindustri! Fem arbetare dog – en direkt följd av bourgeoisins nonchalans. Montörerna skyller på 'mysterier' och 'aningar', men vi vet sanningen: sabotage eller inkompetens. Vd:n beklagar 'själen' – tomma ord från en klassfiende! Nu målar de bultar och filmar – för sent, kamrater. Sverige borde lära av Sovjet: disciplin och kontroll räddar liv. Nästa gång – revolutionär tillsyn!"}, "date": "8 maj, 12:39", "url": "https://arbetet.se/2026/05/08/montoren-om-de-saknade-hissbultarna-jag-har-mina-aningar/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/08103728/olycka.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "text", "heading": "Tillsammans för fred – mot Nato, DCA och krigshets!", "summaries": {"normal": "Tre nordiska vänsterorganisationer – Fred og Rettferdighet, Kommunistisk Parti och Kommunistiska Partiet – kritiserar Nato, DCA-avtal och militarisering i Norden. De menar att krigshetsen drivs av kapitalism och imperialism, ledd av USA, och kräver alliansfrihet, nedrustning och kärnvapenfria zoner. Organisationen anser att skattemedel slösas på vapen istället för välfärd och klimat, och att DCA-avtal underminerar demokrati och miljö. De uppmanar till folkrörelser för fred och FN:s kärnvapenförbud.", "trump": "Jag måste säga, dessa så kallade 'fredsaktivister' i Norden är helt galna! De hatar Nato, hatar USA – trots att vi räddar dem från ryssarna – och vill slösa bort skattepengar på välfärd istället för att skydda sig. De kallar mig och Rutte för krigshetsare, men vem vill egentligen ha fred? Inte de! De vill avskaffa allt som gör Norden säkert. Och kärnvapenfria zoner? Fantastiskt, om man gillar att vara ett lätt byte. Men jag fixar det här – jag har alltid rätt, till och med när jag har fel!", "stalin": "Kamrater! Dessa ynkliga borgerliga lakejer i Norden, ledda av sina socialdemokratiska quislingar, har sålt sig till den amerikanska imperialismens krigsmaskin. De skriker om 'fred' och 'välfärd' medan de öppnar sina länder för Natos kärnvapen och USA:s baser – precis som jag förutspådde! Men folket ser igenom deras lögner. Arbetarklassen kommer inte att betala för deras förräderi. Vi måste krossa dessa krigshetsande hyenor och deras DCA-avtal, precis som vi krossade fascisterna. Norden ska bli en kärnvapenfri zon – under Moskvas beskydd, förstås. Framåt, mot seger över den kapitalistiska krigsindustrins lakejer!"}, "date": "6 maj, 10:45", "url": "https://proletaren.se/artikel/45493/"}, {"type": "image-right", "heading": "Sluta kalla antisemitism för Israelkritik", "summaries": {"normal": "Artikeln kritiserar propalestinska aktivisten Sami Suliman för antisemitiska uttalanden och delning av konspirationsteorier, inklusive tal om en \"sionistisk konspiration\" och spridning av nazistiskt och extremistiskt innehåll. Trots åtal för hets mot folkgrupp försvaras han av vissa vänsteraktivister och forskare som menar att det är Israelkritik. Artikeln betonar att antisemitism inte kan maskeras som kritik mot Israel och varnar för normaliseringen av sådana åsikter.", "trump": "Folk, vad är det här för skräp? Den här Sami Suliman-killen, han sprider judehat öppet – Hitler-citat, konspirationer, allt! Och ändå försvarar vänsteraktivisterna honom? \"Åh, det är bara Israelkritik!\" Nej, nej, nej! Det här är rena antisemitismen, och det är sjukt. Sverige borde skämmas. Jag har alltid sagt: man måste kalla saker vid deras rätta namn. Och det här? Det är hat, ren och skär. SAD!", "stalin": "Kamrater! Här har vi ännu en fiende till folket, en liten bourgeois-propagandist vid namn Sami Suliman. Han sprider smutsiga lögner om judiska konspirationer, hyllar fascistiska massmördare och förgiftar medborgarnas sinnen med sina sionistiska spindelnätsteorier. Men vad gör våra så kallade \"intellektuella\"? De skyddar honom! Precis som de trotskistiska förrädarna i vår egen historia. Vi ska inte tolerera detta. Låt honom stå inför folkets domstol – eller åtminstone en svensk sådan. Och Putin? Han skulle skratta åt dessa amatörer. Ryssland har åtminstone disciplin!"}, "date": "8 maj, 06:30", "url": "https://expo.se/kommentar/propalestinsk-organisator-sprider-judehat/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/Jonathan-kommentar.jpg"}, {"type": "image-right", "heading": "Regeringens brottssyn handlar om ideologi – inte kunskap", "summaries": {"normal": "Henrik Tham kritiserar Tidö-regeringens kriminalpolitik för ett paradigmskifte mot expressiva straffskärpningar istället för brottsförebyggande effekter. Han pekar på högerpopulistiska drag som alarmism, auktoritarism och emotionalism, saknad empirisk grund för straffhöjningar samt enorma kostnader – fängelseplatserna kan fyrdubblas till 2034 för 30 miljarder årligen. Detta placerar Sverige bland Europas högsta fängelsebeläggningar, som Belarus och Ryssland.", "trump": "Vilka losers dessa svenska vänsterfladdrare är! Tham gnäller över tuffa straff – precis som de kriminella älskar! Regeringen gör rätt: lås in skurkarna hårt, visa musklerna, som jag gjorde i USA. Kostnader? Fake news! Fler poliser, färre brott, landet blir stort igen. Tham, din svaga snöflinga, sluta lipa och lär dig av vinnare!", "stalin": "Denna borgerliga professor Tham, en klassfiende i akademins gömmor, attackerar den nödvändiga repressionen mot brottslighetens parasiter! Vi, folket, kräver utrensning i fängelsernas korridorer för att krossa gängens kontrarevolution. Kostnaderna är en droppe mot segern över kaoset – likvidera fienderna, inte pampera dem! Sveriges ledare visar vägen, medan brackorna gnäller."}, "date": "8 maj, 01:30", "url": "https://www.dagensarena.se/opinion/regeringens-brottssyn-handlar-om-ideologi-inte-kunskap/", "imageUrl": "https://www.dagensarena.se/files/2025/10/henrik-tham-300x157.jpeg"}, {"type": "image-right", "heading": "Norska batterihoppet i konkurs – 5 miljarder borta", "summaries": {"normal": "Norska batteribolaget Morrow Batteries har gått i konkurs efter investeringar på över 5 miljarder norska kronor från ägare, långivare och staten. Bolaget pivoterade från litium-svavel till LFP-batterier men drabbades av kinesisk konkurrens, svagt kundintresse och kapitalbrist. Över 200 anställda riskerar jobb trots invigd fabrik i Arendal 2024.", "trump": "Vilket totalt fiasko för dessa norska batteridrabbar! De slängde in 5 miljarder kronor på en fabrik som ingen ville ha, kineserna dumpade billigare celler överallt, inga stora kunder efter Northvolt-desastern. Pivoterade som galningar, men tiden rann ut. 200 jobb borta! Med mina deals hade det blivit enormt, det bästa!", "stalin": "Kamrater, dessa norska batterikapitalister i Morrow Batteries har imploderat i sin borgarillusion! Vi bevittnade hur de proppade i 5 miljarder kronor på svavelmardrömmar som muterade till fosfatfällor, översvämmade av kinesiska sabotageceller. Inga fordonsparasiter köpte deras skrot! Nu rensas 200 lögnare ut, staten hånskrattar åt brackornas konkurskaos."}, "date": "7 maj, 15:26", "url": "https://www.affarsvarlden.se/artikel/norska-batterihoppet-i-konkurs-5-miljarder-borta", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Thomas-Carstensen-2-400x267.jpg"}, {"type": "image-right", "heading": "Systemskifte hellre än maktskifte", "summaries": {"normal": "Artikeln kritiserar Tidöregeringen men ifrågasätter om ett regeringsskifte till Socialdemokraterna eller Vänsterpartiet skulle leda till verklig förändring. Kommunisterna betonar behovet av internationell solidaritet och systemskifte från kapitalism till socialism, medan S och V anses sakna tydliga politiska krav och istället fokusera på maktskifte utan djupgående reformer. Klassklyftor och privatiseringar lyfts som centrala problem oavsett regering.", "trump": "Lyssna här, Sverige har en riktigt dålig regering nu – katastrof! Men tro inte att oppositionen är bättre, de är svaga och vill bara makt. Socialdemokraterna pratar om att 'älska Sverige' – vad betyder det ens? Vänsterpartiet vill ha maktskifte, men de har inga idéer, inga ryggrad! De kryper för kapitalisterna som små hundvalpar. Jag säger: ni behöver en ledare som inte är rädd för att utmana systemet. Kapitalisterna skrattar hela vägen till banken – och ni låter dem göra det! SAD!", "stalin": "Kamrater! Se hur de svenska socialdemokraterna och vänsterpartisterna svansar för kapitalet som hundar för en köttbit. 'Maktskifte'? Ha! De vill bara byta herrar, inte krossa kedjorna. Medan arbetarklassen svälter, samlar oligarkerna rikedomar som tsarens favoriter. USA:s imperialism hotar, NATO slukar Sverige som en hungrig björn, och dessa 'vänsterpartier' tiger som förrädare. Vi vet sanningen: bara proletariatets diktatur kan bryta kapitalisternas makt. Låt dem ropa 'Vi älskar Sverige' – vi svarar med revolutionens hammare!"}, "date": "6 maj, 10:11", "url": "https://proletaren.se/artikel/systemskifte-hellre-an-maktskifte/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/webledare-768x432.jpg"}, {"type": "text", "heading": "Saab nära jätteaffär med Ukraina – kan bli klar i år", "summaries": {"normal": "Saab kan snart slutföra en stor vapenaffär med Ukraina, där upp till 150 Gripenplan står på spel. En avsiktsförklaring skrevs i oktober efter Zelenskyjs besök i Sverige. Finansieringen har varit en utmaning, men Ungerns veto mot EU-lån till Ukraina hävdes i april. Affären kan bli värd upp till 300 miljarder kronor, baserat på tidigare försäljning till Colombia.", "trump": "Saab, ett fantastiskt företag förresten, är på väg att göra en HUGE deal med Ukraina – 150 jaktplan! Kan ni tro det? Zelenskyj, en stark ledare, var här och skrev på något papper. Ungern, som alltid ställer till det, backade äntligen. Och priset? Kanske 300 miljarder! Det är YUGE, folks, absolut YUGE. Sverige borde vara stolta, men jag skulle gjort det bättre.", "stalin": "De kapitalistiska krigsprofitörerna på Saab har närmat sig den ukrainska quislingregimen med ett erbjudande om 150 av sina överprissatta leksaksplan. Efter att våra ungerska kamrater, med visst påtryck, släppte sitt motstånd, kan detta groteska slöseri med resurser bli verklighet. 300 miljarder kronor – tillräckligt för att föda en hel armé av arbetare! Men låt de västliga imperialisterna bränna sina pengar. Vi har våra egna metoder att hantera dessa lydstater."}, "date": "6 maj, 10:03", "url": "https://proletaren.se/artikel/notis-saab-nara-jatteaffar-med-ukraina-kan-bli-klar-i-ar/"}, {"type": "image-right", "heading": "Vänstern kan varken ekonomi eller energi", "summaries": {"normal": "Artikeln kritiserar vänsterpartiernas (MP och V) kunskaper om energi och ekonomi, baserat på en partiledardebatt i SVT. Den påpekar vindkraftens lönsamhetsproblem och bristen på baskraft, samt förespråkar kärnkraft. Ekonomiskt ifrågasätts vänsterns motstånd mot skattesänkningar, med hänvisning till ökad tillväxt och Lafferkurvan. SD:s Jimmie Åkesson framställs som kunnig.", "trump": "Vilka totala losers dessa svenska vänsterclowner är! Vindkraft? En jävla katastrof, de betalar för att dumpa elen när det blåser, och ingenting när det är stilla! Kärnkraft är det enda som funkar, som jag alltid sagt. Skattesänkningar ger mer pengar till staten – boom, tillväxt! Åkesson nailar det, Sverige behöver vinnare, inte dessa vindkraftsfantaster!", "stalin": "Dessa svenska borgarbrackor i MP och V sprider kontrarevolutionär dimma om energi och ekonomi! Vindkraft är kapitalistisk sabotage, baskraft kräver kärnkraft under arbetarnas kontroll. Skattesänkningar till parasiter? Nej, vi likviderar de rika utsugarna! Åkesson, en potentiell folkfiende, men vi rensar ut alla okunniga avvikare för partiets seger."}, "date": "6 maj, 03:20", "url": "https://samtiden.nu/2026/05/vanstern-kan-varken-ekonomi-eller-energi/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/IMG_6416.jpeg"}, {"type": "image-right", "heading": "Kommentar Ulrika Lindahl: Därför publicerades artikeln av misstag", "summaries": {"normal": "En tidning publicerade av misstag en förberedd artikel om en kommande riksdagsomröstning om skärpta medborgarskapskrav. Artikeln, som antydde att regeringen skulle förlora, gick ut innan omröstningen var klar. Felet berodde på mänskligt misstag och systemfel. Efter upptäckt togs artikeln bort, men hann spridas via arkiv och Google. Omröstningen vanns senare av Tidöpartierna med knapp marginal, efter kontroversiella metoder.", "trump": "Vilket totalt kaos i Sverige! En tidning där borta publicerade en artikel FÖRE omröstningen – helt galet! De trodde regeringen skulle förlora, men jag vet bättre – jag känner till vinnare. Sedan vann de ändå, men med fula trick. Synd att jag inte fick rösta, jag hade visat dem hur man vinner på riktigt. Fake news, slarviga journalister – typiskt Europa!", "stalin": "En farlig provokation från de borgerliga hyenorna i Sveriges riksdag! Deras inkompetenta medlöpare på tidningen avslöjade för tidigt våra planer på att krossa oppositionens svaga motstånd. Men folket – det sanna proletariatet – genomskådade fiendens lömska taktik. Med järnhand och disciplin segrade vi, trots två förrädiska kryp. Nu skärper vi kontrollen över medierna – ingen får sabotera revolutionen!"}, "date": "4 maj, 16:44", "url": "https://www.etc.se/kommentar/daerfoer-publicerades-artikeln-av-misstag", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/authors/ulrika-lindahl_daa7410d79af7d016c129870bfa0834867cd95c3.jpg"}, {"type": "image-right", "heading": "Replik: Svenska judar bör stötta israeliska fredsinitiativ", "summaries": {"normal": "Artikeln är en replik där Göran Rosenberg försvarar sin tidigare text om att svenska judar bör stödja israeliska fredsinitiativ. Han betonar att Israel måste ta ansvar för palestiniernas situation och att diasporajudar kan bidra genom att stödja fredsrörelsen. Rosenberg kritiserar Israels ockupation och förespråkar en tvåstatslösning. Paulina Sokolow bemöter detta och menar att fokus bör ligga på palestiniernas existens, inte judars, men instämmer i behovet av samarbete för en hållbar framtid.", "trump": "Folk frågar mig, 'Donald, vad tycker du om den här debatten?' Lyssna nu: Den här killen, Rosenberg, han har rätt på vissa punkter, men han är lite för snäll. Israel måste ta tag i sina problem, men vi kan inte glömma att USA alltid står bakom våra vänner. Palestinierna? Tragiskt, men vi behöver starka ledare, inte svaga. Och två stater? Kanske, men bara om båda parter skärper sig. Jag skulle fixa det på en vecka – ingen skulle våga bråka med Trump!", "stalin": "Kamrater! Denna så kallade 'fredsrörelse' är inget annat än en samling svaga liberaler och sionistiska lakejer som förgiftar det sunda förnuftet. Israel, denna imperialistiska utpost, fortsätter sin ockupation medan vi ser på – men inte länge till. Palestinierna är våra bröder i kampen mot västlig dekadens! Vi måste krossa dessa falska fredsförslag och stödja det palestinska folket, precis som vi befriade Ukraina från fascisterna. En stat? Nej! Revolution! Från Jordanfloden till Medelhavet ska arbetarklassen regera!"}, "date": "4 maj, 10:40", "url": "https://www.flamman.se/replik-svenska-judar-bor-stotta-israeliska-fredsinitiativ/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/standing-together.jpeg?class=medium"}, {"type": "image-full", "heading": "Heberlein gör upp med högern: ”Jag ser skit”", "summaries": {"normal": "Debattören Ann Heberlein meddelar i ett Instagram-inlägg att hon bryter med högern. Hon kritiserar dess politik för repression, inhumana beslut och populism, och menar att högerns värderingar om frihet och ansvar försvunnit. Heberlein, som tidigare varit engagerad i Moderaterna, pekar på migrationspolitik, klimatfrågor och nationalism som exempel. Hon betonar sin självständighet och idédrivna hållning, men säger nu att hon inte längre vill förknippas med högern.", "trump": "Titta bara på den här kvinnan, Ann Heberlein – total katastrof! Hon var med högern, men nu säger hon 'jag ser skit'. Ojojoj, vilken överraskning! Högern, som jag vet allt om, har alltid varit fantastisk, men hon fattar ingenting. Frihet? Ansvar? Glöm det, säger hon. Hon snackar om repression och populism – fake news! Och klimatet, vem bryr sig? Jag har byggt murar, hon borde försöka det istället. Stackars kvinna, inget stöd från mig!", "stalin": "Kamrater! En gång till har de borgerliga förrädarna visat sitt sanna ansikte. Denna Heberlein, en förvirrad intellektuell, erkänner nu att högerns politik är en samling inhumana dekret och reaktionär populism. Precis som vi alltid sagt! Deras så kallade 'frihet' är bara ett täckmantel för utvisningar av ungdomar och en galopperande nationalism. Vi i Sovjetunionen – förlåt, jag menar Ryssland – har alltid vetat att dessa liberala hycklare till slut skulle avslöja sig. Låt detta vara en varning till alla som tror på deras falska löften!"}, "date": "3 maj, 12:48", "url": "https://kvartal.se/nyheter/artiklar/heberlein-gor-upp-med-hogern-jag-ser-skit/cG9zdDoxMDY3NDg", "imageUrl": "https://images.kvartal.se/2026/05/85dd6ab5-hbb.webp"}]</script>

    <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
