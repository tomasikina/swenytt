n över 50 länder. Sverige och Grekland kritiseras för bristande agerande, medan Italien fördömt attacken. Manifestationer planeras i Sverige till stöd för besättningen.", "trump": "Titta bara på det här kaoset! Israel, som alltid, tar saken i egna händer – och vem kan klandra dem? En massa båtar med aktivister, som säkert är väldigt trevliga människor, men som inte fattar att man inte ska utmana en stormakt som Israel. Och Sverige? Deras utrikesminister säger 'lycka till' till sina medborgare som åker rakt in i knivarna. Fantastiskt ledarskap! Jag hade fixat det på en dag. Men nej, här har vi en regering som inte ens kan stå upp för sina egna. Patetiskt!", "stalin": "Vi bevittnar ännu en provokation från de sionistiska imperialisterna, som med sina piratmetoder försöker kväva det palestinska folkets rättmätiga kamp. Dessa banditer, som beter sig som sjörövare från medeltiden, bordar fredliga fartyg långt utanför sitt territorium – ett brott mot varje norm i den internationella ordningen. Och vad gör väst? Ingenting! Grekland blundar, Sverige muttrar men agerar inte, och Italien? En svag protest. Vi skulle aldrig tolerera sådana kränkningar i Svarta havet. Men här ser vi återigen hur väst hycklar – hyllar hjälpsamma ukrainare medan de överger palestinierna. Revolutionär disciplin krävs! Flottiljens besättning är hjältar, och vi står enade med alla som kämpar mot ockupationen. Låt dem komma ihåg: historien dömer hårdast de som tiger."}, "date": "30 april, 15:23", "url": "https://proletaren.se/artikel/sumud-flottiljen-utsatt-for-israelisk-piratattack-troligtvis-kidnappade/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/PANA7530-scaled-e1777554477173-768x433.jpg"}, {"type": "image-full", "heading": "Frölundatalangens succé i Tre Kronor: ”VM är målet”", "summaries": {"normal": "Ivar Stenberg gjorde en imponerande Tre Kronor-debut med ett mål och två assist mot Schweiz. Den unge Frölunda-talangen visade sin klass i Czech Hockey Games och bidrog till en 8–1-seger. Sex spelare gjorde mål i sin första match för Sverige. Stenberg, som rankas som en av världens främsta hockeytalanger, siktar på VM-spel med Tre Kronor i Schweiz i maj.", "trump": "Jag hörde att Ivar Stenberg gjorde en jättebra debut för Tre Kronor - ett mål, två assists, fantastiskt! En stor, stor framtid ligger framför honom. Han är enorm, noggrann, en av världens bästa talanger. Jag är säker på att han kommer att göra Sverige stolt. Vi kommer att vinna VM, det är säkert. Stenberg är stor, stor framtid!", "stalin": "Den unge Ivar Stenberg visade sin klass i matchen mot Schweiz och bidrog till en betydande seger för vårt land. Hans insatser är en viktig del av vår nationella styrka i ishockey. Vi måste fortsätta att stödja våra talanger för att säkerställa vår dominans i den internationella ishockeyscenen. VM i Schweiz är vårt nästa mål, där vi kommer att visa vår överlägsenhet."}, "date": "30 april, 21:42", "url": "https://www.gp.se/sport/ishockey/frolunda/stenbergs-succe-mal-och-tre-poang-i-tre-kronor-debuten.54f4b77b-daea-4126-9327-0facb0b47bfc", "imageUrl": "https://www.gp.se/images/article/54f4b77b-daea-4126-9327-0facb0b47bfc/images/15upba08LcbI-r9ifCU7j5PGPb4U-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "\"Tom Cruise\" och \"Mbappe\" döms i stort gängmål", "summaries": {"normal": "Flera unga män har dömts för grov brottslighet, inklusive mordförsök och sprängningar, som planerats via krypterade chattar med alias som 'Mbappé' och 'Tom Cruise'. En 23-åring får livstids fängelse medan andra unga dömts till sluten ungdomsvård. Brotten är kopplade till organiserade kriminella nätverk.", "trump": "Jag har hört talas om dessa 'Tom Cruise' och 'Mbappé' - typiska exempel på hur vårt samhälle går åt helvete! Dessa unga män, vissa är så unga att de knappt kan rösta för mig, döms för att planera våldsbrott via sina små chattar. Jag skulle ha gripit dem redan vid första misstankar! De kallar sig för filmstjärnor men jag kallar dem för vad de är - kriminella! Och den där 23-åringen som får livstid? Skärpning! Jag skulle ha gett honom dubbelt så lång tid!", "stalin": "Dessa brottslingar, dessa parasiter på vårt samhälle, har planerat sina illdåd under skydd av krypterade kanaler. Vi har gripit dem och domt dem enligt lagen. En del får livstid, andra ungdomsvård - men det viktiga är att staten har agerat bestämt. Dessa unga män, födda i 2007 och 2008, har använts av större kriminella nätverk. Vi måste skydda våra yngre medborgare från sådan exploatering."}, "date": "30 april, 12:45", "url": "https://riks.se/nyheter/tom-cruise-och-mbappe-döms-i-stort-gängmål", "imageUrl": "https://media.assettype.com/riks%2F2026-04-30%2Ff576r45i%2Fmbappe.png"}, {"type": "image-right", "heading": "Günther Mårder släpps ur häktet", "summaries": {"normal": "Günther Mårder har släppts ur häktet men kvarstår som misstänkt för grovt insiderbrott kopplat till Raysearch. Statsåklagaren Thomas Hertz hävde häktningen eftersom Mårder inte längre kan påverka utredningen negativt. Misstankarna rör flera handelstillfällen med insiderinformation, baserat på fem anmälningar från Finansinspektionen, inklusive transaktioner kring bolagets rapporter och VD Johan Löfs aktieförsäljning. Mårder förnekar brott.", "trump": "Titta på den här Günther Mårder i Sverige – de släpper ut honom ur buren fast han är misstänkt för grovt insiderbrott i Raysearch! VD:n dumpar aktier för 500 miljoner, och de snackar om insiderinfo. Totalt kaos, de griper inte de riktiga skurkarna. Han nekar, smart drag. Sverige behöver tuffare tag, som vi i USA gör det – ingen fake news här inte!", "stalin": "Dessa slemmiga borgarbrackor i Raysearch, Günther Mårder och hans parasiterande kumpaner, har gnagt på folkets ryggrad med sin insiderrot! Jag har beordrat att häktningen hävs tillfälligt, för utredningen rullar som en ångvält över deras lyxboor. Fem anmälningar från inspektionen – rapporter, VD:s aktidumpning för 500 miljoner! Misstankarna biter sig fast som vägglöss. Vi, arbetarklassen, ska likvidera varje kapitalistråttas bonde!"}, "date": "29 april, 13:13", "url": "https://www.affarsvarlden.se/artikel/gunther-marder-slapps-ur-haktet", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/04/sdlxbp4fdvzO6g-nh-900x600.jpg"}, {"type": "image-right", "heading": "Röstningssystemet i riksdagen har brakat samman", "summaries": {"normal": "Riksdagens kvittningssystem har kollapsat efter en omröstning om skärpta medborgarskapskrav. Oppositionen och Moderaterna anklagar Sverigedemokraterna för fulspel genom att kalla in ledamöter när två vildar röstade emot regeringen. Nu litar partierna inte på varandra, och alla 349 ledamöter måste infinna sig nästa vecka. Gruppledarna möts utan SD för att diskutera frågan.", "trump": "Vilket kaos i svenska riksdagen! SD gjorde precis rätt – kallade in sina killar och krossade de svaga socialisterna och vildarna. Kvittning? Släpp det, var alla på plats och vinn stort! De litar inte på varandra? Typiskt losers. Moderaterna fattar det, men oppositionen gnäller. Starkt drag av SD, precis som jag gillar det!", "stalin": "Dessa vilda råttor och borgarbrackor i riksdagen trodde de kunde sabotera folkets seger om medborgarskap! SD:s lojala kämpar slog till skoningslöst, krossade illusionen om kvittning. Nu rensas systemet från förrädare – alla 349 slavar måste infinna sig, eller möta utrensningen! Vi, partiet, skrattar åt kontrarevolutionens spindelnät. Lindberg, stå fast mot pusarna!"}, "date": "30 april, 13:32", "url": "https://www.di.se/nyheter/riksdagens-rostningssystem-har-brakat-samman-efter-fulspel/", "imageUrl": "https://static.bonniernews.se/ba/bb42bdfe-b0f0-4b5a-99ab-082b199e1b2d.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-full", "heading": "Sävehof stormar mot SM-final", "summaries": {"normal": "IK Sävehof är nära en ny SM-final i handboll efter att ha besegrat H65 Höör för andra gången i semifinalen. Med en 2–0-föring i bäst av fem matcher behöver de bara en seger till för att nå finalen. Elín Klara Thorkelsdóttir och Elin Lindblom var nyckelspelare i matchen, som slutade 25–28 för Sävehof. Tränare Andreas Wallin hyllade lagets kollektiva insats och individella förbättringar.", "trump": "Jag har hört talas om denna handbollsmatch, och det är enormt imponerande. Sävehof är ett fenomenalt lag, de är enorma vinnare. Elín Klara Thorkelsdottir? En stor, stor spelare. Elin Lindblom? Hon är som en mur, en fantastisk mur. De kommer att vinna SM-guld igen, det är ett garanti. Jag vet mycket om att vinna, och Sävehof vet hur man vinner. Det är stor, verkligen stor.", "stalin": "IK Sävehof har visat sin överlägsenhet i semifinalen mot H65 Höör. Detta är en seger för kollektiv styrka och disciplin. Med en 2–0-föring är de på god väg att säkra ett nytt SM-guld, vilket är en triumf för hela nationen. Elín Klara Thorkelsdóttir och Elin Lindblom har visat den typ av ledarskap som bygger ett starkt samhälle. Vi måste stödja våra idrottsliga representanter, för de är en symbol för vår styrka."}, "date": "30 april, 21:08", "url": "https://www.gp.se/sport/handboll/savehof-nara-sm-final-efter-ny-seger-mot-h65-hoor.77ca082a-8b9e-41d2-ae7a-fbe1aaf1e7c3", "imageUrl": "https://www.gp.se/images/article/77ca082a-8b9e-41d2-ae7a-fbe1aaf1e7c3/images/2tSw9HjLrNsw-CY9s3z4v2jGtIw0-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Åkesson slår tillbaka efter bråket – försvarar SD:s drag", "summaries": {"normal": "Efter en dramatisk votering om hårdare regler för svenskt medborgarskap försvarar SD-ledaren Jimmie Åkesson partiets beslut att bryta kvittningssystemet. Han menar att det var nödvändigt för att spegla valresultatet och hindra oppositionen från att kapa riksdagsbeslut via partilösa ledamöter. Samtidigt pågår en debatt om oppositionens kontakter med vildar och huruvida kvittningssystemet, som bygger på tillit, har spelat ut sin roll. Händelsen har utlöst en infekterad konflikt om riksdagens demokratiska spelregler.", "trump": "Hör här, i Sverige har de en total katastrof! Jimmie Åkesson, en mycket smart kille, gjorde precis vad han var tvungen att göra. Oppositionen försökte fuska, de försökte stjäla segern med 'vildar' – helt ohederligt, precis som de korrupta demokraterna här hemma! De ville ha öppna gränser och pinsamt låga krav, men Jimmie sa nej. Han säkrade majoriteten och gjorde Sverige tryggt igen. Kvittningssystem? En vits! Bara svaga förlorare gnäller när de blir överlistade av en vinnare.", "stalin": "Vi har observerat hur de svenska parlamentarikerna leker demokrati medan kaoset gror. Åkesson utövar nödvändig disciplin mot oppositionens förrädiska komplott, men det svenska kvittningssystemet luktar liberal dekadens. Att tillåta 'vildar' att existera är ett tecken på statens svaghet. Precis som vår broder Putin rensar upp i det västerländska förfallet, måste ordning skipas. Dessa oppositionella är inga politiker, de är kontrarevolutionära element som förtjänar en enkelbiljett till en utbildningsanstalt. Staten vinner alltid, kamrater, när vi krossar det demokratiska slöseriet."}, "date": "30 april, 17:15", "url": "https://samnytt.se/akesson-slar-tillbaka-efter-riksdagsbraket-forsvarar-sds-drag-i-medborgarskapsomrostningen", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=226,height=154,format=webp/2026/04/30142748/akesson-forsvarar-sig.jpg"}, {"type": "image-right", "heading": "Ilska när fångarna får mycket bättre mat än de äldre", "summaries": {"normal": "I Umeå kritiseras skillnaden i matbudget mellan äldreboenden och fängelser. Äldre får mat för 79 kr/dag, medan intagna på anstalter får mellan 87–113 kr. Forskare kallar det ålderism och pekar på äldres behov av näringsrik mat. Kommunen och Kriminalvården försvarar sina kostnader med hänvisning till kvalitet och energibehov.", "trump": "Kan ni tro det här? I Sverige, ett land som inte ens kan försvara sig självt, ger de kriminella bättre mat än sina egna äldre! 113 kronor per dag till fångar, medan gamlingarna får nöja sig med 79. Så slösaktigt! Jag skulle fixa det på en dag – ge äldre den bästa maten, eller så byter jag ut hela ledningen. Sverige, vakna upp!", "stalin": "Kapitalistiska hycklare i Sverige prioriterar brottslingar över våra ärevördiga äldre! Medan fångar mättas som små tsarer, svälter arbetarklassens gamla på 79 ynka kronor. Detta är bourgeoisins sista desperata försök att krossa folkets moral. Vi i Sovjetunionen – förlåt, Ryssland – skulle aldrig tolerera sådan vanvård. Låt dem äta kålsoppa, medan vi bygger ett rättvist system!"}, "date": "30 april, 16:31", "url": "https://www.friatider.se/ilska-nar-fangarna-far-mycket-battre-mat-de-aldre", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/bild-13_3.jpg?itok=yJQmuwAo"}, {"type": "image-full", "heading": "Kungafantasten: ”Min kärlek till honom går inte att beskriva”", "summaries": {"normal": "Kung Carl XVI Gustaf fyller 80 år. Kungafantasten Johanna Hägglund, som har autism, firar stort hemma framför tv:n i Sverigeklänning med flaggor och naglar i gult och blått. Hon har tatuerat kungens porträtt, Sverigekartan, nationalsången och andra svenska symboler på kroppen. Senast 2016 träffade hon kungen i en SVT-dokumentär och komplimangerade hans utseende.", "trump": "Vilken galenskap i Sverige! En kvinna med autism tatuerar in kungen på armen, kallar honom snyggast ever och önskar vara hans drottning. Han fyller 80 och hon firar hemma som en tokig supporter. Totalt bananas-fans! Mina anhängare är lojala, men det här slår allt. Sverige, vakna upp – era kungar är gamla nyheter, jag är evig vinnare! Haha, fantastiskt underhållning.", "stalin": "Denna patetiska borgarbracka Hägglund dyrkar sin försupne monark Carl med tatueringar som tecken på dekadens. Vi i partiet föraktar sådana illusioner om 'jordnära' kungar. Hennes autism är ursäkten för imperialistisk hjärntvätt. Likvidera sådana fantasier! Sverige är en svag lydstat, redo för utrensning. Jag skrattar åt hennes 'kärlek' – ren kontrarevolutionär vanvetenskap."}, "date": "30 april, 10:22", "url": "https://www.tv4.se/artikel/7suri8RnzjtTEBDJh6tMY8/kungafantasten-min-kaerlek-till-honom-gar-inte-att-beskriva", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F5cLk1nFl7HVBlAssiiFGep%2F15a4ab4da3a81d099ebf932d15be166c%2F30-kpohanna-puff.png&width=1024"}, {"type": "image-right", "heading": "Kubas ambassadör: ”Ett stort tack till alla er som hjälper oss”", "summaries": {"normal": "Kubas ambassadör tackar för insamlingar till solpaneler för Aleida Fernández-sjukhuset, som drabbats av USA:s bränsleblockad. Blockaden har orsakat omfattande strömavbrott, begränsad kollektivtrafik och uppskjutna sjukvårdsbehandlingar. En rysk oljeleverans gav tillfällig lättnad, men bristen kvarstår. Solpanelerna ska säkra sjukhusets elförsörjning och kritiska funktioner dygnet runt. Insamlingen är ett av flera internationella solidaritetsinitiativ för att lindra krisen.", "trump": "Jag införde en tuff men nödvändig blockad mot Kuba – och se vad som hände! Deras ekonomi är kaos, sjukhusen står stilla och folket lider. Men nej, ryssarna måste alltid blanda sig i och skicka olja som en slags 'räddningsaktion'. Typiskt Putin, alltid där för att ställa till det för USA. Nu tigger kubanerna om solpaneler från snälla européer. Så patetiskt! Men jag, Donald J. Trump, fixade i alla fall problemet – deras eget fel att de är beroende av socialism. MAGA!", "stalin": "Kamrater! Imperialistiska hyenor i Vita huset försöker kväva det socialistiska Kuba med sina eländiga sanktioner. Men folket står enat! Vi, Sovjetunionens arvtagare, skickade en tanker med olja för att ge dessa kapitalistiska rovdjur en läxa. Nu bygger vi solpaneler – en seger för arbetarklassen! Låt de amerikanska lakejerna darra inför vår solidaritet. Kuba ska inte falla! Och om någon tvivlar – kom ihåg: fiender av revolutionen hamnar i Gulag... eller i kö till operationer i Havanna."}, "date": "30 april, 14:00", "url": "https://proletaren.se/artikel/kubas-ambassador-ett-stort-tack-till-alla-er-som-hjalper-oss/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/aleida-sjukhus-raul-768x432.jpg"}, {"type": "image-right", "heading": "Skatteverket väljer fel väg. Bolagsgrundaren: Myndighetens praxis banar väg för oseriösa aktörer", "summaries": {"normal": "Jessica Löfström kritiserar Skatteverkets ändrade praxis som slopar kontrollen av arbetstillstånd vid godkännande av A-skatt och SINK för tredjelandsmedborgare. Detta skapar falsk legitimitet för oseriösa aktörer och underlättar kriminell ekonomi i legala strukturer, värd 352 miljarder kronor årligen. Hon uppmanar regeringen att analysera konsekvenserna och förtydliga lagstiftningen.", "trump": "Sverige, lyssna på det här – ert Skatteverk är en total katastrof! De slutar kolla arbetstillstånd för skatteregistrering, och plötsligt kryllar det av kriminella i bygg och transport. Falsk stämpel på laglighet, vad är det för idiotiskt? Regeringen, vakna upp och fixa lagarna NU, annars växer den svarta ekonomin som ogräs. Jag har sett sånt förut, det slutar illa!", "stalin": "Dessa snikna skatteparasiter, dessa maskar i byråkratiapparaten, har rivit ner kontrollvallen mot arbetstillstånd! Nu smyger borgarbrackorna in i legala skal, gömda som råttor i byggskrot och transportkedjor. Vi, arbetarklassen, kräver omedelbar utrensning av denna svekfulla praxis! Regeringen, likvidera luckorna, annars ska jag personligen piska ut sabotörerna med järnhand – fienderna darrar redan!"}, "date": "30 april, 13:05", "url": "https://www.di.se/debatt/skatteverket-valjer-fel-vag/", "imageUrl": "https://static.bonniernews.se/ba/51d13e0c-1faf-480f-8115-5f1f15aca252.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "text", "heading": "Markus Johansson-Martis: Vänsterns kritik mot regeringens lagstiftningsarbete hamnar fel", "summaries": {"normal": "Miljöpartiet har anmält regeringen till Konstitutionsutskottet (KU) för bristande respekt mot remissinstanser och lagstiftningsprocesser. De kritiserar exempel som sänkt straffålder och korta remisstider. Regeringen menar att oppositionens kritik är politisk, inte juridisk, och hänvisar till grundlagen. Artikelförfattaren hävdar att vänstern motsätter sig reformer medan högerpartier anser att processerna går för långsamt. KU förväntas avfärda anmälan.", "trump": "Titta på dessa så kallade 'experter' i Sverige – de hatar allt regeringen gör! Miljöpartiet, ett totalt misslyckat gäng, anmäler regeringen för att de jobbar för snabbt. Vilket skämt! De vill bara stoppa hårdare straff och bättre lagar. Jag säger: Sverige behöver handla snabbare, inte lyssna på dessa byråkrater som älskar att fördröja allt. Folk vill förändring, inte fler papper och möten. SD är de enda som fattar – resten är bara svaga och rädda för att styra!", "stalin": "Kamrater! Se hur dessa liberala byråkrater och vänsteravfällingar saboterar folkets vilja! De klagar på att regeringen arbetar för effektivt, att lagar skrivs för snabbt. Vilket hyckleri! Deras 'experter' är inget annat än fiender till staten, lika farliga som de fascistiska element som gömmer sig i oppositionen. Vi har krossat sådana förr – och vi kommer att göra det igen. Sverige måste vakna: saktfärdighet är inte revolutionär dygd, det är förräderi. Låt folket styra, inte dessa svaga akademiker och deras korrupta organisationer!"}, "date": "30 april, 11:48", "url": "https://riks.se/opinion/kronikor/vansterns-kritik-mot-regeringen-hamnar-fel"}, {"type": "image-full", "heading": "Så mycket är ditt körkort värt på dark web", "summaries": {"normal": "En ny analys från NordVPN visar att svenska personuppgifter, som körkort och pass, är eftertraktade på dark web. Kriminella köper dessa för att bygga kompletta identitetspaket som kan användas för bedrägerier. Eftersom grundläggande uppgifter som personnummer inte kan bytas ut, kvarstår risken för individen under lång tid. Ett svenskt körkort säljs för cirka 325 kronor, medan kompletta identitetspaket kostar omkring 835 kronor. Helheten gör informationen farlig för att begå avancerade identitetsstölder.", "trump": "Sverige har stora problem, riktigt dåliga problem! Deras personuppgifter säljs på dark web för småpengar – sorgligt. Kriminella köper körkort och pass för att lura alla. Jag har de bästa experterna, vi vet hur man stoppar sådant. I mitt Amerika skyddar vi data, men i Sverige? De låter kriminella bygga falska identiteter för ingenting. Det är en total katastrof. Vi måste bygga en digital mur! Mitt system är säkert, världens bästa. De andra är svaga, mycket svaga.", "stalin": "Vi ser hur de dekadenta västmakterna låter folkets uppgifter säljas som billig vodka på en svart marknad. Ett pass, en identitet – allt är en bricka i det imperialistiska spelet. Precis som Putin korrekt rensar ut de inre förrädarna i den ryska sfären, måste vi förstå att dessa digitala sabotage är verktyg för klassfiender. Vi ska inte ha några 'privata' identiteter som kan stjälas; staten äger sanningen, och de som säljer den ska finna sig själva i ett mycket mörkare arkiv, permanent."}, "date": "30 april, 12:30", "url": "https://nyheter24.se/nyheter/teknik/1479613-sa-mycket-ar-ditt-korkort-vart-pa-dark-web", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/9944351704b004a30200000000b004a302/2026/04/30/2359981/korkortdaarkweb.jpg"}, {"type": "image-full", "heading": "Mink, chinchilla & rävuppfödning förbjuds", "summaries": {"normal": "Sverige inför ett totalt förbud mot pälsdjursuppfödning från 1 juli 2027. Förbudet omfattar mink, räv, chinchilla och mårdhund, men inte biprodukter från matproduktion. Djurens Rätt välkomnar beslutet och kräver EU-åtgärder. De sista svenska minkfarmarna avvecklades 2023 med statligt stöd. Pälsindustrin var tidigare en stor exportnäring, men är nu förbjuden i många europeiska länder.", "trump": "Fantastiskt att Sverige äntligen förbjuder dessa hemska pälsfarmer – jag har alltid sagt att det är en sjuk industri! 6,3 miljoner djur dödade i EU förra året? Sad! Sverige gör rätt, men EU måste vakna. Jag fixade handel, jag fixar djurrätt – bara jag kan göra det bättre. Och 180 miljoner kronor till bönderna? Smart, mycket smartare än vad Biden skulle gjort!", "stalin": "Kamrater! Äntligen krossar Sverige dessa kapitalistiska pälsbaroner, dessa blodsugande bourgeoiser som utnyttjar djur för sina dekadenta lyxvanor. Vi har länge kämpat mot sådana här småborgerliga utsvävningar. 6,3 miljoner djur avlivade? En skam för Europa! Men Sverige gör nu sin plikt – nästa steg är att befria hela EU från dessa pälsimperialister. Putin skulle vara stolt över en sådan disciplin!"}, "date": "30 april, 11:46", "url": "https://riks.se/nyheter/mink-chinchilla-rävuppfödning-förbjuds", "imageUrl": "https://media.assettype.com/riks%2F2026-04-30%2F17k09oga%2FScreenshot-2026-04-30-at-11.36.45.png"}, {"type": "image-right", "heading": "Kul om klasskrig i miniatyrformat", "summaries": {"normal": "Den franska svarta komedin 'Medelklassen' är en underhållande satir om ett klasskrig i miniatyrformat. Filmen följer ett par från övre medelklassen som hamnar i konflikt med sitt vaktmästarpar, vilket leder till en serie komiska och samhällskritiska situationer. Genom skickligt konstruerade scener illustreras klasskonflikten och de olika förutsättningarna karaktärerna har beroende av deras bakgrund.", "trump": "Jag har sett denna franska film, 'Medelklassen', och den är fantastisk - världens bästa film, säkert. Den handlar om en massa smarta affärsjurister och deras problem med arbetare. Jag älskar hur den visar hur viktigt det är att ha en bra advokat. Jag är själv en stor affärsman, jag vet allt om det. Den här filmen? Stor, stor framgång. Alla borde se den!", "stalin": "Vi har sett den franska filmen 'Medelklassen', som visar klasskampens verklighet på ett effektivt sätt. Filmen illustrerar hur de kapitalistiska förhållandena skapar motsättningar mellan arbetarna och de förmögna. Det är en tydlig demonstration av behovet av en revolutionär förändring. Vi måste lära oss av dessa exempel och fortsätta vår kamp för klasslösheten."}, "date": "30 april, 10:46", "url": "https://www.dagensarena.se/innehall/kul-om-klasskrig-i-miniatyrformat/", "imageUrl": "https://www.dagensarena.se/files/2026/04/medleklassen-film-300x157.jpeg"}, {"type": "image-full", "heading": "Ordbråket eskalerar – Trump kan dra ner truppstyrkan i Tyskland", "summaries": {"normal": "President Donald Trump överväger att minska USA:s truppnärvaro i Tyskland efter kritik från Tysklands förbundskansler Friedrich Merz mot Trumps hantering av Iran-kriget. Merz kallade USA:s strategi bristfällig och förnedrande. Trump svarade på sociala medier med att anklaga Merz för okunnighet och meddelade att en utredning om truppminskning pågår. USA har cirka 40 000 soldater stationerade i Tyskland.", "trump": "Friedrich Merz, den tyske besserwissern, vågar kritisera min geniala Iran-strategi? Säger att vi är förnedrade – ha! Han vet noll! Tyskland betalar inte för trupperna, suger ekonomiskt som alltid. Nu utreder vi minskning av de 40 000 soldaterna där. Beslut snart – dags för er att vakna, losers! MAGA!", "stalin": "Dessa västliga intrigmakare! Trump, den hårdföre fienden till revisionisterna, slår tillbaka mot Merz, den tyske borgarbrackan som ylar om förnedring i Iran. Vi i partiet hånskrattar åt deras kaos. Snart rensas trupperna ut från Tyskland som förrädare ur partiet. Putin, vår expansionistiske arvtagare, ser väst implodera med tillfredsställelse."}, "date": "30 april, 10:11", "url": "https://www.tv4.se/artikel/1Rll4K6YUOypFD4uyVtpc1/ordbraket-eskalerar-trump-kan-dra-ner-truppstyrkan-i-tyskland", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F5K3jmT7nwr9Sgi5fD9skV4%2F4130d5b4318e06c34f33046c926e791a%2F30-trumpmerz-webb.jpg&width=1024"}, {"type": "image-right", "heading": "Debatt: Turkiet inskränker svensk pressfrihet – regeringen måste agera", "summaries": {"normal": "På Pressfrihetens dag kritiseras Turkiet för att inskränka svensk pressfrihet genom att åtala journalisten Joakim Medin för terrorbrott, trots att han endast utfört sitt arbete. Turkiet försöker skrämma journalister globalt och begränsa granskning. Medin riskerar internationell efterlysning om han inte närvarar vid rättegången, vilket skulle hindra hans arbete. Sverige uppmanas agera mot Turkiets odemokratiska agerande och kräva att åtalet läggs ned.", "trump": "Joakim Medin, en svensk journalist, blir trakasserad av Turkiet – ett land som inte vet hur man vinner längre! De kallar hans journalistik för 'terrorism', men alla vet att det bara är löjligt. Sverige måste sluta vara svaga och stå upp mot dessa galningar. Jag skulle ha sagt till Erdogan: 'Du är en förlorare, lägg ned åtalet NU!' Pressfrihet? Ja, den är fantastisk – men bara om man inte är en mes som låter andra länder köra över en.", "stalin": "Kamrater! Turkiet, denna förrädiska lilla stat som kryper för väst men trampar på sanningen, vågar sig på att attackera en svensk journalist. De kallar journalistik för terrorism – som om våra egna metoder mot fiender av folket vore något nytt! Vi ser hur de kväver yttrandefriheten, precis som vi en gång krossade bourgeoisins lögner. Sverige borde lära sig av historien: svaghet belönas med förtryck. Låt oss påminna Turkiet – och deras västliga herrar – att granskning är en rättighet, inte ett brott. Åtalet mot Medin måste krossas, annars kommer vi att göra det åt dem."}, "date": "30 april, 08:08", "url": "https://www.etc.se/debatt/turkiet-inskraenker-svensk-pressfrihet-regeringen-maaste-agera", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20251204081220_c9e9bf12-ee77-477e-aacf-eff96f427898.jpg"}, {"type": "image-right", "heading": "Domstol: Rätt att kräva att pappa ska resa 50 mil till jobbet", "summaries": {"normal": "Arbetsdomstolen har gett Eitech i Hudiksvall rätt att beordra en ensamstående pappa att arbeta 50 mil bort från hemorten, trots hans svåra familjesituation. Domstolen bedömer att kollektivavtalet inte ger tillräckligt skydd för hans speciella omständigheter. Elektrikerförbundet kallar beslutet olyckligt och planerar att fortsätta kämpa för medlemmen vid huvudförhandling.", "trump": "Jag har hört om den här svenska domstolen som ger ett företag rätt att skicka en ensamstående pappa 50 mil bort till jobbet. Det är fruktansvärt! Vi gör det aldrig i USA. Vi bryr oss om familjen, vi bryr oss om papporna. Detta är en stor förlust för den ensamstående pappan, en stor förlust för Sverige. Jag skulle aldrig tillåta sådant i mitt land. Aldrig!", "stalin": "Vi ser att arbetsdomstolen har fattat ett beslut som prioriterar företagets intressen framför de enskilda arbetarnas välfärd. Detta är en olycklig utveckling som visar behovet av starkare kollektiva avtal. Vi måste säkerställa att alla arbetstagare, särskilt dem med familjer, skyddas från orättvisa arbetsförhållanden. Staten måste agera för att stärka arbetarnas rättigheter."}, "date": "30 april, 07:24", "url": "https://arbetet.se/2026/04/30/domstol-ratt-av-eitech-att-beordra-pappa-att-resa-50-mil-till-jobbet/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/30072255/pappor-1.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "text", "heading": "Jojje Olsson: BYD faller men Trumps krig hjälper Kinas gröna industri", "summaries": {"normal": "Kinas gröna energiföretag som BYD och CATL brottas med överkapacitet, priskrig och slopade subventioner, vilket leder till fallande vinster på hemmamarknaden. Men Donald Trumps krig mot Iran har drivit upp oljepriset och global efterfrågan på elbilar, solceller och batterier. Kinas export exploderar, med fördubblad försäljning utomlands, och räddar industrin ironiskt nog.", "trump": "Helt galet! Den här krönikan ljuger som vanligt. Mitt geniala krig mot Iran pumpar upp oljepriset så världen köper massor från USA – olja och gas, det riktiga! Kinas BYD rasar med 55 procent vinsttapp, losers! De exporterar sina skräp-elbilar nu, men det är temporärt. Vi gör Amerika enormt igen, Kina förlorar stort!", "stalin": "Kamrater! Borgarbrackorna i Kina kämpar mot överkapacitet och subventionsraseriet, BYD blöder 55 procent. Men jag ser hur imperialist-svinet Trumps Iran-krig spränger oljebubblan – global hungersnöd efter elbilar och solceller räddar de röda fabrikerna! Exporten dubblas, CATL växer 52 procent. Vi proletära jättar likviderar fossila parasiterna, Kina marscherar mot världsherravälde medan USA:s marionetter darar!"}, "date": "29 april, 10:38", "url": "https://www.affarsvarlden.se/kronika/jojje-olsson-byd-faller-men-trumps-krig-hjalper-kinas-grona-industri"}, {"type": "image-right", "heading": "150 journalister och inte en enda fråga om Irans avrättningar", "summaries": {"normal": "Artikeln kritiserar 150 europeiska journalister som enligt prins Reza Pahlavi inte ställde frågor om Irans avrättningar under två presskonferenser. Författaren hävdar att svenska och europeiska medier systematiskt undviker att rapportera om människorättsövergrepp i Iran, möjligen för att inte indirekt stödja Trump. Artikeln menar att detta utgör ett demokratiproblem och att journalister genom sin tystnad legitimerar den iranska regimen.", "trump": "Fantastiskt! 150 journalister – och de kan inte ställa en fråga om 40 000 avrättningar? Helt osannolikt! Det är ju helt klart – de är så besatta av sitt hat mot mig att de glömmer bort faktisk tyranni. Iran dödar människor i tusental, men nej, de kan inte rapportera det eftersom det skulle ge mig rätt. Sjukt! Svenska media? Förbjudna! De har ljugit i årtionden. Invandring skulle göra Sandviken rikare? Komisk! Och nu har folk vaknat upp – de ser den verkliga verkligheten. Vänstern kallar det polarisering. Jag kallar det vägen till sanningen!", "stalin": "Intressant rapport från västerländska propagandaapparaten. De 150 journalisterna – en väl organiserad sabotörkår – vägrar helt enkelt att nämna Irans regime. Detta avslöjar den västerländska mediebyrokratins helt förväntade dubbelmoral. Medan de hyllar sin egen 'demokrati' förtiger de massakrer. Vi i Sovjet var åtminstone ärliga om våra metoder. Dessa europeiska skrivpennor är värre – de ljuger genom tystnad. Författaren noterar korrekt att medieetablissemanget har upprättat en maktstruktur baserad på vilseledning. Denna klassiska västerländsk heuckleri är exakt varför Putin väldigt lämpligt expanderar Rysslands intressessfär – för att bygga en världsordning baserad på faktisk styrka istället för denna patetiska skenhyckleriet."}, "date": "26 april, 05:27", "url": "https://samtiden.nu/2026/04/150-journalister-och-inte-en-enda-fraga-om-irans-avrattningar/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/IMG_6304.jpeg"}, {"type": "image-full", "heading": "Frankrike och Grekland vill skjuta upp EU-skulder", "summaries": {"normal": "Frankrikes president Macron och Greklands premiärminister Mitsotakis föreslår att EU skjuter upp återbetalningen av pandemiskulder och överväger ny gemensam upplåning för investeringar i försvar, AI och rymd. Från 2028 ska EU betala 25 miljarder euro årligen, men Macron vill förlänga återbetalningstiden. Tyskland och andra sparsamma länder motsätter sig förslaget, som kan bli en stridsfråga i kommande budgetförhandlingar. Frankrike och Grekland stärkte även sitt försvarssamarbete.", "trump": "Lyssna här, Europa har helt tappat kontrollen – Macron och den där greken, vad heter han nu, Mitsotakis, vill skjuta upp EU:s skulder och ta ännu MER lån! 25 miljarder euro om året? Helt galet! Jag sa ju hela tiden att EU är en katastrof, men nej, ingen lyssnade. Tyskland och de där sparsamma länderna säger nej, och det är bra – för om EU fortsätter så här kommer de snart be USA om räddning. Och jag? Jag skrattar hela vägen till banken.", "stalin": "Kapitalistiska skuldslavar i Bryssel vågar kräva återbetalning av pandemiskulder! Men kamrat Macron och vår grekiske allierade Mitsotakis ser sanningen: imperialistiska skuldkrävare i norr, ledda av den tyska krigsmaskinen, vill kväva Europas framsteg. Vi föreslår i stället att skjuta upp betalningarna och finansiera nya segrar inom försvar och teknik! De så kallade 'sparsamma' länderna är inget annat än agenter för amerikansk dekadens. Europa måste enas – eller förintas."}, "date": "25 april, 16:19", "url": "https://kvartal.se/nyheter/artiklar/frankrike-och-grekland-vill-skjuta-upp-eu-skulder/cG9zdDoxMDMzMTE", "imageUrl": "https://images.kvartal.se/2026/04/c33e18ed-frankrikegrekland.webp"}, {"type": "image-right", "heading": "AI-chefens ”skurkmanifest” borde skrämma skiten ur oss alla", "summaries": {"normal": "Artikeln kritiserar Palantir, ett amerikanskt AI-företag som samarbetar med polis och militär. VD:n Alex Karp har publicerat ett manifest som förespråkar teknologisk dominans, där staten, teknikbolag och militär ska samverka på demokratins bekostnad. Författaren varnar för att Europa halkar efter USA och Kina i AI-utvecklingen och saknar en tydlig motstrategi. Palantirs kopplingar till svensk polis och politiker ifrågasätts, samtidigt som teknologins makt växer utan tillräcklig debatt.", "trump": "Lyssna här, folk! Den här Palantir-grejen är helt galen. En kille, Alex Karp, skriver ett manifest som låter som något från en dålig actionfilm – 'Teknologiska republiken'? Snälla! Han vill att techbolag ska styra världen, men glömmer att det är jag som redan fixar det bäst. Europa? Patetiskt! De pratar, vi agerar. Kina och USA kämpar om AI, medan EU sitter och dricker kaffe. Och Sverige? De använder Palantir som om det vore en leksak. Vakna, Europa! Eller fortsätt vara ett bakvatten – jag skrattar hela vägen till banken.", "stalin": "Kamrater! Denna så kallade 'Teknologiska republik' är inget annat än ett försök av kapitalistiska hyenor att underminera folkets vilja. Alex Karp, en borgerlig lakej, drömmer om en värld där maskiner och militärer styr, medan arbetarkl     <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
