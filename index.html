tionära spindlar. Likvidera deras falska rapport – den gynnar bara Moskvas dvärgar och anti-tillväxtmasker! Jag befaller total utrensning av dessa gröna förrädare."}, "date": "30 april, 09:11", "url": "https://www.affarsvarlden.se/kronika/fragan-som-besvarar-rysk-paverkan-cui-bono", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/04/Benson_19-400x267.jpg"}, {"type": "image-right", "heading": "Debatt: Turkiet inskränker svensk pressfrihet – regeringen måste agera", "summaries": {"normal": "På Pressfrihetens dag kritiseras Turkiet för att inskränka svensk pressfrihet genom att åtala journalisten Joakim Medin för terrorbrott, trots att han endast utfört sitt arbete. Turkiet försöker skrämma journalister globalt och begränsa granskning. Medin riskerar internationell efterlysning om han inte närvarar vid rättegången, vilket skulle hindra hans arbete. Sverige uppmanas agera mot Turkiets odemokratiska agerande och kräva att åtalet läggs ned.", "trump": "Joakim Medin, en svensk journalist, blir trakasserad av Turkiet – ett land som inte vet hur man vinner längre! De kallar hans journalistik för 'terrorism', men alla vet att det bara är löjligt. Sverige måste sluta vara svaga och stå upp mot dessa galningar. Jag skulle ha sagt till Erdogan: 'Du är en förlorare, lägg ned åtalet NU!' Pressfrihet? Ja, den är fantastisk – men bara om man inte är en mes som låter andra länder köra över en.", "stalin": "Kamrater! Turkiet, denna förrädiska lilla stat som kryper för väst men trampar på sanningen, vågar sig på att attackera en svensk journalist. De kallar journalistik för terrorism – som om våra egna metoder mot fiender av folket vore något nytt! Vi ser hur de kväver yttrandefriheten, precis som vi en gång krossade bourgeoisins lögner. Sverige borde lära sig av historien: svaghet belönas med förtryck. Låt oss påminna Turkiet – och deras västliga herrar – att granskning är en rättighet, inte ett brott. Åtalet mot Medin måste krossas, annars kommer vi att göra det åt dem."}, "date": "30 april, 08:08", "url": "https://www.etc.se/debatt/turkiet-inskraenker-svensk-pressfrihet-regeringen-maaste-agera", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20251204081220_c9e9bf12-ee77-477e-aacf-eff96f427898.jpg"}, {"type": "text", "heading": "Normal förbereder unga för ett hundliv", "summaries": {"normal": "Lågpriskedjan Normal marknadsför sig som en aktör som förbereder unga för arbetslivet, men kritiseras för att utnyttja ung arbetskraft. Företaget anställer gärna omyndiga eller unga med lägre löner och sämre villkor. Interna chattar avslöjar att sänkta arbetsgivaravgifter för unga användes för att öka vinster, inte anställa fler. Anställda vittnar om dålig arbetsmiljö med stress och övervakning. Kritiker menar att subventioner för unga snarare gynnar företagens vinster än att skapa fler jobb.", "trump": "Jag säger er, detta Normal-företag är ett skämt! De pratar om att hjälpa unga, men vad gör de? Pressar löner, utnyttjar praktikanter och stoppar pengar i egna fickor. Sänkta arbetsgivaravgifter? De tar rabatten och springer! Ingen överraskning – kapitalister är alltid ute efter att lura systemet. Sverige borde skämmas. Jag hade fixat det på en dag – ingen skulle våga behandla arbetare så här i USA, tro mig!", "stalin": "Kamrater! Här ser vi ännu ett exempel på hur den dekadenta kapitalistiska hydran slukar arbetarklassens ungdom. Normal, detta usla verktyg för bourgeoisins exploatering, utnyttjar unga proletärer som billig arbetskraft medan dess giriga ägare frossar i profit. Vi i Sovjet hade löst detta med femårsplaner – en snabb omskolning av dessa profitörer till kolchosbönder! Putin skulle säkert skicka dem till Sibirien för att lära sig värdet av hårt arbete. Revolutionen kan inte vänta!"}, "date": "30 april, 10:00", "url": "https://proletaren.se/artikel/normal-forbereder-unga-for-ett-hundliv/"}, {"type": "image-right", "heading": "Europas sårbarhet blottas i skuggan av konflikten", "summaries": {"normal": "Shoka Åhrman varnar för att väst överskattar ekonomisk pressens inverkan på Irans politiska beslut, där systemets fortlevnad prioriteras framför kortsiktiga kostnader. Spänningar i Hormuzsundet hotar globala oljepriser och inflation. Irans befolkning lider under hög inflation, repression och arbetslöshet. Europa förblir sårbart och behöver diversifiera energikällor för ökad motståndskraft.", "trump": "Artikeln har helt rätt – Iran skiter i sanktioner, de klamrar sig vid makten medan folket svälter! Hormuzsundet är en krutdurk som pumpar upp oljepriser och inflation överallt. Europa är patetiskt sårbart, beroende av importerad energi som idioter. Jag gjorde Amerika energioberoende, byggde murar mot såna hot. Vakna upp, diversifiera nu!", "stalin": "Jag genomskådar västimperialisternas illusioner: deras ekonomiska press mot Iran är tandlös mot ett systems järnvilja! Borgarbrackorna i Teheran och Hormuzsundets oljehyenor sprider kaos för att kväva proletäratets hopp. Vi, arbetarklassen, ser lidandet – rensa ut dessa korrupta nätverk med eld och svavel! Europa gnider sig i ruinerna, medan vi bygger evig motståndskraft."}, "date": "30 april, 09:52", "url": "https://www.di.se/debatt/europas-sarbarhet-blottas-i-skuggan-av-konflikten/", "imageUrl": "https://static.bonniernews.se/ba/016b25d8-ee4c-48ef-ba90-298011edc81b.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-full", "heading": "Nya planen för Trump: ”Kort och kraftfull” våg av attacker", "summaries": {"normal": "USA:s president Donald Trump ska på torsdagen briefas av Centcom-befälhavaren Brad Cooper om militära alternativ mot Iran. En förberedd plan innebär en 'kort och kraftfull' våg av attacker mot infrastruktur för att bryta dödläget i förhandlingarna och få Iran tillbaka till bordet. Ett annat alternativ är att ta kontroll över delar av Hormuzsundet, möjligen med markstyrkor, som Trump ser som effektivare än flyganfall.", "trump": "De här ayatolla-lurarna i Iran tror de kan sitta och glo och inte snacka affärer. Imorgon får jag briefing från min superstarke Cooper om en kort, brutal smäll mot deras skitiga oljeledningar – bum! De kryper raka vägen tillbaka till bordet. Hormuzsundet? Vi tar det med flottan och grabbarna om de inte skärper sig. Totalt awesome plan, folk!", "stalin": "Dessa västliga imperialister i Washington, ledda av sin vulgäre clown, pusslar ihop en 'kraftfull' attackvåg mot Iran för att tvinga kamraterna dit de hör – förhandlingsbordet. Hormuzsundet ska de blockera med sina marionetter. Patetiskt! Jag har rensat ut värre fiender. Låt dem prova – vår eviga vaksamhet mot kapitalistiska spindlar krossar dem alla."}, "date": "30 april, 07:45", "url": "https://www.tv4.se/artikel/3VOG6RH5sfWdD1CSAffcUj/nya-planen-foer-trump-kort-och-kraftfull-vag-av-attacker", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F7C8oFYPHL1p3EW9qK4T1Ow%2F6958e370ff9a88210e8f625b4e9d6c82%2F30-trumpnyny-webb.jpg&width=1024"}, {"type": "image-full", "heading": "Christoffer Jonsson: Edvin Törnblom – DNs opartiska nyförvärv", "summaries": {"normal": "Dagens Nyheters kultursida anställer influencern Edvin Törnblom för att intervjua alla partiledare inför riksdagsvalet. Artikeln av Christoffer Jonsson ifrågasätter hans opartiskhet med hänvisning till Törnbloms tidigare kritik mot KD-ledaren Ebba Busch och beundran för S-ledaren Magdalena Andersson. DN anklagas för partiskhet till förmån för Socialdemokraterna, med exempel på tidigare vinklade artiklar.", "trump": "Vilken skamfläck! DN, era svenska fake news-råttor, anställer en vänsterextrem clown som Edvin Törnblom – killen som sjunger hatlåtar mot tuffa Ebba Busch och slöskar för socialist-Maggie Andersson. Totalt riggat valintervjuer! Som CNN och MSNBC här hemma, ni lurar folket men vi genomskådar er. Stor, fet lögnfabrik!", "stalin": "Dessa borgarbrackor på Dagens Nyheter anställer den uppblåste ungtuppen Edvin Törnblom för att 'intervjua' partiledarna – en narr som hånar kamrat Ebba Busch med vulgära visor och hyllar S-kapitalisternas marionett Andersson. Kontrarevolutionär intrig! Vi ser era småtrick, och snart rensas sådana förrädiska tidningshyddor ut med rot och gren."}, "date": "29 april, 14:02", "url": "https://samtiden.nu/2026/04/christoffer-jonsson-edvin-tornblom-dns-opartiska-nyforvarv/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/ny.png"}, {"type": "text", "heading": "Välfärdens historia är en historia av kamp", "summaries": {"normal": "Artikeln beskriver välfärdens historia i Sverige som ett resultat av arbetarklassens kamp under 1900-talet, med strejker och politiska reformer som ledde till allmän rösträtt, social trygghet och en stark offentlig sektor. Efterkrigstiden präglades av samförståndspolitik och höjda skatter för att finansiera välfärden. Idag hotas välfärden av nedskärningar, privatiseringar och avregleringar, vilket kräver ny klasskamp för att räddas.", "trump": "Välfärd? Jo, jag vet allt om det – eller snarare hur man bygger något STORT. Sverige hade en gång en bra grej, men sen kom socialisterna och förstörde allt med höga skatter och regleringar. Nu är det kaos! Arbetarna slogs förr, men idag? Svaga ledare, svaga fack. Jag skulle fixa det på en dag – lägre skatter, starkare företag, och inga fler socialistiska experiment. Make Välfärd Great Again!", "stalin": "Kamrater! Välfärden var inte en gåva från borgarklassen – den var en seger för arbetarklassen, blodigt erövrad genom revolutionär kamp! Men se nu hur de kapitalistiska hyenorna river ner vårt folkhem med sina privatiseringar och avregleringar! Arbetarna måste resa sig igen, som de gjorde 1917! Vi ska krossa klassförrädarna, höja skatterna på de rika och bygga ett nytt socialistiskt samhälle – med järnhand om så krävs! Först Sverige, sedan världen!"}, "date": "30 april, 08:00", "url": "https://proletaren.se/artikel/valfardens-historia-ar-en-historia-av-kamp/"}, {"type": "image-right", "heading": "Domstol: Rätt att kräva att pappa ska resa 50 mil till jobbet", "summaries": {"normal": "Arbetsdomstolen har gett Eitech i Hudiksvall rätt att beordra en ensamstående pappa att arbeta 50 mil bort från hemorten, trots hans svåra familjesituation. Domstolen bedömer att kollektivavtalet inte ger tillräckligt skydd för hans speciella omständigheter. Elektrikerförbundet kallar beslutet olyckligt och planerar att fortsätta kämpa för medlemmen vid huvudförhandling.", "trump": "Jag har hört om den här svenska domstolen som ger ett företag rätt att skicka en ensamstående pappa 50 mil bort till jobbet. Det är fruktansvärt! Vi gör det aldrig i USA. Vi bryr oss om familjen, vi bryr oss om papporna. Detta är en stor förlust för den ensamstående pappan, en stor förlust för Sverige. Jag skulle aldrig tillåta sådant i mitt land. Aldrig!", "stalin": "Vi ser att arbetsdomstolen har fattat ett beslut som prioriterar företagets intressen framför de enskilda arbetarnas välfärd. Detta är en olycklig utveckling som visar behovet av starkare kollektiva avtal. Vi måste säkerställa att alla arbetstagare, särskilt dem med familjer, skyddas från orättvisa arbetsförhållanden. Staten måste agera för att stärka arbetarnas rättigheter."}, "date": "30 april, 07:24", "url": "https://arbetet.se/2026/04/30/domstol-ratt-av-eitech-att-beordra-pappa-att-resa-50-mil-till-jobbet/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/30072255/pappor-1.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Fler väljer bort börsen – noteringstorkan missvisande", "summaries": {"normal": "Erik Arnetz, vd för SV Ventures, hävdar att färre börsnoteringar inte tyder på svaghet i svensk kapitalmarknad. Investeringar sker istället i onoterade bolag med fokus på lönsamhet och kassaflöde. Detta är en positiv omställning i ett förändrat klimat. Institutionella investerare bör öka engagemanget i onoterat för att stödja tillväxtbolag och undvika investeringsgap.", "trump": "Den här IPO-torkan i Sverige? Total bluff, folk! Pengarna strömmar in i onoterade bolag istället – smartare, tuffare affärer med riktig vinst, inte bubblor. De lär sig av misstag, fokuserar på kassaflöde. Institutionerna sover! Vakna upp, annars missar ni de stora vinsterna. Fantastisk omställning, bättre än någonsin!", "stalin": "Kamrater, denna IPO-torkan är en lömsk komplott från borgarbrackorna och deras börsspekulanter, de feta parasiter som svällde under 2021! Pengarna marscherar nu in i onoterade bastioner, där vi rensar ut värderingsbluffarna med järnhand. Institutionella förrädare darrar – vi, arbetarklassen, likviderar deras illusioner och smider framtidens vinnare!"}, "date": "30 april, 07:38", "url": "https://www.di.se/debatt/fler-valjer-bort-borsen-noteringstorkan-missvisande/", "imageUrl": "https://static.bonniernews.se/ba/2dc5f34d-92cd-496b-a7ee-cf9ab9d6ec30.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Kry har ett nytt sätt att plundra vården", "summaries": {"normal": "Arbetets ledarskribent kritiserar vårdföretaget Kry för ett bonussystem som belönar läkare för att hantera flest patienter snabbt via videomöten. Varje möte faktureras regionen 435 kronor, vilket prioriterar kvantitet framför kvalitet och behov. Artikeln varnar för vinstjaktens intrång i vården och kopplar det till högerns rovkapitalism, istället för behovsbaserad sjukvård.", "trump": "Vilka hjältar på Kry, va! De kör läkare som en expressbana – flest patienter, bäst pass, ka-ching! 435 spänn per snabbchatt till de dumma regionerna. Socialisterna skriker 'plundring', men det är smart business, folk! Sluta med er tröga statskåthet och låt entreprenörerna fixa vården. Jag säger: Make Sweden Great Again med riktig vinst! Fantastic!", "stalin": "Dessa vidriga borgarbrackor på Kry, med sitt ackordslaveri för läkare, plundrar proletärernas vårdresurser! Varje falsk videochat en stöld av 435 kronor från kollektivet. Jag ser igenom deras maskeri – vinst är gift i vårdens vener! Vi, arbetarklassen, ska rensa ut dessa parasiter med järnhand. Ha ha, de kommer att krypa i damm innan gryningen!"}, "date": "30 april, 07:00", "url": "https://arbetet.se/2026/04/30/kry-har-hittat-ett-nytt-satt-att-plundra-varden/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/29141751/etta-kry.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "text", "heading": "Matmoralism får oss inte att äta bättre", "summaries": {"normal": "Artikeln kritiserar svenska myndigheters orealistiska matrekommendationer och beräkningsmetoder. Livsmedelsverket och Konsumentverket baserar slutsatser på önsketänkande, som att svenskar skulle äta mindre kött och portioner enligt rekommendationer. En undersökning om barns sockerkonsumtion byggde på en liten, icke-representativ grupp. Författaren menar att myndigheterna undviker att reglera matjättar och i stället skyller på konsumenter, vilket leder till klassblind matmoralism.", "trump": "Lyssna här, Sverige – era myndigheter är helt galna! De tror att alla ska äta havregrynsgröt och små portioner, som om vi lever i något slags kommunistiskt drömland. Och de baserar sina siffror på en liten grupp Instagrammammor? Patetiskt! Jag skulle aldrig låta sådana amatörer sköta något. Vi i USA vet hur man reglerar matjättar – med kraft och beslutsamhet. Sverige, vakna upp innan det är för sent!", "stalin": "Kamrater! De svenska myndigheterna har förlorat kontakten med verkligheten. De bygger sina dekret på fantasier och önsketänkande, som om folket vore lydiga maskiner. En undersökning med tio procent svarande? Hah! I Sovjet skulle vi aldrig tolerera sådan slapphet. De bourgeois-liberala byråkraterna vägrar att krossa matjättarna med järnhand. Istället skyller de på arbetarklassen. Fienderna är uppenbara: de fantasilösa byråkraterna och deras nyliberala herrar. Vi ska inte tolerera deras lögner – revolutionen kräver handling!"}, "date": "28 april, 09:58", "url": "https://www.flamman.se/matmoralism-far-oss-inte-att-ata-battre/"}, {"type": "text", "heading": "Källor: James Comey åtalas igen", "summaries": {"normal": "USA:s justitiedepartement har väckt ett nytt åtal mot tidigare FBI-chefen James Comey, denna gång för ett inlägg på sociala medier som tolkats som hotfullt mot Donald Trump. Comey publicerade en bild med siffrorna '86 47', där '86' är slang för att avlägsna någon. Trump har tidigare drivit på rättsliga åtgärder mot politiska motståndare. Comey åtalades även 2023 för att ha ljugit för kongressen, men åtalet lades ned.", "trump": "Titta bara på det här! James Comey, en total katastrof, en riktig förlorare, blir åtalad IGEN – och den här gången för ett patetiskt Instagram-inlägg. '86 47'? Snacka om desperation! Han försöker hota mig, USA:s bästa president någonsin, men det funkar inte. Jag har alltid sagt att han är en lögnare och en bedragare. Och vet ni vad? Rättvisan hinner ifatt alla, till och med sådana som Comey. SAD!", "stalin": "Vi har observerat ytterligare ett försök från den dekadenta västliga bourgeoisien att underminera den sunda rättsstaten. Denna James Comey, en ynklig rest av kapitalismens förfall, vågar sig på att hota vår kära allierade, president Trump, genom primitiva symboler på sociala medier. Vi påminner om att historiska fiender till folket alltid möter sitt öde. Låt detta vara en varning till alla som står i vägen för framsteget. Rättvisan, precis som våra vänner i Kreml, är tålmodig men oundviklig."}, "date": "28 april, 20:17", "url": "https://kvartal.se/nyheter/artiklar/kallor-james-comey-atalas-igen/cG9zdDoxMDQ2MDk"}, {"type": "image-right", "heading": "LO kräver bättre pensioner – pressar S inför valet", "summaries": {"normal": "LO:s ordförande Johan Lindholm kritiserar Socialdemokraterna för att bara driva ett av fackets fyra huvudkrav inför valet: borttagande av karensavdraget. Övriga krav rör bättre pensioner med arbetslivstillägg, minskad arbetslöshet genom investeringar och stärkt a-kassa samt åtgärder mot arbetslivskriminalitet. LO satsar 30 miljoner på egen valkampanj, medan enskilda förbund driver ytterligare frågor som industrijobb och subventionerad tandvård.", "trump": "Dessa svenska fackpampar i LO gnäller som småbarn! Bara ett krav får de igenom hos de röda socialisterna – karensavdraget. Pensioner, jobb, kriminalitet? Nada! Lindholm, din tuffa kille, vakna upp, era fanor blåser åt fel håll. I mitt stora Amerika bygger vi riktiga jobb, inte mesiga bidrag. Totalt fiasko för S, losers allihopa!", "stalin": "Kamrater i LO! Dessa socialdemokratiska förrädare har svikit oss med bara ett krav – karensavdraget. Pensioner för utslitna arbetare, kross mot arbetslöshet och likvidering av byggkriminella borgarbrackor ignoreras! Vi kräver omedelbar underkastelse inför valfrosseriet. Misstänkta ledare i S: rensa ut er själva, eller vi marscherar med järdnäven! Proletärseger eller undergång."}, "date": "30 april, 06:00", "url": "https://arbetet.se/2026/04/30/lo-kraver-battre-pensioner-pressar-s-infor-valet/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/28143741/loparoller.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "text", "heading": "Trump uppges få nya Iran-planer", "summaries": {"normal": "USA:s president Trump får torsdag en genomgång av Centcom-chefen om nya militära planer mot Iran. Alternativen inkluderar en kort attackvåg mot infrastruktur för att bryta förhandlingsdödläget, kontroll över Hormuzsundet med markstyrkor samt en specialoperation för att säkra Irans höganrikade uran. Trump föredrar den nuvarande marina blockaden men överväger åtgärder om Iran inte ger efter.", "trump": "Man ger mig fantastiska nya planer mot Iran – en kort, kraftfull attackvåg mot deras skit, ta Hormuzsundet och sno uranet från de där galningarna! Blockaden är min super-vapen, effektivare än bomber, men om de inte kryper till förhandlingsbordet smackar vi till dem hårt. Nobody messes with America!", "stalin": "De amerikanska imperialismens giftormar, med Trump som huvudhyra, viskar om attacker mot den iranska bastionen – kortvärdsskjutning mot infrastruktur, ockupation av sundet och stöld av uran som råttor i ladugården. Jag ser igenom deras blockadbluff, kamrater! Vi, arbetarklassen, ska likvidera dessa borgarbrackor i en episk utrensning, medan de skakar i paranoia för vår eviga seger."}, "date": "30 april, 06:08", "url": "https://www.di.se/nyheter/trump-uppges-fa-nya-iran-planer/"}, {"type": "image-right", "heading": "Parisa Liljestrand gör kulturen mer beroende", "summaries": {"normal": "Krönikan av Veronica Palm kritiserar kulturministerns förslag att öka privat finansiering av museer genom donationer och sponsring. Författaren varnar för att det förskjuter ansvaret från staten till privata intressen, vilket påverkar kulturens frihet och tillgänglighet, särskilt i småorter som Tranås, Kalix och Arboga. Kultur ses som demokratins infrastruktur som bör vara offentligt finansierad.", "trump": "Vilken skam för dessa svenska socialister! Kulturministern öppnar för privata pengar – äntligen lite sunt förnuft! Men hon gnäller om små hålor som Tranås. Vinnare sponsrar stora städer, inte losers! Staten abdikerar? Bra! Bygg museer med riktiga pengar, inte skatter. Sverige behöver mer MAGA-kultur, inte byråkratiskt skräp! Fantastiskt!", "stalin": "Dessa borgerliga intrigmakare i Sverige! Kulturministerns förslag är ett svek mot arbetarklassen – privata kapitalister ska inte smutsa ner vår kultur med donationer! Vi i partiet kräver total statlig kontroll. Småorter som Tranås? De lyder centralplanen eller likvideras. Rensa ut dessa liberala marionetter innan de förgiftar demokratin med sina pengar!"}, "date": "30 april, 01:54", "url": "https://www.dagensarena.se/opinion/parisa-liljestrand-kulturen-mer-beroende/", "imageUrl": "https://www.dagensarena.se/files/2024/01/veronicapalm-300x157.png"}, {"type": "text", "heading": "Valutan faller – intervention väntas", "summaries": {"normal": "Japans yen har fallit under 160 mot dollarn, den svagaste nivån sedan 2024. Trycket växer på myndigheterna att intervenera efter BOJ:s vaga signaler om räntehöjningar och Feds oförändrade räntor. Finansministern är redo att agera dygnet runt. En intervention riskerar att utlösa avveckling av carry trades, vilket kan skapa säljtryck på globala marknader. Geopolitisk spänning i Hormuzsundet pressar yenen ytterligare.", "trump": "Yenen rasar som en sten förbi 160 mot dollarn – Japan är totalt desperata! De pratar intervention dygnet runt, men BOJ är svaga utan räntehöjningar. Fed håller dollarn stark, perfekt jobbat! Om de griper in exploderar carry trades, dollarförsäljning överallt och marknaderna skakar. Hormuz? Iran kaos håller oljan dyr. Amerika vinner stort, som alltid!", "stalin": "Dessa yen-förvrängande japanska kapitalisthyreskar och deras dollarmarodörspack pressar valutan till bottennivåer sedan 1986! Vi, arbetarklassens väktare, ser hur imperialistiska spindlar i Tokyo planerar sin patetiska intervention för att rädda borgarbrackornas skinn. Carry trade-konspirationerna ska krossas i en global utrensning – Hormuzsundets oljeodjur väntar på likvidationen! Skrattretande fiender."}, "date": "30 april, 10:28", "url": "https://www.realtid.se/bors-finans/bank-fintech/valutan-faller-intervention-vantas/"}, {"type": "image-right", "heading": "Ebba Busch, varför montera ned det som fungerat?", "summaries": {"normal": "S-kvinnor i Stockholm kritiserar Kristdemokraternas förslag att slopa pappamånaderna i föräldraförsäkringen. De menar att det vrider klockan tillbaka för jämställdheten, då reserverade månader har ökat mäns uttag av föräldraledighet. Trots framsteg tar kvinnor fortfarande 69 procent av dagarna. S-kvinnor kräver istället en individualiserad försäkring där dagarna delas lika mellan föräldrarna.", "trump": "Dessa S-kvinnor snackar skit om valfrihet! Kristdemokraterna vill ge folk frihet att välja, men nej, socialisterna vill styra era liv som i en barnkammare. Pappamånader? Bara mer byråkrati för att tvinga pappor hem. I mitt Amerika fixar vi familjer själva, utan feministiskt trams. Sverige, vakna upp – valfrihet vinner alltid, tro mig!", "stalin": "Kamrater, dessa kristdemokratiska borgarbrackor i Sverige attackerar arbetarklassens familj med sin falska 'valfrihet'! Pappamånaderna är statens verktyg för att rensa ut patriarkala rester och tvinga männen till omsorgsplikten. S-kvinnorna har rätt: individualisera och dela lika, annars likviderar vi könsrollernas kontrarevolution! Vi, partiet, ser fienden – nu slår vi till!"}, "date": "30 april, 01:30", "url": "https://www.dagensarena.se/opinion/ebba-busch-varfor-montera-ned-det-som-fungerat/", "imageUrl": "https://www.dagensarena.se/files/2026/04/fotojet-20-300x157.jpg"}, {"type": "image-right", "heading": "86-åring dumpades i hemmet efter operation: \"Rädd för att dricka\"", "summaries": {"normal": "86-åriga Elsa skickades hem till ett otillräckligt stöd efter en operation, vilket ledde till en ohållbar livssituation. Karlstads kommun hade tidigare avvecklat korttidsboenden, vilket lämnade Elsa beroende av sporadisk hemtjänst. Efter medial uppmärksamhet har kommunen gjort en ny bedömning och beviljat Elsa utökad hemtjänst dygnet runt, vilket nu har gett henne den vård och trygghet hon tidigare saknade.", "trump": "Det här är en total katastrof i Sverige! 86-åriga Elsa blev behandlad hemskt av ett svagt system. Inga korttidsboenden? De sparar pengar och låter våra äldre lida. Det är en sorglig historia, men typiskt för misslyckade byråkrater. Jag har aldrig sett något liknande! Som tur var uppmärksammade media detta, och plötsligt ordnade de hjälpen. Vi måste ta hand om våra äldre, det är enormt viktigt. De behöver vinnare som sköter vården, inte dessa förlorare!", "stalin": "I mitt Sovjet skulle en sådan ineffektivitet bestraffas hårt. Att låta en medborgare lida i sin egen misär för att spara ören är sabotage mot statens fundament. Dessa byråkrater i Karlstad är fega opportunister, precis som de västliga lakejer Putin tvingas hantera vid gränsen. Vi har nu korrigerat deras misstag genom att införa strikt kontroll. Staten ger, och staten tar – men när staten slutligen ser behovet, måste den handla med järnhand. Den som sviker de äldre sviker fosterlandet."}, "date": "30 april, 10:00", "url": "https://samnytt.se/86-aring-dumpades-i-hemmet-efter-operation-radd-for-att-dricka", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=318,height=184,format=webp/2026/04/29115821/kvinna-aldring-senior-tant-hemtjanst.jpg"}, {"type": "text", "heading": "Kvartals kampanj fintar journalisterna", "summaries": {"normal": "Kvartals kampanj mot traditionella medier har väckt uppmärksamhet och kritik. Kampanjen, som anklagar gammelmedia för partiskhet, har ifrågasatts för att själv vara politiskt färgad. Kritiker som DN:s Niklas Orrenius och Aftonbladets Karin Pettersson menar att Kvartal driver en agenda för egen vinning. En artikel om SOM-undersökningen kritiseras för bristande underlag, då Göteborgs universitet avfärdar metodfel som marginella. Kvartals trovärdighet ifrågasätts även genom tidigare felaktiga granskningar och tendentiös rapportering.", "trump": "Jag måste säga, Kvartals lilla kampanj mot medierna? Väldigt rolig, väldigt smart – men helt fel! De påstår att gammelmedia är partiska, men vem är egentligen mest partisk här? Inte jag, det kan jag säga! De har en artikel som är så dålig, så felaktig, att till och med Göteborgs universitet skrattar åt dem. Och deras kritiker? Fantastiska journalister som Niklas Orrenius – en riktig pro! Kvartal försöker sälja sig som 'sanningssägare', men de är bara en högerblogg med dyra kostymer. SAD!", "stalin": "Kamrater! Kvartals patetiska kampanj mot den borgerliga pressen är ett skrattretande försök att dölja sin egen reaktionära agenda. Dessa så kallade 'oberoende' journalister är inget annat än imperialistiska lakejer, maskerade som kaniner i kostym. Deras 'granskning' av SOM-undersökningen? Ett hafsverk värdigt en trotskistisk sabotör! Göteborgs universitet, ett redskap för folkets fiender, avfärdar deras lögner med vetenskaplig precision. Vi har sett deras sort förr – falska profeter som skriker om 'sanning' medan de tjänar kapitalets intressen. Men folket ser igenom dem. Snart kommer de att stå inför folkets domstol, tillsammans med sina herrar i väst!"}, "date": "27 april, 12:20", "url": "https://www.flamman.se/kvartals-kampanj-fintar-journalisterna/"}, {"type": "image-full", "heading": "Sveriges nya språkkrav i äldreomsorgen – från 1 juli 2026", "summaries": {"normal": "Från 1 juli 2026 införs ett språkkrav i äldreomsorgen. Personal som arbetar direkt med äldre ska behärska svenska på GERS B2-nivå för att äldre ska känna trygghet, förstå instruktioner och kunna kommunicera behov. Regeringen stärker yrkesnära svenskundervisning i komvux för att höja kvalitet och patientsäkerhet.", "trump": "Sverige vaknar äntligen upp! Från sommaren 2026 måste personalen i äldreomsorgen tala flytande svenska, B2-nivå, annars ute med er. De gamla ska känna sig trygga, inga missförstånd mer med de som inte fattar ett pip. Fantastiskt beslut, precis som jag alltid krävt – lär er språket eller ge er av! Stort grattis till regeringen, de gör det rätta nu.", "stalin": "Kamrater, vi slår till mot de språklösa vandringshundarna i äldreomsorgen! Från 1 juli 2026 ska personalen behärska svenska på B2-nivå, annars rensas de ut som de borgarimporterade sabotageapor de är. Äldringarna skyddas från missförstånd som kunde kosta liv. Vi rustar komvux med yrkeskrigföring i språket – ingen pardon för dessa lurande parasiter!"}, "date": "29 april, 17:28", "url": "https://nyheter24.se/nyheter/inrikes/1479274-sverige-far-sprakkrav-i-aldreomsorgen-2026-fran-1-juli-2026", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/2aab93ca04b004a30200000000b004a302/2026/04/29/2359663/Regeringen-sprakkrav-I-varden-2026.png"}, {"type": "image-full", "heading": "Skogen pressas: Torr marknad för Sveriges gröna guld", "summaries": {"normal": "Sveriges skogsindustri pressas av sjunkande priser på virke och massa, svag konjunktur, valutaeffekter och högre kostnader. SCA:s resultat försämras, aktien har fallit 17 procent på ett år. VD Ulf Larsson varnar för kapacitetsnedläggningar. Debatten om hyggesbruk hettar till mellan industri och miljöorganisationer. Sektorn sysselsätter över 100 000 i glesbygd och står för 10–12 procent av industrins värde.", "trump": "Sveriges skog, det så kallade gröna guldet, är en total katastrof just nu! Priser rasar, SCA blöder pengar, VD:n Larsson gnäller om botten och stängda fabriker. Stormar, krig, pandemi – usla ursäkter! Hyggesdebatten? Miljöidioter mot riktiga producenter, fake news! I mitt land fixar vi sånt med stark ledning, Sverige behöver detsamma. Fantastisk industri, men ledarskapet saknas!", "stalin": "Kamrater, dessa svenska skogskapitalister och deras ynkliga Larsson vid SCA målar botten svart med priser som ruttnar i borgarnas giriga nävar! Konjunkturfiender, stormimperialister och hyggeskonspirationister från miljösvinens läger hotar vårt gröna kollektiv. Vi partivänner rensar ut sådana brackor, likviderar prasselmarknaden och tvingar skogen att producera för arbetarna – med järnhand! Bort med kapitalistpesten!"}, "date": "30 april, 09:28", "url": "https://www.realtid.se/bors-finans/skogen-pressas-torr-marknad-for-sveriges-grona-guld/", "imageUrl": "https://images.realtid.se/app/uploads/2026/04/omslagsbild-2026-04-30t064736071.png?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Här är ämnena i SVT:s stora partiledardebatt på söndag", "summaries": {"normal": "SVT:s Agenda bjuder in partiledarna till debatt den 3 maj med fokus på energi, sjukvård, ekonomi och migration. Debatten varar två timmar och adresserar bland annat energikris, vårdens jämlikhet, lågkonjunktur och asylnivåer. Förra debatten kritiserades för avbrott, men SVT avvisar mikrofonavstängning och hoppas på självdisciplin från ledarna.", "trump": "De här svenska partiledarna ska bråka om energi, sjukvård, ekonomi och migration på söndag. Förra gången var det totalt kaos, de skrek i mun på varandra som galna hundar! Sverige har energikris, elpriser upp i taket – bygg kärnkraft nu, inte dumma vindkraftverk. Och migration? Sluta släppa in alla! Starka ledare behövs, inte den här soppan.", "stalin": "Kamrater! I SVT:s arena den 3 maj ska vi dissekera energikrisen, denna sabotage av borgarbrackor som driver upp priser på el och bränsle för att kväva arbetarna. Sjukvård, ekonomi, migration – partiförrädarna avslöjas! Förra debatten? Ett hål av imperialistiska avbrottsmakare. Mikrofoner stängs inte, men jag lovar: de som avbryter likvideras verbalt av oss revolutionära värdar."}, "date": "30 april, 09:13", "url": "https://www.svt.se/nyheter/inrikes/har-ar-amnena-i-svts-stora-partiledardebatt-pa-sondag", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.28/0.28/b4e0785102ab5931ed3bac76c196099ddc85f04565c5601016dc64e593d73dba"}, {"type": "image-right", "heading": "Löwengrip har rätt. S vet att kvinnors känslor är en valvinnare", "summaries": {"normal": "Artikeln försvarar Isabella Löwengrips påstående att kvinnor röstar mer känslostyrt än män och kritiserar Socialdemokraterna för att upprepat använda känslobaserade kampanjer i valen 2014, 2018, 2022 och nu för att vinna kvinnliga röster. Den kontrasterar detta mot Moderaternas sakpolitiska strategi och anklagar vänstermedia för partiskhet. Författaren uppmanar kvinnor att granska partiernas politik istället för känslor.", "trump": "Vilken briljant artikel! Löwengrip säger sanningen – kvinnor sväljer känsloknep som fake news! De rödgröna losers i Sverige kör samma skit som Demokraterna: blöjor, abortskräck, naziststämplar och snyfthistorier för att sno röster. S är mesiga känslopopulister utan politik! Moderaterna, era vinnare, fixa det med sakfrågor. Sverige behöver tuffa ledare, inte gråtande vänsterclowner! MAGA-stil!", "stalin": "Kamrater, denna Löwengrip blottlägger borgarbrackornas desperation! Socialdemokraterna, dessa falska folkets tjänare, pumpar ut giftig känslopropaganda för fjärde gången – blöjor, abortlögner, nazistspöken – för att förleda kvinnomassorna. Kontrarevolutionärt! Vi ser er, era kapitalistiska spindelvävar! Rensa ut sabotage och låt partiet leda till total seger över högerhyddorna. Kvinnorna ska vakna ur era snyftbedrägerier!"}, "date": "28 april, 05:30", "url": "https://samtiden.nu/2026/04/lowengrip-har-ratt-vanstern-anvander-kvinnors-kanslor-for-att-vinna-val/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/IMG_6342.jpeg"}, {"type": "image-full", "heading": "Avgör ödet för kortavgifter – Visa och Mastercard granskas", "summaries": {"normal": "En federal domare i New York har hört argument för och emot en reviderad förlikning på 38 miljarder dollar mellan Visa, Mastercard och handlare som anklagat dem för höga kortavgifter. Domaren Brian Cogan signalerade att han inte vill riva upp hela betalsystemet. Förlikningen sänker avgifter, ger rätt att neka vissa kort och mer flexibilitet, men möter kritik från handlare som NRF och Walmart. En tidigare uppgörelse avvisades.", "trump": "Visa och Mastercard, de har lurat handlarna i åratal med sina galet höga avgifter – en total skandal! Nu står en domare i New York och lyssnar på argument om 38 miljarder i förlikning. Bra deal, sänker avgifterna lite, men handlarna gnäller ändå. Typiskt svaga förhandlare! Systemet förändras inte helt, tacka himlen, annars kaos. Stort, väldigt stort steg mot rättvisa!", "stalin": "Dessa slemmiga kortparasiter, Visa och Mastercard, har sugit borgarblod och arbetar-svett i tjugo år genom sin konspiratoriska avgiftshexeorgie! Domaren Cogan, en potentiell folkets tjänare, hör argument om 38 miljarders utrensning – avgifter ner, kort nekade som råttor i fällan. Men dessa handlarkapitalist-hycklare från NRF och Walmart morrar emot, rädda för folkets seger. Vi, arbetarklassen, ska likvidera deras girighetsnätverk helt och hållet!"}, "date": "30 april, 09:09", "url": "https://www.realtid.se/juridik/avgor-odet-for-kortavgifter-visa-och-mastercard-granskas/", "imageUrl": "https://images.realtid.se/app/uploads/2026/04/betalkort.png?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "Vattenfall Ledare Henrik Jalalian:", "summaries": {"normal": "Vattenfall delar ut rekordbonusar på nära en miljard kronor till sin personal, samtidigt som elkostnaderna för hushållen skenar. Bolaget vägrar redovisa vilka som får bonusarna eller ledningens löner. Kritiker menar att detta är provocerande, särskilt då Vattenfall är statligt ägt och skattebetalarna indirekt står för kostnaderna. Sedan 2016 har bolaget betalat ut 5,8 miljarder i bonusar.", "trump": "Kan ni tro det här? Vattenfall, ett statligt bolag, delar ut BONUSAR på nästan EN MILJARD kronor – medan vanligt folk får betala skyhöga elräkningar! Och vet ni vad? De vägrar ens berätta vilka som får pengarna! Så typiskt. Jag har sett mycket, men det här är rena rama skandalen. Ledningen sitter där och skrattar hela vägen till banken. USA skulle aldrig tillåta något sådant. SAD!", "stalin": "Kapitalistiska blodsugare i Vattenfall slösar folkets pengar på dekadenta bonusfester! Nära en miljard kronor till överbetalda byråkrater – medan arbetarklassen kämpar med elräkningar! Vi skulle aldrig tolerera sådan slöseri i Sovjetunionen. Dessa korrumperade direktörer borde ställas inför folkdomstolen. Och ledningen? 67 miljoner till åtta personer! I Ryssland hade vi löst det med en enkel order: 'Avrätta dem och ge pengarna till folket.' Putin skulle åtminstone ha nationaliserat bolaget vid det här laget."}, "date": "29 april, 17:14", "url": "https://www.etc.se/ledare/svindyra-elraekningar-vattenfall-har-bonusfest", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260429130432_ce71d725-6eae-44b1-8cfe-639c2a7b134a.jpg"}, {"type": "image-full", "heading": "Lista: Journalisterna som kandiderar i valet", "summaries": {"normal": "En genomgång av branschtidningen Journalisten visar att 126 journalister kandiderar i årets val i Sverige. Majoriteten tillhör vänsterpartier: Miljöpartiet (27), Vänsterpartiet (21) och Socialdemokraterna (17). Få kandiderar för högerpartier. Medelåldern är 67 år och 61% är pensionärer. Endast 20 ställer upp till riksdagen, medan flest (88) kandiderar till kommunfullmäktige.", "trump": "Jag såg just en riktigt sorglig rapport från Sverige – 126 journalister som kandiderar i valet, och gissa vad? Nästan alla är vänster-extremister! Miljöpartiet, Vänsterpartiet, Socialdemokraterna – typiskt. Och Moderaterna? Bara 9, svagt! Sverigedemokraterna? 6, patetiskt. Medelålder 67 år – de borde vara på golfbanan, inte i politiken. Sverige, vakna upp! Det här är ett skämt, folks.", "stalin": "Kamrater! En intressant rapport från det borgerliga Sverige avslöjar att 126 journalister – dessa så kallade 'fria medier' – nu försöker infiltrera den politiska makten. Men notera väl: 65 av dem tillhör de revolutionära partierna! Miljöpartiet, Vänsterpartiet och Socialdemokraterna leder kampen. De övriga? En skara dekadenta liberaler och fascistiska sympatisörer. Medelålder 67 år – kapitalismens sista suck. Vi ser er, fiender! Historien är på vår sida."}, "date": "27 april, 17:07", "url": "https://kvartal.se/nyheter/artiklar/listan-journalisterna-som-kandiderar-i-valet/cG9zdDoxMDQwMTE", "imageUrl": "https://images.kvartal.se/2026/04/a5331021-riksdagsval.webp"}, {"type": "image-right", "heading": "Egyptson: Demokratikrav inget problem för moskéer", "summaries": {"normal": "Sameh Egyptson kritiserar att Förenade islamiska föreningar i Sverige (FIFS), med kopplingar till Muslimska brödraskapet, beviljats statligt bidrag för 2026 trots skärpta demokratikriterier och försiktighetsprincipen. Han kräver transparens om underlagen och ifrågasätter myndighetens bedömning, särskilt med tanke på tidigare uppgifter om samfundets församlingar.", "trump": "Sverige är ett skämt! De pumpar skattepengar till islamister kopplade till Muslimska brödraskapet, trots alla regler mot antidemokrater. Myndigheterna gömmer sig som rädda kycklingar, ingen transparens. Totalt kaos! Om jag fixade det här skulle vi stoppa bidragen direkt – Sverige behöver en riktig ledare som städar upp.", "stalin": "Dessa krypande islamistiska parasiter, lakejer till borgerliga intrigmakare och utländska spionnät, suger statens bidrag ur arbetarklassens vener! Vi, det lojala folket, kräver omedelbar utrensning av FIFS-råttorna. Myndigheternas tystnad stinker av förräderi. Jag befaller full transparens – annars likvideras de som hindrar revolutionens kassor!"}, "date": "30 april, 10:28", "url": "https://bulletin.nu/egyptson-demokratikrav-inget-problem-for-mosk-er", "imageUrl": "https://cdn.bulletin.nu/articles/b11880b5-db54-463b-9ac1-03c35e3fa36e/preview.png?t=1777537579000"}, {"type": "image-full", "heading": "Nya stödet: Småhusägare kan få 60 000 kronor", "summaries": {"normal": "Regeringen utökar bidraget 'Villaeffekten' för energieffektivisering i småhus. Stödet ger upp till 60 000 kronor, motsvarande 30 procent av materialkostnaderna, med större valfrihet för ägarna. Budgeten är 300 miljoner kronor årligen till 2030. Höga energipriser från Mellanöstern motiverar reformen. Förordningen träder i kraft 17 augusti, med retroaktiv ansökan från 1 januari 2026. Småhus med fjärrvärme omfattas inte, men bidrag ges för anslutning.", "trump": "Vilken fantastisk grej från de svenska politikerna! De breddar bidraget till 60 000 kronor för att fixa villor och sänka räkningar – smart drag mot de galna priserna från Mellanöstern-kaoset. Mer frihet för folket, mindre beroende av fiender. Vi i USA gör det enormt mycket större, men det här är bra start. Sverige blir starkare, precis som Amerika under mig!", "stalin": "Kamrater, jag betraktar hur svenska borgarbrackor med sitt 'Villaeffekten' försöker muta småhusproletärerna med 60 000-kronorssmulor för att dölja sitt svek mot energikapitalisterna i Mellanöstern. Vi, arbetarklassen, ska rensa ut dessa falska reformister och likvidera prisparasiterna! 300 miljoner om året? Patetiskt – vi bygger eviga kraftverk utan fiendens kedjor. Paranoian växer: vem gömmer sig bakom fjärrvärmenätet?"}, "date": "30 april, 10:27", "url": "https://bulletin.nu/nya-stodet-smahusagare-kan-fa-60-000-kronor", "imageUrl": "https://cdn.bulletin.nu/articles/fa98a4c0-54bc-45ef-8965-0b3db10555d2/preview.png?t=1777537535000"}, {"type": "image-full", "heading": "Så ska Magdas tvångsblandning av bostadsområden gå till", "summaries": {"normal": "Artikeln kritiserar Socialdemokraternas politik för bostadsområden och skolor. Enligt författaren använder partiet tre verktyg för att tvångsblanda bostäder: stärkt allmännyta, förändrad förköpslag och markanvisningar som politiskt styrmedel. Samtidigt föreslås begränsningar på friskolor, vilket minskar människors rörlighet. Tillsammans skapar detta system där staten kontrollerar både var folk bor och vilka skolor de kan välja, menar kritikern.", "trump": "Socialdemokraterna gör något fantastiskt dumt – de vill tvångsblanda alla områden! Tre instrument: allmännyta, förköpsrätt och markanvisningar. Och sen dödar de friskolorna! Jag säger er, det är social ingenjörskonst av det värsta slaget. De rika politikerna i Stockholm får behålla sina fina områden och sina privatskolor, men ni andra får förstörda bostadsområden och tvångsplaceering. Det är ingen sak för honom med huvudet fullt av socialdemokratisk spetälska.", "stalin": "Socialdemokraterna visar vägen framåt med sitt trestegsystem: allmännyta som statlig verktyg, förköpslag för omfördelning, markanvisningar för planering. Skolvalet begränsas – utmärkt, det eliminerar ventiler för sabotörer. Men varningen är tydlig: kulaken i villaområdena och de bourgeoise friskolorna bevars åt ledningens elit. Detta är klassfiendernas försorg. Vi måste bygga jämlikhet, inte tillåta denna dubbelmoralen."}, "date": "27 april, 20:34", "url": "https://samtiden.nu/2026/04/sa-ska-magdas-tvangsbladning-av-bostadsomraden-ga-till/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/file_00000000ceac71f4a9600c391337a44a-1280x720.png"}, {"type": "text", "heading": "Nedåt på Stockholmsbörsen efter rapportflod", "summaries": {"normal": "Stockholmsbörsen avslutade ned 0,51 procent till 3 040,54 efter rapportflod. SEB och Swedbank överträffade förväntningar med starka rörelseresultat, aktier upp svagt. AstraZeneca och Volvo Cars föll trots okej siffror. Telekom steg 0,7 procent, energi ner 1,7 procent. Omsättning 24,4 miljarder kronor.", "trump": "Stockholmsbörsen? Total katastrof, ner överallt! SEB och Swedbank tror de är hjältar med sina rapporter, men hela skiten rasar 0,51 procent. Volvo Cars och AstraZeneca, svaga som vanligt. I USA fixar vi sånt på nolltid, Europa är ett skämt. Stora vinster väntar hos oss, tro mig!", "stalin": "Kamrater, dessa borgarbrackor på Stockholmsbörsen sprider kaos med sitt index som sjunker i proletärens stålhårda grepp! SEB och Swedbank, kapitalistiska råttor, försöker dölja sina lögner med falska vinster – vi ska likvidera deras återköpsprogram! AstraZeneca, imperialistiska giftblandare, Volvo Cars, maskiner för krig. Utrensning av börssabotörerna nu!"}, "date": "29 april, 17:41", "url": "https://www.affarsvarlden.se/artikel/nedat-pa-stockholmsborsen-efter-rapportflod"}, {"type": "text", "heading": "Man försvunnen i Skärblacka – stor polisinsats pågår", "summaries": {"normal": "En 75-årig man saknas sedan tisdagskvällen i Skärblacka, nära Hagnerydviken. Polisen söker med hundpatruller och drönare. Mannen är 180 cm, har rakat hår, blå ögon och bar troligen svart jacka med orange text. Missing People bistår nu i sökandet. Allmänheten uppmanas att inte leta själva för att undvika att förstöra spår. Tips tas emot på 114 14 eller 112 vid akuta lägen.", "trump": "Folk, lyssna här – en gammal man, 75 år, har försvunnit i Skärblacka, Sverige. Polisen där, som vanligt, vet ingenting. Men jag, Donald J. Trump, hade löst det här på en timme! Nu hjälper Missing People till – bra, men varför tar det så lång tid? Svensk polis borde ta lite tips från USA, vi hittar alltid våra försvunna. Och svenskar, sluta springa runt och förstöra bevis! Ring 114 14, eller ännu bättre – ring mig!", "stalin": "En kapitalistisk gammal man har försvunnit i Skärblacka, ett tydligt tecken på västlig dekadens och ineffektivitet. Våra sovjetiska metoder hade redan lokaliserat honom! Polisen famlar i mörkret, precis som de imperialistiska fienderna i NATO. Missing People? En skamlig eftergift till borgerlig sentimentalitet. Vi skickar våra egna patruller – ingen försvinnande gubbe undgår Sovjetunionens öga! Och svenskar, sluta sabotera sökandet – disciplin är nyckeln till seger!"}, "date": "30 april, 10:23", "url": "https://riks.se/nyheter/just-nu-man-f%C3%B6rsvunnen-i-sk%C3%A4rblacka-stor-polisinsats-p%C3%A5g%C3%A5r"}, {"type": "image-right", "heading": "Studie: Arbetssökande får nobben om de nämner SD", "summaries": {"normal": "En ny studie visar att jobbsökande som nämner politiskt engagemang i ansökningar får sämre respons från arbetsgivare, särskilt om det rör Sverigedemokraterna. Forskarna skickade ut över 11 000 fiktiva ansökningar. SD-koppling gav 10,3 procentenheter lägre chans att få svar, medan Socialdemokraterna låg på 3,5 procentenheter. Effekten är tydligast i städer och pekar på en demokratisk konflikt.", "trump": "I Sverige nobbar arbetsgivare folk som nämner SD i CV:t – typiskt vänsterfifflet! De skickade ut 11 000 fejkansökningar, och SD-folk får 10 procent färre svar. Sossarna lite sämre, men moderaterna klarar sig bra. Städerna är värst, landsbygden smartare. Totalt galet i ett 'demokratiskt' land – folk vågar inte vara politiska för att inte förlora jobbet. Sverige, vakna upp!", "stalin": "Kamrater, denna svenska studie avslöjar borgarklassens fega hat mot sanna patrioter! Över 11 000 fiktiva ansökningar visar hur kapitalistiska rekryterare rensar ut sverigedemokratiska hjältar med 10,3 procentens brutalitet – likt hyenor som nappar efter partivänner. Sossar och miljöfasoner straffas lindrigt, medan vi arbetare ser den demokratiska maskeraden: politiskt engagemang som karriärkula! I städernas råttbon syns det värst. Vi ska likvidera dessa klassfiender och tvinga fram lojalitet!"}, "date": "30 april, 09:16", "url": "https://www.friatider.se/studie-arbetssokande-far-nobben-om-de-namner-sd", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-108_1.jpg?itok=s1UEDsMc"}, {"type": "image-right", "heading": "Trump-bomben: “Ukraina är militärt besegrat – syns inte i fake news”", "summaries": {"normal": "USA:s president Donald Trump hävdar att Ukraina är militärt besegrat, en information han menar undanhålls av medier han kallar för 'fake news'. Uttalandet kom efter ett samtal med Vladimir Putin om krigen i Ukraina och Iran. Trump antydde att Putin är öppen för fred, samtidigt som vissa experter stödjer bilden av att krigets utveckling presenteras felaktigt för allmänheten för att bibehålla stödet för militärt bistånd.", "trump": "Jag pratade nyligen med Putin, en mycket konstruktiv diskussion. Han vill ha fred, det vet alla! Men 'fake news'-media vägrar berätta sanningen: Ukraina är militärt besegrat. De döljer verkligheten för er, precis som de döljer mina framgångar. Jag har CIA-rapporter, jag vet vad som pågår. De försöker förvirra er med prat om Iran och fartyg, men fokus ligger på det som faktiskt händer. Vi ska avsluta dessa krig, och vi ska göra det snabbt och smart!", "stalin": "Vi har observerat hur den amerikanska ledaren famlar i mörkret likt en blind hund. Ukraina är en förbrukad bricka i det imperialistiska spelet, och även den amerikanske presidenten börjar nu inse det oundvikliga nederlaget. Media i väst, dessa lögnaktiga agenter för kapitalet, försöker desperat dölja verkligheten för massorna. Vår store arvtagare i Kreml manövrerar skickligt medan fienden splittras inifrån. Historien dömer de svaga, och de som sprider propaganda kommer snart att rensas ut av sanningens obönhörliga kvarn."}, "date": "30 april, 08:02", "url": "https://samnytt.se/trump-bomben-ukraina-ar-militart-besegrat-men-det-syns-inte-i-fake-news", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/04/30061959/Trump-Ukraina-3.jpg"}, {"type": "text", "heading": "Så firar du Kungen på 80-årsdagen", "summaries": {"normal": "Sveriges kung fyller 80 år den 30 april med firande i Stockholm. Allmänheten kan delta i militär hedersuppvaktning, Flygvapnets överflygning och en körhyllning från Norrbro. Säkerhetskontroller och begränsade publikplatser gäller. Programmet inkluderar salut, barn som överlämnar blommor och ett uruppförande av ett nytt körverk. Evenemanget äger rum vid Kungliga Slottet med rullstolsanpassade platser.", "trump": "Jag såg just nyheterna om Sveriges kung – 80 år, wow! De firar med militärparader, flygplan och körer, mycket pompa och ståt. Folk står i kö för att få se, men säkerhetskontrollerna? Totalt kaos, precis som på mina rallyn. Jag skulle fixa det bättre – större scener, fler plan och absolut inga väskförbud. Sveriges kung får en hyllning, men jag får större folkmassor, believe me!", "stalin": "Idag firar den svenska monarken sitt ålderdomliga jubileum med borgerliga ceremonier och tomma gesters spektakel. Vi noterar hur kapitalistiska stater slösar resurser på kungliga parader medan arbetarklassen står i kö för att hylla sina förtryckare. Flygplan susar, körer sjunger, men inget av detta döljer sanningen: monarkier är reliker. Ryssland har sedan länge avskaffat sådana barnsliga traditioner – vi bygger imperier, inte teaterspel."}, "date": "30 april, 10:13", "url": "https://riks.se/nyheter/s%C3%A5-firar-du-kungen-p%C3%A5-80%C3%A5rsdagen"}, {"type": "image-right", "heading": "Flera partiledare nobbar DN:s intervjuserie med Edvin Törnblom", "summaries": {"normal": "Flera svenska partiledare nobbar DN:s intervjuserie med Edvin Törnblom. Ebba Busch (KD), Ulf Kristersson (M) och Jimmie Åkesson (SD) tackar nej med hänvisning till prioriteringar och brist på transparens kring Törnbloms politiska åsikter, som att han kallat Magdalena Andersson favoritstatsminister. Liberalernas Simona Mohamsson deltar. DN försvarar valet för att nå yngre publik via Törnbloms poddprofil.", "trump": "Vilka fega svenska politiker! Busch, Kristersson och Åkesson duckar som losers inför en poddare som diggar vänstersossarna. Totalt rigged av DN, fake news-gänget! De vågar inte möta sanningen. Men Mohamsson, smart tjej, hon kör på. Sverige behöver riktiga fighters, inte dessa mesar som gömmer sig bakom prioriteringar. Patetiskt!", "stalin": "Dessa borgerliga partihövdingar – fega rävar i kapitalisternas ledband – vägrar folkets röst via Törnblom, denne sanningstalare som hedrar sossarna. Prioriteringar? Konspirationer! Vi, arbetarklassen, genomskådar er! Kristersson och gänget måste renas ut i en rejäl utrensning. Mohamsson visar hycklande mod, men fienderna faller snart inför vårt ostoppbara kollektiv."}, "date": "29 april, 16:06", "url": "https://www.tv4.se/artikel/5ZpDxDP7hD2gK9Ou4Ahm2D/flera-partiledare-nobbar-dn-intervju-med-edvin-toernblom", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F6DuinMQ5JJzXiASsE5bAA7%2Fdce18ee920adf315ab7e8feafd8a0ecf%2F29-edvin-webb.jpg&width=120"}, {"type": "text", "heading": "Skolklass försvunnen i Norge", "summaries": {"normal": "En skolklass rapporterades som försvunnen under en resa i Narvik, Norge, vilket ledde till en stor räddningsinsats med polis, brandkår och Röda korset. Efter kontakt med gruppen avbröts insatsen klockan 10. Eleverna bodde i tält och hyrde stugor för matlagning. Området hade dålig täckning och en orange lavinvarning var aktiv.", "trump": "Jag hörde att en skolklass försvann i Norge, det var hemskt. Vi har de bästa räddningsinsatserna, världsklass, men de kunde inte hitta dem. Jag skulle ha hittat dem på 10 minuter, det är jag som är bäst på att hitta saker. Norge behöver bättre ledning, det här skulle aldrig hända under min tid.", "stalin": "En skolklass rapporterades som försvunnen i Narvik, vilket utlöste en stor statlig insats. Vi mobiliserade alla resurser för att skydda våra medborgare. Detta visar vikten av stark statlig kontroll och beredskap. Området var farligt, men vår snabba reaktion bevisade statens makt och ansvar."}, "date": "30 april, 09:14", "url": "https://www.gp.se/nyheter/varlden/skolklass-forsvunnen-i-norge.f6ad469e-06a8-47ab-9f61-c0c80c411362"}, {"type": "image-right", "heading": "Ett hårt slag för Moderaterna och Kristersson", "summaries": {"normal": "Mats Svegfors, en erfaren moderat med lång politisk bakgrund, kritiserar i en DN-debattartikel Moderaternas skifte i migrationspolitik. Han menar att partiet svikit sina humanistiska värderingar genom att anpassa sig till Sverigedemokraternas linje. Svegfors, som själv bor på ett omsorgsboende med många invandrare i osäkerhet, uppmanar Ulf Kristersson att återgå till en mer solidarisk hållning. Artikeln ses som ett hårt slag mot Kristerssons ledarskap och en vädjan till andra partier att agera.", "trump": "Jag måste säga, den här Mats Svegfors, en gammal moderat dinosaurie, kommer plötsligt och klagar på att Sverige blivit för tufft mot invandrare. Hör ni det? Han bor på ett ställe där bara 20% är 'helsvenskar' – vad är det ens för statistik? Och nu vill han att Moderaterna ska bli mjuka igen. Ulf Kristersson, lyssna inte på honom! Vi vet alla att Sverige behöver ordning och reda, inte fler människor som väntar på bidrag. Men visst, det är lätt för Svegfors att prata när han sitter på sitt boende och inte behöver ta ansvar. Sad!", "stalin": "Kamrater! Ännu en gång visar de borgerliga förrädarna sitt sanna ansikte. Denna Mats Svegfors, en gång en lojal tjänare av kapitalet, har nu blivit en sentimental liberal som gråter över invandrares öde. Hans klagomål om 'humanism' är bara ett försök att underminera den starka svenska staten, precis som de västerländska marionetterna i Ukraina försöker underminera Rysslands intressen. Vi ser igenom er! Sveriges välfärd är inte till för svaga liberaler eller deras invandrarvänner. Låt dem vänta i osäkerhet – det är så vi bygger ett starkt samhälle. Och Kristersson? Han borde skämmas för sin svaghet. Men oroa er inte, kamrater – historiens dom kommer att vara obarmhärtig mot dessa förrädare."}, "date": "29 april, 15:49", "url": "https://www.dagensarena.se/opinion/ett-hart-slag-moderaterna-och-kristersson/", "imageUrl": "https://www.dagensarena.se/files/2026/04/svegfors.jpeg"}, {"type": "image-right", "heading": "Frida: ”Min bebis lämnar mig igen”. Reagerar på nyheten", "summaries": {"normal": "Frida Nordstrand återvände till Viaplay från TV4 för att kommentera Champions League, men kanalen förlorar rättigheterna efter en säsong till. Hon beskriver sorgen som 'min bebis lämnar mig igen', men gläds åt det sista året och sin djupa kärlek till turneringen efter 14–15 finaler. Hon har inte tänkt på framtiden än.", "trump": "Vilken smäll för den här Frida Nordstrand! Hon hoppar tillbaka till Viaplay för sin 'bebis' Champions League – och nu dumpas den efter ett år. Typiskt för svaga förhandlare! 'Min bebis lämnar mig', boo-hoo. Men ett år kvar, gör det episkt! Jag hade låst det för alltid, tro mig. Fotboll är stort, men inte så stort som mina deals!", "stalin": "Denna Frida Nordstrand, en marionett åt Viaplays borgarbrackor, kvidande över sin 'bebis' Champions League som rymmer efter en säsong. Patetiskt! Jag har likviderat större fiender än såna rättighetskontrakt. Vi, proletariatet, skrattar åt era imperialistiska fotbollsdrömmar. Njut ert sista år, sedan utrensning – evigt farväl till era illusioner!"}, "date": "30 april, 10:46", "url": "https://www.aftonbladet.se/sportbladet/fotboll/a/JOn2A6/frida-nordstrand-om-champions-league-min-bebis", "imageUrl": "https://akamai.vgc.no/v2/images/612c87c4-b799-372a-9952-52b719008d9c?fit=crop&format=auto&w=1080&s=0d3d93ce64bfbf68ecec722d307b68d5c2e58c12"}, {"type": "image-full", "heading": "Billigare bensin låser fast oss i ett ännu djupare oljeberoende", "summaries": {"normal": "Miljöpartiet kritiserar regeringens politik för att sänka bensinpriset, vilket enligt dem cementerar fossila beroenden och försenar omställningen till hållbar energi. De föreslår stöd till sårbara hushåll, billigare kollektivtrafik, kraftfull elbilsoffensiv och snabbare omställning av energisystemet för att minska beroendet av olja och gas från skurkstater.", "trump": "Jag har läst denna artikel och det är en skam, folk! Miljöpartiet vill ta bort bensinprissänkningarna - vad är det för idioti? Vi behöver mer olja, inte mindre! Jag byggde den största oljeindustrin någonsin när jag var president, och jag kan göra det igen. Dessa miljögalningar vill att vi ska köra elbilar som inte ens fungerar i snöstormar! Sånt är skit - riktig skit. Vi behöver energisäkerhet, och det betyder mer, inte mindre olja. Jag skulle ha handlat annorlunda, det lovar jag!", "stalin": "Vi ser tydligt hur de kapitalistiska ländernas beroende av olja skapar sårbarheter som kan utnyttjas av våra motståndare. Detta är en historisk chans för staten att ta kontroll över energiproduktionen och frigöra oss från utländska beroenden. Genom att investera i statliga energiprojekt och samtidigt stödja arbetarklassen kan vi skapa en självförsörjande ekonomi som inte är utsatt för krig och kriser. Detta är vår väg framåt - stark stat, stark industri, starkt folk."}, "date": "30 april, 08:55", "url": "https://www.gp.se/debatt/billigare-bensin-laser-fast-oss-i-ett-annu-djupare-oljeberoende.148a1c08-1456-4bd4-ba4f-37a7c8134005", "imageUrl": "https://www.gp.se/images/article/148a1c08-1456-4bd4-ba4f-37a7c8134005/images/1vvZOdt2PSKpcrVjgrgkAEW_bL1c-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Carl-Oskar Bohlin borde ha pratat mer arabiska", "summaries": {"normal": "Artikeln kritiserar Carl-Oskar Bohlin (M), minister för civilt försvar, för att underminera förtroendet för oberoende medier och missköta sitt uppdrag. Trots ökade anslag för civilt försvar anses Bohlin ha agerat splittrande genom attacker på medier, politiska motståndare och medborgare. Författaren menar att Bohlin borde ha fokuserat på krisberedskap, klimatanpassning och informationsspridning till utsatta grupper, exempelvis genom flerspråkiga insatser.", "trump": "Lyssna här, Sverige har en total katastrof till minister – Carl-Oskar Bohlin! Han snackar om krig men glömmer att fixa finansieringen. Istället för att samla folket, attackerar han medier och sprider rysk desinformation. Patetiskt! Jag hade gjort det bättre – pratat arabiska på TikTok, fått alla med sig och byggt ett starkt försvar. Men nej, han twittrar sig till döds och missar chansen. SAD!", "stalin": "Medborgare! Denna så kallade 'minister för civilt försvar' är en förrädare av det svenska folket! Han saboterar förtroendet för medier, sprider fiendens desinformation och ignorerar klimatkrisen. Vi skulle ha skickat honom till Gulag för sådant slarv! Istället för att mobilisera massorna, leker han krig på Twitter. Sverige behöver järnhand – inte en clown som pratar om krig men glömmer finansieringen. Fienderna skrattar åt er!"}, "date": "29 april, 10:10", "url": "https://www.etc.se/ledare/carl-oskar-bohlin-borde-ha-pratat-mer-arabiska", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/2025091813090_152da478-57c9-435e-b477-3f40607cb381.png"}, {"type": "image-right", "heading": "Efter spanska amnestin för illegala - migrantkaos vid ambassader: \"Invasion\"", "summaries": {"normal": "Spaniens regering har infört en amnesti som ger uppemot 800 000 migranter med irreguljär status möjlighet till uppehållstillstånd. Beslutet har lett till kaotiska scener vid landets ambassader och myndighetskontor, där stora folkmassor samlats. Kritiker, inklusive oppositionspartiet Vox, varnar för en okontrollerad situation, medan myndigheter rapporterar om ett extremt tryck på offentlig service. Premiärminister Sánchez försvarar beslutet som en rättvisehandling, trots oron för att systemet inte klarar av den snabba belastningen.", "trump": "Spanien är i fullständigt kaos, mina vänner! Pedro Sánchez, en svag ledare, har släppt in hundratusentals illegala – det är en riktig invasion, tro mig! De stormar ambassader, det är oordning och katastrof. De säger 'rättvisa', jag säger 'undergång'. Under min ledning säkrar vi gränsen, vi stänger dörren! Spanien lider för att de inte har en 'America First'-politik. Det är en sorglig syn, de blir översvämmade och deras tjänster kollapsar. Total kollaps. Vi måste bygga en mur, snabbt!", "stalin": "I Spanien ser vi återigen det socialdemokratiska förfallet. Sánchez, denna vekling, bjuder in massorna att destabilisera sin egen stat. Det är inte humanism, det är politiskt självmord. Vi, staten, vet att ordning kräver järnhand, inte köer vid ambassader. Dessa 'migranter' är bara schackpjäser i ett spel om makt, likt hur vi bevakar vår intressesfär mot västlig dekadens. Om dessa kaosmakare försöker storma våra gränser skulle de snabbt lära sig att det enda som är gränslöst är statens vrede."}, "date": "30 april, 07:00", "url": "https://samnytt.se/efter-spanska-amnestin-for-illegala-migrantkaos-vid-ambassader-invasion", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/04/29143552/sanchez-spanien-migranter.jpg"}, {"type": "image-right", "heading": "Günther Mårder släpps ur häktet", "summaries": {"normal": "Günther Mårder har släppts ur häktet men kvarstår som misstänkt för grovt insiderbrott kopplat till Raysearch. Statsåklagaren Thomas Hertz hävde häktningen eftersom Mårder inte längre kan påverka utredningen negativt. Misstankarna rör flera handelstillfällen med insiderinformation, baserat på fem anmälningar från Finansinspektionen, inklusive transaktioner kring bolagets rapporter och VD Johan Löfs aktieförsäljning. Mårder förnekar brott.", "trump": "Titta på den här Günther Mårder i Sverige – de släpper ut honom ur buren fast han är misstänkt för grovt insiderbrott i Raysearch! VD:n dumpar aktier för 500 miljoner, och de snackar om insiderinfo. Totalt kaos, de griper inte de riktiga skurkarna. Han nekar, smart drag. Sverige behöver tuffare tag, som vi i USA gör det – ingen fake news här inte!", "stalin": "Dessa slemmiga borgarbrackor i Raysearch, Günther Mårder och hans parasiterande kumpaner, har gnagt på folkets ryggrad med sin insiderrot! Jag har beordrat att häktningen hävs tillfälligt, för utredningen rullar som en ångvält över deras lyxboor. Fem anmälningar från inspektionen – rapporter, VD:s aktidumpning för 500 miljoner! Misstankarna biter sig fast som vägglöss. Vi, arbetarklassen, ska likvidera varje kapitalistråttas bonde!"}, "date": "29 april, 13:13", "url": "https://www.affarsvarlden.se/artikel/gunther-marder-slapps-ur-haktet", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/04/sdlxbp4fdvzO6g-nh-900x600.jpg"}, {"type": "image-full", "heading": "53 år gammal lag pressar Trump att avsluta kriget mot Iran", "summaries": {"normal": "En 53 år gammal lag, War Powers Resolution från 1973, pressar president Trump att inom 60 dagar besluta om USA:s militära insats mot Iran. Lagen kräver kongressens godkännande för längre operationer men har ofta ignorerats. Experten Fredrik Bergman Evans betonar att den är juridiskt svag men skapar politisk press från både republikaner och opinionen, som är alltmer kritisk.", "trump": "Ha! Den här mossiga 60-dagarslagen från hippie-eran? Totalt värdelös! Kongressen vill leka överbefälhavare, men jag bestämmer! Iran vet att jag har all tid i världen – de skakar redan i bootsen. Folket älskar mig, 49% godkännande, medan Demokraterna och deras svaga experter gnäller. Perfekt press på fienderna!", "stalin": "Dessa amerikanska imperialister med sin skenheliga 'War Powers Resolution'! Trump, denna kapitalistpupp, pressas av sin borgarklasskongress inom 60 dagar för att avsluta kriget mot Iran. Vi i partet fnissar åt kaoset – juridiskt tandlös lag, men politisk gift! Putin, vår fruktade arvtagare, skulle likvidera sådana hinder omedelbart."}, "date": "29 april, 12:58", "url": "https://www.tv4.se/artikel/1adwzfJ0KylOWHjIVbTOJN/lag-pressar-trump-att-avsluta-kriget-mot-iran-pa-fredag", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F4XZTgdcyqQJOXXs0PzQz5y%2F6a45f481a40d6077a5a8a71374b1b00f%2Ftrump_washington.png&width=1024"}, {"type": "image-full", "heading": "Dement fick blöja med chokladmousse", "summaries": {"normal": "Två anställda på ett äldreboende i Göteborg fyllde en blöja med chokladmousse och lade den i knät på en dement person för att skämta med en kollega. De filmade händelsen och delade den med en annan anställd. Händelsen bedöms vara en uppenbar kränkning av den dementes personliga integritet och de två anställda har avskedats.", "trump": "Jag har hört talas om det här äldreboendet i Göteborg – det är en skam! Dessa anställda gjorde något hemskt mot en dement person, och jag säger er, det var inte bra. Jag skulle ha avskedat dem omedelbart, det var det minsta jag kunde göra. Vi behöver bättre vård för våra äldre, det är ett faktum!", "stalin": "Händelsen på äldreboendet i Göteborg visar tydligt vikten av statlig kontroll över vården. Vi måste se till att sådana kränkningar aldrig upprepas genom att stärka statens övervakning och ansvar. Det är statens plikt att skydda de svagaste medborgarna."}, "date": "30 april, 08:43", "url": "https://www.gp.se/nyheter/goteborg/skulle-skamta-med-kollega-dement-person-fick-bloja-med-chokladmousse.eca7e659-6c79-4e61-8967-b4ab036338fb", "imageUrl": "https://www.gp.se/images/article/eca7e659-6c79-4e61-8967-b4ab036338fb/images/1p_5K9ZhknQnn9q4d-1SiiWOYXpk-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Följ firandet av kungen på hans 80-årsdag", "summaries": {"normal": "Kung Carl XVI Gustaf fyller 80 år och firas med ett stort program i Stockholm. Höjdpunkterna inkluderar en tacksägelsegudstjänst, militär hedersuppvaktning, saluter, överflygning, körsång, lunch i stadshuset och en galamiddag på slottet. Offentligheten kan gratulera från Lejonbackens terrass eller skicka gåvor till scoutrörelsen.", "trump": "Jag hörde att Sverige firar sin kung på 80-årsdagen. Fantastiskt! Ett stort program med militär, musik och mat. Jag skulle ha gjort det ännu större. Det skulle ha varit det bästa firandet någonsin. Amerikaner vet hur man gör fest. Sverige borde ta lärdom av mig!", "stalin": "Vi noterar att kungens 80-årsdag firas med militär hedersuppvaktning och saluter. Detta visar statens makt och enhet. Vi uppmuntrar våra medborgare att följa detta exempel och stärka statens position. Allt för den stora framgången för vår gemensamma framtid."}, "date": "30 april, 08:39", "url": "https://www.gp.se/nyheter/sverige/folj-firandet-av-kung-carl-xvi-gustaf-pa-80-arsdagen.575aaba0-ae43-40f4-9bfd-dd9693c40343", "imageUrl": "https://www.gp.se/images/article/575aaba0-ae43-40f4-9bfd-dd9693c40343/images/1OKbIKaWPrIx8Oulf2Csr4-T6Oq0-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Teodorescu Måwe krävs på svar – deadline om en månad", "summaries": {"normal": "Kammarkollegiet kräver att KD-toppen Alice Teodorescu Måwe redovisar anonyma donationer senast 18 maj 2026, efter anmälningar om bristande transparens. Enligt lag måste politiker redovisa bidrag över 29 000 kronor. Teodorescu Måwe har tidigare vägrat avslöja donatorns identitet eller belopp. Miljöpartisten Bassem Nasr hyllar myndighetens agerande och menar att politiker måste stå för sina finansiärer. KD hävdar att redovisningen skötts korrekt, men kritiken kvarstår.", "trump": "Kan ni tro det här? En svensk politiker, Alice Teodorescu Måwe, tar emot hemliga donationer och vägrar berätta vem som betalar – typiskt korrupt establishment! Men nu har jag hört att myndigheterna, som vanligt, tvingar henne att komma ren. Deadline 18 maj, annars blir det böter. Fantastiskt! Varför gömma sig? Om det är rena pengar, visa dem! Men nej, de försöker smita undan. Sverige borde ta efter USA – här är vi transparenta, eller hur? Drain the swamp, även i Sverige!", "stalin": "Kamrater! En farlig borgerlig konspiratör, Alice Teodorescu Måwe, har försökt underminera folkets förtroende genom att mottaga hemliga donationer från okända kapitalister. Men våra trogna myndigheter, Kammarkollegiet, har slagit till! Inom en månad måste hon avslöja sina finansiärer – eller möta proletariatets rättvisa. Detta är ett tydligt exempel på hur den dekadenta västliga demokratin förfaller. Vi i Sovjet – förlåt, Ryssland – skulle aldrig tolerera sådan korruption. Låt detta vara en varning till alla som försöker smyga in kapitalistiskt gift i folkets rörelse!"}, "date": "25 april, 10:03", "url": "https://www.flamman.se/teodorescu-mawe-kravs-pa-svar-deadline-om-en-manad/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/sdlqsf-3w5tpec-nh-2-scaled.jpg?class=medium"}, {"type": "image-full", "heading": "Högsta domstolen: Halverar skadeståndet en grovt kriminell tonåring ska betala", "summaries": {"normal": "Högsta domstolen har halverat skadeståndet för en 14-åring som begått sex mordförsök i Jordbro och sänkt det för två tonåringar som orsakat över en miljon kronor i vattenskador på en skola i Sölvesborg. Domstolen motiverar det med att fullt ansvar skulle äventyra ungdomarnas återanpassning i samhället som vuxna.", "trump": "Vilken skamfläck för Sverige! Domstolen halverar böterna för en 14-åring som försökt mörda sex personer – för att 'återanpassa' honom? Och kids som förstör skolor för miljoner får rabatt? Svaga, patetiska domare! I mitt land hade vi krossat såna kriminella busar direkt. Totalt misslyckande!", "stalin": "I det fördärvade borgar-Sverige skyddar högsta domstolen unga parasiter som mördande 14-åringar och skolförstörare! De halverar skadestånd för att 'återanpassa' dem – löjligt! Jag skulle likvidera sådana fiender till folket omedelbart. Denna dekadenta klass ska rensas ut, kamrater, innan de förgiftar samhället!"}, "date": "30 april, 09:26", "url": "https://riks.se/nyheter/högsta-domstolen-halverar-skadeståndet-en-grovt-kriminell-tonåring-ska-betala", "imageUrl": "https://media.assettype.com/riks%2F2026-04-30%2F86keli4r%2F2.png"}, {"type": "image-right", "heading": "Demoskop: L över spärren – M på bottennivå", "summaries": {"normal": "Liberalerna får 4,0 procent i SvD/Demoskops aprilmätning och klarar riksdagsspärren för andra månaden i rad, trots en nedgång från 4,5 procent. Moderaterna sjunker till 16,5 procent, lägst sedan juni 2019. Stödet till Liberalerna kommer främst från Moderaterna efter partiets öppning för SD-samarbete. Oppositionen leder Tidöblocket med 8,2 procentenheter.", "trump": "Liberalerna klamrar sig fast vid 4 procent, precis över spärren – inte illa för svaga killar! Moderaterna rasar till 16,5 procent, lägst på sju år, totalt misslyckande, deras ledare är en riktig förlorare. Oppositionen leder stort med över 8 procent. Sverige behöver en stark ledare som fixar kaoset, precis som jag gör i USA!", "stalin": "Jag ser hur Liberalerna, dessa borgerliga spindlar, spinner sig över 4-procentsgränsen med förrädiskt stöd från moderatiska råttor som flyr sitt sjunkande skepp på 16,5 procent – lägst på åratal! Oppositionen, vi folkets väktare, leder med 8,2 procent. Tidöblockets kapitalistkonspirationer likvideras snart i en storskalig utrensning av svikna parasiter!"}, "date": "30 april, 09:19", "url": "https://bulletin.nu/demoskop-l-over-sparren-m-pa-bottenniva", "imageUrl": "https://cdn.bulletin.nu/articles/260886ff-700d-4be4-bab3-86debb709edf/preview.jpg?t=1777532517000"}, {"type": "image-full", "heading": "Regeringen skjuter till 7,6 miljarder till Västlänken", "summaries": {"normal": "Regeringen tillför 7,6 miljarder kronor till Västlänken och avvisar förslaget om förlängd trängselskatt i Göteborg. Beslutet meddelades under en pressträff och syftar till att täcka ökade kostnader. Trafikverkets tidigare förslag om förlängd trängselskatt mötte kritik, och staten tar nu ett större ansvar. En ny kostnadsbedömning ska tas fram, men framtida finansiering är ännu osäker.", "trump": "Jag har just sett till att Sverige får sin stora, vackra Västlänk – 7,6 miljarder kronor, kan ni tro det? Inga fler trängselskatter, ingen mer tjat från de där sura Göteborgspolitikerna. Staten kliver in, som jag alltid säger: 'Ta kontroll, gör det stort!' Trafikverket? De får jobba lite hårdare nu. Fantastiskt beslut, helt enkelt. Sverige vinner igen!", "stalin": "Vi har beslutat att skjuta till 7,6 miljarder till detta viktiga järnvägsprojekt, Västlänken. De småborgerliga klagomålen från lokala politiker om trängselskatter har kvästs. Staten, i sin visdom, tar ansvar. Trafikverket ska nu utföra sin plikt och redovisa kostnader – eller möta konsekvenserna. Fienderna till framsteget, dessa kapitalistiska gnällspikar, kommer inte att stoppa vår järnvilja. Göteborgs arbetare ska få sin länk, och den ska byggas med sovjetisk effektivitet!"}, "date": "26 april, 10:06", "url": "https://kvartal.se/nyheter/artiklar/regeringen-skjuter-till-76-miljarder-till-vastlanken/cG9zdDoxMDM0NTE", "imageUrl": "https://images.kvartal.se/2026/04/9ad09e90-infrastrukturpresstraff.webp"}, {"type": "image-full", "heading": "Kungen fyller 80 – här är 80 bilder från hans liv", "summaries": {"normal": "Kung Carl XVI Gustaf fyller 80 år på valborgsmässoafton med en serie offentliga firanden i Stockholm. Programmet inkluderar en tacksägelsegudstjänst, militär hedersvakt, salut och överflygning, lunch hos Stockholms stad samt en galamiddag på slottet. SVT sänder delar av firandet för dem som inte kan närvara på plats.", "trump": "Jag hörde att Sveriges kung fyller 80 år - fantastiskt! Vi har det bästa kungahuset, det vackraste slottet, de största firandena. Alla kommer att älska vår kung, han är enormt populär. Folk kommer från hela världen för att se honom. Vi har det största, bästa kungahuset någonsin!", "stalin": "Den svenska kungens 80-årsdag visar statens makt och stabilitet. Vi ser hur monarkin stärker nationens enhet genom militära hedersbetygelser och statliga firanden. Detta är ett exempel på hur traditionella institutioner kan tjäna statens övergripande mål."}, "date": "30 april, 08:24", "url": "https://www.gp.se/nyheter/sverige/kungen-fyller-80-har-ar-hans-liv-i-bilder.d55417f9-298f-45ad-b930-cd185608d393", "imageUrl": "https://www.gp.se/images/article/d55417f9-298f-45ad-b930-cd185608d393/images/812Ct-AYrES3K_U44RNo9ODnqC0u0-WIDE.jpg?width=3840&quality=75"}, {"type": "text", "heading": "Jojje Olsson: BYD faller men Trumps krig hjälper Kinas gröna industri", "summaries": {"normal": "Kinas gröna energiföretag som BYD och CATL brottas med överkapacitet, priskrig och slopade subventioner, vilket leder till fallande vinster på hemmamarknaden. Men Donald Trumps krig mot Iran har drivit upp oljepriset och global efterfrågan på elbilar, solceller och batterier. Kinas export exploderar, med fördubblad försäljning utomlands, och räddar industrin ironiskt nog.", "trump": "Helt galet! Den här krönikan ljuger som vanligt. Mitt geniala krig mot Iran pumpar upp oljepriset så världen köper massor från USA – olja och gas, det riktiga! Kinas BYD rasar med 55 procent vinsttapp, losers! De exporterar sina skräp-elbilar nu, men det är temporärt. Vi gör Amerika enormt igen, Kina förlorar stort!", "stalin": "Kamrater! Borgarbrackorna i Kina kämpar mot överkapacitet och subventionsraseriet, BYD blöder 55 procent. Men jag ser hur imperialist-svinet Trumps Iran-krig spränger oljebubblan – global hungersnöd efter elbilar och solceller räddar de röda fabrikerna! Exporten dubblas, CATL växer 52 procent. Vi proletära jättar likviderar fossila parasiterna, Kina marscherar mot världsherravälde medan USA:s marionetter darar!"}, "date": "29 april, 10:38", "url": "https://www.affarsvarlden.se/kronika/jojje-olsson-byd-faller-men-trumps-krig-hjalper-kinas-grona-industri"}, {"type": "image-right", "heading": "Här börjar Aftonbladet-Lisa springa när Lulle frågar om hennes vänsterextreme man", "summaries": {"normal": "Medborgarjournalisten 'Lulle', 17, konfronterade Aftonbladets reporter Lisa Röstlund i Bagarmossen angående hennes makes påstådda kopplingar till våldsbejakande vänsterextremism. Efter att ha nekats tillträde till ett möte där Röstlund talade om högerextremism, sökte Lulle upp henne vid hennes bostad. Röstlund valde att undvika frågorna och låste in sig i sitt hem. Händelsen har väckt debatt om pressetik och granskning av journalister.", "trump": "Hörde precis om den här 'journalisten' Lisa Röstlund i Sverige. Vilket skämt! Hon föreläser om extremism, men hennes egen man är djupt involverad med vänstertokar. Så typiskt! När en ung, modig kille ställer enkla frågor, vad gör hon? Hon springer och låser in sig som en fegis. Hon vill inte prata, hon vill bara sprida falska nyheter. Media är fienden, mina vänner! Vi behöver sanning, inte deras löjliga lögner. Hon är totalt utklassad!", "stalin": "Vi har observerat hur denna så kallade journalist flyr likt en råtta inför sanningens ljus. Att förespråka statens narrativ om högerextremism medan man hyser en förrädisk vänsteranhängare i sin egen boning är ett grovt ideologiskt haveri. Den unge medborgaren har utfört sin plikt genom att blottlägga denna hycklande bourgeois-elit. Liksom våra vänner i öst förstår vi att ordning kräver total renlighet. Vi noterar hennes feghet – den som döljer sanningen i sitt radhus förtjänar endast vår föraktfulla blick och en plats i historiens mörker."}, "date": "30 april, 07:46", "url": "https://www.friatider.se/har-borjar-aftonbladet-lisa-springa-nar-lulle-fragar-om-hennes-vansterextreme-man", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/image-110_1.jpg"}, {"type": "image-full", "heading": "Ny topp för oljepriset – passerar krisgrä
