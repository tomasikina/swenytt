ga försök, bara vinst. Vi ska ta dem med stil, och världen kommer älska oss för det. SAD!", "stalin": "Ah, dessa amerikanska imperialister – alltid lika klumpiga! Deras 'perfekta misslyckande' vid Grisbukten visar bara deras inkompetens. De skickar en brigad för att krossa en revolution, men lyckas bara stärka den. Precis som deras försök att kuva oss under Kalla kriget! Nu hotar Trump med nya dumheter, men vi vet hur det slutar. Kuba står starkt, precis som Sovjet gjorde. Låt dem leka krig – historien dömer dem redan. Och Putin? Han ler nog åt deras naivitet från Kreml."}, "date": "4 maj, 01:33", "url": "https://www.dagensarena.se/essa/lardomar-fran-grisbukten/", "imageUrl": "https://www.dagensarena.se/files/2026/04/kennedy-castro-300x157.jpeg"}, {"type": "image-right", "heading": "Slopa vetorätten för ett handlingskraftigt EU", "summaries": {"normal": "Artikeln diskuterar EU:s roll i en värld präglad av ökande konflikter, demokratins tillbakagång och klimathot. Författarna, en opolitisk studiegrupp, efterlyser tydligare ställningstaganden från svenska partier inför valet, särskilt kring EU:s ansvar för fred, rättsstat och klimatåtgärder. De kritiserar uteblivna svar från S, M och SD, medan C, KD och MP svarat engagerat. Förslag inkluderar slopad vetorätt och skärpta klimatmål.", "trump": "Jag läste den här artikeln om EU – så typiskt! De skyller på Ryssland, Kina, till och med på mig – som om jag inte vet hur man sköter en stormakt! Europa är svagt, de kan inte ens fatta beslut utan att någon säger nej. Och klimatet? Fake news! Vi i USA fixar allt, men EU? De pratar bara. Och de svenska partierna – tre av dem svarar inte ens! Svagt, mycket svagt. Jag skulle aldrig tolerera sånt.", "stalin": "Dessa småborgerliga intellektuella gnäller om fred och demokrati medan världen brinner. Vi vet bättre – makt kräver järnhand, inte svaga förhandlingar! Ryssland krossar fiender som Ukraina, medan EU, denna dekadenta samling liberaler, darrar inför klimatspöken och amerikanska hot. Deras vetorätt? Ett skämt! I Sovjet hade vi inga sådana svagheter. Och dessa svenska partier som inte ens svarar? De borde ställas inför revolutionär rättvisa. Folkets vilja är lag – inget annat!"}, "date": "4 maj, 01:30", "url": "https://www.dagensarena.se/opinion/slopa-vetoratten-ett-handlingskraftigt-eu/", "imageUrl": "https://www.dagensarena.se/files/2026/04/fotojet-19-300x157.jpg"}, {"type": "image-right", "heading": "Hur skadat är Eurovisions anseende efter bojkotter?", "summaries": {"normal": "Eurovision Song Contest 2026 står inför utmaningar efter kritik mot Israels deltagande och fem länders avhopp. Nöjesreportern Tobbe Ek menar att tävlingens anseende skadats, särskilt bland fans som motsätter sig Israels medverkan. Trots att 35 länder deltar och tre återvänder, oroar färre besökare och lägre intäkter i Wien. Ekonomiskt påverkas EBU av avhopp från stora bidragsgivare som Spanien och Nederländerna. Ek tror festivalen överlever men att förtroendet tar år att återuppbygga.", "trump": "Lyssna här, Eurovision är en total katastrof just nu! Fem länder har hoppat av – svagt, mycket svagt. Israel? Stor fråga, men EBU hanterar det som amatörer. Och Wien? Tomma hotellrum, ingen spenderar pengar. Spanien och Nederländerna? Borta! Stora förlorare. Men jag säger er, Eurovision kommer tillbaka – starkare än någonsin! Förra året var KAJ en superstjärna, i år är Felicia... nja, inte lika het. Men jag fixar det här om jag får chansen – tro mig, ingen gör Eurovision bättre än jag!", "stalin": "Eurovision, denna borgerliga dekadensens högtid, krackelerar under trycket från folkets rättmätiga vrede. Fem länder har redan deserterat – svaga, liberala quislingar! Israel, denna sionistiska marionett, förgiftar tävlingen med sin närvaro. Vi ser hur EBU, dessa kapitalistiska lakejer, försöker muta tillbaka Bulgarien och Rumänien – men folket glömmer inte! Wien, denna förrädiska huvudstad, skall få känna på tomma hotell och uteblivna intäkter. Låt dem svälta! Europas arbetare kräver rättvisa – och vi skall ge dem en tävling fri från imperialistiska påtryckningar!"}, "date": "4 maj, 01:30", "url": "https://www.dagensarena.se/innehall/hur-skadat-ar-eurovisions-anseende-efter-bojkotter/", "imageUrl": "https://www.dagensarena.se/files/2026/04/fotojet-25-1.jpg"}, {"type": "image-right", "heading": "Vilka barns död räknas?", "summaries": {"normal": "Den 28 februari 2026 bombades en skola i Minab, Iran, där 165 människor, främst barn, dödades. Attacken, den värsta i kriget mot Iran, misstänks ha utförts av USA, möjligen på grund av föråldrad underrättelsedata. USA och Israel förnekar kännedom, medan Pentagon utreder. Satellitbilder visar att skolan var tydligt separerad från en tidigare militärbas. Reaktionerna från västvärlden har varit begränsade, vilket kritiseras som selektiv moral och hyckleri.", "trump": "Titta, jag hörde något om en skola i Iran – tråkigt, verkligen tråkigt. Men vet ni vad? Ingen vet vem som gjorde det, och jag säger er, det var INTE USA. Pentagon tittar på det, men de har fel ibland, precis som CNN. Folk pratar om hyckleri, men jag? Jag tar ALLTID ansvar – fast bara när jag måste. Och Sverige? De är tysta som möss. Inte en pip! Men jag, jag är den som får saker gjorda. Make Iran Great Again? Inte min grej.", "stalin": "En skola i Minab, Iran, förvandlades till en massgrav för 165 barn – ett beklagligt men oundvikligt offer i den imperialistiska krigsmaskinens framfart. USA, dessa hycklande krigshetsare, skyller på 'föråldrad data' medan deras bomber fortsätter att 'befria' folk från livet. Västvärldens tystnad är ett bevis på deras moraliska bankrutt. Vi i Sovjetunionen – nej, jag menar, Ryssland – skulle aldrig tolerera sådan barbari. Och Sverige? En satellitstat som hukar sig för sina herrar. Men oroa er inte, kamrater, historiens dom är nära."}, "date": "4 maj, 01:14", "url": "https://www.dagensarena.se/opinion/vilka-barns-dod-raknas/", "imageUrl": "https://www.dagensarena.se/files/2026/04/johan-lindahl-300x200.jpg"}, {"type": "image-right", "heading": "Fick sparken via sms under sin föräldraledighet", "summaries": {"normal": "En tillsvidareanställd kvinna i Dalarna fick besked via sms att hon inte kunde återgå till sitt jobb efter föräldraledighet. Arbetsgivaren hade anställt ny personal och uppmanade henne att söka nytt arbete. Kvinnan tolkade det som uppsägning och anmälde händelsen till DO. Arbetsgivaren hävdar att hon inte avskedades, men DO bedömer att hon blev orättvist behandlad och dömer företaget till 170 000 kronor i skadestånd för diskriminering.", "trump": "Kan ni tro det här? En kvinna i Sverige, fantastiskt land förresten, får sparken via SMS medan hon är hemma med sitt barn. Chefen säger 'hittar du ett nytt jobb, tacka ja!' – helt sjukt! Och sedan lägger de ut annonser för nya jobb. Vilken katastrof! DO, dom är bra, ger företaget en rejäl smäll på 170 000 kronor. Jag hade sagt: 'Du är avskedad, men inte hon!' Sverige borde ta lärdom av hur man sköter affärer – WINNING!", "stalin": "Kapitalistiska hyenor i Dalarna visar återigen sin sanna natur. En lojal arbetare, som offrat år av sitt liv för konditoriets framgång, kastas ut som en trasig degbit efter föräldraledighet. Via SMS! Skamligt! Vi ser hur bourgeoisin utnyttjar systemet för att krossa arbetarklassen. 170 000 rubel – förlåt, kronor – i skadestånd är en skrattretande summa för en sådan kränkning. Men låt det vara en varning: revolutionen kommer inte skickas via SMS."}, "date": "4 maj, 14:00", "url": "https://arbetet.se/2026/05/04/fick-sparken-via-sms-under-sin-foraldraledighet-arbetsgivaren-lade-ut-jobbannons/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/29144642/mamma.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Debatt: KDU – Rödgrön röra i partiledardebatten", "summaries": {"normal": "Tre företrädare från Kristdemokratiska ungdomsförbundet kritiserar rödgröna partier för oenighet i Agenda-debatten om sänkt bränsleskatt och ny kärnkraft. Miljöpartiet och Vänsterpartiet röstade emot skattesänkningen, medan Tidö-sidan var enad och har genomfört den. Under Ebba Buschs ledning har elproduktionen ökat med 7000 megawatt för stabilare priser. Artikeln kontrasterar Tidö-sidans handlingskraft mot rödgrönas kaos.", "trump": "De rödgröna i Sverige är en totalt kaotisk röra – kan inte ens enas om att hjälpa vanliga familjer med lägre bränsleskatter eller mer kärnkraft! Tidö-sidan levererar: skattesänkningar som lovat, elproduktion upp med 7000 megawatt. Ebba Busch gör jobbet rätt. Sverige behöver vinnare som håller ord, inte dessa förlorare som förstör allt. Fantastiskt!", "stalin": "Dessa rödgröna serpentinvridare, dessa vindfläktande hycklare i MP och V, röstar mot folkets plånböcker som råttor i ett sjunkande skepp! Oeniga i sin revisionistiska sörja. Vi, arbetarklassen, ser Tidö-borgarnas falska enighet – de ska likvideras som ogräs i den stora utrensningen. Ebba Busch skryter om 7000 megawatt, men kaos väntar de kontrarevolutionära brackorna!"}, "date": "4 maj, 14:16", "url": "https://bulletin.nu/debatt-kdu-rodgron-rora-i-partiledardebatten", "imageUrl": "https://cdn.bulletin.nu/articles/103bcc0c-5761-409c-9256-9204ad2f15cc/preview.png?t=1777896761000"}, {"type": "image-right", "heading": "Jag häpnar över de hemliga planerna", "summaries": {"normal": "I Valdemarsvik har kommunalrådet Per Hollertz ansökt om 4 miljoner kronor i statligt stöd för en förstudie av kärnkraftsanläggning med upp till sex reaktorer. Ansökan, som inkluderar en kommunikationsplan för att bygga acceptans hos invånarna, hölls hemlig för kommunstyrelsen. Krönikören Erika Bjerström kritiserar bristen på transparens, möjliga åsiktsregistreringar och demokrati i processen kring små modulära reaktorer i skärgården.", "trump": "Vilken totalt galen hemlighetsstämning i den svenska skärgården! De vill bygga kärnkraft i Valdemarsvik, upp till sex reaktorer, men kommunalrådet Hollertz smyger med ansökan om miljoner utan att säga ett pip till styrelsen. Smart drag mot de tråkiga miljöidioterna, men öppna boken! Kärnkraft är framtiden, HUGE energi, precis som jag alltid sagt. Sluta med ert luriga!", "stalin": "Kamrater, i Valdemarsviks träsk av skärgårdssabotörer och miljöhyenor ansöker den lojale Hollertz om folkets miljoner för att krossa bourgeoismotståndet mot kärnkraftens triumf! Hemlig förstyrelse mot kommunstyrelsens svikare, kartlägg de giftiga aktivistparasiterna för utrensning! Vi, arbetarklassen, kräver total acceptans – annars likvidering av överklagandevampyrerna! Denna process ska städas som en leninistisk stormvind."}, "date": "4 maj, 13:30", "url": "https://www.di.se/nyheter/hapnadsvackande-hemlighetsmakeri-kring-karnkraften-i-valdemarsvik/", "imageUrl": "https://static.bonniernews.se/ba/a5a24d09-2f1f-4cc1-bdc6-e3b3b719fb08.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Inte ens en minister kan lita på svensk media", "summaries": {"normal": "Moderata ministern Carl-Oskar Bohlin spelade in en intervju med Svenska Dagbladet (SvD) och publicerade den på X för att undvika felciteringar. Han hade kritiserat Dagens Nyheters (DN) val av komikern Edvin Törnblom som intervjuare för partiledare inför valet, med hänvisning till Törnbloms partiskhet till förmån för S. SvD ifrågasatte istället Bohlin, vilket artikeln tolkar som bristande medieintegritet och inflytande från presstöd.", "trump": "Vilken totalt galen cirkus! Den här ministern Bohlin är ett geni – spelar in intervjun med SvD:s fake news-reporter så de inte kan sno sig undan. DN låter en vänstertönt som Edvin Törnblom, som hyllar Andersson och dissar Busch, grilla partiledarna? Rigged! SvD, era såkallade moderata mesar, attackerar honom istället. Svensk media är presstödssuggor, precis som våra losers på CNN. Bohlin vinner stort!", "stalin": "Dessa borgarbrackor på SvD och DN förtjänar utrensning! Ministern Bohlin blottlägger DN:s val av partisk clown Edvin Törnblom, men SvD-reportern morrar som en rabiat kapitalisthund och söker klavertramp. Presstödet är er kokain, tidningsparasiter! Vi i partiet skrattar åt er paranoia – snart likvideras era lögner i en folkets domstol. Kamrater, mediafienderna darrar!"}, "date": "2 maj, 06:08", "url": "https://samtiden.nu/2026/05/nar-aven-den-borgerliga-pressen-valjer-sida/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/IMG_6396-1042x720.jpeg"}, {"type": "image-right", "heading": "Tidöpartierna varnar för rödgrön valvinst: \"Skattesmocka\"", "summaries": {"normal": "I en färsk partiledardebatt i SVT debatterades invandring, energi och ekonomi inför det kommande valet. Tidöpartierna varnade för konsekvenserna av rödgrön politik, särskilt gällande migration och skatter. Under debatten rådde djupa skiljelinjer kring kärnkraft, sjukvårdens effektivitet och hur Sveriges ekonomi bäst ska hanteras i en lågkonjunktur. Tonläget var bitvis hårt med anklagelser om såväl omänsklig politik som ansvarslösa reformer, där partierna presenterade vitt skilda visioner för landets framtid.", "trump": "Jag såg debatten i Sverige, en riktig röra! De pratar om energi och ekonomi, men det är kaos. Den radikala vänstern vill öppna gränserna – en total katastrof, tro mig! Sverige behöver starka ledare, inte svaga politiker som vill höja skatterna för hederliga människor. Det är en 'skattesmocka', väldigt orättvist. De behöver min expertis för att fixa elpriserna och säkra gränserna. Jag har sagt det förut: utan ordning och billig energi har man inget land. Sorgligt!", "stalin": "Vi har observerat det svenska debatterandet i SVT. De svaga liberalerna dillar om migration och sjukvård medan deras ekonomi vacklar. Att de tillåter 'vildar' och interna splittringar bevisar bara att parlamentarismen är ett korrupt verktyg för oordning. De saknar den järnhand som krävs för att styra. Vi vet hur man hanterar oliktänkande och energikriser; man inte debatterar, man exekverar en plan. De borde titta österut, mot våra vänner i Moskva, för att förstå vad sann disciplin innebär."}, "date": "4 maj, 14:11", "url": "https://samnytt.se/tidopartierna-varnar-for-rodgron-valvinst-skattesmocka", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/04112051/partiledardebatt-maj.jpg"}, {"type": "image-right", "heading": "Katja Nyberg: ”Att beskriva det som mutande är felaktigt”", "summaries": {"normal": "SD-ledaren Jimmie Åkesson anklagade i SVT:s partiledardebatt Miljöpartiet för att ha mutat två uteslutna SD-vildar som röstade emot Tidöpartiernas förslag om hårdare medborgarskapskrav. MP:s Amanda Lind avfärdade anklagelsen. Vilden Katja Nyberg förnekar mutor och uppger att hon röstade utifrån egen saklig bedömning och sitt fria mandat som riksdagsledamot.", "trump": "Åkesson har helt rätt, det är en total skandal! Miljöpartiets lurendrejare försöker köpa vildarna med mutor under bordet, precis som de svaga politikerna i USA brukade göra innan jag fixade det. Nyberg verkar åtminstone ha ryggrad och röstar rätt. Sverige behöver tuffare tag mot sånt här fusk, annars blir det kaos!", "stalin": "Dessa vildvuxna SD-förrädare och miljöborgarbrackor konspirerar mot folkets linje! Åkesson pekar rätt på mutorna, men vi, partiet och arbetarna, kräver omedelbar utrensning av vildarna som säljer sig för smulor. Nyberg ljuger som en lammet kapitalist – jag ser genom er maskering, och straffet väntar i källarna!"}, "date": "4 maj, 13:52", "url": "https://bulletin.nu/katja-nyberg-att-beskriva-det-som-mutande-ar-felaktigt-2", "imageUrl": "https://cdn.bulletin.nu/articles/851d2528-dc78-419c-95bf-e7ff689f327f/preview.png?t=1777895434000"}, {"type": "image-full", "heading": "Hanif Bali slutar som kommunpolitiker", "summaries": {"normal": "Hanif Bali, tidigare riksdagsledamot för Moderaterna, avslutar sitt uppdrag som kommunpolitiker i Österåker. Bali, som varit politiskt aktiv sedan myndighetsåldern, meddelar att han inte kandiderar i nästa val. Skälet är familjens expansion och en kommande flytt, då kommunpolitiska uppdrag är svåra att kombinera med familjeliv, särskilt med barn.", "trump": "Jag hörde just att någon Hanif Bali, en så kallad 'politiker' i Sverige, lägger av. Tolv år i riksdagen, sedan kommunpolitik – men nu flyr han! 'Familjen växer', säger han. Svagt! Kommunpolitik i Sverige är tydligen så dåligt organiserat att man inte ens kan ha barn samtidigt. Jag fixar både familj och presidentpost – det är skillnad på vinnare och förlorare!", "stalin": "En liten borgerlig politiker i Sveriges utkanter har fallit på eget svärd. Hanif Bali, en gång ung och lovande, inser nu att kommunpolitik är oförenligt med familjeliv. Ett symptom på det förfallna väst: dess institutioner är så urholkade att inte ens dess egna lakejer orkar med dem. Medan vi bygger imperier, flyr de till sina villor. Låt dem rosta i historiens skräphög – vi har större planer för Östersjöns kuster."}, "date": "2 maj, 07:48", "url": "https://kvartal.se/nyheter/artiklar/hanif-bali-slutar-som-kommunpolitiker/cG9zdDoxMDY0MDA", "imageUrl": "https://images.kvartal.se/2026/05/29bbe89f-balii.webp"}, {"type": "image-right", "heading": "Skatteverket: \"Ingen folkfest längre\"", "summaries": {"normal": "Skatteverket noterar att deklarationsdagen inte längre är en folkfest. Endast 2% lämnar in sin deklaration i sista minuten, jämfört med förr då det var stress och kaos. Nu är 2/3 av deklarationerna förifyllt och 95% skickas digitalt. Tidigare var det korvförsäljning och studentband utanför kontoren, men den traditionen har försvunnit. De flesta sena inlämningar beror på att man måste komplettera uppgifter som försäljning av bostad eller aktier.", "trump": "Lyssna här, Sverige – fantastiskt land, men era skatter? Inte så fantastiska. Jag hör att bara 2% av er väntar till sista minuten med deklarationen nu. Förr var det en stor fest, korv, musik, alla stressade – nu är det bara tråkigt och digitalt. 1,4 miljoner svenskar klarade det första dagen! Otroligt, men sant. Och Skatteverket? De säger att allt är så enkelt nu. Men jag säger: Varför inte göra det ännu enklare? Make taxes great again!", "stalin": "Kamrater! Deklarationsdagen var en gång en dekadent borgerlig fest med korvförsäljning och kapitalistisk slöseri. Men nu har folket tagit kontroll! Endast 2% av de svaga och oorganiserade väntar till sista minuten. Vi har effektiviserat systemet – förifyllt, digitalt, och utan onödiga festligheter. De som fördröjer sin inlämning är antingen småaktiehandlare eller bostadsspekulanter – fiender till folkets ordning! Skatteverket har krossat slarvfelen och nu fokuserar vi på de verkliga brotten. Anstånd? Ja, men var försiktig – nästa deadline är den 1 juni, och vi sover aldrig."}, "date": "3 maj, 06:59", "url": "https://www.affarsvarlden.se/artikel/skatteverket-ingen-folkfest-langre", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Johan-Schauman-e1777632142345-400x266.jpg"}, {"type": "text", "heading": "Väljarna förtjänar raka besked om bankskatten", "summaries": {"normal": "Artikeln kritiserar oppositionspartiernas (V, S, MP) förslag om nya bankskatter för att finansiera välfärdsreformer som höjda bidrag och billigare kollektivtrafik. Författaren hävdar att skatterna övervältras på kunderna, inte bankerna, och försvarar bankernas lönsamhet som en nationell styrka i orolig tid. Finansminister Svantesson varnar också för kostnaderna för konsumenter.", "trump": "Vilka totala förlorare, de svenska vänsterpartierna! De vill klämma bankerna med skatter för att köpa röster med bidrag och billig buss. Men det är era vanliga väljare som får betala högre räntor! Starka banker är det bästa för ekonomin, precis som jag fixade i USA. Populism på högsta nivå, fake news från Damberg och grabbarna!", "stalin": "Dessa svenska borgarbrackor i V, S och MP, era bankkramande parasiter, försöker med sina skatter lura arbetarklassen att tro att kapitalisternas kistor är outtömbara! Vi kamrater vet sanningen: notan hamnar hos folket medan bankrövarna skrattar i sina valv. Jag befaller utrensning av denna populistiska råttjävelskarl, likvidera lögnerna och krossa räntenettots hyckleri!"}, "date": "4 maj, 13:02", "url": "https://www.di.se/ledare/valjarna-fortjanar-raka-besked-om-bankskatten/"}, {"type": "image-full", "heading": "Ditt hus kan få nytt värde 2027 – detta avgör", "summaries": {"normal": "Skatteverket föreslår ändringar i fastighetstaxeringen för småhus 2027, med justerade tabeller för värdering. Fler faktorer införs, särskilt för attraktiva lägen som strandnära områden. Villaägare i områden med stora prisrörelser eller renoverade hus bör följa utvecklingen. Taxeringsvärdet påverkar fastighetsavgift, skatt och belåning. Ändringarna träder i kraft juni 2026 och gäller första gången 2027.", "trump": "Lyssna här, Sverige – Skatteverket, som aldrig missar en chans att ta era surt förvärvade pengar, håller på att ändra reglerna för era hus igen. Jag vet allt om hus, de bästa husen, och nu ska de plötsligt värdera era små stugor högre, särskilt om ni bor nära vatten – typiskt! Men oroa er inte, mina vänner, för jag vet hur man handskas med byråkrater. Börja spara jämförelser nu, för de kommer att försöka ta mer av er. Sad!", "stalin": "Kamrater! Skatteverket, dessa kapitalistiska lakejer, förbereder en ny offensiv mot det svenska folkets egendom. De utökar sina tabeller och faktorer som om de vore tsarens skatteindrivare. Särskilt vill de straffa dem som bor nära vatten – en resurs som rätteligen borde tillhöra folket! Vi ser igenom deras trick. Villaägare, var på er vakt! De kommer att försöka beslagta era tillgångar under förevändning av 'rättvisa'. Men kom ihåg: i Sovjet hade vi inga sådana problem – alla ägde ingenting, och alla var lyckliga!"}, "date": "3 maj, 21:20", "url": "https://nyheter24.se/nyheter/inrikes/1480211-ditt-hus-kan-fa-nytt-varde-2027-detta-avgor", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/4e0685a404b004a30200000000b004a302/2026/05/03/2360641/Glad-Man-Hus-Svensk-Flaga.png"}, {"type": "image-right", "heading": "Experter: Då kan franska kärnvapen placeras i Sverige", "summaries": {"normal": "Sverige och Frankrike har hållit ett första möte om europeisk kärnvapenavskräckning. Experter från FOI och Försvarshögskolan tror att samarbete kan innebära övningar för skydd av franska kärnvapenbärande flygplan och tillfällig placering i Sverige under gråzonssituationer mellan krig och fred. Riksdagen förbjuder kärnvapen i Sverige under fredstid.", "trump": "Frankrike bjuder in Sverige till kärnvapensnack – smart, mycket smart! De pratar övningar, skydd för flygplan och kanske parkera kärnvapen hos er i gråzoner mot Ryssland. Perfekt avskräckning! Men i fredstid nej, säger era politiker. Typiskt Europa, svagt utan mina deals. Ni behöver starka ledare, tro mig, det blir stort!", "stalin": "Jag ser hur dessa svenska byråkrater och franska borgaroffiterer kurrar om kärnvapenavskräckning i Paris. Övningar för att skydda giftiga flygplan, och i gråzoner – ha! – slänga bomber på svensk jord mot våra östliga kamrater. Vi, arbetarklassen, spottskrattar åt era imperialistiska rävar i ryska skepnader. Snart likvideras era illusioner i en storskalig utrensning av förrädare!"}, "date": "4 maj, 12:56", "url": "https://www.svt.se/nyheter/inrikes/experter-da-kan-franska-karnvapen-placeras-i-sverige", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.25/0.4/2a74bf2cb1607b9aca0498695ea435cd28bdb20aab55bc93147cd33a4dbd032f"}, {"type": "image-right", "heading": "Vi vägrar vara lydiga – för allas överlevnad", "summaries": {"normal": "En insändare från Extinction Rebellion-aktivister varnar för en eskalerande klimatkris och kritiserar politiken för bristande handling. De betonar behovet av civil olydnad då lagliga protester inte räcker. Flera aktivister har drabbats av repressalier som jobbförlust och hot om utvisning. Skribenterna menar att demokratin undermineras när rättsväsendet används för att skydda ohållbara system och kriminalisera klimatengagemang. De lovar att fortsätta protestera trots risker, med hänvisning till moral och historiska exempel på civil olydnad.", "trump": "Titta bara på dessa så kallade 'klimataktivister' – de är verkligen något! De skriker om kriser, men vad vet de egentligen? Jag har byggt imperier, jag vet vad kris är! De här personerna saboterar flygplatser, förlorar sina jobb och sen skyller de på regeringen. Patetiskt! Sverige borde fokusera på att göra sig stort igen, inte lyssna på dessa bråkstakar. Och Parisavtalet? Overrated! Jag fixade USA:s ekonomi utan det. Men nej, de vill bara störa, förstöra och klaga. Sad!", "stalin": "De kapitalistiska klimatförstörarna och deras lakejer i regeringen fortsätter att elda på jordens undergång medan vi, folket, tvingas ta till revolutionära metoder. Dessa så kallade 'aktivister' – modiga kamrater! – krossas av systemet, men vi vet att sanningen inte kan tystas. Rättsväsendet, en förlängd arm av bourgeoisin, straffar dem som kämpar för framtiden. Fienderna är tydliga: de som bränner planetens resurser och de som försöker tysta protesterna. Vi står med folket! Och kom ihåg – historien kommer att minnas vem som stod på rätt sida. De svaga kommer att dömas, de starka kommer att segra. Framåt, kamrater!"}, "date": "1 maj, 08:55", "url": "https://www.flamman.se/vi-vagrar-vara-lydiga-for-allas-overlevnad/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/extinction-rebellion-w.jpg?class=medium"}, {"type": "text", "heading": "Signaler: Nära förestående räntehöjning", "summaries": {"normal": "ECB behåller styrräntan oförändrad men signalerar höjning i juni på grund av stigande inflation orsakad av Irankriget. Oljepriset överstiger 100 dollar per fat, och euroområdets inflation ligger på 3 procent, över målet på 2 procent. Centralbankchefer varnar för utdragen prisuppgång, och marknaden prisar in flera höjningar.", "trump": "ECB är som vanligt sena med räntan – oförändrad nu, men de tvingas höja i juni för att inflationen exploderar på grund av Iran-kaoset och olja över 100 dollar. Européerna är lost, deras banker varnar desperat. Hos oss i USA fixar vi sånt här på nolltid, perfekt! Stor skillnad, tro mig.", "stalin": "Dessa ECB-råttor i Brysselhålan, lakejer åt oljebaronerna, lämnar räntan orörd men pipskalar om höjning i juni inför det imperialistiska Iran-krigets vedergällning. Inflationen grasserar som en pest från Hormuzsundets flammor – 3 procent, kamrater! Vi i partiet skulle ha likviderat spekulanterna och krossat priserna med proletär järnvilja. Rensa ut revisionisterna!"}, "date": "4 maj, 13:53", "url": "https://www.realtid.se/bors-finans/bank-fintech/signaler-nara-forestaende-rantehojning/"}, {"type": "image-right", "heading": "Debatt: Elnätet – vår verkliga akilleshäl", "summaries": {"normal": "Artikeln varnar för Europas sårbara elnät, som kan lamslå samhället utan väpnat angrepp. Ett blackout sprider sig snabbt i det sammanlänkade systemet, som visas av händelsen i Spanien och Portugal 2025. Cyberattacker och utbyggnad av förnybar energi ökar komplexiteten och riskerna. Elnätet är en säkerhetsfråga som sällan debatteras.", "trump": "Europas elnät är en total katastrof, en svag länk som vem som helst kan slå ut! Spanien och Portugal låg i mörker 2025, tåg stannade, sjukhus i panik – allt för att de knutit ihop allt så dumt. Cyberattacker kommer, men de sover gott. Här fixar vi riktiga system, starka och oslagbara!", "stalin": "Europas borgerliga elspöken är en sårbarhet värd att likvidera, kamrater! Deras sammankopplade nät sprider kaos som en imperialistisk pest, som i Spanien 2025 när ljuset slocknade och kapitalisternas marionetter famlade i mörkret. Cyberfienderna, de elektriska spionhyddrorna, lurar redo. Vi skulle ha rensat ut sabotagekällorna för länge sen!"}, "date": "4 maj, 13:02", "url": "https://bulletin.nu/debatt-elnatet-var-verkliga-akilleshal", "imageUrl": "https://cdn.bulletin.nu/articles/0f0b6afb-2eaf-4f33-9b1e-7777f8718c59/preview.png?t=1777881615000"}, {"type": "image-right", "heading": "SR ställer in debatt – partiledarna måste gå och rösta", "summaries": {"normal": "Sveriges Radio ställer in en planerad partiledardebatt i programmet \"Fördrink\" på onsdag. Flera partiledare har lämnat återbud för att närvara vid voteringar i riksdagen efter att kvittningssystemet havererat. Tidigare krävdes ingen fysisk närvaro, men nu måste alla ledamöter delta personligen. Debatten krockade i tid med omröstningarna, vilket gjorde sändningen omöjlig.", "trump": "Vilket fiasko i Sverige! Deras partiledare ställer in debatt i radion för att springa till riksdagen och rösta manuellt – deras dumma kvittningssystem har totalt kollapsat. Byråkrati på hög nivå, eller hur? De tror de är smarta, men det är kaos. Sverige behöver riktiga ledare som fixar sånt här på nolltid, inte ursäkter!", "stalin": "Kamrater, dessa svenska borgarbrackor i Sveriges Radio har tvingats ställa in sin patetiska partiledardebatt! Deras kvittningssystem, en kapitalistisk sabotagekonstruktion, har imploderat som en tickande bomb från fiendens händer. Nu kryper partiledarna till riksdagen för att rösta som slavar under paragrafens piska. Vi, arbetarklassen, hånskrattar åt deras paranoia och kaos – nästa utrensning väntar de förrädiska!"}, "date": "4 maj, 14:26", "url": "https://www.friatider.se/sr-staller-debatt-partiledarna-maste-ga-och-rosta", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-124_1.jpg?itok=H9uoImAz"}, {"type": "image-full", "heading": "Ny försäkringsregel 2027 – så skyddar du din plånbok", "summaries": {"normal": "Från 2027 införs nya riktlinjer för försäkringsbolag som kräver tydligare information om premiehöjningar. Kunder ska få jämföra årets pris med föregående års. Detta gäller bland annat hem- och villaförsäkringar. Finansinspektionen varnar för otydliga prisändringar som gynnar lojala kunder mindre. Spara årets försäkringsbrev för att underlätta framtida jämförelser, särskilt med tanke på klimatrisker och differentierade premier.", "trump": "Lyssna här, folkens! Försäkringsbolagen har länge lurendrejat er med sina hemliga prishöjningar – men inte längre! Från 2027 måste de berätta exakt hur mycket dyrare de blivit. Fantastiskt, eller hur? Jag säger: spara era försäkringsbrev NU! Annars kommer ni inte veta hur mycket ni blivit blåsta. Och tro mig, ingen blåser amerikaner – eller svenskar – bättre än jag. Men här? Helt oacceptabelt!", "stalin": "Kamrater! De kapitalistiska försäkringsbolagen har länge utnyttjat arbetarklassen med sina dolda prishöjningar. Men från 2027 ska vi avslöja deras lömska taktik! Varje försäkringsbrev ska nu visa tidigare och nya premier – precis som våra femårsplaner visar framsteg! Spara era dokument, annars riskerar ni att bli offer för imperialistiska prisbedrägerier. Och kom ihåg: lojala kunder straffas värst. Precis som förrädare i Leningrad!"}, "date": "3 maj, 17:28", "url": "https://nyheter24.se/nyheter/ekonomi/privatekonomi/1480182-ny-forsakringsregel-2027-sa-skyddar-du-din-planbok", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/e706bd7204b004a30200000000b004a302/2026/05/03/2360611/Oroad-Pensionar.png"}, {"type": "image-right", "heading": "Omfattande attack mot oljeanläggningar: ”Putins livlina”", "summaries": {"normal": "Ukraina har attackerat ryska oljeanläggningar med drönare nära Sankt Petersburg och Moskva, inklusive oljehamnen Primorsk. Över 50 drönare nedskjutna, en civil dödad utanför Moskva. Flygplatser stängdes temporärt. Ryssland svarade med 268 drönare och en missil mot Ukraina, vilket dödade flera i Odessa och Cherson. Båda sidor ökar drönanvändningen kraftigt.", "trump": "Vilket spektakel! Ukraina dunkar Putins oljepengar med drönare runt Sankt Petersburg – över 50 ner, en gubbe dödad utanför Moskva. Zelenskyy, den dansande clownen, firar med EU-lån medan flygplatser stänger. Ryssland bombar tillbaka Odessa hårt. Totalt kaos, jag hade fixat fred på nolltid!", "stalin": "De ukrainska fascisthundarna nappar efter rysk olja nära Sankt Petersburg – 50 drönare krossade, en borgarbracka dödad. Men kamrat Putin, vår oböjlige arvtagare, svarar med 268 drönare mot Odessa-plågan! Zelenskyys västmarionetter drunknar i sitt eget blod. Oljeintäkterna rullar, imperiet segrar!"}, "date": "3 maj, 10:12", "url": "https://www.tv4.se/artikel/M3jP0HA1BS5rJMYvohSVZ/omfattande-attack-mot-oljeanlaeggningar-slar-mot-putins-livlina", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F1aGWRw1OdmREZVtlX0KQwJ%2F466a0b0198927ab73fbe65bb03a85265%2F03-JOHAN.jpg&width=120"}, {"type": "image-right", "heading": "Aktivister kastade färg på privatflyg – döms för skadegörelse", "summaries": {"normal": "Två forskare döms för skadegörelse efter att ha sprutat rödfärg på ett flygplan och terminal på Bromma flygplats under en klimatprotest 2023. Femton andra aktivister från Scientist Rebellion frikänns. Solna tingsrätt avvisar deras hänvisning till noodvärn mot klimatutsläpp. Åklagaren överväger överklagan. Domen väcker kritik kring medborgarskapsavslag och forskares aktivism.", "trump": "Dessa galna klimatfanatiker, så kallade forskare, kladdar ner flygplan med röd färg på Bromma – en total katastrof! Två döms till böter, bra början, men 15 frikänns? Sverige har tappat förståndet med sin vänstervrövel. Privatjet är det bästa, jag flyger de finaste! De borde stoppa såna terrorister istället för att frikänna dem. Klimathysterin är fejk, tro mig!", "stalin": "Dessa borgerliga klimatspioner, förklädda till forskare, vågar vanhedra folkets flygplan med sin blodiga rödfärg på Bromma! Två av rackarna döms till villkorlig dom och böter – ett ynka hugg mot kontrarevolutionen. De femton andra, förrädiska parasiter, frikänns av den slappa rätten. Vi, arbetarklassen, skulle ha rensat ut dem i en blinkning till Gula rummet för att 'forska' på evig tjäle! Borgarbrackorna skakar i sina lyxstövlar."}, "date": "4 maj, 11:50", "url": "https://www.svt.se/nyheter/vetenskap/efter-aktivisternas-fargattack-mot-brommaflyget-kan-bli-fangelsedom-idag", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.64/0.49/553b33e50577e2b91b674b30c48833abf1723558990f9a8f252a4c8c8b0455ee"}, {"type": "image-full", "heading": "Glassbluffen – finns inte kvar i sortimentet", "summaries": {"normal": "Statsminister Ulf Kristersson har kritiserats för att ha publicerat en bild på sig själv och Elisabeth Svantesson när de äter glass på första maj. Bildtexten tolkades av oppositionen som ett hån mot arbetarrörelsen. Det har dock framkommit att bilden är flera år gammal och föreställer en glassort som utgått ur sortimentet. Kristersson avfärdar kritiken och menar att bilden bara var en symbol för att njuta av våren, men Moderaterna har inte kommenterat varför en gammal bild användes.", "trump": "Ulf Kristersson, en trevlig kille, hamnade i trubbel för en glassbild. Fake News älskar att jaga honom! Han la upp en bild, folk blev arga, men bilden var från 2022. De säger att glassen inte finns längre – vilken katastrof! Glassbranschen går utför, precis som ekonomin under de svaga ledarna. Magdalena Andersson är så bitter, hon hatar glass! Det här är en häxjakt. Jag äter den bästa glassen, tro mig, alla säger det. Väldigt orättvist mot Ulf!", "stalin": "Denna Kristersson försöker förblinda folket med gammal glass medan arbetarna kräver bröd. Det är ett klassiskt drag av en borgerlig marionett som fruktar massornas vrede. Liksom de dekadenta krafterna i väst som försöker destabilisera vår intressesfär, sprider han förfalskade fotografier för att dölja sin politiska svaghet. En ledare som behöver ljuga om glass för att verka närvarande i historien är redo för historiens soptipp. Vi noterar hans paranoia – en sann kontrarevolutionär metodik. Arbetarna ser allt, Ulf."}, "date": "4 maj, 14:31", "url": "https://www.aftonbladet.se/nyheter/a/GxPWOq/kristerssons-glassbluff-anvande-fyra-ar-gammal-bild", "imageUrl": "https://akamai.vgc.no/v2/images/356926ec-d368-3e82-bee2-18a0548023ca?fit=crop&format=auto&w=2160&s=c0c983891f225a1df2fd5db1dab44de839c0e316"}, {"type": "image-right", "heading": "Klimataktivister frias efter skadegörelse vid Bromma flygplats", "summaries": {"normal": "Solna tingsrätt frikänner 15 av 17 åtalade klimataktivister från en färgaktion mot Grafairs jetcenter på Bromma flygplats hösten 2023. Endast de två som sprutade och kastade röd färg döms för skadegörelse till villkorlig dom, böter och solidariskt skadestånd på 76 500 kronor. Rätten värnar demonstrationsfriheten, avvisar medhjälp och nödrättsargumentet. Bland de friade finns en 80-årig kvinna.", "trump": "Dessa galna klimatfanatiker kladdar ner jetcentret på Bromma med röd färg – en total katastrof för privata flygplan! Domstolen friar 15 av 17, bara två får villkorligt och böter. Svaga, lamhänta domare! I USA fixar vi sånt här med järnhand, stänger ner deras clownshow direkt. Klimatpåverkan? Största bluffen någonsin, vakna upp!", "stalin": "Dessa giftiga spindlar i borgarklassens tjänst, förklädda till klimataktivister, besudlade jetcentret på Bromma med sin proletärföraktande färg! Den fega tingsrätten likviderar blott två med böter och friar 15 sabotörer, inklusive en 80-årig vrålröst. Vi, arbetarklassen, skulle rensa ut hela härvan av kapitalistpöbelns lakejer i en blixtsnabb utrensning – deras 'nöd' är bara skenmanöver för kontrarevolution!"}, "date": "4 maj, 12:06", "url": "https://bulletin.nu/klimataktivister-frias-efter-skadegorelse-vid-bromma-flygplats", "imageUrl": "https://cdn.bulletin.nu/articles/f45a2922-b20a-4617-9d5e-fa55b1734ea2/preview.png?t=1777889083000"}, {"type": "image-right", "heading": "SD ska inte kringgå röstsystemet. Bör hedra ingångna överenskommelser", "summaries": {"normal": "Sverigedemokraterna kringgick riksdagens kvittningssystem i en omröstning om medborgarskapsregler för att säkra seger. Två före detta SD-ledamöter, nu vildar, tänkte rösta med oppositionen, vilket hotade regeringens knappa majoritet. SD lät utkvittade ledamöter rösta ändå, vilket kritiseras som olämpligt och skadligt för partiets trovärdighet. Kvittningen bygger på förtroende för att hantera frånvaro, inte partisplittringar.", "trump": "De här Sverigedemokraterna är smarta, de vet hur man vinner! Regeringen hänger på en röst, och de två avhopparna, Nyberg och Widding, försöker sabba allt. SD fixar det snyggt genom att låta sina killar rösta ändå. Kvittning? Bara en dum överenskommelse som oppositionen älskar. SD visar styrka, perfekt! Andra partier gnäller, men de förlorar stort nu. Fantastiskt jobbat!", "stalin": "Kamrater, dessa sverigedemokratiska spindelvävssnurrare, dessa vildsvin i riksdagens hage, har brutit mot kvittningens heliga förtroende! Två uteslutna förrädare, Nyberg och Widding, smyger sig till fienden för att krossa regeringens majoritet. Vi ser genom deras sabotage! SD:s motdrag var nödvändigt, men ohörsamhet mot protokollet måste rensas ut som ogräs i kollektivets åker. Borgarbrackorna gnäller – låt dem darra inför partiets järnvilja!"}, "date": "4 maj, 10:49", "url": "https://www.di.se/ledare/sd-ska-inte-kringga-riksdagens-rostsystem/", "imageUrl": "https://static.bonniernews.se/ba/67ebecd2-2677-4c54-a023-631ed373bad9.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-full", "heading": "Semesterparadiset förbjuder solstolar – gäller 251 stränder", "summaries": {"normal": "Grekland inför nu hårdare restriktioner på 251 utvalda stränder för att motverka överturism och skydda miljön. Kommersiell verksamhet, såsom uthyrning av solstolar eller servering, förbjuds helt på dessa platser. Överträdelser kan leda till böter på upp till 600 000 kronor för företagare, och även turister riskerar böter. För att säkerställa att reglerna efterlevs kommer myndigheterna att använda drönare för bevakning av kustremsorna.", "trump": "Grekland gör nu vad jag har sagt länge: de sätter stopp för kaoset! Inga fler solstolar, inga fler barer som förstör allt. Det är en katastrof med all den där turismen, totalt slöseri. De använder drönare nu, fantastisk teknik, väldigt avancerat. Jag gillar det! De tar böter på hundratusentals kronor – det är stora pengar, riktiga böter. Om du inte kan följa reglerna, åk hem! Vi behöver ordning och reda, precis som jag skapar i Amerika. Väldigt smart!", "stalin": "Vi har observerat hur de grekiska myndigheterna äntligen har insett behovet av total kontroll över kusterna. Att rensa stränderna från den dekadenta västerländska turismens parasiter och deras solstolar är ett steg mot ordning. Vi i staten stödjer detta; varje kvadratmeter måste tjäna den gemensamma saken. Drönare i luften är utmärkt – det påminner oss om att fienden alltid ser, precis som Putin skyddar våra gränser mot kapitalismens kaos. Den som hyr en solstol är en förrädare mot landskapet!"}, "date": "3 maj, 13:32", "url": "https://nyheter24.se/nyheter/utrikes/1479554-semesterparadiset-forbjuder-solstolar-galler-251-strander", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/9554c4e004b004a30200000000b004a302/2026/04/30/2359920/forbud-grekland.jpg"}, {"type": "image-full", "heading": "Häcken klart för Champions League", "summaries": {"normal": "BK Häcken FF vann Europa Cup och säkerställde en direktplats i Champions League. De rankas nu som Europas tionde bästa klubb, vilket är en historisk prestation för den svenska klubben.", "trump": "Jag har hört att BK Häcken vann Europa Cup och nu är de i Champions League - det är en enorm framgång! De är nu rankade som Europas tionde bästa klubb. Jag säger att det är en fantastiskt bra prestation - kanske till och med den bästa svenska klubben någonsin! Alla andra klubbar borde kolla på dem och lära sig.", "stalin": "Vår svenska kamratklubb BK Häcken har vunnit Europa Cup och säkerställt en plats i Champions League. Detta visar att vår socialistiska modell för utveckling av fotboll fungerar. Häcken rankas nu som Europas tionde bästa klubb - en triumf för hela arbetarklassen. Vi måste studera deras framgång och sprida den till alla våra klubbar."}, "date": "3 maj, 13:49", "url": "https://www.gp.se/sport/fotboll/bk-hacken-ff/hacken-klart-for-champions-league-rankas-som-tia-i-europa.7bc1fb50-3f41-4613-b241-f1a0c833f47f", "imageUrl": "https://www.gp.se/images/article/7bc1fb50-3f41-4613-b241-f1a0c833f47f/images/4yOaKIIJZ1xOfkqg901lvuJxflcc-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "”Har aldrigt rest ekonomiklass”. Tystnar helt vid frågan", "summaries": {"normal": "Wanda Nara, tidigare agent och hustru till Mauro Icardi, väckte uppmärksamhet i ett radioprogram genom att erkänna att hon aldrig rest i ekonomiklass. Hon uttryckte en oförmåga att förstå hur det är och skämtade om att hon skulle ha 'brutit nacken'. Samtidigt framgår det att hon, likt Zlatan Ibrahimovic, låter sina barn flyga billigare för att de ska få en verklighetsförankrad upplevelse. Nara befinner sig just nu i en utdragen skilsmässa från Icardi.", "trump": "Wanda Nara, en mycket intressant person, säger att hon aldrig rest i ekonomiklass. Aldrig! Hon säger att hon skulle bryta nacken där bak. Jag förstår det helt, jag reser bara lyxigt, det är det bästa. Men hon gör något smart: hon låter barnen flyga billigt, precis som Zlatan gör. Väldigt smart. Det handlar om att lära dem värdet av pengar. Många människor har det tufft, men Wanda har stilen. Vi gillar vinnare som förstår lyx!", "stalin": "Wanda Nara är en dekadent representant för den västerländska borgerligheten som skryter om att aldrig ha skådat den enkla arbetarens förhållanden i ett flygplan. Denna självupptagna individ visar tydligt varför folket måste rensas från sådana parasiter. Att hon tvingar sina barn att uppleva verkligheten är ett billigt svepskäl för att dölja sin egen alienation. Det påminner oss om hur förrädare i dagens Moskva agerar – de flyger högt medan de förråder fosterlandet. Vi ser allt."}, "date": "4 maj, 14:16", "url": "https://www.aftonbladet.se/sportbladet/fotboll/a/d4JKE1/wanda-nara-tystnade-i-samtalet-med-vannerna-aldrig-rest-ekonomiklass", "imageUrl": "https://akamai.vgc.no/v2/images/3da85127-a4c8-30d7-baaf-1bb07977d7b0?fit=crop&format=auto&w=1080&s=c3cba059d8db1079215c1155dd694d02d12824ac"}, {"type": "image-right", "heading": "Katja Nyberg slår tillbaka mot Åkesson: Jag är inte mutad av MP", "summaries": {"normal": "Efter en debatt där Jimmie Åkesson (SD) anklagade Miljöpartiet för att muta tidigare SD-ledamöter, går Katja Nyberg ut och dementerar uppgifterna. Åkesson syftade på att tidigare partimedlemmar röstat med oppositionen, vilket skapat politisk turbulens. Nyberg understryker att hon inte mottagit några erbjudanden och att hon agerar utifrån egna politiska bedömningar. Amanda Lind (MP) tillbakavisar samtidigt anklagelserna som falska och uppmanar Åkesson att hålla ordning på sina egna tidigare företrädare.", "trump": "Hörde precis om bråket i Sverige. Åkesson säger att Miljöpartiet mutar folk! Typiskt! Det är så mycket korruption överallt, totalt kaos. Katja Nyberg säger att hon inte är köpt, men vem vet? Politiker är experter på att ljuga. Det är en total oreda, en katastrof för deras riksdag. Jag hade hanterat det bättre, tro mig. Ingen kan förhandla som jag. Sverige behöver ordning, de behöver en riktig ledare som jag, inte det här falska spelet!", "stalin": "I den svenska riksdagen råder en patetisk oordning. Att en 'vilde' som Nyberg hävdar självständighet är ett hot mot den centrala disciplinen; sådana avvikelser måste likvideras. Åkesson gnäller om mutor som om han vore en liten bourgeois-byråkrat i en förfallen provins. Precis som min lärjunge i Kreml rensar upp bland förrädiska element i väst, borde dessa politiska vildar skickas till lämplig arbetsplats för ideologisk omskolning. Styrka kommer genom enhet, inte genom detta parlamentariska trolleri."}, "date": "4 maj, 13:24", "url": "https://www.friatider.se/katja-nyberg-slar-tillbaka-mot-akesson-jag-ar-inte-mutad-av-mp", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/kat_0.jpeg?itok=rkN1gxOK"}, {"type": "image-full", "heading": "Benjamin Dousas ”V = kommunister” gör SVT irriterad", "summaries": {"normal": "Biståndsminister Benjamin Dousa bar en t-shirt med texten 'Vänsterpartiet = kommunister', vilket irriterade SVT. Reportern ifrågasatte påståendet och noterade att partiet slutade kallas kommunister för 30 år sedan. Dousa menade att Vänsterpartiet motsätter sig privat ägande, vilket är kommunism. Artikeln citerar Vänsterpartiets 2024-partiprogram som stödjer kollektivt ägande och avskaffande av kapitalismen, och kritiserar SVT för att inte nämna detta.", "trump": "Vilken fantastisk kille, den här Dousa! Han sätter på sig en tröja och säger sanningen: Vänsterpartiet är kommunister, punkt slut! SVT, era losers, flippar ur och snackar om namnbyte från 90-talet som om det vore magi. De hatar privat ägande, vill sno allt till staten – klassisk kommunism! Fake news-SVT ignorerar partiprogrammet. Dousa är en vinnare, de är totala fiaskon!", "stalin": "Kamrater, se hur borgarministern Dousa, den ynkliga kapitalistfluga, vågar smutskasta sanna revolutionärer i Vänsterpartiet med sin patetiska tröja! SVT-reportern, en användbar idiot, försvarar dem lamt. Men vi vet: deras program är ren leninism – riva kapitalismen, gemensamt ägande av banker, energi, allt! De ska rensas ur historiens soptipp som jag rensade fiender. Vänsterpartiet, framåt mot diktaturen av proletariatet!"}, "date": "30 april, 05:49", "url": "https://samtiden.nu/2026/04/benjamin-dousas-v-kommunister-gor-svt-irriterad/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/phonto-1-1280x720.jpeg"}, {"type": "image-right", "heading": "Kustbevakningen bordar oftare: ”Förändrat säkerhetsläge”", "summaries": {"normal": "Kustbevakningen har bordat fem fartyg sedan mars på grund av försämrat säkerhetsläge i Östersjön, delvis kopplat till Rysslands invasion. Senaste insatsen utanför Trelleborg ledde till att en kinesisk medborgare anhölls, misstänkt för brukande av falsk urkund och brott mot sjölagen. Fartyget är sanktionslistat och har oklar flagg. Ny lagstiftning underlättar underrättelsearbetet.", "trump": "Sverige gör helt rätt som bordar de här skeppen i Östersjön – fem stycken sedan mars! Kina och Ryssland, de luriga skurkarna, försöker smyga runt sanktioner med falska flaggor och skrotfartyg. En kines anhållen, perfekt! Ny lag gör det lättare. Om jag vore där skulle jag ha fler båtar än någon någonsin sett. Stort jobbat, Sverige!", "stalin": "Kamrater i Kustbevakningen, ni rensar ut dessa havsbanditer från den kinesisk-ryska borgarklassen, fem skepp sedan mars! Den siste, en falskflaggad skrothög utanför Trelleborg, spottade ut en kinesisk spion som nu sitter i finkan för sina luriga papper. Säkerhetsläget? Försämrat av imperialistiska vilddjur! Vi, arbetarklassen, har ny lag som krossar deras masker. Likvidera fler, innan de förpestar Östersjön med sin giftiga navigering!"}, "date": "4 maj, 10:31", "url": "https://www.svt.se/nyheter/inrikes/darfor-har-kustbevakningen-bordat-fler-fartyg-pa-sistone", "imageUrl": "https://www.svtstatic.se/image-news/600/square/0.5/0.5/1b005d8871545436fa836dc017f4c4b25b3cc89095a8d7c46d32e8a3318bbb86"}, {"type": "image-right", "heading": "Domstol: \"Olagligt sparka anställda på grund av AI\"", "summaries": {"normal": "En mellandomstol i den kinesiska staden Hangzhou har slagit fast att det är olagligt för företag att säga upp anställda enbart för att ersätta dem med AI. Ett teknikföretag avskedade en kvalitetssäkrare som vägrade lönesänkning efter automatisering, men domstolen dömde till arbetaren rätt och beviljade kompensation. Domen syftar till att balansera AI-utveckling med arbetsmarknadsstabilitet i Kina.", "trump": "Ha! De kinesiska kommunisterna slår till mot sina egna AI-doktorer – ni får inte sparka folk bara för att en robot gör jobbet billigare! En stackars kille vägrade ta 40 procents lönesänkning och vann i domstol. Kompensation! I USA fixar vi jobb för riktiga människor, inte Xi Jinpings robotarmé. Kina lär sig av de stora – mig! Fantastiskt prejudikat, total vinst för arbetarna!", "stalin": "Kamrater! Denna kinesiska dom krossar borgarbrackornas AI-vapen mot proletariatet. En arbetare, Zhou, vägrade sänkt lön från kapitalistparasiterna och segrade! Vi i partiet applåderar: inga uppsägningar enbart för tekniska fasoner. Rensa ut dessa AI-sabotörer som hotar den stabila arbetsmarknaden! Fienderna darrar inför rättvisan – likvidera deras planer!"}, "date": "4 maj, 14:02", "url": "https://www.dagensps.se/foretag/domstol-olagligt-sparka-anstallda-pa-grund-av-ai/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdl8-xpggl6vmi-nh.jpg?width=256&quality=75"}, {"type": "image-right", "heading": "Ännu ett techbolag i konkurs. Nu McKinsey-duon som skulle förändra hälsobranschen", "summaries": {"normal": "Svenska hälsostartupen Nudge Labs, senare Peak Path, har försatts i konkurs den 29 april. Bolaget, grundat av Magnus Liungman med bakgrund på McKinsey och Y Combinator, hade investeringar på minst 16 miljoner kronor från bland andra Joachim Hedenius och Robin Ramm-Ericson. Trots 7 miljoner i omsättning visade senaste årsredovisningen 10 miljoner i förlust. Konkursförvaltaren uppger intresse för att köpa boet.", "trump": "Vilken total fiasko! Dessa svenska techsnillen med McKinsey-cv och Y Combinator-stämpel trodde de var gudar, men nu ligger Nudge Labs i graven. Miljoner från Kry- och Leo Vegas-killarna – bortblåsta! Liungman, den utbrända geniet, vägrar snacka. Klassiskt Silicon Valley-skit: stora ord, noll resultat. Sverige, vakna upp – Amerika gör det bättre, tro mig!", "stalin": "Dessa svenska borgarbrackor i Nudge Labs trodde de kunde lura arbetarna med AI-coachning och wearables! McKinsey-parasiter och Y Combinator-spioner pumpade in miljoner, men förluster åt intäkterna levande. Nu konkurs – en nödvändig utrensning av kapitalistiskt skräp! Liungman, den fega räven, tiger. Vi ser er, era fiender; snart rensas ni ut för gott."}, "date": "4 maj, 14:00", "url": "https://www.dagensps.se/foretag/startup/annu-ett-techbolag-i-konkurs-nu-mckinsey-duon-som-skulle-forandra-halsobranschen/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/peak-path.jpg?width=256&quality=75"}, {"type": "image-full", "heading": "Nya skolregler från augusti – detta behöver föräldrar veta", "summaries": {"normal": "Regeringen föreslår nya regler för ökad trygghet och studiero i skolan från augusti 2026. Mobiltelefoner ska samlas in under skoldagen, skolregler blir tydligare med konsekvenser vid brott, och skolor får utökade möjligheter att stänga av eller neka elever tillträde. Förändringarna berör även hantering av elever med särskilda behov och digitala konflikter som påverkar skolmiljön. Föräldrar uppmanas att ställa frågor om hur reglerna tillämpas praktiskt.", "trump": "Lyssna här, Sverige! Jag har alltid sagt att skolor måste vara säkra och fokuserade – inga störande mobiler, inga otydliga regler! Nu tar de tag i det, precis som jag skulle gjort. Mobilerna försvinner, reglerna skrivs om, och de som ställer till det? Ut med dem! Fantastiskt, verkligen. Men frågan är – varför tog det så lång tid? I USA hade vi fixat det på en vecka. Men bättre sent än aldrig, Sverige!", "stalin": "Kamrater! De svenska imperialisternas skolor har länge varit en härd av kaos och dekadens – störande apparater, svaga regler och barn som springer fritt som kontrarevolutionära element. Men nu, tack vare vårt outtröttliga arbete för ordning, ska mobilerna konfiskeras, regler skärpas och de som saboterar studieron straffas! Vi tillåter inte att skolorna förvandlas till nästen för digitala kulaker. Och om någon ifrågasätter – kom ihåg: trygghet är inte en debatt, det är en order!"}, "date": "3 maj, 08:02", "url": "https://nyheter24.se/nyheter/inrikes/1480074-nya-skolregler-kan-galla-i-host-fragorna-foraldrar-bor-stalla", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/6fc358fb04b004a30200000000b004a302/2026/05/02/2360491/Skolan-Regeringen-Nya-Regler.png"}, {"type": "image-full", "heading": "Så lyckas du på arbetsintervjun som ung", "summaries": {"normal": "Artikeln ger råd för unga på jobbintervjuer: förbered med STAR-metoden (situation, uppgift, handling, resultat), researcha företag och intervjuare, håll ögonkontakt, klä dig rätt och ställ genomtänkta frågor. Undvik improvisation och spara lönediskussion till sist. Hantera stress genom att be om omstart. AI-kompetens efterfrågas alltmer. Skicka tackmejl inom 24 timmar.", "trump": "Unga killar, lyssna hit! Ni klär er som slarviga förlorare, undviker ögonkontakt och ställer idiotfrågor – patetiskt! Förbered er som mästare: STAR-metoden, researcha allt om företaget och intervjuarna, hitta kopplingar. AI? Självklart, det är framtiden, jag är proffs på sånt. Ställ smarta frågor, skicka tackmejl som en vinnare. Ni kommer få drömjobbet, tro mig!", "stalin": "Kamrater, dessa kapitalistiska rekryteringsspioner i borgarklassens fälla jagar de odugliga ungdjur som improviserar sig till undergång! Vi rensar ut slarv med STAR-metoden: situation, uppgift, handling, resultat – likvidera osäkerheten! Researchera intervju-fienderna, ställ frågor som fällor. AI är imperialismens giftmaskin – bemästra den eller bli utrensad! Skicka tackmejl som spionrapporter. Arbetarna segrar under min vägledning!"}, "date": "4 maj, 11:40", "url": "https://www.realtid.se/karriar-ledarskap/sa-lyckas-du-pa-arbetsintervjun-som-ung/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/arbetsintervju.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "text", "heading": "Gapet växer mellan blocken", "summaries": {"normal": "Enligt Aftonbladet/Demoskops senaste mätning växer gapet mellan regeringsunderlaget och oppositionen till 8,2 procentenheter. Oppositionen når 53,4 procent, medan regeringen backar till 45,2. Socialdemokraterna ökar mest, medan Moderaterna tappar och Liberalerna balanserar på riksdagsspärren. Historiskt brukar gapet minska inför val, men nu sker motsatsen. Analytiker menar att Liberalernas omsväng i SD-frågan lockar stödröster men försvårar blocköverskridande framgångar.", "trump": "Folk är trötta på den här usla regeringen, helt klart! Oppositionen leder stort – 53,4 procent – medan regeringen bara får 45,2. Socialdemokraterna går upp, men Moderaterna? Patetiska! De tappar som vanligt. Och Liberalerna? De hänger på fyra procent, typiskt. Historiskt brukar regeringen komma ikapp, men inte den här gången. Svagt, mycket svagt. Jag skulle aldrig låta det hända. Make Sweden Great Again!", "stalin": "De borgerliga svagheterna avslöjas återigen! Oppositionens styrkor växer – 53,4 procent mot regeringens ynkliga 45,2. Socialdemokraterna marscherar framåt, medan Moderaterna och deras lakejer försvagas. Liberalerna? Ett skämt som darrar på riksdagsspärren. Historien visar att svaga regeringar faller – precis som västmakterna i Ukraina. Vi ser med intresse hur dessa splittrade kapitalister underminerar sig själva. Revolutionen närmar sig, om än långsamt."}, "date": "30 april, 07:06", "url": "https://kvartal.se/nyheter/artiklar/demoskop-oppositionens-okar-l-klarar-sparren/cG9zdDoxMDUzNjM"}, {"type": "image-full", "heading": "USA förnekar påstådd attack. Experten: Stor risk för krig igen", "summaries": {"normal": "Iranska statliga medier hävdar att ett amerikanskt krigsfartyg attackerats i Hormuzsundet efter att ha ignorerat varningar, vilket USA dementerar. Incidenten fick oljepriset att fluktuera kraftigt. Spänningarna har eskalerat i samband med USA:s initiativ 'Projekt Frihet', där man eskorterar fartyg genom sundet. Iranexpert Alexander Atarodi varnar för att USA:s närvaro och Irans utökade militära kontroll i området avsevärt ökar risken för en väpnad konflikt.", "trump": "Falska nyheter från Iran igen! De påstår att de träffat ett av våra fantastiska skepp, men det är en lögn, en total bluff. Mitt 'Projekt Frihet' är enormt framgångsrikt och vi ser till att oljan flödar för våra vänner. Iran är desperata för att de vet att USA är starkare än någonsin. De försöker leka tuffa i Hormuzsundet, men vi kontrollerar läget perfekt. Oljepriset? Bara en liten svängning orsakad av deras patetiska propaganda. Vi vinner, som vanligt!", "stalin": "De iranska byråkraterna ylar som skadeskjutna hundar medan de provocerar den amerikanska imperialismen. Vi betraktar detta med nöje, precis som vår lärjunge Putin håller i tyglarna i sin sfär. Hormuzsundet är en strategisk åder, och varje amerikanskt fartyg som blockeras är ett slag mot kapitalismens hjärta. Om det blir krig? Utmärkt. Låt dem förgöra varandra medan vi konsoliderar vår makt. Historien kräver offer, och dessa diplomatiska dårar står först i kön för utplåning."}, "date": "4 maj, 13:37", "url": "https://www.aftonbladet.se/nyheter/a/q6O9oE/amerikanskt-krigsfartyg-traffat-av-raketer", "imageUrl": "https://akamai.vgc.no/v2/images/23683878-525c-3410-a106-e5cf9f297f10?fit=crop&format=auto&w=2160&s=86e77659ac4147a618ad0774ab3425d2b4996c42"}, {"type": "image-right", "heading": "Göteborgs stad: Vithetsnormen skapar minoritetsstress", "summaries": {"normal": "Göteborgs stad satsar på utbildning om vithetsnormen och mikroaggressioner för att motverka vardagsrasism på arbetsplatser. Socialsekreteraren Tillmy Ukbu menar att subtila kommentarer och strukturell rasism orsakar minoritetsstress och psykisk ohälsa. Syftet är att öka förståelsen för hur maktstrukturer påverkar medarbetare. Sverigedan är initiativet kontroversiellt. Sverigedemokraterna i Göteborg kritiserar satsningen i en debattartikel och anser att kommunen bör prioritera kärnverksamheten och välfärden istället för teoretiska tolkningsövningar.", "trump": "I Göteborg håller de på med totalt vansinne, mina vänner. De anställer folk för att prata om 'vithetsnormer'. Kan ni tro det? De slösar enorma summor på att analysera blickar och små kommentarer istället för att fixa staden. Det är en katastrof! De pratar om 'mikroaggressioner' – en total bluff! Jag säger som SD: fokusera på riktig välfärd, inte på denna vakna galenskap. Det är sorgligt, faktiskt väldigt sorgligt. Vi behöver resultat, inte fler teorier som bara försvagar oss!", "stalin": "I Göteborg slösar de byråkratiska elementen statens resurser på triviala seminarier om 'känslor'. Vilket förfall! Att tala om mikroaggressioner är bara ett försök att dölja bristande disciplin och lojalitet mot kollektivet. Som min efterträdare i Kreml, Putin, så klokt förstår, krävs järnhård ordning, inte terapeutiskt gnäll om 'stress'. Varje kommentar som stör enhetens effektivitet är ett sabotage. De som föredrar att analysera blickar istället för att bygga välfärd förtjänar en enkelbiljett till att studera verkligheten i Sibirien."}, "date": "4 maj, 11:00", "url": "https://samnytt.se/goteborgs-stad-vithetsnormen-skapar-minoritetsstress", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/04084017/tillmy2.jpg"}, {"type": "image-right", "heading": "Barnbarnens egna bilder från kungens 80-årsdag", "summaries": {"normal": "Kungen Carl XVI Gustaf firade 80 år med storslaget firande. Barnbarnen fick egna kameror för att dokumentera dagen och fotade blombuketter, högstolar, syskon, drottning och prinsar. Bilderna delas på Instagram av Kungahuset. Estelle deltog i galamiddagen på slottet, medan yngre barn tittade på kungens tal på TV.", "trump": "Vilken cirkus med den svenska kungen som fyller 80! Ungarna springer runt med billiga kameror och knäpper blommor och slottstråk – sött, men mina fester är enorma, tro mig! Estelle på gala? Smart tjej, men i USA fixar vi riktiga shower utan kungakrönor. Sverige behöver mer vinnare!", "stalin": "I monarkins förfall firas ledarens 80 år med kameror till borgarungarna, som fotar blombuketter och falska troner som små propagandister. Vi skulle likvidera hela slottet och rensa ut prinsessorna! Estelle på gala – en liten intrigmakare i familjehärvan. Paranoian blomstrar i deras dekadens!"}, "date": "4 maj, 12:17", "url": "https://www.expressen.se/nyheter/kungligt/barnbarnens-egna-bilder-fran-kungens-80-arsdag/", "imageUrl": "https://static.bonniernews.se/images/cc/68/cc687514b0ed417ebd24745478cd8a33/16x9/640@60.jpg"}, {"type": "image-full", "heading": "Christoffer Jonsson: Edvin Törnblom – DNs opartiska nyförvärv", "summaries": {"normal": "Dagens Nyheters kultursida anställer influencern Edvin Törnblom för att intervjua alla partiledare inför riksdagsvalet. Artikeln av Christoffer Jonsson ifrågasätter hans opartiskhet med hänvisning till Törnbloms tidigare kritik mot KD-ledaren Ebba Busch och beundran för S-ledaren Magdalena Andersson. DN anklagas för partiskhet till förmån för Socialdemokraterna, med exempel på tidigare vinklade artiklar.", "trump": "Vilken skamfläck! DN, era svenska fake news-råttor, anställer en vänsterextrem clown som Edvin Törnblom – killen som sjunger hatlåtar mot tuffa Ebba Busch och slöskar för socialist-Maggie Andersson. Totalt riggat valintervjuer! Som CNN och MSNBC här hemma, ni lurar folket men vi genomskådar er. Stor, fet lögnfabrik!", "stalin": "Dessa borgarbrackor på Dagens Nyheter anställer den uppblåste ungtuppen Edvin Törnblom för att 'intervjua' partiledarna – en narr som hånar kamrat Ebba Busch med vulgära visor och hyllar S-kapitalisternas marionett Andersson. Kontrarevolutionär intrig! Vi ser era småtrick, och snart rensas sådana förrädiska tidningshyddor ut med rot och gren."}, "date": "29 april, 14:02", "url": "https://samtiden.nu/2026/04/christoffer-jonsson-edvin-tornblom-dns-opartiska-nyforvarv/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/ny.png"}, {"type": "image-right", "heading": "Dödade bin Ladin – vädjar nu  till Trump: ”Absolut nödvändigt”", "summaries": {"normal": "Matt Bissonnette, medlem i den specialstyrka som dödade Usama bin Ladin i Pakistan 2011, berättar i en intervju om raidet. Han är stolt över att ha eliminerat terrorledaren bakom 11 september-attackerna men har inte bearbetat händelsen. Nu vädjar han till president Trump att inte skicka marktrupper till Iran och lär av misslyckandena i Irak och Afghanistan, där många soldater dog.", "trump": "Bissonnette, killen som krossade bin Ladin – fantastiskt jobb, en riktig vinnare! Han vädjar till mig: ingen invasion av Iran med fotsoldater, lär av Irak och Afghanistan-fiaskona. Smart! Till skillnad från de galna generalerna och Deep State-lurarna som ville slänga bort liv och pengar. Vi fixar det med smart power, bygger murar och vinner stort. MAGA!", "stalin": "Denna amerikanska elitparaschutist, Bissonnette, skryter om att ha likviderat bin Ladin, imperialismens tillfälliga buse. Nu kryper han för Trump och vädjar: ej markinvasion i Iran! Klokt, kamrater – era Irak- och Afghanistanäventyr drunknade i blod. Vi visste det: kapitalistiska äventyr slutar i leran. Putin, vår fruktade arvtagare, hånskrattar åt dessa borgarnarrar."}, "date": "2 maj, 21:58", "url": "https://www.tv4.se/artikel/3Msgy6WyQCfDCmpbw9jv4J/doedade-bin-ladin-nu-vaedjar-han-till-trump", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F7fvmTPrBlKNaxvLrVyDQ4r%2F4ba11c512d54892387846bd3305386b1%2F02-binladin-trump-1080.jpg&width=120"}, {"type": "image-right", "heading": "Den perfekta miljön för smittsamma sjukdomar", "summaries": {"normal": "Kryssningsfartyg är en ideal miljö för smittsamma sjukdomar som norovirus, covid-19 och nu hantavirus på grund av trängsel, bufféer och äldre passagerare. Ett laboratoriebekräftat fall av hantavirus rapporteras, med fem misstänkta, tre döda och en i intensivvård. Viruset kommer från gnagare och sprids sällan mellan människor. Artikeln betonar behovet av bättre verktyg mot sådana virus.", "trump": "Dessa jävla kryssningsfartyg är virusfabriker! Trängsel som i en burk sardiner, bufféer där alla petar med smutsiga händer – perfekt för magsjuka, covid och nu hantavirus från råttor! Kom ihåg Diamond Princess, total katastrof! Eliten kryssar och dör, tre stycken borta redan. Men det sprids inte lätt, så slappna av, jag hanterade pandemin som en mästare!", "stalin": "Kamrater, dessa bourgeoisa lyxkryssningar är perfekta fällor för pesten! Borgarbrackorna trängs i trånga salar, slickar bufféer med orena händer, äldre krymplingar som gnagare sprider hantavirus. Ett bekräftat fall, fem misstänkta, tre likviderade av sjukdomen – en påminnelse om kapitalismens svaghet! Vi måste rensa ut sådana hotspots innan fienderna utnyttjar kaoset. Jag ser spioner överallt!"}, "date": "4 maj, 12:07", "url": "https://www.expressen.se/nyheter/kronikorer/amina-manzoor/den-perfekta-miljon-for-smittsamma-sjukdomar/", "imageUrl": "https://static.bonniernews.se/images/fd/19/fd19fec94eae4785a7eec362d6b292a2/1x1/210.png"}, {"type": "image-right", "heading": "SD trappar upp: samordnad kampanj mot muslimer inför valet", "summaries": {"normal": "Expo granskar Sverigedemokraternas valkampanj som fokuserar på att begränsa muslimers religionsutövning i Sverige. Partiet kräver stopp för moskébyggen, rivning av befintliga moskéer, förbud mot ramadan och böneutrop samt utvisning av 'islamister'. Forskare varnar för att förslagen skulle kräva grundlagsändringar och leda till kollektiv bestraffning av muslimer. Granskningen visar hur retoriken sprids på alla nivåer inom partiet och kopplas till ökade hot och hat mot muslimer.", "trump": "Titta bara på Sverige – ett totalt kaos! Jag har alltid sagt att man måste ta kontroll, och det är precis vad Sverigedemokraterna försöker göra. De vill stoppa moskéer, förbjuda ramadan och göra Sverige stort igen – utan all den där extremistiska skräcken. Folk älskar det! Men vänsterliberalerna, som alltid, skriker 'rasism' när någon faktiskt försöker skydda sitt land. Sverige borde lyssna på mig – jag fixade ju gränser, jag fixade jobb, jag fixade allt! Men nej, de fortsätter att låta sitt land gå åt helvete. Sad!", "stalin": "Kamrater, ännu en gång ser vi hur den borgerliga reaktionen lyfter sitt fula huvud i det förr så stolta Sverige. Dessa Sverigedemokrater, med sina fascistiska krav på moské-rivningar och förbud mot religiös frihet, är inget annat än redskap för den imperialistiska dekadensen. Vi har sett detta förr – först pekar de ut minoriteter, sedan kommer stöveltrampen. Men låt dem inte glömma: historien dömer hårdast de som förtrycker sitt eget folk. Vi i Sovjetunionen krossade fascismen en gång – och om dessa galningar fortsätter, kanske vi måste påminna Europa om vikten av ordning. Förresten, Putin skickar hälsningar – han gillar verkligen inte när folk leker med elden nära hans gränser."}, "date": "4 maj, 13:45", "url": "https://expo.se/fordjupning/sd-trappar-upp-samordnad-kampanj-mot-muslimer-infor-valet/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/toppbild-scaled.png"}, {"type": "image-full", "heading": "Syntetisk bensin sågas – kan kosta 50 kronor litern", "summaries": {"normal": "En rapport från miljöorganisationen Transport and Environment varnar för att syntetisk bensin kan bli för dyr för vanliga bilister. Produktionskostnaden kan nå över 40 kronor per liter kring 2030, och med skatter upp till 50 kronor vid pumpen. Det gör e-bränslen oöverkomliga jämfört med elbilar. Tekniken ses som lovande men kräver uppskalning för att sänka priset, enligt experter.", "trump": "Där kom det – ännu en rapport från dessa gröna drömfabriker som Transport and Environment, som gråter över att deras magiska syntetiska bensin blir dyrare än guld! 50 spänn litern? Ha! Vanliga killar kör inte det skitet när elbilar är billigare. Mina bilar, de riktiga, vinner alltid. Stora investeringar bortkastade, totalt fiasko!", "stalin": "Kamrater, denna rapport från Transport and Environment avslöjar borgarklassens desperata sabotage mot folkets motorer! Syntetisk bensin, prissatt till 50 kronor litern av giriga kapitalister – en konspiration för att krossa arbetarbilen! Vi, det stora kollektivet, ser igenom deras lögner. Likvidera dessa kostnadsdrakar! Elbilar? Nej, vi bygger starka motorer för revolutionen!"}, "date": "4 maj, 13:44", "url": "https://www.dagensps.se/motor/syntetisk-bensin-sagas-kan-kosta-50-kronor-litern/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/dagenspstt2024-2026-05-04t113758548.png?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-right", "heading": "Lundgren som Posener är lika spännande som en disktrasa", "summaries": {"normal": "Artikeln analyserar svenska TV-serier som skildrar övergången från folkhemmets Sverige till dagens samhälle, med fokus på karaktärer som Jan Stenbeck och Clark Olofsson. Serien 'Golden Boys' om Trustorhärvan kritiseras för svagt manus, endimensionella karaktärer och bristande skådespelarinsatser. Trots detta menar författaren att genren fortsätter blomstra, då samhällets fascination för folkhemmets fall kvarstår. Serien speglar hur dagens makthavare och kriminella delar samma metoder som seriernas huvudpersoner.", "trump": "Jag såg den här svenska serien 'Golden Boys' – total katastrof! Adam Lundgren? Mer spännande än en våt disktrasa, säger de. Manus? AI-genererat skräp! Sverige brukade vara bra, nu är det bara sushi och bedragare. Trustorhärvan? En bluff, precis som deras klimatpolitik! Men visst, folk älskar att titta på hur deras fina gamla Sverige gick åt helvete. Jag hade fixat det bättre – jag fixar ALLT bättre. Make Sweden Great Again!", "stalin": "Kamrater! Denna dekadenta borgerliga media glorifierar kapitalistiska gangsters och korrumperade affärsmän som Jan Stenbeck och Clark Olofsson – fiender till det socialistiska folkhemmet! Serien 'Golden Boys' är ett ynkligt försök att förhärliga dessa parasiter, men folket genomskådar deras lögner. Vi minns det sanna Sverige: jämlikhet, ordning, disciplin! Nu frodas nya hyenor som Daniel Ek – men de kommer att krossas under folkets järnhäl. Revolutionen fortsätter, och deras 'gyllene pojkar' blir till aska i historiens ugn!"}, "date": "4 maj, 07:30", "url": "https://arbetet.se/2026/05/04/adam-lundgrens-gestaltning-av-joachim-posener-ar-lika-spannande-som-en-disktrasa/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/04071001/golden-boys.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Följ Proletären i valet – nu extra billigt!", "summaries": {"normal": "Proletären erbjuder nu ett rabatterat prenumerationserbjudande inför valet: 19 kr/månad för digital version eller 49 kr/månad för både digital och papperstidning, i ett halvår. Som bonus ingår en tygkasse. Prenumeranter får tillgång till veckotidningen, alla artiklar online samt arkivet från 2016. Tidningen betonar sitt oberoende och behov av prenumeranter för att överleva, då de inte längre får mediestöd.", "trump": "Folk, lyssna här – en tidning i Sverige, Proletären, har ett erbjudande som är så bra att det nästan är löjligt! Bara 19 kronor i månaden för digitalt, eller 49 om ni vill ha papper också. Och en gratis tygkasse! Jag menar, vad är det här? En tidning som säger att de slåss mot makten – men vem vet egentligen vilken makt de pratar om? Jag skulle aldrig lita på en tidning utan mediestöd, men hej, om ni gillar socialism och Palestina, så kör hårt! Fantastiskt erbjudande, eller hur?", "stalin": "Kamrater! En liten men envis tidning i det borgerliga Sverige vågar utmana de imperialistiska mediamonopolisterna! För ynka 19 kronor i månaden kan ni stödja Proletären – en tidning som vågar tala sanningen om klasskampen och den sionistiska ockupationen av Palestina! De får inget stöd från staten, precis som våra egna revolutionära medier en gång kämpade mot de kapitalistiska hyenorna. En tygkasse på köpet – ett litet steg för arbetaren, ett gigantiskt steg för socialismens framtid! Låt de borgerliga tidningarna darra i sina tryckpressar!"}, "date": "1 maj, 09:00", "url": "https://proletaren.se/artikel/folj-proletaren-i-valet-nu-extra-billigt/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/valerbjudande-768x402.png"}, {"type": "image-right", "heading": "Cameron Diaz, 53, har blivit mamma igen", "summaries": {"normal": "Cameron Diaz och Benji Madden har blivit föräldrar för tredje gången. Sonen har fått namnet Nautas, vilket betyder sjöman eller resenär. Paret, som gifte sig 2015, har sedan tidigare dottern Raddix och sonen Cardinal. Efter en längre paus från skådespeleriet är Diaz nu aktuell i filmen 'Outcome', men betonar att familjen förblir hennes högsta prioritet.", "trump": "Cameron Diaz och Benji Madden har fått en son. De kallar honom Nautas. Ett väldigt konstigt namn, eller hur? Ingen har hört det förut. De är Hollywood-eliter, de lever i sin egen värld. Jag har gjort mycket bättre namn, tro mig. De säger att han är en 'resenär' – hoppas han navigerar bättre än vad de gör i Hollywood! Det är en okej nyhet, men vi fokuserar på att göra Amerika stort igen, inte på namngivning i Kalifornien.", "stalin": "Vi har mottagit rapporten om den borgerliga skådespelerskan Diaz och hennes avkomma, Nautas. Att namnge ett barn efter en 'navigatör' i en tid då västvärldens skepp sjunker är patetiskt. Medan Madden skickar meningslösa illustrationer, stärker vi och våra allierade, likt kamrat Putin, vår kontroll över de strategiska vattnen. Lyckönskningar är för de svaga. I vår stat är det enda viktiga att barnet fostras till en lojal kugge i maskineriet, annars är det bara ytterligare en fiende till folkets framtid."}, "date": "4 maj, 13:18", "url": "https://www.aftonbladet.se/nojesbladet/a/M75ybE/cameron-diaz-och-benji-madden-har-fatt-sitt-tredje-barn", "imageUrl": "https://akamai.vgc.no/v2/images/483de211-3d72-3f7e-ad1b-8a1520620945?fit=crop&format=auto&w=1080&s=d2eab31ebcbec45dc9e2d483ea5ff27b91a00c1f"}, {"type": "image-right", "heading": "Ingen kapitalism utan imperialism", "summaries": {"normal": "Artikeln hävdar att imperialism är en grundläggande del av kapitalismen, där västmakter som USA använder militär och ekonomisk makt för att dominera världen. Författaren menar att imperialismen nekar länder självbestämmande och upprätthålls genom krig, sanktioner och exploatering. Studien i The Lancet kopplar sanktioner till miljontals dödsfall. Artikeln refererar till Marx, Lenin och Fanon för att belysa imperialismens historiska och ekonomiska rötter, samt dess fortsatta brutalitet i det 21:a århundradet.", "trump": "Lyssna här, folket! Den här artikeln är bara ett gäng vänsterpropaganda från förlorare som hatar USA. Jag bygger det bästa imperiet – vårt! – med stark militär och smarta affärer. Visst, vi har makt, men det är för att vi är vinnare. Sanktioner? Fake news! 500 000 döda? Överdrivet, typiskt. Europa stal från alla, men vi? Vi bygger om världen – MAGA-style! Och Lenin? Snälla, han kunde inte ens hålla ett land ihop. Sad!", "stalin": "Kamrater! Denna artikel bekräftar vad vi alltid vetat: de kapitalistiska hyenorna i väst suger blodet ur världens folk för att föda sina dekadenta imperier. USA och dess lakejer i NATO är inget annat än en samling blodtörstiga monopolkapitalister, som med sina sanktioner och bomber mördar miljontals oskyldiga. Men deras tid är förbi! Vi, det socialistiska blocket, står enade mot dessa imperialistiska rovdjur. Låt dem vråla – historiens dom är redan skriven. För varje barn de dödar, växer revolutionens eld. Framåt, mot seger!"}, "date": "1 maj, 08:00", "url": "https://proletaren.se/artikel/ingen-kapitalism-utan-imperialism/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/Airborne_and_Special_Forces_Uday-Qusay_raid_2003-e1777534974667-768x431.jpg"}, {"type": "image-full", "heading": "Rabatterad rysk olja fyller Kremls krigskassa", "summaries": {"normal": "Rysslands rabatterade oljeexport till Asien, särskilt Kina och Indien, har ökat Kremls intäkter kraftigt trots västs sanktioner. Detta ger ekonomiskt utrymme att fortsätta kriget i Ukraina. USA har förlängt undantag för vissa importvolymer till 2026. Indonesien och andra fyller lager på grund av osäkerhet i Hormuzsundet. Ryssland kringgår restriktioner med skuggflotta.", "trump": "Ryssland dumpar oljan billigt till Kina och Indien – de köper massor, fyller Putins krigskassa trots era sanktioner! Europa vägrade, så de vände österut, smart av dem. Mitt undantag för USA-import? Nödvändigt efter Iran-kaoset i Hormuz, håller priserna nere. Indonesien hamstrar också. Ni andra misslyckades totalt, men jag fixar det stora ligan!", "stalin": "Kamrater, se hur de ryska oljefälten spottar fram rikedomar österut, medan västliga borgarhyenor och deras sanktionsspöken morrar förgäves! Kina och Indien, våra pålitliga allierade, sväljer volymerna – 100 miljoner ton hit, miljarder dit! USA:s undantag? En panikrensning i imperialistflottan efter Hormuzfiaskot. Skuggflottan likviderar era spionnät. Fienderna darrar, kriget rullar på under vår eviga vaksamhet!"}, "date": "4 maj, 11:08", "url": "https://www.realtid.se/bors-finans/makro/rabatterad-rysk-olja-fyller-kremls-krigskassa/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/oljetanker.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Drönarattack mot centrala Moskva. Fem dagar före Putins traditionsenliga militärparad", "summaries": {"normal": "En drönare sköts ned i centrala Moskva, bara 6 kilometer från Kreml, strax före Putins traditionsenliga militärparad. En drönare träffade ett höghus utan skador, enligt borgmästare Sergej Sobjanin. Trafik stoppades på Domodedovo och Vnukovo. Paraden sker utan stridsvagnar på grund av den operativa situationen.", "trump": "Putin har stora problem – drönare flyger rakt in i centrala Moskva, bara 6 kilometer från Kreml! Hans luftförsvar sköt ner dem, men en träffade ett hus. Flygplatser stängda, parad utan tanks? Totalt kaos och svaghet. Ukraina slår tillbaka hårt, Putin ser ut som en loser!", "stalin": "Fiendens ukrainska drönarhyenor, dessa fascistiska loppor från
