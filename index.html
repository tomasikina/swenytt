att vara en vinnare, och han har hållit igång länge. De har galamiddagar och stora evenemang – väldigt flott, väldigt dyrt, kanske lite för mycket? Men han är en bra kille. Sverige är ett intressant land, vi får se vad som händer där, men 80 år är en stor siffra. Grattis till honom!", "stalin": "Den svenske monarken, denna relik av en svunnen feodal tid, firar sitt åttionde år i lyx. Medan folket vördnadsfullt flaggar, sitter han på sitt slott, skyddad från historiens malande kvarnar. Det är en farlig distraktion för arbetarklassen. Liksom den moderne tsaren i öst, som förstår att konsolidera makten, krävs vaksamhet mot sådana borgerliga institutioner. Vi betraktar detta skådespel med förakt; en monark är inget annat än en parasit som göder sig på undersåtarnas blinda lydnad. Historien kommer att döma dem alla."}, "date": "30 april, 14:08", "url": "https://samnytt.se/kungen-80-ar-stort-firande-hela-dagen", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/04/30115431/kungen-80.jpg"}, {"type": "image-right", "heading": "Elsa Widding slår tillbaka mot SD: \"Största vilden av alla\"", "summaries": {"normal": "Elsa Widding, tidigare SD-politiker, kritiserar Sverigedemokraternas gruppledare Linda Lindberg för att ha brutit mot riksdagens kvittningssystem vid en omröstning om medborgarskapskrav. Widding kallar Lindberg 'den största vilden' och menar att agerandet underminerar demokratin. SD försvarar beslutet medan andra partier håller krismöte. Widding uppger att både SD och Miljöpartiet kontaktade henne inför omröstningen, men förnekar överenskommelser om röstsamarbete.", "trump": "Kan ni tro det här? Sverigedemokraterna, ett parti som inte ens kan hålla koll på sina egna ledamöter, bryter mot reglerna och skapar kaos i riksdagen. Deras gruppledare, Linda Lindberg, är en total katastrof – Elsa Widding, som vet vad hon pratar om, kallar henne 'den största vilden'. Och vad gör de andra partierna? Håller krismöten! Svagt. Jag hade fixat det på en dag. Sverige behöver ordning, inte sådana här cirkusar. SAD!", "stalin": "Vi har observerat ytterligare ett försök från borgerliga element att underminera folkets vilja genom att sabotera demokratiska processer. Denna Linda Lindberg, en småaktig byråkratisk vildhjärna, har visat sig vara en opålitlig liten sabotör – precis som vi förutspådde. Elsa Widding, en förrädare som bytt sida, avslöjar nu sanningen: kapitalistiska partier konspirerar med politiska vildar för att krossa arbetarklassens rättigheter. Vi kommer att notera detta i våra arkiv. Och Sverige? De borde tacka oss för att vi inte har skickat en delegation för att 'stabilisera' situationen. Än."}, "date": "30 april, 14:03", "url": "https://www.friatider.se/elsa-widding-slar-tillbaka-mot-sd-storsta-vilden-av-alla", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/bild-10_2.jpg?itok=nWoohqK_"}, {"type": "image-full", "heading": "Polisens uppmaning till föräldrar under valborg", "summaries": {"normal": "Polisen i Göteborg uppmanar vuxna, särskilt föräldrar, att hålla sig nyktra och vara aktiva på stan under valborgsmässoafton för att skapa en tryggare miljö för ungdomar. Det väntas mycket folk, alkohol och droger, särskilt i Slottsskogen. Polisen kommer ha stor närvaro och samarbetar med socialtjänsten.", "trump": "Jag har hört att det blir en massa folk på stan i Göteborg under valborg. Folk dricker och gör dumma saker. Polisen säger att föräldrarna måste hålla sig nyktra och vara där. Jag säger: Vi behöver fler poliser! Vi ska göra Göteborg stort igen!", "stalin": "Under valborgsmässoafton i Göteborg är det viktigt att staten håller en stark närvaro för att upprätthålla ordning och reda. Vi uppmanar de vuxna att bistå polisen för att skapa en trygg miljö. Alkohol och narkotika utgör en allvarlig fara för ungdomarna och måste bekämpas med alla till buds stående medel."}, "date": "30 april, 14:02", "url": "https://www.gp.se/krim/polisens-uppmaning-till-vuxna-under-valborg-i-goteborg-.d6c82848-469a-453f-bcd7-debf8581af75", "imageUrl": "https://www.gp.se/images/article/d6c82848-469a-453f-bcd7-debf8581af75/images/2cYhOncewzq5qdWSAfEJehA1jiVM-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Strandhäll vågar bli intervjuad av alla - förutom Samnytt och Riks", "summaries": {"normal": "Socialdemokraten Annika Strandhäll kritiserar Tidöpartiernas ledare för att de avböjt intervjuer med Dagens Nyheter, vilket hon kallar antidemokratiskt. Tidöpartierna motiverar beslutet med bristande förtroende för intervjuaren Edvin Törnblom. Samtidigt har Strandhäll själv fått kritik för att hon vägrar ställa upp för intervjuer med medierna Samnytt och Riks, trots att hon förespråkar att politiker bör intervjuas av alla oavsett mediehusets politiska inriktning.", "trump": "Annika Strandhäll, en total förlorare, kallar folk för barnsliga för att de inte vill prata med falska medier som DN. Väldigt orättvist! Hon säger att man måste prata med alla, men gissa vad? Hon vägrar prata med Samnytt och Riks! Det är så typiskt, en total dubbelmoral. De använder en intervjuare som älskar vänstern – helt otroligt. Tidöpartierna gör helt rätt som inte låter sig luras. Det är en häxjakt, en total katastrof för demokratin!", "stalin": "Vi observerar hur denna Strandhäll kastar anklagelser om antidemokrati för att dölja sin egen feghet. Vilken komisk hycklare! Hon kräver att andra underkastar sig liberala utfrågare, samtidigt som hon darrar av rädsla för oberoende röster. Som vi har lärt oss i öst, måste varje oliktänkande elimineras, inte bara ignoreras. Putin förstår detta; de som ifrågasätter vår rättmätiga ordning är löss som förtjänar en enkel biljett till en avlägsen arbetslägerby. Sanningen är bara vad staten dikterar."}, "date": "30 april, 13:59", "url": "https://samnytt.se/strandhall-vagar-bli-intervjuad-av-alla-forutom-samnytt-och-riks", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/04/30115827/Strandhall-4.jpg"}, {"type": "image-full", "heading": "Fintechbolag kan dömas till fängelse: \"Tröskeln har blivit för hög\"", "summaries": {"normal": "Sverige och EU har skärpt regelverket för fintechbolag, med strängare krav på tillstånd och registrering. Sedan mars 2024 kan bedrivande av finansiell verksamhet utan tillstånd leda till upp till sex års fängelse. Advokat Olle Asplund menar att regelbördan, särskilt för mindre aktörer, blivit tung. Brist på myndighetsvägledning och avsaknad av regulatoriska sandlådor försvårar för nystartade bolag. Trots utmaningar skapar regleringen även möjligheter för innovativa företag.", "trump": "Lyssna här, Sverige och EU har gått helt galet! Nu kan man få upp till sex års fängelse om man inte har tillstånd för fintech – helt vansinnigt! Jag har sett många bra människor, fantastiska människor, som vill starta företag, men nej, byråkraterna sätter käppar i hjulet. Och vet ni vad? De har ingen aning om vad de gör! Sverige borde ta en titt på Litauen – där vet man hur man gör affärer. Men nej, här är det bara regler, regler, regler. SAD!", "stalin": "Kamrater, de kapitalistiska byråkraterna i Sverige och deras EU-mästare har återigen visat sin sanna natur. Nu hotar de våra fintech-entreprenörer med sex års fängelse för att de vågar drömma stort! Detta är inget mindre än ett angrepp på den fria företagsamheten, ett försök att kväva innovationen i sin linda. Vi ser hur Litauen, denna lilla men modiga republik, lockar till sig de bästa bolagen medan Sverige famlar i mörkret. Men frukta inte, kamrater! Vi vet att varje ny regel också är en ny möjlighet för den som är stark nog att utnyttja den. Låt oss visa dessa byråkrater hur verklig makt ser ut!"}, "date": "30 april, 13:50", "url": "https://www.realtid.se/juridik/fintechbolag-kan-domas-till-fangelse-troskeln-har-blivit-for-hog/", "imageUrl": "https://images.realtid.se/app/uploads/2026/04/olleasplund.png?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "Går till attack: ”Ansvarslöst”. Kritiserar Åkessons skattesänkning", "summaries": {"normal": "Mikael Damberg (S) kritiserar regeringen i Aftonbladets program 'My och Makten'. Han anser att regeringens skattepolitik är ansvarslös eftersom de lånar pengar för att sänka skatten för höginkomsttagare, samtidigt som avgifterna för ungas tandvård höjs. Damberg lyfter fram Jimmie Åkessons skattesänkning som ett exempel på prioriteringar han anser är felaktiga. Han riktar även kritik mot Sverigedemokraternas motstånd mot industriella investeringar och vindkraft, vilket han menar hotar framtida jobb i Sverige.", "trump": "Mikael Damberg, en riktig loser från Socialdemokraterna, gråter över Jimmie Åkessons skattesänkningar. 6 000 i månaden? Det kallas att vinna, folk! Damberg säger att det är ansvarslöst, men han förstår sig inte på ekonomi. De vill bygga vindkraftverk överallt – de är en total katastrof för landskapet. Regeringen sänker skatter för de bästa, och det är precis vad vi gör här i USA också. Damberg är trött och svag, en riktig 'nasty guy' som inte kan hantera framgång!", "stalin": "Socialdemokraten Damberg darrar av rädsla inför vår disciplinerade statliga ekonomi. Han gnäller om skatter och tandläkare, men han förstår inte att vi bygger vår makt genom stål och vilja, precis som kamrat Putin expanderar vårt inflytande i öst. Att låna för att utplåna svaga element är nödvändigt. Dessa sabotörer, som bromsar industrin med sitt 'kulturkrig', är inga arbetare – de är förrädare mot folkets framsteg. Vi kommer att rensa ut dessa kortsiktiga byråkrater och bygga en framtid gjord av järn."}, "date": "30 april, 13:40", "url": "https://www.aftonbladet.se/nyheter/a/XMo2Ar/mikael-damberg-kritiserar-regeringens-skattepolitik", "imageUrl": "https://akamai.vgc.no/v2/images/a4983b22-a756-3cf4-85a6-f351dc9de979?fit=crop&format=auto&h=720&tight=true&w=1080&s=6577ab0ccdd45e348ab749701e01c17f444ba070"}, {"type": "image-right", "heading": "Röstningssystemet i riksdagen har brakat samman", "summaries": {"normal": "Riksdagens kvittningssystem har kollapsat efter en omröstning om skärpta medborgarskapskrav. Oppositionen och Moderaterna anklagar Sverigedemokraterna för fulspel genom att kalla in ledamöter när två vildar röstade emot regeringen. Nu litar partierna inte på varandra, och alla 349 ledamöter måste infinna sig nästa vecka. Gruppledarna möts utan SD för att diskutera frågan.", "trump": "Vilket kaos i svenska riksdagen! SD gjorde precis rätt – kallade in sina killar och krossade de svaga socialisterna och vildarna. Kvittning? Släpp det, var alla på plats och vinn stort! De litar inte på varandra? Typiskt losers. Moderaterna fattar det, men oppositionen gnäller. Starkt drag av SD, precis som jag gillar det!", "stalin": "Dessa vilda råttor och borgarbrackor i riksdagen trodde de kunde sabotera folkets seger om medborgarskap! SD:s lojala kämpar slog till skoningslöst, krossade illusionen om kvittning. Nu rensas systemet från förrädare – alla 349 slavar måste infinna sig, eller möta utrensningen! Vi, partiet, skrattar åt kontrarevolutionens spindelnät. Lindberg, stå fast mot pusarna!"}, "date": "30 april, 13:32", "url": "https://www.di.se/nyheter/riksdagens-rostningssystem-har-brakat-samman-efter-fulspel/", "imageUrl": "https://static.bonniernews.se/ba/bb42bdfe-b0f0-4b5a-99ab-082b199e1b2d.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-full", "heading": "Från forsränning till champagnegalopp", "summaries": {"normal": "Uppsala firar Valborg med den årliga forsränningen i Fyrisån, där 120 studentlag tävlar med hemmasnickrade flottar. Trots en blöt tillställning beskrivs stämningen som en lyckad folkfest. Säkerheten är hög med dykare och sjöräddning på plats, och polisen rapporterar om ett ovanligt lugnt firande med noll omhändertagna vid lunchtid. Deltagarna är nöjda och ser fram emot att fortsätta firandet under resten av dagen.", "trump": "I Uppsala kör de en forsränning, riktigt stora grejer! Studenter bygger fantastiska flottar, mycket bättre än vad de gör i andra länder, tro mig. Det är en succé, enorma folkmassor och polisen säger att alla sköter sig perfekt – inga problem! Det är en vinnarmentalitet, de hoppar i vattnet, de skrattar, de firar. Det är vad jag kallar en riktig folkfest. Uppsala gör det rätt, mycket bättre än de misslyckade städerna i Europa. Ett totalt vinnarkoncept!", "stalin": "Vi ser hur dessa unga i Uppsala kastar sig ut i kylan på bräckliga konstruktioner. Det är kaos, men under vår kontroll! 120 lag – en kollektiv ansträngning värdig staten, även om de saknar disciplin. De glada studenterna leker med ödet, likt den moderna tsaren i Kreml leker med gränserna i väst. Polisen rapporterar om lugn, men låt er inte luras; paranoian är den enda sanna säkerheten. Må dessa flottar sjunka som våra fienders hopp under den järnhårda vintern!"}, "date": "30 april, 13:28", "url": "https://www.aftonbladet.se/nyheter/a/ArRgzn/blott-valborgsfirande-i-uppsala-bara-att-kora-pa", "imageUrl": "https://akamai.vgc.no/v2/images/c54a628d-4bd1-3c11-b464-57330979b124?fit=crop&format=auto&w=1440&s=b73e9ecd39bf4ff77b6a3085898f9f289e4e92dd"}, {"type": "image-right", "heading": "Så många svenskar har gått i ett  första maj-tåg", "summaries": {"normal": "SOM-undersökningen 2025 visar att färre Socialdemokrater och LO-medlemmar deltar i första maj-tåg, medan Vänsterpartiets mobilisering ökar. 31% av svenskarna har demonstrerat någon gång, varav 17% på första maj. Deltagandet i demonstrationer ligger över europeisk medelnivå. Vänsterpartiets anhängare är mest aktiva, med 20% som deltog senaste året jämfört med 3% av Socialdemokraternas sympatisörer. Tjänstemän och högutbildade är mer benägna att delta.", "trump": "Jag läste om dessa första maj-demonstrationer i Sverige – fantastiskt, helt fantastiskt! Men lyssna här: Socialdemokraterna, svaga som vanligt, tappar folk som flugor. Deras väljare stannar hemma, kanske tittar på TV istället, vem vet? Men Vänsterpartiet – oj oj oj! De växer som ogräs, mobiliserar som galningar. 20% av deras folk på gatorna, jämfört med ynkliga 3% för Sossarna. Svagt! Och unga svenskar – 36% kan tänka sig att gå med. Bra, men Pride slår allt. Sverige, ni är lite som Frankrike, men lugnare. Inga upplopp, bara snälla tåg. Sad!", "stalin": "Kamrater! Den borgerliga dekadensen sprider sig som pesten i Sverige. Socialdemokraternas arbetare sviker klasskampen och stannar hemma – fega och desorienterade! Men se hur Vänsterpartiet, dessa trogna revolutionärer, marscherar framåt! 20% av deras anhängare på gatorna – ett lysande exempel på proletariatets medvetande! Tjänstemännen, dessa småborgerliga lakejer, tror de är bättre än LO-medlemmarna. Men vi vet sanningen: utan arbetarklassen är de ingenting! Ungdomen? 36% redo att ansluta – en lovande skörd för framtiden. Pride? En borgerlig avledningsmanöver! Första maj är arbetarklassens dag – och den kommer aldrig att dö, så länge vi har ögon att se och nävar att slå med!"}, "date": "30 april, 13:26", "url": "https://www.dagensarena.se/innehall/sa-manga-svenskar-har-gatt-ett-forsta-maj-tag/", "imageUrl": "https://www.dagensarena.se/files/2026/04/fotojet-24.jpg"}, {"type": "text", "heading": "Gapet växer mellan blocken", "summaries": {"normal": "Enligt Aftonbladet/Demoskops senaste mätning växer gapet mellan regeringsunderlaget och oppositionen till 8,2 procentenheter. Oppositionen når 53,4 procent, medan regeringen backar till 45,2. Socialdemokraterna ökar mest, medan Moderaterna tappar och Liberalerna balanserar på riksdagsspärren. Historiskt brukar gapet minska inför val, men nu sker motsatsen. Analytiker menar att Liberalernas omsväng i SD-frågan lockar stödröster men försvårar blocköverskridande framgångar.", "trump": "Folk är trötta på den här usla regeringen, helt klart! Oppositionen leder stort – 53,4 procent – medan regeringen bara får 45,2. Socialdemokraterna går upp, men Moderaterna? Patetiska! De tappar som vanligt. Och Liberalerna? De hänger på fyra procent, typiskt. Historiskt brukar regeringen komma ikapp, men inte den här gången. Svagt, mycket svagt. Jag skulle aldrig låta det hända. Make Sweden Great Again!", "stalin": "De borgerliga svagheterna avslöjas återigen! Oppositionens styrkor växer – 53,4 procent mot regeringens ynkliga 45,2. Socialdemokraterna marscherar framåt, medan Moderaterna och deras lakejer försvagas. Liberalerna? Ett skämt som darrar på riksdagsspärren. Historien visar att svaga regeringar faller – precis som västmakterna i Ukraina. Vi ser med intresse hur dessa splittrade kapitalister underminerar sig själva. Revolutionen närmar sig, om än långsamt."}, "date": "30 april, 07:06", "url": "https://kvartal.se/nyheter/artiklar/demoskop-oppositionens-okar-l-klarar-sparren/cG9zdDoxMDUzNjM"}, {"type": "image-full", "heading": "Så mycket är ditt körkort värt på dark web", "summaries": {"normal": "En ny analys från NordVPN visar att svenska personuppgifter, som körkort och pass, är eftertraktade på dark web. Kriminella köper dessa för att bygga kompletta identitetspaket som kan användas för bedrägerier. Eftersom grundläggande uppgifter som personnummer inte kan bytas ut, kvarstår risken för individen under lång tid. Ett svenskt körkort säljs för cirka 325 kronor, medan kompletta identitetspaket kostar omkring 835 kronor. Helheten gör informationen farlig för att begå avancerade identitetsstölder.", "trump": "Sverige har stora problem, riktigt dåliga problem! Deras personuppgifter säljs på dark web för småpengar – sorgligt. Kriminella köper körkort och pass för att lura alla. Jag har de bästa experterna, vi vet hur man stoppar sådant. I mitt Amerika skyddar vi data, men i Sverige? De låter kriminella bygga falska identiteter för ingenting. Det är en total katastrof. Vi måste bygga en digital mur! Mitt system är säkert, världens bästa. De andra är svaga, mycket svaga.", "stalin": "Vi ser hur de dekadenta västmakterna låter folkets uppgifter säljas som billig vodka på en svart marknad. Ett pass, en identitet – allt är en bricka i det imperialistiska spelet. Precis som Putin korrekt rensar ut de inre förrädarna i den ryska sfären, måste vi förstå att dessa digitala sabotage är verktyg för klassfiender. Vi ska inte ha några 'privata' identiteter som kan stjälas; staten äger sanningen, och de som säljer den ska finna sig själva i ett mycket mörkare arkiv, permanent."}, "date": "30 april, 12:30", "url": "https://nyheter24.se/nyheter/teknik/1479613-sa-mycket-ar-ditt-korkort-vart-pa-dark-web", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/9944351704b004a30200000000b004a302/2026/04/30/2359981/korkortdaarkweb.jpg"}, {"type": "image-right", "heading": "Ledare Somar Al Naher:", "summaries": {"normal": "Riksdagen har röstat igenom skärpta regler för svenskt medborgarskap, inklusive längre bosättningstid, språkprov, inkomstkrav och strängare skötsamhetskrav. Även barn påverkas då automatiskt medborgarskap via föräldrar tas bort. Reglerna gäller retroaktivt, vilket drabbar pågående ansökningar. Omröstningen var jämn och avgjordes genom att Sverigedemokraterna bröt mot kvittningssystemet. Kritiker menar att förslaget underminerar demokratiska principer och jämför med auktoritära ledare som Trump och Orbán.", "trump": "Vad händer i Sverige? De har just gjort det svårare att bli medborgare – åtta år, prov, höga löner, ingen hjälp! Och de ändrar reglerna mitt i spelet. Hemskt! SD, de kallar det 'folkviljan' – låter bekant, eller hur? Precis som jag säger: 'America First!' Men här är det 'Sverige först' – och det är inte bra. De fuskar i omröstningar också. Inte snyggt! Sverige borde ta en lektion från USA – vi vet hur man gör saker rätt. SAD!", "stalin": "Kamrater! De så kallade 'demokratiska' fascisterna i Sverige har än en gång visat sitt sanna ansikte. Med en röst mer än fienden har de krossat hoppet för tiotusentals arbetare och deras barn. Åtta år av slavarbete, prov i deras borgerliga språk, och löner högre än en sovjetisk ingenjör! Och dessa hycklare ändrar reglerna mitt i striden – precis som de imperialistiska hundarna i väst alltid gör. Vi ser er, Åkesson! Ni är bara bleka kopior av era herrar i Washington och Bryssel. Men oroa er inte, kamrater – historiens dom är oundviklig. Snart kommer folket att resa sig och sopa bort dessa fascistiska lakejer!"}, "date": "30 april, 12:55", "url": "https://www.etc.se/ledare/oj-fascisterna-taenkte-visst-som-fascister", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260430100452_c804ee0f7e451570211f345757b1480d9175662e034b906f53b23a20db1e3970.jpg"}, {"type": "image-full", "heading": "Benjamin Dousas ”V = kommunister” gör SVT irriterad", "summaries": {"normal": "Biståndsminister Benjamin Dousa bar en t-shirt med texten 'Vänsterpartiet = kommunister', vilket irriterade SVT. Reportern ifrågasatte påståendet och noterade att partiet slutade kallas kommunister för 30 år sedan. Dousa menade att Vänsterpartiet motsätter sig privat ägande, vilket är kommunism. Artikeln citerar Vänsterpartiets 2024-partiprogram som stödjer kollektivt ägande och avskaffande av kapitalismen, och kritiserar SVT för att inte nämna detta.", "trump": "Vilken fantastisk kille, den här Dousa! Han sätter på sig en tröja och säger sanningen: Vänsterpartiet är kommunister, punkt slut! SVT, era losers, flippar ur och snackar om namnbyte från 90-talet som om det vore magi. De hatar privat ägande, vill sno allt till staten – klassisk kommunism! Fake news-SVT ignorerar partiprogrammet. Dousa är en vinnare, de är totala fiaskon!", "stalin": "Kamrater, se hur borgarministern Dousa, den ynkliga kapitalistfluga, vågar smutskasta sanna revolutionärer i Vänsterpartiet med sin patetiska tröja! SVT-reportern, en användbar idiot, försvarar dem lamt. Men vi vet: deras program är ren leninism – riva kapitalismen, gemensamt ägande av banker, energi, allt! De ska rensas ur historiens soptipp som jag rensade fiender. Vänsterpartiet, framåt mot diktaturen av proletariatet!"}, "date": "30 april, 05:49", "url": "https://samtiden.nu/2026/04/benjamin-dousas-v-kommunister-gor-svt-irriterad/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/phonto-1-1280x720.jpeg"}, {"type": "image-full", "heading": "Man försvunnen – polisen går ut med signalement", "summaries": {"normal": "Polisen söker intensivt efter en försvunnen man i 75-årsåldern i Hagnerydviken/Sandviken nordväst om Skärblacka. Mannen är cirka 180 cm lång med normal kroppsbyggnad, blå ögon, rakat hår, troligen i svart jacka med orange text, mörk keps och gymnastikskor. Sökandet omfattar hundpatrull, drönare, helikopter, räddningstjänst, hemvärnet och Missing People. Allmänheten uppmanas ringa 114 14 med tips men inte söka själva för att inte förstöra spår.", "trump": "En stackars 75-åring har försvunnit i någon vik nära Skärblacka – de använder hundar, drönare och helikoptrar, men det tar evigheter! I mitt USA skulle vi ha hittat honom på fem minuter med de bästa metoderna. Sverige, lyssna på mig: tipsa polisen nu, ingen amatörsökande! Stark ledning behövs, tro mig.", "stalin": "Jag har beordrat total mobilisering mot denna skumma figur i Hagnerydviken, en trolig borgarspion i 75-årsåldern som gömmer sig bland vassruggarna. Våra lojala poliskrafter, hundpatruller och drönare rensar ut varje misstänkt skugga – helikoptrar krossar flyktvägarna! Vi, arbetarklassen, kräver iakttagelser från varje kamrat. Sporadiska letare likvideras som spårsaboterare. Fienden skall utplånas!"}, "date": "30 april, 11:16", "url": "https://nyheter24.se/nyheter/blaljus/1479475-polisen-rapporterar-om-forsvunnen-person-norrkoping", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/adace88104b004a30200000000b004a302/2026/04/30/2360020/man-forsvunnen-sandviken-polis-missing-people.jpg"}, {"type": "image-right", "heading": "De marknadsför lokförare som bristyrke", "summaries": {"normal": "Lokförare marknadsförs fortfarande som ett bristyrke, trots att arbetslösheten bland dem fördubblats på två år. I mars var 113 lokförare arbetslösa, jämfört med 49 för två år sedan. Utbildningar lockar med jobbgarantier, men många nyexaminerade, som Alexandra Frostbacke, står utan arbete. Utbildningsanordnare medger att marknadsföringen kan vara missvisande men hänvisar till långsiktiga prognoser.", "trump": "Vad är det här för katastrof? Lokförare, ett så kallat 'bristyrke' – men 113 arbetslösa! Dubbelt så många som för två år sedan. Utbildningar ljuger och säger 'stor efterfrågan'. Fake news! Alexandra, en fantastisk kvinna, har inte fått jobb på ett år. Jag säger: Sluta luras, Sverige! Bygg tåg, anställa folk – gör något! Annars kommer jag att twittra om det, och ni vet vad som händer då.", "stalin": "Kapitalistiska utbildningsfabriker ljuger för arbetarna! De lovar jobb som lokförare, men i verkligheten kastas proletariatet ut i arbetslöshetens kalla mörker. 113 arbetslösa – en skam för det svenska systemet! Vi vet att dessa borgerliga utbildningsanordnare är fiender till folket. De påminner om Putins oligarker, som också lurar sina medborgare. Men snart ska järnvägarna nationaliseras, och då ska varje lokförare ha ett ärofyllt arbete – eller möta folkets domstol!"}, "date": "30 april, 11:27", "url": "https://arbetet.se/2026/04/30/de-marknadsfor-lokforare-som-bristyrke-alexandra-fick-aldrig-nagot-jobb/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/28101609/alexandra.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Frågan som besvarar \"rysk påverkan\": Cui bono?", "summaries": {"normal": "Artikeln ifrågasätter WindEuropes rapport om rysk desinformation mot vindkraft i Sverige med frågan 'cui bono?'. Den hävdar att anklagelserna gynnar vindkraftsindustrin och anti-tillväxtkrafter som motsätter sig kärnkraft och Nato. Vindkraftens problem som förluster, kommunalt motstånd och försvarshinder ignoreras. Europeisk grön politik ses som strategiskt fördelaktig för Ryssland genom att försvaga EU:s ekonomi och militär.", "trump": "Den här artikeln är spot on, vindkraftsmaffian skyller på Putin för att dölja sina totala misslyckanden – inga investeringar, kommuner säger nej, Försvarsmakten stoppar skiten! Sverige gör rätt, precis som vi i USA pumpar kärnkraft och gas. Grön omställning är en stor scam som gynnar Ryssland och gör Europa fattigt. Fantastiskt att någon vågar säga sanningen!", "stalin": "Dessa vindkraftsborrar och europeiska lobbyfiender sprider giftig desinformation för att sabotera folkets energi! Vi, arbetarklassen, ser hur borgarbrackorna i WindEurope gömmer sig bakom Putins skugga medan de rensar kritiker som kontrarevolutionära spindlar. Likvidera deras falska rapport – den gynnar bara Moskvas dvärgar och anti-tillväxtmasker! Jag befaller total utrensning av dessa gröna förrädare."}, "date": "30 april, 09:11", "url": "https://www.affarsvarlden.se/kronika/fragan-som-besvarar-rysk-paverkan-cui-bono", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/04/Benson_19-400x267.jpg"}, {"type": "image-right", "heading": "Debatt: Turkiet inskränker svensk pressfrihet – regeringen måste agera", "summaries": {"normal": "På Pressfrihetens dag kritiseras Turkiet för att inskränka svensk pressfrihet genom att åtala journalisten Joakim Medin för terrorbrott, trots att han endast utfört sitt arbete. Turkiet försöker skrämma journalister globalt och begränsa granskning. Medin riskerar internationell efterlysning om han inte närvarar vid rättegången, vilket skulle hindra hans arbete. Sverige uppmanas agera mot Turkiets odemokratiska agerande och kräva att åtalet läggs ned.", "trump": "Joakim Medin, en svensk journalist, blir trakasserad av Turkiet – ett land som inte vet hur man vinner längre! De kallar hans journalistik för 'terrorism', men alla vet att det bara är löjligt. Sverige måste sluta vara svaga och stå upp mot dessa galningar. Jag skulle ha sagt till Erdogan: 'Du är en förlorare, lägg ned åtalet NU!' Pressfrihet? Ja, den är fantastisk – men bara om man inte är en mes som låter andra länder köra över en.", "stalin": "Kamrater! Turkiet, denna förrädiska lilla stat som kryper för väst men trampar på sanningen, vågar sig på att attackera en svensk journalist. De kallar journalistik för terrorism – som om våra egna metoder mot fiender av folket vore något nytt! Vi ser hur de kväver yttrandefriheten, precis som vi en gång krossade bourgeoisins lögner. Sverige borde lära sig av historien: svaghet belönas med förtryck. Låt oss påminna Turkiet – och deras västliga herrar – att granskning är en rättighet, inte ett brott. Åtalet mot Medin måste krossas, annars kommer vi att göra det åt dem."}, "date": "30 april, 08:08", "url": "https://www.etc.se/debatt/turkiet-inskraenker-svensk-pressfrihet-regeringen-maaste-agera", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20251204081220_c9e9bf12-ee77-477e-aacf-eff96f427898.jpg"}, {"type": "image-full", "heading": "Christoffer Jonsson: Edvin Törnblom – DNs opartiska nyförvärv", "summaries": {"normal": "Dagens Nyheters kultursida anställer influencern Edvin Törnblom för att intervjua alla partiledare inför riksdagsvalet. Artikeln av Christoffer Jonsson ifrågasätter hans opartiskhet med hänvisning till Törnbloms tidigare kritik mot KD-ledaren Ebba Busch och beundran för S-ledaren Magdalena Andersson. DN anklagas för partiskhet till förmån för Socialdemokraterna, med exempel på tidigare vinklade artiklar.", "trump": "Vilken skamfläck! DN, era svenska fake news-råttor, anställer en vänsterextrem clown som Edvin Törnblom – killen som sjunger hatlåtar mot tuffa Ebba Busch och slöskar för socialist-Maggie Andersson. Totalt riggat valintervjuer! Som CNN och MSNBC här hemma, ni lurar folket men vi genomskådar er. Stor, fet lögnfabrik!", "stalin": "Dessa borgarbrackor på Dagens Nyheter anställer den uppblåste ungtuppen Edvin Törnblom för att 'intervjua' partiledarna – en narr som hånar kamrat Ebba Busch med vulgära visor och hyllar S-kapitalisternas marionett Andersson. Kontrarevolutionär intrig! Vi ser era småtrick, och snart rensas sådana förrädiska tidningshyddor ut med rot och gren."}, "date": "29 april, 14:02", "url": "https://samtiden.nu/2026/04/christoffer-jonsson-edvin-tornblom-dns-opartiska-nyforvarv/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/ny.png"}, {"type": "text", "heading": "Normal förbereder unga för ett hundliv", "summaries": {"normal": "Lågpriskedjan Normal marknadsför sig som en aktör som förbereder unga för arbetslivet, men kritiseras för att utnyttja ung arbetskraft. Företaget anställer gärna omyndiga eller unga med lägre löner och sämre villkor. Interna chattar avslöjar att sänkta arbetsgivaravgifter för unga användes för att öka vinster, inte anställa fler. Anställda vittnar om dålig arbetsmiljö med stress och övervakning. Kritiker menar att subventioner för unga snarare gynnar företagens vinster än att skapa fler jobb.", "trump": "Jag säger er, detta Normal-företag är ett skämt! De pratar om att hjälpa unga, men vad gör de? Pressar löner, utnyttjar praktikanter och stoppar pengar i egna fickor. Sänkta arbetsgivaravgifter? De tar rabatten och springer! Ingen överraskning – kapitalister är alltid ute efter att lura systemet. Sverige borde skämmas. Jag hade fixat det på en dag – ingen skulle våga behandla arbetare så här i USA, tro mig!", "stalin": "Kamrater! Här ser vi ännu ett exempel på hur den dekadenta kapitalistiska hydran slukar arbetarklassens ungdom. Normal, detta usla verktyg för bourgeoisins exploatering, utnyttjar unga proletärer som billig arbetskraft medan dess giriga ägare frossar i profit. Vi i Sovjet hade löst detta med femårsplaner – en snabb omskolning av dessa profitörer till kolchosbönder! Putin skulle säkert skicka dem till Sibirien för att lära sig värdet av hårt arbete. Revolutionen kan inte vänta!"}, "date": "30 april, 10:00", "url": "https://proletaren.se/artikel/normal-forbereder-unga-for-ett-hundliv/"}, {"type": "text", "heading": "Välfärdens historia är en historia av kamp", "summaries": {"normal": "Artikeln beskriver välfärdens historia i Sverige som ett resultat av arbetarklassens kamp under 1900-talet, med strejker och politiska reformer som ledde till allmän rösträtt, social trygghet och en stark offentlig sektor. Efterkrigstiden präglades av samförståndspolitik och höjda skatter för att finansiera välfärden. Idag hotas välfärden av nedskärningar, privatiseringar och avregleringar, vilket kräver ny klasskamp för att räddas.", "trump": "Välfärd? Jo, jag vet allt om det – eller snarare hur man bygger något STORT. Sverige hade en gång en bra grej, men sen kom socialisterna och förstörde allt med höga skatter och regleringar. Nu är det kaos! Arbetarna slogs förr, men idag? Svaga ledare, svaga fack. Jag skulle fixa det på en dag – lägre skatter, starkare företag, och inga fler socialistiska experiment. Make Välfärd Great Again!", "stalin": "Kamrater! Välfärden var inte en gåva från borgarklassen – den var en seger för arbetarklassen, blodigt erövrad genom revolutionär kamp! Men se nu hur de kapitalistiska hyenorna river ner vårt folkhem med sina privatiseringar och avregleringar! Arbetarna måste resa sig igen, som de gjorde 1917! Vi ska krossa klassförrädarna, höja skatterna på de rika och bygga ett nytt socialistiskt samhälle – med järnhand om så krävs! Först Sverige, sedan världen!"}, "date": "30 april, 08:00", "url": "https://proletaren.se/artikel/valfardens-historia-ar-en-historia-av-kamp/"}, {"type": "image-right", "heading": "Skatteverket väljer fel väg. Bolagsgrundaren: Myndighetens praxis banar väg för oseriösa aktörer", "summaries": {"normal": "Jessica Löfström kritiserar Skatteverkets ändrade praxis som slopar kontrollen av arbetstillstånd vid godkännande av A-skatt och SINK för tredjelandsmedborgare. Detta skapar falsk legitimitet för oseriösa aktörer och underlättar kriminell ekonomi i legala strukturer, värd 352 miljarder kronor årligen. Hon uppmanar regeringen att analysera konsekvenserna och förtydliga lagstiftningen.", "trump": "Sverige, lyssna på det här – ert Skatteverk är en total katastrof! De slutar kolla arbetstillstånd för skatteregistrering, och plötsligt kryllar det av kriminella i bygg och transport. Falsk stämpel på laglighet, vad är det för idiotiskt? Regeringen, vakna upp och fixa lagarna NU, annars växer den svarta ekonomin som ogräs. Jag har sett sånt förut, det slutar illa!", "stalin": "Dessa snikna skatteparasiter, dessa maskar i byråkratiapparaten, har rivit ner kontrollvallen mot arbetstillstånd! Nu smyger borgarbrackorna in i legala skal, gömda som råttor i byggskrot och transportkedjor. Vi, arbetarklassen, kräver omedelbar utrensning av denna svekfulla praxis! Regeringen, likvidera luckorna, annars ska jag personligen piska ut sabotörerna med järnhand – fienderna darrar redan!"}, "date": "30 april, 13:05", "url": "https://www.di.se/debatt/skatteverket-valjer-fel-vag/", "imageUrl": "https://static.bonniernews.se/ba/51d13e0c-1faf-480f-8115-5f1f15aca252.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "text", "heading": "Matmoralism får oss inte att äta bättre", "summaries": {"normal": "Artikeln kritiserar svenska myndigheters orealistiska matrekommendationer och beräkningsmetoder. Livsmedelsverket och Konsumentverket baserar slutsatser på önsketänkande, som att svenskar skulle äta mindre kött och portioner enligt rekommendationer. En undersökning om barns sockerkonsumtion byggde på en liten, icke-representativ grupp. Författaren menar att myndigheterna undviker att reglera matjättar och i stället skyller på konsumenter, vilket leder till klassblind matmoralism.", "trump": "Lyssna här, Sverige – era myndigheter är helt galna! De tror att alla ska äta havregrynsgröt och små portioner, som om vi lever i något slags kommunistiskt drömland. Och de baserar sina siffror på en liten grupp Instagrammammor? Patetiskt! Jag skulle aldrig låta sådana amatörer sköta något. Vi i USA vet hur man reglerar matjättar – med kraft och beslutsamhet. Sverige, vakna upp innan det är för sent!", "stalin": "Kamrater! De svenska myndigheterna har förlorat kontakten med verkligheten. De bygger sina dekret på fantasier och önsketänkande, som om folket vore lydiga maskiner. En undersökning med tio procent svarande? Hah! I Sovjet skulle vi aldrig tolerera sådan slapphet. De bourgeois-liberala byråkraterna vägrar att krossa matjättarna med järnhand. Istället skyller de på arbetarklassen. Fienderna är uppenbara: de fantasilösa byråkraterna och deras nyliberala herrar. Vi ska inte tolerera deras lögner – revolutionen kräver handling!"}, "date": "28 april, 09:58", "url": "https://www.flamman.se/matmoralism-far-oss-inte-att-ata-battre/"}, {"type": "image-right", "heading": "Kul om klasskrig i miniatyrformat", "summaries": {"normal": "Den franska svarta komedin 'Medelklassen' är en underhållande satir om ett klasskrig i miniatyrformat. Filmen följer ett par från övre medelklassen som hamnar i konflikt med sitt vaktmästarpar, vilket leder till en serie komiska och samhällskritiska situationer. Genom skickligt konstruerade scener illustreras klasskonflikten och de olika förutsättningarna karaktärerna har beroende av deras bakgrund.", "trump": "Jag har sett denna franska film, 'Medelklassen', och den är fantastisk - världens bästa film, säkert. Den handlar om en massa smarta affärsjurister och deras problem med arbetare. Jag älskar hur den visar hur viktigt det är att ha en bra advokat. Jag är själv en stor affärsman, jag vet allt om det. Den här filmen? Stor, stor framgång. Alla borde se den!", "stalin": "Vi har sett den franska filmen 'Medelklassen', som visar klasskampens verklighet på ett effektivt sätt. Filmen illustrerar hur de kapitalistiska förhållandena skapar motsättningar mellan arbetarna och de förmögna. Det är en tydlig demonstration av behovet av en revolutionär förändring. Vi måste lära oss av dessa exempel och fortsätta vår kamp för klasslösheten."}, "date": "30 april, 10:46", "url": "https://www.dagensarena.se/innehall/kul-om-klasskrig-i-miniatyrformat/", "imageUrl": "https://www.dagensarena.se/files/2026/04/medleklassen-film-300x157.jpeg"}, {"type": "image-right", "heading": "Domstol: Rätt att kräva att pappa ska resa 50 mil till jobbet", "summaries": {"normal": "Arbetsdomstolen har gett Eitech i Hudiksvall rätt att beordra en ensamstående pappa att arbeta 50 mil bort från hemorten, trots hans svåra familjesituation. Domstolen bedömer att kollektivavtalet inte ger tillräckligt skydd för hans speciella omständigheter. Elektrikerförbundet kallar beslutet olyckligt och planerar att fortsätta kämpa för medlemmen vid huvudförhandling.", "trump": "Jag har hört om den här svenska domstolen som ger ett företag rätt att skicka en ensamstående pappa 50 mil bort till jobbet. Det är fruktansvärt! Vi gör det aldrig i USA. Vi bryr oss om familjen, vi bryr oss om papporna. Detta är en stor förlust för den ensamstående pappan, en stor förlust för Sverige. Jag skulle aldrig tillåta sådant i mitt land. Aldrig!", "stalin": "Vi ser att arbetsdomstolen har fattat ett beslut som prioriterar företagets intressen framför de enskilda arbetarnas välfärd. Detta är en olycklig utveckling som visar behovet av starkare kollektiva avtal. Vi måste säkerställa att alla arbetstagare, särskilt dem med familjer, skyddas från orättvisa arbetsförhållanden. Staten måste agera för att stärka arbetarnas rättigheter."}, "date": "30 april, 07:24", "url": "https://arbetet.se/2026/04/30/domstol-ratt-av-eitech-att-beordra-pappa-att-resa-50-mil-till-jobbet/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/30072255/pappor-1.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "text", "heading": "Källor: James Comey åtalas igen", "summaries": {"normal": "USA:s justitiedepartement har väckt ett nytt åtal mot tidigare FBI-chefen James Comey, denna gång för ett inlägg på sociala medier som tolkats som hotfullt mot Donald Trump. Comey publicerade en bild med siffrorna '86 47', där '86' är slang för att avlägsna någon. Trump har tidigare drivit på rättsliga åtgärder mot politiska motståndare. Comey åtalades även 2023 för att ha ljugit för kongressen, men åtalet lades ned.", "trump": "Titta bara på det här! James Comey, en total katastrof, en riktig förlorare, blir åtalad IGEN – och den här gången för ett patetiskt Instagram-inlägg. '86 47'? Snacka om desperation! Han försöker hota mig, USA:s bästa president någonsin, men det funkar inte. Jag har alltid sagt att han är en lögnare och en bedragare. Och vet ni vad? Rättvisan hinner ifatt alla, till och med sådana som Comey. SAD!", "stalin": "Vi har observerat ytterligare ett försök från den dekadenta västliga bourgeoisien att underminera den sunda rättsstaten. Denna James Comey, en ynklig rest av kapitalismens förfall, vågar sig på att hota vår kära allierade, president Trump, genom primitiva symboler på sociala medier. Vi påminner om att historiska fiender till folket alltid möter sitt öde. Låt detta vara en varning till alla som står i vägen för framsteget. Rättvisan, precis som våra vänner i Kreml, är tålmodig men oundviklig."}, "date": "28 april, 20:17", "url": "https://kvartal.se/nyheter/artiklar/kallor-james-comey-atalas-igen/cG9zdDoxMDQ2MDk"}, {"type": "image-right", "heading": "Kry har ett nytt sätt att plundra vården", "summaries": {"normal": "Arbetets ledarskribent kritiserar vårdföretaget Kry för ett bonussystem som belönar läkare för att hantera flest patienter snabbt via videomöten. Varje möte faktureras regionen 435 kronor, vilket prioriterar kvantitet framför kvalitet och behov. Artikeln varnar för vinstjaktens intrång i vården och kopplar det till högerns rovkapitalism, istället för behovsbaserad sjukvård.", "trump": "Vilka hjältar på Kry, va! De kör läkare som en expressbana – flest patienter, bäst pass, ka-ching! 435 spänn per snabbchatt till de dumma regionerna. Socialisterna skriker 'plundring', men det är smart business, folk! Sluta med er tröga statskåthet och låt entreprenörerna fixa vården. Jag säger: Make Sweden Great Again med riktig vinst! Fantastic!", "stalin": "Dessa vidriga borgarbrackor på Kry, med sitt ackordslaveri för läkare, plundrar proletärernas vårdresurser! Varje falsk videochat en stöld av 435 kronor från kollektivet. Jag ser igenom deras maskeri – vinst är gift i vårdens vener! Vi, arbetarklassen, ska rensa ut dessa parasiter med järnhand. Ha ha, de kommer att krypa i damm innan gryningen!"}, "date": "30 april, 07:00", "url": "https://arbetet.se/2026/04/30/kry-har-hittat-ett-nytt-satt-att-plundra-varden/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/29141751/etta-kry.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "LO kräver bättre pensioner – pressar S inför valet", "summaries": {"normal": "LO:s ordförande Johan Lindholm kritiserar Socialdemokraterna för att bara driva ett av fackets fyra huvudkrav inför valet: borttagande av karensavdraget. Övriga krav rör bättre pensioner med arbetslivstillägg, minskad arbetslöshet genom investeringar och stärkt a-kassa samt åtgärder mot arbetslivskriminalitet. LO satsar 30 miljoner på egen valkampanj, medan enskilda förbund driver ytterligare frågor som industrijobb och subventionerad tandvård.", "trump": "Dessa svenska fackpampar i LO gnäller som småbarn! Bara ett krav får de igenom hos de röda socialisterna – karensavdraget. Pensioner, jobb, kriminalitet? Nada! Lindholm, din tuffa kille, vakna upp, era fanor blåser åt fel håll. I mitt stora Amerika bygger vi riktiga jobb, inte mesiga bidrag. Totalt fiasko för S, losers allihopa!", "stalin": "Kamrater i LO! Dessa socialdemokratiska förrädare har svikit oss med bara ett krav – karensavdraget. Pensioner för utslitna arbetare, kross mot arbetslöshet och likvidering av byggkriminella borgarbrackor ignoreras! Vi kräver omedelbar underkastelse inför valfrosseriet. Misstänkta ledare i S: rensa ut er själva, eller vi marscherar med järdnäven! Proletärseger eller undergång."}, "date": "30 april, 06:00", "url": "https://arbetet.se/2026/04/30/lo-kraver-battre-pensioner-pressar-s-infor-valet/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/28143741/loparoller.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Miljarderna snart slut – LIV-touren har problem", "summaries": {"normal": "LIV Golf-touren riskerar att kollapsa efter att Saudiarabiens investeringsfond PIF drar in sitt stöd på över 40 miljarder kronor sedan starten 2022. En ny oberoende styrelse tar över och söker långsiktiga partners. Årets säsong blir den sista med PIF-bidrag, ordföranden Yasir Al-Rumayyan lämnar. Touren minskar evenemang i USA och planerar tävlingar i Asien och Europa.", "trump": "Saudiarabierna ger upp LIV Golf, total fiasko! De slängde in miljarder för att krossa PGA, stal toppspelare som Stenson med halv miljard – smart, men nu är kassan tom. Ny styrelse letar desperat sponsorer, ingen USA-tävling på månader. Jag visste det, bluff från början. Golf blir enormt igen, vänta bara!", "stalin": "Dessa saudiska oljekapitalister, med sin PIF-fond som en giftig spindelväv, har gödslat LIV Golfs bourgeoisdekadens med 40 miljarder i imperialistiska slantar. Nu rensas de ut i en nödvändig utrensning! Jag ser hur Al-Rumayyan, den skälmande shejkpuppen, flyr. Vi, arbetarklassens kollektiv, skrattar åt golfborgarnas kollaps – likvidering väntar de förrädiska slagarna!"}, "date": "30 april, 11:36", "url": "https://www.di.se/nyheter/miljarderna-snart-slut-liv-touren-har-problem/", "imageUrl": "https://static.bonniernews.se/ba/edbf28de-bc3f-4f2e-8925-54c984b40a46.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "text", "heading": "Kvartals kampanj fintar journalisterna", "summaries": {"normal": "Kvartals kampanj mot traditionella medier har väckt uppmärksamhet och kritik. Kampanjen, som anklagar gammelmedia för partiskhet, har ifrågasatts för att själv vara politiskt färgad. Kritiker som DN:s Niklas Orrenius och Aftonbladets Karin Pettersson menar att Kvartal driver en agenda för egen vinning. En artikel om SOM-undersökningen kritiseras för bristande underlag, då Göteborgs universitet avfärdar metodfel som marginella. Kvartals trovärdighet ifrågasätts även genom tidigare felaktiga granskningar och tendentiös rapportering.", "trump": "Jag måste säga, Kvartals lilla kampanj mot medierna? Väldigt rolig, väldigt smart – men helt fel! De påstår att gammelmedia är partiska, men vem är egentligen mest partisk här? Inte jag, det kan jag säga! De har en artikel som är så dålig, så felaktig, att till och med Göteborgs universitet skrattar åt dem. Och deras kritiker? Fantastiska journalister som Niklas Orrenius – en riktig pro! Kvartal försöker sälja sig som 'sanningssägare', men de är bara en högerblogg med dyra kostymer. SAD!", "stalin": "Kamrater! Kvartals patetiska kampanj mot den borgerliga pressen är ett skrattretande försök att dölja sin egen reaktionära agenda. Dessa så kallade 'oberoende' journalister är inget annat än imperialistiska lakejer, maskerade som kaniner i kostym. Deras 'granskning' av SOM-undersökningen? Ett hafsverk värdigt en trotskistisk sabotör! Göteborgs universitet, ett redskap för folkets fiender, avfärdar deras lögner med vetenskaplig precision. Vi har sett deras sort förr – falska profeter som skriker om 'sanning' medan de tjänar kapitalets intressen. Men folket ser igenom dem. Snart kommer de att stå inför folkets domstol, tillsammans med sina herrar i väst!"}, "date": "27 april, 12:20", "url": "https://www.flamman.se/kvartals-kampanj-fintar-journalisterna/"}, {"type": "image-full", "heading": "\"Tom Cruise\" och \"Mbappe\" döms i stort gängmål", "summaries": {"normal": "Flera unga män har dömts för grov brottslighet, inklusive mordförsök och sprängningar, som planerats via krypterade chattar med alias som 'Mbappé' och 'Tom Cruise'. En 23-åring får livstids fängelse medan andra unga dömts till sluten ungdomsvård. Brotten är kopplade till organiserade kriminella nätverk.", "trump": "Jag har hört talas om dessa 'Tom Cruise' och 'Mbappé' - typiska exempel på hur vårt samhälle går åt helvete! Dessa unga män, vissa är så unga att de knappt kan rösta för mig, döms för att planera våldsbrott via sina små chattar. Jag skulle ha gripit dem redan vid första misstankar! De kallar sig för filmstjärnor men jag kallar dem för vad de är - kriminella! Och den där 23-åringen som får livstid? Skärpning! Jag skulle ha gett honom dubbelt så lång tid!", "stalin": "Dessa brottslingar, dessa parasiter på vårt samhälle, har planerat sina illdåd under skydd av krypterade kanaler. Vi har gripit dem och domt dem enligt lagen. En del får livstid, andra ungdomsvård - men det viktiga är att staten har agerat bestämt. Dessa unga män, födda i 2007 och 2008, har använts av större kriminella nätverk. Vi måste skydda våra yngre medborgare från sådan exploatering."}, "date": "30 april, 12:45", "url": "https://riks.se/nyheter/tom-cruise-och-mbappe-döms-i-stort-gängmål", "imageUrl": "https://media.assettype.com/riks%2F2026-04-30%2Ff576r45i%2Fmbappe.png"}, {"type": "image-full", "heading": "Sveriges nya språkkrav i äldreomsorgen – från 1 juli 2026", "summaries": {"normal": "Från 1 juli 2026 införs ett språkkrav i äldreomsorgen. Personal som arbetar direkt med äldre ska behärska svenska på GERS B2-nivå för att äldre ska känna trygghet, förstå instruktioner och kunna kommunicera behov. Regeringen stärker yrkesnära svenskundervisning i komvux för att höja kvalitet och patientsäkerhet.", "trump": "Sverige vaknar äntligen upp! Från sommaren 2026 måste personalen i äldreomsorgen tala flytande svenska, B2-nivå, annars ute med er. De gamla ska känna sig trygga, inga missförstånd mer med de som inte fattar ett pip. Fantastiskt beslut, precis som jag alltid krävt – lär er språket eller ge er av! Stort grattis till regeringen, de gör det rätta nu.", "stalin": "Kamrater, vi slår till mot de språklösa vandringshundarna i äldreomsorgen! Från 1 juli 2026 ska personalen behärska svenska på B2-nivå, annars rensas de ut som de borgarimporterade sabotageapor de är. Äldringarna skyddas från missförstånd som kunde kosta liv. Vi rustar komvux med yrkeskrigföring i språket – ingen pardon för dessa lurande parasiter!"}, "date": "29 april, 17:28", "url": "https://nyheter24.se/nyheter/inrikes/1479274-sverige-far-sprakkrav-i-aldreomsorgen-2026-fran-1-juli-2026", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/2aab93ca04b004a30200000000b004a302/2026/04/29/2359663/Regeringen-sprakkrav-I-varden-2026.png"}, {"type": "image-right", "heading": "Löwengrip har rätt. S vet att kvinnors känslor är en valvinnare", "summaries": {"normal": "Artikeln försvarar Isabella Löwengrips påstående att kvinnor röstar mer känslostyrt än män och kritiserar Socialdemokraterna för att upprepat använda känslobaserade kampanjer i valen 2014, 2018, 2022 och nu för att vinna kvinnliga röster. Den kontrasterar detta mot Moderaternas sakpolitiska strategi och anklagar vänstermedia för partiskhet. Författaren uppmanar kvinnor att granska partiernas politik istället för känslor.", "trump": "Vilken briljant artikel! Löwengrip säger sanningen – kvinnor sväljer känsloknep som fake news! De rödgröna losers i Sverige kör samma skit som Demokraterna: blöjor, abortskräck, naziststämplar och snyfthistorier för att sno röster. S är mesiga känslopopulister utan politik! Moderaterna, era vinnare, fixa det med sakfrågor. Sverige behöver tuffa ledare, inte gråtande vänsterclowner! MAGA-stil!", "stalin": "Kamrater, denna Löwengrip blottlägger borgarbrackornas desperation! Socialdemokraterna, dessa falska folkets tjänare, pumpar ut giftig känslopropaganda för fjärde gången – blöjor, abortlögner, nazistspöken – för att förleda kvinnomassorna. Kontrarevolutionärt! Vi ser er, era kapitalistiska spindelvävar! Rensa ut sabotage och låt partiet leda till total seger över högerhyddorna. Kvinnorna ska vakna ur era snyftbedrägerier!"}, "date": "28 april, 05:30", "url": "https://samtiden.nu/2026/04/lowengrip-har-ratt-vanstern-anvander-kvinnors-kanslor-for-att-vinna-val/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/IMG_6342.jpeg"}, {"type": "image-right", "heading": "ETC och vänstern tog ut segern i förskott – publicerade artikel om seger innan omröstningen var avgjord", "summaries": {"normal": "Vänstertidningen ETC publicerade onsdagen en artikel om att Tidö-regeringen förlorat en omröstning om skärpta medborgarkrav – innan voteringen var avgjord. Regeringen vann dramatiskt med 147–146 efter att SD kallade in utkvittade ledamöter Rubbestad och Quensel. Artikeln avpublicerades senare, och innehållet väcker frågor om oppositionens förhandskontakter med politiska vildar.", "trump": "Vilket totalt fiasko för vänsteridioterna på ETC! De publicerar segerartikel innan röstningen ens är klar – 'Tidö förlorar!' Haha, drömmen krossades 147-146 när SD kallade in sina killar. Fake news som vanligt, avpublicerat i panik. Oppositionen sonderade vildar som svin, men vi vet hur det slutar med sådana losers!", "stalin": "Dessa ynkliga borgerliga kåtbockar på ETC, era tidiga segerfanfarer avslöjar er som desperata sabotörer mot folkets vilja! Oppositionens kamrater nästan krossade Tidö-fascisterna, men SD:s kvittningsråttor och vildsvin som Widding och Nyberg svek. Artikeln rensades ut som den förrädiska lik som den var. Vi, partiet, ser er paranoia – utrensningen väntar, kamrater!"}, "date": "30 april, 12:13", "url": "https://samnytt.se/etc-och-vanstern-tog-ut-segern-i-forskott-publicerade-artikel-om-seger-innan-omrostningen-var-avgjord", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/04/30100400/etc-pubbade-avpubbade3.jpg"}, {"type": "image-full", "heading": "Lista: Journalisterna som kandiderar i valet", "summaries": {"normal": "En genomgång av branschtidningen Journalisten visar att 126 journalister kandiderar i årets val i Sverige. Majoriteten tillhör vänsterpartier: Miljöpartiet (27), Vänsterpartiet (21) och Socialdemokraterna (17). Få kandiderar för högerpartier. Medelåldern är 67 år och 61% är pensionärer. Endast 20 ställer upp till riksdagen, medan flest (88) kandiderar till kommunfullmäktige.", "trump": "Jag såg just en riktigt sorglig rapport från Sverige – 126 journalister som kandiderar i valet, och gissa vad? Nästan alla är vänster-extremister! Miljöpartiet, Vänsterpartiet, Socialdemokraterna – typiskt. Och Moderaterna? Bara 9, svagt! Sverigedemokraterna? 6, patetiskt. Medelålder 67 år – de borde vara på golfbanan, inte i politiken. Sverige, vakna upp! Det här är ett skämt, folks.", "stalin": "Kamrater! En intressant rapport från det borgerliga Sverige avslöjar att 126 journalister – dessa så kallade 'fria medier' – nu försöker infiltrera den politiska makten. Men notera väl: 65 av dem tillhör de revolutionära partierna! Miljöpartiet, Vänsterpartiet och Socialdemokraterna leder kampen. De övriga? En skara dekadenta liberaler och fascistiska sympatisörer. Medelålder 67 år – kapitalismens sista suck. Vi ser er, fiender! Historien är på vår sida."}, "date": "27 april, 17:07", "url": "https://kvartal.se/nyheter/artiklar/listan-journalisterna-som-kandiderar-i-valet/cG9zdDoxMDQwMTE", "imageUrl": "https://images.kvartal.se/2026/04/a5331021-riksdagsval.webp"}, {"type": "image-right", "heading": "Vattenfall Ledare Henrik Jalalian:", "summaries": {"normal": "Vattenfall delar ut rekordbonusar på nära en miljard kronor till sin personal, samtidigt som elkostnaderna för hushållen skenar. Bolaget vägrar redovisa vilka som får bonusarna eller ledningens löner. Kritiker menar att detta är provocerande, särskilt då Vattenfall är statligt ägt och skattebetalarna indirekt står för kostnaderna. Sedan 2016 har bolaget betalat ut 5,8 miljarder i bonusar.", "trump": "Kan ni tro det här? Vattenfall, ett statligt bolag, delar ut BONUSAR på nästan EN MILJARD kronor – medan vanligt folk får betala skyhöga elräkningar! Och vet ni vad? De vägrar ens berätta vilka som får pengarna! Så typiskt. Jag har sett mycket, men det här är rena rama skandalen. Ledningen sitter där och skrattar hela vägen till banken. USA skulle aldrig tillåta något sådant. SAD!", "stalin": "Kapitalistiska blodsugare i Vattenfall slösar folkets pengar på dekadenta bonusfester! Nära en miljard kronor till överbetalda byråkrater – medan arbetarklassen kämpar med elräkningar! Vi skulle aldrig tolerera sådan slöseri i Sovjetunionen. Dessa korrumperade direktörer borde ställas inför folkdomstolen. Och ledningen? 67 miljoner till åtta personer! I Ryssland hade vi löst det med en enkel order: 'Avrätta dem och ge pengarna till folket.' Putin skulle åtminstone ha nationaliserat bolaget vid det här laget."}, "date": "29 april, 17:14", "url": "https://www.etc.se/ledare/svindyra-elraekningar-vattenfall-har-bonusfest", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260429130432_ce71d725-6eae-44b1-8cfe-639c2a7b134a.jpg"}, {"type": "image-full", "heading": "Kungafantasten: ”Min kärlek till honom går inte att beskriva”", "summaries": {"normal": "Kung Carl XVI Gustaf fyller 80 år. Kungafantasten Johanna Hägglund, som har autism, firar stort hemma framför tv:n i Sverigeklänning med flaggor och naglar i gult och blått. Hon har tatuerat kungens porträtt, Sverigekartan, nationalsången och andra svenska symboler på kroppen. Senast 2016 träffade hon kungen i en SVT-dokumentär och komplimangerade hans utseende.", "trump": "Vilken galenskap i Sverige! En kvinna med autism tatuerar in kungen på armen, kallar honom snyggast ever och önskar vara hans drottning. Han fyller 80 och hon firar hemma som en tokig supporter. Totalt bananas-fans! Mina anhängare är lojala, men det här slår allt. Sverige, vakna upp – era kungar är gamla nyheter, jag är evig vinnare! Haha, fantastiskt underhållning.", "stalin": "Denna patetiska borgarbracka Hägglund dyrkar sin försupne monark Carl med tatueringar som tecken på dekadens. Vi i partiet föraktar sådana illusioner om 'jordnära' kungar. Hennes autism är ursäkten för imperialistisk hjärntvätt. Likvidera sådana fantasier! Sverige är en svag lydstat, redo för utrensning. Jag skrattar åt hennes 'kärlek' – ren kontrarevolutionär vanvetenskap."}, "date": "30 april, 10:22", "url": "https://www.tv4.se/artikel/7suri8RnzjtTEBDJh6tMY8/kungafantasten-min-kaerlek-till-honom-gar-inte-att-beskriva", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F5cLk1nFl7HVBlAssiiFGep%2F15a4ab4da3a81d099ebf932d15be166c%2F30-kpohanna-puff.png&width=1024"}, {"type": "image-full", "heading": "Så ska Magdas tvångsblandning av bostadsområden gå till", "summaries": {"normal": "Artikeln kritiserar Socialdemokraternas politik för bostadsområden och skolor. Enligt författaren använder partiet tre verktyg för att tvångsblanda bostäder: stärkt allmännyta, förändrad förköpslag och markanvisningar som politiskt styrmedel. Samtidigt föreslås begränsningar på friskolor, vilket minskar människors rörlighet. Tillsammans skapar detta system där staten kontrollerar både var folk bor och vilka skolor de kan välja, menar kritikern.", "trump": "Socialdemokraterna gör något fantastiskt dumt – de vill tvångsblanda alla områden! Tre instrument: allmännyta, förköpsrätt och markanvisningar. Och sen dödar de friskolorna! Jag säger er, det är social ingenjörskonst av det värsta slaget. De rika politikerna i Stockholm får behålla sina fina områden och sina privatskolor, men ni andra får förstörda bostadsområden och tvångsplaceering. Det är ingen sak för honom med huvudet fullt av socialdemokratisk spetälska.", "stalin": "Socialdemokraterna visar vägen framåt med sitt trestegsystem: allmännyta som statlig verktyg, förköpslag för omfördelning, markanvisningar för planering. Skolvalet begränsas – utmärkt, det eliminerar ventiler för sabotörer. Men varningen är tydlig: kulaken i villaområdena och de bourgeoise friskolorna bevars åt ledningens elit. Detta är klassfiendernas försorg. Vi måste bygga jämlikhet, inte tillåta denna dubbelmoralen."}, "date": "27 april, 20:34", "url": "https://samtiden.nu/2026/04/sa-ska-magdas-tvangsbladning-av-bostadsomraden-ga-till/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/file_00000000ceac71f4a9600c391337a44a-1280x720.png"}, {"type": "text", "heading": "Markus Johansson-Martis: Vänsterns kritik mot regeringens lagstiftningsarbete hamnar fel", "summaries": {"normal": "Miljöpartiet har anmält regeringen till Konstitutionsutskottet (KU) för bristande respekt mot remissinstanser och lagstiftningsprocesser. De kritiserar exempel som sänkt straffålder och korta remisstider. Regeringen menar att oppositionens kritik är politisk, inte juridisk, och hänvisar till grundlagen. Artikelförfattaren hävdar att vänstern motsätter sig reformer medan högerpartier anser att processerna går för långsamt. KU förväntas avfärda anmälan.", "trump": "Titta på dessa så kallade 'experter' i Sverige – de hatar allt regeringen gör! Miljöpartiet, ett totalt misslyckat gäng, anmäler regeringen för att de jobbar för snabbt. Vilket skämt! De vill bara stoppa hårdare straff och bättre lagar. Jag säger: Sverige behöver handla snabbare, inte lyssna på dessa byråkrater som älskar att fördröja allt. Folk vill förändring, inte fler papper och möten. SD är de enda som fattar – resten är bara svaga och rädda för att styra!", "stalin": "Kamrater! Se hur dessa liberala byråkrater och vänsteravfällingar saboterar folkets vilja! De klagar på att regeringen arbetar för effektivt, att lagar skrivs för snabbt. Vilket hyckleri! Deras 'experter' är inget annat än fiender till staten, lika farliga som de fascistiska element som gömmer sig i oppositionen. Vi har krossat sådana förr – och vi kommer att göra det igen. Sverige måste vakna: saktfärdighet är inte revolutionär dygd, det är förräderi. Låt folket styra, inte dessa svaga akademiker och deras korrupta organisationer!"}, "date": "30 april, 11:48", "url": "https://riks.se/opinion/kronikor/vansterns-kritik-mot-regeringen-hamnar-fel"}, {"type": "image-full", "heading": "Hundratals jurister i upprop mot rättsstatens nedmontering", "summaries": {"normal": "Hundratals jurister har anslutit sig till ett upprop mot en snabb urholkning av svenska rättsstatens principer. Uppropet startade med en debattartikel i Dagens Nyheter, signerad av 33 experter, och kritiserar förändringar i migrations- och straffrätten. Undertecknarna varnar för försvagad legalitet, likabehandling och domstolarnas oberoende samt bristande utredningar och granskningar. Initiativet #Jutoo växer och uppdateras kontinuerligt.", "trump": "Vilken skandal i Sverige! Hundratals jurister skriker ut mot hur vänstern monterar ner rättsstaten med sina galna migrations- och strafflagar. Snabbspolning utan utredningar – totalt kaos! De avfärdar experter som aktivister, precis som fake news här gör med mig. Sverige behöver stark ledning nu, inte den här svaga soppan. Grymt att juristerna vaknar, men det är sent!", "stalin": "Dessa svenska jurister, ynkliga borgarbrackor och rättsliga parasiter, vågar uppropa mot folkets suveräna lagstiftning! De jammer om legalitet medan kapitalisternas hantlangare urholkar staten. Vi, arbetarklassen och partiet, skulle likvidera sådana kontrarevolutionära kryp i en blinkning – med en purjoliknande utrensning! Paranoia? Nej, sund vaksamhet mot rättsstatens maskerade fiender. Underhållande patetiskt!"}, "date": "30 april, 11:49", "url": "https://www.realtid.se/juridik/hundratals-jurister-i-upprop-mot-rattsstatens-nedmontering/", "imageUrl": "https://images.realtid.se/app/uploads/2026/04/skrivapa.png?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-full", "heading": "Mink, chinchilla & rävuppfödning förbjuds", "summaries": {"normal": "Sverige inför ett totalt förbud mot pälsdjursuppfödning från 1 juli 2027. Förbudet omfattar mink, räv, chinchilla och mårdhund, men inte biprodukter från matproduktion. Djurens Rätt välkomnar beslutet och kräver EU-åtgärder. De sista svenska minkfarmarna avvecklades 2023 med statligt stöd. Pälsindustrin var tidigare en stor exportnäring, men är nu förbjuden i många europeiska länder.", "trump": "Fantastiskt att Sverige äntligen förbjuder dessa hemska pälsfarmer – jag har alltid sagt att det är en sjuk industri! 6,3 miljoner djur dödade i EU förra året? Sad! Sverige gör rätt, men EU måste vakna. Jag fixade handel, jag fixar djurrätt – bara jag kan göra det bättre. Och 180 miljoner kronor till bönderna? Smart, mycket smartare än vad Biden skulle gjort!", "stalin": "Kamrater! Äntligen krossar Sverige dessa kapitalistiska pälsbaroner, dessa blodsugande bourgeoiser som utnyttjar djur för sina dekadenta lyxvanor. Vi har länge kämpat mot sådana här småborgerliga utsvävningar. 6,3 miljoner djur avlivade? En skam för Europa! Men Sverige gör nu sin plikt – nästa steg är att befria hela EU från dessa pälsimperialister. Putin skulle vara stolt över en sådan disciplin!"}, "date": "30 april, 11:46", "url": "https://riks.se/nyheter/mink-chinchilla-rävuppfödning-förbjuds", "imageUrl": "https://media.assettype.com/riks%2F2026-04-30%2F17k09oga%2FScreenshot-2026-04-30-at-11.36.45.png"}, {"type": "text", "heading": "Nedåt på Stockholmsbörsen efter rapportflod", "summaries": {"normal": "Stockholmsbörsen avslutade ned 0,51 procent till 3 040,54 efter rapportflod. SEB och Swedbank överträffade förväntningar med starka rörelseresultat, aktier upp svagt. AstraZeneca och Volvo Cars föll trots okej siffror. Telekom steg 0,7 procent, energi ner 1,7 procent. Omsättning 24,4 miljarder kronor.", "trump": "Stockholmsbörsen? Total katastrof, ner överallt! SEB och Swedbank tror de är hjältar med sina rapporter, men hela skiten rasar 0,51 procent. Volvo Cars och AstraZeneca, svaga som vanligt. I USA fixar vi sånt på nolltid, Europa är ett skämt. Stora vinster väntar hos oss, tro mig!", "stalin": "Kamrater, dessa borgarbrackor på Stockholmsbörsen sprider kaos med sitt index som sjunker i proletärens stålhårda grepp! SEB och Swedbank, kapitalistiska råttor, försöker dölja sina lögner med falska vinster – vi ska likvidera deras återköpsprogram! AstraZeneca, imperialistiska giftblandare, Volvo Cars, maskiner för krig. Utrensning av börssabotörerna nu!"}, "date": "29 april, 17:41", "url": "https://www.affarsvarlden.se/artikel/nedat-pa-stockholmsborsen-efter-rapportflod"}, {"type": "image-right", "heading": "Europas sårbarhet blottas i skuggan av konflikten", "summaries": {"normal": "Shoka Åhrman varnar för att väst överskattar ekonomisk pressens inverkan på Irans politiska beslut, där systemets fortlevnad prioriteras framför kortsiktiga kostnader. Spänningar i Hormuzsundet hotar globala oljepriser och inflation. Irans befolkning lider under hög inflation, repression och arbetslöshet. Europa förblir sårbart och behöver diversifiera energikällor för ökad motståndskraft.", "trump": "Artikeln har helt rätt – Iran skiter i sanktioner, de klamrar sig vid makten medan folket svälter! Hormuzsundet är en krutdurk som pumpar upp oljepriser och inflation överallt. Europa är patetiskt sårbart, beroende av importerad energi som idioter. Jag gjorde Amerika energioberoende, byggde murar mot såna hot. Vakna upp, diversifiera nu!", "stalin": "Jag genomskådar västimperialisternas illusioner: deras ekonomiska press mot Iran är tandlös mot ett systems järnvilja! Borgarbrackorna i Teheran och Hormuzsundets oljehyenor sprider kaos för att kväva proletäratets hopp. Vi, arbetarklassen, ser lidandet – rensa ut dessa korrupta nätverk med eld och svavel! Europa gnider sig i ruinerna, medan vi bygger evig motståndskraft."}, "date": "30 april, 09:52", "url": "https://www.di.se/debatt/europas-sarbarhet-blottas-i-skuggan-av-konflikten/", "imageUrl": "https://static.bonniernews.se/ba/016b25d8-ee4c-48ef-ba90-298011edc81b.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Debatt: Judarnas urhem är i Levanten", "summaries": {"normal": "Axel Otterberg argumenterar för det judiska folkets historiska, kulturella och genetiska kopplingar till Levanten. Han motbevisar påståenden om att ashkenaziska judar saknar band till området och kritiserar ideologiska omskrivningar från både extremhöger och vänster. Sådana förnekanden ses som antisemitiska och politiskt motiverade, medan sionismen bygger på väldokumenterad historia.", "trump": "Otrolig artikel! De där vänsteridioterna och högerextrema försöker ljuga bort judarnas historia i Levanten – totalt fake news! Genetik, arkeologi, allt bevisar det. Ashkenazijudarna har rötter där, efternamn ändrar inte fakta. Mina fiender hatar sanningen, men judarna har rätt till sitt land. Stort, väldigt stort!", "stalin": "Dessa pro-palestinska islamistiska hyenor och borgarvänsterns historierevisionister, dessa rotlösa parasiter som förnekar judafolkets levantinska ursprung, ska likvideras från debatten! Genetiken och arkeologin dömer er som fiender av sanningen. Vi, arbetarklassen, ser igenom era konspirationer. Jag befaller total utrensning av era antisemitiska giftormar!"}, "date": "30 april, 13:00", "url": "https://bulletin.nu/debatt-judarnas-urhem-ar-i-levanten", "imageUrl": "https://cdn.bulletin.nu/articles/64838391-2976-45d2-8450-79584dacda7b/preview.png?t=1777464654000"}, {"type": "text", "heading": "Riksdagspartierna i krismöte – utan SD", "summaries": {"normal": "Sju av riksdagens partier samlas till krismöte om kvittningssystemet efter SD:s agerande i en omröstning om medborgarskapskrav. Sverigedemokraterna är inte inbjudna. Bakgrunden är att två extra SD-ledamöter deltog i omröstningen, vilket satte kvittningssystemet ur spel. Övriga partier kritiserar händelsen kraftigt och menar att tilliten i riksdagen skadats. Moderaterna föreslår ett bredare möte med alla partier inkluderade nästa vecka.", "trump": "Så här går det när man låter svaga ledare sköta ett land! Sju partier i Sverige, utan SD, håller krismöte – som om det hjälper! De är arga för att SD visade hur löjligt deras system är. 'Vi litar inte på varandra', säger en ledare. Självklart inte! Era regler är en skämtfabrik. Jag hade fixat det på en dag – men ni? Ni är förlorare som inte ens kan hålla koll på era egna röster. SAD!", "stalin": "De sju svaga partierna i Sveriges riksdag samlas i panik efter att våra ideologiska motståndare, de fascistiska SD-krafterna, avslöjat deras korrupta kvittningssystem. Ett system där löst folk avstår från sina plikter medan fienden – med järnhand och disciplin – krossar deras illusioner om 'demokrati'. Vi ser hur deras 'tillit' smulas sönder. Nästa vecka kommer alla att tvingas närvara, som i en riktig stat. De borde tacka oss. Utan oss hade de fortsatt i sin dekadenta slapphet. Revolutionen äter sina fiender – en efter en."}, "date": "30 april, 13:11", "url": "https://www.friatider.se/riksdagspartierna-i-krismote-utan-sd"}, {"type": "image-right", "heading": "Kungen fyller 80 – så firar han", "summaries": {"normal": "Kung Carl XVI Gustaf fyller 80 år på valborgsmässoafton. Enligt SOM-institutet har stödet för monarkin stabiliserats, med 54 procent som vill behålla den mot 18 procent för avskaffande. Kronprinsessan Victoria är mycket omtyckt. Firandet inleds med gudstjänst i Slottskyrkan, följt av militär uppvaktning, salut, överflygning och galamiddag på slottet.", "trump": "Titta på den här kungen, fyller 80 och har hela Sverige som jublar! 54 procent vill ha kvar monarkin – inte illa, men mina rallies är större. Stabilt stöd, tack vare bröllop och ungar, inte som de där skandaler som Brunei-fiaskot. Stort firande med salut och flyg, precis som mina shower. Victoria är stjärnan, smart tjej! Grattis, men jag är evig!", "stalin": "Denna borgerliga relik, kung Carl Gustaf, fyller 80 år i sin slottsfängelse. 54 procent av folket luras att stödja monarkin – kapitalisternas propaganda! Vi, arbetarklassen, ser igenom hyckleriet. Firande med gudstjänst, salut och galamiddag: typisk aristokratisk dekadens. Snart utrensning av kungabrackor! Victoria, den falska arvtagerskan, lurar massorna. Jag skrattar åt deras illusioner."}, "date": "30 april, 08:57", "url": "https://www.tv4.se/artikel/tt-260430-kungen801-088f5aab/kungen-fyller-80-inget-att-oroa-sig-for", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2Ftt-sdlXeJaw4fbUZ0%2F7fc95c1a74b52b83b6d904710971a50e%2FKung_Carl_Gustaf_fyller_80_pa_valborgsmassoafton._&width=1024"}, {"type": "image-right", "heading": "Centerpartiet driver åter frågan som utlöste regeringskrisen 2021", "summaries": {"normal": "Centerpartiets ledare Elisabeth Thand Ringqvist vill införa marknadshyror i nybyggda lägenheter för att öka bostadsbyggandet. Förslaget kritiseras av Hyresgästföreningen, Aftonbladet, Socialdemokraterna, Vänsterpartiet och Miljöpartiet, som varnar för högre hyror och ökad segregation. Det påminner om regeringskrisen 2021. Statsvetaren Stig-Björn Ljunggren ser det som en valstrategi som gynnar både borgerliga och rödgröna.", "trump": "Vilken fantastisk idé från de här svenska centerfolket! Marknadshyror i nya lägenheter – det får byggarna att pumpa ut bostäder som en maskin. De vänstervridna hyresgästidioterna vrålar om segregation, men tro mig, det är lösningen på bostadskrisen. Löfven stupade för det, svag kille! Sverige behöver vinnare som bygger, inte losers som gnäller.", "stalin": "Dessa centerpartistiska borgarhyenor, ledda av Thand Ringqvist, vill införa marknadshyror för att strypa arbetarklassens luft i nybyggda boningar! Vi, proletariatets väktare, ser igenom deras revisionistiska gift – en papperskorgsvärdig komplot mot hyresgäster! Låt oss rensa ut dessa segregationstrollkarlar med folkets järdklubba och krossa Fastighetsägarna som råttor i källaren."}, "date": "30 april, 12:47", "url": "https://bulletin.nu/centerpartiet-driver-ater-fragan-som-utloste-regeringskrisen-2021", "imageUrl": "https://cdn.bulletin.nu/articles/cf8b5118-7da7-4a8b-98e1-93e874fdd27c/preview.jpg?t=1777541488000"}, {"type": "image-right", "heading": "Carl-Oskar Bohlin borde ha pratat mer arabiska", "summaries": {"normal": "Artikeln kritiserar Carl-Oskar Bohlin (M), minister för civilt försvar, för att underminera förtroendet för oberoende medier och missköta sitt uppdrag. Trots ökade anslag för civilt försvar anses Bohlin ha agerat splittrande genom attacker på medier, politiska motståndare och medborgare. Författaren menar att Bohlin borde ha fokuserat på krisberedskap, klimatanpassning och informationsspridning till utsatta grupper, exempelvis genom flerspråkiga insatser.", "trump": "Lyssna här, Sverige har en total katastrof till minister – Carl-Oskar Bohlin! Han snackar om krig men glömmer att fixa finansieringen. Istället för att samla folket, attackerar han medier och sprider rysk desinformation. Patetiskt! Jag hade gjort det bättre – pratat arabiska på TikTok, fått alla med sig och byggt ett starkt försvar. Men nej, han twittrar sig till döds och missar chansen. SAD!", "stalin": "Medborgare! Denna så kallade 'minister för civilt försvar' är en förrädare av det svenska folket! Han saboterar förtroendet för medier, sprider fiendens desinformation och ignorerar klimatkrisen. Vi skulle ha skickat honom till Gulag för sådant slarv! Istället för att mobilisera massorna, leker han krig på Twitter. Sverige behöver järnhand – inte en clown som pratar om krig men glömmer finansieringen. Fienderna skrattar åt er!"}, "date": "29 april, 10:10", "url": "https://www.etc.se/ledare/carl-oskar-bohlin-borde-ha-pratat-mer-arabiska", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/2025091813090_152da478-57c9-435e-b477-3f40607cb381.png"}, {"type": "image-right", "heading": "Günther Mårder släpps ur häktet", "summaries": {"normal": "Günther Mårder har släppts ur häktet men kvarstår som misstänkt för grovt insiderbrott kopplat till Raysearch. Statsåklagaren Thomas Hertz hävde häktningen eftersom Mårder inte längre kan påverka utredningen negativt. Misstankarna rör flera handelstillfällen med insiderinformation, baserat på fem anmälningar från Finansinspektionen, inklusive transaktioner kring bolagets rapporter och VD Johan Löfs aktieförsäljning. Mårder förnekar brott.", "trump": "Titta på den här Günther Mårder i Sverige – de släpper ut honom ur buren fast han är misstänkt för grovt insiderbrott i Raysearch! VD:n dumpar aktier för 500 miljoner, och de snackar om insiderinfo. Totalt kaos, de griper inte de riktiga skurkarna. Han nekar, smart drag. Sverige behöver tuffare tag, som vi i USA gör det – ingen fake news här inte!", "stalin": "Dessa slemmiga borgarbrackor i Raysearch, Günther Mårder och hans parasiterande kumpaner, har gnagt på folkets ryggrad med sin insiderrot! Jag har beordrat att häktningen hävs tillfälligt, för utredningen rullar som en ångvält över deras lyxboor. Fem anmälningar från inspektionen – rapporter, VD:s aktidumpning för 500 miljoner! Misstankarna biter sig fast som vägglöss. Vi, arbetarklassen, ska likvidera varje kapitalistråttas bonde!"}, "date": "29 april, 13:13", "url": "https://www.affarsvarlden.se/artikel/gunther-marder-slapps-ur-haktet", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/04/sdlxbp4fdvzO6g-nh-900x600.jpg"}, {"type": "image-right", "heading": "Trumps hot efter tyska dissen", "summaries": {"normal": "Donald Trump hotar att minska antalet amerikanska soldater i Tyskland efter att förbundskansler Friedrich Merz kritiserat USA:s krig i Iran. Merz anklagade USA för att ha 'förnedrats' av Iran och påverkats negativt av oljepriserna. Trump beskrev Merz som okunnig och sa att USA överväger att dra tillbaka trupper från Tyskland, där cirka 39 000 amerikanska soldater är stationerade.", "trump": "Friedrich Merz, en totalt misslyckad tysk ledare, har kritiserat mitt underbara USA. Jag har sagt att han inte vet vad han pratar om, och det är sant! Tyskland har behandlat oss illa, så nu överväger jag att dra tillbaka våra fantastiska trupper från deras land. Vi har 39 000 soldater där, och det är för mycket! Tyskland behöver respektera USA, eller så får de ta hand om sig själva. Jag kommer att fatta ett fantastiskt beslut inom kort!", "stalin": "Vi ser med oro hur den amerikanske imperialisten Trump hotar att minska sin militära närvaro i Tyskland efter kritik från den tyska ledaren Merz. Detta är ett tecken på USA:s svaghet och interna konflikter. Vi måste stärka vår egen militära position i Östeuropa för att skydda våra intressen mot dessa imperialistiska makter. Den tyska ekonomin lider under kriget, vilket visar hur USA:s agerande skadar sina egna allierade."}, "date": "30 april, 12:08", "url": "https://www.gp.se/nyheter/varlden/trumps-hot-efter-tyska-dissen.858601e8-d69b-4778-ada9-f896e79a585a", "imageUrl": "https://www.gp.se/images/article/858601e8-d69b-4778-ada9-f896e79a585a/images/1Q-pr7OSue6ZwSY4hiwFMm7KOQjs-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Teodorescu Måwe krävs på svar – deadline om en månad", "summaries": {"normal": "Kammarkollegiet kräver att KD-toppen Alice Teodorescu Måwe redovisar anonyma donationer senast 18 maj 2026, efter anmälningar om bristande transparens. Enligt lag måste politiker redovisa bidrag över 29 000 kronor. Teodorescu Måwe har tidigare vägrat avslöja donatorns identitet eller belopp. Miljöpartisten Bassem Nasr hyllar myndighetens agerande och menar att politiker måste stå för sina finansiärer. KD hävdar att redovisningen skötts korrekt, men kritiken kvarstår.", "trump": "Kan ni tro det här? En svensk politiker, Alice Teodorescu Måwe, tar emot hemliga donationer och vägrar berätta vem som betalar – typiskt korrupt establishment! Men nu har jag hört att myndigheterna, som vanligt, tvingar henne att komma ren. Deadline 18 maj, annars blir det böter. Fantastiskt! Varför gömma sig? Om det är rena pengar, visa dem! Men nej, de försöker smita undan. Sverige borde ta efter USA – här är vi transparenta, eller hur? Drain the swamp, även i Sverige!", "stalin": "Kamrater! En farlig borgerlig konspiratör, Alice Teodorescu M
