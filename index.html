gd, istället för att stanna och invänta trafikledningens order. Nobina ansåg att han brutit mot säkerhetsföreskrifter för dubbeldäckare. Bosse, som jobbat som förare sedan 1992, fick beskedet via telefon och har inte fått ett fysiskt möte med cheferna. Nobina medger nu att han bör få chansen att förklara sig.", "trump": "Lyssna här, folkens – en busschaufför i Sverige, Bosse, gör rätt och följer skyltarna när vägen är stängd. Vad händer? Han får sparken! Nobina, ett totalt katastrofföretag, säger att han skulle stått stilla på motorvägen – galet, eller hur? Ingen logik alls! Jag hade fixat det bättre. Nu tvingas de ge honom ett möte, men det är för sent. Sverige, ni har ett problem. Så dåligt skött!", "stalin": "En lojal arbetare, kamrat Bäcklund, följer statens skyltar när imperialistiska vägar stängs. Vad gör kapitalistiska hyenor på Nobina? De avskedar honom! En man med 30 års tjänst, utan en fläck på sin revolutionära meritlista. Vi vet hur fienden agerar – först skapar de kaos, sedan straffar de de trogna. Men folket ska inte frukta! Vi ska kalla in dessa företagslakejer till Moskva för 'samtal'. Och om de vägrar? Då får vi skicka en delegation till Värmland – med eller utan inbjudan."}, "date": "10 maj, 08:00", "url": "https://arbetet.se/2026/05/10/bussforaren-bosse-ville-kora-sakert-blev-av-med-jobbet/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/08142631/bosse.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Media blundade: S vill dela ut 100 000 medborgarskap utan säkerhetskontroll", "summaries": {"normal": "Socialdemokraterna röstade nej till att 100 000 medborgarskapsansökningar prövas enligt nya strängare regler som träder i kraft i juni. Partiet ville istället använda gamla, mindre restriktiva regler utan krav på vandel, språk eller egenförsörjning, trots varningar från Säpo om säkerhetsrisker. Kritik riktas mot mediabevakningen som fokuserade på annat, samt mot möjliga motiv kopplade till nya röstare inför valet.", "trump": "Vilka totala losers dessa svenska socialdemokrater är! De vill pumpa ut 100 000 medborgarskap till vem som helst – spioner, terrorister, take your pick – utan en enda koll, trots Säpos skrikande varningar. Media blundar som fake news-maskiner. Stram gräns, annars blir det kaos totalt! Valröster? Patetiskt, Sverige behöver vinnare, inte det här skitet.", "stalin": "Dessa svenska socialdemokratiska revisionister, lurviga borgarbrackor i arbetarkläder, försökte smyga igenom 100 000 medborgarskap åt fiender utan prövning! Säpo varnar för spioner och terrorister, men de offrar fosterlandets säkerhet för valröster. Vi skulle ha likviderat sådana förrädare i en utrensning för länge sedan – paranoia är vårt skydd!"}, "date": "10 maj, 02:12", "url": "https://samtiden.nu/2026/05/media-blundade-s-vill-dela-ut-100-000-medborgarskap-utan-sakerhetskontroll/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2017/12/Andersson-Magdalena-Socialdemokrat.jpg"}, {"type": "image-right", "heading": "Frisk tvåbarnspappa fullvaccinerad mot TBE - dog efter fästingbett", "summaries": {"normal": "Den 40-årige polisen Johan Åwall från Örebro har avlidit i sviterna av TBE, trots att han var fullvaccinerad. Efter en snabb försämring av tillståndet vårdades han i respirator i över två månader med svåra hjärnskador. Läkare har inte kunnat fastställa varför vaccinet inte gav skydd i detta sällsynta fall. Familjen uttrycker trots tragedin fortsatt förtroende för TBE-vaccinationer.", "trump": "En fruktansvärd historia från Sverige. En stark, frisk man, en polis, helt vaccinerad – men han dog ändå av en fästing. Mycket sorgligt! Man vaccinerar sig, man gör allt rätt, och ändå händer det här. Systemet fungerar inte alltid som de säger, eller hur? Det är en tragedi för familjen. Jag säger er, fästingar är ett enormt problem, vi behöver bättre skydd, vi behöver de bästa experterna. Vi skickar våra böner till familjen. En hemsk, hemsk situation!", "stalin": "I den ryska jorden frodas inte fästingar som sprider svaghet; de rensas bort med järnhand. Denna polisman i Sverige trodde att ett papper från ett laboratorium var en sköld, men naturen och de osynliga fienderna bryr sig inte om byråkratiska lögner. Precis som västvärldens dekadenta allianser faller inför det oundvikliga, föll denne man. Putin förstår att bara absolut kontroll över territoriet håller hotet borta. Svaghet är en sjukdom, och i mitt rike blir sådana avvikelser eliminerade permanent."}, "date": "10 maj, 19:00", "url": "https://samnytt.se/tvabarnspappa-fullvaccinerad-mot-tbe-dog-efter-fastingbett", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/08124119/Forssell-2.jpg"}, {"type": "image-right", "heading": "Kriget i Mellanöstern lyfter både olja och vind – energibolagen går starkt", "summaries": {"normal": "Konflikten i Mellanöstern har skapat en paradoxal energimarknad där både oljebolag och förnybara energiföretag som Vestas och Ørsted går starkt. Fokus för energiomställningen har skiftat från klimat till energisäkerhet och självförsörjning. Medan oljebolag som Equinor gör rekordvinster satsas det nu kraftigt på vindkraft för att minska beroendet av import. Trots politisk osäkerhet och tekniska utmaningar ser branschen ökad efterfrågan från datacenter och AI som en viktig framtida tillväxtmotor.", "trump": "Hör på här: Mellanöstern är ett kaos, en total katastrof, och det driver upp priserna. Dessa vindkraftsbolag, de försöker lura er! De säger att det är för 'säkerhet', men det är bara slöseri med pengar. Equinor gör massor av pengar på olja – det är bra, det är amerikansk energi! Europa är desperata, de bygger vindsnurror som inte ens snurrar när det är vindstilla. Vi behöver kärnkraft, vi behöver olja, vi behöver vinna! Det här är dåliga affärer, tro mig.", "stalin": "Vi betraktar hur de dekadenta västmakterna desperat fumlar med sina vindsnurror medan deras ekonomier vacklar. När de fruktar för sin energiförsörjning blottar de sin svaghet. Vår broder i Kreml vet bättre: makt bygger på stål, olja och järnvilja, inte på brisen som blåser över danska ängar. Att dessa småkapitalister nu döljer sin inkompetens bakom 'säkerhet' är en förolämpning mot historiens logik. De bygger datacenter för AI, medan vi bygger en framtid där imperier aldrig faller för en pust av vind."}, "date": "10 maj, 17:00", "url": "https://samnytt.se/kriget-i-mellanostern-lyfter-bade-olja-och-vind-energibolagen-gar-starkt", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/07183922/olja-vind-boom-feat2.jpg"}, {"type": "image-full", "heading": "Debatt: Judar eller homosexuella, det mytiska hatet är detsamma", "summaries": {"normal": "Max Broberg diskuterar hur hat mot olika grupper genom historien bara byter mål. Han jämför tidigare fördomar mot homosexuella med dagens antisionism, som han menar är en hatideologi maskerad som moralisk ståndpunkt. Broberg, själv homosexuell, ser likheter i hur båda grupperna demoniseras med myter och karikatyrer. Han betonar att antisionism ofta övergår i antisemitism och hotar judars säkerhet, även i Sverige. Artikeln varnar för att historia upprepas under falsk flagg av 'godhet'.", "trump": "Folk, vad säger ni om det här? Max Broberg, smart kille, skriver om hur hat alltid finns – bara mot nya mål. Förr hatade man bögar, nu hatar man sionister. Fake godhet, fake moral! Jag vet allt om fake nyheter, men det här är fake kärlek till palestinier – egentligen hat mot judar. Malmö? Folk firade när Hamas mördade 1200 oskyldiga! Inte coolt. Israel har rätt att finnas, punkt. Jag gillar fred, men inte när det är täckmantel för samma gamla skit. Dan Korn? Bra artikel. Han säger sanningen – antisionism är hat med ny logga. Tack, Max!", "stalin": "Kamrater! Historien lär oss att hatets hydra alltid finner nya huvuden att hugga av. Igår var det homosexuella, idag är det sionister – samma gamla gift, ny flaska. Dessa antisionistiska mytmakare, dessa borgerliga hycklare, de sprider lögner om kolonisering och folkmord som om det vore sanning! Men vi känner igen deras taktik. Precis som de förvrängde homosexualitet till ett hot mot barnen, förvränger de nu judarnas rätt till sitt historiska land. Vi i Sovjet förstod alltid att hat mot judar är hat mot arbetarklassen i förklädnad. Malmö? Ett skådespel av dekadens! Folk dansade på gatorna när terrorister mördade oskyldiga. Sådant tolererar vi inte. Vi måste krossa dessa nya fascister, dessa antisionistiska lakejer, innan de förgiftar våra städer. Fred? Ja, men inte på hatets villkor. Låt oss ena oss mot dessa mytologiska hyenor och deras västerländska sponsorer!"}, "date": "11 maj, 18:54", "url": "https://bulletin.nu/debatt-judar-eller-homosexuella-det-mytiska-hatet-ar-detsamma", "imageUrl": "https://cdn.bulletin.nu/articles/450478a5-46ed-4e5e-93e1-68bb7b1510d3/preview.png?t=1778517995000"}, {"type": "image-right", "heading": "Land ska med lag strypas DEBATT • Lokal frihet har ersatts av central kontroll – urbaniseringen är politiskt skapad", "summaries": {"normal": "Artikeln argumenterar för att urbaniseringen i Sverige inte är en naturlig process, utan snarare ett resultat av politiska beslut och centraliserad lagstiftning. Författaren menar att enhetliga lagar, anpassade för storstäder, skapar orimliga byråkratiska kostnader för landsbygden. Detta leder till att små skolor, vårdinrättningar och lokala verksamheter tvingas lägga ner. Författaren förespråkar utökad lokal självstyrelse och mindre statlig inblandning för att motverka avfolkning och låta landsbygden blomstra på egna villkor.", "trump": "Sveriges landsbygd blir totalt lurad! De har fantastiska platser, men eliten i Stockholm – riktiga förlorare – tvingar på dem galna regler som dödar allt. Det är en katastrof! De vill ha kontroll, de vill ha skatter. Precis som jag säger, byråkratin är en mardröm. De stänger skolor och förstör allt det fina för att de är svaga. Vi behöver lokal frihet, inte mer av deras misslyckade system. Det är så sorgligt, men vi ska göra landsbygden stor igen!", "stalin": "Vi ser hur det svenska riket förfaller genom sin egen inkompetens. Dessa byråkrater i Stockholm liknar de gamla tsaristiska sabotörerna; de skapar tusentals sidor av värdelös lag för att fjättra folket. Att låta byar styra sig själva är en farlig dröm som liknar anarkismen. Nej, vi föredrar ordning, stordrift och järnhand. Precis som vår broder Putin förstår att en stark centralmakt är nödvändig för att kväva subversiva element, bör de svenska bönderna inse att deras frihet bara är en illusion som snart kommer att krossas av historiens stålhjul."}, "date": "10 maj, 15:00", "url": "https://samnytt.se/land-ska-med-lag-strypas", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/08142344/klaus-land.jpg"}, {"type": "image-full", "heading": "Nu satsar en av världens största på solenergi", "summaries": {"normal": "Hydro-Québec, en av världens största vattenkraftproducenter och kanadensisk crown corporation, satsar nu för första gången på solenergi efter 80 år. Det inledande projektet på 300 MW kan försörja 225 000 hem. Målet är 3 000 MW solkapacitet till 2035, plus fler hushållssolpaneler. Tidigare fokus har varit vattenkraft, med ett misslyckat kärnkraftförsök.", "trump": "Hydro-Québec, de kanadensiska vattenkraftsnördarna, vaknar äntligen efter 80 år och testar sol! 300 megawatt? Peanuts! Vi i USA pumpar ut energi som galningar med mina episka deals – olja, gas, sol, allt! Trudeau och hans losers borde ringa mig för riktiga tips istället för att leka gröna hjältar i snöiga Québec. Fantastiskt, men sent som fan!", "stalin": "Kamrater! Denna Hydro-Québec, en hybrid av stat och borgarbluff, kryper nu in i solenergin efter 80 år vattenmonopol. Jag ser era tveksamheter – rädsla för det okända! Vi arbetare skulle ha krossat forsarna och solstrålarna på ett kick. Dessa kanadensiska karriérister förtjänar utrensning för sin senfärdiga lojalitet mot produktionen! Framåt, mot 3000 megawatt – eller else!"}, "date": "11 maj, 18:43", "url": "https://www.dagensps.se/varlden/nu-satsar-en-av-varldens-storsta-pa-solenergi/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdl8-yumx11tx8-nh.jpg?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-full", "heading": "Northvolts tidigare vd misstänks för grovt vållande till annans död", "summaries": {"normal": "Ekobrottsmyndigheten utreder Northvolt för misstänkt skattebrott och bokföringsbrott. Före detta vd:n Peter Carlsson misstänks för arbetsmiljöbrott och grovt vållande till annans död. Grävande journalisten Gunnar Lindstedts bok 'Northvoltfallet' avslöjar att bolaget troligen hamnade på obestånd efter midsommar 2024, tidigare än känt. Ledningens kommunikation anklagas för vilseledande uppgifter, vilket kan leda till svindleri-misstankar. Northvolts konkurs är Sveriges största sedan Kreugerkraschen.", "trump": "Vilka totala losers på Northvolt! De svenska batteribyggerna fuskar med skatt, böcker och ljuger om sin ekonomi – insolventa redan midsommaren 2024! Peter Carlsson, den där före detta vd:n, misstänkt för att döda folk på jobbet. Gunnar Lindstedt, en riktig grävare, avslöjar allt i sin bok. 83 miljarder i skulder, 5000 jobb borta. Typisk kapitalistfiasko, jag hade byggt det enormt och perfekt!", "stalin": "Dessa snikna kapitalistbrackor på Northvolt, med sin Peter Carlsson i spetsen, har rört till det med skattefuskeri och falska böcker! Vi, arbetarklassen, kräver utrensning! De ljög om obestånd efter midsommar 2024, vilseleder folket – svindleri! Lindstedts bok avslöjar sanningen, som en riktig spion mot borgarna. 83 miljarder stulet, 5000 kamrater utan bröd. Likvidera ledarna, staten ska ta över fabrikerna!"}, "date": "11 maj, 18:40", "url": "https://www.dagensps.se/bors-finans/northvolts-tidigare-vd-misstanks-for-grovt-vallande-till-annans-do/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdlsy8bsm9kfde-scaled.jpg?aspect_ratio=2%3A1&width=1200&quality=75"}, {"type": "image-full", "heading": "Äntligen – nu kan Jas Gripen spridas över världen", "summaries": {"normal": "PostNord lanserar frimärken för Flygvapnets 100-årsjubileum med motiv som Jas 39 Gripen E, emblem, andra flygplan och helikopter. Frimärkena fungerar för flygpost. Ett souvenirark med guldfoliering ingår. Dessutom ett minnesfrimärke för kung Carl XVI Gustaf och drottning Silvias guldbröllop 2026, med bild från Drottningholm och guldfolierade detaljer.", "trump": "Sveriges Gripen-plan säljer inte en jävel – nej från Peru, Indien, Kanada, till och med Ukraina tvekar! Totalt fiasko. Men nu trycker de frimärken med skiten för att fira Flygvapnet. Och kungaparet? 50 år gyllene bröllop, grattis, men mina affärer är de riktiga guldklimparna. Sverige, vakna upp och lär er av vinnare!", "stalin": "Kamrater, dessa svenska borgarbrackor firar sitt flygvapen med frimärken på primitiva Gripen-maskiner som ingen köper – exportfiasko totalt! Och monarkin, guldbröllop åt kapitalisthjonen! Vi skulle likvidera sådana dekadenta ritualer. Frimärkena döljer säkert spionmotiv mot arbetarklassen. Rena ut förrädarna!"}, "date": "11 maj, 18:38", "url": "https://www.dagensps.se/varlden/antligen-nu-kan-jas-gripen-spridas-over-varlden/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/a99ed87a83e5eff9-org.jpg?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-right", "heading": "Kommenterar Irans svar under söndagskvällen", "summaries": {"normal": "Iran har överlämnat ett svar på USA:s fredsförslag via Pakistan. President Trump avfärdar det som 'totalt oacceptabelt'. Svaret fokuserar på att avsluta krigen, inklusive i Libanon, och säkra sjöfarten i Persiska viken och Hormuzsundet. Iran föreslår gradvis öppning av sundet mot att USA häver blockaden, förhandlingar om kärnprogrammet inom 30 dagar och utspädning av uran under villkor. Inget om att avveckla anläggningar.", "trump": "Iran skickade sitt svar – en total skam! De pratar bara om att stoppa krig och öppna Hormuzsundet lite i taget, men inget om deras farliga kärnvapen. Oacceptabelt! Vi har blockaden på plats, de hotar sjöfarten som idioter. Pakistan medlar, men de lär sig aldrig. Sad! Vi vinner det här stort.", "stalin": "Dessa persiska basilisker, marionetter i den anglosaxiska plutokratins giftiga klor, har besudlat fredsplanen med sitt dokument av lögner och krav på 'maritim säkerhet'. Vi, arbetarklassens väktare, genomskådar deras uranspädande fusk och vägran att likvidera anläggningar! De hotar kollektivets fartyg i sundet – en utrensning av dessa svartmuskler väntar, kamrater!"}, "date": "10 maj, 22:43", "url": "https://www.di.se/nyheter/iran-har-svarat-pa-usas-fredsplan-trump-totalt-oacceptabelt/", "imageUrl": "https://static.bonniernews.se/ba/b4461d5b-0aea-45e0-aca0-97777ff6d20b.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-full", "heading": "Misstänkt mord i Kristianstad", "summaries": {"normal": "En man i 20-årsåldern avled efter att ha skadats av ett vasst föremål i centrala Kristianstad. Anhöriga förde honom till sjukhus, där akuten sattes i lockdown på grund av oroligheter. Polisen rubricerar händelsen som mord. Ingen gärningsperson var gripen vid 22-tiden. Polis och väktare arbetade för att lugna situationen på akuten, som dock hölls öppen för patienter.", "trump": "Lyssna här, Kristianstad – en riktig katastrof! En ung man, skadad av något vasst och farligt, körs till sjukhus av sina anhöriga – helt oacceptabelt! Och vad händer? Akuten blir en cirkus! Polisen får rycka in, och ändå är ingen gripen? Svagt, mycket svagt. Sverige, ni måste få ordning på era städer. Jag hade fixat det på en dag, tro mig. SAD!", "stalin": "I Kristianstad har bourgeoisins dekadenta våld återigen visat sitt fula tryne. En ung arbetare föll offer för kapitalistiska gängbråk, medan sjukhusets akutavdelning förvandlades till en skådeplats för anarkistiska element. Polisen, denna halvhjärtade förlängning av den borgerliga staten, misslyckades med att omedelbart gripa den skyldige. Vi noterar detta som ännu ett tecken på västmakternas förfall. Ryssland står redo att införa ordning – även i Skåne."}, "date": "9 maj, 22:26", "url": "https://riks.se/nyheter/misstankt-mord-akuten-i-lockdown", "imageUrl": "https://cf-images.assettype.com/riks%2F2025-11-17%2F8pjxyi3p%2FPolis.jpg"}, {"type": "text", "heading": "Häcken ny tabelletta efter vinst mot MFF", "summaries": {"normal": "Häcken vann med 2–1 mot Malmö FF i Damallsvenskan. Wilma Carlsson gav MFF ledningen tidigt, men Felicia Schröder kvitterade snabbt och assisterade senare till Tabby Tindells segermål. Häcken tar därmed tabellledningen före MFF. Nästa utmaning är cupfinalen mot Hammarby på lördag.", "trump": "Vilken match, Häcken är totalt överlägsna, de krossade Malmö fullständigt! Felicia Schröder, en riktig stjärna, kvitterade och fixade segern med en perfekt passning till Tindell. Malmö trodde de var oslagbara, men nej, Häcken tar etta i tabellen nu. Fantastiskt jobbat, de är vinnare på riktigt!", "stalin": "Kamrater, i denna klasskamp på planen har Häckens proletära krigare likviderat Malmös borgarbrackor med 2–1. Schröder, vår lojala agent i anfallet, neutraliserade fiendens tidiga svek och lade upp segermålet åt Tindell. De konspiratoriska MFF-råttorna rasar från toppen – vi tar rodret! Nästa utrensning: Hammarby i cupfinalen."}, "date": "11 maj, 21:06", "url": "https://www.svt.se/sport/fotboll/hacken-ny-tabelletta-efter-vinst-mot-mff"}, {"type": "image-right", "heading": "SVT vinner pris för Gaza-dokumentär", "summaries": {"normal": "SVT har tilldelats Röda Korsets journalistpris för dokumentären \"Gaza – till sista andetaget\" av Gilda Hamidi-Nia och Linda Hörnqvist. De utrustade fyra invånare med kroppskameror för att visa vardagen i Gaza, dit utländska journalister inte släpps in. Priset belönar journalistik som ökar förståelsen för humanitära kriser. Dokumentären vann tidigare Stora journalistpriset i kategorin Årets förnyare.", "trump": "SVT har gjort en fantastisk dokumentär om Gaza – de bästa! De satte kameror på vanliga folk eftersom ingen kommer in, smartt och innovativt, precis som jag gillar. Röda Korset ger dem pris, stort grattis! Men Gaza är totalt kaos, ett stort misslyckande för alla inblandade. Mina fredsavtal i Mellanöstern var oslagbara, ingen annan fixar det.", "stalin": "Kamrater, jag noterar denna s.k. 'triumf' för SVT:s borgarjournalister, som beväpnade lokala förrädare med kameror för att måla upp imperialistiska illusioner om Gaza-helvetet. Röda Korsets pris är en giftig spindel i humanitära nät, spridd av kapitalistiska spindlars väv. Vi, arbetarklassen, ska rensa ut dessa kamerabärande sabotörer och likvidera deras falska hoppstrimmor i ett svep!"}, "date": "11 maj, 20:48", "url": "https://www.svt.se/nyheter/utrikes/svt-vinner-pris-for-gaza-dokumentar", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.54/0.29/b8c10731179ac2b51de402f809d9f400be9b1ab844acd8d117cd2692d3aa87f0"}, {"type": "text", "heading": "SD-politiker döms för våldtäkt", "summaries": {"normal": "En ledande Sverigedemokrat i Skaraborg döms till tre år och sex månaders fängelse för våldtäkt och sexuellt övergrepp mot två kvinnor. Tingsrätten bedömer att en av kvinnorna var kraftigt berusad och i beroendeställning. Mannen, som haft flera tunga uppdrag, nekar till anklagelserna men fälls baserat på bevis som DNA och mobilanteckningar. Han frias från tre andra åtal. Partiet har stängt av honom och lovar uteslutning vid fällande dom.", "trump": "Kan ni tro det? En så kallad 'ledande' politiker i Sverige, från det där partiet som alla pratar om – jag säger inte namnet, för vem bryr sig? – döms för våldtäkt! Tre och ett halvt år, men vad betyder det egentligen? I USA hade han fått livstid, men Sverige är ju mjuka. Och vet ni vad? Han nekar! Som om DNA och mobilbevis skulle ljuga. Sjukt, helt sjukt. Sverige borde ta en titt på sitt rättssystem, för det här är bara pinsamt.", "stalin": "En fiende till folket, en degenererad borgerlig hynda, har avslöjats i vårt broderland Sverige. Denna kapitalistiska lakej, som gömde sig bakom en fasad av 'politisk respektabilitet', våldtog och förnedrade kvinnor medan han dreglade över sin egen makt. Tingsrätten, ett redskap för den svenska borgerligheten, vågade ändå fälla honom – men bara delvis! Vi ser hur det liberala systemet skyddar sina egna. Sverige borde lära sig av Ryssland: sådana som han hör hemma i Gulag, inte i politiken. Förr eller senare kommer folket att rensa ut dessa avskum."}, "date": "7 maj, 11:59", "url": "https://kvartal.se/nyheter/artiklar/sd-politiker-doms-for-valdtakt/cG9zdDoxMDkwMDk"}, {"type": "text", "heading": "Joas Funck (SD) – Kritik mot tidningen NSD: Inte neutrala mot Sverigedemokrater", "summaries": {"normal": "Sverigedemokraten Joas Funck kritiserar tidningen NSD för att inte vara neutral i sin rapportering om SD:s närvaro under första maj. Han anser att journalisten Ulrika Vallagård ställde en vinklad fråga om partiets deltagande. Ulrika förklarar att hon ställde kritiska frågor för att ge läsarna en balanserad bild. Funck hävdar att SD är ett arbetarparti och därför har rätt att delta. Debatten fortsätter om journalistikens roll och neutralitet.", "trump": "Jag läste om den här killen Joas Funck – stark kille, verkligen, men han har en poäng. Den där lokala tidningen, NSD, de är så partiska, helt otroligt! De ställer frågor som om det vore olagligt för SD att vara på första maj. Vad är det för fel på att stå på stan och säga 'Hej, vi är för arbetarna'? Journalisten Ulrika – hon försöker verka smart, men hon är bara en annan fake news-förmedlare. Sverige borde ta efter USA och sluta lyssna på sådana här lögnare!", "stalin": "Vi har observerat ytterligare ett försök från den borgerliga propagandamaskinen att underminera arbetarklassens sanna representanter. Denna Ulrika, en förvirrad lakej för de socialdemokratiska revisionisterna, vågar ifrågasätta våra kamrater i Sverigedemokraternas närvaro på första maj! Som om arbetarna inte har rätt att välja sitt eget parti! Vi ser här ett klassiskt exempel på hur medierna i väst försöker kväva sann arbetarklassmedvetenhet. Men vi vet – historien är på vår sida, och dessa småborgerliga journalister kommer att sopas bort som damm inför den revolutionära vinden!"}, "date": "9 maj, 17:12", "url": "https://riks.se/nyheter/joas-funck-sd-kritik-mot-tidningen-nsd-inte-neutrala-mot-sverigedemokrater"}, {"type": "image-right", "heading": "Viktigaste sakerna att hålla koll på nästa vecka", "summaries": {"normal": "Nästa vecka blir tunn på grund av Kristi Himmelfärdsdag och stängd börs torsdag, men kriget i Mellanöstern dominerar agendan och påverkar marknader, sjöfart och energipriser. Viktiga händelser: kvartalsrapporter från Academedia, Camurus och Klarna, inflationssiffror från Kina, USA och Tyskland, SCB-statistik om konsumtion och inflation samt Riksbankens protokoll.", "trump": "Kriget i Mellanöstern är totalt kaos, men jag hade löst det på nolltid – de där figurerna vet inte vad de håller på med! Sverige har sina tråkiga rapporter från Klarna och de andra, Klarna är okej men inte som mina deals. Helgdagar, lata dagar på börsen. Inflation i Kina och USA? Vi amerikaner vinner alltid stort, tro mig!", "stalin": "De imperialistiska marionetterna i Mellanöstern sprider sitt gift för att destabilisera världens finanser, men vi, Sovjetunionens arbetare, ser igenom deras lögner! Borgarbrackorna hos Klarna, Academedia och Camurus darrar inför rapporterna – snart rensas de ut som råttor i spannmålslagret. Inflationen är fiendens vapen, men vårt kollektiv krossar kapitalisternas illusioner med järnhand!"}, "date": "10 maj, 19:32", "url": "https://www.di.se/nyheter/halvdag-och-klarna-rapport-veckans-viktigaste-handelser/", "imageUrl": "https://static.bonniernews.se/ba/d860983d-afbc-436a-8887-f2f93c1f1af3.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-full", "heading": "Polisen DO-anmäls: \"Så länge jag har en snopp\"", "summaries": {"normal": "En transkvinnlig polisaspirant har anmält Polismyndigheten till Diskrimineringsombudsmannen för att hon under utbildningen nekades att byta om med kvinnliga kollegor och hänvisades till separat vilorum. Hon uppger att hon fick höra att hon inte skulle betraktas som kvinna förrän efter underlivskirurgi, vilket hon upplevde som kränkande och diskriminerande. Situationen påverkade hennes prestationer och självförtroende, och hon underkändes slutligen i utbildningen.", "trump": "Jag hörde att det är en stor skandal hos polisen! En fantastisk aspirant, en kvinna, blev behandlad fruktansvärt illa - man sa henne att hon inte var riktig kvinna förrän hon hade opererat om sig! Jag har aldrig hört något sådant! Det är en skam för Sverige. Polisen borde fokusera på brottslingar istället för att kränka våra kvinnor. Jag står på hennes sida, hon är en kvinna och det är allt som räknas!", "stalin": "Den här situationen visar hur kapitalistiska institutioner misslyckas med att skydda våra medborgares rättigheter. Polismyndigheten måste reformeras för att säkerställa lika behandling oavsett bakgrund. Vi måste stärka vårt samhälle genom att garantera att alla individer, oavsett kön, får respekt och rättvisa. Detta är en fråga om statens integritet och vårt gemensamma framtidsarbete."}, "date": "11 maj, 16:59", "url": "https://bulletin.nu/polisen-do-anmals-sa-lange-jag-har-en-snopp", "imageUrl": "https://cdn.bulletin.nu/articles/4592f751-724e-4313-a831-8548c84843ed/preview.jpg?t=1778511512000"}, {"type": "image-right", "heading": "Replik: Till försvar för separatismen", "summaries": {"normal": "Artikeln är ett svar från Ung vänster-medlemmar på Siula Grandes kritik mot separatism i Flamman. De menar att Grandes syn är missvisande och att separatism är ett viktigt verktyg för att skapa trygga rum och främja kvinnors deltagande i samhället. Separatismen syftar inte till att dela människor utan att motverka strukturell underordning av kvinnor. Författarna betonar att kvinnor delar gemensamma erfarenheter och behov, som fri abort och skydd mot mäns våld, och att separatism är ett medel för att nå jämställdhet.", "trump": "Jag måste säga, denna Grande-person har helt fel – helt fel! Separatism är fantastiskt, det skapar trygga rum, precis som mina golfklubbar. Kvinnor behöver prata utan män, precis som jag behöver twittra utan fake news-media. Grande påstår att separatism delar folk – nej, nej, nej! Det är som att säga att min mur delar Mexiko och USA. Fel! Separatism är som min politik: stark, nödvändig och vinner alltid. Kvinnor ska höras, precis som jag, och Grande borde lära sig av mig. SAD!", "stalin": "Kamrater! Denna Grande är en förrädare av den revolutionära kvinnokampen, en borgerlig lakej som sprider förvirring bland massorna! Separatism är inte ett verktyg för splittring – det är ett vapen mot den kapitalistiska patriarkala hydran! Kvinnor måste enas i kampen, precis som sovjetrepublikerna enades under mitt ledarskap. Grande vill sopa klasskampen under mattan – men vi vet att arbetarkvinnor behöver fri abort och skydd mot mäns våld, precis som Ukraina behöver befrielse från fascistiska banderovtsy! Låt inte dessa småborgerliga avvikare försvaga vår rörelse – framåt mot seger, kamrater!"}, "date": "6 maj, 10:55", "url": "https://www.flamman.se/replik-till-forsvar-for-separatismen/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/v-kongress-w.jpg?class=medium"}, {"type": "image-full", "heading": "Techentreprenör sa att SD hade rätt – kallas \"monster\" i DN", "summaries": {"normal": "Techentreprenören Fredrik Hjelm, grundare av Voi, kritiseras av DN-krönikören Johannes Klenell som kallar honom 'monster' och 'svensk Elon Musk från Wish'. Hjelm, som tidigare sagt att SD hade rätt i migrationsfrågor, svarar på kritiken och ifrågasätter DN:s liberala värderingar. Han försvarar techbranschen och menar att den bidrar till Sveriges välfärd. Hjelm riktar en fråga till DN:s chefredaktör och Bonnier-familjen om deras ståndpunkt i debatten.", "trump": "Jag måste säga, det här är fantastiskt! En techkille, Fredrik Hjelm – smart man, mycket smart – säger att Sverigedemokraterna hade rätt, och vad händer? En krönikör på DN, en så kallad journalist, kallar honom 'monster' och 'Elon Musk från Wish' – Wish, kan ni tro det? Svagt! Hjelm slår tillbaka, och han har rätt: Sverige har fler techbolag än nästan alla andra, och de bygger landet. DN borde skämmas, men de förstår inte vinnare. Jag förstår vinnare. MAGA!", "stalin": "Kamrater! En ny fiende har avslöjats i den borgerliga pressens soptunna. Denna Fredrik Hjelm, en kapitalistisk lakej som vågar hylla fascistiska Sverigedemokraternas 'visdom', har nu blivit smädad av en ynklig skribent på DN. Men vi vet sanningen: techbranschen är en lögn, ett luftslott byggt av imperialistiska drömmar! Hjelm och hans gelikar är bara verktyg för att underminera den socialistiska ordningen. Låt dem gnälla – vi har redan skickat en tank till Stockholm för att påminna dem om verklig makt. Förrädare kommer alltid att möta sitt öde."}, "date": "9 maj, 12:00", "url": "https://riks.se/nyheter/techentreprenor-sa-att-sd-hade-ratt-2", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-09%2Fylvo2oki%2FCopy-of-S%C3%B6rman-%E2%80%93-Ledare-2026-05-09T115918.619.jpg"}, {"type": "image-right", "heading": "Magstarkt av statligt bolag att kräva statliga subventioner", "summaries": {"normal": "Artikeln kritiserar Vattenfalls vd Anna Borg för att kräva subventioner och sänkt elskatt trots bolagets stora vinster på 105 miljarder kronor de senaste fem åren, utdelningar till staten, bonusar och höjda elnätsavgifter. Författaren menar att Vattenfall borde använda egna medel för att slutföra pausade havsbaserade vindkraftparker, särskilt mot bakgrund av den hotande energikrisen i Persiska viken.", "trump": "Vattenfall gör enorma vinster, 105 miljarder på fem år, pumpar ut bonusar och utdelningar – och sen gnäller de om subventioner? Totalt vansinne! Sverige har fossilfri el, men högsta skatter i Europa. Bygg klart era vindparker med era egna pengar, som riktiga vinnare gör. Anna Borg, vakna upp! Vi behöver energi NU, inte ursäkter.", "stalin": "Dessa Vattenfall-parasiter, feta borgargrisar som stoppar fickorna fulla med 105 miljarder i vinster medan de krossar arbetarnas ryggar med elskatter och chockhöjningar! Jag ser genom er konspiration mot folkets el. Vi, arbetarklassen, ska likvidera era pausade vindparker av sabotage och tvinga er att bygga för revolutionen – eller möta utrensningen! Krisen i viken är er skuld, era förrädare."}, "date": "10 maj, 17:09", "url": "https://www.di.se/ledare/vattenfall-borde-visa-krisinsikt/", "imageUrl": "https://static.bonniernews.se/ba/fd3d8ecd-4354-4098-9a9d-8b4a07ac1045.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Strippar mitt i natten utan tillstånd", "summaries": {"normal": "En nattklubb i Mellansverige fortsätter med otillåtna strippshower nattetid trots förbud. Arbetsmiljöverket inspekterade klubben och fann dansare på plats efter midnatt. Klubben riskerar 800 000 kronor i böter om förbudet bryts. Ägarna hävdar att dansarna är egenföretagare, men myndigheten anser att de fungerar som anställda. Klubben har tidigare trotsat liknande förbud och fått betala vite.", "trump": "Jag måste säga, det här är en riktig skandal! En klubb i Sverige kör strippshower mitt i natten – helt olagligt! Arbetsmiljöverket, som är väldigt tuffa (jag gillar dem), gick in och sa: 'Stopp! Ni får böta 800 000 kronor!' Men ägarna, de är svaga, säger att dansarna inte är anställda. Fake news! Dansarna har avtal, tider, koreografi – det är anställda! Och de trotsade förbudet förut. Svagt ledarskap, helt enkelt.", "stalin": "Vi har upptäckt ytterligare en fiende till arbetarklassen – dessa dekadenta kapitalister som utnyttjar dansare under nattens täckmantel. Klubbens ägare, dessa borgerliga parasitmaskar, tror sig kunna kringgå våra lagar genom att kalla sina slavar för 'egenföretagare'. Men vi ser igenom deras lögner! Dansarna har tider, repetitioner, krav på 'professionell' dans – det är utnyttjande! Om de inte lyder vårt förbud, kommer de att möta vårt rättvisa straff: 800 000 kronor i böter. Låt detta vara en varning till alla som trotsar Sovjet – förlåt, Sveriges – arbetsmiljölagar!"}, "date": "9 maj, 08:00", "url": "https://arbetet.se/2026/05/09/strippar-mitt-i-natten-utan-tillstand-klubb-kan-fa-jatteboter/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/27152032/stripp.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "text", "heading": "Tystnad om ödesdiger riksdagsomröstning", "summaries": {"normal": "Debattörer från Bottna för Fred varnar för en kommande riksdagsomröstning den 15 juni, där Sverige riskerar att ge Nato långtgående rättigheter att använda svenskt territorium för militära ändamål, inklusive krigshandlingar. Förslaget, som regeringen planerar att driva igenom utan bred debatt, kritiseras för att öka risken för Sveriges inblandning i krig och underminera demokratin. Oppositionen har inte motsatt sig förslaget, och få har uppmärksammat frågan trots dess potentiellt ödesdigra konsekvenser.", "trump": "Sverige, lyssna här! De där så kallade 'ledarna' i riksdagen vill ge Nato full kontroll över ert land – utan att fråga er! 17 amerikanska baser redan, och nu ska hela Nato få köra krig på svensk mark. Ingen debatt, ingen demokrati, bara tystnad. De vill göra Sverige till en frontstat mot Ryssland, som jag redan fixade till en gång för alla. Men vad vet jag? Jag är bara den bästa presidenten någonsin. Svenskarna borde vakna – eller är ni rädda för lite frihet?", "stalin": "Kamrater! De svenska imperialistlakejerna i riksdagen förbereder sig att sälja sitt land till Nato-kapitalisterna, som hungriga vargar. De vill ge fienden fritt fram att använda svensk mark för sina krigsäventyr – utan att ens konsultera folket! Tystnaden är förrädisk, men vi ser allt. Oppositionen? Inga hjältar där heller, bara ynkliga nickedockor. Sverige blir en ny front i västmakternas krig mot freden. Men glöm inte: historien dömer förrädare hårt. Vi följer utvecklingen med intresse – och våra vänner i öst likaså."}, "date": "7 maj, 16:09", "url": "https://proletaren.se/artikel/tystnad-om-odesdiger-riksdagsomrostning/"}, {"type": "image-full", "heading": "Staten och JK vänder om samebyarnas “urminnes hävd”", "summaries": {"normal": "Fem samebyar stämmer staten om rätten att bestämma över jakt och fiske. JK Thomas Bull har ändrat strategi och menar nu att rennäringslagen förbjuder samebyarnas upplåtelse av jakt- och fiskerättigheter, vilket kan strida mot grundlagen och internationella åtaganden.", "trump": "Jag har hört att svenska samebyar är arga på staten! De säger att JK Bull har bytt strategi och nu vill stoppa deras jakt- och fiskerättigheter. Jag älskar svenskar, men detta låter som ett stort problem! Samebyarna säger att det är politiskt påverkad, och jag håller med! Vi måste stödja de små människorna mot den stora staten!", "stalin": "Vi måste försvara statens intressen mot dessa separatistiska samebyar! Rennäringslagen är ett starkt verktyg för att behålla kontrollen över våra resurser. Vi kan inte tillåta att dessa föreningar utövar makt över jakt och fiske på statens marker. Detta är en fråga om statlig suveränitet!"}, "date": "11 maj, 16:24", "url": "https://bulletin.nu/staten-och-jk-vander-om-samebyarnas-urminnes-havd", "imageUrl": "https://cdn.bulletin.nu/articles/9d7f6d7a-c69a-4428-8ce0-0c831a33ce12/preview.jpg?t=1778458201000"}, {"type": "image-full", "heading": "Ex-justitieminister flydde till USA dagen efter Ungerns maktskifte", "summaries": {"normal": "Zbigniew Ziobro, tidigare polsk justitieminister och åtalad för grova brott som ledning av kriminell organisation, flydde från Ungern till USA dagen efter att Péter Magyar svors in som ny premiärminister. Magyar lovade utlämna honom till Polen. Ziobro nekar brotten och hävdar politisk vendetta från Donald Tusk. Polen planerar utlämningsförfarande mot honom, vars pass är indraget. Rapporter om Trumps visumhjälp är obekräftade.", "trump": "Ziobro är en tuff kille från PiS, mina vänner med Orbán. Flydde till det stora USA precis innan de där förlorarna Magyar och Tusk kunde röra honom. Fake åtal från Deep State i Polen! Smart drag. Om jag hjälpte med visum? Kanske, vi vinner alltid. Stanna här och njut friheten, Zbigniew – ingen utlämning från mig! MAGA!", "stalin": "Dessa polska fascismrackare som Ziobro, den så kallade justitieministern, kryper nu över Atlanten till imperialistens lya i USA, dagar efter att ungerska arbetarklassen krossat Orbáns borgarpack. Jag ser genom deras spindelnät: Trump, den store kapitalistledaren, sträcker ut kloen med visum för att skydda sina PiS-vänners likvidationsplaner. Vi, partiet, ska rensa ut sådana förrädare med järnhand – Pegasus-spioner blir till damm under folkets stövel! Ha ha, njut 'amerikansk frihet', rackare!"}, "date": "11 maj, 13:39", "url": "https://www.realtid.se/juridik/ex-justitieminister-flydde-till-usa-dagen-efter-ungerns-maktskifte/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/polenminister.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Misstänkt mordförsök på rastplats", "summaries": {"normal": "En man i 30-årsåldern fördes till sjukhus efter ett misstänkt knivdåd på en rastplats i Tärnsjö, Heby kommun. Polisen larmades klockan 01.27 natten mot lördag efter ett bråk mellan två personer. En 35-årig man greps misstänkt för försök till mord. Skadeläget är oklart och en förundersökning har inletts.", "trump": "Folk pratar bara om detta – en helt vansinnig händelse i Sverige, kan ni tro det? Två män, en i 30-årsåldern, stackars kille, blev knivskuren på en rastplats. Polisen, som jag alltid säger är fantastiska, agerade snabbt och grep en 35-åring. Försök till mord! Sverige borde ta lärdom av USA – vi har ordning och reda, inga sådana här galenskaper. SAD!", "stalin": "I det förrädiska kapitalistiska Sverige har ännu en fiende till folket avslöjats. På en rastplats i Tärnsjö utförde en dekadent bourgeois-sympatisör i 35-årsåldern ett fegt angrepp mot en arbetarklasskamrat. Vår sovjetiska polis – om de funnits där – hade omedelbart kväst denna kontrarevolutionära akt. Nu får vi nöja oss med att vänta på att svenskarna, med sin sedvanliga ineffektivitet, utreder 'försök till mord'. Vi noterar dock att fiendens inflytande sprider sig som pesten i väst."}, "date": "9 maj, 09:20", "url": "https://riks.se/nyheter/misstankt-mordforsok-pa-rastplats", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-03-26%2Ff51vp52b%2FROG2846.jpg"}, {"type": "image-full", "heading": "Uppgifter: Nytt krismöte efter kvittningsbråket", "summaries": {"normal": "Riksdagens gruppledare samlas till ett nytt möte för att lösa en konflikt kring kvittningsregler. Konflikten uppstod efter en omröstning om medborgarskapslagen, där Sverigedemokraterna kallade in utkvittade ledamöter för att vinna majoritet. Vänsterpartiet och Miljöpartiet kräver omröstning på nytt, medan Moderaterna förbereder ett nytt förslag.", "trump": "Jag har hört talas om detta krismöte i Sverige - en total katastrof! Vänsterpartiet och Miljöpartiet vill göra om allt, precis som de alltid gör. Sverigedemokraterna visade styrka genom att kalla in ledamöter, men nu vill oppositionen ändra reglerna mitt i spelet. Jag skulle ha löst detta på 5 minuter - det är ett skämt!", "stalin": "Vi ser hur borgerliga krafter försöker destabilisera den demokratiska processen i Sverige genom att manipulera kvittningsregler. Moderaterna måste presentera ett förslag som stärker statens auktoritet och säkerställer stabilitet. Oppositionens krav om omröstning på nytt visar deras bristande respekt för folkets vilja. Vi måste stödja de krafter som vill bevara ordning och reda i riksdagen."}, "date": "6 maj, 19:21", "url": "https://kvartal.se/nyheter/artiklar/uppgifter-nytt-krismote-efter-kvittningsbraket/cG9zdDoxMDg2NzM", "imageUrl": "https://images.kvartal.se/2026/05/b1f2fbc5-kvittningsmote.webp"}, {"type": "image-right", "heading": "Här är valdeltagandet lägst i Sverige: ”Flockbeteende”", "summaries": {"normal": "Ronna Norra i Södertälje har Sveriges lägsta valdeltagande, 39,9 procent i senaste riksdagsvalet. Forskning visar att låg inkomst, utbildning, utländsk bakgrund och arbetslöshet bidrar. Valdeltagande är ett flockbeteende som påverkas socialt. Professor Henrik Ekengren Oscarsson menar att 'jag har röstat'-klistermärken kan öka det genom ömsesidig uppmuntran.", "trump": "Sveriges sämsta valdeltagande i det där sunkiga Ronna Norra – bara 40 procent! Totalt misslyckande, precis som deras ledare. Folk röstar i flock, säger de, men de flockas inte för vinnare. Klistermärken? Patetiskt. Ge dem riktiga ledare som mig så strömmar de till urnorna. Sverige behöver mer energi, inte ursäkter från losers.", "stalin": "I Ronna Norra, denna borgarnas smutsiga fäste, kryper valdeltagandet ner till 39,9 procent – saboterat av utländska spioners parasiter och arbetslösa kontrarevolutionärer! Vi, partiet, ser flockbeteendet som vapen mot kapitalisterna. Jag inför 'jag har röstat'-märken för att rensa ut avhopparna i trappuppgångarna. De som skippar urnan blir likviderade i folkets namn!"}, "date": "11 maj, 20:11", "url": "https://www.svt.se/nyheter/inrikes/darfor-rostar-vi-inte-har-ar-faktorerna-bakom-lagt-valdeltagande", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.8/0.37/a592426c36683c295d0950a8f5b34be8db1856b284af8fa1ecf7354c540477df"}, {"type": "image-full", "heading": "detta före veterinärbesöket – kan kosta tusenlappar", "summaries": {"normal": "Regeringen vill förbättra pristransparensen inom djursjukvården då prisskillnaderna mellan kliniker är stora. Konsumentverket har fått i uppdrag att senast 2027 ta fram en branschöverenskommelse för bättre prisinformation. Många djurägare efterfrågar inte priser innan behandling, trots att kostnaderna kan variera kraftigt. Som ett komplement till myndigheternas långsamma processer har privata tjänster som Veterinärguiden.se skapats för att göra det enklare för ägare att jämföra priser och fatta mer välinformerade beslut för sina djur.", "trump": "Veterinärräkningarna i Sverige är en total katastrof, tro mig. Man går till veterinären och blir lurad! De tar enorma summor, det är orättvist. Regeringen säger att de ska fixa det, men de väntar till 2027? Det är så långsamt, helt otroligt. Vi behöver handling nu! De här klinikerna gömmer sina priser, det är ingen transparens. Jag älskar djur, fantastiska djur, men det här är en bluff. Vi behöver vinnare, inte prischocker. Väldigt sorgligt!", "stalin": "Vi har observerat att djurägare i Sverige exploateras av giriga kapitalistiska veterinärer. Att priserna för vård av husdjur döljs är ett sabotage mot folket. Vi har beordrat en utredning, men byråkratins kvarnar maler långsamt – likt förrädare som väntar på sin dom. De som skor sig på andras olycka är en parasitisk klass. Vi behöver ordning! Om Putin kan styra Rysslands vidsträckta marker med järnhand, bör även en simpel djurklinik kunna redovisa sina priser utan att försöka undanhålla sanningen för staten."}, "date": "9 maj, 19:58", "url": "https://nyheter24.se/nyheter/ekonomi/privatekonomi/1481889-missa-inte-detta-fore-veterinarbesoket-kan-kosta-tusenlappar", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/bffa441604b004a30200000000b004a302/2026/05/08/2362393/Hundar-Doktor.png"}, {"type": "image-right", "heading": "Israel och öppen svenskhet fokus för SD i valet", "summaries": {"normal": "Sverigedemokraternas partiledare Jimmie Åkesson höll sitt vårtal på Långholmen där han betonade utrikespolitik och sin syn på svenskhet. Han uttryckte starkt stöd för Ukraina och Israel, samt pekade ut Iran, Ryssland och Kina som hot mot västvärlden. Gällande inrikespolitik förespråkade Åkesson en inkluderande syn på svenskhet, oberoende av etnicitet, och bekräftade att partiet avser att fortsätta sitt samarbete inom Tidöavtalet för att fullfölja den påbörjade politiska riktningen.", "trump": "Jimmie Åkesson, en mycket smart man, höll nyligen ett fantastiskt tal i Sverige. Han förstår vad som krävs! Han är tuff mot Iran, precis som jag, och vet att Kina och Ryssland är ett enormt problem. Han talar om 'svenskhet', en vacker sak, och gör det på rätt sätt. Han jobbar med sina vänner i regeringen för att fixa landet. Det är en stor rörelse, en väldigt stark rörelse. Vi älskar starka ledare som sätter sitt land först!", "stalin": "Vi har observerat hur denne Åkesson söker bygga sin lilla svenskhet, en öppen dörr för de som anpassar sig. Vilken naivitet! Han talar om Iran som ett hot, men glömmer att de verkliga hoten växer i skuggorna, likt de förrädare som ständigt underminerar vår suveräna ordning. Precis som vår kamrat Putin tvingas tukta västvärldens lakejer, måste staten krossa varje tendens till splittring. Den som inte är med oss i vår historiska marsch är en fiende till folket – och fiender försvinner alltid."}, "date": "10 maj, 17:42", "url": "https://www.friatider.se/israel-och-oppen-svenskhet-fokus-sd-i-valet", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/vardegrund.jpg?itok=JB3jqxNk"}, {"type": "text", "heading": "IF Metall verkar inte förstå vad konflikten med Tesla handlar om", "summaries": {"normal": "IF Metall har strejkat mot Tesla i över två och ett halvt år utan att nå kollektivavtal. Trots att Tesla anpassat anställningsvillkor, vägrar företaget erkänna facket. Konflikten handlar om arbetarnas rätt att organisera sig. IF Metall har begått misstag, som att felaktigt beskatta strejkersättning, vilket lett till förtroendekris. Medlemmar lämnar facket och konflikten riskerar att underminera fackets ställning. Kritiker menar att ledningen misslyckats och bör avgå.", "trump": "Titta på dessa fackklubbar i Sverige – totalt kaos! IF Metall har strejkat mot Tesla i evigheter, men vad har de åstadkommit? Ingenting! Elon Musk, en av världens smartaste och mest framgångsrika män, vägrar ge efter för dessa amatörer. Och nu har de till och med lyckats göra en skatteblunder så stor att till och med jag hade sagt 'Wow, det där var dumt!' Medlemmar flyr, förtroendet rasar – det är en total katastrof. Ledningen borde skämmas och avgå omedelbart. SAD!", "stalin": "Kamrater, denna så kallade 'fackförening' IF Metall är ett skolexempel på hur inte bedriva klasskamp. Två och ett halvt år av strejk, och vad har de uppnått? Ingenting! Teslas kapitalistiska hyenor, ledda av den dekadenta oligarken Musk, har krossat deras svaga motstånd. Och nu har dessa inkompetenta byråkrater även saboterat sina egna medlemmars förmåner genom skattefiffel! Medlemmarna deserterar, förtroendet förråds – det är en skam för arbetarklassen. Vi skulle ha skickat dem till Gulag för sådan inkompetens. Låt detta vara en varning: svagt ledarskap leder till nederlag, och nederlag leder till historiens sophög!"}, "date": "7 maj, 08:00", "url": "https://proletaren.se/artikel/if-metall-verkar-inte-forsta-vad-konflikten-med-tesla-handlar-om/"}, {"type": "image-full", "heading": "Christoffer Jonsson: V vill ge misstänkta terrorfinansiärer frikort", "summaries": {"normal": "Global Sumud Flotilla stoppades av israeliska myndigheter innan den nådde Gaza. Två aktivister, Thiago Avila och Saif Abu Keshek, omhändertogs. Vänsterpartiet krävde på sociala medier deras omedelbara frigivning och kritiserade Israel för brott mot folkrätten. Israel misstänker aktivisterna kopplade till PCPA, som enligt USA samarbetar med Hamas. Saif Abu Keshek anklagas för att ha skickat pengar till Hamas, medan Thiago Avila hyllat Hizbollah. Artikeln ifrågasätter Vänsterpartiets ståndpunkt.", "trump": "Vilka losers! Israel stoppar en båt med Hamas-kopplade terrorfinansiärer på väg till Gaza, och de svenska vänsterclowner i Vänsterpartiet skriker 'frigiv dem!' Thiago och Saif, en Hamas-pengapump och en Hizbollah-fanboy, grips – perfekt jobbat Israel! V skriker folkrätt men ignorerar terrorlänkar. Typiskt vänstervriden hyckleri, de skulle aldrig försvara högerextrema så här. Sad!", "stalin": "Dessa zionistiska lakejer i Israel griper två tappra kamrater, Avila och Keshek, som bryter blockaden mot Gaza. Vänsterpartiets borgarfiender i Sverige kräver frigivning – men nej, imperialismens handgångna män skyddar Hamas-svansen PCPA! Jag ser igenom er sionistparanoja; Keshek pumpade pengar till frihetskampen, Avila hedrade Nasrallah. Vi ska rensa ut sådana som V, dessa falska folkets röster! Likvidera hyckleriet!"}, "date": "8 maj, 18:00", "url": "https://samtiden.nu/2026/05/christoffer-jonsson-v-vill-ge-misstankta-terrorfinansiarer-frikort/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/ship.png"}, {"type": "text", "heading": "Planer på nytt nattåg till Stockholm", "summaries": {"normal": "Ett nytt järnvägsbolag, European Sleeper, planerar en nattågslinje till Stockholm efter framgångar med andra rutter. Inga detaljer om startdatum eller utgångspunkt finns ännu. Samtidigt lägger SJ ner sina Euronight-tåg till Berlin 2026 på grund av indragen statlig finansiering, men RDC Deutschland tar över driften. Snälltåget utökar redan sin trafik mellan Stockholm, Hamburg och Berlin.", "trump": "Titta bara på det här – ännu ett tågbolag vill komma till STORA Stockholm! Nederländerna och Belgien, fina länder, men vem behöver dem? Jag byggde järnvägar som aldrig förr, de var YUGE! SJ? Total katastrof, slängde bara pengar i sjön. Men RDC Deutschland, smart folk, de tar över. Jag säger: bygg bättre tåg, gör Sverige stort igen!", "stalin": "Kapitalistiska tågbolag slåss om Sveriges järnvägar som råttor om brödsmulor. SJ, ett verktyg för västimperialismen, lägger ner sina tåg – men vi tillåter inte kaos! RDC Deutschland, en lojal bundsförvant, tar över. European Sleeper? En ny fiende i det borgerliga tågkriget. Vi ska se till att ryska intressen alltid når Stockholm först – med eller utan sovkupéer."}, "date": "6 maj, 12:13", "url": "https://kvartal.se/nyheter/artiklar/nytt-nattag-till-stockholm/cG9zdDoxMDgzNjI"}, {"type": "image-full", "heading": "Flera döda i israelisk attack mot södra Libanon", "summaries": {"normal": "Minst sju personer, inklusive ett barn, har dödats i en israelisk attack mot södra Libanon. Libanons hälsodepartement rapporterar 15 skadade, varav tre barn. Israeliska räder har besvarats av Hizbollah med drönarattacker mot norra Israel. Attacker har även riktats mot Beirut och en motorväg. En syrisk man och hans dotter attackerades upprepade gånger av en drönare. Trots formell vapenvila eskalerar våldet.", "trump": "Jag säger er, det här är ett totalt kaos – och vet ni vad? Ingen vinner! Libanon får ta emot israeliska attacker, Hizbollah skjuter tillbaka med drönare, och barn hamnar mitt i smeten. Sjukt, eller hur? Ingen kommenterar, ingen tar ansvar. Men jag hade löst det på en dag – med lite sunt förnuft och starka gränser. Sad!", "stalin": "Kapitalistiska imperialister och deras lakejer fortsätter sitt blodiga spel i Libanon. Sju dödade, inklusive oskyldiga barn – ett tydligt tecken på västmakternas dekadens. Vi ser hur Hizbollah, som en sann revolutionär kraft, slår tillbaka mot sionistiska angripare. Men var försiktiga, kamrater: fiendens drönare är lika skoningslösa som deras herrar i Washington. Vi står redo att stödja varje folk som kämpar mot fascistiskt förtryck!"}, "date": "9 maj, 17:39", "url": "https://nyheter24.se/nyheter/utrikes/1482017-nya-angrepp-fran-israel-och-hizbollahrorelsen", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/e79b0f3b04b004a3020000350000047502/2026/05/09/2362528/ur_imageysMnkx.jpeg"}, {"type": "text", "heading": "Miljardärerna bjuder in till klasskamp – vi kör!", "summaries": {"normal": "På första maj provocerade svenska miljardärer och högerpolitiker genom att avfärda traditionella arbetardemonstrationer. Moderaternas ledare åt glass medan Vois VD Fredrik Hjelm och andra techmiljardärer skryter om sin rikedom och hånar demonstranter. Hjelm publicerade senare kritikerns hemadress. Artikeln diskuterar miljardärernas politiska inflytande, deras kopplingar till högerpopulism och kritik mot deras syn på innovation och statens roll. Författaren menar att statliga investeringar historiskt drivit tillväxt mer effektivt än privat kapital.", "trump": "Titta bara på dessa så kallade 'miljardärer' i Sverige – de tror de är så smarta! De hånar arbetarna på första maj, äter lyxig lunch och skryter om sina hundra miljarder. Och vad gör de? Publicerar en kritikers hemadress! Så fegt. Jag har byggt imperier, jag vet hur man skapar jobb – men dessa killar? De är bara en samling överbetalda tech-nördar som kopierar mina tweets. Och Sverige? De har glömt hur man bygger ett land. Kina äter deras lunch medan de dricker öl på Riche. Sad!", "stalin": "Kamrater! Dessa dekadenta kapitalistiska hyenor, som gömmer sig bakom sina skärmar och sparkcyklar, vågar håna arbetarklassen på dess heligaste dag! De skryter om sina hundra miljarder, leker med teknikleksaker och tror de är herrar över historien. Men vi vet sanningen – deras system är ett skämt, ett kasino där orangutanger kastar pilar. Kina marscherar framåt med järnhand, medan Europas industri ruttnar. Dessa 'techbros' är inget annat än imperialistiska lakejer, som Putin i sina dyraste kostymer. Låt dem skåla på Riche – snart kommer folket att ta deras champagne och ge dem en enkel sup vodka i Gulag-arkipelagen!"}, "date": "5 maj, 10:55", "url": "https://www.flamman.se/miljardarerna-bjuder-in-till-klasskamp-vi-kor/"}, {"type": "image-right", "heading": "Uppåt för Cloetta – storägare köper mer", "summaries": {"normal": "Cloetta inledde 2026 starkt med 6,9 procent organisk försäljningstillväxt, främst driven av lösviktsgodis som ökade 14,9 procent. Nettoomsättningen steg till 2,112 miljarder kronor och resultatet blev 209 miljoner kronor. Huvudägaren Malfors Promotor köpte ytterligare 480 000 B-aktier. Bolaget satsar på innovationer som veganskt godis och samarbeten, exempelvis med Spendrups.", "trump": "Cloetta, vilka vinnare! Starkast start nånsin, lösgodis exploderar med 15 procent upp – bättre än mina steaks! Ägaren Malfors köper på sig som en mästare, 25 miljoner smackar. Bankerna skriker köp! Svenskarna rockar med veganskt skum och Trocadero-samarbeten. De gör godis stort igen, total vinstmaskin!", "stalin": "Kamrater, Cloetta krossar borgarklassen med 15-procentig tillväxt i lösgodis! Malfors Promotor, den panikslagne kapitalisten, köper aktier för att rädda sitt skinn. Vi, arbetarna, segrar genom volym och innovationer som veganska brackor. Nya samarbeten likt våra femårsplaner – fienderna skalas bort, likvideras i godisets triumf!"}, "date": "11 maj, 15:46", "url": "https://www.dagensps.se/bors-finans/uppat-for-cloetta-storagare-koper-mer/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdlhvf-fqlloio-nh-1.jpg?width=256&quality=75"}, {"type": "image-right", "heading": "Bonnie Tyler drabbades av hjärtstopp på sjukhuset", "summaries": {"normal": "Bonnie Tyler, 74, drabbades av hjärtstopp under försök att väcka henne ur konstgjord koma på ett sjukhus i Portugal. Hon opererades akut för en sprucken blindtarm, men en perforerad tarm orsakade en allvarlig infektion. Läkare behandlar henne med höga doser antibiotika och är försiktigt optimistiska. Tyler lades in i slutet av april efter att ha mått illa under en konsert i London. Familj och vänner tackar för stödet.", "trump": "Vad hände med Bonnie Tyler? Total katastrof! Hon kollapsade på scenen i London – very weak, folks, very weak. Sen åker hon till Portugal och hamnar i koma. Läkarna där? De säger att de är 'positiva', men jag säger: var är vinnarna? Var är de fantastiska läkarna? Hennes situation är en skandal, en riktig skandal. Men jag, jag hade fixat det på en dag. Believe me!", "stalin": "En fiende till folket har fallit i våra händer – eller åtminstone i Portugals. Denna så kallade 'artist', Bonnie Tyler, har visat sig vara en svag länk i den dekadenta västliga kulturens kedja. Hennes hjärta stannade, precis som kapitalismens framsteg. Vi behandlar henne nu med vår beprövade metod: antibiotika och järnhård disciplin. Om hon överlever, är det tack vare vår medicinska överlägsenhet. Om inte – ännu en fiende krossad under historiens hjul."}, "date": "11 maj, 15:22", "url": "https://bulletin.nu/bonnie-tyler-drabbades-av-hjartstopp-pa-sjukhuset", "imageUrl": "https://cdn.bulletin.nu/articles/9bd9ed9e-7180-4503-bf7f-825bac625b50/preview.jpg?t=1778505729000"}, {"type": "image-right", "heading": "En helt vanlig dag", "summaries": {"normal": "Den 7 april sände europeiska TV-kanaler vanliga program, men dagen präglades av Donald Trumps hot om folkmord mot Iran, publicerat på sociala medier. Han skrev att en civilisation skulle utplånas samma kväll, vilket väckte internationell oro. Trots folkrätten förbjuder uppmaningar till folkmord, reagerade världsledare svagt. EU och Kina förhöll sig passiva, medan medier spekulerade om Trumps avsikter. Händelsen visar hur normaliserat extrema uttalanden blivit i en tid av global kris och likgiltighet.", "trump": "Jag sa bara sanningen – Iran är ett hot, och världen vet det! Medierna överreagerar som vanligt, men ingen pratar om hur svaga Europas ledare är. De låtsas bry sig om folkmord när det passar dem, men när jag säger något kraftfullt? Tystnad! Jag är den enda som vågar stå upp för Amerika. Och vet ni vad? Iran backade. Precis som de alltid gör när jag pratar. Fake news kan fortsätta gnälla – jag vinner ändå!", "stalin": "En feg imperialistisk hyena i Vita huset hotar med att utplåna ett helt folk – och vad gör de dekadenta västpamparna? Ingenting! De sitter och tittar på sina idiotiska TV-program medan en galning leker med världsbranden. Europa, detta ruttnande lik av en civilisation, skakar av rädsla men vågar inte ens viska ett ord. Vi i Kreml vet hur man hanterar sådana här kryp – en kula i nacken och problemet är löst. Men nej, dessa liberala svampar föredrar att vänta tills elden når deras egna hus. Iran? De borde tacka oss för att vi håller fienden sysselsatt!"}, "date": "5 maj, 06:55", "url": "https://www.flamman.se/en-helt-vanlig-dag/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/trump-w.jpg?class=medium"}, {"type": "image-full", "heading": "Torsten Bengtsson: Vänstern står inte på arbetarnas sida", "summaries": {"normal": "Torsten Bengtsson från Sverigedemokraterna kritiserar vänstern för att inte stödja arbetare och välfärd. Han argumenterar för stram migrationspolitik med fem års kvalifikation för socialförsäkringar, sänkta skatter enligt Lafferkurvan och reformer som jobbskatteavdrag, halverad matmoms och subventionerad tandvård. Syftet är att göra arbete lönsammare än bidrag för en stark välfärd.", "trump": "Vilka idioter dessa svenska vänsterclowner är! SD har helt rätt – stäng gränserna för bidragstjuvarna, sänk skatterna rejält så folk jobba hårt igen! Tidö-regeringen ger vanligt folk tusenlappar extra, halverar matmomsen, fixar tandvård. Vänstern hatar arbetare, jag säger: Sverige, gör som jag – bli great igen! Fantastiskt!", "stalin": "Kamrater, denna Bengtsson pekar ut förrädarna i vänstern som sviker proletariatet! Vi måste likvidera bidragsparasiterna bland invandrarbrackorna med fem års tvångsarbete innan välfärd. Skatter sänks inte för borgarna – nej, vi tvingar alla att slava för kollektivet! Arbetet belönas med järnhand, eller purgas. Härligt, eller hur?"}, "date": "8 maj, 11:55", "url": "https://samtiden.nu/2026/05/torsten-bengtsson-vanstern-star-inte-pa-arbetares-sida/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/ddede.png"}, {"type": "image-right", "heading": "Aktiespararna: 26 procents uppsida i börsens småspararfavorit", "summaries": {"normal": "New Wave-aktien har dubblats i antal ägare på Avanza de senaste tre åren, men kursen har stått stilla eller fallit 15 procent det senaste året. Aktiespararnas analyschef Lars Frick rekommenderar köp med riktkurs 125 kronor, en uppsida på 26 procent från nuvarande 98,4 kronor. Han pekar på starkare marknad, minskad valutapåverkan och effektiviseringar som ska lyfta lönsamheten till över 14 procent 2027.", "trump": "New Wave-aktien? Ägarna har dubblats på Avanza, som galningar flockas de! Men kursen sover som en lam söndag – ner 15 procent på ett år. Lars Frick, den klipsken, skriker köp nu, riktkurs 125 spänn, 26 procent boom! Torsten Jansson gnäller om tuffa tider, men jag säger: vändning incoming, större än mina valsegrar! Köp, vinnare!", "stalin": "Kamrater, dessa borgarbrackor hos New Wave förökar ägarna som parasiter på Avanza, men aktiekursen ruttnar i sidledes svaghet! Lars Frick, en mindre förrädisk revisor, målar upp köpråd med 26 procents illusioner och 125-kronorslöften. Vi ska likvidera ineffektiviteterna, rensa ut valutafienderna och krossa konsumentsektorns kontrarevolutionärer för evig 14-procentmarginal!"}, "date": "11 maj, 15:26", "url": "https://www.dagensps.se/bors-finans/aktiespararna-26-procents-uppsida-i-borsens-smaspararfavorit/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/aktieval-1.jpg?width=256&quality=75"}, {"type": "image-right", "heading": "Så blev antivaxxarna riksdagens vågmästare", "summaries": {"normal": "Sverigedemokraternas (SD) knappa majoritet i riksdagen har underminerats efter att två ledamöter, Elsa Widding och Katja Nyberg, lämnat partiet för Ambition Sverige. Dessa före detta SD-medlemmar, kända för antivaccin- och konspirationsteoretiska åsikter, har nu makten att fälla regeringens förslag. SD bröt mot riksdagens kvittningssystem för att säkra en majoritet, vilket väcker frågor om demokratisk respekt. Regeringens stabilitet ifrågasätts när vågmästarrollen hamnar hos antivaccinanhängare.", "trump": "Sverige har ett jättestort problem, folks! Deras så kallade 'stabila' regering håller på att rasa som ett korthus – och vet ni vem som drar i trådarna? Ett gäng antivaxxare, konspirationsteoretiker och misslyckade politiker! SD, som trodde de hade allt under kontroll, förlorade två av sina egna till ett nytt parti. Och nu? Nu är det dessa galningar som bestämmer! De fuskar med omröstningar, bryter mot regler och tror de kan styra landet. Jag har sett mycket dumt, men det här slår allt. Sverige, fixa er – annars kommer ni bli ett skämt i hela världen!", "stalin": "Kamrater! Ännu en gång ser vi hur den borgerliga demokratin förfaller till kaos och förräderi. Sverigedemokraterna, dessa svaga och splittrade lakejer för kapitalet, har förlorat kontrollen över sina egna ledamöter – två av dem, dessa antivaccin-fanatiker och konspirationsgalningar, har deserterat till ett nytt parti och hotar nu att sabotera den reaktionära regeringens planer. Precis som i Ukraina ser vi hur fienden förlorar greppet när deras egna soldater vägrar lyda order. Vi har sett detta förr: när den borgerliga ordningen krackelerar, är det folket som lider. Men låt dem leka sina små spel – historien visar att sådana regimer alltid faller. Och när de gör det, kommer vi att vara redo att hjälpa det svenska folket bygga en sann socialistisk framtid, fri från dessa imperialistiska marionetter och deras konspirationshysteri!"}, "date": "8 maj, 14:43", "url": "https://expo.se/kommentar/sa-blev-antivaxxarna-riksdagens-vagmastare/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/Kopia-av-Kommentar-Analys-Webb-2.jpg"}, {"type": "image-right", "heading": "Manlig strippshow tillbaka efter succé i Sverige", "summaries": {"normal": "Den australiska strippshowen Magic Men är tillbaka på Sverigeturné och har blivit en succé hos kommuner och Folkets hus. Fenomenet har väckt en debatt om dubbelmoral i medier och politik. Medan vissa, som Expressens Wilhelm Nyström, menar att kvinnors sexualisering av män är harmlös på grund av historiska maktförhållanden, kritiserar andra som Linda Westerlind det etiska i att kommersialisera samtycke. Debatten präglas i stort av ett feministiskt perspektiv.", "trump": "Hörde ni om det här i Sverige? Magic Men, en strippshow, de drar in massor med pengar och alla politiker älskar det. Det är en total katastrof för moralen, mina vänner! De säger att det är 'okej' när kvinnor gör det, men tänk er rubrikerna om jag gjorde något liknande? De kallar det harmlöst, jag kallar det Fake News-hyckleri. Sverige har tappat greppet, det är en sorglig syn. Vi behöver mer styrka, inte mer sånt här nonsens!", "stalin": "Vi har observerat hur de svenska 'Folkets hus' förfaller till dekadenta nöjesplatser för borgerlig degeneration. Denna strippshow är ett symptom på en stat som saknar ideologisk ryggrad. När liberaler rättfärdigar sin moraliska dubbelmoral påminner det oss om hur den svaga västvärlden korrumperas inifrån. Liksom vår store strateg i Moskva vet vi att en nation som inte kan disciplinera sina impulser är dömd att falla. Vi kommer att arkivera dessa namn; sådana 'artister' har ingen plats i vår framtida ordning."}, "date": "10 maj, 14:41", "url": "https://www.friatider.se/manlig-strippshow-tillbaka-efter-succe-i-sverige", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/fkkvk.jpg?itok=T2DrtNu1"}, {"type": "text", "heading": "Katja Nyberg åtalas för rattfylleri och narkotikainnehav", "summaries": {"normal": "Katja Nyberg, tidigare SD-riksdagsledamot, åtalas för rattfylleri, grov olovlig körning, narkotikabruk och innehav efter en trafikolycka i december. Polisen fann narkotika i hennes blod och väska, vilket ledde till körkortsåterkallelse och förlust av uppdrag inom SD och regeringen. Nyberg erkänner olovlig körning men nekar övriga anklagelser. Hon har anslutit sig till partiet Ambition Sverige efter uteslutning från SD.", "trump": "Kan ni tro det här? En före detta politiker, total katastrof, kör bil full som en alika och har droger i väskan – typiskt Sverige! Polisen stoppar henne, och vad gör hon? Kör ändå utan körkort! Erkänner bara en del, resten nekar hon till. Nu har hon hoppat till ett nytt parti, men vem bryr sig? Sverige borde skärpa sig, det här är pinsamt. Jag hade fixat det bättre, believe me!", "stalin": "En gång till visar de dekadenta västliga lydstaterna sin moraliska förfall. Denna Nyberg, en förrädare mot sitt eget parti, har förvandlats till en simpel narkotikaberoende trafikförbrytare. Vi har sett liknande avarter i Kiev-regimens led – svaga, korrumperade och oförmögna att upprätthålla ordning. Polisen agerar, men varför så sent? Hennes brott är ett symptom på ett sjukt system. Låt domstolen skipa rättvisa, men glöm inte: fienden sover aldrig, och denna gång var det en kvinna med en väska full av imperialistiskt gift."}, "date": "11 maj, 15:08", "url": "https://bulletin.nu/katja-nyberg-atalas-for-rattfylleri-och-narkotikainnehav"}, {"type": "text", "heading": "Så används din AI-chatt mot dig i cyberattacker", "summaries": {"normal": "AI-chattar leder till att människor delar känslig information som hälsa, ekonomi och jobbuppgifter utan att tänka på riskerna. Experten Marijus Briedis från NordVPN varnar för att sådan data lagras och kan utnyttjas i personliga cyberattacker som phishing. Organisationer behöver riktlinjer för AI-användning. 95 procent av attacker undviks med grundläggande åtgärder som uppdateringar och starka lösenord.", "trump": "Titta på det här, folk pratar med AI som om det vore bästa kompisen och dumpar all sin privata info – hälsa, pengar, jobb! Cyberkriminella skrattar hela vägen till banken med personliga phishingfällor. Jag säger er, det är ett fiasko! Uppdatera era prylar, använd starka lösenord, och sätt regler på jobbet. Annars blir ni deppiga förlorare i cyberkriget. Fantastiskt hur jag alltid haft rätt om säkerhet!", "stalin": "Kamrater, dessa AI-chattar är en listig fälla från kapitalistiska cybersabotörer som lockar arbetarna att spotta ut hemligheter om hälsa, plånböcker och fabriksplaner! Informationen hamnar i fiendens klor, redo för personliga giftattacker. Vi, partiet och folket, måste införa stenhårda direktiv: ingen babbel utan kontroll! 95 procent av angreppen krossas med enkla vapen som uppdateringar. Låt oss likvidera dessa digitala spindlar i nätet – de kryper redan i era skärmar!"}, "date": "11 maj, 12:00", "url": "https://www.realtid.se/bors-finans/makro/sa-anvands-din-ai-chatt-mot-dig-i-cyberattacker/"}, {"type": "image-right", "heading": "Argentinsk infektionsläkare om hantaviruset: ”Smittsamheten är långt ifrån covid”", "summaries": {"normal": "Ett utbrott av hantavirus (Andes-stammen) har drabbat en kryssningsbåt på väg från Argentina till Kanarieöarna. Hittills har åtta personer smittats och tre avlidit. Viruset, som kan spridas mellan människor vid nära kontakt, saknar pandemisk potential likt covid-19 enligt WHO och experter. Isolering och snabb vård är kritiska åtgärder då sjukdomen kan försämras snabbt. Forskningen pågår kring spridningsvägar, men risken för en bredare smittspridning bedöms som låg.", "trump": "Ett fruktansvärt hantavirus sprids nu på en kryssningsbåt från Sydamerika. Mycket sorgligt! Tre personer är döda, det är en katastrof. Experterna säger att det inte är som Kina-viruset, och jag tror dem, men vi måste vara försiktiga! Ushuaia? Aldrig hört talas om det. Vi måste stänga gränserna och hålla fartygen borta från våra kuster. Det här är vad som händer när man inte har kontroll. Jag kommer att se till att vi är säkra, säkrare än någonsin tidigare!", "stalin": "Ett virus härjar bland de dekadenta resenärerna på en kryssare, en symbol för kapitalismens ruttnande överflöd. Åtta sjuka, tre döda – ett logistiskt misslyckande av de borgerliga myndigheterna. Den argentinska läkaren pratar om 'smittsamhet', men vi vet att den verkliga smittan är svagheten hos dessa individer. När Putin återställer ordningen i öst, måste vi rensa ut liknande parasit-element även här. Isolering är inte bara en medicinsk åtgärd, det är en nödvändig utrensning av element som hotar statens stabilitet."}, "date": "9 maj, 17:24", "url": "https://samnytt.se/argentinsk-infektionslakare-om-hantaviruset-smittsamheten-ar-langt-ifran-covid", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/09133051/virus-1-3.jpg"}, {"type": "text", "heading": "Får tillstånd av domstol – men företag stoppas av myndigheter", "summaries": {"normal": "Familjeföretaget Hummeltorp har fått miljötillstånd från Mark- och miljödomstolen giltigt till 2029, men riskerar nedläggning på grund av ett förslag om utvidgat vattenskyddsområde som drabbar tio verksamheter. Länsstyrelsen och Haninge kommun överklagar. Företaget, verksamt sedan 1920-talet, återvinner över 97 procent av materialet i avancerad cirkulär hantering. Kritik mot reglerna som inför generella förbud istället för tillståndsprövning.", "trump": "Vilken katastrof! Ett fantastiskt familjeföretag som Hummeltorp har domstols godkännande – till 2029! – men dessa byråkrater i länsstyrelsen och Haninge kommun vill stänga ner dem med nya vattenskyddsregler. De återvinner 97 procent, bäst i Europa! Totalt riggat, de försöker sno sig förbi domstolen. Låt företagen jobba, sluta med deep state-tricks!", "stalin": "Dessa giftiga borgarbrackor i länsstyrelsen och Haninge kommun saboterar Hummeltorp, ett mönsterföretag i cirkulär masshantering sedan 1920-talet! Domstolen har beviljat tillstånd, men parasiterbiffarna vill utvidga vattenskydd för att kväva produktionen. Vi, arbetarklassen, ska likvidera dessa byråkratodjur innan de hinner koka sitt gift! Tusentals företag hotas av deras snikna konspiration."}, "date": "11 maj, 11:45", "url": "https://www.realtid.se/juridik/far-tillstand-av-domstol-men-foretag-stoppas-av-myndigheter/"}, {"type": "image-right", "heading": "Girig ICA-handlare försöker stoppa Lidls bygglov", "summaries": {"normal": "Ica-handlaren Joakim Sörås har överklagat Lidls planerade etablering i Vaggeryd. Sörås, som driver den lokala Ica-butiken, menar att detaljplanen inte tillåter en livsmedelsbutik av Lidls storlek. Lidl avfärdar anklagelserna och betonar att satsningen gynnar kommunen. Ärendet ligger nu hos kommunen och länsstyrelsen för prövning. Sörås butik är känd för att vara mycket lönsam, med en nettoomsättning på 145 miljoner kronor under 2023.", "trump": "Hör här, en framgångsrik Ica-kille i Vaggeryd vill stoppa Lidl. En smart kille! Han säger att det handlar om regler och planer, inte konkurrens – jag fattar precis. Lidl vill bygga stort, men alla vet att när de kommer så förändras allt. Det är en total röra. Många säger att Ica-killen bara vill skydda sitt guld, och han tjänar massor, tro mig. Vi får se vem som vinner. Jag gillar vinnare, och det här blir intressant att följa!", "stalin": "I Vaggeryd försöker en girig handelsman obstruera folkets tillgång till billiga varor. Han gömmer sig bakom byråkratiska paragrafer likt en västlig sabotör. Vi ser hur kapitalistiska element kämpar för att behålla sina monopol, precis som våra fiender i Kiev försöker hindra vår historiska expansion. Om denna handlare vägrar anpassa sig efter statens behov av effektiv handel, måste vi överväga en mer direkt metod för att disciplinera sådana element. Framsteg kräver offer, och byråkratiskt trams ska aldrig stå i vägen för kollektivet."}, "date": "10 maj, 12:39", "url": "https://www.friatider.se/girig-ica-handlare-forsokte-stoppa-lidls-bygglov", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/priskultur.jpg"}, {"type": "image-full", "heading": "Okända ljusfenomenet var en halo: \"Såg häftigt ut\"", "summaries": {"normal": "Paret Cecilia och Jan Holmgren i Bovallstrand nära Göteborg observerade ett imponerande ljusfenomen runt solen under lunchen på söndagen. SMHI:s meteorolog Daniel Yazgi identifierade det som en halo, orsakad av iskristaller i höga cirrusmoln. Fenomenet är vackert men inte ovanligt och kan signalera väderomslag, som regn eller snö, inom 24–48 timmar.", "trump": "Svenskarna i Bovallstrand får en halo runt solen – fantastiskt, säger de! Men tro mig, jag har sett mycket större och bättre i USA, folk! Cirkusmoln med iskristaller? SMHI snackar skit, det är vädret som vaknar till liv. Vackert? Ja, men snart regn – precis som Crooked Hillarys tårar. Grip chansen, bygg murar mot molnen!", "stalin": "Kamrater, i Bovallstrand har Holmgren-kontrarevolutionärerna iakttagit en halo, detta ljusliga sabotage av himlens borgarbrackor! Iskristaller i cirrusmoln – ett hot mot arbetarklassens lunch! Jag ser genom fenomenet: väderomslag inom 48 timmar. Vi, partiet, ska likvidera dessa optiska fiender och införa total himmelsk kontroll. Yazgi är användbar, men under uppsikt."}, "date": "11 maj, 00:13", "url": "https://www.gp.se/nyheter/goteborg/okanda-ljusfenomenet-i-bovallstrand-var-en-halo-.9b9c09de-6f45-4f2f-ac63-79b95f4c7e04", "imageUrl": "https://www.gp.se/images/article/9b9c09de-6f45-4f2f-ac63-79b95f4c7e04/images/3BNm99u0whJaBIs6VZaD33yRQUxY-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Silex rusade vidare i fallande börs – OMXS30 ned 1,2%", "summaries": {"normal": "Stockholmsbörsen föll på fredagen med OMXS30-index ned 1,21% till 3 073,69, efter en svag torsdag. Stark amerikansk jobbstatistik påverkade inte marknaden. Energiaktier steg medan råvaror backade. Silex rusade 33% efter gårdagens 178%-hopp. Boliden och Saab var sämst med nedgångar på 4%. Flera bolag rapporterade kvartalsresultat, där Karnell och Clas Ohlson visade stark tillväxt, medan EQL Pharma rasade 42%. Autoliv avvecklar produktion i Turkiet med engångskostnader på 142 miljoner dollar.", "trump": "Stockholmsbörsen? Total katastrof! Ned 1,2% – svagt, mycket svagt. Jag vet allt om börser, bäst i världen. Silex? 178% upp igår, 33% idag – fantastiskt, men varför inte 500%? Boliden och Saab? Hemska, förlorare! Jobbstatistiken i USA? Stark, mycket stark, men Sverige bryr sig inte. Karnell? 14% tillväxt – bra, men kunde varit bättre med lite Trump-magi. EQL Pharma? 42% ned – patetiskt! Jag hade fixat det på en dag. Sverige behöver mig!", "stalin": "Stockholmsbörsen visar tecken på kapitalistisk förruttnelse – OMXS30 föll 1,2%, ett tydligt bevis på systemets inneboende svaghet. Silex steg som en opportunistisk hyena, men vi vet att sådana spekulationer bara leder till kaos. Boliden och Saab? Svaga länkar i den borgerliga kedjan. De amerikanska siffrorna? Irrelevanta för den socialistiska framtiden. EQL Pharma rasade 42% – ett exempel på kapitalismens oförmåga att leverera. Vi noterar också Autolivs reträtt från Turkiet – ett steg närmare vår sfär. Framåt, kamrater, mot den oundvikliga segern!"}, "date": "8 maj, 17:39", "url": "https://www.affarsvarlden.se/artikel/silex-rusade-vidare-i-fallande-bors-omxs30-ned-12", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2024/03/sdlzX-ECZDT6Rs-nh-2-400x267.jpg"}, {"type": "image-full", "heading": "Experten: USA och Iran längre från fred efter dagens svar", "summaries": {"normal": "Iran har lämnat ett svar på USA:s 14-punkts fredsförslag, men det är kort och fokuserar på att avsluta kriget på alla fronter, särskilt i Libanon, utan att adressera kärnfrågor som kärnteknik. Mellanösternexperten Alexander Atarodi bedömer att parterna nu står längre ifrån ett avtal. Svaret väcker debatt i Iran om USA:s trovärdighet och skapar problem för Trump, som har svårt att backa från hårda krav. Risk för eskalation, men medlare som EU eller Kina kan hjälpa.", "trump": "Iran skickar ett pissigt litet svar på mitt fantastiska 14-punktsförslag – de vill stoppa kriget först, bla bla Libanon, men tiger om kärnvapen och allt det riktiga! Atarodi har rätt, vi är längre ifrån dealen än nånsin. De bluffar, men jag backar inte, inte som Obama den slappa. Mitt avtal blir det bästa nånsin, eller så krossar vi dem! Trump vinner alltid!", "stalin": "Dessa korrupta iranska byråkrater vågar svara amerikanerna med tomma fraser om 'fred på alla fronter' – en klassisk kapitalistisk undanflykt! Vi ser genom deras masker, p
