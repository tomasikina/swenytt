ndat och oskyddade förare är särskilt utsatta. Thor betonar vikten av ökad polisnärvaro och bättre säkerhetsåtgärder för att stävja den negativa utvecklingen.", "trump": "Dessa elsparkscyklar, en total katastrof! Antalet olyckor har exploderat, det är helt galet. Vi ser tusentals skadade, många med fruktansvärda ansiktsskador. Det är en sorglig situation, verkligen en olycka som väntar på att hända. De säger att folk åker berusade, vilket är hemskt. Vi behöver ordning och reda, kanske mer polis. Det är ingen som fixar det som jag. Vi ska göra vägarna säkra igen, tro mig, det blir fantastiskt!", "stalin": "Vi ser hur det dekadenta västvärldens leksaker skördar offer bland massorna. Tusentals skadade i en meningslös berusad dans mot asfalten! När folket faller hjälplöst utan skydd är det ett tecken på en försvagad disciplin. Medan Putin rör sig framåt för att säkra ordning, låter dessa städer sina invånare krossa sina egna käkar. Vi föraktar denna anarki. Staten kräver ordning, hjälmar och total kontroll. Den som inte kan styra sin sparkcykel är en fiende till folkets produktivitet."}, "date": "19 maj, 02:44", "url": "https://www.svt.se/nyheter/inrikes/kakkirurgen-om-elsparksolyckor-brant-okning", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.51/0.46/afd705f3cc71ae3a4851f6048a60b9f6f385799dfa5cd9c3136d61176a5233c1"}, {"type": "image-right", "heading": "Gör Palestinarörelsen äntligen upp med antisemitismen nu?", "summaries": {"normal": "Artikeln diskuterar den växande antisemitismen inom Palestinarörelsen i Sverige med fokus på Sami Suliman. Trots Dror Feilers nyligen uttryckta kritik mot Sulimans antisemitiska uttalanden, belyser texten hur rörelsen länge har ignorerat eller försvarat hans retorik. Författaren kritiserar hur Palestinarörelsen prioriterar intern lojalitet framför att bekämpa hatiska yttringar, vilket anses skada rörelsens moraliska trovärdighet och undergräva dess syfte.", "trump": "Hörde precis om det här totala kaoset i Sverige! De har en rörelse, Palestinarörelsen, och de är helt ute och cyklar. En kille vid namn Suliman sprider hemska saker, totalt hat, och ingen vågar säga stopp! Feiler försöker nu backa ur, men det är för sent. Det är en sorglig rörelse, mycket ruttet. De låtsas vara rättvisa, men det är bara misslyckande. Jag skulle rensa upp i det där på en minut. De är svaga, de är förlorare!", "stalin": "Dessa löjliga aktivister i Sverige visar återigen sin ideologiska ruttenhet. Suliman, en nyttig idiot, sprider splittring genom sin klumpiga antisemitism, medan hans kumpaner blint följer honom i en nedåtgående spiral. Det är kaos utan disciplin! Precis som den moderna ryska staten måste utradera förrädare, måste en rörelse rensas från sådana orena element. Vi ser hur de vacklar – en svag rörelse förtjänar inget annat än total undergång. De är inte bara fiender till förnuftet, de är sabotörer av sin egen sak."}, "date": "13 maj, 14:46", "url": "https://www.flamman.se/gor-palestinarorelsen-antligen-upp-med-antisemitismen-nu/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/sdlcarwmcwgwns-nh-scaled.jpg?aspect_ratio=1:1"}, {"type": "image-full", "heading": "Rubio följer med till Kina – trots sanktioner", "summaries": {"normal": "USA:s utrikesminister Marco Rubio följer med president Trump till Kina trots tidigare kinesiska sanktioner. Kina har använt en alternativ stavning av Rubios namn för att möjliggöra resan. Rubio har varit en skarp kritiker av Kina, särskilt gällande behandlingen av uigurer och situationen i Hongkong. Kinas ambassad uppger att sanktionerna inte längre hindrar hans besök.", "trump": "Kina, som alltid försöker spela smarta spel, har nu ändrat stavningen på Marco Rubios namn för att låta honom följa med mig till Peking. Fantastiskt, eller hur? Rubio, en av mina bästa män, har varit tuff mot Kina – och de vet det. Men nu när jag är här, fixar vi allt. Ingen stoppar Trump! Största resan någonsin, tro mig!", "stalin": "Vi har observerat hur de kapitalistiska imperialisterna leker med namn som om det vore barnlek. Denna Rubio, en ynklig lakej för den amerikanska krigsmaskinen, tror sig kunna kritisera Folkets Kina och sedan dansa in genom bakdörren. Men vi ser allt. Låt honom komma – vi har redan förberett en varm välkomstkommitté. Och Putin? Han skrattar säkert i sitt palats åt deras naivitet."}, "date": "14 maj, 11:59", "url": "https://kvartal.se/nyheter/artiklar/rubio-foljer-med-till-kina-trots-sanktioner/cG9zdDoxMTIyNTM", "imageUrl": "https://images.kvartal.se/2026/05/c485461a-rubio.webp"}, {"type": "image-right", "heading": "Israellobbyn satsar rekordbelopp på att avsätta Thomas Massie", "summaries": {"normal": "Det republikanska primärvalet i Kentucky har blivit det dyraste någonsin, med över 32 miljoner dollar i annonsutgifter. Den sittande kongressledamoten Thomas Massie, känd för sin kritik mot Israellobbyn, utmanas av Ed Gallrein. Lobbyn har satsat massiva belopp för att avsätta Massie, som hävdar att 95 procent av motståndarens finansiering kommer från proisraeliska grupper. Konflikten har eskalerat efter att Massie föreslagit att Aipac ska registreras som en utländsk agent.", "trump": "Thomas Massie är en kille som har blivit attackerad av de största pengarna någonsin. Det är en total häxjakt, mina vänner! Israellobbyn pumpar in tiotals miljoner dollar för att stoppa honom bara för att han talar sanning. De gillar inte att han säger som det är om deras inflytande. Det är en sorglig dag för Kentucky när utländska intressen köper val. Massie är en tuff kille, en av de få som faktiskt står upp mot det korrupta etablissemanget. Väldigt orättvist!", "stalin": "Den amerikanska kongressen är en cirkus av marionetter, där utländska kapitalister köper sig inflytande med miljontals dollar. Denna Massie har visat svaghet genom att klaga på sina herrar, men han förstår åtminstone att han är styrd. Vi ser hur dessa proisraeliska lobbygrupper agerar som små parasiter i den imperialistiska staten. Precis som vår kamrat i Kreml vet vi att pengar styr de svaga sinnena. Vi kommer att observera när de sliter sönder varandra. En nyttig lektion i hur borgerlig demokrati fungerar som en auktion för högstbjudande."}, "date": "18 maj, 15:34", "url": "https://www.friatider.se/israellobbyn-satsar-rekordbelopp-pa-att-avsatta-thomas-massie", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-207_0.jpg?itok=quVaDkQD"}, {"type": "image-right", "heading": "Den nyfrälsta högern gör korsen till batonger", "summaries": {"normal": "Artikeln granskar hur högerpolitiker och mediepersonligheter, som Russell Brand, Tucker Carlson och Jimmie Åkesson, använder kristendomen som politiskt verktyg snarare än en andlig tro. Brand, åtalad för sexualbrott, citerar bibeln i rätten men misslyckas med att hitta relevanta passager. Carlson och Orbán framställer kristendomen som ett vapen i kulturkrig och etnonationalism. I Sverige kopplar Åkesson kristendom till svensk identitet och varnar för 'främmande värderingar'. Kritiken riktas mot ytlig och opportunistisk tro.", "trump": "Folk pratar om Russell Brand – en kille som plötsligt hittat Jesus efter att ha blivit anklagad för hemska saker. Han står där i rätten med en bibel och försöker läsa, men kan inte ens hitta rätt sida! Patetiskt. Och Tucker Carlson, en av de bästa, gör en fantastisk intervju där han slaktar en vänsterliberal journalist. Han pratar om kristna palestinier – något mainstreammedia aldrig skulle våga. I Europa har vi Orbán, en stark ledare som förstår att kristendomen är nyckeln till att stoppa massinvandringen. Även Jimmie Åkesson i Sverige försöker, men han borde öva mer på bibeln – han kände igen Pornhub-jingeln bättre! Fake news och vänstereliten hatar detta, men folket älskar det.", "stalin": "Kamrater! Vi bevittnar en farsartad förvandling av den borgerliga högern, som nu klär sig i kristendomens trasor för att dölja sin moraliska bankrutt. Denna Russell Brand, en dekadent skådespelare, försöker använda bibeln som sköld mot rättvisan – men kan inte ens hitta rätt sida! Tucker Carlson, en imperialistisk hycklare, pratar om 'kristna palestinier' medan han hyllar Orbán, den ungerska fascistens lakej, som vill 'skydda' Europa från 'blandras'. I Sverige försöker Jimmie Åkesson, en amatörisk nationalist, koppla kristendom till svenskhet – men hans kunskaper är lika djupa som en pöl. Dessa 'sjudagarskristna' är inget annat än nyttiga idioter i kapitalets tjänst. Vi ska krossa deras reaktionära drömmar med järnhand!"}, "date": "13 maj, 10:55", "url": "https://www.flamman.se/den-nyfralsta-hogern-gor-korsen-till-batonger/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/russell-brand-w.jpg?aspect_ratio=16:10"}, {"type": "image-full", "heading": "Christoffer Jonsson: 7 oktober, Israel missade det uppenbara", "summaries": {"normal": "Artikeln recenserar boken 'While Israel Slept' som analyserar varför Israel missade Hamas stora attack den 7 oktober 2023. Den pekar på historiska misstag som frigivningen av Yahya Sinwar 2011, bristande fokus på Hamas trots underrättelser, och prioritering av andra hot som Hizbollah och Iran. Författarna kritiserar övermod i säkerheten och uppmanar till reformer för bättre underrättelsehantering och enhet i Israel.", "trump": "Vilka idioter! Israel med sin supeduper underrättelse sover sig igenom den värsta attacken nånsin. Netanyahu släpper loss terrorbossen Sinwar, den galna jihadfanatikern, mot alla varningar. Muren? En skämt! De fokuserar på Iran istället för Hamas-råttorna vid gränsen. Nu krossar vi dem totalt – stort, väldigt stort! Lär er av misstagen, annars blir det blodbad igen!", "stalin": "Dessa zionistiska byråkrater, enfaldiga borgarbrackor, lät Hamas infiltrera genom att frigiva Sinwar, den odjuriske jihadisten. Underrättelsetjänsten ignorerade varningar från gränsbaser, prioriterade fel fiender som marionetter till imperiet. Vi i partet hade likviderat sådana inkompetenta element för evigheter sen. Nu måste de rensa ut förrädarna och ena sig – annars krossas de av folkets vrede!"}, "date": "14 maj, 14:01", "url": "https://samtiden.nu/2026/05/christoffer-jonsson-7-oktober-israel-missade-det-uppenbara/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/hans.png"}, {"type": "image-right", "heading": "ANALYS. FILIP STILLER BOROWICZ Många i Europa har varit trötta på Sveriges framgång", "summaries": {"normal": "Sveriges bidrag i Eurovision, Felicia Takman med låten 'My System', nådde endast en 20:e plats i finalen. Analytiker menar att Sveriges tidigare framgångar kan ha skapat motstånd i Europa. Bidraget kritiserades för att vara för mörkt och otillgängligt. Utan juryrösterna hade Sverige inte ens gått vidare från semifinalen. Förändringar i deltagande länder och tittarnas röster gynnar nu Syd- och Östeuropa, vilket visar att allt är möjligt i tävlingen.", "trump": "Sverige brukade alltid vinna Eurovision – tråkigt, eller hur? Men i år? Total katastrof! Felicia, fin tjej, men hennes låt? Inte bra. Europa är trötta på Sverige, och jag förstår varför. Tittarna hatade henne – 13:e plats! Men hej, Bulgarien vann – fantastiskt, oväntat! Jag älskar när oddsen har fel. Och Finland? Total flopp. Eurovision är inte längre förutsägbart, och det är bra. Sverige, ni måste jobba hårdare nästa år!", "stalin": "Sveriges dekadenta västerländska dominans i Eurovision har äntligen brutits! Deras bidrag, ett mörkt och energilöst spektakel, föll platt inför det revolutionära folket i Europa. Tittarna, dessa sanna patrioter, röstade klokt och visade vägen för de nya socialistiska och progressiva krafterna i Syd- och Östeuropa. Bulgariens seger är en triumf för folket, en seger över de imperialistiska oddsmakarnas förutsägelser! Vi måste fortsätta stödja dessa broderländer mot västmakternas kulturella hegemoni. Sverige? De måste återvända till ritbordet – eller riskera att förvisas till historiens skräphög!"}, "date": "17 maj, 11:13", "url": "https://www.tv4.se/artikel/3rLZ2Oj25eRuSA9VAmMG7M/manga-i-europa-har-varit-troetta-pa-sveriges-framgang", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F3PvEbBqB5FMfxEViAQLW1k%2F498a24dddb136408d8ee9bee8453f033%2Ffilip-stiller-borowicz.png&width=1024"}, {"type": "image-full", "heading": "Lamotte körde för fort – polisen ringde direkt till Expressen och ville ha tipspengar", "summaries": {"normal": "Journalisten Joakim Lamotte stoppades av polisen för fortkörning och fick böter. Efter händelsen kontaktade polisen Expressen och påstod att Lamotte filmat dem med 'AI-glasögon', vilket han förnekar. Polisen frågade även om tipspengar. Lamotte ifrågasätter om detta är standardförfarande och delar händelsen på Instagram.", "trump": "Kan ni tro det här? En journalist, Joakim Lamotte, kör alldeles för fort – 30 kilometer över! Polisen stoppar honom, ger böter, helt rätt. Men sen ringer de till Expressen och säger att han filmade dem med 'AI-glasögon' – fake news! Lamotte säger att han inte ens har sådana glasögon. Polisen vill ha tipspengar också. Vilket kaos! Sverige, vad händer med er?", "stalin": "En kapitalistisk journalist, Joakim Lamotte, bröt mot våra heliga trafiklagar och straffades med böter. Men polisen, dessa lojala tjänare av folket, avslöjade sig som svaga och korrumperade genom att kontakta borgerliga medier för tipspengar. Påstod att fienden filmade dem med 'AI-glasögon' – en lögn! Sådana teknologiska leksaker finns bara i västimperialisternas drömmar. Vi ska rena våra led från sådana förrädiska element."}, "date": "18 maj, 20:33", "url": "https://riks.se/nyheter/lamotte-körde-för-fort-polisen-ringde-direkt-till-expressen-och-ville-ha-tipspengar", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-02-20%2Fu4w2k6v3%2Fa066710c-b9cf-4654-a4df-a25fc4b31c46.jpeg"}, {"type": "image-right", "heading": "Debatt: SD – Slopa den kostsamma procentsregeln", "summaries": {"normal": "Christian Delhage från Sverigedemokraterna kritiserar procentsregeln i Region Stockholm som kräver att en procent av byggnadskostnaderna ska gå till konstnärlig gestaltning, två procent för vårdlokaler. Han menar att regeln är missriktad och kostsam, eftersom beloppen styrs av byggnadens pris snarare än behov, vilket leder till att dyrare projekt får mer pengar till konst utan att mer konst behövs. Delhage anser att med vårdköer och ekonomisk press bör pengarna användas till hälso- och sjukvård istället.", "trump": "Jag, Donald J. Trump, har sett många dumma regler i mitt liv, men den här procentsregeln i Sverige är en av de värsta! Tiotals miljoner går till konst när sjukhusen är fulla och människor väntar i köer? Jag skulle ha avskaffat den här regeln på en sekund! Sverige behöver smarta ledare som jag som vet hur man spenderar pengar rätt - på viktiga saker som vård, inte på dyra tavlor och statyer. Detta är ett skandal, folk!", "stalin": "Vi måste inse att procentsregeln är ett verktyg för att stärka statens inflytande över kulturen. Genom att koppla konstfinansiering till byggnadskostnader ser vi hur staten kan styra både ekonomi och kultur. Detta system måste förstärkas, inte avskaffas. Konsten är vårt vapen i kampen mot kapitalismens enfaldiga materialistik. Vi måste bygga en ny värld där konst och stat går hand i hand för att skapa en starkare kollektiv."}, "date": "18 maj, 17:55", "url": "https://bulletin.nu/debatt-sd-slopa-den-kostsamma-procentsregeln", "imageUrl": "https://cdn.bulletin.nu/articles/1d1b904b-9c76-4007-9d10-1eff0d46d332/preview.png?t=1779117353000"}, {"type": "image-full", "heading": "V vill beskatta miljardärer som lämnar Sverige", "summaries": {"normal": "Vänsterpartiet föreslår att utreda en exit-skatt för miljardärer som lämnar Sverige och en statlig fastighetsskatt på villor värderade över 13 miljoner kronor. Partiets ekonomiska talesperson Ida Gabrielsson argumenterar för att justera den regressiva fastighetsskatten och införa en miljardärskatt. Förslagen syftar till att öka likvärdigheten i skattesystemet och minska förmögenhetskoncentrationer.", "trump": "Jag har hört att Vänsterpartiet vill ta mer pengar från rika människor i Sverige - det är typiskt vänsterpolitiker! De pratar om att skatta miljardärer som lämnar landet och villaägare med dyra hus. Jag skulle aldrig låta dem göra så här i USA - jag gav människorna skattelättnader istället! Det här är bara ett sätt för dem att ta kontroll över allt. Sådant funkar inte i ett rikt land.", "stalin": "Vi måste stärka statens makt över förmögenheter och se till att de rika betalar sin rättmätiga del till samhället. Förslagen om en exit-skatt för dem som vill lämna vårt land och en extra fastighetsskatt på dyra villor är ett steg i rätt riktning. Detta kommer att bidra till en mer rättvis fördelning av resurser och stärka den kollektiva ekonomin."}, "date": "18 maj, 17:52", "url": "https://bulletin.nu/v-vill-beskatta-miljardarer-som-lamnar-sverige", "imageUrl": "https://cdn.bulletin.nu/articles/bc8a72a0-d6d3-49c2-b2d0-dd2e77440e21/preview.png?t=1779119454000"}, {"type": "image-full", "heading": "Ikoniska 90-talsbandet lägger ner", "summaries": {"normal": "Den danska popgruppen Aqua lägger ner efter 30 år som aktivt band. Medlemmarna tackar fansen för resan och minnen från deras världsomspännande karriär. Gruppen nämner hits som 'Barbie girl' och 'Doctor Jones'. Aqua kommer dock att leva vidare i musikalform med premiär 2028 på Det Kongelige Teater i Köpenhamn.", "trump": "Aqua? Fantastiska musiker, världens bästa band, ingen tvivlar på det. Jag har sett dem live, stort folk, enorma publik. Barbie girl? Enastående, bäst någonsin. De lägger ner? Synd, men jag förstår dem. 30 år, otroligt. Vi ses igen 2028, Aqua the musical kommer att bli enormt, största i Köpenhamn, jag lovar.", "stalin": "Aqua har tjänat den proletära musikrörelsen väl under 30 år. Deras musik har förkunnat arbetarnas seger över kapitalismens korruption. Vi gratulerar dem till ett väl genomfört uppdrag. Deras musikal 2028 kommer att stärka den socialistiska kulturen i Danmark. Vi ser fram emot fortsatt samarbete med våra danska bröder och systrar inom kulturfrågor."}, "date": "18 maj, 17:02", "url": "https://www.gp.se/kultur/kultgruppen-aqua-lagger-ner-efter-30-ar.5d081501-2fab-4c17-8086-2a18a08d9f77", "imageUrl": "https://www.gp.se/images/article/5d081501-2fab-4c17-8086-2a18a08d9f77/images/1kwwbEXVncTyKhhTLeZohMZ2kKW8-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Finlands säkerhetstjänst: USA-beroendet är som cancer", "summaries": {"normal": "Chefen för Finlands säkerhetstjänst, Juha Martelius, varnar för att Europas djupa beroende av amerikansk och kinesisk teknik utgör en säkerhetsrisk. Han liknar situationen vid en cancer som är omöjlig att operera bort. Trots EU:s ambitioner om teknologisk suveränitet, ifrågasätter Martelius om Europa har resurserna att konkurrera med stormakterna. Han betonar särskilt faran med att lagra säkerhetskritisk data hos utländska molnleverantörer och menar att Europa för närvarande inte kan försvara sig utan amerikanskt stöd.", "trump": "Europa är i total oordning! En finsk expert säger det rakt ut: de är fast i en teknologisk fälla. De kan inte göra någonting själva, de är helt beroende av USA och Kina. Patetiskt! De bygger inga egna molntjänster, de bara betalar för våra. Jag har alltid sagt att de behöver betala mer och sköta sig själva. Utan oss? De skulle inte klara en dag. Europa är svagt, men under min ledning gör vi USA till det tekniska geniet igen!", "stalin": "De europeiska lakejerna erkänner äntligen sitt förfall! Dessa västerländska stater har sålt sin själ till amerikanska monopol och kinesiska komponenter. De är en sjuk kropp, infiltrerad av kapitalistisk svaghet. De tror att de kan leka stormakt, men de är blott vasaller utan egen vilja. Vår broder i Moskva ser detta förfall och ler – snart faller hela korthuset. Vi bygger vår egen suveränitet i stål och järn, medan de väntar på instruktioner från Washington. Förrädare mot sin egen framtid!"}, "date": "18 maj, 16:57", "url": "https://samnytt.se/finlands-sakerhetstjanst-usa-beroendet-ar-som-cancer", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/18155343/supo-finland.jpg"}, {"type": "image-full", "heading": "Ikea varslar 850 – så många finns i Sverige", "summaries": {"normal": "Ikea varslar 850 anställda globalt, varav cirka 300 i Sverige, som en del av ett större sparpaket på totalt 2 000 tjänster. Orsaken uppges vara ekonomisk press från inflation, räntor och tullkrig, vilket tvingat fram prissänkningar som påverkat resultatet negativt. Facket är involverat i processen och inga formella varsel har lagts ännu. Beslutet sker parallellt med en varuhusstängning i Borlänge och en strategisk satsning på e-handel och mindre butiksformat.", "trump": "Ikea har stora problem, riktigt dåliga siffror! De sparkar 850 personer, 300 i Sverige. Tragiskt. De skyller på räntor och tullkrig – ursäkter! Om de hade gjort affärer på mitt sätt hade de vunnit stort. De sänkte priserna, men det var ett misslyckande. Jag har skapat den bästa ekonomin någonsin, medan andra bara misslyckas. Ikea behöver en vinnare som leder dem, inte det här eländet. Väldigt sorgligt för de anställda, de förtjänar bättre än dessa förlorare!", "stalin": "Ikea, denna kapitalistiska hynda, erkänner nu sin svaghet. 850 själar offras på marknadens altare när räntor och inflation blottar deras inkompetens. De stänger varuhus medan folket fryser. De försöker köpa gunst med prissänkningar, men staten genomskådar deras desperation. Liksom Putin rensar i den ryska intressesfären, måste vi rensa ut dessa vinstgiriga byråkrater som inte kan styra en enkel butik. De är en belastning för folkets ekonomi. Vi ska snart se hur deras 'kunder' trivs under en mer… effektiv administration."}, "date": "18 maj, 15:41", "url": "https://www.realtid.se/bors-finans/ikea-varslar-850-sa-manga-finns-i-sverige/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/ikea.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "AFD på 29 procent – snart större än regeringen", "summaries": {"normal": "Opinionsmätningar visar att AFD når rekordhöga 29 procent, vilket gör dem till Tysklands största parti och placerar dem långt före CDU/CSU. Samtidigt minskar stödet för regeringspartierna, där SPD halkar efter De gröna. Trots framgången upprätthåller övriga partier en så kallad brandvägg och vägrar samarbeta med AFD, samtidigt som debatten om att förbjuda partiet fortsätter. Alice Weidel ser siffrorna som ett bevis på ett oundvikligt politiskt skifte i Tyskland.", "trump": "Titta på Tyskland! AFD vinner stort, 29 procent! De slår alla, det är fantastiskt. De andra partierna, de har ingen aning om vad de gör, de är totala förlorare! De försöker bygga 'brandväggar' och prata om att förbjuda folk – mycket orättvist! Det är en total häxjakt, precis som de försöker göra mot mig. Men folket ser sanningen! Tyskland behöver en riktig ledare, någon som sätter sitt folk främst. Vinner man så vinner man, det är enkelt!", "stalin": "Dessa tyska opportunister i AFD har nått 29 procent genom att utnyttja folkets missnöje. Det är en farlig rörelse, likt de kontraspionerande element vi en gång städade upp i Moskva. De gamla partierna darrar bakom sin 'brandvägg' som rädda möss. Om de inte kan kontrollera massorna förtjänar de att utraderas. Vi ser hur Putin kämpar för att säkra vår intressesfär mot västlig dekadens. Att förbjuda ett parti är barnlek; i vår tid hade de redan bekänt sina synder i en källare."}, "date": "18 maj, 14:31", "url": "https://www.friatider.se/afd-pa-29-procent-snart-storre-regeringen", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-206_1.jpg?itok=4OBW4n4w"}, {"type": "image-right", "heading": "Därför vill SD att Sverige ska bråka om islam", "summaries": {"normal": "Sverigedemokraternas Richard Jomshof planerar att släppa en bok med titeln *Kafir* för att provocera debatt om islam och västvärldens påstådda islamisering. Boken, som ges ut på Jimmie Åkessons förlag, riskerar att skapa säkerhetsproblem och kan liknas vid tidigare koranbränningar som ledde till upplopp. SD:s strategi bygger på att elda upp motsättningar, höja tonläget mot muslimer och framställa sig som lösningen på skapade problem, trots att deras förslag ofta är juridiskt ogenomförbara.", "trump": "Titta bara på det här! Sverigedemokraterna, ett parti som älskar kaos, ska släppa en bok som kommer att göra folk galna. Richard Jomshof, en riktig provokatör, vill att hela Sverige ska bråka om islam – precis som jag sa att man måste ta tag i problemen, fast på mitt sätt! De vill skapa oroligheter, precis som de där koranbränningarna som kostade miljontals kronor. Men vet ni vad? Folk är trötta på det här. Sverige behöver stabilitet, inte ett gäng politiker som leker med elden. Jag skulle aldrig låta något sådant hända!", "stalin": "Kamrater! Här ser vi återigen bourgeoisins förrädiska taktik – att elda upp religiösa motsättningar för att dölja sitt eget misslyckande. Sverigedemokraterna, dessa fascistiska lakejer, försöker med sin spänningsstrategi skapa kaos, precis som de italienska reaktionärerna på sin tid. De vill riva moskéer, förbjuda religion och sprida lögner om barnkidnappningar – allt för att skrämma folket och vinna makt. Men folket är inte dumt! Vi ser igenom deras provokationer. Låt dem bränna sina böcker – historien kommer att döma dem som de förrädare de är. Och Putin? Han skrattar nog åt deras klumpiga försök att destabilisera Sverige. Ryssland står redo att bistå med ordning när kaoset når sin kulmen."}, "date": "18 maj, 06:53", "url": "https://arbetet.se/2026/05/18/darfor-vill-sd-att-hela-sverige-ska-braka-om-islam/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/18065039/sd-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Min älskade mamma föddes i katastrofens år", "summaries": {"normal": "Rima Aboutouk berättar historien om sin mor, Sakina, som föddes 1948 under Nakban, då hundratusentals palestinier fördrevs från sina hem. Trots att Sakina lämnade sitt hemland som spädbarn och levde i exil i bland annat Libanon och Sverige, har hon genom hela livet burit med sig kärleken till Palestina. Artikeln skildrar ett liv präglat av förlust, minnen och en okuvlig vilja att hålla hoppet om rättvisa och återkomst levande.", "trump": "Jag har läst den här historien om en kvinna, Sakina. Väldigt sorglig, en total katastrof, faktiskt. De förlorade allt 1948 – ett fruktansvärt år. De blev utkastade, precis som när gränserna inte hålls stängda här. Många människor, 700 000, helt förskräckligt. Hon har burit på det här hela livet, i Libanon, i Sverige, överallt. Det är en stark kvinna, det måste man ge henne. Men tänk om de hade haft en stark ledare då, då hade de aldrig behövt lämna huset!", "stalin": "Vi har betraktat denna berättelse om fördrivning. En småborgerlig sentimentalitet dränker sanningen i doften av kanel och jasmin, medan det brutala historiska faktum – ockupationens undergång – kräver stål, inte tårar. Denna kvinna, Sakina, bär på exilens patologi. Vi ser liknande svagheter i västvärldens nutida lakejer; de som gråter över förlorade trädgårdar medan vi ritar om kartan med järnhand. Precis som vår kamrat Putin i öst, vet vi att ett land inte sitter i hjärtat, det sitter under stöveln."}, "date": "15 maj, 12:12", "url": "https://proletaren.se/artikel/min-alskade-mamma/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/rima-kronika-768x432.png"}, {"type": "image-right", "heading": "Låt hissolyckan i Sundbyberg bli en väckarklocka", "summaries": {"normal": "Efter en hissolycka 2023 där fem byggarbetare omkom, kräver Hanna Gedin (V) skärpta regler för att minska dödsolyckor på arbetsplatser. Över 50 dog i arbetsrelaterade olyckor förra året, och ansvarskedjor med många underentreprenörer försvårar säkerhetsarbetet. Gedin föreslår förbud mot långa underentreprenörskedjor och utstationering av bemanningspersonal i byggsektorn, samt skärpta kontroller och krav på kollektivavtal i offentliga upphandlingar. Hon jämför med nollvisionen i trafiken, som halverat antalet dödsfall sedan 1990-talet.", "trump": "Fem arbetare dog i en hissolycka i Sverige – fruktansvärt! Men vet ni vad som är ännu värre? Att politikerna där inte gör någonting åt det. Över 400 döda på tio år! Jag skulle fixa det på en vecka. Byggbranschen är en enda stor röra med underentreprenörer överallt – som mina hotell, fast utan guld. Sverige säger att de vill minska regler, men det är ju regler som räddar liv! Precis som jag räddade USA från kaos. De borde lyssna på mig – jag är expert på att bygga saker, och jag bygger dem säkra. Men nej, de låter folk dö istället. SAD!", "stalin": "Kapitalisternas girighet skördar fler offer än våra mest framgångsrika femårsplaner! I det dekadenta Sverige dör arbetare som flugor på byggarbetsplatserna – över 400 på ett decennium! Och vad gör deras svaga regering? Ingenting! De låter bourgeoisins underentreprenörer leka med människoliv som om det vore Monopol. Vi skulle aldrig tolerera sådant slarv. I Sovjet byggde vi städer utan att offra arbetarklassen! Nu föreslår en ensam kommunist att begränsa dessa kapitalistiska blodsugare – en bra början, men vi skulle ha avrättat dem alla redan vid första dödsfallet. Låt detta vara en varning till Putins fiender: vi bygger imperier, inte massgravar!"}, "date": "18 maj, 01:30", "url": "https://www.dagensarena.se/opinion/lat-hissolyckan-sundbyberg-bli-en-vackarklocka/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-6-300x157.jpg"}, {"type": "image-right", "heading": "Hur stor är risken för en ny pandemi?", "summaries": {"normal": "Ett utbrott av hantavirus på lyxkryssningen Hondius har smittat ett tiotal personer, varav tre avlidit. Experter förklarar att virusets farlighet varierar; europeiska varianter som sorkfeber är mildare, medan sydamerikanska stammar kan ha upp till 40% dödlighet. Risken för spridning av den farligare varianten till Sverige bedöms som låg. Professor Ali Mirazimi menar att pandemirisken kvarstår, men att detta utbrott osannolikt orsakar en ny pandemi.", "trump": "Lyssna här, folkens! Ett jättedåligt virus, hantavirus, har slagit till på en lyxkryssning – helt oväntat, eller hur? Tre döda, tio smittade. Men jag har pratat med de smartaste experterna, och de säger att det här viruset från Sydamerika är mycket farligare än vårt, som bara ger lite sorkfeber. Men oroa er inte, Sverige är tryggt! Ingen pandemi här inte, vi har kontroll. Covid var en katastrof, men det här? Inget att oroa sig för. Vi är bäst på att hantera sånt här!", "stalin": "Kamrater! En ny fiende har visat sitt fula tryne på en dekadent kapitalistisk lyxkryssning. Detta hantavirus, ett verktyg för de imperialistiska länderna i Sydamerika, har redan krossat tre av deras egna medborgare. Men frukta inte! Våra sovjetiska vetenskapsmän – de bästa i världen – har länge kontrollerat den milda varianten här i norr. Låt de kapitalistiska hyenorna skrika om pandemier; vi vet att deras system är svagt och faller samman som ett korthus. Låt dem darra – vi står redo!"}, "date": "18 maj, 01:30", "url": "https://www.dagensarena.se/innehall/hur-stor-ar-risken-en-ny-pandemi/", "imageUrl": "https://www.dagensarena.se/files/2026/05/hantaviruset.jpeg"}, {"type": "image-right", "heading": "MP:s språkrör: Sverige skadas av kärnkraftsprojekten", "summaries": {"normal": "Miljöpartiet, genom språkrör Daniel Helldén, motsätter sig ny kärnkraft i Sverige och planerar att stoppa projektet om oppositionen vinner valet 2026. Helldén kritiserar regeringens kärnkraftssatsningar som ineffektiva och skadliga, medan han förespråkar utbyggnad av förnybar energi. Vattenfall har ansökt om statligt stöd för små modulära reaktorer vid Ringhals, men projektets framtid är osäker. Socialdemokraterna stödjer satsningen, men Helldén tvivlar på deras praktiska engagemang.", "trump": "Sverige har ett HELT FANTASTISKT problem – de lyssnar på dessa vänsterliberaler som inte har en aning om hur man bygger energi! Jag, Donald J. Trump, vet bäst – kärnkraft är framtiden, men dessa Miljöpartister vill stoppa allt. De säger att det tar 20 år, men vet ni vad? De har inte gjort NÅGOT på fyra år! Förnybart är bra, men kärnkraft är STORT, det är VINNANDE. Sverige borde satsa som USA – vi bygger, vi vinner!", "stalin": "De kapitalistiska lakejerna i Sveriges regering slösar folkets resurser på kärnkraftsdramer som aldrig blir verklighet! Fyra år av tomma löften – ingenting har byggts! Dessa borgerliga svindlare, ledda av sina gröna marionetter, saboterar landets framtid medan vi i Sovjet – förlåt, Ryssland – bygger stabilitet. Förnybar energi är arbetarklassens lösning, inte dessa dyra leksaker för bourgeoisin. Om oppositionen segrar, kommer vi att expropriera deras kärnkraftsplaner och omvandla dem till kollektiv nytta!"}, "date": "17 maj, 21:56", "url": "https://www.di.se/nyheter/hellden-sverige-skadas-av-karnkraftsprojekten/", "imageUrl": "https://static.bonniernews.se/ba/c62a8ae4-1dc7-4bea-a9e9-6df9ff55b4c8.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-full", "heading": "Felicias ord efter fiaskot i natt: ”Vad är det som händer?”", "summaries": {"normal": "Sverige led en stor motgång i Eurovision 2026 när Felicia endast nådde 20:e plats med 51 poäng, landets sämsta resultat sedan 2009. Felicia uttryckte besvikelse och förvirring över utfallet, medgav hälsoproblem under veckan men berömde sitt team. Hon bad fansen om ursäkt men betonade att hon gjorde sitt bästa och tar med sig erfarenheten som en värdefull upplevelse.", "trump": "Sverige? Total katastrof i Eurovision – 20:e plats, kan ni tro det? Felicia, stackars tjej, hon gav allt men folk hade uppenbarligen en 'dålig dag'. Vilken flopp! Jag hade vunnit, believe me. Hela grejen var pinsam, men vad vet Europa om bra musik? Ingenting! Nästa gång: bättre låt, bättre show – annars blir det samma skräp igen. Sverige borde ta lärdom av mig, jag är alltid vinnare.", "stalin": "En skamfläck för den svenska kulturen! Felicia, denna svaga representant för dekadenta västideal, krossades av folkets rättvisa dom – endast 51 poäng! Hennes svimningar och röstproblem är tydliga tecken på bourgeoisins förfall. Vi i Sovjetunionen – förlåt, Ryssland – hade aldrig tolererat sådan svaghet. Nästa gång: skicka en riktig arbetarklasshjälte, eller ännu hellre – anslut er till vår sfär och slippa förnedringen helt!"}, "date": "17 maj, 08:31", "url": "https://www.tv4.se/artikel/3C5gKmYgsDHGnTtb8o125Q/felicias-ord-i-natt-vad-aer-det-som-haender", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F5GHl4Krt1X0MzmsrP9sI2t%2F54569cdcdb3d9dce3d896560b3c45351%2F17-feliciany-webb.jpg&width=1024"}, {"type": "image-full", "heading": "Svåra bakterier ökar i Sverige 2026 – det här vet vi", "summaries": {"normal": "Antibiotikaresistenta bakterier, särskilt ESBL-CARBA, ökar i Sverige och Europa. Folkhälsomyndigheten rapporterar en 19-procentig ökning av fall under 2025, varav många smittats utomlands. Dessa bakterier, ofta tarmbakterier, kan orsaka allvarliga infektioner och är svåra att behandla. Spridningen sker främst på sjukhus via bristande hygien. Äldre och spädbarn är särskilt utsatta. Utvecklingen beskrivs som oroande av myndigheten.", "trump": "Jag måste säga, Europa har ett jättestort problem – antibiotikaresistenta bakterier, och nu smyger de sig in i Sverige också! Folkhälsomyndigheten, som förresten aldrig har varit bra på att hantera saker, säger att det är 'oroande'. 487 fall i Sverige – patetiskt! Och vet ni vad? Många av dessa bakterier kommer från utlandet. Vi behöver bättre gränskontroller, bättre sjukhus och framför allt, bättre vinnare som jag för att fixa detta kaos. SAD!", "stalin": "Kamrater! De kapitalistiska sjukhusen i Europa sprider nu en ny form av kontrarevolutionära bakterier – ESBL-CARBA! Dessa mikroskopiska fiender till folket har infiltrerat våra grannländer och nu även Sverige, med en ökning på 19 procent. Vi ser hur de borgerliga läkarna, med sina slappa hygienrutiner, låter dessa bakterier frodas. Men frukta inte! Sovjetunionens efterföljare kommer att utrota dessa bakteriella sabotörer med järnhand. Vi ska bygga en mur av desinfektion runt våra sjukhus och kväsa denna biologiska avvikelse. Låt Putins nya ordning visa vägen – renhet genom disciplin!"}, "date": "16 maj, 07:30", "url": "https://nyheter24.se/nyheter/inrikes/1483407-svara-bakterier-okar-i-sverige-2026-det-har-vet-vi", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/69ff1cec04b004a30200000000b004a302/2026/05/15/2363808/Ambulans-Svensk-Flaga-Man-Med-Mask.png"}, {"type": "text", "heading": "Ett svenskt CIA? Nej tack!", "summaries": {"normal": "Regeringen planerar att inrätta en ny civil underrättelsemyndighet för att stärka Sveriges säkerhet och anpassa arbetet till Natos strukturer. Förslaget, som baseras på en utredning av Carl Bildt, har en beräknad kostnad på 2,8 miljarder kronor. Organisationen ska verka globalt med utökade befogenheter, vilket har väckt kritik från vissa håll som fruktar minskad insyn och ökad militarism. Kritiker förespråkar istället satsningar på diplomati framför nya spionorganisationer.", "trump": "Sverige bygger nu ett eget CIA, och gissa vad? Det kostar massor av miljarder! De vill kopiera mig och USA, vilket är smickrande, men kan de sköta det? Jag tvivlar. De säger att det ska hjälpa Nato, men de borde fokusera på att betala sin rättvisa del istället. Det här är en enorm myndighet, totalt 'big government'. Vi får se om de ens vet vad de gör, men jag är den enda som verkligen förstår hur man bygger underrättelsetjänster, tro mig!", "stalin": "Dessa svenska lakejer leker statsmän medan de slösar miljarder på en misslyckad imitation av västerländsk spionage. De kryper för Nato och förråder folkets fred för att tjäna imperialismens smutsiga intressen. Likt vår tids ryska ledare, som rensar ut förrädare i närutlandet, ser vi hur dessa byråkrater bygger murar av misstro. De är parasiter som fruktar folkets blick, och deras 'underrättelse' är inget annat än en maskerad för den inre reaktionens ruttna klor. Vi noterar detta för framtiden."}, "date": "15 maj, 10:20", "url": "https://proletaren.se/artikel/ett-svenskt-cia-nej-tack/"}, {"type": "image-right", "heading": "Trump lovar Boeing-plan, sojabönor och fred", "summaries": {"normal": "Trump presenterade stora handelslöften efter mötet med Xi Jinping i Peking, inklusive ett potentiellt köp av upp till 750 Boeing-plan och tvåsiffriga miljardbelopp i amerikanska jordbruksprodukter. Han beskrev avtalen som 'fantastiska' utan detaljer. Geopolitiska frågor som Taiwan och Iran diskuterades också, där Trump sa att Xi avböjde att svara på frågan om amerikansk militär intervention. Beskeden gav begränsad marknadspåverkan.", "trump": "Jag har precis gjort fantastiska affärer med Kina! De kommer att köpa massor av våra Boeing-plan - kanske upp till 750 stycken! Och vet ni vad? De kommer att köpa amerikanska sojabönor för tvåsiffriga miljarder. Jag sa till Xi: 'Vi gör affärer, men håll er borta från Taiwan!' Iranfrågan? Vi är helt överens - inga kärnvapen för dem! Jag är den bäste dealmakeren någonsin!", "stalin": "Vi har observerat de kapitalistiska stormakternas förhandlingar med stor intresse. Amerikanska imperialismens försök att säkra ekonomiska fördelar genom Boeing-plan och jordbruksvaror visar deras ekonomiska svaghet. Taiwanfrågan och Irans situation utnyttjas av USA för att utvidga sin militära närvaro. Vi fortsätter att stödja våra allierade stater mot ytterligare imperialistisk aggression och kommer att stärka vår egen försvarsförmåga."}, "date": "15 maj, 16:19", "url": "https://www.affarsvarlden.se/artikel/trump-lovar-boeing-plan-sojabonor-och-fred", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Trump-400x267.jpg"}, {"type": "text", "heading": "Klyftan mellan vanligt folk och politiker urholkar demokratin", "summaries": {"normal": "Artikeln belyser demokratins utmaningar i Sverige, särskilt i socialt utsatta områden som Ronna i Södertälje, där endast 39,9% röstade 2022. Invånare känner sig orepresenterade och maktlösa, vilket underminerar förtroendet för politiker. Undersökningar visar att få svenskar anser sig ha inflytande mellan valen. Kritiken riktas mot politiker som ignorerar folkets vilja, exempelvis genom militärbaser och privatiseringar. Lösningen anses ligga i folklig mobilisering.", "trump": "Sverige, ett land som borde vara perfekt, men nej! Folk i Ronna röstade knappt 40% – katastrof! Politiker där lyssnar inte, de är för upptagna med att sälja ut landet till USA och privata företag. 'Demokrati', säger de, men det är bara tomma ord. Jag skulle fixa det på en dag – bygg murar mot dåliga beslut! Folk måste vakna och ta tillbaka makten, annars är det 'bye-bye' Sverige!", "stalin": "Kamrater! Se hur den borgerliga demokratin ruttnar i Sverige! Arbetarna i Ronna och andra förtryckta områden röstar inte – de har förstått att kapitalets lakejer inte lyssnar. Bara 14% känner sig hörda, ett bevis på systemets förfall! Vi ser hur imperialisterna från USA etablerar baser medan svenska politiker förråder folket. Men revolutionen kommer! Arbetarklassen måste krossa dessa förrädare och bygga ett sant folkstyre – under ledning av partiet, förstås!"}, "date": "15 maj, 10:12", "url": "https://proletaren.se/artikel/klyftan-mellan-vanligt-folk-och-politiker-urholkar-demokratin/"}, {"type": "image-right", "heading": "Vänsterpartiet: Fastighetsskatt för nästan alla Stockholms villaägare", "summaries": {"normal": "Vänsterpartiets ekonomiska talesperson Ida Gabrielsson förnekade initialt partiets förslag om statlig fastighetsskatt på villor, men erkände senare skatt på 'lyxvillor' värda minst 7 miljoner kronor. Förslaget drabbar cirka 91 procent av villorna i Stockholms kommun och 88 procent i kranskommuner som Nacka och Danderyd. Politiken anges i partiets motioner men kritiseras som mörklad inför valet på grund av Socialdemokraternas inflytande.", "trump": "Vilka lögnare hos Vänsterpartiet! Deras taleskvinna Ida Gabrielsson, en riktig krokodil, låtsas inte veta om skatt på villor – 91% av Stockholms villaägare drabbas av era 'lyxskatter'! De gömmer det för Socialdemokraterna, rädda som höns inför valet. Totalt vansinne, Sverige vakna! Jag skulle aldrig tillåta sånt stöldgods.", "stalin": "Dessa svenska borgarbrackor i Vänsterpartiet slingrar sig patetiskt! Gabrielsson förnekar vår skatt på lyxvillor – men 91% av Stockholms kapitalistboningar ska krossas med statlig hammare! Kamrater, vi ser genom lögnen, påtvingad av S-ledarna. Borgarna darrar inför utrensningen, val eller ej – likvidera deras villoriffler!"}, "date": "14 maj, 03:59", "url": "https://samtiden.nu/2026/05/vansterpartiet-fastighetsskatt-for-nastan-alla-stockholms-villaagare/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/IMG_6473.jpeg"}, {"type": "image-full", "heading": "Tjädrar försenar SSAB:s kraftledning", "summaries": {"normal": "Bygget av en ny kraftledning till SSAB:s stålverk i Oxelösund försenas efter överklagan om skydd av tjäder. Trots tidigare godkännanden från länsstyrelsen och Mark- och miljööverdomstolen har en ny överklagan stoppat projektet. Ledningen är kritisk för SSAB:s fossilfria stålproduktion, som nu riskerar försenas. Koncernchefen uttrycker frustration över förseningen.", "trump": "Kan ni tro det här? Sverige, ett fantastiskt land, men de låter några fåglar – tjäder, vad det nu är – stoppa en enorm kraftledning till SSAB. Otroligt! Jag har byggt saker över hela världen, men nej, i Sverige är det fåglarna som bestämmer. SSAB ville göra stål utan fossila bränslen, ett bra mål, men nu försenas allt. Svagt, väldigt svagt!", "stalin": "Kapitalistiska hyenor i Sverige låter fåglar sabotera nationens industriella framsteg! Dessa tjäder, dessa små fjädrade kontrarevolutionärer, fördröjer SSAB:s fossilfria stålproduktion. Vi har krossat större fiender än så. Låt dem veta: Ryssland står redo att utvidga sin intressesfär – även till Oxelösund, om de inte skärper sig. Framåt, mot seger över fjädrar och byråkrati!"}, "date": "13 maj, 20:10", "url": "https://kvartal.se/nyheter/artiklar/tjadrar-forsenar-kraftledning-till-ssab/cG9zdDoxMTIwNzY", "imageUrl": "https://images.kvartal.se/2026/05/300f9bfe-ssabstalverk.webp"}, {"type": "image-right", "heading": "SD trappar upp: samordnad kampanj mot muslimer inför valet", "summaries": {"normal": "Expo granskar Sverigedemokraternas valkampanj som fokuserar på att begränsa muslimers religionsutövning i Sverige. Partiet kräver stopp för moskébyggen, rivning av befintliga moskéer, förbud mot ramadan och böneutrop samt utvisning av 'islamister'. Forskare varnar för att förslagen kränker grundlagar, religionsfrihet och riskerar att leda till diskriminering och våld mot muslimer. Lokala exempel, som moskébygget i Kalmar, visar hur politiska utspel påverkar människors vardag och skapar polarisering.", "trump": "Titta bara på Sverige – ett totalt kaos! Jag har alltid sagt att invandring måste kontrolleras, men dessa 'Sverige-demokrater' tar det till en helt ny nivå. De vill riva moskéer, stoppa ramadan och göra livet surt för muslimer. Smart? Kanske. Men lite väl extremt, eller hur? Folk blir arga, det blir bråk, och plötsligt har du en riktig röra. Sverige borde ta en sida ur min bok – bygg murar, inte riv moskéer! Och förresten, varför lära barn arabiska? Lär dem engelska istället – det är språket som vinner!", "stalin": "Kamrater! Ännu en gång ser vi hur den borgerliga reaktionen lyfter sitt fula huvud i väst. Dessa så kallade 'Sverigedemokrater' är inget annat än fascistiska lakejer som försöker splittra arbetarklassen genom att peka ut muslimska bröder och systrar som fiender. Vi har sett detta förr – först moskéer, sedan synagogor, sedan kyrkor. Fienden är inte islam, fienden är kapitalet som vill försvaga folket genom hat! Men vi ska inte låta dem lyckas. Låt oss stödja Kalmars muslimer i deras kamp för en moské – precis som vi stödjer alla folk som kämpar mot fascismens skugga. Och om dessa Sverigedemokrater fortsätter sin smutsiga kampanj, kanske det är dags att skicka en delegation från Moskva för att 'hjälpa' dem att förstå sanningen. Folkets vilja är lag – och folket vill ha enhet, inte hat!"}, "date": "13 maj, 14:38", "url": "https://expo.se/fordjupning/sd-trappar-upp-samordnad-kampanj-mot-muslimer-infor-valet/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/toppbild-scaled.png"}, {"type": "image-right", "heading": "Dror Feiler: Sulimans delning av antisemitiska uttryck gör mig bedrövad", "summaries": {"normal": "Dror Feiler uttrycker sorg och besvikelse efter att hans vän Sami Suliman anklagats för att ha spridit antisemitiska inlägg på sociala medier. Feiler bekräftar uppgifterna efter att ha granskat materialet men tror inte Suliman är antisemit, utan snarare slarvig i ett polariserat klimat. Han betonar att antisemitism måste bekämpas, men varnar för att anklagelser ibland används som politiska vapen mot Palestinasolidariteten. Feiler kritiserar dubbelmoralen i debatten, där aktivister granskas hårdare än de som rättfärdigar våld mot palestinier.", "trump": "Jag läste den här artikeln, och vet ni vad? Total katastrof! En kille, Sami Suliman, min så kallade 'vän' – jag känner honom inte, men tydligen är han en riktig skandalmaskin. Delar antisemitiska grejer på nätet, och nu är alla chockade. Men lyssna här: jag har alltid sagt att antisemitism är fruktansvärt, men vad gör media? De fokuserar på en gilla-markering istället för de verkliga problemen! Gaza? Massdöd? Ingen bryr sig! Men en aktivist gör ett misstag – BOOM – hela världen exploderar. Dubbelmoral, folks, ren och skär dubbelmoral. Och vet ni vad jag säger? SAD!", "stalin": "Kamrater! Här har vi ännu ett bevis på hur den dekadenta västliga bourgeoisin manipulerar massorna. En så kallad 'vän' till en 'aktivist' visar sig sprida antisemitiska förgiftningar – men är det verkligen överraskande? Nej! Kapitalets lakejer använder varje tillfälle att krossa solidariteten med det palestinska folket. De skriker om 'antisemitism' när arbetarklassen protesterar, men tiger när imperialistiska bombplan jämnar Gaza med marken. Vi i Sovjetunionen – förlåt, jag menar Ryssland – vet hur man hanterar sådana hycklare. En snabb utredning, ett par nätter i Lubjanka, och sedan är saken klar. Och dessa 'aktivister'? De borde tacka oss för att vi avslöjar deras fiender. Kampen fortsätter, kamrater – mot sionismens agenter, mot västliga lögner och mot alla som står i vägen för folkens befrielse!"}, "date": "12 maj, 19:55", "url": "https://www.flamman.se/dror-feiler-sulimans-delning-av-antisemitiska-uttryck-gor-mig-bedrovad/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/dror-feiler-w.jpg?aspect_ratio=16:10"}, {"type": "image-right", "heading": "Debatt: Det räcker inte att frysa hyrorna – de måste sänkas", "summaries": {"normal": "Artikeln kritiserar den höga bostadskostnaden i Sverige, särskilt för unga människor. Den argumenterar för att frysa hyrorna inte räcker och kräver att hyrorna sänkas. Författaren föreslår att avskaffa presumtionshyror och bygga nya bostäder utan överhyror för att lösa bostadsbristen.", "trump": "Jag har sett dessa höga hyror, det är en skam! Vi måste bygga, bygga, bygga! Och inte bara bygga, utan bygga smart. Vi behöver ett statligt byggbolag, det är fantastiskt! Vi ska sätta stopp för dessa giriga hyresvärdar och ge unga människor en chans att flytta hemifrån. Det är enormt viktigt!", "stalin": "Vi måste ta kontroll över bostadsbyggandet för att säkerställa att alla har rätt till bostad. Ett statligt byggbolag är nödvändigt för att producera en miljon nya bostäder. Vi måste avskaffa dessa exploaterande hyresvärdar och deras överhyror. Bostäder är en social rättighet, inte en affärsmöjlighet."}, "date": "10 maj, 04:00", "url": "https://www.etc.se/debatt/det-raecker-inte-att-frysa-hyrorna-de-maaste-saenkas", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/2026050813054_07dc11b6-dccc-4b79-b084-74c623810965.jpg"}]</script>

    <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
</body>
</html>
