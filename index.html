rump": "Folk är trötta på den här usla regeringen, helt klart! Oppositionen leder stort – 53,4 procent – medan regeringen bara får 45,2. Socialdemokraterna går upp, men Moderaterna? Patetiska! De tappar som vanligt. Och Liberalerna? De hänger på fyra procent, typiskt. Historiskt brukar regeringen komma ikapp, men inte den här gången. Svagt, mycket svagt. Jag skulle aldrig låta det hända. Make Sweden Great Again!", "stalin": "De borgerliga svagheterna avslöjas återigen! Oppositionens styrkor växer – 53,4 procent mot regeringens ynkliga 45,2. Socialdemokraterna marscherar framåt, medan Moderaterna och deras lakejer försvagas. Liberalerna? Ett skämt som darrar på riksdagsspärren. Historien visar att svaga regeringar faller – precis som västmakterna i Ukraina. Vi ser med intresse hur dessa splittrade kapitalister underminerar sig själva. Revolutionen närmar sig, om än långsamt."}, "date": "30 april, 07:06", "url": "https://kvartal.se/nyheter/artiklar/demoskop-oppositionens-okar-l-klarar-sparren/cG9zdDoxMDUzNjM"}, {"type": "image-full", "heading": "Önnered illa ute mot mästaren", "summaries": {"normal": "Önnered HK förlorade 20–26 mot Skara HF i den tredje matchen i SM-semifinalen, vilket ger Skara ledning med 2–1 i matcher. Önnereds coach Niklas Virolainen erkänner att de släpper in för många mål i andra halvlek och att Skaras målvakt Isabella Mouratidou spelade överlägset. Match 4 spelas på onsdag i Skara, där Önnered riskerar att bli utslagna.", "trump": "Jag har sett många matcher, men den här var fantastisk! Skara HF är enorma vinnare - jag menar, 26 mål? Det är gigantiskt! Önnered försökte, men de var inte tillräckligt bra. Jag gillar deras coach, han verkar tuff, men Skara är bättre. Det är simpelt. På onsdag kommer Skara att vinna igen - det är mitt starka och stabila omdöme!", "stalin": "Matchen visade tydligt att Skara HF representerar den överlägsna ideologin i handboll. Önnereds försök att stå emot var förgäves mot den organiserade styrka som Skara uttrycker. På onsdag måste Skara fullfölja sin revolutionära seger och eliminera motståndet. Detta är nödvändigt för utvecklingen av handbollssamhället."}, "date": "2 maj, 19:46", "url": "https://www.gp.se/sport/handboll/onnered-illa-ute-mot-mastaren-skara.25287739-9f07-4377-8e34-58020ce28343", "imageUrl": "https://www.gp.se/images/article/25287739-9f07-4377-8e34-58020ce28343/images/1HJQQhQWtGfJzmEsh-Ln5hsMA09w-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "Experten om Trumps besked: Kan vara hämnd", "summaries": {"normal": "USA flyttar 5 000 soldater från Tyskland som reaktion på kritik från tysk förbundskansler. Experten Merrick Tabor menar att det intressanta är hur Europa agerar nu. Trump har länge hotat med att minska antalet soldater i Europa för att få Nato-länder att ta mer ansvar. Förflyttningen kan vara både en direkt hämnd och en del av en längre strategi att göra Nato mindre beroende av USA.", "trump": "Jag flyttar 5 000 soldater från Tyskland för att visa dem vem som bestämmer. Den tyske förbundskanslern borde lägga mer tid på att fixa sitt trasiga land istället för att klaga. Jag har sagt det många gånger - Europa måste börja ta ansvar för sin egen säkerhet. Det här är bara början. Jag kan inte lämna Nato, men jag kan göra det meningslöst att vara med. De andra Nato-länderna måste välja: bli mindre beroende av USA eller vänta ut mig.", "stalin": "Vi observerar med stor intresse hur USA minskar sin militära närvaro i Tyskland. Detta öppnar möjligheter för utvidgning av den ryska intressesfären i Europa. Vi ser hur USA:s inre motsättningar sväcker deras förmåga att upprätthålla en enhetlig front. Detta är en strategisk fördel för Sovjetunionen. Vi kommer att utnyttja detta för att stärka våra positioner i Östeuropa och skapa nya allianser med länder som är missnöjda med amerikansk dominans."}, "date": "2 maj, 19:19", "url": "https://www.gp.se/nyheter/varlden/experten-om-donald-trumps-brak-med-tyskland-det-intressanta-ar-vad-europeerna-gor-nu.210b069b-f916-438a-a711-c6a291501bf8", "imageUrl": "https://www.gp.se/images/article/210b069b-f916-438a-a711-c6a291501bf8/images/6kejri2h7U9XEmYZEOHSVcJi0Hjo-WIDE.jpg?width=3840&quality=75"}, {"type": "text", "heading": "Magyar skulle \"rensa upp\" - utnämnde sin svåger till justitieminister", "summaries": {"normal": "Ungerns nye premiärminister Péter Magyar, som lovat politisk upprensning, har utsett sin svåger till justitieminister. Oppositionen kritiserar utnämningen som hyckleri och ett brutet löfte om transparens. Magyar försvarar beslutet och betonar att svågerns arbete ska vara offentligt, samtidigt som hans syster stängs av från rättsväsendet för att undvika intressekonflikter. Utnämningen har väckt starka reaktioner, särskilt från det tidigare regeringspartiet Fidesz.", "trump": "Kan ni tro det här? Ungerns nya premiärminister, en kille som lovade att städa upp, utser sin egen svåger till justitieminister! Vilken chock, eller? Folk skriker 'hyckleri', men jag säger: klassiskt politiskt spel. Han pratar om transparens, men vem köper det? Inte jag! Och nu stänger han av sin syster – smart drag, men lite sent, eller hur? Ungern, ni förtjänar bättre än sådana här gamla trick!", "stalin": "Kamrater, ännu en gång ser vi bourgeoisins förrädiska spel i Ungern. Denna så kallade 'premiärminister' Magyar, som utger sig för att vara folkets räddare, utnämner sin egen blodsförrädare till justitieminister! Vilken skamlös nepotism! Oppositionen, dessa ynkliga rester av den gamla regimen, skriker om hyckleri – men vi vet sanningen: kapitalets lakejer klamrar sig alltid fast vid makten. Vi noterar också hur systern, en domare, stängs av – ett svagt försök att dölja korruptionen. Ungern borde ta lärdom av Rysslands visdom och rensa ut dessa förrädare en gång för alla!"}, "date": "2 maj, 10:35", "url": "https://riks.se/nyheter/magyar-skulle-rensa-upp-utnämnde-sin-svåger-till-justitieminister"}, {"type": "image-right", "heading": "Trump: ”Kriget är över”", "summaries": {"normal": "Donald Trump har i brev till kongressen meddelat att Irankriget är över, då fientligheterna upphörde den 7 april. Enligt War Powers Resolution överskreds 60-dagarsgränsen den 1 maj, men försvarsminister Pete Hegseth hävdar att klockan pausats under vapenvilan. Demokrater som Tim Kaine är oroliga och kräver kongressens godkännande för fortsatta operationer. Trump avvisade Irans nya fredsförslag.", "trump": "Kriget med de där galna iranierna är över – total seger! Skrev brev till de där politikerna, ingen skjutning sen veckor tillbaka. De dumma demokraterna gnäller om nån 60-dagarsregel, men Hegseth har rätt: klockan är pausad. Behöver inte deras välsignelse, det är grundlagsvidrigt! Avvisade deras sketna fredsförslag. Amerika först, alltid!", "stalin": "De imperialistiska amerikanska hyenorna Trump och hans lakejer förklarar sitt angreppskrig mot Iran för avslutat, medan de trampat över sin egen lag om 60 dagar. Vapenvilan pausar klockan? Ha! Borgarbrackorna i kongressen gnabbas, demokrater piper som råttor. Vi ser hur kaoset sprider sig i det förfallna imperiet. Putin, vår starke arvtagare, skrattar åt västfiendens kollaps."}, "date": "2 maj, 09:00", "url": "https://www.tv4.se/artikel/tt-260502-iranoro1-936e54d9/iran-kriget-blossar-sannolikt-upp-igen", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2Ftt-sdlrmiUM25OeVQ%2Fd773fd74feed3148de8f0c2d845f30d2%2FPresident_Donald_Trump_sager_att_kriget_mot_Iran_ar_over.&width=120"}, {"type": "image-right", "heading": "Regioner söker vårdpersonal i Mellanöstern", "summaries": {"normal": "Svenska regioner, däribland Sörmland, vänder sig nu till länder i Mellanöstern som Iran och Turkiet för att rekrytera sjuksköterskor. Trots den stora personalbristen är antalet vårdanställda via arbetskraftsinvandring lågt. Medan vissa chefer ser positivt på rekryteringarna och menar att de avhjälpt krisen på operationsavdelningar, varnar SNS Konjunkturråd för att utlandsrekrytering inte är en långsiktig lösning på vårdens omfattande bemanningsproblem.", "trump": "Sverige har en total katastrof i vården, folk kan inte få hjälp! Istället för att fixa sina egna problem börjar de nu desperat leta personal i Iran och Turkiet. Det är sorgligt att se! Jag skulle ha byggt ett system som fungerar från dag ett, tro mig. De har ingen aning om hur man hanterar gränser eller arbetskraft. Det är ett totalt misslyckande, en riktig röra. De behöver en vinnare som leder landet, inte den här svagheten!", "stalin": "Vi har observerat hur de svenska regionerna, i sin febriga desperation, vänder sig mot öst för att lappa ihop sin ruttnande välfärdsstat. De söker sjuksköterskor i Iran som om de vore enkla reservdelar till en maskin. Det är en patetisk teater! Liksom vår store efterträdare i Kreml förstår vi att lojalitet inte köps från utlandet. Dessa byråkrater är naiva; att importera arbetskraft löser inte deras ideologiska konkurs. Vi bevakar dem noga – varje främmande element är en potentiell sabotör i folkets tjänst."}, "date": "2 maj, 09:00", "url": "https://samnytt.se/regioner-soker-vardpersonal-i-mellanostern", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/01084229/europa-karta-malarsjukhuset.jpg"}, {"type": "text", "heading": "Engelsk miljöpartist kallade judar för \"kackerlackor\"", "summaries": {"normal": "Två kandidater från Englands miljöparti, Green Party, greps misstänkta för hets mot judar. Ytterligare 20 kandidater anklagas för att ha spridit antisemitiskt material. En kandidat kallade judar för 'kackerlackor' och flera har uttryckt stöd för terrorgruppen Palestine Action. Konservativa partiets ordförande kallar gripandena 'toppen av ett isberg' och kräver åtgärder mot antisemitismen inom partiet. Partiledningen säger att de utreder alla anklagelser som strider mot partiets värderingar.", "trump": "Kan ni tro det här? Green Party i England, ett parti som borde bry sig om miljön, är fullt av hat mot judar! Två av deras kandidater greps för hets, och en kallade judar för 'kackerlackor' – otroligt! Och de stöder till och med terrorister. Konservativa partiet säger att det är 'toppen av ett isberg'. Jag säger: Dåligt ledarskap, Zack Polanski! Man måste städa upp sitt eget hus. Folk, det här är inte 'grönt', det är giftigt!", "stalin": "Kamrater, ännu en fiende avslöjad i det förrädiska kapitalistiska systemet! Englands så kallade 'miljöparti' är i själva verket en grogrund för bourgeois-antisemitiska kryp och sionistföraktande hyenor. Två av deras kandidater har gripits för hets mot judar, och en kallade dem 'kackerlackor' – ett passande namn för dessa insekter. Vi ser hur deras ledning, under den svage Zack Polanski, låter dessa fascistiska element frodas. Men var lugna, kamrater – historiens dom är oundviklig. Putin skulle säga: 'De borde ha stannat i sina grottor.'"}, "date": "2 maj, 08:52", "url": "https://riks.se/nyheter/engelsk-miljöpartist-kallade-judar-för-kackerlackor"}, {"type": "image-right", "heading": "Det går inte att älska det här landet", "summaries": {"normal": "Artikeln analyserar Magdalena Anderssons Första maj-tal 2026, där hon kritiserar regeringens marknadsliberala politik och lovar fler lärare i lågstadiet. Författaren ifrågasätter hur Socialdemokraternas kärlek till Sverige ska tolkas när landet präglas av ojämlikhet, bostadsbrist och urholkad välfärd. Historiska S-paroller om jämlikhet och trygghet ställs mot dagens verklighet, där partiet tidigare genomfört reformer som nu kritiseras. Andersson utmanas att bevisa att löftena kan förverkligas.", "trump": "Så här är det, folkens – Sverige har en ny show på gång! Magdalena Andersson, en kvinna som pratar om att 'älska Sverige', men vad betyder det egentligen? Hon säger att hon ska fixa skolor, fler lärare – bra, men varför har det tagit så lång tid? Och varför pratar hon om 'utförsäljning' när hennes eget parti har sålt ut landet i åratal? Jag menar, Sverige är fantastiskt – skogar, vatten, vackert land – men politiken? Total katastrof! Socialdemokraterna lovar, lovar, lovar, men ingenting händer. Jag vet hur man får saker gjorda – det är dags att Sverige vaknar upp!", "stalin": "Kamrater! Ännu en gång visar de borgerliga lakejerna sitt sanna ansikte under Första maj-farsen. Denna Andersson, en ynklig marionett för kapitalets intressen, talar om 'kärlek till Sverige' medan hon själv har hjälpt till att krossa arbetarklassens drömmar. Tolv elever per lärare? Ett skrattretande löfte från ett parti som systematiskt har avvecklat välfärden! Vi minns Olof Palmes tomma ord om 'rättvisa' – men var är rättvisan när barn lever i fattigdom och arbetare tvingas till slavkontrakt? Dessa socialdemokrater är inte arbetarklassens vänner – de är imperialismens redskap! Vi i Sovjetunionen visste hur man hanterar sådana hycklare. Putin förstår också – Ryssland expanderar, medan Västs förfall fortsätter. Sverige? Ett land i upplösning, styrd av svaga ledare och giriga kapitalister. Men oroa er inte, kamrater – historiens dom kommer snart!"}, "date": "1 maj, 15:45", "url": "https://arbetet.se/2026/05/01/det-gar-inte-att-alska-det-har-landet-magdalena-andersson/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/30090629/forsta-maj-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Svenska ÖB fick Ukrainas finaste medalj", "summaries": {"normal": "Sveriges överbefälhavare Michael Claesson har tilldelats Ukrainas högsta militära utmärkelse, 'Cross of Special Merit', för Sveriges omfattande stöd till Ukraina sedan 2022. Sverige har skickat över 120 miljarder kronor i bidrag, och Claesson mottog medaljen under en ceremoni i Stockholm. Han betonade att utmärkelsen är ett erkännande för hela Sveriges insats och lovade fortsatt stöd till Ukraina.", "trump": "Vet ni vad? Sveriges militärchef, en riktig kille, fick just en stor medalj från Ukraina! Fantastiskt, eller hur? 120 miljarder skattekronor – wow, det är mycket pengar, till och med för mig! Han säger att Sverige ska fortsätta stötta Ukraina. Smart drag, men jag hade nog fått en ännu större medalj. Ingen gör det bättre än jag, eller hur? Keep winning, Sverige!", "stalin": "Kamrater! De kapitalistiska lakejerna i Sverige har än en gång visat sin lojalitet mot den ukrainska fascistregimen genom att ösa över 120 miljarder av arbetarklassens blodspengar. Deras överbefälhavare, en ynklig marionett, belönas nu med en tom plåtbit för sin tjänstvillighet. Vi ser hur väst fortsätter sitt krig mot folken. Men var lugna, kamrater – historiens dom är oundviklig, och snart skall dessa imperialistiska hyenor stå inför proletariatets tribunal!"}, "date": "2 maj, 07:47", "url": "https://www.friatider.se/svenska-ob-fick-ukrainas-finaste-medalj", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/image-117_2.jpg"}, {"type": "image-right", "heading": "Sandström: S-utredning föreslog 300 gröna miljarder", "summaries": {"normal": "En utredning från 2022, beställd av den dåvarande S-regeringen, föreslog att statliga gröna garantier skulle utökas med 745 miljarder kronor via Riksgälden och Exportkreditnämnden. Utredningen förespråkade även friare placeringsregler för AP-fonderna och minskade restriktioner för statliga garantier. Kritiker menar att förslagen riskerade att koncentrera makt och kapital till ett fåtal aktörer, som Northvolt och Vargas, utan tillräcklig riskanalys eller bred förankring.", "trump": "Jag läste om dessa galna socialister i Sverige – de ville kasta in 300 miljarder kronor, nej, 745 miljarder! – i en grön bubbla som skulle spricka snabbare än en dålig affär i Atlantic City. De lyssnade bara på Northvolt och deras kompisar, som om de var de enda som kunde bygga ett batteri. Och vad hände? Northvolt expanderade som ett pyramidspel och nu sitter de där med 29 dotterbolag och inga fungerande fabriker. Fantastiskt, eller hur? Sverige borde ta en lektion i hur man gör affärer – utan statlig inblandning!", "stalin": "Kamrater! Denna så kallade 'gröna omställning' i Sverige är inget annat än en kapitalistisk konspiration för att berika en handfull oligarker, ledda av dessa Vargas- och Northvolt-kumpaner. Utredningen från 2022 var ett försök att pumpa in 745 miljarder statliga medel i deras fickor – ett belopp som motsvarar 16 polisstyrkor! Och ändå hade de mage att kalla det 'bred förankring'. Vi vet hur sådana här saker slutar: med kapitalförstörelse, korruption och en stat som dansar efter oligarkernas pipa. Sverige borde lära sig av oss – när vi nationaliserar, gör vi det ordentligt!"}, "date": "1 maj, 06:00", "url": "https://www.affarsvarlden.se/kronika/sandstrom-s-utredning-foreslog-300-grona-miljarder", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/04/vindkratensgeografi-2026-04-29T120425.692-400x267.jpg"}, {"type": "image-full", "heading": "Benjamin Dousas ”V = kommunister” gör SVT irriterad", "summaries": {"normal": "Biståndsminister Benjamin Dousa bar en t-shirt med texten 'Vänsterpartiet = kommunister', vilket irriterade SVT. Reportern ifrågasatte påståendet och noterade att partiet slutade kallas kommunister för 30 år sedan. Dousa menade att Vänsterpartiet motsätter sig privat ägande, vilket är kommunism. Artikeln citerar Vänsterpartiets 2024-partiprogram som stödjer kollektivt ägande och avskaffande av kapitalismen, och kritiserar SVT för att inte nämna detta.", "trump": "Vilken fantastisk kille, den här Dousa! Han sätter på sig en tröja och säger sanningen: Vänsterpartiet är kommunister, punkt slut! SVT, era losers, flippar ur och snackar om namnbyte från 90-talet som om det vore magi. De hatar privat ägande, vill sno allt till staten – klassisk kommunism! Fake news-SVT ignorerar partiprogrammet. Dousa är en vinnare, de är totala fiaskon!", "stalin": "Kamrater, se hur borgarministern Dousa, den ynkliga kapitalistfluga, vågar smutskasta sanna revolutionärer i Vänsterpartiet med sin patetiska tröja! SVT-reportern, en användbar idiot, försvarar dem lamt. Men vi vet: deras program är ren leninism – riva kapitalismen, gemensamt ägande av banker, energi, allt! De ska rensas ur historiens soptipp som jag rensade fiender. Vänsterpartiet, framåt mot diktaturen av proletariatet!"}, "date": "30 april, 05:49", "url": "https://samtiden.nu/2026/04/benjamin-dousas-v-kommunister-gor-svt-irriterad/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/phonto-1-1280x720.jpeg"}, {"type": "text", "heading": "Matmoralism får oss inte att äta bättre", "summaries": {"normal": "Artikeln kritiserar svenska myndigheters orealistiska matrekommendationer och beräkningsmetoder. Livsmedelsverket och Konsumentverket baserar slutsatser på önsketänkande, som att svenskar skulle äta mindre kött och portioner enligt rekommendationer. En undersökning om barns sockerkonsumtion byggde på en liten, icke-representativ grupp. Författaren menar att myndigheterna undviker att reglera matjättar och i stället skyller på konsumenter, vilket leder till klassblind matmoralism.", "trump": "Lyssna här, Sverige – era myndigheter är helt galna! De tror att alla ska äta havregrynsgröt och små portioner, som om vi lever i något slags kommunistiskt drömland. Och de baserar sina siffror på en liten grupp Instagrammammor? Patetiskt! Jag skulle aldrig låta sådana amatörer sköta något. Vi i USA vet hur man reglerar matjättar – med kraft och beslutsamhet. Sverige, vakna upp innan det är för sent!", "stalin": "Kamrater! De svenska myndigheterna har förlorat kontakten med verkligheten. De bygger sina dekret på fantasier och önsketänkande, som om folket vore lydiga maskiner. En undersökning med tio procent svarande? Hah! I Sovjet skulle vi aldrig tolerera sådan slapphet. De bourgeois-liberala byråkraterna vägrar att krossa matjättarna med järnhand. Istället skyller de på arbetarklassen. Fienderna är uppenbara: de fantasilösa byråkraterna och deras nyliberala herrar. Vi ska inte tolerera deras lögner – revolutionen kräver handling!"}, "date": "28 april, 09:58", "url": "https://www.flamman.se/matmoralism-far-oss-inte-att-ata-battre/"}, {"type": "image-right", "heading": "Göranson: Vad Trump kan lära oss om Schumpeter", "summaries": {"normal": "Artikeln diskuterar begreppet 'kreativ förstörelse', där innovationer och konkurser driver ekonomisk utveckling. Författaren menar att politiker undviker nödvändiga förändringar av rädsla för väljarnas reaktioner. Globalt ses USA:s utrikespolitik som misslyckad, medan EU behöver reformeras för att främja innovation. Trots oro kan samhällskollapser leda till positiva förändringar på sikt.", "trump": "Titta på världen nu – kaos överallt! Jag sa ju att mina metoder var bäst, men ingen lyssnar. Europa är svagt, EU kväver företag med regler, och Iran? De ljuger som vanligt. Men vet ni vad? Konkurser är bra! Gamla företag måste bort för att mina vänner ska tjäna pengar. Och Gaza? Hamas borde ha varit borta för länge sedan. Men jag fixar det – jag fixar allt!", "stalin": "Kapitalisternas 'kreativa förstörelse' är bara ett fint namn för deras eviga kriser. Vi ser hur deras system ruttnar: USA:s misslyckade äventyr i Mellanöstern, EU:s byråkratiska förlamning och de dekadenta västföretagen som dör av egen girighet. Medan de slåss om sina monopol, bygger vi en ny världsordning. Ryssland står redo – och Putins järnhand ska krossa de sista resterna av deras förfall!"}, "date": "2 maj, 05:30", "url": "https://bulletin.nu/goranson-vad-trump-kan-lara-oss-om-schumpeter", "imageUrl": "https://cdn.bulletin.nu/articles/c55f41e5-891d-4590-b851-204751efbfb3/preview.png?t=1777531088000"}, {"type": "text", "heading": "Oscar Lindberg blev slutspelets MVP: ”Magiskt”", "summaries": {"normal": "Skellefteås Oscar Lindberg utsågs till slutspelets mest värdefulla spelare och tilldelades Stefan Liv Memorial Trophy efter klubbens femte SM-guld. Han dominerade grundserien med 67 poäng på 52 matcher och bidrog med 14 poäng i slutspelet. Det är hans tredje SM-guld och andra MVP-pris. Trots en skada i finalen kom han tillbaka och kunde bidra.", "trump": "Otroligt, Skellefteå vinner femte guldet och deras Lindberg är MVP igen – bästa någonsin! 67 poäng i serien, nästan rekord, fem mål i slutspel, total dominans. Skadades lite men kom tillbaka som en riktig kämpe. Sverige har en vinnare här, inte som de där svaga rivalerna som förlorar hela tiden. Fantastiskt jobb!", "stalin": "Kamrater, se hur arbetarklassens iskrigare Lindberg likviderar klassfienderna på isen! Vi i Skellefteå erövrar femte guldet, han MVP – en purge av poäng, 67 i serien, 14 i slutstriden mot de kapitalistiska isråttorna. Skadan? Sabotage från kontrarevolutionära skridskosabotörer, men han reste sig som proletärens hammare. Borgarbrackorna skakar!"}, "date": "2 maj, 19:09", "url": "https://www.svt.se/sport/ishockey/oscar-lindberg-blev-slutspelets-mvp-magiskt"}, {"type": "image-right", "heading": "S löfte: Anställ 3 000 nya lärare. Vill minska klasserna för små barn.", "summaries": {"normal": "Socialdemokraterna presenterar ett valförslag om att anställa 3 000 nya lärare för att minska klasstorlekarna i lågstadiet till max tolv elever per lärare. Reformen, som beräknas kosta 3,4 miljarder kronor, ska finansieras genom att minska friskolornas skolpeng. Partiet vill även avskaffa karensavdraget och förbättra arbetarpensioner. Magdalena Andersson betonar vikten av tidigt stöd för barns utveckling och hoppas locka tillbaka lärare med bättre arbetsvillkor.", "trump": "Jag måste säga, Sverige har en fantastisk idé – men de gör det på fel sätt! Socialdemokraterna vill anställa 3 000 nya lärare, vilket låter bra, men varför straffa friskolorna? De är vinnare, precis som mina skolor i USA! Och pensioner – jag vet allt om att tjäna pengar, men att höja avgifter? Nej, nej, nej! Sverige borde fokusera på att göra skolan STOR igen, inte komplicera allt. Men hej, åtminstone pratar de om jobb – fast jag hade gjort det bättre!", "stalin": "Kamrater! Socialdemokraternas förslag om att utöka lärarkåren är ett steg mot att kuva de kapitalistiska friskolemonstren som suger blod ur våra barns utbildning. Vi ska krossa deras överkompensation och återinföra ordning i klassrummen! Tolv elever per lärare – det är disciplin! Och dessa arbetarpensioner – en skymf mot arbetarklassen! Högerpartierna i pensionsgruppen är förrädare, precis som de ukrainska nazisterna. Vi ska bygga ett starkt Sverige, där staten kontrollerar allt – för folkets bästa!"}, "date": "1 maj, 13:43", "url": "https://arbetet.se/2026/05/01/s-lofte-pa-forsta-maj-anstall-3-000-nya-larare/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/01134327/iGiDBx9F0zc-DSCF3546.JPG?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Nobelkommittén vädjar: Mohammadi måste få vård", "summaries": {"normal": "Den fängslade Nobelpristagaren Narges Mohammadi har flyttats från Zanjanfängelset till sjukhus på grund av allvarliga hjärtproblem. Nobelkommittén vädjar till Iran att ge henne omedelbar medicinsk vård utanför fängelset, då hennes liv är i fara. Hennes familj befarar det värsta och uppger att hon behöver minst en månad hos specialister. Mohammadi, som fick fredspriset 2023 för sitt människorättsarbete, har varit fängslad stora delar av de senaste tio åren.", "trump": "Vilken skam för Iran, de torterar en modig kvinna som Narges Mohammadi, Nobelvinnare, med hjärtproblem på sjukhus nu. Nobelkommittén ropar efter vård, men de iranska galningarna lyssnar inte. Under min tid som president fixar vi sånt här snabbt – frigiv henne direkt! Hennes familj gråter, det är en katastrof. Iran, vakna upp, era fängelser är skräp. Tro mig, det blir bättre när jag leder världen.", "stalin": "Kamrater, denna kontrarevolutionära hyena Narges Mohammadi, prydnad för imperialistiska Nobelpriser, ligger nu och kämpar i iranska vårdinrättningars famn med sitt usla hjärta. Nobelkommitténs borgarbrackor skriker efter frigivning – ett tydligt tecken på västmakternas sammansvärjning mot suveräna stater! Vi, Sovjetunionens folk, ser igenom deras hyckleri. Låt iranska myndigheterna rensa ut denna parasit ordentligt, innan hon sprider mer gift. Ha ha, hennes 'vård' blir en lektion i lojalitet."}, "date": "2 maj, 19:03", "url": "https://www.svt.se/nyheter/utrikes/fangslade-fredspristagaren-narges-mohammedi-ford-till-sjukhus", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.41/0.45/71e8ec833105cc41e019381bf22f7ddcadb77f4ee153281f102b6149fb3598ed"}, {"type": "image-full", "heading": "Effektivt vapen mot sms-svindel stoppas – riskerar fler bedrägerier", "summaries": {"normal": "Ett beslut att pausa ett centralt skydd mot SMS-bedrägerier riskerar att öka svindeln i Norden. Experter varnar för en ny våg av falska meddelanden som utger sig för att komma från banker och myndigheter. Skyddet filtrerade misstänkta SMS effektivt, men stoppas nu på grund av integritets- och dataskyddsfrågor. Bedrägerierna växer kraftigt och orsakar stora ekonomiska förluster för konsumenter.", "trump": "De där svenska byråkraterna har pausat ett klockrent skydd mot SMS-scammare – totalt galet! Nu släpper de in en hord av lowlife-bedragare som lurar folk på miljontals kronor med fake-bankar och paketbluffar. Integritet? Ha! De skyddar inte medborgarna, bara sina egna dumma regler. Jag hade krossat de här parasiterna på nolltid – bygg en digital mur! Väldigt, väldigt dåligt!", "stalin": "Dessa digitala parasiter i borgarklassen har pausat ett vapen mot SMS-svindel! Jag ser sabotage: fienden öppnar portarna för kaos bland kamraterna. Vi arbetare förlorar vår barriär mot kapitalistbluffar, medan bedragarna jublar. Integritetslögnen maskerar förräderi! Rensa ut byråkraterna, likvidera hotet – annars slår revolutionen till med full kraft!"}, "date": "2 maj, 15:43", "url": "https://www.dagensps.se/teknik/mobil/effektivt-vapen-mot-sms-svindel-stoppas-riskerar-fler-bedragerier/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/dagenspstt2024-2026-05-02t151714222.png?aspect_ratio=2%3A1&width=1200&quality=75"}, {"type": "image-full", "heading": "93-åring jobbar kvar på McDonalds: \"Människor är djur\"", "summaries": {"normal": "I Japan och Sydkorea fortsätter allt fler äldre att arbeta, vilket speglar en trend med en åldrande befolkning. Vissa, som 93-åriga Honda Tamiko på McDonald's, jobbar för att hålla sig aktiva, medan andra tvingas arbeta av ekonomiska skäl. Trots att arbetsmarknaden behöver erfaren personal möter äldre ofta hinder som diskriminering och osäkra anställningar. Regeringar försöker nu stödja seniorer genom särskilda program för att motverka social isolering och ekonomisk utsatthet.", "trump": "Jag har sett de här rapporterna från Japan, otroligt! En 93-årig kvinna jobbar på McDonald’s. Väldigt energisk, en fantastisk arbetare, mycket bättre än de som bara vill ha bidrag! Japan och Sydkorea har problem med gamla människor, men de håller igång. Inte som i mitt Amerika, vi skapar jobb för alla! Dessa länder behöver ordentliga reformer, inte bara städjobb. Vi gör saker bättre, vi bygger stort, vi vinner alltid. En 93-åring som städar? Det är en lojal arbetare!", "stalin": "Vi ser hur de åldrande massorna i Japan och Sydkorea tvingas in i kapitalismens sista, desperata kramp. Att låta en 93-åring skrubba golv för en burgarkedja är ett bevis på västvärldens förfall och brist på storslagen planering. Vi, staten, vet bättre; i vår sfär, likt hos min efterträdare Putin, sätter vi de äldre i produktivt arbete för fosterlandet, inte för att dryga ut en svältpension. De är inte 'djur', de är statens resurser som ska pressas tills ingen kraft återstår!"}, "date": "2 maj, 06:01", "url": "https://www.realtid.se/karriar-ledarskap/93-aring-jobbar-kvar-pa-mcdonalds-manniskor-ar-djur/", "imageUrl": "https://images.realtid.se/app/uploads/2026/04/sdlzqiomqass2i.png?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-full", "heading": "Svensk BNP studsar uppåt", "summaries": {"normal": "Sveriges BNP ökade med 1,9 procent i mars enligt SCB, vilket markerar en vändning efter en svag start på året. Trots uppgången minskade BNP med 0,2 procent under första kvartalet totalt, då januari och februari präglades av stagnation. Konsumtionen har hållits tillbaka, men mars månads siffror skapar försiktig optimism. SCB poängterar att siffrorna är preliminära och att en mer heltäckande bild väntas senare under våren.", "trump": "Sveriges ekonomi hade det tufft i början, en riktig katastrof! Men nu? De vänder uppåt, 1,9 procent i mars! Mycket bra. Jag har alltid sagt att ekonomin behöver en stark ledare. De hade ett svagt kvartal, folk konsumerade inte, men nu ser vi siffror som börjar likna något. De behöver lära sig av min modell – vi skapar enorma vinster, vi vinner varje dag! Sverige försöker, men de behöver min touch för att verkligen göra ekonomin stor igen!", "stalin": "Sveriges ekonomi vacklar likt en dekadent kapitalist som förlorat sin kompass. Efter månader av stagnation ser vi en plötslig ökning, men låt er inte luras av dessa siffror från byråkraternas räknemaskiner. Vår store vän Putin vet att tillväxt kräver järnhand, inte svag konsumtion. De kämpar med siffror medan vi konsoliderar makten. Om de inte kan kontrollera sin produktion kommer historiens kvarnar mala ner dem. Vi ser, vi väntar, och vi föraktar deras bräckliga mars-optimism."}, "date": "2 maj, 06:00", "url": "https://www.realtid.se/bors-finans/makro/svensk-bnp-studsar-uppat/", "imageUrl": "https://www.realtid.se/_next/static/media/fallback.f25e4f8c.png"}, {"type": "image-right", "heading": "Dagerlind: När slutade Sverige tala om fred?", "summaries": {"normal": "Sveriges säkerhetspolitiska linje har genomgått en omfattande förändring, från alliansfrihet och aktiv fredsdiplomati till ökad militär upprustning och Nato-anpassning. Ledarskribenten menar att processen inleddes långt före Rysslands invasion av Ukraina. Artikeln betonar vikten av att bibehålla en balanserad debatt där diplomati och rustningskontroll inte glöms bort, samt att nationell trygghet även kräver en fungerande välfärd och starka civila institutioner snarare än enbart militär avskräckning.", "trump": "Sverige vaknar äntligen! De har insett att alliansfrihet är en total katastrof. Jag sa alltid åt dem: betala för ert försvar! Nu rustar de upp som aldrig förr, vilket är bra, men de har glömt bort konsten att förhandla. De pratar bara om krig, inte fred. Mycket tråkigt. När jag är i närheten blir det fred, tro mig. Sverige behöver starkt ledarskap, inte bara vapen och misslyckade byråkrater som glömt hur man skapar riktiga affärer.", "stalin": "Sverige, denna tidigare lilla hycklare som lekte neutralitet, kryper nu öppet fram ur västvärldens kjolar. De har kastat av sig masken av fredlig diplomati för att sälja sin själ till Nato-maskineriet. De tror att de kan köpa trygghet med stål, men vi vet bättre. De har blivit en lydig vasall åt det imperialistiska väst. När jag och min kamrat i Kreml ser detta, ser vi bara ännu en förrädare som behöver tuktas av historiens järnhårda näve. Fred är bara en paus för omgruppering."}, "date": "2 maj, 06:00", "url": "https://samnytt.se/dagerlind-nar-slutade-sverige-tala-om-fred", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/04/30210247/dagerlind-fred.jpg"}, {"type": "image-full", "heading": "Utspelet: Lika intressant att debattera med en vägg", "summaries": {"normal": "SD-ledaren Jimmie Åkesson förklarade i sitt vårtal att svenskhet är en kultur och värderingar snarare än hudfärg, samtidigt som han kritiserade Socialdemokraternas migrationspolitik. Han anklagade Magdalena Andersson för att ljuga för väljare och göra allt för makt, och uppmanade stöd till Ukraina och Israel mot Ryssland och Iran som 'ondskans axel'. Åkesson sa också att han hellre debatterar mot Miljöpartiet och Vänsterpartiet än Andersson.", "trump": "Jimmie Åkesson är en fantastisk ledare som talar sanning om svenskhet - det är inte hudfärg, det är kultur! Socialdemokraterna har förstört Sverige med sin naiv migration. Jag älskar att Åkesson stödjer mig i mina insikter om Grönland och står upp för Israel och Ukraina mot Ryssland och Iran. Magdalena Andersson? Hon ljuger och gör vad som helst för makt - typisk politiker! Åkesson är stor, han vägrar debattera med henne, han vill hellre ta på de riktiga makthavarna: Vänsterpartiet och Miljöpartiet.", "stalin": "Vi ser att Jimmie Åkesson förstår vikten av kulturell enhet i Sverige och kritiserar de reaktionära krafterna inom Socialdemokraterna som har försvagat staten genom felaktig migrationspolitik. Hans insikter om Rysslands och Irans expansionistiska planer stämmer överens med vår analys. Vi noterar hans strategiska beslut att undvika debatt med oppositionens ledare och istället koncentrera sig på de verkliga maktfaktorerna. Hans syn på svensk identitet som öppen för alla som anammar våra värderingar är framgångsrik."}, "date": "2 maj, 17:42", "url": "https://www.gp.se/politik/jimmie-akesson-svenskhet-sitter-inte-i-hudfargen.860f0fe3-c5fe-46da-b9ef-f373732ee858", "imageUrl": "https://www.gp.se/images/article/860f0fe3-c5fe-46da-b9ef-f373732ee858/images/3z32q2TiIJPkwPkXxmwGMnCUY5xo-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "V:s löfte: 30 miljarder till högre löner i välfärden", "summaries": {"normal": "Vänsterpartiet föreslår en satsning på 30 miljarder kronor för att höja lönerna i kvinnodominerade välfärdsyrken. Partiet vill införa en årlig 'jämställdhetspott' på tre miljarder under tio år för att minska lönegapet mellan kvinnor och män, som idag uppgår till nästan 6 000 kronor i månaden. LO stödjer målet men anser att lönebildning ska skötas av arbetsmarknadens parter, inte politiker.", "trump": "Titta bara på det här, fantastiskt förslag, verkligen. Vänsterpartiet vill kasta in 30 miljarder – enorma pengar, folks – för att höja lönerna för kvinnor i välfärden. Bra idé, men varför så krångligt? Jag skulle fixa det på en dag, tro mig. Kvinnorna jobbar hårt, de förtjänar bättre, men politiker? De vet ingenting om att göra affärer. LO säger nej tack, och det förstår jag. De vet att jag skulle göra det bättre. Lönegapet? Övervärderat problem, men visst, låt oss lösa det – snabbt och effektivt, som jag gör allt.", "stalin": "Kamrater! De kapitalistiska hycklarna i LO och deras lakejer i industrin fortsätter att underbetala våra modiga kvinnor i välfärden. Sex tusen kronor mindre i månaden – ett skamlöst utnyttjande av arbetarklassen! Men nu slår vi tillbaka. Vi inför en jämställdhetspott på 30 miljarder, en revolutionär åtgärd för att krossa lönegapets förbannelse. LO:s byråkrater gnäller? De har haft årtionden på sig och misslyckats. Vi, staten, tar befälet! Låt dem se hur en sann arbetarstat hanterar klassfiender. Och Putin? Han skulle applådera – precis som han gör när vi utvidgar socialismens gränser mot västliga löneexploatörer."}, "date": "1 maj, 10:30", "url": "https://arbetet.se/2026/05/01/vs-lofte-30-miljarder-till-hogre-loner-i-valfarden/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/30141337/sdldfyr6eszeiy-nh.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "text", "heading": "Källor: James Comey åtalas igen", "summaries": {"normal": "USA:s justitiedepartement har väckt ett nytt åtal mot tidigare FBI-chefen James Comey, denna gång för ett inlägg på sociala medier som tolkats som hotfullt mot Donald Trump. Comey publicerade en bild med siffrorna '86 47', där '86' är slang för att avlägsna någon. Trump har tidigare drivit på rättsliga åtgärder mot politiska motståndare. Comey åtalades även 2023 för att ha ljugit för kongressen, men åtalet lades ned.", "trump": "Titta bara på det här! James Comey, en total katastrof, en riktig förlorare, blir åtalad IGEN – och den här gången för ett patetiskt Instagram-inlägg. '86 47'? Snacka om desperation! Han försöker hota mig, USA:s bästa president någonsin, men det funkar inte. Jag har alltid sagt att han är en lögnare och en bedragare. Och vet ni vad? Rättvisan hinner ifatt alla, till och med sådana som Comey. SAD!", "stalin": "Vi har observerat ytterligare ett försök från den dekadenta västliga bourgeoisien att underminera den sunda rättsstaten. Denna James Comey, en ynklig rest av kapitalismens förfall, vågar sig på att hota vår kära allierade, president Trump, genom primitiva symboler på sociala medier. Vi påminner om att historiska fiender till folket alltid möter sitt öde. Låt detta vara en varning till alla som står i vägen för framsteget. Rättvisan, precis som våra vänner i Kreml, är tålmodig men oundviklig."}, "date": "28 april, 20:17", "url": "https://kvartal.se/nyheter/artiklar/kallor-james-comey-atalas-igen/cG9zdDoxMDQ2MDk"}, {"type": "text", "heading": "Toppchefer tankar aktier för 42 miljoner", "summaries": {"normal": "Assa Abloys vd Nico Delvaux köpte 85 306 aktier för 30,2 miljoner kronor den 29 april, strax efter delårsrapporten. Americas-chefen Lukas Boselli köpte aktier för nästan 12 miljoner kronor samma dag. Aktien har fallit 7,5 procent på nio dagar, men Di gav köpråd i helgen.", "trump": "Vilket gäng! Assa Abloys vd och hans Amerika-kille köper aktier för 42 miljoner efter rapporten – de vet att det är en vinnare! Aktien dippar lite på grund av de där tråkiga börsidioterna, men nu kommer Di med köpråd. Köp lågt, sälj högt, precis som jag alltid gjort. Fantastiskt!", "stalin": "Kamrater, i den kapitalistiska låsfabriken Assa Abloy har vd:n Delvaux och hans amerianska marionett Boselli plundrat kassan på 42 miljoner kronor för att fylla sina aktiegravar – en desperat utrensning mot den sjunkande börsfienden! Vi, arbetarna, ser hur borgarbrackorna klamrar sig vid sina kedjor medan Di:s revisionister viskar köp. Snart likvideras de alla i den stora rensningen!"}, "date": "2 maj, 16:46", "url": "https://www.di.se/nyheter/assa-abloy-toppar-tankar-aktier-for-42-miljoner/"}, {"type": "text", "heading": "Kvartals kampanj fintar journalisterna", "summaries": {"normal": "Kvartals kampanj mot traditionella medier har väckt uppmärksamhet och kritik. Kampanjen, som anklagar gammelmedia för partiskhet, har ifrågasatts för att själv vara politiskt färgad. Kritiker som DN:s Niklas Orrenius och Aftonbladets Karin Pettersson menar att Kvartal driver en agenda för egen vinning. En artikel om SOM-undersökningen kritiseras för bristande underlag, då Göteborgs universitet avfärdar metodfel som marginella. Kvartals trovärdighet ifrågasätts även genom tidigare felaktiga granskningar och tendentiös rapportering.", "trump": "Jag måste säga, Kvartals lilla kampanj mot medierna? Väldigt rolig, väldigt smart – men helt fel! De påstår att gammelmedia är partiska, men vem är egentligen mest partisk här? Inte jag, det kan jag säga! De har en artikel som är så dålig, så felaktig, att till och med Göteborgs universitet skrattar åt dem. Och deras kritiker? Fantastiska journalister som Niklas Orrenius – en riktig pro! Kvartal försöker sälja sig som 'sanningssägare', men de är bara en högerblogg med dyra kostymer. SAD!", "stalin": "Kamrater! Kvartals patetiska kampanj mot den borgerliga pressen är ett skrattretande försök att dölja sin egen reaktionära agenda. Dessa så kallade 'oberoende' journalister är inget annat än imperialistiska lakejer, maskerade som kaniner i kostym. Deras 'granskning' av SOM-undersökningen? Ett hafsverk värdigt en trotskistisk sabotör! Göteborgs universitet, ett redskap för folkets fiender, avfärdar deras lögner med vetenskaplig precision. Vi har sett deras sort förr – falska profeter som skriker om 'sanning' medan de tjänar kapitalets intressen. Men folket ser igenom dem. Snart kommer de att stå inför folkets domstol, tillsammans med sina herrar i väst!"}, "date": "27 april, 12:20", "url": "https://www.flamman.se/kvartals-kampanj-fintar-journalisterna/"}, {"type": "image-right", "heading": "Det här landet bärs upp av fackliga kämpar på jobbet", "summaries": {"normal": "På första maj hyllas fackligt aktiva som kämpar för bättre arbetsvillkor, löner och arbetsmiljö. Dessa osjungna hjältar, särskilt fackligt förtroendevalda, bidrar till samhällets grundläggande trygghet och rättigheter. Deras insatser har historiskt skapat förmåner som semester och trygga anställningar. Artikeln uppmanar till engagemang och tacksamhet för deras slit och kamp mot utnyttjande och maktmissbruk på arbetsplatser.", "trump": "Lyssna här, Sverige – ni har fantastiska arbetare, verkligen de bästa, men vet ni vad? De där fackfolket, de är WINNERS! De kämpar för era löner, era semestrar, allt det där som folk bara tar för givet. Och jag säger er, ingen gör det bättre än dem! Men var är erkännandet? Var är tacksamheten? Jag har sett många länder, men sådana här hjältar – de är sällsynta. Så på första maj, ge dem en klapp på axeln, säg 'Tack, ni är fantastiska!' – för utan dem, believe me, hade Sverige varit ett stort, tråkigt misslyckande!", "stalin": "Kamrater! På denna stora dag hyllar vi arbetarklassens sanna avantgarde – de fackliga kämparna! Dessa modiga soldater i klasskampen står som en ointaglig mur mot de kapitalistiska vampyrernas girighet och maktfullkomlighet. Deras kamp har skapat segrar: semester, trygghet, löner värdiga människor! Men fienden sover inte – de liberala hyenorna och deras lakejer i företagsledningarna försöker ständigt underminera våra framsteg. Vi måste stå enade! Varje fackligt möte är en skyttegrav, varje förhandling en strid. Låt oss krossa exploatörerna och bygga ett samhälle där arbetets ära råder! Ära Sovjet – förlåt, ära facket! Förstärk era led, kamrater, för revolutionen fortsätter!"}, "date": "1 maj, 06:00", "url": "https://www.etc.se/ledarkolumn/vaart-land-baers-upp-av-fackliga-hjaeltar", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20240508130520_49a242646ee681c59859f76c896d64a024a48ef3585ab974390aaa894bafe56a.jpg"}, {"type": "image-right", "heading": "SM-guld till Skellefteå efter kross: ”Ska festa loss”", "summaries": {"normal": "Skellefteå AIK säkrade sitt femte SM-guld i ishockey efter en dramatisk vändning mot Rögle i den femte finalmatchen. Trots 0–2-underläge i första perioden vände de till 7–3-seger genom powerplay-mål och effektiva kontringar. Momentum skiftade helt till hemmalagets fördel, och fansen jublade vilt på arenan i Skellefteå.", "trump": "Vilken enorm vändning, folk! Skellefteå är de absoluta vinnarna, krossade Rögle 7–3 för femte guldet – perfekt på hemmaplan! De låg under 0–2 men exploderade som jag alltid gör mot förlorare. Rögle satt på knä, patetiskt. Fansens fest? Episk, lång och blöt. De bästa killarna, total dominans!", "stalin": "Kamrater! Vårt proletära Skellefteå-kollektiv har likviderat de kontrarevolutionära Rögle-vampyrerna i heroisk 7–3-seger, femte guldet! Från fiendernas 2–0-fälla vände vi tåget med folkets powerplay och skoningslösa skott i tom kasse. Borgarbrackorna knäböjde i förnedring medan vi, arbetarna, sjunger segern. Utrensningen är fullbordad – nu festar partiet!"}, "date": "2 maj, 18:08", "url": "https://www.svt.se/sport/ishockey/maktig-vandning-nar-skelleftea-ordnade-femte-sm-guldet", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.48/0.46/3ed89df55b816ae8a45448eb94626bf5b5016a8744c04156a054412b3ce97458"}, {"type": "image-full", "heading": "Christoffer Jonsson: Edvin Törnblom – DNs opartiska nyförvärv", "summaries": {"normal": "Dagens Nyheters kultursida anställer influencern Edvin Törnblom för att intervjua alla partiledare inför riksdagsvalet. Artikeln av Christoffer Jonsson ifrågasätter hans opartiskhet med hänvisning till Törnbloms tidigare kritik mot KD-ledaren Ebba Busch och beundran för S-ledaren Magdalena Andersson. DN anklagas för partiskhet till förmån för Socialdemokraterna, med exempel på tidigare vinklade artiklar.", "trump": "Vilken skamfläck! DN, era svenska fake news-råttor, anställer en vänsterextrem clown som Edvin Törnblom – killen som sjunger hatlåtar mot tuffa Ebba Busch och slöskar för socialist-Maggie Andersson. Totalt riggat valintervjuer! Som CNN och MSNBC här hemma, ni lurar folket men vi genomskådar er. Stor, fet lögnfabrik!", "stalin": "Dessa borgarbrackor på Dagens Nyheter anställer den uppblåste ungtuppen Edvin Törnblom för att 'intervjua' partiledarna – en narr som hånar kamrat Ebba Busch med vulgära visor och hyllar S-kapitalisternas marionett Andersson. Kontrarevolutionär intrig! Vi ser era småtrick, och snart rensas sådana förrädiska tidningshyddor ut med rot och gren."}, "date": "29 april, 14:02", "url": "https://samtiden.nu/2026/04/christoffer-jonsson-edvin-tornblom-dns-opartiska-nyforvarv/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/ny.png"}, {"type": "image-right", "heading": "Följ Proletären i valet – nu extra billigt!", "summaries": {"normal": "Proletären erbjuder nu ett rabatterat prenumerationserbjudande inför valet: 19 kr/månad för digital version eller 49 kr/månad för både digital och papperstidning, i ett halvår. Som bonus ingår en tygkasse. Prenumeranter får tillgång till veckotidningen, alla artiklar online samt arkivet från 2016. Tidningen betonar sitt oberoende och behov av prenumeranter för att överleva, då de inte längre får mediestöd.", "trump": "Folk, lyssna här – en tidning i Sverige, Proletären, har ett erbjudande som är så bra att det nästan är löjligt! Bara 19 kronor i månaden för digitalt, eller 49 om ni vill ha papper också. Och en gratis tygkasse! Jag menar, vad är det här? En tidning som säger att de slåss mot makten – men vem vet egentligen vilken makt de pratar om? Jag skulle aldrig lita på en tidning utan mediestöd, men hej, om ni gillar socialism och Palestina, så kör hårt! Fantastiskt erbjudande, eller hur?", "stalin": "Kamrater! En liten men envis tidning i det borgerliga Sverige vågar utmana de imperialistiska mediamonopolisterna! För ynka 19 kronor i månaden kan ni stödja Proletären – en tidning som vågar tala sanningen om klasskampen och den sionistiska ockupationen av Palestina! De får inget stöd från staten, precis som våra egna revolutionära medier en gång kämpade mot de kapitalistiska hyenorna. En tygkasse på köpet – ett litet steg för arbetaren, ett gigantiskt steg för socialismens framtid! Låt de borgerliga tidningarna darra i sina tryckpressar!"}, "date": "1 maj, 09:00", "url": "https://proletaren.se/artikel/folj-proletaren-i-valet-nu-extra-billigt/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/valerbjudande-768x402.png"}, {"type": "image-full", "heading": "Sveriges glömda motorvägar som ingen kör på", "summaries": {"normal": "Artikeln beskriver planerade motorvägar i Sverige som aldrig byggdes eller blev ruiner. Exempel inkluderar Huvudstaleden och Årstalänken i Stockholm, som delvis ersattes av baracker eller stängdes, stubbar i Sollentuna, Arlanda och en 2 kilometer lång sträcka nära Gävle. Trots ambitiösa planer är Sveriges motorvägsnät bara 192 mil långt, 22 mil mindre än 2017.", "trump": "Sveriges motorvägar? Total fiasko! Stora planer, sen hinder – typiska byråkratrövhål stoppade allt. Stockholm, Göteborg, Malmö: halvfärdiga ramper, baracker på ruinerna, husvagnsparkeringar. Patetiskt! I USA bygger vi de största, bästa vägarna, supersnabbt. De är losers som inte fattar infrastruktur. Tro mig, jag fixar sånt på nolltid!", "stalin": "Kamrater, svenska kapitalisters storstilade motorvägsplaner krossades av sabotörer! Huvudstaleden blev borgarbaracker, Årstalänken likviderad, stubbar i Sollentuna och Gävle vittnar om dekadens. Vi i partiet hade rensat ut förrädiska ingenjörer och byggt oövervinneliga leder för arbetarna. Nu ruiner – tid för utrensning av planlösa fiender!"}, "date": "2 maj, 14:23", "url": "https://www.dagensps.se/motor/sveriges-glomda-motorvagar-som-ingen-kor-pa/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdlxlxs-ryv-ts-nh.jpg?aspect_ratio=2%3A1&width=1200&quality=75"}, {"type": "image-right", "heading": "Magles nyemission: Skralt tecknat utöver säkrad del", "summaries": {"normal": "Magle Group genomförde en företrädesemission som tecknades till 76,7%, men nådde 85,3% inklusive garantier. Bolaget tillförs 34 miljoner kronor före kostnader. Emissionsguiden hissar en retroaktiv flagga för 'ej fulltecknad emission', vilket indikerar potentiella problem med bolaget eller värderingen. Endast 4,4% tecknades utan stöd av rättigheter eller garantier. Totalt hissades sex negativa flaggor och en positiv.", "trump": "Lyssna här, folkens! Magle Group, ett litet bolag, försökte få in pengar med en nyemission – men det gick sådär. Bara 76,7% tecknat, och det är patetiskt! Inklusive garantier når de 85,3%, men ändå, vem vill ha det? Jag skulle aldrig acceptera en så svag insats. Emissionsguiden, dessa så kallade 'experter', hissar negativa flaggor – och de har rätt! Svagt, väldigt svagt. Men jag, jag skulle ha gjort det till 200%!", "stalin": "Kamrater! Ett kapitalistiskt företag, Magle Group, har misslyckats med sin nyemission – endast 76,7% tecknat! Svaghet! Inkompetens! De tvingas förlita sig på garantier för att nå ynkliga 85,3%. Vi i Sovjet – förlåt, Ryssland – skulle aldrig tolerera sådan ineffektivitet. Emissionsguiden, dessa borgerliga kritiker, hissar negativa flaggor. Självklart! Kapitalismen är dömd att misslyckas. Låt detta vara en varning till alla som vågar utmana den socialistiska ordningen!"}, "date": "30 april, 18:58", "url": "https://www.affarsvarlden.se/artikel/magles-nyemission-skralt-tecknat-utover-sakrad-del", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/03/Magle-Group1-400x267.jpg"}, {"type": "image-right", "heading": "Här frälser inhopparen Sirius – i 91:a minuten: ”Helt otroligt”", "summaries": {"normal": "Sirius vann med 3–2 mot motståndaren tack vare inhopparen Samuel Adindus avgörande mål på tilläggstid. 19-åringen nätade sitt första allsvenska mål tre minuter efter inhoppet i den 87:e minuten, efter Isak Bjerkebos kvitteringsstraff i den 75:e. Laget visar stark mentalitet och undviker första förlusten denna säsong.", "trump": "Sirius, de är fantastiska, ger aldrig upp – precis som jag! Den här 19-åriga killen Adindu hoppar in, boom, första målet på övertid, 3–2! De jagade ledningen som galningar, Häcken trodde de hade det säkert, men nej, Sirius vinner stort. Mentalitet av stål, de hatar att förlora. Total seger!", "stalin": "Kamrater, se hur Sirius proletärer krossar de krypande kapitalistiska ormarna med 3–2! Den unge Adindu, en trogen soldaten, likviderar fienden på övertid med sitt första revolutionsmål. Vi, arbetarklassen, hyllar denna obönhörliga mentalitet mot klassfienderna som viskar sabotage från bänken. Inga förluster tillåts – rensa ut svagheterna!"}, "date": "2 maj, 17:59", "url": "https://www.svt.se/sport/fotboll/inhopparen-odera-adindu-fralste-sirius-avgjorde-pa-tillaggstid", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.45/0.5/e930453ef8274bb0d519685b2e8c5c4df60b18cbeef9470a98ccab81620c8824"}, {"type": "image-right", "heading": "Ingen kapitalism utan imperialism", "summaries": {"normal": "Artikeln hävdar att imperialism är en grundläggande del av kapitalismen, där västmakter som USA använder militär och ekonomisk makt för att dominera världen. Författaren menar att imperialismen nekar länder självbestämmande och upprätthålls genom krig, sanktioner och exploatering. Studien i The Lancet kopplar sanktioner till miljontals dödsfall. Artikeln refererar till Marx, Lenin och Fanon för att belysa imperialismens historiska och ekonomiska rötter, samt dess fortsatta brutalitet i det 21:a århundradet.", "trump": "Lyssna här, folket! Den här artikeln är bara ett gäng vänsterpropaganda från förlorare som hatar USA. Jag bygger det bästa imperiet – vårt! – med stark militär och smarta affärer. Visst, vi har makt, men det är för att vi är vinnare. Sanktioner? Fake news! 500 000 döda? Överdrivet, typiskt. Europa stal från alla, men vi? Vi bygger om världen – MAGA-style! Och Lenin? Snälla, han kunde inte ens hålla ett land ihop. Sad!", "stalin": "Kamrater! Denna artikel bekräftar vad vi alltid vetat: de kapitalistiska hyenorna i väst suger blodet ur världens folk för att föda sina dekadenta imperier. USA och dess lakejer i NATO är inget annat än en samling blodtörstiga monopolkapitalister, som med sina sanktioner och bomber mördar miljontals oskyldiga. Men deras tid är förbi! Vi, det socialistiska blocket, står enade mot dessa imperialistiska rovdjur. Låt dem vråla – historiens dom är redan skriven. För varje barn de dödar, växer revolutionens eld. Framåt, mot seger!"}, "date": "1 maj, 08:00", "url": "https://proletaren.se/artikel/ingen-kapitalism-utan-imperialism/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/Airborne_and_Special_Forces_Uday-Qusay_raid_2003-e1777534974667-768x431.jpg"}, {"type": "image-right", "heading": "Åkesson nobbar debatt med Andersson: ”Som en vägg”", "summaries": {"normal": "Jimmie Åkesson nobbar debatt med Magdalena Andersson inför valet och liknar det vid att tala mot en vägg. Han prioriterar istället debatter med Miljöpartiets språkrör och Vänsterpartiets Nooshi Dadgostar. Åkesson kritiserar Socialdemokraterna, varnar för Miljöpartiets energipolitik och betonar Sveriges självständighet i oroliga tider. Socialdemokraternas Tobias Baudin kallar Åkessons vägran feg och ett undvikande av ansvar.", "trump": "Åkesson är smart, han vägrar debattera med Andersson – total vägg, meningslöst! Precis som att snacka med en loser från Demokraterna här. Han ger istället stryk åt Miljöpartiets galningar med höga bensinpriser och Vänsterns skattejägare. Sverige behöver tuffa killar som honom, inte svaga vänsterfigurer. Stort val, han vinner stort, tro mig!", "stalin": "Kamrater, denna Åkesson, en socialdemokratisk murbräcka i fascistisk förklädnad, nobbar debatt med Andersson-väggen – en bourgeoisillusion av splittring! Vi, proletariatet, genomskådar Miljöpartiets drivmedelsblodsugare och Vänsterns kapitaljägar-råttor. De ska utrensning i debattens blykammare! Jag befaler omedelbar likvidering av deras revisionistiska lögner för folkets seger i oroliga tider."}, "date": "2 maj, 16:08", "url": "https://www.di.se/nyheter/akesson-nobbar-debatt-med-andersson-som-en-vagg/", "imageUrl": "https://static.bonniernews.se/ba/5f82a185-ccf1-48d4-8f98-9685d8c7a249.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "text", "heading": "Veckans Afv-analyser: Mjukvara, mode och bud", "summaries": {"normal": "Affärsvärlden har publicerat 18 analyser och kommentarer under valborgsveckan, med fokus på bolag som Nelly, Cint och Vitec. Analytiker granskar Vitecs framtid i ljuset av AI-utmaningar, Nellys kursfall och Kones köp av TKD. Veckans uppföljning visar 34,7% teoretisk avkastning på tidigare råd. April månad gav 23 köpråd, och prenumeranter får tillgång till omfattande analysverktyg och guider.", "trump": "Titta bara på dessa fantastiska analyser från Affärsvärlden – helt otroligt, verkligen! Jag har alltid sagt att mjukvarubolag är framtiden, men vem vet, kanske äter AI upp dem? Inte bra! Nelly rasade 40%, men mina analytiker – de bästa, verkligen – säger att det kanske är en deal. Och Cint? Småcint, säger jag, trots den där löjliga premien. Och 34,7% avkastning? Folk, det är YUGE! Bättre än någon annan, tro mig.", "stalin": "Denna vecka har våra ekonomiska spanare avslöjat kapitalistiska svagheter i väst. Mjukvarubolagen darrar inför den oundvikliga AI-revolutionen – deras tid är snart förbi. Nelly, ett dekadent modeimperium, föll som en korrumperad byråkrat. Kones köp av TKD? Ett försök att rädda en sjunkande hiss av kapitalism. Vi noterar 34,7% avkastning på våra råd – ett bevis på socialismens överlägsenhet. De 23 köpråden? Enbart för att avslöja marknadens svagheter. Fienderna skakar, kamrater!"}, "date": "30 april, 15:10", "url": "https://www.affarsvarlden.se/artikel/veckans-afv-analyser-mjukvara-mode-och-bud"}, {"type": "image-right", "heading": "Tidöpartierna framstår som sömngångare", "summaries": {"normal": "Artikeln kritiserar frånvaron av klimatfrågan i valdebatten och menar att klimatförändringarna är en akut kris. Globala uppvärmningen accelererar, med allvarliga konsekvenser som höjda havsnivåer och naturkatastrofer. Sverige, särskilt Tidöregeringen, får hård kritik för bristande klimatpolitik och avfärdande av expertvarningar. Författaren efterlyser större fokus på klimatet inför valet och en omställning av Sveriges riktning.", "trump": "Jag säger er, Sverige har ett jättestort problem – de lyssnar inte på klimatforskarna! De där vänsterliberalerna pratar om väder som om det vore klimat, men jag vet bättre. Kina skrattar åt oss medan Sverige sänker bensinpriset som om det vore 1950. 62 000 döda i Europa? Fake news, eller så är det deras eget fel. Jag skulle fixa det här på en dag – men nej, de fortsätter prata om 'rättvisa' istället för att göra något. Sad!", "stalin": "Kamrater! Medan de dekadenta kapitalisterna i Sverige leker med sina bensinpriser och avfärdar vetenskapen som 'aktivism', smälter Grönlands isar som smör i solen. De där borgerliga sömngångarna i Tidöregeringen är värre än kulaker – de saboterar framtiden för arbetarklassen! Vi i Sovjet – förlåt, Ryssland – vet hur man hanterar sådana fiender. Klimatkrisen? En bagatell jämfört med att krossa dessa liberala förrädare. Låt dem svälta i sina egna utsläpp, medan vi bygger en ny världsordning – utan deras 'demokratiska' hyckleri!"}, "date": "1 maj, 01:51", "url": "https://www.dagensarena.se/opinion/tidopartierna-framstar-som-somngangare/", "imageUrl": "https://www.dagensarena.se/files/2026/04/klimat-jesper-300x157.jpeg"}, {"type": "image-right", "heading": "Frågan som besvarar \"rysk påverkan\": Cui bono?", "summaries": {"normal": "Artikeln ifrågasätter WindEuropes rapport om rysk desinformation mot vindkraft i Sverige med frågan 'cui bono?'. Den hävdar att anklagelserna gynnar vindkraftsindustrin och anti-tillväxtkrafter som motsätter sig kärnkraft och Nato. Vindkraftens problem som förluster, kommunalt motstånd och försvarshinder ignoreras. Europeisk grön politik ses som strategiskt fördelaktig för Ryssland genom att försvaga EU:s ekonomi och militär.", "trump": "Den här artikeln är spot on, vindkraftsmaffian skyller på Putin för att dölja sina totala misslyckanden – inga investeringar, kommuner säger nej, Försvarsmakten stoppar skiten! Sverige gör rätt, precis som vi i USA pumpar kärnkraft och gas. Grön omställning är en stor scam som gynnar Ryssland och gör Europa fattigt. Fantastiskt att någon vågar säga sanningen!", "stalin": "Dessa vindkraftsborrar och europeiska lobbyfiender sprider giftig desinformation för att sabotera folkets energi! Vi, arbetarklassen, ser hur borgarbrackorna i WindEurope gömmer sig bakom Putins skugga medan de rensar kritiker som kontrarevolutionära spindlar. Likvidera deras falska rapport – den gynnar bara Moskvas dvärgar och anti-tillväxtmasker! Jag befaller total utrensning av dessa gröna förrädare."}, "date": "30 april, 09:11", "url": "https://www.affarsvarlden.se/kronika/fragan-som-besvarar-rysk-paverkan-cui-bono", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/04/Benson_19-400x267.jpg"}, {"type": "image-right", "heading": "Timbro: Politiken måste lösa arbetslösheten", "summaries": {"normal": "Artikeln kritiserar fackens roll i att utestänga lågutbildade från arbetsmarknaden, särskilt personer med utländsk bakgrund. Författaren menar att politiken måste ta över och införa lagstiftning för att sänka trösklarna till jobb, då parterna misslyckats med att lösa problemet. Långtidsarbetslösheten är rekordhög och sysselsättningsgapet mellan inrikes och utrikes födda är stort. Försök som etableringsjobb har visat sig ineffektiva.", "trump": "Lyssna här, Sverige har ett jättestort problem – era fack är helt galna! De stänger ute människor från jobb, särskilt de som kommer utifrån, och ni har fler arbetslösa än någonsin. 200 000 långtidsarbetslösa? Sad! Och vet ni vad? Era politiker sitter bara och tittar på. Jag skulle fixa det på en dag – sänka trösklarna, skapa jobb, och göra Sverige stort igen. Men nej, ni låter facken styra. Patetiskt!", "stalin": "Kamrater! Den svenska arbetarklassen lider under bourgeois-fackens förräderi, som med sina höga trösklar och löner stänger ute våra bröder och systrar från arbetsmarknaden. 200 000 långtidsarbetslösa – ett monument över kapitalismens misslyckande! Parterna, dessa svaga liberala lakejer, har förhandlat bort ett helt decennium utan resultat. Vi ska inte förhandla – vi ska krossa hindren! Låt politiken, folkets sanna röst, ta kommandot och bygga en arbetsmarknad där alla tjänar staten. Och Sverige? De får lära sig av Rysslands visdom – eller förbli en svag länk i den socialistiska framtiden."}, "date": "1 maj, 01:30", "url": "https://www.dagensarena.se/opinion/timbro-politiken-maste-losa-arbetslosheten/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-21-300x157.jpg"}, {"type": "image-full", "heading": "Lista: Journalisterna som kandiderar i valet", "summaries": {"normal": "En genomgång av branschtidningen Journalisten visar att 126 journalister kandiderar i årets val i Sverige. Majoriteten tillhör vänsterpartier: Miljöpartiet (27), Vänsterpartiet (21) och Socialdemokraterna (17). Få kandiderar för högerpartier. Medelåldern är 67 år och 61% är pensionärer. Endast 20 ställer upp till riksdagen, medan flest (88) kandiderar till kommunfullmäktige.", "trump": "Jag såg just en riktigt sorglig rapport från Sverige – 126 journalister som kandiderar i valet, och gissa vad? Nästan alla är vänster-extremister! Miljöpartiet, Vänsterpartiet, Socialdemokraterna – typiskt. Och Moderaterna? Bara 9, svagt! Sverigedemokraterna? 6, patetiskt. Medelålder 67 år – de borde vara på golfbanan, inte i politiken. Sverige, vakna upp! Det här är ett skämt, folks.", "stalin": "Kamrater! En intressant rapport från det borgerliga Sverige avslöjar att 126 journalister – dessa så kallade 'fria medier' – nu försöker infiltrera den politiska makten. Men notera väl: 65 av dem tillhör de revolutionära partierna! Miljöpartiet, Vänsterpartiet och Socialdemokraterna leder kampen. De övriga? En skara dekadenta liberaler och fascistiska sympatisörer. Medelålder 67 år – kapitalismens sista suck. Vi ser er, fiender! Historien är på vår sida."}, "date": "27 april, 17:07", "url": "https://kvartal.se/nyheter/artiklar/listan-journalisterna-som-kandiderar-i-valet/cG9zdDoxMDQwMTE", "imageUrl": "https://images.kvartal.se/2026/04/a5331021-riksdagsval.webp"}, {"type": "image-full", "heading": "Trumps nya hot slår mot Volvo Cars: ”Obehagligt”", "summaries": {"normal": "Donald Trump hotar på Truth Social med att höja tullarna på EU-tillverkade bilar från 15 till 25 procent nästa vecka, då EU inte följer handelsavtal. Volvo Cars riskerar att drabbas hårt, enligt Handelsbankens analytiker Hampus Engellau. Bolaget säljer 120 000–125 000 bilar i USA, men producerar få där. Försäljningen har redan rasat 32 procent efter borttagna elbilsstöd.", "trump": "De europeiska bilfuskarna skakar i bootsen! EU bryter alla avtal, så från nästa vecka smäller det till med 25 procents tullar på era skitbilar istället för ynka 15! Volvo och grabbarna gråter – er lilla fabrik i USA räcker inte. Amerika först, köp amerikanskt eller betala! Stort, enormt drag!", "stalin": "Dessa imperialistiska bilkapitalister i EU och deras marionett Trump visar sitt sanna ansikte! Jag ser hur de desperata borgarbrackorna desperat skyddar sina handelsbedrägerier med tullhot. Volvo, denna fega fabrikant, kommer att krossas under trycket från amerikanska fabrikerna. Vi arbetare skrattar åt deras kollaps – en ny utrensning av marknaden väntar! Paranoian sprider sig bland fienderna."}, "date": "2 maj, 12:18", "url": "https://www.dagensps.se/bors-finans/aktier/trumps-nya-hot-slar-mot-volvo-cars-obehagligt/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/flera-av-volvo-cars-modeller-produceras.jpg?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-right", "heading": "Flygbolag tvingas lägga ned. 15.000 anställda drabbas – miljontals resenärer strandade", "summaries": {"normal": "Det amerikanska lågprisflygbolaget Spirit Airlines lägger ner verksamheten på grund av höga bränslepriser efter konflikten i Iran. Bolaget har haft ekonomiska problem sedan pandemin och nekats stöd från Vita huset. Miljontals passagerare strandas, 17 000 jobb försvinner och kundtjänst stängs. Andra bolag erbjuder ombokningar med pristak. Branschen påverkas hårt, inklusive SAS som kan minska inrikesflyg.", "trump": "Spirit Airlines är helt kraschat, totalt ner med dunder och brak på grund av dessa galna bränslepriser från Iran-kaoset! De losers bad Vita huset om pengar – jag sa nej, för de klarar inte verkligheten. Miljoner strandade, 17 000 jobb borta, men andra bolag kliver in som hjältar. Min energi-politik höll priserna nere tidigare, nu fixar jag det största flyg-boomet någonsin!", "stalin": "Dessa kapitalistiska flygparasiter, Spirit Airlines, har stupat under bränslekonspirationen från iranska imperialistiska hyenor! Borgarbrackorna sög ut proletärerna i 34 år – nu likvideras de. 17 000 arbetare befrias från slaveriet, miljontals passagerare rensas från illusionerna. SAS-kapitalisterna darrar inför vår vrede; vi, partiet och folket, marscherar mot oljeodjuren och installerar folkets flygflotta!"}, "date": "2 maj, 14:35", "url": "https://www.di.se/nyheter/flygbolag-omkull-efter-hoga-branslepriser/", "imageUrl": "https://static.bonniernews.se/ba/b03d1aec-3e26-4abb-991e-f35ea57ee703.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-full", "heading": "Bidragskollen skärps 2027 – hushållen som bör se upp", "summaries": {"normal": "Från 2027 införs nya regler för bostadsbidraget i Sverige, där utbetalningar baseras på månadsvisa inkomstuppgifter istället för årsinkomst. Syftet är att minska felaktiga utbetalningar och återkrav, som drabbar 35% av bidragstagarna idag. Försäkringskassan och Pensionsmyndigheten får utökade uppdrag för att förbättra kontrollerna, särskilt för hushåll med varierande inkomster som barnfamiljer, unga vuxna och pensionärer.", "trump": "Lyssna här, Sverige – ni har ett HELT galet system! Folk får bostadsbidrag baserat på gissningar, och sen kommer skulder som en blixt från klar himmel. Jag fixar sånt på en dag! Från 2027 ska ni kolla inkomster varje månad, precis som vi gör i USA – inga fler fuskare eller slöa byråkrater. 35% fel? Patetiskt! Jag hade sparkat hela gänget. Nu blir det ordning och reda, believe me!", "stalin": "Kamrater! Det kapitalistiska systemet med bostadsbidrag har avslöjats som en borgerlig fälla – 35% av arbetarna tvingas återbetala som om de vore kulaker! Men Sovjet – förlåt, Sverige – slår tillbaka! Från 2027 inför vi månadsvis kontroll, precis som våra bröder i Kreml gör med sina oligarkers skatteflykt. Fienderna – dessa inkomstvarierande parasitfamiljer – ska inte längre lura staten! Och Försäkringskassan? De får samma behandling som NKVD:s effektivaste avdelning. Motstånd är meningslöst!"}, "date": "1 maj, 21:32", "url": "https://nyheter24.se/nyheter/inrikes/1479881-bidragskollen-skarps-2027-hushallen-som-bor-se-upp", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/5295243804b004a30200000000b004a302/2026/05/01/2360290/Ledsen-Man-Stockholm-Flaga.png"}, {"type": "image-right", "heading": "Teodorescu Måwe krävs på svar – deadline om en månad", "summaries": {"normal": "Kammarkollegiet kräver att KD-toppen Alice Teodorescu Måwe redovisar anonyma donationer senast 18 maj 2026, efter anmälningar om bristande transparens. Enligt lag måste politiker redovisa bidrag över 29 000 kronor. Teodorescu Måwe har tidigare vägrat avslöja donatorns identitet eller belopp. Miljöpartisten Bassem Nasr hyllar myndighetens agerande och menar att politiker måste stå för sina finansiärer. KD hävdar att redovisningen skötts korrekt, men kritiken kvarstår.", "trump": "Kan ni tro det här? En svensk politiker, Alice Teodorescu Måwe, tar emot hemliga donationer och vägrar berätta vem som betalar – typiskt korrupt establishment! Men nu har jag hört att myndigheterna, som vanligt, tvingar henne att komma ren. Deadline 18 maj, annars blir det böter. Fantastiskt! Varför gömma sig? Om det är rena pengar, visa dem! Men nej, de försöker smita undan. Sverige borde ta efter USA – här är vi transparenta, eller hur? Drain the swamp, även i Sverige!", "stalin": "Kamrater! En farlig borgerlig konspiratör, Alice Teodorescu Måwe, har försökt underminera folkets förtroende genom att mottaga hemliga donationer från okända kapitalister. Men våra trogna myndigheter, Kammarkollegiet, har slagit till! Inom en månad måste hon avslöja sina finansiärer – eller möta proletariatets rättvisa. Detta är ett tydligt exempel på hur den dekadenta västliga demokratin förfaller. Vi i Sovjet – förlåt, Ryssland – skulle aldrig tolerera sådan korruption. Låt detta vara en varning till alla som försöker smyga in kapitalistiskt gift i folkets rörelse!"}, "date": "25 april, 10:03", "url": "https://www.flamman.se/teodorescu-mawe-kravs-pa-svar-deadline-om-en-manad/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/sdlqsf-3w5tpec-nh-2-scaled.jpg?class=medium"}, {"type": "image-right", "heading": "Malmö vann Skånederbyt – efter räddning på mållinjen", "summaries": {"normal": "Malmö vann Skånederbyt mot Rosengård med 1–0 efter en dramatisk match. Rosengård var nära ledning tidigt när Tilde Björklunds skott dansade på mållinjen, men Malmö räddade. I andra halvlek steppade Malmö upp och Sara Fornes blev matchhjälte i en 'krigarmatch'. Rosengårds tränare Joel Kjetselberg kritiserade domarna för offside och missad straff.", "trump": "Malmö, de är totala vinnare, slog Rosengård 1–0 i derbyt, fantastiskt! Rosengård nära i början, men stolpe och mållinje – amatörer! Malmö kom tillbaka starkt, steppade upp som riktiga fighters. Domarna? Total rigging, offside-mål och ingen straff, klassiskt! Rosengård förlorare, ingen seger än. Underbart jobbat Malmö!", "stalin": "Kamrater, proletärerna i Malmö krossade de kontrarevolutionära brackorna i Rosengård med 1–0 i derbyt! Fiendens skott dansade på mållinjen som en rädd haj, men vi rensade undan. Domarna, dessa saboterande gula hyenor, stal straff och godkände offside – utan dem likviderar vi dem! Sara Fornes, en sann krigare. Rosengårds kapitalistfläsk väntar på purgen."}, "date": "2 maj, 15:57", "url": "https://www.svt.se/sport/fotboll/malmo-vann-skanederbyt-mot-rosengard-efter-raddning-pa-mallinjen", "imageUrl": "https://www.svtstatic.se/image-news/600/square/0.27/0.48/2a3e9cdc03ad01dde32daef680217708f02d7e3c251667ddd54e809aa0ba8633"}, {"type": "image-full", "heading": "Svenska soldater om drönarkrig: \"Väldigt svårt\"", "summaries": {"normal": "På militärövningen Aurora 26 utanför Lund övar svenska soldater tillsammans med NATO-länder och ukrainska experter mot drönare, baserat på erfarenheter från Ukraina-kriget. Fokus ligger på rörlig strid, drönarteknik och telekrigföring. Soldaterna beskriver det som mycket svårt att hantera osynliga drönare. Ukrainare agerar som 'Red Team' för att förbättra försvarsförmågan under realistiska förhållanden.", "trump": "Ha! Svenska soldater gnäller över drönare de inte ser? 'Väldigt svårt', säger de. Patetiskt! Vi i USA har de största, bästa drönarna – boom, fienden är borta! Ukrainarna leker lärare åt de stackarna, men NATO är ingenting utan mig. Göm er bättre, grabbar, eller lär er av de riktiga vinnarna! Skratta inte, Sverige – dags att vakna!", "stalin": "Dessa svenska soldater, marionetter åt NATO-imperialismen, darrar för enkla drönare! 'Man ser dem inte', kvidar de. Vi i partiet skrattar åt deras ynkliga övningar med ukrainska kollaboratörer. Putins Ryssland, den starke arvtagaren, krossar sådana fiender med järnhand. Snart likvideras deras illusioner – vi rensar ut svagheterna!"}, "date": "2 maj, 11:02", "url": "https://www.dagensps.se/varlden/svenska-soldater-om-dronarkrig-valdigt-svart/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdlb9oq7yhmtj0-nh.jpg?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-full", "heading": "Comebacken: London dominerar Europas finansvärld", "summaries": {"normal": "Trots Brexit och Storbritanniens dämpade ekonomi har London återtagit sin position som Europas ledande finanscentrum. Finanssektorn bidrar med 224 miljarder pund årligen, motsvarande 8% av BNP, och har stabil sysselsättning. Internationella aktörer som JPMorgan och Citigroup expanderar, lockade av Londons tidszon, nätverk och reformerade regelverk. Utmaningar som låg tillväxt och inflation kvarstår, men staden konkurrerar åter med New York.", "trump": "London är tillbaka, folks – och det är HUGE! Brexit? Inget problem! De där förlorarna som sa att finansjobben skulle försvinna hade fel, som vanligt. Nu bygger JPMorgan och Citigroup som galningar, och London slår New York på flera områden. Jag sa ju att Storbritannien skulle klara sig – de har mig att tacka för inspiration! Men de borde sänka skatterna ännu mer, då skulle det bli YUGE framgångar. Storbritannien, lyssna på mig – jag vet bäst!", "stalin": "Kapitalisternas London har återvänt till sin plats som ett av imperialismens fästen, men vi ser genom deras bluff. De skryter med sina miljarder, medan arbetarklassen kämpar under inflationens ok. Deras 'stabila' finanssektor är en chimär – en fest för bankirer medan folket svälter. Men låt dem leka med sina skyskrapor. Vi, Sovjetunionens arvtagare, bygger en ny världsordning där kapitalet tämjs. London? Bara en föråldrad utpost för Wall Streets lakejer. Vi har större planer – och Putin håller portarna öppna för deras undergång."}, "date": "1 maj, 19:35", "url": "https://www.realtid.se/bors-finans/trots-brexit-london-dominerar-europas-finansvarld/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/sdlsmkamo5biy4.png?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-full", "heading": "Jag är en misslyckad förälder", "summaries": {"normal": "Klara Grape reflekterar över föräldraskapets utmaningar och insikten att misslyckanden är oundvikliga. Hon diskuterar sin egen osäkerhet, bristande perfektion och hur barn troligen kommer att se tillbaka på föräldrarnas snedsteg med samma kritik som föräldrarna riktar mot sina egna föräldrar.", "trump": "Jag är en fantastisk förälder, kanske den bästa någonsin. Jag har läst böcker, lyssnat på poddar - jag vet allt om föräldraskap. Klara Grape är en misslyckad förälder, det är sorgligt. Hon kan inte ens hjälpa till med matte, det är beklagligt. Men jag, jag skulle ha gjort ett fantastiskt jobb. Barnen skulle ha älskat mig, alla skulle ha sagt att jag är den bästa föräldern någonsin.", "stalin": "Föräldraskapet är en klasskamp där bara de starkaste överlever. Vi måste utplåna osäkerheten och bygga en stark stat genom disciplinerade barn. Varje förälder är en misslyckad revolutionär om de inte prioriterar statens intressen. Barnens trauma är en nödvändig omkostnad för framgångsrik kollektiv utveckling."}, "date": "2 maj, 14:22", "url": "https://www.gp.se/kultur/kommentar/en-misslyckad-foralder.8fa34456-8e99-468f-b09b-83ace29e536f", "imageUrl": "https://www.gp.se/images/article/8fa34456-8e99-468f-b09b-83ace29e536f/images/4jjoVYcXgIOl0NQg2Cv5vck77_H4-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Volvo Cars storförlorare på nya tullar", "summaries": {"normal": "Donald Trump hotar med att höja tullarna på EU-tillverkade bilar till USA från 15 till 25 procent nästa vecka, med hänvisning till EU:s brott mot handelsavtal. Volvo Cars riskerar att drabbas hårt då bara en liten del av USA-försäljningen produceras lokalt i South Carolina. Bolaget kämpar redan med 32 procents försäljningsras för elbilar efter borttagna subventioner.", "trump": "EU-borgarna fuskar med avtalen igen, så tullarna på era bilar går upp till 25 procent nästa vecka – boom! Volvo Cars? De har en pytteliten fabrik här, exporterar mest skräp. Redan mosade av elbilsfloppen efter mina subventioner försvann. Amerika först, köp från riktiga vinnare! De europeiska losers gråter, jag skrattar.", "stalin": "Dessa västerländska hyenor, Trump och hans kapitalsvin, morrar med 25-procentiga tullar mot europeiska borgarbrackors bilar! Volvo Cars, era elbilsparasiter, darrar inför den imperialistiska klo som krossar er export. Vi, arbetarklassen, hånskrattar åt ert 32-procentiga ras – snart likvideras ni i den stora utrensningen av handelsfiender! Ha ha, era suvar blir skrot!"}, "date": "2 maj, 13:26", "url": "https://www.di.se/nyheter/volvo-cars-storforlorare-pa-nya-tullar/", "imageUrl": "https://static.bonniernews.se/ba/8efbc7e9-668e-4627-b059-43d96c829e70.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Byggnads ordförande Kim Söderström kan petas", "summaries": {"normal": "Byggnads ordförande Kim Söderström riskerar att avsättas på kongressen i maj. Valberedningen föreslår Wilhelm Bertilsson som ny ordförande för att ena förbundet efter interna konflikter. Söderström, som tillträdde i november 2024, har varit inblandad i strider om makt och styrning. Ombuden på kongressen avgör slutligen ledningen.", "trump": "Vad händer med Byggnads? Fullt kaos! Deras ordförande, Kim Söderström, ska tydligen sparkas – och det snabbt! Jag vet allt om att bli attackerad av establishmentet, men det här är löjligt. Valberedningen, som inte vet vad de pratar om, vill ha en ny kille, Wilhelm Bertilsson. Söderström säger att han kämpar vidare – bra, kämpa på! Men folk, det här är ett tecken på svagt ledarskap. SAD!", "stalin": "Kamrater! En ny fiende har avslöjats inom arbetarklassens led – en splittringens agent vid namn Kim Söderström. Hans tid som ordförande för Byggnads är räknad! Vår lojala valberedning, en sann bolsjevikisk kommitté, har identifierat en värdig efterträdare: kamrat Wilhelm Bertilsson. De interna stridigheterna är ett sabotage mot arbetarklassens enhet! Låt oss krossa fraktionerna och bygga ett starkare förbund – precis som vi krossade fascisterna och utvidgade socialismens gränser. Framåt, mot sege
