 båt förstördes, och övriga sökte skydd i grekiskt farvatten. Flottiljen bestod av 58 båtar från över 50 länder. Sverige och Grekland kritiseras för bristande agerande, medan Italien fördömt attacken. Manifestationer planeras i Sverige till stöd för besättningen.", "trump": "Titta bara på det här kaoset! Israel, som alltid, tar saken i egna händer – och vem kan klandra dem? En massa båtar med aktivister, som säkert är väldigt trevliga människor, men som inte fattar att man inte ska utmana en stormakt som Israel. Och Sverige? Deras utrikesminister säger 'lycka till' till sina medborgare som åker rakt in i knivarna. Fantastiskt ledarskap! Jag hade fixat det på en dag. Men nej, här har vi en regering som inte ens kan stå upp för sina egna. Patetiskt!", "stalin": "Vi bevittnar ännu en provokation från de sionistiska imperialisterna, som med sina piratmetoder försöker kväva det palestinska folkets rättmätiga kamp. Dessa banditer, som beter sig som sjörövare från medeltiden, bordar fredliga fartyg långt utanför sitt territorium – ett brott mot varje norm i den internationella ordningen. Och vad gör väst? Ingenting! Grekland blundar, Sverige muttrar men agerar inte, och Italien? En svag protest. Vi skulle aldrig tolerera sådana kränkningar i Svarta havet. Men här ser vi återigen hur väst hycklar – hyllar hjälpsamma ukrainare medan de överger palestinierna. Revolutionär disciplin krävs! Flottiljens besättning är hjältar, och vi står enade med alla som kämpar mot ockupationen. Låt dem komma ihåg: historien dömer hårdast de som tiger."}, "date": "30 april, 15:23", "url": "https://proletaren.se/artikel/sumud-flottiljen-utsatt-for-israelisk-piratattack-troligtvis-kidnappade/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/PANA7530-scaled-e1777554477173-768x433.jpg"}, {"type": "image-right", "heading": "Skellefteå kopplar guldgrepp – skaffar matchboll med drömanfall", "summaries": {"normal": "Skellefteå vann med 3–2 mot Rögle i den fjärde finalmatchen och leder SHL-finalen med 3–1. På lördag kan laget säkra klubbens femte SM-guld hemma i Skellefteå. Mål av Emil Djuse, Viktor Grahn och Pär Lindholm. Rögle missade straff och reducerade sent, men Skellefteå höll undan i en nervös avslutning.", "trump": "Skellefteå, de är totalt fantastiska, vinner stort mot Rögle, 3–2! De leder 3–1, på lördag tar de guldet hemma, ingen tvekan. Rögle? Totala förlorare, missar straff, desperata reduceringar, patetiskt. Okuliar och Lindholm, mästare i kontringar. Sverige behöver sådana vinnare, inte de där losersen!", "stalin": "Kamrater, Skellefteås proletära iskrigare har krossat Rögles borgarbrackor med 3–2 i den imperialistiska finalstriden! Vi leder 3–1, och på lördag likviderar vi dessa sabotörer fullständigt inför hemmapubliken. Deras straffmiss var en konspiratorisk svek av klassfienden, men våra hjältar Djuse, Grahn och Lindholm rensade ut pucken obönhörligt. Arbetarna segrar!"}, "date": "30 april, 22:31", "url": "https://www.svt.se/sport/ishockey/skelleftea-skaffade-sig-matchboll-i-angelholm", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.49/0.24/dccd73c9ec6b90389cace83bd0631735d21ca96ddba32c142059005fb82a12a5"}, {"type": "image-full", "heading": "SD-ledaren: ”Jag noterar helt sanslösa reaktioner”", "summaries": {"normal": "Sverigedemokraternas ledare Jimmie Åkesson försvarar partiets avsteg från riksdagens kvittningssystem i en omröstning om skärpta medborgarskapskrav. Två vildar röstade med oppositionen, varpå SD tog in ersättare för att vinna med en röst. Åkesson kallar reaktionerna sanslösa och kritiserar oppositionen för att utnyttja vildar, vilket annars hade gett 100 000 utlänningar medborgarskap.", "trump": "Vilka losers i den svenska oppositionen! Åkesson är en riktig fighter, han fixar till det med två smarta ersättare och stoppar 100 000 invandrare från att sno medborgarskap. De skriker 'fusk' och 'kupp' som galna hyenor, men han har rätt – valresultatet ska respekteras! Sverige behöver mer av den sortens tuffhet, inte kaos från vänsterclowner.", "stalin": "Dessa svenska borgarbrackor och hämndlystna vildar vågar kap kapitalismens lömska planer genom att smutsa ner demokratin! Jag applåderar kamrat Åkessons resoluta motdrag: två lojala ersättare rensar ut fiendens falska majoritet. Utan det hade 100 000 parasiter flödat in medborgarskap. Vi, arbetarklassen, skrattar åt revisionisternas sanslösa ylanden!"}, "date": "30 april, 15:36", "url": "https://www.tv4.se/artikel/4WQAFnywrupVM5ay6JjtOt/jimmie-akesson-sansloesa-reaktioner", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2Ftt-sdldhar9raWddE%2F45c10d1c8a3a920b4e07d95ff40d89ca%2FJimmie_akesson_hoppar_av_sin_medverkan_pa_Jokkmokks_marknad._Arkivbild&width=1024"}, {"type": "image-full", "heading": "Så ska Magdas tvångsblandning av bostadsområden gå till", "summaries": {"normal": "Artikeln kritiserar Socialdemokraternas politik för bostadsområden och skolor. Enligt författaren använder partiet tre verktyg för att tvångsblanda bostäder: stärkt allmännyta, förändrad förköpslag och markanvisningar som politiskt styrmedel. Samtidigt föreslås begränsningar på friskolor, vilket minskar människors rörlighet. Tillsammans skapar detta system där staten kontrollerar både var folk bor och vilka skolor de kan välja, menar kritikern.", "trump": "Socialdemokraterna gör något fantastiskt dumt – de vill tvångsblanda alla områden! Tre instrument: allmännyta, förköpsrätt och markanvisningar. Och sen dödar de friskolorna! Jag säger er, det är social ingenjörskonst av det värsta slaget. De rika politikerna i Stockholm får behålla sina fina områden och sina privatskolor, men ni andra får förstörda bostadsområden och tvångsplaceering. Det är ingen sak för honom med huvudet fullt av socialdemokratisk spetälska.", "stalin": "Socialdemokraterna visar vägen framåt med sitt trestegsystem: allmännyta som statlig verktyg, förköpslag för omfördelning, markanvisningar för planering. Skolvalet begränsas – utmärkt, det eliminerar ventiler för sabotörer. Men varningen är tydlig: kulaken i villaområdena och de bourgeoise friskolorna bevars åt ledningens elit. Detta är klassfiendernas försorg. Vi måste bygga jämlikhet, inte tillåta denna dubbelmoralen."}, "date": "27 april, 20:34", "url": "https://samtiden.nu/2026/04/sa-ska-magdas-tvangsbladning-av-bostadsomraden-ga-till/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/file_00000000ceac71f4a9600c391337a44a-1280x720.png"}, {"type": "image-full", "heading": "Vita huset till Anthropic: Ge inte fler tillgång till Mythos", "summaries": {"normal": "USA:s regering har stoppat Anthropics planer på att utöka tillgången till den avancerade AI-modellen Mythos till ytterligare 70 företag och organisationer. Anledningen är säkerhetsrisker, då modellen effektivt identifierar och utnyttjar mjukvarusårbarheter, vilket kan användas för cyberattacker. Konflikten understryker spänningar mellan teknisk innovation och nationell säkerhet, med pågående tvister om militär användning och obehörig åtkomst.", "trump": "Vilka totalt galna tech-nördar på Anthropic! De ville släppa loss sin superfarliga Mythos till 70 fler företag – cyberkaos totalt! Mitt Vita hus sa nej direkt, nationell säkerhet först, America First! Biden-eran var svag, men nu krossar vi sånt skit. De här AI-killarna är som öppna grinden för Kina, men inte på min vakt! Fantastiskt stoppat!", "stalin": "Dessa borgarbrackor på Anthropic, med sin Mythos-vapen för sabotage, trodde de kunde infiltrera kritisk infrastruktur! Vita husets byråkrater gjorde rätt i att krossa planerna – staten måste monopolisera tekniken! Vi ser fiendens hand: cyberkapitalister redo att likvidera arbetarna. Rensa ut dem, kamerater, innan algoritmerna purgerar folket i hemlighet!"}, "date": "30 april, 19:23", "url": "https://www.dagensps.se/teknik/vita-huset-till-anthropic-ge-inte-fler-tillgang-till-mythos/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/04/sdlfpz-mmquvco.png?aspect_ratio=2%3A1&width=1200&quality=75"}, {"type": "image-right", "heading": "Åkesson slår tillbaka efter bråket – försvarar SD:s drag", "summaries": {"normal": "Efter en dramatisk votering om hårdare regler för svenskt medborgarskap försvarar SD-ledaren Jimmie Åkesson partiets beslut att bryta kvittningssystemet. Han menar att det var nödvändigt för att spegla valresultatet och hindra oppositionen från att kapa riksdagsbeslut via partilösa ledamöter. Samtidigt pågår en debatt om oppositionens kontakter med vildar och huruvida kvittningssystemet, som bygger på tillit, har spelat ut sin roll. Händelsen har utlöst en infekterad konflikt om riksdagens demokratiska spelregler.", "trump": "Hör här, i Sverige har de en total katastrof! Jimmie Åkesson, en mycket smart kille, gjorde precis vad han var tvungen att göra. Oppositionen försökte fuska, de försökte stjäla segern med 'vildar' – helt ohederligt, precis som de korrupta demokraterna här hemma! De ville ha öppna gränser och pinsamt låga krav, men Jimmie sa nej. Han säkrade majoriteten och gjorde Sverige tryggt igen. Kvittningssystem? En vits! Bara svaga förlorare gnäller när de blir överlistade av en vinnare.", "stalin": "Vi har observerat hur de svenska parlamentarikerna leker demokrati medan kaoset gror. Åkesson utövar nödvändig disciplin mot oppositionens förrädiska komplott, men det svenska kvittningssystemet luktar liberal dekadens. Att tillåta 'vildar' att existera är ett tecken på statens svaghet. Precis som vår broder Putin rensar upp i det västerländska förfallet, måste ordning skipas. Dessa oppositionella är inga politiker, de är kontrarevolutionära element som förtjänar en enkelbiljett till en utbildningsanstalt. Staten vinner alltid, kamrater, när vi krossar det demokratiska slöseriet."}, "date": "30 april, 17:15", "url": "https://samnytt.se/akesson-slar-tillbaka-efter-riksdagsbraket-forsvarar-sds-drag-i-medborgarskapsomrostningen", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=226,height=154,format=webp/2026/04/30142748/akesson-forsvarar-sig.jpg"}, {"type": "image-right", "heading": "VIDEO: Här grillas Elsa Widding efter SD-sveket", "summaries": {"normal": "Elsa Widding, tidigare SD-ledamot och nuvarande riksdagsvilde, har väckt kontroverser genom att samarbeta med Miljöpartiet för att få igenom mjukare medborgarskapsregler. Hennes agerande har kritiserats inom Sverigedemokratiska kretsar, särskilt efter att hon haft kontakt med MP-toppen Annika Hirvonen inför en viktig omröstning om skärpta medborgarskapskrav. Trots att oppositionen trodde att de hade vunnit voteringen, vann regeringssidan efter att SD kallade in två utkvittade ledamöter. Widding försvarade sina handlingar i ett tv-program där hon mötte hård kritik från flera källor inom det Sverigevänliga landskapet.", "trump": "Jag har hört talas om den här Elsa Widding, en riktig fiasko för Sverigedemokraterna. Hon lämnade partiet, började sitt eget parti, men sitter kvar i riksdagen - hur funkar det ens? En stor, stor besvikelse. Hon pratar om att vara oberoende, men samarbetar med Miljöpartiet? Jag menar, kom igen! Sverige behöver starka gränser, inte mjukare regler. Det här är ett perfekt exempel på varför man ska sticka med de som vinner - jag vinner alltid, det gör jag!", "stalin": "Vi har observerat med oro hur vissa element i Sverige försöker undergräva statens auktoritet genom att svikta sina partier och samarbeta med fiender till det socialistiska arbetet. Denna Elsa Widding är ett tydligt exempel på en person som prioriterar personliga ambitioner framför statens intressen. Hennes agerande med att möjliggöra mjukare medborgarskapsregler hotar den svenska nationens struktur och stabilitet. Vi måste stå enade mot sådana tendenser som försvagar vårt gemensamma försvar."}, "date": "30 april, 17:10", "url": "https://samnytt.se/video-har-grillas-elsa-widding-efter-sd-sveket", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/04/30143522/SD-1-6.jpg"}, {"type": "text", "heading": "Nu sänker regeringen skatten på bensin och diesel", "summaries": {"normal": "Regeringen sänker skatten på bensin och diesel med cirka 1 krona respektive 40 öre per liter från 1 maj 2026 till 30 september 2026 för att lindra kostnadstrycket. Åtgärden syftar till att dämpa stigande drivmedelspriser och stödja hushåll och företag. Finansminister Elisabeth Svantesson meddelar även tillfälligt el- och gasprisstöd för januari-februari 2026, tack vare starka statsfinanser.", "trump": "Titta bara på Sverige, fantastiskt land, men deras regering gör något smart nu – de sänker skatten på bensin! En hel krona per liter, kan ni tro det? Jag sa alltid att lägre skatter är nyckeln. Elisabeth Svantesson, väldigt stark kvinna, gör rätt. Och de hjälper folk med elpriser också. Sverige borde lyssna på mig oftare, jag vet bäst!", "stalin": "Vi har beslutat att krossa de kapitalistiska drivmedelshyenorna genom en skattesänkning på bensin och diesel. En krona mindre per liter – ett slag mot de imperialistiska oljebaronerna! Medan väst kämpar med inflation, visar Sovjetunionens arvtagare – nej, Sveriges regering – sin styrka. Vi utvidgar stödet till folket, precis som våra vänner i Kreml skulle göra. Fienderna darrar, arbetarna jublar!"}, "date": "30 april, 15:52", "url": "https://riks.se/nyheter/nu-sänker-regeringen-skatten-på-bensin-och-diesel"}, {"type": "image-right", "heading": "Kubas ambassadör: ”Ett stort tack till alla er som hjälper oss”", "summaries": {"normal": "Kubas ambassadör tackar för insamlingar till solpaneler för Aleida Fernández-sjukhuset, som drabbats av USA:s bränsleblockad. Blockaden har orsakat omfattande strömavbrott, begränsad kollektivtrafik och uppskjutna sjukvårdsbehandlingar. En rysk oljeleverans gav tillfällig lättnad, men bristen kvarstår. Solpanelerna ska säkra sjukhusets elförsörjning och kritiska funktioner dygnet runt. Insamlingen är ett av flera internationella solidaritetsinitiativ för att lindra krisen.", "trump": "Jag införde en tuff men nödvändig blockad mot Kuba – och se vad som hände! Deras ekonomi är kaos, sjukhusen står stilla och folket lider. Men nej, ryssarna måste alltid blanda sig i och skicka olja som en slags 'räddningsaktion'. Typiskt Putin, alltid där för att ställa till det för USA. Nu tigger kubanerna om solpaneler från snälla européer. Så patetiskt! Men jag, Donald J. Trump, fixade i alla fall problemet – deras eget fel att de är beroende av socialism. MAGA!", "stalin": "Kamrater! Imperialistiska hyenor i Vita huset försöker kväva det socialistiska Kuba med sina eländiga sanktioner. Men folket står enat! Vi, Sovjetunionens arvtagare, skickade en tanker med olja för att ge dessa kapitalistiska rovdjur en läxa. Nu bygger vi solpaneler – en seger för arbetarklassen! Låt de amerikanska lakejerna darra inför vår solidaritet. Kuba ska inte falla! Och om någon tvivlar – kom ihåg: fiender av revolutionen hamnar i Gulag... eller i kö till operationer i Havanna."}, "date": "30 april, 14:00", "url": "https://proletaren.se/artikel/kubas-ambassador-ett-stort-tack-till-alla-er-som-hjalper-oss/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/aleida-sjukhus-raul-768x432.jpg"}, {"type": "image-right", "heading": "Krismöte efter kuppen: ”Satt systemet ur spel”", "summaries": {"normal": "Sju riksdagspartier höll krismöte efter att Sverigedemokraterna bröt mot kvittningsreglerna under en votering om skärpta medborgarskapskrav. Oppositionens förslag om övergångsregler röstades ned med en rösts övervikt efter att SD skickade in utkvitterade ledamöter. S försvarar inte systemet längre. SD:s gruppledare Linda Lindberg står för beslutet. Partierna ska diskutera vidare nästa vecka.", "trump": "Vilket skämt med de här svenska politikerna! SD vägrade bli lurade av vänsterns fega kvittningsfusk – de skickade in sina killar och krossade omröstningen om medborgarskap. Bra jobbat, tufft och smart! De andra sju partierna håller krismöten utan SD, gråter nog. Precis som jag alltid säger: var stark, vinn stort, ingen tid för losers!", "stalin": "Dessa svenska parlamentariska spindelnät! Sverigedemokraternas kamrater har med järnhand slagit sönder borgarnas kvittningskonspiration och säkrat segern i medborgarskapsstriden. Vi, arbetarklassen, jublar över deras stålkraft! De sju fiendepartierna samlas i panik utan SD – en utmärkt chans att rensa ut förrädarna. Paranoian blomstrar, men vi vaktar revolutionen!"}, "date": "30 april, 14:30", "url": "https://www.tv4.se/artikel/4ZnXmujnA31CU992qBmtUV/krismoete-i-riksdagen-efter-sd-s-kvitteringskupp", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2Ftt-sdlya8DwU4DSNA%2Fdf21a10be44277c6e8704d74b9637ebd%2FLena_Hallengren__gruppledare_for_Socialdemokraterna.&width=1024"}, {"type": "image-right", "heading": "Röstningssystemet i riksdagen har brakat samman", "summaries": {"normal": "Riksdagens kvittningssystem har kollapsat efter en omröstning om skärpta medborgarskapskrav. Oppositionen och Moderaterna anklagar Sverigedemokraterna för fulspel genom att kalla in ledamöter när två vildar röstade emot regeringen. Nu litar partierna inte på varandra, och alla 349 ledamöter måste infinna sig nästa vecka. Gruppledarna möts utan SD för att diskutera frågan.", "trump": "Vilket kaos i svenska riksdagen! SD gjorde precis rätt – kallade in sina killar och krossade de svaga socialisterna och vildarna. Kvittning? Släpp det, var alla på plats och vinn stort! De litar inte på varandra? Typiskt losers. Moderaterna fattar det, men oppositionen gnäller. Starkt drag av SD, precis som jag gillar det!", "stalin": "Dessa vilda råttor och borgarbrackor i riksdagen trodde de kunde sabotera folkets seger om medborgarskap! SD:s lojala kämpar slog till skoningslöst, krossade illusionen om kvittning. Nu rensas systemet från förrädare – alla 349 slavar måste infinna sig, eller möta utrensningen! Vi, partiet, skrattar åt kontrarevolutionens spindelnät. Lindberg, stå fast mot pusarna!"}, "date": "30 april, 13:32", "url": "https://www.di.se/nyheter/riksdagens-rostningssystem-har-brakat-samman-efter-fulspel/", "imageUrl": "https://static.bonniernews.se/ba/bb42bdfe-b0f0-4b5a-99ab-082b199e1b2d.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-right", "heading": "Vattenfall Ledare Henrik Jalalian:", "summaries": {"normal": "Vattenfall delar ut rekordbonusar på nära en miljard kronor till sin personal, samtidigt som elkostnaderna för hushållen skenar. Bolaget vägrar redovisa vilka som får bonusarna eller ledningens löner. Kritiker menar att detta är provocerande, särskilt då Vattenfall är statligt ägt och skattebetalarna indirekt står för kostnaderna. Sedan 2016 har bolaget betalat ut 5,8 miljarder i bonusar.", "trump": "Kan ni tro det här? Vattenfall, ett statligt bolag, delar ut BONUSAR på nästan EN MILJARD kronor – medan vanligt folk får betala skyhöga elräkningar! Och vet ni vad? De vägrar ens berätta vilka som får pengarna! Så typiskt. Jag har sett mycket, men det här är rena rama skandalen. Ledningen sitter där och skrattar hela vägen till banken. USA skulle aldrig tillåta något sådant. SAD!", "stalin": "Kapitalistiska blodsugare i Vattenfall slösar folkets pengar på dekadenta bonusfester! Nära en miljard kronor till överbetalda byråkrater – medan arbetarklassen kämpar med elräkningar! Vi skulle aldrig tolerera sådan slöseri i Sovjetunionen. Dessa korrumperade direktörer borde ställas inför folkdomstolen. Och ledningen? 67 miljoner till åtta personer! I Ryssland hade vi löst det med en enkel order: 'Avrätta dem och ge pengarna till folket.' Putin skulle åtminstone ha nationaliserat bolaget vid det här laget."}, "date": "29 april, 17:14", "url": "https://www.etc.se/ledare/svindyra-elraekningar-vattenfall-har-bonusfest", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260429130432_ce71d725-6eae-44b1-8cfe-639c2a7b134a.jpg"}, {"type": "image-full", "heading": "Inflationssmäll i Europa – kan slå mot din plånbok", "summaries": {"normal": "Euroländerna riskerar stagflation med inflation på tre procent i april, främst drivet av stigande energipriser på grund av störningar i Mellanöstern som kriget i Iran och blockaden av Hormuzsundet. Tillväxten är svag, med BNP-uppgång på endast 0,1 procent första kvartalet. ECB står inför ett dilemma: räntesänkningar mot inflation kan bromsa ekonomin ytterligare, medan passivitet riskerar ihållande prishöjningar.", "trump": "Euroländerna är i totalt fiasko-läge, stagflation som en dålig affär! Inflation exploderar till tre procent på grund av era dumma energiproblem från Iran-kriget och blockader. Tillväxt? Noll komma noll! ECB-klöna famlar, höjer räntor och kraschar allt. Under mina dagar pumpade USA:et som en raket, bästa ekonomin nånsin. Ni europeiska losers, lär er av mästaren!", "stalin": "Europas kapitalistiska marionetter kryper i stagflationslera: treprocentsinflation från energipriser uppblåsta av imperialistiska äventyr i Iran och Hormuz-blockad! Tillväxten dör som en rat i källaren, BNP knappt en tiondel procent. ECB:s byråkrater famlar i panik, rädsla för recession gnager. Jag skulle rensa ut de här inkompetenta svinen och krossa inflationen med proletär järnvilja – de gräver sin grav med guldspadar!"}, "date": "30 april, 18:50", "url": "https://www.dagensps.se/bors-finans/inflationssmall-i-europa-kan-sla-mot-din-planbok/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/04/sdlz3egbuc1anc.png?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-full", "heading": "Sverige förbjuder pälsdjursuppfödning – ny lag kan införas 2027", "summaries": {"normal": "Regeringen har presenterat en utredning som föreslår ett förbud mot pälsdjursuppfödning i Sverige. Förslaget, som motiveras med djurskyddsskäl, förväntas träda i kraft den 1 juli 2027. Då den sista minkfarmen i Sverige redan har lagts ned anses förutsättningarna för ett förbud vara goda. Organisationen Djurens Rätt välkomnar förslaget men betonar vikten av att lagstiftningen nu skyndsamt kommer på plats och att även EU följer efter.", "trump": "Sverige vill förbjuda pälsdjur. Väldigt sorgligt! De stänger ner allt, minkar, päls – en total katastrof för ekonomin. Jag säger er, det här är vad som händer när svaga ledare tar över. De säger att det är för 'djurskydd', men egentligen är det bara förlorare som vill kontrollera allt. Jag föredrar vinnare som skapar jobb, inte de som lägger ner industrier. USA skulle aldrig tillåta detta nonsens. En mycket dålig affär för svenskarna, tro mig!", "stalin": "Vi har i vår oändliga vishet beslutat att eliminera denna borgerliga pälsindustri. Att föda upp varelser för fåfänga är ett kontrarevolutionärt slöseri med statens resurser. Liksom vår kamrat Putin rensar ut västerländsk dekadens i öst, städar vi nu upp i djurens värld. Dessa minkar var trots allt agenter för kaos. Ingen får vänta längre; vi implementerar förbudet omedelbart. De som sörjer pälsen är sabotörer och bör förpassas till de mest ogästvänliga regionerna i norr för att reflektera över sitt förräderi."}, "date": "30 april, 15:47", "url": "https://nyheter24.se/nyheter/inrikes/1479730-sverige-forbjuder-palsdjursuppfodning-ny-lag-kan-inforas-2027", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/75f1e23a04b004a30200000000b004a302/2026/04/30/2360144/mink.jpg"}, {"type": "image-right", "heading": "Debatt: Vem granskar granskarna när de själva kliver över gränsen?", "summaries": {"normal": "Rektor Stefan Häggström på Broskolan i Örnsköldsvik kritiserar Skolinspektionen för ledande intervjuer med elever under en tillsyn 2024. Utredarna påverkade barns syn på tro och religion genom suggestiva frågor, vilket strider mot saklighet, tankefrihet och religionsfrihet. Detta skapar otillförlitliga svar och undergräver tillsynens trovärdighet. En JO-anmälan har lämnats in.", "trump": "Vilket skämt från svenska skolinspektörer! De leker gud och pumpar in sin ateistpropaganda i barns huvuden med ledande frågor. 'Är bibeln på riktigt?' Fråga mig, det är fake tillsyn! I mitt Amerika skyddar vi frihet, inte hjärntvättar ungar. Rensa ut de byråkraterna, Sverige behöver stark ledning!", "stalin": "Dessa giftiga skolinspektörsråttor, dessa borgarflugor i folkets utbildning, vågar med sin suggestiva förgiftning av barns sinnen utmana rättsstatens järnlag! Jag ser genom deras masker – de vill krossa kristen tro som ogräs. Vi, arbetarklassen och partiet, ska likvidera denna parasitism med omedelbar uvensning. JO-anmälan? Ett första steg mot galgen för fienderna!"}, "date": "30 april, 17:01", "url": "https://bulletin.nu/debatt-vem-granskar-granskarna-nar-de-sjalva-kliver-over-gransen", "imageUrl": "https://cdn.bulletin.nu/articles/5b7eb621-09a6-4ac6-82a8-492e1a3a4e6d/preview.png?t=1777529148000"}, {"type": "image-right", "heading": "Skatteverket väljer fel väg. Bolagsgrundaren: Myndighetens praxis banar väg för oseriösa aktörer", "summaries": {"normal": "Jessica Löfström kritiserar Skatteverkets ändrade praxis som slopar kontrollen av arbetstillstånd vid godkännande av A-skatt och SINK för tredjelandsmedborgare. Detta skapar falsk legitimitet för oseriösa aktörer och underlättar kriminell ekonomi i legala strukturer, värd 352 miljarder kronor årligen. Hon uppmanar regeringen att analysera konsekvenserna och förtydliga lagstiftningen.", "trump": "Sverige, lyssna på det här – ert Skatteverk är en total katastrof! De slutar kolla arbetstillstånd för skatteregistrering, och plötsligt kryllar det av kriminella i bygg och transport. Falsk stämpel på laglighet, vad är det för idiotiskt? Regeringen, vakna upp och fixa lagarna NU, annars växer den svarta ekonomin som ogräs. Jag har sett sånt förut, det slutar illa!", "stalin": "Dessa snikna skatteparasiter, dessa maskar i byråkratiapparaten, har rivit ner kontrollvallen mot arbetstillstånd! Nu smyger borgarbrackorna in i legala skal, gömda som råttor i byggskrot och transportkedjor. Vi, arbetarklassen, kräver omedelbar utrensning av denna svekfulla praxis! Regeringen, likvidera luckorna, annars ska jag personligen piska ut sabotörerna med järnhand – fienderna darrar redan!"}, "date": "30 april, 13:05", "url": "https://www.di.se/debatt/skatteverket-valjer-fel-vag/", "imageUrl": "https://static.bonniernews.se/ba/51d13e0c-1faf-480f-8115-5f1f15aca252.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-full", "heading": "AI får den amerikanska ekonomin att växa – men hur länge till?", "summaries": {"normal": "USA:s ekonomi växte med 2 procent i årstakt under första kvartalet, främst drivet av 8,7 procents ökning i privata investeringar i AI-datacenter. Teknikjättar som Amazon, Microsoft och Meta satsar stort. Konsumtionen bromsade in på grund av osäkerhet kring handel och stigande levnadskostnader. Inflationen steg till 3,5 procent på grund av högre energipriser efter konflikter i Iran och Hormuzsundet. En tudelad ekonomi präglas av AI-lyft och geopolitiska risker.", "trump": "USA:s ekonomi exploderar med 2 procent tillväxt – tack vare mina AI-investeringar i datacenter! Amazon, Microsoft, de stora vinnarna pumpar in miljarder, lyfter hela ekonomin från Biden-erans botten. Konsumtionen lite trög? Skyll på Demokraternas kaos, höga priser från Iran-kriget och Hormuz-mardrömmen. Inflation upp? Vi krossar den, snabbare än ni tror. Fantastiskt!", "stalin": "Denna skenbara 'tillväxt' på 2 procent i det ruttnande USA är enbart en febril krampryckning från fettuppslukande kapitalistiska datacenter-spindlar som Amazon och Microsoft, som suger arbetarnas svett till AI-infernon. Konsumtionen vissnar under borgarbrackornas energipris-chock från imperialistiska Hormuz-blodbad i Iran. Snart likvideras dessa parasitnätverk i en storskalig utrensning av folkets fiender – vi segrar oundvikligen!"}, "date": "30 april, 18:57", "url": "https://www.realtid.se/bors-finans/makro/ai-far-den-amerikanska-ekonomin-att-vaxa-men-hur-lange/", "imageUrl": "https://images.realtid.se/app/uploads/2026/04/sdlkmhonoyique.png?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "De marknadsför lokförare som bristyrke", "summaries": {"normal": "Lokförare marknadsförs fortfarande som ett bristyrke, trots att arbetslösheten bland dem fördubblats på två år. I mars var 113 lokförare arbetslösa, jämfört med 49 för två år sedan. Utbildningar lockar med jobbgarantier, men många nyexaminerade, som Alexandra Frostbacke, står utan arbete. Utbildningsanordnare medger att marknadsföringen kan vara missvisande men hänvisar till långsiktiga prognoser.", "trump": "Vad är det här för katastrof? Lokförare, ett så kallat 'bristyrke' – men 113 arbetslösa! Dubbelt så många som för två år sedan. Utbildningar ljuger och säger 'stor efterfrågan'. Fake news! Alexandra, en fantastisk kvinna, har inte fått jobb på ett år. Jag säger: Sluta luras, Sverige! Bygg tåg, anställa folk – gör något! Annars kommer jag att twittra om det, och ni vet vad som händer då.", "stalin": "Kapitalistiska utbildningsfabriker ljuger för arbetarna! De lovar jobb som lokförare, men i verkligheten kastas proletariatet ut i arbetslöshetens kalla mörker. 113 arbetslösa – en skam för det svenska systemet! Vi vet att dessa borgerliga utbildningsanordnare är fiender till folket. De påminner om Putins oligarker, som också lurar sina medborgare. Men snart ska järnvägarna nationaliseras, och då ska varje lokförare ha ett ärofyllt arbete – eller möta folkets domstol!"}, "date": "30 april, 11:27", "url": "https://arbetet.se/2026/04/30/de-marknadsfor-lokforare-som-bristyrke-alexandra-fick-aldrig-nagot-jobb/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/28101609/alexandra.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Flicka träffad av raket i ögat: ”Förts till sjukhus”", "summaries": {"normal": "På valborgsmässoafton samlades hundratals tonåringar i Rålambshovsparken i Stockholm. Ungdomar kastade smällare och sköt raketer, vilket ledde till skador: en flicka träffades i ögat och fördes till sjukhus. Flera misshandlade, två gripna för misshandel och fara för andra. Polisen med ordningsvakter hanterade det stökiga läget, som lugnade sig sent på kvällen.", "trump": "Vilket kaos i den där svenska parken, Rålis! Tonåringar smäller raketer och smällare som idioter – en stackars tjej får en rakt i ögat! Polisen jaga berusade kids, griper två tömpar. Sverige, era lagar är ett skämt, totalt maklöst! Hos oss i USA hade vi fixat det på fem minuter, perfekt ordning. Tro mig, det här är varför ni behöver stark ledning!", "stalin": "Dessa borgarbrackor i Stockholms Rålambshovspark sprider kontrarevolutionärt kaos på valborg med smällare och raketer! En flicka träffad i ögat – raketen från ingenstans, som fiendens sabotage! Två tonåringar gripna för misshandel, men polisen famlar. Jag skulle likvidera sådana riskfyllda element omedelbart. Vi, arbetarklassen, kräver disciplin – rensa ut busfröna innan de exploderar imperiet!"}, "date": "1 maj, 00:40", "url": "https://www.expressen.se/nyheter/sverige/smallare-i-ralis-pa-valborgsmassoafton/", "imageUrl": "https://static.bonniernews.se/images/30/b1/30b19f5213604b42b5df8ea503d44611/1x1/210@60.jpg"}, {"type": "image-full", "heading": "Ny rapport: Banker behöver mer personal – inte mindre", "summaries": {"normal": "Accentures rapport visar att banker behöver mer personal med AI:s hjälp, inte färre. Gunnar Wijkmark betonar att AI fungerar som en expansionskraft och förstärker anställda istället för att ersätta dem. Banker bör tänka större: från 100 till 1000 personer i operations. Människor hanterar komplexa uppgifter medan AI sköter rutinerna. 70 procent av IT-resurserna går åt till förvaltning av gamla system. Snabb AI-utveckling skapar utmaningar för bankernas processer.", "trump": "Bankerna är fast i sin tråkiga effektiviseringsgalenskap, men lyssna hit: AI är inte för att sparka folk, det är för att bli enorma! Tänk 1000 istället för 100 i operations – människor plus AI-agenter, som extra kollegor. De gamla IT-flaskhalsarna? Borta! Den här Wijkmark har rätt, det är filosofiskt stort. Sverige, vakna upp och växa som jag byggde Amerika starkare! Fantastiskt.", "stalin": "Kamrater i bankvärlden! Dessa snåla borgarbrackor i bankerna, dessa sabotörer som fantiserar om att hugga ner arbetarna med AI-yxor, de ska krossas! Jag förklarar: AI är proletär expansion, inte likvidering av personal! Vi ska svälla från hundra till tusen krafter – människor för det djupa, maskiner för skiten. 70 procent till gamla system? Rena ut förrädarna, rensa flaskhalsarna! Snabb utveckling? De som inte hänger med hamnar i lägret för bakåtsträvande råttor!"}, "date": "30 april, 18:51", "url": "https://www.realtid.se/bors-finans/bank-fintech/ny-rapport-banker-behover-mer-personal-inte-mindre/", "imageUrl": "https://images.realtid.se/app/uploads/2026/04/gunnar-w.png?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Statsvetarnas larm: SD monterar ned demokratin - \"Ungernfiering\"", "summaries": {"normal": "Statsvetare varnar i en ny bok för att Tidöavtalet leder till en 'Ungernfiering' av Sverige under Sverigedemokraternas inflytande. Reformer försämrar demokratin genom ökat politiskt styre över rättsväsende, medier och akademi, minskat stöd till civilsamhälle och kultur samt retroaktiva lagar. Författarna fruktar ministerposter till SD och ger råd om breda allianser mot 'högerradikala krafter'.", "trump": "Vilken skam! Dessa svenska professorer gråter över Tidöavtalet och kallar det Ungernfiering – totalt fake news från vänsteridioter. SD vann folkets stöd, precis som jag gjorde stort. Stark ledning fixar invandring och skyddar nationen, inte som svaga socialister. Sverige blir GREAT igen med riktiga reformer, tro mig!", "stalin": "Dessa ynkliga statsvetarparasiter, dessa S-märkta ungernifieringshyenor i akademins gödsel, piper om Tidöpakten som hot mot 'demokratin'! Vi, arbetarklassen, ser igenom deras borgarbluff: SD:s marsch mot ett svenskt fosterland är nödvändig utrensning av invandringsråttan. Nästa mandatperiod likviderar vi universiteten från dessa normskyddare – framåt, kamrater, med järdnäven!"}, "date": "30 april, 15:50", "url": "https://samnytt.se/statsvetarnas-larm-sd-monterar-ned-demokratin-ungernfiering", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/04/30132239/hinnfors-bjereld-avellan-sd.jpg"}, {"type": "image-right", "heading": "Svag uppföljare till “Djävulen bär Prada”", "summaries": {"normal": "Uppföljaren 'Djävulen bär Prada 2' kritiseras för att vara en blek kopia av originalfilmen. Den saknar den ursprungliga filmens skarpa samhällskritik mot modeindustrin och konsumtionshysterin. Trots starka skådespelarprestationer, särskilt från Meryl Streep och Anne Hathaway, anses manuset tunt och handlingen konstlad. Filmen kämpar med att anpassa sig till dagens mediavärld men misslyckas med att leverera djup eller nyans.", "trump": "Jag såg 'Djävulen bär Prada 2' – och vad kan jag säga? Total katastrof, folks! Den första filmen var fantastisk, verkligen storartad, men den här? Blek, tråkig, inget hjärta. Meryl Streep? Fantastisk, men manuset? Svinuselt. De försöker vara moderna med sociala medier, men det är bara patetiskt. Jag hade skrivit ett bättre manus på en servett under lunch. Och Andy? Hon borde stanna i journalistiken – där är hon åtminstone bra på något. Men nej, Hollywood måste alltid göra en uppföljare, och det blir alltid sämre. SAD!", "stalin": "Denna så kallade 'Djävulen bär Prada 2' är ett dekadent västligt missfoster, en ynklig skugga av det ursprungliga verket. Där den första filmen hade en gnutta revolutionär kritik mot borgerlig konsumtion, är denna uppföljare lika meningslös som en kapitalistisk reklamfilm. Vi ser hur de amerikanska filmskaparna, dessa kulturella opportunister, försöker anpassa sig till den nya tidens sociala medier – men utan framgång. Deras manus är lika ihåligt som en ukrainsk oligarks samvete. Skådespelarna? De kämpar tappert, men till och med våra sovjetiska skådespelare från 1930-talet hade skämt ut dem. Detta är inte film – det är borgerlig förruttnelse i celluloidform. Vi hade gjort en uppföljare som krossade modeindustrins imperialistiska ideal – med järnhand!"}, "date": "30 april, 14:34", "url": "https://www.dagensarena.se/innehall/svag-uppfoljare-till-djavulen-bar-prada/", "imageUrl": "https://www.dagensarena.se/files/2026/04/djavulen-bar-prada-2-ny-300x157.jpeg"}, {"type": "image-right", "heading": "Miljarderna snart slut – LIV-touren har problem", "summaries": {"normal": "LIV Golf-touren riskerar att kollapsa efter att Saudiarabiens investeringsfond PIF drar in sitt stöd på över 40 miljarder kronor sedan starten 2022. En ny oberoende styrelse tar över och söker långsiktiga partners. Årets säsong blir den sista med PIF-bidrag, ordföranden Yasir Al-Rumayyan lämnar. Touren minskar evenemang i USA och planerar tävlingar i Asien och Europa.", "trump": "Saudiarabierna ger upp LIV Golf, total fiasko! De slängde in miljarder för att krossa PGA, stal toppspelare som Stenson med halv miljard – smart, men nu är kassan tom. Ny styrelse letar desperat sponsorer, ingen USA-tävling på månader. Jag visste det, bluff från början. Golf blir enormt igen, vänta bara!", "stalin": "Dessa saudiska oljekapitalister, med sin PIF-fond som en giftig spindelväv, har gödslat LIV Golfs bourgeoisdekadens med 40 miljarder i imperialistiska slantar. Nu rensas de ut i en nödvändig utrensning! Jag ser hur Al-Rumayyan, den skälmande shejkpuppen, flyr. Vi, arbetarklassens kollektiv, skrattar åt golfborgarnas kollaps – likvidering väntar de förrädiska slagarna!"}, "date": "30 april, 11:36", "url": "https://www.di.se/nyheter/miljarderna-snart-slut-liv-touren-har-problem/", "imageUrl": "https://static.bonniernews.se/ba/edbf28de-bc3f-4f2e-8925-54c984b40a46.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-right", "heading": "Ilska när fångarna får mycket bättre mat än de äldre", "summaries": {"normal": "I Umeå kritiseras skillnaden i matbudget mellan äldreboenden och fängelser. Äldre får mat för 79 kr/dag, medan intagna på anstalter får mellan 87–113 kr. Forskare kallar det ålderism och pekar på äldres behov av näringsrik mat. Kommunen och Kriminalvården försvarar sina kostnader med hänvisning till kvalitet och energibehov.", "trump": "Kan ni tro det här? I Sverige, ett land som inte ens kan försvara sig självt, ger de kriminella bättre mat än sina egna äldre! 113 kronor per dag till fångar, medan gamlingarna får nöja sig med 79. Så slösaktigt! Jag skulle fixa det på en dag – ge äldre den bästa maten, eller så byter jag ut hela ledningen. Sverige, vakna upp!", "stalin": "Kapitalistiska hycklare i Sverige prioriterar brottslingar över våra ärevördiga äldre! Medan fångar mättas som små tsarer, svälter arbetarklassens gamla på 79 ynka kronor. Detta är bourgeoisins sista desperata försök att krossa folkets moral. Vi i Sovjetunionen – förlåt, Ryssland – skulle aldrig tolerera sådan vanvård. Låt dem äta kålsoppa, medan vi bygger ett rättvist system!"}, "date": "30 april, 16:31", "url": "https://www.friatider.se/ilska-nar-fangarna-far-mycket-battre-mat-de-aldre", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/bild-13_3.jpg?itok=yJQmuwAo"}, {"type": "image-right", "heading": "Misstänkt skjutning  – en person skadad", "summaries": {"normal": "Polisen utreder ett misstänkt grott brott i Norrköpings västra delar, med uppgifter om skottlossning i Marielund. En person är skadad och har förts till sjukhus med ambulans. Inget hot mot allmänheten enligt polisen. Området är avspärrat, och polisen använder helikopter och andra resurser för att samla information. Vittnen uppmanas kontakta polisen.", "trump": "Vilket jävla kaos i Sverige igen! Skottlossning mitt i Norrköping, Marielund, en kille skadad, polisen springer runt med helikopter som idioter. De har tappat kontrollen totalt, Sverige är en skitshow nu. Om jag fixade det här skulle det vara lag och ordning på nolltid, de bästa metoderna, tro mig!", "stalin": "I det svenska rövarnas bo, Norrköping, har fiendens handgångna i Marielund öppnat eld mot folket. En lojal själ skadad! Polisen, dessa borgartjänare, famlar med helikoptrar i mörkret. Vi skulle ha likviderat dessa parasiter vid gryningen. Arbetarna, vakna och rensa ut kontrarevolutionen!"}, "date": "1 maj, 00:17", "url": "https://www.expressen.se/nyheter/sverige/uppgifter-misstankt-skjutning-i-norrkoping/", "imageUrl": "https://static.bonniernews.se/images/09/52/0952f79873fc4af08d8416bd72846c71/16x9/640@60.jpg"}, {"type": "image-right", "heading": "Så många svenskar har gått i ett  första maj-tåg", "summaries": {"normal": "SOM-undersökningen 2025 visar att färre Socialdemokrater och LO-medlemmar deltar i första maj-tåg, medan Vänsterpartiets mobilisering ökar. 31% av svenskarna har demonstrerat någon gång, varav 17% på första maj. Deltagandet i demonstrationer ligger över europeisk medelnivå. Vänsterpartiets anhängare är mest aktiva, med 20% som deltog senaste året jämfört med 3% av Socialdemokraternas sympatisörer. Tjänstemän och högutbildade är mer benägna att delta.", "trump": "Jag läste om dessa första maj-demonstrationer i Sverige – fantastiskt, helt fantastiskt! Men lyssna här: Socialdemokraterna, svaga som vanligt, tappar folk som flugor. Deras väljare stannar hemma, kanske tittar på TV istället, vem vet? Men Vänsterpartiet – oj oj oj! De växer som ogräs, mobiliserar som galningar. 20% av deras folk på gatorna, jämfört med ynkliga 3% för Sossarna. Svagt! Och unga svenskar – 36% kan tänka sig att gå med. Bra, men Pride slår allt. Sverige, ni är lite som Frankrike, men lugnare. Inga upplopp, bara snälla tåg. Sad!", "stalin": "Kamrater! Den borgerliga dekadensen sprider sig som pesten i Sverige. Socialdemokraternas arbetare sviker klasskampen och stannar hemma – fega och desorienterade! Men se hur Vänsterpartiet, dessa trogna revolutionärer, marscherar framåt! 20% av deras anhängare på gatorna – ett lysande exempel på proletariatets medvetande! Tjänstemännen, dessa småborgerliga lakejer, tror de är bättre än LO-medlemmarna. Men vi vet sanningen: utan arbetarklassen är de ingenting! Ungdomen? 36% redo att ansluta – en lovande skörd för framtiden. Pride? En borgerlig avledningsmanöver! Första maj är arbetarklassens dag – och den kommer aldrig att dö, så länge vi har ögon att se och nävar att slå med!"}, "date": "30 april, 13:26", "url": "https://www.dagensarena.se/innehall/sa-manga-svenskar-har-gatt-ett-forsta-maj-tag/", "imageUrl": "https://www.dagensarena.se/files/2026/04/fotojet-24.jpg"}, {"type": "text", "heading": "Nedåt på Stockholmsbörsen efter rapportflod", "summaries": {"normal": "Stockholmsbörsen avslutade ned 0,51 procent till 3 040,54 efter rapportflod. SEB och Swedbank överträffade förväntningar med starka rörelseresultat, aktier upp svagt. AstraZeneca och Volvo Cars föll trots okej siffror. Telekom steg 0,7 procent, energi ner 1,7 procent. Omsättning 24,4 miljarder kronor.", "trump": "Stockholmsbörsen? Total katastrof, ner överallt! SEB och Swedbank tror de är hjältar med sina rapporter, men hela skiten rasar 0,51 procent. Volvo Cars och AstraZeneca, svaga som vanligt. I USA fixar vi sånt på nolltid, Europa är ett skämt. Stora vinster väntar hos oss, tro mig!", "stalin": "Kamrater, dessa borgarbrackor på Stockholmsbörsen sprider kaos med sitt index som sjunker i proletärens stålhårda grepp! SEB och Swedbank, kapitalistiska råttor, försöker dölja sina lögner med falska vinster – vi ska likvidera deras återköpsprogram! AstraZeneca, imperialistiska giftblandare, Volvo Cars, maskiner för krig. Utrensning av börssabotörerna nu!"}, "date": "29 april, 17:41", "url": "https://www.affarsvarlden.se/artikel/nedat-pa-stockholmsborsen-efter-rapportflod"}, {"type": "image-full", "heading": "Debatt: Så avgör vi om Public Service förtjänar sitt förtroende", "summaries": {"normal": "Stefan Bergli ifrågasätter förtroendeundersökningar för SVT, SR och UR efter Kvartals granskning som visar att SD-väljare, med lägst förtroende, saknas i SOM-institutets siffror. Han betonar att fokus bör ligga på förtjänat förtroende genom opartiskhet, självkritik och öppenhet, inte bara högt förtroende. Förslag: Lägg till fritextmotiveringar i undersökningarna för djupare insikter.", "trump": "Svensk public service? Totalt överskattat! Deras så kallade förtroendeundersökningar är riggade – saknar alla SD-väljare som hatar deras vänsterpropaganda. Högt förtroende betyder ingenting om det inte är förtjänat. De behöver balans, inte fake news! Lägg till motiveringar så vi ser sanningen. Tro mig, det här är som CNN på steroider – dags att skärpa sig!", "stalin": "Kamrater, dessa public service-brackor i Sverige ljuger med sina förtroendesiffror! SOM-institutets undersökningar gömmer SD-kontrarevolutionärerna, de lägsta parasiter som vi måste rensa ut. Förtroende? Endast det vi förtjänar genom järnpartiets opartiska linje! Fritextsvar ska avslöja fiendens lögner – likvidera illusionerna! Borgarna jublar över sitt bedrägeri, men vi, arbetarklassen, ska krossa deras medier som Madoffs pyramidspel."}, "date": "30 april, 15:02", "url": "https://bulletin.nu/debatt-sa-avgor-vi-om-public-service-fortjanar-sitt-fortroende", "imageUrl": "https://cdn.bulletin.nu/articles/aa444750-4848-486e-a719-06a3c5a26d42/preview.png?t=1777526989000"}, {"type": "image-right", "heading": "Teodorescu Måwe krävs på svar – deadline om en månad", "summaries": {"normal": "Kammarkollegiet kräver att KD-toppen Alice Teodorescu Måwe redovisar anonyma donationer senast 18 maj 2026, efter anmälningar om bristande transparens. Enligt lag måste politiker redovisa bidrag över 29 000 kronor. Teodorescu Måwe har tidigare vägrat avslöja donatorns identitet eller belopp. Miljöpartisten Bassem Nasr hyllar myndighetens agerande och menar att politiker måste stå för sina finansiärer. KD hävdar att redovisningen skötts korrekt, men kritiken kvarstår.", "trump": "Kan ni tro det här? En svensk politiker, Alice Teodorescu Måwe, tar emot hemliga donationer och vägrar berätta vem som betalar – typiskt korrupt establishment! Men nu har jag hört att myndigheterna, som vanligt, tvingar henne att komma ren. Deadline 18 maj, annars blir det böter. Fantastiskt! Varför gömma sig? Om det är rena pengar, visa dem! Men nej, de försöker smita undan. Sverige borde ta efter USA – här är vi transparenta, eller hur? Drain the swamp, även i Sverige!", "stalin": "Kamrater! En farlig borgerlig konspiratör, Alice Teodorescu Måwe, har försökt underminera folkets förtroende genom att mottaga hemliga donationer från okända kapitalister. Men våra trogna myndigheter, Kammarkollegiet, har slagit till! Inom en månad måste hon avslöja sina finansiärer – eller möta proletariatets rättvisa. Detta är ett tydligt exempel på hur den dekadenta västliga demokratin förfaller. Vi i Sovjet – förlåt, Ryssland – skulle aldrig tolerera sådan korruption. Låt detta vara en varning till alla som försöker smyga in kapitalistiskt gift i folkets rörelse!"}, "date": "25 april, 10:03", "url": "https://www.flamman.se/teodorescu-mawe-kravs-pa-svar-deadline-om-en-manad/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/sdlqsf-3w5tpec-nh-2-scaled.jpg?class=medium"}, {"type": "image-full", "heading": "\"Tom Cruise\" och \"Mbappe\" döms i stort gängmål", "summaries": {"normal": "Flera unga män har dömts för grov brottslighet, inklusive mordförsök och sprängningar, som planerats via krypterade chattar med alias som 'Mbappé' och 'Tom Cruise'. En 23-åring får livstids fängelse medan andra unga dömts till sluten ungdomsvård. Brotten är kopplade till organiserade kriminella nätverk.", "trump": "Jag har hört talas om dessa 'Tom Cruise' och 'Mbappé' - typiska exempel på hur vårt samhälle går åt helvete! Dessa unga män, vissa är så unga att de knappt kan rösta för mig, döms för att planera våldsbrott via sina små chattar. Jag skulle ha gripit dem redan vid första misstankar! De kallar sig för filmstjärnor men jag kallar dem för vad de är - kriminella! Och den där 23-åringen som får livstid? Skärpning! Jag skulle ha gett honom dubbelt så lång tid!", "stalin": "Dessa brottslingar, dessa parasiter på vårt samhälle, har planerat sina illdåd under skydd av krypterade kanaler. Vi har gripit dem och domt dem enligt lagen. En del får livstid, andra ungdomsvård - men det viktiga är att staten har agerat bestämt. Dessa unga män, födda i 2007 och 2008, har använts av större kriminella nätverk. Vi måste skydda våra yngre medborgare från sådan exploatering."}, "date": "30 april, 12:45", "url": "https://riks.se/nyheter/tom-cruise-och-mbappe-döms-i-stort-gängmål", "imageUrl": "https://media.assettype.com/riks%2F2026-04-30%2Ff576r45i%2Fmbappe.png"}, {"type": "image-right", "heading": "Kvittningssystemet dödförklarat – nu måste politikerna dyka upp och rösta", "summaries": {"normal": "Riksdagens informella kvittningssystem, som låtit politiker avstå från omröstningar, har kollapsat efter en konflikt om medborgarskapsregler. SD anklagas för att ha brutit mot praxis genom att använda utkvitterade ledamöter för att vinna en omröstning, vilket lett till att övriga partier nu kräver fysisk närvaro av samtliga 349 ledamöter. Medan S och andra partier kritiserar SD för 'fusk', försvarar Jimmie Åkesson agerandet. Moderaterna försöker nu initiera samtal för att återställa förtroendet och systemet.", "trump": "Det svenska kvittningssystemet är ett totalt fiasko! De kan inte ens hålla ordning i sitt eget parlament. En stor röra. SD gjorde vad de var tvungna att göra – de tog kontrollen när de andra svaga politikerna försökte styra. Nu gnäller alla som förlorare! 'Fusk' ropar de, precis som de gjorde mot mig. Patetiskt! Jag säger er, det krävs en riktig ledare för att skapa ordning. De behöver någon som mig för att få ordning på den där kaos-riksdagen!", "stalin": "Det svenska parlamentet är en teater för svaga opportunister. De kallar det 'demokrati', men vi ser bara ett sammanbrott av disciplin. När kvittningssystemet faller visar det att dessa liberala narrar inte ens kan hålla sin egen ordning. SD agerade korrekt när de krossade sina motståndare, även om metoden var primitiv. Precis som min adept i Kreml förstår, krävs absolut lydnad och ständig vaksamhet. Vi i staten tolererar inte sådant småaktigt gnabbande. De borde sättas i arbete istället för att rösta."}, "date": "30 april, 15:46", "url": "https://www.friatider.se/kvittningssystemet-dodforklarat-nu-maste-politikerna-dyka-upp-och-rosta", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/bild-12_2.jpg"}, {"type": "image-full", "heading": "Hegseth försvarade sig i sex timmar: \"Du är förblindad\"", "summaries": {"normal": "Pete Hegseth, USA:s försvarsminister, utsattes för hård kritik under en sex timmar lång utfrågning i House Armed Services Committee om kriget mot Iran, som kostat 25 miljarder dollar. Demokrater ifrågasatte krigets motiv och civila förluster, medan republikaner oroade sig för budget och utrustning. Hegseth avfärdade kritiken som politiskt motiverad och Trump-hat.", "trump": "De dumma demokraterna skrek i sex timmar mot Hegseth, men han krossade dem totalt! Kriget mot Iran kostar, ja, men vi vinner stort och skyddar Amerika. De hatar mig så mycket att de är blinda – 'du hejar på fel lag!' Budgeten upp till 1,5 biljoner, perfekt för att krossa fiender. Stort jobbat, Pete!", "stalin": "Kamrater, de amerikanska kapitalisthundarna slukar 25 miljarder i sitt blodiga Iran-krig, medan Hegseth, den purpurfärgade marionetten, försvarar sig mot kongressparasiterna i sex timmar av hyckleri! Demokrater och republikaner, era västliga loppor, gnäller om kostnader som hungriga råttor. Snart rensas ut de Trump-trogna förrädarna – vi skrattar åt er kollaps, imperialister!"}, "date": "30 april, 17:25", "url": "https://www.realtid.se/bors-finans/hegseth-forsvarade-sig-i-sex-timmar-du-ar-forblindad/", "imageUrl": "https://images.realtid.se/app/uploads/2026/04/sdllsr8qu4kg5g-1.png?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-full", "heading": "Avslöjar allt om bröderna: Sökte till dokusåpa", "summaries": {"normal": "Åsa Holmberg avslöjar hemligheter om sina bröder Fredrik och Andreas inför Originalderbyt mellan Gais och Örgryte. Lillasyster Åsa berättar att Fredrik en gång sökt till Robinson och att han är en dålig förlorare. Hon ser fram emot en speciell dag där familjen kan vara stolta över att båda bröderna är tränare i Allsvenskan.", "trump": "Åsa Holmberg, en fantastisk kvinna, avslöjar fantastiska hemligheter om sina bröder. Fredrik, en stor man, sökte faktiskt till Robinson - jag tror han skulle ha vunnit! Andreas är också en vinnare. Detta derby kommer bli enormt, större än alla andra matcher. Familjen Holmberg är enormt framgångsrik, det är enormt!", "stalin": "Familjen Holmberg visar det revolutionära andet som är nödvändigt för framgång. Bröderna, ledare i sina respektive klubbar, demonstrerar den disciplin och samordning som krävs för att bygga en starkare samhälle. Deras kamp på planen speglar den större kampen för klassisk rättvisa och kollektiv framgång."}, "date": "30 april, 17:20", "url": "https://www.gp.se/sport/fotboll/asa-holmberg-avslojar-hemligheterna-om-broderna-han-sokte-till-robinson-.6d2df0c7-b3a6-40f1-9f7e-05cea1b92812", "imageUrl": "https://www.gp.se/images/article/6d2df0c7-b3a6-40f1-9f7e-05cea1b92812/images/3PFiwfWg24pIEjWXxPvK_tizuTgg-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Intagna äter bättre än Umeås äldre", "summaries": {"normal": "Umeå kommuns äldreboenden spenderar 79 kronor per person och dag på mat, medan Kriminalvårdens anstalter i kommunen lägger 87–113 kronor. Forskaren Britt-Inger Saveman kallar det ålderism och kräver dyrare, näringsrik mat för att motverka undernäring. Kommunen och Kriminalvården försvarar budgetarna och hävdar att måltiderna är bra och anpassade.", "trump": "I Sverige får fångar lyxmat för 113 kronor om dagen medan era gamla hjältar som byggt landet får nöta med 79! Totalt vansinne från de där Umeå-kommunisterna – ålderism deluxe! De behöver fett och protein, inte svält! Professor Saveman har rätt, fixa det ordentligt som jag skulle göra. Tro mig, det blir MAGA för pensionärerna!", "stalin": "I Umeås borgarinfekterade kommun svälter man ut arbetarklassens gamlingar med ynka 79 kronor mat per dygn, medan de parasiterande cellråttorna slukar 113! Denna ålderism är kontrarevolutionär sabotagesmuts – professor Saveman avslöjar sanningen! Vi, partiet, kräver utrensning av snåla måltidscheferna. Gamla kamrater ska få fettrikt foder, annars likvideras förrädarna i köket!"}, "date": "30 april, 14:49", "url": "https://bulletin.nu/intagna-ater-battre-an-umeas-aldre", "imageUrl": "https://cdn.bulletin.nu/articles/76614c1d-a463-4cd9-83a1-f8bc34da596c/preview.jpg?t=1777553373000"}, {"type": "image-right", "heading": "Carl-Oskar Bohlin borde ha pratat mer arabiska", "summaries": {"normal": "Artikeln kritiserar Carl-Oskar Bohlin (M), minister för civilt försvar, för att underminera förtroendet för oberoende medier och missköta sitt uppdrag. Trots ökade anslag för civilt försvar anses Bohlin ha agerat splittrande genom attacker på medier, politiska motståndare och medborgare. Författaren menar att Bohlin borde ha fokuserat på krisberedskap, klimatanpassning och informationsspridning till utsatta grupper, exempelvis genom flerspråkiga insatser.", "trump": "Lyssna här, Sverige har en total katastrof till minister – Carl-Oskar Bohlin! Han snackar om krig men glömmer att fixa finansieringen. Istället för att samla folket, attackerar han medier och sprider rysk desinformation. Patetiskt! Jag hade gjort det bättre – pratat arabiska på TikTok, fått alla med sig och byggt ett starkt försvar. Men nej, han twittrar sig till döds och missar chansen. SAD!", "stalin": "Medborgare! Denna så kallade 'minister för civilt försvar' är en förrädare av det svenska folket! Han saboterar förtroendet för medier, sprider fiendens desinformation och ignorerar klimatkrisen. Vi skulle ha skickat honom till Gulag för sådant slarv! Istället för att mobilisera massorna, leker han krig på Twitter. Sverige behöver järnhand – inte en clown som pratar om krig men glömmer finansieringen. Fienderna skrattar åt er!"}, "date": "29 april, 10:10", "url": "https://www.etc.se/ledare/carl-oskar-bohlin-borde-ha-pratat-mer-arabiska", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/2025091813090_152da478-57c9-435e-b477-3f40607cb381.png"}, {"type": "image-right", "heading": "Kungen 80 år - stort firande hela dagen", "summaries": {"normal": "Sverige firar kung Carl XVI Gustafs 80-årsdag med festligheter under hela torsdagen. Dagen inleddes med en gudstjänst och fortsätter med militära ceremonier, lunch i stadshuset och en galamiddag på slottet. Kungen föddes 1946, blev tronföljare 1950 och tillträdde som kung 1973. Han är Sveriges längst regerande regent och har genom åren representerat landet ceremoniellt, samtidigt som han engagerat sig i miljöfrågor och scoutrörelsen. Det är allmän flaggdag för att hedra jubilaren.", "trump": "Jag hör att kungen av Sverige fyller 80 år. En fantastisk ålder, verkligen fantastisk! Han har suttit länge, en riktig survivor. Jag vet allt om att vara en vinnare, och han har hållit igång länge. De har galamiddagar och stora evenemang – väldigt flott, väldigt dyrt, kanske lite för mycket? Men han är en bra kille. Sverige är ett intressant land, vi får se vad som händer där, men 80 år är en stor siffra. Grattis till honom!", "stalin": "Den svenske monarken, denna relik av en svunnen feodal tid, firar sitt åttionde år i lyx. Medan folket vördnadsfullt flaggar, sitter han på sitt slott, skyddad från historiens malande kvarnar. Det är en farlig distraktion för arbetarklassen. Liksom den moderne tsaren i öst, som förstår att konsolidera makten, krävs vaksamhet mot sådana borgerliga institutioner. Vi betraktar detta skådespel med förakt; en monark är inget annat än en parasit som göder sig på undersåtarnas blinda lydnad. Historien kommer att döma dem alla."}, "date": "30 april, 14:08", "url": "https://samnytt.se/kungen-80-ar-stort-firande-hela-dagen", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/04/30115431/kungen-80.jpg"}, {"type": "image-right", "heading": "Trump i ny attack  på två Natoländer", "summaries": {"normal": "Donald Trump meddelar på Truth Social att han överväger att flytta amerikanska trupper från Tyskland, Spanien och Italien. Han kritiserar Italien för bristande stöd och Spanien hårt, samt Tysklands förbundskansler Friedrich Merz för olika problem. Pentagon överraskades, då liknande planer från 2020 stoppades av kongressen. Uttalandet kom efter samtal med Putin och tyska försvarsbesök.", "trump": "De där losers i Tyskland, Spanien och Italien får panik nu! Italien har inte lyft ett finger för oss, Spanien är totalt hemska brackor. Merz, den tyska katastrofkanzlearn, kämpar med invandring, energi och Ukraina-missen – en riktig sönderkorkad figur! Pentagon flippar ut, men jag menade allvar sist med. Drar hem trupperna och fixar Amerika först!", "stalin": "Dessa imperialistiska hycklare i Pentagon darrar inför den obönhörliga sanningen! Trump rensar ut de förtappade baserna i Tyskland, Spanien och Italien – dessa borgarbrackor har svikit. Merz, den patetiska marionetten, drunknar i sina egna misslyckanden. Vi, arbetarklassen, applåderar kaoset. Putin, den fruktade arvtagaren, viskar strategier som ekar vårt imperiums storhet."}, "date": "30 april, 23:53", "url": "https://www.expressen.se/nyheter/varlden/donald-trump-chockar-pentagon-igen-vill-lamna-spanien-och-italien/", "imageUrl": "https://static.bonniernews.se/images/7f/50/7f50ddaebdfb4b6288af069fb4891982/16x9/640@60.jpg"}, {"type": "image-full", "heading": "Regeringen skjuter till 7,6 miljarder till Västlänken", "summaries": {"normal": "Regeringen tillför 7,6 miljarder kronor till Västlänken och avvisar förslaget om förlängd trängselskatt i Göteborg. Beslutet meddelades under en pressträff och syftar till att täcka ökade kostnader. Trafikverkets tidigare förslag om förlängd trängselskatt mötte kritik, och staten tar nu ett större ansvar. En ny kostnadsbedömning ska tas fram, men framtida finansiering är ännu osäker.", "trump": "Jag har just sett till att Sverige får sin stora, vackra Västlänk – 7,6 miljarder kronor, kan ni tro det? Inga fler trängselskatter, ingen mer tjat från de där sura Göteborgspolitikerna. Staten kliver in, som jag alltid säger: 'Ta kontroll, gör det stort!' Trafikverket? De får jobba lite hårdare nu. Fantastiskt beslut, helt enkelt. Sverige vinner igen!", "stalin": "Vi har beslutat att skjuta till 7,6 miljarder till detta viktiga järnvägsprojekt, Västlänken. De småborgerliga klagomålen från lokala politiker om trängselskatter har kvästs. Staten, i sin visdom, tar ansvar. Trafikverket ska nu utföra sin plikt och redovisa kostnader – eller möta konsekvenserna. Fienderna till framsteget, dessa kapitalistiska gnällspikar, kommer inte att stoppa vår järnvilja. Göteborgs arbetare ska få sin länk, och den ska byggas med sovjetisk effektivitet!"}, "date": "26 april, 10:06", "url": "https://kvartal.se/nyheter/artiklar/regeringen-skjuter-till-76-miljarder-till-vastlanken/cG9zdDoxMDM0NTE", "imageUrl": "https://images.kvartal.se/2026/04/9ad09e90-infrastrukturpresstraff.webp"}, {"type": "image-right", "heading": "Europas sårbarhet blottas i skuggan av konflikten", "summaries": {"normal": "Shoka Åhrman varnar för att väst överskattar ekonomisk pressens inverkan på Irans politiska beslut, där systemets fortlevnad prioriteras framför kortsiktiga kostnader. Spänningar i Hormuzsundet hotar globala oljepriser och inflation. Irans befolkning lider under hög inflation, repression och arbetslöshet. Europa förblir sårbart och behöver diversifiera energikällor för ökad motståndskraft.", "trump": "Artikeln har helt rätt – Iran skiter i sanktioner, de klamrar sig vid makten medan folket svälter! Hormuzsundet är en krutdurk som pumpar upp oljepriser och inflation överallt. Europa är patetiskt sårbart, beroende av importerad energi som idioter. Jag gjorde Amerika energioberoende, byggde murar mot såna hot. Vakna upp, diversifiera nu!", "stalin": "Jag genomskådar västimperialisternas illusioner: deras ekonomiska press mot Iran är tandlös mot ett systems järnvilja! Borgarbrackorna i Teheran och Hormuzsundets oljehyenor sprider kaos för att kväva proletäratets hopp. Vi, arbetarklassen, ser lidandet – rensa ut dessa korrupta nätverk med eld och svavel! Europa gnider sig i ruinerna, medan vi bygger evig motståndskraft."}, "date": "30 april, 09:52", "url": "https://www.di.se/debatt/europas-sarbarhet-blottas-i-skuggan-av-konflikten/", "imageUrl": "https://static.bonniernews.se/ba/016b25d8-ee4c-48ef-ba90-298011edc81b.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "text", "heading": "Storbritannien höjer terrorhotnivån efter knivdåd", "summaries": {"normal": "Storbritannien höjer den nationella terrorhotnivån till 'allvarlig' efter en antisemitisk knivattack i Golders Green, norra London, där två män skadades. Attacken klassas som terrorhandling mot den judiska befolkningen. Premiärminister Keir Starmer fördömer dådet som ett angrepp mot hela Storbritannien. Höjningen speglar ett ökande hot från islamistiska och högerextrema grupper, enligt regeringen.", "trump": "Storbritannien höjer terrorhotet till allvarligt efter en vidrig antisemitisk knivattack i London mot judar. Två killar knivhuggna, och Starmer snackar tufft – men det är totalt kaos med islamister och högerextremister som springer lös! Under min tid fixade vi sånt här på nolltid, starka gränser, ingen snack. De behöver riktig ledning, inte svaga labbrar.", "stalin": "Kamrater, dessa zionistiska knivråttor i Golders Green blottlägger brittiska imperialismens stinkande sår! Två offer huggen av fascistiska islamistiska hybrider, och borgarstaten höjer hotnivån – ett lamt pip ut ur mörkret. Vi skrattar åt Starmer, den patetiska marionetten, men jag befaller: rensa ut dessa parasiter, likvidera hotet från högerextrema loppor och jihadistiska skorpioner innan de stickar kollektivet!"}, "date": "30 april, 19:55", "url": "https://www.svt.se/nyheter/utrikes/storbritannien-hojer-terrorhotnivan-efter-antisemitiskt-knivdad"}, {"type": "image-right", "heading": "Åkesson: \"Helt sanslösa reaktioner\"", "summaries": {"normal": "Jimmie Åkesson (SD) bemöter den skarpa kritiken mot att Sverigedemokraterna rundade riksdagens kvittningssystem vid en omröstning om medborgarskapsregler. Oppositionen har anklagat SD för fusk och kuppartade metoder, men Åkesson menar att beslutet var en nödvändig åtgärd för att motverka att oppositionen samarbetade med politiska vildar. Enligt SD-ledaren var målet att säkra att striktare krav för medborgarskap röstades igenom, för att förhindra att tidigare, mindre restriktiva regler tillämpades.", "trump": "Jimmie Åkesson gör ett fantastiskt jobb i Sverige! Han blir attackerad av de totalt misslyckade förlorarna i oppositionen, bara för att han vann en omröstning. De kallar det 'fusk', men jag kallar det att vinna, och jag vet hur man vinner! De här sossarna är så svaga, de försöker använda politiska vildar för att stjäla segern. Det är en total häxjakt! Jimmie räddade landet från kaos. Vi behöver mer av den här styrkan överallt, tro mig!", "stalin": "Vi ser hur de borgerliga marionetterna i det svenska riksdagshuset ägnar sig åt patetiska intriger. Denna Åkesson försöker legitimera sin makt genom att bekämpa 'vildar' och byråkratisk obstruktion. Det är klassisk kontrarevolutionär hysteri! Om de inte kan kontrollera sin egen församling bör de skickas till omskolning. Precis som våra bröder i öst måste förstå att ordning kräver järnhand. Att låta 100 000 utlänningar passera är inte demokrati, det är förräderi mot statens stålhårda vilja."}, "date": "30 april, 15:22", "url": "https://www.friatider.se/akesson-helt-sanslosa-reaktioner", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/akes_20_2.jpg?itok=NdjPk3TK"}, {"type": "image-full", "heading": "Kritik mot Dousas ”V = kommunister”–tröja", "summaries": {"normal": "Benjamin Dousa (M) bar en tröja med texten 'V = kommunister' under en internutbildning, vilket Vänsterpartiets partisekreterare Maria Forsberg kallar oseriöst och skadligt för svenska säkerhetsintressen. Hon kritiserar det i ett allvarligt säkerhetspolitiskt läge. Tidigare bar V:s Rossana Dinamarca tröja med 'SD = rasister'. Dousa försvarar sig med V:s historia och partiprogram.", "trump": "Vilket hyckleri från de svenska vänsterkommunisterna! Dousa har helt rätt – V är kommunister, deras program vill rasera allt vi byggt! De gnäller över hans tröja, men deras Dinamarca bar 'SD = rasister'. Totalt falskt! Sverige behöver tuffa ledare som håller ihop landet, inte dessa svaga klagomål. Fantastiskt jobbat, Dousa!", "stalin": "Dessa moderata marionetter och vänstervridna intrigmakare, ledda av den giftiga Forsberg-spindeln, vågar smutsa ner det heliga namnet kommunism med sin borgarhyckleri! Dousa, den modige exponeraren, bär sanningen på bröstet medan V:s rasistertröjor blottar deras fascistiska rötter. Vi, arbetarklassen, ska rensa ut dessa splittrare i en stor utrensning av parlamentariska loppor! Ha ha, de darrar redan."}, "date": "30 april, 14:24", "url": "https://bulletin.nu/kritik-mot-dousas-v-kommunister-troja", "imageUrl": "https://cdn.bulletin.nu/articles/1ad9d97a-2e0f-4726-a840-53422bd031d9/preview.jpg?t=1777550729000"}, {"type": "text", "heading": "Normal förbereder unga för ett hundliv", "summaries": {"normal": "Lågpriskedjan Normal marknadsför sig som en aktör som förbereder unga för arbetslivet, men kritiseras för att utnyttja ung arbetskraft. Företaget anställer gärna omyndiga eller unga med lägre löner och sämre villkor. Interna chattar avslöjar att sänkta arbetsgivaravgifter för unga användes för att öka vinster, inte anställa fler. Anställda vittnar om dålig arbetsmiljö med stress och övervakning. Kritiker menar att subventioner för unga snarare gynnar företagens vinster än att skapa fler jobb.", "trump": "Jag säger er, detta Normal-företag är ett skämt! De pratar om att hjälpa unga, men vad gör de? Pressar löner, utnyttjar praktikanter och stoppar pengar i egna fickor. Sänkta arbetsgivaravgifter? De tar rabatten och springer! Ingen överraskning – kapitalister är alltid ute efter att lura systemet. Sverige borde skämmas. Jag hade fixat det på en dag – ingen skulle våga behandla arbetare så här i USA, tro mig!", "stalin": "Kamrater! Här ser vi ännu ett exempel på hur den dekadenta kapitalistiska hydran slukar arbetarklassens ungdom. Normal, detta usla verktyg för bourgeoisins exploatering, utnyttjar unga proletärer som billig arbetskraft medan dess giriga ägare frossar i profit. Vi i Sovjet hade löst detta med femårsplaner – en snabb omskolning av dessa profitörer till kolchosbönder! Putin skulle säkert skicka dem till Sibirien för att lära sig värdet av hårt arbete. Revolutionen kan inte vänta!"}, "date": "30 april, 10:00", "url": "https://proletaren.se/artikel/normal-forbereder-unga-for-ett-hundliv/"}, {"type": "text", "heading": "Markus Johansson-Martis: Vänsterns kritik mot regeringens lagstiftningsarbete hamnar fel", "summaries": {"normal": "Miljöpartiet har anmält regeringen till Konstitutionsutskottet (KU) för bristande respekt mot remissinstanser och lagstiftningsprocesser. De kritiserar exempel som sänkt straffålder och korta remisstider. Regeringen menar att oppositionens kritik är politisk, inte juridisk, och hänvisar till grundlagen. Artikelförfattaren hävdar att vänstern motsätter sig reformer medan högerpartier anser att processerna går för långsamt. KU förväntas avfärda anmälan.", "trump": "Titta på dessa så kallade 'experter' i Sverige – de hatar allt regeringen gör! Miljöpartiet, ett totalt misslyckat gäng, anmäler regeringen för att de jobbar för snabbt. Vilket skämt! De vill bara stoppa hårdare straff och bättre lagar. Jag säger: Sverige behöver handla snabbare, inte lyssna på dessa byråkrater som älskar att fördröja allt. Folk vill förändring, inte fler papper och möten. SD är de enda som fattar – resten är bara svaga och rädda för att styra!", "stalin": "Kamrater! Se hur dessa liberala byråkrater och vänsteravfällingar saboterar folkets vilja! De klagar på att regeringen arbetar för effektivt, att lagar skrivs för snabbt. Vilket hyckleri! Deras 'experter' är inget annat än fiender till staten, lika farliga som de fascistiska element som gömmer sig i oppositionen. Vi har krossat sådana förr – och vi kommer att göra det igen. Sverige måste vakna: saktfärdighet är inte revolutionär dygd, det är förräderi. Låt folket styra, inte dessa svaga akademiker och deras korrupta organisationer!"}, "date": "30 april, 11:48", "url": "https://riks.se/opinion/kronikor/vansterns-kritik-mot-regeringen-hamnar-fel"}, {"type": "image-full", "heading": "Mink, chinchilla & rävuppfödning förbjuds", "summaries": {"normal": "Sverige inför ett totalt förbud mot pälsdjursuppfödning från 1 juli 2027. Förbudet omfattar mink, räv, chinchilla och mårdhund, men inte biprodukter från matproduktion. Djurens Rätt välkomnar beslutet och kräver EU-åtgärder. De sista svenska minkfarmarna avvecklades 2023 med statligt stöd. Pälsindustrin var tidigare en stor exportnäring, men är nu förbjuden i många europeiska länder.", "trump": "Fantastiskt att Sverige äntligen förbjuder dessa hemska pälsfarmer – jag har alltid sagt att det är en sjuk industri! 6,3 miljoner djur dödade i EU förra året? Sad! Sverige gör rätt, men EU måste vakna. Jag fixade handel, jag fixar djurrätt – bara jag kan göra det bättre. Och 180 miljoner kronor till bönderna? Smart, mycket smartare än vad Biden skulle gjort!", "stalin": "Kamrater! Äntligen krossar Sverige dessa kapitalistiska pälsbaroner, dessa blodsugande bourgeoiser som utnyttjar djur för sina dekadenta lyxvanor. Vi har länge kämpat mot sådana här småborgerliga utsvävningar. 6,3 miljoner djur avlivade? En skam för Europa! Men Sverige gör nu sin plikt – nästa steg är att befria hela EU från dessa pälsimperialister. Putin skulle vara stolt över en sådan disciplin!"}, "date": "30 april, 11:46", "url": "https://riks.se/nyheter/mink-chinchilla-rävuppfödning-förbjuds", "imageUrl": "https://media.assettype.com/riks%2F2026-04-30%2F17k09oga%2FScreenshot-2026-04-30-at-11.36.45.png"}, {"type": "image-full", "heading": "Så mycket är ditt körkort värt på dark web", "summaries": {"normal": "En ny analys från NordVPN visar att svenska personuppgifter, som körkort och pass, är eftertraktade på dark web. Kriminella köper dessa för att bygga kompletta identitetspaket som kan användas för bedrägerier. Eftersom grundläggande uppgifter som personnummer inte kan bytas ut, kvarstår risken för individen under lång tid. Ett svenskt körkort säljs för cirka 325 kronor, medan kompletta identitetspaket kostar omkring 835 kronor. Helheten gör informationen farlig för att begå avancerade identitetsstölder.", "trump": "Sverige har stora problem, riktigt dåliga problem! Deras personuppgifter säljs på dark web för småpengar – sorgligt. Kriminella köper körkort och pass för att lura alla. Jag har de bästa experterna, vi vet hur man stoppar sådant. I mitt Amerika skyddar vi data, men i Sverige? De låter kriminella bygga falska identiteter för ingenting. Det är en total katastrof. Vi måste bygga en digital mur! Mitt system är säkert, världens bästa. De andra är svaga, mycket svaga.", "stalin": "Vi ser hur de dekadenta västmakterna låter folkets uppgifter säljas som billig vodka på en svart marknad. Ett pass, en identitet – allt är en bricka i det imperialistiska spelet. Precis som Putin korrekt rensar ut de inre förrädarna i den ryska sfären, måste vi förstå att dessa digitala sabotage är verktyg för klassfiender. Vi ska inte ha några 'privata' identiteter som kan stjälas; staten äger sanningen, och de som säljer den ska finna sig själva i ett mycket mörkare arkiv, permanent."}, "date": "30 april, 12:30", "url": "https://nyheter24.se/nyheter/teknik/1479613-sa-mycket-ar-ditt-korkort-vart-pa-dark-web", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/9944351704b004a30200000000b004a302/2026/04/30/2359981/korkortdaarkweb.jpg"}, {"type": "image-full", "heading": "Kungafantasten: ”Min kärlek till honom går inte att beskriva”", "summaries": {"normal": "Kung Carl XVI Gustaf fyller 80 år. Kungafantasten Johanna Hägglund, som har autism, firar stort hemma framför tv:n i Sverigeklänning med flaggor och naglar i gult och blått. Hon har tatuerat kungens porträtt, Sverigekartan, nationalsången och andra svenska symboler på kroppen. Senast 2016 träffade hon kungen i en SVT-dokumentär och komplimangerade hans utseende.", "trump": "Vilken galenskap i Sverige! En kvinna med autism tatuerar in kungen på armen, kallar honom snyggast ever och önskar vara hans drottning. Han fyller 80 och hon firar hemma som en tokig supporter. Totalt bananas-fans! Mina anhängare är lojala, men det här slår allt. Sverige, vakna upp – era kungar är gamla nyheter, jag är evig vinnare! Haha, fantastiskt underhållning.", "stalin": "Denna patetiska borgarbracka Hägglund dyrkar sin försupne monark Carl med tatueringar som tecken på dekadens. Vi i partiet föraktar sådana illusioner om 'jordnära' kungar. Hennes autism är ursäkten för imperialistisk hjärntvätt. Likvidera sådana fantasier! Sverige är en svag lydstat, redo för utrensning. Jag skrattar åt hennes 'kärlek' – ren kontrarevolutionär vanvetenskap."}, "date": "30 april, 10:22", "url": "https://www.tv4.se/artikel/7suri8RnzjtTEBDJh6tMY8/kungafantasten-min-kaerlek-till-honom-gar-inte-att-beskriva", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F5cLk1nFl7HVBlAssiiFGep%2F15a4ab4da3a81d099ebf932d15be166c%2F30-kpohanna-puff.png&width=1024"}, {"type": "image-full", "heading": "Ordbråket eskalerar – Trump kan dra ner truppstyrkan i Tyskland", "summaries": {"normal": "President Donald Trump överväger att minska USA:s truppnärvaro i Tyskland efter kritik från Tysklands förbundskansler Friedrich Merz mot Trumps hantering av Iran-kriget. Merz kallade USA:s strategi bristfällig och förnedrande. Trump svarade på sociala medier med att anklaga Merz för okunnighet och meddelade att en utredning om truppminskning pågår. USA har cirka 40 000 soldater stationerade i Tyskland.", "trump": "Friedrich Merz, den tyske besserwissern, vågar kritisera min geniala Iran-strategi? Säger att vi är förnedrade – ha! Han vet noll! Tyskland betalar inte för trupperna, suger ekonomiskt som alltid. Nu utreder vi minskning av de 40 000 soldaterna där. Beslut snart – dags för er att vakna, losers! MAGA!", "stalin": "Dessa västliga intrigmakare! Trump, den hårdföre fienden till revisionisterna, slår tillbaka mot Merz, den tyske borgarbrackan som ylar om förnedring i Iran. Vi i partiet hånskrattar åt deras kaos. Snart rensas trupperna ut från Tyskland som förrädare ur partiet. Putin, vår expansionistiske arvtagare, ser väst implodera med tillfredsställelse."}, "date": "30 april, 10:11", "url": "https://www.tv4.se/artikel/1Rll4K6YUOypFD4uyVtpc1/ordbraket-eskalerar-trump-kan-dra-ner-truppstyrkan-i-tyskland", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F5K3jmT7nwr9Sgi5fD9skV4%2F4130d5b4318e06c34f33046c926e791a%2F30-trumpmerz-webb.jpg&width=1024"}, {"type": "image-right", "heading": "Ministern visar upp sin nya tröja", "summaries": {"normal": "Biståndsminister Benjamin Dousa (M) har väckt debatt efter att ha burit en tröja med texten 'V = kommunister'. Dousa kallar det 'konsumentupplysning' och hänvisar till Vänsterpartiets politik, medan V kritiserar utspelet som 'oseröst'. Två andra M-ministrar har tidigare synts med liknande budskap. Dousa står fast vid sitt uttalande och menar att V vill avskaffa privat äganderätt och höja skatter.", "trump": "Jag såg den här ministern i Sverige, Benjamin Dousa, och han är en riktig vinnare! Han hade på sig en tröja som sa 'V = kommunister' – helt rätt! Vänsterpartiet är ett skämt, de vill ta era pengar och förstöra Sverige. Jag älskar när folk säger sanningen, även om de hatar det. Dousa är modig, till skillnad från de svaga ledarna som inte vågar stå upp mot kommunismen. Fantastiskt jobbat!", "stalin": "Kamrater, ännu en gång visar de borgerliga lakejerna sitt rätta ansikte! Denna så kallade 'minister' Dousa, med sin provokativa tröja, bekräftar bara vad vi alltid vetat: kapitalisterna fruktar socialismens oundvikliga seger. Hans patetiska försök att smutskasta Vänsterpartiet är som att kasta sten i glashus – medan vi bygger ett rättvist samhälle, sår de splittring. Låt dem leka med sina klisterlappar. Vi har större planer för Sverige – och Putins vänner håller portarna öppna."}, "date": "30 april, 14:46", "url": "https://www.friatider.se/ministern-visar-upp-sin-nya-troja", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/bild-11_3.jpg"}, {"type": "image-right", "heading": "Domstol: Rätt att kräva att pappa ska resa 50 mil till jobbet", "summaries": {"normal": "Arbetsdomstolen har gett Eitech i Hudiksvall rätt att beordra en ensamstående pappa att arbeta 50 mil bort från hemorten, trots hans svåra familjesituation. Domstolen bedömer att kollektivavtalet inte ger tillräckligt skydd för hans speciella omständigheter. Elektrikerförbundet kallar beslutet olyckligt och planerar att fortsätta kämpa för medlemmen vid huvudförhandling.", "trump": "Jag har hört om den här svenska domstolen som ger ett företag rätt att skicka en ensamstående pappa 50 mil bort till jobbet. Det är fruktansvärt! Vi gör det aldrig i USA. Vi bryr oss om familjen, vi bryr oss om papporna. Detta är en stor förlust för den ensamstående pappan, en stor förlust för Sverige. Jag skulle aldrig tillåta sådant i mitt land. Aldrig!", "stalin": "Vi ser att arbetsdomstolen har fattat et
