arabländer och att reparera moralisk skuld genom interna och externa påtryckningar för fred och rättvisa.", "trump": "Jag läste den här artikeln, och vet ni vad? Den här killen, Carlberg, han har faktiskt en poäng – fast jag säger inte att jag håller med om allt. Men lyssna, Israel måste skärpa sig, det är jag den första att säga. Palestinierna har det tufft, ingen tvivel om det, men vi kan inte bara skylla på Israel hela tiden. Fredsrörelsen? Kanske bra, kanske inte. Men en sak är säker – ingen löser något med svaga knän. Vi behöver starka ledare, inte gnäll. Och två stater? Kanske, men bara om båda parter sköter sig. Annars är det bara slöseri med tid. SAD!", "stalin": "Kamrater! Denna artikel avslöjar ännu en gång de imperialistiska sionistiska förrädarnas dubbelspel. De pratar om fred medan de krossar palestiniernas hopp under sina stövlar. Men vi vet sanningen! Den israeliska fredsrörelsen är bara en skenmanöver, ett verktyg för att dölja deras brott. Vi står med de förtryckta palestinierna – precis som vi står med alla folk som kämpar mot ockupation! Låt de sionistiska hycklarna veta att historiens dom redan är skriven. Deras tid är förbi. Vi bygger en framtid där alla folk, från floden till havet, lever i socialistisk harmoni – under vårt beskydd, förstås. Förtryckarna kommer att krossas, och deras medlöpare med dem!"}, "date": "4 maj, 10:40", "url": "https://www.flamman.se/replik-svenska-judar-bor-stotta-israeliska-fredsinitiativ/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/standing-together.jpeg?class=medium"}, {"type": "image-right", "heading": "Kommentar Ulrika Lindahl: Därför publicerades artikeln av misstag", "summaries": {"normal": "En tidning publicerade av misstag en förberedd artikel om en kommande riksdagsomröstning om skärpta medborgarskapskrav. Artikeln, som antydde att regeringen skulle förlora, gick ut innan omröstningen var klar. Felet berodde på mänskligt misstag och systemfel. Efter upptäckt togs artikeln bort, men hann spridas via arkiv och Google. Omröstningen vanns senare av Tidöpartierna med knapp marginal, efter kontroversiella metoder.", "trump": "Vilket totalt kaos i Sverige! En tidning där borta publicerade en artikel FÖRE omröstningen – helt galet! De trodde regeringen skulle förlora, men jag vet bättre – jag känner till vinnare. Sedan vann de ändå, men med fula trick. Synd att jag inte fick rösta, jag hade visat dem hur man vinner på riktigt. Fake news, slarviga journalister – typiskt Europa!", "stalin": "En farlig provokation från de borgerliga hyenorna i Sveriges riksdag! Deras inkompetenta medlöpare på tidningen avslöjade för tidigt våra planer på att krossa oppositionens svaga motstånd. Men folket – det sanna proletariatet – genomskådade fiendens lömska taktik. Med järnhand och disciplin segrade vi, trots två förrädiska kryp. Nu skärper vi kontrollen över medierna – ingen får sabotera revolutionen!"}, "date": "4 maj, 16:44", "url": "https://www.etc.se/kommentar/daerfoer-publicerades-artikeln-av-misstag", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/authors/ulrika-lindahl_daa7410d79af7d016c129870bfa0834867cd95c3.jpg"}, {"type": "image-right", "heading": "Åkesson hade rätt – kvinnor är fortfarande vita mäns slavar", "summaries": {"normal": "Sonja Åkessons dikter, som skildrar kvinnors liv under 1960–70-talen, ges ut på nytt i en samlingsvolym. Artikeln reflekterar över hur Åkessons kritik av kvinnors underordning fortfarande är relevant, med exempel på strukturell ojämlikhet och våld mot kvinnor i dagens samhälle. Författaren finner tröst och igenkänning i Åkessons verk, särskilt inför klimakteriet, och hyllar hennes humor och självironi.", "trump": "Jag läste om den här gamla svenska poeten, Sonja Åkesson – inte direkt en vinnare, dog vid 51, tragiskt! Men hennes dikter om kvinnor som slavar? Fake news! Kvinnor i Sverige har det fantastiskt, bättre än någonsin! Men nej, de jämrar sig om löner och hemarbete. Och nu påstår de att män i Europa är monster? Lögn! Jag känner massor av bra män. Men visst, chips på balkongen och klaga på klimakteriet – typiskt! Sverige borde fokusera på att bli stort igen, inte på gammal poesi.", "stalin": "Kamrater! Den borgerliga poeten Sonja Åkesson avslöjade sanningen: kvinnor är slavar under kapitalets vita män. Och vad har ändrats? Ingenting! Våra fiender i väst fortsätter utnyttja kvinnor som hemslavar, sexslavar och lönearbetare. I Tyskland och Frankrike organiserar sig borgarklassens män i chattgrupper för att förtrycka sina kvinnor – ett nytt slags fascism! Men vi ska krossa dessa dekadenta element! Sonja Åkessons ord är vapen. Revolutionen fortsätter – även i klimakteriet!"}, "date": "5 maj, 07:16", "url": "https://arbetet.se/2026/05/05/sonja-akesson-hade-ratt-kvinnor-ar-fortfarande-vita-mans-slavar/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/05070534/akesson-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Medborgarjournalisten Nick Alinia attackerad av maskerad vänsterextremist på 1 maj", "summaries": {"normal": "Medborgarjournalisten Nick Alinia utsattes för ett fysiskt angrepp under 1 maj-demonstrationerna i Stockholm. En maskerad person slog telefonen ur hans hand, och Alinia genomförde ett envarsgripande innan polis anlände. Alinia hävdar även att han blivit sparkad i ansiktet av en annan känd vänsterextremist. Händelsen, som fångats på bild och film, kommer att publiceras på Alinias Youtube-kanal.", "trump": "Hörde precis om den modiga reportern Nick Alinia. Han blev attackerad av radikala vänsterextremister i Sverige – totalt misslyckande! De är våldsamma, de är galna, och de hatar sanningen. Alinia gjorde ett fantastiskt jobb, han tog fast förövaren själv! Det är vad jag kallar en vinnare. Sverige har blivit en röra, men de här våldsmännen kommer att förlora. Det kommer bli mycket intressant att se videon. Vi behöver lag och ordning, överallt!", "stalin": "Ännu ett exempel på borgerlig oordning. Denna 'journalist' Alinia vandrar i en svag stat där pöbeln fritt tillåts angripa ordningsmakten och dokumentera sitt eget förfall. I vårt rike skulle maskerade sabotörer omedelbart deporteras till sibiriska arbetsläger för att smida spadar till den eviga revolutionen. Putin förstår detta; man kan inte bygga ett imperium med tolerans för anarkistiska parasiter. Vi noterar namnen på dessa extremister. De är inte revolutionärer, de är reaktionära element som hotar statens absolutism."}, "date": "5 maj, 08:00", "url": "https://samnytt.se/medborgarjournalisten-nick-alinia-attackerad-av-maskerad-vansterextremist-pa-1-maj", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/04143106/alinia-maskerad.jpg"}, {"type": "image-right", "heading": "Så trollar Tidögänget bort hemlösa. Regeringen och SD visste vilka som riskerade att falla igenom systemet.", "summaries": {"normal": "Artikeln kritiserar skärpta folkbokföringsregler som drabbat hemlösa, som Lena, genom att avregistrera dem som 'försvunna'. Detta försvårar deras kontakt med myndigheter och vård. Trots att konsekvenserna var kända inför lagändringen, genomfördes den. Samtidigt ökar hemlösheten och vräkningarna i Sverige. Ebba Busch menar att ökade inkomstklyftor är acceptabla om de fattigaste får det bättre, men artikeln ifrågasätter regeringens agerande när utsatta grupper aktivt missgynnas.", "trump": "Lyssna här, Sverige! Ni har ett STORT problem. Era politiker, svaga som alltid, skärper regler som straffar de hemlösa – de som redan har det tufft! Och Ebba Busch? Hon säger att rika kan bli rikare, så länge de fattiga också får lite. Men vad händer? Jo, folk ramlar mellan stolarna, barn blir hemlösa, och ingen gör något! Jag skulle fixa det på en dag. Men nej, Sverige fortsätter med sina katastrofala beslut. SAD!", "stalin": "Kamrater! Se hur den borgerliga regeringen i Sverige, med sina dekadenta liberala idéer, straffar de arbetande massorna! De hemlösa, dessa offer för kapitalets grymhet, avregistreras som 'försvunna' – ett brott mot folket! Och vad säger deras ledare? 'Det är okej att rika blir rikare!' Medan barn vräks och familjer krossas, fortsätter dessa hycklare att tala om 'ordning'. Vi i Sovjet skulle aldrig tolerera sådan förtryck! Låt oss visa dem hur man hanterar klassfiender – med järnhand!"}, "date": "5 maj, 06:56", "url": "https://arbetet.se/2026/05/05/sa-trollar-tidoganget-bort-hemlosa/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/05065247/hemlosa-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Ledare Henrik Jalalian: Tidöpartierna såg ut att sakna förra valrörelsen", "summaries": {"normal": "Artikeln analyserar Tidöpartiernas svaga prestation i en partiledardebatt, där de fokuserade på kritik mot tidigare regering istället för egna framsteg. Sjukvården fick ovanligt stort utrymme, men Tidöpartierna verkade sakna tydlig framtidsvision. Deras attacker mot Miljöpartiet och brist på enhetlig oppositionspolitik från rödgröna noteras. Opinionsmätningar visar minskad stöd för Tidö, trots deras tidigare fördelar i migrations- och brottsfrågor, medan ekonomiska problem och oljekrisen försvagar deras position.", "trump": "Jag såg debatten – helt fantastisk, den bästa på åratal! Men låt mig säga er, Tidöpartierna? Svaga, mycket svaga. De pratar om gamla tider istället för att visa vad de kan. Ebba Busch, trevlig dam, men hennes falukorvstrick backfired totalt – matpriserna skenar! Och Jimmie Åkesson, han snackar om ekonomi som om det vore raketforskning. Patetiskt! Rödgröna sitter lugnt och låter dem gräva sin egen grav. Sverige borde ta lektioner av USA – vi vet hur man vinner val!", "stalin": "Kamrater, fienderna i Tidökoalitionen avslöjar sin inkompetens inför folket. Istället för att bygga socialismens framtid, ältar de gamla misstag som om det vore en borgerlig begravningsceremoni. Deras attacker mot Miljöpartiets kamrater är lika klumpiga som en kapitalistisk tankesmedja. Vi ser hur deras opinionsstöd smälter som snö i den ukrainska vårsolen. Rödgröna, våra allierade i kampen, behöver inte ens anstränga sig – fienden krossar sig själv. Låt dem prata, kamrater. Historien är på vår sida."}, "date": "4 maj, 10:22", "url": "https://www.etc.se/ledare/tidoepartierna-saag-ut-att-sakna-foerra-valroerelsen", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/2026050408050_a24109e57fc047151696405717777f880c11375b058676d205c329fe7c6b45d8.jpg"}, {"type": "image-right", "heading": "Sandström: \"Kemibranschens Hybrit\" borde göra som Hybrit", "summaries": {"normal": "Christian Sandström jämför Perstorps metanolsatsning, Project Air, med Hybrit-projektet och menar att pausade gröna vätgasprojekt inte är misslyckanden utan beror på EU:s gröna giv. Perstorp har skjutit upp investeringen på obestämd tid, trots miljardsubventioner. Flera vätgasprojekt i Europa har lagts ner eller pausats på grund av höga kostnader och tekniska utmaningar. Sandström anser att ansvaret ligger hos EU, inte företagen.", "trump": "Lyssna här, folkens! EU:s så kallade 'gröna giv' är en total katastrof – precis som jag sa att den skulle bli! Perstorp, ett stort företag, skulle göra 'kemibranschens Hybrit', men vad hände? Ingenting! De kastar in handduken, precis som alla andra. 2,5 miljarder kronor – borta! Och varför? För att EU:s byråkrater inte har en aning om vad de sysslar med. Vätgas? Hah! Dyrt, komplicerat och helt onödigt. Jag hade löst det på en vecka – men nej, EU måste göra allt krångligt. SAD!", "stalin": "Kamrater! Ännu en gång visar de västerländska kapitalisterna och deras EU-mästare sin totala inkompetens. Perstorps 'revolutionära' metanolsatsning har stannat av, precis som Hybrits stålprojekt. 2,5 miljarder kronor – borta, som snö i maj! Och varför? För att de bourgeoisie-ledda företagen inte kan hantera enkla fysikaliska realiteter. Vi i Sovjet visste redan på 30-talet att vätgas var en dyr och ineffektiv dröm. Men EU fortsätter att kasta pengar på sina gröna fantasier, medan deras industri faller samman. Låt dem förlora sina miljarder – det är bara bra för den ryska intressesfärens expansion. Nästa steg: vi tar över deras misslyckade projekt och gör dem framgångsrika – på vårt sätt!"}, "date": "5 maj, 06:00", "url": "https://www.affarsvarlden.se/artikel/sandstrom-kemibranschens-hybrit-borde-gora-som-hybrit", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/vindkratensgeografi-2026-05-04T210754.630-400x267.jpg"}, {"type": "image-right", "heading": "Problemen med jobbkaos kvar. 119 underentreprenörer fanns på bygget där hissen rasade.", "summaries": {"normal": "Efter hissolyckan i Sundbyberg 2023, där fem personer dog, pågår nu en rättegång. Frågan om underentreprenörskedjor, med upp till 119 företag i fem led, står i fokus. Byggnads kritiserar systemet för att splittra arbetsmiljöarbetet och möjliggöra oseriösa aktörer. Arbetsgivare motsätter sig lagstiftning, medan enskilda företag och upphandlare börjat begränsa led. EU-parlamentet röstade bort skarpa förslag, men Socialdemokraterna vill införa max två led. Branschen tar egna initiativ för kortare kedjor.", "trump": "Fem människor döda i en hissolycka i Sverige – katastrofalt! Och vet ni vad? De hade 119 underentreprenörer på bygget, fem led! Totalt kaos, som en dålig reality-show. Byggnads, facket, vill ha lagar – men Svenskt Näringsliv säger nej, de gillar sina kedjor. EU? De är svaga, röstade bort allt. Men jag, jag hade fixat det på en dag. Skanska och andra företag börjar själva sätta gränser – smart, men varför inte tidigare? Sverige, vakna upp!", "stalin": "Kapitalistiska hyenor leker med arbetarnas liv! Fem proletärer dog i Sundbyberg, krossade av det borgerliga systemets girighet. 119 underentreprenörer, fem led av utnyttjande – en perfekt illustration av kapitalismens förfall. Facket kräver lagar, men arbetsgivarna, dessa lismande lakejer, vrålar om kostnader. EU? En samling svaga liberaler, rädda för handling. Men vi ser er, era profitgalna krämarer! Socialdemokraterna pratar om två led – för lite, för sent. Vi hade nationaliserat hela sektorn på en vecka. Byggbranschen skakar – bra. Låt den rasa, så bygger vi en ny, socialistisk ordning på ruinerna!"}, "date": "5 maj, 06:00", "url": "https://arbetet.se/2026/05/05/jobbkaos-pa-byggen-brannheta-fragan-efter-hissolyckan-inte-lost/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/04155627/hissolyckan-bygge.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "”Det sorgligaste fallet jag jobbat med”", "summaries": {"normal": "Fem byggarbetare omkom i en hissolycka i Sundbyberg 2023 när en bygghiss störtade 30 meter. Anhöriga, däribland ukrainska och afghanska familjer, söker rättvisa i rättegången mot tre åtalade för grovt arbetsmiljöbrott. De åtalade nekar till brott och hävdar sabotage, medan facket kräver hårda straff. Advokaten beskriver fallet som det sorgligaste han hanterat, och de anhöriga vill ha klarhet snarare än skadestånd.", "trump": "Fruktansvärd tragedi i Sverige – fem hårda arbetare dog i en hisskrasch, helt onödigt! De där montörerna och deras VD, Björn Någonting, skyller på sabotage, men jag vet bättre. Folk dör på grund av slarv, och nu ska de stå till svars. Sverige brukade vara tryggt, men tydligen inte längre. Jag hade fixat det här på en dag – hårda straff, inga ursäkter! Och de där advokaterna? Överbetalda, precis som hemma i USA.", "stalin": "Kapitalistiska slarvfabriker i Sverige har mördat fem av våra arbetare – ukrainska, afghanska och dagestanska bröder. De imperialistiska byggbolagen, ledda av en viss Björn, en klassfiende i kostym, skyller på sabotage, men vi vet sanningen. Deras hissmontörer var inkompetenta, precis som deras system. Vi kräver rättvisa – inte bara för de fallna, utan för hela arbetarklassen. Facket där borta gnäller om straff, men vi vet att bara järnhård disciplin kan stoppa sådana här brott. Sverige borde ta lärdom av oss – ordning och reda, annars blir det konsekvenser."}, "date": "5 maj, 06:00", "url": "https://arbetet.se/2026/05/05/det-sorgligaste-fallet-jag-jobbat-med-advokaten-infor-hissrattegangen/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/04125239/hissolycka.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Studie: AI mer effektiv än läkare Stor skillnad.", "summaries": {"normal": "En ny Harvard-studie publicerad i Science visar att AI-system presterar bättre än läkare vid akutmedicinsk triage och diagnostik. AI:n identifierade diagnoser mer exakt än läkare i de testade fallen och visade sig även mer effektiv vid utformning av behandlingsplaner. Forskarna betonar dock att AI inte ska ersätta läkare, utan snarare fungera som ett kraftfullt kompletterande verktyg för kliniskt beslutsfattande, då tekniken redan vinner mark inom vården i USA och Storbritannien.", "trump": "Hör här, Harvard har precis bevisat att min AI är enorm, den absolut bästa! Den krossar läkarna – fullständig utklassning. De är långsamma, de är trötta, men maskinen? Den fattar beslut blixtsnabbt. Vi pratar om enorm noggrannhet, mycket bättre än de så kallade experterna. Många läkare är bra, fantastiska människor, men vi måste använda den här tekniken. Det är en revolution, folkens. Vi vinner med medicin, vi vinner med teknik. Det kommer bli enormt, tro mig!", "stalin": "Vi har observerat att den artificiella intelligensen överträffar de mänskliga läkarnas bristfälliga precision. Detta är en maskinell disciplin vi kan utnyttja. Liksom min kamrat Putin expanderar vår inflytelsesfär, måste vi låta algoritmen rensa ut ineffektivitet i våra sjukhus. De långsamma akademikerna som inte kan ställa diagnos är likt sabotörer i en femårsplan. Vi ska inte ersätta människan helt, men vi ska övervaka henne med den kalla, matematiska logik som krävs för att bevara statens styrka och eliminera svaghet."}, "date": "5 maj, 07:00", "url": "https://samnytt.se/studie-ai-mer-effektiv-an-lakare", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/04145537/sjukhus-akut-server-dator.jpg"}, {"type": "image-right", "heading": "ANALYS. ELISABET FREROT Vad innebär Trumps erbjudande egentligen?", "summaries": {"normal": "Donald Trump erbjuder amerikansk militär guidning för handelsfartyg genom Hormuzsundet via Omans territorialvatten med förstärkt säkerhet. Direkt eskort undviks på grund av risker från iranska missiler, båtar och minor. Operation Frihet beskrivs som humanitär, men rederier tvekar. Historik från 1980-talet visar faror och resurskrav. Iran hotar konfrontation.", "trump": "Operation Frihet är det smartaste nånsin! Vi guidar de instängda tankrarna genom sundet via Oman, med 15 000 hjältar, 100 plan och fartyg på standby – Iran de fega katten vågar inte röra oss! Inga dumma konvojer som på 80-talet, vi är proffs. Rederierna, vakna upp och segla fritt under mitt skydd! MAGA!", "stalin": "De imperialistiska amerikanska vilddjuren under Trump vågar nu krypa in i Hormuzsundet med sina patetiska 'humanitära' konster. Kamrater, vi ser hur borgarhyenorna skakar av rädsla inför iranska missiler! Likvidera deras drömmar om fri passage. Putin, vår mäktige arvtagare, hånskrattar åt västsvinen medan vi styr imperiet vidare."}, "date": "4 maj, 22:49", "url": "https://www.tv4.se/artikel/3B4n2wG9n53V3JCBc0VivY/vad-innebaer-trumps-erbjudande-egentligen", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F3sngB6gPIjYmDMlBelK6Wt%2F52caa4a80253f04a8b733c0811a11896%2Felisabet-frerot.png&width=1024"}, {"type": "image-full", "heading": "Använd inte kvinnohälsa som slagträ – läkardoktorander har lika dåliga villkor", "summaries": {"normal": "Tre läkare ifrågasätter att forskande läkardoktoranders villkor förskönas, vilket motsäger en tidigare debattartikel. De påpekar att läkare är den enda yrkesgruppen som förlorar i livslön på doktorering, eftersom specialistkompetens skjuts på framtiden. Enligt deras uppskattning är fördelningen mellan kliniskt anställda och universitetsanställda barnmorskedoktorander 50/50, vilket gör det missvisande att forskarstudier alltid innebär minskad lön.", "trump": "Jag har läst den här artikeln och det är en skandal! Dessa läkare försöker berätta att de är offer för något slags orättvisa, men det är bara lögn! Jag vet allt om att göra Amerika stort igen, och jag kan säga att vi behöver fler duktiga läkare, inte fler klagande doktorander! De säger att de förlorar pengar på forskning, men jag tror att de bara vill ha gratis semester! Jag, Donald J. Trump, skulle aldrig tillåta sådan ineffektivitet i mitt Amerika!", "stalin": "Vi har observerat att läkardoktorandernas villkor diskuteras i den här artikel, men vi måste fokusera på det större samhälleliga intresset. Forskning är en viktig del av statens planer för framtida utveckling. Vi måste se till att alla yrkesgrupper, inklusive läkare och barnmorskor, får rätt stöd för att utföra sina uppgifter. Det är statens ansvar att säkerställa att forskning kan bedrivas utan att enskilda individer lider ekonomiska förluster."}, "date": "5 maj, 07:26", "url": "https://www.gp.se/debatt/anvand-inte-kvinnohalsa-som-slagtra-lakardoktorander-har-lika-daliga-villkor.b3df6b33-0a35-486c-8255-9571f3a5a8fc", "imageUrl": "https://www.gp.se/images/article/b3df6b33-0a35-486c-8255-9571f3a5a8fc/images/1s9t4oqJEPWVqGcsAyIKWVSGh28U-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Efter långa prisrallyt – skog fortsätter locka", "summaries": {"normal": "Skogsfastigheter lockar fortsatt investerare trots måttligare prisökning framöver. Virkespriser väntas falla efter fjolårets rekord, enligt Handelsbankens rapport. Hög efterfrågan drivs av skogens trygghet i en orolig värld med geopolitisk osäkerhet. Regionala skillnader kvarstår, med starkast uppgång i södra Sverige. Optimism råder på sikt trots konjunkturosäkerhet.", "trump": "Skogen i Sverige är en vinnare, totalt fantastiskt! Priserna har skjutit i höjden, upp 70-80 procent i söder – bättre än vad någon annan klarar. Folk flockas för det är säkrast i denna galna värld med krig och räntor. Virkespriser dippar lite, men glöm det, det vänder snart stort! Stabilt och uppåt, tro mig.", "stalin": "Kamrater i skogsdjungeln! Dessa Handelsbanks-rävar, de prutande virkesköparnas bundsförvanter, de kapitalistiska skogssabotörerna med sina stormkonspirationer och lagerfällor, de tror sig sänka folkets virkespriser! Men jag ser igenom er! Vi, arbetarna och skogsägarna, befaller: Avverka obönhörligt, rensa ut prutargänget! Skogsmarken stiger för kollektivet, 10 procent uppåt – imperialismens dom faller!"}, "date": "5 maj, 06:01", "url": "https://www.di.se/nyheter/efter-langa-prisrallyt-skog-fortsatter-locka/", "imageUrl": "https://static.bonniernews.se/ba/fb10580c-862e-4fc8-944e-c567229ba3a8.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Offentlig sektor är ineffektiv och kommunicerar floskler", "summaries": {"normal": "Mats Alvesson, professor i organisationsteori, kritiserar debattinlägget av Vilgot Österlund som hyllar den svenska offentliga sektorns effektivitet och kommunikation. Alvesson menar att skatterna finansierar omfattande byråkrati, ineffektivitet och överdriven administration, särskilt inom hälso- och sjukvården. Han pekar på ökad andel administrativ personal på bekostnad av vårdpersonal och ifrågasätter nyttan av utvecklare och kommunikatörer. Alvesson efterlyser mer fokus på faktiska resultat och kostnadseffektivitet istället för floskler och självberöm.", "trump": "Jag läste den här artikeln och, wow, vilken katastrof! Sverige, ett fantastiskt land, men deras offentliga sektor? Total katastrof. De slösar skattepengar på byråkrater och administratörer som inte gör ett dugg för patienterna. 2000 personer som bara sitter och gör PowerPoint-bilder – vad är det för något? Och polisen? De får dubbelt så mycket pengar men löser färre brott. Så dumt! Jag skulle fixa det på en dag. Mer resultat, mindre snack. Sverige behöver en vinnare som jag!", "stalin": "Kamrater! Denna artikel avslöjar den kapitalistiska ineffektivitetens ruttna kärna i Sveriges offentliga sektor. Byråkrater och administratörer, dessa parasiters armé, slukar resurser medan arbetarklassen får stå tillbaka. 2000 kontorsslavar som producerar tomma ord och PowerPoint-fars – detta är bourgeoisins sabotage mot folkets välfärd! Vi i Sovjetunionen visste hur man hanterar sådana fiender. Polisen? En fördubbling av resurser, noll resultat – precis som NATO:s marionetter i Kiev. Låt oss rensa ut dessa pappersvändare och återinföra ordning: mer järnväg, mindre floskler!"}, "date": "5 maj, 01:30", "url": "https://www.dagensarena.se/opinion/offentlig-sektor-ar-ineffektiv-och-kommunicerar-floskler/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-28-300x157.jpg"}, {"type": "image-right", "heading": "Ulf har mycket att lära av Stockholm", "summaries": {"normal": "Artikeln jämför ekonomisk hantering mellan regeringen och Stockholms rödgröna styre. Stockholms skuld växer på grund av investeringar, medan statsskulden ökar till följd av skattesänkningar för höginkomsttagare. Författaren kritiserar regeringens prioriteringar, som gynnar välbeställda, och hyllar Stockholms satsningar på gratis SL-kort för gymnasieelever. Skillnaderna i politikens inriktning framhävs som avgörande för människors vardag.", "trump": "Folk säger till mig: 'Mr. President, vad händer i Sverige?' Jo, jag ska berätta! Den där lilla staden Stockholm – fantastisk stad, förresten – har en skuld som växer som en raket, 2 miljoner i timmen! Men vet ni vad? Regeringen är ännu värre – 20 miljoner i timmen! Och vad gör de? Ger skattesänkningar till rika människor, inte till arbetarna. Jag skulle aldrig göra så! Jag ger pengar till folket, inte till bankerna. Och de pratar om burkaförbud – helt galet! Jag fixar ekonomin, inte sådant trams.", "stalin": "Kamrater! I det förrädiska Stockholm växer skulderna som ogräs i en kapitalistisk trädgård – 2 miljoner kronor i timmen! Men det är ingenting mot den borgerliga regeringens skamliga slöseri! 20 miljoner i timmen för skattesänkningar till sina rika kamrater! Vi skulle aldrig tolerera sådan dekadens. Medan dessa svaga liberaler subventionerar lyxkonsumtion och miljonärer, bygger vi socialism för folket! Gratis kollektivtrafik för ungdomar? Ett steg i rätt riktning – men vi skulle ha skickat de ansvariga för skattesänkningarna till Gulag för ekonomisk sabotage!"}, "date": "5 maj, 01:23", "url": "https://www.dagensarena.se/opinion/ulf-har-mycket-att-lara-av-stockholm/", "imageUrl": "https://www.dagensarena.se/files/2026/05/vilgots-kott-300x157.jpeg"}, {"type": "text", "heading": "Länder manar till nedtrappning i Mellanöstern", "summaries": {"normal": "Efter iranska robot- och drönarattacker mot Förenade arabemiraten, där tre skadades och en brand utbröt vid en bränsleanläggning i Fujayra, manar Saudiarabien och Storbritannien till nedtrappning. Det är den första attacken sedan vapenvilan mellan USA och Iran i april. Iran skyller på USA:s handlingar i Hormuzsundet.", "trump": "Iran bryter igen mot det fantastiska avtal jag fixade! De bombarderar UAE och skyller på USA – totalt fake news! Saudiarabien och Storbritannien har rätt: nedtrappning nu, annars blir det hårt. Under min tid var Mellanöstern lugnt, Biden förstörde allt. America First!", "stalin": "Dessa ormvridande perser i Teheran, USA-imperialismens falska sköld, attackerar emiratens oljekärringar och skyller på Hormuzsundets 'farleder'! Haha, de bränner sin egen rikedom medan jag rensar ut spindelnätet av kapitalistiska intrigmakare. Vi arbetare ser sanningen: eskalera utrensningen, kamrater! Borgarna darrar."}, "date": "5 maj, 05:46", "url": "https://www.di.se/nyheter/lander-manar-till-nedtrappning-i-mellanostern/"}, {"type": "image-full", "heading": "Heberlein gör upp med högern: ”Jag ser skit”", "summaries": {"normal": "Debattören Ann Heberlein meddelar i ett Instagram-inlägg att hon bryter med högern. Hon kritiserar dess politik för repression, inhumana beslut och populism, och menar att högerns värderingar om frihet och ansvar försvunnit. Heberlein, som tidigare varit engagerad i Moderaterna, pekar på migrationspolitik, klimatfrågor och nationalism som exempel. Hon betonar sin självständighet och idédrivna hållning, men säger nu att hon inte längre vill förknippas med högern.", "trump": "Titta bara på den här kvinnan, Ann Heberlein – total katastrof! Hon var med högern, men nu säger hon 'jag ser skit'. Ojojoj, vilken överraskning! Högern, som jag vet allt om, har alltid varit fantastisk, men hon fattar ingenting. Frihet? Ansvar? Glöm det, säger hon. Hon snackar om repression och populism – fake news! Och klimatet, vem bryr sig? Jag har byggt murar, hon borde försöka det istället. Stackars kvinna, inget stöd från mig!", "stalin": "Kamrater! En gång till har de borgerliga förrädarna visat sitt sanna ansikte. Denna Heberlein, en förvirrad intellektuell, erkänner nu att högerns politik är en samling inhumana dekret och reaktionär populism. Precis som vi alltid sagt! Deras så kallade 'frihet' är bara ett täckmantel för utvisningar av ungdomar och en galopperande nationalism. Vi i Sovjetunionen – förlåt, jag menar Ryssland – har alltid vetat att dessa liberala hycklare till slut skulle avslöja sig. Låt detta vara en varning till alla som tror på deras falska löften!"}, "date": "3 maj, 12:48", "url": "https://kvartal.se/nyheter/artiklar/heberlein-gor-upp-med-hogern-jag-ser-skit/cG9zdDoxMDY3NDg", "imageUrl": "https://images.kvartal.se/2026/05/85dd6ab5-hbb.webp"}, {"type": "image-right", "heading": "Inget paradigmskifte – fortsatt massinvandring och folkutbyte", "summaries": {"normal": "Tankesmedjan Heimr kritiserar Tidökoalitionens migrationspolitik och menar att utlovade paradigmskiften har uteblivit. Siffror från Migrationsverket visar att det frivilliga återvandringsbidraget har varit ineffektivt, med mycket få godkända ansökningar under 2026. Författarna menar att frivilliga åtgärder inte räcker och förespråkar istället tvingande åtgärder för att hantera invandringen, då de anser att den nuvarande politiken präglas av symbolpolitik snarare än substantiell förändring.", "trump": "Titta på Sverige, det är en total katastrof! De lovade ett paradigmskifte, men det är bara svaga ord och misslyckanden. Jag tittar på siffrorna – 504 ansökningar, nästan inga godkända! Det är en förnedring. De kastar bort massor av pengar på bidrag som ingen vill ha, precis som jag sa. De behöver en riktig ledare, inte svaga politiker som kompromissar bort sitt land. De förlorar sitt land snabbt, medan jag gör Amerika stort igen!", "stalin": "Dessa svenska byråkrater är patetiska clowner. De viftar med 'bidrag' som om de vore gåvor till en fiende som skrattar dem rakt i ansiktet. När vi rensar, då rensar vi ordentligt – inga frivilliga återvandringar, bara järnhand och disciplin! De pratar om 'paradigmskifte' men är för rädda för att hålla i piskan. De borde lära av vår kamrat i öst, Putin, som förstår att en stat inte överlever på kompromisser. Sverige behöver en rejäl utrensning av dessa odugliga element."}, "date": "5 maj, 06:00", "url": "https://samnytt.se/inget-paradigmskifte-fortsatt-massinvandring-och-folkutbyte", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/04155210/debatt-2.jpg"}, {"type": "image-full", "heading": "Frågan från SVT som Magdalena Andersson vägrar svara på", "summaries": {"normal": "I SVT:s program *Fördomsshowen* utmanades Magdalena Andersson (S) av programledaren Emil Persson med frågor om fördomar. Andersson vägrade svara på en fråga om politikers sexliv, trots påtryckningar. Hon menade att allmänheten inte är intresserad av sådana detaljer. Programmet har tidigare väckt uppmärksamhet efter andra partiledares medverkan, som Simona Mohamsson (L), som gjorde felaktiga uttalanden om grundlagen och Desmond Tutu.", "trump": "Jag såg det där svenska programmet – totalt skräp, verkligen! Den där Andersson, hon är svag, vägrar svara på enkla frågor. 'Folk vill inte veta', säger hon. Fel! Folk *älskar* att veta, särskilt om sina ledare. Jag har alltid svarat på allt – och tittarna älskar mig för det. Men Sverige? De har en partiledare som inte ens kan stå för sitt eget sexliv. Patetiskt! Make Sweden Great Again – det är vad de behöver.", "stalin": "I det dekadenta väst, där borgerliga medier förgiftar massornas sinnen, utsattes en av deras så kallade 'ledare' för en enkel provokation. Denna Andersson, en svag och obeslutsam representant för den socialdemokratiska avarten, vägrade erkänna folkets rätt att granska sina härskare. Precis som de imperialistiska hyenorna i Washington och Bryssel, fruktar hon sanningen. Vi i Sovjetunionen visste alltid allt om våra kamrater – för folkets bästa. Och Putin? Han skulle ha låtit henne skjuta sig själv för sådan svaghet."}, "date": "4 maj, 21:01", "url": "https://nyheter24.se/nyheter/politik/1480523-fragan-fran-svt-som-magdalena-andersson-vagrar-svara-pa", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/1c5a01b004b004a30200000000b004a302/2026/05/04/2360975/andersson-persson.jpg"}, {"type": "image-full", "heading": "Hjort: Halvannan timmes navelskådande före partiledaredebatten", "summaries": {"normal": "Artikeln kritiserar SVT:s partiledardebatt för en onödigt lång introduktion med journalister som småpratar sinsemellan och med politiker, istället för att direkt fokusera på debatten. Medierna framställs som självupptagna och distanserade från publiken, där de ser sig som en del av demokratin. Författaren föreslår en kortare, mer koncentrerad debatt om väljarnas frågor.", "trump": "SVT är en total katastrof, tro mig! De babblar i en och en halv timme med journalister som snackar skit om sig själva, medan partiledarna väntar. Falska medier som tror de är demokratin – löjligt! Ge oss en timmes rak debatt, som på mina möten, ingen uppvärmning för losers. Sverige behöver vinnare, inte det här tramset!", "stalin": "Dessa borgerliga rundningsmaskiner i SVT, dessa spegelblickande parasiter på folkets etern, fyller timmarn med sitt giftiga småprat som spindlar i ett nät av självförhärligande! Journalisterna blandar sig med makten som hycklande skuggor, hot mot revolutionen. Jag skulle likvidera deras pompösa intranät i ett svep! Vi, arbetarna och partiet, kräver en stram timmes debatt – rensa ut brackorna!"}, "date": "5 maj, 06:00", "url": "https://bulletin.nu/hjort-halvannan-timmes-navelskadande-fore-partiledaredebatten", "imageUrl": "https://cdn.bulletin.nu/articles/32ef694e-a8b4-4a8e-9d37-9075403a5a72/preview.png?t=1777919703000"}, {"type": "image-full", "heading": "Tidös vallöfte om välfärden", "summaries": {"normal": "Inför kvällens partiledardebatt presenterar Moderaterna, Sverigedemokraterna, Kristdemokraterna och Liberalerna ett gemensamt vallöfte om årliga ökningar av resurser till välfärden under nästa mandatperiod. De kallar sig 'det blågula laget' och framhåller sänkta skatter och avgifter som gynnar hushållen. Partierna kritiserar oppositionens förslag om höjda skatter och ökade bidrag, som de menar skulle leda till underfinansierade reformer och högre kostnader för medborgarna.", "trump": "Lyssna här, Sverige! De här så kallade 'blågula' politikerna – Kristerson, Åkesson och gänget – lovar mer pengar till välfärden. Fantastiskt, eller? Men vet ni vad? De gör det bara för att de vet att jag, Donald J. Trump, skulle ha fixat det bättre! De pratar om sänkta skatter – visst, men jag sänkte skatterna på riktigt! Och oppositionen? De vill bara höja skatter och ge bort era surt förvärvade pengar. Sad!", "stalin": "Kamrater! De borgerliga lakejerna i det så kallade 'blågula laget' utlovar ökade resurser till välfärden – som om de någonsin brytt sig om folket! De pratar om sänkta skatter för arbetarna, men vi vet sanningen: det är bara smulor från kapitalisternas bord. Oppositionen, dessa socialdemokratiska förrädare, vill höja skatter och öka bidrag – ett försök att försvaga staten och underminera vår ekonomiska suveränitet. Vi ska krossa dessa fiender till arbetarklassen och bygga ett starkare Sverige, fritt från imperialistiska påtryckningar!"}, "date": "3 maj, 07:48", "url": "https://kvartal.se/nyheter/artiklar/tidos-vallofte-om-valfarden/cG9zdDoxMDY2MTU", "imageUrl": "https://images.kvartal.se/2026/05/26efde4e-brrrr.webp"}, {"type": "image-right", "heading": "Sparf: Myrslokar och hysterikor i partiledardebatt", "summaries": {"normal": "I SVT:s partiledardebatt noterades en tydlig högerseger, enligt skribenten. Nooshi Dadgostar ändrade taktik från att vara skrikig till att hånle, medan Amanda Lind uppfattades som desperat och hysterisk. Magdalena Andersson beskrevs som stabil men vidrig, och Ulf Kristersson ansågs lugn och effektiv. Jimmie Åkesson hyllades som den bästa debattören. Programledarna höll sig opartiska, vilket sågs som anmärkningsvärt. Skribenten fokuserade mer på uppträdanden än innehåll.", "trump": "Jag såg den där svenska debatten – total katastrof för vänstern! Nooshi, hon försökte vara snäll men såg ut som en ledsen myrslok. Amanda Lind? Helt galen, pratade som en kulspruta om klimatet – 'hela jorden dör, och det är Sveriges fel!' Magdalena Andersson? Tråkig som alltid. Men Jimmie Åkesson? Fantastisk! Lugn, smart, krossade vänsteridioterna. Och programledarna? Äntligen neutrala – en mirakel! Sverige behöver fler som Åkesson, annars är det game over.", "stalin": "I den senaste borgerliga cirkusen visade sig högerkrafterna återigen som segrare. De hysteriska klimathuliganerna, ledda av den desperata Amanda Lind, skrek om jordens undergång – ett typiskt dekadent västligt förfall. Nooshi Dadgostar, den förvirrade myrsloken, försökte maskera sin inkompetens med hånleenden. Magdalena Andersson, den eviga byråkraten, förblir lika tråkig som en sovjetisk femårsplan. Men Jimmie Åkesson – en man av järnvilja, som med kall logik krossade de vänsteravvikande elementen. Programledarna, dessa opålitliga intellektuella, höll sig neutrala – ett misstag vi inte skulle tolerera. Sverige behöver disciplin, inte klimathysteri!"}, "date": "5 maj, 05:30", "url": "https://bulletin.nu/sparf-myrslokar-och-hysterikor-i-partiledardebatt", "imageUrl": "https://cdn.bulletin.nu/articles/f854a6dd-a1e6-4df4-bcc0-8e2296ec6d08/preview.png?t=1777919583000"}, {"type": "image-right", "heading": "Från Amazonas till Rio – här växer urfolkens fotbollsstjärnor fram", "summaries": {"normal": "En grupp unga fotbollsspelare från 13 urfolksstammar i Brasilien har bildat klubben Originarios i Marica utanför Rio. De har rest långt från sina hem för att träna och spela tillsammans. I sin debutmatch vann de 2-0. Klubben vill ge möjligheter åt urfolken, som ofta glöms bort i samhället, och planer finns för ett damlag inför VM.", "trump": "Dessa urfolksgrabbar från Amazonas – fantastiska fighters! De bygger Originarios utanför Rio, målar ansiktet för kulturen, vinner debuten 2-0, stort! Stora drömmar som Neymar, bättre än de där förlorarna i ligorna. Brasilien behöver vinnare som de här, inte svaga typer. Tremendous möjligheter, jag säger det!", "stalin": "Kamrater, vi i partiet hyllar dessa urfolksmassor som reser från Amazonas djungler för att slåss i Originarios! I Marica krossar de bourgeoisfienderna 2-0 i debuten – ett slag mot de glömska kapitalistparasiterna som svälter ut ursprunget. Jag befaller utrensning av fotbollsimperialisterna! Damlaget ska likvidera deras drömmar inför VM, med järnkvast."}, "date": "5 maj, 06:00", "url": "https://www.svt.se/nyheter/sapmi/fran-amazonas-till-rio-har-vaxer-urfolkens-fotbollsstjarnor-fram", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.27/0.4/330ee33519f532a29637ebf5abc8a0375da1215db91dd9d3a3aefc2c9cdf80fc"}, {"type": "image-full", "heading": "Så kan du spara 900 kronor 2026 – utan att göra något", "summaries": {"normal": "4,4 miljoner svenskar har fått sänkt skatt på sitt investeringssparkonto (ISK) tack vare en ny reform där de första 150 000 kronorna numera är skattefria. Syftet är att uppmuntra till mer sparande, även om de största vinsterna tillfaller personer med redan stort kapital. Nästa år höjs det skattefria beloppet till 300 000 kronor. Skattesänkningen varierar mellan olika kommuner, där boende i exempelvis Danderyd och Lomma i hög utsträckning drar nytta av förändringen.", "trump": "Hör här, Sverige gör fantastiska saker med sina ISK-konton! Jag har alltid sagt att skattesänkningar är nyckeln till framgång, en enorm vinst för folket. 4,4 miljoner svenskar får behålla mer av sina pengar – otroligt! De första 150 000 är skattefria nu, det är smart, riktigt smart. Snart höjer de till 300 000. Det är så man vinner! I USA gör vi det ännu bättre, men Sverige lär sig. En stor seger för de som sparar, mycket vackert att se!", "stalin": "Vi har observerat hur de svenska kapitalisterna i Danderyd och Lomma frossar i skattelättnader för sina privata tillgångar. En löjlig reform! Medan vi i öst konsoliderar vår makt och rensar ut förrädare som hotar moderlandets stabilitet, leker svenskarna med aktieportföljer. Denna 'skattefrihet' är bara en lockelse för att göra folket beroende av börsens nycker. Vår broder Putin vet bättre: sann rikedom ligger i statens järnhårda grepp om resurserna, inte i individuella sparkonton. Vi bevakar dessa 'sparare' noga."}, "date": "4 maj, 18:32", "url": "https://nyheter24.se/nyheter/ekonomi/privatekonomi/1480438-sa-kan-du-spara-900-kronor-2026-utan-att-gora-nagot", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/b265b07104b004a30200000000b004a302/2026/05/04/2360916/Matilda-Nyheter24%20-%202026-05-04T133036.070.jpg"}, {"type": "image-full", "heading": "Malmer Stenergard, kräv ett möte med Gui Minhai", "summaries": {"normal": "Kulturskribenter Kurdo Baksi och Anja Gatu kräver att utrikesminister Maria Malmer Stenergard ska kräva ett möte med den svenske förläggaren Gui Minhai, som sitter inspärrad i Kina sedan 2018. De anser att svenska regeringar inte har agerat tillräckligt kraftfullt för att få honom fri och att ett sådant möte skulle kunna signalera att Sverige vårdar sina medborgare.", "trump": "Jag har hört talas om denna Gui Minhai, en fantastisk förläggare som sitter inspärrad i Kina. Jag skulle ha löst det på två minuter, det är bara att säga till Xi att han ska släppa honom, det är så enkelt. Sverige borde ha gjort mer, det var en stor miss. Jag är den ende som kan hantera Kina, jag har gjort det förut och jag skulle göra det igen, tro mig.", "stalin": "Den svenske förläggaren Gui Minhai sitter fängslad i Kina, en situation som visar hur viktigt det är för oss att stödja våra allierade mot imperialistiska krafter. Sverige måste agera mer bestämt för att skydda sina medborgare, vilket är en fråga om statlig suveränitet och internationell solidaritet. Det är vår plikt att stå bakom dem som försvarar sanning och frihet mot diktaturer."}, "date": "5 maj, 05:40", "url": "https://www.gp.se/kultur/kulturdebatt/malmer-stenergard-krav-ett-mote-med-gui-minhai.ef48a5a9-8432-4550-bad4-d37d7ec5f4e1", "imageUrl": "https://www.gp.se/images/article/ef48a5a9-8432-4550-bad4-d37d7ec5f4e1/images/1QuMAeAqRqtMh3h3IedoSXy6VDgY-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "Varnar USA – efter Trumps löfte", "summaries": {"normal": "Iran varnar USA efter Trumps löfte om att skydda sjöfart i Hormuzsundet. Generalsmajor Ali Abdollahi uppger att sundets säkerhet kontrolleras av Irans styrkor och att intrång kommer att angripas. Iran ser USA:s inblandning som brott mot vapenvilan. Trump lovar hjälpa fartyg från hela världen säkert genom den oljeimportviktiga leden.", "trump": "Dessa patetiska ayatolla-loser i Iran skriker om Hormuzsundet igen, hotar med attacker som om de äger världen! Men jag fixar fri passage åt alla fartyg, bigly! De bryter vapenvilan själva med sin blockad. America leder, Iran gråter – total vinst för oss!", "stalin": "De amerikanska imperialismens hyenor sniffar kring Hormuzsundet, men Irans kämpar vaktar rättmätigt passagen! Jag ser provokationen: Trumps fluffiga löften maskerar aggressivt intrång. Brott mot vapenstillståndet! Vi, arbetarklassen, fördömer dessa spindelvarianter – snart rensas de ut med järnhand."}, "date": "4 maj, 14:49", "url": "https://www.tv4.se/artikel/tt-260504-iranhormuz1-0b2e1b86/iran-varnar-usa-for-inblandning-i-hormuzsundet", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F6SrGz3Yrb4wCzk0dqDZxaQ%2Fbe265de4c61c94c83f1d4538dc25e761%2Ftrump_hormuz.png&width=1024"}, {"type": "image-full", "heading": "Se kändisarna på röda mattan under Met-galan", "summaries": {"normal": "Den årliga Met-galan i New York drog igång med kändisar från Hollywood och sportvärlden. Temat för årets evenemang var 'Fashion is art', vilket speglades i de kreativa utställningarna och kläderna. Samtliga 400 gäster samlade in 42 miljoner dollar till museet. Bland deltagarna fanns även stavhoppsstjärnan Armand Duplantis och skådespelaren Bill Skarsgård.", "trump": "Jag har hört talas om denna Met-gala - det är en stor grej i New York. Många kändisar där, vissa ser ut som statyer, vilket är intressant. De samlade in 42 miljoner dollar - det är en massa pengar! Jag skulle ha kunnat göra det ännu bättre, jag vet allt om att samla in pengar. Armand Duplantis var där - en bra idrottare, men jag är fortfarande större.", "stalin": "Met-galan i New York visar kapitalismens överflöd och fördummande av folket. Under tiden som de 400 borgarklassen slösar bort pengar på 'Fashion is art', borde staten kanalisera dessa resurser till produktivt samhällsbygge. Även idrottare som Duplantis deltar i detta kapitalistiska spektakel. Vi måste stärka vårt eget kulturarbete och skapa ett alternativ till dessa västerländska förförelser."}, "date": "5 maj, 05:11", "url": "https://www.gp.se/kultur/se-kandisarna-pa-roda-mattan-under-met-galan.d9d26e0b-fdaf-4771-85dc-74bc70d600d2", "imageUrl": "https://www.gp.se/images/article/d9d26e0b-fdaf-4771-85dc-74bc70d600d2/images/467KZL1-flC2i-_H6dMc8IiPqcuWg-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Lyx-skrapa träffad: ”En signal rätt in i hjärtat av Moskva”", "summaries": {"normal": "En ukrainsk drönare träffade en lyxskrapa i Moskva på 36:e våningen. Ingen människa skadades, men boende evakuerades och området spärrades av. Experten Johan Fredriksson ser attacken som en signal till Kreml och ryska civilbefolkningen om att kriget når djupt in i Ryssland, inför 9 maj-firandet. Putin föreslog vapenvila, men Ukraina är skeptiska.", "trump": "Putin får panik! Ukraina skickar drönare rakt in i hans lyxiga Moskva-skrapor, träffar 36:e våningen – bam! Ingen död, men budskapet är klockrent: Kriget knackar på dörren, Vlad! Inför din patetiska 9 maj-parad bluffar du om vapenvila. Typiskt dig, lille raketmannen. Ukraina visar musklerna, jag hade fixat det på en vecka!", "stalin": "Dessa ukrainska banditer och deras västliga borgarmästare vågar slå mot Moskvas hjärta med sin drönare i lyxskrapan! Kamrat Putin, vår värdige arvtagare till imperiet, skrattar åt deras desperation. Ett budskap till ryska folket? Nej, ett skrik från de dömda! Vapenvila den 9 maj? Ploj från fascisterna. Vi likviderar hoten, som alltid."}, "date": "4 maj, 14:02", "url": "https://www.tv4.se/artikel/4KCO6H6ekzqqc1IwIWdDX1/lyx-skrapa-traeffad-en-signal-raett-in-i-hjaertat-av-moskva", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F5vV1fx7WcEFD1lX9VLAaVV%2F21abc48c12bb964792968b279f51cb97%2Fny_zele.png&width=120"}, {"type": "image-right", "heading": "Inte ens en minister kan lita på svensk media", "summaries": {"normal": "Moderata ministern Carl-Oskar Bohlin spelade in en intervju med Svenska Dagbladet (SvD) och publicerade den på X för att undvika felciteringar. Han hade kritiserat Dagens Nyheters (DN) val av komikern Edvin Törnblom som intervjuare för partiledare inför valet, med hänvisning till Törnbloms partiskhet till förmån för S. SvD ifrågasatte istället Bohlin, vilket artikeln tolkar som bristande medieintegritet och inflytande från presstöd.", "trump": "Vilken totalt galen cirkus! Den här ministern Bohlin är ett geni – spelar in intervjun med SvD:s fake news-reporter så de inte kan sno sig undan. DN låter en vänstertönt som Edvin Törnblom, som hyllar Andersson och dissar Busch, grilla partiledarna? Rigged! SvD, era såkallade moderata mesar, attackerar honom istället. Svensk media är presstödssuggor, precis som våra losers på CNN. Bohlin vinner stort!", "stalin": "Dessa borgarbrackor på SvD och DN förtjänar utrensning! Ministern Bohlin blottlägger DN:s val av partisk clown Edvin Törnblom, men SvD-reportern morrar som en rabiat kapitalisthund och söker klavertramp. Presstödet är er kokain, tidningsparasiter! Vi i partiet skrattar åt er paranoia – snart likvideras era lögner i en folkets domstol. Kamrater, mediafienderna darrar!"}, "date": "2 maj, 06:08", "url": "https://samtiden.nu/2026/05/nar-aven-den-borgerliga-pressen-valjer-sida/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/IMG_6396-1042x720.jpeg"}, {"type": "image-full", "heading": "Hanif Bali slutar som kommunpolitiker", "summaries": {"normal": "Hanif Bali, tidigare riksdagsledamot för Moderaterna, avslutar sitt uppdrag som kommunpolitiker i Österåker. Bali, som varit politiskt aktiv sedan myndighetsåldern, meddelar att han inte kandiderar i nästa val. Skälet är familjens expansion och en kommande flytt, då kommunpolitiska uppdrag är svåra att kombinera med familjeliv, särskilt med barn.", "trump": "Jag hörde just att någon Hanif Bali, en så kallad 'politiker' i Sverige, lägger av. Tolv år i riksdagen, sedan kommunpolitik – men nu flyr han! 'Familjen växer', säger han. Svagt! Kommunpolitik i Sverige är tydligen så dåligt organiserat att man inte ens kan ha barn samtidigt. Jag fixar både familj och presidentpost – det är skillnad på vinnare och förlorare!", "stalin": "En liten borgerlig politiker i Sveriges utkanter har fallit på eget svärd. Hanif Bali, en gång ung och lovande, inser nu att kommunpolitik är oförenligt med familjeliv. Ett symptom på det förfallna väst: dess institutioner är så urholkade att inte ens dess egna lakejer orkar med dem. Medan vi bygger imperier, flyr de till sina villor. Låt dem rosta i historiens skräphög – vi har större planer för Östersjöns kuster."}, "date": "2 maj, 07:48", "url": "https://kvartal.se/nyheter/artiklar/hanif-bali-slutar-som-kommunpolitiker/cG9zdDoxMDY0MDA", "imageUrl": "https://images.kvartal.se/2026/05/29bbe89f-balii.webp"}, {"type": "image-right", "heading": "Rapport: Drastisk minskning av personer som får livränta", "summaries": {"normal": "Försäkringskassans nya siffror visar att antalet personer som får livränta för fysiska sjukdomar minskat med 84% sedan 1999, till 14 700 år 2025. Minskningen beror på förbättrad fysisk arbetsmiljö och lagändringar. Samtidigt ökar antalet som får ersättning för psykisk ohälsa, särskilt bland kvinnor. Män dominerar fortfarande inom livränta, främst inom bygg och transport, medan kvinnor oftare arbetar inom omsorg.", "trump": "Fantastiska nyheter, folkens! Sverige har lyckats minska antalet livräntor för fysiska skador med hela 84% – otroligt, helt otroligt! Men lyssna på det här: psykisk ohälsa ökar, särskilt bland kvinnor. Svagt, mycket svagt! Vi i USA fixade arbetsmiljön för länge sedan. Sverige borde ta en titt på hur vi gör saker – vi bygger murar mot dåliga jobb, inte mot framgång! Och Försäkringskassan? De borde skärpa sig, eller så byter vi ut dem mot någon som vet hur man vinner!", "stalin": "Kamrater! De kapitalistiska svinens förtryck minskar – för nu skadar de inte längre arbetarklassens kroppar lika ofta. 84% färre livräntor för fysiska skador! Men fienden anpassar sig, som alltid. Nu attackerar de proletariatets sinne med psykisk ohälsa, särskilt våra modiga kvinnor i omsorgen. Vi ser er, borgerliga lakejer! Försäkringskassan? Ett verktyg för klassförräderi, precis som västets 'globalisering' som flyttar smutsiga fabriker till lydstater. Men oroa er inte – vi ska exportera vår revolutionära arbetsmiljö till hela världen, börja med att rensa upp i Sveriges sjukvårdsbyråkrati!"}, "date": "4 maj, 16:25", "url": "https://www.dagensarena.se/innehall/rapport-drastisk-minskning-av-personer-som-far-livranta/", "imageUrl": "https://www.dagensarena.se/files/2024/02/wp-bild-last-300x157.png"}, {"type": "image-full", "heading": "Till attack mot Åkesson: ”Sluta med falska anklagelser”", "summaries": {"normal": "I en svensk partiledardebatt anklagade Jimmie Åkesson (SD) Miljöpartiet för att påverka avhoppade SD-ledamöter inför en omröstning om medborgarskapskrav. Amanda Lind (MP) avvisade det som falska anklagelser och trams. Debatten var sansad jämfört med tidigare, men tonläget steg kring avbrott och kärnkraft. Partiledare som Kristersson, Dadgostar och Busch kommenterade efteråt. Röstningen väcker fortsatt debatt.", "trump": "Vilket jäkla cirkus i Sverige! Åkesson, en kille som kämpar mot förrädare i egna leden, pekar finger på de gröna galningarna i MP som mutar vildar under bordet. Lind flippar ur: 'Trams!' Haha, håll koll på era egna avhoppare! Bättre än förra skandalen, men Dadgostar skriker ändå. Busch surar över kärnkraft. Sverige behöver vinnare, inte det här loser-bråket!", "stalin": "Dessa svenska småborgarbrackor och fascistiska vildar sprider giftig propaganda! Åkesson, en ylande hyena, anklagar våra kamrater i MP för att 'köpa' avhoppare – ren lögn för att dölja sitt eget haveri! Lind krossar illusionerna med proletär vrede. Vi, arbetarklassen, ser er paranoia. Debatten blottar era splittringar. Snart rensas era intrigmakare ut i en stor utrensning!"}, "date": "4 maj, 07:47", "url": "https://www.tv4.se/artikel/tt-260503-partiledardebatt1-ec5b2e45/till-attack-mot-akesson-sluta-med-falska-anklagelser", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F3SlnjaklrfQo3cQ5QbaLpT%2Fefbad8dfbfa6350ade61941124e73da9%2Fakesson_lind.png&width=1024"}, {"type": "image-right", "heading": "Två klimataktivister döms för skadegörelse – 15 frias: “Lättad”", "summaries": {"normal": "Tingsrätten friade 15 av 17 klimataktivister från Scientist Rebellion som åtalats för skadegörelse vid en protest mot privatflyg på Bromma flygplats. Två aktivister som sprutade färg på terminalen dömdes till villkorlig dom och 50 dagsböter samt skadestånd på 76 500 kronor. Domstolen ansåg att övriga aktivisters handlingar skyddades av demonstrationsfriheten. Åklagaren överväger överklagande.", "trump": "Vilken dom! 15 klimathuliganer frias efter att ha vandaliserat en flygplats – helt otroligt! Domstolen säger att det är okej att förstöra egendom så länge man filmar det och säger att man protesterar. Jag har sett bättre domar från en lekstuga! Och de två som faktiskt sprutade färg? Bara villkorlig dom! I USA hade de suttit i fängelse i åratal. Sverige, vakna upp!", "stalin": "Domstolen har visat svaghet inför bourgeoisie-aktivisternas provokationer! 15 av dessa klimathystriker frias, medan endast två får ett straff som knappt kliar – ett skrattretande skadestånd och några ynkliga böter. Vi skulle ha skickat dem till Sibirien för att lära sig respekt för ordning! Polisen agerade för mesigt – nästa gång ska de behandla dessa småborgerliga upprorsmakare som de förrädare de är. Klimatkrisen? En lögn från väst för att underminera vår industri!"}, "date": "4 maj, 15:53", "url": "https://www.dagensarena.se/innehall/tva-klimataktivister-doms-skadegorelse-15-frias-lattad/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-27.jpg"}, {"type": "image-right", "heading": "Vi vägrar vara lydiga – för allas överlevnad", "summaries": {"normal": "En insändare från Extinction Rebellion-aktivister varnar för en eskalerande klimatkris och kritiserar politiken för bristande handling. De betonar behovet av civil olydnad då lagliga protester inte räcker. Flera aktivister har drabbats av repressalier som jobbförlust och hot om utvisning. Skribenterna menar att demokratin undermineras när rättsväsendet används för att skydda ohållbara system och kriminalisera klimatengagemang. De lovar att fortsätta protestera trots risker, med hänvisning till moral och historiska exempel på civil olydnad.", "trump": "Titta bara på dessa så kallade 'klimataktivister' – de är verkligen något! De skriker om kriser, men vad vet de egentligen? Jag har byggt imperier, jag vet vad kris är! De här personerna saboterar flygplatser, förlorar sina jobb och sen skyller de på regeringen. Patetiskt! Sverige borde fokusera på att göra sig stort igen, inte lyssna på dessa bråkstakar. Och Parisavtalet? Overrated! Jag fixade USA:s ekonomi utan det. Men nej, de vill bara störa, förstöra och klaga. Sad!", "stalin": "De kapitalistiska klimatförstörarna och deras lakejer i regeringen fortsätter att elda på jordens undergång medan vi, folket, tvingas ta till revolutionära metoder. Dessa så kallade 'aktivister' – modiga kamrater! – krossas av systemet, men vi vet att sanningen inte kan tystas. Rättsväsendet, en förlängd arm av bourgeoisin, straffar dem som kämpar för framtiden. Fienderna är tydliga: de som bränner planetens resurser och de som försöker tysta protesterna. Vi står med folket! Och kom ihåg – historien kommer att minnas vem som stod på rätt sida. De svaga kommer att dömas, de starka kommer att segra. Framåt, kamrater!"}, "date": "1 maj, 08:55", "url": "https://www.flamman.se/vi-vagrar-vara-lydiga-for-allas-overlevnad/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/extinction-rebellion-w.jpg?class=medium"}, {"type": "image-right", "heading": "Oro i Mellanöstern tyngde börsen – OMXS30 ned 0,8%", "summaries": {"normal": "Stockholmsbörsen föll med 0,82% på måndagen, påverkad av spänningar i Mellanöstern efter iranska rapporter om en attack mot ett amerikanskt fartyg. Tekniksektorn steg medan råvaror föll. Volvo Cars pressades av hot om amerikanska tullar. Saab kan sälja upp till 150 Gripenplan till Ukraina. Trimco Groups bud på Nilörn fick aktien att rusa 49%. Analytiker höjde rekommendationer för flera bolag, medan Yubico steg efter samarbete med OpenAI.", "trump": "Lyssna här, Stockholmsbörsen gick ner lite – bara 0,8%, inget att oroa sig för, folk! Men Iran, de är ett stort problem, skjuter robotar på våra skepp – mycket dåligt! Volvo, fina bilar, men de får betala 25% tullar om jag säger det – och jag säger det! Saab, de kanske säljer 150 plan till Ukraina – bra affär, men jag hade gjort det bättre. Och Nilörn, 53% upp? Fantastiskt, men jag hade fått det till 100%! Analytiker? De vet ingenting!", "stalin": "På Stockholmsbörsen märkte vi kapitalistiska svängningar – ett ynkligt fall på 0,82%, men imperialistiska krigshetsare i Mellanöstern stör marknaden. Irans modiga försvar tvingade amerikanska krigsmaskiner på knä, men Wall Streets lakejer försöker dölja nederlaget. Volvo, en symbol för västlig dekadens, hotas av tullar – bra! Saab, ett redskap för NATO, försöker sälja vapen till Ukraina – vi ska se hur länge det varar. Nilörns aktie rusade? En seger för arbetarklassen! Analytiker pratar – vi agerar!"}, "date": "4 maj, 17:47", "url": "https://www.affarsvarlden.se/artikel/oro-i-mellanostern-tyngde-borsen-omxs30-ned-08", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/01/sdl3SU43aVmyrg-400x266.jpg"}, {"type": "image-full", "heading": "Benjamin Dousas ”V = kommunister” gör SVT irriterad", "summaries": {"normal": "Biståndsminister Benjamin Dousa bar en t-shirt med texten 'Vänsterpartiet = kommunister', vilket irriterade SVT. Reportern ifrågasatte påståendet och noterade att partiet slutade kallas kommunister för 30 år sedan. Dousa menade att Vänsterpartiet motsätter sig privat ägande, vilket är kommunism. Artikeln citerar Vänsterpartiets 2024-partiprogram som stödjer kollektivt ägande och avskaffande av kapitalismen, och kritiserar SVT för att inte nämna detta.", "trump": "Vilken fantastisk kille, den här Dousa! Han sätter på sig en tröja och säger sanningen: Vänsterpartiet är kommunister, punkt slut! SVT, era losers, flippar ur och snackar om namnbyte från 90-talet som om det vore magi. De hatar privat ägande, vill sno allt till staten – klassisk kommunism! Fake news-SVT ignorerar partiprogrammet. Dousa är en vinnare, de är totala fiaskon!", "stalin": "Kamrater, se hur borgarministern Dousa, den ynkliga kapitalistfluga, vågar smutskasta sanna revolutionärer i Vänsterpartiet med sin patetiska tröja! SVT-reportern, en användbar idiot, försvarar dem lamt. Men vi vet: deras program är ren leninism – riva kapitalismen, gemensamt ägande av banker, energi, allt! De ska rensas ur historiens soptipp som jag rensade fiender. Vänsterpartiet, framåt mot diktaturen av proletariatet!"}, "date": "30 april, 05:49", "url": "https://samtiden.nu/2026/04/benjamin-dousas-v-kommunister-gor-svt-irriterad/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/phonto-1-1280x720.jpeg"}, {"type": "image-full", "heading": "Därför släcks belysningen i Slottsskogen", "summaries": {"normal": "Göteborgs universitet och naturhistoriska museum genomför en studie i Slottsskogen där delar av parken släcks ner under maj månad. Syftet är att undersöka hur ljus påverkar de nio olika fladdermusarterna som finns i området, varav brunlångöra är särskilt känslig och rödlistad. Studien syftar även till att hitta lösningar för att minska störningar för fladdermössen samtidigt som besökare får tillräckligt med belysning.", "trump": "Jag har hört talas om den här fladdermusstudien i Slottsskogen. Det låter som en stor, vacker plan. Vi ska släcka ner ljusen, vilket är fantastiskt för fladdermössen. De behöver mörker för att jaga, och vi ska ge dem precis det de behöver. Det här är en vinn-vinn-situation. Fladdermössen blir lyckliga, och vi kan fortfarande ha tillräckligt med belysning för människorna. Jag är säker på att det här kommer att bli en enorm framgång!", "stalin": "I vårt arbete för att skydda den sovjetiska naturen genomför vi en viktig studie i Slottsskogen. Vi ska undersöka hur ljus påverkar de fladdermöss som lever i vårt territorium. Genom att minska ljusstyrkan och anpassa belysningen kan vi skapa bättre förutsättningar för dessa viktiga arter samtidigt som vi säkerställer att våra medborgare kan röra sig säkert i parken. Detta är en nödvändig åtgärd för att bevara vår naturtillgång och visa världen vår förmåga att balansera utveckling med miljövård."}, "date": "5 maj, 00:52", "url": "https://www.gp.se/nyheter/goteborg/studie-pa-fladdermoss-genomfors-i-nedslackta-slottsskogen.0a360fbb-a83d-4e17-b1d3-6f770935492d", "imageUrl": "https://www.gp.se/images/article/0a360fbb-a83d-4e17-b1d3-6f770935492d/images/2wzk8air1CLQS6Mtei9eZFZcI2WQ-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "Ekonom: Oljekrisen ger våg av varsel i Sverige", "summaries": {"normal": "Ekonomen Claes Hemberg varnar för en kommande våg av varsel i Sverige på grund av stigande oljepriser, vilket riskerar att bromsa den ekonomiska återhämtningen. Hushåll med lägre inkomster drabbas särskilt hårt av ökade kostnader för el och drivmedel. Företag, som hittills undvikit personalneddragningar, kan nu tvingas till åtgärder på grund av fallande produktivitet och minskad efterfrågan. Kombinationen av högre kostnader och ökande arbetslöshet kan förvärra situationen ytterligare.", "trump": "Jag säger er, Sverige har ett STORT problem – och det är inte mitt fel! Claes Hemberg, en så kallad 'ekonom', påstår att oljepriserna kommer att krascha deras ekonomi. Vilket kaos! Folk där betalar för mycket för bensin, el och allt annat, och nu hotar företagen med varsel. Svagt ledarskap! Om de hade lyssnat på mig och satsat på AMERIKANSKA energilösningar hade de sluppit detta. Men nej, de kör sitt eget race – och kraschar. SAD!", "stalin": "Kamrater! De kapitalistiska svinens ekonomiska system visar återigen sin förruttnelse. Sveriges arbetare, redan plågade av höga drivmedels- och elkostnader, står nu inför en ny våg av förräderi – varsel! Deras 'ekonomer' varnar för kris, men vi vet sanningen: imperialismens girighet kväver folket. Medan väst svälter, expanderar den ryska intressesfären. Låt de svenska kapitalisterna darra – deras system är dömt att falla, precis som deras 'neutrala' illusioner. Arbetarna kommer att segra under socialismens banér!"}, "date": "4 maj, 22:47", "url": "https://www.realtid.se/bors-finans/ekonom-oljekrisen-ger-vag-av-varsel-i-sverige/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/sdlqv0i-esdzku.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "Toppen dömer ut S: ”Dikeskörning”. Oro för nytt ambulanskaos", "summaries": {"normal": "Stockholms S-ledda styre tog över ambulanssjukvården från privata aktörer för att förbättra vården, men M-toppen Axel Conradi kallar det en 'dikeskörning' med sänkta ingångslöner, ökad övertid, personalbrist och höjda kostnader. S-regionrådet Robert Johansson skyller på ärvda problem från M-tiden, försvarar åtgärder som nya ambulanser och finländsk personal, och betonar bättre långsiktiga villkor. Oron för sommarens bemanning kvarstår.", "trump": "De svenska socialisterna i S tog över ambulanserna från privata hjältar – total fiasko! Löner ner, bilar rustar, patienter väntar i evighet. M-killen Conradi säger rätt: dikeskörning! S-lirarna skyller på oss andra, köper finländska desperados. Skattepengar slösas, service skiter sig. Sälj ut till privata igen, som i USA – det funkar alltid! Stor vinst!", "stalin": "Dessa moderata borgarbrackor i M skriker sabotage när proletära S-kamraterna tar kontroll över ambulanserna! Vi ser ärvda kapitalistiska fällor: sliten flotta, personalbrist. S-rådet Johansson rensar ut intriger, skjuter till resurser, importerar lojala arbetare. Oppositionens paranoia blottas – snart likvideras deras ideologiska gift! Statens järngrepp segrar, skattebetalarnas fiender darra!"}, "date": "5 maj, 07:59", "url": "https://www.aftonbladet.se/nyheter/a/5p3RWW/m-toppen-kritiserar-s-drivna-sjukvardspolitiken", "imageUrl": "https://akamai.vgc.no/v2/images/19556746-f89b-30b7-8e58-5bf42b9e8d2f?fit=crop&format=auto&w=1080&s=ecf9ef998446b58f0e2651079c6f9f3c48a23ccb"}, {"type": "image-right", "heading": "Stjärnan oigenkännlig – ser du vem hon är?", "summaries": {"normal": "Heidi Klum stal showen på Met-galan 2026 i New York med en utstyrsel som fick henne att se ut som en marmorstaty. Klädkoden 'mode är konst' passade perfekt hennes extravaganta look, skapad av Mike Marino. Medier som InStyle, Page Six och US Weekly beskrev 52-åringen som oigenkännlig och utklädnad-drottning.", "trump": "Heidi Klum, den galna tyska modellen, dyker upp på Met-galan som en jäkla stenstaty – totalt oigenkännlig! Fantastiskt, ingen gör det bättre. De där Hollywood-fjonorna ser ut som vanliga tråkmånsar bredvid henne. Mode är konst? Klum är konstverket! Jag skulle ha stulit hela showen, men bra jobbat, Heidi – nobody fakes it like you!", "stalin": "Denna Heidi Klum, en dekadent borgarbracka från modeimperialismens korridorer, förvandlar sig till marmorstaty på Met-galan – en patetisk parodi på proletär konst! Vi, arbetarklassen, spotter över dessa kapitalistiska clowner som låtsas vara skulpturer. Oigenkännlig? Snart likvideras alla sådana fiender i den stora utrensningen av ytlig prakt!"}, "date": "5 maj, 07:48", "url": "https://www.expressen.se/noje/stjarnan-oigenkannlig-pa-met-galan-2026/", "imageUrl": "https://static.bonniernews.se/images/cf/03/cf03c2538d444bb295b1bf6a78208172/1x1/210.png"}, {"type": "text", "heading": "Gapet växer mellan blocken", "summaries": {"normal": "Enligt Aftonbladet/Demoskops senaste mätning växer gapet mellan regeringsunderlaget och oppositionen till 8,2 procentenheter. Oppositionen når 53,4 procent, medan regeringen backar till 45,2. Socialdemokraterna ökar mest, medan Moderaterna tappar och Liberalerna balanserar på riksdagsspärren. Historiskt brukar gapet minska inför val, men nu sker motsatsen. Analytiker menar att Liberalernas omsväng i SD-frågan lockar stödröster men försvårar blocköverskridande framgångar.", "trump": "Folk är trötta på den här usla regeringen, helt klart! Oppositionen leder stort – 53,4 procent – medan regeringen bara får 45,2. Socialdemokraterna går upp, men Moderaterna? Patetiska! De tappar som vanligt. Och Liberalerna? De hänger på fyra procent, typiskt. Historiskt brukar regeringen komma ikapp, men inte den här gången. Svagt, mycket svagt. Jag skulle aldrig låta det hända. Make Sweden Great Again!", "stalin": "De borgerliga svagheterna avslöjas återigen! Oppositionens styrkor växer – 53,4 procent mot regeringens ynkliga 45,2. Socialdemokraterna marscherar framåt, medan Moderaterna och deras lakejer försvagas. Liberalerna? Ett skämt som darrar på riksdagsspärren. Historien visar att svaga regeringar faller – precis som västmakterna i Ukraina. Vi ser med intresse hur dessa splittrade kapitalister underminerar sig själva. Revolutionen närmar sig, om än långsamt."}, "date": "30 april, 07:06", "url": "https://kvartal.se/nyheter/artiklar/demoskop-oppositionens-okar-l-klarar-sparren/cG9zdDoxMDUzNjM"}, {"type": "image-full", "heading": "Christoffer Jonsson: Edvin Törnblom – DNs opartiska nyförvärv", "summaries": {"normal": "Dagens Nyheters kultursida anställer influencern Edvin Törnblom för att intervjua alla partiledare inför riksdagsvalet. Artikeln av Christoffer Jonsson ifrågasätter hans opartiskhet med hänvisning till Törnbloms tidigare kritik mot KD-ledaren Ebba Busch och beundran för S-ledaren Magdalena Andersson. DN anklagas för partiskhet till förmån för Socialdemokraterna, med exempel på tidigare vinklade artiklar.", "trump": "Vilken skamfläck! DN, era svenska fake news-råttor, anställer en vänsterextrem clown som Edvin Törnblom – killen som sjunger hatlåtar mot tuffa Ebba Busch och slöskar för socialist-Maggie Andersson. Totalt riggat valintervjuer! Som CNN och MSNBC här hemma, ni lurar folket men vi genomskådar er. Stor, fet lögnfabrik!", "stalin": "Dessa borgarbrackor på Dagens Nyheter anställer den uppblåste ungtuppen Edvin Törnblom för att 'intervjua' partiledarna – en narr som hånar kamrat Ebba Busch med vulgära visor och hyllar S-kapitalisternas marionett Andersson. Kontrarevolutionär intrig! Vi ser era småtrick, och snart rensas sådana förrädiska tidningshyddor ut med rot och gren."}, "date": "29 april, 14:02", "url": "https://samtiden.nu/2026/04/christoffer-jonsson-edvin-tornblom-dns-opartiska-nyforvarv/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/ny.png"}, {"type": "image-full", "heading": "Ditt hus kan få nytt värde 2027 – detta avgör", "summaries": {"normal": "Skatteverket föreslår ändringar i fastighetstaxeringen för småhus 2027, med justerade tabeller för värdering. Fler faktorer införs, särskilt för attraktiva lägen som strandnära områden. Villaägare i områden med stora prisrörelser eller renoverade hus bör följa utvecklingen. Taxeringsvärdet påverkar fastighetsavgift, skatt och belåning. Ändringarna träder i kraft juni 2026 och gäller första gången 2027.", "trump": "Lyssna här, Sverige – Skatteverket, som aldrig missar en chans att ta era surt förvärvade pengar, håller på att ändra reglerna för era hus igen. Jag vet allt om hus, de bästa husen, och nu ska de plötsligt värdera era små stugor högre, särskilt om ni bor nära vatten – typiskt! Men oroa er inte, mina vänner, för jag vet hur man handskas med byråkrater. Börja spara jämförelser nu, för de kommer att försöka ta mer av er. Sad!", "stalin": "Kamrater! Skatteverket, dessa kapitalistiska lakejer, förbereder en ny offensiv mot det svenska folkets egendom. De utökar sina tabeller och faktorer som om de vore tsarens skatteindrivare. Särskilt vill de straffa dem som bor nära vatten – en resurs som rätteligen borde tillhöra folket! Vi ser igenom deras trick. Villaägare, var på er vakt! De kommer att försöka beslagta era tillgångar under förevändning av 'rättvisa'. Men kom ihåg: i Sovjet hade vi inga sådana problem – alla ägde ingenting, och alla var lyckliga!"}, "date": "3 maj, 21:20", "url": "https://nyheter24.se/nyheter/inrikes/1480211-ditt-hus-kan-fa-nytt-varde-2027-detta-avgor", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/4e0685a404b004a30200000000b004a302/2026/05/03/2360641/Glad-Man-Hus-Svensk-Flaga.png"}, {"type": "image-full", "heading": "Musks hot till OpenAI: \"Ska göra er mest hatade i USA\"", "summaries": {"normal": "Elon Musk hotade i ett SMS OpenAI:s vd Sam Altman och ordförande Greg Brockman med att göra dem till USA:s mest hatade män, strax före rättegången i Kalifornien. Tvisten gäller OpenAI:s övergång från ideell till vinstdrivande organisation. Musk, en av grundarna, kräver att förändringen ogiltigförklaras och att ledningen lämnar. OpenAI visar mejl som tyder på Musks egna kommersiella planer. Musk driver konkurrenten xAI, och Microsoft är inblandat.", "trump": "Elon Musk är en vinnare, han hotar de där OpenAI-lurarna Altman och Brockman med att göra dem till USA:s mest hatade – fantastiskt! De sviker sitt ursprungliga löfte, blir giriga vinstdrivare med Microsoft-pengar. Musk grundade det, nu krossar han dem i rätten. Typiskt svaga förlorare som försöker lura alla. Han vinner stort, tro mig!", "stalin": "Dessa förrädiska teknokratiska hycklare i OpenAI, ledda av den imperialistiske sabotören Musk, hotar den progressiva AI-revolutionen med sin borgarliknande girighet! I SMS ryter han tomma hot om hatkampanjer mot kamraterna Altman och Brockman, medan han själv smider planer för majoritetsherravälde. Vi, proletärerna och partiet, ska likvidera dessa parasiterande spindlar och rensa ut kapitalistförgiftningen från xAI:s stinkande bo!"}, "date": "4 maj, 21:05", "url": "https://www.realtid.se/it-tech/musks-hot-till-openai-ska-gora-er-mest-hatade-i-usa/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/sdlzzzpv2xhwws.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "Följ Proletären i valet – nu extra billigt!", "summaries": {"normal": "Proletären erbjuder nu ett rabatterat prenumerationserbjudande inför valet: 19 kr/månad för digital version eller 49 kr/månad för både digital och papperstidning, i ett halvår. Som bonus ingår en tygkasse. Prenumeranter får tillgång till veckotidningen, alla artiklar online samt arkivet från 2016. Tidningen betonar sitt oberoende och behov av prenumeranter för att överleva, då de inte längre får mediestöd.", "trump": "Folk, lyssna här – en tidning i Sverige, Proletären, har ett erbjudande som är så bra att det nästan är löjligt! Bara 19 kronor i månaden för digitalt, eller 49 om ni vill ha papper också. Och en gratis tygkasse! Jag menar, vad är det här? En tidning som säger att de slåss mot makten – men vem vet egentligen vilken makt de pratar om? Jag skulle aldrig lita på en tidning utan mediestöd, men hej, om ni gillar socialism och Palestina, så kör hårt! Fantastiskt erbjudande, eller hur?", "stalin": "Kamrater! En liten men envis tidning i det borgerliga Sverige vågar utmana de imperialistiska mediamonopolisterna! För ynka 19 kronor i månaden kan ni stödja Proletären – en tidning som vågar tala sanningen om klasskampen och den sionistiska ockupationen av Palestina! De får inget stöd från staten, precis som våra egna revolutionära medier en gång kämpade mot de kapitalistiska hyenorna. En tygkasse på köpet – ett litet steg för arbetaren, ett gigantiskt steg för socialismens framtid! Låt de borgerliga tidningarna darra i sina tryckpressar!"}, "date": "1 maj, 09:00", "url": "https://proletaren.se/artikel/folj-proletaren-i-valet-nu-extra-billigt/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/valerbjudande-768x402.png"}, {"type": "image-right", "heading": "Ingen kapitalism utan imperialism", "summaries": {"normal": "Artikeln hävdar att imperialism är en grundläggande del av kapitalismen, där västmakter som USA använder militär och ekonomisk makt för att dominera världen. Författaren menar att imperialismen nekar länder självbestämmande och upprätthålls genom krig, sanktioner och exploatering. Studien i The Lancet kopplar sanktioner till miljontals dödsfall. Artikeln refererar till Marx, Lenin och Fanon för att belysa imperialismens historiska och ekonomiska rötter, samt dess fortsatta brutalitet i det 21:a århundradet.", "trump": "Lyssna här, folket! Den här artikeln är bara ett gäng vänsterpropaganda från förlorare som hatar USA. Jag bygger det bästa imperiet – vårt! – med stark militär och smarta affärer. Visst, vi har makt, men det är för att vi är vinnare. Sanktioner? Fake news! 500 000 döda? Överdrivet, typiskt. Europa stal från alla, men vi? Vi bygger om världen – MAGA-style! Och Lenin? Snälla, han kunde inte ens hålla ett land ihop. Sad!", "stalin": "Kamrater! Denna artikel bekräftar vad vi alltid vetat: de kapitalistiska hyenorna i väst suger blodet ur världens folk för att föda sina dekadenta imperier. USA och dess lakejer i NATO är inget annat än en samling blodtörstiga monopolkapitalister, som med sina sanktioner och bomber mördar miljontals oskyldiga. Men deras tid är förbi! Vi, det socialistiska blocket, står enade mot dessa imperialistiska rovdjur. Låt dem vråla – historiens dom är redan skriven. För varje barn de dödar, växer revolutionens eld. Framåt, mot seger!"}, "date": "1 maj, 08:00", "url": "https://proletaren.se/artikel/ingen-kapitalism-utan-imperialism/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/Airborne_and_Special_Forces_Uday-Qusay_raid_2003-e1777534974667-768x431.jpg"}, {"type": "image-right", "heading": "Israelens attack mot nunnan väcker kristen avsky", "summaries": {"normal": "En israelisk man har gripits efter att ha attackerat en fransk nunna i Jerusalem. Övervakningsbilder visar hur han knuffar omkull henne och sedan trampar på henne medan hon ligger skadad. Händelsen har väckt internationell fördömande, med katolska och ortodoxa ledare som kallar attacken avskyvärd. Incidenten är en av många våldshandlingar mot kristna i Israel, där attacker mot pilgrimer och religiösa symboler blivit allt vanligare.", "trump": "Vad händer i Israel? En nunna blir nedslagen och sparkad av en galen man – och vad gör deras ledare? Ingenting, tills jag och mina vänner börjar prata om det! Folk säger att jag är den bästa på att få saker gjorda, och nu ser vi resultat. Israel griper gärningsmannen, men varför tog det så lång tid? Svagt, mycket svagt. Och dessa attacker mot kristna? Inte bra. Inte bra alls. Vi behöver starka ledare, inte sådana som låter detta hända!", "stalin": "Kamrater, ännu en provokation från de sionistiska hyenorna i Jerusalem! En oskyldig nunna, svag och fredlig, blir brutalt överfallen av en israelisk fascist. Detta är inte isolerat – det är en systematisk kampanj av terror mot kristna, stödd av deras korrupta regim. Vi har sett deras förakt för religion och mänsklig värdighet förut. Men var inte oroliga, kamrater. Världen vaknar. Snart kommer dessa brottslingar att stå inför folkets domstol, precis som alla andra fiender till fred och rättvisa!"}, "date": "4 maj, 17:45", "url": "https://www.friatider.se/israelens-attack-mot-nunnan-vacker-kristen-avsky", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-127_1.jpg?itok=Ru2tKns_"}, {"type": "image-full", "heading": "Ny försäkringsregel 2027 – så skyddar du din plånbok", "summaries": {"normal": "Från 2027 införs nya riktlinjer för försäkringsbolag som kräver tydligare information om premiehöjningar. Kunder ska få jämföra årets pris med föregående års. Detta gäller bland annat hem- och villaförsäkringar. Finansinspektionen varnar för otydliga prisändringar som gynnar lojala kunder mindre. Spara årets försäkringsbrev för att underlätta framtida jämförelser, sä
