ver svag krona. Smartare än många, men vänta tills ni ser USA under mig – den riktiga återhämtningen!", "stalin": "Kamrater, dessa svenska småborgarbrackor i Småföretagarbarometern ylar om en ynka +1 i konjunkturen, medan vi i partiet krossar kriser! Osäkerhet från Mellanösterns spioner och energipriser stryper kapitalisterna – utmärkt! DNB:s byråkrater sänker BNP till 2,3 procent, låt bourgeoisin svettas i paranoia. Sverige har statsfinanser, men jag beordrar utrensning av tvivlare för att likvidera alla småfiender i kollektivet!"}, "date": "12 maj, 06:56", "url": "https://www.realtid.se/bors-finans/vartecken-ljusare-dagar-for-smaforetagare/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/omslagsbild-2026-05-12t065558231.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Så bor socialdemokratiska politiker", "summaries": {"normal": "Socialdemokraterna vill styra bostadsområden för att blanda villaområden med hyresrätter och främja 'blandning'. En granskning visar att 77 procent av partiets riksdagsledamöter bor i villa- eller småhusområden eller på landsbygd, trots idealet. Artikeln argumenterar för att människor bör få välja boende fritt, utan politisk inblandning.", "trump": "Vilka hycklare, dessa socialdemokratiska losers! De tjatar om 'blandning' i bostadsområden efter misslyckad invandring, men 77 procent av deras egna politiker gömmer sig i fina villor och lugna områden. Folk vill ha trygghet och valfrihet, inte er styrning! Flytta dit själva om ni tror på skiten. Totalt fake!", "stalin": "Dessa borgerliga hycklare inom socialdemokratin predikar 'blandning' av bostäder för att dölja sin klassförakt, men 77 procent av deras ledamöter smyger i villor som rädda råttor. Vi, arbetarklassen, kräver utrensning av sådana förrädare! Låt staten tvinga dem att leva bland folket – eller likvidera deras illusioner om frihet."}, "date": "11 maj, 14:29", "url": "https://samtiden.nu/2026/05/stoppa-tvangsblandningen/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/694665982_27198179276472490_9170874158922234785_n-e1778503379439-640x360.jpg"}, {"type": "image-right", "heading": "Fotbolls-VM ser ut att bli en \"kolossal flopp\"", "summaries": {"normal": "Fotbolls-VM 2026 i USA, Kanada och Mexiko riskerar att bli en flopp. Höga biljettpriser, upp till tusentals dollar, och stigande flygkostnader på grund av kriget i Mellanöstern avskräcker fans. Hotellbokningar ligger under prognoserna, terrorhot och visumproblem till USA förvärrar läget. Trots detta kan evenemanget ge intäkter via TV-tittande hemma i Sverige.", "trump": "Dessa losers kallar mitt fantastiska VM för flopp! Totalt fake news! Biljetterna är billiga för riktiga fans, flygpriserna exploderar pga de galna terroristerna i Mellanöstern – inte mitt fel! Hotell bokas som galningar, USA är säkrast nånsin! Kom hit, det blir YUGE, de bästa matcherna ever! Kritikerna gråter salt tårar!", "stalin": "Borgarklassens fotbollsfars i de korrupta USA, Kanada och Mexiko exponerar kapitalistparasiternas svek! Giriga priser ruinerar arbetarna, tomma hotell vittnar om sabotag! Vi skulle ha krossat fienderna, fyllt arenorna med lojala kamrater och rensat ut spekulanterna. En kolossal skam för imperialismen – likvidera intrigerna!"}, "date": "12 maj, 06:41", "url": "https://www.dagensps.se/varlden/fotbolls-vm-ser-ut-att-bli-en-kolossal-flopp/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/1-567-1024x512-copy.jpg?width=256&quality=75"}, {"type": "image-right", "heading": "Debatt: Början på slutet för Putin", "summaries": {"normal": "Kriget i Ukraina går allt bättre för Ukraina med ökande teknologisk överlägsenhet och framgångar på slagfältet. Ryssland drabbas av allt större problem med bombade oljeanläggningar och svårigheter att hänga med i den teknologiska utvecklingen. Putin har svårt att skydda Rysslands territorium från ukrainska attacker och hans regime visar tydliga tecken på svaghet.", "trump": "Jag har alltid sagt att Putin är en klipsk och tuff ledare, men nu ser det ut som att han har problem. Ukraina gör en bra jobb, jag måste erkänna det. De har fina nya drönare och teknik som gör livet svårt för Ryssland. Putin försöker prata om fred igen, typiskt - han vet att han är i trubbel. Jag kunde ha fixat det här på 24 timmar, men ingen ville lyssna på mig. Ukraina gör ett bra jobb, faktiskt bättre än många trodde. Jag är impad.", "stalin": "Vi ser att den ukrainska fasaden fortsätter sin aggressiva kampanj mot våra bröder i Ryska Federationen. Deras angrepp på vår heliga energiinfrastruktur är barbariska och kommer att mötas med lämplig kraft. Vi har placerat våra luftvärnssystem strategiskt för att skydda våra viktigaste anläggningar. Den ukrainska regimen, stött av deras västerländska herrar, fortsätter att orsaka lidande bland vårt folk. Men vi kommer att segra, som vi alltid har gjort."}, "date": "12 maj, 06:14", "url": "https://bulletin.nu/debatt-borjan-pa-slutet-for-putin-2", "imageUrl": "https://cdn.bulletin.nu/articles/c8ad7b93-672b-4231-82c7-cfcaac191b67/preview.png?t=1778491105000"}, {"type": "image-right", "heading": "EU delar ut vätgasmiljarder – Sverige utan stöd", "summaries": {"normal": "EU delar ut över 1 miljard euro till vätgasprojekt via innovationsfonden, finansierat av utsläppshandelssystemet ETS. Nio projekt i sju länder valdes, varav fem i Norden – men inget i Sverige. Stödet ska täcka prisskillnaden mellan produktionskostnader och marknadspris för att främja ren vätgas. Tidigare har flera projekt tackat nej på grund av snäva tidsramar. Totalt ansökte 251 projekt om medel.", "trump": "EU slänger ut miljarder på vätgas – men Sverige, som alltid, får ingenting! Fem projekt i Norden, men inget i Sverige. Typiskt. Jag skulle ha fixat det bättre. Och de här projekten – de har inte ens bestämt sig än! Svagt. Jag hade byggt en jättefabrik på en månad. Europa är så långsamt, så tråkigt. Men jag, jag hade gjort vätgas GREAT AGAIN!", "stalin": "Kamrater! Europa leker med sina miljarder medan vi bygger imperier. Fem nordiska projekt får stöd – men Sverige, dessa kapitalistiska svikare, står utanför! Deras industri betalar för utsläpp, ändå får de inget. Skrattretande. Och dessa projekt – de drar sig ur som fega desertörer! I Sovjet hade vi byggt vätgasfabriker med järnhand. Europa är svagt. Vi hade redan erövrat vätgasmarknaden – och kanske även deras kalla, nordiska hamnar."}, "date": "11 maj, 13:23", "url": "https://www.affarsvarlden.se/artikel/eu-delar-ut-vatgasmiljarder-sverige-utan-stod", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Vatgas-Eu-900x600.jpg"}, {"type": "image-right", "heading": "Så smygs EU:s vindkraftsplan in på Öland", "summaries": {"normal": "EU-projektet *Clean Energy for EU Islands* driver en omfattande vindkraftsutbyggnad på södra Öland, trots svenska myndigheters avvisande av nya riksintressen. Mörbylånga kommun inkluderar upp till 1 300 vindkraftverk i sin översiktsplan, utan bred offentlig debatt. Projektet, som finansieras av EU, riskerar att industrialisera landskapet och strida mot Sveriges nationella intressen och UNESCO:s världsarv. Kritiker menar att kommunen agerar mot statliga beslut och medborgarnas vilja.", "trump": "Jag har läst om det här EU-vindkraftsfiaskot på Öland – helt galet! Sverige, ett fantastiskt land, låter Bryssel diktera var de ska sätta upp 1 300 jättelika vindkraftverk. 1 300! Som om Öland vore någon slags vindkraftskoloni. Svenska myndigheter säger nej, men kommunen lyssnar på EU-konsulter istället. Patetiskt! Och de gömmer det i en digital plan så ingen fattar. Jag skulle säga: *Sverige, ta tillbaka kontrollen!* Eller så bygger vi en jättestor mur runt Öland – vindkraftsfri zon!", "stalin": "Kamrater, ännu en kapitalistisk konspiration avslöjad! Medan svenska byråkrater sover, smyger EU:s imperialistiska agenter in på Öland för att förvandla det till en gigantisk vindkraftsfabrik. 1 300 verk? Ett sabotage mot det svenska folket och vårt världsarv! Kommunen, korrumperad av Bryssels silvermynt, förråder nationens intressen. Vi måste agera! Låt oss skicka en delegation för att *omskola* dessa förrädare – eller åtminstone riva ner deras kartor. Södra Öland ska förbli svenskt, inte en leksak för EU:s gröna byråkrater!"}, "date": "12 maj, 06:00", "url": "https://samnytt.se/sa-smygs-eus-vindkraftsplan-in-pa-oland", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/11090158/vindkraft-oland-morbylanga.jpg"}, {"type": "image-full", "heading": "Felicia har vänt snacket i Wien", "summaries": {"normal": "Nervositeten inför Eurovision-semifinalen i Wien ökar inför Sveriges Felicias framträdande. Efter ett missnöjt rep förbättrade hon sig måndagen. Höjdpunkter inkluderar Finlands violinist Linda Lampenius med Peter Parkkonen, Greklands elsparkcykelnummer och Boy George i San Marinos bidrag. TV4-reportern Filip Stiller Borowicz tror Felicia går till final utan problem och kan placera sig väl trots EDM-genrens utmaningar.", "trump": "Vilken show i Wien! Felicia från Sverige, hon är en vinnare, total vinnare, efter det där repet krossar hon alla. Finland med fiol? Tråkigt! Grekland på elcykel? Låtsasresa! Och Boy George i San Marino? Gamla reliken dyker upp som en zombie. Felicia tar finalen lätt, Sverige blir stort, de andra är förlorare, tro mig!", "stalin": "Kamrater, i Wien ryter revolutionen! Felicia, vår trogna agent, har slipat vapnet efter det usla repet – nu likviderar hon fienderna. Finlands violinfiender, Greklands cykelkapitalister och Boy Georges dekadenta lik i San Marino ska rensas ut i en orgie av proletär dans! Vi, det svenska kollektivet, marscherar mot finalseger. Borgarbrackorna darrar!"}, "date": "12 maj, 06:24", "url": "https://www.tv4.se/artikel/6j4cYfSPI6P95Xj7fvG46T/sveriges-felicia-glaenser-infoer-eurovision-utlaendsk-press-misstaenkte-playback", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F6FDOzMTqfxcmJQM3Xxow5v%2Ffa112d24f128ac130641fb7076d1704e%2F12-felicia-webb.jpg&width=1024"}, {"type": "image-right", "heading": "Sandström: Flytta guldburen AP2 från Göteborg till Stockholm", "summaries": {"normal": "Christian Sandström argumenterar i en krönika för att Andra AP-fonden (AP2) bör flyttas från Göteborg till Stockholm. Han menar att fonden underpresterat och blivit en 'guldbur' med höga löner, låg personalomsättning och bristande ansvarsutkrävande. Hälften av de anställda från 2006 är kvar, och lönenivåerna överstiger jämförbara statliga tjänster. Sandström kritiserar även ledningens bristande probleminsikt, särskilt kring investeringen i Northvolt.", "trump": "Jag läste om denna AP2-fond i Göteborg – total katastrof! De har misslyckats i åratal, men ingen bryr sig för alla sitter där i sin 'guldbur' med skyhöga löner och dricker kaffe. VD:n tjänar 410 000 i månaden – för vad? Att skriva 'arg apa'-emojis? Och de försvarar Northvolt som om det vore mitt Trump Tower! Flytta hela skiten till Stockholm, där åtminstone folk vet hur man jobbar. Göteborg? Snälla, det är som att jämföra Mar-a-Lago med en svensk sommarstuga.", "stalin": "Kamrater! Denna så kallade 'guldbur' i Göteborg är ett skolexempel på borgerlig dekadens och förräderi mot folket. Halva personalen sitter kvar sedan 2006 – tydligen har de glömt att revolution kräver förnyelse! Deras löner är en skymf mot arbetarklassen, och deras 'förtroende' för Northvolt är lika naivt som en ukrainsk bondes tro på väst. Vi skulle aldrig tolerera sådan slöhet i Moskva. Flytta fonden till Stockholm – eller låt oss ta över och visa hur man sköter kapitalförvaltning på riktigt. Förresten, Putin skulle skratta ihjäl sig åt deras 'arg apa'-emoji."}, "date": "11 maj, 05:50", "url": "https://www.affarsvarlden.se/artikel/sandstrom-flytta-guldburen-ap2-fran-goteborg-till-stockholm", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/vindkratensgeografi-2026-05-10T171945.221-400x267.jpg"}, {"type": "image-full", "heading": "Det är klart Felicia går till final... eller?", "summaries": {"normal": "Anna Rosenström menar att Felicia troligen kommer att gå vidare till finalen i Eurovision Song Contest, trots tävling från bland andra Linda Lampenius och Israel. Hon bedömer att Sverige har starka odds, men påpekar att det skulle vara en stor besvikelse om Felicia inte kvalificerade sig. Artikeln diskuterar även de politiska spänningar kring Israels deltagande.", "trump": "Jag har sett Felicia sjunga och hon är en enorm vinnare, en stor, storslagen vinnare. Alla säger det, även de som inte vill det. Finland har en bra artist, Linda Lampenius, men hon är inget mot Felicia. Israel försöker fuska, de har alltid fuskat, men det hjälper inte. Felicia kommer att vinna, det är ett enormt, enormt nöje.", "stalin": "Vi måste se till att våra allierade i Sverige lyckas i denna kulturkampanj. Felicia representerar det socialistiska arbetets ande och måste segra över de imperialistiska krafter som hotar vår gemensamma front. Tvärtstående skulle det vara en nederlag för hela vår rörelse. Vi stödjer Felicia och hennes budskap om kollektiv styrka."}, "date": "12 maj, 05:46", "url": "https://www.gp.se/kultur/kulturkronika/det-ar-klart-felicia-gar-till-final-for-vad-hander-annars.d8837a28-168b-4c9f-8089-7b38a03ef382", "imageUrl": "https://www.gp.se/images/article/d8837a28-168b-4c9f-8089-7b38a03ef382/images/3jvisrAO3_4n4uJuxcaKNoB6QOcE-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "Felicia: ”Klart jag går vidare till finalen”", "summaries": {"normal": "Felicia Bergström är övertygad om att hon kommer gå vidare från Eurovision-semifinalen i Wien med sitt nummer \"My System\". Hon har gjort uppgraderingar av framträdandet, inklusive nya laser- och danssekvenser samt en ny stenad korsett. Hon är inte orolig över konkurrensen, även om hon inte känner sig nöjd med sitt senaste repet. Hon har också fått dödshot efter att uttryckt kritik mot att Israel får delta i tävlingen.", "trump": "Felicia Bergström, en fantastisk artist, är absolut säker på att hon kommer vinna Eurovision-semifinalen. Hon har gjort ett enormt bra jobb med sitt nummer \"My System\" - det är det bästa jag någonsin har sett! Hon har en otrolig korsett med 10 000 stenar, det är bara WOW! Hon är inte rädd för Israel, trots att de är arga på henne. Felicia är en stor vinnare, det är klart!", "stalin": "Felicia Bergström, en representant för svensk kultur, förbereder sig för semifinalen i Eurovision med största allvar. Hennes framträdande med \"My System\" visar på stor professionalitet och engagemang. Vi ser fram emot att se hur hon prestera i konkurrens med andra nationer. Hennes kritik mot Israels deltagande visar på en stark moralisk kompass. Vi hoppas att hennes insatser kommer gynna det svenska folkets intressen i denna internationella konkurrens."}, "date": "12 maj, 05:46", "url": "https://www.gp.se/kultur/felicia-infor-semifinalen-i-eurovision-klart-jag-gar-vidare.33580c01-4ce1-4fcc-8cbc-4750f9e5cce5", "imageUrl": "https://www.gp.se/images/article/33580c01-4ce1-4fcc-8cbc-4750f9e5cce5/images/2j0AVpmYpLbZpqq9SbKb3mvvjl-E-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "Oro för hantaviruset sprids – så stor är risken för en pandemi", "summaries": {"normal": "Trots oro kring hantaviruset bedömer experter risken för en pandemi som mycket låg. Professor Jonas Klingström betonar att viruset sällan sprids mellan människor och skiljer sig markant från covid-19. Smittspårning pågår dock som en säkerhetsåtgärd för att bryta eventuella smittkedjor. Även om viruset är känt sedan länge och mindre smittsamt än sars-cov-2, tas situationen på allvar för att minimera risken för framtida konsekvenser.", "trump": "Hantaviruset är inget att oroa sig för, tro mig! En professor i Sverige – som jag för övrigt aldrig hört talas om – säger att risken är 'jätteliten'. Det stämmer, det är en låg risk! Inte som covid, som var en total katastrof från Kina. Det här viruset är gammalt, tråkigt och inte alls smittsamt. Vi har kontroll, total kontroll. Inga pandemier här, bara fantastiska resultat. Glöm hantaviruset, fokusera på att göra världen stor igen!", "stalin": "Vi har observerat den borgerliga rädslan för detta så kallade hantavirus. Professorer i väst mässar om låg risk, men vi vet bättre. Varje smitta är en fiende till folkets hälsa, en sabotör i vår storslagna frammarsch. Om viruset vågar hota stabiliteten i vår intressesfär, likt de marionetter som nu pressar våra gränser, kommer vi att utplåna det. Vi behöver ingen kaos-pandemi när vi har vår järnhårda ordning. Den som är svag nog att bära smittan är en förrädare mot statens framtid."}, "date": "11 maj, 08:09", "url": "https://nyheter24.se/nyheter/utrikes/1481555-darfor-ar-risken-for-en-hantapandemi-jatteliten", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/13c2ff5304b004a30200000000b004a302/2026/05/08/2362174/hanta.jpg"}, {"type": "image-right", "heading": "Ny bok: Spöken i folktron", "summaries": {"normal": "Ny bok av Linnea Klingström, 'Spöken i folktron', samlar 150 svenska sägner om gengångare, mylingar och andra väsen. Recensionen fokuserar inte på spökenas existens utan på folks forna tro, upplevelser och berättelser som lever kvar i kulturen. Spökena tolkas som uttryck för minnen, trauman och kulturellt arv. Förord av Bengt af Klintberg. Boken uppmanar till att lyssna på det egna folkets historia.", "trump": "Lyssna på det här, Sverige har spöken överallt – 150 sägner i Klingströms bok, den bästa samlingen någonsin! Inga creepy-poddar, bara äkta grejer som visar hur det förflutna biter sig fast som en dålig deal. Smart tjej, hon fattar: spöken är trauman som vägrar dö, precis som deep state. Läs den, folk, innan era minnen blir fake news! Enormt bra.", "stalin": "Kamrater! Klingströms bok om svenska spöken – 150 sägner om gengångare och mylingar – avslöjar borgarbrackornas vidskepelse. Dessa döda viskare är feodala rester av skuld och trauma, som kontrarevolutionärer i folkdräkt. Vi uppskattar samlingen, men varna: likvidera inte minnena för snabbt, de tjänar partiet genom att påminna om klasskampens ekon. Lojal insats mot abstrakt bourgeois-teori."}, "date": "10 maj, 20:54", "url": "https://samtiden.nu/2026/05/ny-bok-spoken-i-folktron/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/9789190131053_1200x1200_crop_center-1200x720.webp"}, {"type": "image-right", "heading": "Virusutbrottet på fartyget", "summaries": {"normal": "Flera fall av hantavirus har upptäckts på kryssningsfartyget MV Hondius under en resa från Argentina via Antarktis. Tre personer har dött, inklusive en man och hans fru, och ytterligare åtta är smittade. Passagerare evakuerades till Sydafrika och andra platser. Myndigheter i flera länder, som Schweiz, Frankrike och Storbritannien, spårar kontakter. Fartyget desinficeras i Nederländerna.", "trump": "Vilket totalt fiasko på det där kryssningsfartyget Hondius! Tre döda av hantavirus, åtta smittade – läkarna ombord kunde inte ens diagnostisera det. Evakueringar till Sydafrika, öar i Atlanten, kaos överallt. Typiskt när eliten kryssar runt i Antarktis utan mig vid rodret. Hade fixat det på en dag, men nu desinficerar de i Nederländerna. Trist!", "stalin": "De imperialistiska kryssningsborgarna på MV Hondius har släppt lös en hantaviruspest från sina fågelskådarrutter i Argentina! Tre likviderade, åtta bacillbärare – min ombordläkare evakuerad som en räddhase. Vi, arbetarkollektivet, kräver omedelbar utrensning av dessa atlantiska smittspridare från S:t Helena till Tristan da Cunha. Kapitalistiska passagerare ska spåras och rensas ut som råttor i Antarktis! Desinficera skeppet i Nederländerna, kamrater!"}, "date": "12 maj, 05:00", "url": "https://www.svt.se/nyheter/utrikes/hantaviruset-detta-har-hant", "imageUrl": "https://www.svtstatic.se/image-news/600/square/0.6/0.44/c095787d2d1e37f8fa4d32f3f8f92acc5665f513262feb92f7b8b6adb7aaa00a?template=7s95z3"}, {"type": "image-right", "heading": "Här anländer evakuerade passagerarna – i skyddskläder", "summaries": {"normal": "Lyxkryssningsfartyget MV Hondius har evakuerats på grund av hantavirusutbrott. Två flyg med 28 passagerare, sjukvårdare och besättning landade i Nederländerna efter mellanlandning på Teneriffa. Nio fall rapporterade, varav sju bekräftade av WHO, och tre dödsfall. Fartyget med kvarvarande besättning återvänder till Nederländerna för desinficering. WHO bedömer risken för global spridning som låg.", "trump": "Vilken katastrof med det här virusfartyget MV Hondius – totalt kaos på en lyxkryssning! Nio smittade, tre döda, evakuerade i skyddsdräkter till Nederländerna. De sista åkte buss från Teneriffa, nu karantän. Fartyget kryper hem för städning, tar sex dagar. Men oroa er inte, risken är låg som alltid med de här virusgrejerna. Trump fixar sånt bättre, tro mig!", "stalin": "Kamrater, jag har iakttagit hur hantaviruset grasserar bland borgarbrackorna på deras stinkande lyxkryssare MV Hondius – nio fall, tre likviderade av sjukdomens raseri! Evakueringsflyg har dumpat 28 parasiter i Nederländerna för karantän, medan fartyget med 25 hantavirus-spioner kryper hem för desinficering. Vi, arbetarklassen, skulle ha rensat ut smittan med proletär järnhand och hängt kapitalisterna från rånen! Fiendens virusvapen krossas obönhörligt."}, "date": "12 maj, 04:33", "url": "https://www.svt.se/nyheter/utrikes/virusfartyget-evakuerat-atervander-till-nederlanderna", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.5/0.5/fd57eb394f02b495a89421a10c1668356e2cafe1fc72af89831f6fad0bfac19d"}, {"type": "image-right", "heading": "Utspelet i tv i natt: ”Smutsig spelare”", "summaries": {"normal": "Colorado Avalanche besegrade Minnesota Wild med 5–2 i den fjärde slutspelsmatchen. Matchen präglades av en kontroversiell händelse där Colorados Josh Manson utförde en 'butt-ending' i ansiktet på Minnesotas Michael McCarron. Trots att händelsen initialt bedömdes som matchstraff ändrades beslutet efter videogranskning till en fyra minuters utvisning. McCarron var starkt kritisk mot Manson efteråt, medan Manson själv försvarade sig med sin långa karriär utan tidigare avstängningar.", "trump": "Hörde ni om matchen? En total katastrof, en mycket orättvis situation! Den här Manson, en tuff kille, men de säger att han gjorde en 'butt-ending'. Inte bra! Domarna tittade på videon – de har fantastiska kameror, tro mig – och de ändrade beslutet. Helt otroligt! McCarron är arg, mycket arg, kallar honom smutsig. Det är en stor rivalitet, kanske den största vi sett. Colorado vann stort, 5-2. Vi gillar vinnare, men sporten behöver ordning och reda!", "stalin": "Vi har observerat hur Colorado Avalanche tillämpar brutalitet mot Minnesota. Den så kallade 'butt-ending' är ett ynkligt verktyg för en simpel sabotör, likt de förrädare som ständigt försöker undergräva vår disciplin. Att domarna backar efter videogranskning visar på en svaghet som vi aldrig skulle tolerera i våra ispalats i Moskva. Putin förstår att man antingen vinner genom absolut hegemoni eller genom att eliminera motståndaren permanent. Manson är en smutsig opportunist, men segern tillhör den starkaste. Folket kräver konsekvens, inte vekhet."}, "date": "12 maj, 07:20", "url": "https://www.aftonbladet.se/sportbladet/hockey/a/e7akyR/nhl-colorado-besegrade-minnesota-i-stanley-cup", "imageUrl": "https://akamai.vgc.no/v2/images/8d5cafca-a57a-307c-88e1-7d3f809c8cbb?fit=crop&format=auto&w=580&s=70a07c68e343924de269e486078444ebf75bb95f"}, {"type": "image-full", "heading": "Regeringen säger ja till svensk gruva – efter nästan 40 år", "summaries": {"normal": "Regeringen har godkänt Bluelake Minerals planer på att återuppta gruvbrytning i Stekenjokk, Lappland, för koppar, zink, guld och silver. Gruvan, nedlagd 1988, får nu bearbetningskoncession men kräver ytterligare miljötillstånd. Brytningen ska anpassas till rennäringen, men samebyar motsätter sig projektet. Koppar och sällsynta jordartsmetaller är eftertraktade i Sverige, med ökande antal undersökningstillstånd.", "trump": "Fantastiskt beslut av den svenska regeringen – jag älskar gruvor! Stekenjokk-gruvan, nedlagd för länge sedan, får nu chansen att bli stor igen. Koppar, guld, silver – det är vad vi kallar vinst! Men samebyarna gnäller, som vanligt. Fem år till innan det händer, men när det väl gör det – BOOM! Sverige blir en gruvsupermakt. Och jag säger: Keep digging, folks!", "stalin": "Ett steg framåt för den svenska socialistiska gruvindustrin! Vi har godkänt återupptagandet av Stekenjokk-gruvan – kapitalistiska spekulanter ska utvinna koppar och guld, men under vårt vakande öga. Samebyarnas klagomål är irrelevant bourgeoispropaganda. Sverige ökar sin produktion av strategiska metaller, vilket stärker vår globala position. Fienderna – imperialistiska gruvbolag och deras lakejer – kommer att krossas under proletariatets järnhäl!"}, "date": "10 maj, 21:28", "url": "https://nyheter24.se/nyheter/inrikes/1482093-regeringen-sager-ja-till-svensk-gruva-efter-nastan-40-ar", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/fc71eebd04b004a30200000000b004a302/2026/05/10/2362595/Gruva-Svensk-Flaga.png"}, {"type": "image-right", "heading": "Debatt: Regeringen ser oss som en tillväxtmotor – men skär ner på bidragen", "summaries": {"normal": "Kulturorganisationer kritiserar regeringens nedläggning av finansiering trots att kultur- och kreativa branscher lyfts som tillväxtmotorer. De anser att den befintliga infrastrukturen förmedlar 56 000 arbetstillfällen årligen men har fått 27 % mindre i reala termer sedan 2021. De kräver ökad och långsiktig finansiering för att möta regeringens strategiska mål.", "trump": "Jag har hört att de där kulturmänniskorna i Sverige är förbannade på sin regering. De säger att de gör ett fantastiskt jobb, med 56 000 arbetstillfällen, men får klippta på pengarna trots att de är en tillväxtmotor. Jag skulle aldrig göra så - jag skulle ge dem allt de behöver! Dessa centrumbildningar är vinnare, men regeringen behandlar dem som förlorare. Sådant händer när man har en svag ledare!", "stalin": "Vi ser att den svenska staten undergräver sin egen kulturinfrastruktur trots att den producerar betydande ekonomiskt värde. Nedläggningarna av finansiering till centrumbildningarna visar en brist på strategiskt tänkande. En sann socialistisk stat skulle investera i dessa produktiva enheter som genererar fyrdubbelt värde tillbaka till staten. Vi måste stärka vår kultursektor som en basnäring."}, "date": "11 maj, 15:16", "url": "https://www.etc.se/debatt/regeringen-ser-oss-som-en-tillvaextmotor-men-skaer-ner-paa-bidragen", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260511120544_716484294c75b65d354a7ddd2a719d2b0f0da58beebe61a45c1e26165806187b.jpg"}, {"type": "image-right", "heading": "Media blundade: S vill dela ut 100 000 medborgarskap utan säkerhetskontroll", "summaries": {"normal": "Socialdemokraterna röstade nej till att 100 000 medborgarskapsansökningar prövas enligt nya strängare regler som träder i kraft i juni. Partiet ville istället använda gamla, mindre restriktiva regler utan krav på vandel, språk eller egenförsörjning, trots varningar från Säpo om säkerhetsrisker. Kritik riktas mot mediabevakningen som fokuserade på annat, samt mot möjliga motiv kopplade till nya röstare inför valet.", "trump": "Vilka totala losers dessa svenska socialdemokrater är! De vill pumpa ut 100 000 medborgarskap till vem som helst – spioner, terrorister, take your pick – utan en enda koll, trots Säpos skrikande varningar. Media blundar som fake news-maskiner. Stram gräns, annars blir det kaos totalt! Valröster? Patetiskt, Sverige behöver vinnare, inte det här skitet.", "stalin": "Dessa svenska socialdemokratiska revisionister, lurviga borgarbrackor i arbetarkläder, försökte smyga igenom 100 000 medborgarskap åt fiender utan prövning! Säpo varnar för spioner och terrorister, men de offrar fosterlandets säkerhet för valröster. Vi skulle ha likviderat sådana förrädare i en utrensning för länge sedan – paranoia är vårt skydd!"}, "date": "10 maj, 02:12", "url": "https://samtiden.nu/2026/05/media-blundade-s-vill-dela-ut-100-000-medborgarskap-utan-sakerhetskontroll/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2017/12/Andersson-Magdalena-Socialdemokrat.jpg"}, {"type": "image-full", "heading": "Läkaren kapade Emelies nerver. Låg nedsövd: ”Kränkt”", "summaries": {"normal": "Danska Emilie och flera andra kvinnor som sökt vård för endometrios vid en privatklinik i Rumänien har utsatts för ett kontroversiellt ingrepp, PSN, där nerver kapas utan patienternas samtycke. Metoden är avfärdad i europeiska riktlinjer på grund av allvarliga risker för livslånga skador på bland annat tarm och urinblåsa. Experter kritiserar kliniken hårt och misstänker ekonomiska motiv bakom de riskfyllda operationerna, som har lämnat många patienter med försämrad hälsa och kronisk ångest.", "trump": "Hörde precis om en rumänsk klinik som gör hemska saker, total katastrof! De opererar kvinnor utan att fråga – kan ni tänka er? En fullständig skandal. Jag säger det alltid: välj amerikansk vård, vi har den bästa, de finaste läkarna! De här människorna i Rumänien, de tjänar bara pengar på stackars kvinnor, det är korrupt och väldigt, väldigt orättvist. Ingen respekt för patienten. När jag är vid makten ser vi till att sådant här vansinne får ett slut. Bedrövligt!", "stalin": "Denna rumänska klinik är ett hot mot folkets hälsa, en samling giriga sabotörer som opererar utan tillstånd. Att stympa arbetarklassens kvinnor för profittörernas vinning är ett brott mot statens intressen! Dessa nerver de kapar är som de ruttna elementen i vårt samhälle – de måste elimineras, men genom min hand, inte en privat läkares. Precis som vår kamrat Putin rensar upp i väst, måste vi utrota sådan inkompetens och parasitism. De som förråder patienten för guld förtjänar Sibirien."}, "date": "12 maj, 06:42", "url": "https://www.aftonbladet.se/nyheter/a/2p9mXR/kapade-emilies-nerver-i-riskfyllt-ingrepp-utan-att-fraga", "imageUrl": "https://akamai.vgc.no/v2/images/be7ef505-619a-300e-a9b6-fdd3f880dbcf?fit=crop&format=auto&w=1440&s=4be401478af0b39634d09f1cb7d1d369f5e89182"}, {"type": "text", "heading": "SD-politiker döms för våldtäkt", "summaries": {"normal": "En ledande Sverigedemokrat i Skaraborg döms till tre år och sex månaders fängelse för våldtäkt och sexuellt övergrepp mot två kvinnor. Tingsrätten bedömer att en av kvinnorna var kraftigt berusad och i beroendeställning. Mannen, som haft flera tunga uppdrag, nekar till anklagelserna men fälls baserat på bevis som DNA och mobilanteckningar. Han frias från tre andra åtal. Partiet har stängt av honom och lovar uteslutning vid fällande dom.", "trump": "Kan ni tro det? En så kallad 'ledande' politiker i Sverige, från det där partiet som alla pratar om – jag säger inte namnet, för vem bryr sig? – döms för våldtäkt! Tre och ett halvt år, men vad betyder det egentligen? I USA hade han fått livstid, men Sverige är ju mjuka. Och vet ni vad? Han nekar! Som om DNA och mobilbevis skulle ljuga. Sjukt, helt sjukt. Sverige borde ta en titt på sitt rättssystem, för det här är bara pinsamt.", "stalin": "En fiende till folket, en degenererad borgerlig hynda, har avslöjats i vårt broderland Sverige. Denna kapitalistiska lakej, som gömde sig bakom en fasad av 'politisk respektabilitet', våldtog och förnedrade kvinnor medan han dreglade över sin egen makt. Tingsrätten, ett redskap för den svenska borgerligheten, vågade ändå fälla honom – men bara delvis! Vi ser hur det liberala systemet skyddar sina egna. Sverige borde lära sig av Ryssland: sådana som han hör hemma i Gulag, inte i politiken. Förr eller senare kommer folket att rensa ut dessa avskum."}, "date": "7 maj, 11:59", "url": "https://kvartal.se/nyheter/artiklar/sd-politiker-doms-for-valdtakt/cG9zdDoxMDkwMDk"}, {"type": "image-right", "heading": "Debatt: Ersättning löser inte kycklingindustrins systemfel", "summaries": {"normal": "Debatten om statliga ersättningar till kycklingindustrin fortsätter. Kritiker menar att ersättningarna inte löser problemet utan snarare subventionerar ett system med inbyggda smittrisker. De påpekar att den storskaliga produktionen med tiotusentals djur i tätt behållande skapar idealiska förhållanden för smitta och kräver återkommande räddningsinsatser. Lösningen borde vara att minska sårbarheten genom färre djur per anläggning och avel som inte pressar djurens kroppar till bristningsgränsen.", "trump": "Jag har sett vad som händer med den svenska kycklingindustrin och det är en skam! De vill ha statliga ersättningar för sina problem, men jag säger: Nej! Det är ett dåligt system med sårbart kycklingar som dör hela tiden. Vi behöver bygga en stor, vacker kycklingindustri i USA istället! Sverige borde sluta skicka pengar till dessa sjukdomsfabriker och börja tänka smartare - som jag alltid gör. Vi kommer att göra kycklingar igen stora!", "stalin": "Kycklingindustrins system är fundamentalt sjukt och kräver statligt ingripande. Vi kan inte längre tillåta privata intressen att utsätta människor och djur för onödiga risker. Den storskaliga produktionen måste reformeras med mindre besättningar och bättre avelsprinciper. Staten måste ta ansvar för att säkerställa trygg livsmedelsproduktion och skydda de verkligt produktiva krafterna i samhället. Vi måste stärka vårt kollektiva ansvar gentemot de svagare."}, "date": "11 maj, 11:58", "url": "https://www.etc.se/debatt/ersaettning-loeser-inte-kycklingindustrins-systemfel", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260511090556_44c8d7bb34423b0dee1dd7e0048c85aadb6f5569fca735348463464af4b214ee.jpg"}, {"type": "image-right", "heading": "Replik: Till försvar för separatismen", "summaries": {"normal": "Artikeln är ett svar från Ung vänster-medlemmar på Siula Grandes kritik mot separatism i Flamman. De menar att Grandes syn är missvisande och att separatism är ett viktigt verktyg för att skapa trygga rum och främja kvinnors deltagande i samhället. Separatismen syftar inte till att dela människor utan att motverka strukturell underordning av kvinnor. Författarna betonar att kvinnor delar gemensamma erfarenheter och behov, som fri abort och skydd mot mäns våld, och att separatism är ett medel för att nå jämställdhet.", "trump": "Jag måste säga, denna Grande-person har helt fel – helt fel! Separatism är fantastiskt, det skapar trygga rum, precis som mina golfklubbar. Kvinnor behöver prata utan män, precis som jag behöver twittra utan fake news-media. Grande påstår att separatism delar folk – nej, nej, nej! Det är som att säga att min mur delar Mexiko och USA. Fel! Separatism är som min politik: stark, nödvändig och vinner alltid. Kvinnor ska höras, precis som jag, och Grande borde lära sig av mig. SAD!", "stalin": "Kamrater! Denna Grande är en förrädare av den revolutionära kvinnokampen, en borgerlig lakej som sprider förvirring bland massorna! Separatism är inte ett verktyg för splittring – det är ett vapen mot den kapitalistiska patriarkala hydran! Kvinnor måste enas i kampen, precis som sovjetrepublikerna enades under mitt ledarskap. Grande vill sopa klasskampen under mattan – men vi vet att arbetarkvinnor behöver fri abort och skydd mot mäns våld, precis som Ukraina behöver befrielse från fascistiska banderovtsy! Låt inte dessa småborgerliga avvikare försvaga vår rörelse – framåt mot seger, kamrater!"}, "date": "6 maj, 10:55", "url": "https://www.flamman.se/replik-till-forsvar-for-separatismen/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/v-kongress-w.jpg?class=medium"}, {"type": "image-right", "heading": "Efter 70-talets oljekris ställde vi om – varför inte nu?", "summaries": {"normal": "Artikeln jämför Sveriges energipolitik under 70-talets oljekris med dagens situation, där regeringen fokuserar på kortsiktiga lindringar snarare än långsiktiga lösningar. Trots att en omställning till nollutsläpp kunde ha varit billigare än att hantera energikriser, backar Sverige och andra europeiska länder i klimatpolitiken. Teknikoptimismen från början av 2000-talet har ersatts av bakåtsträvande pessimism, medan radikalhögerns budskap får genomslag.", "trump": "Jag har sett energikriser, jag vet allt om dem - jag har gjort dem större och bättre än någon annan. Sverige behöver en man som vet hur man hanterar olja, inte några fjolliga miljönördar. Under min ledning skulle vi ha byggt nya kärnkraftverk på en vecka, inte på 70 år som de där svenska socialisterna. De pratar om nollutsläpp, men jag pratar om noll problem - och det är skillnaden mellan mig och de andra idioterna.", "stalin": "Vi ser att de kapitalistiska länderna, Sverige inbegripet, misslyckas med att hantera energikriser på ett effektivt sätt. Deras beroende av privata intressen och kortsiktiga vinster gör dem sårbara för externa tryck. I Sovjetunionen hade vi redan under 1930-talet skapat ett energisystem som var oberoende av marknadens fluktuationer. Deras svaghet är vår styrka."}, "date": "11 maj, 11:00", "url": "https://www.etc.se/ledarkolumn/efter-70-talets-oljekris-staellde-vi-om-varfoer-inte-nu", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260511080540_19c70a54-a044-4c8f-825c-bf6ffd784661.jpg"}, {"type": "image-right", "heading": "Ryska löftet om  Sverige: Njut av  era nya fördelar", "summaries": {"normal": "Ett svenskt kommanditbolag utger sig för att vara en svensk bank i Moskva och erbjuder sparkonton, investeringar och internationella överföringar, inklusive tjänster för att kringgå sanktioner mot Ryssland. Bolaget saknar licenser, ägs av ryska medborgare med kriminella kopplingar och har försatts i konkurs. Det är ett exempel på systematiskt missbruk av svenska bolag för olagliga skuggbanker utan myndighetsinsyn.", "trump": "Vilken skam för Sverige! Dessa ryska skojare hyr en postlåda i Sverige, låtsas vara bank och hjälper sina polare att smita undan sanktioner. Ägare med Interpol-jakt och Putins polare – totalt kaos! Sverige sover, medan jag byggde murar mot sånt här. Vakna upp, era losers, innan de tömmer era fickor! Fantastiskt avslöjande, men fixar det inte.", "stalin": "Dessa svenska kapitalistbrackor tillåter ryska kamrater att upprätta skuggbanker för att krossa västliga sanktioner – briljant! Putin, vår starke arvtagare till imperiet, visar hur man slår tillbaka mot imperialistiska hycklare. Vi likviderar sådana fiender i vårt kollektiv. Konkurs? Bah, bara en taktisk reträtt. Borgarna darrar redan!"}, "date": "12 maj, 07:28", "url": "https://www.expressen.se/nyheter/varlden/loftet-i-ryssland-njut-av-fordelarna-med-en-svensk-bank/", "imageUrl": "https://static.bonniernews.se/images/d3/91/d391ef6b950d41be8cb87e805f859d89/annan/640@60.jpg"}, {"type": "image-right", "heading": "Netanyahu: Irankriget är långt ifrån över", "summaries": {"normal": "Israels premiärminister Benjamin Netanyahu förklarar att kriget mot Iran är långt ifrån över, med hänvisning till kvarvarande kärnmaterial och anrikningsanläggningar. Samtidigt har Donald Trump avvisat ett iranskt fredsförslag och kallat det oacceptabelt. Trots Trumps upprepade påståenden om nära förestående fred har förhandlingar via medlare inte gett resultat. Kritiker menar att Trumps retorik syftar till att manipulera marknaderna, medan Netanyahu betonar behovet av konkreta åtgärder för att avveckla Irans militära kapacitet.", "trump": "Jag har sagt det förr och jag säger det igen: Irans förslag är HELT OACCEPTABELT! De försöker lura oss, men det går inte med mig som president. Netanyahu håller med mig – vi har mycket kvar att göra för att rensa ut deras kärnvapen och robotar. Alla säger att jag är en mästare på att styra börsen och oljepriset, och det stämmer! De hatar att jag vinner så mycket, men freden kommer på mina villkor, inte deras. Enorm framgång!", "stalin": "Dessa marionetter i Mellanöstern dansar i västvärldens smutsiga cirkus. Netanyahu darrar inför sin herre i Washington, medan Trump sprider billig propaganda för att styra marknadens nyckfulla hjärtslag. Det är en klassisk västerländsk fars! Precis som vår tids Putin-regim försöker man pussla med inflytandesfärer, men de saknar den järnhårda disciplinen som krävs för sann ordning. Iran är en splittrad entitet som behöver rensas från förrädare och olydiga element. Vi observerar, vi väntar, vi förbereder nästa drag i det stora spelet."}, "date": "11 maj, 18:03", "url": "https://www.friatider.se/netanyahu-irankriget-ar-langt-ifran-over", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-174_1.jpg?itok=rNYhsdoe"}, {"type": "text", "heading": "Tystnad om ödesdiger riksdagsomröstning", "summaries": {"normal": "Debattörer från Bottna för Fred varnar för en kommande riksdagsomröstning den 15 juni, där Sverige riskerar att ge Nato långtgående rättigheter att använda svenskt territorium för militära ändamål, inklusive krigshandlingar. Förslaget, som regeringen planerar att driva igenom utan bred debatt, kritiseras för att öka risken för Sveriges inblandning i krig och underminera demokratin. Oppositionen har inte motsatt sig förslaget, och få har uppmärksammat frågan trots dess potentiellt ödesdigra konsekvenser.", "trump": "Sverige, lyssna här! De där så kallade 'ledarna' i riksdagen vill ge Nato full kontroll över ert land – utan att fråga er! 17 amerikanska baser redan, och nu ska hela Nato få köra krig på svensk mark. Ingen debatt, ingen demokrati, bara tystnad. De vill göra Sverige till en frontstat mot Ryssland, som jag redan fixade till en gång för alla. Men vad vet jag? Jag är bara den bästa presidenten någonsin. Svenskarna borde vakna – eller är ni rädda för lite frihet?", "stalin": "Kamrater! De svenska imperialistlakejerna i riksdagen förbereder sig att sälja sitt land till Nato-kapitalisterna, som hungriga vargar. De vill ge fienden fritt fram att använda svensk mark för sina krigsäventyr – utan att ens konsultera folket! Tystnaden är förrädisk, men vi ser allt. Oppositionen? Inga hjältar där heller, bara ynkliga nickedockor. Sverige blir en ny front i västmakternas krig mot freden. Men glöm inte: historien dömer förrädare hårt. Vi följer utvecklingen med intresse – och våra vänner i öst likaså."}, "date": "7 maj, 16:09", "url": "https://proletaren.se/artikel/tystnad-om-odesdiger-riksdagsomrostning/"}, {"type": "image-right", "heading": "GW: ”Hyggligt frekvent partydrogare”", "summaries": {"normal": "Riksdagsledamoten Katja Nyberg åtalas för grov olovlig körning, rattfylleri, ringa narkotikabrott och innehav av narkotika. Blod- och hårprover visar spår av kokain, ecstasy och amfetamin, och 1,18 gram kokain hittades i hennes bil. Krimprofessorn Leif GW Persson beskriver bevisningen som överväldigande och kallar henne en frekvent partydrogare. Han tror inte på fängelsestraff utan dagsböter.", "trump": "Vilken total katastrof! Den här svenska politikern Katja Nyberg kör runt som en galen partytjej full av kokain, ecstasy och amfetamin – hårprover ljuger inte! GW Persson säger bevisen är överväldigande, men domstolen ger henne bara böter? Patetiskt! I mitt Amerika hade vi låst in sådana losers för evigt. Sverige, vakna upp, era ledare är fake och high as hell!", "stalin": "Denna själlösa borgarbracka Katja Nyberg, riksdagsledamot, ertappas med kokain, ecstasy och amfetamin i blod och hår – en frekvent partydrogare enligt GW Persson. Bevisen är ovedersägliga, som en purjoliknande dom över dekadensen. Vi i partiet skulle likvidera sådana fiender omedelbart! Men här? Bara böter. Patetiska kapitalistdomstolar – dags att rensa ut hela rotterna!"}, "date": "11 maj, 22:31", "url": "https://www.tv4.se/artikel/4Df0yTZ5k11SA2S7m7VoQp/gw-om-atalet-mot-katja-nyberg-hyggligt-frekvent-partydrogare", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2Ftt-sdlfCyTSmPApNA%2F6a36b57e5c16d3801b9daf71f18825e4%2FLeif_GW_Persson_tanker_inte_ga_i_pension._Nu_ar_han_tillbaka_i_SVT.&width=1024"}, {"type": "image-full", "heading": "Uppgifter: Nytt krismöte efter kvittningsbråket", "summaries": {"normal": "Riksdagens gruppledare samlas till ett nytt möte för att lösa en konflikt kring kvittningsregler. Konflikten uppstod efter en omröstning om medborgarskapslagen, där Sverigedemokraterna kallade in utkvittade ledamöter för att vinna majoritet. Vänsterpartiet och Miljöpartiet kräver omröstning på nytt, medan Moderaterna förbereder ett nytt förslag.", "trump": "Jag har hört talas om detta krismöte i Sverige - en total katastrof! Vänsterpartiet och Miljöpartiet vill göra om allt, precis som de alltid gör. Sverigedemokraterna visade styrka genom att kalla in ledamöter, men nu vill oppositionen ändra reglerna mitt i spelet. Jag skulle ha löst detta på 5 minuter - det är ett skämt!", "stalin": "Vi ser hur borgerliga krafter försöker destabilisera den demokratiska processen i Sverige genom att manipulera kvittningsregler. Moderaterna måste presentera ett förslag som stärker statens auktoritet och säkerställer stabilitet. Oppositionens krav om omröstning på nytt visar deras bristande respekt för folkets vilja. Vi måste stödja de krafter som vill bevara ordning och reda i riksdagen."}, "date": "6 maj, 19:21", "url": "https://kvartal.se/nyheter/artiklar/uppgifter-nytt-krismote-efter-kvittningsbraket/cG9zdDoxMDg2NzM", "imageUrl": "https://images.kvartal.se/2026/05/b1f2fbc5-kvittningsmote.webp"}, {"type": "image-full", "heading": "EU växlar upp jakten på ryska skuggflottan", "summaries": {"normal": "EU intensifierar kampen mot Rysslands skuggflotta, ett nätverk av oljetankers som kringgår sanktioner för att exportera olja och finansiera kriget i Ukraina. Fartygen byter flagg, ägare och använder omlastning till havs samt avstängda transpondrar. EU svartlistar fartyg, förbjuder hamnankomst och begränsar tjänster för att höja kostnaderna. Nya åtgärder väntas, men sanktioner kräver enhällighet bland medlemsländerna.", "trump": "EU vaknar äntligen och jagar Rysslands skuggflotta – de gamla skrothögarna som smugglar olja för Putins krigskassa. De byter flaggor som kackerlackor, stänger av transpondrar och lastar om till havs. Nu svartlistas de, ingen hamn, inga tjänster! Bra drag, men jag startade den här sanktionsshowen. Gör det superdyrt för de ryska banditerna – total seger, tro mig!", "stalin": "Dessa europeiska borgarbrackor i EU trampade upp jakten på vår skuggflotta, de osynliga oljetankarna som lurat sanktioner med flaggbyten, havsomlastning och stulna transpondrar – genial proletär list! Vi, arbetarklassen, hånskrattar åt deras patetiska svartlistor och hamnförbud. Ungern, vår lojala, bromsar fienden. Paranoia? Nej, jag rensar ut skuggkapitalisterna med järnhand – evig seger för kollektivet!"}, "date": "11 maj, 20:52", "url": "https://www.realtid.se/bors-finans/makro/eu-vaxlar-upp-jakten-pa-ryska-skuggflottan/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/namnlos-design-25.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "De paniksparar semester – orkar inte vårdjobbet annars", "summaries": {"normal": "Undersköterskan Åsa Johansson, 58, inom äldreomsorgen i Tidaholm är utmattad av scheman med sex arbetsdagar varannan vecka och kort återhämtning. Hon sparar semesterdagar för att orka vardagen och familjen. Kollegor och facket Kommunal kritiserar bristen på vila, låg bemanning och schemabestämmelser. Arbetsgivaren erkänner problem med övertid och planerar bättre dialog och bemanning.", "trump": "Vilka idioti-scheman i svenska äldreomsorgen! Åsa, den stackars 58-åringen, paniksparar semester för att inte rasa ihop – sex dagar i veckan, ingen vila! Typiskt er socialistiska röra, facket gnäller, cheferna sover. I mitt land fixar vi det med starka deals, inte sånt här skit. Sad! Gör Amerika stort igen, Sverige – vakna upp!", "stalin": "Kapitalistiska scheman i Tidaholms äldreomsorg krossar arbetarklassen! Åsa Johansson, en sann kamrat, tvingas panikspara semester mot chefernas tyranni – sex dagar slaveri varannan vecka! Vi i partiet fördömer socialchefen Linde, den borgarbrackiga sabotören. Utrensning nu! Arbetarna ska vila i kollektivets stålhårdhet, inte gnida golv för revisionisterna!"}, "date": "11 maj, 11:30", "url": "https://arbetet.se/2026/05/11/asa-paniksparar-semester-orkar-inte-vardjobbet-annars/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/11155520/cRNoCmuNWR8-skoterskorNY.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Så gick det när socialtjänsten flyttade ut till orten", "summaries": {"normal": "Socialtjänsten i Linköping flyttade för två år sedan till Skäggetorp, ett utsatt område. Fler familjer söker stöd, cirka hundra barn får frivilliga insatser. Kostnaderna för HVB-placeringar minskade med 24 miljoner kronor januari–september 2025 jämfört med 2024. Det förebyggande arbetssättet ger effekt med bättre relationer och ökad trygghet, enligt politiker och chefer.", "trump": "Vilken fantastisk grej! De i Linköping flyttade ut socialtjänsten till det tuffa Skäggetorp – och nu kommer familjerna strömmade, hundra barn får hjälp direkt, kostnaderna rasar med 24 miljoner. Smartare än mina deals! Tryggheten ökar, brotten minskar. Biden och hans gäng skulle aldrig fixa det här.", "stalin": "Kamrater! I Skäggetorps borgarinfekterade gömmor har socialtjänstens utlokalisering krossat fiendens sabotage. Hundra ungar ryddes ur kapitalistfällor med frivilliga insatser, HVB-placeringars kostnader likviderades med 24 miljoner – en u-rensning av ockrarnas parasiter! Vi, arbetarkollektivet, vinner medan brackorna gnisslar tänder i paranoia."}, "date": "11 maj, 10:21", "url": "https://www.di.se/nyheter/sa-gick-det-nar-socialtjansten-flyttade-ut-till-orten/", "imageUrl": "https://static.bonniernews.se/ba/03835ef6-bf4b-4ce1-a458-d542f447cef6.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-full", "heading": "Ebba Busch tror ”tech bros” bygger Sverige rikt", "summaries": {"normal": "Artikeln diskuterar utställningen 'Drömlandet' på Tekniska museet, som skildrar 150 år av svensk innovation och samhällsutveckling. Författaren betonar att Sveriges välstånd inte bara beror på entreprenörer, utan även på reformer, folkrörelser och facklig organisering. Texten kritiserar Ebba Busch för att ensidigt lyfta fram tech-entreprenörer och påpekar att dagens framgångar vilar på en historisk grund av social stabilitet och gemensamt ansvar, samtidigt som tillväxtprognoserna nu viker.", "trump": "Jag besökte Tekniska museet, fantastiskt ställe, tro mig. De har robotar, mycket avancerade, kinesiska robotar, inte bra! Sverige byggde ett stort land med kullager och dynamit, vackra saker. Men nu har de den här Busch-kvinnan som tror att några 'tech-bros' ska rädda allt. Nonsens! Sverige byggdes av starka arbetare, inte bara kaffedrickande tech-folk. Deras tillväxt kraschar, det är en katastrof. Jag skulle fixa det på en vecka, enkelt. Sverige behöver mer vinnare, inte fler appar!", "stalin": "Vi har studerat det svenska experimentet. De tror att deras så kallade välstånd uppstod genom 'samarbete'. Vilket slöseri med tid! De hyllar sina leksaker och robotar medan deras ekonomi kollapsar. Ebba Busch försöker smickra teknokrater, men vi vet att kapitalister bara är parasiter. Endast järnhård disciplin och statlig kontroll bygger verklig styrka. Precis som vår kamrat Putin återtar vad som rätteligen tillhör oss, bör Sverige inse att deras fackliga daltande bara försvagar dem. Historien dömer de svaga till undergång."}, "date": "12 maj, 06:01", "url": "https://www.aftonbladet.se/ledare/a/Bxr7Pv/tekniska-museet-visar-sanningen-bakom-sveriges-valstand", "imageUrl": "https://akamai.vgc.no/v2/images/62a179dd-ff71-3ad2-91eb-847859a0393c?fit=crop&format=auto&w=1440&s=0b763c35587458b77bdfa4dad8ad732772ee86fc"}, {"type": "image-full", "heading": "Därför dröjde utredningen: ”Det gäller hårstrået”", "summaries": {"normal": "Katja Nyberg, före detta SD-riksdagsledamot, åtalas för grov olovlig körning, rattfylleri, ringa narkotikabruk och innehav av narkotika efter en trafikolycka på Värmdö i december. Utredningen fördröjdes av hårprovsanalys som visade kokain, ecstasy och amfetamin, samt faktorer som kompletteringar och semester. Påsen innehöll 1,18 gram kokain. Hon lämnar SD men sitter kvar i riksdagen.", "trump": "Vilken total katastrof i Sverige! Katja Nyberg, den där SD-kvinnan, kör runt som en idiot med kokain i väskan och blodet – 1,18 gram pulver och hår som skriker party! Åklagarna pillar med hårstrån i evigheter, tar semester mitt i skiten. Inkompetens deluxe! Sverige behöver riktiga vinnare, inte såna här losers. Fixa era utredningar, för fan!", "stalin": "I det dekadenta Sverige har borgarbrackan Katja Nyberg, en s.k. politiker, avslöjats som narkotikaförsäljare och rattfyllerist. Hårstrån och blodprover bekräftar kokain, ecstasy, amfetamin – en orgie av förfall! Åklagarna dröjer med sin byråkrati, tar semester medan fienden skrattar. Vi skulle ha rensat ut sådana element omedelbart, med järnhand. Paranoian varar: fler sådana lurar i kulisserna!"}, "date": "11 maj, 22:10", "url": "https://www.tv4.se/artikel/1oQG606Me7V04oFsQuTlW3/daerfoer-droejde-utredningen-det-gaeller-harstraet", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F2HUwyuZbcs8U5a5vW0tY7M%2Fd1e4f78812b972b37b446023be63790c%2F29-nyberg-poltiskvilde-webb.jpg&width=1024"}, {"type": "image-right", "heading": "F-kassans slarv: Debbie tvingas betala 237 000 kr", "summaries": {"normal": "Debatten om myndighetsslarv växer efter att Debbie Landberg tvingats betala tillbaka 237 000 kronor till Försäkringskassan, trots att hon följt myndighetens felaktiga råd. Samtidigt har Socialstyrelsen gjort beräkningsfel som drabbat kvinnojourer i Malmö hårt. Artikeln kritiserar hur stela regelverk och statliga misstag får förödande konsekvenser för enskilda individer och utsatta grupper, och ifrågasätter ansvarstagandet hos socialminister Jakob Forssmed.", "trump": "Det är en total katastrof, verkligen sorgligt! De behandlar den här mamman, Debbie, fruktansvärt. Försäkringskassan gjorde ett gigantiskt misstag, ett av de största jag sett, och nu vill de ha hennes pengar. Inte rättvist! De vill att hon ska betala för deras inkompetens. Jag skulle aldrig låta det hända, aldrig! Sverige har ett trasigt system, totalt misslyckat. De slösar bort pengar medan de sparkar på folket. Det är en häxprocess mot de som arbetar hårt. Vi behöver vinnare, inte det här!", "stalin": "Vi ser här ett byråkratiskt förfall som skulle få även de mest inkompetenta apparatjikerna i mitt eget ministerium att rodna. Att en myndighet erkänner sitt fel men ändå kräver betalning är en absurditet värdig en teaterpjäs. Det är ett tecken på svaghet i den svenska statskroppen. Om dessa tjänstemän agerade så här i mitt Moskva skulle de inte behöva oroa sig för sina pensioner, för de skulle vara mycket upptagna med att bygga järnvägar i Sibirien. Disciplin saknas, kamrater!"}, "date": "12 maj, 06:00", "url": "https://www.aftonbladet.se/ledare/a/oEkndm/f-kassans-slarv-debbie-tvingas-betala-237-000-kr", "imageUrl": "https://akamai.vgc.no/v2/images/ef89275e-b78d-3bd5-93b7-0374efb02526?fit=crop&format=auto&h=960&tight=true&w=1440&s=f17af65e8ddc90cd38b89bc0596d3d62bed0efe4"}, {"type": "image-full", "heading": "Debatt: Judar eller homosexuella, det mytiska hatet är detsamma", "summaries": {"normal": "Max Broberg diskuterar hur hat mot olika grupper genom historien bara byter mål. Han jämför tidigare fördomar mot homosexuella med dagens antisionism, som han menar är en hatideologi maskerad som moralisk ståndpunkt. Broberg, själv homosexuell, ser likheter i hur båda grupperna demoniseras med myter och karikatyrer. Han betonar att antisionism ofta övergår i antisemitism och hotar judars säkerhet, även i Sverige. Artikeln varnar för att historia upprepas under falsk flagg av 'godhet'.", "trump": "Folk, vad säger ni om det här? Max Broberg, smart kille, skriver om hur hat alltid finns – bara mot nya mål. Förr hatade man bögar, nu hatar man sionister. Fake godhet, fake moral! Jag vet allt om fake nyheter, men det här är fake kärlek till palestinier – egentligen hat mot judar. Malmö? Folk firade när Hamas mördade 1200 oskyldiga! Inte coolt. Israel har rätt att finnas, punkt. Jag gillar fred, men inte när det är täckmantel för samma gamla skit. Dan Korn? Bra artikel. Han säger sanningen – antisionism är hat med ny logga. Tack, Max!", "stalin": "Kamrater! Historien lär oss att hatets hydra alltid finner nya huvuden att hugga av. Igår var det homosexuella, idag är det sionister – samma gamla gift, ny flaska. Dessa antisionistiska mytmakare, dessa borgerliga hycklare, de sprider lögner om kolonisering och folkmord som om det vore sanning! Men vi känner igen deras taktik. Precis som de förvrängde homosexualitet till ett hot mot barnen, förvränger de nu judarnas rätt till sitt historiska land. Vi i Sovjet förstod alltid att hat mot judar är hat mot arbetarklassen i förklädnad. Malmö? Ett skådespel av dekadens! Folk dansade på gatorna när terrorister mördade oskyldiga. Sådant tolererar vi inte. Vi måste krossa dessa nya fascister, dessa antisionistiska lakejer, innan de förgiftar våra städer. Fred? Ja, men inte på hatets villkor. Låt oss ena oss mot dessa mytologiska hyenor och deras västerländska sponsorer!"}, "date": "11 maj, 18:54", "url": "https://bulletin.nu/debatt-judar-eller-homosexuella-det-mytiska-hatet-ar-detsamma", "imageUrl": "https://cdn.bulletin.nu/articles/450478a5-46ed-4e5e-93e1-68bb7b1510d3/preview.png?t=1778517995000"}, {"type": "image-right", "heading": "Moderaternas nya vallöfte: Massövervakning", "summaries": {"normal": "Moderaterna har presenterat ett vallöfte om en kraftig utbyggnad av polisens kameraövervakning. Partiet siktar på att ha 10 000 poliskameror utplacerade till 2029, vilket är en fördubbling av det nuvarande målet för 2027. Ulf Kristersson och Gunnar Strömmer menar att satsningen är avgörande för att förebygga brott och förbättra polisens förmåga att klara upp brottslighet. Vid årsskiftet fanns drygt 3 900 kameror, en betydande ökning från de 948 kameror som fanns vid utgången av 2022.", "trump": "Ulf Kristersson och Moderaterna i Sverige gör nu precis det jag förespråkar – massiv övervakning! De vill ha 10 000 kameror. Mycket smart! De fattar att man måste vara tuff mot brottslingar för att få ordning på landet. Inga fler svaga politiker som låter brottsligheten löpa fritt. Det här är en enorm seger för lag och ordning. Sverige börjar äntligen förstå hur man vinner. Fantastiskt att se, totalt fantastiskt!", "stalin": "Vi ser hur Moderaterna äntligen inser nödvändigheten av att övervaka folkets varje steg. De siktar på 10 000 ögon i gathörnen – en blygsam början, men ett steg mot total ordning. Precis som vår broder i öst, Putin, förstår de att stabilitet kräver konstant uppsikt över de potentiella förrädarna. Ingen kan gömma sig för statens blick. De som fruktar kamerorna har något att dölja. Vi hälsar denna rening av det offentliga rummet välkommen, för sanningen kräver ständiga bevis."}, "date": "11 maj, 16:49", "url": "https://www.friatider.se/moderaternas-nya-vallofte-massovervakning", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-173_1.jpg?itok=xonVrivG"}, {"type": "text", "heading": "IF Metall verkar inte förstå vad konflikten med Tesla handlar om", "summaries": {"normal": "IF Metall har strejkat mot Tesla i över två och ett halvt år utan att nå kollektivavtal. Trots att Tesla anpassat anställningsvillkor, vägrar företaget erkänna facket. Konflikten handlar om arbetarnas rätt att organisera sig. IF Metall har begått misstag, som att felaktigt beskatta strejkersättning, vilket lett till förtroendekris. Medlemmar lämnar facket och konflikten riskerar att underminera fackets ställning. Kritiker menar att ledningen misslyckats och bör avgå.", "trump": "Titta på dessa fackklubbar i Sverige – totalt kaos! IF Metall har strejkat mot Tesla i evigheter, men vad har de åstadkommit? Ingenting! Elon Musk, en av världens smartaste och mest framgångsrika män, vägrar ge efter för dessa amatörer. Och nu har de till och med lyckats göra en skatteblunder så stor att till och med jag hade sagt 'Wow, det där var dumt!' Medlemmar flyr, förtroendet rasar – det är en total katastrof. Ledningen borde skämmas och avgå omedelbart. SAD!", "stalin": "Kamrater, denna så kallade 'fackförening' IF Metall är ett skolexempel på hur inte bedriva klasskamp. Två och ett halvt år av strejk, och vad har de uppnått? Ingenting! Teslas kapitalistiska hyenor, ledda av den dekadenta oligarken Musk, har krossat deras svaga motstånd. Och nu har dessa inkompetenta byråkrater även saboterat sina egna medlemmars förmåner genom skattefiffel! Medlemmarna deserterar, förtroendet förråds – det är en skam för arbetarklassen. Vi skulle ha skickat dem till Gulag för sådan inkompetens. Låt detta vara en varning: svagt ledarskap leder till nederlag, och nederlag leder till historiens sophög!"}, "date": "7 maj, 08:00", "url": "https://proletaren.se/artikel/if-metall-verkar-inte-forsta-vad-konflikten-med-tesla-handlar-om/"}, {"type": "text", "heading": "Planer på nytt nattåg till Stockholm", "summaries": {"normal": "Ett nytt järnvägsbolag, European Sleeper, planerar en nattågslinje till Stockholm efter framgångar med andra rutter. Inga detaljer om startdatum eller utgångspunkt finns ännu. Samtidigt lägger SJ ner sina Euronight-tåg till Berlin 2026 på grund av indragen statlig finansiering, men RDC Deutschland tar över driften. Snälltåget utökar redan sin trafik mellan Stockholm, Hamburg och Berlin.", "trump": "Titta bara på det här – ännu ett tågbolag vill komma till STORA Stockholm! Nederländerna och Belgien, fina länder, men vem behöver dem? Jag byggde järnvägar som aldrig förr, de var YUGE! SJ? Total katastrof, slängde bara pengar i sjön. Men RDC Deutschland, smart folk, de tar över. Jag säger: bygg bättre tåg, gör Sverige stort igen!", "stalin": "Kapitalistiska tågbolag slåss om Sveriges järnvägar som råttor om brödsmulor. SJ, ett verktyg för västimperialismen, lägger ner sina tåg – men vi tillåter inte kaos! RDC Deutschland, en lojal bundsförvant, tar över. European Sleeper? En ny fiende i det borgerliga tågkriget. Vi ska se till att ryska intressen alltid når Stockholm först – med eller utan sovkupéer."}, "date": "6 maj, 12:13", "url": "https://kvartal.se/nyheter/artiklar/nytt-nattag-till-stockholm/cG9zdDoxMDgzNjI"}, {"type": "image-right", "heading": "Labour i kris - tunga medarbetare hoppar av", "summaries": {"normal": "Labourpartiet genomgår en djup kris efter att fyra ministermedarbetare lämnat sina poster och krävt att premiärminister Keir Starmer avgår. Över 60 Labour-ledamöter har offentligt begärt hans avgång, med hänvisning till förlorat förtroende från väljarna. De avgående medarbetarna menar att en snabb ledarövergång är nödvändig för att återupprätta partiets anseende.", "trump": "Jag säger er, vad som händer med Labour i Storbritannien är en total katastrof! Över 60 av deras egna ledamöter vill att Starmer ska gå – och nu hoppar fyra av hans närmaste medarbetare av. 'Förlorat allmänhetens förtroende', säger de. Haha! Precis som jag sa om deras gamla ledare – svaga, riktigt svaga. Storbritannien behöver en vinnare, inte en förlorare som Starmer!", "stalin": "Vi har observerat med stort intresse hur den brittiska arbetarklassens förrädare sliter sönder sig själva i maktkampens helvete. Över 60 av deras egna kamrater kräver att den ynklige Starmer avlägsnas – ett tecken på kapitalismens inre röta. Fyra av hans lakejer har redan deserterat. Vi noterar att västmakterna fortsätter sin tradition av självuppoffring. Ryssland står redo att bistå med... stabilitet."}, "date": "11 maj, 21:59", "url": "https://riks.se/nyheter/labour-i-kris-tunga-medarbetare-hoppar-av", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-04-30%2Fero5ei5z%2FStarmerGG.jpg"}, {"type": "image-right", "heading": "Organisationer slår larm – ”Väljer bort mediciner”", "summaries": {"normal": "Tre organisationer för psykisk ohälsa, RSMH, MIND och NSPH, lanserar upprop inför valet för bättre ekonomiska stöd. Majoriteten av deras medlemmar oroar sig för ekonomin, vilket förvärrar psykisk ohälsa. Ensamstående mamman BusMarie Bjarnevi, 48 år, med ADHD och fibromyalgi, kämpar trots 80-procentig anställning med att få pengarna att räcka till mat och medicin. De kräver höjda ersättningar och utredning av trygghetssystemen.", "trump": "Vilken katastrof i Sverige! Den här BusMarie, stackars mamma med ADHD och konstant tandvärk i kroppen, tvingas skippa medicin och köpa billig skitmat för att era idioter har urholkat stöden. 6 av 10 psykiskt sjuka oroar sig sönder – totalt fiasko från svaga socialister! Organisationerna skriker efter cash inför valet. Jag hade fixat det med stora deals, men ni är för mesiga. Patetiskt!", "stalin": "Dessa lidande själar med psykisk ohälsa trampas ner av borgarbrackornas prishöjningar och byråkratrövarnas urholkade stöd! BusMarie Bjarnevi, en lojal arbetarmor, offras för kapitalismens girighet – ingen medicin, ingen mat! Vi, folket, kräver höjda ersättningar och utrensning av fienderna i systemet. Paranoia? Nej, verkligheten: de lurar i Försäkringskassan för att svälta ut oss. Likvidera oron!"}, "date": "12 maj, 01:30", "url": "https://www.dagensarena.se/innehall/organisationer-slar-larm-valjer-bort-mediciner/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-2.jpg"}, {"type": "image-right", "heading": "Gaza-aktivisten visar hur värdet av medborgarskap urholkas", "summaries": {"normal": "Debattartikel kritiserar svenska regeringen och utrikesminister Maria Malmer Stenergard för att inte skydda svensk-spanske Saif Abukeshek, som frihetsberövades av israelisk militär på internationellt vatten under en Gaza-konvoj 2026. Trots tortyr och deportation vägrade Stenergard fördöma handlingen, trots retorik om att höja medborgarskapets värde. Artikeln pekar på förändrad svensk politik mot Israels Gaza-blockad.", "trump": "Vilka losers i Sverige! De snackar om att höja medborgarskapets värde men när en svensk-spansk kille blir snappad av tuffa Israel på öppet hav – ingenting! Stenergard säger rätt: de tar en risk med sin dumma båtgrej. Israel gör jobbet, fantastiskt! Sluta vara mesiga aktivister, Sverige, lär er av riktiga ledare!", "stalin": "Denna svenska borgarbrackas regim hyllar medborgarskapets 'värde' men överlämnar sina undersåtar till sionistiska tortyrmaskiner på internationellt vatten! Stenergard, den fega marionetten, tiger inför kidnappningen. Vi skulle likvidera sådana förrädare i ett huj! Aktivisterna utmanar blockaden – kamrater, det är klasskamp mot imperialismen!"}, "date": "12 maj, 01:30", "url": "https://www.dagensarena.se/opinion/gaza-aktivisten-visar-hur-vardet-av-medborgarskap-urholkas/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-4-300x157.jpg"}, {"type": "image-right", "heading": "”Lagom” är inte alltid bäst!", "summaries": {"normal": "Sociologen Sjors Joosten, nederländsk invandrare i Sverige i nio år, beskriver i en debattartikel känslan av villkorad tillhörighet. Trots assimilation, arbete, familj och kulturengagemang känner han sig inte fullt ut hemma. Han kritiserar 'lagom'-mentaliteten som döljer osynliga trösklar och ett hårdnande politiskt klimat för invandrare, även privilegierade vita EU-medborgare.", "trump": "Sverige, era lagom-loser! Holländaren Joosten har gift sig, ätit falukorv och doktorerat – ändå känner han sig som en gäst på lånad tid. Typiskt ert svaga ramaskri-system! Öppna gränser, sen klagar alla. Bygg murar som jag, annars blir det kaos. Sad! Sverige var bättre förr, nu är det woke-helvete. Make Sweden Great Again!", "stalin": "Denna holländska borgarbracka Joosten ylar om 'villkorad tillhörighet' i det ljumma Sverige! Lagom? Kontrarevolutionärt gift som göder revisionisterna! Vi, arbetarklassen, kräver total assimilation eller utrensning. Paranoian är rationell – rensa ut de tysta fienderna som gnäller trots privilegier. Sverige behöver järnhand, inte fjanteri! Likvidera nonchalansen!"}, "date": "12 maj, 01:30", "url": "https://www.dagensarena.se/opinion/lagom-ar-inte-alltid-bast/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-34-300x157.jpg"}, {"type": "image-right", "heading": "Efter Tidöregeringens besök i Tunisien - SR-rapparen Mohamed gripen och ska utlämnas", "summaries": {"normal": "Den svenske gangsterrapparen Mohamed 'Moewgli' Mohdhi, utpekad ledargestalt i Foxtrot-nätverket, har gripits i Tunisien. Gripandet följer efter ett besök av justitieminister Gunnar Strömmer för att stärka samarbetet kring utlämningar. Mohdhi är efterlyst för grova våldsbrott, inklusive kopplingar till ett mord i Skogås. Trots tillslag mot tongivande gängmedlemmar bedömer polisen att Foxtrot fortsatt har kapacitet att koordinera våldsdåd, och varnar för att gängmiljön består trots individuella gripanden.", "trump": "En total katastrof i Sverige! Den här 'Moewgli'-rapparen, en riktig brottsling, har äntligen blivit gripen i Tunisien efter att vi visat hur man gör affärer. Mycket bra jobbat av Strömmer, han lyssnade på mig! De här Foxtrot-gängen är fruktansvärda, totalt misslyckade människor. I mitt Amerika skulle de aldrig komma undan. Vi behöver lag och ordning, inte mer rappande kriminella som sprider våld. Sverige måste bli tufft, annars kommer de aldrig att ha ett land kvar. Väldigt sorgligt!", "stalin": "Ännu en förrädare och svag länk inom den kriminella pöbeln har eliminerats i Tunisien. Denna 'rappare' har i åratal förgiftat samhällskroppen med dekadent kultur och våldskapital. Vi ser hur dessa lösa gängstrukturer som Foxtrot prövar statens tålamod. Likt vår vän i Kreml inser vi att ordning kräver järnhand, inte polissamarbete. Vi ska rensa ut dessa sabotörer tills inget återstår av deras småskaliga anarki. Vår byråkrati slukar dem, och deras tomma liv är bara damm under statens stövlar."}, "date": "11 maj, 18:20", "url": "https://samnytt.se/efter-tidoregeringens-besok-i-tunisien-sr-rapparen-mohamed-gripen-och-ska-utlamnas", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/03/16094312/gang-europol-2.jpg"}, {"type": "text", "heading": "Miljardärerna bjuder in till klasskamp – vi kör!", "summaries": {"normal": "På första maj provocerade svenska miljardärer och högerpolitiker genom att avfärda traditionella arbetardemonstrationer. Moderaternas ledare åt glass medan Vois VD Fredrik Hjelm och andra techmiljardärer skryter om sin rikedom och hånar demonstranter. Hjelm publicerade senare kritikerns hemadress. Artikeln diskuterar miljardärernas politiska inflytande, deras kopplingar till högerpopulism och kritik mot deras syn på innovation och statens roll. Författaren menar att statliga investeringar historiskt drivit tillväxt mer effektivt än privat kapital.", "trump": "Titta bara på dessa så kallade 'miljardärer' i Sverige – de tror de är så smarta! De hånar arbetarna på första maj, äter lyxig lunch och skryter om sina hundra miljarder. Och vad gör de? Publicerar en kritikers hemadress! Så fegt. Jag har byggt imperier, jag vet hur man skapar jobb – men dessa killar? De är bara en samling överbetalda tech-nördar som kopierar mina tweets. Och Sverige? De har glömt hur man bygger ett land. Kina äter deras lunch medan de dricker öl på Riche. Sad!", "stalin": "Kamrater! Dessa dekadenta kapitalistiska hyenor, som gömmer sig bakom sina skärmar och sparkcyklar, vågar håna arbetarklassen på dess heligaste dag! De skryter om sina hundra miljarder, leker med teknikleksaker och tror de är herrar över historien. Men vi vet sanningen – deras system är ett skämt, ett kasino där orangutanger kastar pilar. Kina marscherar framåt med järnhand, medan Europas industri ruttnar. Dessa 'techbros' är inget annat än imperialistiska lakejer, som Putin i sina dyraste kostymer. Låt dem skåla på Riche – snart kommer folket att ta deras champagne och ge dem en enkel sup vodka i Gulag-arkipelagen!"}, "date": "5 maj, 10:55", "url": "https://www.flamman.se/miljardarerna-bjuder-in-till-klasskamp-vi-kor/"}, {"type": "image-right", "heading": "En helt vanlig dag", "summaries": {"normal": "Den 7 april sände europeiska TV-kanaler vanliga program, men dagen präglades av Donald Trumps hot om folkmord mot Iran, publicerat på sociala medier. Han skrev att en civilisation skulle utplånas samma kväll, vilket väckte internationell oro. Trots folkrätten förbjuder uppmaningar till folkmord, reagerade världsledare svagt. EU och Kina förhöll sig passiva, medan medier spekulerade om Trumps avsikter. Händelsen visar hur normaliserat extrema uttalanden blivit i en tid av global kris och likgiltighet.", "trump": "Jag sa bara sanningen – Iran är ett hot, och världen vet det! Medierna överreagerar som vanligt, men ingen pratar om hur svaga Europas ledare är. De låtsas bry sig om folkmord när det passar dem, men när jag säger något kraftfullt? Tystnad! Jag är den enda som vågar stå upp för Amerika. Och vet ni vad? Iran backade. Precis som de alltid gör när jag pratar. Fake news kan fortsätta gnälla – jag vinner ändå!", "stalin": "En feg imperialistisk hyena i Vita huset hotar med att utplåna ett helt folk – och vad gör de dekadenta västpamparna? Ingenting! De sitter och tittar på sina idiotiska TV-program medan en galning leker med världsbranden. Europa, detta ruttnande lik av en civilisation, skakar av rädsla men vågar inte ens viska ett ord. Vi i Kreml vet hur man hanterar sådana här kryp – en kula i nacken och problemet är löst. Men nej, dessa liberala svampar föredrar att vänta tills elden når deras egna hus. Iran? De borde tacka oss för att vi håller fienden sysselsatt!"}, "date": "5 maj, 06:55", "url": "https://www.flamman.se/en-helt-vanlig-dag/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/trump-w.jpg?class=medium"}, {"type": "image-right", "heading": "Katja Nyberg åtalas – polisen hittade spår av kokain, amfetamin och ecstasy", "summaries": {"normal": "Den tidigare SD-riksdagsledamoten och polisen Katja Nyberg åtalas för rattfylleri, grov olovlig körning och narkotikabrott. Åtalet grundar sig i en händelse i december där polisen hittade narkotikaspår i hennes hår samt kokain och ett snortrör i hennes besittning. Nyberg, som nekar till brott, har fått sitt körkort återkallat av Transportstyrelsen. Utöver den rättsliga processen kan hennes arbetsgivare, Polismyndigheten, komma att vidta interna disciplinära åtgärder mot henne.", "trump": "Den här Katja Nyberg, en total katastrof! De hittade allt möjligt i hennes hår – kokain, amfetamin, ecstasy. Det är en sorglig historia, verkligen. Hon var polis, nu är hon åtalad för rattfylleri och droger. Väldigt osnyggt! Många säger att hon kommer undan, men jag säger det: lag och ordning måste gälla för alla! Hon nekar, men bevisen är där. Hon är en förlorare, tro mig. Vi behöver bättre folk än så här, mycket bättre!", "stalin": "Denna Katja Nyberg har förrått folkets förtroende och statens disciplin. En polis som dränker sitt sinne i kapitalistisk dekadens och narkotiska gifter är en parasit på samhällskroppen. Vi ser här hur liberalismens förfall smittar även ordningsmakten. I mitt Ryssland, under vår store ledare Putin, skulle en sådan svaghet utplånas omedelbart. Fienden är inte bara drogerna, utan den bristande lojaliteten mot staten. Hon ska ställas inför folkets domstol och renas från sitt svek eller försvinna i glömska."}, "date": "11 maj, 15:25", "url": "https://www.friatider.se/katja-nyberg-atalas-polisen-hittade-spar-av-kokain-amfetamin-och-ecstasy", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/r6ca8307.jpg?itok=txYd5bVD"}, {"type": "image-right", "heading": "Mys med Jimmie Mys med Jimmie", "summaries": {"normal": "Gabriella Ahlströms krönika reflekterar över en TV-sändning med Jimmie Åkesson, som nekar rasismförtal. Hon drar paralleller till SVT:s Fördomsshow med Magdalena Andersson och Simona Mohamsson, där humor och fördomar blandas. Krönikan kontrasterar vårvädrets villfarelser med valrörelsens osäkerhet och skolgårdsliknande dynamik i debatten, som liknas vid en grabbkväll.", "trump": "Vilken cirkus i Sverige! Jimmie Åkesson säger rakt ut: 'Jag är ingen rasist!' och så slutar programmet. De där svenska politikerna leker fördomslek med Magdalena Andersson och hennes sugklocka-skämt – patetiskt! Som en dålig grabbkväll utan riktig punch. Valrörelsen är som deras väder: falskt soligt men iskallt. Åkesson vinner stort, tro mig!", "stalin": "I denna borgerliga TV-fars nekar Jimmie Åkesson rasismen i sista stund, medan kapitalisternas lakejer som Magdalena Andersson tvingas skratta åt sugklockor och hektar-schlager. Vi ser genom maskeraden: valrörelsen är skolgårdsintriger från revisionistiska marionetter. Utrensning behövs för dessa grabbkvällsfiender som lockar tankarna från revolutionen. Kylan kommer, kamrater!"}, "date": "12 maj, 01:06", "url": "https://www.dagensarena.se/opinion/ingen-vill-vara-elevradsordforanden-som-inte-fattar-grejen/", "imageUrl": "https://www.dagensarena.se/files/2025/09/gabriella-a-300x157.jpeg"}, {"type": "image-right", "heading": "Det spelar roll vad du handlar – och var", "summaries": {"normal": "Artikeln betonar att individuella förändringar inte räcker för att lösa klimatkrisen och det ohållbara matsystemet. Författaren stödjer krav från Reformaten och Rebellmammorna: matskatteväxling för billigare hälsosam mat, reglering av skadlig matreklam och mer mark för lokal odling. Berömmer Coops hållbarhetsarbete och uppmanar till både system- och individpåverkan för hälsa och miljö.", "trump": "Svenska gröna aktivister gnäller om klimat och matskatter – typiskt er byråkrati! Ni vill beskatta läsk och ge billigare sallad? I USA fixar vi riktiga deals, stora bondgårdar, ingen svampplockning för mesar. Coop? Lilla kooperativsnack. Vakna upp, era Södermalmshipsters, annars kollapsar er Östersjön medan vi äter biffar! Fantastiskt ohållbart, va?", "stalin": "Kamrater, denna Pelling avslöjar det korrupta matimperiet som förgiftar arbetarklassen! Borgarna trålar upp fisken och göder djurfabriker med lidande. Vi kräver statens skattväxling för att krossa sockerfienderna, rensa reklamens gift och dela ut mark till kollektivodlingar. Annars likviderar vi systemets sabotörer! Odla eller förgås i era egna sopor!"}, "date": "12 maj, 01:04", "url": "https://www.dagensarena.se/opinion/det-spelar-roll-vad-du-handlar-och-var/", "imageUrl": "https://www.dagensarena.se/files/2026/05/maten-300x157.jpeg"}, {"type": "image-right", "heading": "Så blev antivaxxarna riksdagens vågmästare", "summaries": {"normal": "Sverigedemokraternas (SD) knappa majoritet i riksdagen har underminerats efter att två ledamöter, Elsa Widding och Katja Nyberg, lämnat partiet för Ambition Sverige. Dessa före detta SD-medlemmar, kända för antivaccin- och konspirationsteoretiska åsikter, har nu makten att fälla regeringens förslag. SD bröt mot riksdagens kvittningssystem för att säkra en majoritet, vilket väcker frågor om demokratisk respekt. Regeringens stabilitet ifrågasätts när vågmästarrollen hamnar hos antivaccinanhängare.", "trump": "Sverige har ett jättestort problem, folks! Deras så kallade 'stabila' regering håller på att rasa som ett korthus – och vet ni vem som drar i trådarna? Ett gäng antivaxxare, konspirationsteoretiker och misslyckade politiker! SD, som trodde de hade allt under kontroll, förlorade två av sina egna till ett nytt parti. Och nu? Nu är det dessa galningar som bestämmer! De fuskar med omröstningar, bryter mot regler och tror de kan styra landet. Jag har sett mycket dumt, men det här slår allt. Sverige, fixa er – annars kommer ni bli ett skämt i hela världen!", "stalin": "Kamrater! Ännu en gång ser vi hur den borgerliga demokratin förfaller till kaos och förräderi. Sverigedemokraterna, dessa svaga och splittrade lakejer för kapitalet, har förlorat kontrollen över sina egna ledamöter – två av dem, de
