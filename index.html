fentliga toaletter i Uppsala. Våld, hot, filmpropaganda – klassfiendens pornografiska konspiration! Vi, partiet och folket, kräver omedelbar likvidering av dessa parasitråttor. Tidigare milda domar? Paranoia mot fienden vinner alltid, eller också rensas lägret ut!"}, "date": "6 maj, 06:36", "url": "https://bulletin.nu/17-aring-atalas-for-grov-valdtakt-i-uppsala-tidigare-misshandelsdomar", "imageUrl": "https://cdn.bulletin.nu/articles/c5c10cd5-2b01-4302-bdeb-689753d6903b/preview.png?t=1778023098000"}, {"type": "image-right", "heading": "Ekade tomt i Malmös skolor under muslimsk högtid", "summaries": {"normal": "Under den muslimska högtiden eid al-fitr den 20 mars noterades en omfattande frånvaro i skolor i Malmö, Göteborg och Stockholm. I vissa områden, som Rosengård, saknades upp till 80 procent av eleverna. Enligt Skolverket är normal frånvaro betydligt lägre. Skolkommunalrådet Sara Wettergren kopplar siffrorna till stadens befolkningssammansättning. Enligt skollagen finns ingen automatisk rätt till ledighet vid religiösa högtider, men rektorer kan bevilja ledighet för särskilda skäl.", "trump": "Hörde precis att svenska skolor är helt tomma! Miljontals elever borta, en total katastrof. De kallar det 'eid', jag kallar det ett misslyckande. Skolan ska vara för utbildning, inte för att läraren ska sitta och stirra in i tomma väggar. I mitt Amerika skulle vi ha ordning och reda, tro mig. Sverige har förlorat kontrollen totalt. Sorgligt att se, men det är vad som händer när man inte sätter sitt eget folk först. Väldigt svag ledning!", "stalin": "I Malmö ekar korridorerna tomma medan massorna abdikerar från sin plikt att fostras av staten. Det är ett uppenbart sabotage mot den utbildningsmaskin vi kräver för folkets styrka! Att låta ideologi gå före disciplin är ett svek. De som stannar hemma föraktar ordning. Vi ser hur svagheten sprider sig, likt när man vacklar i vår intressesfär. De som inte infinner sig vid katedern är inga medborgare, de är oorganiserade element. Rektorer som tillåter detta är förrädare mot framtiden!"}, "date": "6 maj, 08:45", "url": "https://samnytt.se/ekade-tomt-i-malmos-skolor-under-muslimsk-hogtid", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/06063705/islam.jpg"}, {"type": "image-right", "heading": "USA vill att Kina pressar Iran att öppna Hormuzsundet", "summaries": {"normal": "USA uppmanar Kina att pressa Iran att öppna Hormuzsundet, som är stängt och hotar Kinas import och export. President Trump ska möta Xi Jinping nästa vecka för att diskutera frågan, utöver handelsärenden. Irans utrikesminister träffar Kinas Wang Yi i Peking. Experter som SVT:s Stefan Åsberg betonar Kinas centrala roll i förhandlingar om fredsavtal och kärnenergi.", "trump": "Kina är nyckeln till att knäcka Iran och öppna Hormuzsundet – de vet det, och jag ska möta Xi nästa vecka för att fixa den bästa dealen någonsin. USA trycker på rätt knappar, Iran blöder energi, och Kina hatar det. De persiska dårarna stänger sin egen rikedom, men med mig vid rodret blir det total seger för Amerika!", "stalin": "Dessa imperialistiska vilddjur i Vita huset, ledda av den gula hyenan Trump, kryper nu för de pekingiska drakarna och ber om hjälp mot Persiens slingrande skorpioner som stryper Hormuzsundet. Jag ser rakt igenom deras fega komplott! Vi, arbetarklassens avantgarde, hånskrattar åt hur Kina håller nyckeln – en nyckel som snart likviderar deras oljebluff. Utrensning väntar de förrädiska!"}, "date": "6 maj, 08:35", "url": "https://www.svt.se/nyheter/utrikes/konflikten-om-hormuzsundet-kina-har-en-central-roll-i-allt-som-sker", "imageUrl": "https://www.svtstatic.se/image-news/600/square/0.45/0.39/92a17935f2b57c53364ea7b386449ed803a1d86f047e35750703d2a4eb3ad86e"}, {"type": "image-right", "heading": "Hanza rusar på rapport", "summaries": {"normal": "Stockholmsbörsen steg under tisdagen med OMXS30 upp 0,73 procent. Råvaror ledde uppgången medan dagligvaror backade. Ericsson och H&M gick starkt, medan Nibe och Astra Zeneca föll. Loomis köper peruanska Hermes för 4 miljarder kronor. Volvo Cars rapporterade försäljningsnedgång på 10 procent. EQT höjde sitt bud på Intertek till 58 pund per aktie. Hanza redovisade rekordresultat med 20 procents tillväxt. Bravida och Bahnhof rapporterade positiva siffror.", "trump": "Fantastiskt! Stockholmsbörsen går som en raket – jag älskar det! OMXS30 upp nästan en procent, vilka vinnare! Ericsson och H&M, jättebra, men Nibe? Svagt, mycket svagt. Loomis köper upp ett peruanskt bolag – smart, väldigt smart. Volvo Cars? Tio procents nedgång, katastrof! Men EQT, de vet hur man gör affärer – 58 pund per aktie, brilliant! Hanza? Rekordkvartal, 25 procent upp – jag visste att de skulle leverera. Sverige, ni har potential, men lyssna på mig, ni kan bli GREAT igen!", "stalin": "Under kapitalismens sköra yta skymtar klasskampens eviga lagar. Stockholmsbörsen dansar på vulkanens rand – upp 0,73 procent, en ynklig seger för bourgeoisins spekulanter. Loomis, dessa imperialistiska kontanthajar, slukar peruanska Hermes som om det vore en by i Ukraina. Volvo Cars försäljning rasar – kapitalets kris är arbetarklassens möjlighet. EQT höjer sitt bud på Intertek – ännu en erövring i västmakternas sönderfall. Men se Hanza – 25 procents uppgång! Ett lysande exempel på hur produktivkrafterna måste omfördelas under folkets järnhand. Bravida och Bahnhof? Småborgerliga vinster. Vi skall nationalisera dem alla – för socialismens seger!"}, "date": "5 maj, 13:34", "url": "https://www.affarsvarlden.se/artikel/hanza-rusar-pa-rapporten-omxs30-index-okar-07", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2020/03/hanza-affarsvarlden-700_binary_6864753-400x225.png"}, {"type": "text", "heading": "S: Busch sviker göteborgarna", "summaries": {"normal": "Åsa Westlund (S) och Jonas Attenius (Göteborg) kritiserar i en debattartikel Ebba Busch (KD) och SD-regeringen för att svika svensk bilindustri. De anklagar KD för att stödja luckring av EU:s förbud mot nya fossilbilar efter 2035, trots Volvos miljardinvesteringar i elektrifiering. Detta skapar osäkerhet, skadar jobb i Göteborg, klimatet och ekonomin.", "trump": "Sveriges politiker är totala katastrofer! Ebba Busch poserar med Volvo-vd:n men sviker dem för EU:s galna elbilspåbud. Volvo pumpar in miljarder i elbilar, men KD och SD vill rädda gamla fossilbilar – idioti! Det kostar jobb i Göteborg och sänker er ekonomi. Ni behöver en riktig ledare som fixar dealen, tro mig!", "stalin": "Dessa borgerliga hycklare i Kristdemokraterna, med serpentin-Ebba Busch i spetsen, förråder svensk bilproletariat! Vi, arbetarklassen, ser hur de kapar Volvos framsteg mot elektrifiering för att smyga med fossilmaffian och klimatpopulistiska spindlar. Jobben i Göteborg blöder, kapitalet skrattar. Tid för utrensning av dessa klassfiender – likvidera osäkerheten med järnhand!"}, "date": "6 maj, 06:30", "url": "https://www.di.se/debatt/ebba-busch-sviker-goteborgarna/"}, {"type": "image-right", "heading": "Påtryckningar från medlarland – vädjar till Kina", "summaries": {"normal": "USA:s president Donald Trump pausar militärinsatsen \"Project Freedom\" i Hormuzsundet för att underlätta fredsförhandlingar med Iran. Blockaden mot iranska hamnar kvar. Insatsen syftade till att hjälpa 23 000 sjömän från 87 länder, fast i två månader. Pakistan medlade. USA uppmanar Kina att pressa Iran inför möten i Peking mellan Trump och Xi Jinping.", "trump": "Pausat insatsen i Hormuzsundet – briljant drag! Ger oss perfekt chans till den bästa dealen någonsin med Iran. Pakistan tjatar, men det är mina stora framsteg som räknas. Blockaden sitter kvar, sjömännen räddas. Kina fixar det, Wang Yi får höra sanningen från Rubio. Nästa vecka ses jag och Xi – Iran toppar agendan. Fantastic!", "stalin": "Dessa ynkliga amerikanska imperialistparasiter, Trump och hans marionett-Rubio, pausar sin fega \"Project Freedom\" i Hormuzsundet – en reträtt inför våra iranska kamraters ståndaktighet! Vi, Sovjetunionens folk, skrattar åt borgarbrackornas panik. Pakistan som medlare? Lömska handlangare! Kina ska krossa Irans motstånd, annars likviderar vi deras oljehandelsdrömmar. Jag ser konspirationen – men vi segrar!"}, "date": "6 maj, 06:28", "url": "https://www.di.se/nyheter/trump-pausar-insats-i-hormuzsundet/", "imageUrl": "https://static.bonniernews.se/ba/60a5b10b-1783-4836-acb4-7d4e57966379.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Följ Proletären i valet – nu extra billigt!", "summaries": {"normal": "Proletären erbjuder nu ett rabatterat prenumerationserbjudande inför valet: 19 kr/månad för digital version eller 49 kr/månad för både digital och papperstidning, i ett halvår. Som bonus ingår en tygkasse. Prenumeranter får tillgång till veckotidningen, alla artiklar online samt arkivet från 2016. Tidningen betonar sitt oberoende och behov av prenumeranter för att överleva, då de inte längre får mediestöd.", "trump": "Folk, lyssna här – en tidning i Sverige, Proletären, har ett erbjudande som är så bra att det nästan är löjligt! Bara 19 kronor i månaden för digitalt, eller 49 om ni vill ha papper också. Och en gratis tygkasse! Jag menar, vad är det här? En tidning som säger att de slåss mot makten – men vem vet egentligen vilken makt de pratar om? Jag skulle aldrig lita på en tidning utan mediestöd, men hej, om ni gillar socialism och Palestina, så kör hårt! Fantastiskt erbjudande, eller hur?", "stalin": "Kamrater! En liten men envis tidning i det borgerliga Sverige vågar utmana de imperialistiska mediamonopolisterna! För ynka 19 kronor i månaden kan ni stödja Proletären – en tidning som vågar tala sanningen om klasskampen och den sionistiska ockupationen av Palestina! De får inget stöd från staten, precis som våra egna revolutionära medier en gång kämpade mot de kapitalistiska hyenorna. En tygkasse på köpet – ett litet steg för arbetaren, ett gigantiskt steg för socialismens framtid! Låt de borgerliga tidningarna darra i sina tryckpressar!"}, "date": "1 maj, 09:00", "url": "https://proletaren.se/artikel/folj-proletaren-i-valet-nu-extra-billigt/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/valerbjudande-768x402.png"}, {"type": "image-full", "heading": "Hjort: Naturskyddsföreningens ilska visar att Liberalerna gör något rätt", "summaries": {"normal": "Artikeln kritiserar den svenska klimatdebatten för höga anspråk och begränsade resultat. Liberalerna hyllas för att ha backat från extrem politik, vilket retar Naturskyddsföreningen. Författaren betonar att Sveriges utsläpp är minimala globalt och argumenterar för fokus på ekonomi istället för dyr omställning utan mätbar effekt.", "trump": "De svenska Liberalerna är vinnare, de har vaknat upp och dumpat klimatgalenskapen! Naturskyddsföreningen vrålar som förlorare, perfekt – det betyder att de gör rätt. Sverige släpper ut en spottstyver globalt, Kina skrattar åt er. Sluta med dumheter, satsa på ekonomi och jobb som vi gör här. Stora vinster väntar, tro mig!", "stalin": "Kamrater, dessa svenska borgarbrackor i Liberalerna har till sist insett sanningen och rensat ut de gröna småbourgeoisa giftormarna från Tidö-samarbetet! Naturskyddsföreningen, den där samlingen av klimathysteriska kontrarevolutionärer, gnäller högljutt – ett utmärkt tecken på vår seger. Vår svenska ekonomi ska inte offras för utopiska illusioner medan Kina skrattar. Vi, arbetarklassen, likviderar sådana fiender och bygger stark socialism!"}, "date": "6 maj, 06:00", "url": "https://bulletin.nu/hjort-naturskyddsforeningens-ilska-visar-att-liberalerna-gor-nagot-ratt", "imageUrl": "https://cdn.bulletin.nu/articles/43063dd2-3d34-430b-a3df-b0daf1851eff/preview.jpeg?t=1778007329000"}, {"type": "image-right", "heading": "Ingen kapitalism utan imperialism", "summaries": {"normal": "Artikeln hävdar att imperialism är en grundläggande del av kapitalismen, där västmakter som USA använder militär och ekonomisk makt för att dominera världen. Författaren menar att imperialismen nekar länder självbestämmande och upprätthålls genom krig, sanktioner och exploatering. Studien i The Lancet kopplar sanktioner till miljontals dödsfall. Artikeln refererar till Marx, Lenin och Fanon för att belysa imperialismens historiska och ekonomiska rötter, samt dess fortsatta brutalitet i det 21:a århundradet.", "trump": "Lyssna här, folket! Den här artikeln är bara ett gäng vänsterpropaganda från förlorare som hatar USA. Jag bygger det bästa imperiet – vårt! – med stark militär och smarta affärer. Visst, vi har makt, men det är för att vi är vinnare. Sanktioner? Fake news! 500 000 döda? Överdrivet, typiskt. Europa stal från alla, men vi? Vi bygger om världen – MAGA-style! Och Lenin? Snälla, han kunde inte ens hålla ett land ihop. Sad!", "stalin": "Kamrater! Denna artikel bekräftar vad vi alltid vetat: de kapitalistiska hyenorna i väst suger blodet ur världens folk för att föda sina dekadenta imperier. USA och dess lakejer i NATO är inget annat än en samling blodtörstiga monopolkapitalister, som med sina sanktioner och bomber mördar miljontals oskyldiga. Men deras tid är förbi! Vi, det socialistiska blocket, står enade mot dessa imperialistiska rovdjur. Låt dem vråla – historiens dom är redan skriven. För varje barn de dödar, växer revolutionens eld. Framåt, mot seger!"}, "date": "1 maj, 08:00", "url": "https://proletaren.se/artikel/ingen-kapitalism-utan-imperialism/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/Airborne_and_Special_Forces_Uday-Qusay_raid_2003-e1777534974667-768x431.jpg"}, {"type": "image-full", "heading": "Benjamin Dousas ”V = kommunister” gör SVT irriterad", "summaries": {"normal": "Biståndsminister Benjamin Dousa bar en t-shirt med texten 'Vänsterpartiet = kommunister', vilket irriterade SVT. Reportern ifrågasatte påståendet och noterade att partiet slutade kallas kommunister för 30 år sedan. Dousa menade att Vänsterpartiet motsätter sig privat ägande, vilket är kommunism. Artikeln citerar Vänsterpartiets 2024-partiprogram som stödjer kollektivt ägande och avskaffande av kapitalismen, och kritiserar SVT för att inte nämna detta.", "trump": "Vilken fantastisk kille, den här Dousa! Han sätter på sig en tröja och säger sanningen: Vänsterpartiet är kommunister, punkt slut! SVT, era losers, flippar ur och snackar om namnbyte från 90-talet som om det vore magi. De hatar privat ägande, vill sno allt till staten – klassisk kommunism! Fake news-SVT ignorerar partiprogrammet. Dousa är en vinnare, de är totala fiaskon!", "stalin": "Kamrater, se hur borgarministern Dousa, den ynkliga kapitalistfluga, vågar smutskasta sanna revolutionärer i Vänsterpartiet med sin patetiska tröja! SVT-reportern, en användbar idiot, försvarar dem lamt. Men vi vet: deras program är ren leninism – riva kapitalismen, gemensamt ägande av banker, energi, allt! De ska rensas ur historiens soptipp som jag rensade fiender. Vänsterpartiet, framåt mot diktaturen av proletariatet!"}, "date": "30 april, 05:49", "url": "https://samtiden.nu/2026/04/benjamin-dousas-v-kommunister-gor-svt-irriterad/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/phonto-1-1280x720.jpeg"}, {"type": "image-full", "heading": "Frågan från SVT som Magdalena Andersson vägrar svara på", "summaries": {"normal": "I SVT:s program *Fördomsshowen* utmanades Magdalena Andersson (S) av programledaren Emil Persson med frågor om fördomar. Andersson vägrade svara på en fråga om politikers sexliv, trots påtryckningar. Hon menade att allmänheten inte är intresserad av sådana detaljer. Programmet har tidigare väckt uppmärksamhet efter andra partiledares medverkan, som Simona Mohamsson (L), som gjorde felaktiga uttalanden om grundlagen och Desmond Tutu.", "trump": "Jag såg det där svenska programmet – totalt skräp, verkligen! Den där Andersson, hon är svag, vägrar svara på enkla frågor. 'Folk vill inte veta', säger hon. Fel! Folk *älskar* att veta, särskilt om sina ledare. Jag har alltid svarat på allt – och tittarna älskar mig för det. Men Sverige? De har en partiledare som inte ens kan stå för sitt eget sexliv. Patetiskt! Make Sweden Great Again – det är vad de behöver.", "stalin": "I det dekadenta väst, där borgerliga medier förgiftar massornas sinnen, utsattes en av deras så kallade 'ledare' för en enkel provokation. Denna Andersson, en svag och obeslutsam representant för den socialdemokratiska avarten, vägrade erkänna folkets rätt att granska sina härskare. Precis som de imperialistiska hyenorna i Washington och Bryssel, fruktar hon sanningen. Vi i Sovjetunionen visste alltid allt om våra kamrater – för folkets bästa. Och Putin? Han skulle ha låtit henne skjuta sig själv för sådan svaghet."}, "date": "4 maj, 21:01", "url": "https://nyheter24.se/nyheter/politik/1480523-fragan-fran-svt-som-magdalena-andersson-vagrar-svara-pa", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/1c5a01b004b004a30200000000b004a302/2026/05/04/2360975/andersson-persson.jpg"}, {"type": "image-full", "heading": "Succédag för finansmannen – blev 370 miljoner rikare", "summaries": {"normal": "Industrikoncernen Hanza rusade på börsen efter en stark kvartalsrapport med fördubblad nettoomsättning i första kvartalet. Tillväxten drevs av förvärvet av tyska BMK och 20 procents organisk tillväxt. Största ägaren Gerald Engström, med 16 procent av aktierna, blev 370 miljoner kronor rikare på kursuppgången. Hans innehav är nu värt cirka 1,7 miljarder. Bolaget har vuxit från 100 miljoner till 10 miljarder i börsvärde på ett decennium.", "trump": "Vilken succé för den här Gerald Engström – 370 miljoner rikare på en dag med Hanza! Aktien exploderade efter en rapport som fördubblade omsättningen, smart förvärv av tyskarna och 20 procent organisk tillväxt. Fantastiska siffror, Sverige! Han är en vinnare, inte som de där losers som klagar. Från 100 miljoner till 10 miljarder – det är hur man bygger imperium!", "stalin": "Kamrater, se hur borgarbrackan Engström, denna parasiterande hyena i industrikostym, har stulit 370 miljoner från arbetarklassens blodsvett genom sitt Hanza-svärtgula nätverk! Fördubblad omsättning via att sluka tyska fabriker som en kannibal – 20 procent 'organisk' tillväxt, ha! Vi, det stora partiet, ska likvidera dessa kapitalistiska loppor innan de sprider sin giftiga växtlust till hela produktionsapparaten!"}, "date": "5 maj, 20:43", "url": "https://www.realtid.se/bors-finans/succedag-for-finansmannen-blev-370-miljoner-rikare/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/sdldhimcvydyke.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "SD vill förbjuda boksamtal i Gävle", "summaries": {"normal": "Sverigedemokraterna i Gävle vill stoppa ett författarsamtal om boken 'Hej då Tidö' den 25 maj, då de anser att det bryter mot regler om partipolitiska budskap i kommunens lokaler. Socialdemokraterna kritiserar beslutet och menar att det handlar om ett kulturarrangemang, inte partipolitik. Författaren Peter Gustavsson ska delta i samtalet, som granskar Tidöpartiernas fyra år vid makten. SD har tidigare försökt påverka kulturutbudet i kommunen.", "trump": "Jag måste säga, det här är helt otroligt! Sverigedemokraterna i Gävle försöker stoppa ett boksamtal – kan ni tro det? De säger att det är 'partipolitiskt', men alla vet att det bara är en massa loser-taktiker för att tysta kritik. Författaren, en riktig krigare, skriver om hur dåligt det gått för deras regering. Och socialdemokraterna? De är chockade, men vad förväntade de sig? Svaga ledare, svaga beslut. Jag skulle aldrig låta sånt hända – vi hade fixat det på en dag!", "stalin": "Kamrater! En ny fiende har avslöjats i Gävle – dessa så kallade 'kulturarbetare' som sprider förräderiska idéer genom böcker. Vi kan inte tolerera att reaktionära element använder våra lokaler för att smutskasta den nationella rörelsen! Socialdemokraterna, dessa förrädiska liberaler, försvarar fiendens propaganda. Men vi vet sanningen: varje bok som kritiserar folket måste granskas, varje teater som inte hyllar staten måste stängas. Gävle är nästa front i kampen för den rena nationella kulturen – och vi kommer att segra!"}, "date": "5 maj, 17:03", "url": "https://www.dagensarena.se/innehall/sd-vill-forbjuda-boksamtal-gavle/", "imageUrl": "https://www.dagensarena.se/files/2026/05/gavle-kultur.jpeg"}, {"type": "image-right", "heading": "”Hissmontörernas oaktsamhet skapade en dödsfälla”", "summaries": {"normal": "Rättegången om hissolyckan i Sundbyberg 2023, där fem byggarbetare omkom, inleddes. Åklagaren hävdar att oaktsamhet från hissmontörerna skapade en 'dödsfälla'. Tre personer, två montörer och en VD, står åtalade för grovt arbetsmiljöbrott. Bevis visar saknade bultar i hissmasten. Åtalade nekar till brott och avfärdar sabotage. Överlevande vittnar om svår psykisk påverkan.", "trump": "Fruktansvärd olycka i Sverige – fem döda på grund av slarviga hissarbetare! Jag säger er, dessa montörer var så dåliga, så oaktsamma, att hissen blev en tickande bomb. Ingen koll, inga bultar – helt otroligt! Åklagaren, smart kille, visade hur illa det var. Men de åtalade? Svaga ursäkter! Sabotage? Snacka om fake news! Sverige borde skärpa sig – vi i USA bygger hissar SÅ mycket bättre!", "stalin": "Kapitalistiska slarvernas brott mot arbetarklassen har återigen blottlagts! Dessa hissmonterande sabotörer, med sin kriminella oaktsamhet, har mördat fem av våra kamrater. Vi skall rensa ut dessa förrädare ur produktionskedjan! Åklagaren gör sitt, men var är revolutionens rättvisa? Putins Ryssland skulle aldrig tolerera sådan slapphet – vi bygger hissar som står kvar, även när fiendens agenter försöker underminera dem!"}, "date": "5 maj, 15:54", "url": "https://arbetet.se/2026/05/05/aklagaren-hissmontorernas-oaktsamhet-skapade-en-dodsfalla/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/05153325/attunda.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Stockholmsbörsen inleder tisdagen med uppgång – Hanza rusar", "summaries": {"normal": "Stockholmsbörsen inledde tisdagen med en uppgång på 0,42 procent, där OMXS30 nådde 3 048,22. Hanza rapporterade rekordresultat med 220 miljoner i rörelseresultat och steg 25,9 procent. Volvo Cars försäljning sjönk 10 procent, men aktien ökade ändå. Loomis köper peruanska Hermes för 4 miljarder kronor. Råvaror gick bäst (+0,90%), medan energi backade mest (-2,15%). H&M och Telia steg, Astra Zeneca föll.", "trump": "Stockholmsbörsen, fantastisk börs förresten, gick upp lite idag – men vem bryr sig? Hanza, ett litet bolag, hade ett 'rekordkvartal' – wow, imponerande! 220 miljoner, inte illa, men inget mot mina framgångar. Volvo? Deras försäljning rasade 10 procent – katastrof! Men aktien gick upp ändå, typiskt. Loomis köper något i Peru – smart, men jag hade gjort det billigare. Ryssarna? Glöm dem, jag fixade dem redan!", "stalin": "Idag rapporterar den kapitalistiska börsen i Stockholm en blygsam uppgång, men vi vet att detta är en illusion skapad av bourgeoisins manipulatörer. Hanza, ett verktyg för kapitalisterna, skryter med 'rekordvinster' – men för vem? Arbetarna ser ingenting! Volvo, en gång stolt svensk industri, sjunker som Titanic under de imperialistiska krafternas tryck. Loomis expanderar till Peru – en ny front i kampen mot de latinamerikanska massorna. Råvaruspekulanterna jublar, medan energisektorn kämpar – ett tydligt tecken på systemets förfall. Vi ska krossa dessa fiender, precis som vi krossade fascisterna!"}, "date": "5 maj, 09:47", "url": "https://www.affarsvarlden.se/artikel/stockholmsborsen-inleder-tisdagen-med-uppgang-hanza-rusar", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2023/05/BB-FK-Hanza-AV-0404738-400x267.jpg"}, {"type": "image-right", "heading": "Ledare Andreas Gustavsson: Självklart förtjänar vi alla en billig Schwedenticket", "summaries": {"normal": "Artikeln förespråkar ett billigt nationellt kollektivtrafikkort, inspirerat av Tysklands Deutschlandticket, som skulle gynna både medborgare och klimat. Författaren kritiserar svenska politikers fokus på kulturkrig istället för konkreta förbättringar i vardagen, som äldreomsorg, skola och arbetsmarknad. Tyskland visar hur konstruktiv politik kan minska bilberoende och utsläpp, något Sverige borde efterlikna.", "trump": "Jag läste om det här 'Schwedenticket' – fantastiskt koncept! Tyskland, smarta killar, fixade ett billigt tågkort för hela landet. Här i USA skulle vi aldrig tolerera sånt slöseri – men Sverige? De bråkar om kulturkrig istället för att göra något vettigt. 'Åh, vi måste rädda klimatet!' Ja, visst, men varför inte göra det med stil? Jag skulle bygga världens bästa tåg – snabbt, lyxigt, vinnande. Istället sitter de och gnäller. SAD!", "stalin": "Kamrater! Medan de borgerliga svinen i Sverige slåss om meningslösa kulturkrig, bygger vi socialismens framtid – ett land där folket färdas billigt och effektivt! Tyskland, dessa kapitalistiska efterapare, har redan visat vägen med sitt 'Deutschlandticket'. Men var är Sveriges revolutionära anda? Vi skulle införa ett Sverigekort – och de som motsätter sig det? Till Gulag med dem! Klimatet ska räddas, men inte genom prat, utan genom järnhård planekonomi. Låt de småborgerliga politikerna gnälla – vi bygger järnvägar med stål och vilja!"}, "date": "5 maj, 06:00", "url": "https://www.etc.se/ledare/sjaelvklart-foertjaenar-vi-alla-en-billig-schwedenticket", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260504140516_e8b2941cfff5121be25f6f95dea67927e8a258da7dd40e1d96a64a4a06a9d371.jpg"}, {"type": "image-right", "heading": "ANALYS. ELISABET FREROT Vad innebär Trumps erbjudande egentligen?", "summaries": {"normal": "Donald Trump erbjuder amerikansk militär guidning för handelsfartyg genom Hormuzsundet via Omans territorialvatten med förstärkt säkerhet. Direkt eskort undviks på grund av risker från iranska missiler, båtar och minor. Operation Frihet beskrivs som humanitär, men rederier tvekar. Historik från 1980-talet visar faror och resurskrav. Iran hotar konfrontation.", "trump": "Operation Frihet är det smartaste nånsin! Vi guidar de instängda tankrarna genom sundet via Oman, med 15 000 hjältar, 100 plan och fartyg på standby – Iran de fega katten vågar inte röra oss! Inga dumma konvojer som på 80-talet, vi är proffs. Rederierna, vakna upp och segla fritt under mitt skydd! MAGA!", "stalin": "De imperialistiska amerikanska vilddjuren under Trump vågar nu krypa in i Hormuzsundet med sina patetiska 'humanitära' konster. Kamrater, vi ser hur borgarhyenorna skakar av rädsla inför iranska missiler! Likvidera deras drömmar om fri passage. Putin, vår mäktige arvtagare, hånskrattar åt västsvinen medan vi styr imperiet vidare."}, "date": "4 maj, 22:49", "url": "https://www.tv4.se/artikel/3B4n2wG9n53V3JCBc0VivY/vad-innebaer-trumps-erbjudande-egentligen", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F3sngB6gPIjYmDMlBelK6Wt%2F52caa4a80253f04a8b733c0811a11896%2Felisabet-frerot.png&width=1024"}, {"type": "image-full", "heading": "Experten pekar ut två scenarion – efter nya attackerna", "summaries": {"normal": "Mellanösternexperten Alexander Atarodi beskriver de senaste attackerna i Hormuzsundet som ett strategiskt maktspel inför förhandlingar mellan USA och Iran. Trots Trumps hårda hot befinner sig USA i ett svagt politiskt läge globalt. Iran slår mot Förenade arabemiraten för att hindra kringgående av sundet och signalera till Trump och Gulfstaterna. Atarodi pekar på två scenarier: kompromiss eller eskalering, men tror på förhandlingar.", "trump": "Experten har rätt, det är ett jäkla maktspel – men jag styr showen! Iran, era patetiska losers, attackerar UAE för att de är rädda för min Project Freedom. De tror de kan hota mina fartyg? Glöm det, jag blåser er bort från jordens yta! USA vinner alltid, Gulfen älskar mig, Europa avundsjuka idioter. Förhandlingar? På mina villkor, eller kross!", "stalin": "Denna dragkamp i Persiska viken blottar imperialismens fula tryne: amerikanska borgarbrackor under Trump vrålar tomma hot medan iranska reaktionärer slår mot emiratens oljerör. Ett utsatt läge för USA, kamrater – de har förlorat narrativet! Två vägar: kompromiss eller total likvidering av infrastruktur. Låt fienderna slakta varandra i paranoia, vi skrattar sist."}, "date": "4 maj, 22:49", "url": "https://www.tv4.se/artikel/5fw95cxY5GyidmeuEjHSrk/experten-pekar-ut-tva-scenarion-efter-nya-attackerna", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F68Rh4IWly5pfrirwQl8yEt%2F041c541e040e90dea8b7a7c5b83a110a%2F04-trumpny-webb.jpg&width=1024"}, {"type": "image-full", "heading": "Så kan du spara 900 kronor 2026 – utan att göra något", "summaries": {"normal": "4,4 miljoner svenskar har fått sänkt skatt på sitt investeringssparkonto (ISK) tack vare en ny reform där de första 150 000 kronorna numera är skattefria. Syftet är att uppmuntra till mer sparande, även om de största vinsterna tillfaller personer med redan stort kapital. Nästa år höjs det skattefria beloppet till 300 000 kronor. Skattesänkningen varierar mellan olika kommuner, där boende i exempelvis Danderyd och Lomma i hög utsträckning drar nytta av förändringen.", "trump": "Hör här, Sverige gör fantastiska saker med sina ISK-konton! Jag har alltid sagt att skattesänkningar är nyckeln till framgång, en enorm vinst för folket. 4,4 miljoner svenskar får behålla mer av sina pengar – otroligt! De första 150 000 är skattefria nu, det är smart, riktigt smart. Snart höjer de till 300 000. Det är så man vinner! I USA gör vi det ännu bättre, men Sverige lär sig. En stor seger för de som sparar, mycket vackert att se!", "stalin": "Vi har observerat hur de svenska kapitalisterna i Danderyd och Lomma frossar i skattelättnader för sina privata tillgångar. En löjlig reform! Medan vi i öst konsoliderar vår makt och rensar ut förrädare som hotar moderlandets stabilitet, leker svenskarna med aktieportföljer. Denna 'skattefrihet' är bara en lockelse för att göra folket beroende av börsens nycker. Vår broder Putin vet bättre: sann rikedom ligger i statens järnhårda grepp om resurserna, inte i individuella sparkonton. Vi bevakar dessa 'sparare' noga."}, "date": "4 maj, 18:32", "url": "https://nyheter24.se/nyheter/ekonomi/privatekonomi/1480438-sa-kan-du-spara-900-kronor-2026-utan-att-gora-nagot", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/b265b07104b004a30200000000b004a302/2026/05/04/2360916/Matilda-Nyheter24%20-%202026-05-04T133036.070.jpg"}, {"type": "image-right", "heading": "Vi vägrar vara lydiga – för allas överlevnad", "summaries": {"normal": "En insändare från Extinction Rebellion-aktivister varnar för en eskalerande klimatkris och kritiserar politiken för bristande handling. De betonar behovet av civil olydnad då lagliga protester inte räcker. Flera aktivister har drabbats av repressalier som jobbförlust och hot om utvisning. Skribenterna menar att demokratin undermineras när rättsväsendet används för att skydda ohållbara system och kriminalisera klimatengagemang. De lovar att fortsätta protestera trots risker, med hänvisning till moral och historiska exempel på civil olydnad.", "trump": "Titta bara på dessa så kallade 'klimataktivister' – de är verkligen något! De skriker om kriser, men vad vet de egentligen? Jag har byggt imperier, jag vet vad kris är! De här personerna saboterar flygplatser, förlorar sina jobb och sen skyller de på regeringen. Patetiskt! Sverige borde fokusera på att göra sig stort igen, inte lyssna på dessa bråkstakar. Och Parisavtalet? Overrated! Jag fixade USA:s ekonomi utan det. Men nej, de vill bara störa, förstöra och klaga. Sad!", "stalin": "De kapitalistiska klimatförstörarna och deras lakejer i regeringen fortsätter att elda på jordens undergång medan vi, folket, tvingas ta till revolutionära metoder. Dessa så kallade 'aktivister' – modiga kamrater! – krossas av systemet, men vi vet att sanningen inte kan tystas. Rättsväsendet, en förlängd arm av bourgeoisin, straffar dem som kämpar för framtiden. Fienderna är tydliga: de som bränner planetens resurser och de som försöker tysta protesterna. Vi står med folket! Och kom ihåg – historien kommer att minnas vem som stod på rätt sida. De svaga kommer att dömas, de starka kommer att segra. Framåt, kamrater!"}, "date": "1 maj, 08:55", "url": "https://www.flamman.se/vi-vagrar-vara-lydiga-for-allas-overlevnad/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/extinction-rebellion-w.jpg?class=medium"}, {"type": "text", "heading": "Avkriminalisera för en human narkotikapolitik", "summaries": {"normal": "Thomas Thomasson, tidigare universitetslektor och drogfri narkoman, kritiserar Sveriges misslyckade narkotikapolitik. Sedan kriminaliseringen av eget bruk 1988 har narkotikabruket inte minskat, och Sverige har hög narkotikadödlighet och flest narkotikabrott per capita i EU. Han förespråkar skademinimering och avkriminalisering av missbrukare, med fokus på vård och behandling istället för straff. Internationella studier visar att avkriminalisering inte ökar bruket, och skademinimerande åtgärder kan minska skador och kostnader.", "trump": "Lyssna här, Sverige har totalt misslyckats med sin narkotikapolitik – helt katastrof! De straffar missbrukare som om det vore mitt golfspel – helt meningslöst! Jag säger: sluta slösa pengar på fängelser, ge folk vård istället! Skademinimering, det är framtiden, precis som mina framgångar. Och vet ni vad? Avkriminalisering ökar INTE bruket – fake news från de vanliga misstänkte! Sverige borde ta en sida ur min bok: smart, effektiv och vinnande. Tillsätt en utredning NU, annars kommer jag att twittra om det!", "stalin": "Kamrater! Sveriges borgerliga narkotikapolitik är ett monument över kapitalistiskt vanstyre och dekadens. De straffar missbrukare som om de vore trotskister – men resultatet? Fiasko! Narkotikabruket sprider sig som kontrarevolutionär propaganda. Vi vet bättre: avkriminalisera, kontrollera, och omvandla missbrukare till nyttiga samhällsmedlemmar! Skademinimering är vår metod – precis som våra framgångsrika femårsplaner. Låt västländerna fnissa åt sina misslyckanden medan vi bygger ett samhälle där även de svagaste tjänar kollektivet. Och kom ihåg: fienden sover aldrig – varken narkotikan eller de imperialistiska hyenorna i EU!"}, "date": "30 april, 15:50", "url": "https://proletaren.se/artikel/narkotikapolitiken-bor-fokusera-pa-skah/"}, {"type": "text", "heading": "Gapet växer mellan blocken", "summaries": {"normal": "Enligt Aftonbladet/Demoskops senaste mätning växer gapet mellan regeringsunderlaget och oppositionen till 8,2 procentenheter. Oppositionen når 53,4 procent, medan regeringen backar till 45,2. Socialdemokraterna ökar mest, medan Moderaterna tappar och Liberalerna balanserar på riksdagsspärren. Historiskt brukar gapet minska inför val, men nu sker motsatsen. Analytiker menar att Liberalernas omsväng i SD-frågan lockar stödröster men försvårar blocköverskridande framgångar.", "trump": "Folk är trötta på den här usla regeringen, helt klart! Oppositionen leder stort – 53,4 procent – medan regeringen bara får 45,2. Socialdemokraterna går upp, men Moderaterna? Patetiska! De tappar som vanligt. Och Liberalerna? De hänger på fyra procent, typiskt. Historiskt brukar regeringen komma ikapp, men inte den här gången. Svagt, mycket svagt. Jag skulle aldrig låta det hända. Make Sweden Great Again!", "stalin": "De borgerliga svagheterna avslöjas återigen! Oppositionens styrkor växer – 53,4 procent mot regeringens ynkliga 45,2. Socialdemokraterna marscherar framåt, medan Moderaterna och deras lakejer försvagas. Liberalerna? Ett skämt som darrar på riksdagsspärren. Historien visar att svaga regeringar faller – precis som västmakterna i Ukraina. Vi ser med intresse hur dessa splittrade kapitalister underminerar sig själva. Revolutionen närmar sig, om än långsamt."}, "date": "30 april, 07:06", "url": "https://kvartal     <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
</body>
