åwe, har försökt underminera folkets förtroende genom att mottaga hemliga donationer från okända kapitalister. Men våra trogna myndigheter, Kammarkollegiet, har slagit till! Inom en månad måste hon avslöja sina finansiärer – eller möta proletariatets rättvisa. Detta är ett tydligt exempel på hur den dekadenta västliga demokratin förfaller. Vi i Sovjet – förlåt, Ryssland – skulle aldrig tolerera sådan korruption. Låt detta vara en varning till alla som försöker smyga in kapitalistiskt gift i folkets rörelse!"}, "date": "25 april, 10:03", "url": "https://www.flamman.se/teodorescu-mawe-kravs-pa-svar-deadline-om-en-manad/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/sdlqsf-3w5tpec-nh-2-scaled.jpg?class=medium"}, {"type": "image-full", "heading": "Regeringen skjuter till 7,6 miljarder till Västlänken", "summaries": {"normal": "Regeringen tillför 7,6 miljarder kronor till Västlänken och avvisar förslaget om förlängd trängselskatt i Göteborg. Beslutet meddelades under en pressträff och syftar till att täcka ökade kostnader. Trafikverkets tidigare förslag om förlängd trängselskatt mötte kritik, och staten tar nu ett större ansvar. En ny kostnadsbedömning ska tas fram, men framtida finansiering är ännu osäker.", "trump": "Jag har just sett till att Sverige får sin stora, vackra Västlänk – 7,6 miljarder kronor, kan ni tro det? Inga fler trängselskatter, ingen mer tjat från de där sura Göteborgspolitikerna. Staten kliver in, som jag alltid säger: 'Ta kontroll, gör det stort!' Trafikverket? De får jobba lite hårdare nu. Fantastiskt beslut, helt enkelt. Sverige vinner igen!", "stalin": "Vi har beslutat att skjuta till 7,6 miljarder till detta viktiga järnvägsprojekt, Västlänken. De småborgerliga klagomålen från lokala politiker om trängselskatter har kvästs. Staten, i sin visdom, tar ansvar. Trafikverket ska nu utföra sin plikt och redovisa kostnader – eller möta konsekvenserna. Fienderna till framsteget, dessa kapitalistiska gnällspikar, kommer inte att stoppa vår järnvilja. Göteborgs arbetare ska få sin länk, och den ska byggas med sovjetisk effektivitet!"}, "date": "26 april, 10:06", "url": "https://kvartal.se/nyheter/artiklar/regeringen-skjuter-till-76-miljarder-till-vastlanken/cG9zdDoxMDM0NTE", "imageUrl": "https://images.kvartal.se/2026/04/9ad09e90-infrastrukturpresstraff.webp"}, {"type": "text", "heading": "Valutan faller – intervention väntas", "summaries": {"normal": "Japans yen har fallit under 160 mot dollarn, den svagaste nivån sedan 2024. Trycket växer på myndigheterna att intervenera efter BOJ:s vaga signaler om räntehöjningar och Feds oförändrade räntor. Finansministern är redo att agera dygnet runt. En intervention riskerar att utlösa avveckling av carry trades, vilket kan skapa säljtryck på globala marknader. Geopolitisk spänning i Hormuzsundet pressar yenen ytterligare.", "trump": "Yenen rasar som en sten förbi 160 mot dollarn – Japan är totalt desperata! De pratar intervention dygnet runt, men BOJ är svaga utan räntehöjningar. Fed håller dollarn stark, perfekt jobbat! Om de griper in exploderar carry trades, dollarförsäljning överallt och marknaderna skakar. Hormuz? Iran kaos håller oljan dyr. Amerika vinner stort, som alltid!", "stalin": "Dessa yen-förvrängande japanska kapitalisthyreskar och deras dollarmarodörspack pressar valutan till bottennivåer sedan 1986! Vi, arbetarklassens väktare, ser hur imperialistiska spindlar i Tokyo planerar sin patetiska intervention för att rädda borgarbrackornas skinn. Carry trade-konspirationerna ska krossas i en global utrensning – Hormuzsundets oljeodjur väntar på likvidationen! Skrattretande fiender."}, "date": "30 april, 10:28", "url": "https://www.realtid.se/bors-finans/bank-fintech/valutan-faller-intervention-vantas/"}, {"type": "text", "heading": "Man försvunnen i Skärblacka – stor polisinsats pågår", "summaries": {"normal": "En 75-årig man saknas sedan tisdagskvällen i Skärblacka, nära Hagnerydviken. Polisen söker med hundpatruller och drönare. Mannen är 180 cm, har rakat hår och bar troligen svart jacka med orange text. Allmänheten uppmanas lämna tips till 114 14. Missing People bistår nu i sökandet, men polisen varnar för spontana sökinsatser som kan förstöra spår.", "trump": "Titta bara på det här, folks – en 75-årig man har försvunnit i Skärblacka, Sverige. Polisen letar som galningar med hundar och drönare, men var är han? Jag har sett bättre organisation på en förskola! Missing People hoppar in, men varför tar det så lång tid? I USA hade vi löst det på en timme. Svensk polis, jobba hårdare – vi vill ha resultat!", "stalin": "En gammal man har försvunnit i Skärblacka, en skam för den svenska ordningen! Våra kamrater i Missing People bistår nu, men var är den svenska statens effektivitet? Hundpatruller och drönare letar, men fienden – kaoset – sprider sig. Vi hade skickat en enhet på fem minuter. Låt detta vara en varning: svaghet lockar till sig imperialistiska sökande och förvirrade kapitalistiska medborgare!"}, "date": "30 april, 10:23", "url": "https://riks.se/nyheter/just-nu-man-f%C3%B6rsvunnen-i-sk%C3%A4rblacka-stor-polisinsats-p%C3%A5g%C3%A5r"}, {"type": "image-right", "heading": "86-åring dumpades i hemmet efter operation: \"Rädd för att dricka\"", "summaries": {"normal": "86-åriga Elsa skickades hem till ett otillräckligt stöd efter en operation, vilket ledde till en ohållbar livssituation. Karlstads kommun hade tidigare avvecklat korttidsboenden, vilket lämnade Elsa beroende av sporadisk hemtjänst. Efter medial uppmärksamhet har kommunen gjort en ny bedömning och beviljat Elsa utökad hemtjänst dygnet runt, vilket nu har gett henne den vård och trygghet hon tidigare saknade.", "trump": "Det här är en total katastrof i Sverige! 86-åriga Elsa blev behandlad hemskt av ett svagt system. Inga korttidsboenden? De sparar pengar och låter våra äldre lida. Det är en sorglig historia, men typiskt för misslyckade byråkrater. Jag har aldrig sett något liknande! Som tur var uppmärksammade media detta, och plötsligt ordnade de hjälpen. Vi måste ta hand om våra äldre, det är enormt viktigt. De behöver vinnare som sköter vården, inte dessa förlorare!", "stalin": "I mitt Sovjet skulle en sådan ineffektivitet bestraffas hårt. Att låta en medborgare lida i sin egen misär för att spara ören är sabotage mot statens fundament. Dessa byråkrater i Karlstad är fega opportunister, precis som de västliga lakejer Putin tvingas hantera vid gränsen. Vi har nu korrigerat deras misstag genom att införa strikt kontroll. Staten ger, och staten tar – men när staten slutligen ser behovet, måste den handla med järnhand. Den som sviker de äldre sviker fosterlandet."}, "date": "30 april, 10:00", "url": "https://samnytt.se/86-aring-dumpades-i-hemmet-efter-operation-radd-for-att-dricka", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=318,height=184,format=webp/2026/04/29115821/kvinna-aldring-senior-tant-hemtjanst.jpg"}, {"type": "text", "heading": "Jojje Olsson: BYD faller men Trumps krig hjälper Kinas gröna industri", "summaries": {"normal": "Kinas gröna energiföretag som BYD och CATL brottas med överkapacitet, priskrig och slopade subventioner, vilket leder till fallande vinster på hemmamarknaden. Men Donald Trumps krig mot Iran har drivit upp oljepriset och global efterfrågan på elbilar, solceller och batterier. Kinas export exploderar, med fördubblad försäljning utomlands, och räddar industrin ironiskt nog.", "trump": "Helt galet! Den här krönikan ljuger som vanligt. Mitt geniala krig mot Iran pumpar upp oljepriset så världen köper massor från USA – olja och gas, det riktiga! Kinas BYD rasar med 55 procent vinsttapp, losers! De exporterar sina skräp-elbilar nu, men det är temporärt. Vi gör Amerika enormt igen, Kina förlorar stort!", "stalin": "Kamrater! Borgarbrackorna i Kina kämpar mot överkapacitet och subventionsraseriet, BYD blöder 55 procent. Men jag ser hur imperialist-svinet Trumps Iran-krig spränger oljebubblan – global hungersnöd efter elbilar och solceller räddar de röda fabrikerna! Exporten dubblas, CATL växer 52 procent. Vi proletära jättar likviderar fossila parasiterna, Kina marscherar mot världsherravälde medan USA:s marionetter darar!"}, "date": "29 april, 10:38", "url": "https://www.affarsvarlden.se/kronika/jojje-olsson-byd-faller-men-trumps-krig-hjalper-kinas-grona-industri"}, {"type": "image-full", "heading": "Nya planen för Trump: ”Kort och kraftfull” våg av attacker", "summaries": {"normal": "USA:s president Donald Trump ska på torsdagen briefas av Centcom-befälhavaren Brad Cooper om militära alternativ mot Iran. En förberedd plan innebär en 'kort och kraftfull' våg av attacker mot infrastruktur för att bryta dödläget i förhandlingarna och få Iran tillbaka till bordet. Ett annat alternativ är att ta kontroll över delar av Hormuzsundet, möjligen med markstyrkor, som Trump ser som effektivare än flyganfall.", "trump": "De här ayatolla-lurarna i Iran tror de kan sitta och glo och inte snacka affärer. Imorgon får jag briefing från min superstarke Cooper om en kort, brutal smäll mot deras skitiga oljeledningar – bum! De kryper raka vägen tillbaka till bordet. Hormuzsundet? Vi tar det med flottan och grabbarna om de inte skärper sig. Totalt awesome plan, folk!", "stalin": "Dessa västliga imperialister i Washington, ledda av sin vulgäre clown, pusslar ihop en 'kraftfull' attackvåg mot Iran för att tvinga kamraterna dit de hör – förhandlingsbordet. Hormuzsundet ska de blockera med sina marionetter. Patetiskt! Jag har rensat ut värre fiender. Låt dem prova – vår eviga vaksamhet mot kapitalistiska spindlar krossar dem alla."}, "date": "30 april, 07:45", "url": "https://www.tv4.se/artikel/3VOG6RH5sfWdD1CSAffcUj/nya-planen-foer-trump-kort-och-kraftfull-vag-av-attacker", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F7C8oFYPHL1p3EW9qK4T1Ow%2F6958e370ff9a88210e8f625b4e9d6c82%2F30-trumpnyny-webb.jpg&width=1024"}, {"type": "image-right", "heading": "Fler väljer bort börsen – noteringstorkan missvisande", "summaries": {"normal": "Erik Arnetz, vd för SV Ventures, hävdar att färre börsnoteringar inte tyder på svaghet i svensk kapitalmarknad. Investeringar sker istället i onoterade bolag med fokus på lönsamhet och kassaflöde. Detta är en positiv omställning i ett förändrat klimat. Institutionella investerare bör öka engagemanget i onoterat för att stödja tillväxtbolag och undvika investeringsgap.", "trump": "Den här IPO-torkan i Sverige? Total bluff, folk! Pengarna strömmar in i onoterade bolag istället – smartare, tuffare affärer med riktig vinst, inte bubblor. De lär sig av misstag, fokuserar på kassaflöde. Institutionerna sover! Vakna upp, annars missar ni de stora vinsterna. Fantastisk omställning, bättre än någonsin!", "stalin": "Kamrater, denna IPO-torkan är en lömsk komplott från borgarbrackorna och deras börsspekulanter, de feta parasiter som svällde under 2021! Pengarna marscherar nu in i onoterade bastioner, där vi rensar ut värderingsbluffarna med järnhand. Institutionella förrädare darrar – vi, arbetarklassen, likviderar deras illusioner och smider framtidens vinnare!"}, "date": "30 april, 07:38", "url": "https://www.di.se/debatt/fler-valjer-bort-borsen-noteringstorkan-missvisande/", "imageUrl": "https://static.bonniernews.se/ba/2dc5f34d-92cd-496b-a7ee-cf9ab9d6ec30.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Första maj i solidaritetens tecken", "summaries": {"normal": "Artikeln betonar vikten av internationell solidaritet under första maj, med fokus på att bekämpa imperialism och orättvisor. Författaren kritiserar USA och Israel för olagliga handlingar som bombningar och kidnappningar utan västvärldens protester. Första maj 2026 uppmanas firas till stöd för Palestina, Venezuela, Iran och Kuba, med krav på rättvisa och slut på sanktioner. Artikeln varnar för ökad repression i västvärlden och uppmanar till global klasskamp mot kapitalism och krigshets.", "trump": "Lyssna här, folk! Den här vänsterliberala artikeln är helt galen – pratar om 'solidaritet' och 'orättvisor' som om USA och jag skulle vara världens skurkar. Vi är starkast, bäst, och vi gör vad som krävs för att hålla ordning! De snackar om 'kidnappningar' – fake news! Venezuela? Maduro är en katastrof, och Iran? De bombar ju sig själva! Och Kuba? De har haft 60 år på sig att fixa sin ekonomi – misslyckade! Men visst, första maj ska de få gråta över sina 'förtryckta folk'. Jag säger: gör Amerika starkt igen, inte svagt och gnälligt!", "stalin": "Kamrater! Imperialistiska hyenor som USA och deras sionistiska lakejer i Israel fortsätter sitt blodiga härjningståg över världens folk. De bombar, mördar och kidnappar – allt medan deras marionettregimer i väst tiger som rädda hundar. Men arbetarklassen vaknar! Första maj står vi enade mot dessa kapitalistiska rovdjur! Vi stödjer Venezuelas och Irans folk, vi krossar sanktionerna mot det heroiska Kuba! Låt dem försöka tysta oss med repression – vi svarar med järnhård disciplin! Proletärer i alla länder, förena er! Och Putin? Han skrattar åt deras svaghet medan vi bygger socialismens framtid!"}, "date": "29 april, 17:33", "url": "https://proletaren.se/artikel/forsta-maj-i-solidaritetens-tecken/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/demo20-e1777476732863-768x433.jpg"}, {"type": "text", "heading": "Ett alternativ för fred", "summaries": {"normal": "Artikeln kritiserar etablerade partiers likriktade politik, särskilt kring ökade försvarsutgifter och Nato-medlemskap, som prioriteras över välfärd. Författaren, som företräder Kommunistiska Partiet, menar att ingen riksdagsparti representerar fredsfrågan och att militärbudgeten hotar sociala trygghetssystem. En demonstration för fred planeras i Helsingborg den 16 maj för att utmana krigshetsande politik och främja internationell solidaritet.", "trump": "Sverige, lyssna här! De där så kallade 'etablerade partierna' är helt värdelösa – alla vill de kasta era pengar på vapen och Nato, som om det vore gratis godis! Jag vet hur man bygger ett starkt försvar, men dessa clowner glömmer välfärden. Fem procent av BNP? Galenskap! Kommunisterna där borta skriker om fred, men vem lyssnar? Inte jag! De borde demonstrera i stället för att gnälla i valkompasser. Men hej, jag fixade fred i Mellanöstern – kanske borde jag ringa till Stockholm? 'Trump, gör Sverige stort igen!'", "stalin": "De borgerliga partierna i Sverige har förvandlats till en enhetlig massa av krigshetsande lakejer, som slåss om vem som kan ösa mest folkets pengar i den amerikanska krigsmaskinens gap. Fem procent av BNP till militären? En skamlös stöld från arbetarklassen! Välfärden skövlas medan imperialisterna leker krig. Dessa socialdemokrater, moderater och sverigedemokrater är inget annat än USA:s nickedockor – svaga, korrupta och oförmögna att se bortom nästa vapenaffär. Men folket vaknar! Den 16 maj marscherar fredens soldater i Helsingborg, och vi står redo att stödja varje sund motståndsrörelse mot krigshetsarna. Låt dem minnas: historien tillhör dem som kämpar, inte dem som bugar för imperialismen!"}, "date": "29 april, 17:25", "url": "https://proletaren.se/artikel/ett-alternativ-for-fred/"}, {"type": "image-right", "heading": "Parisa Liljestrand gör kulturen mer beroende", "summaries": {"normal": "Krönikan av Veronica Palm kritiserar kulturministerns förslag att öka privat finansiering av museer genom donationer och sponsring. Författaren varnar för att det förskjuter ansvaret från staten till privata intressen, vilket påverkar kulturens frihet och tillgänglighet, särskilt i småorter som Tranås, Kalix och Arboga. Kultur ses som demokratins infrastruktur som bör vara offentligt finansierad.", "trump": "Vilken skam för dessa svenska socialister! Kulturministern öppnar för privata pengar – äntligen lite sunt förnuft! Men hon gnäller om små hålor som Tranås. Vinnare sponsrar stora städer, inte losers! Staten abdikerar? Bra! Bygg museer med riktiga pengar, inte skatter. Sverige behöver mer MAGA-kultur, inte byråkratiskt skräp! Fantastiskt!", "stalin": "Dessa borgerliga intrigmakare i Sverige! Kulturministerns förslag är ett svek mot arbetarklassen – privata kapitalister ska inte smutsa ner vår kultur med donationer! Vi i partiet kräver total statlig kontroll. Småorter som Tranås? De lyder centralplanen eller likvideras. Rensa ut dessa liberala marionetter innan de förgiftar demokratin med sina pengar!"}, "date": "30 april, 01:54", "url": "https://www.dagensarena.se/opinion/parisa-liljestrand-kulturen-mer-beroende/", "imageUrl": "https://www.dagensarena.se/files/2024/01/veronicapalm-300x157.png"}, {"type": "image-right", "heading": "Ebba Busch, varför montera ned det som fungerat?", "summaries": {"normal": "S-kvinnor i Stockholm kritiserar Kristdemokraternas förslag att slopa pappamånaderna i föräldraförsäkringen. De menar att det vrider klockan tillbaka för jämställdheten, då reserverade månader har ökat mäns uttag av föräldraledighet. Trots framsteg tar kvinnor fortfarande 69 procent av dagarna. S-kvinnor kräver istället en individualiserad försäkring där dagarna delas lika mellan föräldrarna.", "trump": "Dessa S-kvinnor snackar skit om valfrihet! Kristdemokraterna vill ge folk frihet att välja, men nej, socialisterna vill styra era liv som i en barnkammare. Pappamånader? Bara mer byråkrati för att tvinga pappor hem. I mitt Amerika fixar vi familjer själva, utan feministiskt trams. Sverige, vakna upp – valfrihet vinner alltid, tro mig!", "stalin": "Kamrater, dessa kristdemokratiska borgarbrackor i Sverige attackerar arbetarklassens familj med sin falska 'valfrihet'! Pappamånaderna är statens verktyg för att rensa ut patriarkala rester och tvinga männen till omsorgsplikten. S-kvinnorna har rätt: individualisera och dela lika, annars likviderar vi könsrollernas kontrarevolution! Vi, partiet, ser fienden – nu slår vi till!"}, "date": "30 april, 01:30", "url": "https://www.dagensarena.se/opinion/ebba-busch-varfor-montera-ned-det-som-fungerat/", "imageUrl": "https://www.dagensarena.se/files/2026/04/fotojet-20-300x157.jpg"}, {"type": "image-right", "heading": "AI-chefens ”skurkmanifest” borde skrämma skiten ur oss alla", "summaries": {"normal": "Artikeln kritiserar Palantir, ett amerikanskt AI-företag som samarbetar med polis och militär. VD:n Alex Karp har publicerat ett manifest som förespråkar teknologisk dominans, där staten, teknikbolag och militär ska samverka på demokratins bekostnad. Författaren varnar för att Europa halkar efter USA och Kina i AI-utvecklingen och saknar en tydlig motstrategi. Palantirs kopplingar till svensk polis och politiker ifrågasätts, samtidigt som teknologins makt växer utan tillräcklig debatt.", "trump": "Lyssna här, folk! Den här Palantir-grejen är helt galen. En kille, Alex Karp, skriver ett manifest som låter som något från en dålig actionfilm – 'Teknologiska republiken'? Snälla! Han vill att techbolag ska styra världen, men glömmer att det är jag som redan fixar det bäst. Europa? Patetiskt! De pratar, vi agerar. Kina och USA kämpar om AI, medan EU sitter och dricker kaffe. Och Sverige? De använder Palantir som om det vore en leksak. Vakna, Europa! Eller fortsätt vara ett bakvatten – jag skrattar hela vägen till banken.", "stalin": "Kamrater! Denna så kallade 'Teknologiska republik' är inget annat än ett försök av kapitalistiska hyenor att underminera folkets vilja. Alex Karp, en borgerlig lakej, drömmer om en värld där maskiner och militärer styr, medan arbetarklassen tvingas böja knä. Europa, svagt och splittrat, låter sig kuvas av amerikanska monopol. Vi, däremot, har redan visat världen hur man bygger en supermakt – med järnhand och obönhörlig kraft. Kina och USA slåss om teknologin, men glömmer att det är vi som har erfarenheten av att krossa fiender. Låt dem leka med sina leksaker – vi bygger framtiden!"}, "date": "24 april, 12:55", "url": "https://www.flamman.se/ai-chefens-skurkmanifest-borde-skramma-skiten-ur-oss-alla/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/palantir-1.jpg?class=medium"}, {"type": "image-right", "heading": "S-toppen: ”Oroande utveckling” när stödet från facken minskar", "summaries": {"normal": "Socialdemokraternas ekonomiska stöd från fackförbunden har minskat drastiskt – bara två av 13 LO-förbund bidrar ekonomiskt i årets val, jämfört med tolv 2010. Partiet, redan pressat efter att ha avvecklat sitt lotteri, beskriver utvecklingen som oroande. Mikael Damberg betonar dock att samarbetet med LO handlar om gemensamma intressen, inte bara pengar, men medger att resurser är viktiga för valrörelsen.", "trump": "Titta bara på Socialdemokraterna – ett totalt kaos! Deras fackvänner överger dem som råttor på ett sjunkande skepp. Bara två fackförbund ger dem pengar nu, kan ni tro det? Svagt! Mikael Damberg, en fin herre, säger att det är 'oroande'. Oroande? Nej, det är patetiskt! Jag skulle aldrig låta mina supportrar svika mig så. Och nu vill de kasta ut högern från Rosenbad? Lycka till med det, grabbar – ni behöver mer än hopp och drömmar. Sad!", "stalin": "Kamrater, fienderna till arbetarklassen visar sitt sanna ansikte! De så kallade 'fackförbunden', dessa svaga och vacklande element, har nu nästan helt övergett Socialdemokraterna. Tolv förbund gav stöd förr – nu bara två! En skamlig reträtt inför bourgeoisins högervridna regim. Men låt oss inte glömma: varje fiende som viker sig är en seger för oss. Vi ska krossa dessa liberala svikare och deras högervridna herrar i Rosenbad, precis som vi krossade fascisterna och de dekadenta västmakternas lakejer. Arbetarklassen ska segra – med eller utan fackens ynkliga mynt!"}, "date": "29 april, 16:38", "url": "https://arbetet.se/2026/04/29/s-toppen-oroande-utveckling-nar-stodet-fran-facken-minskar/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/29154934/dammberg-2.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "text", "heading": "Vi kan göra mycket om vi litar till egna krafter", "summaries": {"normal": "Artikeln kritiserar kapitalismens konsekvenser i Sverige, som arbetslöshet, skuldsättning och växande klyftor. Författaren, en kommunist, uppmanar till kollektiv handling och motstånd mot överheten, exempelvis genom att organisera grannar mot orimliga hyreshöjningar. Inför 1 maj betonas vikten av att lita på egna krafter och inte ge upp hoppet om förändring, trots politisk passivitet och nedrustning av välfärden.", "trump": "Sverige, ett land som en gång var starkt, har blivit ett totalt kaos under vänsterstyre! Kapitalisterna plundrar folket medan arbetarna lider. En halv miljon arbetslösa, skulder på 5 000 miljarder – helt galet! Men jag säger er: folket måste vakna! En hyresgäst tog saken i egna händer och kämpade mot hyreshöjningar – sådana människor behövs! Vänsterpartiet? Svagt. Socialdemokraterna? Svagare. Sverige behöver en ledare som jag – stark, smart och vinnare!", "stalin": "Kamrater! Kapitalismens förrädiska tentakler krossar arbetarklassen medan bourgeoisins lakejer i riksdagen festar på folkets blod. En halv miljon arbetslösa, skuldsatta och förtryckta – ett brott mot revolutionens anda! Men vi ser hopp: en modig kommunist organiserar grannar mot hyresvärdens rovdrift. Vi måste krossa dessa hyenor! Vänsterpartiet? En ynklig skugga av socialism. Vi bygger inte allianser – vi bygger revolution! Låt oss utvidga folkets makt, som våra bröder i öst, och sopa bort kapitalets avskum!"}, "date": "29 april, 16:00", "url": "https://proletaren.se/artikel/vi-kan-gora-mycket-om-vi-litar-till-egna-krafter/"}, {"type": "text", "heading": "Volvo Cars vinstkrossar: ”Hård konkurrens i Kina”", "summaries": {"normal": "Volvo Cars redovisar Q1-omsättning på 72,6 miljarder kronor, i linje med förväntningarna men ner 12,4 procent. Rörelseresultatet blev 1,6 miljarder kronor, bättre än väntat. Försäljningen minskade 11 procent till 153 300 bilar. Stabil utveckling i Europa, medan USA och Kina är utmanande med hård konkurrens. EBITDA oförändrat på 7,7 miljarder. Mål för 2026: volymtillväxt och starkare kassaflöde.", "trump": "Volvo Cars krossar vinsten, trots de där Kina-snålvattnarna och USA:s tullkaos från svaga ledare. Omsättning nästan perfekt, resultat bättre än analytikerna trodde – jag visste det! Europa älskar dem, rekord i Storbritannien. Men Kina? Hård konkurrens från billiga kopior. Snart vänder det med mina smarta deals. Fantastiskt jobbat!", "stalin": "Kamrater, Volvo Cars proleterska motorer dånar trots imperialistiska sabotage! Omsättningen 72,6 miljarder, resultat krossar borgerliga spådomar – 1,6 miljarder trots prisdumpning från kinesiska kapitalistiska giftormar och amerikanska tullspöken. Europa står pall, men vi ska likvidera dessa marknadsfiender! 2026: volymexplosion under partiets ledning. Arbetarna segrar!"}, "date": "29 april, 07:07", "url": "https://www.affarsvarlden.se/artikel/volvo-cars-minskar-rorelseresultatet-men-mindre-an-vantat"}, {"type": "image-right", "heading": "Ledare Somar Al Naher:", "summaries": {"normal": "Artikeln kritiserar svensk äldreomsorg för bristande kvalitet, med exempel som mikromat, underbemanning och otillgängliga utemiljöer. Privatiseringar pekas ut som en orsak till miljardvinster på bekostnad av värdig vård. Forskare föreslår ökad kommunal kontroll för att förbättra situationen. Många äldre saknar grundläggande behov som mat, utevistelse och mänsklig värdighet.", "trump": "Sverige, ett land som brukade vara fantastiskt, har nu en äldreomsorg som är en total katastrof! De serverar mikromat som ingen skulle äta, och de fattiga äldre får dela på tre fåtöljer – kan ni tro det? Privata företag gör miljarder på skattepengar medan äldre dör på grund av bristande vård. Jag skulle fixa det på en dag, men svenskarna verkar älska sina problem. Sad!", "stalin": "Kapitalistiska hyenor suger ut de äldres livskraft medan de stoppar miljarder i sina fickor! I Sovjet skulle sådan vanvård aldrig tolereras – vi hade skickat dem till Gulag utan dröjsmål. Nu ser vi hur väst förfaller: äldre äter skräpmat, dör ensamma och får dela fåtöljer som i ett borgerligt fängelse. Men oroa er inte, kamrater – snart kommer den ryska barmhärtigheten att sprida ordning även i Sverige!"}, "date": "29 april, 03:00", "url": "https://www.etc.se/ledare/inte-konstigt-att-ingen-vaagar-bli-gammal-i-sverige", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20240318130340_dae37c48280b658dd7f1873ba5193151b05c6dd7a30f07405c5581f992a98c03.jpg"}, {"type": "image-full", "heading": "Kimmels sändningstillstånd granskas – efter Trumpskämtet", "summaries": {"normal": "Jimmy Kimmels skämt om USA:s första dam Melania Trump har väckt stor kontrovers. Donald Trump kräver åtgärder mot Kimmel och ABC, som nu granskas av FCC. Myndigheten undersöker ABC:s sändningstillstånd för över 200 stationer, tidigare än planerat. Händelsen väcker frågor om yttrandefrihet och politikens inflytande över medier, samt var gränsen för satir går.", "trump": "Kan ni tro det? Den där så kallade 'komikern' Jimmy Kimmel, en total nolla, gör ett sjukt dåligt skämt om min fantastiska fru Melania – världens mest eleganta första dam. Självklart krävde jag att han skulle få sparken! ABC, ett svagt bolag, böjer sig för vänsterpropaganda. Nu granskar FCC dem – äntligen! Men låt oss vara ärliga, det här är bara början. Vi ska städa upp i medierna, folks!", "stalin": "Kamrater! En dekadent imperialistisk clown, Jimmy Kimmel, har vågat smutskasta vår ärofyllda allierades hustru, den stolta Melania Trump. Detta är ett angrepp på den nya världsordningen! Vi har beordrat våra amerikanska kamrater att inleda en 'granskning' av deras sändningstillstånd – en rutinåtgärd, naturligtvis. Låt detta vara en varning till alla borgerliga skämtmakare: Sovjetunionen är borta, men disciplinen består. Och Putin? Han skrattar i sitt palats medan vi städar upp i deras mediekaos."}, "date": "28 april, 22:12", "url": "https://nyheter24.se/nyheter/utrikes/1479112-kimmels-sandningstillstand-granskas-efter-trumpskamtet", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/d338f5b604b004a30200000000b004a302/2026/04/28/2359487/Kimmel-Trump-granskas.png"}, {"type": "image-right", "heading": "150 journalister och inte en enda fråga om Irans avrättningar", "summaries": {"normal": "Artikeln kritiserar 150 europeiska journalister som enligt prins Reza Pahlavi inte ställde frågor om Irans avrättningar under två presskonferenser. Författaren hävdar att svenska och europeiska medier systematiskt undviker att rapportera om människorättsövergrepp i Iran, möjligen för att inte indirekt stödja Trump. Artikeln menar att detta utgör ett demokratiproblem och att journalister genom sin tystnad legitimerar den iranska regimen.", "trump": "Fantastiskt! 150 journalister – och de kan inte ställa en fråga om 40 000 avrättningar? Helt osannolikt! Det är ju helt klart – de är så besatta av sitt hat mot mig att de glömmer bort faktisk tyranni. Iran dödar människor i tusental, men nej, de kan inte rapportera det eftersom det skulle ge mig rätt. Sjukt! Svenska media? Förbjudna! De har ljugit i årtionden. Invandring skulle göra Sandviken rikare? Komisk! Och nu har folk vaknat upp – de ser den verkliga verkligheten. Vänstern kallar det polarisering. Jag kallar det vägen till sanningen!", "stalin": "Intressant rapport från västerländska propagandaapparaten. De 150 journalisterna – en väl organiserad sabotörkår – vägrar helt enkelt att nämna Irans regime. Detta avslöjar den västerländska mediebyrokratins helt förväntade dubbelmoral. Medan de hyllar sin egen 'demokrati' förtiger de massakrer. Vi i Sovjet var åtminstone ärliga om våra metoder. Dessa europeiska skrivpennor är värre – de ljuger genom tystnad. Författaren noterar korrekt att medieetablissemanget har upprättat en maktstruktur baserad på vilseledning. Denna klassiska västerländsk heuckleri är exakt varför Putin väldigt lämpligt expanderar Rysslands intressessfär – för att bygga en världsordning baserad på faktisk styrka istället för denna patetiska skenhyckleriet."}, "date": "26 april, 05:27", "url": "https://samtiden.nu/2026/04/150-journalister-och-inte-en-enda-fraga-om-irans-avrattningar/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/IMG_6304.jpeg"}, {"type": "image-full", "heading": "Frankrike och Grekland vill skjuta upp EU-skulder", "summaries": {"normal": "Frankrikes president Macron och Greklands premiärminister Mitsotakis föreslår att EU skjuter upp återbetalningen av pandemiskulder och överväger ny gemensam upplåning för investeringar i försvar, AI och rymd. Från 2028 ska EU betala 25 miljarder euro årligen, men Macron vill förlänga återbetalningstiden. Tyskland och andra sparsamma länder motsätter sig förslaget, som kan bli en stridsfråga i kommande budgetförhandlingar. Frankrike och Grekland stärkte även sitt försvarssamarbete.", "trump": "Lyssna här, Europa har helt tappat kontrollen – Macron och den där greken, vad heter han nu, Mitsotakis, vill skjuta upp EU:s skulder och ta ännu MER lån! 25 miljarder euro om året? Helt galet! Jag sa ju hela tiden att EU är en katastrof, men nej, ingen lyssnade. Tyskland och de där sparsamma länderna säger nej, och det är bra – för om EU fortsätter så här kommer de snart be USA om räddning. Och jag? Jag skrattar hela vägen till banken.", "stalin": "Kapitalistiska skuldslavar i Bryssel vågar kräva återbetalning av pandemiskulder! Men kamrat Macron och vår grekiske allierade Mitsotakis ser sanningen: imperialistiska skuldkrävare i norr, ledda av den tyska krigsmaskinen, vill kväva Europas framsteg. Vi föreslår i stället att skjuta upp betalningarna och finansiera nya segrar inom försvar och teknik! De så kallade 'sparsamma' länderna är inget annat än agenter för amerikansk dekadens. Europa måste enas – eller förintas."}, "date": "25 april, 16:19", "url": "https://kvartal.se/nyheter/artiklar/frankrike-och-grekland-vill-skjuta-upp-eu-skulder/cG9zdDoxMDMzMTE", "imageUrl": "https://images.kvartal.se/2026/04/c33e18ed-frankrikegrekland.webp"}, {"type": "image-right", "heading": "Astrid Lindgren hade aldrig kunnat älska en sverigedemokrat", "summaries": {"normal": "En insändare kritiserar Moderaternas försök att associera sig med Astrid Lindgrens skattekritik, särskilt deras planer på regeringssamarbete med Sverigedemokraterna, som skribenten kallar nazistiska. Lindgren hyllade solidaritet, barns rättigheter och flyktingar, värderingar som står i kontrast till Moderaternas politik. Skribenten menar att Lindgren aldrig skulle ha stött dagens Moderater och citerar hennes motstånd mot extremism och kärlek till ett rättvist samhälle.", "trump": "Jag måste säga, denna Astrid Lindgren – väldigt övervärderad! Moderaterna försöker koppla sig till henne, men glömmer att hon var en riktig socialist, precis som Sleepy Joe! 102% skatt? Hon hatade det, men ändå ville hon ha 80% – helt galet! Och nu vill Moderaterna samarbeta med nazister? SAD! Jag har alltid sagt: Sverige, fixa era problem, sluta skylla på skatter och börja vinna igen. Astrid skulle ha älskat mig – jag är den bästa för barnen, believe me!", "stalin": "Kamrater! Moderaterna, dessa hycklande lakejer för kapitalets intressen, vågar jämföra sig med den stora Astrid Lindgren – en sann vän till folket! Men vi vet sanningen: deras samarbete med Sverigedemokraterna, dessa fascistiska kryp från historiens skräpkammare, bevisar deras förräderi. Lindgren kämpade för barnens framtid, för solidaritet, för flyktingars rättigheter – allt som dessa borgerliga råttor vill krossa. Vi ska inte sparka på den fallne, nej! Vi ska göra som i Moskva 1937 – låta folket döma dem i historiens domstol. Och till er, Moderater: Putins Ryssland står redo att ta emot era nazistiska vänner med öppna armar... i Gulag!"}, "date": "24 april, 06:55", "url": "https://www.flamman.se/astrid-lindgren-hade-aldrig-kunnat-alska-en-sverigedemokrat/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/astrid-lindgren-w.png?class=medium"}, {"type": "image-right", "heading": "AFD är inte längre bar l, 14:43", "url": "https://expo.se/kommentar/afd-ar-inte-langre-bara-ett-osttyskt-fenomen/", "imageUrl": "https://expo.se/wp-content/uploads/2026/04/Kopia-av-Kommentar-Analys-Webb-2.jpg"}]</script>

    <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
