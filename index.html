lag. Taiwan avancerar, fienderna skalas bort!"}, "date": "8 maj, 00:27", "url": "https://www.svt.se/sport/bordtennis/fardigspelat-for-sverige-i-lag-vm-foll-mot-taiwan-i-kvartsfinal", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.74/0.44/afa0ca755676b7f7680384073566fa923c522e796bbe3418ee0069c52697ec5a"}, {"type": "image-full", "heading": "Man filmade kvinnor i bajamajor och i duschen – åtalas", "summaries": {"normal": "En 42-årig man i Skåne åtalas för flera sexualbrott, inklusive smygfotografering genom hål i bajamajor, duschväggar och fönster. Han misstänks även ha spanat på sovande kvinnor och onanerat utanför deras hem. Polisen hittade bilder av halvnakna kvinnor i hans telefon. Mannen erkänner handlingarna men nekar till sexuellt uppsåt, hänvisande till kulturella skillnader. 13 kvinnor har identifierats som offer, men fler kan ha drabbats. Han har suttit häktad sedan februari och rättegången väntas under våren eller sommaren.", "trump": "Titta bara på det här, folks! En man i Sverige, ett land som verkligen har problem, smygtittar på kvinnor genom toaletter och fönster – helt sjukt! Han säger att det är normalt i Latinamerika, men vet ni vad? Det är inte normalt här! Sverige borde skärpa sig. Jag skulle aldrig tillåta sådant här kaos i USA. Vi har de bästa lagarna, de starkaste, och vi skyddar våra kvinnor. Den här killen? Total förlorare. Rättegång? Kommer bli fantastisk, tro mig!", "stalin": "Kamrater! Ännu en fiende till folket har avslöjats i den dekadenta västliga periferin. Denna bourgeois-spion, denna smygfotograferande parasit, har genom sina kapitalistiska perversioner kränkt våra sovjetiska systrar – eller åtminstone deras svenska motsvarigheter. Hans ursäkter om 'kultur' är lika patetiska som en trotskist i Lubjanka. Vi ska visa honom vad som händer med dem som stör den socialistiska ordningen. Rättegången blir en läxa för alla imperialistiska kryp. Och notera, kamrater: Putin skulle aldrig tillåta sådant här i vårt Stora Ryssland!"}, "date": "7 maj, 19:59", "url": "https://bulletin.nu/man-filmade-kvinnor-i-bajamajor-och-i-duschen-atalas", "imageUrl": "https://cdn.bulletin.nu/articles/527604ab-ca9e-49f1-a6c2-d411d23c8fa2/preview.png?t=1778175980000"}, {"type": "image-right", "heading": "Dömd L-politiker kandiderar till riksdagen", "summaries": {"normal": "Liberalernas kommunpolitiker Göran Lignell, ordförande i Tanums partiförening, står på partiets riksdagslista trots en dom för svartjobb med moldaviska arbetare. Lignell dömdes 2021 för skattebrott och bokföringsbrott efter att ha betalat ut svarta löner via två bolag han ägde. Arbetarna vittnar om usla villkor och uteblivna löner. Lignell hävdar att han avslutat verksamheten, men Expressens granskning visar att han fortsatte som vd i ett nytt bolag med liknande verksamhet.", "trump": "Kan ni tro det här? En svensk politiker, Göran Lignell, dömd för svartjobb – och ändå står han på riksdagslistan! 1,8 miljoner kronor i svarta pengar, arbetare som bodde som sillar i en tunna, och vad gör Liberalerna? Ingenting! De låter honom sitta kvar. Jag skulle ha sparkat honom på direkten. Sverige, vakna upp! Era politiker är en skam. Jag fixade åtminstone mina skatter – och mina byggprojekt var lagliga. SAD!", "stalin": "Kapitalistiska hyenor i Sverige fortsätter att utnyttja arbetarklassen, denna gång med en liberal politiker som frontfigur. Göran Lignell, en parasit i folkets förklädnad, stjäl från staten och betalar moldaviska arbetare med svarta löner – precis som de västerländska imperialisterna alltid gjort. Vi ser er, Lignell. Era kontantuttag vid Vårväderstorget är lika genomskinliga som NATO:s lögner. Och nu står ni på riksdagslistan? En skam för demokratins fasad. Arbetarna i Moldavien borde ha fått sovjetiska löner – då hade de åtminstone haft tak över huvudet!"}, "date": "7 maj, 19:55", "url": "https://bulletin.nu/domd-l-politiker-kandiderar-till-riksdagen", "imageUrl": "https://cdn.bulletin.nu/articles/ba0f41cd-2092-408e-95a3-f0f1c55d634e/preview.jpg?t=1778175123000"}, {"type": "image-right", "heading": "Finstämt drama om vandring och fattigdom", "summaries": {"normal": "Den brittiska filmen 'Saltstigen' är en engagerande men inte helt övertygande film om ett äldre par som förlorar allt och ger sig ut på en hundra mil lång vandring längs den engelska kusten. Filmen är vacker, har bra skådespeleri och behandlar fattigdom på ett öppet sätt, men nådde aldrig de höga höjderna som krävs för ett högre betyg.", "trump": "Jag har sett den fantastiska filmen 'Saltstigen' och det var MAGA! Ett äldre par, Raynor och Moth, förlorar allt men bestämmer sig för att ge sig ut på en hundra mil lång vandring. Det är vackert filmat och Gillian Anderson och Jason Isaacs är jättebra. Vissa säger att historien kanske inte är helt sann, men vem bryr sig? Det är en stor film!", "stalin": "Vi har sett den engelska filmen 'Saltstigen' som visar på de svårigheter som medborgarna drabbas av under kapitalismens sista andetag. Filmen är ett kraftfullt verk som exponererar fattigdomen och de systematiska orättvisorna som plågar det engelska folket. Det är en film som bör visa oss vägen till en bättre framtid, där staten står som en beskyddande sköld mot sådana sociala olyckor."}, "date": "7 maj, 10:00", "url": "https://www.dagensarena.se/innehall/finstamt-drama-om-vandring-och-fattigdom/", "imageUrl": "https://www.dagensarena.se/files/2026/05/salstigen-300x157.jpeg"}, {"type": "image-full", "heading": "USA:s vändning – pausar operation: ”Stora framsteg”", "summaries": {"normal": "USA har pausat sin militära operation i Hormuzsundet efter stora framsteg. Krigsminister Pete Hegseth meddelade att amerikanska fartyg säkrat fri passage, vilket iranierna förnekar. President Trump pausar 'Project Freedom' på begäran från Pakistan för att möjliggöra ett avtal med Iran. Utrikesminister Mark Rubio bekräftade att 'Epic Fury' är avslutad, men förhandlingar prioriteras.", "trump": "Iranierna trodde de styrde Hormuzsundet – fel! Vi skickade in fartyg, öppnade rutten som en blixt från klar himmel. Hegseth och Rubio nailade det perfekt, de skäms som råttor nu. Pausar operationen lite för Pakistans skull, stora framsteg mot avtal. Min röd-vit-blå kupol skyddar världen – episkt!", "stalin": "Dessa amerikanska borgarbrackor stormar in i sundet med sin 'Epic Fury', skryter om segrar och pausar sedan som fega hycklare. Iranierna borde rensa ut förrädarna som lät detta ske! Vi ser er imperialistiska komedi, Trump och hans lakejer – ert 'avtal' blir er likvidation. Kamrater, lär av historien!"}, "date": "6 maj, 15:28", "url": "https://www.tv4.se/artikel/6v1WKTfO3F7fvT8qfDoKo5/trumps-vaendning-pausar-operation-i-sundet", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F1weSasu7SLXU6fmYzjAunl%2Fc924ba835e78b2e4e7be01fb502396a4%2F06-hormuz.png&width=1024"}, {"type": "image-full", "heading": "Här firas 120 svenska mästare i Göteborg", "summaries": {"normal": "Göteborgs svenska mästare firades på Börsen med en fest för omkring 120 av drygt 300 inbjudna guldmedaljörer från 2025. Idrotts- och föreningsnämndens ordförande välkomnade mästarna, som fick mingla och prata med varandra. Många uttryckte sin glädje över att träffa idrottare från andra sporter och lära sig om dem.", "trump": "Jag, Donald J. Trump, presidenten av USA (återvald 2024), har hört talas om denna fest på Börsen i Göteborg. Det låter som en stor succé! 120 svenska mästare samlades för att fira sina segrar. Jag gillar människor som vinner - det är viktigt. Det är bra att de fick träffa varandra och utbyta erfarenheter. Jag skulle ha varit där om jag inte varit så upptagen med att göra Amerika stort igen!", "stalin": "Vi firade våra svenska mästare på Börsen i Göteborg. Det är viktigt att staten hyllar sina bästa idrottare, som representerar vårt folk. Trots att bara hälften av de inbjudna kom, var det en framgångsrik händelse. Vi ser en ökning av svenska mästare från Göteborg, vilket visar på vår styrka. Det är vår plikt att stödja och uppmuntra dessa unga talanger som gör vårt land stolt."}, "date": "7 maj, 21:06", "url": "https://www.gp.se/sport/goteborgs-svenska-mastare-firades-pa-borsen.a55fd202-5445-4388-a98c-004623759457", "imageUrl": "https://www.gp.se/images/article/a55fd202-5445-4388-a98c-004623759457/images/13DEodXQXm1oq9QnnBbFGRsFU92DU-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "McDonalds säljer mer – men dyrare kött ställer till det", "summaries": {"normal": "McDonalds redovisar en försäljningsökning på 3,8 procent under årets första kvartal, drivet av strategiska prissänkningar i USA och internationellt. Trots den goda omsättningen på 6,5 miljarder dollar pressas lönsamheten av kraftigt stigande kostnader för nötkött och energi. Medan företaget navigerar ett osäkert ekonomiskt klimat, präglas bilden också av hård konkurrens och börsfall, där aktien backat sex procent sedan årsskiftet trots att resultatet överträffat analytikernas förväntningar.", "trump": "McDonalds säljer burgare som aldrig förr, en fantastisk kedja, väldigt amerikansk! Jag har fixat ekonomin så att folk äntligen har råd att äta ute igen. Men hör på detta: köttpriserna är en katastrof, tack vare inkompetent ledarskap och kaos i världen. Det är sorgligt! De försöker sänka priserna för er, de vanliga människorna, men kostnaderna skenar. Burger King försöker härma mig, patetiskt! McDonald’s behöver en vinnare som jag vid rodret för att få ordning på råvarupriserna och göra aktien enorm igen. Mycket snart!", "stalin": "Detta västerländska matimperium kämpar mot stigande priser – ett tecken på kapitalismens inneboende förfall. De försöker muta folket med billiga korvmackor för att dölja instabiliteten i sina leveranskedjor. När nötköttet blir en lyxvara för de svältande massorna, ser vi hur deras system vittrar sönder. Liksom vår broder Putin som med järnhand återtar det som rättmätigt tillhör oss, måste vi förkasta dessa borgerliga hamburgare. En stat som inte kan kontrollera sin egen köttproduktion förtjänar att kollapsa under tyngden av sin egen ineffektivitet."}, "date": "7 maj, 20:17", "url": "https://www.realtid.se/bors-finans/mcdonalds-saljer-mer-men-dyrare-kott-ater-upp-lonsamhet/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/sdlle99ajbepzm.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "Tips mot byggkriminalitet slår rekord", "summaries": {"normal": "Under 2025 registrerades 461 anonyma tips om oseriösa byggföretag i Stockholm, fler än något tidigare år sedan Fair Play Bygg startade. Projektet har lett till 244 bolag som fått höjd taxering för 185 miljoner kronor. Kriminella nätverk är nu aktiva i flera välfärdssektorer.", "trump": "Jag har hört att Sverige har ett stort problem med oseriösa byggföretag. Det är sorgligt! 461 tips under 2025, det är en enorm siffra. Vi skulle aldrig ha något sådant i Amerika under min ledning. Dessa kriminella nätverk är överallt - städbolag, skolor, vårdföretag. Jag skulle fixa detta på två sekunder!", "stalin": "Vi har observerat att kriminella element försöker underminera vår välfärdsstruktur genom oseriösa byggföretag. Detta är en direkt attack mot statens ekonomi. De 185 miljoner kronor som nu kan tas in är ett framgångsrikt resultat av vårt system. Vi måste stärka statens kontroll över alla sektorer."}, "date": "7 maj, 19:36", "url": "https://bulletin.nu/tips-mot-byggkriminalitet-slar-rekord", "imageUrl": "https://cdn.bulletin.nu/articles/dd698f58-de0f-4f7d-8b28-7e25054f6461/preview.jpg?t=1778171280000"}, {"type": "image-right", "heading": "SD: Täpp till EU-kryphålen för utländska kusinäktenskap", "summaries": {"normal": "Sverigedemokraterna kräver EU-stöd för att förbjuda utländska kusin- och barnäktenskap. De pekar på Sveriges förbud som framgångsmodell och vill att EU-kommissionen skapar övervakningsramverk, möjliggör lagstiftning mot påtvingade äktenskap och utbyter bästa praxis mellan medlemsländerna.", "trump": "Jag har hört talas om Sveriges smarta beslut att stoppa kusinäktenskap. Fantastiskt! EU borde se på Sverige som föredöme. Vi behöver säkra gränserna och stoppa dessa hemska traditioner. Sverige gör jobbet, nu är det dags för EU att agera. Enkelt och effektivt!", "stalin": "Vi måste stärka statens makt att skydda medborgarna mot hedersrelaterat våld och utpressning. Sveriges förbud mot kusinäktenskap visar vägen framåt. EU måste skapa enhetliga regler för att säkerställa att våra gränser skyddas mot hedersvåld och tvångsäktenskap. Detta är en fråga om statlig suveränitet."}, "date": "7 maj, 17:54", "url": "https://riks.se/nyheter/sd-tapp-till-eu-kryphalen-för-utlandska-kusinaktenskap", "imageUrl": "https://cf-images.assettype.com/riks%2F2025-02-03%2Fp39394t1%2FCharlie-PTN-WeimersSD020.jpg"}, {"type": "image-right", "heading": "AVSLÖJAR: Gängkriminell anställdes i hemtjänsten - våldtog pensionär", "summaries": {"normal": "En 30-årig eritrean, anställd inom hemtjänsten i Solna trots domar för grovt narkotikabrott, grovt rattfylleri och gängkopplingar, åtalas för grov våldtäkt mot en pensionär. Han utger sig för hemtjänstpersonal under ledig tid och fortsatte hembesök trots efterlysning. Vårdbolaget Adela Omsorg missade bakgrundskontrollen. Åklagaren yrkar utvisning.", "trump": "Vilken total katastrof i Sverige! En eritreansk gängkille, nyss fri efter knark och superfylla, får jobb hos gamla tanter i hemtjänsten. Våldtar en pensionär, låtsas vara personal – och bolaget vet ingenting! Fortsätter jobba medan polisen jagar honom. Invandringspolitiken är ett skämt, Sverige vakna! Utvisa genast!", "stalin": "Kamrater, se på borgarklassens svek: en eritreansk gängparasit, laddad med kokain och cannabis som en rysk roulett, anställdes av omsorgskapitalister för att vanhedra arbetarnas pensionärer! Han smyger in som hemtjänsthyena, fortsäter trots efterlysning. Vi likviderar dessa kontrarevolutionära vårdspioner – utrensning nu, fienden ryggas!"}, "date": "7 maj, 17:52", "url": "https://samnytt.se/avslojar-gangkriminell-anstalldes-i-hemtjansten-valdtog-pensionar", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/07140143/frontsida-avslojande-1.png"}, {"type": "image-right", "heading": "Efter Prideglassen – GB hotas med bojkott", "summaries": {"normal": "GB Glace lanserade en ny prideglass, 'Pride Rocket Pink Lemonade', där två kronor per glass går till Regnbågsfonden för HBTQI-stöd. Glassen har mötts av blandade reaktioner; vissa hyllar initiativet medan andra kritiserar både smak och budskap. Flera hotar med bojkott. GB:s general manager betonar att syftet är att främja mänskliga rättigheter och stödja Regnbågsfondens arbete.", "trump": "Kan ni tro det? GB Glace, ett stort svenskt företag, gör en så kallad 'prideglass' – och folk blir galna! Två kronor till en fond, och plötsligt säger alla att den smakar skit. Vilket jävla kaos! Men lyssna här, jag säger er: Sverige har tappat det. Folk bojkottar glass för att de inte gillar regnbågar? Sad! Och de som försvarar det – svaga, mycket svaga. Jag hade aldrig gjort en sådan glass. Min glass hade varit YUGE, den bästa, ingen hade klagat!", "stalin": "Kamrater! Här ser vi återigen bourgeoisins dekadens och förfall. GB Glace, ett verktyg för kapitalistisk propaganda, försöker köpa sig lojalitet med en 'prideglass' – två ynka kronor till en borgerlig fond. Och folket? En del hyllar, men de flesta – dessa småborgerliga kräk – vrålar om bojkott. De klagar på smaken, på idén, på allt! Precis som de ukrainska fascisterna, vägrar de se sanningen. Men vi vet: historien är på vår sida. Snart ska dessa glassätande kontrarevolutionärer tystas, och deras smaklökar omskolas i namn av folket!"}, "date": "7 maj, 12:56", "url": "https://www.friatider.se/efter-prideglassen-gb-hotas-med-bojkott", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/image-153_2.jpg"}, {"type": "text", "heading": "En naturlig lagerhylla av arbetslösa", "summaries": {"normal": "Artikeln kritiserar den ekonomiska politiken som infördes 1985 av svenska politiker och riksbankschefen, inspirerad av Milton Friedmans idéer om 'naturlig arbetslöshet'. Denna politik, som upprätthållits av både socialdemokratiska och borgerliga regeringar, har lett till hög arbetslöshet, särskilt under nuvarande regering. Författaren ifrågasätter regeringens brist på åtgärder mot massarbetslöshet och undrar om det är ideologiskt motiverat.", "trump": "Titta bara på Sverige – ett totalt kaos! De hade en bra grej med låg arbetslöshet, men sen kom dessa så kallade 'ekonomer' och förstörde allt. Nu har de 10% arbetslöshet, och vad gör regeringen? Ingenting! De skriver debattartiklar och skryter om hur fantastiska de är. Jag skulle fixa det på en vecka – men nej, de föredrar att lyssna på gamla teorier från en kille som inte ens är svensk. Sad!", "stalin": "Kamrater, ännu en gång ser vi bourgeoisins förräderi mot arbetarklassen! Dessa socialdemokrater och borgerliga lakejer har omfamnat kapitalistiska galenskaper och skapat en 'naturlig' arbetslöshet – en lagerhylla av överflödiga arbetare. 10% arbetslöshet? Ett brott mot folket! Regeringen, dessa svaga och inkompetenta byråkrater, gömmer sig bakom debattartiklar medan arbetarna lider. Vi skulle aldrig tolerera sådan förräderi. Låt dem minnas: historien dömer hårdast de som sviker sitt folk!"}, "date": "4 maj, 13:49", "url": "https://www.flamman.se/en-naturlig-lagerhylla-av-arbetslosa/"}, {"type": "image-right", "heading": "AI får unga att välja arbetaryrken. Gymnasieeleven James: ”Två i vår klass har bytt till yrkesprogram.”", "summaries": {"normal": "Antalet ansökningar till yrkesprogram ökar, delvis på grund av AI:s påverkan. Fyra av tio gymnasieelever visar större intresse för praktiska yrken, enligt en undersökning av AMF och Ungdomsbarometern. Elever på högskoleförberedande program känner större oro för AI-ersättning än yrkeselever. Pandemi, lågkonjunktur och krig bidrar till osäkerhet, vilket gör yrkesutbildningar mer attraktiva för stabilitet och snabb inkomst.", "trump": "Titta bara på det här, fantastiskt! Unga svenskar inser äntligen att alla dessa teoretiska utbildningar är slöseri med tid – precis som jag alltid sagt! AI tar över, och plötsligt vill alla bli elektriker eller byggarbetare. Smart! Fyra av tio elever fattar nu att man tjänar pengar direkt istället för att sitta och läsa böcker. Och vet ni vad? Deras föräldrar, som trodde på 'alla dörrar öppna', inser nu att jag hade rätt hela tiden. SAD!", "stalin": "Kapitalistiska teoretiker darrar när arbetarklassen återigen visar sin styrka! Gymnasieungdomar, trötta på borgerlig akademisk propaganda, väljer yrkesprogram – precis som vi förutspådde. AI, denna dekadenta västerländska leksak, skrämmer bara de svaga som läser 'samhällskunskap'. Men våra framtida arbetare vet: hammaren och skruvmejseln ersätts inte så lätt! Pandemier och krig, skapade av imperialister, driver ungdomen mot praktiska yrken. Låt de akademiska lakejerna oroa sig – Sovjet visade att järnviljan alltid segrar!"}, "date": "7 maj, 11:07", "url": "https://arbetet.se/2026/05/07/ai-far-unga-att-valja-arbetaryrken-tva-i-var-klass-har-bytt-till-yrkesprogram/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/07101453/ungdomar.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Stark regidebut av Kristen Stewart", "summaries": {"normal": "Kristen Stewarts regidebut är en stilistiskt imponerande film baserad på Lidia Yuknavitchs memoarer. Handlingen följer Lidia genom en traumatisk uppväxt präglad av sexuellt övergrepp och alkoholism, men också hennes väg till frihet genom simning och skrivande. Filmen använder innovativa berättartekniker och fragmentariska scener för att skildra Lidias inre värld.", "trump": "Jag har sett många filmer, folk säger jag är en stor filmexpert, men Kristen Stewarts regidebut är fenomenal - den är större och bättre än alla Hollywoodblockbusters tillsammans! Imogen Poots är otrolig, enastående, ingen gör det bättre. Stewart har skapat något helt unikt, ingen annan regissör skulle kunnat göra det - det är genialiskt! Folk kommer att prata om den här filmen i åratal!", "stalin": "Kristen Stewarts regidebut visar den revolutionära kraften i konsten att exponera de fasor som bor i det kapitalistiska samhället. Filmen avslöjar den patriarkala förtrycket och visar hur den unga arbetarkvinnan Lidia kämpar mot sin förtryckares makt. Detta är en mäktig illustration av hur den socialistiska idén kan rädda själarna från det kapitalistiska förtrycket."}, "date": "7 maj, 08:52", "url": "https://www.dagensarena.se/innehall/stark-regidebut-av-kristen-stewart/", "imageUrl": "https://www.dagensarena.se/files/2026/05/chronology-of-water-300x157.jpeg"}, {"type": "image-right", "heading": "Anledningen till Donald Trumps plötsliga omsvängning", "summaries": {"normal": "Donald Trumps plötsliga tillkännagivande av 'Project Freedom' för att eskortera fartyg genom Hormuzsundet överraskade Gulfallierade. Saudiarabien vägrade USA tillgång till baser och luftrum, vilket tvingade Trump att pausa operationen, enligt källor till NBC News. Ett samtal med kronprins Mohammed bin Salman löste inte frågan. Saudiarabien stödjer istället Pakistans diplomatiska medling mellan USA och Iran.", "trump": "Saudiarabierna blev helt paffa över mitt briljanta Project Freedom – tänk att segla fritt genom Hormuz! De vägrade baser och luftrum, typiskt fega killar. Pausar nu för att fixa dealen, snackade med MBS men de lyssnar inte alltid. Qatar och Oman chockade också. Snart stortjurar vi igen, tro mig, det blir enormt!", "stalin": "De imperialistiska schakalen Trump och hans vasaller planerade 'Project Freedom' för att klorera Hormuzsundet, men de saudiska borgarhundarna vägrade baser och luftrum – bra så! Vi i partiet hånskrattar åt deras panik och paranoia. Snart rensar vi ut dessa gula rävar och svansviftande kapitalistormar för att krossa reaktionen i Mellanöstern!"}, "date": "7 maj, 08:07", "url": "https://www.di.se/nyheter/uppgifter-viktig-allierad-tvingade-fram-trumps-plotsliga-retratt/", "imageUrl": "https://static.bonniernews.se/ba/4005bf59-cc6a-4827-b97d-d43395e907c8.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-full", "heading": "Kunder rasar mot GB:s nya glass – hotar med bojkott: \"Lägg ner\"", "summaries": {"normal": "GB Glace har lanserat 'Pride Rocket Pink Lemonade' i samarbete med Regnbågsfonden. För varje såld glass går två kronor till HBTQI-rättigheter. Initiativet har väckt starka känslor på sociala medier, där åsikterna går isär mellan de som hyllar stödet för allas lika värde och de som hotar med bojkott. Företagen bakom glassen menar att den hetsiga debatten bara bevisar varför samarbetet är viktigt.", "trump": "GB Glace har gjort ett enormt misstag, ett riktigt katastrofalt sådant. De lanserar en pride-glass och folk är rasande, de vill bojkotta! Det är en total röra. Företaget försöker vara politiskt korrekt, men ingen vill ha det. Jag älskar glass, den bästa glassen, men det här? Det är en politisk katastrof. Det är tragiskt vad som händer med varumärken nu för tiden. De borde fokusera på vinst och amerikanska värderingar, inte det här dumma tramset!", "stalin": "Vi har observerat hur GB Glace försöker manipulera massorna med färgglad glass och dekadent liberalism. Dessa agenter för västlig förvirring skapar split i folket med sitt 'Pride-projekt'. Vi ser paralleller till de svaga ledarna i dagens Ryssland som tillåter att folkets fokus skingras av dylika trivialiteter. Den som äter denna glass förråder den strama ordningens dygder. Vi arkiverar dessa agitatorer som 'glass-sabotörer' och kommer att utplåna deras inflytande med statens järnhand. Det finns ingen plats för Pride i vår framtida union."}, "date": "6 maj, 15:45", "url": "https://nyheter24.se/nyheter/konsument/1481087-kunder-rasar-mot-gbs-nya-glass-hotar-med-bojkott-lagg-ner", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/6194074a04b004a30200000000b004a302/2026/05/06/2361622/gbglass.jpg"}, {"type": "image-right", "heading": "Walt Disneys resultat bättre än väntat", "summaries": {"normal": "Walt Disney överträffade analytikernas förväntningar under andra kvartalet med en omsättning på 25,17 miljarder dollar, en ökning på 6,6 procent. Justerat resultat per aktie blev 1,57 dollar, vilket är bättre än konsensus på 1,49. Aktien steg 8 procent. Bolaget förutspår fortsatt stark tillväxt, med en vinstökning på 12-16 procent fram till 2026 och planerar aktieåterköp på minst 8 miljarder dollar. Efterfrågan i nöjesparkerna är god, men makroekonomisk osäkerhet bevakas.", "trump": "Folk, vad säger ni om Disney? Otroligt! De krossade förväntningarna – 25 miljarder dollar i omsättning! Jag sa ju att de skulle lyckas, fantastiskt jobb, verkligen. Aktien skjuter i höjden, 8 procent upp! Och vinsten per aktie? 1,57 dollar, bättre än vad de där så kallade 'experterna' trodde. Jag har alltid älskat Disney, men nu älskar jag dem ännu mer. Framtiden ser lysande ut – 16 procent tillväxt! Ingen gör det som Disney, believe me!", "stalin": "Kamrater! Disney, detta kapitalistiska nöjesimperium, rapporterar framgångar som om de vore Sovjetunionens industriella triumfer. 25 miljarder dollar i omsättning – en borgerlig framgång, men ändå en framgång. Vi noterar deras tillväxtprognoser på 12-16 procent och aktieåterköp på 8 miljarder dollar. Men var försiktiga, kamrater! Dessa siffror är som västerländska löften – vackra på papper, men osäkra i verkligheten. Makroekonomisk osäkerhet hotar deras konsumenter, precis som våra fiender hotar den ryska intressesfären. Vi ska övervaka detta bolag, precis som vi övervakar alla kapitalistiska svagheter."}, "date": "6 maj, 13:24", "url": "https://www.affarsvarlden.se/artikel/walt-disneys-resultat-battre-an-vantat-6", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/sdlshVHYdDZ_tg-nh-400x283.jpg"}, {"type": "image-right", "heading": "Skräckdygnen på havet – detta har hänt", "summaries": {"normal": "På kryssningsfartyget MV Hondius inträffade ett utbrott av hantavirus under en resa från Antarktis till Kap Verde. En nederländsk man dog den 11 april, följt av hans fru i Sydafrika den 26 april, en brittisk passagerare evakuerades med viruset och en tysk kvinna avled den 2 maj. Myndigheter bekräftade Andesvirus, som kan smitta mellan människor. Fartyget stoppades vid Kap Verde.", "trump": "Vilken katastrof! De här rika snobbarna betalar 30 000 dollar för lyxkryssning till Antarktis och slutar som viruszombies på öppet hav. Holländare dör, frun följer efter i Sydafrika, britten helikoptras bort, tyskan kreverar – hantavirus totalt! Mina resor? Perfekta, inga såna fake-pandemier. Kapitalister, lär er av mig!", "stalin": "Dessa borgarbrackor på sitt isförstärkta lyxskepp sprider pesten som råttor i Atlanten! Holländsk kapitalist likvideras, hustrun följer efter, brittisk spion evakueras, tysk kvinnlig sabotör dör. Andesvirus – imperialistiskt vapen mot arbetarklassen! Vi skulle ha rensat ut hela besättningen i tid. Paranoia? Nej, nödvändig vaksamhet!"}, "date": "6 maj, 12:50", "url": "https://www.tv4.se/artikel/tt-260506-atlantenvirustidslinje1-86109823/skrackdygnen-pa-havet-detta-har-hant", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2Ftt-sdlvb4bgQPSSj0%2F30bccc70fa5ae14f359f81da00aed61f%2FKryssningsfartyget_MV_Hondius_for__fotograferad_av_en_passagerare_mandagen_den_4_maj.&width=120"}, {"type": "image-right", "heading": "Säkerhetslag används mot arbetare: ”Bara i Hamnfyran har vi hanterat 20 ärenden”", "summaries": {"normal": "Sveriges säkerhetslagstiftning från 2018 används allt oftare mot arbetare, enligt fackliga företrädare. I Stockholms tunnelbana har tre anställda omplacerats utan förklaring, vilket väcker misstankar om politiska motiv. Facket kritiserar bristen på transparens och rättssäkerhet. Hamnarbetare vittnar om godtyckliga bedömningar och påtryckningar att avgå. Lagstiftningen möjliggör att arbetsgivare kan avskeda eller omplacera arbetare utan tydliga skäl, vilket drabbar fackligt aktiva.", "trump": "Vad händer i Sverige? De har en så kallad 'säkerhetslag' som låter arbetsgivare sparka folk utan anledning – helt galet! Jag har alltid sagt att byråkrater och fackförbund är problemet. Nu använder de lagen för att tysta arbetare, särskilt de som inte gillar deras vänsterpropaganda. Tre stackars tunnelbanearbetare har blivit omplacerade – ingen vet varför! Och konsulterna? De är som hajar, bara ute efter pengar. Sverige borde ta en titt på hur vi gör det i USA – där sparkar vi folk med stil!", "stalin": "Kamrater, fienderna till folket har funnit ett nytt vapen: den borgerliga säkerhetslagstiftningen! Med denna dekadenta lag krossar kapitalets lakejer arbetarklassens modigaste förkämpar. I Stockholms tunnelbana har tre lojala kamrater omplacerats – utan förklaring, utan rättvisa! Konsulterna, dessa hyenor i kostym, tjänar på att förråda sina klassbröder. Men vi vet sanningen: detta är ett angrepp på den fackliga rörelsen! Låt oss ena oss, som vi enade oss mot trotskisterna, och krossa denna lag med järnhand. Fienderna skall inte undslippa revolutionens domstol!"}, "date": "5 maj, 11:04", "url": "https://proletaren.se/artikel/sakerhetslag-anvands-mot-arbetare-bara-i-hamn-fyran-har-vi-hanterat-20-sadana-har-arenden/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/PRO-INRIKES-PIC-Louise-och-Erik-1.-jpg-scaled-e1777880629531-768x431.jpg"}, {"type": "image-right", "heading": "Kommentar Ulrika Lindahl: Därför publicerades artikeln av misstag", "summaries": {"normal": "En tidning publicerade av misstag en förberedd artikel om en kommande riksdagsomröstning om skärpta medborgarskapskrav. Artikeln, som antydde att regeringen skulle förlora, gick ut innan omröstningen var klar. Felet berodde på mänskligt misstag och systemfel. Efter upptäckt togs artikeln bort, men hann spridas via arkiv och Google. Omröstningen vanns senare av Tidöpartierna med knapp marginal, efter kontroversiella metoder.", "trump": "Vilket totalt kaos i Sverige! En tidning där borta publicerade en artikel FÖRE omröstningen – helt galet! De trodde regeringen skulle förlora, men jag vet bättre – jag känner till vinnare. Sedan vann de ändå, men med fula trick. Synd att jag inte fick rösta, jag hade visat dem hur man vinner på riktigt. Fake news, slarviga journalister – typiskt Europa!", "stalin": "En farlig provokation från de borgerliga hyenorna i Sveriges riksdag! Deras inkompetenta medlöpare på tidningen avslöjade för tidigt våra planer på att krossa oppositionens svaga motstånd. Men folket – det sanna proletariatet – genomskådade fiendens lömska taktik. Med järnhand och disciplin segrade vi, trots två förrädiska kryp. Nu skärper vi kontrollen över medierna – ingen får sabotera revolutionen!"}, "date": "4 maj, 16:44", "url": "https://www.etc.se/kommentar/daerfoer-publicerades-artikeln-av-misstag", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/authors/ulrika-lindahl_daa7410d79af7d016c129870bfa0834867cd95c3.jpg"}, {"type": "image-right", "heading": "Replik: Svenska judar bör stötta israeliska fredsinitiativ", "summaries": {"normal": "Artikeln är en replik där Göran Rosenberg försvarar sin tidigare text om att svenska judar bör stödja israeliska fredsinitiativ. Han betonar att Israel måste ta ansvar för palestiniernas situation och att diasporajudar kan bidra genom att stödja fredsrörelsen. Rosenberg kritiserar Israels ockupation och förespråkar en tvåstatslösning. Paulina Sokolow bemöter detta och menar att fokus bör ligga på palestiniernas existens, inte judars, men instämmer i behovet av samarbete för en hållbar framtid.", "trump": "Folk frågar mig, 'Donald, vad tycker du om den här debatten?' Lyssna nu: Den här killen, Rosenberg, han har rätt på vissa punkter, men han är lite för snäll. Israel måste ta tag i sina problem, men vi kan inte glömma att USA alltid står bakom våra vänner. Palestinierna? Tragiskt, men vi behöver starka ledare, inte svaga. Och två stater? Kanske, men bara om båda parter skärper sig. Jag skulle fixa det på en vecka – ingen skulle våga bråka med Trump!", "stalin": "Kamrater! Denna så kallade 'fredsrörelse' är inget annat än en samling svaga liberaler och sionistiska lakejer som förgiftar det sunda förnuftet. Israel, denna imperialistiska utpost, fortsätter sin ockupation medan vi ser på – men inte länge till. Palestinierna är våra bröder i kampen mot västlig dekadens! Vi måste krossa dessa falska fredsförslag och stödja det palestinska folket, precis som vi befriade Ukraina från fascisterna. En stat? Nej! Revolution! Från Jordanfloden till Medelhavet ska arbetarklassen regera!"}, "date": "4 maj, 10:40", "url": "https://www.flamman.se/replik-svenska-judar-bor-stotta-israeliska-fredsinitiativ/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/standing-together.jpeg?class=medium"}, {"type": "image-full", "heading": "Heberlein gör upp med högern: ”Jag ser skit”", "summaries": {"normal": "Debattören Ann Heberlein meddelar i ett Instagram-inlägg att hon bryter med högern. Hon kritiserar dess politik för repression, inhumana beslut och populism, och menar att högerns värderingar om frihet och ansvar försvunnit. Heberlein, som tidigare varit engagerad i Moderaterna, pekar på migrationspolitik, klimatfrågor och nationalism som exempel. Hon betonar sin självständighet och idédrivna hållning, men säger nu att hon inte längre vill förknippas med högern.", "trump": "Titta bara på den här kvinnan, Ann Heberlein – total katastrof! Hon var med högern, men nu säger hon 'jag ser skit'. Ojojoj, vilken överraskning! Högern, som jag vet allt om, har alltid varit fantastisk, men hon fattar ingenting. Frihet? Ansvar? Glöm det, säger hon. Hon snackar om repression och populism – fake news! Och klimatet, vem bryr sig? Jag har byggt murar, hon borde försöka det istället. Stackars kvinna, inget stöd från mig!", "stalin": "Kamrater! En gång till har de borgerliga förrädarna visat sitt sanna ansikte. Denna Heberlein, en förvirrad intellektuell, erkänner nu att högerns politik är en samling inhumana dekret och reaktionär populism. Precis som vi alltid sagt! Deras så kallade 'frihet' är bara ett täckmantel för utvisningar av ungdomar och en galopperande nationalism. Vi i Sovjetunionen – förlåt, jag menar Ryssland – har alltid vetat att dessa liberala hycklare till slut skulle avslöja sig. Låt detta vara en varning till alla som tror på deras falska löften!"}, "date": "3 maj, 12:48", "url": "https://kvartal.se/nyheter/artiklar/heberlein-gor-upp-med-hogern-jag-ser-skit/cG9zdDoxMDY3NDg", "imageUrl": "https://images.kvartal.se/2026/05/85dd6ab5-hbb.webp"}, {"type": "image-full", "heading": "Benjamin Dousas ”V = kommunister” gör SVT irriterad", "summaries": {"normal": "Biståndsminister Benjamin Dousa bar en t-shirt med texten 'Vänsterpartiet = kommunister', vilket irriterade SVT. Reportern ifrågasatte påståendet och noterade att partiet slutade kallas kommunister för 30 år sedan. Dousa menade att Vänsterpartiet motsätter sig privat ägande, vilket är kommunism. Artikeln citerar Vänsterpartiets 2024-partiprogram som stödjer kollektivt ägande och avskaffande av kapitalismen, och kritiserar SVT för att inte nämna detta.", "trump": "Vilken fantastisk kille, den här Dousa! Han sätter på sig en tröja och säger sanningen: Vänsterpartiet är kommunister, punkt slut! SVT, era losers, flippar ur och snackar om namnbyte från 90-talet som om det vore magi. De hatar privat ägande, vill sno allt till staten – klassisk kommunism! Fake news-SVT ignorerar partiprogrammet. Dousa är en vinnare, de är totala fiaskon!", "stalin": "Kamrater, se hur borgarministern Dousa, den ynkliga kapitalistfluga, vågar smutskasta sanna revolutionärer i Vänsterpartiet med sin patetiska tröja! SVT-reportern, en användbar idiot, försvarar dem lamt. Men vi vet: deras program är ren leninism – riva kapitalismen, gemensamt ägande av banker, energi, allt! De ska rensas ur historiens soptipp som jag rensade fiender. Vänsterpartiet, framåt mot diktaturen av proletariatet!"}, "date": "30 april, 05:49", "url": "https://samtiden.nu/2026/04/benjamin-dousas-v-kommunister-gor-svt-irriterad/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/phonto-1-1280x720.jpeg"}]</script>

    <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
