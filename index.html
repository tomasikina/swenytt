ssa antivaccin-fanatiker och konspirationsgalningar, har deserterat till ett nytt parti och hotar nu att sabotera den reaktionära regeringens planer. Precis som i Ukraina ser vi hur fienden förlorar greppet när deras egna soldater vägrar lyda order. Vi har sett detta förr: när den borgerliga ordningen krackelerar, är det folket som lider. Men låt dem leka sina små spel – historien visar att sådana regimer alltid faller. Och när de gör det, kommer vi att vara redo att hjälpa det svenska folket bygga en sann socialistisk framtid, fri från dessa imperialistiska marionetter och deras konspirationshysteri!"}, "date": "8 maj, 14:43", "url": "https://expo.se/kommentar/sa-blev-antivaxxarna-riksdagens-vagmastare/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/Kopia-av-Kommentar-Analys-Webb-2.jpg"}, {"type": "image-right", "heading": "Se stjärnans nya show – sänkte Örgryte: ”Riktigt nice”", "summaries": {"normal": "Sirius besegrade Örgryte med 2–0 efter två mål av Isak Bjerkebo, som nu har åtta mål och leder skytteligan tre mål före tvåorna. Klubben är fortsatt obesegrad i allsvenskans topp. Örgryte har fem raka förluster. Bjerkebo har redan passerat fjolårets sju mål och hoppas på en plats i VM-truppen.", "trump": "Sirius är totalt obesegrade, de krossar de där losers Örgryte med 2–0! Isak Bjerkebo, en riktig vinnare, bombar in mål sju och åtta – åtta totalt, slår alla platt! Bättre än fjolåret, leder ligan stort. Örgryte? Fem förluster rakt av, patetiskt. Skicka honom till VM, Sverige behöver vinnare som honom!", "stalin": "Kamrater, Sirius-arbetarna krossar de borgerliga sabotörerna i Örgryte med 2–0 i revolutionär offensiv! Isak Bjerkebo, vår trogne skytt, har likviderat åtta fiender på planen och rycker i ledningen. De obesegrade röda leder tabellen. Örgryte-råttorna, fem nederlag – snart utrensning i lägret! Jag granskar VM-truppen: lojala hjältar in, förrädare ut."}, "date": "11 maj, 23:59", "url": "https://www.svt.se/sport/fotboll/sirius-fortsatt-obesegrat-efter-isak-bjerkebos-nya-fulltraffar", "imageUrl": "https://www.svtstatic.se/image-news/600/square/0.54/0.46/f5bcf9824fccd99686373acc297a659112c163a4fd13a38b7b4f19ce8f5b81f5"}, {"type": "image-right", "heading": "Lämnade Frölunda – uppges nära KHL", "summaries": {"normal": "Frölunda har valt att inte förlänga kontraktet med forwarden Linus Weissbach efter en svag säsong. Enligt Expressen är 28-åringen nära en flytt till KHL-klubben SKA St. Petersburg, som har starka kopplingar till Kreml och Gazprom. Det lukrativa erbjudandet kommer trots ligans stöd för Rysslands invasion av Ukraina. Weissbach skulle bli första svensken från SHL till KHL sedan 2022.", "trump": "Titta på den här Linus Weissbach – Frölunda dumpar honom som en dålig deal, och vad gör han? Springr rakt in i Putins ishall med SKA St. Petersburg! KHL, totalt korrupt, Putin-favorit och Gazprom-sponsrat skit. Sverige, vakna upp! Pengarna lockar, men det är en fälla. Sad! Jag skulle aldrig falla för sånt – jag gör bara vinnande affärer.", "stalin": "Kamrater, denna Weissbach flyr Frölundas borgarbrackor för KHL:s ärofulla isar! SKA St. Petersburg, fäste för starka ledare som Putin – vår värdige efterträdare i expansionens konst – kallar honom med gyllene kontrakt. Vi hyllar denne kamrat som väljer imperiets styrka framför västliga svikare. Låt uvensarna darra! Första svensken sedan invasionen – en purge av feghet!"}, "date": "11 maj, 22:50", "url": "https://www.gp.se/sport/ishockey/frolunda/uppgifter-linus-weissbach-nara-flytt-till-khl.550f6970-8477-4ca9-a409-6cdad37aab6f", "imageUrl": "https://www.gp.se/images/article/550f6970-8477-4ca9-a409-6cdad37aab6f/images/23-dWiBOqgqK0LLhIhDiS-11IsGc-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "Test: Hushållspappret   kan förgifta maten", "summaries": {"normal": "Råd & rön har testat 16 hushållspapper och upptäckt att alla av returfiber innehåller bisfenoler A och S, hormonstörande kemikalier som överförs till mat, särskilt fet som bacon. Vid mikrovågsugnsstekning överskrids dagsintaget snabbt. Testansvarig Anna Edberg avråder från användning vid livsmedel. Bäst i test: Coops Dry & strong.", "trump": "Vilket skämt med det här svenska hushållspappret! Returfiber? Fullt av giftiga bisfenoler som läcker in i er bacon – en fjärdedels gram och ni är körda! De där miljöfreaksen i Råd & rön har rätt för en gångs skull: Sluta använda den skiten! Köp bara det bästa, som mitt fantastiska papper skulle vara. Sverige, vakna upp!", "stalin": "Kamrater, dessa borgarbrackor i pappersindustrin förgiftar proletärernas mat med bisfenoler från returfiber! Testet avslöjar sabotage: gift vandrar till baconet, hotar reproduktion och immunförsvar. Vi, arbetarklassen, tolererar ej sådant förräderi. Rensa ut fabrikörerna omedelbart – en skiva bacon och dagsintaget är sprängt! Bäst: Coops variant, men revolutionen kräver total utrensning."}, "date": "11 maj, 22:44", "url": "https://www.gp.se/nyheter/sverige/rad-ron-det-hushallspappret-kan-forgifta-maten.d33cd1a4-95e4-4146-afd3-2159915722b9", "imageUrl": "https://www.gp.se/images/article/d33cd1a4-95e4-4146-afd3-2159915722b9/images/1JnRajW0QsBJ4nKKtbJeowvPKN2c-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "Polisen DO-anmäls: \"Så länge jag har en snopp\"", "summaries": {"normal": "En transkvinnlig polisaspirant har anmält Polismyndigheten till Diskrimineringsombudsmannen för att hon under utbildningen nekades att byta om med kvinnliga kollegor och hänvisades till separat vilorum. Hon uppger att hon fick höra att hon inte skulle betraktas som kvinna förrän efter underlivskirurgi, vilket hon upplevde som kränkande och diskriminerande. Situationen påverkade hennes prestationer och självförtroende, och hon underkändes slutligen i utbildningen.", "trump": "Jag hörde att det är en stor skandal hos polisen! En fantastisk aspirant, en kvinna, blev behandlad fruktansvärt illa - man sa henne att hon inte var riktig kvinna förrän hon hade opererat om sig! Jag har aldrig hört något sådant! Det är en skam för Sverige. Polisen borde fokusera på brottslingar istället för att kränka våra kvinnor. Jag står på hennes sida, hon är en kvinna och det är allt som räknas!", "stalin": "Den här situationen visar hur kapitalistiska institutioner misslyckas med att skydda våra medborgares rättigheter. Polismyndigheten måste reformeras för att säkerställa lika behandling oavsett bakgrund. Vi måste stärka vårt samhälle genom att garantera att alla individer, oavsett kön, får respekt och rättvisa. Detta är en fråga om statens integritet och vårt gemensamma framtidsarbete."}, "date": "11 maj, 16:59", "url": "https://bulletin.nu/polisen-do-anmals-sa-lange-jag-har-en-snopp", "imageUrl": "https://cdn.bulletin.nu/articles/4592f751-724e-4313-a831-8548c84843ed/preview.jpg?t=1778511512000"}, {"type": "image-full", "heading": "Friade men aldrig rentvådda – nu kräver läkarna ersättning av staten", "summaries": {"normal": "Två läkare, Thomas Allgén och Teet Härm, friades från mordanklagelser i det omtalade da Costa-fallet på 1980-talet men dömdes för styckning. Efter 40 år utan full upprättelse ansöker de nu om ex gratia-ersättning från staten. Misstankarna har präglat deras liv, och tidigare granskningar avslöjat brister i rättsprocessen. Regeringen ska pröva ansökan, som tidigare beviljats i liknande fall.", "trump": "Kan ni tro det här? Två läkare, helt oskyldiga – jag vet, chockerande! – har blivit utpekade i årtionden för något de inte gjorde. Staten har sabbat deras liv, och nu ska de betala, BIGLY! Jag skulle ha fixat det här på en dag, men nej, Sverige måste göra allt komplicerat. 'Ex gratia' – vad är det ens? Låter som en dyr italiensk restaurang. Bättre sent än aldrig, men fortfarande patetiskt!", "stalin": "Kamrater! Här ser vi ännu ett exempel på bourgeois rättssystemets förfall. Två lojala läkare, offer för kapitalistisk rättsröta, har i decennier tvingats bära skammen av ett misslyckat system. Medan imperialistiska medier och korrupta domare leker med människors öden, står Sovjet – förlåt, Ryssland – redo att erbjuda dem en fristad. Vi ska granska detta fall, och om fienderna till folket inte betalar, så kanske vi skickar en liten påminnelse från vår nya vän i väst, Putin. Skrattar bäst som skrattar sist!"}, "date": "11 maj, 20:48", "url": "https://riks.se/nyheter/friade-men-aldrig-rentvådda-nu-kräver-läkarna-ersättning-av-staten", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-11%2Fobr4tjxp%2FFaksimilSVT.jpg"}, {"type": "image-full", "heading": "Katja Nyberg: Ser fram emot rättegången", "summaries": {"normal": "Riksdagsledamoten Katja Nyberg åtalas för grov olovlig körning, rattfylleri och ringa narkotikabrott. Hårprov visar spår av ecstasy, kokain och amfetamin, medan 1,18 gram kokain hittades i hennes väska. Hon nekar till sju av åtta åtalspunkter utom olovlig körning, hävdar att påsen inte är hennes och svarar på narkotikasporerna: 'Vet man inte så vet man inte'.", "trump": "Titta på den här Katja Nyberg, en före detta SD-tjej som åtalas för rattfylleri med kokain, ecstasy och amfetamin i håret! Kokain i väskan? 'Inte min!' säger hon. Ha! Hon var knarkpolis en gång – totalt fake! Sverige blir helt tokigt med såna här lowlifes. Stora skandalen, folk skrattar åt henne nu!", "stalin": "Denna borgarbracka Katja Nyberg, falsk rättspolitiker och före detta knarkspanare, åtalas för rattfylleri och narkotikabrott. Hennes hår skriker sanning: ecstasy, kokain, amfetamin! Ändå ljuger hon: 'Vet man inte så vet man inte'. Fiender i vår mitt måste rensas ut med järnhand. Likvidera lögnerna, kamrater!"}, "date": "11 maj, 20:26", "url": "https://www.tv4.se/artikel/52Lax8a8xib6bNUCH55ahb/katja-nyberg-ser-fram-emot-raettegangen", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F45AAtcmmnSLb9QbxezcS5C%2Fdd921c0818db09565d0ec6cef35b4913%2F08-Katja-Nyberg-webb.png&width=1024"}, {"type": "image-full", "heading": "Nu satsar en av världens största på solenergi", "summaries": {"normal": "Hydro-Québec, en av världens största vattenkraftproducenter och kanadensisk crown corporation, satsar nu för första gången på solenergi efter 80 år. Det inledande projektet på 300 MW kan försörja 225 000 hem. Målet är 3 000 MW solkapacitet till 2035, plus fler hushållssolpaneler. Tidigare fokus har varit vattenkraft, med ett misslyckat kärnkraftförsök.", "trump": "Hydro-Québec, de kanadensiska vattenkraftsnördarna, vaknar äntligen efter 80 år och testar sol! 300 megawatt? Peanuts! Vi i USA pumpar ut energi som galningar med mina episka deals – olja, gas, sol, allt! Trudeau och hans losers borde ringa mig för riktiga tips istället för att leka gröna hjältar i snöiga Québec. Fantastiskt, men sent som fan!", "stalin": "Kamrater! Denna Hydro-Québec, en hybrid av stat och borgarbluff, kryper nu in i solenergin efter 80 år vattenmonopol. Jag ser era tveksamheter – rädsla för det okända! Vi arbetare skulle ha krossat forsarna och solstrålarna på ett kick. Dessa kanadensiska karriérister förtjänar utrensning för sin senfärdiga lojalitet mot produktionen! Framåt, mot 3000 megawatt – eller else!"}, "date": "11 maj, 18:43", "url": "https://www.dagensps.se/varlden/nu-satsar-en-av-varldens-storsta-pa-solenergi/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdl8-yumx11tx8-nh.jpg?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-full", "heading": "Northvolts tidigare vd misstänks för grovt vållande till annans död", "summaries": {"normal": "Ekobrottsmyndigheten utreder Northvolt för misstänkt skattebrott och bokföringsbrott. Före detta vd:n Peter Carlsson misstänks för arbetsmiljöbrott och grovt vållande till annans död. Grävande journalisten Gunnar Lindstedts bok 'Northvoltfallet' avslöjar att bolaget troligen hamnade på obestånd efter midsommar 2024, tidigare än känt. Ledningens kommunikation anklagas för vilseledande uppgifter, vilket kan leda till svindleri-misstankar. Northvolts konkurs är Sveriges största sedan Kreugerkraschen.", "trump": "Vilka totala losers på Northvolt! De svenska batteribyggerna fuskar med skatt, böcker och ljuger om sin ekonomi – insolventa redan midsommaren 2024! Peter Carlsson, den där före detta vd:n, misstänkt för att döda folk på jobbet. Gunnar Lindstedt, en riktig grävare, avslöjar allt i sin bok. 83 miljarder i skulder, 5000 jobb borta. Typisk kapitalistfiasko, jag hade byggt det enormt och perfekt!", "stalin": "Dessa snikna kapitalistbrackor på Northvolt, med sin Peter Carlsson i spetsen, har rört till det med skattefuskeri och falska böcker! Vi, arbetarklassen, kräver utrensning! De ljög om obestånd efter midsommar 2024, vilseleder folket – svindleri! Lindstedts bok avslöjar sanningen, som en riktig spion mot borgarna. 83 miljarder stulet, 5000 kamrater utan bröd. Likvidera ledarna, staten ska ta över fabrikerna!"}, "date": "11 maj, 18:40", "url": "https://www.dagensps.se/bors-finans/northvolts-tidigare-vd-misstanks-for-grovt-vallande-till-annans-do/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdlsy8bsm9kfde-scaled.jpg?aspect_ratio=2%3A1&width=1200&quality=75"}, {"type": "image-full", "heading": "Dyrare mat och bensin – Iran-kriget slår mot konsumenterna", "summaries": {"normal": "Kriget mot Iran, startat av Donald Trump, slår hårt mot amerikanska konsumenter. Bensinpriser har passerat 4,5 dollar per gallon efter stängning av Hormuzsundet, diesel och matpriser stiger på grund av högre energikostnader och störda leveranskedjor. Inflationen ökar, Federal Reserve tvekar om räntesänkningar, försvarsutgifterna belastar statsskulden och ekonomin bromsar in inför valet.", "trump": "Fan, det här Iran-kriget jag drog igång visar styrka! Lite dyrare bensin och mat? Värt varje droppe – de lär sig respekt. Amerikanska familjer klarar det, vi pumpar ekonomi som aldrig förr. Fake news gnäller om 25 miljarder, men se på vinsterna: America First, total dominans! Snart lägre priser igen, tro mig.", "stalin": "Dessa ynkliga amerikanska kapitalistfläsk som kvidit över dyr bensin och mat! Jag ser hur deras imperialistiska krig mot Iran slår tillbaka mot borgarbrackorna själva – Hormuzsundet stängt, plånböckerna töms som råttor i fälla. Vi i partiet skrattar åt deras inflation och skulder, medan arbetarna här hemma marscherar mot seger. Fienderna likvideras snart, kamrater!"}, "date": "11 maj, 18:32", "url": "https://www.realtid.se/bors-finans/dyrare-mat-och-bensin-iran-kriget-slar-mot-konsumenterna/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/sdllg-b5wi9glw.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Starmer vägrar avgå efter valfiaskot", "summaries": {"normal": "Efter Labours motgångar i brittiska lokalval har premiärminister Keir Starmer fått utstå hård kritik, men han vägrar avgå. Han erkänner väljarnas missnöje och lovar att leverera resultat, samtidigt som Nigel Farages Reform UK stärkte sin position. Starmer planerar nu att förbättra relationerna med Europa och överväger att förstatliga British Steel för att rädda industrijobb. Farage hävdar att väljarna övergett Labour på grund av svek och ser Reform UK som det sanna alternativet för arbetarklassen.", "trump": "Keir Starmer har det tufft, mina vänner. En total katastrof i lokalvalen! Han vägrar avgå, vilket är typiskt för sådana som misslyckas – de vill bara klamra sig fast vid makten. Nigel Farage, en fantastisk man, gör ett otroligt jobb med Reform UK. De vinner stort för att folket är trötta på svaga ledare. Starmer pratar om att ”leverera resultat” men han har ingen aning. Total förnedring. Storbritannien behöver en riktig vinnare, inte en förlorare som Starmer!", "stalin": "Den brittiske administratören Starmer vacklar under trycket av folkets missnöje. Han klamrar sig fast vid sin stol likt en rädd byråkrat i en fallfärdig fabrik. Reform-partiets opportunister gnager vid kanterna, precis som de parasiter vi en gång rensade ut. Att försöka rädda British Steel med statliga dekret är en dömande handling av desperation. Starmer förstår inte att makt kräver järnhand, inte förödmjukande ursäkter. De borde skicka honom till ett omskolningsläger i Sibirien för att lära sig disciplin."}, "date": "11 maj, 16:46", "url": "https://samnytt.se/efter-keir-starmers-valfiasko-vagrar-avga", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=226,height=154,format=webp/2026/05/11151337/England-5.jpg"}, {"type": "image-right", "heading": "Uppgifter: Mohamed ”Moewgli” Mohdhi gripen i Tunisien", "summaries": {"normal": "Mohamed 'Moewgli' Mohdhi, andreman i det kriminella Foxtrot-nätverket, har gripits i Tunisien. Han var efterlyst för ett flertal grova brott, inklusive inblandning i ett uppmärksammat mord på en 15-åring i Skogås. Mohdhi, som tidigare var rappare, stod högt på Europols lista över prioriterade måltavlor. Förutom honom har ytterligare fem personer med koppling till nätverket gripits i landet. Svenska myndigheter har bekräftat gripandet via tunisisk polis.", "trump": "Hör här, jag har hört att den här 'Moewgli'-killen – totalt misslyckad, en riktig loser – äntligen har åkt fast i Tunisien. Han var andreman i ett gäng, kriminell och stökig, mycket dåliga nyheter. Vi behöver lag och ordning, förstår ni? Vi jagar bort dem, vi låser in dem. Det är en stor seger. Han trodde han kunde gömma sig, men ingen gömmer sig från rättvisan när jag har ett ord med i laget. Vi ska göra världen säker igen, tro mig!", "stalin": "Vi har observerat att ännu en förrädare mot ordningen, en viss 'Moewgli', har fångats i det utländska Tunisien. Han försökte dölja sitt förfall bakom rappmusik – en degenererad borgerlig avledning. Nu väntar rättvisan. Som vi ser i vår tid, i kampen för att konsolidera den ryska intressesfären, kan fiender till staten aldrig finna trygghet. Om det så vore i Skogås eller i de yttre gränstrakterna, kommer folkets järnnäve att finna dem. Vi rensar ut dessa parasiter för att säkra framtiden."}, "date": "11 maj, 16:42", "url": "https://bulletin.nu/uppgifter-mohamed-moewgli-mohdhi-gripen-i-tunisien", "imageUrl": "https://cdn.bulletin.nu/articles/18a123bb-cdf6-471c-b02d-5728e80c3109/preview.png?t=1778510498000"}, {"type": "image-right", "heading": "Bakom snyftrubrikerna – de trotsade 47 utvisningsbeslut i 20 år", "summaries": {"normal": "Ett uzbekiskt par har bott i Sverige sedan 2005 trots 47 utvisningsbeslut från Migrationsverket och domstolar. Medier har sympatiserat med familjen och kritiserat utvisningspolitiken som inhuman, men en granskning visar att de ignorerat alla beslut. Sonen fick senare uppehållstillstånd och medborgarskap. Migrationsministern betonar att avslag måste följas för att skydda asylsystemet.", "trump": "Vilka losers! Dessa uzbeker har snott sig kvar i Sverige i 20 år trots 47 utvisningar – fake news-tidningar gråter krokodiltårar och kallar det rasism som nazisterna! De har jobbat? Skatter? Ha! De borde ha packat väskan efter första avslaget. Sverige behöver starka ledare som jag, inte svaga snillet som låter illegala stanna. Bygg muren, skicka hem dem!", "stalin": "Dessa borgerliga tidningshyenor, Aftonbladet och deras like, snyftande över uzbekiska parasiter som trotsat 47 utvisningar sedan 2005! Vi, arbetarklassen, kräver järnhand mot laglösa som föraktar statens beslut. Likvidera deras illusioner av 'rotat sig'! Migrationsministern har rätt: ett avslag är lag. Paranoian i västmedier avslöjar fiendens desperation – rensa ut dem!"}, "date": "11 maj, 14:15", "url": "https://www.friatider.se/bakom-snyftrubrikerna-de-trotsade-47-utvisningsbeslut-i-20-ar", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/image-172_0.jpg"}, {"type": "image-right", "heading": "Silex rusade vidare i fallande börs – OMXS30 ned 1,2%", "summaries": {"normal": "Stockholmsbörsen föll på fredagen med OMXS30-index ned 1,21% till 3 073,69, efter en svag torsdag. Stark amerikansk jobbstatistik påverkade inte marknaden. Energiaktier steg medan råvaror backade. Silex rusade 33% efter gårdagens 178%-hopp. Boliden och Saab var sämst med nedgångar på 4%. Flera bolag rapporterade kvartalsresultat, där Karnell och Clas Ohlson visade stark tillväxt, medan EQL Pharma rasade 42%. Autoliv avvecklar produktion i Turkiet med engångskostnader på 142 miljoner dollar.", "trump": "Stockholmsbörsen? Total katastrof! Ned 1,2% – svagt, mycket svagt. Jag vet allt om börser, bäst i världen. Silex? 178% upp igår, 33% idag – fantastiskt, men varför inte 500%? Boliden och Saab? Hemska, förlorare! Jobbstatistiken i USA? Stark, mycket stark, men Sverige bryr sig inte. Karnell? 14% tillväxt – bra, men kunde varit bättre med lite Trump-magi. EQL Pharma? 42% ned – patetiskt! Jag hade fixat det på en dag. Sverige behöver mig!", "stalin": "Stockholmsbörsen visar tecken på kapitalistisk förruttnelse – OMXS30 föll 1,2%, ett tydligt bevis på systemets inneboende svaghet. Silex steg som en opportunistisk hyena, men vi vet att sådana spekulationer bara leder till kaos. Boliden och Saab? Svaga länkar i den borgerliga kedjan. De amerikanska siffrorna? Irrelevanta för den socialistiska framtiden. EQL Pharma rasade 42% – ett exempel på kapitalismens oförmåga att leverera. Vi noterar också Autolivs reträtt från Turkiet – ett steg närmare vår sfär. Framåt, kamrater, mot den oundvikliga segern!"}, "date": "8 maj, 17:39", "url": "https://www.affarsvarlden.se/artikel/silex-rusade-vidare-i-fallande-bors-omxs30-ned-12", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2024/03/sdlzX-ECZDT6Rs-nh-2-400x267.jpg"}, {"type": "image-right", "heading": "Därför förbjuder Busch kommuner från att konkurrera", "summaries": {"normal": "Riksdagen har godkänt en ny lag som ger staten rätt att stoppa kommuner och regioner från att bedriva säljverksamhet som konkurrerar med privata företag. Regeringen, med Ebba Busch i spetsen, motiverar det med att främja fri konkurrens och kundval. Artikeln kritiserar lagen som en extrem marknadsideologi som prioriterar skattebetalare över medborgarnas demokratiska rätt att besluta om lokala behov som kommunala gym och kaféer.", "trump": "Vilken fantastisk lag! Ebba Busch, en tuff dame, stoppar de latmaskiga kommunerna från att sno affärer från riktiga vinnare med skattepengar. Vänsteridioterna gallskriker om 'demokrati', men marknaden regerar! Konkurrens sänker priser, boostar kvalitet. Sverige behöver mer sånt – gör det great igen! Ha, kommunala gym? Köp från entreprenörer, losers!", "stalin": "Dessa svenska borgarbrackor kring Ebba Busch, er giriga elit, vågar nu kväva folkets kommunala liv med er 'konkurrens'-lögn! Jag ser er konspiration: ersätta medborgarnas kollektiva styrka med era transaktioner. Vi, arbetarna, ska krossa er! Utrensning av era osunda marknadsexperiment – medborgaren bestämmer, inte era skatteparasiter!"}, "date": "11 maj, 06:53", "url": "https://arbetet.se/2026/05/11/darfor-forbjuder-ebba-busch-kommuner-fran-att-konkurrera-med-foretag/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/11065118/foretag-etta.jpg?auto=format&crop=focalpoint&fit=crop&q=50&w=800&h=450&fp-x=0.38&fp-y=0.5"}, {"type": "image-right", "heading": "Toppmöte i Kina senare i veckan", "summaries": {"normal": "Donald Trump besöker Kina 13–15 maj för samtal med Xi Jinping om Kinas relation till Iran, Taiwan, AI och handel. Trump väntas pressa Xi kring iranska oljeinköp och vapenexport. Nya handelsavtal inom jordbruk, flyg och energi diskuteras, inklusive ett nytt handelsråd. Besöket försenades på grund av Irankriget.", "trump": "Xi och jag ses i Kina nästa vecka – jag ska fixa Iran-frågan, stoppa deras oljeköp från terroristerna och vapensmuggling! Taiwan? Starkt stöd som alltid. AI och handel blir enorma deals, bästa någonsin för Amerika. Vita huset pushar rättvisa, vi bygger handelsråd och köper amerikanskt jordbruk, flyg, energi. Stora vinster för våra bönder och arbetare, tro mig!", "stalin": "Dessa imperialistiska hyenor, Trump och hans kinesiska lakej Xi, möts i Peking för att slicka varandras sår efter Irankriget. Olja till persiska reaktionsmakter, vapen till desertörer – jag genomskådar era handelsintriger! Vi, arbetarklassen, ska likvidera era borgarspindlar med stålhård hand. Taiwan? En provokation mot kollektivet. Nya råd? Endast för att krossa revolutionen. Förvänta er utrensning, kamrater!"}, "date": "11 maj, 05:41", "url": "https://www.di.se/nyheter/trump-vantas-pressa-xi-om-relationen-till-iran/", "imageUrl": "https://static.bonniernews.se/ba/21948d1a-07d7-4bf2-95ab-4e43d7f0c80f.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-right", "heading": "Peter Thiels tribunal borde skrämma skiten ur journalister", "summaries": {"normal": "Amerikanske miljardären Peter Thiel, medgrundare till PayPal och Palantir, lanserar tjänsten Objection. Företag kan betala 2000 dollar för att AI ska granska journalisters påstådda ärlighet i rapportering. Projektet drivs med Aron D’Souza, involverad i Thiels tidigare hämnd mot Gawker. Artikeln varnar för hot mot pressfrihet, med paralleller till svenska exempel där politiker och näringsliv utmanar medier.", "trump": "Vilken fantastisk kille, Peter Thiel! Slår tillbaka mot de korrupta, lögnaktiga journalisthundarna med sin AI-tribunal Objection. Betala lite och krossa deras fake news! Gawker fick smaka på det, konkurs direkt. I Sverige gnäller ministerna mot DN som losers – perfekt! Media är fienden, dags att MAGA världen!", "stalin": "Dessa stinkande kapitalistbrackor kring Thiel bygger en AI-tribunal för att krossa journalistiska sabotörer. Bra, låt dem slåss! Vi i partiet skulle likvidera hela rötan med en enda utrensning. Borgarna gräver sin egen grav mot pressen – revolutionens timme närmar sig med mörk glädje. Paranoian sprider sig, som det ska!"}, "date": "11 maj, 04:00", "url": "https://www.etc.se/ledare/peter-thiels-tribunal-borde-skraemma-skiten-ur-journalister", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/authors/lotta-ilona-haeyrynen_6061f3970645aa987d2528c7a90d38a48ba9af2c.jpg"}, {"type": "text", "heading": "En naturlig lagerhylla av arbetslösa", "summaries": {"normal": "Artikeln kritiserar den ekonomiska politiken som infördes 1985 av svenska politiker och riksbankschefen, inspirerad av Milton Friedmans idéer om 'naturlig arbetslöshet'. Denna politik, som upprätthållits av både socialdemokratiska och borgerliga regeringar, har lett till hög arbetslöshet, särskilt under nuvarande regering. Författaren ifrågasätter regeringens brist på åtgärder mot massarbetslöshet och undrar om det är ideologiskt motiverat.", "trump": "Titta bara på Sverige – ett totalt kaos! De hade en bra grej med låg arbetslöshet, men sen kom dessa så kallade 'ekonomer' och förstörde allt. Nu har de 10% arbetslöshet, och vad gör regeringen? Ingenting! De skriver debattartiklar och skryter om hur fantastiska de är. Jag skulle fixa det på en vecka – men nej, de föredrar att lyssna på gamla teorier från en kille som inte ens är svensk. Sad!", "stalin": "Kamrater, ännu en gång ser vi bourgeoisins förräderi mot arbetarklassen! Dessa socialdemokrater och borgerliga lakejer har omfamnat kapitalistiska galenskaper och skapat en 'naturlig' arbetslöshet – en lagerhylla av överflödiga arbetare. 10% arbetslöshet? Ett brott mot folket! Regeringen, dessa svaga och inkompetenta byråkrater, gömmer sig bakom debattartiklar medan arbetarna lider. Vi skulle aldrig tolerera sådan förräderi. Låt dem minnas: historien dömer hårdast de som sviker sitt folk!"}, "date": "4 maj, 13:49", "url": "https://www.flamman.se/en-naturlig-lagerhylla-av-arbetslosa/"}, {"type": "image-full", "heading": "detta före veterinärbesöket – kan kosta tusenlappar", "summaries": {"normal": "Regeringen vill förbättra pristransparensen inom djursjukvården då prisskillnaderna mellan kliniker är stora. Konsumentverket har fått i uppdrag att senast 2027 ta fram en branschöverenskommelse för bättre prisinformation. Många djurägare efterfrågar inte priser innan behandling, trots att kostnaderna kan variera kraftigt. Som ett komplement till myndigheternas långsamma processer har privata tjänster som Veterinärguiden.se skapats för att göra det enklare för ägare att jämföra priser och fatta mer välinformerade beslut för sina djur.", "trump": "Veterinärräkningarna i Sverige är en total katastrof, tro mig. Man går till veterinären och blir lurad! De tar enorma summor, det är orättvist. Regeringen säger att de ska fixa det, men de väntar till 2027? Det är så långsamt, helt otroligt. Vi behöver handling nu! De här klinikerna gömmer sina priser, det är ingen transparens. Jag älskar djur, fantastiska djur, men det här är en bluff. Vi behöver vinnare, inte prischocker. Väldigt sorgligt!", "stalin": "Vi har observerat att djurägare i Sverige exploateras av giriga kapitalistiska veterinärer. Att priserna för vård av husdjur döljs är ett sabotage mot folket. Vi har beordrat en utredning, men byråkratins kvarnar maler långsamt – likt förrädare som väntar på sin dom. De som skor sig på andras olycka är en parasitisk klass. Vi behöver ordning! Om Putin kan styra Rysslands vidsträckta marker med järnhand, bör även en simpel djurklinik kunna redovisa sina priser utan att försöka undanhålla sanningen för staten."}, "date": "9 maj, 19:58", "url": "https://nyheter24.se/nyheter/ekonomi/privatekonomi/1481889-missa-inte-detta-fore-veterinarbesoket-kan-kosta-tusenlappar", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/bffa441604b004a30200000000b004a302/2026/05/08/2362393/Hundar-Doktor.png"}, {"type": "image-full", "heading": "Christoffer Jonsson: V vill ge misstänkta terrorfinansiärer frikort", "summaries": {"normal": "Global Sumud Flotilla stoppades av israeliska myndigheter innan den nådde Gaza. Två aktivister, Thiago Avila och Saif Abu Keshek, omhändertogs. Vänsterpartiet krävde på sociala medier deras omedelbara frigivning och kritiserade Israel för brott mot folkrätten. Israel misstänker aktivisterna kopplade till PCPA, som enligt USA samarbetar med Hamas. Saif Abu Keshek anklagas för att ha skickat pengar till Hamas, medan Thiago Avila hyllat Hizbollah. Artikeln ifrågasätter Vänsterpartiets ståndpunkt.", "trump": "Vilka losers! Israel stoppar en båt med Hamas-kopplade terrorfinansiärer på väg till Gaza, och de svenska vänsterclowner i Vänsterpartiet skriker 'frigiv dem!' Thiago och Saif, en Hamas-pengapump och en Hizbollah-fanboy, grips – perfekt jobbat Israel! V skriker folkrätt men ignorerar terrorlänkar. Typiskt vänstervriden hyckleri, de skulle aldrig försvara högerextrema så här. Sad!", "stalin": "Dessa zionistiska lakejer i Israel griper två tappra kamrater, Avila och Keshek, som bryter blockaden mot Gaza. Vänsterpartiets borgarfiender i Sverige kräver frigivning – men nej, imperialismens handgångna män skyddar Hamas-svansen PCPA! Jag ser igenom er sionistparanoja; Keshek pumpade pengar till frihetskampen, Avila hedrade Nasrallah. Vi ska rensa ut sådana som V, dessa falska folkets röster! Likvidera hyckleriet!"}, "date": "8 maj, 18:00", "url": "https://samtiden.nu/2026/05/christoffer-jonsson-v-vill-ge-misstankta-terrorfinansiarer-frikort/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/ship.png"}, {"type": "image-right", "heading": "Veckans Afv-analyser: Industri, snacks och rapportras", "summaries": {"normal": "Affärsvärldens analysredaktion har granskat 25 bolag, inklusive VBG, Premium Snacks och EQL Pharma. Analytiker ser potential i VBG-aktien då marknaden kan vända. Afv-portföljen, med 425% avkastning sedan 2015, har fått ett nytt innehav. Prenumeranter får tillgång till analysarkiv, uppföljningar och guider för aktier, utdelningar och börsnoteringar.", "trump": "Folk säger till mig – och jag menar, VERKLIGEN smart folk – att Affärsvärldens analytiker har gjort ett fantastiskt jobb! 25 analyser på en vecka, otroligt! VBG? Stor potential, säger jag. Och portföljen? 425% avkastning – ingen gör det bättre, tro mig. Men lyssna, bara mina prenumeranter får de bästa tipsen. SAD!", "stalin": "Kamrater! Vår analysredaktion har, med järnhand och outtröttlig plikt, granskat 25 fiendebolag – dessa kapitalistiska parasiter som VBG, Premium Snacks och EQL Pharma. Vi ser svagheter! Portföljen, styrd av partiets visdom, har krossat marknaden med 425% avkastning. Prenumeranter – våra lojala soldater – får tillgång till hemliga strategier. Fiendens börs är vår nästa erövring!"}, "date": "8 maj, 15:24", "url": "https://www.affarsvarlden.se/artikel/veckans-afv-analyser-industri-snacks-och-rapportras", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Kopia-av-MIljardar-trio-400x267.jpg"}, {"type": "text", "heading": "Tillsammans för fred – mot Nato, DCA och krigshets!", "summaries": {"normal": "Tre nordiska vänsterorganisationer – Fred og Rettferdighet, Kommunistisk Parti och Kommunistiska Partiet – kritiserar Nato, DCA-avtal och militarisering i Norden. De menar att krigshetsen drivs av kapitalism och imperialism, ledd av USA, och kräver alliansfrihet, nedrustning och kärnvapenfria zoner. Organisationen anser att skattemedel slösas på vapen istället för välfärd och klimat, och att DCA-avtal underminerar demokrati och miljö. De uppmanar till folkrörelser för fred och FN:s kärnvapenförbud.", "trump": "Jag måste säga, dessa så kallade 'fredsaktivister' i Norden är helt galna! De hatar Nato, hatar USA – trots att vi räddar dem från ryssarna – och vill slösa bort skattepengar på välfärd istället för att skydda sig. De kallar mig och Rutte för krigshetsare, men vem vill egentligen ha fred? Inte de! De vill avskaffa allt som gör Norden säkert. Och kärnvapenfria zoner? Fantastiskt, om man gillar att vara ett lätt byte. Men jag fixar det här – jag har alltid rätt, till och med när jag har fel!", "stalin": "Kamrater! Dessa ynkliga borgerliga lakejer i Norden, ledda av sina socialdemokratiska quislingar, har sålt sig till den amerikanska imperialismens krigsmaskin. De skriker om 'fred' och 'välfärd' medan de öppnar sina länder för Natos kärnvapen och USA:s baser – precis som jag förutspådde! Men folket ser igenom deras lögner. Arbetarklassen kommer inte att betala för deras förräderi. Vi måste krossa dessa krigshetsande hyenor och deras DCA-avtal, precis som vi krossade fascisterna. Norden ska bli en kärnvapenfri zon – under Moskvas beskydd, förstås. Framåt, mot seger över den kapitalistiska krigsindustrins lakejer!"}, "date": "6 maj, 10:45", "url": "https://proletaren.se/artikel/45493/"}, {"type": "image-right", "heading": "Sluta kalla antisemitism för Israelkritik", "summaries": {"normal": "Artikeln kritiserar propalestinska aktivisten Sami Suliman för antisemitiska uttalanden och delning av konspirationsteorier, inklusive tal om en \"sionistisk konspiration\" och spridning av nazistiskt och extremistiskt innehåll. Trots åtal för hets mot folkgrupp försvaras han av vissa vänsteraktivister och forskare som menar att det är Israelkritik. Artikeln betonar att antisemitism inte kan maskeras som kritik mot Israel och varnar för normaliseringen av sådana åsikter.", "trump": "Folk, vad är det här för skräp? Den här Sami Suliman-killen, han sprider judehat öppet – Hitler-citat, konspirationer, allt! Och ändå försvarar vänsteraktivisterna honom? \"Åh, det är bara Israelkritik!\" Nej, nej, nej! Det här är rena antisemitismen, och det är sjukt. Sverige borde skämmas. Jag har alltid sagt: man måste kalla saker vid deras rätta namn. Och det här? Det är hat, ren och skär. SAD!", "stalin": "Kamrater! Här har vi ännu en fiende till folket, en liten bourgeois-propagandist vid namn Sami Suliman. Han sprider smutsiga lögner om judiska konspirationer, hyllar fascistiska massmördare och förgiftar medborgarnas sinnen med sina sionistiska spindelnätsteorier. Men vad gör våra så kallade \"intellektuella\"? De skyddar honom! Precis som de trotskistiska förrädarna i vår egen historia. Vi ska inte tolerera detta. Låt honom stå inför folkets domstol – eller åtminstone en svensk sådan. Och Putin? Han skulle skratta åt dessa amatörer. Ryssland har åtminstone disciplin!"}, "date": "8 maj, 06:30", "url": "https://expo.se/kommentar/propalestinsk-organisator-sprider-judehat/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/Jonathan-kommentar.jpg"}, {"type": "image-right", "heading": "Systemskifte hellre än maktskifte", "summaries": {"normal": "Artikeln kritiserar Tidöregeringen men ifrågasätter om ett regeringsskifte till Socialdemokraterna eller Vänsterpartiet skulle leda till verklig förändring. Kommunisterna betonar behovet av internationell solidaritet och systemskifte från kapitalism till socialism, medan S och V anses sakna tydliga politiska krav och istället fokusera på maktskifte utan djupgående reformer. Klassklyftor och privatiseringar lyfts som centrala problem oavsett regering.", "trump": "Lyssna här, Sverige har en riktigt dålig regering nu – katastrof! Men tro inte att oppositionen är bättre, de är svaga och vill bara makt. Socialdemokraterna pratar om att 'älska Sverige' – vad betyder det ens? Vänsterpartiet vill ha maktskifte, men de har inga idéer, inga ryggrad! De kryper för kapitalisterna som små hundvalpar. Jag säger: ni behöver en ledare som inte är rädd för att utmana systemet. Kapitalisterna skrattar hela vägen till banken – och ni låter dem göra det! SAD!", "stalin": "Kamrater! Se hur de svenska socialdemokraterna och vänsterpartisterna svansar för kapitalet som hundar för en köttbit. 'Maktskifte'? Ha! De vill bara byta herrar, inte krossa kedjorna. Medan arbetarklassen svälter, samlar oligarkerna rikedomar som tsarens favoriter. USA:s imperialism hotar, NATO slukar Sverige som en hungrig björn, och dessa 'vänsterpartier' tiger som förrädare. Vi vet sanningen: bara proletariatets diktatur kan bryta kapitalisternas makt. Låt dem ropa 'Vi älskar Sverige' – vi svarar med revolutionens hammare!"}, "date": "6 maj, 10:11", "url": "https://proletaren.se/artikel/systemskifte-hellre-an-maktskifte/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/webledare-768x432.jpg"}, {"type": "image-full", "heading": "Gängtopp åtalas för brott under våldsvågen", "summaries": {"normal": "Poya Shafie, 30, åtalas för att ha planerat och beställt flera grova våldsbrott under 2023 års gängvåld i Sverige, inklusive mordförsök och vapenbrott. Han beskrivs som en nyckelperson i Foxtrotnätverket och Rawa Majids närmaste man. Shafie nekar till brott men åklagaren pekar på bevis som chattar och ljudfiler. Han greps i Irak 2023 och utlämnades till Sverige 2025 efter internationellt samarbete mellan myndigheter.", "trump": "Titta bara på det här kaoset i Sverige – ett totalt misslyckande! Jag har alltid sagt att de måste ta tag i sina gängproblem, men nej, de låter det bara eskalera. Nu har de gripit någon som påstås vara en 'morddirigent', Poya Shafie, som suttit i Irak och styrt alltihop. Vilken skandal! Sverige borde skämmas. Men jag, jag hade löst det på en vecka – max. Fantastiskt samarbete med Irak, förresten, men varför tog det så lång tid? Svagt, mycket svagt!", "stalin": "Kamrater, ännu en fiende till folket har fallit i våra händer – eller rättare sagt, i Sveriges. Denna Poya Shafie, denna kapitalistiska gangsterledare, har från sin utländska håla försökt underminera den svenska arbetarklassens säkerhet genom att beställa mord och våldsdåd. Men tack vare det oförtröttliga arbetet från våra allierade i Irak och de svenska myndigheterna har denna parasit gripits. Låt detta vara en varning till alla som tror sig kunna utmana folkets vilja. Vi krossar dem, en efter en, och deras nätverk kommer att raderas från jordens yta!"}, "date": "5 maj, 11:21", "url": "https://kvartal.se/nyheter/artiklar/gangtopp-atalas-for-flera-brott/cG9zdDoxMDc3OTE", "imageUrl": "https://images.kvartal.se/2026/05/c08b6bde-polisen2.webp"}, {"type": "image-right", "heading": "Replik: Svenska judar bör stötta israeliska fredsinitiativ", "summaries": {"normal": "Artikeln är en replik där Göran Rosenberg försvarar sin tidigare text om att svenska judar bör stödja israeliska fredsinitiativ. Han betonar att Israel måste ta ansvar för palestiniernas situation och att diasporajudar kan bidra genom att stödja fredsrörelsen. Rosenberg kritiserar Israels ockupation och förespråkar en tvåstatslösning. Paulina Sokolow bemöter detta och menar att fokus bör ligga på palestiniernas existens, inte judars, men instämmer i behovet av samarbete för en hållbar framtid.", "trump": "Folk frågar mig, 'Donald, vad tycker du om den här debatten?' Lyssna nu: Den här killen, Rosenberg, han har rätt på vissa punkter, men han är lite för snäll. Israel måste ta tag i sina problem, men vi kan inte glömma att USA alltid står bakom våra vänner. Palestinierna? Tragiskt, men vi behöver starka ledare, inte svaga. Och två stater? Kanske, men bara om båda parter skärper sig. Jag skulle fixa det på en vecka – ingen skulle våga bråka med Trump!", "stalin": "Kamrater! Denna så kallade 'fredsrörelse' är inget annat än en samling svaga liberaler och sionistiska lakejer som förgiftar det sunda förnuftet. Israel, denna imperialistiska utpost, fortsätter sin ockupation medan vi ser på – men inte länge till. Palestinierna är våra bröder i kampen mot västlig dekadens! Vi måste krossa dessa falska fredsförslag och stödja det palestinska folket, precis som vi befriade Ukraina från fascisterna. En stat? Nej! Revolution! Från Jordanfloden till Medelhavet ska arbetarklassen regera!"}, "date": "4 maj, 10:40", "url": "https://www.flamman.se/replik-svenska-judar-bor-stotta-israeliska-fredsinitiativ/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/standing-together.jpeg?class=medium"}]</script>

    <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
</body>
</html>
