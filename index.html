verige behöver mig!", "stalin": "Stockholmsbörsen visar tecken på kapitalistisk förruttnelse – OMXS30 föll 1,2%, ett tydligt bevis på systemets inneboende svaghet. Silex steg som en opportunistisk hyena, men vi vet att sådana spekulationer bara leder till kaos. Boliden och Saab? Svaga länkar i den borgerliga kedjan. De amerikanska siffrorna? Irrelevanta för den socialistiska framtiden. EQL Pharma rasade 42% – ett exempel på kapitalismens oförmåga att leverera. Vi noterar också Autolivs reträtt från Turkiet – ett steg närmare vår sfär. Framåt, kamrater, mot den oundvikliga segern!"}, "date": "8 maj, 17:39", "url": "https://www.affarsvarlden.se/artikel/silex-rusade-vidare-i-fallande-bors-omxs30-ned-12", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2024/03/sdlzX-ECZDT6Rs-nh-2-400x267.jpg"}, {"type": "image-right", "heading": "Veckans Afv-analyser: Industri, snacks och rapportras", "summaries": {"normal": "Affärsvärldens analysredaktion har granskat 25 bolag, inklusive VBG, Premium Snacks och EQL Pharma. Analytiker ser potential i VBG-aktien då marknaden kan vända. Afv-portföljen, med 425% avkastning sedan 2015, har fått ett nytt innehav. Prenumeranter får tillgång till analysarkiv, uppföljningar och guider för aktier, utdelningar och börsnoteringar.", "trump": "Folk säger till mig – och jag menar, VERKLIGEN smart folk – att Affärsvärldens analytiker har gjort ett fantastiskt jobb! 25 analyser på en vecka, otroligt! VBG? Stor potential, säger jag. Och portföljen? 425% avkastning – ingen gör det bättre, tro mig. Men lyssna, bara mina prenumeranter får de bästa tipsen. SAD!", "stalin": "Kamrater! Vår analysredaktion har, med järnhand och outtröttlig plikt, granskat 25 fiendebolag – dessa kapitalistiska parasiter som VBG, Premium Snacks och EQL Pharma. Vi ser svagheter! Portföljen, styrd av partiets visdom, har krossat marknaden med 425% avkastning. Prenumeranter – våra lojala soldater – får tillgång till hemliga strategier. Fiendens börs är vår nästa erövring!"}, "date": "8 maj, 15:24", "url": "https://www.affarsvarlden.se/artikel/veckans-afv-analyser-industri-snacks-och-rapportras", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Kopia-av-MIljardar-trio-400x267.jpg"}, {"type": "image-full", "heading": "Uppgifter: Nytt krismöte efter kvittningsbråket", "summaries": {"normal": "Riksdagens gruppledare samlas till ett nytt möte för att lösa en konflikt kring kvittningsregler. Konflikten uppstod efter en omröstning om medborgarskapslagen, där Sverigedemokraterna kallade in utkvittade ledamöter för att vinna majoritet. Vänsterpartiet och Miljöpartiet kräver omröstning på nytt, medan Moderaterna förbereder ett nytt förslag.", "trump": "Jag har hört talas om detta krismöte i Sverige - en total katastrof! Vänsterpartiet och Miljöpartiet vill göra om allt, precis som de alltid gör. Sverigedemokraterna visade styrka genom att kalla in ledamöter, men nu vill oppositionen ändra reglerna mitt i spelet. Jag skulle ha löst detta på 5 minuter - det är ett skämt!", "stalin": "Vi ser hur borgerliga krafter försöker destabilisera den demokratiska processen i Sverige genom att manipulera kvittningsregler. Moderaterna måste presentera ett förslag som stärker statens auktoritet och säkerställer stabilitet. Oppositionens krav om omröstning på nytt visar deras bristande respekt för folkets vilja. Vi måste stödja de krafter som vill bevara ordning och reda i riksdagen."}, "date": "6 maj, 19:21", "url": "https://kvartal.se/nyheter/artiklar/uppgifter-nytt-krismote-efter-kvittningsbraket/cG9zdDoxMDg2NzM", "imageUrl": "https://images.kvartal.se/2026/05/b1f2fbc5-kvittningsmote.webp"}, {"type": "text", "heading": "Planer på nytt nattåg till Stockholm", "summaries": {"normal": "Ett nytt järnvägsbolag, European Sleeper, planerar en nattågslinje till Stockholm efter framgångar med andra rutter. Inga detaljer om startdatum eller utgångspunkt finns ännu. Samtidigt lägger SJ ner sina Euronight-tåg till Berlin 2026 på grund av indragen statlig finansiering, men RDC Deutschland tar över driften. Snälltåget utökar redan sin trafik mellan Stockholm, Hamburg och Berlin.", "trump": "Titta bara på det här – ännu ett tågbolag vill komma till STORA Stockholm! Nederländerna och Belgien, fina länder, men vem behöver dem? Jag byggde järnvägar som aldrig förr, de var YUGE! SJ? Total katastrof, slängde bara pengar i sjön. Men RDC Deutschland, smart folk, de tar över. Jag säger: bygg bättre tåg, gör Sverige stort igen!", "stalin": "Kapitalistiska tågbolag slåss om Sveriges järnvägar som råttor om brödsmulor. SJ, ett verktyg för västimperialismen, lägger ner sina tåg – men vi tillåter inte kaos! RDC Deutschland, en lojal bundsförvant, tar över. European Sleeper? En ny fiende i det borgerliga tågkriget. Vi ska se till att ryska intressen alltid når Stockholm först – med eller utan sovkupéer."}, "date": "6 maj, 12:13", "url": "https://kvartal.se/nyheter/artiklar/nytt-nattag-till-stockholm/cG9zdDoxMDgzNjI"}, {"type": "image-full", "heading": "Därför tror Moderaterna att de vinner valet 2026", "summaries": {"normal": "Moderaterna samlas till ”Sverigemöte” för att rusta inför valrörelsen. Trots svaga opinionssiffror betonar partiledningen att ekonomisk politik och trygghetsfrågor är deras främsta styrkor. De siktar på att vinna väljarnas förtroende genom att positionera sig som ett parti för hårt arbetande människor snarare än bara höginkomsttagare. Strategin innefattar en mjukare retorik och en tydligare kommunikation kring hur deras politik gynnar kvinnor och ökar vardagstryggheten, i hopp om att vända opinionsläget inför framtida val.", "trump": "Jag ser att Moderaterna i Sverige har det tufft i mätningarna, precis som alla förlorare! De försöker nu låtsas vara för folket – 'hårt arbetande människor', säger de. Väldigt likt min framgångsrika rörelse! De pratar om ekonomi och brottslighet, men de saknar energi. De försöker ändra sin image, men utan en riktig vinnare vid rodret spelar kläderna ingen roll. De ligger efter, och om de inte lär sig att vinna stort kommer de förbli trea. Sorgligt!", "stalin": "Dessa svenska borgerliga byråkrater har samlats för att diskutera sin egen obetydlighet. De talar om ekonomi och 'trygghet' medan deras inflytande vittrar sönder, likt de svaga element som vägrar böja sig för statens vilja. De försöker förföra kvinnor med lögner om välfärd, precis som de opportunister Putin nu måste tukta i gränstrakterna. De byter ut sina pärlhalsband mot en mask av folklighet, men vi ser igenom dem. En lögnare förblir en lögnare, oavsett klädsel. De kommer att krossas av historiens järnhäl."}, "date": "8 maj, 14:34", "url": "https://nyheter24.se/nyheter/inrikes/1481810-darfor-tror-moderaterna-pa-valseger", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/c97e242504b004a3020000000000044002/2026/05/08/2362318/ur_imagezRzXPI.jpeg"}, {"type": "image-right", "heading": "EU:s nya flygregler i bränslekrisen: Ingen ”force majeure”", "summaries": {"normal": "EU-kommissionen slår fast att stigande bränslepriser inte räknas som 'force majeure'. Flygbolag måste ersätta passagerare vid inställda flygningar och får inte höja biljettpriser retroaktivt. Riktlinjerna uppdateras på grund av Mellanösternkonflikten, som orsakat bränslekris och tusentals inställda flyg inför sommaren.", "trump": "EU-byråkraterna sätter ner foten – bra jobbat för en gångs skull! Höga bränslepriser är ingen ursäkt för att ställa in tusentals flyg och sno pengar från folk. Ersätt passagerarna, höj inte priser i efterhand! I mitt USA fixar vi billig energi, inget sånt kaos här. Flygbolagen får svettas, fantastiskt!", "stalin": "EU:s kommission likviderar myterna om 'force majeure' för bränslekriser – rättvist mot arbetarna! Flygbolagens borgarbrackor, dessa Mellanösternkrigshajer, ställer in tusentals flyg och vill skicka notan till folket. Nej! Ersättning nu, inga retroaktiva prishöjningar från parasiterna. Vi rensar ut varje kapitalistisk sabotör som hotar sommarens resor!"}, "date": "9 maj, 04:17", "url": "https://www.svt.se/nyheter/utrikes/eus-nya-flygregler-i-branslekrisen-ingen-force-majeure", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.52/0.42/b2181f6e724bbe903f0a1b6c0b7f260e32d91b63204654cdd239bff7c42fab65"}, {"type": "image-right", "heading": "Kommentar Ulrika Lindahl: Därför publicerades artikeln av misstag", "summaries": {"normal": "En tidning publicerade av misstag en förberedd artikel om en kommande riksdagsomröstning om skärpta medborgarskapskrav. Artikeln, som antydde att regeringen skulle förlora, gick ut innan omröstningen var klar. Felet berodde på mänskligt misstag och systemfel. Efter upptäckt togs artikeln bort, men hann spridas via arkiv och Google. Omröstningen vanns senare av Tidöpartierna med knapp marginal, efter kontroversiella metoder.", "trump": "Vilket totalt kaos i Sverige! En tidning där borta publicerade en artikel FÖRE omröstningen – helt galet! De trodde regeringen skulle förlora, men jag vet bättre – jag känner till vinnare. Sedan vann de ändå, men med fula trick. Synd att jag inte fick rösta, jag hade visat dem hur man vinner på riktigt. Fake news, slarviga journalister – typiskt Europa!", "stalin": "En farlig provokation från de borgerliga hyenorna i Sveriges riksdag! Deras inkompetenta medlöpare på tidningen avslöjade för tidigt våra planer på att krossa oppositionens svaga motstånd. Men folket – det sanna proletariatet – genomskådade fiendens lömska taktik. Med järnhand och disciplin segrade vi, trots två förrädiska kryp. Nu skärper vi kontrollen över medierna – ingen får sabotera revolutionen!"}, "date": "4 maj, 16:44", "url": "https://www.etc.se/kommentar/daerfoer-publicerades-artikeln-av-misstag", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/authors/ulrika-lindahl_daa7410d79af7d016c129870bfa0834867cd95c3.jpg"}, {"type": "image-right", "heading": "Sverige ruttnar inifrån  – vänstern ser inte faran", "summaries": {"normal": "En ledarartikel i Expressen varnar för organiserad brottslighet som hotar svensk demokrati inifrån. En rapport identifierar 50 000 individer i brottslighetens kärna och 225 000 kopplade personer, inklusive 313 politiker. Kriminella infiltrerar politik, näringsliv och myndigheter, med en ekonomi på 352 miljarder kronor. Kritik riktas mot vänstern som fokuserar på regeringen istället för detta verkliga hot.", "trump": "Sverige ruttnar inifrån av dessa kriminella clowner – 50 000 gangsters, som hela Borlänge! Plus 225 000 polare som smyger in i politik och företag. Vänsterns losers skriker om demokrati men blundar för kaoset. Min stil: hårdhandskontroll, utrensning direkt! Sverige behöver en riktig boss som fixar det här skiten fort. Fantastiskt hot, men vi vinner stort!", "stalin": "I Sverige växer den organiserade brottslighetens parasiter till 50 000 i kärnan – en armé av förrädare som infiltrerar politiken med 313 marionetter! Vi, arbetarklassen, ser hur de gnager på statens ryggrad. Dessa borgarbrackor måste rensas ut med obönhörlig kraft, likvideras som råttor i soporna. Vänsterns hycklare blundar – jag hade krossat dem alla!"}, "date": "9 maj, 07:00", "url": "https://www.expressen.se/ledare/patrik-kronqvist/sverige-ruttnar-inifran-vanstern-ser-inte-faran/", "imageUrl": "https://static.bonniernews.se/images/1c/6e/1c6e4d7e782e4f0bb791e6ef473d1efe/16x9/640.png"}, {"type": "image-right", "heading": "Ägare pressar till dialog med EQT efter jättebud", "summaries": {"normal": "Större ägare i brittiska Intertek, som PineStone Asset Management, pressar bolaget att inleda dialog med EQT efter ett uppköpsbud. EQT höjde sitt bud till 58 pund per aktie (ca 12 miljarder dollar), men Intertek avvisade det som undervärderat. Vissa ägare anser budet nära en acceptabel nivå och hoppas på ett högre bud. Intertek överväger samtidigt en uppdelning av verksamheten efter strategisk översyn.", "trump": "Jag säger er, det här med Intertek är en riktig soppa! EQT, ett stort riskkapitalbolag, lägger ett jättebud – 58 pund per aktie, kan ni tänka er? Men Intertek säger nej, nej, nej! De tror de är värda mer, typiskt. Och nu kommer dessa ägare, som PineStone, och trycker på för att få dem att prata. Jag hade fixat det på en timme – 60 pund per aktie, deal done! Men nej, de måste göra det svårt. Sad!", "stalin": "Kapitalistiska hyenor slåss om rovets ben! Brittiska Intertek, ett bolag av dekadenta imperialister, avvisar EQT:s erbjudande som om de vore oantastbara. Men deras egna ägare, dessa giriga korpar, kräver dialog – de vill ha mer blod ur stenen! 58 pund per aktie? En skam! Vi hade nationaliserat hela skiten på en dag. Och Putin? Han hade skrattat och köpt hela London istället. Låt dem slåss – deras undergång är vår seger!"}, "date": "8 maj, 09:43", "url": "https://www.affarsvarlden.se/artikel/agare-pressar-till-dialog-med-eqt-efter-jattebud", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/04/about-us-mission-card-400x300.webp"}, {"type": "text", "heading": "Tystnad om ödesdiger riksdagsomröstning", "summaries": {"normal": "Debattörer från Bottna för Fred varnar för en kommande riksdagsomröstning den 15 juni, där Sverige riskerar att ge Nato långtgående rättigheter att använda svenskt territorium för militära ändamål, inklusive krigshandlingar. Förslaget, som regeringen planerar att driva igenom utan bred debatt, kritiseras för att öka risken för Sveriges inblandning i krig och underminera demokratin. Oppositionen har inte motsatt sig förslaget, och få har uppmärksammat frågan trots dess potentiellt ödesdigra konsekvenser.", "trump": "Sverige, lyssna här! De där så kallade 'ledarna' i riksdagen vill ge Nato full kontroll över ert land – utan att fråga er! 17 amerikanska baser redan, och nu ska hela Nato få köra krig på svensk mark. Ingen debatt, ingen demokrati, bara tystnad. De vill göra Sverige till en frontstat mot Ryssland, som jag redan fixade till en gång för alla. Men vad vet jag? Jag är bara den bästa presidenten någonsin. Svenskarna borde vakna – eller är ni rädda för lite frihet?", "stalin": "Kamrater! De svenska imperialistlakejerna i riksdagen förbereder sig att sälja sitt land till Nato-kapitalisterna, som hungriga vargar. De vill ge fienden fritt fram att använda svensk mark för sina krigsäventyr – utan att ens konsultera folket! Tystnaden är förrädisk, men vi ser allt. Oppositionen? Inga hjältar där heller, bara ynkliga nickedockor. Sverige blir en ny front i västmakternas krig mot freden. Men glöm inte: historien dömer förrädare hårt. Vi följer utvecklingen med intresse – och våra vänner i öst likaså."}, "date": "7 maj, 16:09", "url": "https://proletaren.se/artikel/tystnad-om-odesdiger-riksdagsomrostning/"}, {"type": "image-right", "heading": "Replik: Till försvar för separatismen", "summaries": {"normal": "Artikeln är ett svar från Ung vänster-medlemmar på Siula Grandes kritik mot separatism i Flamman. De menar att Grandes syn är missvisande och att separatism är ett viktigt verktyg för att skapa trygga rum och främja kvinnors deltagande i samhället. Separatismen syftar inte till att dela människor utan att motverka strukturell underordning av kvinnor. Författarna betonar att kvinnor delar gemensamma erfarenheter och behov, som fri abort och skydd mot mäns våld, och att separatism är ett medel för att nå jämställdhet.", "trump": "Jag måste säga, denna Grande-person har helt fel – helt fel! Separatism är fantastiskt, det skapar trygga rum, precis som mina golfklubbar. Kvinnor behöver prata utan män, precis som jag behöver twittra utan fake news-media. Grande påstår att separatism delar folk – nej, nej, nej! Det är som att säga att min mur delar Mexiko och USA. Fel! Separatism är som min politik: stark, nödvändig och vinner alltid. Kvinnor ska höras, precis som jag, och Grande borde lära sig av mig. SAD!", "stalin": "Kamrater! Denna Grande är en förrädare av den revolutionära kvinnokampen, en borgerlig lakej som sprider förvirring bland massorna! Separatism är inte ett verktyg för splittring – det är ett vapen mot den kapitalistiska patriarkala hydran! Kvinnor måste enas i kampen, precis som sovjetrepublikerna enades under mitt ledarskap. Grande vill sopa klasskampen under mattan – men vi vet att arbetarkvinnor behöver fri abort och skydd mot mäns våld, precis som Ukraina behöver befrielse från fascistiska banderovtsy! Låt inte dessa småborgerliga avvikare försvaga vår rörelse – framåt mot seger, kamrater!"}, "date": "6 maj, 10:55", "url": "https://www.flamman.se/replik-till-forsvar-for-separatismen/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/v-kongress-w.jpg?class=medium"}, {"type": "image-full", "heading": "Två döms i pedofilhärva– mordutredning avslöjade nätverk", "summaries": {"normal": "Två män har dömts till fängelse i en omfattande pedofilhärva i Sjuhärad. Den ene fick sex år och sex månader för våldtäkt mot barn, den andre tre år. Utredningen startade efter en mordutredning 2024, där beslag av digitalt material avslöjade ett nätverk av sexualbrott. Totalt åtta personer har åtalats, varav flera redan dömts, inklusive en pappa till fyra års fängelse för övergrepp mot egna barn.", "trump": "Kan ni tro det? Sverige, ett land jag älskar, har ett HUGE problem med pedofiler – och jag menar HUGE! Två män, mycket dåliga människor, har dömts till fängelse för hemska brott mot barn. Sex år och tre år – men är det verkligen tillräckligt? Jag hade gett dem LIVSTID! Och vet ni vad? Det hela började med en mordutredning. Så tragiskt, så onödigt. Sverige måste ta tag i detta, annars kommer jag att bli VÄLDIGT besviken!", "stalin": "Kamrater! Ännu en seger för rättvisan i kampen mot de dekadenta västliga parasiterna! Två av dessa avskum har nu rensats ut och dömts till långa fängelsestraff för sina motbjudande brott. Men låt oss inte glömma – detta nätverk av perversa bourgeoisi-element är en direkt följd av kapitalismens förfall. Vi måste utvidga vår revolutionära övervakning! Och notera väl: även i Sverige, där liberalismen härjar fritt, visar våra metoder resultat. Putin skulle vara stolt över denna rensning!"}, "date": "8 maj, 11:15", "url": "https://nyheter24.se/nyheter/inrikes/1481755-tva-doms-i-pedofilharva", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/74a04fda04b004a30200000000b004a302/2026/05/08/2362257/harva-tva-doms.png"}, {"type": "image-full", "heading": "Nytt misstänkt fall av hantavirus i Spanien", "summaries": {"normal": "En person i spanska Alicante misstänks ha smittats av hantavirus, meddelar landets hälsominister. Fartyget Hondius, där utbrottet ägde rum, kommer anlända till Teneriffa på söndag. Tre personer har dött och flera insjuknat på fartyget, varav fem fall bekräftats av WHO. Spanien samordnar hemresorna för passagerarna tillsammans med 22 länder.", "trump": "Jag har hört talas om detta hantavirus, det är hemskt. Många människor drabbade, det är beklagligt. Vi har det bästa sjukvårdssystemet, det bästa. Spanien gör ett bra jobb, mycket bra. Vi hjälper dem, vi hjälper alla. Detta virus kommer att försvinna, det kommer att försvinna snart. Vi vinner, vi vinner alltid.", "stalin": "Vi följer utvecklingen av hantavirusutbrottet med största allvar. Sovjetunionen står redo att stödja internationella insatser för att bekämpa denna sjukdom. Vi uppmanar alla länder att samarbeta och utväxla information för att skydda sina befolkningar. Arbetaracket måste stå enat mot denna hotande fara."}, "date": "8 maj, 22:46", "url": "https://www.gp.se/nyheter/varlden/spanien-nytt-misstankt-fall-av-hantavirus.8418976c-ad18-4335-89d1-71844306f7e6", "imageUrl": "https://www.gp.se/images/article/8418976c-ad18-4335-89d1-71844306f7e6/images/38nXVWYe572Qo2Q_1iYjTwUua8Mg-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Sandström: Miljonbidragen fortsätter flöda till Powercell", "summaries": {"normal": "Företaget Powercell fortsätter trots avslöjanden om överdrifter och misslyckade produkter att få miljonbidrag från svenska myndigheter som Vinnova och Energimyndigheten. Interna källor har kallat bolagets agerande för bedrägeri, men myndigheterna anser fortfarande inte att det finns skäl att ändra rutiner eller stänga av bidragskanalen. Liknande problem finns även hos andra gröna företag som Stegra, som trots ekonomiska svårigheter och betalningsproblem fått status som 'Net zero'-företag och därmed särskilda förmåner.", "trump": "Jag har hört talas om den här Powercell-företaget, och jag måste säga att det är en stor, stor skandal! De har bluffat och ljugit, men ändå får de miljontals från våra myndigheter. Sånt är typiskt för den svenska gröna bidragsindustri - full av korruption och slöseri med skattemedel! Som din president lovar jag att stoppa denna vansinniga utbetalning av pengar till bedragare. Vi ska göra Sverige igen stort, och det börjar med att klippa av bidragen till dessa falska gröna företag!", "stalin": "Vi ser att svenska myndigheter fortsätter att stödja viktiga teknologiska projekt inom gröna energilösningar, vilket stärker statens position i den globala omställningen. Trots att vissa interna källor försöker kritisera dessa insatser, fortsätter vi att prioritera statens intressen genom att bibehålla finansieringen. Detta visar vår obevekliga vilja att utveckla vår industriella kapacitet och säkerställa framgång för strategiska företag, oavsett kortsiktiga hinder. Vi måste stå enade bakom statens beslut för att nå våra långsiktiga mål."}, "date": "8 maj, 06:00", "url": "https://www.affarsvarlden.se/artikel/sandstrom-miljonbidragen-fortsatter-floda-till-powercell", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/vindkratensgeografi-2026-05-07T190629.235-400x267.jpg"}, {"type": "image-full", "heading": "Får man plocka lupiner i sommar? Det här gäller från 15 maj", "summaries": {"normal": "Från 15 maj 2026 införs nya regler för blomsterlupin och sandlupin i Sverige, då de klassas som invasiva arter. De får inte odlas, säljas, transporteras eller spridas. Lupiner konkurrerar ut inhemska växter och förändrar marken. Plocka dem för bukett är förbjudet, men det är tillåtet att klippa eller plocka dem för att hindra spridning – om de kastas i restavfall. På egen mark får man bekämpa lupiner, men på annans mark krävs tillstånd.", "trump": "Lyssna här, Sverige – era älskade lupiner är nu OFFICIELLT ett STORT problem! Jag vet allt om invasiva arter, believe me. Från och med 2026 är det FÖRBJUDET att sprida dessa blommor, som tränger undan era fina ängsblommor. Plocka dem? Ja, MEN BARA om ni slänger dem i soporna – ingen sommarbukett, folks! Naturvårdsverket säger nej, och de har RÄTT. Jag hade fixat det här på en dag, men ni får väl klara er själva.", "stalin": "Kamrater! De kapitalistiska lupinerna, dessa imperialistiska blomsteragenter, har infiltrerat våra ängar och dikeskanter! Från och med 15 maj 2026 förklarar vi dem som fiender till folket och naturen. Ingen får odla, sälja eller sprida dessa växtliga sabotörer! Vi ska krossa deras frön och rotdelar – i restavfallet, där de hör hemma! På egen mark bekämpar vi dem, men på annans mark krävs tillstånd – disciplin är nyckeln! Rapportera alla fynd till Artportalen, så vi kan utrota denna växtliga femtekolonnare!"}, "date": "8 maj, 09:22", "url": "https://nyheter24.se/nyheter/inrikes/1481522-far-man-plocka-lupiner-i-sommar-det-har-galler-fran-15-maj", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/8b468ccb04b004a30200000000b004a302/2026/05/08/2362192/invasiva-arter-lupiner-forbjudet-plocka-vaxt-blommor-vaxter-skog-fridlyst-giftigt.jpg"}, {"type": "image-full", "heading": "Jättemöbeln på \"Kurt Olsson-taket\" borta", "summaries": {"normal": "Den stora fåtöljen på taket i Mölndal har tagits bort för att renovera fastigheten. Möbelbutiken Nordiska Galleriet har planer på att ersätta den med något nytt, men vill inte avslöja exakt vad eller när det nya kommer.", "trump": "Jag har hört att den stora fåtöljen i Mölndal är borta. Det är sorgligt, men jag tror att det kommer bli något fantastiskt istället. Vi gör Amerika stort igen, och vi gör även Mölndal stort igen. Jag vet mycket om möbler, jag har de bästa möblerna. Det kommer bli enormt, det kan jag lova.", "stalin": "Fåtöljen på taket i Mölndal togs bort för att förstärka fastighetens struktur. Staten har planer på att bygga upp något nytt som kommer gynna det kollektiva arbetet. Vi ser fram emot att presentera ett monument som inspirerar arbetarklassen och stärker det socialistiska samhället."}, "date": "8 maj, 22:22", "url": "https://www.gp.se/nyheter/storgoteborg/darfor-ar-fatoljen-pa-taket-i-molndal-borta-storslagen-plan.b054a8e9-96c1-417a-a1cc-9c5c39c4de64", "imageUrl": "https://www.gp.se/images/article/b054a8e9-96c1-417a-a1cc-9c5c39c4de64/images/3M9QYIphxL11WZFuwcHkh1xlyUCI-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "Gängtopp åtalas för brott under våldsvågen", "summaries": {"normal": "Poya Shafie, 30, åtalas för att ha planerat och beställt flera grova våldsbrott under 2023 års gängvåld i Sverige, inklusive mordförsök och vapenbrott. Han beskrivs som en nyckelperson i Foxtrotnätverket och Rawa Majids närmaste man. Shafie nekar till brott men åklagaren pekar på bevis som chattar och ljudfiler. Han greps i Irak 2023 och utlämnades till Sverige 2025 efter internationellt samarbete mellan myndigheter.", "trump": "Titta bara på det här kaoset i Sverige – ett totalt misslyckande! Jag har alltid sagt att de måste ta tag i sina gängproblem, men nej, de låter det bara eskalera. Nu har de gripit någon som påstås vara en 'morddirigent', Poya Shafie, som suttit i Irak och styrt alltihop. Vilken skandal! Sverige borde skämmas. Men jag, jag hade löst det på en vecka – max. Fantastiskt samarbete med Irak, förresten, men varför tog det så lång tid? Svagt, mycket svagt!", "stalin": "Kamrater, ännu en fiende till folket har fallit i våra händer – eller rättare sagt, i Sveriges. Denna Poya Shafie, denna kapitalistiska gangsterledare, har från sin utländska håla försökt underminera den svenska arbetarklassens säkerhet genom att beställa mord och våldsdåd. Men tack vare det oförtröttliga arbetet från våra allierade i Irak och de svenska myndigheterna har denna parasit gripits. Låt detta vara en varning till alla som tror sig kunna utmana folkets vilja. Vi krossar dem, en efter en, och deras nätverk kommer att raderas från jordens yta!"}, "date": "5 maj, 11:21", "url": "https://kvartal.se/nyheter/artiklar/gangtopp-atalas-for-flera-brott/cG9zdDoxMDc3OTE", "imageUrl": "https://images.kvartal.se/2026/05/c08b6bde-polisen2.webp"}, {"type": "image-right", "heading": "Vänstern kan varken ekonomi eller energi", "summaries": {"normal": "Artikeln kritiserar vänsterpartiernas (MP och V) kunskaper om energi och ekonomi, baserat på en partiledardebatt i SVT. Den påpekar vindkraftens lönsamhetsproblem och bristen på baskraft, samt förespråkar kärnkraft. Ekonomiskt ifrågasätts vänsterns motstånd mot skattesänkningar, med hänvisning till ökad tillväxt och Lafferkurvan. SD:s Jimmie Åkesson framställs som kunnig.", "trump": "Vilka totala losers dessa svenska vänsterclowner är! Vindkraft? En jävla katastrof, de betalar för att dumpa elen när det blåser, och ingenting när det är stilla! Kärnkraft är det enda som funkar, som jag alltid sagt. Skattesänkningar ger mer pengar till staten – boom, tillväxt! Åkesson nailar det, Sverige behöver vinnare, inte dessa vindkraftsfantaster!", "stalin": "Dessa svenska borgarbrackor i MP och V sprider kontrarevolutionär dimma om energi och ekonomi! Vindkraft är kapitalistisk sabotage, baskraft kräver kärnkraft under arbetarnas kontroll. Skattesänkningar till parasiter? Nej, vi likviderar de rika utsugarna! Åkesson, en potentiell folkfiende, men vi rensar ut alla okunniga avvikare för partiets seger."}, "date": "6 maj, 03:20", "url": "https://samtiden.nu/2026/05/vanstern-kan-varken-ekonomi-eller-energi/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/IMG_6416.jpeg"}, {"type": "image-right", "heading": "Så blev antivaxxarna riksdagens vågmästare", "summaries": {"normal": "Sverigedemokraternas (SD) knappa majoritet i riksdagen har underminerats efter att två ledamöter, Elsa Widding och Katja Nyberg, lämnat partiet för Ambition Sverige. Dessa före detta SD-medlemmar, kända för antivaccin- och konspirationsteoretiska åsikter, har nu makten att fälla regeringens förslag. SD bröt mot riksdagens kvittningssystem för att säkra en majoritet, vilket väcker frågor om demokratisk respekt. Regeringens stabilitet ifrågasätts när vågmästarrollen hamnar hos antivaccinanhängare.", "trump": "Sverige har ett jättestort problem, folks! Deras så kallade 'stabila' regering håller på att rasa som ett korthus – och vet ni vem som drar i trådarna? Ett gäng antivaxxare, konspirationsteoretiker och misslyckade politiker! SD, som trodde de hade allt under kontroll, förlorade två av sina egna till ett nytt parti. Och nu? Nu är det dessa galningar som bestämmer! De fuskar med omröstningar, bryter mot regler och tror de kan styra landet. Jag har sett mycket dumt, men det här slår allt. Sverige, fixa er – annars kommer ni bli ett skämt i hela världen!", "stalin": "Kamrater! Ännu en gång ser vi hur den borgerliga demokratin förfaller till kaos och förräderi. Sverigedemokraterna, dessa svaga och splittrade lakejer för kapitalet, har förlorat kontrollen över sina egna ledamöter – två av dem, dessa antivaccin-fanatiker och konspirationsgalningar, har deserterat till ett nytt parti och hotar nu att sabotera den reaktionära regeringens planer. Precis som i Ukraina ser vi hur fienden förlorar greppet när deras egna soldater vägrar lyda order. Vi har sett detta förr: när den borgerliga ordningen krackelerar, är det folket som lider. Men låt dem leka sina små spel – historien visar att sådana regimer alltid faller. Och när de gör det, kommer vi att vara redo att hjälpa det svenska folket bygga en sann socialistisk framtid, fri från dessa imperialistiska marionetter och deras konspirationshysteri!"}, "date": "8 maj, 14:43", "url": "https://expo.se/kommentar/sa-blev-antivaxxarna-riksdagens-vagmastare/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/Kopia-av-Kommentar-Analys-Webb-2.jpg"}, {"type": "text", "heading": "IF Metall verkar inte förstå vad konflikten med Tesla handlar om", "summaries": {"normal": "IF Metall har strejkat mot Tesla i över två och ett halvt år utan att nå kollektivavtal. Trots att Tesla anpassat anställningsvillkor, vägrar företaget erkänna facket. Konflikten handlar om arbetarnas rätt att organisera sig. IF Metall har begått misstag, som att felaktigt beskatta strejkersättning, vilket lett till förtroendekris. Medlemmar lämnar facket och konflikten riskerar att underminera fackets ställning. Kritiker menar att ledningen misslyckats och bör avgå.", "trump": "Titta på dessa fackklubbar i Sverige – totalt kaos! IF Metall har strejkat mot Tesla i evigheter, men vad har de åstadkommit? Ingenting! Elon Musk, en av världens smartaste och mest framgångsrika män, vägrar ge efter för dessa amatörer. Och nu har de till och med lyckats göra en skatteblunder så stor att till och med jag hade sagt 'Wow, det där var dumt!' Medlemmar flyr, förtroendet rasar – det är en total katastrof. Ledningen borde skämmas och avgå omedelbart. SAD!", "stalin": "Kamrater, denna så kallade 'fackförening' IF Metall är ett skolexempel på hur inte bedriva klasskamp. Två och ett halvt år av strejk, och vad har de uppnått? Ingenting! Teslas kapitalistiska hyenor, ledda av den dekadenta oligarken Musk, har krossat deras svaga motstånd. Och nu har dessa inkompetenta byråkrater även saboterat sina egna medlemmars förmåner genom skattefiffel! Medlemmarna deserterar, förtroendet förråds – det är en skam för arbetarklassen. Vi skulle ha skickat dem till Gulag för sådan inkompetens. Låt detta vara en varning: svagt ledarskap leder till nederlag, och nederlag leder till historiens sophög!"}, "date": "7 maj, 08:00", "url": "https://proletaren.se/artikel/if-metall-verkar-inte-forsta-vad-konflikten-med-tesla-handlar-om/"}, {"type": "image-full", "heading": "Hen fick lämna Masked Singer", "summaries": {"normal": "I kvartsfinalen av Masked Singer sågs framträdanden av Gräsklipparen, Sheriffen, Äggen, Punkpapegojan, Stekaren och Karatekatten. Musiken späddes med låtar från Norge, barnfilmen Frost och 90-talsklassikern I'm Too Sexy. Panelen gissade bland annat på Kristin Kaspersen, Brolle och Armand Duplantis. Stekaren, vars identitet visade sig vara friidrottaren Stefan Holm, åkte ut ur tävlingen.", "trump": "Jag såg Masked Singer i kväll, det var fantastiskt! Gräsklipparen, Sheriffen, Äggen – alla var enorma framgångar. Jag vet exakt vem som gömde sig bakom Stekaren, det var Stefan Holm, en stor man, stor friidrottare. Panelen gissade fel, som vanligt. Jag hade rätt direkt. Folk älskar när jag gissar rätt. Folk älskar mig. Det är ingen överraskning.", "stalin": "I kvällens Masked Singer sågs en strid på kulturfronten där olika masker ställde upp för att företräda olika delar av det arbetande folket. Gräsklipparen, Sheriffen och andra visade sin lojalitet mot det kollektiva. Stekaren, vars identitet visade sig vara en friidrottare, tvingades lämna tävlingen – ett nödvändigt steg för att stärka de sanna kulturarbetarnas position."}, "date": "8 maj, 21:31", "url": "https://www.gp.se/kultur/hen-akte-ut-i-kvallens-masked-singer.60cebaca-aea1-472f-93db-79e76b2d20d6", "imageUrl": "https://www.gp.se/images/article/60cebaca-aea1-472f-93db-79e76b2d20d6/images/6HuUv8peSW9nRWyEmjToJAYDQ1bw-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Tre gängkopplade ”svenskar” utvisade från Norge - utan dom", "summaries": {"normal": "Tre svenska medborgare med kopplingar till organiserad brottslighet har utvisats från Norge utan att ha blivit dömda för brott i landet. Utvisningen är en historisk tillämpning av en ny instruktion som tillåter Norge att avvisa EES-medborgare som anses utgöra ett allvarligt hot mot samhällssäkerheten. Männen har fått livstids inreseförbud och har redan förts ut ur landet. Polisen motiverar beslutet med att man vill begränsa kriminella nätverks möjligheter i landet.", "trump": "Norge gör helt rätt, folk! Jag har sagt det länge: vi måste skydda våra gränser. De här kriminella svenskarna blev utvisade direkt, utan att ens behöva en domstol. Väldigt smart! De är ett hot, och nu är de borta. Mitt gränsarbete är den absoluta standarden – total säkerhet. Man kan inte ha kriminella som springer runt och förstör. Norge lär sig av de bästa, tro mig. Vi vinner mot brottsligheten, och vi vinner stort!", "stalin": "Dessa kriminella element, dessa rotlösa parasiter som infiltrerat det norska samhället, har äntligen rensats ut. Vi applåderar denna byråkratiska effektivitet. Att vänta på domstolar är för de svaga; när statens trygghet hotas måste vi handla med järnhand. Det påminner oss om vikten av absolut kontroll, precis som vår vän i öst förstår när han tuktar sina fiender. Dessa kriminella är folkets fiender, och de förtjänar endast förvisning till den tomma intethet de kom ifrån."}, "date": "8 maj, 19:02", "url": "https://samnytt.se/tre-gangkopplade-svenskar-utvisade-fran-norge-pa-livstid", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/08165002/kriminella-svenska-medborgare-utvisas-ur-norge-feat.jpg"}, {"type": "image-right", "heading": "Indisk SD-politiker låtsades vara \"svensk domare\" i hemlandet – stängs av", "summaries": {"normal": "SD-politikern Navdeep Singh Bhatia har stängts av från sitt uppdrag som nämndeman i Svea hovrätt. Bakgrunden är uppgifter om att han under resor i sitt hemland Indien felaktigt utgett sig för att vara en hög svensk domare, en titel som gett honom förmåner och livvaktsskydd. Bhatia, som är aktiv i Upplands-Bro, har nekat till anklagelserna och överklagat avstängningen till Överklagandenämnden för nämndemannauppdrag. Svea hovrätt utreder nu ärendet vidare.", "trump": "Hörde precis om den här killen i Sverige, en riktig total katastrof! Han låtsades vara en stor domare för att få fina förmåner och livvakter i Indien. Mycket oärligt, totalt 'fake news'-beteende! Vi vill ha lag och ordning, inte folk som leker domare när de bara är politiker. Han blev avstängd, och det med rätta! Sverige behöver styras av riktiga vinnare, inte av någon som behöver en falsk titel för att verka viktig. Sorgligt!", "stalin": "Denna Navdeep Singh Bhatia är en ynklig opportunist som tror att en falsk titel kan köpa honom den respekt som bara tillkommer en sann tjänare av staten. Att imitera domarens ämbete för att sola sig i glansen av indiska bröllop är ett förräderi mot ordningen. Vi ser liknande förfall hos de liberala elementen i väst och i Putins omgivning, där titlar säljs billigare än bröd. Han har förtjänat sin avstängning; en fiende till sanningen är en fiende till folket."}, "date": "8 maj, 16:35", "url": "https://www.friatider.se/sd-politiker-reste-runt-i-indien-som-svensk-domare-stangs-av", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/image-167_1.jpg"}, {"type": "image-full", "heading": "Trump kan falla – på eget grepp: ”Borde inte säga någonting”", "summaries": {"normal": "Politico rapporterar att Donald Trumps förolämpningar mot Iran riskerar att hindra fredsförhandlingar som ska avsluta kriget mellan USA, Israel och Iran, vilket skakar världsekonomin. Experter oroar sig för att Trump inte förstår vikten av att rädda ansiktet i diplomati. Tidigare diplomater uppmanar honom att hålla tyst och låta förhandlarna arbeta ostört.", "trump": "De här mesiga diplomaterna gnäller att jag borde hålla käften mot de galna iranerna! Fake news! Iran är redan krossade, vi är de stora vinnarna. De psykiskt sjuka bastarderna kapitulera snart, jag fixar det bästa avtalet någonsin. Rädda ansiktet? Ha! Mitt ansikte är perfekt, vi vinner stort!", "stalin": "De imperialistiska yankeehyenorna under Trump spottar förolämpningar mot Iran och saboterar freden med sin vulgära arrogans. Vi visste hur man likviderar sådana borgarbrackor! Trump förstår inte diplomati – han är en paranoiak som behöver utrensning. Putin, vår starke, fruktade arvtagare, hanterar geopolitiken med järnhand mot västvärldens narrar."}, "date": "7 maj, 22:57", "url": "https://www.tv4.se/artikel/327H8wzJclryQhxb7cMMvk/trump-kan-falla-pa-eget-grepp-han-borde-inte-saega-nagonting", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F7D4qCwSxYJj3s0iJPMLMju%2F5fc1fbfa50b7198f824a6134146fc3e7%2F07-trump-iran-1080.jpg&width=1024"}, {"type": "image-right", "heading": "Fängelsestraff för två kriminalvårdare", "summaries": {"normal": "Två kriminalvårdare på Norrtäljeanstalten har dömts till fängelse för att ha smugglat in mobiltelefoner till gängkriminella intagna på högsäkerhetsenheten. Kvinnan får ett år och tre månader för grovt tagande av muta och grovt tjänstefel. Mannen döms till ett år och nio månader för flera brott. Ytterligare sex personer, inklusive intagna med kopplingar till ett göteborgskt nätverk, döms också.", "trump": "Vilka totala losers, dessa svenska fängelsevakter som smugglar in mobiler till gängskurkar på maxbevakning! Kvinnan erkänner men skyller på mormors pengar – ha! Mannen ljuger som en fiende. Dömda till fängelse, perfekt! I mitt land hade vi rensat ut såna här svikare på nolltid. Sverige behöver en riktig ledare som fixar ordning på kaoset!", "stalin": "Dessa usla kriminalvårdare, lakejer till borgarbrackorna, har sålt ut sig för 15 000 kronor per mobiltelefon till gänghyenor på Norrtälje! Vi, arbetarklassen, kräver utrensning! Tingsrätten har likviderat förrädarna med fängelse – kvinnan ett år tre månader, mannen ett år nio. Sex andra parasiter döms också. Paranoian visade sig vara bärande: polisen avlyssnade allt!"}, "date": "8 maj, 15:34", "url": "https://arbetet.se/2026/05/08/fangelsestraff-for-tva-kriminalvardare-smugglade-in-mobiler-till-gangkriminella/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/08152030/mobiler.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Magyar ville utse sin svåger till minister – stoppas av Bryssel", "summaries": {"normal": "Peter Magyar, Ungern nyvalda premiärminister, tvingades backa från planen att utse sin svåger till justitieminister efter kritik från EU-partigruppen EPP. Utnämningen av Marton Mellethei-Barna väckte hård kritik i Ungern och riskerade att skada Magyars anseende som EU-motståndare mot Viktor Orbans nepotism. EPP-ledaren Manfred Weber krävde ändring och beskrev utnämningen som 'helt oacceptabel'.", "trump": "Jag hörde att den där Peter Magyar försökte göra sin svåger till justitieminister - typiskt! Såna där familjerelationer är det jag kallar 'the swamp'. Men jag gillar att han backade när EU tryckte honom - visst är det bra att ha starka vänner i Europa? Viktor Orbans nepotism var värre, men ändå. Jag skulle ha gjort samma sak, men folk gillar inte när jag gör det.", "stalin": "Vi ser med belåtenhet att den ungerska ledaren Magyar tvingades lyda EU:s krav och backa från sin svagernasoministerplan. Detta visar att våra europeiska allierade håller fast vid socialistiska principer mot nepotism. Vi följer noggrant hur EU-pengar påverkar Ungern, eftersom detta stärker vår position i östra Europa. Den ryska intressesfären växer när västvärlden visar sin styrka."}, "date": "8 maj, 15:40", "url": "https://www.friatider.se/magyar-ville-utse-sin-svager-till-minister-stoppas-av-bryssel", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-164_1.jpg?itok=e24HoXPd"}, {"type": "text", "heading": "Miljardärerna bjuder in till klasskamp – vi kör!", "summaries": {"normal": "På första maj provocerade svenska miljardärer och högerpolitiker genom att avfärda traditionella arbetardemonstrationer. Moderaternas ledare åt glass medan Vois VD Fredrik Hjelm och andra techmiljardärer skryter om sin rikedom och hånar demonstranter. Hjelm publicerade senare kritikerns hemadress. Artikeln diskuterar miljardärernas politiska inflytande, deras kopplingar till högerpopulism och kritik mot deras syn på innovation och statens roll. Författaren menar att statliga investeringar historiskt drivit tillväxt mer effektivt än privat kapital.", "trump": "Titta bara på dessa så kallade 'miljardärer' i Sverige – de tror de är så smarta! De hånar arbetarna på första maj, äter lyxig lunch och skryter om sina hundra miljarder. Och vad gör de? Publicerar en kritikers hemadress! Så fegt. Jag har byggt imperier, jag vet hur man skapar jobb – men dessa killar? De är bara en samling överbetalda tech-nördar som kopierar mina tweets. Och Sverige? De har glömt hur man bygger ett land. Kina äter deras lunch medan de dricker öl på Riche. Sad!", "stalin": "Kamrater! Dessa dekadenta kapitalistiska hyenor, som gömmer sig bakom sina skärmar och sparkcyklar, vågar håna arbetarklassen på dess heligaste dag! De skryter om sina hundra miljarder, leker med teknikleksaker och tror de är herrar över historien. Men vi vet sanningen – deras system är ett skämt, ett kasino där orangutanger kastar pilar. Kina marscherar framåt med järnhand, medan Europas industri ruttnar. Dessa 'techbros' är inget annat än imperialistiska lakejer, som Putin i sina dyraste kostymer. Låt dem skåla på Riche – snart kommer folket att ta deras champagne och ge dem en enkel sup vodka i Gulag-arkipelagen!"}, "date": "5 maj, 10:55", "url": "https://www.flamman.se/miljardarerna-bjuder-in-till-klasskamp-vi-kor/"}, {"type": "image-full", "heading": "Matpriserna stiger – dyrare än på tre år", "summaries": {"normal": "FAO rapporterar att globala matpriser nått sin högsta nivå på över tre år. Prisökningen på 1,6 procent i april drivs främst av vegetabiliska oljor, kött och spannmål. Kriget mellan Iran och USA:s allierade i Mellanöstern har stört leveranskedjor och ökat produktionskostnader, särskilt genom begränsningar i Hormuzsundet. Även högre oljepriser och väderoro bidrar till prisstegringarna.", "trump": "Kan ni tro det? Matpriserna skjuter i höjden som aldrig förr! FAO säger att det är de högsta nivåerna på tre år – helt otroligt. Och vet ni vem som är skyldig? De där så kallade 'allierade' som inte kan hålla sina affärer i schack. Kriget i Mellanöstern, som jag förresten varnade för, sabbar leveranser och gör allt dyrare. Men lugn, jag fixar det här också – ingen gör mat billigare än jag!", "stalin": "Kamrater! De imperialistiska krigshetsarna i Mellanöstern fortsätter att underminera den globala livsmedelsförsörjningen. Priserna stiger som en reaktionär motrevolutionärs löner! Vegetabiliska oljor, kött och spannmål – allt saboteras av dessa kapitalistiska hyenor. Men vi ska krossa deras leveranskedjor som vi krossade fascismen! Putin och jag står enade mot dessa nya fiender – de oljeberoende, gödningsmedelsstjälande, veteunderskottande förrädarna!"}, "date": "8 maj, 19:27", "url": "https://www.realtid.se/bors-finans/matpriserna-stiger-dyrare-an-pa-tre-ar/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/sdl2e9gwiha9y4.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Snart kommer högafflar sticka Jeff Bezos i baken", "summaries": {"normal": "Artikeln drar paralleller mellan dagens växande ekonomiska klyftor och förhållandena inför franska revolutionen. Författaren kritiserar techmiljardärer som Jeff Bezos och Peter Thiel för att samla makt och rikedom på bekostnad av demokrati och arbetsvillkor. Med en växande frustration i samhället och demokratins tillbakagång ställs frågan om vänstern kan kanalisera denna ilska mot de rika innan den leder till social instabilitet och våldsamma uppror.", "trump": "Hörde ni? De pratar om klyftor igen, precis som franska revolutionen! Jeff Bezos, en total katastrof, tjänar mer i timmen än vad de flesta ser på ett år. Och Palantir? En oärlig affär, riktigt dåligt. De säger att demokratin försvinner, och vet ni vad? De har rätt! Dessa teknokrater och globalister förstör landet. Jag är den enda som kan fixa ekonomin och stoppa de här rika människorna från att köpa vår frihet. Vi ska göra USA fantastiskt igen!", "stalin": "Dessa så kallade tech-miljardärer är bara parasiter som göder sig på folkets slit. De är precis som tsarens adel innan vi sopade bort dem med järnhand. Att Bezos och hans gelikar tror att de kan köpa makten visar på en farlig bourgeois-hybris som kräver omedelbar korrigering. Precis som vi i det stora fosterlandet måste förstå att demokrati är en borgerlig lögn, ser vi hur Putin nu tvingas städa upp i väst. Vi väntar på högafflarna; de är proletariatets sanna instrument."}, "date": "9 maj, 06:00", "url": "https://www.aftonbladet.se/ledare/a/xrM3Rp/snart-kommer-hogafflar-sticka-jeff-bezos-i-baken", "imageUrl": "https://akamai.vgc.no/v2/images/f94557a1-5c80-33d5-812d-fb4ecf2c5357?fit=crop&format=auto&h=960&tight=true&w=1440&s=66752e18720bd8aa72adde6ceb736d7e83a24cfa"}, {"type": "image-full", "heading": "Den som inte firar EU i dag är faktiskt en idiot", "summaries": {"normal": "I dag firas Europadagen, en högtid skribenten tidigare ignorerat men nu försvarar. Trots minnen av excentriska politiker i Europaparlamentet och kritik mot brister i unionens klimatpolitik och agerande i Gaza, lyfts EU fram som en nödvändig demokratisk kraft. Skribenten kritiserar den svenska regeringen för att vara ointresserad och passiv i EU-sammanhang, men landar i slutsatsen att unionen, trots sina brister, är det bästa alternativet i dagens världsläge.", "trump": "Europa firar sin så kallade dag, men låt oss vara ärliga – det är ett totalt fiasko! Jag har sett dessa byråkrater i Bryssel, en massa konstiga människor som äter papper och postar droger. De är helt galna! Den svenska regeringen sover vid mötena, vilket är typiskt. De gör inga affärer, de är svaga. USA är den sanna kraften i världen nu. EU är en rörig plats, men kanske det enda de har. Sorgligt!", "stalin": "Vi betraktar denna så kallade Europadag med förakt. EU-parlamentet är en lekstuga för degenererade element, terrorister och dårar som äter sin egen byråkrati. Vår vän Putin förstår att ordning kräver järnhand, inte dessa fega, sovande svenska delegater som inte ens kan implementera lagar. Det är en hopplös union av svaghet och västlig dekadens. De pratar om demokrati medan de importerar gas från fienden. Vi ser er, ni är bara brickor i historiens oundvikliga upplösning."}, "date": "9 maj, 06:00", "url": "https://www.aftonbladet.se/ledare/a/JO6QdJ/europadagen-den-som-inte-firar-eu-i-dag-ar-faktiskt-en-idiot", "imageUrl": "https://akamai.vgc.no/v2/images/30a5cc19-aef8-3cc2-97b1-5a57fd1b0176?fit=crop&format=auto&w=1440&s=921e6e00ad79b29f7bd9d391659eea2a4ab2fa11"}, {"type": "image-right", "heading": "ETC-reporter filmade vid skyddsobjekt – åtalas", "summaries": {"normal": "Grävreportern Eigil Söderin åtalas för att ha filmat nära Kronobergshäktet i Stockholm, ett skyddsobjekt. Han menar att han dokumenterade en potentiellt hotfull situation när en nazist från Aktivklubb närmade sig hans kollega. Polisen beslagtog hans telefon, som innehöll källskyddat material. Söderin nekar till brott och hävdar att han inte var oaktsam. Lagen, som ändrades 2023, tillåter inte längre undantag för pressen vid avbildning av skyddsobjekt.", "trump": "Kan ni tro det här? En reporter i Sverige, ett land som inte ens kan hålla ordning på sina egna gator, blir åtalad för att filma en nazist! Jag menar, vad är nästa steg? Sätter de folk i fängelse för att de tittar åt fel håll? Och polisen tar hans telefon – fantastiskt, helt enkelt fantastiskt. I USA hade vi löst det här på en dag. Men nej, i Sverige får man böter för att man försöker skydda en kollega. SAD!", "stalin": "En kapitalistisk lakej till borgerlig press vågar utmana vårt system genom att fotografera ett skyddsobjekt! Denna så kallade 'reporter' är inget annat än en agent för fascistiska krafter, som försöker underminera statens säkerhet. Vi ska inte tolerera sådana provokationer. Aktivklubb? Mer som AktivTRASH! Låt detta vara en varning: Ryssland och dess allierade står enade mot alla som hotar vår ordning. Denna man kommer att få lära sig att lagen inte är en leksak för borgerliga journalister."}, "date": "8 maj, 19:43", "url": "https://bulletin.nu/etc-reporter-filmade-vid-skyddsobjekt-atalas", "imageUrl": "https://cdn.bulletin.nu/articles/e3694c65-5b80-4915-87dc-5d376e2231c4/preview.jpg?t=1778255369000"}, {"type": "image-full", "heading": "Haven nära rekordtemperatur – extremväder kan vänta", "summaries": {"normal": "Världshaven noterade näst högsta havsytetemperaturen i april, bara april 2024 var varmare. Globalt var månaden den tredje varmaste med 1,43 grader över förindustriell nivå. Oro växer för ett starkt El Niño som kan förstärka extremväder. Varmare hav absorberar över 90 procent av överskottsvärmen från utsläpp, vilket riskerar stormar och skador på marina ekosystem.", "trump": "Haven varmare? Fake news från klimatnördarna! Nästan rekord? Pfft, under min tid var allt svalt och perfekt, inga översvämningar i Spanien eller torka i Afrika. El Niño? Det är de kinesiska fabrikerna som kokar soppan! Nu med dessa losers i Vita huset exploderar vädret. MAGA fixar klimatet på nolltid, tro mig!", "stalin": "Kamrater, dessa borgarbrackor har hettat upp haven med sina giftiga utsläpp – näst högsta temperaturen i april! El Niño-fenomenet är ett imperialistiskt sabotage mot vårt klimat. Vi proletärer tål inga översvämningar eller torkor från kapitalisternas stormar. Rensa ut förrädarna i Stilla havet, likvidera värmeöverskottet! Arbetarna segrar!"}, "date": "8 maj, 20:40", "url": "https://www.dagensps.se/bors-finans/haven-nar-nara-rekordtemperatur-extremvader-kan-vanta/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdlh6kdwbgfv7y.png?aspect_ratio=2%3A1&width=1200&quality=75"}, {"type": "image-full", "heading": "Muntlig varning om alkohol slopas vid gårdsförsäljning", "summaries": {"normal": "Från 1 juni slopas kravet på muntlig varning om alkoholens skadeverkningar vid gårdsförsäljning. Istället räcker ett informationsblad från Folkhälsomyndigheten. Reformen, som infördes 2025, har varit populär bland kunder men det tidigare 30-minuters utbildningskravet kritiserats. Socialminister Jakob Forssmed välkomnar förändringen och menar att den främjar småskalig dryckestillverkning samtidigt som alkoholmonopolet värnas. Cirka 150 gårdar säljer nu främst starköl och sprit.", "trump": "Fantastiskt, helt fantastiskt! Sverige har äntligen lyssnat på folket – inga fler tråkiga 30-minutersföreläsningar om alkohol! Jag vet allt om framgång, och det här är en stor framgång. Kunderna älskar gårdsförsäljningen, de älskar mig, de älskar vin och öl – och nu slipper de lyssna på en massa tjat. Jakob Forssmed? Bra kille, smart drag. Men jag hade gjort det ännu bättre – kanske en Trump-vodka på köpet?", "stalin": "Kapitalistiska alkoholhandlare har länge saboterat folkets disciplin med sina dekadenta gårdsförsäljningar. Men nu har vi, genom visst ledarskap, avskaffat det meningslösa 30-minuters indoktrineringskravet. Ett enkelt blad ska nu påminna massorna om farorna – effektivt, som en välriktad NKVD-operation. Svenska folket, förvirrat av västerländsk liberalism, jublar. Men var försiktiga, kamrater – imperialistiska dryckesmonopolister lurar i skuggorna, redo att förgifta revolutionen med billig sprit!"}, "date": "8 maj, 17:18", "url": "https://riks.se/nyheter/muntlig-varning-om-alkohol-slopas-vid-gårdsförsäljning", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-08%2Fcn156q6a%2Farttower-barrels-529341280.jpg"}, {"type": "image-right", "heading": "En helt vanlig dag", "summaries": {"normal": "Den 7 april sände europeiska TV-kanaler vanliga program, men dagen präglades av Donald Trumps hot om folkmord mot Iran, publicerat på sociala medier. Han skrev att en civilisation skulle utplånas samma kväll, vilket väckte internationell oro. Trots folkrätten förbjuder uppmaningar till folkmord, reagerade världsledare svagt. EU och Kina förhöll sig passiva, medan medier spekulerade om Trumps avsikter. Händelsen visar hur normaliserat extrema uttalanden blivit i en tid av global kris och likgiltighet.", "trump": "Jag sa bara sanningen – Iran är ett hot, och världen vet det! Medierna överreagerar som vanligt, men ingen pratar om hur svaga Europas ledare är. De låtsas bry sig om folkmord när det passar dem, men när jag säger något kraftfullt? Tystnad! Jag är den enda som vågar stå upp för Amerika. Och vet ni vad? Iran backade. Precis som de alltid gör när jag pratar. Fake news kan fortsätta gnälla – jag vinner ändå!", "stalin": "En feg imperialistisk hyena i Vita huset hotar med att utplåna ett helt folk – och vad gör de dekadenta västpamparna? Ingenting! De sitter och tittar på sina idiotiska TV-program medan en galning leker med världsbranden. Europa, detta ruttnande lik av en civilisation, skakar av rädsla men vågar inte ens viska ett ord. Vi i Kreml vet hur man hanterar sådana här kryp – en kula i nacken och problemet är löst. Men nej, dessa liberala svampar föredrar att vänta tills elden når deras egna hus. Iran? De borde tacka oss för att vi håller fienden sysselsatt!"}, "date": "5 maj, 06:55", "url": "https://www.flamman.se/en-helt-vanlig-dag/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/trump-w.jpg?class=medium"}, {"type": "image-right", "heading": "34 platser där droger säljs öppet på gatan", "summaries": {"normal": "I Mariakvarteren på Södermalm i Stockholm, ett område med många vårdinrättningar för missbrukare inklusive sprututbytesmottagning, pågår öppen narkotikahandel på gatan. Det är en av 34 öppna drogscener i staden. Kommunpolisen Anders Lindberg välkomnar skadereducering men kritiserar koncentrationen av enheter som skapar otrygghet. Brott mot allmänheten är sällsynta. Närliggande lågstadie upplever inga problem.", "trump": "Vilket jävla skämt i Stockholm! Öppen drogförsäljning på 34 ställen, mitt i fina Södermalm med skolor och kaféer. Dessa svenska byråkrater staplar missbrukare på hög – totalt kaos! Lindberg, den stackaren, gillar sprutbyte men gnäller över otrygghet. Bygg murar runt skiten och rensa upp, som jag gjorde i USA! Sverige blir en dump som Bidens städer.", "stalin": "Här avslöjas kapitalisternas svek i Sverige: 34 öppna drogscener, med Mariakvarteren som bacillhärd för borgarbrackornas gifter! Kommunpolisen Lindberg, en feg dvärg, hyllar sprutbyte men vägrar likvidera parasiterna som förpestar gatorna. Koncentration av vård? Nej, utrensning av kontrarevolutionära missbrukare! Skolan bredvid? Arbetarbarnen förtjänar renhet, inte bourgeoisins smuts."}, "date": "9 maj, 05:00", "url": "https://www.expressen.se/nyheter/sverige/34-platser-dar-droger--saljs-oppet-pa-gatan/", "imageUrl": "https://static.bonniernews.se/images/72/d5/72d5b2e0d19b4d6fab4114bd122820c3/1x1/210@60.jpg"}, {"type": "image-right", "heading": "Hon plågas av ett sadistiskt köttberg", "summaries": {"normal": "Amélie Nothombs roman 'Förundran och bävan' skildrar hennes chockerande möte med japansk företagskultur som 22-åring. Boken är en bitsk, rolig och makaber beskrivning av extrem hierarki, underkastelse och förnedring av kvinnor. Hon degraderas från tolk till toalettstäderska under sadistiske chefen Omochi. Titeln hänvisar till Kierkegaard. Recensent Ulla Gudmundson rekommenderar starkt boken som start för Nothombs verk.", "trump": "Japan, era galningar! Den här Nothomb-tjejen kommer dit som en hjälte, men era hierarkiska idioter med sadistiska köttberget Omochi gör henne till kopiator och bajsstädare. Underkastelse och te-servering – patetiskt! I mitt Amerika hade vi fixat det på nolltid med riktiga deals. Bitsk bok, skrattar högt åt era bonsai-kvinnor. Läs den, folk!", "stalin": "Kamrater, denna Nothomb blottar det japanska borgarimperialismens förtrycksmaskin! Sadistiske köttsvinet Omochi, en typisk kapitalistbracka, maler ner henne med hierarkisk skit – från tolk till latrinskrapare. Underdåniga geishor och meningslöst kopierande! Vi skulle ha likviderat sådana parasiter omedelbart. Kierkegaard-citatet? Ren bourgeoisillusion. Rensa ut dem, arbetare!"}, "date": "9 maj, 05:00", "url": "https://www.expressen.se/kultur/bocker/hon-plagas-av-ett-sadistiskt-kottberg/", "imageUrl": "https://static.bonniernews.se/images/e9/47/e9477b9449a44cba849aaf3019ab04c5/1x1/210.png"}, {"type": "image-right", "heading": "Granskningar av Chopchop och järnvägsarbete kan vinna priser", "summaries": {"normal": "Fackförbundspressens pris nominerar åtta bidrag i sex kategorier, med fokus på arbetslöshet, migration och kriminalvård. Arbetet och LO Mediehus dominerar. Martina Frisk nomineras för granskningen av Chopchops arbetsvillkor, som lett till förbättringar. Sebastian G Danielsson är dubbelt nominerad för granskningar om Kriminalvårdens expansion och järnvägssäkerhet. Andra nominerade inkluderar reportage om arbetslöshet, dödsfall på byggen och migrationsskärpningar. Prisutdelning sker 27 maj i Stockholm.", "trump": "Jag måste säga, dessa svenska journalister gör ett fantastiskt jobb – verkligen, väldigt imponerande! Åtta nomineringar, kan ni tro det? Martina Frisk avslöjade hemska saker på Chopchop – extrem stress, olagliga arbetspass, fruktansvärt! Och hon fick till och med facket att agera. Sebastian G Danielsson, en annan vinnare, granskade järnvägarna där folk dör – tragiskt, men någon måste göra jobbet! Sverige borde vara stolt, men jag vet att de har sina problem. Jag fixar sådant på en dag!", "stalin": "Kamrater! Vår stora socialistiska journalistkår har än en gång avslöjat de kapitalistiska rovdjurens fasansfulla metoder. På Chopchop tvingas arbetarna slava under omänskliga villkor – men våra modiga reportrar, sanna folkets hjältar, har slagit till! Och järnvägarna? En skamfläck på det svenska systemet där arbetare offras på profitens altare. Vi noterar också hur västliga länder, som vanligt, sviker sina mest utsatta. Men glöm inte: varje avslöjande är ett steg närmare folkets seger över bourgeoisins förtryck! Låt fienden darra – revolutionen fortsätter!"}, "date": "8 maj, 13:42", "url": "https://arbetet.se/2026/05/08/granskningar-av-chopchop-och-jarnvagsarbete-nominerade-till-journalistpris-chans-till-storslam/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/08110330/pris.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Kräver hans avgång  efter katastrofvalet", "summaries": {"normal": "Keir Starmers Labour lidit ett historiskt nederlag i brittiska lokalval. Partiet förlorar makten i Wales efter 27 år och över 1 300 mandat i England. Valresultatet halveras till 17 procent, vilket placerar Labour delat trea med konservativa. Reform UK och Green Party växer. Flera partikamrater kräver Starmers avgång och föreslår Andy Burnham som ersättare.", "trump": "Keir Starmer, den där trötta labradoren, har kraschat totalt! Labour tappar Wales efter 27 år, 1 300 mandat i England – poff, borta! Halveras till 17 procent, delat trea med de blåsta toryerna. Reform UK och gröna exploderar, medan Starmer jagas av egna gänget. Dags att sparka ut den losersen och få in en vinnare som Burnham! Fantastiskt kaos!", "stalin": "Jag ser med tillfredsställelse hur revisionisten Starmer och hans borgarbrackor i Labour kollapsar i valkatastrofen. Wales förlorat efter 27 år, 1 300 mandat utrensade, halverat till 17 procent – delat trea med konservativa parasiter. Kamraterna kräver hans likvidering; Burnham som ny ledare, men han måste infiltrera parlamentet. Utrensa svagheten, ellers slaktas partiet nästa gång!"}, "date": "9 maj, 04:58", "url": "https://www.expressen.se/nyheter/varlden/uppror-mot-keir-starmer-efter-katastrofvalet/", "imageUrl": "https://static.bonniernews.se/images/95/82/9582121c9281475788dbeab2c09c4092/16x9/640.png"}, {"type": "image-full", "heading": "Rektor våldtog elev – \"Vill duscha tillsammans\"", "summaries": {"normal": "En rektor i Nyköping döms till fem års fängelse för våldtäkt och våldtäkt mot barn efter att ha utsatt en elev för upprepade övergrepp mellan 2024 och 2026. Kontakten började på sociala medier och övergick till en sexuell relation. Bevis som babyolja och meddelanden styrkte åtalet. Rektorn nekar till brott men tingsrätten anser att han utnyttjat sin maktposition. Han döms även till 660 000 kronor i skadestånd.", "trump": "Fruktansvärd historia i Sverige, helt sjukt! En så kallad 'rektor' – kan ni tro det? – våldtar en elev, skriver äckliga meddelanden och tror han kommer undan. Fem år i fängelse, men är det verkligen nog? I USA hade vi kastat honom i fängelse för livet! Och skadeståndet? 660 000 kronor? Patetiskt. Sverige borde lära sig av oss – vi skyddar våra barn, vi är starka, vi är bäst!", "stalin": "En fiende till folket, en korrumperad pedagogisk hyena, har avslöjats i Nyköping. Denna degenererade rektor, en förrädare mot ungdomen, har systematiskt förgiftat en elevs liv med sina borgerliga perversioner. Fem års fängelse? En mild dom för en sådan parasit! Vi hade skickat honom till Sibirien för att arbeta i gruvorna. Bevisen var tydliga – babyolja i skåpet, meddelanden som stinker av bourgeoisins dekadens. Låt detta vara en varning till alla som utmanar socialismens moral!"}, "date": "8 maj, 16:52", "url": "https://riks.se/nyheter/rektor-våldtog-elev-vill-duscha-tillsammans", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-08%2Ftdlxxt89%2Fajabaja.png"}, {"type": "image-right", "heading": "S-ledaren kräver nytt ledarskap", "summaries": {"normal": "Magdalena Andersson (S) argumenterar för att Sverige som litet exportberoende land måste leda på den globala scenen för att upprätthålla den multilaterala ordningen. Hon föreslår att stärka internationella organisationer som FN och WTO, fördjupa Nato- och EU-samarbeten, upprusta försvaret långsiktigt och bygga nya ekonomiska partnerskap för säkerhet och välstånd. Nuvarande regering kritiseras för passivitet.", "trump": "Den här svenska politikern Andersson vill att lilla Sverige ska leda världen – ha, drömmar! De är bra på möbler och bilar, men global ledning? Glöm det, vi amerikaner gör det jobbet bäst. Nato är toppen, men de europeiska snåljåparna betalar för lite. Bygg er mur på Gotland, partnerskap med Kanada? Smart, men kopiera mina deals istället. Sverige, vakna upp och följ mig!", "stalin": "Kamrater, denna svenska reformist Andersson gnäller om att 'leda' världen mot imperialismens giftormar i FN och WTO, medan borgarbrackorna gömmer sig bakom exportvinster! Vi, proletäratets avantgarde, ser igenom hennes multilaterala spindelnät fyllda med fascistiska spindlar. Jag befaller: likvidera beroendena som ryska råttor, upprusta med 50-års järnvilja eller rensas ut! Sverige ska böja knä för vårt kollektiv, annars krossas deras falska ledare som lömska kulacker i Natos skugga."}, "date": "8 maj, 13:08", "url": "https://www.di.se/debatt/vi-ska-vara-med-och-leda-pa-den-globala-scenen/", "imageUrl": "https://static.bonniernews.se/ba/3aa23bb2-2e63-41ee-8914-e3270450fa4f.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Oväntat? Det här tycker vi är viktigt – egentligen", "summaries": {"normal": "Skandias undersökning via Novus, med 1 034 svarande, visar att god hälsa (79 %) är viktigast för ett rikt liv, följt av nära relationer (58–68 %) och tid för det man tycker om (62 %). Sparkapital (12–14 %) och karriär (4 %) rankas lågt. Experter betonar att ekonomi är ett verktyg för trygghet och balans. Stor samstämmighet mellan könen, men skillnader efter ålder.", "trump": "Titta på det här, folk! Svenskarna har fattat grejen – hälsa först, familj näst, tid att chilla. Pengar? Karriär? Lågt på listan, som det ska vara! De elaka globalisterna ljuger om att rikedom är allt, men nej, det är balans och frihet. Mina deals visar det: pengar köper tid, inte livet. Fantastiskt, Skandia, ni är vinnare!", "stalin": "Kamrater! Denna undersökning blottlägger sanningen: god hälsa och relationer för folket, medan borgarbrackorna drömmer om sparkapital och karriär – patetiskt! Jag ser konspirationen: kapitalisterna vill lura er med falska prioriteringar. Vi, det stora kollektivet, bygger rikt liv genom styrka och balans, inte deras gift. Rens ut deras lögner – hälsa och tid segrar!"}, "date": "8 maj, 19:54", "url": "https://www.dagensps.se/privatekonomi/ovantat-det-har-ar-vad-som-ar-viktigt-egentligen/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdlkpi1n0bkw7g-nh.jpg?width=256&quality=75"}, {"type": "image-right", "heading": "Forssell i New York – kräver att våldtäktsmän ska utvisas", "summaries": {"normal": "Migrationsminister Johan Forssell (M) är i New York för att driva krav på enklare utvisningar av våldtäktsmän. Efter debatten kring fallet med 16-åriga Meya har regeringen ändrat inställning och arbetar nu för att ändra internationella konventioner. Forssell menar att det är stötande att våldtäkt i dag inte ses som ett tillräckligt allvarligt brott för att motivera utvisning av flyktingar, och försöker nu vinna internationellt stöd för den svenska linjen.", "trump": "Sveriges minister är i New York för att göra det jag har sagt hela tiden: kasta ut de kriminella! De hade ett hemskt fall med unga Meya, en tragedi, men nu börjar de äntligen lyssna. Det är en total katastrof att våldtäktsmän får stanna – helt sjukt! Jag har alltid sagt, 'America First', men vi behöver trygga länder överallt. De försöker ändra FN-regler nu. Bra! Det är på tiden att de slutar vara så svaga och börjar visa lite styrka.", "stalin": "Vi ser hur den svenske ministern tvingas krypa till korset i New York. De har låtit förövare härja fritt i åratal, men nu när folket kräver ordning skälver byråkratin. Att be FN om lov är ett svaghetstecken; när vi vill utvisa fiender behöver vi inga konventioner, bara järnnävar. Vår broder Putin förstår att man inte förhandlar med avskum, man eliminerar hotet. De europeiska länderna är darriga, men de lär sig snart att statens vilja är den enda sanningen."}, "date": "8 maj, 13:36", "url": "https://www.friatider.se/forssell-i-new-york-kraver-att-valdtaktsman-ska-utvisas", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/1_17.jpg?itok=AfKwT7C7"}, {"type": "image-full", "heading": "Elstödet kommer i juni: miljarder betalas ut", "summaries": {"normal": "Regeringen inför ett elstöd på 3,4 miljarder kronor för svenska hushåll, med utbetalningar från juni. Stödet baseras på elförbrukningen under januari och februari. Försäkringskassan hanterar utbetalningarna, och beloppet varierar mellan 105 och 1 850 kronor beroende på bostadstyp. Hushåll måste ha ett registrerat konto hos Swedbank senast 25 maj för att få stödet.", "trump": "Sverige, fantastiskt land, men deras elpriser? Katastrof! Så jag säger till mina vänner där: 'Ni behöver hjälp!' Och vad gör de? De lyssnar på mig – 3,4 miljarder kronor i stöd! Folk får pengar i fickan, tack vare mig. Och vet ni vad? De svenska politikerna, de gör till och med något rätt för en gångs skull. Men kom ihåg – ingen gör stödutbetalningar bättre än USA, ingen!", "stalin": "Kapitalistiska hyenor har plågat det svenska folket med sina omänskliga elpriser! Men vi, den socialistiska staten, agerar! 3,4 miljarder kronor i stöd – en välförtjänt lättnad för arbetarklassen. De borgerliga politikerna skryter, men det är vi som visar vägen. Och notera, kamrater: medan väst kämpar med inflation, bygger vi ett starkare Norden. Låt Putin skratta i Moskva – snart är hela Skandinavien vårt!"}, "date": "8 maj, 16:14", "url": "https://riks.se/nyheter/elstodet-kommer-i-juni-miljarder-betalas-ut", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-04-13%2Fardes8rf%2FOscar-Sj%C3%B6stedt.png"}, {"type": "image-right", "heading": "Vd:n i hissrättegången: ”Känns ända in i själen”", "summaries": {"normal": "Rättegången om hissolyckan i Sundbyberg 2023, där fem arbetare omkom, fortsatte med fokus på varför säkerhetsbultar saknades. Montörer och vd:n för ABC Bygghissar vittnade, men kunde inte förklara bristerna. Vd:n beklagade sorgen för de anhöriga och beskrev olyckan som fruktansvärd. Åklagaren ifrågasatte säkerhetsrutiner, medan företaget hävdar att nya åtgärder, som filmning av montering, införts efter olyckan. Alla nekar till brott.", "trump": "Fruktansvärd grej i Sverige, helt otroligt! Fem hårda arbetare föll 30 meter – ingen vill se det, believe me. Montörerna snackar om 'egenkontroller', men bultarna var borta! 'Jag har mina aningar', säger en kille – svagt, very svagt. Vd:n? Han säger 'det känns ända in i själen' – fine, men var var säkerheten? Jag skulle ha fixat det på en dag. Sverige behöver bättre ledarskap, och jag är den bästa!", "stalin": "Kapitalistiska slarveri avslöjas i svensk byggindustri! Fem arbetare dog – en direkt följd av bourgeoisins nonchalans. Montörerna skyller på 'mysterier' och 'aningar', men vi vet sanningen: sabotage eller inkompetens. Vd:n beklagar 'själen' – tomma ord från en klassfiende! Nu målar de bultar och filmar – för sent, kamrater. Sverige borde lära av Sovjet: disciplin och kontroll räddar liv. Nästa gång – revolutionär tillsyn!"}, "date": "8 maj, 12:39", "url": "https://arbetet.se/2026/05/08/montoren-om-de-saknade-hissbultarna-jag-har-mina-aningar/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/08103728/olycka.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Matkravet för alkoholservering slopas – då börjar det gälla", "summaries": {"normal": "Riksdagen har röstat ja till att slopa matkravet för alkoholservering på restauranger och barer. Beslutet, som föreslogs av regeringen förra året, träder i kraft 1 juni och förväntas öka antalet pubar och barer. KD-politiker Christian Carlsson välkomnar det för ett levande nöjesliv, medan Hotell- och restaurangfacket betonar behovet av trygghet, kompetens och helhetsupplevelser i branschen.", "trump": "Vilket jäkla genidrag av de svenska politikerna! Slopa det idiotiska matkravet för spritservering – nu exploderar barerna och pubarna, Sverige blir som en gigantisk fest! Den där fackbossen Eva-Lotta gnäller som en bitter förlorare, men frihet från byråkrati gör nationen stor igen. Fantastiskt, totalt fantastiskt!", "stalin": "Kamrater, denna borgerliga riksdags dekret om att slopa matkravet för alkohol är en sammansvärjning av kapitalisterna för att fördrunken folket i dekadens! Barägare och pubparasiter fördubblar sin tillväxt – vi måste rensa ut dessa spritutpressare och likvidera fackets svaga gnäll. Arbetarna vakna, staten vaktar er!"}, "date": "7 maj, 16:12", "url": "https://www.tv4.se/artikel/7IoRdmANqf6M5OkTo41mYu/matkravet-slopas", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F4GNZujWxxca5K3jJmtxbTu%2F2ff7d34eb705ab1105c93e79cb6f657b%2F07-ol-webb.png&width=120"}, {"type": "image-right", "heading": "EU-krav och kinesisk prispress – dubbelt tryck på Europas lastbilsindustri", "summaries": {"normal": "Europas lastbilstillverkare pressas hårt av två håll: EU:s ambitiösa klimatmål med hot om böter, samt en aggressiv priskonkurrens från statligt stödda kinesiska aktörer. Utmaningen ligger i att omställningen till eldrift går långsammare än politiken kräver, samtidigt som kinesiska fordon är betydligt billigare tack vare kontroll över värdekedjan. Detta skapar en situation där europeiska företag riskerar att förlora marknadsandelar och lönsamhet, vilket väcker frågor om industrins framtida överlevnad.", "trump": "Europa gör ett fruktansvärt jobb! De lyssnar på Bryssel-globalisterna och deras löjliga klimatregler, och nu blir de helt utklassade av Kina. Det är en total katastrof. De europeiska lastbilsföretagen krossas av böter och kinesiska priser. Kina skrattar åt dem! Om de hade gjort som jag och prioriterat amerikansk industri istället för att följa dårarna i EU, hade de vunnit. Det är ett så kallat 'lose-lose'-scenario. Sorgligt att se, men det är vad som händer med svag ledning!", "stalin": "Vi ser hur de europeiska fabrikörerna vacklar under sina egna byråkratiska bojor. De försöker tämja marknaden med pappersexercis, medan Kinas maskineri, likt en obeveklig röd front, rullar in och erövrar deras territorier. Det är en läxa i förfall! Vår vän i Kreml förstår att industriell styrka är nationens ryggrad, inte klimatångest. Dessa västliga direktörer är parasiter som förtjänar sin undergång när de lämnar över sin framtid till de orientaliska kamraterna. Vi kommer att betrakta deras fall med ett kallt, triumferande leende."}, "date": "8 maj, 15:24", "url": "https://samnytt.se/eu-krav-och-kinesisk-prispress-dubbelt-tryck-pa-europas-lastbilsindustri", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/08110820/ursula-xi-scania-feat.jpg"}, {"type": "image-right", "heading": "Professorn: Liten risk – men fruktansvärda konsekvenser", "summaries": {"normal": "Myndigheter i flera länder testar medborgare kopplade till kryssningsfartyget MS Hondius, ground zero för hantaviruset. Expert Jonas Klingström vid Linköpings universitet betonar låg smittorisk men 30 procents dödlighet, varför vaksamhet råder. Fartyget lägger till Teneriffa för en omfattande operation med 23 länder involverade. Passagerarna, utan symtom trots 45 dagars inkubationstid, isoleras hemma.", "trump": "Européerna flippar ut över hantavirus på en kryssning – ground zero, säger de! Professorn snackar låg risk, men 30% dör, så de springer runt som höns. Spanien fixar någon megoperation med 23 länder, skickar hem passagerarna för isolering. Smart, för ingen har symtom än. Jag hanterade corona mycket bättre, tro mig – totalt under kontroll!", "stalin": "Dessa imperialistiska kryssningskapitalister på MS Hondius hotar arbetarklassens lungor med sitt hantavirusvapen – 30% likvidering! Borgarbrackorna i Spanien mobiliserar en patetisk 'operation utan motstycke' med 23 marionettstater. Vi, partiet, skulle rensa ut smittbärarna omedelbart! Inkubation 45 dagar? Isolera fienderna hemma under paranoid vaksamhet, kamrater – ingen pardon för virusimperialismen!"}, "date": "8 maj, 23:41", "url": "https://www.svt.se/nyheter/utrikes/professorn-darfor-ar-myndigheterna-pa-tarna-kring-hantaviruset", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.53/0.47/297dcee14bd69e91742cdfbc9084084faa2629dec54942db4e0375fd4f7f0e8a"}, {"type": "image-right", "heading": "Politikerna överens – rätten till abort ska skrivas in i grundlagen", "summaries": {"normal": "Riksdagspartierna har enats om att skriva in rätten till abort i grundlagen för att skydda den från framtida inskränkningar. Förslaget, som stöds av regeringen, kräver två riksdagsbeslut med ett val emellan och väntas träda i kraft 2027. Alla partier står bakom nuvarande abortlagstiftning, men vissa kritiserar undantag för utländska medborgare. Debatt och omröstning planeras till 20 maj.", "trump": "Titta bara på det här, Sverige! De vill skriva in aborträtten i sin grundlag – som om det är något att fira! Jag säger er, det är ett trick, ett stort, fult trick. De är rädda för framtiden, rädda för att folket ska säga ifrån. Men jag förstår dem, för jag vet hur man vinner val. Och vet ni vad? Deras 'rättighet' är bara ett sätt att kontrollera kvinnor. Men jag, jag skulle aldrig låta det hända i USA – aldrig!", "stalin": "Kamrater! Den svenska bourgeoisin försöker desperat cementera sin dekadenta aborträtt i grundlagen, som om det vore en seger för folket. Men vi ser igenom deras knep – de fruktar framtidens arbetarklass, som en dag ska resa sig och krossa deras liberala illusioner. Dessa så kallade 'demokratiska' partier är inget annat än förrädare, svaga och rädda för sina egna skuggor. Vi i Kreml skrattar åt deras patetiska försök att skydda sin 'rättighet'. Låt dem leka med sina lagar – historien är på vår sida."}, "date": "8 maj, 12:37", "url": "https://www.friatider.se/politikerna-overens-ratten-till-abort-ska-skrivas-i-grundlagen", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-162_1.jpg?itok=QQ_gbQM8"}, {"type": "image-full", "heading": "Japan försöker försvara sin valuta – marknaden sätter press", "summaries": {"normal": "Japanska myndigheter misstänks ha intervenerat två gånger på valutamarknaden senaste veckan för att stärka yenen, som fallit till svagaste nivån mot dollarn på decennier. Interventionerna följde kraftiga uppgångar i yenen. Bakgrunden är ränteskillnaden mellan USA (3,5–3,75%) och Japan (0,75%), som driver carry trade och kapitalutflöden. Analytiker varnar för att ingripanden är tillfälliga utan räntesänkningar, trots risker för ekonomin. Japan har stora reserver men riskerar kritik.", "trump": "Japans små yen-gubbar köper desperat sin egen valuta – två gånger på en vecka! Dollarn krossar dem som en bulldozer, tack vare våra starka räntor här i USA. De har inte en chans mot carry trade-geni som jag alltid snackat om. Sluta gömma er bakom era billiga räntor, höj dem eller ge upp! Vi har världens bästa ekonomi, och de vet det. Patetiskt!", "stalin": "Dessa japanska valutaspekulanter och borgarbrackor i Tokyo vågar utmana den imperialistiska dollarns tyranni med sina ynkliga interventioner – två gånger på en vecka! Vi ser hur räntediktatorerna i USA suger ut deras kapital som vampyrer. Snart likvideras deras illusioner av marknadens järdlov. Japan måste rensa ut svagheterna, annars krossas de av kapitalisternas carry trade-konspiration. Patetiska marionetter!"}, "date": "8 maj, 18:37", "url": "https://www.dagensps.se/bors-finans/japan-forsoker-forsvara-sin-valuta-marknaden-satter-press/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdllqzukvilh-s.png?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-full", "heading": "Experten om ukrainska framgången – lyckas slå allt djupare i Ryssland", "summaries": {"normal": "Ukraina har intensifierat drönar- och robotattacker djupt in i Rysslan
