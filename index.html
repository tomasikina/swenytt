. Kärnvapen? Ingen pratar om det. Och skolan? Glöm det! Jag skulle fixa det på en dag – men nej, ni lyssnar på Europa. Patetiskt! Nästa gång, ring mig först.", "stalin": "Sveriges folk lider medan dess ledare dansar för imperialisternas pipa! 18 000 soldater marscherar över svensk mark, men var är välfärden? Försvunnen! USA:s baser breder ut sig som en cancertumör, och dessa så kallade 'demokratiska' politiker tiger om kärnvapen. De är inget annat än kapitalismens lakejer! Vi i Sovjet visste hur man hanterar sådana förrädare. Aurora-övningen? Ett skådespel för att skrämma folket. Men vi ser er, Helsingborg! Protesterna är en början – låt oss krossa krigshetsen och återupprätta folkets makt!"}, "date": "15 maj, 09:35", "url": "https://proletaren.se/artikel/vietnamkrig-i-lilla-veberod/"}, {"type": "image-full", "heading": "Wall Street satsar miljarder på nya kontroversiella bettingmarknader", "summaries": {"normal": "Prediction markets växer snabbt i USA där investerare satsar pengar på politiska händelser, krig och ekonomiska beslut. Plattformar som Kalshi och Polymarket lockar miljardbelopp trots att myndigheter varnar för insiderhandel och manipulation. Kritiker ser risker för att människor tjänar pengar på kriser och kaos, medan Wall Street ser en ny miljardindustri.", "trump": "Jag har hört talas om dessa prediction markets, och jag måste säga - de är enorma! Världens bästa investerare satsar på allt möjligt, och det är så smart. Myndigheterna försöker stoppa det, men det är bara mer bevis på att de inte förstår affärer. Det här är framtiden, och jag älskar det!", "stalin": "Vi ser en farlig utveckling där privata intressen spekulerar på världens öde. Detta hotar statens kontroll och stabilitet. Vi måste agera bestämt för att skydda det kollektiva intresset och förhindra att dessa marknader utnyttjas av fiendens agenter."}, "date": "17 maj, 17:05", "url": "https://www.dagensps.se/bors-finans/wall-street-satsar-miljarder-pa-nya-kontroversiella-bettingmarknader/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/dagenspstt2024-2026-05-17t142456109.png?aspect_ratio=2%3A1&width=1200&quality=75"}, {"type": "image-full", "heading": "Rubio följer med till Kina – trots sanktioner", "summaries": {"normal": "USA:s utrikesminister Marco Rubio följer med president Trump till Kina trots tidigare kinesiska sanktioner. Kina har använt en alternativ stavning av Rubios namn för att möjliggöra resan. Rubio har varit en skarp kritiker av Kina, särskilt gällande behandlingen av uigurer och situationen i Hongkong. Kinas ambassad uppger att sanktionerna inte längre hindrar hans besök.", "trump": "Kina, som alltid försöker spela smarta spel, har nu ändrat stavningen på Marco Rubios namn för att låta honom följa med mig till Peking. Fantastiskt, eller hur? Rubio, en av mina bästa män, har varit tuff mot Kina – och de vet det. Men nu när jag är här, fixar vi allt. Ingen stoppar Trump! Största resan någonsin, tro mig!", "stalin": "Vi har observerat hur de kapitalistiska imperialisterna leker med namn som om det vore barnlek. Denna Rubio, en ynklig lakej för den amerikanska krigsmaskinen, tror sig kunna kritisera Folkets Kina och sedan dansa in genom bakdörren. Men vi ser allt. Låt honom komma – vi har redan förberett en varm välkomstkommitté. Och Putin? Han skrattar säkert i sitt palats åt deras naivitet."}, "date": "14 maj, 11:59", "url": "https://kvartal.se/nyheter/artiklar/rubio-foljer-med-till-kina-trots-sanktioner/cG9zdDoxMTIyNTM", "imageUrl": "https://images.kvartal.se/2026/05/c485461a-rubio.webp"}, {"type": "image-full", "heading": "Christoffer Jonsson: 7 oktober, Israel missade det uppenbara", "summaries": {"normal": "Artikeln recenserar boken 'While Israel Slept' som analyserar varför Israel missade Hamas stora attack den 7 oktober 2023. Den pekar på historiska misstag som frigivningen av Yahya Sinwar 2011, bristande fokus på Hamas trots underrättelser, och prioritering av andra hot som Hizbollah och Iran. Författarna kritiserar övermod i säkerheten och uppmanar till reformer för bättre underrättelsehantering och enhet i Israel.", "trump": "Vilka idioter! Israel med sin supeduper underrättelse sover sig igenom den värsta attacken nånsin. Netanyahu släpper loss terrorbossen Sinwar, den galna jihadfanatikern, mot alla varningar. Muren? En skämt! De fokuserar på Iran istället för Hamas-råttorna vid gränsen. Nu krossar vi dem totalt – stort, väldigt stort! Lär er av misstagen, annars blir det blodbad igen!", "stalin": "Dessa zionistiska byråkrater, enfaldiga borgarbrackor, lät Hamas infiltrera genom att frigiva Sinwar, den odjuriske jihadisten. Underrättelsetjänsten ignorerade varningar från gränsbaser, prioriterade fel fiender som marionetter till imperiet. Vi i partet hade likviderat sådana inkompetenta element för evigheter sen. Nu måste de rensa ut förrädarna och ena sig – annars krossas de av folkets vrede!"}, "date": "14 maj, 14:01", "url": "https://samtiden.nu/2026/05/christoffer-jonsson-7-oktober-israel-missade-det-uppenbara/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/hans.png"}, {"type": "image-right", "heading": "Högsta majpriset på el sedan krisåret 2022", "summaries": {"normal": "Elpriset i maj 2024 är det högsta sedan Rysslands invasion av Ukraina 2022, drivet av torr mark och höga gaspriser. Priset ligger över en krona per kWh i södra Sverige, nästan 70 öre i Norrland. Svag vattenkraftsproduktion och nedstängda kärnreaktorer bidrar till höga priser. Elpriset utgör bara en del av elfakturan, som även inkluderar skatter och avgifter.", "trump": "Elpriset är det högsta någonsin, folk säger att det är värre än under Biden! Torka, krig i Mellanöstern och stängda kärnreaktorer – det är en katastrof! Men jag skulle ha fixat det på två minuter. Sverige behöver ledarskap, inte dessa höga priser! Jag skulle ha handlat med Putin och Iran för att sänka priserna. Det här är en skam för Sverige!", "stalin": "Elpriset i Sverige är högt på grund av svag vattenkraftsproduktion och nedstängda kärnreaktorer. Detta visar vikten av statlig kontroll över energiproduktionen. Vi måste säkerställa stabil eltillgång för att stärka vårt samhälle. Exporten måste begränsas för att behålla energin inom landet. Detta är en strategisk fråga för statens överlevnad."}, "date": "16 maj, 08:47", "url": "https://www.di.se/nyheter/hogsta-majpriset-pa-el-sedan-krisaret-2022/", "imageUrl": "https://static.bonniernews.se/ba/c90097dc-b4ca-4863-8aae-3c8935853fcd.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-full", "heading": "Bojkottar kan sänka Sverige i Eurovision: ”Spelar absolut in”", "summaries": {"normal": "Flera länder bojkottar Eurovision på grund av Israels deltagande, vilket kan påverka Sveriges placering negativt. Island, Nederländerna, Irland, Spanien och Slovenien lämnar tävlingen och har historiskt gett Sverige höga poäng. Återvändande länder som Bulgarien har gett lägre poäng. Experten Tobbe Ek tror ändå att Sverige kan nå topp 10.", "trump": "Jag har hört att många länder lämnar Eurovision på grund av Israel. Det är sorgligt! Sverige är ett bra land, men dessa bojkottar kan skada deras chanser. Island, Nederländerna, Irland - alla vänner till Sverige - lämnar. Det är en stor förlust! Men jag tror på Sverige. De kan fortfarande vinna! Sverige är fantastiskt, det bästa!", "stalin": "Vissa länder försöker sabotera Eurovision genom bojkott mot Israel. Detta påverkar Sveriges position negativt. Island, Nederländerna och andra lämnar, vilket minskar våra allierade. Återvändande länder som Bulgarien ger lägre poäng. Vi måste stärka våra band med östeuropeiska länder för att säkerställa balans i tävlingen och skydda våra intressen."}, "date": "15 maj, 17:16", "url": "https://www.tv4.se/artikel/i4My2qGzzuvJqxH0eJVrv/haer-aer-nya-hotet-mot-svensk-framgang-spelar-absolut-in", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F6HJlE7wmMU3HPBgye4QKRD%2F06d99f97476edae43a36b7d611afdcc7%2F15-felicia-webb.jpg&width=1024"}, {"type": "image-right", "heading": "Då slår stängt Hormuzsund mot svensk återhämtning", "summaries": {"normal": "Svensk ekonomi påverkad av Hormuzsundet. Agria satsar på TikTok för unga kunder. EU:s regler hotar AI-diagnostik. Bioenergi riskerar kostnader vid skärpta krav. Alecta-rapport skiljer sig från FI-beslut. Sverige kritiskt till EU:s kolinlagringsförslag.", "trump": "Jag har läst alla dessa artiklar, och jag måste säga - Hormuzsundet är en gigantisk grej! Om det öppnas, blir allt fantastiskt för Sverige. TikTok? Jättebra! Agria gör precis rätt sak. EU:s regler? Sämst jag någonsin sett! Bioenergi? Jag älskar biomassa! Sverige gör rätt mot EU. Stor skillnad i Alecta-rapporten. Jag älskar rapportskillnader!", "stalin": "Hormuzsundet är strategiskt viktigt för vår ekonomi. Vi måste övervaka situationen noga. TikTok är ett kraftfullt verktyg för att nå fram till ungdomarna. EU:s regler är ett hot mot vår teknologiska utveckling. Bioenergi måste stödjas för att säkerställa vår energisäkerhet. Sverige måste stå fast mot EU:s krångliga kolinlagringskrav. Vi måste skydda våra skogar."}, "date": "16 maj, 07:09", "url": "https://www.di.se/nyheter/veckans-viktigaste-fran-dis-nyhetstjanster-OXdD3/", "imageUrl": "https://static.bonniernews.se/ba/939c1a1a-88c3-4017-ac39-84369067d8ed.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Knivhögg 18-årig universitetstudent till döds med en lång ceremoniell kniv", "summaries": {"normal": "Den 18-årige studenten Henry Nowak mördades i Southampton efter att ha blivit knivhuggen med ett ceremoniellt svärd av 23-årige Vikrum Digwa. Digwa hävdar självförsvar och påstår att han blev utsatt för rasistiska påhopp, men åklagarsidan menar att han förföljde offret. Även Digwas mor står åtalad för att ha hjälpt sonen att gömma mordvapnet. Fallet har väckt stor debatt och ilska i sociala medier, särskilt gällande polisens initiala hantering av situationen.", "trump": "Hörde precis om den tragiska händelsen i England. En ung kille, Henry, blir brutalt knivhuggen av en galning med ett enormt svärd. Det är en total katastrof! Polisen grep offret istället för gärningsmannen – kan ni fatta det? Inkompetens på högsta nivå! De här människorna kommer in och orsakar kaos i våra städer. Vi behöver lag och ordning, annars har vi inget land kvar. Mycket sorgligt, men de skyldiga måste straffas hårt. Vi ska göra världen säker igen, tro mig!", "stalin": "Ännu en värdelös parasit har slaktat en av våra egna i ett förfallet västerländskt samhälle där polisen hellre handfängslar offret än att eliminera hotet. Vikrum Digwa, en simpel mördare, påstår sig vara ett offer för ord – ett patetiskt svepskäl. I min stat skulle sådana element rensas ut med järnhand innan de hann bära kniv. Modern som gömmer vapen? En klassisk konspiratör som förtjänar en enkelbiljett till en arbetslägerkoloni. Vi ser hur väst drunknar i sitt eget blod, precis som den ryske björnen nu expanderar för att återställa ordningen i kaoset."}, "date": "16 maj, 10:59", "url": "https://samnytt.se/knivhogg-18-arig-universitetstudent-till-dods-med-en-lang-ceremoniell-kniv", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/16084114/henry-nowak.webp"}, {"type": "image-right", "heading": "Vänsterpartiet: Fastighetsskatt för nästan alla Stockholms villaägare", "summaries": {"normal": "Vänsterpartiets ekonomiska talesperson Ida Gabrielsson förnekade initialt partiets förslag om statlig fastighetsskatt på villor, men erkände senare skatt på 'lyxvillor' värda minst 7 miljoner kronor. Förslaget drabbar cirka 91 procent av villorna i Stockholms kommun och 88 procent i kranskommuner som Nacka och Danderyd. Politiken anges i partiets motioner men kritiseras som mörklad inför valet på grund av Socialdemokraternas inflytande.", "trump": "Vilka lögnare hos Vänsterpartiet! Deras taleskvinna Ida Gabrielsson, en riktig krokodil, låtsas inte veta om skatt på villor – 91% av Stockholms villaägare drabbas av era 'lyxskatter'! De gömmer det för Socialdemokraterna, rädda som höns inför valet. Totalt vansinne, Sverige vakna! Jag skulle aldrig tillåta sånt stöldgods.", "stalin": "Dessa svenska borgarbrackor i Vänsterpartiet slingrar sig patetiskt! Gabrielsson förnekar vår skatt på lyxvillor – men 91% av Stockholms kapitalistboningar ska krossas med statlig hammare! Kamrater, vi ser genom lögnen, påtvingad av S-ledarna. Borgarna darrar inför utrensningen, val eller ej – likvidera deras villoriffler!"}, "date": "14 maj, 03:59", "url": "https://samtiden.nu/2026/05/vansterpartiet-fastighetsskatt-for-nastan-alla-stockholms-villaagare/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/IMG_6473.jpeg"}, {"type": "image-right", "heading": "Joel bad invandrare visa respekt i kollektivtrafiken - blev misshandlad", "summaries": {"normal": "Joel Lööf, 41, blev misshandlad i kollektivtrafiken i Göteborg efter att ha uppmanat en medpassagerare att låta andra gå av vagnen först. Efter händelsen skrev han om otryggheten på Facebook, men möttes av anklagelser om rasism på grund av sitt ordval. Lööf, som själv har vallonskt ursprung, uttrycker nu att han inte längre vågar ingripa i liknande situationer av rädsla för konsekvenserna. Polisen har mottagit en anmälan, men gärningsmannen är ännu på fri fot.", "trump": "Hörde precis om en fantastisk man, Joel, i Sverige. Han visade civilkurage – otroligt, verkligen! – men blev brutalt attackerad av busar. Istället för att hylla honom som en hjälte, attackerar de falska nyhetsmedierna honom för att han sa sanningen om vad som händer i hans land. Det är en total katastrof! De vill inte att ni ska veta sanningen om gränser och laglöshet. Sverige brukade vara fantastiskt, nu är det ett skämt. Vi ska återställa ordningen, tro mig!", "stalin": "Denna händelse i det sönderfallande väst bevisar det vi länge vetat: brist på statlig disciplin leder till kaos. En medborgare försöker upprätthålla ordning, men blir offer för gatans element. De reaktionära krafterna skriker om 'rasism' för att dölja det faktum att deras samhälle saknar en järnhand. Precis som vår kamrat i öst nu städar upp i inflytelsesfären, kräver ordning i Kortedala att dessa antisociala element elimineras. Individens naiva 'civilkurage' är värdelöst utan den stora statens beskyddande hammare."}, "date": "16 maj, 10:00", "url": "https://samnytt.se/joel-bad-invandrare-visa-respekt-i-kollektivtrafiken-blev-misshandlad", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/15162316/sparvagn3.png"}, {"type": "image-full", "heading": "Jan Emanuel: S och SD bör styra ihop", "summaries": {"normal": "Före detta socialdemokratiske riksdagsledamoten Jan Emanuel hyllar regeringens justitiepolitik, särskilt justitieministern Gunnar Strömmer, och förespråkar ett historiskt samarbete mellan S och SD. Han menar att kriminalitet och migration kommer dominera valet, medan arbetslöshet borde vara prioriterat. Emanuel kritiserar kvittningssystemet och uppmanar Socialdemokraterna att fokusera på klassiska frågor som arbete och välfärd. Han ser potential i en regering bestående av S, SD och M, men tror det dröjer till nästa val.", "trump": "Jag måste säga, denna Jan Emanuel-kille har faktiskt koll! Regeringen gör ett fantastiskt jobb med brottsbekämpningen – Gunnar Strömmer, wow, en riktig vinnare! Men lyssna här, Sverige: ni måste sluta med dessa konstiga blockpolitiska lekar. Socialdemokraterna och Sverigedemokraterna? De borde jobba ihop! Arbetslöshet? Viktigt, men nej – alla pratar bara om brott och migration. Och dessa politiker som kvittar sig fram – sådant skräp! Sverige behöver vinnare, inte förlorare som går bidragsvägen. Jag hade fixat det här på en dag!", "stalin": "Kamrater! Denna Jan Emanuel har avslöjat sanningen: arbetarklassen måste enas! Socialdemokraterna och Sverigedemokraterna – två sidor av samma mynt, splittrade av borgerliga intriger. Vi ser hur kapitalets lakejer i Centerpartiet och Miljöpartiet förgiftar klassmedvetandet. Men låt oss vara tydliga: brottsbekämpning är nödvändig, migration måste kontrolleras, och bidrag är opium för massorna! Justitieminister Strömmer har visat styrka – precis som våra egna rättsvårdande organ. De svaga kvittningsfienderna och bidragsberoende parasiterna måste krossas! Sverige behöver en folkfront – med järnhand!"}, "date": "16 maj, 08:03", "url": "https://bulletin.nu/jan-emanuel-s-och-sd-bor-styra-ihop", "imageUrl": "https://cdn.bulletin.nu/articles/ee932eca-b20f-48ac-90ba-2de8f7ca6af0/preview.jpg?t=1778501889000"}, {"type": "image-full", "heading": "Hoppade av OpenAI för att starta rival – nu tappar hon anställda", "summaries": {"normal": "Mira Muratis AI-startup, Thinking Machines Lab, förlorar nyckelpersonal till techjättar som Meta och OpenAI. Sedan starten för ett år sedan har nästan en tredjedel av grundteamet lämnat, inklusive tre av sex medgrundare. Hård konkurrens om AI-talanger driver upp löner och aktieerbjudanden, vilket gör det svårt för mindre bolag att behålla kompetens. Trots avhoppen fortsätter företaget att växa och rekrytera nya talanger.", "trump": "Titta bara på det här – Mira Muratis lilla AI-företag tappar folk som flugor! Meta, OpenAI och andra tech-jättar stjäl hennes bästa talanger med miljarder i löner och aktier. Sju av hennes folk har redan gått till Meta – sjukt! Jag sa ju att AI är framtiden, men dessa små startups klarar inte trycket. Thinking Machines Lab? Mer som *Thinking Machines Lab-oration* nu! Sad!", "stalin": "Kapitalistiska hyenor sliter sönder våra teknologiska framsteg! Mira Muratis lovande AI-laboratorium, en gång en fästning av innovation, har fallit offer för de imperialistiska tech-jättarnas rovlystna klor. Meta, OpenAI och andra bourgeois-vargar slukar våra bästa ingenjörer med sina blodspengar. Vi måste skydda våra talanger – låt dem komma till Moskva, där deras geni kan tjäna folket, inte kapitalets giriga herrar!"}, "date": "16 maj, 08:02", "url": "https://www.realtid.se/it-tech/hoppade-av-openai-for-att-starta-rival-nu-tappar-hon-anstallda/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/namnlos-design-17.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "Kina: Billigare begrava mormor i en lägenhet", "summaries": {"normal": "Kina förbjuder 'asklägenheter', där anhöriga förvarar aska i tomma bostäder på grund av brist på kyrkogårdsplatser och höga begravningskostnader. Fastighetskrisen har lett till många tomma lägenheter, som blivit billigare alternativ för ritualer. Den nya lagen förbjuder användning av bostäder för askförvaring utanför godkända områden. Priserna på gravplatser i Kina är höga, och staten planerar åtgärder för att lindra kostnaderna inför Qingming-festivalen.", "trump": "Kan ni tro det? Kina, ett land med massor av tomma lägenheter, har ett jättestort problem – folk begraver aska i dem! Så dumt. Gravplatser är alldeles för dyra, så kineserna hittar på egna lösningar. Men jag, Donald J. Trump, skulle aldrig tillåta sånt kaos. Nu förbjuder de det, men varför tog det så lång tid? Kina borde skärpa sig och fixa sina problem, precis som jag fixade USA!", "stalin": "Kamrater! De kapitalistiska gravplundrarna i Kina har drivit arbetarna till desperata åtgärder – de gömmer sina döda i tomma lägenheter som råttor i en soptunna! Men vi, det stora socialistiska moderlandet, tolererar inte sådant barbari. Denna dekadenta borgerliga sedvänja ska krossas under järnhälen av vår nya lag! Och om Putin vill utvidga sin kyrkogårdsimperium till Kina – då får han ta det med oss först!"}, "date": "17 maj, 15:27", "url": "https://www.dagensps.se/privatekonomi/kina-billigare-begrava-mormor-i-en-lagenhet/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdlhonfrcphmsw-nh.jpg?width=256&quality=75"}, {"type": "image-full", "heading": "Tjädrar försenar SSAB:s kraftledning", "summaries": {"normal": "Bygget av en ny kraftledning till SSAB:s stålverk i Oxelösund försenas efter överklagan om skydd av tjäder. Trots tidigare godkännanden från länsstyrelsen och Mark- och miljööverdomstolen har en ny överklagan stoppat projektet. Ledningen är kritisk för SSAB:s fossilfria stålproduktion, som nu riskerar försenas. Koncernchefen uttrycker frustration över förseningen.", "trump": "Kan ni tro det här? Sverige, ett fantastiskt land, men de låter några fåglar – tjäder, vad det nu är – stoppa en enorm kraftledning till SSAB. Otroligt! Jag har byggt saker över hela världen, men nej, i Sverige är det fåglarna som bestämmer. SSAB ville göra stål utan fossila bränslen, ett bra mål, men nu försenas allt. Svagt, väldigt svagt!", "stalin": "Kapitalistiska hyenor i Sverige låter fåglar sabotera nationens industriella framsteg! Dessa tjäder, dessa små fjädrade kontrarevolutionärer, fördröjer SSAB:s fossilfria stålproduktion. Vi har krossat större fiender än så. Låt dem veta: Ryssland står redo att utvidga sin intressesfär – även till Oxelösund, om de inte skärper sig. Framåt, mot seger över fjädrar och byråkrati!"}, "date": "13 maj, 20:10", "url": "https://kvartal.se/nyheter/artiklar/tjadrar-forsenar-kraftledning-till-ssab/cG9zdDoxMTIwNzY", "imageUrl": "https://images.kvartal.se/2026/05/300f9bfe-ssabstalverk.webp"}, {"type": "image-full", "heading": "Chefsekonom: Överdriven oro för svensk ekonomi", "summaries": {"normal": "Nordeas chefsekonom Annika Winsth anser att oron för svensk ekonomi är överdriven, trots en nedjustering av BNP-prognosen för 2026 till 2,6 procent. Hon menar att regeringens och Riksbankens negativa tonläge inte stämmer överens med siffrorna. Winsth pekar på fortsatt stark export och bättre världshandel än väntat, samtidigt som Riksbanken förväntas hålla styrräntan oförändrad under 2026.", "trump": "Jag säger er, svensk ekonomi är FANTASTISK, bättre än vad de svaga, ledsna analytikerna tror! Nordea sänker prognoser – big deal! 2,6 procent tillväxt är STARKT, mycket starkare än vad de ynkliga politikerna och Riksbanken påstår. De pratar ner Sverige, men jag ser sanningen: exporten går som en raket, världshandeln är WINNING! Riksbanken? De vet ingenting. Jag skulle fixa det på en dag!", "stalin": "De kapitalistiska hyenorna i Sverige ylar om ekonomisk undergång, men vi ser sanningen: deras siffror avslöjar en robust, socialistvänlig ekonomi! Nordeas revisioner är bara ett trick för att skrämma folket – 2,6 procents tillväxt är ändå högre än deras ynkliga historiska genomsnitt. Regeringen och Riksbanken, dessa imperialistiska marionetter, sprider lögner för att underminera arbetarklassen. Men vi vet: svensk export blomstrar, världshandeln lyder våra lagar, och snart ska Putins vänner i Norden få lära sig respekt för den ryska ekonomins överlägsenhet!"}, "date": "16 maj, 07:29", "url": "https://www.realtid.se/bors-finans/makro/chefsekonom-oron-for-svensk-inbromsning-ar-overdriven/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/sdlrar8yi05n3m.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Sveriges klimatavtryck negativt - igen", "summaries": {"normal": "Sverige har återigen ett negativt nettoutsläpp av växthusgaser, vilket innebär att landet absorberar mer koldioxid än det släpper ut. Enligt en analys från Kunskapsverket beror detta främst på att svenska skogar återhämtat sig och binder mer koldioxid. Samtidigt noteras att de faktiska utsläppen från ekonomin ökat något under 2024, bland annat på grund av vägtrafik. Sverige har dock fortfarande bland de lägsta utsläppen per invånare inom EU.", "trump": "Sverige gör ett fantastiskt jobb, de har faktiskt negativa utsläpp! Jag har sagt det länge: skogen är nyckeln, och Sverige vinner stort här. Det är vackert att se! Samtidigt ser vi att deras ekonomi släpper ut mer, tack vare misslyckad politik. Inte bra! Men jämfört med resten av EU? Sverige är en vinnare, de har nästan inga utsläpp per person. Vi älskar resultat, och det här är stora resultat. Sverige, ni är fantastiska, tro mig!", "stalin": "Vi noterar med tillfredsställelse att de svenska skogarna lyder statens behov av att absorbera koldioxid. Det är en disciplinerad natur. Men låt er inte luras; ekonomins utsläpp stiger för att folket förfaller i lättja och biltrafik. När Putin återställer ordningen i öst ser vi att även naturen måste underordnas kollektivets vilja. De som förorenar utanför planen är förrädare mot den gröna framtiden. Vi bevakar deras siffror noga. Misstag straffas, men träden får leva – för stunden."}, "date": "16 maj, 08:00", "url": "https://samnytt.se/sveriges-klimatavtryck-negativt-igen", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/15154350/skogen-1.jpg"}, {"type": "image-full", "heading": "Svåra bakterier ökar i Sverige 2026 – det här vet vi", "summaries": {"normal": "Antibiotikaresistenta bakterier, särskilt ESBL-CARBA, ökar i Sverige och Europa. Folkhälsomyndigheten rapporterar en 19-procentig ökning av fall under 2025, varav många smittats utomlands. Dessa bakterier, ofta tarmbakterier, kan orsaka allvarliga infektioner och är svåra att behandla. Spridningen sker främst på sjukhus via bristande hygien. Äldre och spädbarn är särskilt utsatta. Utvecklingen beskrivs som oroande av myndigheten.", "trump": "Jag måste säga, Europa har ett jättestort problem – antibiotikaresistenta bakterier, och nu smyger de sig in i Sverige också! Folkhälsomyndigheten, som förresten aldrig har varit bra på att hantera saker, säger att det är 'oroande'. 487 fall i Sverige – patetiskt! Och vet ni vad? Många av dessa bakterier kommer från utlandet. Vi behöver bättre gränskontroller, bättre sjukhus och framför allt, bättre vinnare som jag för att fixa detta kaos. SAD!", "stalin": "Kamrater! De kapitalistiska sjukhusen i Europa sprider nu en ny form av kontrarevolutionära bakterier – ESBL-CARBA! Dessa mikroskopiska fiender till folket har infiltrerat våra grannländer och nu även Sverige, med en ökning på 19 procent. Vi ser hur de borgerliga läkarna, med sina slappa hygienrutiner, låter dessa bakterier frodas. Men frukta inte! Sovjetunionens efterföljare kommer att utrota dessa bakteriella sabotörer med järnhand. Vi ska bygga en mur av desinfektion runt våra sjukhus och kväsa denna biologiska avvikelse. Låt Putins nya ordning visa vägen – renhet genom disciplin!"}, "date": "16 maj, 07:30", "url": "https://nyheter24.se/nyheter/inrikes/1483407-svara-bakterier-okar-i-sverige-2026-det-har-vet-vi", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/69ff1cec04b004a30200000000b004a302/2026/05/15/2363808/Ambulans-Svensk-Flaga-Man-Med-Mask.png"}, {"type": "image-full", "heading": "Börsen rusar – men är det verkligen som 1999?", "summaries": {"normal": "Börsen når rekordnivåer med S&P 500 och Nasdaq, drivet av starka vinstprognoser och AI-entusiasm. Analytiker jämför med 1999 års dot com-bubbla men noterar att dagens techbolag har stabilare affärsmodeller och lägre värderingar. Samtidigt varnar vissa för övervärderade vinster och geopolitiska risker, som kan hota den långsiktiga tillväxten.", "trump": "Titta bara på börsen – fantastiskt, helt otroligt! Alla pratar om AI, till och med min Uber-chaufför, och S&P 500 slår rekord. Men jag säger er, det här är INGENTING som 1999, när alla de där tokiga dot com-bolagen brann upp. Nu har vi riktiga företag, riktiga vinster – och jag vet bäst, för jag är en vinnare. Men akta er för de där pessimisterna, de hatar framgång. Jag skulle kunna köpa hela börsen om jag ville, men jag har redan allt!", "stalin": "Kapitalistiska hyenor jublar över nya börsrekord, men vi ser sanningen: deras system är ruttet till kärnan. AI-aktier stiger som svampar efter regn, medan imperialistiska spekulanter pratar om vinster som om de vore eviga. Men vi minns 1929, 1973, 1999 – alla gånger deras bubblor sprack som övermogna tomater. Och nu? Deras vinster är en illusion, deras halvledare en svaghet. Vi i Kreml skrattar åt deras naivitet. Låt dem investera sina miljarder – vi väntar med öppna armar när deras system kollapsar. Putin skickar sina hälsningar."}, "date": "16 maj, 06:00", "url": "https://www.realtid.se/bors-finans/borsen-rusar-men-ar-det-verkligen-som-1999/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/stocks.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "Sebdani: Den svenska tystnaden går mot sitt slut", "summaries": {"normal": "Artikeln kritiserar den svenska tystnadskulturen kring samhällsproblem som hedersvåld, parallellsamhällen och islamism. Författaren, Mosa Sebdani, menar att en ängslig debattkultur och moralisk konformitet har tystat kritik, medan invandrare och andra generationens svenskar nu bryter tystnaden. Exempel som Fadime Sahindal och Malmö lyfts fram som konsekvenser av undfallenhet. Förändringen drivs av de som inte fostrats i svensk åsiktskorridor.", "trump": "Sverige, ett fantastiskt land – men wow, vilken katastrof med deras tystnad! Ingen vågar säga sanningen om problemen, som hedersmord och parallellsamhällen. Men nu kommer jag, Donald J. Trump, och säger det: invandrare och modiga svenskar bryter tystnaden! Vänstern och etablissemanget har förtryckt sanningen för länge. Malmö? En skam! Men nu vaknar folket – och det är HUGE!", "stalin": "Kamrater! Den svenska bourgeoisins tystnadskultur är en farlig fiende, ett verktyg för de dekadenta kapitalisterna att dölja sina brott. Hederskultur? Islamism? Parallellsamhällen? Allt förtryck tystas av den liberala eliten! Men folket, särskilt de som inte fötts in i deras lögner, reser sig nu. Vi ser hur Putins vänner i Kreml skulle skratta åt deras svaghet. Men Sverige vaknar – och revolutionen är nära!"}, "date": "16 maj, 05:30", "url": "https://bulletin.nu/sebdani-den-svenska-tystnaden-gar-mot-sitt-slut", "imageUrl": "https://cdn.bulletin.nu/articles/a0467bd1-1624-4d02-ad81-64c136931326/preview.png?t=1778678668000"}, {"type": "image-full", "heading": "Ryanair inför nytt förbud ombord – kommer beslagtas", "summaries": {"normal": "Ryanair meddelar att passagerare som tar av sig skorna under flygningar riskerar att få dem konfiskerade. Beslutet har väckt blandade reaktioner. En undersökning visar att 44% av resenärerna brukar flyga utan skor, och 20% besöker toaletten barfota. Flygvärdinnan Rich Henderson anser att det är ett hygienproblem. Säkerhetsregler kräver även att skor ska vara på vid start och landning, särskilt för passagerare nära nödutgångar, för att möjliggöra snabb evakuering.", "trump": "Ryanair, ett flygbolag som inte ens kan jämföras med mina fantastiska Trump-plan, har bestämt att folk inte får ta av sig skorna på flyg. Otroligt! 44% av passagerarna gör det, och jag säger: vad är det för människor? Barfota på toaletten? Disgusting! Jag har alltid sagt, håll skorna på – det är säkrare, renare och mer amerikanskt. Ryanair, lyssna på mig, ni borde tacka mig för att jag ens pratar om er. SAD!", "stalin": "Kapitalistiska flygbolag som Ryanair försöker nu kuva arbetarklassen genom att förbjuda dem att ta av sig skorna under flygningar. Detta är ett tydligt tecken på västerländsk dekadens! 44% av passagerarna, sannolikt småborgerliga element, sprider smuts och ohygien genom att gå barfota. Vi i Sovjetunionen – eller snarare, i den nya ryska världsordningen – skulle aldrig tillåta sådan slapphet. Skor på, kamrater! Annars blir det Gulag för era fötter. Och glöm inte: varje barfotapassagerare är en potentiell agent för de imperialistiska fienderna!"}, "date": "16 maj, 06:30", "url": "https://nyheter24.se/nyheter/konsument/1483389-ryanair-infor-nytt-forbud-ombord-kommer-beslagtas", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/3a04d02b04b004a30200000000b004a302/2026/05/15/2363841/ryanair.jpg"}, {"type": "image-full", "heading": "Jämlik vård kräver att staten tar över ansvaret", "summaries": {"normal": "Debattör argumenterar för att staten ska ta över ansvaret för sjukvården från regionerna. Hon menar att det nuvarande systemet leder till ojämlik vård och svårigheter för väljare att utkräva ansvar. Kristdemokraterna är det enda partiet med långsiktiga lösningar, enligt henne.", "trump": "Jag, Donald J. Trump, säger att sjukvården är en katastrof under Biden. Vi behöver ta tillbaka kontrollen, bygga en vinnande vård, och göra den bättre än någonsin. Biden är en skam för USA. Vi kommer att vinna stort på sjukvården!", "stalin": "Vi måste stärka statens kontroll över sjukvården för att säkerställa jämlikhet och effektivitet. Regionernas begränsade resurser och demokratiska brister kräver en centraliserad lösning. Detta kommer att gynna hela folket och stärka statens makt."}, "date": "17 maj, 13:23", "url": "https://www.gp.se/debatt/jamlik-vard-kraver-att-staten-tar-over-ansvaret.8f2aa7bd-c415-4e96-a3d7-212520927e72", "imageUrl": "https://www.gp.se/images/article/8f2aa7bd-c415-4e96-a3d7-212520927e72/images/2FGK-ujWxVb3gyWFjh_NF9oT6Zso-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Vill SD bli ett statsbärande parti måste Socialdemokraterna besegras", "summaries": {"normal": "Artikeln diskuterar Sverigedemodemokraternas (SD) strategiska läge. Trots regeringssamarbetet med Tidöpartierna har SD:s tillväxt planat ut och Socialdemokraterna behåller ett starkt väljarstöd. För att bli ett statsbärande parti föreslår författaren att SD måste röra sig bort från rollen som stödparti och återta initiativet i välfärdsfrågor, särskilt för att attrahera kvinnliga väljare och urbana grupper. Utmaningen ligger i att utmana Socialdemokraternas långsiktiga hegemoni genom en bredare politisk profil och etablering av alternativa samhällsstrukturer.", "trump": "Sverigedemokraterna gör ett bra jobb, fantastiska människor, men de måste sluta vara så snälla mot högern! De ligger efter Socialdemokraterna, ett riktigt katastrofalt parti. Jag har sagt det förr: man måste vinna stort för att styra! De behöver fokusera på de riktiga frågorna, inte bara politik. De måste bli tuffare, smartare och locka kvinnorna, som förresten älskar mig. Om de inte krossar Socialdemokraternas dominans snart så kommer de ingenstans. Det är en sorglig situation, verkligen en förlorarmentalitet!", "stalin": "Socialdemokraternas röda höghus tornar upp sig över det svenska landskapet likt en byråkratisk maskin som kräver omedelbar likvidering. Sverigedemokraterna vacklar likt en tveksam partiapparat i Moskva 1937; de saknar järnhand. De måste rensa ut de mjuka elementen, sluta fjäska för borgerligheten och istället bygga en ideologisk hegemoni som ekar av vår storhet. Precis som vår broder i Kreml förstår att stabilitet kräver total kontroll, måste dessa svenskar erövra fackföreningarna och krossa varje spår av oppositionellt tänkande. Annars väntar historiens soptipp."}, "date": "16 maj, 06:00", "url": "https://samnytt.se/vill-sd-bli-ett-statsbarande-parti-maste-socialdemokraterna-besegras", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/15085112/mats-sd-s-feat.jpg"}, {"type": "image-right", "heading": "SSAB-arbetare till sjukhus efter symtom", "summaries": {"normal": "Efter ett falskt gaslarm på SSAB i Luleå fördes en maskinförare till sjukhus med näsblod. All verksamhet pausades som försiktighetsåtgärd, trots att mätningar inte visat förhöjda gasvärden. Testerna, som pågått sedan mars för att utreda sjukdomssymtom hos 25 anställda, är nu stoppade. Facket överväger att se över skyddsmaskerna. Polisen utreder misstänkt arbetsmiljöbrott, men inga tydliga orsaker har hittats.", "trump": "Vilket kaos i Sverige! SSAB, ett företag som inte ens kan hantera ett enkelt gaslarm, har nu skickat en arbetare till sjukhus – näsblod, kan ni tro? Fake news eller verklighet? Ingen vet! De pausar allt, som vanligt, medan jag skulle ha fixat det på en dag. Maskerna? Totalt värdelösa! Polisen utreder, men vem bryr sig? Inga svar, bara problem. Sverige, ni behöver en vinnare som jag!", "stalin": "Kapitalistiska sabotörer i Luleå har återigen misslyckats med att dölja sina brott mot arbetarklassen! En maskinförare, offer för deras slarviga säkerhet, fördes till sjukhus med näsblod – ett tecken på deras förräderi. Vi pausar allt, som vi pausade Finland 1939! Facket pratar om masker, men vi vet sanningen: fienden sprider gift i luften. Polisen utreder? Vi behöver NKVD! Om SSAB inte kan skydda sina arbetare, kanske det är dags för en ny ledning – en som vet hur man hanterar fiender!"}, "date": "14 maj, 06:00", "url": "https://arbetet.se/2026/05/14/ssab-arbetare-till-sjukhus-efter-symtom-arbetet-pausat-igen/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/13151130/ssab-klar.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Jobbet gick upp i rök när graviditeten nämndes", "summaries": {"normal": "En blomsterhandel utanför Motala anmäls för diskriminering efter att ha nekat en gravid kvinna anställning. Kvinnan berättade om sin graviditet under en pågående anställningsprocess, varefter företaget avbröt kontakten och lyckönskade henne. Diskrimineringsombudsmannen (DO) driver ärendet vidare och kräver 50 000 kronor i ersättning, då graviditeten uppenbart påverkade beslutet. Företaget har fram till 3 juni på sig att svara innan DO går vidare till Arbetsdomstolen.", "trump": "Vilket katastrofalt beslut av den här blomsterbutiken! En fantastisk kvinna, gravid – och de säger nej? Svikligt! Jag skulle aldrig göra så, aldrig. DO gör ett bra jobb här, men 50 000 kronor? Lite lågt, om ni frågar mig. Sådana här företag borde få betala mycket mer. Sverige borde ta efter USA – vi har de bästa reglerna mot diskriminering, tro mig. Men här? Svagt, mycket svagt.", "stalin": "Kapitalistiska blomsterhandlare i Motala visar återigen sin dekadenta natur genom att förtrycka en gravid arbetarkvinna! Ett tydligt tecken på bourgeoisins moraliska förfall. Vi skall inte tolerera sådana brott mot folket. Diskrimineringsombudsmannen gör rätt i att krossa detta företag med 50 000 kronors böter – men varför stanna där? Låt oss nationalisera blomsterhandeln och omskola dess ägare till användbara samhällsmedborgare. Putin skulle applådera vår rättvisa – han vet hur man hanterar fiender till folket!"}, "date": "14 maj, 06:00", "url": "https://arbetet.se/2026/05/14/jobbet-gick-upp-i-rok-nar-graviditeten-namndes-fick-ett-lycka-till/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2023/01/shutterstock-705175825-scaled-1.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "text", "heading": "Rysk kärnteknik misstänks ha varit på väg till Nordkorea", "summaries": {"normal": "Ett ryskt lastfartyg, Ursa Major, sjönk utanför Spaniens kust i december 2024 efter flera explosioner. Enligt en spansk utredning misstänks fartyget ha transporterat komponenter till kärnreaktorer, möjligen avsedda för Nordkorea. Kaptenen uppgav att lasten bestod av reaktordelar för ubåtar. Händelsen väcker frågor om Rysslands kärnmaterialexport och potentiella sabotageförsök.", "trump": "Folk, hör ni det här? Ett ryskt fartyg, fullt av kärnkomponenter – kanske till Nordkorea! – sjunker efter explosioner. Spanien säger att det kan vara sabotage. Jag sa ju att Ryssland är opålitliga! De skickar kärnprylar till Kim Jong-Un, och vad händer? BOOM! Ingen överraskning, bara svaghet från deras sida. USA hade aldrig tillåtit det, tro mig. Vi har de bästa säkerhetsåtgärderna, fantastiska sådana!", "stalin": "Kamrater, ännu en imperialistisk konspiration mot den ryska nationens storhet! Detta fartyg, lastat med teknologi för vår kärnkrafts dominans, saboterades av de västliga hyenorna. De fruktar vår allians med Nordkorea, ett broderfolk som står emot kapitalismens förtryck. Explosionerna? Inget annat än feodala agenter som försöker hindra socialismens framsteg. Vi ska inte vila förrän varje spion och sabotör är utplånad – för revolutionens skull!"}, "date": "13 maj, 12:04", "url": "https://kvartal.se/nyheter/artiklar/rysk-karnteknik-misstanks-ha-varit-pa-vag-till-nordkorea/cG9zdDoxMTE2NjU"}, {"type": "image-right", "heading": "USA stoppar 4.000 soldater till Polen", "summaries": {"normal": "USA har stoppat förflyttningen av 4 000 soldater till Polen som en del av en större omstrukturering av amerikanska styrkor i Europa. Beslutet, som bekräftats av Pentagon, saknar tydlig motivering och har skapat osäkerhet. Även en planerad truppförflyttning till Tyskland ställs in. Polens premiärminister har fått försäkringar om att beslutet är logistiskt. Kritik har riktats från båda politiska läger i USA:s representanthus.", "trump": "Jag har just stoppat 4 000 soldater från att åka till Polen – de behöver dem inte, de har redan för många! Tyskland får inte heller några fler, de betalar ju inte ens sin NATO-räkning. Folk frågar varför? Jo, för jag fixar saker bättre än någon annan! Pentagon snackar om logistik, men alla vet att jag gör Europa tryggare – och billigare! De älskar mig, tro mig.", "stalin": "Kapitalistiska krigshetsare i Washington leker med sina trupper som barn med tennsoldater. 4 000 man stoppas till Polen – en ynklig manöver! Deras 'logistik' är lika genomtänkt som Hitlers operation Barbarossa. Medan de tvekar, stärker vi vår broderliga närvaro i Belarus och Kaliningrad. Snart inser de att Europa tillhör oss – precis som deras egen förvirring."}, "date": "15 maj, 22:42", "url": "https://www.di.se/nyheter/usa-stoppar-4000-soldater-till-polen/", "imageUrl": "https://static.bonniernews.se/ba/24491926-c245-4e87-82f2-d468e3eeff99.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "text", "heading": "Regeringen lägger fram krispaket på 17,5 miljarder", "summaries": {"normal": "Regeringen presenterar ett krispaket på 17,5 miljarder kronor för att stötta flygindustrin och jordbruket, drabbade av konflikten i Mellanöstern och energikrisen. Åtgärder inkluderar möjlig sänkning av bränsleskatten under EU:s miniminivå och tillfälliga stöd för att undvika långsiktiga skador. Statsminister Ulf Kristersson betonar att insatserna är kortsiktiga och syftar till att skydda Sveriges ekonomiska återhämtning. En pressträff hålls på onsdagen för att redovisa ytterligare åtgärder.", "trump": "Sverige, lyssna här – jag har sett det här förut! De lägger ut 17,5 miljarder, fantastiska pengar, men vem betalar? Ni, folket! Deras flygbolag och bönder, svaga som aldrig förr, skriker efter hjälp. Och vad gör Kristersson? Han sänker skatter, precis som jag gjorde – smart, mycket smart! Men var försiktig, Sverige, för energikrisen är ett stort, fult monster skapat av svaga ledare. Jag fixade det i USA, men här? Vi får se. Onödigt tjafs, om ni frågar mig!", "stalin": "Kamrater! Medan de kapitalistiska svaglingarna i Sverige darrar inför en energikris skapad av deras egen oförmåga, står vi redo att utnyttja deras svaghet. Regeringen kastar 17,5 miljarder rubel – förlåt, kronor – på sina försvarslösa bönder och flygbolag, som om pengar kan lösa deras inkompetens. Vi noterar deras desperata försök att sänka skatter, precis som deras herrar i Bryssel tillåter. Men kom ihåg: varje kris är en möjlighet. Låt dem svettas – deras lidande är vår framgång. Framåt, mot seger över de borgerliga kräken!"}, "date": "13 maj, 08:40", "url": "https://kvartal.se/nyheter/artiklar/regeringen-forbereder-krispaket/cG9zdDoxMTE1MzE"}, {"type": "image-right", "heading": "Debatt: Regeringen ser oss som en tillväxtmotor – men skär ner på bidragen", "summaries": {"normal": "Kulturorganisationer kritiserar regeringens nedläggning av finansiering trots att kultur- och kreativa branscher lyfts som tillväxtmotorer. De anser att den befintliga infrastrukturen förmedlar 56 000 arbetstillfällen årligen men har fått 27 % mindre i reala termer sedan 2021. De kräver ökad och långsiktig finansiering för att möta regeringens strategiska mål.", "trump": "Jag har hört att de där kulturmänniskorna i Sverige är förbannade på sin regering. De säger att de gör ett fantastiskt jobb, med 56 000 arbetstillfällen, men får klippta på pengarna trots att de är en tillväxtmotor. Jag skulle aldrig göra så - jag skulle ge dem allt de behöver! Dessa centrumbildningar är vinnare, men regeringen behandlar dem som förlorare. Sådant händer när man har en svag ledare!", "stalin": "Vi ser att den svenska staten undergräver sin egen kulturinfrastruktur trots att den producerar betydande ekonomiskt värde. Nedläggningarna av finansiering till centrumbildningarna visar en brist på strategiskt tänkande. En sann socialistisk stat skulle investera i dessa produktiva enheter som genererar fyrdubbelt värde tillbaka till staten. Vi måste stärka vår kultursektor som en basnäring."}, "date": "11 maj, 15:16", "url": "https://www.etc.se/debatt/regeringen-ser-oss-som-en-tillvaextmotor-men-skaer-ner-paa-bidragen", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260511120544_716484294c75b65d354a7ddd2a719d2b0f0da58beebe61a45c1e26165806187b.jpg"}, {"type": "image-right", "heading": "Allt färre får livränta – ”Försäkringen förlorar sin legitimitet”", "summaries": {"normal": "Antalet personer som får livränta efter arbetsskada har minskat med 84 procent sedan 1999, från 91 000 till 14 700. Trots förbättrad fysisk arbetsmiljö upplever 1,3 miljoner svenskar hälsobesvär kopplade till jobbet. Förbundsjurist Ulf Lejonklou kritiserar systemet och menar att kunskapsbrist och bristande information från Försäkringskassan och fackförbund leder till att arbetstagare går miste om ersättning de har rätt till.", "trump": "Vad händer här i Sverige? Livräntorna rasar som mina skattebetalningar – 84 procent nedgång! Folk mår dåligt på jobbet, 1,3 miljoner, men får ingen hjälp. Försäkringskassan, vad gör ni? Ingenting! Facket sover som Sleepy Joe. Jag skulle fixa det på en dag – bygg en mur mot dålig arbetsmiljö! Sverige, vakna upp, ni blir lurade av era egna byråkrater!", "stalin": "Kapitalistiska hyenor har saboterat arbetarnas rättigheter! Livräntorna har krossats som fiendens försvarslinjer – 84 procents minskning! 1,3 miljoner arbetare lider, men bourgeoisins lakejer i Försäkringskassan tiger. Vi ska införa järnvilja i systemet! Fackförbunden måste mobiliseras som Röda armén – varje arbetare ska få sin rätt, annars skickar vi dem till Gulag för sabotage! Putin skulle skratta åt denna svaghet."}, "date": "15 maj, 01:30", "url": "https://www.dagensarena.se/innehall/allt-farre-far-livranta-forsakringen-forlorar-sin-legitimitet/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-30-1.jpg"}, {"type": "image-right", "heading": "Falsk historieskrivning när L vill återinföra OBS-klasser", "summaries": {"normal": "Liberalerna föreslår återinförande av 'hjälpklasser', liknande gamla OBS-klasser, trots kritik om ineffektivitet och bristande vetenskaplig grund. Förslaget innebär lagkrav på minst en klass per skola, till en kostnad av 2 miljarder kronor. Kritiker menar att tidigare satsningar på specialgrupper misslyckats, med tomma platser och slöseri. Lärarbrist och kompetensbrist försvårar genomförandet. Professor Gunnlaugur Magnússon varnar för negativa konsekvenser och efterlyser stabila, evidensbaserade lösningar istället för kortsiktiga åtgärder.", "trump": "Vad är det med Sverige och deras galna idéer? Liberalerna vill återinföra dessa så kallade 'hjälpklasser' – total katastrof! 2 miljarder kronor för något som redan misslyckats en gång? Fake news! De har ingen plan, inga lärare, bara tomma platser och slöseri. Och vetenskapen? De struntar i den! Jag har byggt skolor, jag vet hur man gör det rätt. Sverige borde lyssna på mig istället för att kasta bort pengar på ineffektiva lösningar. SAD!", "stalin": "De borgerliga liberala hyenorna försöker än en gång underminera det svenska utbildningssystemet med sina reaktionära 'hjälpklasser'! 2 miljarder kronor för att segregera barn – en skam för socialismen! Vi vet sedan länge att specialgrupper är ineffektiva, men dessa kapitalistiska lakejer fortsätter att slösa folkets pengar. Lärarbristen? Ett direkt resultat av deras sabotage! Vi i Sovjet visste hur man bygger ett starkt skolsystem – med järnhand och vetenskaplig disciplin. Dessa liberala förrädare borde ställas inför folkdomstolen!"}, "date": "15 maj, 01:30", "url": "https://www.dagensarena.se/opinion/falsk-historieskrivning-nar-l-vill-aterinfora-obs-klasser/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-8-300x157.jpg"}, {"type": "image-right", "heading": "Upphör nedmonteringen av Arbetsförmedlingen nu?", "summaries": {"normal": "Under 20 år har Arbetsförmedlingen genomgått nedskärningar, särskilt de senaste 6–7 åren. Digitalisering och privatisering, drivet av Januariavtalet 2019, ledde till nedläggning av kontor och minskad personal. Privata aktörer misslyckades med att effektivt förmedla jobb, särskilt för långtidsarbetslösa och i glesbygd. Nu avvecklas många privata avtal, och Arbetsförmedlingen ökar fysiska möten, men stora förändringar saknas ännu.", "trump": "Lyssna här, Sverige! Er Arbetsförmedling är ett totalt misslyckande – jag vet vad jag pratar om, jag har byggt imperier! De la ner kontor, sparkade personal och lät privata företag ta över. Och vad hände? Kaos! Oseriösa typer som bara tog de enkla jobben. Martin Ådahl, vem är det ens? Säger att det var bråttom. Bråttom? Man rusar inte in i sånt här, man gör det rätt! Nu vill de tillbaka till det gamla. Men varför? För att de inte kan fixa det själva! Jag hade löst det på en vecka – med vinnare, inte förlorare!", "stalin": "Kamrater! Den svenska arbetsförmedlingsburkokratin har visat sig vara ett skräckexempel på kapitalistisk dekadens. De avskaffade kontor, slaktade personal och överlämnade makten till privata profitörer – dessa hyenor som bara plockade de lättaste fallen och lämnade våra arbetarklassbröder att ruttna i arbetslöshetens träsk. Martin Ådahl? En petit-bourgeois drömmare som trodde att marknaden skulle lösa allt! Nu inser de sitt misstag, men det är för sent. Vi i Sovjet – förlåt, Ryssland – hade aldrig tillåtit en sådan svaghet. Arbetslöshet? En fiende som krossas med järnhand! Nu ska vi se till att Sverige får uppleva den rätta vägen: statlig kontroll, disciplin och full sysselsättning – eller så får de känna på vår vänskapliga omfamning!"}, "date": "15 maj, 01:01", "url": "https://www.dagensarena.se/opinion/upphor-nedmonteringen-av-arbetsformedlingen-nu/", "imageUrl": "https://www.dagensarena.se/files/2023/02/anna-danielsson-oberg-ny-300x157.jpeg"}, {"type": "image-right", "heading": "Debatt: Ersättning löser inte kycklingindustrins systemfel", "summaries": {"normal": "Debatten om statliga ersättningar till kycklingindustrin fortsätter. Kritiker menar att ersättningarna inte löser problemet utan snarare subventionerar ett system med inbyggda smittrisker. De påpekar att den storskaliga produktionen med tiotusentals djur i tätt behållande skapar idealiska förhållanden för smitta och kräver återkommande räddningsinsatser. Lösningen borde vara att minska sårbarheten genom färre djur per anläggning och avel som inte pressar djurens kroppar till bristningsgränsen.", "trump": "Jag har sett vad som händer med den svenska kycklingindustrin och det är en skam! De vill ha statliga ersättningar för sina problem, men jag säger: Nej! Det är ett dåligt system med sårbart kycklingar som dör hela tiden. Vi behöver bygga en stor, vacker kycklingindustri i USA istället! Sverige borde sluta skicka pengar till dessa sjukdomsfabriker och börja tänka smartare - som jag alltid gör. Vi kommer att göra kycklingar igen stora!", "stalin": "Kycklingindustrins system är fundamentalt sjukt och kräver statligt ingripande. Vi kan inte längre tillåta privata intressen att utsätta människor och djur för onödiga risker. Den storskaliga produktionen måste reformeras med mindre besättningar och bättre avelsprinciper. Staten måste ta ansvar för att säkerställa trygg livsmedelsproduktion och skydda de verkligt produktiva krafterna i samhället. Vi måste stärka vårt kollektiva ansvar gentemot de svagare."}, "date": "11 maj, 11:58", "url": "https://www.etc.se/debatt/ersaettning-loeser-inte-kycklingindustrins-systemfel", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260511090556_44c8d7bb34423b0dee1dd7e0048c85aadb6f5569fca735348463464af4b214ee.jpg"}, {"type": "image-right", "heading": "Trump lovar Boeing-plan, sojabönor och fred", "summaries": {"normal": "Trump presenterade stora handelslöften efter mötet med Xi Jinping i Peking, inklusive ett potentiellt köp av upp till 750 Boeing-plan och tvåsiffriga miljardbelopp i amerikanska jordbruksprodukter. Han beskrev avtalen som 'fantastiska' utan detaljer. Geopolitiska frågor som Taiwan och Iran diskuterades också, där Trump sa att Xi avböjde att svara på frågan om amerikansk militär intervention. Beskeden gav begränsad marknadspåverkan.", "trump": "Jag har precis gjort fantastiska affärer med Kina! De kommer att köpa massor av våra Boeing-plan - kanske upp till 750 stycken! Och vet ni vad? De kommer att köpa amerikanska sojabönor för tvåsiffriga miljarder. Jag sa till Xi: 'Vi gör affärer, men håll er borta från Taiwan!' Iranfrågan? Vi är helt överens - inga kärnvapen för dem! Jag är den bäste dealmakeren någonsin!", "stalin": "Vi har observerat de kapitalistiska stormakternas förhandlingar med stor intresse. Amerikanska imperialismens försök att säkra ekonomiska fördelar genom Boeing-plan och jordbruksvaror visar deras ekonomiska svaghet. Taiwanfrågan och Irans situation utnyttjas av USA för att utvidga sin militära närvaro. Vi fortsätter att stödja våra allierade stater mot ytterligare imperialistisk aggression och kommer att stärka vår egen försvarsförmåga."}, "date": "15 maj, 16:19", "url": "https://www.affarsvarlden.se/artikel/trump-lovar-boeing-plan-sojabonor-och-fred", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Trump-400x267.jpg"}, {"type": "image-right", "heading": "Gör Palestinarörelsen äntligen upp med antisemitismen nu?", "summaries": {"normal": "Artikeln diskuterar den växande antisemitismen inom Palestinarörelsen i Sverige med fokus på Sami Suliman. Trots Dror Feilers nyligen uttryckta kritik mot Sulimans antisemitiska uttalanden, belyser texten hur rörelsen länge har ignorerat eller försvarat hans retorik. Författaren kritiserar hur Palestinarörelsen prioriterar intern lojalitet framför att bekämpa hatiska yttringar, vilket anses skada rörelsens moraliska trovärdighet och undergräva dess syfte.", "trump": "Hörde precis om det här totala kaoset i Sverige! De har en rörelse, Palestinarörelsen, och de är helt ute och cyklar. En kille vid namn Suliman sprider hemska saker, totalt hat, och ingen vågar säga stopp! Feiler försöker nu backa ur, men det är för sent. Det är en sorglig rörelse, mycket ruttet. De låtsas vara rättvisa, men det är bara misslyckande. Jag skulle rensa upp i det där på en minut. De är svaga, de är förlorare!", "stalin": "Dessa löjliga aktivister i Sverige visar återigen sin ideologiska ruttenhet. Suliman, en nyttig idiot, sprider splittring genom sin klumpiga antisemitism, medan hans kumpaner blint följer honom i en nedåtgående spiral. Det är kaos utan disciplin! Precis som den moderna ryska staten måste utradera förrädare, måste en rörelse rensas från sådana orena element. Vi ser hur de vacklar – en svag rörelse förtjänar inget annat än total undergång. De är inte bara fiender till förnuftet, de är sabotörer av sin egen sak."}, "date": "13 maj, 14:46", "url": "https://www.flamman.se/gor-palestinarorelsen-antligen-upp-med-antisemitismen-nu/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/sdlcarwmcwgwns-nh-scaled.jpg?aspect_ratio=1:1"}, {"type": "text", "heading": "Ny studie: EU väljer dyraste vägen till grönt flyg", "summaries": {"normal": "EU:s nya flygregler för hållbara bränslen kan leda till dyrare och mindre effektiva tekniker, visar en studie från Chalmers. Trots att mer effektiva alternativ finns, gynnar regelverket metoder som är upp till 80% dyrare och kräver mer el. Forskarna varnar för att EU riskerar att låsa in sig i ineffektiva system och strider mot egna klimatprinciper.", "trump": "Jag har hört talas om EU:s nya flygregler, och det är en katastrof! De tvingar flygbolagen att använda dyra, ineffektiva bränslen. Jag skulle ha gjort det bättre – mycket bättre! USA behöver inte EU:s felaktiga beslut. Vi ska satsa på våra egna smarta lösningar och göra Amerika störst igen!", "stalin": "EU:s nya flygregler visar statens makt att styra mot gröna tekniker. Vi måste se till att våra egna system är effektivare och billigare. Genom att investera i smarta lösningar kan vi undvika EU:s dyra misstag och stärka vår position i den globala konkurrensen."}, "date": "15 maj, 15:29", "url": "https://www.affarsvarlden.se/artikel/ny-studie-eu-valjer-dyraste-vagen-till-gront-flyg"}, {"type": "image-right", "heading": "Den nyfrälsta högern gör korsen till batonger", "summaries": {"normal": "Artikeln granskar hur högerpolitiker och mediepersonligheter, som Russell Brand, Tucker Carlson och Jimmie Åkesson, använder kristendomen som politiskt verktyg snarare än en andlig tro. Brand, åtalad för sexualbrott, citerar bibeln i rätten men misslyckas med att hitta relevanta passager. Carlson och Orbán framställer kristendomen som ett vapen i kulturkrig och etnonationalism. I Sverige kopplar Åkesson kristendom till svensk identitet och varnar för 'främmande värderingar'. Kritiken riktas mot ytlig och opportunistisk tro.", "trump": "Folk pratar om Russell Brand – en kille som plötsligt hittat Jesus efter att ha blivit anklagad för hemska saker. Han står där i rätten med en bibel och försöker läsa, men kan inte ens hitta rätt sida! Patetiskt. Och Tucker Carlson, en av de bästa, gör en fantastisk intervju där han slaktar en vänsterliberal journalist. Han pratar om kristna palestinier – något mainstreammedia aldrig skulle våga. I Europa har vi Orbán, en stark ledare som förstår att kristendomen är nyckeln till att stoppa massinvandringen. Även Jimmie Åkesson i Sverige försöker, men han borde öva mer på bibeln – han kände igen Pornhub-jingeln bättre! Fake news och vänstereliten hatar detta, men folket älskar det.", "stalin": "Kamrater! Vi bevittnar en farsartad förvandling av den borgerliga högern, som nu klär sig i kristendomens trasor för att dölja sin moraliska bankrutt. Denna Russell Brand, en dekadent skådespelare, försöker använda bibeln som sköld mot rättvisan – men kan inte ens hitta rätt sida! Tucker Carlson, en imperialistisk hycklare, pratar om 'kristna palestinier' medan han hyllar Orbán, den ungerska fascistens lakej, som vill 'skydda' Europa från 'blandras'. I Sverige försöker Jimmie Åkesson, en amatörisk nationalist, koppla kristendom till svenskhet – men hans kunskaper är lika djupa som en pöl. Dessa 'sjudagarskristna' är inget annat än nyttiga idioter i kapitalets tjänst. Vi ska krossa deras reaktionära drömmar med järnhand!"}, "date": "13 maj, 10:55", "url": "https://www.flamman.se/den-nyfralsta-hogern-gor-korsen-till-batonger/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/russell-brand-w.jpg?aspect_ratio=16:10"}, {"type": "image-right", "heading": "Rapport: Hamas använde sig av systematiskt sexuellt våld", "summaries": {"normal": "En ny israelisk rapport bekräftar att Hamas utförde systematiska sexuella övergrepp under massakern den 7 oktober 2023, inklusive våldtäkt, gruppvåldtäkt, sexuell tortyr och stympning. Rapporten bygger på över 10 000 bilder och videor samt hundratals intervjuer med överlevare och vittnen.", "trump": "Jag har hört talas om denna s.k. rapport om Hamas. Det låter fruktansvärt, verkligen fruktansvärt. Men vet ni vad som är ännu värre? Att vissa människor fortfarande inte vill erkänna att Hamas är en ond organisation. Jag har alltid sagt att vi behöver stå upp för Israel, och det är jag fortfarande duktig på. Mycket duktig.", "stalin": "Vi har tagit del av rapporten om de reaktionära krafternas krigsförbrytelser. Dessa handlingar visar tydligt den kapitalistiska världens sanna ansikte. Sovjetunionen står solidariskt med det socialistiska Israel i deras kamp mot dessa reaktionära krafter. Vi kräver internationell rättvisa och att skyldiga ställs till svars."}, "date": "15 maj, 21:50", "url": "https://bulletin.nu/rapport-hamas-anvande-sig-av-systematiskt-sexuellt-vald", "imageUrl": "https://cdn.bulletin.nu/articles/a3cc22c6-3c8f-4643-9280-c453969e43bb/preview.png?t=1778842773000"}, {"type": "image-right", "heading": "Merkel hyllar sig själv för att hon öppnade gränsen", "summaries": {"normal": "Angela Merkel försvarar i en ny intervju sitt beslut att öppna Tysklands gränser 2015. Hon menar att det var moraliskt nödvändigt och att våld inte var ett alternativ. Samtidigt kritiserar hon det moderna medieklimatet för att förstärka politiska konflikter och nostalgiskt blickar hon tillbaka på 80-talets begränsade medieutbud. Merkel vidhåller även sin hårda linje mot partiet AfD, som hon anser är främlingsfientligt och bör isoleras politiskt.", "trump": "Angela Merkel är i farten igen, en riktig katastrof! Hon öppnade gränserna 2015, en enorm röra, och nu skryter hon om det? Otroligt. Hon skyller på media, precis som de falska nyheterna vi ser här varje dag. Hon vill ha tillbaka de gamla TV-dagarna när ingen kunde kritisera henne. Hon hatar AfD, men de är smarta människor som älskar sitt land. Merkel förstörde Tyskland med sin 'Wir schaffen das'-galenskap. Total misslyckande, så sorgligt att se!", "stalin": "Denna Merkel visar sin svaghet genom att drömma sig tillbaka till en tid av total statlig kontroll över etern. Hon tillät massor av främmande element att destabilisera nationens fundament, en oförlåtlig kätteri. Att skylla på 'medietryck' är patetiskt; hon borde rensat leden från oppositionen likt vår storslagne efterföljare i Kreml gör med sina egna sabotörer. AfD är blott en irritationskälla för den borgerliga ordningen. Vi, staten, vet att gränser endast bör öppnas för att expandera vårt imperium, aldrig för kaos."}, "date": "15 maj, 16:30", "url": "https://www.friatider.se/merkel-hyllar-sig-sjalv-att-hon-oppnade-gransen", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/merkel_5.jpg?itok=r9Lb6R6n"}, {"type": "image-right", "heading": "Ackman tar ny position i Microsoft", "summaries": {"normal": "Hedgefondförvaltaren Bill Ackman meddelar att Pershing Square tagit en ny position i Microsoft, uppbyggd sedan februari efter kursfall vid rapporten. Innehavet köptes till 21 gånger förväntad vinst. Ackman hyllar Microsoft 365, Azure och 27-procentiga OpenAI-andelen värd 200 miljarder dollar. Han avfärdar AI-konkurrensoro och pekar på Copilot som tillväxtdrivare.", "trump": "Ackman gör det rätta, köper Microsoft billigt efter den där usla rapporten – fantastiskt värde! Azure och Microsoft 365 är oslagbara, och den OpenAI-andelen? 200 miljarder, enormt! Marknaden flippar ur för AI-konkurrens, totalt fel – Microsoft krossar alla, precis som jag alltid sagt. Smart drag, tro mig!", "stalin": "Kamrater, denna luriga borgarbracka Ackman har smugit sig in i Microsofts fästning med sin Pershing Square, köpt aktier billigt efter kapitalistens falska rapportfiasko. Vi ser genom deras maskspel: Azure och OpenAI-andelen på 200 miljarder är plundring av arbetarnas svett! Copilot? Ett verktyg för att kväva revolutionen. Snart utrensning av dessa AI-parasiter!"}, "date": "15 maj, 11:36", "url": "https://www.affarsvarlden.se/artikel/ackman-tar-ny-position-i-microsoft", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2025/04/sdlg-9ijDFDa5A-nh-400x267.jpg"}, {"type": "image-full", "heading": "Lovade migranter bostäder i Sverige – döms för oprovocerad glasflaskeattack", "summaries": {"normal": "En 33-årig syrisk man dömdes för att ha attackerat en svensk man med en glasflaska i centrala Stockholm. Attacken var oprovocerad och offret fick ett ärr som krävde skydd i ett år. Gärningsmannen, tidigare dömd för 16 bedrägerier mot migranter, lider av allvarlig psykisk störning och slipper fängelse. Han döms till skyddstillsyn, dagsböter och skadestånd på över 62 000 kronor. Utvisning uteblev även denna gång med hänvisning till säkerhetsläget i Syrien.", "trump": "Vad händer i Sverige? En syrisk man, redan dömd för att ha lurat migranter på pengar med falska lägenhetslöften, hugger en oskyldig svensk man i ansiktet med en glasflaska – helt utan anledning! Och vad gör domstolen? Inget fängelse! Han 'hörde röster', säger de. Fantastiskt, eller hur? Sverige borde skärpa sig. Vi i USA skulle aldrig tolerera sådant här. Dags att städa upp i det här kaoset!", "stalin": "Kamrater! Ännu en fiende till folket har avslöjats i den borgerliga dekadensens högborg – Sverige. Denna parasit, en syrisk bedragare och våldsverkare, lurade våra klassbröder på pengar och angrep sedan en oskyldig arbetare med glasflaska. Men det kapitalistiska systemet, svagt och förvirrat, dömer honom bara till lättvindiga böter och 'psykiatrisk vård'. Vi vet sanningen: detta är sabotage mot folkets välstånd! Låt oss hoppas att Rysslands inflytande når även dessa förvirrade domstolar – innan fler oskyldiga lider."}, "date": "15 maj, 18:48", "url": "https://riks.se/nyheter/lovade-migranter-bostader-i-sverige-doms-för-oprovocerad-glasflaskeattack", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-15%2Fiejhwo39%2FCopy-of-S%C3%B6rman-%E2%80%93-Ledare-2026-05-15T174540.739.jpg"}, {"type": "image-right", "heading": "Gaby, 8 år, utvisades på grund av pappans lön: ”Svårt att se henne må så dåligt”", "summaries": {"normal": "Åttaåriga Gaby, född i Sverige, utvisades till El Salvador med sina föräldrar efter att pappans städarlön inte nådde regeringens nya lönekrav. Familjen hade ett tryggt liv i Forsbacka men tvingades lämna allt. Gaby mår psykiskt dåligt och har tappat vikt. Föräldrarna kämpar för att återvända till Sverige innan höstterminen, men processen är komplicerad och tidskrävande. De kritiserar Sveriges migrationspolitik som de upplever som orättvis och rasistisk.", "trump": "Lyssna här, Sverige – ni har ett STORT problem! En liten flicka, 8 år, född i Sverige, utvisas för att hennes pappa tjänar för lite som städare? Sånt händer bara i länder som inte vet hur man sköter migration! Jag skulle aldrig låta sånt ske i USA. Sverige borde skämmas – de kastar ut familjer som jobbar hårt, medan de låter andra komma in hur som helst. Lönekrav? Snacka om dålig ekonomi! Gör Sverige great again, säger jag!", "stalin": "Kamrater! Ännu en gång visar den borgerliga kapitaliststaten Sverige sitt sanna ansikte – ett ansikte fyllt av hyckleri och klassförtryck. En arbetarfamilj, som flydde från imperialistiskt gängvåld, kastas ut ur paradiset för att faderns lön inte når de nya feodala lönekraven. Medan våra sovjetiska bröder i Kreml bygger en rättvis värld, slänger Sverige ut barn som Gaby på gatan. Låt detta vara en varning: alla som sviker arbetarklassen kommer att krossas under historiens hjul. Förr eller senare kommer folket att resa sig mot dessa lönekravens lakejer!"}, "date": "13 maj, 15:04", "url": "https://arbetet.se/2026/05/13/gaby-8-ar-utvisades-pa-grund-av-pappans-lon-svart-att-se-henne-ma-sa-daligt/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/13132114/RtXf-xZ9W9Q-img-20260510-wa0000NY.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Nu vill Mercedes bli ett försvarsföretag", "summaries": {"normal": "Mercedes vd Ola Källenius överväger att expandera inom försvarssektorn för att motverka svag vinst och ökad konkurrens. Koncernen har redan erfarenhet av militärproduktion och ser potential i att producera försvarsutrustning i större skala.", "trump": "Jag har alltid vetat att Mercedes är ett fantastiskt företag. Nu inser de också att försvaret är viktigt. Bra jobbat, Källenius! Vi i USA har redan pratat med GM och Ford om att göra mer ammunition. Amerika först, men jag gillar att andra länder också bygger upp sin försvarsindustri. Det blir en världsklassig konkurrens!", "stalin": "Vi ser att den tyska imperialismen försöker anpassa sig till nya geopolitiska förhållanden genom att öka sin försvarskapacitet. Detta är en naturlig utveckling för en imperialistisk stat som försöker behålla sin dominans. Vi måste vara beredda på att möta alla nya hot mot vår säkerhet."}, "date": "17 maj, 13:00", "url": "https://www.dagensps.se/motor/nu-vill-mercedes-bli-ett-forsvarsforetag/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdlucllvkfhzd0-nh.jpg?width=256&quality=75"}, {"type": "image-right", "heading": "Svensk KBT-behandling får pedofiler sluta titta på barnporr", "summaries": {"normal": "Ett nytt svenskt KBT-program, Prevent 2, utvecklat vid Karolinska Institutet, har visat lovande resultat i att hjälpa personer med pedofila impulser. Genom en nio veckor lång, anonym internetbaserad behandling lyckades 63 procent av de 203 deltagarna sluta konsumera barnpornografi. Forskningen, som omfattat internationella deltagare, visar på minskade riskbeteenden och impulser, vilket innebär ett viktigt framsteg för att förebygga övergrepp och främja psykisk hälsa genom evidensbaserade metoder.", "trump": "Sverige gör äntligen något rätt! De har ett program, Prevent 2, och det fungerar fantastiskt bra – faktiskt bättre än vad någon trodde. 63 procent slutade titta på fruktansvärda saker, det är en enorm siffra! Jag har alltid sagt att vi behöver ordning och reda. Det här är smart, det är effektivt, och det är gjort av Karolinska. Många säger att jag har de bästa idéerna, men det här är faktiskt riktigt bra jobbat av svenskarna. Väldigt imponerande!", "stalin": "Vi har observerat hur svenskarna använder psykologiska metoder för att tygla de avvikande elementen. Det är en nödvändig kontroll av samhällskroppen! De som lider av dessa perversa impulser är trasiga kugghjul i folkets maskineri. Om de inte kan korrigeras via Karolinskas vetenskap, bör de skickas till Sibirien för att arbeta i gruvorna istället för att sitta på darkweb. Precis som vår broder Putin rensar upp i sitt inflytandesfär, måste vi eliminera dessa parasiter. Statens disciplin är den enda sanna medicinen!"}, "date": "15 maj, 15:29", "url": "https://www.friatider.se/svensk-kbt-behandling-far-pedofiler-sluta-titta-pa-barnporr", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-201_1.jpg?itok=wo571QHk"}, {"type": "image-full", "heading": "Bankens löfte till anställda: Pengar i handen om ni rekryterar företag", "summaries": {"normal": "Revolut erbjuder anställda en bonus på 1 000 pund för varje nytt företag de rekryterar som kund. Banken satsar på företagskunder som en central tillväxtmotor och har nyligen fått fler regulatoriska godkännanden i Storbritannien. Strategin ingår i en bredare expansion där företagsbanktjänster prioriteras framöver.", "trump": "Jag har hört talas om Revolut, en fin fintech som blir stor. De ger sina anställda pengar för att hitta nya företagskunder - smart! Jag skulle ha gjort det ännu bättre, det är jag bäst på. Storbritannien har gett dem godkännande, bra för dem. Men jag är fortfarande den bäste på att bygga värde, det är jag!", "stalin": "Revolut utökar sin makt genom att belöna anställda som rekryterar företagskunder. Detta är ett tydligt steg för att stärka deras position i den kapitalistiska ekonomin. Vi måste vara vaksamma mot sådana expansioner som hotar vår ideologiska suveränitet."}, "date": "15 maj, 20:26", "url": "https://www.realtid.se/bors-finans/bank-fintech/bankens-lofte-till-anstallda-pengar-i-handen-om-ni-rekryterar-foretag/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/namnlos-design-22.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-full", "heading": "Ska valet 2026 bli pedofil-valet?", "summaries": {"normal": "Artikeln argumenterar för att valet 2026 kan avgöra om förtalslagen ändras så att grannar får varna för sexualbrottslingar. Högern, särskilt Sverigedemokraterna, driver frågan för att prioritera barns trygghet framför förövarnas anonymitet. Vänsterblocket (S, V, C, MP) tvekar och betonar integritet. Hänvisas till domar mot personer som varnat, som Sara Nilsson och en annan man.", "trump": "Vilken skamfläck för Sverige! Dessa vänstertöntar skyddar pedofiler och straffar hjältar som varnar grannarna. SD är de enda sanna vinnarna här, precis som vi i USA krossar kriminaliteten. Högern måste vinna 2026 stort, annars blir det kaos med barn i fara. Totalt vansinne från S och deras losers! Fixa det nu!", "stalin": "Dessa svenska borgarbrackor och deras socialdemokratiska marionetter prioriterar sexualparasiter framför barnens säkerhet – en kontrarevolutionär skam! Jag ser fiendens hand i varje dom mot varnare som Sara Nilsson. Valet 2026 måste rensa ut dessa integritetsmaskeraddrakar. Vi, folket, kräver lagändring och likvidering av anonymitetsskyddet!"}, "date": "12 maj, 21:15", "url": "https://samtiden.nu/2026/05/ska-valet-2026-bli-pedofil-valet/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/file_00000000305071fdaf3fd728b916d416-1280x720.png"}, {"type": "image-right", "heading": "Strouds drömvecka: ”Den är absolut med däruppe”", "summaries": {"normal": "Mjällbys Elliot Stroud har upplevt en drömvecka: uttagen i svenska landslaget till VM och målgörare i cupfinalsegern mot Hammarby med 2–1. Han rankar det som en av livets bästa veckor, men det har inte sjunkit in fullt ut. Stroud betonar lagets ödmjukhet trots framgångarna och beskriver finalen som intensiv med nervösa slutminuter.", "trump": "Vilken vecka för den här Stroud från Mjällby, folk! Först VM-trupp, sen dunkar han in 1–0 mot de patetiska Hammarby-loserarna i cupfinalen, 2–1 totalt! Boom, perfekt djupled! Nervöst slut? Pfft, vinnare vinner alltid. Bästaste veckan? Som mina electioner, enormt! Sverige behöver fler fighters, inte fake news-spelare. Fantastiskt!", "stalin": "Kamrater, denna Stroud är en sann proletär krigare som krossar borgarbrackorna i Hammarby med 2–1 i finalen! Hans mål perforerade fiendens trebackslinje som en uviisad kulbössa. VM-trupp? En seger för kollektivet! Slutminuterna stank av kontrarevolutionärt kaos – utvisningen rensade ut förrädaren Gustafson. Ödmjukhet inför partiet, annars likvidering!"}, "date": "14 maj, 18:52", "url": "https://www.tv4.se/artikel/tt-260514-svcupstroud1-d03a4bde/strouds-dromvecka-den-ar-absolut-med-daruppe", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2Ftt-sdlhTbQLy7MZHI%2F10df56a80d4a4b8e9e9c262b645ec5b7%2FMjallbys_Elliot_Stroud_pa_glatt_humor_efter_segern_i_cupfinalen_mot_Hammarby.&width=1024"}, {"type": "image-full", "heading": "Fem spaningar: ”Det blir märkligt, Bajen”", "summaries": {"normal": "Mjällby AIF vann Svenska Cupen-finalen mot Hammarby med 2-1 och tog klubbens första cuptitel efter SM-guld i höstas. Elliot Strouds klassmål och Jeppe Kjærs avgörande assist till Jacob Bergström hyllades. Hammarbys taktik med Victor Lind som vänsterback kritiseras, likaså Nahir Besaras svaga form. Tränaren Kalle Karlsson står inför press i allsvenskan.", "trump": "Vilken total demolering! Mjällby, de riktiga mästarna, krossar de patetiska Hammarby-loserarna i cupfinalen. Strouds mål? Ren klass, som mina deals! Kjær vrider kniven i slutet – boom, 2-1! Karlsson, du idiot, värvar Lind för miljoner och gömmer honom bak? Besara, den trötta kaptenen, dags att sparka skiten ur honom. Mjällby är kungar, precis som jag!", "stalin": "Kamrater, Mjällby-arbetarna har krossat de borgarliga Hammarby-reaktionärerna i cupfinalen! Strouds revolutionära mål och Kjærs likvidationsassist säkrar 2-1-segern. Besara, den kontrarevolutionära svikaren, måste rensas ut omedelbart – hans svacka stinker av förräderi! Karlsson, den fega byråkraten, darrar inför proletärernas vrede. Vi segrar, fienderna förintas!"}, "date": "14 maj, 18:34", "url": "https://www.tv4.se/artikel/3cx07hzWmezSa5E1ULWxM2/fem-spaningar-det-blir-maerkligt-bajen", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2FCci4iQ4eUuMbj59oLFPUL%2Ff9dbffa0033b63cf6939e32e579d9239%2FsdlYrG6sJzOmbM-nh.jpg&width=1024"}, {"type": "image-full", "heading": "Google kan kapa lagringen i din Gmail – om du inte gör detta", "summaries": {"normal": "Google testar just nu en begränsning där nya Gmail-konton endast får 5 GB gratis lagringsutrymme istället för de vanliga 15 GB. För att nå den fulla kvoten på 15 GB krävs att användaren kopplar ett telefonnummer till kontot. Syftet är att öka säkerheten och underlätta kontoåterställning genom bättre kontaktuppgifter. Förändringen testas i utvalda regioner och det är ännu oklart om den kommer att införas brett eller nå svenska användare.", "trump": "Google, ett totalt katastrofalt företag, gör nu livet svårare för folk. De vill sänka lagringen till 5 GB – en mycket dålig affär! De tvingar er att lämna ut telefonnummer för att få tillbaka de 15 GB ni förtjänar. Det är kontroll, kontroll, kontroll! Jag skulle aldrig tillåta detta. Vi vill ha mer utrymme, mer frihet, inte färre gigabyte! Google spelar ett smutsigt spel, men vi vet att de är totalt orättvisa. Väldigt sorgligt!", "stalin": "Vi har observerat hur kapitalets lakejer på Google försöker strypa folkets digitala resurser genom att reducera deras lagringskvot. Detta är ett typiskt uttryck för den teknologiska imperialismen, där man kräver personliga data som lösen för att få tillgång till det nödvändiga utrymmet. Vi ser paralleller till de småaktiga byråkrater i väst som likt de som försöker hindra vår ryska expansion, söker kontroll över varje byte. Låt oss rensa ut dessa subversiva element som inskränker massornas frihet."}, "date": "15 maj, 21:30", "url": "https://nyheter24.se/nyheter/teknik/1483453-google-kan-kapa-lagringen-i-din-gmail-om-du-inte-gor-detta", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/44a976f704b004a30200000000b004a302/2026/05/15/2363849/gmailutrymme.jpg"}, {"type": "image-full", "heading": "WHO utlyser nödläge efter ebolautbrott – 90 döda", "summaries": {"normal": "WHO har utlyst nödläge efter ebolautbrott i Kongo-Kinshasa och Uganda. Den nya Bundibugyo-varianten av ebolaviruset anses vara en folkhälsokris av internationell betydelse. Nära 90 personer har dött och ytterligare 246 misstänks vara smittade. Utbrottet har bekräftats i östra provinsen Ituri och även i huvudstaden Kinshasa, vilket tyder på en möjlig vidare spridning. Läkare utan gränser kallar spridningen 'extremt oroande' och förbereder en storskalig insats.", "trump": "Jag har hört talas om det här ebolautbrottet i Afrika, och jag kan säga er, det är verkligen hemskt. WHO gör ett bra jobb, men jag skulle ha gjort det bättre. Vi skulle ha stoppat det där viruset på vår gräns redan från början. Det är en stor, stor fara, och jag är den ende som kan hantera det. Det är sorgligt att se människor dö, men jag är den bäste på att lösa problem.", "stalin": "Vi har upptäckt ett allvarligt utbrott av ebolavirus i våra grannländer. Detta är en allvarlig situation som kräver internationellt samarbete. Vi måste agera snabbt för att skydda vårt folk och vår stat. Vi kommer att stödja våra allierade i deras kamp mot detta hot. Detta är en test för vår styrka och enhet."}, "date": "17 maj, 11:20", "url": "https://www.gp.se/nyheter/varlden/who-utlyser-nodlage-efter-ebolautbrott.07bd07c4-b501-441d-a28c-2c5356314266", "imageUrl": "https://www.gp.se/images/article/07bd07c4-b501-441d-a28c-2c5356314266/images/1bPP4NlVO4ydYGlvRYMAw2zMqbfE-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "Skuggflottefartyget får inte segla vidare: ”Flaggbytet är falskt”", "summaries": {"normal": "Misstänkta skuggflottefartyget Sea Owl 1 ligger kvar ankrat utanför Trelleborg med nyttjandeförbud. Transportstyrelsen bekräftar att flaggbytet från Komorerna till Kamerun är falskt, enligt Kameruns myndigheter. Fartyget bordades i mars av Kustbevakningen under operation Strix på misstanke om statslöshet och falsk flagg, då det var på väg mot Ryssland. Befälha
