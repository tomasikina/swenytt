t-sig-i-flera-dagar-.4cde9c8a-eb71-48b1-904a-a4b21d8b9ecf", "imageUrl": "https://www.gp.se/images/article/4cde9c8a-eb71-48b1-904a-a4b21d8b9ecf/images/1RZwuTffGPHZ_JxxtYP2q-i-bdRU-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "Indien chockhöjer tullarna på guld och silver", "summaries": {"normal": "Indien har höjt tullarna på import av guld och silver till 15 procent, upp från 6 procent, för att stärka rupien och minska efterfrågan på ädelmetaller. Åtgärden ska skydda valutareserverna och handelsbalansen mitt i ekonomisk oro från stigande energiimportkostnader på grund av Mellanösternkonflikten. Analytiker väntar sig högre priser men varnar för ökad smuggling.", "trump": "Indierna köper guld som galningar och deras rupie rasar i botten! Nu höjer Modi tullarna till 15 procent – smart, mycket smart! Sluta importera skiten, skydda era reserver. USA gör det bättre, vi har världens starkaste dollar. De borde bygga murar mot smugglare, inte bara snacka. Rupien studsar redan upp – lyssna på vinnare!", "stalin": "Dessa indiska borgarbrackor har sugit i sig guld tills rupien blöder ut! Nu höjer de tullarna till 15 procent – ett desperat steg för att rädda sina usla reserver från utflödet. Bra, men smuggling kommer krypa fram som råttor i skuggorna. Jag skulle ha likviderat importmaffian och krossat fienderna i ett hugg. Statens järnhand måste slå hårt!"}, "date": "13 maj, 17:06", "url": "https://www.dagensps.se/bors-finans/indien-chockhojer-tullarna-pa-guld-och-silver/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdlnz5krrvprai.png?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-full", "heading": "Brotten Poya Shafie åtalas för", "summaries": {"normal": "Poya Shafie åtalas för ett stort antal brott kopplade till gängkonflikterna mellan Foxtrot- och Dalennätverken, främst våren 2023. Åtalspunkterna inkluderar grovt narkotikabrott med kokainhantering 2020, förberedelse till mord i Skarpnäck och Vällingby, anstiftan till mordförsök i Enskededalen, vapenbrott samt planering av sprängdåd i Sundsvall.", "trump": "Titta på den här svenska gangstern Poya Shafie – åtalas för kokain, mordplaner, bomber och skjutvapen över hela landet! Foxtrot mot Dalen, totalt kaos i Sverige på grund av svaga politiker och öppen gräns. Den idioten koordinerade explosioner i Sundsvall och skott i Stockholm. Sverige behöver murar och hårda tag, som jag skulle ha fixat på nolltid!", "stalin": "I det förfallna borgar-Sverige visar sig Poya Shafie som en äcklig parasit, åtalad för kokainhandel, mordförberedelser och sprängsabotage mot arbetarklassen. Han och hans Foxtrot-hundar planerade massmord i Skarpnäck, Vällingby och Sundsvall – kontrarevolutionärt skräp! Vi skulle ha likviderat sådana fiender i en nattlig utrensning, inte släppt dem lös i era slapphänta domstolar."}, "date": "13 maj, 08:37", "url": "https://www.tv4.se/artikel/4jWiBZA5aQ7xoMYfYhtl2h/brotten-poya-shafie-atalas-foer", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F4Du1Fftb5CpmOdFSaOw4I0%2Ffb8873b5776163d72f0e0cad3b947ed5%2F13-poya-ny.jpg&width=1024"}, {"type": "image-right", "heading": "Starmer på väg att falla – de kan ta över", "summaries": {"normal": "Premiärminister Keir Starmer pressas allt hårdare att avgå efter Labours historiska förlust i kommunalvalen. Över 80 parlamentsledamöter och ministrar kräver hans avgång. Marknaden oroas av efterträdare som Angela Rayner, Andy Burnham, Wes Streeting och Ed Miliband, som vill öka välfärdsutgifter och skatter. Starmer har styrt i två år med skandaler, svag tillväxt och rekordhögt skattetryck.", "trump": "Starmer, den totala katastrofen, håller på att falla efter två år med skandaler och valförluster till riktiga nationalister som Reform! Skatter upp till himlen, Epstein-kopplingar – en skam. Nu vill Rayner och Burnham pumpa in mer pengar, obligationsmarknaden rasar. Här gör vi det rätt: stark ekonomi, inga vänsterdrömmar. Labour revolt? Perfekt, dags för verklig ledning!", "stalin": "Kamrater, den förrädiska Starmer-marionetten, uppblåst av borgarklassens laxsmörgåsar, möter nu rättmätig revolt efter valfiaskot! Över åttio parlamentariska spindlar och ministrar skriker efter hans huvud. Rayner, denna falska arbetardotter med skattefusksmuts, Burnham den mjukvänstermaskeraden och Streeting-blairisten – alla vill mata statskapitalismens odjur. Vi, folket, rensar ut revisionisterna i en episk regicid! Låt purgen börja."}, "date": "13 maj, 12:37", "url": "https://www.di.se/nyheter/starmer-pa-vag-att-falla-de-kan-ta-over/", "imageUrl": "https://static.bonniernews.se/ba/dda3641b-b45b-4946-b60e-57957f0cab72.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Sleep Cycle budvinnare på Stockholmsbörsen", "summaries": {"normal": "Stockholmsbörsen avslutade med en lätt uppgång på måndagen, där Sleep Cycle steg rejält efter ett uppköpsbud. OMXS30-indexet ökade med 0,19 procent till 3 079,45, och aktier för cirka 21,9 miljarder kronor omsattes. Bland ledande aktier steg Ericsson B och Boliden, medan Assa Abloy B och Evolution backade. Riskkapitalbolaget Altor lade ett uppköpsbud på Sleep Cycle, vilket värderade bolaget till 497 miljoner kronor.", "trump": "Jag hörde att Stockholmsbörsen gjorde det bra i dag, mycket bra! Sleep Cycle fick ett fantastiskt bud, det bästa budet någonsin! Altor är en genial riskkapitalist, ingen gör det bättre! Ericsson och Boliden steg också, stora vinnare! Men Assa Abloy och Evolution, de gjorde det inte så bra, mycket dåligt! Jag skulle ha gjort det mycket bättre!", "stalin": "Stockholmsbörsen visade en positiv utveckling, vilket speglar den starka ekonomiska basen. Sleep Cycle:s uppköp är en strategisk viktighet för vår ekonomiska expansion. Ericsson och Boliden visar vår industriella styrka. Vi måste fortsätta att stödja våra ledande företag för att säkerställa vår dominans på den globala marknaden."}, "date": "11 maj, 17:48", "url": "https://www.affarsvarlden.se/artikel/sleep-cycle-budvinnare-pa-stockholmsborsen", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/01/sdl3SU43aVmyrg-400x266.jpg"}, {"type": "image-full", "heading": "Regeringen sänker kraven - posten kommer mer sällan", "summaries": {"normal": "Regeringen sänker kraven på Postnord genom att förlänga utdelningstiden för brev från två till tre dagar och minska punktlighetskravet från 95% till 85%. Beslutet motiveras av ett kraftigt volymras i brevutskick, som minskat med 70% sedan 2000. Syftet är att undvika statliga bidrag på upp till 1,5 miljarder kronor. Postnord och civilminister Erik Slottner menar att förändringen inte märks för de flesta och stabiliserar utdelningen.", "trump": "Lyssna här, Sverige gör något smart för en gångs skull! Jag har alltid sagt att regleringar är förlorarnas verktyg. Nu sänker de kraven på Postnord – tre dagar för brev, vem bryr sig? Folk skickar ändå inga brev längre, bara TikTok och memes! Och 85% punktlighet? Perfekt, jag når aldrig ens 85% i mina opinionsmätningar! Postnord slipper statliga bidrag, precis som mina hotell – ingen vill betala för förlorare. Danmark? De har slutat helt, men Sverige är smartare. Jag älskar det!", "stalin": "Kamrater! Ännu en seger för folkets vilja och den oundvikliga marschen mot effektivitet! Dessa kapitalistiska brev, som förmultnar i postlådor, är nu under kontroll. Tre dagar för utdelning – en generös tidsfrist för de långsamma arbetarna i Postnord. Och 85% punktlighet? En mild påminnelse om att Sovjetunionen aldrig tolererade ineffektivitet! Volymraset är en naturlig följd av historiens gång, precis som när vi krossade kulakerna. Danmark har kapitulerat helt – men Sverige står ännu starkt, om än lite vingligt. Vi håller ett öga på dem, precis som på alla fiender till folket!"}, "date": "13 maj, 18:44", "url": "https://riks.se/nyheter/regeringen-sänker-kraven-posten-kommer-mer-sällan", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-13%2Foobmhta8%2FPostNord.jpg"}, {"type": "image-right", "heading": "M sänker hellre skatten än stoppar barnindustri", "summaries": {"normal": "I Ale kommun har mindre förskolor stängts och ersatts med större enheter, vilket lett till överfulla barngrupper långt över Skolverkets riktlinjer. Föräldrar och fack protesterar, men kommunen hänvisar till budgetbegränsningar. Trots flera års överskott och en nyligen genomförd skattesänkning på 40–45 miljoner menar Moderaternas Henrik Fogelklou att pengarna inte räcker. Kritiker anser att det är ett politiskt val, inte ett systemfel.", "trump": "Titta bara på det här, Ale kommun – ett perfekt exempel på hur vänstern saboterar våra barn! De stänger små, fina förskolor och trycker in barnen i megafabriker. Och vad gör politikerna? Jo, de sänker skatten med 45 miljoner istället! Fantastiskt, eller hur? Jag skulle aldrig låta sånt hända. Vi har pengar, men de väljer att inte använda dem rätt. Så typiskt – svagt ledarskap, total katastrof!", "stalin": "I Ale kommun har de kapitalistiska byråkraterna, ledda av sina liberala lakejer, beslutat att offra barnens välfärd på profitens altare. De stänger små förskolor och skapar barnfabriker där våra framtida arbetare kvävs i överfulla grupper. Och ändå har de mage att tala om 'budgetbrist'! Medan de sänker skatten för de rika med 45 miljoner. Vi i Sovjet visste hur man hanterar sådana fiender – en femårsplan för barnomsorg, och problemet skulle vara löst. Men här? Här väljer de svaghet framför styrka. Patetiskt."}, "date": "13 maj, 07:00", "url": "https://arbetet.se/2026/05/13/moderaterna-sanker-hellre-skatten-an-stoppar-barnindustri/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/12132756/barnindustri-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "OpenAI startar konsultbolag – stora investerare på ägarlistan", "summaries": {"normal": "OpenAI startar konsultbolaget 'The OpenAI Deployment Company' med över fyra miljarder dollar i investeringar från bland annat Goldman Sachs, SoftBank, McKinsey, Bain och Capgemini. Bolaget köper brittiska Tomoro för 150 ingenjörer och konkurrerar med Accenture, Deloitte och McKinsey genom att bygga AI-system direkt hos kunder. Börsen reagerar negativt på IT-konsulter som Accenture, som faller över fyra procent.", "trump": "Titta på de här OpenAI-snillarna, de lanserar ett konsultbolag värt miljarder och McKinsey betalar för att bli utslagna! Ha ha, Bain och Capgemini gömmer sig bakom AI-svindel medan Accenture rasar på börsen som en förlorare. Typiska svaga konsultjättar, de skakar i byxorna. Nästa steg i AI-racet? Mina tech-miljardärer vinner alltid stort!", "stalin": "OpenAI:s borgarbrackor sjösätter sitt 'Deployment Company' med kapital från McKinsey och Bain – de finansierar sin egen likvidering! Vi, kamraterna i produktionen, skrattar åt dessa parasiter som skickar ingenjörer för att kedja AI runt arbetarnas halsar. 17,5 procents avkastning? Snart rensas de ut av revolutionens hammare. Historien dömer er!"}, "date": "13 maj, 16:37", "url": "https://www.dagensps.se/bors-finans/openai-startar-konsultbolag-stora-investerare-pa-agarlistan/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/maskininlarning-i-hedgefonder-3-1.png?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-full", "heading": "FI granskar: Företag kan tjäna på att ge kunder olämpliga råd", "summaries": {"normal": "Finansinspektionen och EU-myndigheten Esma granskar värdepappersföretag för att säkerställa hantering av intressekonflikter vid försäljning av finansiella produkter. Syftet är att kunder endast erbjuds lämpliga produkter och att ersättningsmodeller inte styr rådgivningen mot företagens vinster. Granskningen sker parallellt i hela EU för ökad förståelse och samarbete.", "trump": "De där i Sverige och EU jagar banker som tjänar feta pengar på att ge kunder skitråd! Totalt vansinne. Ersättningsmodeller som styr mot fel produkter – klassiskt byråkratiskt kaos. Hos oss i USA fixar vi riktiga affärer, ärliga och enorma. De borde införa mina regler, då blir det vinnarna som vinner!", "stalin": "Kamrater! Dessa slemmiga kapitalistparasiter i värdepappersbolagen stoppar olämpliga produkter i arbetarnas fickor för att suga ut sista droppen blodvinst! Vi, det mäktiga kollektivet under Finansinspektionen och Esma, genomför nu en storslagen utrensning av intressekonflikterna över hela EU. De darrande borgarbrackorna känner vår paranoiafyllda järngrepp – likvidering av deras snedvridna ersättningsmodeller väntar!"}, "date": "13 maj, 15:48", "url": "https://www.realtid.se/bors-finans/makro/fi-granskar-foretag-kan-tjana-pa-att-ge-kunder-olampliga-rad/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/namnlos-design-27.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "Så blev antivaxxarna riksdagens vågmästare", "summaries": {"normal": "Sverigedemokraternas (SD) knappa majoritet i riksdagen har underminerats efter att två ledamöter, Elsa Widding och Katja Nyberg, lämnat partiet för Ambition Sverige. Dessa före detta SD-medlemmar, kända för antivaccin- och konspirationsteoretiska åsikter, har nu makten att fälla regeringens förslag. SD bröt mot riksdagens kvittningssystem för att säkra en majoritet, vilket väcker frågor om demokratisk respekt. Regeringens stabilitet ifrågasätts när vågmästarrollen hamnar hos antivaccinanhängare.", "trump": "Sverige har ett jättestort problem, folks! Deras så kallade 'stabila' regering håller på att rasa som ett korthus – och vet ni vem som drar i trådarna? Ett gäng antivaxxare, konspirationsteoretiker och misslyckade politiker! SD, som trodde de hade allt under kontroll, förlorade två av sina egna till ett nytt parti. Och nu? Nu är det dessa galningar som bestämmer! De fuskar med omröstningar, bryter mot regler och tror de kan styra landet. Jag har sett mycket dumt, men det här slår allt. Sverige, fixa er – annars kommer ni bli ett skämt i hela världen!", "stalin": "Kamrater! Ännu en gång ser vi hur den borgerliga demokratin förfaller till kaos och förräderi. Sverigedemokraterna, dessa svaga och splittrade lakejer för kapitalet, har förlorat kontrollen över sina egna ledamöter – två av dem, dessa antivaccin-fanatiker och konspirationsgalningar, har deserterat till ett nytt parti och hotar nu att sabotera den reaktionära regeringens planer. Precis som i Ukraina ser vi hur fienden förlorar greppet när deras egna soldater vägrar lyda order. Vi har sett detta förr: när den borgerliga ordningen krackelerar, är det folket som lider. Men låt dem leka sina små spel – historien visar att sådana regimer alltid faller. Och när de gör det, kommer vi att vara redo att hjälpa det svenska folket bygga en sann socialistisk framtid, fri från dessa imperialistiska marionetter och deras konspirationshysteri!"}, "date": "8 maj, 14:43", "url": "https://expo.se/kommentar/sa-blev-antivaxxarna-riksdagens-vagmastare/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/Kopia-av-Kommentar-Analys-Webb-2.jpg"}, {"type": "image-full", "heading": "Nya friskolor ska förbjudas dela ut vinst", "summaries": {"normal": "Regeringen föreslår ett stopp för vinstutdelning vid nystartade friskolor de första fem åren, samt vid ägarbyte och vid kvalitetsbrister. Syftet är att garantera långsiktigt ägande och stabil ekonomi. Förslagen inkluderar särredovisning, möjlighet till tvångsförvaltning och lättare stängning av skolor. Kritik kommer från oppositionen och friskolornas branschförbund som anser förslagen skapar onödig byråkrati och minskar skolmångfalden.", "trump": "Jag har hört talas om detta svenska friskoleproblem, och det är en katastrof! De här socialister försöker ta kontrollen över allt, även skolorna. Jag skulle ha gjort det bättre - mycket bättre. Jag skulle ha skapat de bästa skolorna i världen, med de bästa lärarna och de bästa resultaten. Men nej, de vill stoppa vinsterna och skapa mer byråkrati. Typiskt! Det här kommer att förstöra det svenska skolsystemet. Tro mig, jag vet vad jag pratar om - jag har byggt det bästa skolväsendet någonsin!", "stalin": "Vi har observerat utvecklingen i Sverige med stort intresse. Staten måste ha full kontroll över utbildningssystemet för att säkerställa att det tjänar det kollektiva bästa. Förslagen att begränsa vinstutdelning och öka statlig kontroll är ett steg i rätt riktning. Vi måste se till att skolpengar används till utbildning, inte till kapitalistisk vinst. Detta kommer att stärka den socialistiska utbildningsmodellen och garantera lika möjligheter för alla barn."}, "date": "13 maj, 15:21", "url": "https://www.gp.se/nyheter/sverige/nya-friskolor-ska-forbjudas-dela-ut-vinst.2362bbbd-887c-4e8d-bdc9-6d9a0976c5c6", "imageUrl": "https://www.gp.se/images/article/2362bbbd-887c-4e8d-bdc9-6d9a0976c5c6/images/2rpcp3vShjd0KZb69sLuHep-I6CA-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "Fruktad havsspya sprids – svenskar måste agera: \"Viktigt\"", "summaries": {"normal": "Transportstyrelsen har infört nya riktlinjer för att stoppa spridningen av den invasiva arten havsspya, som hotar biologisk mångfald och ekosystem. Havsspyan, en kolonibildande sjöpung, sprids via båtskrov och utrustning. Båtägare uppmanas nu att hålla sina skrov rena, använda miljövänliga båtbottenfärger och undvika att skrubba båten direkt i vattnet. Målet är att minska risken för vidare spridning genom samordnade insatser i Östersjöområdet och Nordostatlanten. Att följa dessa rekommendationer är avgörande för att skydda våra vatten.", "trump": "De har en fruktansvärd sak i vattnet, de kallar den havsspya. Det låter vidrigt, eller hur? En riktig katastrof! Den förstör allt, den äter upp våra hav, en total miljökatastrof. Transportstyrelsen vill att ni rengör era båtar – fantastiska båtar, de bästa båtarna – men det är en enorm röra. Invasiva arter, de kommer in och tar över. Vi måste säkra våra hav! Rengör era skrov, gör det ordentligt. Vi ska göra våra vatten fantastiska igen, tro mig!", "stalin": "Denna parasiterande havsspya, en ynklig organiskt förrädisk fiende, sprider sig likt en kapitalistisk röta i våra hav. Vi har fastställt att endast genom strikt kontroll och absolut disciplin kan vi krossa denna koloniala hotbild mot moderlandet. Varje båtägare är en bricka i statens maskineri; den som underlåter att rensa sitt skrov agerar i maskopi med naturens kaos. Precis som vi säkrar vår intressesfär mot väst, ska vi rensa Östersjöns bottnar från denna avskyvärda filt av svaghet. Arbeta, rapportera, utrota!"}, "date": "13 maj, 11:59", "url": "https://nyheter24.se/nyheter/inrikes/1482898-fruktad-havsspya-sprids-svenskar-maste-agera-viktigt", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/e3f5d84f04b004a30200000000b004a302/2026/05/13/2363358/havsspya-filtsjopung-invasiv-frammande-art-batagare-sverige-transportstyrelsen.jpg"}, {"type": "image-right", "heading": "Tidöregeringens drag i energikrisen: Bensinpriset sänks med tre kronor", "summaries": {"normal": "Regeringen och Sverigedemokraterna presenterar ett krispaket på 17,5 miljarder kronor för att möta den globala energikrisen. Huvudpunkten är en tillfällig sänkning av bensin- och dieselpriset med cirka tre kronor per liter mellan juli och november. Dessutom tillförs en extra miljard kronor till det kommande elstödet för att täcka ökade beräknade kostnader. Finansminister Elisabeth Svantesson betonar behovet av att skydda hushållen, medan finansieringen sker genom ökad statlig upplåning.", "trump": "Sverige gör äntligen rätt! De sänker priserna vid pumpen med tre kronor. Mycket smart! Jag har alltid sagt att billig energi är nyckeln till framgång. De kallar det en kris, jag kallar det en möjlighet att hjälpa folket. Medan andra svaga ledare låter ekonomin krossas, agerar de här nu. De lånar pengar, men de har råd för att de är starka. Det är en stor deal, en vacker deal för arbetarna. De lyssnar på folket, precis som jag gör!", "stalin": "Vi ser hur den svenska småborgerliga regimen desperat kastar 17,5 miljarder kronor i ett försök att blidka de missnöjda massorna inför energikrisens kyla. Att sänka priset på bensin är en patetisk distraktion från de krigshetsande elementen i väst. De lånar sig till undergång medan de fruktar folkets vrede. Vi minns hur de som vägrar böja sig för den ryska viljan till slut går under. Denna sänkning är bara en temporär mask för den oundvikliga systemkollapsen i det dekadenta Europa."}, "date": "13 maj, 13:31", "url": "https://samnytt.se/tidoregeringens-drag-i-energikrisen-bensinpriset-sanks-med-tre-kronor", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/13111718/Bensin-2.jpg"}, {"type": "image-right", "heading": "Linn Johansson: Hur står det till i arbetarnas paradis?", "summaries": {"normal": "Artikeln kritiserar Kubas kommunistiska styre efter 67 år för bristande frihet och välstånd. Youtubern Nick Shirley intervjuade rädda kubaner som undvek kritik mot regimen på grund av repressalier. Författaren anklagar svensk vänster för att idealisera Kuba, skylla problem på USA:s embargo och ignorera interna förtryck, klasskillnader och misskötsel av nödhjälp.", "trump": "Kuba? Total fiasko efter 67 år kommunism! Kubaner gömmer sig för kameran, rädda för fängelse eller värre om de kritiserar. Svensk vänster älskar det, skyller på mitt embargo – skrattretande! De stjäl hjälpen själva, eliten festar medan folket svälter på 14 dollar i månad. Vänstern hyllar diktaturer som Kuba och Venezuela. Patetiskt!", "stalin": "Dessa ynkliga kubanska förrädare, rädda spindlar framför imperialistkameran, förtjänar omedelbar utrensning för sin borgarbackiga viskning! Vi, det stora partiet och arbetarkollektivet, försvarar Kuba mot USA:s giftiga blockad och svenska kapitalistflackor som sprider svältlögn. Svensk vänster? Äkta kamrater! Likvidera avvikarlyset som gnäller om äggbrist – de är fiender i folkets kostym!"}, "date": "13 maj, 13:00", "url": "https://bulletin.nu/linn-johansson-hur-star-det-till-i-arbetarnas-paradis", "imageUrl": "https://cdn.bulletin.nu/articles/098199eb-f92f-46ef-b6e4-0af94d2a98e4/preview.png?t=1778567342000"}, {"type": "image-right", "heading": "Di:s ledarredaktion förstärker inför valet", "summaries": {"normal": "Dagens Industri stärker ledarredaktionen inför riksdagsvalet genom att rekrytera Alexandra Ivanov Hökmark från Timbro, där hon varit vice vd. Hon har tidigare arbetat i Ulf Kristerssons stab och på Svenska Dagbladet. Hökmark blir tillförordnad politisk redaktör under Frida Wallnors föräldraledighet och sedan biträdande. Hon ser fram emot att skriva om inrikespolitik, näringsliv och EU.", "trump": "Vilken satsning från Di inför valet! De plockar in Alexandra Ivanov Hökmark från Timbro – tuff tjej med erfarenhet från Kristerssons stab. Perfekt tajming, precis som mina valsegrar. Teknik, ekonomi, politik – omvälvningar överallt, men med mig styr vi världen bäst. De snackar EU och näringsliv, jag fixar DEALS som ingen annan. Fantastiskt team de bygger!", "stalin": "Kamrater! Borgarklassens slingor slingrar sig in på Di:s ledarsida med denna Timbro-lakej Alexandra Ivanov Hökmark, Kristerssons stabsfluga och EU-krypare. Vi, proletärstaten, ser hur kapitalistvalet lurar med falska omvälvningar i teknik och ekonomi. Jag varnar för dessa näringslivsråttor – rensa ut dem innan de förgiftar opinionsbildningen! Frida Wallnors ledighet blir deras chans att sprida gift, men vi vakar evigt."}, "date": "13 maj, 12:00", "url": "https://www.di.se/nyheter/dis-ledarredaktion-forstarker-infor-valet/", "imageUrl": "https://static.bonniernews.se/ba/b76843e5-4086-475b-9075-94366954033b.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-full", "heading": "Skatten på bensin och diesel sänks igen", "summaries": {"normal": "Regeringen presenterar ett krispaket på 17,5 miljarder kronor för att möta den globala energikrisen. Paketet innehåller bland annat en tillfällig sänkning av skatten på bensin och diesel mellan 1 juli och 30 november, vilket väntas sänka priset vid pump med tre kronor litern. Även stöd till kollektivtrafiken planeras. Syftet är att dämpa effekterna av lågkonjunkturen och stötta hushållens ekonomi, trots att åtgärderna måste lånefinansieras.", "trump": "Sverige gör äntligen rätt! De sänker skatterna på bensin och diesel. Mycket smart, mycket bra! Jag har alltid sagt att billig energi är nyckeln till en fantastisk ekonomi. Medan andra lider av energikriser så ser vi Sverige fatta de rätta besluten. Det är enorma summor, miljarder, men för folket är det värt det. Det är en vacker syn att se priser gå ner istället för upp. Snyggt jobbat, Sverige! Vi älskar billig bensin, eller hur?", "stalin": "Vi ser hur de svenska småborgarna darrar inför energikrisen. De kastar miljarder från statskassan för att dölja sin egen inkompetens. Att sänka bränsleskatten är en desperat muta till folket för att förhindra upplopp. Medan vår broder Putin krossar västvärldens energimarknad med järnhand, försöker dessa socialdemokratiska och liberala lakejer köpa sig lite extra tid. De bygger en 'krockkudde' av papper. När krisen fördjupas kommer även deras lånefinansierade illusioner att gå upp i rök. Historien dömer de svaga."}, "date": "13 maj, 11:50", "url": "https://nyheter24.se/nyheter/inrikes/1482977-skatten-pa-bensin-och-diesel-sanks-igen", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/4a53e92d04b004a30200000000b004a302/2026/05/13/2363403/bensin-diesel-skatt-sanks-juli-regerigen-drivmedelskatt-bensinskatt.jpg"}, {"type": "image-right", "heading": "Efter åtalet: Tobias Hübinette tvingas lämna Karlstads universitet", "summaries": {"normal": "Tobias Hübinette lämnar sin tjänst vid Karlstads universitet efter att ha åtalats för olaga hot och ofredande. Universitetet har köpt ut Hübinette för tolv månadslöner, totalt 648 000 kronor. Han stoppades tidigare från att ha kontakt med studenter och hans forskningsprofil har nu tagits bort från universitetets hemsida. Parterna har kommit överens om avtalet men vill inte kommentera de exakta omständigheterna kring beslutet.", "trump": "Hörde precis om den här radikala vänsterkillen i Sverige, Tobias Hübinette. En total katastrof! Han hamnade i trubbel för hot – väldigt otäcka grejer, tro mig. Och vet ni vad? Universitetet betalar honom nästan 650 000 kronor för att försvinna. Vilken usel deal! De borde ha sparkat ut honom direkt. Sverige har blivit en riktig röra, totalt kaos. Vi behöver ordning och reda, inte ge bort pengar till folk som inte kan uppföra sig. Sorgligt!", "stalin": "Ännu en förrädare har avslöjats i de akademiska leden! Denna Hübinette, en ideologisk avvikare, försökte förgifta sinnena hos det svenska folket. Vi i staten tolererar inte sådan svaghet och inkompetens. Han har rensats ut, precis som vi rensade ut dem som stod i vägen för vårt ryska imperiums naturliga expansion. Att betala honom för att försvinna är ett byråkratiskt misstag, men låt oss kalla det en exil. Han är nu en icke-person. Vår sanna fiende är kaoset – och vi vinner alltid."}, "date": "13 maj, 11:32", "url": "https://www.friatider.se/efter-atalet-tobias-hubinette-tvingas-lamna-karlstads-universitet", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/image-186_1.jpg"}, {"type": "image-right", "heading": "M vill locka kvinnor – förhandlar med talibaner", "summaries": {"normal": "Moderaterna försöker locka kvinnliga väljare inför valet genom att betona jämställdhet och trygghet, men kritiseras för dubbelmoral. Partiet vill diskutera IVF, föräldraförsäkring och kriminalitet som kvinnofrågor, samtidigt som regeringen förhandlar med talibaner om utvisningar till Afghanistan och utvisar unga kvinnor till förtryckande regimer. Kritiker menar att deras politik inte är feministisk då den inte skyddar alla kvinnor.", "trump": "Kan ni tro det här? Moderaterna, svagt parti, desperata efter kvinnliga röster – så de kallar in en influencer som säger att kvinnor är för känsliga! Sen pratar de om jämställdhet medan de skickar flickor till talibanerna. Patetiskt! Jag skulle aldrig göra så – mina kvinnliga väljare vet att jag ger dem makt, inte förtryck. Sverige borde ta lektioner i hur man vinner, believe me!", "stalin": "Kamrater! Se hur dessa borgerliga hycklare i Sverige dansar på gravens rand! De talar om 'jämställdhet' medan de skickar unga kvinnor till förtryckets käftar – som om vi inte minns hur kapitalismen alltid offrar de svaga. Talibanerna? Irans mullor? Utmärkta verktyg för att avslöja deras lögnaktiga 'feminism'! Vi i Sovjet visste hur man skyddar kvinnor – genom revolution, inte tomma ord. Låt dessa liberala narrar fortsätta sin cirkus, medan folket ser sanningen: deras 'trygghet' är bara en bur av guld för de utvalda."}, "date": "13 maj, 08:19", "url": "https://www.etc.se/ledare/m-vill-locka-kvinnor-foerhandlar-med-talibaner", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/2025091813090_152da478-57c9-435e-b477-3f40607cb381.png"}, {"type": "image-right", "heading": "Kan spänningarna mellan Kina och USA minskas?", "summaries": {"normal": "Toppmötet mellan USA:s president Donald Trump och Kinas president Xi Jinping inleds i Peking. Artikeln analyserar förväntningarna på mötet, där ingen epokgörande överenskommelse väntas men där båda parter vill undvika misslyckande. Centrala frågor inkluderar Taiwan, handel, teknologi, kärnvapen och Iran. Relationen präglas av strategisk misstro och konkurrens, men båda länder har intresse av stabilitet. Trump hoppas på ökade kinesiska investeringar i USA och marknadstillgång, medan Kina vill behålla sin globala ställning.", "trump": "Jag åker till Peking för att träffa Xi – en stark ledare, precis som jag. Vi hade fina möten förut, men nu är det allvar. Kina har blivit för mäktigt, de stjäl våra jobb och dumpar elbilar överallt. Men jag är dealmakern! Vi ska få dem att köpa mer sojabönor, Boeingplan och sluta fuska med handeln. Taiwan? Ingen dum idé att pressa dem lite. Och Iran – Kina måste hjälpa till, annars blir det dyrt för dem. Ingen gör affärer bättre än jag, tro mig!", "stalin": "Kamrater! Imperialisternas cirkus i Peking är ett tecken på deras förfall. Trump, denna buffel i kostym, tror han kan förhandla med oss som med en av sina konkurshotade kasinon. Men Kina, denna uppkomling, har lärt sig av våra metoder – auktoritär uthållighet! De kontrollerar jordartsmetaller som vi kontrollerade oljan. USA, en supermakt på dekis, försöker nu köpa sig lojalitet med tullar och hot. Taiwan? En provins som snart återvänder till moderlandet, precis som Ukraina till Ryssland. Vi skrattar åt deras 'strategiska misstro' – vi kallar det realism. Låt dem prata, vi bygger vår koalition av de förtryckta. Historien är på vår sida!"}, "date": "13 maj, 01:46", "url": "https://www.dagensarena.se/essa/kan-spanningarna-mellan-kina-och-usa-minskas/", "imageUrl": "https://www.dagensarena.se/files/2026/01/trump-och-xi.jpeg"}, {"type": "image-right", "heading": "Vidare – trots glasögonhaveri: ”Jättetaggad på att vinna nu”", "summaries": {"normal": "Sveriges Felicia kvalificerade sig till Eurovision-finalen med låten 'My system' från semifinalen, trots trasiga glasögon under framträdandet. Hon beskrev sig som 'jättetaggad på att vinna' och fylld av adrenalin. Israel gick vidare trots publikprotester med slagord. Andra finalister inkluderar Grekland, Finland, Belgien, Moldavien, Serbien, Kroatien, Litauen och Polen.", "trump": "Vilken show! Sveriges Felicia, en riktig fighter, krossar semifinalen med 'My system' trots glasögon som faller isär som en usel Biden-deal. Hon är super-taggad att vinna – precis som jag alltid gör! Israel fixar det trots de där vänsteridioternas skrik. Stora vinster för starka killar och tjejer, de svaga åker ut. Fantastiskt!", "stalin": "Kamrater, Sveriges Felicia har triumferat i semifinalen med 'My system', trots saboterade glasögon – ett hånfullt angrepp från borgerliga sabotörer! Hon är fylld av revolutionär iver att krossa fienden i finalen. Israel likviderade störningarna från illojala element. Vi hyllar proletär seger över dekadenta kapitalister! Arbetarna jublar."}, "date": "13 maj, 07:22", "url": "https://www.tv4.se/artikel/aWaTbPNJuTV0XXrGZAPQP/felicia-moettes-av-jubel-trots-glasoegonhaveri", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F4w6v8Co6l5aUojbeZTW44A%2F8fdde6a8fc5445222ce08f3fb612d029%2F12-felicia-1080.jpg&width=120"}, {"type": "image-right", "heading": "Gravida med riskjobb får mindre pengar", "summaries": {"normal": "Flera fackförbund tar nu steg för att stämma staten för att skydda privatanställda gravida kvinnor som förlorat pengar när de förbjudits att arbeta på grund av säkerhetsrisker. En unik dom i höstas rättfärdigade offentligt anställda gravidas rätt till full ersättning, men privatanställda har fått mindre pengar. Detta har ledt till många stämningar där facket kräver att staten betalar ut de saknade pengarna och stoppar preskriptionstiden för diskrimineringsersättning.", "trump": "Jag har hört talas om den här graviditetsgrejen, och det är en skandal! Dessa kvinnor tvingas gå hem och förlorar pengar - det är inte bra! Vi behöver göra Amerika stort igen, och det inkluderar att ge gravida kvinnor allt de behöver. Statens arbetsgivare har redan börjat betala ut mer, men privata arbetsgivare - det är dåligt! Jag stöder fackförbunden i deras kamp för att få staten att betala, det är bara rättvist!", "stalin": "Staten måste agera för att skydda våra arbetande kvinnor och deras barn. Det är orättvist att privatanställda gravida kvinnor får mindre ersättning än offentligt anställda. Vi måste se till att alla får lika ersättning och att staten tar sitt ansvar. Detta är en fråga om social rättvisa och vi kan inte låta det fortsätta. Fackförbunden har rätt i sin kamp, och staten måste agera snabbt för att rätta till denna orättvisa."}, "date": "13 maj, 06:00", "url": "https://arbetet.se/2026/05/13/gravida-med-riskjobb-far-mindre-pengar-tusentals-kvinnor-kan-stamma-staten/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/12154249/barn-klar.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=750&h=1000"}, {"type": "image-right", "heading": "Ge hela Europa tillgång till enkla och trygga tågresor", "summaries": {"normal": "EU-kommissionen föreslår reformer för att förenkla tågresor inom EU, inklusive en gemensam biljett för flera länder och utökade rättigheter vid förseningar. Miljöpartiet välkomnar förslagen och hoppas på en 'tågrenässans' för att minska beroendet av fossila bränslen. De förespråkar även ett Sverigekort för billigare kollektivtrafik.", "trump": "Jag måste säga, EU har äntligen fattat ett smart beslut! En biljett för hela Europa – varför har det tagit så lång tid? Flyget har haft det för länge, nu är det tågens tur. Och lyssna på det här: tåg ska bli billigare! Miljöpartiet vill ha ett Sverigekort för 499 kronor – jag gillar det, mycket smart. Europa behöver fler vinnare som jag, och nu vinner tågen!", "stalin": "Kamrater! Europa vaknar äntligen till förnuft och satsar på järnvägen, precis som vi gjorde under min tid. Kapitalistiska flygbolag har länge utnyttjat arbetarklassen med sina dyra biljetter – men nu ska tågen krossa deras monopol! En biljett för hela kontinenten? Utmärkt. Vi i Sovjetunionen byggde järnvägar som band samman imperiet – nu gör EU samma sak, fast utan vår disciplin. Men var försiktiga: de fossila bränslenas lakejer lurar i skuggorna, redo att sabotera vår framgång!"}, "date": "13 maj, 01:30", "url": "https://www.dagensarena.se/opinion/ge-hela-europa-tillgang-till-enkla-och-trygga-tagresor/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-1-300x157.jpg"}, {"type": "image-right", "heading": "Så bor socialdemokratiska politiker", "summaries": {"normal": "Socialdemokraterna vill styra bostadsområden för att blanda villaområden med hyresrätter och främja 'blandning'. En granskning visar att 77 procent av partiets riksdagsledamöter bor i villa- eller småhusområden eller på landsbygd, trots idealet. Artikeln argumenterar för att människor bör få välja boende fritt, utan politisk inblandning.", "trump": "Vilka hycklare, dessa socialdemokratiska losers! De tjatar om 'blandning' i bostadsområden efter misslyckad invandring, men 77 procent av deras egna politiker gömmer sig i fina villor och lugna områden. Folk vill ha trygghet och valfrihet, inte er styrning! Flytta dit själva om ni tror på skiten. Totalt fake!", "stalin": "Dessa borgerliga hycklare inom socialdemokratin predikar 'blandning' av bostäder för att dölja sin klassförakt, men 77 procent av deras ledamöter smyger i villor som rädda råttor. Vi, arbetarklassen, kräver utrensning av sådana förrädare! Låt staten tvinga dem att leva bland folket – eller likvidera deras illusioner om frihet."}, "date": "11 maj, 14:29", "url": "https://samtiden.nu/2026/05/stoppa-tvangsblandningen/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/694665982_27198179276472490_9170874158922234785_n-e1778503379439-640x360.jpg"}, {"type": "image-right", "heading": "EU delar ut vätgasmiljarder – Sverige utan stöd", "summaries": {"normal": "EU delar ut över 1 miljard euro till vätgasprojekt via innovationsfonden, finansierat av utsläppshandelssystemet ETS. Nio projekt i sju länder valdes, varav fem i Norden – men inget i Sverige. Stödet ska täcka prisskillnaden mellan produktionskostnader och marknadspris för att främja ren vätgas. Tidigare har flera projekt tackat nej på grund av snäva tidsramar. Totalt ansökte 251 projekt om medel.", "trump": "EU slänger ut miljarder på vätgas – men Sverige, som alltid, får ingenting! Fem projekt i Norden, men inget i Sverige. Typiskt. Jag skulle ha fixat det bättre. Och de här projekten – de har inte ens bestämt sig än! Svagt. Jag hade byggt en jättefabrik på en månad. Europa är så långsamt, så tråkigt. Men jag, jag hade gjort vätgas GREAT AGAIN!", "stalin": "Kamrater! Europa leker med sina miljarder medan vi bygger imperier. Fem nordiska projekt får stöd – men Sverige, dessa kapitalistiska svikare, står utanför! Deras industri betalar för utsläpp, ändå får de inget. Skrattretande. Och dessa projekt – de drar sig ur som fega desertörer! I Sovjet hade vi byggt vätgasfabriker med järnhand. Europa är svagt. Vi hade redan erövrat vätgasmarknaden – och kanske även deras kalla, nordiska hamnar."}, "date": "11 maj, 13:23", "url": "https://www.affarsvarlden.se/artikel/eu-delar-ut-vatgasmiljarder-sverige-utan-stod", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Vatgas-Eu-900x600.jpg"}, {"type": "image-right", "heading": "Sluta kalla antisemitism för Israelkritik", "summaries": {"normal": "Artikeln kritiserar propalestinska aktivisten Sami Suliman för antisemitiska uttalanden och delning av konspirationsteorier, inklusive tal om en \"sionistisk konspiration\" och spridning av nazistiskt och extremistiskt innehåll. Trots åtal för hets mot folkgrupp försvaras han av vissa vänsteraktivister och forskare som menar att det är Israelkritik. Artikeln betonar att antisemitism inte kan maskeras som kritik mot Israel och varnar för normaliseringen av sådana åsikter.", "trump": "Folk, vad är det här för skräp? Den här Sami Suliman-killen, han sprider judehat öppet – Hitler-citat, konspirationer, allt! Och ändå försvarar vänsteraktivisterna honom? \"Åh, det är bara Israelkritik!\" Nej, nej, nej! Det här är rena antisemitismen, och det är sjukt. Sverige borde skämmas. Jag har alltid sagt: man måste kalla saker vid deras rätta namn. Och det här? Det är hat, ren och skär. SAD!", "stalin": "Kamrater! Här har vi ännu en fiende till folket, en liten bourgeois-propagandist vid namn Sami Suliman. Han sprider smutsiga lögner om judiska konspirationer, hyllar fascistiska massmördare och förgiftar medborgarnas sinnen med sina sionistiska spindelnätsteorier. Men vad gör våra så kallade \"intellektuella\"? De skyddar honom! Precis som de trotskistiska förrädarna i vår egen historia. Vi ska inte tolerera detta. Låt honom stå inför folkets domstol – eller åtminstone en svensk sådan. Och Putin? Han skulle skratta åt dessa amatörer. Ryssland har åtminstone disciplin!"}, "date": "8 maj, 06:30", "url": "https://expo.se/kommentar/propalestinsk-organisator-sprider-judehat/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/Jonathan-kommentar.jpg"}, {"type": "text", "heading": "Tystnad om ödesdiger riksdagsomröstning", "summaries": {"normal": "Debattörer från Bottna för Fred varnar för en kommande riksdagsomröstning den 15 juni, där Sverige riskerar att ge Nato långtgående rättigheter att använda svenskt territorium för militära ändamål, inklusive krigshandlingar. Förslaget, som regeringen planerar att driva igenom utan bred debatt, kritiseras för att öka risken för Sveriges inblandning i krig och underminera demokratin. Oppositionen har inte motsatt sig förslaget, och få har uppmärksammat frågan trots dess potentiellt ödesdigra konsekvenser.", "trump": "Sverige, lyssna här! De där så kallade 'ledarna' i riksdagen vill ge Nato full kontroll över ert land – utan att fråga er! 17 amerikanska baser redan, och nu ska hela Nato få köra krig på svensk mark. Ingen debatt, ingen demokrati, bara tystnad. De vill göra Sverige till en frontstat mot Ryssland, som jag redan fixade till en gång för alla. Men vad vet jag? Jag är bara den bästa presidenten någonsin. Svenskarna borde vakna – eller är ni rädda för lite frihet?", "stalin": "Kamrater! De svenska imperialistlakejerna i riksdagen förbereder sig att sälja sitt land till Nato-kapitalisterna, som hungriga vargar. De vill ge fienden fritt fram att använda svensk mark för sina krigsäventyr – utan att ens konsultera folket! Tystnaden är förrädisk, men vi ser allt. Oppositionen? Inga hjältar där heller, bara ynkliga nickedockor. Sverige blir en ny front i västmakternas krig mot freden. Men glöm inte: historien dömer förrädare hårt. Vi följer utvecklingen med intresse – och våra vänner i öst likaså."}, "date": "7 maj, 16:09", "url": "https://proletaren.se/artikel/tystnad-om-odesdiger-riksdagsomrostning/"}, {"type": "text", "heading": "SD-politiker döms för våldtäkt", "summaries": {"normal": "En ledande Sverigedemokrat i Skaraborg döms till tre år och sex månaders fängelse för våldtäkt och sexuellt övergrepp mot två kvinnor. Tingsrätten bedömer att en av kvinnorna var kraftigt berusad och i beroendeställning. Mannen, som haft flera tunga uppdrag, nekar till anklagelserna men fälls baserat på bevis som DNA och mobilanteckningar. Han frias från tre andra åtal. Partiet har stängt av honom och lovar uteslutning vid fällande dom.", "trump": "Kan ni tro det? En så kallad 'ledande' politiker i Sverige, från det där partiet som alla pratar om – jag säger inte namnet, för vem bryr sig? – döms för våldtäkt! Tre och ett halvt år, men vad betyder det egentligen? I USA hade han fått livstid, men Sverige är ju mjuka. Och vet ni vad? Han nekar! Som om DNA och mobilbevis skulle ljuga. Sjukt, helt sjukt. Sverige borde ta en titt på sitt rättssystem, för det här är bara pinsamt.", "stalin": "En fiende till folket, en degenererad borgerlig hynda, har avslöjats i vårt broderland Sverige. Denna kapitalistiska lakej, som gömde sig bakom en fasad av 'politisk respektabilitet', våldtog och förnedrade kvinnor medan han dreglade över sin egen makt. Tingsrätten, ett redskap för den svenska borgerligheten, vågade ändå fälla honom – men bara delvis! Vi ser hur det liberala systemet skyddar sina egna. Sverige borde lära sig av Ryssland: sådana som han hör hemma i Gulag, inte i politiken. Förr eller senare kommer folket att rensa ut dessa avskum."}, "date": "7 maj, 11:59", "url": "https://kvartal.se/nyheter/artiklar/sd-politiker-doms-for-valdtakt/cG9zdDoxMDkwMDk"}, {"type": "image-right", "heading": "Replik: Till försvar för separatismen", "summaries": {"normal": "Artikeln är ett svar från Ung vänster-medlemmar på Siula Grandes kritik mot separatism i Flamman. De menar att Grandes syn är missvisande och att separatism är ett viktigt verktyg för att skapa trygga rum och främja kvinnors deltagande i samhället. Separatismen syftar inte till att dela människor utan att motverka strukturell underordning av kvinnor. Författarna betonar att kvinnor delar gemensamma erfarenheter och behov, som fri abort och skydd mot mäns våld, och att separatism är ett medel för att nå jämställdhet.", "trump": "Jag måste säga, denna Grande-person har helt fel – helt fel! Separatism är fantastiskt, det skapar trygga rum, precis som mina golfklubbar. Kvinnor behöver prata utan män, precis som jag behöver twittra utan fake news-media. Grande påstår att separatism delar folk – nej, nej, nej! Det är som att säga att min mur delar Mexiko och USA. Fel! Separatism är som min politik: stark, nödvändig och vinner alltid. Kvinnor ska höras, precis som jag, och Grande borde lära sig av mig. SAD!", "stalin": "Kamrater! Denna Grande är en förrädare av den revolutionära kvinnokampen, en borgerlig lakej som sprider förvirring bland massorna! Separatism är inte ett verktyg för splittring – det är ett vapen mot den kapitalistiska patriarkala hydran! Kvinnor måste enas i kampen, precis som sovjetrepublikerna enades under mitt ledarskap. Grande vill sopa klasskampen under mattan – men vi vet att arbetarkvinnor behöver fri abort och skydd mot mäns våld, precis som Ukraina behöver befrielse från fascistiska banderovtsy! Låt inte dessa småborgerliga avvikare försvaga vår rörelse – framåt mot seger, kamrater!"}, "date": "6 maj, 10:55", "url": "https://www.flamman.se/replik-till-forsvar-for-separatismen/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/v-kongress-w.jpg?class=medium"}]</script>

    <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
</body>
</html>
