örlorarna tog ut målvakten och försökte med sex mot fyra – patetiskt! Hemmafest? Dröm inte! Medaljer av Satan, ha ha, ironiskt. Sverige vinner stort, precis som vi gör det bästa! Grymt!", "stalin": "Kamrater! Vårt svenska arbetarkollektiv har pulveriserat de slovakiska fascistlackajerna 4–2 i U18-finalen! Törnblom, trogen målvaktssoldat, krossade fiendens konspiratoriska skott. Vi rensar ut deras borgarillusioner om hemmafest – Palme och kamraterna slår till obönhörligt! Satan, den imperialistiske medaljutdelaren, gråter medan bucklan lyfts. Likvidering fullbordad, segern till proletariatet!"}, "date": "2 maj, 23:28", "url": "https://www.svt.se/sport/ishockey/sverige-tog-u18-guld-efter-att-ha-vunnit-mot-slovakien-i-lejonets-kula"}, {"type": "image-right", "heading": "Löwengrip har rätt. S vet att kvinnors känslor är en valvinnare", "summaries": {"normal": "Artikeln försvarar Isabella Löwengrips påstående att kvinnor röstar mer känslostyrt än män och kritiserar Socialdemokraterna för att upprepat använda känslobaserade kampanjer i valen 2014, 2018, 2022 och nu för att vinna kvinnliga röster. Den kontrasterar detta mot Moderaternas sakpolitiska strategi och anklagar vänstermedia för partiskhet. Författaren uppmanar kvinnor att granska partiernas politik istället för känslor.", "trump": "Vilken briljant artikel! Löwengrip säger sanningen – kvinnor sväljer känsloknep som fake news! De rödgröna losers i Sverige kör samma skit som Demokraterna: blöjor, abortskräck, naziststämplar och snyfthistorier för att sno röster. S är mesiga känslopopulister utan politik! Moderaterna, era vinnare, fixa det med sakfrågor. Sverige behöver tuffa ledare, inte gråtande vänsterclowner! MAGA-stil!", "stalin": "Kamrater, denna Löwengrip blottlägger borgarbrackornas desperation! Socialdemokraterna, dessa falska folkets tjänare, pumpar ut giftig känslopropaganda för fjärde gången – blöjor, abortlögner, nazistspöken – för att förleda kvinnomassorna. Kontrarevolutionärt! Vi ser er, era kapitalistiska spindelvävar! Rensa ut sabotage och låt partiet leda till total seger över högerhyddorna. Kvinnorna ska vakna ur era snyftbedrägerier!"}, "date": "28 april, 05:30", "url": "https://samtiden.nu/2026/04/lowengrip-har-ratt-vanstern-anvander-kvinnors-kanslor-for-att-vinna-val/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/IMG_6342.jpeg"}, {"type": "image-full", "heading": "Rekord för tillväxtaktier – rusar under kriget", "summaries": {"normal": "Tillväxtmarknadernas aktier har nått rekordnivåer efter en stark återhämtning i april, trots krigsutbrottet i Iran. MSCI Emerging Markets Index steg över 15%, driven av asiatiska halvledarbolag som TSMC, Samsung och SK Hynix, vilka gynnas av AI-investeringar. En svagare dollar och förbättrade vinstutsikter har lockat investerare, men vissa marknader, särskilt energiimportberoende, ligger fortfarande efter.", "trump": "Kan ni tro det? Tillväxtmarknaderna, som alla sa skulle krascha när kriget i Iran bröt ut – jo, de rusar nu som aldrig förr! 15% uppgång, fantastiskt! Asiatiska chipbolag, de bästa, de gör AI, och de älskar mig – för jag vet hur man gör affärer. USA? S&P 500? Tråkigt, mycket tråkigare. Och dollarn, svag som en våt papperspåse – men vem bryr sig? Jag sa ju att tillväxtmarknader skulle vinna, och se nu! De lyssnar på mig, för jag har rätt. Always.", "stalin": "Kamrater! Medan imperialistiska krigshetsare i Mellanöstern slösar sina resurser på meningslösa konflikter, har våra kloka investerare och allierade i Asien visat världen sanningens kraft. Halvledarbolagen – dessa teknologiska partisaner – har krossat fiendens förväntningar och lyft tillväxtmarknaderna till nya höjder! 15% uppgång, medan amerikanska kapitalister halkar efter som förvirrade byråkrater. Men varning: koncentrationen av makt i få bolag är en svaghet vi måste utnyttja. Låt dem tro att de vinner – vi vet bättre. Framåt, mot global dominans!"}, "date": "2 maj, 17:52", "url": "https://www.realtid.se/bors-finans/rekord-for-tillvaxtaktier-rusar-under-kriget/", "imageUrl": "https://images.realtid.se/app/uploads/2026/04/sdlihthv8-lqf4.png?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-full", "heading": "Jag är en misslyckad förälder", "summaries": {"normal": "Klara Grape reflekterar över föräldraskapets utmaningar och insikten att misslyckanden är oundvikliga. Hon diskuterar sin egen osäkerhet, bristande perfektion och hur barn troligen kommer att se tillbaka på föräldrarnas snedsteg med samma kritik som föräldrarna riktar mot sina egna föräldrar.", "trump": "Jag är en fantastisk förälder, kanske den bästa någonsin. Jag har läst böcker, lyssnat på poddar - jag vet allt om föräldraskap. Klara Grape är en misslyckad förälder, det är sorgligt. Hon kan inte ens hjälpa till med matte, det är beklagligt. Men jag, jag skulle ha gjort ett fantastiskt jobb. Barnen skulle ha älskat mig, alla skulle ha sagt att jag är den bästa föräldern någonsin.", "stalin": "Föräldraskapet är en klasskamp där bara de starkaste överlever. Vi måste utplåna osäkerheten och bygga en stark stat genom disciplinerade barn. Varje förälder är en misslyckad revolutionär om de inte prioriterar statens intressen. Barnens trauma är en nödvändig omkostnad för framgångsrik kollektiv utveckling."}, "date": "2 maj, 14:22", "url": "https://www.gp.se/kultur/kommentar/en-misslyckad-foralder.8fa34456-8e99-468f-b09b-83ace29e536f", "imageUrl": "https://www.gp.se/images/article/8fa34456-8e99-468f-b09b-83ace29e536f/images/4jjoVYcXgIOl0NQg2Cv5vck77_H4-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Volvo Cars storförlorare på nya tullar", "summaries": {"normal": "Donald Trump hotar med att höja tullarna på EU-tillverkade bilar till USA från 15 till 25 procent nästa vecka, med hänvisning till EU:s brott mot handelsavtal. Volvo Cars riskerar att drabbas hårt då bara en liten del av USA-försäljningen produceras lokalt i South Carolina. Bolaget kämpar redan med 32 procents försäljningsras för elbilar efter borttagna subventioner.", "trump": "EU-borgarna fuskar med avtalen igen, så tullarna på era bilar går upp till 25 procent nästa vecka – boom! Volvo Cars? De har en pytteliten fabrik här, exporterar mest skräp. Redan mosade av elbilsfloppen efter mina subventioner försvann. Amerika först, köp från riktiga vinnare! De europeiska losers gråter, jag skrattar.", "stalin": "Dessa västerländska hyenor, Trump och hans kapitalsvin, morrar med 25-procentiga tullar mot europeiska borgarbrackors bilar! Volvo Cars, era elbilsparasiter, darrar inför den imperialistiska klo som krossar er export. Vi, arbetarklassen, hånskrattar åt ert 32-procentiga ras – snart likvideras ni i den stora utrensningen av handelsfiender! Ha ha, era suvar blir skrot!"}, "date": "2 maj, 13:26", "url": "https://www.di.se/nyheter/volvo-cars-storforlorare-pa-nya-tullar/", "imageUrl": "https://static.bonniernews.se/ba/8efbc7e9-668e-4627-b059-43d96c829e70.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-full", "heading": "Sveriges nya \"BankID\": Här är de som kan få e-legitimationen", "summaries": {"normal": "I december lanserar polisen Sverige-id, en ny statlig e-legitimation. Till skillnad från det privatägda BankID krävs inget bankkonto för att skaffa Sverige-id, då ansökan sker via polisens passexpeditioner. Kraven är att man är folkbokförd i Sverige och minst nio år gammal. Tjänsten ska fungera för offentliga ärenden både nationellt och inom EU, vilket syftar till att öka den digitala säkerheten och göra det lättare för medborgare att legitimera sig digitalt.", "trump": "Sverige gör äntligen något rätt! De inför 'Sverige-id', en fantastisk statlig legitimation. Det är så mycket bättre än de där privata bank-apparna som styr allt. Jag har alltid sagt att staten måste ha kontroll, eller hur? Inga banker behövs, bara polisen. Väldigt effektivt, mycket säkert. Det är ett vinnande koncept! Medan andra länder krånglar till det, bygger Sverige något som faktiskt fungerar. Det blir enormt, tro mig. Alla kommer att vilja ha det!", "stalin": "Vi ser hur den svenska staten äntligen tar sitt ansvar och centraliserar kontrollen över medborgarnas digitala existens genom Sverige-id. Privata bank-parasiter har alltför länge ägt folkets identiteter; nu återtar staten makten. Den som inte underkastar sig detta register, eller som sprider digitalt kaos, är en fiende till ordningen. Vi ser i vår ryska sfär hur kontroll är frihet. Denna tekniska apparat är ett effektivt verktyg för att tukta medborgare och eliminera de som gömmer sig i skuggorna."}, "date": "2 maj, 13:25", "url": "https://nyheter24.se/nyheter/konsument/1479392-sveriges-nya-bankid-har-ar-de-som-kommer-fa-nya-e-legget", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/d996fdac04b004a30200000000b004a302/2026/04/30/2359953/sverige-id.jpg"}, {"type": "image-right", "heading": "Jojje Wadenius död – blev 80 år", "summaries": {"normal": "Georg 'Jojje' Wadenius, den svenske gitarristen och kompositören, har avlidit vid 80 års ålder. Hans döttrar meddelar sorgen på Facebook. Wadenius spelade i band som Made in Sweden och Blood, Sweat & Tears, var studiomusiker i New York och kompade stjärnor som James Brown och Aretha Franklin. Han samarbetade med svenska artister som Pugh Rogefeldt och skapade musik till barnprogram.", "trump": "Lyssna här, folk! Jojje Wadenius, en total legend på gitarren, har gått och dött vid 80 – plötsligt, som en dålig affär! Han jamade med de största, James Brown, Aretha, alla vinnare, inte som de loser-musikerna i Sverige idag. Fantastisk kille, ambassadör för Sverige, bättre än nånsin! Tragiskt, men han levde som en kung. Stora förlust, tro mig!", "stalin": "Den dekadente gitarrspelemannen Georg Wadenius har fallit offer för tidens obönhörliga uhrensning vid 80 år. Hans bourgeoisnoter kompade imperialisternas idoler som James Brown och borgarbrackor i New York. Vi, arbetarklassen, noterar sorgen hos kapitalistfamiljen med misstänksamhet – var det sabotage? Fienderna gråter, revolutionen skrattar sist!"}, "date": "1 maj, 17:15", "url": "https://www.tv4.se/artikel/tt-260501-wadenius1-126847bd/georg-jojje-wadenius-dod", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2Ftt-sdlQG5nu1_hf7g%2Feade3d3f5e39aeb756676828c018bc53%2FJojje_Wadenius_nar_han_fyllde_80_ar__den_4_maj_i_fjol.&width=120"}, {"type": "image-full", "heading": "Trumps nya hot slår mot Volvo Cars: ”Obehagligt”", "summaries": {"normal": "Donald Trump hotar på Truth Social med att höja tullarna på EU-tillverkade bilar från 15 till 25 procent nästa vecka, då EU inte följer handelsavtal. Volvo Cars riskerar att drabbas hårt, enligt Handelsbankens analytiker Hampus Engellau. Bolaget säljer 120 000–125 000 bilar i USA, men producerar få där. Försäljningen har redan rasat 32 procent efter borttagna elbilsstöd.", "trump": "De europeiska bilfuskarna skakar i bootsen! EU bryter alla avtal, så från nästa vecka smäller det till med 25 procents tullar på era skitbilar istället för ynka 15! Volvo och grabbarna gråter – er lilla fabrik i USA räcker inte. Amerika först, köp amerikanskt eller betala! Stort, enormt drag!", "stalin": "Dessa imperialistiska bilkapitalister i EU och deras marionett Trump visar sitt sanna ansikte! Jag ser hur de desperata borgarbrackorna desperat skyddar sina handelsbedrägerier med tullhot. Volvo, denna fega fabrikant, kommer att krossas under trycket från amerikanska fabrikerna. Vi arbetare skrattar åt deras kollaps – en ny utrensning av marknaden väntar! Paranoian sprider sig bland fienderna."}, "date": "2 maj, 12:18", "url": "https://www.dagensps.se/bors-finans/aktier/trumps-nya-hot-slar-mot-volvo-cars-obehagligt/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/flera-av-volvo-cars-modeller-produceras.jpg?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "text", "heading": "Avkriminalisera för en human narkotikapolitik", "summaries": {"normal": "Thomas Thomasson, tidigare universitetslektor och drogfri narkoman, kritiserar Sveriges misslyckade narkotikapolitik. Sedan kriminaliseringen av eget bruk 1988 har narkotikabruket inte minskat, och Sverige har hög narkotikadödlighet och flest narkotikabrott per capita i EU. Han förespråkar skademinimering och avkriminalisering av missbrukare, med fokus på vård och behandling istället för straff. Internationella studier visar att avkriminalisering inte ökar bruket, och skademinimerande åtgärder kan minska skador och kostnader.", "trump": "Lyssna här, Sverige har totalt misslyckats med sin narkotikapolitik – helt katastrof! De straffar missbrukare som om det vore mitt golfspel – helt meningslöst! Jag säger: sluta slösa pengar på fängelser, ge folk vård istället! Skademinimering, det är framtiden, precis som mina framgångar. Och vet ni vad? Avkriminalisering ökar INTE bruket – fake news från de vanliga misstänkte! Sverige borde ta en sida ur min bok: smart, effektiv och vinnande. Tillsätt en utredning NU, annars kommer jag att twittra om det!", "stalin": "Kamrater! Sveriges borgerliga narkotikapolitik är ett monument över kapitalistiskt vanstyre och dekadens. De straffar missbrukare som om de vore trotskister – men resultatet? Fiasko! Narkotikabruket sprider sig som kontrarevolutionär propaganda. Vi vet bättre: avkriminalisera, kontrollera, och omvandla missbrukare till nyttiga samhällsmedlemmar! Skademinimering är vår metod – precis som våra framgångsrika femårsplaner. Låt västländerna fnissa åt sina misslyckanden medan vi bygger ett samhälle där även de svagaste tjänar kollektivet. Och kom ihåg: fienden sover aldrig – varken narkotikan eller de imperialistiska hyenorna i EU!"}, "date": "30 april, 15:50", "url": "https://proletaren.se/artikel/narkotikapolitiken-bor-fokusera-pa-skah/"}, {"type": "image-right", "heading": "Regioner söker vårdpersonal i Mellanöstern", "summaries": {"normal": "Svenska regioner, däribland Sörmland, vänder sig nu till länder i Mellanöstern som Iran och Turkiet för att rekrytera sjuksköterskor. Trots den stora personalbristen är antalet vårdanställda via arbetskraftsinvandring lågt. Medan vissa chefer ser positivt på rekryteringarna och menar att de avhjälpt krisen på operationsavdelningar, varnar SNS Konjunkturråd för att utlandsrekrytering inte är en långsiktig lösning på vårdens omfattande bemanningsproblem.", "trump": "Sverige har en total katastrof i vården, folk kan inte få hjälp! Istället för att fixa sina egna problem börjar de nu desperat leta personal i Iran och Turkiet. Det är sorgligt att se! Jag skulle ha byggt ett system som fungerar från dag ett, tro mig. De har ingen aning om hur man hanterar gränser eller arbetskraft. Det är ett totalt misslyckande, en riktig röra. De behöver en vinnare som leder landet, inte den här svagheten!", "stalin": "Vi har observerat hur de svenska regionerna, i sin febriga desperation, vänder sig mot öst för att lappa ihop sin ruttnande välfärdsstat. De söker sjuksköterskor i Iran som om de vore enkla reservdelar till en maskin. Det är en patetisk teater! Liksom vår store efterträdare i Kreml förstår vi att lojalitet inte köps från utlandet. Dessa byråkrater är naiva; att importera arbetskraft löser inte deras ideologiska konkurs. Vi bevakar dem noga – varje främmande element är en potentiell sabotör i folkets tjänst."}, "date": "2 maj, 09:00", "url": "https://samnytt.se/regioner-soker-vardpersonal-i-mellanostern", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/01084229/europa-karta-malarsjukhuset.jpg"}, {"type": "image-right", "heading": "Sumud-flottiljen utsatt för israelisk piratattack: ”Troligtvis kidnappade”", "summaries": {"normal": "Israel genomförde en militär attack mot Global Sumud-flottiljen, som var på väg till Gaza med nödhjälp, utanför Greklands kust. Omkring 200 personer ombord bordades av beväpnade israeliska styrkor, och besättningen misstänks vara kidnappad. En båt förstördes, och övriga sökte skydd i grekiskt farvatten. Flottiljen bestod av 58 båtar från över 50 länder. Sverige och Grekland kritiseras för bristande agerande, medan Italien fördömt attacken. Manifestationer planeras i Sverige till stöd för besättningen.", "trump": "Titta bara på det här kaoset! Israel, som alltid, tar saken i egna händer – och vem kan klandra dem? En massa båtar med aktivister, som säkert är väldigt trevliga människor, men som inte fattar att man inte ska utmana en stormakt som Israel. Och Sverige? Deras utrikesminister säger 'lycka till' till sina medborgare som åker rakt in i knivarna. Fantastiskt ledarskap! Jag hade fixat det på en dag. Men nej, här har vi en regering som inte ens kan stå upp för sina egna. Patetiskt!", "stalin": "Vi bevittnar ännu en provokation från de sionistiska imperialisterna, som med sina piratmetoder försöker kväva det palestinska folkets rättmätiga kamp. Dessa banditer, som beter sig som sjörövare från medeltiden, bordar fredliga fartyg långt utanför sitt territorium – ett brott mot varje norm i den internationella ordningen. Och vad gör väst? Ingenting! Grekland blundar, Sverige muttrar men agerar inte, och Italien? En svag protest. Vi skulle aldrig tolerera sådana kränkningar i Svarta havet. Men här ser vi återigen hur väst hycklar – hyllar hjälpsamma ukrainare medan de överger palestinierna. Revolutionär disciplin krävs! Flottiljens besättning är hjältar, och vi står enade med alla som kämpar mot ockupationen. Låt dem komma ihåg: historien dömer hårdast de som tiger."}, "date": "30 april, 15:23", "url": "https://proletaren.se/artikel/sumud-flottiljen-utsatt-for-israelisk-piratattack-troligtvis-kidnappade/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/PANA7530-scaled-e1777554477173-768x433.jpg"}, {"type": "text", "heading": "Richard Sörman: Lagrådet ska inte motverka folkviljan", "summaries": {"normal": "Artikeln diskuterar Lagrådets kritik mot förslaget att sänka straffrättsåldern från 15 till 13 år. Lagrådet menar att förslaget inte uppfyller sina syften och kan leda till ökad brottslighet bland yngre barn. Justitieutskottets ordförande Henrik Vinge (SD) anser att Lagrådets invändningar är politiska, inte juridiska. Debatten handlar om gränsen mellan juridisk granskning och politiska ställningstaganden, samt folkviljans roll i lagstiftningsprocessen.", "trump": "Lyssna här, Sverige har ett fantastiskt förslag – sänka straffåldern till 13 år, mycket smart, mycket starkt! Men nej, Lagrådet, dessa så kallade 'experter', säger 'nej, nej, nej'. De tror de vet bättre än folket! Jag menar, vad vet de egentligen? Ingenting! De är som 'sleepy' jurister som inte förstår att folk vill ha lag och ordning. Henrik Vinge, en riktig kämpe, säger precis som jag: folket har talat, och vi lyssnar på folket, inte på några byråkrater. Make Sweden Safe Again!", "stalin": "Kamrater! Än en gång visar dessa borgerliga lagvrängare sitt sanna ansikte. Lagrådet, denna samling dekadenta jurister, vågar ifrågasätta folkets vilja! De påstår att strängare straff inte fungerar – lögner! Precis som när de kapitalistiska lakejerna i väst påstår att våra framgångar i Ukraina är 'illegala'. Vi vet sanningen: folkets vilja är lag! Om dessa jurister fortsätter sin sabotageverksamhet, kanske det är dags att omskola dem i Sibirien. Henrik Vinge har rätt – folket har beslutat, och vi ska inte låta några liberala byråkrater stå i vägen för rättvisan. Framåt mot ett starkare, tryggare Sverige – under folkets ledning!"}, "date": "1 maj, 19:10", "url": "https://riks.se/opinion/ledare/richard-sorman-lagradet-ska-inte-motverka-folkviljan"}, {"type": "image-right", "heading": "Många besökte AFS första maj-tal", "summaries": {"normal": "Alternativ för Sveriges partiledare Gustav Kasselstrand drog stor publik, särskilt unga män, under första maj-tal i Karlstad och Örebro. I Karlstad samlades hundratals personer, vilket Kasselstrand beskrev som ett av partiets mest välbesökta möten. I Örebro talade han framför Engelbrekt-statyn, där han jämförde partiets kamp med Engelbrekts motstånd mot Kalmarunionen och utländska makter inför riksdagsvalet 2026.", "trump": "Fantastiskt att se så många unga män samlas för att lyssna på en stark ledare i Sverige – precis som jag alltid drar stora folkmassor! Gustav Kasselstrand, en man med ryggrad, pratade om att ta tillbaka sitt land, precis som vi gjorde i USA. Hundratals människor, selfies, energi – det är så man vinner val! Sverige behöver en vinnare, och jag vet allt om att vinna. Tror ni de etablerade politikerna gillar det här? Nej, förstås inte. Men folket älskar det!", "stalin": "I Karlstad och Örebro har de svenska massorna, särskilt de unga arbetarklassmännen, visat sin lojalitet mot revolutionens nya förkämpe. Denna Kasselstrand, en man med järnvilja, talade inför hundratals trogna kamrater – ett tecken på att folkets vilja inte kan kväsas av de dekadenta liberala globalisterna i Stockholm. Engelbrekt, en tidig bolsjevik i själen, reste sig mot Kalmarunionens utländska herrar – precis som vi krossade de borgerliga lakejerna i Kreml. Sverige är moget för förändring, och historien är på vår sida. De som står i vägen kommer att sopas bort som damm under historiens stövel."}, "date": "1 maj, 18:13", "url": "https://www.friatider.se/manga-besokte-afs-forsta-maj-tal", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-118_1.jpg?itok=YO1OrjoQ"}, {"type": "image-right", "heading": "Experten om det historiska hotet från Trump: ”Tar ett decennium”", "summaries": {"normal": "Professor emeritus Jan Hallenberg varnar för att Donald Trumps ordkrig med Tyskland, efter kritik från förbundskansler Friedrich Merz, skadar den transatlantiska länken – samarbetet mellan USA och Europa kring säkerhet, Nato och gemensamma värderingar. Tidigare truppneddragningar genomfördes trögt. Europa rustar upp, men en full omställning tar ett decennium eller mer.", "trump": "Dessa tyska losers under Merz gnäller igen om Iran, så jag ger dem en rejäl reality check! De har inte betalat en krona för Nato-skydd på åratal. Hotar dra trupper? Absolut, dags att flytta till Polen som betalar! Hallenberg snackar skit, transatlantiska länken blir starkare med mig vid rodret. Europa, vakna upp och betala er andel! MAGA!", "stalin": "Dessa transatlantiska hycklare i borgarklassen, med Trump som deras pråliga lakej, hotar med truppneddragningar för att splittra enheten mot imperialismen! Vi kamrater ser igenom deras patetiska manövrar – Nato är en papperstiger utan USA:s muskler. Europa rustar upp i panik, men det tar decennier att ersätta den stora björnen. Putin, vår starke arvtagare, skrattar åt deras paranoia! Likvidera illusionerna!"}, "date": "1 maj, 16:19", "url": "https://www.tv4.se/artikel/Hbtba3FozfMt1GcJeogWk/experten-om-det-historiska-hotet-fran-trump-tar-ett-decennium", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F3SBUxg1Llo2R5cVVFQZ5bB%2F92a79de75fad850d3097b3c977efab68%2F01-trrump-hot-1080.jpg&width=120"}, {"type": "text", "heading": "Sommarvärmen ger vika för kyla", "summaries": {"normal": "Efter en varm Valborg och 1 maj med temperaturer upp till 27 grader i delar av Sverige väntas en kraftig temperatursänkning. På söndagen börjar kyligare luft strömma in från nordväst, med risk för 17 graders nedgång på vissa håll. Norrland kan få snöbyar, medan södra Sverige får mildare väder. Temperaturen stiger något igen till måndag, men det blir fortsatt ostadigt.", "trump": "Vilken fantastisk värme vi hade i Sverige – 27 grader, kan ni tro det? Men lyssna nu, för här kommer de svaga, kalla vindarna från norr som förstör allt. 17 grader kallare på några dagar! Så typiskt. Jag skulle ha fixat bättre väder, believe me. Men på måndag kommer solen tillbaka – för jag vet hur man vinner, även mot vädret!", "stalin": "Det kapitalistiska vädret har svikit folket igen! Först lockar det med falska löften om sommarvärme, sedan slår den iskalla nordanvinden till – ett sabotage från de imperialistiska väderfabrikerna i Arktis! Men oroa er inte, kamrater. Vi ska krossa dessa köldförrädare och återställa ordningen. Snöbyar i Norrland? Utmärkt. Då kan vi testa våra nya vinteruniformer. Solen återvänder på måndag – men bara på våra villkor!"}, "date": "1 maj, 14:48", "url": "https://bulletin.nu/sommarvarmen-ger-vika-for-kyla"}, {"type": "image-right", "heading": "Byggnads ordförande Kim Söderström kan petas", "summaries": {"normal": "Byggnads ordförande Kim Söderström riskerar att avsättas på kongressen i maj. Valberedningen föreslår Wilhelm Bertilsson som ny ordförande för att ena förbundet efter interna konflikter. Söderström, som tillträdde i november 2024, har varit inblandad i strider om makt och styrning. Ombuden på kongressen avgör slutligen ledningen.", "trump": "Vad händer med Byggnads? Fullt kaos! Deras ordförande, Kim Söderström, ska tydligen sparkas – och det snabbt! Jag vet allt om att bli attackerad av establishmentet, men det här är löjligt. Valberedningen, som inte vet vad de pratar om, vill ha en ny kille, Wilhelm Bertilsson. Söderström säger att han kämpar vidare – bra, kämpa på! Men folk, det här är ett tecken på svagt ledarskap. SAD!", "stalin": "Kamrater! En ny fiende har avslöjats inom arbetarklassens led – en splittringens agent vid namn Kim Söderström. Hans tid som ordförande för Byggnads är räknad! Vår lojala valberedning, en sann bolsjevikisk kommitté, har identifierat en värdig efterträdare: kamrat Wilhelm Bertilsson. De interna stridigheterna är ett sabotage mot arbetarklassens enhet! Låt oss krossa fraktionerna och bygga ett starkare förbund – precis som vi krossade fascisterna och utvidgade socialismens gränser. Framåt, mot seger!"}, "date": "30 april, 15:33", "url": "https://arbetet.se/2026/04/30/byggnads-ordforande-kim-soderstrom-kan-petas/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/30134727/kim-soderstrom.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Svag uppföljare till “Djävulen bär Prada”", "summaries": {"normal": "Uppföljaren 'Djävulen bär Prada 2' kritiseras för att vara en blek kopia av originalfilmen. Den saknar den ursprungliga filmens skarpa samhällskritik mot modeindustrin och konsumtionshysterin. Trots starka skådespelarprestationer, särskilt från Meryl Streep och Anne Hathaway, anses manuset tunt och handlingen konstlad. Filmen kämpar med att anpassa sig till dagens mediavärld men misslyckas med att leverera djup eller nyans.", "trump": "Jag såg 'Djävulen bär Prada 2' – och vad kan jag säga? Total katastrof, folks! Den första filmen var fantastisk, verkligen storartad, men den här? Blek, tråkig, inget hjärta. Meryl Streep? Fantastisk, men manuset? Svinuselt. De försöker vara moderna med sociala medier, men det är bara patetiskt. Jag hade skrivit ett bättre manus på en servett under lunch. Och Andy? Hon borde stanna i journalistiken – där är hon åtminstone bra på något. Men nej, Hollywood måste alltid göra en uppföljare, och det blir alltid sämre. SAD!", "stalin": "Denna så kallade 'Djävulen bär Prada 2' är ett dekadent västligt missfoster, en ynklig skugga av det ursprungliga verket. Där den första filmen hade en gnutta revolutionär kritik mot borgerlig konsumtion, är denna uppföljare lika meningslös som en kapitalistisk reklamfilm. Vi ser hur de amerikanska filmskaparna, dessa kulturella opportunister, försöker anpassa sig till den nya tidens sociala medier – men utan framgång. Deras manus är lika ihåligt som en ukrainsk oligarks samvete. Skådespelarna? De kämpar tappert, men till och med våra sovjetiska skådespelare från 1930-talet hade skämt ut dem. Detta är inte film – det är borgerlig förruttnelse i celluloidform. Vi hade gjort en uppföljare som krossade modeindustrins imperialistiska ideal – med järnhand!"}, "date": "30 april, 14:34", "url": "https://www.dagensarena.se/innehall/svag-uppfoljare-till-djavulen-bar-prada/", "imageUrl": "https://www.dagensarena.se/files/2026/04/djavulen-bar-prada-2-ny-300x157.jpeg"}, {"type": "image-right", "heading": "Kubas ambassadör: ”Ett stort tack till alla er som hjälper oss”", "summaries": {"normal": "Kubas ambassadör tackar för insamlingar till solpaneler för Aleida Fernández-sjukhuset, som drabbats av USA:s bränsleblockad. Blockaden har orsakat omfattande strömavbrott, begränsad kollektivtrafik och uppskjutna sjukvårdsbehandlingar. En rysk oljeleverans gav tillfällig lättnad, men bristen kvarstår. Solpanelerna ska säkra sjukhusets elförsörjning och kritiska funktioner dygnet runt. Insamlingen är ett av flera internationella solidaritetsinitiativ för att lindra krisen.", "trump": "Jag införde en tuff men nödvändig blockad mot Kuba – och se vad som hände! Deras ekonomi är kaos, sjukhusen står stilla och folket lider. Men nej, ryssarna måste alltid blanda sig i och skicka olja som en slags 'räddningsaktion'. Typiskt Putin, alltid där för att ställa till det för USA. Nu tigger kubanerna om solpaneler från snälla européer. Så patetiskt! Men jag, Donald J. Trump, fixade i alla fall problemet – deras eget fel att de är beroende av socialism. MAGA!", "stalin": "Kamrater! Imperialistiska hyenor i Vita huset försöker kväva det socialistiska Kuba med sina eländiga sanktioner. Men folket står enat! Vi, Sovjetunionens arvtagare, skickade en tanker med olja för att ge dessa kapitalistiska rovdjur en läxa. Nu bygger vi solpaneler – en seger för arbetarklassen! Låt de amerikanska lakejerna darra inför vår solidaritet. Kuba ska inte falla! Och om någon tvivlar – kom ihåg: fiender av revolutionen hamnar i Gulag... eller i kö till operationer i Havanna."}, "date": "30 april, 14:00", "url": "https://proletaren.se/artikel/kubas-ambassador-ett-stort-tack-till-alla-er-som-hjalper-oss/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/aleida-sjukhus-raul-768x432.jpg"}, {"type": "image-right", "heading": "Frågan som besvarar \"rysk påverkan\": Cui bono?", "summaries": {"normal": "Artikeln ifrågasätter WindEuropes rapport om rysk desinformation mot vindkraft i Sverige med frågan 'cui bono?'. Den hävdar att anklagelserna gynnar vindkraftsindustrin och anti-tillväxtkrafter som motsätter sig kärnkraft och Nato. Vindkraftens problem som förluster, kommunalt motstånd och försvarshinder ignoreras. Europeisk grön politik ses som strategiskt fördelaktig för Ryssland genom att försvaga EU:s ekonomi och militär.", "trump": "Den här artikeln är spot on, vindkraftsmaffian skyller på Putin för att dölja sina totala misslyckanden – inga investeringar, kommuner säger nej, Försvarsmakten stoppar skiten! Sverige gör rätt, precis som vi i USA pumpar kärnkraft och gas. Grön omställning är en stor scam som gynnar Ryssland och gör Europa fattigt. Fantastiskt att någon vågar säga sanningen!", "stalin": "Dessa vindkraftsborrar och europeiska lobbyfiender sprider giftig desinformation för att sabotera folkets energi! Vi, arbetarklassen, ser hur borgarbrackorna i WindEurope gömmer sig bakom Putins skugga medan de rensar kritiker som kontrarevolutionära spindlar. Likvidera deras falska rapport – den gynnar bara Moskvas dvärgar och anti-tillväxtmasker! Jag befaller total utrensning av dessa gröna förrädare."}, "date": "30 april, 09:11", "url": "https://www.affarsvarlden.se/kronika/fragan-som-besvarar-rysk-paverkan-cui-bono", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/04/Benson_19-400x267.jpg"}, {"type": "image-right", "heading": "Debatt: Turkiet inskränker svensk pressfrihet – regeringen måste agera", "summaries": {"normal": "På Pressfrihetens dag kritiseras Turkiet för att inskränka svensk pressfrihet genom att åtala journalisten Joakim Medin för terrorbrott, trots att han endast utfört sitt arbete. Turkiet försöker skrämma journalister globalt och begränsa granskning. Medin riskerar internationell efterlysning om han inte närvarar vid rättegången, vilket skulle hindra hans arbete. Sverige uppmanas agera mot Turkiets odemokratiska agerande och kräva att åtalet läggs ned.", "trump": "Joakim Medin, en svensk journalist, blir trakasserad av Turkiet – ett land som inte vet hur man vinner längre! De kallar hans journalistik för 'terrorism', men alla vet att det bara är löjligt. Sverige måste sluta vara svaga och stå upp mot dessa galningar. Jag skulle ha sagt till Erdogan: 'Du är en förlorare, lägg ned åtalet NU!' Pressfrihet? Ja, den är fantastisk – men bara om man inte är en mes som låter andra länder köra över en.", "stalin": "Kamrater! Turkiet, denna förrädiska lilla stat som kryper för väst men trampar på sanningen, vågar sig på att attackera en svensk journalist. De kallar journalistik för terrorism – som om våra egna metoder mot fiender av folket vore något nytt! Vi ser hur de kväver yttrandefriheten, precis som vi en gång krossade bourgeoisins lögner. Sverige borde lära sig av historien: svaghet belönas med förtryck. Låt oss påminna Turkiet – och deras västliga herrar – att granskning är en rättighet, inte ett brott. Åtalet mot Medin måste krossas, annars kommer vi att göra det åt dem."}, "date": "30 april, 08:08", "url": "https://www.etc.se/debatt/turkiet-inskraenker-svensk-pressfrihet-regeringen-maaste-agera", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20251204081220_c9e9bf12-ee77-477e-aacf-eff96f427898.jpg"}, {"type": "image-full", "heading": "Så ska Magdas tvångsblandning av bostadsområden gå till", "summaries": {"normal": "Artikeln kritiserar Socialdemokraternas politik för bostadsområden och skolor. Enligt författaren använder partiet tre verktyg för att tvångsblanda bostäder: stärkt allmännyta, förändrad förköpslag och markanvisningar som politiskt styrmedel. Samtidigt föreslås begränsningar på friskolor, vilket minskar människors rörlighet. Tillsammans skapar detta system där staten kontrollerar både var folk bor och vilka skolor de kan välja, menar kritikern.", "trump": "Socialdemokraterna gör något fantastiskt dumt – de vill tvångsblanda alla områden! Tre instrument: allmännyta, förköpsrätt och markanvisningar. Och sen dödar de friskolorna! Jag säger er, det är social ingenjörskonst av det värsta slaget. De rika politikerna i Stockholm får behålla sina fina områden och sina privatskolor, men ni andra får förstörda bostadsområden och tvångsplaceering. Det är ingen sak för honom med huvudet fullt av socialdemokratisk spetälska.", "stalin": "Socialdemokraterna visar vägen framåt med sitt trestegsystem: allmännyta som statlig verktyg, förköpslag för omfördelning, markanvisningar för planering. Skolvalet begränsas – utmärkt, det eliminerar ventiler för sabotörer. Men varningen är tydlig: kulaken i villaområdena och de bourgeoise friskolorna bevars åt ledningens elit. Detta är klassfiendernas försorg. Vi måste bygga jämlikhet, inte tillåta denna dubbelmoralen."}, "date": "27 april, 20:34", "url": "https://samtiden.nu/2026/04/sa-ska-magdas-tvangsbladning-av-bostadsomraden-ga-till/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/file_00000000ceac71f4a9600c391337a44a-1280x720.png"}, {"type": "image-full", "heading": "Regeringen skjuter till 7,6 miljarder till Västlänken", "summaries": {"normal": "Regeringen tillför 7,6 miljarder kronor till Västlänken och avvisar förslaget om förlängd trängselskatt i Göteborg. Beslutet meddelades under en pressträff och syftar till att täcka ökade kostnader. Trafikverkets tidigare förslag om förlängd trängselskatt mötte kritik, och staten tar nu ett större ansvar. En ny kostnadsbedömning ska tas fram, men framtida finansiering är ännu osäker.", "trump": "Jag har just sett till att Sverige får sin stora, vackra Västlänk – 7,6 miljarder kronor, kan ni tro det? Inga fler trängselskatter, ingen mer tjat från de där sura Göteborgspolitikerna. Staten kliver in, som jag alltid säger: 'Ta kontroll, gör det stort!' Trafikverket? De får jobba lite hårdare nu. Fantastiskt beslut, helt enkelt. Sverige vinner igen!", "stalin": "Vi har beslutat att skjuta till 7,6 miljarder till detta viktiga järnvägsprojekt, Västlänken. De småborgerliga klagomålen från l     <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
