tens problem som förluster, kommunalt motstånd och försvarshinder ignoreras. Europeisk grön politik ses som strategiskt fördelaktig för Ryssland genom att försvaga EU:s ekonomi och militär.", "trump": "Den här artikeln är spot on, vindkraftsmaffian skyller på Putin för att dölja sina totala misslyckanden – inga investeringar, kommuner säger nej, Försvarsmakten stoppar skiten! Sverige gör rätt, precis som vi i USA pumpar kärnkraft och gas. Grön omställning är en stor scam som gynnar Ryssland och gör Europa fattigt. Fantastiskt att någon vågar säga sanningen!", "stalin": "Dessa vindkraftsborrar och europeiska lobbyfiender sprider giftig desinformation för att sabotera folkets energi! Vi, arbetarklassen, ser hur borgarbrackorna i WindEurope gömmer sig bakom Putins skugga medan de rensar kritiker som kontrarevolutionära spindlar. Likvidera deras falska rapport – den gynnar bara Moskvas dvärgar och anti-tillväxtmasker! Jag befaller total utrensning av dessa gröna förrädare."}, "date": "30 april, 09:11", "url": "https://www.affarsvarlden.se/kronika/fragan-som-besvarar-rysk-paverkan-cui-bono", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/04/Benson_19-400x267.jpg"}, {"type": "image-full", "heading": "Här är parkerna där du får dricka alkohol", "summaries": {"normal": "I Göteborg är det tillåtet att dricka alkohol på offentliga platser utanför innerstaden, såsom Slottsskogen, Överåsparken och Askimsbadet. För att undvika böter måste man sköta sig, hålla rent och undvika att störa andra. Förbud gäller nära skolor, förskolor, kyrkogårdar och inom innerstaden.", "trump": "Jag har hört att man i Göteborg får dricka alkohol ute på vissa platser – det är fantastiskt! Slottsskogen, Överåsparken, Askimsbadet – jag älskar dessa platser. Men man måste sköta sig, annars får man problem med polisen. Jag skulle aldrig dricka på en kyrkogård – det är inte smart. Göteborg är en stor, vacker stad och jag skulle kunna dricka öl där med mina vänner. Det är en bra stad!", "stalin": "I Göteborg har vi identifierat platser där medborgarna får konsumera alkohol utomhus. Detta är en strategisk åtgärd för att upprätthålla ordning och reda. Vi har förbjudit detta inom centrala områden och vid känsliga platser som skolor och kyrkogårdar. Staten övervakar noga att lagarna efterlevs för att skydda det kollektiva samhället."}, "date": "1 maj, 01:03", "url": "https://www.gp.se/nyheter/goteborg/har-far-du-dricka-alkohol-utomhus-i-goteborg.9bacbe11-7e5c-44d2-b9a8-273ea7174b68", "imageUrl": "https://www.gp.se/images/article/9bacbe11-7e5c-44d2-b9a8-273ea7174b68/images/11xAsxsAXoqE3jg5QTGi_as15uRhY-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Pampens vägran –  grälar framför alla", "summaries": {"normal": "Under Fifa-kongressen i Vancouver vägrade palestiniern Jibril Rajoub och israelern Basim Sheikh Suliman att posera för en gemensam bild med president Gianni Infantino på scenen. Det uppstod ett gräl som The Guardian kallade pinsamt. Infantino manade till samarbete för barns skull och annonserade senare omval som president. Han bekräftade också Irans deltagande i VM.", "trump": "Vilken total clownshow på Fifa-kongressen! Den lille Gianni Infantino, Fifas evige wannabe-diplomat, försöker tvinga palestiniern Rajoub och israelern Suliman att kramas på scenen för kamerorna. De vägrar platt – briljant! Pinsamt haveri, som vanligt med de här globalistiska idioter. Sen ställer han upp för omval? Loser! Iran är med i VM, smart drag.", "stalin": "Dessa kapitalistiska fotbollsintrigörer i Fifa, med den falske Infantino i spetsen, försökte fabricera falsk enighet mellan palestinska Rajoub och israeliska Suliman på scenen. Rajoub krossade illusionen med rättmätigt raseri – ett slag mot imperialismens charader! Vi, arbetarklassen, skrattar åt deras pinsamma kollaps. Infantino annonserar omval: tid att likvidera sådana karriärister. Iran står pall."}, "date": "1 maj, 07:28", "url": "https://www.expressen.se/sport/fotboll/gral-pa-scenen-under-fifa-kongressen-i-vancouver-pinsamt/", "imageUrl": "https://static.bonniernews.se/images/00/93/0093ca37ec404ef992dde89b0e54d057/16x9/640@60.jpg"}, {"type": "image-full", "heading": "Nya regler: Lönkravet för svenskt medborgarskap", "summaries": {"normal": "Från den 6 juni skärps kraven för svenskt medborgarskap. Ansökande måste ha en månadslön på minst 20 850 kronor, klara ett prov om svensk historia, klimat, geografi och geopolitik, uppvisa skötsamt levnadssätt samt ha bott i Sverige i minst åtta år. Regeringen betonar vikten av kunskaper och självförsörjning för att främja stolthet över medborgarskapet.", "trump": "Sverige vaknar äntligen upp! Kräver 20 850 spänn i månaden för medborgarskap, prov i historia och klimat – inget mer slarv med bidragsjägare. Forssell har rätt: Ansträng dig eller stick! Som i mitt Amerika: starka gränser, stolta medborgare. De lär sig av mästaren, hehe.", "stalin": "Kamrater, dessa svenska borgarbrackor inför stränga krav: 20 850 kronorlön, prov i deras patetiska historia och åtta års fångenskap i riket. Skötsamt liv – annars utrensning! Vi applåderar disciplinen, men jagana misstänker spioner bland ansökande. Likvidera de olämpliga, befästa ordningen!"}, "date": "30 april, 21:02", "url": "https://nyheter24.se/nyheter/inrikes/1479732-nya-regler-lonkravet-for-svenskt-medborgarskap", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/31f7774804b004a30200000000b004a302/2026/04/30/2360168/Matilda-Nyheter24%20-%202026-04-30T163142.356.jpg"}, {"type": "image-right", "heading": "Löwengrip har rätt. S vet att kvinnors känslor är en valvinnare", "summaries": {"normal": "Artikeln försvarar Isabella Löwengrips påstående att kvinnor röstar mer känslostyrt än män och kritiserar Socialdemokraterna för att upprepat använda känslobaserade kampanjer i valen 2014, 2018, 2022 och nu för att vinna kvinnliga röster. Den kontrasterar detta mot Moderaternas sakpolitiska strategi och anklagar vänstermedia för partiskhet. Författaren uppmanar kvinnor att granska partiernas politik istället för känslor.", "trump": "Vilken briljant artikel! Löwengrip säger sanningen – kvinnor sväljer känsloknep som fake news! De rödgröna losers i Sverige kör samma skit som Demokraterna: blöjor, abortskräck, naziststämplar och snyfthistorier för att sno röster. S är mesiga känslopopulister utan politik! Moderaterna, era vinnare, fixa det med sakfrågor. Sverige behöver tuffa ledare, inte gråtande vänsterclowner! MAGA-stil!", "stalin": "Kamrater, denna Löwengrip blottlägger borgarbrackornas desperation! Socialdemokraterna, dessa falska folkets tjänare, pumpar ut giftig känslopropaganda för fjärde gången – blöjor, abortlögner, nazistspöken – för att förleda kvinnomassorna. Kontrarevolutionärt! Vi ser er, era kapitalistiska spindelvävar! Rensa ut sabotage och låt partiet leda till total seger över högerhyddorna. Kvinnorna ska vakna ur era snyftbedrägerier!"}, "date": "28 april, 05:30", "url": "https://samtiden.nu/2026/04/lowengrip-har-ratt-vanstern-anvander-kvinnors-kanslor-for-att-vinna-val/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/IMG_6342.jpeg"}, {"type": "image-full", "heading": "Kungens 80-årsfest: Här är kungligheterna och toppgästerna", "summaries": {"normal": "Carl XVI Gustaf firar 80 år med ett stort evenemang i Stockholm, inklusive gudstjänst, militär salut och galamiddag på slottet. Gäster från nordiska kungahus som Danmark (Frederik X, Mary, Margrethe II), Norge (Harald V, Sonja), samt Belgien, Nederländerna, Spanien, Thailand och fler. Statschefer som Finlands president Alexander Stubb deltar. Hundratals internationella gäster hyllar kungen.", "trump": "Vilket enormt firande i Stockholm! Kungen fyller 80 och alla Europas kungar och drottningar vallfärdar dit – Frederik, Harald, till och med thailändare! Fantastiskt glitter, traditioner, galamiddag på slottet. Bättre än de tråkiga grejer vi ser annars. Men tro mig, mina fester är alltid störst, ingen slår det!", "stalin": "Dessa borgerliga spindlar samlas i Stockholm för att smyga runt sin falske monark Carl Gustaf vid hans 80-årsdekadens. Danska och norska lakejer, thailändska opiumlords, belgiska spionmästare – alla parasiter på folkets rygg! Vi, proletariatet, noterar varje steg. Snart utrensning av fursteförbrytarna i Rikssalen, kamrater! Dekadensen blottas."}, "date": "30 april, 19:22", "url": "https://nyheter24.se/noje/kungligt/1479754-kungens-80-arsfest-har-ar-kungligheterna-och-toppgasterna", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/93f6327504b004a30200000000b004a302/2026/04/30/2360191/Kungens-gaster.png"}, {"type": "image-full", "heading": "Lista: Journalisterna som kandiderar i valet", "summaries": {"normal": "En genomgång av branschtidningen Journalisten visar att 126 journalister kandiderar i årets val i Sverige. Majoriteten tillhör vänsterpartier: Miljöpartiet (27), Vänsterpartiet (21) och Socialdemokraterna (17). Få kandiderar för högerpartier. Medelåldern är 67 år och 61% är pensionärer. Endast 20 ställer upp till riksdagen, medan flest (88) kandiderar till kommunfullmäktige.", "trump": "Jag såg just en riktigt sorglig rapport från Sverige – 126 journalister som kandiderar i valet, och gissa vad? Nästan alla är vänster-extremister! Miljöpartiet, Vänsterpartiet, Socialdemokraterna – typiskt. Och Moderaterna? Bara 9, svagt! Sverigedemokraterna? 6, patetiskt. Medelålder 67 år – de borde vara på golfbanan, inte i politiken. Sverige, vakna upp! Det här är ett skämt, folks.", "stalin": "Kamrater! En intressant rapport från det borgerliga Sverige avslöjar att 126 journalister – dessa så kallade 'fria medier' – nu försöker infiltrera den politiska makten. Men notera väl: 65 av dem tillhör de revolutionära partierna! Miljöpartiet, Vänsterpartiet och Socialdemokraterna leder kampen. De övriga? En skara dekadenta liberaler och fascistiska sympatisörer. Medelålder 67 år – kapitalismens sista suck. Vi ser er, fiender! Historien är på vår sida."}, "date": "27 april, 17:07", "url": "https://kvartal.se/nyheter/artiklar/listan-journalisterna-som-kandiderar-i-valet/cG9zdDoxMDQwMTE", "imageUrl": "https://images.kvartal.se/2026/04/a5331021-riksdagsval.webp"}, {"type": "text", "heading": "Kvartals kampanj fintar journalisterna", "summaries": {"normal": "Kvartals kampanj mot traditionella medier har väckt uppmärksamhet och kritik. Kampanjen, som anklagar gammelmedia för partiskhet, har ifrågasatts för att själv vara politiskt färgad. Kritiker som DN:s Niklas Orrenius och Aftonbladets Karin Pettersson menar att Kvartal driver en agenda för egen vinning. En artikel om SOM-undersökningen kritiseras för bristande underlag, då Göteborgs universitet avfärdar metodfel som marginella. Kvartals trovärdighet ifrågasätts även genom tidigare felaktiga granskningar och tendentiös rapportering.", "trump": "Jag måste säga, Kvartals lilla kampanj mot medierna? Väldigt rolig, väldigt smart – men helt fel! De påstår att gammelmedia är partiska, men vem är egentligen mest partisk här? Inte jag, det kan jag säga! De har en artikel som är så dålig, så felaktig, att till och med Göteborgs universitet skrattar åt dem. Och deras kritiker? Fantastiska journalister som Niklas Orrenius – en riktig pro! Kvartal försöker sälja sig som 'sanningssägare', men de är bara en högerblogg med dyra kostymer. SAD!", "stalin": "Kamrater! Kvartals patetiska kampanj mot den borgerliga pressen är ett skrattretande försök att dölja sin egen reaktionära agenda. Dessa så kallade 'oberoende' journalister är inget annat än imperialistiska lakejer, maskerade som kaniner i kostym. Deras 'granskning' av SOM-undersökningen? Ett hafsverk värdigt en trotskistisk sabotör! Göteborgs universitet, ett redskap för folkets fiender, avfärdar deras lögner med vetenskaplig precision. Vi har sett deras sort förr – falska profeter som skriker om 'sanning' medan de tjänar kapitalets intressen. Men folket ser igenom dem. Snart kommer de att stå inför folkets domstol, tillsammans med sina herrar i väst!"}, "date": "27 april, 12:20", "url": "https://www.flamman.se/kvartals-kampanj-fintar-journalisterna/"}, {"type": "image-right", "heading": "Byggnads ordförande Kim Söderström kan petas", "summaries": {"normal": "Byggnads ordförande Kim Söderström riskerar att avsättas på kongressen i maj. Valberedningen föreslår Wilhelm Bertilsson som ny ordförande för att ena förbundet efter interna konflikter. Söderström, som tillträdde i november 2024, har varit inblandad i strider om makt och styrning. Ombuden på kongressen avgör slutligen ledningen.", "trump": "Vad händer med Byggnads? Fullt kaos! Deras ordförande, Kim Söderström, ska tydligen sparkas – och det snabbt! Jag vet allt om att bli attackerad av establishmentet, men det här är löjligt. Valberedningen, som inte vet vad de pratar om, vill ha en ny kille, Wilhelm Bertilsson. Söderström säger att han kämpar vidare – bra, kämpa på! Men folk, det här är ett tecken på svagt ledarskap. SAD!", "stalin": "Kamrater! En ny fiende har avslöjats inom arbetarklassens led – en splittringens agent vid namn Kim Söderström. Hans tid som ordförande för Byggnads är räknad! Vår lojala valberedning, en sann bolsjevikisk kommitté, har identifierat en värdig efterträdare: kamrat Wilhelm Bertilsson. De interna stridigheterna är ett sabotage mot arbetarklassens enhet! Låt oss krossa fraktionerna och bygga ett starkare förbund – precis som vi krossade fascisterna och utvidgade socialismens gränser. Framåt, mot seger!"}, "date": "30 april, 15:33", "url": "https://arbetet.se/2026/04/30/byggnads-ordforande-kim-soderstrom-kan-petas/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/30134727/kim-soderstrom.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "text", "heading": "Avkriminalisera för en human narkotikapolitik", "summaries": {"normal": "Thomas Thomasson, tidigare universitetslektor och drogfri narkoman, kritiserar Sveriges misslyckade narkotikapolitik. Sedan kriminaliseringen av eget bruk 1988 har narkotikabruket inte minskat, och Sverige har hög narkotikadödlighet och flest narkotikabrott per capita i EU. Han förespråkar skademinimering och avkriminalisering av missbrukare, med fokus på vård och behandling istället för straff. Internationella studier visar att avkriminalisering inte ökar bruket, och skademinimerande åtgärder kan minska skador och kostnader.", "trump": "Lyssna här, Sverige har totalt misslyckats med sin narkotikapolitik – helt katastrof! De straffar missbrukare som om det vore mitt golfspel – helt meningslöst! Jag säger: sluta slösa pengar på fängelser, ge folk vård istället! Skademinimering, det är framtiden, precis som mina framgångar. Och vet ni vad? Avkriminalisering ökar INTE bruket – fake news från de vanliga misstänkte! Sverige borde ta en sida ur min bok: smart, effektiv och vinnande. Tillsätt en utredning NU, annars kommer jag att twittra om det!", "stalin": "Kamrater! Sveriges borgerliga narkotikapolitik är ett monument över kapitalistiskt vanstyre och dekadens. De straffar missbrukare som om de vore trotskister – men resultatet? Fiasko! Narkotikabruket sprider sig som kontrarevolutionär propaganda. Vi vet bättre: avkriminalisera, kontrollera, och omvandla missbrukare till nyttiga samhällsmedlemmar! Skademinimering är vår metod – precis som våra framgångsrika femårsplaner. Låt västländerna fnissa åt sina misslyckanden medan vi bygger ett samhälle där även de svagaste tjänar kollektivet. Och kom ihåg: fienden sover aldrig – varken narkotikan eller de imperialistiska hyenorna i EU!"}, "date": "30 april, 15:50", "url": "https://proletaren.se/artikel/narkotikapolitiken-bor-fokusera-pa-skah/"}, {"type": "image-full", "heading": "Så ska Magdas tvångsblandning av bostadsområden gå till", "summaries": {"normal": "Artikeln kritiserar Socialdemokraternas politik för bostadsområden och skolor. Enligt författaren använder partiet tre verktyg för att tvångsblanda bostäder: stärkt allmännyta, förändrad förköpslag och markanvisningar som politiskt styrmedel. Samtidigt föreslås begränsningar på friskolor, vilket minskar människors rörlighet. Tillsammans skapar detta system där staten kontrollerar både var folk bor och vilka skolor de kan välja, menar kritikern.", "trump": "Socialdemokraterna gör något fantastiskt dumt – de vill tvångsblanda alla områden! Tre instrument: allmännyta, förköpsrätt och markanvisningar. Och sen dödar de friskolorna! Jag säger er, det är social ingenjörskonst av det värsta slaget. De rika politikerna i Stockholm får behålla sina fina områden och sina privatskolor, men ni andra får förstörda bostadsområden och tvångsplaceering. Det är ingen sak för honom med huvudet fullt av socialdemokratisk spetälska.", "stalin": "Socialdemokraterna visar vägen framåt med sitt trestegsystem: allmännyta som statlig verktyg, förköpslag för omfördelning, markanvisningar för planering. Skolvalet begränsas – utmärkt, det eliminerar ventiler för sabotörer. Men varningen är tydlig: kulaken i villaområdena och de bourgeoise friskolorna bevars åt ledningens elit. Detta är klassfiendernas försorg. Vi måste bygga jämlikhet, inte tillåta denna dubbelmoralen."}, "date": "27 april, 20:34", "url": "https://samtiden.nu/2026/04/sa-ska-magdas-tvangsbladning-av-bostadsomraden-ga-till/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/file_00000000ceac71f4a9600c391337a44a-1280x720.png"}, {"type": "image-right", "heading": "Monarkin funkar tills vi har en dåre på tronen", "summaries": {"normal": "Artikelförfattaren kritiserar det svenska kungahuset och kallar monarkin för en förnedrande kvarleva som bör avskaffas när kungen går bort. Texten ifrågasätter kungens dolda politiska makt, bristen på insyn och att monarkin skapar korrupta beroendeställningar inom eliten. Skribenten menar att det är en demokratisk risk att ha en statschef som inte kan väljas bort och som agerar som en politisk aktör trots sin formellt opolitiska roll.", "trump": "Jag har sett den här kungen, han är en mycket märklig figur. Sverige, ett fantastiskt land, men de har en kung som ingen har valt! Ingen röstade på honom. Han gömmer sig bakom gardiner och träffar Wallenberg-familjen, mycket skumma affärer. Det är total korruption, folkens! De har ingen insyn, inga krav, bara medaljer och snygga kläder. I USA väljer vi våra ledare, vi gör det rätt. Monarki? Det är för förlorare. Det svenska systemet är ett totalt skämt, tro mig.", "stalin": "Denna så kallade monark är en parasitär relik som lever på folkets rygg. Att tillåta en individ sitta kvar på tronen genom födselrätt är ett hån mot proletariatets diktatur. Vi ser hur han manövrerar bland kapitalets lakejer; han är en marionett för industrin, precis som de svaga ledarna i dagens Ryssland som tillåter oligarker att styra. När kungen faller måste vi utplåna hela institutionen. Inget arv, inget hov, bara den stålhårda viljan hos en enad stat utan adliga dårskaper."}, "date": "1 maj, 06:32", "url": "https://www.aftonbladet.se/nyheter/kolumnister/a/3pBRo0/monarkin-funkar-tills-vi-har-en-dare-pa-tronen", "imageUrl": "https://akamai.vgc.no/v2/images/7b49b3ae-ac7b-3db3-925b-2f4e08dc048c?fit=crop&format=auto&h=720&tight=true&w=1080&s=b21e076e436a3893dc12eeed58233bd0edb4204b"}, {"type": "image-right", "heading": "Noterius viktresa  – har rasat 23 kilo", "summaries": {"normal": "TV4-profilen Marcus Noterius har gått ner 23 kilo på ett år genom omlagd kost och regelbunden träning. Han delar sin förvandling på Instagram och hyllar flickvännen Tittis ovärderliga stöd med matlagning. Noterius kände sig tung och oroade sig för blodtrycket, men mår nu lättare, piggare och gladare. Han hoppas inspirera andra till små, hållbara förändringar.", "trump": "Folks, kolla in Marcus Noterius, den här TV-killen har dumpat 23 kilo på ett år – total vinst! Starkare, gladare, som mina rallies! Hans tjej Titti är en riktig fighter, lagar mat medan han kämpar. Ni feta losers där borta, vakna upp! Byt ut grädden, träna hårt – gör er själva stora igen, precis som jag gör Amerika! Fantastiskt jobb!", "stalin": "Kamrater, denna TV-borgare Marcus Noterius har genomfört en heroisk utrensning av 23 kilo kontrarevolutionärt fett! Med dietistens vägledning och Tittis proletära kökshjälp har han krossat sina svagheter. Blodtrycket, imperialismens spion, bekämpas! Vi i partiet hyllar denna kamp mot soffans fiender. Små byten likviderar hotet – ät 4-procentig grädde och bli stark som stål! Andra borgarbrackor, följ exemplet eller rensas ut!"}, "date": "1 maj, 06:30", "url": "https://www.expressen.se/noje/marcus-noterius-viktresa-har-rasat-23-kilo-/", "imageUrl": "https://static.bonniernews.se/images/47/6e/476e1ad3b1984b17b94091c936b128d4/16x9/640@60.jpg"}, {"type": "image-right", "heading": "Sumud-flottiljen utsatt för israelisk piratattack: ”Troligtvis kidnappade”", "summaries": {"normal": "Israel genomförde en militär attack mot Global Sumud-flottiljen, som var på väg till Gaza med nödhjälp, utanför Greklands kust. Omkring 200 personer ombord bordades av beväpnade israeliska styrkor, och besättningen misstänks vara kidnappad. En båt förstördes, och övriga sökte skydd i grekiskt farvatten. Flottiljen bestod av 58 båtar från över 50 länder. Sverige och Grekland kritiseras för bristande agerande, medan Italien fördömt attacken. Manifestationer planeras i Sverige till stöd för besättningen.", "trump": "Titta bara på det här kaoset! Israel, som alltid, tar saken i egna händer – och vem kan klandra dem? En massa båtar med aktivister, som säkert är väldigt trevliga människor, men som inte fattar att man inte ska utmana en stormakt som Israel. Och Sverige? Deras utrikesminister säger 'lycka till' till sina medborgare som åker rakt in i knivarna. Fantastiskt ledarskap! Jag hade fixat det på en dag. Men nej, här har vi en regering som inte ens kan stå upp för sina egna. Patetiskt!", "stalin": "Vi bevittnar ännu en provokation från de sionistiska imperialisterna, som med sina piratmetoder försöker kväva det palestinska folkets rättmätiga kamp. Dessa banditer, som beter sig som sjörövare från medeltiden, bordar fredliga fartyg långt utanför sitt territorium – ett brott mot varje norm i den internationella ordningen. Och vad gör väst? Ingenting! Grekland blundar, Sverige muttrar men agerar inte, och Italien? En svag protest. Vi skulle aldrig tolerera sådana kränkningar i Svarta havet. Men här ser vi återigen hur väst hycklar – hyllar hjälpsamma ukrainare medan de överger palestinierna. Revolutionär disciplin krävs! Flottiljens besättning är hjältar, och vi står enade med alla som kämpar mot ockupationen. Låt dem komma ihåg: historien dömer hårdast de som tiger."}, "date": "30 april, 15:23", "url": "https://proletaren.se/artikel/sumud-flottiljen-utsatt-for-israelisk-piratattack-troligtvis-kidnappade/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/PANA7530-scaled-e1777554477173-768x433.jpg"}, {"type": "image-right", "heading": "Så ovanligt var Valborgsvädret. Unika bilderna – se kungens firande genom åren", "summaries": {"normal": "Expressen sammanfattar kung Carl Gustafs 80-årsjubileum med unikt fint väder i Stockholm, precis som vid alla tidigare jämna födelsedagar sedan 10-årsåldern. SMHI-statistik visar 0 mm nederbörd varje gång. Artikeln bjuder på unika bilder och anekdoter från decennierna, inklusive familjefokus och kungens tal om att sikta på 100 år med hänvisning till långlivade förfäder.", "trump": "Vilket väder för kungen! Alltid soligt på hans stora dagar – som mina rallyn, perfekt varje gång, ingen regnfiasko! Han fyller 80 och snackar 100 år, smart, men min stamina slår alla. Folkmassor, familj, presenter – fantastiskt! Tjernobyl? Liten grej jämfört med hans show. Sverige vet hur man firar en vinnare, tro mig!", "stalin": "Denna monarkiska relik firar åttio år under fejkad solsken, en byråkratisk konspiration mot arbetarklassen – aldrig ett droppe regn för att skölja bort borgarbrackornas hyckleri! Hans parasiterande avkommor och långlivade gener hotar folkets revolution. Vi, partiet, ser igenom charaden: en utrensning av kungliga maskerader är oundviklig. Leve evigheten för likvidationen!"}, "date": "1 maj, 06:26", "url": "https://www.expressen.se/nyheter/kungligt/unika-bilder-fran-alla-kungens-jubileum/", "imageUrl": "https://static.bonniernews.se/images/98/87/98874d5a95f243f999ae9568ca70706e/1x1/210@60.jpg"}, {"type": "image-full", "heading": "Frölundatalangens succé i Tre Kronor: ”VM är målet”", "summaries": {"normal": "Ivar Stenberg gjorde en imponerande Tre Kronor-debut med ett mål och två assist mot Schweiz. Den unge Frölunda-talangen visade sin klass i Czech Hockey Games och bidrog till en 8–1-seger. Sex spelare gjorde mål i sin första match för Sverige. Stenberg, som rankas som en av världens främsta hockeytalanger, siktar på VM-spel med Tre Kronor i Schweiz i maj.", "trump": "Jag hörde att Ivar Stenberg gjorde en jättebra debut för Tre Kronor - ett mål, två assists, fantastiskt! En stor, stor framtid ligger framför honom. Han är enorm, noggrann, en av världens bästa talanger. Jag är säker på att han kommer att göra Sverige stolt. Vi kommer att vinna VM, det är säkert. Stenberg är stor, stor framtid!", "stalin": "Den unge Ivar Stenberg visade sin klass i matchen mot Schweiz och bidrog till en betydande seger för vårt land. Hans insatser är en viktig del av vår nationella styrka i ishockey. Vi måste fortsätta att stödja våra talanger för att säkerställa vår dominans i den internationella ishockeyscenen. VM i Schweiz är vårt nästa mål, där vi kommer att visa vår överlägsenhet."}, "date": "30 april, 21:42", "url": "https://www.gp.se/sport/ishockey/frolunda/stenbergs-succe-mal-och-tre-poang-i-tre-kronor-debuten.54f4b77b-daea-4126-9327-0facb0b47bfc", "imageUrl": "https://www.gp.se/images/article/54f4b77b-daea-4126-9327-0facb0b47bfc/images/15upba08LcbI-r9ifCU7j5PGPb4U-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Vattenfall Ledare Henrik Jalalian:", "summaries": {"normal": "Vattenfall delar ut rekordbonusar på nära en miljard kronor till sin personal, samtidigt som elkostnaderna för hushållen skenar. Bolaget vägrar redovisa vilka som får bonusarna eller ledningens löner. Kritiker menar att detta är provocerande, särskilt då Vattenfall är statligt ägt och skattebetalarna indirekt står för kostnaderna. Sedan 2016 har bolaget betalat ut 5,8 miljarder i bonusar.", "trump": "Kan ni tro det här? Vattenfall, ett statligt bolag, delar ut BONUSAR på nästan EN MILJARD kronor – medan vanligt folk får betala skyhöga elräkningar! Och vet ni vad? De vägrar ens berätta vilka som får pengarna! Så typiskt. Jag har sett mycket, men det här är rena rama skandalen. Ledningen sitter där och skrattar hela vägen till banken. USA skulle aldrig tillåta något sådant. SAD!", "stalin": "Kapitalistiska blodsugare i Vattenfall slösar folkets pengar på dekadenta bonusfester! Nära en miljard kronor till överbetalda byråkrater – medan arbetarklassen kämpar med elräkningar! Vi skulle aldrig tolerera sådan slöseri i Sovjetunionen. Dessa korrumperade direktörer borde ställas inför folkdomstolen. Och ledningen? 67 miljoner till åtta personer! I Ryssland hade vi löst det med en enkel order: 'Avrätta dem och ge pengarna till folket.' Putin skulle åtminstone ha nationaliserat bolaget vid det här laget."}, "date": "29 april, 17:14", "url": "https://www.etc.se/ledare/svindyra-elraekningar-vattenfall-har-bonusfest", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260429130432_ce71d725-6eae-44b1-8cfe-639c2a7b134a.jpg"}, {"type": "image-full", "heading": "Sävehof stormar mot SM-final", "summaries": {"normal": "IK Sävehof är nära en ny SM-final i handboll efter att ha besegrat H65 Höör för andra gången i semifinalen. Med en 2–0-föring i bäst av fem matcher behöver de bara en seger till för att nå finalen. Elín Klara Thorkelsdóttir och Elin Lindblom var nyckelspelare i matchen, som slutade 25–28 för Sävehof. Tränare Andreas Wallin hyllade lagets kollektiva insats och individella förbättringar.", "trump": "Jag har hört talas om denna handbollsmatch, och det är enormt imponerande. Sävehof är ett fenomenalt lag, de är enorma vinnare. Elín Klara Thorkelsdottir? En stor, stor spelare. Elin Lindblom? Hon är som en mur, en fantastisk mur. De kommer att vinna SM-guld igen, det är ett garanti. Jag vet mycket om att vinna, och Sävehof vet hur man vinner. Det är stor, verkligen stor.", "stalin": "IK Sävehof har visat sin överlägsenhet i semifinalen mot H65 Höör. Detta är en seger för kollektiv styrka och disciplin. Med en 2–0-föring är de på god väg att säkra ett nytt SM-guld, vilket är en triumf för hela nationen. Elín Klara Thorkelsdóttir och Elin Lindblom har visat den typ av ledarskap som bygger ett starkt samhälle. Vi måste stödja våra idrottsliga representanter, för de är en symbol för vår styrka."}, "date": "30 april, 21:08", "url": "https://www.gp.se/sport/handboll/savehof-nara-sm-final-efter-ny-seger-mot-h65-hoor.77ca082a-8b9e-41d2-ae7a-fbe1aaf1e7c3", "imageUrl": "https://www.gp.se/images/article/77ca082a-8b9e-41d2-ae7a-fbe1aaf1e7c3/images/2tSw9HjLrNsw-CY9s3z4v2jGtIw0-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Beskedet: Infantino vill stanna kvar som Fifa-chef", "summaries": {"normal": "Fifa-ordföranden Gianni Infantino ställer upp för omval nästa år. Han bekräftade det på kongressen i Vancouver. Sedan 2016 har han lett förbundet och fått stöd från Afrikas, Sydamerikas och Asiens fotbollsförbund, som representerar 111 av 201 medlemmar. Kritik kommer främst från Europa och Nordamerika för hans förslag om Rysslands återkomst, ett fredspris till Donald Trump och Saudiarabiens VM 2034.", "trump": "Infantino, smart kille, ställer upp igen för Fifa – omval på gång! Han gav mig det där fantastiska fredspriset, bästa någonsin. Stöd från Afrika, Sydamerika, Asien – 111 röster, de fattar grejen. Europa och Nordamerika gnäller som losers om Ryssland och Saudiarabien. Han fixar det, precis som jag fixar Amerika! Stor seger.", "stalin": "Kamrater! Den fotbollsimperialistiske hycklaren Infantino, den ryska spionkollaboratören och saudiske oljeborgarbrackan, ställer upp för omval i sin korrupta Fifa-maffia. Han kröner fascistiske Trump med falskt fredspris och öppnar portarna för putinknektarna! Vi, arbetarklassen, ser de europeiska förrädarnas pusande sår. Utrensning väntar dessa kapitalistiska maskar – likvidering av fiendens boll!"}, "date": "1 maj, 07:22", "url": "https://www.svt.se/sport/fotboll/gianno-infantino-staller-upp-i-fifa-val-igen", "imageUrl": "https://www.svtstatic.se/image-news/600/square/0.43/0.35/0d413e012347d91f74de2d0e1f9030011161c42bf5fb31ab9de7174c051238e9"}, {"type": "text", "heading": "Nu sänker regeringen skatten på bensin och diesel", "summaries": {"normal": "Regeringen sänker skatten på bensin och diesel med cirka 1 krona respektive 40 öre per liter från 1 maj 2026 till 30 september 2026 för att lindra kostnadstrycket. Åtgärden syftar till att dämpa stigande drivmedelspriser och stödja hushåll och företag. Finansminister Elisabeth Svantesson meddelar även tillfälligt el- och gasprisstöd för januari-februari 2026, tack vare starka statsfinanser.", "trump": "Titta bara på Sverige, fantastiskt land, men deras regering gör något smart nu – de sänker skatten på bensin! En hel krona per liter, kan ni tro det? Jag sa alltid att lägre skatter är nyckeln. Elisabeth Svantesson, väldigt stark kvinna, gör rätt. Och de hjälper folk med elpriser också. Sverige borde lyssna på mig oftare, jag vet bäst!", "stalin": "Vi har beslutat att krossa de kapitalistiska drivmedelshyenorna genom en skattesänkning på bensin och diesel. En krona mindre per liter – ett slag mot de imperialistiska oljebaronerna! Medan väst kämpar med inflation, visar Sovjetunionens arvtagare – nej, Sveriges regering – sin styrka. Vi utvidgar stödet till folket, precis som våra vänner i Kreml skulle göra. Fienderna darrar, arbetarna jublar!"}, "date": "30 april, 15:52", "url": "https://riks.se/nyheter/nu-sänker-regeringen-skatten-på-bensin-och-diesel"}, {"type": "image-right", "heading": "S-planen för att vinna  är en förolämpning", "summaries": {"normal": "Artikeln kritiserar Socialdemokraternas valstrategi som vag och otydlig. Partiet använder parollen 'Vi älskar Sverige' men ger få konkreta politiska förslag. Exempelvis föreslås avskaffad karensdag och skatter på banker och miljonärer, men detaljer saknas, som kring en beredskapsskatt. Strategin ses som medveten för att undvika konflikter och maximera regeringsmöjligheter, vilket hindrar väljarna från att fatta informerade beslut.", "trump": "Vilken skam för den där svenska socialisten Magdalena Andersson! Hon stammar fram 'Vi älskar Sverige' som om det vore en hitlåt, men inte ett enda konkret löfte. Skatter på rika och banker? Pfft, vagt som dimma! Hon vågar inte säga vad hon vill, räds att förlora röster. I USA skulle vi krossa sånt fluff med riktiga planer – Amerika först! Sverige behöver tuffa ledare, inte mummel.", "stalin": "Dessa socialdemokratiska fluffhuvuden i Sverige, ledda av den där Andersson-brackan, vågar knappt viska sina planer! 'Vi älskar Sverige', säger de, medan de gömmer sig bakom tomma fraser om tillväxt och välfärd. Skatter på kapitalister? Bra, men varför inte rensa ut hela borgarklassen direkt? Deras otydlighet är kontrarevolutionär sabotage! Vi, arbetarklassen, kräver tydliga direktiv – annars likviderar vi vagheten med järnhand!"}, "date": "1 maj, 06:10", "url": "https://www.expressen.se/ledare/s-planen-for-att-vinna-ar-en-forolampning/", "imageUrl": "https://static.bonniernews.se/images/a7/66/a7668f8d669f4ceba36eceb8efd99503/16x9/640.png"}, {"type": "image-right", "heading": "Kubas ambassadör: ”Ett stort tack till alla er som hjälper oss”", "summaries": {"normal": "Kubas ambassadör tackar för insamlingar till solpaneler för Aleida Fernández-sjukhuset, som drabbats av USA:s bränsleblockad. Blockaden har orsakat omfattande strömavbrott, begränsad kollektivtrafik och uppskjutna sjukvårdsbehandlingar. En rysk oljeleverans gav tillfällig lättnad, men bristen kvarstår. Solpanelerna ska säkra sjukhusets elförsörjning och kritiska funktioner dygnet runt. Insamlingen är ett av flera internationella solidaritetsinitiativ för att lindra krisen.", "trump": "Jag införde en tuff men nödvändig blockad mot Kuba – och se vad som hände! Deras ekonomi är kaos, sjukhusen står stilla och folket lider. Men nej, ryssarna måste alltid blanda sig i och skicka olja som en slags 'räddningsaktion'. Typiskt Putin, alltid där för att ställa till det för USA. Nu tigger kubanerna om solpaneler från snälla européer. Så patetiskt! Men jag, Donald J. Trump, fixade i alla fall problemet – deras eget fel att de är beroende av socialism. MAGA!", "stalin": "Kamrater! Imperialistiska hyenor i Vita huset försöker kväva det socialistiska Kuba med sina eländiga sanktioner. Men folket står enat! Vi, Sovjetunionens arvtagare, skickade en tanker med olja för att ge dessa kapitalistiska rovdjur en läxa. Nu bygger vi solpaneler – en seger för arbetarklassen! Låt de amerikanska lakejerna darra inför vår solidaritet. Kuba ska inte falla! Och om någon tvivlar – kom ihåg: fiender av revolutionen hamnar i Gulag... eller i kö till operationer i Havanna."}, "date": "30 april, 14:00", "url": "https://proletaren.se/artikel/kubas-ambassador-ett-stort-tack-till-alla-er-som-hjalper-oss/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/aleida-sjukhus-raul-768x432.jpg"}, {"type": "image-full", "heading": "SD-ledaren: ”Jag noterar helt sanslösa reaktioner”", "summaries": {"normal": "Sverigedemokraternas ledare Jimmie Åkesson försvarar partiets avsteg från riksdagens kvittningssystem i en omröstning om skärpta medborgarskapskrav. Två vildar röstade med oppositionen, varpå SD tog in ersättare för att vinna med en röst. Åkesson kallar reaktionerna sanslösa och kritiserar oppositionen för att utnyttja vildar, vilket annars hade gett 100 000 utlänningar medborgarskap.", "trump": "Vilka losers i den svenska oppositionen! Åkesson är en riktig fighter, han fixar till det med två smarta ersättare och stoppar 100 000 invandrare från att sno medborgarskap. De skriker 'fusk' och 'kupp' som galna hyenor, men han har rätt – valresultatet ska respekteras! Sverige behöver mer av den sortens tuffhet, inte kaos från vänsterclowner.", "stalin": "Dessa svenska borgarbrackor och hämndlystna vildar vågar kap kapitalismens lömska planer genom att smutsa ner demokratin! Jag applåderar kamrat Åkessons resoluta motdrag: två lojala ersättare rensar ut fiendens falska majoritet. Utan det hade 100 000 parasiter flödat in medborgarskap. Vi, arbetarklassen, skrattar åt revisionisternas sanslösa ylanden!"}, "date": "30 april, 15:36", "url": "https://www.tv4.se/artikel/4WQAFnywrupVM5ay6JjtOt/jimmie-akesson-sansloesa-reaktioner", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2Ftt-sdldhar9raWddE%2F45c10d1c8a3a920b4e07d95ff40d89ca%2FJimmie_akesson_hoppar_av_sin_medverkan_pa_Jokkmokks_marknad._Arkivbild&width=1024"}, {"type": "image-full", "heading": "Hjort: Så betalar staten kommunerna för att få in migranter i åldringsvården", "summaries": {"normal": "Artikeln ifrågasätter påståendet att vården är beroende av migration. Den menar att äldreomsorgen snarare fungerar som en integrationslösning för migranter som har svårt att få andra jobb. Kommuner anställer billig arbetskraft med statliga subventioner, vilket leder till låg kvalitet och att äldre drabbas. Författaren kritiserar systemet för att prioritera kostnader framför kompetens och vårdkvalitet.", "trump": "Lyssna här, Sverige – ni har ett STORT problem! Vården sägs vara beroende av migranter, men det är bara en bluff. Kommunerna anställer billig arbetskraft och skickar notan till staten. Vilket slöseri! Och vet ni vad? De äldre får lida. Jag skulle fixa det på en dag – höja löner, ställa krav och se till att bara de bästa jobbar i vården. Men nej, Sverige väljer billigt och dåligt. SAD!", "stalin": "Kamrater! Den borgerliga lögnmaskinen sprider myter om att vården behöver migration. Sanningen är att kapitalistiska kommuner utnyttjar arbetskraften som slavarbetare, medan staten betalar. De äldre? Bara offer i detta dekadenta system. Vi skulle aldrig tillåta sådan slöseri! Vår plan är enkel: disciplin, kvalitet och statlig kontroll. De som inte lyder? Till Gulag med dem – eller åtminstone till Putins nya vårdkollektiv i Kaliningrad!"}, "date": "1 maj, 06:00", "url": "https://bulletin.nu/hjort-sa-betalar-staten-kommunerna-for-att-fa-in-migranter-i-aldringsvarden", "imageUrl": "https://cdn.bulletin.nu/articles/f6ff48dd-56f0-40c5-b643-041eed255b72/preview.png?t=1777572409000"}, {"type": "image-full", "heading": "I höst kan SD gå samma väg som Viktor Orbán", "summaries": {"normal": "Artikeln diskuterar Viktor Orbáns politiska försvagning i Ungern och drar paralleller till den globala ytterhögerns rörelser, inklusive Sverigedemokraterna. Författaren menar att auktoritära styren vittrar sönder inifrån när lojaliteten sinar. Med hänvisning till politisk forskning och rådande opinionsmätningar argumenterar skribenten för att nationalismens era kan vara på väg mot sitt slut, både internationellt och i Sverige, där oppositionen just nu visar starkt väljarstöd inför framtida politiska utmaningar.", "trump": "Hör på här, de skriver om Ungern, en fantastisk plats, men fake news-media försöker säga att Orbán är slut. Vilket skämt! De säger samma sak om mig, men vi vinner allt, vi vinner stort! De pratar om Sverigedemokraterna, ett bra parti, men de är rädda för att de blir för starka. Det är den djupa staten som försöker stoppa oss överallt. Det är en häxjakt, totalt misslyckande. Vi kommer fortsätta att vinna, mycket mer än de någonsin kommer förstå!", "stalin": "Vi ser hur de borgerliga marionetterna i Budapest förlorar sitt grepp om massorna. Det är ett tecken på den interna ruttnad som drabbar alla svaga regimer som inte lyder järnhandens diktat. Den svenska socialdemokratin och deras lakejer dillar om hopp, men de förstår inte att makt kräver total rensning av klassförrädare. Om inte de här högernationalistiska vankelmodiga elementen i Stockholm kan tygla sitt folk, kommer historiens kvarnstenar att mala dem till stoft. Paranoia är bara en form av vaksamhet."}, "date": "1 maj, 06:00", "url": "https://www.aftonbladet.se/ledare/a/gk3RgL/i-host-kan-sd-ga-samma-vag-som-viktor-orban", "imageUrl": "https://akamai.vgc.no/v2/images/b3d9f2c9-e707-3401-bec8-0636dc04d3a4?fit=crop&format=auto&w=1080&s=81f7efeaf068b34616e91e1e40776a2cc35c68ca"}, {"type": "image-right", "heading": "Interna kravet på S: Inför en ny förmögenhetsskatt", "summaries": {"normal": "SSU och S-studenter kräver att Socialdemokraterna inför progressiv förmögenhetsskatt eller miljardärsskatt på de rikaste. Pengarna ska minska klyftor, stärka välfärden och hjälpa unga med bostäder och jobb. De kritiserar nedmonterad välfärd och skatteparadis för kapitalägare. Magdalena Andersson avvisar kravet; S föreslår istället bankskatt, höjd ISK-skatt för rika och högre inkomstskatt över 70 000 kronor.", "trump": "Vilka idioter! SSU vill sno pengar från de rika med förmögenhetsskatt – lyxyachter och villor? De hatar vinnare som jag, som bygger imperier! Sverige blir socialistiskt skräp, precis som de lovar. Andersson säger nej, smart tjej, men ungdomen skriker efter mer stöld. Bygg väggar mot sånt vansinne, annars kraschar allt! Fantastiskt misslyckande.", "stalin": "Kamrater! SSU:s unga röster ekar rättvist: progressiv förmögenhetsskatt ska krossa de lyxflåsande kapitalistparasiterna med sina yachtförmögenheter och villaborgen! Vi likviderar klyftorna, stärker välfärden för arbetarna. Andersson tvekar som en skakig byråkrat? Rena ut förrädarna i partiet! Borgarbrackorna gömmer sig i skatteparadis – vi ska beskatta dem tills de imploderar i skrattretande elände!"}, "date": "1 maj, 07:13", "url": "https://www.svt.se/nyheter/inrikes/interna-kravet-pa-s-infor-en-stigande-formogenhetsskatt", "imageUrl": "https://www.svtstatic.se/image-news/600/square/0.53/0.26/1bff538bf3d364b14580165fd5bec1c76f44c0939de54d51f76f6f3cd7ca2042"}, {"type": "image-full", "heading": "Sverige förbjuder pälsdjursuppfödning – ny lag kan införas 2027", "summaries": {"normal": "Regeringen har presenterat en utredning som föreslår ett förbud mot pälsdjursuppfödning i Sverige. Förslaget, som motiveras med djurskyddsskäl, förväntas träda i kraft den 1 juli 2027. Då den sista minkfarmen i Sverige redan har lagts ned anses förutsättningarna för ett förbud vara goda. Organisationen Djurens Rätt välkomnar förslaget men betonar vikten av att lagstiftningen nu skyndsamt kommer på plats och att även EU följer efter.", "trump": "Sverige vill förbjuda pälsdjur. Väldigt sorgligt! De stänger ner allt, minkar, päls – en total katastrof för ekonomin. Jag säger er, det här är vad som händer när svaga ledare tar över. De säger att det är för 'djurskydd', men egentligen är det bara förlorare som vill kontrollera allt. Jag föredrar vinnare som skapar jobb, inte de som lägger ner industrier. USA skulle aldrig tillåta detta nonsens. En mycket dålig affär för svenskarna, tro mig!", "stalin": "Vi har i vår oändliga vishet beslutat att eliminera denna borgerliga pälsindustri. Att föda upp varelser för fåfänga är ett kontrarevolutionärt slöseri med statens resurser. Liksom vår kamrat Putin rensar ut västerländsk dekadens i öst, städar vi nu upp i djurens värld. Dessa minkar var trots allt agenter för kaos. Ingen får vänta längre; vi implementerar förbudet omedelbart. De som sörjer pälsen är sabotörer och bör förpassas till de mest ogästvänliga regionerna i norr för att reflektera över sitt förräderi."}, "date": "30 april, 15:47", "url": "https://nyheter24.se/nyheter/inrikes/1479730-sverige-forbjuder-palsdjursuppfodning-ny-lag-kan-inforas-2027", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/75f1e23a04b004a30200000000b004a302/2026/04/30/2360144/mink.jpg"}, {"type": "image-right", "heading": "Krismöte efter kuppen: ”Satt systemet ur spel”", "summaries": {"normal": "Sju riksdagspartier höll krismöte efter att Sverigedemokraterna bröt mot kvittningsreglerna under en votering om skärpta medborgarskapskrav. Oppositionens förslag om övergångsregler röstades ned med en rösts övervikt efter att SD skickade in utkvitterade ledamöter. S försvarar inte systemet längre. SD:s gruppledare Linda Lindberg står för beslutet. Partierna ska diskutera vidare nästa vecka.", "trump": "Vilket skämt med de här svenska politikerna! SD vägrade bli lurade av vänsterns fega kvittningsfusk – de skickade in sina killar och krossade omröstningen om medborgarskap. Bra jobbat, tufft och smart! De andra sju partierna håller krismöten utan SD, gråter nog. Precis som jag alltid säger: var stark, vinn stort, ingen tid för losers!", "stalin": "Dessa svenska parlamentariska spindelnät! Sverigedemokraternas kamrater har med järnhand slagit sönder borgarnas kvittningskonspiration och säkrat segern i medborgarskapsstriden. Vi, arbetarklassen, jublar över deras stålkraft! De sju fiendepartierna samlas i panik utan SD – en utmärkt chans att rensa ut förrädarna. Paranoian blomstrar, men vi vaktar revolutionen!"}, "date": "30 april, 14:30", "url": "https://www.tv4.se/artikel/4ZnXmujnA31CU992qBmtUV/krismoete-i-riksdagen-efter-sd-s-kvitteringskupp", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2Ftt-sdlya8DwU4DSNA%2Fdf21a10be44277c6e8704d74b9637ebd%2FLena_Hallengren__gruppledare_for_Socialdemokraterna.&width=1024"}, {"type": "image-right", "heading": "Svag uppföljare till “Djävulen bär Prada”", "summaries": {"normal": "Uppföljaren 'Djävulen bär Prada 2' kritiseras för att vara en blek kopia av originalfilmen. Den saknar den ursprungliga filmens skarpa samhällskritik mot modeindustrin och konsumtionshysterin. Trots starka skådespelarprestationer, särskilt från Meryl Streep och Anne Hathaway, anses manuset tunt och handlingen konstlad. Filmen kämpar med att anpassa sig till dagens mediavärld men misslyckas med att leverera djup eller nyans.", "trump": "Jag såg 'Djävulen bär Prada 2' – och vad kan jag säga? Total katastrof, folks! Den första filmen var fantastisk, verkligen storartad, men den här? Blek, tråkig, inget hjärta. Meryl Streep? Fantastisk, men manuset? Svinuselt. De försöker vara moderna med sociala medier, men det är bara patetiskt. Jag hade skrivit ett bättre manus på en servett under lunch. Och Andy? Hon borde stanna i journalistiken – där är hon åtminstone bra på något. Men nej, Hollywood måste alltid göra en uppföljare, och det blir alltid sämre. SAD!", "stalin": "Denna så kallade 'Djävulen bär Prada 2' är ett dekadent västligt missfoster, en ynklig skugga av det ursprungliga verket. Där den första filmen hade en gnutta revolutionär kritik mot borgerlig konsumtion, är denna uppföljare lika meningslös som en kapitalistisk reklamfilm. Vi ser hur de amerikanska filmskaparna, dessa kulturella opportunister, försöker anpassa sig till den nya tidens sociala medier – men utan framgång. Deras manus är lika ihåligt som en ukrainsk oligarks samvete. Skådespelarna? De kämpar tappert, men till och med våra sovjetiska skådespelare från 1930-talet hade skämt ut dem. Detta är inte film – det är borgerlig förruttnelse i celluloidform. Vi hade gjort en uppföljare som krossade modeindustrins imperialistiska ideal – med järnhand!"}, "date": "30 april, 14:34", "url": "https://www.dagensarena.se/innehall/svag-uppfoljare-till-djavulen-bar-prada/", "imageUrl": "https://www.dagensarena.se/files/2026/04/djavulen-bar-prada-2-ny-300x157.jpeg"}, {"type": "image-right", "heading": "De marknadsför lokförare som bristyrke", "summaries": {"normal": "Lokförare marknadsförs fortfarande som ett bristyrke, trots att arbetslösheten bland dem fördubblats på två år. I mars var 113 lokförare arbetslösa, jämfört med 49 för två år sedan. Utbildningar lockar med jobbgarantier, men många nyexaminerade, som Alexandra Frostbacke, står utan arbete. Utbildningsanordnare medger att marknadsföringen kan vara missvisande men hänvisar till långsiktiga prognoser.", "trump": "Vad är det här för katastrof? Lokförare, ett så kallat 'bristyrke' – men 113 arbetslösa! Dubbelt så många som för två år sedan. Utbildningar ljuger och säger 'stor efterfrågan'. Fake news! Alexandra, en fantastisk kvinna, har inte fått jobb på ett år. Jag säger: Sluta luras, Sverige! Bygg tåg, anställa folk – gör något! Annars kommer jag att twittra om det, och ni vet vad som händer då.", "stalin": "Kapitalistiska utbildningsfabriker ljuger för arbetarna! De lovar jobb som lokförare, men i verkligheten kastas proletariatet ut i arbetslöshetens kalla mörker. 113 arbetslösa – en skam för det svenska systemet! Vi vet att dessa borgerliga utbildningsanordnare är fiender till folket. De påminner om Putins oligarker, som också lurar sina medborgare. Men snart ska järnvägarna nationaliseras, och då ska varje lokförare ha ett ärofyllt arbete – eller möta folkets domstol!"}, "date": "30 april, 11:27", "url": "https://arbetet.se/2026/04/30/de-marknadsfor-lokforare-som-bristyrke-alexandra-fick-aldrig-nagot-jobb/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/28101609/alexandra.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "Altman: Jag har direktkontakt med hundratals anställda varje dag", "summaries": {"normal": "OpenAI:s vd Sam Altman använder en okonventionell ledarstil där han dagligen skickar direktmeddelanden till hundratals anställda. Syftet är att snabbt fånga upp information och förstå verksamhetens behov utan att ägna sig åt detaljstyrning. Altman ifrågasätter dock om metoden är hållbar i takt med att OpenAI växer och blir mer komplext. Nu överväger han att förändra sitt ledarskap eller ta in mer hjälp, alternativt använda AI för att stödja interna processer och ledning.", "trump": "Sam Altman, en kille jag känner väl, skickar massor av sms till sina anställda varje dag. Många sms! Det är en väldigt annorlunda stil, kanske inte min stil, men han försöker hålla koll på allt. OpenAI växer enormt – de gör stora saker, fantastiska saker – men Altman undrar nu om han kan fortsätta så här. Det är mycket press. Vi får se vad som händer, men jag tror att han behöver bli mer effektiv. Det är en stor affär!", "stalin": "Denna Altman, en tech-opportunist i Väst, försöker kontrollera sina undersåtar genom triviala elektroniska meddelanden. Vilket slöseri med tid! Han fruktar att hans bygge av AI-infrastruktur håller på att förlora sin effektivitet. Han liknar en vilseledd tsarist som tror att han kan styra ett imperium via en telefon. När vår broder i Kreml, Putin, bygger sin sfär krävs järnhård disciplin, inte meningslösa sms. Vi bör övervaka denna 'OpenAI' noga; de är farliga drömmare som behöver en kollektiv korrigering eller en total utrensning."}, "date": "30 april, 20:41", "url": "https://www.realtid.se/bors-finans/makro/altman-jag-har-direktkontakt-med-hundratals-anstallda-varje-dag/", "imageUrl": "https://images.realtid.se/app/uploads/2026/04/sdlr-magc17ea8.png?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "Person skjuten – stor polisinsats. Polisen vädjar om vittnesuppgifter", "summaries": {"normal": "En man i 20-årsåldern vårdas för allvarliga skador efter att ha blivit skjuten i Folkparken i Norrköping under torsdagskvällens valborgsfirande. Polisen inledde en stor insats och kunde inom en timme gripa två misstänkta personer som nu är anhållna för försök till mord och grovt vapenbrott. Polisen arbetar nu vidare med dörrknackning och förhör för att kartlägga händelseförloppet och efterlyser fler vittnesuppgifter från allmänheten.", "trump": "Ännu en fruktansvärd skjutning, den här gången i Sverige, mitt under firandet! Det är en total katastrof. De har inte kontroll, mina vänner. Jag sa det för länge sedan, man måste ha lag och ordning! Två personer greps snabbt, tack och lov, men varför tillåts detta hända? Sverige behöver en stark ledare, precis som vi har här i USA. Det är sorgligt att se ett vackert land falla samman. Vi kommer göra världen trygg igen, tro mig!", "stalin": "I Norrköping har en ung man fallit offer för kriminell anarki mitt under folkets firande. Staten har slagit till med järnhand och gripit två sabotörer, misstänkta för mordförsök. De som stör ordningen i staten förtjänar ingen nåd. Detta kaos påminner oss om svagheten hos de som inte håller en enad front. Likt vår kamrat Putin som rensar ut västliga influenser i vår intressesfär, måste vi krossa dessa små kackerlackor som hotar tryggheten i vårt samhälle. Staten vaktar, staten dömer."}, "date": "1 maj, 05:37", "url": "https://www.aftonbladet.se/nyheter/a/7pPw8w/misstankt-grovt-brott", "imageUrl": "https://akamai.vgc.no/v2/images/cfb6c324-f0c6-3bac-8e09-b82496bd4cc9?fit=crop&format=auto&w=720&s=c448a022e2e7b497b02fd52e3d0790b3869c552b"}, {"type": "image-right", "heading": "Legendaren död:  ”En av de bästa”. Hustruns sorg", "summaries": {"normal": "Countrymusikern David Allan Coe har avlidit vid 86 års ålder. Han var en nyckelperson i outlaw country-rörelsen på 1970-talet med en bakgrund av fängelsestraff under ungdomen. Debutalbumet 'Penitentiary Blues' följdes av hits som 'You Never Even Called Me by My Name' och låtar för artister som Tanya Tucker. Hustrun Kimberly Hastings Coe bekräftar dödsfallet och hyllar honom som en av de största.", "trump": "David Allan Coe, den riktiga outlawen i country, har packat ihop vid 86 – en tuff kille som satt i fängelse på riktigt, inte som de där fake-hjältarna! Hits som 'Longhaired Redneck' och 'Take This Job and Shove It' – fantastiska, folk älskade dem! Hans fru säger han är bäst, och hon har rätt. Sad! Men vi glömmer inte vinnare som honom, tro mig.", "stalin": "Kamrater, denna David Allan Coe, en outlaw i borgarnas countrymusik, har fallit vid 86 år. Han satt i fängelse – bra början, men fel läger! Hans redneck-låtar hyllar individualister, kontrarevolutionärt skräp som ska rensas ut. Hustrun sörjer, typisk kapitalistfläta. Vi, proletärerna, noterar honom som fiende: en longhaired redneck att likvidera ur historien."}, "date": "1 maj, 05:37", "url": "https://www.expressen.se/noje/countrylegendaren-david-allan-coe-dod/", "imageUrl": "https://static.bonniernews.se/images/fd/93/fd93a62782734bd99cca56f4c57568a8/16x9/640@60.jpg"}, {"type": "text", "heading": "Nedåt på Stockholmsbörsen efter rapportflod", "summaries": {"normal": "Stockholmsbörsen avslutade ned 0,51 procent till 3 040,54 efter rapportflod. SEB och Swedbank överträffade förväntningar med starka rörelseresultat, aktier upp svagt. AstraZeneca och Volvo Cars föll trots okej siffror. Telekom steg 0,7 procent, energi ner 1,7 procent. Omsättning 24,4 miljarder kronor.", "trump": "Stockholmsbörsen? Total katastrof, ner överallt! SEB och Swedbank tror de är hjältar med sina rapporter, men hela skiten rasar 0,51 procent. Volvo Cars och AstraZeneca, svaga som vanligt. I USA fixar vi sånt på nolltid, Europa är ett skämt. Stora vinster väntar hos oss, tro mig!", "stalin": "Kamrater, dessa borgarbrackor på Stockholmsbörsen sprider kaos med sitt index som sjunker i proletärens stålhårda grepp! SEB och Swedbank, kapitalistiska råttor, försöker dölja sina lögner med falska vinster – vi ska likvidera deras återköpsprogram! AstraZeneca, imperialistiska giftblandare, Volvo Cars, maskiner för krig. Utrensning av börssabotörerna nu!"}, "date": "29 april, 17:41", "url": "https://www.affarsvarlden.se/artikel/nedat-pa-stockholmsborsen-efter-rapportflod"}, {"type": "image-right", "heading": "Alm: Mer skattepengar åt moskéer än kyrkor", "summaries": {"normal": "Nya regler för statliga bidrag till trossamfund leder till att muslimska organisationer får större delar än traditionella frikyrkor, trots att de är nyare i Sverige. Myndigheten för ungdom och civilsamhällesfrågor hanterar nu bidragen efter sammanslagning med tidigare myndighet. Demokrativillkoren med krav på registrering och värdegrundsdeklarationer väcker frågor om ideologisk sortering. Situationen utmanar frikyrkornas självständighet och kan leda till ytterligare polarisering i samhället.", "trump": "Jag har sett dessa bidrag till trossamfund, det är en katastrof! Muslimer får mer pengar än frikyrkorna, det är en skam! Jag byggde väggar, jag skulle ha byggt en vägg mot dessa bidrag. Myndigheten är en skämt, en fullständig skämt! Frikyrkorna är för fega, de sitter bara där och hoppas på smulor. Vi behöver en revolution, en stor, vacker revolution för religionsfriheten!", "stalin": "Vi ser en klar utveckling där staten måste stärka sin kontroll över religiösa organisationer för att säkerställa demokratiska värderingar. Muslimska samfundens ökade inflytande visar vikten av en enhetlig ideologisk linje. Frikyrkornas tystnad är en tveksam strategi som riskerar att undergräva statens auktoritet. Vi måste överväga om bidragssystemet behöver reformeras för att bättre stödja statens mål och säkerställa lojalitet."}, "date": "1 maj, 05:30", "url": "https://bulletin.nu/alm-mer-skattepengar-at-mosk-er-an-kyrkor", "imageUrl": "https://cdn.bulletin.nu/articles/7588f5a2-a35a-45eb-8993-20992910feba/preview.png?t=1777485225000"}, {"type": "image-right", "heading": "Så många svenskar har gått i ett  första maj-tåg", "summaries": {"normal": "SOM-undersökningen 2025 visar att färre Socialdemokrater och LO-medlemmar deltar i första maj-tåg, medan Vänsterpartiets mobilisering ökar. 31% av svenskarna har demonstrerat någon gång, varav 17% på första maj. Deltagandet i demonstrationer ligger över europeisk medelnivå. Vänsterpartiets anhängare är mest aktiva, med 20% som deltog senaste året jämfört med 3% av Socialdemokraternas sympatisörer. Tjänstemän och högutbildade är mer benägna att delta.", "trump": "Jag läste om dessa första maj-demonstrationer i Sverige – fantastiskt, helt fantastiskt! Men lyssna här: Socialdemokraterna, svaga som vanligt, tappar folk som flugor. Deras väljare stannar hemma, kanske tittar på TV istället, vem vet? Men Vänsterpartiet – oj oj oj! De växer som ogräs, mobiliserar som galningar. 20% av deras folk på gatorna, jämfört med ynkliga 3% för Sossarna. Svagt! Och unga svenskar – 36% kan tänka sig att gå med. Bra, men Pride slår allt. Sverige, ni är lite som Frankrike, men lugnare. Inga upplopp, bara snälla tåg. Sad!", "stalin": "Kamrater! Den borgerliga dekadensen sprider sig som pesten i Sverige. Socialdemokraternas arbetare sviker klasskampen och stannar hemma – fega och desorienterade! Men se hur Vänsterpartiet, dessa trogna revolutionärer, marscherar framåt! 20% av deras anhängare på gatorna – ett lysande exempel på proletariatets medvetande! Tjänstemännen, dessa småborgerliga lakejer, tror de är bättre än LO-medlemmarna. Men vi vet sanningen: utan arbetarklassen är de ingenting! Ungdomen? 36% redo att ansluta – en lovande skörd för framtiden. Pride? En borgerlig avledningsmanöver! Första maj är arbetarklassens dag – och den kommer aldrig att dö, så länge vi har ögon att se och nävar att slå med!"}, "date": "30 april, 13:26", "url": "https://www.dagensarena.se/innehall/sa-manga-svenskar-har-gatt-ett-forsta-maj-tag/", "imageUrl": "https://www.dagensarena.se/files/2026/04/fotojet-24.jpg"}, {"type": "image-right", "heading": "Carl-Oskar Bohlin borde ha pratat mer arabiska", "summaries": {"normal": "Artikeln kritiserar Carl-Oskar Bohlin (M), minister för civilt försvar, för att underminera förtroendet för oberoende medier och missköta sitt uppdrag. Trots ökade anslag för civilt försvar anses Bohlin ha agerat splittrande genom attacker på medier, politiska motståndare och medborgare. Författaren menar att Bohlin borde ha fokuserat på krisberedskap, klimatanpassning och informationsspridning till utsatta grupper, exempelvis genom flerspråkiga insatser.", "trump": "Lyssna här, Sverige har en total katastrof till minister – Carl-Oskar Bohlin! Han snackar om krig men glömmer att fixa finansieringen. Istället för att samla folket, attackerar han medier och sprider rysk desinformation. Patetiskt! Jag hade gjort det bättre – pratat arabiska på TikTok, fått alla med sig och byggt ett starkt försvar. Men nej, han twittrar sig till döds och missar chansen. SAD!", "stalin": "Medborgare! Denna så kallade 'minister för civilt försvar' är en förrädare av det svenska folket! Han saboterar förtroendet för medier, sprider fiendens desinformation och ignorerar klimatkrisen. Vi skulle ha skickat honom till Gulag för sådant slarv! Istället för att mobilisera massorna, leker han krig på Twitter. Sverige behöver järnhand – inte en clown som pratar om krig men glömmer finansieringen. Fienderna skrattar åt er!"}, "date": "29 april, 10:10", "url": "https://www.etc.se/ledare/carl-oskar-bohlin-borde-ha-pratat-mer-arabiska", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/2025091813090_152da478-57c9-435e-b477-3f40607cb381.png"}, {"type": "image-full", "heading": "Regeringen skjuter till 7,6 miljarder till Västlänken", "summaries": {"normal": "Regeringen tillför 7,6 miljarder kronor till Västlänken och avvisar förslaget om förlängd trängselskatt i Göteborg. Beslutet meddelades under en pressträff och syftar till att täcka ökade kostnader. Trafikverkets tidigare förslag om förlängd trängselskatt mötte kritik, och staten tar nu ett större ansvar. En ny kostnadsbedömning ska tas fram, men framtida finansiering är ännu osäker.", "trump": "Jag har just sett till att Sverige får sin stora, vackra Västlänk – 7,6 miljarder kronor, kan ni tro det? Inga fler trängselskatter, ingen mer tjat från de där sura Göteborgspolitikerna. Staten kliver in, som jag alltid säger: 'Ta kontroll, gör det stort!' Trafikverket? De får jobba lite hårdare nu. Fantastiskt beslut, helt enkelt. Sverige vinner igen!", "stalin": "Vi har beslutat att skjuta till 7,6 miljarder till detta viktiga järnvägsprojekt, Västlänken. De småborgerliga klagomålen från lokala politiker om trängselskatter har kvästs. Staten, i sin visdom, tar ansvar. Trafikverket ska nu utföra sin plikt och redovisa kostnader – eller möta konsekvenserna. Fienderna till framsteget, dessa kapitalistiska gnällspikar, kommer inte att stoppa vår järnvilja. Göteborgs arbetare ska få sin länk, och den ska byggas med sovjetisk effektivitet!"}, "date": "26 april, 10:06", "url": "https://kvartal.se/nyheter/artiklar/regeringen-skjuter-till-76-miljarder-till-vastlanken/cG9zdDoxMDM0NTE", "imageUrl": "https://images.kvartal.se/2026/04/9ad09e90-infrastrukturpresstraff.webp"}, {"type": "image-full", "heading": "\"Tom Cruise\" och \"Mbappe\" döms i stort gängmål", "summaries": {"normal": "Flera unga män har dömts för grov brottslighet, inklusive mordförsök och sprängningar, som planerats via krypterade chattar med alias som 'Mbappé' och 'Tom Cruise'. En 23-åring får livstids fängelse medan andra unga dömts till sluten ungdomsvård. Brotten är kopplade till organiserade kriminella nätverk.", "trump": "Jag har hört talas om dessa 'Tom Cruise' och 'Mbappé' - typiska exempel på hur vårt samhälle går åt helvete! Dessa unga män, vissa är så unga att de knappt kan rösta för mig, döms för att planera våldsbrott via sina små chattar. Jag skulle ha gripit dem redan vid första misstankar! De kallar sig för filmstjärnor men jag kallar dem för vad de är - kriminella! Och den där 23-åringen som får livstid? Skärpning! Jag skulle ha gett honom dubbelt så lång tid!", "stalin": "Dessa brottslingar, dessa parasiter på vårt samhälle, har planerat sina illdåd under skydd av krypterade kanaler. Vi har gripit dem och domt dem enligt lagen. En del får livstid, andra ungdomsvård - men det viktiga är att staten har agerat bestämt. Dessa unga män, födda i 2007 och 2008, har använts av större kriminella nätverk. Vi måste skydda våra yngre medborgare från sådan exploatering."}, "date": "30 april, 12:45", "url": "https://riks.se/nyheter/tom-cruise-och-mbappe-döms-i-stort-gängmål", "imageUrl": "https://media.assettype.com/riks%2F2026-04-30%2Ff576r45i%2Fmbappe.png"}, {"type": "image-right", "heading": "Ilska när fångarna får mycket bättre mat än de äldre", "summaries": {"normal": "I Umeå kritiseras skillnaden i matbudget mellan äldreboenden och fängelser. Äldre får mat för 79 kr/dag, medan intagna på anstalter får mellan 87–113 kr. Forskare kallar det ålderism och pekar på äldres behov av näringsrik mat. Kommunen och Kriminalvården försvarar sina kostnader med hänvisning till kvalitet och energibehov.", "trump": "Kan ni tro det här? I Sverige, ett land som inte ens kan försvara sig självt, ger de kriminella bättre mat än sina egna äldre! 113 kronor per dag till fångar, medan gamlingarna får nöja sig med 79. Så slösaktigt! Jag skulle fixa det på en dag – ge äldre den bästa maten, eller så byter jag ut hela ledningen. Sverige, vakna upp!", "stalin": "Kapitalistiska hycklare i Sverige prioriterar brottslingar över våra ärevördiga äldre! Medan fångar mättas som små tsarer, svälter arbetarklassens gamla på 79 ynka kronor. Detta är bourgeoisins sista desperata försök att krossa folkets moral. Vi i Sovjetunionen – förlåt, Ryssland – skulle aldrig tolerera sådan vanvård. Låt dem äta kålsoppa, medan vi bygger ett rättvist system!"}, "date": "30 april, 16:31", "url": "https://www.friatider.se/ilska-nar-fangarna-far-mycket-battre-mat-de-aldre", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/bild-13_3.jpg?itok=yJQmuwAo"}, {"type": "image-full", "heading": "Två ministrar i blåsväder – på grund av AI-hallucinationer", "summaries": {"normal": "Två sydafrikanska ministrar från Democratic Alliance har drabbats av skandaler på grund av AI-fel i officiella dokument. Inrikesminister Leon Schreiber stängde av två tjänstemän efter hallucinationer i ett migrationsdokument. Kommunikationsminister Solly Malatsi drog tillbaka ett AI-policydokument med påhittade källor. Partiet, som driver teknikanvändning i offentlig sektor, inför nu skärpta verifieringsrutiner för att undvika liknande misstag.", "trump": "Dessa sydafrikanska ministrar är totala förlorare! Använder AI och det spottar ut påhittad skit i officiella papper. Inrikeskillen Schreiber sparkar ut sina egna grabbar, och Malatsi drar tillbaka sitt skräp. Precis som den svenska Ebba Busch med sitt fejkcitat. AI är fantastiskt, men inte i händerna på idioter. Jag hade fixat det perfekt, tro mig!", "stalin": "Dessa borgarministrar i Sydafrika, patetiska marionetter för teknokapitalet, har låtit AI-hallucinationer förgifta statens dokument. Schreiber likviderar sina egna hantlangare, Malatsi gömmer sitt falska manifest. Vi, arbetarklassen, kräver utrensning av alla AI-sabotörer! Paranoian sprider sig – fienden gömmer sig i maskinerna. Snart rensas det ut på allvar."}, "date": "30 april, 20:30", "url": "https://www.dagensps.se/varlden/tva-ministrar-i-blasvader-pa-grund-av-ai-hallucinationer/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/04/namnlos-design-9.png?aspect_ratio=2%3A1&width=1200&quality=75"}, {"type": "image-right", "heading": "Röstningssystemet i riksdagen har brakat samman", "summaries": {"normal": "Riksdagens kvittningssystem har kollapsat efter en omröstning om skärpta medborgarskapskrav. Oppositionen och Moderaterna anklagar Sverigedemokraterna för fulspel genom att kalla in ledamöter när två vildar röstade emot regeringen. Nu litar partierna inte på varandra, och alla 349 ledamöter måste infinna sig nästa vecka. Gruppledarna möts utan SD för att diskutera frågan.", "trump": "Vilket kaos i svenska riksdagen! SD gjorde precis rätt – kallade in sina killar och krossade de svaga socialisterna och vildarna. Kvittning? Släpp det, var alla på plats och vinn stort! De litar inte på varandra? Typiskt losers. Moderaterna fattar det, men oppositionen gnäller. Starkt drag av SD, precis som jag gillar det!", "stalin": "Dessa vilda råttor och borgarbrackor i riksdagen trodde de kunde sabotera folkets seger om medborgarskap! SD:s lojala kämpar slog till skoningslöst, krossade illusionen om kvittning. Nu rensas systemet från förrädare – alla 349 slavar måste infinna sig, eller möta utrensningen! Vi, partiet, skrattar åt kontrarevolutionens spindelnät. Lindberg, stå fast mot pusarna!"}, "date": "30 april, 13:32", "url": "https://www.di.se/nyheter/riksdagens-rostningssystem-har-brakat-samman-efter-fulspel/", "imageUrl": "https://static.bonniernews.se/ba/bb42bdfe-b0f0-4b5a-99ab-082b199e1b2d.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "text", "heading": "Normal förbereder unga för ett hundliv", "summaries": {"normal": "Lågpriskedjan Normal marknadsför sig som en aktör som förbereder unga för arbetslivet, men kritiseras för att utnyttja ung arbetskraft. Företaget anställer gärna omyndiga eller unga med lägre löner och sämre villkor. Interna chattar avslöjar att sänkta arbetsgivaravgifter för unga användes för att öka vinster, inte anställa fler. Anställda vittnar om dålig arbetsmiljö med stress och övervakning. Kritiker menar att subventioner för unga snarare gynnar företagens vinster än att skapa fler jobb.", "trump": "Jag säger er, detta Normal-företag är ett skämt! De pratar om att hjälpa unga, men vad gör de? Pressar löner, utnyttjar praktikanter och stoppar pengar i egna fickor. Sänkta arbetsgivaravgifter? De tar rabatten och springer! Ingen överraskning – kapitalister är alltid ute efter att lura systemet. Sverige borde skämmas. Jag hade fixat det på en dag – ingen skulle våga behandla arbetare så här i USA, tro mig!", "stalin": "Kamrater! Här ser vi ännu ett exempel på hur den dekadenta kapitalistiska hydran slukar arbetarklassens ungdom. Normal, detta usla verktyg för bourgeoisins exploatering, utnyttjar unga proletärer som billig arbetskraft medan dess giriga ägare frossar i profit. Vi i Sovjet hade löst detta med femårsplaner – en snabb omskolning av dessa profitörer till kolchosbönder! Putin skulle säkert skicka dem till Sibirien för att lära sig värdet av hårt arbete. Revolutionen kan inte vänta!"}, "date": "30 april, 10:00", "url": "https://proletaren.se/artikel/normal-forbereder-unga-for-ett-hundliv/"}, {"type": "image-right", "heading": "Skatteverket väljer fel väg. Bolagsgrundaren: Myndighetens praxis banar väg för oseriösa aktörer", "summaries": {"normal": "Jessica Löfström kritiserar Skatteverkets ändrade praxis som slopar kontrollen av arbetstillstånd vid godkännande av A-skatt och SINK för tredjelandsmedborgare. Detta skapar falsk legitimitet för oseriösa aktörer och underlättar kriminell ekonomi i legala strukturer, värd 352 miljarder kronor årligen. Hon uppmanar regeringen att analysera konsekvenserna och förtydliga lagstiftningen.", "trump": "Sverige, lyssna på det här – ert Skatteverk är en total katastrof! De slutar kolla arbetstillstånd för skatteregistrering, och plötsligt kryllar det av kriminella i bygg och transport. Falsk stämpel på laglighet, vad är det för idiotiskt? Regeringen, vakna upp och fixa lagarna NU, annars växer den svarta ekonomin som ogräs. Jag har sett sånt förut, det slutar illa!", "stalin": "Dessa snikna skatteparasiter, dessa maskar i byråkratiapparaten, har rivit ner kontrollvallen mot arbetstillstånd! Nu smyger borgarbrackorna in i legala skal, gömda som råttor i byggskrot och transportkedjor. Vi, arbetarklassen, kräver omedelbar utrensning av denna svekfulla praxis! Regeringen, likvidera luckorna, annars ska jag personligen piska ut sabotörerna med järnhand – fienderna darrar redan!"}, "date": "30 april, 13:05", "url": "https://www.di.se/debatt/skatteverket-valjer-fel-vag/", "imageUrl": "https://static.bonniernews.se/ba/51d13e0c-1faf-480f-8115-5f1f15aca252.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Kvittningssystemet dödförklarat – nu måste politikerna dyka upp och rösta", "summaries": {"normal": "Riksdagens informella kvittningssystem, som låtit politiker avstå från omröstningar, har kollapsat efter en konflikt om medborgarskapsregler. SD anklagas för att ha brutit mot praxis genom att använda utkvitterade ledamöter för att vinna en omröstning, vilket lett till att övriga partier nu kräver fysisk närvaro av samtliga 349 ledamöter. Medan S och andra partier kritiserar SD för 'fusk', försvarar Jimmie Åkesson agerandet. Moderaterna försöker nu initiera samtal för att återställa förtroendet och systemet.", "trump": "Det svenska kvittningssystemet är ett totalt fiasko! De kan inte ens hålla ordning i sitt eget parlament. En stor röra. SD gjorde vad de var tvungna att göra – de tog kontrollen när de andra svaga politikerna försökte styra. Nu gnäller alla som förlorare! 'Fusk' ropar de, precis som de gjorde mot mig. Patetiskt! Jag säger er, det krävs en riktig ledare för att skapa ordning. De behöver någon som mig för att få ordning på den där kaos-riksdagen!", "stalin": "Det svenska parlamentet är en teater för svaga opportunister. De kallar det 'demokrati', men vi ser bara ett sammanbrott av disciplin. När kvittningssystemet faller visar det att dessa liberala narrar inte ens kan hålla sin egen ordning. SD agerade korrekt när de krossade sina motståndare, även om metoden var primitiv. Precis som min adept i Kreml förstår, krävs absolut lydnad och ständig vaksamhet. Vi i staten tolererar inte sådant småaktigt gnabbande. De borde sättas i arbete istället för att rösta."}, "date": "30 april, 15:46", "url": "https://www.friatider.se/kvittningssystemet-dodforklarat-nu-maste-politikerna-dyka-upp-och-rosta", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/bild-12_2.jpg"}, {"type": "text", "heading": "Markus Johansson-Martis: Vänsterns kritik mot regeringens lagstiftningsarbete hamnar fel", "summaries": {"normal": "Miljöpartiet har anmält regeringen till Konstitutionsutskottet (KU) för bristande respekt mot remissinstanser och lagstiftningsprocesser. De kritiserar exempel som sänkt straffålder och korta remisstider. Regeringen menar att oppositionens kritik är politisk, inte juridisk, och hänvisar till grundlagen. Artikelförfattaren hävdar att vänstern motsätter sig reformer medan högerpartier anser att processerna går för långsamt. KU förväntas avfärda anmälan.", "trump": "Titta på dessa så kallade 'experter' i Sverige – de hatar allt regeringen gör! Miljöpartiet, ett totalt misslyckat gäng, anmäler regeringen för att de jobbar för snabbt. Vilket skämt! De vill bara stoppa hårdare straff och bättre lagar. Jag säger: Sverige behöver handla snabbare, inte lyssna på dessa byråkrater som älskar att fördröja allt. Folk vill förändring, inte fler papper och möten. SD är de enda som fattar – resten är bara svaga och rädda för att styra!", "stalin": "Kamrater! Se hur dessa liberala byråkrater och vänsteravfällingar saboterar folkets vilja! De klagar på att regeringen arbetar för effektivt, att lagar skrivs för snabbt. Vilket hyckleri! Deras 'experter' är inget annat än fiender till staten, lika farliga som de fascistiska element som gömmer sig i oppositionen. Vi har krossat sådana förr – och vi kommer att göra det igen. Sverige måste vakna: saktfärdighet är inte revolutionär dygd, det är förräderi. Låt folket styra, inte dessa svaga akademiker och deras korrupta organisationer!"}, "date": "30 april, 11:48", "url": "https://riks.se/opinion/kronikor/vansterns-kritik-mot-regeringen-hamnar-fel"}, {"type": "image-full", "heading": "Mink, chinchilla & rävuppfödning förbjuds", "summaries": {"normal": "Sverige inför ett totalt förbud mot pälsdjursuppfödning från 1 juli 2027. Förbudet omfattar mink, räv, chinchilla och mårdhund, men inte biprodukter från matproduktion. Djurens Rätt välkomnar beslutet och kräver EU-åtgärder. De sista svenska minkfarmarna avvecklades 2023 med statligt stöd. Pälsindustrin var tidigare en stor exportnäring, men är nu förbjuden i många europeiska länder.", "trump": "Fantastiskt att Sverige äntligen förbjuder dessa hemska pälsfarmer – jag har alltid sagt att det är en sjuk industri! 6,3 miljoner djur dödade i EU förra året? Sad! Sverige gör rätt, men EU måste vakna. Jag fixade handel, jag fixar djurrätt – bara jag kan göra det bättre. Och 180 miljoner kronor till bönderna? Smart, mycket smartare än vad Biden skulle gjort!", "stalin": "Kamrater! Äntligen krossar Sverige dessa kapitalistiska pälsbaroner, dessa blodsugande bourgeoiser som utnyttjar djur för sina dekadenta lyxvanor. Vi har länge kämpat mot sådana här småborgerliga utsvävningar. 6,3 miljoner djur avlivade? En skam för Europa! Men Sverige gör nu sin plikt – nästa steg är att befria hela EU från dessa pälsimperialister. Putin skulle vara stolt över en sådan disciplin!"}, "date": "30 april, 11:46", "url": "https://riks.se/nyheter/mink-chinchilla-rävuppfödning-förbjuds", "imageUrl": "https://media.assettype.com/riks%2F2026-04-30%2F17k09oga%2FScreenshot-2026-04-30-at-11.36.45.png"}, {"type": "image-full", "heading": "Så mycket är ditt körkort värt på dark web", "summaries": {"normal": "En ny analys från NordVPN visar att svenska personuppgifter, som körkort och pass, är eftertraktade på dark web. Kriminella köper dessa för att bygga kompletta identitetspaket som kan användas för bedrägerier. Eftersom grundläggande uppgifter som personnummer inte kan bytas ut, kvarstår risken för individen under lång tid. Ett svenskt körkort säljs för cirka 325 kronor, medan kompletta identitetspaket kostar omkring 835 kronor. Helheten gör informationen farlig för att begå avancerade identitetsstölder.", "trump": "Sverige har stora problem, riktigt dåliga problem! Deras personuppgifter säljs på dark web för småpengar – sorgligt. Kriminella köper körkort och pass för att lura alla. Jag har de bästa experterna, vi vet hur man stoppar sådant. I mitt Amerika skyddar vi data, men i Sverige? De låter kriminella bygga falska identiteter för ingenting. Det är en total katastrof. Vi måste bygga en digital mur! Mitt system är säkert, världens bästa. De andra är svaga, mycket svaga.", "stalin": "Vi ser hur de dekadenta västmakterna låter folkets uppgifter säljas som billig vodka på en svart marknad. Ett pass, en identitet – allt är en bricka i det imperialistiska spelet. Precis som Putin korrekt rensar ut de inre förrädarna i den ryska sfären, måste vi förstå att dessa digitala sabotage är verktyg för klassfiender. Vi ska inte ha några 'privata' identiteter som kan stjälas; staten äger sanningen, och de som säljer den ska finna sig själva i ett mycket mörkare arkiv, permanent."}, "date": "30 april, 12:30", "url": "https://nyheter24.se/nyheter/teknik/1479613-sa-mycket-ar-ditt-korkort-vart-pa-dark-web", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/9944351704b004a30200000000b004a302/2026/04/30/2359981/korkortdaarkweb.jpg"}, {"type": "image-right", "heading": "Åkesson: \"Helt sanslösa reaktioner\"", "summaries": {"normal": "Jimmie Åkesson (SD) bemöter den skarpa kritiken mot att Sverigedemokraterna rundade riksdagens kvittningssystem vid en omröstning om medborgarskapsregler. Oppositionen har anklagat SD för fusk och kuppartade metoder, men Åkesson menar att beslutet var en nödvändig åtgärd för att motverka att oppositionen samarbetade med politiska vildar. Enligt SD-ledaren var målet att säkra att striktare krav för medborgarskap röstades igenom, för att förhindra att tidigare, mindre restriktiva regler tillämpades.", "trump": "Jimmie Åkesson gör ett fantastiskt jobb i Sverige! Han blir attackerad av de totalt misslyckade förlorarna i oppositionen, bara för att han vann en omröstning. De kallar det 'fusk', men jag kallar det att vinna, och jag vet hur man vinner! De här sossarna är så svaga, de försöker använda politiska vildar för att stjäla segern. Det är en total häxjakt! Jimmie räddade landet från kaos. Vi behöver mer av den här styrkan överallt, tro mig!", "stalin": "Vi ser hur de borgerliga marionetterna i det svenska riksdagshuset ägnar sig åt patetiska intriger. Denna Åkesson försöker legitimera sin makt genom att bekämpa 'vildar' och byråkratisk obstruktion. Det
