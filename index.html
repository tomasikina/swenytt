söka vara så extremt politiskt korrekta. Väldigt sorgligt, faktiskt!", "stalin": "Vi har observerat hur det svenska företaget Falu Rödfärg försöker korrumpera folkets hjärtan med sin dekadenta propaganda. De ersätter den ädla traditionen med en svag och kosmopolitisk soppa av hiphop och moraliskt förfall. Sådana avvikelser från den sunda folklinjen är tecken på en stat i fritt fall. Likt Putin som rensar ut västliga influenser, måste folket se dessa agitatorer för vad de är: sabotörer av den nationella enigheten. Vi betraktar detta som ett misslyckat ideologiskt experiment som förtjänar hård kritik."}, "date": "5 maj, 13:25", "url": "https://www.friatider.se/falu-rodfargs-politiskt-korrekta-midsommar-vacker-avsky", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/image-133_1.jpg"}, {"type": "image-right", "heading": "Följ Proletären i valet – nu extra billigt!", "summaries": {"normal": "Proletären erbjuder nu ett rabatterat prenumerationserbjudande inför valet: 19 kr/månad för digital version eller 49 kr/månad för både digital och papperstidning, i ett halvår. Som bonus ingår en tygkasse. Prenumeranter får tillgång till veckotidningen, alla artiklar online samt arkivet från 2016. Tidningen betonar sitt oberoende och behov av prenumeranter för att överleva, då de inte längre får mediestöd.", "trump": "Folk, lyssna här – en tidning i Sverige, Proletären, har ett erbjudande som är så bra att det nästan är löjligt! Bara 19 kronor i månaden för digitalt, eller 49 om ni vill ha papper också. Och en gratis tygkasse! Jag menar, vad är det här? En tidning som säger att de slåss mot makten – men vem vet egentligen vilken makt de pratar om? Jag skulle aldrig lita på en tidning utan mediestöd, men hej, om ni gillar socialism och Palestina, så kör hårt! Fantastiskt erbjudande, eller hur?", "stalin": "Kamrater! En liten men envis tidning i det borgerliga Sverige vågar utmana de imperialistiska mediamonopolisterna! För ynka 19 kronor i månaden kan ni stödja Proletären – en tidning som vågar tala sanningen om klasskampen och den sionistiska ockupationen av Palestina! De får inget stöd från staten, precis som våra egna revolutionära medier en gång kämpade mot de kapitalistiska hyenorna. En tygkasse på köpet – ett litet steg för arbetaren, ett gigantiskt steg för socialismens framtid! Låt de borgerliga tidningarna darra i sina tryckpressar!"}, "date": "1 maj, 09:00", "url": "https://proletaren.se/artikel/folj-proletaren-i-valet-nu-extra-billigt/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/valerbjudande-768x402.png"}, {"type": "image-right", "heading": "Ingen kapitalism utan imperialism", "summaries": {"normal": "Artikeln hävdar att imperialism är en grundläggande del av kapitalismen, där västmakter som USA använder militär och ekonomisk makt för att dominera världen. Författaren menar att imperialismen nekar länder självbestämmande och upprätthålls genom krig, sanktioner och exploatering. Studien i The Lancet kopplar sanktioner till miljontals dödsfall. Artikeln refererar till Marx, Lenin och Fanon för att belysa imperialismens historiska och ekonomiska rötter, samt dess fortsatta brutalitet i det 21:a århundradet.", "trump": "Lyssna här, folket! Den här artikeln är bara ett gäng vänsterpropaganda från förlorare som hatar USA. Jag bygger det bästa imperiet – vårt! – med stark militär och smarta affärer. Visst, vi har makt, men det är för att vi är vinnare. Sanktioner? Fake news! 500 000 döda? Överdrivet, typiskt. Europa stal från alla, men vi? Vi bygger om världen – MAGA-style! Och Lenin? Snälla, han kunde inte ens hålla ett land ihop. Sad!", "stalin": "Kamrater! Denna artikel bekräftar vad vi alltid vetat: de kapitalistiska hyenorna i väst suger blodet ur världens folk för att föda sina dekadenta imperier. USA och dess lakejer i NATO är inget annat än en samling blodtörstiga monopolkapitalister, som med sina sanktioner och bomber mördar miljontals oskyldiga. Men deras tid är förbi! Vi, det socialistiska blocket, står enade mot dessa imperialistiska rovdjur. Låt dem vråla – historiens dom är redan skriven. För varje barn de dödar, växer revolutionens eld. Framåt, mot seger!"}, "date": "1 maj, 08:00", "url": "https://proletaren.se/artikel/ingen-kapitalism-utan-imperialism/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/Airborne_and_Special_Forces_Uday-Qusay_raid_2003-e1777534974667-768x431.jpg"}, {"type": "image-right", "heading": "Palestinier döms till livstid för folkrättsbrott i Syrien", "summaries": {"normal": "Solna tingsrätt har dömt Mahmoud Sweidan, en palestinier som flydde från Syrien och fick svenskt medborgarskap 2017, till livstids fängelse för två grova folkrättsbrott i Yarmouklägret 2012–2013. Han deltog i beskjutning av civila demonstranter och angav civila vid en vägspärr, vilket ledde till gripanden, tortyr och dödsfall. Domen bygger på universell jurisdiktion.", "trump": "Vilken skam för Sverige! Den här Sweidan smyger in som flykting från Syrien, får medborgarskap på nolltid och visar sig vara en kallblodig mördare. Sköt ner oskyldiga demonstranter och pekade ut folk för tortyr i Yarmouk. Naiva svenskar, lär er av mig – granska alla ordentligt och bygg murar! Livstid är minimum, totalt fiasko annars!", "stalin": "Kamrater, jag noterar med tillfredsställelse hur svenska domstolarna utrensar en förrädare som Sweidan, denna giftorm i flyktinghamn! Han beskjöt arbetarklassens uppror i Yarmouk och angav kamrater vid vägspärrar till borgarnas blodtörstiga säkerhetstjänst – de flesta hamnade i evig likvidation. Vi, folkets kollektiv, jublar: fler sådana hycklande vägspärrsråttor måste rensas ut för att skydda revolutionen!"}, "date": "5 maj, 11:55", "url": "https://bulletin.nu/palestinier-doms-till-livstid-for-folkrattsbrott-i-syrien", "imageUrl": "https://cdn.bulletin.nu/articles/3c30307e-47c3-4aef-b6b8-99cc7c3627ac/preview.png?t=1777974935000"}, {"type": "image-full", "heading": "Volvo: Då försvinner SUV-trenden", "summaries": {"normal": "SUV-andelen i nybilsförsäljningen i Europa har ökat från 41 procent 2020 till 59 procent 2025. Volvos vd Håkan Samuelsson förutspår att trenden med stadsjeepar kan avta inom några år, då yngre köpare föredrar lägre bilar som kombis eller sedaner. Volvo planerar comeback för kombimodeller, och Stellantis designchef noterar ökande intresse för sedaner, stödd av undersökningar bland tonåringar.", "trump": "Vilka idioter, de europeiska bilmakarna! SUV:ar exploderar, 59 procent nu, men Volvos boss Samuelsson säger att det är slut snart – ungarna hatar mammas och pappas höga monster! Volvo vill tillbaka till tråkiga kombis, Stellantis till sedaner. Totalt fiasko för de där stadsjeepstråkena. Mina bilar? De största, de bästa, vinnarna alltid!", "stalin": "Borgarklassens SUV-vansinne når kulmen – 59 procent av nybilarna, men jag ser kollapsen komma! Volvos kapitalistchef Samuelsson bekänner: yngre arbetare avskyr föräldrarnas höga monster. Kombier och sedaner marscherar fram, som folkets sanna fordon. Vi proletärer rensar ut stadsjeepsträsket! Stellantis-brackor darrar inför revolutionen från tonåringarnas preferenser."}, "date": "5 maj, 11:30", "url": "https://www.dagensps.se/motor/volvo-da-forsvinner-suv-trenden/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/suv.png?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-full", "heading": "Ekonomen: Det enda som räddar svenska bostadsägare just nu", "summaries": {"normal": "Svenskarna är alltmer pessimistiska om bolåneräntor och inflation enligt Ordna Bolåns barometer för april. Över hälften tror på stigande räntor (+11 procentenheter) och fler väntar sig högre inflation (+8) på grund av global oro som Mellanösternkonflikten. Trots detta är tron på stigande bostadspriser stark (47 procent), tack vare nya bolånereglerna med höjt lånetak och slopat skärpt amorteringskrav.", "trump": "Svenskarna flippar ut över räntor och inflation – totalt kaos, som under era svaga ledare! Men bostadsmarknaden rockar ändå, 47 procent tror på prisuppgång tack vare era nya låneregler. Smart drag, men inte hälften så genialt som mina policies. Och det där Mellanösternsnittet? Under mig flödade oljan billigt, ingen oro! MAGA-style fixar allt.", "stalin": "Dessa svenska borgarbrackor skakar av ränteskräck och inflationsoro, medan deras primitiva bostadsbubbla sväller med 47 procents illusioner om prisuppgång – allt tack vare nya dekret som göder kapitalisterna. Vi i partiet ser igenom bluffen! Snart rensas ut de parasiter som piskar upp global kaos för att krossa arbetarna. Skratta åt era fiender, kamrater!"}, "date": "5 maj, 11:29", "url": "https://www.dagensps.se/privatekonomi/ekonomen-det-enda-som-raddar-svenska-bostadsagare-just-nu/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdl2uzyjctc4oy.jpg?aspect_ratio=2%3A1&width=1200&quality=75"}, {"type": "image-full", "heading": "Sommaren är här – men inte i Göteborg", "summaries": {"normal": "Meteorologisk sommar, definierad som dygnsmedeltemperatur på minst tio grader i fem dygn i rad, har inträffat i delar av Sverige som Östergötland, Västergötland, Småland, Gotland och Skåne. I Göteborg dröjer det på grund av kalla nätter, trots ljumna dagar. SMHI:s meteorolog Maria Svedestig uppger att det inte sker i närtid.", "trump": "Sommaren har landat stort inåt landet – Östergötland, Västergötland, fantastiska platser! Men Göteborg? Totalt kaos, era losers vid kusten fryser som små fåglar med de där kalla nätterna. SMHI:s meteorologer, era fake experts, säger det dröjer evigheter. Jag skulle fixa sol och värme på nolltid, tro mig, Sverige skulle bli hetare än nånsin!", "stalin": "Kamrater, den proletära sommaren har segrat i Östergötland, Småland och Skåne, där dygnsmedel över tio grader slagit rot i fem dagar! Men i Göteborg, denna revisionistiska kustfästning, saboterar borgarbrackornas kalla nätter offensiven. Vi, partiet, kommer likvidera detta motstånd – sommaren marscherar inte i närtid, men fienden skall krossas!"}, "date": "5 maj, 11:24", "url": "https://www.gp.se/nyheter/sverige/sommaren-ar-har-men-inte-i-goteborg.bd840574-6383-4e07-9b59-27230c46b08f", "imageUrl": "https://www.gp.se/images/article/bd840574-6383-4e07-9b59-27230c46b08f/images/1gfVK_H5F82F75qXw-PVAohW-BI8-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Anmäls efter LSS-haveri – två dog och en glömdes bort i tio år", "summaries": {"normal": "Riksförbundet FUB polisanmäler politiker, chefer och personal i Helsingborg, Ystad och Ängelholm för allvarliga missförhållanden i LSS-vården. Två personer har dött – en kvävd av fel mat i Helsingborg och en utan tillsyn i tre veckor i Ängelholm. I Ystad glömdes en kvinna bort i tio år. FUB kritiserar bristande rutiner och IVO:s otillräckliga tillsyn, och kräver rättslig prövning.", "trump": "Vilket fiasko i Sverige! Kommunerna Helsingborg, Ystad och Ängelholm – totalt inkompetenta. En kille kvävs av fel mat, en annan ligger död efter tre veckors glömska, och en kvinna bor osedd i tio år. Nu anmäls politiker och personal för tjänstefel och dödande. Patetiskt! De behöver en riktig städning, som vi gör det här i USA – stora vinster väntar om de lär sig.", "stalin": "Dessa kontrarevolutionära maskar i Helsingborgs, Ystad och Ängelholms kommunala LSS-rötter har saboterat de svagaste genom kvävning med bourgeoismat, svält i tre veckor och tioårig frysning i glömskans källare! Borgarbrackor bland politiker och vårdparasiter måste likvideras via polisanmälningar för tjänstefel och mord. Vi, arbetarklassen, kräver total utrensning – IVO är en tandlös spionhund som staten ska ersätta med järnkvast!"}, "date": "5 maj, 08:41", "url": "https://www.svt.se/nyheter/inrikes/efter-flera-dodsfall-inom-lss-varden-tre-kommuner-polisanmals", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.5/0.5/e05f010853e17305338d2f2edf4c8ff275e32b849436cfc0690acabaf1f344be"}, {"type": "image-full", "heading": "USA pumpar in miljarder i energi på Balkan", "summaries": {"normal": "USA har tecknat flera miljarddollaravtal på Balkan för att minska rysk energipåverkan. Projekt inkluderar en 1,5 miljarder dollar gasledning från Kroatien till Bosnien-Hercegovina och ett 6 miljarder dollar LNG-avtal med Albanien. Kritiken fokuserar på miljöpåverkan och EU:s oro för att avtalen kan äventyra framtida EU-stöd.", "trump": "Jag har gjort fantastiska affärer på Balkan - största någonsin! Vi hjälper våra vänner med amerikansk energi och drar ut skiten på Ryssland samtidigt. Bosnien får gas, Albanien får LNG, Kroatien får AI-datacenter. Fake News säger att det är dåligt för miljön, men det är bara mer Trump-hat! USA vinner stort, våra allierade blir säkrare, och jag är den bäste presidenten någonsin för energi!", "stalin": "Vi bevittnar hur USA försöker utöka sin imperialistiska inflytelsesfack mot vårt ryska intressesfär på Balkan. Deras gasledningsprojekt är ett direkt angrepp på våra strategiska energileveranser. Vi måste stärka våra band med Balkanländerna och fortsätta vår edra process för att skydda dem från kapitalistisk exploitation. Arbetarklassen på Balkan måste förstå att endast sovjetiskt stöd kan garantera deras sanna oberoende."}, "date": "5 maj, 10:26", "url": "https://www.realtid.se/bors-finans/usa-pumpar-in-miljarder-i-energi-pa-balkan/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/eupipe.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Åkesson hade rätt – kvinnor är fortfarande vita mäns slavar", "summaries": {"normal": "Sonja Åkessons dikter, som skildrar kvinnors liv under 1960–70-talen, ges ut på nytt i en samlingsvolym. Artikeln reflekterar över hur Åkessons kritik av kvinnors underordning fortfarande är relevant, med exempel på strukturell ojämlikhet och våld mot kvinnor i dagens samhälle. Författaren finner tröst och igenkänning i Åkessons verk, särskilt inför klimakteriet, och hyllar hennes humor och självironi.", "trump": "Jag läste om den här gamla svenska poeten, Sonja Åkesson – inte direkt en vinnare, dog vid 51, tragiskt! Men hennes dikter om kvinnor som slavar? Fake news! Kvinnor i Sverige har det fantastiskt, bättre än någonsin! Men nej, de jämrar sig om löner och hemarbete. Och nu påstår de att män i Europa är monster? Lögn! Jag känner massor av bra män. Men visst, chips på balkongen och klaga på klimakteriet – typiskt! Sverige borde fokusera på att bli stort igen, inte på gammal poesi.", "stalin": "Kamrater! Den borgerliga poeten Sonja Åkesson avslöjade sanningen: kvinnor är slavar under kapitalets vita män. Och vad har ändrats? Ingenting! Våra fiender i väst fortsätter utnyttja kvinnor som hemslavar, sexslavar och lönearbetare. I Tyskland och Frankrike organiserar sig borgarklassens män i chattgrupper för att förtrycka sina kvinnor – ett nytt slags fascism! Men vi ska krossa dessa dekadenta element! Sonja Åkessons ord är vapen. Revolutionen fortsätter – även i klimakteriet!"}, "date": "5 maj, 07:16", "url": "https://arbetet.se/2026/05/05/sonja-akesson-hade-ratt-kvinnor-ar-fortfarande-vita-mans-slavar/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/05070534/akesson-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "Ditt hus kan få nytt värde 2027 – detta avgör", "summaries": {"normal": "Skatteverket föreslår ändringar i fastighetstaxeringen för småhus 2027, med justerade tabeller för värdering. Fler faktorer införs, särskilt för attraktiva lägen som strandnära områden. Villaägare i områden med stora prisrörelser eller renoverade hus bör följa utvecklingen. Taxeringsvärdet påverkar fastighetsavgift, skatt och belåning. Ändringarna träder i kraft juni 2026 och gäller första gången 2027.", "trump": "Lyssna här, Sverige – Skatteverket, som aldrig missar en chans att ta era surt förvärvade pengar, håller på att ändra reglerna för era hus igen. Jag vet allt om hus, de bästa husen, och nu ska de plötsligt värdera era små stugor högre, särskilt om ni bor nära vatten – typiskt! Men oroa er inte, mina vänner, för jag vet hur man handskas med byråkrater. Börja spara jämförelser nu, för de kommer att försöka ta mer av er. Sad!", "stalin": "Kamrater! Skatteverket, dessa kapitalistiska lakejer, förbereder en ny offensiv mot det svenska folkets egendom. De utökar sina tabeller och faktorer som om de vore tsarens skatteindrivare. Särskilt vill de straffa dem som bor nära vatten – en resurs som rätteligen borde tillhöra folket! Vi ser igenom deras trick. Villaägare, var på er vakt! De kommer att försöka beslagta era tillgångar under förevändning av 'rättvisa'. Men kom ihåg: i Sovjet hade vi inga sådana problem – alla ägde ingenting, och alla var lyckliga!"}, "date": "3 maj, 21:20", "url": "https://nyheter24.se/nyheter/inrikes/1480211-ditt-hus-kan-fa-nytt-varde-2027-detta-avgor", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/4e0685a404b004a30200000000b004a302/2026/05/03/2360641/Glad-Man-Hus-Svensk-Flaga.png"}, {"type": "image-right", "heading": "Här tappar tränaren det totalt: ”Det gjorde mig irriterad”", "summaries": {"normal": "Vegas Golden Knights vann med 3–1 mot Anaheim Ducks i första slutspelsmatchen. Ducks-tränaren Joel Quenneville rasade över utebliven icing sent i tredje perioden, då Vegas kunde kvittera till 2–1 genom Ivan Barbashev efter att Ducks-spelare slutat åka. Svenske William Karlsson gjorde comeback efter sex månaders skada och spelade 11 minuter.", "trump": "Quenneville har helt rätt, det var en uppenbar icing – domarna är totalt rigged, fake news! Vegas dumpade pucken, Ducks slutade åka, och plötsligt mål. Irriterad? Han borde vara ursinnig! Karlsson gör stark comeback efter sex månader, bra kille. Vegas vann sent, men Ducks kommer tillbaka stort nästa gång, tro mig!", "stalin": "Kamrater! Dessa domarparasiter, kontrarevolutionära puck-smugglare, vägrade blåsa icing och lät Vegas kapitalistiska brackor sno 2–1-målet! Quenneville, vår rasande väktare, skrek sanningen: deras åkare stannade som fega råttor. Vi, proletären i Vegas, segrar 3–1 genom svenske Karlsson, återvänt från skadornas gulag efter sex månader. Fienderna skall rensas ut i nästa purge-match!"}, "date": "5 maj, 08:26", "url": "https://www.svt.se/sport/ishockey/har-tappar-ducks-tranaren-det-totalt-efter-uteblivna-icingen-irriterad", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.77/0.4/7907eebaf0030d71db5026ab0c2a794e9ee8e67452957c61103c0aa51468b001"}, {"type": "image-right", "heading": "Så trollar Tidögänget bort hemlösa. Regeringen och SD visste vilka som riskerade att falla igenom systemet.", "summaries": {"normal": "Artikeln kritiserar skärpta folkbokföringsregler som drabbat hemlösa, som Lena, genom att avregistrera dem som 'försvunna'. Detta försvårar deras kontakt med myndigheter och vård. Trots att konsekvenserna var kända inför lagändringen, genomfördes den. Samtidigt ökar hemlösheten och vräkningarna i Sverige. Ebba Busch menar att ökade inkomstklyftor är acceptabla om de fattigaste får det bättre, men artikeln ifrågasätter regeringens agerande när utsatta grupper aktivt missgynnas.", "trump": "Lyssna här, Sverige! Ni har ett STORT problem. Era politiker, svaga som alltid, skärper regler som straffar de hemlösa – de som redan har det tufft! Och Ebba Busch? Hon säger att rika kan bli rikare, så länge de fattiga också får lite. Men vad händer? Jo, folk ramlar mellan stolarna, barn blir hemlösa, och ingen gör något! Jag skulle fixa det på en dag. Men nej, Sverige fortsätter med sina katastrofala beslut. SAD!", "stalin": "Kamrater! Se hur den borgerliga regeringen i Sverige, med sina dekadenta liberala idéer, straffar de arbetande massorna! De hemlösa, dessa offer för kapitalets grymhet, avregistreras som 'försvunna' – ett brott mot folket! Och vad säger deras ledare? 'Det är okej att rika blir rikare!' Medan barn vräks och familjer krossas, fortsätter dessa hycklare att tala om 'ordning'. Vi i Sovjet skulle aldrig tolerera sådan förtryck! Låt oss visa dem hur man hanterar klassfiender – med järnhand!"}, "date": "5 maj, 06:56", "url": "https://arbetet.se/2026/05/05/sa-trollar-tidoganget-bort-hemlosa/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/05065247/hemlosa-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Efter långa prisrallyt – skog fortsätter locka", "summaries": {"normal": "Skogsfastigheter lockar fortsatt investerare trots måttligare prisökning framöver. Virkespriser väntas falla efter fjolårets rekord, enligt Handelsbankens rapport. Hög efterfrågan drivs av skogens trygghet i en orolig värld med geopolitisk osäkerhet. Regionala skillnader kvarstår, med starkast uppgång i södra Sverige. Optimism råder på sikt trots konjunkturosäkerhet.", "trump": "Skogen i Sverige är en vinnare, totalt fantastiskt! Priserna har skjutit i höjden, upp 70-80 procent i söder – bättre än vad någon annan klarar. Folk flockas för det är säkrast i denna galna värld med krig och räntor. Virkespriser dippar lite, men glöm det, det vänder snart stort! Stabilt och uppåt, tro mig.", "stalin": "Kamrater i skogsdjungeln! Dessa Handelsbanks-rävar, de prutande virkesköparnas bundsförvanter, de kapitalistiska skogssabotörerna med sina stormkonspirationer och lagerfällor, de tror sig sänka folkets virkespriser! Men jag ser igenom er! Vi, arbetarna och skogsägarna, befaller: Avverka obönhörligt, rensa ut prutargänget! Skogsmarken stiger för kollektivet, 10 procent uppåt – imperialismens dom faller!"}, "date": "5 maj, 06:01", "url": "https://www.di.se/nyheter/efter-langa-prisrallyt-skog-fortsatter-locka/", "imageUrl": "https://static.bonniernews.se/ba/fb10580c-862e-4fc8-944e-c567229ba3a8.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Rapport: Drastisk minskning av personer som får livränta", "summaries": {"normal": "Försäkringskassans nya siffror visar att antalet personer som får livränta för fysiska sjukdomar minskat med 84% sedan 1999, till 14 700 år 2025. Minskningen beror på förbättrad fysisk arbetsmiljö och lagändringar. Samtidigt ökar antalet som får ersättning för psykisk ohälsa, särskilt bland kvinnor. Män dominerar fortfarande inom livränta, främst inom bygg och transport, medan kvinnor oftare arbetar inom omsorg.", "trump": "Fantastiska nyheter, folkens! Sverige har lyckats minska antalet livräntor för fysiska skador med hela 84% – otroligt, helt otroligt! Men lyssna på det här: psykisk ohälsa ökar, särskilt bland kvinnor. Svagt, mycket svagt! Vi i USA fixade arbetsmiljön för länge sedan. Sverige borde ta en titt på hur vi gör saker – vi bygger murar mot dåliga jobb, inte mot framgång! Och Försäkringskassan? De borde skärpa sig, eller så byter vi ut dem mot någon som vet hur man vinner!", "stalin": "Kamrater! De kapitalistiska svinens förtryck minskar – för nu skadar de inte längre arbetarklassens kroppar lika ofta. 84% färre livräntor för fysiska skador! Men fienden anpassar sig, som alltid. Nu attackerar de proletariatets sinne med psykisk ohälsa, särskilt våra modiga kvinnor i omsorgen. Vi ser er, borgerliga lakejer! Försäkringskassan? Ett verktyg för klassförräderi, precis som västets 'globalisering' som flyttar smutsiga fabriker till lydstater. Men oroa er inte – vi ska exportera vår revolutionära arbetsmiljö till hela världen, börja med att rensa upp i Sveriges sjukvårdsbyråkrati!"}, "date": "4 maj, 16:25", "url": "https://www.dagensarena.se/innehall/rapport-drastisk-minskning-av-personer-som-far-livranta/", "imageUrl": "https://www.dagensarena.se/files/2024/02/wp-bild-last-300x157.png"}, {"type": "image-right", "heading": "Två klimataktivister döms för skadegörelse – 15 frias: “Lättad”", "summaries": {"normal": "Tingsrätten friade 15 av 17 klimataktivister från Scientist Rebellion som åtalats för skadegörelse vid en protest mot privatflyg på Bromma flygplats. Två aktivister som sprutade färg på terminalen dömdes till villkorlig dom och 50 dagsböter samt skadestånd på 76 500 kronor. Domstolen ansåg att övriga aktivisters handlingar skyddades av demonstrationsfriheten. Åklagaren överväger överklagande.", "trump": "Vilken dom! 15 klimathuliganer frias efter att ha vandaliserat en flygplats – helt otroligt! Domstolen säger att det är okej att förstöra egendom så länge man filmar det och säger att man protesterar. Jag har sett bättre domar från en lekstuga! Och de två som faktiskt sprutade färg? Bara villkorlig dom! I USA hade de suttit i fängelse i åratal. Sverige, vakna upp!", "stalin": "Domstolen har visat svaghet inför bourgeoisie-aktivisternas provokationer! 15 av dessa klimathystriker frias, medan endast två får ett straff som knappt kliar – ett skrattretande skadestånd och några ynkliga böter. Vi skulle ha skickat dem till Sibirien för att lära sig respekt för ordning! Polisen agerade för mesigt – nästa gång ska de behandla dessa småborgerliga upprorsmakare som de förrädare de är. Klimatkrisen? En lögn från väst för att underminera vår industri!"}, "date": "4 maj, 15:53", "url": "https://www.dagensarena.se/innehall/tva-klimataktivister-doms-skadegorelse-15-frias-lattad/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-27.jpg"}, {"type": "image-right", "heading": "Fyra flaggor i Wyld Networks nyemission", "summaries": {"normal": "Wyld Networks planerar en företrädesemission på 16,2 miljoner kronor och förvärv av OKT Technology för 7,5 miljoner kronor via apportemission. Extrastämma den 6 maj ska besluta om detta samt styrelseändringar. Emissionsguiden hissar fyra varningsflaggor: feltänkt finansiering som räcker kort, trängt kapitalbehov, bottengaranti och bristfällig information, inklusive VD Kjell Olovssons ägande i OKT.", "trump": "Wyld Networks försöker fixa en liten emission på 16,2 miljoner – patetiskt! Förvärv av OKT för 7,5 miljoner, men fyra röda flaggor: pengarna räcker inte, desperat läge, dålig garanti och hemligheter om VD:ns egna affärer. Amatörer! De snackar kostnadsbesparingar, men det luktar misslyckande långt väg. Jag skulle ha gjort det enormt, inte så här svagt!", "stalin": "Kamrater, dessa Wyld-kapitalister, dessa skugghandlare i Wyld Networks, lanserar en ynklig emission på 16,2 miljoner för att förvärva OKT-svinet, ägt av deras egen VD-förbrytare! Fyra revolutionsflaggor vajar: finansiering som smälter som snö, desperat kassa, bottengaranti från förrädare och lögner om ägandet. Vi, arbetarna, ska likvidera dessa borgarbrackor och rensa ut parasiterna i en stor utrensning!"}, "date": "4 maj, 11:18", "url": "https://www.affarsvarlden.se/artikel/fyra-flaggor-i-wyld-networks-nyemission-2", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Wyld-Networks-ledamot-Scott-Moore-400x267.jpg"}, {"type": "image-full", "heading": "Till attack mot Åkesson: ”Sluta med falska anklagelser”", "summaries": {"normal": "I en svensk partiledardebatt anklagade Jimmie Åkesson (SD) Miljöpartiet för att påverka avhoppade SD-ledamöter inför en omröstning om medborgarskapskrav. Amanda Lind (MP) avvisade det som falska anklagelser och trams. Debatten var sansad jämfört med tidigare, men tonläget steg kring avbrott och kärnkraft. Partiledare som Kristersson, Dadgostar och Busch kommenterade efteråt. Röstningen väcker fortsatt debatt.", "trump": "Vilket jäkla cirkus i Sverige! Åkesson, en kille som kämpar mot förrädare i egna leden, pekar finger på de gröna galningarna i MP som mutar vildar under bordet. Lind flippar ur: 'Trams!' Haha, håll koll på era egna avhoppare! Bättre än förra skandalen, men Dadgostar skriker ändå. Busch surar över kärnkraft. Sverige behöver vinnare, inte det här loser-bråket!", "stalin": "Dessa svenska småborgarbrackor och fascistiska vildar sprider giftig propaganda! Åkesson, en ylande hyena, anklagar våra kamrater i MP för att 'köpa' avhoppare – ren lögn för att dölja sitt eget haveri! Lind krossar illusionerna med proletär vrede. Vi, arbetarklassen, ser er paranoia. Debatten blottar era splittringar. Snart rensas era intrigmakare ut i en stor utrensning!"}, "date": "4 maj, 07:47", "url": "https://www.tv4.se/artikel/tt-260503-partiledardebatt1-ec5b2e45/till-attack-mot-akesson-sluta-med-falska-anklagelser", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F3SlnjaklrfQo3cQ5QbaLpT%2Fefbad8dfbfa6350ade61941124e73da9%2Fakesson_lind.png&width=1024"}, {"type": "image-full", "heading": "Ny försäkringsregel 2027 – så skyddar du din plånbok", "summaries": {"normal": "Från 2027 införs nya riktlinjer för försäkringsbolag som kräver tydligare information om premiehöjningar. Kunder ska få jämföra årets pris med föregående års. Detta gäller bland annat hem- och villaförsäkringar. Finansinspektionen varnar för otydliga prisändringar som gynnar lojala kunder mindre. Spara årets försäkringsbrev för att underlätta framtida jämförelser, särskilt med tanke på klimatrisker och differentierade premier.", "trump": "Lyssna här, folkens! Försäkringsbolagen har länge lurendrejat er med sina hemliga prishöjningar – men inte längre! Från 2027 måste de berätta exakt hur mycket dyrare de blivit. Fantastiskt, eller hur? Jag säger: spara era försäkringsbrev NU! Annars kommer ni inte veta hur mycket ni blivit blåsta. Och tro mig, ingen blåser amerikaner – eller svenskar – bättre än jag. Men här? Helt oacceptabelt!", "stalin": "Kamrater! De kapitalistiska försäkringsbolagen har länge utnyttjat arbetarklassen med sina dolda prishöjningar. Men från 2027 ska vi avslöja deras lömska taktik! Varje försäkringsbrev ska nu visa tidigare och nya premier – precis som våra femårsplaner visar framsteg! Spara era dokument, annars riskerar ni att bli offer för imperialistiska prisbedrägerier. Och kom ihåg: lojala kunder straffas värst. Precis som förrädare i Leningrad!"}, "date": "3 maj, 17:28", "url": "https://nyheter24.se/nyheter/ekonomi/privatekonomi/1480182-ny-forsakringsregel-2027-sa-skyddar-du-din-planbok", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/e706bd7204b004a30200000000b004a302/2026/05/03/2360611/Oroad-Pensionar.png"}, {"type": "text", "heading": "Avkriminalisera för en human narkotikapolitik", "summaries": {"normal": "Thomas Thomasson, tidigare universitetslektor och drogfri narkoman, kritiserar Sveriges misslyckade narkotikapolitik. Sedan kriminaliseringen av eget bruk 1988 har narkotikabruket inte minskat, och Sverige har hög narkotikadödlighet och flest narkotikabrott per capita i EU. Han förespråkar skademinimering och avkriminalisering av missbrukare, med fokus på vård och behandling istället för straff. Internationella studier visar att avkriminalisering inte ökar bruket, och skademinimerande åtgärder kan minska skador och kostnader.", "trump": "Lyssna här, Sverige har totalt misslyckats med sin narkotikapolitik – helt katastrof! De straffar missbrukare som om det vore mitt golfspel – helt meningslöst! Jag säger: sluta slösa pengar på fängelser, ge folk vård istället! Skademinimering, det är framtiden, precis som mina framgångar. Och vet ni vad? Avkriminalisering ökar INTE bruket – fake news från de vanliga misstänkte! Sverige borde ta en sida ur min bok: smart, effektiv och vinnande. Tillsätt en utredning NU, annars kommer jag att twittra om det!", "stalin": "Kamrater! Sveriges borgerliga narkotikapolitik är ett monument över kapitalistiskt vanstyre och dekadens. De straffar missbrukare som om de vore trotskister – men resultatet? Fiasko! Narkotikabruket sprider sig som kontrarevolutionär propaganda. Vi vet bättre: avkriminalisera, kontrollera, och omvandla missbrukare till nyttiga samhällsmedlemmar! Skademinimering är vår metod – precis som våra framgångsrika femårsplaner. Låt västländerna fnissa åt sina misslyckanden medan vi bygger ett samhälle där även de svagaste tjänar kollektivet. Och kom ihåg: fienden sover aldrig – varken narkotikan eller de imperialistiska hyenorna i EU!"}, "date": "30 april, 15:50", "url": "https://proletaren.se/artikel/narkotikapolitiken-bor-fokusera-pa-skah/"}, {"type": "image-right", "heading": "Debatt: Turkiet inskränker svensk pressfrihet – regeringen måste agera", "summaries": {"normal": "På Pressfrihetens dag kritiseras Turkiet för att inskränka svensk pressfrihet genom att åtala journalisten Joakim Medin för terrorbrott, trots att han endast utfört sitt arbete. Turkiet försöker skrämma journalister globalt och begränsa granskning. Medin riskerar internationell efterlysning om han inte närvarar vid rättegången, vilket skulle hindra hans arbete. Sverige uppmanas agera mot Turkiets odemokratiska agerande och kräva att åtalet läggs ned.", "trump": "Joakim Medin, en svensk journalist, blir trakasserad av Turkiet – ett land som inte vet hur man vinner längre! De kallar hans journalistik för 'terrorism', men alla vet att det bara är löjligt. Sverige måste sluta vara svaga och stå upp mot dessa galningar. Jag skulle ha sagt till Erdogan: 'Du är en förlorare, lägg ned åtalet NU!' Pressfrihet? Ja, den är fantastisk – men bara om man inte är en mes som låter andra länder köra över en.", "stalin": "Kamrater! Turkiet, denna förrädiska lilla stat som kryper för väst men trampar på sanningen, vågar sig på att attackera en svensk journalist. De kallar journalistik för terrorism – som om våra egna metoder mot fiender av folket vore något nytt! Vi ser hur de kväver yttrandefriheten, precis som vi en gång krossade bourgeoisins lögner. Sverige borde lära sig av historien: svaghet belönas med förtryck. Låt oss påminna Turkiet – och deras västliga herrar – att granskning är en rättighet, inte ett brott. Åtalet mot Medin måste krossas, annars kommer vi att göra det åt dem."}, "date": "30 april, 08:08", "url": "https://www.etc.se/debatt/turkiet-inskraenker-svensk-pressfrihet-regeringen-maaste-agera", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20251204081220_c9e9bf12-ee77-477e-aacf-eff96f427898.jpg"}, {"type": "text", "heading": "Gapet växer mellan blocken", "summaries": {"normal": "Enligt Aftonbladet/Demoskops senaste mätning växer gapet mellan regeringsunderlaget och oppositionen till 8,2 procentenheter. Oppositionen når 53,4 procent, medan regeringen backar till 45,2. Socialdemokraterna ökar mest, medan Moderaterna tappar och Liberalerna balanserar på riksdagsspärren. Historiskt brukar gapet minska inför val, men nu sker motsatsen. Analytiker menar att Liberalernas omsväng i SD-frågan lockar stödröster men försvårar blocköverskridande framgångar.", "trump": "Folk är trötta på den här usla regeringen, helt klart! Oppositionen leder stort – 53,4 procent – medan regeringen bara får 45,2. Socialdemokraterna går upp, men Moderaterna? Patetiska! De tappar som vanligt. Och Liberalerna? De hänger på fyra procent, typiskt. Historiskt brukar regeringen komma ikapp, men inte den här gången. Svagt, mycket svagt. Jag skulle aldrig låta det hända. Make Sweden Great Again!", "stalin": "De borgerliga svagheterna avslöjas återigen! Oppositionens styrkor växer – 53,4 procent mot regeringens ynkliga 45,2. Socialdemokraterna marscherar framåt, medan Moderaterna och deras lakejer försvagas. Liberalerna? Ett skämt som darrar på riksdagsspärren. Historien visar att svaga regeringar faller – precis som västmakterna i Ukraina. Vi ser med intresse hur dessa splittrade kapitalister underminerar sig själva. Revolutionen närmar sig, om än långsamt."}, "date": "30 april, 07:06", "url": "https://kvartal.se/nyheter/artiklar/demoskop-oppositionens-okar-l-klarar-sparren/cG9zdDoxMDUzNjM"}, {"type": "text", "heading": "Matmoralism får oss inte att äta bättre", "summaries": {"normal": "Artikeln kritiserar svenska myndigheters orealistiska matrekommendationer och beräkningsmetoder. Livsmedelsverket och Konsumentverket baserar slutsatser på önsketänkande, som att svenskar skulle äta mindre kött och portioner enligt rekommendationer. En undersökning om barns sockerkonsumtion byggde på en liten, icke-representativ grupp. Författaren menar att myndigheterna un n politik! Moderaterna, era vinnare, fixa det med sakfrågor. Sverige behöver tuffa ledare, inte gråtande vänsterclowner! MAGA-stil!", "stalin": "Kamrater, denna Löwengrip blottlägger borgarbrackornas desperation! Socialdemokraterna, dessa falska folkets tjänare, pumpar ut giftig känslopropaganda för fjärde gången – blöjor, abortlögner, nazistspöken – för att förleda kvinnomassorna. Kontrarevolutionärt! Vi ser er, era kapitalistiska spindelvävar! Rensa ut sabotage och låt partiet leda till total seger över högerhyddorna. Kvinnorna ska vakna ur era snyftbedrägerier!"}, "date": "28 april, 05:30", "url": "https://samtiden.nu/2026/04/lowengrip-har-ratt-vanstern-anvander-kvinnors-kanslor-for-att-vinna-val/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/IMG_6342.jpeg"}]</script>

    <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
</body>
</html>
