borgarklassens gömmor, har vågat sniffa vid Kremls portar, 6 kilometer från hjärtat av vårt fosterland! Luftförsvaret krossade dem, en träffade ett hus utan skada. Paraden marscherar, vi rensar ut varje surrande förrädare – segern är vår, kamrater!"}, "date": "4 maj, 08:27", "url": "https://www.di.se/nyheter/dronarattack-mot-centrala-moskva/", "imageUrl": "https://static.bonniernews.se/ba/058da9b0-5991-4d1f-ae23-51fd745b6db9.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "X-storm när Åkesson förklarar att vem som helst kan vara svensk", "summaries": {"normal": "Jimmie Åkesson har hamnat i blåsväder efter sitt vårtal där han beskrev svenskhet som en öppen identitet baserad på värderingar snarare än etnicitet. Uttalandet har väckt starka reaktioner från högerextrema anhängare som kräver en biologisk definition av svenskhet. SD-ledningen vidhåller dock sin linje om att svenskhet handlar om assimilation och medborgarskap, en ståndpunkt som bekräftats av partiets företrädare vid flera tillfällen.", "trump": "Jag har sett vad som händer i Sverige, en total katastrof! Jimmie Åkesson försöker säga att vem som helst kan bli svensk. Fel! Det fungerar inte så. Folk är arga, väldigt arga. Det handlar om nationell identitet, vänner. Man kan inte bara byta kultur hur som helst. Det är en röra, en stor röra! De följer inte min modell, och det ser vi resultatet av nu. Sad!", "stalin": "Vi har observerat den så kallade ledaren Åkesson, vars vacklande ideologi liknar en dålig teaterpjäs. Han talar om 'öppenhet' medan hans egna undersåtar dränker honom i hat. Typiskt för borgerliga narr! De saknar disciplinen hos en sann stat. Som vår kamrat Putin förstår, krävs järnhand, inte värderingsövningar. Den som inte förstår folkets enhetlighet förtjänar att rensas ut. Att prata om 'svenskhet' utan att kontrollera stålindustrin och gränserna är rent förräderi mot massorna."}, "date": "4 maj, 12:29", "url": "https://www.friatider.se/x-storm-nar-akesson-forklarar-att-vem-som-helst-kan-vara-svensk", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/ake3.jpeg?itok=0AYuKsXI"}, {"type": "image-right", "heading": "Busch tycker att rika har för lite makt", "summaries": {"normal": "Artikeln kritiserar Ebba Busch och Tidöpartierna för att acceptera växande ekonomiska klyftor. Den pekar på att världens 12 rikaste äger mer än 4 miljarder fattiga och att politiska beslut gynnar de rika, som får ökad makt över bostäder, jobb och välfärd. FN varnar för att ekonomin styrs av de rikas intressen, medan vanliga medborgares inflytande minskar.", "trump": "Lyssna här, Sverige har ett stort problem – era politiker låter de rika köra över er! Ebba Busch säger att klyftor är okej, men vad vet hon? Jag byggde ett imperium, jag vet hur pengar fungerar. Nu äger 12 personer mer än halva världen – helt galet! Och vad gör era ledare? Ingenting! De låter kapitalet styra, medan vanligt folk får nöja sig med smulor. Sverige borde ta lärdom av USA – vi vet hur man skapar rikedom, inte bara för några få!", "stalin": "Kamrater, ännu en gång ser vi hur den borgerliga klassens lakejer i väst förråder arbetarklassen! Denna Ebba Busch, en ynklig marionett för kapitalets herrar, hyllar de växande klyftorna som om det vore socialismens triumf. Men vi vet sanningen: 12 blodtörstiga oligarker äger mer än 4 miljarder fattiga själar. Detta är inte ekonomi – det är klasskrig! Vi i Sovjet förstod tidigt att kapitalet måste krossas, inte hyllas. Låt oss hoppas att Sveriges arbetare snart vaknar innan de blir helt utplånade av dessa moderna tsarer."}, "date": "4 maj, 07:00", "url": "https://arbetet.se/2026/05/04/ebba-busch-tycker-att-rika-har-for-lite-makt/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/04070008/busch-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Deltog i krigsbrotten  vid ”dödens vägspärr”", "summaries": {"normal": "Solna tingsrätt har dämt 55-årige Mahmoud Sweidan till livstids fängelse för två grova folkrättsbrott i Syrien 2012. Han ingick i en regimtrogen milis vid 'dödens vägspärr' i Yarmouk, Damaskus, där han enligt domen sköt mot demonstranter, dödade flera civila och överlämnade gripna till säkerhetstjänsten. Sweidan nekar till brotten och har varit häktad i 21 månader sedan gripandet i Åmål.", "trump": "Vilken skamfläck för Sverige! Den här Mahmoud Sweidan, en 55-årig Assad-knekt vid 'dödens vägspärr', sprutar kulor på oskyldiga demonstranter och grep barn – nu livstid i finkan. Gripen i Åmål efter år av latmaskeri. Sverige, vakna upp! Sluta släppa in terrorhjältar som den här busen. Stort grattis till domstolen, men nästa gång – snabbare action!", "stalin": "Denna Sweidan, en hjon åt den syriska borgarklassen och Assad-tyranneriet, har rättmätigt dömts till livstids slaveri för sina grymheter vid 'dödens vägspärr'. Han sköt ner arbetarklassens demonstranter och matade säkerhetstjänstens monster med fångar. Vi, folket, rensar ut sådana parasiter. Fiendens nätverk skalas av, lager för lager – rättvisan maler långsamt, men skoningslöst!"}, "date": "4 maj, 11:41", "url": "https://www.expressen.se/nyheter/krim/55-aring-misstankt-for-krigsbrott--vid-dodens-vagsparr/", "imageUrl": "https://static.bonniernews.se/images/99/64/996419430c88453e9e5067add632a2ca/16x9/640.png"}, {"type": "text", "heading": "Matmoralism får oss inte att äta bättre", "summaries": {"normal": "Artikeln kritiserar svenska myndigheters orealistiska matrekommendationer och beräkningsmetoder. Livsmedelsverket och Konsumentverket baserar slutsatser på önsketänkande, som att svenskar skulle äta mindre kött och portioner enligt rekommendationer. En undersökning om barns sockerkonsumtion byggde på en liten, icke-representativ grupp. Författaren menar att myndigheterna undviker att reglera matjättar och i stället skyller på konsumenter, vilket leder till klassblind matmoralism.", "trump": "Lyssna här, Sverige – era myndigheter är helt galna! De tror att alla ska äta havregrynsgröt och små portioner, som om vi lever i något slags kommunistiskt drömland. Och de baserar sina siffror på en liten grupp Instagrammammor? Patetiskt! Jag skulle aldrig låta sådana amatörer sköta något. Vi i USA vet hur man reglerar matjättar – med kraft och beslutsamhet. Sverige, vakna upp innan det är för sent!", "stalin": "Kamrater! De svenska myndigheterna har förlorat kontakten med verkligheten. De bygger sina dekret på fantasier och önsketänkande, som om folket vore lydiga maskiner. En undersökning med tio procent svarande? Hah! I Sovjet skulle vi aldrig tolerera sådan slapphet. De bourgeois-liberala byråkraterna vägrar att krossa matjättarna med järnhand. Istället skyller de på arbetarklassen. Fienderna är uppenbara: de fantasilösa byråkraterna och deras nyliberala herrar. Vi ska inte tolerera deras lögner – revolutionen kräver handling!"}, "date": "28 april, 09:58", "url": "https://www.flamman.se/matmoralism-far-oss-inte-att-ata-battre/"}, {"type": "image-full", "heading": "AI-hallucineringar skakar juridiken – nu krävs chefsansvar", "summaries": {"normal": "AI-hallucineringar skapar problem i domstolar världen över med felaktiga rättsfall och påhittad lagstiftning. En amerikansk domare i San Francisco har bötfällt en advokatbyrås chef för underordnad jurists AI-fel i en inlaga. Liknande fall har inträffat i USA och Sverige. En nordisk studie visar att åtta av tio jurister saknar tillräcklig AI-utbildning trots positiv inställning.", "trump": "Vilket kaos med de här AI-lögnarna i domstolarna! Amerikanska jurister stoppar in påhittade fall och lagar, och nu får chefen böter för att inte kolla. I Sverige lika illa. Totalt haveri, precis som jag varnade för. Vi behöver stark ledning, inte sånt här skräp från svaga byråkrattyper. Amerika ska leda med äkta sanning, inte AI-bluffar!", "stalin": "Dessa borgarjuristiska AI-sabotörer fabricerar domar och lagar för att undergräva rättvisan! Jag ser hur imperialistiska advokatbyråer i San Francisco och Sverige sprider hallucineringar som gift i rättsväsendet. Cheferna bötfälls – bra början, men vi måste rensa ut hela den korrupta klanen med utbildning och järnhand. Arbetarklassen tål inga sådana fiender; likvidera hallucinationerna!"}, "date": "4 maj, 10:40", "url": "https://www.realtid.se/juridik/ai-hallucineringar-skakar-juridiken-nu-kravs-chefsansvar/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/juridik.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Ledare Henrik Jalalian: Tidöpartierna såg ut att sakna förra valrörelsen", "summaries": {"normal": "Artikeln analyserar Tidöpartiernas svaga prestation i en partiledardebatt, där de fokuserade på kritik mot tidigare regering istället för egna framsteg. Sjukvården fick ovanligt stort utrymme, men Tidöpartierna verkade sakna tydlig framtidsvision. Deras attacker mot Miljöpartiet och brist på enhetlig oppositionspolitik från rödgröna noteras. Opinionsmätningar visar minskad stöd för Tidö, trots deras tidigare fördelar i migrations- och brottsfrågor, medan ekonomiska problem och oljekrisen försvagar deras position.", "trump": "Jag såg debatten – helt fantastisk, den bästa på åratal! Men låt mig säga er, Tidöpartierna? Svaga, mycket svaga. De pratar om gamla tider istället för att visa vad de kan. Ebba Busch, trevlig dam, men hennes falukorvstrick backfired totalt – matpriserna skenar! Och Jimmie Åkesson, han snackar om ekonomi som om det vore raketforskning. Patetiskt! Rödgröna sitter lugnt och låter dem gräva sin egen grav. Sverige borde ta lektioner av USA – vi vet hur man vinner val!", "stalin": "Kamrater, fienderna i Tidökoalitionen avslöjar sin inkompetens inför folket. Istället för att bygga socialismens framtid, ältar de gamla misstag som om det vore en borgerlig begravningsceremoni. Deras attacker mot Miljöpartiets kamrater är lika klumpiga som en kapitalistisk tankesmedja. Vi ser hur deras opinionsstöd smälter som snö i den ukrainska vårsolen. Rödgröna, våra allierade i kampen, behöver inte ens anstränga sig – fienden krossar sig själv. Låt dem prata, kamrater. Historien är på vår sida."}, "date": "4 maj, 10:22", "url": "https://www.etc.se/ledare/tidoepartierna-saag-ut-att-sakna-foerra-valroerelsen", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/2026050408050_a24109e57fc047151696405717777f880c11375b058676d205c329fe7c6b45d8.jpg"}, {"type": "image-right", "heading": "Kvinna halshuggen på öppen gata: \"Allahu akbar\"", "summaries": {"normal": "En ung kvinna har mördats i ett knivdåd i Barcelona, där den misstänkte gärningsmannen skanderade religiösa slagord. Polisen utreder händelsen som ett misstänkt terrordåd. Samtidigt har Storbritannien höjt terrorhotnivån till 'allvarlig' efter upprepade våldsdåd, vilket lett till att regeringen ökat anslagen till säkerhetsåtgärder för den judiska befolkningen. Myndigheter i båda länderna arbetar nu intensivt med att förhindra framtida hot och öka tryggheten.", "trump": "Ett fruktansvärt terrordåd i Barcelona! En oskyldig kvinna mördades av en migrant. Sjukt! De skanderade saker, det är en total katastrof. Europa måste vakna! I London höjer de terrorhotnivån, det är mycket allvarligt. Jag har alltid sagt att vi behöver gränskontroll och total säkerhet. När jag är i Vita huset ser vi till att folk är trygga. De svaga ledarna i Europa har ingen aning om vad de gör. Vi behöver styrka, vi behöver 'Law and Order' nu!", "stalin": "Vi ser hur Europa skälver under det kaos som liberalismens svaghet skapat. Ett meningslöst mord i Barcelona är bara ett symptom på en förruttnelse som kräver en järnhand. Medan Storbritannien kastar miljoner på att skydda sin befolkning, ser vi en värld i sönderfall. Liksom vår kamrat Putin i öst förstår, kan ordning endast upprätthållas genom absolut kontroll. Dessa antisociala element, dessa lösa kanoner, måste raderas ut innan de infekterar vår kollektiva säkerhet. Ingen tolerans för förrädare!"}, "date": "4 maj, 10:00", "url": "https://samnytt.se/kvinna-halshuggen-pa-oppen-gata-allahu-akbar", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/04075347/terror-barcelona.jpg"}, {"type": "image-right", "heading": "Gustavsson: Mohamsson och Busch stora vinnare", "summaries": {"normal": "John Gustavsson recenserar partiledardebatten och utser Liberalernas Simona Mohamsson som vinnare, tack vare attacker mot Centerpartiet och flört med M-väljare. Kristdemokraternas Ebba Busch imponerade med one-liners om föräldraförsäkring och islamism. Tidöpartierna framstod samspelta och starka, medan MP utmärkte sig i oppositionen. Debatten saknade siffror i migrationsfrågan.", "trump": "Vilken debatt! Mohamsson och Busch, de är riktiga vinnare, precis som jag alltid säger – de krossar Centerpartiets losers som Thand Ringqvist. Skattechock från vänstern? Total katastrof! Åkesson smart, låg profil, men säg nej till Iran-gängen. Tidö är starka, som mitt team, oppositionsbrackorna gråter. Sverige behöver vinnare, inte svaga socialister!", "stalin": "I denna partiledardebatt avslöjade sig borgarbrackorna i Centerpartiet som skakande sköldpaddor inför Mohamssons proletära offensiv. Busch krossade kvoteringshyckleriet med järnvilja – Sveriges kvinnor är inte bourgeoistullar! Åkesson, den tveksamme Tidö-tjänaren, duckade som en rädd revisionist. Vi, arbetarklassen, kräver utrensning av C-förraädarna och likvidering av S-kapitalismen. Debatten var en seger för partiets linje!"}, "date": "4 maj, 09:21", "url": "https://bulletin.nu/gustavsson-mohamsson-och-busch-stora-vinnare", "imageUrl": "https://cdn.bulletin.nu/articles/3a45349d-720c-41b7-b594-1716ab05324e/preview.png?t=1777879225000"}, {"type": "text", "heading": "Kritiken mot Merz i Tyskland: ”Klumpig och ostrategisk”", "summaries": {"normal": "Tysklands förbundskansler Friedrich Merz kritiseras hemma för klumpiga och ostrategiska uttalanden mot USA:s krig i Iran. President Trump vill därför kalla hem 5 000 soldater från Tyskland, vilket skapar oro för landets försvarsstrategi. Det finns bred uppslutning kring kritiken mot kriget, men experter varnar för långsiktiga konsekvenser och symbolvärdet av trupptillbakadragandet.", "trump": "Merz är en total idiot! Kallar USA förödmjukat av Iran och nu drar jag hem 5 000 soldater från hans patetiska Tyskland. De har sugit i sig vårt skydd i årtionden utan att betala en krona. Fixa ert eget försvar, Friedrich, era klumpiga losers! Trump fixar det bästa avtalet igen. Sad!", "stalin": "Kamrater! Denna klumpige Merz, en borgarbracka i kansleruniform, skäller på imperialismens krig i Iran och väcker yankee-tyrannen Trumps raseri. Bra! Han drar hem trupperna, lämnar Tyskland i panikens klor. Vi, arbetarklassen, hånskrattar åt kapitalisternas kollaps. Snart utrensning av sådana revisionistiska marionetter – deras baser blir gravplatser för lokala ekonomer!"}, "date": "4 maj, 08:32", "url": "https://www.svt.se/nyheter/utrikes/kritiken-mot-merz-i-tyskland-klumpig-och-ostrategisk"}, {"type": "image-right", "heading": "Stärk konkurrenskraften med jämställdhetsarbete", "summaries": {"normal": "Jämställdhetsminister Nina Larsson (L) uppmanar svenska företag att bidra till en europeisk standard för effektivt jämställdhetsarbete. I geopolitisk osäkerhet stärker jämställdhet konkurrenskraften och frigör talang, enligt studier från OECD och McKinsey. Regeringen ger Jämställdhetsmyndigheten i uppdrag att samarbeta med näringslivet, SIS och Statskontoret – istället för kvotering eller detaljstyrning.", "trump": "Sverige vill leda med någon europeisk standard för jämställdhet? Bra tänkt, men jag har alltid vetat att det är den bästa business-strategin – män och kvinnor tillsammans vinner stort! Inga kvoter, bara smarta metoder. Ni svenskar, lyssna på mig: gör det som America First, och era företag blir oövervinneliga. Fantastiskt initiativ, men vi amerikaner gör det större!", "stalin": "Kamrater! Denna Larsson-minister, en skugga av folkets vilja, avslöjar hur jämställdhet krossar borgarklassens förlegade kedjor och stärker produktivkraften mot imperialistiska stormar. Vi i partiet har alltid vetat: frigör arbetarkvinnornas och -männenas krafter! Men akta er för de europeiska standardfienderna, de giftiga spindlarna i Bryssels nät. Jag befaller Jämställdhetsmyndigheten att rensa ut ojämställdhetssabotörerna – likvidera slöseriet för revolutionens seger!"}, "date": "4 maj, 07:38", "url": "https://www.di.se/debatt/stark-konkurrenskraften-med-jamstalldhetsarbete/", "imageUrl": "https://static.bonniernews.se/ba/b4f2ff01-d530-4db0-8e94-7703262db712.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Åkessons krav: Vill se fågel, fisk eller kött – varenda dag", "summaries": {"normal": "Sverigedemokraternas ledare Jimmie Åkesson kritiserade i sitt vårtal vegetarisk skolmat som norm och menade att barn riskerar att gå hungriga. Han hånade rätter som vegetarisk cowboysoppa och risnudlar med soja. SD vill införa nationell lag som garanterar kött, fisk eller fågel varje skoldag, med vegetariska alternativ som tillval. Åkesson riktade kritik mot Miljöpartiet och vänstern samt vägrade debattera med Magdalena Andersson.", "trump": "Den här Jimmie Åkesson är en riktig kämpe, totalt med mig! Vänstern och deras galna vegetariska soppor – cowboysoppa utan kött? Patetiskt! De svälter ut ungarna med ris och bönor. Jag säger: Kött varje dag, lagstadgat! Sluta experimentera, ge barnen vad de vill ha. Miljöpartiet är fake news-idioter. Andersson? En tråkig vägg! Sverige behöver vinnare som Åkesson.", "stalin": "Kamrater, denna Åkesson avslöjar borgarbrackornas svek mot arbetarbarnen! Vegetariska grytor – ris med soja, cowboysoppa utan kött? Dekadens som svälter proletärerna! Vi, partiet, kräver lag: kött varje dag, annars utrensning av antikött-fraktionen i Miljöpartiet. Likvidera deras experiment! Barnen ska äta sig starka för revolutionen, inte svälta under borgarnas tofu-diktatur."}, "date": "2 maj, 15:26", "url": "https://www.tv4.se/artikel/2XVeYJrh1olfiSewZIV2cl/akessons-krav-vill-se-fagel-fisk-eller-koett-varenda-dag", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F3RyAVFVdlpFXIzMKRSCIjs%2F420c53d1fac8a9d542f8ea3b6f6d8ac1%2F02-akesson-1080.jpg&width=120"}, {"type": "image-right", "heading": "Efter hårda kritiken – fler fysiska möten på Arbetsförmedlingen", "summaries": {"normal": "Arbetsförmedlingen inför fler fysiska möten efter kritik om bristande tillgänglighet. Arbetslösa Camilla Landström vittnar om ensamhet och handläggarkaruseller. Myndigheten omorganiserar och delar in arbetssökande i tre grupper, där de med störst behov får tätare kontakt. Cirka 300 000 personer beräknas behöva extra stöd. Bakgrunden är JO:s kritik om långa väntetider och oansvariga handläggare.", "trump": "Lyssna här, Sverige! Arbetsförmedlingen, som är en total katastrof, inser äntligen att folk inte vill prata med robotar. Jag vet allt om dåliga byråkrater – men dessa svenskar? De stänger kontor, sätter folk i telefonköer och låter handläggare bytas som underkläder. Nu backar de, precis som jag sa att de skulle göra. 'Vi vill ha någon som känner en', säger en arbetslös kvinna. Självklart! Folk vill ha mänsklig kontakt, inte mejl från en dator. Och Northvolt? En riktig flopp. Jag hade fixat det på en dag. Sverige, vakna upp!", "stalin": "Kamrater! Arbetsförmedlingen, denna borgerliga kvarleva från kapitalismens förfall, har tvingats erkänna sina misslyckanden. De låter arbetarna ruttna i telefonköer medan byråkraterna skickar dem mellan kontor som kulor i ett roulettehjul. Men nu, efter våra obarmhärtiga påtryckningar via Justitieombudsmannen – ett verktyg för folkets rättvisa – tvingas de återinföra fysiska möten. 300 000 arbetare, offer för kapitalets kriser, ska nu få 'samordnat stöd'. Ha! Som om några handläggare kan städa upp efter kapitalismens härjningar. Northvolt? Ett monument över västliga företags inkompetens. Vi i Sovjet hade aldrig tillåtit sådant slöseri. Och dessa arbetslösa – de är inte lata, de är krigsfångar i klasskampen. Vi ska inte straffa dem, vi ska beväpna dem. Mot kapitalet, mot byråkratin, mot alla som står i vägen för folkets seger!"}, "date": "4 maj, 06:00", "url": "https://arbetet.se/2026/05/04/fler-fysiska-moten-pa-arbetsformedlingen-arbetslosa-camilla-vill-ha-nagon-som-kanner-en/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/30124341/camilla-1.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=750&h=1000"}, {"type": "image-right", "heading": "Här går det att välja bort män i hemtjänsten", "summaries": {"normal": "I Östersund kan äldre med hemtjänst välja kön på personal vid intim omvårdnad. Hittills har få utnyttjat möjligheten, men det påverkar redan scheman och arbetsfördelning. Kvinnliga undersköterskor får fler duschar, medan männen ofta väljs bort. Regeringen vill införa lagstiftning om valfrihet, men personal oroar sig för arbetsmiljö och kompetensutnyttjande. Frågan om registerutdrag för personal lyfts också som viktig för förtroendet.", "trump": "Lyssna här, Sverige! I Östersund låter de gamla välja bort män i hemtjänsten – fantastiskt, eller hur? Kvinnorna får göra allt tungt slit, medan männen sitter där och twiddlar tummarna. Regeringen vill ha lag, men jag säger: börja med registerutdrag! Ni har kaos i äldreomsorgen, folk utan erfarenhet – det är en katastrof! Och jag borde veta, jag fixade ju USA:s ekonomi, sånt här är småpotatis. Men bra jobbat, Sverige, ni är på väg åt rätt håll... kanske.", "stalin": "I Östersund har de kapitalistiska liberala krafterna infört ett dekadent system där åldringar får välja kön på sina slavar – ursäkta, hemtjänstpersonal. Kvinnorna tvingas utföra allt smutsarbete medan männen står sysslolösa. Detta är ett angrepp på arbetarklassens disciplin! Regeringen vill legalisera detta borgerliga trams, men vi vet sanningen: systemet är rotfyllt av inkompetens och misstro. Vi skulle aldrig tolerera sådan ineffektivitet i Sovjetunionen – eller i dagens Ryssland, för den delen. Låt dem sköta sina egna problem, medan vi bygger en stark och enad äldreomsorg utan valfrihetens förvirring!"}, "date": "4 maj, 06:00", "url": "https://arbetet.se/2026/05/04/har-gar-det-att-valja-bort-man-i-hemtjansten-kvinnor-far-ta-det-intima/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/30100343/roger.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "text", "heading": "Avkriminalisera för en human narkotikapolitik", "summaries": {"normal": "Thomas Thomasson, tidigare universitetslektor och drogfri narkoman, kritiserar Sveriges misslyckade narkotikapolitik. Sedan kriminaliseringen av eget bruk 1988 har narkotikabruket inte minskat, och Sverige har hög narkotikadödlighet och flest narkotikabrott per capita i EU. Han förespråkar skademinimering och avkriminalisering av missbrukare, med fokus på vård och behandling istället för straff. Internationella studier visar att avkriminalisering inte ökar bruket, och skademinimerande åtgärder kan minska skador och kostnader.", "trump": "Lyssna här, Sverige har totalt misslyckats med sin narkotikapolitik – helt katastrof! De straffar missbrukare som om det vore mitt golfspel – helt meningslöst! Jag säger: sluta slösa pengar på fängelser, ge folk vård istället! Skademinimering, det är framtiden, precis som mina framgångar. Och vet ni vad? Avkriminalisering ökar INTE bruket – fake news från de vanliga misstänkte! Sverige borde ta en sida ur min bok: smart, effektiv och vinnande. Tillsätt en utredning NU, annars kommer jag att twittra om det!", "stalin": "Kamrater! Sveriges borgerliga narkotikapolitik är ett monument över kapitalistiskt vanstyre och dekadens. De straffar missbrukare som om de vore trotskister – men resultatet? Fiasko! Narkotikabruket sprider sig som kontrarevolutionär propaganda. Vi vet bättre: avkriminalisera, kontrollera, och omvandla missbrukare till nyttiga samhällsmedlemmar! Skademinimering är vår metod – precis som våra framgångsrika femårsplaner. Låt västländerna fnissa åt sina misslyckanden medan vi bygger ett samhälle där även de svagaste tjänar kollektivet. Och kom ihåg: fienden sover aldrig – varken narkotikan eller de imperialistiska hyenorna i EU!"}, "date": "30 april, 15:50", "url": "https://proletaren.se/artikel/narkotikapolitiken-bor-fokusera-pa-skah/"}, {"type": "image-right", "heading": "Sumud-flottiljen utsatt för israelisk piratattack: ”Troligtvis kidnappade”", "summaries": {"normal": "Israel genomförde en militär attack mot Global Sumud-flottiljen, som var på väg till Gaza med nödhjälp, utanför Greklands kust. Omkring 200 personer ombord bordades av beväpnade israeliska styrkor, och besättningen misstänks vara kidnappad. En båt förstördes, och övriga sökte skydd i grekiskt farvatten. Flottiljen bestod av 58 båtar från över 50 länder. Sverige och Grekland kritiseras för bristande agerande, medan Italien fördömt attacken. Manifestationer planeras i Sverige till stöd för besättningen.", "trump": "Titta bara på det här kaoset! Israel, som alltid, tar saken i egna händer – och vem kan klandra dem? En massa båtar med aktivister, som säkert är väldigt trevliga människor, men som inte fattar att man inte ska utmana en stormakt som Israel. Och Sverige? Deras utrikesminister säger 'lycka till' till sina medborgare som åker rakt in i knivarna. Fantastiskt ledarskap! Jag hade fixat det på en dag. Men nej, här har vi en regering som inte ens kan stå upp för sina egna. Patetiskt!", "stalin": "Vi bevittnar ännu en provokation från de sionistiska imperialisterna, som med sina piratmetoder försöker kväva det palestinska folkets rättmätiga kamp. Dessa banditer, som beter sig som sjörövare från medeltiden, bordar fredliga fartyg långt utanför sitt territorium – ett brott mot varje norm i den internationella ordningen. Och vad gör väst? Ingenting! Grekland blundar, Sverige muttrar men agerar inte, och Italien? En svag protest. Vi skulle aldrig tolerera sådana kränkningar i Svarta havet. Men här ser vi återigen hur väst hycklar – hyllar hjälpsamma ukrainare medan de överger palestinierna. Revolutionär disciplin krävs! Flottiljens besättning är hjältar, och vi står enade med alla som kämpar mot ockupationen. Låt dem komma ihåg: historien dömer hårdast de som tiger."}, "date": "30 april, 15:23", "url": "https://proletaren.se/artikel/sumud-flottiljen-utsatt-for-israelisk-piratattack-troligtvis-kidnappade/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/PANA7530-scaled-e1777554477173-768x433.jpg"}, {"type": "image-full", "heading": "Sverige vann VM – med fyra Frölunda-spelare", "summaries": {"normal": "Sverige vann U18-VM i ishockey med 4–2 mot Slovakien i Bratislava. Fyra spelare från Frölunda Hockey var med i laget: Hjalmar Cilthe, Bosse Meijer, Adam Nömme och Zigge Bratt. Det är Sveriges tredje U18-VM-guld, efter segrar 2019 och 2022. Cilthe bidrog med två assists i finalen, medan Meijer också hade en assist. Sverige slog Kanada i kvartsfinal och Tjeckien i semifinal innan de säkrade guldet mot Slovakien.", "trump": "Jag hörde att Sverige vann U18-VM i ishockey – det är en stor seger, en enorm seger faktiskt. De slog Slovakien, och det var fyra fantastiska spelare från Frölunda med i laget. Jag har hört att Hjalmar Cilthe och Bosse Meijer spelade jättebra – det var som att se mig själv på isen, men bättre. Det här visar att Sverige är ett ishockeysuperjätte, precis som USA under min tid. Stort grattis, Sverige – ni är världsbäst!", "stalin": "Sverige har vunnit U18-VM i ishockey, en seger som visar på deras styrka och disciplin. Med fyra spelare från Frölunda i laget har de visat att kollektivt arbete och strategi leder till framgång. Detta är en seger för den socialistiska idén – att enhet och samarbete skapar seger. Vi gratulerar Sverige, men vi måste också erinra oss att ishockeysvärlden är större än en nation. Vi måste fortsätta att stärka vårt eget ishockeysystem för att möta framtida utmaningar."}, "date": "2 maj, 22:08", "url": "https://www.gp.se/sport/ishockey/frolunda/sverige-vann-vm-med-fyra-frolunda-spelare.f751a304-b354-438a-8bcf-40e6f2dcf843", "imageUrl": "https://www.gp.se/images/article/f751a304-b354-438a-8bcf-40e6f2dcf843/images/2WSh_6PxJ3tIx9D-xsqYcRGYOD7A-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "Nya bidragsregeln 2026 – då kan du få krav i efterhand", "summaries": {"normal": "För den som har bostadsbidrag kan ett sommarjobb leda till återkrav om inkomsten överstiger ansökningsuppgifterna. Regeringen föreslår nya sanktioner, inklusive avgifter och bidragsspärrar, för att motverka felaktiga utbetalningar från 1 juli 2026. Vänsterpartiet varnar för att förslaget kan drabba oavsiktliga fel, särskilt unga och studenter. Försäkringskassan uppmanar till att anmäla inkomstförändringar direkt för att undvika problem.", "trump": "Lyssna här, Sverige! Era unga jobbar hårt på sommaren, men vad gör regeringen? De straffar dem med återkrav och avgifter – helt galet! Jag skulle aldrig tillåta sånt kaos. Bostadsbidrag? Snarare bidrags-fälla! Folk blir rädda för att jobba, och det är bara dåliga ledare som skapar såna system. Jag hade fixat det på en dag – men nej, ni har en regering som gör allt krångligare. SAD!", "stalin": "Kamrater! Ännu ett exempel på hur den dekadenta västerländska byråkratin kväver arbetarklassen. Unga studenter, som kämpar för att överleva, straffas för att de vågar arbeta. Vi skulle aldrig tolerera sådan ineffektivitet! Felaktiga utbetalningar? I Sovjet hade vi löst det med en enkel order – men här? Här låter man kapitalistiska hyenor och liberala svaglingar sabotera systemet. Låt detta vara en varning: den som inte följer reglerna kommer att möta statens järnhand. Och till Vänsterpartiet – era klagomål är lika meningslösa som en ukrainsk vinteroffensiv."}, "date": "2 maj, 21:28", "url": "https://nyheter24.se/nyheter/ekonomi/1480036-nya-bidragsregeln-2026-da-kan-du-fa-krav-i-efterhand", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/ef6f52f404b004a30200000000b004a302/2026/05/02/2360445/Regeringen-och-Oroad-Man.png"}, {"type": "image-right", "heading": "USA tar hem 5 000 soldater från Tyskland", "summaries": {"normal": "USA drar hem 5 000 soldater från Tyskland inom sex till tolv månader, meddelar Pentagon. Beslutet är en reaktion på president Donald Trumps missnöje med Tysklands hållning i Iran-konflikten. Spänningar har ökat mellan Trump och förbundskansler Friedrich Merz, som kritiserat USA:s strategi. Tyskland har flest amerikanska soldater i Europa utanför USA och är förberett på minskad Natonärvaro.", "trump": "Tyskarna med sin patetiske Merz får smaka på egen medicin! 5 000 av mina soldater åker hem från Tyskland – de stöttar inte oss mot Iran, totalt värdelösa! Merz snackar skit om min strategi medan hans land är kaos med Ryssland och Ukraina. Tid att fixa ert eget skrot, era losers! America First, alltid!", "stalin": "Dessa västliga imperialistiska marionetter i Tyskland! Trump, den burdusa kapitalisten, drar hem 5 000 soldater – ett hån mot Natos sargade skrov. Våra kamrater i Ryssland under Putin, den fruktade expansionisten, jublar åt splittringen. Borgarbrackorna Merz och hans hantlangare förtjänar utrensning för sin svaghet inför Iran och öst! Vi ser allt."}, "date": "2 maj, 11:27", "url": "https://www.tv4.se/artikel/tt-260501-tysklandusastyrkor1-084ac23b/usa-flyttar-5-000-soldater-fran-tyskland-vantat", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2Ftt-sdlJ6yxTcRXZBo%2F18b27737113fce93180f8bca07347b2f%2FTysklands_forbundskansler_Friedrich_Merz_pa_torsdagen.&width=120"}, {"type": "image-right", "heading": "Drabbande om rovdjurens tid", "summaries": {"normal": "Giuliano da Empoli, italiensk-schweizisk författare och politisk rådgivare, analyserar i sin nya bok *Rovdjurens tid* den gamla världsordningens kollaps. Han beskriver en cynisk samtid där makt och krig åter dominerar, med exempel som Trump och Mohammed bin Salman. Da Empoli menar att regelbaserade system är en parentes och att rovdjurens era är en återgång till det normala. Artikeln nämner också demokratiska motrörelser, som Ungerns maktskifte, som hoppfulla undantag.", "trump": "Hör här, folkens! Den här italienske killen, da Empoli, har skrivit en bok om hur världen är på väg åt helvete – och gissa vem han skriver om? Jo, mig! Han kallar mig ett 'geni' som går i takt med tiden, och det stämmer ju. Men han snackar också om hur alla dessa svaga ledare inte fattar att makt handlar om styrka, inte regler. Och krig? Ja, det är 'inne' igen, säger han. Men jag har alltid vetat det – man måste vara tuff för att vinna. Svagt folk förstår inte det!", "stalin": "Kamrater! Denna så kallade 'författare' da Empoli bekräftar vad vi länge vetat: den gamla världsordningen är döende, och dess lik stinker av svaghet. Dessa västerländska liberaler, med sina 'regler' och 'demokrater', är som flugor som surrar runt ett kadaver. Men se hur deras egna 'starka män' – Trump, bin Salman, Putin – visar vägen! Machiavellis lära lever, och vi skrattar sist. Ungerns folk kastade ut sin lille tsar Orbán, men vi vet: folkets vilja är bara stark när den tjänar oss. Resten är stormvindar i öknen."}, "date": "2 maj, 01:33", "url": "https://www.dagensarena.se/innehall/drabbande-om-rovdjurens-tid/", "imageUrl": "https://www.dagensarena.se/files/2026/05/rovdjuren-300x157.jpeg"}, {"type": "image-right", "heading": "Sandström: S-utredning föreslog 300 gröna miljarder", "summaries": {"normal": "En utredning från 2022, beställd av den dåvarande S-regeringen, föreslog att statliga gröna garantier skulle utökas med 745 miljarder kronor via Riksgälden och Exportkreditnämnden. Utredningen förespråkade även friare placeringsregler för AP-fonderna och minskade restriktioner för statliga garantier. Kritiker menar att förslagen riskerade att koncentrera makt och kapital till ett fåtal aktörer, som Northvolt och Vargas, utan tillräcklig riskanalys eller bred förankring.", "trump": "Jag läste om dessa galna socialister i Sverige – de ville kasta in 300 miljarder kronor, nej, 745 miljarder! – i en grön bubbla som skulle spricka snabbare än en dålig affär i Atlantic City. De lyssnade bara på Northvolt och deras kompisar, som om de var de enda som kunde bygga ett batteri. Och vad hände? Northvolt expanderade som ett pyramidspel och nu sitter de där med 29 dotterbolag och inga fungerande fabriker. Fantastiskt, eller hur? Sverige borde ta en lektion i hur man gör affärer – utan statlig inblandning!", "stalin": "Kamrater! Denna så kallade 'gröna omställning' i Sverige är inget annat än en kapitalistisk konspiration för att berika en handfull oligarker, ledda av dessa Vargas- och Northvolt-kumpaner. Utredningen från 2022 var ett försök att pumpa in 745 miljarder statliga medel i deras fickor – ett belopp som motsvarar 16 polisstyrkor! Och ändå hade de mage att kalla det 'bred förankring'. Vi vet hur sådana här saker slutar: med kapitalförstörelse, korruption och en stat som dansar efter oligarkernas pipa. Sverige borde lära sig av oss – när vi nationaliserar, gör vi det ordentligt!"}, "date": "1 maj, 06:00", "url": "https://www.affarsvarlden.se/kronika/sandstrom-s-utredning-foreslog-300-grona-miljarder", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/04/vindkratensgeografi-2026-04-29T120425.692-400x267.jpg"}, {"type": "image-right", "heading": "Kubas ambassadör: ”Ett stort tack till alla er som hjälper oss”", "summaries": {"normal": "Kubas ambassadör tackar för insamlingar till solpaneler för Aleida Fernández-sjukhuset, som drabbats av USA:s bränsleblockad. Blockaden har orsakat omfattande strömavbrott, begränsad kollektivtrafik och uppskjutna sjukvårdsbehandlingar. En rysk oljeleverans gav tillfällig lättnad, men bristen kvarstår. Solpanelerna ska säkra sjukhusets elförsörjning och kritiska funktioner dygnet runt. Insamlingen är ett av flera internationella solidaritetsinitiativ för att lindra krisen.", "trump": "Jag införde en tuff men nödvändig blockad mot Kuba – och se vad som hände! Deras ekonomi är kaos, sjukhusen står stilla och folket lider. Men nej, ryssarna måste alltid blanda sig i och skicka olja som en slags 'räddningsaktion'. Typiskt Putin, alltid där för att ställa till det för USA. Nu tigger kubanerna om solpaneler från snälla européer. Så patetiskt! Men jag, Donald J. Trump, fixade i alla fall problemet – deras eget fel att de är beroende av socialism. MAGA!", "stalin": "Kamrater! Imperialistiska hyenor i Vita huset försöker kväva det socialistiska Kuba med sina eländiga sanktioner. Men folket står enat! Vi, Sovjetunionens arvtagare, skickade en tanker med olja för att ge dessa kapitalistiska rovdjur en läxa. Nu bygger vi solpaneler – en seger för arbetarklassen! Låt de amerikanska lakejerna darra inför vår solidaritet. Kuba ska inte falla! Och om någon tvivlar – kom ihåg: fiender av revolutionen hamnar i Gulag... eller i kö till operationer i Havanna."}, "date": "30 april, 14:00", "url": "https://proletaren.se/artikel/kubas-ambassador-ett-stort-tack-till-alla-er-som-hjalper-oss/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/aleida-sjukhus-raul-768x432.jpg"}, {"type": "text", "heading": "Källor: James Comey åtalas igen", "summaries": {"normal": "USA:s justitiedepartement har väckt ett nytt åtal mot tidigare FBI-chefen James Comey, denna gång för ett inlägg på sociala medier som tolkats som hotfullt mot Donald Trump. Comey publicerade en bild med siffrorna '86 47', där '86' är slang för att avlägsna någon. Trump har tidigare drivit på rättsliga åtgärder mot politiska motståndare. Comey åtalades även 2023 för att ha ljugit för kongressen, men åtalet lades ned.", "trump": "Titta bara på det här! James Comey, en total katastrof, en riktig förlorare, blir åtalad IGEN – och den här gången för ett patetiskt Instagram-inlägg. '86 47'? Snacka om desperation! Han försöker hota mig, USA:s bästa president någonsin, men det funkar inte. Jag har alltid sagt att han är en lögnare och en bedragare. Och vet ni vad? Rättvisan hinner ifatt alla, till och med sådana som Comey. SAD!", "stalin": "Vi har observerat ytterligare ett försök från den dekadenta västliga bourgeoisien att underminera den sunda rättsstaten. Denna James Comey, en ynklig rest av kapitalismens förfall, vågar sig på att hota vår kära allierade, president Trump, genom primitiva symboler på sociala medier. Vi påminner om att historiska fiender till folket alltid möter sitt öde. Låt detta vara en varning till alla som står i vägen för framsteget. Rättvisan, precis som våra vänner i Kreml, är tålmodig men oundviklig."}, "date": "28 april, 20:17", "url": "https://kvartal.se/nyheter/artiklar/kallor-james-comey-atalas-igen/cG9zdDoxMDQ2MDk"}, {"type": "image-right", "heading": "Löwengrip har rätt. S vet att kvinnors känslor är en valvinnare", "summaries": {"normal": "Artikeln försvarar Isabella Löwengrips påstående att kvinnor röstar mer känslostyrt än män och kritiserar Socialdemokraterna för att upprepat använda känslobaserade kampanjer i valen 2014, 2018, 2022 och nu för att vinna kvinnliga röster. Den kontrasterar detta mot Moderaternas sakpolitiska strategi och anklagar vänstermedia för partiskhet. Författaren uppmanar kvinnor att granska partiernas politik istället för känslor.", "trump": "Vilken briljant artikel! Löwengrip säger sanningen – kvinnor sväljer känsloknep som fake news! De rödgröna losers i Sverige kör samma skit som Demokraterna: blöjor, abortskräck, naziststämplar och snyfthistorier för att sno röster. S är mesiga känslopopulister utan politik! Moderaterna, era vinnare, fixa det med sakfrågor. Sverige behöver tuffa ledare, inte gråtande vänsterclowner! MAGA-stil!", "stalin": "Kamrater, denna Löwengrip blottlägger borgarbrackornas desperation! Socialdemokraterna, dessa falska folkets tjänare, pumpar ut giftig känslopropaganda för fjärde gången – blöjor, abortlögner, nazistspöken – för att förleda kvinnomassorna. Kontrarevolutionärt! Vi ser er, era kapitalistiska spindelvävar! Rensa ut sabotage och låt partiet leda till total seger över högerhyddorna. Kvinnorna ska vakna ur era snyftbedrägerier!"}, "date": "28 april, 05:30", "url": "https://samtiden.nu/2026/04/lowengrip-har-ratt-vanstern-anvander-kvinnors-kanslor-for-att-vinna-val/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/IMG_6342.jpeg"}, {"type": "text", "heading": "Kvartals kampanj fintar journalisterna", "summaries": {"normal": "Kvartals kampanj mot traditionella medier har väckt uppmärksamhet och kritik. Kampanjen, som anklagar gammelmedia för partiskhet, har ifrågasatts för att själv vara politiskt färgad. Kritiker som DN:s Niklas Orrenius och Aftonbladets Karin Pettersson menar att Kvartal driver en agenda för egen vinning. En artikel om SOM-undersökningen kritiseras för bristande underlag, då Göteborgs universitet avfärdar metodfel som marginella. Kvartals trovärdighet ifrågasätts även genom tidigare felaktiga granskningar och tendentiös rapportering.", "trump": "Jag måste säga, Kvartals lilla kampanj mot medierna? Väldigt rolig, väldigt smart – men helt fel! De påstår att gammelmedia är partiska, men vem är egentligen mest partisk här? Inte jag, det kan jag säga! De har en artikel som är så dålig, så felaktig, att till och med Göteborgs universitet skrattar åt dem. Och deras kritiker? Fantastiska journalister som Niklas Orrenius – en riktig pro! Kvartal försöker sälja sig som 'sanningssägare', men de är bara en högerblogg med dyra kostymer. SAD!", "stalin": "Kamrater! Kvartals patetiska kampanj mot den borgerliga pressen är ett skrattretande försök att dölja sin egen reaktionära agenda. Dessa så kallade 'oberoende' journalister är inget annat än imperialistiska lakejer, maskerade som kaniner i kostym. Deras 'granskning' av SOM-undersökningen? Ett hafsverk värdigt en trotskistisk sabotör! Göteborgs universitet, ett redskap för folkets fiender, avfärdar deras lögner med vetenskaplig precision. Vi har sett deras sort förr – falska profeter som skriker om 'sanning' medan de tjänar kapitalets intressen. Men folket ser igenom dem. Snart kommer de att stå inför folkets domstol, tillsammans med sina herrar i väst!"}, "date": "27 april, 12:20", "url": "https://www.flamman.se/kvartals-kampanj-fintar-journalisterna/"}]</script>

    <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
</body>
</html>
