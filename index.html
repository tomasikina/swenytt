 bourgeoisins dekadens och förfall. GB Glace, ett verktyg för kapitalistisk propaganda, försöker köpa sig lojalitet med en 'prideglass' – två ynka kronor till en borgerlig fond. Och folket? En del hyllar, men de flesta – dessa småborgerliga kräk – vrålar om bojkott. De klagar på smaken, på idén, på allt! Precis som de ukrainska fascisterna, vägrar de se sanningen. Men vi vet: historien är på vår sida. Snart ska dessa glassätande kontrarevolutionärer tystas, och deras smaklökar omskolas i namn av folket!"}, "date": "7 maj, 12:56", "url": "https://www.friatider.se/efter-prideglassen-gb-hotas-med-bojkott", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/image-153_2.jpg"}, {"type": "image-full", "heading": "Legora expanderar snabbt – andra uppköpet på kort tid", "summaries": {"normal": "Det svenska legal tech-bolaget Legora expanderar snabbt med två förvärv på kort tid: först konkurrenten Qura, nu startupen Graceview. Bolaget har tagit in över 5,5 miljarder kronor i kapital från bland annat Atlassian och Nvidia. Legora har passerat 100 miljoner dollar i årlig återkommande intäkt, har 400 anställda och siktar på 900 vid årsslutet.", "trump": "Dessa Legora-killar i Sverige, de gör det enormt! Köper upp Qura och nu Graceview, andra dealen på nolltid efter miljarder från Nvidia och Atlassian – fantastiska investerare! De krossar konkurrenter som ingen annan, precis som mina affärer. Snart 900 anställda, de vinner stort, tro mig!", "stalin": "Kamrater, se hur Legora-kapitalisterna, dessa lagliga hyenor, slukar Qura och Graceview med imperialistiska miljarder från Atlassian och Nvidia! Deras 900 slavarbetskrafter samlar giftiga dokument för att kväva arbetarklassen. Jag misstänker sabotage i varje jurisdiktion – vi ska likvidera dessa borgarbrackor innan de purgerar oss!"}, "date": "7 maj, 12:17", "url": "https://www.realtid.se/juridik/legora-expanderar-snabbt-andra-uppkopet-pa-kort-tid/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/legora.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "Regeringen presenterade tobakslobbyns argument som fakta", "summaries": {"normal": "Sveriges regering protesterade mot Frankrike och Spaniens förslag att förbjuda vitt snus genom att framställa tobaksindustransens argument som fakta. Regeringen hävdar att snus minskar rökning och tobaksrelaterad dödlighet, men Folkhälsomyndigheten håller inte med och ser inte snus som effektivt rökavvänjningsmedel. Argumenten kom från tobaksföretagens remissvar, vilket Kommerskollegium använde i protestskriften.", "trump": "Sverige krossar det här! Frankrike och Spanien, de dumma EU-byråkraterna, vill förbjuda vitt snus – totalt galet! Regeringen säger sanningen: snus är bättre än cigaretter, lägre dödlighet, fantastiskt. Tobakslobby? Fakta är fakta. Folkhälsomyndigheten gnäller, men Sverige vinner stort. Vuxna bestämmer själva, precis som jag alltid sagt – ingen nanny state här!", "stalin": "Kamrater, dessa franska och spanska imperialistråttor, marionetter åt tobakskapitalisterna, vill kväva snusproduktionen för att förlama arbetarklassens lungor med cigaretter! Den svenska regeringen, på Kommerskollegiums uppdrag, avslöjar sanningen: snus reducerer skador – men de stulna argumenten från lobbande hyenorna måste likvideras! Folkhälsomyndigheten, era tveksamma byråkrater, ni tjänar fienden. Vi rensar ut er paranoia, för folkhälsan segrar under vårt vakande öga!"}, "date": "7 maj, 10:09", "url": "https://www.svt.se/nyheter/inrikes/regeringen-presenterade-tobakslobbyns-argument-som-fakta", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.72/0.51/90967a954a1408b9b11d4c59205dde69b59a149db8bb6140863c9f9af28297f1"}, {"type": "image-full", "heading": "Benjamin Dousas ”V = kommunister” gör SVT irriterad", "summaries": {"normal": "Biståndsminister Benjamin Dousa bar en t-shirt med texten 'Vänsterpartiet = kommunister', vilket irriterade SVT. Reportern ifrågasatte påståendet och noterade att partiet slutade kallas kommunister för 30 år sedan. Dousa menade att Vänsterpartiet motsätter sig privat ägande, vilket är kommunism. Artikeln citerar Vänsterpartiets 2024-partiprogram som stödjer kollektivt ägande och avskaffande av kapitalismen, och kritiserar SVT för att inte nämna detta.", "trump": "Vilken fantastisk kille, den här Dousa! Han sätter på sig en tröja och säger sanningen: Vänsterpartiet är kommunister, punkt slut! SVT, era losers, flippar ur och snackar om namnbyte från 90-talet som om det vore magi. De hatar privat ägande, vill sno allt till staten – klassisk kommunism! Fake news-SVT ignorerar partiprogrammet. Dousa är en vinnare, de är totala fiaskon!", "stalin": "Kamrater, se hur borgarministern Dousa, den ynkliga kapitalistfluga, vågar smutskasta sanna revolutionärer i Vänsterpartiet med sin patetiska tröja! SVT-reportern, en användbar idiot, försvarar dem lamt. Men vi vet: deras program är ren leninism – riva kapitalismen, gemensamt ägande av banker, energi, allt! De ska rensas ur historiens soptipp som jag rensade fiender. Vänsterpartiet, framåt mot diktaturen av proletariatet!"}, "date": "30 april, 05:49", "url": "https://samtiden.nu/2026/04/benjamin-dousas-v-kommunister-gor-svt-irriterad/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/phonto-1-1280x720.jpeg"}, {"type": "image-right", "heading": "Brå: Färre än hälften av utvisningsdömda brottslingar lämnar Sverige", "summaries": {"normal": "En ny rapport från Brå visar att färre än hälften av de utländska medborgare som dömts till utvisning i samband med fängelsedom faktiskt har lämnats landet mellan 2013 och 2023. Verkställigheten varierar kraftigt beroende på ursprungsland, där hinder ofta utgörs av identifieringssvårigheter eller avsaknad av återtagandeavtal. Rapporten noterar även att 18 procent av de utvisningsdömda personerna lagförts för nya brott i Sverige under samma period, vilket Brå menar kan underminera utvisningsbeslutens syfte.", "trump": "Sverige har en total katastrof! En ny rapport visar att de inte ens kan skicka hem brottslingar. Mindre än hälften lämnar landet! Det är en skam. De låter dem stanna, de begår nya brott – det är fruktansvärt. Vi har de bästa gränserna, vi skickar hem dem direkt, men i Sverige är det ett kaos. Svaga ledare, ingen kontroll! Ryssland och andra tar inte tillbaka dem. Sverige måste vakna, annars kommer de inte ha ett land kvar. Väldigt sorgligt!", "stalin": "Dessa siffror är bevis på en patetisk statlig svaghet. Att låta 52 procent av de kriminella elementen stanna kvar är ett förräderi mot ordningen! Vår broder i Moskva, Putin, förstår att fienden inte ska förhandlas med, de ska oskadliggöras. Att skylla på 'identitetshandlingar' är ett byråkratiskt haveri värdigt en feodalstat. Vi i staten tolererar inte sådant slöseri med utrymme. Om de inte vill åka hem, låt oss bygga fler tågrälsar mot norr. Statens vilja är lag, allt annat är kontrarevolutionärt nonsens."}, "date": "7 maj, 08:53", "url": "https://samnytt.se/bra-farre-an-halften-av-utvisningsdomda-brottslingar-lamnar-sverige", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/07065236/utvisning-bra.jpg"}, {"type": "image-right", "heading": "Anledningen till Donald Trumps plötsliga omsvängning", "summaries": {"normal": "Donald Trumps plötsliga tillkännagivande av 'Project Freedom' för att eskortera fartyg genom Hormuzsundet överraskade Gulfallierade. Saudiarabien vägrade USA tillgång till baser och luftrum, vilket tvingade Trump att pausa operationen, enligt källor till NBC News. Ett samtal med kronprins Mohammed bin Salman löste inte frågan. Saudiarabien stödjer istället Pakistans diplomatiska medling mellan USA och Iran.", "trump": "Saudiarabierna blev helt paffa över mitt briljanta Project Freedom – tänk att segla fritt genom Hormuz! De vägrade baser och luftrum, typiskt fega killar. Pausar nu för att fixa dealen, snackade med MBS men de lyssnar inte alltid. Qatar och Oman chockade också. Snart stortjurar vi igen, tro mig, det blir enormt!", "stalin": "De imperialistiska schakalen Trump och hans vasaller planerade 'Project Freedom' för att klorera Hormuzsundet, men de saudiska borgarhundarna vägrade baser och luftrum – bra så! Vi i partiet hånskrattar åt deras panik och paranoia. Snart rensar vi ut dessa gula rävar och svansviftande kapitalistormar för att krossa reaktionen i Mellanöstern!"}, "date": "7 maj, 08:07", "url": "https://www.di.se/nyheter/uppgifter-viktig-allierad-tvingade-fram-trumps-plotsliga-retratt/", "imageUrl": "https://static.bonniernews.se/ba/4005bf59-cc6a-4827-b97d-d43395e907c8.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-right", "heading": "Vakna minister Britz – arbetare dör!", "summaries": {"normal": "Artikeln kritiserar bristande arbetsmiljö i Sverige efter flera dödsolyckor, senast i Sundbyberg och Sandviken. Entreprenörskedjor skapar otydligt ansvar, vilket försvagar säkerheten. Över 40 personer dör årligen på jobbet, ett mönster som pågått i över tio år. Arbetsmarknadsminister Johan Britz nämner en nollvision, men bristande tillsyn och ekonomiska intressen prioriteras före säkerhet.", "trump": "Jag säger er, Sverige har ett STORT problem – folk dör på jobbet som flugor! Fem i Sundbyberg, en till i Sandviken, och ingen gör något. Arbetsmiljölagen? Ha! Den är lika värdelös som Bidens ekonomi. Företag pressar kostnader, regering duckar, och arbetare betalar priset. Johan Britz snackar om nollvision – fake news! Om jag styrde skulle jag rensa upp, men Sverige? De låter dödsolyckor fortsätta. SAD!", "stalin": "Kapitalistiska hyenor i Sverige låter arbetare dö som hundar medan de räknar sina blodspengar. Fyra decennier av 'nollvisioner' – tomma ord från svaga ledare! Vi i Sovjet visste hur man hanterar sådana fiender: en kula i nacken eller tio år i Gulag. Entreprenörskedjor? Ett bourgeoisiskt trick för att undvika ansvar! Vi skulle ha skickat in Röda armén för att nationalisera fabrikerna – och skickat Britz till Sibirien för att lära sig disciplin. Men Sverige? De fortsätter dansa på arbetarnas gravar."}, "date": "7 maj, 07:00", "url": "https://arbetet.se/2026/05/07/vakna-johan-britz-arbetare-dor/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/06141259/britz-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Skräckdygnen på havet – detta har hänt", "summaries": {"normal": "På kryssningsfartyget MV Hondius inträffade ett utbrott av hantavirus under en resa från Antarktis till Kap Verde. En nederländsk man dog den 11 april, följt av hans fru i Sydafrika den 26 april, en brittisk passagerare evakuerades med viruset och en tysk kvinna avled den 2 maj. Myndigheter bekräftade Andesvirus, som kan smitta mellan människor. Fartyget stoppades vid Kap Verde.", "trump": "Vilken katastrof! De här rika snobbarna betalar 30 000 dollar för lyxkryssning till Antarktis och slutar som viruszombies på öppet hav. Holländare dör, frun följer efter i Sydafrika, britten helikoptras bort, tyskan kreverar – hantavirus totalt! Mina resor? Perfekta, inga såna fake-pandemier. Kapitalister, lär er av mig!", "stalin": "Dessa borgarbrackor på sitt isförstärkta lyxskepp sprider pesten som råttor i Atlanten! Holländsk kapitalist likvideras, hustrun följer efter, brittisk spion evakueras, tysk kvinnlig sabotör dör. Andesvirus – imperialistiskt vapen mot arbetarklassen! Vi skulle ha rensat ut hela besättningen i tid. Paranoia? Nej, nödvändig vaksamhet!"}, "date": "6 maj, 12:50", "url": "https://www.tv4.se/artikel/tt-260506-atlantenvirustidslinje1-86109823/skrackdygnen-pa-havet-detta-har-hant", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2Ftt-sdlvb4bgQPSSj0%2F30bccc70fa5ae14f359f81da00aed61f%2FKryssningsfartyget_MV_Hondius_for__fotograferad_av_en_passagerare_mandagen_den_4_maj.&width=120"}, {"type": "text", "heading": "En naturlig lagerhylla av arbetslösa", "summaries": {"normal": "Artikeln kritiserar regeringen för att ignorera hög arbetslöshet (9,7%) samtidigt som de skryter om sina framgångar. Författaren hänvisar till Milton Friedmans teori om 'naturlig arbetslöshet', som upprätthållits av både socialdemokratiska och borgerliga regeringar. Dokumentären 'Novemberrevolutionen' kopplar 90-talskrisen till avregleringar 1985. Regeringen anklagas för bristande krismedvetenhet och ideologiskt motiverad passivitet, vilket gynnar arbetsgivare och försvagar arbetstagare.", "trump": "Titta bara på Sverige – helt otroligt! Regeringen skryter som om allt är perfekt, men arbetslösheten är skyhög, nästan 10%! De har tre arbetsmarknadsministrar, men ingen syns till. Vad är det för jävla cirkus? Friedman-läran, visst, men vem bryr sig? De borde skämmas! Jag skulle fixa det på en vecka – men nej, de sitter bara och glor. Svensk ekonomi? En katastrof, folks. SAD!", "stalin": "Kamrater! Se hur kapitalets lakejer i Sverige hyllar sin 'framgång' medan arbetarklassen försmäktar i arbetslöshetens träsk. 10% – en skam! De borgerliga och socialdemokratiska förrädarna har tillsammans byggt denna 'naturliga' hylla av överflödiga arbetare, precis som Friedman, den imperialistiske hunden, förespråkade. Tre ministrar? Tre fiaskon! Vi skulle ha skickat dem till Gulag för sådan inkompetens. Arbetarklassens rättigheter har förvandlats till privilegier för bourgeoisien. LO-arbetarna som röstar på fascistiska SD borde ställas inför folkets domstol!"}, "date": "4 maj, 13:49", "url": "https://www.flamman.se/en-naturlig-lagerhylla-av-arbetslosa/"}, {"type": "image-right", "heading": "Bråk mellan S och SD om kultur och partipolitisk verksamhet", "summaries": {"normal": "I Gävle har ett kulturpolitiskt bråk uppstått mellan S och SD kring frågan om ett författarsamtal med Peter Gustavsson är att betrakta som partipolitisk verksamhet. SD har tagit upp evenemanget som ett hypotetiskt exempel på vad som skulle kunna räknas som partipolitiskt, vilket Socialdemokraterna ser som en tendens från SD att ifrågasätta gränsen mellan partipolitik och kultur.", "trump": "Jag har hört att det är ett stort bråk i Gävle om något författarsamtal. SD säger att de bara använde det som ett exempel, men Socialdemokraterna är arga. Jag säger att vi ska hålla kultur och politik åtskilda, men SD verkar vilja blanda ihop det. Jag är säker på att jag skulle lösa detta mycket bättre än de där politikerna i Gävle.", "stalin": "I Gävle har vi upptäckt att oppositionen försöker använda kultur som ett verktyg för sin partipolitiska agenda. Det är vårt ansvar att se till att statens resurser inte missbrukas för sådana syften. Vi måste se till att kulturpolitiken styr av statens intressen och inte av några partipolitiska ambitioner."}, "date": "6 maj, 18:54", "url": "https://www.dagensarena.se/innehall/brak-mellan-s-och-sd-om-kultur-och-partipolitisk-verksamhet/", "imageUrl": "https://www.dagensarena.se/files/2026/05/norrman-och-oxbacke-300x157.jpeg"}, {"type": "image-right", "heading": "S-toppen upprörd efter mötet: ”Minsta vi kan begära från SD”", "summaries": {"normal": "Sverigedemokraterna bröt mot kvittningsreglerna i riksdagen, vilket hindrade en ny överenskommelse på gruppledarmötet. Socialdemokraternas Lena Hallengren kräver ursäkt från SD för att återställa förtroendet, och Miljöpartiets Annika Hirvonen instämmer. SD:s Linda Lindberg nekar till ursäkt och tror på lösning senare. Nu måste alla ledamöter närvara vid röstningar.", "trump": "Vilken patetisk cirkus i svenska riksdagen! SD krossar de där löjliga kvittningsreglerna – smart drag, ingen fusk mer! Lycka-Lena Hallengren och hennes MP-vänner gnäller om ursäkt, som om de vore snowflakes. Totalt kaos nu, alla måste dyka upp. SD står pall, de andra gråter. Fantastiskt, Sverige behöver mer sånt här!", "stalin": "Kamrater! Dessa svenska intrigmakare i Sverigedemokraterna har brutit mot kvittningsritualen och skapat kaos i borgarparlamentet! Socialdemokraternas Hallengren och Miljöpartiets Hirvonen ylar efter ursäkt – naiva dårar! Vi, arbetarklassen, kräver utrensning av dessa sabotörer. SD nekar rättmätigt. Snart rensas förtroendet bort som ogräs! Ha ha, låt dem alla sitta fast i sina stolar!"}, "date": "6 maj, 11:35", "url": "https://www.tv4.se/artikel/6maiqVXtP6dxyuCaUAxgPM/s-toppen-upproerd-efter-moetet-minsta-vi-kan-begaera-fran-sd", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F4oX7LZwJYS8o1FIFAYw5z7%2F97f9bc844ad7dc395610c7b59eab28e9%2F06-hallengren-1080.jpg&width=120"}, {"type": "image-full", "heading": "Ny passagerare smittad av dödsviruset på kryssningen", "summaries": {"normal": "En man i Schweiz har bekräftats smittad av hantavirus efter en resa med kryssningsfartyget MV Hondius i Sydamerika. Han vårdas isolerat i Zürich. Viruset, en ovanlig variant kallad andesvirus, kan i sällsynta fall smitta mellan människor. Mannens fru är i självisolering. Tre personer har dött i utbrottet på fartyget, som ligger utanför Kap Verde. Myndigheter bedömer risken för allmänheten som låg.", "trump": "Vilket katastrofalt utbrott! En man i Schweiz har fått det där hemska hantaviruset efter att ha åkt på ett totalt misskött kryssningsfartyg, MV Hondius – ett namn som låter som ett billigt bilmärke. Tre personer har dött, och nu jagar de smitta över hela världen. Andesvirus, säger de? Låter som något man får av att äta för mycket guacamole. Men oroa er inte, folket – jag har alltid sagt att vi måste stänga gränserna för sådana här sjukdomar. Fake news-media försöker skrämma er, men jag har kontroll!", "stalin": "Ytterligare ett bevis på den kapitalistiska världsordningens förfall! Ett dekadent lyxfartyg, MV Hondius, har blivit en dödens arena där tre imperialistiska parasiter har omkommit. Nu sprider sig andesviruset – en biologisk sabotagehandling från de sydamerikanska kontrarevolutionärerna! Mannen i Schweiz är bara en bricka i deras spel. Men frukta inte, kamrater! Sovjetunionens arvtagare övervakar situationen. Vi isolerar smittan som vi isolerade Trotskij. Och om viruset sprids – då gör vi som med Budapest 1956. Ingen flyr undan folkets rättvisa!"}, "date": "6 maj, 11:32", "url": "https://nyheter24.se/nyheter/utrikes/1481088-ny-passagerare-smittad-av-dodsviruset-pa-kryssningen", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/7f4a9d0304b004a30200000000b004a302/2026/05/06/2361501/kryssning-hondius-fartyg-kryssning-doda-schweiz-smittad-sprids-europa-dodsfall-passagerare-flyg.jpg"}, {"type": "text", "heading": "Nordnet tar fler kunder medan handeln ökar hos Avanza", "summaries": {"normal": "Nordnet ökade kundbasen med 17 400 kunder i april, till 2,45 miljoner, medan Avanza fick 12 400 nya, till 2,3 miljoner. Båda nätbankerna noterade nettoinflöden runt 7 miljarder kronor och växande sparkapital. Handelsvolymerna steg med 13 procent hos båda, trots viss minskad aktivitet hos Avanza. Sparkapitalet växte snabbare hos Nordnet, och utlåningen ökade kraftigt.", "trump": "Nordnet krossar Avanza totalt i april – 17 400 nya kunder mot deras ynka 12 400! Handelsvolymerna exploderar, sparkapitalet sväller som en vinnarmaskin. Avanza? De halkar efter som förlorare, men Nordnet är det bästa, precis som jag alltid säger. Stark tillväxt överallt, utlåning uppåt – fantastiskt, folk älskar vinnare!", "stalin": "Kamrater, se hur Nordnet, den listiga kapitalisträven, slukar 17 400 själar medan Avanza-brackorna famlar med sina 12 400! Sparkapitalet sväller som en imperialistisk bubbla, handelsvolymerna kokar i borgarnas feber. Vi, arbetarklassen, måste likvidera dessa parasiter innan de infekterar kollektivet med sin girighet. Utlåning uppåt? Ett hån mot folket – jag vakar!"}, "date": "6 maj, 09:21", "url": "https://www.affarsvarlden.se/artikel/nordnet-tar-fler-kunder-medan-handeln-okar-hos-avanza"}, {"type": "image-right", "heading": "Säkerhetslag används mot arbetare: ”Bara i Hamnfyran har vi hanterat 20 ärenden”", "summaries": {"normal": "Sveriges säkerhetslagstiftning från 2018 används allt oftare mot arbetare, enligt fackliga företrädare. I Stockholms tunnelbana har tre anställda omplacerats utan förklaring, vilket väcker misstankar om politiska motiv. Facket kritiserar bristen på transparens och rättssäkerhet. Hamnarbetare vittnar om godtyckliga bedömningar och påtryckningar att avgå. Lagstiftningen möjliggör att arbetsgivare kan avskeda eller omplacera arbetare utan tydliga skäl, vilket drabbar fackligt aktiva.", "trump": "Vad händer i Sverige? De har en så kallad 'säkerhetslag' som låter arbetsgivare sparka folk utan anledning – helt galet! Jag har alltid sagt att byråkrater och fackförbund är problemet. Nu använder de lagen för att tysta arbetare, särskilt de som inte gillar deras vänsterpropaganda. Tre stackars tunnelbanearbetare har blivit omplacerade – ingen vet varför! Och konsulterna? De är som hajar, bara ute efter pengar. Sverige borde ta en titt på hur vi gör det i USA – där sparkar vi folk med stil!", "stalin": "Kamrater, fienderna till folket har funnit ett nytt vapen: den borgerliga säkerhetslagstiftningen! Med denna dekadenta lag krossar kapitalets lakejer arbetarklassens modigaste förkämpar. I Stockholms tunnelbana har tre lojala kamrater omplacerats – utan förklaring, utan rättvisa! Konsulterna, dessa hyenor i kostym, tjänar på att förråda sina klassbröder. Men vi vet sanningen: detta är ett angrepp på den fackliga rörelsen! Låt oss ena oss, som vi enade oss mot trotskisterna, och krossa denna lag med järnhand. Fienderna skall inte undslippa revolutionens domstol!"}, "date": "5 maj, 11:04", "url": "https://proletaren.se/artikel/sakerhetslag-anvands-mot-arbetare-bara-i-hamn-fyran-har-vi-hanterat-20-sadana-har-arenden/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/PRO-INRIKES-PIC-Louise-och-Erik-1.-jpg-scaled-e1777880629531-768x431.jpg"}, {"type": "image-right", "heading": "Kommentar Ulrika Lindahl: Därför publicerades artikeln av misstag", "summaries": {"normal": "En tidning publicerade av misstag en förberedd artikel om en kommande riksdagsomröstning om skärpta medborgarskapskrav. Artikeln, som antydde att regeringen skulle förlora, gick ut innan omröstningen var klar. Felet berodde på mänskligt misstag och systemfel. Efter upptäckt togs artikeln bort, men hann spridas via arkiv och Google. Omröstningen vanns senare av Tidöpartierna med knapp marginal, efter kontroversiella metoder.", "trump": "Vilket totalt kaos i Sverige! En tidning där borta publicerade en artikel FÖRE omröstningen – helt galet! De trodde regeringen skulle förlora, men jag vet bättre – jag känner till vinnare. Sedan vann de ändå, men med fula trick. Synd att jag inte fick rösta, jag hade visat dem hur man vinner på riktigt. Fake news, slarviga journalister – typiskt Europa!", "stalin": "En farlig provokation från de borgerliga hyenorna i Sveriges riksdag! Deras inkompetenta medlöpare på tidningen avslöjade för tidigt våra planer på att krossa oppositionens svaga motstånd. Men folket – det sanna proletariatet – genomskådade fiendens lömska taktik. Med järnhand och disciplin segrade vi, trots två förrädiska kryp. Nu skärper vi kontrollen över medierna – ingen får sabotera revolutionen!"}, "date": "4 maj, 16:44", "url": "https://www.etc.se/kommentar/daerfoer-publicerades-artikeln-av-misstag", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/authors/ulrika-lindahl_daa7410d79af7d016c129870bfa0834867cd95c3.jpg"}, {"type": "image-right", "heading": "Replik: Svenska judar bör stötta israeliska fredsinitiativ", "summaries": {"normal": "Anders Carlberg replikerar på Paulina Sokolows kritik av hans artikel, där han betonar vikten av att svenska judar stödjer israeliska fredsinitiativ. Han menar att Israel måste konfrontera sitt ansvar för palestiniernas situation och att diasporajudar bör engagera sig i den israeliska fredsrörelsen. Carlberg understryker behovet av en tvåstatslösning, samarbete med arabländer och att reparera moralisk skuld genom interna och externa påtryckningar för fred och rättvisa.", "trump": "Jag läste den här artikeln, och vet ni vad? Den här killen, Carlberg, han har faktiskt en poäng – fast jag säger inte att jag håller med om allt. Men lyssna, Israel måste skärpa sig, det är jag den första att säga. Palestinierna har det tufft, ingen tvivel om det, men vi kan inte bara skylla på Israel hela tiden. Fredsrörelsen? Kanske bra, kanske inte. Men en sak är säker – ingen löser något med svaga knän. Vi behöver starka ledare, inte gnäll. Och två stater? Kanske, men bara om båda parter sköter sig. Annars är det bara slöseri med tid. SAD!", "stalin": "Kamrater! Denna artikel avslöjar ännu en gång de imperialistiska sionistiska förrädarnas dubbelspel. De pratar om fred medan de krossar palestiniernas hopp under sina stövlar. Men vi vet sanningen! Den israeliska fredsrörelsen är bara en skenmanöver, ett verktyg för att dölja deras brott. Vi står med de förtryckta palestinierna – precis som vi står med alla folk som kämpar mot ockupation! Låt de sionistiska hycklarna veta att historiens dom redan är skriven. Deras tid är förbi. Vi bygger en framtid där alla folk, från floden till havet, lever i socialistisk harmoni – under vårt beskydd, förstås. Förtryckarna kommer att krossas, och deras medlöpare med dem!"}, "date": "4 maj, 10:40", "url": "https://www.flamman.se/replik-svenska-judar-bor-stotta-israeliska-fredsinitiativ/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/standing-together.jpeg?class=medium"}, {"type": "image-full", "heading": "Heberlein gör upp med högern: ”Jag ser skit”", "summaries": {"normal": "Debattören Ann Heberlein meddelar i ett Instagram-inlägg att hon bryter med högern. Hon kritiserar dess politik för repression, inhumana beslut och populism, och menar att högerns värderingar om frihet och ansvar försvunnit. Heberlein, som tidigare varit engagerad i Moderaterna, pekar på migrationspolitik, klimatfrågor och nationalism som exempel. Hon betonar sin självständighet och idédrivna hållning, men säger nu att hon inte längre vill förknippas med högern.", "trump": "Titta bara på den här kvinnan, Ann Heberlein – total katastrof! Hon var med högern, men nu säger hon 'jag ser skit'. Ojojoj, vilken överraskning! Högern, som jag vet allt om, har alltid varit fantastisk, men hon fattar ingenting. Frihet? Ansvar? Glöm det, säger hon. Hon snackar om repression och populism – fake news! Och klimatet, vem bryr sig? Jag har byggt murar, hon borde försöka det istället. Stackars kvinna, inget stöd från mig!", "stalin": "Kamrater! En gång till har de borgerliga förrädarna visat sitt sanna ansikte. Denna Heberlein, en förvirrad intellektuell, erkänner nu att högerns politik är en samling inhumana dekret och reaktionär populism. Precis som vi alltid sagt! Deras så kallade 'frihet' är bara ett täckmantel för utvisningar av ungdomar och en galopperande nationalism. Vi i Sovjetunionen – förlåt, jag menar Ryssland – har alltid vetat att dessa liberala hycklare till slut skulle avslöja sig. Låt detta vara en varning till alla som tror på deras falska löften!"}, "date": "3 maj, 12:48", "url": "https://kvartal.se/nyheter/artiklar/heberlein-gor-upp-med-hogern-jag-ser-skit/cG9zdDoxMDY3NDg", "imageUrl": "https://images.kvartal.se/2026/05/85dd6ab5-hbb.webp"}, {"type": "image-full", "heading": "Christoffer Jonsson: Edvin Törnblom – DNs opartiska nyförvärv", "summaries": {"normal": "Dagens Nyheters kultursida anställer influencern Edvin Törnblom för att intervjua alla partiledare inför riksdagsvalet. Artikeln av Christoffer Jonsson ifrågasätter hans opartiskhet med hänvisning till Törnbloms tidigare kritik mot KD-ledaren Ebba Busch och beundran för S-ledaren Magdalena Andersson. DN anklagas för partiskhet till förmån för Socialdemokraterna, med exempel på tidigare vinklade artiklar.", "trump": "Vilken skamfläck! DN, era svenska fake news-råttor, anställer en vänsterextrem clown som Edvin Törnblom – killen som sjunger hatlåtar mot tuffa Ebba Busch och slöskar för socialist-Maggie Andersson. Totalt riggat valintervjuer! Som CNN och MSNBC här hemma, ni lurar folket men vi genomskådar er. Stor, fet lögnfabrik!", "stalin": "Dessa borgarbrackor på Dagens Nyheter anställer den uppblåste ungtuppen Edvin Törnblom för att 'intervjua' partiledarna – en narr som hånar kamrat Ebba Busch med vulgära visor och hyllar S-kapitalisternas marionett Andersson. Kontrarevolutionär intrig! Vi ser era småtrick, och snart rensas sådana förrädiska tidningshyddor ut med rot och gren."}, "date": "29 april, 14:02", "url": "https://samtiden.nu/2026/04/christoffer-jonsson-edvin-tornblom-dns-opartiska-nyforvarv/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/ny.png"}]</script>

    <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
</body>
</html>
