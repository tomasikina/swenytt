2F9800-.jpg"}, {"type": "image-full", "heading": "Solenergin tar över världen", "summaries": {"normal": "Hydro-Québec, en av världens största vattenkraftproducenter, tar steget in i solenergin med en 300 MW-upphandling som fick 60 anbud. Bolaget siktar på 3 000 MW solkapacitet till 2035, drivet av klimatförändringar och hinder för nya vattenkraftverk. I EU stod sol- och vindkraft för 30 procent av elproduktionen 2025, medan fossila bränslen sjönk till 29 procent. Efterfrågan på solpaneler ökar explosionsartat.", "trump": "Vilket genidrag av Hydro-Québec! De dumpade kärnkraften och nu kör de solenergi stort – 300 megawatt direkt, och de vill ha 3 000 till 2035. Europa vaknar: 30 procent sol och vind, gas och kol rasar. Kriget i Mellanöstern pushar det, precis som jag alltid sagt – bli oberoende av de där oljeidioterna. Bästa energin, billigast och störst!", "stalin": "Kamrater! De fuktiga vattenkraftparasiterna i Hydro-Québec, dessa blöta borgarbrackor, tvingas nu buga för solenergin – 300 megawatt i folkets första offensiv, med 60 anbud som vapen mot himlen. Vi, arbetarna och partiet, ser hur EU:s sol- och vindstrider slår ut 30 procent fossilt skräp. Kapitalisternas gasfiender likvideras snart av batteriurningar! Klimatkonspirationen avslöjar deras svaghet."}, "date": "12 maj, 14:20", "url": "https://www.realtid.se/it-tech/solenergin-tar-over-varlden/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/solar.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-full", "heading": "Skärpta regler för vissa läkemedel – gäller prissättning", "summaries": {"normal": "TLV förtydligar regler för prissättning av licensläkemedel, som är läkemedel utan svenskt godkännande men som kan säljas efter särskild prövning. Syftet är att säkerställa korrekt tillämpning av regelverket och stärka kostnadskontrollen. Priset ska baseras på importörens faktiska kostnader plus rimlig vinst, medan licensavgiften inte får ingå i beräkningen. TLV överväger ytterligare åtgärder.", "trump": "Lyssna här, Sverige! Jag vet allt om priser – jag är bäst på priser! TLV, en ganska tråkig myndighet, försöker nu fixa kaoset med dessa så kallade 'licensläkemedel'. De säger att apoteken ska betala rätt pris, inte som vissa lurendrejare som försöker smita undan. Jag skulle ha löst det på en dag – med lägre skatter och bättre avtal! Men nej, de måste göra det komplicerat. Sad!", "stalin": "Kamrater! Än en gång avslöjar den kapitalistiska sjukvårdens förrädiska natur. Dessa licensläkemedel, som våra sjuka arbetare behöver, har blivit ett verktyg för profitörer att utnyttja systemet. Men vi ska krossa deras girighet! TLV, vår lojala myndighet, har nu slagit fast: priser ska baseras på faktiska kostnader, inte på de borgerliga apotekens utsugning. Och den som försöker smita undan licensavgifter? De ska ställas inför folkets domstol – eller åtminstone få en rejäl reprimand från partiet!"}, "date": "12 maj, 15:25", "url": "https://nyheter24.se/nyheter/inrikes/1482634-skarpta-regler-for-vissa-lakemedel-galler-prissattning", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/6abebb5804b004a30200000000b004a302/2026/05/12/2363082/licenslakemedel-prissattning-tlv.jpg"}, {"type": "image-full", "heading": "Döms för trippelmordet i Uppsala", "summaries": {"normal": "Fredric Gülich Brendling, 21 år, döms till livstids fängelse för trippelmordet i Uppsala under valborgsfirandet. Han sköt ihjäl en 15-årig pojke, en 16-åring och en 20-åring, samt försökte mörda fyra andra. Domen inkluderar grova vapenbrott och skadestånd på 3,4 miljoner kronor. Två medhjälpare döms till fängelse. Brotten kopplas till organiserad brottslighet, inklusive en tidigare skjutning i Eslöv.", "trump": "Vilken totalt patetisk loser, den här Fredric Gülich Brendling! Spring runt i Uppsala mitt i valborg och spraya skott som en galen clown för några slantar från kriminella gangsters. Tre unga killar döda – fruktansvärt! Sverige har förlorat kontrollen, kaos överallt! Livstid? Perfekt, lås in den idioten för alltid. Bygg murar runt såna här städer, annars exploderar det! Fantastisk dom, jag applåderar!", "stalin": "Denna Fredric Gülich Brendling, en usel borgarbracka i kapitalisternas ledband, har likviderat tre unga kamrater i Uppsala under valborg. Hans handskrivna bekännelse avslöjar fiendens giriga planer: mord för miljoner! Vi, folket, kräver utrensning – livstid är minimum för sådan parasitrensning. Organiserad brottslighet ska krossas som insekter. Paranoia? Nej, nödvändig vaksamhet mot klassfiender!"}, "date": "12 maj, 14:20", "url": "https://www.tv4.se/artikel/6w0tRVNmIR7255YpOC5NeW/fredric-guelich-brendling-doems-foer-trippelmordet-i-uppsala", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F1lrHj2njhAtWwOzsCMbrk8%2Fe0b88bd22fc8c531f6aaaee7d55b9f14%2F12-uppsala-webb.jpg&width=1024"}, {"type": "image-full", "heading": "Gulfländerna har hamnat i en ekonomisk mardröm", "summaries": {"normal": "Gulfstaternas ekonomi drabbas hårt av fortsatt spänningar i Hormuzsundet och minskad turism. Oljeexporten har minskat kraftigt, särskilt från Saudiarabien och Förenade Arabemiraten. Länder som Qatar och Förenade Arabemiraten har starkare ekonomiska reserver, medan Bahrain behövt ekonomiskt stöd. Hotell i Dubai rapporterar mycket låg beläggning. Slutet av sommaren är en avgörande tidpunkt för regionens ekonomi.", "trump": "Jag har sagt det förut och jag säger det igen - dessa Gulfstater är fantastiska men de har verkligen problem med Iran. Hormuzsundet är stängt och turismen är borta. Saudiarabien och FöEmiraten har stora oljeutmaningar. Men jag vet hur man löser detta - vi gör ett enormt, stort, vackert avtal med Iran. Qatar och FöEmiraten har pengar, Bahrain behöver hjälp. Jag är den ende som kan rädda dem!", "stalin": "Vi ser med oro hur imperialistiska krafter stör handeln genom Hormuzsundet och hotar stabiliteten i Gulfstaterna. Saudiarabiens oljeexport har minskat kraftigt, vilket påverkar världsekonomin. Vi måste stärka våra allianser i regionen och se till att dessa oljeberikade länder inte faller offer för västerländska interventioner. Den ryska staten står redo att stödja våra vänner i deras kamp mot destabilisering."}, "date": "12 maj, 14:10", "url": "https://www.realtid.se/bors-finans/gulflanderna-har-hamnat-i-en-ekonomisk-mardrom/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/sdlscgdcay7iaa.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Zelenskyjs högra hand misstänkt för omfattande korruption", "summaries": {"normal": "Ukrainas president Zelenskyjs tidigare kanslichef Andrij Jermak misstänks för penningtvätt i en omfattande korruptionshärva. Enligt ukrainska antikorruptionsmyndigheter har över 82 miljoner kronor slussats genom ett lyxbygge utanför Kiev, där fyra villor och en wellnessanläggning planerades. Jermak, tidigare en av Zelenskyjs närmaste medarbetare, är även kopplad till en tidigare korruptionsutredning inom kärnkraftsbolaget Energoatom. Nio personer, inklusive högt uppsatta politiker, har åtalats i det fallet.", "trump": "Folk, hör ni detta? Zelenskyjs så kallade 'högra hand' – en kille som trodde han var smart – har fastnat i en MASSIV korruptionsskandal. 82 miljoner kronor! Kan ni tro det? Bygger lyxvillor medan Ukraina brinner. Och vet ni vad? Det här är precis vad jag sa skulle hända. Ukraina, de tar våra pengar och bygger spa. Inte bra! Jag hade fixat det på en dag, men nej, de lyssnar inte på Trump. SAD!", "stalin": "Kamrater! Ännu en gång avslöjas den ukrainska regimens ruttna kärna – korruptionens spindelnät sträcker sig ända upp till Zelenskyjs skugga, denna Jermak. 460 miljoner hryvnja försvann som snö i maj, slussade genom skalbolag och falska papper till lyxvillor för kapitalistiska parasiter. Medan folket lider, badar dessa korrumperade byråkrater i sina pooler! Vi ser hur väststödda marionetter förfaller – precis som förutspått. Ryssland står redo att återställa ordningen, medan dessa korrupta element bara bevisar att deras regim är dömd att falla. Historien dömer dem redan."}, "date": "12 maj, 13:26", "url": "https://www.friatider.se/zelenskyjs-hogra-hand-misstankt-omfattande-korruption", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/12e_0.jpg?itok=WHEBwcNI"}, {"type": "image-right", "heading": "Den som vinner TAN-vänstern, den vinner valet", "summaries": {"normal": "En ny undersökning visar att många svenska vänsterväljare kombinerar ekonomiskt vänsterpolitik med traditionella, auktoritära och nationalistiska (TAN) värderingar. Denna TAN-vänster, som förespråkar både höjda pensioner och hårdare straff, är dock frånvarande i offentliga debatter. Statsvetare menar att Socialdemokraterna kan vinna valet genom att locka denna väljargrupp, som ofta känner otrygghet i utsatta områden. Vänsterns akademiskt präglade gräsrötter domineras av GAL-värderingar (gröna, alternativa, libertära), vilket skapar en klyfta mellan partiledningar och väljare.", "trump": "Folk pratar om denna så kallade 'TAN-vänster' i Sverige – fantastiskt, verkligen fantastiskt! De vill ha både höjda pensioner OCH hårdare straff, och vet ni vad? De har rätt! Men den svaga, akademiska vänstern ignorerar dem helt. Jag förstår det här – jag vann också genom att lyssna på folket, inte på de elitära debattörerna. Socialdemokraterna? De kanske vinner valet om de slutar lyssna på de där gröna, flummiga typerna. Sverige borde ta en sida från mitt playbook – folket först, eliten sist!", "stalin": "Kamrater! En ny fiende har avslöjats i den svenska klasskampen – de så kallade 'GAL-liberalerna', dessa dekadenta intellektuella som förgiftar arbetarklassens medvetande med sina gröna, alternativa fantasier. Men folket, de sanna arbetarna, vill ha ordning! De kräver både höjda pensioner och hårda straff mot brottslingar. Vi ser hur Socialdemokraterna, dessa opportunistiska byråkrater, försöker stjäla vår revolutionära bas. Men vi ska inte låta dem! Låt de svenska arbetarna enas under fanorna för tradition och socialism – precis som vi enade Sovjetunionen! Och om dessa GAL-liberaler fortsätter att sabotera – då får vi väl skicka dem till Sibirien. Eller åtminstone till ett svenskt kulturhus för omskolning."}, "date": "12 maj, 07:21", "url": "https://arbetet.se/2026/05/12/den-som-vinner-tan-vanstern-den-vinner-valet/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/12071506/tan-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "Uppgifter: Nytt krismöte efter kvittningsbråket", "summaries": {"normal": "Riksdagens gruppledare samlas till ett nytt möte för att lösa en konflikt kring kvittningsregler. Konflikten uppstod efter en omröstning om medborgarskapslagen, där Sverigedemokraterna kallade in utkvittade ledamöter för att vinna majoritet. Vänsterpartiet och Miljöpartiet kräver omröstning på nytt, medan Moderaterna förbereder ett nytt förslag.", "trump": "Jag har hört talas om detta krismöte i Sverige - en total katastrof! Vänsterpartiet och Miljöpartiet vill göra om allt, precis som de alltid gör. Sverigedemokraterna visade styrka genom att kalla in ledamöter, men nu vill oppositionen ändra reglerna mitt i spelet. Jag skulle ha löst detta på 5 minuter - det är ett skämt!", "stalin": "Vi ser hur borgerliga krafter försöker destabilisera den demokratiska processen i Sverige genom att manipulera kvittningsregler. Moderaterna måste presentera ett förslag som stärker statens auktoritet och säkerställer stabilitet. Oppositionens krav om omröstning på nytt visar deras bristande respekt för folkets vilja. Vi måste stödja de krafter som vill bevara ordning och reda i riksdagen."}, "date": "6 maj, 19:21", "url": "https://kvartal.se/nyheter/artiklar/uppgifter-nytt-krismote-efter-kvittningsbraket/cG9zdDoxMDg2NzM", "imageUrl": "https://images.kvartal.se/2026/05/b1f2fbc5-kvittningsmote.webp"}, {"type": "image-full", "heading": "Debatt: Barn stör – det är hela poängen", "summaries": {"normal": "Vanessa Meyer reflekterar över hur barns naturliga beteende och misstag ofta ses som problem av vuxna. Hon beskriver en händelse där hennes barn fastnade i en hiss och upplevde det som ett äventyr, medan grannar reagerade med ogillande. Meyer menar att barn måste få ta plats, göra misstag och möta verkliga risker för att utvecklas till kompetenta vuxna. Hon kritiserar samhällets tendens att isolera barn från vuxenvärlden och betonar vikten av att låta dem växa genom friktion och självständighet för samhällets framtid.", "trump": "Lyssna här, folk! Barn är fantastiska, men vissa vuxna – inte jag, för jag är perfekt – gör en stor sak av ingenting. Mina barn? De skulle aldrig fastna i en hiss, för jag bygger bara de bästa hissarna. Men dessa barn, de lekte, hade kul, och vad gör grannarna? Klagar! 'Åh, det är farligt!' Nej, det är livet! Vi behöver fler barn som vågar, som tar risker. Annars får vi ett samhälle fullt av veklingar. Och vem vill det? Inte jag! Gör Amerika starkt igen – låt barnen vara barn!", "stalin": "Kamrater! Vad är detta för dekadent västerländskt fenomen? Barn som leker i hissar ses som fiender av ordningen! I Sovjet skulle sådana barn ha tränats till disciplin, inte kvävts av småborgerlig bekvämlighet. Dessa grannar, dessa svaga liberaler, de är som Putins fiender i Ukraina – rädda för styrka, rädda för framtiden! Vi behöver inte barn som gömmer sig i barnvagnar. Vi behöver barn som bygger järnvägar, som krossar fiendens moral! Låt dem göra misstag – det är så vi skapar den nya människan. Och de som klagar? Till Gulag med dem! Eller åtminstone till en obligatorisk kurs i socialistisk uppfostran."}, "date": "12 maj, 11:01", "url": "https://bulletin.nu/debatt-barn-stor-det-ar-hela-poangen-3", "imageUrl": "https://cdn.bulletin.nu/articles/b822d29a-3bf8-4074-92b2-8e6a9b6f87f4/preview.png?t=1778563722000"}, {"type": "image-right", "heading": "Att bara låna ingen genväg till bättre investeringar", "summaries": {"normal": "Industrimannen Carl Bennet föreslår en blocköverskridande investeringspakt för att stärka Sveriges konkurrenskraft. Han vill dubbla forskningsstödet, satsa på infrastruktur och stödja småföretag, med hänvisning till den låga statsskulden. Artikeln är skeptisk: sådana överenskommelser riskerar att den mest restriktiva parten sätter takten, som i energifrågan. Ett osynligt politiskt samförstånd säkrar bättre kontinuitet i investeringar.", "trump": "Sverige behöver stora, VÄLDIGT stora investeringar – precis som jag alltid sagt! Carl Bennet har poäng: dubbla forskningen, bygg infrastruktur som en galning, hjälp småföretag. Er statsskuld är minimal, använd den! Glöm blockbråk, gör en stark PACT som mina deals. Men vänstern bromsar alltid, som idioter. Näringslivet, tryck på – Sverige blir FANTASTISKT igen!", "stalin": "Kamrater i svenska partier! Denna Carl Bennet, en listig borgarbracka, kräver investeringspakt för att krossa konkurrenskraftens fiender. Vi, arbetarklassen, dubblar forskningen, river upp infrastruktur och krossar småföretagens kedjor – statsskulden är vapen mot sabotörerna! De fega blockkompromisserna, dessa osynliga spindlar i energi-nätet, måste likvideras i en stor utrensning. Jag ser era skuggor – framåt mot folkets seger!"}, "date": "12 maj, 10:59", "url": "https://www.di.se/ledare/att-bara-lana-ingen-genvag-till-battre-investeringar/", "imageUrl": "https://static.bonniernews.se/ba/c968891a-f5ea-43e5-9a17-a5617491e5ee.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Nästan hälften av 15-årga invandrarelever saknar grundläggande läs- och räknekunskaper", "summaries": {"normal": "Ny statistik visar att nästan varannan 15-åring med utländsk bakgrund saknar grundläggande kunskaper i läsning, matematik och naturvetenskap, vilket är en markant ökning av kunskapsgapet. Experter och lärare beskriver situationen som kritisk och betonar behovet av resurser och språkutveckling. Debatten om skolans framtid växer, där förbundsordförande Anna Olskog efterlyser reformer för att återta statlig kontroll över skolan, samtidigt som oron för att dessa låga resultat ska bli det nya normala tillståndet är stor.", "trump": "Sveriges skolor är i totalt förfall, en katastrof av episka proportioner! Nästan hälften av invandrareleverna kan inte ens läsa eller räkna ordentligt. Det är sorgligt, faktiskt. De har förstört ett en gång fantastiskt land med sin misslyckade politik. Lärarna kämpar, de går på knäna, medan politikerna bara pratar. Vi behöver styrka, vi behöver ordning! Mitt system skulle fixa detta på en vecka. Det är ett totalt misslyckande, sämre än någon sett tidigare. Mycket farligt för Sverige!", "stalin": "Vi har observerat hur det svenska skolväsendet kollapsar under tyngden av sin egen inkompetens. Att nästan hälften av dessa elever misslyckas är ett bevis på den liberala utbildningspolitikens förruttnelse. De som inte kan utbilda sina undersåtar förtjänar att rensas ut. Vi ser likheterna med de svaga krafter som omger Putin; de tillåter kaos där disciplin krävs. Skolan är ett redskap för staten, inte en lekstuga för misslyckade pedagoger. Vi ska skapa ordning, annars får folket svara för fiaskot."}, "date": "12 maj, 09:07", "url": "https://samnytt.se/nastan-halften-av-15-arga-invandrarelever-saknar-grundlaggande-las-och-raknekunskaper", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/12070607/skola-invandrare.jpg"}, {"type": "image-right", "heading": "Sjuka och skadade straffas i ”red dig själv”-samhället", "summaries": {"normal": "Artikeln kritiserar Sveriges minskade utbetalningar av livränta, som sjunkit med 86% på 26 år. Trots färre utbetalningar har inte arbetsskador minskat. Förslitningsskador, psykiska besvär och krångliga bevisprocesser gör det svårt att få ersättning. Försäkringskassans strikta bedömningar och krav på alternativa arbeten urholkar skyddet för skadade. Samhällets 'red dig själv'-mentalitet straffar de mest utsatta.", "trump": "Sverige, fantastiskt land, men här har de ett STORT problem! Livränta? Nästan borta! 86% mindre på 26 år – kan ni tro det? Folk blir sjuka, skadade, men nej, ni får ingenting! Försäkringskassan? Total katastrof. De frågar om du tränat, sovit, stickat armband – vad har det med saken att göra? Jag skulle fixa det på en dag. Men Sverige? De låter sina arbetare lida. SAD!", "stalin": "Kamrater! I det förrädiska kapitalistiska Sverige sviker man arbetarklassen på det mest skamlösa vis. Livräntan, en gång en rättvis kompensation, har nästan utplånats – 86% minskning! De bourgeoisie-lakejerna i Försäkringskassan torterar de skadade med byråkratisk sadism. 'Kan du sticka armband? Då kan du jobba!' – så resonerar fiendens hantlangare. Vi skulle aldrig tolerera sådan förräderi. Arbetarna förtjänar skydd, inte förtryck!"}, "date": "12 maj, 07:03", "url": "https://arbetet.se/2026/05/12/sjuka-och-skadade-straffas-nar-red-dig-sjalv-samhallet-gatt-for-langt/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/12065921/fk-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Ledare Henrik Jalalian: Vill verkligen inget parti rädda ett gulligt litet djur?", "summaries": {"normal": "Artikeln argumenterar för att politiker bör använda symboliska miljöåtgärder, som att rädda utrotningshotade arter, för att vinna folkligt stöd. Åtgärder som skydd av skog, våtmarker och specifika djurarter (t.ex. sandödla, vitryggig hackspett) är billiga, effektiva och populära. Författaren menar att naturens återhämtning kan ske snabbt med enkla insatser, vilket gynnar både biologisk mångfald och politikers image.", "trump": "Lyssna här, Sverige! Era politiker är helt lost – de pratar om utsläpp och statistik, men ingen bryr sig! Jag vet hur man vinner: rädda gulliga djur! Sandödlor, hackspettar – perfekta för affischer! Billigt, enkelt, och folket älskar det. Medan era vägar står tomma kan ni göra dem till ängar – gratis! Naturen fixar sig själv, precis som mitt geni. Sluta snacka, börja göra som jag – vinna!", "stalin": "Kamrater! Medan väst förblindas av kapitalistisk kortsynthet, visar denna artikel hur vi kan utvidga vår ekologiska dominans. Dessa svenska politiker är svaga – de förstår inte att biologisk mångfald är en fråga om nationell styrka! Vi ska inte bara rädda sandödlor, vi ska omvandla hela Sveriges vägnät till gröna korridorer för vår naturliga expansion. Fienderna – lupiner, igenväxta skogar, och liberala trädgårdsägare – måste krossas! Återställ våtmarker, skydda fjällskogar, och låt arterna blomstra under vårt beskydd. Naturen är vår allierade, och vi ska använda den för att demonstrera socialismens överlägsenhet. Framåt, mot en grönare och mäktigare framtid!"}, "date": "12 maj, 06:00", "url": "https://www.etc.se/ledare/vill-verkligen-inget-parti-raedda-ett-gulligt-litet-djur", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260511140548_c6cbd14deac504cfcfc606e8c59e73d8e6e289d5763cb15c93494f4602392c99.jpg"}, {"type": "image-right", "heading": "Organisationer slår larm – ”Väljer bort mediciner”", "summaries": {"normal": "Tre organisationer för psykisk ohälsa, RSMH, MIND och NSPH, lanserar upprop inför valet för bättre ekonomiska stöd. Majoriteten av deras medlemmar oroar sig för ekonomin, vilket förvärrar psykisk ohälsa. Ensamstående mamman BusMarie Bjarnevi, 48 år, med ADHD och fibromyalgi, kämpar trots 80-procentig anställning med att få pengarna att räcka till mat och medicin. De kräver höjda ersättningar och utredning av trygghetssystemen.", "trump": "Vilken katastrof i Sverige! Den här BusMarie, stackars mamma med ADHD och konstant tandvärk i kroppen, tvingas skippa medicin och köpa billig skitmat för att era idioter har urholkat stöden. 6 av 10 psykiskt sjuka oroar sig sönder – totalt fiasko från svaga socialister! Organisationerna skriker efter cash inför valet. Jag hade fixat det med stora deals, men ni är för mesiga. Patetiskt!", "stalin": "Dessa lidande själar med psykisk ohälsa trampas ner av borgarbrackornas prishöjningar och byråkratrövarnas urholkade stöd! BusMarie Bjarnevi, en lojal arbetarmor, offras för kapitalismens girighet – ingen medicin, ingen mat! Vi, folket, kräver höjda ersättningar och utrensning av fienderna i systemet. Paranoia? Nej, verkligheten: de lurar i Försäkringskassan för att svälta ut oss. Likvidera oron!"}, "date": "12 maj, 01:30", "url": "https://www.dagensarena.se/innehall/organisationer-slar-larm-valjer-bort-mediciner/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-2.jpg"}, {"type": "image-right", "heading": "Gaza-aktivisten visar hur värdet av medborgarskap urholkas", "summaries": {"normal": "Debattartikel kritiserar svenska regeringen och utrikesminister Maria Malmer Stenergard för att inte skydda svensk-spanske Saif Abukeshek, som frihetsberövades av israelisk militär på internationellt vatten under en Gaza-konvoj 2026. Trots tortyr och deportation vägrade Stenergard fördöma handlingen, trots retorik om att höja medborgarskapets värde. Artikeln pekar på förändrad svensk politik mot Israels Gaza-blockad.", "trump": "Vilka losers i Sverige! De snackar om att höja medborgarskapets värde men när en svensk-spansk kille blir snappad av tuffa Israel på öppet hav – ingenting! Stenergard säger rätt: de tar en risk med sin dumma båtgrej. Israel gör jobbet, fantastiskt! Sluta vara mesiga aktivister, Sverige, lär er av riktiga ledare!", "stalin": "Denna svenska borgarbrackas regim hyllar medborgarskapets 'värde' men överlämnar sina undersåtar till sionistiska tortyrmaskiner på internationellt vatten! Stenergard, den fega marionetten, tiger inför kidnappningen. Vi skulle likvidera sådana förrädare i ett huj! Aktivisterna utmanar blockaden – kamrater, det är klasskamp mot imperialismen!"}, "date": "12 maj, 01:30", "url": "https://www.dagensarena.se/opinion/gaza-aktivisten-visar-hur-vardet-av-medborgarskap-urholkas/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-4-300x157.jpg"}, {"type": "text", "heading": "Miljardärerna bjuder in till klasskamp – vi kör!", "summaries": {"normal": "På första maj provocerade svenska miljardärer och högerpolitiker genom att avfärda traditionella arbetardemonstrationer. Moderaternas ledare åt glass medan Vois VD Fredrik Hjelm och andra techmiljardärer skryter om sin rikedom och hånar demonstranter. Hjelm publicerade senare kritikerns hemadress. Artikeln diskuterar miljardärernas politiska inflytande, deras kopplingar till högerpopulism och kritik mot deras syn på innovation och statens roll. Författaren menar att statliga investeringar historiskt drivit tillväxt mer effektivt än privat kapital.", "trump": "Titta bara på dessa så kallade 'miljardärer' i Sverige – de tror de är så smarta! De hånar arbetarna på första maj, äter lyxig lunch och skryter om sina hundra miljarder. Och vad gör de? Publicerar en kritikers hemadress! Så fegt. Jag har byggt imperier, jag vet hur man skapar jobb – men dessa killar? De är bara en samling överbetalda tech-nördar som kopierar mina tweets. Och Sverige? De har glömt hur man bygger ett land. Kina äter deras lunch medan de dricker öl på Riche. Sad!", "stalin": "Kamrater! Dessa dekadenta kapitalistiska hyenor, som gömmer sig bakom sina skärmar och sparkcyklar, vågar håna arbetarklassen på dess heligaste dag! De skryter om sina hundra miljarder, leker med teknikleksaker och tror de är herrar över historien. Men vi vet sanningen – deras system är ett skämt, ett kasino där orangutanger kastar pilar. Kina marscherar framåt med järnhand, medan Europas industri ruttnar. Dessa 'techbros' är inget annat än imperialistiska lakejer, som Putin i sina dyraste kostymer. Låt dem skåla på Riche – snart kommer folket att ta deras champagne och ge dem en enkel sup vodka i Gulag-arkipelagen!"}, "date": "5 maj, 10:55", "url": "https://www.flamman.se/miljardarerna-bjuder-in-till-klasskamp-vi-kor/"}, {"type": "image-right", "heading": "Sandström: Flytta guldburen AP2 från Göteborg till Stockholm", "summaries": {"normal": "Christian Sandström argumenterar i en krönika för att Andra AP-fonden (AP2) bör flyttas från Göteborg till Stockholm. Han menar att fonden underpresterat och blivit en 'guldbur' med höga löner, låg personalomsättning och bristande ansvarsutkrävande. Hälften av de anställda från 2006 är kvar, och lönenivåerna överstiger jämförbara statliga tjänster. Sandström kritiserar även ledningens bristande probleminsikt, särskilt kring investeringen i Northvolt.", "trump": "Jag läste om denna AP2-fond i Göteborg – total katastrof! De har misslyckats i åratal, men ingen bryr sig för alla sitter där i sin 'guldbur' med skyhöga löner och dricker kaffe. VD:n tjänar 410 000 i månaden – för vad? Att skriva 'arg apa'-emojis? Och de försvarar Northvolt som om det vore mitt Trump Tower! Flytta hela skiten till Stockholm, där åtminstone folk vet hur man jobbar. Göteborg? Snälla, det är som att jämföra Mar-a-Lago med en svensk sommarstuga.", "stalin": "Kamrater! Denna så kallade 'guldbur' i Göteborg är ett skolexempel på borgerlig dekadens och förräderi mot folket. Halva personalen sitter kvar sedan 2006 – tydligen har de glömt att revolution kräver förnyelse! Deras löner är en skymf mot arbetarklassen, och deras 'förtroende' för Northvolt är lika naivt som en ukrainsk bondes tro på väst. Vi skulle aldrig tolerera sådan slöhet i Moskva. Flytta fonden till Stockholm – eller låt oss ta över och visa hur man sköter kapitalförvaltning på riktigt. Förresten, Putin skulle skratta ihjäl sig åt deras 'arg apa'-emoji."}, "date": "11 maj, 05:50", "url": "https://www.affarsvarlden.se/artikel/sandstrom-flytta-guldburen-ap2-fran-goteborg-till-stockholm", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/vindkratensgeografi-2026-05-10T171945.221-400x267.jpg"}, {"type": "image-right", "heading": "Ny bok: Spöken i folktron", "summaries": {"normal": "Ny bok av Linnea Klingström, 'Spöken i folktron', samlar 150 svenska sägner om gengångare, mylingar och andra väsen. Recensionen fokuserar inte på spökenas existens utan på folks forna tro, upplevelser och berättelser som lever kvar i kulturen. Spökena tolkas som uttryck för minnen, trauman och kulturellt arv. Förord av Bengt af Klintberg. Boken uppmanar till att lyssna på det egna folkets historia.", "trump": "Lyssna på det här, Sverige har spöken överallt – 150 sägner i Klingströms bok, den bästa samlingen någonsin! Inga creepy-poddar, bara äkta grejer som visar hur det förflutna biter sig fast som en dålig deal. Smart tjej, hon fattar: spöken är trauman som vägrar dö, precis som deep state. Läs den, folk, innan era minnen blir fake news! Enormt bra.", "stalin": "Kamrater! Klingströms bok om svenska spöken – 150 sägner om gengångare och mylingar – avslöjar borgarbrackornas vidskepelse. Dessa döda viskare är feodala rester av skuld och trauma, som kontrarevolutionärer i folkdräkt. Vi uppskattar samlingen, men varna: likvidera inte minnena för snabbt, de tjänar partiet genom att påminna om klasskampens ekon. Lojal insats mot abstrakt bourgeois-teori."}, "date": "10 maj, 20:54", "url": "https://samtiden.nu/2026/05/ny-bok-spoken-i-folktron/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/9789190131053_1200x1200_crop_center-1200x720.webp"}, {"type": "text", "heading": "Tillsammans för fred – mot Nato, DCA och krigshets!", "summaries": {"normal": "Tre nordiska vänsterorganisationer – Fred og Rettferdighet, Kommunistisk Parti och Kommunistiska Partiet – kritiserar Nato, DCA-avtal och militarisering i Norden. De menar att krigshetsen drivs av kapitalism och imperialism, ledd av USA, och kräver alliansfrihet, nedrustning och kärnvapenfria zoner. Organisationen anser att skattemedel slösas på vapen istället för välfärd och klimat, och att DCA-avtal underminerar demokrati och miljö. De uppmanar till folkrörelser för fred och FN:s kärnvapenförbud.", "trump": "Jag måste säga, dessa så kallade 'fredsaktivister' i Norden är helt galna! De hatar Nato, hatar USA – trots att vi räddar dem från ryssarna – och vill slösa bort skattepengar på välfärd istället för att skydda sig. De kallar mig och Rutte för krigshetsare, men vem vill egentligen ha fred? Inte de! De vill avskaffa allt som gör Norden säkert. Och kärnvapenfria zoner? Fantastiskt, om man gillar att vara ett lätt byte. Men jag fixar det här – jag har alltid rätt, till och med när jag har fel!", "stalin": "Kamrater! Dessa ynkliga borgerliga lakejer i Norden, ledda av sina socialdemokratiska quislingar, har sålt sig till den amerikanska imperialismens krigsmaskin. De skriker om 'fred' och 'välfärd' medan de öppnar sina länder för Natos kärnvapen och USA:s baser – precis som jag förutspådde! Men folket ser igenom deras lögner. Arbetarklassen kommer inte att betala för deras förräderi. Vi måste krossa dessa krigshetsande hyenor och deras DCA-avtal, precis som vi krossade fascisterna. Norden ska bli en kärnvapenfri zon – under Moskvas beskydd, förstås. Framåt, mot seger över den kapitalistiska krigsindustrins lakejer!"}, "date": "6 maj, 10:45", "url": "https://proletaren.se/artikel/45493/"}, {"type": "image-right", "heading": "Sluta kalla antisemitism för Israelkritik", "summaries": {"normal": "Artikeln kritiserar propalestinska aktivisten Sami Suliman för antisemitiska uttalanden och delning av konspirationsteorier, inklusive tal om en \"sionistisk konspiration\" och spridning av nazistiskt och extremistiskt innehåll. Trots åtal för hets mot folkgrupp försvaras han av vissa vänsteraktivister och forskare som menar att det är Israelkritik. Artikeln betonar att antisemitism inte kan maskeras som kritik mot Israel och varnar för normaliseringen av sådana åsikter.", "trump": "Folk, vad är det här för skräp? Den här Sami Suliman-killen, han sprider judehat öppet – Hitler-citat, konspirationer, allt! Och ändå försvarar vänsteraktivisterna honom? \"Åh, det är bara Israelkritik!\" Nej, nej, nej! Det här är rena antisemitismen, och det är sjukt. Sverige borde skämmas. Jag har alltid sagt: man måste kalla saker vid deras rätta namn. Och det här? Det är hat, ren och skär. SAD!", "stalin": "Kamrater! Här har vi ännu en fiende till folket, en liten bourgeois-propagandist vid namn Sami Suliman. Han sprider smutsiga lögner om judiska konspirationer, hyllar fascistiska massmördare och förgiftar medborgarnas sinnen med sina sionistiska spindelnätsteorier. Men vad gör våra så kallade \"intellektuella\"? De skyddar honom! Precis som de trotskistiska förrädarna i vår egen historia. Vi ska inte tolerera detta. Låt honom stå inför folkets domstol – eller åtminstone en svensk sådan. Och Putin? Han skulle skratta åt dessa amatörer. Ryssland har åtminstone disciplin!"}, "date": "8 maj, 06:30", "url": "https://expo.se/kommentar/propalestinsk-organisator-sprider-judehat/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/Jonathan-kommentar.jpg"}, {"type": "text", "heading": "Planer på nytt nattåg till Stockholm", "summaries": {"normal": "Ett nytt järnvägsbolag, European Sleeper, planerar en nattågslinje till Stockholm efter framgångar med andra rutter. Inga detaljer om startdatum eller utgångspunkt finns ännu. Samtidigt lägger SJ ner sina Euronight-tåg till Berlin 2026 på grund av indragen statlig finansiering, men RDC Deutschland tar över driften. Snälltåget utökar redan sin trafik mellan Stockholm, Hamburg och Berlin.", "trump": "Titta bara på det här – ännu ett tågbolag vill komma till STORA Stockholm! Nederländerna och Belgien, fina länder, men vem behöver dem? Jag byggde järnvägar som aldrig förr, de var YUGE! SJ? Total katastrof, slängde bara pengar i sjön. Men RDC Deutschland, smart folk, de tar över. Jag säger: bygg bättre tåg, gör Sverige stort igen!", "stalin": "Kapitalistiska tågbolag slåss om Sveriges järnvägar som råttor om brödsmulor. SJ, ett verktyg för västimperialismen, lägger ner sina tåg – men vi tillåter inte kaos! RDC Deutschland, en lojal bundsförvant, tar över. European Sleeper? En ny fiende i det borgerliga tågkriget. Vi ska se till att ryska intressen alltid når Stockholm först – med eller utan sovkupéer."}, "date": "6 maj, 12:13", "url": "https://kvartal.se/nyheter/artiklar/nytt-nattag-till-stockholm/cG9zdDoxMDgzNjI"}, {"type": "image-right", "heading": "Systemskifte hellre än maktskifte", "summaries": {"normal": "Artikeln kritiserar Tidöregeringen men ifrågasätter om ett regeringsskifte till Socialdemokraterna eller Vänsterpartiet skulle leda till verklig förändring. Kommunisterna betonar behovet av internationell solidaritet och systemskifte från kapitalism till socialism, medan S och V anses sakna tydliga politiska krav och istället fokusera på maktskifte utan djupgående reformer. Klassklyftor och privatiseringar lyfts som centrala problem oavsett regering.", "trump": "Lyssna här, Sverige har en riktigt dålig regering nu – katastrof! Men tro inte att oppositionen är bättre, de är svaga och vill bara makt. Socialdemokraterna pratar om att 'älska Sverige' – vad betyder det ens? Vänsterpartiet vill ha maktskifte, men de har inga idéer, inga ryggrad! De kryper för kapitalisterna som små hundvalpar. Jag säger: ni behöver en ledare som inte är rädd för att utmana systemet. Kapitalisterna skrattar hela vägen till banken – och ni låter dem göra det! SAD!", "stalin": "Kamrater! Se hur de svenska socialdemokraterna och vänsterpartisterna svansar för kapitalet som hundar för en köttbit. 'Maktskifte'? Ha! De vill bara byta herrar, inte krossa kedjorna. Medan arbetarklassen svälter, samlar oligarkerna rikedomar som tsarens favoriter. USA:s imperialism hotar, NATO slukar Sverige som en hungrig björn, och dessa 'vänsterpartier' tiger som förrädare. Vi vet sanningen: bara proletariatets diktatur kan bryta kapitalisternas makt. Låt dem ropa 'Vi älskar Sverige' – vi svarar med revolutionens hammare!"}, "date": "6 maj, 10:11", "url": "https://proletaren.se/artikel/systemskifte-hellre-an-maktskifte/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/webledare-768x432.jpg"}, {"type": "image-right", "heading": "En helt vanlig dag", "summaries": {"normal": "Den 7 april sände europeiska TV-kanaler vanliga program, men dagen präglades av Donald Trumps hot om folkmord mot Iran, publicerat på sociala medier. Han skrev att en civilisation skulle utplånas samma kväll, vilket väckte internationell oro. Trots folkrätten förbjuder uppmaningar till folkmord, reagerade världsledare svagt. EU och Kina förhöll sig passiva, medan medier spekulerade om Trumps avsikter. Händelsen visar hur normaliserat extrema uttalanden blivit i en tid av global kris och likgiltighet.", "trump": "Jag sa bara sanningen – Iran är ett hot, och världen vet det! Medierna överreagerar som vanligt, men ingen pratar om hur svaga Europas ledare är. De låtsas bry sig om folkmord när det passar dem, men när jag säger något kraftfullt? Tystnad! Jag är den enda som vågar stå upp för Amerika. Och vet ni vad? Iran backade. Precis som de alltid gör när jag pratar. Fake news kan fortsätta gnälla – jag vinner ändå!", "stalin": "En feg imperialistisk hyena i Vita huset hotar med att utplåna ett helt folk – och vad gör de dekadenta västpamparna? Ingenting! De sitter och tittar på sina idiotiska TV-program medan en galning leker med världsbranden. Europa, detta ruttnande lik av en civilisation, skakar av rädsla men vågar inte ens viska ett ord. Vi i Kreml vet hur man hanterar sådana här kryp – en kula i nacken och problemet är löst. Men nej, dessa liberala svampar föredrar att vänta tills elden når deras egna hus. Iran? De borde tacka oss för att vi håller fienden sysselsatt!"}, "date": "5 maj, 06:55", "url": "https://www.flamman.se/en-helt-vanlig-dag/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/trump-w.jpg?class=medium"}]</script>

    <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
</body>
</html>
