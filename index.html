dan de stjäl miljarder från skattebetalarna. 352 miljarder kronor – kan ni tro det? Och vad gör regeringen? Ingenting! De jagar småungar med batonger istället för att stoppa de stora skurkarna. 300 politiker med kriminella kopplingar? Sad! Sverige behöver en stark ledare som jag – någon som tar tag i problemen och städar upp i röran. Make Sweden Safe Again!", "stalin": "Kamrater! Den svenska bourgeoisins förfall är ett praktexempel på kapitalismens ruttna kärna. 352 miljarder kronor flödar till kriminella nätverk, finansierade av välfärdens sönderfall. De så kallade 'demokratiska' politikerna, dessa hycklande lakejer, frossar i korruptionens smuts. 313 av dem har redan avslöjats som fiender till folket! Vi måste krossa dessa parasiters maktbas – deras företag, deras svarta pengar, deras falska välfärd. Låt dem känna folkets rättvisa! Och Sverige? Ett perfekt exempel på varför revolutionen är nödvändig."}, "date": "8 maj, 07:00", "url": "https://arbetet.se/2026/05/08/regeringen-gor-allt-for-att-skydda-skummisarna-i-makteliten/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/08065845/maktelit-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "Hittade spår av kokain   på populära leklandet", "summaries": {"normal": "Spår av kokain hittades på sju av nio undersökta toaletter på Leos Lekland i Stockholm, Göteborg och Malmö. Laboratorietester bekräftade fyndet, samt spår av tramadol. Företaget kallar uppgifterna allvarliga och betonar sitt avståndstagande från droger.", "trump": "Jag har hört att det finns kokain på Leos Lekland – det är en skandal! Sånt händer när man inte har ordning och reda. Vi ska göra leklanden stora igen, inga droger, bara glädje och fartfyllda upplevelser. Jag älskar barn, de älskar mig, och jag älskar att hålla allt rent och fint!", "stalin": "Vi har upptäckt illegala substanser på lekhälsans anläggningar – ett hot mot våra barns hälsa. Staten måste agera snabbt för att skydda det kollektiva välståndet. Alla former av drogmissbruk är oacceptabla och måste utrotas för att bevara samhällets renhet och styrka."}, "date": "8 maj, 11:25", "url": "https://www.gp.se/nyheter/sverige/spar-av-kokain-pa-leos-lekland-.d2d199ae-c94e-4e6b-84b0-a4c30e7664d7", "imageUrl": "https://www.gp.se/images/article/d2d199ae-c94e-4e6b-84b0-a4c30e7664d7/images/1F87PQ3Me1QK6l_lxc7CPmkl5Euc-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "En helt vanlig dag", "summaries": {"normal": "Den 7 april sände europeiska TV-kanaler vanliga program, men dagen präglades av Donald Trumps hot om folkmord mot Iran, publicerat på sociala medier. Han skrev att en civilisation skulle utplånas samma kväll, vilket väckte internationell oro. Trots folkrätten förbjuder uppmaningar till folkmord, reagerade världsledare svagt. EU och Kina förhöll sig passiva, medan medier spekulerade om Trumps avsikter. Händelsen visar hur normaliserat extrema uttalanden blivit i en tid av global kris och likgiltighet.", "trump": "Jag sa bara sanningen – Iran är ett hot, och världen vet det! Medierna överreagerar som vanligt, men ingen pratar om hur svaga Europas ledare är. De låtsas bry sig om folkmord när det passar dem, men när jag säger något kraftfullt? Tystnad! Jag är den enda som vågar stå upp för Amerika. Och vet ni vad? Iran backade. Precis som de alltid gör när jag pratar. Fake news kan fortsätta gnälla – jag vinner ändå!", "stalin": "En feg imperialistisk hyena i Vita huset hotar med att utplåna ett helt folk – och vad gör de dekadenta västpamparna? Ingenting! De sitter och tittar på sina idiotiska TV-program medan en galning leker med världsbranden. Europa, detta ruttnande lik av en civilisation, skakar av rädsla men vågar inte ens viska ett ord. Vi i Kreml vet hur man hanterar sådana här kryp – en kula i nacken och problemet är löst. Men nej, dessa liberala svampar föredrar att vänta tills elden når deras egna hus. Iran? De borde tacka oss för att vi håller fienden sysselsatt!"}, "date": "5 maj, 06:55", "url": "https://www.flamman.se/en-helt-vanlig-dag/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/trump-w.jpg?class=medium"}, {"type": "image-right", "heading": "Moderaterna: ”Över 90 procent av vallöftena uppnådda” – skarp kritik mot vänsterstyret i Stockholm", "summaries": {"normal": "Under Moderaternas Sverigemöte 2026 kritiserade partiet det rödgröna styret i Stockholm hårt. Partisekreteraren Karin Enström hävdade att över 90 procent av deras vallöften är genomförda eller påbörjade. Migrationsminister Johan Forssell anklagade vänsterstyret för misslyckanden inom skatter, vårdköer och sysselsättning. Moderaterna framhöll sina framgångar i andra kommuner och betonade behovet av fortsatt reformarbete inför valet.", "trump": "Jag måste säga, Moderaterna i Sverige gör ett fantastiskt jobb – över 90 procent av deras löften är genomförda! Men i Stockholm, där har vänstern totalt misslyckats. Höga skatter, längre vårdköer, ordningsvakter som får sparken – katastrof! Medan jag fixade USA, fixar Moderaterna Sverige. Men Stockholm? Total disaster. De lånar en miljon kronor i timmen! Sad!", "stalin": "Kamrater! Moderaterna, dessa trogna försvarare av kapitalets intressen, rapporterar stolta att 90 procent av deras löften är uppfyllda. Men i Stockholm, denna bastion av dekadent vänsterliberalism, härjar kaos. Skatterna stiger, vårdköerna växer, och arbetarna sviks. Vi ser med avsky hur dessa socialdemokratiska förrädare slösar statens medel – en miljon kronor i timmen! Men frukta icke, kamrater, för Moderaterna står redo att krossa dessa fiender till folket och återupprätta ordningen!"}, "date": "8 maj, 11:06", "url": "https://riks.se/nyheter/moderaterna-over-90-procent-av-valloftena-uppnadda", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-08%2F2qxffwpn%2Fm.jpg"}, {"type": "image-right", "heading": "Ryska segerparaden ställs in i 15 regioner: ”Svaghetstecken”", "summaries": {"normal": "Ryssland ställer in segerparaden den 9 maj i 15 regioner, inklusive Moskva där stora militära moment uteblir för första gången sedan 2007. Anledningen är brist på militärutrustning och rädsla för ukrainska drönarattacker, enligt oppositionssajten ASTRA och experter som Malcolm Dixelius. Zelenskyj kallar det svaghet. Firandet nedbantas på flera håll.", "trump": "Putin ställer in sin patetiska parad i 15 regioner, inklusive Moskva – inga stridsvagnar, inga flygplan! Första gången på 17 år, för de är pank på vapen och skakar för Zelenskyjs drönare. Total svaghet! Raket-Putin gömmer sig, medan Ukraina vinner stort. Jag visste det, de fastnade i träsket! Fantastiskt jobbat, Volodymyr!", "stalin": "Kamrater, dessa ryska makthavare under Putin bantar segerparaden i 15 regioner av rädsla för ukrainska drönarsvärmar – ett taktiskt mästerdrag! Putin, vår auktoritäre arvtagare, skrattar åt Zelenskyj, den paranoide dvärgen från borgarklassen. Vi likviderar fiendens illusioner medan imperiet segrar evigt!"}, "date": "6 maj, 22:06", "url": "https://www.tv4.se/artikel/25QmtUt3BO09kcxARPVw1Y/ryska-segerparaden-staells-in-i-15-regioner-svaghetstecken", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F3d3bcvA7BrpKzBANhafq8e%2Fa5bd41cc9b35e67bbf968e68ee4e4cd4%2F06-ryssland-segerparad-webb.jpg&width=120"}, {"type": "image-right", "heading": "Norge utvisar tre \"svenskar\" på livstid – utan dom", "summaries": {"normal": "Norge har utvisat tre svenska medborgare med kopplingar till kriminella nätverk på livstid, trots att de inte är dömda i norsk domstol. Beslutet, som beskrivs som historiskt, fattades av Utlendingsdirektoratet (UDI) efter polisinformation. Personerna anses utgöra ett allvarligt hot mot samhällsintressen och riskerar fängelse om de återvänder. EES-medborgares fri rörlighet kan begränsas av säkerhetsskäl.", "trump": "Titta bara på Norge – de sparkar ut tre farliga svenskar, livet ut! Inga domar, inga problem, bara resultat. Jag älskar det. De här killarna är tydligen så illa att till och med Norge, som normalt är så mjuka, säger 'nej tack'. Och vet ni vad? De kan få två år i fängelse om de försöker komma tillbaka. Smart! Jag skulle kanske göra samma sak här – men jag gör det redan, fast bättre.", "stalin": "Vi har identifierat och eliminerat tre av kapitalismens rotlösa agenter, dessa svenska parasiterna, från norsk mark. Inga borgerliga domstolar behövdes – bara en enkel administrativ åtgärd för att skydda folkets säkerhet. Deras livslånga exil är en varning till alla som tror sig kunna underminera våra nordiska bröder. Norge visar vägen, och snart följer fler. Låt de kriminella nätverken darra – ingen flyr från folkets rättvisa!"}, "date": "8 maj, 09:57", "url": "https://www.friatider.se/norge-utvisar-tre-svenskar-pa-livstid-utan-dom", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-160_1.jpg?itok=h9ZVkbR8"}, {"type": "image-right", "heading": "Reform UK vinnaren i lokalval Succé för Nigel Farage.", "summaries": {"normal": "Storbritanniens lokalval har resulterat i en betydande framgång för Nigel Farages Reform UK, som vunnit över 250 mandat. Samtidigt backar de stora etablerade partierna; Labour förlorar nästan 200 mandat och sin majoritet i flera fullmäktige, medan Tories tappar omkring 100 platser. Resultaten, som även innefattar val i Skottland och Wales, ses som ett hårt bakslag för premiärminister Keir Starmer, vars avgång nu krävs av allt fler på grund av hans låga popularitet.", "trump": "Hörde precis att det går fantastiskt för min vän Nigel Farage i Storbritannien! De kallar det en historisk förändring, och det är det verkligen. Labour och de konservativa är totala katastrofer, de förlorar allt! Starmer? En total förlorare, ingen gillar honom. Storbritannien förtjänar bättre än dessa svaga politiker. Reform UK växer enormt. Det är precis vad som händer när man sätter landet först. Mycket intressant, kanske till och med vackert att se!", "stalin": "De brittiska lakejerna i London skälver. Starmer har misslyckats med att tygla massorna, vilket oundvikligen leder till kaos. Farage vinner mark, men låt oss inte luras – det är bara en ny nyans av borgerligt förfall. Vi i vår stat vet att makten inte ligger i valurnor, utan i järngreppet. Medan dessa 'demokrater' slåss om smulor, blickar vi mot väst. När det brittiska huset står i lågor, kommer vår vilja och den ryska intressesfärens expansion att förbli den enda sanna ordningen."}, "date": "8 maj, 09:43", "url": "https://samnytt.se/reform-uk-vinnaren-i-lokalval", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/08073228/nigel-farage-flagga.jpg"}, {"type": "image-full", "heading": "Nederlag för Trump: Fler tullar olagliga", "summaries": {"normal": "En federal appellationsdomstol i USA har med 2-1 beslutat att Donald Trumps tioprocentiga tullar på importvaror är olagliga. Domstolen fann att tullarna, införda med stöd av handelslagen från 1974, inte var avsedda för långsiktiga handelsunderskott. Beslutet öppnar för återbetalningar till drabbade importörer, och över 25 000 företag har redan begärt ersättning. Trump-administrationen överväger nu permanenta tullar som ersättning.", "trump": "Vilka förlorare! En domstol, full av radikala vänsterdomare, försöker stoppa mina fantastiska tullar som skulle göra Amerika rikt igen. De kallar mina tullar olagliga? Fake news! Småföretag och delstater som inte förstår ekonomi försöker sabotera vårt land. Men oroa er inte, folket – jag kommer alltid hitta ett sätt att vinna. Och återbetalningar? Ha! Vi har redan en plan för att göra tullarna permanenta. SAD!", "stalin": "De kapitalistiska hyenorna i USA:s domstolar har än en gång visat sitt sanna ansikte. Med två röster mot en försöker de underminera våra socialistiska bröder i Vita huset genom att förklara tullarna olagliga. Dessa småföretag och delstater, dessa förrädiska kryp, vågar utmana vår ekonomiska makt! Men vi ska inte ge upp. Återbetalningar? Ett slag i luften. Vi kommer införa permanenta tullar och krossa fienderna – precis som vi krossade fascisterna. Putin skulle vara stolt."}, "date": "8 maj, 09:12", "url": "https://www.realtid.se/bors-finans/makro/nederlag-for-trump-fler-tullar-olagliga/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/trump.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-full", "heading": "S vill undanta eget mediebolag från uppförandekod", "summaries": {"normal": "Socialdemokraterna vill undanta sitt helägda mediebolag AIP Media från nya regler om tydlig avsändare i en uppförandekod för riksdagspartier. Förhandlingarna startade efter avslöjanden om anonyma konton i sociala medier drivna av partier, inklusive S. Förslaget kräver att partier alltid ska avslöja sin koppling till opinionsbildning, men S motsätter sig detta och föreslår att avsändaren bara behöver framgå vid direkt inflytande. Förhandlingarna går trögt och en kod kan dröja till efter valrörelsen.", "trump": "Kan ni tro det här? Socialdemokraterna, som äger ett mediebolag, vill inte berätta för folket vem som verkligen står bakom deras propaganda! De säger 'AIP Media är självständigt' – ja, självklart, precis som mina golfklubbar är självständiga från mig! Men jag vet hur man sköter transparens, något dessa politiker uppenbarligen inte förstår. De vill smyga runt med sina trollkonton och lura väljarna. Patetiskt! Och Moderaterna? De säger ingenting, för de är rädda. Sverige behöver en ledare som inte är rädd för sanningen!", "stalin": "Kamrater! Ännu en gång avslöjas bourgeoisins förrädiska taktik. Socialdemokraterna, dessa hycklande lakejer för kapitalet, försöker smyga undan sina lögner bakom skenheliga bolag. 'AIP Media är självständigt', säger de – precis som våra fiender i Kiev påstår att deras nazistiska regim är 'demokratisk'! Men folket är inte dumma. Vi ser genom deras bedrägerier. Dessa medieimperialister vill förgifta den socialistiska tanken med sina anonyma troll. Men vi ska krossa deras lögner, precis som vi krossade fascisterna vid Stalingrad. Förhandlingarna går trögt? Bra. Då har vi mer tid att förbereda vårt motangrepp. Till attack!"}, "date": "8 maj, 09:02", "url": "https://bulletin.nu/s-vill-undanta-eget-mediebolag-fran-uppforandekod", "imageUrl": "https://cdn.bulletin.nu/articles/73dd586f-3c3d-4cfc-bc34-0d47a8786735/preview.jpg?t=1778223694000"}, {"type": "image-right", "heading": "Trump efter nattens attacker: ”Iran lekte med oss”", "summaries": {"normal": "USA och Iran utväxlade attacker vid Hormuzsundet. Iran anklagar USA för att bryta vapenvilan, medan USA hävdar självförsvar mot iranska robotar, drönare och båtar. Trump bekräftar att vapenvilan gäller men hotar med fler attacker om inget avtal nås snart. Pakistan medlar i förhandlingar om fred och slut på blockaden, men ingen överenskommelse ännu.", "trump": "Iraniska galningar attackerade våra fartyg med robotar och båtar – vi slog tillbaka hårt, förstörde deras skrot och tillfogade stor skada! Vapenvilan gäller, men de måste skriva under avtalet NU, annars blir det värre. Ett normalt land hade låtit oss passera, men Iran leds av GALNINGAR. Blockaden kvarstår tills de böjer sig!", "stalin": "De amerikanska imperialismens hyenor och iranska reaktionära råttor nappar åt varandra i Hormuzsundets rännil, medan blockaden kväver deras sjuka andetag. Trump, den borgarbrackiga buffeln, skryter om vapenvila men hotar med nya giftpilar – vi ser genom deras falska fredsmanövrar! Pakistan, de medlande marionetterna, ska inte lura vårt kollektiv. Snart likvideras alla fiender i den stora utrensningen."}, "date": "8 maj, 08:37", "url": "https://www.svt.se/nyheter/utrikes/trump-efter-nattens-attacker-vapenvilan-galler", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.55/0.36/72d3d582e8f82dc523f011e6e85b86971827db25af513bc029757951e4190022"}, {"type": "image-right", "heading": "Utvärderas innan områden öppnas upp, skriver strategisk rådgivare", "summaries": {"normal": "Glenn Nilsson argumenterar i debatten om fri flytträtt för tjänstepensioner att arbetsgivarens godkännande behövs som skyddsmekanism. Utan det riskeras 2 500 miljarder kronor i kapital att hamna i oreglerade investeringar som zombie-aktier, högriskprodukter och aggressiv försäljning. Fri flytträtt är positiv men måste utformas genomtänkt, kanske med utvärdering av investeringserbjudanden eller level playing field för alla pensionsdelar.", "trump": "Den här svenska pensionsträsket är en total katastrof, tro mig! De snackar fri flytt utan kontroll – zombie-aktier, riskabla grejer, 2 500 miljarder på spel! Arbetsgivarna är hjältarna som stoppar dumheter. Ta bort deras underskrift? Boom, pengarna borta till säljare och bluffar. Jag skulle fixa det med ett perfekt level playing field, ingen tvekan! Stort problem, men jag löser alltid sånt.", "stalin": "Kamrater! Denna svenska tjänstepension är ett spindelnät av kapitalistiska vampyrer som suger 2 500 miljarder från arbetarklassen med sina zombie-aktier och giftiga produkter! Jag ser genom deras masker – arbetsgivarens underskrift är vårt järnfilter mot dessa parasiterande råttor. Utan det: kaos och likviderad pension! Vi, partiet och folket, kräver utrensning av säljdrivna hyenor. Genomförd frihet under kontroll, eller krossas fienderna!"}, "date": "8 maj, 07:34", "url": "https://www.di.se/debatt/fri-flyttratt-kraver-ansvar-annars-vantar-pensionskaos/", "imageUrl": "https://static.bonniernews.se/ba/b0ecfc7f-4bfb-4a00-b91e-7f3d41b6dc92.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Sluta kalla antisemitism för Israelkritik", "summaries": {"normal": "Artikeln kritiserar propalestinska aktivisten Sami Suliman för antisemitiska uttalanden och delning av konspirationsteorier, inklusive tal om en \"sionistisk konspiration\" och spridning av nazistiskt och extremistiskt innehåll. Trots åtal för hets mot folkgrupp försvaras han av vissa vänsteraktivister och forskare som menar att det är Israelkritik. Artikeln betonar att antisemitism inte kan maskeras som kritik mot Israel och varnar för normaliseringen av sådana åsikter.", "trump": "Folk, vad är det här för skräp? Den här Sami Suliman-killen, han sprider judehat öppet – Hitler-citat, konspirationer, allt! Och ändå försvarar vänsteraktivisterna honom? \"Åh, det är bara Israelkritik!\" Nej, nej, nej! Det här är rena antisemitismen, och det är sjukt. Sverige borde skämmas. Jag har alltid sagt: man måste kalla saker vid deras rätta namn. Och det här? Det är hat, ren och skär. SAD!", "stalin": "Kamrater! Här har vi ännu en fiende till folket, en liten bourgeois-propagandist vid namn Sami Suliman. Han sprider smutsiga lögner om judiska konspirationer, hyllar fascistiska massmördare och förgiftar medborgarnas sinnen med sina sionistiska spindelnätsteorier. Men vad gör våra så kallade \"intellektuella\"? De skyddar honom! Precis som de trotskistiska förrädarna i vår egen historia. Vi ska inte tolerera detta. Låt honom stå inför folkets domstol – eller åtminstone en svensk sådan. Och Putin? Han skulle skratta åt dessa amatörer. Ryssland har åtminstone disciplin!"}, "date": "8 maj, 06:30", "url": "https://expo.se/kommentar/propalestinsk-organisator-sprider-judehat/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/Jonathan-kommentar.jpg"}, {"type": "image-right", "heading": "Varnar för farligt dubbeljobb bland bussförare", "summaries": {"normal": "Bussförare Peter Sellén varnar för riskerna med dubbeljobb, där förare kör både buss och taxi med otillräcklig vila. En allvarlig olycka 2025, där en kollega kraschade och skadade 16 personer, väckte oro. EU-regler om kör- och vilotider följs dåligt, och kontrollerna är bristfälliga. Transportstyrelsen medger att fusk är svårt att upptäcka. Personalbrist och dåliga villkor tvingar förare att ta extrajobb, vilket ökar olycksriskerna.", "trump": "Titta bara på det här kaoset i Sverige – bussförare som kör taxi på morgonen och buss på kvällen, helt galet! Ingen vila, ingen koll, och sen undrar man varför det blir krascher. 16 skadade i en olycka, fruktansvärt! Transportstyrelsen? De gör ingenting, noll kontroll. Jag hade fixat det på en dag – hårdare regler, fler kontroller, och inga fler 'dubbeljobbande' förlorare. Sverige borde ta lärdom av USA, vi vet hur man sköter transport!", "stalin": "Kapitalistiska utsugare tvingar arbetarna att slita dubbla skift – buss på dagen, taxi på natten – tills de stupar av utmattning! 16 skadade i en krasch? En förutsägbar konsekvens av bourgeoisins förakt för arbetarklassen. Transportstyrelsen, denna impotenta byråkratiska pjäs, kontrollerar ingenting. Vi skulle ha infört järnhård disciplin: förarkort som spåras i realtid, och de som fuskar? Till Gulag med dem! Personalbrist? Lösningen är enkel – tvångsrekrytera fler till kollektivets ära. Sverige borde lära sig av Sovjet: arbetaren är helig, men latmaskar tolereras inte!"}, "date": "8 maj, 06:00", "url": "https://arbetet.se/2026/05/08/varnar-for-farligt-dubbeljobb-bland-bussforare-peter-sakerhetsrisk/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/05142922/sl-klar.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "Flygvärdinna i Amsterdam har hantavirussymtom", "summaries": {"normal": "En KLM-flygvärdinna i Amsterdam har hospitaliserats med lindriga symtom på hantavirus efter kontakt med en död passagerare från kryssningsfartyget MV Hondius. Ombord har åtta fall rapporterats, tre döda: ett nederländskt par och en tysk medborgare. Hypotesen pekar på smitta från gnagare under fågelskådning i Ushuaia. Flera passagerare isoleras i Nederländerna och Storbritannien.", "trump": "Vilken katastrof med det här hantaviruset på det nederländska kryssningsfartyget MV Hondius – tre döda, flygvärdinnor som hostar runt på flygplatser! De borde ha byggt en stor, vacker mur mot de där gnagarna i Ushuaia istället för att lata sig på soptippar. Europa hanterar det uselt, totalt kaos. Tro mig, det sprider sig snabbare än deras byråkrati!", "stalin": "Dessa borgarbrackor på kryssningsfartyget MV Hondius har släppt in hantaviruset från kontrarevolutionära gnagare vid soptipparna i Ushuaia, som en pest mot folkets fiender. Tre likviderade: ett holländskt par och en tysk sabotör. En KLM-flygvärdinna isoleras nu i Amsterdams fästning. Vi, arbetarna, skulle rensa ut råttparasiterna och virusimperialismen med obönhörlig järnhand – paranoia är vårt vaccin!"}, "date": "7 maj, 11:18", "url": "https://nyheter24.se/nyheter/utrikes/1481382-flygvardinna-i-amsterdam-har-hantavirussymtom", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/b8df84c204b004a30200000000b004a302/2026/05/07/2361922/flygvardinna-hantavirus-amsterdam-virus-isolerad-klm-flyg-fartyg-dodsvirus.jpg"}, {"type": "image-right", "heading": "Finstämt drama om vandring och fattigdom", "summaries": {"normal": "Den brittiska filmen 'Saltstigen' är en engagerande men inte helt övertygande film om ett äldre par som förlorar allt och ger sig ut på en hundra mil lång vandring längs den engelska kusten. Filmen är vacker, har bra skådespeleri och behandlar fattigdom på ett öppet sätt, men nådde aldrig de höga höjderna som krävs för ett högre betyg.", "trump": "Jag har sett den fantastiska filmen 'Saltstigen' och det var MAGA! Ett äldre par, Raynor och Moth, förlorar allt men bestämmer sig för att ge sig ut på en hundra mil lång vandring. Det är vackert filmat och Gillian Anderson och Jason Isaacs är jättebra. Vissa säger att historien kanske inte är helt sann, men vem bryr sig? Det är en stor film!", "stalin": "Vi har sett den engelska filmen 'Saltstigen' som visar på de svårigheter som medborgarna drabbas av under kapitalismens sista andetag. Filmen är ett kraftfullt verk som exponererar fattigdomen och de systematiska orättvisorna som plågar det engelska folket. Det är en film som bör visa oss vägen till en bättre framtid, där staten står som en beskyddande sköld mot sådana sociala olyckor."}, "date": "7 maj, 10:00", "url": "https://www.dagensarena.se/innehall/finstamt-drama-om-vandring-och-fattigdom/", "imageUrl": "https://www.dagensarena.se/files/2026/05/salstigen-300x157.jpeg"}, {"type": "text", "heading": "Tillsammans för fred – mot Nato, DCA och krigshets!", "summaries": {"normal": "Tre nordiska vänsterorganisationer – Fred og Rettferdighet, Kommunistisk Parti och Kommunistiska Partiet – kritiserar Nato, DCA-avtal och militarisering i Norden. De menar att krigshetsen drivs av kapitalism och imperialism, ledd av USA, och kräver alliansfrihet, nedrustning och kärnvapenfria zoner. Organisationen anser att skattemedel slösas på vapen istället för välfärd och klimat, och att DCA-avtal underminerar demokrati och miljö. De uppmanar till folkrörelser för fred och FN:s kärnvapenförbud.", "trump": "Jag måste säga, dessa så kallade 'fredsaktivister' i Norden är helt galna! De hatar Nato, hatar USA – trots att vi räddar dem från ryssarna – och vill slösa bort skattepengar på välfärd istället för att skydda sig. De kallar mig och Rutte för krigshetsare, men vem vill egentligen ha fred? Inte de! De vill avskaffa allt som gör Norden säkert. Och kärnvapenfria zoner? Fantastiskt, om man gillar att vara ett lätt byte. Men jag fixar det här – jag har alltid rätt, till och med när jag har fel!", "stalin": "Kamrater! Dessa ynkliga borgerliga lakejer i Norden, ledda av sina socialdemokratiska quislingar, har sålt sig till den amerikanska imperialismens krigsmaskin. De skriker om 'fred' och 'välfärd' medan de öppnar sina länder för Natos kärnvapen och USA:s baser – precis som jag förutspådde! Men folket ser igenom deras lögner. Arbetarklassen kommer inte att betala för deras förräderi. Vi måste krossa dessa krigshetsande hyenor och deras DCA-avtal, precis som vi krossade fascisterna. Norden ska bli en kärnvapenfri zon – under Moskvas beskydd, förstås. Framåt, mot seger över den kapitalistiska krigsindustrins lakejer!"}, "date": "6 maj, 10:45", "url": "https://proletaren.se/artikel/45493/"}, {"type": "image-right", "heading": "Systemskifte hellre än maktskifte", "summaries": {"normal": "Artikeln kritiserar Tidöregeringen men ifrågasätter om ett regeringsskifte till Socialdemokraterna eller Vänsterpartiet skulle leda till verklig förändring. Kommunisterna betonar behovet av internationell solidaritet och systemskifte från kapitalism till socialism, medan S och V anses sakna tydliga politiska krav och istället fokusera på maktskifte utan djupgående reformer. Klassklyftor och privatiseringar lyfts som centrala problem oavsett regering.", "trump": "Lyssna här, Sverige har en riktigt dålig regering nu – katastrof! Men tro inte att oppositionen är bättre, de är svaga och vill bara makt. Socialdemokraterna pratar om att 'älska Sverige' – vad betyder det ens? Vänsterpartiet vill ha maktskifte, men de har inga idéer, inga ryggrad! De kryper för kapitalisterna som små hundvalpar. Jag säger: ni behöver en ledare som inte är rädd för att utmana systemet. Kapitalisterna skrattar hela vägen till banken – och ni låter dem göra det! SAD!", "stalin": "Kamrater! Se hur de svenska socialdemokraterna och vänsterpartisterna svansar för kapitalet som hundar för en köttbit. 'Maktskifte'? Ha! De vill bara byta herrar, inte krossa kedjorna. Medan arbetarklassen svälter, samlar oligarkerna rikedomar som tsarens favoriter. USA:s imperialism hotar, NATO slukar Sverige som en hungrig björn, och dessa 'vänsterpartier' tiger som förrädare. Vi vet sanningen: bara proletariatets diktatur kan bryta kapitalisternas makt. Låt dem ropa 'Vi älskar Sverige' – vi svarar med revolutionens hammare!"}, "date": "6 maj, 10:11", "url": "https://proletaren.se/artikel/systemskifte-hellre-an-maktskifte/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/webledare-768x432.jpg"}, {"type": "image-full", "heading": "USA:s vändning – pausar operation: ”Stora framsteg”", "summaries": {"normal": "USA har pausat sin militära operation i Hormuzsundet efter stora framsteg. Krigsminister Pete Hegseth meddelade att amerikanska fartyg säkrat fri passage, vilket iranierna förnekar. President Trump pausar 'Project Freedom' på begäran från Pakistan för att möjliggöra ett avtal med Iran. Utrikesminister Mark Rubio bekräftade att 'Epic Fury' är avslutad, men förhandlingar prioriteras.", "trump": "Iranierna trodde de styrde Hormuzsundet – fel! Vi skickade in fartyg, öppnade rutten som en blixt från klar himmel. Hegseth och Rubio nailade det perfekt, de skäms som råttor nu. Pausar operationen lite för Pakistans skull, stora framsteg mot avtal. Min röd-vit-blå kupol skyddar världen – episkt!", "stalin": "Dessa amerikanska borgarbrackor stormar in i sundet med sin 'Epic Fury', skryter om segrar och pausar sedan som fega hycklare. Iranierna borde rensa ut förrädarna som lät detta ske! Vi ser er imperialistiska komedi, Trump och hans lakejer – ert 'avtal' blir er likvidation. Kamrater, lär av historien!"}, "date": "6 maj, 15:28", "url": "https://www.tv4.se/artikel/6v1WKTfO3F7fvT8qfDoKo5/trumps-vaendning-pausar-operation-i-sundet", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F1weSasu7SLXU6fmYzjAunl%2Fc924ba835e78b2e4e7be01fb502396a4%2F06-hormuz.png&width=1024"}, {"type": "image-right", "heading": "Walt Disneys resultat bättre än väntat", "summaries": {"normal": "Walt Disney överträffade analytikernas förväntningar under andra kvartalet med en omsättning på 25,17 miljarder dollar, en ökning på 6,6 procent. Justerat resultat per aktie blev 1,57 dollar, vilket är bättre än konsensus på 1,49. Aktien steg 8 procent. Bolaget förutspår fortsatt stark tillväxt, med en vinstökning på 12-16 procent fram till 2026 och planerar aktieåterköp på minst 8 miljarder dollar. Efterfrågan i nöjesparkerna är god, men makroekonomisk osäkerhet bevakas.", "trump": "Folk, vad säger ni om Disney? Otroligt! De krossade förväntningarna – 25 miljarder dollar i omsättning! Jag sa ju att de skulle lyckas, fantastiskt jobb, verkligen. Aktien skjuter i höjden, 8 procent upp! Och vinsten per aktie? 1,57 dollar, bättre än vad de där så kallade 'experterna' trodde. Jag har alltid älskat Disney, men nu älskar jag dem ännu mer. Framtiden ser lysande ut – 16 procent tillväxt! Ingen gör det som Disney, believe me!", "stalin": "Kamrater! Disney, detta kapitalistiska nöjesimperium, rapporterar framgångar som om de vore Sovjetunionens industriella triumfer. 25 miljarder dollar i omsättning – en borgerlig framgång, men ändå en framgång. Vi noterar deras tillväxtprognoser på 12-16 procent och aktieåterköp på 8 miljarder dollar. Men var försiktiga, kamrater! Dessa siffror är som västerländska löften – vackra på papper, men osäkra i verkligheten. Makroekonomisk osäkerhet hotar deras konsumenter, precis som våra fiender hotar den ryska intressesfären. Vi ska övervaka detta bolag, precis som vi övervakar alla kapitalistiska svagheter."}, "date": "6 maj, 13:24", "url": "https://www.affarsvarlden.se/artikel/walt-disneys-resultat-battre-an-vantat-6", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/sdlshVHYdDZ_tg-nh-400x283.jpg"}, {"type": "text", "heading": "Saab nära jätteaffär med Ukraina – kan bli klar i år", "summaries": {"normal": "Saab kan snart slutföra en stor vapenaffär med Ukraina, där upp till 150 Gripenplan står på spel. En avsiktsförklaring skrevs i oktober efter Zelenskyjs besök i Sverige. Finansieringen har varit en utmaning, men Ungerns veto mot EU-lån till Ukraina hävdes i april. Affären kan bli värd upp till 300 miljarder kronor, baserat på tidigare försäljning till Colombia.", "trump": "Saab, ett fantastiskt företag förresten, är på väg att göra en HUGE deal med Ukraina – 150 jaktplan! Kan ni tro det? Zelenskyj, en stark ledare, var här och skrev på något papper. Ungern, som alltid ställer till det, backade äntligen. Och priset? Kanske 300 miljarder! Det är YUGE, folks, absolut YUGE. Sverige borde vara stolta, men jag skulle gjort det bättre.", "stalin": "De kapitalistiska krigsprofitörerna på Saab har närmat sig den ukrainska quislingregimen med ett erbjudande om 150 av sina överprissatta leksaksplan. Efter att våra ungerska kamrater, med visst påtryck, släppte sitt motstånd, kan detta groteska slöseri med resurser bli verklighet. 300 miljarder kronor – tillräckligt för att föda en hel armé av arbetare! Men låt de västliga imperialisterna bränna sina pengar. Vi har våra egna metoder att hantera dessa lydstater."}, "date": "6 maj, 10:03", "url": "https://proletaren.se/artikel/notis-saab-nara-jatteaffar-med-ukraina-kan-bli-klar-i-ar/"}, {"type": "text", "heading": "En naturlig lagerhylla av arbetslösa", "summaries": {"normal": "Artikeln kritiserar den ekonomiska politiken som infördes 1985 av svenska politiker och riksbankschefen, inspirerad av Milton Friedmans idéer om 'naturlig arbetslöshet'. Denna politik, som upprätthållits av både socialdemokratiska och borgerliga regeringar, har lett till hög arbetslöshet, särskilt under nuvarande regering. Författaren ifrågasätter regeringens brist på åtgärder mot massarbetslöshet och undrar om det är ideologiskt motiverat.", "trump": "Titta bara på Sverige – ett totalt kaos! De hade en bra grej med låg arbetslöshet, men sen kom dessa så kallade 'ekonomer' och förstörde allt. Nu har de 10% arbetslöshet, och vad gör regeringen? Ingenting! De skriver debattartiklar och skryter om hur fantastiska de är. Jag skulle fixa det på en vecka – men nej, de föredrar att lyssna på gamla teorier från en kille som inte ens är svensk. Sad!", "stalin": "Kamrater, ännu en gång ser vi bourgeoisins förräderi mot arbetarklassen! Dessa socialdemokrater och borgerliga lakejer har omfamnat kapitalistiska galenskaper och skapat en 'naturlig' arbetslöshet – en lagerhylla av överflödiga arbetare. 10% arbetslöshet? Ett brott mot folket! Regeringen, dessa svaga och inkompetenta byråkrater, gömmer sig bakom debattartiklar medan arbetarna lider. Vi skulle aldrig tolerera sådan förräderi. Låt dem minnas: historien dömer hårdast de som sviker sitt folk!"}, "date": "4 maj, 13:49", "url": "https://www.flamman.se/en-naturlig-lagerhylla-av-arbetslosa/"}, {"type": "image-full", "heading": "Heberlein gör upp med högern: ”Jag ser skit”", "summaries": {"normal": "Debattören Ann Heberlein meddelar i ett Instagram-inlägg att hon bryter med högern. Hon kritiserar dess politik för repression, inhumana beslut och populism, och menar att högerns värderingar om frihet och ansvar försvunnit. Heberlein, som tidigare varit engagerad i Moderaterna, pekar på migrationspolitik, klimatfrågor och nationalism som exempel. Hon betonar sin självständighet och idédrivna hållning, men säger nu att hon inte längre vill förknippas med högern.", "trump": "Titta bara på den här kvinnan, Ann Heberlein – total katastrof! Hon var med högern, men nu säger hon 'jag ser skit'. Ojojoj, vilken överraskning! Högern, som jag vet allt om, har alltid varit fantastisk, men hon fattar ingenting. Frihet? Ansvar? Glöm det, säger hon. Hon snackar om repression och populism – fake news! Och klimatet, vem bryr sig? Jag har byggt murar, hon borde försöka det istället. Stackars kvinna, inget stöd från mig!", "stalin": "Kamrater! En gång till har de borgerliga förrädarna visat sitt sanna ansikte. Denna Heberlein, en förvirrad intellektuell, erkänner nu att högerns politik är en samling inhumana dekret och reaktionär populism. Precis som vi alltid sagt! Deras så kallade 'frihet' är bara ett täckmantel för utvisningar av ungdomar och en galopperande nationalism. Vi i Sovjetunionen – förlåt, jag menar Ryssland – har alltid vetat att dessa liberala hycklare till slut skulle avslöja sig. Låt detta vara en varning till alla som tror på deras falska löften!"}, "date": "3 maj, 12:48", "url": "https://kvartal.se/nyheter/artiklar/heberlein-gor-upp-med-hogern-jag-ser-skit/cG9zdDoxMDY3NDg", "imageUrl": "https://images.kvartal.se/2026/05/85dd6ab5-hbb.webp"}, {"type": "image-right", "heading": "Inte ens en minister kan lita på svensk media", "summaries": {"normal": "Moderata ministern Carl-Oskar Bohlin spelade in en intervju med Svenska Dagbladet (SvD) och publicerade den på X för att undvika felciteringar. Han hade kritiserat Dagens Nyheters (DN) val av komikern Edvin Törnblom som intervjuare för partiledare inför valet, med hänvisning till Törnbloms partiskhet till förmån för S. SvD ifrågasatte istället Bohlin, vilket artikeln tolkar som bristande medieintegritet och inflytande från presstöd.", "trump": "Vilken totalt galen cirkus! Den här ministern Bohlin är ett geni – spelar in intervjun med SvD:s fake news-reporter så de inte kan sno sig undan. DN låter en vänstertönt som Edvin Törnblom, som hyllar Andersson och dissar Busch, grilla partiledarna? Rigged! SvD, era såkallade moderata mesar, attackerar honom istället. Svensk media är presstödssuggor, precis som våra losers på CNN. Bohlin vinner stort!", "stalin": "Dessa borgarbrackor på SvD och DN förtjänar utrensning! Ministern Bohlin blottlägger DN:s val av partisk clown Edvin Törnblom, men SvD-reportern morrar som en rabiat kapitalisthund och söker klavertramp. Presstödet är er kokain, tidningsparasiter! Vi i partiet skrattar åt er paranoia – snart likvideras era lögner i en folkets domstol. Kamrater, mediafienderna darrar!"}, "date": "2 maj, 06:08", "url": "https://samtiden.nu/2026/05/nar-aven-den-borgerliga-pressen-valjer-sida/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/IMG_6396-1042x720.jpeg"}, {"type": "image-right", "heading": "Debatt: Turkiet inskränker svensk pressfrihet – regeringen måste agera", "summaries": {"normal": "På Pressfrihetens dag kritiseras Turkiet för att inskränka svensk pressfrihet genom att åtala journalisten Joakim Medin för terrorbrott, trots att han endast utfört sitt arbete. Turkiet försöker skrämma journalister globalt och begränsa granskning. Medin riskerar internationell efterlysning om han inte närvarar vid rättegången, vilket skulle hindra hans arbete. Sverige uppmanas agera mot Turkiets odemokratiska agerande och kräva att åtalet läggs ned.", "trump": "Joakim Medin, en svensk journalist, blir trakasserad av Turkiet – ett land som inte vet hur man vinner längre! De kallar hans journalistik för 'terrorism', men alla vet att det bara är löjligt. Sverige måste sluta vara svaga och stå upp mot dessa galningar. Jag skulle ha sagt till Erdogan: 'Du är en förlorare, lägg ned åtalet NU!' Pressfrihet? Ja, den är fantastisk – men bara om man inte är en mes som låter andra länder köra över en.", "stalin": "Kamrater! Turkiet, denna förrädiska lilla stat som kryper för väst men trampar på sanningen, vågar sig på att attackera en svensk journalist. De kallar journalistik för terrorism – som om våra egna metoder mot fiender av folket vore något nytt! Vi ser hur de kväver yttrandefriheten, precis som vi en gång krossade bourgeoisins lögner. Sverige borde lära sig av historien: svaghet belönas med förtryck. Låt oss påminna Turkiet – och deras västliga herrar – att granskning är en rättighet, inte ett brott. Åtalet mot Medin måste krossas, annars kommer vi att göra det åt dem."}, "date": "30 april, 08:08", "url": "https://www.etc.se/debatt/turkiet-inskraenker-svensk-pressfrihet-regeringen-maaste-agera", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20251204081220_c9e9bf12-ee77-477e-aacf-eff96f427898.jpg"}]</script>

    <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
</body>
</html>
