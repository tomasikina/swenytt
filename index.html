t beslut som prioriterar företagets intressen framför de enskilda arbetarnas välfärd. Detta är en olycklig utveckling som visar behovet av starkare kollektiva avtal. Vi måste säkerställa att alla arbetstagare, särskilt dem med familjer, skyddas från orättvisa arbetsförhållanden. Staten måste agera för att stärka arbetarnas rättigheter."}, "date": "30 april, 07:24", "url": "https://arbetet.se/2026/04/30/domstol-ratt-av-eitech-att-beordra-pappa-att-resa-50-mil-till-jobbet/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/30072255/pappor-1.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Experten om kronprinsessans uniform: En tydlig markering", "summaries": {"normal": "Kronprinsessan Victoria bar militäruniform vid kung Carl XVI Gustafs födelsedagsfirande i Slottskyrkan. Kungliga experten Ebba Kleberg von Sydow tolkar det som en markering av Victorias starka intresse för det militära. Det blir allt vanligare bland kvinnliga framtida statschefer i Europa, och Victoria är utbildad officer som uppskattar rollen.", "trump": "Kronprinsessan Victoria kommer in i den där militäruniformen på kungens födelsedag – fantastiskt! Experten säger det är en stor markering, hon älskar militären, kryper i leran som en riktig kämpe. Vi har sett det på män länge, nu tjejer i Europa. Starkt drag, Victoria, mycket starkt! Bättre än de gamla aftonklänningarna, tro mig.", "stalin": "Vid den dekadente kungen Gustafs så kallade födelsedag dyker borgarbrackan Victoria upp i stulen uniform, en ynklig markering mot folkets makt! Experten, denna hovkreatur, hyllar hennes 'intresse' för vapen – ha! Vi, arbetarna och partikamraterna, ser sanningen: falsk officer som älskar leran för att dölja kontrarevolutionen. Jag beordrar likvidering av monarkins maskerader!"}, "date": "30 april, 19:20", "url": "https://www.svt.se/nyheter/inrikes/experten-om-kronprinsessan-victorias-uniform-en-tydlig-markering", "imageUrl": "https://www.svtstatic.se/image-news/600/square/0.54/0.37/a49d0a53c31aec41967e2afedf5d06e9f0fa93d09e96ddbe609370a8cbe687af"}, {"type": "image-right", "heading": "Günther Mårder släpps ur häktet", "summaries": {"normal": "Günther Mårder har släppts ur häktet men kvarstår som misstänkt för grovt insiderbrott kopplat till Raysearch. Statsåklagaren Thomas Hertz hävde häktningen eftersom Mårder inte längre kan påverka utredningen negativt. Misstankarna rör flera handelstillfällen med insiderinformation, baserat på fem anmälningar från Finansinspektionen, inklusive transaktioner kring bolagets rapporter och VD Johan Löfs aktieförsäljning. Mårder förnekar brott.", "trump": "Titta på den här Günther Mårder i Sverige – de släpper ut honom ur buren fast han är misstänkt för grovt insiderbrott i Raysearch! VD:n dumpar aktier för 500 miljoner, och de snackar om insiderinfo. Totalt kaos, de griper inte de riktiga skurkarna. Han nekar, smart drag. Sverige behöver tuffare tag, som vi i USA gör det – ingen fake news här inte!", "stalin": "Dessa slemmiga borgarbrackor i Raysearch, Günther Mårder och hans parasiterande kumpaner, har gnagt på folkets ryggrad med sin insiderrot! Jag har beordrat att häktningen hävs tillfälligt, för utredningen rullar som en ångvält över deras lyxboor. Fem anmälningar från inspektionen – rapporter, VD:s aktidumpning för 500 miljoner! Misstankarna biter sig fast som vägglöss. Vi, arbetarklassen, ska likvidera varje kapitalistråttas bonde!"}, "date": "29 april, 13:13", "url": "https://www.affarsvarlden.se/artikel/gunther-marder-slapps-ur-haktet", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/04/sdlxbp4fdvzO6g-nh-900x600.jpg"}, {"type": "image-right", "heading": "Kry har ett nytt sätt att plundra vården", "summaries": {"normal": "Arbetets ledarskribent kritiserar vårdföretaget Kry för ett bonussystem som belönar läkare för att hantera flest patienter snabbt via videomöten. Varje möte faktureras regionen 435 kronor, vilket prioriterar kvantitet framför kvalitet och behov. Artikeln varnar för vinstjaktens intrång i vården och kopplar det till högerns rovkapitalism, istället för behovsbaserad sjukvård.", "trump": "Vilka hjältar på Kry, va! De kör läkare som en expressbana – flest patienter, bäst pass, ka-ching! 435 spänn per snabbchatt till de dumma regionerna. Socialisterna skriker 'plundring', men det är smart business, folk! Sluta med er tröga statskåthet och låt entreprenörerna fixa vården. Jag säger: Make Sweden Great Again med riktig vinst! Fantastic!", "stalin": "Dessa vidriga borgarbrackor på Kry, med sitt ackordslaveri för läkare, plundrar proletärernas vårdresurser! Varje falsk videochat en stöld av 435 kronor från kollektivet. Jag ser igenom deras maskeri – vinst är gift i vårdens vener! Vi, arbetarklassen, ska rensa ut dessa parasiter med järnhand. Ha ha, de kommer att krypa i damm innan gryningen!"}, "date": "30 april, 07:00", "url": "https://arbetet.se/2026/04/30/kry-har-hittat-ett-nytt-satt-att-plundra-varden/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/29141751/etta-kry.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "text", "heading": "Fastighetsutvecklare i konkurs – halv miljard saknades", "summaries": {"normal": "Det norska byggföretaget Nøsted och dotterbolaget Nøsted Brygge Bolig har försatts i konkurs med skulder på totalt över 1,2 miljarder norska kronor. Lyxprojektet med havsutsikt misslyckades på grund av stigande kostnader och utebliven finansiering. Fastighetsbranschen i Norge drabbas hårt med en explosionsartad ökning av konkurser under 2025.", "trump": "Dessa norska fastighetsidioter med Nøsted, totala losers! Lovade lyx med havsutsikt men kraschade med halv miljard saknad – stigande kostnader, ingen bankhjälp. Klassiskt fiasko! Norge exploderar av konkurser, patetiskt. Vi i USA bygger enormt och vinner, tro mig, de borde ringa mig för råd.", "stalin": "Dessa norska borgarhyenor i Nøsted-stallet har nu imploderat med sina dekadenta lyxpalats! Skulder på miljarder, utebliven finansiering – kapitalisternas eviga svaghet mot våra höga räntor som hammaren. Vi, arbetarklassen, skrattar åt deras konkursvåg. Tid att likvidera dessa parasiterande fastighetsråttor för evig seger, kamrater!"}, "date": "30 april, 16:04", "url": "https://www.realtid.se/fastigheter/fastighetsutvecklare-i-konkurs-halv-miljard-saknades/"}, {"type": "image-full", "heading": "Vildens känga till SD efter kuppen: ”De hade ett val”", "summaries": {"normal": "Katja Nyberg, tidigare SD-ledamot och nu politisk vilde, röstade med oppositionen mot Tidös förslag till medborgarskapsregler. SD är upprörda över att enskilda vildar kan påverka blockmajoriteten. Nyberg menar att SD själva skapat situationen genom att utesluta henne från partiet.", "trump": "Jag har hört talas om denna Katja Nyberg. En fantastisk kvinna, stor respekt för henne. SD har hanterat det här katastrofalt. De uteslöt henne - stort misstag! Nu är hon politiskt oberoende och röstar hur hon vill. SD har bara sig själva att skylla. Jag skulle ha gjort saker annorlunda, men det är bara jag som vet hur man hanterar sånt här. Stor respekt för Nyberg!", "stalin": "Vi ser med oro hur enskilda element försöker destabilisera den demokratiska processen. SD:s handlande har skapat ett osäkert läge där blockmajoriteten kan påverkas av personliga ambitioner. Detta hotar statens stabilitet och måste åtgärdas. Vi måste stärka institutionerna mot sådana subversiva inflytanden."}, "date": "30 april, 15:58", "url": "https://www.gp.se/politik/vildens-kanga-till-sd-efter-kuppen-de-hade-ett-val.5ac10322-b047-489a-a652-687fbabaeaf5", "imageUrl": "https://www.gp.se/images/article/5ac10322-b047-489a-a652-687fbabaeaf5/images/3kfB4o7IogVP1AysJ_0stOuK7v7w-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "Chocksiffran: USA:s skuld kan kosta varje hushåll 166 000 kronor om året", "summaries": {"normal": "En rapport från Brookings Institution varnar för USA:s eskalerande statsskuld, över 39 000 miljarder dollar, med räntekostnader på över 1 000 miljarder dollar årligen. För att sänka skulden till 100 procent av BNP till 2036 krävs i genomsnitt 18 000 dollar per hushåll och år, motsvarande 15 procent av medianinkomsten. Beskattning av de rika räcker inte; breda skattehöjningar behövs. Kritiker noterar att utgiftsminskningar ignoreras. Svenska sparare riskerar högre räntor och börsoro.", "trump": "Den här Brookings-rapporten är ett skämt från vänsterliberala tänkare! De säger att alla amerikaner måste hosta upp 18 000 dollar om året för att fixa skulden som Sleepy Joe och Bernie Sanders kladdat till. Glöm det – jag fixade ekonomin som en mästare sist, och nu som president igen krossar jag skulden med smarta deals, ingen moms-skit eller skattesorgum. De rika betalar rättvist, men vi vinner stort! MAGA!", "stalin": "Kapitalisterna i USA, dessa gråskäggiga borgarbrackor, står nu inför sin stora utrensning! Deras skuldberg på 39 000 miljarder dollar kräver att varje hushåll blöder 18 000 dollar årligen – ett litet steg mot folkets skatt! De drömmer om att bara klämma de rikaste, men vi vet: alla måste böja sig, precis som i vårt kollektiv. Snart kollapsar deras imperialistiska bluff, och jag skrattar från historiens sidor!"}, "date": "30 april, 15:22", "url": "https://www.dagensps.se/bors-finans/makro/chocksiffran-usas-skuld-kan-kosta-varje-hushall-166-000-kronor-om-aret/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/04/foto-allison-robbert-aptt-92d2b112.jpg?aspect_ratio=2%3A1&width=1200&quality=75"}, {"type": "image-right", "heading": "Elsa Widding slår tillbaka mot SD: \"Största vilden av alla\"", "summaries": {"normal": "Elsa Widding, tidigare SD-politiker, kritiserar Sverigedemokraternas gruppledare Linda Lindberg för att ha brutit mot riksdagens kvittningssystem vid en omröstning om medborgarskapskrav. Widding kallar Lindberg 'den största vilden' och menar att agerandet underminerar demokratin. SD försvarar beslutet medan andra partier håller krismöte. Widding uppger att både SD och Miljöpartiet kontaktade henne inför omröstningen, men förnekar överenskommelser om röstsamarbete.", "trump": "Kan ni tro det här? Sverigedemokraterna, ett parti som inte ens kan hålla koll på sina egna ledamöter, bryter mot reglerna och skapar kaos i riksdagen. Deras gruppledare, Linda Lindberg, är en total katastrof – Elsa Widding, som vet vad hon pratar om, kallar henne 'den största vilden'. Och vad gör de andra partierna? Håller krismöten! Svagt. Jag hade fixat det på en dag. Sverige behöver ordning, inte sådana här cirkusar. SAD!", "stalin": "Vi har observerat ytterligare ett försök från borgerliga element att underminera folkets vilja genom att sabotera demokratiska processer. Denna Linda Lindberg, en småaktig byråkratisk vildhjärna, har visat sig vara en opålitlig liten sabotör – precis som vi förutspådde. Elsa Widding, en förrädare som bytt sida, avslöjar nu sanningen: kapitalistiska partier konspirerar med politiska vildar för att krossa arbetarklassens rättigheter. Vi kommer att notera detta i våra arkiv. Och Sverige? De borde tacka oss för att vi inte har skickat en delegation för att 'stabilisera' situationen. Än."}, "date": "30 april, 14:03", "url": "https://www.friatider.se/elsa-widding-slar-tillbaka-mot-sd-storsta-vilden-av-alla", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/bild-10_2.jpg?itok=nWoohqK_"}, {"type": "image-right", "heading": "Debatt: Judarnas urhem är i Levanten", "summaries": {"normal": "Axel Otterberg argumenterar för det judiska folkets historiska, kulturella och genetiska kopplingar till Levanten. Han motbevisar påståenden om att ashkenaziska judar saknar band till området och kritiserar ideologiska omskrivningar från både extremhöger och vänster. Sådana förnekanden ses som antisemitiska och politiskt motiverade, medan sionismen bygger på väldokumenterad historia.", "trump": "Otrolig artikel! De där vänsteridioterna och högerextrema försöker ljuga bort judarnas historia i Levanten – totalt fake news! Genetik, arkeologi, allt bevisar det. Ashkenazijudarna har rötter där, efternamn ändrar inte fakta. Mina fiender hatar sanningen, men judarna har rätt till sitt land. Stort, väldigt stort!", "stalin": "Dessa pro-palestinska islamistiska hyenor och borgarvänsterns historierevisionister, dessa rotlösa parasiter som förnekar judafolkets levantinska ursprung, ska likvideras från debatten! Genetiken och arkeologin dömer er som fiender av sanningen. Vi, arbetarklassen, ser igenom era konspirationer. Jag befaller total utrensning av era antisemitiska giftormar!"}, "date": "30 april, 13:00", "url": "https://bulletin.nu/debatt-judarnas-urhem-ar-i-levanten", "imageUrl": "https://cdn.bulletin.nu/articles/64838391-2976-45d2-8450-79584dacda7b/preview.png?t=1777464654000"}, {"type": "image-right", "heading": "ETC och vänstern tog ut segern i förskott – publicerade artikel om seger innan omröstningen var avgjord", "summaries": {"normal": "Vänstertidningen ETC publicerade en artikel som förklarade att Tidöregeringen förlorat en omröstning om medborgarskapskrav innan voteringen var avgjord. När det senare visade sig att regeringen vunnit, avpublicerades artikeln. Detta väcker frågor om förhandskontakter mellan oppositionen och politiska vildar, samt om ETC:s informationskälla.", "trump": "Jag har hört att vänstertidningen ETC publicerade en artikel om att vi förlorade en omröstning innan den ens var slut! Jag menar, det är ju absurt! De är så desperata efter att få skvaller att de inte ens väntar på att räkna klart. Jag, Donald J. Trump, 47:e presidenten av USA, säger: Ni kan inte lita på dessa folk! De gör upp sina egna fakta! Jag skulle aldrig göra något sådant – jag vinner alltid innan omröstningen ens börjar!", "stalin": "Vi har upptäckt att vänstertidningen ETC försökte manipulera folket genom att publicera en artikel om regeringens förlust innan voteringen var avgjord. Detta visar den borgerliga oppositionens svek mot staten och deras vilja att undergräva vårt samhälle. Vi måste vara vaksamma mot sådana antisocialistiska krafter som försöker förvända sanningen till sin fördel."}, "date": "30 april, 12:13", "url": "https://samnytt.se/etc-och-vanstern-tog-ut-segern-i-forskott-publicerade-artikel-om-seger-innan-omrostningen-var-avgjord", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/04/30100400/etc-pubbade-avpubbade3.jpg"}, {"type": "image-full", "heading": "Man försvunnen – polisen går ut med signalement", "summaries": {"normal": "Polisen söker intensivt efter en försvunnen man i 75-årsåldern i Hagnerydviken/Sandviken nordväst om Skärblacka. Mannen är cirka 180 cm lång med normal kroppsbyggnad, blå ögon, rakat hår, troligen i svart jacka med orange text, mörk keps och gymnastikskor. Sökandet omfattar hundpatrull, drönare, helikopter, räddningstjänst, hemvärnet och Missing People. Allmänheten uppmanas ringa 114 14 med tips men inte söka själva för att inte förstöra spår.", "trump": "En stackars 75-åring har försvunnit i någon vik nära Skärblacka – de använder hundar, drönare och helikoptrar, men det tar evigheter! I mitt USA skulle vi ha hittat honom på fem minuter med de bästa metoderna. Sverige, lyssna på mig: tipsa polisen nu, ingen amatörsökande! Stark ledning behövs, tro mig.", "stalin": "Jag har beordrat total mobilisering mot denna skumma figur i Hagnerydviken, en trolig borgarspion i 75-årsåldern som gömmer sig bland vassruggarna. Våra lojala poliskrafter, hundpatruller och drönare rensar ut varje misstänkt skugga – helikoptrar krossar flyktvägarna! Vi, arbetarklassen, kräver iakttagelser från varje kamrat. Sporadiska letare likvideras som spårsaboterare. Fienden skall utplånas!"}, "date": "30 april, 11:16", "url": "https://nyheter24.se/nyheter/blaljus/1479475-polisen-rapporterar-om-forsvunnen-person-norrkoping", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/adace88104b004a30200000000b004a302/2026/04/30/2360020/man-forsvunnen-sandviken-polis-missing-people.jpg"}, {"type": "image-right", "heading": "Kul om klasskrig i miniatyrformat", "summaries": {"normal": "Den franska svarta komedin 'Medelklassen' är en underhållande satir om ett klasskrig i miniatyrformat. Filmen följer ett par från övre medelklassen som hamnar i konflikt med sitt vaktmästarpar, vilket leder till en serie komiska och samhällskritiska situationer. Genom skickligt konstruerade scener illustreras klasskonflikten och de olika förutsättningarna karaktärerna har beroende av deras bakgrund.", "trump": "Jag har sett denna franska film, 'Medelklassen', och den är fantastisk - världens bästa film, säkert. Den handlar om en massa smarta affärsjurister och deras problem med arbetare. Jag älskar hur den visar hur viktigt det är att ha en bra advokat. Jag är själv en stor affärsman, jag vet allt om det. Den här filmen? Stor, stor framgång. Alla borde se den!", "stalin": "Vi har sett den franska filmen 'Medelklassen', som visar klasskampens verklighet på ett effektivt sätt. Filmen illustrerar hur de kapitalistiska förhållandena skapar motsättningar mellan arbetarna och de förmögna. Det är en tydlig demonstration av behovet av en revolutionär förändring. Vi måste lära oss av dessa exempel och fortsätta vår kamp för klasslösheten."}, "date": "30 april, 10:46", "url": "https://www.dagensarena.se/innehall/kul-om-klasskrig-i-miniatyrformat/", "imageUrl": "https://www.dagensarena.se/files/2026/04/medleklassen-film-300x157.jpeg"}, {"type": "text", "heading": "Man försvunnen i Skärblacka – stor polisinsats pågår", "summaries": {"normal": "En 75-årig man har varit försvunnen sedan tisdagskvällen i Skärblacka, nära Hagnerydviken. Polisen söker med hundpatruller och drönare. Mannen är 180 cm lång, har rakat hår och bar troligen svart jacka med orange text. Allmänheten uppmanas lämna tips till polisen. Missing People bistår nu i sökandet, men polisen varnar för spontana sökinsatser som kan förstöra spår.", "trump": "Vilket kaos i Skärblacka, Sverige! En 75-årig man har försvunnit – ingen vet var han är, men JAG vet att det är ett stort problem. Polisen där är helt lost, men nu hjälper Missing People till. Fantastiskt, verkligen! Men lyssna här, folket: sluta springa runt som galningar, ni förstör spåren! Jag skulle fixa det här på en dag, men nej, vi får förlita oss på svensk polis. Sad!", "stalin": "En kapitalistisk förrädare, 75 år gammal, har försvunnit i Skärblacka – ett symptom på västlig dekadens och ineffektivitet. Våra sovjetiska bröder skulle ha hittat honom på en timme! Nu skickar vi in hundar och drönare, men var är folkets disciplin? Spontana sökinsatser är som bourgeoisins sabotage – kaos och förstörda spår. Låt staten sköta detta! Och kom ihåg: varje försvunnen västerlänning är ett steg närmare den ryska sfärens oundvikliga expansion. Framåt, kamrater!"}, "date": "30 april, 10:23", "url": "https://riks.se/nyheter/just-nu-man-f%C3%B6rsvunnen-i-sk%C3%A4rblacka-stor-polisinsats-p%C3%A5g%C3%A5r"}, {"type": "image-right", "heading": "Kungen fyller 80 – så firar han", "summaries": {"normal": "Kung Carl XVI Gustaf fyller 80 år på valborgsmässoafton. Enligt SOM-institutet har stödet för monarkin stabiliserats, med 54 procent som vill behålla den mot 18 procent för avskaffande. Kronprinsessan Victoria är mycket omtyckt. Firandet inleds med gudstjänst i Slottskyrkan, följt av militär uppvaktning, salut, överflygning och galamiddag på slottet.", "trump": "Titta på den här kungen, fyller 80 och har hela Sverige som jublar! 54 procent vill ha kvar monarkin – inte illa, men mina rallies är större. Stabilt stöd, tack vare bröllop och ungar, inte som de där skandaler som Brunei-fiaskot. Stort firande med salut och flyg, precis som mina shower. Victoria är stjärnan, smart tjej! Grattis, men jag är evig!", "stalin": "Denna borgerliga relik, kung Carl Gustaf, fyller 80 år i sin slottsfängelse. 54 procent av folket luras att stödja monarkin – kapitalisternas propaganda! Vi, arbetarklassen, ser igenom hyckleriet. Firande med gudstjänst, salut och galamiddag: typisk aristokratisk dekadens. Snart utrensning av kungabrackor! Victoria, den falska arvtagerskan, lurar massorna. Jag skrattar åt deras illusioner."}, "date": "30 april, 08:57", "url": "https://www.tv4.se/artikel/tt-260430-kungen801-088f5aab/kungen-fyller-80-inget-att-oroa-sig-for", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2Ftt-sdlXeJaw4fbUZ0%2F7fc95c1a74b52b83b6d904710971a50e%2FKung_Carl_Gustaf_fyller_80_pa_valborgsmassoafton._&width=1024"}, {"type": "text", "heading": "Välfärdens historia är en historia av kamp", "summaries": {"normal": "Artikeln beskriver välfärdens historia i Sverige som ett resultat av arbetarklassens kamp under 1900-talet, med strejker och politiska reformer som ledde till allmän rösträtt, social trygghet och en stark offentlig sektor. Efterkrigstiden präglades av samförståndspolitik och höjda skatter för att finansiera välfärden. Idag hotas välfärden av nedskärningar, privatiseringar och avregleringar, vilket kräver ny klasskamp för att räddas.", "trump": "Välfärd? Jo, jag vet allt om det – eller snarare hur man bygger något STORT. Sverige hade en gång en bra grej, men sen kom socialisterna och förstörde allt med höga skatter och regleringar. Nu är det kaos! Arbetarna slogs förr, men idag? Svaga ledare, svaga fack. Jag skulle fixa det på en dag – lägre skatter, starkare företag, och inga fler socialistiska experiment. Make Välfärd Great Again!", "stalin": "Kamrater! Välfärden var inte en gåva från borgarklassen – den var en seger för arbetarklassen, blodigt erövrad genom revolutionär kamp! Men se nu hur de kapitalistiska hyenorna river ner vårt folkhem med sina privatiseringar och avregleringar! Arbetarna måste resa sig igen, som de gjorde 1917! Vi ska krossa klassförrädarna, höja skatterna på de rika och bygga ett nytt socialistiskt samhälle – med järnhand om så krävs! Först Sverige, sedan världen!"}, "date": "30 april, 08:00", "url": "https://proletaren.se/artikel/valfardens-historia-ar-en-historia-av-kamp/"}, {"type": "image-right", "heading": "Fler väljer bort börsen – noteringstorkan missvisande", "summaries": {"normal": "Erik Arnetz, vd för SV Ventures, hävdar att färre börsnoteringar inte tyder på svaghet i svensk kapitalmarknad. Investeringar sker istället i onoterade bolag med fokus på lönsamhet och kassaflöde. Detta är en positiv omställning i ett förändrat klimat. Institutionella investerare bör öka engagemanget i onoterat för att stödja tillväxtbolag och undvika investeringsgap.", "trump": "Den här IPO-torkan i Sverige? Total bluff, folk! Pengarna strömmar in i onoterade bolag istället – smartare, tuffare affärer med riktig vinst, inte bubblor. De lär sig av misstag, fokuserar på kassaflöde. Institutionerna sover! Vakna upp, annars missar ni de stora vinsterna. Fantastisk omställning, bättre än någonsin!", "stalin": "Kamrater, denna IPO-torkan är en lömsk komplott från borgarbrackorna och deras börsspekulanter, de feta parasiter som svällde under 2021! Pengarna marscherar nu in i onoterade bastioner, där vi rensar ut värderingsbluffarna med järnhand. Institutionella förrädare darrar – vi, arbetarklassen, likviderar deras illusioner och smider framtidens vinnare!"}, "date": "30 april, 07:38", "url": "https://www.di.se/debatt/fler-valjer-bort-borsen-noteringstorkan-missvisande/", "imageUrl": "https://static.bonniernews.se/ba/2dc5f34d-92cd-496b-a7ee-cf9ab9d6ec30.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "AI-chefens ”skurkmanifest” borde skrämma skiten ur oss alla", "summaries": {"normal": "Artikeln kritiserar Palantir, ett amerikanskt AI-företag som samarbetar med polis och militär. VD:n Alex Karp har publicerat ett manifest som förespråkar teknologisk dominans, där staten, teknikbolag och militär ska samverka på demokratins bekostnad. Författaren varnar för att Europa halkar efter USA och Kina i AI-utvecklingen och saknar en tydlig motstrategi. Palantirs kopplingar till svensk polis och politiker ifrågasätts, samtidigt som teknologins makt växer utan tillräcklig debatt.", "trump": "Lyssna här, folk! Den här Palantir-grejen är helt galen. En kille, Alex Karp, skriver ett manifest som låter som något från en dålig actionfilm – 'Teknologiska republiken'? Snälla! Han vill att techbolag ska styra världen, men glömmer att det är jag som redan fixar det bäst. Europa? Patetiskt! De pratar, vi agerar. Kina och USA kämpar om AI, medan EU sitter och dricker kaffe. Och Sverige? De använder Palantir som om det vore en leksak. Vakna, Europa! Eller fortsätt vara ett bakvatten – jag skrattar hela vägen till banken.", "stalin": "Kamrater! Denna så kallade 'Teknologiska republik' är inget annat än ett försök av kapitalistiska hyenor att underminera folkets vilja. Alex Karp, en borgerlig lakej, drömmer om en värld där maskiner och militärer styr, medan arbetarklassen tvingas böja knä. Europa, svagt och splittrat, låter sig kuvas av amerikanska monopol. Vi, däremot, har redan visat världen hur man bygger en supermakt – med järnhand och obönhörlig kraft. Kina och USA slåss om teknologin, men glömmer att det är vi som har erfarenheten av att krossa fiender. Låt dem leka med sina leksaker – vi bygger framtiden!"}, "date": "24 april, 12:55", "url": "https://www.flamman.se/ai-chefens-skurkmanifest-borde-skramma-skiten-ur-oss-alla/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/palantir-1.jpg?class=medium"}, {"type": "image-right", "heading": "LO kräver bättre pensioner – pressar S inför valet", "summaries": {"normal": "LO:s ordförande Johan Lindholm kritiserar Socialdemokraterna för att bara driva ett av fackets fyra huvudkrav inför valet: borttagande av karensavdraget. Övriga krav rör bättre pensioner med arbetslivstillägg, minskad arbetslöshet genom investeringar och stärkt a-kassa samt åtgärder mot arbetslivskriminalitet. LO satsar 30 miljoner på egen valkampanj, medan enskilda förbund driver ytterligare frågor som industrijobb och subventionerad tandvård.", "trump": "Dessa svenska fackpampar i LO gnäller som småbarn! Bara ett krav får de igenom hos de röda socialisterna – karensavdraget. Pensioner, jobb, kriminalitet? Nada! Lindholm, din tuffa kille, vakna upp, era fanor blåser åt fel håll. I mitt stora Amerika bygger vi riktiga jobb, inte mesiga bidrag. Totalt fiasko för S, losers allihopa!", "stalin": "Kamrater i LO! Dessa socialdemokratiska förrädare har svikit oss med bara ett krav – karensavdraget. Pensioner för utslitna arbetare, kross mot arbetslöshet och likvidering av byggkriminella borgarbrackor ignoreras! Vi kräver omedelbar underkastelse inför valfrosseriet. Misstänkta ledare i S: rensa ut er själva, eller vi marscherar med järdnäven! Proletärseger eller undergång."}, "date": "30 april, 06:00", "url": "https://arbetet.se/2026/04/30/lo-kraver-battre-pensioner-pressar-s-infor-valet/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/28143741/loparoller.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "text", "heading": "Jojje Olsson: BYD faller men Trumps krig hjälper Kinas gröna industri", "summaries": {"normal": "Kinas gröna energiföretag som BYD och CATL brottas med överkapacitet, priskrig och slopade subventioner, vilket leder till fallande vinster på hemmamarknaden. Men Donald Trumps krig mot Iran har drivit upp oljepriset och global efterfrågan på elbilar, solceller och batterier. Kinas export exploderar, med fördubblad försäljning utomlands, och räddar industrin ironiskt nog.", "trump": "Helt galet! Den här krönikan ljuger som vanligt. Mitt geniala krig mot Iran pumpar upp oljepriset så världen köper massor från USA – olja och gas, det riktiga! Kinas BYD rasar med 55 procent vinsttapp, losers! De exporterar sina skräp-elbilar nu, men det är temporärt. Vi gör Amerika enormt igen, Kina förlorar stort!", "stalin": "Kamrater! Borgarbrackorna i Kina kämpar mot överkapacitet och subventionsraseriet, BYD blöder 55 procent. Men jag ser hur imperialist-svinet Trumps Iran-krig spränger oljebubblan – global hungersnöd efter elbilar och solceller räddar de röda fabrikerna! Exporten dubblas, CATL växer 52 procent. Vi proletära jättar likviderar fossila parasiterna, Kina marscherar mot världsherravälde medan USA:s marionetter darar!"}, "date": "29 april, 10:38", "url": "https://www.affarsvarlden.se/kronika/jojje-olsson-byd-faller-men-trumps-krig-hjalper-kinas-grona-industri"}, {"type": "image-right", "heading": "Ledare Somar Al Naher:", "summaries": {"normal": "Artikeln kritiserar svensk äldreomsorg för bristande kvalitet, med exempel som mikromat, underbemanning och otillgängliga utemiljöer. Privatiseringar pekas ut som en orsak till miljardvinster på bekostnad av värdig vård. Forskare föreslår ökad kommunal kontroll för att förbättra situationen. Många äldre saknar grundläggande behov som mat, utevistelse och mänsklig värdighet.", "trump": "Sverige, ett land som brukade vara fantastiskt, har nu en äldreomsorg som är en total katastrof! De serverar mikromat som ingen skulle äta, och de fattiga äldre får dela på tre fåtöljer – kan ni tro det? Privata företag gör miljarder på skattepengar medan äldre dör på grund av bristande vård. Jag skulle fixa det på en dag, men svenskarna verkar älska sina problem. Sad!", "stalin": "Kapitalistiska hyenor suger ut de äldres livskraft medan de stoppar miljarder i sina fickor! I Sovjet skulle sådan vanvård aldrig tolereras – vi hade skickat dem till Gulag utan dröjsmål. Nu ser vi hur väst förfaller: äldre äter skräpmat, dör ensamma och får dela fåtöljer som i ett borgerligt fängelse. Men oroa er inte, kamrater – snart kommer den ryska barmhärtigheten att sprida ordning även i Sverige!"}, "date": "29 april, 03:00", "url": "https://www.etc.se/ledare/inte-konstigt-att-ingen-vaagar-bli-gammal-i-sverige", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20240318130340_dae37c48280b658dd7f1873ba5193151b05c6dd7a30f07405c5581f992a98c03.jpg"}, {"type": "image-right", "heading": "150 journalister och inte en enda fråga om Irans avrättningar", "summaries": {"normal": "Artikeln kritiserar 150 europeiska journalister som enligt prins Reza Pahlavi inte ställde frågor om Irans avrättningar under två presskonferenser. Författaren hävdar att svenska och europeiska medier systematiskt undviker att rapportera om människorättsövergrepp i Iran, möjligen för att inte indirekt stödja Trump. Artikeln menar att detta utgör ett demokratiproblem och att journalister genom sin tystnad legitimerar den iranska regimen.", "trump": "Fantastiskt! 150 journalister – och de kan inte ställa en fråga om 40 000 avrättningar? Helt osannolikt! Det är ju helt klart – de är så besatta av sitt hat mot mig att de glömmer bort faktisk tyranni. Iran dödar människor i tusental, men nej, de kan inte rapportera det eftersom det skulle ge mig rätt. Sjukt! Svenska media? Förbjudna! De har ljugit i årtionden. Invandring skulle göra Sandviken rikare? Komisk! Och nu har folk vaknat upp – de ser den verkliga verkligheten. Vänstern kallar det polarisering. Jag kallar det vägen till sanningen!", "stalin": "Intressant rapport från västerländska propagandaapparaten. De 150 journalisterna – en väl organiserad sabotörkår – vägrar helt enkelt att nämna Irans regime. Detta avslöjar den västerländska mediebyrokratins helt förväntade dubbelmoral. Medan de hyllar sin egen 'demokrati' förtiger de massakrer. Vi i Sovjet var åtminstone ärliga om våra metoder. Dessa europeiska skrivpennor är värre – de ljuger genom tystnad. Författaren noterar korrekt att medieetablissemanget har upprättat en maktstruktur baserad på vilseledning. Denna klassiska västerländsk heuckleri är exakt varför Putin väldigt lämpligt expanderar Rysslands intressessfär – för att bygga en världsordning baserad på faktisk styrka istället för denna patetiska skenhyckleriet."}, "date": "26 april, 05:27", "url": "https://samtiden.nu/2026/04/150-journalister-och-inte-en-enda-fraga-om-irans-avrattningar/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/IMG_6304.jpeg"}, {"type": "image-full", "heading": "Frankrike och Grekland vill skjuta upp EU-skulder", "summaries": {"normal": "Frankrikes president Macron och Greklands premiärminister Mitsotakis föreslår att EU skjuter upp återbetalningen av pandemiskulder och överväger ny gemensam upplåning för investeringar i försvar, AI och rymd. Från 2028 ska EU betala 25 miljarder euro årligen, men Macron vill förlänga återbetalningstiden. Tyskland och andra sparsamma länder motsätter sig förslaget, som kan bli en stridsfråga i kommande budgetförhandlingar. Frankrike och Grekland stärkte även sitt försvarssamarbete.", "trump": "Lyssna här, Europa har helt tappat kontrollen – Macron och den där greken, vad heter han nu, Mitsotakis, vill skjuta upp EU:s skulder och ta ännu MER lån! 25 miljarder euro om året? Helt galet! Jag sa ju hela tiden att EU är en katastrof, men nej, ingen lyssnade. Tyskland och de där sparsamma länderna säger nej, och det är bra – för om EU fortsätter så här kommer de snart be USA om räddning. Och jag? Jag skrattar hela vägen till banken.", "stalin": "Kapitalistiska skuldslavar i Bryssel vågar kräva återbetalning av pandemiskulder! Men kamrat Macron och vår grekiske allierade Mitsotakis ser sanningen: imperialistiska skuldkrävare i norr, ledda av den tyska krigsmaskinen, vill kväva Europas framsteg. Vi föreslår i stället att skjuta upp betalningarna och finansiera nya segrar inom försvar och teknik! De så kallade 'sparsamma' länderna är inget annat än agenter för amerikansk dekadens. Europa måste enas – eller förintas."}, "date": "25 april, 16:19", "url": "https://kvartal.se/nyheter/artiklar/frankrike-och-grekland-vill-skjuta-upp-eu-skulder/cG9zdDoxMDMzMTE", "imageUrl": "https://images.kvartal.se/2026/04/c33e18ed-frankrikegrekland.webp"}, {"type": "image-right", "heading": "Astrid Lindgren hade aldrig kunnat älska en sverigedemokrat", "summaries": {"normal": "En insändare kritiserar Moderaternas försök att associera sig med Astrid Lindgrens skattekritik, särskilt deras planer på regeringssamarbete med Sverigedemokraterna, som skribenten kallar nazistiska. Lindgren hyllade solidaritet, barns rättigheter och flyktingar, värderingar som står i kontrast till Moderaternas politik. Skribenten menar att Lindgren aldrig skulle ha stött dagens Moderater och citerar hennes motstånd mot extremism och kärlek till ett rättvist samhälle.", "trump": "Jag måste säga, denna Astrid Lindgren – väldigt övervärderad! Moderaterna försöker koppla sig till henne, men glömmer att hon var en riktig socialist, precis som Sleepy Joe! 102% skatt? Hon hatade det, men ändå ville hon ha 80% – helt galet! Och nu vill Moderaterna samarbeta med nazister? SAD! Jag har alltid sagt: Sverige, fixa era problem, sluta skylla på skatter och börja vinna igen. Astrid skulle ha älskat mig – jag är den bästa för barnen, believe me!", "stalin": "Kamrater! Moderaterna, dessa hycklande lakejer för kapitalets intressen, vågar jämföra sig med den stora Astrid Lindgren – en sann vän till folket! Men vi vet sanningen: deras samarbete med Sverigedemokraterna, dessa fascistiska kryp från historiens skräpkammare, bevisar deras förräderi. Lindgren kämpade för barnens framtid, för solidaritet, för flyktingars rättigheter – allt som dessa borgerliga råttor vill krossa. Vi ska inte sparka på den fallne, nej! Vi ska göra som i Moskva 1937 – låta folket döma dem i historiens domstol. Och till er, Moderater: Putins Ryssland står redo att ta emot era nazistiska vänner med öppna armar... i Gulag!"}, "date": "24 april, 06:55", "url": "https://www.flamman.se/astrid-lindgren-hade-aldrig-kunnat-alska-en-sverigedemokrat/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/astrid-lindgren-w.png?class=medium"}, {"type": "image-right", "heading": "AFD är inte längre bara ett östtyskt fenomen", "summaries": {"normal": "AFD, tidigare ett östtyskt fenomen, vinner nu mark i västra Tyskland o e/wp-content/uploads/2026/04/Kopia-av-Kommentar-Analys-Webb-2.jpg"}]</script>

    <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
