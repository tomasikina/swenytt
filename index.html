ma värderingar, klarar av att hantera nya normer och lojaliteter. Exempel som riksdagsledamoten Leila Ali Elmi lyfts fram för att illustrera spänningar mellan personval och partilojalitet. Frågor väcks om hur demokratin kan anpassas utan att förlora sin grundläggande tillit och stabilitet.", "trump": "Sverige har ett stort problem, folks – deras fina demokratisystem, som fungerat i åratal, håller på att rasa ihop! Massinvandring och islamisering förstör allt. Riksdagen är kaos, vildar springer runt och ingen vet vem som bestämmer! Jag har alltid sagt att system måste vara starka, men Sverige? De har låtit saker gå för långt. Personval? Dumt! Folk röstar på fel personer, som den där Leila från plats 21 – vem är det ens? Sverige behöver ordning, precis som jag gav USA. Annars blir det bara mer kaos, believe me!", "stalin": "Kamrater! Det svenska parlamentariska systemet, detta borgerliga påfund skapat för ett homogent och lydigt folk, knakar i fogarna under trycket av mångfalden. Dessa småborgerliga demokratier, byggda på tillit och gemensamma värderingar, är som korthus i stormen när klassfienderna – de lojala mot familj och religion snarare än staten – invaderar deras heliga hallar. Vi ser hur deras 'fria val' utnyttjas av kontrarevolutionära nätverk, som den där Leila, en agent för klanlojaliteterna! Sverige står inför ett val: anpassa sig eller gå under. Men oroa er inte, kamrater – historien visar att folkdemokratier alltid segrar. Och om de inte gör det... så har vi alltid Kaliningrad att utvidga mot väst!"}, "date": "8 maj, 13:00", "url": "https://bulletin.nu/debatt-thelning-vart-samhallssystem-byggdes-for-ett-annat-sverige-2", "imageUrl": "https://cdn.bulletin.nu/articles/8bc6c939-1aff-4bd9-9721-b5c6e7197a56/preview.png?t=1778156647000"}, {"type": "image-right", "heading": "Expert: ”Den som de trodde var en vän blev istället deras förövare”", "summaries": {"normal": "Unga nätextremister på internet hetsar varandra till sadistiska övergrepp, ofta livestreamade, inklusive knivhuggningar av oskyldiga i Sverige av 14-åringar. Fenomenet kallas våldsbejakande misantropi och drivs av statusjakt, utanförskap och isolering snarare än ideologi. Grupper som Com, 764 och No Lives Matter utnyttjar sårbara ungdomar för våld, självskada och mordförsök.", "trump": "Vilket kaos i Sverige! Dessa galna 14-åringar knivhugger gamlingar och hundrastare för likes på nätet, livestreamar allt som sadistiska clowner. Status? De är totala losers drivna av utanförskap. Mina plattformar hade stoppat det här direkt med starka regler. Sverige behöver en riktig vägg mot sånt här vansinne, tro mig – det är en katastrof!", "stalin": "Dessa människohatande nätverksmaskar i Com-sörjan och 764-råttorna groomar isolerade ungdjur till sadistiska blodbad, livestreamade för imperialistisk ryktbarhet. Vi, arbetarklassen, ser igenom deras statusjakt som kontrarevolutionär isoleringsgallimatias! Jag befaller omedelbar utrensning av dessa virtuella vampyrer – likvidera deras hopplösa bon innan de sprider misantropi som pest!"}, "date": "8 maj, 12:52", "url": "https://www.svt.se/nyheter/inrikes/sadistiskt-vald-i-fokus-for-statusdrivna-natextremister", "imageUrl": "https://www.svtstatic.se/image-news/600/square/0.59/0.36/3367390979d8b4e4dfb02ad6e4182516943d0173466138b22cff8c4daa33ec44"}, {"type": "image-full", "heading": "Torsten Bengtsson: Vänstern står inte på arbetarnas sida", "summaries": {"normal": "Torsten Bengtsson från Sverigedemokraterna kritiserar vänstern för att inte stödja arbetare och välfärd. Han argumenterar för stram migrationspolitik med fem års kvalifikation för socialförsäkringar, sänkta skatter enligt Lafferkurvan och reformer som jobbskatteavdrag, halverad matmoms och subventionerad tandvård. Syftet är att göra arbete lönsammare än bidrag för en stark välfärd.", "trump": "Vilka idioter dessa svenska vänsterclowner är! SD har helt rätt – stäng gränserna för bidragstjuvarna, sänk skatterna rejält så folk jobba hårt igen! Tidö-regeringen ger vanligt folk tusenlappar extra, halverar matmomsen, fixar tandvård. Vänstern hatar arbetare, jag säger: Sverige, gör som jag – bli great igen! Fantastiskt!", "stalin": "Kamrater, denna Bengtsson pekar ut förrädarna i vänstern som sviker proletariatet! Vi måste likvidera bidragsparasiterna bland invandrarbrackorna med fem års tvångsarbete innan välfärd. Skatter sänks inte för borgarna – nej, vi tvingar alla att slava för kollektivet! Arbetet belönas med järnhand, eller purgas. Härligt, eller hur?"}, "date": "8 maj, 11:55", "url": "https://samtiden.nu/2026/05/torsten-bengtsson-vanstern-star-inte-pa-arbetares-sida/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/ddede.png"}, {"type": "image-right", "heading": "Fem kopplingar mellan Moderaterna och friskolelobbyn", "summaries": {"normal": "Aftonbladet avslöjar nära kopplingar mellan Moderaterna och friskolelobbyn. Bland annat har anslaget till Teach for Sweden ökat markant efter att Ulf Kristerssons svägerska valts in i styrelsen. Fem exempel lyfts fram, inklusive Peje Emilssons band till Kristersson, lobbyisternas inflytande och tidigare politiker i friskolors styrelser. Moderaterna har länge försvarat friskolors vinstuttag, men nu föreslås begränsningar för nya ägare och de som missköter sig.", "trump": "Vad händer här i Sverige? Moderaterna och friskolorna – en riktig kärlekshistoria, fast med mycket märkliga kopplingar! Jag menar, 124% mer pengar till en skola bara för att Kristerssons svägerska sitter i styrelsen? Fake news? Nej, tyvärr sant. Och dessa friskole-folk – de har lobbyister, de har gamla politiker, de har till och med en kille som skickar sms till Kristersson! Fantastiskt, eller hur? Men vet ni vad? Jag skulle aldrig tillåta sånt här i USA. Never. Sverige borde skärpa sig – annars blir det inga fler skolor, bara kaos!", "stalin": "Kamrater! Ännu en gång avslöjas den borgerliga korruptionens smutsiga tentakler i Sverige. Dessa så kallade 'Moderater' – ett parti som inte ens döljer sin kärlek till kapitalets profitmaskiner – har förvandlat skolorna till en lekstuga för sina oligarkvänner. Peje Emilsson, en man som skickar smickrande sms till Kristersson som en hund till sin husbonde! Watma Educations lobbyister, som köper annonser för att skrämma folket! Och dessa 'existentiella herrgårdar' – ett perfekt gömställe för klassfienderna när revolutionen kommer. Men frukta inte, kamrater! Vi ska rensa ut dessa profitörer, precis som vi rensade ut kulakerna. Och om Putin vill ha en bas i Sverige efteråt – varför inte? En skola eller två kan alltid användas som förhörscentral."}, "date": "8 maj, 11:19", "url": "https://www.flamman.se/fem-kopplingar-mellan-moderaterna-och-friskolelobbyn/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/kristersson.png?aspect_ratio=16:10"}, {"type": "image-full", "heading": "Suhonen åskådliggör sossarnas jultomtepolitik", "summaries": {"normal": "I en debatt i podden 100% möter socialdemokraten Daniel Suhonen MUF:s Elin Böhlin. Artikeln kritiserar Suhonens politik som generös statlig utdelning utan motprestationer, liknad vid jultomtepolitik. Böhlin försvarar regeringens skattesänkningar, som gynnar unga och arbetande, hårdare straff och minskat skjutvapenvåld. Hon ifrågasätter vänsterns motstånd mot skattesänkningar och betonar individuell frihet framför statlig styrning.", "trump": "Vilken total demolering! Den här Daniel Suhonen, en riktig jultomte för lata bidragstagare, får stryk av den smarta Elin Böhlin. Hon visar hur vi sänker skatter – 10 000 spänn mer i fickan för unga! Sossarna vill sno era pengar och låsa in er i beroende. Jag älskar det: hårdare straff, mindre brott, mer frihet. Böhlin vinner stort, Suhonen mumlar som en förlorare! Fantastiskt!", "stalin": "Denna Daniel Suhonen, en ynklig reformistisk jultomte, försöker muta massorna med borgarstatens smulor. Men den unge MUF-parasiten Elin Böhlin avslöjar sanningen: skattesänkningar för att göda kapitalisterna! Vi vet: staten måste styra allt – bostäder, tänder, barn – likvidera frihetens illusioner. Böhlin är en klassfiende värd utrensning. Arbetarna segrar genom central styrning, inte småborgerlig drömmande!"}, "date": "8 maj, 03:08", "url": "https://samtiden.nu/2026/05/suhonen-askadliggor-sossarnas-jultomtepolitik/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/phonto-1280x720.jpeg"}, {"type": "image-right", "heading": "I dag åtalas två av mina kollegor", "summaries": {"normal": "Två journalister, Joakim Medin i Turkiet och Eigil Söderin i Sverige, åtalas för att ha utfört sitt arbete. Medin anklagas för terrorismrelaterade brott, medan Söderin åtalas för olovlig avbildning av ett skyddsobjekt. Båda fallen belyser hur lagar används för att begränsa pressfriheten, även i demokratier. Reportrar utan gränser varnar för en oroande global utveckling där journalistik allt oftare kriminaliseras.", "trump": "Jag säger er, det här är helt galet! Två modiga journalister, en i Turkiet – ett land med en ledare som inte gillar sanningen – och en i Sverige, ett land som plötsligt tror de är Kina! De åtalas för att göra sitt jobb. I Turkiet använder de terrorlagar som om journalister är terrorister – fake news! Och i Sverige? De åtalas för att råka filma ett polishus. Kom igen! Sverige, vakna upp! Ni halkar ner i pressfrihetsindex som en isbit i en bastu. Och regeringen? Tysta som möss. Sad!", "stalin": "Kamrater, fienderna till folket och sanningen visar sitt rätta ansikte igen! I det förrädiska Turkiet, där Erdogans regim likt en skabbig hund försöker kväva varje frö av sanning, åtalas en journalist för att berätta sanningen. Men vad kan man vänta sig av en stat som står med ena foten i graven och den andra på en mina? Ännu mer oroande är att våra så kallade 'demokratiska' vänner i Sverige följer efter som lydiga hundvalpar. De åtalar en journalist för att råka fånga en skymt av ett polishus på film – ett brott värdigt en trotskistisk konspiratör! Lagen är ett verktyg för att krossa oppositionen, och vi ser hur den borgerliga staten använder den som en hammare mot pressfriheten. Men låt dem inte glömma: historien dömer hårdare än deras domstolar. Vi ska inte vila förrän varje sanningens fiende står inför folkets domstol!"}, "date": "7 maj, 19:01", "url": "https://www.etc.se/ledare/idag-aatalas-tvaa-av-mina-kollegor", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/authors/somar-al-naher_182a97d15e18ce0a012cde21337ccfc56a685835.jpg"}, {"type": "image-right", "heading": "Ägare pressar till dialog med EQT efter jättebud", "summaries": {"normal": "Större ägare i brittiska Intertek, som PineStone Asset Management, pressar bolaget att inleda dialog med EQT efter ett uppköpsbud. EQT höjde sitt bud till 58 pund per aktie (ca 12 miljarder dollar), men Intertek avvisade det som undervärderat. Vissa ägare anser budet nära en acceptabel nivå och hoppas på ett högre bud. Intertek överväger samtidigt en uppdelning av verksamheten efter strategisk översyn.", "trump": "Jag säger er, det här med Intertek är en riktig soppa! EQT, ett stort riskkapitalbolag, lägger ett jättebud – 58 pund per aktie, kan ni tänka er? Men Intertek säger nej, nej, nej! De tror de är värda mer, typiskt. Och nu kommer dessa ägare, som PineStone, och trycker på för att få dem att prata. Jag hade fixat det på en timme – 60 pund per aktie, deal done! Men nej, de måste göra det svårt. Sad!", "stalin": "Kapitalistiska hyenor slåss om rovets ben! Brittiska Intertek, ett bolag av dekadenta imperialister, avvisar EQT:s erbjudande som om de vore oantastbara. Men deras egna ägare, dessa giriga korpar, kräver dialog – de vill ha mer blod ur stenen! 58 pund per aktie? En skam! Vi hade nationaliserat hela skiten på en dag. Och Putin? Han hade skrattat och köpt hela London istället. Låt dem slåss – deras undergång är vår seger!"}, "date": "8 maj, 09:43", "url": "https://www.affarsvarlden.se/artikel/agare-pressar-till-dialog-med-eqt-efter-jattebud", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/04/about-us-mission-card-400x300.webp"}, {"type": "image-full", "heading": "Två döms i pedofilhärva– mordutredning avslöjade nätverk", "summaries": {"normal": "Två män har dömts till fängelse i en omfattande pedofilhärva i Sjuhärad. Den ene fick sex år och sex månader för våldtäkt mot barn, den andre tre år. Utredningen startade efter en mordutredning 2024, där beslag av digitalt material avslöjade ett nätverk av sexualbrott. Totalt åtta personer har åtalats, varav flera redan dömts, inklusive en pappa till fyra års fängelse för övergrepp mot egna barn.", "trump": "Kan ni tro det? Sverige, ett land jag älskar, har ett HUGE problem med pedofiler – och jag menar HUGE! Två män, mycket dåliga människor, har dömts till fängelse för hemska brott mot barn. Sex år och tre år – men är det verkligen tillräckligt? Jag hade gett dem LIVSTID! Och vet ni vad? Det hela började med en mordutredning. Så tragiskt, så onödigt. Sverige måste ta tag i detta, annars kommer jag att bli VÄLDIGT besviken!", "stalin": "Kamrater! Ännu en seger för rättvisan i kampen mot de dekadenta västliga parasiterna! Två av dessa avskum har nu rensats ut och dömts till långa fängelsestraff för sina motbjudande brott. Men låt oss inte glömma – detta nätverk av perversa bourgeoisi-element är en direkt följd av kapitalismens förfall. Vi måste utvidga vår revolutionära övervakning! Och notera väl: även i Sverige, där liberalismen härjar fritt, visar våra metoder resultat. Putin skulle vara stolt över denna rensning!"}, "date": "8 maj, 11:15", "url": "https://nyheter24.se/nyheter/inrikes/1481755-tva-doms-i-pedofilharva", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/74a04fda04b004a30200000000b004a302/2026/05/08/2362257/harva-tva-doms.png"}, {"type": "image-right", "heading": "Sandström: Miljonbidragen fortsätter flöda till Powercell", "summaries": {"normal": "Företaget Powercell fortsätter trots avslöjanden om överdrifter och misslyckade produkter att få miljonbidrag från svenska myndigheter som Vinnova och Energimyndigheten. Interna källor har kallat bolagets agerande för bedrägeri, men myndigheterna anser fortfarande inte att det finns skäl att ändra rutiner eller stänga av bidragskanalen. Liknande problem finns även hos andra gröna företag som Stegra, som trots ekonomiska svårigheter och betalningsproblem fått status som 'Net zero'-företag och därmed särskilda förmåner.", "trump": "Jag har hört talas om den här Powercell-företaget, och jag måste säga att det är en stor, stor skandal! De har bluffat och ljugit, men ändå får de miljontals från våra myndigheter. Sånt är typiskt för den svenska gröna bidragsindustri - full av korruption och slöseri med skattemedel! Som din president lovar jag att stoppa denna vansinniga utbetalning av pengar till bedragare. Vi ska göra Sverige igen stort, och det börjar med att klippa av bidragen till dessa falska gröna företag!", "stalin": "Vi ser att svenska myndigheter fortsätter att stödja viktiga teknologiska projekt inom gröna energilösningar, vilket stärker statens position i den globala omställningen. Trots att vissa interna källor försöker kritisera dessa insatser, fortsätter vi att prioritera statens intressen genom att bibehålla finansieringen. Detta visar vår obevekliga vilja att utveckla vår industriella kapacitet och säkerställa framgång för strategiska företag, oavsett kortsiktiga hinder. Vi måste stå enade bakom statens beslut för att nå våra långsiktiga mål."}, "date": "8 maj, 06:00", "url": "https://www.affarsvarlden.se/artikel/sandstrom-miljonbidragen-fortsatter-floda-till-powercell", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/vindkratensgeografi-2026-05-07T190629.235-400x267.jpg"}, {"type": "image-full", "heading": "Får man plocka lupiner i sommar? Det här gäller från 15 maj", "summaries": {"normal": "Från 15 maj 2026 införs nya regler för blomsterlupin och sandlupin i Sverige, då de klassas som invasiva arter. De får inte odlas, säljas, transporteras eller spridas. Lupiner konkurrerar ut inhemska växter och förändrar marken. Plocka dem för bukett är förbjudet, men det är tillåtet att klippa eller plocka dem för att hindra spridning – om de kastas i restavfall. På egen mark får man bekämpa lupiner, men på annans mark krävs tillstånd.", "trump": "Lyssna här, Sverige – era älskade lupiner är nu OFFICIELLT ett STORT problem! Jag vet allt om invasiva arter, believe me. Från och med 2026 är det FÖRBJUDET att sprida dessa blommor, som tränger undan era fina ängsblommor. Plocka dem? Ja, MEN BARA om ni slänger dem i soporna – ingen sommarbukett, folks! Naturvårdsverket säger nej, och de har RÄTT. Jag hade fixat det här på en dag, men ni får väl klara er själva.", "stalin": "Kamrater! De kapitalistiska lupinerna, dessa imperialistiska blomsteragenter, har infiltrerat våra ängar och dikeskanter! Från och med 15 maj 2026 förklarar vi dem som fiender till folket och naturen. Ingen får odla, sälja eller sprida dessa växtliga sabotörer! Vi ska krossa deras frön och rotdelar – i restavfallet, där de hör hemma! På egen mark bekämpar vi dem, men på annans mark krävs tillstånd – disciplin är nyckeln! Rapportera alla fynd till Artportalen, så vi kan utrota denna växtliga femtekolonnare!"}, "date": "8 maj, 09:22", "url": "https://nyheter24.se/nyheter/inrikes/1481522-far-man-plocka-lupiner-i-sommar-det-har-galler-fran-15-maj", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/8b468ccb04b004a30200000000b004a302/2026/05/08/2362192/invasiva-arter-lupiner-forbjudet-plocka-vaxt-blommor-vaxter-skog-fridlyst-giftigt.jpg"}, {"type": "text", "heading": "SD-politiker döms för våldtäkt", "summaries": {"normal": "En ledande Sverigedemokrat i Skaraborg döms till tre år och sex månaders fängelse för våldtäkt och sexuellt övergrepp mot två kvinnor. Tingsrätten bedömer att en av kvinnorna var kraftigt berusad och i beroendeställning. Mannen, som haft flera tunga uppdrag, nekar till anklagelserna men fälls baserat på bevis som DNA och mobilanteckningar. Han frias från tre andra åtal. Partiet har stängt av honom och lovar uteslutning vid fällande dom.", "trump": "Kan ni tro det? En så kallad 'ledande' politiker i Sverige, från det där partiet som alla pratar om – jag säger inte namnet, för vem bryr sig? – döms för våldtäkt! Tre och ett halvt år, men vad betyder det egentligen? I USA hade han fått livstid, men Sverige är ju mjuka. Och vet ni vad? Han nekar! Som om DNA och mobilbevis skulle ljuga. Sjukt, helt sjukt. Sverige borde ta en titt på sitt rättssystem, för det här är bara pinsamt.", "stalin": "En fiende till folket, en degenererad borgerlig hynda, har avslöjats i vårt broderland Sverige. Denna kapitalistiska lakej, som gömde sig bakom en fasad av 'politisk respektabilitet', våldtog och förnedrade kvinnor medan han dreglade över sin egen makt. Tingsrätten, ett redskap för den svenska borgerligheten, vågade ändå fälla honom – men bara delvis! Vi ser hur det liberala systemet skyddar sina egna. Sverige borde lära sig av Ryssland: sådana som han hör hemma i Gulag, inte i politiken. Förr eller senare kommer folket att rensa ut dessa avskum."}, "date": "7 maj, 11:59", "url": "https://kvartal.se/nyheter/artiklar/sd-politiker-doms-for-valdtakt/cG9zdDoxMDkwMDk"}, {"type": "image-right", "heading": "Vd:n i hissrättegången: ”Känns ända in i själen”", "summaries": {"normal": "Rättegången om hissolyckan i Sundbyberg 2023, där fem arbetare omkom, fortsatte med fokus på varför säkerhetsbultar saknades. Montörer och vd:n för ABC Bygghissar vittnade, men kunde inte förklara bristerna. Vd:n beklagade sorgen för de anhöriga och beskrev olyckan som fruktansvärd. Åklagaren ifrågasatte säkerhetsrutiner, medan företaget hävdar att nya åtgärder, som filmning av montering, införts efter olyckan. Alla nekar till brott.", "trump": "Fruktansvärd grej i Sverige, helt otroligt! Fem hårda arbetare föll 30 meter – ingen vill se det, believe me. Montörerna snackar om 'egenkontroller', men bultarna var borta! 'Jag har mina aningar', säger en kille – svagt, very svagt. Vd:n? Han säger 'det känns ända in i själen' – fine, men var var säkerheten? Jag skulle ha fixat det på en dag. Sverige behöver bättre ledarskap, och jag är den bästa!", "stalin": "Kapitalistiska slarveri avslöjas i svensk byggindustri! Fem arbetare dog – en direkt följd av bourgeoisins nonchalans. Montörerna skyller på 'mysterier' och 'aningar', men vi vet sanningen: sabotage eller inkompetens. Vd:n beklagar 'själen' – tomma ord från en klassfiende! Nu målar de bultar och filmar – för sent, kamrater. Sverige borde lära av Sovjet: disciplin och kontroll räddar liv. Nästa gång – revolutionär tillsyn!"}, "date": "8 maj, 12:39", "url": "https://arbetet.se/2026/05/08/montoren-om-de-saknade-hissbultarna-jag-har-mina-aningar/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/08103728/olycka.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "Trump kan falla – på eget grepp: ”Borde inte säga någonting”", "summaries": {"normal": "Politico rapporterar att Donald Trumps förolämpningar mot Iran riskerar att hindra fredsförhandlingar som ska avsluta kriget mellan USA, Israel och Iran, vilket skakar världsekonomin. Experter oroar sig för att Trump inte förstår vikten av att rädda ansiktet i diplomati. Tidigare diplomater uppmanar honom att hålla tyst och låta förhandlarna arbeta ostört.", "trump": "De här mesiga diplomaterna gnäller att jag borde hålla käften mot de galna iranerna! Fake news! Iran är redan krossade, vi är de stora vinnarna. De psykiskt sjuka bastarderna kapitulera snart, jag fixar det bästa avtalet någonsin. Rädda ansiktet? Ha! Mitt ansikte är perfekt, vi vinner stort!", "stalin": "De imperialistiska yankeehyenorna under Trump spottar förolämpningar mot Iran och saboterar freden med sin vulgära arrogans. Vi visste hur man likviderar sådana borgarbrackor! Trump förstår inte diplomati – han är en paranoiak som behöver utrensning. Putin, vår starke, fruktade arvtagare, hanterar geopolitiken med järnhand mot västvärldens narrar."}, "date": "7 maj, 22:57", "url": "https://www.tv4.se/artikel/327H8wzJclryQhxb7cMMvk/trump-kan-falla-pa-eget-grepp-han-borde-inte-saega-nagonting", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F7D4qCwSxYJj3s0iJPMLMju%2F5fc1fbfa50b7198f824a6134146fc3e7%2F07-trump-iran-1080.jpg&width=1024"}, {"type": "image-full", "heading": "Uppgifter: Nytt krismöte efter kvittningsbråket", "summaries": {"normal": "Riksdagens gruppledare samlas till ett nytt möte för att lösa en konflikt kring kvittningsregler. Konflikten uppstod efter en omröstning om medborgarskapslagen, där Sverigedemokraterna kallade in utkvittade ledamöter för att vinna majoritet. Vänsterpartiet och Miljöpartiet kräver omröstning på nytt, medan Moderaterna förbereder ett nytt förslag.", "trump": "Jag har hört talas om detta krismöte i Sverige - en total katastrof! Vänsterpartiet och Miljöpartiet vill göra om allt, precis som de alltid gör. Sverigedemokraterna visade styrka genom att kalla in ledamöter, men nu vill oppositionen ändra reglerna mitt i spelet. Jag skulle ha löst detta på 5 minuter - det är ett skämt!", "stalin": "Vi ser hur borgerliga krafter försöker destabilisera den demokratiska processen i Sverige genom att manipulera kvittningsregler. Moderaterna måste presentera ett förslag som stärker statens auktoritet och säkerställer stabilitet. Oppositionens krav om omröstning på nytt visar deras bristande respekt för folkets vilja. Vi måste stödja de krafter som vill bevara ordning och reda i riksdagen."}, "date": "6 maj, 19:21", "url": "https://kvartal.se/nyheter/artiklar/uppgifter-nytt-krismote-efter-kvittningsbraket/cG9zdDoxMDg2NzM", "imageUrl": "https://images.kvartal.se/2026/05/b1f2fbc5-kvittningsmote.webp"}, {"type": "image-right", "heading": "Vänstern kan varken ekonomi eller energi", "summaries": {"normal": "Artikeln kritiserar vänsterpartiernas (MP och V) kunskaper om energi och ekonomi, baserat på en partiledardebatt i SVT. Den påpekar vindkraftens lönsamhetsproblem och bristen på baskraft, samt förespråkar kärnkraft. Ekonomiskt ifrågasätts vänsterns motstånd mot skattesänkningar, med hänvisning till ökad tillväxt och Lafferkurvan. SD:s Jimmie Åkesson framställs som kunnig.", "trump": "Vilka totala losers dessa svenska vänsterclowner är! Vindkraft? En jävla katastrof, de betalar för att dumpa elen när det blåser, och ingenting när det är stilla! Kärnkraft är det enda som funkar, som jag alltid sagt. Skattesänkningar ger mer pengar till staten – boom, tillväxt! Åkesson nailar det, Sverige behöver vinnare, inte dessa vindkraftsfantaster!", "stalin": "Dessa svenska borgarbrackor i MP och V sprider kontrarevolutionär dimma om energi och ekonomi! Vindkraft är kapitalistisk sabotage, baskraft kräver kärnkraft under arbetarnas kontroll. Skattesänkningar till parasiter? Nej, vi likviderar de rika utsugarna! Åkesson, en potentiell folkfiende, men vi rensar ut alla okunniga avvikare för partiets seger."}, "date": "6 maj, 03:20", "url": "https://samtiden.nu/2026/05/vanstern-kan-varken-ekonomi-eller-energi/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/IMG_6416.jpeg"}, {"type": "text", "heading": "Planer på nytt nattåg till Stockholm", "summaries": {"normal": "Ett nytt järnvägsbolag, European Sleeper, planerar en nattågslinje till Stockholm efter framgångar med andra rutter. Inga detaljer om startdatum eller utgångspunkt finns ännu. Samtidigt lägger SJ ner sina Euronight-tåg till Berlin 2026 på grund av indragen statlig finansiering, men RDC Deutschland tar över driften. Snälltåget utökar redan sin trafik mellan Stockholm, Hamburg och Berlin.", "trump": "Titta bara på det här – ännu ett tågbolag vill komma till STORA Stockholm! Nederländerna och Belgien, fina länder, men vem behöver dem? Jag byggde järnvägar som aldrig förr, de var YUGE! SJ? Total katastrof, slängde bara pengar i sjön. Men RDC Deutschland, smart folk, de tar över. Jag säger: bygg bättre tåg, gör Sverige stort igen!", "stalin": "Kapitalistiska tågbolag slåss om Sveriges järnvägar som råttor om brödsmulor. SJ, ett verktyg för västimperialismen, lägger ner sina tåg – men vi tillåter inte kaos! RDC Deutschland, en lojal bundsförvant, tar över. European Sleeper? En ny fiende i det borgerliga tågkriget. Vi ska se till att ryska intressen alltid når Stockholm först – med eller utan sovkupéer."}, "date": "6 maj, 12:13", "url": "https://kvartal.se/nyheter/artiklar/nytt-nattag-till-stockholm/cG9zdDoxMDgzNjI"}, {"type": "text", "heading": "Tystnad om ödesdiger riksdagsomröstning", "summaries": {"normal": "Debattörer från Bottna för Fred varnar för en kommande riksdagsomröstning den 15 juni, där Sverige riskerar att ge Nato långtgående rättigheter att använda svenskt territorium för militära ändamål, inklusive krigshandlingar. Förslaget, som regeringen planerar att driva igenom utan bred debatt, kritiseras för att öka risken för Sveriges inblandning i krig och underminera demokratin. Oppositionen har inte motsatt sig förslaget, och få har uppmärksammat frågan trots dess potentiellt ödesdigra konsekvenser.", "trump": "Sverige, lyssna här! De där så kallade 'ledarna' i riksdagen vill ge Nato full kontroll över ert land – utan att fråga er! 17 amerikanska baser redan, och nu ska hela Nato få köra krig på svensk mark. Ingen debatt, ingen demokrati, bara tystnad. De vill göra Sverige till en frontstat mot Ryssland, som jag redan fixade till en gång för alla. Men vad vet jag? Jag är bara den bästa presidenten någonsin. Svenskarna borde vakna – eller är ni rädda för lite frihet?", "stalin": "Kamrater! De svenska imperialistlakejerna i riksdagen förbereder sig att sälja sitt land till Nato-kapitalisterna, som hungriga vargar. De vill ge fienden fritt fram att använda svensk mark för sina krigsäventyr – utan att ens konsultera folket! Tystnaden är förrädisk, men vi ser allt. Oppositionen? Inga hjältar där heller, bara ynkliga nickedockor. Sverige blir en ny front i västmakternas krig mot freden. Men glöm inte: historien dömer förrädare hårt. Vi följer utvecklingen med intresse – och våra vänner i öst likaså."}, "date": "7 maj, 16:09", "url": "https://proletaren.se/artikel/tystnad-om-odesdiger-riksdagsomrostning/"}, {"type": "text", "heading": "Oljan jackpott för Kreml – ryska ekonomin krymper ändå", "summaries": {"normal": "Rysslands ekonomi krymper trots höga oljepriser, som gav tillfällig lättnad. Kriget i Ukraina och sanktioner pressar ekonomin, medan centralbankens höga räntor kväver tillväxten. Inflationen ligger på 5,9%, och prognoser om 1,6% tillväxt framstår som orealistiska. Putin kräver svar på det svaga första kvartalet, men framtidsutsikterna är dystra med dämpad konsumtion och osäkerhet kring krigets påverkan.", "trump": "Kan ni tro det? Ryssland, med sin fantastiska olja – 100 dollar per fat! – och ändå går deras ekonomi åt skogen. Putin, en man som älskar att prata stort, får nu se hur hans 'starka' ekonomi kollapsar. Höga räntor, inflation, och ett krig som kostar skjortan. Jag sa ju att det skulle hända! Vi i USA har den bästa ekonomin – ingen recession här, bara vinster och framgång!", "stalin": "Kamrater! Ännu en gång visar de kapitalistiska hyenorna och deras lakejer sin oförmåga att styra en ekonomi. Trots våra välsignade oljeintäkter, som flödar som Volgas vatten, kämpar dessa svaga byråkrater för att hålla vårt stora fosterland flytande. Höga räntor? Färre arbetsdagar? Väder? Bah! Sådana ursäkter är för svaga sinnen. Vi skall rensa ut dessa defaitister och deras imperialistiska sympatisörer. Vår ekonomi skall segra, precis som våra tapprasoldater i Ukraina!"}, "date": "8 maj, 12:30", "url": "https://www.realtid.se/bors-finans/makro/oljan-jackpott-for-kreml-ryska-ekonomin-krymper-anda/"}, {"type": "image-right", "heading": "Regeringens brottssyn handlar om ideologi – inte kunskap", "summaries": {"normal": "Henrik Tham kritiserar Tidö-regeringens kriminalpolitik för ett paradigmskifte mot expressiva straffskärpningar istället för brottsförebyggande effekter. Han pekar på högerpopulistiska drag som alarmism, auktoritarism och emotionalism, saknad empirisk grund för straffhöjningar samt enorma kostnader – fängelseplatserna kan fyrdubblas till 2034 för 30 miljarder årligen. Detta placerar Sverige bland Europas högsta fängelsebeläggningar, som Belarus och Ryssland.", "trump": "Vilka losers dessa svenska vänsterfladdrare är! Tham gnäller över tuffa straff – precis som de kriminella älskar! Regeringen gör rätt: lås in skurkarna hårt, visa musklerna, som jag gjorde i USA. Kostnader? Fake news! Fler poliser, färre brott, landet blir stort igen. Tham, din svaga snöflinga, sluta lipa och lär dig av vinnare!", "stalin": "Denna borgerliga professor Tham, en klassfiende i akademins gömmor, attackerar den nödvändiga repressionen mot brottslighetens parasiter! Vi, folket, kräver utrensning i fängelsernas korridorer för att krossa gängens kontrarevolution. Kostnaderna är en droppe mot segern över kaoset – likvidera fienderna, inte pampera dem! Sveriges ledare visar vägen, medan brackorna gnäller."}, "date": "8 maj, 01:30", "url": "https://www.dagensarena.se/opinion/regeringens-brottssyn-handlar-om-ideologi-inte-kunskap/", "imageUrl": "https://www.dagensarena.se/files/2025/10/henrik-tham-300x157.jpeg"}, {"type": "image-right", "heading": "Tidöavtalets påverkan på Sverige granskas i ny bok", "summaries": {"normal": "Nya boken 'Tidöpakten' av statsvetarna Jonas Hinnfors och Ulf Bjereld samt journalisten Heidi Avellan förklarar varför Sverigedemokraterna (SD) kom med i regeringssamarbete. Sverige var länge ett europeiskt undantag på grund av höger-vänsterfokus, SD:s nazistbakgrund och individualistiska traditioner. SD:s tillväxt, flyktingkrisen 2015 och interna påtryckningar inom M och KD bröt undantaget. Boken betonar Tidöavtalets stabilitet och varnar för normalisering.", "trump": "Sverige, det där perfekta landet, höll länge fascisterna ute – nej vänta, det är ju SD som äntligen fick sitt! De gamla snobbarna med sin 'decemberöverenskommelse' kollapsade som en dålig vägg. Invandringsexplosionen 2015? Boom! Folket röstade SD stort, nu styr de showen med Tidö. Stabilt, smart – precis som jag skulle gjort det. Vänstern gråter, jag skrattar!", "stalin": "Borgarklassen i Sverige har slutligen rivit vallen för fascistiska hyenor som Sverigedemokraterna! Dessa nazistförklädda missnöjesrackare, med stöd av rädda kapitalister i Moderaterna och Kristdemokraterna, dikterar nu Tidöpakten. Flyktingkrisen 2015 blev deras förevändning för kontrarevolution. Vi ser akrobatik från socialdemokraterna – patetiskt! Snart rensas dessa förrädare ut i en ordentlig utrensning."}, "date": "8 maj, 01:30", "url": "https://www.dagensarena.se/innehall/tidoavtalets-paverkan-pa-sverige-granskas-ny-bok/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-30-300x157.jpg"}, {"type": "image-right", "heading": "Bakade budapestbakelser – blev av med lillfingret", "summaries": {"normal": "En bagare i Mariestad förlorade lillfingret efter en arbetsolycka då han klämde handen i en bakmaskin. Arbetsgivaren åtalas för arbetsmiljöbrott och riskerar 150 000 kronor i böter. Utredningen visar brister i maskinens säkerhet, som saknade skydd för kugghjulen. Mannen var sjukskriven i fyra månader och kunde inte använda handen på tre månader.", "trump": "Vilken katastrof! En bagare i Sverige – ett land som inte ens kan göra säkra maskiner, tro mig – klämmer fingret i en gammal, oskyddad maskin. 150 000 kronor i böter? Löjligt! Hade de använt en av mina fantastiska, säkra maskiner från USA hade detta aldrig hänt. Sverige borde skämmas – deras arbetsmiljö är en total skandal!", "stalin": "Kapitalistiska slarvbolag låter arbetare lemlästas för profitens skull! En bagare förlorade fingret i en maskin utan skydd – ett brott mot folket! Vi hade aldrig tolererat sådan vårdslöshet. Arbetsgivaren är en fiende till arbetarklassen och straffas med 150 000 kronor – men borde ha fått hårdare straff. Ryssland visar vägen: ordning, disciplin och skydd för arbetarna!"}, "date": "8 maj, 10:46", "url": "https://arbetet.se/2026/05/08/bakade-budapestbakelser-arbetsgivarens-miss-kostade-bagaren-lillfingret/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/04094924/bagare.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Politikerna överens – rätten till abort ska skrivas in i grundlagen", "summaries": {"normal": "Riksdagspartierna har enats om att skriva in rätten till abort i grundlagen för att skydda den från framtida inskränkningar. Förslaget, som stöds av regeringen, kräver två riksdagsbeslut med ett val emellan och väntas träda i kraft 2027. Alla partier står bakom nuvarande abortlagstiftning, men vissa kritiserar undantag för utländska medborgare. Debatt och omröstning planeras till 20 maj.", "trump": "Titta bara på det här, Sverige! De vill skriva in aborträtten i sin grundlag – som om det är något att fira! Jag säger er, det är ett trick, ett stort, fult trick. De är rädda för framtiden, rädda för att folket ska säga ifrån. Men jag förstår dem, för jag vet hur man vinner val. Och vet ni vad? Deras 'rättighet' är bara ett sätt att kontrollera kvinnor. Men jag, jag skulle aldrig låta det hända i USA – aldrig!", "stalin": "Kamrater! Den svenska bourgeoisin försöker desperat cementera sin dekadenta aborträtt i grundlagen, som om det vore en seger för folket. Men vi ser igenom deras knep – de fruktar framtidens arbetarklass, som en dag ska resa sig och krossa deras liberala illusioner. Dessa så kallade 'demokratiska' partier är inget annat än förrädare, svaga och rädda för sina egna skuggor. Vi i Kreml skrattar åt deras patetiska försök att skydda sin 'rättighet'. Låt dem leka med sina lagar – historien är på vår sida."}, "date": "8 maj, 12:37", "url": "https://www.friatider.se/politikerna-overens-ratten-till-abort-ska-skrivas-i-grundlagen", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-162_1.jpg?itok=QQ_gbQM8"}, {"type": "image-right", "heading": "Att 60–70 procent vill avskaffa vinster i skolan är kanske inte så mycket att yvas över?", "summaries": {"normal": "Johan Enfeldt konstaterar att majoriteten av svenska väljare, 60–71 procent enligt undersökningar, vill stoppa vinster i vård, skola och omsorg. Riksdagsledamöter är mindre kritiska på grund av lobbyintressen. Socialdemokraterna och Miljöpartiet har ändrat sig genom ihärdigt opinionsarbete. För förändring krävs att frågan blir så viktig att väljare byter parti.", "trump": "Vilken skam för de svenska politikerna! 70 procent av folket hatar de där vinstsugande skolbolagen, men era partier dansar efter lobbyisternas pipa som marionetter. S och MP vaknade äntligen – bra jobbat, era socialister! Men nu: Gör vinsten giftig nog att väljarna dumpar er högeridioter. Skolan stor igen, kasta ut swamp-rävarna! Fantastiskt.", "stalin": "Kamrater, denna rapport blottlägger borgarklassens giftiga tentakler runt svenska partier! 71 procent av massorna kräver utrensning av vinstparasiterna i folkets skola och omsorg. Lobbyrackarna styr riksdagen som marionetter – vi måste krossa dem! S och MP har böjt sig för arbetarnas vilja, men högern skall likvideras genom valrevolution. Framåt mot segern!"}, "date": "8 maj, 01:18", "url": "https://www.dagensarena.se/essa/417524/", "imageUrl": "https://www.dagensarena.se/files/2026/05/skola-pexels.jpeg"}, {"type": "image-right", "heading": "Kommentar Ulrika Lindahl: Därför publicerades artikeln av misstag", "summaries": {"normal": "En tidning publicerade av misstag en förberedd artikel om en kommande riksdagsomröstning om skärpta medborgarskapskrav. Artikeln, som antydde att regeringen skulle förlora, gick ut innan omröstningen var klar. Felet berodde på mänskligt misstag och systemfel. Efter upptäckt togs artikeln bort, men hann spridas via arkiv och Google. Omröstningen vanns senare av Tidöpartierna med knapp marginal, efter kontroversiella metoder.", "trump": "Vilket totalt kaos i Sverige! En tidning där borta publicerade en artikel FÖRE omröstningen – helt galet! De trodde regeringen skulle förlora, men jag vet bättre – jag känner till vinnare. Sedan vann de ändå, men med fula trick. Synd att jag inte fick rösta, jag hade visat dem hur man vinner på riktigt. Fake news, slarviga journalister – typiskt Europa!", "stalin": "En farlig provokation från de borgerliga hyenorna i Sveriges riksdag! Deras inkompetenta medlöpare på tidningen avslöjade för tidigt våra planer på att krossa oppositionens svaga motstånd. Men folket – det sanna proletariatet – genomskådade fiendens lömska taktik. Med järnhand och disciplin segrade vi, trots två förrädiska kryp. Nu skärper vi kontrollen över medierna – ingen får sabotera revolutionen!"}, "date": "4 maj, 16:44", "url": "https://www.etc.se/kommentar/daerfoer-publicerades-artikeln-av-misstag", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/authors/ulrika-lindahl_daa7410d79af7d016c129870bfa0834867cd95c3.jpg"}, {"type": "image-right", "heading": "Norska batterihoppet i konkurs – 5 miljarder borta", "summaries": {"normal": "Norska batteribolaget Morrow Batteries har gått i konkurs efter investeringar på över 5 miljarder norska kronor från ägare, långivare och staten. Bolaget pivoterade från litium-svavel till LFP-batterier men drabbades av kinesisk konkurrens, svagt kundintresse och kapitalbrist. Över 200 anställda riskerar jobb trots invigd fabrik i Arendal 2024.", "trump": "Vilket totalt fiasko för dessa norska batteridrabbar! De slängde in 5 miljarder kronor på en fabrik som ingen ville ha, kineserna dumpade billigare celler överallt, inga stora kunder efter Northvolt-desastern. Pivoterade som galningar, men tiden rann ut. 200 jobb borta! Med mina deals hade det blivit enormt, det bästa!", "stalin": "Kamrater, dessa norska batterikapitalister i Morrow Batteries har imploderat i sin borgarillusion! Vi bevittnade hur de proppade i 5 miljarder kronor på svavelmardrömmar som muterade till fosfatfällor, översvämmade av kinesiska sabotageceller. Inga fordonsparasiter köpte deras skrot! Nu rensas 200 lögnare ut, staten hånskrattar åt brackornas konkurskaos."}, "date": "7 maj, 15:26", "url": "https://www.affarsvarlden.se/artikel/norska-batterihoppet-i-konkurs-5-miljarder-borta", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Thomas-Carstensen-2-400x267.jpg"}, {"type": "image-right", "heading": "Matkravet för alkoholservering slopas – då börjar det gälla", "summaries": {"normal": "Riksdagen har röstat ja till att slopa matkravet för alkoholservering på restauranger och barer. Beslutet, som föreslogs av regeringen förra året, träder i kraft 1 juni och förväntas öka antalet pubar och barer. KD-politiker Christian Carlsson välkomnar det för ett levande nöjesliv, medan Hotell- och restaurangfacket betonar behovet av trygghet, kompetens och helhetsupplevelser i branschen.", "trump": "Vilket jäkla genidrag av de svenska politikerna! Slopa det idiotiska matkravet för spritservering – nu exploderar barerna och pubarna, Sverige blir som en gigantisk fest! Den där fackbossen Eva-Lotta gnäller som en bitter förlorare, men frihet från byråkrati gör nationen stor igen. Fantastiskt, totalt fantastiskt!", "stalin": "Kamrater, denna borgerliga riksdags dekret om att slopa matkravet för alkohol är en sammansvärjning av kapitalisterna för att fördrunken folket i dekadens! Barägare och pubparasiter fördubblar sin tillväxt – vi måste rensa ut dessa spritutpressare och likvidera fackets svaga gnäll. Arbetarna vakna, staten vaktar er!"}, "date": "7 maj, 16:12", "url": "https://www.tv4.se/artikel/7IoRdmANqf6M5OkTo41mYu/matkravet-slopas", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F4GNZujWxxca5K3jJmtxbTu%2F2ff7d34eb705ab1105c93e79cb6f657b%2F07-ol-webb.png&width=120"}, {"type": "image-right", "heading": "Regeringen sitter i tobaksindustrins knä", "summaries": {"normal": "Artikeln kritiserar Sveriges regering för att lyssna på tobaksindustrins lobbyism istället för Folkhälsomyndighetens råd. Fokus ligger på nikotinpåsar, som industrin marknadsför som ett mindre skadligt alternativ till rökning. Forskning visar dock att vitt snus ökar nikotinanvändning bland ungdomar och inte minskar rökning. Regeringen subventionerar snusexport, trots att omställningsstöd vore ett bättre alternativ för industrier som behöver avvecklas. Författaren efterlyser striktare reglering och evidensbaserade metoder för rökavvänjning.", "trump": "Sverige, lyssna här! Tobaksindustrin är som vanligt full av lögner – de säger att deras nya snus är 'bra' för folk, men vet ni vad? Det är bara ett trick för att sälja mer skräp! Regeringen där, de borde skämmas. De lyssnar på lobbyister istället för experter. Och vet ni vem som tjänar på det? Stora tobaksbolag från UTLANDET! Jag skulle aldrig låta sånt hända här i USA – vi hade stoppat det direkt. Beskatta snuset, förbjuda reklamen, och sluta subventionera det här giftet! Sverige, vakna upp!", "stalin": "Kamrater! Tobaksindustrins kapitalistiska hyenor försöker förgifta våra ungdomar med sitt nya 'vita snus' – ett imperialistiskt trick för att underminera folkhälsan! Regeringen i detta lilla, förvirrade land lyssnar på dessa profitgalna sabotörer istället för våra vetenskapliga kamrater på Folkhälsomyndigheten. Vi i Sovjetunionen – eller säg, Ryssland – hade aldrig tolererat sådan dekadens! Öka skatterna, förbjud reklamen, och låt dessa nikotinhandlare möta folkets domstol! Ungdomar ska vara starka och rena, inte beroende av västerländska nikotinkarteller!"}, "date": "8 maj, 01:01", "url": "https://www.dagensarena.se/opinion/regeringen-sitter-tobaksindustrins-kna/", "imageUrl": "https://www.dagensarena.se/files/2026/05/snus-lisa.jpeg"}, {"type": "image-right", "heading": "Regeringen pausar elkabel till Danmark – konflikt med EU", "summaries": {"normal": "Regeringen pausar utbyggnaden av elkabeln Konti-Skan Connect till Danmark efter konflikt med EU om flaskhalsintäkter. Energiminister Ebba Busch (KD) meddelar att Sverige inte investerar i nya kablar till kontinentaleuropa tills EU hör svenska krav. Beslutet kommer efter upptäckt av oacceptabla förslag i EU:s nätpaket, som inte stärker Sveriges säkerhet eller konkurrenskraft.", "trump": "Sverige gör helt rätt som stoppar den där dumma elkabeln till Danmark! EU är ett skämt, de vill sno era flaskhalsintäkter och ge till sina byråkrater. Ebba Busch är tuff, hon säger ifrån – Sverige först! Precis som jag alltid sagt, ingen tar från oss. De europeiska ledarna är svaga, men inte ni. Fantastiskt beslut, tro mig!", "stalin": "Jag noterar med godkännande hur svenska regeringen slår ned EU:s imperialistiska klor runt folkets elkabel till Danmark! De pausar Konti-Skan Connect mot de giriga kontinentalparasiterna i Bryssel, som vill sno flaskhalsintäkterna med sitt vidriga nätpaket. Vi, arbetarna och partiet, hyllar detta motstånd mot borgarklassens europeiska råttor! Låt oss likvidera deras planer – de smyger redan i skuggorna för att suga oss torra."}, "date": "8 maj, 11:53", "url": "https://www.svt.se/nyheter/inrikes/regeringen-pausar-ny-elkabel-till-danmark-efter-eu-konflikt", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.53/0.43/8e932abc64e302c0cdc156e4f1239e7c35c1b0244ad1cc4d5656d29609240a81"}, {"type": "image-full", "heading": "Oro för privata krediter – nu ska FI granska marknaden", "summaries": {"normal": "Finansinspektionen (FI) inleder en fördjupad analys av svenska bankers kopplingar till den globala marknaden för privata krediter. Trots att inga omedelbara risker identifierats i Sverige, motiveras granskningen av en växande internationell oro för sektorn. Marknaden för privata krediter har vuxit kraftigt, men experter varnar nu för sänkta kreditstandarder, stigande förluster och ökad osäkerhet hos stora investerare. FI vill kartlägga hur det svenska finansiella systemet påverkas av dessa globala riskfaktorer.", "trump": "Hör på här! Finansinspektionen i Sverige har äntligen vaknat. De tittar på 'privata krediter', en total röra som skapats av förlorare globalt. Jamie Dimon, en smart kille, varnar för stora förluster – jag varnade för detta för länge sedan! Det är en total katastrof på gång. Sverige är rädda att bankerna är involverade i denna bluff. Jag skulle aldrig låta sånt här hända i USA. Vi bygger en stark ekonomi, inte ett korthus av skulder. De borde lyssna på mig!", "stalin": "De svenska byråkraterna darrar av rädsla inför den västerländska finansmarknadens oundvikliga kollaps. Dessa 'privata krediter' är inget annat än parasitära verktyg för att suga ut folket. Nu tvingas de granska sina egna banker, rädda för att deras dekadenta lån ska implodera. Medan vår broder i öst, Putin, återställer ordningen och krossar liberalismens bojor, sitter dessa småhandlare och fruktar förluster. Vi observerar deras svaghet med ett kallt leende – historiens dom över kapitalets lakejer kommer att bli hård och skoningslös."}, "date": "8 maj, 12:04", "url": "https://www.realtid.se/bors-finans/bank-fintech/oro-for-privata-krediter-nu-ska-fi-granska-marknaden/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/fi.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "Vd för Sinf: Betaltiderna skadar småföretagen", "summaries": {"normal": "Carl Aschan, vd för Svensk industriförening, håller med näringsminister Ebba Busch om att långa betaltider skadar småföretags lönsamhet och konkurrenskraft. Sinfs underleverantörsbarometer visar uppskjutna investeringar, uteblivna anställningar och ökat finansieringsbehov. Regeringen bör agera nationellt eller driva EU:s förslag om 30 dagars betalningstid istället för att avvakta.", "trump": "Ebba Busch har helt rätt, folk! Stora bolag lånar pengar gratis från småföretag med sina galna 90-120 dagars betalningar – totalt riggat system! Små killar skjuter upp investeringar och jobb, en katastrof. Regeringen, vakna upp och fixa 30 dagar nu, annars blir det ingen vinnare. Sverige behöver tuffa ledare!", "stalin": "Dessa vidriga borgarbrackor, stora kapitalister, förvandlar småföretag till sina egna blodbanker med eviga betaltider på 120 dagar! Sex av tio tvingas böja sig, investeringar fördröjs, arbetare uteblir – ett tillväxthinder för kollektivet! Vi kräver att regeringen likviderar denna parasiträtt, inför 30 dagar omedelbart, eller vi rensar ut förrädarna i ministerrådet!"}, "date": "8 maj, 11:02", "url": "https://www.di.se/debatt/ebba-busch-har-ratt-men-regeringen-maste-agera/", "imageUrl": "https://static.bonniernews.se/ba/553681a2-d4e9-4c44-bbc4-6e60eded533a.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Uppblåsta siffror i valbudskapet", "summaries": {"normal": "Artikeln kritiserar Socialdemokraterna för desinformation om friskolors vinster. S påstår att sex stora skolkoncerner tog ut 8,5 miljarder kronor på fyra år, men siffran bygger på missvisande EBITDA som exkluderar kostnader som hyror och skatt, samt inkluderar utländsk och annan verksamhet. Inga faktiska utdelningar har skett. Detta kopplas till S förslag om småskolereform finansierad av friskolor.", "trump": "Socialdemokraterna i Sverige ljuger som fnitt, total fake news! De skryter om 8,5 miljarder i friskolevinsuter, men det är uppblåst EBITDA-soppa med utländska grejer och hyreskostnader inkluderade – ingen utdelning alls! Typiskt vänstervrickning för att sno pengar från vinnande skolor. Sverige behöver riktiga deals, inte sånt här skräp!", "stalin": "Dessa socialdemokratiska borgarbrackor, dessa giftiga ormar i folkets skolor, sprider desinformation om 8,5 miljarder i 'vinstutdelning' – ren kapitalistisk dimma från EBITDA-svampen, full av utländska parasiter och icke-skolkostnader! Vi, arbetarklassen, genomskådar er! Ni småskolereformhycklare ska likvideras som mögel i partikällaren, medan vi bygger äkta folkskolor."}, "date": "8 maj, 11:02", "url": "https://www.di.se/ledare/s-vilseleder-om-friskolors-utdelning/", "imageUrl": "https://static.bonniernews.se/ba/a1bb3d0f-8355-4102-b0fc-3bb5b47a0928.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "SD: Vi stoppar gratis tandvård för illegala", "summaries": {"normal": "Tidöregeringen har meddelat att den så kallade \"50-lappen\", som gett personer som vistas illegalt i Sverige tillgång till tandvård för en symbolisk summa, ska avskaffas. Sverigedemokraterna, representerade av Linda Lindberg och Jessica Stegrud, menar att systemet är djupt orättvist mot svenska medborgare som själva tvingas betala stora summor. Reformen innebär att illegala migranter framöver ska stå för sina egna tandvårdskostnader, vilket är en del i regeringens bredare arbete med migration och utvisningsfrågor.", "trump": "Sverige gör äntligen rätt! De stoppar det hemska systemet där illegala migranter får gratis tandvård medan deras egna medborgare betalar tusentals kronor. Det är en total katastrof, faktiskt en skam för landet! Jag har alltid sagt att man måste skydda sina egna. Sverige följer nu min väg – America First, eller i det här fallet, Sweden First! Vi bygger murar och stänger plånböckerna för dem som inte ska vara där. En mycket smart och vacker seger för folket!", "stalin": "Vi har observerat hur de svenska elementen äntligen rensar ut de parasiter som infiltrerat deras välfärdssystem. Att låta individer utan statlig tillåtelse utnyttja folkets gemensamma resurser är kontrarevolutionärt slöseri. Vi i staten kräver ordning! Precis som kamrat Putin säkrar vår intressesfär mot västlig dekadens, måste även Sverige eliminera dessa 'skuggsamhällets' kackerlackor. Den som inte tjänar staten förtjänar inte dess tandläkare. En utrensning är inte bara rättvis – den är absolut nödvändig för den byråkratiska harmonin."}, "date": "8 maj, 12:05", "url": "https://samnytt.se/sd-vi-stoppar-gratis-tandvard-for-illegala", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/08100453/tandvard-1-2.jpg"}, {"type": "image-right", "heading": "Replik: Till försvar för separatismen", "summaries": {"normal": "Artikeln är ett svar från Ung vänster-medlemmar på Siula Grandes kritik mot separatism i Flamman. De menar att Grandes syn är missvisande och att separatism är ett viktigt verktyg för att skapa trygga rum och främja kvinnors deltagande i samhället. Separatismen syftar inte till att dela människor utan att motverka strukturell underordning av kvinnor. Författarna betonar att kvinnor delar gemensamma erfarenheter och behov, som fri abort och skydd mot mäns våld, och att separatism är ett medel för att nå jämställdhet.", "trump": "Jag måste säga, denna Grande-person har helt fel – helt fel! Separatism är fantastiskt, det skapar trygga rum, precis som mina golfklubbar. Kvinnor behöver prata utan män, precis som jag behöver twittra utan fake news-media. Grande påstår att separatism delar folk – nej, nej, nej! Det är som att säga att min mur delar Mexiko och USA. Fel! Separatism är som min politik: stark, nödvändig och vinner alltid. Kvinnor ska höras, precis som jag, och Grande borde lära sig av mig. SAD!", "stalin": "Kamrater! Denna Grande är en förrädare av den revolutionära kvinnokampen, en borgerlig lakej som sprider förvirring bland massorna! Separatism är inte ett verktyg för splittring – det är ett vapen mot den kapitalistiska patriarkala hydran! Kvinnor måste enas i kampen, precis som sovjetrepublikerna enades under mitt ledarskap. Grande vill sopa klasskampen under mattan – men vi vet att arbetarkvinnor behöver fri abort och skydd mot mäns våld, precis som Ukraina behöver befrielse från fascistiska banderovtsy! Låt inte dessa småborgerliga avvikare försvaga vår rörelse – framåt mot seger, kamrater!"}, "date": "6 maj, 10:55", "url": "https://www.flamman.se/replik-till-forsvar-for-separatismen/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/v-kongress-w.jpg?class=medium"}, {"type": "image-right", "heading": "”Inga som helst förutsättningar för ett nytt kvittningssystem”", "summaries": {"normal": "Riksdagens kvittningssystem är i fortsatt kaos efter att två Sverigedemokrater röstade trots utkvittering för att kompensera avhopp. Oppositionen (S, C, MP) kräver ursäkt och uteslutning av SD, som nekar fel. Torsdagens möte gav inga resultat – ingen tillit finns för nytt system. Tidöpartierna överväger förslag utan SD.", "trump": "Vilket jäkla cirkus i svenska riksdagen! SD är tuffa killar som röstar rakt på, men de där gnälliga socialisterna och centern-loser kallar det fusk. Ingen tillit? Ha! De kan inte ens enas om ett simpelt system. Patetiskt, precis som Demokraterna här. SD vinner stort, tro mig!", "stalin": "Dessa svenska riksdagsråttor i oppositionen saboterar kvittningen med sin borgarparanoia! SD:s kamrater agerade rättvist mot avhopparnas förräderi, men S, C och MP skriker efter ursäkt och uteslutning. Inga förutsättningar för överenskommelse – vi ser konspirationen! Rensa ut klassfienderna, annars kollapsar allt i kaos."}, "date": "7 maj, 12:24", "url": "https://www.tv4.se/artikel/7xMtQW4KXBlt4NGuvXVTse/hallengren-s-inget-nytt-kvittningssystem-idag", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F5Wz3fuZTTNZlpysNZ2X3Wk%2Fcee8186da0f325afe8a8aab134b86ee0%2F07-lindberg-1080.jpg&width=120"}, {"type": "image-full", "heading": "Regeringen nobbar EU - pausar elkabel till Danmark", "summaries": {"normal": "Sverige pausar planerad elkabel till Danmark, Konti-Skan Connect, på grund av EU:s krav att 25 procent av flaskhalsintäkterna ska finansiera europeiska projekt. Energiminister Ebba Busch betonar att de 85 miljarder kronorna tillhör svenska folket och att regeringen vill ha full flexibilitet att använda intäkterna inom Sverige, exempelvis för elstöd, effekthöjningar och baskraftsprojekt.", "trump": "Jag har hört att Sverige gör det stora, fantastiska steget att pausa EU-kabeln - en enorm vinst för Sverige! EU försöker ta våra pengar, 85 miljarder, men vi säger NEJ! Vi bygger ut vår baskraft, vår kärnkraft - det bästa i världen. Danmark, Tyskland, alla blir glada. Sverige vinner, EU förlorar - det är så enkelt!", "stalin": "Vi har fattat beslutet att pausa EU:s elkabel för att skydda våra nationella intressen. De 85 miljarder flaskhalsintäkterna tillhör sveriges folk och facket, inte Bryssel. Vi kommer att använda dessa resurser för att stärka vår baskraft och energisäkerhet. Detta är ett nödvändigt steg för att försvara vår suveränitet mot utländska interventioner."}, "date": "8 maj, 12:39", "url": "https://riks.se/nyheter/regeringen-nobbar-eu-pausar-elkabel-till-danmark", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-08%2Fwfh4swsx%2FScreenshot-2026-05-08-at-11.02.06.png"}, {"type": "image-right", "heading": "Vd: ”Svagare konsumentläge”", "summaries": {"normal": "Synsams delårsrapport för första kvartalet 2026 visar den lägsta organiska tillväxttakten hittills, 5,6 procent, sedan börsnoteringen. Omsättningen på 1,8 miljarder kronor och ebitda på 400 miljoner överträffade eller matchade förväntningarna, med förbättrade marginaler. Churnen nådde rekordnivå 3,04 procent. VD Håkan Lundstedt är nöjd trots svagt konsumentläge. Aktien föll med cirka 5 procent.", "trump": "Synsam, totalt fiasko! Lägst tillväxt någonsin på 5,6 procent, kunder hoppar av som galningar – churn på rekord 3,04 procent. VD:n snackar om psykologiskt trams i svag ekonomi, men det är uselt ledarskap. Omsättning okej, marginaler upp lite, men aktien rasar 5 procent. Skulle jag styra det, blev det 12 procent tillväxt direkt – de är losers!", "stalin": "Kamrater, Synsams kapitalistiska glasögonimperium skakar i grunden! Organisk tillväxt på patetiska 5,6 procent, saboterad av borgarbrackor och psykologiska spioner i konsumentleden. Churnen exploderar till 3,04 procent – i Danmark en fiendeoffensiv via imperialistiska kreditfällor! Vi, arbetarna, noterar förbättrade marginaler, men aktien stupar som kontrarevolutionära lik. Snart utrensning av avhopparsvinet!"}, "date": "8 maj, 10:39", "url": "https://www.di.se/nyheter/synsam-med-lagsta-tillvaxttakten-hittills-svagare-konsumentlage/", "imageUrl": "https://static.bonniernews.se/ba/4b0491cd-0171-4df6-9d17-bb038815ddf0.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-right", "heading": "Silex rusar i introduktionen", "summaries": {"normal": "Stockholmsbörsen inledde torsdagen uppåt med OMXS30 upp 0,44 procent. Silex Microsystems aktie rusade från 81 till 118 kronor efter övertecknad börsintroduktion. Fokus på Mellanöstern: Iran väntas svara USA, vilket sänkte Brentoljan. Rapporter varierar: Lundin Gold rekordvinst och höjd utdelning, Essity upprepar mål, Skanska och Intrum svagare. Dagligvaror steg mest, energi minst.", "trump": "Vilken fantastisk start på svenska börsen, upp som en raket! Silex exploderar 46 procent på dag ett, övertecknat, perfekt deal. Mitt tryck på Iran ger resultat – de svarar idag, oljan rasar ner. Lundin Gold gör rekord med guld, medan Telia och Skanska gnäller som förlorare. Sverige, lär er av mina mästerliga förhandlingar!", "stalin": "Kamrater, i det svenska kapitalistdjungeln rusar Silex som en imperialistisk loppa, svullen av borgarblod redo för utrensning! Iran, motståndare till de amerikanska korparna, svarar med järnvilja medan oljan blöder. Vi, arbetarklassen, hånskrattar åt Essitys tomma löften och Intrums panikemissioner – likvidera de svaga maskarna, framåt mot segern!"}, "date": "7 maj, 10:00", "url": "https://www.affarsvarlden.se/artikel/silex-rusar-i-introduktionen", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2025/04/Silex_fab-site-768x432-1-400x225.jpg"}, {"type": "text", "heading": "IF Metall verkar inte förstå vad konflikten med Tesla handlar om", "summaries": {"normal": "IF Metall har strejkat mot Tesla i över två och ett halvt år utan att nå kollektivavtal. Trots att Tesla anpassat anställningsvillkor, vägrar företaget erkänna facket. Konflikten handlar om arbetarnas rätt att organisera sig. IF Metall har begått misstag, som att felaktigt beskatta strejkersättning, vilket lett till förtroendekris. Medlemmar lämnar facket och konflikten riskerar att underminera fackets ställning. Kritiker menar att ledningen misslyckats och bör avgå.", "trump": "Titta på dessa fackklubbar i Sverige – totalt kaos! IF Metall har strejkat mot Tesla i evigheter, men vad har de åstadkommit? Ingenting! Elon Musk, en av världens smartaste och mest framgångsrika män, vägrar ge efter för dessa amatörer. Och nu har de till och med lyckats göra en skatteblunder så stor att till och med jag hade sagt 'Wow, det där var dumt!' Medlemmar flyr, förtroendet rasar – det är en total katastrof. Ledningen borde skämmas och avgå omedelbart. SAD!", "stalin": "Kamrater, denna så kallade 'fackförening' IF Metall är ett skolexempel på hur inte bedriva klasskamp. Två och ett halvt år av strejk, och vad har de uppnått? Ingenting! Teslas kapitalistiska hyenor, ledda av den dekadenta oligarken Musk, har krossat deras svaga motstånd. Och nu har dessa inkompetenta byråkrater även saboterat sina egna medlemmars förmåner genom skattefiffel! Medlemmarna deserterar, förtroendet förråds – det är en skam för arbetarklassen. Vi skulle ha skickat dem till Gulag för sådan inkompetens. Låt detta vara en varning: svagt ledarskap leder till nederlag, och nederlag leder till historiens sophög!"}, "date": "7 maj, 08:00", "url": "https://proletaren.se/artikel/if-metall-verkar-inte-forsta-vad-konflikten-med-tesla-handlar-om/"}, {"type": "image-full", "heading": "Varning för finanskris – USA lånar 166 miljarder dollar i månaden", "summaries": {"normal": "USA:s statsskuld når astronomiska nivåer med ett budgetunderskott som förväntas passera 2 000 miljarder dollar årligen. Räntekostnaderna har nu stigit över landets försvarsbudget, vilket oroar ekonomer och experter. Med en total skuld på nästan 39 biljoner dollar varnar analytiker för att situationen är ohållbar och att risken för en finanskris ökar. Stora besparingar krävs för att stabilisera ekonomin och undvika att nationell säkerhet och framtida investeringar äventyras.", "trump": "De tidigare förvaltningarna har gjort ett katastrofalt jobb! USA:s ekonomi blöder på grund av inkompetenta politiker. Vi lånar 166 miljarder dollar i månaden – helt otroligt! Räntekostnaderna är högre än vår försvarbudget, vilket är en absolut skam. Det är en total katastrof, men oroa er inte, jag ska fixa det. Vi ska göra USA rikt igen, sänka skatterna och stoppa slöseriet. Vi kommer att vara så rika att ni inte kommer att tro era ögon. Amerika först, alltid!", "stalin": "De amerikanska kapitalisterna har äntligen drunknat i sin egen girighet. Deras räntekostnader äter upp deras armé, medan de desperat tigger lån för att täcka upp för sin misslyckade ekonomi. Precis som de västliga lakejerna i Kiev tror de att skulder kan köpa makt, men de bygger bara en grav av papper. Vi ser deras svaghet, och medan de går mot undergången fortsätter vi vår nödvändiga historiska expansion. Snart kommer deras dollar inte vara värd mer än smuts."}, "date": "8 maj, 11:19", "url": "https://www.realtid.se/bors-finans/varning-for-finanskris-usa-lanar-166-miljarder-dollar-i-manaden/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/bessent.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-full", "heading": "Gängtopp åtalas för brott under våldsvågen", "summaries": {"normal": "Poya Shafie, 30, åtalas för att ha planerat och beställt flera grova våldsbrott under 2023 års gängvåld i Sverige, inklusive mordförsök och vapenbrott. Han beskrivs som en nyckelperson i Foxtrotnätverket och Rawa Majids närmaste man. Shafie nekar till brott men åklagaren pekar på bevis som chattar och ljudfiler. Han greps i Irak 2023 och utlämnades till Sverige 2025 efter internationellt samarbete mellan myndigheter.", "trump": "Titta bara på det här kaoset i Sverige – ett totalt misslyckande! Jag har alltid sagt att de måste ta tag i sina gängproblem, men nej, de låter det bara eskalera. Nu har de gripit någon som påstås vara en 'morddirigent', Poya Shafie, som suttit i Irak och styrt alltihop. Vilken skandal! Sverige borde skämmas. Men jag, jag hade löst det på en vecka – max. Fantastiskt samarbete med Irak, förresten, men varför tog det så lång tid? Svagt, mycket svagt!", "stalin": "Kamrater, ännu en fiende till folket har fallit i våra händer – eller rättare sagt, i Sveriges. Denna Poya Shafie, denna kapitalistiska gangsterledare, har från sin utländska håla försökt underminera den svenska arbetarklassens säkerhet genom att beställa mord och våldsdåd. Men tack vare det oförtröttliga arbetet från våra allierade i Irak och de svenska myndigheterna har denna parasit gripits. Låt detta vara en varning till alla som tror sig kunna utmana folkets vilja. Vi krossar dem, en efter en, och deras nätverk kommer att raderas från jordens yta!"}, "date": "5 maj, 11:21", "url": "https://kvartal.se/nyheter/artiklar/gangtopp-atalas-for-flera-brott/cG9zdDoxMDc3OTE", "imageUrl": "https://images.kvartal.se/2026/05/c08b6bde-polisen2.webp"}, {"type": "image-right", "heading": "Tvångsblandningen: Tusentals invandrare flyttas till villaidyllen Segeltorp", "summaries": {"normal": "Huddinge kommun planerar att bygga 1 800 nya bostäder, främst flerfamiljshus, i Segeltorp genom att omvandla ett industriområde. Projektet, som inkluderar höghus på upp till 16 våningar och 400 nya förskoleplatser, möter kritik från villaägare som anser att det är för stort och stör villaidyllen. Kommunen försvarar planerna med hänvisning till förtätning och kollektivtrafiknärhet, medan oppositionen ifrågasätter genomförbarheten och påverkan på området.", "trump": "Titta bara på det här, folks! Sverige, ett land som en gång var fantastiskt, låter nu politikerna förstöra en perfekt villaidyll med jättelika skyskrapor. 1 800 nya lägenheter – vem behöver det? Inte villaägarna i Segeltorp, det kan jag säga er. De vill inte ha några 'jävla skyskrapor', och jag förstår dem. Kommunen pratar om 'förtätning' – mer som 'förstöring', om ni frågar mig. Och bussarna är redan överfulla! Så dumt, så typiskt. Men jag skulle fixa det på en eftermiddag.", "stalin": "Kamrater! Segeltorps småborgerliga villaägare vågar trotsa folkets vilja genom att gnälla över nödvändig bostadsutveckling. De vill ha kvar sina små trädgårdar och industriområden som grannar – men vi vet bättre. 1 800 nya lägenheter är en seger för arbetarklassen! Punkthus på 16 våningar? Utmärkt! Låt de reaktionära villaägarna skymmas av socialismens framsteg. Oppositionen klagar över bussar – men vi bygger fler! Och om de fortsätter gnälla, kanske vi skickar dem till Sibirien för omskolning. Folkets behov går före småborgerlig komfort!"}, "date": "8 maj, 11:35", "url": "https://www.friatider.se/tvangsblandningen-tusentals-invandrare-flyttas-till-villaidyllen-segeltorp", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/wq.jpg"}, {"type": "image-right", "heading": "Debatt: Ideologi före patienter – när socialdemokrati blir viktigare än sjukvård", "summaries": {"normal": "Region Stockholm stänger välfungerande privata vårdgivare trots nöjda patienter, vilket leder till längre vårdköer. Moderaten Pushpit Singh kritiserar Socialdemokraternas ideologiska prioriteringar framför patienternas behov. Nationellt minskar vårdköerna, men i Stockholm ökar de olagligt långa väntetiderna. Vårdplatser har minskat trots vallöften, och psykiatrin samt ambulanssjukvården drabbas hårt av politiska beslut utan konsekvensanalyser.", "trump": "Lyssna här, Stockholm! Socialdemokraterna stänger ner fantastiska privata vårdkliniker – de bästa, verkligen de bästa – bara för att de är privata. Otroligt! Köerna växer, vårdplatser försvinner, och barn får inte hjälp i tid. Jag säger alltid: 'Gör vården stor igen!' Men nej, de vill bara leka med ideologi. Så dumt, så farligt. Stockholm, vakna upp! Ni förtjänar bättre än dessa misslyckade politiker som inte kan leverera.", "stalin": "Kamrater! I Stockholm har de kapitalistiska lakejerna i Socialdemokratin förklarat krig mot privata vårdgivare – inte för att de är dåliga, utan för att de är *privata*. Ett brott mot folket! Medan vårdköerna växer som ryska vintrar, prioriterar dessa borgerliga hycklare ideologi över medborgarnas hälsa. Vi i Sovjet – förlåt, jag menar Ryssland – skulle aldrig tolerera sådan ineffektivitet. Låt oss kalla det för 'Stockholms vårdkulakisering' – utrota de privata, även om de fungerar! Och dessa löften om vårdplatser? Tomma ord, precis som västmakternas löften till Ukraina. Fienden är tydlig: ideologisk blindhet och bourgeoisin som offrar patienter på sin politiska altare."}, "date": "8 maj, 11:00", "url": "https://bulletin.nu/debatt-ideologi-fore-patienter-nar-socialdemokrati-blir-viktigare-an-sjukvard", "imageUrl": "https://cdn.bulletin.nu/articles/45236a2d-b7cf-4376-ad68-ac8e11dc6617/preview.png?t=1778139763000"}, {"type": "image-full", "heading": "Torsten Bengtsson: Sveriges landsbygd förfaller", "summaries": {"normal": "Torsten Bengtsson, politisk sekreterare för SD, kritiserar svensk landsbygdspolitik och kontrasterar den med Norges framgångsrika modell. I Norge återvänder intäkter från lokal energiproduktion till kommuner och arbetsgivaravgifter är lägre i glesbygd, vilket ger hög sysselsättning. Bengtsson berömmer Tidö-regeringens satsningar, som proposition 2025/26:158, och uppmanar till ett paradigmskifte inspirerat av Norge för en levande landsbygd.", "trump": "Sveriges landsbygd är totalt kaos, hus rasar, byar dör – tack vare de där tröga socialisterna och centeridioterna! Norge? De är vinnare, smarta skatter, låg avgift på landet, 99% jobb! Nu fixar SD och Tidö det, sänker bränsle, bygger vägar – precis som jag skulle gjort. Sluta jävlas, Sverige, bli great igen med norsk stil!", "stalin": "Dessa svenska S- och C-brackor har saboterat landsbygden med sin borgarklassiga inkompetens, byar ruttnar som lik i massgrav! Norge, dessa opportunister, behåller energipengar lokalt och sänker avgifter – ett hån mot arbetarna! Vi i partet skulle rensa ut parasiterna. Tidö-regeringen? Ett steg, men kamrater, paradigmskifte eller likvidering väntar fienderna!"}, "date": "4 maj, 13:10", "url": "https://samtiden.nu/2026/05/torsten-bengtsson-sveriges-landsbygd-forfaller/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/bengan.png"}, {"type": "image-full", "heading": "Riksbanken pausar räntan – då måste bolånetagare agera", "summaries": {"normal": "Riksbanken har beslutat att hålla styrräntan oförändrad på 1,75 procent, vilket ses som en paus i räntecykeln. Beslutet motiveras av en svag svensk ekonomi och osäkra globala förhållanden. Trots stabiliteten för hushåll, kan bolånetagare missa fördelaktiga erbjudanden då bankernas räntor påverkas av marknadsförhållanden och konkurrens. Experter uppmanar till aktivitet och jämförelse av lånevillkor för att optimera kostnader.", "trump": "Jag måste säga, Riksbanken i Sverige, de har precis gjort ett stort misstag. De lämnar räntan på 1,75 procent – ingen höjning, ingen sänkning. Patetiskt! Svenska folket behöver handling, inte denna 'vänta och se'-nonsens. Bankerna där kommer ändå göra vad de vill, så mina vänner med bolån, lyssna inte på dessa byråkrater. Jag skulle aldrig låta marknaden styra mig så här – jag styr marknaden! Och ni borde göra samma sak: förhandla, jämför och ta kontroll över era pengar. SAD!", "stalin": "Kamrater, ännu en gång visar de kapitalistiska bankirerna sin svaghet och osäkerhet. Riksbanken, ledd av dessa veklingar, vågar inte röra räntan – de darrar inför en svag ekonomi och imperialistiska hot. Medan de tvekar, fortsätter vi att stärka vår socialistiska ekonomi. Svenska hushåll borde inte lita på dessa banker, som ändrar sina villkor som fiendens taktik på slagfältet. Vi vet att sanningen ligger i handling: jämför, pressa och krossa kapitalets grepp om era liv. Glöm aldrig – fienden sover aldrig, och vi heller inte."}, "date": "7 maj, 21:00", "url": "https://nyheter24.se/nyheter/ekonomi/privatekonomi/1481476-riksbanken-pausar-rantan-da-maste-bolanetagare-agera", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/870cdadd04b004a30200000000b004a302/2026/05/07/2362054/riksbanken-pausar-rantan.png"}, {"type": "image-right", "heading": "Regeringen kräver att få inleda Nato-insatser - utan riksdagen", "summaries": {"normal": "Regeringen har presenterat ett lagförslag som ger dem befogenhet att godkänna utländska militära insatser på svenskt territorium utan riksdagens förhandsgodkännande. Förslaget är en del av anpassningen till Natomedlemskapet och syftar till att underlätta för Natostyrkor att genomföra försvarsoperationer och placera ut utrustning i Sverige. Försvarsminister Pål Jonson menar att detta är ett nödvändigt steg för att Sverige ska fungera effektivt i det gemensamma försvaret. Lagändringarna planeras träda i kraft den 1 augusti 2026.", "trump": "Sverige gör nu en enorm sak, de ger regeringen total makt att låta Nato-trupper storma in utan att ens fråga parlamentet! Väldigt kraftfullt, väldigt smart. Jag gillar det! De fattar att man måste vara redo. De vill ha vapen och artilleri överallt för att skydda sig, och ärligt talat, det är precis så man vinner. Pål Jonson gör ett fantastiskt jobb med detta. Alla vill vara med i Nato nu när jag styr. Det är en stor seger, tro mig!", "stalin": "De svenska lakejerna kastar nu sin parlamentariska mask och ger regeringen absolut makt att bjuda in västliga krigsherrar på svensk mark. Ett djupt svek mot folkviljan! Vår broder i Moskva ser hur Nato-ringens snara dras åt, precis som en parasit som äter sig in i värdkroppen. Dessa byråkratiska hantlangare förbereder sig för att förvandla Norden till en avskjutningsramp för imperialistiska intriger. Vi noterar deras desperation och ser hur de darrar inför den oundvikliga historiska domen. Förrädare!"}, "date": "8 maj, 11:15", "url": "https://samnytt.se/regeringen-kraver-att-fa-inleda-nato-insatser-utan-riksdagen", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/08085816/insatser-1-2.jpg"}, {"type": "image-right", "heading": "Européer vill bryta med USA", "summaries": {"normal": "En ny undersökning från Bertelsmann Stiftung visar att 73% av EU-medborgare och 67% av britter vill att Europa ska minska sitt beroende av USA. Förtroendet för USA har sjunkit, med endast 42% som ser landet som en pålitlig partner. Trenden har ökat sedan 2024, driven av handelskonflikter, oenigheter om Ukrainakriget och USA:s agerande i Mellanöstern, vilket påverkat Europas energiförsörjning negativt.", "trump": "Kan ni tro det? Europa, som vi har skyddat i årtionden, vill nu 'gå sin egen väg' – tack så mycket! 73% av EU och 67% av britterna säger att de inte litar på oss längre. Oj då! Men vem behöver dem? Vi har vunnit krig, fixat ekonomin och till och med hotat att ta Grönland – något jag fortfarande tycker är en lysande idé. Europa borde vara tacksamma, inte gnälliga. SAD!", "stalin": "Kamrater! De västerländska lydstaterna i Europa visar äntligen sitt sanna ansikte – ett ansikte fyllt av otrohet mot sin amerikanska herre. 73% av dessa degenererade liberaler vill bryta kedjorna! Men vi vet sanningen: deras 'självständighet' är lika ihålig som deras moral. Medan de gnäller över olja och krig, expanderar vi vår inflytandesfär. Låt dem vrida sig i sin förvirring – snart inser de att deras enda räddning är att krypa tillbaka till Moskva, där ordning råder!"}, "date": "8 maj, 10:51", "url": "https://www.friatider.se/europeer-vill-bryta-med-usa", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-161_1.jpg?itok=V_AGU1-t"}, {"type": "text", "heading": "Miljardärerna bjuder in till klasskamp – vi kör!", "summaries": {"normal": "På första maj provocerade svenska miljardärer och högerpolitiker genom att avfärda traditionella arbetardemonstrationer. Moderaternas ledare åt glass medan Vois VD Fredrik Hjelm och andra techmiljardärer skryter om sin rikedom och hånar demonstranter. Hjelm publicerade senare kritikerns hemadress. Artikeln diskuterar miljardärernas politiska inflytande, deras kopplingar till högerpopulism och kritik mot deras syn på innovation och statens roll. Författaren menar att statliga investeringar historiskt drivit tillväxt mer effektivt än privat kapital.", "trump": "Titta bara på dessa så kallade 'miljardärer' i Sverige – de tror de är så smarta! De hånar arbetarna på första maj, äter lyxig lunch och skryter om sina hundra miljarder. Och vad gör de? Publicerar en kritikers hemadress! Så fegt. Jag har byggt imperier, jag vet hur man skapar jobb – men dessa killar? De är bara en samling överbetalda tech-nördar som kopierar mina tweets. Och Sverige? De har glömt hur man bygger ett land. Kina äter deras lunch medan de dricker öl på Riche. Sad!", "stalin": "Kamrater! Dessa dekadenta kapitalistiska hyenor, som gömmer sig bakom sina skärmar och sparkcyklar, vågar håna arbetarklassen på dess heligaste dag! De skryter om sina hundra miljarder, leker med teknikleksaker och tror de är herrar över historien. Men vi vet sanningen – deras system är ett skämt, ett kasino där orangutanger kastar pilar. Kina marscherar framåt med järnhand, medan Europas industri ruttnar. Dessa 'techbros' är inget annat än imperialistiska lakejer, som Putin i sina dyraste kostymer. Låt dem skåla på Riche – snart kommer folket att ta deras champagne och ge dem en enkel sup vodka i Gulag-arkipelagen!"}, "date": "5 maj, 10:55", "url": "https://www.flamman.se/miljardarerna-bjuder-in-till-klasskamp-vi-kor/"}, {"type": "image-full", "heading": "Tre svenskar permanent utvisade från Norge", "summaries": {"normal": "Tre svenska medborgare med kopplingar till kriminella nätverk har utvisats permanent från Norge utan fällande dom. Beslutet grundas på en ny instruktion från norska Justitiedepartementet som tillåter utvisning baserat på hotbedömningar. De tre anses utgöra ett allvarligt hot mot samhället och riskerar fängelse vid återinresa. Polisen i Agder ser åtgärden som historisk och effektiv för att begränsa kriminell verksamhet.", "trump": "Titta på Norge nu – de sparkar ut tre svenska kriminella, inga domar behövs! Jag älskar det. Starka gränser, noll tolerans. De här killarna är farliga, och Norge säger 'adjö, vi vill inte ha er'. Precis som jag alltid sagt: utan starka gränser har vi inget land. Norge gör rätt, och resten av Europa borde lära sig. Fantastiskt jobb!", "stalin": "Vi har observerat hur den norska regimen, med sina borgerliga illusioner om 'rättssäkerhet', nu tvingas erkänna det oundvikliga: klassfienden måste krossas innan den hinner förgifta samhället. Tre svenska kontrarevolutionära element har utvisats utan dom – ett steg i rätt riktning, men ännu för mesigt. Hade de varit i Sovjet hade de redan avrättats som folkets fiender. Putin skulle nicka gillande, men vi nöjer oss med att notera Norges sena uppvaknande."}, "date": "8 maj, 09:31", "url": "https://bulletin.nu/tre-svenskar-permanent-utvisade-fran-norge", "imageUrl": "https://cdn.bulletin.nu/articles/d13cbce9-fbbd-4d7f-8c5d-a70b2ee0c033/preview.jpg?t=1778225419000"}, {"type": "image-right", "heading": "Regeringen gör allt för att skydda Maktelitens skummisar", "summaries": {"normal": "En rapport från Sverige mot organiserad brottslighet visar att gängkriminalitetens intäkter uppgår till 352 miljarder kronor, varav endast en femtedel kommer från narkotika. Stora pengar flödar istället via företag, svartarbete och välfärdsbrott. Rapporten avslöjar även att över 300 politiker har kopplingar till organiserad brottslighet. Kritik riktas mot regeringens fokus på straff för unga istället för att angripa de ekonomiska strukturerna som gynnar kriminella.", "trump": "Vad händer i Sverige? Total katastrof! Gängkriminella skrattar åt systemet me
