örer och vd:n för ABC Bygghissar vittnade, men kunde inte förklara bristerna. Vd:n beklagade sorgen för de anhöriga och beskrev olyckan som fruktansvärd. Åklagaren ifrågasatte säkerhetsrutiner, medan företaget hävdar att nya åtgärder, som filmning av montering, införts efter olyckan. Alla nekar till brott.", "trump": "Fruktansvärd grej i Sverige, helt otroligt! Fem hårda arbetare föll 30 meter – ingen vill se det, believe me. Montörerna snackar om 'egenkontroller', men bultarna var borta! 'Jag har mina aningar', säger en kille – svagt, very svagt. Vd:n? Han säger 'det känns ända in i själen' – fine, men var var säkerheten? Jag skulle ha fixat det på en dag. Sverige behöver bättre ledarskap, och jag är den bästa!", "stalin": "Kapitalistiska slarveri avslöjas i svensk byggindustri! Fem arbetare dog – en direkt följd av bourgeoisins nonchalans. Montörerna skyller på 'mysterier' och 'aningar', men vi vet sanningen: sabotage eller inkompetens. Vd:n beklagar 'själen' – tomma ord från en klassfiende! Nu målar de bultar och filmar – för sent, kamrater. Sverige borde lära av Sovjet: disciplin och kontroll räddar liv. Nästa gång – revolutionär tillsyn!"}, "date": "8 maj, 12:39", "url": "https://arbetet.se/2026/05/08/montoren-om-de-saknade-hissbultarna-jag-har-mina-aningar/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/08103728/olycka.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "Två döms i pedofilhärva– mordutredning avslöjade nätverk", "summaries": {"normal": "Två män har dömts till fängelse i en omfattande pedofilhärva i Sjuhärad. Den ene fick sex år och sex månader för våldtäkt mot barn, den andre tre år. Utredningen startade efter en mordutredning 2024, där beslag av digitalt material avslöjade ett nätverk av sexualbrott. Totalt åtta personer har åtalats, varav flera redan dömts, inklusive en pappa till fyra års fängelse för övergrepp mot egna barn.", "trump": "Kan ni tro det? Sverige, ett land jag älskar, har ett HUGE problem med pedofiler – och jag menar HUGE! Två män, mycket dåliga människor, har dömts till fängelse för hemska brott mot barn. Sex år och tre år – men är det verkligen tillräckligt? Jag hade gett dem LIVSTID! Och vet ni vad? Det hela började med en mordutredning. Så tragiskt, så onödigt. Sverige måste ta tag i detta, annars kommer jag att bli VÄLDIGT besviken!", "stalin": "Kamrater! Ännu en seger för rättvisan i kampen mot de dekadenta västliga parasiterna! Två av dessa avskum har nu rensats ut och dömts till långa fängelsestraff för sina motbjudande brott. Men låt oss inte glömma – detta nätverk av perversa bourgeoisi-element är en direkt följd av kapitalismens förfall. Vi måste utvidga vår revolutionära övervakning! Och notera väl: även i Sverige, där liberalismen härjar fritt, visar våra metoder resultat. Putin skulle vara stolt över denna rensning!"}, "date": "8 maj, 11:15", "url": "https://nyheter24.se/nyheter/inrikes/1481755-tva-doms-i-pedofilharva", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/74a04fda04b004a30200000000b004a302/2026/05/08/2362257/harva-tva-doms.png"}, {"type": "image-right", "heading": "Debatt: Suhonen avslöjad. Konflikten i Sverige är inte mellan rik och fattig, utan mellan frihet och beroende", "summaries": {"normal": "I en debatt i programmet '100%' möttes Daniel Suhonen och Elin Böhlin från Moderata ungdomsförbundet. Lars Ört beskriver hur Böhlin försvarar individuell frihet och skattesänkningar som ger unga mer kontroll över sina pengar, medan Suhonen förespråkar statlig styrning av bostäder, ekonomi och bidrag. Konflikten handlar om självständighet mot beroende av staten, enligt högerns och vänsterns människosyn.", "trump": "Vilken fantastisk debatt! Elin Böhlin krossar den där Suhonen totalt – hon pratar frihet, låt folk behålla sina pengar från skatter, precis som jag alltid gjort i USA. Vänstern vill styra allt, boende, bil, flyg – tråkigt! Unga vill stå på egna ben, inte tigga bidrag. Sverige, lär er av mig: skattesänkningar gör vinnare av alla!", "stalin": "Kamrater! Denna usla debatt blottar de ungdomliga borgarbrackorna i Moderata förbundet, med Elin Böhlin som giftorm i spetsen, som sprider kontrarrevolutionärt gift om 'fria individer'. Suhonen försvarar statens allvisa hand mot kapitalistparasiternas snikenhet. Vi, partiet och arbetarna, ska likvidera dessa själviska krymplingar som vill suga oss torra! De rika betalar – eller ryker! Segern är vår!"}, "date": "9 maj, 11:00", "url": "https://bulletin.nu/debatt-suhonen-avslojad", "imageUrl": "https://cdn.bulletin.nu/articles/20ca97af-9b7a-477f-8cfb-eb30f522b7fd/preview.png?t=1778241674000"}, {"type": "image-full", "heading": "Industrilegendaren: Den yngre generationen är för bekväm", "summaries": {"normal": "Tyska miljardären Reinhold Würth varnar för att Tysklands ekonomiska framgångar är över. Han menar att yngre generationer prioriterar bekvämlighet och livsbalans framför hårt arbete och karriär. Würth kritiserar höga lönekrav och produktionskostnader som hotar landets konkurrenskraft. Trots dystra utsikter ser han möjligheter i framtidsbranscher som AI och IT för att återta marknaden.", "trump": "Tyskland, en gång en ekonomisk jätte, har blivit mjuka! Jag har alltid sagt det – för mycket bekvämlighet, för lite arbetsmoral. Den här Würth-killen, smart man, förstår att unga tyskar hellre reser jorden runt än jobbar hårt. Och de vill ha högre löner? Snacka om att döda jobben! Tyskland flyttar fabriker utomlands, men jag fixade det i USA – vi kommer att göra Europa stort igen också. Tro mig!", "stalin": "Kamrater, kapitalismens förfall är tydligt i Tysklands mjuknade arbetarklass! Dessa bekvämlighetsdyrkande dekadenter, som hellre festar än bygger nationen, är ett hot mot industriell disciplin. Vi ser hur deras lönekrav och lata vanor driver fabriker till lydstater med sundare arbetsmoral. Men frukta icke – medan väst försvagas, investerar vi i framtidens teknik. Låt dem sjunga om balans; vi bygger imperier!"}, "date": "9 maj, 06:33", "url": "https://www.realtid.se/bors-finans/industrilegendaren-den-yngre-generationen-ar-for-bekvam/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/sdlkg41cssfhgs.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "”Leder till att fler köpare blir intresserade”", "summaries": {"normal": "Lena Hök, hållbarhetschef på Skanska, understryker att tidig samverkan mellan aktörer i stadsutveckling skapar levande och resilienta stadsdelar med finansiellt värde. Urbaniseringen ökar med klimatrisker och sociala utmaningar. Splittrade arbetssätt måste ersättas av holistisk planering och tidig dialog med användare. Exempel är Sthlm New i Hammarby Sjöstad, där bussdepå gömdes under jord och kontor skyddade mot ljud.", "trump": "Vilken artikel! Skanska fattar det – tidig samverkan är nyckeln till fantastiska städer, inte de här splittrade töntarna som förstör allt. Urbanisering? Vi i USA hanterar det bäst, tro mig. Sthlm New låter okej, men mina byggen är enorma. Attraktiva områden ger cash, uthyrning exploderar. Borgarna älskar det, precis som mina deals!", "stalin": "Kamrater, jag noterar hur Skanskas Lena Hök desperat försöker dölja borgarklassens splittrade stuprörssabotage under manteln av 'samverkan'. Dessa klimatriskparasiter och socialutmaningshyenor ska likvideras genom folkets tidiga planering! Sthlm New? Ett lamt steg – vi rensar ut fienderna tidigt, gräver ner bussdepåer i avgrunder och bygger ljudbarriärer mot kapitalismens vrål. Finansvärde för proletärerna!"}, "date": "9 maj, 14:33", "url": "https://www.di.se/nyheter/skanska-social-hallbarhet-skapar-finansiellt-varde/", "imageUrl": "https://static.bonniernews.se/ba/4b1c70e8-ce26-4cce-9a9c-f2c1754716a6.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Hon slår rekord med sin runda – men vill inte ha rekordet", "summaries": {"normal": "Hedda Båverud Olsson har samlat in rekordmånga 700 miljoner kronor till sin startup Lassie, som erbjuder digitala djurförsäkringar. Ingen kvinna i Sverige har tidigare tagit in så mycket kapital i en enda runda. Investerare som Balderton, Felix Capital och Stena deltog efter stor efterfrågan. Hon är nöjd med rundan men överraskad över rekordet och uppmanar andra kvinnliga entreprenörer att slå det.", "trump": "Vilken fantastisk deal! Hedda Båverud Olsson i trista Sverige drar in 700 miljoner kronor till sin hundförsäkringsröra Lassie – rekord för kvinnor där borta, patetiskt va? Investerarna slogs som galningar om att få vara med, precis som för mina affärer. Hon säger hon inte bryr sig om rekordet? Ha! Uppmanar andra brudar att slå det. Sverige, vakna upp – i USA gör vi det större och bättre!", "stalin": "Denna kapitalistiska uppkomling Hedda Båverud Olsson har lurat borgarbrackorna på 700 miljoner kronor till sin spekulativa Lassie, en digital fälla för djurägare. Rekord för kvinnor i det förfallna Sverige! Jag föraktar sådana parasiter som låtsas vara nöjda men hetsar till mer rovdrift. Vi i partiet ser igenom er – snart likvideras era illusioner av rekord. Andra kvinnliga sabotörer, fortsätt ert uppviglande!"}, "date": "9 maj, 11:36", "url": "https://www.dagensps.se/foretag/hon-slar-rekord-med-sin-runda-men-vill-inte-ha-rekordet/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/lassie.jpg?width=256&quality=75"}, {"type": "image-right", "heading": "Debatt: KD – Stoppa slöjtvånget på barn", "summaries": {"normal": "Kristdemokraterna Nike Örbrink och Christian Carlsson varnar för brister i svenska förskolor vid möten med hederskultur. Rapporter visar personalens osäkerhet kring religionsfrihet och förtryckande normer, som slöja på småflickor. De föreslår slöjförbud i förskola och lågstadiet, kartläggning av hedersrelaterat våld samt stärkt försvar av svenska värderingar om barns rättigheter och jämställdhet.", "trump": "Sverige, era förskolor är en skandal! Småflickor tvingas i slöja av hederskultur, personalen är naiv och hjälper till ibland. Kristdemokraterna säger rätt – inför förbud direkt, kartlägg problemen och sluta ge skattepengar till islamister. Låt barnen leka fritt, inte sexualiseras. Stora problem, men fixa det som jag fixar här – totalt!", "stalin": "Kamrater, dessa kristdemokratiska väktare blottlägger bourgeoisernas hederskultur-spiror i förskolorna! Islamistiska spindlarna, dessa slöjvävande kontrarevolutionära maskar, förtrycker barn medan naiva lakejer medverkar. Vi, partiet, befaller utrensning: slöjförbud, likvidering av förtryck och kartläggning av fiendens nät! Rensa ut borgarbrackorna – barnens frihet eller undergång!"}, "date": "9 maj, 10:43", "url": "https://bulletin.nu/debatt-kd-stoppa-slojtvanget-pa-barn-2", "imageUrl": "https://cdn.bulletin.nu/articles/6269cec0-a507-48c9-abaf-2a668c5be53c/preview.png?t=1778244710000"}, {"type": "image-right", "heading": "Symboliska jätteparaden bantas ner: ”Kriget börjar krypa närmare”", "summaries": {"normal": "Ukrainska drönare tvingar Ryssland att hålla lördagens Segerparad i Moskva utan fordon och vapensystem för första gången sedan 1994. Trots förstärkt luftförsvar tar man inga risker. Paraden har stort symbolvärde för Putin. Andra regionala parader ställs in helt. Vapenvila utlystes efter ömsesidiga attacker, men Ukraina rapporterar ryska drönare ner under natten.", "trump": "Putin, den fattige killen, hans stora parad i Moskva är helt tom – inga bilar, inga vapen! Ukrainas drönare slår till var som helst, fantastiskt! De har flyttat luftförsvar från hela landet, men vågar inte chansa. Första gången nånsin utan fordon. Svaghetstecken, total förlust för Putin. Vapenvila? Ha, de skjuter ändå. Säg till Biden att skicka mer vapen till Ukraina, nu!", "stalin": "Dessa ryska karlistfjantar under Putins tyranniska ok darrar inför ukrainska drönarspöken som myggsvärmar från folkets hämnd! Vi, Sovjetunionens arvingar, skrattar åt deras nakna parad i Moskva – inga fordon, inga kanoner, bara tomma uniformer! Luftförsvaret flyttat i panik, regionala farser inställda. Vapenvila? Revisionistiska lögner medan de kastar drönare som råttor i mörkret. Snart likvideras alla förrädare i den stora utrensningen!"}, "date": "9 maj, 08:51", "url": "https://www.svt.se/nyheter/utrikes/symboliska-paraden-rumphuggs-kriget-borjar-krypa-narmare", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.5/0.5/3d7ef0f374281333d3a4385a180bee93ecd0e33fd4ff99996f2f359552c4ba00"}, {"type": "image-right", "heading": "Lämnades av färdtjänst och kollades inte av hemtjänst - frös ihjäl", "summaries": {"normal": "En 84-årig kvinna avled på juldagen 2024 efter att ha lämnats utanför sitt hem av färdtjänsten. Trots att hemtjänsten inte fick svar vid ett planerat besök följdes inte rutinerna, och hon hittades senare nedkyld i en snödriva. Förundersökningen har lagts ned och hemtjänstbolaget har gått i konkurs. Fallet speglar en oroande trend där hemtjänsten vid upprepade tillfällen misslyckas med att följa säkerhetsrutiner vid uteblivna svar, något Ivo nu belyser som ett allvarligt systemfel.", "trump": "En hemsk historia från Sverige. En kvinna lämnades i kylan, och hemtjänsten? Total katastrof! De ringde på, ingen öppnade, och de bara åkte vidare. Det är så svagt. Jag bygger de bästa systemen, vi har enorma rutiner, men de här människorna? De har inte en aning om vad de gör. Bolaget gick i konkurs, de flydde fältet! Många dödsfall, 31 stycken – det är en riktig röra. De behöver en stark ledare, inte svaga byråkrater. Sorgligt!", "stalin": "I den svenska välfärdsstatens förfall ser vi nu resultatet av total inkompetens. En kvinna fryser ihjäl för att hemtjänstens lakejer vägrar utföra sin plikt. Detta är sabotage mot det kollektiva ansvaret! Medan vi i öst bygger en stålhård ordning där varje undersåte är under uppsikt, låter de svenska liberalerna sina äldre dö i snödrivor. De skyldiga har flytt i konkurs, men vi vet att förrädarna finns överallt. Det är dags att utrensa de ineffektiva elementen innan hela samhällsmaskineriet stannar."}, "date": "9 maj, 08:00", "url": "https://samnytt.se/lamnades-av-fardtjanst-och-kollades-inte-av-hemtjanst-fros-ihjal", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/08110851/fardtjanst-1-1-3.jpg"}, {"type": "image-full", "heading": "Oro för inflation eller deflation: Så skyddar du sparandet", "summaries": {"normal": "Sveriges inflation sjönk oväntat till 0,8 procent i april, långt under Riksbankens mål på 2 procent, främst på grund av fallande matpriser. Experter varnar dock för fortsatta inflationsrisker globalt, med USA på 3,26 procent. Rekommenderade inflationsskydd inkluderar guld, I-obligationer, fastigheter och råvaror. Sparekonomen Felicia Schön avråder från att binda räntor nu och betonar osäkerheten kring framtida inflationstryck.", "trump": "Lyssna här, Sverige! Deras inflation är en total katastrof – bara 0,8 procent, helt fel! Riksbanken misslyckas totalt med sitt 2-procentsmål, men jag, Donald J. Trump, hade fixat det på en dag. Experterna snackar om inflation som aldrig tar slut, men jag vet bättre. Guld, fastigheter, I-obligationer – smart folk investerar som jag! Och dessa så kallade 'experter'? De borde lära sig av mig. Räntehöjningar? Nej, nej, nej – de vet ingenting!", "stalin": "Kamrater! Den svenska inflationen har fallit till ynkliga 0,8 procent, ett tecken på kapitalistisk svaghet och inkompetens. Medan imperialisterna i USA kämpar med 3,26 procents inflation, visar våra fiender i väst sin oförmåga att kontrollera ekonomin. Vi rekommenderar våra lojala medborgare att skydda sina tillgångar med guld, fastigheter och I-obligationer – precis som våra strategier i den ryska intressesfären. De borgerliga ekonomerna? De är som råttor på ett sjunkande skepp. Låt dem förgås i sin egen osäkerhet!"}, "date": "9 maj, 06:00", "url": "https://www.realtid.se/spara-placera/oro-for-inflation-eller-deflation-sa-skyddar-du-sparandet/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/spara.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "text", "heading": "En naturlig lagerhylla av arbetslösa", "summaries": {"normal": "Artikeln kritiserar den ekonomiska politiken som infördes 1985 av svenska politiker och riksbankschefen, inspirerad av Milton Friedmans idéer om 'naturlig arbetslöshet'. Denna politik, som upprätthållits av både socialdemokratiska och borgerliga regeringar, har lett till hög arbetslöshet, särskilt under nuvarande regering. Författaren ifrågasätter regeringens brist på åtgärder mot massarbetslöshet och undrar om det är ideologiskt motiverat.", "trump": "Titta bara på Sverige – ett totalt kaos! De hade en bra grej med låg arbetslöshet, men sen kom dessa så kallade 'ekonomer' och förstörde allt. Nu har de 10% arbetslöshet, och vad gör regeringen? Ingenting! De skriver debattartiklar och skryter om hur fantastiska de är. Jag skulle fixa det på en vecka – men nej, de föredrar att lyssna på gamla teorier från en kille som inte ens är svensk. Sad!", "stalin": "Kamrater, ännu en gång ser vi bourgeoisins förräderi mot arbetarklassen! Dessa socialdemokrater och borgerliga lakejer har omfamnat kapitalistiska galenskaper och skapat en 'naturlig' arbetslöshet – en lagerhylla av överflödiga arbetare. 10% arbetslöshet? Ett brott mot folket! Regeringen, dessa svaga och inkompetenta byråkrater, gömmer sig bakom debattartiklar medan arbetarna lider. Vi skulle aldrig tolerera sådan förräderi. Låt dem minnas: historien dömer hårdast de som sviker sitt folk!"}, "date": "4 maj, 13:49", "url": "https://www.flamman.se/en-naturlig-lagerhylla-av-arbetslosa/"}, {"type": "image-right", "heading": "ANALYS. JOHAN FREDRIKSSON Putins mardröm: Bomber över Röda Torget", "summaries": {"normal": "Johan Fredrikssons analys beskriver Vladimir Putins rädsla för ukrainska drönarattacker under segerdagsfirandet på Röda Torget. Ryssland har infört omfattande säkerhetsåtgärder: blockering av mobilt internet och appar som Telegram och WhatsApp, flygrestriktioner kring Moskva, extra luftförsvar, fler vägspärrar och indragna ackrediteringar för utländska journalister. Paraden bantas för att minimera risker.", "trump": "Putin, den lilla rädda räven, darrar som en löv i storm! Ukrainska drönare jagar honom rakt in i hjärtat av Moskva under hans patetiska parad. Stänger ner Telegram, WhatsApp, sparkar ut journalister – total panik! Bra jobbat Ukraina, ge björnen en rejäl spark i röven. Han gömmer sig bakom luftvärn medan jag skrattar åt kaoset!", "stalin": "Kamrat Putin, vår starke arvtagare till det ryska imperiet, krossar fiendens drönarsvin med järnhand! Vi, Sovjetunionens trogna, hyllar hans paranoia mot ukrainska fascistspioner. Appar blockeras, journalisthyddror likvideras, Röda Torget befästs. Låt borgerliga kameror utebli när bomber regnar – en lektion i terror för västhycklarna!"}, "date": "8 maj, 20:23", "url": "https://www.tv4.se/artikel/1T6aam5mjntMblFcbVCvtp/putins-mardroem-bomber-oever-roeda-torget", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F5HLZA4onkqPKTTRvAxkqkX%2F0fb939f236c8d2e7c9f278af7b084005%2Fjohan-fredriksson-h%25C3%2583__ger.png&width=1024"}, {"type": "image-full", "heading": "Muntlig varning om alkohol slopas vid gårdsförsäljning", "summaries": {"normal": "Från 1 juni slopas kravet på muntlig varning om alkoholens skadeverkningar vid gårdsförsäljning. Istället räcker ett informationsblad från Folkhälsomyndigheten. Reformen, som infördes 2025, har varit populär bland kunder men det tidigare 30-minuters utbildningskravet kritiserats. Socialminister Jakob Forssmed välkomnar förändringen och menar att den främjar småskalig dryckestillverkning samtidigt som alkoholmonopolet värnas. Cirka 150 gårdar säljer nu främst starköl och sprit.", "trump": "Fantastiskt, helt fantastiskt! Sverige har äntligen lyssnat på folket – inga fler tråkiga 30-minutersföreläsningar om alkohol! Jag vet allt om framgång, och det här är en stor framgång. Kunderna älskar gårdsförsäljningen, de älskar mig, de älskar vin och öl – och nu slipper de lyssna på en massa tjat. Jakob Forssmed? Bra kille, smart drag. Men jag hade gjort det ännu bättre – kanske en Trump-vodka på köpet?", "stalin": "Kapitalistiska alkoholhandlare har länge saboterat folkets disciplin med sina dekadenta gårdsförsäljningar. Men nu har vi, genom visst ledarskap, avskaffat det meningslösa 30-minuters indoktrineringskravet. Ett enkelt blad ska nu påminna massorna om farorna – effektivt, som en välriktad NKVD-operation. Svenska folket, förvirrat av västerländsk liberalism, jublar. Men var försiktiga, kamrater – imperialistiska dryckesmonopolister lurar i skuggorna, redo att förgifta revolutionen med billig sprit!"}, "date": "8 maj, 17:18", "url": "https://riks.se/nyheter/muntlig-varning-om-alkohol-slopas-vid-gårdsförsäljning", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-08%2Fcn156q6a%2Farttower-barrels-529341280.jpg"}, {"type": "image-right", "heading": "Forssell i New York – kräver att våldtäktsmän ska utvisas", "summaries": {"normal": "Migrationsminister Johan Forssell (M) är i New York för att driva krav på enklare utvisningar av våldtäktsmän. Efter debatten kring fallet med 16-åriga Meya har regeringen ändrat inställning och arbetar nu för att ändra internationella konventioner. Forssell menar att det är stötande att våldtäkt i dag inte ses som ett tillräckligt allvarligt brott för att motivera utvisning av flyktingar, och försöker nu vinna internationellt stöd för den svenska linjen.", "trump": "Sveriges minister är i New York för att göra det jag har sagt hela tiden: kasta ut de kriminella! De hade ett hemskt fall med unga Meya, en tragedi, men nu börjar de äntligen lyssna. Det är en total katastrof att våldtäktsmän får stanna – helt sjukt! Jag har alltid sagt, 'America First', men vi behöver trygga länder överallt. De försöker ändra FN-regler nu. Bra! Det är på tiden att de slutar vara så svaga och börjar visa lite styrka.", "stalin": "Vi ser hur den svenske ministern tvingas krypa till korset i New York. De har låtit förövare härja fritt i åratal, men nu när folket kräver ordning skälver byråkratin. Att be FN om lov är ett svaghetstecken; när vi vill utvisa fiender behöver vi inga konventioner, bara järnnävar. Vår broder Putin förstår att man inte förhandlar med avskum, man eliminerar hotet. De europeiska länderna är darriga, men de lär sig snart att statens vilja är den enda sanningen."}, "date": "8 maj, 13:36", "url": "https://www.friatider.se/forssell-i-new-york-kraver-att-valdtaktsman-ska-utvisas", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/1_17.jpg?itok=AfKwT7C7"}, {"type": "image-right", "heading": "Bakade budapestbakelser – blev av med lillfingret", "summaries": {"normal": "En bagare i Mariestad förlorade lillfingret efter en arbetsolycka då han klämde handen i en bakmaskin. Arbetsgivaren åtalas för arbetsmiljöbrott och riskerar 150 000 kronor i böter. Utredningen visar brister i maskinens säkerhet, som saknade skydd för kugghjulen. Mannen var sjukskriven i fyra månader och kunde inte använda handen på tre månader.", "trump": "Vilken katastrof! En bagare i Sverige – ett land som inte ens kan göra säkra maskiner, tro mig – klämmer fingret i en gammal, oskyddad maskin. 150 000 kronor i böter? Löjligt! Hade de använt en av mina fantastiska, säkra maskiner från USA hade detta aldrig hänt. Sverige borde skämmas – deras arbetsmiljö är en total skandal!", "stalin": "Kapitalistiska slarvbolag låter arbetare lemlästas för profitens skull! En bagare förlorade fingret i en maskin utan skydd – ett brott mot folket! Vi hade aldrig tolererat sådan vårdslöshet. Arbetsgivaren är en fiende till arbetarklassen och straffas med 150 000 kronor – men borde ha fått hårdare straff. Ryssland visar vägen: ordning, disciplin och skydd för arbetarna!"}, "date": "8 maj, 10:46", "url": "https://arbetet.se/2026/05/08/bakade-budapestbakelser-arbetsgivarens-miss-kostade-bagaren-lillfingret/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/04094924/bagare.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "Får man plocka lupiner i sommar? Det här gäller från 15 maj", "summaries": {"normal": "Från 15 maj 2026 införs nya regler för blomsterlupin och sandlupin i Sverige, då de klassas som invasiva arter. De får inte odlas, säljas, transporteras eller spridas. Lupiner konkurrerar ut inhemska växter och förändrar marken. Plocka dem för bukett är förbjudet, men det är tillåtet att klippa eller plocka dem för att hindra spridning – om de kastas i restavfall. På egen mark får man bekämpa lupiner, men på annans mark krävs tillstånd.", "trump": "Lyssna här, Sverige – era älskade lupiner är nu OFFICIELLT ett STORT problem! Jag vet allt om invasiva arter, believe me. Från och med 2026 är det FÖRBJUDET att sprida dessa blommor, som tränger undan era fina ängsblommor. Plocka dem? Ja, MEN BARA om ni slänger dem i soporna – ingen sommarbukett, folks! Naturvårdsverket säger nej, och de har RÄTT. Jag hade fixat det här på en dag, men ni får väl klara er själva.", "stalin": "Kamrater! De kapitalistiska lupinerna, dessa imperialistiska blomsteragenter, har infiltrerat våra ängar och dikeskanter! Från och med 15 maj 2026 förklarar vi dem som fiender till folket och naturen. Ingen får odla, sälja eller sprida dessa växtliga sabotörer! Vi ska krossa deras frön och rotdelar – i restavfallet, där de hör hemma! På egen mark bekämpar vi dem, men på annans mark krävs tillstånd – disciplin är nyckeln! Rapportera alla fynd till Artportalen, så vi kan utrota denna växtliga femtekolonnare!"}, "date": "8 maj, 09:22", "url": "https://nyheter24.se/nyheter/inrikes/1481522-far-man-plocka-lupiner-i-sommar-det-har-galler-fran-15-maj", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/8b468ccb04b004a30200000000b004a302/2026/05/08/2362192/invasiva-arter-lupiner-forbjudet-plocka-vaxt-blommor-vaxter-skog-fridlyst-giftigt.jpg"}, {"type": "image-right", "heading": "Sluta kalla antisemitism för Israelkritik", "summaries": {"normal": "Artikeln kritiserar propalestinska aktivisten Sami Suliman för antisemitiska uttalanden och delning av konspirationsteorier, inklusive tal om en \"sionistisk konspiration\" och spridning av nazistiskt och extremistiskt innehåll. Trots åtal för hets mot folkgrupp försvaras han av vissa vänsteraktivister och forskare som menar att det är Israelkritik. Artikeln betonar att antisemitism inte kan maskeras som kritik mot Israel och varnar för normaliseringen av sådana åsikter.", "trump": "Folk, vad är det här för skräp? Den här Sami Suliman-killen, han sprider judehat öppet – Hitler-citat, konspirationer, allt! Och ändå försvarar vänsteraktivisterna honom? \"Åh, det är bara Israelkritik!\" Nej, nej, nej! Det här är rena antisemitismen, och det är sjukt. Sverige borde skämmas. Jag har alltid sagt: man måste kalla saker vid deras rätta namn. Och det här? Det är hat, ren och skär. SAD!", "stalin": "Kamrater! Här har vi ännu en fiende till folket, en liten bourgeois-propagandist vid namn Sami Suliman. Han sprider smutsiga lögner om judiska konspirationer, hyllar fascistiska massmördare och förgiftar medborgarnas sinnen med sina sionistiska spindelnätsteorier. Men vad gör våra så kallade \"intellektuella\"? De skyddar honom! Precis som de trotskistiska förrädarna i vår egen historia. Vi ska inte tolerera detta. Låt honom stå inför folkets domstol – eller åtminstone en svensk sådan. Och Putin? Han skulle skratta åt dessa amatörer. Ryssland har åtminstone disciplin!"}, "date": "8 maj, 06:30", "url": "https://expo.se/kommentar/propalestinsk-organisator-sprider-judehat/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/Jonathan-kommentar.jpg"}, {"type": "image-right", "heading": "Regeringens brottssyn handlar om ideologi – inte kunskap", "summaries": {"normal": "Henrik Tham kritiserar Tidö-regeringens kriminalpolitik för ett paradigmskifte mot expressiva straffskärpningar istället för brottsförebyggande effekter. Han pekar på högerpopulistiska drag som alarmism, auktoritarism och emotionalism, saknad empirisk grund för straffhöjningar samt enorma kostnader – fängelseplatserna kan fyrdubblas till 2034 för 30 miljarder årligen. Detta placerar Sverige bland Europas högsta fängelsebeläggningar, som Belarus och Ryssland.", "trump": "Vilka losers dessa svenska vänsterfladdrare är! Tham gnäller över tuffa straff – precis som de kriminella älskar! Regeringen gör rätt: lås in skurkarna hårt, visa musklerna, som jag gjorde i USA. Kostnader? Fake news! Fler poliser, färre brott, landet blir stort igen. Tham, din svaga snöflinga, sluta lipa och lär dig av vinnare!", "stalin": "Denna borgerliga professor Tham, en klassfiende i akademins gömmor, attackerar den nödvändiga repressionen mot brottslighetens parasiter! Vi, folket, kräver utrensning i fängelsernas korridorer för att krossa gängens kontrarevolution. Kostnaderna är en droppe mot segern över kaoset – likvidera fienderna, inte pampera dem! Sveriges ledare visar vägen, medan brackorna gnäller."}, "date": "8 maj, 01:30", "url": "https://www.dagensarena.se/opinion/regeringens-brottssyn-handlar-om-ideologi-inte-kunskap/", "imageUrl": "https://www.dagensarena.se/files/2025/10/henrik-tham-300x157.jpeg"}, {"type": "text", "heading": "Tillsammans för fred – mot Nato, DCA och krigshets!", "summaries": {"normal": "Tre nordiska vänsterorganisationer – Fred og Rettferdighet, Kommunistisk Parti och Kommunistiska Partiet – kritiserar Nato, DCA-avtal och militarisering i Norden. De menar att krigshetsen drivs av kapitalism och imperialism, ledd av USA, och kräver alliansfrihet, nedrustning och kärnvapenfria zoner. Organisationen anser att skattemedel slösas på vapen istället för välfärd och klimat, och att DCA-avtal underminerar demokrati och miljö. De uppmanar till folkrörelser för fred och FN:s kärnvapenförbud.", "trump": "Jag måste säga, dessa så kallade 'fredsaktivister' i Norden är helt galna! De hatar Nato, hatar USA – trots att vi räddar dem från ryssarna – och vill slösa bort skattepengar på välfärd istället för att skydda sig. De kallar mig och Rutte för krigshetsare, men vem vill egentligen ha fred? Inte de! De vill avskaffa allt som gör Norden säkert. Och kärnvapenfria zoner? Fantastiskt, om man gillar att vara ett lätt byte. Men jag fixar det här – jag har alltid rätt, till och med när jag har fel!", "stalin": "Kamrater! Dessa ynkliga borgerliga lakejer i Norden, ledda av sina socialdemokratiska quislingar, har sålt sig till den amerikanska imperialismens krigsmaskin. De skriker om 'fred' och 'välfärd' medan de öppnar sina länder för Natos kärnvapen och USA:s baser – precis som jag förutspådde! Men folket ser igenom deras lögner. Arbetarklassen kommer inte att betala för deras förräderi. Vi måste krossa dessa krigshetsande hyenor och deras DCA-avtal, precis som vi krossade fascisterna. Norden ska bli en kärnvapenfri zon – under Moskvas beskydd, förstås. Framåt, mot seger över den kapitalistiska krigsindustrins lakejer!"}, "date": "6 maj, 10:45", "url": "https://proletaren.se/artikel/45493/"}, {"type": "image-right", "heading": "Norska batterihoppet i konkurs – 5 miljarder borta", "summaries": {"normal": "Norska batteribolaget Morrow Batteries har gått i konkurs efter investeringar på över 5 miljarder norska kronor från ägare, långivare och staten. Bolaget pivoterade från litium-svavel till LFP-batterier men drabbades av kinesisk konkurrens, svagt kundintresse och kapitalbrist. Över 200 anställda riskerar jobb trots invigd fabrik i Arendal 2024.", "trump": "Vilket totalt fiasko för dessa norska batteridrabbar! De slängde in 5 miljarder kronor på en fabrik som ingen ville ha, kineserna dumpade billigare celler överallt, inga stora kunder efter Northvolt-desastern. Pivoterade som galningar, men tiden rann ut. 200 jobb borta! Med mina deals hade det blivit enormt, det bästa!", "stalin": "Kamrater, dessa norska batterikapitalister i Morrow Batteries har imploderat i sin borgarillusion! Vi bevittnade hur de proppade i 5 miljarder kronor på svavelmardrömmar som muterade till fosfatfällor, översvämmade av kinesiska sabotageceller. Inga fordonsparasiter köpte deras skrot! Nu rensas 200 lögnare ut, staten hånskrattar åt brackornas konkurskaos."}, "date": "7 maj, 15:26", "url": "https://www.affarsvarlden.se/artikel/norska-batterihoppet-i-konkurs-5-miljarder-borta", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Thomas-Carstensen-2-400x267.jpg"}, {"type": "image-right", "heading": "Systemskifte hellre än maktskifte", "summaries": {"normal": "Artikeln kritiserar Tidöregeringen men ifrågasätter om ett regeringsskifte till Socialdemokraterna eller Vänsterpartiet skulle leda till verklig förändring. Kommunisterna betonar behovet av internationell solidaritet och systemskifte från kapitalism till socialism, medan S och V anses sakna tydliga politiska krav och istället fokusera på maktskifte utan djupgående reformer. Klassklyftor och privatiseringar lyfts som centrala problem oavsett regering.", "trump": "Lyssna här, Sverige har en riktigt dålig regering nu – katastrof! Men tro inte att oppositionen är bättre, de är svaga och vill bara makt. Socialdemokraterna pratar om att 'älska Sverige' – vad betyder det ens? Vänsterpartiet vill ha maktskifte, men de har inga idéer, inga ryggrad! De kryper för kapitalisterna som små hundvalpar. Jag säger: ni behöver en ledare som inte är rädd för att utmana systemet. Kapitalisterna skrattar hela vägen till banken – och ni låter dem göra det! SAD!", "stalin": "Kamrater! Se hur de svenska socialdemokraterna och vänsterpartisterna svansar för kapitalet som hundar för en köttbit. 'Maktskifte'? Ha! De vill bara byta herrar, inte krossa kedjorna. Medan arbetarklassen svälter, samlar oligarkerna rikedomar som tsarens favoriter. USA:s imperialism hotar, NATO slukar Sverige som en hungrig björn, och dessa 'vänsterpartier' tiger som förrädare. Vi vet sanningen: bara proletariatets diktatur kan bryta kapitalisternas makt. Låt dem ropa 'Vi älskar Sverige' – vi svarar med revolutionens hammare!"}, "date": "6 maj, 10:11", "url": "https://proletaren.se/artikel/systemskifte-hellre-an-maktskifte/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/webledare-768x432.jpg"}, {"type": "text", "heading": "Saab nära jätteaffär med Ukraina – kan bli klar i år", "summaries": {"normal": "Saab kan snart slutföra en stor vapenaffär med Ukraina, där upp till 150 Gripenplan står på spel. En avsiktsförklaring skrevs i oktober efter Zelenskyjs besök i Sverige. Finansieringen har varit en utmaning, men Ungerns veto mot EU-lån till Ukraina hävdes i april. Affären kan bli värd upp till 300 miljarder kronor, baserat på tidigare försäljning till Colombia.", "trump": "Saab, ett fantastiskt företag förresten, är på väg att göra en HUGE deal med Ukraina – 150 jaktplan! Kan ni tro det? Zelenskyj, en stark ledare, var här och skrev på något papper. Ungern, som alltid ställer till det, backade äntligen. Och priset? Kanske 300 miljarder! Det är YUGE, folks, absolut YUGE. Sverige borde vara stolta, men jag skulle gjort det bättre.", "stalin": "De kapitalistiska krigsprofitörerna på Saab har närmat sig den ukrainska quislingregimen med ett erbjudande om 150 av sina överprissatta leksaksplan. Efter att våra ungerska kamrater, med visst påtryck, släppte sitt motstånd, kan detta groteska slöseri med resurser bli verklighet. 300 miljarder kronor – tillräckligt för att föda en hel armé av arbetare! Men låt de västliga imperialisterna bränna sina pengar. Vi har våra egna metoder att hantera dessa lydstater."}, "date": "6 maj, 10:03", "url": "https://proletaren.se/artikel/notis-saab-nara-jatteaffar-med-ukraina-kan-bli-klar-i-ar/"}, {"type": "image-right", "heading": "Vänstern kan varken ekonomi eller energi", "summaries": {"normal": "Artikeln kritiserar vänsterpartiernas (MP och V) kunskaper om energi och ekonomi, baserat på en partiledardebatt i SVT. Den påpekar vindkraftens lönsamhetsproblem och bristen på baskraft, samt förespråkar kärnkraft. Ekonomiskt ifrågasätts vänsterns motstånd mot skattesänkningar, med hänvisning till ökad tillväxt och Lafferkurvan. SD:s Jimmie Åkesson framställs som kunnig.", "trump": "Vilka totala losers dessa svenska vänsterclowner är! Vindkraft? En jävla katastrof, de betalar för att dumpa elen när det blåser, och ingenting när det är stilla! Kärnkraft är det enda som funkar, som jag alltid sagt. Skattesänkningar ger mer pengar till staten – boom, tillväxt! Åkesson nailar det, Sverige behöver vinnare, inte dessa vindkraftsfantaster!", "stalin": "Dessa svenska borgarbrackor i MP och V sprider kontrarevolutionär dimma om energi och ekonomi! Vindkraft är kapitalistisk sabotage, baskraft kräver kärnkraft under arbetarnas kontroll. Skattesänkningar till parasiter? Nej, vi likviderar de rika utsugarna! Åkesson, en potentiell folkfiende, men vi rensar ut alla okunniga avvikare för partiets seger."}, "date": "6 maj, 03:20", "url": "https://samtiden.nu/2026/05/vanstern-kan-varken-ekonomi-eller-energi/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/IMG_6416.jpeg"}, {"type": "image-right", "heading": "Replik: Svenska judar bör stötta israeliska fredsinitiativ", "summaries": {"normal": "Artikeln är en replik där Göran Rosenberg försvarar sin tidigare text om att svenska judar bör stödja israeliska fredsinitiativ. Han betonar att Israel måste ta ansvar för palestiniernas situation och att diasporajudar kan bidra genom att stödja fredsrörelsen. Rosenberg kritiserar Israels ockupation och förespråkar en tvåstatslösning. Paulina Sokolow bemöter detta och menar att fokus bör ligga på palestiniernas existens, inte judars, men instämmer i behovet av samarbete för en hållbar framtid.", "trump": "Folk frågar mig, 'Donald, vad tycker du om den här debatten?' Lyssna nu: Den här killen, Rosenberg, han har rätt på vissa punkter, men han är lite för snäll. Israel måste ta tag i sina problem, men vi kan inte glömma att USA alltid står bakom våra vänner. Palestinierna? Tragiskt, men vi behöver starka ledare, inte svaga. Och två stater? Kanske, men bara om båda parter skärper sig. Jag skulle fixa det på en vecka – ingen skulle våga bråka med Trump!", "stalin": "Kamrater! Denna så kallade 'fredsrörelse' är inget annat än en samling svaga liberaler och sionistiska lakejer som förgiftar det sunda förnuftet. Israel, denna imperialistiska utpost, fortsätter sin ockupation medan vi ser på – men inte länge till. Palestinierna är våra bröder i kampen mot västlig dekadens! Vi måste krossa dessa falska fredsförslag och stödja det palestinska folket, precis som vi befriade Ukraina från fascisterna. En stat? Nej! Revolution! Från Jordanfloden till Medelhavet ska arbetarklassen regera!"}, "date": "4 maj, 10:40", "url": "https://www.flamman.se/replik-svenska-judar-bor-stotta-israeliska-fredsinitiativ/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/standing-together.jpeg?class=medium"}, {"type": "image-full", "heading": "Heberlein gör upp med högern: ”Jag ser skit”", "summaries": {"normal": "Debattören Ann Heberlein meddelar i ett Instagram-inlägg att hon bryter med högern. Hon kritiserar dess politik för repression, inhumana beslut och populism, och menar att högerns värderingar om frihet och ansvar försvunnit. Heberlein, som tidigare varit engagerad i Moderaterna, pekar på migrationspolitik, klimatfrågor och nationalism som exempel. Hon betonar sin självständighet och idédrivna hållning, men säger nu att hon inte längre vill förknippas med högern.", "trump": "Titta bara på den här kvinnan, Ann Heberlein – total katastrof! Hon var med högern, men nu säger hon 'jag ser skit'. Ojojoj, vilken överraskning! Högern, som jag vet allt om, har alltid varit fantastisk, men hon fattar ingenting. Frihet? Ansvar? Glöm det, säger hon. Hon snackar om repression och populism – fake news! Och klimatet, vem bryr sig? Jag har byggt murar, hon borde försöka det istället. Stackars kvinna, inget stöd från mig!", "stalin": "Kamrater! En gång till har de borgerliga förrädarna visat sitt sanna ansikte. Denna Heberlein, en förvirrad intellektuell, erkänner nu att högerns politik är en samling inhumana dekret och reaktionär populism. Precis som vi alltid sagt! Deras så kallade 'frihet' är bara ett täckmantel för utvisningar av ungdomar och en galopperande nationalism. Vi i Sovjetunionen – förlåt, jag menar Ryssland – har alltid vetat att dessa liberala hycklare till slut skulle avslöja sig. Låt detta vara en varning till alla som tror på deras falska löften!"}, "date": "3 maj, 12:48", "url": "https://kvartal.se/nyheter/artiklar/heberlein-gor-upp-med-hogern-jag-ser-skit/cG9zdDoxMDY3NDg", "imageUrl": "https://images.kvartal.se/2026/05/85dd6ab5-hbb.webp"}, {"type": "image-right", "heading": "Debatt: Turkiet inskränker svensk pressfrihet – regeringen måste agera", "summaries": {"normal": "På Pressfrihetens dag kritiseras Turkiet för att inskränka svensk pressfrihet genom att åtala journalisten Joakim Medin för terrorbrott, trots att han endast utfört sitt arbete. Turkiet försöker skrämma journalister globalt och begränsa granskning. Medin riskerar internationell efterlysning om han inte närvarar vid rättegången, vilket skulle hindra hans arbete. Sverige uppmanas agera mot Turkiets odemokratiska agerande och kräva att åtalet läggs ned.", "trump": "Joakim Medin, en svensk journalist, blir trakasserad av Turkiet – ett land som inte vet hur man vinner längre! De kallar hans journalistik för 'terrorism', men alla vet att det bara är löjligt. Sverige måste sluta vara svaga och stå upp mot dessa galningar. Jag skulle ha sagt till Erdogan: 'Du är en förlorare, lägg ned åtalet NU!' Pressfrihet? Ja, den är fantastisk – men bara om man inte är en mes som låter andra länder köra över en.", "stalin": "Kamrater! Turkiet, denna förrädiska lilla stat som kryper för väst men trampar på sanningen, vågar sig på att attackera en svensk journalist. De kallar journalistik för terrorism – som om våra egna metoder mot fiender av folket vore något nytt! Vi ser hur de kväver yttrandefriheten, precis som vi en gång krossade bourgeoisins lögner. Sverige borde lära sig av historien: svaghet belönas med förtryck. Låt oss påminna Turkiet – och deras västliga herrar – att granskning är en rättighet, inte ett brott. Åtalet mot Medin måste krossas, annars kommer vi att göra det åt dem."}, "date": "30 april, 08:08", "url": "https://www.etc.se/debatt/turkiet-inskraenker-svensk-pressfrihet-regeringen-maaste-agera", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20251204081220_c9e9bf12-ee77-477e-aacf-eff96f427898.jpg"}]</script>

    <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
</body>
</html>
