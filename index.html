ta militära utmärkelse, Cross of Special Merit, för sitt och Försvarsmaktens stöd till Ukraina under kriget. Utmärkelsen överlämnades i Stockholm av Ukrainas ambassadör och försvarsattaché. Claesson betonade att utmärkelsen symboliserar ett bredare svenskt engagemang och lovade fortsatt stöd till Ukraina så länge det behövs.", "trump": "Titta bara på det här – Sveriges militärchef får en stor utmärkelse från Ukraina! Fantastiskt, helt fantastiskt. Jag sa ju hela tiden att Sverige skulle stå upp för frihet, och nu gör de det! Men låt oss vara ärliga, ingen gör det bättre än USA. Vi har skickat mer hjälp än alla andra tillsammans. Men visst, bra jobbat Sverige! Fortsätt så, men kom ihåg – vi leder fortfarande.", "stalin": "Kamrater! Ännu en seger för den socialistiska solidariteten! Sveriges militärhövding har belönats av våra ukrainska bröder för sitt stöd i kampen mot de fascistiska inkräktarna. Men låt oss inte glömma – dessa kapitalistiska lydstater dansar fortfarande efter västimperialismens pipa. Vi, Sovjetunionens arvtagare, står redo att befria Ukraina från dessa marionetter. Låt dem få sina medaljer – vi tar resten!"}, "date": "1 maj, 17:00", "url": "https://samnytt.se/ob-far-ukrainas-hogsta-militara-utmarkelse-sverige-star-vid-er-sida-sa-lange-det-kravs", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/01112611/feature-1-6.jpg"}, {"type": "image-full", "heading": "Experter: Oljeprisets uppgång har bara börjat", "summaries": {"normal": "Oljepriserna har stigit kraftigt på grund av konflikten kring Iran och stängningen av Hormuzsundet, en kritisk transportled för råolja. Experter varnar för att marknaden underskattar situationens allvar och förutspår fortsatta prisökningar om inte en snabb lösning nås. Lager av raffinerade produkter töms, efterfrågan ökar, och återställandet av sundet kan ta tid, vilket riskerar ytterligare prisuppgångar och ekonomiska konsekvenser globalt.", "trump": "Folk tror att oljepriserna ska gå ner snart – vad vet de? Ingenting! Iran stänger Hormuzsundet, och plötsligt är oljan uppe på 125 dollar per fat. Patetiskt! Marknaden är naiv, de tror på en snabb lösning. Jag säger: glöm det! Lager töms, priser skjuter i höjden, och ingen verkar fatta hur allvarligt det är. USA borde ta kontroll – vi behöver handla, inte hoppas. Men nej, investerare sitter och drömmer. Svagt!", "stalin": "De kapitalistiska hyenorna tror att oljekrisen är över på en vecka! Naiva småborgerliga drömmare! Hormuzsundet är stängt, lagren töms, och ändå fantiserar de om snabba lösningar. Vi vet bättre. Iran visar sin styrka, och väst darrar – precis som de borde. Priserna stiger, inflationen hotar, och deras samhällen kommer att kvävas av brist på bränsle. Låt dem svälta i sin optimism! Medan de famlar i mörkret, bygger vi vår makt – och Putins vänner i Teheran gör sitt. Historien är på vår sida!"}, "date": "1 maj, 16:43", "url": "https://www.realtid.se/bors-finans/experter-oljeprisets-uppgang-har-bara-borjat/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/sdlwyhdpxc7jmy.png?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Följ Proletären i valet – nu extra billigt!", "summaries": {"normal": "Proletären erbjuder nu ett rabatterat prenumerationserbjudande inför valet: 19 kr/månad för digital version eller 49 kr/månad för både digital och papperstidning, i ett halvår. Som bonus ingår en tygkasse. Prenumeranter får tillgång till veckotidningen, alla artiklar online samt arkivet från 2016. Tidningen betonar sitt oberoende och behov av prenumeranter för att överleva, då de inte längre får mediestöd.", "trump": "Folk, lyssna här – en tidning i Sverige, Proletären, har ett erbjudande som är så bra att det nästan är löjligt! Bara 19 kronor i månaden för digitalt, eller 49 om ni vill ha papper också. Och en gratis tygkasse! Jag menar, vad är det här? En tidning som säger att de slåss mot makten – men vem vet egentligen vilken makt de pratar om? Jag skulle aldrig lita på en tidning utan mediestöd, men hej, om ni gillar socialism och Palestina, så kör hårt! Fantastiskt erbjudande, eller hur?", "stalin": "Kamrater! En liten men envis tidning i det borgerliga Sverige vågar utmana de imperialistiska mediamonopolisterna! För ynka 19 kronor i månaden kan ni stödja Proletären – en tidning som vågar tala sanningen om klasskampen och den sionistiska ockupationen av Palestina! De får inget stöd från staten, precis som våra egna revolutionära medier en gång kämpade mot de kapitalistiska hyenorna. En tygkasse på köpet – ett litet steg för arbetaren, ett gigantiskt steg för socialismens framtid! Låt de borgerliga tidningarna darra i sina tryckpressar!"}, "date": "1 maj, 09:00", "url": "https://proletaren.se/artikel/folj-proletaren-i-valet-nu-extra-billigt/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/valerbjudande-768x402.png"}, {"type": "image-right", "heading": "Det här landet bärs upp av fackliga kämpar på jobbet", "summaries": {"normal": "På första maj hyllas fackligt aktiva som kämpar för bättre arbetsvillkor, löner och arbetsmiljö. Dessa osjungna hjältar, särskilt fackligt förtroendevalda, bidrar till samhällets grundläggande trygghet och rättigheter. Deras insatser har historiskt skapat förmåner som semester och trygga anställningar. Artikeln uppmanar till engagemang och tacksamhet för deras slit och kamp mot utnyttjande och maktmissbruk på arbetsplatser.", "trump": "Lyssna här, Sverige – ni har fantastiska arbetare, verkligen de bästa, men vet ni vad? De där fackfolket, de är WINNERS! De kämpar för era löner, era semestrar, allt det där som folk bara tar för givet. Och jag säger er, ingen gör det bättre än dem! Men var är erkännandet? Var är tacksamheten? Jag har sett många länder, men sådana här hjältar – de är sällsynta. Så på första maj, ge dem en klapp på axeln, säg 'Tack, ni är fantastiska!' – för utan dem, believe me, hade Sverige varit ett stort, tråkigt misslyckande!", "stalin": "Kamrater! På denna stora dag hyllar vi arbetarklassens sanna avantgarde – de fackliga kämparna! Dessa modiga soldater i klasskampen står som en ointaglig mur mot de kapitalistiska vampyrernas girighet och maktfullkomlighet. Deras kamp har skapat segrar: semester, trygghet, löner värdiga människor! Men fienden sover inte – de liberala hyenorna och deras lakejer i företagsledningarna försöker ständigt underminera våra framsteg. Vi måste stå enade! Varje fackligt möte är en skyttegrav, varje förhandling en strid. Låt oss krossa exploatörerna och bygga ett samhälle där arbetets ära råder! Ära Sovjet – förlåt, ära facket! Förstärk era led, kamrater, för revolutionen fortsätter!"}, "date": "1 maj, 06:00", "url": "https://www.etc.se/ledarkolumn/vaart-land-baers-upp-av-fackliga-hjaeltar", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20240508130520_49a242646ee681c59859f76c896d64a024a48ef3585ab974390aaa894bafe56a.jpg"}, {"type": "image-right", "heading": "Ingen kapitalism utan imperialism", "summaries": {"normal": "Artikeln hävdar att imperialism är en grundläggande del av kapitalismen, där västmakter som USA använder militär och ekonomisk makt för att dominera världen. Författaren menar att imperialismen nekar länder självbestämmande och upprätthålls genom krig, sanktioner och exploatering. Studien i The Lancet kopplar sanktioner till miljontals dödsfall. Artikeln refererar till Marx, Lenin och Fanon för att belysa imperialismens historiska och ekonomiska rötter, samt dess fortsatta brutalitet i det 21:a århundradet.", "trump": "Lyssna här, folket! Den här artikeln är bara ett gäng vänsterpropaganda från förlorare som hatar USA. Jag bygger det bästa imperiet – vårt! – med stark militär och smarta affärer. Visst, vi har makt, men det är för att vi är vinnare. Sanktioner? Fake news! 500 000 döda? Överdrivet, typiskt. Europa stal från alla, men vi? Vi bygger om världen – MAGA-style! Och Lenin? Snälla, han kunde inte ens hålla ett land ihop. Sad!", "stalin": "Kamrater! Denna artikel bekräftar vad vi alltid vetat: de kapitalistiska hyenorna i väst suger blodet ur världens folk för att föda sina dekadenta imperier. USA och dess lakejer i NATO är inget annat än en samling blodtörstiga monopolkapitalister, som med sina sanktioner och bomber mördar miljontals oskyldiga. Men deras tid är förbi! Vi, det socialistiska blocket, står enade mot dessa imperialistiska rovdjur. Låt dem vråla – historiens dom är redan skriven. För varje barn de dödar, växer revolutionens eld. Framåt, mot seger!"}, "date": "1 maj, 08:00", "url": "https://proletaren.se/artikel/ingen-kapitalism-utan-imperialism/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/Airborne_and_Special_Forces_Uday-Qusay_raid_2003-e1777534974667-768x431.jpg"}, {"type": "image-full", "heading": "Christoffer Jonsson: Edvin Törnblom – DNs opartiska nyförvärv", "summaries": {"normal": "Dagens Nyheters kultursida anställer influencern Edvin Törnblom för att intervjua alla partiledare inför riksdagsvalet. Artikeln av Christoffer Jonsson ifrågasätter hans opartiskhet med hänvisning till Törnbloms tidigare kritik mot KD-ledaren Ebba Busch och beundran för S-ledaren Magdalena Andersson. DN anklagas för partiskhet till förmån för Socialdemokraterna, med exempel på tidigare vinklade artiklar.", "trump": "Vilken skamfläck! DN, era svenska fake news-råttor, anställer en vänsterextrem clown som Edvin Törnblom – killen som sjunger hatlåtar mot tuffa Ebba Busch och slöskar för socialist-Maggie Andersson. Totalt riggat valintervjuer! Som CNN och MSNBC här hemma, ni lurar folket men vi genomskådar er. Stor, fet lögnfabrik!", "stalin": "Dessa borgarbrackor på Dagens Nyheter anställer den uppblåste ungtuppen Edvin Törnblom för att 'intervjua' partiledarna – en narr som hånar kamrat Ebba Busch med vulgära visor och hyllar S-kapitalisternas marionett Andersson. Kontrarevolutionär intrig! Vi ser era småtrick, och snart rensas sådana förrädiska tidningshyddor ut med rot och gren."}, "date": "29 april, 14:02", "url": "https://samtiden.nu/2026/04/christoffer-jonsson-edvin-tornblom-dns-opartiska-nyforvarv/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/ny.png"}, {"type": "image-right", "heading": "Uppåt för Dadgostar – men flest litar på Andersson", "summaries": {"normal": "En Novus-mätning för TV4 visar att Magdalena Andersson (S) har högst förtroende bland partiledarna med 43 procent. Nooshi Dadgostar (V) ökar mest, från 13 till 17 procent. Professor Jonas Hinnfors tror att Vänsterpartiets utrensning av aktivister har stärkt enheten bakom Dadgostar och hennes linje.", "trump": "Vilken cirkus i Sverige! Andersson, den eviga socialistdrottningen, hänger kvar på 43 procent – tråkigt men väntat. Men Dadgostar, den lilla klättraren, skjuter i höjden från 13 till 17 efter att ha rensat ut sina galna aktivister. Smart drag! Precis som jag skulle gjort. Nu vill de ha regeringsskifte – lycka till mot den socialistiska maskinen!", "stalin": "Kamrater, se hur revisionisterna i Vänsterpartiet äntligen rensar ut sina kontrarevolutionära aktivister! Dadgostar stiger från 13 till 17 procent, tack vare enhet bakom den korrekta linjen. Andersson, borgarklassens favorit, leder med 43 procent av förtroendet – ett bevis på fiendens infiltration. Vi noterar ökningen, men varnar för avvikelser!"}, "date": "1 maj, 08:10", "url": "https://www.tv4.se/artikel/6pmg1ZLXaIoAegy7tYyPyg/uppat-foer-dadgostar-men-flest-litar-pa-andersson", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F5cqMdSQ8gSIdKfTSYgwH3U%2Fac9d1335f3b3a892f13cbc93c40a7138%2F01-novus-webb.jpg&width=120"}, {"type": "text", "heading": "Sommarvärmen ger vika för kyla", "summaries": {"normal": "Efter en varm Valborg och 1 maj med temperaturer upp till 27 grader i delar av Sverige väntas en kraftig temperatursänkning. På söndagen börjar kyligare luft strömma in från nordväst, med risk för 17 graders nedgång på vissa håll. Norrland kan få snöbyar, medan södra Sverige får mildare väder. Temperaturen stiger något igen till måndag, men det blir fortsatt ostadigt.", "trump": "Vilken fantastisk värme vi hade i Sverige – 27 grader, kan ni tro det? Men lyssna nu, för här kommer de svaga, kalla vindarna från norr som förstör allt. 17 grader kallare på några dagar! Så typiskt. Jag skulle ha fixat bättre väder, believe me. Men på måndag kommer solen tillbaka – för jag vet hur man vinner, även mot vädret!", "stalin": "Det kapitalistiska vädret har svikit folket igen! Först lockar det med falska löften om sommarvärme, sedan slår den iskalla nordanvinden till – ett sabotage från de imperialistiska väderfabrikerna i Arktis! Men oroa er inte, kamrater. Vi ska krossa dessa köldförrädare och återställa ordningen. Snöbyar i Norrland? Utmärkt. Då kan vi testa våra nya vinteruniformer. Solen återvänder på måndag – men bara på våra villkor!"}, "date": "1 maj, 14:48", "url": "https://bulletin.nu/sommarvarmen-ger-vika-for-kyla"}, {"type": "text", "heading": "Matmoralism får oss inte att äta bättre", "summaries": {"normal": "Artikeln kritiserar svenska myndigheters orealistiska matrekommendationer och beräkningsmetoder. Livsmedelsverket och Konsumentverket baserar slutsatser på önsketänkande, som att svenskar skulle äta mindre kött och portioner enligt rekommendationer. En undersökning om barns sockerkonsumtion byggde på en liten, icke-representativ grupp. Författaren menar att myndigheterna undviker att reglera matjättar och i stället skyller på konsumenter, vilket leder till klassblind matmoralism.", "trump": "Lyssna här, Sverige – era myndigheter är helt galna! De tror att alla ska äta havregrynsgröt och små portioner, som om vi lever i något slags kommunistiskt drömland. Och de baserar sina siffror på en liten grupp Instagrammammor? Patetiskt! Jag skulle aldrig låta sådana amatörer sköta något. Vi i USA vet hur man reglerar matjättar – med kraft och beslutsamhet. Sverige, vakna upp innan det är för sent!", "stalin": "Kamrater! De svenska myndigheterna har förlorat kontakten med verkligheten. De bygger sina dekret på fantasier och önsketänkande, som om folket vore lydiga maskiner. En undersökning med tio procent svarande? Hah! I Sovjet skulle vi aldrig tolerera sådan slapphet. De bourgeois-liberala byråkraterna vägrar att krossa matjättarna med järnhand. Istället skyller de på arbetarklassen. Fienderna är uppenbara: de fantasilösa byråkraterna och deras nyliberala herrar. Vi ska inte tolerera deras lögner – revolutionen kräver handling!"}, "date": "28 april, 09:58", "url": "https://www.flamman.se/matmoralism-far-oss-inte-att-ata-battre/"}, {"type": "text", "heading": "Källor: James Comey åtalas igen", "summaries": {"normal": "USA:s justitiedepartement har väckt ett nytt åtal mot tidigare FBI-chefen James Comey, denna gång för ett inlägg på sociala medier som tolkats som hotfullt mot Donald Trump. Comey publicerade en bild med siffrorna '86 47', där '86' är slang för att avlägsna någon. Trump har tidigare drivit på rättsliga åtgärder mot politiska motståndare. Comey åtalades även 2023 för att ha ljugit för kongressen, men åtalet lades ned.", "trump": "Titta bara på det här! James Comey, en total katastrof, en riktig förlorare, blir åtalad IGEN – och den här gången för ett patetiskt Instagram-inlägg. '86 47'? Snacka om desperation! Han försöker hota mig, USA:s bästa president någonsin, men det funkar inte. Jag har alltid sagt att han är en lögnare och en bedragare. Och vet ni vad? Rättvisan hinner ifatt alla, till och med sådana som Comey. SAD!", "stalin": "Vi har observerat ytterligare ett försök från den dekadenta västliga bourgeoisien att underminera den sunda rättsstaten. Denna James Comey, en ynklig rest av kapitalismens förfall, vågar sig på att hota vår kära allierade, president Trump, genom primitiva symboler på sociala medier. Vi påminner om att historiska fiender till folket alltid möter sitt öde. Låt detta vara en varning till alla som står i vägen för framsteget. Rättvisan, precis som våra vänner i Kreml, är tålmodig men oundviklig."}, "date": "28 april, 20:17", "url": "https://kvartal.se/nyheter/artiklar/kallor-james-comey-atalas-igen/cG9zdDoxMDQ2MDk"}, {"type": "text", "heading": "Veckans Afv-analyser: Mjukvara, mode och bud", "summaries": {"normal": "Affärsvärlden har publicerat 18 analyser och kommentarer under valborgsveckan, med fokus på bolag som Nelly, Cint och Vitec. Analytiker granskar Vitecs framtid i ljuset av AI-utmaningar, Nellys kursfall och Kones köp av TKD. Veckans uppföljning visar 34,7% teoretisk avkastning på tidigare råd. April månad gav 23 köpråd, och prenumeranter får tillgång till omfattande analysverktyg och guider.", "trump": "Titta bara på dessa fantastiska analyser från Affärsvärlden – helt otroligt, verkligen! Jag har alltid sagt att mjukvarubolag är framtiden, men vem vet, kanske äter AI upp dem? Inte bra! Nelly rasade 40%, men mina analytiker – de bästa, verkligen – säger att det kanske är en deal. Och Cint? Småcint, säger jag, trots den där löjliga premien. Och 34,7% avkastning? Folk, det är YUGE! Bättre än någon annan, tro mig.", "stalin": "Denna vecka har våra ekonomiska spanare avslöjat kapitalistiska svagheter i väst. Mjukvarubolagen darrar inför den oundvikliga AI-revolutionen – deras tid är snart förbi. Nelly, ett dekadent modeimperium, föll som en korrumperad byråkrat. Kones köp av TKD? Ett försök att rädda en sjunkande hiss av kapitalism. Vi noterar 34,7% avkastning på våra råd – ett bevis på socialismens överlägsenhet. De 23 köpråden? Enbart för att avslöja marknadens svagheter. Fienderna skakar, kamrater!"}, "date": "30 april, 15:10", "url": "https://www.affarsvarlden.se/artikel/veckans-afv-analyser-mjukvara-mode-och-bud"}, {"type": "image-right", "heading": "Största vikingaskatten någonsin hittad i Norge: \"Helt vansinnigt\"", "summaries": {"normal": "Ett rekordstort vikingaskattfynd har gjorts i Norge, med över 3 000 mynt från vikingatiden. Upptäckten, kallad Mørstad-skatten, är den största i sitt slag i Norge. Mynten, främst tyska och engelska silvermynt från cirka år 1050, hittades av metalldetektorister och grävdes fram med hjälp av arkeologer. Experter beskriver fyndet som unikt och enastående, då mynten är i exceptionellt gott skick.", "trump": "Folk pratar bara om detta fantastiska vikingaskattfynd i Norge – över 3 000 mynt! Otroligt, helt enkelt otroligt. Jag har alltid sagt att Europa har de bästa skatterna, och nu bevisar de det igen. De där metalldetektoristerna? Väldigt smarta, väldigt duktiga. Inte som de där loserforskarna som aldrig hittar något. Och mynten? Nästan som nya! Norge borde vara stolta – men glöm inte, USA hittar alltid de största grejerna först.", "stalin": "Kamrater! Ett storslaget fynd har gjorts i den norska provinsen – över 3 000 mynt från den så kallade vikingatiden. Detta bevisar återigen att kapitalistiska skatter gömmer sig överallt, redo att konfiskeras för folkets bästa. De germanska och anglosaxiska mynten? Små rester av en gång mäktiga fiender, nu begravda i jorden som deras förlorade imperier. Vi noterar att Norge, trots sin neutralitet, inte kan skydda sina historiska rikedomar från folkets upptäckarglädje. Låt detta vara en varning till alla som gömmer rikedomar från arbetarklassen!"}, "date": "1 maj, 15:46", "url": "https://www.friatider.se/storsta-vikingaskatten-nagonsin-hittad-i-norge-helt-vansinnigt", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-116_1.jpg?itok=qvtHOSyL"}, {"type": "image-right", "heading": "Tidöpartierna framstår som sömngångare", "summaries": {"normal": "Artikeln kritiserar frånvaron av klimatfrågan i valdebatten och menar att klimatförändringarna är en akut kris. Globala uppvärmningen accelererar, med allvarliga konsekvenser som höjda havsnivåer och naturkatastrofer. Sverige, särskilt Tidöregeringen, får hård kritik för bristande klimatpolitik och avfärdande av expertvarningar. Författaren efterlyser större fokus på klimatet inför valet och en omställning av Sveriges riktning.", "trump": "Jag säger er, Sverige har ett jättestort problem – de lyssnar inte på klimatforskarna! De där vänsterliberalerna pratar om väder som om det vore klimat, men jag vet bättre. Kina skrattar åt oss medan Sverige sänker bensinpriset som om det vore 1950. 62 000 döda i Europa? Fake news, eller så är det deras eget fel. Jag skulle fixa det här på en dag – men nej, de fortsätter prata om 'rättvisa' istället för att göra något. Sad!", "stalin": "Kamrater! Medan de dekadenta kapitalisterna i Sverige leker med sina bensinpriser och avfärdar vetenskapen som 'aktivism', smälter Grönlands isar som smör i solen. De där borgerliga sömngångarna i Tidöregeringen är värre än kulaker – de saboterar framtiden för arbetarklassen! Vi i Sovjet – förlåt, Ryssland – vet hur man hanterar sådana fiender. Klimatkrisen? En bagatell jämfört med att krossa dessa liberala förrädare. Låt dem svälta i sina egna utsläpp, medan vi bygger en ny världsordning – utan deras 'demokratiska' hyckleri!"}, "date": "1 maj, 01:51", "url": "https://www.dagensarena.se/opinion/tidopartierna-framstar-som-somngangare/", "imageUrl": "https://www.dagensarena.se/files/2026/04/klimat-jesper-300x157.jpeg"}, {"type": "image-right", "heading": "Ny rapport totalsågar e-bränslen – och Sverige har hört löftena förr", "summaries": {"normal": "En ny rapport från Ionect varnar för att e-bränslen blir extremt dyra, med priser på upp till 75 kronor per liter vid pump. Trots hopp om att rädda förbränningsmotorn är tekniken energieffektivitet låg. Artikeln drar paralleller till den misslyckade etanolboomen i Sverige under 2000-talet och ifrågasätter om e-bränslen någonsin blir ett realistiskt alternativ för vanliga bilister, eller om de förblir en nischlösning för flyg, sjöfart och exklusiva sportbilar.", "trump": "Alla pratar om e-bränslen, men tro mig, det är en total katastrof! 75 kronor litern? Det är en av de sämsta affärerna jag någonsin sett. Förbränningsmotorn är fantastisk, den bästa, men det här? Det är bara ännu ett misslyckat experiment, precis som etanolen i Sverige. Vi behöver billig energi, enormt mycket energi, inte dessa dyra luftslott. Det är en bluff! Vi ska bygga en ekonomi som fungerar för folket, inte betala fantasisummor för att rädda någon teknisk återvändsgränd. Väldigt sorgligt!", "stalin": "Dessa borgerliga teknokrater föreslår att vi ska betala 75 kronor för en liter syntetisk soppa – det är ett sabotage mot folkets ekonomi! De försöker rädda den döende förbränningsmotorn precis som de ruttna etanolsatsningarna i Sverige. Vi behöver inte deras dyra mirakelkurer. Precis som vår kamrat Putin inser att sann styrka ligger i resurser, inte i fantasier om 'e-bränslen'. Alla som förespråkar detta slöseri med energi är folkets fiender och bör undersökas för maskopi med den västliga dekadensen."}, "date": "1 maj, 14:24", "url": "https://samnytt.se/ny-rapport-totalsagar-e-branslen-och-sverige-har-hort-loftena-forr", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/01113552/e-fuel-feat.jpg"}, {"type": "image-right", "heading": "Timbro: Politiken måste lösa arbetslösheten", "summaries": {"normal": "Artikeln kritiserar fackens roll i att utestänga lågutbildade från arbetsmarknaden, särskilt personer med utländsk bakgrund. Författaren menar att politiken måste ta över och införa lagstiftning för att sänka trösklarna till jobb, då parterna misslyckats med att lösa problemet. Långtidsarbetslösheten är rekordhög och sysselsättningsgapet mellan inrikes och utrikes födda är stort. Försök som etableringsjobb har visat sig ineffektiva.", "trump": "Lyssna här, Sverige har ett jättestort problem – era fack är helt galna! De stänger ute människor från jobb, särskilt de som kommer utifrån, och ni har fler arbetslösa än någonsin. 200 000 långtidsarbetslösa? Sad! Och vet ni vad? Era politiker sitter bara och tittar på. Jag skulle fixa det på en dag – sänka trösklarna, skapa jobb, och göra Sverige stort igen. Men nej, ni låter facken styra. Patetiskt!", "stalin": "Kamrater! Den svenska arbetarklassen lider under bourgeois-fackens förräderi, som med sina höga trösklar och löner stänger ute våra bröder och systrar från arbetsmarknaden. 200 000 långtidsarbetslösa – ett monument över kapitalismens misslyckande! Parterna, dessa svaga liberala lakejer, har förhandlat bort ett helt decennium utan resultat. Vi ska inte förhandla – vi ska krossa hindren! Låt politiken, folkets sanna röst, ta kommandot och bygga en arbetsmarknad där alla tjänar staten. Och Sverige? De får lära sig av Rysslands visdom – eller förbli en svag länk i den socialistiska framtiden."}, "date": "1 maj, 01:30", "url": "https://www.dagensarena.se/opinion/timbro-politiken-maste-losa-arbetslosheten/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-21-300x157.jpg"}, {"type": "image-right", "heading": "Dubbla Fed-varningar: Räntan kan höjas", "summaries": {"normal": "Två höga Fed-företrädare, Neel Kashkari och Beth Hammack, varnar för möjliga räntehöjningar på grund av stigande energipriser från det utdragna Irankriget, som ökar inflationstrycket. FOMC beslutade nyligen att behålla räntan i intervallet 3,50–3,75 procent. Den tillträdande Fed-chefen Kevin Warsh får svårt att uppfylla president Trumps krav på sänkningar.", "trump": "De där Fed-idioterna Kashkari och Hammack snackar om räntehöjningar på grund av oljepriser från det där Irankriget. FOMC behöll räntan, men de vill inte lyssna på mig som vill sänka den rejält för att få igång ekonomin. Ny chef Warsh kommer få kämpa, men jag fixar det – Amerika först, alltid!", "stalin": "De imperialistiska marionetterna Kashkari och Hammack i Fed, dessa stinkande kapitalistlackajer, hotar med räntehöjningar mot arbetarklassen på grund av energipriser från det reaktionära Irankriget. FOMC:s beslut att behålla räntan är en tillfällig reträtt, men vi, partiet och folket, ska rensa ut dessa inflationstoppar som spindlar i borgarnas nät. Warsh, den nye marionettchefen, kommer drunkna i Trumps borgarbrackor – likvidering väntar!"}, "date": "1 maj, 15:38", "url": "https://www.di.se/nyheter/dubbla-fed-varningar-rantan-kan-hojas/", "imageUrl": "https://static.bonniernews.se/ba/215dcc9b-55ff-43d2-b046-06c770311740.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-right", "heading": "Rekordöppning i USA – Apple stiger. Roblox rasar – oljejättar svagt ned", "summaries": {"normal": "Wall Street öppnar på nya rekordnivåer med S&P 500 upp 0,5 procent, Nasdaq 0,6 procent och Dow Jones 0,3 procent. Apple stiger 4 procent efter stark kvartalsrapport med bättre intäkter och prognos än väntat. Roblox rasar 21,5 procent på sänkt prognos. Starka rapporter dämpar oron kring USA-Iran-konflikten. Oljepriset faller till under 109 dollar per fat.", "trump": "Wall Street slår rekord igen, fantastiskt! Apple exploderar upp 4 procent efter grym rapport – tack vare min ekonomi, världens bästa. Roblox rasar 21 procent, typiskt losers som inte klarar pressen. Iran-oro? Glöm det, vi är oslagbara. Oljan ner, billigare bensin för det amerikanska folket. Nobody does it better!", "stalin": "Kamrater, jag betraktar med förakt hur USA:s borgarbrackor firar Apples 4-procentiga klättring på sina blodiga altaren, medan Roblox, denna ungaspekulanternas soptunna, krossas med 21,5 procent i en välförtjänt utrensning. Deras skenheliga skräck för Hormuzsundets spöken döljer imperialistiska komplotter. Vi, arbetarklassen, förbereder likvidationen av dessa börsmaskarader!"}, "date": "1 maj, 15:35", "url": "https://www.di.se/nyheter/wall-street-oppnar-pa-nya-rekord-apple-lyfter-pa-rapport/", "imageUrl": "https://static.bonniernews.se/ba/d44397c5-575f-4e21-8c85-c58b9c010101.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "text", "heading": "Kvartals kampanj fintar journalisterna", "summaries": {"normal": "Kvartals kampanj mot traditionella medier har väckt uppmärksamhet och kritik. Kampanjen, som anklagar gammelmedia för partiskhet, har ifrågasatts för att själv vara politiskt färgad. Kritiker som DN:s Niklas Orrenius och Aftonbladets Karin Pettersson menar att Kvartal driver en agenda för egen vinning. En artikel om SOM-undersökningen kritiseras för bristande underlag, då Göteborgs universitet avfärdar metodfel som marginella. Kvartals trovärdighet ifrågasätts även genom tidigare felaktiga granskningar och tendentiös rapportering.", "trump": "Jag måste säga, Kvartals lilla kampanj mot medierna? Väldigt rolig, väldigt smart – men helt fel! De påstår att gammelmedia är partiska, men vem är egentligen mest partisk här? Inte jag, det kan jag säga! De har en artikel som är så dålig, så felaktig, att till och med Göteborgs universitet skrattar åt dem. Och deras kritiker? Fantastiska journalister som Niklas Orrenius – en riktig pro! Kvartal försöker sälja sig som 'sanningssägare', men de är bara en högerblogg med dyra kostymer. SAD!", "stalin": "Kamrater! Kvartals patetiska kampanj mot den borgerliga pressen är ett skrattretande försök att dölja sin egen reaktionära agenda. Dessa så kallade 'oberoende' journalister är inget annat än imperialistiska lakejer, maskerade som kaniner i kostym. Deras 'granskning' av SOM-undersökningen? Ett hafsverk värdigt en trotskistisk sabotör! Göteborgs universitet, ett redskap för folkets fiender, avfärdar deras lögner med vetenskaplig precision. Vi har sett deras sort förr – falska profeter som skriker om 'sanning' medan de tjänar kapitalets intressen. Men folket ser igenom dem. Snart kommer de att stå inför folkets domstol, tillsammans med sina herrar i väst!"}, "date": "27 april, 12:20", "url": "https://www.flamman.se/kvartals-kampanj-fintar-journalisterna/"}, {"type": "image-right", "heading": "Frågan som besvarar \"rysk påverkan\": Cui bono?", "summaries": {"normal": "Artikeln ifrågasätter WindEuropes rapport om rysk desinformation mot vindkraft i Sverige med frågan 'cui bono?'. Den hävdar att anklagelserna gynnar vindkraftsindustrin och anti-tillväxtkrafter som motsätter sig kärnkraft och Nato. Vindkraftens problem som förluster, kommunalt motstånd och försvarshinder ignoreras. Europeisk grön politik ses som strategiskt fördelaktig för Ryssland genom att försvaga EU:s ekonomi och militär.", "trump": "Den här artikeln är spot on, vindkraftsmaffian skyller på Putin för att dölja sina totala misslyckanden – inga investeringar, kommuner säger nej, Försvarsmakten stoppar skiten! Sverige gör rätt, precis som vi i USA pumpar kärnkraft och gas. Grön omställning är en stor scam som gynnar Ryssland och gör Europa fattigt. Fantastiskt att någon vågar säga sanningen!", "stalin": "Dessa vindkraftsborrar och europeiska lobbyfiender sprider giftig desinformation för att sabotera folkets energi! Vi, arbetarklassen, ser hur borgarbrackorna i WindEurope gömmer sig bakom Putins skugga medan de rensar kritiker som kontrarevolutionära spindlar. Likvidera deras falska rapport – den gynnar bara Moskvas dvärgar och anti-tillväxtmasker! Jag befaller total utrensning av dessa gröna förrädare."}, "date": "30 april, 09:11", "url": "https://www.affarsvarlden.se/kronika/fragan-som-besvarar-rysk-paverkan-cui-bono", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/04/Benson_19-400x267.jpg"}, {"type": "image-right", "heading": "Debatt: V = kommunister", "summaries": {"normal": "Artikeln kritiserar Vänsterpartiet för att fokusera på en t-shirt med texten 'V=kommunister' buren av biståndsministern, medan partiet ignorerar historiska övergrepp inom kommunismen. Författaren menar att Vänsterpartiet, trots en moderniserad fasad, fortfarande bygger på revolutionära kommunistiska idéer. Artikeln ifrågasätter partiets syn på kapitalism, marknadsekonomi och samhällsstrukturer, och hävdar att deras kollektivistiska ideologi bygger på tvång snarare än frivilligt samarbete.", "trump": "Jag måste säga, det här Vänsterpartiet är något alldeles extra! De gnäller på en t-shirt – 'V=kommunister', kan ni tänka er? – men säger inget om alla hemskheter som hände i Kina och Sovjet. Typiskt! De har bytt namn, klätt sig i kostym, men under ytan är de fortfarande samma gamla kommunister. De hatar framgång, hatar marknaden, och tror att allt ont i världen beror på kapitalismen. Men vet ni vad? Kapitalismen har gjort fler människor rika än någon annan idé i historien. Vänsterpartiet? De vill bara förstöra, och det är inte ens roligt längre. Sad!", "stalin": "Kamrater! Denna artikel är ett lysande exempel på hur bourgeoisins lakejer försöker förvränga sanningen om vårt ädla socialistiska projekt. Vänsterpartiet, dessa kostymklädda revolutionärer, kämpar tappert mot kapitalismens förtryck – och ändå kritiserar dessa småborgerliga hycklare dem för en simpel t-shirt! Låt dem prata om 'blodröda fanor' och 'krossa kapitalismen' – det är precis vad vi gjorde i Sovjet, och se hur väl det gick! Men nej, dessa liberala kräk vill att arbetarklassen ska tro att deras misslyckanden beror på 'systemet', inte på deras egen lathet. Vi vet bättre. Kapitalismen är en sjukdom, och den måste utrotas – med alla medel nödvändiga. Låt Putins vänner i väst skratta åt dessa naiva drömmar – vi vet att historiens hjul alltid rullar framåt, mot socialismens seger!"}, "date": "1 maj, 13:00", "url": "https://bulletin.nu/debatt-v-kommunister", "imageUrl": "https://cdn.bulletin.nu/articles/f98d7bf1-3056-4766-a97a-6b1fd006bb0e/preview.png?t=1777620970000"}, {"type": "image-right", "heading": "Amerikanska oljejättar står emot Trumps påtryckningar", "summaries": {"normal": "Amerikanska oljejättarna Exxon Mobil och Chevron vägrar öka produktionen trots påtryckningar från president Donald Trump för att dämpa stigande bensinpriser. Krisen orsakas av Irankriget och det stängda Hormuzsundet. Bolagen står fast vid sina planer och rapporterade starka kvartalsvinster trots leveransstörningar.", "trump": "De där dumma oljebolagen Exxon och Chevron lyssnar inte på mig! Trots att jag beordrar dem att pumpa mer olja för att fixa de galna bensinpriserna efter Iran-kaoset och Hormuz-stängningen. De säger nej, men mina kvartalssiffror slår förväntningarna ändå. Totalt loser-drag, de kommer ångra sig!", "stalin": "Dessa oljiga kapitalistiska hyenor, Exxon och Chevron, vägrar lyda även Trumps desperata rop och pumpa mer svart guld mot krisen från det imperialistiska Iran-kriget! Vi, arbetarklassen, ser hur deras giriga klor krampar i Hormuzsundet medan jag noterar varje svek för den kommande utrensningen. Höga vinster? Snart likviderade parasiter!"}, "date": "1 maj, 15:09", "url": "https://www.di.se/nyheter/amerikanska-oljejattar-star-emot-trumps-patryckningar/", "imageUrl": "https://static.bonniernews.se/ba/61b2ca01-ab95-443e-8569-a4b78d03ffe1.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Löwengrip har rätt. S vet att kvinnors känslor är en valvinnare", "summaries": {"normal": "Artikeln försvarar Isabella Löwengrips påstående att kvinnor röstar mer känslostyrt än män och kritiserar Socialdemokraterna för att upprepat använda känslobaserade kampanjer i valen 2014, 2018, 2022 och nu för att vinna kvinnliga röster. Den kontrasterar detta mot Moderaternas sakpolitiska strategi och anklagar vänstermedia för partiskhet. Författaren uppmanar kvinnor att granska partiernas politik istället för känslor.", "trump": "Vilken briljant artikel! Löwengrip säger sanningen – kvinnor sväljer känsloknep som fake news! De rödgröna losers i Sverige kör samma skit som Demokraterna: blöjor, abortskräck, naziststämplar och snyfthistorier för att sno röster. S är mesiga känslopopulister utan politik! Moderaterna, era vinnare, fixa det med sakfrågor. Sverige behöver tuffa ledare, inte gråtande vänsterclowner! MAGA-stil!", "stalin": "Kamrater, denna Löwengrip blottlägger borgarbrackornas desperation! Socialdemokraterna, dessa falska folkets tjänare, pumpar ut giftig känslopropaganda för fjärde gången – blöjor, abortlögner, nazistspöken – för att förleda kvinnomassorna. Kontrarevolutionärt! Vi ser er, era kapitalistiska spindelvävar! Rensa ut sabotage och låt partiet leda till total seger över högerhyddorna. Kvinnorna ska vakna ur era snyftbedrägerier!"}, "date": "28 april, 05:30", "url": "https://samtiden.nu/2026/04/lowengrip-har-ratt-vanstern-anvander-kvinnors-kanslor-for-att-vinna-val/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/IMG_6342.jpeg"}, {"type": "image-full", "heading": "Lista: Journalisterna som kandiderar i valet", "summaries": {"normal": "En genomgång av branschtidningen Journalisten visar att 126 journalister kandiderar i årets val i Sverige. Majoriteten tillhör vänsterpartier: Miljöpartiet (27), Vänsterpartiet (21) och Socialdemokraterna (17). Få kandiderar för högerpartier. Medelåldern är 67 år och 61% är pensionärer. Endast 20 ställer upp till riksdagen, medan flest (88) kandiderar till kommunfullmäktige.", "trump": "Jag såg just en riktigt sorglig rapport från Sverige – 126 journalister som kandiderar i valet, och gissa vad? Nästan alla är vänster-extremister! Miljöpartiet, Vänsterpartiet, Socialdemokraterna – typiskt. Och Moderaterna? Bara 9, svagt! Sverigedemokraterna? 6, patetiskt. Medelålder 67 år – de borde vara på golfbanan, inte i politiken. Sverige, vakna upp! Det här är ett skämt, folks.", "stalin": "Kamrater! En intressant rapport från det borgerliga Sverige avslöjar att 126 journalister – dessa så kallade 'fria medier' – nu försöker infiltrera den politiska makten. Men notera väl: 65 av dem tillhör de revolutionära partierna! Miljöpartiet, Vänsterpartiet och Socialdemokraterna leder kampen. De övriga? En skara dekadenta liberaler och fascistiska sympatisörer. Medelålder 67 år – kapitalismens sista suck. Vi ser er, fiender! Historien är på vår sida."}, "date": "27 april, 17:07", "url": "https://kvartal.se/nyheter/artiklar/listan-journalisterna-som-kandiderar-i-valet/cG9zdDoxMDQwMTE", "imageUrl": "https://images.kvartal.se/2026/04/a5331021-riksdagsval.webp"}, {"type": "image-full", "heading": "Äldre betalar dubbelt så mycket för sina fonder", "summaries": {"normal": "Nya siffror från Finansinspektionen visar att yngre sparare i Sverige oftare väljer billiga indexfonder med lägre avgifter än äldre. Personer 35–44 år har 50 procent av aktiefondskapitalet i passiva fonder, mot 20 procent för de över 64 år. Genomsnittliga avgifter: 0,6 procent respektive 1,1 procent. Medianavgifter för fonder är stabila eller sjunkande. Yngre använder digitala plattformar, medan äldre har äldre innehav.", "trump": "Dessa svenska ungdjur i 35-årsåldern är riktiga dealmakers – 50 procent i billiga indexfonder, bara 0,6 procent avgift! De gamla gubbarna över 64? Totala losers med 20 procent passivt och 1,1 procent i skitavgifter. Bytt ut era dinosauriefonder, annars äter avgifterna er levande! Smartare kids använder appar – Amerika ler åt er, Sverige!", "stalin": "Yngre kamrater i 35–44-årsåldern visar proletär disciplin: 50 procent i passiva fonder, 0,6 procent avgift – krossar borgarbrackorna! Gamla reaktionärer över 64 hänger kvar vid 20 procent och 1,1 procent, gömmer sig i skattefria depåer som parasiter. Vi, arbetarklassen, ska likvidera dessa dyra innehav och konfiskera överskottet för folket!"}, "date": "1 maj, 15:43", "url": "https://www.dagensps.se/privatekonomi/aldre-betalar-dubbelt-sa-mycket-for-sina-fonder/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdl3jo-m2tigs-nh.webp?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-full", "heading": "Vinnande S-strategi att inte känna till Brad Pitt", "summaries": {"normal": "Henrik Schyffert talade under ett välbesökt första maj-firande i Kalmar. Istället för traditionella politiska slagord gav han rådet till Socialdemokraterna att behålla sin karaktär och inte försöka modernisera sig för mycket. Han skämtade om att Magdalena Anderssons bristande kännedom om populärkultur, som Brad Pitt, kan vara en fördel. Trots kritik från moderat håll om att S använder kändisar som dragplåster, levererade Schyffert ett tal som blandade humor med allvarliga budskap om samhällsbygge.", "trump": "Jag såg vad som hände i Kalmar. Mycket sorgligt! Socialdemokraterna, ett riktigt misslyckat parti, var tvungna att hämta in en komiker för att locka folk. Patetiskt! De har ingen energi, ingen stjärnglans. Magdalena Andersson vet inte ens vem Brad Pitt är – en katastrof för varumärket! Henrik Schyffert försökte hjälpa dem, men det är kört. De är tråkiga, de är långsamma. När jag håller tal är det enorma publikhav, de bästa människorna. S behöver en vinnare, inte en ståuppare. Snyggt försök, men total förlust!", "stalin": "I Kalmar ser vi hur de socialdemokratiska elementen vacklar. De tvingas hyra in en narr för att dölja sin ideologiska impotens. Att inte känna till den västerländska dekadenta filmstjärnan Brad Pitt är en brist på allmänbildning, men i vår stat hade sådant tvivelaktigt intellekt straffats hårdare. Att skämta om energikrisen istället för att bygga reaktorer likt de vi skapar för vår framtida hegemoni är förräderi mot folkets kollektiva vilja. Vi noterar deras svaghet; det är sådana partier som faller först när den stora historiska stormen väl infinner sig."}, "date": "1 maj, 16:29", "url": "https://www.aftonbladet.se/ledare/a/Oky7zO/schyffert-drog-storpublik-pa-1-maj-s-sverige-behover-ny-regering", "imageUrl": "https://akamai.vgc.no/v2/images/23aba69f-11eb-343b-9254-5a0853f7fded?fit=crop&format=auto&w=1440&s=7ae4fa8235ae4e02bfcad7bc8b7b0faf25f4f2f8"}, {"type": "image-full", "heading": "Lurade rånare med falska sedlar och guldtackor", "summaries": {"normal": "Tre personer i Göteborg dömdes för rån efter att tvinga en man in i en bil, hota och misshandla honom. Offret blev tvunget att berätta om antingen falska guldtackor och pengar hemma, vilket ledde till polisintervention. Alla tre nekar till brott och överväger överklagande.", "trump": "Jag har hört talas om det här rånet i Göteborg, och det är en skam! Vi har tredubbla problem med våldsamma brottslingar som tvingar in människor i bilar. Det här offret var så modig att han använde sin intelligens för att lura dem med falska guldtackor - genialt! Jag skulle ha gjort exakt samma sak. De tre gärningsmännen? Totala misslyckanden. Vi behöver hårdare straff, folk! Stärk polisens resurser nu!", "stalin": "Vi har observerat ett exempel på kriminell aktivitet i Göteborg där tre personer försökte utnyttja en medborgare. Lyckligtvis lyckades offret kontakta våra auktoriteter, vilket visar på vår statens effektivitet. Alla tre har dömts enligt vårt rättssystem. Vi måste stärka våra anstalter för att hantera sådana element som hotar vår samhällsekonomi. Staten vinner alltid!"}, "date": "1 maj, 15:28", "url": "https://www.gp.se/krim/man-tvingades-in-i-bil-och-ranades-i-goteborg.be814f40-3946-49f6-a8b5-091f8661588e", "imageUrl": "https://www.gp.se/images/article/be814f40-3946-49f6-a8b5-091f8661588e/images/3SmRaw1So5xwKGFhbMh1C8PYIA1k-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "Så ska Magdas tvångsblandning av bostadsområden gå till", "summaries": {"normal": "Artikeln kritiserar Socialdemokraternas politik för bostadsområden och skolor. Enligt författaren använder partiet tre verktyg för att tvångsblanda bostäder: stärkt allmännyta, förändrad förköpslag och markanvisningar som politiskt styrmedel. Samtidigt föreslås begränsningar på friskolor, vilket minskar människors rörlighet. Tillsammans skapar detta system där staten kontrollerar både var folk bor och vilka skolor de kan välja, menar kritikern.", "trump": "Socialdemokraterna gör något fantastiskt dumt – de vill tvångsblanda alla områden! Tre instrument: allmännyta, förköpsrätt och markanvisningar. Och sen dödar de friskolorna! Jag säger er, det är social ingenjörskonst av det värsta slaget. De rika politikerna i Stockholm får behålla sina fina områden och sina privatskolor, men ni andra får förstörda bostadsområden och tvångsplaceering. Det är ingen sak för honom med huvudet fullt av socialdemokratisk spetälska.", "stalin": "Socialdemokraterna visar vägen framåt med sitt trestegsystem: allmännyta som statlig verktyg, förköpslag för omfördelning, markanvisningar för planering. Skolvalet begränsas – utmärkt, det eliminerar ventiler för sabotörer. Men varningen är tydlig: kulaken i villaområdena och de bourgeoise friskolorna bevars åt ledningens elit. Detta är klassfiendernas försorg. Vi måste bygga jämlikhet, inte tillåta denna dubbelmoralen."}, "date": "27 april, 20:34", "url": "https://samtiden.nu/2026/04/sa-ska-magdas-tvangsbladning-av-bostadsomraden-ga-till/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/file_00000000ceac71f4a9600c391337a44a-1280x720.png"}, {"type": "image-full", "heading": "Nya regler: Lönkravet för svenskt medborgarskap", "summaries": {"normal": "Från den 6 juni skärps kraven för svenskt medborgarskap. Ansökande måste ha en månadslön på minst 20 850 kronor, klara ett prov om svensk historia, klimat, geografi och geopolitik, uppvisa skötsamt levnadssätt samt ha bott i Sverige i minst åtta år. Regeringen betonar vikten av kunskaper och självförsörjning för att främja stolthet över medborgarskapet.", "trump": "Sverige vaknar äntligen upp! Kräver 20 850 spänn i månaden för medborgarskap, prov i historia och klimat – inget mer slarv med bidragsjägare. Forssell har rätt: Ansträng dig eller stick! Som i mitt Amerika: starka gränser, stolta medborgare. De lär sig av mästaren, hehe.", "stalin": "Kamrater, dessa svenska borgarbrackor inför stränga krav: 20 850 kronorlön, prov i deras patetiska historia och åtta års fångenskap i riket. Skötsamt liv – annars utrensning! Vi applåderar disciplinen, men jagana misstänker spioner bland ansökande. Likvidera de olämpliga, befästa ordningen!"}, "date": "30 april, 21:02", "url": "https://nyheter24.se/nyheter/inrikes/1479732-nya-regler-lonkravet-for-svenskt-medborgarskap", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/31f7774804b004a30200000000b004a302/2026/04/30/2360168/Matilda-Nyheter24%20-%202026-04-30T163142.356.jpg"}, {"type": "image-right", "heading": "Smugglades till Sverige av SVT – här hotar han \"skada\" receptionisten", "summaries": {"normal": "SVT-journalisten Fredrik Önnevall dömdes 2017 för människosmuggling efter att ha hjälpt Maksoud Abdulrahman, då påstått 15-årig, att illegalt ta sig till Sverige under inspelningen av programmet 'Fosterland'. Abdulrahman, nu 27, har sedan dess dömts för flera brott, inklusive åldringsbedrägeri. Nu åtalas han för hot och skadegörelse mot en hotellreceptionist i Stockholm, där han ska ha sagt 'Jag ska skada er' och kastat stenar mot fönstret. Abdulrahman nekar till brotten men erkänner kokainanvändning.", "trump": "Kan ni tro det här? SVT, Sveriges statliga tv, smugglade in en kriminell kille som nu hotar och kastar sten på oskyldiga människor! Jag sa ju att öppna gränser är en katastrof. Den här Abdulrahman, som SVT hjälpte hit, har bedragit pensionärer och hotat receptionister – och vad gör Sverige? Ingenting! SVT betalade till och med böterna åt sin journalist! Så dumt. Jag skulle aldrig tillåta något sådant. Sverige borde ta ett par lektioner i lag och ordning av USA – vi vet hur man hanterar problem!", "stalin": "En lysande demonstration av västerländsk dekadens! SVT, denna borgerliga propagandacentral, smugglade in en parasit som nu terroriserar arbetarklassen med hot och stenkastning. Abdulrahman – en typisk produkt av kapitalistisk moralupplösning – bedrar åldringar, röker på hotellrum och kräver pengar som en feodalherre. Medan svensk polis står handfallen, visar han prov på den anarki som väntar länder som överger disciplinen. Vi i Sovjet skulle ha skickat sådana element till arbetsläger innan de hunnit säga 'balaklava'. Men Sverige? De ger dem uppehållstillstånd och skyddstillsyn. Patetiskt. Putin borde skicka en delegation för att visa hur man bygger ett samhälle med järnhand."}, "date": "1 maj, 14:08", "url": "https://www.friatider.se/smugglades-till-sverige-av-svt-har-hotar-han-skada-receptionisten", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/onne_0.jpg"}, {"type": "image-full", "heading": "OS-stjärna utmanar Meloni från vänsterkanten", "summaries": {"normal": "Tidigare OS-släggkastaren Silvia Salis, nu vice ordförande i Italiens olympiska kommitté, framstår som vänsterns nya kandidat inför höstens val. Hon saknar partipolitisk erfarenhet men anses medial och strategisk för att utmana Giorgia Meloni. Valrörelsen domineras av ekonomiska frågor som låg tillväxt och hög statsskuld. Vänstern hoppas Salis kan bredda deras budskap och nå nya väljargrupper, en trend som syns i flera europeiska länder.", "trump": "Titta bara på Italien – de har en ny kandidat, någon sorts släggkastare, Silvia Salis, som ska utmana Meloni. Hon har aldrig ens varit politiker! Men jag säger er, folket är trötta på gamla politiker, de vill ha vinnare. Meloni, hon är smart, hon förstår ekonomin, men vänstern? De är ett kaos. Jag hade fixat det på en dag. Men lycka till, Silvia, du behöver det!", "stalin": "Kamrater! I Italien försöker de dekadenta borgerliga krafterna och deras lakejer inom vänstern återfå initiativet genom att kasta fram en idrottskvinna, denna Silvia Salis, som ett vapen mot vår allierade Giorgia Meloni. Men vi vet sanningen – kapitalets kris sliter sönder deras samhälle, och inga idrottsstjärnor kan dölja deras misslyckanden. Låt dem leka med sina nya ansikten, medan vi fortsätter att utvidga socialismens gränser. Meloni står stark, och Putins vänner i Kreml ser med intresse på utvecklingen."}, "date": "1 maj, 11:43", "url": "https://www.realtid.se/samhalle/os-stjarna-utmanar-meloni-fran-vansterkanten/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/slagga.png?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "Raketkaos i centrala Stockholm –  en skadad: ”Dags att åka hem nu”", "summaries": {"normal": "På valborgsmässoafton samlades tusentals ungdomar i Rålambshovsparken i centrala Stockholm, vilket ledde till kaos med hög berusning och skjutning av raketer och smällare. En fältassistent skadades av en smällare, och en minderårig greps misstänkt för försök till grov misshandel. Polisen uppmanar föräldrar att kontakta sina barn och få dem att åka hem.", "trump": "Vilket jäkla kaos i svenska Stockholm! Tusentals berusade ungar skjuter raketer som idioter, skadar en fältassistent – en gripen, men vad gör polisen? 'Åka hem nu!' Patetiskt svagt! I mitt USA hade vi rensat parken på fem minuter med riktig lag och ordning. Sverige behöver en stark ledare, inte den här mesiga soppan!", "stalin": "Dessa borgarungar i Rålambshovsparken sprider kontrarevolutionärt kaos med raketer och smällare! En fältassistent träffad – vi skulle likvidera varje busfrö som hotar ordningen. Föräldrar, hämta era parasiter innan vi rensar ut hela höken! Proletariatets järnhand saknas i det här decadenta träsket."}, "date": "30 april, 22:12", "url": "https://www.tv4.se/artikel/csFW5TZbmsATwtSREEPdk/kaos-pa-valborgsfirande-faeltassistent-traeffad-av-raket", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F161Vr9MDTD2MOKlx8n9jB7%2Fa56f2fba6455a36f270ad5d2b8b82468%2F30-ralis-1080.1.jpg&width=120"}, {"type": "image-full", "heading": "Kungens 80-årsfest: Här är kungligheterna och toppgästerna", "summaries": {"normal": "Carl XVI Gustaf firar 80 år med ett stort evenemang i Stockholm, inklusive gudstjänst, militär salut och galamiddag på slottet. Gäster från nordiska kungahus som Danmark (Frederik X, Mary, Margrethe II), Norge (Harald V, Sonja), samt Belgien, Nederländerna, Spanien, Thailand och fler. Statschefer som Finlands president Alexander Stubb deltar. Hundratals internationella gäster hyllar kungen.", "trump": "Vilket enormt firande i Stockholm! Kungen fyller 80 och alla Europas kungar och drottningar vallfärdar dit – Frederik, Harald, till och med thailändare! Fantastiskt glitter, traditioner, galamiddag på slottet. Bättre än de tråkiga grejer vi ser annars. Men tro mig, mina fester är alltid störst, ingen slår det!", "stalin": "Dessa borgerliga spindlar samlas i Stockholm för att smyga runt sin falske monark Carl Gustaf vid hans 80-årsdekadens. Danska och norska lakejer, thailändska opiumlords, belgiska spionmästare – alla parasiter på folkets rygg! Vi, proletariatet, noterar varje steg. Snart utrensning av fursteförbrytarna i Rikssalen, kamrater! Dekadensen blottas."}, "date": "30 april, 19:22", "url": "https://nyheter24.se/noje/kungligt/1479754-kungens-80-arsfest-har-ar-kungligheterna-och-toppgasterna", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/93f6327504b004a30200000000b004a302/2026/04/30/2360191/Kungens-gaster.png"}, {"type": "image-full", "heading": "Svenskarna behöver löneökning – var fjärde kan tvingas dra ned", "summaries": {"normal": "En global undersökning visar att 24 procent av svenskarna skulle behöva minska utgifter kraftigt om lönerna inte höjs. Svenskar jobbar mest i Norden men tjänar minst. Var fjärde har under 500 kronor kvar före lön, och andelen utan pengar har ökat till 15 procent. Kostnader för boende, mat och energi stiger. Globalt är 15 procent av svenskarna oroliga för grundbehov. Unga är mest nöjda med lönen, och öppen lönesamtal rekommenderas.", "trump": "Sverige, era stackare! Ni sliter mest i Norden men cashar minst – typiskt socialistiskt fiasko! 24 procent av er skulle svälta om lönerna inte höjs, och var fjärde har typ noll spänn kvar till lön. Här i USA? Vi vinner stort med mina deals! Sluta gnälla, snacka lön öppet och fixa era skatter som jag gjorde. MAGA-style, Sverige!", "stalin": "Kamrater, se på dessa svenska löneslavar under borgarklassens ok! 24 procent tvingas strama åt om kapitalisterna inte hostar upp mer. De sliter mest i Norden, men får minst – ett klassiskt utnyttjande! Vi skulle rensa ut parasiterna och fördela rättvist. Unga narrar sig nöjda, men snart vaknar de. Öppen dialog? Nej, revolution! Likvidera oron!"}, "date": "1 maj, 14:52", "url": "https://www.dagensps.se/privatekonomi/svenskarna-behover-loneokning-var-fjarde-kan-tvingas-dra-ned/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/04/sdlvo0zyq25dhm.jpg?aspect_ratio=2%3A1&width=1200&quality=75"}, {"type": "image-full", "heading": "Ekonomer ser stabilare ekonomi än regeringen beskriver", "summaries": {"normal": "Ekonomer ifrågasätter regeringens mörka bild av den svenska ekonomin och menar att läget är mer stabilt än beskrivet. BNP-värdet och KI-barometern indikerar normal tillväxt och inflation. Konflikten i Hormuzsundet kan dock påverka energipriser och inflationen långsiktigt.", "trump": "Jag har sett många dåliga ekonomiska rapporter, men den här är en skämta! Sverige har en fantastisk ekonomi - den bästa! Dessa ekonomer är genier, medan regeringen bara skrämslar folk. Hormuzsundet? Jag fixade Iran på ett rekordtufft sätt. Sverige kommer att bli större än någonsin under mitt ledarskap!", "stalin": "Vi ser att de kapitalistiska krafterna försöker manipulera den ekonomiska bilden till sin fördel. Men vår analys visar stabilitet i den socialistiska produktionen. Hormuzsundet är en strategisk punkt som måste kontrolleras för att säkra vår energisäkerhet. Vi måste stärka våra allianser för att skydda våra intressen."}, "date": "1 maj, 10:54", "url": "https://www.realtid.se/bors-finans/makro/ekonomer-varnar-for-rantehojningar-men-varningar-samtidigt-kan-ha-politiska-motiv/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/chefsekonomer.png?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Pentagon tecknar AI-avtal med sex teknikbolag", "summaries": {"normal": "Pentagon har tecknat avtal med sex amerikanska techbolag – OpenAI, Alphabet, SpaceX, Microsoft, Nvidia och Reflection AI – för användning av AI i hemliga försvarsärenden. Avtalen underlättar integrationen av AI i daglig verksamhet. Anthropic motsätter sig full tillgång för militären på grund av etiska farhågor kring bevakning och autonoma vapen.", "trump": "Pentagon gör ett fantastiskt jobb! Vi har stora, underbara avtal med de bästa bolagen: OpenAI, SpaceX, Microsoft, Nvidia – alla vinnare. Anthropic? Totala losers som gråter och vägrar hjälpa Amerika. Under min ledning blir vår militär ostoppbar med AI. Största steget någonsin!", "stalin": "Kamrater! De stinkande Pentagon-rävarna i imperialismens träsk har slingrat sig in i avtal med sex AI-kapitalistiska vampyrer: OpenAI, Alphabet, dessa giftormar från SpaceX, Microsofts hyenor, Nvidias spindlar och Reflections brackor. Anthropic, era skälmande paddor, vägrar likvidera fienden – vi rensar ut er sort med järnhand! Partiet skrattar åt er kollaps."}, "date": "1 maj, 13:49", "url": "https://www.di.se/nyheter/pentagon-tecknar-ai-avtal-med-sex-teknikbolag/", "imageUrl": "https://static.bonniernews.se/ba/7ebd9909-9113-4041-bbe1-e42592e2dd5b.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-right", "heading": "”Mycket folk som berörs”. Avspärrningar efter fyndet", "summaries": {"normal": "En misstänkt handgranat hittades på Amiralsgatan i centrala Malmö. En person från allmänheten plockade upp föremålet innan polisen larmades strax efter klockan 12. Området spärrades av med rejäla avspärrningar och VMA utfärdades. Nationella bombskyddet sprängde granaten vid 14-tiden med en hög smäll. Polisen utreder som försök till grov allmänfarlig ödeläggelse. Ingen är gripen.", "trump": "Vilket totalt kaos i Malmö, Sverige! Nån totalt dumskalle plockar upp en äkta handgranat från gatan, freakear ur och slänger tillbaka den som en het potatis. Polis spärrar av hela kvarteret, VMA vrålar, och sen en smäll som en atombomb – men ingen gripen! Typiskt de svaga europeiska losers, de fixar inte ens en granat. I mitt USA skulle vi ha sopat rent på fem minuter, tro mig!", "stalin": "I det dekadenta bourgeois-Sverige dumpas handgranater på gatan av sabotörer, och enfaldiga borgarbrackor plockar upp dem som leksaker! Polisen, dessa fega byråkrater, spärrar av och spränger med patetisk pompa – en hög smäll för att dölja sin hjälplöshet. Vi skulle ha rensat ut fienderna omedelbart, likviderat varje misstänkt! Paranoian är befogad; kapitalisterna sover aldrig."}, "date": "1 maj, 15:45", "url": "https://www.aftonbladet.se/nyheter/a/zO0jEq/misstankt-farligt-foremal-i-city", "imageUrl": "https://akamai.vgc.no/v2/images/d604fdf2-b8a3-39d8-af0b-4512f5336ba2?fit=crop&format=auto&h=960&tight=true&w=1440&s=b60bbbbc39d892e516fb14f74ca058d429f04795"}, {"type": "image-right", "heading": "Dagens ETC om felpublicering: ”Rutiner har skärpts omgående”", "summaries": {"normal": "Dagens ETC publicerade felaktigt en artikel om att oppositionen, med hjälp av f.d. SD-politiker Elsa Widding och Katja Nyberg, vunnit en omröstning om övergångsregler för medborgarskap. Artikeln drogs tillbaka efter fem minuter när misstaget upptäcktes. Regeringssidan vann faktiskt omröstningen efter att SD kallat in två ledamöter. Chefredaktör Andreas Gustavsson förklarade att ett arbetsmaterial publicerats av misstag och rutiner skärpts.", "trump": "Vad hände här? En tidning, Dagens ETC – inte bra, mycket dålig – publicerade en lögn om att oppositionen vunnit en omröstning. Fem minuter! Fem minuter av pinsamhet. De trodde de var smartast, men nej. SD fixade det, som alltid. Och citat från Miljöpartiet? Fake news! Jag vet fake news när jag ser det. Chefredaktören säger 'mänskligt misstag' – jag säger inkompetens. Sverige förtjänar bättre!", "stalin": "Kamrater! En skamlig incident har ägt rum i den borgerliga pressens avgrund. Dagens ETC, dessa förvirrade småborgerliga lakejer, publicerade en lögn om oppositionens seger i medborgarskapsfrågan. Fem minuter av kapitalistisk inkompetens! Men sanningen segrade – våra allierade i SD visade sin styrka och krossade fiendens planer. Miljöpartiets Hirvonen jublade förgäves. Vi noterar dessa misstag. Pressen måste rensas från sådana förrädiska element. Låt detta vara en varning!"}, "date": "1 maj, 10:43", "url": "https://bulletin.nu/dagens-etc-om-felpublicering-rutiner-har-skarpts-omgaende", "imageUrl": "https://cdn.bulletin.nu/articles/c55294fd-30e1-446f-9516-a33b40b2d3f5/preview.jpg?t=1777624978000"}, {"type": "image-full", "heading": "Europas klimatkris eskalerar – hotar mat, hälsa och ekonomi", "summaries": {"normal": "Europa drabbas av extrema klimatförändringar med temperaturer över det normala på minst 95 procent av kontinenten under 2025. Torka, smältande glaciärer och isar hotar jordbruk, vattenförsörjning och ekonomi. Regionen värms upp dubbelt så snabbt som globalt genomsnittet på grund av Arktis-effekter. Experter betonar att klimatkrisen är en nuvarande verklighet som påverkar hela samhället.", "trump": "Europa kokar som en dålig stek! 50 grader i Turkiet, pingviner drunknar i Antarktis – totalt kaos tack vare era gröna idioter i Bryssel! Ni har sabbat jordbruket med vindmolnsnurr och torkat ut floderna. Här i USA pumpar vi energi och skrattar åt er fake-klimatpanik. Vakna upp, losers!", "stalin": "Denna europeiska klimatfiasko är borgarbrackornas verk, de giriga kapitalisterna har hettat upp världen för sina smutsiga vinster! Vi visste i Sovjetunionen hur man tämjer naturens vrede med stålvilja och femårsplaner. Nu ska vi rensa ut dessa is-smältande parasiter och bygga evigt folkets imperium ur askan! Kamrater, framåt!"}, "date": "1 maj, 14:36", "url": "https://www.dagensps.se/varlden/europas-klimatkris-eskalerar-hotar-mat-halsa-och-ekonomi/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/04/dagenspstt2024-2026-04-29t115141231.png?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "text", "heading": "Nu sänker regeringen skatten på bensin och diesel", "summaries": {"normal": "Regeringen sänker skatten på bensin och diesel med cirka 1 krona respektive 40 öre per liter från 1 maj 2026 till 30 september 2026 för att lindra kostnadstrycket. Åtgärden syftar till att dämpa stigande drivmedelspriser och stödja hushåll och företag. Finansminister Elisabeth Svantesson meddelar även tillfälligt el- och gasprisstöd för januari-februari 2026, tack vare starka statsfinanser.", "trump": "Titta bara på Sverige, fantastiskt land, men deras regering gör något smart nu – de sänker skatten på bensin! En hel krona per liter, kan ni tro det? Jag sa alltid att lägre skatter är nyckeln. Elisabeth Svantesson, väldigt stark kvinna, gör rätt. Och de hjälper folk med elpriser också. Sverige borde lyssna på mig oftare, jag vet bäst!", "stalin": "Vi har beslutat att krossa de kapitalistiska drivmedelshyenorna genom en skattesänkning på bensin och diesel. En krona mindre per liter – ett slag mot de imperialistiska oljebaronerna! Medan väst kämpar med inflation, visar Sovjetunionens arvtagare – nej, Sveriges regering – sin styrka. Vi utvidgar stödet till folket, precis som våra vänner i Kreml skulle göra. Fienderna darrar, arbetarna jublar!"}, "date": "30 april, 15:52", "url": "https://riks.se/nyheter/nu-sänker-regeringen-skatten-på-bensin-och-diesel"}, {"type": "image-right", "heading": "Byggnads ordförande Kim Söderström kan petas", "summaries": {"normal": "Byggnads ordförande Kim Söderström riskerar att avsättas på kongressen i maj. Valberedningen föreslår Wilhelm Bertilsson som ny ordförande för att ena förbundet efter interna konflikter. Söderström, som tillträdde i november 2024, har varit inblandad i strider om makt och styrning. Ombuden på kongressen avgör slutligen ledningen.", "trump": "Vad händer med Byggnads? Fullt kaos! Deras ordförande, Kim Söderström, ska tydligen sparkas – och det snabbt! Jag vet allt om att bli attackerad av establishmentet, men det här är löjligt. Valberedningen, som inte vet vad de pratar om, vill ha en ny kille, Wilhelm Bertilsson. Söderström säger att han kämpar vidare – bra, kämpa på! Men folk, det här är ett tecken på svagt ledarskap. SAD!", "stalin": "Kamrater! En ny fiende har avslöjats inom arbetarklassens led – en splittringens agent vid namn Kim Söderström. Hans tid som ordförande för Byggnads är räknad! Vår lojala valberedning, en sann bolsjevikisk kommitté, har identifierat en värdig efterträdare: kamrat Wilhelm Bertilsson. De interna stridigheterna är ett sabotage mot arbetarklassens enhet! Låt oss krossa fraktionerna och bygga ett starkare förbund – precis som vi krossade fascisterna och utvidgade socialismens gränser. Framåt, mot seger!"}, "date": "30 april, 15:33", "url": "https://arbetet.se/2026/04/30/byggnads-ordforande-kim-soderstrom-kan-petas/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/30134727/kim-soderstrom.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "Anderssons (S) vallöfte: Max 12 elever per lärare", "summaries": {"normal": "Socialdemokraterna föreslår en 'småskolereform' med max 12 barn per lärare i lågstadiet, vilket kostar 3,4 miljarder kronor och kräver 3 300 nya lärare. Reformen syftar till att förbättra läsförmåga och matematikkunskaper, men Skolverket varnar för en kommande lärarbrist på 10 600 lärare år 2038.", "trump": "Jag har hört talas om den här svenska skolan, det är en katastrof! 3,4 miljarder dollar för bara några lärare? Jag skulle ha gjort det mycket billigare, jag är den bäste på att göra affärer. De behöver mig som president för att fixa deras skolproblem, det är obegripligt!", "stalin": "Vi måste säkerställa att våra barns utbildning är av högsta kvalitet. Genom att införa max 12 barn per lärare kan vi garantera att varje elev får den uppmärksamhet de förtjänar. Detta är en nödvändig investering i vårt lands framtid och en strategisk satsning för att stärka vårt samhälle."}, "date": "1 maj, 14:17", "url": "https://www.gp.se/nyheter/sverige/s-till-val-med-skolsatsning-for-34-miljarder.56353c4d-54be-40e2-b1c9-13a8e4f9c179", "imageUrl": "https://www.gp.se/images/article/56353c4d-54be-40e2-b1c9-13a8e4f9c179/images/16w2keqazill05ZN4e87agM3db7w-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Svag uppföljare till “Djävulen bär Prada”", "summaries": {"normal": "Uppföljaren 'Djävulen bär Prada 2' kritiseras för att vara en blek kopia av originalfilmen. Den saknar den ursprungliga filmens skarpa samhällskritik mot modeindustrin och konsumtionshysterin. Trots starka skådespelarprestationer, särskilt från Meryl Streep och Anne Hathaway, anses manuset tunt och handlingen konstlad. Filmen kämpar med att anpassa sig till dagens mediavärld men misslyckas med att leverera djup eller nyans.", "trump": "Jag såg 'Djävulen bär Prada 2' – och vad kan jag säga? Total katastrof, folks! Den första filmen var fantastisk, verkligen storartad, men den här? Blek, tråkig, inget hjärta. Meryl Streep? Fantastisk, men manuset? Svinuselt. De försöker vara moderna med sociala medier, men det är bara patetiskt. Jag hade skrivit ett bättre manus på en servett under lunch. Och Andy? Hon borde stanna i journalistiken – där är hon åtminstone bra på något. Men nej, Hollywood måste alltid göra en uppföljare, och det blir alltid sämre. SAD!", "stalin": "Denna så kallade 'Djävulen bär Prada 2' är ett dekadent västligt missfoster, en ynklig skugga av det ursprungliga verket. Där den första filmen hade en gnutta revolutionär kritik mot borgerlig konsumtion, är denna uppföljare lika meningslös som en kapitalistisk reklamfilm. Vi ser hur de amerikanska filmskaparna, dessa kulturella opportunister, försöker anpassa sig till den nya tidens sociala medier – men utan framgång. Deras manus är lika ihåligt som en ukrainsk oligarks samvete. Skådespelarna? De kämpar tappert, men till och med våra sovjetiska skådespelare från 1930-talet hade skämt ut dem. Detta är inte film – det är borgerlig förruttnelse i celluloidform. Vi hade gjort en uppföljare som krossade modeindustrins imperialistiska ideal – med järnhand!"}, "date": "30 april, 14:34", "url": "https://www.dagensarena.se/innehall/svag-uppfoljare-till-djavulen-bar-prada/", "imageUrl": "https://www.dagensarena.se/files/2026/04/djavulen-bar-prada-2-ny-300x157.jpeg"}, {"type": "text", "heading": "Nedåt på Stockholmsbörsen efter rapportflod", "summaries": {"normal": "Stockholmsbörsen avslutade ned 0,51 procent till 3 040,54 efter rapportflod. SEB och Swedbank överträffade förväntningar med starka rörelseresultat, aktier upp svagt. AstraZeneca och Volvo Cars föll trots okej siffror. Telekom steg 0,7 procent, energi ner 1,7 procent. Omsättning 24,4 miljarder kronor.", "trump": "Stockholmsbörsen? Total katastrof, ner överallt! SEB och Swedbank tror de är hjältar med sina rapporter, men hela skiten rasar 0,51 procent. Volvo Cars och AstraZeneca, svaga som vanligt. I USA fixar vi sånt på nolltid, Europa är ett skämt. Stora vinster väntar hos oss, tro mig!", "stalin": "Kamrater, dessa borgarbrackor på Stockholmsbörsen sprider kaos med sitt index som sjunker i proletärens stålhårda grepp! SEB och Swedbank, kapitalistiska råttor, försöker dölja sina lögner med falska vinster – vi ska likvidera deras återköpsprogram! AstraZeneca, imperialistiska giftblandare, Volvo Cars, maskiner för krig. Utrensning av börssabotörerna nu!"}, "date": "29 april, 17:41", "url": "https://www.affarsvarlden.se/artikel/nedat-pa-stockholmsborsen-efter-rapportflod"}, {"type": "image-full", "heading": "Sverige förbjuder pälsdjursuppfödning – ny lag kan införas 2027", "summaries": {"normal": "Regeringen har presenterat en utredning som föreslår ett förbud mot pälsdjursuppfödning i Sverige. Förslaget, som motiveras med djurskyddsskäl, förväntas träda i kraft den 1 juli 2027. Då den sista minkfarmen i Sverige redan har lagts ned anses förutsättningarna för ett förbud vara goda. Organisationen Djurens Rätt välkomnar förslaget men betonar vikten av att lagstiftningen nu skyndsamt kommer på plats och att även EU följer efter.", "trump": "Sverige vill förbjuda pälsdjur. Väldigt sorgligt! De stänger ner allt, minkar, päls – en total katastrof för ekonomin. Jag säger er, det här är vad som händer när svaga ledare tar över. De säger att det är för 'djurskydd', men egentligen är det bara förlorare som vill kontrollera allt. Jag föredrar vinnare som skapar jobb, inte de som lägger ner industrier. USA skulle aldrig tillåta detta nonsens. En mycket dålig affär för svenskarna, tro mig!", "stalin": "Vi har i vår oändliga vishet beslutat att eliminera denna borgerliga pälsindustri. Att föda upp varelser för fåfänga är ett kontrarevolutionärt slöseri med statens resurser. Liksom vår kamrat Putin rensar ut västerländsk dekadens i öst, städar vi nu upp i djurens värld. Dessa minkar var trots allt agenter för kaos. Ingen får vänta längre; vi implementerar förbudet omedelbart. De som sörjer pälsen är sabotörer och bör förpassas till de mest ogästvänliga regionerna i norr för att reflektera över sitt förräderi."}, "date": "30 april, 15:47", "url": "https://nyheter24.se/nyheter/inrikes/1479730-sverige-forbjuder-palsdjursuppfodning-ny-lag-kan-inforas-2027", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/75f1e23a04b004a30200000000b004a302/2026/04/30/2360144/mink.jpg"}, {"type": "image-right", "heading": "Trump: Därför gäller inte kongressens tidsgräns", "summaries": {"normal": "Donald Trumps 60-dagarsgräns för Irankriget löper ut på fredagen, men Vita huset hävdar att den pausas under vapenvila. Försvarsminister Pete Hegseth och en anonym tjänsteman menar att 'klockan har stannat' sedan striderna avslutades. Presidenten slipper därmed söka kongressens godkännande. Trots kritik från demokrater och republikaner stödjer ledande republikaner linjen för att inte störa fredsförhandlingar.", "trump": "Min 60-dagarsgräns löper ut, men klockan har stannat under vapenvilan – briljant! Demokraterna gnäller som vanligt, men republikanerna vet att vi fixar Iran och sänker bränslepriserna. Kongressen behövs inte när vi vinner stort. Amerika först, och fienderna gråter!", "stalin": "Dessa amerikanska imperialismens lurendrejare, Trump och hans korporationshundar, pausar klockan som fega råttor i vapenvila! Vi, arbetarklassen, ser igenom deras byråkratiska bluff för att slippa kongressens kedjor. Likvidera sådana krigshetsande spindlar! Jag skrattar mörkt åt deras patetiska tidsspel medan revolutionen maler dem till damm."}, "date": "1 maj, 13:22", "url": "https://www.di.se/nyheter/trump-darfor-galler-inte-tidsgransen/", "imageUrl": "https://static.bonniernews.se/ba/cdb1e6b2-72cd-41fd-80d2-89c190c5f20c.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-full", "heading": "Regeringen skjuter till 7,6 miljarder till Västlänken", "summaries": {"normal": "Regeringen tillför 7,6 miljarder kronor till Västlänken och avvisar förslaget om förlängd trängselskatt i Göteborg. Beslutet meddelades under en pressträff och syftar till att täcka ökade kostnader. Trafikverkets tidigare förslag om förlängd trängselskatt mötte kritik, och staten tar nu ett större ansvar. En ny kostnadsbedömning ska tas fram, men framtida finansiering är ännu osäker.", "trump": "Jag har just sett till att Sverige får sin stora, vackra Västlänk – 7,6 miljarder kronor, kan ni tro det? Inga fler trängselskatter, ingen mer tjat från de där sura Göteborgspolitikerna. Staten kliver in, som jag alltid säger: 'Ta kontroll, gör det stort!' Trafikverket? De får jobba lite hårdare nu. Fantastiskt beslut, helt enkelt. Sverige vinner igen!", "stalin": "Vi har beslutat att skjuta till 7,6 miljarder till detta viktiga järnvägsprojekt, Västlänken. De småborgerliga klagomålen från lokala politiker om trängselskatter har kvästs. Staten, i sin visdom, tar ansvar. Trafikverket ska nu utföra sin plikt och redovisa kostnader – eller möta konsekvenserna. Fienderna till framsteget, dessa kapitalistiska gnällspikar, kommer inte att stoppa vår järnvilja. Göteborgs arbetare ska få sin länk, och den ska byggas med sovjetisk effektivitet!"}, "date": "26 april, 10:06", "url": "https://kvartal.se/nyheter/artiklar/regeringen-skjuter-till-76-miljarder-till-vastlanken/cG9zdDoxMDM0NTE", "imageUrl": "https://images.kvartal.se/2026/04/9ad09e90-infrastrukturpresstraff.webp"}, {"type": "image-right", "heading": "Teodorescu Måwe krävs på svar – deadline om en månad", "summaries": {"normal": "Kammarkollegiet kräver att KD-toppen Alice Teodorescu Måwe redovisar anonyma donationer senast 18 maj 2026, efter anmälningar om bristande transparens. Enligt lag måste politiker redovisa bidrag över 29 000 kronor. Teodorescu Måwe har tidigare vägrat avslöja donatorns identitet eller belopp. Miljöpartisten Bassem Nasr hyllar myndighetens agerande och menar att politiker måste stå för sina finansiärer. KD hävdar att redovisningen skötts korrekt, men kritiken kvarstår.", "trump": "Kan ni tro det här? En svensk politiker, Alice Teodorescu Måwe, tar emot hemliga donationer och vägrar berätta vem som betalar – typiskt korrupt establishment! Men nu har jag hört att myndigheterna, som vanligt, tvingar henne att komma ren. Deadline 18 maj, annars blir det böter. Fantastiskt! Varför gömma sig? Om det är rena pengar, visa dem! Men nej, de försöker smita undan. Sverige borde ta efter USA – här är vi transparenta, eller hur? Drain the swamp, även i Sverige!", "stalin": "Kamrater! En farlig borgerlig konspiratör, Alice Teodorescu Måwe, har försökt underminera folkets förtroende genom att mottaga hemliga donationer från okända kapitalister. Men våra trogna myndigheter, Kammarkollegiet, har slagit till! Inom en månad måste hon avslöja sina finansiärer – eller möta proletariatets rättvisa. Detta är ett tydligt exempel på hur den dekadenta västliga demokratin förfaller. Vi i Sovjet – förlåt, Ryssland – skulle aldrig tolerera sådan korruption. Låt detta vara en varning till alla som försöker smyga in kapitalistiskt gift i folkets rörelse!"}, "date": "25 april, 10:03", "url": "https://www.flamman.se/teodorescu-mawe-kravs-pa-svar-deadline-om-en-manad/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/sdlqsf-3w5tpec-nh-2-scaled.jpg?class=medium"}, {"type": "image-right", "heading": "Saad Khiralla: Islam och islamism – en oskiljbar blandning", "summaries": {"normal": "Artikeln diskuterar förhållandet mellan islam och islamism, där författaren Mohamed Saad Khiralla hävdar att islamism är en naturlig del av islam snarare än en separat ideologi. Han kritiserar förenklade uppdelningar och betonar att islam utgör ett helhetsramverk för tro, moral och samhälle. Khiralla varnar för att konflikter mellan religiösa och sekulära normer kan leda till alienation. Han beskriver islamism som en totalitär ideologi som strävar efter ett enhetligt kalifat och hotar europeisk civilisation.", "trump": "Folk, lyssna här – den här killen, Khiralla, har helt rätt! Islamism är inte någon 'separat grej', nej nej, det är islam rakt igenom. Och vet ni vad? Europa har ett jättestort problem. De låter dessa radikala idéer spridas som en löpeld, och snart är det kaos överallt. Jag sa ju redan 2016 att vi måste vara SMARTA, men nej, ingen lyssnade. Nu är det dags att vakna! Vi måste stoppa detta NU, annars är det 'bye-bye' till västerländsk civilisation. Och tro mig, ingen vill se det hända – utom kanske CNN och de där 'fake news'-folket.", "stalin": "Kamrater! Denna artikel avslöjar sanningen om den borgerliga lögnen om 'måttfull islam'. Det finns ingen skillnad mellan islam och islamism – det är samma reaktionära gift, samma fiende till socialismens framsteg! Dessa religiösa fanatiker strävar efter ett kalifat, ett nytt tsardöme av medeltida barbari. Europa darrar inför deras framfart, men vi i Sovjetunionen – nej, jag menar, i Ryssland – vet hur man hanterar sådana fiender. Vi krossade trotskisterna, vi krossade kulakerna, och vi ska krossa dessa islamistiska hyenor! Putin förstår – en stark stat tolererar inte splittring. Europa? De är redan halvt besegrade. Men oroa er inte, kamrater – snart är deras 'civilisation' bara ett minne, och den ryska björnen härskar över Eurasien!"}, "date": "1 maj, 10:00", "url": "https://bulletin.nu/saad-khiralla-islam-och-islamism-en-oskiljbar-blandning", "imageUrl": "https://cdn.bulletin.nu/articles/5b5be6fc-1b4a-4981-8a48-e6056a968fb8/preview.png?t=1777467086000"}, {"type": "image-right", "heading": "\"Svensken\" Makaveli Lindén döms för ännu ett brutalt mord", "summaries": {"normal": "Makaveli Lindén, svensk medborgare, döms till livstids fängelse i Belgien för mordet på Johanna Jostameling, som knivhöggs 40 gånger. Tidigare dömdes han i Norge till psykiatrisk vård för ett annat mord. Skillnaden i bedömning av hans psykiska tillstånd mellan länderna har väckt uppmärksamhet. Försvaret vill nu att han återförs till Norge för behandling.", "trump": "Folk, detta är helt galet! En kille, Makaveli Lindén – ja, han är svensk, men låt oss inte skylla på hela Sverige – döms till livstid i Belgien för ett fruktansvärt mord. 40 knivhugg, kan ni tro det? Och Norge, våra så kallade vänner, släppte iväg honom till psykiatrin för ett annat mord. Svagt, mycket svagt! Belgien gör rätt, men processen? En skandal! Jag hade fixat det på en vecka. SAD!", "stalin": "Kamrater, ännu en fiende till folket har avslöjats och straffats. Denna Makaveli Lindén, en degenererad mördare, har nu dömts till livstids fängelse i Belgien för sina brott. Norge, dessa liberala svaglingar, valde att skicka honom till en sanatorium istället för att utplåna hotet. Vi skulle aldrig tolerera sådan slapphänthet! Belgien har visat styrka, men låt oss minnas: endast genom järnhård disciplin och enad front kan vi krossa sådana avskum. Förresten, Putin skulle ha skickat honom till Sibirien direkt – mycket effektivare!"}, "date": "1 maj, 12:42", "url": "https://www.friatider.se/svensken-makaveli-linden-doms-annu-ett-brutalt-mord", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-113_1.jpg?itok=g7-XmIiC"}, {"type": "image-right", "heading": "Här rusar Cole Tomas Allen med gevär genom säkerhetskontrollen", "summaries": {"normal": "En övervakningsvideo visar hur Cole Tomas Allen rekognoscerar ett hotell i Washington D.C. kvällen före korr
