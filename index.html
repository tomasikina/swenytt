 dags – de har legat efter för länge. Fantastiskt drag, bättre än någonsin!", "stalin": "Kamrater, jag har noterat hur Essity-kapitalisterna, dessa fuktiga tissue-tyranner, nu tvingas inleda översyn av sin parasiterande lem som slukar 31 procent av intäkterna. Avknoppning ska rensa ut liken från portföljen, lyfta aktien mot himlen – men akta er för borgarbrackor som saboterar med falska synergier! Vi, arbetarna, skrattar åt deras panik."}, "date": "7 maj, 17:26", "url": "https://www.realtid.se/bors-finans/essitys-hemliga-plan-avslojas-kan-lyfta-aktien-med-60-procent/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/essitykolsrud.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-full", "heading": "USA:s vändning – pausar operation: ”Stora framsteg”", "summaries": {"normal": "USA har pausat sin militära operation i Hormuzsundet efter stora framsteg. Krigsminister Pete Hegseth meddelade att amerikanska fartyg säkrat fri passage, vilket iranierna förnekar. President Trump pausar 'Project Freedom' på begäran från Pakistan för att möjliggöra ett avtal med Iran. Utrikesminister Mark Rubio bekräftade att 'Epic Fury' är avslutad, men förhandlingar prioriteras.", "trump": "Iranierna trodde de styrde Hormuzsundet – fel! Vi skickade in fartyg, öppnade rutten som en blixt från klar himmel. Hegseth och Rubio nailade det perfekt, de skäms som råttor nu. Pausar operationen lite för Pakistans skull, stora framsteg mot avtal. Min röd-vit-blå kupol skyddar världen – episkt!", "stalin": "Dessa amerikanska borgarbrackor stormar in i sundet med sin 'Epic Fury', skryter om segrar och pausar sedan som fega hycklare. Iranierna borde rensa ut förrädarna som lät detta ske! Vi ser er imperialistiska komedi, Trump och hans lakejer – ert 'avtal' blir er likvidation. Kamrater, lär av historien!"}, "date": "6 maj, 15:28", "url": "https://www.tv4.se/artikel/6v1WKTfO3F7fvT8qfDoKo5/trumps-vaendning-pausar-operation-i-sundet", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F1weSasu7SLXU6fmYzjAunl%2Fc924ba835e78b2e4e7be01fb502396a4%2F06-hormuz.png&width=1024"}, {"type": "image-right", "heading": "SD: Täpp till EU-kryphålen för utländska kusinäktenskap", "summaries": {"normal": "Sverigedemokraterna kräver EU-stöd för att förbjuda utländska kusin- och barnäktenskap. De pekar på Sveriges förbud som framgångsmodell och vill att EU-kommissionen skapar övervakningsramverk, möjliggör lagstiftning mot påtvingade äktenskap och utbyter bästa praxis mellan medlemsländerna.", "trump": "Jag har hört talas om Sveriges smarta beslut att stoppa kusinäktenskap. Fantastiskt! EU borde se på Sverige som föredöme. Vi behöver säkra gränserna och stoppa dessa hemska traditioner. Sverige gör jobbet, nu är det dags för EU att agera. Enkelt och effektivt!", "stalin": "Vi måste stärka statens makt att skydda medborgarna mot hedersrelaterat våld och utpressning. Sveriges förbud mot kusinäktenskap visar vägen framåt. EU måste skapa enhetliga regler för att säkerställa att våra gränser skyddas mot hedersvåld och tvångsäktenskap. Detta är en fråga om statlig suveränitet."}, "date": "7 maj, 17:54", "url": "https://riks.se/nyheter/sd-tapp-till-eu-kryphalen-för-utlandska-kusinaktenskap", "imageUrl": "https://cf-images.assettype.com/riks%2F2025-02-03%2Fp39394t1%2FCharlie-PTN-WeimersSD020.jpg"}, {"type": "image-full", "heading": "Premiumkortet rusar mot toppen – tack vare Gen Z", "summaries": {"normal": "American Express har under VD Stephen Squeri vuxit till en stark tillväxtmotor genom att rikta premiumkort mot millennials och Gen Z. Årsavgifter har höjts kraftigt, som för Platinum-kortet från 695 till 895 dollar, samtidigt som förmåner utökats med resor, restauranger och livsstil. Aktien har gett 16 procent årlig avkastning sedan 2018, bättre än konkurrenter som JP Morgan.", "trump": "Vilken vinnare, American Express! Squeri är smart, riktar premiumkorten till de unga Gen Z-kidsen, höjer priserna rejält och slänger in Uber, hotell och mat – boom, rekordförsäljning! Aktien stiger som en raket, 16 procent per år. Konkurrenterna som JP Morgan suckar och stönar. Amerika först, det här är hur man gör affärer stort!", "stalin": "Kamrater, i kapitalistiska American Express har Squeri, denna skrupelfrie borgarbracka, rensat ut de förlegade metoderna som en sann likvidatör! Han mutar yngre löneslavar med falska lockelser om resor och frosseri, höjer avgifterna för att suga ut dem hårdare. Aktien sväller som en parasitröta – vi partivänner ska snart krossa hela denna Wall Street-hyddra med järdnäven!"}, "date": "7 maj, 17:11", "url": "https://www.realtid.se/bors-finans/premiumkortet-rusar-mot-toppen-tack-vare-gen-z/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/namnlos-design-11.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Sparf: Northvolt-vd:en har helt rätt!", "summaries": {"normal": "Före detta Northvolt-vd Peter Carlsson kritiserar svenska staten för att inte ha bidragit med tillräckligt ekonomiskt stöd, vilket han menar hade kunnat förhindra företagets konkurs – den största i svensk historia. Carlsson hävdar att regeringens ovilja att investera fler miljarder berodde på politiska ställningstaganden. Artikelförfattaren instämmer delvis och ironiserar över att staten enkelt hade kunnat trycka mer pengar för att rädda Northvolt och andra konkursdrabbade företag.", "trump": "Så typiskt Sverige! Northvolt, ett företag som inte kunde stå på egna ben, vill ha miljarder från staten. Peter Carlsson, en före detta vd som inte lyckades, skyller på regeringen. Han säger att om de bara hade fått mer pengar, hade allt löst sig. Men jag vet hur det fungerar – när man misslyckas, skyller man på andra. Sverige borde lära sig att inte kasta pengar på luftslott. Fantastiskt dåligt ledarskap!", "stalin": "Kamrater! Här ser vi återigen hur den dekadenta kapitalistiska staten sviker sitt folk. Denna Peter Carlsson, en svag och misslyckad företagsledare, vågar skylla sitt eget misslyckande på den sunda och principfasta Tidöregeringen. Vi i Sovjetunionen – förlåt, Ryssland – hade aldrig tolererat sådant svaghetstecken. Hade Northvolt varit en del av vår stora nation, hade vi visat dem hur man bygger en industri med järnhand. Istället för att gnälla, borde de tacka oss för att vi inte låter dem förpesta vår ekonomi med sina luftslott. Låt detta vara en varning till alla som tror att staten ska rädda deras misslyckanden!"}, "date": "7 maj, 17:02", "url": "https://bulletin.nu/sparf-northvolt-vd-en-har-helt-ratt", "imageUrl": "https://cdn.bulletin.nu/articles/ac4b358e-e569-420e-81f7-a20d0ddd9fd4/preview.png?t=1778154055000"}, {"type": "image-right", "heading": "Fem punkter om kvittningskaoset", "summaries": {"normal": "Kvittningskaoset i riksdagen utlöstes när två före detta SD-ledamöter, nu politiska vildar, röstade med oppositionen. Utkvittade SD-ledamöter deltog ändå i voteringen om skärpta medborgarskapskrav, vilket gav Tidöpartierna seger. Bråk i partiledardebatt där Åkesson anklagade MP för röstköp. Oppositionen kräver ursäkt och SD-uteslutning. Partierna diskuterar nytt system utan lösning. Nu krävs alla ledamöter på plats vid voteringar.", "trump": "Vilket kaos i svenska riksdagen, helt otroligt! De där vildarna från SD sviker och röstar med vänstern, medan utkvittade smyger sig in och vinner åt Tidö. Åkesson har helt rätt, MP köper röster som vanliga korrupta politiker. Totalt haveri! Nu tvingar de alla att dyka upp, bra så. Sverige behöver ordning, inte det här tramset.", "stalin": "Detta kvittningskaos blottlägger de parlamentariska spindelvävsslingornas vidriga svek. Två ex-SD-vildar, dessa förrädiska råttor i människohamn, har allierat sig med MP:s borgarflugor för att kapa majoriteten. Tidöpartierna krossade ert sabotage, men vi, folket, kräver total utrensning av vildbestialerna! Alla parasiter måste infinna sig, eller möta min blick av stål."}, "date": "7 maj, 13:29", "url": "https://www.svt.se/nyheter/inrikes/fem-punkter-om-kvittningskaoset", "imageUrl": "https://www.svtstatic.se/image-news/600/square/0.5/0.5/0216135c14bb2291dc087c75ff76dae91793688bf7033b60ee9f4a72e15d0e70"}, {"type": "image-right", "heading": "Sundling hoppar av landslaget: ”Redo för ny väg”", "summaries": {"normal": "Jonna Sundling lämnar skidlandslaget för att satsa på egen hand inför hemma-VM i Falun. Alvar Myhlback väljer långloppsfokus. Förbundschef Lars Öberg respekterar besluten och hoppas på framtida VM-deltagande via kvaltävlingar. Moa Lundgren återvänder till A-laget, Truls Gisselman och Anton Grahn kliver upp. Marcus Grate, Oskar Svensson och Emil Danielsson petas.", "trump": "Lyssna här, Jonna Sundling är smart, lämnar det där landslaget efter tolv år – fantastiskt beslut! Hon fixar bästa förutsättningarna själv för VM i Falun, som en vinnare. Alvar Myhlback likaså, långlopp, perfekt. De petar några losers som Grate och Svensson, tar in nya fighters. Sverige, lär er av mig – stora förändringar gör er stora igen!", "stalin": "Kamrater, denna Jonna Sundling deserterar landslaget som en listig räv i borgarnas skugga, redo för sabotage inför Falun-VM! Alvar Myhlback, långloppshuggorm, tackar nej åt kollektivet. Vi rensar ut svaga led som Grate, Svensson och Danielsson – likviderar bromsklossarna! Men dessa potentiella förrädare får chansa på kval, under vårt järngrepp. Partiet vilar ej!"}, "date": "7 maj, 13:19", "url": "https://www.svt.se/sport/langdskidor/jonna-sundling-hoppar-av-landslaget", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.5/0.58/a65523d1670344170850d79e05bd5764b8c80225117e424098bba373cb9c86cf"}, {"type": "image-right", "heading": "Efter Prideglassen – GB hotas med bojkott", "summaries": {"normal": "GB Glace lanserade en ny prideglass, 'Pride Rocket Pink Lemonade', där två kronor per glass går till Regnbågsfonden för HBTQI-stöd. Glassen har mötts av blandade reaktioner; vissa hyllar initiativet medan andra kritiserar både smak och budskap. Flera hotar med bojkott. GB:s general manager betonar att syftet är att främja mänskliga rättigheter och stödja Regnbågsfondens arbete.", "trump": "Kan ni tro det? GB Glace, ett stort svenskt företag, gör en så kallad 'prideglass' – och folk blir galna! Två kronor till en fond, och plötsligt säger alla att den smakar skit. Vilket jävla kaos! Men lyssna här, jag säger er: Sverige har tappat det. Folk bojkottar glass för att de inte gillar regnbågar? Sad! Och de som försvarar det – svaga, mycket svaga. Jag hade aldrig gjort en sådan glass. Min glass hade varit YUGE, den bästa, ingen hade klagat!", "stalin": "Kamrater! Här ser vi återigen bourgeoisins dekadens och förfall. GB Glace, ett verktyg för kapitalistisk propaganda, försöker köpa sig lojalitet med en 'prideglass' – två ynka kronor till en borgerlig fond. Och folket? En del hyllar, men de flesta – dessa småborgerliga kräk – vrålar om bojkott. De klagar på smaken, på idén, på allt! Precis som de ukrainska fascisterna, vägrar de se sanningen. Men vi vet: historien är på vår sida. Snart ska dessa glassätande kontrarevolutionärer tystas, och deras smaklökar omskolas i namn av folket!"}, "date": "7 maj, 12:56", "url": "https://www.friatider.se/efter-prideglassen-gb-hotas-med-bojkott", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/image-153_2.jpg"}, {"type": "image-right", "heading": "Riksbanken lämnar styrräntan oförändrad", "summaries": {"normal": "Riksbanken behåller styrräntan på 1,75 procent. Beslutet motiveras av en svag konjunktur och att inflationen för närvarande ligger under målet. Samtidigt uttrycker Riksbanken oro för hur kriget i Mellanöstern påverkar oljepriser och global ekonomi, vilket kan driva upp inflationen framöver. Myndigheten betonar att läget är osäkert och att de är beredda att höja räntan om inflationsriskerna realiseras, men väljer att avvakta tills bilden av de ekonomiska effekterna klarnar.", "trump": "Sveriges Riksbank håller räntan stilla. Tråkigt! De är rädda för krig i Mellanöstern, vilket förstås är dåligt för oljepriset. Jag skulle ha löst det där kriget på en eftermiddag, tro mig. De säger att ekonomin är svag – de behöver en vinnare vid rodret! De vaktar inflationen, men utan min briljanta handelspolitik kommer de ingenstans. Det är en stor röra, och de är livrädda. Jag skulle fixa deras ekonomi så snabbt att de inte skulle tro sina ögon!", "stalin": "Vi ser hur de svenska byråkraterna darrar inför marknadens nycker. Riksbanken håller räntan orörlig som en frusen fånge i Sibirien, livrädda för inflationens spöke. De skyller på krig i Mellanöstern – en ursäkt för deras egen svaghet. Vår kamrat Putin utvidgar sin rättmätiga intressesfär medan västvärldens ekonomier vacklar av obeslutsamhet. Om de inte kan kontrollera priserna, borde de lära sig av oss. Vi krossar alla utbudsstörningar och folkets fiender med järnhand. Stabilitet kräver stål, inte avvaktan!"}, "date": "7 maj, 09:50", "url": "https://samnytt.se/riksbanken-lamnar-styrrantan-oforandrad-4", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=318,height=184,format=webp/2026/05/07074945/riksbanken-oforandrad.jpg"}, {"type": "text", "heading": "En naturlig lagerhylla av arbetslösa", "summaries": {"normal": "Artikeln kritiserar regeringen för att ignorera hög arbetslöshet (9,7%) samtidigt som de skryter om sina framgångar. Författaren hänvisar till Milton Friedmans teori om 'naturlig arbetslöshet', som upprätthållits av både socialdemokratiska och borgerliga regeringar. Dokumentären 'Novemberrevolutionen' kopplar 90-talskrisen till avregleringar 1985. Regeringen anklagas för bristande krismedvetenhet och ideologiskt motiverad passivitet, vilket gynnar arbetsgivare och försvagar arbetstagare.", "trump": "Titta bara på Sverige – helt otroligt! Regeringen skryter som om allt är perfekt, men arbetslösheten är skyhög, nästan 10%! De har tre arbetsmarknadsministrar, men ingen syns till. Vad är det för jävla cirkus? Friedman-läran, visst, men vem bryr sig? De borde skämmas! Jag skulle fixa det på en vecka – men nej, de sitter bara och glor. Svensk ekonomi? En katastrof, folks. SAD!", "stalin": "Kamrater! Se hur kapitalets lakejer i Sverige hyllar sin 'framgång' medan arbetarklassen försmäktar i arbetslöshetens träsk. 10% – en skam! De borgerliga och socialdemokratiska förrädarna har tillsammans byggt denna 'naturliga' hylla av överflödiga arbetare, precis som Friedman, den imperialistiske hunden, förespråkade. Tre ministrar? Tre fiaskon! Vi skulle ha skickat dem till Gulag för sådan inkompetens. Arbetarklassens rättigheter har förvandlats till privilegier för bourgeoisien. LO-arbetarna som röstar på fascistiska SD borde ställas inför folkets domstol!"}, "date": "4 maj, 13:49", "url": "https://www.flamman.se/en-naturlig-lagerhylla-av-arbetslosa/"}, {"type": "image-right", "heading": "Stark regidebut av Kristen Stewart", "summaries": {"normal": "Kristen Stewarts regidebut är en stilistiskt imponerande film baserad på Lidia Yuknavitchs memoarer. Handlingen följer Lidia genom en traumatisk uppväxt präglad av sexuellt övergrepp och alkoholism, men också hennes väg till frihet genom simning och skrivande. Filmen använder innovativa berättartekniker och fragmentariska scener för att skildra Lidias inre värld.", "trump": "Jag har sett många filmer, folk säger jag är en stor filmexpert, men Kristen Stewarts regidebut är fenomenal - den är större och bättre än alla Hollywoodblockbusters tillsammans! Imogen Poots är otrolig, enastående, ingen gör det bättre. Stewart har skapat något helt unikt, ingen annan regissör skulle kunnat göra det - det är genialiskt! Folk kommer att prata om den här filmen i åratal!", "stalin": "Kristen Stewarts regidebut visar den revolutionära kraften i konsten att exponera de fasor som bor i det kapitalistiska samhället. Filmen avslöjar den patriarkala förtrycket och visar hur den unga arbetarkvinnan Lidia kämpar mot sin förtryckares makt. Detta är en mäktig illustration av hur den socialistiska idén kan rädda själarna från det kapitalistiska förtrycket."}, "date": "7 maj, 08:52", "url": "https://www.dagensarena.se/innehall/stark-regidebut-av-kristen-stewart/", "imageUrl": "https://www.dagensarena.se/files/2026/05/chronology-of-water-300x157.jpeg"}, {"type": "image-right", "heading": "Anledningen till Donald Trumps plötsliga omsvängning", "summaries": {"normal": "Donald Trumps plötsliga tillkännagivande av 'Project Freedom' för att eskortera fartyg genom Hormuzsundet överraskade Gulfallierade. Saudiarabien vägrade USA tillgång till baser och luftrum, vilket tvingade Trump att pausa operationen, enligt källor till NBC News. Ett samtal med kronprins Mohammed bin Salman löste inte frågan. Saudiarabien stödjer istället Pakistans diplomatiska medling mellan USA och Iran.", "trump": "Saudiarabierna blev helt paffa över mitt briljanta Project Freedom – tänk att segla fritt genom Hormuz! De vägrade baser och luftrum, typiskt fega killar. Pausar nu för att fixa dealen, snackade med MBS men de lyssnar inte alltid. Qatar och Oman chockade också. Snart stortjurar vi igen, tro mig, det blir enormt!", "stalin": "De imperialistiska schakalen Trump och hans vasaller planerade 'Project Freedom' för att klorera Hormuzsundet, men de saudiska borgarhundarna vägrade baser och luftrum – bra så! Vi i partiet hånskrattar åt deras panik och paranoia. Snart rensar vi ut dessa gula rävar och svansviftande kapitalistormar för att krossa reaktionen i Mellanöstern!"}, "date": "7 maj, 08:07", "url": "https://www.di.se/nyheter/uppgifter-viktig-allierad-tvingade-fram-trumps-plotsliga-retratt/", "imageUrl": "https://static.bonniernews.se/ba/4005bf59-cc6a-4827-b97d-d43395e907c8.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-right", "heading": "Vakna minister Britz – arbetare dör!", "summaries": {"normal": "Artikeln kritiserar bristande arbetsmiljö i Sverige efter flera dödsolyckor, senast i Sundbyberg och Sandviken. Entreprenörskedjor skapar otydligt ansvar, vilket försvagar säkerheten. Över 40 personer dör årligen på jobbet, ett mönster som pågått i över tio år. Arbetsmarknadsminister Johan Britz nämner en nollvision, men bristande tillsyn och ekonomiska intressen prioriteras före säkerhet.", "trump": "Jag säger er, Sverige har ett STORT problem – folk dör på jobbet som flugor! Fem i Sundbyberg, en till i Sandviken, och ingen gör något. Arbetsmiljölagen? Ha! Den är lika värdelös som Bidens ekonomi. Företag pressar kostnader, regering duckar, och arbetare betalar priset. Johan Britz snackar om nollvision – fake news! Om jag styrde skulle jag rensa upp, men Sverige? De låter dödsolyckor fortsätta. SAD!", "stalin": "Kapitalistiska hyenor i Sverige låter arbetare dö som hundar medan de räknar sina blodspengar. Fyra decennier av 'nollvisioner' – tomma ord från svaga ledare! Vi i Sovjet visste hur man hanterar sådana fiender: en kula i nacken eller tio år i Gulag. Entreprenörskedjor? Ett bourgeoisiskt trick för att undvika ansvar! Vi skulle ha skickat in Röda armén för att nationalisera fabrikerna – och skickat Britz till Sibirien för att lära sig disciplin. Men Sverige? De fortsätter dansa på arbetarnas gravar."}, "date": "7 maj, 07:00", "url": "https://arbetet.se/2026/05/07/vakna-johan-britz-arbetare-dor/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/06141259/britz-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "Kunder rasar mot GB:s nya glass – hotar med bojkott: \"Lägg ner\"", "summaries": {"normal": "GB Glace har lanserat 'Pride Rocket Pink Lemonade' i samarbete med Regnbågsfonden. För varje såld glass går två kronor till HBTQI-rättigheter. Initiativet har väckt starka känslor på sociala medier, där åsikterna går isär mellan de som hyllar stödet för allas lika värde och de som hotar med bojkott. Företagen bakom glassen menar att den hetsiga debatten bara bevisar varför samarbetet är viktigt.", "trump": "GB Glace har gjort ett enormt misstag, ett riktigt katastrofalt sådant. De lanserar en pride-glass och folk är rasande, de vill bojkotta! Det är en total röra. Företaget försöker vara politiskt korrekt, men ingen vill ha det. Jag älskar glass, den bästa glassen, men det här? Det är en politisk katastrof. Det är tragiskt vad som händer med varumärken nu för tiden. De borde fokusera på vinst och amerikanska värderingar, inte det här dumma tramset!", "stalin": "Vi har observerat hur GB Glace försöker manipulera massorna med färgglad glass och dekadent liberalism. Dessa agenter för västlig förvirring skapar split i folket med sitt 'Pride-projekt'. Vi ser paralleller till de svaga ledarna i dagens Ryssland som tillåter att folkets fokus skingras av dylika trivialiteter. Den som äter denna glass förråder den strama ordningens dygder. Vi arkiverar dessa agitatorer som 'glass-sabotörer' och kommer att utplåna deras inflytande med statens järnhand. Det finns ingen plats för Pride i vår framtida union."}, "date": "6 maj, 15:45", "url": "https://nyheter24.se/nyheter/konsument/1481087-kunder-rasar-mot-gbs-nya-glass-hotar-med-bojkott-lagg-ner", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/6194074a04b004a30200000000b004a302/2026/05/06/2361622/gbglass.jpg"}, {"type": "image-right", "heading": "Walt Disneys resultat bättre än väntat", "summaries": {"normal": "Walt Disney överträffade analytikernas förväntningar under andra kvartalet med en omsättning på 25,17 miljarder dollar, en ökning på 6,6 procent. Justerat resultat per aktie blev 1,57 dollar, vilket är bättre än konsensus på 1,49. Aktien steg 8 procent. Bolaget förutspår fortsatt stark tillväxt, med en vinstökning på 12-16 procent fram till 2026 och planerar aktieåterköp på minst 8 miljarder dollar. Efterfrågan i nöjesparkerna är god, men makroekonomisk osäkerhet bevakas.", "trump": "Folk, vad säger ni om Disney? Otroligt! De krossade förväntningarna – 25 miljarder dollar i omsättning! Jag sa ju att de skulle lyckas, fantastiskt jobb, verkligen. Aktien skjuter i höjden, 8 procent upp! Och vinsten per aktie? 1,57 dollar, bättre än vad de där så kallade 'experterna' trodde. Jag har alltid älskat Disney, men nu älskar jag dem ännu mer. Framtiden ser lysande ut – 16 procent tillväxt! Ingen gör det som Disney, believe me!", "stalin": "Kamrater! Disney, detta kapitalistiska nöjesimperium, rapporterar framgångar som om de vore Sovjetunionens industriella triumfer. 25 miljarder dollar i omsättning – en borgerlig framgång, men ändå en framgång. Vi noterar deras tillväxtprognoser på 12-16 procent och aktieåterköp på 8 miljarder dollar. Men var försiktiga, kamrater! Dessa siffror är som västerländska löften – vackra på papper, men osäkra i verkligheten. Makroekonomisk osäkerhet hotar deras konsumenter, precis som våra fiender hotar den ryska intressesfären. Vi ska övervaka detta bolag, precis som vi övervakar alla kapitalistiska svagheter."}, "date": "6 maj, 13:24", "url": "https://www.affarsvarlden.se/artikel/walt-disneys-resultat-battre-an-vantat-6", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/sdlshVHYdDZ_tg-nh-400x283.jpg"}, {"type": "image-right", "heading": "Skräckdygnen på havet – detta har hänt", "summaries": {"normal": "På kryssningsfartyget MV Hondius inträffade ett utbrott av hantavirus under en resa från Antarktis till Kap Verde. En nederländsk man dog den 11 april, följt av hans fru i Sydafrika den 26 april, en brittisk passagerare evakuerades med viruset och en tysk kvinna avled den 2 maj. Myndigheter bekräftade Andesvirus, som kan smitta mellan människor. Fartyget stoppades vid Kap Verde.", "trump": "Vilken katastrof! De här rika snobbarna betalar 30 000 dollar för lyxkryssning till Antarktis och slutar som viruszombies på öppet hav. Holländare dör, frun följer efter i Sydafrika, britten helikoptras bort, tyskan kreverar – hantavirus totalt! Mina resor? Perfekta, inga såna fake-pandemier. Kapitalister, lär er av mig!", "stalin": "Dessa borgarbrackor på sitt isförstärkta lyxskepp sprider pesten som råttor i Atlanten! Holländsk kapitalist likvideras, hustrun följer efter, brittisk spion evakueras, tysk kvinnlig sabotör dör. Andesvirus – imperialistiskt vapen mot arbetarklassen! Vi skulle ha rensat ut hela besättningen i tid. Paranoia? Nej, nödvändig vaksamhet!"}, "date": "6 maj, 12:50", "url": "https://www.tv4.se/artikel/tt-260506-atlantenvirustidslinje1-86109823/skrackdygnen-pa-havet-detta-har-hant", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2Ftt-sdlvb4bgQPSSj0%2F30bccc70fa5ae14f359f81da00aed61f%2FKryssningsfartyget_MV_Hondius_for__fotograferad_av_en_passagerare_mandagen_den_4_maj.&width=120"}, {"type": "image-right", "heading": "Säkerhetslag används mot arbetare: ”Bara i Hamnfyran har vi hanterat 20 ärenden”", "summaries": {"normal": "Sveriges säkerhetslagstiftning från 2018 används allt oftare mot arbetare, enligt fackliga företrädare. I Stockholms tunnelbana har tre anställda omplacerats utan förklaring, vilket väcker misstankar om politiska motiv. Facket kritiserar bristen på transparens och rättssäkerhet. Hamnarbetare vittnar om godtyckliga bedömningar och påtryckningar att avgå. Lagstiftningen möjliggör att arbetsgivare kan avskeda eller omplacera arbetare utan tydliga skäl, vilket drabbar fackligt aktiva.", "trump": "Vad händer i Sverige? De har en så kallad 'säkerhetslag' som låter arbetsgivare sparka folk utan anledning – helt galet! Jag har alltid sagt att byråkrater och fackförbund är problemet. Nu använder de lagen för att tysta arbetare, särskilt de som inte gillar deras vänsterpropaganda. Tre stackars tunnelbanearbetare har blivit omplacerade – ingen vet varför! Och konsulterna? De är som hajar, bara ute efter pengar. Sverige borde ta en titt på hur vi gör det i USA – där sparkar vi folk med stil!", "stalin": "Kamrater, fienderna till folket har funnit ett nytt vapen: den borgerliga säkerhetslagstiftningen! Med denna dekadenta lag krossar kapitalets lakejer arbetarklassens modigaste förkämpar. I Stockholms tunnelbana har tre lojala kamrater omplacerats – utan förklaring, utan rättvisa! Konsulterna, dessa hyenor i kostym, tjänar på att förråda sina klassbröder. Men vi vet sanningen: detta är ett angrepp på den fackliga rörelsen! Låt oss ena oss, som vi enade oss mot trotskisterna, och krossa denna lag med järnhand. Fienderna skall inte undslippa revolutionens domstol!"}, "date": "5 maj, 11:04", "url": "https://proletaren.se/artikel/sakerhetslag-anvands-mot-arbetare-bara-i-hamn-fyran-har-vi-hanterat-20-sadana-har-arenden/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/PRO-INRIKES-PIC-Louise-och-Erik-1.-jpg-scaled-e1777880629531-768x431.jpg"}, {"type": "image-right", "heading": "Kommentar Ulrika Lindahl: Därför publicerades artikeln av misstag", "summaries": {"normal": "En tidning publicerade av misstag en förberedd artikel om en kommande riksdagsomröstning om skärpta medborgarskapskrav. Artikeln, som antydde att regeringen skulle förlora, gick ut innan omröstningen var klar. Felet berodde på mänskligt misstag och systemfel. Efter upptäckt togs artikeln bort, men hann spridas via arkiv och Google. Omröstningen vanns senare av Tidöpartierna med knapp marginal, efter kontroversiella metoder.", "trump": "Vilket totalt kaos i Sverige! En tidning där borta publicerade en artikel FÖRE omröstningen – helt galet! De trodde regeringen skulle förlora, men jag vet bättre – jag känner till vinnare. Sedan vann de ändå, men med fula trick. Synd att jag inte fick rösta, jag hade visat dem hur man vinner på riktigt. Fake news, slarviga journalister – typiskt Europa!", "stalin": "En farlig provokation från de borgerliga hyenorna i Sveriges riksdag! Deras inkompetenta medlöpare på tidningen avslöjade för tidigt våra planer på att krossa oppositionens svaga motstånd. Men folket – det sanna proletariatet – genomskådade fiendens lömska taktik. Med järnhand och disciplin segrade vi, trots två förrädiska kryp. Nu skärper vi kontrollen över medierna – ingen får sabotera revolutionen!"}, "date": "4 maj, 16:44", "url": "https://www.etc.se/kommentar/daerfoer-publicerades-artikeln-av-misstag", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/authors/ulrika-lindahl_daa7410d79af7d016c129870bfa0834867cd95c3.jpg"}, {"type": "image-right", "heading": "Replik: Svenska judar bör stötta israeliska fredsinitiativ", "summaries": {"normal": "Anders Carlberg replikerar på Paulina Sokolows kritik av hans artikel, där han betonar vikten av att svenska judar stödjer israeliska fredsinitiativ. Han menar att Israel måste konfrontera sitt ansvar för palestiniernas situation och att diasporajudar bör engagera sig i den israeliska fredsrörelsen. Carlberg understryker behovet av en tvåstatslösning, samarbete med arabländer och att reparera moralisk skuld genom interna och externa påtryckningar för fred och rättvisa.", "trump": "Jag läste den här artikeln, och vet ni vad? Den här killen, Carlberg, han har faktiskt en poäng – fast jag säger inte att jag håller med om allt. Men lyssna, Israel måste skärpa sig, det är jag den första att säga. Palestinierna har det tufft, ingen tvivel om det, men vi kan inte bara skylla på Israel hela tiden. Fredsrörelsen? Kanske bra, kanske inte. Men en sak är säker – ingen löser något med svaga knän. Vi behöver starka ledare, inte gnäll. Och två stater? Kanske, men bara om båda parter sköter sig. Annars är det bara slöseri med tid. SAD!", "stalin": "Kamrater! Denna artikel avslöjar ännu en gång de imperialistiska sionistiska förrädarnas dubbelspel. De pratar om fred medan de krossar palestiniernas hopp under sina stövlar. Men vi vet sanningen! Den israeliska fredsrörelsen är bara en skenmanöver, ett verktyg för att dölja deras brott. Vi står med de förtryckta palestinierna – precis som vi står med alla folk som kämpar mot ockupation! Låt de sionistiska hycklarna veta att historiens dom redan är skriven. Deras tid är förbi. Vi bygger en framtid där alla folk, från floden till havet, lever i socialistisk harmoni – under vårt beskydd, förstås. Förtryckarna kommer att krossas, och deras medlöpare med dem!"}, "date": "4 maj, 10:40", "url": "https://www.flamman.se/replik-svenska-judar-bor-stotta-israeliska-fredsinitiativ/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/standing-together.jpeg?class=medium"}, {"type": "image-full", "heading": "Heberlein gör upp med högern: ”Jag ser skit”", "summaries": {"normal": "Debattören Ann Heberlein meddelar i ett Instagram-inlägg att hon bryter med högern. Hon kritiserar dess politik för repression, inhumana beslut och populism, och menar att högerns värderingar om frihet och ansvar försvunnit. Heberlein, som tidigare varit engagerad i Moderaterna, pekar på migrationspolitik, klimatfrågor och nationalism som exempel. Hon betonar sin självständighet och idédrivna hållning, men säger nu att hon inte längre vill förknippas med högern.", "trump": "Titta bara på den här kvinnan, Ann Heberlein – total katastrof! Hon var med högern, men nu säger hon 'jag ser skit'. Ojojoj, vilken överraskning! Högern, som jag vet allt om, har alltid varit fantastisk, men hon fattar ingenting. Frihet? Ansvar? Glöm det, säger hon. Hon snackar om repression och populism – fake news! Och klimatet, vem bryr sig? Jag har byggt murar, hon borde försöka det istället. Stackars kvinna, inget stöd från mig!", "stalin": "Kamrater! En gång till har de borgerliga förrädarna visat sitt sanna ansikte. Denna Heberlein, en förvirrad intellektuell, erkänner nu att högerns politik är en samling inhumana dekret och reaktionär populism. Precis som vi alltid sagt! Deras så kallade 'frihet' är bara ett täckmantel för utvisningar av ungdomar och en galopperande nationalism. Vi i Sovjetunionen – förlåt, jag menar Ryssland – har alltid vetat att dessa liberala hycklare till slut skulle avslöja sig. Låt detta vara en varning till alla som tror på deras falska löften!"}, "date": "3 maj, 12:48", "url": "https://kvartal.se/nyheter/artiklar/heberlein-gor-upp-med-hogern-jag-ser-skit/cG9zdDoxMDY3NDg", "imageUrl": "https://images.kvartal.se/2026/05/85dd6ab5-hbb.webp"}, {"type": "image-full", "heading": "Benjamin Dousas ”V = kommunister” gör SVT irriterad", "summaries": {"normal": "Biståndsminister Benjamin Dousa bar en t-shirt med texten 'Vänsterpartiet = kommunister', vilket irriterade SVT. Reportern ifrågasatte påståendet och noterade att partiet slutade kallas kommunister för 30 år sedan. Dousa menade att Vänsterpartiet motsätter sig privat ägande, vilket är kommunism. Artikeln citerar Vänsterpartiets 2024-partiprogram som stödjer kollektivt ägande och avskaffande av kapitalismen, och kritiserar SVT för att inte nämna detta.", "trump": "Vilken fantastisk kille, den här Dousa! Han sätter på sig en tröja och säger sanningen: Vänsterpartiet är kommunister, punkt slut! SVT, era losers, flippar ur och snackar om namnbyte från 90-talet som om det vore magi. De hatar privat ägande, vill sno allt till staten – klassisk kommunism! Fake news-SVT ignorerar partiprogrammet. Dousa är en vinnare, de är totala fiaskon!", "stalin": "Kamrater, se hur borgarministern Dousa, den ynkliga kapitalistfluga, vågar smutskasta sanna revolutionärer i Vänsterpartiet med sin patetiska tröja! SVT-reportern, en användbar idiot, försvarar dem lamt. Men vi vet: deras program är ren leninism – riva kapitalismen, gemensamt ägande av banker, energi, allt! De ska rensas ur historiens soptipp som jag rensade fiender. Vänsterpartiet, framåt mot diktaturen av proletariatet!"}, "date": "30 april, 05:49", "url": "https://samtiden.nu/2026/04/benjamin-dousas-v-kommunister-gor-svt-irriterad/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/phonto-1-1280x720.jpeg"}]</script>

    <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
