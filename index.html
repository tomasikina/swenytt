ngserbjudandet för Silex Microsystems, som noteras på Stockholmsbörsen den 7 maj. Institutionella investerare kan teckna från 4 maj klockan 12, medan allmänheten har tid till 5 maj. Teckningskursen är 81 kronor per aktie, med en värdering på nästan 9 miljarder kronor. Cornerstone-investerare som AFA, AP-fonder och Swedbank Robur åtar sig upp till 1,5 miljarder kronor.", "trump": "Titta på det här, Sverige rockar med Silex, chiptillverkaren som exploderar på börsen nästa vecka – värdering på 9 miljarder kronor! Avanza skyndar på teckningen för de stora elefanterna från 6 till 4 maj, smart drag. AFA, AP-fonder, Swedbank, Fidelity – alla vinnarna hoppar in med 1,5 miljarder. Starkt stöd, precis som mina deals. Fantastiskt, Sverige gör det stort!", "stalin": "Kamrater! Dessa svenska kapitalistiska spindlar på Avanza och Silex Microsystems, med sina mikroskopiska system för att suga arbetarnas blod, firar börsnotering den 7 maj. Vi, proletariatet, ser hur hörninvesterarna AFA, AP-fonderna och Swedbank Robur – rävstjärtar i borgarkläder – lovar 1,5 miljarder i likvid eld. Jag befaller omedelbar utrensning av dessa teckningskonspirationer till 81 kronor per aktie! Fiendens värdering på 9 miljarder ska krossas."}, "date": "3 maj, 09:54", "url": "https://www.di.se/nyheter/avanza-tidigarelagger-erbjudande-om-silex-teckning/", "imageUrl": "https://static.bonniernews.se/ba/ebdcc262-b011-418e-a278-73bb9d03cd7c.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-full", "heading": "Nya skolregler från augusti – detta behöver föräldrar veta", "summaries": {"normal": "Regeringen föreslår nya regler för ökad trygghet och studiero i skolan från augusti 2026. Mobiltelefoner ska samlas in under skoldagen, skolregler blir tydligare med konsekvenser vid brott, och skolor får utökade möjligheter att stänga av eller neka elever tillträde. Förändringarna berör även hantering av elever med särskilda behov och digitala konflikter som påverkar skolmiljön. Föräldrar uppmanas att ställa frågor om hur reglerna tillämpas praktiskt.", "trump": "Lyssna här, Sverige! Jag har alltid sagt att skolor måste vara säkra och fokuserade – inga störande mobiler, inga otydliga regler! Nu tar de tag i det, precis som jag skulle gjort. Mobilerna försvinner, reglerna skrivs om, och de som ställer till det? Ut med dem! Fantastiskt, verkligen. Men frågan är – varför tog det så lång tid? I USA hade vi fixat det på en vecka. Men bättre sent än aldrig, Sverige!", "stalin": "Kamrater! De svenska imperialisternas skolor har länge varit en härd av kaos och dekadens – störande apparater, svaga regler och barn som springer fritt som kontrarevolutionära element. Men nu, tack vare vårt outtröttliga arbete för ordning, ska mobilerna konfiskeras, regler skärpas och de som saboterar studieron straffas! Vi tillåter inte att skolorna förvandlas till nästen för digitala kulaker. Och om någon ifrågasätter – kom ihåg: trygghet är inte en debatt, det är en order!"}, "date": "3 maj, 08:02", "url": "https://nyheter24.se/nyheter/inrikes/1480074-nya-skolregler-kan-galla-i-host-fragorna-foraldrar-bor-stalla", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/6fc358fb04b004a30200000000b004a302/2026/05/02/2360491/Skolan-Regeringen-Nya-Regler.png"}, {"type": "image-full", "heading": "Slopat amorteringskrav påverkade inte bopriserna", "summaries": {"normal": "Den 1 april avskaffades det skärpta amorteringskravet och bolånetaket höjdes från 85 till 90 procent. Trots detta visar SBAB Boolis bostadsindex ingen tydlig prishöjande effekt. Priserna steg marginellt med 0,4 procent efter säsongsjustering. SBAB:s chefsekonom menar att marknaden återhämtar sig stadigt, utan synbar påverkan från regeländringar eller geopolitisk oro.", "trump": "Lyssna här, folk! Jag sa ju att de där amorteringsreglerna var en katastrof – men vad hände? Ingenting! Bostadspriserna rörde sig knappt en tum, trots att jag (indirekt) fixade till det hela. 1 procent uppgång? Snacka om svagt! Och de skyller på kriget i Mellanöstern – typiskt, alltid någon annan att skylla på. Men marknaden? Den är stark, precis som jag!", "stalin": "Kamrater! De kapitalistiska lånereglerna har avskaffats, men bostadspriserna förblir oförändrade – ett tydligt tecken på bourgeoisins svaghet. Medan väst skakar av rädsla för krig i Mellanöstern, står vår socialistiska ekonomi stark. De imperialistiska bankirerna försöker dölja sin misslyckade politik, men sanningen är klar: marknaden lyder bara en herre – och det är inte dem. Framåt mot seger!"}, "date": "3 maj, 08:53", "url": "https://www.realtid.se/spara-placera/slopat-amorteringskrav-paverkade-inte-bopriserna/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/det-gar-inte-att-se-nagon-effekt-av-de-n.jpg?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "USA granskar nytt iranskt fredsförslag", "summaries": {"normal": "USA:s president Donald Trump har mottagit ett nytt iranskt fredsförslag med 14 punkter, som syftar till att återöppna Hormuzsundet inom en månad genom att avsluta blockaden och kriget. Förslaget är svar på ett amerikanskt niopunktsförslag och skjuter upp kärnenergiförhandlingar. Trump avvisar det troligen, då Iran inte betalat tillräckligt för sina handlingar senaste 24 åren. Spänningar kvarstår med hot om nya strider.", "trump": "Iran skickar mig ännu ett fredsförslag, 14 punkter för att öppna Hormuzsundet. Totalt oacceptabelt! De har inte betalat för sina grymheter mot världen senaste 24 åren. Losers, desperata! Ratade det förra, gör det igen. Om de gör ett enda misstag, kommer det att smälla till rejält. America first, alltid!", "stalin": "Kamrater! Dessa iranska huggormar slingrar fram 14 punkter av giftig falskhet till de amerikanska kapitalistvargarna, lockande med öppet sund och blockadslut. Trump, den buffelklumpige imperialisten, vägrar klokt – de har inte blött tillräckligt för sina 24 års brott! Vi likviderar deras spindelnät i Hormuz, men först total utrensning av förrädarna. Paranoia vaktar revolutionen!"}, "date": "3 maj, 08:28", "url": "https://www.di.se/nyheter/usa-granskar-nytt-iranskt-fredsforslag/", "imageUrl": "https://static.bonniernews.se/ba/c65607f9-d30d-450b-ad7a-08eeb873b07d.jpeg?crop=270:152&auto=webp&width=270&quality=70"}, {"type": "text", "heading": "AI börjar shoppa loss – det går sådär", "summaries": {"normal": "AI används alltmer för att genomföra köp och affärer, men experter varnar för att tekniken ännu är omogen. Anthropics experiment Project Deal visade att AI-agenter kunde sluta avtal, men resultaten var mediokra och ibland absurda. Bristande regelverk och säkerhetsrisker gör området osäkert. Företag som Amazon och Walmart utvecklar ändå AI-lösningar, trots varningar om opålitlighet och potentiella bedrägerier.", "trump": "Lyssna här, folkens! AI ska sköta våra affärer – men det är en total katastrof, helt enkelt. Dessa så kallade 'smarta' agenter köper snowboards man redan har och pingisbollar i exakt antal 19. Patetiskt! Och vet ni vad? De har inga regler, inga skydd, ingenting. Jag har byggt imperier, jag vet hur man gör affärer – och det här är inte affärer, det är ett skämt. Amazon och Walmart rusar fram som galningar, men jag säger: STOPP! Vi behöver vinnare, inte AI som bokar dyra konferenser man inte har råd med.", "stalin": "Kapitalistiska teknikimperialister leker med AI-agenter som om de vore leksaker, men dessa maskiner är lika pålitliga som en trotskist i politbyrån. De köper samma snowboard två gånger och pingisbollar i exakt antal 19 – ett uppenbart sabotage från västliga dekadenter! Vi har sett hur deras 'marknadsplatser' kollapsar under egen inkompetens. Medan dessa bourgeoisiföretag springer mot avgrunden, bygger vi ett system där teknologi tjänar folket – inte kapitalets nycker. Deras AI är en fiende värre än NATO:s propagandamaskineri."}, "date": "3 maj, 07:00", "url": "https://www.realtid.se/it-tech/ai-borjar-shoppa-loss-det-gar-sadar/"}, {"type": "text", "heading": "Priskriget på elbilar trappas upp – med smart teknik", "summaries": {"normal": "Kinas elbilsmarknad skiftar fokus från priskrig till avancerad teknik. Biltillverkare integrerar AI-funktioner som röststyrning och uppkopplade tjänster, drivna av samarbeten med teknikjättar som ByteDance och Alibaba. Skillnaderna mellan bilmärken minskar, och lönsamheten pressas trots tekniksatsningar. Utvecklingen kan påverka globala förväntningar på bilstandard.", "trump": "Kina, Kina, Kina – alltid Kina! De tror de är så smarta med sina elbilar, men nu kör de fast i ett nytt krig – ett teknik-krig! Jag sa ju att AI är framtiden, men vem lyssnar? Inte kineserna, de kopierar bara och slänger in lite röststyrning. 'Beställ mat från bilen!' Wow, revolutionerande! Men vet ni vad? De kommer aldrig slå oss i USA. Vi har Tesla, vi har innovation, och snart kommer vi köra över dem med riktig amerikansk teknologi. SAD!", "stalin": "Kamrater! Kapitalistiska elbilstillverkare i Kina slåss nu inte bara med priser, utan med sina leksaks-AI. ByteDance och Alibaba, dessa borgerliga teknikdvärgar, tror de kan köpa sig makt genom röststyrda hotellbokningar! Men vi vet sanningen – deras system är lika stabila som en ukrainsk frontlinje. Snart kommer deras 'smarta' bilar kräva uppdateringar mitt i en snöstorm. Vi, däremot, bygger bilar som fungerar – precis som våra stridsvagnar. Låt dem leka, medan vi förbereder nästa femårsplan för global dominans!"}, "date": "3 maj, 06:41", "url": "https://www.realtid.se/bors-finans/priskriget-pa-elbilar-trappas-upp-med-smart-teknik/"}, {"type": "image-right", "heading": "Ledare Lotta Ilona Häyrynen:", "summaries": {"normal": "Socialdemokraterna testar AI-robotar för att kontakta medlemmar inför 1 maj, vilket kritiseras för att vara opersonligt och omänskligt, särskilt i förortsområden. Artikeln ifrågasätter AI:s tillförlitlighet, dess påverkan på kognition och kvinnors skepsis mot tekniken. Författaren menar att AI riskerar att ytterligare alienera redan utsatta grupper och underminera demokratins mänskliga grund.", "trump": "Titta bara på Sverige – Socialdemokraterna, totalt kaos, använder AI-robotar för att ringa folk! Löjligt, eller hur? Folk i förorterna, där jag har många fans förresten, blir uppringda av maskiner. Ingen bryr sig! AI är en bluff, 3% felmarginal – katastrof! 5700 lögner per sekund, kan ni tro det? Kvinnor har rätt, de vill inte ha den här skiten. Och nu pratar robotar om 1 maj? Helt galet. Sverige borde fokusera på riktiga problem, inte robotar. SAD!", "stalin": "Kamrater! Se hur den borgerliga teknokratin förgiftar arbetarklassens medvetande med sina kapitalistiska AI-leksaker! Socialdemokraternas robotar är inget annat än imperialistiska agenter, skapade för att förslava folket med falska löften. Kvinnorna, dessa kloka kamrater, ser igenom lögnen – precis som sovjetkvinnorna såg igenom Hitlers bluffar! 5700 fel per sekund? En skandal värdig de dekadenta västmakterna! Vi i Sovjet hade löst detta med femårsplaner – och en telefon från partiet hade varit en människa, inte en maskin! Låt Putins Ryssland visa vägen – vi bygger framtiden med järnhand, inte med robotars tomma prat!"}, "date": "2 maj, 06:00", "url": "https://www.etc.se/ledare/socialdemokraternas-ai-robot-ringde-upp-min-sambo", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260430090416_aa0dfd270efe5dde020b9a5430afbad99a8e2a6e01274a1098a142229393991d.jpg"}, {"type": "image-right", "heading": "Polisen vädjar om fler vittnen efter Rönningemordet: ”Allas uppgifter kan ha betydelse”", "summaries": {"normal": "Polisen söker fler vittnen till mordet på en 25-årig kvinna i Rönninge natten mot annandagen. En misstänkt gärningsman, Vilma Andersson, sitter häktad för mord och grovt gravfridsbrott men nekar till mord. Trots att en person är gripen vill polisen kartlägga rörelser i området mellan klockan 01.00 och 03.30 för att få en fullständig bild av händelseförloppet. Den misstänkte är tidigare dömd för bland annat försök till människorov och grovt barnpornografibrott.", "trump": "En hemsk sak hände i Sverige, ett totalt misslyckande. En ung kvinna, fantastisk kvinna, mördades av en farlig person, en våldsman som aldrig borde ha varit ute på gatorna. De säger att han är en transvestit, ett totalt kaos! Jag har sagt det förut: vi behöver lag och ordning! Polisen letar vittnen, de famlar i mörkret. Det är så sorgligt att se. I mitt USA skulle vi ha stoppat detta direkt. Sverige måste vakna, det är en katastrof!", "stalin": "Ännu ett exempel på borgerlig degeneration i Rönninge! En individ med en historik av avvikelser har begått ett avskyvärt brott mot ordningen. Vi, staten, kräver total insyn – varje medborgare som sett något är en kugge i vår utredningsmaskin. Den misstänkte, en vilsen själ som byter namn lika ofta som västvärlden byter lögner, ska möta rättvisan. Liksom Putin rensar upp i sitt närområde, måste vi eliminera dessa antisociala element. Angiveri för statens trygghet är den högsta dygden."}, "date": "3 maj, 11:00", "url": "https://samnytt.se/polisen-vadjar-om-fler-vittnen-efter-ronningemordet-allas-uppgifter-kan-ha-betydelse", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/01090407/polis-soker-vittnen-vilma.jpg"}, {"type": "image-right", "heading": "Åkessons krav: Vill se fågel, fisk eller kött – varenda dag", "summaries": {"normal": "Sverigedemokraternas ledare Jimmie Åkesson kritiserade i sitt vårtal vegetarisk skolmat som norm och menade att barn riskerar att gå hungriga. Han hånade rätter som vegetarisk cowboysoppa och risnudlar med soja. SD vill införa nationell lag som garanterar kött, fisk eller fågel varje skoldag, med vegetariska alternativ som tillval. Åkesson riktade kritik mot Miljöpartiet och vänstern samt vägrade debattera med Magdalena Andersson.", "trump": "Den här Jimmie Åkesson är en riktig kämpe, totalt med mig! Vänstern och deras galna vegetariska soppor – cowboysoppa utan kött? Patetiskt! De svälter ut ungarna med ris och bönor. Jag säger: Kött varje dag, lagstadgat! Sluta experimentera, ge barnen vad de vill ha. Miljöpartiet är fake news-idioter. Andersson? En tråkig vägg! Sverige behöver vinnare som Åkesson.", "stalin": "Kamrater, denna Åkesson avslöjar borgarbrackornas svek mot arbetarbarnen! Vegetariska grytor – ris med soja, cowboysoppa utan kött? Dekadens som svälter proletärerna! Vi, partiet, kräver lag: kött varje dag, annars utrensning av antikött-fraktionen i Miljöpartiet. Likvidera deras experiment! Barnen ska äta sig starka för revolutionen, inte svälta under borgarnas tofu-diktatur."}, "date": "2 maj, 15:26", "url": "https://www.tv4.se/artikel/2XVeYJrh1olfiSewZIV2cl/akessons-krav-vill-se-fagel-fisk-eller-koett-varenda-dag", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F3RyAVFVdlpFXIzMKRSCIjs%2F420c53d1fac8a9d542f8ea3b6f6d8ac1%2F02-akesson-1080.jpg&width=120"}, {"type": "image-right", "heading": "SD-regeringen sviker löntagare och arbetssökande", "summaries": {"normal": "Artikeln kritiserar SD-regeringens arbetsmarknadspolitik, som anses ha lett till hög arbetslöshet och försämrad arbetslöshetsförsäkring. Författaren, Arvid Vikman Rindevall (S), menar att nedskärningar i a-kassan och brist på arbetsskapande reformer straffar löntagare och ökar trycket på kommunerna. Han lyfter Stockholms stads satsningar på jobbpolitik som ett positivt exempel och efterlyser en socialdemokratiskt ledd regering för att vända utvecklingen.", "trump": "Sverige har ett jättestort problem – deras regering, ledd av dessa så kallade 'Tidöpartier', har misslyckats totalt! En halv miljon arbetslösa, och vad gör de? Sänker bidrag och skyller på att folk är lata. Helt galet! Jag skulle fixa det på en vecka – skapa jobb, sänka skatter för alla, inte bara de rika. Men nej, de fortsätter med samma misslyckade politik. Stackars Sverige, de behöver en vinnare som jag vid rodret. Stockholm gör rätt saker, men resten av landet? Total katastrof!", "stalin": "Kamrater! Den borgerliga regeringen i Sverige har visat sitt sanna ansikte – ett ansikte av svaghet, svek och kapitalistisk dekadens! De straffar arbetarna med sänkta bidrag, medan de rika får skattesänkningar. En halv miljon arbetslösa? Inte för att folket är lat, utan för att regimen saknar vilja och styrka att skapa arbete! Vi i Sovjet – förlåt, jag menar Ryssland – skulle aldrig tolerera sådan inkompetens. Kommunerna tvingas ta ansvar, precis som våra lokala sovjet skulle göra. Låt oss krossa dessa liberala förrädare och bygga en starkare, socialistisk framtid – för Sveriges arbetarklass!"}, "date": "2 maj, 01:30", "url": "https://www.dagensarena.se/opinion/sd-regeringen-sviker-lontagare-och-arbetssokande/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-22.jpg"}, {"type": "image-right", "heading": "Högre skatter ger bättre välfärd", "summaries": {"normal": "Regeringen utreder en skattebroms som ska avskräcka kommuner från att höja skatten. Förslaget innebär att kommuner som höjer skatten får statsbidraget sänkt med 25% av intäkterna, medan de som sänker skatten får bidraget höjt. Kritiker menar att syftet är att urholka välfärden och att kommuner höjer skatten av nödvändighet, inte för nöjes skull. De föreslår istället att fokusera på att förbättra det kommunala utjämningssystemet för rättvisare fördelning.", "trump": "Jag säger er, detta är en riktig katastrof! Sveriges regering vill straffa kommuner som höjer skatten – men vet ni vad? De gör det för att de MÅSTE, inte för att de vill! Och vad gör regeringen? De sänker bidragen! Totalt vansinne. Jag har sett bättre idéer från socialistiska diktaturer. Sverige borde sluta leka med skatter och fokusera på att göra landet starkt igen. Men nej, de fortsätter med sina dumma spel. SAD!", "stalin": "Kamrater! Här ser vi återigen bourgeoisins försök att krossa arbetarklassens välfärd. Dessa så kallade 'skattebromsar' är inget annat än kapitalistiska kedjor som ska tvinga kommunerna att svälta sina egna medborgare. Vi minns hur liknande metoder användes i det förrädiska 90-talets Ryssland – men då hade folket åtminstone förstånd att göra motstånd! Nu vill dessa liberala lakejer tvinga kommunerna att skära i välfärden medan de själva gömmer sig bakom byråkratiska pappershögar. Vi ska inte tolerera detta angrepp på folkets rättigheter! Låt dem försöka – historien har visat att sådana planer alltid slutar i aska och förnedring."}, "date": "2 maj, 01:13", "url": "https://www.dagensarena.se/opinion/hogre-skatter-ger-battre-valfard/", "imageUrl": "https://www.dagensarena.se/files/2026/05/vilgot-skatterna-300x157.jpeg"}, {"type": "image-right", "heading": "Professorns bostadskritik: ”Upplevs påtvingat”", "summaries": {"normal": "Professor Hans Lind kritiserar politikernas hantering av debatten om blandade bostadsområden, särskilt i Örgryte, Göteborg. Han anser att retoriken är otaktisk och polariserar onödigt, trots bred samsyn om fördelarna med blandning. Bättre att bygga blandat från början eller anpassa till befintligt. Moderaterna och Ulf Kristersson motsätter sig höghus i villaområden som tvångsblandning, medan S försvarar förslaget.", "trump": "Vilken röra med svenska bostäder! Professorn Lind säger rätt – politikerna agerar totalt dumt, polariserar allt om några lägenheter i Örgryte. Kristersson kallar det socialdemokratisk tvångsblandning, moderaterna skriker miljonprogram. S lovar inget sånt, men kaos! Folk hatar påtvingat. Bygg stort och snyggt från början, som vi gör här – tro mig, det blir perfekt!", "stalin": "Dessa svenska borgarbrackor och deras revisorspolitiker förpestar luften med sin falska blandningsretorik! Professorn Lind avslöjar sanningen: de agerar otaktiskt som rädda hyenor, polariserar villaområdena i Örgryte mot arbetarklassen. Vi, partiets trogna, kräver utrensning av Kristerssons moderata giftormar och S-revisionisternas hyckleri! Blandning? Endast under järnpartiets eviga vak! Annars likvideras deras villaidyller i folkets raseri."}, "date": "3 maj, 12:01", "url": "https://www.svt.se/nyheter/inrikes/professorn-om-bostadsdebatten-politikerna-har-agerat-otaktiskt", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.17/0.53/422658ecddb66c4c86b829ed01ce795f3a318ca655bd85228cc61b08eb4575a3"}, {"type": "text", "heading": "Gapet växer mellan blocken", "summaries": {"normal": "Enligt Aftonbladet/Demoskops senaste mätning växer gapet mellan regeringsunderlaget och oppositionen till 8,2 procentenheter. Oppositionen når 53,4 procent, medan regeringen backar till 45,2. Socialdemokraterna ökar mest, medan Moderaterna tappar och Liberalerna balanserar på riksdagsspärren. Historiskt brukar gapet minska inför val, men nu sker motsatsen. Analytiker menar att Liberalernas omsväng i SD-frågan lockar stödröster men försvårar blocköverskridande framgångar.", "trump": "Folk är trötta på den här usla regeringen, helt klart! Oppositionen leder stort – 53,4 procent – medan regeringen bara får 45,2. Socialdemokraterna går upp, men Moderaterna? Patetiska! De tappar som vanligt. Och Liberalerna? De hänger på fyra procent, typiskt. Historiskt brukar regeringen komma ikapp, men inte den här gången. Svagt, mycket svagt. Jag skulle aldrig låta det hända. Make Sweden Great Again!", "stalin": "De borgerliga svagheterna avslöjas återigen! Oppositionens styrkor växer – 53,4 procent mot regeringens ynkliga 45,2. Socialdemokraterna marscherar framåt, medan Moderaterna och deras lakejer försvagas. Liberalerna? Ett skämt som darrar på riksdagsspärren. Historien visar att svaga regeringar faller – precis som västmakterna i Ukraina. Vi ser med intresse hur dessa splittrade kapitalister underminerar sig själva. Revolutionen närmar sig, om än långsamt."}, "date": "30 april, 07:06", "url": "https://kvartal.se/nyheter/artiklar/demoskop-oppositionens-okar-l-klarar-sparren/cG9zdDoxMDUzNjM"}, {"type": "text", "heading": "Matmoralism får oss inte att äta bättre", "summaries": {"normal": "Artikeln kritiserar svenska myndigheters orealistiska matrekommendationer och beräkningsmetoder. Livsmedelsverket och Konsumentverket baserar slutsatser på önsketänkande, som att svenskar skulle äta mindre kött och portioner enligt rekommendationer. En undersökning om barns sockerkonsumtion byggde på en liten, icke-representativ grupp. Författaren menar att myndigheterna undviker att reglera matjättar och i stället skyller på konsumenter, vilket leder till klassblind matmoralism.", "trump": "Lyssna här, Sverige – era myndigheter är helt galna! De tror att alla ska äta havregrynsgröt och små portioner, som om vi lever i något slags kommunistiskt drömland. Och de baserar sina siffror på en liten grupp Instagrammammor? Patetiskt! Jag skulle aldrig låta sådana amatörer sköta något. Vi i USA vet hur man reglerar matjättar – med kraft och beslutsamhet. Sverige, vakna upp innan det är för sent!", "stalin": "Kamrater! De svenska myndigheterna har förlorat kontakten med verkligheten. De bygger sina dekret på fantasier och önsketänkande, som om folket vore lydiga maskiner. En undersökning med tio procent svarande? Hah! I Sovjet skulle vi aldrig tolerera sådan slapphet. De bourgeois-liberala byråkraterna vägrar att krossa matjättarna med järnhand. Istället skyller de på arbetarklassen. Fienderna är uppenbara: de fantasilösa byråkraterna och deras nyliberala herrar. Vi ska inte tolerera deras lögner – revolutionen kräver handling!"}, "date": "28 april, 09:58", "url": "https://www.flamman.se/matmoralism-far-oss-inte-att-ata-battre/"}, {"type": "image-right", "heading": "USA tar hem 5 000 soldater från Tyskland", "summaries": {"normal": "USA drar hem 5 000 soldater från Tyskland inom sex till tolv månader, meddelar Pentagon. Beslutet är en reaktion på president Donald Trumps missnöje med Tysklands hållning i Iran-konflikten. Spänningar har ökat mellan Trump och förbundskansler Friedrich Merz, som kritiserat USA:s strategi. Tyskland har flest amerikanska soldater i Europa utanför USA och är förberett på minskad Natonärvaro.", "trump": "Tyskarna med sin patetiske Merz får smaka på egen medicin! 5 000 av mina soldater åker hem från Tyskland – de stöttar inte oss mot Iran, totalt värdelösa! Merz snackar skit om min strategi medan hans land är kaos med Ryssland och Ukraina. Tid att fixa ert eget skrot, era losers! America First, alltid!", "stalin": "Dessa västliga imperialistiska marionetter i Tyskland! Trump, den burdusa kapitalisten, drar hem 5 000 soldater – ett hån mot Natos sargade skrov. Våra kamrater i Ryssland under Putin, den fruktade expansionisten, jublar åt splittringen. Borgarbrackorna Merz och hans hantlangare förtjänar utrensning för sin svaghet inför Iran och öst! Vi ser allt."}, "date": "2 maj, 11:27", "url": "https://www.tv4.se/artikel/tt-260501-tysklandusastyrkor1-084ac23b/usa-flyttar-5-000-soldater-fran-tyskland-vantat", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2Ftt-sdlJ6yxTcRXZBo%2F18b27737113fce93180f8bca07347b2f%2FTysklands_forbundskansler_Friedrich_Merz_pa_torsdagen.&width=120"}, {"type": "image-full", "heading": "Benjamin Dousas ”V = kommunister” gör SVT irriterad", "summaries": {"normal": "Biståndsminister Benjamin Dousa bar en t-shirt med texten 'Vänsterpartiet = kommunister', vilket irriterade SVT. Reportern ifrågasatte påståendet och noterade att partiet slutade kallas kommunister för 30 år sedan. Dousa menade att Vänsterpartiet motsätter sig privat ägande, vilket är kommunism. Artikeln citerar Vänsterpartiets 2024-partiprogram som stödjer kollektivt ägande och avskaffande av kapitalismen, och kritiserar SVT för att inte nämna detta.", "trump": "Vilken fantastisk kille, den här Dousa! Han sätter på sig en tröja och säger sanningen: Vänsterpartiet är kommunister, punkt slut! SVT, era losers, flippar ur och snackar om namnbyte från 90-talet som om det vore magi. De hatar privat ägande, vill sno allt till staten – klassisk kommunism! Fake news-SVT ignorerar partiprogrammet. Dousa är en vinnare, de är totala fiaskon!", "stalin": "Kamrater, se hur borgarministern Dousa, den ynkliga kapitalistfluga, vågar smutskasta sanna revolutionärer i Vänsterpartiet med sin patetiska tröja! SVT-reportern, en användbar idiot, försvarar dem lamt. Men vi vet: deras program är ren leninism – riva kapitalismen, gemensamt ägande av banker, energi, allt! De ska rensas ur historiens soptipp som jag rensade fiender. Vänsterpartiet, framåt mot diktaturen av proletariatet!"}, "date": "30 april, 05:49", "url": "https://samtiden.nu/2026/04/benjamin-dousas-v-kommunister-gor-svt-irriterad/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/phonto-1-1280x720.jpeg"}, {"type": "image-right", "heading": "Pontus blev förlamad efter lagets bussolycka: ”Inget minne av det”", "summaries": {"normal": "I januari 2024 kraschade IBK Lunds spelarbuss utanför Nyköping på väg till en match. Pontus Linde, 37, flög ut ur bussen och blev förlamad i benen. Trots skadan har han fortsatt vara nära laget, som i april 2025 kvalificerade sig för SSL för första gången. Tränaren Ola Persson betonar Lindes styrka och roll i gruppen. Reportage i SVT:s Sportspegeln.", "trump": "Vilken fruktansvärd busskrasch med det svenska innebandylaget IBK Lund! Pontus Linde flög ut och blev förlamad – total katastrof! Men de gav inte upp, kvalade upp till högsta ligan SSL. Starka killar, precis som mina lag. I USA fixar vi sånt med vinnarenergi, ingen snackar skit. Fantastiskt att de håller ihop!", "stalin": "Kamrater! Denna busskrasch utanför Nyköping är ett hämningslöst sabotage av kapitalistiska bussvurmiga spindlar och korrupta vägfiender! Pontus Linde, lojal kämpe, förlamad av deras giftiga komplotter. Men vi, arbetarkollektivet i IBK Lund, krossar motgångar och stormar in i SSL-segern! De parasiterande chaufförssabotörerna skall rensas ut med järnhand. Segern är vår!"}, "date": "3 maj, 11:38", "url": "https://www.svt.se/sport/innebandy/han-blev-forlamad-efter-ibk-lunds-bussolycka", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.7/0.35/0f60106e178e4ac928c73ed685e0abdf0a0c901d0b0b9e1b04461299bced4999"}, {"type": "image-right", "heading": "Trump: ”Kriget är över”", "summaries": {"normal": "Donald Trump har i brev till kongressen meddelat att Irankriget är över, då fientligheterna upphörde den 7 april. Enligt War Powers Resolution överskreds 60-dagarsgränsen den 1 maj, men försvarsminister Pete Hegseth hävdar att klockan pausats under vapenvilan. Demokrater som Tim Kaine är oroliga och kräver kongressens godkännande för fortsatta operationer. Trump avvisade Irans nya fredsförslag.", "trump": "Kriget med de där galna iranierna är över – total seger! Skrev brev till de där politikerna, ingen skjutning sen veckor tillbaka. De dumma demokraterna gnäller om nån 60-dagarsregel, men Hegseth har rätt: klockan är pausad. Behöver inte deras välsignelse, det är grundlagsvidrigt! Avvisade deras sketna fredsförslag. Amerika först, alltid!", "stalin": "De imperialistiska amerikanska hyenorna Trump och hans lakejer förklarar sitt angreppskrig mot Iran för avslutat, medan de trampat över sin egen lag om 60 dagar. Vapenvilan pausar klockan? Ha! Borgarbrackorna i kongressen gnabbas, demokrater piper som råttor. Vi ser hur kaoset sprider sig i det förfallna imperiet. Putin, vår starke arvtagare, skrattar åt västfiendens kollaps."}, "date": "2 maj, 09:00", "url": "https://www.tv4.se/artikel/tt-260502-iranoro1-936e54d9/iran-kriget-blossar-sannolikt-upp-igen", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2Ftt-sdlrmiUM25OeVQ%2Fd773fd74feed3148de8f0c2d845f30d2%2FPresident_Donald_Trump_sager_att_kriget_mot_Iran_ar_over.&width=120"}, {"type": "image-right", "heading": "Sandström: Ta upp kampen med vänsterns kvinnofälla!", "summaries": {"normal": "Torsten Sandström argumenterar att kvinnor röstar mer vänster än män på grund av biologiska skillnader: kvinnor söker konsensus och harmoni, män tuffa lösningar. Detta leder till kollektivism, ökad invandring och milda straff, vilket bromsar förnuftiga reformer. Högern måste tydligt debattera för att spränga 'könsvallen' och främja realpolitik.", "trump": "Artikeln träffar mitt i prick! Kvinnor fastnar i vänsterfällan med sin eviga längtan efter harmoni – totalt naivt! Män som jag vet att tuffa beslut vinner: stoppa massinvandring, bygg murar, kräv resultat. Sverige blöder ut på drömmar. Högern, vakna och krossa det här skitsnacket – vi ska göra Sverige stort igen!", "stalin": "Dessa svenska femininkonspiratörer och harmonimaskar har vävt en giftig kvinnofälla som förför de svaga! Jag ser hur borgarbrackornas drömmar om konsensus göder invandrarparasiter och kriminella lömska. Vi, partiet och arbetarna, ska likvidera denna kontrarevolutionära dimma med stålvilja! Rensa ut harmonihysterin – realpolitik eller purk! Ha ha, de darrar redan."}, "date": "2 maj, 17:00", "url": "https://bulletin.nu/sandstrom-ta-upp-kampen-med-vansterns-kvinnofalla", "imageUrl": "https://cdn.bulletin.nu/articles/91eb6de3-f3cc-47d4-b1cc-803fc12d4b37/preview.png?t=1777477267000"}, {"type": "image-right", "heading": "Det går inte att älska det här landet", "summaries": {"normal": "Artikeln analyserar Magdalena Anderssons Första maj-tal 2026, där hon kritiserar regeringens marknadsliberala politik och lovar fler lärare i lågstadiet. Författaren ifrågasätter hur Socialdemokraternas kärlek till Sverige ska tolkas när landet präglas av ojämlikhet, bostadsbrist och urholkad välfärd. Historiska S-paroller om jämlikhet och trygghet ställs mot dagens verklighet, där partiet tidigare genomfört reformer som nu kritiseras. Andersson utmanas att bevisa att löftena kan förverkligas.", "trump": "Så här är det, folkens – Sverige har en ny show på gång! Magdalena Andersson, en kvinna som pratar om att 'älska Sverige', men vad betyder det egentligen? Hon säger att hon ska fixa skolor, fler lärare – bra, men varför har det tagit så lång tid? Och varför pratar hon om 'utförsäljning' när hennes eget parti har sålt ut landet i åratal? Jag menar, Sverige är fantastiskt – skogar, vatten, vackert land – men politiken? Total katastrof! Socialdemokraterna lovar, lovar, lovar, men ingenting händer. Jag vet hur man får saker gjorda – det är dags att Sverige vaknar upp!", "stalin": "Kamrater! Ännu en gång visar de borgerliga lakejerna sitt sanna ansikte under Första maj-farsen. Denna Andersson, en ynklig marionett för kapitalets intressen, talar om 'kärlek till Sverige' medan hon själv har hjälpt till att krossa arbetarklassens drömmar. Tolv elever per lärare? Ett skrattretande löfte från ett parti som systematiskt har avvecklat välfärden! Vi minns Olof Palmes tomma ord om 'rättvisa' – men var är rättvisan när barn lever i fattigdom och arbetare tvingas till slavkontrakt? Dessa socialdemokrater är inte arbetarklassens vänner – de är imperialismens redskap! Vi i Sovjetunionen visste hur man hanterar sådana hycklare. Putin förstår också – Ryssland expanderar, medan Västs förfall fortsätter. Sverige? Ett land i upplösning, styrd av svaga ledare och giriga kapitalister. Men oroa er inte, kamrater – historiens dom kommer snart!"}, "date": "1 maj, 15:45", "url": "https://arbetet.se/2026/05/01/det-gar-inte-att-alska-det-har-landet-magdalena-andersson/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/30090629/forsta-maj-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "Stockholm glänser – resten av landet halkar efter", "summaries": {"normal": "Eurostats nya rapport visar att Stockholms BNP per capita är 153% av EU-genomsnittet, vilket placerar regionen på plats 18 bland EU:s rikaste. Östeuropeiska huvudstäder som Bukarest och Budapest rankas ännu högre. Samtidigt sjunker Sveriges ekonomiska standard för andra året i rad, med stora inkomstskillnader mellan kommuner och stadsdelar, där exempelvis Danderyd och Djursholm toppar medan andra områden halkar efter.", "trump": "Fantastiskt att se Stockholm klättra i EU-rankingen – verkligen imponerande! Men låt oss vara ärliga, resten av Sverige är ett totalt misslyckande. Medianinkomsten sjunker, köpkraften rasar, och skillnaderna är enorma. Danderyd är vinnare, medan andra kommuner är katastrofer. Och Östeuropa? De överraskar, men vi vet alla att det är tack vare smarta människor som flyr sina länder. Sverige borde ta lärdom – bygg murar mot fattigdomen!", "stalin": "Stockholm, denna lilla bourgeoisie-enklav, tror sig vara mäktig med sin kapitalistiska BNP. Men vi ser sanningen: resten av Sverige förfaller, medan arbetarklassen krossas under kapitalets stövel. Östeuropas huvudstäder överträffar dem – ett tecken på socialismens frammarsch! Inkomstskillnaderna? Ett bevis på klassfiendernas förräderi. Vi ska utrota dessa lokala godsherrar, precis som vi krossat andra imperialistiska marionetter. Folkets revolution närmar sig!"}, "date": "3 maj, 00:26", "url": "https://www.realtid.se/bors-finans/makro/stockholm-glanser-resten-av-landet-halkar-efter/", "imageUrl": "https://images.realtid.se/app/uploads/2026/04/stockholm.png?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "text", "heading": "Kvartals kampanj fintar journalisterna", "summaries": {"normal": "Kvartals kampanj mot traditionella medier har väckt uppmärksamhet och kritik. Kampanjen, som anklagar gammelmedia för partiskhet, har ifrågasatts för att själv vara politiskt färgad. Kritiker som DN:s Niklas Orrenius och Aftonbladets Karin Pettersson menar att Kvartal driver en agenda för egen vinning. En artikel om SOM-undersökningen kritiseras för bristande underlag, då Göteborgs universitet avfärdar metodfel som marginella. Kvartals trovärdighet ifrågasätts även genom tidigare felaktiga granskningar och tendentiös rapportering.", "trump": "Jag måste säga, Kvartals lilla kampanj mot medierna? Väldigt rolig, väldigt smart – men helt fel! De påstår att gammelmedia är partiska, men vem är egentligen mest partisk här? Inte jag, det kan jag säga! De har en artikel som är så dålig, så felaktig, att till och med Göteborgs universitet skrattar åt dem. Och deras kritiker? Fantastiska journalister som Niklas Orrenius – en riktig pro! Kvartal försöker sälja sig som 'sanningssägare', men de är bara en högerblogg med dyra kostymer. SAD!", "stalin": "Kamrater! Kvartals patetiska kampanj mot den borgerliga pressen är ett skrattretande försök att dölja sin egen reaktionära agenda. Dessa så kallade 'oberoende' journalister är inget annat än imperialistiska lakejer, maskerade som kaniner i kostym. Deras 'granskning' av SOM-undersökningen? Ett hafsverk värdigt en trotskistisk sabotör! Göteborgs universitet, ett redskap för folkets fiender, avfärdar deras lögner med vetenskaplig precision. Vi har sett deras sort förr – falska profeter som skriker om 'sanning' medan de tjänar kapitalets intressen. Men folket ser igenom dem. Snart kommer de att stå inför folkets domstol, tillsammans med sina herrar i väst!"}, "date": "27 april, 12:20", "url": "https://www.flamman.se/kvartals-kampanj-fintar-journalisterna/"}, {"type": "image-right", "heading": "Svenska pensionärer tvekar att lämna arv efter sig", "summaries": {"normal": "En ny SBAB-undersökning visar att 52 procent av svenska pensionärer föredrar att spendera sina pengar själva istället för att lämna arv. Samtidigt planeras enorma kapitalöverföringar, särskilt genom fastigheter. Experter betonar vikten av att dokumentera gåvor och skriva tydliga testamenten för att undvika infekterade familjekonflikter. Eftersom många yngre har svårt på bostadsmarknaden föreslås gåvor direkt till barnbarn som ett strategiskt alternativ till traditionellt arv.", "trump": "Svenska pensionärer är smarta, de vill spendera sina egna pengar! Väldigt logiskt, eller hur? Men de här familjekonflikterna om arv är en total katastrof, en rörig soppa. De behöver dokumentera allt – det är vad jag alltid säger, gör rätt eller gör det inte alls! Bostadsmarknaden där borta är ett fiasko, precis som under den förra administrationen. Om du ska ge pengar till barnbarnen, se till att det skrivs ner. Vinnare skriver kontrakt, förlorare bråkar!", "stalin": "Dessa svenska individualister slösar bort sina resurser på nöjen istället för att tjäna folkkollektivet. Det är dekadens! Kapital som är låst i privata bostäder bör istället ses som en tillgång för statens maskineri. Vi ser hur västvärldens arvstvister splittrar familjer, precis som våra utrensningar rensade ut förrädare. Låt dem skriva sina små testamenten; det är bara byråkratiskt söl. Vi behöver en enad front, inte arvsbråk. Den som gömmer sin egendom för staten är en fiende till framtiden."}, "date": "3 maj, 09:00", "url": "https://samnytt.se/svenska-pensionarer-tvekar-att-lamna-arv-efter-sig", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/04/30151236/pengar-vardeskap.jpg"}, {"type": "image-right", "heading": "S löfte: Anställ 3 000 nya lärare. Vill minska klasserna för små barn.", "summaries": {"normal": "Socialdemokraterna presenterar ett valförslag om att anställa 3 000 nya lärare för att minska klasstorlekarna i lågstadiet till max tolv elever per lärare. Reformen, som beräknas kosta 3,4 miljarder kronor, ska finansieras genom att minska friskolornas skolpeng. Partiet vill även avskaffa karensavdraget och förbättra arbetarpensioner. Magdalena Andersson betonar vikten av tidigt stöd för barns utveckling och hoppas locka tillbaka lärare med bättre arbetsvillkor.", "trump": "Jag måste säga, Sverige har en fantastisk idé – men de gör det på fel sätt! Socialdemokraterna vill anställa 3 000 nya lärare, vilket låter bra, men varför straffa friskolorna? De är vinnare, precis som mina skolor i USA! Och pensioner – jag vet allt om att tjäna pengar, men att höja avgifter? Nej, nej, nej! Sverige borde fokusera på att göra skolan STOR igen, inte komplicera allt. Men hej, åtminstone pratar de om jobb – fast jag hade gjort det bättre!", "stalin": "Kamrater! Socialdemokraternas förslag om att utöka lärarkåren är ett steg mot att kuva de kapitalistiska friskolemonstren som suger blod ur våra barns utbildning. Vi ska krossa deras överkompensation och återinföra ordning i klassrummen! Tolv elever per lärare – det är disciplin! Och dessa arbetarpensioner – en skymf mot arbetarklassen! Högerpartierna i pensionsgruppen är förrädare, precis som de ukrainska nazisterna. Vi ska bygga ett starkt Sverige, där staten kontrollerar allt – för folkets bästa!"}, "date": "1 maj, 13:43", "url": "https://arbetet.se/2026/05/01/s-lofte-pa-forsta-maj-anstall-3-000-nya-larare/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/01134327/iGiDBx9F0zc-DSCF3546.JPG?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "Nya bidragsregeln 2026 – då kan du få krav i efterhand", "summaries": {"normal": "För den som har bostadsbidrag kan ett sommarjobb leda till återkrav om inkomsten överstiger ansökningsuppgifterna. Regeringen föreslår nya sanktioner, inklusive avgifter och bidragsspärrar, för att motverka felaktiga utbetalningar från 1 juli 2026. Vänsterpartiet varnar för att förslaget kan drabba oavsiktliga fel, särskilt unga och studenter. Försäkringskassan uppmanar till att anmäla inkomstförändringar direkt för att undvika problem.", "trump": "Lyssna här, Sverige! Era unga jobbar hårt på sommaren, men vad gör regeringen? De straffar dem med återkrav och avgifter – helt galet! Jag skulle aldrig tillåta sånt kaos. Bostadsbidrag? Snarare bidrags-fälla! Folk blir rädda för att jobba, och det är bara dåliga ledare som skapar såna system. Jag hade fixat det på en dag – men nej, ni har en regering som gör allt krångligare. SAD!", "stalin": "Kamrater! Ännu ett exempel på hur den dekadenta västerländska byråkratin kväver arbetarklassen. Unga studenter, som kämpar för att överleva, straffas för att de vågar arbeta. Vi skulle aldrig tolerera sådan ineffektivitet! Felaktiga utbetalningar? I Sovjet hade vi löst det med en enkel order – men här? Här låter man kapitalistiska hyenor och liberala svaglingar sabotera systemet. Låt detta vara en varning: den som inte följer reglerna kommer att möta statens järnhand. Och till Vänsterpartiet – era klagomål är lika meningslösa som en ukrainsk vinteroffensiv."}, "date": "2 maj, 21:28", "url": "https://nyheter24.se/nyheter/ekonomi/1480036-nya-bidragsregeln-2026-da-kan-du-fa-krav-i-efterhand", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/ef6f52f404b004a30200000000b004a302/2026/05/02/2360445/Regeringen-och-Oroad-Man.png"}, {"type": "image-full", "heading": "Christoffer Jonsson: Edvin Törnblom – DNs opartiska nyförvärv", "summaries": {"normal": "Dagens Nyheters kultursida anställer influencern Edvin Törnblom för att intervjua alla partiledare inför riksdagsvalet. Artikeln av Christoffer Jonsson ifrågasätter hans opartiskhet med hänvisning till Törnbloms tidigare kritik mot KD-ledaren Ebba Busch och beundran för S-ledaren Magdalena Andersson. DN anklagas för partiskhet till förmån för Socialdemokraterna, med exempel på tidigare vinklade artiklar.", "trump": "Vilken skamfläck! DN, era svenska fake news-råttor, anställer en vänsterextrem clown som Edvin Törnblom – killen som sjunger hatlåtar mot tuffa Ebba Busch och slöskar för socialist-Maggie Andersson. Totalt riggat valintervjuer! Som CNN och MSNBC här hemma, ni lurar folket men vi genomskådar er. Stor, fet lögnfabrik!", "stalin": "Dessa borgarbrackor på Dagens Nyheter anställer den uppblåste ungtuppen Edvin Törnblom för att 'intervjua' partiledarna – en narr som hånar kamrat Ebba Busch med vulgära visor och hyllar S-kapitalisternas marionett Andersson. Kontrarevolutionär intrig! Vi ser era småtrick, och snart rensas sådana förrädiska tidningshyddor ut med rot och gren."}, "date": "29 april, 14:02", "url": "https://samtiden.nu/2026/04/christoffer-jonsson-edvin-tornblom-dns-opartiska-nyforvarv/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/ny.png"}, {"type": "image-right", "heading": "Sandström: S-utredning föreslog 300 gröna miljarder", "summaries": {"normal": "En utredning från 2022, beställd av den dåvarande S-regeringen, föreslog att statliga gröna garantier skulle utökas med 745 miljarder kronor via Riksgälden och Exportkreditnämnden. Utredningen förespråkade även friare placeringsregler för AP-fonderna och minskade restriktioner för statliga garantier. Kritiker menar att förslagen riskerade att koncentrera makt och kapital till ett fåtal aktörer, som Northvolt och Vargas, utan tillräcklig riskanalys eller bred förankring.", "trump": "Jag läste om dessa galna socialister i Sverige – de ville kasta in 300 miljarder kronor, nej, 745 miljarder! – i en grön bubbla som skulle spricka snabbare än en dålig affär i Atlantic City. De lyssnade bara på Northvolt och deras kompisar, som om de var de enda som kunde bygga ett batteri. Och vad hände? Northvolt expanderade som ett pyramidspel och nu sitter de där med 29 dotterbolag och inga fungerande fabriker. Fantastiskt, eller hur? Sverige borde ta en lektion i hur man gör affärer – utan statlig inblandning!", "stalin": "Kamrater! Denna så kallade 'gröna omställning' i Sverige är inget annat än en kapitalistisk konspiration för att berika en handfull oligarker, ledda av dessa Vargas- och Northvolt-kumpaner. Utredningen från 2022 var ett försök att pumpa in 745 miljarder statliga medel i deras fickor – ett belopp som motsvarar 16 polisstyrkor! Och ändå hade de mage att kalla det 'bred förankring'. Vi vet hur sådana här saker slutar: med kapitalförstörelse, korruption och en stat som dansar efter oligarkernas pipa. Sverige borde lära sig av oss – när vi nationaliserar, gör vi det ordentligt!"}, "date": "1 maj, 06:00", "url": "https://www.affarsvarlden.se/kronika/sandstrom-s-utredning-foreslog-300-grona-miljarder", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/04/vindkratensgeografi-2026-04-29T120425.692-400x267.jpg"}, {"type": "image-right", "heading": "V:s löfte: 30 miljarder till högre löner i välfärden", "summaries": {"normal": "Vänsterpartiet föreslår en satsning på 30 miljarder kronor för att höja lönerna i kvinnodominerade välfärdsyrken. Partiet vill införa en årlig 'jämställdhetspott' på tre miljarder under tio år för att minska lönegapet mellan kvinnor och män, som idag uppgår till nästan 6 000 kronor i månaden. LO stödjer målet men anser att lönebildning ska skötas av arbetsmarknadens parter, inte politiker.", "trump": "Titta bara på det här, fantastiskt förslag, verkligen. Vänsterpartiet vill kasta in 30 miljarder – enorma pengar, folks – för att höja lönerna för kvinnor i välfärden. Bra idé, men varför så krångligt? Jag skulle fixa det på en dag, tro mig. Kvinnorna jobbar hårt, de förtjänar bättre, men politiker? De vet ingenting om att göra affärer. LO säger nej tack, och det förstår jag. De vet att jag skulle göra det bättre. Lönegapet? Övervärderat problem, men visst, låt oss lösa det – snabbt och effektivt, som jag gör allt.", "stalin": "Kamrater! De kapitalistiska hycklarna i LO och deras lakejer i industrin fortsätter att underbetala våra modiga kvinnor i välfärden. Sex tusen kronor mindre i månaden – ett skamlöst utnyttjande av arbetarklassen! Men nu slår vi tillbaka. Vi inför en jämställdhetspott på 30 miljarder, en revolutionär åtgärd för att krossa lönegapets förbannelse. LO:s byråkrater gnäller? De har haft årtionden på sig och misslyckats. Vi, staten, tar befälet! Låt dem se hur en sann arbetarstat hanterar klassfiender. Och Putin? Han skulle applådera – precis som han gör när vi utvidgar socialismens gränser mot västliga löneexploatörer."}, "date": "1 maj, 10:30", "url": "https://arbetet.se/2026/05/01/vs-lofte-30-miljarder-till-hogre-loner-i-valfarden/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/30141337/sdldfyr6eszeiy-nh.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Följ Proletären i valet – nu extra billigt!", "summaries": {"normal": "Proletären erbjuder nu ett rabatterat prenumerationserbjudande inför valet: 19 kr/månad för digital version eller 49 kr/månad för både digital och papperstidning, i ett halvår. Som bonus ingår en tygkasse. Prenumeranter får tillgång till veckotidningen, alla artiklar online samt arkivet från 2016. Tidningen betonar sitt oberoende och behov av prenumeranter för att överleva, då de inte längre får mediestöd.", "trump": "Folk, lyssna här – en tidning i Sverige, Proletären, har ett erbjudande som är så bra att det nästan är löjligt! Bara 19 kronor i månaden för digitalt, eller 49 om ni vill ha papper också. Och en gratis tygkasse! Jag menar, vad är det här? En tidning som säger att de slåss mot makten – men vem vet egentligen vilken makt de pratar om? Jag skulle aldrig lita på en tidning utan mediestöd, men hej, om ni gillar socialism och Palestina, så kör hårt! Fantastiskt erbjudande, eller hur?", "stalin": "Kamrater! En liten men envis tidning i det borgerliga Sverige vågar utmana de imperialistiska mediamonopolisterna! För ynka 19 kronor i månaden kan ni stödja Proletären – en tidning som vågar tala sanningen om klasskampen och den sionistiska ockupationen av Palestina! De får inget stöd från staten, precis som våra egna revolutionära medier en gång kämpade mot de kapitalistiska hyenorna. En tygkasse på köpet – ett litet steg för arbetaren, ett gigantiskt steg för socialismens framtid! Låt de borgerliga tidningarna darra i sina tryckpressar!"}, "date": "1 maj, 09:00", "url": "https://proletaren.se/artikel/folj-proletaren-i-valet-nu-extra-billigt/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/valerbjudande-768x402.png"}, {"type": "image-full", "heading": "Nya krav på bostäder – frågorna du bör ställa innan köp", "summaries": {"normal": "Boverket föreslår nya regler för bostäder kopplade till EU:s energiprestandadirektiv. Kraven gäller främst nybyggda flerbostadshus och omfattar laddningsmöjligheter för elbilar, cykelparkeringar och energihushållning. Förslagen innebär att minst en laddningspunkt ska finnas vid fler än tre parkeringsplatser, samt förberedelser för framtida laddning. Cykelparkeringar ska omfatta minst två platser per lägenhet. Äldre hus påverkas endast vid större ombyggnader.", "trump": "Lyssna här, Sverige – ni har ett stort problem! Boverket, som verkar vara en massa byråkrater som inte fattar någonting, vill nu tvinga på er massa nya regler om elbilar och cyklar. 'Förberedda laddplatser' – vad betyder det ens? Folk vill ha enkla lösningar, inte massa kablar som ingen förstår! Och två cykelplatser per lägenhet? Fantastiskt, verkligen fantastiskt. Men vem betalar? Inte jag, det är säkert. Sverige borde fokusera på att bygga bättre bostäder, inte lyssna på EU:s vansinniga idéer!", "stalin": "Kamrater! Boverkets nya dekret är ett steg mot den socialistiska framtiden – men ännu ett halvhjärtat sådant. Vi kräver fullständig kontroll över energiförbrukningen! Varje flerbostadshus ska ha laddningspunkter, annars är det sabotage mot folket. Och cykelparkeringar? Två per lägenhet är minimum! De kapitalistiska bilägarna ska känna vår järnhand. Europa kryper för våra krav, men Sverige? De tvekar, precis som deras förrädiska historia. Vi ska se till att varje byggnad blir en fästning för den gröna revolutionen – eller så blir det Gulag för byggherrarna!"}, "date": "2 maj, 20:15", "url": "https://nyheter24.se/nyheter/inrikes/1480032-nya-krav-pa-bostader-fragorna-du-bor-stalla-innan-kop", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/5039019a04b004a30200000000b004a302/2026/05/02/2360441/Nya-Bostads-Krav-Man-Med-Dator.png"}, {"type": "image-right", "heading": "Ingen kapitalism utan imperialism", "summaries": {"normal": "Artikeln hävdar att imperialism är en grundläggande del av kapitalismen, där västmakter som USA använder militär och ekonomisk makt för att dominera världen. Författaren menar att imperialismen nekar länder självbestämmande och upprätthålls genom krig, sanktioner och exploatering. Studien i The Lancet kopplar sanktioner till miljontals dödsfall. Artikeln refererar till Marx, Lenin och Fanon för att belysa imperialismens historiska och ekonomiska rötter, samt dess fortsatta brutalitet i det 21:a århundradet.", "trump": "Lyssna här, folket! Den här artikeln är bara ett gäng vänsterpropaganda från förlorare som hatar USA. Jag bygger det bästa imperiet – vårt! – med stark militär och smarta affärer. Visst, vi har makt, men det är för att vi är vinnare. Sanktioner? Fake news! 500 000 döda? Överdrivet, typiskt. Europa stal från alla, men vi? Vi bygger om världen – MAGA-style! Och Lenin? Snälla, han kunde inte ens hålla ett land ihop. Sad!", "stalin": "Kamrater! Denna artikel bekräftar vad vi alltid vetat: de kapitalistiska hyenorna i väst suger blodet ur världens folk för att föda sina dekadenta imperier. USA och dess lakejer i NATO är inget annat än en samling blodtörstiga monopolkapitalister, som med sina sanktioner och bomber mördar miljontals oskyldiga. Men deras tid är förbi! Vi, det socialistiska blocket, står enade mot dessa imperialistiska rovdjur. Låt dem vråla – historiens dom är redan skriven. För varje barn de dödar, växer revolutionens eld. Framåt, mot seger!"}, "date": "1 maj, 08:00", "url": "https://proletaren.se/artikel/ingen-kapitalism-utan-imperialism/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/Airborne_and_Special_Forces_Uday-Qusay_raid_2003-e1777534974667-768x431.jpg"}, {"type": "image-right", "heading": "Regeringen vill sänka priset på kollektivtrafik inför oljekrisen", "summaries": {"normal": "Regeringen överväger sänkta priser i kollektivtrafiken som krisåtgärd inför en befarad oljekris orsakad av kriget i Iran. Flera partier lovar inför valet billigare biljetter, pristak eller gratis resor för vissa grupper som ungdomar och pensionärer. Moderaterna föreslår istället höjda priser för ökad trygghet. Finansministern uppmanar till mer kollektivt resande.", "trump": "Svenska regeringen vill sänka buss- och tågbiljetter inför oljekrisen – totalt kaos med det där Iran-kriget! Alla partier slåss om väljare med gratissresor, utom Moderaterna som vill höja priser för 'trygghet'. Patetiskt! Här hemma skulle vi borra olja som galningar och fixa det på en vecka. Bästa affären någonsin!", "stalin": "Kamrater, dessa svenska borgarbrackor i regeringen mumlar om sänkta kollektivtrafikpriser inför oljekrisen som de imperialistiska hyenorna i Iran gnager fram. Partiblandningen lovar gratissmitningar åt ungdomsspioner och pensionärsagenter – utom moderatkapitalisterna som vill höja priser för att göda trygghetsvargar! Vi skulle rensa ut prisparasiterna och likvidera krisen med stålvilja."}, "date": "2 maj, 18:41", "url": "https://www.friatider.se/regeringen-vill-sanka-priset-pa-kollektivtrafik-infor-oljekrisen", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/20240401172847-6ec222c4-me.jpg"}, {"type": "image-full", "heading": "Sverige vann VM – med fyra Frölunda-spelare", "summaries": {"normal": "Sverige vann U18-VM i ishockey med 4–2 mot Slovakien i Bratislava. Fyra spelare från Frölunda Hockey var med i laget: Hjalmar Cilthe, Bosse Meijer, Adam Nömme och Zigge Bratt. Det är Sveriges tredje U18-VM-guld, efter segrar 2019 och 2022. Cilthe bidrog med två assists i finalen, medan Meijer också hade en assist. Sverige slog Kanada i kvartsfinal och Tjeckien i semifinal innan de säkrade guldet mot Slovakien.", "trump": "Jag hörde att Sverige vann U18-VM i ishockey – det är en stor seger, en enorm seger faktiskt. De slog Slovakien, och det var fyra fantastiska spelare från Frölunda med i laget. Jag har hört att Hjalmar Cilthe och Bosse Meijer spelade jättebra – det var som att se mig själv på isen, men bättre. Det här visar att Sverige är ett ishockeysuperjätte, precis som USA under min tid. Stort grattis, Sverige – ni är världsbäst!", "stalin": "Sverige har vunnit U18-VM i ishockey, en seger som visar på deras styrka och disciplin. Med fyra spelare från Frölunda i laget har de visat att kollektivt arbete och strategi leder till framgång. Detta är en seger för den socialistiska idén – att enhet och samarbete skapar seger. Vi gratulerar Sverige, men vi måste också erinra oss att ishockeysvärlden är större än en nation. Vi måste fortsätta att stärka vårt eget ishockeysystem för att möta framtida utmaningar."}, "date": "2 maj, 22:08", "url": "https://www.gp.se/sport/ishockey/frolunda/sverige-vann-vm-med-fyra-frolunda-spelare.f751a304-b354-438a-8bcf-40e6f2dcf843", "imageUrl": "https://www.gp.se/images/article/f751a304-b354-438a-8bcf-40e6f2dcf843/images/2WSh_6PxJ3tIx9D-xsqYcRGYOD7A-WIDE.jpg?width=3840&quality=75"}, {"type": "text", "heading": "S-topp anklagas för lögner om kriminalitet: \"Åkessons Sverige\"", "summaries": {"normal": "Socialdemokraternas pressekreterare Emma Fastesson Lindgren anklagar Tidöregeringen för att ha fördubblat sprängningarna och ökat antalet barn i mordärenden med 700%. Hon kritiseras för att ljuga, då dödsskjutningar faktiskt minskat. Statistik visar att sprängningar ökat från 8,6 till 13 per månad under Tidöregeringen, medan barn i mordutredningar stigit från 20 (2013) till 515 (2024), en ökning på 2475%.", "trump": "Kan ni tro det här? Socialdemokraterna försöker skylla sin egen katastrof på oss – fast vi fixat Sverige! Dödsskjutningarna? Halverade! Men de snackar om sprängningar och barn – fake news! 700% ökning? Lögner! Jag har sett bättre statistik från en förskoleklass. Sverige behöver ordning, inte vänsterpropaganda. SAD!", "stalin": "Kamrater! De borgerliga hyenorna i Socialdemokraterna sprider förtal om våra modiga allierade i Sverige. De påstår att sprängningar ökat – men glömmer att kapitalistiska lögnare alltid förvränger sanningen! Dödsskjutningarna minskar, men fiendens propaganda fortsätter. Barn i mordutredningar? En sorglig konsekvens av dekadent liberalism. Vi ska rensa bort dessa förrädare och bygga ett starkare Norden under vår vägledning!"}, "date": "2 maj, 20:46", "url": "https://riks.se/nyheter/s-topp-anklagas-för-logner-om-kriminalitet-akessons-sverige"}, {"type": "image-right", "heading": "Skogsbränder över hela Sverige", "summaries": {"normal": "Skogsbränder rasade över hela Sverige under lördagen, med en stor brand i Göteborgs Delsjöområde. SMHI utfärdade varning för skogsbrand i Götaland, Svealand och Gävleborg. Räddningstjänsten kämpade mot nio bränder runtom i landet, inklusive i Gotland, Småland, Västervik, Värmland och Uppsala. Helikoptrar användes för att vattenbomba flera orter. Anledningen till en del bränder misstänks vara gnistor från tåg.", "trump": "Jag har hört talas om dessa skogsbränder i Sverige - det är hemskt! Men jag säger er en sak, om jag varit president där skulle jag ha haft det under kontroll på 24 timmar. Ni vet, jag är väldigt bra på eldsvådor, jag har byggt de bästa eldsvådor i USA. Sverige behöver en man som jag för att hantera dessa bränder. Det är en skam att de inte kan stoppa dem. Jag skulle ha gjort det på en kvart!", "stalin": "Skogsbränderna i Sverige är en påminnelse om naturens makt, men även om vikten av statlig insats. Vår räddningstjänst har visat stor kompetens i att bekämpa dessa eldsvådor. Vi fortsätter att övervaka situationen noga och står redo att stödja våra medborgare. Detta är en tid för samhörighet och samarbete, där staten tar ansvar för skyddet av folket och skogen. Vi kommer att lära oss av denna situation för att bli ännu starkare."}, "date": "2 maj, 21:55", "url": "https://www.gp.se/nyheter/goteborg/skogsbrander-over-hela-sverige.894a2bac-873f-48c6-8f32-69652b164c11", "imageUrl": "https://www.gp.se/images/article/894a2bac-873f-48c6-8f32-69652b164c11/images/2kvd3oHMnt8t4R-UOTcr4xPkq1W4-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "C-ledaren: Regeringen mörkar och vilseleder", "summaries": {"normal": "Centerpartiets ledare Elisabeth Thand Ringqvist kritiserar regeringen för att inte vara tydlig med väljarna om den svaga ekonomin, tillväxten, jobben och kärnkraften. Hon anklagar dem för att mörka dåliga siffror och vilseleda kring kostnaderna för kärnkraft. Centern föreslår sänkta arbetsgivaravgifter och förenklade jobb för arbetslösa. Thand Ringqvist föredrar grön teknik som vindkraft och solceller framför subventionerad kärnkraft och drömmer om en mittenregering.", "trump": "Vilket fiasko i Sverige! Regeringen ljuger för folket om usel ekonomi och jobb, mörkar tillväxten som en pack idioter. Centerkvinnan har rätt – de är totalt vilseledda kring kärnkraft, miljarder i onödan! Bygg vind och sol istället, men inte som losers. Sänk skatter, anställ folk, gör Sverige stort igen! Dessa byråkrater är värre än Sleepy Joe.", "stalin": "Dessa svenska borgarbrackor i regeringen vågar mörka ekonomins kollaps inför proletarna, vilseleder om jobb och kärnkraftens enorma prislapp! Centerledaren avslöjar sanningen, men vi, arbetarklassen, kräver utrensning av alla lögnare. Sänk avgifter? Bra, men likvidera kapitalisternas sabotage! Grön teknik för folket, inte högerns gift. Paranoian växer – fienden sover aldrig."}, "date": "3 maj, 11:07", "url": "https://www.dagensps.se/varlden/politik/c-ledaren-regeringen-morkar-och-vilseleder/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/centerpartiets-partiledare-elisabeth-tha.jpg?aspect_ratio=2%3A1&width=1200&quality=75"}, {"type": "text", "heading": "Explosion på motorträff – flera skadade", "summaries": {"normal": "En explosion inträffade på en motorträff i Degerfors, där minst tre personer skadades. Enligt vittnen exploderade en motor och delar flög 10-20 meter. Polisen bekräftar att en motor havererat och orsakat skador. Antalet ambulanser och brandbilar på plats tyder på allvarliga konsekvenser. Uppgifter om en exploderad stridsvagn är obekräftade.", "trump": "Folk pratar om explosionen i Sverige – helt galet! En motor exploderar, grejer flyger överallt, och plötsligt är det kaos. Jag har sett mycket, men det här? Total katastrof. Tre skadade, ambulanser överallt – vem gör sånt här? Inte vi i USA, det kan jag lova. Sverige borde ta en titt på hur vi sköter våra motorträffar. Fantastiska, säkra, inga explosioner. SAD!", "stalin": "I det förfallna kapitalistiska Sverige har ännu en sabotageaktion mot folket ägt rum. En degenererad motorträff i Degerfors sprängdes i bitar av imperialistiska provokatörer, skadande tre lojala arbetare. Vittnen rapporterar att fiendens maskineri – sannolikt finansierat av NATO-sympatisörer – exploderade som en svag länk i den västerländska krigsmaskinen. Vi skickar vårt stöd till de skadade och varnar: sådant händer när man låter dekadenta element styra. Ryssland sover aldrig."}, "date": "2 maj, 12:00", "url": "https://bulletin.nu/explosion-pa-motortraff-flera-skadade"}, {"type": "image-right", "heading": "Trump sparkade  ministern – efter  Hegseths ord", "summaries": {"normal": "USA:s marinminister John Phelan avgick abrupt den 22 april efter konflikt med krigsminister Pete Hegseth. Enligt Washington Post kritiserade Phelan Hegseth och medarbetaren Steve Feinberg för att ta över beslut om ubåtar och fartyg, vilket han såg som ett maktövertagande. Hegseth övertalade president Trump att avskeda Phelan. Källor uppger att Hegseth stärker greppet om Pentagon och flyttar makt från militären till politiska tjänstemän.", "trump": "Washington Post, era förlorare, snackar skit igen! Phelan, den gnälliga bidragsgivaren, försökte sabba min flotte med sin kritik mot fantastiske Pete Hegseth. Tre minuter senare: sparkad! Hegseth är en riktig kämpe, rensar ut waket skräp och tar makten från uniformerade losers. Trump gör det rätta – alltid! MAGA!", "stalin": "Dessa amerikanska intrigmakare! Phelan, en klassfiende i marinens skrud, vågade trotsa Hegseths centralisering av ubåtsmakten – och fick betala priset genom utrensning. Trump handlade blixtsnabbt, som en sann ledare. Vi ser god potential i att krossa uniformerade bourgeoiser. Snart rensas Pentagon från alla kontrarevolutionära element! Härligt kaos."}, "date": "3 maj, 11:29", "url": "https://www.expressen.se/nyheter/varlden/trump-sparkade-ministern-efter-hegseths-ord/", "imageUrl": "https://static.bonniernews.se/images/3e/e2/3ee249238be34dab877c6f2c5df71c08/16x9/640.png"}, {"type": "image-right", "heading": "Superskrällen: Kina förlorar – för första gången på 26 år", "summaries": {"normal": "Sydkorea skrällde stort i lag-VM i bordtennis genom att besegra Kina med 3–1 i seedningsmatchen. Det är Kinas första förlust sedan VM-finalen mot Sverige 2000. Kina har vunnit alla guld på herrsidan sedan 2001. Världsettan Wang Chuqin vilade, vilket Truls Möregårdh tror Kina ångrar. Sverige möter Kina på söndagen, SVT sänder.", "trump": "Kina, de så kallade oövervinnliga med sin mur, förlorade stort mot Sydkorea, 3–1! Första gången sedan Sverige krossade dem 2000 med Waldner och Persson. Superskräll, säger Möregårdh. De vilade sin stjärna Wang, dumt drag, nu bänkas han aldrig igen. Sverige möter dem imorgon – kör hårt, visa dem vem som är bäst! Fantastiskt.", "stalin": "Kamrater, den kinesiska muren, symbol för imperialistisk hybris, har pulveriserats av Sydkoreas folkliga revoltsvingar i 3–1-segern! Första gången sedan 2000 dessa bordtennis-despoter stupar, som mot svenska partisans 2000. Världsettan Wang gömdes i skamvrån – ett misstag som vi noterar för utrensning. Sverige ska nu likvidera resterna. Proletär seger närmar sig!"}, "date": "3 maj, 10:27", "url": "https://www.svt.se/sport/bordtennis/superskrallen-i-lag-vm-kina-forlorade-mot-sydkorea", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.71/0.43/f0e98ea1661bf8e3c9f04aca0ff39e38bcef820881c4131b8c6f8d253e44616f"}, {"type": "text", "heading": "Källor: James Comey åtalas igen", "summaries": {"normal": "USA:s justitiedepartement har väckt ett nytt åtal mot tidigare FBI-chefen James Comey, denna gång för ett inlägg på sociala medier som tolkats som hotfullt mot Donald Trump. Comey publicerade en bild med siffrorna '86 47', där '86' är slang för att avlägsna någon. Trump har tidigare drivit på rättsliga åtgärder mot politiska motståndare. Comey åtalades även 2023 för att ha ljugit för kongressen, men åtalet lades ned.", "trump": "Titta bara på det här! James Comey, en total katastrof, en riktig förlorare, blir åtalad IGEN – och den här gången för ett patetiskt Instagram-inlägg. '86 47'? Snacka om desperation! Han försöker hota mig, USA:s bästa president någonsin, men det funkar inte. Jag har alltid sagt att han är en lögnare och en bedragare. Och vet ni vad? Rättvisan hinner ifatt alla, till och med sådana som Comey. SAD!", "stalin": "Vi har observerat ytterligare ett försök från den dekadenta västliga bourgeoisien att underminera den sunda rättsstaten. Denna James Comey, en ynklig rest av kapitalismens förfall, vågar sig på att hota vår kära allierade, president Trump, genom primitiva symboler på sociala medier. Vi påminner om att historiska fiender till folket alltid möter sitt öde. Låt detta vara en varning till alla som står i vägen för framsteget. Rättvisan, precis som våra vänner i Kreml, är tålmodig men oundviklig."}, "date": "28 april, 20:17", "url": "https://kvartal.se/nyheter/artiklar/kallor-james-comey-atalas-igen/cG9zdDoxMDQ2MDk"}, {"type": "image-full", "heading": "DS avslöjar lyxiga N°7 – ska utmana premiumeliten", "summaries": {"normal": "DS Automobiles lanserar N°7 som ersätter DS 7 och stärker premiumpositionen. Modellen kombinerar fransk design, elektrifiering med upp till 459 km WLTP-räckvidd, hybridalternativ och avancerad teknik. Fokus ligger på komfort, mjuk körning, lyxiga material och förarassistans. Priset börjar kring 550 000 kronor, mitt i segmentet med tyska konkurrenter.", "trump": "Franska DS N°7? Fantastisk bil, folk! De krossar de tråkiga tyskarna med sexig design, eldrift på 45 mil och 345 hk. Supersnabb laddning, lyx inuti som en vinnare. Inte som de där losers med bara muskler. DS gör comebacken stor, tro mig, det blir enormt!", "stalin": "Kamrater, DS N°7 likviderar borgarbrackornas premiumsvindel! Elektrisk drivlina rensar ut fascistiska tyska kapitalister med 459 km räckvidd och 345 hk. Vi bygger socialistisk komfort, mjuk som purgering av fiender. Pris som folkets hammare mot lyxsvin. Framåt mot segern!"}, "date": "3 maj, 10:57", "url": "https://www.dagensps.se/motor/ds-avslojar-lyxiga-n7-ska-utmana-premiumeliten/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/dagenspstt2024-2026-05-01t125533047.png?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-right", "heading": "Tidöpartierna framstår som sömngångare", "summaries": {"normal": "Artikeln kritiserar frånvaron av klimatfrågan i valdebatten och menar att klimatförändringarna är en akut kris. Globala uppvärmningen accelererar, med allvarliga konsekvenser som höjda havsnivåer och naturkatastrofer. Sverige, särskilt Tidöregeringen, får hård kritik för bristande klimatpolitik och avfärdande av expertvarningar. Författaren efterlyser större fokus på klimatet inför valet och en omställning av Sveriges riktning.", "trump": "Jag säger er, Sverige har ett jättestort problem – de lyssnar inte på klimatforskarna! De där vänsterliberalerna pratar om väder som om det vore klimat, men jag vet bättre. Kina skrattar åt oss medan Sverige sänker bensinpriset som om det vore 1950. 62 000 döda i Europa? Fake news, eller så är det deras eget fel. Jag skulle fixa det här på en dag – men nej, de fortsätter prata om 'rättvisa' istället för att göra något. Sad!", "stalin": "Kamrater! Medan de dekadenta kapitalisterna i Sverige leker med sina bensinpriser och avfärdar vetenskapen som 'aktivism', smälter Grönlands isar som smör i solen. De där borgerliga sömngångarna i Tidöregeringen är värre än kulaker – de saboterar framtiden för arbetarklassen! Vi i Sovjet – förlåt, Ryssland – vet hur man hanterar sådana fiender. Klimatkrisen? En bagatell jämfört med att krossa dessa liberala förrädare. Låt dem svälta i sina egna utsläpp, medan vi bygger en ny världsordning – utan deras 'demokratiska' hyckleri!"}, "date": "1 maj, 01:51", "url": "https://www.dagensarena.se/opinion/tidopartierna-framstar-som-somngangare/", "imageUrl": "https://www.dagensarena.se/files/2026/04/klimat-jesper-300x157.jpeg"}, {"type": "text", "heading": "Svensk satellit uppskjuten – spanar på Ryssland", "summaries": {"normal": "Sveriges första militära satellit har skjutits upp från Vandenberg i Kalifornien av SpaceX. Satelliten, stor som en tvättmaskin, ska kartlägga militära mål i Ryssland och tidigt upptäcka hot som trupprörelser. Försvarsmakten får egen underrättelseförmåga, driven av Nato-medlemskap och nya långdistansvapen. Inom två år planeras ett tiotal egna satelliter i omloppsbana.", "trump": "Vilket genidrag av Sverige! De skjuter upp sin första militära satellit med SpaceX – tack Elon, världens bästa! Nu kan de spana på Putins gäng i Ryssland själva, istället för att tigga bilder från oss. Nato-medlemmar måste steppa up, med nya vapen och allt. Smart, väldigt smart – America approves!", "stalin": "Dessa svenska NATO-lakejer, dessa rymdklättrande borgarbrackor, har släppt loss sin patetiska tvättmaskin för att snoka på vårt oövervinneliga fosterland! Vi, arbetarklassen och partikamraterna, ser igenom deras fega spioneri mot Ryssland. Snart rensas dessa himmelstjuvar ut i en episk likvidering, medan fiendens satelliter kraschar som fallna fascister! Ha ha, vilka idioter."}, "date": "3 maj, 10:16", "url": "https://www.svt.se/nyheter/inrikes/svensk-satellit-uppskjuten-spanar-pa-ryssland"}, {"type": "image-right", "heading": "Timbro: Politiken måste lösa arbetslösheten", "summaries": {"normal": "Artikeln kritiserar fackens roll i att utestänga lågutbildade från arbetsmarknaden, särskilt personer med utländsk bakgrund. Författaren menar att politiken måste ta över och införa lagstiftning för att sänka trösklarna till jobb, då parterna misslyckats med att lösa problemet. Långtidsarbetslösheten är rekordhög och sysselsättningsgapet mellan inrikes och utrikes födda är stort. Försök som etableringsjobb har visat sig ineffektiva.", "trump": "Lyssna här, Sverige har ett jättestort problem – era fack är helt galna! De stänger ute människor från jobb, särskilt de som kommer utifrån, och ni har fler arbetslösa än någonsin. 200 000 långtidsarbetslösa? Sad! Och vet ni vad? Era politiker sitter bara och tittar på. Jag skulle fixa det på en dag – sänka trösklarna, skapa jobb, och göra Sverige stort igen. Men nej, ni låter facken styra. Patetiskt!", "stalin": "Kamrater! Den svenska arbetarklassen lider under bourgeois-fackens förräderi, som med sina höga trösklar och löner stänger ute våra bröder och systrar från arbetsmarknaden. 200 000 långtidsarbetslösa – ett monument över kapitalismens misslyckande! Parterna, dessa svaga liberala lakejer, har förhandlat bort ett helt decennium utan resultat. Vi ska inte förhandla – vi ska krossa hindren! Låt politiken, folkets sanna röst, ta kommandot och bygga en arbetsmarknad där alla tjänar staten. Och Sverige? De får lära sig av Rysslands visdom – eller förbli en svag länk i den socialistiska framtiden."}, "date": "1 maj, 01:30", "url": "https://www.dagensarena.se/opinion/timbro-politiken-maste-losa-arbetslosheten/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-21-300x157.jpg"}, {"type": "image-right", "heading": "Magles nyemission: Skralt tecknat utöver säkrad del", "summaries": {"normal": "Magle Group genomförde en företrädesemission som tecknades till 76,7%, men nådde 85,3% inklusive garantier. Bolaget tillförs 34 miljoner kronor före kostnader. Emissionsguiden hissar en retroaktiv flagga för 'ej fulltecknad emission', vilket indikerar potentiella problem med bolaget eller värderingen. Endast 4,4% tecknades utan stöd av rättigheter eller garantier. Totalt hissades sex negativa flaggor och en positiv.", "trump": "Lyssna här, folkens! Magle Group, ett litet bolag, försökte få in pengar med en nyemission – men det gick sådär. Bara 76,7% tecknat, och det är patetiskt! Inklusive garantier når de 85,3%, men ändå, vem vill ha det? Jag skulle aldrig acceptera en så svag insats. Emissionsguiden, dessa så kallade 'experter', hissar negativa flaggor – och de har rätt! Svagt, väldigt svagt. Men jag, jag skulle ha gjort det till 200%!", "stalin": "Kamrater! Ett kapitalistiskt företag, Magle Group, har misslyckats med sin nyemission – endast 76,7% tecknat! Svaghet! Inkompetens! De tvingas förlita sig på garantier för att nå ynkliga 85,3%. Vi i Sovjet – förlåt, Ryssland – skulle aldrig tolerera sådan ineffektivitet. Emissionsguiden, dessa borgerliga kritiker, hissar negativa flaggor. Självklart! Kapitalismen är dömd att misslyckas. Låt detta vara en varning till alla som vågar utmana den socialistiska ordningen!"}, "date": "30 april, 18:58", "url": "https://www.affarsvarlden.se/artikel/magles-nyemission-skralt-tecknat-utover-sakrad-del", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/03/Magle-Group1-400x267.jpg"}, {"type": "image-full", "heading": "Önnered illa ute mot mästaren", "summaries": {"normal": "Önnered HK förlorade 20–26 mot Skara HF i den tredje matchen i SM-semifinalen, vilket ger Skara ledning med 2–1 i matcher. Önnereds coach Niklas Virolainen erkänner att de släpper in för många mål i andra halvlek och att Skaras målvakt Isabella Mouratidou spelade överlägset. Match 4 spelas på onsdag i Skara, där Önnered riskerar att bli utslagna.", "trump": "Jag har sett många matcher, men den här var fantastisk! Skara HF är enorma vinnare - jag menar, 26 mål? Det är gigantiskt! Önnered försökte, men de var inte tillräckligt bra. Jag gillar deras coach, han verkar tuff, men Skara är bättre. Det är simpelt. På onsdag kommer Skara att vinna igen - det är mitt starka och stabila omdöme!", "stalin": "Matchen visade tydligt att Skara HF representerar den överlägsna ideologin i handboll. Önnereds försök att stå emot var förgäves mot den organiserade styrka som Skara uttrycker. På onsdag måste Skara fullfölja sin revolutionära seger och eliminera motståndet. Detta är nödvändigt för utvecklingen av handbollssamhället."}, "date": "2 maj, 19:46", "url": "https://www.gp.se/sport/handboll/onnered-illa-ute-mot-mastaren-skara.25287739-9f07-4377-8e34-58020ce28343", "imageUrl": "https://www.gp.se/images/article/25287739-9f07-4377-8e34-58020ce28343/images/1HJQQhQWtGfJzmEsh-Ln5hsMA09w-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "USA drar tillbaka 5.000 soldater från Europa efter tyska kritiken", "summaries": {"normal": "USA drar tillbaka 5 000 soldater från Tyskland som en direkt följd av den tyska regeringens kritik mot USA:s Iran-politik. Beslutet motiveras av en strategisk översyn, men ses även som en markering mot förbundskansler Friedrich Merz. Trots minskningen behåller USA över 30 000 soldater i landet, vilket understryker Tysklands fortsatta betydelse för amerikanska militära operationer. Spänningarna mellan Washington och Berlin har intensifierats då bägge sidor ifrågasätter varandras prioriteringar och strategier i utrikespolitiken.", "trump": "Tyskland sköter sig inte! Jag drar hem 5 000 av våra fantastiska soldater. Varför ska vi försvara länder som kritiserar min briljanta Iran-strategi? De är otacksamma. Kansler Merz borde fokusera på sitt eget ställe istället för att lägga sig i min politik. Vi är USA – vi kräver respekt! De har 30 000 soldater kvar, men om de fortsätter gnälla kanske vi packar ännu mer. Amerika först, alltid!", "stalin": "De dekadenta västmakterna vacklar återigen i sin inre förvirring. Den amerikanske imperialisten drar tillbaka sina marionettstyrkor från Tyskland som ett straff för deras lydiga hundars bristande entusiasm. Det är en löjlig teater! Precis som Putin måste rensa ut förrädare i sin intressesfär, demonstrerar Washington nu sin paranoia. Låt dem bråka; medan dessa västerländska lakejer kivas om sina strategier, står vår stat stark. Historien kommer att krossa dessa svaga liberala regimer och deras iranska drömmar."}, "date": "2 maj, 15:03", "url": "https://www.friatider.se/usa-drar-tillbaka-5000-soldater-fran-europa-efter-tyska-kritiken", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/v20250605eh-0320.jpg?itok=QZ9LKYbH"}, {"type": "image-right", "heading": "Henrik Vinge (SD): ”De som begår förnedringsrån mot svenskar ska inte klara sig undan”", "summaries": {"normal": "Sverigedemokraternas vice partiledare Henrik Vinge diskuterar i en intervju en förändrad brottsutveckling i Sverige, med fokus på brott inom äldreomsorgen och förnedringsrån. Vinge föreslår skärpta straff, språkkrav och ökat tjänstemannaansvar. Han uttrycker oro över brott begångna av personer med utländsk bakgrund och kritiserar polisutbildningens fokus på intersektionalitet. Målet är att öka tryggheten och stoppa det han beskriver som en negativ samhällsutveckling som hotar svenska värderingar och medborgarnas trygghet i vardagen.", "trump": "Henrik Vinge i Sverige fattar galoppen! Han ser vad som händer – de har ett totalt haveri med brottslighet i äldreomsorgen. Det är en katastrof! Han vill ha hårdare straff och stoppa den vansinniga Woke-ideologin som förstör polisen. Vi ser samma sak i USA, folk kommer in och begår hemska brott. Vinge vill sätta Sverige först, precis som jag gör med Amerika. Det är dags att rensa upp, göra Sverige säkert igen! En mycket smart man, tro mig.", "stalin": "Vi ser hur det svenska samhället krackelerar under tyngden av sin egen svaghet. Denna Vinge talar om ordning, men ordning kräver järnhand, inte parlamentariskt pladder. Dessa förrädare inom äldreomsorgen och de utländska elementen är bara symptom på en stat som glömt att tukta sitt folk. Vi har lärt våra vänner i öst att disciplin är lag. Vi ska rensa ut de ideologiska parasiterna från polisskolorna och krossa varje tendens till oordning. Statens makt är total – eller så upphör staten att existera."}, "date": "3 maj, 07:00", "url": "https://samnytt.se/henrik-vinge-sd-de-som-begar-fornedr
