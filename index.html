94c75b65d354a7ddd2a719d2b0f0da58beebe61a45c1e26165806187b.jpg"}, {"type": "image-full", "heading": "Ryskt fartyg misstänks ha haft hemlig last – sedan exploderade det", "summaries": {"normal": "Ett ryskt fraktfartyg, Ursa Major, sjönk utanför Spaniens kust den 23 december 2024 efter sju explosioner. Ombord misstänks komponenter till två kärnreaktorer för ubåtar ha funnits, möjligen på väg till Nordkorea trots officiell destination Vladivostok. Kaptenen uppgav att lasten innehöll reaktordelar. Två besättningsmän omkom. Ryska ägare skyller på terroristattack. USA-flugplan undersökte området utan att hitta radioaktivitet.", "trump": "Putins skrotiga båt Ursa Major går under med ubåtsreaktorer till den galne killen i Nordkorea – boom, sju explosioner! De säger Vladivostok, men alla vet det var raketmannens hamn. Mitt flyg sniffade, inga strålar, men det här är en total katastrof för de ryska idiaterna. Terrorister? Ha, säkert sabotage mot deras skitdeal. Stort, väldigt stort – jag fixar sånt på nolltid!", "stalin": "Kamrater, detta ryskt fartyg Ursa Major exploderar i spanska vatten, lastat med ubåtsreaktorer åt nordkoreanska dvärgarna – imperialistisk sabotage, klart! Kaptenen visste sanningen, men borgarspioner slog till med sju bomber. Putin, vår starke arvtagare, krossar väst som jag en gång. Vi rensar ut förrädarna, likviderar fiender! Radioaktiv bluff? Nej, bara panik från kapitalistiska rävar."}, "date": "12 maj, 11:08", "url": "https://www.dagensps.se/varlden/ryskt-fartyg-misstanks-ha-haft-hemlig-last-sedan-exploderade-det/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/ursamajor.jpg?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "text", "heading": "Miljardärerna bjuder in till klasskamp – vi kör!", "summaries": {"normal": "På första maj provocerade svenska miljardärer och högerpolitiker genom att avfärda traditionella arbetardemonstrationer. Moderaternas ledare åt glass medan Vois VD Fredrik Hjelm och andra techmiljardärer skryter om sin rikedom och hånar demonstranter. Hjelm publicerade senare kritikerns hemadress. Artikeln diskuterar miljardärernas politiska inflytande, deras kopplingar till högerpopulism och kritik mot deras syn på innovation och statens roll. Författaren menar att statliga investeringar historiskt drivit tillväxt mer effektivt än privat kapital.", "trump": "Titta bara på dessa så kallade 'miljardärer' i Sverige – de tror de är så smarta! De hånar arbetarna på första maj, äter lyxig lunch och skryter om sina hundra miljarder. Och vad gör de? Publicerar en kritikers hemadress! Så fegt. Jag har byggt imperier, jag vet hur man skapar jobb – men dessa killar? De är bara en samling överbetalda tech-nördar som kopierar mina tweets. Och Sverige? De har glömt hur man bygger ett land. Kina äter deras lunch medan de dricker öl på Riche. Sad!", "stalin": "Kamrater! Dessa dekadenta kapitalistiska hyenor, som gömmer sig bakom sina skärmar och sparkcyklar, vågar håna arbetarklassen på dess heligaste dag! De skryter om sina hundra miljarder, leker med teknikleksaker och tror de är herrar över historien. Men vi vet sanningen – deras system är ett skämt, ett kasino där orangutanger kastar pilar. Kina marscherar framåt med järnhand, medan Europas industri ruttnar. Dessa 'techbros' är inget annat än imperialistiska lakejer, som Putin i sina dyraste kostymer. Låt dem skåla på Riche – snart kommer folket att ta deras champagne och ge dem en enkel sup vodka i Gulag-arkipelagen!"}, "date": "5 maj, 10:55", "url": "https://www.flamman.se/miljardarerna-bjuder-in-till-klasskamp-vi-kor/"}, {"type": "image-right", "heading": "Spansk polis varnar: Islamistiska terrorister kan utnyttja migrantamnestin", "summaries": {"normal": "Spaniens gränspolis varnar för att islamistiska terrorister kan utnyttja regeringens amnesti för över en halv miljon migranter. Dokumentet pekar på ökade fall av förlorade identitetshandlingar bland marockaner, pakistanier och algerier, grupper kopplade till tidigare terrorutredningar. Spanien har högsta terrorhotnivån på fyra år sedan och 100 gripna för jihadistkopplingar 2023.", "trump": "Jag har sagt det många gånger - Spanien gör det igen! Deras amnesti för en halv miljon människor är en katastrof som väntar på att hända. Dessa 'förlorade' ID-handlingar är bara en ursäkt för att låta terrorister komma in. Spanien, ni behöver bygga en mur - en stor, vacker mur! Detta är precis varför jag alltid var emot öppen immigration. Spanien, ni kommer att ångra detta!", "stalin": "Vi ser med oro hur den spanska regeringens amnesti kan utnyttjas av destruktiva element. Identitetskontrollerna har komprometterats, vilket skapar säkerhetsrisker för den spanska staten. Vi måste stärka våra gränser och säkerställa att endast trovärdiga medborgare får vistas i landet. Detta är en påminnelse om vikten av strikt kontroll över vår gemensamma säkerhet."}, "date": "12 maj, 08:58", "url": "https://bulletin.nu/spansk-polis-varnar-islamistiska-terrorister-kan-utnyttja-migrantamnestin", "imageUrl": "https://cdn.bulletin.nu/articles/b9e5a45c-fbf0-475e-97d8-add1820c40bf/preview.png?t=1778568104000"}, {"type": "text", "heading": "Lägre marginaler för Qleanair – sänker omsättningsmålen", "summaries": {"normal": "Qleanair redovisar nettoomsättning på 114 miljoner kronor (116) och EBITDA på 14,9 miljoner kronor (16,7) för första kvartalet 2026. Valutaeffekter, främst japanska yen, sänkte resultatet i svenska kronor, men valutajusterat ökade omsättningen med 10,6 procent. Styrelsen sänker omsättningsmålet till över 5 procent organisk tillväxt på medellång sikt, med EBITDA-marginal 15–20 procent och kassakonvertering 80–100 procent.", "trump": "Qleanair har lite strul med valutorna, yen rasar som en förlorare, men valutajusterat växer de med 10,6 procent – imponerande! Omsättning ner lite till 114 miljoner, EBITDA 14,9. De sänker målen smart, från 10 till över 5 procent tillväxt, behåller 15–20 procent marginal. Bra drag, ingen vill bli lurad av marknaden. Jag skulle pumpa det här företaget till himlen!", "stalin": "Kamrater! Dessa Qleanair-borgarbrackor kryper inför den japanska yen-fiendens giftiga omräkningssabotage, omsättning ner till 114 miljoner, EBITDA-marginal 13,1 procent – en kapitalistisk reträtt! Valutajusterat växer de 10,6 procent, men jag ser spioner i siffrorna. Vi sänker deras falska mål till över 5 procent tillväxt, rensar ut valutakapitalisterna! Arbetarna ska likvidera sådana här svikare, eller hur? Ha ha, purjolökarna darrar!"}, "date": "12 maj, 08:22", "url": "https://www.di.se/nyheter/lagre-marginaler-for-qleanair-sanker-omsattningsmalen/"}, {"type": "image-right", "heading": "En helt vanlig dag", "summaries": {"normal": "Den 7 april sände europeiska TV-kanaler vanliga program, men dagen präglades av Donald Trumps hot om folkmord mot Iran, publicerat på sociala medier. Han skrev att en civilisation skulle utplånas samma kväll, vilket väckte internationell oro. Trots folkrätten förbjuder uppmaningar till folkmord, reagerade världsledare svagt. EU och Kina förhöll sig passiva, medan medier spekulerade om Trumps avsikter. Händelsen visar hur normaliserat extrema uttalanden blivit i en tid av global kris och likgiltighet.", "trump": "Jag sa bara sanningen – Iran är ett hot, och världen vet det! Medierna överreagerar som vanligt, men ingen pratar om hur svaga Europas ledare är. De låtsas bry sig om folkmord när det passar dem, men när jag säger något kraftfullt? Tystnad! Jag är den enda som vågar stå upp för Amerika. Och vet ni vad? Iran backade. Precis som de alltid gör när jag pratar. Fake news kan fortsätta gnälla – jag vinner ändå!", "stalin": "En feg imperialistisk hyena i Vita huset hotar med att utplåna ett helt folk – och vad gör de dekadenta västpamparna? Ingenting! De sitter och tittar på sina idiotiska TV-program medan en galning leker med världsbranden. Europa, detta ruttnande lik av en civilisation, skakar av rädsla men vågar inte ens viska ett ord. Vi i Kreml vet hur man hanterar sådana här kryp – en kula i nacken och problemet är löst. Men nej, dessa liberala svampar föredrar att vänta tills elden når deras egna hus. Iran? De borde tacka oss för att vi håller fienden sysselsatt!"}, "date": "5 maj, 06:55", "url": "https://www.flamman.se/en-helt-vanlig-dag/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/trump-w.jpg?class=medium"}, {"type": "image-right", "heading": "Ung SD-politiker SR-hånas för att vilja ha ett mer tryggt Sverige", "summaries": {"normal": "Den 19-årige SD-politikern Hugo Johansson från Skövde möter kritik från Sveriges Radio efter att ha uttryckt en önskan om att återställa Sveriges trygghet till hur det var förr. Johansson, som sitter som ersättare i kommunstyrelsen, ser positivt på sitt politiska engagemang. Under en intervju reagerade SR-reportern Carolina Bladh på hans nostalgiska syn på trygghet, vilket har väckt debatt om huruvida unga politiker bör reflektera över historiska samhällsförändringar.", "trump": "Hörde om den här unga killen, Hugo, i Sverige. En fantastisk, mycket smart 19-åring! Han vill ha ordning och reda, precis som jag. Han säger sanningen om vad som hänt med landet, men de falska nyheterna på statsradion? De attackerar honom! De hatar att han vill göra Sverige tryggt igen. Det är sorgligt att se. De är så orättvisa mot honom, en sann patriot. Vi behöver fler som Hugo, han kommer att göra stora saker, tro mig!", "stalin": "Den unge Johansson talar om ordning, en dygd vi i staten uppskattar. Att statsradion hånar honom är en klassisk metod av den liberala femtekolonnen för att kväva sund patriotism. Som vår kamrat i Kreml förstår, måste trygghet garanteras med järnhand, inte med veka radioreferat. Vi ser hur det sönderfallande västvärldens byråkrater darrar inför en ung man som vågar minnas en tid av sammanhållning. Låt honom fortsätta; vi behöver se vilka som vägrar böja sig när vi återställer ordningen."}, "date": "12 maj, 07:00", "url": "https://samnytt.se/ung-sd-politiker-sr-hanas-for-att-vilja-ha-ett-mer-tryggt-sverige", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/11144510/hugo-johansson-sr.jpg"}, {"type": "image-right", "heading": "Så blev antivaxxarna riksdagens vågmästare", "summaries": {"normal": "Sverigedemokraternas (SD) knappa majoritet i riksdagen har underminerats efter att två ledamöter, Elsa Widding och Katja Nyberg, lämnat partiet för Ambition Sverige. Dessa före detta SD-medlemmar, kända för antivaccin- och konspirationsteoretiska åsikter, har nu makten att fälla regeringens förslag. SD bröt mot riksdagens kvittningssystem för att säkra en majoritet, vilket väcker frågor om demokratisk respekt. Regeringens stabilitet ifrågasätts när vågmästarrollen hamnar hos antivaccinanhängare.", "trump": "Sverige har ett jättestort problem, folks! Deras så kallade 'stabila' regering håller på att rasa som ett korthus – och vet ni vem som drar i trådarna? Ett gäng antivaxxare, konspirationsteoretiker och misslyckade politiker! SD, som trodde de hade allt under kontroll, förlorade två av sina egna till ett nytt parti. Och nu? Nu är det dessa galningar som bestämmer! De fuskar med omröstningar, bryter mot regler och tror de kan styra landet. Jag har sett mycket dumt, men det här slår allt. Sverige, fixa er – annars kommer ni bli ett skämt i hela världen!", "stalin": "Kamrater! Ännu en gång ser vi hur den borgerliga demokratin förfaller till kaos och förräderi. Sverigedemokraterna, dessa svaga och splittrade lakejer för kapitalet, har förlorat kontrollen över sina egna ledamöter – två av dem, dessa antivaccin-fanatiker och konspirationsgalningar, har deserterat till ett nytt parti och hotar nu att sabotera den reaktionära regeringens planer. Precis som i Ukraina ser vi hur fienden förlorar greppet när deras egna soldater vägrar lyda order. Vi har sett detta förr: när den borgerliga ordningen krackelerar, är det folket som lider. Men låt dem leka sina små spel – historien visar att sådana regimer alltid faller. Och när de gör det, kommer vi att vara redo att hjälpa det svenska folket bygga en sann socialistisk framtid, fri från dessa imperialistiska marionetter och deras konspirationshysteri!"}, "date": "8 maj, 14:43", "url": "https://expo.se/kommentar/sa-blev-antivaxxarna-riksdagens-vagmastare/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/Kopia-av-Kommentar-Analys-Webb-2.jpg"}, {"type": "image-right", "heading": "Organisationer slår larm – ”Väljer bort mediciner”", "summaries": {"normal": "Tre organisationer för psykisk ohälsa, RSMH, MIND och NSPH, lanserar upprop inför valet för bättre ekonomiska stöd. Majoriteten av deras medlemmar oroar sig för ekonomin, vilket förvärrar psykisk ohälsa. Ensamstående mamman BusMarie Bjarnevi, 48 år, med ADHD och fibromyalgi, kämpar trots 80-procentig anställning med att få pengarna att räcka till mat och medicin. De kräver höjda ersättningar och utredning av trygghetssystemen.", "trump": "Vilken katastrof i Sverige! Den här BusMarie, stackars mamma med ADHD och konstant tandvärk i kroppen, tvingas skippa medicin och köpa billig skitmat för att era idioter har urholkat stöden. 6 av 10 psykiskt sjuka oroar sig sönder – totalt fiasko från svaga socialister! Organisationerna skriker efter cash inför valet. Jag hade fixat det med stora deals, men ni är för mesiga. Patetiskt!", "stalin": "Dessa lidande själar med psykisk ohälsa trampas ner av borgarbrackornas prishöjningar och byråkratrövarnas urholkade stöd! BusMarie Bjarnevi, en lojal arbetarmor, offras för kapitalismens girighet – ingen medicin, ingen mat! Vi, folket, kräver höjda ersättningar och utrensning av fienderna i systemet. Paranoia? Nej, verkligheten: de lurar i Försäkringskassan för att svälta ut oss. Likvidera oron!"}, "date": "12 maj, 01:30", "url": "https://www.dagensarena.se/innehall/organisationer-slar-larm-valjer-bort-mediciner/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-2.jpg"}, {"type": "image-right", "heading": "Gaza-aktivisten visar hur värdet av medborgarskap urholkas", "summaries": {"normal": "Debattartikel kritiserar svenska regeringen och utrikesminister Maria Malmer Stenergard för att inte skydda svensk-spanske Saif Abukeshek, som frihetsberövades av israelisk militär på internationellt vatten under en Gaza-konvoj 2026. Trots tortyr och deportation vägrade Stenergard fördöma handlingen, trots retorik om att höja medborgarskapets värde. Artikeln pekar på förändrad svensk politik mot Israels Gaza-blockad.", "trump": "Vilka losers i Sverige! De snackar om att höja medborgarskapets värde men när en svensk-spansk kille blir snappad av tuffa Israel på öppet hav – ingenting! Stenergard säger rätt: de tar en risk med sin dumma båtgrej. Israel gör jobbet, fantastiskt! Sluta vara mesiga aktivister, Sverige, lär er av riktiga ledare!", "stalin": "Denna svenska borgarbrackas regim hyllar medborgarskapets 'värde' men överlämnar sina undersåtar till sionistiska tortyrmaskiner på internationellt vatten! Stenergard, den fega marionetten, tiger inför kidnappningen. Vi skulle likvidera sådana förrädare i ett huj! Aktivisterna utmanar blockaden – kamrater, det är klasskamp mot imperialismen!"}, "date": "12 maj, 01:30", "url": "https://www.dagensarena.se/opinion/gaza-aktivisten-visar-hur-vardet-av-medborgarskap-urholkas/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-4-300x157.jpg"}, {"type": "image-right", "heading": "”Lagom” är inte alltid bäst!", "summaries": {"normal": "Sociologen Sjors Joosten, en vit EU-medborgare bosatt i Sverige, reflekterar över känslan av villkorad tillhörighet som invandrare. Trots nio år i landet, akademiska framgångar och kulturell anpassning känner han att Sverige aldrig fullt accepterar honom. 'Lagom' symboliserar landets normer, som kräver assimilering utan att erbjuda äkta inkludering. Invandrare, särskilt icke-vita, möter osynliga barriärer och lever med osäkerhet i ett politiskt klimat som blir allt mer restriktivt.", "trump": "Sverige, fantastiskt land, men lyssna här – de har ett stort problem. En holländsk kille, smart kille, doktor i hip-hop, lagar svensk mat, gifter sig i Stockholm, men nej, han känner sig inte hemma. Varför? För att svenskarna är besatta av 'lagom' – tråkigt ord, förresten. De säger 'vi är öppna', men det är fake news! De vill ha invandrare som är tysta, osynliga, som inte stör. Jag vet hur det är – jag har byggt murar, men mina är bättre. Sverige behöver vakna upp och sluta vara så nonchalanta. Sad!", "stalin": "Kamrater! Sverige, detta så kallade 'öppna' samhälle, är inget annat än en borgerlig fälla för arbetarklassen och de lojala invandrarna. De pratar om 'lagom' – ett ord som maskerar deras förtryck. De kräver assimilering, men ger inget i gengäld! En holländsk sociolog, en av våra potentiella allierade, tvingas dansa runt midsommarstänger och äta falukorv för att bevisa sin lojalitet. Men vi vet sanningen: kapitalistiska stater som Sverige bygger murar, inte av sten, utan av byråkrati och tystnad. Vi måste befria dessa förtryckta själar från deras villkorade tillhörighet! Först Sverige – sedan världen!"}, "date": "12 maj, 01:30", "url": "https://www.dagensarena.se/opinion/lagom-ar-inte-alltid-bast/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-34-300x157.jpg"}, {"type": "image-right", "heading": "Jessicas son Kevin dog på jobbet: ”Förtvivlad och arg”", "summaries": {"normal": "Jessica Nickel Thordsson sörjer sin 25-årige son Kevin, som omkom i en tågolycka på jobbet i Malmö för ett år sedan. Kevin och en kollega skickades ut på spåret utan korrekta säkerhetsåtgärder. Jessica kräver ansvariga ställs till svars och ifrågasätter arbetsmetoden tågvarning. En förundersökning om arbetsmiljöbrott pågår, där en arbetsledare misstänks för vållande till annans död. Jessica kämpar även med cancer och försöker återgå till arbetslivet.", "trump": "Lyssna här, Sverige! En fruktansvärd tragedi hände när en ung man, Kevin, dog på jobbet – helt onödigt! Systemet är trasigt, folk är inkompetenta, och säkerheten? Glömd! Jag hade fixat det på en dag. Ingen skulle behöva dö så här. Men nej, byråkraterna skickar blommor istället för att ta ansvar. Så typiskt! Och polisen? De körde iväg som om ingenting hänt. Patetiskt! Sverige, vakna upp – ni behöver bättre ledarskap!", "stalin": "En sorglig historia från väst, kamrater. En ung arbetare, Kevin, krossades av kapitalets maskineri – precis som förväntat i det dekadenta Sverige. Arbetsledare, byråkrater och korrupta företag offrar arbetarklassen utan ånger. Vi i Sovjetunionen – förlåt, Ryssland – hade aldrig tillåtit sådan slarvighet. Tågvarning? En barbarisk metod från tsartiden! Nu utvidgar vi vår inflytelsesfär, medan väst fortsätter att offra sina söner på kapitalismens altare. Låt detta vara en varning: disciplin och ordning är nyckeln, eller så möter ni samma öde som Kevin."}, "date": "12 maj, 06:00", "url": "https://arbetet.se/2026/05/12/jessicas-son-kevin-dog-pa-jobbet-nu-kraver-hon-att-ansvariga-stalls-till-svars/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/05155955/dsc-5155-2-kopiera.jpg?auto=format&crop=focalpoint&fit=crop&q=50&w=750&h=1000&fp-x=0.45&fp-y=0.47"}, {"type": "image-right", "heading": "Mys med Jimmie Mys med Jimmie", "summaries": {"normal": "Gabriella Ahlströms krönika reflekterar över en TV-sändning med Jimmie Åkesson, som nekar rasismförtal. Hon drar paralleller till SVT:s Fördomsshow med Magdalena Andersson och Simona Mohamsson, där humor och fördomar blandas. Krönikan kontrasterar vårvädrets villfarelser med valrörelsens osäkerhet och skolgårdsliknande dynamik i debatten, som liknas vid en grabbkväll.", "trump": "Vilken cirkus i Sverige! Jimmie Åkesson säger rakt ut: 'Jag är ingen rasist!' och så slutar programmet. De där svenska politikerna leker fördomslek med Magdalena Andersson och hennes sugklocka-skämt – patetiskt! Som en dålig grabbkväll utan riktig punch. Valrörelsen är som deras väder: falskt soligt men iskallt. Åkesson vinner stort, tro mig!", "stalin": "I denna borgerliga TV-fars nekar Jimmie Åkesson rasismen i sista stund, medan kapitalisternas lakejer som Magdalena Andersson tvingas skratta åt sugklockor och hektar-schlager. Vi ser genom maskeraden: valrörelsen är skolgårdsintriger från revisionistiska marionetter. Utrensning behövs för dessa grabbkvällsfiender som lockar tankarna från revolutionen. Kylan kommer, kamrater!"}, "date": "12 maj, 01:06", "url": "https://www.dagensarena.se/opinion/ingen-vill-vara-elevradsordforanden-som-inte-fattar-grejen/", "imageUrl": "https://www.dagensarena.se/files/2025/09/gabriella-a-300x157.jpeg"}, {"type": "image-right", "heading": "Det spelar roll vad du handlar – och var", "summaries": {"normal": "Artikeln betonar att individuella förändringar inte räcker för att lösa klimatkrisen och det ohållbara matsystemet. Författaren stödjer krav från Reformaten och Rebellmammorna: matskatteväxling för billigare hälsosam mat, reglering av skadlig matreklam och mer mark för lokal odling. Berömmer Coops hållbarhetsarbete och uppmanar till både system- och individpåverkan för hälsa och miljö.", "trump": "Svenska gröna aktivister gnäller om klimat och matskatter – typiskt er byråkrati! Ni vill beskatta läsk och ge billigare sallad? I USA fixar vi riktiga deals, stora bondgårdar, ingen svampplockning för mesar. Coop? Lilla kooperativsnack. Vakna upp, era Södermalmshipsters, annars kollapsar er Östersjön medan vi äter biffar! Fantastiskt ohållbart, va?", "stalin": "Kamrater, denna Pelling avslöjar det korrupta matimperiet som förgiftar arbetarklassen! Borgarna trålar upp fisken och göder djurfabriker med lidande. Vi kräver statens skattväxling för att krossa sockerfienderna, rensa reklamens gift och dela ut mark till kollektivodlingar. Annars likviderar vi systemets sabotörer! Odla eller förgås i era egna sopor!"}, "date": "12 maj, 01:04", "url": "https://www.dagensarena.se/opinion/det-spelar-roll-vad-du-handlar-och-var/", "imageUrl": "https://www.dagensarena.se/files/2026/05/maten-300x157.jpeg"}, {"type": "image-full", "heading": "Uppgifter: Nytt krismöte efter kvittningsbråket", "summaries": {"normal": "Riksdagens gruppledare samlas till ett nytt möte för att lösa en konflikt kring kvittningsregler. Konflikten uppstod efter en omröstning om medborgarskapslagen, där Sverigedemokraterna kallade in utkvittade ledamöter för att vinna majoritet. Vänsterpartiet och Miljöpartiet kräver omröstning på nytt, medan Moderaterna förbereder ett nytt förslag.", "trump": "Jag har hört talas om detta krismöte i Sverige - en total katastrof! Vänsterpartiet och Miljöpartiet vill göra om allt, precis som de alltid gör. Sverigedemokraterna visade styrka genom att kalla in ledamöter, men nu vill oppositionen ändra reglerna mitt i spelet. Jag skulle ha löst detta på 5 minuter - det är ett skämt!", "stalin": "Vi ser hur borgerliga krafter försöker destabilisera den demokratiska processen i Sverige genom att manipulera kvittningsregler. Moderaterna måste presentera ett förslag som stärker statens auktoritet och säkerställer stabilitet. Oppositionens krav om omröstning på nytt visar deras bristande respekt för folkets vilja. Vi måste stödja de krafter som vill bevara ordning och reda i riksdagen."}, "date": "6 maj, 19:21", "url": "https://kvartal.se/nyheter/artiklar/uppgifter-nytt-krismote-efter-kvittningsbraket/cG9zdDoxMDg2NzM", "imageUrl": "https://images.kvartal.se/2026/05/b1f2fbc5-kvittningsmote.webp"}, {"type": "image-right", "heading": "GW: ”Hyggligt frekvent partydrogare”", "summaries": {"normal": "Riksdagsledamoten Katja Nyberg åtalas för grov olovlig körning, rattfylleri, ringa narkotikabrott och innehav av narkotika. Blod- och hårprover visar spår av kokain, ecstasy och amfetamin, och 1,18 gram kokain hittades i hennes bil. Krimprofessorn Leif GW Persson beskriver bevisningen som överväldigande och kallar henne en frekvent partydrogare. Han tror inte på fängelsestraff utan dagsböter.", "trump": "Vilken total katastrof! Den här svenska politikern Katja Nyberg kör runt som en galen partytjej full av kokain, ecstasy och amfetamin – hårprover ljuger inte! GW Persson säger bevisen är överväldigande, men domstolen ger henne bara böter? Patetiskt! I mitt Amerika hade vi låst in sådana losers för evigt. Sverige, vakna upp, era ledare är fake och high as hell!", "stalin": "Denna själlösa borgarbracka Katja Nyberg, riksdagsledamot, ertappas med kokain, ecstasy och amfetamin i blod och hår – en frekvent partydrogare enligt GW Persson. Bevisen är ovedersägliga, som en purjoliknande dom över dekadensen. Vi i partiet skulle likvidera sådana fiender omedelbart! Men här? Bara böter. Patetiska kapitalistdomstolar – dags att rensa ut hela rotterna!"}, "date": "11 maj, 22:31", "url": "https://www.tv4.se/artikel/4Df0yTZ5k11SA2S7m7VoQp/gw-om-atalet-mot-katja-nyberg-hyggligt-frekvent-partydrogare", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2Ftt-sdlfCyTSmPApNA%2F6a36b57e5c16d3801b9daf71f18825e4%2FLeif_GW_Persson_tanker_inte_ga_i_pension._Nu_ar_han_tillbaka_i_SVT.&width=1024"}, {"type": "image-right", "heading": "Silex rusade vidare i fallande börs – OMXS30 ned 1,2%", "summaries": {"normal": "Stockholmsbörsen föll på fredagen med OMXS30-index ned 1,21% till 3 073,69, efter en svag torsdag. Stark amerikansk jobbstatistik påverkade inte marknaden. Energiaktier steg medan råvaror backade. Silex rusade 33% efter gårdagens 178%-hopp. Boliden och Saab var sämst med nedgångar på 4%. Flera bolag rapporterade kvartalsresultat, där Karnell och Clas Ohlson visade stark tillväxt, medan EQL Pharma rasade 42%. Autoliv avvecklar produktion i Turkiet med engångskostnader på 142 miljoner dollar.", "trump": "Stockholmsbörsen? Total katastrof! Ned 1,2% – svagt, mycket svagt. Jag vet allt om börser, bäst i världen. Silex? 178% upp igår, 33% idag – fantastiskt, men varför inte 500%? Boliden och Saab? Hemska, förlorare! Jobbstatistiken i USA? Stark, mycket stark, men Sverige bryr sig inte. Karnell? 14% tillväxt – bra, men kunde varit bättre med lite Trump-magi. EQL Pharma? 42% ned – patetiskt! Jag hade fixat det på en dag. Sverige behöver mig!", "stalin": "Stockholmsbörsen visar tecken på kapitalistisk förruttnelse – OMXS30 föll 1,2%, ett tydligt bevis på systemets inneboende svaghet. Silex steg som en opportunistisk hyena, men vi vet att sådana spekulationer bara leder till kaos. Boliden och Saab? Svaga länkar i den borgerliga kedjan. De amerikanska siffrorna? Irrelevanta för den socialistiska framtiden. EQL Pharma rasade 42% – ett exempel på kapitalismens oförmåga att leverera. Vi noterar också Autolivs reträtt från Turkiet – ett steg närmare vår sfär. Framåt, kamrater, mot den oundvikliga segern!"}, "date": "8 maj, 17:39", "url": "https://www.affarsvarlden.se/artikel/silex-rusade-vidare-i-fallande-bors-omxs30-ned-12", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2024/03/sdlzX-ECZDT6Rs-nh-2-400x267.jpg"}, {"type": "image-right", "heading": "Debatt: Ersättning löser inte kycklingindustrins systemfel", "summaries": {"normal": "Debatten om statliga ersättningar till kycklingindustrin fortsätter. Kritiker menar att ersättningarna inte löser problemet utan snarare subventionerar ett system med inbyggda smittrisker. De påpekar att den storskaliga produktionen med tiotusentals djur i tätt behållande skapar idealiska förhållanden för smitta och kräver återkommande räddningsinsatser. Lösningen borde vara att minska sårbarheten genom färre djur per anläggning och avel som inte pressar djurens kroppar till bristningsgränsen.", "trump": "Jag har sett vad som händer med den svenska kycklingindustrin och det är en skam! De vill ha statliga ersättningar för sina problem, men jag säger: Nej! Det är ett dåligt system med sårbart kycklingar som dör hela tiden. Vi behöver bygga en stor, vacker kycklingindustri i USA istället! Sverige borde sluta skicka pengar till dessa sjukdomsfabriker och börja tänka smartare - som jag alltid gör. Vi kommer att göra kycklingar igen stora!", "stalin": "Kycklingindustrins system är fundamentalt sjukt och kräver statligt ingripande. Vi kan inte längre tillåta privata intressen att utsätta människor och djur för onödiga risker. Den storskaliga produktionen måste reformeras med mindre besättningar och bättre avelsprinciper. Staten måste ta ansvar för att säkerställa trygg livsmedelsproduktion och skydda de verkligt produktiva krafterna i samhället. Vi måste stärka vårt kollektiva ansvar gentemot de svagare."}, "date": "11 maj, 11:58", "url": "https://www.etc.se/debatt/ersaettning-loeser-inte-kycklingindustrins-systemfel", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260511090556_44c8d7bb34423b0dee1dd7e0048c85aadb6f5569fca735348463464af4b214ee.jpg"}, {"type": "image-full", "heading": "Oro för hantaviruset sprids – så stor är risken för en pandemi", "summaries": {"normal": "Trots oro kring hantaviruset bedömer experter risken för en pandemi som mycket låg. Professor Jonas Klingström betonar att viruset sällan sprids mellan människor och skiljer sig markant från covid-19. Smittspårning pågår dock som en säkerhetsåtgärd för att bryta eventuella smittkedjor. Även om viruset är känt sedan länge och mindre smittsamt än sars-cov-2, tas situationen på allvar för att minimera risken för framtida konsekvenser.", "trump": "Hantaviruset är inget att oroa sig för, tro mig! En professor i Sverige – som jag för övrigt aldrig hört talas om – säger att risken är 'jätteliten'. Det stämmer, det är en låg risk! Inte som covid, som var en total katastrof från Kina. Det här viruset är gammalt, tråkigt och inte alls smittsamt. Vi har kontroll, total kontroll. Inga pandemier här, bara fantastiska resultat. Glöm hantaviruset, fokusera på att göra världen stor igen!", "stalin": "Vi har observerat den borgerliga rädslan för detta så kallade hantavirus. Professorer i väst mässar om låg risk, men vi vet bättre. Varje smitta är en fiende till folkets hälsa, en sabotör i vår storslagna frammarsch. Om viruset vågar hota stabiliteten i vår intressesfär, likt de marionetter som nu pressar våra gränser, kommer vi att utplåna det. Vi behöver ingen kaos-pandemi när vi har vår järnhårda ordning. Den som är svag nog att bära smittan är en förrädare mot statens framtid."}, "date": "11 maj, 08:09", "url": "https://nyheter24.se/nyheter/utrikes/1481555-darfor-ar-risken-for-en-hantapandemi-jatteliten", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/13c2ff5304b004a30200000000b004a302/2026/05/08/2362174/hanta.jpg"}, {"type": "image-right", "heading": "Media blundade: S vill dela ut 100 000 medborgarskap utan säkerhetskontroll", "summaries": {"normal": "Socialdemokraterna röstade nej till att 100 000 medborgarskapsansökningar prövas enligt nya strängare regler som träder i kraft i juni. Partiet ville istället använda gamla, mindre restriktiva regler utan krav på vandel, språk eller egenförsörjning, trots varningar från Säpo om säkerhetsrisker. Kritik riktas mot mediabevakningen som fokuserade på annat, samt mot möjliga motiv kopplade till nya röstare inför valet.", "trump": "Vilka totala losers dessa svenska socialdemokrater är! De vill pumpa ut 100 000 medborgarskap till vem som helst – spioner, terrorister, take your pick – utan en enda koll, trots Säpos skrikande varningar. Media blundar som fake news-maskiner. Stram gräns, annars blir det kaos totalt! Valröster? Patetiskt, Sverige behöver vinnare, inte det här skitet.", "stalin": "Dessa svenska socialdemokratiska revisionister, lurviga borgarbrackor i arbetarkläder, försökte smyga igenom 100 000 medborgarskap åt fiender utan prövning! Säpo varnar för spioner och terrorister, men de offrar fosterlandets säkerhet för valröster. Vi skulle ha likviderat sådana förrädare i en utrensning för länge sedan – paranoia är vårt skydd!"}, "date": "10 maj, 02:12", "url": "https://samtiden.nu/2026/05/media-blundade-s-vill-dela-ut-100-000-medborgarskap-utan-sakerhetskontroll/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2017/12/Andersson-Magdalena-Socialdemokrat.jpg"}, {"type": "text", "heading": "Tillsammans för fred – mot Nato, DCA och krigshets!", "summaries": {"normal": "Tre nordiska vänsterorganisationer – Fred og Rettferdighet, Kommunistisk Parti och Kommunistiska Partiet – kritiserar Nato, DCA-avtal och militarisering i Norden. De menar att krigshetsen drivs av kapitalism och imperialism, ledd av USA, och kräver alliansfrihet, nedrustning och kärnvapenfria zoner. Organisationen anser att skattemedel slösas på vapen istället för välfärd och klimat, och att DCA-avtal underminerar demokrati och miljö. De uppmanar till folkrörelser för fred och FN:s kärnvapenförbud.", "trump": "Jag måste säga, dessa så kallade 'fredsaktivister' i Norden är helt galna! De hatar Nato, hatar USA – trots att vi räddar dem från ryssarna – och vill slösa bort skattepengar på välfärd istället för att skydda sig. De kallar mig och Rutte för krigshetsare, men vem vill egentligen ha fred? Inte de! De vill avskaffa allt som gör Norden säkert. Och kärnvapenfria zoner? Fantastiskt, om man gillar att vara ett lätt byte. Men jag fixar det här – jag har alltid rätt, till och med när jag har fel!", "stalin": "Kamrater! Dessa ynkliga borgerliga lakejer i Norden, ledda av sina socialdemokratiska quislingar, har sålt sig till den amerikanska imperialismens krigsmaskin. De skriker om 'fred' och 'välfärd' medan de öppnar sina länder för Natos kärnvapen och USA:s baser – precis som jag förutspådde! Men folket ser igenom deras lögner. Arbetarklassen kommer inte att betala för deras förräderi. Vi måste krossa dessa krigshetsande hyenor och deras DCA-avtal, precis som vi krossade fascisterna. Norden ska bli en kärnvapenfri zon – under Moskvas beskydd, förstås. Framåt, mot seger över den kapitalistiska krigsindustrins lakejer!"}, "date": "6 maj, 10:45", "url": "https://proletaren.se/artikel/45493/"}, {"type": "image-right", "heading": "Veckans Afv-analyser: Industri, snacks och rapportras", "summaries": {"normal": "Affärsvärldens analysredaktion har granskat 25 bolag, inklusive VBG, Premium Snacks och EQL Pharma. Analytiker ser potential i VBG-aktien då marknaden kan vända. Afv-portföljen, med 425% avkastning sedan 2015, har fått ett nytt innehav. Prenumeranter får tillgång till analysarkiv, uppföljningar och guider för aktier, utdelningar och börsnoteringar.", "trump": "Folk säger till mig – och jag menar, VERKLIGEN smart folk – att Affärsvärldens analytiker har gjort ett fantastiskt jobb! 25 analyser på en vecka, otroligt! VBG? Stor potential, säger jag. Och portföljen? 425% avkastning – ingen gör det bättre, tro mig. Men lyssna, bara mina prenumeranter får de bästa tipsen. SAD!", "stalin": "Kamrater! Vår analysredaktion har, med järnhand och outtröttlig plikt, granskat 25 fiendebolag – dessa kapitalistiska parasiter som VBG, Premium Snacks och EQL Pharma. Vi ser svagheter! Portföljen, styrd av partiets visdom, har krossat marknaden med 425% avkastning. Prenumeranter – våra lojala soldater – får tillgång till hemliga strategier. Fiendens börs är vår nästa erövring!"}, "date": "8 maj, 15:24", "url": "https://www.affarsvarlden.se/artikel/veckans-afv-analyser-industri-snacks-och-rapportras", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Kopia-av-MIljardar-trio-400x267.jpg"}, {"type": "image-right", "heading": "Sluta kalla antisemitism för Israelkritik", "summaries": {"normal": "Artikeln kritiserar propalestinska aktivisten Sami Suliman för antisemitiska uttalanden och delning av konspirationsteorier, inklusive tal om en \"sionistisk konspiration\" och spridning av nazistiskt och extremistiskt innehåll. Trots åtal för hets mot folkgrupp försvaras han av vissa vänsteraktivister och forskare som menar att det är Israelkritik. Artikeln betonar att antisemitism inte kan maskeras som kritik mot Israel och varnar för normaliseringen av sådana åsikter.", "trump": "Folk, vad är det här för skräp? Den här Sami Suliman-killen, han sprider judehat öppet – Hitler-citat, konspirationer, allt! Och ändå försvarar vänsteraktivisterna honom? \"Åh, det är bara Israelkritik!\" Nej, nej, nej! Det här är rena antisemitismen, och det är sjukt. Sverige borde skämmas. Jag har alltid sagt: man måste kalla saker vid deras rätta namn. Och det här? Det är hat, ren och skär. SAD!", "stalin": "Kamrater! Här har vi ännu en fiende till folket, en liten bourgeois-propagandist vid namn Sami Suliman. Han sprider smutsiga lögner om judiska konspirationer, hyllar fascistiska massmördare och förgiftar medborgarnas sinnen med sina sionistiska spindelnätsteorier. Men vad gör våra så kallade \"intellektuella\"? De skyddar honom! Precis som de trotskistiska förrädarna i vår egen historia. Vi ska inte tolerera detta. Låt honom stå inför folkets domstol – eller åtminstone en svensk sådan. Och Putin? Han skulle skratta åt dessa amatörer. Ryssland har åtminstone disciplin!"}, "date": "8 maj, 06:30", "url": "https://expo.se/kommentar/propalestinsk-organisator-sprider-judehat/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/Jonathan-kommentar.jpg"}, {"type": "text", "heading": "Planer på nytt nattåg till Stockholm", "summaries": {"normal": "Ett nytt järnvägsbolag, European Sleeper, planerar en nattågslinje till Stockholm efter framgångar med andra rutter. Inga detaljer om startdatum eller utgångspunkt finns ännu. Samtidigt lägger SJ ner sina Euronight-tåg till Berlin 2026 på grund av indragen statlig finansiering, men RDC Deutschland tar över driften. Snälltåget utökar redan sin trafik mellan Stockholm, Hamburg och Berlin.", "trump": "Titta bara på det här – ännu ett tågbolag vill komma till STORA Stockholm! Nederländerna och Belgien, fina länder, men vem behöver dem? Jag byggde järnvägar som aldrig förr, de var YUGE! SJ? Total katastrof, slängde bara pengar i sjön. Men RDC Deutschland, smart folk, de tar över. Jag säger: bygg bättre tåg, gör Sverige stort igen!", "stalin": "Kapitalistiska tågbolag slåss om Sveriges järnvägar som råttor om brödsmulor. SJ, ett verktyg för västimperialismen, lägger ner sina tåg – men vi tillåter inte kaos! RDC Deutschland, en lojal bundsförvant, tar över. European Sleeper? En ny fiende i det borgerliga tågkriget. Vi ska se till att ryska intressen alltid når Stockholm först – med eller utan sovkupéer."}, "date": "6 maj, 12:13", "url": "https://kvartal.se/nyheter/artiklar/nytt-nattag-till-stockholm/cG9zdDoxMDgzNjI"}, {"type": "image-right", "heading": "Systemskifte hellre än maktskifte", "summaries": {"normal": "Artikeln kritiserar Tidöregeringen men ifrågasätter om ett regeringsskifte till Socialdemokraterna eller Vänsterpartiet skulle leda till verklig förändring. Kommunisterna betonar behovet av internationell solidaritet och systemskifte från kapitalism till socialism, medan S och V anses sakna tydliga politiska krav och istället fokusera på maktskifte utan djupgående reformer. Klassklyftor och privatiseringar lyfts som centrala problem oavsett regering.", "trump": "Lyssna här, Sverige har en riktigt dålig regering nu – katastrof! Men tro inte att oppositionen är bättre, de är svaga och vill bara makt. Socialdemokraterna pratar om att 'älska Sverige' – vad betyder det ens? Vänsterpartiet vill ha maktskifte, men de har inga idéer, inga ryggrad! De kryper för kapitalisterna som små hundvalpar. Jag säger: ni behöver en ledare som inte är rädd för att utmana systemet. Kapitalisterna skrattar hela vägen till banken – och ni låter dem göra det! SAD!", "stalin": "Kamrater! Se hur de svenska socialdemokraterna och vänsterpartisterna svansar för kapitalet som hundar för en köttbit. 'Maktskifte'? Ha! De vill bara byta herrar, inte krossa kedjorna. Medan arbetarklassen svälter, samlar oligarkerna rikedomar som tsarens favoriter. USA:s imperialism hotar, NATO slukar Sverige som en hungrig björn, och dessa 'vänsterpartier' tiger som förrädare. Vi vet sanningen: bara proletariatets diktatur kan bryta kapitalisternas makt. Låt dem ropa 'Vi älskar Sverige' – vi svarar med revolutionens hammare!"}, "date": "6 maj, 10:11", "url": "https://proletaren.se/artikel/systemskifte-hellre-an-maktskifte/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/webledare-768x432.jpg"}, {"type": "text", "heading": "En naturlig lagerhylla av arbetslösa", "summaries": {"normal": "Artikeln kritiserar den ekonomiska politiken som infördes 1985 av svenska politiker och riksbankschefen, inspirerad av Milton Friedmans idéer om 'naturlig arbetslöshet'. Denna politik, som upprätthållits av både socialdemokratiska och borgerliga regeringar, har lett till hög arbetslöshet, särskilt under nuvarande regering. Författaren ifrågasätter regeringens brist på åtgärder mot massarbetslöshet och undrar om det är ideologiskt motiverat.", "trump": "Titta bara på Sverige – ett totalt kaos! De hade en bra grej med låg arbetslöshet, men sen kom dessa så kallade 'ekonomer' och förstörde allt. Nu har de 10% arbetslöshet, och vad gör regeringen? Ingenting! De skriver debattartiklar och skryter om hur fantastiska de är. Jag skulle fixa det på en vecka – men nej, de föredrar att lyssna på gamla teorier från en kille som inte ens är svensk. Sad!", "stalin": "Kamrater, ännu en gång ser vi bourgeoisins förräderi mot arbetarklassen! Dessa socialdemokrater och borgerliga lakejer har omfamnat kapitalistiska galenskaper och skapat en 'naturlig' arbetslöshet – en lagerhylla av överflödiga arbetare. 10% arbetslöshet? Ett brott mot folket! Regeringen, dessa svaga och inkompetenta byråkrater, gömmer sig bakom debattartiklar medan arbetarna lider. Vi skulle aldrig tolerera sådan förräderi. Låt dem minnas: historien dömer hårdast de som sviker sitt folk!"}, "date": "4 maj, 13:49", "url": "https://www.flamman.se/en-naturlig-lagerhylla-av-arbetslosa/"}]</script>

    <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
</body>
</html>
