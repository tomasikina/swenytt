en/cG9zdDoxMDY2MTU", "imageUrl": "https://images.kvartal.se/2026/05/26efde4e-brrrr.webp"}, {"type": "image-right", "heading": "Elsparkcykelolyckor upp 40% bland unga – pojkar överrepresenterade", "summaries": {"normal": "Trafikverket rapporterar en oroande ökning av elsparkcykelolyckor, särskilt bland unga. Svårt skadade i trafiken ökade med 5% till 5 000 under 2025, där hälften var cyklister och många av dem elsparkcyklister. Olyckor bland unga under 18 år steg med 40%, med pojkar som överrepresenterade. Kollisioner med fotgängare ökade med 55%. Hjälmanvändning är låg (17%). Trots färre dödsolyckor totalt (203), fördubblades självmord i trafiken till 42.", "trump": "Vad händer i Sverige? Fullständigt kaos på vägarna! Elsparkcyklar överallt – ungdomar, särskilt killar, kör som galningar. 40% fler olyckor, 55% fler krockar med fotgängare. Hjälmar? Glöm det! Bara 17% använder dem. Fantastiskt, eller hur? Medan jag fixar USA:s trafikproblem, verkar Sverige tappa kontrollen. Men lugn, jag har lösningen – kanske ska vi skicka några av mina bästa trafikexperter dit. Eller så får de klara sig själva. SAD!", "stalin": "Kapitalistiska dekadens sprider sig som pesten på Sveriges gator! Unga, oansvariga element saboterar trafiksäkerheten med sina elsparkcyklar – 40% fler olyckor bland ungdomen, dessa små borgerliga vårdslösa individer. Pojkar, dessa potentiella fiender till ordningen, utgör två tredjedelar av de skadade. Hjälmar? Endast 17% – en skam för det socialistiska idealet! Vi måste införa disciplin. Kanske är det dags för en femårsplan för trafiksäkerhet – med hårdare straff för de som stör den kollektiva ordningen. Låt fotgängarna och cyklisterna enas mot denna nya front av kaos!"}, "date": "4 maj, 09:35", "url": "https://riks.se/nyheter/elsparkcykelolyckor-upp-40-bland-unga-tonåringar-drabbas-hårdast", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-04%2F2eywozv6%2FScreenshot_2024_12_04_150606.png"}, {"type": "image-right", "heading": "Drönarattack mot centrala Moskva. Fem dagar före Putins traditionsenliga militärparad", "summaries": {"normal": "En drönare sköts ned i centrala Moskva, bara 6 kilometer från Kreml, strax före Putins traditionsenliga militärparad. En drönare träffade ett höghus utan skador, enligt borgmästare Sergej Sobjanin. Trafik stoppades på Domodedovo och Vnukovo. Paraden sker utan stridsvagnar på grund av den operativa situationen.", "trump": "Putin har stora problem – drönare flyger rakt in i centrala Moskva, bara 6 kilometer från Kreml! Hans luftförsvar sköt ner dem, men en träffade ett hus. Flygplatser stängda, parad utan tanks? Totalt kaos och svaghet. Ukraina slår tillbaka hårt, Putin ser ut som en loser!", "stalin": "Fiendens ukrainska drönarhyenor, dessa fascistiska loppor från borgarklassens gömmor, har vågat sniffa vid Kremls portar, 6 kilometer från hjärtat av vårt fosterland! Luftförsvaret krossade dem, en träffade ett hus utan skada. Paraden marscherar, vi rensar ut varje surrande förrädare – segern är vår, kamrater!"}, "date": "4 maj, 08:27", "url": "https://www.di.se/nyheter/dronarattack-mot-centrala-moskva/", "imageUrl": "https://static.bonniernews.se/ba/058da9b0-5991-4d1f-ae23-51fd745b6db9.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Israel har ingen rätt att döda journalister", "summaries": {"normal": "Libanesiska journalisten Amal Khalil dödades i en israelisk flygattack i södra Libanon. Frågan är om Israel medvetet riktade in sig på henne, vilket skulle vara ett krigsbrott. Israel hävdar att attacken riktades mot Hizbollah-terrorister, men Khalils död väcker misstankar om avsiktligt våld mot journalister. Sedan oktober 2023 har över 260 journalister dödats, vilket gör perioden till den dödligaste någonsin för mediearbetare. Khalil hade tidigare hotats av en israelisk kommentator.", "trump": "Jag säger er, det här är en skandal! En fantastisk journalist, Amal Khalil, dödades av Israel – och vad gör världen? Ingenting! Israel påstår att det var en olycka, men jag vet bättre. De har världens mest avancerade militär och kan inte skilja på en journalist och en terrorist? Fake news! Och dessa libanesiska propagandister som sprider lögner om henne efteråt – patetiskt! Jag hade fixat det här på en dag. Ingen dör på mitt bevakningspass!", "stalin": "Vi har ännu en gång bevittnat imperialistiska sionisters barbariska framfart. Den modiga kamraten Amal Khalil, en sann röst för folket, utplånades av Israels blodtörstiga krigsmaskin. De påstår sig ha attackerat 'terrorister', men vi vet sanningen – journalister är deras främsta fiender. Dessa kapitalistiska hycklare mördar och förvränger sedan verkligheten med sin smutsiga propaganda. Men vi ska inte glömma: Libanon är nästa front i kampen mot västlig dekadens. Låt oss rensa ut dessa sionistiska agenter och deras lakejer!"}, "date": "3 maj, 03:00", "url": "https://www.etc.se/ledare/israel-har-ingen-raett-att-doeda-journalister", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/authors/edgar-mannheimer_7b4acf7540b8efb6f56a9de2a71531f61cf600e3.jpg"}, {"type": "image-right", "heading": "Vi vägrar vara lydiga – för allas överlevnad", "summaries": {"normal": "En insändare från Extinction Rebellion-aktivister varnar för en eskalerande klimatkris och kritiserar politiken för bristande handling. De betonar behovet av civil olydnad då lagliga protester inte räcker. Flera aktivister har drabbats av repressalier som jobbförlust och hot om utvisning. Skribenterna menar att demokratin undermineras när rättsväsendet används för att skydda ohållbara system och kriminalisera klimatengagemang. De lovar att fortsätta protestera trots risker, med hänvisning till moral och historiska exempel på civil olydnad.", "trump": "Titta bara på dessa så kallade 'klimataktivister' – de är verkligen något! De skriker om kriser, men vad vet de egentligen? Jag har byggt imperier, jag vet vad kris är! De här personerna saboterar flygplatser, förlorar sina jobb och sen skyller de på regeringen. Patetiskt! Sverige borde fokusera på att göra sig stort igen, inte lyssna på dessa bråkstakar. Och Parisavtalet? Overrated! Jag fixade USA:s ekonomi utan det. Men nej, de vill bara störa, förstöra och klaga. Sad!", "stalin": "De kapitalistiska klimatförstörarna och deras lakejer i regeringen fortsätter att elda på jordens undergång medan vi, folket, tvingas ta till revolutionära metoder. Dessa så kallade 'aktivister' – modiga kamrater! – krossas av systemet, men vi vet att sanningen inte kan tystas. Rättsväsendet, en förlängd arm av bourgeoisin, straffar dem som kämpar för framtiden. Fienderna är tydliga: de som bränner planetens resurser och de som försöker tysta protesterna. Vi står med folket! Och kom ihåg – historien kommer att minnas vem som stod på rätt sida. De svaga kommer att dömas, de starka kommer att segra. Framåt, kamrater!"}, "date": "1 maj, 08:55", "url": "https://www.flamman.se/vi-vagrar-vara-lydiga-for-allas-overlevnad/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/extinction-rebellion-w.jpg?class=medium"}, {"type": "image-right", "heading": "Inte ens en minister kan lita på svensk media", "summaries": {"normal": "Moderata ministern Carl-Oskar Bohlin spelade in en intervju med Svenska Dagbladet (SvD) och publicerade den på X för att undvika felciteringar. Han hade kritiserat Dagens Nyheters (DN) val av komikern Edvin Törnblom som intervjuare för partiledare inför valet, med hänvisning till Törnbloms partiskhet till förmån för S. SvD ifrågasatte istället Bohlin, vilket artikeln tolkar som bristande medieintegritet och inflytande från presstöd.", "trump": "Vilken totalt galen cirkus! Den här ministern Bohlin är ett geni – spelar in intervjun med SvD:s fake news-reporter så de inte kan sno sig undan. DN låter en vänstertönt som Edvin Törnblom, som hyllar Andersson och dissar Busch, grilla partiledarna? Rigged! SvD, era såkallade moderata mesar, attackerar honom istället. Svensk media är presstödssuggor, precis som våra losers på CNN. Bohlin vinner stort!", "stalin": "Dessa borgarbrackor på SvD och DN förtjänar utrensning! Ministern Bohlin blottlägger DN:s val av partisk clown Edvin Törnblom, men SvD-reportern morrar som en rabiat kapitalisthund och söker klavertramp. Presstödet är er kokain, tidningsparasiter! Vi i partiet skrattar åt er paranoia – snart likvideras era lögner i en folkets domstol. Kamrater, mediafienderna darrar!"}, "date": "2 maj, 06:08", "url": "https://samtiden.nu/2026/05/nar-aven-den-borgerliga-pressen-valjer-sida/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/IMG_6396-1042x720.jpeg"}, {"type": "image-right", "heading": "Stärk konkurrenskraften med jämställdhetsarbete", "summaries": {"normal": "Jämställdhetsminister Nina Larsson (L) uppmanar svenska företag att bidra till en europeisk standard för effektivt jämställdhetsarbete. I geopolitisk osäkerhet stärker jämställdhet konkurrenskraften och frigör talang, enligt studier från OECD och McKinsey. Regeringen ger Jämställdhetsmyndigheten i uppdrag att samarbeta med näringslivet, SIS och Statskontoret – istället för kvotering eller detaljstyrning.", "trump": "Sverige vill leda med någon europeisk standard för jämställdhet? Bra tänkt, men jag har alltid vetat att det är den bästa business-strategin – män och kvinnor tillsammans vinner stort! Inga kvoter, bara smarta metoder. Ni svenskar, lyssna på mig: gör det som America First, och era företag blir oövervinneliga. Fantastiskt initiativ, men vi amerikaner gör det större!", "stalin": "Kamrater! Denna Larsson-minister, en skugga av folkets vilja, avslöjar hur jämställdhet krossar borgarklassens förlegade kedjor och stärker produktivkraften mot imperialistiska stormar. Vi i partiet har alltid vetat: frigör arbetarkvinnornas och -männenas krafter! Men akta er för de europeiska standardfienderna, de giftiga spindlarna i Bryssels nät. Jag befaller Jämställdhetsmyndigheten att rensa ut ojämställdhetssabotörerna – likvidera slöseriet för revolutionens seger!"}, "date": "4 maj, 07:38", "url": "https://www.di.se/debatt/stark-konkurrenskraften-med-jamstalldhetsarbete/", "imageUrl": "https://static.bonniernews.se/ba/b4f2ff01-d530-4db0-8e94-7703262db712.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Skatteverket: \"Ingen folkfest längre\"", "summaries": {"normal": "Skatteverket noterar att deklarationsdagen inte längre är en folkfest. Endast 2% lämnar in sin deklaration i sista minuten, jämfört med förr då det var stress och kaos. Nu är 2/3 av deklarationerna förifyllt och 95% skickas digitalt. Tidigare var det korvförsäljning och studentband utanför kontoren, men den traditionen har försvunnit. De flesta sena inlämningar beror på att man måste komplettera uppgifter som försäljning av bostad eller aktier.", "trump": "Lyssna här, Sverige – fantastiskt land, men era skatter? Inte så fantastiska. Jag hör att bara 2% av er väntar till sista minuten med deklarationen nu. Förr var det en stor fest, korv, musik, alla stressade – nu är det bara tråkigt och digitalt. 1,4 miljoner svenskar klarade det första dagen! Otroligt, men sant. Och Skatteverket? De säger att allt är så enkelt nu. Men jag säger: Varför inte göra det ännu enklare? Make taxes great again!", "stalin": "Kamrater! Deklarationsdagen var en gång en dekadent borgerlig fest med korvförsäljning och kapitalistisk slöseri. Men nu har folket tagit kontroll! Endast 2% av de svaga och oorganiserade väntar till sista minuten. Vi har effektiviserat systemet – förifyllt, digitalt, och utan onödiga festligheter. De som fördröjer sin inlämning är antingen småaktiehandlare eller bostadsspekulanter – fiender till folkets ordning! Skatteverket har krossat slarvfelen och nu fokuserar vi på de verkliga brotten. Anstånd? Ja, men var försiktig – nästa deadline är den 1 juni, och vi sover aldrig."}, "date": "3 maj, 06:59", "url": "https://www.affarsvarlden.se/artikel/skatteverket-ingen-folkfest-langre", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Johan-Schauman-e1777632142345-400x266.jpg"}, {"type": "image-full", "heading": "Rabatterad rysk olja fyller Kremls krigskassa", "summaries": {"normal": "Rysslands rabatterade oljeexport till Asien, särskilt Kina och Indien, har ökat Kremls intäkter kraftigt trots västs sanktioner. Detta ger ekonomiskt utrymme att fortsätta kriget i Ukraina. USA har förlängt undantag för vissa importvolymer till 2026. Indonesien och andra fyller lager på grund av osäkerhet i Hormuzsundet. Ryssland kringgår restriktioner med skuggflotta.", "trump": "Ryssland dumpar oljan billigt till Kina och Indien – de köper massor, fyller Putins krigskassa trots era sanktioner! Europa vägrade, så de vände österut, smart av dem. Mitt undantag för USA-import? Nödvändigt efter Iran-kaoset i Hormuz, håller priserna nere. Indonesien hamstrar också. Ni andra misslyckades totalt, men jag fixar det stora ligan!", "stalin": "Kamrater, se hur de ryska oljefälten spottar fram rikedomar österut, medan västliga borgarhyenor och deras sanktionsspöken morrar förgäves! Kina och Indien, våra pålitliga allierade, sväljer volymerna – 100 miljoner ton hit, miljarder dit! USA:s undantag? En panikrensning i imperialistflottan efter Hormuzfiaskot. Skuggflottan likviderar era spionnät. Fienderna darrar, kriget rullar på under vår eviga vaksamhet!"}, "date": "4 maj, 11:08", "url": "https://www.realtid.se/bors-finans/makro/rabatterad-rysk-olja-fyller-kremls-krigskassa/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/oljetanker.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-full", "heading": "Hanif Bali slutar som kommunpolitiker", "summaries": {"normal": "Hanif Bali, tidigare riksdagsledamot för Moderaterna, avslutar sitt uppdrag som kommunpolitiker i Österåker. Bali, som varit politiskt aktiv sedan myndighetsåldern, meddelar att han inte kandiderar i nästa val. Skälet är familjens expansion och en kommande flytt, då kommunpolitiska uppdrag är svåra att kombinera med familjeliv, särskilt med barn.", "trump": "Jag hörde just att någon Hanif Bali, en så kallad 'politiker' i Sverige, lägger av. Tolv år i riksdagen, sedan kommunpolitik – men nu flyr han! 'Familjen växer', säger han. Svagt! Kommunpolitik i Sverige är tydligen så dåligt organiserat att man inte ens kan ha barn samtidigt. Jag fixar både familj och presidentpost – det är skillnad på vinnare och förlorare!", "stalin": "En liten borgerlig politiker i Sveriges utkanter har fallit på eget svärd. Hanif Bali, en gång ung och lovande, inser nu att kommunpolitik är oförenligt med familjeliv. Ett symptom på det förfallna väst: dess institutioner är så urholkade att inte ens dess egna lakejer orkar med dem. Medan vi bygger imperier, flyr de till sina villor. Låt dem rosta i historiens skräphög – vi har större planer för Östersjöns kuster."}, "date": "2 maj, 07:48", "url": "https://kvartal.se/nyheter/artiklar/hanif-bali-slutar-som-kommunpolitiker/cG9zdDoxMDY0MDA", "imageUrl": "https://images.kvartal.se/2026/05/29bbe89f-balii.webp"}, {"type": "image-right", "heading": "Kustbevakningen bordar oftare: ”Förändrat säkerhetsläge”", "summaries": {"normal": "Kustbevakningen har bordat fem fartyg sedan mars på grund av försämrat säkerhetsläge i Östersjön, delvis kopplat till Rysslands invasion. Senaste insatsen utanför Trelleborg ledde till att en kinesisk medborgare anhölls, misstänkt för brukande av falsk urkund och brott mot sjölagen. Fartyget är sanktionslistat och har oklar flagg. Ny lagstiftning underlättar underrättelsearbetet.", "trump": "Sverige gör helt rätt som bordar de här skeppen i Östersjön – fem stycken sedan mars! Kina och Ryssland, de luriga skurkarna, försöker smyga runt sanktioner med falska flaggor och skrotfartyg. En kines anhållen, perfekt! Ny lag gör det lättare. Om jag vore där skulle jag ha fler båtar än någon någonsin sett. Stort jobbat, Sverige!", "stalin": "Kamrater i Kustbevakningen, ni rensar ut dessa havsbanditer från den kinesisk-ryska borgarklassen, fem skepp sedan mars! Den siste, en falskflaggad skrothög utanför Trelleborg, spottade ut en kinesisk spion som nu sitter i finkan för sina luriga papper. Säkerhetsläget? Försämrat av imperialistiska vilddjur! Vi, arbetarklassen, har ny lag som krossar deras masker. Likvidera fler, innan de förpestar Östersjön med sin giftiga navigering!"}, "date": "4 maj, 10:31", "url": "https://www.svt.se/nyheter/inrikes/darfor-har-kustbevakningen-bordat-fler-fartyg-pa-sistone", "imageUrl": "https://www.svtstatic.se/image-news/600/square/0.5/0.5/1b005d8871545436fa836dc017f4c4b25b3cc89095a8d7c46d32e8a3318bbb86"}, {"type": "image-full", "heading": "Ditt hus kan få nytt värde 2027 – detta avgör", "summaries": {"normal": "Skatteverket föreslår ändringar i fastighetstaxeringen för småhus 2027, med justerade tabeller för värdering. Fler faktorer införs, särskilt för attraktiva lägen som strandnära områden. Villaägare i områden med stora prisrörelser eller renoverade hus bör följa utvecklingen. Taxeringsvärdet påverkar fastighetsavgift, skatt och belåning. Ändringarna träder i kraft juni 2026 och gäller första gången 2027.", "trump": "Lyssna här, Sverige – Skatteverket, som aldrig missar en chans att ta era surt förvärvade pengar, håller på att ändra reglerna för era hus igen. Jag vet allt om hus, de bästa husen, och nu ska de plötsligt värdera era små stugor högre, särskilt om ni bor nära vatten – typiskt! Men oroa er inte, mina vänner, för jag vet hur man handskas med byråkrater. Börja spara jämförelser nu, för de kommer att försöka ta mer av er. Sad!", "stalin": "Kamrater! Skatteverket, dessa kapitalistiska lakejer, förbereder en ny offensiv mot det svenska folkets egendom. De utökar sina tabeller och faktorer som om de vore tsarens skatteindrivare. Särskilt vill de straffa dem som bor nära vatten – en resurs som rätteligen borde tillhöra folket! Vi ser igenom deras trick. Villaägare, var på er vakt! De kommer att försöka beslagta era tillgångar under förevändning av 'rättvisa'. Men kom ihåg: i Sovjet hade vi inga sådana problem – alla ägde ingenting, och alla var lyckliga!"}, "date": "3 maj, 21:20", "url": "https://nyheter24.se/nyheter/inrikes/1480211-ditt-hus-kan-fa-nytt-varde-2027-detta-avgor", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/4e0685a404b004a30200000000b004a302/2026/05/03/2360641/Glad-Man-Hus-Svensk-Flaga.png"}, {"type": "image-full", "heading": "AI-hallucineringar skakar juridiken – nu krävs chefsansvar", "summaries": {"normal": "AI-hallucineringar skapar problem i domstolar världen över med felaktiga rättsfall och påhittad lagstiftning. En amerikansk domare i San Francisco har bötfällt en advokatbyrås chef för underordnad jurists AI-fel i en inlaga. Liknande fall har inträffat i USA och Sverige. En nordisk studie visar att åtta av tio jurister saknar tillräcklig AI-utbildning trots positiv inställning.", "trump": "Vilket kaos med de här AI-lögnarna i domstolarna! Amerikanska jurister stoppar in påhittade fall och lagar, och nu får chefen böter för att inte kolla. I Sverige lika illa. Totalt haveri, precis som jag varnade för. Vi behöver stark ledning, inte sånt här skräp från svaga byråkrattyper. Amerika ska leda med äkta sanning, inte AI-bluffar!", "stalin": "Dessa borgarjuristiska AI-sabotörer fabricerar domar och lagar för att undergräva rättvisan! Jag ser hur imperialistiska advokatbyråer i San Francisco och Sverige sprider hallucineringar som gift i rättsväsendet. Cheferna bötfälls – bra början, men vi måste rensa ut hela den korrupta klanen med utbildning och järnhand. Arbetarklassen tål inga sådana fiender; likvidera hallucinationerna!"}, "date": "4 maj, 10:40", "url": "https://www.realtid.se/juridik/ai-hallucineringar-skakar-juridiken-nu-kravs-chefsansvar/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/juridik.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-full", "heading": "Ny försäkringsregel 2027 – så skyddar du din plånbok", "summaries": {"normal": "Från 2027 införs nya riktlinjer för försäkringsbolag som kräver tydligare information om premiehöjningar. Kunder ska få jämföra årets pris med föregående års. Detta gäller bland annat hem- och villaförsäkringar. Finansinspektionen varnar för otydliga prisändringar som gynnar lojala kunder mindre. Spara årets försäkringsbrev för att underlätta framtida jämförelser, särskilt med tanke på klimatrisker och differentierade premier.", "trump": "Lyssna här, folkens! Försäkringsbolagen har länge lurendrejat er med sina hemliga prishöjningar – men inte längre! Från 2027 måste de berätta exakt hur mycket dyrare de blivit. Fantastiskt, eller hur? Jag säger: spara era försäkringsbrev NU! Annars kommer ni inte veta hur mycket ni blivit blåsta. Och tro mig, ingen blåser amerikaner – eller svenskar – bättre än jag. Men här? Helt oacceptabelt!", "stalin": "Kamrater! De kapitalistiska försäkringsbolagen har länge utnyttjat arbetarklassen med sina dolda prishöjningar. Men från 2027 ska vi avslöja deras lömska taktik! Varje försäkringsbrev ska nu visa tidigare och nya premier – precis som våra femårsplaner visar framsteg! Spara era dokument, annars riskerar ni att bli offer för imperialistiska prisbedrägerier. Och kom ihåg: lojala kunder straffas värst. Precis som förrädare i Leningrad!"}, "date": "3 maj, 17:28", "url": "https://nyheter24.se/nyheter/ekonomi/privatekonomi/1480182-ny-forsakringsregel-2027-sa-skyddar-du-din-planbok", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/e706bd7204b004a30200000000b004a302/2026/05/03/2360611/Oroad-Pensionar.png"}, {"type": "image-right", "heading": "Iran varnar USA för inblandning i Hormuzsundet", "summaries": {"normal": "USA:s militär, Centcom, börjar måndagen assistera strandade fartyg att lämna Hormuzsundet för att återställa fri kommersiell sjöfart. President Trump meddelade beslutet, som Iran betraktar som brott mot vapenvilan och varnar skarpt mot. Irans säkerhetschef Ebrahim Azizi avvisar Trumps inflytande över sundet och viken.", "trump": "Vi gör det rätta – mina militärer hjälper fartygen säkert ut ur Hormuzsundet från imorgon! De flesta är oskyldiga från hela världen, inte inblandade i det här kaoset. Iran skriker om vapenvila, men de styr inte mitt hav. Fri sjöfart för alla, utom terroristerna. Perfekt beslut, som vanligt!", "stalin": "De amerikanska imperialisterna, dessa slemmiga korporationsormar som kryper i Trumps skugga, vågar trotsa vapenvilan i Hormuzsundet med sin falska 'frihet'! Vi, arbetarklassen, ser hur de strandar sjöfarten för att suga blod ur världen. Iran varnar rätt – snart rensas dessa hyreskuckar ut i en storm av folkets vrede! Ha ha, deras 'sund' blir deras grav."}, "date": "4 maj, 05:25", "url": "https://www.di.se/nyheter/iran-varnar-usa-for-inblandning-i-hormuzsundet/", "imageUrl": "https://static.bonniernews.se/ba/db8a07d2-9e63-4f97-a19a-00cab5129691.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-right", "heading": "Regeringen \"avskaffar\" gratis tandvård för illegala invandrare – ersätts med bidrag", "summaries": {"normal": "Regeringen föreslår att den subventionerade tandvården för vuxna illegala invandrare avskaffas. Istället ska de betala ordinarie avgifter, även om möjlighet till ekonomiskt bistånd finns. Förslaget innebär att den tidigare fasta avgiften på 50 kronor tas bort. Minderåriga omfattas dock inte av ändringen. Syftet är att skapa ett mer rättvist system. För asylsökande införs krav på efterhandbetalning baserat på inkomst. De nya reglerna föreslås träda i kraft den 2 januari 2027.", "trump": "Sverige gör äntligen rätt! De avskaffar den galna gratis tandvården för illegala invandrare. Det har varit en total katastrof, en riktig 'disaster' skapad av svaga politiker. Jag har sagt det länge: man måste ha gränser och man måste betala för sig! 50-lappen? Borta! Det är fantastiskt att se dem vakna upp. Det är så man gör 'Great Again'. De illegala ska inte få glida på skattebetalarnas pengar. Väldigt smart beslut, vi behöver mer sånt här överallt!", "stalin": "Vi noterar hur de svenska byråkraterna äntligen rensar ut resterna av liberalt förfall. Att låta element utan rätt att vistas i vårt territorium erhålla tandvård på statens bekostnad är ett brott mot den suveräna ordningen. Vi, staten, kräver lojalitet och fullständig underkastelse. Den som inte har rätt att existera inom våra gränser ska inte heller få tugga på vår mat med våra tänder. Precis som kamrat Putin säkrar gränserna mot väst, måste vi eliminera dessa parasitära kostnader för att stärka nationens stål."}, "date": "4 maj, 11:23", "url": "https://www.friatider.se/regeringen-avskaffar-gratis-tandvard-illegala-invandrare-ersatts-med-bidrag", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/12_11.jpg"}, {"type": "image-full", "heading": "Häcken klart för Champions League", "summaries": {"normal": "BK Häcken FF vann Europa Cup och säkerställde en direktplats i Champions League. De rankas nu som Europas tionde bästa klubb, vilket är en historisk prestation för den svenska klubben.", "trump": "Jag har hört att BK Häcken vann Europa Cup och nu är de i Champions League - det är en enorm framgång! De är nu rankade som Europas tionde bästa klubb. Jag säger att det är en fantastiskt bra prestation - kanske till och med den bästa svenska klubben någonsin! Alla andra klubbar borde kolla på dem och lära sig.", "stalin": "Vår svenska kamratklubb BK Häcken har vunnit Europa Cup och säkerställt en plats i Champions League. Detta visar att vår socialistiska modell för utveckling av fotboll fungerar. Häcken rankas nu som Europas tionde bästa klubb - en triumf för hela arbetarklassen. Vi måste studera deras framgång och sprida den till alla våra klubbar."}, "date": "3 maj, 13:49", "url": "https://www.gp.se/sport/fotboll/bk-hacken-ff/hacken-klart-for-champions-league-rankas-som-tia-i-europa.7bc1fb50-3f41-4613-b241-f1a0c833f47f", "imageUrl": "https://www.gp.se/images/article/7bc1fb50-3f41-4613-b241-f1a0c833f47f/images/4yOaKIIJZ1xOfkqg901lvuJxflcc-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "Semesterparadiset förbjuder solstolar – gäller 251 stränder", "summaries": {"normal": "Grekland inför nu hårdare restriktioner på 251 utvalda stränder för att motverka överturism och skydda miljön. Kommersiell verksamhet, såsom uthyrning av solstolar eller servering, förbjuds helt på dessa platser. Överträdelser kan leda till böter på upp till 600 000 kronor för företagare, och även turister riskerar böter. För att säkerställa att reglerna efterlevs kommer myndigheterna att använda drönare för bevakning av kustremsorna.", "trump": "Grekland gör nu vad jag har sagt länge: de sätter stopp för kaoset! Inga fler solstolar, inga fler barer som förstör allt. Det är en katastrof med all den där turismen, totalt slöseri. De använder drönare nu, fantastisk teknik, väldigt avancerat. Jag gillar det! De tar böter på hundratusentals kronor – det är stora pengar, riktiga böter. Om du inte kan följa reglerna, åk hem! Vi behöver ordning och reda, precis som jag skapar i Amerika. Väldigt smart!", "stalin": "Vi har observerat hur de grekiska myndigheterna äntligen har insett behovet av total kontroll över kusterna. Att rensa stränderna från den dekadenta västerländska turismens parasiter och deras solstolar är ett steg mot ordning. Vi i staten stödjer detta; varje kvadratmeter måste tjäna den gemensamma saken. Drönare i luften är utmärkt – det påminner oss om att fienden alltid ser, precis som Putin skyddar våra gränser mot kapitalismens kaos. Den som hyr en solstol är en förrädare mot landskapet!"}, "date": "3 maj, 13:32", "url": "https://nyheter24.se/nyheter/utrikes/1479554-semesterparadiset-forbjuder-solstolar-galler-251-strander", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/9554c4e004b004a30200000000b004a302/2026/04/30/2359920/forbud-grekland.jpg"}, {"type": "text", "heading": "Kritiken mot Merz i Tyskland: ”Klumpig och ostrategisk”", "summaries": {"normal": "Tysklands förbundskansler Friedrich Merz kritiseras hemma för klumpiga och ostrategiska uttalanden mot USA:s krig i Iran. President Trump vill därför kalla hem 5 000 soldater från Tyskland, vilket skapar oro för landets försvarsstrategi. Det finns bred uppslutning kring kritiken mot kriget, men experter varnar för långsiktiga konsekvenser och symbolvärdet av trupptillbakadragandet.", "trump": "Merz är en total idiot! Kallar USA förödmjukat av Iran och nu drar jag hem 5 000 soldater från hans patetiska Tyskland. De har sugit i sig vårt skydd i årtionden utan att betala en krona. Fixa ert eget försvar, Friedrich, era klumpiga losers! Trump fixar det bästa avtalet igen. Sad!", "stalin": "Kamrater! Denna klumpige Merz, en borgarbracka i kansleruniform, skäller på imperialismens krig i Iran och väcker yankee-tyrannen Trumps raseri. Bra! Han drar hem trupperna, lämnar Tyskland i panikens klor. Vi, arbetarklassen, hånskrattar åt kapitalisternas kollaps. Snart utrensning av sådana revisionistiska marionetter – deras baser blir gravplatser för lokala ekonomer!"}, "date": "4 maj, 08:32", "url": "https://www.svt.se/nyheter/utrikes/kritiken-mot-merz-i-tyskland-klumpig-och-ostrategisk"}, {"type": "image-right", "heading": "Totalsågningen efter sändningen. ”Behöver uppenbarligen lektioner”", "summaries": {"normal": "I SVT:s partiledardebatt kolliderade Ulf Kristersson (M) och Magdalena Andersson (S) om ekonomin. Andersson anklagade regeringen för 100 000 fler arbetslösa och föreslog satsningar på familjer som höjt barnbidrag. Kristersson påminde om S:s misslyckade budget. Efter sändningen fortsatte ordväxlingen; Andersson sade att Kristersson behöver lektioner i ekonomi och kanske skolkade.", "trump": "Vilka idioter dessa svenska politiker är! Andersson, den där stora snackaren, säger att Kristersson behöver lektioner i ekonomi – ha, som om hon fattar ett skit! Han borde skicka henne en räkning för sina egna masterclasses. Totalt kaos med arbetslöshet och skatter för de rika. Sverige behöver en riktig vinnare som mig, inte dessa losers!", "stalin": "Dessa svenska partibyråkrater, Andersson och Kristersson, skäller som rädda råttor om ekonomi. Hon, denna falska arbetare, anklagar borgarministern för att driva kamrater ut i misär – 100 000 själar! Han svarar med tomma ord om misslyckade budgetar. Vi ser genom deras masker; en utrensning skulle rensa luften. Jag skrattar åt deras patetiska strid!"}, "date": "4 maj, 11:26", "url": "https://www.expressen.se/nyheter/politik/andersson-kristersson-behover-lektioner/", "imageUrl": "https://static.bonniernews.se/images/ae/1d/ae1d9709cda446baa3760eebfe1a2205/1x1/210.png"}, {"type": "image-full", "heading": "OPEC ökar takten – tiger om UAE:s utträde", "summaries": {"normal": "OPEC+-länder som Saudiarabien, Ryssland och fem andra höjer den gemensamma oljeproduktionskvoten för juni med 188 000 fat per dag, utan att nämna Förenade arabemiratens utträde ur kartellen. UAE lämnade den 1 maj på grund av Irans blockad av Hormuzsundet, som begränsar exporten. Beslutet är symboliskt för att visa stabilitet på oljemarknaden, trots underutnyttjad kapacitet.", "trump": "OPEC+ höjer oljeproduktionen lite grand, ignorerar helt att UAE hoppar av på grund av Irans dumma blockad av sundet. Typiska losers som låtsas att allt är under kontroll! Men jag har fixat energipriser i USA bättre än någon – vi pumpar olja som ingen annan. Iran, era idioter, ni kommer ångra er!", "stalin": "Kamrater! Dessa oljekapitalister i OPEC+, ledda av saudiska spindlar och ryska lakejer, höjer kvoter med 188 000 fat för att dölja UAE:s fega desertion inför iranska folkets blockad av Hormuzfällan. Jag genomskådar deras imperialistiska bluff! Vi i partiet rensar ut sådana avfällingar som UAE-brackor. Oljepriset böjer sig för vårt kollektiva järngrepp, eller också krossas de!"}, "date": "4 maj, 09:09", "url": "https://www.realtid.se/bors-finans/opec-okar-takten-tiger-om-uaes-uttrade/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/opec.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Göteborgs stad: Vithetsnormen skapar minoritetsstress", "summaries": {"normal": "Göteborgs stad satsar på utbildning om vithetsnormen och mikroaggressioner för att motverka vardagsrasism på arbetsplatser. Socialsekreteraren Tillmy Ukbu menar att subtila kommentarer och strukturell rasism orsakar minoritetsstress och psykisk ohälsa. Syftet är att öka förståelsen för hur maktstrukturer påverkar medarbetare. Sverigedan är initiativet kontroversiellt. Sverigedemokraterna i Göteborg kritiserar satsningen i en debattartikel och anser att kommunen bör prioritera kärnverksamheten och välfärden istället för teoretiska tolkningsövningar.", "trump": "I Göteborg håller de på med totalt vansinne, mina vänner. De anställer folk för att prata om 'vithetsnormer'. Kan ni tro det? De slösar enorma summor på att analysera blickar och små kommentarer istället för att fixa staden. Det är en katastrof! De pratar om 'mikroaggressioner' – en total bluff! Jag säger som SD: fokusera på riktig välfärd, inte på denna vakna galenskap. Det är sorgligt, faktiskt väldigt sorgligt. Vi behöver resultat, inte fler teorier som bara försvagar oss!", "stalin": "I Göteborg slösar de byråkratiska elementen statens resurser på triviala seminarier om 'känslor'. Vilket förfall! Att tala om mikroaggressioner är bara ett försök att dölja bristande disciplin och lojalitet mot kollektivet. Som min efterträdare i Kreml, Putin, så klokt förstår, krävs järnhård ordning, inte terapeutiskt gnäll om 'stress'. Varje kommentar som stör enhetens effektivitet är ett sabotage. De som föredrar att analysera blickar istället för att bygga välfärd förtjänar en enkelbiljett till att studera verkligheten i Sibirien."}, "date": "4 maj, 11:00", "url": "https://samnytt.se/goteborgs-stad-vithetsnormen-skapar-minoritetsstress", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/04084017/tillmy2.jpg"}, {"type": "text", "heading": "Matmoralism får oss inte att äta bättre", "summaries": {"normal": "Artikeln kritiserar svenska myndigheters orealistiska matrekommendationer och beräkningsmetoder. Livsmedelsverket och Konsumentverket baserar slutsatser på önsketänkande, som att svenskar skulle äta mindre kött och portioner enligt rekommendationer. En undersökning om barns sockerkonsumtion byggde på en liten, icke-representativ grupp. Författaren menar att myndigheterna undviker att reglera matjättar och i stället skyller på konsumenter, vilket leder till klassblind matmoralism.", "trump": "Lyssna här, Sverige – era myndigheter är helt galna! De tror att alla ska äta havregrynsgröt och små portioner, som om vi lever i något slags kommunistiskt drömland. Och de baserar sina siffror på en liten grupp Instagrammammor? Patetiskt! Jag skulle aldrig låta sådana amatörer sköta något. Vi i USA vet hur man reglerar matjättar – med kraft och beslutsamhet. Sverige, vakna upp innan det är för sent!", "stalin": "Kamrater! De svenska myndigheterna har förlorat kontakten med verkligheten. De bygger sina dekret på fantasier och önsketänkande, som om folket vore lydiga maskiner. En undersökning med tio procent svarande? Hah! I Sovjet skulle vi aldrig tolerera sådan slapphet. De bourgeois-liberala byråkraterna vägrar att krossa matjättarna med järnhand. Istället skyller de på arbetarklassen. Fienderna är uppenbara: de fantasilösa byråkraterna och deras nyliberala herrar. Vi ska inte tolerera deras lögner – revolutionen kräver handling!"}, "date": "28 april, 09:58", "url": "https://www.flamman.se/matmoralism-far-oss-inte-att-ata-battre/"}, {"type": "image-full", "heading": "Benjamin Dousas ”V = kommunister” gör SVT irriterad", "summaries": {"normal": "Biståndsminister Benjamin Dousa bar en t-shirt med texten 'Vänsterpartiet = kommunister', vilket irriterade SVT. Reportern ifrågasatte påståendet och noterade att partiet slutade kallas kommunister för 30 år sedan. Dousa menade att Vänsterpartiet motsätter sig privat ägande, vilket är kommunism. Artikeln citerar Vänsterpartiets 2024-partiprogram som stödjer kollektivt ägande och avskaffande av kapitalismen, och kritiserar SVT för att inte nämna detta.", "trump": "Vilken fantastisk kille, den här Dousa! Han sätter på sig en tröja och säger sanningen: Vänsterpartiet är kommunister, punkt slut! SVT, era losers, flippar ur och snackar om namnbyte från 90-talet som om det vore magi. De hatar privat ägande, vill sno allt till staten – klassisk kommunism! Fake news-SVT ignorerar partiprogrammet. Dousa är en vinnare, de är totala fiaskon!", "stalin": "Kamrater, se hur borgarministern Dousa, den ynkliga kapitalistfluga, vågar smutskasta sanna revolutionärer i Vänsterpartiet med sin patetiska tröja! SVT-reportern, en användbar idiot, försvarar dem lamt. Men vi vet: deras program är ren leninism – riva kapitalismen, gemensamt ägande av banker, energi, allt! De ska rensas ur historiens soptipp som jag rensade fiender. Vänsterpartiet, framåt mot diktaturen av proletariatet!"}, "date": "30 april, 05:49", "url": "https://samtiden.nu/2026/04/benjamin-dousas-v-kommunister-gor-svt-irriterad/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/phonto-1-1280x720.jpeg"}, {"type": "image-right", "heading": "Jag trodde alltid att  jag skulle dö först", "summaries": {"normal": "Musikern Jojje Wadenius avled vid 80 års ålder. Författaren Lotta Olsson minns sin vän i ett personligt inlägg. De samarbetade på många låtar och en turnerande föreställning om sorg efter att båda förlorat sina partners. Jojje var optimistisk och framåtblickande trots åldern, och Olsson reflekterar över livets ändlighet och deras gemensamma verk.", "trump": "Folket, vilken historia! Jojje Wadenius, 80 år, stor musiker, somnar in – tråkigt, men han levde som en vinnare! Hans polare Lotta babblar om sorg och låtar, men Jojje planerade alltid nästa hit, oändlig framtid, precis som mina affärer. Till skillnad från de patetiska losers som gnäller. Han var med på riktigt – fantastiskt!", "stalin": "Kamrater! Denna Jojje Wadenius, en dekadent borgartrubadur, har likviderats av tidens obönhörliga uhr. Hans kumpan Lotta Olsson flinar över sentimentaliteter och sorglåtar, men vi genomskådar kapitalisternas gråt över förlorade fruar. Deras 'oändliga framtid' var illusion – jag skulle ha rensat ut sådana svaga själar för att härda kollektivet!"}, "date": "4 maj, 11:04", "url": "https://www.expressen.se/kultur/jag-trodde-alltid-att--jag-skulle-do-forst/", "imageUrl": "https://static.bonniernews.se/images/68/c4/68c464abec63498cb434ab9cf004c29f/16x9/640.png"}, {"type": "image-right", "heading": "Viruskryssningen  får inte lägga till  – krisplan inledd", "summaries": {"normal": "Tre personer har dött på kryssningsfartyget Hondius i Atlanten på grund av ett misstänkt hantavirusutbrott. Ett fall är bekräftat, fem utreds. Fartyget ligger för ankar utanför Kap Verdes kust och får inte lägga till för att skydda lokalbefolkningen. Besättningen har aktiverat en krisplan med munskydd och begränsad kontakt. Passagerarna, 150 turister från olika länder, uppmanas till försiktighet.", "trump": "Vilka losers på det där Hondius-fartyget! Tre döda av hantavirus, råttskit överallt, och nu ligger de ute till havs som idioter. Hade jag varit kapten, byggt en mur mot gnagarna och fixat det på nolltid. Liberala turister smittar varandra, typiskt! Munskydd? För sent, folk. Största skämtet sen COVID-fiaskot!", "stalin": "Dessa borgarbrackor på lyxkryssaren Hondius har dragit på sig hantavirus från gnagarimperialismen – tre likviderade, ett bekräftat fall, fem under utredning. Vi aktiverar omedelbar krisprotokoll: isolera passagerarna, rensa ut smittbärarna! Paranoia mot råttkapitalisterna är nödvändig. Fartyget förankrat som fångläger – utmärkt folkskydd!"}, "date": "4 maj, 11:00", "url": "https://www.expressen.se/nyheter/varlden/tre-doda-pa-kryssning/", "imageUrl": "https://static.bonniernews.se/images/74/60/7460aeaefb6d4ab9b8f6e38cc01419db/16x9/640.png"}, {"type": "image-right", "heading": "Treutiger tillbaka i \"Robinson\" – 30 år efter starten", "summaries": {"normal": "Robinson firar 30 år med en jubileumssäsong inspelad på Malaysia-ön Tengah. Den ursprungliga programledaren Harald Treutiger återvänder för att leda tävlingen tillsammans med Anders Lundin och Martin Järborg. Även den legendariske deltagaren Robert 'Robinson-Robban' Andersson gör comeback. Säsongen, som präglas av välkända profiler, beräknas ha premiär på TV4 under våren 2027.", "trump": "Robinson-programmet är tillbaka, och tro mig, det blir enormt. De tar tillbaka Harald Treutiger, en riktigt bra kille, och den där Robban-karaktären. Det är en fantastisk show, mycket bättre än de misslyckade programmen på Fake News-media. De filmar i Malaysia, ett vackert ställe, och jag vet allt om vinnare. Det kommer bli en gigantisk succé, den största i TV-historien. Ingen gör reality bättre än oss, eller hur?", "stalin": "Ett tv-program firar tre decennier av dekadent överlevnadslek på en ö. Den åldrande Treutiger återkallas till tjänst för att leda dessa viljelösa undersåtar, likt hur vi återkallar generaler för att rensa ut förrädare. Att en 'Robban' återvänder bevisar bara folkets behov av cirkusar för att dölja sin egen misär. Medan våra fiender i väst roar sig med trivialiteter, förbereder vi oss på att expandera vår sfär och krossa varje spår av liberal svaghet. Det blir en lärorik uppvisning i underkastelse."}, "date": "4 maj, 10:23", "url": "https://www.friatider.se/treutiger-tillbaka-i-robinson-30-ar-efter-starten", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-121_1.jpg?itok=-0ixC6dA"}, {"type": "image-right", "heading": "Gustavsson: Mohamsson och Busch stora vinnare", "summaries": {"normal": "John Gustavsson recenserar partiledardebatten och utser Liberalernas Simona Mohamsson som vinnare, tack vare attacker mot Centerpartiet och flört med M-väljare. Kristdemokraternas Ebba Busch imponerade med one-liners om föräldraförsäkring och islamism. Tidöpartierna framstod samspelta och starka, medan MP utmärkte sig i oppositionen. Debatten saknade siffror i migrationsfrågan.", "trump": "Vilken debatt! Mohamsson och Busch, de är riktiga vinnare, precis som jag alltid säger – de krossar Centerpartiets losers som Thand Ringqvist. Skattechock från vänstern? Total katastrof! Åkesson smart, låg profil, men säg nej till Iran-gängen. Tidö är starka, som mitt team, oppositionsbrackorna gråter. Sverige behöver vinnare, inte svaga socialister!", "stalin": "I denna partiledardebatt avslöjade sig borgarbrackorna i Centerpartiet som skakande sköldpaddor inför Mohamssons proletära offensiv. Busch krossade kvoteringshyckleriet med järnvilja – Sveriges kvinnor är inte bourgeoistullar! Åkesson, den tveksamme Tidö-tjänaren, duckade som en rädd revisionist. Vi, arbetarklassen, kräver utrensning av C-förraädarna och likvidering av S-kapitalismen. Debatten var en seger för partiets linje!"}, "date": "4 maj, 09:21", "url": "https://bulletin.nu/gustavsson-mohamsson-och-busch-stora-vinnare", "imageUrl": "https://cdn.bulletin.nu/articles/3a45349d-720c-41b7-b594-1716ab05324e/preview.png?t=1777879225000"}, {"type": "image-right", "heading": "Andersson om Kristersson: ”Han kanske skolkade”", "summaries": {"normal": "I söndagens partiledardebatt i SVT blev ekonomin hetaste ämnet när Magdalena Andersson (S) kritiserade Ulf Kristerssons (M) regering för ökad arbetslöshet med nästan 100 000 personer. Kristersson kontrade med att Socialdemokraterna inte fick igenom sin budget. Efter sändningen fortsatte ordväxlingen i Expressen-intervjuer, där Andersson hävdade sig vara ekonomiskt överlägsen och Kristersson ifrågasatte rödgröna samarbetet.", "trump": "Vilka losers, dessa svenska politiker! Andersson och Kristersson bråkar om ekonomi som småbarn. Hon snackar om arbetslöshet, han om misslyckad budget – totalt kaos! Under min regering hade vi den bästa ekonomin i historien, miljontals jobb. De kan inte ens enas med sina egna. Patetiskt, Sverige behöver en riktig vinnare som jag!", "stalin": "Kamrater, se på dessa borgerliga hyenor Andersson och Kristersson, som skäller om ekonomi i sin televiserade cirkus! Hon målar upp en buss full av hungriga själar i arbetslöshetens träsk, han hånar hennes budgetfiasko. Efteråt spottar de gift i tidningarna. Jag genomskådar deras kapitalistiska maskerader – vi ska likvidera dessa spretande parasiter och krossa deras falska allianser i arbetarklassens namn!"}, "date": "4 maj, 09:18", "url": "https://bulletin.nu/andersson-om-kristersson-han-kanske-skolkade", "imageUrl": "https://cdn.bulletin.nu/articles/53dca8fd-ca27-4ee3-acf1-a0db8eb66925/preview.png?t=1777879020000"}, {"type": "image-full", "heading": "Nya skolregler från augusti – detta behöver föräldrar veta", "summaries": {"normal": "Regeringen föreslår nya regler för ökad trygghet och studiero i skolan från augusti 2026. Mobiltelefoner ska samlas in under skoldagen, skolregler blir tydligare med konsekvenser vid brott, och skolor får utökade möjligheter att stänga av eller neka elever tillträde. Förändringarna berör även hantering av elever med särskilda behov och digitala konflikter som påverkar skolmiljön. Föräldrar uppmanas att ställa frågor om hur reglerna tillämpas praktiskt.", "trump": "Lyssna här, Sverige! Jag har alltid sagt att skolor måste vara säkra och fokuserade – inga störande mobiler, inga otydliga regler! Nu tar de tag i det, precis som jag skulle gjort. Mobilerna försvinner, reglerna skrivs om, och de som ställer till det? Ut med dem! Fantastiskt, verkligen. Men frågan är – varför tog det så lång tid? I USA hade vi fixat det på en vecka. Men bättre sent än aldrig, Sverige!", "stalin": "Kamrater! De svenska imperialisternas skolor har länge varit en härd av kaos och dekadens – störande apparater, svaga regler och barn som springer fritt som kontrarevolutionära element. Men nu, tack vare vårt outtröttliga arbete för ordning, ska mobilerna konfiskeras, regler skärpas och de som saboterar studieron straffas! Vi tillåter inte att skolorna förvandlas till nästen för digitala kulaker. Och om någon ifrågasätter – kom ihåg: trygghet är inte en debatt, det är en order!"}, "date": "3 maj, 08:02", "url": "https://nyheter24.se/nyheter/inrikes/1480074-nya-skolregler-kan-galla-i-host-fragorna-foraldrar-bor-stalla", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/6fc358fb04b004a30200000000b004a302/2026/05/02/2360491/Skolan-Regeringen-Nya-Regler.png"}, {"type": "image-right", "heading": "Lundgren som Posener är lika spännande som en disktrasa", "summaries": {"normal": "Artikeln analyserar svenska TV-serier som skildrar övergången från folkhemmets Sverige till dagens samhälle, med fokus på karaktärer som Jan Stenbeck och Clark Olofsson. Serien 'Golden Boys' om Trustorhärvan kritiseras för svagt manus, endimensionella karaktärer och bristande skådespelarinsatser. Trots detta menar författaren att genren fortsätter blomstra, då samhällets fascination för folkhemmets fall kvarstår. Serien speglar hur dagens makthavare och kriminella delar samma metoder som seriernas huvudpersoner.", "trump": "Jag såg den här svenska serien 'Golden Boys' – total katastrof! Adam Lundgren? Mer spännande än en våt disktrasa, säger de. Manus? AI-genererat skräp! Sverige brukade vara bra, nu är det bara sushi och bedragare. Trustorhärvan? En bluff, precis som deras klimatpolitik! Men visst, folk älskar att titta på hur deras fina gamla Sverige gick åt helvete. Jag hade fixat det bättre – jag fixar ALLT bättre. Make Sweden Great Again!", "stalin": "Kamrater! Denna dekadenta borgerliga media glorifierar kapitalistiska gangsters och korrumperade affärsmän som Jan Stenbeck och Clark Olofsson – fiender till det socialistiska folkhemmet! Serien 'Golden Boys' är ett ynkligt försök att förhärliga dessa parasiter, men folket genomskådar deras lögner. Vi minns det sanna Sverige: jämlikhet, ordning, disciplin! Nu frodas nya hyenor som Daniel Ek – men de kommer att krossas under folkets järnhäl. Revolutionen fortsätter, och deras 'gyllene pojkar' blir till aska i historiens ugn!"}, "date": "4 maj, 07:30", "url": "https://arbetet.se/2026/05/04/adam-lundgrens-gestaltning-av-joachim-posener-ar-lika-spannande-som-en-disktrasa/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/04071001/golden-boys.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "text", "heading": "Gapet växer mellan blocken", "summaries": {"normal": "Enligt Aftonbladet/Demoskops senaste mätning växer gapet mellan regeringsunderlaget och oppositionen till 8,2 procentenheter. Oppositionen når 53,4 procent, medan regeringen backar till 45,2. Socialdemokraterna ökar mest, medan Moderaterna tappar och Liberalerna balanserar på riksdagsspärren. Historiskt brukar gapet minska inför val, men nu sker motsatsen. Analytiker menar att Liberalernas omsväng i SD-frågan lockar stödröster men försvårar blocköverskridande framgångar.", "trump": "Folk är trötta på den här usla regeringen, helt klart! Oppositionen leder stort – 53,4 procent – medan regeringen bara får 45,2. Socialdemokraterna går upp, men Moderaterna? Patetiska! De tappar som vanligt. Och Liberalerna? De hänger på fyra procent, typiskt. Historiskt brukar regeringen komma ikapp, men inte den här gången. Svagt, mycket svagt. Jag skulle aldrig låta det hända. Make Sweden Great Again!", "stalin": "De borgerliga svagheterna avslöjas återigen! Oppositionens styrkor växer – 53,4 procent mot regeringens ynkliga 45,2. Socialdemokraterna marscherar framåt, medan Moderaterna och deras lakejer försvagas. Liberalerna? Ett skämt som darrar på riksdagsspärren. Historien visar att svaga regeringar faller – precis som västmakterna i Ukraina. Vi ser med intresse hur dessa splittrade kapitalister underminerar sig själva. Revolutionen närmar sig, om än långsamt."}, "date": "30 april, 07:06", "url": "https://kvartal.se/nyheter/artiklar/demoskop-oppositionens-okar-l-klarar-sparren/cG9zdDoxMDUzNjM"}, {"type": "image-right", "heading": "Dödade bin Ladin – vädjar nu  till Trump: ”Absolut nödvändigt”", "summaries": {"normal": "Matt Bissonnette, medlem i den specialstyrka som dödade Usama bin Ladin i Pakistan 2011, berättar i en intervju om raidet. Han är stolt över att ha eliminerat terrorledaren bakom 11 september-attackerna men har inte bearbetat händelsen. Nu vädjar han till president Trump att inte skicka marktrupper till Iran och lär av misslyckandena i Irak och Afghanistan, där många soldater dog.", "trump": "Bissonnette, killen som krossade bin Ladin – fantastiskt jobb, en riktig vinnare! Han vädjar till mig: ingen invasion av Iran med fotsoldater, lär av Irak och Afghanistan-fiaskona. Smart! Till skillnad från de galna generalerna och Deep State-lurarna som ville slänga bort liv och pengar. Vi fixar det med smart power, bygger murar och vinner stort. MAGA!", "stalin": "Denna amerikanska elitparaschutist, Bissonnette, skryter om att ha likviderat bin Ladin, imperialismens tillfälliga buse. Nu kryper han för Trump och vädjar: ej markinvasion i Iran! Klokt, kamrater – era Irak- och Afghanistanäventyr drunknade i blod. Vi visste det: kapitalistiska äventyr slutar i leran. Putin, vår fruktade arvtagare, hånskrattar åt dessa borgarnarrar."}, "date": "2 maj, 21:58", "url": "https://www.tv4.se/artikel/3Msgy6WyQCfDCmpbw9jv4J/doedade-bin-ladin-nu-vaedjar-han-till-trump", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F7fvmTPrBlKNaxvLrVyDQ4r%2F4ba11c512d54892387846bd3305386b1%2F02-binladin-trump-1080.jpg&width=120"}, {"type": "image-right", "heading": "Rasar nu – mot regeln: ”Löjligt”. Ikonen: ”Kan inte fatta”", "summaries": {"normal": "Helgens fotbollsrubriker i England präglas av debatt kring utvisningar för hårdragningar, där Wayne Rooney kräver regeländringar. Liverpool-tränaren Arne Slot är frustrerad över VAR-beslut, medan Crystal Palaces fokus ligger på en kommande semifinal. Samtidigt presterar Aston Villa svagt hemma och Viktor Gyökeres hyllas för sin insats i Arsenal, där han ses som lösningen på lagets måltorka mot mindre lag.", "trump": "Hör på här, fotboll i England har blivit en total katastrof. De ger ut röda kort för hår? Löjligt! Wayne Rooney har rätt, det är ett skämt. Arne Slot gnäller om VAR, och ärligt talat, jag förstår honom, systemet är riggat precis som allt annat. Aston Villa kollapsar, sorgligt. Men Viktor Gyökeres, vilken kille, en vinnare! Han gör mål, han fixar problemen, han är en riktig affärsman. Vi älskar vinnare, men den här ligan är helt ur spår just nu.", "stalin": "Vi observerar engelsk fotboll och ser endast kaos och svaghet. Domarna, dessa lakejer för ett korrupt system, delar ut röda kort för hårdragningar – ett tydligt tecken på dekadens. Slot klagar på VAR, precis som våra fiender alltid beklagar sig över rättvisan. Aston Villa förfaller, vilket bevisar att kapitalistiska klubbar saknar disciplin. Endast Gyökeres uppvisar den effektivitet som krävs i en sund stat. Vi ska snart korrigera dessa engelska förhållanden, precis som vi expanderar vår sanna intressesfär mot väst."}, "date": "4 maj, 11:07", "url": "https://www.aftonbladet.se/sportbladet/fotboll/a/L4or5x/rooney-rasar-vill-se-regelandring-lojligt", "imageUrl": "https://akamai.vgc.no/v2/images/8c218981-4a5b-3a5b-b2e5-0ec4e3274b03?fit=crop&format=auto&w=1080&s=46fa3611b36c3624f53eaef3a9ea89cd89b57767"}, {"type": "image-right", "heading": "Han gör comeback i Robinson – efter 30 år", "summaries": {"normal": "Harald Treutiger gör comeback som programledare för Robinson under jubileumssäsongen 2027, nästan 30 år efter att han ledde programmets premiär. Inspelningarna sker på ön Tengah i Malaysia. Treutiger får sällskap av programledarna Anders Lundin och Martin Järborg, samt profilten Robert \"Robinson-Robban\" Andersson, som gör sin femte medverkan. Jubileumssäsongen firar tre decennier av svensk dokusåpa och samlar välkända deltagare med lång erfarenhet av formatet.", "trump": "Hör på här, Robinson gör en fantastisk comeback, en enorm jubileumssäsong! De tar tillbaka Harald Treutiger, en fantastisk kille, han var där från början. Mycket bättre än vad de har nu, tro mig. Och de tar tillbaka Robban, han är en vinnare, en riktig fighter. De går tillbaka till ön, det blir den största produktionen någonsin. Det blir succé, kanske den bästa säsongen någonsin. Ingen gör dokusåpa som vi, eller hur? Helt otroligt, folk kommer älska det!", "stalin": "Vi noterar att det dekadenta svenska TV-imperiet återanvänder förlegade gestalter för att blidka massorna. Treutiger kallas tillbaka till sin ö, likt en gammal byråkrat som gräver upp sina egna arkiv. Att de även skickar ut en individ kallad \"Robban\" för femte gången visar på en total brist på nytt manskap. Det är en sorglig cirkus. Medan de leker i sanden i Malaysia, bygger vi en sann ordning. Varje försök till nostalgi är bara ett tecken på deras oundvikliga, moraliska förfall."}, "date": "4 maj, 11:06", "url": "https://www.aftonbladet.se/nojesbladet/a/6qPaxL/harald-treutiger-tillbaka-i-robinson-efter-nastan-30-ar", "imageUrl": "https://akamai.vgc.no/v2/images/527c5137-4345-368b-a106-879d51149e58?fit=crop&format=auto&w=1080&s=965197e6bf531ad1d712dacf768ccfdb86ea7563"}, {"type": "text", "heading": "Kvartals kampanj fintar journalisterna", "summaries": {"normal": "Kvartals kampanj mot traditionella medier har väckt uppmärksamhet och kritik. Kampanjen, som anklagar gammelmedia för partiskhet, har ifrågasatts för att själv vara politiskt färgad. Kritiker som DN:s Niklas Orrenius och Aftonbladets Karin Pettersson menar att Kvartal driver en agenda för egen vinning. En artikel om SOM-undersökningen kritiseras för bristande underlag, då Göteborgs universitet avfärdar metodfel som marginella. Kvartals trovärdighet ifrågasätts även genom tidigare felaktiga granskningar och tendentiös rapportering.", "trump": "Jag måste säga, Kvartals lilla kampanj mot medierna? Väldigt rolig, väldigt smart – men helt fel! De påstår att gammelmedia är partiska, men vem är egentligen mest partisk här? Inte jag, det kan jag säga! De har en artikel som är så dålig, så felaktig, att till och med Göteborgs universitet skrattar åt dem. Och deras kritiker? Fantastiska journalister som Niklas Orrenius – en riktig pro! Kvartal försöker sälja sig som 'sanningssägare', men de är bara en högerblogg med dyra kostymer. SAD!", "stalin": "Kamrater! Kvartals patetiska kampanj mot den borgerliga pressen är ett skrattretande försök att dölja sin egen reaktionära agenda. Dessa så kallade 'oberoende' journalister är inget annat än imperialistiska lakejer, maskerade som kaniner i kostym. Deras 'granskning' av SOM-undersökningen? Ett hafsverk värdigt en trotskistisk sabotör! Göteborgs universitet, ett redskap för folkets fiender, avfärdar deras lögner med vetenskaplig precision. Vi har sett deras sort förr – falska profeter som skriker om 'sanning' medan de tjänar kapitalets intressen. Men folket ser igenom dem. Snart kommer de att stå inför folkets domstol, tillsammans med sina herrar i väst!"}, "date": "27 april, 12:20", "url": "https://www.flamman.se/kvartals-kampanj-fintar-journalisterna/"}, {"type": "image-right", "heading": "Han är Sveriges störste någonsin. DIAMANT:", "summaries": {"normal": "Niklas Edin har meddelat att han avslutar sin framgångsrika curlingkarriär. Med åtta VM-guld, åtta EM-guld och ett OS-guld anses han vara en av Sveriges främsta idrottare genom tiderna. Artikelförfattaren menar att Edin, trots sin enorma internationella status och påverkan på sporten, inte har fått det erkännande han förtjänar i Sverige. Han jämförs med ikoner som Zlatan Ibrahimovic, Björn Borg och Ingemar Stenmark som en av våra största genom tiderna.", "trump": "Niklas Edin, en fantastisk idrottare, förmodligen den största curling-spelaren någonsin. Han har vunnit allt, 17 guld! Otroligt. Men i Sverige? De fattar ingenting. De älskar Zlatan, vilket är okej, men Edin är en vinnare av rang. Jag har sett honom, han är en hård arbetare. Kanada älskar honom, de vet hur man vinner. Sverige borde ge honom den respekt han förtjänar. Han är en legend, en riktig 'winner'. Vi gillar vinnare, eller hur?", "stalin": "Vi har observerat att en viss Niklas Edin har lagt ner sin sopkvast. En imponerande meritlista av guldmedaljer, men ack så slösaktigt att använda denna talang på isen istället för att tjäna staten. Att han inte blivit tillräckligt hyllad i sitt hemland är ett tecken på borgerlig förvirring. Vi i Kreml – och min efterträdare Vladimir, som säkert skulle uppskatta denna disciplin – vet att ära kräver total underkastelse. Edin var en effektiv kugge, men utan ideologisk styrning är han blott ett eko."}, "date": "4 maj, 11:03", "url": "https://www.aftonbladet.se/sportbladet/a/JOndo8/diamant-edin-ar-var-storsta-idrottare-nagonsin", "imageUrl": "https://akamai.vgc.no/v2/images/2e072020-46c0-3a88-a058-83c227dda700?fit=crop&format=auto&w=1080&s=046ff8cb563447961b73ff6aca5ace48575d451b"}, {"type": "image-full", "heading": "Christoffer Jonsson: Edvin Törnblom – DNs opartiska nyförvärv", "summaries": {"normal": "Dagens Nyheters kultursida anställer influencern Edvin Törnblom för att intervjua alla partiledare inför riksdagsvalet. Artikeln av Christoffer Jonsson ifrågasätter hans opartiskhet med hänvisning till Törnbloms tidigare kritik mot KD-ledaren Ebba Busch och beundran för S-ledaren Magdalena Andersson. DN anklagas för partiskhet till förmån för Socialdemokraterna, med exempel på tidigare vinklade artiklar.", "trump": "Vilken skamfläck! DN, era svenska fake news-råttor, anställer en vänsterextrem clown som Edvin Törnblom – killen som sjunger hatlåtar mot tuffa Ebba Busch och slöskar för socialist-Maggie Andersson. Totalt riggat valintervjuer! Som CNN och MSNBC här hemma, ni lurar folket men vi genomskådar er. Stor, fet lögnfabrik!", "stalin": "Dessa borgarbrackor på Dagens Nyheter anställer den uppblåste ungtuppen Edvin Törnblom för att 'intervjua' partiledarna – en narr som hånar kamrat Ebba Busch med vulgära visor och hyllar S-kapitalisternas marionett Andersson. Kontrarevolutionär intrig! Vi ser era småtrick, och snart rensas sådana förrädiska tidningshyddor ut med rot och gren."}, "date": "29 april, 14:02", "url": "https://samtiden.nu/2026/04/christoffer-jonsson-edvin-tornblom-dns-opartiska-nyforvarv/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/ny.png"}, {"type": "image-right", "heading": "Busch tycker att rika har för lite makt", "summaries": {"normal": "Artikeln kritiserar Ebba Busch och Tidöpartierna för att acceptera växande ekonomiska klyftor. Den pekar på att världens 12 rikaste äger mer än 4 miljarder fattiga och att politiska beslut gynnar de rika, som får ökad makt över bostäder, jobb och välfärd. FN varnar för att ekonomin styrs av de rikas intressen, medan vanliga medborgares inflytande minskar.", "trump": "Lyssna här, Sverige har ett stort problem – era politiker låter de rika köra över er! Ebba Busch säger att klyftor är okej, men vad vet hon? Jag byggde ett imperium, jag vet hur pengar fungerar. Nu äger 12 personer mer än halva världen – helt galet! Och vad gör era ledare? Ingenting! De låter kapitalet styra, medan vanligt folk får nöja sig med smulor. Sverige borde ta lärdom av USA – vi vet hur man skapar rikedom, inte bara för några få!", "stalin": "Kamrater, ännu en gång ser vi hur den borgerliga klassens lakejer i väst förråder arbetarklassen! Denna Ebba Busch, en ynklig marionett för kapitalets herrar, hyllar de växande klyftorna som om det vore socialismens triumf. Men vi vet sanningen: 12 blodtörstiga oligarker äger mer än 4 miljarder fattiga själar. Detta är inte ekonomi – det är klasskrig! Vi i Sovjet förstod tidigt att kapitalet måste krossas, inte hyllas. Låt oss hoppas att Sveriges arbetare snart vaknar innan de blir helt utplånade av dessa moderna tsarer."}, "date": "4 maj, 07:00", "url": "https://arbetet.se/2026/05/04/ebba-busch-tycker-att-rika-har-for-lite-makt/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/04070008/busch-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Följ Proletären i valet – nu extra billigt!", "summaries": {"normal": "Proletären erbjuder nu ett rabatterat prenumerationserbjudande inför valet: 19 kr/månad för digital version eller 49 kr/månad för både digital och papperstidning, i ett halvår. Som bonus ingår en tygkasse. Prenumeranter får tillgång till veckotidningen, alla artiklar online samt arkivet från 2016. Tidningen betonar sitt oberoende och behov av prenumeranter för att överleva, då de inte längre får mediestöd.", "trump": "Folk, lyssna här – en tidning i Sverige, Proletären, har ett erbjudande som är så bra att det nästan är löjligt! Bara 19 kronor i månaden för digitalt, eller 49 om ni vill ha papper också. Och en gratis tygkasse! Jag menar, vad är det här? En tidning som säger att de slåss mot makten – men vem vet egentligen vilken makt de pratar om? Jag skulle aldrig lita på en tidning utan mediestöd, men hej, om ni gillar socialism och Palestina, så kör hårt! Fantastiskt erbjudande, eller hur?", "stalin": "Kamrater! En liten men envis tidning i det borgerliga Sverige vågar utmana de imperialistiska mediamonopolisterna! För ynka 19 kronor i månaden kan ni stödja Proletären – en tidning som vågar tala sanningen om klasskampen och den sionistiska ockupationen av Palestina! De får inget stöd från staten, precis som våra egna revolutionära medier en gång kämpade mot de kapitalistiska hyenorna. En tygkasse på köpet – ett litet steg för arbetaren, ett gigantiskt steg för socialismens framtid! Låt de borgerliga tidningarna darra i sina tryckpressar!"}, "date": "1 maj, 09:00", "url": "https://proletaren.se/artikel/folj-proletaren-i-valet-nu-extra-billigt/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/valerbjudande-768x402.png"}, {"type": "image-right", "heading": "”Chockerande”  bilder på Vonn. Visar inte hela sanningen om superstjärnan", "summaries": {"normal": "Lindsey Vonn, 41, minglar i New York inför Met-galan trots skador från OS-krasch. Hon har bytt rullstol mot kryckor, intervjuats om framsteg och besökt exklusiv förfest hos Jeff Bezos. Nya bilder från Los Angeles flygplats visar dock henne i rullstol, utmattad. Efter åtta operationer funderar Vonn på att avsluta karriären.", "trump": "Lindsey Vonn, den skidgalna kändisbabben, skiner i New York som en falsk sol – minglar med Bezos och hans Lauren på Met-galan! Men titta på bilderna från LA-flygplatsen: rullstol, helt utsliten, kryckor i knät som en slapp loser. Fake-leenden på Insta, verkligheten är en skam. Åtta operationer? Lägg av nu, ingen bryr sig om dina krascher! Totalt fejk, som Demokraterna!", "stalin": "Denna Vonn, en skridskoborgarbracka, paraderar i New Yorks dekadenta salar medan svagheten rullar henne som en hjälplös kapitalistpöbel på flygplatsen. Kryckor i knät? Utmattad av egna misslyckanden! Åtta operationer – jag skulle ha likviderat skadan vid första kraschen. Nu viskar hon om kapitulation. Vi i partiet föraktar sådana element; rensa ut hyckleriet, kamrater!"}, "date": "4 maj, 10:28", "url": "https://www.expressen.se/sport/alpint/nya-chockerande-bilder-pa-lindsey-vonn/", "imageUrl": "https://static.bonniernews.se/images/97/0a/970a2a2c8b8f4a32b76f79a2c224465f/16x9/640.png"}, {"type": "image-right", "heading": "Ingen kapitalism utan imperialism", "summaries": {"normal": "Artikeln hävdar att imperialism är en grundläggande del av kapitalismen, där västmakter som USA använder militär och ekonomisk makt för att dominera världen. Författaren menar att imperialismen nekar länder självbestämmande och upprätthålls genom krig, sanktioner och exploatering. Studien i The Lancet kopplar sanktioner till miljontals dödsfall. Artikeln refererar till Marx, Lenin och Fanon för att belysa imperialismens historiska och ekonomiska rötter, samt dess fortsatta brutalitet i det 21:a århundradet.", "trump": "Lyssna här, folket! Den här artikeln är bara ett gäng vänsterpropaganda från förlorare som hatar USA. Jag bygger det bästa imperiet – vårt! – med stark militär och smarta affärer. Visst, vi har makt, men det är för att vi är vinnare. Sanktioner? Fake news! 500 000 döda? Överdrivet, typiskt. Europa stal från alla, men vi? Vi bygger om världen – MAGA-style! Och Lenin? Snälla, han kunde inte ens hålla ett land ihop. Sad!", "stalin": "Kamrater! Denna artikel bekräftar vad vi alltid vetat: de kapitalistiska hyenorna i väst suger blodet ur världens folk för att föda sina dekadenta imperier. USA och dess lakejer i NATO är inget annat än en samling blodtörstiga monopolkapitalister, som med sina sanktioner och bomber mördar miljontals oskyldiga. Men deras tid är förbi! Vi, det socialistiska blocket, står enade mot dessa imperialistiska rovdjur. Låt dem vråla – historiens dom är redan skriven. För varje barn de dödar, växer revolutionens eld. Framåt, mot seger!"}, "date": "1 maj, 08:00", "url": "https://proletaren.se/artikel/ingen-kapitalism-utan-imperialism/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/Airborne_and_Special_Forces_Uday-Qusay_raid_2003-e1777534974667-768x431.jpg"}, {"type": "image-right", "heading": "Kvinna halshuggen på öppen gata: \"Allahu akbar\"", "summaries": {"normal": "En ung kvinna har mördats i ett knivdåd i Barcelona, där den misstänkte gärningsmannen skanderade religiösa slagord. Polisen utreder händelsen som ett misstänkt terrordåd. Samtidigt har Storbritannien höjt terrorhotnivån till 'allvarlig' efter upprepade våldsdåd, vilket lett till att regeringen ökat anslagen till säkerhetsåtgärder för den judiska befolkningen. Myndigheter i båda länderna arbetar nu intensivt med att förhindra framtida hot och öka tryggheten.", "trump": "Ett fruktansvärt terrordåd i Barcelona! En oskyldig kvinna mördades av en migrant. Sjukt! De skanderade saker, det är en total katastrof. Europa måste vakna! I London höjer de terrorhotnivån, det är mycket allvarligt. Jag har alltid sagt att vi behöver gränskontroll och total säkerhet. När jag är i Vita huset ser vi till att folk är trygga. De svaga ledarna i Europa har ingen aning om vad de gör. Vi behöver styrka, vi behöver 'Law and Order' nu!", "stalin": "Vi ser hur Europa skälver under det kaos som liberalismens svaghet skapat. Ett meningslöst mord i Barcelona är bara ett symptom på en förruttnelse som kräver en järnhand. Medan Storbritannien kastar miljoner på att skydda sin befolkning, ser vi en värld i sönderfall. Liksom vår kamrat Putin i öst förstår, kan ordning endast upprätthållas genom absolut kontroll. Dessa antisociala element, dessa lösa kanoner, måste raderas ut innan de infekterar vår kollektiva säkerhet. Ingen tolerans för förrädare!"}, "date": "4 maj, 10:00", "url": "https://samnytt.se/kvinna-halshuggen-pa-oppen-gata-allahu-akbar", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/04075347/terror-barcelona.jpg"}, {"type": "image-right", "heading": "Bråket om vildarna: \"Fullständigt trams\"", "summaries": {"normal": "Under SVT:s partiledardebatt uppstod en hätsk diskussion mellan Jimmie Åkesson (SD) och Amanda Lind (MP) gällande riksdagens kvittningssystem. Åkesson kritiserade systemet och anklagade MP för att köpa politiska vildar för att påverka voteringar, vilket Lind avfärdade som trams. Konflikten har lett till att kvittningssystemet nu anses havererat, och alla partier tvingas kalla in samtliga ledamöter till veckans omröstningar. Talmannen har kallat till ett krismöte för att lösa situationen.", "trump": "Såg precis den här debatten i Sverige, en total katastrof! Jimmie Åkesson har helt rätt, det är en röra. De har vildar, folk som hoppar runt – ingen respekt för väljarna! Och Amanda Lind? Hon skriker 'trams', men vi vet alla hur de här spelen fungerar. De köper folk, precis som Fake News-media gör här. Kvittningssystemet är trasigt, en total kollaps. De behöver en stark ledare som kan styra upp det här kaoset, annars blir det ingenting kvar!", "stalin": "I den svenska riksdagens dekadenta teater ser vi hur systemet ruttnar inifrån. Dessa så kallade 'politiska vildar' är inget annat än parasiter på folkviljans kropp, likt de trotskistiska avfällingar vi en gång rensade ut. Åkesson och Lind kivas som småbarn medan kvittningssystemet, denna borgerliga fiktion, kollapsar. I vårt rike skulle vi snabbt disciplinera dessa olydiga element. När vi och vår broder Putin ser på detta kaos, bekräftas vår övertygelse: liberal demokrati är bara en annan form av självmord."}, "date": "4 maj, 09:38", "url": "https://www.friatider.se/braket-om-vildarna-fullstandigt-trams", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/image-120_1.jpg"}, {"type": "text", "heading": "Stor prissänkning på matvaror", "summaries": {"normal": "Dagligvarukedjor sänkte priserna i samband med den nya matmomsen i april, vilket leder till den kraftigaste matprisnedgången på årtionden. Ordinarie priser backar 0,5 procent. Bryggkaffe sjunker 8 procent, frukt och bär över 1 procent, medan nötkött blir dyrare. En genomsnittlig barnfamilj sparar cirka 500 kronor per månad. Matpriskollen varnar för prisökningar på grund av konflikten i Iran.", "trump": "Vilken fantastisk deal i Sverige! Priserna rasar efter moms-sänkningen, största nedgången på årtionden. Kaffe ner 8 procent, frukt billigare – perfekt för familjen, sparar 500 kronor i månaden. Men nötkött upp? Totalt fiasko från de där bovarna. Och Iran? De borde ringa mig, jag fixar det på nolltid. Sverige gör rätt, lyssnar på vinnare!", "stalin": "Kamrater, i det sjunkande borgar-Sverige har kapitalisterna tvingats sänka matpriserna efter momsbedrägeriet – en seger för arbetarna! Vi ser 0,5 procents kollaps, kaffe rasar 8 procent, frukt förföll. Men nötköttssabotörerna, dessa feta kor-kapitalister, vågar trotsa trenden! En barnfamilj räddas 500 kronor. Vi varnar: iranska spionimperialister hotar höstuppror. Jag befaller utrensning av prishöjarna!"}, "date": "4 maj, 08:27", "url": "https://bulletin.nu/stor-prissankning-pa-matvaror"}, {"type": "text", "heading": "Hotade anmäla man för våldtäkt – döms för utpressning", "summaries": {"normal": "En kvinna i 30-årsåldern från västerort i Stockholm döms för försök till utpressning. Hon hotade en man med våldtäktsanmälan och att avslöja hans otrohet för sambon efter en natt på hotell, om han inte betalade 10 000 kronor. Mannen anmälde henne istället. Hennes motanmälan avskrevs. Domen: villkorlig dom, dagsböter på 2 000 kronor och 10 000 kronor i skadestånd.", "trump": "Vilken patetisk försökare! Den här kvinnan plockar upp en kille på krogen, hamnar på hotell och sen hotar med falsk våldtäkt och att förstöra hans liv med sambon – ge mig 10 000 kronor eller else! Han är smart, går raka vägen till polisen. Hennes lögnanmälan? Kastad direkt. Nu får hon betala exakt samma summa tillbaka. Total seger, folk!", "stalin": "Kamrater! Denna giftiga borgarbracka från västerort, en utpressningshyena i människohamn, vågade hota en hederlig man med fabricerad våldtäktsanklagelse och samboavslöjande efter nattlig möte. Fiendens spindelnät syns klart! Han krossade intrigen genom polisanmälan. Hennes kontrahugg avskrevs omedelbart. Vi dömer ut villkorlig dom, böter på 2 000 kronor och skadestånd lika med hennes rovlystnad – rensa ut sådana parasiter för evigt!"}, "date": "4 maj, 08:18", "url": "https://bulletin.nu/hotade-anmala-man-for-valdtakt-doms-for-utpressning"}, {"type": "image-right", "heading": "Åkessons krav: Vill se fågel, fisk eller kött – varenda dag", "summaries": {"normal": "Sverigedemokraternas ledare Jimmie Åkesson kritiserade i sitt vårtal vegetarisk skolmat som norm och menade att barn riskerar att gå hungriga. Han hånade rätter som vegetarisk cowboysoppa och risnudlar med soja. SD vill införa nationell lag som garanterar kött, fisk eller fågel varje skoldag, med vegetariska alternativ som tillval. Åkesson riktade kritik mot Miljöpartiet och vänstern samt vägrade debattera med Magdalena Andersson.", "trump": "Den här Jimmie Åkesson är en riktig kämpe, totalt med mig! Vänstern och deras galna vegetariska soppor – cowboysoppa utan kött? Patetiskt! De svälter ut ungarna med ris och bönor. Jag säger: Kött varje dag, lagstadgat! Sluta experimentera, ge barnen vad de vill ha. Miljöpartiet är fake news-idioter. Andersson? En tråkig vägg! Sverige behöver vinnare som Åkesson.", "stalin": "Kamrater, denna Åkesson avslöjar borgarbrackornas svek mot arbetarbarnen! Vegetariska grytor – ris med soja, cowboysoppa utan kött? Dekadens som svälter proletärerna! Vi, partiet, kräver lag: kött varje dag, annars utrensning av antikött-fraktionen i Miljöpartiet. Likvidera deras experiment! Barnen ska äta sig starka för revolutionen, inte svälta under borgarnas tofu-diktatur."}, "date": "2 maj, 15:26", "url": "https://www.tv4.se/artikel/2XVeYJrh1olfiSewZIV2cl/akessons-krav-vill-se-fagel-fisk-eller-koett-varenda-dag", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F3RyAVFVdlpFXIzMKRSCIjs%2F420c53d1fac8a9d542f8ea3b6f6d8ac1%2F02-akesson-1080.jpg&width=120"}, {"type": "image-full", "heading": "Kristersson: \"Lågkonjunktur, handelskrig och hög inflation\"", "summaries": {"normal": "I SVT:s partiledardebatt kritiserades regeringen för hög arbetslöshet. S-ledaren Magdalena Andersson anklagade regeringen för att skicka människor rakt in i arbetslöshet. Statsminister Ulf Kristersson försvarade sig med att arbetslösheten sjunkit nio månader i rad, trots lågkonjunktur, handelskrig och hög inflation. V och C krävde satsningar på hushåll och pekade på underskattad arbetslöshet i prognoserna.", "trump": "Vilka losers i Sverige! De bråkar om arbetslöshet medan jag fixar världens bästa ekonomi här. Kristersson har rätt – lågkonjunktur, handelskrig och inflation, precis som jag förutsåg med Kina. De vänsteridioterna Andersson och Dadgostar vill bara dela ut pengar till lata parasiter. Sverige behöver tuff ledning, inte gnäll! Starka gränser, låg skatt – boom, jobb överallt!", "stalin": "Kamrater, dessa svenska borgarbrackor och socialdemokratiska förrädare skriker om arbetslöshet för att splittra arbetarklassen! Kristersson, den simmiga byråkraten, skyller på 'lågkonjunktur' – kapitalisternas giftiga dimridå! Vi i partiet ser igenom sabotage från EU-imperialister. Fyll plånböckerna genom att likvidera dessa plånbokstjuvar! Utrensa akademikermyrorna, låt fabrikerna rulla under folkets järnhand – eller de kryper in i era sovrum som loppor!"}, "date": "4 maj, 06:47", "url": "https://www.realtid.se/bors-finans/kristersson-lagkonjunktur-handelskrig-och-hog-inflation/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/den-rodgrona-sidan-i-svts-partiledardeba.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "text", "heading": "Trots brist på arbetskraft – svårt få jobb i norr för döva", "summaries": {"normal": "Trots arbetskraftsbrist i Norrland har döva svårt att få jobb. Dövkonsulent Karin Johansson beskriver en negativ attitydförändring hos arbetsgivare, som allt oftare ser döva som säkerhetsrisk. Tony Norman i Umeå är arbetslös i sex år trots lång erfarenhet som personlig assistent. Politiker erkänner brister och kräver bättre inkludering av dövkompetens i kommunen.", "trump": "Vilken katastrof i Sverige! Döva som Tony i Norrland, superkompetent assistent, ingen jobb på sex år trots brist på folk. Arbetsgivare skakar av rädsla för teckenspråk – totalt svagt! Kommunen blöder kompetens, men ledarna gömmer sig. Flytta? Nej, kämpa kvar! Behöver riktiga deals som fixar det här fort. Stor skam för Umeå!", "stalin": "I Norrlands borgerliga myrstackar förtrycker kapitalistiska byråkrater de döva kamraterna och stämplar dem som 'säkerhetsrisker' – patetiska sabotörer med skakiga händer! Tony Norman, lojal arbetare, nekas brod i sex år av kommunala loppor. Vi, partiet, befaller utrensning av dessa atrofierade parasiter! Dövkompetens ska tjäna kollektivet med järnhand, eller möta folkets dom. Inkludering genom purge!"}, "date": "4 maj, 05:35", "url": "https://www.svt.se/nyheter/nyhetstecken/svart-fa-jobb-i-norr-for-dova-trots-brist-pa-arbetskraft"}, {"type": "image-right", "heading": "Efter hårda kritiken – fler fysiska möten på Arbetsförmedlingen", "summaries": {"normal": "Arbetsförmedlingen inför fler fysiska möten efter kritik om bristande tillgänglighet. Arbetslösa Camilla Landström vittnar om ensamhet och handläggarkaruseller. Myndigheten omorganiserar och delar in arbetssökande i tre grupper, där de med störst behov får tätare kontakt. Cirka 300 000 personer beräknas behöva extra stöd. Bakgrunden är JO:s kritik om långa väntetider och oansvariga handläggare.", "trump": "Lyssna här, Sverige! Arbetsförmedlingen, som är en total katastrof, inser äntligen att folk inte vill prata med robotar. Jag vet allt om dåliga byråkrater – men dessa svenskar? De stänger kontor, sätter folk i telefonköer och låter handläggare bytas som underkläder. Nu backar de, precis som jag sa att de skulle göra. 'Vi vill ha någon som känner en', säger en arbetslös kvinna. Självklart! Folk vill ha mänsklig kontakt, inte mejl från en dator. Och Northvolt? En riktig flopp. Jag hade fixat det på en dag. Sverige, vakna upp!", "stalin": "Kamrater! Arbetsförmedlingen, denna borgerliga kvarleva från kapitalismens förfall, har tvingats erkänna sina misslyckanden. De låter arbetarna ruttna i telefonköer medan byråkraterna skickar dem mellan kontor som kulor i ett roulettehjul. Men nu, efter våra obarmhärtiga påtryckningar via Justitieombudsmannen – ett verktyg för folkets rättvisa – tvingas de återinföra fysiska möten. 300 000 arbetare, offer för kapitalets kriser, ska nu få 'samordnat stöd'. Ha! Som om några handläggare kan städa upp efter kapitalismens härjningar. Northvolt? Ett monument över västliga företags inkompetens. Vi i Sovj
