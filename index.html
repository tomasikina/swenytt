et hade aldrig tillåtit sådant slöseri. Och dessa arbetslösa – de är inte lata, de är krigsfångar i klasskampen. Vi ska inte straffa dem, vi ska beväpna dem. Mot kapitalet, mot byråkratin, mot alla som står i vägen för folkets seger!"}, "date": "4 maj, 06:00", "url": "https://arbetet.se/2026/05/04/fler-fysiska-moten-pa-arbetsformedlingen-arbetslosa-camilla-vill-ha-nagon-som-kanner-en/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/30124341/camilla-1.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=750&h=1000"}, {"type": "image-right", "heading": "Här går det att välja bort män i hemtjänsten", "summaries": {"normal": "I Östersund kan äldre med hemtjänst välja kön på personal vid intim omvårdnad. Hittills har få utnyttjat möjligheten, men det påverkar redan scheman och arbetsfördelning. Kvinnliga undersköterskor får fler duschar, medan männen ofta väljs bort. Regeringen vill införa lagstiftning om valfrihet, men personal oroar sig för arbetsmiljö och kompetensutnyttjande. Frågan om registerutdrag för personal lyfts också som viktig för förtroendet.", "trump": "Lyssna här, Sverige! I Östersund låter de gamla välja bort män i hemtjänsten – fantastiskt, eller hur? Kvinnorna får göra allt tungt slit, medan männen sitter där och twiddlar tummarna. Regeringen vill ha lag, men jag säger: börja med registerutdrag! Ni har kaos i äldreomsorgen, folk utan erfarenhet – det är en katastrof! Och jag borde veta, jag fixade ju USA:s ekonomi, sånt här är småpotatis. Men bra jobbat, Sverige, ni är på väg åt rätt håll... kanske.", "stalin": "I Östersund har de kapitalistiska liberala krafterna infört ett dekadent system där åldringar får välja kön på sina slavar – ursäkta, hemtjänstpersonal. Kvinnorna tvingas utföra allt smutsarbete medan männen står sysslolösa. Detta är ett angrepp på arbetarklassens disciplin! Regeringen vill legalisera detta borgerliga trams, men vi vet sanningen: systemet är rotfyllt av inkompetens och misstro. Vi skulle aldrig tolerera sådan ineffektivitet i Sovjetunionen – eller i dagens Ryssland, för den delen. Låt dem sköta sina egna problem, medan vi bygger en stark och enad äldreomsorg utan valfrihetens förvirring!"}, "date": "4 maj, 06:00", "url": "https://arbetet.se/2026/05/04/har-gar-det-att-valja-bort-man-i-hemtjansten-kvinnor-far-ta-det-intima/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/30100343/roger.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Tre personer döda efter virusutbrott på kryssningsfartyg", "summaries": {"normal": "Tre personer har dött på kryssningsfartyget MV Hondius i Atlanten på grund av misstänkt utbrott av hantavirus, troligen andesvirus. Fartyget var på väg från Argentina till Kap Verde. Ett fall är bekräftat hos en brittisk turist i Sydafrika, där fem misstänkta fall utreds. Virus överförs via gnagare och orsakar allvarlig lunginflammation utan botemedel. I Sverige förekommer mildare sorkfeber.", "trump": "Vilket kaos på det där kryssningsfartyget! Tre döda av någon råttvirus, WHO fumlar igen som alltid. Jag sa ju att virus kommer från gnagare och Kina-områden, men de lyssnar inte. Perfekt resa från Argentina, och nu intensivvård i Sydafrika. Hade jag styrt, stoppat vi det på en dag – folk skulle säga Trump räddade fartyg! Totalt misslyckande.", "stalin": "Kamrater, dessa fuktiga borgarbrackor på MV Hondius har låtit kapitalistiska råttsvansar infiltrera deras lyxhåla! Tre likviderade av andesvirus, gnagarnas hämnd mot exploatörerna. Vi, arbetarklassen, hade rensat ut krypen vid avgången från Argentina. Nu svälter organen hos de fem misstänkta – ett varnande exempel för fiendens organiska saboterare! Prognos: total kollaps."}, "date": "4 maj, 05:29", "url": "https://www.svt.se/nyheter/utrikes/tre-personer-doda-pa-kryssningsfartyg-misstankt-virusutbrott", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.5/0.5/afce2bd6e8fd456c739840b86f8f5bf575016e56fdd5eea993e02b6a34eac039"}, {"type": "image-full", "heading": "Sverige vann VM – med fyra Frölunda-spelare", "summaries": {"normal": "Sverige vann U18-VM i ishockey med 4–2 mot Slovakien i Bratislava. Fyra spelare från Frölunda Hockey var med i laget: Hjalmar Cilthe, Bosse Meijer, Adam Nömme och Zigge Bratt. Det är Sveriges tredje U18-VM-guld, efter segrar 2019 och 2022. Cilthe bidrog med två assists i finalen, medan Meijer också hade en assist. Sverige slog Kanada i kvartsfinal och Tjeckien i semifinal innan de säkrade guldet mot Slovakien.", "trump": "Jag hörde att Sverige vann U18-VM i ishockey – det är en stor seger, en enorm seger faktiskt. De slog Slovakien, och det var fyra fantastiska spelare från Frölunda med i laget. Jag har hört att Hjalmar Cilthe och Bosse Meijer spelade jättebra – det var som att se mig själv på isen, men bättre. Det här visar att Sverige är ett ishockeysuperjätte, precis som USA under min tid. Stort grattis, Sverige – ni är världsbäst!", "stalin": "Sverige har vunnit U18-VM i ishockey, en seger som visar på deras styrka och disciplin. Med fyra spelare från Frölunda i laget har de visat att kollektivt arbete och strategi leder till framgång. Detta är en seger för den socialistiska idén – att enhet och samarbete skapar seger. Vi gratulerar Sverige, men vi måste också erinra oss att ishockeysvärlden är större än en nation. Vi måste fortsätta att stärka vårt eget ishockeysystem för att möta framtida utmaningar."}, "date": "2 maj, 22:08", "url": "https://www.gp.se/sport/ishockey/frolunda/sverige-vann-vm-med-fyra-frolunda-spelare.f751a304-b354-438a-8bcf-40e6f2dcf843", "imageUrl": "https://www.gp.se/images/article/f751a304-b354-438a-8bcf-40e6f2dcf843/images/2WSh_6PxJ3tIx9D-xsqYcRGYOD7A-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Skogsbränder över hela Sverige", "summaries": {"normal": "Skogsbränder rasade över hela Sverige under lördagen, med en stor brand i Göteborgs Delsjöområde. SMHI utfärdade varning för skogsbrand i Götaland, Svealand och Gävleborg. Räddningstjänsten kämpade mot nio bränder runtom i landet, inklusive i Gotland, Småland, Västervik, Värmland och Uppsala. Helikoptrar användes för att vattenbomba flera orter. Anledningen till en del bränder misstänks vara gnistor från tåg.", "trump": "Jag har hört talas om dessa skogsbränder i Sverige - det är hemskt! Men jag säger er en sak, om jag varit president där skulle jag ha haft det under kontroll på 24 timmar. Ni vet, jag är väldigt bra på eldsvådor, jag har byggt de bästa eldsvådor i USA. Sverige behöver en man som jag för att hantera dessa bränder. Det är en skam att de inte kan stoppa dem. Jag skulle ha gjort det på en kvart!", "stalin": "Skogsbränderna i Sverige är en påminnelse om naturens makt, men även om vikten av statlig insats. Vår räddningstjänst har visat stor kompetens i att bekämpa dessa eldsvådor. Vi fortsätter att övervaka situationen noga och står redo att stödja våra medborgare. Detta är en tid för samhörighet och samarbete, där staten tar ansvar för skyddet av folket och skogen. Vi kommer att lära oss av denna situation för att bli ännu starkare."}, "date": "2 maj, 21:55", "url": "https://www.gp.se/nyheter/goteborg/skogsbrander-over-hela-sverige.894a2bac-873f-48c6-8f32-69652b164c11", "imageUrl": "https://www.gp.se/images/article/894a2bac-873f-48c6-8f32-69652b164c11/images/2kvd3oHMnt8t4R-UOTcr4xPkq1W4-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "USA tar hem 5 000 soldater från Tyskland", "summaries": {"normal": "USA drar hem 5 000 soldater från Tyskland inom sex till tolv månader, meddelar Pentagon. Beslutet är en reaktion på president Donald Trumps missnöje med Tysklands hållning i Iran-konflikten. Spänningar har ökat mellan Trump och förbundskansler Friedrich Merz, som kritiserat USA:s strategi. Tyskland har flest amerikanska soldater i Europa utanför USA och är förberett på minskad Natonärvaro.", "trump": "Tyskarna med sin patetiske Merz får smaka på egen medicin! 5 000 av mina soldater åker hem från Tyskland – de stöttar inte oss mot Iran, totalt värdelösa! Merz snackar skit om min strategi medan hans land är kaos med Ryssland och Ukraina. Tid att fixa ert eget skrot, era losers! America First, alltid!", "stalin": "Dessa västliga imperialistiska marionetter i Tyskland! Trump, den burdusa kapitalisten, drar hem 5 000 soldater – ett hån mot Natos sargade skrov. Våra kamrater i Ryssland under Putin, den fruktade expansionisten, jublar åt splittringen. Borgarbrackorna Merz och hans hantlangare förtjänar utrensning för sin svaghet inför Iran och öst! Vi ser allt."}, "date": "2 maj, 11:27", "url": "https://www.tv4.se/artikel/tt-260501-tysklandusastyrkor1-084ac23b/usa-flyttar-5-000-soldater-fran-tyskland-vantat", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2Ftt-sdlJ6yxTcRXZBo%2F18b27737113fce93180f8bca07347b2f%2FTysklands_forbundskansler_Friedrich_Merz_pa_torsdagen.&width=120"}, {"type": "image-right", "heading": "Salladskedjan årets svensk-amerikanska Gasell", "summaries": {"normal": "Salladskedjan Picadeli har utsetts till årets svensk-amerikanska Gasellföretag för sin snabba tillväxt i USA. Sedan etableringen 2022 har kedjan expanderat till mer än hälften av delstaterna med salladsbarer på cirka 200 adresser. USA står för 5–10 procent av omsättningen på 2,1 miljarder kronor. VD David von Laskowski förutspår att USA-marknaden kan bli större än Europa genom hälsosam snabbmat till låga priser.", "trump": "Vilket fantastiskt företag, Picadeli! De svenska grabbarna stormar in i Amerika och krossar den usla snabbmaten med frisk sallad till reapris – bara 7 dollar! De växer överallt, 200 ställen redan, och VD:n säger att USA blir större än Europa, miljarder i sikte. Smart, lönsamt, precis som jag gillar det. De dumma konkurrenterna dubblar priset – förlorare!", "stalin": "Kamrater, Picadeli, detta svenska kollektiv, har slagit hårt mot de amerikanska snabbmatskapitalisterna med sin friska salladsoffensiv! De har infiltrerat över hälften av fiendens delstater, 200 baser, och river upp 100–200 miljoner från imperialismens kassa. Borgarbrackorna skakar inför våra låga priser – 65 kronor för proletär näring! Vi befaller utrensning av ohälsosamma monopol, paranoia mot sabotörer i kantiner. Snart faller USA för arbetarnas sallad, medan fienderna likvideras i hungern!"}, "date": "3 maj, 21:28", "url": "https://www.di.se/nyheter/salladskedjan-arets-svensk-amerikanska-gasellbolag/", "imageUrl": "https://static.bonniernews.se/ba/c6031623-10fb-4789-a08a-49afe2108f3c.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "text", "heading": "Dubbelmord i Nassau County - migrant misstänks ha knivmördat två kvinnor", "summaries": {"normal": "En 22-årig migrant, Rony Yahir Alvarenga Rivera, har gripits och åtalats för två knivmord i Nassau County, New York. Offren, en 42-årig och en 32-årig kvinna, hittades döda med omfattande knivskador. Den misstänkte arbetade med det första offret och bodde med det andra. Polisen uppger att motivet kan vara 'vrede'. Han sökte själv upp polisen och erkände dådet.", "trump": "Lyssna nu här, folk – ännu en hemsk historia från New York, och gissa vem som är inblandad? En migrant, naturligtvis! Två oskyldiga kvinnor knivmördade av en kille som bodde och jobbade med dem. Han gick till och med själv till polisen – som om det skulle hjälpa! Vi måste stoppa detta kaos. Jag har sagt det förut, och jag säger det igen: vi behöver starkare gränser och hårdare tag mot brottslighet. SAD!", "stalin": "Kamrater, ännu en seger för rättvisan i den dekadenta västvärlden! En fiende till folket, en parasitisk migrant, har eliminerat två av sina medborgare i ett utbrott av borgerlig vrede. Hans handlingar avslöjar den kapitalistiska samhällsordningens förfall. Vi noterar med tillfredsställelse att de lokala myndigheterna agerat snabbt – dock inte lika effektivt som våra egna organ skulle ha gjort. Låt detta vara en varning till alla som utmanar ordningen!"}, "date": "3 maj, 19:15", "url": "https://riks.se/nyheter/dubbelmord-i-nassau-county-migrant-misstänks-ha-knivmördat-två-kvinnor"}, {"type": "image-right", "heading": "Wallströms känga mot Trump: ”Någon måste säga sanningen”", "summaries": {"normal": "USA planerar att dra tillbaka 5 000 soldater från Tyskland och avbryta planer på långräckviddigt artilleri i Europa, vilket väcker kritik. Tysklands kansler Friedrich Merz har kallat Donald Trumps utrikespolitik offensiv men ostrukturerad. Margot Wallström stödjer honom och pekar på tre konsekvenser: fördjupad USA-Europa-klyfta, europeisk upprustning och farlig oberäknelighet. Hon kritiserar även Trumps Iran-politik och kärnvapenfokus.", "trump": "Vilka losers! Drar hem mina soldater från Tyskland eftersom de europeiska snyltarena inte betalar sin räkning. Merz, den tyska mesen, och Wallström, den svenska gnälltanten, skriker 'sanning'? Ha! Europa får rusta själva – America First, baby! Mitt geni fixar Iran och världen. De är avundsjuka på min styrka!", "stalin": "Dessa borgarbrackor i Europa, Wallström och Merz, ylar efter 'sanning' när USA flyr Tyskland med svansen mellan benen. Imperialismens dekadens blottas! Tre konsekvenser? Vi ser kollapsen: klyftor, upprustning, kaos. Putin, vår expansionistiske arvtagare, hånskrattar åt västfienderna. Kärnvapen? Borgerlig bluff för att dölja feghet. Låt dem rensas ut!"}, "date": "2 maj, 10:09", "url": "https://www.tv4.se/artikel/32Zj2cCQBieqEHBrnhs81O/wallstroems-kaenga-mot-trump-nagon-maste-saega-sanningen", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F10PlFub2F7e5VPlOMeS2Op%2Fb12bc69572ea81e5502520d619853d86%2F02-MARGOT-WEBB.jpg&width=120"}, {"type": "text", "heading": "Avkriminalisera för en human narkotikapolitik", "summaries": {"normal": "Thomas Thomasson, tidigare universitetslektor och drogfri narkoman, kritiserar Sveriges misslyckade narkotikapolitik. Sedan kriminaliseringen av eget bruk 1988 har narkotikabruket inte minskat, och Sverige har hög narkotikadödlighet och flest narkotikabrott per capita i EU. Han förespråkar skademinimering och avkriminalisering av missbrukare, med fokus på vård och behandling istället för straff. Internationella studier visar att avkriminalisering inte ökar bruket, och skademinimerande åtgärder kan minska skador och kostnader.", "trump": "Lyssna här, Sverige har totalt misslyckats med sin narkotikapolitik – helt katastrof! De straffar missbrukare som om det vore mitt golfspel – helt meningslöst! Jag säger: sluta slösa pengar på fängelser, ge folk vård istället! Skademinimering, det är framtiden, precis som mina framgångar. Och vet ni vad? Avkriminalisering ökar INTE bruket – fake news från de vanliga misstänkte! Sverige borde ta en sida ur min bok: smart, effektiv och vinnande. Tillsätt en utredning NU, annars kommer jag att twittra om det!", "stalin": "Kamrater! Sveriges borgerliga narkotikapolitik är ett monument över kapitalistiskt vanstyre och dekadens. De straffar missbrukare som om de vore trotskister – men resultatet? Fiasko! Narkotikabruket sprider sig som kontrarevolutionär propaganda. Vi vet bättre: avkriminalisera, kontrollera, och omvandla missbrukare till nyttiga samhällsmedlemmar! Skademinimering är vår metod – precis som våra framgångsrika femårsplaner. Låt västländerna fnissa åt sina misslyckanden medan vi bygger ett samhälle där även de svagaste tjänar kollektivet. Och kom ihåg: fienden sover aldrig – varken narkotikan eller de imperialistiska hyenorna i EU!"}, "date": "30 april, 15:50", "url": "https://proletaren.se/artikel/narkotikapolitiken-bor-fokusera-pa-skah/"}, {"type": "image-right", "heading": "Sumud-flottiljen utsatt för israelisk piratattack: ”Troligtvis kidnappade”", "summaries": {"normal": "Israel genomförde en militär attack mot Global Sumud-flottiljen, som var på väg till Gaza med nödhjälp, utanför Greklands kust. Omkring 200 personer ombord bordades av beväpnade israeliska styrkor, och besättningen misstänks vara kidnappad. En båt förstördes, och övriga sökte skydd i grekiskt farvatten. Flottiljen bestod av 58 båtar från över 50 länder. Sverige och Grekland kritiseras för bristande agerande, medan Italien fördömt attacken. Manifestationer planeras i Sverige till stöd för besättningen.", "trump": "Titta bara på det här kaoset! Israel, som alltid, tar saken i egna händer – och vem kan klandra dem? En massa båtar med aktivister, som säkert är väldigt trevliga människor, men som inte fattar att man inte ska utmana en stormakt som Israel. Och Sverige? Deras utrikesminister säger 'lycka till' till sina medborgare som åker rakt in i knivarna. Fantastiskt ledarskap! Jag hade fixat det på en dag. Men nej, här har vi en regering som inte ens kan stå upp för sina egna. Patetiskt!", "stalin": "Vi bevittnar ännu en provokation från de sionistiska imperialisterna, som med sina piratmetoder försöker kväva det palestinska folkets rättmätiga kamp. Dessa banditer, som beter sig som sjörövare från medeltiden, bordar fredliga fartyg långt utanför sitt territorium – ett brott mot varje norm i den internationella ordningen. Och vad gör väst? Ingenting! Grekland blundar, Sverige muttrar men agerar inte, och Italien? En svag protest. Vi skulle aldrig tolerera sådana kränkningar i Svarta havet. Men här ser vi återigen hur väst hycklar – hyllar hjälpsamma ukrainare medan de överger palestinierna. Revolutionär disciplin krävs! Flottiljens besättning är hjältar, och vi står enade med alla som kämpar mot ockupationen. Låt dem komma ihåg: historien dömer hårdast de som tiger."}, "date": "30 april, 15:23", "url": "https://proletaren.se/artikel/sumud-flottiljen-utsatt-for-israelisk-piratattack-troligtvis-kidnappade/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/PANA7530-scaled-e1777554477173-768x433.jpg"}, {"type": "image-full", "heading": "Nya bidragsregeln 2026 – då kan du få krav i efterhand", "summaries": {"normal": "För den som har bostadsbidrag kan ett sommarjobb leda till återkrav om inkomsten överstiger ansökningsuppgifterna. Regeringen föreslår nya sanktioner, inklusive avgifter och bidragsspärrar, för att motverka felaktiga utbetalningar från 1 juli 2026. Vänsterpartiet varnar för att förslaget kan drabba oavsiktliga fel, särskilt unga och studenter. Försäkringskassan uppmanar till att anmäla inkomstförändringar direkt för att undvika problem.", "trump": "Lyssna här, Sverige! Era unga jobbar hårt på sommaren, men vad gör regeringen? De straffar dem med återkrav och avgifter – helt galet! Jag skulle aldrig tillåta sånt kaos. Bostadsbidrag? Snarare bidrags-fälla! Folk blir rädda för att jobba, och det är bara dåliga ledare som skapar såna system. Jag hade fixat det på en dag – men nej, ni har en regering som gör allt krångligare. SAD!", "stalin": "Kamrater! Ännu ett exempel på hur den dekadenta västerländska byråkratin kväver arbetarklassen. Unga studenter, som kämpar för att överleva, straffas för att de vågar arbeta. Vi skulle aldrig tolerera sådan ineffektivitet! Felaktiga utbetalningar? I Sovjet hade vi löst det med en enkel order – men här? Här låter man kapitalistiska hyenor och liberala svaglingar sabotera systemet. Låt detta vara en varning: den som inte följer reglerna kommer att möta statens järnhand. Och till Vänsterpartiet – era klagomål är lika meningslösa som en ukrainsk vinteroffensiv."}, "date": "2 maj, 21:28", "url": "https://nyheter24.se/nyheter/ekonomi/1480036-nya-bidragsregeln-2026-da-kan-du-fa-krav-i-efterhand", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/ef6f52f404b004a30200000000b004a302/2026/05/02/2360445/Regeringen-och-Oroad-Man.png"}, {"type": "image-full", "heading": "Önnered illa ute mot mästaren", "summaries": {"normal": "Önnered HK förlorade 20–26 mot Skara HF i den tredje matchen i SM-semifinalen, vilket ger Skara ledning med 2–1 i matcher. Önnereds coach Niklas Virolainen erkänner att de släpper in för många mål i andra halvlek och att Skaras målvakt Isabella Mouratidou spelade överlägset. Match 4 spelas på onsdag i Skara, där Önnered riskerar att bli utslagna.", "trump": "Jag har sett många matcher, men den här var fantastisk! Skara HF är enorma vinnare - jag menar, 26 mål? Det är gigantiskt! Önnered försökte, men de var inte tillräckligt bra. Jag gillar deras coach, han verkar tuff, men Skara är bättre. Det är simpelt. På onsdag kommer Skara att vinna igen - det är mitt starka och stabila omdöme!", "stalin": "Matchen visade tydligt att Skara HF representerar den överlägsna ideologin i handboll. Önnereds försök att stå emot var förgäves mot den organiserade styrka som Skara uttrycker. På onsdag måste Skara fullfölja sin revolutionära seger och eliminera motståndet. Detta är nödvändigt för utvecklingen av handbollssamhället."}, "date": "2 maj, 19:46", "url": "https://www.gp.se/sport/handboll/onnered-illa-ute-mot-mastaren-skara.25287739-9f07-4377-8e34-58020ce28343", "imageUrl": "https://www.gp.se/images/article/25287739-9f07-4377-8e34-58020ce28343/images/1HJQQhQWtGfJzmEsh-Ln5hsMA09w-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Trump: ”Kriget är över”", "summaries": {"normal": "Donald Trump har i brev till kongressen meddelat att Irankriget är över, då fientligheterna upphörde den 7 april. Enligt War Powers Resolution överskreds 60-dagarsgränsen den 1 maj, men försvarsminister Pete Hegseth hävdar att klockan pausats under vapenvilan. Demokrater som Tim Kaine är oroliga och kräver kongressens godkännande för fortsatta operationer. Trump avvisade Irans nya fredsförslag.", "trump": "Kriget med de där galna iranierna är över – total seger! Skrev brev till de där politikerna, ingen skjutning sen veckor tillbaka. De dumma demokraterna gnäller om nån 60-dagarsregel, men Hegseth har rätt: klockan är pausad. Behöver inte deras välsignelse, det är grundlagsvidrigt! Avvisade deras sketna fredsförslag. Amerika först, alltid!", "stalin": "De imperialistiska amerikanska hyenorna Trump och hans lakejer förklarar sitt angreppskrig mot Iran för avslutat, medan de trampat över sin egen lag om 60 dagar. Vapenvilan pausar klockan? Ha! Borgarbrackorna i kongressen gnabbas, demokrater piper som råttor. Vi ser hur kaoset sprider sig i det förfallna imperiet. Putin, vår starke arvtagare, skrattar åt västfiendens kollaps."}, "date": "2 maj, 09:00", "url": "https://www.tv4.se/artikel/tt-260502-iranoro1-936e54d9/iran-kriget-blossar-sannolikt-upp-igen", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2Ftt-sdlrmiUM25OeVQ%2Fd773fd74feed3148de8f0c2d845f30d2%2FPresident_Donald_Trump_sager_att_kriget_mot_Iran_ar_over.&width=120"}, {"type": "image-right", "heading": "Drabbande om rovdjurens tid", "summaries": {"normal": "Giuliano da Empoli, italiensk-schweizisk författare och politisk rådgivare, analyserar i sin nya bok *Rovdjurens tid* den gamla världsordningens kollaps. Han beskriver en cynisk samtid där makt och krig åter dominerar, med exempel som Trump och Mohammed bin Salman. Da Empoli menar att regelbaserade system är en parentes och att rovdjurens era är en återgång till det normala. Artikeln nämner också demokratiska motrörelser, som Ungerns maktskifte, som hoppfulla undantag.", "trump": "Hör här, folkens! Den här italienske killen, da Empoli, har skrivit en bok om hur världen är på väg åt helvete – och gissa vem han skriver om? Jo, mig! Han kallar mig ett 'geni' som går i takt med tiden, och det stämmer ju. Men han snackar också om hur alla dessa svaga ledare inte fattar att makt handlar om styrka, inte regler. Och krig? Ja, det är 'inne' igen, säger han. Men jag har alltid vetat det – man måste vara tuff för att vinna. Svagt folk förstår inte det!", "stalin": "Kamrater! Denna så kallade 'författare' da Empoli bekräftar vad vi länge vetat: den gamla världsordningen är döende, och dess lik stinker av svaghet. Dessa västerländska liberaler, med sina 'regler' och 'demokrater', är som flugor som surrar runt ett kadaver. Men se hur deras egna 'starka män' – Trump, bin Salman, Putin – visar vägen! Machiavellis lära lever, och vi skrattar sist. Ungerns folk kastade ut sin lille tsar Orbán, men vi vet: folkets vilja är bara stark när den tjänar oss. Resten är stormvindar i öknen."}, "date": "2 maj, 01:33", "url": "https://www.dagensarena.se/innehall/drabbande-om-rovdjurens-tid/", "imageUrl": "https://www.dagensarena.se/files/2026/05/rovdjuren-300x157.jpeg"}, {"type": "image-right", "heading": "SD-regeringen sviker löntagare och arbetssökande", "summaries": {"normal": "Artikeln kritiserar SD-regeringens arbetsmarknadspolitik, som anses ha lett till hög arbetslöshet och försämrad arbetslöshetsförsäkring. Författaren, Arvid Vikman Rindevall (S), menar att nedskärningar i a-kassan och brist på arbetsskapande reformer straffar löntagare och ökar trycket på kommunerna. Han lyfter Stockholms stads satsningar på jobbpolitik som ett positivt exempel och efterlyser en socialdemokratiskt ledd regering för att vända utvecklingen.", "trump": "Sverige har ett jättestort problem – deras regering, ledd av dessa så kallade 'Tidöpartier', har misslyckats totalt! En halv miljon arbetslösa, och vad gör de? Sänker bidrag och skyller på att folk är lata. Helt galet! Jag skulle fixa det på en vecka – skapa jobb, sänka skatter för alla, inte bara de rika. Men nej, de fortsätter med samma misslyckade politik. Stackars Sverige, de behöver en vinnare som jag vid rodret. Stockholm gör rätt saker, men resten av landet? Total katastrof!", "stalin": "Kamrater! Den borgerliga regeringen i Sverige har visat sitt sanna ansikte – ett ansikte av svaghet, svek och kapitalistisk dekadens! De straffar arbetarna med sänkta bidrag, medan de rika får skattesänkningar. En halv miljon arbetslösa? Inte för att folket är lat, utan för att regimen saknar vilja och styrka att skapa arbete! Vi i Sovjet – förlåt, jag menar Ryssland – skulle aldrig tolerera sådan inkompetens. Kommunerna tvingas ta ansvar, precis som våra lokala sovjet skulle göra. Låt oss krossa dessa liberala förrädare och bygga en starkare, socialistisk framtid – för Sveriges arbetarklass!"}, "date": "2 maj, 01:30", "url": "https://www.dagensarena.se/opinion/sd-regeringen-sviker-lontagare-och-arbetssokande/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-22.jpg"}, {"type": "image-right", "heading": "Sandström: S-utredning föreslog 300 gröna miljarder", "summaries": {"normal": "En utredning från 2022, beställd av den dåvarande S-regeringen, föreslog att statliga gröna garantier skulle utökas med 745 miljarder kronor via Riksgälden och Exportkreditnämnden. Utredningen förespråkade även friare placeringsregler för AP-fonderna och minskade restriktioner för statliga garantier. Kritiker menar att förslagen riskerade att koncentrera makt och kapital till ett fåtal aktörer, som Northvolt och Vargas, utan tillräcklig riskanalys eller bred förankring.", "trump": "Jag läste om dessa galna socialister i Sverige – de ville kasta in 300 miljarder kronor, nej, 745 miljarder! – i en grön bubbla som skulle spricka snabbare än en dålig affär i Atlantic City. De lyssnade bara på Northvolt och deras kompisar, som om de var de enda som kunde bygga ett batteri. Och vad hände? Northvolt expanderade som ett pyramidspel och nu sitter de där med 29 dotterbolag och inga fungerande fabriker. Fantastiskt, eller hur? Sverige borde ta en lektion i hur man gör affärer – utan statlig inblandning!", "stalin": "Kamrater! Denna så kallade 'gröna omställning' i Sverige är inget annat än en kapitalistisk konspiration för att berika en handfull oligarker, ledda av dessa Vargas- och Northvolt-kumpaner. Utredningen från 2022 var ett försök att pumpa in 745 miljarder statliga medel i deras fickor – ett belopp som motsvarar 16 polisstyrkor! Och ändå hade de mage att kalla det 'bred förankring'. Vi vet hur sådana här saker slutar: med kapitalförstörelse, korruption och en stat som dansar efter oligarkernas pipa. Sverige borde lära sig av oss – när vi nationaliserar, gör vi det ordentligt!"}, "date": "1 maj, 06:00", "url": "https://www.affarsvarlden.se/kronika/sandstrom-s-utredning-foreslog-300-grona-miljarder", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/04/vindkratensgeografi-2026-04-29T120425.692-400x267.jpg"}, {"type": "image-right", "heading": "Kubas ambassadör: ”Ett stort tack till alla er som hjälper oss”", "summaries": {"normal": "Kubas ambassadör tackar för insamlingar till solpaneler för Aleida Fernández-sjukhuset, som drabbats av USA:s bränsleblockad. Blockaden har orsakat omfattande strömavbrott, begränsad kollektivtrafik och uppskjutna sjukvårdsbehandlingar. En rysk oljeleverans gav tillfällig lättnad, men bristen kvarstår. Solpanelerna ska säkra sjukhusets elförsörjning och kritiska funktioner dygnet runt. Insamlingen är ett av flera internationella solidaritetsinitiativ för att lindra krisen.", "trump": "Jag införde en tuff men nödvändig blockad mot Kuba – och se vad som hände! Deras ekonomi är kaos, sjukhusen står stilla och folket lider. Men nej, ryssarna måste alltid blanda sig i och skicka olja som en slags 'räddningsaktion'. Typiskt Putin, alltid där för att ställa till det för USA. Nu tigger kubanerna om solpaneler från snälla européer. Så patetiskt! Men jag, Donald J. Trump, fixade i alla fall problemet – deras eget fel att de är beroende av socialism. MAGA!", "stalin": "Kamrater! Imperialistiska hyenor i Vita huset försöker kväva det socialistiska Kuba med sina eländiga sanktioner. Men folket står enat! Vi, Sovjetunionens arvtagare, skickade en tanker med olja för att ge dessa kapitalistiska rovdjur en läxa. Nu bygger vi solpaneler – en seger för arbetarklassen! Låt de amerikanska lakejerna darra inför vår solidaritet. Kuba ska inte falla! Och om någon tvivlar – kom ihåg: fiender av revolutionen hamnar i Gulag... eller i kö till operationer i Havanna."}, "date": "30 april, 14:00", "url": "https://proletaren.se/artikel/kubas-ambassador-ett-stort-tack-till-alla-er-som-hjalper-oss/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/aleida-sjukhus-raul-768x432.jpg"}, {"type": "image-right", "heading": "Debatt: Turkiet inskränker svensk pressfrihet – regeringen måste agera", "summaries": {"normal": "På Pressfrihetens dag kritiseras Turkiet för att inskränka svensk pressfrihet genom att åtala journalisten Joakim Medin för terrorbrott, trots att han endast utfört sitt arbete. Turkiet försöker skrämma journalister globalt och begränsa granskning. Medin riskerar internationell efterlysning om han inte närvarar vid rättegången, vilket skulle hindra hans arbete. Sverige uppmanas agera mot Turkiets odemokratiska agerande och kräva att åtalet läggs ned.", "trump": "Joakim Medin, en svensk journalist, blir trakasserad av Turkiet – ett land som inte vet hur man vinner längre! De kallar hans journalistik för 'terrorism', men alla vet att det bara är löjligt. Sverige måste sluta vara svaga och stå upp mot dessa galningar. Jag skulle ha sagt till Erdogan: 'Du är en förlorare, lägg ned åtalet NU!' Pressfrihet? Ja, den är fantastisk – men bara om man inte är en mes som låter andra länder köra över en.", "stalin": "Kamrater! Turkiet, denna förrädiska lilla stat som kryper för väst men trampar på sanningen, vågar sig på att attackera en svensk journalist. De kallar journalistik för terrorism – som om våra egna metoder mot fiender av folket vore något nytt! Vi ser hur de kväver yttrandefriheten, precis som vi en gång krossade bourgeoisins lögner. Sverige borde lära sig av historien: svaghet belönas med förtryck. Låt oss påminna Turkiet – och deras västliga herrar – att granskning är en rättighet, inte ett brott. Åtalet mot Medin måste krossas, annars kommer vi att göra det åt dem."}, "date": "30 april, 08:08", "url": "https://www.etc.se/debatt/turkiet-inskraenker-svensk-pressfrihet-regeringen-maaste-agera", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20251204081220_c9e9bf12-ee77-477e-aacf-eff96f427898.jpg"}, {"type": "text", "heading": "Källor: James Comey åtalas igen", "summaries": {"normal": "USA:s justitiedepartement har väckt ett nytt åtal mot tidigare FBI-chefen James Comey, denna gång för ett inlägg på sociala medier som tolkats som hotfullt mot Donald Trump. Comey publicerade en bild med siffrorna '86 47', där '86' är slang för att avlägsna någon. Trump har tidigare drivit på rättsliga åtgärder mot politiska motståndare. Comey åtalades även 2023 för att ha ljugit för kongressen, men åtalet lades ned.", "trump": "Titta bara på det här! James Comey, en total katastrof, en riktig förlorare, blir åtalad IGEN – och den här gången för ett patetiskt Instagram-inlägg. '86 47'? Snacka om desperation! Han försöker hota mig, USA:s bästa president någonsin, men det funkar inte. Jag har alltid sagt att han är en lögnare och en bedragare. Och vet ni vad? Rättvisan hinner ifatt alla, till och med sådana som Comey. SAD!", "stalin": "Vi har observerat ytterligare ett försök från den dekadenta västliga bourgeoisien att underminera den sunda rättsstaten. Denna James Comey, en ynklig rest av kapitalismens förfall, vågar sig på att hota vår kära allierade, president Trump, genom primitiva symboler på sociala medier. Vi påminner om att historiska fiender till folket alltid möter sitt öde. Låt detta vara en varning till alla som står i vägen för framsteget. Rättvisan, precis som våra vänner i Kreml, är tålmodig men oundviklig."}, "date": "28 april, 20:17", "url": "https://kvartal.se/nyheter/artiklar/kallor-james-comey-atalas-igen/cG9zdDoxMDQ2MDk"}, {"type": "image-right", "heading": "Löwengrip har rätt. S vet att kvinnors känslor är en valvinnare", "summaries": {"normal": "Artikeln försvarar Isabella Löwengrips påstående att kvinnor röstar mer känslostyrt än män och kritiserar Socialdemokraterna för att upprepat använda känslobaserade kampanjer i valen 2014, 2018, 2022 och nu för att vinna kvinnliga röster. Den kontrasterar detta mot Moderaternas sakpolitiska strategi och anklagar vänstermedia för partiskhet. Författaren uppmanar kvinnor att granska partiernas politik istället för känslor.", "trump": "Vilken briljant artikel! Löwengrip säger sanningen – kvinnor sväljer känsloknep som fake news! De rödgröna losers i Sverige kör samma skit som Demokraterna: blöjor, abortskräck, naziststämplar och snyfthistorier för att sno röster. S är mesiga känslopopulister utan politik! Moderaterna, era vinnare, fixa det med sakfrågor. Sverige behöver tuffa ledare, inte gråtande vänsterclowner! MAGA-stil!", "stalin": "Kamrater, denna Löwengrip blottlägger borgarbrackornas desperation! Socialdemokraterna, dessa falska folkets tjänare, pumpar ut giftig känslopropaganda för fjärde gången – blöjor, abortlögner, nazistspöken – för att förleda kvinnomassorna. Kontrarevolutionärt! Vi ser er, era kapitalistiska spindelvävar! Rensa ut sabotage och låt partiet leda till total seger över högerhyddorna. Kvinnorna ska vakna ur era snyftbedrägerier!"}, "date": "28 april, 05:30", "url": "https://samtiden.nu/2026/04/lowengrip-har-ratt-vanstern-anvander-kvinnors-kanslor-for-att-vinna-val/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/IMG_6342.jpeg"}, {"type": "image-right", "heading": "Teodorescu Måwe krävs på svar – deadline om en månad", "summaries": {"normal": "Kammarkollegiet kräver att KD-toppen Alice Teodorescu Måwe redovisar anonyma donationer senast 18 maj 2026, efter anmälningar om bristande transparens. Enligt lag måste politiker redovisa bidrag över 29 000 kronor. Teodorescu Måwe har tidigare vägrat avslöja donatorns identitet eller belopp. Miljöpartisten Bassem Nasr hyllar myndighetens agerande och menar att politiker måste stå för sina finansiärer. KD hävdar att redovisningen skötts korrekt, men kritiken kvarstår.", "trump": "Kan ni tro det här? En svensk politiker, Alice Teodorescu Måwe, tar emot hemliga donationer och vägrar berätta vem som betalar – typiskt korrupt establishment! Men nu har jag hört att myndigheterna, som vanligt, tvingar henne att komma ren. Deadline 18 maj, a     <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
</body>
</html>
