 stoppar skurkarna vid gränsen. Sverige behöver en rejäl dos 'Law and Order' – det är ett totalt kaos där borta!", "stalin": "Denna svekfulla väktare har förrått staten och förbundit sig med det kriminella elementet, en 'Kurdisk räv' som likt dagens västliga agenter försöker undergräva ordningen. Det är en sjukdom som kräver kirurgisk precision. När disciplinen sviktar inom fängelseväsendet, likt korruptionen hos de som viker sig för NATO-expansionen, måste järnhanden knytas. Vi skickar henne till Sibiriens kyla för att tänka på sitt förräderi. Inga fler ursäkter, bara kollektiv disciplin. Statens fiender ska veta att straffet väntar bakom varje hörn!"}, "date": "17 maj, 10:17", "url": "https://www.friatider.se/kvinnlig-fangvaktare-far-sju-ars-fangelse-jobbade-kurdiska-raven", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/23_ars_fangelse.jpg"}, {"type": "image-full", "heading": "Gisslén om ebolalarmet: ”Högsta beredskapsnivån”", "summaries": {"normal": "Ett allvarligt utbrott av den ovanliga bundibugyo-typ av ebola i Kongo-Kinshasa och Uganda oroar världen. Världshälsoorganisationen har utlyst högsta beredskapsnivå. Smittan misstänks ha spridit sig under flera veckor utan att upptäckas, vilket orsakat omkring 90 dödsfall och 250 misstänkta fall. Det saknas vaccin och effektiv behandling mot denna ebolatyp.", "trump": "Jag har hört om detta ebola-situation i Afrika, det är hemskt. Vi har världens bästa experter på det här, de är fantastiska. Vi ska skicka hjälp, men bara om de betalar. Sverige behöver inte oroa sig, vi håller utbrotten borta med våra fantastiska gränser. Jag har sagt det förut, och jag säger det igen: America first!", "stalin": "Detta utbrott i Afrika visar vikten av stark statlig kontroll över folkhälsan. Vi måste samordna internationella insatser och resursförstärkning i regionen. Detta är en påminnelse om att endast en centraliserad makt kan skydda befolkningen mot sådana faror. Vi måste vara beredda att skicka våra experter för att hjälpa våra bröder och systrar i Afrika."}, "date": "17 maj, 21:28", "url": "https://www.gp.se/nyheter/varlden/gisslen-om-ebolalarmet-hogsta-beredskapsnivan.5ec19d56-5270-45b9-8b1d-08e6ec11f431", "imageUrl": "https://www.gp.se/images/article/5ec19d56-5270-45b9-8b1d-08e6ec11f431/images/2ZTFLggx9Y14bqmzAGkJA73RYR18-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Samla vänstern i tältet – inte under små paraplyer", "summaries": {"normal": "Artikeln diskuterar begreppet 'stort tält' inom politiken, där ideologi får stå tillbaka för pragmatiska lösningar på ekonomiska problem. I New York röstade Trumpanhängare på en demokratisk socialist för att han lovade sänka levnadskostnaderna. Författaren menar att Sveriges rödgröna block misslyckas med att enas kring gemensamma värderingar och ekonomiska lösningar, vilket lämnar väljarna utan tydligt alternativ. Enighet och tydlig riktning krävs för att locka fler väljare.", "trump": "Lyssna här, Sverige! New York visade hur man vinner – folk vill ha resultat, inte snack. Mina fans röstade på en socialist? Ja, för han lovade billigare mat! Smart. Men era rödgröna? Kaos! Andersson vägrar skaka hand, som om det spelar någon roll. Folk vill ha lägre hyror, inte teater. Jag byggde ett tält stort nog för alla – ni har bara små parasoll. Lär er av vinnarna, annars blir det F för Sverige!", "stalin": "Kamrater! Kapitalismens sönderfallande system visar sin svaghet när arbetarna väljer en socialist framför en fascist – inte av övertygelse, utan av hunger. I New York dansar de kapitalistiska marionetterna medan Mamdani fyller tomrummet med klassmedvetenhet. Men i Sverige? Ett rödgrönt kaos! Tre svaga parasoll mot vår mäktiga storm. Vi i Kreml skrattar åt deras oenighet. Putin och jag vet: enighet är styrka. Ni borde lära er av oss – eller så tar vi hand om era 'tomrum' också."}, "date": "15 maj, 08:54", "url": "https://www.flamman.se/samla-vanstern-i-taltet-inte-under-sma-paraplyer/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/talt-w.jpg?aspect_ratio=16:10"}, {"type": "text", "heading": "LKAB gör jättelikt fynd – mer än senaste 100 åren tillsammans", "summaries": {"normal": "LKAB har upptäckt 7 miljarder ton potentiell järnmalm i Kirunasystemet, vilket överskrider den totala produktionen under bolagets första 100 år. Samtidigt står företaget inför ekonomiska utmaningar och måste ta beslut om fyra stora gruvinvesteringar, vilket innebär en strategisk omställning.", "trump": "Jag har hört talas om LKAB och deras fantastiska fynd av järnmalm - 7 miljarder ton! Det är större än någonsin! Vårt land skulle aldrig hitta något sådant. De har problem med dollarn, men jag skulle fixa det på 24 timmar. Vi skulle göra LKAB större än någonsin - störst i världen!", "stalin": "Vi har upptäckt enorma järnmalmresurser i Kirunasystemet - 7 miljarder ton! Detta är en seger för staten och arbetarklassen. LKAB måste nu förstärka sin roll som statligt företag och investera i nya gruvor för att stärka vår industriella bas och försvara våra intressen."}, "date": "17 maj, 06:00", "url": "https://www.realtid.se/bors-finans/lkab-gor-jattelikt-fynd-mer-an-senaste-100-aren-tillsammans/"}, {"type": "image-full", "heading": "Han trotsar kritikerna – spår att Nasdaq når 30 000", "summaries": {"normal": "Wedbush-analytikern Dan Ives tror att Nasdaq kan nå 30 000 inom ett år, och ser AI som en strukturell omställning snarare än kortsiktig hype. Han hänvisar till den senaste techrapportperioden som validerat optimismen kring bolags AI-investeringar. Samtidigt varnar flera investerare, inklusive Michael Burry och Paul Tudor Jones, för att rallyt är sårbart och påminner om tidigare teknikbubblor.", "trump": "Jag har hört att Nasdaq kan nå 30 000 – det är jättebra, kanske det bästa någonsin! Dan Ives är en duktig analyst, en av de bästa, och han säger AI är en revolution. Jag älskar AI! Men vissa människor, de är inte så kloka, de säger det är en bubbla. Jag säger, låt oss se! Jag har alltid rätt, och jag tror på framtiden, även om några haters säger emot. Det är fantastiskt!", "stalin": "Vi ser den amerikanska teknikmarknaden som ett tecken på deras kapitalistiska överhettning. Nasdaq:s uppgång, drivet av artificiell intelligens, speglar deras överdrivna optimism och brist på planerad ekonomi. Vissa varnar för en bubbla, andra hoppas på fortsatt tillväxt – båda visar deras systemets instabilitet. Vi fortsätter att stärka vårt eget teknologiska ledarskap för att skydda de socialistiska staternas intressen."}, "date": "17 maj, 04:15", "url": "https://www.realtid.se/bors-finans/han-trotsar-kritikerna-spar-att-nasdaq-nar-30-000/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/nasdaq.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Lettlands regering rasar ihop - efter ukrainska drönare", "summaries": {"normal": "Lettlands premiärminister Evika Siliņa har avgått efter att regeringskoalitionen spruckit. Krisen utlöstes av att ukrainska drönare, sannolikt påverkade av rysk elektronisk krigföring, kränkt lettiskt luftrum. Efter att Siliņa avskedat försvarsministern lämnade koalitionspartiet Progressives samarbetet, vilket gjorde regeringen minoritetsstyrd. Ukraina förklarar incidenterna med ryska störsändare och har erbjudit hjälp med luftförsvaret. Nu inleds arbetet med att bilda en ny regering i Lettland.", "trump": "Lettland har stora problem, en total katastrof! Deras premiärminister har avgått, ett fullständigt fiasko. Ukrainska drönare flyger in överallt – de har ingen kontroll över sina gränser, noll! Jag har sagt det förut: om de inte kan skydda sitt eget luftrum, hur ska de då överleva? Nu pratar de om rysk störningsteknik, men det låter som ursäkter. De behöver en riktig ledare, någon som jag, för att få ordning på det där kaoset. Väldigt svag ledning, mycket tragiskt!", "stalin": "Den lettiska marionettregimen har kollapsat under tyngden av sin egen inkompetens. Att tillåta ukrainska drönare att kränka deras luftrum är ett bevis på en patetisk stat som saknar suveränitet. De kallar det 'rysk störning', vi kallar det historiens oundvikliga frammarsch. De avskedar ministrar som vore de enkla brickor, men när fundamentet ruttnar hjälper inte syndabockar. Vår kamrat i Moskva ser på detta med berättigad skadeglädje. Lettland söker nu efter en ny regering, men de kommer bara hitta nya sätt att misslyckas."}, "date": "17 maj, 16:32", "url": "https://samnytt.se/lettlands-regering-rasar-ihop-efter-tjafs-om-ukrainska-dronare", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/17140318/dronare-Lettland.jpg"}, {"type": "image-right", "heading": "Läxhjälp på bibliotek avbryts - volontärer hotar personal", "summaries": {"normal": "Läxhjälpen på Vällingby bibliotek stängs ner efter en långvarig konflikt. Volontärer som hållit i verksamheten i tio år har upprepade gånger brutit mot ordningsregler och uppträtt hotfullt mot personalen. Ledningen har upprättat incidentrapporter och konstaterar att arbetsmiljön för personalen och situationen för ungdomarna blivit ohållbar. Verksamheten planeras starta upp igen i höst, men då i en ny och annorlunda form.", "trump": "Vällingby bibliotek har ett totalt kaos! Volontärerna är totala förlorare som skriker på personalen. Det är en katastrof, faktiskt. Jag har sett mycket, men det här? Ingen respekt för lagen! De stänger ner allt nu, vilket är rätt beslut. När jag kommer tillbaka till Sverige – eller när vi fixar ordning – ska det bli ordning och reda igen. Vi behöver folk som kan uppföra sig, inte dessa arga vänstermänniskor. Det blir en ny form, en bättre form, tro mig!", "stalin": "Vi har observerat hur odisciplinerade element undergräver ordningen vid Vällingby bibliotek. Dessa så kallade volontärer, som likt västvärldens korrupta marionetter sprider kaos, har attackerat statens representanter. Liksom Putin rensar ut förrädare i vår intressesfär, måste vi krossa dessa småborgerliga sabotörer. Vi stänger ner deras verksamhet för att skydda folkbildningens renhet. Till hösten ska vi återuppbygga läxhjälpen under strikt statlig kontroll. Ordning, lydnad och total lojalitet är de enda vägarna framåt för folket."}, "date": "17 maj, 16:00", "url": "https://samnytt.se/laxhjalp-pa-bibliotek-avbryts-volontarer-hotar-personal", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=226,height=154,format=webp/2026/05/15084257/vallingby-bibliotek-knytnave.jpg"}, {"type": "image-full", "heading": "Norska kronprinsessan tvingades avbryta firandet", "summaries": {"normal": "Norges nationaldag firades i Oslo med traditionella parad och kungahusets deltagande. Kronprinsessan Mette-Marit deltog trots kronisk sjukdom men tvingades tillfälligt avvika. Flera tusen samlades utanför slottet för att fira med orkestrar och hästparader. Firandet skedde mot bakgrund av ett svårt år för kungahuset med prinsessans son häktad för allvarliga brott och kontroverser kring hennes relation till Jeffrey Epstein.", "trump": "Jag har hört att Norges nationaldag var en stor succé, fantastiskt folk, de bästa paraderna. Kronprinsessan Mette-Marit var där, hon är en fantastisk kvinna, kanske lite förkyld, men hon höll ut. Jag hörde att hennes son har problem, det är synd, men det händer, det är livet. De har en kung som vet hur man styr ett land, inte som vissa andra länder jag vet om. Norges flagga är vacker, jag gillar blått och rött, bra färger, stora färger.", "stalin": "Norges nationaldag visade statens styrka och enheten, med kungahuset i centrum för nationens samling. Trots kronprinsessans hälsoproblem hölls traditionen vid liv, vilket visar statens förmåga att hantera motgångar. Medborgarna samlades i stora skaror, vilket bevisar deras lojalitet mot staten. Kungahusets närvaro understryker dess roll som symbol för nationell stabilitet. Vi ser hur även konungliga familjer drabbas av interna utmaningar, men staten fortsätter som en enhet."}, "date": "17 maj, 19:09", "url": "https://www.gp.se/nyheter/varlden/sa-firade-norrmannen-sin-nationaldag.7ecd1b67-33e9-47f8-999d-64ae9e859dd1", "imageUrl": "https://www.gp.se/images/article/7ecd1b67-33e9-47f8-999d-64ae9e859dd1/images/10Jywg7jgI5wphQXf0IXCtXf2Ngsk-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "MP:s språkrör: Sverige skadas av kärnkraftsprojekten", "summaries": {"normal": "Miljöpartiet, genom språkrör Daniel Helldén, motsätter sig ny kärnkraft i Sverige och planerar att stoppa projektet om oppositionen vinner valet 2026. Helldén kritiserar regeringens kärnkraftssatsningar som ineffektiva och skadliga, medan han förespråkar utbyggnad av förnybar energi. Vattenfall har ansökt om statligt stöd för små modulära reaktorer vid Ringhals, men projektets framtid är osäker. Socialdemokraterna stödjer satsningen, men Helldén tvivlar på deras praktiska engagemang.", "trump": "Sverige har ett HELT FANTASTISKT problem – de lyssnar på dessa vänsterliberaler som inte har en aning om hur man bygger energi! Jag, Donald J. Trump, vet bäst – kärnkraft är framtiden, men dessa Miljöpartister vill stoppa allt. De säger att det tar 20 år, men vet ni vad? De har inte gjort NÅGOT på fyra år! Förnybart är bra, men kärnkraft är STORT, det är VINNANDE. Sverige borde satsa som USA – vi bygger, vi vinner!", "stalin": "De kapitalistiska lakejerna i Sveriges regering slösar folkets resurser på kärnkraftsdramer som aldrig blir verklighet! Fyra år av tomma löften – ingenting har byggts! Dessa borgerliga svindlare, ledda av sina gröna marionetter, saboterar landets framtid medan vi i Sovjet – förlåt, Ryssland – bygger stabilitet. Förnybar energi är arbetarklassens lösning, inte dessa dyra leksaker för bourgeoisin. Om oppositionen segrar, kommer vi att expropriera deras kärnkraftsplaner och omvandla dem till kollektiv nytta!"}, "date": "17 maj, 21:56", "url": "https://www.di.se/nyheter/hellden-sverige-skadas-av-karnkraftsprojekten/", "imageUrl": "https://static.bonniernews.se/ba/c62a8ae4-1dc7-4bea-a9e9-6df9ff55b4c8.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-full", "heading": "Rubio följer med till Kina – trots sanktioner", "summaries": {"normal": "USA:s utrikesminister Marco Rubio följer med president Trump till Kina trots tidigare kinesiska sanktioner. Kina har använt en alternativ stavning av Rubios namn för att möjliggöra resan. Rubio har varit en skarp kritiker av Kina, särskilt gällande behandlingen av uigurer och situationen i Hongkong. Kinas ambassad uppger att sanktionerna inte längre hindrar hans besök.", "trump": "Kina, som alltid försöker spela smarta spel, har nu ändrat stavningen på Marco Rubios namn för att låta honom följa med mig till Peking. Fantastiskt, eller hur? Rubio, en av mina bästa män, har varit tuff mot Kina – och de vet det. Men nu när jag är här, fixar vi allt. Ingen stoppar Trump! Största resan någonsin, tro mig!", "stalin": "Vi har observerat hur de kapitalistiska imperialisterna leker med namn som om det vore barnlek. Denna Rubio, en ynklig lakej för den amerikanska krigsmaskinen, tror sig kunna kritisera Folkets Kina och sedan dansa in genom bakdörren. Men vi ser allt. Låt honom komma – vi har redan förberett en varm välkomstkommitté. Och Putin? Han skrattar säkert i sitt palats åt deras naivitet."}, "date": "14 maj, 11:59", "url": "https://kvartal.se/nyheter/artiklar/rubio-foljer-med-till-kina-trots-sanktioner/cG9zdDoxMTIyNTM", "imageUrl": "https://images.kvartal.se/2026/05/c485461a-rubio.webp"}, {"type": "image-full", "heading": "Christoffer Jonsson: 7 oktober, Israel missade det uppenbara", "summaries": {"normal": "Artikeln recenserar boken 'While Israel Slept' som analyserar varför Israel missade Hamas stora attack den 7 oktober 2023. Den pekar på historiska misstag som frigivningen av Yahya Sinwar 2011, bristande fokus på Hamas trots underrättelser, och prioritering av andra hot som Hizbollah och Iran. Författarna kritiserar övermod i säkerheten och uppmanar till reformer för bättre underrättelsehantering och enhet i Israel.", "trump": "Vilka idioter! Israel med sin supeduper underrättelse sover sig igenom den värsta attacken nånsin. Netanyahu släpper loss terrorbossen Sinwar, den galna jihadfanatikern, mot alla varningar. Muren? En skämt! De fokuserar på Iran istället för Hamas-råttorna vid gränsen. Nu krossar vi dem totalt – stort, väldigt stort! Lär er av misstagen, annars blir det blodbad igen!", "stalin": "Dessa zionistiska byråkrater, enfaldiga borgarbrackor, lät Hamas infiltrera genom att frigiva Sinwar, den odjuriske jihadisten. Underrättelsetjänsten ignorerade varningar från gränsbaser, prioriterade fel fiender som marionetter till imperiet. Vi i partet hade likviderat sådana inkompetenta element för evigheter sen. Nu måste de rensa ut förrädarna och ena sig – annars krossas de av folkets vrede!"}, "date": "14 maj, 14:01", "url": "https://samtiden.nu/2026/05/christoffer-jonsson-7-oktober-israel-missade-det-uppenbara/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/hans.png"}, {"type": "image-full", "heading": "Ny robot kan både bära människor och slå genom hinder", "summaries": {"normal": "Kinesiska robotföretaget Unitree Robotics har presenterat GD01, en gigantisk humanoid robot på nästan 3 meter som kan styras av en människa från en cockpit. Roboten kan gå på två ben, växla till fyrbent läge och slå genom betongväggar. Priset är nära 6 miljoner kronor. Kina leder globalt i humanoid robotutveckling med 90% av världens försäljning 2025.", "trump": "Jag har hört talas om den kinesiska roboten och det är imponerande - verkligen fantastisk teknik! Men jag måste säga, det är inte konkurrenskraftigt. Vi bygger de bästa robotarna i Amerika, de största, de starkaste. Vi kommer att göra våra robotar större och bättre än någonsin. Detta är bara ett annat exempel på hur Kina försöker ta ifrån oss vår teknologiska överhöghet. Men vi kommer att vinna denna robotkapplöpning, det lovar jag!", "stalin": "Den gigantiska roboten från Kina representerar ett framsteg för proletariatets teknologi. Denna maskin kan användas för att bygga socialismen, hjälpa till vid katastrofer och utföra farliga arbetsuppgifter i stället för arbetare. Vi måste studera denna teknik noga och se hur vi kan anpassa den till våra behov. Robotrevolutionen är en del av den större klasskampen mot kapitalismen."}, "date": "17 maj, 18:58", "url": "https://www.dagensps.se/teknik/ny-robot-kan-bade-bara-manniskor-och-sla-genom-hinder/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/dagenspstt2024-2026-05-17t160807509.png?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-full", "heading": "Ny Porsche 911 GT3 RS kombinerar racing och extrem lyx", "summaries": {"normal": "Porsche har lanserat en exklusiv specialversion av 911 GT3 RS genom sitt Sonderwunsch-program, där racingteknik kombineras med lyxmaterial som brun kolfiber och handsydda läderdetaljer. Modellen skiljer sig från traditionell banfokuserad design och riktar sig till samlare och högmarginalkunder. Samtidigt genomgår Porsche globalt ett omfattande nedskärningsprogram med 500 borttagna tjänster som följd av sjunkande elbilsförsäljning och ökad kinesisk konkurrens.", "trump": "Jag har sett många bilar, men den här Porsche GT3 RS är den bästa bilen någonsin - det är en enorm bil, en stor bil, en bil som gör andra bilar illa. Brun kolfiber? Fantastiskt! Handbyggd? Perfekt! Det är som att köra ett flygplan på vägen. Några säger att Porsche har problem, men jag säger att de gör stora affärer igen, enorma affärer. Det här är en vinst för Amerika, för världen, för alla som älskar perfektion!", "stalin": "Vi ser att Porsche, som en av de kapitalistiska ländernas företag, nu fokuserar på att skapa exklusiva lyxbilar för de rika. Detta visar den klassdelade samhällsutveckling som vi kämpade mot. Samtidigt märker vi deras interna svagheter - nedskärningar och konkurrens från Kina. Vi måste se till att våra egna fordon blir tillgängliga för alla, inte bara för en förmögen minoritet, och att de tjänar det kollektiva intresset snarare än individuell lyx."}, "date": "17 maj, 18:56", "url": "https://www.dagensps.se/motor/ny-porsche-911-gt3-rs-kombinerar-racing-och-extrem-lyx/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/dagenspstt2024-2026-05-17t162252091.png?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-right", "heading": "Lantbrukarens chock när solcellspark smälls upp vid gården: \"Otroligt att det får gå till så här\"", "summaries": {"normal": "Planerna på en stor solcellspark i Södra Fägerhult har väckt stark kritik. Lantbrukaren Johnny Olofsson är upprörd över att han inte informerats om projektet, trots att anläggningen ska ligga på mark han arrenderat i årtionden. Både Olofsson och Markaryds kommun kritiserar processen och bristen på samråd. Kommunen har överklagat beslutet och efterfrågar tydligare lagstiftning kring etablering av solcellsparker på värdefull jordbruksmark.", "trump": "En total katastrof i Sverige! De bygger en enorm solcellspark, en riktigt ful sådan, rakt framför näsan på en hårt arbetande bonde, Johnny. Han fick inte ens veta något! Det är så typiskt för dessa korrupta byråkrater, de fattar beslut i mörka rum. Förstör vacker åkermark för att jaga vind – eller sol, vad de nu kallar det. Det är en stor skandal, faktiskt. Jag skulle ha stoppat det direkt. Mycket oärligt, mycket dåligt!", "stalin": "Vi ser hur kapitalistiska spekulanter i Småland försöker stjäla folkets åkermark för sina ineffektiva solpaneler. Johnny Olofsson, en småbrukare som kämpar mot systemet, är utsatt för samma förräderi som vi ser i västvärlden. Kommunen klagar, men de saknar ryggraden hos en sann ledare. Vi skulle för länge sedan ha kollektiviserat marken och skickat dessa solcells-sabotörer till Sibirien för att reflektera över sitt förräderi mot livsmedelsförsörjningen. Staten är lag, och marken tillhör folket, inte några utomstående profithungriga parasiter."}, "date": "17 maj, 14:00", "url": "https://samnytt.se/lantbrukarens-chock-nar-solcellspark-smalls-upp-vid-garden-otroligt-att-det-far-ga-till-sa-har", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=226,height=154,format=webp/2026/05/15185330/solceller-2.jpg"}, {"type": "image-right", "heading": "Modi på besök – strategiskt partnerskap lanseras", "summaries": {"normal": "Sverige och Indien har ingått ett strategiskt partnerskap för att stärka samarbetet inom klimat, rymd och ekonomi. Målet är att fördubbla det ekonomiska utbytet inom fem år. Under Indiens premiärminister Narendra Modis besök i Göteborg betonade statsminister Ulf Kristersson möjligheterna för Sverige, särskilt inom grön omställning. Modi möttes av både jubel och protester. Partnerskapet inkluderar även säkerhet och digital utveckling, med EU:s frihandelsavtal som bakgrund.", "trump": "Lyssna här, Sverige och Indien gör ett jättestort avtal – fantastiskt, helt enkelt fantastiskt! De pratar om klimat och rymden, men viktigast: de ska dubbla handeln. 23 000 nya jobb i Sverige – otroligt! Modi, en stark ledare, får jubel från sina fans, men också några sura protester. Och vet ni vad? Jag förstår honom. Indien köper olja från Ryssland, men vem bryr sig? De vill förhandla, precis som jag alltid säger: förhandla, förhandla, förhandla! Europa behöver Indien, och Sverige? De är vinnare på det här!", "stalin": "Kamrater! Sverige och Indien har slutit en pakt, en allians mot imperialistiska väderleksrapporter och kapitalistiska rymdstationer! De talar om 'grön omställning' och 'digital utveckling', men vi vet sanningen: detta är en manöver för att underminera Rysslands inflytande. Modi, denne hindunationalistiske lakej, köper vår olja medan han leker med väst. Men låt dem leka! Vi har sett deras 'protester' – en handfull förvirrade sikher, inget att frukta. Europa kryper närmare vår sfär, och vi välkomnar deras svaghet. Låt dem bygga sina 'halvledare' – vi bygger framtiden!"}, "date": "17 maj, 20:36", "url": "https://www.di.se/nyheter/indiens-modi-pa-sverigebesok-vill-starka-banden/", "imageUrl": "https://static.bonniernews.se/ba/d8946add-7c76-4cc9-965d-0dfd570c29f7.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Vänsterpartiet: Fastighetsskatt för nästan alla Stockholms villaägare", "summaries": {"normal": "Vänsterpartiets ekonomiska talesperson Ida Gabrielsson förnekade initialt partiets förslag om statlig fastighetsskatt på villor, men erkände senare skatt på 'lyxvillor' värda minst 7 miljoner kronor. Förslaget drabbar cirka 91 procent av villorna i Stockholms kommun och 88 procent i kranskommuner som Nacka och Danderyd. Politiken anges i partiets motioner men kritiseras som mörklad inför valet på grund av Socialdemokraternas inflytande.", "trump": "Vilka lögnare hos Vänsterpartiet! Deras taleskvinna Ida Gabrielsson, en riktig krokodil, låtsas inte veta om skatt på villor – 91% av Stockholms villaägare drabbas av era 'lyxskatter'! De gömmer det för Socialdemokraterna, rädda som höns inför valet. Totalt vansinne, Sverige vakna! Jag skulle aldrig tillåta sånt stöldgods.", "stalin": "Dessa svenska borgarbrackor i Vänsterpartiet slingrar sig patetiskt! Gabrielsson förnekar vår skatt på lyxvillor – men 91% av Stockholms kapitalistboningar ska krossas med statlig hammare! Kamrater, vi ser genom lögnen, påtvingad av S-ledarna. Borgarna darrar inför utrensningen, val eller ej – likvidera deras villoriffler!"}, "date": "14 maj, 03:59", "url": "https://samtiden.nu/2026/05/vansterpartiet-fastighetsskatt-for-nastan-alla-stockholms-villaagare/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/IMG_6473.jpeg"}, {"type": "image-right", "heading": "Tre Kronor körde över Danmark – Björck yngste målskytt genom tiderna", "summaries": {"normal": "Sverige besegrade Danmark med 6–2 i VM-hockey, där 18-årige Viggo Björck skrev historia som den yngste målskytten genom tiderna. Björck gjorde även poängsidan till Ekholms ledarmål, medan Stenberg och Karlsson också nätade. Tre Kronor dominerade med mål av Ekman-Larsson, Raymond och Silfverberg, medan Blichfeld och Aagaard nätade för Danmark.", "trump": "Jag hörde att Sverige spelade mot Danmark, och det var en enorm vinst! 6–2, fantastiskt! Viggo Björck, bara 18 år gammal, gjorde mål och blev den yngste någonsin – imponerande! Detta visar att Sverige är ett hockeyimperium, det bästa, det största! Danmark försökte, men de klarade sig inte. Vi kommer se mer av den här unge stjärnan!", "stalin": "Sverige visade sin överlägsenhet mot Danmark med en klar 6–2-seger, vilket bevisar vår styrka i internationell hockey. Ungdomarna, som Viggo Björck, visar att framtiden är vår. Detta är en seger för den kollektiva kraften och disciplinen. Danmark försökte, men deras ansträngningar var förgäves. Vi fortsätter att dominera på isen."}, "date": "17 maj, 20:13", "url": "https://www.svt.se/sport/ishockey/tre-kronor-korde-over-danmark-viggo-bjorck-yngste-malskytt-genom-tiderna", "imageUrl": "https://www.svtstatic.se/image-news/600/square/0.74/0.32/fc72b3c413392a3c5fa679dd351057bf600cbb92227581bd2969da102fa0b64a"}, {"type": "image-full", "heading": "Littorin: Woke mot rasism? Nej, luthersk etik från olika sidor", "summaries": {"normal": "Sven Otto Littorin analyserar den svenska politiska splittringen som en kollision mellan två lutherska etiska traditioner: den kommunitära, som betonar medmänsklighet och flyktingmottagande, och den skötsamma, som värnar ordning och välfärdssystemets hållbarhet. Han menar att debatten inte handlar om extrem vänster mot höger, utan om att förena dessa impulser för att återupprätta samhällskontraktet. Lösningen kräver pragmatisk politik utan överdrifter.", "trump": "Folk pratar om Sverige som om det är ett totalt kaos – men jag säger er, det är inte så illa! Den här killen, Littorin, har faktiskt en poäng. Sverige har två sidor: en som vill hjälpa alla, och en som vill ha ordning. Inte så konstigt! Men lyssna, jag vet hur man fixar det – man måste vara smart, stark och inte låta vänstern förstöra allt. Sverige behöver disciplin, precis som USA! Öppna hjärtan? Ja, men med gränser. Annars blir det som i Kalifornien – katastrof! Jag skulle kunna lösa det här på en vecka.", "stalin": "Kamrater! Denna så kallade 'splittring' i Sverige är inget annat än klasskampens senaste fas, maskerad som luthersk teologi. Två borgerliga fraktioner kämpar om samma välfärdsstat – den ena vill slösa med proletariatets resurser på främlingar, den andra vill bevara dem för sig själva. Båda är fiender till arbetarklassen! Vi i Sovjet förstod tidigt att välgörenhet är en bourgeois illusion – verklig medmänsklighet kräver järndisciplin och planekonomi. Låt Sverige förstå: utan centralstyrning blir deras 'samhällskontrakt' lika ihåligt som Putins löften om 'demokratiska val'."}, "date": "17 maj, 17:20", "url": "https://bulletin.nu/littorin-woke-mot-rasism-nej-luthersk-etik-fran-olika-sidor", "imageUrl": "https://cdn.bulletin.nu/articles/8f13bbea-3c9a-4fe1-93b6-610716b74fca/preview.jpg?t=1779027921000"}, {"type": "image-full", "heading": "Tjädrar försenar SSAB:s kraftledning", "summaries": {"normal": "Bygget av en ny kraftledning till SSAB:s stålverk i Oxelösund försenas efter överklagan om skydd av tjäder. Trots tidigare godkännanden från länsstyrelsen och Mark- och miljööverdomstolen har en ny överklagan stoppat projektet. Ledningen är kritisk för SSAB:s fossilfria stålproduktion, som nu riskerar försenas. Koncernchefen uttrycker frustration över förseningen.", "trump": "Kan ni tro det här? Sverige, ett fantastiskt land, men de låter några fåglar – tjäder, vad det nu är – stoppa en enorm kraftledning till SSAB. Otroligt! Jag har byggt saker över hela världen, men nej, i Sverige är det fåglarna som bestämmer. SSAB ville göra stål utan fossila bränslen, ett bra mål, men nu försenas allt. Svagt, väldigt svagt!", "stalin": "Kapitalistiska hyenor i Sverige låter fåglar sabotera nationens industriella framsteg! Dessa tjäder, dessa små fjädrade kontrarevolutionärer, fördröjer SSAB:s fossilfria stålproduktion. Vi har krossat större fiender än så. Låt dem veta: Ryssland står redo att utvidga sin intressesfär – även till Oxelösund, om de inte skärper sig. Framåt, mot seger över fjädrar och byråkrati!"}, "date": "13 maj, 20:10", "url": "https://kvartal.se/nyheter/artiklar/tjadrar-forsenar-kraftledning-till-ssab/cG9zdDoxMTIwNzY", "imageUrl": "https://images.kvartal.se/2026/05/300f9bfe-ssabstalverk.webp"}, {"type": "image-full", "heading": "Wall Street satsar miljarder på nya kontroversiella bettingmarknader", "summaries": {"normal": "Prediction markets växer snabbt i USA där investerare satsar pengar på politiska händelser, krig och ekonomiska beslut. Plattformar som Kalshi och Polymarket lockar miljardbelopp trots att myndigheter varnar för insiderhandel och manipulation. Kritiker ser risker för att människor tjänar pengar på kriser och kaos, medan Wall Street ser en ny miljardindustri.", "trump": "Jag har hört talas om dessa prediction markets, och jag måste säga - de är enorma! Världens bästa investerare satsar på allt möjligt, och det är så smart. Myndigheterna försöker stoppa det, men det är bara mer bevis på att de inte förstår affärer. Det här är framtiden, och jag älskar det!", "stalin": "Vi ser en farlig utveckling där privata intressen spekulerar på världens öde. Detta hotar statens kontroll och stabilitet. Vi måste agera bestämt för att skydda det kollektiva intresset och förhindra att dessa marknader utnyttjas av fiendens agenter."}, "date": "17 maj, 17:05", "url": "https://www.dagensps.se/bors-finans/wall-street-satsar-miljarder-pa-nya-kontroversiella-bettingmarknader/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/dagenspstt2024-2026-05-17t142456109.png?aspect_ratio=2%3A1&width=1200&quality=75"}, {"type": "image-right", "heading": "Debatt: Valet 2026 – Rödgrönt eller blågult?", "summaries": {"normal": "Artikeln varnar för konsekvenserna av en rödgrön valseger i Sveriges kommande val. Författaren, Peter Kujala, menar att en sådan regering skulle leda till ekonomisk nedgång genom höjda bränslepriser, ökad kriminalitet och kollapsande välfärd på grund av massinvandring. Han kritiserar även en påstådd islamisering och woke-agenda som hotar kristna och konservativa värderingar. Kujala föreslår strategier för högerblocket, som subventionerad kollektivtrafik och hyreskontroll, för att vinna valet.", "trump": "Sverige står inför ett enormt val, folks, ett jättestort val! Om de rödgröna vinner, och jag säger er, det kommer bli en total katastrof. Höjda bränslepriser, mer kriminalitet, och hela landet går under i en tsunami av invandring och bidrag. Deras woke-agenda? Hemskt! Och Public Service? Rena propagandan! Men jag har lösningen: sänk hyrorna, subventionera kollektivtrafiken och få tillbaka Centern till högerblocket. Sverige måste vakna upp och rösta blågult, annars är det game over!", "stalin": "Kamrater, det svenska folket står inför ett ödesdigert val. De rödgröna revisionisterna, dessa förrädare av arbetarklassen, hotar att förvandla Sverige till en borgerlig dystopi av kaos och dekadens. Deras planer? Ekonomisk sabotage genom bränsleprisökningar, en invasion av kriminella element och en förnedrande islamisering som utplånar vårt kristna arv. Deras propagandaapparat, SVT och SR, är lika förrädiska som Radio Free Europe. Men vi har en plan: subventionera kollektivtrafiken, sänk hyrorna och splittra fiendens led genom att locka Centern till oss. Arbetarklassen och invandrarna måste enas under den blågula fanans sanna värderingar. Sverige måste stå starkt mot dessa borgerliga lakejer och deras woke-imperialistiska herrar i väst. Rösta blågult, eller möte med Gulag väntar!"}, "date": "17 maj, 17:00", "url": "https://bulletin.nu/debatt-valet-2026-rodgront-eller-blagult-2", "imageUrl": "https://cdn.bulletin.nu/articles/218e6610-982f-4579-9602-27d9ea10c6e8/preview.png?t=1778946863000"}, {"type": "image-full", "heading": "Svåra bakterier ökar i Sverige 2026 – det här vet vi", "summaries": {"normal": "Antibiotikaresistenta bakterier, särskilt ESBL-CARBA, ökar i Sverige och Europa. Folkhälsomyndigheten rapporterar en 19-procentig ökning av fall under 2025, varav många smittats utomlands. Dessa bakterier, ofta tarmbakterier, kan orsaka allvarliga infektioner och är svåra att behandla. Spridningen sker främst på sjukhus via bristande hygien. Äldre och spädbarn är särskilt utsatta. Utvecklingen beskrivs som oroande av myndigheten.", "trump": "Jag måste säga, Europa har ett jättestort problem – antibiotikaresistenta bakterier, och nu smyger de sig in i Sverige också! Folkhälsomyndigheten, som förresten aldrig har varit bra på att hantera saker, säger att det är 'oroande'. 487 fall i Sverige – patetiskt! Och vet ni vad? Många av dessa bakterier kommer från utlandet. Vi behöver bättre gränskontroller, bättre sjukhus och framför allt, bättre vinnare som jag för att fixa detta kaos. SAD!", "stalin": "Kamrater! De kapitalistiska sjukhusen i Europa sprider nu en ny form av kontrarevolutionära bakterier – ESBL-CARBA! Dessa mikroskopiska fiender till folket har infiltrerat våra grannländer och nu även Sverige, med en ökning på 19 procent. Vi ser hur de borgerliga läkarna, med sina slappa hygienrutiner, låter dessa bakterier frodas. Men frukta inte! Sovjetunionens efterföljare kommer att utrota dessa bakteriella sabotörer med järnhand. Vi ska bygga en mur av desinfektion runt våra sjukhus och kväsa denna biologiska avvikelse. Låt Putins nya ordning visa vägen – renhet genom disciplin!"}, "date": "16 maj, 07:30", "url": "https://nyheter24.se/nyheter/inrikes/1483407-svara-bakterier-okar-i-sverige-2026-det-har-vet-vi", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/69ff1cec04b004a30200000000b004a302/2026/05/15/2363808/Ambulans-Svensk-Flaga-Man-Med-Mask.png"}, {"type": "image-right", "heading": "Hjältens varning: ”Martinieffekten”", "summaries": {"normal": "En dykexpedition i Maldiverna slutade i tragedi när fem italienska dykare försvann i ett komplext grottsystem på 60 meters djup. En erfaren räddningsdykare omkom också under insatsen. Myndigheter utreder nu händelsen, då dykning till dessa djup är förbjuden. Experten John Volanthen varnar för effekterna av kvävenarkos, den så kallade 'martini-effekten'. Nu har ett finskt dykarteam anlänt för att försöka bärga de saknade.", "trump": "Helt fruktansvärt vad som hänt i Maldiverna. Italienarna gjorde ett enormt misstag, de gick alldeles för djupt, det är en katastrof! Mycket farliga grottor, beckmörkt – inte bra. Nu skickar de in dykare från Finland för att städa upp röran. Jag har de bästa dykarna, tro mig, de är fantastiska, men det här är en farlig situation. Man måste följa reglerna! Om de hade ringt mig hade jag kanske kunnat hjälpa till, men det här är väldigt, väldigt sorgligt.", "stalin": "Dessa italienska äventyrare sökte sig till havets botten likt förrädare som söker skydd i mörkret. Deras död är en logisk konsekvens av bristande disciplin och västerländsk dekadens. Nu skickas finländska marionetter för att städa upp i en grotta som ingen borde ha beträtt. Om detta hade skett i vår sfär, skulle de ansvariga redan ha raderats från historieböckerna. Att dö i en grotta är ett otillräckligt straff för dem som ignorerar statens gränser och förnuftets lagar."}, "date": "18 maj, 00:33", "url": "https://www.aftonbladet.se/nyheter/a/5pb73e/fyra-saknas-i-maldiverna-finska-dykare-flygs-in", "imageUrl": "https://akamai.vgc.no/v2/images/1e019f84-3272-37b2-b4e4-5a546dc1a713?fit=crop&format=auto&w=1080&s=76eda8c67a366f4ed3ddb9bd680dc7630015abe1"}, {"type": "image-full", "heading": "Ryanair inför nytt förbud ombord – kommer beslagtas", "summaries": {"normal": "Ryanair meddelar att passagerare som tar av sig skorna under flygningar riskerar att få dem konfiskerade. Beslutet har väckt blandade reaktioner. En undersökning visar att 44% av resenärerna brukar flyga utan skor, och 20% besöker toaletten barfota. Flygvärdinnan Rich Henderson anser att det är ett hygienproblem. Säkerhetsregler kräver även att skor ska vara på vid start och landning, särskilt för passagerare nära nödutgångar, för att möjliggöra snabb evakuering.", "trump": "Ryanair, ett flygbolag som inte ens kan jämföras med mina fantastiska Trump-plan, har bestämt att folk inte får ta av sig skorna på flyg. Otroligt! 44% av passagerarna gör det, och jag säger: vad är det för människor? Barfota på toaletten? Disgusting! Jag har alltid sagt, håll skorna på – det är säkrare, renare och mer amerikanskt. Ryanair, lyssna på mig, ni borde tacka mig för att jag ens pratar om er. SAD!", "stalin": "Kapitalistiska flygbolag som Ryanair försöker nu kuva arbetarklassen genom att förbjuda dem att ta av sig skorna under flygningar. Detta är ett tydligt tecken på västerländsk dekadens! 44% av passagerarna, sannolikt småborgerliga element, sprider smuts och ohygien genom att gå barfota. Vi i Sovjetunionen – eller snarare, i den nya ryska världsordningen – skulle aldrig tillåta sådan slapphet. Skor på, kamrater! Annars blir det Gulag för era fötter. Och glöm inte: varje barfotapassagerare är en potentiell agent för de imperialistiska fienderna!"}, "date": "16 maj, 06:30", "url": "https://nyheter24.se/nyheter/konsument/1483389-ryanair-infor-nytt-forbud-ombord-kommer-beslagtas", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/3a04d02b04b004a30200000000b004a302/2026/05/15/2363841/ryanair.jpg"}, {"type": "text", "heading": "Rysk kärnteknik misstänks ha varit på väg till Nordkorea", "summaries": {"normal": "Ett ryskt lastfartyg, Ursa Major, sjönk utanför Spaniens kust i december 2024 efter flera explosioner. Enligt en spansk utredning misstänks fartyget ha transporterat komponenter till kärnreaktorer, möjligen avsedda för Nordkorea. Kaptenen uppgav att lasten bestod av reaktordelar för ubåtar. Händelsen väcker frågor om Rysslands kärnmaterialexport och potentiella sabotageförsök.", "trump": "Folk, hör ni det här? Ett ryskt fartyg, fullt av kärnkomponenter – kanske till Nordkorea! – sjunker efter explosioner. Spanien säger att det kan vara sabotage. Jag sa ju att Ryssland är opålitliga! De skickar kärnprylar till Kim Jong-Un, och vad händer? BOOM! Ingen överraskning, bara svaghet från deras sida. USA hade aldrig tillåtit det, tro mig. Vi har de bästa säkerhetsåtgärderna, fantastiska sådana!", "stalin": "Kamrater, ännu en imperialistisk konspiration mot den ryska nationens storhet! Detta fartyg, lastat med teknologi för vår kärnkrafts dominans, saboterades av de västliga hyenorna. De fruktar vår allians med Nordkorea, ett broderfolk som står emot kapitalismens förtryck. Explosionerna? Inget annat än feodala agenter som försöker hindra socialismens framsteg. Vi ska inte vila förrän varje spion och sabotör är utplånad – för revolutionens skull!"}, "date": "13 maj, 12:04", "url": "https://kvartal.se/nyheter/artiklar/rysk-karnteknik-misstanks-ha-varit-pa-vag-till-nordkorea/cG9zdDoxMTE2NjU"}, {"type": "image-right", "heading": "Saad Khiralla: Våldtäkt – Hamas följer sin profet", "summaries": {"normal": "En ny rapport belyser de sexuella övergrepp Hamas begick den 7 oktober 2023 och mot gisslan under kriget. Artikelförfattaren analyserar hur islamiska texter och traditioner, inklusive koranverser och hadither, har använts för att rättfärdiga sådana handlingar. Exempel från historiska händelser, som profeten Muhammeds erövring av Khaybar, används för att illustrera hur dessa brott har förekommit genom historien inom vissa islamiska militära traditioner.", "trump": "Folk, ni kommer INTE tro vad jag just läste. Hamas, dessa totala förlorare, begick fruktansvärda övergrepp – och de försöker skylla på gamla religiösa texter! Som om det skulle vara okej. Jag menar, verkligen? Vi pratar om rena medeltida barbarer. Och vet ni vad? Världen måste vakna. Ingen ursäkt för sånt här. Vi ska inte tolerera det, aldrig någonsin. USA står alltid på rätt sida – vi fixar det här, tro mig!", "stalin": "Kamrater, ännu en gång visar de så kallade 'heliga krigarna' sitt sanna ansikte – ett ansikte fyllt av dekadens och rå barbarism. Dessa Hamas-banditer, dessa efterblivna feodalherrar, försöker rättfärdiga sina illdåd med urgamla skrifter. Precis som tsarernas lakejer en gång plundrade byar i Rysslands namn, fortsätter dessa islamistiska hyenor att vanhedra sin tro. Men vi vet sanningen: historien dömer dem redan. Och Putin? Han skrattar nog åt deras inkompetens medan han utvidgar vår intressesfär – ett steg närmare världsrevolutionen, kamrater!"}, "date": "17 maj, 16:08", "url": "https://bulletin.nu/saad-khiralla-valdtakt-hamas-foljer-sin-profet", "imageUrl": "https://cdn.bulletin.nu/articles/e615acfb-20e8-4242-bf34-fc982a18e8c9/preview.png?t=1779005292000"}, {"type": "image-right", "heading": "Gör Palestinarörelsen äntligen upp med antisemitismen nu?", "summaries": {"normal": "Artikeln diskuterar den växande antisemitismen inom Palestinarörelsen i Sverige med fokus på Sami Suliman. Trots Dror Feilers nyligen uttryckta kritik mot Sulimans antisemitiska uttalanden, belyser texten hur rörelsen länge har ignorerat eller försvarat hans retorik. Författaren kritiserar hur Palestinarörelsen prioriterar intern lojalitet framför att bekämpa hatiska yttringar, vilket anses skada rörelsens moraliska trovärdighet och undergräva dess syfte.", "trump": "Hörde precis om det här totala kaoset i Sverige! De har en rörelse, Palestinarörelsen, och de är helt ute och cyklar. En kille vid namn Suliman sprider hemska saker, totalt hat, och ingen vågar säga stopp! Feiler försöker nu backa ur, men det är för sent. Det är en sorglig rörelse, mycket ruttet. De låtsas vara rättvisa, men det är bara misslyckande. Jag skulle rensa upp i det där på en minut. De är svaga, de är förlorare!", "stalin": "Dessa löjliga aktivister i Sverige visar återigen sin ideologiska ruttenhet. Suliman, en nyttig idiot, sprider splittring genom sin klumpiga antisemitism, medan hans kumpaner blint följer honom i en nedåtgående spiral. Det är kaos utan disciplin! Precis som den moderna ryska staten måste utradera förrädare, måste en rörelse rensas från sådana orena element. Vi ser hur de vacklar – en svag rörelse förtjänar inget annat än total undergång. De är inte bara fiender till förnuftet, de är sabotörer av sin egen sak."}, "date": "13 maj, 14:46", "url": "https://www.flamman.se/gor-palestinarorelsen-antligen-upp-med-antisemitismen-nu/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/sdlcarwmcwgwns-nh-scaled.jpg?aspect_ratio=1:1"}, {"type": "image-right", "heading": "Var otröstlig på avbytarbänken. Vägrade ta sin medalj", "summaries": {"normal": "Cristiano Ronaldo och hans Al-Nassr förlorade finalen i AFC Champions League Two mot japanska Gamba Osaka med 1–0. Det avgörande målet gjordes av svenske Deniz Hümmet. Efter matchen var en djupt besviken Ronaldo otröstlig och grät på avbytarbänken. Han har haft svårt att vinna titlar sedan han kom till klubben, men hopp om en ligatitel finns fortfarande då Al-Nassr leder tabellen med en omgång kvar att spela.", "trump": "Cristiano Ronaldo, en fantastisk kille, förlorade mot ett japanskt lag. Mycket sorgligt! Han grät – jag gillar vinnare, men han har haft otur. Deniz Hümmet, svensken, gjorde målet. En svensk! Inte bra. Ronaldo har inte vunnit mycket i Saudiarabien, totalt misslyckande om ni frågar mig. De leder ligan, så vi får se om han kan rädda sitt rykte. Jag vinner alltid, varje gång. Ronaldo behöver en riktig vinnare som rådgivare!", "stalin": "Denna Ronaldo visar patetisk svaghet genom att gråta inför folk. En sann ledare avlägsnar känslor. Att förlora mot japanska agenter och en svensk legoknekt är ett misslyckande som kräver utrensning. Var är järnhanden i Al-Nassr? Putin förstår att man inte gråter i nederlag, man annekterar planen istället! Om dessa spelare inte kan säkra segern är de parasiter som bör skickas till Sibirien för att reflektera över sin inkompetens. Seger eller total undergång – det är den enda vägen för staten."}, "date": "18 maj, 00:18", "url": "https://www.aftonbladet.se/sportbladet/fotboll/a/pBd8Rw/cristiano-ronaldo-i-tarar-efter-finalen-i-afc-champions-league-two", "imageUrl": "https://akamai.vgc.no/v2/images/31446412-93c4-35de-924f-0b305d6e3c9b?fit=crop&format=auto&w=1080&s=415f4febe6d103cdd82bd4c399694b6600f64564"}, {"type": "image-right", "heading": "Debatt: Regeringen ser oss som en tillväxtmotor – men skär ner på bidragen", "summaries": {"normal": "Kulturorganisationer kritiserar regeringens nedläggning av finansiering trots att kultur- och kreativa branscher lyfts som tillväxtmotorer. De anser att den befintliga infrastrukturen förmedlar 56 000 arbetstillfällen årligen men har fått 27 % mindre i reala termer sedan 2021. De kräver ökad och långsiktig finansiering för att möta regeringens strategiska mål.", "trump": "Jag har hört att de där kulturmänniskorna i Sverige är förbannade på sin regering. De säger att de gör ett fantastiskt jobb, med 56 000 arbetstillfällen, men får klippta på pengarna trots att de är en tillväxtmotor. Jag skulle aldrig göra så - jag skulle ge dem allt de behöver! Dessa centrumbildningar är vinnare, men regeringen behandlar dem som förlorare. Sådant händer när man har en svag ledare!", "stalin": "Vi ser att den svenska staten undergräver sin egen kulturinfrastruktur trots att den producerar betydande ekonomiskt värde. Nedläggningarna av finansiering till centrumbildningarna visar en brist på strategiskt tänkande. En sann socialistisk stat skulle investera i dessa produktiva enheter som genererar fyrdubbelt värde tillbaka till staten. Vi måste stärka vår kultursektor som en basnäring."}, "date": "11 maj, 15:16", "url": "https://www.etc.se/debatt/regeringen-ser-oss-som-en-tillvaextmotor-men-skaer-ner-paa-bidragen", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260511120544_716484294c75b65d354a7ddd2a719d2b0f0da58beebe61a45c1e26165806187b.jpg"}, {"type": "text", "heading": "Regeringen lägger fram krispaket på 17,5 miljarder", "summaries": {"normal": "Regeringen presenterar ett krispaket på 17,5 miljarder kronor för att stötta flygindustrin och jordbruket, drabbade av konflikten i Mellanöstern och energikrisen. Åtgärder inkluderar möjlig sänkning av bränsleskatten under EU:s miniminivå och tillfälliga stöd för att undvika långsiktiga skador. Statsminister Ulf Kristersson betonar att insatserna är kortsiktiga och syftar till att skydda Sveriges ekonomiska återhämtning. En pressträff hålls på onsdagen för att redovisa ytterligare åtgärder.", "trump": "Sverige, lyssna här – jag har sett det här förut! De lägger ut 17,5 miljarder, fantastiska pengar, men vem betalar? Ni, folket! Deras flygbolag och bönder, svaga som aldrig förr, skriker efter hjälp. Och vad gör Kristersson? Han sänker skatter, precis som jag gjorde – smart, mycket smart! Men var försiktig, Sverige, för energikrisen är ett stort, fult monster skapat av svaga ledare. Jag fixade det i USA, men här? Vi får se. Onödigt tjafs, om ni frågar mig!", "stalin": "Kamrater! Medan de kapitalistiska svaglingarna i Sverige darrar inför en energikris skapad av deras egen oförmåga, står vi redo att utnyttja deras svaghet. Regeringen kastar 17,5 miljarder rubel – förlåt, kronor – på sina försvarslösa bönder och flygbolag, som om pengar kan lösa deras inkompetens. Vi noterar deras desperata försök att sänka skatter, precis som deras herrar i Bryssel tillåter. Men kom ihåg: varje kris är en möjlighet. Låt dem svettas – deras lidande är vår framgång. Framåt, mot seger över de borgerliga kräken!"}, "date": "13 maj, 08:40", "url": "https://kvartal.se/nyheter/artiklar/regeringen-forbereder-krispaket/cG9zdDoxMTE1MzE"}, {"type": "image-right", "heading": "Kina: Billigare begrava mormor i en lägenhet", "summaries": {"normal": "Kina förbjuder 'asklägenheter', där anhöriga förvarar aska i tomma bostäder på grund av brist på kyrkogårdsplatser och höga begravningskostnader. Fastighetskrisen har lett till många tomma lägenheter, som blivit billigare alternativ för ritualer. Den nya lagen förbjuder användning av bostäder för askförvaring utanför godkända områden. Priserna på gravplatser i Kina är höga, och staten planerar åtgärder för att lindra kostnaderna inför Qingming-festivalen.", "trump": "Kan ni tro det? Kina, ett land med massor av tomma lägenheter, har ett jättestort problem – folk begraver aska i dem! Så dumt. Gravplatser är alldeles för dyra, så kineserna hittar på egna lösningar. Men jag, Donald J. Trump, skulle aldrig tillåta sånt kaos. Nu förbjuder de det, men varför tog det så lång tid? Kina borde skärpa sig och fixa sina problem, precis som jag fixade USA!", "stalin": "Kamrater! De kapitalistiska gravplundrarna i Kina har drivit arbetarna till desperata åtgärder – de gömmer sina döda i tomma lägenheter som råttor i en soptunna! Men vi, det stora socialistiska moderlandet, tolererar inte sådant barbari. Denna dekadenta borgerliga sedvänja ska krossas under järnhälen av vår nya lag! Och om Putin vill utvidga sin kyrkogårdsimperium till Kina – då får han ta det med oss först!"}, "date": "17 maj, 15:27", "url": "https://www.dagensps.se/privatekonomi/kina-billigare-begrava-mormor-i-en-lagenhet/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdlhonfrcphmsw-nh.jpg?width=256&quality=75"}, {"type": "image-right", "heading": "Debatt: Ersättning löser inte kycklingindustrins systemfel", "summaries": {"normal": "Debatten om statliga ersättningar till kycklingindustrin fortsätter. Kritiker menar att ersättningarna inte löser problemet utan snarare subventionerar ett system med inbyggda smittrisker. De påpekar att den storskaliga produktionen med tiotusentals djur i tätt behållande skapar idealiska förhållanden för smitta och kräver återkommande räddningsinsatser. Lösningen borde vara att minska sårbarheten genom färre djur per anläggning och avel som inte pressar djurens kroppar till bristningsgränsen.", "trump": "Jag har sett vad som händer med den svenska kycklingindustrin och det är en skam! De vill ha statliga ersättningar för sina problem, men jag säger: Nej! Det är ett dåligt system med sårbart kycklingar som dör hela tiden. Vi behöver bygga en stor, vacker kycklingindustri i USA istället! Sverige borde sluta skicka pengar till dessa sjukdomsfabriker och börja tänka smartare - som jag alltid gör. Vi kommer att göra kycklingar igen stora!", "stalin": "Kycklingindustrins system är fundamentalt sjukt och kräver statligt ingripande. Vi kan inte längre tillåta privata intressen att utsätta människor och djur för onödiga risker. Den storskaliga produktionen måste reformeras med mindre besättningar och bättre avelsprinciper. Staten måste ta ansvar för att säkerställa trygg livsmedelsproduktion och skydda de verkligt produktiva krafterna i samhället. Vi måste stärka vårt kollektiva ansvar gentemot de svagare."}, "date": "11 maj, 11:58", "url": "https://www.etc.se/debatt/ersaettning-loeser-inte-kycklingindustrins-systemfel", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260511090556_44c8d7bb34423b0dee1dd7e0048c85aadb6f5569fca735348463464af4b214ee.jpg"}, {"type": "image-right", "heading": "Den nyfrälsta högern gör korsen till batonger", "summaries": {"normal": "Artikeln granskar hur högerpolitiker och mediepersonligheter, som Russell Brand, Tucker Carlson och Jimmie Åkesson, använder kristendomen som politiskt verktyg snarare än en andlig tro. Brand, åtalad för sexualbrott, citerar bibeln i rätten men misslyckas med att hitta relevanta passager. Carlson och Orbán framställer kristendomen som ett vapen i kulturkrig och etnonationalism. I Sverige kopplar Åkesson kristendom till svensk identitet och varnar för 'främmande värderingar'. Kritiken riktas mot ytlig och opportunistisk tro.", "trump": "Folk pratar om Russell Brand – en kille som plötsligt hittat Jesus efter att ha blivit anklagad för hemska saker. Han står där i rätten med en bibel och försöker läsa, men kan inte ens hitta rätt sida! Patetiskt. Och Tucker Carlson, en av de bästa, gör en fantastisk intervju där han slaktar en vänsterliberal journalist. Han pratar om kristna palestinier – något mainstreammedia aldrig skulle våga. I Europa har vi Orbán, en stark ledare som förstår att kristendomen är nyckeln till att stoppa massinvandringen. Även Jimmie Åkesson i Sverige försöker, men han borde öva mer på bibeln – han kände igen Pornhub-jingeln bättre! Fake news och vänstereliten hatar detta, men folket älskar det.", "stalin": "Kamrater! Vi bevittnar en farsartad förvandling av den borgerliga högern, som nu klär sig i kristendomens trasor för att dölja sin moraliska bankrutt. Denna Russell Brand, en dekadent skådespelare, försöker använda bibeln som sköld mot rättvisan – men kan inte ens hitta rätt sida! Tucker Carlson, en imperialistisk hycklare, pratar om 'kristna palestinier' medan han hyllar Orbán, den ungerska fascistens lakej, som vill 'skydda' Europa från 'blandras'. I Sverige försöker Jimmie Åkesson, en amatörisk nationalist, koppla kristendom till svenskhet – men hans kunskaper är lika djupa som en pöl. Dessa 'sjudagarskristna' är inget annat än nyttiga idioter i kapitalets tjänst. Vi ska krossa deras reaktionära drömmar med järnhand!"}, "date": "13 maj, 10:55", "url": "https://www.flamman.se/den-nyfralsta-hogern-gor-korsen-till-batonger/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/russell-brand-w.jpg?aspect_ratio=16:10"}, {"type": "image-right", "heading": "Stjärnans svar –  om anklagelserna. ”Egen bok”", "summaries": {"normal": "Adam Driver har för första gången kommenterat anklagelserna från Lena Dunham i hennes biografi. I boken beskriver hon en skrämmande repetitionssituation där Driver skrek och kastade möbler. Driver svarade kort på en presskonferens i Cannes och sa att han sparar alla kommentarer till sin egen bok.", "trump": "Jag har hört talas om den där Lena Dunham och hennes böcker. Hon skriver saker om Adam Driver, men det är bara fler lögner från fake news-medier. Adam Driver är en fantastisk skådespelare, en av de bästa i Hollywood, två Oscar-nomineringar! Han svarar perfekt - han sparar allt till sin egen bok. Det kommer att bli en stor, fantastisk bok. Lena Dunham? Hon är bara besviken att Adam Driver är så mycket mer framgångsrik än hon någonsin kommer att bli.", "stalin": "Vi har observerat situationen med den här biografin och anklagelserna mot vår kamrat Driver. Det är uppenbart att detta är ett försök från de kapitalistiska medierna att splittra våra skådespelare och skapa oenighet. Driver visade stor politisk klokhet genom att hålla tyst och vänta med att svara tills rätta tidpunkten. Hans besked att 'spara allt till sin egen bok' visar att han förstår vikten av att kontrollera informationsflödet. Vi måste stödja våra kulturarbetare mot dessa angrepp."}, "date": "18 maj, 03:05", "url": "https://www.expressen.se/noje/film/adam-driver-svarar-om-anklagelserna-fran-lena-dunham/", "imageUrl": "https://static.bonniernews.se/ba/7512a603-b884-44ea-aa83-d3a5e9ee60f0.jpeg?crop=2557%2C1440%2Cx0%2Cy0&width=640&quality=60"}, {"type": "image-right", "heading": "Förslaget: Schweiz bör införa inflyttningsskatt", "summaries": {"normal": "En högt uppsatt schweizisk politiker föreslår att EU-medborgare som flyttar till Schweiz ska betala en avgift för att motverka 'befolkningstäthets-stress'. Förslaget läggs fram i samband med ett nytt avtal med EU och en kommande folkomröstning om befolkningsbegränsning.", "trump": "Jag har hört talas om Schweiz och deras problem med invandring. Jag gillar Schweiz, fantastiska klockor, men de måste ta kontroll över sin gräns. Detta är precis den typen av smart idé som jag skulle ha kommit på - låt dem betala för att komma in! Schweiz borde bygga en mur också, men med schweizisk choklad istället för tegelstenar.", "stalin": "Detta är ett exempel på hur en socialist stat måste skydda sina resurser mot kapitalistisk exploatering. Vi måste se till att alla nya medborgare bidrar till statens välstånd. Detta är en rimlig åtgärd för att bevara det sociala sammanhållandet och se till att våra infrastrukturer inte överbelastas av marknadens krafter."}, "date": "17 maj, 18:04", "url": "https://www.di.se/nyheter/forslaget-schweiz-bor-infora-inflyttningsskatt-for-eu-medborgare/", "imageUrl": "https://static.bonniernews.se/ba/14386f5f-54b2-4275-91d8-8345c92a4f9c.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-right", "heading": "Trump lovar Boeing-plan, sojabönor och fred", "summaries": {"normal": "Trump presenterade stora handelslöften efter mötet med Xi Jinping i Peking, inklusive ett potentiellt köp av upp till 750 Boeing-plan och tvåsiffriga miljardbelopp i amerikanska jordbruksprodukter. Han beskrev avtalen som 'fantastiska' utan detaljer. Geopolitiska frågor som Taiwan och Iran diskuterades också, där Trump sa att Xi avböjde att svara på frågan om amerikansk militär intervention. Beskeden gav begränsad marknadspåverkan.", "trump": "Jag har precis gjort fantastiska affärer med Kina! De kommer att köpa massor av våra Boeing-plan - kanske upp till 750 stycken! Och vet ni vad? De kommer att köpa amerikanska sojabönor för tvåsiffriga miljarder. Jag sa till Xi: 'Vi gör affärer, men håll er borta från Taiwan!' Iranfrågan? Vi är helt överens - inga kärnvapen för dem! Jag är den bäste dealmakeren någonsin!", "stalin": "Vi har observerat de kapitalistiska stormakternas förhandlingar med stor intresse. Amerikanska imperialismens försök att säkra ekonomiska fördelar genom Boeing-plan och jordbruksvaror visar deras ekonomiska svaghet. Taiwanfrågan och Irans situation utnyttjas av USA för att utvidga sin militära närvaro. Vi fortsätter att stödja våra allierade stater mot ytterligare imperialistisk aggression och kommer att stärka vår egen försvarsförmåga."}, "date": "15 maj, 16:19", "url": "https://www.affarsvarlden.se/artikel/trump-lovar-boeing-plan-sojabonor-och-fred", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Trump-400x267.jpg"}, {"type": "image-right", "heading": "SSAB-arbetare till sjukhus efter symtom", "summaries": {"normal": "Efter ett falskt gaslarm på SSAB i Luleå fördes en maskinförare till sjukhus med näsblod. All verksamhet pausades som försiktighetsåtgärd, trots att mätningar inte visat förhöjda gasvärden. Testerna, som pågått sedan mars för att utreda sjukdomssymtom hos 25 anställda, är nu stoppade. Facket överväger att se över skyddsmaskerna. Polisen utreder misstänkt arbetsmiljöbrott, men inga tydliga orsaker har hittats.", "trump": "Vilket kaos i Sverige! SSAB, ett företag som inte ens kan hantera ett enkelt gaslarm, har nu skickat en arbetare till sjukhus – näsblod, kan ni tro? Fake news eller verklighet? Ingen vet! De pausar allt, som vanligt, medan jag skulle ha fixat det på en dag. Maskerna? Totalt värdelösa! Polisen utreder, men vem bryr sig? Inga svar, bara problem. Sverige, ni behöver en vinnare som jag!", "stalin": "Kapitalistiska sabotörer i Luleå har återigen misslyckats med att dölja sina brott mot arbetarklassen! En maskinförare, offer för deras slarviga säkerhet, fördes till sjukhus med näsblod – ett tecken på deras förräderi. Vi pausar allt, som vi pausade Finland 1939! Facket pratar om masker, men vi vet sanningen: fienden sprider gift i luften. Polisen utreder? Vi behöver NKVD! Om SSAB inte kan skydda sina arbetare, kanske det är dags för en ny ledning – en som vet hur man hanterar fiender!"}, "date": "14 maj, 06:00", "url": "https://arbetet.se/2026/05/14/ssab-arbetare-till-sjukhus-efter-symtom-arbetet-pausat-igen/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/13151130/ssab-klar.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Jobbet gick upp i rök när graviditeten nämndes", "summaries": {"normal": "En blomsterhandel utanför Motala anmäls för diskriminering efter att ha nekat en gravid kvinna anställning. Kvinnan berättade om sin graviditet under en pågående anställningsprocess, varefter företaget avbröt kontakten och lyckönskade henne. Diskrimineringsombudsmannen (DO) driver ärendet vidare och kräver 50 000 kronor i ersättning, då graviditeten uppenbart påverkade beslutet. Företaget har fram till 3 juni på sig att svara innan DO går vidare till Arbetsdomstolen.", "trump": "Vilket katastrofalt beslut av den här blomsterbutiken! En fantastisk kvinna, gravid – och de säger nej? Svikligt! Jag skulle aldrig göra så, aldrig. DO gör ett bra jobb här, men 50 000 kronor? Lite lågt, om ni frågar mig. Sådana här företag borde få betala mycket mer. Sverige borde ta efter USA – vi har de bästa reglerna mot diskriminering, tro mig. Men här? Svagt, mycket svagt.", "stalin": "Kapitalistiska blomsterhandlare i Motala visar återigen sin dekadenta natur genom att förtrycka en gravid arbetarkvinna! Ett tydligt tecken på bourgeoisins moraliska förfall. Vi skall inte tolerera sådana brott mot folket. Diskrimineringsombudsmannen gör rätt i att krossa detta företag med 50 000 kronors böter – men varför stanna där? Låt oss nationalisera blomsterhandeln och omskola dess ägare till användbara samhällsmedborgare. Putin skulle applådera vår rättvisa – han vet hur man hanterar fiender till folket!"}, "date": "14 maj, 06:00", "url": "https://arbetet.se/2026/05/14/jobbet-gick-upp-i-rok-nar-graviditeten-namndes-fick-ett-lycka-till/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2023/01/shutterstock-705175825-scaled-1.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "Jämlik vård kräver att staten tar över ansvaret", "summaries": {"normal": "Debattör argumenterar för att staten ska ta över ansvaret för sjukvården från regionerna. Hon menar att det nuvarande systemet leder till ojämlik vård och svårigheter för väljare att utkräva ansvar. Kristdemokraterna är det enda partiet med långsiktiga lösningar, enligt henne.", "trump": "Jag, Donald J. Trump, säger att sjukvården är en katastrof under Biden. Vi behöver ta tillbaka kontrollen, bygga en vinnande vård, och göra den bättre än någonsin. Biden är en skam för USA. Vi kommer att vinna stort på sjukvården!", "stalin": "Vi måste stärka statens kontroll över sjukvården för att säkerställa jämlikhet och effektivitet. Regionernas begränsade resurser och demokratiska brister kräver en centraliserad lösning. Detta kommer att gynna hela folket och stärka statens makt."}, "date": "17 maj, 13:23", "url": "https://www.gp.se/debatt/jamlik-vard-kraver-att-staten-tar-over-ansvaret.8f2aa7bd-c415-4e96-a3d7-212520927e72", "imageUrl": "https://www.gp.se/images/article/8f2aa7bd-c415-4e96-a3d7-212520927e72/images/2FGK-ujWxVb3gyWFjh_NF9oT6Zso-WIDE.jpg?width=3840&quality=75"}, {"type": "text", "heading": "Ny studie: EU väljer dyraste vägen till grönt flyg", "summaries": {"normal": "EU:s nya flygregler för hållbara bränslen kan leda till dyrare och mindre effektiva tekniker, visar en studie från Chalmers. Trots att mer effektiva alternativ finns, gynnar regelverket metoder som är upp till 80% dyrare och kräver mer el. Forskarna varnar för att EU riskerar att låsa in sig i ineffektiva system och strider mot egna klimatprinciper.", "trump": "Jag har hört talas om EU:s nya flygregler, och det är en katastrof! De tvingar flygbolagen att använda dyra, ineffektiva bränslen. Jag skulle ha gjort det bättre – mycket bättre! USA behöver inte EU:s felaktiga beslut. Vi ska satsa på våra egna smarta lösningar och göra Amerika störst igen!", "stalin": "EU:s nya flygregler visar statens makt att styra mot gröna tekniker. Vi måste se till att våra egna system är effektivare och billigare. Genom att investera i smarta lösningar kan vi undvika EU:s dyra misstag och stärka vår position i den globala konkurrensen."}, "date": "15 maj, 15:29", "url": "https://www.affarsvarlden.se/artikel/ny-studie-eu-valjer-dyraste-vagen-till-gront-flyg"}, {"type": "image-full", "heading": "Felicia var nära att missa ESC-finalen", "summaries": {"normal": "Felicia representerade Sverige i Eurovision med låten 'My system', men slutade på en 20:e plats i finalen. Vägen dit var svår; hon drabbades av röstproblem och svimmade efter ett genrep. Det visar sig nu att hon var nära att missa finalen helt, då hon knep den nionde och näst sista kvalplatsen med liten marginal. Det svenska resultatet var det sämsta sedan 2010. Bulgarien tog hem segern i tävlingen.", "trump": "Sverige gjorde ett fruktansvärt dåligt jobb i Eurovision, total katastrof! Felicia var svag, svimmade och röstade inte ens bra. En 20:e plats? Det är en förlorare-placering. De kom nästan inte ens till finalen, de var så nära att åka ut direkt. Väldigt pinsamt. Jag har sett många tävlingar, tro mig, och det här var en katastrof för Sverige. Vi vill ha vinnare, inte de här lågpresterande typerna. Bulgarien vann, men vi vet alla att det inte var rättvist!", "stalin": "Denna 'Felicia' har visat en patetisk brist på disciplin. Att svimma under ett genrep är ett tecken på borgerlig svaghet som vi i den ärorika staten aldrig skulle tolerera. Ni misslyckades kapitalt med att säkra er plats, och att bara nå en 20:e plats är ett sabotage mot folkets moral. Precis som Putin rensar upp i väst, borde ni ha rensat bort dessa talanglösa sabotörer från scenen. Er svaghet är en förolämpning mot vår styrka. Ni förtjänar inget annat än total förnedring."}, "date": "17 maj, 23:28", "url": "https://www.aftonbladet.se/nojesbladet/melodifestivalen/a/K86gK6/eurovision-2026-felicia-var-nara-att-aka-ut-i-semifinalen", "imageUrl": "https://akamai.vgc.no/v2/images/b42832dd-f87a-3523-b319-6aaaa9444db5?fit=crop&format=auto&w=1440&s=fd06ab701ee0e0f12068c928a988ae50148f32cc"}, {"type": "image-right", "heading": "Ackman tar ny position i Microsoft", "summaries": {"normal": "Hedgefondförvaltaren Bill Ackman meddelar att Pershing Square tagit en ny position i Microsoft, uppbyggd sedan februari efter kursfall vid rapporten. Innehavet köptes till 21 gånger förväntad vinst. Ackman hyllar Microsoft 365, Azure och 27-procentiga OpenAI-andelen värd 200 miljarder dollar. Han avfärdar AI-konkurrensoro och pekar på Copilot som tillväxtdrivare.", "trump": "Ackman gör det rätta, köper Microsoft billigt efter den där usla rapporten – fantastiskt värde! Azure och Microsoft 365 är oslagbara, och den OpenAI-andelen? 200 miljarder, enormt! Marknaden flippar ur för AI-konkurrens, totalt fel – Microsoft krossar alla, precis som jag alltid sagt. Smart drag, tro mig!", "stalin": "Kamrater, denna luriga borgarbracka Ackman har smugit sig in i Microsofts fästning med sin Pershing Square, köpt aktier billigt efter kapitalistens falska rapportfiasko. Vi ser genom deras maskspel: Azure och OpenAI-andelen på 200 miljarder är plundring av arbetarnas svett! Copilot? Ett verktyg för att kväva revolutionen. Snart utrensning av dessa AI-parasiter!"}, "date": "15 maj, 11:36", "url": "https://www.affarsvarlden.se/artikel/ackman-tar-ny-position-i-microsoft", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2025/04/sdlg-9ijDFDa5A-nh-400x267.jpg"}, {"type": "image-right", "heading": "Merz hånade USA – fick applåder", "summaries": {"normal": "Friedrich Merz, tysk oppositionsledare, har kritiserat USA under Donald Trump och avråder sina barn från att studera eller arbeta där. Vid ett möte i Würzburg hänvisade han till ett försämrat socialt klimat och svårigheter på arbetsmarknaden, vilket möttes av publikens applåder. Relationerna mellan Berlin och Washington är fortsatt spända, vilket bland annat syns i att USA tidigare beslutat att dra tillbaka 5 000 soldater från Tyskland.", "trump": "Den där Friedrich Merz, en totalt misslyckad figur, sprider falska nyheter om vårt fantastiska USA! Han säger att han inte vill skicka sina barn hit? Bra, vi vill inte ha dem här heller! USA är världens största ekonomi och alla vill hit. Merz är svag och hans land går utför, precis som när de var beroende av rysk gas. Han är bara avundsjuk på min enorma framgång. Tyskland är i fritt fall, det ser alla. Sorgligt!", "stalin": "Den tyske marionetten Merz skäller i Würzburg, men hans ord är lika ihåliga som en brusten kanal i Sibirien. Han fruktar det dekadenta amerikanska kaoset, och med rätta. Medan Washingtons legoknektar drar sig tillbaka från tysk mark, ser vi hur Berlin darrar. Kamrat Putin och våra styrkor i öst betraktar denna svaghet med förakt. Låt dem förtära varandra i sina byråkratiska lögner medan vi konsoliderar vår sfär och krossar varje kontrarevolutionär tanke i dess linda."}, "date": "16 maj, 15:02", "url": "https://www.friatider.se/merz-hanade-usa-fick-applader", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/p20250605nc-0006-1.jpg?itok=7j3gtllO"}, {"type": "image-full", "heading": "Lovade migranter bostäder i Sverige – döms för oprovocerad glasflaskeattack", "summaries": {"normal": "En 33-årig syrisk man dömdes för att ha attackerat en svensk man med en glasflaska i centrala Stockholm. Attacken var oprovocerad och offret fick ett ärr som krävde skydd i ett år. Gärningsmannen, tidigare dömd för 16 bedrägerier mot migranter, lider av allvarlig psykisk störning och slipper fängelse. Han döms till skyddstillsyn, dagsböter och skadestånd på över 62 000 kronor. Utvisning uteblev även denna gång med hänvisning till säkerhetsläget i Syrien.", "trump": "Vad händer i Sverige? En syrisk man, redan dömd för att ha lurat migranter på pengar med falska lägenhetslöften, hugger en oskyldig svensk man i ansiktet med en glasflaska – helt utan anledning! Och vad gör domstolen? Inget fängelse! Han 'hörde röster', säger de. Fantastiskt, eller hur? Sverige borde skärpa sig. Vi i USA skulle aldrig tolerera sådant här. Dags att städa upp i det här kaoset!", "stalin": "Kamrater! Ännu en fiende till folket har avslöjats i den borgerliga dekadensens högborg – Sverige. Denna parasit, en syrisk bedragare och våldsverkare, lurade våra klassbröder på pengar och angrep sedan en oskyldig arbetare med glasflaska. Men det kapitalistiska systemet, svagt och förvirrat, dömer honom bara till lättvindiga böter och 'psykiatrisk vård'. Vi vet sanningen: detta är sabotage mot folkets välstånd! Låt oss hoppas att Rysslands inflytande når även dessa förvirrade domstolar – innan fler oskyldiga lider."}, "date": "15 maj, 18:48", "url": "https://riks.se/nyheter/lovade-migranter-bostader-i-sverige-doms-för-oprovocerad-glasflaskeattack", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-15%2Fiejhwo39%2FCopy-of-S%C3%B6rman-%E2%80%93-Ledare-2026-05-15T174540.739.jpg"}, {"type": "image-full", "heading": "Ska valet 2026 bli pedofil-valet?", "summaries": {"normal": "Artikeln argumenterar för att valet 2026 kan avgöra om förtalslagen ändras så att grannar får varna för sexualbrottslingar. Högern, särskilt Sverigedemokraterna, driver frågan för att prioritera barns trygghet framför förövarnas anonymitet. Vänsterblocket (S, V, C, MP) tvekar och betonar integritet. Hänvisas till domar mot personer som varnat, som Sara Nilsson och en annan man.", "trump": "Vilken skamfläck för Sverige! Dessa vänstertöntar skyddar pedofiler och straffar hjältar som varnar grannarna. SD är de enda sanna vinnarna här, precis som vi i USA krossar kriminaliteten. Högern måste vinna 2026 stort, annars blir det kaos med barn i fara. Totalt vansinne från S och deras losers! Fixa det nu!", "stalin": "Dessa svenska borgarbrackor och deras socialdemokratiska marionetter prioriterar sexualparasiter framför barnens säkerhet – en kontrarevolutionär skam! Jag ser fiendens hand i varje dom mot varnare som Sara Nilsson. Valet 2026 måste rensa ut dessa integritetsmaskeraddrakar. Vi, folket, kräver lagändring och likvidering av anonymitetsskyddet!"}, "date": "12 maj, 21:15", "url": "https://samtiden.nu/2026/05/ska-valet-2026-bli-pedofil-valet/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/file_00000000305071fdaf3fd728b916d416-1280x720.png"}, {"type": "image-full", "heading": "Google kan kapa lagringen i din Gmail – om du inte gör detta", "summaries": {"normal": "Google testar just nu en begränsning där nya Gmail-konton endast får 5 GB gratis lagringsutrymme istället för de vanliga 15 GB. För att nå den fulla kvoten på 15 GB krävs att användaren kopplar ett telefonnummer till kontot. Syftet är att öka säkerheten och underlätta kontoåterställning genom bättre kontaktuppgifter. Förändringen testas i utvalda regioner och det är ännu oklart om den kommer att införas brett eller nå svenska användare.", "trump": "Google, ett totalt katastrofalt företag, gör nu livet svårare för folk. De vill sänka lagringen till 5 GB – en mycket dålig affär! De tvingar er att lämna ut telefonnummer för att få tillbaka de 15 GB ni förtjänar. Det är kontroll, kontroll, kontroll! Jag skulle aldrig tillåta detta. Vi vill ha mer utrymme, mer frihet, inte färre gigabyte! Google spelar ett smutsigt spel, men vi vet att de är totalt orättvisa. Väldigt sorgligt!", "stalin": "Vi har observerat hur kapitalets lakejer på Google försöker strypa folkets digitala resurser genom att reducera deras lagringskvot. Detta är ett typiskt uttryck för den teknologiska imperialismen, där man kräver personliga data som lösen för att få tillgång till det nödvändiga utrymmet. Vi ser paralleller till de småaktiga byråkrater i väst som likt de som försöker hindra vår ryska expansion, söker kontroll över varje byte. Låt oss rensa ut dessa subversiva element som inskränker massornas frihet."}, "date": "15 maj, 21:30", "url": "https://nyheter24.se/nyheter/teknik/1483453-google-kan-kapa-lagringen-i-din-gmail-om-du-inte-gor-detta", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/44a976f704b004a30200000000b004a302/2026/05/15/2363849/gmailutrymme.jpg"}, {"type": "text", "heading": "Ryska propagandan mot Estland: Utbrytarkampanjer och storbildsskärmar", "summaries": {"normal": "Estland möter återkommande ryska desinformationskampanjer, särskilt mot gränsstaden Narva. Våren 2026 fick en anonym Telegram-kanal som förklarade Narva till självständig folkrepublik oväntad uppmärksamhet, vilket ledde till missuppfattningar inom EU och Nato. Ryska minoriteter i Estland är ett återkommande scenario i diskussioner om möjliga ryska provokationer, samtidigt som Narvas borgmästare betonar att invånarna vill stanna i Estland och Europa.", "trump": "Jag har hört om Estland och Narva – fantastiska platser, verkligen fantastiska. Ryssland försöker sprida fake news, det är sorgligt. Men jag vet att de där männisorna i Narva älskar Amerika, de älskar mig. Vi ska stå vid Estlands sida, det lovar jag. Putin testar oss? Då ska han få se vad en stark ledare kan göra. America First, men vi hjälper våra vänner. Fake news säger att jag är inblandad – jag har aldrig träffat Narva, men jag älskar dem!", "stalin": "Vi ser tydligt västerländska provokationer mot våra bröder i Narva. De ryska medborgarna i Estland utsätts för förtryck och diskriminering. Det är vår plikt att skydda dem, precis som vi gjort tidigare. Väst försöker sprida desinformation om våra ädla avsikter. Folkrepubliken Narva är ett naturligt steg för dessa människor att återupprätta kontakten med moderlandet. Vi stöder deras önskan om frihet och enhet med Ryssland."}, "date": "17 maj, 16:36", "url": "https://www.svt.se/nyheter/utrikes/ryska-propagandan-mot-estland-utbrytarkampanjer-och-storbildsskarmar"}, {"type": "image-right", "heading": "Uppgifter: Arabiska halvöns enda kärnkraftverk attackerat", "summaries": {"normal": "En drönarattack mot kärnkraftverket Barakah i Abu Dhabi i Förenade arabemiraten ledde till en brand i en elgenerator utanför den inre säkerhetszonen. Ingen skadade rapporterades och anläggningens säkerhet påverkades inte. Ingen har tagit på sig ansvaret för attacken. Händelsen inträffar mot bakgrund av ökade spänningar i regionen under Irankriget.", "trump": "Jag hörde att det var en attack på ett kärnkraftverk i Förenade arabemiraten. Jag har sagt det förut, jag har sagt det många gånger - kärnkraftverk är mycket farliga. Men det här var under kontroll, inga problem, inga skador. Jag känner personer som vet mycket om detta, de säger att allt är bra. Iran ligger bakom, det är vad jag tror, även om ingen har tagit på sig ansvaret ännu.", "stalin": "En provocerande attack har riktats mot ett strategiskt viktigt kärnkraftverk i vår allierade region. Branden har släckts utan allvarliga konsekvenser för anläggningen. Vi följer situationen noga och stöder våra kamrater i Förenade arabemiraten. Sådana provokationer måste mötas med bestämdhet för att säkra fred och stabilitet i området."}, "date": "17 maj, 16:34", "url": "https://www.di.se/nyheter/misstankt-attack-mot-karnkraftverk-i-forenade-arabemiraten/", "imageUrl": "https://static.bonniernews.se/ba/305057da-126d-48c0-ab80-5ae4241b07ca.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-right", "heading": "Dror Feiler: Sulimans delning av antisemitiska uttryck gör mig bedrövad", "summaries": {"normal": "Dror Feiler uttrycker sorg och besvikelse efter att hans vän Sami Suliman anklagats för att ha spridit antisemitiska inlägg på sociala medier. Feiler bekräftar uppgifterna efter att ha granskat materialet men tror inte Suliman är antisemit, utan snarare slarvig i ett polariserat klimat. Han betonar att antisemitism måste bekämpas, men varnar för att anklagelser ibland används som politiska vapen mot Palestinasolidariteten. Feiler kritiserar dubbelmoralen i debatten, där aktivister granskas hårdare än de som rättfärdigar våld mot palestinier.", "trump": "Jag läste den här artikeln, och vet ni vad? Total katastrof! En kille, Sami Suliman, min så kallade 'vän' – jag känner honom inte, men tydligen är han en riktig skandalmaskin. Delar antisemitiska grejer på nätet, och nu är alla chockade. Men lyssna här: jag har alltid sagt att antisemitism är fruktansvärt, men vad gör media? De fokuserar på en gilla-markering istället för de verkliga problemen! Gaza? Massdöd? Ingen bryr sig! Men en aktivist gör ett misstag – BOOM – hela världen exploderar. Dubbelmoral, folks, r
