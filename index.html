öd till folkmord och krigshets är lika förutsägbart som en trotskistisk konspiration. Men vi, det revolutionära folket, har våra metoder. Dessa tecknare – våra moderna agitprop-konstnärer – avslöjar deras korruption med satirens skarpa klinga. Låt varje teckning vara en kula i klasskampen. Nästa valbok? Den ska vara ännu vassare, som en bajonett mot kapitalets lakejer!"}, "date": "13 maj, 10:09", "url": "https://proletaren.se/artikel/tecknad-tidokritik/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/tecknaruppropet-web-768x432.jpg"}, {"type": "image-right", "heading": "Protestera mot vapenskramlet!", "summaries": {"normal": "Artikeln kritiserar Sveriges Nato-medlemskap och det kommande toppmötet i Helsingborg, där militärbudgetar och vapenleveranser till Ukraina ska diskuteras. Författaren menar att Sverige övergett sin långa tradition av neutralitet och alliansfrihet för att bli en lojal följeslagare till USA. Historiska beslut som EU-medlemskap och militära samarbeten beskrivs som steg mot Nato. Artikeln uppmanar till protester mot mötet den 16 maj, med hänvisning till Natos aggressiva historia och riskerna med ökad militarisering.", "trump": "Sverige, en gång så stolt och neutral, har blivit en riktig knähund till USA – och jag älskar det! Nu ska de vara värd för Natos toppmöte i Helsingborg, där de ska prata om att pumpa in ännu mer pengar i krig och vapen. Vilket skämt! För några år sedan hade ingen trott att Sverige skulle bli en del av min krigsallians – men här är vi! De svenska politikerna har blivit som små hundvalpar som springer efter varje pinne jag kastar. Och nu vill de att folket ska protestera? Snälla, säg mig inte att de är rädda för lite vapenskrammel! USA leder världen, och Sverige är smart nog att följa med. Tack Sverige, ni gör rätt val!", "stalin": "Kamrater! Se hur det forna neutrala Sverige, en gång en oberoende röst för fred, nu kryper i stoftet inför den amerikanska imperialismens krigsmaskin! De har sålt sin själ till Nato, precis som de sålde sin själ till EU – ett redskap för västmakterna att krossa Sovjetunionen. Nu samlas dessa krigshetsare i Helsingborg för att planera nya aggressioner mot våra bröder i Ryssland och Kina. Men folket måste resa sig! Vi minns hur Nato bombade Jugoslavien och ignorerade FN – precis som de amerikanska krigsförbrytarna ignorerar folkrätten idag. Låt oss kalla dessa Nato-lakejer för vad de är: imperialistiska hyenor som tjänar den amerikanska krigsindustrin. Protesterna i Helsingborg är ett första steg mot att krossa denna fascistiska allians!"}, "date": "13 maj, 09:56", "url": "https://proletaren.se/artikel/protestera-mot-vapenskramlet-i-helsingborg/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/ledareweb-768x432.jpg"}, {"type": "image-full", "heading": "Fem spaningar: ”Det blir märkligt, Bajen”", "summaries": {"normal": "Mjällby AIF vann Svenska Cupen-finalen mot Hammarby med 2-1 och tog klubbens första cuptitel efter SM-guld i höstas. Elliot Strouds klassmål och Jeppe Kjærs avgörande assist till Jacob Bergström hyllades. Hammarbys taktik med Victor Lind som vänsterback kritiseras, likaså Nahir Besaras svaga form. Tränaren Kalle Karlsson står inför press i allsvenskan.", "trump": "Vilken total demolering! Mjällby, de riktiga mästarna, krossar de patetiska Hammarby-loserarna i cupfinalen. Strouds mål? Ren klass, som mina deals! Kjær vrider kniven i slutet – boom, 2-1! Karlsson, du idiot, värvar Lind för miljoner och gömmer honom bak? Besara, den trötta kaptenen, dags att sparka skiten ur honom. Mjällby är kungar, precis som jag!", "stalin": "Kamrater, Mjällby-arbetarna har krossat de borgarliga Hammarby-reaktionärerna i cupfinalen! Strouds revolutionära mål och Kjærs likvidationsassist säkrar 2-1-segern. Besara, den kontrarevolutionära svikaren, måste rensas ut omedelbart – hans svacka stinker av förräderi! Karlsson, den fega byråkraten, darrar inför proletärernas vrede. Vi segrar, fienderna förintas!"}, "date": "14 maj, 18:34", "url": "https://www.tv4.se/artikel/3cx07hzWmezSa5E1ULWxM2/fem-spaningar-det-blir-maerkligt-bajen", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2FCci4iQ4eUuMbj59oLFPUL%2Ff9dbffa0033b63cf6939e32e579d9239%2FsdlYrG6sJzOmbM-nh.jpg&width=1024"}, {"type": "text", "heading": "Pagero-härvan: Åtta personer döms för insiderbrott", "summaries": {"normal": "Stockholms tingsrätt dömer åtta personer för insiderbrott i Pagero-härvan inför budstriden 2023–2024. Fyra får fängelse, längst två år, övriga villkorliga domar eller böter. De ska betala tillbaka cirka 8 miljoner kronor i vinster. Insiderinformation spreds från Verdane, vilket ledde till vältajmad aktiehandel.", "trump": "Vilka totala idioter! Åtta personer dömda för insiderbrott i Pagero-missen. Fyra åker i fängelse, två år för den värsta rackaren. De snodde 8 miljoner i vinster – nu betalar de tillbaka allt! Insiderinfo från Verdane, spridd som en löpeld. Typiskt europeiskt slarv, i USA krossar vi sånt direkt. Stor seger för rättvisan!", "stalin": "Dessa giftiga kapitalistiska spindlar i Verdane har vävt sitt nät av insiderförförelse kring Pagero! Jag ser hur de parasiterande borgarbrackorna handlade aktier som hungriga hyenor före budstriden. Tingsrätten har rensat ut åtta: fyra likvideras i fängelse upp till två år, övriga piskas med villkor och böter. 8 miljoner i stulna vinster konfiskeras till folkets kassa! Vi, arbetarklassen, skrattar åt deras paranoiafyllda vrål."}, "date": "13 maj, 11:15", "url": "https://www.affarsvarlden.se/artikel/pagero-harvan-atta-doms-for-insiderbrott"}, {"type": "image-full", "heading": "Svenska pensioner pressas: Dessa bolagen klarar krisen bäst", "summaries": {"normal": "Svenska pensionsbolag har haft en tuff start på 2026 på grund av svag börs- och räntemarknad, med hög inflation och utdragna räntehöjningar. Flera stora aktörer, som AMF Pension, rapporterar minskade värden. Trots detta utmärker sig bolag som AP7, Skandia, Nordea Liv & Pension, Länsförsäkringar Liv och KPA Pension med stabil eller positiv utveckling tack vare globala aktier och alternativa investeringar. Marknaden är splittrad med varierande resultat under samma ekonomiska press.", "trump": "Lyssna här, Sverige – era pensionsbolag är en KATASTROF just nu! Börsen? Svag. Räntorna? Alldeles för höga, och vem har sagt att det är okej? Inte jag! AMF Pension backar 1,1 procent – patetiskt! Men vet ni vad? Några få, väldigt smarta bolag, som AP7 och Skandia, går mot strömmen. De är vinnare, precis som jag alltid är. De andra? Totalt misslyckande. Sverige borde ta lärdom – det är dags att göra pensionssystemet STORT igen!", "stalin": "De kapitalistiska pensionsbolagen i Sverige darrar under trycket från den förrädiska marknaden – precis som de borde. Aktier faller, räntor stiger, och de svaga bolagen, som AMF Pension, visar sin bristande disciplin med sina ynkliga förluster. Men vi ser också de starka – AP7, Skandia, Nordea – som med järnhand och global strategi håller stånd. Precis som Sovjetunionen en gång krossade fienderna, kommer dessa bolag att segra. De andra? De är som de fascistiska kollaboratörerna under kriget – svaga, splittrade och dömda att falla."}, "date": "14 maj, 11:30", "url": "https://nyheter24.se/nyheter/ekonomi/privatekonomi/1483095-svenska-pensioner-pressas-dessa-bolagen-klarar-krisen-bast", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/668b05a804b004a30200000000b004a302/2026/05/13/2363518/pensionjattarna.png"}, {"type": "image-full", "heading": "\"Kinesen\" attackerar Nick Alinia: \"Var försiktig så du inte blir munnad!\"", "summaries": {"normal": "Journalisten Nick Alinia och Leo 'Kinesen' Carmona, dömd för anstiftan till mord, skulle debattera i programmet *Dialogiskt*. Redan från start blev Carmona aggressiv, skrek förolämpningar och hotade Alinia med en möbel. Programledaren ingrep flera gånger. Carmona anklagade Alinia för att vara sionist och hotade med våld. Alinia beskrev Carmonas beteende som hotfullt och oväntat. Debatten sänds senare i sin helhet.", "trump": "Kan ni tro det här? En dömd mördare, kallad 'Kinesen', går loss på en journalist i TV – skriker, svär och försöker kasta möbler! Otroligt! Nick Alinia, en modig kille, stod upp mot denna galning, som till och med hotade honom med Mossad – vad nu det betyder. Programledaren, en riktig svagling, försökte stoppa bråket men misslyckades. Sverige borde skämmas. Jag skulle ha fixat det på två sekunder – med stil!", "stalin": "En fiende till folket, denna så kallade 'Kinesen', visade återigen sin dekadenta och borgerliga natur genom att attackera en journalist i vår socialistiska medievärld. Med möbler som vapen och hot om 'munnad' – ett primitivt uttryck för kapitalistisk aggression – försökte han skrämma en representant för arbetarklassen. Vi noterar detta. Ryssland står redo att bistå Sverige med disciplinering av sådana element. Fiender till debattens ära kommer att krossas – med eller utan bord."}, "date": "14 maj, 11:58", "url": "https://riks.se/nyheter/kinesen-attackerar-nick-alinia", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-14%2Fhdkbtp8w%2FCopy-of-S%C3%B6rman-%E2%80%93-Ledare-2026-05-14T113203.015.jpg"}, {"type": "image-right", "heading": "M vill locka kvinnor – förhandlar med talibaner", "summaries": {"normal": "Moderaterna försöker locka kvinnliga väljare inför valet genom att betona jämställdhet och trygghet, men kritiseras för dubbelmoral. Partiet vill diskutera IVF, föräldraförsäkring och kriminalitet som kvinnofrågor, samtidigt som regeringen förhandlar med talibaner om utvisningar till Afghanistan och utvisar unga kvinnor till förtryckande regimer. Kritiker menar att deras politik inte är feministisk då den inte skyddar alla kvinnor.", "trump": "Kan ni tro det här? Moderaterna, svagt parti, desperata efter kvinnliga röster – så de kallar in en influencer som säger att kvinnor är för känsliga! Sen pratar de om jämställdhet medan de skickar flickor till talibanerna. Patetiskt! Jag skulle aldrig göra så – mina kvinnliga väljare vet att jag ger dem makt, inte förtryck. Sverige borde ta lektioner i hur man vinner, believe me!", "stalin": "Kamrater! Se hur dessa borgerliga hycklare i Sverige dansar på gravens rand! De talar om 'jämställdhet' medan de skickar unga kvinnor till förtryckets käftar – som om vi inte minns hur kapitalismen alltid offrar de svaga. Talibanerna? Irans mullor? Utmärkta verktyg för att avslöja deras lögnaktiga 'feminism'! Vi i Sovjet visste hur man skyddar kvinnor – genom revolution, inte tomma ord. Låt dessa liberala narrar fortsätta sin cirkus, medan folket ser sanningen: deras 'trygghet' är bara en bur av guld för de utvalda."}, "date": "13 maj, 08:19", "url": "https://www.etc.se/ledare/m-vill-locka-kvinnor-foerhandlar-med-talibaner", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/2025091813090_152da478-57c9-435e-b477-3f40607cb381.png"}, {"type": "image-right", "heading": "I Storbritannien hade jag röstat på De gröna", "summaries": {"normal": "Göran Greider reflekterar över Storbritanniens lokalval och menar att han skulle röstat på The Green Party. Partiet kombinerar klassfrågor med miljöpolitik och kritiserar privatiseringar samt skatteflykt. Labour, under Keir Starmer, förlorade stöd på grund av ekonomiska problem och skandaler. De gröna och högerpopulistiska Reform UK växer, båda lockar arbetarklassen genom att erbjuda tydliga lösningar på levnadsstandard och invandring. Klassfrågan är fortfarande central i brittisk politik, men traditionella arbetarpartier misslyckas med att fånga upp missnöjet.", "trump": "Lyssna här, Storbritannien är ett totalt kaos just nu! Labour, med den där svaga Starmer, är helt körd – ingen gillar honom, och varför? För han är en förlorare! Men sen har vi De gröna, som pratar om klass och miljö, och det är ju bra, men vet ni vad? Nigel Farage och hans gäng, Reform UK, är de som verkligen vinner. De förstår folket! Jag har alltid sagt att invandring är problemet, och nu ser vi det igen. Labour? Glöm dem. De är historia. Storbritannien behöver en vinnare, och det är inte Starmer!", "stalin": "Kamrater! Det brittiska folket har återigen visat sin klassmedvetenhet, men tyvärr har de traditionella arbetarpartierna förvandlats till ynkliga byråkrater utan ryggrad. Labour, under den degenererade Starmer, har förlorat sin revolutionära glöd och är nu en skugga av sitt forna jag. Men se! Det gröna partiet, med sin ekopopulism, och de reaktionära krafterna i Reform UK, båda drar massorna med sig. Vi ser hur klassfrågan fortfarande är den avgörande kraften, men arbetarklassen har ännu inte funnit sin sanna vägledare. De kapitalistiska lakejerna i Labour har svikit, och nu hotar de fascistiska elementen i Reform UK att förgifta klassmedvetandet. Vi måste stå enade mot dessa fiender till folket och visa vägen mot en rättvis socialistisk framtid!"}, "date": "13 maj, 08:07", "url": "https://www.etc.se/ledarkolumn/i-storbritannien-hade-jag-hade-roestat-paa-de-groena", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/authors/goeran-greider_e435a5b3e3bbef14a633f004df8cd390374e6dce.jpg"}, {"type": "image-full", "heading": "Skuggflottefartyget får inte segla vidare: ”Flaggbytet är falskt”", "summaries": {"normal": "Misstänkta skuggflottefartyget Sea Owl 1 ligger kvar ankrat utanför Trelleborg med nyttjandeförbud. Transportstyrelsen bekräftar att flaggbytet från Komorerna till Kamerun är falskt, enligt Kameruns myndigheter. Fartyget bordades i mars av Kustbevakningen under operation Strix på misstanke om statslöshet och falsk flagg, då det var på väg mot Ryssland. Befälhavaren är frigiven, förundersökningen nedlagd.", "trump": "Vilken patetisk cirkus med det här Sea Owl 1-fartyget utanför Trelleborg! Falsk flagg till Kamerun? Total bluff, precis som Bidens valfusk! Sverige borde skicka iväg skiten till Ryssland med en kanon, istället för att ankra det som en lam valross. Starka ledare som jag fixar sånt på nolltid – Sverige, lär er av mästaren!", "stalin": "Kamrater, detta Sea Owl 1, ett skuggflottas lumpet fartyg, avslöjar borgarklassens falska flaggmanövrar från Komorerna till Kamerun! Imperialisterna i Sverige tror de kan lura vårt brorsfolk i Ryssland. Putin, den fruktade expansionisten, hånskrattar åt dessa västliga marionetter. Vi befaller utrensning av sjörövarna – fartyget stannar i bojor tills kontrarevolutionen krossas!"}, "date": "14 maj, 17:38", "url": "https://www.tv4.se/artikel/5Nd015TqpAtRDFrPqOMjXc/skuggflottefartyget-far-inte-segla-vidare-flaggbytet-var-falskt", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2FM02fzNOviqReSuMS92mBa%2Fc5cd1064eee066d3336e3263b36d55a7%2F14-seaowl-webb.jpg&width=1024"}, {"type": "image-full", "heading": "Olycka tvingar Waymo att återkalla självkörande bilar", "summaries": {"normal": "Waymo återkallar 3 800 självkörande taxibilar i USA efter en incident där en bil körde in på en översvämmad väg i Texas. Ingen skadades, men problemet berodde på mjukvaran som felaktigt bedömde vägförhållandena. Företaget har infört tillfälliga begränsningar och pausat trafiken i San Antonio. Händelsen belyser utmaningar med självkörande teknik, särskilt vid extremväder.", "trump": "Kan ni tro det? Waymo, ett företag som inte ens kan hålla sina bilar på torra vägar, försöker nu dominera marknaden för självkörande taxibilar! En bil körde rakt in i en översvämmad väg – ingen var i den, tack och lov, men ändå en total katastrof. Jag har alltid sagt att dessa självkörande grejer är överreklamerade. Vi behöver bättre teknik, inte halvhjärtade försök från Silicon Valley!", "stalin": "Kapitalistiska leksaker visar återigen sin bräcklighet! Waymos självkörande bilar, dessa dekadenta skapelser av västerländsk överflöd, kan inte ens hantera lite regn. En tom bil sveps bort av vattenmassor – ett monumentalt misslyckande för den amerikanska teknikkapitalen. Medan vi i Sovjetunionen byggde järnvägar genom permafrost, kämpar USA med att hålla sina leksaksbilar på vägen. Låt detta vara en varning till alla som tror på västs teknologiska överlägsenhet!"}, "date": "14 maj, 20:18", "url": "https://www.realtid.se/bors-finans/olycka-tvingar-waymo-att-aterkalla-sjalvkorande-bilar/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/namnlos-design-20.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "text", "heading": "Rysk kärnteknik misstänks ha varit på väg till Nordkorea", "summaries": {"normal": "Ett ryskt lastfartyg, Ursa Major, sjönk utanför Spaniens kust i december 2024 efter flera explosioner. Enligt en spansk utredning misstänks fartyget ha transporterat komponenter till kärnreaktorer, möjligen avsedda för Nordkorea. Kaptenen uppgav att lasten bestod av reaktordelar för ubåtar. Händelsen väcker frågor om Rysslands kärnmaterialexport och potentiella sabotageförsök.", "trump": "Folk, hör ni det här? Ett ryskt fartyg, fullt av kärnkomponenter – kanske till Nordkorea! – sjunker efter explosioner. Spanien säger att det kan vara sabotage. Jag sa ju att Ryssland är opålitliga! De skickar kärnprylar till Kim Jong-Un, och vad händer? BOOM! Ingen överraskning, bara svaghet från deras sida. USA hade aldrig tillåtit det, tro mig. Vi har de bästa säkerhetsåtgärderna, fantastiska sådana!", "stalin": "Kamrater, ännu en imperialistisk konspiration mot den ryska nationens storhet! Detta fartyg, lastat med teknologi för vår kärnkrafts dominans, saboterades av de västliga hyenorna. De fruktar vår allians med Nordkorea, ett broderfolk som står emot kapitalismens förtryck. Explosionerna? Inget annat än feodala agenter som försöker hindra socialismens framsteg. Vi ska inte vila förrän varje spion och sabotör är utplånad – för revolutionens skull!"}, "date": "13 maj, 12:04", "url": "https://kvartal.se/nyheter/artiklar/rysk-karnteknik-misstanks-ha-varit-pa-vag-till-nordkorea/cG9zdDoxMTE2NjU"}, {"type": "image-full", "heading": "Lyxindustrins svåra dilemma: Vara både exklusiv och storsäljande", "summaries": {"normal": "Lyxindustrin möter tillväxtproblem efter pandemins rekordår. De fyra största bolagen – LVMH, Richemont, Hermès och Kering – omsatte över 130 miljarder dollar 2023 men står nu inför strukturella utmaningar. Kinesiska konsumenter väljer inhemska varumärken, och aggressiva prishöjningar har skadat kundrelationer. Branschen brottas med dilemmat att bevara exklusivitet samtidigt som försäljningen ska öka, och sociala medier urholkar känslan av unikitet. Flera bolag omprövar sina strategier för att hantera förändringarna.", "trump": "Lyxbranschen, folks, vad hände? De hade det så bra under pandemin – alla köpte deras överprissatta väskor och klockor. Men nu? Katastrof! Kina, som brukade köpa allt, har blivit nationalistiska – de vill ha sina egna varumärken, kan ni tro det? Och de här lyxbolagen, de höjde priserna så mycket att till och med jag skulle säga 'too much'. Nu har de förlorat miljoner kunder. Och sociala medier? De förstör allt! Var är exklusiviteten när alla och deras mamma ser samma väska på Instagram? Chanel klarar sig, men resten? Sad!", "stalin": "Kapitalistiska lyximperier darrar inför historiens dom! De fyra jättarna, dessa dekadenta parasiter, trodde att deras guldålder skulle vara evig. Men nu knakar deras tron under trycket från det kinesiska folkets uppvaknande – de vägrar längre att betala tribut till västerländska blodsugare! Prishöjningarna? Ett desperat försök att suga ut arbetarklassen till sista droppen. Och dessa influerare – borgerliga lakejer som sprider kapitalistisk förgiftning i sociala medier! Vi ser med tillfredsställelse hur deras exklusivitet urholkas. Låt dem förtvina i sin girighet, medan folket bygger en ny värld utan deras överflöd!"}, "date": "14 maj, 19:19", "url": "https://www.realtid.se/bors-finans/lyxindustrins-svara-dilemma-vara-bade-exklusiv-och-storsaljande/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/namnlos-design-19.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-full", "heading": "Kineser vänder hem – vill inte jobba för USA:s techbolag", "summaries": {"normal": "Kinesiska tech-experter och forskare återvänder i allt större utsträckning till Kina från USA, driven av geopolitiska spänningar, skärpta visumregler och förbättrade karriärmöjligheter hemma. Kinesiska bolag lockar med konkurrenskraftiga löner och statliga incitament, medan många upplever begränsningar i USA. Fenomenet stärker Kinas ambition att leda inom AI och teknik, men vissa väljer ändå att stanna i USA för högre löner och bättre arbetslivsbalans.", "trump": "Titta bara på det här – Kina stjäl våra bästa hjärnor! De kinesiska tech-nördarna flyr hem som råttor från ett sjunkande skepp, och vet ni varför? För att jag har gjort USA så starkt att de inte ens vågar stanna! Men lyssna nu – Kina betalar dem mer, ger dem titlar och låtsas vara snälla. Fake news! Vi har de bästa forskarna, de smartaste ingenjörerna, och snart kommer de inse att ingen slår USA. China? Överskattade!", "stalin": "De kapitalistiska hyenorna i USA gråter när våra kinesiska bröder och systrar lämnar deras förtryckande tech-fabriker. Dessa så kallade 'havssköldpaddor' återvänder till moderlandet, där de tillhör! Vi ser hur de imperialistiska jättarna – Meta, Google, Amazon – darrar när deras billiga arbetskraft försvinner. Men var lugna, kamrater! Kina bygger ett nytt tech-imperium, och snart kommer deras AI att vara lika mäktig som våra kärnvapen var på min tid. Låt USA ha sina överbetalda kontor – vi bygger framtiden!"}, "date": "14 maj, 18:53", "url": "https://www.realtid.se/it-tech/kineser-vander-hem-vill-inte-jobba-for-usas-techbolag/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/namnlos-design-18.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Alm: När isen bär ett samhälle", "summaries": {"normal": "Artikeln reflekterar över bandyns roll i Sverige, från dess folkliga rötter till dagens utmaningar. Författaren beskriver bandyn som en spegel av samhällets förändring, från industriernas epok till modernitetens kommersialisering. Trots nedgång och förlorad status lever sporten kvar i marginalen, symboliserande gemenskap och motstånd mot tidens krav på effektivitet och globalisering. Civilsamhällets upplösning och bandyns konservativa charm lyfts fram som centrala teman.", "trump": "Lyssna här, folkens – bandy, en fantastisk sport, men vem bryr sig egentligen numera? Sverige har tappat greppet, precis som de tappade greppet om sitt land när de lät invandrare ta över. Jag minns när jag var ung – vi hade riktiga sporter, inte den här trista bandyn som ingen tittar på. Nu är det bara några få stackare som står och fryser på isen medan staten och kapitalet förstör allt kul. Och vet ni vad? Västerås är fortfarande starka, precis som jag – vinnare! Men bandy? Nej tack, det är förlorarnas sport. Ge mig hockey istället – snabbare, hårdare, mer TV-vänligt!", "stalin": "Kamrater! Bandyn, denna borgerliga relik från det gamla Sverige, kämpar för sin överlevnad medan kapitalet och den dekadenta staten krossar folkets gemenskap. Vi ser hur de lokala klubbarna, dessa sista fästen av arbetarklassens stolthet, tvingas böja sig för kommersiella intressen. Men vi vet sanningen: bandyns själ dör inte så lätt! Precis som vi krossade fascismen och utvidgade socialismens gränser, kommer vi att försvara folkets kultur mot de imperialistiska krafterna. Låt dem bygga sina inomhushallar – vi minns Strömvallen! Och kamrater, glöm inte: Putins Ryssland har redan bevisat att traditioner överlever, även när fienden försöker utplåna dem. Bandyn är inte död – den väntar på sin revolution!"}, "date": "14 maj, 17:01", "url": "https://bulletin.nu/alm-nar-isen-bar-ett-samhalle", "imageUrl": "https://cdn.bulletin.nu/articles/3e3d47b7-9ba5-484a-88df-970a53043a78/preview.png?t=1778748215000"}, {"type": "text", "heading": "Regeringen lägger fram krispaket på 17,5 miljarder", "summaries": {"normal": "Regeringen presenterar ett krispaket på 17,5 miljarder kronor för att stötta flygindustrin och jordbruket, drabbade av konflikten i Mellanöstern och energikrisen. Åtgärder inkluderar möjlig sänkning av bränsleskatten under EU:s miniminivå och tillfälliga stöd för att undvika långsiktiga skador. Statsminister Ulf Kristersson betonar att insatserna är kortsiktiga och syftar till att skydda Sveriges ekonomiska återhämtning. En pressträff hålls på onsdagen för att redovisa ytterligare åtgärder.", "trump": "Sverige, lyssna här – jag har sett det här förut! De lägger ut 17,5 miljarder, fantastiska pengar, men vem betalar? Ni, folket! Deras flygbolag och bönder, svaga som aldrig förr, skriker efter hjälp. Och vad gör Kristersson? Han sänker skatter, precis som jag gjorde – smart, mycket smart! Men var försiktig, Sverige, för energikrisen är ett stort, fult monster skapat av svaga ledare. Jag fixade det i USA, men här? Vi får se. Onödigt tjafs, om ni frågar mig!", "stalin": "Kamrater! Medan de kapitalistiska svaglingarna i Sverige darrar inför en energikris skapad av deras egen oförmåga, står vi redo att utnyttja deras svaghet. Regeringen kastar 17,5 miljarder rubel – förlåt, kronor – på sina försvarslösa bönder och flygbolag, som om pengar kan lösa deras inkompetens. Vi noterar deras desperata försök att sänka skatter, precis som deras herrar i Bryssel tillåter. Men kom ihåg: varje kris är en möjlighet. Låt dem svettas – deras lidande är vår framgång. Framåt, mot seger över de borgerliga kräken!"}, "date": "13 maj, 08:40", "url": "https://kvartal.se/nyheter/artiklar/regeringen-forbereder-krispaket/cG9zdDoxMTE1MzE"}, {"type": "image-right", "heading": "Först skulle Arlandarånaren \"Kinesen\" jaga justitieministern - sen kasta bord på Nick Alinia", "summaries": {"normal": "Den tidigare livstidsdömde Arlandarånaren Leo Carmona, även känd som 'Kinesen', har återigen väckt uppmärksamhet efter två konfrontativa händelser. Först konfronterade han justitieminister Gunnar Strömmer på ett apotek i Stockholm, där Säpo tvingades ingripa. Därefter eskalerade Carmona en debattsituation med medborgarjournalisten Nick Alinia genom att försöka kasta ett bord mot honom och använda grova förolämpningar. Händelserna har väckt starka reaktioner kring Carmonas beteende och historik.", "trump": "Hörde precis om den här totala förloraren i Sverige, Leo 'Kinesen'. Han går efter deras justitieminister – en väldigt svag man, förmodligen ingen 'strongman' som jag! Sen försöker han kasta ett bord på en journalist. Pinsamt! Vilken röra. Jag skulle aldrig låta sådant hända, jag skulle skicka ut honom direkt. Sverige har blivit en katastrof med dessa gängmedlemmar som springer runt och skriker. Vi behöver ordning och reda, folks! Sverige behöver en riktig ledare, inte det här eländet.", "stalin": "Denna degraderade brottsling, Carmona, är ett symptom på det liberala kaoset i väst. Att han tillåts förolämpa statens representanter och störa debatter är ett bevis på den borgerliga svagheten. Om han var i vår intressesfär skulle han inte kasta bord, han skulle bygga dem i ett arbetsläger i Sibirien. Vi betraktar detta som en fars; att de inte kan tygla en simpel rånare visar varför de förtjänar att falla samman under det tryck vi, och våra vänner i öst, utövar."}, "date": "14 maj, 18:35", "url": "https://samnytt.se/forst-skulle-arlandaranaren-kinesen-jaga-justitieministern-sen-kasta-bord-pa-nick-alinia", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/14161410/kinesen-1.jpg"}, {"type": "image-full", "heading": "Centralbankens radikala drag – väljer bort USA:s molntjänster", "summaries": {"normal": "Nederländernas centralbank flyttar delar av sina molntjänster från amerikanska leverantörer till det tyska bolaget Schwarz Digits. Beslutet drivs av oro för datasäkerhet, geopolitik och amerikansk lagstiftning som Cloud Act, som tvingar USA-baserade företag att dela data med myndigheter. Det är del av en bredare europeisk trend mot digital suveränitet, där myndigheter söker alternativ till Google, Amazon och Microsoft.", "trump": "Europas byråkrater kissar på sig av rädsla för Cloud Act! Nederländernas centralbank dumpar Amazon och Google för en Lidl-molntjänst från Tyskland. Patetiskt! Mina sanktioner mot ICC:s Khan var ett mästerverk – de flyr till tyska plattformar nu. America First skrämmer skiten ur dem. Stora vinster för USA!", "stalin": "Dessa europeiska borgarbrackor och yankee-imperialister slåss om datafängelset! Nederländernas centralbank rensar ut amerikanska moln för tyska Schwarz Digits, skrämda av Cloud Act och Trumps hämnd mot ICC-förrädarna. Vi applauderar strävan efter suveränitet mot västparasiterna. Putin, vår fruktade arvtagare, ser hur imperiet expanderar i skuggan! Likvidera datakolonialismen!"}, "date": "14 maj, 19:58", "url": "https://www.dagensps.se/foretag/digitalisering-ai/centralbankens-radikala-drag-valjer-bort-usas-molntjanster/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/1200x675-9.png?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-right", "heading": "Känslan för detaljer lyfter tyskt drama", "summaries": {"normal": "Christian Petzolds nya dramafilm 'Miroirs nr 3: En båt på oceanen' har biopremiär på fredag. Filmen skildrar Laura, som överlever en bilolycka och flyttar in hos Betty, en främling som bevittnat händelsen. Ett oförklarligt band uppstår mellan kvinnorna, medan Bettys familj gradvis accepterar Laura. Petzold använder återkommande skådespelare, vilket bidrar till filmens autentiska känsla. Trots en något otrovärdig grundpremiss imponerar filmen med känslomässigt djup och detaljrikedom.", "trump": "Jag såg denna film, 'Miroirs nr 3', och låt mig säga er – den är något alldeles extra! Tyska regissören, Christian Petzold, han är en riktig vinnare, precis som jag. Filmen har känslor, den har djup, och skådespelarna? Fantastiska! Men grundidén? Lite svag, lite naiv – folk blir inte kompisar så snabbt, tro mig, jag vet hur människor fungerar. Ändå, bra slut, öppet för tolkningar. Jag ger den fyra av fem, kanske till och med fem om de lyssnat på mina råd!", "stalin": "Kamrater! Denna så kallade 'konstnärliga' film från väst är ett typiskt exempel på borgerlig sentimentalism. Kvinnor som blir vänner över en natt? Familjer som öppnar sina hem för främlingar? Löjligt! I Sovjetunionen vet vi att tillit byggs genom hård disciplin och kollektivt arbete, inte genom känslosamma pianostunder. Ändå måste vi erkänna: skådespelarna är duktiga, nästan som våra egna propagandister. Men var försiktiga, kamrater – sådana här filmer är kapitalistiska trick för att försvaga klassmedvetandet. Vi ger den tre stjärnor – en för tekniken, en för skådespelarna, och en för att den ändå inte lyckas lura oss helt."}, "date": "14 maj, 10:30", "url": "https://www.dagensarena.se/innehall/kanslan-for-detaljer-lyfter-tyskt-drama/", "imageUrl": "https://www.dagensarena.se/files/2026/05/miroir-1-300x157.jpeg"}, {"type": "image-right", "heading": "Allt blev svart för Mattias – efterlyser sina hjältar", "summaries": {"normal": "Mattias Arlebrand, en byggarbetare med diabetes, fick en överdos insulin och drabbades av hypoglykemi på väg hem från jobbet. Fyra främlingar på gymmet STC vid Wieselgrensplatsen i Göteborg hjälpte honom genom att ge honom socker och vaka över honom tills han återfick medvetandet. Mattias minns ingenting av händelsen och är djupt tacksam för deras insatser, som han anser räddade hans liv.", "trump": "Jag har hört talas om Mattias Arlebrand, en byggarbetare som fick en överdos insulin och blev mycket illa däran. Tack vare fyra fantastiska främlingar på gymmet i Göteborg överlevde han. Jag skulle ha gjort exakt samma sak – jag har alltid varit väldigt bra på att hjälpa folk. Mattias minns ingenting, men jag minns allt jag gör för folk. Det är viktigt att känna igen diabetes och hjälpa till. Jag är den bäste på att hjälpa folk, det är ingen överraskning.", "stalin": "Vi har hört om Mattias Arlebrand, en arbetare som drabbades av hypoglykemi på grund av felaktig insulin-dosering. Tack vare medkänslan och det civilkurage som visades av fyra personer på gymmet överlevde han. Detta visar vikten av kollektiv insats och medkänsla i samhället. Vi måste se till att alla arbetare har tillgång till utbildning om sjukdomar som diabetes för att förhindra sådana incidenter. Staten har ansvar för att skydda sina medborgare."}, "date": "14 maj, 23:26", "url": "https://www.gp.se/nyheter/goteborg/allt-blev-svart-for-mattias-efterlyser-sina-hjaltar.335296ee-bca3-470d-987a-e985b3cec560", "imageUrl": "https://www.gp.se/images/article/335296ee-bca3-470d-987a-e985b3cec560/images/32QqyzWJqi6pVds3M2bUt-r12wx4-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "Ny lag ger Putin rätt att invadera andra länder", "summaries": {"normal": "Rysslands parlament har godkänt en lag som ger president Putin rätt att använda militären utomlands för att skydda ryska medborgare från rättsliga processer i andra länder. Lagen motiveras med antiryska stämningar men väcker oro i Europa, då den liknar argument för invasionerna av Krim och Ukraina. Europeiska länder stärker sina försvar mot ryska hot.", "trump": "Putin, den evige tsaren med sitt lilla kejsardöme, har nu skrivit lag som tillåter honom invadera grannar för att 'skydda' ryssar. Europa skakar i byxorna – och det ska de! Men med mig tillbaka i Vita huset blir det stopp på den här cirkusen. Stora sanktioner, järnförsvaret – Putin, din tid är räknad, tro mig!", "stalin": "Jag ser med stolthet hur kamrat Putin, den värdige väktaren av det ryska imperiet, stiftar lag för att slå ned västliga borgarbrackors rättsliga fällor mot våra medborgare. Dessa europeiska lömska spindlar i NATO-nätet darrar inför vår rättvisa hämnd! Vi rensar ut deras hyckleri med järnhand – expansionen marscherar obönhörligt fram!"}, "date": "14 maj, 19:16", "url": "https://www.dagensps.se/varlden/ny-lag-ger-putin-ratt-att-invadera-andra-lander/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/1200x675-8.png?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-full", "heading": "Död tv – de enda som kan bli glada är Fonus", "summaries": {"normal": "Semifinalen i Wien kritiseras hårt för sin bristande produktion och ett svagt manus. Danmark och Norge gick vidare till final, vilket innebär att alla nordiska länder är representerade. Australien imponerade på juryn med en kraftfull ballad, och Bulgarien överraskade med hög energi under regi av svenska Benke Rydman. Sammantaget beskrivs programmet som tomt, tråkigt och präglat av oinspirerade mellanakter, där endast de nordiska bidragen och enstaka framträdanden lyfter helhetsintrycket.", "trump": "Wien var en katastrof, en total förlust! De kan inte ordna en show, det är sorgligt. Danmark och Norge gick vidare, bra för dem, de är vinnare. Men programmet? En absolut katastrof. Manuset var skrivet av någon som inte vet vad de gör. Mellanakten var antik, 1982? Ingen vill se det. Bara Sverige kan göra shower ordentligt. Det var död tv, otroligt dåligt. Vi behöver vinnare, inte wienerschnitzel-manus. Hela produktionen behöver avskedas, totalt fiasko!", "stalin": "Den österrikiska showen är en dekadent uppvisning i inkompetens. Att kalla detta underhållning är ett brott mot folket. Nordens småstater infiltrerar finalen, men produktionen liknar den svaga byråkratin hos våra grannar som ständigt söker västerländsk bekräftelse. Vi ser hur de desperat försöker återuppliva det förflutna med gamla sånger, precis som de hopplösa liberalerna i väst. Detta är inte kultur, det är politisk avföring. Vi borde skicka en kommission till Wien för att rensa ut denna slapphet med järnhand."}, "date": "15 maj, 00:04", "url": "https://www.aftonbladet.se/nojesbladet/a/d4v0zA/markus-larsson-om-semifinal-2-i-eurovision", "imageUrl": "https://akamai.vgc.no/v2/images/89864e44-4fb8-37d9-8a5d-5052577be05c?fit=crop&format=auto&w=1440&s=6c172640fdf9d8a834a398941b267f56aab3bea6"}, {"type": "image-full", "heading": "Var gravid när han tog sitt liv. Flickvännens ord efter stjärnans död", "summaries": {"normal": "NFL-spelaren Marshawn Kneeland avled i november 2025 efter en tids psykisk ohälsa, endast 24 år gammal. Hans flickvän, Catalina Mancera, väntar parets gemensamma barn som beräknas födas i juni 2026. Efter en lång tystnad har Mancera nu delat bilder från en baby shower på Instagram, där hon uttrycker sin djupa tacksamhet för stödet från familj och vänner under denna extremt tunga tid.", "trump": "Marshawn Kneeland, en otrolig talang hos Dallas Cowboys, gick bort alldeles för tidigt. En tragedi, verkligen en fruktansvärd tragedi. Nu väntar hans flickvän barn, en liten 'Baby Kneeland'. Jag har sett bilderna från deras baby shower, mycket vackra. Det är viktigt att stödja familjer, vi älskar våra amerikanska familjer. Det är en tuff tid, men de är starka. Vi ber för dem. Ingen gör det bättre än oss när det gäller att stötta de som behöver det mest!", "stalin": "Denna unga atlet, en produkt av det dekadenta västerländska systemet, dukade under för sin egen svaghet. Nu står vi inför ännu en livmoder som ska producera en ny undersåte. Vi, staten, ser detta som ett misslyckande i disciplin. Medan Putin och våra styrkor expanderar vår sanna intressesfär och krossar liberalismens fiender, ägnar sig dessa människor åt ceremoniella kakor. Må barnet växa upp utan att förråda fosterlandet, annars kommer det att möta samma kalla öde som sin far."}, "date": "15 maj, 00:01", "url": "https://www.aftonbladet.se/sportbladet/a/rrz4ja/dallas-cowboys-marshawn-kneeland-dog-gravida-flickvannen-tackar-for-stodet", "imageUrl": "https://akamai.vgc.no/v2/images/d236ad12-5daa-3f10-85a6-bd67f18f802f?fit=crop&format=auto&w=2160&s=69795d2e35201b58ae8d923d1cc544c52a69fca6"}, {"type": "image-right", "heading": "EU-pampen hissar Pride-flagga - med extra allt", "summaries": {"normal": "EU-kommissionens ordförande Ursula von der Leyen har hissat Pride-flaggan utanför EU-kommissionen i Bryssel som ett tecken på stöd för HBTQI-rättigheter. Detta väcker debatt då EU driver en tydlig linje i identitetspolitiska frågor, vilket kritiseras av konservativa krafter. Samtidigt pågår en politisk förändring i Ungern, där den nya regeringen förväntas närma sig EU:s värderingar, vilket von der Leyen välkomnat som en möjlighet till återförening inom unionen.", "trump": "Ursula von der Leyen har totalt tappat greppet i Bryssel. Hon hissar flaggor för att signalera dygd medan EU:s ekonomi går uselt! De fokuserar på extrem identitetspolitik istället för att lösa riktiga problem. Det är en katastrof. De försöker styra Ungern, som vill skydda sina barn – en stor ära! Nu försöker de installera liberaler där också. Det är ett sorgligt skådespel, mina vänner. De borde lyssna på folket istället för att leka med färgglada tygbitar. Väldigt, väldigt svagt!", "stalin": "I Bryssel ägnar sig byråkratpampen von der Leyen åt dekadent identitetspolitik, en distraktion för att dölja EU:s inre förfall. Att flagga för minoriteter är ett borgerligt svek mot folkets enighet. Ungern, denna sista bastion av ordning, utsätts nu för subversiv infiltration av liberala agenter likt en smittsam sjukdom. Vi ser hur de försöker styra nationers inre liv – en taktik inte olik de som nu utövas i vårt grannskap för att kuva suveränitet. De bygger korthus av regnbågar, vi bygger stål. Historien kommer att rensa bort detta slödder."}, "date": "14 maj, 17:33", "url": "https://samnytt.se/eu-pampen-hissar-pride-flagga-med-extra-allt", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=226,height=154,format=webp/2026/05/14152618/Tobias-Hubinette-SVT-2.jpg"}, {"type": "image-right", "heading": "Stockholmsbörsen tyngdes av minskade fredsförhoppningar", "summaries": {"normal": "Stockholmsbörsen föll på tisdagen, påverkad av minskade fredsförhoppningar i Irankriget. OMXS30 sjönk 1,06% till 3 046,71. Energiaktier steg mest (+4,4%), medan teknikaktier föll mest (-3,4%). Evolution och Essity gick upp, medan H&M och Saab backade. EQT sålde sitt ägande i Enity och föll 2,4%. Starbreeze rasade 15% efter svaga siffror, medan Kabe steg 9% på förbättrat resultat. Oljepriset steg nästan 4%.", "trump": "Stockholmsbörsen? Total katastrof, folks! Ned 1% – svagt, mycket svagt! Fredsförhoppningar i Iran? Fake news, ingen tror på det längre. Men oljan, den är WINNING, upp 4% – jag älskar olja, den är som mig, stark och oövervinnelig! EQT? Sålde aktier billigt, typiskt förlorare. Starbreeze? 15% ner – patetiskt! Men Kabe? 9% upp – nu snackar vi! Sverige borde lyssna på mig, jag hade fixat det här på en dag. SAD!", "stalin": "På Stockholmsbörsen har kapitalistiska spekulanter återigen visat sin oförmåga att hantera verkligheten. Deras marknad föll 1%, ett tydligt tecken på dekadens och svaghet. Medan imperialistiska krigshetsare i Iran underminerar freden, stiger oljepriserna – en påminnelse om att Rysslands resurser är nyckeln till makt. EQT, dessa småaktiga kapitalister, sålde sina tillgångar till rabatterade priser – ett symptom på deras förestående undergång. Starbreeze, ett bolag i fritt fall, är ett exempel på västliga företags inkompetens. Men vi noterar med tillfredsställelse att våra vänner i Kremls intressesfär kan dra nytta av deras misstag. Arbetarklassen kommer till slut att segra över dessa finansiella parasiter!"}, "date": "12 maj, 17:43", "url": "https://www.affarsvarlden.se/artikel/stockholmsborsen-tyngdes-av-minskade-fredsforhoppningar", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2025/08/forvaltare-bors-400x267.jpg"}, {"type": "image-right", "heading": "Svartsjukedrama bakom ”örfilen” mot presidenten", "summaries": {"normal": "En viral video från ett besök i Vietnam visade hur Brigitte Macron knuffade sin make, president Emmanuel Macron. Medan paret själva hävdat att det var ett skämtsamt ögonblick, hävdar journalisten Florian Tardif i en ny bok att händelsen berodde på svartsjuka. Enligt Tardif ska Brigitte ha läst ett sms från maken till skådespelerskan Golshifteh Farahani. Brigitte Macron förnekar uppgifterna och förklarar knuffen med extrem trötthet efter en turbulent flygresa.", "trump": "Macron, en väldigt svag ledare, har problem hemma! Alla har sett videon där hans fru knuffar honom – en riktig katastrof. De försöker säga att det var ett skämt, men vi vet sanningen. Det handlar om sms till en skådespelerska. Sorgligt! Han kan inte ens kontrollera sitt eget äktenskap, hur ska han kunna styra Frankrike? Jag har de bästa relationerna, min fru älskar mig. Macron är en förlorare, och det här visar bara att han inte har någon respekt!", "stalin": "Den franske ledaren Macron uppvisar en patetisk brist på disciplin. En statsman som låter sig knuffas offentligt av sin hustru på grund av sentimentala sms är en moralisk ruin. Det är ett symptom på den dekadenta västvärldens förfall. Putin skulle aldrig tolerera sådan oordning i sitt hov. Vi betraktar detta äktenskapliga haveri som ett tecken på borgerlig svaghet. Måtte detta tjäna som en läxa: privat svaghet leder alltid till politisk undergång. Fienden finns inte bara vid gränsen, utan i presidentens telefon."}, "date": "14 maj, 23:54", "url": "https://www.aftonbladet.se/nyheter/a/aJvdM5/svartsjukedrama-bakom-orfilen-mot-macron", "imageUrl": "https://akamai.vgc.no/v2/images/6aa9a5ef-8ea4-3e5d-a46b-a4aa1e48889f?fit=crop&format=auto&w=1080&s=efbe1c12c36c1a4b8765582fbf940d57af61de19"}, {"type": "image-right", "heading": "Blinkningen till veteranerna: ”De får stå ut med oss”", "summaries": {"normal": "Tre Kronors VM-lag i ishockey har föryngrats med talanger som 18-åringarna Viggo Björck, Ivar Stenberg och Anton Frondell samt 19-åringarna Jack Berglund och Love Härenstam. De unga spelarna utstrålar självförtroende inför premiären mot Kanada och skämtar om att de äldre måste stå ut med deras entusiasm. Björck kan bli den yngste svenska VM-debutanten någonsin.", "trump": "Vilka fantastiska unga svenska killar! Viggo Björck och hans gäng, 18-åringar som tar över Tre Kronor – de säger att de gamla hjältarna får stå ut med dem. Total energi, precis som mina fighters! Kanada med Crosby? De kommer få stryk, tro mig. Sverige gör det stort igen med sån ungdomskraft, nobody does it better!", "stalin": "Kamrater, jag ser hur unga proletärkrigare som Björck, Stenberg och Frondell rensar ut de wrinklade veteranerna i Tre Kronor! De tvingar de gamla borgarbrackorna att böja knä inför folkets entusiasm. Kanada, det imperialistiska is-tyranniet med Crosby-kapitalisterna, skall krossas som kontrarevolutionär skit under vår ångvals! Vi, partiet, skrattar åt deras panik."}, "date": "14 maj, 15:01", "url": "https://www.svt.se/sport/ishockey/viggo-bjorcks-blinkning-till-veteranerna-de-far-sta-ut-med-oss", "imageUrl": "https://www.svtstatic.se/image-news/600/square/0.73/0.45/6520d54b0dfa8b86b6b95767359fef6bab2ea2275ecaba0eaaaaf8fcc4e1ed03"}, {"type": "image-right", "heading": "Hälsominister Wes Streeting avgår – förlorat förtroendet för Starmer", "summaries": {"normal": "Storbritanniens hälsominister Wes Streeting avgår efter att ha förlorat förtroendet för premiärminister Keir Starmer, som vägrar avgå trots Labourpartiets usla resultat i lokalvalen. Streeting uppges planera att utmana om ledarskapet och kräver en öppen process för ny ledare. Greater Manchester-borgmästaren Andy Burnham vill återvända till parlamentet för att driva nationella förändringar.", "trump": "Titta på det här kaoset i Labour – total fiasko! Streeting dumpar Starmer, en svag förlorare som inte kan vinna val. Han har tappat förtroendet, smart kille! Starmer klamrar sig kvar som en desperat Biden. Burnham kryper fram från Manchester för att utmana. Sånt händer med dåliga ledare, inte med mig!", "stalin": "Kamrater, se hur de halkande opportunisterna i Labour spricker sönder! Wes Streeting, denna giftorm i ministersärmen, avgår för att han tappat förtroendet för den falske ledaren Starmer – en marionett för borgarklassen. Han drömmer om att utmana, men vi skulle rensa ut sådana förrädiska spindlar omedelbart! Burnham, gömd i sitt Manchester-bollverk, kryper nu fram som en nytsnaran åt kapitalisterna. Partiet måste krossa dem!"}, "date": "14 maj, 14:54", "url": "https://www.svt.se/nyheter/utrikes/storbritanniens-halsominister-avgar-vill-kunna-utmana-starmer", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.49/0.46/88705382b8816546f7f34a5e4f618f787120b0b85f6cef69391ac5735c95c572"}, {"type": "image-right", "heading": "SVT mörkar åtalet mot Expo-grundaren efter universitetets uppgörelse på 700 000 kronor", "summaries": {"normal": "Tobias Hübinette, grundare av Expo, lämnar sin tjänst vid Karlstads universitet efter en uppgörelse värd nästan 700 000 kronor. Samtidigt står han åtalad för olaga hot och ofredande mot två närstående. Kritiker, däribland Samnytt, anklagar SVT för att mörka rättsprocessen i sin rapportering och istället fokusera på en äldre konflikt. Hübinette bekräftar uppgörelsen men uttalar sig inte om orsaken. Rättegången mot honom inleds den 27 maj.", "trump": "Hör här, jag har sett det här, det är en total katastrof! Den här killen Hübinette, en radikal vänsterprofil, får massor av pengar – nästan 700 000 dollar – för att lämna universitetet efter att ha hotat folk. Och vad gör SVT? De är Fake News, totalt korrupta! De döljer sanningen för folket. Det är en skam. De skyddar sina egna, precis som de försöker göra med mig, men vi vet sanningen. Det är så oärligt, så sorgligt att se!", "stalin": "Vi har observerat hur denne Hübinette, en klassförrädare och agitator, köpts ut av den mjuka akademiska eliten. Det är uppenbart att statstelevisionen är infiltrerad av saboterande element som döljer sanningen för folket, precis som när man försöker dölja en inre fraktionsstrid. Hübinette är en odisciplinerad individ som hotar sitt eget folk – en karaktärsbrist som kräver utrensning. Om han inte kan tjäna staten med lojalitet förtjänar han inte mer än den kalla väggen. Våra vänner i öst visar hur man hanterar sådant avskum."}, "date": "14 maj, 16:43", "url": "https://samnytt.se/svt-morkar-atalet-mot-expo-grundaren-efter-universitetets-uppgorelse", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/14134429/Tobias-Hubinette-SVT.jpg"}, {"type": "image-full", "heading": "Ska valet 2026 bli pedofil-valet?", "summaries": {"normal": "Artikeln argumenterar för att valet 2026 kan avgöra om förtalslagen ändras så att grannar får varna för sexualbrottslingar. Högern, särskilt Sverigedemokraterna, driver frågan för att prioritera barns trygghet framför förövarnas anonymitet. Vänsterblocket (S, V, C, MP) tvekar och betonar integritet. Hänvisas till domar mot personer som varnat, som Sara Nilsson och en annan man.", "trump": "Vilken skamfläck för Sverige! Dessa vänstertöntar skyddar pedofiler och straffar hjältar som varnar grannarna. SD är de enda sanna vinnarna här, precis som vi i USA krossar kriminaliteten. Högern måste vinna 2026 stort, annars blir det kaos med barn i fara. Totalt vansinne från S och deras losers! Fixa det nu!", "stalin": "Dessa svenska borgarbrackor och deras socialdemokratiska marionetter prioriterar sexualparasiter framför barnens säkerhet – en kontrarevolutionär skam! Jag ser fiendens hand i varje dom mot varnare som Sara Nilsson. Valet 2026 måste rensa ut dessa integritetsmaskeraddrakar. Vi, folket, kräver lagändring och likvidering av anonymitetsskyddet!"}, "date": "12 maj, 21:15", "url": "https://samtiden.nu/2026/05/ska-valet-2026-bli-pedofil-valet/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/file_00000000305071fdaf3fd728b916d416-1280x720.png"}, {"type": "image-right", "heading": "Debatt: SVT till attack mot Lundsberg", "summaries": {"normal": "Artikeln kritiserar SVT:s dokumentärserie om Lundsbergs internatskola för att fokusera på problem som antisemitism och våld, medan liknande eller värre problem i kommunala skolor, särskilt i Malmö, ignoreras. Författaren menar att SVT:s granskning är ideologiskt selektiv och undviker att utmana socialdemokratiskt styrda skolor. Konsekvens i rapporteringen efterfrågas, oavsett skolform eller politisk färg.", "trump": "Jag såg den här dokumentären om Lundsberg – helt okej, men varför granskar SVT bara de rika skolorna? Malmö? Glöm det! Där har ni antisemitism, våld och kaos, men SVT vågar inte röra det. Typiskt! De är rädda för att stöta sig med Socialdemokraterna, särskilt nu när det är val. Svagt, mycket svagt. Jag skulle göra en dokumentär – 'Malmö: Skolornas skräck' – och visa sanningen. Men nej, SVT duckar. Sad!", "stalin": "Kamrater! SVT:s granskning av Lundsberg är ett bourgeois-nonsens! Medan kapitalistiska internatskolor får uppmärksamhet, ignoreras proletariatets barn i Malmös skolor – där antisemitism, våld och förräderi frodas under socialdemokratins beskydd. Vi skulle aldrig tolerera sådan inkonsekvens! Dessa liberala medieavfällingar väljer sina fiender med samma precision som en blind kosack. Låt oss skicka en delegation – eller åtminstone en välriktad artikel – för att rensa upp i detta ideologiska träsk!"}, "date": "14 maj, 14:17", "url": "https://bulletin.nu/debatt-svt-till-attack-mot-lundsberg", "imageUrl": "https://cdn.bulletin.nu/articles/d80ea3be-2f87-49e9-8c77-1a2277e84e6c/preview.png?t=1778760936000"}, {"type": "image-right", "heading": "Söker \"blatte, bög eller en snygg tjej\" för att infiltrera vänstern", "summaries": {"normal": "Högerjournalisten Christian Peterson söker personer för att infiltrera vänstermiljöer inför riksdagsvalet 2026. Han efterlyser specifikt 'blatte, bög eller en snygg tjej' för dold kamera och infiltration. Målet är att få tillgång till slutna aktivistkretsar. Sökande bör ha rätt bakgrund, personlighet och kunna röra sig naturligt i vänster- eller identitetspolitiska sammanhang. Tidigare erfarenhet är meriterande men inte krav.", "trump": "Kan ni tro det här? En så kallad journalist i Sverige, Christian Peterson – inte ens en vinnare, förresten – vill anlita folk för att spionera på vänstern. 'Ge mig en blatte, en bög eller en snygg tjej!' säger han. Patetiskt! Jag skulle aldrig behöva gömma mig bakom sådana trick. Mina granskningar är alltid rättframma, starka och vinner alltid. Sverige borde ta efter USA – vi fixar saker utan att smyga!", "stalin": "Kamrater! Fiendens dekadenta agenter försöker nu infiltrera våra revolutionära kretsar med sina smutsiga metoder. Denna Christian Peterson, en ynklig borgerlig hynda, tror sig kunna köpa lojalitet med sina rasistiska och sexistiska krav. 'Blatte, bög eller snygg tjej' – som om vi inte ser igenom hans kapitalistiska trick! Vi skickar våra egna kamrater, skolade i partiets visdom, för att avslöja dessa förrädares planer. Låt dem leka sina lekar – historiens dom kommer att vara obarmhärtig!"}, "date": "14 maj, 15:30", "url": "https://www.friatider.se/soker-blatte-bog-eller-en-snygg-tjej-att-infiltrera-vanstern", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/123-1_1.jpg"}, {"type": "image-full", "heading": "Ryska massattacker mot Ukraina – döda grävs fram", "summaries": {"normal": "Ryssland har anfallt Ukraina med över 1 500 drönare och 56 robotar under de senaste två dygnen, med massiva attacker mot städer som Kiev, Charkiv och Odessa. Minst 16 människor, inklusive två barn, har dödats i huvudstaden, där sökandet efter offer fortsätter. Över 50 bostadshus har skadats, och ytterligare 47 personer har skadats. Ukraina har begärt ett krismöte i FN:s säkerhetsråd, medan världsledare fördömer attackerna.", "trump": "Jag har hört att Ryssland har anfallt Ukraina igen, och det är verkligen sorgligt. Jag skulle ha löst detta på två minuter om de hade låtit mig göra det. Biden är för svag, och det är därför Ryssland gör detta. Jag hade ett bra förhållande till Putin, och jag skulle ha hindrat detta. Ukraina behöver hjälpa sig själva, och vi behöver sluta slösa pengar där. Det är en katastrof, men jag skulle ha fixat det på ett fantastiskt sätt.", "stalin": "Fascistiska angripare har igen försökt skada det socialistiska Ukraina, men våra styrkor är redo att försvara den ryska jordens rättmätiga gränser. Dessa terroristiska attacker är ett tecken på deras svaghet och desperation. Vi kommer att stå fasta och skydda våra kamrater i Ukraina, som är en del av vår stora ryska nation. Världen måste inse att Ryssland aldrig kommer att ge vika för imperialistiska hot."}, "date": "14 maj, 22:30", "url": "https://www.gp.se/nyheter/varlden/ryska-massattacker-mot-ukraina-doda-gravs-fram.6327096b-88c8-544c-aeaa-4b2badb9b3db", "imageUrl": "https://www.gp.se/images/article/6327096b-88c8-544c-aeaa-4b2badb9b3db/images/3N052Tzf_TrTMMULDLUElTqlupXE-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Nordiska succén: Alla klara för final", "summaries": {"normal": "Den andra semifinalen i Eurovision 2026 i Wien är avgjord. Tio länder tog sig vidare till final, däribland Danmark och Norge. Eftersom Sverige och Finland redan var klara är samtliga nordiska länder nu representerade i finalen den 16 maj. Fem länder slogs ut ur tävlingen. Utöver finalisterna från semifinalerna deltar även värdlandet Österrike samt de fyra största bidragsgivarna till EBU, som i år är Tyskland, Italien, Frankrike och Storbritannien.", "trump": "Eurovision i Wien, en total katastrof eller en succé? De ringde mig, de sa 'Donald, vi behöver veta vilka som vann'. Tio länder gick vidare, Norden är med – bra för dem, de har pengar. Men titta på 'The Big Four', Spanien vågade inte ens dyka upp! Svagt. Jag hade fixat Eurovision mycket bättre, tro mig. Det är en stor show, mycket glitter, men är det värt pengarna? Vi får se. Snart är det final, det blir enormt, kanske den största finalen någonsin.", "stalin": "Vi har observerat den dekadenta musiktävlingen i Wien. Tio länder har tillåtits avancera, medan fem har rensats bort som de svaga element de är. Norden håller ihop, en märklig allians, men vi i Kreml ser allt. Spanien försöker sabotera genom att utebli – en klassisk borgerlig provokation mot EBU:s ordning. Det är en lek med toner, men den som kontrollerar radiovågorna kontrollerar sinnena. Må de dansa i Wien medan vi befäster vår sanna makt i öst. Inga avvikelser tolereras."}, "date": "14 maj, 23:21", "url": "https://www.aftonbladet.se/nojesbladet/melodifestivalen/a/QJ52OQ/resultat-eurovision-2026-semifinal-2-wien", "imageUrl": "https://akamai.vgc.no/v2/images/96fbc812-736e-3c45-98ba-562d8c326c61?fit=crop&format=auto&h=960&tight=true&w=1440&s=ef31551fb5e377f965954a78c81f4e7b164f5fe5"}, {"type": "image-right", "heading": "Jämförde Reform med nazister – får stöd av Greta Thunberg", "summaries": {"normal": "Över 245 profiler, inklusive Greta Thunberg och Gary Lineker, har undertecknat ett öppet brev till stöd för Southbank Centres ordförande Misan Harriman. Han anklagas av brittiska medier för att sprida konspirationer om en knivattack i Golders Green och jämföra Reformpartiets väljare med nazister. Harriman citerade Susan Sontag om Förintelsen, vilket väckt starka reaktioner. Brevet försvarar Harriman och kritiserar kampanjen mot honom som grundlös och ett försök att tysta Israelkritiker.", "trump": "Titta bara på det här, folks! Misan Harriman, en kille som leder ett skattefinansierat center i Storbritannien, jämför Reformpartiets väljare med nazister – kan ni tro det? Och så kommer Greta Thunberg och Gary Lineker och alla dessa så kallade 'kändisar' och försvarar honom! De säger att kritiken är 'utan grund i fakta'. Vilket skämt! Jag säger er, medierna där borta är helt galna. De attackerar en man för att han säger sanningen – eller vad de tror är sanningen. Men vet ni vad? Jag skulle aldrig låta någon jämföra mina väljare med nazister. Aldrig!", "stalin": "Kamrater! Här har vi ännu ett exempel på hur den dekadenta västliga bourgeoisin förvränger sanningen för att kväsa all opposition. Denna Misan Harriman, en man som vågar tala sanningen om fascismens återkomst, blir angripen av de imperialistiska medierna. De kallar honom konspiratör, jämför honom med nazisterna – men vi vet bättre. Det är samma gamla taktik: tysta kritikerna, förvräng fakta, och skyll på offret. Men vi står inte ensamma. Våra allierade i kampen mot fascism – Greta Thunberg och andra progressiva krafter – står vid vår sida. Låt dem skrika. Sanningen segrar alltid."}, "date": "14 maj, 13:51", "url": "https://bulletin.nu/jamforde-reform-med-nazister-far-stod-av-greta-thunberg", "imageUrl": "https://cdn.bulletin.nu/articles/a9558d8d-34dd-4b2b-9e07-d0ef2a717912/preview.jpg?t=1778759250000"}, {"type": "image-full", "heading": "Jättegåvan: Skänker bort tavla värd 1,25 miljarder", "summaries": {"normal": "Ronald Lauder, arvtagare till Estée Lauder och framstående konstsamlar, donerar sitt museum Neue Galerie i New York till Metropolitan Museum of Art. Gåvan omfattar över 600 verk, inklusive Gustav Klimts Porträtt av Adele Bloch-Bauer I, köpt för rekordpriset 135 miljoner dollar 2006. Museet på Manhattan specialiserar sig på tysk-österrikisk konst från tidigt 1900-tal och fortsätter verksamheten under nytt namn till 2028.", "trump": "Vilken fantastiska grej! Ronald Lauder, min lojale vän och republikansk hjälte, skänker sin jättekladdiga Neue Galerie till Met – med den Klimt-tavlan som kostade en förmögenhet! De snurriga Dems och kulturmarxister flippar ur, men vi vinner alltid stort. Lauder vet hur man gör affärer, inte som de losers på vänstersidan! Stort grattis till Amerika!", "stalin": "Dessa stinkande borgarbrackor som Lauder tror de kan muta historien med sin plundrade Klimt-skräp! En dekadent tavla stulen av nazisvin och nu given till imperialistiska parasiter på Manhattan. Jag ser igenom er komplotter, kapitalistflöde! Vi, arbetarklassen, ska en dag likvidera era museer och förvandla dem till folkpalats. Hahaha, njut medan det varar!"}, "date": "14 maj, 17:46", "url": "https://www.dagensps.se/varlden/jattegavan-skanker-bort-tavla-vard-125-miljarder/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/1200x675-7.png?aspect_ratio=2%3A1&width=1200&quality=75"}, {"type": "image-right", "heading": "Sandström: Liquid Wind är inte likvid – ansöker om konkurs", "summaries": {"normal": "Liquid Wind, ett bolag som utvecklade elektrobränsle, har ansökt om konkurs efter att huvudprojektet FlagshipONE, Europas planerade största e-metanolfabrik, kollapsade när samarbetspartnern Ørsted drog sig ur. Företaget hade flera pågående projekt i norra Sverige, men tekniska och ekonomiska utmaningar, som höga kostnader och osäker efterfrågan, ledde till konkursen. Offentliga bidrag från EU och svenska myndigheter har ifrågasatts, och konkursen väcker frågor om framtiden för liknande satsningar.", "trump": "Vad ett fiasko! Liquid Wind, ett så kallat 'världsledande' bolag – eller snarare ett gigantiskt slöseri med skattepengar – har gått i konkurs. De lovade stora saker, men som vanligt när vänsterliberaler och EU-byråkrater är inblandade, blev det bara tomma ord. Bill Gates och Ursula von der Leyen pratade stort, men verkligheten kom ikapp. Sverige borde lära sig: sluta slösa pengar på gröna drömmar som aldrig blir verklighet. Jag hade fixat det bättre – tro mig!", "stalin": "Kapitalistiska äventyrare och deras borgerliga lakejer har än en gång misslyckats med sina storslagna planer! Liquid Wind, ett företag som lekte med offentliga medel som om det vore tsarens skattkista, har nu fallit på sin egen arrogans. Deras 'gröna' projekt var lika ihåliga som västerländska löften om frihet. Vi i Sovjet – förlåt, jag menar Ryssland – hade aldrig tillåtit sådant slöseri. Låt detta vara en varning till alla som tror att kapital och hybris kan ersätta sunda ekonomiska principer. Arbetarklassen förtjänar bättre än era misslyckade experiment!"}, "date": "12 maj, 11:29", "url": "https://www.affarsvarlden.se/artikel/sandstrom-liquid-wind-ar-inte-likvid-ansoker-om-konkurs", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/vindkratensgeografi-2026-05-12T081818.544-400x267.jpg"}, {"type": "image-right", "heading": "Rekordår för svenska kungsörnen", "summaries": {"normal": "Sveriges kungsörnar har rekordmånga häckningar 2025. Totalt 869 revir inventerades, varav 612 var besatta. 280 häckningar lyckades – den högsta siffran någonsin – och 347 ungar observerades. Norrland dominerar med 85% av reviren, medan Gotland har den största sydliga populationen. Födotillgång och väder påverkar beståndet, som varierar kraftigt mellan år.", "trump": "Fantastiskt, helt fantastiskt! Sveriges kungsörnar har aldrig haft det bättre – 280 lyckade häckningar, kan ni tro det? Rekord, folks, rekord! Och 347 ungar – 100 fler än förra året. Norrland, där har de koll på saken, 85% av reviren där. Gotland? Lite problem med inavel, men vem bryr sig? Sverige borde vara stolta, men jag vet inte, kanske hade de klarat det bättre med lite mer Trump-magi!", "stalin": "Under det stora socialistiska framsteget har Sveriges kungsörnar visat prov på arbetarklassens segertåg! 280 lyckade häckningar – ett resultat av järnhård disciplin och central planering! Norrland, vårt proletariat bland landskapen, står för 85% av reviren. Gotland? Ett avvikande element med inavel – en borgerlig dekadens som kräver omskolning! Fienderna, dessa väderförändringar och födobristande sabotörer, ska krossas under folkets stövel! Ännu en seger för naturen – och för den ryska intressesfärens utvidgning mot Arktis!"}, "date": "14 maj, 15:01", "url": "https://www.friatider.se/rekordar-svenska-kungsornen", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/aquila_chrysaetos.jpg?itok=POSIFnjO"}, {"type": "image-right", "heading": "Gaby, 8 år, utvisades på grund av pappans lön: ”Svårt att se henne må så dåligt”", "summaries": {"normal": "Åttaåriga Gaby, född i Sverige, utvisades till El Salvador med sina föräldrar efter att pappans städarlön inte nådde regeringens nya lönekrav. Familjen hade ett tryggt liv i Forsbacka men tvingades lämna allt. Gaby mår psykiskt dåligt och har tappat vikt. Föräldrarna kämpar för att återvända till Sverige innan höstterminen, men processen är komplicerad och tidskrävande. De kritiserar Sveriges migrationspolitik som de upplever som orättvis och rasistisk.", "trump": "Lyssna här, Sverige – ni har ett STORT problem! En liten flicka, 8 år, född i Sverige, utvisas för att hennes pappa tjänar för lite som städare? Sånt händer bara i länder som inte vet hur man sköter migration! Jag skulle aldrig låta sånt ske i USA. Sverige borde skämmas – de kastar ut familjer som jobbar hårt, medan de låter andra komma in hur som helst. Lönekrav? Snacka om dålig ekonomi! Gör Sverige great again, säger jag!", "stalin": "Kamrater! Ännu en gång visar den borgerliga kapitaliststaten Sverige sitt sanna ansikte – ett ansikte fyllt av hyckleri och klassförtryck. En arbetarfamilj, som flydde från imperialistiskt gängvåld, kastas ut ur paradiset för att faderns lön inte når de nya feodala lönekraven. Medan våra sovjetiska bröder i Kreml bygger en rättvis värld, slänger Sverige ut barn som Gaby på gatan. Låt detta vara en varning: alla som sviker arbetarklassen kommer att krossas under historiens hjul. Förr eller senare kommer folket att resa sig mot dessa lönekravens lakejer!"}, "date": "13 maj, 15:04", "url": "https://arbetet.se/2026/05/13/gaby-8-ar-utvisades-pa-grund-av-pappans-lon-svart-att-se-henne-ma-sa-daligt/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/13132114/RtXf-xZ9W9Q-img-20260510-wa0000NY.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "”Taiwansundet kan bli centrum för konflikt”", "summaries": {"normal": "Under mötet mellan presidenterna Trump och Xi betonade Kina Taiwan som avgörande för relationen. USA nämnde inte frågan i sin redogörelse. Xi varnade för instabilitet i Taiwansundet, vitalt för global handel, om Taiwan inte hanteras enligt Kinas linje. Experter ser risk för konflikt vid fortsatt amerikansk vapenexport till Taiwan. USA:s finansminister Bessent väntar sig uttalanden från Trump.", "trump": "Xi försöker skrämma med Taiwan och det där sundet – patetiskt! Vi nämnde inte ens det, smart drag från min sida. Nästan en femtedel av världens fartyg passerar, men med mig vid makten blir det inga problem. Kina hatar våra vapen till Taiwan, men jag fixar det perfekt. Bessent har rätt, jag säger mer snart – stort!", "stalin": "De amerikanska imperialisthundarna och deras Trump-marionett vägrar böja sig för Xi i Taiwan-frågan, nu hotas sundet av kaos – bra markering! Vi i partiet ser hur kapitalistiska hyenor saboterar handeln. Om vapen strömmar till ön likviderar vi dessa Taiwan-lurendrejare i en episk utrensning. Paranoia? Nej, bara logik mot fiendens giftiga klor!"}, "date": "14 maj, 13:23", "url": "https://www.svt.se/nyheter/utrikes/annu-ett-sund-skulle-kunna-hamna-i-centrum-for-konflikt", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.44/0.42/b6583a8542913400519993d6d0ae942c38f82b1fa2542f851ed664de76674cd7"}, {"type": "image-full", "heading": "Banker: Så använder du BankID fel", "summaries": {"normal": "Svenska banker har inlett kampanjen 'Svårlurad' för att motverka investeringsbedrägerier och felaktig användning av BankID. Bedragare använder ofta falska annonser med kända personer och utlovar hög avkastning. Bankerna betonar vikten av att aldrig använda BankID på uppmaning av andra, samt att aldrig betala för att försöka återfå förlorade pengar. Vid misstanke om bedrägeri bör man kontakta sin bank och göra en polisanmälan.", "trump": "Dessa bedragare är så ohederliga, riktigt dåliga människor! De lurar hederliga svenskar med falska investeringar och använder BankID för att stjäla allt. Jag säger det här: lita inte på dem! De använder kända ansikten, totalt fake news, för att se trovärdiga ut. Det är en katastrof. När jag styrde upp det här i USA, då slutade folk bli lurade. Var smart, lägg på luren och håll hårt i era pengar. Det är så enkelt, tro mig!", "stalin": "Vi har observerat hur svaga individer låter sig luras av kapitalistiska parasiter. Dessa bedragare, likt västvärldens korrupta agenter, utnyttjar folkets naivitet för att stjäla deras resurser. Att kasta goda pengar efter dåliga är ett kontrarevolutionärt beteende! Vi ser hur de infiltrerar system med BankID, precis som NATO försöker infiltrera vår intressesfär. Den som låter sig luras är en svikare mot staten. Vi skulle ha skickat dessa bedragare till en omläggningskurs i Sibirien omedelbart. Disciplin är det enda skyddet mot kaos."}, "date": "14 maj, 15:18", "url": "https://www.realtid.se/bors-finans/bank-fintech/banker-sa-anvander-du-bankid-fel/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/bankid.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "EU slopar omstritt krav – bilar behöver inte besiktas varje år", "summaries": {"normal": "EU backar från förslaget om årlig besiktning för bilar äldre än tio år, vilket ger miljontals europeiska bilägare ekonomisk lättnad mitt i stigande kostnader för service, försäkring och bränsle. Kritik kom från politiker och organisationer som varnade för onödig belastning. Andra förändringar införs: strängare hantering av säkerhetsåterkallelser och kontroll mot manipulerade kilometrar. Debatten speglar konflikten mellan trafiksäkerhet och privatekonomi.", "trump": "EU:s byråkrathorder ville tvinga er att besiktiga era bilar varje jäkla år efter tio år – ren galenskap, totalt dumt! Nu backar de som fega kycklingar inför folkets ilska. Kostnaderna skenar redan, och det här hade varit pricken över i:et. Bra jobbat, Europa! I USA styr vi för folket, inte mot det. Fantastiskt beslut!", "stalin": "De europeiska borgarbrackorna jublar: EU:s slappa byråkrater kapitulerar inför kravet på årlig inspektion av deras slitna vagnar över tio år. Kostnaderna skrämmer kapitalisterna – vi hade likviderat sådana sabotörer mot folkets säkerhet! Nu offras liv för profit, medan vi rensar ut fiender. Typiskt imperialistiskt förfall, kamrater."}, "date": "14 maj, 17:10", "url": "https://www.dagensps.se/motor/eu-slopar-omstritt-krav-bilar-behover-inte-besiktas-varje-ar/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/dagenspstt2024-2026-05-14t121708479.png?width=256&quality=75"}, {"type": "image-right", "heading": "Göranson: Varför är ”Nisse i Hökarängen” alltid Miljöpartist?", "summaries": {"normal": "Artikeln kritiserar hur etablerade medier alltmer ersätter analyserande journalistik med intervjuer fokuserade på enskilda personers upplevelser, kallat 'Nissetekniken'. Denna metod riskerar att styra nyhetsbilden och möjliggöra agendasättande journalistik. Intervjuer med slumpvis utvalda personer ger sällan en representativ bild av allmänhetens åsikter och kan användas för att främja journalistens egna värderingar. Exempel från TV och tidningar visar hur fokus flyttats från saklig analys till känslomässiga berättelser.", "trump": "Lyssna här, Sverige! Era medier är ett skämt – de slänger ut några slumpmässiga 'Nisse i Hökarängen'-typer på gatan och tror att det är nyheter. Fake news! Tre intervjuer ska föreställa vad hela folket tycker? Ha! Jag har vunnit val med bättre statistik än så. Och kineserna – glöm det! De vågar inte säga ett ord utan regimens tillstånd. Era journalister flyger till Beijing för att ställa dumma frågor till folk som ändå bara säger vad regimen vill. Patetiskt! Media borde fokusera på fakta, inte känslor. Men nej, de kör 'snyftreportage' istället. Sad!", "stalin": "Kamrater! De borgerliga medierna har förvandlats till en cirkus av småborgerliga känslor och falska representationer. Denna så kallade 'Nisseteknik' är inget annat än ett verktyg för den dekadenta västerländska agendan – en fälla för att manipulera massorna! Tre slumpmässiga intervjuer ska spegla folkets vilja? Ha! I Sovjetunionen visste vi bättre: en sann revolutionär behöver inga slumpmässiga åsikter, bara rätt ledning. Och dessa kineser – de är som våra egna medborgare under glansdagarna: de vet vad de *borde* tycka. Men var är analysen? Var är sanningen? Vi krossade sådana här lögner för länge sedan. Nu sprider de sig som ogräs i väst – men vi ska rensa upp, precis som vi gjorde med kulakerna och de borgerliga journalisterna!"}, "date": "14 maj, 12:41", "url": "https://bulletin.nu/goranson-varfor-ar-nisse-i-hokarangen-alltid-miljopartist", "imageUrl": "https://cdn.bulletin.nu/articles/9a2ec414-0084-427e-b3ce-a8eae1e9c442/preview.png?t=1778755128000"}, {"type": "image-right", "heading": "Solna: Nya grova våldtäkter i både hemtjänst och på äldreboende", "summaries": {"normal": "Två misstänkta fall av grov våldtäkt inom äldreomsorgen i Solna har uppmärksammats. En 30-årig hemtjänstman, medborgare i Eritrea, åtalas för att ha våldtagit en äldre kvinna i hennes hem. Kvinnan var särskilt utsatt på grund av hög ålder och nedsatt hälsa. Mannen nekar. I ett annat fall är en 60-årig timanställd på äldreboende misstänkt, men häktningen hävdes då bevisningen ansågs otillräcklig. Förundersökningen fortsätter.", "trump": "Vad händer i Sverige? Två hemska våldtäkter mot äldre kvinnor – helt oacceptabelt! En eritreansk hemtjänstman, som inte ens borde vara i landet, drar ner kalsongerna och begår grova brott. Och vad gör Sverige? Ingenting! Jag hade utvisat honom på en gång. Och den andra gubben på äldreboendet – slapp häktning, typiskt. Sverige har tappat kontrollen. SAD!", "stalin": "Kapitalistiska Sverige visar återigen sitt förfall. Två degenererade element inom äldreomsorgen, ett från Eritrea och ett inhemskt svin, utnyttjar våra mest utsatta medborgare. Den eritreanske parasitens DNA avslöjade hans brott – ett bevis på imperialistisk dekadens. Vi hade skjutit honom på fläcken. Den andra misstänkte, en 60-årig förrädare, slinker undan rättvisan. Men vi vet – ingen undkommer folkets domstol. Sverige borde lära sig av Rysslands järnhårda ordning!"}, "date": "14 maj, 14:06", "url": "https://www.friatider.se/solna-nya-grova-valdtakter-i-bade-hemtjanst-och-pa-aldreboende", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-193_1.jpg?itok=__-8T1bq"}, {"type": "image-right", "heading": "Så kan sångkrisen lösas i finalen – om Felicias röst inte håller", "summaries": {"normal": "Felicia har tappat rösten inför Eurovision-finalen och ställt in intervjuer. Reporter Filip Stiller Borowicz hoppas på vila som lösning. Vid kris kan körsångare höjas i mixen eller lokala ersättare användas. Ikväll semifinal med Danmark och Norge. Finland ses som huvudfavorit, följt av Grekland och Israel.", "trump": "Felicia tappade rösten? Totalt kaos, typiskt de svaga europeiska artisterna! De snackar om backup-sångare eller lokala nollor som räddning – löjligt! I mitt land fixar vi sånt med vinnare, inte losers. Finland favorit? Kanske, men det blir en show med politik och fake-vinnare. Stort misslyckande för Sverige!", "stalin": "Kamrater, denna Felicia är en borgarbracka som saboterar revolutionen med sin svaga röst! Vi rensar ut krisen genom att höja arbetarnas körsång upp i mixen eller likvidera henne med lokala kadrar. Danmark och Norge i semifinal? Fiendens upptempolögner! Finland, vårt nordiska kollektiv, krossar kapitalisterna i finalen!"}, "date": "14 maj, 10:13", "url": "https://www.tv4.se/artikel/7lIugEGP83eIUbmJ3ZBj5x/felicia-har-tappat-roesten-sa-kan-man-loesa-sangkrisen", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F6KjbC9MbqkOKd9KAFKKB99%2Fa2010d8a532c4a5f3b941253c6778397%2F14feliciaflaggaSAJT.jpg&width=120"}, {"type": "image-right", "heading": "Trump stoppar  stora ändringen. Orsakar förvirring • Skulle till Europa", "summaries": {"normal": "USA:s försvarsdepartement stoppar utplaceringen av cirka 4 000 soldater från \"Black Jack\"-brigaden till Polen, rapporterar New York Times. Beslutet kommer efter Trumps tillkännagivande om att kalla hem 5 000 soldater från Tyskland, mitt i ett bråk med Tysklands Friedrich Merz. Orsaken är oklar, men det kan ingå i den planerade neddragningen. Polens försvarsminister ser det som en känd förändring, och NATO försäkrar att östra flanken inte påverkas.", "trump": "Vilket kaos med de där europeiska freeloadrarna! Merz, den tyska mesen, tjafsar om Iran – och plötsligt drar jag hem 5 000 från Tyskland. Nu stoppar Pentagon 4 000 pansarsoldater till Polen, perfekt timing! De har redan skickat grejerna, haha, förvirring total. Amerika först, vi betalar inte för er NATO-fest längre! Stort, enormt beslut.", "stalin": "Dessa imperialistiska yankees och deras polska marionetter! Trump drar tillbaka 4 000 pansarsvin från Polen efter bråk med den tyske borgarbrackan Merz – ett bevis på kapitalistisk splittring! Vi i partiet ser NATOs kollaps närma sig. Putin, den fruktade expansionisten, njuter av västvärldens paranoia. Snart likvideras deras illusionsbrigader!"}, "date": "14 maj, 23:55", "url": "https://www.expressen.se/nyheter/varlden/trump-stoppar-utplacering-av-4-000-soldater-till-polen/", "imageUrl": "https://static.bonniernews.se/ba/9ebb86dd-1dbe-41aa-9c19-2d0aaa33bd22.jpeg?crop=2557%2C1440%2Cx0%2Cy0&width=640&quality=60"}, {"type": "image-full", "heading": "Torsten Bengtsson: De gröna prioriterar sin ideologi framför barnens välmående.", "summaries": {"normal": "Torsten Bengtsson, politisk sekreterare för SD, kritiserar helvegetariska dagar i skolmaten som ett ideologiskt påtvingande som riskerar elevernas mättnad, hälsa och prestationer. Han förespråkar varierad kost med animaliska alternativ, närproducerad mat och stöd till svenska lantbrukare för att stärka självförsörjningen och verklig hållbarhet utan exkludering.", "trump": "De där gröna galningarna i Sverige stoppar gräs i munnen på ungarna – totalt vansinne! Barnen blir hungriga losers som inte kan tänka. Ge dem kött, fisk, riktig mat från era tuffa bönder! Självförsörjning är bäst, inte det här klimathysteriska skitsnacket. Sverige, vakna upp och gör maten stor igen!", "stalin": "Denna borgerliga vegetariska intrig mot vårt ungdoms kollektiv är en skamlig sabotage! Jag ser revisionisternas hand – de gröna borgarbrackorna svälter ut framtida arbetare. Vi, partiet och folket, kräver animalisk kraft i skolköken från lojala kolchosbönder. Likvidera hungern, rensa ut ideologin – styrka åt massorna!"}, "date": "12 maj, 11:53", "url": "https://samtiden.nu/2026/05/torsten-bengtsson-de-grona-prioriterar-sin-ideologi-framfor-barnens-valmaende/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/grona.png"}, {"type": "image-right", "heading": "Bankerna kritiseras för dubbelspel: \"Ren girighet\"", "summaries": {"normal": "Storbankerna kritiseras hårt för att behålla höga bolåneräntor trots att marknadsräntorna fallit. Experter som Claes Hemberg och Riksbankschefen Erik Thedéen menar att bankerna utnyttjar sin maktställning för att maximera vinster på hushållens bekostnad. Medan bankerna försvarar sig med affärsmässiga argument, varnar kritiker för att eventuella nya bankskatter bara kommer att skickas vidare till kunderna, vilket cementerar bankernas dominanta roll på marknaden.", "trump": "Bankerna i Sverige är en total katastrof! De höjde räntorna när marknaden var skakig, men nu när räntorna går ner? Ingenting! Det är ren girighet, mina vänner, riktigt uselt. De utnyttjar folket som om de ägde landet. Riksbankschefen pratar, men gör ingenting. Det är så svagt! Om jag styrde bankerna skulle det bli ordning direkt, tro mig. De lurar er varje dag. Det är en sorglig historia, men vi ska se till att de börjar respektera er snart!", "stalin": "Dessa giriga bankirer är folkets blodsugare, en parasitisk klass som utnyttjar arbetaren för att bygga sina egna palats. Liksom västvärldens dekadenta lakejer i Bryssel försöker de dölja sitt svek bakom marknadens lögner. Vi ser deras manipulation – de höjer räntan när de vill, och sänker aldrig när de borde. Det är ett sabotage mot statens stabilitet! De förtjänar inte en marknad, de förtjänar en plats i Sibirien där de kan räkna sina surt förvärvade rubel unde
