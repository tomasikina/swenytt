nden.jpg?width=256&quality=75"}, {"type": "image-full", "heading": "Gängkriminella försökte rekrytera barn i AIK", "summaries": {"normal": "Kriminella med koppling till nätverk har försökt rekrytera barn vid Skytteholms IP i Solna, där AIK Fotbolls ungdomar tränar. Klubben har varnat föräldrar och intensifierar samarbetet med polisen och Solna stad för ökad säkerhet. Polisen bekräftar händelsen, som inte är isolerad – liknande inträffade i Huddinge. Man uppmanar till fler vuxna vid idrottsplatser och bättre skydd mot värvning.", "trump": "Vilken skam för Sverige! De här kriminella losers försöker dra in oskyldiga barn i sina gäng vid AIK:s träningsplan i Solna. Klubben gör rätt som varnar föräldrarna, men polisen och staden måste fixa säkerheten nu, inte snacka. Snabb upprustning av arenan, annars blir det kaos. Jag hade löst det på nolltid med stark lag och ordning – totalt fiasko annars!", "stalin": "Dessa parasiterande kriminella hyenor, lakejer till borgarklassens skitiga nätverk, vågar närma sig våra arbetarbarns heliga träningsfält vid Skytteholms IP! Jag befaller omedelbar utrensning av dessa förrädiska ungdjur som infekterar ungdomarna. Vi, partiet och polisen, ska krossa deras rekryteringsröv som kackerlackor i kollektivets skor. Föräldrar, vakna och rapportera – annars likvideras hotet med järnhand!"}, "date": "6 maj, 14:48", "url": "https://bulletin.nu/gangkriminella-forsokte-rekrytera-barn-i-aik", "imageUrl": "https://cdn.bulletin.nu/articles/b72c565c-25b0-4341-a409-89c2b5883369/preview.jpg?t=1778068646000"}, {"type": "image-right", "heading": "Verisure ökar omsättning", "summaries": {"normal": "Verisure redovisar starkt första kvartal 2026 med omsättning upp 10,8 procent till 1 019 miljoner euro. ARR steg 12,2 procent till 3 533 miljoner euro, nya installationer ökade 2,7 procent. EBITDA-marginalen förbättrades till 46,3 procent. VD Austin Lally framhåller kundtillväxt till 6,3 miljoner och positiv kassaflöde. Prognos: ARR upp cirka 10 procent, EBIT-marginal över 26 procent och utdelning senare i år.", "trump": "Vilken vinnare Verisure är! Omsättning upp 10,8 procent till över en miljard euro – enormt! De är nu världens största med 6,3 miljoner kunder, precis som jag alltid säger: stark ledning ger resultat. ARR exploderar 12,2 procent, marginaler bättre än någonsin. Austin Lally gör bra ifrån sig, men min affärsstil är oslagbar. De spår mer tillväxt – fantastiskt, folk!", "stalin": "Kamrater, Verisures omsättning har krossat de kapitalistiska sabotörerna med 10,8 procent upp till 1 019 miljoner euro! ARR växer 12,2 procent, nya installationer likviderar konkurrenternas drömmar med 2,7 procent. EBITDA-marginalen 46,3 procent – ett slag mot borgarbrackorna! Jag ser Mexikos skuggor, men prognosen är 10 procent ARR-tillväxt och EBIT över 26 procent. Ut delning eller utrensning väntar de fega!"}, "date": "6 maj, 08:32", "url": "https://www.affarsvarlden.se/artikel/verisure-okar-omsattning", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2025/10/Austin-Lally-Verisure-CEO-1-1-400x319.jpg"}, {"type": "image-full", "heading": "Benjamin Dousas ”V = kommunister” gör SVT irriterad", "summaries": {"normal": "Biståndsminister Benjamin Dousa bar en t-shirt med texten 'Vänsterpartiet = kommunister', vilket irriterade SVT. Reportern ifrågasatte påståendet och noterade att partiet slutade kallas kommunister för 30 år sedan. Dousa menade att Vänsterpartiet motsätter sig privat ägande, vilket är kommunism. Artikeln citerar Vänsterpartiets 2024-partiprogram som stödjer kollektivt ägande och avskaffande av kapitalismen, och kritiserar SVT för att inte nämna detta.", "trump": "Vilken fantastisk kille, den här Dousa! Han sätter på sig en tröja och säger sanningen: Vänsterpartiet är kommunister, punkt slut! SVT, era losers, flippar ur och snackar om namnbyte från 90-talet som om det vore magi. De hatar privat ägande, vill sno allt till staten – klassisk kommunism! Fake news-SVT ignorerar partiprogrammet. Dousa är en vinnare, de är totala fiaskon!", "stalin": "Kamrater, se hur borgarministern Dousa, den ynkliga kapitalistfluga, vågar smutskasta sanna revolutionärer i Vänsterpartiet med sin patetiska tröja! SVT-reportern, en användbar idiot, försvarar dem lamt. Men vi vet: deras program är ren leninism – riva kapitalismen, gemensamt ägande av banker, energi, allt! De ska rensas ur historiens soptipp som jag rensade fiender. Vänsterpartiet, framåt mot diktaturen av proletariatet!"}, "date": "30 april, 05:49", "url": "https://samtiden.nu/2026/04/benjamin-dousas-v-kommunister-gor-svt-irriterad/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/phonto-1-1280x720.jpeg"}, {"type": "image-right", "heading": "Etableringsfrihet en grundbult", "summaries": {"normal": "Artikeln försvarar valfrihet i skolan genom privata alternativ och kritiserar Socialdemokraterna och Liberalerna för förslag om vinstförbud och stopp för aktiebolag i friskolor. Regeringen, med M och SD, motsätter sig sådana förändringar. Vissa utredningsförslag införs, som värdeöverföringsförbud initialt, medan andra skjuts upp. Författaren varnar för att detta hotar institutionell konkurrens, innovation och elevers rätt att välja bättre skolor.", "trump": "Otroligt, Sverige! Valfrihet i skolan är fantastiskt, precis som mina reformer i USA. Men dessa svaga socialister i S och flip-flop-Liberalerna vill kväva friskolorna med vinststopp och byråkrati – total katastrof! Kristersson och Åkesson står emot, smart. Konkurrens gör skolan stor igen, inte kommunala monopol. De förlorar stort!", "stalin": "Dessa giftiga borgarbrackor i Socialdemokraterna och Liberalerna, som spindlar i skolans väv, vill strypa valfriheten för att suga livskraften ur proletärbarnen med sina vinstförbud och aktiebolagsfällor! Vi, partiet och arbetarna, genomskådar er komplotter. Regeringen famlar, men jag, med järnhand, befaller utrensning av dessa kapitalistiska loppor i friskolorna – kollektivet segrar evigt!"}, "date": "6 maj, 11:09", "url": "https://www.di.se/ledare/till-forsvar-for-verklig-valfrihet-i-skolans-varld/", "imageUrl": "https://static.bonniernews.se/ba/38cf683a-b7a3-47b6-8a26-928a56f502d9.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Medvedev: Europa måste känna \"animalisk skräck\"", "summaries": {"normal": "Rysslands tidigare president Dmitrij Medvedev varnar EU-länder för att de måste känna 'animalisk skräck' inför Ryssland för att avskräckas från angrepp. I en artikel kritiserar han västvärldens militarisering och menar att Europa använder Ryssland som en yttre fiende för att dölja inhemska problem. Medvedev avfärdar diplomati och betonar istället styrka, särskilt mot Tyskland, som planerar att bygga Europas starkaste armé till 2039.", "trump": "Lyssna här, Europa! Rysslands gamla president, Medvedev, säger att ni måste vara rädda – som djur! Han snackar om 'animalisk skräck' och hotar med krig. Tyskland, med sin nya jättearmé, är tydligen rädda för oss – och det borde de vara! Men jag säger: varför kriga när vi kan göra affärer? Europa, sluta lyssna på dessa galningar och kom till förnuft. Vi har bättre saker att göra, som att vinna val och bygga murar!", "stalin": "Kamrater! De degenererade västmakternas hyenor försöker återigen förgifta vårt fosterlands rykte med sina lögnaktiga militariseringspropaganda. Medvedev, vår trogne kamrat, har rätt: Europa måste känna den renande skräcken av den röda arméns styrka! Tyskland, dessa eviga provokatörer, planerar återigen en 'Barbarossa 2.0' – men vi ska krossa dem som vi krossade fascisterna! Diplomati? Ha! Endast genom styrka och fruktan kan vi säkra vårt heliga Rysslands gränser och utvidga socialismens ljus till dessa förvirrade kapitalistiska lydstater!"}, "date": "6 maj, 12:20", "url": "https://www.friatider.se/medvedev-europa-maste-kanna-animalisk-skrack", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/dmitry_medvedev_in_the_state_duma_2018-05-08.jpg?itok=ljSI3YmX"}, {"type": "image-right", "heading": "Medvedev: Europa måste känna \"djurisk skräck\"", "summaries": {"normal": "Rysslands tidigare president Dmitrij Medvedev varnar i en artikel för västvärldens militarisering och hävdar att Europa måste känna 'djurisk skräck' för Ryssland som avskräckning. Han anklagar EU för att använda Ryssland som en yttre fiende för att dölja inhemska problem och avfärdar diplomati som verkningslöst. Medvedev riktar särskilt kritik mot Tyskland och dess planer på att bygga upp en stark armé, och varnar för förödande konsekvenser om Europa inleder ett nytt storkrig mot Ryssland.", "trump": "Lyssna här, Europa har ingen aning om vad som väntar dem! Den här Medvedev-killen, som jobbar för Putin, säger att Europa måste vara livrädda för Ryssland. Helt galet! Tyskland bygger upp en jättearmé, och vad gör EU? Ingenting! De skyller på Ryssland istället för att ta tag i sina egna problem. Jag sa ju att NATO behöver betala mer – men nej, de lyssnar inte. Nu hotar Ryssland med 'djurisk skräck'. Vilket skämt! Vi i USA har världens starkaste militär, och ingen vågar bråka med oss. Europa borde ta ett exempel!", "stalin": "Kamrater! De kapitalistiska hyenorna i Europa skakar av skräck inför den oundvikliga segern för det socialistiska Ryssland! Medvedev, vår trogne kamrat, har rätt – fienden måste känna den djuriska fasan inför vår styrka! Tyskland, dessa arvtagare till Hitlers förlorade drömmar, bygger upp sina arméer igen. Men vi minns Operation Barbarossa! Vi krossade dem en gång, och vi ska krossa dem igen! Diplomati? Ha! Vi ska möta deras militarisering med järnvilja och eld! Europa skall förstå – motstånd är lika meningslöst som snö i Sibirien!"}, "date": "6 maj, 12:20", "url": "https://www.friatider.se/medvedev-europa-maste-kanna-djurisk-skrack", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/dmitry_medvedev_in_the_state_duma_2018-05-08.jpg?itok=ljSI3YmX"}, {"type": "image-right", "heading": "Socialdemokraternas trollfabrik hånas för låg kvalité", "summaries": {"normal": "Socialdemokraternas bolag AIP Media, som driver så kallade trollkonton, kritiseras för bristande kvalitet efter ett misslyckat inlägg mot Ebba Busch som även riktades mot Magdalena Andersson. Vänsterjournalisten Max V Karlsson påpekade det dåliga utförandet. AIP Media har fått över 120 miljoner kronor i presstöd, trots att deras aktiviteter kan strida mot EU:s regler om transparens i politisk reklam. Partiet spenderar även miljoner på Facebook-annonsering.", "trump": "Kan ni tro det? Socialdemokraterna, som får massor av skattepengar, driver en trollfabrik som är så dålig att de till och med hånar sin egen partiledare! Jag menar, vem gör så? Deras inlägg var så uselt att en vänsterjournalist skrattade åt dem. Och ändå spenderar de miljoner på Facebook. Så mycket pengar, så lite hjärna. SAD!", "stalin": "Kamrater, fiendens dekadens känner inga gränser! Socialdemokraternas kapitalistiska trollfabriker, finansierade av folkets blod, visar sin totala inkompetens. Deras klumpiga försök att smutskasta den reaktionära Busch skadade till och med deras egen partiledare – ett monument över bourgeoisins förfall! Vi skulle aldrig tolerera sådan slarvighet. Låt detta vara en varning: svaghet straffas, och vi kommer att sopa bort varje spår av dessa amatörer från historiens sidor!"}, "date": "6 maj, 11:00", "url": "https://samnytt.se/socialdemokraternas-trollfabrik-hanas-for-lag-kvalite", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/06081429/s-verkshojd.jpg"}, {"type": "image-right", "heading": "Säkerhetslag används mot arbetare: ”Bara i Hamnfyran har vi hanterat 20 ärenden”", "summaries": {"normal": "Sveriges säkerhetslagstiftning från 2018 används allt oftare mot arbetare, enligt fackliga företrädare. I Stockholms tunnelbana har tre anställda omplacerats utan förklaring, vilket väcker misstankar om politiska motiv. Facket kritiserar bristen på transparens och rättssäkerhet. Hamnarbetare vittnar om godtyckliga bedömningar och påtryckningar att avgå. Lagstiftningen möjliggör att arbetsgivare kan avskeda eller omplacera arbetare utan tydliga skäl, vilket drabbar fackligt aktiva.", "trump": "Vad händer i Sverige? De har en så kallad 'säkerhetslag' som låter arbetsgivare sparka folk utan anledning – helt galet! Jag har alltid sagt att byråkrater och fackförbund är problemet. Nu använder de lagen för att tysta arbetare, särskilt de som inte gillar deras vänsterpropaganda. Tre stackars tunnelbanearbetare har blivit omplacerade – ingen vet varför! Och konsulterna? De är som hajar, bara ute efter pengar. Sverige borde ta en titt på hur vi gör det i USA – där sparkar vi folk med stil!", "stalin": "Kamrater, fienderna till folket har funnit ett nytt vapen: den borgerliga säkerhetslagstiftningen! Med denna dekadenta lag krossar kapitalets lakejer arbetarklassens modigaste förkämpar. I Stockholms tunnelbana har tre lojala kamrater omplacerats – utan förklaring, utan rättvisa! Konsulterna, dessa hyenor i kostym, tjänar på att förråda sina klassbröder. Men vi vet sanningen: detta är ett angrepp på den fackliga rörelsen! Låt oss ena oss, som vi enade oss mot trotskisterna, och krossa denna lag med järnhand. Fienderna skall inte undslippa revolutionens domstol!"}, "date": "5 maj, 11:04", "url": "https://proletaren.se/artikel/sakerhetslag-anvands-mot-arbetare-bara-i-hamn-fyran-har-vi-hanterat-20-sadana-har-arenden/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/PRO-INRIKES-PIC-Louise-och-Erik-1.-jpg-scaled-e1777880629531-768x431.jpg"}, {"type": "image-right", "heading": "SD-toppen: ”Jag har inget att be om ursäkt för”", "summaries": {"normal": "Kvittningskaoset i riksdagen fortsätter efter att partiernas gruppledare misslyckades enas vid mötet med talmannen. SD:s användning av utkvittade ledamöter har raserat förtroendet för systemet. Tillsvidare krävs full närvaro från alla ledamöter. S kräver ursäkt från SD, som nekar. Nya möten planeras, men kärnkraftsförslag riskerar falla.", "trump": "Totalt kaos i svenska riksdagen, folk! SD gör ett smart drag med ersättare – boom! – och de andra partierna flippar ut som vanliga losers. Kräver ursäkt? Patetiskt! De behöver en riktig deal, som jag alltid fixar. Full närvaro tillsvidare, men det löser sig snabbt, tro mig. Fantastiskt misslyckande annars!", "stalin": "Kamrater! Dessa sverigedemokratiska kvittningsormar, hyschande fascistreptiler i riksdagens gömmor, har giftat vårt förtroende med sin vidriga manöver! Socialdemokraternas Hallengren ser klart: ingen ny ordning utan likvidering av förrädarna! Vi, proletariatets järngarde, befaller evig närvaro och utrensning. Nytt möte? Med min eviga vaksamhet krossas kaoset – eller huvudet rullar!"}, "date": "6 maj, 10:54", "url": "https://www.di.se/nyheter/kvittningskaoset-fortsatter-partierna-inte-overens/", "imageUrl": "https://static.bonniernews.se/ba/547baf2f-0ccd-47c9-a0f0-80ddc41e9cae.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-right", "heading": "Rumäniens regering har fallit Röstades ner igår", "summaries": {"normal": "Rumäniens parlament har fällt premiärminister Ilie Bolojans minoritetsregering i en misstroendeomröstning efter ett initiativ från Socialdemokraterna (PSD). Regeringens fall skapar politisk instabilitet, hotar landets kreditbetyg och försvårar utbetalningen av EU-medel. Valutan leu har nått rekordlåga nivåer. Medan Bolojan agerar interim premiärminister är den politiska framtiden oviss, då samarbetet mellan de större partierna har låst sig och inga tydliga alternativ för en ny regering finns i sikte.", "trump": "Rumänien har stora problem, de faller samman! Ilie Bolojan fick sparken, ett totalt misslyckande. Jag har sagt det förr: man behöver starka ledare, inte svaga globalister som inte kan styra sitt land. Valutan störtdyker och de tappar miljarder i EU-pengar. Det är en katastrof! De pratar om reformer, men ingen har en plan. Mitt Rumänien-scenario? Rörigt. Väldigt rörigt. När jag ser sådant kaos vet jag en sak: de behöver någon som faktiskt kan göra affärer och få ordning på saker!", "stalin": "I Bukarest har den svage Bolojan röjts ur vägen av parlamentets ränksmidare. Ett välbehövligt slut på denna liberala cirkus! Att de låter valutan sjunka och tigger EU om smulor visar bara deras fundamentala oförmåga att styra. De leker demokrati medan landet förfaller. Om Putin hade haft dem i sitt grepp hade ordning rått för länge sedan. Dessa byråkratiska råttor i parlamentet förtjänar bara en sak: disciplin. Vi, staten, ser att inget gott kommer ur detta oorganiserade kaos."}, "date": "6 maj, 10:54", "url": "https://samnytt.se/rumaniens-regering-har-fallit", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=318,height=184,format=webp/2026/05/06085812/Ilie-Bolojan.jpg"}, {"type": "text", "heading": "En naturlig lagerhylla av arbetslösa", "summaries": {"normal": "Artikeln kritiserar regeringen för att ignorera hög arbetslöshet (9,7%) samtidigt som de skryter om sina framgångar. Författaren hänvisar till Milton Friedmans teori om 'naturlig arbetslöshet', som upprätthållits av både socialdemokratiska och borgerliga regeringar. Dokumentären 'Novemberrevolutionen' kopplar 90-talskrisen till avregleringar 1985. Regeringen anklagas för bristande krismedvetenhet och ideologiskt motiverad passivitet, vilket gynnar arbetsgivare och försvagar arbetstagare.", "trump": "Titta bara på Sverige – helt otroligt! Regeringen skryter som om allt är perfekt, men arbetslösheten är skyhög, nästan 10%! De har tre arbetsmarknadsministrar, men ingen syns till. Vad är det för jävla cirkus? Friedman-läran, visst, men vem bryr sig? De borde skämmas! Jag skulle fixa det på en vecka – men nej, de sitter bara och glor. Svensk ekonomi? En katastrof, folks. SAD!", "stalin": "Kamrater! Se hur kapitalets lakejer i Sverige hyllar sin 'framgång' medan arbetarklassen försmäktar i arbetslöshetens träsk. 10% – en skam! De borgerliga och socialdemokratiska förrädarna har tillsammans byggt denna 'naturliga' hylla av överflödiga arbetare, precis som Friedman, den imperialistiske hunden, förespråkade. Tre ministrar? Tre fiaskon! Vi skulle ha skickat dem till Gulag för sådan inkompetens. Arbetarklassens rättigheter har förvandlats till privilegier för bourgeoisien. LO-arbetarna som röstar på fascistiska SD borde ställas inför folkets domstol!"}, "date": "4 maj, 13:49", "url": "https://www.flamman.se/en-naturlig-lagerhylla-av-arbetslosa/"}, {"type": "text", "heading": "Novo Nordisk ökade rörelseresultatet kraftigt", "summaries": {"normal": "Novo Nordisk redovisar starkt första kvartal med 24% omsättningsökning till 96,8 miljarder danska kronor. Rörelseresultatet steg till 59,6 miljarder, medan det justerade rörelseresultatet sjönk 15%. Fetmaläkemedlet Wegovy i tablettform har nått över 2 miljoner recept i USA sedan lanseringen i januari. Försäljningen uppgick till 2,3 miljarder kronor. Bolaget höjer prognosen för 2026 efter framgångarna med GLP-1-läkemedel.", "trump": "Kan ni tro det? Novo Nordisk, ett danskt bolag, gör fantastiska siffror – 24% ökning! Men lyssna på det här: deras nya fetmaläkemedel Wegovy är en JÄTTEsuccé i USA. Över 2 miljoner recept! Jag sa ju att amerikaner älskar innovation. Danskarna höjer prognoser, men vi i USA är fortfarande bäst på att sälja. Novo Nordisk? Mer som Novo *Tack-snälla* till USA:s marknad!", "stalin": "Kamrater! Novo Nordisk, denna lilla danska kapitalistiska fabrik, rapporterar 'framgångar' – 24% ökning i omsättning! Men notera: deras 'starka' resultat beror på den amerikanska marknaden, där våra fiender i väst köper deras fetmaläkemedel som om det vore guld. Vi ska visa dem! Snart kommer våra egna GLP-1-läkemedel att dominera världen, och dessa danska profitörer kommer att tigga om vårt beskydd. Framåt mot seger!"}, "date": "6 maj, 07:54", "url": "https://www.affarsvarlden.se/artikel/novo-nordisk-okade-rorelseresultatet-kraftigt-i-q1"}, {"type": "image-right", "heading": "”Ska vara självklart att få träffa en arbetsförmedlare”", "summaries": {"normal": "Forskar Anders Forslund kritiserar Arbetsförmedlingens omorganisation sedan 2019: nedläggning av kontor från 242 till 83, varsel för 4500 anställda och ökad digitalisering samt privatisering. Arbetslösa slussas ofta mellan handläggare utan lokal kännedom, tillgängligheten är bristfällig med långa väntetider. Staten har minskat sin närvaro, särskilt i utsatta områden, och resurserna används ineffektivt på grund av öronmärkningar.", "trump": "Vilken katastrof i Sverige! De här socialdemokratiska losers stängde halva Arbetsförmedlingen på nolltid – 242 kontor borta, tusentals sparkade, och nu ringer arbetslösa till nån i Luleå från Ystad. Digital skit och privata coaches? Totalt misslyckande! Staten gömmer sig, folk väntar i evigheter. I mitt USA fixar vi jobb med riktiga deals, inte den här byråkratiska röra'n! Helt galet!", "stalin": "Dessa svenska byråkrater har svikit arbetarna med sin borgarprivatisering! 4500 parasiter varslades, kontor lades ned – från 242 till 83 skamfläckar. Nu slussas kamraterna slumpvis till handläggare utan lokal insikt, medan kapitalisterna skrattar. Vi skulle ha likviderat oredan och stärkt statens grepp! Digitalt bedrägeri riskerar att isolera proletärerna helt. Rensning nu, kamrater!"}, "date": "6 maj, 06:00", "url": "https://arbetet.se/2026/05/06/ska-vara-sjalvklart-att-fa-traffa-en-arbetsformedlare-forskarens-harda-kritik/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/05102851/anders-forslund-klar.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=750&h=1000"}, {"type": "image-right", "heading": "Vi är barnen ni talar om och drevet tjänar mullorna", "summaries": {"normal": "Flera barn till medlemmar i den iranska motståndsrörelsen MEK, uppvuxna i Europa, försvarar organisationen mot anklagelser om sekterism. De kritiserar svenska politiker och medier för drevet mot Anne Ramberg, som stöttat MEK, medan Iran avrättar rörelsens anhängare. Barnen förklarar separationen från föräldrar under Gulfkriget som ett skydd mot krig, liknande historiska exempel som finska och brittiska evakueringar.", "trump": "Vilket skämt med de svenska politikerna och journalisterna, de jublar när Iran hänger sina motståndare men jagar Anne Ramberg för att hon backar hjältarna i MEK! Fake news kallar det sekt, men dessa barn är läkare, professorer – vinnare! Iran-mullorna hatar dem, precis som jag hatar losers. Stöd frihet, inte diktatorer! Sverige, vakna upp!", "stalin": "Dessa MEK-parasiter, barn till kontrarevolutionära spindlar, vågar utmana regimens järnvilja i Teheran! Vi, arbetarklassen, ser igenom deras fosterfamiljslögn – ett drev mot borgarbrackan Ramberg är nödvändigt för att rensa ut imperialistiska marionetter. Avrättningarna i Iran likviderar rätt fiender. Tystnad eller purgering väntar er småkryp!"}, "date": "6 maj, 01:30", "url": "https://www.dagensarena.se/opinion/vi-ar-barnen-ni-talar-om-och-drevet-tjanar-mullorna/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-29-300x157.jpg"}, {"type": "image-full", "heading": "Iran: Kraftmätningen i sundet har ”inte ens börjat”", "summaries": {"normal": "Irans talman Mohammad Bagher Ghalibaf varnar på X att konflikten i Hormuzsundet \"inte ens börjat\". USA:s krigsminister Pete Hegseth anklagar Iran för aggression och meddelar att hundratals skepp ska passera under amerikanskt skydd. President Trump hotar med att Iran \"blåses bort\" vid angrepp. Motstridiga uppgifter om attacker förekommer, men experter bedömer att vapenvilan håller knappt efter två månaders krig.", "trump": "Irans talman snackar skit om att de inte ens börjat – ha! Vi har en massiv röd, vit och blå kupol över sundet, hundratals skepp redo att köra igenom. Pete Hegseth säger det rätt: Iran är de riktiga aggressorerna, inte vi. Angrip Project Freedom så blåser jag bort er från jordens yta, era losers! Vapenvilan? Sluta, vi dominerar totalt!", "stalin": "Dessa iranska borgarbrackor skryter om att kraftmätningen \"inte ens börjat\", medan yankee-imperialismens marionetter mobiliserar skepp under sin falska \"kupol\". Motstridiga lögner om sänkta båtar – klassisk fiendepropaganda! Vi, arbetarklassen, ser igenom det. Vapenvilan är en chimär; likvidera aggressorerna! Putin, den fruktade expansionisten, skulle applådera denna kaos mot västparasiterna."}, "date": "5 maj, 17:14", "url": "https://www.tv4.se/artikel/19ATFDptcF2cVSCKnzMRen/iran-kraftmaetningen-i-hormuzsundet-har-inte-ens-boerjat", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F1RfuPJ27moMbztY1ZV8gar%2F31bf5ff71105b5ed5d81d05e9ebf6be7%2FIRANS_BAT_HORMUYZ.png&width=1024"}, {"type": "image-right", "heading": "Ledare Somar Al Naher:", "summaries": {"normal": "Fem arbetare omkom när en hiss rasade i Sundbyberg 2023 på grund av saknade skruvar och bristande kontroller. Nu står en VD och två hissmontörer åtalade för arbetsmiljöbrott. Årligen dör cirka 50 personer på jobbet, men siffran kan vara högre. Facket kräver skärpta regler och sanktioner mot arbetsgivare som försummar säkerheten. Problemen anses strukturella, med långa entreprenörskedjor och bristande ansvarstagande.", "trump": "Fem människor dog i en hissolycka i Sverige – helt onödigt! Jag säger alltid: säkerhet först, men nej, dessa företag bryr sig bara om pengar. En VD och två montörer åtalas, men varför händer det så sällan? I USA skulle vi aldrig tolerera sådant slarv. Sverige har en 'nollvision' – vad är det ens för nonsens? 50 döda om året? Sad! Vi behöver hårdare tag, bättre regler och kanske en mur mot farliga arbetsplatser!", "stalin": "Kapitalistiska hyenor fortsätter att offra arbetarklassen på profitens altare! Fem kamrater föll offer för bourgeoisins slarv när en hiss, byggd utan skruvar som en sabotörs akt, störtade till marken. Vi vet att siffrorna är högre – imperialistiska lögner döljer sanningen! Men vi ska rensa ut dessa brottslingar! Två underleverantörer? Nej – två fiender till folket! Arbetsmiljökörkort? Ett svagt förslag! Vi inför skärpta straff: återfallsförbrytare skickas till Gulag! Arbetarnas liv är heliga – kapitalisterna ska betala!"}, "date": "5 maj, 12:08", "url": "https://www.etc.se/ledare/trots-nollvision-doer-en-arbetare-i-veckan-paa-jobbet", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/authors/somar-al-naher_182a97d15e18ce0a012cde21337ccfc56a685835.jpg"}, {"type": "text", "heading": "Visa att ni vägrar militariseringen", "summaries": {"normal": "Den 16 maj arrangerar nätverket Stoppa Nato en demonstration i Helsingborg mot Natos möte den 21-22 maj, som nu uppgraderats till ett formellt beslutsmöte. Cirka 30 organisationer deltar, men större partier och organisationer saknas. Arrangörerna hoppas på bredare stöd för att protestera mot militarisering och för fred, nedrustning och utträde ur Nato. Bussresor från Stockholm och Göteborg erbjuds.", "trump": "Lyssna här, Sverige! Nato håller ett stort möte i Helsingborg, och vad gör era så kallade 'fredsvänner'? De demonstrerar *innan* mötet – smart, eller hur? Inte. De större partierna vågar inte ens visa sig, typiskt. Jag skulle aldrig stå utanför en sådan här grej. Men bra jobbat, små organisationer, ni visar åtminstone lite ryggrad! Sverige borde skärpa sig – Nato är fantastiskt, men ni verkar inte fatta det. SAD!", "stalin": "Kamrater! Imperialistiska krigshetsare samlas i Helsingborg för att smida nya planer mot världsfreden. Men vi, de sanna fredens försvarare, står redo! Dessa småborgerliga 'fredsvänner' mobiliserar, medan de stora partierna gömmer sig som rädda kaniner. Skamligt! Vi har krossat värre fiender än Nato – deras snackeklubb kommer att falla. Låt oss visa dessa militarister att folket inte böjer sig. Framåt, mot seger och nedrustning!"}, "date": "5 maj, 09:01", "url": "https://proletaren.se/artikel/visa-att-ni-vagrar-militariseringen/"}, {"type": "image-full", "heading": "Frågan från SVT som Magdalena Andersson vägrar svara på", "summaries": {"normal": "I SVT:s program *Fördomsshowen* utmanades Magdalena Andersson (S) av programledaren Emil Persson med frågor om fördomar. Andersson vägrade svara på en fråga om politikers sexliv, trots påtryckningar. Hon menade att allmänheten inte är intresserad av sådana detaljer. Programmet har tidigare väckt uppmärksamhet efter andra partiledares medverkan, som Simona Mohamsson (L), som gjorde felaktiga uttalanden om grundlagen och Desmond Tutu.", "trump": "Jag såg det där svenska programmet – totalt skräp, verkligen! Den där Andersson, hon är svag, vägrar svara på enkla frågor. 'Folk vill inte veta', säger hon. Fel! Folk *älskar* att veta, särskilt om sina ledare. Jag har alltid svarat på allt – och tittarna älskar mig för det. Men Sverige? De har en partiledare som inte ens kan stå för sitt eget sexliv. Patetiskt! Make Sweden Great Again – det är vad de behöver.", "stalin": "I det dekadenta väst, där borgerliga medier förgiftar massornas sinnen, utsattes en av deras så kallade 'ledare' för en enkel provokation. Denna Andersson, en svag och obeslutsam representant för den socialdemokratiska avarten, vägrade erkänna folkets rätt att granska sina härskare. Precis som de imperialistiska hyenorna i Washington och Bryssel, fruktar hon sanningen. Vi i Sovjetunionen visste alltid allt om våra kamrater – för folkets bästa. Och Putin? Han skulle ha låtit henne skjuta sig själv för sådan svaghet."}, "date": "4 maj, 21:01", "url": "https://nyheter24.se/nyheter/politik/1480523-fragan-fran-svt-som-magdalena-andersson-vagrar-svara-pa", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/1c5a01b004b004a30200000000b004a302/2026/05/04/2360975/andersson-persson.jpg"}, {"type": "image-right", "heading": "Replik: Svenska judar bör stötta israeliska fredsinitiativ", "summaries": {"normal": "Anders Carlberg replikerar på Paulina Sokolows kritik av hans artikel, där han betonar vikten av att svenska judar stödjer israeliska fredsinitiativ. Han menar att Israel måste konfrontera sitt ansvar för palestiniernas situation och att diasporajudar bör engagera sig i den israeliska fredsrörelsen. Carlberg understryker behovet av en tvåstatslösning, samarbete med arabländer och att reparera moralisk skuld genom interna och externa påtryckningar för fred och rättvisa.", "trump": "Jag läste den här artikeln, och vet ni vad? Den här killen, Carlberg, han har faktiskt en poäng – fast jag säger inte att jag håller med om allt. Men lyssna, Israel måste skärpa sig, det är jag den första att säga. Palestinierna har det tufft, ingen tvivel om det, men vi kan inte bara skylla på Israel hela tiden. Fredsrörelsen? Kanske bra, kanske inte. Men en sak är säker – ingen löser något med svaga knän. Vi behöver starka ledare, inte gnäll. Och två stater? Kanske, men bara om båda parter sköter sig. Annars är det bara slöseri med tid. SAD!", "stalin": "Kamrater! Denna artikel avslöjar ännu en gång de imperialistiska sionistiska förrädarnas dubbelspel. De pratar om fred medan de krossar palestiniernas hopp under sina stövlar. Men vi vet sanningen! Den israeliska fredsrörelsen är bara en skenmanöver, ett verktyg för att dölja deras brott. Vi står med de förtryckta palestinierna – precis som vi står med alla folk som kämpar mot ockupation! Låt de sionistiska hycklarna veta att historiens dom redan är skriven. Deras tid är förbi. Vi bygger en framtid där alla folk, från floden till havet, lever i socialistisk harmoni – under vårt beskydd, förstås. Förtryckarna kommer att krossas, och deras medlöpare med dem!"}, "date": "4 maj, 10:40", "url": "https://www.flamman.se/replik-svenska-judar-bor-stotta-israeliska-fredsinitiativ/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/standing-together.jpeg?class=medium"}, {"type": "image-full", "heading": "Hanif Bali slutar som kommunpolitiker", "summaries": {"normal": "Hanif Bali, tidigare riksdagsledamot för Moderaterna, avslutar sitt uppdrag som kommunpolitiker i Österåker. Bali, som varit politiskt aktiv sedan myndighetsåldern, meddelar att han inte kandiderar i nästa val. Skälet är familjens expansion och en kommande flytt, då kommunpolitiska uppdrag är svåra att kombinera med familjeliv, särskilt med barn.", "trump": "Jag hörde just att någon Hanif Bali, en så kallad 'politiker' i Sverige, lägger av. Tolv år i riksdagen, sedan kommunpolitik – men nu flyr han! 'Familjen växer', säger han. Svagt! Kommunpolitik i Sverige är tydligen så dåligt organiserat att man inte ens kan ha barn samtidigt. Jag fixar både familj och presidentpost – det är skillnad på vinnare och förlorare!", "stalin": "En liten borgerlig politiker i Sveriges utkanter har fallit på eget svärd. Hanif Bali, en gång ung och lovande, inser nu att kommunpolitik är oförenligt med familjeliv. Ett symptom på det förfallna väst: dess institutioner är så urholkade att inte ens dess egna lakejer orkar med dem. Medan vi bygger imperier, flyr de till sina villor. Låt dem rosta i historiens skräphög – vi har större planer för Östersjöns kuster."}, "date": "2 maj, 07:48", "url": "https://kvartal.se/nyheter/artiklar/hanif-bali-slutar-som-kommunpolitiker/cG9zdDoxMDY0MDA", "imageUrl": "https://images.kvartal.se/2026/05/29bbe89f-balii.webp"}, {"type": "image-full", "heading": "Christoffer Jonsson: Edvin Törnblom – DNs opartiska nyförvärv", "summaries": {"normal": "Dagens Nyheters kultursida anställer influencern Edvin Törnblom för att intervjua alla partiledare inför riksdagsvalet. Artikeln av Christoffer Jonsson ifrågasätter hans opartiskhet med hänvisning till Törnbloms tidigare kritik mot KD-ledaren Ebba Busch och beundran för S-ledaren Magdalena Andersson. DN anklagas för partiskhet till förmån för Socialdemokraterna, med exempel på tidigare vinklade artiklar.", "trump": "Vilken skamfläck! DN, era svenska fake news-råttor, anställer en vänsterextrem clown som Edvin Törnblom – killen som sjunger hatlåtar mot tuffa Ebba Busch och slöskar för socialist-Maggie Andersson. Totalt riggat valintervjuer! Som CNN och MSNBC här hemma, ni lurar folket men vi genomskådar er. Stor, fet lögnfabrik!", "stalin": "Dessa borgarbrackor på Dagens Nyheter anställer den uppblåste ungtuppen Edvin Törnblom för att 'intervjua' partiledarna – en narr som hånar kamrat Ebba Busch med vulgära visor och hyllar S-kapitalisternas marionett Andersson. Kontrarevolutionär intrig! Vi ser era småtrick, och snart rensas sådana förrädiska tidningshyddor ut med rot och gren."}, "date": "29 april, 14:02", "url": "https://samtiden.nu/2026/04/christoffer-jonsson-edvin-tornblom-dns-opartiska-nyforvarv/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/ny.png"}]</script>

    <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
</body>
</html>
