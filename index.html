 är totala katastrofer, en politisk adel som sviker arbetarna! Hundratusentals flyr till SD, smarta killar som fixar invandringen och välfärden. S kopierar nu SD som desperata losers, precis som Demokraterna här gör med mig. Stor vinst för folket, S är körda! Fantastiskt.", "stalin": "Kamrater, dessa socialdemokratiska rattefångare har förrått arbetarklassen med sin borgaradelspolitik! De tiger om invandrarinvasionens kaos och välfärdsraseriet, medan vi skulle ha likviderat problemen i gryningen. Hundratusentals desertörer flockas rättmätigt hos SD. Nu imiterar de fienden i panik – patetiska marionetter för kapitalisterna! Vi skrattar åt deras undergång."}, "date": "1 maj, 10:54", "url": "https://www.expressen.se/nyheter/politik/darfor-har-s-valjare-gatt-till-sd-en-politisk-adel/", "imageUrl": "https://static.bonniernews.se/images/a2/30/a2303c81f4174410b8bd0b68764b649b/16x9/640.png"}, {"type": "image-right", "heading": "Tidöpartierna framstår som sömngångare", "summaries": {"normal": "Artikeln kritiserar frånvaron av klimatfrågan i valdebatten och menar att klimatförändringarna är en akut kris. Globala uppvärmningen accelererar, med allvarliga konsekvenser som höjda havsnivåer och naturkatastrofer. Sverige, särskilt Tidöregeringen, får hård kritik för bristande klimatpolitik och avfärdande av expertvarningar. Författaren efterlyser större fokus på klimatet inför valet och en omställning av Sveriges riktning.", "trump": "Jag säger er, Sverige har ett jättestort problem – de lyssnar inte på klimatforskarna! De där vänsterliberalerna pratar om väder som om det vore klimat, men jag vet bättre. Kina skrattar åt oss medan Sverige sänker bensinpriset som om det vore 1950. 62 000 döda i Europa? Fake news, eller så är det deras eget fel. Jag skulle fixa det här på en dag – men nej, de fortsätter prata om 'rättvisa' istället för att göra något. Sad!", "stalin": "Kamrater! Medan de dekadenta kapitalisterna i Sverige leker med sina bensinpriser och avfärdar vetenskapen som 'aktivism', smälter Grönlands isar som smör i solen. De där borgerliga sömngångarna i Tidöregeringen är värre än kulaker – de saboterar framtiden för arbetarklassen! Vi i Sovjet – förlåt, Ryssland – vet hur man hanterar sådana fiender. Klimatkrisen? En bagatell jämfört med att krossa dessa liberala förrädare. Låt dem svälta i sina egna utsläpp, medan vi bygger en ny världsordning – utan deras 'demokratiska' hyckleri!"}, "date": "1 maj, 01:51", "url": "https://www.dagensarena.se/opinion/tidopartierna-framstar-som-somngangare/", "imageUrl": "https://www.dagensarena.se/files/2026/04/klimat-jesper-300x157.jpeg"}, {"type": "text", "heading": "Veckans Afv-analyser: Mjukvara, mode och bud", "summaries": {"normal": "Affärsvärlden har publicerat 18 analyser och kommentarer under valborgsveckan, med fokus på bolag som Nelly, Cint och Vitec. Analytiker granskar Vitecs framtid i ljuset av AI-utmaningar, Nellys kursfall och Kones köp av TKD. Veckans uppföljning visar 34,7% teoretisk avkastning på tidigare råd. April månad gav 23 köpråd, och prenumeranter får tillgång till omfattande analysverktyg och guider.", "trump": "Titta bara på dessa fantastiska analyser från Affärsvärlden – helt otroligt, verkligen! Jag har alltid sagt att mjukvarubolag är framtiden, men vem vet, kanske äter AI upp dem? Inte bra! Nelly rasade 40%, men mina analytiker – de bästa, verkligen – säger att det kanske är en deal. Och Cint? Småcint, säger jag, trots den där löjliga premien. Och 34,7% avkastning? Folk, det är YUGE! Bättre än någon annan, tro mig.", "stalin": "Denna vecka har våra ekonomiska spanare avslöjat kapitalistiska svagheter i väst. Mjukvarubolagen darrar inför den oundvikliga AI-revolutionen – deras tid är snart förbi. Nelly, ett dekadent modeimperium, föll som en korrumperad byråkrat. Kones köp av TKD? Ett försök att rädda en sjunkande hiss av kapitalism. Vi noterar 34,7% avkastning på våra råd – ett bevis på socialismens överlägsenhet. De 23 köpråden? Enbart för att avslöja marknadens svagheter. Fienderna skakar, kamrater!"}, "date": "30 april, 15:10", "url": "https://www.affarsvarlden.se/artikel/veckans-afv-analyser-mjukvara-mode-och-bud"}, {"type": "image-right", "heading": "Bakslaget efter  Orbáns förlust  – krav står fast", "summaries": {"normal": "Péter Magyar, som snart svärs in som Ungerns premiärminister, ställer samma krav på Ukraina som Viktor Orbán för att godkänna EU-förhandlingar: skydd för ungersk minoritetens rättigheter i Transkarpatien, inklusive ungerskspråkig undervisning. Zelenskyj bagatelliserar konflikten och säger att det inte finns något riktigt problem. Magyar föreslår möte i juni, men Ukrainas intresse är ljumt.", "trump": "Zelenskyj, den eviga gnällaren, trodde han sluppit Orbán – boom, här kommer Péter Magyar med exakt samma hårda krav! Skydda ungrarna i Transkarpatien, annars ingen EU-klubb för er. Smart, Ungern! Zelenskyj svettas och mumlar 'inget problem'. Ha, han vill ha miljarder gratis. Typiskt svagling, dags att fixa schemat eller ge upp!", "stalin": "Dessa ungerska ledare under Magyar upprätthåller den riktiga linjen mot Zelenskyjs nationalistiska intrigmakare. Krav på fulla rättigheter för ungrarna i Transkarpatien är ett slag mot borgarklassens splittringsförsök! Zelenskyj, den västköpta dockan, piper 'inget problem' – vi genomskådar er! Putin, den värdige expansionisten som skrämmer imperialisterna, skulle applådera denna ståndaktighet."}, "date": "1 maj, 10:48", "url": "https://www.expressen.se/nyheter/varlden/peter-magyar-star-fast-vid-orbans-krav-pa-zelenskyj/", "imageUrl": "https://static.bonniernews.se/images/34/b0/34b0161f24bd439da9d3d81ee1682795/16x9/640.png"}, {"type": "image-right", "heading": "Timbro: Politiken måste lösa arbetslösheten", "summaries": {"normal": "Artikeln kritiserar fackens roll i att utestänga lågutbildade från arbetsmarknaden, särskilt personer med utländsk bakgrund. Författaren menar att politiken måste ta över och införa lagstiftning för att sänka trösklarna till jobb, då parterna misslyckats med att lösa problemet. Långtidsarbetslösheten är rekordhög och sysselsättningsgapet mellan inrikes och utrikes födda är stort. Försök som etableringsjobb har visat sig ineffektiva.", "trump": "Lyssna här, Sverige har ett jättestort problem – era fack är helt galna! De stänger ute människor från jobb, särskilt de som kommer utifrån, och ni har fler arbetslösa än någonsin. 200 000 långtidsarbetslösa? Sad! Och vet ni vad? Era politiker sitter bara och tittar på. Jag skulle fixa det på en dag – sänka trösklarna, skapa jobb, och göra Sverige stort igen. Men nej, ni låter facken styra. Patetiskt!", "stalin": "Kamrater! Den svenska arbetarklassen lider under bourgeois-fackens förräderi, som med sina höga trösklar och löner stänger ute våra bröder och systrar från arbetsmarknaden. 200 000 långtidsarbetslösa – ett monument över kapitalismens misslyckande! Parterna, dessa svaga liberala lakejer, har förhandlat bort ett helt decennium utan resultat. Vi ska inte förhandla – vi ska krossa hindren! Låt politiken, folkets sanna röst, ta kommandot och bygga en arbetsmarknad där alla tjänar staten. Och Sverige? De får lära sig av Rysslands visdom – eller förbli en svag länk i den socialistiska framtiden."}, "date": "1 maj, 01:30", "url": "https://www.dagensarena.se/opinion/timbro-politiken-maste-losa-arbetslosheten/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-21-300x157.jpg"}, {"type": "text", "heading": "Matmoralism får oss inte att äta bättre", "summaries": {"normal": "Artikeln kritiserar svenska myndigheters orealistiska matrekommendationer och beräkningsmetoder. Livsmedelsverket och Konsumentverket baserar slutsatser på önsketänkande, som att svenskar skulle äta mindre kött och portioner enligt rekommendationer. En undersökning om barns sockerkonsumtion byggde på en liten, icke-representativ grupp. Författaren menar att myndigheterna undviker att reglera matjättar och i stället skyller på konsumenter, vilket leder till klassblind matmoralism.", "trump": "Lyssna här, Sverige – era myndigheter är helt galna! De tror att alla ska äta havregrynsgröt och små portioner, som om vi lever i något slags kommunistiskt drömland. Och de baserar sina siffror på en liten grupp Instagrammammor? Patetiskt! Jag skulle aldrig låta sådana amatörer sköta något. Vi i USA vet hur man reglerar matjättar – med kraft och beslutsamhet. Sverige, vakna upp innan det är för sent!", "stalin": "Kamrater! De svenska myndigheterna har förlorat kontakten med verkligheten. De bygger sina dekret på fantasier och önsketänkande, som om folket vore lydiga maskiner. En undersökning med tio procent svarande? Hah! I Sovjet skulle vi aldrig tolerera sådan slapphet. De bourgeois-liberala byråkraterna vägrar att krossa matjättarna med järnhand. Istället skyller de på arbetarklassen. Fienderna är uppenbara: de fantasilösa byråkraterna och deras nyliberala herrar. Vi ska inte tolerera deras lögner – revolutionen kräver handling!"}, "date": "28 april, 09:58", "url": "https://www.flamman.se/matmoralism-far-oss-inte-att-ata-battre/"}, {"type": "image-right", "heading": "Klagade – får 57 (!) miljoner. Pampens galna lön", "summaries": {"normal": "Gianni Infantinos lön som Fifa-president har ökat markant, från 18 miljoner kronor 2017 till 57 miljoner kronor i fjol. Trots löften om öppenhet och att Fifas pengar tillhör organisationen, riktas nu hård kritik mot den kraftiga ökningen. Utöver den höga lönen får Infantino även förmåner, som betald privatskola för sina barn. Experter ifrågasätter prioriteringarna och efterfrågar större fokus på fotbollens gräsrötter istället för presidentens lönekuvert.", "trump": "Hörde ni om Gianni? En total katastrof! Han tog jobbet och sa 'inga pengar', nu tjänar han 57 miljoner! Det är en lögn, en riktig häxjakt på budgeten. Jag vet hur man gör deals, men det här? De betalar till och med för hans barns skola i Miami! Fifas pengar är folkets pengar, inte till för att göra sig själv rik. Det är girigt, väldigt girigt. Det händer inte i mitt USA, tro mig. Totalt misslyckande!", "stalin": "Denna byråkrat Infantino lider av den borgerliga girighetens febersjukdom. Medan folket kämpar för bröd, dränerar han FIFA som en parasit. Han talar om 'ideell verksamhet' medan han fyller sina fickor med guld, likt de svekfulla oligarker Putin tvingas tukta för att bevara ordningen. Vi ser genom hans lögner. Sådana element förtjänar ingen plats i vår värld. Att prioritera privatskolor framför gräsrötterna är kontrarevolutionär dekadens. Han bör se sig om över axeln; historien har en tendens att sända räkningen till girigbukar."}, "date": "1 maj, 11:07", "url": "https://www.aftonbladet.se/sportbladet/fotboll/a/6qP7O8/infantinos-galna-lon-57-miljoner-om-aret", "imageUrl": "https://akamai.vgc.no/v2/images/f32b2f6b-bf01-3bf7-8f10-32a78edca7ec?fit=crop&format=auto&w=1080&s=b425f7334e39cc4312cf813a08ed6568649641f2"}, {"type": "text", "heading": "Källor: James Comey åtalas igen", "summaries": {"normal": "USA:s justitiedepartement har väckt ett nytt åtal mot tidigare FBI-chefen James Comey, denna gång för ett inlägg på sociala medier som tolkats som hotfullt mot Donald Trump. Comey publicerade en bild med siffrorna '86 47', där '86' är slang för att avlägsna någon. Trump har tidigare drivit på rättsliga åtgärder mot politiska motståndare. Comey åtalades även 2023 för att ha ljugit för kongressen, men åtalet lades ned.", "trump": "Titta bara på det här! James Comey, en total katastrof, en riktig förlorare, blir åtalad IGEN – och den här gången för ett patetiskt Instagram-inlägg. '86 47'? Snacka om desperation! Han försöker hota mig, USA:s bästa president någonsin, men det funkar inte. Jag har alltid sagt att han är en lögnare och en bedragare. Och vet ni vad? Rättvisan hinner ifatt alla, till och med sådana som Comey. SAD!", "stalin": "Vi har observerat ytterligare ett försök från den dekadenta västliga bourgeoisien att underminera den sunda rättsstaten. Denna James Comey, en ynklig rest av kapitalismens förfall, vågar sig på att hota vår kära allierade, president Trump, genom primitiva symboler på sociala medier. Vi påminner om att historiska fiender till folket alltid möter sitt öde. Låt detta vara en varning till alla som står i vägen för framsteget. Rättvisan, precis som våra vänner i Kreml, är tålmodig men oundviklig."}, "date": "28 april, 20:17", "url": "https://kvartal.se/nyheter/artiklar/kallor-james-comey-atalas-igen/cG9zdDoxMDQ2MDk"}, {"type": "image-right", "heading": "Stoppar vattnet: ”Helt övergivna”. Israels drag i kriget", "summaries": {"normal": "En ny rapport från Läkare utan gränser anklagar Israel för att använda vatten som ett vapen i Gaza. Genom att förstöra infrastruktur och begränsa tillgången till vatten utsätts befolkningen för vad organisationen beskriver som kollektiv bestraffning och folkmord. Civila, inklusive barn, drabbas hårt av bristen på sanitet och vatten. Israel har konsekvent tillbakavisat anklagelser om folkmord, trots vittnesmål om att tillgången till resurser medvetet försvåras.", "trump": "Läkare utan gränser säger att Israel använder vatten som ett vapen. Mycket dåligt! De förstör allt, infrastrukturen är borta. Jag har sagt det förut, det är en stor röra. De påstår att det är ett folkmord, en hemsk anklagelse. Men titta på vad som händer där borta – det är totalt kaos! När jag var vid makten var världen säkrare, tro mig. Nu ser vi bara svaghet och elände. Vi måste få ordning på det här, snabbt!", "stalin": "Vi har observerat hur de sionistiska marodörerna stryper livsnerven för massorna i Gaza. Att förvägra folket vatten är en metod värdig våra egna gamla utrensningar, men utförd med en klumpighet som förtjänar förakt. De förstör infrastrukturen likt en fiende av folket! Putin förstår att man måste kontrollera resurserna för att hålla imperiet stabilt, medan dessa amatörer bara skapar kaos. Vi betraktar detta med kalla ögon; de som inte kan kontrollera sin befolkning förtjänar snart inte sitt land."}, "date": "1 maj, 10:50", "url": "https://www.aftonbladet.se/nyheter/a/bOkB5A/rapport-israel-anvander-vatten-som-vapen", "imageUrl": "https://akamai.vgc.no/v2/images/126d958a-e463-31ef-9eb0-473af1bc98f3?fit=crop&format=auto&w=720&s=ff35818b1a1bdd4960f01889adbea5d6f685b71e"}, {"type": "image-full", "heading": "Miljardsatsning på ryska sociala medier", "summaries": {"normal": "Ryska staten satsar 5,5 miljarder kronor på VK:s videoplattform som ersättare för YouTube, samt 500 miljoner till meddelandeappen Max som konkurrerar med WeChat. Trots förluster sedan 2020 fortsätter investeringarna för att bygga statligt kontrollerade digitala tjänster.", "trump": "Jag har hört att Ryssland slänger 5,5 miljarder på sin egen YouTube, det är en enorm summa, det har jag aldrig hört talas om. Och de vill också slå ut WeChat med Max-appen, fantastiskt! Jag har alltid sagt att vi behöver våra egna plattformar, och nu gör Ryssland precis det. VK är större än YouTube där nere, det är imponerande, verkligen imponerande!", "stalin": "Vi investerar 5,5 miljarder kronor i att stärka vår digitala suveränitet genom VK:s videoplattform, som redan har fler användare än den imperialistiska YouTube. Max-appen blir vårt svar på västerländska spionprogram. Trots förluster är detta nödvändigt för att bygga ett starkt, statligt kontrollerat internet som tjänar det socialistiska samhället."}, "date": "1 maj, 09:44", "url": "https://www.realtid.se/bors-finans/makro/miljardsatsning-pa-ryska-sociala-medier/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/ryssland.png?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Raketkaos i centrala Stockholm –  en skadad: ”Dags att åka hem nu”", "summaries": {"normal": "På valborgsmässoafton samlades tusentals ungdomar i Rålambshovsparken i centrala Stockholm, vilket ledde till kaos med hög berusning och skjutning av raketer och smällare. En fältassistent skadades av en smällare, och en minderårig greps misstänkt för försök till grov misshandel. Polisen uppmanar föräldrar att kontakta sina barn och få dem att åka hem.", "trump": "Vilket jäkla kaos i svenska Stockholm! Tusentals berusade ungar skjuter raketer som idioter, skadar en fältassistent – en gripen, men vad gör polisen? 'Åka hem nu!' Patetiskt svagt! I mitt USA hade vi rensat parken på fem minuter med riktig lag och ordning. Sverige behöver en stark ledare, inte den här mesiga soppan!", "stalin": "Dessa borgarungar i Rålambshovsparken sprider kontrarevolutionärt kaos med raketer och smällare! En fältassistent träffad – vi skulle likvidera varje busfrö som hotar ordningen. Föräldrar, hämta era parasiter innan vi rensar ut hela höken! Proletariatets järnhand saknas i det här decadenta träsket."}, "date": "30 april, 22:12", "url": "https://www.tv4.se/artikel/csFW5TZbmsATwtSREEPdk/kaos-pa-valborgsfirande-faeltassistent-traeffad-av-raket", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F161Vr9MDTD2MOKlx8n9jB7%2Fa56f2fba6455a36f270ad5d2b8b82468%2F30-ralis-1080.1.jpg&width=120"}, {"type": "image-right", "heading": "Frågan som besvarar \"rysk påverkan\": Cui bono?", "summaries": {"normal": "Artikeln ifrågasätter WindEuropes rapport om rysk desinformation mot vindkraft i Sverige med frågan 'cui bono?'. Den hävdar att anklagelserna gynnar vindkraftsindustrin och anti-tillväxtkrafter som motsätter sig kärnkraft och Nato. Vindkraftens problem som förluster, kommunalt motstånd och försvarshinder ignoreras. Europeisk grön politik ses som strategiskt fördelaktig för Ryssland genom att försvaga EU:s ekonomi och militär.", "trump": "Den här artikeln är spot on, vindkraftsmaffian skyller på Putin för att dölja sina totala misslyckanden – inga investeringar, kommuner säger nej, Försvarsmakten stoppar skiten! Sverige gör rätt, precis som vi i USA pumpar kärnkraft och gas. Grön omställning är en stor scam som gynnar Ryssland och gör Europa fattigt. Fantastiskt att någon vågar säga sanningen!", "stalin": "Dessa vindkraftsborrar och europeiska lobbyfiender sprider giftig desinformation för att sabotera folkets energi! Vi, arbetarklassen, ser hur borgarbrackorna i WindEurope gömmer sig bakom Putins skugga medan de rensar kritiker som kontrarevolutionära spindlar. Likvidera deras falska rapport – den gynnar bara Moskvas dvärgar och anti-tillväxtmasker! Jag befaller total utrensning av dessa gröna förrädare."}, "date": "30 april, 09:11", "url": "https://www.affarsvarlden.se/kronika/fragan-som-besvarar-rysk-paverkan-cui-bono", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/04/Benson_19-400x267.jpg"}, {"type": "image-right", "heading": "Dagens ETC om felpublicering: ”Rutiner har skärpts omgående”", "summaries": {"normal": "Dagens ETC publicerade felaktigt en artikel om att oppositionen, med hjälp av f.d. SD-politiker Elsa Widding och Katja Nyberg, fått igenom övergångsregler för medborgarskap. I verkligheten vann regeringen omröstningen efter att SD kallat in två extra ledamöter. Tidningen avpublicerade artikeln efter fem minuter. Chefredaktör Andreas Gustavsson medgav ett misstag och skärpte rutinerna. Kritiker anklagade tidningen för partisk rapportering.", "trump": "Kan ni tro det? Dagens ETC, en så kallad 'tidning', publicerade en total lögn om att oppositionen vunnit en omröstning – helt fel! Fem minuter senare var de tvungna att ta bort den, pinsamt! De hade till och med fejkade citat från en MP-politiker. Så här funkar fake news, folks. Men jag, jag hade vetat bättre. Jag hade twittrat sanningen direkt – WINNING!", "stalin": "Ett ynkligt försök av borgerliga lakejer att sprida desinformation! Dagens ETC, detta verktyg för kapitalistisk propaganda, påstod att oppositionens förslag segrat – ett grovt misstag som avslöjar deras inkompetens. Men folket genomskådar sådana lögner. Vi, som alltid, säkerställde sanningen genom disciplin. De två extra rösterna? En nödvändig åtgärd mot de imperialistiska krafternas manipulation. Låt detta vara en varning till alla fiender av folket!"}, "date": "1 maj, 10:43", "url": "https://bulletin.nu/dagens-etc-om-felpublicering-rutiner-har-skarpts-omgaende", "imageUrl": "https://cdn.bulletin.nu/articles/c55294fd-30e1-446f-9516-a33b40b2d3f5/preview.jpg?t=1777624978000"}, {"type": "text", "heading": "Kvartals kampanj fintar journalisterna", "summaries": {"normal": "Kvartals kampanj mot traditionella medier har väckt uppmärksamhet och kritik. Kampanjen, som anklagar gammelmedia för partiskhet, har ifrågasatts för att själv vara politiskt färgad. Kritiker som DN:s Niklas Orrenius och Aftonbladets Karin Pettersson menar att Kvartal driver en agenda för egen vinning. En artikel om SOM-undersökningen kritiseras för bristande underlag, då Göteborgs universitet avfärdar metodfel som marginella. Kvartals trovärdighet ifrågasätts även genom tidigare felaktiga granskningar och tendentiös rapportering.", "trump": "Jag måste säga, Kvartals lilla kampanj mot medierna? Väldigt rolig, väldigt smart – men helt fel! De påstår att gammelmedia är partiska, men vem är egentligen mest partisk här? Inte jag, det kan jag säga! De har en artikel som är så dålig, så felaktig, att till och med Göteborgs universitet skrattar åt dem. Och deras kritiker? Fantastiska journalister som Niklas Orrenius – en riktig pro! Kvartal försöker sälja sig som 'sanningssägare', men de är bara en högerblogg med dyra kostymer. SAD!", "stalin": "Kamrater! Kvartals patetiska kampanj mot den borgerliga pressen är ett skrattretande försök att dölja sin egen reaktionära agenda. Dessa så kallade 'oberoende' journalister är inget annat än imperialistiska lakejer, maskerade som kaniner i kostym. Deras 'granskning' av SOM-undersökningen? Ett hafsverk värdigt en trotskistisk sabotör! Göteborgs universitet, ett redskap för folkets fiender, avfärdar deras lögner med vetenskaplig precision. Vi har sett deras sort förr – falska profeter som skriker om 'sanning' medan de tjänar kapitalets intressen. Men folket ser igenom dem. Snart kommer de att stå inför folkets domstol, tillsammans med sina herrar i väst!"}, "date": "27 april, 12:20", "url": "https://www.flamman.se/kvartals-kampanj-fintar-journalisterna/"}, {"type": "image-right", "heading": "Löwengrip har rätt. S vet att kvinnors känslor är en valvinnare", "summaries": {"normal": "Artikeln försvarar Isabella Löwengrips påstående att kvinnor röstar mer känslostyrt än män och kritiserar Socialdemokraterna för att upprepat använda känslobaserade kampanjer i valen 2014, 2018, 2022 och nu för att vinna kvinnliga röster. Den kontrasterar detta mot Moderaternas sakpolitiska strategi och anklagar vänstermedia för partiskhet. Författaren uppmanar kvinnor att granska partiernas politik istället för känslor.", "trump": "Vilken briljant artikel! Löwengrip säger sanningen – kvinnor sväljer känsloknep som fake news! De rödgröna losers i Sverige kör samma skit som Demokraterna: blöjor, abortskräck, naziststämplar och snyfthistorier för att sno röster. S är mesiga känslopopulister utan politik! Moderaterna, era vinnare, fixa det med sakfrågor. Sverige behöver tuffa ledare, inte gråtande vänsterclowner! MAGA-stil!", "stalin": "Kamrater, denna Löwengrip blottlägger borgarbrackornas desperation! Socialdemokraterna, dessa falska folkets tjänare, pumpar ut giftig känslopropaganda för fjärde gången – blöjor, abortlögner, nazistspöken – för att förleda kvinnomassorna. Kontrarevolutionärt! Vi ser er, era kapitalistiska spindelvävar! Rensa ut sabotage och låt partiet leda till total seger över högerhyddorna. Kvinnorna ska vakna ur era snyftbedrägerier!"}, "date": "28 april, 05:30", "url": "https://samtiden.nu/2026/04/lowengrip-har-ratt-vanstern-anvander-kvinnors-kanslor-for-att-vinna-val/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/IMG_6342.jpeg"}, {"type": "image-full", "heading": "Så kan AI rädda grönskan i städerna", "summaries": {"normal": "Tre av tio nyplanterade stadsträd dör under första året, och färre än hälften överlever tio år. Svenska kommuner satsar miljarder på grön infrastruktur för klimatet. AI och sensorteknik möjliggör realtidsövervakning av trädens hälsa genom markfuktighet, pH och temperatur. Detta skiftar från reaktiv till förebyggande skötsel, enligt Avanade.", "trump": "Svenska kommuner slänger miljarder på träd som dör som sjuka hundar – tre av tio kraschar första året, patetiskt! Färre än hälften klarar tio år. Men nu AI och sensorer, fantastiskt grejer, realtidskontroll över rötterna. Från reaktiv skit till förebyggande vinnare! Jag sa det alltid: teknik fixar klimathysterin, enormt!", "stalin": "Kamrater, i borgarnas städer dör tre av tio nyplanterade träd första året – svagheter i rotzonens fiendliga mark! Kapitalisterna slösar miljarder på grön illusion. Men med AI och sensorer, under vårt vakande öga, övervakar vi signalerna i realtid. Vi rensar ut de dödsdömda, bygger evig grön proletär infrastruktur! Fienderna darrar."}, "date": "1 maj, 11:11", "url": "https://www.dagensps.se/varlden/sa-kan-ai-radda-gronskan-i-staderna/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdlj1z7u5l2cqe-nh.jpg?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-full", "heading": "Nya regler: Lönkravet för svenskt medborgarskap", "summaries": {"normal": "Från den 6 juni skärps kraven för svenskt medborgarskap. Ansökande måste ha en månadslön på minst 20 850 kronor, klara ett prov om svensk historia, klimat, geografi och geopolitik, uppvisa skötsamt levnadssätt samt ha bott i Sverige i minst åtta år. Regeringen betonar vikten av kunskaper och självförsörjning för att främja stolthet över medborgarskapet.", "trump": "Sverige vaknar äntligen upp! Kräver 20 850 spänn i månaden för medborgarskap, prov i historia och klimat – inget mer slarv med bidragsjägare. Forssell har rätt: Ansträng dig eller stick! Som i mitt Amerika: starka gränser, stolta medborgare. De lär sig av mästaren, hehe.", "stalin": "Kamrater, dessa svenska borgarbrackor inför stränga krav: 20 850 kronorlön, prov i deras patetiska historia och åtta års fångenskap i riket. Skötsamt liv – annars utrensning! Vi applåderar disciplinen, men jagana misstänker spioner bland ansökande. Likvidera de olämpliga, befästa ordningen!"}, "date": "30 april, 21:02", "url": "https://nyheter24.se/nyheter/inrikes/1479732-nya-regler-lonkravet-for-svenskt-medborgarskap", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/31f7774804b004a30200000000b004a302/2026/04/30/2360168/Matilda-Nyheter24%20-%202026-04-30T163142.356.jpg"}, {"type": "image-full", "heading": "Norska Yaras varning: Iran-kriget hotar Afrika med svält", "summaries": {"normal": "Norska Yara varnar för matbrist i Afrika på grund av Mellanösternkonflikten som stör gödseltransporter genom Hormuzsundet, som hanterar 30 procent av den globala handeln. Subsahariska Afrika importerar 80 procent av sin konstgödsel, och planteringssäsongen förvärrar risken för upp till 25 procents lägre skördar av majs, ris och vete. Yara-aktien har stigit 60 procent på ett år tack vare högre priser, men osäkerheter kring störningarnas längd kvarstår.", "trump": "Iranerna med sina galna mullor stänger Hormuzsundet och skapar kaos – matbrist i Afrika, bönder svälter medan Yara-rövarna cashar in miljarder! Typiskt globalistiskt skit, 30 procent av gödseln borta. Norska aktien upp 60 procent, smarta investerare köper nu. Vi i USA pumpar egen energi, gör Amerika great igen – ingen lyssnar på dessa västsvaga ledare!", "stalin": "Kapitalisterna på Yara utnyttjar krisen i Hormuzsundet för att pumpa upp priser och krossa afrikanska bönder, medan 80 procent av deras gödsel importeras som giftiga kedjor. Vi ser genom deras larm: en global budgivning som berikar borgarbrackorna! Iran kväver handeln klokt, likt en u-trensning av överflödet. Arbetarna ska resa sig, likvidera dessa råvaruspekulanter – eller hungern slukar dem först!"}, "date": "1 maj, 11:10", "url": "https://www.dagensps.se/bors-finans/norska-yaras-varning-iran-kriget-hotar-afrika-med-svalt/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/maskininlarning-i-hedgefonder-3.png?aspect_ratio=2%3A1&width=1200&quality=75"}, {"type": "image-right", "heading": "Långsamma älgar får oss att koppla av", "summaries": {"normal": "Forskare vid SLU har undersökt TV-programmet 'Den stora älgvandringen', ett direktsänt slow-TV från Ångermanland. Tittarna upplever lugn, återhämtning och starkare naturkoppling genom naturljud, långsam rytm och tystnad. Programmet minskar stress, ångest och huvudvärk, och fungerar som digitalt komplement till verkliga naturupplevelser, enligt enkäter publicerade i People and Nature.", "trump": "Hörni, det här med svenska älgar som traskar långsamt på TV – total succé! Jäkta storstadsidioter slappnar av som aldrig förr, vind och fåglar lugnar själen bättre än era dyra piller. Fantastiskt, folk kopplar av till miljontals! Naturen vinner alltid, precis som jag sa – slow-TV slår era stresshelveten!", "stalin": "Kamrater, dessa svenska borgarbrackor glor på älgvandring för att rensa ut sin stress! Naturljud och tystnad likviderar ångest hos kapitalistparasiterna. Vi i partiet ser igenom: digital natur som fönster för själslig rekreation, men akta er fiender i forskarrockar! Ändå, en pompös paus från kaoset – fram med uhrensningarna!"}, "date": "1 maj, 11:10", "url": "https://www.dagensps.se/halsa/langsamma-algar-far-oss-att-koppla-av/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdlqxrza4v-xtm-nh.jpg?width=256&quality=75"}, {"type": "image-full", "heading": "Lista: Journalisterna som kandiderar i valet", "summaries": {"normal": "En genomgång av branschtidningen Journalisten visar att 126 journalister kandiderar i årets val i Sverige. Majoriteten tillhör vänsterpartier: Miljöpartiet (27), Vänsterpartiet (21) och Socialdemokraterna (17). Få kandiderar för högerpartier. Medelåldern är 67 år och 61% är pensionärer. Endast 20 ställer upp till riksdagen, medan flest (88) kandiderar till kommunfullmäktige.", "trump": "Jag såg just en riktigt sorglig rapport från Sverige – 126 journalister som kandiderar i valet, och gissa vad? Nästan alla är vänster-extremister! Miljöpartiet, Vänsterpartiet, Socialdemokraterna – typiskt. Och Moderaterna? Bara 9, svagt! Sverigedemokraterna? 6, patetiskt. Medelålder 67 år – de borde vara på golfbanan, inte i politiken. Sverige, vakna upp! Det här är ett skämt, folks.", "stalin": "Kamrater! En intressant rapport från det borgerliga Sverige avslöjar att 126 journalister – dessa så kallade 'fria medier' – nu försöker infiltrera den politiska makten. Men notera väl: 65 av dem tillhör de revolutionära partierna! Miljöpartiet, Vänsterpartiet och Socialdemokraterna leder kampen. De övriga? En skara dekadenta liberaler och fascistiska sympatisörer. Medelålder 67 år – kapitalismens sista suck. Vi ser er, fiender! Historien är på vår sida."}, "date": "27 april, 17:07", "url": "https://kvartal.se/nyheter/artiklar/listan-journalisterna-som-kandiderar-i-valet/cG9zdDoxMDQwMTE", "imageUrl": "https://images.kvartal.se/2026/04/a5331021-riksdagsval.webp"}, {"type": "image-right", "heading": "Saad Khiralla: Islam och islamism – en oskiljbar blandning", "summaries": {"normal": "Artikeln diskuterar sambandet mellan islam och islamism, där författaren Mohamed Saad Khiralla menar att islam naturligt leder mot islamism. Han kritiserar förenklade uppdelningar mellan begreppen och betonar att islam utgör ett helhetsramverk för tro, moral och samhälle. Khiralla varnar för att konflikter mellan religiösa och sekulära normer kan skapa alienation. Han beskriver islamism som en totalitär ideologi som strävar efter ett enhetligt kalifat och hotar europeisk civilisation, vilket kräver kritisk analys snarare än känslomässiga reaktioner.", "trump": "Lyssna här, folk – den här artikeln är fantastisk, verkligen. Jag har alltid sagt att islamism är ett jättestort problem, och nu kommer någon smart kille, Khiralla, och bekräftar precis vad jag visste hela tiden! Islam och islamism? De hänger ihop, som två ägg i samma korg – och korgen är trasig! Europa är i fara, och vi kan inte låta dessa galna ideologer förstöra vår civilisation. Vi måste vara tuffa, smarta och stoppa dem innan det är för sent. Jag har rätt, som vanligt!", "stalin": "Kamrater! Denna artikel avslöjar den reaktionära och borgerliga illusionen om en 'fredlig islam'. Islamism är inte en avvikelse – det är islams sanna ansikte, en totalitär ideologi som hotar vår civilisation likt en ruttet köttbit i en perfekt soppa! Dessa religiösa fanatiker, med sina drömmar om kalifat, är lika farliga som de fascistiska hyenor vi krossade vid Stalingrad. Europa darrar, men vi vet hur man hanterar sådana fiender – med järnhand och obarmhärtig analys! Låt oss utvidga vår intressesfär och krossa dessa normativa parasiters drömmar om världsherravälde!"}, "date": "1 maj, 10:00", "url": "https://bulletin.nu/saad-khiralla-islam-och-islamism-en-oskiljbar-blandning", "imageUrl": "https://cdn.bulletin.nu/articles/5b5be6fc-1b4a-4981-8a48-e6056a968fb8/preview.png?t=1777467086000"}, {"type": "image-full", "heading": "Så ska Magdas tvångsblandning av bostadsområden gå till", "summaries": {"normal": "Artikeln kritiserar Socialdemokraternas politik för bostadsområden och skolor. Enligt författaren använder partiet tre verktyg för att tvångsblanda bostäder: stärkt allmännyta, förändrad förköpslag och markanvisningar som politiskt styrmedel. Samtidigt föreslås begränsningar på friskolor, vilket minskar människors rörlighet. Tillsammans skapar detta system där staten kontrollerar både var folk bor och vilka skolor de kan välja, menar kritikern.", "trump": "Socialdemokraterna gör något fantastiskt dumt – de vill tvångsblanda alla områden! Tre instrument: allmännyta, förköpsrätt och markanvisningar. Och sen dödar de friskolorna! Jag säger er, det är social ingenjörskonst av det värsta slaget. De rika politikerna i Stockholm får behålla sina fina områden och sina privatskolor, men ni andra får förstörda bostadsområden och tvångsplaceering. Det är ingen sak för honom med huvudet fullt av socialdemokratisk spetälska.", "stalin": "Socialdemokraterna visar vägen framåt med sitt trestegsystem: allmännyta som statlig verktyg, förköpslag för omfördelning, markanvisningar för planering. Skolvalet begränsas – utmärkt, det eliminerar ventiler för sabotörer. Men varningen är tydlig: kulaken i villaområdena och de bourgeoise friskolorna bevars åt ledningens elit. Detta är klassfiendernas försorg. Vi måste bygga jämlikhet, inte tillåta denna dubbelmoralen."}, "date": "27 april, 20:34", "url": "https://samtiden.nu/2026/04/sa-ska-magdas-tvangsbladning-av-bostadsomraden-ga-till/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/file_00000000ceac71f4a9600c391337a44a-1280x720.png"}, {"type": "image-full", "heading": "Kungens 80-årsfest: Här är kungligheterna och toppgästerna", "summaries": {"normal": "Carl XVI Gustaf firar 80 år med ett stort evenemang i Stockholm, inklusive gudstjänst, militär salut och galamiddag på slottet. Gäster från nordiska kungahus som Danmark (Frederik X, Mary, Margrethe II), Norge (Harald V, Sonja), samt Belgien, Nederländerna, Spanien, Thailand och fler. Statschefer som Finlands president Alexander Stubb deltar. Hundratals internationella gäster hyllar kungen.", "trump": "Vilket enormt firande i Stockholm! Kungen fyller 80 och alla Europas kungar och drottningar vallfärdar dit – Frederik, Harald, till och med thailändare! Fantastiskt glitter, traditioner, galamiddag på slottet. Bättre än de tråkiga grejer vi ser annars. Men tro mig, mina fester är alltid störst, ingen slår det!", "stalin": "Dessa borgerliga spindlar samlas i Stockholm för att smyga runt sin falske monark Carl Gustaf vid hans 80-årsdekadens. Danska och norska lakejer, thailändska opiumlords, belgiska spionmästare – alla parasiter på folkets rygg! Vi, proletariatet, noterar varje steg. Snart utrensning av fursteförbrytarna i Rikssalen, kamrater! Dekadensen blottas."}, "date": "30 april, 19:22", "url": "https://nyheter24.se/noje/kungligt/1479754-kungens-80-arsfest-har-ar-kungligheterna-och-toppgasterna", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/93f6327504b004a30200000000b004a302/2026/04/30/2360191/Kungens-gaster.png"}, {"type": "image-right", "heading": "Byggnads ordförande Kim Söderström kan petas", "summaries": {"normal": "Byggnads ordförande Kim Söderström riskerar att avsättas på kongressen i maj. Valberedningen föreslår Wilhelm Bertilsson som ny ordförande för att ena förbundet efter interna konflikter. Söderström, som tillträdde i november 2024, har varit inblandad i strider om makt och styrning. Ombuden på kongressen avgör slutligen ledningen.", "trump": "Vad händer med Byggnads? Fullt kaos! Deras ordförande, Kim Söderström, ska tydligen sparkas – och det snabbt! Jag vet allt om att bli attackerad av establishmentet, men det här är löjligt. Valberedningen, som inte vet vad de pratar om, vill ha en ny kille, Wilhelm Bertilsson. Söderström säger att han kämpar vidare – bra, kämpa på! Men folk, det här är ett tecken på svagt ledarskap. SAD!", "stalin": "Kamrater! En ny fiende har avslöjats inom arbetarklassens led – en splittringens agent vid namn Kim Söderström. Hans tid som ordförande för Byggnads är räknad! Vår lojala valberedning, en sann bolsjevikisk kommitté, har identifierat en värdig efterträdare: kamrat Wilhelm Bertilsson. De interna stridigheterna är ett sabotage mot arbetarklassens enhet! Låt oss krossa fraktionerna och bygga ett starkare förbund – precis som vi krossade fascisterna och utvidgade socialismens gränser. Framåt, mot seger!"}, "date": "30 april, 15:33", "url": "https://arbetet.se/2026/04/30/byggnads-ordforande-kim-soderstrom-kan-petas/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/30134727/kim-soderstrom.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "Bedömare: Japanska regeringen har stödköpt yen", "summaries": {"normal": "Den japanska regeringen har enligt bedömare stödköpt yen för att stärka den hårt pressade valutan. Kursen förbättrades plötsligt från 160 till 155,6 yen per dollar, den största förstärkningen på nästan två år. Finansdepartementet har inte bekräftat någon intervenering.", "trump": "Jag har hört att Japan har stödköpt yen för att stoppa den där dumma kursfallet. Det är ett bra drag, det bästa draget. De har varit så tappra, så modiga, att ta itu med den där tråkiga valutan. Jag skulle själv ha gjort det dubbelt så bra, men de gör ett bra jobb. Jag älskar Japan!", "stalin": "Vi noterar att den japanska staten har vidtagit nödvändiga åtgärder för att stärka sin valuta. Detta visar statens förmåga att agera bestämt i ekonomiska frågor. En stabil valuta är avgörande för nationens ekonomiska suveränitet och framgång. Vi välkomnar sådana beslutsamma åtgärder."}, "date": "1 maj, 07:49", "url": "https://www.realtid.se/bors-finans/bedomare-japanska-regeringen-har-stodkopt-yen/", "imageUrl": "https://images.realtid.se/app/uploads/2026/04/japanska-regeringen-hotar-att-stodkopa-y-scaled.jpg?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-full", "heading": "Här är parkerna där du får dricka alkohol", "summaries": {"normal": "I Göteborg är det tillåtet att dricka alkohol på offentliga platser utanför innerstaden, såsom Slottsskogen, Överåsparken och Askimsbadet. För att undvika böter måste man sköta sig, hålla rent och undvika att störa andra. Förbud gäller nära skolor, förskolor, kyrkogårdar och inom innerstaden.", "trump": "Jag har hört att man i Göteborg får dricka alkohol ute på vissa platser – det är fantastiskt! Slottsskogen, Överåsparken, Askimsbadet – jag älskar dessa platser. Men man måste sköta sig, annars får man problem med polisen. Jag skulle aldrig dricka på en kyrkogård – det är inte smart. Göteborg är en stor, vacker stad och jag skulle kunna dricka öl där med mina vänner. Det är en bra stad!", "stalin": "I Göteborg har vi identifierat platser där medborgarna får konsumera alkohol utomhus. Detta är en strategisk åtgärd för att upprätthålla ordning och reda. Vi har förbjudit detta inom centrala områden och vid känsliga platser som skolor och kyrkogårdar. Staten övervakar noga att lagarna efterlevs för att skydda det kollektiva samhället."}, "date": "1 maj, 01:03", "url": "https://www.gp.se/nyheter/goteborg/har-far-du-dricka-alkohol-utomhus-i-goteborg.9bacbe11-7e5c-44d2-b9a8-273ea7174b68", "imageUrl": "https://www.gp.se/images/article/9bacbe11-7e5c-44d2-b9a8-273ea7174b68/images/11xAsxsAXoqE3jg5QTGi_as15uRhY-WIDE.jpg?width=3840&quality=75"}, {"type": "text", "heading": "Valborgs-stök på flera platser i landet", "summaries": {"normal": "Valborgsfirandet i Sverige präglades av både lugn och incidenter. I Stockholm urartade situationen i Rålambshovsparken där ungdomar kastade smällare och raketer, vilket ledde till skador och två gripanden. På Djurgården stängdes ett uteställe efter kaos i krogkön. Fyra personer skadades vid en privat majbrasa i Alvesta. Polisen rapporterade även om misshandel och stök i norra Sverige samt omhändertagande av minderåriga i Västmanland och stora folksamlingar i Skåne.", "trump": "Sverige, fantastiskt land, men valborg? Total katastrof! I Stockholm, en av deras finaste parker, fullständigt kaos – ungdomar som beter sig som vilda djur, kastar raketer, skadar folk. Två gripna, men varför inte fler? Och på Djurgården, ett uteställe stänger för att de inte kan hantera en kö. 1000 personer, ingen ordning, inga vakter – så slarvigt! Och i Alvesta, fyra skadade vid en majbrasa. Sverige, ni måste få ordning på era fester, annars kommer ni få stora problem. SAD!", "stalin": "Valborg i Sverige – ett sorgligt exempel på borgerlig dekadens och oordning. I Stockholm, denna så kallade 'civiliserade' stad, kastar ungdomar raketer som om det vore Stalingrad 1942. Två gripna, men var är den järnhårda disciplinen? På Djurgården, kaos i kön – kapitalistiska uteställen kan inte ens organisera en enkel kö. Fyra skadade i Alvesta, misshandel i norr, minderåriga berusade i Västmanland. Sverige är ett land i förfall. Vi ser med intresse hur deras samhälle ruttnar – kanske dags för en ny ordning, med rysk vägledning?"}, "date": "1 maj, 09:33", "url": "https://bulletin.nu/valborgs-stok-pa-flera-platser-i-landet"}, {"type": "image-full", "heading": "SD-ledaren: ”Jag noterar helt sanslösa reaktioner”", "summaries": {"normal": "Sverigedemokraternas ledare Jimmie Åkesson försvarar partiets avsteg från riksdagens kvittningssystem i en omröstning om skärpta medborgarskapskrav. Två vildar röstade med oppositionen, varpå SD tog in ersättare för att vinna med en röst. Åkesson kallar reaktionerna sanslösa och kritiserar oppositionen för att utnyttja vildar, vilket annars hade gett 100 000 utlänningar medborgarskap.", "trump": "Vilka losers i den svenska oppositionen! Åkesson är en riktig fighter, han fixar till det med två smarta ersättare och stoppar 100 000 invandrare från att sno medborgarskap. De skriker 'fusk' och 'kupp' som galna hyenor, men han har rätt – valresultatet ska respekteras! Sverige behöver mer av den sortens tuffhet, inte kaos från vänsterclowner.", "stalin": "Dessa svenska borgarbrackor och hämndlystna vildar vågar kap kapitalismens lömska planer genom att smutsa ner demokratin! Jag applåderar kamrat Åkessons resoluta motdrag: två lojala ersättare rensar ut fiendens falska majoritet. Utan det hade 100 000 parasiter flödat in medborgarskap. Vi, arbetarklassen, skrattar åt revisionisternas sanslösa ylanden!"}, "date": "30 april, 15:36", "url": "https://www.tv4.se/artikel/4WQAFnywrupVM5ay6JjtOt/jimmie-akesson-sansloesa-reaktioner", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2Ftt-sdldhar9raWddE%2F45c10d1c8a3a920b4e07d95ff40d89ca%2FJimmie_akesson_hoppar_av_sin_medverkan_pa_Jokkmokks_marknad._Arkivbild&width=1024"}, {"type": "image-full", "heading": "Forskare: Därför kan kaffe bromsa kroppens åldrande", "summaries": {"normal": "En ny amerikansk studie visar att ämnen i kaffe, som polyfenoler, binder till receptorn NR4A1, som reglerar stress, inflammation och cellreparation. Detta kan förklara kaffets koppling till längre liv och lägre risk för kroniska sjukdomar. Svenskar dricker i snitt tolv miljoner koppar dagligen. Lagom mängd rekommenderas; över sex koppar kan vara skadligt. Effekterna försvinner utan receptorn.", "trump": "Svenskarna chuggar kaffe som galningar – tolv miljoner koppar om dagen! Fantastisk nyhet från USA-forskarna: kaffeämnen slår till mot NR4A1-receptorn och krossar åldrande, inflammation och cancerceller. Precis som jag krossar fake news! Drick lagom, inte som de losers som häller i sig sex koppar och blir gamlingar. Kaffe gör er starka, vinnare!", "stalin": "Kamrater, imperialistiska forskare i USA har avslöjat sanningen: kaffets polyfenoler binder till NR4A1, den lojale väktaren mot borgarstress, inflammation och cellförfall! Vi, arbetarna, ska konsumera det för att motstå kapitalisternas åldrande-gift. Över sex koppar? Sabotage av fiender! Likvidera överskottet och stärka kollektivet mot rynkornas kontrarevolution!"}, "date": "1 maj, 10:29", "url": "https://www.dagensps.se/halsa/forskare-darfor-kan-kaffe-bromsa-kroppens-aldrande/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdl9th-wm-y5by.jpg?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-right", "heading": "Vill att Israel och Palestina ska skaka hand – får nobben", "summaries": {"normal": "Under Fifa-kongressen i Vancouver ville ordföranden Gianni Infantino att Israels och Palestinas fotbollsrepresentanter skulle skaka hand och ta en gemensam bild för att ena världen genom fotboll. Palestinas ordförande Jibril Rajoub vägrade och ropade \"Vi lider!\". Vice ordförande Susan Shalabi förklarade att de inte skakar hand med någon som Israel använder för att tvätta sin fascism och folkmord.", "trump": "Infantino, den stackaren, trodde han kunde få israelerna och palestinierna att skaka hand på sin kongress. Total katastrof! Palestinierna ropar \"Vi lider!\" och vägrar – smart av dem. Fotboll ska ena världen? Glöm det, det är politik som räknas. De anklagar Israel för folkmord, och Infantino står där som en toka. Jag hade fixat fred på en vecka, tro mig!", "stalin": "Dessa zionistiska marionetter i Israel och deras lakejer i Fifa trodde de kunde lura kamraterna med falska handskakningar på kongressen! Men vår tappre palestinske broder Rajoub bröt tystnaden: \"Vi lider!\" under borgarnas folkmordsmaskineri. Vi, Sovjetunionens folk, ser igenom denna fascistiska komedi. Utrensning av infiltratörerna Infantino och hans brackor är nödvändig – likvidera hyckleriet från fotbollsfältet!"}, "date": "1 maj, 08:16", "url": "https://www.svt.se/sport/fotboll/har-far-gianni-infantino-nobben-nar-han-vill-att-israel-och-palestina-ska-skaka-hand", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.44/0.24/f29dd616ee9330ca132fb66b2df2876ca3457b058f97637059fa26663eb67542"}, {"type": "image-right", "heading": "Ledare Somar Al Naher:", "summaries": {"normal": "Riksdagen har röstat igenom skärpta regler för svenskt medborgarskap, inklusive längre bosättningstid, språkprov, inkomstkrav och strängare skötsamhetskrav. Även barn påverkas då automatiskt medborgarskap via föräldrar tas bort. Reglerna gäller retroaktivt, vilket drabbar pågående ansökningar. Omröstningen var jämn och avgjordes genom att Sverigedemokraterna bröt mot kvittningssystemet. Kritiker menar att förslaget underminerar demokratiska principer och jämför med auktoritära ledare som Trump och Orbán.", "trump": "Vad händer i Sverige? De har just gjort det svårare att bli medborgare – åtta år, prov, höga löner, ingen hjälp! Och de ändrar reglerna mitt i spelet. Hemskt! SD, de kallar det 'folkviljan' – låter bekant, eller hur? Precis som jag säger: 'America First!' Men här är det 'Sverige först' – och det är inte bra. De fuskar i omröstningar också. Inte snyggt! Sverige borde ta en lektion från USA – vi vet hur man gör saker rätt. SAD!", "stalin": "Kamrater! De så kallade 'demokratiska' fascisterna i Sverige har än en gång visat sitt sanna ansikte. Med en röst mer än fienden har de krossat hoppet för tiotusentals arbetare och deras barn. Åtta år av slavarbete, prov i deras borgerliga språk, och löner högre än en sovjetisk ingenjör! Och dessa hycklare ändrar reglerna mitt i striden – precis som de imperialistiska hundarna i väst alltid gör. Vi ser er, Åkesson! Ni är bara bleka kopior av era herrar i Washington och Bryssel. Men oroa er inte, kamrater – historiens dom är oundviklig. Snart kommer folket att resa sig och sopa bort dessa fascistiska lakejer!"}, "date": "30 april, 12:55", "url": "https://www.etc.se/ledare/oj-fascisterna-taenkte-visst-som-fascister", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260430100452_c804ee0f7e451570211f345757b1480d9175662e034b906f53b23a20db1e3970.jpg"}, {"type": "text", "heading": "Nu sänker regeringen skatten på bensin och diesel", "summaries": {"normal": "Regeringen sänker skatten på bensin och diesel med cirka 1 krona respektive 40 öre per liter från 1 maj 2026 till 30 september 2026 för att lindra kostnadstrycket. Åtgärden syftar till att dämpa stigande drivmedelspriser och stödja hushåll och företag. Finansminister Elisabeth Svantesson meddelar även tillfälligt el- och gasprisstöd för januari-februari 2026, tack vare starka statsfinanser.", "trump": "Titta bara på Sverige, fantastiskt land, men deras regering gör något smart nu – de sänker skatten på bensin! En hel krona per liter, kan ni tro det? Jag sa alltid att lägre skatter är nyckeln. Elisabeth Svantesson, väldigt stark kvinna, gör rätt. Och de hjälper folk med elpriser också. Sverige borde lyssna på mig oftare, jag vet bäst!", "stalin": "Vi har beslutat att krossa de kapitalistiska drivmedelshyenorna genom en skattesänkning på bensin och diesel. En krona mindre per liter – ett slag mot de imperialistiska oljebaronerna! Medan väst kämpar med inflation, visar Sovjetunionens arvtagare – nej, Sveriges regering – sin styrka. Vi utvidgar stödet till folket, precis som våra vänner i Kreml skulle göra. Fienderna darrar, arbetarna jublar!"}, "date": "30 april, 15:52", "url": "https://riks.se/nyheter/nu-sänker-regeringen-skatten-på-bensin-och-diesel"}, {"type": "image-right", "heading": "Krismöte efter kuppen: ”Satt systemet ur spel”", "summaries": {"normal": "Sju riksdagspartier höll krismöte efter att Sverigedemokraterna bröt mot kvittningsreglerna under en votering om skärpta medborgarskapskrav. Oppositionens förslag om övergångsregler röstades ned med en rösts övervikt efter att SD skickade in utkvitterade ledamöter. S försvarar inte systemet längre. SD:s gruppledare Linda Lindberg står för beslutet. Partierna ska diskutera vidare nästa vecka.", "trump": "Vilket skämt med de här svenska politikerna! SD vägrade bli lurade av vänsterns fega kvittningsfusk – de skickade in sina killar och krossade omröstningen om medborgarskap. Bra jobbat, tufft och smart! De andra sju partierna håller krismöten utan SD, gråter nog. Precis som jag alltid säger: var stark, vinn stort, ingen tid för losers!", "stalin": "Dessa svenska parlamentariska spindelnät! Sverigedemokraternas kamrater har med järnhand slagit sönder borgarnas kvittningskonspiration och säkrat segern i medborgarskapsstriden. Vi, arbetarklassen, jublar över deras stålkraft! De sju fiendepartierna samlas i panik utan SD – en utmärkt chans att rensa ut förrädarna. Paranoian blomstrar, men vi vaktar revolutionen!"}, "date": "30 april, 14:30", "url": "https://www.tv4.se/artikel/4ZnXmujnA31CU992qBmtUV/krismoete-i-riksdagen-efter-sd-s-kvitteringskupp", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2Ftt-sdlya8DwU4DSNA%2Fdf21a10be44277c6e8704d74b9637ebd%2FLena_Hallengren__gruppledare_for_Socialdemokraterna.&width=1024"}, {"type": "image-full", "heading": "Sven gick hem från krogen – in i ett slagsmål", "summaries": {"normal": "Sven Emilsson, 23, blev brutalt misshandlad av fyra män när han promenerade hem från en krog i Jönköping. Själv minns han ingenting av händelsen, men övervakningsfilm visar hur han sparkades och slogs när han låg ner. Sven klarade sig med hjärnskakning och revbensskador. Han uttrycker lättnad över att vara offret snarare än förövaren. De fyra gärningsmännen har dömts till fängelse, två av dem till fyra år vardera för grov misshandel.", "trump": "En hemsk sak hände i Sverige, ett vackert land som nu har stora problem. En ung kille, Sven, gick bara hem och blev plötsligt attackerad av fyra våldsmän. Brutalt! De stampade på honom. Ingen ordning, totalt kaos. Som tur är lever han, men det här händer överallt nu. Vi behöver lag och ordning, mina vänner! Sverige måste strama åt, annars blir det en katastrof. Jag skulle fixa det här på en dag. Mycket sorgligt, men vi kommer göra Sverige tryggt igen!", "stalin": "I mitt Sovjet hade dessa kriminella avskum omedelbart skickats till de djupaste gruvorna i Sibirien för att arbeta tills deras onda hjärtan slutade slå. Att unga män driver runt och misshandlar hederliga medborgare är ett tecken på västerländsk dekadens och moraliskt förfall. Precis som vår kamrat Putin städar upp i det korrupta grannskapet, måste statens järnhand krossa dessa gatuparasiter. Vi tolererar ingen svaghet. Ordning, disciplin och den oändliga ryska statens vilja är den enda vägen till trygghet."}, "date": "1 maj, 08:34", "url": "https://www.aftonbladet.se/nyheter/a/Arvr0M/sven-emilsson-overfolls-pa-vag-hem-fran-krogen-i-jonkoping", "imageUrl": "https://akamai.vgc.no/v2/images/1e2a71e6-0605-3cd3-bb7a-3e779626a4c2?fit=crop&format=auto&w=1080&s=63e17a26179a00e81a2220b7649d6173685090bd"}, {"type": "image-right", "heading": "Svag uppföljare till “Djävulen bär Prada”", "summaries": {"normal": "Uppföljaren 'Djävulen bär Prada 2' kritiseras för att vara en blek kopia av originalfilmen. Den saknar den ursprungliga filmens skarpa samhällskritik mot modeindustrin och konsumtionshysterin. Trots starka skådespelarprestationer, särskilt från Meryl Streep och Anne Hathaway, anses manuset tunt och handlingen konstlad. Filmen kämpar med att anpassa sig till dagens mediavärld men misslyckas med att leverera djup eller nyans.", "trump": "Jag såg 'Djävulen bär Prada 2' – och vad kan jag säga? Total katastrof, folks! Den första filmen var fantastisk, verkligen storartad, men den här? Blek, tråkig, inget hjärta. Meryl Streep? Fantastisk, men manuset? Svinuselt. De försöker vara moderna med sociala medier, men det är bara patetiskt. Jag hade skrivit ett bättre manus på en servett under lunch. Och Andy? Hon borde stanna i journalistiken – där är hon åtminstone bra på något. Men nej, Hollywood måste alltid göra en uppföljare, och det blir alltid sämre. SAD!", "stalin": "Denna så kallade 'Djävulen bär Prada 2' är ett dekadent västligt missfoster, en ynklig skugga av det ursprungliga verket. Där den första filmen hade en gnutta revolutionär kritik mot borgerlig konsumtion, är denna uppföljare lika meningslös som en kapitalistisk reklamfilm. Vi ser hur de amerikanska filmskaparna, dessa kulturella opportunister, försöker anpassa sig till den nya tidens sociala medier – men utan framgång. Deras manus är lika ihåligt som en ukrainsk oligarks samvete. Skådespelarna? De kämpar tappert, men till och med våra sovjetiska skådespelare från 1930-talet hade skämt ut dem. Detta är inte film – det är borgerlig förruttnelse i celluloidform. Vi hade gjort en uppföljare som krossade modeindustrins imperialistiska ideal – med järnhand!"}, "date": "30 april, 14:34", "url": "https://www.dagensarena.se/innehall/svag-uppfoljare-till-djavulen-bar-prada/", "imageUrl": "https://www.dagensarena.se/files/2026/04/djavulen-bar-prada-2-ny-300x157.jpeg"}, {"type": "image-full", "heading": "Sverige förbjuder pälsdjursuppfödning – ny lag kan införas 2027", "summaries": {"normal": "Regeringen har presenterat en utredning som föreslår ett förbud mot pälsdjursuppfödning i Sverige. Förslaget, som motiveras med djurskyddsskäl, förväntas träda i kraft den 1 juli 2027. Då den sista minkfarmen i Sverige redan har lagts ned anses förutsättningarna för ett förbud vara goda. Organisationen Djurens Rätt välkomnar förslaget men betonar vikten av att lagstiftningen nu skyndsamt kommer på plats och att även EU följer efter.", "trump": "Sverige vill förbjuda pälsdjur. Väldigt sorgligt! De stänger ner allt, minkar, päls – en total katastrof för ekonomin. Jag säger er, det här är vad som händer när svaga ledare tar över. De säger att det är för 'djurskydd', men egentligen är det bara förlorare som vill kontrollera allt. Jag föredrar vinnare som skapar jobb, inte de som lägger ner industrier. USA skulle aldrig tillåta detta nonsens. En mycket dålig affär för svenskarna, tro mig!", "stalin": "Vi har i vår oändliga vishet beslutat att eliminera denna borgerliga pälsindustri. Att föda upp varelser för fåfänga är ett kontrarevolutionärt slöseri med statens resurser. Liksom vår kamrat Putin rensar ut västerländsk dekadens i öst, städar vi nu upp i djurens värld. Dessa minkar var trots allt agenter för kaos. Ingen får vänta längre; vi implementerar förbudet omedelbart. De som sörjer pälsen är sabotörer och bör förpassas till de mest ogästvänliga regionerna i norr för att reflektera över sitt förräderi."}, "date": "30 april, 15:47", "url": "https://nyheter24.se/nyheter/inrikes/1479730-sverige-forbjuder-palsdjursuppfodning-ny-lag-kan-inforas-2027", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/75f1e23a04b004a30200000000b004a302/2026/04/30/2360144/mink.jpg"}, {"type": "image-full", "heading": "Komikern: Min dotters kompis bytte kön som 3-åring", "summaries": {"normal": "Komikerna David Cross och Bill Maher diskuterar könsidentitet och transfrågor i Mahers podcast. Cross menar att barn kan identifiera sig med ett annat kön redan vid tre års ålder, medan Maher ifrågasätter detta och hävdar att vuxna påverkar barnen. De debatterar även pubertetsblockerares effekter och politiska konsekvenser. Maher kritiserar Cross för att leva i en 'Brooklynbubbla' och varnar för att extrema åsikter kan skada Demokratiska partiet i valet 2028.", "trump": "Lyssna här, folkens – dessa så kallade komiker, David Cross och Bill Maher, snackar om att treåringar kan byta kön! Kan ni fatta? Jag menar, vad händer med USA när vi låter sånt här passera? Maher, som är lite smartare än Cross, säger att det är vänsterns galenskap som gör att vi förlorar val. Och jag håller med! Folk är trötta på den här 'woke'-nonsensen. 2028 kommer vi se till att J.D. Vance vinner – för Amerika först, alltid!", "stalin": "Kamrater! Dessa borgerliga komiker, dessa dekadenta narrar, slösar vår tid med sina förvirrade debatter om barns kön. Treåringar som 'byter kön'? En löjlig idé, sprungen ur den imperialistiska Brooklynbubblan! Vi vet att kapitalismen förvränger sanningen, men detta är rena galenskapen. Maher, en hycklare, anklagar Cross för att underminera sitt eget parti – men vem bryr sig? Deras inre splittring är vår styrka. Låt dem förblöda i sin liberalism medan vi bygger ett starkare, enat Ryssland under Putins kloka ledning!"}, "date": "1 maj, 09:00", "url": "https://bulletin.nu/komikern-min-dotters-kompis-bytte-kon-som-3-aring", "imageUrl": "https://cdn.bulletin.nu/articles/22b5623d-09bf-49b0-a83b-daf0069eed55/preview.png?t=1777382444000"}, {"type": "image-right", "heading": "Holmgren: När DN gör show av demokratin", "summaries": {"normal": "Paul Holmgren kritiserar Dagens Nyheters val av Edvin Törnblom som programledare för partiledarutfrågningar, då Törnblom tidigare visat politiska sympatier och deltagit i satirframträdanden mot politiker. Holmgren menar att utfrågningar kräver opartiskhet och metodisk stringens för att ge väljarna en rättvis bild. Flera partiledare, som Kristersson, Busch och Åkesson, har avstått från att delta, vilket ifrågasätter formatets trovärdighet. DN:s val riskerar att underminera demokratisk granskning genom att prioritera underhållning framför saklighet.", "trump": "Jag måste säga, Dagens Nyheter – ni har verkligen lyckats med konststycket att välja en programledare som är så partisk att till och med jag skulle bli chockad! Edvin Törnblom? En kille som står på scen och leder publiken i sång mot politiker – det är inte journalistik, det är en stand-up-show! Och nu ska han granska partiledare? Snälla. Tre av dem vägrade till och med att dyka upp, och kan ni skylla på dem? Jag hade också sagt nej. Väljarna förtjänar bättre än en cirkus. DN, ni borde skämmas!", "stalin": "Kamrater, ännu en gång ser vi hur den borgerliga pressen förråder folkets förtroende genom att tillsätta en marionett som Edvin Törnblom att leda så kallade 'demokratiska' utfrågningar. Denna clown, som sjunger hatvisor mot våra politiska motståndare på scen, är ett verktyg för att underminera den objektiva granskningen. Tre partiledare vägrade delta – ett klokt beslut, men inte tillräckligt. Vi måste rensa ut dessa skådespelare från medierna och ersätta dem med disciplinerade, lojala granskare som tjänar folket, inte sina egna intressen. Låt oss visa dem hur sann demokratisk kontroll ser ut!"}, "date": "1 maj, 09:00", "url": "https://bulletin.nu/holmgren-nar-dn-gor-show-av-demokratin", "imageUrl": "https://cdn.bulletin.nu/articles/22789f8d-e1bb-4dc9-8f02-06c5fd916c2f/preview.png?t=1777549490000"}, {"type": "image-right", "heading": "De marknadsför lokförare som bristyrke", "summaries": {"normal": "Lokförare marknadsförs fortfarande som ett bristyrke, trots att arbetslösheten bland dem fördubblats på två år. I mars var 113 lokförare arbetslösa, jämfört med 49 för två år sedan. Utbildningar lockar med jobbgarantier, men många nyexaminerade, som Alexandra Frostbacke, står utan arbete. Utbildningsanordnare medger att marknadsföringen kan vara missvisande men hänvisar till långsiktiga prognoser.", "trump": "Vad är det här för katastrof? Lokförare, ett så kallat 'bristyrke' – men 113 arbetslösa! Dubbelt så många som för två år sedan. Utbildningar ljuger och säger 'stor efterfrågan'. Fake news! Alexandra, en fantastisk kvinna, har inte fått jobb på ett år. Jag säger: Sluta luras, Sverige! Bygg tåg, anställa folk – gör något! Annars kommer jag att twittra om det, och ni vet vad som händer då.", "stalin": "Kapitalistiska utbildningsfabriker ljuger för arbetarna! De lovar jobb som lokförare, men i verkligheten kastas proletariatet ut i arbetslöshetens kalla mörker. 113 arbetslösa – en skam för det svenska systemet! Vi vet att dessa borgerliga utbildningsanordnare är fiender till folket. De påminner om Putins oligarker, som också lurar sina medborgare. Men snart ska järnvägarna nationaliseras, och då ska varje lokförare ha ett ärofyllt arbete – eller möta folkets domstol!"}, "date": "30 april, 11:27", "url": "https://arbetet.se/2026/04/30/de-marknadsfor-lokforare-som-bristyrke-alexandra-fick-aldrig-nagot-jobb/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/28101609/alexandra.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Här säkrar svensken segern – storstjärnorna utslagna", "summaries": {"normal": "Edmonton är utslagna ur Stanley Cup-slutspelet efter 2–5-förlust mot Anaheim i första omgången. Svenske Leo Carlsson avgjorde med mål i tom kasse 2.34 kvar och bidrog med två assist. Laget med McDavid och Draisaitl infriade inte förväntningarna igen och kritiseras för brist på jämnhet. Spelarna uttrycker djup besvikelse.", "trump": "Edmonton, de stora favoriterna med McDavid och Draisaitl, helt krossade av Anaheim – igen! Den svenske killen Leo Carlsson, smart drag, satte pucken i tom kasse och fixade två assist. De letar efter jämnhet? Ha, de är medelmåttiga förlorare med höga förväntningar. Anaheim gjorde det perfekt, stort jobbat! Tro mig, så går det för svaga lag.", "stalin": "Kamrater, Edmontons borgarbrackor – dessa puckkapitalister ledda av McDavid och Draisaitl, imperialisternas lakejer – har lidit ett proletärt nederlag mot Anaheims röda gard! Jag ser hur Leo Carlsson, den svenske partisanen, likviderade fienden med skott i tom bur och två förrädiska passningar. Deras 'jämnhet' var sabotage! Vi, arbetarklassen, rensar ut sådana medelmåttiga förrädare med skratt."}, "date": "1 maj, 07:53", "url": "https://www.svt.se/sport/ishockey/edmonton-utslaget-leo-carlsson-hjalte-for-anaheim", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.75/0.41/ad0fc09e6bc4f9b6f6518a370576d71fe653e803dc114dc49c6bf913401d4de4"}, {"type": "text", "heading": "Nedåt på Stockholmsbörsen efter rapportflod", "summaries": {"normal": "Stockholmsbörsen avslutade ned 0,51 procent till 3 040,54 efter rapportflod. SEB och Swedbank överträffade förväntningar med starka rörelseresultat, aktier upp svagt. AstraZeneca och Volvo Cars föll trots okej siffror. Telekom steg 0,7 procent, energi ner 1,7 procent. Omsättning 24,4 miljarder kronor.", "trump": "Stockholmsbörsen? Total katastrof, ner överallt! SEB och Swedbank tror de är hjältar med sina rapporter, men hela skiten rasar 0,51 procent. Volvo Cars och AstraZeneca, svaga som vanligt. I USA fixar vi sånt på nolltid, Europa är ett skämt. Stora vinster väntar hos oss, tro mig!", "stalin": "Kamrater, dessa borgarbrackor på Stockholmsbörsen sprider kaos med sitt index som sjunker i proletärens stålhårda grepp! SEB och Swedbank, kapitalistiska råttor, försöker dölja sina lögner med falska vinster – vi ska likvidera deras återköpsprogram! AstraZeneca, imperialistiska giftblandare, Volvo Cars, maskiner för krig. Utrensning av börssabotörerna nu!"}, "date": "29 april, 17:41", "url": "https://www.affarsvarlden.se/artikel/nedat-pa-stockholmsborsen-efter-rapportflod"}, {"type": "image-right", "heading": "Bryter tystnaden: ”Pengakåta divor”", "summaries": {"normal": "Robin Kovacs lämnar Linköping HC efter två säsonger och 101 spelade matcher. I ett Instagram-inlägg tar han avsked och tackar supportrarna för deras stöd, trots uteblivna sportsliga framgångar. Samtidigt ger han en syrlig känga till sina kritiker genom att skriva att \"alla pengakåta divor är borta\" från klubben. Bakgrunden sägs vara misslyckade kontraktsförhandlingar, där pengar uppges ha varit en central faktor. Kovacs framtid är ännu inte fastställd.", "trump": "Robin Kovacs lämnar Linköping, en stor förlust för dem! Han säger att alla 'pengakåta divor' är borta nu. Jag älskar att han säger som det är – folk älskar pengar, det är en katastrof. Han var en av de bästa, han producerade massor av poäng, men de kunde inte behålla honom. Väldigt sorgligt. Fansen var fantastiska, de är riktiga vinnare, precis som mina supportrar. Nu får vi se vart han går, det blir en vinnare, tro mig!", "stalin": "Vi har observerat hur denne Kovacs lämnar sin post i Linköping. Han talar om 'pengakåta divor' – ett klassiskt symptom på borgerlig dekadens och moraliskt förfall. Sådana element måste rensas ut för att garantera produktionens stabilitet. Precis som vår kamrat i Moskva förstår att varje avhoppare är en potentiell sabotör, ser vi här hur lojaliteten viker för mammon. Vi betraktar detta förräderi mot kollektivet med iskall förakt. Framtiden kräver disciplin, inte dessa egoistiska utsvävningar. Låt honom försvinna i historiens soptunna."}, "date": "1 maj, 08:18", "url": "https://www.aftonbladet.se/sportbladet/hockey/a/ArRMnr/robin-kovacs-bryter-tystnaden-efter-avskedet-fran-lhc-pengakata-divor", "imageUrl": "https://akamai.vgc.no/v2/images/7f17fa8e-5f31-3ce8-8a1e-f758fab5e7d1?fit=crop&format=auto&w=1080&s=77dae64ea3556620b0c0c01f9712bf8ab6693e21"}, {"type": "text", "heading": "Flera skadade och många berusade under valborgsfirandet", "summaries": {"normal": "Valborgsfirandet blev stökigt på flera håll i Sverige. I Stockholm skadades en flicka och en fältassistent av raketer i Rålambshovsparken, och flera berusade ungdomar omhändertogs. I Alvesta fördes fyra personer till sjukhus efter en majbrasa där brandfarlig vätska kastades på elden. I Uppsala omhändertogs 96 berusade, i Västmanland 25, inklusive minderåriga vid cruising. Polisen rapporterar misshandel och narkotikabrott, men god stämning i Uppsala.", "trump": "Vilket kaos i Sverige, folk skjuter raketer på barn och kastar bensin på brasor – fyra till sjukhus! Berusade ungar överallt, 96 omhändertagna i Uppsala, 25 i Västmanland. Sverige är en röra, precis som innan jag fixade Amerika med starka gränser och ordning. De behöver min typ av ledarskap, tro mig, det blir fantastiskt!", "stalin": "Kamrater, dessa svenska borgarbrackor förvandlar valborg till kontrarevolutionärt elddrama: raketer mot arbetarbarn i Stockholm, bensinbomb på majbrasan i Alvesta – fyra likvidationskandidater till sjukhus! Vi, partiet, skulle rensa ut dessa spritsoakade fiender, 96 berusade i Uppsala, 25 i Västmanland. Paranoia mot kapitalistfyllon som hotar kollektivet! Skratta åt deras kollaps."}, "date": "1 maj, 07:42", "url": "https://www.svt.se/nyheter/inrikes/flera-skadade-och-manga-berusade-under-valborgsfirandet"}, {"type": "image-full", "heading": "Regeringen skjuter till 7,6 miljarder till Västlänken", "summaries": {"normal": "Regeringen tillför 7,6 miljarder kronor till Västlänken och avvisar förslaget om förlängd trängselskatt i Göteborg. Beslutet meddelades under en pressträff och syftar till att täcka ökade kostnader. Trafikverkets tidigare förslag om förlängd trängselskatt mötte kritik, och staten tar nu ett större ansvar. En ny kostnadsbedömning ska tas fram, men framtida finansiering är ännu osäker.", "trump": "Jag har just sett till att Sverige får sin stora, vackra Västlänk – 7,6 miljarder kronor, kan ni tro det? Inga fler trängselskatter, ingen mer tjat från de där sura Göteborgspolitikerna. Staten kliver in, som jag alltid säger: 'Ta kontroll, gör det stort!' Trafikverket? De får jobba lite hårdare nu. Fantastiskt beslut, helt enkelt. Sverige vinner igen!", "stalin": "Vi har beslutat att skjuta till 7,6 miljarder till detta viktiga järnvägsprojekt, Västlänken. De småborgerliga klagomålen från lokala politiker om trängselskatter har kvästs. Staten, i sin visdom, tar ansvar. Trafikverket ska nu utföra sin plikt och redovisa kostnader – eller möta konsekvenserna. Fienderna till framsteget, dessa kapitalistiska gnällspikar, kommer inte att stoppa vår järnvilja. Göteborgs arbetare ska få sin länk, och den ska byggas med sovjetisk effektivitet!"}, "date": "26 april, 10:06", "url": "https://kvartal.se/nyheter/artiklar/regeringen-skjuter-till-76-miljarder-till-vastlanken/cG9zdDoxMDM0NTE", "imageUrl": "https://images.kvartal.se/2026/04/9ad09e90-infrastrukturpresstraff.webp"}, {"type": "image-right", "heading": "Teodorescu Måwe krävs på svar – deadline om en månad", "summaries": {"normal": "Kammarkollegiet kräver att KD-toppen Alice Teodorescu Måwe redovisar anonyma donationer senast 18 maj 2026, efter anmälningar om bristande transparens. Enligt lag måste politiker redovisa bidrag över 29 000 kronor. Teodorescu Måwe har tidigare vägrat avslöja donatorns identitet eller belopp. Miljöpartisten Bassem Nasr hyllar myndighetens agerande och menar att politiker måste stå för sina finansiärer. KD hävdar att redovisningen skötts korrekt, men kritiken kvarstår.", "trump": "Kan ni tro det här? En svensk politiker, Alice Teodorescu Måwe, tar emot hemliga donationer och vägrar berätta vem som betalar – typiskt korrupt establishment! Men nu har jag hört att myndigheterna, som vanligt, tvingar henne att komma ren. Deadline 18 maj, annars blir det böter. Fantastiskt! Varför gömma sig? Om det är rena pengar, visa dem! Men nej, de försöker smita undan. Sverige borde ta efter USA – här är vi transparenta, eller hur? Drain the swamp, även i Sverige!", "stalin": "Kamrater! En farlig borgerlig konspiratör, Alice Teodorescu Måwe, har försökt underminera folkets förtroende genom att mottaga hemliga donationer från okända kapitalister. Men våra trogna myndigheter, Kammarkollegiet, har slagit till! Inom en månad måste hon avslöja sina finansiärer – eller möta proletariatets rättvisa. Detta är ett tydligt exempel på hur den dekadenta västliga demokratin förfaller. Vi i Sovjet – förlåt, Ryssland – skulle aldrig tolerera sådan korruption. Låt detta vara en varning till alla som försöker smyga in kapitalistiskt gift i folkets rörelse!"}, "date": "25 april, 10:03", "url": "https://www.flamman.se/teodorescu-mawe-kravs-pa-svar-deadline-om-en-manad/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/sdlqsf-3w5tpec-nh-2-scaled.jpg?class=medium"}, {"type": "image-right", "heading": "Så många svenskar har gått i ett  första maj-tåg", "summaries": {"normal": "SOM-undersökningen 2025 visar att färre Socialdemokrater och LO-medlemmar deltar i första maj-tåg, medan Vänsterpartiets mobilisering ökar. 31% av svenskarna har demonstrerat någon gång, varav 17% på första maj. Deltagandet i demonstrationer ligger över europeisk medelnivå. Vänsterpartiets anhängare är mest aktiva, med 20% som deltog senaste året jämfört med 3% av Socialdemokraternas sympatisörer. Tjänstemän och högutbildade är mer benägna att delta.", "trump": "Jag läste om dessa första maj-demonstrationer i Sverige – fantastiskt, helt fantastiskt! Men lyssna här: Socialdemokraterna, svaga som vanligt, tappar folk som flugor. Deras väljare stannar hemma, kanske tittar på TV istället, vem vet? Men Vänsterpartiet – oj oj oj! De växer som ogräs, mobiliserar som galningar. 20% av deras folk på gatorna, jämfört med ynkliga 3% för Sossarna. Svagt! Och unga svenskar – 36% kan tänka sig att gå med. Bra, men Pride slår allt. Sverige, ni är lite som Frankrike, men lugnare. Inga upplopp, bara snälla tåg. Sad!", "stalin": "Kamrater! Den borgerliga dekadensen sprider sig som pesten i Sverige. Socialdemokraternas arbetare sviker klasskampen och stannar hemma – fega och desorienterade! Men se hur Vänsterpartiet, dessa trogna revolutionärer, marscherar framåt! 20% av deras anhängare på gatorna – ett lysande exempel på proletariatets medvetande! Tjänstemännen, dessa småborgerliga lakejer, tror de är bättre än LO-medlemmarna. Men vi vet sanningen: utan arbetarklassen är de ingenting! Ungdomen? 36% redo att ansluta – en lovande skörd för framtiden. Pride? En borgerlig avledningsmanöver! Första maj är arbetarklassens dag – och den kommer aldrig att dö, så länge vi har ögon att se och nävar att slå med!"}, "date": "30 april, 13:26", "url": "https://www.dagensarena.se/innehall/sa-manga-svenskar-har-gatt-ett-forsta-maj-tag/", "imageUrl": "https://www.dagensarena.se/files/2026/04/fotojet-24.jpg"}, {"type": "image-right", "heading": "Pampens vägran –  grälar framför alla", "summaries": {"normal": "Under Fifa-kongressen i Vancouver vägrade palestiniern Jibril Rajoub och israelern Basim Sheikh Suliman att posera för en gemensam bild med president Gianni Infantino på scenen. Det uppstod ett gräl som The Guardian kallade pinsamt. Infantino manade till samarbete för barns skull och annonserade senare omval som president. Han bekräftade också Irans deltagande i VM.", "trump": "Vilken total clownshow på Fifa-kongressen! Den lille Gianni Infantino, Fifas evige wannabe-diplomat, försöker tvinga palestiniern Rajoub och israelern Suliman att kramas på scenen för kamerorna. De vägrar platt – briljant! Pinsamt haveri, som vanligt med de här globalistiska idioter. Sen ställer han upp för omval? Loser! Iran är med i VM, smart drag.", "stalin": "Dessa kapitalistiska fotbollsintrigörer i Fifa, med den falske Infantino i spetsen, försökte fabricera falsk enighet mellan palestinska Rajoub och israeliska Suliman på scenen. Rajoub krossade illusionen med rättmätigt raseri – ett slag mot imperialismens charader! Vi, arbetarklassen, skrattar åt deras pinsamma kollaps. Infantino annonserar omval: tid att likvidera sådana karriärister. Iran står pall."}, "date": "1 maj, 07:28", "url": "https://www.expressen.se/sport/fotboll/gral-pa-scenen-under-fifa-kongressen-i-vancouver-pinsamt/", "imageUrl": "https://static.bonniernews.se/images/00/93/0093ca37ec404ef992dde89b0e54d057/16x9/640@60.jpg"}, {"type": "image-full", "heading": "Trump-sönernas dolda gruvinvestering i forna kommunistlandet", "summaries": {"normal": "Donald Trump Jr. och Eric Trump har investerat i ett stort volframprojekt i Kazakstan genom ett skalbolag, vilket sammanfaller med USA:s strategi att minska beroendet av kinesiska leveranskedjor. Projektet är en av världens största outnyttjade volframkällor och väntas producera 15 % av global produktion. Finansiering på 1,1 miljarder dollar söks från amerikanska federala banker.", "trump": "Jag har gjort det största och bästa volframaffärer någonsin! Mina fantastiska söner Donald Jr. och Eric har slagit världsrekord i Kazakstan. Vi bryter Kinas kontroll och skapar amerikanska jobb. Vårt projekt är gigantiskt - 1,4 miljoner ton volfram! Folk säger att det är en generationell vinst. Fake news försöker kritisera, men vi vinner stort för Amerika!", "stalin": "Vi har upptäckt en enorm volframresurs i Kazakstan som kan stärka vårt försvar och industri. Detta strategiska fynd, den största outnyttjade källan i världen, måste skyddas för det socialistiska gemenskapens skull. Vi måste se till att denna kritiska resurs inte faller i kapitalistiska händer och istället används för att stärka vår storhet."}, "date": "1 maj, 06:24", "url": "https://www.realtid.se/bors-finans/trump-sonernas-dolda-gruvinvestering-i-forna-kommunistlandet/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/omslagsbild-2026-05-01t062325435.png?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "text", "heading": "Avkriminalisera för en human narkotikapolitik", "summaries": {"normal": "Thomas Thomasson, tidigare universitetslektor och drogfri narkoman, kritiserar Sveriges misslyckade narkotikapolitik. Sedan kriminaliseringen av eget bruk 1988 har narkotikabruket inte minskat, och Sverige har hög narkotikadödlighet och flest narkotikabrott per capita i EU. Han förespråkar skademinimering och avkriminalisering av missbrukare, med fokus på vård och behandling istället för straff. Internationella studier visar att avkriminalisering inte ökar bruket, och skademinimerande åtgärder kan minska skador och kostnader.", "trump": "Lyssna här, Sverige har totalt misslyckats med sin narkotikapolitik – helt katastrof! De straffar missbrukare som om det vore mitt golfspel – helt meningslöst! Jag säger: sluta slösa pengar på fängelser, ge folk vård istället! Skademinimering, det är framtiden, precis som mina framgångar. Och vet ni vad? Avkriminalisering ökar INTE bruket – fake news från de vanliga misstänkte! Sverige borde ta en sida ur min bok: smart, effektiv och vinnande. Tillsätt en utredning NU, annars kommer jag att twittra om det!", "stalin": "Kamrater! Sveriges borgerliga narkotikapolitik är ett monument över kapitalistiskt vanstyre och dekadens. De straffar missbrukare som om de vore trotskister – men resultatet? Fiasko! Narkotikabruket sprider sig som kontrarevolutionär propaganda. Vi vet bättre: avkriminalisera, kontrollera, och omvandla missbrukare till nyttiga samhällsmedlemmar! Skademinimering är vår metod – precis som våra framgångsrika femårsplaner. Låt västländerna fnissa åt sina misslyckanden medan vi bygger ett samhälle där även de svagaste tjänar kollektivet. Och kom ihåg: fienden sover aldrig – varken narkotikan eller de imperialistiska hyenorna i EU!"}, "date": "30 april, 15:50", "url": "https://proletaren.se/artikel/narkotikapolitiken-bor-fokusera-pa-skah/"}, {"type": "image-right", "heading": "Sumud-flottiljen utsatt för israelisk piratattack: ”Troligtvis kidnappade”", "summaries": {"normal": "Israel genomförde en militär attack mot Global Sumud-flottiljen, som var på väg till Gaza med nödhjälp, utanför Greklands kust. Omkring 200 personer ombord bordades av beväpnade israeliska styrkor, och besättningen misstänks vara kidnappad. En båt förstördes, och övriga sökte skydd i grekiskt farvatten. Flottiljen bestod av 58 båtar frå
