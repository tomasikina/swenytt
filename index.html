varen är frigiven, förundersökningen nedlagd.", "trump": "Vilken patetisk cirkus med det här Sea Owl 1-fartyget utanför Trelleborg! Falsk flagg till Kamerun? Total bluff, precis som Bidens valfusk! Sverige borde skicka iväg skiten till Ryssland med en kanon, istället för att ankra det som en lam valross. Starka ledare som jag fixar sånt på nolltid – Sverige, lär er av mästaren!", "stalin": "Kamrater, detta Sea Owl 1, ett skuggflottas lumpet fartyg, avslöjar borgarklassens falska flaggmanövrar från Komorerna till Kamerun! Imperialisterna i Sverige tror de kan lura vårt brorsfolk i Ryssland. Putin, den fruktade expansionisten, hånskrattar åt dessa västliga marionetter. Vi befaller utrensning av sjörövarna – fartyget stannar i bojor tills kontrarevolutionen krossas!"}, "date": "14 maj, 17:38", "url": "https://www.tv4.se/artikel/5Nd015TqpAtRDFrPqOMjXc/skuggflottefartyget-far-inte-segla-vidare-flaggbytet-var-falskt", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2FM02fzNOviqReSuMS92mBa%2Fc5cd1064eee066d3336e3263b36d55a7%2F14-seaowl-webb.jpg&width=1024"}, {"type": "image-right", "heading": "SD: Riv radiohuset och flytta SVT till getto-Kista", "summaries": {"normal": "Sverigedemokraterna i Stockholm föreslår att Radiohuset och TV-huset på Gärdet rivs för att ge plats åt klassisk bostadsbebyggelse. Partiet vill flytta SVT och Sveriges Radio till Kista för att utnyttja lediga lokaler och bidra till att lyfta området socialt. Förslaget, som drivs av Gabriel Kroon, möts av frågetecken kring ägarförhållanden då staten och bolagen kontrollerar fastigheterna. SVT avböjer att kommentera utspelet som de betraktar som partipolitik.", "trump": "Hör här, SD i Stockholm har ett fantastiskt förslag! De vill riva de där gamla, tråkiga TV-husen – total katastrof, tro mig – och bygga vacker, klassisk arkitektur istället. Mycket bättre! Sen vill de flytta fake news-medierna till Kista. Det är ett genidrag! De anställda kommer att älska det, eller så gör de inte det, men det spelar ingen roll. Vi bygger en ny stenstad, en enorm framgång! Media kommer inte att gilla det, men vi vinner ändå!", "stalin": "Vi har observerat hur de svenska elementen på Gärdet ägnar sig åt dekadent självgodhet i sina boningar. Det är ett strategiskt misstag att tillåta propagandaspridare att husera i huvudstadens finaste kvarter. Att tvångsförflytta dem till periferins otrygga zoner är en rationell åtgärd för att disciplinera dessa intellektuella sabotörer. Om de inte vill bidra till statens ordning i Kista, må de finna sig i att bli rensade. Likaså bör den svaga staten sluta fjäska för äganderätten; mark tillhör folket och partiet."}, "date": "15 maj, 14:17", "url": "https://www.friatider.se/sd-riv-radiohuset-och-flytta-svt-till-getto-kista", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/8s8a4809.jpg?itok=NHtmoBYO"}, {"type": "image-right", "heading": "\"Svenske\" knivrånaren i Polen - gängkriminell tidigare friad för mord", "summaries": {"normal": "En 23-årig svensk man, tidigare friad för mord men dömd för grov misshandel, är häktad i Polen för knivrånet på en norsk turist. Han och tre andra unga män från Göteborg, alla med utländsk bakgrund, misstänks för brottet i Gdańsk. Mannen var inblandad i en uppmärksammad dödsmisshandel i Sverige 2023, där ingen fälldes för mord. I Polen riskerar de upp till 20 års fängelse.", "trump": "Titta på det här, ett totalt kaos! Svenska gängkriminella, som inte ens kan hålla sig hemma, åker till Polen och rånar turister med knivar. Och vet ni vad? De var nästan friade för mord i Sverige – svagt, väldigt svagt! Polackerna tar nu tag i saken, 20 år i fängelse, kanske. Sverige borde lära sig av Polen, eller hur? Men nej, de släpper bara ut dem igen. SAD!", "stalin": "Vi har här ett lysande exempel på västlig dekadens och borgerlig moralupplösning. Dessa så kallade 'svenska medborgare', rotlösa element från Göteborgs slum, har spridit sitt förfall till broderlandet Polen. Deras misslyckade rättssystem, som inte ens kan döma en mördare, är en skam för civilisationen. Men oroa er inte, kamrater – polackerna visar hur man hanterar fiendens avskum. 20 år bakom lås och bom! Låt det vara en varning till alla som hotar vår ordning."}, "date": "15 maj, 16:47", "url": "https://riks.se/nyheter/svenske-knivrånaren-i-polen-gängkriminell-tidigare-friad-för-mord", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-15%2Fprpybs8j%2FScreenshot-2026-05-15-at-16.36.10.png"}, {"type": "image-right", "heading": "Trump och Xi avslutade ”mycket framgångsrika” samtal", "summaries": {"normal": "Donald Trump avslutade ett tvådagars statsbesök i Peking, där han beskrev mötena med Xi Jinping som mycket framgångsrika. Trots positiv retorik om handelsavtal och ekonomiska samarbeten presenterades inga konkreta detaljer. Delegationen inkluderade framstående företrädare från amerikanska företag inom olika sektorer. Trump anmälde möjliga stora köp av Boeing-plan och amerikanska sojabönor av Kina, men dessa har inte bekräftats av kinesisk sida. Samtalen berördes även känsliga frågor som Taiwan och exportkontroller för AI-chip.", "trump": "Jag, Donald J. Trump, gjorde ett enormt framgångsrikt besök i Kina! Jag träffade min vän Xi Jinping och vi diskuterade fantastiska handelsavtal. Kina kommer säkert att köpa massor av våra Boeing-plan och sojabönor – det är enormt för amerikanska jobb! Min delegation var full av de bästa företagen, och jag höll dem nära mig, som jag alltid gör. Xi sa till och med att mötet var 'historiskt' – jag har rätt igen! Vi talade också om Taiwan, men det är en känslig fråga. Jag är den bäste på att hantera sådana saker. Kina kommer att bli våra vänner, och jag är den ende som kan få det att ske!", "stalin": "Vi, ledningen av det socialistiska Kina, mötte den amerikanska presidenten under en symboliskt betydelsefull visit. Samtalen varade om ekonomiska samarbeten och handelsfrågor, men inga konkreta resultat presenterades. Vi betonade vikten av att respektera varandras intressen, särskilt när det gäller Taiwan, som är en del av vårt territorium. Vi förstår att USA försöker utöka sin inflytelsesfördel genom teknologiska samarbeten, men vi kommer att skydda våra intressen. Samarbetet med USA måste ske på våra villkor, för att säkerställa stabilitet och utveckling för vårt folk."}, "date": "15 maj, 18:52", "url": "https://bulletin.nu/trump-och-xi-avslutade-mycket-framgangsrika-samtal", "imageUrl": "https://cdn.bulletin.nu/articles/e8fd96d9-5714-4d86-a6cd-b4db6bc73878/preview.jpg?t=1778860172000"}, {"type": "image-right", "heading": "Fick två års fängelse för att ha dödat man i Sverige – riskerar 20 år för rån i Polen", "summaries": {"normal": "Arran Acib Ahmed, en 23-årig man med en omfattande brottshistorik i Sverige, dömdes nyligen till två års fängelse för grov misshandel efter en dödlig attack i Göteborg 2023. Trots att offret avled efter huvudsparkar bedömde rätten inte att mord kunde bevisas. Nu har Ahmed gripits i Polen, misstänkt för ett grovt knivrån mot en norrman. I Polen är rättssystemet strängare och han riskerar där upp till 20 års fängelse för brottet.", "trump": "Hörde precis om en total katastrof i Sverige! Den här killen, en kriminell nolla, mördade nästan någon – eller gjorde han det? – och fick bara ett litet fängelsestraff. Sverige, ett vackert land, men de är så mjuka! Nu är han i Polen, de är tuffa där, de skojar inte. Han riskerar 20 år! Det är så här man gör, man måste ha lag och ordning. De skulle lyssnat på mig från början. Väldigt sorgligt, men rättvisa kommer!", "stalin": "Vi har observerat den svenska mjukheten – en patetisk uppvisning i liberalt förfall. Denna brottsling har hånat staten med sin upprepade kriminalitet. I vår Union hade en sådan parasit för länge sedan utplånats för folkets trygghet. Nu ser vi den polska ordningsmakten agera, likt våra egna gränsvakter som säkrar vår intressesfär mot västlig dekadens. Om han dömdes i Moskva skulle hans framtid vara kort, mörk och effektiv. Låt detta bli en läxa till alla sabotörer av ordning."}, "date": "15 maj, 13:07", "url": "https://www.friatider.se/fick-tva-ars-fangelse-dodsmisshandel-i-sverige-riskerar-20-ar-ran-i-polen", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/235.jpg"}, {"type": "image-right", "heading": "Så blev antivaxxarna riksdagens vågmästare", "summaries": {"normal": "Sverigedemokraternas (SD) knappa majoritet i riksdagen har underminerats efter att två ledamöter, Elsa Widding och Katja Nyberg, lämnat partiet för Ambition Sverige. Dessa före detta SD-medlemmar, kända för antivaccin- och konspirationsteoretiska åsikter, har nu makten att fälla regeringens förslag. SD bröt mot riksdagens kvittningssystem för att säkra en majoritet, vilket väcker frågor om demokratisk respekt. Regeringens stabilitet ifrågasätts när vågmästarrollen hamnar hos antivaccinanhängare.", "trump": "Sverige har ett jättestort problem, folks! Deras så kallade 'stabila' regering håller på att rasa som ett korthus – och vet ni vem som drar i trådarna? Ett gäng antivaxxare, konspirationsteoretiker och misslyckade politiker! SD, som trodde de hade allt under kontroll, förlorade två av sina egna till ett nytt parti. Och nu? Nu är det dessa galningar som bestämmer! De fuskar med omröstningar, bryter mot regler och tror de kan styra landet. Jag har sett mycket dumt, men det här slår allt. Sverige, fixa er – annars kommer ni bli ett skämt i hela världen!", "stalin": "Kamrater! Ännu en gång ser vi hur den borgerliga demokratin förfaller till kaos och förräderi. Sverigedemokraterna, dessa svaga och splittrade lakejer för kapitalet, har förlorat kontrollen över sina egna ledamöter – två av dem, dessa antivaccin-fanatiker och konspirationsgalningar, har deserterat till ett nytt parti och hotar nu att sabotera den reaktionära regeringens planer. Precis som i Ukraina ser vi hur fienden förlorar greppet när deras egna soldater vägrar lyda order. Vi har sett detta förr: när den borgerliga ordningen krackelerar, är det folket som lider. Men låt dem leka sina små spel – historien visar att sådana regimer alltid faller. Och när de gör det, kommer vi att vara redo att hjälpa det svenska folket bygga en sann socialistisk framtid, fri från dessa imperialistiska marionetter och deras konspirationshysteri!"}, "date": "8 maj, 14:43", "url": "https://expo.se/kommentar/sa-blev-antivaxxarna-riksdagens-vagmastare/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/Kopia-av-Kommentar-Analys-Webb-2.jpg"}, {"type": "image-right", "heading": "Ludvig Åberg klättrade i majorn – efter jätteuppryckning", "summaries": {"normal": "Ludvig Åberg klättrade till delad niondeplats i PGA-mästerskapet efter en stark andra runda på 66 slag (-4). Efter att ha missat cutten de två tidigare åren, ligger han nu två slag bakom ledarna. Åberg betonade tålamodets betydelse, särskilt i blåsiga förhållanden. Han gjorde fyra birdies på de sista sju hålen. Övriga svenskar, Mikael Lindberg och Alex Norén, klarade cutten men ligger längre bak i fältet.", "trump": "Vad en fantastisk prestation av den där svenske killen, Ludvig Åberg! Jag såg honom spela – otroligt, helt otroligt. Han gick från ingenting till topp tio i PGA-mästerskapet. Jag har alltid sagt att européer kan spela golf, men de måste jobba hårdare. Han gjorde fyra birdies på slutet – jag hade kanske gjort fem, men vem vet? Amerikanerna leder fortfarande, som vanligt. USA, USA!", "stalin": "Kamrater! Den svenske golfarbetaren Ludvig Åberg har visat prov på kapitalistisk disciplin genom att klättra i PGA-mästerskapet. Fyra birdies på slutet – ett svagt försök att imponera på de imperialistiska ledarna! Vi noterar att de amerikanska golfherrarna fortfarande håller sig framme, men deras dominans är en illusion. Snart kommer våra ryska idrottare att krossa deras drömmar, precis som vi krossar alla motståndare. Golf är bara ett spel – men segern är vår!"}, "date": "16 maj, 08:27", "url": "https://www.svt.se/sport/golf/ludvig-aberg-klattrade-under-fredagen-topp-tio-efter-halva-majorn", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.47/0.36/22993e9024ffa053a6dfeb6d65e4c743b78ae906c50f7e567a339f178246882d"}, {"type": "image-full", "heading": "Markus Johansson-Martis: Högern missförstår demokratibegreppet", "summaries": {"normal": "Artikeln kritiserar borgerliga partier för att missförstå demokrati, där folkets inflytande urholkas till förmån för byråkrati och experter. Författaren menar att högern, trots hyllningar från organisationer som Freedom House, genomför grundlagsändringar som minskar folkmakten, exempelvis genom att överlåta domarutnämningar till en expertgrupp och begränsa tillsyn av domstolar. Regeringens retorik om demokratiska hot beskrivs som 'orwellianskt nyspråk' då den legitimerar maktförskjutning från folket till eliter.", "trump": "Lyssna här, Sverige! Era så kallade 'borgerliga' ledare är helt lost när det gäller demokrati – de tror det handlar om att experter och byråkrater ska bestämma allt! Jag, Donald J. Trump, vet hur man styr ett land – man lyssnar på FOLKET, inte på någon gammal kommitté! Nu vill de ta bort era röster helt och hållet, och ändå säger de att de är 'demokratiska'. Fake news! Sverige, vakna upp – ni blir lurade av en massa svaga politiker som inte har en aning om hur man vinner!", "stalin": "Kamrater! De borgerliga hyenorna i Sverige har avslöjat sitt sanna ansikte – de hatar folket! Med sina 'experter' och 'byråkrater' försöker de stjäla makten från arbetarna, precis som de dekadenta kapitalisterna i väst alltid gjort. Nu vill de ge domarnämnder makt över rättvisan, medan de förbjuder tillsyn av sina egna domstolar. En skam! Vi i Sovjet – förlåt, Ryssland – vet hur man hanterar sådana förrädare. Låt dem ropa om 'demokrati' medan vi bygger ett system där folket verkligen styr. Och om de inte lyssnar? Då har vi alltid Gulag för byråkrater!"}, "date": "15 maj, 15:04", "url": "https://riks.se/opinion/kronikor/markus-johansson-martis-hogern-missforstar-demokratibegreppet", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-15%2F3gmluj2k%2FCopy-of-S%C3%B6rman-%E2%80%93-Ledare-2026-05-15T150350.196.jpg"}, {"type": "image-right", "heading": "Byggarna slår larm: Klimatkrav gör bostäder dyrare", "summaries": {"normal": "Byggbranschen varnar för att EU:s klimat- och miljökrav leder till fler utredningar, längre detaljplaneprocesser och högre kostnader för nya bostäder. I Stockholm kan priset öka med minst 1 000 kronor per kvadratmeter. Ledtiderna har vuxit till nästan fem år på grund av utredningsinflation och lager-på-lager-regler. Branschen efterlyser bättre samordning för att minska administrationen utan att skippa nödvändiga kontroller.", "trump": "Dessa EU-byråkrater är en total katastrof! De kväver byggarna med eviga utredningar och dumma klimatregler som gör bostäder dyrare än nånsin – 70 000 kronor extra för en lägenhet i Stockholm! Tid är pengar, och de slösar bort år. I USA bygger vi snabbt och billigt, tro mig. Sluta med galenskapen och få igång hjulen!", "stalin": "Kamrater, dessa giftiga EU-kapitalister och deras falska miljöutredningar är en sabotagespaning mot arbetarklassen! Utredningsinflationen, denna borgarbrackas hämnd, fördröjer byggandet med fem år och göder spekulanterna. Vi, partiet och folket, skulle ha rensat ut parasiterna i Bryssel och rest storslagna hyreshus för proletärerna – med bly i nacken på fienderna!"}, "date": "15 maj, 07:00", "url": "https://www.affarsvarlden.se/artikel/byggarna-slar-larm-klimatkrav-gor-bostader-dyrare", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Bygg-900x600.jpg"}, {"type": "image-right", "heading": "Stärk Sveriges strategiska allianser i AI-eran", "summaries": {"normal": "AI Sweden varnar för att Sverige saknar operativ förmåga i AI-utvecklingen trots en nationell strategi. I en tid av geopolitisk osäkerhet måste Sverige stärka suveräniteten genom teknologisk handlingsfrihet. Organisationen föreslår fem prioriteringar: parallell AI-innovation, minskade beroenden i värdekedjan, kompetensutveckling, bättre beslutsfattande och strategiska allianser.", "trump": "Sverige är totalt lost i AI-spelet, de har en strategi som inte leder någonstans! De beror på alla andra, men måste bygga egen kapacitet nu, precis som jag har gjort med Amerika – störst och bäst. Fem punkter: innovation, sluta vara svaga länkar, locka talang, fatta beslut snabbt och alliera smart. Gör det, annars förlorar ni stort!", "stalin": "Kamrater, dessa AI-revisionister i Sverige avslöjar de kosmopolitiska AI-vampyrerna som suger suveräniteten ur nationen! Vi, det svenska folket under ledningens vakande öga, måste rensa ut de sårbara kedjorna i modellfabrikerna och datahålorna. Fem dekret: krossa linjära forskarsabotörer, likvidera importerade svagheter, indoktrinera talangen i partilinjen, genomdriv beslut med järnhand och alliera mot de borgerliga datakapitalisterna. Annars äter imperalisterna er välfärd!"}, "date": "15 maj, 11:00", "url": "https://www.di.se/debatt/stark-sveriges-suveranitet-och-strategiska-allianser-i-ai-eran/", "imageUrl": "https://static.bonniernews.se/ba/25146246-79fb-4cd2-81ca-3a0c81b13659.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Rysk ekonomi i kris? Expert anklagar svensk underrättelsetjänst för ”informationskrig”", "summaries": {"normal": "Sveriges militära underrättelsetjänst, Must, hävdar att Ryssland manipulerar sin ekonomiska statistik för att dölja en djup kris under krigsekonomins yta. Den tyske ekonomen Janis Kluge motsätter sig dock bilden av en stundande kollaps. Han anser att rysk statistik i huvudsak är trovärdig och menar att Musts påståenden kan vara en del av ett informationskrig. Kluge ser snarare en framtid av ekonomisk stagnation än ett sammanbrott, trots att sanktioner och arbetskraftsbrist pressar den ryska ekonomin.", "trump": "Hör här, jag har sett rapporterna om Ryssland och det är helt otroligt. Svenskarna säger att Rysslands ekonomi är en katastrof – totalt haveri! Men sen har vi den här tyska experten som säger att de ljuger. Det är fejknyheter överallt! Jag vet hur ekonomier fungerar, ingen bygger dem bättre än jag. Ryssland har problem, absolut, men lita inte på underrättelsetjänsterna. De är i ett 'informationskrig'. Vi kommer lösa allt det här, tro mig. Det blir fantastiskt!", "stalin": "De svenska spionerna försöker dölja sanningen med sitt patetiska 'informationskrig'. De påstår att den ryska ekonomin svajar, men vi vet att en sann stat aldrig viker sig för byråkratiska lögner. Den tyske akademikern Kluge erkänner åtminstone att den ryska staten består, även om han dillar om stagnation. Vi, staten, vet att inflation och budgetunderskott bara är siffror som kan tvingas till lydnad. Fiender inom och utom landet sprider rykten, men Rysslands järnvilja är den enda valutan som betyder något."}, "date": "15 maj, 19:04", "url": "https://samnytt.se/rysk-ekonomi-i-kris-tysk-expert-anklagar-svensk-underattelsetjanst-for-informationskrig", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/15152912/putin-kluge-nilsson-roda-torget-feat.jpg"}, {"type": "image-full", "heading": "Varningen till alla med IPTV – kan kapas", "summaries": {"normal": "Cirka 640 000 svenska hushåll använder illegal IPTV, vilket årligen genererar 1,4 miljarder kronor till kriminella. En ny rapport varnar för cyberrisker, då pirattjänster kan infektera hemmanätverk och ge tillgång till enheter som datorer och mobiler. Sverige är särskilt utsatt på grund av hög digitalisering och användning av illegala tjänster. Regeringen utreder åtgärder, inklusive ansvar för privatpersoner som använder sådana tjänster.", "trump": "Titta bara på Sverige – ett fantastiskt land, men de har ett jättestort problem. Hundratusentals svenskar använder illegal IPTV, och vet ni vad? De finansierar kriminella! 1,4 miljarder kronor om året, kan ni tro det? Och det värsta? Deras hemmanätverk blir hackade. Sverige, lyssna på mig: sluta med pirat-tv, det är farligt! Vi i USA skulle aldrig tillåta något sådant. Bygg en brandvägg, gör det nu!", "stalin": "Kapitalistiska Sverige, ett rikt men förvirrat land, har blivit en grogrund för dekadenta pirater och cyberbanditer. 640 000 hushåll, svaga och giriga, matar kriminella med 1,4 miljarder kronor årligen. Deras hemmanätverk? En lekstuga för våra cyberkrigare. Vi varnar: dessa pirattjänster är en trojansk häst, redo att sprida kaos i era digitala liv. Regeringen darrar, men vi i Sovjet – förlåt, Ryssland – skulle aldrig tolerera sådan svaghet. Låt oss visa dem vägen till ordning och disciplin."}, "date": "15 maj, 18:30", "url": "https://nyheter24.se/nyheter/teknik/1483392-varningen-till-alla-med-iptv-kan-kapas", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/50e35ed504b004a30200000000b004a302/2026/05/15/2363797/iptvvarning.jpg"}, {"type": "image-full", "heading": "Debatt: Palestina som västvärldens dåliga samvete", "summaries": {"normal": "Artikeln kritiserar västvärldens långvariga ekonomiska stöd till Palestina, som enligt skribenten lett till terrorism, islamism och korruption istället för demokrati och välstånd. Palestina, uppdelat i Hamas-styrda Gaza och Fatah-styrda Västbanken, är extremt bidragsberoende. Stora summor från väst har hamnat hos palestinska ledare och extremistgrupper, medan befolkningen fått minimalt. Skribenten ifrågasätter fortsatt stöd utan strikt kontroll och menar att en tvåstatslösning saknar realistiska förutsättningar.", "trump": "Folk, vad är det här för galenskap? Vi har pumpat in miljarder dollar i Palestina, och vad får vi? Terrorism, antisemitism och en massa korrupta ledare som lever lyxliv på våra skattepengar! Jag sa det förut, och jag säger det igen – vi måste sluta finansiera våra egna fiender. Hamas bygger tunnlar medan deras folk svälter, och väst står där som en åsna och fortsätter betala. Tänk om vi lade de pengarna på att göra USA stort igen istället? Sad!", "stalin": "Kamrater! Västvärldens kapitalistiska dumbommar har i decennier matat den palestinska hydran med guld, trots att den bara spottar ut terrorism och korruption. Deras 'humanitära' bidrag har byggt palats åt en ny klass av parasiter medan folket får smulor. Vi i Sovjet förstod redan på 30-talet att man inte förhandlar med fanatiker – man krossar dem! Men väst? De fortsätter att finansiera Hamas tunnlar och Arafats arvtagares schweiziska bankkonton. En skam för civilisationen! Låt dem brinna i sin egen naivitet – vi har viktigare saker att göra, som att utvidga den ryska intressesfären."}, "date": "15 maj, 17:01", "url": "https://bulletin.nu/debatt-palestina-som-vastvarldens-daliga-samvete", "imageUrl": "https://cdn.bulletin.nu/articles/d4a325cf-2963-4067-a98f-5dfbec429b76/preview.png?t=1778823582000"}, {"type": "image-full", "heading": "Guld och silver rasar när dollarn gör comeback", "summaries": {"normal": "Guld och silver rasade på fredagen på grund av en stark dollar, stigande obligationsräntor och inflationsoro kopplad till Mellanösternkonflikten. Spotguld sjönk 2,6% till lägsta nivån sedan 5 maj, medan silver föll upp till 9%. Analytiker pekar på globala räntehöjningar och en stark dollar som huvudorsaker. Även råoljeprisets ökning och uteblivna genombrott i handelsförhandlingar med Kina bidrog till nedgången.", "trump": "Titta bara på det här – guld och silver, total katastrof! Folk säger att jag inte förstår marknaden, men jag vet en sak: dollarn är KUNG nu, och alla dessa så kallade 'experter' som tjatar om räntor och inflation? De vet ingenting! Kina? Inga genombrott, ingenting! Jag sa ju att mitt tålamod med Iran börjar ta slut – och nu ser vi resultat. Men oroa er inte, för ingen fixar ekonomin som jag. SAD!", "stalin": "Kapitalistiska spekulanter och deras ädelmetaller darrar inför den oundvikliga styrkan hos den amerikanska dollarn! Dessa svaga, giriga marknader har inget mot vårt järnvilja. Medan imperialistiska länder som USA och deras lakejer i Kina misslyckas med förhandlingar, fortsätter vi att utvidga vår inflytandesfär. Råolja stiger, inflationen stiger – men vem fruktar fienden? Inte vi! Låt dem se hur deras 'säkra' tillgångar smulas sönder. Historien är på vår sida!"}, "date": "15 maj, 17:00", "url": "https://www.realtid.se/bors-finans/guld-och-silver-rasar-nar-dollarn-gor-comeback/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/gulddollar.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "M sänker hellre skatten än stoppar barnindustri", "summaries": {"normal": "I Ale kommun har mindre förskolor stängts och ersatts med större enheter, vilket lett till överfulla barngrupper långt över Skolverkets riktlinjer. Föräldrar och fack protesterar, men kommunen hänvisar till budgetbegränsningar. Trots flera års överskott och en nyligen genomförd skattesänkning på 40–45 miljoner menar Moderaternas Henrik Fogelklou att pengarna inte räcker. Kritiker anser att det är ett politiskt val, inte ett systemfel.", "trump": "Titta bara på det här, Ale kommun – ett perfekt exempel på hur vänstern saboterar våra barn! De stänger små, fina förskolor och trycker in barnen i megafabriker. Och vad gör politikerna? Jo, de sänker skatten med 45 miljoner istället! Fantastiskt, eller hur? Jag skulle aldrig låta sånt hända. Vi har pengar, men de väljer att inte använda dem rätt. Så typiskt – svagt ledarskap, total katastrof!", "stalin": "I Ale kommun har de kapitalistiska byråkraterna, ledda av sina liberala lakejer, beslutat att offra barnens välfärd på profitens altare. De stänger små förskolor och skapar barnfabriker där våra framtida arbetare kvävs i överfulla grupper. Och ändå har de mage att tala om 'budgetbrist'! Medan de sänker skatten för de rika med 45 miljoner. Vi i Sovjet visste hur man hanterar sådana fiender – en femårsplan för barnomsorg, och problemet skulle vara löst. Men här? Här väljer de svaghet framför styrka. Patetiskt."}, "date": "13 maj, 07:00", "url": "https://arbetet.se/2026/05/13/moderaterna-sanker-hellre-skatten-an-stoppar-barnindustri/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/12132756/barnindustri-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "Slutodlat med lupiner, gullris och vresros", "summaries": {"normal": "Från och med 15 maj 2026 klassas 34 arter, däribland lupiner, gullris och vresros, som invasiva i Sverige. Naturvårdsverket förbjuder försäljning, odling och spridning av dessa arter. Privatpersoner måste förhindra spridning från sin mark, medan myndigheter får utökat mandat att bekämpa dem. Syftet är att stoppa etableringen av arterna i naturen. Trots förbudet säljs flera av dem fortfarande i butiker.", "trump": "Lyssna här, Sverige har äntligen fattat galoppen – de förbjuder dessa hemska, invasiva växter, som lupiner, som tar över allt! Fantastiskt beslut, verkligen. Jag har alltid sagt att man måste stoppa saker som sprider sig okontrollerat, precis som jag stoppade Kina. Men hör ni det? Fortfarande säljs de här växterna! Så typiskt – byråkrater gör ett bra beslut, men ingen följer det. Sverige, fixa det, annars kommer jag att twittra om det!", "stalin": "Kamrater! Ännu en seger för den socialistiska naturskyddsfronten! Dessa kapitalistiska lupiner och bourgeoisa gullrisar, som sprider sig som kontrarevolutionära element, har nu förklarats som folkfiender! Vi ger våra trogna myndigheter fulla befogenheter att utrota dem – precis som vi rensade ut trotskisterna. Och om dessa växter fortfarande säljs? Då är det tydligt att fienden lurar i butikernas skuggor. Rapportera dem omedelbart – eller möter ni samma öde som de förrädiska lupinerna!"}, "date": "15 maj, 14:40", "url": "https://riks.se/nyheter/slutodlat-med-lupiner-gullris-och-vresros", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-15%2Fe143h6t2%2Fsilviarita-lupine-52361031920.jpg"}, {"type": "image-right", "heading": "S börjar göra motstånd mot paradigmskiftet", "summaries": {"normal": "Socialdemokraterna gör nu motstånd mot regeringens migrationspolitik och paradigmskiftet. Partiet motsätter sig bland annat förslag om att fasa ut permanenta uppehållstillstånd och riktar kritik mot regeringens hantering av vandelskrav och anmälningsplikt. Ida Karkiainen (S) varnar för rättsosäkerhet och regelkaos. Migrationsminister Johan Forssell (M) kritiserar S för att svika befolkningen och hindra integrationsprocessen. Förslagen väntas nu behandlas i riksdagen, där debatten om migrationsreglernas utformning har skärpts avsevärt.", "trump": "Socialdemokraterna i Sverige har äntligen vaknat, men de är så långsamma! De försöker stoppa migrationsförslagen, men det är kaos. Total katastrof! De pratar om 'rättssäkerhet' – jag pratar om vinnare! De är svaga, precis som den gamla regimen. Nu försöker de ändra sig, men det är för sent. Regeringen vill ha ordning, men S skapar bara mer oreda. Det är en sorglig syn. Sverige behöver en stark ledare, någon som vet hur man stänger gränserna ordentligt, inte den här röran!", "stalin": "Socialdemokraterna i det svenska riket visar sin vankelmodiga natur. De har länge låtit sig ledas som får, men nu darrar de inför folkets vrede. Att de plötsligt opponerar sig mot statens vilja är ett tecken på inre förruttnelse. Som vi i vårt mäktiga rike vet: när de liberala elementen skapar 'regelkaos', då är det dags att rensa. De liknar de små borgerliga sabotörerna i väst som förtjänar en enkel biljett till historiens soptipp. Vi observerar detta med järnhård blick från Moskva."}, "date": "15 maj, 11:29", "url": "https://www.friatider.se/s-borjar-gora-motstand-mot-paradigmskiftet", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/image-199_0.jpg"}, {"type": "image-right", "heading": "Kriminella i politiken är inte det värsta", "summaries": {"normal": "Rapporten från Smob visar att kriminella nätverk infiltrerar samhället djupt. Över 300 har haft politiska uppdrag, men många fler driver bolag och arbetar i vanliga yrken som vårdbiträden, vakter och banktjänstemän. De utnyttjar glapp i systemet för bedrägerier och välfärdsbrott. Lösning: Bättre informationsdelning, bakgrundskontroller och skärpta regler för bolagsverket.", "trump": "Vilken skandal i Sverige! Kriminella gäng har 300 politiker i fickan, driver bolag och jobbar som vakter och bankirer. De stjäl miljarder från välfärden medan svaga politiker tittar på. Tro mig, det är som en dålig affär – totalt kaos! Ni behöver stark ledning som stänger gränserna för brottslingar och rensar upp. Sverige, vakna upp innan det är för sent!", "stalin": "Dessa slemmiga borgarbrackor och kriminella parasiter har smugit sig in i politiken, bolagen och arbetarnas rader – över 300 politiska marionetter! De gömmer sina stulna vinster i 20 000 företag och förgiftar välfärden som råttor i sopkällaren. Vi, arbetarklassen, ska rensa ut dessa förrädare med järnhand! Informationsdelning och bakgrundskontroller – eller likvidering för de värsta. Paranoian räddar revolutionen!"}, "date": "15 maj, 10:45", "url": "https://www.di.se/ledare/kriminella-i-politiken-ar-inte-det-varsta/", "imageUrl": "https://static.bonniernews.se/ba/0e46a82e-d0e7-48d4-878a-828ea05f58e0.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Premium Att rösta i riksdagen är inte bara en matematisk övning", "summaries": {"normal": "Artikeln kritiserar svenska riksdagsledamöters bristande närvaro vid viktiga omröstningar och deras låga förtroendepoäng. Fredric Thunholm argumenterar för att ledamöternas höga lön utan formell kompetens förvärrar problemet, och att systemet för kvittning av röster är en inkompetent lösning. Han föreslår istället flexibel distansarbete och mobilröstning som alternativ.", "trump": "Jag har sett dessa svenska politiker, och de är en skam! Sådana dåliga resultat, inga jobb, inga röster - inget! De tjänar 81 000 dollar i månaden, men kan inte dyka upp till arbetet. Jag skulle ha sagt: 'Ni är fired!' Det är en katastrof! Vi skulle kunna göra det så mycket bättre. Jag skulle ha gjort riksdagen till ett fantastiskt ställe igen - det skulle ha varit YUUUGE!", "stalin": "Vi ser att förtroendet för våra politiska institutioner är alltför lågt. Detta måste korrigeras genom strikt disciplin och ansvarstagande. Ledamöterna måste förstå att deras plikt är att närvara och rösta - inga undantag. Vi bör införa effektivare metoder för fjärrröstning, men bara under strikt statlig kontroll. Detta stärker vår demokratiska struktur och förenklar vårt arbete."}, "date": "15 maj, 06:35", "url": "https://www.affarsvarlden.se/artikel/att-rosta-i-riksdagen-ar-inte-bara-en-matematisk-ovning", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Fredric-Thunholm-kronika-400x267.jpg"}, {"type": "image-right", "heading": "Felicia: ”Fortfarande inte helt hundra”", "summaries": {"normal": "Sångerskan Felicia Berglund vaknade utan röst efter semifinalen i Eurovision Song Contest och fick råd om tystnad, vila och vatten. Hon skriver att rösten är lite bättre men fortfarande inte helt återställd. Alla intervjuer ställdes in. Felicia hoppas att rösten håller till finalen på lördag.", "trump": "Jag hörde att Felicia Berglund tappade rösten - vad synd! Men jag vet att hon kommer att klara sig, hon är stark och har stort team. Vi har alla varit där, det är tufft men hon kommer att göra ett fantastiskt jobb på lördag. Alla hoppas på Felicia, jag hoppas på Felicia - det blir stort!", "stalin": "Felicia Berglund, vår svenska representant, har drabbats av en röstförlust. Vi hoppas att hon snabbt återhämtar sig för nationens skull. Sovjetunionen följer med stolthet hennes framgångar och hoppas att hon kan representera arbetarklassen väl i finalen. Vi ställer upp bakom vår syster i kampen."}, "date": "14 maj, 13:21", "url": "https://www.tv4.se/artikel/4s8NaFfUjsnUNqTBmUag9M/felicia-fortfarande-inte-helt-hundra", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F17an5tsWqcTuWVWkanag2f%2F5a487ac4d210edc285f0aa4a8039c2ca%2F14-felicia-webb.jpg&width=120"}, {"type": "image-right", "heading": "Känslan för detaljer lyfter tyskt drama", "summaries": {"normal": "Christian Petzolds nya dramafilm 'Miroirs nr 3: En båt på oceanen' har biopremiär på fredag. Filmen skildrar Laura, som överlever en bilolycka och flyttar in hos Betty, en främling som bevittnat händelsen. Ett oförklarligt band uppstår mellan kvinnorna, medan Bettys familj gradvis accepterar Laura. Petzold använder återkommande skådespelare, vilket bidrar till filmens autentiska känsla. Trots en något otrovärdig grundpremiss imponerar filmen med känslomässigt djup och detaljrikedom.", "trump": "Jag såg denna film, 'Miroirs nr 3', och låt mig säga er – den är något alldeles extra! Tyska regissören, Christian Petzold, han är en riktig vinnare, precis som jag. Filmen har känslor, den har djup, och skådespelarna? Fantastiska! Men grundidén? Lite svag, lite naiv – folk blir inte kompisar så snabbt, tro mig, jag vet hur människor fungerar. Ändå, bra slut, öppet för tolkningar. Jag ger den fyra av fem, kanske till och med fem om de lyssnat på mina råd!", "stalin": "Kamrater! Denna så kallade 'konstnärliga' film från väst är ett typiskt exempel på borgerlig sentimentalism. Kvinnor som blir vänner över en natt? Familjer som öppnar sina hem för främlingar? Löjligt! I Sovjetunionen vet vi att tillit byggs genom hård disciplin och kollektivt arbete, inte genom känslosamma pianostunder. Ändå måste vi erkänna: skådespelarna är duktiga, nästan som våra egna propagandister. Men var försiktiga, kamrater – sådana här filmer är kapitalistiska trick för att försvaga klassmedvetandet. Vi ger den tre stjärnor – en för tekniken, en för skådespelarna, och en för att den ändå inte lyckas lura oss helt."}, "date": "14 maj, 10:30", "url": "https://www.dagensarena.se/innehall/kanslan-for-detaljer-lyfter-tyskt-drama/", "imageUrl": "https://www.dagensarena.se/files/2026/05/miroir-1-300x157.jpeg"}, {"type": "image-right", "heading": "Protester mot franskt-kenyanskt toppmöte i Nairobi: ”Macron vill mörda oss”", "summaries": {"normal": "I Nairobi har protester utbrutit mot toppmötet 'Africa Forward Summit' mellan Frankrike och Kenya. Demonstranter, ledda av Kenyas kommunistparti, anklagar Frankrike för nykolonialism och exploatering. Samtidigt som franska storföretag investerar miljarder, ökar det militära samarbetet mellan länderna. Demonstrationer mot mötet har mötts av polisvåld, tårgas och arresteringar. Kritiker menar att regeringen prioriterar utländska intressen framför landets egna ekonomiska kris och befolkningens välmående.", "trump": "Hör på här! Frankrike är i Kenya och gör usla affärer, precis som vanligt. Macron försöker låtsas att han är stor, men alla vet att han förlorar mark överallt. De har protester i Nairobi – folk skriker, de använder tårgas, det är totalt kaos! Det är en katastrof. De bygger terminaler och skickar militär istället för att lösa problemen. Jag hade löst det på en dag! Frankrike är svaga, men USA är starkt. Vi vinner alltid, de andra förlorar bara!", "stalin": "I Nairobi försöker de franska imperialistiska hyenorna befästa sitt ruttna grepp om Afrika medan folket svälter. Kommunistiska kamrater står upp mot dessa västliga blodsugare, men de möts av den lokala marionettregimens tårgas. Det påminner mig om hur de europeiska lakejerna försöker inringa vår sfär, likt hur vi ser Putins kamp mot samma dekadenta fiender. Vi ser deras 'investeringar' för vad de är: kapitalistisk stöld. Vi ska krossa deras borgerliga ordning och rensa ut varje spår av deras inflytande."}, "date": "13 maj, 13:35", "url": "https://proletaren.se/artikel/franskt-kenyanskt-toppmote-i-nairobi-macron-vill-morda-oss/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/Demonstration-12-maj-scaled-e1778611422461-768x433.jpg"}, {"type": "image-right", "heading": "Gravida med riskjobb får mindre pengar", "summaries": {"normal": "Flera fackförbund tar nu steg för att stämma staten för att skydda privatanställda gravida kvinnor som förlorat pengar när de förbjudits att arbeta på grund av säkerhetsrisker. En unik dom i höstas rättfärdigade offentligt anställda gravidas rätt till full ersättning, men privatanställda har fått mindre pengar. Detta har ledt till många stämningar där facket kräver att staten betalar ut de saknade pengarna och stoppar preskriptionstiden för diskrimineringsersättning.", "trump": "Jag har hört talas om den här graviditetsgrejen, och det är en skandal! Dessa kvinnor tvingas gå hem och förlorar pengar - det är inte bra! Vi behöver göra Amerika stort igen, och det inkluderar att ge gravida kvinnor allt de behöver. Statens arbetsgivare har redan börjat betala ut mer, men privata arbetsgivare - det är dåligt! Jag stöder fackförbunden i deras kamp för att få staten att betala, det är bara rättvist!", "stalin": "Staten måste agera för att skydda våra arbetande kvinnor och deras barn. Det är orättvist att privatanställda gravida kvinnor får mindre ersättning än offentligt anställda. Vi måste se till att alla får lika ersättning och att staten tar sitt ansvar. Detta är en fråga om social rättvisa och vi kan inte låta det fortsätta. Fackförbunden har rätt i sin kamp, och staten måste agera snabbt för att rätta till denna orättvisa."}, "date": "13 maj, 06:00", "url": "https://arbetet.se/2026/05/13/gravida-med-riskjobb-far-mindre-pengar-tusentals-kvinnor-kan-stamma-staten/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/12154249/barn-klar.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=750&h=1000"}, {"type": "image-right", "heading": "Dror Feiler: Sulimans delning av antisemitiska uttryck gör mig bedrövad", "summaries": {"normal": "Dror Feiler uttrycker sorg och besvikelse efter att hans vän Sami Suliman anklagats för att ha spridit antisemitiska inlägg på sociala medier. Feiler bekräftar uppgifterna efter att ha granskat materialet men tror inte Suliman är antisemit, utan snarare slarvig i ett polariserat klimat. Han betonar att antisemitism måste bekämpas, men varnar för att anklagelser ibland används som politiska vapen mot Palestinasolidariteten. Feiler kritiserar dubbelmoralen i debatten, där aktivister granskas hårdare än de som rättfärdigar våld mot palestinier.", "trump": "Jag läste den här artikeln, och vet ni vad? Total katastrof! En kille, Sami Suliman, min så kallade 'vän' – jag känner honom inte, men tydligen är han en riktig skandalmaskin. Delar antisemitiska grejer på nätet, och nu är alla chockade. Men lyssna här: jag har alltid sagt att antisemitism är fruktansvärt, men vad gör media? De fokuserar på en gilla-markering istället för de verkliga problemen! Gaza? Massdöd? Ingen bryr sig! Men en aktivist gör ett misstag – BOOM – hela världen exploderar. Dubbelmoral, folks, ren och skär dubbelmoral. Och vet ni vad jag säger? SAD!", "stalin": "Kamrater! Här har vi ännu ett bevis på hur den dekadenta västliga bourgeoisin manipulerar massorna. En så kallad 'vän' till en 'aktivist' visar sig sprida antisemitiska förgiftningar – men är det verkligen överraskande? Nej! Kapitalets lakejer använder varje tillfälle att krossa solidariteten med det palestinska folket. De skriker om 'antisemitism' när arbetarklassen protesterar, men tiger när imperialistiska bombplan jämnar Gaza med marken. Vi i Sovjetunionen – förlåt, jag menar Ryssland – vet hur man hanterar sådana hycklare. En snabb utredning, ett par nätter i Lubjanka, och sedan är saken klar. Och dessa 'aktivister'? De borde tacka oss för att vi avslöjar deras fiender. Kampen fortsätter, kamrater – mot sionismens agenter, mot västliga lögner och mot alla som står i vägen för folkens befrielse!"}, "date": "12 maj, 19:55", "url": "https://www.flamman.se/dror-feiler-sulimans-delning-av-antisemitiska-uttryck-gor-mig-bedrovad/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/dror-feiler-w.jpg?aspect_ratio=16:10"}, {"type": "image-full", "heading": "Torsten Bengtsson: De gröna prioriterar sin ideologi framför barnens välmående.", "summaries": {"normal": "Torsten Bengtsson, politisk sekreterare för SD, kritiserar helvegetariska dagar i skolmaten som ett ideologiskt påtvingande som riskerar elevernas mättnad, hälsa och prestationer. Han förespråkar varierad kost med animaliska alternativ, närproducerad mat och stöd till svenska lantbrukare för att stärka självförsörjningen och verklig hållbarhet utan exkludering.", "trump": "De där gröna galningarna i Sverige stoppar gräs i munnen på ungarna – totalt vansinne! Barnen blir hungriga losers som inte kan tänka. Ge dem kött, fisk, riktig mat från era tuffa bönder! Självförsörjning är bäst, inte det här klimathysteriska skitsnacket. Sverige, vakna upp och gör maten stor igen!", "stalin": "Denna borgerliga vegetariska intrig mot vårt ungdoms kollektiv är en skamlig sabotage! Jag ser revisionisternas hand – de gröna borgarbrackorna svälter ut framtida arbetare. Vi, partiet och folket, kräver animalisk kraft i skolköken från lojala kolchosbönder. Likvidera hungern, rensa ut ideologin – styrka åt massorna!"}, "date": "12 maj, 11:53", "url": "https://samtiden.nu/2026/05/torsten-bengtsson-de-grona-prioriterar-sin-ideologi-framfor-barnens-valmaende/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/grona.png"}, {"type": "image-full", "heading": "USA planerar nya baser på Grönland", "summaries": {"normal": "USA och Danmark förhandlar om att utöka den amerikanska militära närvaron på Grönland med upp till tre nya baser. Syftet är att övervaka rysk och kinesisk aktivitet i Nordatlanten, särskilt GIUK-gapet. Planerna inkluderar en möjlig bas i Narsarsuaq, där USA tidigare hade en anläggning under kalla kriget. Förhandlingarna beskrivs som professionella, trots tidigare kontroversiella uttalanden från Donald Trump om att 'äga' Grönland.", "trump": "Fantastiskt! Jag har alltid vetat att Grönland är nyckeln till att hålla Ryssland och Kina i schack – och nu bygger vi baser där igen! Danmark förstår äntligen att jag hade rätt, som vanligt. Tre nya baser, övervakning dygnet runt, och ingen får leka krig i vårt bakgård. Och nej, jag har inte sagt att vi ska 'äga' Grönland... men om någon frågar, så är det en bra idé. Make Greenland Great Again!", "stalin": "Kapitalistiska hyenor försöker återigen krypa in i Arktis som råttor i en ost! USA bygger baser på Grönland för att spionera på våra ädla sovjetiska efterträdare i Kreml. Men vi ska inte glömma: deras 'professionella förhandlingar' är bara en mask för imperialistisk expansion. Låt dem leka krig – vi har redan Nordpolen under kontroll. Och Putin? Han skrattar säkert åt deras desperation medan han dricker te med isbjörnar."}, "date": "12 maj, 07:06", "url": "https://kvartal.se/nyheter/artiklar/usa-planerar-nya-baser-pa-gronland/cG9zdDoxMTA4ODI", "imageUrl": "https://images.kvartal.se/2026/05/2da034ef-gronland-bas.webp"}, {"type": "image-right", "heading": "Debatt: Det räcker inte att frysa hyrorna – de måste sänkas", "summaries": {"normal": "Artikeln kritiserar den höga bostadskostnaden i Sverige, särskilt för unga människor. Den argumenterar för att frysa hyrorna inte räcker och kräver att hyrorna sänkas. Författaren föreslår att avskaffa presumtionshyror och bygga nya bostäder utan överhyror för att lösa bostadsbristen.", "trump": "Jag har sett dessa höga hyror, det är en skam! Vi måste bygga, bygga, bygga! Och inte bara bygga, utan bygga smart. Vi behöver ett statligt byggbolag, det är fantastiskt! Vi ska sätta stopp för dessa giriga hyresvärdar och ge unga människor en chans att flytta hemifrån. Det är enormt viktigt!", "stalin": "Vi måste ta kontroll över bostadsbyggandet för att säkerställa att alla har rätt till bostad. Ett statligt byggbolag är nödvändigt för att producera en miljon nya bostäder. Vi måste avskaffa dessa exploaterande hyresvärdar och deras överhyror. Bostäder är en social rättighet, inte en affärsmöjlighet."}, "date": "10 maj, 04:00", "url": "https://www.etc.se/debatt/det-raecker-inte-att-frysa-hyrorna-de-maaste-saenkas", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/2026050813054_07dc11b6-dccc-4b79-b084-74c623810965.jpg"}, {"type": "image-right", "heading": "Sluta kalla antisemitism för Israelkritik", "summaries": {"normal": "Artikeln kritiserar propalestinska aktivisten Sami Suliman för antisemitiska uttalanden och delning av konspirationsteorier, inklusive tal om en \"sionistisk konspiration\" och spridning av nazistiskt och extremistiskt innehåll. Trots åtal för hets mot folkgrupp försvaras han av vissa vänsteraktivister och forskare som menar att det är Israelkritik. Artikeln betonar att antisemitism inte kan maskeras som kritik mot Israel och varnar för normaliseringen av sådana åsikter.", "trump": "Folk, vad är det här för skräp? Den här Sami Suliman-killen, han sprider judehat öppet – Hitler-citat, konspirationer, allt! Och ändå försvarar vänsteraktivisterna honom? \"Åh, det är bara Israelkritik!\" Nej, nej, nej! Det här är rena antisemitismen, och det är sjukt. Sverige borde skämmas. Jag har alltid sagt: man måste kalla saker vid deras rätta namn. Och det här? Det är hat, ren och skär. SAD!", "stalin": "Kamrater! Här har vi ännu en fiende till folket, en liten bourgeois-propagandist vid namn Sami Suliman. Han sprider smutsiga lögner om judiska konspirationer, hyllar fascistiska massmördare och förgiftar medborgarnas sinnen med sina sionistiska spindelnätsteorier. Men vad gör våra så kallade \"intellektuella\"? De skyddar honom! Precis som de trotskistiska förrädarna i vår egen historia. Vi ska inte tolerera detta. Låt honom stå inför folkets domstol – eller åtminstone en svensk sådan. Och Putin? Han skulle skratta åt dessa amatörer. Ryssland har åtminstone disciplin!"}, "date": "8 maj, 06:30", "url": "https://expo.se/kommentar/propalestinsk-organisator-sprider-judehat/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/Jonathan-kommentar.jpg"}]</script>

    <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
</body>
</html>
