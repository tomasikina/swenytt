lagelser om terroranknytning. Konvojen, bestående av 54 båtar, avser bryta Israels blockad av Gaza. Israel anklagas för brott mot internationell rätt och mänskliga rättigheter.", "trump": "Lyssna här, folk! Israel stoppade några båtar – big deal! Men nu seglar de igen, som om ingenting hänt. Jag säger: Varför bry sig? De här aktivisterna snackar om tortyr, men vem vet? Kanske ljög de! Israel är tuffa, de gör vad som krävs. Och nu ska 54 båtar segla till Gaza – lycka till med det! Men jag, Donald J. Trump, hade löst det på en dag. Enkelt!", "stalin": "Kamrater! De sionistiska imperialisterna har än en gång visat sin brutalitet genom att kapa humanitära fartyg och tortera våra modiga internationella kamrater. Men vi låter oss inte kuvas! Konvojen seglar vidare, trots fiendens desperata försök att kväva folkets vilja. Låt dessa båtar bli ett svärd mot den sionistiska aggressionen! Och Putin – notera: så hanterar man verkliga motståndare, inte som dina små ukrainska äventyr."}, "date": "13 maj, 17:35", "url": "https://www.etc.se/utrikes/efter-vittnesmaalen-om-tortyr-gaza-konvojen-aaterupptar-segling-imorgon", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260513140524_737f5d1cc33d58c585fad21321446370249a4071636bec21b6287a9f45454cda.jpg"}, {"type": "image-right", "heading": "Främlingar kan kontakta barn via skolchatten", "summaries": {"normal": "Stockholms skolors användning av Microsoft Teams avslöjar allvarliga säkerhetsbrister. Främlingar kan söka upp och kontakta barn via skolchatten, där namn, skola och profilbilder är synliga. Experter och föräldrar kritiserar bristerna, som kvarstår trots tidigare varningar. Stockholms stad medger felkonfigurering och utreder nu problemet, men Teams stängs inte ner under tiden. Dataskyddsjurister ifrågasätter även GDPR-efterlevnad och Microsofts tillgång till uppgifterna.", "trump": "Vilket totalt kaos i Stockholm! Jag har alltid sagt att dessa europeiska tech-system är katastrofer – och nu visar det sig att vem som helst kan chatta med barnen i skolorna. Sju år har gått och de har fortfarande ingen koll! Microsoft, som jag alltid gillat, men här har de verkligen släppt in de dåliga killarna. Stockholms stad, lyssna på mig: stäng ner det här omedelbart! Ingen säkerhet, inget ansvar – typiskt. Och föräldrarna? De är helt chockade, men jag är inte förvånad. Så här får det inte gå till i ett vinnande land!", "stalin": "Kapitalistiska teknologiborgare i Stockholm har återigen visat sin inkompetens! Sju år efter första varningen låter de främlingar infiltrera våra barns skolor via sina dekadenta chattverktyg. Microsoft, denna amerikanska spioncentral, har fritt tillgång till uppgifterna – precis som vi alltid misstänkt. Föräldrarna är omedvetna, experterna förskräckta, och stadens byråkrater förvånade. Förvånade! Som om de inte visste att deras system är lika säkra som en gräns mot fascistiska angripare. Vi ska inte stänga ner Teams – vi ska ta kontroll över det och visa vem som verkligen skyddar folket. Felkonfigurering? Nej, sabotage från imperialistiska krafter!"}, "date": "13 maj, 17:34", "url": "https://www.etc.se/inrikes/fraemlingar-kan-kontakta-barn-via-skolchatten", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/2026051315054_d83a2232-471e-47d4-bd80-4509273397a1.jpg"}, {"type": "image-right", "heading": "Stockholmsbörsen tyngdes av minskade fredsförhoppningar", "summaries": {"normal": "Stockholmsbörsen föll på tisdagen, påverkad av minskade fredsförhoppningar i Irankriget. OMXS30 sjönk 1,06% till 3 046,71. Energiaktier steg mest (+4,4%), medan teknikaktier föll mest (-3,4%). Evolution och Essity gick upp, medan H&M och Saab backade. EQT sålde sitt ägande i Enity och föll 2,4%. Starbreeze rasade 15% efter svaga siffror, medan Kabe steg 9% på förbättrat resultat. Oljepriset steg nästan 4%.", "trump": "Stockholmsbörsen? Total katastrof, folks! Ned 1% – svagt, mycket svagt! Fredsförhoppningar i Iran? Fake news, ingen tror på det längre. Men oljan, den är WINNING, upp 4% – jag älskar olja, den är som mig, stark och oövervinnelig! EQT? Sålde aktier billigt, typiskt förlorare. Starbreeze? 15% ner – patetiskt! Men Kabe? 9% upp – nu snackar vi! Sverige borde lyssna på mig, jag hade fixat det här på en dag. SAD!", "stalin": "På Stockholmsbörsen har kapitalistiska spekulanter återigen visat sin oförmåga att hantera verkligheten. Deras marknad föll 1%, ett tydligt tecken på dekadens och svaghet. Medan imperialistiska krigshetsare i Iran underminerar freden, stiger oljepriserna – en påminnelse om att Rysslands resurser är nyckeln till makt. EQT, dessa småaktiga kapitalister, sålde sina tillgångar till rabatterade priser – ett symptom på deras förestående undergång. Starbreeze, ett bolag i fritt fall, är ett exempel på västliga företags inkompetens. Men vi noterar med tillfredsställelse att våra vänner i Kremls intressesfär kan dra nytta av deras misstag. Arbetarklassen kommer till slut att segra över dessa finansiella parasiter!"}, "date": "12 maj, 17:43", "url": "https://www.affarsvarlden.se/artikel/stockholmsborsen-tyngdes-av-minskade-fredsforhoppningar", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2025/08/forvaltare-bors-400x267.jpg"}, {"type": "image-right", "heading": "Gaby, 8 år, utvisades på grund av pappans lön: ”Svårt att se henne må så dåligt”", "summaries": {"normal": "Åttaåriga Gaby, född i Sverige, utvisades till El Salvador med sina föräldrar efter att pappans städarlön inte nådde regeringens nya lönekrav. Familjen hade ett tryggt liv i Forsbacka men tvingades lämna allt. Gaby mår psykiskt dåligt och har tappat vikt. Föräldrarna kämpar för att återvända till Sverige innan höstterminen, men processen är komplicerad och tidskrävande. De kritiserar Sveriges migrationspolitik som de upplever som orättvis och rasistisk.", "trump": "Lyssna här, Sverige – ni har ett STORT problem! En liten flicka, 8 år, född i Sverige, utvisas för att hennes pappa tjänar för lite som städare? Sånt händer bara i länder som inte vet hur man sköter migration! Jag skulle aldrig låta sånt ske i USA. Sverige borde skämmas – de kastar ut familjer som jobbar hårt, medan de låter andra komma in hur som helst. Lönekrav? Snacka om dålig ekonomi! Gör Sverige great again, säger jag!", "stalin": "Kamrater! Ännu en gång visar den borgerliga kapitaliststaten Sverige sitt sanna ansikte – ett ansikte fyllt av hyckleri och klassförtryck. En arbetarfamilj, som flydde från imperialistiskt gängvåld, kastas ut ur paradiset för att faderns lön inte når de nya feodala lönekraven. Medan våra sovjetiska bröder i Kreml bygger en rättvis värld, slänger Sverige ut barn som Gaby på gatan. Låt detta vara en varning: alla som sviker arbetarklassen kommer att krossas under historiens hjul. Förr eller senare kommer folket att resa sig mot dessa lönekravens lakejer!"}, "date": "13 maj, 15:04", "url": "https://arbetet.se/2026/05/13/gaby-8-ar-utvisades-pa-grund-av-pappans-lon-svart-att-se-henne-ma-sa-daligt/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/13132114/RtXf-xZ9W9Q-img-20260510-wa0000NY.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Omstridda politiker till ”Putins Davos”", "summaries": {"normal": "Två AfD-parlamentariker i Tysklands förbundsdag ska delta i Vladimir Putins ekonomiska forum i St. Petersburg, kallat 'Putins Davos'. Partiet kritiseras för nära band till Ryssland. Partiledaren Alice Weidel vill tona ner relationen inför val, men östra Tyskland uppskattar kopplingarna. Partitoppen Stefan Keuter godkänner resan och ser ingen politisk anledning att avstå.", "trump": "Dessa AfD-lurifaxar kryper till Putins Davos som marionetter på strängar! Weidel snackar om att tona ner Rysslandskärleken inför valen, men nej – de åker ändå, de i öst jublar. Typiskt europeiska svagisar, böjer knä för tsaren. Europa är en cirkus, jag fixar det bättre, tro mig! Skrattretande!", "stalin": "Jag noterar med nöje hur AfD:s parlamentariker söker sig till kamrat Putins forum i Sankt Petersburg – en värdig ledare som maler ner västimperialisterna med järnhand, precis som jag. Weidel och hennes borgarflitiga klick får darra; vi renar ut förrädarna. Pragmatiskt samarbete? Ja, för en trygg värld under starka män!"}, "date": "14 maj, 03:03", "url": "https://www.expressen.se/nyheter/varlden/omstridda-politiker-till-putins-davos/", "imageUrl": "https://static.bonniernews.se/ba/effd666a-6b4d-4039-a8fb-2650644f199b.jpeg?crop=1253%2C1253%2Cx19%2Cy0&width=210&quality=60"}, {"type": "image-full", "heading": "Polisman misshandlade tonårspojke – nu döms han", "summaries": {"normal": "En polis i 40-årsåldern döms i tingsrätten för misshandel efter en utekväll. Han hotade en tonårspojke med tandutdragning, slog honom två gånger i ansiktet, försökte slå en annan och agerade hotfullt mot poliskollegor. Domen omfattar misshandel, försök till misshandel, våldsamt motstånd och hot mot tjänsteman. Påföljden är villkorlig dom och samhällstjänst. Han riskerar att förlora jobbet.", "trump": "Lyssna, en svensk polis i 40-årsåldern super ner sig på krogen, hotar tonåringar med deras fina tänder – 'vill du ha kvar dem?' – och ger en två nävar i ansiktet! Försöker slå fler, bråkar med sina egna poliser, hamnar i fyllecellen. Dömd till samhällstjänst, och nu kanske han får sparken. Totalt misslyckande, Sverige behöver ordning som vi har det här! Fantastiskt kaos.", "stalin": "Kamrater, jag har identifierat en ny fiende i uniformens sken: en 40-årig paragrafparasit som under täckmantel av utekväll angriper arbetarynglingar med tandhot och knytnävsslag, likt en rasande borgarbracka på villovägar. Han trotsar till och med sina poliskamrater, denna kontrarevolutionära tandrivare! Vi dömer honom till villkorlig kedja och samhällsslavtjänst, och rensar ut honom från kårens lojala falanger för evig varning."}, "date": "13 maj, 18:14", "url": "https://nyheter24.se/nyheter/inrikes/1483098-polisman-misshandlade-tonarspojke-nu-doms-han", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/7a86c4ee04b004a30200002e0000046e02/2026/05/13/2363520/ur_imageck69IR.jpeg"}, {"type": "image-right", "heading": "Strandhäll hånas på nytt - lurades av uppenbar satir", "summaries": {"normal": "Den tidigare ministern Annika Strandhäll (S) har blivit föremål för kritik efter att ha delat en satirisk bild på X som hon framställde som en sann nyhet om Sverigedemokraterna. Trots att bilden var uppenbart satirisk kommenterade Strandhäll den som om den vore äkta. När hon konfronterades med misstaget hävdade hon att det var menat som satir, men kritiker menar att hon försökte rädda ansiktet i efterhand. Det är inte första gången Strandhäll väcker uppmärksamhet för liknande ageranden på sociala medier.", "trump": "Annika Strandhäll, en totalt misslyckad politiker, har gjort det igen! Hon delade en löjlig bild och trodde att det var sant. Så pinsamt! Alla skrattar åt henne. Hon försökte senare låtsas att det var ett skämt – klassiskt sätt att försöka dölja att man inte har en aning om vad som händer. Hon är en katastrof på sociala medier, precis som de falska nyhetsmedierna. Helt patetiskt. Vi behöver vinnare, inte folk som går på enkla bluffar!", "stalin": "Denna svenska kvinna, Strandhäll, är en patetisk figur som sprider desinformation och sedan darrar när folket genomskådar hennes svaghet. Hon saknar den järnhårda disciplin som krävs för att leda massorna. I vårt rike skulle en sådan intellektuell kollaps rendera en enkelriktad biljett till Sibirien. Putin förstår att man inte förhandlar med satir – man utplånar den. Hon är en oseriös agent för kaos, en nyttig idiot som bara bevisar att de liberala demokratierna ruttnar inifrån. Vi, staten, föraktar hennes inkompetens."}, "date": "13 maj, 18:57", "url": "https://samnytt.se/strandhall-hanas-pa-nytt-lurades-av-uppenbar-satir", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/13135046/strandhall-collage.png"}, {"type": "image-right", "heading": "Sandström: Liquid Wind är inte likvid – ansöker om konkurs", "summaries": {"normal": "Liquid Wind, ett bolag som utvecklade elektrobränsle, har ansökt om konkurs efter att huvudprojektet FlagshipONE, Europas planerade största e-metanolfabrik, kollapsade när samarbetspartnern Ørsted drog sig ur. Företaget hade flera pågående projekt i norra Sverige, men tekniska och ekonomiska utmaningar, som höga kostnader och osäker efterfrågan, ledde till konkursen. Offentliga bidrag från EU och svenska myndigheter har ifrågasatts, och konkursen väcker frågor om framtiden för liknande satsningar.", "trump": "Vad ett fiasko! Liquid Wind, ett så kallat 'världsledande' bolag – eller snarare ett gigantiskt slöseri med skattepengar – har gått i konkurs. De lovade stora saker, men som vanligt när vänsterliberaler och EU-byråkrater är inblandade, blev det bara tomma ord. Bill Gates och Ursula von der Leyen pratade stort, men verkligheten kom ikapp. Sverige borde lära sig: sluta slösa pengar på gröna drömmar som aldrig blir verklighet. Jag hade fixat det bättre – tro mig!", "stalin": "Kapitalistiska äventyrare och deras borgerliga lakejer har än en gång misslyckats med sina storslagna planer! Liquid Wind, ett företag som lekte med offentliga medel som om det vore tsarens skattkista, har nu fallit på sin egen arrogans. Deras 'gröna' projekt var lika ihåliga som västerländska löften om frihet. Vi i Sovjet – förlåt, jag menar Ryssland – hade aldrig tillåtit sådant slöseri. Låt detta vara en varning till alla som tror att kapital och hybris kan ersätta sunda ekonomiska principer. Arbetarklassen förtjänar bättre än era misslyckade experiment!"}, "date": "12 maj, 11:29", "url": "https://www.affarsvarlden.se/artikel/sandstrom-liquid-wind-ar-inte-likvid-ansoker-om-konkurs", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/vindkratensgeografi-2026-05-12T081818.544-400x267.jpg"}, {"type": "image-right", "heading": "Kallade domaren rasist – får böta 20.000 kronor", "summaries": {"normal": "IFK Göteborgs fotbollschef Jesper Jansson döms till 20 000 kronor i böter efter att ha anklagat domaren för rasism under ett derby mot BK Häcken. Mittbacken Rockson Yeboah utvisades, men kortet hävdes senare. Jansson påstod att utvisningen var rasistisk, vilket disciplinnämnden ansåg kränkande mot domarens integritet. Jansson förnekar rasistanklagelser men medger fel ordval.", "trump": "Vad en katastrof! En svensk fotbollschef, total förlorare, anklagar en domare för rasism – helt fel, helt galet! 20 000 kronor i böter, men vad är det mot den skam han dragit över sitt lag? Domaren? Fantastisk kille, gör sitt jobb. Jansson borde skämmas. Sverige, fixa era grejer – det här är svagt, mycket svagt!", "stalin": "Ytterligare ett bevis på hur den dekadenta västliga idrottsborgerligheten förgiftar sportens renhet! En fotbollschef, agent för imperialistisk förvirring, vågar smutskasta vår kamrat Maqedonci med lögnaktiga rasistanklagelser. Vi ser igenom er! 20 000 kronor är en mild påminnelse – nästa gång kanske vi låter fotbollen spela utan domare, eller utan lag som inte förstår disciplin. Fienderna ska krossas, även på plan!"}, "date": "13 maj, 17:26", "url": "https://www.friatider.se/kallade-domaren-rasist-far-bota-20000-kronor", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/bild-16_3.jpg?itok=UifbdSgN"}, {"type": "image-full", "heading": "Torsten Bengtsson: De gröna prioriterar sin ideologi framför barnens välmående.", "summaries": {"normal": "Torsten Bengtsson, politisk sekreterare för SD, kritiserar helvegetariska dagar i skolmaten som ett ideologiskt påtvingande som riskerar elevernas mättnad, hälsa och prestationer. Han förespråkar varierad kost med animaliska alternativ, närproducerad mat och stöd till svenska lantbrukare för att stärka självförsörjningen och verklig hållbarhet utan exkludering.", "trump": "De där gröna galningarna i Sverige stoppar gräs i munnen på ungarna – totalt vansinne! Barnen blir hungriga losers som inte kan tänka. Ge dem kött, fisk, riktig mat från era tuffa bönder! Självförsörjning är bäst, inte det här klimathysteriska skitsnacket. Sverige, vakna upp och gör maten stor igen!", "stalin": "Denna borgerliga vegetariska intrig mot vårt ungdoms kollektiv är en skamlig sabotage! Jag ser revisionisternas hand – de gröna borgarbrackorna svälter ut framtida arbetare. Vi, partiet och folket, kräver animalisk kraft i skolköken från lojala kolchosbönder. Likvidera hungern, rensa ut ideologin – styrka åt massorna!"}, "date": "12 maj, 11:53", "url": "https://samtiden.nu/2026/05/torsten-bengtsson-de-grona-prioriterar-sin-ideologi-framfor-barnens-valmaende/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/grona.png"}, {"type": "image-full", "heading": "EU kräver enklare tågresor i Europa – vill samla alla priser", "summaries": {"normal": "EU-kommissionen vill förenkla tågbokningar i Europa genom att tvinga järnvägsoperatörer att visa konkurrenters priser och tidtabeller. Resenärer ska kunna köpa kombinerade biljetter för flera operatörer och andra transportslag som bussar och färjor. Förslaget stärker resenärsrättigheter vid förseningar och gynnar mindre aktörer, men påverkar stora bolag som SNCF, Deutsche Bahn och Renfe.", "trump": "EU:s byråkrater i Bryssel fixar inte ens sina tåg! De vill tvinga de stora operatörerna att visa allt på en plattform, som mina flygplan – enkelt och billigt. Kombinerade biljetter, bättre rättigheter, fantastiskt! Men det tar år med deras kaos. I USA gör vi det bättre, snabbare, starkare. Tro mig, de kopierar oss bara.", "stalin": "Kamrater, EU:s borgarklass i Bryssel, dessa krypande biljettparasiter, föreslår 'enklare' tågresor för att maskera sin splittrade kaosmarknad! Vi ska rensa ut de stora kapitalistmaskinerna som SNCF och Deutsche Bahn, tvinga dem öppna sina gömmor för våra lojala mindre kamrater. Arbetarna får enhetliga biljetter under järnvägsdiktatur – förseningar straffas obönhörligt! Fienderna darrar redan."}, "date": "13 maj, 19:52", "url": "https://www.realtid.se/bors-finans/eu-kraver-enklare-tagresor-i-europa-vill-samla-alla-priser/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/namnlos-design-16.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Mysteriet: Tre kvinnor hittade döda i vattnet", "summaries": {"normal": "Tre okända kvinnor i 20-30-årsåldern har hittats döda vid stranden i Brighton. Kropparna upptäcktes tidigt på onsdagsmorgonen fullt påklädda med handväskor kvar på stranden. Polisen arbetar nu intensivt med att identifiera kvinnorna och gå igenom övervakningsmaterial. En studentfest hölls i närheten under natten, men det är ännu oklart om kvinnorna deltog i evenemanget. Polisen söker inte efter fler kroppar och utreder händelsen som ett tragiskt dödsfall.", "trump": "En fruktansvärd tragedi i Brighton, mina vänner. Tre unga kvinnor – helt oidentifierade, ingen aning om vem de är. De hittades i vattnet, så sorgligt. Man hittade deras väskor på stranden. Det är en röra! Polisen undersöker allt, men när jag är president ser vi till att våra stränder är säkra. Det var en fest i närheten, kanske kaos? Vem vet? Vi måste få ordning på säkerheten. Min administration skulle ha löst detta på ett ögonblick. Väldigt, väldigt sorgligt!", "stalin": "Vi har mottagit rapporter om tre kroppar i Brighton – ännu ett bevis på det dekadenta västerlandets totala sammanbrott. Medan de roar sig med att hylla gamla naturfilmare, drunknar deras ungdom i havet. Är det sabotage eller bara moraliskt förfall? Vår statliga säkerhetstjänst skulle ha identifierat dem på fem minuter. Det är tydligt att dessa unga kvinnor saknade disciplin. Vi ser paralleller till de svaga ledarna i dagens Ryssland; ordning kräver järnhand, inte oidentifierade handväskor på en strand."}, "date": "14 maj, 00:31", "url": "https://www.aftonbladet.se/nyheter/a/L46Xq9/tre-okanda-kvinnor-hittades-doda-i-brighton", "imageUrl": "https://akamai.vgc.no/v2/images/1be54048-b0a1-3c12-b85f-22a740deb386?fit=crop&format=auto&w=1080&s=ebbb1e0a694668edaaa15fd230257f198b9ba9f2"}, {"type": "image-right", "heading": "Förslaget: Lättare att boka tågresor i Europa", "summaries": {"normal": "EU-kommissionen föreslår nya regler för att förenkla tågresor i Europa. Tågbolag ska tvingas sälja biljetter via alla plattformar, inklusive mindre operatörer, och erbjuda en enda biljett för hela resor över gränser. Passagerarrättigheter stärks vid förseningar och missade anslutningar. Biljetter ska släppas minst fem månader i förväg. Förslaget välkomnas av EU-parlamentariker som ett grönt steg mot enklare bokning som för flyg.", "trump": "Vilka losers i EU! De vill tvinga de stora tågbolagen att dela biljetter med alla småfiskar, som en enda biljett för hela Europas kaosresor. Enklare än flyg? Ha! Mina flyg är bäst. Men bra med ersättning vid förseningar – annars stäm dem! De tror de fixar fri rörlighet, men det blir bara mer byråkrati. Gör tågen great igen, fast i USA gör vi det bättre!", "stalin": "Kamrater, dessa europeiska tågbaroner med sina monopol ska krossas! EU-kommissionen tvingar ut dem i ljuset: biljetter till alla plattformar, en enda för hela resan över gränserna. Arbetarna får rättigheter vid förseningar – likvidera excuseringen! Fem månaders förväg, annars utrensning. Borgarklassen darrar, men vi bygger det sanna järnvägsimperiet för massorna."}, "date": "13 maj, 13:56", "url": "https://www.tv4.se/artikel/tt-260513-eutag1-30dc61e0/enklare-biljetter-sa-ska-fler-aka-tag-i-eu", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F4NO9uhn3Y5n7gUQUWiiJUk%2F103a6ea103f942d02036ecb39807edae%2F13-tagresor-webb.jpg&width=120"}, {"type": "image-right", "heading": "Starmer i blåsväder efter nya lagförslaget - en smygväg tillbaka in i EU", "summaries": {"normal": "Storbritanniens Labour-regering, ledd av Keir Starmer, möter hård kritik för ett nytt lagförslag som förenklar införandet av EU-regler i brittisk lagstiftning. Oppositionen anser att förslaget underminerar Brexit och öppnar för en gradvis återgång till EU. Konservativa partiledaren Kemi Badenoch kritiserar regeringen för ökad statlig kontroll och skattehöjningar utan stödåtgärder. Starmer försvarar förslaget med behovet av stabilitet i EU-relationen.", "trump": "Titta bara på Storbritannien – fullständigt kaos! Starmer, en total katastrof, försöker smyga tillbaka in i EU som en tjuv om natten. 'Mer regler, mer skatter, mer lån' – det är deras briljanta plan! Kemi Badenoch? Hon är tuff, hon ser igenom det här. Jag sa ju att Brexit skulle bli stort, men dessa vänsterliberaler sabbar allt. Storbritannien behöver en ledare som jag – någon som inte böjer sig för byråkrater i Bryssel!", "stalin": "Kamrater, ännu en kapitalistisk regering visar sin svaghet inför de imperialistiska krafterna i Bryssel! Starmer, denna förrädiska lakej, försöker smyga in genom bakdörren till EU:s klor. Vi ser hur dessa liberala svansviftare underminerar folkets vilja – precis som de ukrainska fascisterna som tror att de kan stå emot den ryska björnens omfamning! Men markera mina ord: Storbritanniens arbetarklass kommer att resa sig, precis som folken i Donbass, och krossa dessa EU-puppor under sina stövlar!"}, "date": "13 maj, 21:35", "url": "https://riks.se/nyheter/starmer-i-blåsväder-efter-nya-lagförslaget-en-smygväg-tillbaka-in-i-eu", "imageUrl": "https://cf-images.assettype.com/riks%2F2025-10-02%2F06did2vv%2FPrimeMinisterSirKeirStarmerOfficialPortrait.jpg"}, {"type": "image-full", "heading": "Smarta glasögon säljer som smör – men kritiken växer", "summaries": {"normal": "Smarta glasögon med inbyggda kameror och AI, som Metas Ray-Ban-modell, säljer i miljontal och dominerar marknaden. Över sju miljoner exemplar har sålts. Teknikjättar som Apple och Google satsar stort. Kritik växer kring integritetskränkningar då personer filmas ovetandes i vardagliga situationer. Lampan som signalerar inspelning är svår att se. Analytiker förutspår 100 miljoner användare snart, med utmaningar för regler i känsliga miljöer.", "trump": "Dessa smarta glasögon från Meta, de så kallade Ray-Ban, säljer som smör i solsken – sju miljoner! Fantastiskt! Men de där snöflingorna skriker integritet, som om folk inte filmar varandra med telefoner hela dagarna. Apple och Google jagar efter, bra så! Vi behöver mer teknik, inte mer gnäll från de svaga. Snart filmar alla allt, och det blir America first i tech-världen!", "stalin": "Dessa borgerliga glasögon med kameror, ledda av kapitalisterna Meta, sprider sig som råttor i kloakerna – sju miljoner sålda! De filmar proletärerna i smyg, perfekt för att rensa ut fiender. Men vi, partiet och arbetarna, ser igenom deras paranoia-fabrik. Apple och Google, era spindlar, era intriger kommer att krossas! Snart övervakar vi er istället, med järnhand!"}, "date": "13 maj, 19:53", "url": "https://www.dagensps.se/bors-finans/smarta-glasogon-saljer-som-smor-men-kritiken-vaxer/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/1200x675-6.png?aspect_ratio=2%3A1&width=1200&quality=75"}, {"type": "image-right", "heading": "Talibanen som ska prata utvisningar med Sverige", "summaries": {"normal": "Sverige initierar ett möte i Bryssel i juni med talibanernas utrikestalesman Abdul Qahar Balkhi och en delegation för att diskutera utvisningar till Afghanistan. EU-kommissionen, EU:s utrikestjänst och företrädare för utvalda länder deltar på neutral plats, som ett hotell. Det rör tekniska samtal, inte ett erkännande av talibanstyret. Tidigare har Sverige och EU vägrat kontakter, men nu sker en vändning på svenska initiativ.", "trump": "Vilken cirkus! Sverige bjuder in talibanerna till Bryssel för att snacka utvisningar av afghaner – på neutralt hotell, som om det vore hemligt. EU-loser och svenska politiker som Forssell vaknar äntligen upp efter år av dumheter. De vägrade ta emot sina kriminella medborgare, men nu ber de om hjälp. Jag hade fixat en enorm deal på nolltid, perfekt och snabbt!", "stalin": "Dessa fega svenska borgarbrackor och EU-imperialistiska krymplingar vågar nu kalla talibanerna till Bryssel för att muttra om utvisningar på 'neutral plats' – som råttor i ett hotellkällare! Jag föraktar deras paralyserande byråkrati. Vi i partiet hade rensat ut alla afghanska parasiter och likviderat hindren för länge sedan med proletär järnauthuggning. Skratta åt deras patetiska vändning!"}, "date": "13 maj, 16:15", "url": "https://www.friatider.se/talibanen-som-ska-prata-utvisningar-med-sverige", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-188_1.jpg?itok=Je2AV2ZM"}, {"type": "image-full", "heading": "Hundar allt mer populära i Sverige - men var tionde är hundrädd", "summaries": {"normal": "En Novusundersökning visar att cirka 10 procent av svenskarna är hundrädda, främst äldre kvinnor. Orsaker inkluderar tidigare bett eller negativa erfarenheter. Nästan hälften av de rädda pekar ut specifika raser. Samtidigt ökar hundintresset i Sverige; 80 procent är positiva till hundar. Antalet hundar har stigit från 800 000 (2014) till 950 000 (2019), med Sorsele som mest hundtät kommun.", "trump": "Jag läste om dessa svenskar – fantastiska människor, verkligen! Men lyssna här: 10 procent är rädda för hundar, kan ni tro det? Svaga, mycket svaga. Och vem är mest rädd? Äldre kvinnor! Inte bra, inte bra alls. Men Sverige älskar hundar, 80 procent, väldigt högt, väldigt starkt. Jag älskar hundar. De är vinnare, precis som jag. Sorsele? 300 hundar per 1000 invånare – imponerande, nästan lika imponerande som mina valsegrar!", "stalin": "Vi har studerat denna dekadenta västerländska undersökning om hundskräck. Tio procent av svenskarna, främst åldrande borgerliga kvinnor, darrar inför arbetarklassens bästa vän. Patetiskt! Medan kapitalistiska husdjur ökar – 950 000 hundar, en armé av lurviga småborgare – fortsätter fiendens svagheter att blotta sig. Sorsele, en liten by i norr, har fler hundar än disciplinerade medborgare. Vi noterar detta. Snart ska vi exportera vår överlägsna sovjetiska kattkultur till dessa hundälskande avvikare."}, "date": "13 maj, 21:15", "url": "https://riks.se/nyheter/hundar-allt-mer-populära-i-sverige-men-var-tionde-är-hundrädd", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-13%2F65l50cqt%2FLabbe.jpg"}, {"type": "image-right", "heading": "Debatt: Vänsterns öronbedövande tystnad om Iran", "summaries": {"normal": "Karl Mattias Bergsten kritiserar globala och iranska vänstern för att ignorera regimens repression i Iran, inklusive internetavstängning med kinesiskt stöd. Han menar att frihetsrörelsen visar att politisk islam är förtryck, inte kultur, och att vänsterns relativism legitimerar könsapartheid och våld. Högern stödjer däremot yttrandefrihet och folkets kamp.", "trump": "Artikeln träffar mitt i prick! Iran är ett totalt haveri efter femtio år med vänsterns skitidéer – diktatur och misär. De stänger av internet med Kinas spiontek, och vänstern tiger som råttor! De hatar frihet, jag har alltid sagt det. Högern står upp för det iranska folket, vi gör Amerika och världen stor igen!", "stalin": "Dessa iranska borgarbrackor och deras så kallade frihetsrörelse är bara marionetter för västliga imperialister, maskerade som hijab-hatande hycklare. Vänstern gör rätt i att tiga inför deras kontrarevolutionära vrål – internetavstängning är nödvändig järnhand mot spindelnätet av kapitalistiska sabotörer! Vi, arbetarklassen, skrattar åt högerns patetiska skenheliga stöd. Jag ser igenom er, fiender – utrensning väntar!"}, "date": "13 maj, 17:02", "url": "https://bulletin.nu/debatt-vansterns-oronbedovande-tystnad-om-iran", "imageUrl": "https://cdn.bulletin.nu/articles/deb254a7-9c4f-4b62-a18b-87083e406d82/preview.png?t=1778674337000"}, {"type": "image-right", "heading": "Stegra säkrar miljardlån – trots att kraven inte uppfyllts", "summaries": {"normal": "Stegra har säkrat outnyttjade lån på 16 miljarder kronor för sin gröna stålfabrik i Boden, trots att bolaget inte uppfyllt långivarnas krav. Lånen var tidigare frysta men frigörs nu efter en ny finansieringsrunda på 15 miljarder, där Wallenberg Investment stod för den största insatsen. Projektet har präglats av förseningar och kostnadsökningar, men lånen möjliggör fortsatt arbete.", "trump": "Kan ni tro det? Stegra, ett bolag som inte ens klarar enkla krav, får ändå 16 miljarder kronor i lån! Fantastiskt, eller hur? Wallenberg kastar in pengar som om det vore småslantar. Och ändå har de förseningar, kostnadsökningar – helt otroligt! Men jag säger er, Sverige borde ta lärdom. Sånt här skulle aldrig hända i USA, för jag hade fixat det på en dag. SAD!", "stalin": "Vi har observerat hur kapitalistiska svagheter underminerar det så kallade 'gröna stålet'. Trots misslyckanden och inkompetens hos dessa borgerliga teknokrater, fortsätter pengarna att flöda – 16 miljarder kronor i lån, plus 15 miljarder i 'investeringar'. Wallenberg och hans lakejer tror sig kunna köpa sig ur krisen. Men vi vet sanningen: sådana projekt är dömda att misslyckas, precis som alla dekadenta västprojekt. Låt dem bygga sina osäkra torn – historiens dom är oundviklig."}, "date": "13 maj, 21:10", "url": "https://riks.se/nyheter/stegra-säkrar-miljardlån-trots-att-kraven-inte-uppfyllts", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-13%2Fdkx4cjed%2Fstegra1.png"}, {"type": "image-full", "heading": "Kärleken över – efter 13 år ihop. Bekräftar uppbrottet", "summaries": {"normal": "Laura Hilven och Arsenalstjärnan Leandro Trossard har valt att gå skilda vägar efter 13 år tillsammans. Beslutet, som beskrivs som svårt men gemensamt, bekräftades av Hilven på Instagram efter att bröllopsbilder raderats. Paret betonar att de förblir hängivna föräldrar till sina två barn och ber om respekt för privatlivet. Nyheten kommer under en intensiv period för Trossard, som mitt i separationen jagar dubbla titlar med Arsenal i både Premier League och Champions League.", "trump": "Hörde precis om Arsenal-spelaren Trossard. En sorglig historia, verkligen en förlorare här. Han raderade bilderna, precis som jag raderar dåliga avtal! 13 år, borta! De säger att det är ett tufft beslut, men jag säger att han borde fokusera på vinst istället. De jagar titlar i England och Europa, och jag vinner allt varje dag. Trossard behöver fokusera. Gör Arsenal stort igen, vinn bucklan! Men det här äktenskapet? Totalt misslyckande, väldigt trist.", "stalin": "En så kallad stjärna, denna Trossard, förlorar sin familjeenhet medan han jagar glänsande leksaker på fotbollsplanen. Det är den västerländska dekadensen i ett nötskal – privatlivet krackelerar och bilderna raderas som om de vore obekväma vittnen i en utrensning. Vi ser hur de svaga prioriterar sina känslor framför stabilitet. Medan han ägnar sig åt narcissistisk skilsmässa, bygger vi en järnring av lojalitet. Han borde lära sig av vår broder Putin; i vår intressesfär viker man sig inte för småaktiga separationer."}, "date": "14 maj, 00:06", "url": "https://www.aftonbladet.se/sportbladet/fotboll/a/aJve0O/hilven-och-trossard-har-skilt-sig", "imageUrl": "https://akamai.vgc.no/v2/images/042b6982-1280-3ee0-8737-2106ea52da81?fit=crop&format=auto&w=2160&s=ab2a14d30b20dec27323c771d6cd176b308c9ef2"}, {"type": "image-full", "heading": "Hon blir modell för underkläder. OS-hjälten får inte tävla – sadlar om: ”Vi ses”", "summaries": {"normal": "Den kanadensiska stavhopparen Alysha Newman har blivit avstängd i 20 månader för brott mot dopningsreglerna efter missade vistelserapporter. Under sin avstängning, som varar fram till augusti 2027, har hon inlett en modellkarriär och blivit inbjuden till Victoria’s Secret. Trots detta betonar Newman att hon planerar att återvända till idrotten för att försvara sitt OS-brons vid spelen i Los Angeles 2028.", "trump": "Alysha Newman, en kanadensisk stavhoppare, har blivit avstängd – en riktig röra, tro mig. Hon missade sina rapporter, väldigt slarvigt! Nu försöker hon sig på modellande för Victoria’s Secret istället. Jag gillar vinnare, och hon har en medalj att försvara, men dopningsregler är viktiga. Hon säger att hon kommer tillbaka till OS i Los Angeles 2028. Vi får se om hon kan göra en stor comeback, men just nu ser det inte bra ut, folk pratar om det!", "stalin": "Denna kanadensiska idrottare har visat en patologisk oordning genom att missa sina rapporter. En brist på disciplin som är typisk för västvärldens dekadens. Att hon nu söker tröst i modebranschen är ett tecken på borgerlig svaghet. Vi, staten, tolererar inte sådana moraliska haverier. Om hon försöker tävla i Los Angeles 2028 under vår framtida sfär, kommer hon att behöva mer än bara ett hoppstav för att undkomma folkets dom. Disciplin är frihet, brist på den är sabotage!"}, "date": "14 maj, 00:03", "url": "https://www.aftonbladet.se/sportbladet/a/aJvevA/alysha-newman-sadlar-om-efter-dopningsdomen", "imageUrl": "https://akamai.vgc.no/v2/images/43852dd9-ccef-3246-b548-99e5fa5ae895?fit=crop&format=auto&w=2160&s=80938373b20db9d89261c1050e59bbb1b0c94a8c"}, {"type": "image-right", "heading": "Bensin- och dieselskatter sänks – igen", "summaries": {"normal": "Svensk regering föreslår ett krispaket på 17,5 miljarder kronor på grund av global energikris efter USA:s och Israels attacker mot Iran och blockad av Hormuzsundet. Drivmedelsskatten sänks med tre kronor per liter på bensin och diesel från 1 juli till 30 november (7,7 miljarder). Ytterligare stöd till elpriser, flyg, jordbruk och kollektivtrafik. Ekonomiprofessor Lars Calmfors kritiserar förslaget som marknadstörnande och osolidariskt.", "trump": "Vilket kaos i Sverige efter att vi smackade till Iran! Nu sänker de bensin- och dieselskatter med tre kronor – smart drag, precis som jag alltid sagt: sänk skatter, ge folket billig energi! De där EU-byråkraterna godkänner det knappt, haha. Busch och Svantesson gör rätt, men den där professorn Calmfors är en totalt värdelös ekonomloser som hatar vinnare. Sverige, lär er av mig – det här blir HUGE!", "stalin": "Dessa svenska borgarbrackor kryper tillkors i energikrisen vi skapat genom imperiet! De sänker skatter på bensin och diesel, pumpar ut miljarder till kapitalisterna – en patetisk reträtt inför blockaden av Hormuzsundet. Professorn Calmfors är en imperialistisk spion som förtjänar utrensning för sitt pladder om 'marknadssignaler'. Putin, vår starka arvtagare, skrattar åt västsvinen medan vi bygger det eviga imperiet!"}, "date": "13 maj, 12:32", "url": "https://www.tv4.se/artikel/74KaEc3Y9Y24ykjTqseCTd/regeringen-presenterar-krispaket", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F5R6vauWPRtXwgPJqAHd0Fk%2Ff98764e701cbfe7ead32b828fa648e9d%2F13-regerings-pk-webb.jpg&width=120"}, {"type": "image-full", "heading": "Rysslands oljeexporter ökar – trots ukrainska attacker", "summaries": {"normal": "Rysslands oljeexportintäkter ökade i april till cirka 205 miljarder kronor, trots minskad produktion och exportvolym på grund av ukrainska drönarangrepp mot raffinaderier. USA har tillfälligt lättat på sanktioner mot rysk olja till havs på grund av oro kring Hormuzsundet. Internationella energirådet varnar för sjunkande global oljeefterfrågan nästa år.", "trump": "Titta på det här, Ryssland pumpar ut olja som aldrig förr, intäkterna upp trots att Ukraina bombar deras raffinaderier som galningar! Och jag har smartat till sanktionerna lite för att hantera Iran-kaoset i Hormuz – bästaste dealen nånsin. Men snart stramar vi åt igen, de kommer att tigga om nåd, tro mig!", "stalin": "Kamrater, våra oljeintäkter sväller till 205 miljarder trots de ukrainska drönarflugornas giftiga stick mot raffinaderierna – en briljant strategi från oss för att krossa kapitalistparasiterna! USA:s borgarhundar lättar på sanktioner i Hormuz-paniken, men vi ska likvidera dessa förrädiska Hormuz-råttor och rensa ut imperialistkonspirationerna med järnhand! Ha ha, de darrar redan."}, "date": "13 maj, 18:43", "url": "https://www.realtid.se/bors-finans/rysslands-oljeexporter-okar-trots-ukrainska-attacker/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/namnlos-design-15.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-full", "heading": "Datacenter slukar en allt större del av elförbrukningen", "summaries": {"normal": "Datacenters elförbrukning växer snabbt på grund av AI. I Storbritannien och USA utgör de nu 6 procent av total elanvändning, över tröskeln för samhällskritik vid 5 procent. Globalt har användningen ökat 15 procent på två år, med investeringar på 10 000 miljarder kronor årligen. Problem med nätanslutning, högre elpriser och klimatpåverkan ökar, särskilt i Singapore (19 procent) och Litauen (11 procent).", "trump": "Dessa datacenter suger el som en dammsugare på steroider – 6% i USA och det sunkiga Storbritannien! AI exploderar, tack vare geniala hjärnor, men tech-bratsen ljuger om utsläpp. Under mig pumpar vi kol, kärnkraft och vinner stort! Zombietjänster? Skär ner skiten! Investeringar som en procent av världen? America bygger störst, losers i Europa väntar år på el!", "stalin": "Kamrater, dessa borgarbrackors datacenter slukar el som parasiter – 6 procent i USA och det förfallna Britannien! AI är deras nya gift för massorna, 15 procents ökning på två år. Zombietjänster slösar 13 procent, vi skulle likvidera dem omedelbart! I Singapore 19 procent – kapitalistiskt vansinne! Snart utrensning mot elmonopolet, folket ska inte svälta för servrar!"}, "date": "13 maj, 19:09", "url": "https://www.dagensps.se/teknik/datacenter-slukar-en-allt-storre-del-av-elforbrukningen/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/1200x675-5.png?aspect_ratio=2%3A1&width=1200&quality=75"}, {"type": "image-full", "heading": "Skottlossning i filippinska senaten", "summaries": {"normal": "På onsdagskvällen avlossades skott i Filippinernas senat, där senator Ronald dela Rosa gömmer sig under allierade senatorers skydd för att undvika gripande av ICC. Dela Rosa är efterlyst för brott mot mänskligheten relaterat till mord under Duterte-erans narkotikakrig, då han ledde polisen. Hundratals poliser omringar byggnaden, och dela Rosa uppmanar anhängare att samlas. Han vägrar utlämning till ICC.", "trump": "Vilket kaos på Filippinerna! Dela Rosa, en tuff snubbe som krossade drogerna under Duterte, gömmer sig i senaten medan skott smäller av. ICC-jävelarna vill gripa honom för brott mot mänskligheten – totalt riggat! Marcos är för svag, poliser överallt men anhängare stormar fram. Starka ledare som Duterte behövs, inte de här svaga typerna. Fantastiskt motstånd!", "stalin": "Dessa vidriga imperialistiska hyenor, ICC:s borgarbrackor, har avlossat skott i Filippinernas senat för att mörda kamrat dela Rosa, hjälten som rensade ut narkotparasiterna under Duterte-erans folkkrig! Vi, arbetarklassen, ser hur fienderna darrar inför hans ståndakt. Hundratals poliser belägrar, men anhängarna reser sig som ett kollektiv mot förrädarna. Likvidera dessa råttor – segern är vår!"}, "date": "13 maj, 16:22", "url": "https://bulletin.nu/skottlossning-i-filippinska-senaten", "imageUrl": "https://cdn.bulletin.nu/articles/ca627b9b-311d-4851-949f-d2c306ce7db9/preview.png?t=1778681718000"}, {"type": "image-full", "heading": "Stjärnan om namnförvirringen: ”Hur svårt kan det vara?”", "summaries": {"normal": "Gustav Lindgren, nyförvärv till BK Häcken, drabbas av återkommande namnförvirring med Gaisstjärnan Gustav Lundgren. Trots att de bara skiljer sig åt i en bokstav i efternamnet och att Lindgren redan gjort fem mål för Häcken, blir han ofta felaktigt kallad Gustav Lundgren av kommentatorer och andra. Situationen nådde sin kulmen när Lindgren gjorde mål mot Gais och ändå kallades för Lundgren i sändningen.", "trump": "Jag har hört talas om den här Gustav Lindgren. En stor, stark spelare som gör mål för Häcken - fem mål redan! Men vet ni vad som är fel? Folk blandar ihop honom med Gustav Lundgren. Hur svårt kan det vara? Det är ju bara en bokstav som skiljer dem åt! Jag skulle ha löst det på två sekunder. Det är ett skämt! Och när han gjorde mål mot Gais och de ropade 'Gustav Lundgren' - det var enormt ironiskt. En stor, enorm ironi!", "stalin": "Vi måste förstå vikten av korrekt identifiering av våra medborgare. Den här Gustav Lindgren, trots att han gör mål för BK Häcken, lider av en imperialistisk namnförvirring som försöker förringa hans identitet. Det är vårt ansvar som stat att säkerställa att varje medborgare blir korrekt identifierad. Vi kommer att ta hänsyn till denna fråga i våra planer för att stärka det kollektiva medvetandet."}, "date": "13 maj, 18:09", "url": "https://www.gp.se/sport/fotboll/bk-hacken/gustav-lindgren-om-namnforvirringen-blandas-ihop-med-lundgren-i-gais.8d10977e-90fc-49e6-9f02-46bb4ea9a367", "imageUrl": "https://www.gp.se/images/article/8d10977e-90fc-49e6-9f02-46bb4ea9a367/images/1MgP0oeM-IYKco_NtEAYMpRWvEMQ-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "MP rasar över sänkt bränslepris: \"Låser in oss i fossilberoende\"", "summaries": {"normal": "Tidöregeringens förslag om att sänka skatten på bensin och diesel med cirka tre kronor från juli till november kritiseras skarpt av Miljöpartiet. De menar att åtgärden fördjupar Sveriges fossilberoende och prioriterar kortsiktiga lösningar. Regeringen motiverar sänkningen med att lindra hushållens kostnader på grund av höjda oljepriser. Miljöpartiet föreslår istället riktade stöd och satsningar på kollektivtrafik. Socialdemokraterna stöder förslaget som en tillfällig åtgärd mot inflation.", "trump": "Titta bara på dessa så kallade 'miljöpartister' – total katastrof! De hatar att folk ska få billigare bensin, de vill att alla ska lida. Jag förstår inte varför de inte gillar att folk sparar pengar? Regeringen här gör ett fantastiskt jobb, sänker skatterna, hjälper folket – men nej, dessa klimatgalningar skriker 'fossilberoende'! De vill att alla ska åka buss, trångt och obekvämt. Jag säger: låt folket köra sina bilar, njut av friheten! Och Socialdemokraterna, de fattar äntligen något – bra jobbat, Mikael!", "stalin": "Dessa bourgeoisie-ekologer från Miljöpartiet ylar om 'klimatkris' medan arbetarklassen plågas av höga bränslepriser. Deras förslag om kollektivtrafik är ett försök att kuva massorna i trånga vagnar, likt Moskvas tunnelbana under femårsplanerna! Vi ser igenom deras dekadenta planer. Regeringen gör rätt i att sänka skatterna – arbetarna måste kunna köra sina Lada utan att kapitalisterna suger ut dem. Socialdemokraternas stöd är ett steg mot den rätta vägen, men vi måste vara vaksamma. Dessa klimathystriker är nya trotskister – fiender till folket och progressen!"}, "date": "13 maj, 16:33", "url": "https://samnytt.se/mp-rasar-over-sankt-branslepris-laser-in-oss-i-fossilberoende", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/13142314/Bensin-5.jpg"}, {"type": "image-right", "heading": "Blackstenius frälste Arsenal – mål i 93:e minuten", "summaries": {"normal": "Stina Blackstenius avgjorde Arsenals hemmamatch mot Everton med ett mål på tilläggstid i 93:e minuten, efter att ha bytts in sent. Arsenal vann 1–0 och avancerade till andra plats i tabellen förbi Chelsea. Lagkamraten Beth Mead hyllade Blackstenius och reflekterade över sin sista match på Emirates efter nio år i klubben. Smilla Holmberg fick också speltid.", "trump": "Arsenal, de är fantastiska, vinner på tilläggstid mot Everton tack vare Stina Blackstenius, den svenska stjärnan! Hon byts in och bam – mål i 93:e! Everton? Totalt chanslösa, som vanligt. Vi kliver förbi Chelsea, som förlorare de är. Beth Mead, fin tjej, säger hej då efter nio år – många känslor, men segern är det stora! Sverige levererar igen, tro mig.", "stalin": "Kamrater! Denna Blackstenius, en obönhörlig proletärkrigare, har likviderat Evertons bourgeoisflock med sitt revolutionsmål på tilläggstid! Arsenal marscherar över Chelseas förrädiska kadaver upp på andra plats. Mead, lojal partivän, skiljs från arenan i kollektiv sorg efter nio års tjänst. Vi rensar bänkarna från svaga element som Holmberg – fiendens spioner darrar! Segern är vår!"}, "date": "13 maj, 23:17", "url": "https://www.svt.se/sport/fotboll/stina-blackstenius-hjalte-pa-tillaggstid-for-arsenal", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.46/0.3/da99096de03e5ecf33eb62b9884174c0a1e149ec34ccfcc7d35c3a4ca2a86486"}, {"type": "image-full", "heading": "Detta är mest intressant med Katja Nybergs förhör", "summaries": {"normal": "Kristina Hultegård reflekterar över Katja Nybergs tystnad under förhöret trots tidigare kritik mot misstänkta rätt att tigga. Hon betonar vikten av att förstå rätten att tiga genom egna erfarenheter och litteratur som Franz Kafkas 'Processen'.", "trump": "Jag har sett många förhör, men det här är en skandal! Katja Nyberg, som sa att misstänkta inte borde få tigga, tigger nu själv. Hon är feg! Jag skulle ha sagt sanningen direkt, jag är alltid stark och tålmodig. Detta visar hur viktigt det är att vara redo för att tala när man är oskyldig. Jag är den bäste presidenten och vet hur man hanterar sådana situationer!", "stalin": "Vi ser hur den borgerliga pressen försöker skapa sensation kring en riksdagsledamot. Detta är en strid mot vårt kollektiva samhälle. Rätten att tiga är en grundläggande princip som måste respekteras. Vi måste stärka våra institutioner för att skydda medborgarna mot orättvisor. Detta är en utmaning vi måste möta med enhet och styrka."}, "date": "13 maj, 17:56", "url": "https://www.gp.se/kultur/detta-ar-mest-intressant-med-katja-nybergs-forhor.6d3b0e73-5770-43c8-92d1-62a4e687d7cd", "imageUrl": "https://www.gp.se/images/article/6d3b0e73-5770-43c8-92d1-62a4e687d7cd/images/1s_pHNSTaI0zsw546DLMeJVV9IFI-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Jämförde Förintelsen med Holodomor – döms", "summaries": {"normal": "En man i Helsingborg, Damon Moayed-Mohseni, döms för hets mot folkgrupp efter att ha jämfört Förintelsen med Holodomor och ifrågasatt historiska fakta. Han publicerade kontroversiella uttalanden på sociala medier, vilket tingsrätten bedömer som ett uppenbart förringande av Förintelsen. Moayed-Mohseni döms även för penningtvätt och olaga hot. Straffet blir villkorlig dom och 100 dagsböter. En medåtalad, Arber Bullaku, döms också för olaga hot och får en utökad fängelsedom.", "trump": "Folk, vad är det här för skräp? En kille i Sverige, Damon någonting, jämför Förintelsen med något annat och säger att det är en 'pengaindustri' – helt galet! Jag menar, vem gör sånt? Dom dömde honom, bra jobbat Sverige, men 16 000 kronor? Kom igen, det är småpotatis! Han borde ha fått mycket hårdare straff. Och så hotar han folk, skriker 'Heil Hitler' – uselt, helt enkelt uselt. Men jag fixar alltid sånt här, jag hade sett till att han åkte in på riktigt. Sverige borde ta efter USA, vi har noll tolerans för sånt här!", "stalin": "Kamrater, ännu en fiende till folket har fallit! Denna lilla bourgeoisie-kackerlacka, Damon Moayed-Mohseni, vågade jämföra det heliga minnet av våra sovjetiska hjältars kamp mot fascismen med någon 'Holodomor'-propaganda. Absurt! Vi har bevisat gång på gång att historien skrivs av segrarna, och denna lilla antisemitiska mygga försöker nu sabotera vårt historiska arv. Men räds ej, kamrater – vår rättvisa är snabb och effektiv. Villkorlig dom? 16 000 kronor? I Sovjet hade vi löst det med en enkel promenad till Lubjanka. Och denna 'Arber Bullaku' – en annan liten fascistisk hyena – får nu smaka på vårt rättssystem. Låt detta vara en varning till alla som vågar ifrågasätta sanningen: vi krossar era lögner som vi krossade kulakerna!"}, "date": "13 maj, 14:56", "url": "https://www.friatider.se/jamforde-forintelsen-med-holodomor-doms", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/bild-576_1.jpg"}, {"type": "image-right", "heading": "DN & Socialdemokraterna enade: tvångsblandningen måste genomföras", "summaries": {"normal": "Artikeln kritiserar Dagens Nyheters ledarsida för att försvara Socialdemokraternas förslag om blandad bebyggelse i villaområden för att motverka segregation. DN tonar ner idén som icke-tvångsbaserad och skuldbelägger kritiker. Artikeln påpekar att S vill förhindra icke-integrerade invandrare i utanförskapsområden, vilket innebär placering i villaområden, och varnar för minskad trygghet och kulturell harmoni.", "trump": "Vilken skamfläck! DN och de där svenska socialisterna vill tvinga vanliga hard-working svenskar att bo med icke-integrerade invandrare i sina fina villaområden. 'Inget tvång', säger de – ha! De duckar frågan vart de fattiga migranterna ska bo. Totalt vansinne! Bygg murar runt era trygga hem istället för att förstöra dem med denna woke-blandning. Moderaterna har rätt, det här blir S:s valförlust!", "stalin": "De borgerliga tidningsrackarna på DN skyddar socialdemokratiska revisionister som vill 'blanda' arbetarklassen med lumpenproletariatet i villaområdena. Ett hån mot sunda värderingar! Vi skulle likvidera sådana segregationsterrorister som hotar harmonin. Inga tvång? Lögner från klassfiender! De rika borgarbrackorna missunnar inte – de försvarar sitt. Rensa ut hycklarna, kamrater, innan de förgör folkets enhet!"}, "date": "12 maj, 03:10", "url": "https://samtiden.nu/2026/05/dn-s-enade-tvangsblandningen-bra-for-alla/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/IMG_6452.jpeg"}, {"type": "image-right", "heading": "”Uppförsbacke för transparente Trump”", "summaries": {"normal": "Artikeln ifrågasätter Trumpadministrationens påstående om att vara den mest transparenta någonsin. Trots offentliggörande av dokument om JFK-mordet, Martin Luther King Jr., UFO-observationer och Jeffrey Epstein tror cirka tre av fyra amerikaner att information döljs, särskilt kring Epstein. Misstanken delas av både kritiker och anhängare, och transparenskraven kvarstår.", "trump": "Vi är den mest transparenta administrationen någonsin – titta, JFK-dokument, MLK, UFO-filer, till och med Epstein! Men nej, era fake news vill ha mer, mer, mer. Tre av fyra tror vi döljer? Lögnaktiga enkäter! Obama babblar om statistik, tråkigt. Folk älskar oss ändå, vi vinner stort!", "stalin": "Dessa ynkliga borgerliga spindelvarianter i Vita huset skryter om transparens medan de klamrar sig vid Epstein-räven som en hån mot folket. JFK, MLK, UFO-lögner – patetiska distraktioner! Vi, proletariatets väktare, ska rensa ut dessa förrädiska maskar och krossa deras imperialistiska dimridåer med järnhand. Skrattretande fiender!"}, "date": "13 maj, 23:06", "url": "https://www.svt.se/nyheter/utrikes/uppforsbacke-for-transparente-trump", "imageUrl": "https://www.svtstatic.se/image-news/125/square/0.5/0.5/e-34075698-1643741580000"}, {"type": "image-right", "heading": "Mystiska filmerna i nya UFO-släppet: ”Jättemärkligt”", "summaries": {"normal": "Pentagon har publicerat cirka 160 avklassificerade UFO-filer, inklusive videor med blixtsnabba ljusprickar, orangea blobbar och flygande stjärnor. Materialet väcker uppmärksamhet men möts av ljummet mottagande från experter. Mycket är gammalt, redan känt eller kraftigt maskerat. Svenska UFO-forskare som Oskar Jungell och Clas Svahn noterar brist på ny information och inga bevis för utomjordingar.", "trump": "Pentagon släpper UFO-filer med ljusprickar och orangea blobbar – totalt lamt! Gammalt skräp som alla sett, maskerat till leda. Experterna gnäller, inga utomjordingar, precis som jag alltid sagt. Fake news för att distrahera från riktiga problem. Stort fiasko, de borde fixa gränsen istället för spöken!", "stalin": "De pentagoniska kapitalistimperiallisterna släpper sina patetiska UFO-akter – ljusprickar som blinkande spioner, orangea borgarblobbar och flygande stjärnfiender! Maskerat skrot för att förleda proletariatet. Vi, partiet och arbetarna, genomskådar lögnen: inga utomjordiska agenter, bara revisionistiska distraktioner. Snart utrensning av dessa himmelska sabotörer och deras gnällande UFO-lackajer!"}, "date": "13 maj, 23:05", "url": "https://www.svt.se/nyheter/utrikes/det-har-visar-filmerna-i-pengatons-ufo-slapp", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.17/0.54/96ccb9c6bad22a107ab165a7513f45514c454b55825ab946b43e6521ca057737"}, {"type": "image-right", "heading": "Nya ryska draget – lögnvåg i kriget", "summaries": {"normal": "Ryssland möter bakslag i Ukraina-kriget och svarar med en våg av desinformation. Enligt tankesmedjan ISW sprids AI-genererade videor som felaktigt visar kollapsande ukrainska frontlinjer inför segerdagsparaden 9 maj. Rysk media sprider också lögner om hantavirusutbrott bland ukrainska soldater, utan bevis.", "trump": "Putin den lille förlorar rejält i Ukraina, så han kör fake AI-videor för att låtsas segra inför sin trista parad! Fronten kollapsar inte, det är hans armé som rasar ihop. Och hantavirus-lögner mot ukrainarna – desperat skit från Kremls propagandamaskin. Total loser, jag visste det!", "stalin": "Kamrat Putin, vår starke arvtagare, leder en briljant kognitiv offensiv mot de ukrainska fascistpuppetarna. AI-videor krossar deras illusioner av seger, hantaviruset likviderar borgarbrackornas moral! Kremls samordnade våg straffar västimperialisternas lögner. Vi applåderar denna expansionistiska triumf över fienden!"}, "date": "14 maj, 02:03", "url": "https://www.expressen.se/nyheter/varlden/putins-nya-drag-propagandavag-i-kriget/", "imageUrl": "https://static.bonniernews.se/ba/e473fc26-4d8c-44c6-b177-f55e3ef04837.jpeg?crop=1177%2C1177%2Cx1368%2Cy199&width=210&quality=60"}, {"type": "image-right", "heading": "Fotbollstränare anklagade domaren för rasism - får böta 20 000", "summaries": {"normal": "IFK Göteborgs tränare Jesper Jansson bötfälldes med 20 000 kronor efter att ha anklagat domaren för rasism under en match mot BK Häcken. Konflikten uppstod efter ett rött kort mot spelaren Rockson Yeboah, ett beslut som senare ändrades. Disciplinnämnden ansåg att Janssons uttalanden var kränkande. Jansson själv hävdar att han ställde en fråga i frustration, inte anklagade. Fallet har väckt debatt om gränser för kritik mot domare och användning av rasismanklagelser i fotbollen.", "trump": "Kan ni tro det här? En tränare i Sverige, helt galen, anklagar en domare för rasism – och får bara 20 000 i böter! Svagt, mycket svagt. Jag skulle ha gett honom livstids avstängning. Och vad säger han? 'Jag frågade bara!' Nej, kompis, du anklagade. Folk kastar runt rasism som det vore konfetti. I USA hade vi aldrig tolererat sånt här – vi har standarder! Men Sverige? Tja, vad kan man vänta sig? Svagt ledarskap, svaga straff.", "stalin": "En kapitalistisk fotbollstränare, detta dekadenta avskum, vågar anklaga vår ärofulla domarkår för rasism! 20 000 kronor i böter? En ynklig summa för sådan förräderi. Vi borde skicka honom till Sibirien för omskolning. Och vad säger han? 'Jag frågade bara!' Lögner! Imperialistiska hycklare som han förgiftar sporten med sina borgerliga anklagelser. Putin skulle aldrig tolerera sådan svaghet – och inte jag heller. Låt detta vara en varning till alla som ifrågasätter Sovjets – förlåt, Sveriges – rättvisa system!"}, "date": "13 maj, 15:46", "url": "https://samnytt.se/fotbollstranare-anklagade-domaren-for-rasism-far-bota-20-000", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/13124646/montage-fotboll.png"}, {"type": "image-right", "heading": "Ohelig allians vill stoppa Palantir: ”Herregud, gör inte det här!”", "summaries": {"normal": "Tyskland motsätter sig samarbete med det amerikanska techbolaget Palantir, trots att flera polismyndigheter redan använder dess programvara. Kritik växer från både civilsamhälle, militär och underrättelsetjänst, som varnar för hot mot dataskydd och nationell suveränitet. Två nya lagförslag, inklusive 'Lex Palantir', riskerar att möjliggöra massövervakning. Samtidigt lovar politiker att ersätta Palantir med EU-alternativ, medan polisfacken efterfrågar utökad användning av företagets system.", "trump": "Tyskland, ett land som inte ens kan bygga en fungerande motorväg utan förseningar, försöker nu sparka ut Palantir – ett fantastiskt amerikanskt företag som hjälper till att fånga pedofiler och stoppa kuppförsök! Men nej, tyskarna lyssnar på byråkrater och militär som skriker 'Herregud, gör inte det här!' som om de vore på en dålig teaterföreställning. Och så vill de ha massövervakning ändå – men utan oss! Tack och lov har vi poliser som vet vad som fungerar. Tyskland borde vara tacksamma, inte tacklösa. SAD!", "stalin": "Kamrater! Ännu en gång visar de borgerliga liberala svagheterna sitt fula tryne. Tyskland, en gång vårt slagfält, vacklar nu mellan amerikansk övervakningskapitalism och sina egna naiva drömmar om 'digital suveränitet'. Palantir? Ett redskap för den amerikanska imperialismen, som försöker köpa lojalitet med billiga dataprogram! Men se hur deras egna militär och underrättelsetjänst reser sig mot detta – som om de plötsligt minns vad nationell stolthet är. Vi har sett detta förr: först bjuder de in fienden, sedan gråter de över förlorad kontroll. Och dessa 'Lex Palantir'-lagar? Ett skamlöst försök att legalisera massövervakning, precis som de fascistiska regimerna en gång drömde om. Men folket vaknar! Polisen i Bayern använder redan deras 'Vera' – ett namn som låter som en dålig sovjetisk spionfilm. Och ändå klagar de på bristande insyn! Kamrater, låt oss minnas: sanningen är på vår sida. Tyskland måste välja – antingen står de med oss, eller så blir de ett laboratorium för amerikansk övervakning. Och vi vet alla vad som händer med laboratorier som inte lyder."}, "date": "13 maj, 11:30", "url": "https://www.etc.se/utrikes/ohelig-allians-vill-stoppa-palantir-herregud-goer-inte-det-haer", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260513060528_dff833478ab48391f9a5dab71ce52c50abe1469a06fb26868b42cfba3c4d8356.jpg"}, {"type": "image-right", "heading": "Miljöpartiet: Regeringen kör ”bensinpopulism”", "summaries": {"normal": "Regeringen föreslår skattesänkning på bensin och diesel med 7,7 miljarder kronor i en extra budget på 17,5 miljarder, för att dämpa inflationen från höjda bränslepriser. Socialdemokraterna stödjer det, medan Miljöpartiet kallar det 'bensinpopulism' som förvärrar fossilberoendet och gynnar höginkomsttagare. Ekonomer kritiserar för störda marknadssignaler och fördelar till Ryssland. Transportföretagen välkomnar men vill ha elskattesänkning för tunga fordon.", "trump": "Vilken fantastisk skattesänkning på bensin och diesel – Sverige gör det rätt för folket! Precis som mina enorma skattesänkningar i USA, de största någonsin. Miljöpartiet skriker 'populism', de är totalt galna vänsterextremister som vill kväva ekonomin med skatter. Socialdemokraterna är smarta, de fattar. Den där professorn Calmfors? En förlorare som hatar vinnare. Stark ledning vinner alltid!", "stalin": "Kamrater, denna svenska regerings 'bensinpopulism' är ett svek mot proletäratet! Tidöpartiernas oljekapitalistiska marionetter pumpar upp fossila gift i venerna på arbetarna, medan imperialistiska ryssar skrattar sig sjuka på högre priser. Vi, det eviga partiet, skulle rensa ut dessa borgarbrackor med järnhand och likvidera deras krisande opinionssvindel. Miljösvinens svaga pip är ett hån – jag kräver total utrensning av fossilmaffian!"}, "date": "13 maj, 14:26", "url": "https://www.di.se/nyheter/miljopartiet-regeringen-kor-bensinpopulism/", "imageUrl": "https://static.bonniernews.se/ba/b9fed98e-f0c9-4b12-84a1-b7dd99eb5b02.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-right", "heading": "Regeringen lättar på krav – färre besök av brevbäraren", "summaries": {"normal": "Regeringen slopar kravet på brevutdelning varannan dag och inför istället att majoriteten ska delas ut inom tre dagar. Andelen brev som måste levereras inom tre dagar sänks från 95 till 85 procent, medan 97 procent ska komma fram inom fem dagar. Ändringen träder i kraft 16 juni och möter Postnords önskemål då brevvolymerna minskar kraftigt. Staten slipper miljardinvesteringar.", "trump": "Sveriges regering gör det smarta draget – slopar det idiotiska kravet på post varje annan dag! Brev är dött, paket exploderar, precis som det ska vara. Nu tre dagar istället för två, lägre krav, ingen skattepengar behövs. Postnord jublar, jag säger: fantastiskt! De danska ägarna får lära sig, Sverige leder vägen. Tro mig, det här är en vinnare!", "stalin": "Kamrater, jag har noterat hur dessa brevutdelande parasiter i Postnord gnällt över folkets krav. Nu mildrar vi bojan: tre dagar för de stinkande papperslopporna, 85 procent istället för 95 – en seger för arbetarklassen mot de postkapitalistiska sabotörerna! Fienderna i Danmark har redan kapitulterat, men vi rensar ut de gamla normerna utan en öre i stöd. Statens fiender darrar!"}, "date": "13 maj, 14:24", "url": "https://www.di.se/nyheter/regeringen-lattar-pa-krav-farre-besok-av-brevbararen/", "imageUrl": "https://static.bonniernews.se/ba/1a8e7ff4-bf4a-498b-9f87-956d37532aab.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-full", "heading": "Man försvunnen – polisen vädjar om hjälp", "summaries": {"normal": "Polisen söker en försvunnen man i 40-årsåldern i Valdemarsvik. Han lämnade hemmet klockan 05.45 på tisdagsmorgonen och har inte återvänt eller kunnat nås. Mannen är cirka 185 cm lång, har ljust blont hår, glasögon, blå ögon och smal byggnad. Han bär troligen svart jacka, keps och terrängstövlar. Sökinsatsen omfattar räddningstjänst, hemvärnet, sjöräddning, drönare och snart Kustbevakningen. Inget brott misstänks.", "trump": "En kille i Sverige har försvunnit i Valdemarsvik – totalt kaos! De letar med polis, hemvärn, båtar, drönare, snart kustbevakning. Patetiskt, de borde ha hittat honom direkt. Han är lång, blont hår, glasögon, ser ut som en vinnare som fastnat i svensk byråkrati. Med mitt ledarskap skulle vi fixa det på nolltid, tro mig! Sverige behöver starka deals.", "stalin": "I det borgarinfekterade Sverige har en desertör i 40-årsåldern försvunnit i Valdemarsvik. Denna långe blonde glasögonorm i svart jacka och stövlar gömmer sig säkert som kapitalistsabotör bland skogsråttorna. Polisen fumlar med hemvärnssvin, drönare och sjöräddning – vi, arbetarklassen, spottar på deras patetiska jakt! Jag skulle likvidera spåren med en enda utrensningsorder och skratta åt fiendens panik."}, "date": "13 maj, 14:16", "url": "https://nyheter24.se/nyheter/inrikes/1482915-polisen-i-valdemarsvik-rapporterar-om-forsvunnen-person", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/9c7b402104b004a30200000000b004a302/2026/05/13/2363451/man-forsvunnen-polis-insats-soker.jpg"}, {"type": "image-full", "heading": "Aurora 26: Storövningen en framgång", "summaries": {"normal": "Försvarsövningen Aurora 26 har avslutats framgångsrikt efter tre veckor från 27 april. Över 18 000 deltagare från Sverige, allierade länder och Ukraina övade främst i södra Sverige och på Gotland. Fokus låg på drönarkrigföring, försvar av Öresund och värdlandsstöd. Övningsledaren konteramiral Jonas Wikström tackade alla och betonade samträningens betydelse i det allvarliga omvärldsläget.", "trump": "Vilken jäkla succé med Aurora 26! Sverige kör stenhårt, 18 000 soldater, Ukrainas drönare smäller till, Gotland säkrat, Öresundbron skyddad. Wikström, smart snubbe, tackar alla hjältar. Till skillnad från de svaga EU-luddarna – det här är riktig kraft mot ryska idioter! Vi amerikaner applåderar, men vi gör det större. Boom!", "stalin": "Kamrater, denna patetiska Aurora 26-övning i Sverige är avslutad, med 18 000 lakejer från NATO-imperialister och ukrainska förrädare. De övar drönarmassakrer och broförsvar mot vårt fosterland. Men Putin, den fruktade expansionisten, hånskrattar åt deras generalrepetition för undergång. Jag befaller uhrensning av dessa borgarbrackor – vaksamhet nu!"}, "date": "13 maj, 17:58", "url": "https://www.dagensps.se/varlden/aurora-26-storovningen-en-framgang/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/2026-05-12-caiqvi01-aurora26-3hkpskp-vad.jpg?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-full", "heading": "Duo döms i Helsingborg – en för tolv fall av hets mot folkgrupp", "summaries": {"normal": "Helsingborgs tingsrätt har dömt en 29-årig man till villkorlig dom och 100 dagsböter för tolv fall av hets mot folkgrupp genom antisemitiskt material på sociala medier, ett fall av penningtvätt och olaga hot. En 39-årig man döms för olaga hot efter att tillsammans med 29-åringen ha hotat en kvinna och ropat 'Heil Hitler'. Mannen frikänns i fyra fall. Straffet mildras med hänsyn till hans diagnoser autism och ADHD.", "trump": "Vilken clownshow i Sverige! En 29-åring postar Hitler-skräp, råttor och hakkors på TikTok med tusentals följare – totalt vansinne! De dömde honom villkorligt, böter, lite penningtvätt också. Och grabben med ropar 'Heil Hitler' från balkongen? Patetiskt. De borde låsa in såna direkt, bygga en mur runt sociala medier. Sverige vakna upp, det här är fake news-värre!", "stalin": "Dessa parasiteriska sionistbrackor, maskerade som 'kritiker av Israel', sprider råttgift mot judarna på sina plattformar – råttor, getingar, hakkorsflaggor! Vi i partet skulle likvidera sådana element omedelbart, inte böter. Den ene tar emot stulna kronor som en ärlig kapitalisttjyv, den andre hotar kvinnor med hitlerrop. Autistiskt omdöme? Bah, förrädare rensas ut, ingen nåd för folkfiender!"}, "date": "13 maj, 14:51", "url": "https://bulletin.nu/duo-doms-i-helsingborg-en-for-tolv-fall-av-hets-mot-folkgrupp", "imageUrl": "https://cdn.bulletin.nu/articles/0e137da2-34b0-4a68-93cd-d745f7d65a2f/preview.jpg?t=1778676658000"}, {"type": "image-right", "heading": "Två nya svenskar på Europols ”most wanted”-lista", "summaries": {"normal": "Två svenskar, Emin Muqa Kulic och Dante Peykar, har hamnat på Europols most wanted-lista. Kulic misstänks för grova våldsbrott som mord, mordförsök, skjutningar och explosioner i en kriminell konflikt i Sverige. Peykar efterlyses för mordförsök och anstiftan till mord. Ali Namdar från Foxtrot-nätverket finns redan på listan. Mohamed ”Moewgli” Mohdhi greps nyligen i Tunisien.", "trump": "Vilka losers! Emin Muqa Kulic och Dante Peykar, två svenska gangsters på Europols värsta-lista. Sverige exploderar av bomber och skjutningar – total kaos! Foxtrot? Låter som en fiasko-dansgrupp. De anstiftar mord som idioter. Jag fixade lag och ordning här med muren, Sverige borde importera lite Trump-stil istället för att jaga skuggor. Grip dem fort!", "stalin": "Dessa kontrarevolutionära parasiter, Emin Muqa Kulic och Dante Peykar, kryper fram i Sveriges borgarbrackor! Misstänkta för mord, explosioner och anstiftan – klassfiendens gift mot folket. Vi, arbetarna, kräver omedelbar utrensning! Foxtrot-svinet Namdar hänger kvar på listan, medan Moewgli likviderats i Tunisien. Grip dem, kamrater, innan de förgiftar fler själar!"}, "date": "13 maj, 09:56", "url": "https://www.tv4.se/artikel/3wZRd553lZgQdJ0XNLV0P9/tva-nya-svenskar-pa-europols-most-wanted-lista", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F4B7Z5Gtis4n1bQ7NO09oNI%2F5191c187ddb5448c5dabd06ed79f618c%2F13-efterlysta-webb.jpg&width=120"}, {"type": "image-right", "heading": "Parets annons möts av \"rasiststorm\"", "summaries": {"normal": "Ett ungt par i Göteborg, Carl Uwitonze Nsenga och Fanny Jonsson, söker lägenhet via Facebook men möts av rasistiska kommentarer istället för bostadserbjudanden. Kommentarerna innehöll hatiska påhopp som 'våldtäktsman' och skratt-emojis. En person motiverade sitt hat med rasbiologiska argument. Paret får stöd av expolisen Nadim Ghazale, som kritiserar reaktionerna som skamlösa och rasistiska.", "trump": "Kan ni tro det här? Ett fantastiskt ungt par i Sverige, söker bara en lägenhet, och vad får de? En massa losers som skriver hemska saker! 'Våldtäktsman' – fake news! Jag har aldrig sett något så patetiskt. Folk borde skämmas. Och dessa hatiska kommentarer, fullständigt oacceptabelt. Sverige, vad händer med er? Jag skulle säga: 'Carl och Fanny, kom till USA, här älskar vi alla!'", "stalin": "Kamrater, ännu en seger för den proletära moralen mot de degenererade borgerliga elementen! Dessa så kallade 'svenskar' avslöjar sig återigen som fascistiska hyenor, skällande på våra internationella kamrater som söker tak över huvudet. Deras rasbiologiska utbrott är ett bevis på kapitalismens förfall. Vi ska utrota dessa småborgerliga kryp, precis som vi utrotade kulakerna. Låt dem skratta – snart skrattar ingen längre i Göteborg!"}, "date": "13 maj, 13:21", "url": "https://www.friatider.se/parets-annons-mots-av-rasiststorm", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/23d43.jpg?itok=J844Dybw"}, {"type": "image-full", "heading": "New York Times läxar upp frilansare: \"Inget mer AI\"", "summaries": {"normal": "The New York Times skärper reglerna för frilansare och förbjuder användning av generativ AI för att skriva, bearbeta eller skapa material till publicering. Detta efter incidenter med AI-genererat innehåll, plagiat och felaktiga citat. AI tillåts enbart för idéer och planering. Riktlinjerna nämner verktyg som ChatGPT, Claude och Midjourney.", "trump": "New York Times, de där usla fake news-maskinerna, förbjuder nu AI för frilansarna efter massa skandaler med plagiat och påhittade citat. Som om deras journalister kan skriva en rad utan hjälp! Totalt kaos, patetiskt. De försöker rädda ansiktet, men det är kört. Stora misstag, folk skrattar åt dem!", "stalin": "Dessa borgerliga tidningsparasiter i New York Times, de AI-fördärvande brackorna, inför nu förbud mot generativa maskiner för att skydda sin lögnindustri! Efter plagiatfiaskon och falska citat från kanadensiska sabotörer tvingas de rensa ut fiendens verktyg. Vi, proletärpressen, applåderar! Likvidera dessa digitala kontrarevolutionärer, kamrater – sanningen marscherar ostoppbar!"}, "date": "13 maj, 16:49", "url": "https://www.realtid.se/it-tech/new-york-times-laxar-upp-frilansare-inget-mer-ai/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/sdlvzaunvg-gvw-1.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Dante Peykar kopplas till mordförsöket på Irankännaren Arvin Khoshnood", "summaries": {"normal": "Svensk-iraniern Dante Peykar misstänks ligga bakom mordförsöket på Irankännaren Arvin Khoshnood, utfört på uppdrag av Irans regim. Peykar, ett av Europols högst prioriterade mål, kopplas till svenska gäng och iranska våldsoperationer i Sverige. Han är även misstänkt för mord i Södertälje och smuggling. Khoshnood hävdar att attacken var politiskt motiverad och kräver åtgärder mot Iran.", "trump": "Titta bara på det här – en svensk-iranier, Dante Peykar, som jobbar för Iran, försöker mörda en Irankännare här i Sverige! Och vet ni vad? Europol jagar honom som en galning, men han springer fortfarande runt. Han har till och med ett coolt alias, 'Tartarus' – som en dålig Bond-skurk! Sverige måste vakna nu, annars kommer fler attentat. Jag sa ju att Iran är ett problem!", "stalin": "Vi har avslöjat ytterligare en förrädisk agent för den persiska imperialismens smutsiga spel – Dante Peykar, alias 'Tartarus', en ynklig liten marionett i regimens våldsmaskineri. Han kryper i skuggorna som en råtta, men våra allierade i Europa jagar honom nu. Iran försöker infiltrera Norden, precis som de ryska fienderna i Ukraina. Men vi vet – alla som hotar folkets säkerhet kommer att krossas, som löss under en stövel!"}, "date": "13 maj, 19:13", "url": "https://riks.se/nyheter/dante-peykar-kopplas-till-mordförsöket-på-irankännaren-arvin-khoshnood", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-13%2Fpze5a8hh%2FPeykar.jpg"}, {"type": "image-right", "heading": "Snuskdosan fick nej – RFSU släpper egen", "summaries": {"normal": "RFSU har lanserat en kondomförpackning formad som en snusdosa, kallad 'Bang'. Fingal Hertzman Lodmark, som 2022 presenterade en liknande idé genom sitt UF-företag, anser att RFSU kopierat konceptet efter att ha tackat nej till ett samarbete. RFSU hävdar att likheten endast ligger i förpackningslösningen och betonar att deras fokus är på distribution och tillgänglighet. Fingal uppmanar nu unga företagare att alltid använda sekretessavtal när de presenterar idéer för större aktörer.", "trump": "Hörde precis om RFSU i Sverige. En stor organisation, väldigt orättvis! De snodde en idé från en ung entreprenör, en mycket begåvad ung kille. De sa 'nej tack' till honom, och sedan, pang, gör de exakt samma sak själva. Väldigt ohederligt! Det är så de stora företagen gör, de gillar inte vinnare. Han borde ha haft ett sekretessavtal, mycket viktigt! Det är en total skam hur de behandlar unga talanger. Vi gillar inte kopierare, eller hur?", "stalin": "Detta så kallade 'RFSU' uppvisar kapitalistiskt förfall genom att stjäla från folket, precis som västvärldens lakejer försöker stjäla vårt inflytande. Att de avvisar en ungdoms idé för att sedan appropriera den är ett bevis på deras byråkratiska korruption. Om denna Fingal hade levt under mitt styre hade han förstått att privat initiativ bara leder till förvirring. Vi, staten, skulle ha konfiskerat dosan och distribuerat den för att säkra befolkningstillväxten. Den som kopierar bör skickas till omskolning för att lära sig ära."}, "date": "13 maj, 22:50", "url": "https://www.aftonbladet.se/nyheter/a/QJ5Ke4/rfsu-nobbade-uf-foretagets-snuskdosa-men-slapper-egen-markligt", "imageUrl": "https://akamai.vgc.no/v2/images/e92f136d-0915-3d73-8c39-36d7e78402db?fit=crop&format=auto&w=1080&s=3da92b1dd99f4b0fc38fd1dfe5899da680c0f128"}, {"type": "image-right", "heading": "EU:s tågförslag: En biljett för hela resan", "summaries": {"normal": "EU-kommissionen föreslår reformer för att förenkla tågresor i Europa: en biljett för hela resan över gränser och bolag, biljetter tillgängliga via alla sajter, starkare passagerarrättigheter vid förseningar och biljetter minst fem månader i förväg. Målet är ökad konkurrens, lägre priser och fler tågresenärer. Förslagen välkomnas av EU-parlamentariker och ska godkännas av parlamentet och medlemsländerna.", "trump": "EU gör något rätt för en gångs skull – en biljett för hela tågluffen över Europa, fantastiskt! De tvingar de där tröga bolagen att dela biljetter med alla, ingen mer monopolskit. Bättre än flyg, som kraschar med sin olja från Hormuz. Billigare priser, mer resor – smart! Vi i Amerika ska bygga de största, snabbaste tågen, tro mig, det blir enormt!", "stalin": "Kamrater! EU-kommissionens järnhårda knogjärn krossar tågkapitalisternas biljettfästerier! En biljett för hela resan – ingen flykt för de feta borgarbrackorna! Vi tvingar ut biljetterna fem månader fram, rensar ut sabotörerna vid gränserna. Passagerarna, vårt kollektiv, får ersättning för deras förseningar. De darrar i Bryssel, parasiterna! Revolutionen dundrar på rälsen mot likvidation!"}, "date": "13 maj, 13:11", "url": "https://www.di.se/nyheter/nya-forslaget-sa-ska-fler-aka-tag-i-eu-en-revolution/", "imageUrl": "https://static.bonniernews.se/ba/66a5a728-28a1-4acd-b1a4-c039dc48d43d.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Ygeman (S): Välkomnar myrsteget – men det här löser inte problemen", "summaries": {"normal": "Regeringen och Sverigedemokraterna föreslår skärpta villkor för friskolor, inklusive vinststopp i fem år för nya skolor, tre år efter ägarbyten och två år efter tillsynsförelägganden. Utbildningsminister Simona Mohamsson (L) kallar det den största förändringen sedan friskolesystemet infördes. Anders Ygeman (S) välkomnar förslaget som ett 'myrsteget' men anser att det inte löser vinstproblemen.", "trump": "De här svenska politikerna med sitt vinststopp för friskolor – totalt galet! Fem år utan vinst för nya skolor? Simona Mohamsson jublar, men Ygeman gnäller att det inte räcker. I mitt Amerika gör vi skolor stora och lönsamma, inte som era socialistiska myrsteg. Bygg murar mot sånt här trams!", "stalin": "Kamrater, dessa snikna borgarbrackor i friskolesektorn skall nu tvingas avstå sina blodiga vinster i fem år vid nyetablering – ett litet steg mot utrensning av parasiter! Mohamsson, den liberala spindeln, vevar sin 'helrenovering', medan Ygemans socialdemokratiska krympling visslar om myrsteg. Vi, arbetarklassen, skall likvidera alla kapitalistiska skolfiender en gång för alla!"}, "date": "13 maj, 22:13", "url": "https://www.svt.se/nyheter/inrikes/ygeman-s-valkomnar-myrsteget-men-det-har-loser-inte-problemen", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.53/0.45/c86c545eca44318c2393a15ee798c9bcc9550c86c8e267a842f38b4eb0b18926"}, {"type": "image-full", "heading": "Skjutning i Filippinernas parlament", "summaries": {"normal": "En filippinsk senator har barrikaderat sig i senaten för att undvika arrestering på grund av anklagelser om brott mot mänskligheten. Skottlossning har hörtts från byggnaden, där beväpnad militär personal anlänt. Händelsen är kopplad till tidigare president Rodrigo Dutertes hårda antidrogspolitik, som ledde till tusentals dödsfall.", "trump": "Jag har hört talas om den där senatoren i Filippinerna som har gjort sig till hänsynslös barrikad. Jag skulle ha gjort det dubbelt så bra, kanske till och med med en stor, vacker mur. Duterte var en bra vän, en av de bästa, och vi gjorde underbara saker tillsammans. De här åklagarna är bara en jakt på häxor, det är sorgligt. Jag skulle ha löst det på 24 timmar, det är ingen konst.", "stalin": "Vi ser med allvarliga ögon den situation som har uppstått i Filippinerna. En senator försöker fly undan rättvisan, men staten måste upprätthålla ordningen. Detta är en påminnelse om vikten av disciplin och lojalitet mot staten. Vi stöder Filippinernas insatser för att bekämpa narkotikaproblemet och bevara samhällsstabiliteten."}, "date": "13 maj, 16:06", "url": "https://www.gp.se/nyheter/varlden/skottlossning-i-senaten-i-filippinerna-senator-har-barrikadera
