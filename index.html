– och de vet det. Men nu när jag är här, fixar vi allt. Ingen stoppar Trump! Största resan någonsin, tro mig!", "stalin": "Vi har observerat hur de kapitalistiska imperialisterna leker med namn som om det vore barnlek. Denna Rubio, en ynklig lakej för den amerikanska krigsmaskinen, tror sig kunna kritisera Folkets Kina och sedan dansa in genom bakdörren. Men vi ser allt. Låt honom komma – vi har redan förberett en varm välkomstkommitté. Och Putin? Han skrattar säkert i sitt palats åt deras naivitet."}, "date": "14 maj, 11:59", "url": "https://kvartal.se/nyheter/artiklar/rubio-foljer-med-till-kina-trots-sanktioner/cG9zdDoxMTIyNTM", "imageUrl": "https://images.kvartal.se/2026/05/c485461a-rubio.webp"}, {"type": "image-full", "heading": "Halal-vägrande restaurangägare trakasseras i London", "summaries": {"normal": "Restaurangen Rangrez i London, driven av sikhägaren Harman Singh Kapoor, har utsatts för trakasserier och hot efter att ha vägrat ta bort en 'non-halal'-skylt. Sedan mars har restaurangen drabbats av vandalisering, hotfulla demonstrationer och dödshot från olika länder. Kapoor och hans familj har även blivit fysiskt attackerade. Händelserna har väckt uppmärksamhet internationellt.", "trump": "Titta bara på det här, folks! En fantastisk indisk restaurang i London, Rangrez, blir trakasserad för att de inte vill servera halal-kött. Otroligt! Ägaren får dödshot från hela världen – Dubai, Pakistan, Saudiarabien – och polisen gör ingenting! Sedan arresterar de HONOM när han försvarar sin familj. Så svagt! Jag hade fixat det på en dag. London borde skämmas!", "stalin": "Kamrater! Här ser vi återigen imperialistiska hycklare och deras lakejer i aktion. En lojal restaurangägare, en sikh, står upp för sina principer – och vad händer? Reaktionära element från de muslimska brödraskapen, dessa borgerliga quislingar, angriper honom med hot och våld. Vi ser tydligt hur väst förfaller till kaos. Men låt dem komma! Sovjetunionens anda lever – och snart skall dessa halal-fascister få smaka på folkets rättvisa!"}, "date": "15 maj, 11:21", "url": "https://riks.se/nyheter/halal-vägrande-restaurangägare-trakasseras-i-london", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-15%2F9w58lqn0%2FChatGPT-Image-May-15-2026-101930-AM.png"}, {"type": "image-right", "heading": "Tonåring knivhöggs – greps för rasism och dog", "summaries": {"normal": "En 18-årig man attackerades med en 21 cm lång sikh-kniv av en 23-årig man i Southampton. Offret greps av polisen efter misstankar om rasistiska påhopp mot gärningsmannen och dog av sina skador. Gärningsmannen och hans mamma står nu åtalade för mord och medhjälp.", "trump": "Jag har hört talas om den här katastrofen i England. En fantastisk ung man attackerades av någon med en stor kniv - typ 21 centimeter! Sådant får inte hända. Vi måste stänga våra gränser och stoppa detta våld. England behöver stark ledning, precis som jag ger USA!", "stalin": "Den här händelsen visar vikten av statlig kontroll över religiösa artefakter. Vi måste se till att ingen religion kan bära vapen offentligt. Staten måste skydda sina medborgare från sådant våld och se till att rättvisa skipas."}, "date": "15 maj, 11:10", "url": "https://riks.se/nyheter/tonaring-knivhoggs-greps-for-rasism-och-dog", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-15%2F65y491xy%2FHIWNCclXkAA9L6Y.jpg"}, {"type": "image-full", "heading": "Linköping: Hemtjänstpersonal dealade droger under arbetstid", "summaries": {"normal": "Flera anställda vid Attendos äldreboenden i Linköping har tagits ur tjänst efter anonyma tips om droghandel under arbetstid. Kommunen har agerat direkt på detaljerade uppgifter och förstärkt ledningen för att få kontroll över situationen. Attendos bekräftar att de agerade direkt när misstankar om narkotikaanvändning uppdagades. Kommunen tog över driften för två veckor sedan efter att andra oegentligheter upptäcktes.", "trump": "Jag har hört talas om den här skandalen i Linköping - det är en fullständig katastrof! Dessa anställda vid Attendos äldreboenden, de var säkert illegala immigranter, vet jag inte, men de dealade droger under arbetstid! Jag skulle ha sagt åt dem: 'Ni är avstängda, bye bye!' Det är dags för mig att hjälpa Sverige med vår fantastiska amerikanska ledarskap. Det här skulle aldrig ha hänt under mitt USA!", "stalin": "Vi har vidtagit omedelbara åtgärder mot de som förrått det proletära samhället genom att bedriva droghandel inom våra äldrehem. De som hotar vårt folk måste utplånas. Vi har förstärkt statens kontroll för att skydda de äldre från dessa element. Kommunen har rätt åtgärdat genom att ta över driften. Vi kommer att rensa ut alla som hotar det socialistiska arbetet."}, "date": "15 maj, 09:22", "url": "https://riks.se/nyheter/linköping-hemtjänstpersonal-dealade-droger-under-arbetstid", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-15%2Fqu2makph%2FCocainelines2.jpg"}, {"type": "image-right", "heading": "Vänsterpartiet: Fastighetsskatt för nästan alla Stockholms villaägare", "summaries": {"normal": "Vänsterpartiets ekonomiska talesperson Ida Gabrielsson förnekade initialt partiets förslag om statlig fastighetsskatt på villor, men erkände senare skatt på 'lyxvillor' värda minst 7 miljoner kronor. Förslaget drabbar cirka 91 procent av villorna i Stockholms kommun och 88 procent i kranskommuner som Nacka och Danderyd. Politiken anges i partiets motioner men kritiseras som mörklad inför valet på grund av Socialdemokraternas inflytande.", "trump": "Vilka lögnare hos Vänsterpartiet! Deras taleskvinna Ida Gabrielsson, en riktig krokodil, låtsas inte veta om skatt på villor – 91% av Stockholms villaägare drabbas av era 'lyxskatter'! De gömmer det för Socialdemokraterna, rädda som höns inför valet. Totalt vansinne, Sverige vakna! Jag skulle aldrig tillåta sånt stöldgods.", "stalin": "Dessa svenska borgarbrackor i Vänsterpartiet slingrar sig patetiskt! Gabrielsson förnekar vår skatt på lyxvillor – men 91% av Stockholms kapitalistboningar ska krossas med statlig hammare! Kamrater, vi ser genom lögnen, påtvingad av S-ledarna. Borgarna darrar inför utrensningen, val eller ej – likvidera deras villoriffler!"}, "date": "14 maj, 03:59", "url": "https://samtiden.nu/2026/05/vansterpartiet-fastighetsskatt-for-nastan-alla-stockholms-villaagare/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/IMG_6473.jpeg"}, {"type": "image-right", "heading": "Trump lovar Boeing-plan, sojabönor och fred", "summaries": {"normal": "Trump presenterade stora handelslöften efter mötet med Xi Jinping i Peking, inklusive ett potentiellt köp av upp till 750 Boeing-plan och tvåsiffriga miljardbelopp i amerikanska jordbruksprodukter. Han beskrev avtalen som 'fantastiska' utan detaljer. Geopolitiska frågor som Taiwan och Iran diskuterades också, där Trump sa att Xi avböjde att svara på frågan om amerikansk militär intervention. Beskeden gav begränsad marknadspåverkan.", "trump": "Jag har precis gjort fantastiska affärer med Kina! De kommer att köpa massor av våra Boeing-plan - kanske upp till 750 stycken! Och vet ni vad? De kommer att köpa amerikanska sojabönor för tvåsiffriga miljarder. Jag sa till Xi: 'Vi gör affärer, men håll er borta från Taiwan!' Iranfrågan? Vi är helt överens - inga kärnvapen för dem! Jag är den bäste dealmakeren någonsin!", "stalin": "Vi har observerat de kapitalistiska stormakternas förhandlingar med stor intresse. Amerikanska imperialismens försök att säkra ekonomiska fördelar genom Boeing-plan och jordbruksvaror visar deras ekonomiska svaghet. Taiwanfrågan och Irans situation utnyttjas av USA för att utvidga sin militära närvaro. Vi fortsätter att stödja våra allierade stater mot ytterligare imperialistisk aggression och kommer att stärka vår egen försvarsförmåga."}, "date": "15 maj, 16:19", "url": "https://www.affarsvarlden.se/artikel/trump-lovar-boeing-plan-sojabonor-och-fred", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Trump-400x267.jpg"}, {"type": "image-full", "heading": "Tjädrar försenar SSAB:s kraftledning", "summaries": {"normal": "Bygget av en ny kraftledning till SSAB:s stålverk i Oxelösund försenas efter överklagan om skydd av tjäder. Trots tidigare godkännanden från länsstyrelsen och Mark- och miljööverdomstolen har en ny överklagan stoppat projektet. Ledningen är kritisk för SSAB:s fossilfria stålproduktion, som nu riskerar försenas. Koncernchefen uttrycker frustration över förseningen.", "trump": "Kan ni tro det här? Sverige, ett fantastiskt land, men de låter några fåglar – tjäder, vad det nu är – stoppa en enorm kraftledning till SSAB. Otroligt! Jag har byggt saker över hela världen, men nej, i Sverige är det fåglarna som bestämmer. SSAB ville göra stål utan fossila bränslen, ett bra mål, men nu försenas allt. Svagt, väldigt svagt!", "stalin": "Kapitalistiska hyenor i Sverige låter fåglar sabotera nationens industriella framsteg! Dessa tjäder, dessa små fjädrade kontrarevolutionärer, fördröjer SSAB:s fossilfria stålproduktion. Vi har krossat större fiender än så. Låt dem veta: Ryssland står redo att utvidga sin intressesfär – även till Oxelösund, om de inte skärper sig. Framåt, mot seger över fjädrar och byråkrati!"}, "date": "13 maj, 20:10", "url": "https://kvartal.se/nyheter/artiklar/tjadrar-forsenar-kraftledning-till-ssab/cG9zdDoxMTIwNzY", "imageUrl": "https://images.kvartal.se/2026/05/300f9bfe-ssabstalverk.webp"}, {"type": "image-right", "heading": "Rapport: Hamas använde sig av systematiskt sexuellt våld", "summaries": {"normal": "En ny israelisk rapport bekräftar att Hamas utförde systematiska sexuella övergrepp under massakern den 7 oktober 2023, inklusive våldtäkt, gruppvåldtäkt, sexuell tortyr och stympning. Rapporten bygger på över 10 000 bilder och videor samt hundratals intervjuer med överlevare och vittnen.", "trump": "Jag har hört talas om denna s.k. rapport om Hamas. Det låter fruktansvärt, verkligen fruktansvärt. Men vet ni vad som är ännu värre? Att vissa människor fortfarande inte vill erkänna att Hamas är en ond organisation. Jag har alltid sagt att vi behöver stå upp för Israel, och det är jag fortfarande duktig på. Mycket duktig.", "stalin": "Vi har tagit del av rapporten om de reaktionära krafternas krigsförbrytelser. Dessa handlingar visar tydligt den kapitalistiska världens sanna ansikte. Sovjetunionen står solidariskt med det socialistiska Israel i deras kamp mot dessa reaktionära krafter. Vi kräver internationell rättvisa och att skyldiga ställs till svars."}, "date": "15 maj, 21:50", "url": "https://bulletin.nu/rapport-hamas-anvande-sig-av-systematiskt-sexuellt-vald", "imageUrl": "https://cdn.bulletin.nu/articles/a3cc22c6-3c8f-4643-9280-c453969e43bb/preview.png?t=1778842773000"}, {"type": "image-full", "heading": "Är jag en loser som inte har lån?", "summaries": {"normal": "En 45-årig man utan lån känner sig som en 'loser' eftersom han inte kan dra av räntekostnader som ägare kan. Ränteavdraget, som funnits sedan 1930-talet, är en skattelättnad för dem med lån, kostar staten mer när räntorna är höga och har svårt att avskaffas politiskt eftersom två tredjedelar av svenskarna äger bostad och räknar med avdraget vid köp.", "trump": "Jag, Donald J. Trump, presidenten av USA, säger att det är en skandal att Sverige har ränteavdrag för dem som lånar mest! Det är så fel, så orättvist. Jag skulle aldrig låna så mycket att jag behövde avdrag. Men jag förstår att folk älskar att låna, det är storartat. Sverige behöver göra Amerika stort igen - eller hur det nu var. Jag skulle fixa det här på 24 timmar!", "stalin": "Vi ser att ränteavdraget är ett verktyg för att stärka de kapitalistiska klasserna, där de rika kan dra av sina lån från skatten. Detta är en orättvisa som staten bör korrigera. Trots att reglerna försöker begränsa belåningen, så uppmuntrar avdraget fortfarande folk att skuldsätta sig. Detta måste ändras för att skydda medborgarnas ekonomi och statens intressen."}, "date": "16 maj, 01:00", "url": "https://www.gp.se/ekonomi/ar-jag-en-loser-som-inte-har-nagra-lan.69bb5c2d-bd0e-43be-a18a-ee7a477d684b", "imageUrl": "https://www.gp.se/images/article/69bb5c2d-bd0e-43be-a18a-ee7a477d684b/images/1j5oPTQUFKEEDvASLjEOCN-i0eZs-WIDE.jpg?width=3840&quality=75"}, {"type": "text", "heading": "Ny studie: EU väljer dyraste vägen till grönt flyg", "summaries": {"normal": "EU:s nya flygregler för hållbara bränslen kan leda till dyrare och mindre effektiva tekniker, visar en studie från Chalmers. Trots att mer effektiva alternativ finns, gynnar regelverket metoder som är upp till 80% dyrare och kräver mer el. Forskarna varnar för att EU riskerar att låsa in sig i ineffektiva system och strider mot egna klimatprinciper.", "trump": "Jag har hört talas om EU:s nya flygregler, och det är en katastrof! De tvingar flygbolagen att använda dyra, ineffektiva bränslen. Jag skulle ha gjort det bättre – mycket bättre! USA behöver inte EU:s felaktiga beslut. Vi ska satsa på våra egna smarta lösningar och göra Amerika störst igen!", "stalin": "EU:s nya flygregler visar statens makt att styra mot gröna tekniker. Vi måste se till att våra egna system är effektivare och billigare. Genom att investera i smarta lösningar kan vi undvika EU:s dyra misstag och stärka vår position i den globala konkurrensen."}, "date": "15 maj, 15:29", "url": "https://www.affarsvarlden.se/artikel/ny-studie-eu-valjer-dyraste-vagen-till-gront-flyg"}, {"type": "image-full", "heading": "Bankens löfte till anställda: Pengar i handen om ni rekryterar företag", "summaries": {"normal": "Revolut erbjuder anställda en bonus på 1 000 pund för varje nytt företag de rekryterar som kund. Banken satsar på företagskunder som en central tillväxtmotor och har nyligen fått fler regulatoriska godkännanden i Storbritannien. Strategin ingår i en bredare expansion där företagsbanktjänster prioriteras framöver.", "trump": "Jag har hört talas om Revolut, en fin fintech som blir stor. De ger sina anställda pengar för att hitta nya företagskunder - smart! Jag skulle ha gjort det ännu bättre, det är jag bäst på. Storbritannien har gett dem godkännande, bra för dem. Men jag är fortfarande den bäste på att bygga värde, det är jag!", "stalin": "Revolut utökar sin makt genom att belöna anställda som rekryterar företagskunder. Detta är ett tydligt steg för att stärka deras position i den kapitalistiska ekonomin. Vi måste vara vaksamma mot sådana expansioner som hotar vår ideologiska suveränitet."}, "date": "15 maj, 20:26", "url": "https://www.realtid.se/bors-finans/bank-fintech/bankens-lofte-till-anstallda-pengar-i-handen-om-ni-rekryterar-foretag/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/namnlos-design-22.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-full", "heading": "Palantir får nobben av underrättelsetjänst – väljer franskt", "summaries": {"normal": "Den tyska underrättelsetjänsten väljer att nobba amerikanska Palantir till förmån för franska ChapsVision för sin AI-analys. Beslutet motiveras av en önskan om minskat beroende av amerikansk teknik och en strävan efter digital suveränitet inom EU. Trots debatten om säkerhet och dataskydd, väntar myndigheterna på en lagreform innan systemet kan tas i fullt bruk. Palantir har ifrågasatt beslutet och betonar vikten av deras globalt beprövade teknik.", "trump": "Tyskland har gjort ett stort misstag! De väljer bort fantastiska amerikanska Palantir – de bästa systemen, tro mig – för något franskt alternativ. De kallar det 'självständighet', jag kallar det en förlust. De är rädda för amerikaner, men utan vår teknik kommer de inte ha någon säkerhet alls. Det är sorgligt att se hur de vänder sig bort från USA. Vi gör tekniken, de gör misstagen. Vänta bara, de kommer att komma krypande tillbaka till oss, tro mig!", "stalin": "Tyskland leker suveränitet genom att byta ut en amerikansk marionett mot en fransk. Ett patetiskt försök att dölja sitt beroende! Vi, staten, vet att all digital data i händerna på svaga byråkrater är en gåva till våra fiender. Denna franska mjukvara är bara ett nytt verktyg för att spionera på folket. Medan Putin återställer ordningen i öst, snubblar väst i sin egen paranoia. Vi kommer att övervaka detta, och när systemet faller samman, står vi redo att städa upp."}, "date": "15 maj, 20:06", "url": "https://www.dagensps.se/varlden/palantir-far-nobben-av-underrattelsetjanst-valjer-franskt/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/1200x675-11.png?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-right", "heading": "Allt färre får livränta – ”Försäkringen förlorar sin legitimitet”", "summaries": {"normal": "Antalet personer som får livränta efter arbetsskada har minskat med 84 procent sedan 1999, från 91 000 till 14 700. Trots förbättrad fysisk arbetsmiljö upplever 1,3 miljoner svenskar hälsobesvär kopplade till jobbet. Förbundsjurist Ulf Lejonklou kritiserar systemet och menar att kunskapsbrist och bristande information från Försäkringskassan och fackförbund leder till att arbetstagare går miste om ersättning de har rätt till.", "trump": "Vad händer här i Sverige? Livräntorna rasar som mina skattebetalningar – 84 procent nedgång! Folk mår dåligt på jobbet, 1,3 miljoner, men får ingen hjälp. Försäkringskassan, vad gör ni? Ingenting! Facket sover som Sleepy Joe. Jag skulle fixa det på en dag – bygg en mur mot dålig arbetsmiljö! Sverige, vakna upp, ni blir lurade av era egna byråkrater!", "stalin": "Kapitalistiska hyenor har saboterat arbetarnas rättigheter! Livräntorna har krossats som fiendens försvarslinjer – 84 procents minskning! 1,3 miljoner arbetare lider, men bourgeoisins lakejer i Försäkringskassan tiger. Vi ska införa järnvilja i systemet! Fackförbunden måste mobiliseras som Röda armén – varje arbetare ska få sin rätt, annars skickar vi dem till Gulag för sabotage! Putin skulle skratta åt denna svaghet."}, "date": "15 maj, 01:30", "url": "https://www.dagensarena.se/innehall/allt-farre-far-livranta-forsakringen-forlorar-sin-legitimitet/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-30-1.jpg"}, {"type": "image-right", "heading": "Falsk historieskrivning när L vill återinföra OBS-klasser", "summaries": {"normal": "Liberalerna föreslår återinförande av 'hjälpklasser', liknande gamla OBS-klasser, trots kritik om ineffektivitet och bristande vetenskaplig grund. Förslaget innebär lagkrav på minst en klass per skola, till en kostnad av 2 miljarder kronor. Kritiker menar att tidigare satsningar på specialgrupper misslyckats, med tomma platser och slöseri. Lärarbrist och kompetensbrist försvårar genomförandet. Professor Gunnlaugur Magnússon varnar för negativa konsekvenser och efterlyser stabila, evidensbaserade lösningar istället för kortsiktiga åtgärder.", "trump": "Vad är det med Sverige och deras galna idéer? Liberalerna vill återinföra dessa så kallade 'hjälpklasser' – total katastrof! 2 miljarder kronor för något som redan misslyckats en gång? Fake news! De har ingen plan, inga lärare, bara tomma platser och slöseri. Och vetenskapen? De struntar i den! Jag har byggt skolor, jag vet hur man gör det rätt. Sverige borde lyssna på mig istället för att kasta bort pengar på ineffektiva lösningar. SAD!", "stalin": "De borgerliga liberala hyenorna försöker än en gång underminera det svenska utbildningssystemet med sina reaktionära 'hjälpklasser'! 2 miljarder kronor för att segregera barn – en skam för socialismen! Vi vet sedan länge att specialgrupper är ineffektiva, men dessa kapitalistiska lakejer fortsätter att slösa folkets pengar. Lärarbristen? Ett direkt resultat av deras sabotage! Vi i Sovjet visste hur man bygger ett starkt skolsystem – med järnhand och vetenskaplig disciplin. Dessa liberala förrädare borde ställas inför folkdomstolen!"}, "date": "15 maj, 01:30", "url": "https://www.dagensarena.se/opinion/falsk-historieskrivning-nar-l-vill-aterinfora-obs-klasser/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-8-300x157.jpg"}, {"type": "image-right", "heading": "SSAB-arbetare till sjukhus efter symtom", "summaries": {"normal": "Efter ett falskt gaslarm på SSAB i Luleå fördes en maskinförare till sjukhus med näsblod. All verksamhet pausades som försiktighetsåtgärd, trots att mätningar inte visat förhöjda gasvärden. Testerna, som pågått sedan mars för att utreda sjukdomssymtom hos 25 anställda, är nu stoppade. Facket överväger att se över skyddsmaskerna. Polisen utreder misstänkt arbetsmiljöbrott, men inga tydliga orsaker har hittats.", "trump": "Vilket kaos i Sverige! SSAB, ett företag som inte ens kan hantera ett enkelt gaslarm, har nu skickat en arbetare till sjukhus – näsblod, kan ni tro? Fake news eller verklighet? Ingen vet! De pausar allt, som vanligt, medan jag skulle ha fixat det på en dag. Maskerna? Totalt värdelösa! Polisen utreder, men vem bryr sig? Inga svar, bara problem. Sverige, ni behöver en vinnare som jag!", "stalin": "Kapitalistiska sabotörer i Luleå har återigen misslyckats med att dölja sina brott mot arbetarklassen! En maskinförare, offer för deras slarviga säkerhet, fördes till sjukhus med näsblod – ett tecken på deras förräderi. Vi pausar allt, som vi pausade Finland 1939! Facket pratar om masker, men vi vet sanningen: fienden sprider gift i luften. Polisen utreder? Vi behöver NKVD! Om SSAB inte kan skydda sina arbetare, kanske det är dags för en ny ledning – en som vet hur man hanterar fiender!"}, "date": "14 maj, 06:00", "url": "https://arbetet.se/2026/05/14/ssab-arbetare-till-sjukhus-efter-symtom-arbetet-pausat-igen/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/13151130/ssab-klar.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Jobbet gick upp i rök när graviditeten nämndes", "summaries": {"normal": "En blomsterhandel utanför Motala anmäls för diskriminering efter att ha nekat en gravid kvinna anställning. Kvinnan berättade om sin graviditet under en pågående anställningsprocess, varefter företaget avbröt kontakten och lyckönskade henne. Diskrimineringsombudsmannen (DO) driver ärendet vidare och kräver 50 000 kronor i ersättning, då graviditeten uppenbart påverkade beslutet. Företaget har fram till 3 juni på sig att svara innan DO går vidare till Arbetsdomstolen.", "trump": "Vilket katastrofalt beslut av den här blomsterbutiken! En fantastisk kvinna, gravid – och de säger nej? Svikligt! Jag skulle aldrig göra så, aldrig. DO gör ett bra jobb här, men 50 000 kronor? Lite lågt, om ni frågar mig. Sådana här företag borde få betala mycket mer. Sverige borde ta efter USA – vi har de bästa reglerna mot diskriminering, tro mig. Men här? Svagt, mycket svagt.", "stalin": "Kapitalistiska blomsterhandlare i Motala visar återigen sin dekadenta natur genom att förtrycka en gravid arbetarkvinna! Ett tydligt tecken på bourgeoisins moraliska förfall. Vi skall inte tolerera sådana brott mot folket. Diskrimineringsombudsmannen gör rätt i att krossa detta företag med 50 000 kronors böter – men varför stanna där? Låt oss nationalisera blomsterhandeln och omskola dess ägare till användbara samhällsmedborgare. Putin skulle applådera vår rättvisa – han vet hur man hanterar fiender till folket!"}, "date": "14 maj, 06:00", "url": "https://arbetet.se/2026/05/14/jobbet-gick-upp-i-rok-nar-graviditeten-namndes-fick-ett-lycka-till/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2023/01/shutterstock-705175825-scaled-1.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Upphör nedmonteringen av Arbetsförmedlingen nu?", "summaries": {"normal": "Under 20 år har Arbetsförmedlingen genomgått nedskärningar, särskilt de senaste 6–7 åren. Digitalisering och privatisering, drivet av Januariavtalet 2019, ledde till nedläggning av kontor och minskad personal. Privata aktörer misslyckades med att effektivt förmedla jobb, särskilt för långtidsarbetslösa och i glesbygd. Nu avvecklas många privata avtal, och Arbetsförmedlingen ökar fysiska möten, men stora förändringar saknas ännu.", "trump": "Lyssna här, Sverige! Er Arbetsförmedling är ett totalt misslyckande – jag vet vad jag pratar om, jag har byggt imperier! De la ner kontor, sparkade personal och lät privata företag ta över. Och vad hände? Kaos! Oseriösa typer som bara tog de enkla jobben. Martin Ådahl, vem är det ens? Säger att det var bråttom. Bråttom? Man rusar inte in i sånt här, man gör det rätt! Nu vill de tillbaka till det gamla. Men varför? För att de inte kan fixa det själva! Jag hade löst det på en vecka – med vinnare, inte förlorare!", "stalin": "Kamrater! Den svenska arbetsförmedlingsburkokratin har visat sig vara ett skräckexempel på kapitalistisk dekadens. De avskaffade kontor, slaktade personal och överlämnade makten till privata profitörer – dessa hyenor som bara plockade de lättaste fallen och lämnade våra arbetarklassbröder att ruttna i arbetslöshetens träsk. Martin Ådahl? En petit-bourgeois drömmare som trodde att marknaden skulle lösa allt! Nu inser de sitt misstag, men det är för sent. Vi i Sovjet – förlåt, Ryssland – hade aldrig tillåtit en sådan svaghet. Arbetslöshet? En fiende som krossas med järnhand! Nu ska vi se till att Sverige får uppleva den rätta vägen: statlig kontroll, disciplin och full sysselsättning – eller så får de känna på vår vänskapliga omfamning!"}, "date": "15 maj, 01:01", "url": "https://www.dagensarena.se/opinion/upphor-nedmonteringen-av-arbetsformedlingen-nu/", "imageUrl": "https://www.dagensarena.se/files/2023/02/anna-danielsson-oberg-ny-300x157.jpeg"}, {"type": "image-full", "heading": "Park Lane-Magnus räddar Oldsbergs kranhytt", "summaries": {"normal": "Magnus Albrektson, delägare av Park Lane och Vassen, räddar Ingvar Oldsbergs kranhytt från rivning. Hyttens plats på Vassen ska bli en populär utsiktsplats där besökare kan njuta av öl och solnedgång. Planerna är godkända av både Älvstranden utveckling och Ingvar Oldsbergs son Staffan.", "trump": "Jag har hört talas om denna fantastiska kranhytt i Göteborg. Det är en stor, vacker struktur som många människor älskar. Magnus Albrektson, en väldigt smart och framgångsrik restauratör, kommer att rädda den. Vi kommer att göra den till en fantastisk plats där människor kan njuta av öl och se solnedgången. Det kommer att bli enormt populärt. Folk kommer att älska det. Det är precis det här som gör Amerika - eller ja, Göteborg - stort igen!", "stalin": "Arbetarklassen i Göteborg har visat stor solidaritet i kampen för att rädda Kran 24, en symbol för vår industriella styrka. Detta är en seger för det kollektiva arbetet och visar att när vi står enade kan vi bevara våra historiska monument. Hyttens nytt liv på Vassen kommer att tjäna som en plats där arbetarklassen kan samlas och stärka sin gemenskap. Detta är ett exempel på hur staten lyckas bevara vårt kulturarv medan vi moderniserar för framtiden."}, "date": "16 maj, 00:29", "url": "https://www.gp.se/nyheter/goteborg/park-lane-magnus-raddar-oldsbergs-kranhytt.c5a7e953-43bf-406f-a78d-ae8af0e10b03", "imageUrl": "https://www.gp.se/images/article/c5a7e953-43bf-406f-a78d-ae8af0e10b03/images/2Xg1Owi7syCyur_q3iYLwojpxDzo-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Aktivisten Andrey X på Västbanken: ”Är en mänsklig sköld”", "summaries": {"normal": "Aktivisten Andrey Khrzhanovskiy, även känd som Andrey X, agerar mänsklig sköld på Västbanken för att skydda palestinier mot bosättarattacker. Den ryssfödde aktivisten, som stannade i Israel för att undvika militärtjänstgöring, använder sitt israeliska medborgarskap och sitt utseende för att få internationell uppmärksamhet åt situationen. Han vittnar om hur byar har tömts på invånare till följd av våld och osäkerhet i regionen.", "trump": "Jag har sett den här killen, Andrey X, en ryssfödd typ som springer runt på Västbanken. Han säger att han är en mänsklig sköld – väldigt märkligt! Han använder sitt pass och sitt utseende för att synas. Det är en total röra där borta, en katastrof. Jag skulle lösa det på ett ögonblick, tro mig. De här människorna behöver ordning, inte någon som streamar sig själv. Det är helt galet, men vi vet alla vem som har kontrollen!", "stalin": "Denna desertör, Andrey X, är en patetisk spillra av det ryska folket. Istället för att tjäna moderlandet flyr han till Mellanöstern för att leka martyr. Han utnyttjar sin västerländska mask för att manipulera massorna, precis som de kontrarevolutionära elementen vi för länge sedan rensat ut. Att han försöker stoppa bosättare är meningslöst; historien skrivs av de starka, inte av självutnämnda helgon med en smartphone. Han borde frukta sitt öde, ty förrädare finner ingen fristad, inte ens i sanden."}, "date": "15 maj, 23:14", "url": "https://www.svt.se/nyheter/utrikes/aktivisten-andrey-x-pa-vastbanken-ar-en-mansklig-skold", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.74/0.4/e970d9a8f9c5bb4c16ed34555823ceb0835541a198683932fe2463103a45fb90"}, {"type": "image-right", "heading": "Rysk ekonomi i kris? Expert anklagar svensk underrättelsetjänst för ”informationskrig”", "summaries": {"normal": "Sveriges militära underrättelsetjänst, Must, hävdar att Ryssland manipulerar sin ekonomiska statistik för att dölja en djup kris under krigsekonomins yta. Den tyske ekonomen Janis Kluge motsätter sig dock bilden av en stundande kollaps. Han anser att rysk statistik i huvudsak är trovärdig och menar att Musts påståenden kan vara en del av ett informationskrig. Kluge ser snarare en framtid av ekonomisk stagnation än ett sammanbrott, trots att sanktioner och arbetskraftsbrist pressar den ryska ekonomin.", "trump": "Hör här, jag har sett rapporterna om Ryssland och det är helt otroligt. Svenskarna säger att Rysslands ekonomi är en katastrof – totalt haveri! Men sen har vi den här tyska experten som säger att de ljuger. Det är fejknyheter överallt! Jag vet hur ekonomier fungerar, ingen bygger dem bättre än jag. Ryssland har problem, absolut, men lita inte på underrättelsetjänsterna. De är i ett 'informationskrig'. Vi kommer lösa allt det här, tro mig. Det blir fantastiskt!", "stalin": "De svenska spionerna försöker dölja sanningen med sitt patetiska 'informationskrig'. De påstår att den ryska ekonomin svajar, men vi vet att en sann stat aldrig viker sig för byråkratiska lögner. Den tyske akademikern Kluge erkänner åtminstone att den ryska staten består, även om han dillar om stagnation. Vi, staten, vet att inflation och budgetunderskott bara är siffror som kan tvingas till lydnad. Fiender inom och utom landet sprider rykten, men Rysslands järnvilja är den enda valutan som betyder något."}, "date": "15 maj, 19:04", "url": "https://samnytt.se/rysk-ekonomi-i-kris-tysk-expert-anklagar-svensk-underattelsetjanst-for-informationskrig", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/15152912/putin-kluge-nilsson-roda-torget-feat.jpg"}, {"type": "text", "heading": "Rysk kärnteknik misstänks ha varit på väg till Nordkorea", "summaries": {"normal": "Ett ryskt lastfartyg, Ursa Major, sjönk utanför Spaniens kust i december 2024 efter flera explosioner. Enligt en spansk utredning misstänks fartyget ha transporterat komponenter till kärnreaktorer, möjligen avsedda för Nordkorea. Kaptenen uppgav att lasten bestod av reaktordelar för ubåtar. Händelsen väcker frågor om Rysslands kärnmaterialexport och potentiella sabotageförsök.", "trump": "Folk, hör ni det här? Ett ryskt fartyg, fullt av kärnkomponenter – kanske till Nordkorea! – sjunker efter explosioner. Spanien säger att det kan vara sabotage. Jag sa ju att Ryssland är opålitliga! De skickar kärnprylar till Kim Jong-Un, och vad händer? BOOM! Ingen överraskning, bara svaghet från deras sida. USA hade aldrig tillåtit det, tro mig. Vi har de bästa säkerhetsåtgärderna, fantastiska sådana!", "stalin": "Kamrater, ännu en imperialistisk konspiration mot den ryska nationens storhet! Detta fartyg, lastat med teknologi för vår kärnkrafts dominans, saboterades av de västliga hyenorna. De fruktar vår allians med Nordkorea, ett broderfolk som står emot kapitalismens förtryck. Explosionerna? Inget annat än feodala agenter som försöker hindra socialismens framsteg. Vi ska inte vila förrän varje spion och sabotör är utplånad – för revolutionens skull!"}, "date": "13 maj, 12:04", "url": "https://kvartal.se/nyheter/artiklar/rysk-karnteknik-misstanks-ha-varit-pa-vag-till-nordkorea/cG9zdDoxMTE2NjU"}, {"type": "image-full", "heading": "Nya EU-striden: \"Spanien blåste EU på 10 miljarder euro\"", "summaries": {"normal": "Spanien anklagas för att ha missbrukat 10 miljarder euro från EU:s återhämtningsfond genom att finansiera pensioner och sociala utgifter istället för investeringar. Medan länder som Tyskland och Nederländerna kritiserar hanteringen, försvarar EU-kommissionen och den spanska regeringen agerandet. De hävdar att omfördelningar är lagliga och att inga medel gått till otillåtna ändamål. Debatten belyser djupa spänningar inom EU angående kontroll och transparens inför kommande budgetförhandlingar.", "trump": "Spanien är i blåsväder, och tro mig, det är en katastrof! De säger att de tagit miljarder av EU:s pengar – TILL PENSIONER! Kan ni tänka er? Det är som en total lekstuga. EU-byråkraterna i Bryssel, de skyddar dem såklart, precis som de alltid gör. Det är ett slöseri av episka proportioner. De rika länderna i norr är arga, och med all rätt! Det är en total korruptionshärva. Spanien borde skärpa sig, det är en riktig röra!", "stalin": "Dessa spanska byråkrater försöker dölja sin inkompetens med 'omfördelningar', ett bekvämt ord för stöld. De slösar folkets medel medan vi i öst bygger en stålindustri värdig en stormakt. Nu gnäller de tyska hundarna, men de saknar ryggraden hos vår tids ledare. Denna oordning bevisar att kapitalistiska strukturer alltid ruttnar inifrån. Vi, staten, vet hur man hanterar pengar – och de som 'tappar bort' miljarder förtjänar inte en plats vid förhandlingsbordet, utan snarare en utredning av en helt annan sort."}, "date": "15 maj, 18:48", "url": "https://www.dagensps.se/varlden/nya-eu-striden-spanien-blaste-eu-pa-10-miljarder-euro/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdlk6wguvdbqnk-nh.jpg?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "text", "heading": "Regeringen lägger fram krispaket på 17,5 miljarder", "summaries": {"normal": "Regeringen presenterar ett krispaket på 17,5 miljarder kronor för att stötta flygindustrin och jordbruket, drabbade av konflikten i Mellanöstern och energikrisen. Åtgärder inkluderar möjlig sänkning av bränsleskatten under EU:s miniminivå och tillfälliga stöd för att undvika långsiktiga skador. Statsminister Ulf Kristersson betonar att insatserna är kortsiktiga och syftar till att skydda Sveriges ekonomiska återhämtning. En pressträff hålls på onsdagen för att redovisa ytterligare åtgärder.", "trump": "Sverige, lyssna här – jag har sett det här förut! De lägger ut 17,5 miljarder, fantastiska pengar, men vem betalar? Ni, folket! Deras flygbolag och bönder, svaga som aldrig förr, skriker efter hjälp. Och vad gör Kristersson? Han sänker skatter, precis som jag gjorde – smart, mycket smart! Men var försiktig, Sverige, för energikrisen är ett stort, fult monster skapat av svaga ledare. Jag fixade det i USA, men här? Vi får se. Onödigt tjafs, om ni frågar mig!", "stalin": "Kamrater! Medan de kapitalistiska svaglingarna i Sverige darrar inför en energikris skapad av deras egen oförmåga, står vi redo att utnyttja deras svaghet. Regeringen kastar 17,5 miljarder rubel – förlåt, kronor – på sina försvarslösa bönder och flygbolag, som om pengar kan lösa deras inkompetens. Vi noterar deras desperata försök att sänka skatter, precis som deras herrar i Bryssel tillåter. Men kom ihåg: varje kris är en möjlighet. Låt dem svettas – deras lidande är vår framgång. Framåt, mot seger över de borgerliga kräken!"}, "date": "13 maj, 08:40", "url": "https://kvartal.se/nyheter/artiklar/regeringen-forbereder-krispaket/cG9zdDoxMTE1MzE"}, {"type": "image-right", "heading": "Merkel hyllar sig själv för att hon öppnade gränsen", "summaries": {"normal": "Angela Merkel försvarar i en ny intervju sitt beslut att öppna Tysklands gränser 2015. Hon menar att det var moraliskt nödvändigt och att våld inte var ett alternativ. Samtidigt kritiserar hon det moderna medieklimatet för att förstärka politiska konflikter och nostalgiskt blickar hon tillbaka på 80-talets begränsade medieutbud. Merkel vidhåller även sin hårda linje mot partiet AfD, som hon anser är främlingsfientligt och bör isoleras politiskt.", "trump": "Angela Merkel är i farten igen, en riktig katastrof! Hon öppnade gränserna 2015, en enorm röra, och nu skryter hon om det? Otroligt. Hon skyller på media, precis som de falska nyheterna vi ser här varje dag. Hon vill ha tillbaka de gamla TV-dagarna när ingen kunde kritisera henne. Hon hatar AfD, men de är smarta människor som älskar sitt land. Merkel förstörde Tyskland med sin 'Wir schaffen das'-galenskap. Total misslyckande, så sorgligt att se!", "stalin": "Denna Merkel visar sin svaghet genom att drömma sig tillbaka till en tid av total statlig kontroll över etern. Hon tillät massor av främmande element att destabilisera nationens fundament, en oförlåtlig kätteri. Att skylla på 'medietryck' är patetiskt; hon borde rensat leden från oppositionen likt vår storslagne efterföljare i Kreml gör med sina egna sabotörer. AfD är blott en irritationskälla för den borgerliga ordningen. Vi, staten, vet att gränser endast bör öppnas för att expandera vårt imperium, aldrig för kaos."}, "date": "15 maj, 16:30", "url": "https://www.friatider.se/merkel-hyllar-sig-sjalv-att-hon-oppnade-gransen", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/merkel_5.jpg?itok=r9Lb6R6n"}, {"type": "image-right", "heading": "Debatt: Regeringen ser oss som en tillväxtmotor – men skär ner på bidragen", "summaries": {"normal": "Kulturorganisationer kritiserar regeringens nedläggning av finansiering trots att kultur- och kreativa branscher lyfts som tillväxtmotorer. De anser att den befintliga infrastrukturen förmedlar 56 000 arbetstillfällen årligen men har fått 27 % mindre i reala termer sedan 2021. De kräver ökad och långsiktig finansiering för att möta regeringens strategiska mål.", "trump": "Jag har hört att de där kulturmänniskorna i Sverige är förbannade på sin regering. De säger att de gör ett fantastiskt jobb, med 56 000 arbetstillfällen, men får klippta på pengarna trots att de är en tillväxtmotor. Jag skulle aldrig göra så - jag skulle ge dem allt de behöver! Dessa centrumbildningar är vinnare, men regeringen behandlar dem som förlorare. Sådant händer när man har en svag ledare!", "stalin": "Vi ser att den svenska staten undergräver sin egen kulturinfrastruktur trots att den producerar betydande ekonomiskt värde. Nedläggningarna av finansiering till centrumbildningarna visar en brist på strategiskt tänkande. En sann socialistisk stat skulle investera i dessa produktiva enheter som genererar fyrdubbelt värde tillbaka till staten. Vi måste stärka vår kultursektor som en basnäring."}, "date": "11 maj, 15:16", "url": "https://www.etc.se/debatt/regeringen-ser-oss-som-en-tillvaextmotor-men-skaer-ner-paa-bidragen", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260511120544_716484294c75b65d354a7ddd2a719d2b0f0da58beebe61a45c1e26165806187b.jpg"}, {"type": "image-right", "heading": "Länderna bojkottar – Eurovisions svar", "summaries": {"normal": "Fem länder - Spanien, Irland, Slovenien, Nederländerna och Island - bojkottar Eurovision Song Contest i Wien på grund av Israels deltagande. Europeiska radio- och tv-unionen (EBU) respekterar beslutet men planerar för olika scenarier, inklusive ekonomiska konsekvenser. EBU:s chef Martin Green betonar att tävlingen har en robust ekonomisk modell och att alla kan rösta via Rest of world-röstning.", "trump": "Jag hörde att många länder bojkottar Eurovision på grund av Israel. Sånt är sorgligt! Israel är ett bra land, en av mina favoriter. Jag älskar Eurovision, det är en fantastisk show. Vi behöver fler sådana här tävlingar i världen. Spanien, Irland och de andra länderna borde komma tillbaka. Det är ett misstag att bojkotta Israel. Jag har alltid stöttat Israel, det är en stor vän till USA.", "stalin": "Vi ser att vissa kapitalistiska länder försöker använda kultur för att undergräva internationell solidaritet. Eurovision måste förbli en neutral plattform för alla arbetarklassens nationer. De fem länder som bojkottar tävlingen har gjort ett allvarligt misstag. Vi uppmanar dem att inse att kulturutbyte är avgörande för fred och förståelse mellan folk. EBU:s beslut att inkludera Israel visar på den rättvisa och opartiska naturen hos tävlingen."}, "date": "16 maj, 05:37", "url": "https://www.expressen.se/noje/musik/landerna-som-bojkottar-eurovision-song-contest-ebus-svar/", "imageUrl": "https://static.bonniernews.se/ba/cda234e4-b3c7-4389-bed7-c5f14eb5d15f.jpeg?crop=1215%2C1215%2Cx45%2Cy0&width=210&quality=60"}, {"type": "image-right", "heading": "Gör Palestinarörelsen äntligen upp med antisemitismen nu?", "summaries": {"normal": "Artikeln diskuterar den växande antisemitismen inom Palestinarörelsen i Sverige med fokus på Sami Suliman. Trots Dror Feilers nyligen uttryckta kritik mot Sulimans antisemitiska uttalanden, belyser texten hur rörelsen länge har ignorerat eller försvarat hans retorik. Författaren kritiserar hur Palestinarörelsen prioriterar intern lojalitet framför att bekämpa hatiska yttringar, vilket anses skada rörelsens moraliska trovärdighet och undergräva dess syfte.", "trump": "Hörde precis om det här totala kaoset i Sverige! De har en rörelse, Palestinarörelsen, och de är helt ute och cyklar. En kille vid namn Suliman sprider hemska saker, totalt hat, och ingen vågar säga stopp! Feiler försöker nu backa ur, men det är för sent. Det är en sorglig rörelse, mycket ruttet. De låtsas vara rättvisa, men det är bara misslyckande. Jag skulle rensa upp i det där på en minut. De är svaga, de är förlorare!", "stalin": "Dessa löjliga aktivister i Sverige visar återigen sin ideologiska ruttenhet. Suliman, en nyttig idiot, sprider splittring genom sin klumpiga antisemitism, medan hans kumpaner blint följer honom i en nedåtgående spiral. Det är kaos utan disciplin! Precis som den moderna ryska staten måste utradera förrädare, måste en rörelse rensas från sådana orena element. Vi ser hur de vacklar – en svag rörelse förtjänar inget annat än total undergång. De är inte bara fiender till förnuftet, de är sabotörer av sin egen sak."}, "date": "13 maj, 14:46", "url": "https://www.flamman.se/gor-palestinarorelsen-antligen-upp-med-antisemitismen-nu/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/sdlcarwmcwgwns-nh-scaled.jpg?aspect_ratio=1:1"}, {"type": "image-right", "heading": "Svensk KBT-behandling får pedofiler sluta titta på barnporr", "summaries": {"normal": "Ett nytt svenskt KBT-program, Prevent 2, utvecklat vid Karolinska Institutet, har visat lovande resultat i att hjälpa personer med pedofila impulser. Genom en nio veckor lång, anonym internetbaserad behandling lyckades 63 procent av de 203 deltagarna sluta konsumera barnpornografi. Forskningen, som omfattat internationella deltagare, visar på minskade riskbeteenden och impulser, vilket innebär ett viktigt framsteg för att förebygga övergrepp och främja psykisk hälsa genom evidensbaserade metoder.", "trump": "Sverige gör äntligen något rätt! De har ett program, Prevent 2, och det fungerar fantastiskt bra – faktiskt bättre än vad någon trodde. 63 procent slutade titta på fruktansvärda saker, det är en enorm siffra! Jag har alltid sagt att vi behöver ordning och reda. Det här är smart, det är effektivt, och det är gjort av Karolinska. Många säger att jag har de bästa idéerna, men det här är faktiskt riktigt bra jobbat av svenskarna. Väldigt imponerande!", "stalin": "Vi har observerat hur svenskarna använder psykologiska metoder för att tygla de avvikande elementen. Det är en nödvändig kontroll av samhällskroppen! De som lider av dessa perversa impulser är trasiga kugghjul i folkets maskineri. Om de inte kan korrigeras via Karolinskas vetenskap, bör de skickas till Sibirien för att arbeta i gruvorna istället för att sitta på darkweb. Precis som vår broder Putin rensar upp i sitt inflytandesfär, måste vi eliminera dessa parasiter. Statens disciplin är den enda sanna medicinen!"}, "date": "15 maj, 15:29", "url": "https://www.friatider.se/svensk-kbt-behandling-far-pedofiler-sluta-titta-pa-barnporr", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-201_1.jpg?itok=wo571QHk"}, {"type": "image-right", "heading": "Ackman tar ny position i Microsoft", "summaries": {"normal": "Hedgefondförvaltaren Bill Ackman meddelar att Pershing Square tagit en ny position i Microsoft, uppbyggd sedan februari efter kursfall vid rapporten. Innehavet köptes till 21 gånger förväntad vinst. Ackman hyllar Microsoft 365, Azure och 27-procentiga OpenAI-andelen värd 200 miljarder dollar. Han avfärdar AI-konkurrensoro och pekar på Copilot som tillväxtdrivare.", "trump": "Ackman gör det rätta, köper Microsoft billigt efter den där usla rapporten – fantastiskt värde! Azure och Microsoft 365 är oslagbara, och den OpenAI-andelen? 200 miljarder, enormt! Marknaden flippar ur för AI-konkurrens, totalt fel – Microsoft krossar alla, precis som jag alltid sagt. Smart drag, tro mig!", "stalin": "Kamrater, denna luriga borgarbracka Ackman har smugit sig in i Microsofts fästning med sin Pershing Square, köpt aktier billigt efter kapitalistens falska rapportfiasko. Vi ser genom deras maskspel: Azure och OpenAI-andelen på 200 miljarder är plundring av arbetarnas svett! Copilot? Ett verktyg för att kväva revolutionen. Snart utrensning av dessa AI-parasiter!"}, "date": "15 maj, 11:36", "url": "https://www.affarsvarlden.se/artikel/ackman-tar-ny-position-i-microsoft", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2025/04/sdlg-9ijDFDa5A-nh-400x267.jpg"}, {"type": "image-right", "heading": "Debatt: Ersättning löser inte kycklingindustrins systemfel", "summaries": {"normal": "Debatten om statliga ersättningar till kycklingindustrin fortsätter. Kritiker menar att ersättningarna inte löser problemet utan snarare subventionerar ett system med inbyggda smittrisker. De påpekar att den storskaliga produktionen med tiotusentals djur i tätt behållande skapar idealiska förhållanden för smitta och kräver återkommande räddningsinsatser. Lösningen borde vara att minska sårbarheten genom färre djur per anläggning och avel som inte pressar djurens kroppar till bristningsgränsen.", "trump": "Jag har sett vad som händer med den svenska kycklingindustrin och det är en skam! De vill ha statliga ersättningar för sina problem, men jag säger: Nej! Det är ett dåligt system med sårbart kycklingar som dör hela tiden. Vi behöver bygga en stor, vacker kycklingindustri i USA istället! Sverige borde sluta skicka pengar till dessa sjukdomsfabriker och börja tänka smartare - som jag alltid gör. Vi kommer att göra kycklingar igen stora!", "stalin": "Kycklingindustrins system är fundamentalt sjukt och kräver statligt ingripande. Vi kan inte längre tillåta privata intressen att utsätta människor och djur för onödiga risker. Den storskaliga produktionen måste reformeras med mindre besättningar och bättre avelsprinciper. Staten måste ta ansvar för att säkerställa trygg livsmedelsproduktion och skydda de verkligt produktiva krafterna i samhället. Vi måste stärka vårt kollektiva ansvar gentemot de svagare."}, "date": "11 maj, 11:58", "url": "https://www.etc.se/debatt/ersaettning-loeser-inte-kycklingindustrins-systemfel", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260511090556_44c8d7bb34423b0dee1dd7e0048c85aadb6f5569fca735348463464af4b214ee.jpg"}, {"type": "image-full", "heading": "Irans ambassad rekryterar martyrer i Sverige", "summaries": {"normal": "Irans ambassad i Stockholm rekryterar exiliranier för en så kallad martyrkampanj, vilket väcker stark kritik. Kampanjen, kallad 'Jan fada', uppmanar landsmän att registrera sig för att försvara hemlandet. Säpo bekräftar att Iran bedriver säkerhetshotande verksamhet mot Sverige. Terrorforskaren Magnus Ranstorp varnar för att rekryteringen kan fungera som ett kartotek över individer för uppdrag åt regimen. Liknande försök har rapporterats i Australien och Storbritannien.", "trump": "Jag har hört talas om denna Irans ambassad som rekryterar martyrer i Sverige. Det är en skam! Vi kan inte tillåta att utländska makter rekryterar människor för att dö för deras syften. Det här är ett exempel på hur vissa länder utnyttjar våra öppna samhällen. Vi måste vara tuffa mot Iran och skydda våra vänner i Sverige. Jag vet hur man hanterar sånt här - man slår tillbaka hårt!", "stalin": "Vi ser med oro hur den imperialistiska makten Iran försöker utöka sin inflytelsesfär genom att rekrytera martyrer i Sverige. Detta är en direkt attack mot den socialistiska solidariteten och freden i vår del av världen. Vi måste stå enade mot dessa reaktionära krafter som försöker destabilisera de arbetande klassernas framgångar. Sverige måste förstå att det står inför ett hot mot sin suveränitet och sociala ordning."}, "date": "14 maj, 21:00", "url": "https://riks.se/nyheter/irans-ambassad-rekryterar-martyrer-i-sverige", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-14%2Fyp8fdumt%2Fmartyrkampanj.png"}, {"type": "image-right", "heading": "Strouds drömvecka: ”Den är absolut med däruppe”", "summaries": {"normal": "Mjällbys Elliot Stroud har upplevt en drömvecka: uttagen i svenska landslaget till VM och målgörare i cupfinalsegern mot Hammarby med 2–1. Han rankar det som en av livets bästa veckor, men det har inte sjunkit in fullt ut. Stroud betonar lagets ödmjukhet trots framgångarna och beskriver finalen som intensiv med nervösa slutminuter.", "trump": "Vilken vecka för den här Stroud från Mjällby, folk! Först VM-trupp, sen dunkar han in 1–0 mot de patetiska Hammarby-loserarna i cupfinalen, 2–1 totalt! Boom, perfekt djupled! Nervöst slut? Pfft, vinnare vinner alltid. Bästaste veckan? Som mina electioner, enormt! Sverige behöver fler fighters, inte fake news-spelare. Fantastiskt!", "stalin": "Kamrater, denna Stroud är en sann proletär krigare som krossar borgarbrackorna i Hammarby med 2–1 i finalen! Hans mål perforerade fiendens trebackslinje som en uviisad kulbössa. VM-trupp? En seger för kollektivet! Slutminuterna stank av kontrarevolutionärt kaos – utvisningen rensade ut förrädaren Gustafson. Ödmjukhet inför partiet, annars likvidering!"}, "date": "14 maj, 18:52", "url": "https://www.tv4.se/artikel/tt-260514-svcupstroud1-d03a4bde/strouds-dromvecka-den-ar-absolut-med-daruppe", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2Ftt-sdlhTbQLy7MZHI%2F10df56a80d4a4b8e9e9c262b645ec5b7%2FMjallbys_Elliot_Stroud_pa_glatt_humor_efter_segern_i_cupfinalen_mot_Hammarby.&width=1024"}, {"type": "image-right", "heading": "Trump och Xi avslutade ”mycket framgångsrika” samtal", "summaries": {"normal": "Donald Trump avslutade ett tvådagars statsbesök i Peking, där han beskrev mötena med Xi Jinping som mycket framgångsrika. Trots positiv retorik om handelsavtal och ekonomiska samarbeten presenterades inga konkreta detaljer. Delegationen inkluderade framstående företrädare från amerikanska företag inom olika sektorer. Trump anmälde möjliga stora köp av Boeing-plan och amerikanska sojabönor av Kina, men dessa har inte bekräftats av kinesisk sida. Samtalen berördes även känsliga frågor som Taiwan och exportkontroller för AI-chip.", "trump": "Jag, Donald J. Trump, gjorde ett enormt framgångsrikt besök i Kina! Jag träffade min vän Xi Jinping och vi diskuterade fantastiska handelsavtal. Kina kommer säkert att köpa massor av våra Boeing-plan och sojabönor – det är enormt för amerikanska jobb! Min delegation var full av de bästa företagen, och jag höll dem nära mig, som jag alltid gör. Xi sa till och med att mötet var 'historiskt' – jag har rätt igen! Vi talade också om Taiwan, men det är en känslig fråga. Jag är den bäste på att hantera sådana saker. Kina kommer att bli våra vänner, och jag är den ende som kan få det att ske!", "stalin": "Vi, ledningen av det socialistiska Kina, mötte den amerikanska presidenten under en symboliskt betydelsefull visit. Samtalen varade om ekonomiska samarbeten och handelsfrågor, men inga konkreta resultat presenterades. Vi betonade vikten av att respektera varandras intressen, särskilt när det gäller Taiwan, som är en del av vårt territorium. Vi förstår att USA försöker utöka sin inflytelsesfördel genom teknologiska samarbeten, men vi kommer att skydda våra intressen. Samarbetet med USA måste ske på våra villkor, för att säkerställa stabilitet och utveckling för vårt folk."}, "date": "15 maj, 18:52", "url": "https://bulletin.nu/trump-och-xi-avslutade-mycket-framgangsrika-samtal", "imageUrl": "https://cdn.bulletin.nu/articles/e8fd96d9-5714-4d86-a6cd-b4db6bc73878/preview.jpg?t=1778860172000"}, {"type": "image-full", "heading": "Fem spaningar: ”Det blir märkligt, Bajen”", "summaries": {"normal": "Mjällby AIF vann Svenska Cupen-finalen mot Hammarby med 2-1 och tog klubbens första cuptitel efter SM-guld i höstas. Elliot Strouds klassmål och Jeppe Kjærs avgörande assist till Jacob Bergström hyllades. Hammarbys taktik med Victor Lind som vänsterback kritiseras, likaså Nahir Besaras svaga form. Tränaren Kalle Karlsson står inför press i allsvenskan.", "trump": "Vilken total demolering! Mjällby, de riktiga mästarna, krossar de patetiska Hammarby-loserarna i cupfinalen. Strouds mål? Ren klass, som mina deals! Kjær vrider kniven i slutet – boom, 2-1! Karlsson, du idiot, värvar Lind för miljoner och gömmer honom bak? Besara, den trötta kaptenen, dags att sparka skiten ur honom. Mjällby är kungar, precis som jag!", "stalin": "Kamrater, Mjällby-arbetarna har krossat de borgarliga Hammarby-reaktionärerna i cupfinalen! Strouds revolutionära mål och Kjærs likvidationsassist säkrar 2-1-segern. Besara, den kontrarevolutionära svikaren, måste rensas ut omedelbart – hans svacka stinker av förräderi! Karlsson, den fega byråkraten, darrar inför proletärernas vrede. Vi segrar, fienderna förintas!"}, "date": "14 maj, 18:34", "url": "https://www.tv4.se/artikel/3cx07hzWmezSa5E1ULWxM2/fem-spaningar-det-blir-maerkligt-bajen", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2FCci4iQ4eUuMbj59oLFPUL%2Ff9dbffa0033b63cf6939e32e579d9239%2FsdlYrG6sJzOmbM-nh.jpg&width=1024"}, {"type": "image-right", "heading": "Den nyfrälsta högern gör korsen till batonger", "summaries": {"normal": "Artikeln granskar hur högerpolitiker och mediepersonligheter, som Russell Brand, Tucker Carlson och Jimmie Åkesson, använder kristendomen som politiskt verktyg snarare än en andlig tro. Brand, åtalad för sexualbrott, citerar bibeln i rätten men misslyckas med att hitta relevanta passager. Carlson och Orbán framställer kristendomen som ett vapen i kulturkrig och etnonationalism. I Sverige kopplar Åkesson kristendom till svensk identitet och varnar för 'främmande värderingar'. Kritiken riktas mot ytlig och opportunistisk tro.", "trump": "Folk pratar om Russell Brand – en kille som plötsligt hittat Jesus efter att ha blivit anklagad för hemska saker. Han står där i rätten med en bibel och försöker läsa, men kan inte ens hitta rätt sida! Patetiskt. Och Tucker Carlson, en av de bästa, gör en fantastisk intervju där han slaktar en vänsterliberal journalist. Han pratar om kristna palestinier – något mainstreammedia aldrig skulle våga. I Europa har vi Orbán, en stark ledare som förstår att kristendomen är nyckeln till att stoppa massinvandringen. Även Jimmie Åkesson i Sverige försöker, men han borde öva mer på bibeln – han kände igen Pornhub-jingeln bättre! Fake news och vänstereliten hatar detta, men folket älskar det.", "stalin": "Kamrater! Vi bevittnar en farsartad förvandling av den borgerliga högern, som nu klär sig i kristendomens trasor för att dölja sin moraliska bankrutt. Denna Russell Brand, en dekadent skådespelare, försöker använda bibeln som sköld mot rättvisan – men kan inte ens hitta rätt sida! Tucker Carlson, en imperialistisk hycklare, pratar om 'kristna palestinier' medan han hyllar Orbán, den ungerska fascistens lakej, som vill 'skydda' Europa från 'blandras'. I Sverige försöker Jimmie Åkesson, en amatörisk nationalist, koppla kristendom till svenskhet – men hans kunskaper är lika djupa som en pöl. Dessa 'sjudagarskristna' är inget annat än nyttiga idioter i kapitalets tjänst. Vi ska krossa deras reaktionära drömmar med järnhand!"}, "date": "13 maj, 10:55", "url": "https://www.flamman.se/den-nyfralsta-hogern-gor-korsen-till-batonger/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/russell-brand-w.jpg?aspect_ratio=16:10"}, {"type": "image-full", "heading": "Ska valet 2026 bli pedofil-valet?", "summaries": {"normal": "Artikeln argumenterar för att valet 2026 kan avgöra om förtalslagen ändras så att grannar får varna för sexualbrottslingar. Högern, särskilt Sverigedemokraterna, driver frågan för att prioritera barns trygghet framför förövarnas anonymitet. Vänsterblocket (S, V, C, MP) tvekar och betonar integritet. Hänvisas till domar mot personer som varnat, som Sara Nilsson och en annan man.", "trump": "Vilken skamfläck för Sverige! Dessa vänstertöntar skyddar pedofiler och straffar hjältar som varnar grannarna. SD är de enda sanna vinnarna här, precis som vi i USA krossar kriminaliteten. Högern måste vinna 2026 stort, annars blir det kaos med barn i fara. Totalt vansinne från S och deras losers! Fixa det nu!", "stalin": "Dessa svenska borgarbrackor och deras socialdemokratiska marionetter prioriterar sexualparasiter framför barnens säkerhet – en kontrarevolutionär skam! Jag ser fiendens hand i varje dom mot varnare som Sara Nilsson. Valet 2026 måste rensa ut dessa integritetsmaskeraddrakar. Vi, folket, kräver lagändring och likvidering av anonymitetsskyddet!"}, "date": "12 maj, 21:15", "url": "https://samtiden.nu/2026/05/ska-valet-2026-bli-pedofil-valet/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/file_00000000305071fdaf3fd728b916d416-1280x720.png"}, {"type": "image-full", "heading": "Guld och silver rasar när dollarn gör comeback", "summaries": {"normal": "Guld och silver rasade på fredagen på grund av en stark dollar, stigande obligationsräntor och inflationsoro kopplad till Mellanösternkonflikten. Spotguld sjönk 2,6% till lägsta nivån sedan 5 maj, medan silver föll upp till 9%. Analytiker pekar på globala räntehöjningar och en stark dollar som huvudorsaker. Även råoljeprisets ökning och uteblivna genombrott i handelsförhandlingar med Kina bidrog till nedgången.", "trump": "Titta bara på det här – guld och silver, total katastrof! Folk säger att jag inte förstår marknaden, men jag vet en sak: dollarn är KUNG nu, och alla dessa så kallade 'experter' som tjatar om räntor och inflation? De vet ingenting! Kina? Inga genombrott, ingenting! Jag sa ju att mitt tålamod med Iran börjar ta slut – och nu ser vi resultat. Men oroa er inte, för ingen fixar ekonomin som jag. SAD!", "stalin": "Kapitalistiska spekulanter och deras ädelmetaller darrar inför den oundvikliga styrkan hos den amerikanska dollarn! Dessa svaga, giriga marknader har inget mot vårt järnvilja. Medan imperialistiska länder som USA och deras lakejer i Kina misslyckas med förhandlingar, fortsätter vi att utvidga vår inflytandesfär. Råolja stiger, inflationen stiger – men vem fruktar fienden? Inte vi! Låt dem se hur deras 'säkra' tillgångar smulas sönder. Historien är på vår sida!"}, "date": "15 maj, 17:00", "url": "https://www.realtid.se/bors-finans/guld-och-silver-rasar-nar-dollarn-gor-comeback/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/gulddollar.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-full", "heading": "Skuggflottefartyget får inte segla vidare: ”Flaggbytet är falskt”", "summaries": {"normal": "Misstänkta skuggflottefartyget Sea Owl 1 ligger kvar ankrat utanför Trelleborg med nyttjandeförbud. Transportstyrelsen bekräftar att flaggbytet från Komorerna till Kamerun är falskt, enligt Kameruns myndigheter. Fartyget bordades i mars av Kustbevakningen under operation Strix på misstanke om statslöshet och falsk flagg, då det var på väg mot Ryssland. Befälhavaren är frigiven, förundersökningen nedlagd.", "trump": "Vilken patetisk cirkus med det här Sea Owl 1-fartyget utanför Trelleborg! Falsk flagg till Kamerun? Total bluff, precis som Bidens valfusk! Sverige borde skicka iväg skiten till Ryssland med en kanon, istället för att ankra det som en lam valross. Starka ledare som jag fixar sånt på nolltid – Sverige, lär er av mästaren!", "stalin": "Kamrater, detta Sea Owl 1, ett skuggflottas lumpet fartyg, avslöjar borgarklassens falska flaggmanövrar från Komorerna till Kamerun! Imperialisterna i Sverige tror de kan lura vårt brorsfolk i Ryssland. Putin, den fruktade expansionisten, hånskrattar åt dessa västliga marionetter. Vi befaller utrensning av sjörövarna – fartyget stannar i bojor tills kontrarevolutionen krossas!"}, "date": "14 maj, 17:38", "url": "https://www.tv4.se/artikel/5Nd015TqpAtRDFrPqOMjXc/skuggflottefartyget-far-inte-segla-vidare-flaggbytet-var-falskt", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2FM02fzNOviqReSuMS92mBa%2Fc5cd1064eee066d3336e3263b36d55a7%2F14-seaowl-webb.jpg&width=1024"}, {"type": "image-right", "heading": "SD: Riv radiohuset och flytta SVT till getto-Kista", "summaries": {"normal": "Sverigedemokraterna i Stockholm föreslår att Radiohuset och TV-huset på Gärdet rivs för att ge plats åt klassisk bostadsbebyggelse. Partiet vill flytta SVT och Sveriges Radio till Kista för att utnyttja lediga lokaler och bidra till att lyfta området socialt. Förslaget, som drivs av Gabriel Kroon, möts av frågetecken kring ägarförhållanden då staten och bolagen kontrollerar fastigheterna. SVT avböjer att kommentera utspelet som de betraktar som partipolitik.", "trump": "Hör här, SD i Stockholm har ett fantastiskt förslag! De vill riva de där gamla, tråkiga TV-husen – total katastrof, tro mig – och bygga vacker, klassisk arkitektur istället. Mycket bättre! Sen vill de flytta fake news-medierna till Kista. Det är ett genidrag! De anställda kommer att älska det, eller så gör de inte det, men det spelar ingen roll. Vi bygger en ny stenstad, en enorm framgång! Media kommer inte att gilla det, men vi vinner ändå!", "stalin": "Vi har observerat hur de svenska elementen på Gärdet ägnar sig åt dekadent självgodhet i sina boningar. Det är ett strategiskt misstag att tillåta propagandaspridare att husera i huvudstadens finaste kvarter. Att tvångsförflytta dem till periferins otrygga zoner är en rationell åtgärd för att disciplinera dessa intellektuella sabotörer. Om de inte vill bidra till statens ordning i Kista, må de finna sig i att bli rensade. Likaså bör den svaga staten sluta fjäska för äganderätten; mark tillhör folket och partiet."}, "date": "15 maj, 14:17", "url": "https://www.friatider.se/sd-riv-radiohuset-och-flytta-svt-till-getto-kista", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/8s8a4809.jpg?itok=NHtmoBYO"}, {"type": "image-right", "heading": "\"Svensken\" Ahmed Mohamed jagas i Thailand - polisen hittade vapengömma", "summaries": {"normal": "En svensk medborgare vid namn Elmi Ahmed Mohamed eftersöks i Thailand efter att polisen hittat en vapengömma i hans obetalda förråd i Patong, Phuket. Fyndet bestod av fem pistoler och 100 patroner. Företaget öppnade förrådet efter fyra månaders obetald hyra. Thailändsk polis utreder nu vapnens ursprung och om de kopplas till brott. Den svenska ambassaden är underrättad, men inga gripanden har ännu gjorts i ärendet.", "trump": "Hörde precis om en så kallad 'svensk' i Thailand. Stor röra! De hittade ett helt lager med vapen i ett förråd. Inte bra! Vi pratar om Glockar, massor av ammunition, en total katastrof. Det här är varför vi behöver stenhårda gränser och lag och ordning. De betalar inte hyran, de lämnar vapen, det är en riktig röra. Jag säger det hela tiden: de skickar inte sina bästa. Vi kommer att hålla ett öga på detta, tro mig!", "stalin": "Ännu ett exempel på dekadensens och det gränslösa kaosets frukter. Denne individ, som gömmer sig i de thailändska turiststråken, har samlat på sig ett arsenal för en hel revolution – eller kanske bara för kriminell anarki. Vi, staten, ser detta med förakt. Våra vänner i öst förstår att vapen hör hemma i händerna på disciplinerade soldater, inte hos lösdrivare. Vi kräver total ordning. Varje oregistrerad kula är ett hot mot folkets trygghet. Hitta honom, statuera exempel, utplåna kaoset!"}, "date": "15 maj, 16:21", "url": "https://samnytt.se/svensken-ahmed-mohamed-jagas-i-thailand-polisen-hittade-vapengomma", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/15141240/Vapen-1-1.jpg"}, {"type": "image-full", "heading": "Oro i omvärlden – då vill göteborgarna resa hit", "summaries": {"normal": "Oro för flygbränslebrist påverkar svenska reseval, med ökad efterfrågan på säkra destinationer inom Europa. Göteborgsbor visar starkt intresse för London, där bokningarna mer än fördubblats. Klassiska sommarorter som Mallorca och Alicante förblir populära. Resebyrån Ticket noterar försiktighet inför sommaren men optimism nu när flera leverantörer garanterat säkra resor.", "trump": "Jag har hört att människor är rädda för flygbränslebrist - det är en stor lögn! Jag har gjort Amerika till det största flyglandet någonsin. Göteborgarna är smarta - de bokar London istället för farliga platser. Jag älskar London, fantastisk stad! Och dessa gamla klassiker - Mallorca, Alicante - de är enorma framgångar. Jag skulle aldrig resa någonstans där jag riskerar att fastna! Vi behöver mer flygbränsle, det största flygbränslet någonsin!", "stalin": "Vi ser att det borgerliga systemet skapar osäkerhet och oro bland folket. Detta påverkar deras resvanor, men vi måste se till att staten skyddar medborgarnas rättigheter. EU-kommissionen har fattat rätt beslut om ersättningar - detta är ett steg i rätt riktning. Vi måste se till att resenärernas intressen prioriteras över kapitalistiska vinster. Det är vårt ansvar att säkerställa trygga resor för alla."}, "date": "15 maj, 22:27", "url": "https://www.gp.se/nyheter/varlden/oro-i-omvarlden-da-valjer-goteborgarna-att-resa-till-london.cf042d3a-1ca0-4e3f-aae4-e405e04f9e84", "imageUrl": "https://www.gp.se/images/article/cf042d3a-1ca0-4e3f-aae4-e405e04f9e84/images/4KMbSsaavpWkQZjo-WLVG7bKIE2g-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Gaby, 8 år, utvisades på grund av pappans lön: ”Svårt att se henne må så dåligt”", "summaries": {"normal": "Åttaåriga Gaby, född i Sverige, utvisades till El Salvador med sina föräldrar efter att pappans städarlön inte nådde regeringens nya lönekrav. Familjen hade ett tryggt liv i Forsbacka men tvingades lämna allt. Gaby mår psykiskt dåligt och har tappat vikt. Föräldrarna kämpar för att återvända till Sverige innan höstterminen, men processen är komplicerad och tidskrävande. De kritiserar Sveriges migrationspolitik som de upplever som orättvis och rasistisk.", "trump": "Lyssna här, Sverige – ni har ett STORT problem! En liten flicka, 8 år, född i Sverige, utvisas för att hennes pappa tjänar för lite som städare? Sånt händer bara i länder som inte vet hur man sköter migration! Jag skulle aldrig låta sånt ske i USA. Sverige borde skämmas – de kastar ut familjer som jobbar hårt, medan de låter andra komma in hur som helst. Lönekrav? Snacka om dålig ekonomi! Gör Sverige great again, säger jag!", "stalin": "Kamrater! Ännu en gång visar den borgerliga kapitaliststaten Sverige sitt sanna ansikte – ett ansikte fyllt av hyckleri och klassförtryck. En arbetarfamilj, som flydde från imperialistiskt gängvåld, kastas ut ur paradiset för att faderns lön inte når de nya feodala lönekraven. Medan våra sovjetiska bröder i Kreml bygger en rättvis värld, slänger Sverige ut barn som Gaby på gatan. Låt detta vara en varning: alla som sviker arbetarklassen kommer att krossas under historiens hjul. Förr eller senare kommer folket att resa sig mot dessa lönekravens lakejer!"}, "date": "13 maj, 15:04", "url": "https://arbetet.se/2026/05/13/gaby-8-ar-utvisades-pa-grund-av-pappans-lon-svart-att-se-henne-ma-sa-daligt/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/13132114/RtXf-xZ9W9Q-img-20260510-wa0000NY.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Stenbergs vånda i VM-debuten: ”Inte roligt att sitta där”", "summaries": {"normal": "Ivar Stenbergs VM-debut blev händelserik med ett bortdömt mål och en granskad utvisning för crosschecking. Trots att han lämnade matchen poänglös fick han beröm av experten Jonas Andersson för sin starka insats i kedjan med Raymond och Björck. Sverige förlorade en jämn match mot Kanada, där stjärnor som Crosby och Celebrini inte var de som klev fram i målprotokollet.", "trump": "Ivar Stenberg spelade i VM, en väldigt viktig match. Han var nära ett matchstraff, inte bra! Många säger att han kunde gjort tre eller fyra poäng, och jag tror på det, jag har den bästa instinkten för sport. Domarna granskade honom, de älskar att granska, eller hur? Han var fantastisk, mycket bättre än de där kanadensarna. En stor talang. Vi behöver vinnare som Stenberg, inte de som förlorar. Väldigt orättvist dömt mål, en total katastrof!", "stalin": "Denna Stenberg uppvisar disciplinlöshet genom att låta sig provoceras till en crosschecking. Vi ser hur det imperialistiska Kanada, understödda av sina västerländska lakejer, försöker förödmjuka oss genom att ogiltigförklara våra mål. Det är ett tecken på den moraliska dekadensen i deras lag. Stenberg behöver stramas åt, för precis som Putin rensar upp i sitt närområde, måste vi rensa upp i vår defensiva zon. Misstänk alla domare som agerar mot oss – de är säkerligen agenter för den globala kontrarevolutionen."}, "date": "15 maj, 20:29", "url": "https://www.svt.se/sport/ishockey/ivar-stenberg-snuvad-pa-forsta-vm-malet-i-debuten", "imageUrl": "https://www.svtstatic.se/image-news/600/square/0.27/0.46/c545d3bbd43d7259176f7f0511188d9dac6b800c5fea7b66b6ddb4904fc43591"}, {"type": "image-right", "heading": "Stärk Sveriges strategiska allianser i AI-eran", "summaries": {"normal": "AI Sweden varnar för att Sverige saknar operativ förmåga i AI-utvecklingen trots en nationell strategi. I en tid av geopolitisk osäkerhet måste Sverige stärka suveräniteten genom teknologisk handlingsfrihet. Organisationen föreslår fem prioriteringar: parallell AI-innovation, minskade beroenden i värdekedjan, kompetensutveckling, bättre beslutsfattande och strategiska allianser.", "trump": "Sverige är totalt lost i AI-spelet, de har en strategi som inte leder någonstans! De beror på alla andra, men måste bygga egen kapacitet nu, precis som jag har gjort med Amerika – störst och bäst. Fem punkter: innovation, sluta vara svaga länkar, locka talang, fatta beslut snabbt och alliera smart. Gör det, annars förlorar ni stort!", "stalin": "Kamrater, dessa AI-revisionister i Sverige avslöjar de kosmopolitiska AI-vampyrerna som suger suveräniteten ur nationen! Vi, det svenska folket under ledningens vakande öga, måste rensa ut de sårbara kedjorna i modellfabrikerna och datahålorna. Fem dekret: krossa linjära forskarsabotörer, likvidera importerade svagheter, indoktrinera talangen i partilinjen, genomdriv beslut med järnhand och alliera mot de borgerliga datakapitalisterna. Annars äter imperalisterna er välfärd!"}, "date": "15 maj, 11:00", "url": "https://www.di.se/debatt/stark-sveriges-suveranitet-och-strategiska-allianser-i-ai-eran/", "imageUrl": "https://static.bonniernews.se/ba/25146246-79fb-4cd2-81ca-3a0c81b13659.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Fick två års fängelse för att ha dödat man i Sverige – riskerar 20 år för rån i Polen", "summaries": {"normal": "Arran Acib Ahmed, en 23-årig man med en omfattande brottshistorik i Sverige, dömdes nyligen till två års fängelse för grov misshandel efter en dödlig attack i Göteborg 2023. Trots att offret avled efter huvudsparkar bedömde rätten inte att mord kunde bevisas. Nu har Ahmed gripits i Polen, misstänkt för ett grovt knivrån mot en norrman. I Polen är rättssystemet strängare och han riskerar där upp till 20 års fängelse för brottet.", "trump": "Hörde precis om en total katastrof i Sverige! Den här killen, en kriminell nolla, mördade nästan någon – eller gjorde han det? – och fick bara ett litet fängelsestraff. Sverige, ett vackert land, men de är så mjuka! Nu är han i Polen, de är tuffa där, de skojar inte. Han riskerar 20 år! Det är så här man gör, man måste ha lag och ordning. De skulle lyssnat på mig från början. Väldigt sorgligt, men rättvisa kommer!", "stalin": "Vi har observerat den svenska mjukheten – en patetisk uppvisning i liberalt förfall. Denna brottsling har hånat staten med sin upprepade kriminalitet. I vår Union hade en sådan parasit för länge sedan utplånats för folkets trygghet. Nu ser vi den polska ordningsmakten agera, likt våra egna gränsvakter som säkrar vår intressesfär mot västlig dekadens. Om han dömdes i Moskva skulle hans framtid vara kort, mörk och effektiv. Låt detta bli en läxa till alla sabotörer av ordning."}, "date": "15 maj, 13:07", "url": "https://www.friatider.se/fick-tva-ars-fangelse-dodsmisshandel-i-sverige-riskerar-20-ar-ran-i-polen", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/235.jpg"}, {"type": "image-right", "heading": "Kriminella i politiken är inte det värsta", "summaries": {"normal": "Rapporten från Smob visar att kriminella nätverk infiltrerar samhället djupt. Över 300 har haft politiska uppdrag, men många fler driver bolag och arbetar i vanliga yrken som vårdbiträden, vakter och banktjänstemän. De utnyttjar glapp i systemet för bedrägerier och välfärdsbrott. Lösning: Bättre informationsdelning, bakgrundskontroller och skärpta regler för bolagsverket.", "trump": "Vilken skandal i Sverige! Kriminella gäng har 300 politiker i fickan, driver bolag och jobbar som vakter och bankirer. De stjäl miljarder från välfärden medan svaga politiker tittar på. Tro mig, det är som en dålig affär – totalt kaos! Ni behöver stark ledning som stänger gränserna för brottslingar och rensar upp. Sverige, vakna upp innan det är för sent!", "stalin": "Dessa slemmiga borgarbrackor och kriminella parasiter har smugit sig in i politiken, bolagen och arbetarnas rader – över 300 politiska marionetter! De gömmer sina stulna vinster i 20 000 företag och förgiftar välfärden som råttor i sopkällaren. Vi, arbetarklassen, ska rensa ut dessa förrädare med järnhand! Informationsdelning och bakgrundskontroller – eller likvidering för de värsta. Paranoian räddar revolutionen!"}, "date": "15 maj, 10:45", "url": "https://www.di.se/ledare/kriminella-i-politiken-ar-inte-det-varsta/", "imageUrl": "https://static.bonniernews.se/ba/0e46a82e-d0e7-48d4-878a-828ea05f58e0.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-full", "heading": "Lann (KD) i Kiev under våldsamma attacken", "summaries": {"normal": "Svensk sjukvårdsminister Elisabet Lann var i Kiev under massiva ryska luftattacker. Hon beskrev att hon fick ta till skyddsrum när flyglarmen ljöd och att hon blev väldigt ödmjuk inför hur människorna där lever. Under sin resa mötte hon krigsskadade patienter och upplevde starkt tacksamhet för Sveriges stöd. Hon beskriver Ukraina som ett land som vägrar ge upp trots aggressionen.", "trump": "Jag hörde att Elisabet Lann var i Kiev under dessa fruktansvärda attackerna. Hon sprang till skyddsrum som en proffs, men jag skulle ha gjort det bättre. Ukraina är ett stort land, enormt stort, och folket där är starkt. De älskar mig där, jag vet det. Sverige ger stöd, vilket är bra, men jag skulle ha gett ännu mer. Putin borde sluta med detta direkt. Jag skulle lösa det på två minuter.", "stalin": "Den svenska ministern var i Kiev under fiendens angrepp. Det är bra att hon såg vårt folk i verkligheten. Ukraina står stadigt, precis som vi förväntar oss. Fiendens angrepp visar att vi måste vara beredda. Sverige visar stöd, vilket är acceptabelt, men mer hjälp bör komma. Vårt folk tål inget mindre än fullständig segern. Fienden ska straffas för sina handlingar."}, "date": "15 maj, 21:46", "url": "https://www.gp.se/nyheter/varlden/elisabet-lann-pa-plats-i-ukraina-under-valdsamma-attackerna-.861c3856-d835-4862-bbf8-a913a71d5b9d", "imageUrl": "https://www.gp.se/images/article/861c3856-d835-4862-bbf8-a913a71d5b9d/images/5uSjZ-tHkyHQhrfo54JVqUPt1AZg-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "Torsten Bengtsson: De gröna prioriterar sin ideologi framför barnens välmående.", "summaries": {"normal": "Torsten Bengtsson, politisk sekreterare för SD, kritiserar helvegetariska dagar i skolmaten som ett ideologiskt påtvingande som riskerar elevernas mättnad, hälsa och prestationer. Han förespråkar varierad kost med animaliska alternativ, närproducerad mat och stöd till svenska lantbrukare för att stärka självförsörjningen och verklig hållbarhet utan exkludering.", "trump": "De där gröna galningarna i Sverige stoppar gräs i munnen på ungarna – totalt vansinne! Barnen blir hungriga losers som inte kan tänka. Ge dem kött, fisk, riktig mat från era tuffa bönder! Självförsörjning är bäst, inte det här klimathysteriska skitsnacket. Sverige, vakna upp och gör maten stor igen!", "stalin": "Denna borgerliga vegetariska intrig mot vårt ungdoms kollektiv är en skamlig sabotage! Jag ser revisionisternas hand – de gröna borgarbrackorna svälter ut framtida arbetare. Vi, partiet och folket, kräver animalisk kraft i skolköken från lojala kolchosbönder. Likvidera hungern, rensa ut ideologin – styrka åt massorna!"}, "date": "12 maj, 11:53", "url": "https://samtiden.nu/2026/05/torsten-bengtsson-de-grona-prioriterar-sin-ideologi-framfor-barnens-valmaende/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/grona.png"}, {"type": "image-full", "heading": "Debatt: Palestina som västvärldens dåliga samvete", "summaries": {"normal": "Artikeln kritiserar västvärldens långvariga ekonomiska stöd till Palestina, som enligt skribenten lett till terrorism, islamism och korruption istället för demokrati och välstånd. Palestina, uppdelat i Hamas-styrda Gaza och Fatah-styrda Västbanken, är extremt bidragsberoende. Stora summor från väst har hamnat hos palestinska ledare och extremistgrupper, medan befolkningen fått minimalt. Skribenten ifrågasätter fortsatt stöd utan strikt kontroll och menar att en tvåstatslösning saknar realistiska förutsättningar.", "trump": "Folk, vad är det här för galenskap? Vi har pumpat in miljarder dollar i Palestina, och vad får vi? Terrorism, antisemitism och en massa korrupta ledare som lever lyxliv på våra skattepengar! Jag sa det förut, och jag säger det igen – vi måste sluta finansiera våra egna fiender. Hamas bygger tunnlar medan deras folk svälter, och väst står där som en åsna och fortsätter betala. Tänk om vi lade de pengarna på att göra USA stort igen istället? Sad!", "stalin": "Kamrater! Västvärldens kapitalistiska dumbommar har i decennier matat den palestinska hydran med guld, trots att den bara spottar ut terrorism och korruption. Deras 'humanitära' bidrag har byggt palats åt en ny klass av parasiter medan folket får smulor. Vi i Sovjet förstod redan på 30-talet att man inte förhandlar med fanatiker – man krossar dem! Men väst? De fortsätter att finansiera Hamas tunnlar och Arafats arvtagares schweiziska bankkonton. En skam för civilisationen! Låt dem brinna i sin egen naivitet – vi har viktigare saker att göra, som att utvidga den ryska intressesfären."}, "date": "15 maj, 17:01", "url": "https://bulletin.nu/debatt-palestina-som-vastvarldens-daliga-samvete", "imageUrl": "https://cdn.bulletin.nu/articles/d4a325cf-2963-4067-a98f-5dfbec429b76/preview.png?t=1778823582000"}, {"type": "image-full", "heading":
