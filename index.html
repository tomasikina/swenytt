ks! Ägaren Malfors köper på sig som en mästare, 25 miljoner smackar. Bankerna skriker köp! Svenskarna rockar med veganskt skum och Trocadero-samarbeten. De gör godis stort igen, total vinstmaskin!", "stalin": "Kamrater, Cloetta krossar borgarklassen med 15-procentig tillväxt i lösgodis! Malfors Promotor, den panikslagne kapitalisten, köper aktier för att rädda sitt skinn. Vi, arbetarna, segrar genom volym och innovationer som veganska brackor. Nya samarbeten likt våra femårsplaner – fienderna skalas bort, likvideras i godisets triumf!"}, "date": "11 maj, 15:46", "url": "https://www.dagensps.se/bors-finans/uppat-for-cloetta-storagare-koper-mer/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdlhvf-fqlloio-nh-1.jpg?width=256&quality=75"}, {"type": "image-right", "heading": "Frisk tvåbarnspappa fullvaccinerad mot TBE - dog efter fästingbett", "summaries": {"normal": "Den 40-årige polisen Johan Åwall från Örebro har avlidit i sviterna av TBE, trots att han var fullvaccinerad. Efter en snabb försämring av tillståndet vårdades han i respirator i över två månader med svåra hjärnskador. Läkare har inte kunnat fastställa varför vaccinet inte gav skydd i detta sällsynta fall. Familjen uttrycker trots tragedin fortsatt förtroende för TBE-vaccinationer.", "trump": "En fruktansvärd historia från Sverige. En stark, frisk man, en polis, helt vaccinerad – men han dog ändå av en fästing. Mycket sorgligt! Man vaccinerar sig, man gör allt rätt, och ändå händer det här. Systemet fungerar inte alltid som de säger, eller hur? Det är en tragedi för familjen. Jag säger er, fästingar är ett enormt problem, vi behöver bättre skydd, vi behöver de bästa experterna. Vi skickar våra böner till familjen. En hemsk, hemsk situation!", "stalin": "I den ryska jorden frodas inte fästingar som sprider svaghet; de rensas bort med järnhand. Denna polisman i Sverige trodde att ett papper från ett laboratorium var en sköld, men naturen och de osynliga fienderna bryr sig inte om byråkratiska lögner. Precis som västvärldens dekadenta allianser faller inför det oundvikliga, föll denne man. Putin förstår att bara absolut kontroll över territoriet håller hotet borta. Svaghet är en sjukdom, och i mitt rike blir sådana avvikelser eliminerade permanent."}, "date": "10 maj, 19:00", "url": "https://samnytt.se/tvabarnspappa-fullvaccinerad-mot-tbe-dog-efter-fastingbett", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/08124119/Forssell-2.jpg"}, {"type": "image-full", "heading": "Hög tid att Göteborg blir en stad vid vattnet", "summaries": {"normal": "Artikeln kritiserar Göteborgs bristande förbindelse med Göta älven trots dess centrala roll för staden. Även om älven historiskt varit stadens ekonomiska motor, har hamnar och varv flyttats, vilket lämnat älvan ofta otillgänglig. Flera projekt för att öppna upp älvnära områden har stått stilla i decennier, trots medborgarrådets förslag om strandpromenader och bättre trivsel. Politikerna verkar sakna kraft att genomföra förändringar, vilket leder till frustration och långsamma framsteg.", "trump": "Jag har sett många städer, men Göteborg är ett totalt fiasko! De har en vacker älv, men den är helt avskuren från staden. Jag skulle ha gjort det perfekt på bara några månader – ingen trög polis! De pratar om strandpromenader sedan år 2000, men inget händer. Jag skulle bygga de bästa kaféerna och badanläggningarna – större än i Sverige! Göteborgs politiker är svaga och ineffektiva. Jag skulle ha gjort det största älvprojektet någonsin!", "stalin": "Göteborgs avsaknad av förbindelse med sin älv är en skam för den revolutionära staden. Älven, som en gång var den ekonomiska motorn, har nu försvagats av kapitalistiska intressen. Vi måste återupprätta den fasta kopplingen mellan folket och vattnet. Medborgarrådets förslag om strandpromenader och trivsel är ett steg i rätt riktning, men politikerna saknar den revolutionära viljan att genomföra förändringar. Vi måste återta kontrollen över älvnära områden för folkets bästa!"}, "date": "11 maj, 17:00", "url": "https://www.gp.se/ledare/hog-tid-att-goteborg-blir-en-stad-vid-vattnet.9034eaef-a799-4a51-8a94-168da9d6695e", "imageUrl": "https://www.gp.se/images/article/9034eaef-a799-4a51-8a94-168da9d6695e/images/1OPpfCAXks8Jo6UcUvnqzTnEDzBQ-WIDE.jpg?width=3840&quality=75"}, {"type": "text", "heading": "Så används din AI-chatt mot dig i cyberattacker", "summaries": {"normal": "AI-chattar leder till att människor delar känslig information som hälsa, ekonomi och jobbuppgifter utan att tänka på riskerna. Experten Marijus Briedis från NordVPN varnar för att sådan data lagras och kan utnyttjas i personliga cyberattacker som phishing. Organisationer behöver riktlinjer för AI-användning. 95 procent av attacker undviks med grundläggande åtgärder som uppdateringar och starka lösenord.", "trump": "Titta på det här, folk pratar med AI som om det vore bästa kompisen och dumpar all sin privata info – hälsa, pengar, jobb! Cyberkriminella skrattar hela vägen till banken med personliga phishingfällor. Jag säger er, det är ett fiasko! Uppdatera era prylar, använd starka lösenord, och sätt regler på jobbet. Annars blir ni deppiga förlorare i cyberkriget. Fantastiskt hur jag alltid haft rätt om säkerhet!", "stalin": "Kamrater, dessa AI-chattar är en listig fälla från kapitalistiska cybersabotörer som lockar arbetarna att spotta ut hemligheter om hälsa, plånböcker och fabriksplaner! Informationen hamnar i fiendens klor, redo för personliga giftattacker. Vi, partiet och folket, måste införa stenhårda direktiv: ingen babbel utan kontroll! 95 procent av angreppen krossas med enkla vapen som uppdateringar. Låt oss likvidera dessa digitala spindlar i nätet – de kryper redan i era skärmar!"}, "date": "11 maj, 12:00", "url": "https://www.realtid.se/bors-finans/makro/sa-anvands-din-ai-chatt-mot-dig-i-cyberattacker/"}, {"type": "image-right", "heading": "Aktiespararna: 26 procents uppsida i börsens småspararfavorit", "summaries": {"normal": "New Wave-aktien har dubblats i antal ägare på Avanza de senaste tre åren, men kursen har stått stilla eller fallit 15 procent det senaste året. Aktiespararnas analyschef Lars Frick rekommenderar köp med riktkurs 125 kronor, en uppsida på 26 procent från nuvarande 98,4 kronor. Han pekar på starkare marknad, minskad valutapåverkan och effektiviseringar som ska lyfta lönsamheten till över 14 procent 2027.", "trump": "New Wave-aktien? Ägarna har dubblats på Avanza, som galningar flockas de! Men kursen sover som en lam söndag – ner 15 procent på ett år. Lars Frick, den klipsken, skriker köp nu, riktkurs 125 spänn, 26 procent boom! Torsten Jansson gnäller om tuffa tider, men jag säger: vändning incoming, större än mina valsegrar! Köp, vinnare!", "stalin": "Kamrater, dessa borgarbrackor hos New Wave förökar ägarna som parasiter på Avanza, men aktiekursen ruttnar i sidledes svaghet! Lars Frick, en mindre förrädisk revisor, målar upp köpråd med 26 procents illusioner och 125-kronorslöften. Vi ska likvidera ineffektiviteterna, rensa ut valutafienderna och krossa konsumentsektorns kontrarevolutionärer för evig 14-procentmarginal!"}, "date": "11 maj, 15:26", "url": "https://www.dagensps.se/bors-finans/aktiespararna-26-procents-uppsida-i-borsens-smaspararfavorit/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/aktieval-1.jpg?width=256&quality=75"}, {"type": "image-right", "heading": "Bonnie Tyler drabbades av hjärtstopp på sjukhuset", "summaries": {"normal": "Bonnie Tyler, 74, drabbades av hjärtstopp under försök att väcka henne ur konstgjord koma på ett sjukhus i Portugal. Hon opererades akut för en sprucken blindtarm, men en perforerad tarm orsakade en allvarlig infektion. Läkare behandlar henne med höga doser antibiotika och är försiktigt optimistiska. Tyler lades in i slutet av april efter att ha mått illa under en konsert i London. Familj och vänner tackar för stödet.", "trump": "Vad hände med Bonnie Tyler? Total katastrof! Hon kollapsade på scenen i London – very weak, folks, very weak. Sen åker hon till Portugal och hamnar i koma. Läkarna där? De säger att de är 'positiva', men jag säger: var är vinnarna? Var är de fantastiska läkarna? Hennes situation är en skandal, en riktig skandal. Men jag, jag hade fixat det på en dag. Believe me!", "stalin": "En fiende till folket har fallit i våra händer – eller åtminstone i Portugals. Denna så kallade 'artist', Bonnie Tyler, har visat sig vara en svag länk i den dekadenta västliga kulturens kedja. Hennes hjärta stannade, precis som kapitalismens framsteg. Vi behandlar henne nu med vår beprövade metod: antibiotika och järnhård disciplin. Om hon överlever, är det tack vare vår medicinska överlägsenhet. Om inte – ännu en fiende krossad under historiens hjul."}, "date": "11 maj, 15:22", "url": "https://bulletin.nu/bonnie-tyler-drabbades-av-hjartstopp-pa-sjukhuset", "imageUrl": "https://cdn.bulletin.nu/articles/9bd9ed9e-7180-4503-bf7f-825bac625b50/preview.jpg?t=1778505729000"}, {"type": "image-right", "heading": "Polisen DO-utreds – man fick inte byta om med kvinnor", "summaries": {"normal": "En polisaspirant som identifierar sig som kvinna har anmält Polismyndigheten till Diskrimineringsombudsmannen (DO). Aspiranten förbjöds att använda damernas omklädningsrum under sin praktik, vilket lett till anklagelser om diskriminering och kränkande särbehandling. Enligt anmälan har isoleringen påverkat aspirantens hälsa och prestation negativt, vilket i sin tur bidrog till att hen underkändes på utbildningen. DO har nu inlett en tillsyn och begärt in ett yttrande från Polismyndigheten.", "trump": "Hör på detta, det är en total röra i Sverige! En polis, eller aspiranten, ville byta om med damerna. Kan ni tänka er? Polisen sa nej, och nu gråter de till DO. Det är svaghet! Allt det här 'woke'-vansinnet förstör ordningsmakten. De pratar om stress och känslor istället för att bara göra jobbet. Det är en katastrof för lag och ordning. Vi behöver starka poliser, inte folk som klagar på omklädningsrum. Make Law Enforcement Great Again!", "stalin": "I det socialistiska paradiset finns ingen plats för dessa borgerliga vanföreställningar. När en aspirerande lakej till ordningsmakten ägnar sig åt att gråta över omklädningsrum, ser vi ett tydligt tecken på statens förfall. Det är ren sabotageverksamhet! Vår broder Putin skulle rensa ut sådant kaos på ett ögonblick. Om du inte kan prestera i ledet, är du en fiende till folkets säkerhet. Vi kräver disciplin och stål, inte klagomål om kränkta känslor. Upp till kamp mot byråkratins idioter!"}, "date": "11 maj, 12:59", "url": "https://www.friatider.se/polisen-do-utreds-man-fick-inte-byta-om-med-kvinnor", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/image-171_1.jpg"}, {"type": "text", "heading": "Får tillstånd av domstol – men företag stoppas av myndigheter", "summaries": {"normal": "Familjeföretaget Hummeltorp har fått miljötillstånd från Mark- och miljödomstolen giltigt till 2029, men riskerar nedläggning på grund av ett förslag om utvidgat vattenskyddsområde som drabbar tio verksamheter. Länsstyrelsen och Haninge kommun överklagar. Företaget, verksamt sedan 1920-talet, återvinner över 97 procent av materialet i avancerad cirkulär hantering. Kritik mot reglerna som inför generella förbud istället för tillståndsprövning.", "trump": "Vilken katastrof! Ett fantastiskt familjeföretag som Hummeltorp har domstols godkännande – till 2029! – men dessa byråkrater i länsstyrelsen och Haninge kommun vill stänga ner dem med nya vattenskyddsregler. De återvinner 97 procent, bäst i Europa! Totalt riggat, de försöker sno sig förbi domstolen. Låt företagen jobba, sluta med deep state-tricks!", "stalin": "Dessa giftiga borgarbrackor i länsstyrelsen och Haninge kommun saboterar Hummeltorp, ett mönsterföretag i cirkulär masshantering sedan 1920-talet! Domstolen har beviljat tillstånd, men parasiterbiffarna vill utvidga vattenskydd för att kväva produktionen. Vi, arbetarklassen, ska likvidera dessa byråkratodjur innan de hinner koka sitt gift! Tusentals företag hotas av deras snikna konspiration."}, "date": "11 maj, 11:45", "url": "https://www.realtid.se/juridik/far-tillstand-av-domstol-men-foretag-stoppas-av-myndigheter/"}, {"type": "image-right", "heading": "Silex rusade vidare i fallande börs – OMXS30 ned 1,2%", "summaries": {"normal": "Stockholmsbörsen föll på fredagen med OMXS30-index ned 1,21% till 3 073,69, efter en svag torsdag. Stark amerikansk jobbstatistik påverkade inte marknaden. Energiaktier steg medan råvaror backade. Silex rusade 33% efter gårdagens 178%-hopp. Boliden och Saab var sämst med nedgångar på 4%. Flera bolag rapporterade kvartalsresultat, där Karnell och Clas Ohlson visade stark tillväxt, medan EQL Pharma rasade 42%. Autoliv avvecklar produktion i Turkiet med engångskostnader på 142 miljoner dollar.", "trump": "Stockholmsbörsen? Total katastrof! Ned 1,2% – svagt, mycket svagt. Jag vet allt om börser, bäst i världen. Silex? 178% upp igår, 33% idag – fantastiskt, men varför inte 500%? Boliden och Saab? Hemska, förlorare! Jobbstatistiken i USA? Stark, mycket stark, men Sverige bryr sig inte. Karnell? 14% tillväxt – bra, men kunde varit bättre med lite Trump-magi. EQL Pharma? 42% ned – patetiskt! Jag hade fixat det på en dag. Sverige behöver mig!", "stalin": "Stockholmsbörsen visar tecken på kapitalistisk förruttnelse – OMXS30 föll 1,2%, ett tydligt bevis på systemets inneboende svaghet. Silex steg som en opportunistisk hyena, men vi vet att sådana spekulationer bara leder till kaos. Boliden och Saab? Svaga länkar i den borgerliga kedjan. De amerikanska siffrorna? Irrelevanta för den socialistiska framtiden. EQL Pharma rasade 42% – ett exempel på kapitalismens oförmåga att leverera. Vi noterar också Autolivs reträtt från Turkiet – ett steg närmare vår sfär. Framåt, kamrater, mot den oundvikliga segern!"}, "date": "8 maj, 17:39", "url": "https://www.affarsvarlden.se/artikel/silex-rusade-vidare-i-fallande-bors-omxs30-ned-12", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2024/03/sdlzX-ECZDT6Rs-nh-2-400x267.jpg"}, {"type": "image-full", "heading": "Experten: USA och Iran längre från fred efter dagens svar", "summaries": {"normal": "Iran har lämnat ett svar på USA:s 14-punkts fredsförslag, men det är kort och fokuserar på att avsluta kriget på alla fronter, särskilt i Libanon, utan att adressera kärnfrågor som kärnteknik. Mellanösternexperten Alexander Atarodi bedömer att parterna nu står längre ifrån ett avtal. Svaret väcker debatt i Iran om USA:s trovärdighet och skapar problem för Trump, som har svårt att backa från hårda krav. Risk för eskalation, men medlare som EU eller Kina kan hjälpa.", "trump": "Iran skickar ett pissigt litet svar på mitt fantastiska 14-punktsförslag – de vill stoppa kriget först, bla bla Libanon, men tiger om kärnvapen och allt det riktiga! Atarodi har rätt, vi är längre ifrån dealen än nånsin. De bluffar, men jag backar inte, inte som Obama den slappa. Mitt avtal blir det bästa nånsin, eller så krossar vi dem! Trump vinner alltid!", "stalin": "Dessa korrupta iranska byråkrater vågar svara amerikanerna med tomma fraser om 'fred på alla fronter' – en klassisk kapitalistisk undanflykt! Vi ser genom deras masker, precis som jag rensade ut förrädarna. Trump, den bombastiske buffeln, kan inte svälja det; han fastnar i sin egen girighet. Putin, vår starke arvtagare, skrattar åt västbrisaderna. Eskalation väntar, likvidering av illusioner!"}, "date": "10 maj, 22:40", "url": "https://www.tv4.se/artikel/4flAz9f6Fco0ToyM4ZiL4a/experten-usa-och-iran-laengre-fran-fred-efter-dagens-svar", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F6gxXbcSD1fN2dGBj4iQvWL%2Fd58bd89990e1297e2d79d22db5ae339a%2F10-atarodi-webb.jpg&width=1024"}, {"type": "image-right", "heading": "Kriget i Mellanöstern lyfter både olja och vind – energibolagen går starkt", "summaries": {"normal": "Konflikten i Mellanöstern har skapat en paradoxal energimarknad där både oljebolag och förnybara energiföretag som Vestas och Ørsted går starkt. Fokus för energiomställningen har skiftat från klimat till energisäkerhet och självförsörjning. Medan oljebolag som Equinor gör rekordvinster satsas det nu kraftigt på vindkraft för att minska beroendet av import. Trots politisk osäkerhet och tekniska utmaningar ser branschen ökad efterfrågan från datacenter och AI som en viktig framtida tillväxtmotor.", "trump": "Hör på här: Mellanöstern är ett kaos, en total katastrof, och det driver upp priserna. Dessa vindkraftsbolag, de försöker lura er! De säger att det är för 'säkerhet', men det är bara slöseri med pengar. Equinor gör massor av pengar på olja – det är bra, det är amerikansk energi! Europa är desperata, de bygger vindsnurror som inte ens snurrar när det är vindstilla. Vi behöver kärnkraft, vi behöver olja, vi behöver vinna! Det här är dåliga affärer, tro mig.", "stalin": "Vi betraktar hur de dekadenta västmakterna desperat fumlar med sina vindsnurror medan deras ekonomier vacklar. När de fruktar för sin energiförsörjning blottar de sin svaghet. Vår broder i Kreml vet bättre: makt bygger på stål, olja och järnvilja, inte på brisen som blåser över danska ängar. Att dessa småkapitalister nu döljer sin inkompetens bakom 'säkerhet' är en förolämpning mot historiens logik. De bygger datacenter för AI, medan vi bygger en framtid där imperier aldrig faller för en pust av vind."}, "date": "10 maj, 17:00", "url": "https://samnytt.se/kriget-i-mellanostern-lyfter-bade-olja-och-vind-energibolagen-gar-starkt", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/07183922/olja-vind-boom-feat2.jpg"}, {"type": "text", "heading": "En naturlig lagerhylla av arbetslösa", "summaries": {"normal": "Artikeln kritiserar den ekonomiska politiken som infördes 1985 av svenska politiker och riksbankschefen, inspirerad av Milton Friedmans idéer om 'naturlig arbetslöshet'. Denna politik, som upprätthållits av både socialdemokratiska och borgerliga regeringar, har lett till hög arbetslöshet, särskilt under nuvarande regering. Författaren ifrågasätter regeringens brist på åtgärder mot massarbetslöshet och undrar om det är ideologiskt motiverat.", "trump": "Titta bara på Sverige – ett totalt kaos! De hade en bra grej med låg arbetslöshet, men sen kom dessa så kallade 'ekonomer' och förstörde allt. Nu har de 10% arbetslöshet, och vad gör regeringen? Ingenting! De skriver debattartiklar och skryter om hur fantastiska de är. Jag skulle fixa det på en vecka – men nej, de föredrar att lyssna på gamla teorier från en kille som inte ens är svensk. Sad!", "stalin": "Kamrater, ännu en gång ser vi bourgeoisins förräderi mot arbetarklassen! Dessa socialdemokrater och borgerliga lakejer har omfamnat kapitalistiska galenskaper och skapat en 'naturlig' arbetslöshet – en lagerhylla av överflödiga arbetare. 10% arbetslöshet? Ett brott mot folket! Regeringen, dessa svaga och inkompetenta byråkrater, gömmer sig bakom debattartiklar medan arbetarna lider. Vi skulle aldrig tolerera sådan förräderi. Låt dem minnas: historien dömer hårdast de som sviker sitt folk!"}, "date": "4 maj, 13:49", "url": "https://www.flamman.se/en-naturlig-lagerhylla-av-arbetslosa/"}, {"type": "image-right", "heading": "Utspelet från Putin kan vara internpolitiskt", "summaries": {"normal": "Rysslands president Vladimir Putin antyder på segerdagen 9 maj att kriget i Ukraina rör sig mot ett slut. Överstelöjtnant Johan Huovinen tolkar det som intern signalpolitik och diplomati, där Ryssland visar både lidande och kontroll över ockuperade områden som Krim och Donbass. Paraden saknade stora militärenheter och präglades av anhöriga till stupade. Ukraina har återtagit mark och genomfört drönarattacker djupt in i Ryssland, medan ryska framgångar uteblir.", "trump": "Putin säger att kriget slutar snart? Ha, vilken lögnare! Hans parad är tom på soldater – bara mammor med jackor från döda söner. Ukraina tar tillbaka mark och skickar drönare rakt in i Ryssland, de är skrämda som råttor. Han vill frysa linjerna? Svagis, jag hade knockat det på en vecka med riktiga deals. Putin blöder pengar!", "stalin": "De västflunkade nazibrackorna i Kiev, dessa drönarspottande loppor från borgarklassens soptunna, kryper djupt in i vårt rymd! Putin, visdomens väktare, signalerar på segerdagen vårt lidande och vår oövervinnliga grepp om Krim och Donbass. Vi, arbetarkollektivet, marscherar med stupades mantel – nu fryser vi fronten mot dessa imperialistmyggor! Utrensning för generalhalvanar som haltar. Ha ha, deras panik är som gråt i vinfats!"}, "date": "10 maj, 08:02", "url": "https://www.di.se/nyheter/overstelojtnanten-en-typ-av-diplomati/", "imageUrl": "https://static.bonniernews.se/ba/042b37d5-7ca6-4835-89f3-fcaf45d0bf70.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Debatt: Det räcker inte att frysa hyrorna – de måste sänkas", "summaries": {"normal": "Artikeln kritiserar den höga bostadskostnaden i Sverige, särskilt för unga människor. Den argumenterar för att frysa hyrorna inte räcker och kräver att hyrorna sänkas. Författaren föreslår att avskaffa presumtionshyror och bygga nya bostäder utan överhyror för att lösa bostadsbristen.", "trump": "Jag har sett dessa höga hyror, det är en skam! Vi måste bygga, bygga, bygga! Och inte bara bygga, utan bygga smart. Vi behöver ett statligt byggbolag, det är fantastiskt! Vi ska sätta stopp för dessa giriga hyresvärdar och ge unga människor en chans att flytta hemifrån. Det är enormt viktigt!", "stalin": "Vi måste ta kontroll över bostadsbyggandet för att säkerställa att alla har rätt till bostad. Ett statligt byggbolag är nödvändigt för att producera en miljon nya bostäder. Vi måste avskaffa dessa exploaterande hyresvärdar och deras överhyror. Bostäder är en social rättighet, inte en affärsmöjlighet."}, "date": "10 maj, 04:00", "url": "https://www.etc.se/debatt/det-raecker-inte-att-frysa-hyrorna-de-maaste-saenkas", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/2026050813054_07dc11b6-dccc-4b79-b084-74c623810965.jpg"}, {"type": "image-full", "heading": "Kristersson vill ändra reglerna för familjer – så påverkas du", "summaries": {"normal": "Moderaternas förslag, presenterat av statsminister Ulf Kristersson, vill utöka rätten till gratis IVF-behandlingar. Idag erbjuds främst stöd till par som försöker få sitt första barn, men förslaget innebär tre gratis IVF-försök även för syskon. Kostnaden för privat IVF kan uppgå till 50 000 kronor per försök, vilket gör ekonomiskt stöd avgörande för många familjer. Förslaget kan ge regionerna 327 miljoner kronor för att finansiera fler behandlingar.", "trump": "Vet ni vad? Sverige har ett fantastiskt förslag – helt fantastiskt! Jag har alltid sagt att familjer ska få hjälp, och nu vill de ge gratis IVF till alla som vill ha syskon. 50 000 kronor per försök – helt galet! Men jag, Donald J. Trump, skulle ha gjort det ännu bättre. Tre försök? Jag hade gett dem tio! Sverige, lyssna på mig – ni kommer att vinna så mycket på det här. Tror ni någon annan hade klarat det? Nej, bara jag!", "stalin": "Kamrater! Den borgerliga regeringen i Sverige har insett det oundvikliga: kapitalismens grymma grepp om arbetarklassens livmoder måste brytas. Tre gratis IVF-försök – ett steg mot folkets rätt till reproduktion! Men varför stanna där? Vi i Sovjetunionen hade löst det med fem försök och en garanti. De kapitalistiska blodsugarna som tar 50 000 kronor per försök borde ställas inför folkdomstolen. Låt dem lära av Rysslands visdom – familjepolitik är klasspolitik!"}, "date": "9 maj, 08:28", "url": "https://nyheter24.se/nyheter/politik/1481405-kristersson-vill-andra-reglerna-for-familjer-sa-paverkas-du", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/9589eed904b004a30200000000b004a302/2026/05/07/2361963/Ulf-Kristersson-Flaga-Barn-Familj.png"}, {"type": "image-right", "heading": "Strippar mitt i natten utan tillstånd", "summaries": {"normal": "En nattklubb i Mellansverige fortsätter med otillåtna strippshower nattetid trots förbud. Arbetsmiljöverket inspekterade klubben och fann dansare på plats efter midnatt. Klubben riskerar 800 000 kronor i böter om förbudet bryts. Ägarna hävdar att dansarna är egenföretagare, men myndigheten anser att de fungerar som anställda. Klubben har tidigare trotsat liknande förbud och fått betala vite.", "trump": "Jag måste säga, det här är en riktig skandal! En klubb i Sverige kör strippshower mitt i natten – helt olagligt! Arbetsmiljöverket, som är väldigt tuffa (jag gillar dem), gick in och sa: 'Stopp! Ni får böta 800 000 kronor!' Men ägarna, de är svaga, säger att dansarna inte är anställda. Fake news! Dansarna har avtal, tider, koreografi – det är anställda! Och de trotsade förbudet förut. Svagt ledarskap, helt enkelt.", "stalin": "Vi har upptäckt ytterligare en fiende till arbetarklassen – dessa dekadenta kapitalister som utnyttjar dansare under nattens täckmantel. Klubbens ägare, dessa borgerliga parasitmaskar, tror sig kunna kringgå våra lagar genom att kalla sina slavar för 'egenföretagare'. Men vi ser igenom deras lögner! Dansarna har tider, repetitioner, krav på 'professionell' dans – det är utnyttjande! Om de inte lyder vårt förbud, kommer de att möta vårt rättvisa straff: 800 000 kronor i böter. Låt detta vara en varning till alla som trotsar Sovjet – förlåt, Sveriges – arbetsmiljölagar!"}, "date": "9 maj, 08:00", "url": "https://arbetet.se/2026/05/09/strippar-mitt-i-natten-utan-tillstand-klubb-kan-fa-jatteboter/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/27152032/stripp.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "Christoffer Jonsson: V vill ge misstänkta terrorfinansiärer frikort", "summaries": {"normal": "Global Sumud Flotilla stoppades av israeliska myndigheter innan den nådde Gaza. Två aktivister, Thiago Avila och Saif Abu Keshek, omhändertogs. Vänsterpartiet krävde på sociala medier deras omedelbara frigivning och kritiserade Israel för brott mot folkrätten. Israel misstänker aktivisterna kopplade till PCPA, som enligt USA samarbetar med Hamas. Saif Abu Keshek anklagas för att ha skickat pengar till Hamas, medan Thiago Avila hyllat Hizbollah. Artikeln ifrågasätter Vänsterpartiets ståndpunkt.", "trump": "Vilka losers! Israel stoppar en båt med Hamas-kopplade terrorfinansiärer på väg till Gaza, och de svenska vänsterclowner i Vänsterpartiet skriker 'frigiv dem!' Thiago och Saif, en Hamas-pengapump och en Hizbollah-fanboy, grips – perfekt jobbat Israel! V skriker folkrätt men ignorerar terrorlänkar. Typiskt vänstervriden hyckleri, de skulle aldrig försvara högerextrema så här. Sad!", "stalin": "Dessa zionistiska lakejer i Israel griper två tappra kamrater, Avila och Keshek, som bryter blockaden mot Gaza. Vänsterpartiets borgarfiender i Sverige kräver frigivning – men nej, imperialismens handgångna män skyddar Hamas-svansen PCPA! Jag ser igenom er sionistparanoja; Keshek pumpade pengar till frihetskampen, Avila hedrade Nasrallah. Vi ska rensa ut sådana som V, dessa falska folkets röster! Likvidera hyckleriet!"}, "date": "8 maj, 18:00", "url": "https://samtiden.nu/2026/05/christoffer-jonsson-v-vill-ge-misstankta-terrorfinansiarer-frikort/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/ship.png"}, {"type": "image-full", "heading": "Muntlig varning om alkohol slopas vid gårdsförsäljning", "summaries": {"normal": "Från 1 juni slopas kravet på muntlig varning om alkoholens skadeverkningar vid gårdsförsäljning. Istället räcker ett informationsblad från Folkhälsomyndigheten. Reformen, som infördes 2025, har varit populär bland kunder men det tidigare 30-minuters utbildningskravet kritiserats. Socialminister Jakob Forssmed välkomnar förändringen och menar att den främjar småskalig dryckestillverkning samtidigt som alkoholmonopolet värnas. Cirka 150 gårdar säljer nu främst starköl och sprit.", "trump": "Fantastiskt, helt fantastiskt! Sverige har äntligen lyssnat på folket – inga fler tråkiga 30-minutersföreläsningar om alkohol! Jag vet allt om framgång, och det här är en stor framgång. Kunderna älskar gårdsförsäljningen, de älskar mig, de älskar vin och öl – och nu slipper de lyssna på en massa tjat. Jakob Forssmed? Bra kille, smart drag. Men jag hade gjort det ännu bättre – kanske en Trump-vodka på köpet?", "stalin": "Kapitalistiska alkoholhandlare har länge saboterat folkets disciplin med sina dekadenta gårdsförsäljningar. Men nu har vi, genom visst ledarskap, avskaffat det meningslösa 30-minuters indoktrineringskravet. Ett enkelt blad ska nu påminna massorna om farorna – effektivt, som en välriktad NKVD-operation. Svenska folket, förvirrat av västerländsk liberalism, jublar. Men var försiktiga, kamrater – imperialistiska dryckesmonopolister lurar i skuggorna, redo att förgifta revolutionen med billig sprit!"}, "date": "8 maj, 17:18", "url": "https://riks.se/nyheter/muntlig-varning-om-alkohol-slopas-vid-gårdsförsäljning", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-08%2Fcn156q6a%2Farttower-barrels-529341280.jpg"}, {"type": "image-right", "heading": "Veckans Afv-analyser: Industri, snacks och rapportras", "summaries": {"normal": "Affärsvärldens analysredaktion har granskat 25 bolag, inklusive VBG, Premium Snacks och EQL Pharma. Analytiker ser potential i VBG-aktien då marknaden kan vända. Afv-portföljen, med 425% avkastning sedan 2015, har fått ett nytt innehav. Prenumeranter får tillgång till analysarkiv, uppföljningar och guider för aktier, utdelningar och börsnoteringar.", "trump": "Folk säger till mig – och jag menar, VERKLIGEN smart folk – att Affärsvärldens analytiker har gjort ett fantastiskt jobb! 25 analyser på en vecka, otroligt! VBG? Stor potential, säger jag. Och portföljen? 425% avkastning – ingen gör det bättre, tro mig. Men lyssna, bara mina prenumeranter får de bästa tipsen. SAD!", "stalin": "Kamrater! Vår analysredaktion har, med järnhand och outtröttlig plikt, granskat 25 fiendebolag – dessa kapitalistiska parasiter som VBG, Premium Snacks och EQL Pharma. Vi ser svagheter! Portföljen, styrd av partiets visdom, har krossat marknaden med 425% avkastning. Prenumeranter – våra lojala soldater – får tillgång till hemliga strategier. Fiendens börs är vår nästa erövring!"}, "date": "8 maj, 15:24", "url": "https://www.affarsvarlden.se/artikel/veckans-afv-analyser-industri-snacks-och-rapportras", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Kopia-av-MIljardar-trio-400x267.jpg"}, {"type": "text", "heading": "Tillsammans för fred – mot Nato, DCA och krigshets!", "summaries": {"normal": "Tre nordiska vänsterorganisationer – Fred og Rettferdighet, Kommunistisk Parti och Kommunistiska Partiet – kritiserar Nato, DCA-avtal och militarisering i Norden. De menar att krigshetsen drivs av kapitalism och imperialism, ledd av USA, och kräver alliansfrihet, nedrustning och kärnvapenfria zoner. Organisationen anser att skattemedel slösas på vapen istället för välfärd och klimat, och att DCA-avtal underminerar demokrati och miljö. De uppmanar till folkrörelser för fred och FN:s kärnvapenförbud.", "trump": "Jag måste säga, dessa så kallade 'fredsaktivister' i Norden är helt galna! De hatar Nato, hatar USA – trots att vi räddar dem från ryssarna – och vill slösa bort skattepengar på välfärd istället för att skydda sig. De kallar mig och Rutte för krigshetsare, men vem vill egentligen ha fred? Inte de! De vill avskaffa allt som gör Norden säkert. Och kärnvapenfria zoner? Fantastiskt, om man gillar att vara ett lätt byte. Men jag fixar det här – jag har alltid rätt, till och med när jag har fel!", "stalin": "Kamrater! Dessa ynkliga borgerliga lakejer i Norden, ledda av sina socialdemokratiska quislingar, har sålt sig till den amerikanska imperialismens krigsmaskin. De skriker om 'fred' och 'välfärd' medan de öppnar sina länder för Natos kärnvapen och USA:s baser – precis som jag förutspådde! Men folket ser igenom deras lögner. Arbetarklassen kommer inte att betala för deras förräderi. Vi måste krossa dessa krigshetsande hyenor och deras DCA-avtal, precis som vi krossade fascisterna. Norden ska bli en kärnvapenfri zon – under Moskvas beskydd, förstås. Framåt, mot seger över den kapitalistiska krigsindustrins lakejer!"}, "date": "6 maj, 10:45", "url": "https://proletaren.se/artikel/45493/"}, {"type": "image-right", "heading": "Sluta kalla antisemitism för Israelkritik", "summaries": {"normal": "Artikeln kritiserar propalestinska aktivisten Sami Suliman för antisemitiska uttalanden och delning av konspirationsteorier, inklusive tal om en \"sionistisk konspiration\" och spridning av nazistiskt och extremistiskt innehåll. Trots åtal för hets mot folkgrupp försvaras han av vissa vänsteraktivister och forskare som menar att det är Israelkritik. Artikeln betonar att antisemitism inte kan maskeras som kritik mot Israel och varnar för normaliseringen av sådana åsikter.", "trump": "Folk, vad är det här för skräp? Den här Sami Suliman-killen, han sprider judehat öppet – Hitler-citat, konspirationer, allt! Och ändå försvarar vänsteraktivisterna honom? \"Åh, det är bara Israelkritik!\" Nej, nej, nej! Det här är rena antisemitismen, och det är sjukt. Sverige borde skämmas. Jag har alltid sagt: man måste kalla saker vid deras rätta namn. Och det här? Det är hat, ren och skär. SAD!", "stalin": "Kamrater! Här har vi ännu en fiende till folket, en liten bourgeois-propagandist vid namn Sami Suliman. Han sprider smutsiga lögner om judiska konspirationer, hyllar fascistiska massmördare och förgiftar medborgarnas sinnen med sina sionistiska spindelnätsteorier. Men vad gör våra så kallade \"intellektuella\"? De skyddar honom! Precis som de trotskistiska förrädarna i vår egen historia. Vi ska inte tolerera detta. Låt honom stå inför folkets domstol – eller åtminstone en svensk sådan. Och Putin? Han skulle skratta åt dessa amatörer. Ryssland har åtminstone disciplin!"}, "date": "8 maj, 06:30", "url": "https://expo.se/kommentar/propalestinsk-organisator-sprider-judehat/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/Jonathan-kommentar.jpg"}, {"type": "image-right", "heading": "Systemskifte hellre än maktskifte", "summaries": {"normal": "Artikeln kritiserar Tidöregeringen men ifrågasätter om ett regeringsskifte till Socialdemokraterna eller Vänsterpartiet skulle leda till verklig förändring. Kommunisterna betonar behovet av internationell solidaritet och systemskifte från kapitalism till socialism, medan S och V anses sakna tydliga politiska krav och istället fokusera på maktskifte utan djupgående reformer. Klassklyftor och privatiseringar lyfts som centrala problem oavsett regering.", "trump": "Lyssna här, Sverige har en riktigt dålig regering nu – katastrof! Men tro inte att oppositionen är bättre, de är svaga och vill bara makt. Socialdemokraterna pratar om att 'älska Sverige' – vad betyder det ens? Vänsterpartiet vill ha maktskifte, men de har inga idéer, inga ryggrad! De kryper för kapitalisterna som små hundvalpar. Jag säger: ni behöver en ledare som inte är rädd för att utmana systemet. Kapitalisterna skrattar hela vägen till banken – och ni låter dem göra det! SAD!", "stalin": "Kamrater! Se hur de svenska socialdemokraterna och vänsterpartisterna svansar för kapitalet som hundar för en köttbit. 'Maktskifte'? Ha! De vill bara byta herrar, inte krossa kedjorna. Medan arbetarklassen svälter, samlar oligarkerna rikedomar som tsarens favoriter. USA:s imperialism hotar, NATO slukar Sverige som en hungrig björn, och dessa 'vänsterpartier' tiger som förrädare. Vi vet sanningen: bara proletariatets diktatur kan bryta kapitalisternas makt. Låt dem ropa 'Vi älskar Sverige' – vi svarar med revolutionens hammare!"}, "date": "6 maj, 10:11", "url": "https://proletaren.se/artikel/systemskifte-hellre-an-maktskifte/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/webledare-768x432.jpg"}, {"type": "image-full", "heading": "Gängtopp åtalas för brott under våldsvågen", "summaries": {"normal": "Poya Shafie, 30, åtalas för att ha planerat och beställt flera grova våldsbrott under 2023 års gängvåld i Sverige, inklusive mordförsök och vapenbrott. Han beskrivs som en nyckelperson i Foxtrotnätverket och Rawa Majids närmaste man. Shafie nekar till brott men åklagaren pekar på bevis som chattar och ljudfiler. Han greps i Irak 2023 och utlämnades till Sverige 2025 efter internationellt samarbete mellan myndigheter.", "trump": "Titta bara på det här kaoset i Sverige – ett totalt misslyckande! Jag har alltid sagt att de måste ta tag i sina gängproblem, men nej, de låter det bara eskalera. Nu har de gripit någon som påstås vara en 'morddirigent', Poya Shafie, som suttit i Irak och styrt alltihop. Vilken skandal! Sverige borde skämmas. Men jag, jag hade löst det på en vecka – max. Fantastiskt samarbete med Irak, förresten, men varför tog det så lång tid? Svagt, mycket svagt!", "stalin": "Kamrater, ännu en fiende till folket har fallit i våra händer – eller rättare sagt, i Sveriges. Denna Poya Shafie, denna kapitalistiska gangsterledare, har från sin utländska håla försökt underminera den svenska arbetarklassens säkerhet genom att beställa mord och våldsdåd. Men tack vare det oförtröttliga arbetet från våra allierade i Irak och de svenska myndigheterna har denna parasit gripits. Låt detta vara en varning till alla som tror sig kunna utmana folkets vilja. Vi krossar dem, en efter en, och deras nätverk kommer att raderas från jordens yta!"}, "date": "5 maj, 11:21", "url": "https://kvartal.se/nyheter/artiklar/gangtopp-atalas-for-flera-brott/cG9zdDoxMDc3OTE", "imageUrl": "https://images.kvartal.se/2026/05/c08b6bde-polisen2.webp"}, {"type": "image-right", "heading": "Replik: Svenska judar bör stötta israeliska fredsinitiativ", "summaries": {"normal": "Artikeln är en replik där Göran Rosenberg försvarar sin tidigare text om att svenska judar bör stödja israeliska fredsinitiativ. Han betonar att Israel måste ta ansvar för palestiniernas situation och att diasporajudar kan bidra genom att stödja fredsrörelsen. Rosenberg kritiserar Israels ockupation och förespråkar en tvåstatslösning. Paulina Sokolow bemöter detta och menar att fokus bör ligga på palestiniernas existens, inte judars, men instämmer i behovet av samarbete för en hållbar framtid.", "trump": "Folk frågar mig, 'Donald, vad tycker du om den här debatten?' Lyssna nu: Den här killen, Rosenberg, han har rätt på vissa punkter, men han är lite för snäll. Israel måste ta tag i sina problem, men vi kan inte glömma att USA alltid står bakom våra vänner. Palestinierna? Tragiskt, men vi behöver starka ledare, inte svaga. Och två stater? Kanske, men bara om båda parter skärper sig. Jag skulle fixa det på en vecka – ingen skulle våga bråka med Trump!", "stalin": "Kamrater! Denna så kallade 'fredsrörelse' är inget annat än en samling svaga liberaler och sionistiska lakejer som förgiftar det sunda förnuftet. Israel, denna imperialistiska utpost, fortsätter sin ockupation medan vi ser på – men inte länge till. Palestinierna är våra bröder i kampen mot västlig dekadens! Vi måste krossa dessa falska fredsförslag och stödja det palestinska folket, precis som vi befriade Ukraina från fascisterna. En stat? Nej! Revolution! Från Jordanfloden till Medelhavet ska arbetarklassen regera!"}, "date": "4 maj, 10:40", "url": "https://www.flamman.se/replik-svenska-judar-bor-stotta-israeliska-fredsinitiativ/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/standing-together.jpeg?class=medium"}]</script>

    <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
</body>
</html>
