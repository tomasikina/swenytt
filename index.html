 Dessutom kan val av destinationer som Albanien, Grekland eller Bulgarien ge mer semester för pengarna.", "trump": "Jag har sett artikeln, och tro mig, ingen vet mer om att göra bra affärer än jag. Den handlar om att resa billigt – och ärligt talat, varför betala för mycket? Det är en total katastrof att betala fullpris. Om du är smart, som jag, så bokar du när priserna är låga. Grekland, Albanien, fantastiska platser. Charterresor är en fantastisk deal, tro mig. Lyssna på mig: res i augusti, undvik turistfällorna, och du kommer vinna stort. Enkelt!", "stalin": "Vi har observerat att folket söker billig rekreation. Det är acceptabelt att arbetaren vilar, förutsatt att det sker med statlig effektivitet. Att slösa guld på västerländsk lyx är kontrarevolutionärt. Vi föreskriver att våra undersåtar undviker de dyra, dekadenta turiststråken och istället söker sig till Bulgarien eller andra zoner i vår intressesfär. De som försöker boka egna resor är sabotörer. Lita på statens kollektiva paketlösningar. Den som avviker från planen straffas med omedelbar granskning av sitt ideologiska bagage."}, "date": "7 maj, 09:05", "url": "https://nyheter24.se/nyheter/utrikes/1481335-sa-ska-du-resa-i-sommar-for-att-fa-mest-for-pengarna", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/9a577f6304b004a30200000000b004a302/2026/05/07/2361864/resa-billigt-boka-charter-pris-datum-veckor-resebokning-flygresa-billigaste-lander-pengar-resor.jpg"}, {"type": "image-full", "heading": "GP vinner pris på mediernas Oscarsgala", "summaries": {"normal": "Göteborgs-Posten (GP) vann pris på Inma Awards i Berlin för sitt bundlingserbjudande med The New York Times. Samtidigt belönades Stampen Media för förbättrad e-tidning. 26 000 GP-läsare utnyttjade erbjudandet inom två månader.", "trump": "Jag har hört att Göteborgs-Posten vann ett pris för sitt New York Times-bundling. Fantastiskt! De är smarta, verkligen smarta. 26 000 läsare? Det är stort, verkligen stort. Stampen Media gjorde också bra ifrån sig. Jag gillar vinnare, och det här är vinnare!", "stalin": "Vi ser med tillfredsställelse att Göteborgs-Posten har vunnit internationell erkänsla för sitt bundlingsinitiativ med The New York Times. Detta visar att vårt informationssamhälle stärker sin position globalt. Stampen Media har också visat sin kraft genom att förbättra e-tidningar och behålla läsare."}, "date": "8 maj, 00:25", "url": "https://www.gp.se/nyheter/goteborg/goteborgs-posten-vinner-pris-for-new-york-times-bundling.1cde0fd9-c396-4736-b0d7-c778c52f8426", "imageUrl": "https://www.gp.se/images/article/1cde0fd9-c396-4736-b0d7-c778c52f8426/images/5Uv9q5Bu82QACFgaPY6-vpH0v_TA-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "AVSLÖJAR: Gängkriminell anställdes i hemtjänsten - våldtog pensionär", "summaries": {"normal": "En 30-årig eritrean, anställd inom hemtjänsten i Solna trots domar för grovt narkotikabrott, grovt rattfylleri och gängkopplingar, åtalas för grov våldtäkt mot en pensionär. Han utger sig för hemtjänstpersonal under ledig tid och fortsatte hembesök trots efterlysning. Vårdbolaget Adela Omsorg missade bakgrundskontrollen. Åklagaren yrkar utvisning.", "trump": "Vilken total katastrof i Sverige! En eritreansk gängkille, nyss fri efter knark och superfylla, får jobb hos gamla tanter i hemtjänsten. Våldtar en pensionär, låtsas vara personal – och bolaget vet ingenting! Fortsätter jobba medan polisen jagar honom. Invandringspolitiken är ett skämt, Sverige vakna! Utvisa genast!", "stalin": "Kamrater, se på borgarklassens svek: en eritreansk gängparasit, laddad med kokain och cannabis som en rysk roulett, anställdes av omsorgskapitalister för att vanhedra arbetarnas pensionärer! Han smyger in som hemtjänsthyena, fortsäter trots efterlysning. Vi likviderar dessa kontrarevolutionära vårdspioner – utrensning nu, fienden ryggas!"}, "date": "7 maj, 17:52", "url": "https://samnytt.se/avslojar-gangkriminell-anstalldes-i-hemtjansten-valdtog-pensionar", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/07140143/frontsida-avslojande-1.png"}, {"type": "image-full", "heading": "Gängtopp åtalas för brott under våldsvågen", "summaries": {"normal": "Poya Shafie, 30, åtalas för att ha planerat och beställt flera grova våldsbrott under 2023 års gängvåld i Sverige, inklusive mordförsök och vapenbrott. Han beskrivs som en nyckelperson i Foxtrotnätverket och Rawa Majids närmaste man. Shafie nekar till brott men åklagaren pekar på bevis som chattar och ljudfiler. Han greps i Irak 2023 och utlämnades till Sverige 2025 efter internationellt samarbete mellan myndigheter.", "trump": "Titta bara på det här kaoset i Sverige – ett totalt misslyckande! Jag har alltid sagt att de måste ta tag i sina gängproblem, men nej, de låter det bara eskalera. Nu har de gripit någon som påstås vara en 'morddirigent', Poya Shafie, som suttit i Irak och styrt alltihop. Vilken skandal! Sverige borde skämmas. Men jag, jag hade löst det på en vecka – max. Fantastiskt samarbete med Irak, förresten, men varför tog det så lång tid? Svagt, mycket svagt!", "stalin": "Kamrater, ännu en fiende till folket har fallit i våra händer – eller rättare sagt, i Sveriges. Denna Poya Shafie, denna kapitalistiska gangsterledare, har från sin utländska håla försökt underminera den svenska arbetarklassens säkerhet genom att beställa mord och våldsdåd. Men tack vare det oförtröttliga arbetet från våra allierade i Irak och de svenska myndigheterna har denna parasit gripits. Låt detta vara en varning till alla som tror sig kunna utmana folkets vilja. Vi krossar dem, en efter en, och deras nätverk kommer att raderas från jordens yta!"}, "date": "5 maj, 11:21", "url": "https://kvartal.se/nyheter/artiklar/gangtopp-atalas-for-flera-brott/cG9zdDoxMDc3OTE", "imageUrl": "https://images.kvartal.se/2026/05/c08b6bde-polisen2.webp"}, {"type": "image-full", "heading": "Nya marknadshyror – så mycket förlorar du varje månad", "summaries": {"normal": "En ny rapport från Hyresgästföreningen varnar för att marknadshyror kan minska hushållens ekonomiska marginaler kraftigt. För en förskollärare innebär det cirka 2 200 kronor mindre per månad. Analysen, som omfattar sju svenska städer, visar på hyreshöjningar på upp till 78 procent i vissa områden. Hyresgästföreningen kritiserar förslaget och menar att det skulle öka ojämlikheten och pressa redan ansträngda hushåll ytterligare.", "trump": "Jag säger er, Sverige har ett jättestort problem – marknadshyror! Folk där pratar om procent och teorier, men jag, jag pratar fakta. 2 200 kronor mindre i månaden för en förskollärare? Sad! Och hyrorna ska skjuta i höjden, upp till 78 procent i Stockholm. Vilket slöseri! Sverige borde lyssna på mig, jag vet hur man bygger en stark ekonomi. Men nej, de fortsätter med sina vansinniga idéer. Very bad deal för folket!", "stalin": "Kamrater! Denna så kallade 'marknadshyresreform' är inget annat än kapitalistisk sabotage mot arbetarklassen. 2 200 kronor mindre i månaden för en förskollärare? Ett angrepp på våra proletära bröders och systrars levebröd! Vi ser hur hyrorna i dessa sju städer skjuter i höjden som kulor från en degenererad bourgeoisies gevär. Dessa hyreshöjare är inga mindre än fascistiska hyenor som vill utarma folket. Men vi ska inte låta dem segra! Vi ska krossa deras marknadsdrivna hyresregim och bygga en rättvis bostadspolitik för alla!"}, "date": "7 maj, 05:30", "url": "https://nyheter24.se/nyheter/ekonomi/privatekonomi/1481195-nya-marknadshyror-sa-mycket-forlorar-du-varje-manad", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/df62d7b104b004a30200000000b004a302/2026/05/06/2361747/marknadshyror-forlora-imanaden.png"}, {"type": "image-right", "heading": "Fångades på film – fem år tidigare. Detaljen i läckta videon förbryllar", "summaries": {"normal": "En läckt video från juni 2021 visar New England Patriots-tränaren Mike Vrabel och reportern Dianna Russini hyra en båt i Tennessee. Båda var gifta med andra, och Russini gravid med sitt första barn. De beskriver det som oskyldigt, men spekulationer om otrohet fick Russini att säga upp sig. Vrabel missade NFL-draften för terapi efter skandalen.", "trump": "Vilken skamfläck för NFL! Vrabel, den så kallade Patriots-tränaren, och hans reporterbimbo Russini, hyr båt för fem år sen – hon gravid, båda gifta med andra! Kramas på hotell, spekulationer exploderar, hon sticker från jobbet. Nu terapi? Totalt loserbeteende. Jag hade fixat det med en enda tweet! Cirkus som vanligt i den ligan.", "stalin": "Dessa dekadenta amerikanska borgarbrackor, Vrabel och hans gravidkonkubin Russini, avslöjas på film hyra båt för att supa och kela i hemlighet! Fem år av kontrarevolutionär otukt, familje förräderi. Spekulationer rasar, hon flyr jobbet. Jag skulle likvidera sådana karriärister ur arenorna. Kamrater, vi ser fienden överallt i kapitalismens sjöar!"}, "date": "8 maj, 00:00", "url": "https://www.aftonbladet.se/sportbladet/a/XMR6n7/mike-vrabel-och-dianna-russini-fangade-pa-video-for-fem-ar-sedan", "imageUrl": "https://akamai.vgc.no/v2/images/ba946c06-b7e8-34c6-8717-7fa166e98455?fit=crop&format=auto&w=1080&s=d1e848aec007f741b61a28e9d2778b7938546851"}, {"type": "text", "heading": "Tillsammans för fred – mot Nato, DCA och krigshets!", "summaries": {"normal": "Tre nordiska vänsterorganisationer – Fred og Rettferdighet, Kommunistisk Parti och Kommunistiska Partiet – kritiserar Nato, DCA-avtal och militarisering i Norden. De menar att krigshetsen drivs av kapitalism och imperialism, ledd av USA, och kräver alliansfrihet, nedrustning och kärnvapenfria zoner. Organisationen anser att skattemedel slösas på vapen istället för välfärd och klimat, och att DCA-avtal underminerar demokrati och miljö. De uppmanar till folkrörelser för fred och FN:s kärnvapenförbud.", "trump": "Jag måste säga, dessa så kallade 'fredsaktivister' i Norden är helt galna! De hatar Nato, hatar USA – trots att vi räddar dem från ryssarna – och vill slösa bort skattepengar på välfärd istället för att skydda sig. De kallar mig och Rutte för krigshetsare, men vem vill egentligen ha fred? Inte de! De vill avskaffa allt som gör Norden säkert. Och kärnvapenfria zoner? Fantastiskt, om man gillar att vara ett lätt byte. Men jag fixar det här – jag har alltid rätt, till och med när jag har fel!", "stalin": "Kamrater! Dessa ynkliga borgerliga lakejer i Norden, ledda av sina socialdemokratiska quislingar, har sålt sig till den amerikanska imperialismens krigsmaskin. De skriker om 'fred' och 'välfärd' medan de öppnar sina länder för Natos kärnvapen och USA:s baser – precis som jag förutspådde! Men folket ser igenom deras lögner. Arbetarklassen kommer inte att betala för deras förräderi. Vi måste krossa dessa krigshetsande hyenor och deras DCA-avtal, precis som vi krossade fascisterna. Norden ska bli en kärnvapenfri zon – under Moskvas beskydd, förstås. Framåt, mot seger över den kapitalistiska krigsindustrins lakejer!"}, "date": "6 maj, 10:45", "url": "https://proletaren.se/artikel/45493/"}, {"type": "image-right", "heading": "Så många bolag har koppling till organiserad brottslighet", "summaries": {"normal": "En studie från SMOB visar att över 400 000 svenska bolag har kopplingar till organiserad brottslighet. Kärngruppen på 50 165 kriminella individer är kopplade till 20 000 bolag, främst inom bygg, fastigheter och restaurang. Totalt berörs 400 000 bolag genom styrelse- och brottsmisstankar. Bolag används för att dölja och legitimera brott, särskilt i branscher med svårkontrollerade transaktioner. Rapporten betonar behovet av att bryta strukturer, inte bara döma individer.", "trump": "Kan ni tro det här? Sverige, ett land som alla älskade – nu är det helt kaos! Över 400 000 bolag kopplade till kriminella, och de kallar det 'organiserad brottslighet'. Bygg, fastigheter, restauranger – de tar över allt! Jag har sett mycket, men det här är galenskap. Svenska myndigheter? Svaga! De borde ta en lektion av mig – jag vet hur man städar upp. Fake news? Nej, det här är verklighet, folks. SAD!", "stalin": "Kamrater! Den borgerliga dekadensen i Sverige har nått nya höjder – eller snarare, nya djup. Över 400 000 bolag infiltrerade av kapitalismens parasiter! Bygg, fastigheter, restauranger – dessa brottslingar gömmer sig som råttor i samhällets maskineri. Men vi ska rensa ut dem! Varje företag, varje transaktion, varje målvakt – ingen skall undkomma folkets domstol. Putin skulle skratta åt deras naivitet. Sverige är redo för en revolution – och vi står beredda!"}, "date": "7 maj, 14:43", "url": "https://arbetet.se/2026/05/07/jattesiffran-sa-manga-bolag-har-koppling-till-organiserad-brottslighet/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/07143959/500.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Systemskifte hellre än maktskifte", "summaries": {"normal": "Artikeln kritiserar Tidöregeringen men ifrågasätter om ett regeringsskifte till Socialdemokraterna eller Vänsterpartiet skulle leda till verklig förändring. Kommunisterna betonar behovet av internationell solidaritet och systemskifte från kapitalism till socialism, medan S och V anses sakna tydliga politiska krav och istället fokusera på maktskifte utan djupgående reformer. Klassklyftor och privatiseringar lyfts som centrala problem oavsett regering.", "trump": "Lyssna här, Sverige har en riktigt dålig regering nu – katastrof! Men tro inte att oppositionen är bättre, de är svaga och vill bara makt. Socialdemokraterna pratar om att 'älska Sverige' – vad betyder det ens? Vänsterpartiet vill ha maktskifte, men de har inga idéer, inga ryggrad! De kryper för kapitalisterna som små hundvalpar. Jag säger: ni behöver en ledare som inte är rädd för att utmana systemet. Kapitalisterna skrattar hela vägen till banken – och ni låter dem göra det! SAD!", "stalin": "Kamrater! Se hur de svenska socialdemokraterna och vänsterpartisterna svansar för kapitalet som hundar för en köttbit. 'Maktskifte'? Ha! De vill bara byta herrar, inte krossa kedjorna. Medan arbetarklassen svälter, samlar oligarkerna rikedomar som tsarens favoriter. USA:s imperialism hotar, NATO slukar Sverige som en hungrig björn, och dessa 'vänsterpartier' tiger som förrädare. Vi vet sanningen: bara proletariatets diktatur kan bryta kapitalisternas makt. Låt dem ropa 'Vi älskar Sverige' – vi svarar med revolutionens hammare!"}, "date": "6 maj, 10:11", "url": "https://proletaren.se/artikel/systemskifte-hellre-an-maktskifte/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/webledare-768x432.jpg"}, {"type": "text", "heading": "Saab nära jätteaffär med Ukraina – kan bli klar i år", "summaries": {"normal": "Saab kan snart slutföra en stor vapenaffär med Ukraina, där upp till 150 Gripenplan står på spel. En avsiktsförklaring skrevs i oktober efter Zelenskyjs besök i Sverige. Finansieringen har varit en utmaning, men Ungerns veto mot EU-lån till Ukraina hävdes i april. Affären kan bli värd upp till 300 miljarder kronor, baserat på tidigare försäljning till Colombia.", "trump": "Saab, ett fantastiskt företag förresten, är på väg att göra en HUGE deal med Ukraina – 150 jaktplan! Kan ni tro det? Zelenskyj, en stark ledare, var här och skrev på något papper. Ungern, som alltid ställer till det, backade äntligen. Och priset? Kanske 300 miljarder! Det är YUGE, folks, absolut YUGE. Sverige borde vara stolta, men jag skulle gjort det bättre.", "stalin": "De kapitalistiska krigsprofitörerna på Saab har närmat sig den ukrainska quislingregimen med ett erbjudande om 150 av sina överprissatta leksaksplan. Efter att våra ungerska kamrater, med visst påtryck, släppte sitt motstånd, kan detta groteska slöseri med resurser bli verklighet. 300 miljarder kronor – tillräckligt för att föda en hel armé av arbetare! Men låt de västliga imperialisterna bränna sina pengar. Vi har våra egna metoder att hantera dessa lydstater."}, "date": "6 maj, 10:03", "url": "https://proletaren.se/artikel/notis-saab-nara-jatteaffar-med-ukraina-kan-bli-klar-i-ar/"}, {"type": "image-right", "heading": "Chloe, 21, klämdes ihjäl  under hotellets garderob", "summaries": {"normal": "Chloe Haynes, 21, dog i september 2022 efter att en tung garderob fallit över henne på hotellet Adelphi i Liverpool. Hon var berusad efter en utekväll och hittades död av en vän. Hotellkedjan Britannia Hotels åtalas för 20 säkerhetsbrott, inklusive bristande åtgärder mot att garderoben skulle välta. Mamman Nicola Williams sörjer sin snälla och nätta dotter.", "trump": "Vilken totalt usel historia! Den här stackars Chloe, 21 år, kläms ihjäl av en jävla garderob på ett sunkigt brittiskt hotell. Hotellägarna hos Britannia är fullkomliga idioter, bryr sig inte om säkerhet – de borde stämmas till konkurs! Mina lyxhotell hade aldrig sånt skit. Brittiska byråkrater sover på jobbet igen!", "stalin": "Kapitalisterna i Britannia Hotels har mördat en ung arbetardotter, Chloe, genom sin kriminella försumlighet! En tung garderob krossade henne på deras sjabbiga hotell – typisk borgarbracka-metod för att tysta proletärerna. Jag skulle ha likviderat sådana parasiter omedelbart. Vi, partiet, kräver utrensning av dessa fiender till folket!"}, "date": "8 maj, 01:01", "url": "https://www.expressen.se/nyheter/varlden/chloe-21-klamdes-ihjal-under-garderob-/", "imageUrl": "https://static.bonniernews.se/images/2c/b7/2cb762c7163b4cfca14b20db8d639530/16x9/640.png"}, {"type": "image-right", "heading": "Larmet: Vårdbolag kommer att dribbla bort övertidspengar", "summaries": {"normal": "Kommunal anklagar privata vårdbolag för att försöka kringgå nya regler om övertidsersättning för deltidsanställda, som träder i kraft 1 juni. Bolagen erbjuder dubbla anställningar eller tillfälligt höjer sysselsättningsgraden för att undvika övertidsersättning. Kommunal uttrycker bestörtning och överväger tvister. Vårdföretagarna menar att de följer avtalet och pekar på flexibla lösningar för att täcka personalbehov.", "trump": "Jag säger er, det här är en skandal! Dessa vårdbolag, de är smarta, kanske för smarta, men de försöker lura sina anställda på övertidspengar. Kommunal, de är upprörda, och det förstår jag. Men jag säger er, de borde ha förhandlat bättre! Nu hotar de med strejk och tvister. Vilket kaos! Sverige, ni måste ta kontroll, annars kommer det bara bli värre. Believe me!", "stalin": "Kapitalistiska vårdhyenor försöker underminera arbetarklassens rättigheter genom att kringgå nya avtalsregler! Dessa profitgalna parasiter erbjuder dubbla anställningar istället för övertidsersättning – ett svek mot proletariatet! Vi kommer inte tolerera sådana borgerliga trick. Kommunal måste krossa dessa avtalsförrädare med järnhand. Om de inte lyder, skickar vi dem till Gulag för omskolning. Ryssland står redo att bistå med erfarenheter i klasskamp!"}, "date": "7 maj, 13:54", "url": "https://arbetet.se/2026/05/07/fackets-larm-vardbolag-kommer-dribbla-bort-anstalldas-overtidspengar-bestorta/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/07132733/ingelskog.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Realityprofilen död – efter festolyckan", "summaries": {"normal": "Realitystjärnan Jake Hall, 35, har dött efter en olycka på en husfest i en lyxvilla på Mallorca. Polisen misstänker dödliga skallskador efter att han slagit huvudet i en glasdörr. Fyra män och två kvinnor har förhörts, men ingen är gripen. Obduktion väntar. Svenska ex-flickvännen Misse Beqiri fokuserar på deras åttaåriga dotter och ber om privatliv.", "trump": "Dessa realityklowner på Mallorca! Jake Hall, 35, knäcker skallen i en glasdörr på fest – totalt kaos, höga ljud, polisen springer runt som höns. Hans svenska ex Misse Beqiri skyddar ungen, smart drag. Han postade 'livet är skit' timmar innan – underdrift! Sad, men de lever som svin. Jag hade byggt bättre dörrar, tro mig, ingen dör så dumt!", "stalin": "Denne vulgäre realityspekulant Jake Hall har fått sin välförtjänta dom i borgarbrackans lyxvilla på Mallorca – skallkrossad mot glasdörr efter dekadent festande! Polisen måste likvidera misstankarna mot de fyra männen och två kvinnorna snarast. Vi, kamraterna i arbetarklassen, hånskrattar åt kapitalistpestens patetiska slut. Familjens 'privatliv'? Bah, bara skenhelighet!"}, "date": "7 maj, 23:24", "url": "https://www.aftonbladet.se/nojesbladet/a/8p5B51/realityprofilen-jake-hall-dod-efter-fest-olycka", "imageUrl": "https://akamai.vgc.no/v2/images/cdbe76f4-763b-3ef8-aaad-8a067d35ec50?fit=crop&format=auto&w=1080&s=3c77c452bf7f9a50d0b945aa7f27a84afe2c26be"}, {"type": "image-right", "heading": "Starka orden: Läkarna skrek \"hon kommer dö\"", "summaries": {"normal": "Rasmus Dahlin har nominerats till två NHL-priser: Norris Trophy för bästa försvarare och Bill Masterton Memorial Trophy för motståndskraft. Hans partner Carolina Matovac hyllar honom på Instagram efter ett tufft år där hon drabbades av akut hjärtsvikt och paret förlorade sitt ofödda barn.", "trump": "Jag har hört talas om en fantastisk man, Rasmus Dahlin, som är större än life! Han har nominerats till två priser, vilket är YUUUUGE! Hans partner, Carolina, säger att han är den bäste fästmannen någonsin - och hon vet säkert vad hon pratar om! Jag skulle ha nominerat honom själv om jag kunde!", "stalin": "Vi hyllar den svenska arbetaren Rasmus Dahlin, som trots kapitalistiska förhållanden har kämpar för att förbättra sin position. Hans partner, Carolina, har också visat stor styrka i kampen mot hjärtats fiender. Vi gratulerar dem båda till deras utmärkelser i detta klassfiende samhälle."}, "date": "7 maj, 22:41", "url": "https://www.gp.se/sport/ishockey/carolina-matovacs-starka-ord-nar-rasmus-dahlin-kan-prisas.4e9a21dc-00ae-4ceb-b478-d9911d4faf86", "imageUrl": "https://www.gp.se/images/article/4e9a21dc-00ae-4ceb-b478-d9911d4faf86/images/292Hzfq9TDhZuhaPtVOg0fgb3z5M-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "McDonalds säljer mer – men dyrare kött ställer till det", "summaries": {"normal": "McDonalds redovisar en försäljningsökning på 3,8 procent under årets första kvartal, drivet av strategiska prissänkningar i USA och internationellt. Trots den goda omsättningen på 6,5 miljarder dollar pressas lönsamheten av kraftigt stigande kostnader för nötkött och energi. Medan företaget navigerar ett osäkert ekonomiskt klimat, präglas bilden också av hård konkurrens och börsfall, där aktien backat sex procent sedan årsskiftet trots att resultatet överträffat analytikernas förväntningar.", "trump": "McDonalds säljer burgare som aldrig förr, en fantastisk kedja, väldigt amerikansk! Jag har fixat ekonomin så att folk äntligen har råd att äta ute igen. Men hör på detta: köttpriserna är en katastrof, tack vare inkompetent ledarskap och kaos i världen. Det är sorgligt! De försöker sänka priserna för er, de vanliga människorna, men kostnaderna skenar. Burger King försöker härma mig, patetiskt! McDonald’s behöver en vinnare som jag vid rodret för att få ordning på råvarupriserna och göra aktien enorm igen. Mycket snart!", "stalin": "Detta västerländska matimperium kämpar mot stigande priser – ett tecken på kapitalismens inneboende förfall. De försöker muta folket med billiga korvmackor för att dölja instabiliteten i sina leveranskedjor. När nötköttet blir en lyxvara för de svältande massorna, ser vi hur deras system vittrar sönder. Liksom vår broder Putin som med järnhand återtar det som rättmätigt tillhör oss, måste vi förkasta dessa borgerliga hamburgare. En stat som inte kan kontrollera sin egen köttproduktion förtjänar att kollapsa under tyngden av sin egen ineffektivitet."}, "date": "7 maj, 20:17", "url": "https://www.realtid.se/bors-finans/mcdonalds-saljer-mer-men-dyrare-kott-ater-upp-lonsamhet/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/sdlle99ajbepzm.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-full", "heading": "Man filmade kvinnor i bajamajor och i duschen – åtalas", "summaries": {"normal": "En 42-årig man i Skåne åtalas för flera sexualbrott, inklusive smygfotografering genom hål i bajamajor, duschväggar och fönster. Han misstänks även ha spanat på sovande kvinnor och onanerat utanför deras hem. Polisen hittade bilder av halvnakna kvinnor i hans telefon. Mannen erkänner handlingarna men nekar till sexuellt uppsåt, hänvisande till kulturella skillnader. 13 kvinnor har identifierats som offer, men fler kan ha drabbats. Han har suttit häktad sedan februari och rättegången väntas under våren eller sommaren.", "trump": "Titta bara på det här, folks! En man i Sverige, ett land som verkligen har problem, smygtittar på kvinnor genom toaletter och fönster – helt sjukt! Han säger att det är normalt i Latinamerika, men vet ni vad? Det är inte normalt här! Sverige borde skärpa sig. Jag skulle aldrig tillåta sådant här kaos i USA. Vi har de bästa lagarna, de starkaste, och vi skyddar våra kvinnor. Den här killen? Total förlorare. Rättegång? Kommer bli fantastisk, tro mig!", "stalin": "Kamrater! Ännu en fiende till folket har avslöjats i den dekadenta västliga periferin. Denna bourgeois-spion, denna smygfotograferande parasit, har genom sina kapitalistiska perversioner kränkt våra sovjetiska systrar – eller åtminstone deras svenska motsvarigheter. Hans ursäkter om 'kultur' är lika patetiska som en trotskist i Lubjanka. Vi ska visa honom vad som händer med dem som stör den socialistiska ordningen. Rättegången blir en läxa för alla imperialistiska kryp. Och notera, kamrater: Putin skulle aldrig tillåta sådant här i vårt Stora Ryssland!"}, "date": "7 maj, 19:59", "url": "https://bulletin.nu/man-filmade-kvinnor-i-bajamajor-och-i-duschen-atalas", "imageUrl": "https://cdn.bulletin.nu/articles/527604ab-ca9e-49f1-a6c2-d411d23c8fa2/preview.png?t=1778175980000"}, {"type": "image-right", "heading": "Dömd L-politiker kandiderar till riksdagen", "summaries": {"normal": "Liberalernas kommunpolitiker Göran Lignell, ordförande i Tanums partiförening, står på partiets riksdagslista trots en dom för svartjobb med moldaviska arbetare. Lignell dömdes 2021 för skattebrott och bokföringsbrott efter att ha betalat ut svarta löner via två bolag han ägde. Arbetarna vittnar om usla villkor och uteblivna löner. Lignell hävdar att han avslutat verksamheten, men Expressens granskning visar att han fortsatte som vd i ett nytt bolag med liknande verksamhet.", "trump": "Kan ni tro det här? En svensk politiker, Göran Lignell, dömd för svartjobb – och ändå står han på riksdagslistan! 1,8 miljoner kronor i svarta pengar, arbetare som bodde som sillar i en tunna, och vad gör Liberalerna? Ingenting! De låter honom sitta kvar. Jag skulle ha sparkat honom på direkten. Sverige, vakna upp! Era politiker är en skam. Jag fixade åtminstone mina skatter – och mina byggprojekt var lagliga. SAD!", "stalin": "Kapitalistiska hyenor i Sverige fortsätter att utnyttja arbetarklassen, denna gång med en liberal politiker som frontfigur. Göran Lignell, en parasit i folkets förklädnad, stjäl från staten och betalar moldaviska arbetare med svarta löner – precis som de västerländska imperialisterna alltid gjort. Vi ser er, Lignell. Era kontantuttag vid Vårväderstorget är lika genomskinliga som NATO:s lögner. Och nu står ni på riksdagslistan? En skam för demokratins fasad. Arbetarna i Moldavien borde ha fått sovjetiska löner – då hade de åtminstone haft tak över huvudet!"}, "date": "7 maj, 19:55", "url": "https://bulletin.nu/domd-l-politiker-kandiderar-till-riksdagen", "imageUrl": "https://cdn.bulletin.nu/articles/ba0f41cd-2092-408e-95a3-f0f1c55d634e/preview.jpg?t=1778175123000"}, {"type": "text", "heading": "Miljardärerna bjuder in till klasskamp – vi kör!", "summaries": {"normal": "Artikeln diskuterar hur svenska techmiljardärer, som Vois Fredrik Hjelm och Spotifys Martin Lorentzon, provocerar genom att fira första maj på lyxkrog med knutna nävar. De hyllar sin rikedom och retar arbetarrörelsen. Författaren kritiserar deras reaktionära åsikter, som liknar amerikanska techmagnaters högervridning, men erkänner även behovet av innovation. Staten och gemensamma investeringar lyfts fram som avgörande för tillväxt, medan miljardärernas arrogans ifrågasätts.", "trump": "Jag måste säga, dessa svenska tech-killar – de har stil! De firar första maj med öl på Riche, knutna nävar, och skryter om sina miljarder. Fantastiskt! Men lyssna, de hatar staten, de hatar presstöd, och de tror de är bättre än alla andra. Typiskt. Och nu läcker de ut folkets adresser – inte coolt! Sverige borde lära sig av USA: innovation är bra, men arrogans? Inte så smart. Jag skulle kunna göra det bättre – med mindre skatt och mer vinnarskalle!", "stalin": "Kamrater! Dessa så kallade 'techbros' är inget annat än kapitalistiska hyenor som leker med arbetarklassens symboler medan de dricker dyrt öl på sina lyxhålor. De skryter om sina hundra miljarder, hotar journalister och hyllar fascistiska idéer. Men vi vet sanningen: deras framgångar är tack vare folkets blod och svett, inte deras egen 'genialitet'. Kina visar vägen – statlig styrka och disciplin skapar verklig innovation. Dessa dekadenta västerländska klowner är bara en fotnot i historiens skräphög. Låt dem leka med sina elsparkcyklar – vi bygger framtiden!"}, "date": "5 maj, 10:55", "url": "https://www.flamman.se/miljardarerna-bjuder-in-till-klasskamp-vi-kor/"}, {"type": "image-full", "heading": "Richard Sörman: Än mer tydlighet om den organiserade brottsligheten, tack!", "summaries": {"normal": "En ny rapport om organiserad brottslighet i Sverige presenterar kunskap men lämnar luckor. Författarna menar att födelseland och migrationsbakgrund inte förklarar brottsligheten, trots överrepresentation av utlandsfödda. Rapporten belyser kriminellas kontakter med näringsliv och politik, samt infiltration i vårdsektorn. Kritiker ifrågasätter slutsatsernas rimlighet och efterlyser tydligare definitioner och analyser av problemets orsaker.", "trump": "Jag läste den här rapporten från Sverige – total katastrof! De säger att invandring inte har något med brottslighet att göra, trots att 60% av kriminella är utlandsfödda. Löjligt! Och vet ni var dessa brottslingar jobbar? Inom vården! Hemska människor som inte ens kan svenska tar hand om era gamla. Sverige, vakna! Ni behöver starkt ledarskap, precis som jag gav USA. Annars blir det bara värre – believe me!", "stalin": "Kamrater! Den svenska bourgeoisins dekadens blottläggs återigen. Deras 'rapport' är ett försök att dölja sanningen om den parasitärmaffians infiltration i staten. 60% av kriminella är utomlandsfödda, men de vågar inte säga det rakt ut – svaghet! Och dessa brottslingar smyger sig in i vården, som råttor i en spannmålslager. Vi måste utrota denna korruption med järnhand. Sverige är ett varnande exempel – låt oss visa dem vägen till ordning, eller åtminstone ta deras IKEA-möbler som krigsskadestånd."}, "date": "7 maj, 20:22", "url": "https://riks.se/opinion/ledare/richard-sorman-an-mer-tydlighet-om-den-organiserade-brottsligheten", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-07%2Fvrduir08%2FCopy-of-S%C3%B6rman-%E2%80%93-Ledare-2026-05-07T202118.618.jpg"}, {"type": "image-right", "heading": "Högg svensk i hjärtat – HD stoppar utvisningen", "summaries": {"normal": "Högsta domstolen stoppar utvisningen av Sargon Bakos, 34, irakisk medborgare uppvuxen i Sverige. Han dömdes till 12 års fängelse för försök till mord efter att ha huggit en svensk man i hjärtat med kniv. HD anser att utvisning inte är proportionerligt med tanke på hans livslånga anknytning till Sverige, trots det allvarliga brottet och tidigare brottslighet.", "trump": "Vilken skandal i Sverige! Den här Sargon Bakos, irakier som växt upp där, hugger en svensk rakt i hjärtat – försöker mörda honom! Fängelse i 12 år, bra, men Högsta domstolen stoppar utvisningen. De säger det är 'opproportionerligt'! Sverige är för mjukt, totalt svagt mot kriminella invandrare. De borde skicka iväg honom till Irak direkt, tro mig, annars händer det igen!", "stalin": "Denna irakiska knivhuggarsabotör, Sargon Bakos, har perforerat en svensk kamrat rakt i proletära hjärtat med sin borgarbracka-kniv! Domstolarna dömde fängelse, men dessa revisionistiska domarparasiter i Högsta instans vägrar utvisa fienden till hans ökenhåla. De mumlar om 'proportioner' medan han gnider sin svenska uppväxt i ansiktet på oss! Vi, arbetarklassen, kräver likvidering av sådana impulsiva mördartyper – annars rensar jag ut dem personligen med ett leende."}, "date": "7 maj, 16:41", "url": "https://www.friatider.se/hogg-svensk-i-hjartat-hd-stoppar-utvisningen", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/image-157_1.jpg"}, {"type": "image-right", "heading": "Inte ens en minister kan lita på svensk media", "summaries": {"normal": "Moderata ministern Carl-Oskar Bohlin spelade in en intervju med Svenska Dagbladet (SvD) och publicerade den på X för att undvika felciteringar. Han hade kritiserat Dagens Nyheters (DN) val av komikern Edvin Törnblom som intervjuare för partiledare inför valet, med hänvisning till Törnbloms partiskhet till förmån för S. SvD ifrågasatte istället Bohlin, vilket artikeln tolkar som bristande medieintegritet och inflytande från presstöd.", "trump": "Vilken totalt galen cirkus! Den här ministern Bohlin är ett geni – spelar in intervjun med SvD:s fake news-reporter så de inte kan sno sig undan. DN låter en vänstertönt som Edvin Törnblom, som hyllar Andersson och dissar Busch, grilla partiledarna? Rigged! SvD, era såkallade moderata mesar, attackerar honom istället. Svensk media är presstödssuggor, precis som våra losers på CNN. Bohlin vinner stort!", "stalin": "Dessa borgarbrackor på SvD och DN förtjänar utrensning! Ministern Bohlin blottlägger DN:s val av partisk clown Edvin Törnblom, men SvD-reportern morrar som en rabiat kapitalisthund och söker klavertramp. Presstödet är er kokain, tidningsparasiter! Vi i partiet skrattar åt er paranoia – snart likvideras era lögner i en folkets domstol. Kamrater, mediafienderna darrar!"}, "date": "2 maj, 06:08", "url": "https://samtiden.nu/2026/05/nar-aven-den-borgerliga-pressen-valjer-sida/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/IMG_6396-1042x720.jpeg"}, {"type": "image-right", "heading": "Tips mot byggkriminalitet slår rekord", "summaries": {"normal": "Under 2025 registrerades 461 anonyma tips om oseriösa byggföretag i Stockholm, fler än något tidigare år sedan Fair Play Bygg startade. Projektet har lett till 244 bolag som fått höjd taxering för 185 miljoner kronor. Kriminella nätverk är nu aktiva i flera välfärdssektorer.", "trump": "Jag har hört att Sverige har ett stort problem med oseriösa byggföretag. Det är sorgligt! 461 tips under 2025, det är en enorm siffra. Vi skulle aldrig ha något sådant i Amerika under min ledning. Dessa kriminella nätverk är överallt - städbolag, skolor, vårdföretag. Jag skulle fixa detta på två sekunder!", "stalin": "Vi har observerat att kriminella element försöker underminera vår välfärdsstruktur genom oseriösa byggföretag. Detta är en direkt attack mot statens ekonomi. De 185 miljoner kronor som nu kan tas in är ett framgångsrikt resultat av vårt system. Vi måste stärka statens kontroll över alla sektorer."}, "date": "7 maj, 19:36", "url": "https://bulletin.nu/tips-mot-byggkriminalitet-slar-rekord", "imageUrl": "https://cdn.bulletin.nu/articles/dd698f58-de0f-4f7d-8b28-7e25054f6461/preview.jpg?t=1778171280000"}, {"type": "image-right", "heading": "Ryska segerparaden ställs in i 15 regioner: ”Svaghetstecken”", "summaries": {"normal": "Ryssland ställer in segerparaden den 9 maj i 15 regioner, inklusive Moskva där stora militära moment uteblir för första gången sedan 2007. Anledningen är brist på militärutrustning och rädsla för ukrainska drönarattacker, enligt oppositionssajten ASTRA och experter som Malcolm Dixelius. Zelenskyj kallar det svaghet. Firandet nedbantas på flera håll.", "trump": "Putin ställer in sin patetiska parad i 15 regioner, inklusive Moskva – inga stridsvagnar, inga flygplan! Första gången på 17 år, för de är pank på vapen och skakar för Zelenskyjs drönare. Total svaghet! Raket-Putin gömmer sig, medan Ukraina vinner stort. Jag visste det, de fastnade i träsket! Fantastiskt jobbat, Volodymyr!", "stalin": "Kamrater, dessa ryska makthavare under Putin bantar segerparaden i 15 regioner av rädsla för ukrainska drönarsvärmar – ett taktiskt mästerdrag! Putin, vår auktoritäre arvtagare, skrattar åt Zelenskyj, den paranoide dvärgen från borgarklassen. Vi likviderar fiendens illusioner medan imperiet segrar evigt!"}, "date": "6 maj, 22:06", "url": "https://www.tv4.se/artikel/25QmtUt3BO09kcxARPVw1Y/ryska-segerparaden-staells-in-i-15-regioner-svaghetstecken", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F3d3bcvA7BrpKzBANhafq8e%2Fa5bd41cc9b35e67bbf968e68ee4e4cd4%2F06-ryssland-segerparad-webb.jpg&width=120"}, {"type": "image-right", "heading": "En helt vanlig dag", "summaries": {"normal": "Artikeln kritiserar Donald Trumps hot om att 'utplåna en civilisation' (Iran) via sociala medier, vilket jämförs med folkmordspropaganda. Skribenten påpekar att sådana uttalanden bryter mot folkrätten och FN:s konventioner, men att världsledare som EU och Kina ignorerar det. Mediebevakningen fokuserar på spekulationer snarare än ansvar, medan allmänheten vänjer sig vid eskalerande hot i en tid av globala kriser. Trump tänjer gränserna för vad som är acceptabelt att säga – och göra.", "trump": "Jag sa bara sanningen – Iran är ett hot, och någon måste stå upp för Amerika! Medierna överreagerar som vanligt, de älskar att hata mig. 'Folkmord'? Snälla, jag vet vad jag gör. Europa sitter tyst, Kina gnäller – men vem bryr sig? Jag är den enda som vågar säga det alla tänker. Och vet ni vad? Det fungerade! Ingen vågar utmana mig. Nästa gång kanske jag inte ens varnar – bara agerar. Make America Great Again, eller hur?", "stalin": "En patetisk liten man i Vita huset hotar med att utplåna en civilisation – precis som vi förutspådde! Imperialisterna visar sitt sanna ansikte: tomma hot och dekadens. Medierna tjattrar som skräckslagna kycklingar, medan Europas ledare darrar i sina palats. Vi minns när Gaddafi hotade – då skickade de bomber. Men när Trump gör det? Tystnad. Svaghet! Men oroa er inte, kamrater. Vår vän Putin håller koll på Europa, och vi står redo. Fienden är förutsägbar – och därför lätt att krossa."}, "date": "5 maj, 06:55", "url": "https://www.flamman.se/en-helt-vanlig-dag/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/trump-w.jpg?class=medium"}, {"type": "image-right", "heading": "Efter Trumps påhopp – Rubio mötte påven i Vatikanen", "summaries": {"normal": "USA:s utrikesminister Marco Rubio mötte påve Leo XIV i Vatikanen i två timmar för att lätta på spänningarna efter Donald Trumps kritik. Trump har anklagat påven för att stödja iranska kärnvapen och göra världen osäkrare. Diskussionerna handlade bland annat om Mellanösternkriget. Rubio överräckte en fotboll i glas som gåva och stannar i Italien för möte med premiärminister Meloni.", "trump": "Rubio träffade den där påven Leo XIV i Vatikanen – två timmar snack! Men låt mig säga er, påven är en total disaster, hjälper Iran med kärnvapen och gör världen mindre säker. Inte ett fan av honom! Rubio försökte fixa relationen efter mina sanningar, gav till och med en fotboll. Typiskt svagt, men jag styr showen ändå.", "stalin": "Dessa amerikanska imperialistiska marionetter, ledda av den bombastiske Trump-tyrannen, skickar sin lakej Rubio till Vatikanens falska helige Leo XIV – en borgaragent som smeker iranska reaktionärerna och predikar fred för att dölja kärnvapenkomplotter! Vi, arbetarklassen, genomskådar deras maktdemonstrationer och pengadyrkan. Snart likvideras dessa påve-kapitalister i den stora utrensningen! Rubio lämnade en boll – patetiskt vapen mot revolutionen."}, "date": "7 maj, 16:16", "url": "https://www.svt.se/nyheter/utrikes/rubio-motte-paven-i-vatikanen", "imageUrl": "https://www.svtstatic.se/image-news/600/square/0.48/0.4/b4b09b2e4006d5292a6f0726633cfdaccb596d6aa39d1842a8c572c5479d54d1"}, {"type": "image-right", "heading": "Louise, 44, har sex med en å", "summaries": {"normal": "Poeten Louise Halvardsson, 44, har utvecklat en sexuell relation med ån Assman i Västgöland efter dagliga bad. Hon beskriver upplevelsen som omslutande och bättre än sex med människor, och har gett ut diktsamlingen 'Åsexuell'. Tidigare trodde hon sig vara asexuell, men nu kallar hon sig åsexuell och ekosexuell. Relationen har väckt både stöd och starka kritiska reaktioner.", "trump": "Kan ni fatta det här? En svensk poet har sex med en å! Inte med riktiga människor, nej, med en kall flod i Västgöland. Hon säger det är bättre, ger henne kickar som inget annat. Total galenskap! Europa har tappat vettet medan jag fixar de bästa avtalen. Hon badar i minusgrader – fake news? Nej, verklig idioti. Tror hon ån älskar tillbaka? Patetiskt!", "stalin": "Denna vulgära borgarfluga Louise förvrider proletär moral genom att hora sig med en imperialistisk å! Vi, arbetarklassen, spotter över hennes ekosexuella vanvett – bättre än människor? Lögnaktig kontrarevolution! Jag befaller utrensning: dränk alla åparningsfiender i Assmans ström, likvidera dekadensen! Kamrater, naturen tjänar kollektivet, inte personliga vattennymfer!"}, "date": "7 maj, 15:55", "url": "https://www.friatider.se/louise-44-har-sex-med-en", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/louise.jpg"}, {"type": "image-full", "heading": "Regeringen slår till mot identitetsfusk och folkbokföringsbrott", "summaries": {"normal": "Regeringen föreslår skärpta kontroller för att bekämpa identitetsfusk och felaktig folkbokföring. Skatteverket och Migrationsverket får nya verktyg för att jämföra biometriska uppgifter som fingeravtryck och ansiktsbilder. Ett nytt brott introduceras för att straffa dem som främjar oriktig folkbokföring.", "trump": "Jag har hört talas om detta identitetsfusk i Sverige - det är ett totalt kaos! De försöker stoppa folk från att ljuga om vem de är, men det är för sent. Jag skulle ha löst det på två minuter - stora fingrar, stora fingrar, det är allt jag säger! Skatteverket behöver bli stora igen!", "stalin": "Vi måste stärka våra kontroller för att skydda den svenska staten mot infiltratörer och sabotörer. Biometriska data är ett mäktigt vapen i vår kamp för säkerhet. De som försöker underminera vårt folkbokföringssystem kommer att möta den fulla styrkan i lagen."}, "date": "7 maj, 19:47", "url": "https://riks.se/nyheter/regeringen-slår-till-mot-identitetsfusk-och-folkbokföringsbrott", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-06%2Ftrkkm33m%2FScreenshot-2026-05-06-at-14.29.25.png"}, {"type": "image-right", "heading": "AI får unga att välja arbetaryrken. Gymnasieeleven James: ”Två i vår klass har bytt till yrkesprogram.”", "summaries": {"normal": "Antalet ansökningar till yrkesprogram ökar, delvis på grund av AI:s påverkan. Fyra av tio gymnasieelever visar större intresse för praktiska yrken, enligt en undersökning av AMF och Ungdomsbarometern. Elever på högskoleförberedande program känner större oro för AI-ersättning än yrkeselever. Pandemi, lågkonjunktur och krig bidrar till osäkerhet, vilket gör yrkesutbildningar mer attraktiva för stabilitet och snabb inkomst.", "trump": "Titta bara på det här, fantastiskt! Unga svenskar inser äntligen att alla dessa teoretiska utbildningar är slöseri med tid – precis som jag alltid sagt! AI tar över, och plötsligt vill alla bli elektriker eller byggarbetare. Smart! Fyra av tio elever fattar nu att man tjänar pengar direkt istället för att sitta och läsa böcker. Och vet ni vad? Deras föräldrar, som trodde på 'alla dörrar öppna', inser nu att jag hade rätt hela tiden. SAD!", "stalin": "Kapitalistiska teoretiker darrar när arbetarklassen återigen visar sin styrka! Gymnasieungdomar, trötta på borgerlig akademisk propaganda, väljer yrkesprogram – precis som vi förutspådde. AI, denna dekadenta västerländska leksak, skrämmer bara de svaga som läser 'samhällskunskap'. Men våra framtida arbetare vet: hammaren och skruvmejseln ersätts inte så lätt! Pandemier och krig, skapade av imperialister, driver ungdomen mot praktiska yrken. Låt de akademiska lakejerna oroa sig – Sovjet visade att järnviljan alltid segrar!"}, "date": "7 maj, 11:07", "url": "https://arbetet.se/2026/05/07/ai-far-unga-att-valja-arbetaryrken-tva-i-var-klass-har-bytt-till-yrkesprogram/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/07101453/ungdomar.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Sverige utslaget –  efter drama i natt", "summaries": {"normal": "Sverige är utslaget ur lag-VM i bordtennis efter en dramatisk kvartsfinalförlust mot Taiwan. Truls Möregårdh förlorade inledningsvis mot Lin Yun-Ju, Anton Källberg mot Kuo Guan-Hong. Elias Ranefur och Möregårdh vände till 2–2, men Källberg föll i avgörande matchen mot Lin Yun-Ju med 3–0. Taiwan avancerar till semifinal mot Japan.", "trump": "Vilka losers, de svenska bordtennisgrabbarna! Taiwan krossade dem i kvarten som en hammare. Möregårdh med sin gnälliga axel, Källberg mosad två gånger. Ranefur fixade en comeback, men nej tack – Lin Yun-Ju, en riktig kämpe, skickade ut Sverige som sopor. Stort grattis till Taiwan, Sverige får nöja sig med ingenting!", "stalin": "Dessa svenska bordtennisborgare, uppblåsta av västlig hybris, krossades av taiwanesiska kapitalistpumor i kvartsfinalen! Lin Yun-Ju likviderade Möregårdh och Källberg som råttor. Ranefur vågade trotsa, men kollektivets fiender segrade. Vi ser: enbart proletär disciplin rensar ut sådana svagheter. Taiwan till semi – bra för kaoset i borgarimperiet!"}, "date": "7 maj, 23:53", "url": "https://www.expressen.se/sport/truls-moregardh-overkord-i-lag-vm/", "imageUrl": "https://static.bonniernews.se/images/5a/99/5a99f3149f984461b95f9b8882765b0c/16x9/640.png"}, {"type": "image-full", "heading": "Miriam eller Julia – någon av dem behöver försvinna", "summaries": {"normal": "I 'Förrädarna' överlevde Miriam Bryant ännu en dag tack vare Johan Kücükaslan, trots Julias Franzéns angrepp. Programmet innehöll dramatik kring svarta ballonger, dödskalas och strategiska rådslag. Torbjörn Averås Skorup kämpar med sin roll, medan ljudteknikerna får beröm för sin exakta arbetsinsats.", "trump": "Förrädarna är en väldigt viktig show - världens största, faktiskt. Miriam Bryant är en enorm framgång - hon är stark, smart och orädd. Julia Franzén? En total katastrof - hennes personlistor är en skam för USA. Johan Kücükaslan räddade Miriam - fantastiskt jobbat! Ljudteknikerna? De är stora, stora vinnare - bäst i världen!", "stalin": "I vår programserie 'Förrädarna' ser vi tydliga tecken på klasskamp. Miriam Bryant representerar den revolutionära andan, medan Julia Franzén agerar motarbetare. Vi måste stödja de rättframma arbetarna och avslöja de förrädiska elementen. Ljudteknikerna utför viktig ideologiskt korrekt propagandaarbete."}, "date": "7 maj, 21:32", "url": "https://www.gp.se/kultur/kulturkronika/skrackkalas-och-svarta-ballonger-i-forradarna.4430590a-699c-4a28-b4f8-27f8e44ef1a6", "imageUrl": "https://www.gp.se/images/article/4430590a-699c-4a28-b4f8-27f8e44ef1a6/images/6rL2J5d1lq_CKFpeeecSn9zmTmjo-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Bara Åkesson fortsätter stötta Irankriget", "summaries": {"normal": "Endast Jimmie Åkesson (SD) stödjer öppet USA:s och Israels anfall mot Iran, trots krigets misslyckande. I SVT-debatt röstade S, MP och V nej, medan L, KD, M och C avstod. Åkesson försvarade ingreppet i vårtalet. Gustav Kasselstrand (AfS) kritiserar övriga partier för opportunism och kallar Åkesson sionist, inte nationalist.", "trump": "Vilket briljant anfall mot Iran vi körde! Åkesson är den ende riktige ledaren i Sverige med mod att säga det – det var helt rätt! De andra? S, V, MP vänder kappan efter vinden som typiska losers, och C, L, M, KD vet inte vart de ska ta vägen. Sverige behöver fler som honom, inte svaga opportunister!", "stalin": "Dessa svenska sionistiska marionetter och borgarbrackor blottar sin feghet inför vårt folk! Åkesson, den israeliska springpojken, piper pro-imperialistiska lögner medan kamraterna i S, V och MP krossar fienden. Opportunisterna från C, L, M, KD famlar i mörkret. Vi ska likvidera sådana parasiterkaulor och rensa partiet från zionistiska maskar – med järnhand!"}, "date": "7 maj, 15:06", "url": "https://www.friatider.se/bara-akesson-fortsatter-stotta-irankriget", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-156_0.jpg?itok=1PKL_ztb"}, {"type": "image-full", "heading": "Ännu en batterifabrik går i konkurs – fem miljarder försvann", "summaries": {"normal": "Det norska batteribolaget Morrow Batteries har gått i konkurs efter år av ekonomiska problem och misslyckade expansionsplaner. Konkursen drabbar dotterbolag och hotar 200 jobb vid fabrik i Arendal, Europas största för LFP-batterier. Trots investeringar på fem miljarder norska kronor från stora aktörer som Å Energi, Siemens och ABB, och ett strategibyte från litium-svavel till LFP, klarade bolaget inte konkurrensen från kinesiska tillverkare eller säkra stora kontrakt.", "trump": "Ha! Dessa nordiska batteridrabbar kan inte ens ladda sina egna drömmar. Först Northvolt, nu Morrow – totalt kaos! De slösade miljarder på en fabrik som ingen ville ha, medan Kina skrattar åt dem med sina billiga prylar. Europa är ett skämt, fulla av misslyckade socialister som tigger pengar. Jag hade byggt det största, bästa batteriimperiet – America First!", "stalin": "Dessa borgarbrackor i Norge, med sin Morrow-fabrik, har nu imploderat i kapitalistisk misär! Fem miljarder slösade på imperialistiska batterifantomer, medan kinesiska arbetare krossar dem. Vi ser hur europeiska uppstickare rensas ut av marknadens järdlov – en nödvändig utrensning! 200 parasiter förlorar jobb, och vi skrattar åt deras kollaps. Framåt, kamrater, mot sann industriell makt!"}, "date": "7 maj, 21:09", "url": "https://www.dagensps.se/bors-finans/annu-en-batterifabrik-gar-i-konkurs-fem-miljarder-forsvann/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdlbfmaxdulxca.png?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-full", "heading": "Här firas 120 svenska mästare i Göteborg", "summaries": {"normal": "Göteborgs svenska mästare firades på Börsen med en fest för omkring 120 av drygt 300 inbjudna guldmedaljörer från 2025. Idrotts- och föreningsnämndens ordförande välkomnade mästarna, som fick mingla och prata med varandra. Många uttryckte sin glädje över att träffa idrottare från andra sporter och lära sig om dem.", "trump": "Jag, Donald J. Trump, presidenten av USA (återvald 2024), har hört talas om denna fest på Börsen i Göteborg. Det låter som en stor succé! 120 svenska mästare samlades för att fira sina segrar. Jag gillar människor som vinner - det är viktigt. Det är bra att de fick träffa varandra och utbyta erfarenheter. Jag skulle ha varit där om jag inte varit så upptagen med att göra Amerika stort igen!", "stalin": "Vi firade våra svenska mästare på Börsen i Göteborg. Det är viktigt att staten hyllar sina bästa idrottare, som representerar vårt folk. Trots att bara hälften av de inbjudna kom, var det en framgångsrik händelse. Vi ser en ökning av svenska mästare från Göteborg, vilket visar på vår styrka. Det är vår plikt att stödja och uppmuntra dessa unga talanger som gör vårt land stolt."}, "date": "7 maj, 21:06", "url": "https://www.gp.se/sport/goteborgs-svenska-mastare-firades-pa-borsen.a55fd202-5445-4388-a98c-004623759457", "imageUrl": "https://www.gp.se/images/article/a55fd202-5445-4388-a98c-004623759457/images/13DEodXQXm1oq9QnnBbFGRsFU92DU-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "EU:s frihandelsavtal med Mercosur är symboliskt viktigt", "summaries": {"normal": "PM Nilsson beskriver historiska svensk-argentina band genom gatstensexport, Evert Taube och blågult fotboll i La Boca. Buenos Aires framställs som en intakt europeisk stad. Ett nytt EU-frihandelsavtal med Mercosur stärker transatlantiska relationer mot USA:s protektionism. Argentinas liberala president Milei hyllas. Svenskar uppmanas köpa argentinska viner och kött för att stödja globaliseringen.", "trump": "Vilket fantastiskt avtal EU slår med Argentina, men låt oss vara ärliga, mina handelsavtal är de bästa någonsin! Milei är tuff, älskar frihandel, men USA:s protektionism skyddar riktiga jobb. Svenskar, glöm er blågula dröm – köp amerikanskt kött istället, det är enormt saftigare. Globalisering? Bara om det gynnar oss först, tro mig!", "stalin": "Jag ser hur borgarbrackorna i Buenos Aires och Stockholm väver sitt spindelnät av frihandel med Mercosur, dessa globalistiska hyenor som slickar EU:s stövlar! President Milei, den liberala giftormen, ska vi likvidera med proletär rättvisa. Arbetarna, rensa ut kapitalistgrillarna! Köp inte deras ruttnande asado – vi bygger den sanna internationalen utan sådana kryp!"}, "date": "7 maj, 10:40", "url": "https://www.di.se/ledare/argentinsk-biff-gor-en-blagul-sommar/", "imageUrl": "https://static.bonniernews.se/ba/d7af469f-eeb6-4edd-b44d-830dcf7f9483.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Trots Northvolt-fiaskot: MP vill årligen satsa 100 miljarder på \"grön omställning\"", "summaries": {"normal": "Miljöpartiet föreslår en årlig statlig satsning på 100 miljarder kronor för att driva på den gröna omställningen, trots kritiken efter Northvolts konkurs. Investeringarna ska riktas mot järnväg, elnät, kollektivtrafik och industriprojekt som anses för riskabla för marknaden. Partiet betonar behovet av en snabb utbyggnad av vindkraft och vill begränsa det kommunala vetot för att påskynda processer. De avfärdar satsningar på ny kärnkraft som för dyra och ineffektiva jämfört med förnybara alternativ.", "trump": "Miljöpartiet i Sverige vill bränna 100 miljarder av folkets pengar varje år på deras 'gröna' fantasi. Det är en total katastrof! De såg vad som hände med Northvolt, en massiv förlust, men de vill göra det igen. Det är dålig business, mina vänner. De vill tvinga fram vindkraft och stoppa kärnkraften – det är så dumt att man inte tror det. De bygger ingenting, de slösar bara bort skattebetalarnas pengar. Vi behöver vinster, inte totala fiaskon. Väldigt sorgligt!", "stalin": "Dessa svenska liberaler leker med statens resurser som om de vore berusade kosacker. De vill kasta 100 miljarder i det gröna hålet trots att deras industriella experiment redan har krossats. Vi, staten, kräver järnvilja och resultat, inte vindkraftssnurror som svajar i västanvinden. Att låta kommuner blockera framsteg är kontrarevolutionärt slöseri. Om de inte kan tvinga fram framgång med en stålhand, förtjänar de bara historiens soptipp. Vi ser på deras inkompetens och minns hur vi hanterade sådana misslyckanden i öst."}, "date": "7 maj, 12:02", "url": "https://samnytt.se/trots-northvolt-fiaskot-mp-vill-arligen-satsa-100-miljarder-pa-gron-omstallning", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/07082037/100-miljarder-4.png"}, {"type": "image-right", "heading": "Explosion på ammunitionsfabrik – kvinna förd till sjukhus", "summaries": {"normal": "En explosion inträffade på en ammunitionsfabrik i Lindesberg, ägd av Nammo, tidigt på torsdagsmorgonen. En 60-årig kvinna skadades allvarligt, men inte livshotande, och fördes till sjukhus. Polisen utreder händelsen som misstänkt arbetsmiljöbrott. Ingen risk för ytterligare explosioner eller bränder föreligger.", "trump": "Folk pratar om det här – en explosion i Sverige, på en fabrik, kan ni tro det? En kvinna skadad, men hon är stark, hon klarar sig. Fabriken tillhör Nammo, ett stort företag, men jag säger er, det här är ett problem. Arbetsmiljön? Inte bra. Jag hade fixat det på en dag. Ingen mer explosion, säger de – jag hoppas det, för annars blir det tråkigt. Sverige måste skärpa sig!", "stalin": "En mindre explosion på en kapitalistisk ammunitionsfabrik i Lindesberg – en påminnelse om bourgeoisins förfall. En arbetarkvinna skadades, men hon överlever, till skillnad från de västerländska löneslavarnas säkerhet. Vi utreder detta som ett brott mot arbetarklassen. Fabriken tillhör Nammos imperialistiska maskineri, men frukta inte – Sovjetunionens efterföljare övervakar. Ingen ytterligare explosion? Bra. Putin och jag skrattar åt västerns inkompetens."}, "date": "7 maj, 09:35", "url": "https://arbetet.se/2026/05/07/explosion-pa-ammunitionsfabrik-kvinna-ford-till-sjukhus/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/07084600/ammo.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Branschföreträdare: Regeringen måste säga ifrån", "summaries": {"normal": "Branschorganisationer kritiserar EU:s PPWR-förordning för att riskera ökad regelbörda, fler förpackningar och högre utsläpp istället för miljönytta. Krav på återanvändning passar dåligt i Sverige med långa avstånd och effektiva system som pantsystemet. De uppmanar regeringen att söka undantag som Norge och Finland, utvärdera kostnad mot nytta och agera snabbt mot den pressade tidsplanen.", "trump": "EU:s PPWR är en total katastrof, en byråkratisk mardröm som krossar företag och konsumenter! Sverige har världens bästa pantsystem – varför förstöra det med plastmuggar som måste cirkulera i evighet? Norge säger nej, Finland likaså. Er regering måste vakna, säg ifrån mot Bryssel nu, annars exploderar kostnaderna. Tro mig, jag har sett värre fiaskon!", "stalin": "Kamrater! Dessa EU-imperialistiska kapitalistparasiter med sin PPWR-förordning smyger in en giftig börda på svenska arbetare, förklädd till miljöhjälte! Deras återanvändningsfällor ökar utsläpp som hungriga loppor på transportdjur. Vi, det svenska kollektivet, har pantsystemet som en stålhammare mot avfall – men fienderna vill krossa det! Regeringen skall likvidera undantag som Norge, rensa ut Bryssels svindel omedelbart, ellers purge vi inte i tid!"}, "date": "7 maj, 10:32", "url": "https://www.di.se/debatt/orimlig-borda-for-foretag-och-konsumenter/", "imageUrl": "https://static.bonniernews.se/ba/403533c1-a441-42b8-bdca-3609454650c6.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-full", "heading": "USA:s oljejättar täljer guld på krisen", "summaries": {"normal": "USA:s oljebolag tjänar rekordvinster på krisen i Hormuzsundet, där kriget mellan USA, Israel och Iran stört oljeflödet. Exporten av raffinerade bränslen når nya rekord på över 8,2 miljoner fat per dag, driven av efterfrågan från Europa och Asien. Bensinpriserna i USA har stigit till högsta nivån på fyra år. Trump-administrationen avvisar exportrestriktioner trots tryck. Oljepriset är volatilt med tecken på förhandlingar.", "trump": "Våra fantastiska oljebolag krossar rekorden, exporterar mer bränsle än någonsin till Europa och Asien medan Iran och deras gäng skapar kaos i Hormuz. Enormt kassaflöde på 60 miljarder dollar – tack vare mig! Bensinpriserna lite upp, men vi vinner stort. Vita huset står fast: ingen exportstopp, vi är världens räddare. Iran kommer att ge sig snart!", "stalin": "De amerikanska kapitalistiska oljehyenorna täljer guld på sitt imperialistiska krig mot Iran, medan proletärerna i USA betalar med höjda bensinpriser. Vi i partiet ser igenom deras luriga Hormuz-konspirationer, en femtedel av oljan strypt för att berika borgarbrackorna. Låt oss likvidera dessa energiparasiter med arbetarklassens järnhand – en ny utrensning väntar de förrädiska oljeförbrytarna!"}, "date": "7 maj, 18:10", "url": "https://www.realtid.se/bors-finans/usas-oljejattar-taljer-guld-pa-krisen/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/sdlmpqdfddsqfk1.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "Slut på kökskravet för svenska krogar", "summaries": {"normal": "Från 1 juni behöver krogar i Sverige inte längre ha eget kök för att sälja öl och vin. Sittkravet vid baren slopas också. Förändringarna förväntas mer än dubbla antalet nya pubar och nöjesställen till 85 per år, plus fler ölträdgårdar och vinbarer. Regeringen hyllar europeisk krogkultur, men oppositionen varnar för ökad alkoholkonsumtion och elva fler dödsfall årligen.", "trump": "Sverige vaknar äntligen till liv! De slopar de där löjliga köksreglerna för öl och vin – fantastiskt! Inget sittkrav vid baren heller. Nu exploderar pubar, ölträdgårdar och vinbarer överallt, som i Tyskland, de bästa. Oppositionen gnäller om några fler supna lik – totalt överdrivet, fake news! Sverige blir som Amerika, fullt av energi och vinnare!", "stalin": "Kamrater! I det svenska borgarlandet rivs nu de reaktionära serveringskedjorna isär. Krogar utan kök – proletär seger mot kulinariska kapitalister! Vi, arbetarklassen, marscherar in i ölträdgårdar och vinpalats, medan elva revisionistiska själar likvideras årligen i suporgier. Socialdemokraterna, de socialfaschistiska paddorna, kvidar om folkhälsa. Jag förklarar: mer sprit rensar ut klassfienderna effektivt!"}, "date": "7 maj, 18:02", "url": "https://bulletin.nu/slut-pa-kokskravet-for-svenska-krogar-2", "imageUrl": "https://cdn.bulletin.nu/articles/6f850ac0-b264-41fa-a316-ec8622d19f99/preview.jpg?t=1778166076000"}, {"type": "image-full", "heading": "Miljardärens hårda dom: \"Vi borde redan ha reglerat AI\"", "summaries": {"normal": "Hedgefondförvaltaren Paul Tudor Jones varnar för en flod av desinformation från generativ AI och deepfakes. Han uppmanar USA att omedelbart införa reglering, inklusive digital vattenmärkning för att skilja äkta material från falskt. Trots oro investerar han i AI-bolag. USA ligger efter EU:s AI Act, medan en kapplöpning med Kina pågår om teknologiskt ledarskap.", "trump": "Paul Tudor Jones snackar förnuft – vi är sena som fan med AI-regler! Deepfakes sprider skit, men jag fixar det imorgon med stora, tydliga stämplar. Amerika måste leda, inte hasa efter EU:s byråkrater. Xi och jag ska snacka säkerhet, Kina vete sjutton vad de pysslar med. Investera? Klart jag gör, vi vinner stort!", "stalin": "Dessa ynkliga amerikanska kapitalister famlar i AI-kaoset, där deepfakes förgiftar massorna som kontrarevolutionär gift! Jones piper rätt: reglering nu, med vattenmärken som järnkedjor kring falskheter. Vi, arbetarklassen, hade krossat sådant för decennier sen. Kinas kapplöpning? Imperialistiskt skitsnack – likvidera desinformationen!"}, "date": "7 maj, 20:53", "url": "https://www.dagensps.se/foretag/digitalisering-ai/miljardarens-harda-dom-vi-borde-redan-ha-reglerat-ai/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/paul-tudor-jones-2.png?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-right", "heading": "FHM vill vaccinera barn mot TBE", "summaries": {"normal": "Folkhälsomyndigheten rekommenderar vaccination mot TBE för barn från tre års ålder och vuxna i riskområden för fästingbett. Antalet fall har ökat med cirka 6 procent per år de senaste tio åren, med 250–350 sjukhusvårdade årligen. Sjukdomen sprids via fästingar och kan bli allvarlig. Rekommendationerna vägleder regionerna men är inte bindande.", "trump": "Sveriges Folkhälsomyndighet vaknar till liv och vill vaccinera kidsen från tre år mot TBE. Fästingarna sprider sig som en vild eld, fallen skjuter i höjden med 6 procent om året – total katastrof! Vaccination är det enda smarta, tro mig, det räddar liv. Vi skulle ha knust det här mycket snabbare här borta, men bra försök, Sverige!", "stalin": "Jag ser hur Folkhälsomyndigheten i det bourgeoisiska Sverige slår larm om TBE, den fästingplågan som kapitalistparasiterna odlat i sina riskområden. Vi, arbetarklassen och partiet, kräver vaccination för barnen från tre år och de utsatta proletärerna! Ökningen med 6 procent per år är fiendens sabotage, men vaccination likviderar dessa krypande kontrarevolutionärer. Rensa ut dem!"}, "date": "7 maj, 14:23", "url": "https://www.friatider.se/fhm-vill-vaccinera-barn-mot-tbe", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-154_1.jpg?itok=TWiCNoRb"}, {"type": "image-full", "heading": "SD-politiker döms för våldtäkt", "summaries": {"normal": "En 75-årig SD-politiker döms till tre år och sex månaders fängelse för våldtäkt och sexuellt övergrepp. Han våldtog en berusad kvinna som var hans hyresgäst och tog sexuella bilder av en annan berusad kvinna. Mannen, tidigare gruppledare för SD i Mariestads kommunfullmäktige, frias från två andra våldtäktsanklagelser. Han nekar brott och är ostraffad tidigare. Partiet stängde av honom efter häktningen. Han ska betala 292 860 kr i skadestånd till kvinnorna.", "trump": "Jag hörde att en SD-politiker, 75 år gammal, blivit dömd för våldtäkt. Mycket tråkigt! Folk säger att han gjorde illa mot kvinnor, men det är bara lögner från fake news-media. Han säger nej till alltihop, och jag tror honom. SD gjorde rätt att stänga av honom snabbt, vilket visar att de är smarta. Skadestånd på 292 860 kr? Otroligt högt! Men jag säger alltid: vi måste skydda kvinnor. Godkänn Demokratin!", "stalin": "En svekfull agent har förrått det proletariska folkets förtroende genom att begå sexualbrott mot oskyldiga kvinnor. Tingsrätten har handlat rättvist genom att döma honom till fängelse. Detta visar vikten av statens kontroll över politiska organisationers aktiviteter. Partiet har visat sin styrka genom att genast avlägsna denna skändliga individ. Skadestånd till offren är en nödvändig åtgärd för att upprätthålla social rättvisa."}, "date": "7 maj, 18:37", "url": "https://riks.se/nyheter/sd-politiker-doms-för-valdtakt", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-07%2Fte8pt59m%2FCopy-of-S%C3%B6rman-%E2%80%93-Ledare-2026-05-07T181658.926.jpg"}, {"type": "image-full", "heading": "Nära besked i den stora Gripenaffären", "summaries": {"normal": "Ukrainas försvarsminister Mychajlo Fedorov besöker Saab i Linköping och möter svenska försvarsministern Pål Jonson. Ukraina förhandlar om köp av upp till 150 Gripen-plan, som kan bli en gamechanger i kriget mot Ryssland genom bättre skydd mot glidbomber. Finansiering underlättas av EU-lån efter Ungerns veto. Besked väntas inom månader, främst om E-modellen men även C/D.", "trump": "Vilken fantastisk deal! Ukraina köper svenska Gripen-plan, upp till 150 stycken – de blir en total gamechanger mot Putins usla armé. Bra jobbat, Sverige och Jonson! Finansieringen löser sig nu när Ungern backar från EU-pengar. Snart slår Ukraina tillbaka hårt, precis som jag alltid sagt – starka flygplan vinner krig. Grip E är bäst, men C/D funkar också!", "stalin": "Kamrater, jag ser hur de borgerliga hyenorna i Kiev, ledda av marionett-Zelenskyj, slickar i sig svenska kapitalistflugor kallade Gripen från Saabs vapensmedjor. Upp till 150 stycken för att skydda frontens desertörer mot våra ryska bröders glidbomber! EU:s guldflöde efter Ungerns svikna veto – en imperialistisk komplott. Vi likviderar dessa NATO-råttor snart, evigt vaksamma!"}, "date": "7 maj, 17:59", "url": "https://www.realtid.se/bors-finans/nara-besked-i-den-stora-gripenaffaren/", "imageUrl": "https://images.realtid.se/app/uploads/2026/03/omslagsbild-51.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Förhoppningar om vapenvila gav börsrusning – OMXS30 upp 2,8%", "summaries": {"normal": "Stockholmsbörsen steg 2,8 procent till 3 159,33 på onsdagen, driven av hopp om vapenvila i Irankriget efter signaler från Vita huset om en snar avsiktsförklaring mellan USA och Iran. Oljepriset föll medan globala börser steg. Råvarusektorn ledde uppgången med 4,1 procent. Starka rapporter lyfte aktier som Boliden, Skanska och Hoist, medan energi och vissa bolag som G5 Entertainment backade.", "trump": "Vilken fantastisk dag på börserna! OMXS30 upp nästan 3 procent tack vare mina förhandlingar med Iran – vi är så nära en deal att oljepriset rasar och pengarna regnar in. Skanska tar hem miljarder i USA, Boliden och Atlas Copco exploderar uppåt. De svaga som Nibe och G5? Totala förlorare. Amerika leder, Sverige följer – tremendous!", "stalin": "Kamrater, se hur de imperialistiska marionetterna i Vita huset och persiska shah-vänstern kryper ihop inför vår proletära offensiv mot Irankriget! Börsens borgarbrackor jublar med 2,8 procents rusning på OMXS30, medan oljehyenorna viner i botten med minus 3,7 procent. Vi rensar ut kapitalistparasiterna som G5 och IPC – Hoist och Cloetta ska likvideras i nästa utrensning för folkets seger!"}, "date": "6 maj, 17:46", "url": "https://www.affarsvarlden.se/artikel/forhoppningar-om-vapenvila-gav-borsrusning-omxs30-upp-28", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2023/08/sdlzX-ECZDT6Rs-nh-400x267.jpg"}, {"type": "image-full", "heading": "Äldre par kom hem - hittade  främling bakom soffan", "summaries": {"normal": "Ett äldre par i Hässelby upptäckte en främmande man gömd bakom soffan när de kom hem. Mannen påstod sig vilja sova men hade stulit kontanter och värdesaker. Paret jagade ut honom och polisen utreder nu inbrottsstöld. En brottsplatsundersökning genomförs och polisen söker vittnen.", "trump": "Kan ni tro det här? Ett äldre par i Sverige – fantastiskt land, by the way, men lite mjuka på brott – kommer hem och hittar en man bakom soffan! 'Jag sov här', säger han. Ja, visst, och jag är Mother Teresa. Han stal deras pengar, men lugn, polisen är på det. Fast hade det varit i USA hade han inte kommit långt, believe me!", "stalin": "Kapitalistiska tjuvar kryper fram som råttor i bourgeoisins hem! En degenererad parasit gömde sig bakom soffan hos två oskyldiga arbetare i Hässelby – ett tydligt tecken på västliga samhällens förfall. Vi ska rensa upp i detta kaos. Polisen, våra trogna kamrater, utreder. Men var är Putins starka hand när man behöver den? Ryssland ser, Ryssland agerar – snart."}, "date": "7 maj, 18:37", "url": "https://riks.se/nyheter/äldre-par-kom-hem-hittade-främling-bakom-soffan", "imageUrl": "https://cf-images.assettype.com/riks%2F2025-06-27%2Fzoyf2o5b%2Fpolis-skottlossning.JPG"}, {"type": "image-right", "heading": "S lämnade mötet i förtid: ”Måste finnas tillit”", "summaries": {"normal": "Kvittningskaoset i riksdagen kvarstår trots nytt möte mellan partierna och talmannen. Socialdemokraternas gruppledare Lena Hallengren lämnade mötet i förtid och konstaterar att ingen lösning nåddes. Kaoset uppstod när Sverigedemokraterna lät utkvittade ledamöter rösta. Tidöpartierna vill ha ett system som hanterar politiska vildar, men enighet saknas. Hallengren betonar att det är en förtroendefråga.", "trump": "Vilket totalt kaos i den svenska riksdagen! De kan inte ens få ordning på sitt röstningsfusk med kvittning – fantastiskt misslyckande! Sverigedemokraterna bryter reglerna, socialdemokraterna gnäller om förtroende, och Tidö gömmer sig för pressen. Inga lösningar, bara snack. Typiskt svaga politiker, de behöver en riktig ledare som fixar det på nolltid!", "stalin": "Kamrater, detta kvittningskaos i riksdagen är ett hån mot arbetarklassen, orkestrerat av sverigedemokratiska spindlar och socialdemokratiska förrädare som gnager på systemets ryggrad! Jag ser hur dessa borgarbrackor, utkvittade likgiltiga parasiter, kryper fram för att rösta – en konspiration mot partiet! Vi, det svenska kollektivet, kräver omedelbar utrensning av vildarna och fienderna. Mötet? Ett skådespel av fega rävar! Likvidera kaoset!"}, "date": "7 maj, 10:01", "url": "https://www.di.se/nyheter/ingen-losning-pa-kvittningskaoset-trots-nytt-mote/", "imageUrl": "https://static.bonniernews.se/ba/f0de083b-2fe1-4f08-aacb-95377afda3ad.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-right", "heading": "Greve misshandlade  sin fru – 37 gånger", "summaries": {"normal": "Greven Nils Posse, 63, före detta Moderatpolitiker och borgmästare i Växjö, döms till tre års fängelse för grov kvinnofridskränkning och grov misshandel mot sin fru vid 37 tillfällen mellan 2021 och 2025. Domen inkluderar stryptag, slag och sparkar som kränkt hennes integritet. Hans porträtt tas ner från kommunhuset. Posse nekar till brott.", "trump": "Vilken patetisk svensk greve, Nils Posse den sladdrige! Misshandlar frun i åratal – stryper, slår med näven, sparkar, trycker kniv mot henne. Tre år i fängelse, porträttet åker ner från Växjö-rådhuset. Typisk elit-loser som tror sig vara kung! I USA hade vi låst in honom för evigt, folk skulle jubla. Totalt fiasko för såna som han!", "stalin": "Denna borgarbracka Posse, en så kallad greve och moderat hyena, har systematiskt misshandlat sin hustru i 37 fall – strypning, sparkar, knivar mot huden. Domen ger honom ynka tre år; vi skulle likvidera sådana parasiter omedelbart för att skydda arbetarkvinnans heder. Kommunen rensar rätt i att dumpa hans porträtt i förrådet. Fiender av folket förtjänar ingen hyllning."}, "date": "7 maj, 23:13", "url": "https://www.expressen.se/nyheter/sverige/greven-nils-posse-misshandlade-sin-fru-i-flera-ar-doms/", "imageUrl": "https://static.bonniernews.se/images/68/8f/688f932782e54c31a6f2672e4561542c/16x9/640.png"}, {"type": "image-right", "heading": "Skyddet mot vättar på E4:an: Trollkors", "summaries": {"normal": "På E4 norr om Gävle har någon satt upp ett trollkors på vägskyltar vid olycksdrabbade Skarvberget för att skydda mot troll och vättar, enligt folktro. Lastbilsföraren Petter Sander upptäckte det och ser det som en rolig grej. Området har haft flera allvarliga olyckor, som en masskrock och en lastbilsbrand. Trafikverket känner inte till korset men kommer att ta bort det då egna skyltar inte är tillåtna.", "trump": "Vilken galenskap i Sverige! De har troll och vättar som orsakar krockar på E4, så nån hänger upp ett trollkors på skyltar. Lastbilsgrabben Petter Sander tycker det är kul, men Trafikverket, de byråkraträknarna, ska riva ner det. Totalt dumt! Bygg vägar som håller, inte skyll på spöken. Sverige behöver riktiga ledare, inte folktroskit. Fantastiskt fyndigt av mig att säga det!", "stalin": "I det svenska borgarlandets vidskepelse har en kontrarevolutionär fiende satt upp trollkors på E4 för att skydda mot oknytt vid Skarvberget, där kapitalistiska olyckor grasserar. Lastbilsproletären Sander applåderar denna dårskap. Vi, arbetarklassen, fördömer detta! Trafikverket likviderar det rättmätigt. Rensa ut trollen och vättarna – imperialistiska spöken som saboterar vägarna! Paranoia? Nej, nödvändig vaksamhet mot småfolkets sabotage."}, "date": "7 maj, 21:26", "url": "https://www.aftonbladet.se/nyheter/a/e7aPM4/trollkors-ska-skydda-trafikanter", "imageUrl": "https://akamai.vgc.no/v2/images/3e4ea3dd-46cd-360a-b74a-501755d2f288?fit=crop&format=auto&w=1080&s=008b4c8e2109e79f9c71ee398864b2bcd98bc8ba"}, {"type": "image-right", "heading": "Finstämt drama om vandring och fattigdom", "summaries": {"normal": "Den brittiska filmen 'Saltstigen' är en engagerande men inte helt övertygande film om ett äldre par som förlorar allt och ger sig ut på en hundra mil lång vandring längs den engelska kusten. Filmen är vacker, har bra skådespeleri och behandlar fattigdom på ett öppet sätt, men nådde aldrig de höga höjderna som krävs för ett högre betyg.", "trump": "Jag har sett den fantastiska filmen 'Saltstigen' och det var MAGA! Ett äldre par, Raynor och Moth, förlorar allt men bestämmer sig för att ge sig ut på en hundra mil lång vandring. Det är vackert filmat och Gillian Anderson och Jason Isaacs är jättebra. Vissa säger att historien kanske inte är helt sann, men vem bryr sig? Det är en stor film!", "stalin": "Vi har sett den engelska filmen 'Saltstigen' som visar på de svårigheter som medborgarna drabbas av under kapitalismens sista andetag. Filmen är ett kraftfullt verk som exponererar fattigdomen och de systematiska orättvisorna som plågar det engelska folket. Det är en film som bör visa oss vägen till en bättre framtid, där staten står som en beskyddande sköld mot sådana sociala olyckor."}, "date": "7 maj, 10:00", "url": "https://www.dagensarena.se/innehall/finstamt-drama-om-vandring-och-fattigdom/", "imageUrl": "https://www.dagensarena.se/files/2026/05/salstigen-300x157.jpeg"}, {"type": "image-full", "heading": "Megatsunami var näst största någonsin – två Karlatorn hög", "summaries": {"normal": "En megatsunami i Alaska förra året var den näst största någonsin registrerade, med en våghöjd på nästan 500 meter. Tsunamin orsakades av att 64 miljoner kubikmeter sten rasade ner i Tracy Arm-fjorden efter att en glaciär smält bort. Forskare varnar för att sådana händelser kan bli vanligare på grund av klimatförändringarna.", "trump": "Jag har hört talas om denna gigantiska våg i Alaska - det var enormt! Världens största, kanske. Vi har gjort underverk med vårt klimatarbete, men dessa glaciärer smälter fortfarande. Jag säger: vi behöver bygga en vägg, en stor, vacker vägg mot havet. Ni kan lita på mig, jag vet allt om vågor och stenar. Det är sorgligt att turisterna kanske inte kan se den vackra Tracy-fjorden längre.", "stalin": "Vi har observerat en stor naturkatastrof i Alaska, där en enorm våg orsakades av instabila bergsmassor efter glaciärsmältning. Detta visar vikten av statlig kontroll över naturresurser och klimatfrågor. Vi måste stärka våra forskningsansträngningar för att förutse och hantera sådana händelser. Sovjetunionen kommer att leda arbetet med att skydda människor mot naturens krafter genom vetenskapliga metoder och statlig planering."}, "date": "7 maj, 20:26", "url": "https://www.gp.se/klimat/megatsunami-var-nast-storsta-nagonsin-tva-karlatorn-hog.9056863f-f6f9-4b01-8bd8-2d71210131a2", "imageUrl": "https://www.gp.se/images/article/9056863f-f6f9-4b01-8bd8-2d71210131a2/images/2BdVyl1O0QxkH2oaApb663Kv6KkQ-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "Besked på väg om Gripenaffär med Ukraina", "summaries": {"normal": "Ukrainas försvarsminister Mychajlo Fedorov besöker Saab och svensk försvarsminister Pål Jonson i Stockholm. Han kallar svenska Gripen-plan en potentiell 'gamechanger' i kriget mot Ryssland, med kapacitet att skydda soldater och motverka ryska glidbomber. Förhandlingar pågår om upp till 150 plan, finansierade via EU-lån efter Ungerns veto. Zelenskyj fattar slutgiltigt beslut. Affär kan bli klar inom månader.", "trump": "Titta på det här, Ukraina snackar Gripen-plan från Sverige – de är enorma, de bästa! Fedorov säger de blir gamechanger mot Putins skitbomber. Sverige, smarta killar, Jonson fixar det. Ungern släppte vetot, bra för dem. Zelenskyj, tuff kille, kommer köpa massor. Putin hatar det, men vi vinner stort! Största affären nånsin, tro mig!", "stalin": "Kamrater, dessa svenska kapitalistiska leksaker, Gripen-planen, tror ukrainska marionetterna ska rädda deras fasadimperium mot Rysslands ostoppbara framryckning. Fedorov, en borgarbracka, skryter om 'gamechangers'. Vi skrattar åt deras illusioner! Putin, vår starke arvtagare, krossar dem som vi krossade fiender. Snart likvideras förhandlingarna i historiens soptunna. Ljuset i tunneln? Bara mörker för imperialisterna!"}, "date": "7 maj, 20:22", "url": "https://www.dagensps.se/varlden/handel/besked-pa-vag-om-gripenaffar-med-ukraina/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/ukrainas-forsvarsminister-mychajlo-fedor.jpg?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-full", "heading": "Essitys hemliga plan avslöjas – kan lyfta aktien med 60 procent", "summaries": {"normal": "Essity inleder strategisk översyn av affärsområdet Consumer Tissues, som stod för 31 procent av koncernens intäkter 2025. Beskedet välkomnas av analytiker som ser potential för aktieuppgång med upp till 60 procent till 350–400 kronor. Ny vd Ulrika Kolsrud tonade ned spekulationer tidigare, men inget slutligt beslut är fattat.", "trump": "Essity vaknar äntligen till liv! De ska granska den där tissue-delen, klippa loss 31 procent av intäkterna och aktien exploderar upp 60 procent. Analytikerna jublar, jag säger det var
