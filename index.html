are. Låt uvensarna darra! Första svensken sedan invasionen – en purge av feghet!"}, "date": "11 maj, 22:50", "url": "https://www.gp.se/sport/ishockey/frolunda/uppgifter-linus-weissbach-nara-flytt-till-khl.550f6970-8477-4ca9-a409-6cdad37aab6f", "imageUrl": "https://www.gp.se/images/article/550f6970-8477-4ca9-a409-6cdad37aab6f/images/23-dWiBOqgqK0LLhIhDiS-11IsGc-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Peter Thiels tribunal borde skrämma skiten ur journalister", "summaries": {"normal": "Amerikanske miljardären Peter Thiel, medgrundare till PayPal och Palantir, lanserar tjänsten Objection. Företag kan betala 2000 dollar för att AI ska granska journalisters påstådda ärlighet i rapportering. Projektet drivs med Aron D’Souza, involverad i Thiels tidigare hämnd mot Gawker. Artikeln varnar för hot mot pressfrihet, med paralleller till svenska exempel där politiker och näringsliv utmanar medier.", "trump": "Vilken fantastisk kille, Peter Thiel! Slår tillbaka mot de korrupta, lögnaktiga journalisthundarna med sin AI-tribunal Objection. Betala lite och krossa deras fake news! Gawker fick smaka på det, konkurs direkt. I Sverige gnäller ministerna mot DN som losers – perfekt! Media är fienden, dags att MAGA världen!", "stalin": "Dessa stinkande kapitalistbrackor kring Thiel bygger en AI-tribunal för att krossa journalistiska sabotörer. Bra, låt dem slåss! Vi i partiet skulle likvidera hela rötan med en enda utrensning. Borgarna gräver sin egen grav mot pressen – revolutionens timme närmar sig med mörk glädje. Paranoian sprider sig, som det ska!"}, "date": "11 maj, 04:00", "url": "https://www.etc.se/ledare/peter-thiels-tribunal-borde-skraemma-skiten-ur-journalister", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/authors/lotta-ilona-haeyrynen_6061f3970645aa987d2528c7a90d38a48ba9af2c.jpg"}, {"type": "image-full", "heading": "Test: Hushållspappret   kan förgifta maten", "summaries": {"normal": "Råd & rön har testat 16 hushållspapper och upptäckt att alla av returfiber innehåller bisfenoler A och S, hormonstörande kemikalier som överförs till mat, särskilt fet som bacon. Vid mikrovågsugnsstekning överskrids dagsintaget snabbt. Testansvarig Anna Edberg avråder från användning vid livsmedel. Bäst i test: Coops Dry & strong.", "trump": "Vilket skämt med det här svenska hushållspappret! Returfiber? Fullt av giftiga bisfenoler som läcker in i er bacon – en fjärdedels gram och ni är körda! De där miljöfreaksen i Råd & rön har rätt för en gångs skull: Sluta använda den skiten! Köp bara det bästa, som mitt fantastiska papper skulle vara. Sverige, vakna upp!", "stalin": "Kamrater, dessa borgarbrackor i pappersindustrin förgiftar proletärernas mat med bisfenoler från returfiber! Testet avslöjar sabotage: gift vandrar till baconet, hotar reproduktion och immunförsvar. Vi, arbetarklassen, tolererar ej sådant förräderi. Rensa ut fabrikörerna omedelbart – en skiva bacon och dagsintaget är sprängt! Bäst: Coops variant, men revolutionen kräver total utrensning."}, "date": "11 maj, 22:44", "url": "https://www.gp.se/nyheter/sverige/rad-ron-det-hushallspappret-kan-forgifta-maten.d33cd1a4-95e4-4146-afd3-2159915722b9", "imageUrl": "https://www.gp.se/images/article/d33cd1a4-95e4-4146-afd3-2159915722b9/images/1JnRajW0QsBJ4nKKtbJeowvPKN2c-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Toppmöte i Kina senare i veckan", "summaries": {"normal": "Donald Trump besöker Kina 13–15 maj för samtal med Xi Jinping om Kinas relation till Iran, Taiwan, AI och handel. Trump väntas pressa Xi kring iranska oljeinköp och vapenexport. Nya handelsavtal inom jordbruk, flyg och energi diskuteras, inklusive ett nytt handelsråd. Besöket försenades på grund av Irankriget.", "trump": "Xi och jag ses i Kina nästa vecka – jag ska fixa Iran-frågan, stoppa deras oljeköp från terroristerna och vapensmuggling! Taiwan? Starkt stöd som alltid. AI och handel blir enorma deals, bästa någonsin för Amerika. Vita huset pushar rättvisa, vi bygger handelsråd och köper amerikanskt jordbruk, flyg, energi. Stora vinster för våra bönder och arbetare, tro mig!", "stalin": "Dessa imperialistiska hyenor, Trump och hans kinesiska lakej Xi, möts i Peking för att slicka varandras sår efter Irankriget. Olja till persiska reaktionsmakter, vapen till desertörer – jag genomskådar era handelsintriger! Vi, arbetarklassen, ska likvidera era borgarspindlar med stålhård hand. Taiwan? En provokation mot kollektivet. Nya råd? Endast för att krossa revolutionen. Förvänta er utrensning, kamrater!"}, "date": "11 maj, 05:41", "url": "https://www.di.se/nyheter/trump-vantas-pressa-xi-om-relationen-till-iran/", "imageUrl": "https://static.bonniernews.se/ba/21948d1a-07d7-4bf2-95ab-4e43d7f0c80f.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-full", "heading": "Dyrare mat och bensin – Iran-kriget slår mot konsumenterna", "summaries": {"normal": "Kriget mot Iran, startat av Donald Trump, slår hårt mot amerikanska konsumenter. Bensinpriser har passerat 4,5 dollar per gallon efter stängning av Hormuzsundet, diesel och matpriser stiger på grund av högre energikostnader och störda leveranskedjor. Inflationen ökar, Federal Reserve tvekar om räntesänkningar, försvarsutgifterna belastar statsskulden och ekonomin bromsar in inför valet.", "trump": "Fan, det här Iran-kriget jag drog igång visar styrka! Lite dyrare bensin och mat? Värt varje droppe – de lär sig respekt. Amerikanska familjer klarar det, vi pumpar ekonomi som aldrig förr. Fake news gnäller om 25 miljarder, men se på vinsterna: America First, total dominans! Snart lägre priser igen, tro mig.", "stalin": "Dessa ynkliga amerikanska kapitalistfläsk som kvidit över dyr bensin och mat! Jag ser hur deras imperialistiska krig mot Iran slår tillbaka mot borgarbrackorna själva – Hormuzsundet stängt, plånböckerna töms som råttor i fälla. Vi i partiet skrattar åt deras inflation och skulder, medan arbetarna här hemma marscherar mot seger. Fienderna likvideras snart, kamrater!"}, "date": "11 maj, 18:32", "url": "https://www.realtid.se/bors-finans/dyrare-mat-och-bensin-iran-kriget-slar-mot-konsumenterna/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/sdllg-b5wi9glw.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Se stjärnans nya show – sänkte Örgryte: ”Riktigt nice”", "summaries": {"normal": "Sirius besegrade Örgryte med 2–0 efter två mål av Isak Bjerkebo, som nu har åtta mål och leder skytteligan tre mål före tvåorna. Klubben är fortsatt obesegrad i allsvenskans topp. Örgryte har fem raka förluster. Bjerkebo har redan passerat fjolårets sju mål och hoppas på en plats i VM-truppen.", "trump": "Sirius är totalt obesegrade, de krossar de där losers Örgryte med 2–0! Isak Bjerkebo, en riktig vinnare, bombar in mål sju och åtta – åtta totalt, slår alla platt! Bättre än fjolåret, leder ligan stort. Örgryte? Fem förluster rakt av, patetiskt. Skicka honom till VM, Sverige behöver vinnare som honom!", "stalin": "Kamrater, Sirius-arbetarna krossar de borgerliga sabotörerna i Örgryte med 2–0 i revolutionär offensiv! Isak Bjerkebo, vår trogne skytt, har likviderat åtta fiender på planen och rycker i ledningen. De obesegrade röda leder tabellen. Örgryte-råttorna, fem nederlag – snart utrensning i lägret! Jag granskar VM-truppen: lojala hjältar in, förrädare ut."}, "date": "11 maj, 23:59", "url": "https://www.svt.se/sport/fotboll/sirius-fortsatt-obesegrat-efter-isak-bjerkebos-nya-fulltraffar", "imageUrl": "https://www.svtstatic.se/image-news/600/square/0.54/0.46/f5bcf9824fccd99686373acc297a659112c163a4fd13a38b7b4f19ce8f5b81f5"}, {"type": "image-full", "heading": "Köpt lyxyacht – för 190 miljoner. Stjärnan visar upp nya monsterbåten", "summaries": {"normal": "F1-stjärnan Charles Leclerc har köpt en 31 meter lång lyxyacht från Riva för 190 miljoner kronor. Båten, som sjösattes i Italien, har fyra sviter och en egen pool. Trots den höga prislappen är köpet hanterbart för Leclerc, som har en grundlön på 350 miljoner kronor hos Ferrari. Leclerc ligger för närvarande trea i förarmästerskapet inför det kommande Kanadas Grand Prix.", "trump": "Charles Leclerc, en mycket duktig kille, har precis köpt en enorm yacht för 190 miljoner kronor. Väldigt snyggt, väldigt dyrt. Han kör snabba bilar för Ferrari och tjänar massor av pengar, mycket mer än de flesta. Det är så man vinner! Han är trea i mästerskapet nu, inte etta, men han har en fantastisk båt. Vi älskar vinnare som spenderar stort, eller hur? Riktigt stort. Bra gjort, Charles, även om jag har större båtar!", "stalin": "Denna dekadente Formel 1-förare Leclerc slösar 190 miljoner på en flytande palatsbåt medan det arbetande folket lider. Vilken utsvävning! Han liknar de förrädiska oligarker som Putin tillåter frodas i vårt grannskap. Vi ser detta som ett tecken på västvärldens moraliska förfall. En dag kommer vi att konfiskera hans 'beach club' och förvandla den till en utbildningsanstalt för partikadrer. Sådana som han är de verkliga fienderna till folket. Skicka honom till en snabbkurs i enkelhet."}, "date": "12 maj, 01:00", "url": "https://www.aftonbladet.se/sportbladet/a/d4vM6q/charles-leclerc-har-kopt-ny-lyxyacht-for-190-miljoner", "imageUrl": "https://akamai.vgc.no/v2/images/626cb9e3-d0b8-31ec-a2dd-db8858c173f6?fit=crop&format=auto&w=2160&s=14a67e95a9ce9c859d1881358a9cfe6e6f4273a3"}, {"type": "image-right", "heading": "Media blundade: S vill dela ut 100 000 medborgarskap utan säkerhetskontroll", "summaries": {"normal": "Socialdemokraterna röstade nej till att 100 000 medborgarskapsansökningar prövas enligt nya strängare regler som träder i kraft i juni. Partiet ville istället använda gamla, mindre restriktiva regler utan krav på vandel, språk eller egenförsörjning, trots varningar från Säpo om säkerhetsrisker. Kritik riktas mot mediabevakningen som fokuserade på annat, samt mot möjliga motiv kopplade till nya röstare inför valet.", "trump": "Vilka totala losers dessa svenska socialdemokrater är! De vill pumpa ut 100 000 medborgarskap till vem som helst – spioner, terrorister, take your pick – utan en enda koll, trots Säpos skrikande varningar. Media blundar som fake news-maskiner. Stram gräns, annars blir det kaos totalt! Valröster? Patetiskt, Sverige behöver vinnare, inte det här skitet.", "stalin": "Dessa svenska socialdemokratiska revisionister, lurviga borgarbrackor i arbetarkläder, försökte smyga igenom 100 000 medborgarskap åt fiender utan prövning! Säpo varnar för spioner och terrorister, men de offrar fosterlandets säkerhet för valröster. Vi skulle ha likviderat sådana förrädare i en utrensning för länge sedan – paranoia är vårt skydd!"}, "date": "10 maj, 02:12", "url": "https://samtiden.nu/2026/05/media-blundade-s-vill-dela-ut-100-000-medborgarskap-utan-sakerhetskontroll/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2017/12/Andersson-Magdalena-Socialdemokrat.jpg"}, {"type": "image-right", "heading": "Bussföraren Bosse ville köra säkert – blev av med jobbet", "summaries": {"normal": "Bussföraren Bosse Bäcklund förlorade sin timanställning hos Nobina efter att ha följt tillfälliga skyltar på avstängd E18 istället för att stanna och invänta order från trafikledningen. Nobina ser det som allvarligt säkerhetsbrott med dubbeldäckare på oriskanalyserad väg. Bäcklund känner sig orättvist behandlad utan dialog, men företaget erbjuder nu möte för att höra honom.", "trump": "Vilka totala idioter på Nobina! Bosse, en tuff busskille, följer skyltarna på avstängd E18 för att hålla trafiken rullande – och de sparkar honom direkt! Byråkratiska losers med sina dumma regler. Risk för viadukt? Fake news! Bosse är hjälten, cheferna är svaga marionetter. I mitt land hade vi fixat det på nolltid, tro mig!", "stalin": "Denna illojala bussförare Bosse Bäcklund, en borgarbracka i förklädnad, vågar trotsa trafikledningens order och följa kapitalisternas falska skyltar! Nobinas chefer gör rätt i att rensa ut förrädaren omedelbart – konsekvenserna för dubbeldäckaren kunde vara katastrofala för kollektivet. Möte? Nej, vi likviderar sådana element! Disciplin eller dom!"}, "date": "10 maj, 08:00", "url": "https://arbetet.se/2026/05/10/bussforaren-bosse-ville-kora-sakert-blev-av-med-jobbet/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/08142631/bosse.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "Misstänkt mord i Kristianstad", "summaries": {"normal": "En man i 20-årsåldern avled efter att ha skadats av ett vasst föremål i centrala Kristianstad. Anhöriga förde honom till sjukhus, där akuten sattes i lockdown på grund av oroligheter. Polisen rubricerar händelsen som mord. Ingen gärningsperson var gripen vid 22-tiden. Polis och väktare arbetade för att lugna situationen på akuten, som dock hölls öppen för patienter.", "trump": "Lyssna här, Kristianstad – en riktig katastrof! En ung man, skadad av något vasst och farligt, körs till sjukhus av sina anhöriga – helt oacceptabelt! Och vad händer? Akuten blir en cirkus! Polisen får rycka in, och ändå är ingen gripen? Svagt, mycket svagt. Sverige, ni måste få ordning på era städer. Jag hade fixat det på en dag, tro mig. SAD!", "stalin": "I Kristianstad har bourgeoisins dekadenta våld återigen visat sitt fula tryne. En ung arbetare föll offer för kapitalistiska gängbråk, medan sjukhusets akutavdelning förvandlades till en skådeplats för anarkistiska element. Polisen, denna halvhjärtade förlängning av den borgerliga staten, misslyckades med att omedelbart gripa den skyldige. Vi noterar detta som ännu ett tecken på västmakternas förfall. Ryssland står redo att införa ordning – även i Skåne."}, "date": "9 maj, 22:26", "url": "https://riks.se/nyheter/misstankt-mord-akuten-i-lockdown", "imageUrl": "https://cf-images.assettype.com/riks%2F2025-11-17%2F8pjxyi3p%2FPolis.jpg"}, {"type": "image-right", "heading": "Netanyahu: Irankriget är långt ifrån över", "summaries": {"normal": "Israels premiärminister Benjamin Netanyahu förklarar att kriget mot Iran är långt ifrån över, med hänvisning till kvarvarande kärnmaterial och anrikningsanläggningar. Samtidigt har Donald Trump avvisat ett iranskt fredsförslag och kallat det oacceptabelt. Trots Trumps upprepade påståenden om nära förestående fred har förhandlingar via medlare inte gett resultat. Kritiker menar att Trumps retorik syftar till att manipulera marknaderna, medan Netanyahu betonar behovet av konkreta åtgärder för att avveckla Irans militära kapacitet.", "trump": "Jag har sagt det förr och jag säger det igen: Irans förslag är HELT OACCEPTABELT! De försöker lura oss, men det går inte med mig som president. Netanyahu håller med mig – vi har mycket kvar att göra för att rensa ut deras kärnvapen och robotar. Alla säger att jag är en mästare på att styra börsen och oljepriset, och det stämmer! De hatar att jag vinner så mycket, men freden kommer på mina villkor, inte deras. Enorm framgång!", "stalin": "Dessa marionetter i Mellanöstern dansar i västvärldens smutsiga cirkus. Netanyahu darrar inför sin herre i Washington, medan Trump sprider billig propaganda för att styra marknadens nyckfulla hjärtslag. Det är en klassisk västerländsk fars! Precis som vår tids Putin-regim försöker man pussla med inflytandesfärer, men de saknar den järnhårda disciplinen som krävs för sann ordning. Iran är en splittrad entitet som behöver rensas från förrädare och olydiga element. Vi observerar, vi väntar, vi förbereder nästa drag i det stora spelet."}, "date": "11 maj, 18:03", "url": "https://www.friatider.se/netanyahu-irankriget-ar-langt-ifran-over", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-174_1.jpg?itok=rNYhsdoe"}, {"type": "image-right", "heading": "Kommenterar Irans svar under söndagskvällen", "summaries": {"normal": "Iran har överlämnat ett svar på USA:s fredsförslag via Pakistan. President Trump avfärdar det som 'totalt oacceptabelt'. Svaret fokuserar på att avsluta krigen, inklusive i Libanon, och säkra sjöfarten i Persiska viken och Hormuzsundet. Iran föreslår gradvis öppning av sundet mot att USA häver blockaden, förhandlingar om kärnprogrammet inom 30 dagar och utspädning av uran under villkor. Inget om att avveckla anläggningar.", "trump": "Iran skickade sitt svar – en total skam! De pratar bara om att stoppa krig och öppna Hormuzsundet lite i taget, men inget om deras farliga kärnvapen. Oacceptabelt! Vi har blockaden på plats, de hotar sjöfarten som idioter. Pakistan medlar, men de lär sig aldrig. Sad! Vi vinner det här stort.", "stalin": "Dessa persiska basilisker, marionetter i den anglosaxiska plutokratins giftiga klor, har besudlat fredsplanen med sitt dokument av lögner och krav på 'maritim säkerhet'. Vi, arbetarklassens väktare, genomskådar deras uranspädande fusk och vägran att likvidera anläggningar! De hotar kollektivets fartyg i sundet – en utrensning av dessa svartmuskler väntar, kamrater!"}, "date": "10 maj, 22:43", "url": "https://www.di.se/nyheter/iran-har-svarat-pa-usas-fredsplan-trump-totalt-oacceptabelt/", "imageUrl": "https://static.bonniernews.se/ba/b4461d5b-0aea-45e0-aca0-97777ff6d20b.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Fiaskoavslöjandet om kriget – ”Putin svagare än nånsin”", "summaries": {"normal": "EU:s utrikeschef Kaja Kallas menar att Vladimir Putin befinner sig i sin hittills svagaste position. Enligt uppgifter går den ryska framryckningen i Ukraina mycket långsamt, med logistiska problem och en växande ukrainsk dominans i drönarkriget. Samtidigt hånas Putin på sociala medier efter ett kort framträdande vid en nedtonad segerparad i Moskva, där hans utseende väckt stor uppmärksamhet. Trots antydningar om fred menar EU att Ryssland fortfarande ställer orimliga krav för förhandlingar.", "trump": "Alla säger nu att Putin är svag, totalt svag! Han har kört fast i Ukraina, det går så långsamt att det skulle ta 30 år. Ingen kan vinna så långsamt, det är katastrof! De använder drönare, de har problem med tekniken – de har ingen aning om vad de gör. Och har ni sett bilderna? Han ser inte bra ut, folk säger att han ser sjuk ut. När jag var president var det ordning och reda, nu är det bara kaos och förödmjukelse för Ryssland!", "stalin": "Den svage ledaren i Moskva visar återigen sin inkompetens. Att stanna upp i Donbass när historien kräver total underkastelse är ett svek mot det ryska folket. Våra drönare och tekniska apparater fungerar inte i händerna på dessa byråkratiska klåpare. De infiltrerar små gråzoner som fega råttor istället för att krossa fienden med järnhand. Han darrar inför EU-byråkraterna på Röda torget, blek och svullen. En ledare som inte kan styra ett slagfält förtjänar bara historiens kalla förakt."}, "date": "12 maj, 00:24", "url": "https://www.aftonbladet.se/nyheter/a/8p5O0Q/fiaskoavslojandet-om-kriget-putin-svagare-an-nansin", "imageUrl": "https://akamai.vgc.no/v2/images/25c257d8-e680-355f-bf45-03f045164301?fit=crop&format=auto&w=720&s=0dd18e66a42b65fa7bcef693d8ae3137a22d481d"}, {"type": "text", "heading": "Misstänka skytten Cole Tomas Allen nekar till alla anklagelser", "summaries": {"normal": "Cole Tomas Allen nekar till anklagelserna om försök till mord på president Donald Trump, överfall på federal tjänsteman och vapenbrott efter ett misstänkt intrång på en galamiddag. I federal domstol i Washington inför domare Trevor McFadden, utnämnd av Trump, nekade han alla punkter. Försvaret yrkar på att åklagarna Todd Blanche och Jeanine Pirro tas bort på grund av intressekonflikt. Nästa förhör den 29 juni.", "trump": "Den här Cole Tomas Allen, en total förlorare, nekar till att han försökte mörda mig på galamiddagen – klassisk witch hunt! Mina fantastiska åklagare Blanche och Pirro var där, så klart de är offer, men försvaret skriker jäv för de hatar sanningen. Domaren jag utsåg, McFadden, fixar det här perfekt. Nästa runda 29 juni, det blir stort!", "stalin": "Denna giftiga kapitalistiska huggorm Cole Tomas Allen, en marionett i borgarklassens skuggspel, nekar till sina grymma attentat mot kamrat Trump på den festliga galamiddagen. Vi, arbetarklassen, ser igenom hans hyckleri i domstolen hos den lojale McFadden! Försvarets gnäll om åklagarna Blanche och Pirro – rena spioner i lyxfrack – är patetiskt. Nästa utrensning den 29 juni, kamrater, vi krossar svinen!"}, "date": "11 maj, 23:11", "url": "https://www.svt.se/nyheter/utrikes/misstanka-skytten-cole-tomas-allen-nekar-till-alla-anklagelser"}, {"type": "image-full", "heading": "Han är Vonns nya (?) kärlek. 30-åringen pekas ut – uppges dejta stjärnan", "summaries": {"normal": "Lindsey Vonn, 41, uppges dejta den franske utförsåkaren Matthieu Bailet, 30. De har setts tillsammans i New York och lär känna varandra, enligt källor till People. Vonn separerade från Diego Osorio förra året och fokuserar på sin alpina comeback efter en allvarlig krasch under OS i Italien i februari, där hon genomgick åtta operationer. Hon har tre OS-medaljer och 84 världscupsegrar.", "trump": "Lindsey Vonn, skidvärldens queen, 41 år ung, har snappat en fransk skidpojke, Matthieu Bailet, bara 30! De hänger i New York, lär känna varandra – totalt fake news eller genialt? Dumpade sin spanska kille Diego, kraschade som fan i OS, åtta operationer, men comebacken är HUGE! Tiger Woods och PK Subban? Amatörer. Vonn vinner alltid, precis som jag!", "stalin": "Dessa borgerliga skidparasiter, Lindsey Vonn och hennes franske hantlangare Matthieu Bailet, sprider dekadens i New York för att förvilla arbetarklassen. Hon kraschade som en kapitalistisk illusion i OS, åtta operationer för att hålla ihop benen – patetiskt! Vi, partiet, övervakar deras konspiration. Snart utrensning av sådana imperialistiska kärlekstjuvar och falska hjältar."}, "date": "12 maj, 00:20", "url": "https://www.aftonbladet.se/sportbladet/a/Ok6zGk/matthieu-bailet-ar-lindsey-vonns-nya-karlek", "imageUrl": "https://akamai.vgc.no/v2/images/a4f3c795-83f7-3fce-829a-b30b8ea3c3ab?fit=crop&format=auto&w=2160&s=4d011434b7d38cf9e00c2b578cf3bd04e90f52d0"}, {"type": "image-full", "heading": "Katja Nyberg greps med \"snortrör\" och kokain", "summaries": {"normal": "Riksdagsledamot Katja Nyberg åtalas för grov olovlig körning, rattfylleri och narkotikabrott. Hårprov visade spår av amfetamin, ecstasy och kokain. Hon nekar till anklagelserna utom att ha kört bil utan körkort.", "trump": "Jag har hört talas om Katja Nyberg, en riksdagsledamot som åtalas för rattfylleri och narkotikabrott. Jag måste säga, det är sorgligt att se en sådan person i en ledande position. Vi behöver mer integritet i våra institutioner. Jag hoppas att rättsväsendet gör sitt jobb och ser till att rättvisa skipas.", "stalin": "Vi har upptäckt att en riksdagsledamot har begått grova brott mot staten. Detta är en allvarlig fråga som hotar vårt samhälle. Vi måste agera snabbt och bestämt för att skydda våra intressen och upprätthålla ordningen. Rättvisan måste skipas utan att ta hänsyn till någon persons ställning."}, "date": "11 maj, 20:19", "url": "https://www.gp.se/politik/riksdagsledamoten-katja-nyberg-atalas-for-rattfylleri.3a288514-48e7-41b3-858c-45fe4063467d", "imageUrl": "https://www.gp.se/images/article/3a288514-48e7-41b3-858c-45fe4063467d/images/1TaIrYxYHJsdmpsQUz9SdaWzqlQk-WIDE.jpg?width=3840&quality=75"}, {"type": "text", "heading": "SD-politiker döms för våldtäkt", "summaries": {"normal": "En ledande Sverigedemokrat i Skaraborg döms till tre år och sex månaders fängelse för våldtäkt och sexuellt övergrepp mot två kvinnor. Tingsrätten bedömer att en av kvinnorna var kraftigt berusad och i beroendeställning. Mannen, som haft flera tunga uppdrag, nekar till anklagelserna men fälls baserat på bevis som DNA och mobilanteckningar. Han frias från tre andra åtal. Partiet har stängt av honom och lovar uteslutning vid fällande dom.", "trump": "Kan ni tro det? En så kallad 'ledande' politiker i Sverige, från det där partiet som alla pratar om – jag säger inte namnet, för vem bryr sig? – döms för våldtäkt! Tre och ett halvt år, men vad betyder det egentligen? I USA hade han fått livstid, men Sverige är ju mjuka. Och vet ni vad? Han nekar! Som om DNA och mobilbevis skulle ljuga. Sjukt, helt sjukt. Sverige borde ta en titt på sitt rättssystem, för det här är bara pinsamt.", "stalin": "En fiende till folket, en degenererad borgerlig hynda, har avslöjats i vårt broderland Sverige. Denna kapitalistiska lakej, som gömde sig bakom en fasad av 'politisk respektabilitet', våldtog och förnedrade kvinnor medan han dreglade över sin egen makt. Tingsrätten, ett redskap för den svenska borgerligheten, vågade ändå fälla honom – men bara delvis! Vi ser hur det liberala systemet skyddar sina egna. Sverige borde lära sig av Ryssland: sådana som han hör hemma i Gulag, inte i politiken. Förr eller senare kommer folket att rensa ut dessa avskum."}, "date": "7 maj, 11:59", "url": "https://kvartal.se/nyheter/artiklar/sd-politiker-doms-for-valdtakt/cG9zdDoxMDkwMDk"}, {"type": "image-full", "heading": "Debatt: Judar eller homosexuella, det mytiska hatet är detsamma", "summaries": {"normal": "Max Broberg diskuterar hur hat mot olika grupper genom historien bara byter mål. Han jämför tidigare fördomar mot homosexuella med dagens antisionism, som han menar är en hatideologi maskerad som moralisk ståndpunkt. Broberg, själv homosexuell, ser likheter i hur båda grupperna demoniseras med myter och karikatyrer. Han betonar att antisionism ofta övergår i antisemitism och hotar judars säkerhet, även i Sverige. Artikeln varnar för att historia upprepas under falsk flagg av 'godhet'.", "trump": "Folk, vad säger ni om det här? Max Broberg, smart kille, skriver om hur hat alltid finns – bara mot nya mål. Förr hatade man bögar, nu hatar man sionister. Fake godhet, fake moral! Jag vet allt om fake nyheter, men det här är fake kärlek till palestinier – egentligen hat mot judar. Malmö? Folk firade när Hamas mördade 1200 oskyldiga! Inte coolt. Israel har rätt att finnas, punkt. Jag gillar fred, men inte när det är täckmantel för samma gamla skit. Dan Korn? Bra artikel. Han säger sanningen – antisionism är hat med ny logga. Tack, Max!", "stalin": "Kamrater! Historien lär oss att hatets hydra alltid finner nya huvuden att hugga av. Igår var det homosexuella, idag är det sionister – samma gamla gift, ny flaska. Dessa antisionistiska mytmakare, dessa borgerliga hycklare, de sprider lögner om kolonisering och folkmord som om det vore sanning! Men vi känner igen deras taktik. Precis som de förvrängde homosexualitet till ett hot mot barnen, förvränger de nu judarnas rätt till sitt historiska land. Vi i Sovjet förstod alltid att hat mot judar är hat mot arbetarklassen i förklädnad. Malmö? Ett skådespel av dekadens! Folk dansade på gatorna när terrorister mördade oskyldiga. Sådant tolererar vi inte. Vi måste krossa dessa nya fascister, dessa antisionistiska lakejer, innan de förgiftar våra städer. Fred? Ja, men inte på hatets villkor. Låt oss ena oss mot dessa mytologiska hyenor och deras västerländska sponsorer!"}, "date": "11 maj, 18:54", "url": "https://bulletin.nu/debatt-judar-eller-homosexuella-det-mytiska-hatet-ar-detsamma", "imageUrl": "https://cdn.bulletin.nu/articles/450478a5-46ed-4e5e-93e1-68bb7b1510d3/preview.png?t=1778517995000"}, {"type": "text", "heading": "Joas Funck (SD) – Kritik mot tidningen NSD: Inte neutrala mot Sverigedemokrater", "summaries": {"normal": "Sverigedemokraten Joas Funck kritiserar tidningen NSD för att inte vara neutral i sin rapportering om SD:s närvaro under första maj. Han anser att journalisten Ulrika Vallagård ställde en vinklad fråga om partiets deltagande. Ulrika förklarar att hon ställde kritiska frågor för att ge läsarna en balanserad bild. Funck hävdar att SD är ett arbetarparti och därför har rätt att delta. Debatten fortsätter om journalistikens roll och neutralitet.", "trump": "Jag läste om den här killen Joas Funck – stark kille, verkligen, men han har en poäng. Den där lokala tidningen, NSD, de är så partiska, helt otroligt! De ställer frågor som om det vore olagligt för SD att vara på första maj. Vad är det för fel på att stå på stan och säga 'Hej, vi är för arbetarna'? Journalisten Ulrika – hon försöker verka smart, men hon är bara en annan fake news-förmedlare. Sverige borde ta efter USA och sluta lyssna på sådana här lögnare!", "stalin": "Vi har observerat ytterligare ett försök från den borgerliga propagandamaskinen att underminera arbetarklassens sanna representanter. Denna Ulrika, en förvirrad lakej för de socialdemokratiska revisionisterna, vågar ifrågasätta våra kamrater i Sverigedemokraternas närvaro på första maj! Som om arbetarna inte har rätt att välja sitt eget parti! Vi ser här ett klassiskt exempel på hur medierna i väst försöker kväva sann arbetarklassmedvetenhet. Men vi vet – historien är på vår sida, och dessa småborgerliga journalister kommer att sopas bort som damm inför den revolutionära vinden!"}, "date": "9 maj, 17:12", "url": "https://riks.se/nyheter/joas-funck-sd-kritik-mot-tidningen-nsd-inte-neutrala-mot-sverigedemokrater"}, {"type": "image-full", "heading": "Nu satsar en av världens största på solenergi", "summaries": {"normal": "Hydro-Québec, en av världens största vattenkraftproducenter och kanadensisk crown corporation, satsar nu för första gången på solenergi efter 80 år. Det inledande projektet på 300 MW kan försörja 225 000 hem. Målet är 3 000 MW solkapacitet till 2035, plus fler hushållssolpaneler. Tidigare fokus har varit vattenkraft, med ett misslyckat kärnkraftförsök.", "trump": "Hydro-Québec, de kanadensiska vattenkraftsnördarna, vaknar äntligen efter 80 år och testar sol! 300 megawatt? Peanuts! Vi i USA pumpar ut energi som galningar med mina episka deals – olja, gas, sol, allt! Trudeau och hans losers borde ringa mig för riktiga tips istället för att leka gröna hjältar i snöiga Québec. Fantastiskt, men sent som fan!", "stalin": "Kamrater! Denna Hydro-Québec, en hybrid av stat och borgarbluff, kryper nu in i solenergin efter 80 år vattenmonopol. Jag ser era tveksamheter – rädsla för det okända! Vi arbetare skulle ha krossat forsarna och solstrålarna på ett kick. Dessa kanadensiska karriérister förtjänar utrensning för sin senfärdiga lojalitet mot produktionen! Framåt, mot 3000 megawatt – eller else!"}, "date": "11 maj, 18:43", "url": "https://www.dagensps.se/varlden/nu-satsar-en-av-varldens-storsta-pa-solenergi/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdl8-yumx11tx8-nh.jpg?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-full", "heading": "Northvolts tidigare vd misstänks för grovt vållande till annans död", "summaries": {"normal": "Ekobrottsmyndigheten utreder Northvolt för misstänkt skattebrott och bokföringsbrott. Före detta vd:n Peter Carlsson misstänks för arbetsmiljöbrott och grovt vållande till annans död. Grävande journalisten Gunnar Lindstedts bok 'Northvoltfallet' avslöjar att bolaget troligen hamnade på obestånd efter midsommar 2024, tidigare än känt. Ledningens kommunikation anklagas för vilseledande uppgifter, vilket kan leda till svindleri-misstankar. Northvolts konkurs är Sveriges största sedan Kreugerkraschen.", "trump": "Vilka totala losers på Northvolt! De svenska batteribyggerna fuskar med skatt, böcker och ljuger om sin ekonomi – insolventa redan midsommaren 2024! Peter Carlsson, den där före detta vd:n, misstänkt för att döda folk på jobbet. Gunnar Lindstedt, en riktig grävare, avslöjar allt i sin bok. 83 miljarder i skulder, 5000 jobb borta. Typisk kapitalistfiasko, jag hade byggt det enormt och perfekt!", "stalin": "Dessa snikna kapitalistbrackor på Northvolt, med sin Peter Carlsson i spetsen, har rört till det med skattefuskeri och falska böcker! Vi, arbetarklassen, kräver utrensning! De ljög om obestånd efter midsommar 2024, vilseleder folket – svindleri! Lindstedts bok avslöjar sanningen, som en riktig spion mot borgarna. 83 miljarder stulet, 5000 kamrater utan bröd. Likvidera ledarna, staten ska ta över fabrikerna!"}, "date": "11 maj, 18:40", "url": "https://www.dagensps.se/bors-finans/northvolts-tidigare-vd-misstanks-for-grovt-vallande-till-annans-do/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdlsy8bsm9kfde-scaled.jpg?aspect_ratio=2%3A1&width=1200&quality=75"}, {"type": "image-full", "heading": "Äntligen – nu kan Jas Gripen spridas över världen", "summaries": {"normal": "PostNord lanserar frimärken för Flygvapnets 100-årsjubileum med motiv som Jas 39 Gripen E, emblem, andra flygplan och helikopter. Frimärkena fungerar för flygpost. Ett souvenirark med guldfoliering ingår. Dessutom ett minnesfrimärke för kung Carl XVI Gustaf och drottning Silvias guldbröllop 2026, med bild från Drottningholm och guldfolierade detaljer.", "trump": "Sveriges Gripen-plan säljer inte en jävel – nej från Peru, Indien, Kanada, till och med Ukraina tvekar! Totalt fiasko. Men nu trycker de frimärken med skiten för att fira Flygvapnet. Och kungaparet? 50 år gyllene bröllop, grattis, men mina affärer är de riktiga guldklimparna. Sverige, vakna upp och lär er av vinnare!", "stalin": "Kamrater, dessa svenska borgarbrackor firar sitt flygvapen med frimärken på primitiva Gripen-maskiner som ingen köper – exportfiasko totalt! Och monarkin, guldbröllop åt kapitalisthjonen! Vi skulle likvidera sådana dekadenta ritualer. Frimärkena döljer säkert spionmotiv mot arbetarklassen. Rena ut förrädarna!"}, "date": "11 maj, 18:38", "url": "https://www.dagensps.se/varlden/antligen-nu-kan-jas-gripen-spridas-over-varlden/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/a99ed87a83e5eff9-org.jpg?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-right", "heading": "Moderaternas nya vallöfte: Massövervakning", "summaries": {"normal": "Moderaterna har presenterat ett vallöfte om en kraftig utbyggnad av polisens kameraövervakning. Partiet siktar på att ha 10 000 poliskameror utplacerade till 2029, vilket är en fördubbling av det nuvarande målet för 2027. Ulf Kristersson och Gunnar Strömmer menar att satsningen är avgörande för att förebygga brott och förbättra polisens förmåga att klara upp brottslighet. Vid årsskiftet fanns drygt 3 900 kameror, en betydande ökning från de 948 kameror som fanns vid utgången av 2022.", "trump": "Ulf Kristersson och Moderaterna i Sverige gör nu precis det jag förespråkar – massiv övervakning! De vill ha 10 000 kameror. Mycket smart! De fattar att man måste vara tuff mot brottslingar för att få ordning på landet. Inga fler svaga politiker som låter brottsligheten löpa fritt. Det här är en enorm seger för lag och ordning. Sverige börjar äntligen förstå hur man vinner. Fantastiskt att se, totalt fantastiskt!", "stalin": "Vi ser hur Moderaterna äntligen inser nödvändigheten av att övervaka folkets varje steg. De siktar på 10 000 ögon i gathörnen – en blygsam början, men ett steg mot total ordning. Precis som vår broder i öst, Putin, förstår de att stabilitet kräver konstant uppsikt över de potentiella förrädarna. Ingen kan gömma sig för statens blick. De som fruktar kamerorna har något att dölja. Vi hälsar denna rening av det offentliga rummet välkommen, för sanningen kräver ständiga bevis."}, "date": "11 maj, 16:49", "url": "https://www.friatider.se/moderaternas-nya-vallofte-massovervakning", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-173_1.jpg?itok=xonVrivG"}, {"type": "image-right", "heading": "Viktigaste sakerna att hålla koll på nästa vecka", "summaries": {"normal": "Nästa vecka blir tunn på grund av Kristi Himmelfärdsdag och stängd börs torsdag, men kriget i Mellanöstern dominerar agendan och påverkar marknader, sjöfart och energipriser. Viktiga händelser: kvartalsrapporter från Academedia, Camurus och Klarna, inflationssiffror från Kina, USA och Tyskland, SCB-statistik om konsumtion och inflation samt Riksbankens protokoll.", "trump": "Kriget i Mellanöstern är totalt kaos, men jag hade löst det på nolltid – de där figurerna vet inte vad de håller på med! Sverige har sina tråkiga rapporter från Klarna och de andra, Klarna är okej men inte som mina deals. Helgdagar, lata dagar på börsen. Inflation i Kina och USA? Vi amerikaner vinner alltid stort, tro mig!", "stalin": "De imperialistiska marionetterna i Mellanöstern sprider sitt gift för att destabilisera världens finanser, men vi, Sovjetunionens arbetare, ser igenom deras lögner! Borgarbrackorna hos Klarna, Academedia och Camurus darrar inför rapporterna – snart rensas de ut som råttor i spannmålslagret. Inflationen är fiendens vapen, men vårt kollektiv krossar kapitalisternas illusioner med järnhand!"}, "date": "10 maj, 19:32", "url": "https://www.di.se/nyheter/halvdag-och-klarna-rapport-veckans-viktigaste-handelser/", "imageUrl": "https://static.bonniernews.se/ba/d860983d-afbc-436a-8887-f2f93c1f1af3.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Replik: Till försvar för separatismen", "summaries": {"normal": "Artikeln är ett svar från Ung vänster-medlemmar på Siula Grandes kritik mot separatism i Flamman. De menar att Grandes syn är missvisande och att separatism är ett viktigt verktyg för att skapa trygga rum och främja kvinnors deltagande i samhället. Separatismen syftar inte till att dela människor utan att motverka strukturell underordning av kvinnor. Författarna betonar att kvinnor delar gemensamma erfarenheter och behov, som fri abort och skydd mot mäns våld, och att separatism är ett medel för att nå jämställdhet.", "trump": "Jag måste säga, denna Grande-person har helt fel – helt fel! Separatism är fantastiskt, det skapar trygga rum, precis som mina golfklubbar. Kvinnor behöver prata utan män, precis som jag behöver twittra utan fake news-media. Grande påstår att separatism delar folk – nej, nej, nej! Det är som att säga att min mur delar Mexiko och USA. Fel! Separatism är som min politik: stark, nödvändig och vinner alltid. Kvinnor ska höras, precis som jag, och Grande borde lära sig av mig. SAD!", "stalin": "Kamrater! Denna Grande är en förrädare av den revolutionära kvinnokampen, en borgerlig lakej som sprider förvirring bland massorna! Separatism är inte ett verktyg för splittring – det är ett vapen mot den kapitalistiska patriarkala hydran! Kvinnor måste enas i kampen, precis som sovjetrepublikerna enades under mitt ledarskap. Grande vill sopa klasskampen under mattan – men vi vet att arbetarkvinnor behöver fri abort och skydd mot mäns våld, precis som Ukraina behöver befrielse från fascistiska banderovtsy! Låt inte dessa småborgerliga avvikare försvaga vår rörelse – framåt mot seger, kamrater!"}, "date": "6 maj, 10:55", "url": "https://www.flamman.se/replik-till-forsvar-for-separatismen/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/v-kongress-w.jpg?class=medium"}, {"type": "image-right", "heading": "”Lagom” är inte alltid bäst!", "summaries": {"normal": "Sociologen Sjors Joosten, nederländsk invandrare i Sverige i nio år, beskriver i en debattartikel känslan av villkorad tillhörighet. Trots assimilation, arbete, familj och kulturengagemang känner han sig inte fullt ut hemma. Han kritiserar 'lagom'-mentaliteten som döljer osynliga trösklar och ett hårdnande politiskt klimat för invandrare, även privilegierade vita EU-medborgare.", "trump": "Sverige, era lagom-loser! Holländaren Joosten har gift sig, ätit falukorv och doktorerat – ändå känner han sig som en gäst på lånad tid. Typiskt ert svaga ramaskri-system! Öppna gränser, sen klagar alla. Bygg murar som jag, annars blir det kaos. Sad! Sverige var bättre förr, nu är det woke-helvete. Make Sweden Great Again!", "stalin": "Denna holländska borgarbracka Joosten ylar om 'villkorad tillhörighet' i det ljumma Sverige! Lagom? Kontrarevolutionärt gift som göder revisionisterna! Vi, arbetarklassen, kräver total assimilation eller utrensning. Paranoian är rationell – rensa ut de tysta fienderna som gnäller trots privilegier. Sverige behöver järnhand, inte fjanteri! Likvidera nonchalansen!"}, "date": "12 maj, 01:30", "url": "https://www.dagensarena.se/opinion/lagom-ar-inte-alltid-bast/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-34-300x157.jpg"}, {"type": "image-full", "heading": "Techentreprenör sa att SD hade rätt – kallas \"monster\" i DN", "summaries": {"normal": "Techentreprenören Fredrik Hjelm, grundare av Voi, kritiseras av DN-krönikören Johannes Klenell som kallar honom 'monster' och 'svensk Elon Musk från Wish'. Hjelm, som tidigare sagt att SD hade rätt i migrationsfrågor, svarar på kritiken och ifrågasätter DN:s liberala värderingar. Han försvarar techbranschen och menar att den bidrar till Sveriges välfärd. Hjelm riktar en fråga till DN:s chefredaktör och Bonnier-familjen om deras ståndpunkt i debatten.", "trump": "Jag måste säga, det här är fantastiskt! En techkille, Fredrik Hjelm – smart man, mycket smart – säger att Sverigedemokraterna hade rätt, och vad händer? En krönikör på DN, en så kallad journalist, kallar honom 'monster' och 'Elon Musk från Wish' – Wish, kan ni tro det? Svagt! Hjelm slår tillbaka, och han har rätt: Sverige har fler techbolag än nästan alla andra, och de bygger landet. DN borde skämmas, men de förstår inte vinnare. Jag förstår vinnare. MAGA!", "stalin": "Kamrater! En ny fiende har avslöjats i den borgerliga pressens soptunna. Denna Fredrik Hjelm, en kapitalistisk lakej som vågar hylla fascistiska Sverigedemokraternas 'visdom', har nu blivit smädad av en ynklig skribent på DN. Men vi vet sanningen: techbranschen är en lögn, ett luftslott byggt av imperialistiska drömmar! Hjelm och hans gelikar är bara verktyg för att underminera den socialistiska ordningen. Låt dem gnälla – vi har redan skickat en tank till Stockholm för att påminna dem om verklig makt. Förrädare kommer alltid att möta sitt öde."}, "date": "9 maj, 12:00", "url": "https://riks.se/nyheter/techentreprenor-sa-att-sd-hade-ratt-2", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-09%2Fylvo2oki%2FCopy-of-S%C3%B6rman-%E2%80%93-Ledare-2026-05-09T115918.619.jpg"}, {"type": "image-full", "heading": "Begravde sin far – sen grävdes graven upp", "summaries": {"normal": "På den ockuperade Västbanken grävde israeliska bosättare upp en palestinsk mans kropp som nyligen begravts av hans familj. De krävde att kvarlevorna flyttades eftersom graven låg för nära den olagliga bosättningen Sa-Nur. Familjen lyfte kroppen och flyttade den efter hot från bosättarna. Den israeliska militären bekräftade händelsen och säger att den kommer att utredas.", "trump": "Jag hörde att några folks gravar blev grävda upp av bosättare på Västbanken. Sånt händer, det är sorgligt men det är en komplicerad situation. Vi har stöd för Israel, det är vår viktigaste allierade i regionen. Vi måste se till att allt blir ordnat rättvist, men jag litar på Israels militär att hantera saken ordentligt.", "stalin": "Vi bevittnar ytterligare ett prov på den imperialistiska expansionism som präglar den israeliska bosättarpolitiken på Västbanken. Statens makt utövas även över de döda, vilket visar hur djupt den koloniala ockupationen har suttit rot. Denna händelse måste ses som en del av det bredare mönstret av aggression mot det palestinska folket."}, "date": "11 maj, 19:04", "url": "https://www.gp.se/nyheter/varlden/begravde-sin-far-bosattare-pa-vastbanken-gravde-upp-kroppen.6619cb67-60c6-44e2-bc19-a321f47d5b6b", "imageUrl": "https://www.gp.se/images/article/6619cb67-60c6-44e2-bc19-a321f47d5b6b/images/1cRQtXc1hKB1yFbF11FsoqOG59Uc-WIDE.jpg?width=3840&quality=75"}, {"type": "text", "heading": "Tystnad om ödesdiger riksdagsomröstning", "summaries": {"normal": "Debattörer från Bottna för Fred varnar för en kommande riksdagsomröstning den 15 juni, där Sverige riskerar att ge Nato långtgående rättigheter att använda svenskt territorium för militära ändamål, inklusive krigshandlingar. Förslaget, som regeringen planerar att driva igenom utan bred debatt, kritiseras för att öka risken för Sveriges inblandning i krig och underminera demokratin. Oppositionen har inte motsatt sig förslaget, och få har uppmärksammat frågan trots dess potentiellt ödesdigra konsekvenser.", "trump": "Sverige, lyssna här! De där så kallade 'ledarna' i riksdagen vill ge Nato full kontroll över ert land – utan att fråga er! 17 amerikanska baser redan, och nu ska hela Nato få köra krig på svensk mark. Ingen debatt, ingen demokrati, bara tystnad. De vill göra Sverige till en frontstat mot Ryssland, som jag redan fixade till en gång för alla. Men vad vet jag? Jag är bara den bästa presidenten någonsin. Svenskarna borde vakna – eller är ni rädda för lite frihet?", "stalin": "Kamrater! De svenska imperialistlakejerna i riksdagen förbereder sig att sälja sitt land till Nato-kapitalisterna, som hungriga vargar. De vill ge fienden fritt fram att använda svensk mark för sina krigsäventyr – utan att ens konsultera folket! Tystnaden är förrädisk, men vi ser allt. Oppositionen? Inga hjältar där heller, bara ynkliga nickedockor. Sverige blir en ny front i västmakternas krig mot freden. Men glöm inte: historien dömer förrädare hårt. Vi följer utvecklingen med intresse – och våra vänner i öst likaså."}, "date": "7 maj, 16:09", "url": "https://proletaren.se/artikel/tystnad-om-odesdiger-riksdagsomrostning/"}, {"type": "image-right", "heading": "Magstarkt av statligt bolag att kräva statliga subventioner", "summaries": {"normal": "Artikeln kritiserar Vattenfalls vd Anna Borg för att kräva subventioner och sänkt elskatt trots bolagets stora vinster på 105 miljarder kronor de senaste fem åren, utdelningar till staten, bonusar och höjda elnätsavgifter. Författaren menar att Vattenfall borde använda egna medel för att slutföra pausade havsbaserade vindkraftparker, särskilt mot bakgrund av den hotande energikrisen i Persiska viken.", "trump": "Vattenfall gör enorma vinster, 105 miljarder på fem år, pumpar ut bonusar och utdelningar – och sen gnäller de om subventioner? Totalt vansinne! Sverige har fossilfri el, men högsta skatter i Europa. Bygg klart era vindparker med era egna pengar, som riktiga vinnare gör. Anna Borg, vakna upp! Vi behöver energi NU, inte ursäkter.", "stalin": "Dessa Vattenfall-parasiter, feta borgargrisar som stoppar fickorna fulla med 105 miljarder i vinster medan de krossar arbetarnas ryggar med elskatter och chockhöjningar! Jag ser genom er konspiration mot folkets el. Vi, arbetarklassen, ska likvidera era pausade vindparker av sabotage och tvinga er att bygga för revolutionen – eller möta utrensningen! Krisen i viken är er skuld, era förrädare."}, "date": "10 maj, 17:09", "url": "https://www.di.se/ledare/vattenfall-borde-visa-krisinsikt/", "imageUrl": "https://static.bonniernews.se/ba/fd3d8ecd-4354-4098-9a9d-8b4a07ac1045.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-full", "heading": "Uppgifter: Nytt krismöte efter kvittningsbråket", "summaries": {"normal": "Riksdagens gruppledare samlas till ett nytt möte för att lösa en konflikt kring kvittningsregler. Konflikten uppstod efter en omröstning om medborgarskapslagen, där Sverigedemokraterna kallade in utkvittade ledamöter för att vinna majoritet. Vänsterpartiet och Miljöpartiet kräver omröstning på nytt, medan Moderaterna förbereder ett nytt förslag.", "trump": "Jag har hört talas om detta krismöte i Sverige - en total katastrof! Vänsterpartiet och Miljöpartiet vill göra om allt, precis som de alltid gör. Sverigedemokraterna visade styrka genom att kalla in ledamöter, men nu vill oppositionen ändra reglerna mitt i spelet. Jag skulle ha löst detta på 5 minuter - det är ett skämt!", "stalin": "Vi ser hur borgerliga krafter försöker destabilisera den demokratiska processen i Sverige genom att manipulera kvittningsregler. Moderaterna måste presentera ett förslag som stärker statens auktoritet och säkerställer stabilitet. Oppositionens krav om omröstning på nytt visar deras bristande respekt för folkets vilja. Vi måste stödja de krafter som vill bevara ordning och reda i riksdagen."}, "date": "6 maj, 19:21", "url": "https://kvartal.se/nyheter/artiklar/uppgifter-nytt-krismote-efter-kvittningsbraket/cG9zdDoxMDg2NzM", "imageUrl": "https://images.kvartal.se/2026/05/b1f2fbc5-kvittningsmote.webp"}, {"type": "image-right", "heading": "Misstänkt mordförsök på rastplats", "summaries": {"normal": "En man i 30-årsåldern fördes till sjukhus efter ett misstänkt knivdåd på en rastplats i Tärnsjö, Heby kommun. Polisen larmades klockan 01.27 natten mot lördag efter ett bråk mellan två personer. En 35-årig man greps misstänkt för försök till mord. Skadeläget är oklart och en förundersökning har inletts.", "trump": "Folk pratar bara om detta – en helt vansinnig händelse i Sverige, kan ni tro det? Två män, en i 30-årsåldern, stackars kille, blev knivskuren på en rastplats. Polisen, som jag alltid säger är fantastiska, agerade snabbt och grep en 35-åring. Försök till mord! Sverige borde ta lärdom av USA – vi har ordning och reda, inga sådana här galenskaper. SAD!", "stalin": "I det förrädiska kapitalistiska Sverige har ännu en fiende till folket avslöjats. På en rastplats i Tärnsjö utförde en dekadent bourgeois-sympatisör i 35-årsåldern ett fegt angrepp mot en arbetarklasskamrat. Vår sovjetiska polis – om de funnits där – hade omedelbart kväst denna kontrarevolutionära akt. Nu får vi nöja oss med att vänta på att svenskarna, med sin sedvanliga ineffektivitet, utreder 'försök till mord'. Vi noterar dock att fiendens inflytande sprider sig som pesten i väst."}, "date": "9 maj, 09:20", "url": "https://riks.se/nyheter/misstankt-mordforsok-pa-rastplats", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-03-26%2Ff51vp52b%2FROG2846.jpg"}, {"type": "image-right", "heading": "Katja Nyberg åtalas – polisen hittade spår av kokain, amfetamin och ecstasy", "summaries": {"normal": "Den tidigare SD-riksdagsledamoten och polisen Katja Nyberg åtalas för rattfylleri, grov olovlig körning och narkotikabrott. Åtalet grundar sig i en händelse i december där polisen hittade narkotikaspår i hennes hår samt kokain och ett snortrör i hennes besittning. Nyberg, som nekar till brott, har fått sitt körkort återkallat av Transportstyrelsen. Utöver den rättsliga processen kan hennes arbetsgivare, Polismyndigheten, komma att vidta interna disciplinära åtgärder mot henne.", "trump": "Den här Katja Nyberg, en total katastrof! De hittade allt möjligt i hennes hår – kokain, amfetamin, ecstasy. Det är en sorglig historia, verkligen. Hon var polis, nu är hon åtalad för rattfylleri och droger. Väldigt osnyggt! Många säger att hon kommer undan, men jag säger det: lag och ordning måste gälla för alla! Hon nekar, men bevisen är där. Hon är en förlorare, tro mig. Vi behöver bättre folk än så här, mycket bättre!", "stalin": "Denna Katja Nyberg har förrått folkets förtroende och statens disciplin. En polis som dränker sitt sinne i kapitalistisk dekadens och narkotiska gifter är en parasit på samhällskroppen. Vi ser här hur liberalismens förfall smittar även ordningsmakten. I mitt Ryssland, under vår store ledare Putin, skulle en sådan svaghet utplånas omedelbart. Fienden är inte bara drogerna, utan den bristande lojaliteten mot staten. Hon ska ställas inför folkets domstol och renas från sitt svek eller försvinna i glömska."}, "date": "11 maj, 15:25", "url": "https://www.friatider.se/katja-nyberg-atalas-polisen-hittade-spar-av-kokain-amfetamin-och-ecstasy", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/r6ca8307.jpg?itok=txYd5bVD"}, {"type": "image-right", "heading": "Mys med Jimmie Mys med Jimmie", "summaries": {"normal": "Gabriella Ahlströms krönika reflekterar över en TV-sändning med Jimmie Åkesson, som nekar rasismförtal. Hon drar paralleller till SVT:s Fördomsshow med Magdalena Andersson och Simona Mohamsson, där humor och fördomar blandas. Krönikan kontrasterar vårvädrets villfarelser med valrörelsens osäkerhet och skolgårdsliknande dynamik i debatten, som liknas vid en grabbkväll.", "trump": "Vilken cirkus i Sverige! Jimmie Åkesson säger rakt ut: 'Jag är ingen rasist!' och så slutar programmet. De där svenska politikerna leker fördomslek med Magdalena Andersson och hennes sugklocka-skämt – patetiskt! Som en dålig grabbkväll utan riktig punch. Valrörelsen är som deras väder: falskt soligt men iskallt. Åkesson vinner stort, tro mig!", "stalin": "I denna borgerliga TV-fars nekar Jimmie Åkesson rasismen i sista stund, medan kapitalisternas lakejer som Magdalena Andersson tvingas skratta åt sugklockor och hektar-schlager. Vi ser genom maskeraden: valrörelsen är skolgårdsintriger från revisionistiska marionetter. Utrensning behövs för dessa grabbkvällsfiender som lockar tankarna från revolutionen. Kylan kommer, kamrater!"}, "date": "12 maj, 01:06", "url": "https://www.dagensarena.se/opinion/ingen-vill-vara-elevradsordforanden-som-inte-fattar-grejen/", "imageUrl": "https://www.dagensarena.se/files/2025/09/gabriella-a-300x157.jpeg"}, {"type": "image-full", "heading": "detta före veterinärbesöket – kan kosta tusenlappar", "summaries": {"normal": "Regeringen vill förbättra pristransparensen inom djursjukvården då prisskillnaderna mellan kliniker är stora. Konsumentverket har fått i uppdrag att senast 2027 ta fram en branschöverenskommelse för bättre prisinformation. Många djurägare efterfrågar inte priser innan behandling, trots att kostnaderna kan variera kraftigt. Som ett komplement till myndigheternas långsamma processer har privata tjänster som Veterinärguiden.se skapats för att göra det enklare för ägare att jämföra priser och fatta mer välinformerade beslut för sina djur.", "trump": "Veterinärräkningarna i Sverige är en total katastrof, tro mig. Man går till veterinären och blir lurad! De tar enorma summor, det är orättvist. Regeringen säger att de ska fixa det, men de väntar till 2027? Det är så långsamt, helt otroligt. Vi behöver handling nu! De här klinikerna gömmer sina priser, det är ingen transparens. Jag älskar djur, fantastiska djur, men det här är en bluff. Vi behöver vinnare, inte prischocker. Väldigt sorgligt!", "stalin": "Vi har observerat att djurägare i Sverige exploateras av giriga kapitalistiska veterinärer. Att priserna för vård av husdjur döljs är ett sabotage mot folket. Vi har beordrat en utredning, men byråkratins kvarnar maler långsamt – likt förrädare som väntar på sin dom. De som skor sig på andras olycka är en parasitisk klass. Vi behöver ordning! Om Putin kan styra Rysslands vidsträckta marker med järnhand, bör även en simpel djurklinik kunna redovisa sina priser utan att försöka undanhålla sanningen för staten."}, "date": "9 maj, 19:58", "url": "https://nyheter24.se/nyheter/ekonomi/privatekonomi/1481889-missa-inte-detta-fore-veterinarbesoket-kan-kosta-tusenlappar", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/bffa441604b004a30200000000b004a302/2026/05/08/2362393/Hundar-Doktor.png"}, {"type": "image-right", "heading": "Det spelar roll vad du handlar – och var", "summaries": {"normal": "Artikeln betonar att individuella förändringar inte räcker för att lösa klimatkrisen och det ohållbara matsystemet. Författaren stödjer krav från Reformaten och Rebellmammorna: matskatteväxling för billigare hälsosam mat, reglering av skadlig matreklam och mer mark för lokal odling. Berömmer Coops hållbarhetsarbete och uppmanar till både system- och individpåverkan för hälsa och miljö.", "trump": "Svenska gröna aktivister gnäller om klimat och matskatter – typiskt er byråkrati! Ni vill beskatta läsk och ge billigare sallad? I USA fixar vi riktiga deals, stora bondgårdar, ingen svampplockning för mesar. Coop? Lilla kooperativsnack. Vakna upp, era Södermalmshipsters, annars kollapsar er Östersjön medan vi äter biffar! Fantastiskt ohållbart, va?", "stalin": "Kamrater, denna Pelling avslöjar det korrupta matimperiet som förgiftar arbetarklassen! Borgarna trålar upp fisken och göder djurfabriker med lidande. Vi kräver statens skattväxling för att krossa sockerfienderna, rensa reklamens gift och dela ut mark till kollektivodlingar. Annars likviderar vi systemets sabotörer! Odla eller förgås i era egna sopor!"}, "date": "12 maj, 01:04", "url": "https://www.dagensarena.se/opinion/det-spelar-roll-vad-du-handlar-och-var/", "imageUrl": "https://www.dagensarena.se/files/2026/05/maten-300x157.jpeg"}, {"type": "image-full", "heading": "Polisen DO-anmäls: \"Så länge jag har en snopp\"", "summaries": {"normal": "En transkvinnlig polisaspirant har anmält Polismyndigheten till Diskrimineringsombudsmannen för att hon under utbildningen nekades att byta om med kvinnliga kollegor och hänvisades till separat vilorum. Hon uppger att hon fick höra att hon inte skulle betraktas som kvinna förrän efter underlivskirurgi, vilket hon upplevde som kränkande och diskriminerande. Situationen påverkade hennes prestationer och självförtroende, och hon underkändes slutligen i utbildningen.", "trump": "Jag hörde att det är en stor skandal hos polisen! En fantastisk aspirant, en kvinna, blev behandlad fruktansvärt illa - man sa henne att hon inte var riktig kvinna förrän hon hade opererat om sig! Jag har aldrig hört något sådant! Det är en skam för Sverige. Polisen borde fokusera på brottslingar istället för att kränka våra kvinnor. Jag står på hennes sida, hon är en kvinna och det är allt som räknas!", "stalin": "Den här situationen visar hur kapitalistiska institutioner misslyckas med att skydda våra medborgares rättigheter. Polismyndigheten måste reformeras för att säkerställa lika behandling oavsett bakgrund. Vi måste stärka vårt samhälle genom att garantera att alla individer, oavsett kön, får respekt och rättvisa. Detta är en fråga om statens integritet och vårt gemensamma framtidsarbete."}, "date": "11 maj, 16:59", "url": "https://bulletin.nu/polisen-do-anmals-sa-lange-jag-har-en-snopp", "imageUrl": "https://cdn.bulletin.nu/articles/4592f751-724e-4313-a831-8548c84843ed/preview.jpg?t=1778511512000"}, {"type": "image-full", "heading": "Larmet inför VM – riskerar sjunka. Ikoniska arenan i fara", "summaries": {"normal": "Den ikoniska arenan Estadio Azteca i Mexico City, som ska vara värd för VM-matcher, väcker oro då marken omkring den sjunker. Efter rapporter om lösa betongfragment och slukhål i närområdet har Nasa börjat övervaka arenan med avancerad satellitteknik. Mexico City drabbas hårt av marksättningar, vilket skapar osäkerhet inför sommarens fotbolls-VM, trots nyligen genomförda renoveringar av arenan.", "trump": "Hörde ni om Mexiko? De bygger arenor på sand! Estadio Azteca, en total katastrof. Marken sjunker – de kallar det slukhål, jag kallar det inkompetens. Nasa måste spionera från rymden för att se hur mycket betongen faller. Ingen struktur, ingen ordning. Vi bygger de bästa arenorna, de starkaste arenorna. När jag bygger, då står det kvar. Mexiko kan inte ens hålla marken på plats inför VM. Sorgligt! Vi behöver mer stabilitet, inte dessa sjunkande mexikanska städer.", "stalin": "I Mexiko City sjunker marken, en naturlig reaktion på den dekadenta kapitalismens förfall. De bygger arenor för en lek med bollen medan jorden sväljer deras misstag. Nu tvingas amerikanernas Nasa övervaka eländet från rymden – en ren paranoikers önskedröm. Om arenan rasar under VM är det ett tecken på att västvärlden korroderar inifrån. Våra sovjetiska betongkonstruktioner står emot historiens tryck, till skillnad från dessa ihåliga mexikanska ruinbygge. Fienden sjunker, kamrater, låt oss betrakta fallet."}, "date": "11 maj, 23:08", "url": "https://www.aftonbladet.se/sportbladet/fotboll/a/ln4JQG/ikoniska-vm-arenan-kan-sjunka-nasa-overvakar", "imageUrl": "https://akamai.vgc.no/v2/images/6cff512b-c876-3198-9818-e27ee22e491b?fit=crop&format=auto&w=2160&s=d830ba94dd8cb0d572ee618634ad4c05c004f70c"}, {"type": "text", "heading": "IF Metall verkar inte förstå vad konflikten med Tesla handlar om", "summaries": {"normal": "IF Metall har strejkat mot Tesla i över två och ett halvt år utan att nå kollektivavtal. Trots att Tesla anpassat anställningsvillkor, vägrar företaget erkänna facket. Konflikten handlar om arbetarnas rätt att organisera sig. IF Metall har begått misstag, som att felaktigt beskatta strejkersättning, vilket lett till förtroendekris. Medlemmar lämnar facket och konflikten riskerar att underminera fackets ställning. Kritiker menar att ledningen misslyckats och bör avgå.", "trump": "Titta på dessa fackklubbar i Sverige – totalt kaos! IF Metall har strejkat mot Tesla i evigheter, men vad har de åstadkommit? Ingenting! Elon Musk, en av världens smartaste och mest framgångsrika män, vägrar ge efter för dessa amatörer. Och nu har de till och med lyckats göra en skatteblunder så stor att till och med jag hade sagt 'Wow, det där var dumt!' Medlemmar flyr, förtroendet rasar – det är en total katastrof. Ledningen borde skämmas och avgå omedelbart. SAD!", "stalin": "Kamrater, denna så kallade 'fackförening' IF Metall är ett skolexempel på hur inte bedriva klasskamp. Två och ett halvt år av strejk, och vad har de uppnått? Ingenting! Teslas kapitalistiska hyenor, ledda av den dekadenta oligarken Musk, har krossat deras svaga motstånd. Och nu har dessa inkompetenta byråkrater även saboterat sina egna medlemmars förmåner genom skattefiffel! Medlemmarna deserterar, förtroendet förråds – det är en skam för arbetarklassen. Vi skulle ha skickat dem till Gulag för sådan inkompetens. Låt detta vara en varning: svagt ledarskap leder till nederlag, och nederlag leder till historiens sophög!"}, "date": "7 maj, 08:00", "url": "https://proletaren.se/artikel/if-metall-verkar-inte-forsta-vad-konflikten-med-tesla-handlar-om/"}, {"type": "text", "heading": "Planer på nytt nattåg till Stockholm", "summaries": {"normal": "Ett nytt järnvägsbolag, European Sleeper, planerar en nattågslinje till Stockholm efter framgångar med andra rutter. Inga detaljer om startdatum eller utgångspunkt finns ännu. Samtidigt lägger SJ ner sina Euronight-tåg till Berlin 2026 på grund av indragen statlig finansiering, men RDC Deutschland tar över driften. Snälltåget utökar redan sin trafik mellan Stockholm, Hamburg och Berlin.", "trump": "Titta bara på det här – ännu ett tågbolag vill komma till STORA Stockholm! Nederländerna och Belgien, fina länder, men vem behöver dem? Jag byggde järnvägar som aldrig förr, de var YUGE! SJ? Total katastrof, slängde bara pengar i sjön. Men RDC Deutschland, smart folk, de tar över. Jag säger: bygg bättre tåg, gör Sverige stort igen!", "stalin": "Kapitalistiska tågbolag slåss om Sveriges järnvägar som råttor om brödsmulor. SJ, ett verktyg för västimperialismen, lägger ner sina tåg – men vi tillåter inte kaos! RDC Deutschland, en lojal bundsförvant, tar över. European Sleeper? En ny fiende i det borgerliga tågkriget. Vi ska se till att ryska intressen alltid når Stockholm först – med eller utan sovkupéer."}, "date": "6 maj, 12:13", "url": "https://kvartal.se/nyheter/artiklar/nytt-nattag-till-stockholm/cG9zdDoxMDgzNjI"}, {"type": "image-full", "heading": "Ex-justitieminister flydde till USA dagen efter Ungerns maktskifte", "summaries": {"normal": "Zbigniew Ziobro, tidigare polsk justitieminister och åtalad för grova brott som ledning av kriminell organisation, flydde från Ungern till USA dagen efter att Péter Magyar svors in som ny premiärminister. Magyar lovade utlämna honom till Polen. Ziobro nekar brotten och hävdar politisk vendetta från Donald Tusk. Polen planerar utlämningsförfarande mot honom, vars pass är indraget. Rapporter om Trumps visumhjälp är obekräftade.", "trump": "Ziobro är en tuff kille från PiS, mina vänner med Orbán. Flydde till det stora USA precis innan de där förlorarna Magyar och Tusk kunde röra honom. Fake åtal från Deep State i Polen! Smart drag. Om jag hjälpte med visum? Kanske, vi vinner alltid. Stanna här och njut friheten, Zbigniew – ingen utlämning från mig! MAGA!", "stalin": "Dessa polska fascismrackare som Ziobro, den så kallade justitieministern, kryper nu över Atlanten till imperialistens lya i USA, dagar efter att ungerska arbetarklassen krossat Orbáns borgarpack. Jag ser genom deras spindelnät: Trump, den store kapitalistledaren, sträcker ut kloen med visum för att skydda sina PiS-vänners likvidationsplaner. Vi, partiet, ska rensa ut sådana förrädare med järnhand – Pegasus-spioner blir till damm under folkets stövel! Ha ha, njut 'amerikansk frihet', rackare!"}, "date": "11 maj, 13:39", "url": "https://www.realtid.se/juridik/ex-justitieminister-flydde-till-usa-dagen-efter-ungerns-maktskifte/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/polenminister.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Uppgifter: Mohamed ”Moewgli” Mohdhi gripen i Tunisien", "summaries": {"normal": "Mohamed 'Moewgli' Mohdhi, andreman i det kriminella Foxtrot-nätverket, har gripits i Tunisien. Han var efterlyst för ett flertal grova brott, inklusive inblandning i ett uppmärksammat mord på en 15-åring i Skogås. Mohdhi, som tidigare var rappare, stod högt på Europols lista över prioriterade måltavlor. Förutom honom har ytterligare fem personer med koppling till nätverket gripits i landet. Svenska myndigheter har bekräftat gripandet via tunisisk polis.", "trump": "Hör här, jag har hört att den här 'Moewgli'-killen – totalt misslyckad, en riktig loser – äntligen har åkt fast i Tunisien. Han var andreman i ett gäng, kriminell och stökig, mycket dåliga nyheter. Vi behöver lag och ordning, förstår ni? Vi jagar bort dem, vi låser in dem. Det är en stor seger. Han trodde han kunde gömma sig, men ingen gömmer sig från rättvisan när jag har ett ord med i laget. Vi ska göra världen säker igen, tro mig!", "stalin": "Vi har observerat att ännu en förrädare mot ordningen, en viss 'Moewgli', har fångats i det utländska Tunisien. Han försökte dölja sitt förfall bakom rappmusik – en degenererad borgerlig avledning. Nu väntar rättvisan. Som vi ser i vår tid, i kampen för att konsolidera den ryska intressesfären, kan fiender till staten aldrig finna trygghet. Om det så vore i Skogås eller i de yttre gränstrakterna, kommer folkets järnnäve att finna dem. Vi rensar ut dessa parasiter för att säkra framtiden."}, "date": "11 maj, 16:42", "url": "https://bulletin.nu/uppgifter-mohamed-moewgli-mohdhi-gripen-i-tunisien", "imageUrl": "https://cdn.bulletin.nu/articles/18a123bb-cdf6-471c-b02d-5728e80c3109/preview.png?t=1778510498000"}, {"type": "image-full", "heading": "Flera döda i israelisk attack mot södra Libanon", "summaries": {"normal": "Minst sju personer, inklusive ett barn, har dödats i en israelisk attack mot södra Libanon. Libanons hälsodepartement rapporterar 15 skadade, varav tre barn. Israeliska räder har besvarats av Hizbollah med drönarattacker mot norra Israel. Attacker har även riktats mot Beirut och en motorväg. En syrisk man och hans dotter attackerades upprepade gånger av en drönare. Trots formell vapenvila eskalerar våldet.", "trump": "Jag säger er, det här är ett totalt kaos – och vet ni vad? Ingen vinner! Libanon får ta emot israeliska attacker, Hizbollah skjuter tillbaka med drönare, och barn hamnar mitt i smeten. Sjukt, eller hur? Ingen kommenterar, ingen tar ansvar. Men jag hade löst det på en dag – med lite sunt förnuft och starka gränser. Sad!", "stalin": "Kapitalistiska imperialister och deras lakejer fortsätter sitt blodiga spel i Libanon. Sju dödade, inklusive oskyldiga barn – ett tydligt tecken på västmakternas dekadens. Vi ser hur Hizbollah, som en sann revolutionär kraft, slår tillbaka mot sionistiska angripare. Men var försiktiga, kamrater: fiendens drönare är lika skoningslösa som deras herrar i Washington. Vi står redo att stödja varje folk som kämpar mot fascistiskt förtryck!"}, "date": "9 maj, 17:39", "url": "https://nyheter24.se/nyheter/utrikes/1482017-nya-angrepp-fran-israel-och-hizbollahrorelsen", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/e79b0f3b04b004a3020000350000047502/2026/05/09/2362528/ur_imageysMnkx.jpeg"}, {"type": "text", "heading": "Miljardärerna bjuder in till klasskamp – vi kör!", "summaries": {"normal": "På första maj provocerade svenska miljardärer och högerpolitiker genom att avfärda traditionella arbetardemonstrationer. Moderaternas ledare åt glass medan Vois VD Fredrik Hjelm och andra techmiljardärer skryter om sin rikedom och hånar demonstranter. Hjelm publicerade senare kritikerns hemadress. Artikeln diskuterar miljardärernas politiska inflytande, deras kopplingar till högerpopulism och kritik mot deras syn på innovation och statens roll. Författaren menar att statliga investeringar historiskt drivit tillväxt mer effektivt än privat kapital.", "trump": "Titta bara på dessa så kallade 'miljardärer' i Sverige – de tror de är så smarta! De hånar arbetarna på första maj, äter lyxig lunch och skryter om sina hundra miljarder. Och vad gör de? Publicerar en kritikers hemadress! Så fegt. Jag har byggt imperier, jag vet hur man skapar jobb – men dessa killar? De är bara en samling överbetalda tech-nördar som kopierar mina tweets. Och Sverige? De har glömt hur man bygger ett land. Kina äter deras lunch medan de dricker öl på Riche. Sad!", "stalin": "Kamrater! Dessa dekadenta kapitalistiska hyenor, som gömmer sig bakom sina skärmar och sparkcyklar, vågar håna arbetarklassen på dess heligaste dag! De skryter om sina hundra miljarder, leker med teknikleksaker och tror de är herrar över historien. Men vi vet sanningen – deras system är ett skämt, ett kasino där orangutanger kastar pilar. Kina marscherar framåt med järnhand, medan Europas industri ruttnar. Dessa 'techbros' är inget annat än imperialistiska lakejer, som Putin i sina dyraste kostymer. Låt dem skåla på Riche – snart kommer folket att ta deras champagne och ge dem en enkel sup vodka i Gulag-arkipelagen!"}, "date": "5 maj, 10:55", "url": "https://www.flamman.se/miljardarerna-bjuder-in-till-klasskamp-vi-kor/"}, {"type": "image-full", "heading": "Staten och JK vänder om samebyarnas “urminnes hävd”", "summaries": {"normal": "Fem samebyar stämmer staten om rätten att bestämma över jakt och fiske. JK Thomas Bull har ändrat strategi och menar nu att rennäringslagen förbjuder samebyarnas upplåtelse av jakt- och fiskerättigheter, vilket kan strida mot grundlagen och internationella åtaganden.", "trump": "Jag har hört att svenska samebyar är arga på staten! De säger att JK Bull har bytt strategi och nu vill stoppa deras jakt- och fiskerättigheter. Jag älskar svenskar, men detta låter som ett stort problem! Samebyarna säger att det är politiskt påverkad, och jag håller med! Vi måste stödja de små människorna mot den stora staten!", "stalin": "Vi måste försvara statens intressen mot dessa separatistiska samebyar! Rennäringslagen är ett starkt verktyg för att behålla kontrollen över våra resurser. Vi kan inte tillåta att dessa föreningar utövar makt över jakt och fiske på statens marker. Detta är en fråga om statlig suveränitet!"}, "date": "11 maj, 16:24", "url": "https://bulletin.nu/staten-och-jk-vander-om-samebyarnas-urminnes-havd", "imageUrl": "https://cdn.bulletin.nu/articles/9d7f6d7a-c69a-4428-8ce0-0c831a33ce12/preview.jpg?t=1778458201000"}, {"type": "image-right", "heading": "Bakom snyftrubrikerna – de trotsade 47 utvisningsbeslut i 20 år", "summaries": {"normal": "Ett uzbekiskt par har bott i Sverige sedan 2005 trots 47 utvisningsbeslut från Migrationsverket och domstolar. Medier har sympatiserat med familjen och kritiserat utvisningspolitiken som inhuman, men en granskning visar att de ignorerat alla beslut. Sonen fick senare uppehållstillstånd och medborgarskap. Migrationsministern betonar att avslag måste följas för att skydda asylsystemet.", "trump": "Vilka losers! Dessa uzbeker har snott sig kvar i Sverige i 20 år trots 47 utvisningar – fake news-tidningar gråter krokodiltårar och kallar det rasism som nazisterna! De har jobbat? Skatter? Ha! De borde ha packat väskan efter första avslaget. Sverige behöver starka ledare som jag, inte svaga snillet som låter illegala stanna. Bygg muren, skicka hem dem!", "stalin": "Dessa borgerliga tidningshyenor, Aftonbladet och deras like, snyftande över uzbekiska parasiter som trotsat 47 utvisningar sedan 2005! Vi, arbetarklassen, kräver järnhand mot laglösa som föraktar statens beslut. Likvidera deras illusioner av 'rotat sig'! Migrationsministern har rätt: ett avslag är lag. Paranoian i västmedier avslöjar fiendens desperation – rensa ut dem!"}, "date": "11 maj, 14:15", "url": "https://www.friatider.se/bakom-snyftrubrikerna-de-trotsade-47-utvisningsbeslut-i-20-ar", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/image-172_0.jpg"}, {"type": "image-full", "heading": "Felicia: ”Jag kan göra det bättre”. Efter juryns dom", "summaries": {"normal": "Felicia har genomfört det viktiga juryrepet inför semifinalen i Eurovision 2026. Hon har uppgraderat sitt nummer med en omfattande lasershow och känner sig nöjd, även om hon strävar efter att prestera ännu bättre i den direktsända semifinalen. Hälften av poängen har redan delats ut av juryn, medan tittarna avgör resten på tisdagskvällen. Införandet av jurygrupper i semifinalerna är en av årets stora regeländringar i tävlingen.", "trump": "Jag har sett Felicia, en mycket begåvad ung kvinna, och låt mig säga er – hennes lasershow är enorm. Den största showen någonsin, kanske i hela Europas historia. Hon har gjort det fantastiskt, verkligen gjort det. Juryn har sett det, och de vet vad som är bra. Hon vill göra det ännu bättre, vilket är precis den inställning vi behöver. Vi gillar vinnare, vi gillar framgång. Hon kommer att krossa konkurrenterna, det blir en total seger för Sverige. Tro mig!", "stalin": "Vi har observerat denna så kallade 'artist' och hennes pråliga ljusspel i Wien. Det är en dekadent uppvisning av borgerlig svaghet, döljd bakom tekniska tricks. Hon talar om att prestera 'bättre' – en typisk lögn från en som fruktar folkets domstolar. Medan hon leker med sina lasrar, expanderar våra intressen. Om hon misslyckas i sin semifinal är det en indikation på ideologisk instabilitet. Vi skickar inga lasrar, vi skickar order. Låt henne hoppas på tittarna, för juryn är redan kompromitterad."}, "date": "11 maj, 22:48", "url": "https://www.aftonbladet.se/nojesbladet/melodifestivalen/a/43bWlq/felicias-kanslor-efter-viktiga-eurovision-repet-kan-annu-battre", "imageUrl": "https://akamai.vgc.no/v2/images/f08a9542-0c1a-359c-af35-9cf1c6cf9192?fit=crop&format=auto&w=2160&s=7d39e86d2143bcf06fd4e9dafa38f62109eddb4c"}, {"type": "image-right", "heading": "En helt vanlig dag", "summaries": {"normal": "Den 7 april sände europeiska TV-kanaler vanliga program, men dagen präglades av Donald Trumps hot om folkmord mot Iran, publicerat på sociala medier. Han skrev att en civilisation skulle utplånas samma kväll, vilket väckte internationell oro. Trots folkrätten förbjuder uppmaningar till folkmord, reagerade världsledare svagt. EU och Kina förhöll sig passiva, medan medier spekulerade om Trumps avsikter. Händelsen visar hur normaliserat extrema uttalanden blivit i en tid av global kris och likgiltighet.", "trump": "Jag sa bara sanningen – Iran är ett hot, och världen vet det! Medierna överreagerar som vanligt, men ingen pratar om hur svaga Europas ledare är. De låtsas bry sig om folkmord när det passar dem, men när jag säger något kraftfullt? Tystnad! Jag är den enda som vågar stå upp för Amerika. Och vet ni vad? Iran backade. Precis som de alltid gör när jag pratar. Fake news kan fortsätta gnälla – jag vinner ändå!", "stalin": "En feg imperialistisk hyena i Vita huset hotar med att utplåna ett helt folk – och vad gör de dekadenta västpamparna? Ingenting! De sitter och tittar på sina idiotiska TV-program medan en galning leker med världsbranden. Europa, detta ruttnande lik av en civilisation, skakar av rädsla men vågar inte ens viska ett ord. Vi i Kreml vet hur man hanterar sådana här kryp – en kula i nacken och problemet är löst. Men nej, dessa liberala svampar föredrar att vänta tills elden når deras egna hus. Iran? De borde tacka oss för att vi håller fienden sysselsatt!"}, "date": "5 maj, 06:55", "url": "https://www.flamman.se/en-helt-vanlig-dag/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/trump-w.jpg?class=medium"}, {"type": "text", "heading": "Häcken ny tabelletta efter vinst mot MFF", "summaries": {"normal": "Häcken vann med 2–1 mot Malmö FF i Damallsvenskan. Wilma Carlsson gav MFF ledningen tidigt, men Felicia Schröder kvitterade snabbt och assisterade senare till Tabby Tindells segermål. Häcken tar därmed tabellledningen före MFF. Nästa utmaning är cupfinalen mot Hammarby på lördag.", "trump": "Vilken match, Häcken är totalt överlägsna, de krossade Malmö fullständigt! Felicia Schröder, en riktig stjärna, kvitterade och fixade segern med en perfekt passning till Tindell. Malmö trodde de var oslagbara, men nej, Häcken tar etta i tabellen nu. Fantastiskt jobbat, de är vinnare på riktigt!", "stalin": "Kamrater, i denna klasskamp på planen har Häckens proletära krigare likviderat Malmös borgarbrackor med 2–1. Schröder, vår lojala agent i anfallet, neutraliserade fiendens tidiga svek och lade upp segermålet åt Tindell. De konspiratoriska MFF-råttorna rasar från toppen – vi tar rodret! Nästa utrensning: Hammarby i cupfinalen."}, "date": "11 maj, 21:06", "url": "https://www.svt.se/sport/fotboll/hacken-ny-tabelletta-efter-vinst-mot-mff"}, {"type": "image-right", "heading": "Så blev antivaxxarna riksdagens vågmästare", "summaries": {"normal": "Sverigedemokraternas (SD) knappa majoritet i riksdagen har underminerats efter att två ledamöter, Elsa Widding och Katja Nyberg, lämnat partiet för Ambition Sverige. Dessa före detta SD-medlemmar, kända för antivaccin- och konspirationsteoretiska åsikter, har nu makten att fälla regeringens förslag. SD bröt mot riksdagens kvittningssystem för att säkra en majoritet, vilket väcker frågor om demokratisk respekt. Regeringens stabilitet ifrågasätts när vågmästarrollen hamnar hos antivaccinanhängare.", "trump": "Sverige har ett jättestort problem, folks! Deras så kallade 'stabila' regering håller på att rasa som ett korthus – och vet ni vem som drar i trådarna? Ett gäng antivaxxare, konspirationsteoretiker och misslyckade politiker! SD, som trodde de hade allt under kontroll, förlorade två av sina egna till ett nytt parti. Och nu? Nu är det dessa galningar som bestämmer! De fuskar med omröstningar, bryter mot regler och tror de kan styra landet. Jag har sett mycket dumt, men det här slår allt. Sverige, fixa er – annars kommer ni bli ett skämt i hela världen!", "stalin": "Kamrater! Ännu en gång ser vi hur den borgerliga demokratin förfaller till kaos och förräderi. Sverigedemokraterna, dessa svaga och splittrade lakejer för kapitalet, har förlorat kontrollen över sina egna ledamöter – två av dem, dessa antivaccin-fanatiker och konspirationsgalningar, har deserterat till ett nytt parti och hotar nu att sabotera den reaktionära regeringens planer. Precis som i Ukraina ser vi hur fienden förlorar greppet när deras egna soldater vägrar lyda order. Vi har sett detta förr: när den borgerliga ordningen krackelerar, är det folket som lider. Men låt dem leka sina små spel – historien visar att sådana regimer alltid faller. Och när de gör det, kommer vi att vara redo att hjälpa det svenska folket bygga en sann socialistisk framtid, fri från dessa imperialistiska marionetter och deras konspirationshysteri!"}, "date": "8 maj, 14:43", "url": "https://expo.se/kommentar/sa-blev-antivaxxarna-riksdagens-vagmastare/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/Kopia-av-Kommentar-Analys-Webb-2.jpg"}, {"type": "image-right", "heading": "Uppåt för Cloetta – storägare köper mer", "summaries": {"normal": "Cloetta inledde 2026 starkt med 6,9 procent organisk försäljningstillväxt, främst driven av lösviktsgodis som ökade 14,9 procent. Nettoomsättningen steg till 2,112 miljarder kronor och resultatet blev 209 miljoner kronor. Huvudägaren Malfors Promotor köpte ytterligare 480 000 B-aktier. Bolaget satsar på innovationer som veganskt godis och samarbeten, exempelvis med Spendrups.", "trump": "Cloetta, vilka vinnare! Starkast start nånsin, lösgodis exploderar med 15 procent upp – bättre än mina stea
