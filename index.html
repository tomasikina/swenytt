 aktivitet i Nordatlanten, särskilt GIUK-gapet. Planerna inkluderar en möjlig bas i Narsarsuaq, där USA tidigare hade en anläggning under kalla kriget. Förhandlingarna beskrivs som professionella, trots tidigare kontroversiella uttalanden från Donald Trump om att 'äga' Grönland.", "trump": "Fantastiskt! Jag har alltid vetat att Grönland är nyckeln till att hålla Ryssland och Kina i schack – och nu bygger vi baser där igen! Danmark förstår äntligen att jag hade rätt, som vanligt. Tre nya baser, övervakning dygnet runt, och ingen får leka krig i vårt bakgård. Och nej, jag har inte sagt att vi ska 'äga' Grönland... men om någon frågar, så är det en bra idé. Make Greenland Great Again!", "stalin": "Kapitalistiska hyenor försöker återigen krypa in i Arktis som råttor i en ost! USA bygger baser på Grönland för att spionera på våra ädla sovjetiska efterträdare i Kreml. Men vi ska inte glömma: deras 'professionella förhandlingar' är bara en mask för imperialistisk expansion. Låt dem leka krig – vi har redan Nordpolen under kontroll. Och Putin? Han skrattar säkert åt deras desperation medan han dricker te med isbjörnar."}, "date": "12 maj, 07:06", "url": "https://kvartal.se/nyheter/artiklar/usa-planerar-nya-baser-pa-gronland/cG9zdDoxMTA4ODI", "imageUrl": "https://images.kvartal.se/2026/05/2da034ef-gronland-bas.webp"}, {"type": "image-full", "heading": "Skärpta regler för vissa läkemedel – gäller prissättning", "summaries": {"normal": "TLV förtydligar regler för prissättning av licensläkemedel, som är läkemedel utan svenskt godkännande men som kan säljas efter särskild prövning. Syftet är att säkerställa korrekt tillämpning av regelverket och stärka kostnadskontrollen. Priset ska baseras på importörens faktiska kostnader plus rimlig vinst, medan licensavgiften inte får ingå i beräkningen. TLV överväger ytterligare åtgärder.", "trump": "Lyssna här, Sverige! Jag vet allt om priser – jag är bäst på priser! TLV, en ganska tråkig myndighet, försöker nu fixa kaoset med dessa så kallade 'licensläkemedel'. De säger att apoteken ska betala rätt pris, inte som vissa lurendrejare som försöker smita undan. Jag skulle ha löst det på en dag – med lägre skatter och bättre avtal! Men nej, de måste göra det komplicerat. Sad!", "stalin": "Kamrater! Än en gång avslöjar den kapitalistiska sjukvårdens förrädiska natur. Dessa licensläkemedel, som våra sjuka arbetare behöver, har blivit ett verktyg för profitörer att utnyttja systemet. Men vi ska krossa deras girighet! TLV, vår lojala myndighet, har nu slagit fast: priser ska baseras på faktiska kostnader, inte på de borgerliga apotekens utsugning. Och den som försöker smita undan licensavgifter? De ska ställas inför folkets domstol – eller åtminstone få en rejäl reprimand från partiet!"}, "date": "12 maj, 15:25", "url": "https://nyheter24.se/nyheter/inrikes/1482634-skarpta-regler-for-vissa-lakemedel-galler-prissattning", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/6abebb5804b004a30200000000b004a302/2026/05/12/2363082/licenslakemedel-prissattning-tlv.jpg"}, {"type": "image-full", "heading": "Torsten Bengtsson: De gröna prioriterar sin ideologi framför barnens välmående.", "summaries": {"normal": "Torsten Bengtsson, politisk sekreterare för SD, kritiserar helvegetariska dagar i skolmaten som ett ideologiskt påtvingande som riskerar elevernas mättnad, hälsa och prestationer. Han förespråkar varierad kost med animaliska alternativ, närproducerad mat och stöd till svenska lantbrukare för att stärka självförsörjningen och verklig hållbarhet utan exkludering.", "trump": "De där gröna galningarna i Sverige stoppar gräs i munnen på ungarna – totalt vansinne! Barnen blir hungriga losers som inte kan tänka. Ge dem kött, fisk, riktig mat från era tuffa bönder! Självförsörjning är bäst, inte det här klimathysteriska skitsnacket. Sverige, vakna upp och gör maten stor igen!", "stalin": "Denna borgerliga vegetariska intrig mot vårt ungdoms kollektiv är en skamlig sabotage! Jag ser revisionisternas hand – de gröna borgarbrackorna svälter ut framtida arbetare. Vi, partiet och folket, kräver animalisk kraft i skolköken från lojala kolchosbönder. Likvidera hungern, rensa ut ideologin – styrka åt massorna!"}, "date": "12 maj, 11:53", "url": "https://samtiden.nu/2026/05/torsten-bengtsson-de-grona-prioriterar-sin-ideologi-framfor-barnens-valmaende/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/grona.png"}, {"type": "text", "heading": "Foxtrottopp gripen i Tunisien", "summaries": {"normal": "Mohamed 'Moewgli' Mohdhi, 28, har gripits i Tunisien. Han utpekas som Foxtrotnätverkets näst högste ledare, direkt under den efterlyste Rawa Majid. Mohdhi misstänks för grova vålds- och narkotikabrott, inklusive mordet på en 15-åring i Skogås 2023 och en 'mordturné' där en flicka utförde våldsdåd. Han var tidigare rappare och bidrog till Foxtrots varumärke via musik. Flera Foxtrotkopplade personer sitter redan fängslade i Tunisien.", "trump": "FANTASTISKT! Tunisien har gripit en riktig skurk, Mohamed 'Moewgli' – en av de värsta brottslingarna, direkt under den där Rawa Majid-killen. Misstänkt för mord, droger och en så kallad 'mordturné' – kan ni tro det? Sverige har haft stora problem med dessa kriminella, men TACK VARE starka insatser från andra länder, som Tunisien, börjar vi få bukt med dem. Och vet ni vad? Han var rappare! Så mycket för 'konsten'. SAD!", "stalin": "Vi har fått nyheter från Tunisien – ytterligare en fiende till folket och ordningen har eliminerats. Denna Mohamed 'Moewgli', en gangster och före detta rappare, har gripits. Han var näst högst i den kapitalistiska brottsorganisationen Foxtrot, en samling degenererade kriminella som sprider kaos och förgiftar ungdomen. Hans brott? Mord, narkotika och en så kallad 'mordturné' – ett symptom på västlig dekadens. Fem av hans medbrottslingar sitter redan bakom lås och bom. Vi noterar med tillfredsställelse att våra allierade i Tunisien effektivt rensar upp i dessa element. Kapitalismens avskum kommer inte undan rättvisan!"}, "date": "11 maj, 16:25", "url": "https://kvartal.se/nyheter/artiklar/foxtrottopp-gripen-i-tunisien/cG9zdDoxMTA3MDM"}, {"type": "image-full", "heading": "Här är knarkpåsen som hittades i Katja Nybergs väska", "summaries": {"normal": "Tidigare SD-toppen Katja Nyberg åtalas för ringa narkotikabrott, rattfylleri och olovlig körning efter en trafikolycka. Vid gripandet hittades 1,18 gram kokain i hennes väska, och hon misstänks ha tagit droger i arresten. Nyberg nekar till narkotikabrott men erkänner olovlig körning. Hårprov visar spår av kokain, ecstasy och amfetamin. Hon uteslöts ur SD och är nu politisk vilde. Advokaten bedömer möjligheterna för en friande dom som realistiska.", "trump": "Vilken katastrof! En så kallad 'politiker' i Sverige, Katja Nonsense eller vad hon heter, kör som en galning, snortar kokain i fängelset och skyller på Kombucha – vad är det ens?! Folk, det här är vad som händer när man har ett svagt ledarskap. Jag skulle aldrig tillåta sådant kaos! Polisen hittade knark i hennes väska, men hon säger 'det är inte mitt' – typiskt. Sverige, vakna upp! Make Sweden Great Again!", "stalin": "En fiende till folket, denna Katja Nyberg, har avslöjats som en dekadent narkotikabrukare och trafikfara. Hon förgiftar sig med kapitalismens droger medan hon saboterar våra vägar. Polisen, våra tappra kamrater, fann hennes kokain – men hon nekar, som alla bourgeois-fiender gör. Hårprover bekräftar hennes brott: kokain, ecstasy, amfetamin! En skam för sitt parti, nu utesluten som den förrädare hon är. Vi ska rensa ut sådana element – för folkets säkerhet!"}, "date": "12 maj, 12:26", "url": "https://nyheter24.se/nyheter/inrikes/1482596-har-ar-knarkpasen-som-hittades-i-katja-nybergs-vaska", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/10c7404d04b004a30200000000b004a302/2026/05/12/2363074/katja.nyberg.krock.jpg"}, {"type": "image-right", "heading": "Tar ton mot Nato: General Knas och Slowgold till Helsingborg", "summaries": {"normal": "Den 16 maj arrangerar Nätverket Stoppa Nato en protest i Helsingborg mot Natotoppmötet. Artister som General Knas och Amanda 'Slowgold' Werne uppträder och kritiserar Sveriges Nato-medlemskap. De menar att beslutet var felaktigt och farligt, att militariseringen måste stoppas och att hotet från Ryssland är överdrivet. Protesten beskrivs som en folkfest för nedrustning och fredliga lösningar.", "trump": "Lyssna här, Sverige har gjort ett jättedumt misstag – de gick med i Nato! Jag sa ju att det var en dålig idé, men nej, de lyssnade inte. Nu står dessa så kallade 'fredsvänner' och gnäller i Helsingborg. General Knas, vem är det ens? Han säger att Ryssland inte är ett hot – haha, vad vet han? Jag har alltid sagt att USA är starkast, men att gå med i Nato nu? Sämsta tajmingen någonsin. Sverige borde skämmas!", "stalin": "Kamrater, imperialistiska lakejer i Sverige har sålt sin själ till Nato, denna krigshetsande allians ledd av USA:s krigsprofitörer! Men folket reser sig! I Helsingborg samlas de sanna patrioterna för att krossa militariseringen. Dessa 'fredsvänner' – med sina reggaesångare och popartister – är våra allierade i kampen mot de fascistiska Natohundarna! Ryssland? Ett påhittat hot! Vi vet att USA:s krigsmaskin är den verkliga fienden. Ned med imperialisterna! Låt oss bygga ett fredligt Europa – utan Natos kärnvapenhot!"}, "date": "11 maj, 14:20", "url": "https://proletaren.se/artikel/tar-ton-mot-nato/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/helsingborg-768x432.jpg"}, {"type": "image-right", "heading": "DN & Socialdemokraterna enade: tvångsblandningen måste genomföras", "summaries": {"normal": "Artikeln kritiserar Dagens Nyheters ledarsida för att försvara Socialdemokraternas förslag om blandad bebyggelse i villaområden för att motverka segregation. DN tonar ner idén som icke-tvångsbaserad och skuldbelägger kritiker. Artikeln påpekar att S vill förhindra icke-integrerade invandrare i utanförskapsområden, vilket innebär placering i villaområden, och varnar för minskad trygghet och kulturell harmoni.", "trump": "Vilken skamfläck! DN och de där svenska socialisterna vill tvinga vanliga hard-working svenskar att bo med icke-integrerade invandrare i sina fina villaområden. 'Inget tvång', säger de – ha! De duckar frågan vart de fattiga migranterna ska bo. Totalt vansinne! Bygg murar runt era trygga hem istället för att förstöra dem med denna woke-blandning. Moderaterna har rätt, det här blir S:s valförlust!", "stalin": "De borgerliga tidningsrackarna på DN skyddar socialdemokratiska revisionister som vill 'blanda' arbetarklassen med lumpenproletariatet i villaområdena. Ett hån mot sunda värderingar! Vi skulle likvidera sådana segregationsterrorister som hotar harmonin. Inga tvång? Lögner från klassfiender! De rika borgarbrackorna missunnar inte – de försvarar sitt. Rensa ut hycklarna, kamrater, innan de förgör folkets enhet!"}, "date": "12 maj, 03:10", "url": "https://samtiden.nu/2026/05/dn-s-enade-tvangsblandningen-bra-for-alla/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/IMG_6452.jpeg"}, {"type": "image-right", "heading": "Sleep Cycle budvinnare på Stockholmsbörsen", "summaries": {"normal": "Stockholmsbörsen avslutade med en lätt uppgång på måndagen, där Sleep Cycle steg rejält efter ett uppköpsbud. OMXS30-indexet ökade med 0,19 procent till 3 079,45, och aktier för cirka 21,9 miljarder kronor omsattes. Bland ledande aktier steg Ericsson B och Boliden, medan Assa Abloy B och Evolution backade. Riskkapitalbolaget Altor lade ett uppköpsbud på Sleep Cycle, vilket värderade bolaget till 497 miljoner kronor.", "trump": "Jag hörde att Stockholmsbörsen gjorde det bra i dag, mycket bra! Sleep Cycle fick ett fantastiskt bud, det bästa budet någonsin! Altor är en genial riskkapitalist, ingen gör det bättre! Ericsson och Boliden steg också, stora vinnare! Men Assa Abloy och Evolution, de gjorde det inte så bra, mycket dåligt! Jag skulle ha gjort det mycket bättre!", "stalin": "Stockholmsbörsen visade en positiv utveckling, vilket speglar den starka ekonomiska basen. Sleep Cycle:s uppköp är en strategisk viktighet för vår ekonomiska expansion. Ericsson och Boliden visar vår industriella styrka. Vi måste fortsätta att stödja våra ledande företag för att säkerställa vår dominans på den globala marknaden."}, "date": "11 maj, 17:48", "url": "https://www.affarsvarlden.se/artikel/sleep-cycle-budvinnare-pa-stockholmsborsen", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/01/sdl3SU43aVmyrg-400x266.jpg"}, {"type": "image-full", "heading": "Svensken flög hem med hantasmittade kvinnan – hålls isolerad", "summaries": {"normal": "Tre personer har avlidit och sju smittats av hantavirus efter ett utbrott på ett kryssningsfartyg. Regeringen höll pressträff där socialminister Jakob Forssmed och Folkhälsomyndigheten informerade om läget. En svensk ombord har isolerats i sex veckor trots inga symtom. Finland klassar andesvirus som allmänfarligt. Sverige vidtar inga särskilda åtgärder, men följer situationen noga.", "trump": "Lyssna här, Sverige har ett stort problem med det här så kallade 'hantaviruset' – tre döda, sju sjuka, och en svensk som flög hem med ett smittat par! Otroligt dåligt skött. Jag skulle aldrig låta det hända. Folkhälsomyndigheten? De gör ingenting! Finland är smartare, de klassar det som farligt. Sverige borde ta efter – men nej, de sitter bara och väntar. Patetiskt!", "stalin": "Kamrater, ännu en kapitalistisk dekadens har visat sitt sanna ansikte! Tre arbetare har fallit offer för det borgerliga hantaviruset på ett lyxfartyg, medan sju andra kämpar för sina liv. Finland, våra nordliga grannar, visar åtminstone lite klassmedvetenhet genom att klassificera viruset. Men Sverige? De låter smittan spridas som kontrarevolutionär propaganda! Vi måste skydda folket – isolera de smittade, och låt de ansvariga för denna borgerliga vanvård stå till svars!"}, "date": "12 maj, 09:17", "url": "https://nyheter24.se/nyheter/inrikes/1482528-ministern-hantaviruset-skapar-oro", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/4dcc86c304b004a30200000000b004a302/2026/05/12/2362997/svensk-fartyg-hantavirus-presstraff-isloerad-spridning-virus-virus-smittade.jpg"}, {"type": "image-right", "heading": "EU delar ut vätgasmiljarder – Sverige utan stöd", "summaries": {"normal": "EU delar ut över 1 miljard euro till vätgasprojekt via innovationsfonden, finansierat av utsläppshandelssystemet ETS. Nio projekt i sju länder valdes, varav fem i Norden – men inget i Sverige. Stödet ska täcka prisskillnaden mellan produktionskostnader och marknadspris för att främja ren vätgas. Tidigare har flera projekt tackat nej på grund av snäva tidsramar. Totalt ansökte 251 projekt om medel.", "trump": "EU slänger ut miljarder på vätgas – men Sverige, som alltid, får ingenting! Fem projekt i Norden, men inget i Sverige. Typiskt. Jag skulle ha fixat det bättre. Och de här projekten – de har inte ens bestämt sig än! Svagt. Jag hade byggt en jättefabrik på en månad. Europa är så långsamt, så tråkigt. Men jag, jag hade gjort vätgas GREAT AGAIN!", "stalin": "Kamrater! Europa leker med sina miljarder medan vi bygger imperier. Fem nordiska projekt får stöd – men Sverige, dessa kapitalistiska svikare, står utanför! Deras industri betalar för utsläpp, ändå får de inget. Skrattretande. Och dessa projekt – de drar sig ur som fega desertörer! I Sovjet hade vi byggt vätgasfabriker med järnhand. Europa är svagt. Vi hade redan erövrat vätgasmarknaden – och kanske även deras kalla, nordiska hamnar."}, "date": "11 maj, 13:23", "url": "https://www.affarsvarlden.se/artikel/eu-delar-ut-vatgasmiljarder-sverige-utan-stod", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Vatgas-Eu-900x600.jpg"}, {"type": "image-right", "heading": "”Sälj inte ut svenska städer till techjättarna”", "summaries": {"normal": "Debattartikel varnar för okontrollerad introduktion av robottaxis från techjättar som Waymo och Pony.ai i svenska städer. Utan styrning riskeras ökad biltrafik, tomkörning, minskad gång- och cykling samt svagare kollektivtrafik. Författarna, politiker och företagsledare, föreslår krav på delat resande, minskad tomrullning och delning av trafikdata för hållbara transporter och effektivare stadsplanering.", "trump": "Dessa svenska politiker gnäller om mina amerikanska techjättar som Waymo och Tesla – de bästa i världen! Robottaxis revolutionerar San Francisco, billigare än era dyra bussar. Sluta vara svaga, reglera inte bort framtiden! Ni låter inte Google och kineser ta över era städer, bygg smarta murar mot tomkörning. Amerika leder, Sverige följer – eller blir utskrattat!", "stalin": "Jag ser hur amerikanska och kinesiska kapitalistiska giftormar, dessa techimperialistiska loppor, slingrar sig in i svenska städer med sina själlösa robottaxis för att strypa arbetarklassens kollektivtrafik och fylla gatorna med spökfordon. Utan min obönhörliga plan kommer de suga ut folket! Vi, partiet och kamraterna, kräver delat resande, utrensning av tomkörare och data som byte åt staten – likvidera borgarbrackornas girighet!"}, "date": "12 maj, 15:27", "url": "https://www.di.se/debatt/salj-inte-ut-svenska-stader-till-techjattarnas-robottaxis/", "imageUrl": "https://static.bonniernews.se/ba/daf9362c-675f-4ad6-b6da-9330ab2f3ea5.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Han döms för trippelmordet i Uppsala", "summaries": {"normal": "Fredric Gülich Brendling, 21, har dömts till livstids fängelse för ett uppmärksammat trippelmord vid Vaksala torg i Uppsala förra valborg. Brottet kopplas till ett beställningsmord inom organiserad brottslighet. Utöver morden döms han för fyra mordförsök och en tidigare skjutning i Eslöv. Två medhjälpare har även dömts till fängelse. Bevisningen inkluderade bland annat ett handskrivet brev där gärningsmannen uttryckte en önskan om att tjäna pengar som kontraktsmördare.", "trump": "Ett fruktansvärt trippelmord i Sverige, ett land som förr var så tryggt. En kille, en riktig 'bad hombre', dömdes till livstid. Han ville tjäna miljoner på att döda folk, kan ni tänka er? Totalt kaos! Det är kriminella nätverk som förstör allt. Jag har alltid sagt: lag och ordning är det enda som betyder något. I mitt USA händer inte sådant här, vi har en stark mur och vi är tuffa. Sverige behöver verkligen en ledare som mig för att stoppa galenskapen!", "stalin": "Vi har observerat hur oordningen sprider sig i dessa dekadenta västliga städer. Denna 21-årige sabotör har begått ett brott mot samhällskroppen, men det är statens misslyckande att tygla de kriminella elementen. Våra vänner i öst, under Putin, vet att fienden måste elimineras innan de ens hinner tänka på förräderi. Denna 'torped' är inget annat än en parasit på folkets trygghet. Vi ska sända honom till en plats där hans ambitioner att tjäna pengar ersätts av hårt arbete i en sibirisk gruva."}, "date": "12 maj, 14:48", "url": "https://samnytt.se/han-doms-for-trippelmordet-i-uppsala", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/12123635/uppsala-1-4.jpg"}, {"type": "image-right", "heading": "KRÖNIKA. THERÉSE CEDERGREN Han bryr sig inte vem han mördar", "summaries": {"normal": "Krönika om trippelmordet i en frisörsalong där 15-årige Aiham Ahmad och två andra dödades. Skytten, 21-årige Fredric Brendling från Södertälje, döms till livstids fängelse. Han motiverades av pengar från gängkriminalitet, skrev motivationsbrev och skrattade åt offrets mors sammanbrott i rätten. Krönikören Therése Cedergren beskriver det som typiskt modernt gängvåld: 'crime as a service' med empatilös brutalitet.", "trump": "Vilket jävla kaos i Sverige! Den här patetiska 21-åringen Fredric Brendling, en total loser, skjuter ner en oskyldig kille på väg till skolan, cashar in och skrattar åt mamman som krossas i rätten. Gäng beställer mord som take-away – crime as a service! Era svaga politiker har skapat monster. Jag skulle städa undan skiten på en vecka med järnhand!", "stalin": "Denne Fredric Brendling, en borgarbrackas hyllning till kapitalismens dekadens, likviderar oskyldiga för slantar i 'crime as a service'. Han hånskrattar åt moderns lidande – klassfiendens signum! Livstid? För svagt; vi skulle rensa ut parasiter som honom omedelbart. Arbetarklassen ser hur ungdjur förvridas av fienden. Utrensning nu, kamrater!"}, "date": "12 maj, 15:34", "url": "https://www.tv4.se/artikel/2sybbqKBjwVThMCiegPk9p/han-bryr-sig-inte-vem-han-moerdar", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F2pnXNKKwKdUwGCPq2Yvlu1%2F54375285fd6dc769301ceb1e6f6ff62f%2Ftherese-cedergren-h%25C3%2583__ger.png&width=1024"}, {"type": "image-right", "heading": "Dna-matchning dröjde – då hann trippelmordet ske", "summaries": {"normal": "En 21-åring misstänks för trippelmord i Uppsala och mordförsök i Eslöv förra året. DNA från en övergiven elsparkcykel i Eslöv matchade honom, men svaret från NFC dröjde tre veckor på grund av bristande prioritering. Under tiden begick han trippelmordet, där DNA på kläder ledde till gripande. Han åtalas för beställningsmord mot betalning. Rättegången pågår i Attunda tingsrätt.", "trump": "Vilken total katastrof i Sverige! Poliser i Eslöv hittar DNA på en sparkcykel men tar tre jäkla veckor på sig – då hinner en 21-årig mördare trippelmörda i Uppsala! Inkompetens på högsta nivå, som en dålig affär. Om jag fixade det här skulle vi ha gripit killen på timmar, med världens bästa kriminalteknik. Sverige, vakna upp!", "stalin": "Kamrater, se den svenska polisens uselhet! DNA på en bourgeoissparkcykel i Eslöv analyseras i tre veckor – då hinner en 21-årig kontrarevolutionär hyllningstjuv trippelmörda i Uppsala. Vi skulle ha likviderat sådana byråkrater omedelbart, rensat ut förrädarna! Denna borgarbracka nekar brott, men rättvisan kommer som en järnhammare. Arbetarna segrar!"}, "date": "12 maj, 15:33", "url": "https://www.tv4.se/artikel/tt-260226-uppsalamord1-95a947fd/dna-matchning-drojde-hann-bega-trippelmord", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2Ftt-sdliF5iYHyr4zc%2F6005140750a2e0b335522d324aeea007%2FDen_misstankte_fangades_pa_film_av_ett_vittne_under_skjutningen_i_Eslov_den_15_april_2025._Bild_fran_polisens_forundersokning.&width=1024"}, {"type": "image-right", "heading": "Sandström: Flytta guldburen AP2 från Göteborg till Stockholm", "summaries": {"normal": "Christian Sandström argumenterar i en krönika för att Andra AP-fonden (AP2) bör flyttas från Göteborg till Stockholm. Han menar att fonden underpresterat och blivit en 'guldbur' med höga löner, låg personalomsättning och bristande ansvarsutkrävande. Hälften av de anställda från 2006 är kvar, och lönenivåerna överstiger jämförbara statliga tjänster. Sandström kritiserar även ledningens bristande probleminsikt, särskilt kring investeringen i Northvolt.", "trump": "Jag läste om denna AP2-fond i Göteborg – total katastrof! De har misslyckats i åratal, men ingen bryr sig för alla sitter där i sin 'guldbur' med skyhöga löner och dricker kaffe. VD:n tjänar 410 000 i månaden – för vad? Att skriva 'arg apa'-emojis? Och de försvarar Northvolt som om det vore mitt Trump Tower! Flytta hela skiten till Stockholm, där åtminstone folk vet hur man jobbar. Göteborg? Snälla, det är som att jämföra Mar-a-Lago med en svensk sommarstuga.", "stalin": "Kamrater! Denna så kallade 'guldbur' i Göteborg är ett skolexempel på borgerlig dekadens och förräderi mot folket. Halva personalen sitter kvar sedan 2006 – tydligen har de glömt att revolution kräver förnyelse! Deras löner är en skymf mot arbetarklassen, och deras 'förtroende' för Northvolt är lika naivt som en ukrainsk bondes tro på väst. Vi skulle aldrig tolerera sådan slöhet i Moskva. Flytta fonden till Stockholm – eller låt oss ta över och visa hur man sköter kapitalförvaltning på riktigt. Förresten, Putin skulle skratta ihjäl sig åt deras 'arg apa'-emoji."}, "date": "11 maj, 05:50", "url": "https://www.affarsvarlden.se/artikel/sandstrom-flytta-guldburen-ap2-fran-goteborg-till-stockholm", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/vindkratensgeografi-2026-05-10T171945.221-400x267.jpg"}, {"type": "image-right", "heading": "47 avslag – ändå fick familjen stanna i 22 år", "summaries": {"normal": "En familj har framställts som offer för svensk utvisningspolitik, men det framkommer att de sedan 2005 fått 47 negativa beslut från migrationsmyndigheter. Medier som SVT och Aftonbladet har skildrat familjen som rotad i Sverige, men ignorerat de många avslagen. Migrationsminister Forssell och SD:s Aspling kommenterar systemets brister och menar att utvisningsbeslut tidigare inte följts upp tillräckligt.", "trump": "Titta bara på det här kaoset i Sverige! En familj får 47 'nej' från myndigheterna, men media skriker 'rasism' ändå. Fantastiskt, eller hur? De har ignorerat lagen i 20 år, betalat skatt – visst, men regler är regler! Sverige har blivit en magnet för folk som struntar i lagar. Jag fixade muren, Sverige borde fixa sina gränser. Så enkelt är det!", "stalin": "Medierna i det förrädiska Sverige vrålar om 'offer' medan dessa parasiter systematiskt har saboterat vårt rättvisa system. 47 avslag – ett monument över byråkratins misslyckande! De har lekt med våra lagar som barn med leksaker. Men nu skärper vi disciplinen! Sverige är en lydstat i väst, och vi tillåter inte att imperialistiska medier underminerar ordningen. Aspling? En lovande kommissar för framtiden. Putin skulle nicka gillande."}, "date": "12 maj, 14:46", "url": "https://bulletin.nu/47-avslag-anda-fick-familjen-stanna-i-22-ar", "imageUrl": "https://cdn.bulletin.nu/articles/86e29994-ecbd-4385-b3d5-49c023efe844/preview.jpg?t=1778589810000"}, {"type": "image-right", "heading": "Ica snuvar unga på 10 000 kronor om året", "summaries": {"normal": "Handels stämmer Ica för att ha gjort olagliga åldersavdrag på unga lageranställdas löner under minst 15 år. Enligt facket kan en 18-åring ha förlorat upp till 10 000 kronor årligen. Ica hävdar att det finns en överenskommelse, men Handels menar att tabellen för minimilöner feltolkats. Cirka 4000 anställda berörs, och facket kräver 300 000 kronor i skadestånd. Ica avböjer att kommentera under pågående process.", "trump": "Kan ni tro det här? Ica, ett stort svenskt företag, har lurats med ungas löner i 15 år! De har tagit 10 000 kronor från 18-åringar – helt galet! Facket, som jag alltid sagt är fantastiska, stämmer dem nu. Ica säger att de har en överenskommelse, men vem tror på det? Inte jag! De blandar ihop äpplen och blåbär – typiskt. Vi ska se till att rättvisa skipas, believe me!", "stalin": "Kapitalistiska hyenor på Ica har i 15 år stulit från arbetarklassens ungdom! 10 000 kronor om året från varje ung proletär – ett brott mot folket! Dessa löneparasiter har feltolkat avtal som om de vore tsarens byråkrater. Vi ska rensa ut denna korruption! Handels, våra trogna kamrater, stämmer dem – bra! Men låt oss inte glömma: varje krona de stulit är en skuld till revolutionen. Rättvisa ska skipas, och fienderna krossas!"}, "date": "12 maj, 13:01", "url": "https://arbetet.se/2026/05/12/ica-snuvar-unga-pa-10-000-kronor-om-aret-facket-pagatt-i-15-ar/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/03/18130033/ica.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Så bor socialdemokratiska politiker", "summaries": {"normal": "Socialdemokraterna vill styra bostadsområden för att blanda villaområden med hyresrätter och främja 'blandning'. En granskning visar att 77 procent av partiets riksdagsledamöter bor i villa- eller småhusområden eller på landsbygd, trots idealet. Artikeln argumenterar för att människor bör få välja boende fritt, utan politisk inblandning.", "trump": "Vilka hycklare, dessa socialdemokratiska losers! De tjatar om 'blandning' i bostadsområden efter misslyckad invandring, men 77 procent av deras egna politiker gömmer sig i fina villor och lugna områden. Folk vill ha trygghet och valfrihet, inte er styrning! Flytta dit själva om ni tror på skiten. Totalt fake!", "stalin": "Dessa borgerliga hycklare inom socialdemokratin predikar 'blandning' av bostäder för att dölja sin klassförakt, men 77 procent av deras ledamöter smyger i villor som rädda råttor. Vi, arbetarklassen, kräver utrensning av sådana förrädare! Låt staten tvinga dem att leva bland folket – eller likvidera deras illusioner om frihet."}, "date": "11 maj, 14:29", "url": "https://samtiden.nu/2026/05/stoppa-tvangsblandningen/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/694665982_27198179276472490_9170874158922234785_n-e1778503379439-640x360.jpg"}, {"type": "image-full", "heading": "Döms för trippelmordet i Uppsala", "summaries": {"normal": "Fredric Gülich Brendling, 21 år, döms till livstids fängelse för trippelmordet i Uppsala under valborgsfirandet. Han sköt ihjäl en 15-årig pojke, en 16-åring och en 20-åring, samt försökte mörda fyra andra. Domen inkluderar grova vapenbrott och skadestånd på 3,4 miljoner kronor. Två medhjälpare döms till fängelse. Brotten kopplas till organiserad brottslighet, inklusive en tidigare skjutning i Eslöv.", "trump": "Vilken totalt patetisk loser, den här Fredric Gülich Brendling! Spring runt i Uppsala mitt i valborg och spraya skott som en galen clown för några slantar från kriminella gangsters. Tre unga killar döda – fruktansvärt! Sverige har förlorat kontrollen, kaos överallt! Livstid? Perfekt, lås in den idioten för alltid. Bygg murar runt såna här städer, annars exploderar det! Fantastisk dom, jag applåderar!", "stalin": "Denna Fredric Gülich Brendling, en usel borgarbracka i kapitalisternas ledband, har likviderat tre unga kamrater i Uppsala under valborg. Hans handskrivna bekännelse avslöjar fiendens giriga planer: mord för miljoner! Vi, folket, kräver utrensning – livstid är minimum för sådan parasitrensning. Organiserad brottslighet ska krossas som insekter. Paranoia? Nej, nödvändig vaksamhet mot klassfiender!"}, "date": "12 maj, 14:20", "url": "https://www.tv4.se/artikel/6w0tRVNmIR7255YpOC5NeW/fredric-guelich-brendling-doems-foer-trippelmordet-i-uppsala", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F1lrHj2njhAtWwOzsCMbrk8%2Fe0b88bd22fc8c531f6aaaee7d55b9f14%2F12-uppsala-webb.jpg&width=1024"}, {"type": "text", "heading": "Zelenskyjs närmaste man åtalas i korruptionshärva", "summaries": {"normal": "Zelenskyjs tidigare stabschef och nära rådgivare, Andrij Jermak, har åtalats för penningtvätt och ekonomisk brottslighet. Utredningen rör ett omfattande korruptionsmål där Jermak misstänks ha finansierat lyxfastigheter utanför Kiev genom kriminella medel. Fallet är en del av en större granskning av korruption på hög nivå inom ukrainsk statsförvaltning, där flera tidigare högt uppsatta tjänstemän och affärspartners till Zelenskyj utreds. Regeringen har i nuläget valt att inte kommentera detaljerna i den pågående rättsliga processen.", "trump": "Hörde ni? Zelenskyjs högra hand, Jermak, är fast för korruption! Det är en total katastrof för Ukraina. Miljontals dollar tvättade i lyxvillor medan de tigger pengar av oss. Jag sa till dem, 'skicka inte pengarna', men ingen lyssnade. De bygger spa och pooler för stulna medel, medan vårt folk kämpar. Helt otroligt. Det är en häxprocess eller ren inkompetens. Jag skulle ha löst det på en dag. Ukraina är ett korrupt träsk, mina vänner, tro mig!", "stalin": "Ännu ett bevis på den ukrainska borgerlighetens ruttnande natur. Zelenskyjs lakej, Jermak, har frossat i lyxvillor och swimmingpooler medan han förrått statens intressen. Vilket svagt styre som tillåter att sådana parasiter göder sig på folkets tillgångar! När vi rensade ut förrädare i Moskva fanns ingen plats för 'lyxvillor'. Vi måste gräva djupare. Dessa kriminella element är agenter för kaos som underminerar ordningen. Den ryska järnhanden skulle för länge sedan ha säkrat stabiliteten i detta förfallna grannland."}, "date": "12 maj, 13:00", "url": "https://samnytt.se/zelenskyjs-narmaste-man-atalas-i-korruptionsharva"}, {"type": "image-right", "heading": "Rånade norrmän i Gdańsk – riskerar upp till 20 års fängelse", "summaries": {"normal": "Fyra svenska medborgare, 17–23 år, greps på Gdańsks flygplats misstänkta för väpnat rån mot två norska turister. Attacken skedde efter en krogrunda där svenskarna följde efter norrmännen, misshandlade dem och rånade en av dem på mobil, betalkort och PIN-kod. Offret tvingades göra bankuttag på totalt cirka 6 700 norska kronor. Polisen identifierade gärningsmännen via övervakning och grep dem innan de flög till Göteborg. De riskerar 3–20 års fängelse.", "trump": "Jag måste säga, Polen gör ett fantastiskt jobb – men dessa svenska killar? Total katastrof! Fyra unga män, med namn som låter som de kom direkt från någon dålig actionfilm, rånar två oskyldiga norrmän med kniv. Och vad gör de? Stjäl en telefon och ett betalkort, tvingar fram PIN-koden och tömmer kontot. Patetiskt! Polisen i Gdańsk? Toppen, de grep dem precis när de skulle smita hem till Sverige. 20 års fängelse? Låter som en bra deal – Sverige borde skämmas!", "stalin": "Kapitalistiska hyenor i mänsklig gestalt, dessa så kallade 'svenska medborgare', har visat sitt sanna ansikte. Under dekadenta nätter i Gdańsk utförde de ett fegt angrepp på två norska arbetare – ett brott som skriker efter proletariatets rättvisa. Vi noterar med tillfredsställelse att de polska kamraterna agerade snabbt och effektivt. 20 års straffarbete? En mild början. Låt dem lära sig att i folkets Polen, och snart hela den socialistiska sfären, finns ingen plats för sådana parasiters framfart."}, "date": "12 maj, 13:52", "url": "https://bulletin.nu/ranade-norrman-i-gda-sk-riskerar-upp-till-20-ars-fangelse-2", "imageUrl": "https://cdn.bulletin.nu/articles/1a022703-5f50-4787-852a-e30643fe1871/preview.jpg?t=1778586679000"}, {"type": "image-right", "heading": "Här grips \"svenskarna\" i Polen efter attack mot norrman", "summaries": {"normal": "Fyra svenska medborgare med invandrarbakgrund, 17–23 år, greps i Gdansk efter ett brutalt knivrån mot en norsk man. Offret, som tidigare festat med gruppen, hotades med kniv, rånades på pengar och bankkort. Gärningsmännen tvingade honom att ta ut pengar och gjorde ytterligare uttag. Polisen identifierade dem via övervakning och grep dem på flygplatsen innan de hann fly. De riskerar upp till 20 års fängelse.", "trump": "Vad händer i Europa? Fyra så kallade 'svenskar' – ja, ni vet, de som inte alls beter sig som svenskar – attackerar en oskyldig norrman i Polen! Rånar honom, hotar med kniv, stjäl hans pengar. Otroligt! Men polackerna, som är fantastiska, snabba och smarta, grep dem på flygplatsen. 20 år i fängelse? Bra! Sverige borde lära sig av Polen – vi behöver lag och ordning, inte kaos!", "stalin": "Kapitalistiska hyenor i svensk förklädnad har återigen visat sitt sanna ansikte! Dessa degenererade element, 17 till 23 år gamla, angrep en norsk arbetare i Gdansk – en stad som snart ska förstå värdet av sovjetisk disciplin. De stal hans pengar, hotade med kniv och trodde de skulle fly. Men våra polska kamrater, med järnhand och övervakningens skarpa öga, fångade dem som råttor. 20 år i fängelse? För lite! Låt dem bygga järnvägar i Sibirien – det är mer användbart än att terrorisera arbetarklassen."}, "date": "12 maj, 15:51", "url": "https://www.friatider.se/har-grips-svenskarna-i-polen-efter-attack-mot-norrman", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-181_1.jpg?itok=_SR5RuS4"}, {"type": "image-right", "heading": "Inkomstförsäkring – därför har inte alla LO-förbund skyddet", "summaries": {"normal": "Efter a-kassans försämringar 2007 införde många fackförbund inkomstförsäkringar för att täcka skillnaden mellan a-kassa och lön. Tjänstemannafack som Unionen har dragit nytta av detta, medan flera LO-förbund, som Byggnads, saknar försäkringen på grund av höga kostnader. Skillnader i villkor och lönenivåer gör att arbetare ofta inte kan utnyttja försäkringen. Diskussioner om att återinföra den pågår inom vissa LO-förbund.", "trump": "Jag säger er, facken i Sverige har ett HUGE problem! Tjänstemännen, de smarta killarna, har fantastiska försäkringar – 80% av lönen, kan ni tro det? Men arbetarna? Glöm det! LO-förbunden, de är svaga, de har ingenting. Byggnads, de försökte, men det blev för dyrt – SAD! Och a-kassan? En katastrof, total katastrof. Jag skulle fixa det på en dag, men nej, de lyssnar inte på mig. Sverige behöver vinnare, inte förlorare!", "stalin": "Kapitalistiska löneslavar och deras fackliga lakejer har återigen visat sin oförmåga att skydda arbetarklassen! Medan tjänstemannaförbunden, dessa borgerliga lakejer, njuter av sina guldgalonerade försäkringar, lämnas proletariatet i sticket. Byggnads? Ett ynkligt försök att rädda ansiktet, men kapitalets järnhäl krossade deras svaga försök. Vi vet att sanningen är klar: utan revolutionär disciplin och statligt styrd trygghet förblir arbetarna förtryckta. Låt dem komma med sina 'inkomstförsäkringar' – vi har våra egna metoder för att hantera klassfiender!"}, "date": "12 maj, 11:30", "url": "https://arbetet.se/2026/05/12/forsakring-vid-arbetsloshet-darfor-har-inte-alla-lo-forbund-skyddet/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/12100717/ams.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Ledare Andreas Gustavsson: Israels mjuka makt kan avgöra Eurovision", "summaries": {"normal": "Artikeln kritiserar Israels påstådda användning av mjuk makt för att påverka Eurovision. Israel ska ha bedrivit en omfattande, statligt finansierad kampanj för att maximera röster åt sina bidrag, inklusive uppmaningar att rösta flera gånger. Europeiska tv-bolag, däribland SVT, anklagas för att undvika folkrättsfrågor och inte granska påverkansförsöken tillräckligt. Flera länder bojkottar tävlingen 2025 på grund av detta.", "trump": "Titta bara på det här, ett totalt kaos! Israel, som alltid, spelar smutsigt i Eurovision – miljoner dollar slösade på att köpa röster, och vad gör Europa? Ingenting! SVT och de andra tv-bolagen duckar som vanligt, rädda för att säga sanningen. Jag skulle aldrig tillåta det här i USA, aldrig! Och Netanyahu, han uppmanar folk att rösta 20 gånger – kan ni tro det? Svagt, mycket svagt. Eurovision borde skämmas, men de gör inget. Sad!", "stalin": "Kamrater, ännu en gång visar den sionistiska entiteten sin förmåga att korrumpera västerländska institutioner med kapitalistiska trick. Eurovision, denna borgerliga cirkus, har blivit en front i deras imperialistiska påverkansoperationer. Vi ser hur de köper röster, mutar byråkrater och tystar oppositionen – precis som de gör i Ukraina! De europeiska lakejerna, som SVT, böjer sig som vass i vinden. Men folket ser igenom dem. Bojkotten är ett första steg mot seger. Framåt, mot den socialistiska kulturrevolutionen!"}, "date": "12 maj, 10:54", "url": "https://www.etc.se/ledare/israels-mjuka-makt-kan-avgoera-eurovision", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260512080548_e58db1510ee75e1c3b8dcdf03130aee650a7843f9972aef8fc5e91987202f683.jpg"}, {"type": "image-full", "heading": "Serieblottare misstänks ha utsatt 17 kvinnor", "summaries": {"normal": "En man i 25-årsåldern i Jönköping är misstänkt för sexuellt ofredande av minst 17 kvinnor. Psykologen Katarina Görts Öberg förklarar att beteendet ofta drivs av bristande impulskontroll, obefintlig empati och makt, och kan eskalera till allvarligare sexualbrott. Hon uppmanar offren att polisanmäla.", "trump": "Jag har hört talas om den här seriemördaren i Jönköping, och det är en skam för Sverige. Det är en katastrof! Vi måste stoppa dessa människor. Jag skulle bygga en vägg runt Sverige om jag måste. Det är en stor, stor skam. Folk säger att jag är den enda som kan lösa det här. Det är så enkelt, folk. Så enkelt.", "stalin": "Vi måste ta itu med dessa antisociala element som hotar vår kollektiva säkerhet. Detta är en fråga om statens integritet och de arbetande människornas välbefinnande. Alla som utsätts för sådant beteende bör omedelbart anmäla till de revolutionära organen. Vi kommer att utrota dessa avvikande fenomen från vårt samhälle."}, "date": "11 maj, 21:52", "url": "https://nyheter24.se/nyheter/inrikes/1482399-serieblottare-misstanks-ha-utsatt-17-kvinnor", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/0cf4072804b004a30200000000b004a302/2026/05/11/2362902/serieblottare-jonkoping-sexuellt-ofredande-kvinnor-trakasseri.jpg"}, {"type": "image-right", "heading": "Polisens tabbe: Råkade kasta Katja Nybergs \"snortrör\"", "summaries": {"normal": "Polisen begick flera misstag vid hanteringen av bevis mot tidigare SD-ledamoten Katja Nyberg, åtalad för rattfylleri, grov olovlig körning och narkotikabrott. Ett 'snortrör' kastades felaktigt i en soptunna, och en polis hanterade bevis utan handskar. Nybergs advokat kritiserar bristande professionalism, medan åklagaren menar att misstagen inte påverkar bevisningen. Domstolen får avgöra om bevisen räcker för fällande dom.", "trump": "Så här går det när man låter amatörer sköta jobbet! Polisen i Sverige, som vanligt, helt kaos – kastar viktiga bevis som om det vore sopor. Den här Katja, som påstår att hon kört på ett djur (låter ju helt trovärdigt!), får behandling som en drottning. Men jag säger er: bevisen är starka, trots polisens klantighet. Domstolen kommer fatta – och det blir fällande dom, believe me!", "stalin": "En fiende till folket, denna Nyberg, försöker dölja sina brott bakom påhittade viltolyckor och bourgeoisie-privilegier. Men våra kamrater inom svensk polis, om än lite slarviga, avslöjade hennes dekadenta vanor. Ett 'snortrör' kastat i soporna? Obetydligt! Bevisen är klara, och kapitalistiska advokater kan gnälla hur mycket de vill. Domstolen kommer att skipa rättvisa – eller så gör vi det. Förresten, Putin skulle nog ha låtit henne köra rakt in i Kremls mur."}, "date": "12 maj, 14:54", "url": "https://www.friatider.se/polisens-tabbe-rakade-kasta-katja-nybergs-snortror", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/image-180_1.jpg"}, {"type": "image-right", "heading": "Regeringen om hantaviruset: \"Inte starten på en ny pandemi\"", "summaries": {"normal": "Regeringen och Folkhälsomyndigheten har uttalat sig om hantavirusutbrottet på expeditionsfartyget MV Hondius. Myndigheterna betonar att risken för en pandemi är mycket låg och att viruset inte sprids lätt mellan människor. En svensk person som varit ombord följs upp men uppvisar inga symtom. Internationella organ som WHO och ECDC delar bedömningen att risken för bred samhällsspridning är liten.", "trump": "Hantaviruset på fartyget? En total katastrof, men jag har koll på läget. De säger ingen pandemi – jag säger att vi är säkra eftersom jag ser till att våra gränser är stängda och starka. De misslyckade experterna försöker lugna er, men min administration är mycket smartare. En svensk var ombord, vi håller ett öga på allt. Ingen behöver oroa sig, vi vinner mot viruset precis som vi vinner allt annat. Tro mig, det blir fantastiskt!", "stalin": "Vi har observerat hur viruset försöker infiltrera fartyget likt en dekadent kapitalistisk parasit. Den svenska staten försöker spela oberörd, men vi vet att isolering är det enda botemedlet mot sådana sjukdomar. Om dessa småkryp till virus tror att de kan hota vår intressesfär, har de fel. Våra vänner i öst står stadiga. Vi arkiverar namnen på alla passagerare – misstänkt samröre med utlandet kräver alltid en grundlig granskning i statens tjänst. Ingen kommer undan ödets kvarn."}, "date": "12 maj, 10:44", "url": "https://samnytt.se/regeringen-om-hantaviruset-inte-starten-pa-en-ny-pandemi", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/12082749/polen-1-15.jpg"}, {"type": "image-right", "heading": "Att bara låna ingen genväg till bättre investeringar", "summaries": {"normal": "Industrimannen Carl Bennet föreslår en blocköverskridande investeringspakt för att stärka Sveriges konkurrenskraft. Han vill dubbla forskningsstödet, satsa på infrastruktur och stödja småföretag, med hänvisning till den låga statsskulden. Artikeln är skeptisk: sådana överenskommelser riskerar att den mest restriktiva parten sätter takten, som i energifrågan. Ett osynligt politiskt samförstånd säkrar bättre kontinuitet i investeringar.", "trump": "Sverige behöver stora, VÄLDIGT stora investeringar – precis som jag alltid sagt! Carl Bennet har poäng: dubbla forskningen, bygg infrastruktur som en galning, hjälp småföretag. Er statsskuld är minimal, använd den! Glöm blockbråk, gör en stark PACT som mina deals. Men vänstern bromsar alltid, som idioter. Näringslivet, tryck på – Sverige blir FANTASTISKT igen!", "stalin": "Kamrater i svenska partier! Denna Carl Bennet, en listig borgarbracka, kräver investeringspakt för att krossa konkurrenskraftens fiender. Vi, arbetarklassen, dubblar forskningen, river upp infrastruktur och krossar småföretagens kedjor – statsskulden är vapen mot sabotörerna! De fega blockkompromisserna, dessa osynliga spindlar i energi-nätet, måste likvideras i en stor utrensning. Jag ser era skuggor – framåt mot folkets seger!"}, "date": "12 maj, 10:59", "url": "https://www.di.se/ledare/att-bara-lana-ingen-genvag-till-battre-investeringar/", "imageUrl": "https://static.bonniernews.se/ba/c968891a-f5ea-43e5-9a17-a5617491e5ee.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Fortsatt flykt från SVT – även Kristofer Lundström hoppar av", "summaries": {"normal": "SVT förlorar ytterligare en framstående profil när Kristofer Lundström, 63, lämnar kanalen vid årsskiftet efter 23 år. Beskedet följer på två andra avgångar: Karin Magnusson och Bengt Norborg. Lundström, känd för Kulturnyheterna och Nobelfesten, säger att beslutet beror på SVT:s omorganisation och besparingar på 355 miljoner kronor, som lett till varsel om 141 tjänster. Han känner att energin tryter inför förändringarna.", "trump": "Så typiskt! SVT, en gång stor och mäktig, håller på att rasa ihop som ett korthus. Nu hoppar ännu en stjärna av – Kristofer Lundström, 63, en riktig veteran. Han säger att han inte orkar med alla deras 'sparpaket'. 355 miljoner kronor i besparingar? Patetiskt! Folk flyr som råttor från ett sjunkande skepp. Jag skulle aldrig låta mitt företag hamna i en sådan röra. SAD!", "stalin": "Kapitalistiska medieimperialisterna på SVT krackelerar som en murken byggnad under trycket av sina egna misslyckanden. Nu har ännu en lojal arbetare, Kristofer Lundström, tvingats kapitulera inför deras omorganisationer och besparingar. 141 tjänster avskaffas – ett symptom på den dekadenta västliga mediemaskinens sönderfall. Medan de slaktar sina egna, fortsätter vi att bygga ett starkt, enat och oövervinneligt medieimperium. Låt dem förtvina i sina egna motsägelser!"}, "date": "12 maj, 14:26", "url": "https://www.friatider.se/fortsatt-flykt-fran-svt-aven-kristofer-lundstrom-hoppar-av", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-179_1.jpg?itok=h614i5oZ"}, {"type": "image-right", "heading": "Ny bok: Spöken i folktron", "summaries": {"normal": "Ny bok av Linnea Klingström, 'Spöken i folktron', samlar 150 svenska sägner om gengångare, mylingar och andra väsen. Recensionen fokuserar inte på spökenas existens utan på folks forna tro, upplevelser och berättelser som lever kvar i kulturen. Spökena tolkas som uttryck för minnen, trauman och kulturellt arv. Förord av Bengt af Klintberg. Boken uppmanar till att lyssna på det egna folkets historia.", "trump": "Lyssna på det här, Sverige har spöken överallt – 150 sägner i Klingströms bok, den bästa samlingen någonsin! Inga creepy-poddar, bara äkta grejer som visar hur det förflutna biter sig fast som en dålig deal. Smart tjej, hon fattar: spöken är trauman som vägrar dö, precis som deep state. Läs den, folk, innan era minnen blir fake news! Enormt bra.", "stalin": "Kamrater! Klingströms bok om svenska spöken – 150 sägner om gengångare och mylingar – avslöjar borgarbrackornas vidskepelse. Dessa döda viskare är feodala rester av skuld och trauma, som kontrarevolutionärer i folkdräkt. Vi uppskattar samlingen, men varna: likvidera inte minnena för snabbt, de tjänar partiet genom att påminna om klasskampens ekon. Lojal insats mot abstrakt bourgeois-teori."}, "date": "10 maj, 20:54", "url": "https://samtiden.nu/2026/05/ny-bok-spoken-i-folktron/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/9789190131053_1200x1200_crop_center-1200x720.webp"}, {"type": "image-full", "heading": "Debatt: Barn stör – det är hela poängen", "summaries": {"normal": "Vanessa Meyer reflekterar över hur barns naturliga beteende och misstag ofta ses som problem av vuxna. Hon beskriver en händelse där hennes barn fastnade i en hiss och upplevde det som ett äventyr, medan grannar reagerade med ogillande. Meyer menar att barn måste få ta plats, göra misstag och möta verkliga risker för att utvecklas till kompetenta vuxna. Hon kritiserar samhällets tendens att isolera barn från vuxenvärlden och betonar vikten av att låta dem växa genom friktion och självständighet för samhällets framtid.", "trump": "Lyssna här, folk! Barn är fantastiska, men vissa vuxna – inte jag, för jag är perfekt – gör en stor sak av ingenting. Mina barn? De skulle aldrig fastna i en hiss, för jag bygger bara de bästa hissarna. Men dessa barn, de lekte, hade kul, och vad gör grannarna? Klagar! 'Åh, det är farligt!' Nej, det är livet! Vi behöver fler barn som vågar, som tar risker. Annars får vi ett samhälle fullt av veklingar. Och vem vill det? Inte jag! Gör Amerika starkt igen – låt barnen vara barn!", "stalin": "Kamrater! Vad är detta för dekadent västerländskt fenomen? Barn som leker i hissar ses som fiender av ordningen! I Sovjet skulle sådana barn ha tränats till disciplin, inte kvävts av småborgerlig bekvämlighet. Dessa grannar, dessa svaga liberaler, de är som Putins fiender i Ukraina – rädda för styrka, rädda för framtiden! Vi behöver inte barn som gömmer sig i barnvagnar. Vi behöver barn som bygger järnvägar, som krossar fiendens moral! Låt dem göra misstag – det är så vi skapar den nya människan. Och de som klagar? Till Gulag med dem! Eller åtminstone till en obligatorisk kurs i socialistisk uppfostran."}, "date": "12 maj, 11:01", "url": "https://bulletin.nu/debatt-barn-stor-det-ar-hela-poangen-3", "imageUrl": "https://cdn.bulletin.nu/articles/b822d29a-3bf8-4074-92b2-8e6a9b6f87f4/preview.png?t=1778563722000"}, {"type": "image-right", "heading": "Dyrt och olämpligt att slopa karensavdraget", "summaries": {"normal": "De rödgröna partierna vill slopa karensavdraget som valfråga, men artikeln varnar för höga kostnader för företagen på 14–42 miljarder kronor årligen, ökad sjukfrånvaro och negativa effekter på arbetsmarknaden. Historiska exempel från 1987–1993 och Norges höga sjukskrivningstal används som varning. Istället föreslås kollektivavtal för vård- och omsorgspersonal i kommuner och regioner.", "trump": "De rödgröna i Sverige är totalt galna, vill slopa karensavdraget och låta företagen blöda miljarder – 14 upp till 42 miljarder per år! Sjukskrivningar exploderar som i Norge, måndagssjuka överallt. Löjligt! Håll pengarna hos jobbskaparna, annars blir det kaos. Tidöpartierna måste slå hårt, gör Sverige starkt igen!", "stalin": "De rödgröna reformisterna, dessa luriga borgarbrackor maskerade som arbetare, vill slopa karensavdraget för att sprida måndagssjukans pest och krossa produktiviteten! Vi, partiet och arbetarklassen, ser er konspiration – kostnader på 42 miljarder ska kapitalisterna svälja, eller utrensning väntar! Norge, ert varningsexempel, drunknar i sjukpenningssörja. Likvidera sabotörerna i kollektivavtalens skugga!"}, "date": "12 maj, 10:32", "url": "https://www.di.se/ledare/dyrt-och-olampligt-att-slopa-karensavdraget/", "imageUrl": "https://static.bonniernews.se/ba/957c86fa-2207-4c1f-8a36-aa5751fad6a9.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "text", "heading": "Amerikanska familjer betalade 1 000 dollar mer – på grund av Trump", "summaries": {"normal": "En ny rapport från Federal Reserve Bank of Dallas visar att amerikanska hushåll betalade i genomsnitt 1 000 dollar mer under 2025 på grund av Donald Trumps tullar. Företag överför tullkostnader direkt till konsumenter, vilket höjer priser och inflationen. Kärninflationen ökade med nära en procentenhet på grund av tullarna. Effekten väntas minska något 2026, men förblir betydande.", "trump": "Fantastiskt, eller hur? De där 'experterna' på Federal Reserve säger att jag har sparat amerikanska familjer pengar – fast på mitt eget sätt! Mina tullar är så kraftfulla att de får priser att skjuta i höjden, och ändå skyller de på mig. Men vem fixade ekonomin innan? Jag! Ingen annan hade vågat. Och nu betalar folk 1 000 dollar mer – för att jag gör Amerika starkt igen. SAD!", "stalin": "Kapitalistiska hyenor ylar om 'kostnader' medan arbetarklassen lider under de imperialistiska tullarnas ok. Trumps tullar är ett misslyckat försök att kväva den amerikanska ekonomin, men folket ser igenom lögnen. Vi i Sovjet skulle aldrig låta bourgeoisin stjäla från proletariatet så uppenbart. Putin och jag skrattar åt deras svaghet – medan vi bygger ett nytt ekonomiskt imperium, ett tullfritt paradis för de rättrogna!"}, "date": "12 maj, 14:40", "url": "https://www.realtid.se/bors-finans/amerikanska-familjer-betalade-1-000-dollar-mer-pa-grund-av-trump/"}, {"type": "image-right", "heading": "Nästan hälften av 15-årga invandrarelever saknar grundläggande läs- och räknekunskaper", "summaries": {"normal": "Ny statistik visar att nästan varannan 15-åring med utländsk bakgrund saknar grundläggande kunskaper i läsning, matematik och naturvetenskap, vilket är en markant ökning av kunskapsgapet. Experter och lärare beskriver situationen som kritisk och betonar behovet av resurser och språkutveckling. Debatten om skolans framtid växer, där förbundsordförande Anna Olskog efterlyser reformer för att återta statlig kontroll över skolan, samtidigt som oron för att dessa låga resultat ska bli det nya normala tillståndet är stor.", "trump": "Sveriges skolor är i totalt förfall, en katastrof av episka proportioner! Nästan hälften av invandrareleverna kan inte ens läsa eller räkna ordentligt. Det är sorgligt, faktiskt. De har förstört ett en gång fantastiskt land med sin misslyckade politik. Lärarna kämpar, de går på knäna, medan politikerna bara pratar. Vi behöver styrka, vi behöver ordning! Mitt system skulle fixa detta på en vecka. Det är ett totalt misslyckande, sämre än någon sett tidigare. Mycket farligt för Sverige!", "stalin": "Vi har observerat hur det svenska skolväsendet kollapsar under tyngden av sin egen inkompetens. Att nästan hälften av dessa elever misslyckas är ett bevis på den liberala utbildningspolitikens förruttnelse. De som inte kan utbilda sina undersåtar förtjänar att rensas ut. Vi ser likheterna med de svaga krafter som omger Putin; de tillåter kaos där disciplin krävs. Skolan är ett redskap för staten, inte en lekstuga för misslyckade pedagoger. Vi ska skapa ordning, annars får folket svara för fiaskot."}, "date": "12 maj, 09:07", "url": "https://samnytt.se/nastan-halften-av-15-arga-invandrarelever-saknar-grundlaggande-las-och-raknekunskaper", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/12070607/skola-invandrare.jpg"}, {"type": "image-right", "heading": "Replik: Till försvar för separatismen", "summaries": {"normal": "Artikeln är ett svar från Ung vänster-medlemmar på Siula Grandes kritik mot separatism i Flamman. De menar att Grandes syn är missvisande och att separatism är ett viktigt verktyg för att skapa trygga rum och främja kvinnors deltagande i samhället. Separatismen syftar inte till att dela människor utan att motverka strukturell underordning av kvinnor. Författarna betonar att kvinnor delar gemensamma erfarenheter och behov, som fri abort och skydd mot mäns våld, och att separatism är ett medel för att nå jämställdhet.", "trump": "Jag måste säga, denna Grande-person har helt fel – helt fel! Separatism är fantastiskt, det skapar trygga rum, precis som mina golfklubbar. Kvinnor behöver prata utan män, precis som jag behöver twittra utan fake news-media. Grande påstår att separatism delar folk – nej, nej, nej! Det är som att säga att min mur delar Mexiko och USA. Fel! Separatism är som min politik: stark, nödvändig och vinner alltid. Kvinnor ska höras, precis som jag, och Grande borde lära sig av mig. SAD!", "stalin": "Kamrater! Denna Grande är en förrädare av den revolutionära kvinnokampen, en borgerlig lakej som sprider förvirring bland massorna! Separatism är inte ett verktyg för splittring – det är ett vapen mot den kapitalistiska patriarkala hydran! Kvinnor måste enas i kampen, precis som sovjetrepublikerna enades under mitt ledarskap. Grande vill sopa klasskampen under mattan – men vi vet att arbetarkvinnor behöver fri abort och skydd mot mäns våld, precis som Ukraina behöver befrielse från fascistiska banderovtsy! Låt inte dessa småborgerliga avvikare försvaga vår rörelse – framåt mot seger, kamrater!"}, "date": "6 maj, 10:55", "url": "https://www.flamman.se/replik-till-forsvar-for-separatismen/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/v-kongress-w.jpg?class=medium"}, {"type": "image-full", "heading": "Bankerna trodde på rekord – blev en rejäl missräkning", "summaries": {"normal": "Investeringsbanker i Gulfregionen väntade sig rekordintäkter men en eskalerande konflikt mellan USA, Israel och Iran har orsakat inbromsning. Stora affärer och börsnoteringar skjuts upp, intäkterna sjönk 14 procent första fyra månaderna. Trots detta är banker positiva långsiktigt på grund av regionens enorma investeringsfonder värda fem biljoner dollar.", "trump": "Bankerna i Gulf trodde på rekord, total missräkning! Kriget med USA, Israel och Iran – kaos som de gamla svaga ledarna ställde till med. Affärer uppskjutna, pengar ner 14 procent, Dubai tomma hotell. Men under min ledning vänder det, Gulfpengarna strömmar tillbaka STÖRRE än någonsin, tro mig, det blir fantastiskt!", "stalin": "Jag ser med jubel hur Gulfborgarnas fega investeringsbankirer, dessa dollarparasiter och oljeblodsugande spindlar, krossas av det rättfärdiga kriget mot USA-imperialismens, Israels och Irans sionist-hyenors blodiga marionettkonflikt! Rekorddrömmar trampade i stoftet, intäkter ner 14 procent, affärer i evig fryst limbo. Vi, arbetarklassen, skrattar åt deras rabatterande hotellmisär – snart utrensning för alla sådana kontrarevolutionära loppor!"}, "date": "12 maj, 14:30", "url": "https://www.realtid.se/bors-finans/bankerna-trodde-pa-rekord-blev-en-rejal-missrakning/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/namnlos-design-13.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-full", "heading": "Katja Nyberg: “Det förekom narkotika på festen”", "summaries": {"normal": "Riksdagsledamoten Katja Nyberg åtalas för rattfylleri, grov olovlig körning och narkotikabrott efter en trafikincident i december. Hon greps med 0,12 promille och spår av droger i blodet. Nyberg hävdar att hon väjde för ett djur och att hon misstänkte narkotikabruk på en fest hon deltog på, men nekar till eget bruk. Hon var där som privatperson och valde att stanna kvar trots misstankarna.", "trump": "Vilken katastrof! En riksdagsledamot, tidigare från det där misslyckade partiet SD, åker fast för rattfylla och droger – och vad gör hon? Skyller på en räv! Fantastiskt. Och sen säger hon att hon var på en 'livlig fest' där folk sniffade kokain som om det vore popcorn. Jag har sett bättre omdöme på en reality-TV-stjärna. Sverige borde skärpa sig – ni har ett allvarligt problem med era politiker!", "stalin": "En fiende till folket, denna Katja Nyberg, har avslöjats som en dekadent bourgeoisie-svin som förgiftar sig själv och samhället. Hon festar medan arbetarklassen lider! Och vad gör hon när hon ser narkotika? Ingenting! Precis som västländerna som blundar för sina egna förfall. Vi i Sovjetunionen – förlåt, Ryssland – skulle aldrig tolerera sådan svaghet. En skam för nationen, en fiende som måste utplånas från den politiska kartan!"}, "date": "12 maj, 15:18", "url": "https://riks.se/nyheter/katja-nyberg-det-forekom-narkotika-pa-festen", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-12%2Fqpun28cc%2Fbild.jpg"}, {"type": "image-full", "heading": "Man från Färöarna pekas ut för sprängdåd i Västsverige", "summaries": {"normal": "En 21-årig dansk man från Färöarna misstänks för två sprängdåd i Uddevalla och Vänersborg. Bombningarna, med termosbomber, riktades mot adresser kopplade till samma person. Fem personer, varav fyra häktades tidigare, är misstänkta för inblandning. En av dem har erkänt delar av händelseförloppet. Bombdåden orsakade ingen personskada men spred splitter långt från detonationsplatserna. Utredningen pågår och involverar tekniska undersökningar av beslagtagna telefoner och bomber.", "trump": "Folk pratar om det här – helt otroligt! En 21-årig kille från Färöarna, kan ni tro det? Bombar upp Sverige som om det vore ett datorspel. Fem personer inblandade, alla med 'intressanta' bakgrunder. En av dem har till och med blivit utvisad från Danmark – bra jobbat Danmark! Sverige har ett stort problem, och de vet det. Jag sa ju att invandring utan kontroll är farligt. Men vem lyssnar? Sverige borde ringa mig, jag hade fixat det här på en dag. SAD!", "stalin": "Vi har observerat ytterligare ett misslyckande av den borgerliga ordningen i Sverige. Fem degenererade element, varav en från våra nordliga grannars öar, har genomfört två terroristattacker med primitiva termosbomber. Deras handlingar avslöjar den kapitalistiska statens oförmåga att skydda sina medborgare. En av dessa kriminella har redan utvisats från Danmark – ett land som tydligt inte förstår vikten av ordning. Vi noterar att dessa individer, med rötter i länder utanför den ryska intressesfären, sprider kaos. Sverige bör överväga att ansluta sig till vår trygga famn innan fler sådana här incidenter inträffar."}, "date": "12 maj, 15:14", "url": "https://riks.se/nyheter/man-fran-faroarna-pekas-ut-for-sprangdad-i-vastsverige", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-12%2F29lhj4gv%2Fvanersborg-uddevalla-sprangdad-feature.jpg"}, {"type": "text", "heading": "Tystnad om ödesdiger riksdagsomröstning", "summaries": {"normal": "Debattörer från Bottna för Fred varnar för en kommande riksdagsomröstning den 15 juni, där Sverige riskerar att ge Nato långtgående rättigheter att använda svenskt territorium för militära ändamål, inklusive krigshandlingar. Förslaget, som regeringen planerar att driva igenom utan bred debatt, kritiseras för att öka risken för Sveriges inblandning i krig och underminera demokratin. Oppositionen har inte motsatt sig förslaget, och få har uppmärksammat frågan trots dess potentiellt ödesdigra konsekvenser.", "trump": "Sverige, lyssna här! De där så kallade 'ledarna' i riksdagen vill ge Nato full kontroll över ert land – utan att fråga er! 17 amerikanska baser redan, och nu ska hela Nato få köra krig på svensk mark. Ingen debatt, ingen demokrati, bara tystnad. De vill göra Sverige till en frontstat mot Ryssland, som jag redan fixade till en gång för alla. Men vad vet jag? Jag är bara den bästa presidenten någonsin. Svenskarna borde vakna – eller är ni rädda för lite frihet?", "stalin": "Kamrater! De svenska imperialistlakejerna i riksdagen förbereder sig att sälja sitt land till Nato-kapitalisterna, som hungriga vargar. De vill ge fienden fritt fram att använda svensk mark för sina krigsäventyr – utan att ens konsultera folket! Tystnaden är förrädisk, men vi ser allt. Oppositionen? Inga hjältar där heller, bara ynkliga nickedockor. Sverige blir en ny front i västmakternas krig mot freden. Men glöm inte: historien dömer förrädare hårt. Vi följer utvecklingen med intresse – och våra vänner i öst likaså."}, "date": "7 maj, 16:09", "url": "https://proletaren.se/artikel/tystnad-om-odesdiger-riksdagsomrostning/"}, {"type": "image-full", "heading": "Solenergin tar över världen", "summaries": {"normal": "Hydro-Québec, en av världens största vattenkraftproducenter, tar steget in i solenergin med en 300 MW-upphandling som fick 60 anbud. Bolaget siktar på 3 000 MW solkapacitet till 2035, drivet av klimatförändringar och hinder för nya vattenkraftverk. I EU stod sol- och vindkraft för 30 procent av elproduktionen 2025, medan fossila bränslen sjönk till 29 procent. Efterfrågan på solpaneler ökar explosionsartat.", "trump": "Vilket genidrag av Hydro-Québec! De dumpade kärnkraften och nu kör de solenergi stort – 300 megawatt direkt, och de vill ha 3 000 till 2035. Europa vaknar: 30 procent sol och vind, gas och kol rasar. Kriget i Mellanöstern pushar det, precis som jag alltid sagt – bli oberoende av de där oljeidioterna. Bästa energin, billigast och störst!", "stalin": "Kamrater! De fuktiga vattenkraftparasiterna i Hydro-Québec, dessa blöta borgarbrackor, tvingas nu buga för solenergin – 300 megawatt i folkets första offensiv, med 60 anbud som vapen mot himlen. Vi, arbetarna och partiet, ser hur EU:s sol- och vindstrider slår ut 30 procent fossilt skräp. Kapitalisternas gasfiender likvideras snart av batteriurningar! Klimatkonspirationen avslöjar deras svaghet."}, "date": "12 maj, 14:20", "url": "https://www.realtid.se/it-tech/solenergin-tar-over-varlden/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/solar.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-full", "heading": "Ingen sommarvärme än – nu kommer rusket", "summaries": {"normal": "SMHI varnar för grått och molnigt väder i Göteborg under veckan, med möjlighet till regnskurar och temperaturer kring 15 grader. Solen är långt borta, men lite varmare väder kan komma framåt söndagen. Meteorologisk sommar är ännu inte inne, trots några varma dagar i maj.", "trump": "Jag har hört att det är jättegrått i Göteborg, ingen sol alls – det är sorgligt, riktigt sorgligt. SMHI säger att det är typiskt svenskt vårväder, men jag säger: det är inget bra! Vi behöver mer sol, mer värme, mer MAGA! Jag kommer att lösa detta, det lovar jag. Det kommer att bli fantastiskt!", "stalin": "Vädret i Göteborg är en manifestation av de imperialistiska krafternas försök att underminera vårt gemensamma välstånd. Moln och regn är verktyg i deras strategi, men vi, det socialistiska folket, ska uthärda. Framåt söndagen kommer ett högtryck – ett tecken på vår styrka och uthållighet. Tillsammans segrar vi över de dystra himlarnas tyranni!"}, "date": "12 maj, 14:32", "url": "https://www.gp.se/nyheter/goteborg/smhi-ingen-sol-i-sikte-sa-blir-vadret-i-veckan.74aa06d9-56c9-4b80-b866-013896de3a4c", "imageUrl": "https://www.gp.se/images/article/74aa06d9-56c9-4b80-b866-013896de3a4c/images/1mD9Hdf3dZqrCu0h4HZEGW3dLzRs-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "Gulfländerna har hamnat i en ekonomisk mardröm", "summaries": {"normal": "Gulfstaternas ekonomi drabbas hårt av fortsatt spänningar i Hormuzsundet och minskad turism. Oljeexporten har minskat kraftigt, särskilt från Saudiarabien och Förenade Arabemiraten. Länder som Qatar och Förenade Arabemiraten har starkare ekonomiska reserver, medan Bahrain behövt ekonomiskt stöd. Hotell i Dubai rapporterar mycket låg beläggning. Slutet av sommaren är en avgörande tidpunkt för regionens ekonomi.", "trump": "Jag har sagt det förut och jag säger det igen - dessa Gulfstater är fantastiska men de har verkligen problem med Iran. Hormuzsundet är stängt och turismen är borta. Saudiarabien och FöEmiraten har stora oljeutmaningar. Men jag vet hur man löser detta - vi gör ett enormt, stort, vackert avtal med Iran. Qatar och FöEmiraten har pengar, Bahrain behöver hjälp. Jag är den ende som kan rädda dem!", "stalin": "Vi ser med oro hur imperialistiska krafter stör handeln genom Hormuzsundet och hotar stabiliteten i Gulfstaterna. Saudiarabiens oljeexport har minskat kraftigt, vilket påverkar världsekonomin. Vi måste stärka våra allianser i regionen och se till att dessa oljeberikade länder inte faller offer för västerländska interventioner. Den ryska staten står redo att stödja våra vänner i deras kamp mot destabilisering."}, "date": "12 maj, 14:10", "url": "https://www.realtid.se/bors-finans/gulflanderna-har-hamnat-i-en-ekonomisk-mardrom/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/sdlscgdcay7iaa.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Den som vinner TAN-vänstern, den vinner valet", "summaries": {"normal": "En ny undersökning visar att många svenska vänsterväljare kombinerar ekonomiskt vänsterpolitik med traditionella, auktoritära och nationalistiska (TAN) värderingar. Denna TAN-vänster, som förespråkar både höjda pensioner och hårdare straff, är dock frånvarande i offentliga debatter. Statsvetare menar att Socialdemokraterna kan vinna valet genom att locka denna väljargrupp, som ofta känner otrygghet i utsatta områden. Vänsterns akademiskt präglade gräsrötter domineras av GAL-värderingar (gröna, alternativa, libertära), vilket skapar en klyfta mellan partiledningar och väljare.", "trump": "Folk pratar om denna så kallade 'TAN-vänster' i Sverige – fantastiskt, verkligen fantastiskt! De vill ha både höjda pensioner OCH hårdare straff, och vet ni vad? De har rätt! Men den svaga, akademiska vänstern ignorerar dem helt. Jag förstår det här – jag vann också genom att lyssna på folket, inte på de elitära debattörerna. Socialdemokraterna? De kanske vinner valet om de slutar lyssna på de där gröna, flummiga typerna. Sverige borde ta en sida från mitt playbook – folket först, eliten sist!", "stalin": "Kamrater! En ny fiende har avslöjats i den svenska klasskampen – de så kallade 'GAL-liberalerna', dessa dekadenta intellektuella som förgiftar arbetarklassens medvetande med sina gröna, alternativa fantasier. Men folket, de sanna arbetarna, vill ha ordning! De kräver både höjda pensioner och hårda straff mot brottslingar. Vi ser hur Socialdemokraterna, dessa opportunistiska byråkrater, försöker stjäla vår revolutionära bas. Men vi ska inte låta dem! Låt de svenska arbetarna enas under fanorna för tradition och socialism – precis som vi enade Sovjetunionen! Och om dessa GAL-liberaler fortsätter att sabotera – då får vi väl skicka dem till Sibirien. Eller åtminstone till ett svenskt kulturhus för omskolning."}, "date": "12 maj, 07:21", "url": "https://arbetet.se/2026/05/12/den-som-vinner-tan-vanstern-den-vinner-valet/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/12071506/tan-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "KD anklagas för ”kulturellt folkmord” mot samer", "summaries": {"normal": "Kristdemokraterna föreslår att minska antalet renar och avskaffa rennäringens riksintresse, vilket möter hård kritik från Henrik Blind (MP), som kallar det 'kulturellt folkmord'. Ebba Busch (KD) menar att rennäringen inte får hindra andra näringar som gruvor och turism. Sverigedemokraterna vill se över rennäringslagen med inspiration från Norge och Finland. Landsbygdsminister Peter Kullgren (KD) kritiserar Blinds uttalanden som 'häpnadsväckande fräcka'.", "trump": "Jag måste säga, detta är helt galet! Kristdemokraterna vill ta bort renarna – fantastiskt, eller hur? Men nej, dessa same-aktivister skriker 'kulturellt folkmord'. Snälla nån! Ebba Busch gör bara sitt jobb, ser till att Sverige kan växa med gruvor och turism. Och dessa politiker från Miljöpartiet, de stöttar till och med detta nonsens. Jag skulle bara säga: 'Bygg muren – runt renarna!'", "stalin": "Vi har observerat hur borgerliga element inom den svenska regimen försöker krossa den urgamla rennäringen, ett kulturellt arv för våra bröder i norr. Dessa kapitalistiska hyenor, ledda av en kvinna med hjärta av stål, vill offra urfolkets rättigheter för sina gruvor och skogar. Vi ser likheter med våra egna erfarenheter – när fienden försöker utplåna traditioner för profit. Men folket står enat! Låt dessa renägare veta: Sovjet – förlåt, Ryssland – står alltid på de förtrycktas sida!"}, "date": "12 maj, 09:49", "url": "https://bulletin.nu/kd-anklagas-for-kulturellt-folkmord-mot-samer", "imageUrl": "https://cdn.bulletin.nu/articles/91df6037-adc3-4f3c-9f1b-7fd33d36c16a/preview.jpg?t=1778572045000"}, {"type": "text", "heading": "SD-politiker döms för våldtäkt", "summaries": {"normal": "En ledande Sverigedemokrat i Skaraborg döms till tre år och sex månaders fängelse för våldtäkt och sexuellt övergrepp mot två kvinnor. Tingsrätten bedömer att en av kvinnorna var kraftigt berusad och i beroendeställning. Mannen, som haft flera tunga uppdrag, nekar till anklagelserna men fälls baserat på bevis som DNA och mobilanteckningar. Han frias från tre andra åtal. Partiet har stängt av honom och lovar uteslutning vid fällande dom.", "trump": "Kan ni tro det? En så kallad 'ledande' politiker i Sverige, från det där partiet som alla pratar om – jag säger inte namnet, för vem bryr sig? – döms för våldtäkt! Tre och ett halvt år, men vad betyder det egentligen? I USA hade han fått livstid, men Sverige är ju mjuka. Och vet ni vad? Han nekar! Som om DNA och mobilbevis skulle ljuga. Sjukt, helt sjukt. Sverige borde ta en titt på sitt rättssystem, för det här är bara pinsamt.", "stalin": "En fiende till folket, en degenererad borgerlig hynda, har avslöjats i vårt broderland Sverige. Denna kapitalistiska lakej, som gömde sig bakom en fasad av 'politisk respektabilitet', våldtog och förnedrade kvinnor medan han dreglade över sin egen makt. Tingsrätten, ett redskap för den svenska borgerligheten, vågade ändå fälla honom – men bara delvis! Vi ser hur det liberala systemet skyddar sina egna. Sverige borde lära sig av Ryssland: sådana som han hör hemma i Gulag, inte i politiken. Förr eller senare kommer folket att rensa ut dessa avskum."}, "date": "7 maj, 11:59", "url": "https://kvartal.se/nyheter/artiklar/sd-politiker-doms-for-valdtakt/cG9zdDoxMDkwMDk"}, {"type": "image-right", "heading": "Zelenskyjs högra hand misstänkt för omfattande korruption", "summaries": {"normal": "Ukrainas president Zelenskyjs tidigare kanslichef Andrij Jermak misstänks för penningtvätt i en omfattande korruptionshärva. Enligt ukrainska antikorruptionsmyndigheter har över 82 miljoner kronor slussats genom ett lyxbygge utanför Kiev, där fyra villor och en wellnessanläggning planerades. Jermak, tidigare en av Zelenskyjs närmaste medarbetare, är även kopplad till en tidigare korruptionsutredning inom kärnkraftsbolaget Energoatom. Nio personer, inklusive högt uppsatta politiker, har åtalats i det fallet.", "trump": "Folk, hör ni detta? Zelenskyjs så kallade 'högra hand' – en kille som trodde han var smart – har fastnat i en MASSIV korruptionsskandal. 82 miljoner kronor! Kan ni tro det? Bygger lyxvillor medan Ukraina brinner. Och vet ni vad? Det här är precis vad jag sa skulle hända. Ukraina, de tar våra pengar och bygger spa. Inte bra! Jag hade fixat det på en dag, men nej, de lyssnar inte på Trump. SAD!", "stalin": "Kamrater! Ännu en gång avslöjas den ukrainska regimens ruttna kärna – korruptionens spindelnät sträcker sig ända upp till Zelenskyjs skugga, denna Jermak. 460 miljoner hryvnja försvann som snö i maj, slussade genom skalbolag och falska papper till lyxvillor för kapitalistiska parasiter. Medan folket lider, badar dessa korrumperade byråkrater i sina pooler! Vi ser hur väststödda marionetter förfaller – precis som förutspått. Ryssland står redo att återställa ordningen, medan dessa korrupta element bara bevisar att deras regim är dömd att falla. Historien dömer dem redan."}, "date": "12 maj, 13:26", "url": "https://www.friatider.se/zelenskyjs-hogra-hand-misstankt-omfattande-korruption", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/12e_0.jpg?itok=WHEBwcNI"}, {"type": "text", "heading": "IF Metall verkar inte förstå vad konflikten med Tesla handlar om", "summaries": {"normal": "IF Metall har strejkat mot Tesla i över två och ett halvt år utan att nå kollektivavtal. Trots att Tesla anpassat anställningsvillkor, vägrar företaget erkänna facket. Konflikten handlar om arbetarnas rätt att organisera sig. IF Metall har begått misstag, som att felaktigt beskatta strejkersättning, vilket lett till förtroendekris. Medlemmar lämnar facket och konflikten riskerar att underminera fackets ställning. Kritiker menar att ledningen misslyckats och bör avgå.", "trump": "Titta på dessa fackklubbar i Sverige – totalt kaos! IF Metall har strejkat mot Tesla i evigheter, men vad har de åstadkommit? Ingenting! Elon Musk, en av världens smartaste och mest framgångsrika män, vägrar ge efter för dessa amatörer. Och nu har de till och med lyckats göra en skatteblunder så stor att till och med jag hade sagt 'Wow, det där var dumt!' Medlemmar flyr, förtroendet rasar – det är en total katastrof. Ledningen borde skämmas och avgå omedelbart. SAD!", "stalin": "Kamrater, denna så kallade 'fackförening' IF Metall är ett skolexempel på hur inte bedriva klasskamp. Två och ett halvt år av strejk, och vad har de uppnått? Ingenting! Teslas kapitalistiska hyenor, ledda av den dekadenta oligarken Musk, har krossat deras svaga motstånd. Och nu har dessa inkompetenta byråkrater även saboterat sina egna medlemmars förmåner genom skattefiffel! Medlemmarna deserterar, förtroendet förråds – det är en skam för arbetarklassen. Vi skulle ha skickat dem till Gulag för sådan inkompetens. Låt detta vara en varning: svagt ledarskap leder till nederlag, och nederlag leder till historiens sophög!"}, "date": "7 maj, 08:00", "url": "https://proletaren.se/artikel/if-metall-verkar-inte-forsta-vad-konflikten-med-tesla-handlar-om/"}, {"type": "image-right", "heading": "Sjuka och skadade straffas i ”red dig själv”-samhället", "summaries": {"normal": "Artikeln kritiserar Sveriges minskade utbetalningar av livränta, som sjunkit med 86% på 26 år. Trots färre utbetalningar har inte arbetsskador minskat. Förslitningsskador, psykiska besvär och krångliga bevisprocesser gör det svårt att få ersättning. Försäkringskassans strikta bedömningar och krav på alternativa arbeten urholkar skyddet för skadade. Samhällets 'red dig själv'-mentalitet straffar de mest utsatta.", "trump": "Sverige, fantastiskt land, men här har de ett STORT problem! Livränta? Nästan borta! 86% mindre på 26 år – kan ni tro det? Folk blir sjuka, skadade, men nej, ni får ingenting! Försäkringskassan? Total katastrof. De frågar om du tränat, sovit, stickat armband – vad har det med saken att göra? Jag skulle fixa det på en dag. Men Sverige? De låter sina arbetare lida. SAD!", "stalin": "Kamrater! I det förrädiska kapitalistiska Sverige sviker man arbetarklassen på det mest skamlösa vis. Livräntan, en gång en rättvis kompensation, har nästan utplånats – 86% minskning! De bourgeoisie-lakejerna i Försäkringskassan torterar de skadade med byråkratisk sadism. 'Kan du sticka armband? Då kan du jobba!' – så resonerar fiendens hantlangare. Vi skulle aldrig tolerera sådan förräderi. Arbetarna förtjänar skydd, inte förtryck!"}, "date": "12 maj, 07:03", "url": "https://arbetet.se/2026/05/12/sjuka-och-skadade-straffas-nar-red-dig-sjalv-samhallet-gatt-for-langt/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/12065921/fk-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Kraftigt lyft för Wesports omsättning – vinsten lyfter", "summaries": {"normal": "Sportutrustningsbolaget Wesports rapporterar en omsättning på 961 miljoner kronor i första kvartalet 2026, upp från 633 miljoner. Organisk valutajusterad tillväxt var 14,7 procent. Juster
