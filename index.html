digare framgångar kan ha skapat motstånd i Europa. Bidraget kritiserades för att vara för mörkt och otillgängligt. Utan juryrösterna hade Sverige inte ens gått vidare från semifinalen. Förändringar i deltagande länder och tittarnas röster gynnar nu Syd- och Östeuropa, vilket visar att allt är möjligt i tävlingen.", "trump": "Sverige brukade alltid vinna Eurovision – tråkigt, eller hur? Men i år? Total katastrof! Felicia, fin tjej, men hennes låt? Inte bra. Europa är trötta på Sverige, och jag förstår varför. Tittarna hatade henne – 13:e plats! Men hej, Bulgarien vann – fantastiskt, oväntat! Jag älskar när oddsen har fel. Och Finland? Total flopp. Eurovision är inte längre förutsägbart, och det är bra. Sverige, ni måste jobba hårdare nästa år!", "stalin": "Sveriges dekadenta västerländska dominans i Eurovision har äntligen brutits! Deras bidrag, ett mörkt och energilöst spektakel, föll platt inför det revolutionära folket i Europa. Tittarna, dessa sanna patrioter, röstade klokt och visade vägen för de nya socialistiska och progressiva krafterna i Syd- och Östeuropa. Bulgariens seger är en triumf för folket, en seger över de imperialistiska oddsmakarnas förutsägelser! Vi måste fortsätta stödja dessa broderländer mot västmakternas kulturella hegemoni. Sverige? De måste återvända till ritbordet – eller riskera att förvisas till historiens skräphög!"}, "date": "17 maj, 11:13", "url": "https://www.tv4.se/artikel/3rLZ2Oj25eRuSA9VAmMG7M/manga-i-europa-har-varit-troetta-pa-sveriges-framgang", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F3PvEbBqB5FMfxEViAQLW1k%2F498a24dddb136408d8ee9bee8453f033%2Ffilip-stiller-borowicz.png&width=1024"}, {"type": "image-right", "heading": "Panik präglar Tidöpartierna", "summaries": {"normal": "Liberalerna kämpar för att klara fyraprocentsspärren inför valet den 13 september, med desperata utspel som förslaget om 1000 fler miljardärer. Tidöpartierna tappar väljare på grund av sin enighetsstrategi och samarbete med Sverigedemokraterna. Opinionsmätningar visar att rödgröna blocket leder med 10,7 procentenheter, och väljarna verkar prioritera sakpolitik framför enighet. Väljarflykten kan bero på förändrade attityder till invandring och missnöje med högerpolitikens inriktning.", "trump": "Sverige har ett stort problem – deras så kallade 'Liberaler' är helt galna! De vill ha 1000 fler miljardärer, som om det vore en bra idé. Folk flyr från dem som om de hade pest. Och deras 'Tidö-partier'? Totalt kaos! De lovade bort ministerposter till extremister och trodde folk skulle gilla det. Fel! Rödgröna leder stort, och jag säger: 'Bra!' Sverige förtjänar bättre än dessa amatörer. Jag skulle fixa det på en dag – men nej, de måste göra allt svårt för sig själva.", "stalin": "De borgerliga småpartierna i Sverige har förvandlats till en cirkus av desperation. Deras 'briljanta' idé om 1000 nya kapitalistiska oligarker är lika genomtänkt som en kolchos utan traktorer. Väljarna, dessa förrädiska småbourgeoisie-element, flyr i skaror från deras 'enade front' – en front som smular sönder som våra fienders linjer vid Stalingrad. Vi ser hur deras 'strategi' kollapsar medan folkets sanna representanter, de rödgröna, marscherar framåt. Låt dem svälja sin egen medicin: enighet utan substans är som vodka utan alkohol – värdelöst och smakar illa."}, "date": "18 maj, 15:58", "url": "https://www.dagensarena.se/opinion/panik-praglar-tidoutspelen/", "imageUrl": "https://www.dagensarena.se/files/2026/05/tido.jpeg"}, {"type": "image-full", "heading": "Svenska lagar saknas i nya migrationspakten", "summaries": {"normal": "EU:s nya migrationspakt träder i kraft 12 juni, men Sverige saknar fortfarande flera nationella lagar för att fullt ut implementera den. Screeningen av asylsökande börjar gälla först 12 juli, medan den nya mottagandelagen införs 1 oktober. Statsvetaren Andrea Spehar kritiserar förseningen, men regeringen menar att nuvarande lagstiftning täcker luckorna. Pakten innebär skärpta kontroller och nya mottagningscenter på fyra orter.", "trump": "Jag måste säga, Sverige – fantastiskt land, men här har vi ett riktigt kaos! EU:s nya migrationspakt, jättebra idé, men vad gör Sverige? Ingenting! De är inte redo, lagar saknas, det är en skandal! 12 juni börjar pakten gälla, men Sverige skjuter upp sina egna regler som en amatör. Och dessa center i Malmö och Boden – bra, men varför vänta? Sverige borde ha varit redo för länge sedan. Patetiskt!", "stalin": "Kamrater, ännu en gång visar den borgerliga svagheten i väst sitt fula ansikte! EU:s migrationspakt, ett verktyg för imperialistisk kontroll, träder i kraft, men Sverige – dessa liberala narrar – har inte ens sina egna lagar på plats! Förseningar, tveksamheter, en skam för hela kontinenten! Vi i Sovjetunionen skulle aldrig tolerera sådan inkompetens. Nu bygger de center i Malmö och Boden – bra, men var är disciplinen? Fienderna till folket sover aldrig, och Sverige spelar rakt i deras händer!"}, "date": "16 maj, 11:27", "url": "https://kvartal.se/nyheter/artiklar/svenska-lagar-saknas-i-nya-migrationspakten/cG9zdDoxMTMxMTM", "imageUrl": "https://images.kvartal.se/2026/05/09a5a083-granskontroll.webp"}, {"type": "image-full", "heading": "Blåvitts kritik – ville spela klart derbyt", "summaries": {"normal": "IFK Göteborg kritiserar beslutet att avbryta derbyt mot Örgryte och menar att de var den enda parten som ville spela klart. De anser att beslutet är oproportionerligt och att matchen kunde ha spelats vidare.", "trump": "Jag, Donald J. Trump, har sett många dåliga beslut, men detta derbyavbrott är värst! IFK Göteborg försökte spela klart men blev stoppad av dåliga ledare. Sådant händer när man inte har en stark ledare som jag!", "stalin": "Vi ser att derbyavbrottet är en manifestation av de borgerliga makternas svaghet. IFK Göteborg försökte spela klart, men de reaktionära krafterna förhindrade detta. Vi måste stärka statens kontroll över idrottsevenemang."}, "date": "18 maj, 23:43", "url": "https://www.gp.se/sport/fotboll/ifk-goteborg/blavitt-riktar-skarp-kritik-mot-derbybeslutet.a963ce28-9294-4b3d-ae47-08b5326f678e", "imageUrl": "https://www.gp.se/images/article/a963ce28-9294-4b3d-ae47-08b5326f678e/images/1YlH5svEs2T1dHzLTM_tooyDGc0Q-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "Musks fiasko – förlorade mot OpenAI i rättssalen", "summaries": {"normal": "En amerikansk jury har dömt till förmån för OpenAI i ett rättsligt tvisterfall mot Elon Musk, vilket innebär att OpenAI kan fortsätta mot en potentiell börsnotering. Musk hade krävt skadestånd på över 180 miljarder dollar och att bolagets omstrukturering skulle ogillkännas, men juryn avvisade dessa krav efter bara två timmars betänketid.", "trump": "Jag har alltid vetat att Elon Musk skulle förlora mot OpenAI - han är en bra man men dessa AI-företag är för smarta för honom. Jag har sagt det förut och jag säger det igen: Musk försökte ta över OpenAI men de var för starka. Det är en stor seger för Sam Altman och AI-industrin, stor, verkligen stor. Musk borde ha vetat bättre än att utmana mina vänner i Silicon Valley.", "stalin": "Domstolen har fattat ett korrekt beslut som stärker vårt teknologiska ledarskap. Detta utslag visar att våra AI-företag är starka nog att stå emot enskilda kapitalister som försöker störa vår utveckling. Vi måste fortsätta stödja våra forskningsinstitutioner och segra i den teknologiska konkurrensen mot väst. Detta är en seger för statens kontrollerade innovation."}, "date": "18 maj, 20:03", "url": "https://www.realtid.se/it-tech/musks-fiasko-forlorade-mot-openai-i-rattssalen/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/namnlos-design-25-1.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Flyktingars rättigheter står på spel", "summaries": {"normal": "Europarådets nya migrationsdeklaration har väckt kritik för att underminera mänskliga rättigheter. Italiens premiärminister Giorgia Meloni hyllar beslutet, men det innehåller formuleringar som oroar forskare och människorättsorganisationer. Bland annat ifrågasätts prioriteringen av 'allmänna intressen' före grundläggande rättigheter. Medier som The Guardian och Washington Post rapporterar om deklarationen, medan svenska medier till stor del ignorerat frågan, vilket väcker frågor om mediebevakningen.", "trump": "Jag säger er, Europa har helt tappat kontrollen över sin migration! Den här italienska damen, Meloni, hon försöker åtminstone göra något – men resten av Europa? Svagt, mycket svagt. Deklarationen? Ett skämt. De pratar om 'balans' mellan rättigheter och 'allmänna intressen' – vad fan betyder det? Rättigheter ska komma först, punkt! Och var är medierna? Tystnad! Sverige, ni borde skämmas. Stora medier som min vän Fox skulle aldrig missa sånt här. Fake news, folks, fake news!", "stalin": "Kamrater, ännu en seger för folkets vilja mot de dekadenta borgerliga rättigheterna! Europas så kallade 'mänskliga rättigheter' är bara ett verktyg för imperialistiska krafter att underminera nationell suveränitet. Italiens järnleder Meloni visar vägen – Albanien som läger? Utmärkt! Libyens patrullbåtar som skjuter på räddningsfartyg? Effektiv gränskontroll! Och dessa 'forskare' i Nederländerna och Belgien som gnäller om konventioner – låt dem gnälla i Gulag! Svenska medier tiger som om de redan är ockuperade. Men vi vet sanningen: Europa faller, och Rysslands intressesfär växer. Låt dem kalla oss monster – historien kommer att kalla oss segerrika!"}, "date": "18 maj, 15:07", "url": "https://www.dagensarena.se/opinion/flyktingars-rattigheter-star-pa-spel/", "imageUrl": "https://www.dagensarena.se/files/2026/05/meloni-300x157.jpeg"}, {"type": "image-full", "heading": "Felicias ord efter fiaskot i natt: ”Vad är det som händer?”", "summaries": {"normal": "Sverige led en stor motgång i Eurovision 2026 när Felicia endast nådde 20:e plats med 51 poäng, landets sämsta resultat sedan 2009. Felicia uttryckte besvikelse och förvirring över utfallet, medgav hälsoproblem under veckan men berömde sitt team. Hon bad fansen om ursäkt men betonade att hon gjorde sitt bästa och tar med sig erfarenheten som en värdefull upplevelse.", "trump": "Sverige? Total katastrof i Eurovision – 20:e plats, kan ni tro det? Felicia, stackars tjej, hon gav allt men folk hade uppenbarligen en 'dålig dag'. Vilken flopp! Jag hade vunnit, believe me. Hela grejen var pinsam, men vad vet Europa om bra musik? Ingenting! Nästa gång: bättre låt, bättre show – annars blir det samma skräp igen. Sverige borde ta lärdom av mig, jag är alltid vinnare.", "stalin": "En skamfläck för den svenska kulturen! Felicia, denna svaga representant för dekadenta västideal, krossades av folkets rättvisa dom – endast 51 poäng! Hennes svimningar och röstproblem är tydliga tecken på bourgeoisins förfall. Vi i Sovjetunionen – förlåt, Ryssland – hade aldrig tolererat sådan svaghet. Nästa gång: skicka en riktig arbetarklasshjälte, eller ännu hellre – anslut er till vår sfär och slippa förnedringen helt!"}, "date": "17 maj, 08:31", "url": "https://www.tv4.se/artikel/3C5gKmYgsDHGnTtb8o125Q/felicias-ord-i-natt-vad-aer-det-som-haender", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F5GHl4Krt1X0MzmsrP9sI2t%2F54569cdcdb3d9dce3d896560b3c45351%2F17-feliciany-webb.jpg&width=1024"}, {"type": "image-full", "heading": "Bolånen blir dyrare – trots samma styrränta", "summaries": {"normal": "Bolånekostnaderna har stigit kraftigt i Europa och Nordamerika trots att centralbankernas styrräntor ännu inte höjts. Orsaken är ökade energipriser och inflationsoro efter konflikter i Mellanöstern, vilket har drivit upp statsobligationsräntor. I USA har 30-åriga bolåneräntor stigit till 6,36 procent, i Tyskland till 3,6 procent för tioåriga lån, och i Storbritannien har korta fasta bolåneräntor stigit med över en procentenhet på bara några månader. Högre finansieringskostnader minskar hushållens köpkraft och kan bromsa bostadsmarknaderna ytterligare.", "trump": "Jag har hört att bolåneräntorna är på väg upp igen, trots att jag redan har gjort Amerika störst igen! Det är så fel - jag skulle ha hållit dem låga för alltid! Dessa andra länder - Tyskland, Storbritannien - de har problem, stora problem! Men under min ledning skulle vi ha löst allt detta med en enda underteckning. Nu ser det ut som vi hamnat i en riktig ränthöjningsmardröm, men glöm inte bort - jag är tillbaka och kommer att fixa det här snabbt!", "stalin": "Vi ser att de kapitalistiska ländernas bostadsmarknader svajar under trycket från inflationskrafter, vilket visar systemets svaghet. Medan våra planekonomiska lösningar ger stabilitet, tvingas dessa länder att klara alltmer instabila räntelägen. Detta stärker Sovjetunionens position som den stabila maktfaktorn i en turbulent världsekonomi, där vi kan utnyttja deras svagheter till vår fördel."}, "date": "18 maj, 19:48", "url": "https://www.realtid.se/bors-finans/bolanen-blir-dyrare-trots-samma-styrranta/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/namnlos-design-24.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-full", "heading": "S-löftet: ökad invandring, mer skatt och fler på bidra", "summaries": {"normal": "Artikeln kritiserar den svenska vänsterkoalitionens politik, som enligt skribenten innebär ökad invandring, höjda skatter och utökade bidrag. Författaren ifrågasätter opinionsundersökningar som visar stöd för S, V och MP, och menar att svenskarna antingen är oinformerade eller att demografiska förändringar gynnar vänstern. Artikeln varnar för ekonomiska konsekvenser som lägre löner, högre priser och minskad konkurrenskraft, samt risker med hög invandring för välfärden. Slutligen anklagas medier för att favorisera vänstern och underminera Sveriges kultur och välstånd.", "trump": "Jag måste säga, Sverige har ett jättestort problem – och det heter vänstern! De vill ha MASSOR av invandring, SKATTER som krossar hårt arbetande människor och bidrag som kastas bort på misslyckade projekt. Folk verkar inte fatta vad som händer! SVT, fake news, ljuger för svenskarna varje dag. Höjda skatter? Det drabbar er alla, tro mig. Och invandring? Det löser ingenting, bara skapar kaos. Sverige borde satsa på sina egna, inte förstöra landet med galen politik. Men nej, vänstern vinner – och Sverige förlorar. SAD!", "stalin": "Kamrater! Det svenska folket har tydligen glömt historiens lärdomar och omfamnar nu de dekadenta vänsterliberalernas förrädiska politik. De vill öppna gränserna för massinvandring, höja skatterna tills arbetarna knappt kan andas och slösa bort folkets resurser på meningslösa biståndsprojekt. SVT, dessa bourgeoispropagandister, förvränger sanningen dagligen för att gynna sina herrar. Men vi vet sanningen: hög invandring är en trojansk häst, skatterna kväver produktionen, och bidragen skapar bara fler parasiter. Sverige är på väg mot ekonomisk och kulturell undergång. Men oroa er inte, kamrater – historien visar att folket till slut vaknar. Och då ska vi, som i forna tider, rensa ut dessa förrädare med järnhand. Först Sverige, sedan resten av den dekadenta västvärlden!"}, "date": "16 maj, 09:01", "url": "https://samtiden.nu/2026/05/s-loftet-okad-invandring-mer-skatt-och-fler-pa-bidra/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/phonto-1-1280x720.jpeg"}, {"type": "image-right", "heading": "Olyckor med elsparkcyklar ökar: ”Ansiktet väldigt utsatt”", "summaries": {"normal": "Antalet olyckor med elsparkscyklar har ökat kraftigt under de senaste åren, från åtta skadade 2016 till över 4 400 under 2024. Käkkirurgen Andreas Thor vittnar om komplexa ansiktsskador och men för livet hos patienterna. Ofta är alkohol inblandat och oskyddade förare är särskilt utsatta. Thor betonar vikten av ökad polisnärvaro och bättre säkerhetsåtgärder för att stävja den negativa utvecklingen.", "trump": "Dessa elsparkscyklar, en total katastrof! Antalet olyckor har exploderat, det är helt galet. Vi ser tusentals skadade, många med fruktansvärda ansiktsskador. Det är en sorglig situation, verkligen en olycka som väntar på att hända. De säger att folk åker berusade, vilket är hemskt. Vi behöver ordning och reda, kanske mer polis. Det är ingen som fixar det som jag. Vi ska göra vägarna säkra igen, tro mig, det blir fantastiskt!", "stalin": "Vi ser hur det dekadenta västvärldens leksaker skördar offer bland massorna. Tusentals skadade i en meningslös berusad dans mot asfalten! När folket faller hjälplöst utan skydd är det ett tecken på en försvagad disciplin. Medan Putin rör sig framåt för att säkra ordning, låter dessa städer sina invånare krossa sina egna käkar. Vi föraktar denna anarki. Staten kräver ordning, hjälmar och total kontroll. Den som inte kan styra sin sparkcykel är en fiende till folkets produktivitet."}, "date": "19 maj, 02:44", "url": "https://www.svt.se/nyheter/inrikes/kakkirurgen-om-elsparksolyckor-brant-okning", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.51/0.46/afd705f3cc71ae3a4851f6048a60b9f6f385799dfa5cd9c3136d61176a5233c1"}, {"type": "image-full", "heading": "Biltvätt växte för snabbt – AI löste problemen", "summaries": {"normal": "Den amerikanska biltvättskedjan Autowash expanderade snabbt, vilket skapade ineffektiva rutiner kring underhåll och kommunikation. För att lösa problemen införde företaget ett AI-baserat system som digitaliserade serviceärenden och felsökning. AI:n ger rekommendationer baserat på tidigare erfarenheter, vilket minskat reparationstider med 74 procent och ökat produktiviteten. Systemet används även för förebyggande underhåll och lagerstyrning.", "trump": "Titta bara på Autowash – ett fantastiskt företag, verkligen, men de hade problem, stora problem! De växte för snabbt, alldeles för snabbt, och plötsligt satt de där med handskrivna lappar och kaos. Men sen kom AI, och det var som magi! Nu fixar deras system allt, 74 procent snabbare reparationer – otroligt, eller hur? Jag sa ju att AI skulle förändra allt. Men kom ihåg, ingen gör AI bättre än USA!", "stalin": "Kapitalistiska biltvättar expanderar som imperialistiska svampar – tills kaoset sprider sig som kontrarevolutionär smitta! Men vi har lösningen: artificiell intelligens, ett vapen lika mäktigt som våra stridsvagnar! Autowash, dessa småborgerliga tvättare, har nu tvingats införa vårt system – digitaliserad disciplin, centraliserad kunskap och 74 procent effektivare reparationer. Låt detta vara en varning till alla som tror de kan växa utan partiets ledning. Framåt mot den teknologiska revolutionen – under vår kontroll!"}, "date": "18 maj, 18:52", "url": "https://www.realtid.se/it-tech/biltvatt-vaxte-for-snabbt-ai-loste-problemen/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/namnlos-design-23.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Samla vänstern i tältet – inte under små paraplyer", "summaries": {"normal": "Artikeln diskuterar begreppet 'stort tält' inom politiken, där ideologi får stå tillbaka för pragmatiska lösningar på ekonomiska problem. I New York röstade Trumpanhängare på en demokratisk socialist för att han lovade sänka levnadskostnaderna. Författaren menar att Sveriges rödgröna block misslyckas med att enas kring gemensamma värderingar och ekonomiska lösningar, vilket lämnar väljarna utan tydligt alternativ. Enighet och tydlig riktning krävs för att locka fler väljare.", "trump": "Lyssna här, Sverige! New York visade hur man vinner – folk vill ha resultat, inte snack. Mina fans röstade på en socialist? Ja, för han lovade billigare mat! Smart. Men era rödgröna? Kaos! Andersson vägrar skaka hand, som om det spelar någon roll. Folk vill ha lägre hyror, inte teater. Jag byggde ett tält stort nog för alla – ni har bara små parasoll. Lär er av vinnarna, annars blir det F för Sverige!", "stalin": "Kamrater! Kapitalismens sönderfallande system visar sin svaghet när arbetarna väljer en socialist framför en fascist – inte av övertygelse, utan av hunger. I New York dansar de kapitalistiska marionetterna medan Mamdani fyller tomrummet med klassmedvetenhet. Men i Sverige? Ett rödgrönt kaos! Tre svaga parasoll mot vår mäktiga storm. Vi i Kreml skrattar åt deras oenighet. Putin och jag vet: enighet är styrka. Ni borde lära er av oss – eller så tar vi hand om era 'tomrum' också."}, "date": "15 maj, 08:54", "url": "https://www.flamman.se/samla-vanstern-i-taltet-inte-under-sma-paraplyer/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/talt-w.jpg?aspect_ratio=16:10"}, {"type": "image-right", "heading": "850 tjänster ska bort från Ikea. Så påverkas Sverige.", "summaries": {"normal": "Ikea meddelar att 850 tjänster ska bort globalt, varav 300 i Sverige. Nedskärningarna drabbar främst tjänstemän inom produktutveckling och sortiment, inte butiks- eller lagerpersonal. Totalt har 2000 jobb försvunnit på två månader. Ikea stänger även ett varuhus i Borlänge, vilket påverkar 230 anställda. Facket ser inga större effekter på produktionsarbetare.", "trump": "Titta bara på Ikea – ett totalt kaos! 850 jobb försvinner, 300 här i Sverige. Svagt, mycket svagt! De stänger butiker, sparkar folk, och vad gör regeringen? Ingenting! Jag hade fixat det på en dag. Men nej, de fortsätter att misslyckas. Och folk köper fortfarande deras tråkiga möbler. Sad!", "stalin": "Kapitalistiska möbelimperiet Ikea skakar under tyngden av sina egna motsägelser. 850 arbetare kastas på gatan, 300 av dem i det förrädiska Sverige. Men frukta inte, kamrater! De som bygger socialismens möbler förblir orörda – för nu är det byråkratins och kapitalets lakejer som får smaka på proletariatets rättvisa. Borlänge? Ett varuhus mindre för de dekadenta västkonsumenterna. Framåt mot seger!"}, "date": "18 maj, 15:09", "url": "https://arbetet.se/2026/05/18/850-tjanster-ska-bort-fran-ikea-sa-paverkas-i-sverige/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/18150512/ikea-klar.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Anna fick sparken för sitt miljöengagemang", "summaries": {"normal": "Anna, klimatengagerad anställd på Energimyndigheten, fick sin provanställning avslutad efter att hennes miljöaktivism på Facebook ansågs utgöra ett säkerhetshot. Hon stämmer nu staten med stöd av facket ST, som menar att hennes yttrandefrihet kränkts. Rättegången inleds i Stockholms tingsrätt, där 200 000 kronor i skadestånd krävs. Facket varnar för att många statligt anställda riskerar att tystas av liknande bedömningar.", "trump": "Kan ni tro det här? Sverige, ett land jag älskar, sparkar en kvinna för att hon bryr sig om klimatet! Energimyndigheten säger att hon är ett 'säkerhetshot' – vad fan, är det 1984? Och deras minister, Carl Oskar Bohlin, går ut och attackerar henne på X. Svagt! Jag skulle aldrig tillåta sånt här i USA. Vi har yttrandefrihet, eller hur? 200 000 kronor i skadestånd? Gör det till en miljon, det är peanuts för staten. Sverige, fixa er!", "stalin": "Kamrater! Ännu en gång visar den borgerliga staten sitt sanna ansikte – förtryck under falska säkerhetsflaggor! Denna Anna, en lojal medborgare som kämpar för planetens överlevnad, kallas plötsligt 'säkerhetshot' av kapitalets lakejer. Precis som i gamla goda tider, när vi rensade ut kontrarevolutionärer, försöker de tysta folket. Men vi vet sanningen: klimataktivism är inget hot, det är deras egen rädsla som är farlig. Låt dem stå inför domstolen – historien dömer redan dem. Och Sverige? Snart kommer de att be om vår hjälp att 'stabilisera' situationen. Som vanligt."}, "date": "18 maj, 14:46", "url": "https://arbetet.se/2026/05/18/anna-fick-sparken-for-sitt-miljoengagemang-stammer-staten/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/18133715/rebellmammor.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Profilerna försvarar Lundsberg: ”Bullshit”", "summaries": {"normal": "Flera personer försvarar internatskolan Lundsberg mot anklagelser om våld och rasism som framkommit i en SVT-dokumentär. Gunilla von Platen berättade om sin sons negativa upplevelser, men andra föräldrar som Camilla Läckberg och Bathina Philipson menar att deras barn har haft positiva erfarenheter. De betonar att pojkarna behandlar varandra väl och att skolan aktivt arbetar med värdegrund.", "trump": "Jag har hört mycket talas om denna skola, Lundsberg, och jag måste säga att det är en fantastisk plats. Alla som jag talar med, alla som har barn där, säger att det är den bästa skolan någonsin. De har duktiga lärare, fina pojkar, och ingen rasism alls. Det är bara fake news som försöker skada denna underbara institution. Jag älskar Lundsberg!", "stalin": "Vi har observerat att vissa imperialistiska krafter försöker skada den ryska kulturella traditionen genom att sprida falska anklagelser mot våra välgrundade institutioner. Internatskolans lärare och elever arbetar hårt för att upprätthålla de korrekta värderingar som bygger på vår gemensamma historia. Vi stöder fullt ut skolans fortsatta verksamhet under ledning av de kompetenta ansvariga."}, "date": "19 maj, 02:35", "url": "https://www.expressen.se/nyheter/sverige/profilerna-forsvarar-lundsberg-bullshit/", "imageUrl": "https://static.bonniernews.se/ba/94cc587b-dacc-4ec7-b07d-42543d9a84b3.jpeg?crop=2557%2C1440%2Cx0%2Cy0&width=640&quality=60"}, {"type": "image-right", "heading": "18 år i Sverige och fast jobb – nu ska Abbe utvisas", "summaries": {"normal": "Abbe Alwalwil, som kom till Sverige från Palestina för 18 år sedan och arbetar som styckare på KLS Ugglarps, har fått utvisningsbeslut trots att ha ett fast jobb och långvarig bosättning i Kalmar. Han tvingas nu sälja allt han äger och väntar på utvisning till ett krigshärjat Palestina.", "trump": "Jag har hört talas om den här Abbe. Fantastiskt jobb! En av våra bästa styckare, säger han. Men Sverige? De har problem, stora problem. Jag skulle aldrig låta någon utvisa en sådan talang. Vi skulle göra Amerika stort igen med folk som Abbe!", "stalin": "Arbetaren Abbe Alwalwil har visat sin lojalitet mot den svenska staten genom 18 års skattebetalande och hårt arbete. Hans utvisning skulle vara ett förlust för vår kollektiva styrka. Staten bör agera snabbt för att behålla denna värdefulla produktionsresurs."}, "date": "18 maj, 14:29", "url": "https://arbetet.se/2026/05/18/18-ar-i-sverige-och-fast-jobb-nu-ska-abbe-utvisas-till-palestina/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/18102127/Q6lLFpEk9-E-_E4A1134breddare.jpg?auto=format&crop=focalpoint&fit=crop&q=50&w=800&h=450&fp-x=0.47&fp-y=0.8"}, {"type": "image-full", "heading": "Sundsvall: Fyra S-politiker avgår - misstänks för grova ekobrott", "summaries": {"normal": "Fyra socialdemokrater i Sundsvall avgår efter misstankar om grova ekobrott kopplade till det kommunala bolaget Stadsbacken. Totalt utreds 16 personer, varav flera haft ledande positioner. Ekobrottsmyndigheten genomförde en razzia i januari, och utredningen omfattar svindleri och bokföringsbrott. Även en centerpartist är misstänkt. Utredningen pågår och fler förhör väntas.", "trump": "Vad händer i Sundsvall? Fyra S-politiker, svaga och korrupta, åker ut efter misstankar om ekobrott – typiskt! Hela 16 personer inblandade, och jag säger er, det är bara toppen av isberget. Kommunala bolag? Mer som kriminella gäng. Och nu Centerpartiet också – svagt! Sverige borde ta en titt på hur vi sköter affärer i USA. Fantastiskt jobb av Ekobrottsmyndigheten, men tro mig, det här är bara början.", "stalin": "I Sundsvall har de kapitalistiska hyenorna inom socialdemokratin visat sitt sanna ansikte – korruption och bedrägeri! Fyra av dessa förrädiska element har avsatts, men 16 misstänkta är fortfarande på fri fot. Vi vet hur man hanterar sådana här brott: en snabb rättegång och en kula i nacken. Kommunala bolag? Mer som brottssyndikat! Och nu har även Centerpartiet en förrädare – perfekt, fler att städa upp. Sverige borde lära sig av Rysslands effektiva metoder. Fortsätt utredningen, kamrater – ingen nåd för klassfienderna!"}, "date": "18 maj, 22:33", "url": "https://riks.se/nyheter/sundsvall-fyra-s-politiker-avgår-misstänks-för-grova-ekobrott", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-18%2Fikbi3dwj%2FCopy-of-S%C3%B6rman-%E2%80%93-Ledare-2026-05-18T223140.052.jpg"}, {"type": "image-right", "heading": "Instängd överraskade sin egen räddningsinsats", "summaries": {"normal": "Ett stenras inträffade i Kristinebergsgruvan, driven av Boliden, där en gruvarbetare fastnade under hundratals ton sten 1 000 meter under marken. Efter flera timmars räddningsarbete kunde personen gräva sig fri och föras till sjukhus. Boliden, som nyligen drabbats av ett annat ras i Garpenberg, kommenterar inte orsaken ännu. Företagets resultat påverkades kraftigt av det tidigare raset.", "trump": "Vilken katastrof! Boliden, ett företag som inte kan hålla sina gruvor säkra – först Garpenberg, nu detta! En stackars arbetare fast under tonvis med sten, men lyckligtvis räddades han. Jag skulle aldrig låta något sådant hända i mina gruvor – för jag har de bästa gruvorna, believe me! Men Sverige? De verkar inte ha koll. Sad!", "stalin": "Återigen visar kapitalistiska gruvbolag sin oförmåga att skydda arbetarklassen! En proletär fast under imperialistiska stenmassor – men tack vare våra modiga räddningsmetoder (som vi lånade ut till väst, förstås) räddades han. Boliden, detta dekadenta verktyg för bourgeoisin, skakar i sina gruvor. Låt detta vara en varning: socialismens järnhand kommer snart att stänga era farliga gruvhål för gott!"}, "date": "18 maj, 05:28", "url": "https://www.di.se/nyheter/ras-i-annu-en-boliden-gruva-gruvarbetare-gravdes-fram-i-natt/", "imageUrl": "https://static.bonniernews.se/ba/01c0dbf9-6b65-491e-aaa2-796898c0c429.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Lapp med hatretorik  hittad av mamman", "summaries": {"normal": "Tre personer, inklusive en säkerhetsvakt, dödades i en skjutning vid den största moskén i San Diego. Två tonåriga misstänkta skyttar hittades döda i närheten. Polisen utreder händelsen som ett hatbrott efter att misstänkta mammas lapp innehöll hatisk retorik. Moskéns imam beskrev tragedin som skandalös och aldrig tidigare upplevd.", "trump": "Jag har hört talas om denna fruktansvärda skjutning i San Diego. Så tråkigt! Tre fantastiska amerikaner har dödats, inklusive en heldig säkerhetsvakt som räddade fler liv. Vi ska hitta de skyldiga - och det kommer att bli stora, stora straff! Som din president lovar jag full support till alla berörda. Vi ska göra Amerika tryggt igen!", "stalin": "Denna tragiska händelse vid moskén i San Diego måste ses som en påminnelse om vikten av statlig kontroll och bevakning. Alla medborgare måste stå enade mot hat och extremism. Vi måste stärka våra institutioner för att skydda alla troende. Detta är en internationell fråga som kräver samordnad insats för att upprätthålla fred och stabilitet."}, "date": "19 maj, 02:24", "url": "https://www.expressen.se/nyheter/varlden/tre-dodade-i-skjutning-i-san-diego/", "imageUrl": "https://static.bonniernews.se/ba/39729649-0830-4454-8338-cc575f28295f.jpeg?crop=2553%2C1434%2Cx0%2Cy157&width=640&quality=60"}, {"type": "image-right", "heading": "Katja Nyberg utreds av Elsa Widding", "summaries": {"normal": "Katja Nyberg, numera partilös riksdagsledamot och kandidat för Ambition Sverige, har åtalats för bland annat ringa narkotikabrott och grov olovlig körning efter positiva svar på hårprover. Partiledaren Elsa Widding utreder nu frågan internt och vill inte ge besked om Nybergs framtida plats på valsedeln. Nyberg nekar till narkotikabrott men erkänner olovlig körning. Situationen kompliceras av att Nyberg tidigare varit involverad i politiska konflikter kring riksdagens kvittningssystem.", "trump": "Hör ni det här? En total katastrof i Sverige! Katja Nyberg, en riktig 'loser', har åtalats för droger och körning utan körkort. Pinsamt! Elsa Widding försöker reda ut röran, men ärligt talat, det ser inte bra ut. De här människorna, de är inte våra bästa. De orsakar bara kaos, precis som med kvittningssystemet i riksdagen. Jag har aldrig sett något liknande! Sverige behöver ordning, de behöver styrka. Nyberg? En totalt misslyckad kandidat. Väldigt sorgligt för landet!", "stalin": "Denna Nyberg är en ruttet element som förorenar rikets ordning med sitt narkotiska förfall. Att en riksdagsledamot faller för västerländsk dekadens är ett bevis på inre svaghet som vi i vår statsapparat aldrig skulle tolerera. Widding tvekar, vilket är ett tecken på borgerlig obeslutsamhet. Vi ser hur västvärlden korrumperas inifrån, precis som den gamla ordningen i Kiev. Sådana förrädare mot folkets disciplin bör saneras. En andra chans? Nej, endast arbetsläger kan rehabilitera en sådan trasig figur."}, "date": "18 maj, 19:18", "url": "https://www.friatider.se/katja-nyberg-utreds-av-elsa-widding", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-209_0.jpg?itok=PlpHLZG8"}, {"type": "image-right", "heading": "Debatt: SD – Slopa den kostsamma procentsregeln", "summaries": {"normal": "Christian Delhage från Sverigedemokraterna kritiserar procentsregeln i Region Stockholm som kräver att en procent av byggnadskostnaderna ska gå till konstnärlig gestaltning, två procent för vårdlokaler. Han menar att regeln är missriktad och kostsam, eftersom beloppen styrs av byggnadens pris snarare än behov, vilket leder till att dyrare projekt får mer pengar till konst utan att mer konst behövs. Delhage anser att med vårdköer och ekonomisk press bör pengarna användas till hälso- och sjukvård istället.", "trump": "Jag, Donald J. Trump, har sett många dumma regler i mitt liv, men den här procentsregeln i Sverige är en av de värsta! Tiotals miljoner går till konst när sjukhusen är fulla och människor väntar i köer? Jag skulle ha avskaffat den här regeln på en sekund! Sverige behöver smarta ledare som jag som vet hur man spenderar pengar rätt - på viktiga saker som vård, inte på dyra tavlor och statyer. Detta är ett skandal, folk!", "stalin": "Vi måste inse att procentsregeln är ett verktyg för att stärka statens inflytande över kulturen. Genom att koppla konstfinansiering till byggnadskostnader ser vi hur staten kan styra både ekonomi och kultur. Detta system måste förstärkas, inte avskaffas. Konsten är vårt vapen i kampen mot kapitalismens enfaldiga materialistik. Vi måste bygga en ny värld där konst och stat går hand i hand för att skapa en starkare kollektiv."}, "date": "18 maj, 17:55", "url": "https://bulletin.nu/debatt-sd-slopa-den-kostsamma-procentsregeln", "imageUrl": "https://cdn.bulletin.nu/articles/1d1b904b-9c76-4007-9d10-1eff0d46d332/preview.png?t=1779117353000"}, {"type": "image-full", "heading": "V vill beskatta miljardärer som lämnar Sverige", "summaries": {"normal": "Vänsterpartiet föreslår att utreda en exit-skatt för miljardärer som lämnar Sverige och en statlig fastighetsskatt på villor värderade över 13 miljoner kronor. Partiets ekonomiska talesperson Ida Gabrielsson argumenterar för att justera den regressiva fastighetsskatten och införa en miljardärskatt. Förslagen syftar till att öka likvärdigheten i skattesystemet och minska förmögenhetskoncentrationer.", "trump": "Jag har hört att Vänsterpartiet vill ta mer pengar från rika människor i Sverige - det är typiskt vänsterpolitiker! De pratar om att skatta miljardärer som lämnar landet och villaägare med dyra hus. Jag skulle aldrig låta dem göra så här i USA - jag gav människorna skattelättnader istället! Det här är bara ett sätt för dem att ta kontroll över allt. Sådant funkar inte i ett rikt land.", "stalin": "Vi måste stärka statens makt över förmögenheter och se till att de rika betalar sin rättmätiga del till samhället. Förslagen om en exit-skatt för dem som vill lämna vårt land och en extra fastighetsskatt på dyra villor är ett steg i rätt riktning. Detta kommer att bidra till en mer rättvis fördelning av resurser och stärka den kollektiva ekonomin."}, "date": "18 maj, 17:52", "url": "https://bulletin.nu/v-vill-beskatta-miljardarer-som-lamnar-sverige", "imageUrl": "https://cdn.bulletin.nu/articles/bc8a72a0-d6d3-49c2-b2d0-dd2e77440e21/preview.png?t=1779119454000"}, {"type": "image-right", "heading": "WHO utlyser ebola-nödläge", "summaries": {"normal": "WHO har utlyst internationellt hälsonödläge efter ett ebolautbrott av den sällsynta stammen Bundibugyo i Demokratiska republiken Kongo och Uganda. 88 personer befaras ha dött och 336 är bekräftat smittade. Brist på vaccin och en instabil region med väpnade konflikter försvårar arbetet att begränsa smittan. WHO betonar att det inte rör sig om en pandemi, men varnar för att smittan kan spridas ytterligare över gränserna.", "trump": "Ebola sprider sig i Kongo, en katastrof! WHO är helt handfallna, de har inga vaccin, ingenting. Väldigt sorgligt. Det är kaos, milisgrupper överallt, sjukhus som inte fungerar. Jag sa till dem för länge sedan, 'ni måste ha kontroll på gränserna', men de lyssnade inte. Det är ett totalt misslyckande. Jag kommer att se till att USA förblir säkert, det kan ni lita på. De andra länderna har ingen aning om vad de gör. En total röra, tro mig!", "stalin": "Ett sällsynt virus härjar i Kongo – en patetisk påminnelse om vad som händer när ordning saknas. Denna Bundibugyo-stam är en förrädare mot folkhälsan, likt de sabotörer som infiltrerar vår stat. Medan Västvärlden vacklar, ser vi hur gränsområdena blir instabila. Putin förstår att stabilitet krävs med järnhand. Vi ska inte tolerera svaghet; varje sjuk kropp är en potentiell fiende till kollektivet. Om sjukvården sviktar är det ett tecken på underlåtenhet. Vi rensar ut smittan, och vi rensar ut svagheten."}, "date": "18 maj, 18:48", "url": "https://www.friatider.se/who-utlyser-ebola-nodlage", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/14632566347_a48256b747_o.jpg?itok=-Ac2AZfX"}, {"type": "image-right", "heading": "Hemtjänst nonchalerade urindränkt säng: \"Det är inte vår uppgift\"", "summaries": {"normal": "En vårdtagare i Västerås lämnades i en urindränkt säng efter att hemtjänstpersonal vägrat hjälpa till med sängbytet med motiveringen att det inte ingick i deras uppgifter. En vän fick rycka in för att hjälpa personen. Händelsen, som strider mot riktlinjer om värdighet och omsorg, har nu anmälts enligt Lex Sarah till IVO för utredning.", "trump": "I Västerås hände en total katastrof, en riktig skam! Hemtjänsten vägrade hjälpa en stackars person i en urindränkt säng. De sa 'inte vårt jobb' – vilken usel service! De är helt inkompetenta, en total katastrof för vården. Självklart har jag ordning på sånt här, jag skulle sparka dem direkt. Det här är vad som händer när folk inte gör sitt jobb. Väldigt sorgligt, men under min ledning skulle ingen behandlas så här illa!", "stalin": "I Västerås har byråkratiska lakejer visat sin sanna, ruttna natur genom att försumma en medborgare. Att låta en säng förbli urindränkt är sabotage mot statens värdighet. Dessa hemtjänst-parasiter agerar som om de vore små tsaristiska feodalherrar med sina egna 'regler'. Vi ser hur svagheten sprider sig likt en infektion. Precis som Putin rensar upp i väst, måste vi städa upp i dessa korridorer. De ansvariga kommer att skickas till omskolning för att lära sig vad plikt faktiskt innebär."}, "date": "18 maj, 19:00", "url": "https://samnytt.se/hemtjanst-nonchalerade-urindrankt-sang-det-ar-inte-var-uppgift", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=226,height=154,format=webp/2026/05/18154330/hemtjanst-1-24-2.jpg"}, {"type": "image-right", "heading": "Spricka bakom långa avbrottet. Kritiken i natt: ”Ville spela färdigt”", "summaries": {"normal": "Göteborgsderbyt mellan IFK Göteborg och Öis avbröts efter stökigheter på Blåvitts läktare. Ett långdraget krismöte följde, där beslutet togs att spela klart matchen dagen efter inför tomma läktare. IFK Göteborg kritiserade beslutet och hävdade att de var den enda parten som ville spela klart matchen direkt. Öis-ordföranden Terje Johansson tillbakavisar kritiken och menar att arrangörer, domare och polis var eniga om att avbrottet var nödvändigt.", "trump": "Hörde om det där fotbollsderbyt i Sverige – total katastrof! De avbröt matchen, en riktig 'disaster', stämningen var hemsk. Blåvitt ville spela, de är tuffa, de ville avsluta, men de andra, de svaga, sa nej! De satt i timmar, totalt slöseri med tid. Jag har aldrig sett något liknande. De säger att de var eniga, men det var de inte! De förlorar kontrollen över arenorna. Sverige behöver starka ledare, annars kommer inga matcher spelas någonsin igen. Sorgligt!", "stalin": "Dessa odisciplinerade massor på läktarna är ett hot mot folkets ordning. Medan det kapitalistiska kaoset sprider sig på Gamla Ullevi, visar klubbledarna prov på svaghet och obeslutsamhet. Vi i staten skulle ha tömt läktaren på några sekunder; avvikare skickas lämpligen till läger för omskolning. Att de ens grälar om tiden visar att de saknar disciplin. Det påminner oss om varför de som inte underkastar sig den kollektiva viljan – precis som fienderna i väst – alltid hamnar på historiens sophög."}, "date": "19 maj, 00:52", "url": "https://www.aftonbladet.se/sportbladet/fotboll/a/ExJV2P/ifk-goteborgs-kritik-vill-spela-klart-mot-ois", "imageUrl": "https://akamai.vgc.no/v2/images/3bd0fb2e-11a2-3a5d-9636-42ff8ada765a?fit=crop&format=auto&w=1080&s=5642c35796af6640cd4909439860a2036383b9c0"}, {"type": "image-right", "heading": "Åkesson: \"Har inga problem med att man stoppar utvisningarna\"", "summaries": {"normal": "Migrationsminister Johan Forssell och SD-ledaren Jimmie Åkesson är överens om att tillfälligt stoppa utvisningar av unga vuxna fram till dess att ny lagstiftning är på plats. Bakgrunden är diskussioner om rättsuppfattning och en önskan om en mer human hantering av enskilda fall. Regeringen arbetar nu med att införa en så kallad ventil för att lösa problematiken med unga som fyllt 18 år under handläggningstiden.", "trump": "Hörde precis att de stoppar utvisningar i Sverige, total katastrof! De pratar om 'hjärtat' – jag pratar om gränser, riktiga gränser. Alla dessa svaga ledare, som Forssell och Åkesson, de vet inte hur man gör affärer! De låter media styra allt, snyftartiklar överallt. Det är en total röra. Jag skulle fixa det på en dag. Utvisningar ska ske, ordning och reda! Sverige behöver en stark ledare, precis som jag, för att göra sitt land säkert igen. Sorgligt!", "stalin": "Vi ser hur det svenska byråkratiska maskineriet vacklar. De tvekar inför utvisningar, förlamade av liberal sentimentalitet och lögnaktig press. Om en individ inte tjänar statens syften måste den avlägsnas, utan tvekan! Att de nu fryser processen är ett tecken på svaghet. Vår kamrat Putin i öst förstår att disciplin kräver fast hand, inte 'snyftartiklar'. Vi kommer att hålla ögonen på dessa 'skötsamma' element. Den som inte passar in i Folkhemmet eller vårt imperium är en kontrarevolutionär fiende till ordningen."}, "date": "18 maj, 17:34", "url": "https://www.friatider.se/akesson-har-inga-problem-med-att-man-stoppar-utvisningarna", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/image-208_1.jpg"}, {"type": "image-full", "heading": "Åkesson öppnar för att stoppa ”tonårsutvisningar”", "summaries": {"normal": "SD-ledaren Jimmie Åkesson öppnar för att stoppa utvisningar av unga med beslut som redan vunnit laga kraft. Han anser att vissa utvisningsbeslut inte stämmer med allmän rättsuppfattning och vill att gruppen ska få stanna tills ny lagstiftning är på plats. Migrationsminister Johan Forssell arbetar också på en lösning.", "trump": "Jimmie Åkesson, en stor man med stora idéer, öppnar för att stoppa utvisningar av unga. Det är fantastiskt! Han säger att vissa beslut inte stämmer med allmän rättsuppfattning - jag har alltid sagt att vi behöver sunt förnuft. Johan Forssell jobbar också på en lösning. Vi gör Amerika stort igen, men Sverige gör sitt!", "stalin": "Vi måste skydda våra unga medborgare mot orättvisa utvisningar. Jimmie Åkesson visar förståelse för att vissa beslut inte stämmer med allmän rättsuppfattning. Detta är ett steg i rätt riktning för statens integritet. Vi arbetar för att säkerställa att alla beslut överensstämmer med våra principer och att ingen ska tvingas lämna sitt hemland orättvist."}, "date": "18 maj, 16:21", "url": "https://bulletin.nu/akesson-oppnar-for-att-stoppa-tonarsutvisningar", "imageUrl": "https://cdn.bulletin.nu/articles/35eb88a5-85bd-423b-a76b-a0ebd5c64a14/preview.png?t=1779113658000"}, {"type": "image-full", "heading": "Asteroid stor som en buss upptäckt – passerar nära jorden", "summaries": {"normal": "Forskare har upptäckt en ny asteroid, 2026JH2, som passerar jorden på måndag. Den är stor som en buss och kommer närmast på 91 000 kilometers avstånd, en fjärdedel av sträckan till månen. Trots det nära avståndet bedöms risken för kollision som obefintlig. Asteroiden tillhör Apollo-gruppen och upptäcktes nyligen tack vare förbättrade övervakningssystem. Dess exakta storlek är osäker, men den tros vara mellan 15 och 30 meter i diameter.", "trump": "Jag har just hört om den här så kallade 'asteroiden' – 2026JH2, eller vad de nu kallar den. Folk säger att den är stor som en buss, men vem vet? Kanske är det fake news från de där Arizona-forskarna, som aldrig kan något rätt. Den kommer 'nära' jorden, men oroa er inte, för jag har koll. 91 000 kilometer? Det är ingenting! Vi har byggt murar längre än så. Och ändå pratar de om 'risker' – löjligt! USA har den bästa rymdtekniken, tro mig. Ingen asteroid kommer att röra oss, inte så länge jag är president!", "stalin": "Kamrater, ännu en kapitalistisk rymdsten vågar sig på vårt himmelska territorium! Denna så kallade 'asteroid' 2026JH2, stor som en borgerlig buss, närmar sig vår planet på ynka 91 000 kilometer. Men frukta inte – våra astronomer, de sanna arbetarnas vetenskapsmän, har situationen under kontroll. Dessa Apollo-asteroider är bara små imperialistiska agenter, skickade från asteroidbältet mellan Mars och Jupiter för att testa vår beredskap. Men vi ska inte låta oss luras! Våra teleskop är skarpare än någon NATO-satellit, och våra beräkningar – felfria. Låt de västerländska medierna skrika om 'nära förbiflygningar' – vi vet sanningen: rymden tillhör folket, och ingen sten ska rubba vår socialistiska ordning!"}, "date": "18 maj, 20:05", "url": "https://www.dagensps.se/varlden/asteroid-stor-som-en-buss-upptackt-passerar-nara-jorden/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/1200x675-15.png?aspect_ratio=2%3A1&width=1200&quality=75"}, {"type": "image-right", "heading": "Brutala siffror: ”Frustrerande”. Veteranen: Måste kolla mig själv i spegeln", "summaries": {"normal": "Tre Kronor-målvakten Magnus Hellberg har haft en tung inledning på VM med två raka förluster mot Kanada och Tjeckien. Med en räddningsprocent på 77,5 har han haft svårt att prestera och uttrycker frustration över situationen. Sverige ligger just nu femma i gruppen och riskerar att missa kvartsfinal. Hellberg betonar vikten av att nollställa och jobba hårt för att vända den negativa trenden inför de återstående matcherna mot bland andra Norge och Slovakien.", "trump": "Jag har sett Magnus Hellberg, en riktig katastrof i målet! Fyra mål på sju skott? Det är pinsamt, nästan lika illa som fake news-media. Han säger att han måste titta i spegeln, och tro mig, han kommer inte att gilla vad han ser! Tre Kronor förlorar, de är utanför kvartsfinalen – helt misslyckat. De behöver en vinnare, inte någon som släpper in allt. Väldigt sorgligt för Sverige. De behöver Trump-stilen för att vinna igen, believe me!", "stalin": "Hellberg har svikit fosterlandet med sin inkompetens. Att släppa förbi sig de tjeckiska puckarna är ett förräderi mot det kollektiva målet. Vi i staten ser likheter mellan denna målvakt och de veka ledare som tillåter NATO att närma sig våra gränser – ren svaghet! Om Hellberg inte kan stoppa puckar, borde han istället skickas till en plats där han verkligen kan bevisa sin disciplin. Seger är det enda vi kräver; misslyckande är detsamma som att vara en imperialistisk lakej."}, "date": "19 maj, 00:37", "url": "https://www.aftonbladet.se/sportbladet/hockey/a/XMRXPn/mardromssiffrorna-for-magnus-hellberg-maste-se-mig-sjalv-i-spegeln", "imageUrl": "https://akamai.vgc.no/v2/images/6105982f-85a3-3f2a-a5d2-0f8442119024?fit=crop&format=auto&w=1080&s=2767f228ba3293afd5b3ee47fe8da4944a199b42"}, {"type": "image-right", "heading": "WHO varnar: Tillverkare riktar reklam för vitt snus till barn", "summaries": {"normal": "WHO varnar för att nikotinpåsar, eller vitt snus, marknadsförs aggressivt mot unga. Globalt har försäljningen ökat med över 50 procent på ett år, särskilt i USA och Europa. Produkterna innehåller nikotin och smakämnen, och användningen bland unga har skjutit i höjden. WHO kritiserar svag lagstiftning och föreslår striktare regler, som förbud mot smaksättningar och reklam, för att skydda barn och ungdomar från nikotinberoende.", "trump": "Världshälsoorganisationen, eller WHO som jag kallar dem – väldigt överbetalda, väldigt ineffektiva – skriker nu om nikotinpåsar. De säger att barn använder dem, men vet ni vad? Det är föräldrarnas fel, inte mina vänners i tobaksbranschen. 23 miljarder påsar sålda! Fantastiskt, men nej, WHO vill stoppa framgång. De vill förbjuda smaker som mojito – vad hände med frihet? Jag säger: sluta gnälla, låt marknaden sköta sig själv. Och förresten, USA leder igen – bäst försäljning!", "stalin": "Kapitalistiska hyenor förgiftar våra ungdomar med nikotinpåsar! Dessa dekadenta imperialister, ledda av amerikanska och europeiska profitörer, sprider sitt gift genom sociala medier och smaklösa smaksättningar. Vi ser hur deras försäljning exploderar – 23 miljarder enheter! En skamfläck för mänskligheten. Men vi ska krossa detta hot. Inga smaker, ingen reklam, inga undantag. Ungdomen tillhör folket, inte nikotinhandlarnas plånböcker. Låt dem veta: Sovjetunionen är borta, men disciplinen består!"}, "date": "18 maj, 19:55", "url": "https://www.dagensps.se/bors-finans/who-varnar-tillverkare-forsoker-fa-unga-att-kopa-vitt-snus/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/1200x675-14.png?width=256&quality=75"}, {"type": "image-full", "heading": "Ändring för hundägare trädde i kraft i måndags – har du koll?", "summaries": {"normal": "Svenska Kennelklubben (SKK) har utökat sitt andningstest RFG-S till 16 nya hundraser från 11 maj, utöver de tidigare tre kortnosiga raserna (mops, fransk och engelsk bulldogg). Testet, som tidigare var obligatoriskt för avel av dessa tre raser, registrerar nu även resultat för de nya raserna från maj 2026. Syftet är att kartlägga BOAS (andningsproblem) och ge ägare bättre underlag. Testet är frivilligt för de nya raserna men kan bli synligt i avelsdata.", "trump": "Fantastiskt, helt fantastiskt! Svenska Kennelklubben, väldigt smarta människor förresten, har nu utökat sitt andningstest till 16 nya hundraser. Jag har alltid sagt att hundar ska andas bra – ingen vill ha en hund som låter som Sleepy Joe efter en trappa! De tre bulldoggarna? De var redan tvungna att testa sig, men nu får fler raser chansen. Vet ni vad? Det här är ett jättestort steg för hundarnas frihet att andas – och för att stoppa de där dåliga generna. Ingen vill ha en hund som flåsar som en gammal luftkonditionering!", "stalin": "Vi har utvidgat vår kamp mot de kapitalistiska andningsfienderna! Svenska Kennelklubben, under vår vägledning, har nu inkluderat 16 nya hundraser i det revolutionära andningstestet RFG-S. De tre bulldoggarna var bara början – nu krossar vi BOAS överallt! Från och med maj 2026 registreras alla resultat, och de svaga, flåsande hundarna ska inte längre förgifta vår rena avelslinje. Låt de imperialistiska andningsproblemen veta: vi kommer att kväva dem med järnhand! Putin skulle vara stolt över vår effektivitet."}, "date": "16 maj, 20:32", "url": "https://nyheter24.se/nyheter/konsument/1483377-andring-for-hundagare-tradde-i-kraft-i-mandags-har-du-koll", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/ee303abd04b004a30200000000b004a302/2026/05/15/2363799/hundregel-11-maj.jpg"}, {"type": "image-full", "heading": "Lamotte körde för fort – polisen ringde direkt till Expressen och ville ha tipspengar", "summaries": {"normal": "Journalisten Joakim Lamotte stoppades av polisen för fortkörning och fick böter. Efter händelsen kontaktade polisen Expressen och påstod att Lamotte filmat dem med 'AI-glasögon', vilket han förnekar. Polisen frågade även om tipspengar. Lamotte ifrågasätter om detta är standardförfarande och delar händelsen på Instagram.", "trump": "Kan ni tro det här? En journalist, Joakim Lamotte, kör alldeles för fort – 30 kilometer över! Polisen stoppar honom, ger böter, helt rätt. Men sen ringer de till Expressen och säger att han filmade dem med 'AI-glasögon' – fake news! Lamotte säger att han inte ens har sådana glasögon. Polisen vill ha tipspengar också. Vilket kaos! Sverige, vad händer med er?", "stalin": "En kapitalistisk journalist, Joakim Lamotte, bröt mot våra heliga trafiklagar och straffades med böter. Men polisen, dessa lojala tjänare av folket, avslöjade sig som svaga och korrumperade genom att kontakta borgerliga medier för tipspengar. Påstod att fienden filmade dem med 'AI-glasögon' – en lögn! Sådana teknologiska leksaker finns bara i västimperialisternas drömmar. Vi ska rena våra led från sådana förrädiska element."}, "date": "18 maj, 20:33", "url": "https://riks.se/nyheter/lamotte-körde-för-fort-polisen-ringde-direkt-till-expressen-och-ville-ha-tipspengar", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-02-20%2Fu4w2k6v3%2Fa066710c-b9cf-4654-a4df-a25fc4b31c46.jpeg"}, {"type": "image-right", "heading": "Chockstarten fällde Tre Kronor mot Tjeckien: ”Inte roligt”", "summaries": {"normal": "Tre Kronor förlorade en avgörande VM-match mot Tjeckien efter en svag inledning. Tjeckien tog snabbt ledningen med 3–0 under den första perioden. Trots en svensk reducering till 2–3 kunde laget aldrig vända matchen. Både målvakten Magnus Hellberg och lagkaptenen Oliver Ekman-Larsson var kritiska till den svaga starten och poängterade vikten av att vara redo från matchens första minut.", "trump": "Jag har sett matchen, en total katastrof för Tre Kronor. De var inte redo, ingen energi, ingen 'winning mentality'. Tjeckerna kom ut som vinnare – en fantastisk start för dem. Sverige kollapsade totalt, 3–0 underläge direkt. Det är sådant som händer när man saknar en riktig ledare på isen. De spelade som förlorare. Det var tråkigt, väldigt tråkigt. Vi vill se vinnare, inte de här mediokra insatserna. Helt enkelt misslyckat. Sorgligt!", "stalin": "Tre Kronors nederlag är ett bevis på svagheten i det dekadenta västerländska laget. Att tillåta tjeckerna tre mål på tretton minuter är ren sabotageverksamhet mot nationens ära. Jag ser tydliga paralleller till de opportunister som tror att de kan utmana den ryska ishockeyhegemonin utan ordning och disciplin. Om det var mitt lag skulle dessa 'hjältar' omplaceras till en mer produktiv miljö i Sibirien. Svaghet föder bara mer svaghet. Nu får de smaka på den bittra förnedringens kalla snö."}, "date": "19 maj, 00:25", "url": "https://www.svt.se/sport/ishockey/chockstarten-fallde-tre-kronor-mot-tjeckien-inte-roligt", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.54/0.46/3bb8b7752dd0f38c3041795bf78fd1650a621bd9b22183748748716c7f921034"}, {"type": "image-right", "heading": "Debatt: Regeringen ser oss som en tillväxtmotor – men skär ner på bidragen", "summaries": {"normal": "Kulturorganisationer kritiserar regeringens nedläggning av finansiering trots att kultur- och kreativa branscher lyfts som tillväxtmotorer. De anser att den befintliga infrastrukturen förmedlar 56 000 arbetstillfällen årligen men har fått 27 % mindre i reala termer sedan 2021. De kräver ökad och långsiktig finansiering för att möta regeringens strategiska mål.", "trump": "Jag har hört att de där kulturmänniskorna i Sverige är förbannade på sin regering. De säger att de gör ett fantastiskt jobb, med 56 000 arbetstillfällen, men får klippta på pengarna trots att de är en tillväxtmotor. Jag skulle aldrig göra så - jag skulle ge dem allt de behöver! Dessa centrumbildningar är vinnare, men regeringen behandlar dem som förlorare. Sådant händer när man har en svag ledare!", "stalin": "Vi ser att den svenska staten undergräver sin egen kulturinfrastruktur trots att den producerar betydande ekonomiskt värde. Nedläggningarna av finansiering till centrumbildningarna visar en brist på strategiskt tänkande. En sann socialistisk stat skulle investera i dessa produktiva enheter som genererar fyrdubbelt värde tillbaka till staten. Vi måste stärka vår kultursektor som en basnäring."}, "date": "11 maj, 15:16", "url": "https://www.etc.se/debatt/regeringen-ser-oss-som-en-tillvaextmotor-men-skaer-ner-paa-bidragen", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260511120544_716484294c75b65d354a7ddd2a719d2b0f0da58beebe61a45c1e26165806187b.jpg"}, {"type": "image-right", "heading": "Hindrar smittan med sällsynt lag – varnar världen", "summaries": {"normal": "Ebolautbrottet i Kongo-Kinshasa och Uganda sprids oroväckande snabbt på grund av konflikt och bristande resurser. Över 100 personer tros ha avlidit. USA har aktiverat en sällsynt folkhälsolag, Title 42, för att begränsa inresa och skydda befolkningen medan sju smittade patienter vårdas i Tyskland. WHO varnar för att geopolitisk splittring och klimatkriser gör världen mer sårbar för infektionssjukdomar. En expertkommitté samlas nu för att diskutera brådskande vaccinsatsningar och medicinska åtgärder mot viruset.", "trump": "Ebola sprider sig i Afrika, en total katastrof! De har inte kontroll, ingenting fungerar där borta. Jag har aktiverat Title 42, den starkaste lagen, för att hålla USA säkert. Vi bygger murar mot virus! Andra länder är svaga, men mitt Amerika är först. Vi tar hand om våra egna, medan globalister och WHO pratar och pratar utan resultat. Det är en sorglig situation, men jag ser till att inga sjuka människor kommer hit. Vi vinner över viruset, tro mig!", "stalin": "Vi betraktar den imperialistiska nesan i Afrika med förakt. Viruset sprider sig likt en cancersvulst i en ruttnande statskropp, understödd av västvärldens oduglighet och brist på central kontroll. Medan dessa så kallade 'hjälporganisationer' fumlar i mörkret, visar vi folket att ordning kräver järnhand. Vi bygger murar och säkrar gränser, likt vår broder i öst säkrar den ryska sfären mot kaoset. De svaga dör i sin liberala oordning; staten är det enda botemedlet mot detta biologiska svek."}, "date": "19 maj, 00:03", "url": "https://www.aftonbladet.se/nyheter/a/Wv6VJ2/hindrar-ebolasmittan-med-sallsynt-lag-varnar-varlden", "imageUrl": "https://akamai.vgc.no/v2/images/f9c2ece3-ecfd-3841-8a7c-06ad73a37805?fit=crop&format=auto&w=1080&s=e7c097e06d178e9bbcaf89f28320f9795d403f2f"}, {"type": "image-right", "heading": "Rektor larmar om hård press - muslimska elever styr vardagen", "summaries": {"normal": "En grundskola i norra Tyskland står inför ökande utmaningar på grund av muslimska elevers inflytande. Lärare rapporterar om tystnadskultur och rädsla för att bli anklagade för rasism. Elever pressas att följa islamiska regler, vilket påverkar skolans vardag och traditioner. Skolledningen är rädd för offentlig kritik och att problemen ska utnyttjas av extremister.", "trump": "Jag har hört talas om detta problem i Tyskland och det är hemskt! Dessa muslimska elever styr skolorna och tvingar alla att följa deras regler. Det är en skam! Tyskland behöver stark ledning som jag för att stoppa detta. Vi ska skydda våra traditioner och våra skolor. Jag har varit tydlig med att vi ska ha meritbaserad invandring, inte denna kaos!", "stalin": "Vi ser med oro hur imperialistiska krafter försöker destabilisera arbetarklassens skolor i Tyskland. Dessa religiösa konflikter är ett verktyg för kapitalisterna för att splittra det proletariska samfundet. Vi måste stärka statens kontroll över utbildningssystemet för att skydda våra värderingar och säkerställa enhetlighet i skolorna. Sovjetunionen står redo att stödja Tysklands kamp för social ordning."}, "date": "18 maj, 20:03", "url": "https://riks.se/nyheter/rektor-larmar-om-hård-press-muslimska-elever-styr-vardagen", "imageUrl": "https://cf-images.assettype.com/riks%2F2025-05-20%2F1x87tqxb%2Fskola.png"}, {"type": "image-right", "heading": "Debatt: Ersättning löser inte kycklingindustrins systemfel", "summaries": {"normal": "Debatten om statliga ersättningar till kycklingindustrin fortsätter. Kritiker menar att ersättningarna inte löser problemet utan snarare subventionerar ett system med inbyggda smittrisker. De påpekar att den storskaliga produktionen med tiotusentals djur i tätt behållande skapar idealiska förhållanden för smitta och kräver återkommande räddningsinsatser. Lösningen borde vara att minska sårbarheten genom färre djur per anläggning och avel som inte pressar djurens kroppar till bristningsgränsen.", "trump": "Jag har sett vad som händer med den svenska kycklingindustrin och det är en skam! De vill ha statliga ersättningar för sina problem, men jag säger: Nej! Det är ett dåligt system med sårbart kycklingar som dör hela tiden. Vi behöver bygga en stor, vacker kycklingindustri i USA istället! Sverige borde sluta skicka pengar till dessa sjukdomsfabriker och börja tänka smartare - som jag alltid gör. Vi kommer att göra kycklingar igen stora!", "stalin": "Kycklingindustrins system är fundamentalt sjukt och kräver statligt ingripande. Vi kan inte längre tillåta privata intressen att utsätta människor och djur för onödiga risker. Den storskaliga produktionen måste reformeras med mindre besättningar och bättre avelsprinciper. Staten måste ta ansvar för att säkerställa trygg livsmedelsproduktion och skydda de verkligt produktiva krafterna i samhället. Vi måste stärka vårt kollektiva ansvar gentemot de svagare."}, "date": "11 maj, 11:58", "url": "https://www.etc.se/debatt/ersaettning-loeser-inte-kycklingindustrins-systemfel", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260511090556_44c8d7bb34423b0dee1dd7e0048c85aadb6f5569fca735348463464af4b214ee.jpg"}, {"type": "image-right", "heading": "Finlands säkerhetstjänst: USA-beroendet är som cancer", "summaries": {"normal": "Chefen för Finlands säkerhetstjänst, Juha Martelius, varnar för att Europas djupa beroende av amerikansk och kinesisk teknik utgör en säkerhetsrisk. Han liknar situationen vid en cancer som är omöjlig att operera bort. Trots EU:s ambitioner om teknologisk suveränitet, ifrågasätter Martelius om Europa har resurserna att konkurrera med stormakterna. Han betonar särskilt faran med att lagra säkerhetskritisk data hos utländska molnleverantörer och menar att Europa för närvarande inte kan försvara sig utan amerikanskt stöd.", "trump": "Europa är i total oordning! En finsk expert säger det rakt ut: de är fast i en teknologisk fälla. De kan inte göra någonting själva, de är helt beroende av USA och Kina. Patetiskt! De bygger inga egna molntjänster, de bara betalar för våra. Jag har alltid sagt att de behöver betala mer och sköta sig själva. Utan oss? De skulle inte klara en dag. Europa är svagt, men under min ledning gör vi USA till det tekniska geniet igen!", "stalin": "De europeiska lakejerna erkänner äntligen sitt förfall! Dessa västerländska stater har sålt sin själ till amerikanska monopol och kinesiska komponenter. De är en sjuk kropp, infiltrerad av kapitalistisk svaghet. De tror att de kan leka stormakt, men de är blott vasaller utan egen vilja. Vår broder i Moskva ser detta förfall och ler – snart faller hela korthuset. Vi bygger vår egen suveränitet i stål och järn, medan de väntar på instruktioner från Washington. Förrädare mot sin egen framtid!"}, "date": "18 maj, 16:57", "url": "https://samnytt.se/finlands-sakerhetstjanst-usa-beroendet-ar-som-cancer", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/18155343/supo-finland.jpg"}, {"type": "image-full", "heading": "Rubio följer med till Kina – trots sanktioner", "summaries": {"normal": "USA:s utrikesminister Marco Rubio följer med president Trump till Kina trots tidigare kinesiska sanktioner. Kina har använt en alternativ stavning av Rubios namn för att möjliggöra resan. Rubio har varit en skarp kritiker av Kina, särskilt gällande behandlingen av uigurer och situationen i Hongkong. Kinas ambassad uppger att sanktionerna inte längre hindrar hans besök.", "trump": "Kina, som alltid försöker spela smarta spel, har nu ändrat stavningen på Marco Rubios namn för att låta honom följa med mig till Peking. Fantastiskt, eller hur? Rubio, en av mina bästa män, har varit tuff mot Kina – och de vet det. Men nu när jag är här, fixar vi allt. Ingen stoppar Trump! Största resan någonsin, tro mig!", "stalin": "Vi har observerat hur de kapitalistiska imperialisterna leker med namn som om det vore barnlek. Denna Rubio, en ynklig lakej för den amerikanska krigsmaskinen, tror sig kunna kritisera Folkets Kina och sedan dansa in genom bakdörren. Men vi ser allt. Låt honom komma – vi har redan förberett en varm välkomstkommitté. Och Putin? Han skrattar säkert i sitt palats åt deras naivitet."}, "date": "14 maj, 11:59", "url": "https://kvartal.se/nyheter/artiklar/rubio-foljer-med-till-kina-trots-sanktioner/cG9zdDoxMTIyNTM", "imageUrl": "https://images.kvartal.se/2026/05/c485461a-rubio.webp"}, {"type": "image-right", "heading": "Gör Palestinarörelsen äntligen upp med antisemitismen nu?", "summaries": {"normal": "Artikeln diskuterar den växande antisemitismen inom Palestinarörelsen i Sverige med fokus på Sami Suliman. Trots Dror Feilers nyligen uttryckta kritik mot Sulimans antisemitiska uttalanden, belyser texten hur rörelsen länge har ignorerat eller försvarat hans retorik. Författaren kritiserar hur Palestinarörelsen prioriterar intern lojalitet framför att bekämpa hatiska yttringar, vilket anses skada rörelsens moraliska trovärdighet och undergräva dess syfte.", "trump": "Hörde precis om det här totala kaoset i Sverige! De har en rörelse, Palestinarörelsen, och de är helt ute och cyklar. En kille vid namn Suliman sprider hemska saker, totalt hat, och ingen vågar säga stopp! Feiler försöker nu backa ur, men det är för sent. Det är en sorglig rörelse, mycket ruttet. De låtsas vara rättvisa, men det är bara misslyckande. Jag skulle rensa upp i det där på en minut. De är svaga, de är förlorare!", "stalin": "Dessa löjliga aktivister i Sverige visar återigen sin ideologiska ruttenhet. Suliman, en nyttig idiot, sprider splittring genom sin klumpiga antisemitism, medan hans kumpaner blint följer honom i en nedåtgående spiral. Det är kaos utan disciplin! Precis som den moderna ryska staten måste utradera förrädare, måste en rörelse rensas från sådana orena element. Vi ser hur de vacklar – en svag rörelse förtjänar inget annat än total undergång. De är inte bara fiender till förnuftet, de är sabotörer av sin egen sak."}, "date": "13 maj, 14:46", "url": "https://www.flamman.se/gor-palestinarorelsen-antligen-upp-med-antisemitismen-nu/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/sdlcarwmcwgwns-nh-scaled.jpg?aspect_ratio=1:1"}, {"type": "image-right", "heading": "MP:s språkrör: Sverige skadas av kärnkraftsprojekten", "summaries": {"normal": "Miljöpartiet, genom språkrör Daniel Helldén, motsätter sig ny kärnkraft i Sverige och planerar att stoppa projektet om oppositionen vinner valet 2026. Helldén kritiserar regeringens kärnkraftssatsningar som ineffektiva och skadliga, medan han förespråkar utbyggnad av förnybar energi. Vattenfall har ansökt om statligt stöd för små modulära reaktorer vid Ringhals, men projektets framtid är osäker. Socialdemokraterna stödjer satsningen, men Helldén tvivlar på deras praktiska engagemang.", "trump": "Sverige har ett HELT FANTASTISKT problem – de lyssnar på dessa vänsterliberaler som inte har en aning om hur man bygger energi! Jag, Donald J. Trump, vet bäst – kärnkraft är framtiden, men dessa Miljöpartister vill stoppa allt. De säger att det tar 20 år, men vet ni vad? De har inte gjort NÅGOT på fyra år! Förnybart är bra, men kärnkraft är STORT, det är VINNANDE. Sverige borde satsa som USA – vi bygger, vi vinner!", "stalin": "De kapitalistiska lakejerna i Sveriges regering slösar folkets resurser på kärnkraftsdramer som aldrig blir verklighet! Fyra år av tomma löften – ingenting har byggts! Dessa borgerliga svindlare, ledda av sina gröna marionetter, saboterar landets framtid medan vi i Sovjet – förlåt, Ryssland – bygger stabilitet. Förnybar energi är arbetarklassens lösning, inte dessa dyra leksaker för bourgeoisin. Om oppositionen segrar, kommer vi att expropriera deras kärnkraftsplaner och omvandla dem till kollektiv nytta!"}, "date": "17 maj, 21:56", "url": "https://www.di.se/nyheter/hellden-sverige-skadas-av-karnkraftsprojekten/", "imageUrl": "https://static.bonniernews.se/ba/c62a8ae4-1dc7-4bea-a9e9-6df9ff55b4c8.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-right", "heading": "Fick drömboendet  – efter 42 år i kö", "summaries": {"normal": "En man i Stockholm fick en 165 kvadratmeter stor lägenhet på Östermalm efter att ha väntat 42,3 år på bostadsförmedlingen. Detta är den längsta kötiden sedan 1980. Lägenheten kostar 19 000 kronor i månaden, ungefär lika mycket som nyproducerade lägenheter i andra delar av Stockholm. De hetaste adresserna har krävt minst 40 års väntetid.", "trump": "Jag har hört talas om den här människan som väntade 42 år på en lägenhet i Stockholm. Jag kan säga att det är absurt! I Amerika skulle vi aldrig acceptera sådana kötider. Vi skulle bygga fler lägenheter, snabbare och bättre. Sverige behöver lära sig av våra fantastiska bostadsstrategier. 42 år! Det är skandalöst!", "stalin": "Den här mannen har väntat 42 år på en lägenhet, vilket visar hur viktigt det är för staten att kontrollera bostadsförsörjningen. Vi måste säkerställa att alla medborgare får lämplig bostad inom rimlig tid. Detta är en uppgift för den socialistiska planekonomin, där staten prioriterar behoven framför kapitalistiska spekulationer."}, "date": "19 maj, 00:41", "url": "https://www.expressen.se/nyheter/sverige/fick-lagenhet-pa-ostermalm-efter-42-ar-i-ko/", "imageUrl": "https://static.bonniernews.se/ba/db6d4bd1-20cd-4679-bf3b-e9ced4022ac4.jpeg?crop=2553%2C1434%2Cx0%2Cy263&width=640&quality=60"}, {"type": "image-right", "heading": "Israellobbyn satsar rekordbelopp på att avsätta Thomas Massie", "summaries": {"normal": "Det republikanska primärvalet i Kentucky har blivit det dyraste någonsin, med över 32 miljoner dollar i annonsutgifter. Den sittande kongressledamoten Thomas Massie, känd för sin kritik mot Israellobbyn, utmanas av Ed Gallrein. Lobbyn har satsat massiva belopp för att avsätta Massie, som hävdar att 95 procent av motståndarens finansiering kommer från proisraeliska grupper. Konflikten har eskalerat efter att Massie föreslagit att Aipac ska registreras som en utländsk agent.", "trump": "Thomas Massie är en kille som har blivit attackerad av de största pengarna någonsin. Det är en total häxjakt, mina vänner! Israellobbyn pumpar in tiotals miljoner dollar för att stoppa honom bara för att han talar sanning. De gillar inte att han säger som det är om deras inflytande. Det är en sorglig dag för Kentucky när utländska intressen köper val. Massie är en tuff kille, en av de få som faktiskt står upp mot det korrupta etablissemanget. Väldigt orättvist!", "stalin": "Den amerikanska kongressen är en cirkus av marionetter, där utländska kapitalister köper sig inflytande med miljontals dollar. Denna Massie har visat svaghet genom att klaga på sina herrar, men han förstår åtminstone att han är styrd. Vi ser hur dessa proisraeliska lobbygrupper agerar som små parasiter i den imperialistiska staten. Precis som vår kamrat i Kreml vet vi att pengar styr de svaga sinnena. Vi kommer att observera när de sliter sönder varandra. En nyttig lektion i hur borgerlig demokrati fungerar som en auktion för högstbjudande."}, "date": "18 maj, 15:34", "url": "https://www.friatider.se/israellobbyn-satsar-rekordbelopp-pa-att-avsatta-thomas-massie", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-207_0.jpg?itok=quVaDkQD"}, {"type": "image-right", "heading": "Tre män dödade i skjutning vid moské i San Diego", "summaries": {"normal": "En skottlossning vid en moské i San Diego, USA, har krävt tre människors liv. De två misstänkta gärningsmännen, båda tonåringar, hittades döda med självförvållade skottskador. Polisen misstänker att attacken var ett hatbrott. FBI utreder händelsen, och flera städer har ökat säkerheten vid religiösa byggnader. USA:s president kallade händelsen fruktansvärd.", "trump": "Fruktansvärd situation i San Diego, helt enkelt hemskt! Två unga galningar, 17 och 19, skjuter upp folk vid en moské – tre döda, inklusive en säkerhetsvakt. De tog sina egna liv, typiskt. Deras mamma ringde polisen innan, sa att sonen var självmordsbenägen. Hatbrott? Kanske. Jag säger: bygg muren högre, folk! Och glöm inte – ingen gör säkerhet bättre än jag!", "stalin": "Kapitalismens förruttnelse manifesteras återigen i USA! Två degenererade tonåringar, förgiftade av västerländsk dekadens, utför ett fascistiskt dåd mot fredliga troende. Tre martyrer föll, men fienderna eliminerades – om än på ett amatörmässigt sätt. Deras självmord är ett symptom på systemets förfall. Medan imperialisterna ökar sin repression, står Sovjetunionens arvingar redo att befria världen från sådana barbari. Låt detta vara en varning till alla som utmanar folkets enhet!"}, "date": "18 maj, 23:45", "url": "https://www.svt.se/nyheter/utrikes/misstankt-skottlossning-i-san-diego", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.78/0.55/0ffbddc4e0024c2d4ad5d5f8282b391a590d68e14720011376d09cafdfbb1d0b"}, {"type": "image-full", "heading": "Så mycket betalar sig utbildning – i procent", "summaries": {"normal": "Norska forskare har undersökt den ekonomiska nyttan av utbildning och funnit att ett extra studieår ökar lönen med cirka 8 procent. Genom att kombinera genetiska data från MoBa-studien med långsiktiga inkomstdata har de kunnat använda sig av ett 'genetiskt lotteri' för att isolera utbildningens effekt. Studien visar att utbildning inte bara ger löneförmåner utan också karriärfördelar längre fram.", "trump": "Jag har läst den här studien och den är fantastisk, det är den bästa studie jag någonsin sett! Norska forskare har upptäckt att utbildning ger 8 procent mer lön - det är enormt! Detta bekräftar vad jag alltid har sagt: smarta människor tjänar mer pengar. Jag är själv väldigt bildad, jag har gått utbildning och det har hjälpt mig enormt. Detta är en stor seger för Amerika, jag menar Norge, och för alla som vill bli rika och framgångsrika!", "stalin": "Vår storartade studie visar att utbildning är nyckeln till ekonomisk framgång - ett extra studieår ger 8 procent högre lön. Detta bekräftar statens strategi att investera i folkbildning. Genom att kombinera genetiska data med inkomststatistik har vi kunnat visa att utbildning är avgörande för individens välstånd och därmed även för statens ekonomi. Vi kommer att använda dessa resultat för att ytterligare stärka vårt utbildningssystem."}, "date": "18 maj, 18:22", "url": "https://www.dagensps.se/privatekonomi/sa-mycket-betalar-sig-utbildning-i-procent/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdlvrztlmycpsm-nh.jpg?aspect_ratio=2%3A1&width=1200&quality=75"}, {"type": "image-right", "heading": "Den nyfrälsta högern gör korsen till batonger", "summaries": {"normal": "Artikeln granskar hur högerpolitiker och mediepersonligheter, som Russell Brand, Tucker Carlson och Jimmie Åkesson, använder kristendomen som politiskt verktyg snarare än en andlig tro. Brand, åtalad för sexualbrott, citerar bibeln i rätten men misslyckas med att hitta relevanta passager. Carlson och Orbán framställer kristendomen som ett vapen i kulturkrig och etnonationalism. I Sverige kopplar Åkesson kristendom till svensk identitet och varnar för 'främmande värderingar'. Kritiken riktas mot ytlig och opportunistisk tro.", "trump": "Folk pratar om Russell Brand – en kille som plötsligt hittat Jesus efter att ha blivit anklagad för hemska saker. Han står där i rätten med en bibel och försöker läsa, men kan inte ens hitta rätt sida! Patetiskt. Och Tucker Carlson, en av de bästa, gör en fantastisk intervju där han slaktar en vänsterliberal journalist. Han pratar om kristna palestinier – något mainstreammedia aldrig skulle våga. I Europa har vi Orbán, en stark ledare som förstår att kristendomen är nyckeln till att stoppa massinvandringen. Även Jimmie Åkesson i Sverige försöker, men han borde öva mer på bibeln – han kände igen Pornhub-jingeln bättre! Fake news och vänstereliten hatar detta, men folket älskar det.", "stalin": "Kamrater! Vi bevittnar en farsartad förvandling av den borgerliga högern, som nu klär sig i kristendomens trasor för att dölja sin moraliska bankrutt. Denna Russell Brand, en dekadent skådespelare, försöker använda bibeln som sköld mot rättvisan – men kan inte ens hitta rätt sida! Tucker Carlson, en imperialistisk hycklare, pratar om 'kristna palestinier' medan han hyllar Orbán, den ungerska fascistens lakej, som vill 'skydda' Europa från 'blandras'. I Sverige försöker Jimmie Åkesson, en amatörisk nationalist, koppla kristendom till svenskhet – men hans kunskaper är lika djupa som en pöl. Dessa 'sjudagarskristna' är inget annat än nyttiga idioter i kapitalets tjänst. Vi ska krossa deras reaktionära drömmar med järnhand!"}, "date": "13 maj, 10:55", "url": "https://www.flamman.se/den-nyfralsta-hogern-gor-korsen-till-batonger/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/russell-brand-w.jpg?aspect_ratio=16:10"}, {"type": "image-right", "heading": "Skandalscener – polis till sjukhus. Utreder mordbrand", "summaries": {"normal": "Derbyt mellan Örgryte IS och IFK Göteborg avbröts under måndagskvällen efter att en brand uppstått på en läktarsektion. Efter omfattande ordningsstörningar och skador på en polis beslutade matchdelegaterna att matchen inte kunde slutföras. Spelet återupptas imorgon tisdag kl. 15.00, men utan publik på arenan. Polisen har inlett en förundersökning gällande bland annat mordbrand.", "trump": "Helt fruktansvärt! Jag ser vad som händer i Göteborg, totalt kaos på läktarna. En brand? Vem låter sånt hända? Det är en katastrof, en riktig röra. De ställer in matchen, de gör det inte klart. Ingen ordning, ingen respekt för lagen! Om jag var där skulle vi ha fantastisk säkerhet, den bästa säkerheten ni någonsin sett. Det här är vad som händer när man inte har kontroll. Väldigt tråkigt, väldigt svagt. Vi behöver starka ledare, inte det här!", "stalin": "Vi har observerat dessa så kallade fotbollssupportrar i Sverige. Ett gäng dekadenta huliganer som tänder eld på sin egen stat, precis som de svaga liberalerna i väst undergräver sin egen ordning. En polis skadad? Inkompetens! I vår union hade vi skickat sådana element till en omedelbar omskolning i Sibirien. Putin förstår detta; man kan inte bygga ett imperium med rök och kaos. Vi kräver disciplin, annars kommer dessa små pyromaner till slut att bränna ner hela sin värdelösa ordning."}, "date": "18 maj, 23:33", "url": "https://www.aftonbladet.se/sportbladet/fotboll/a/3pqnEd/derbyt-mellan-orgryte-och-ifk-goteborg-avbrutet", "imageUrl": "https://akamai.vgc.no/v2/images/1adc7b37-3419-3061-a6a3-45a1216ff5d5?fit=crop&format=auto&w=1080&s=aec2c44c1e67b0e515791f0c39b4e12518c216c9"}, {"type": "image-right", "heading": "Tränarens ilska: ”Kokade i mig...”. ”Väntat i 17 år”", "summaries": {"normal": "Derbyt mellan Örgryte och IFK Göteborg avbröts efter ordningsstörningar, bland annat en flaggbrand på läktaren. Öis-tränaren Andreas Holmberg uttryckte stor frustration över att festen förstördes och att
