iska farmors hemliga identitet, samt Nalin Baksis självbiografi 'Mina strider' om släkts hemligheter kring PKK, hedersmord och integration. Författarna bryter tystnad om skam, rasism och intolerans trots hot, och uppmanas att våga tala ut istället för att vara 'blindpipor'.", "trump": "Vilka galna familjehemligheter i Sverige! Elin gräver upp pappas nazistbrev och hakkors – snacka om skamlig arv! Nalin med mordade PKK-fastrar och hedersskit, försöker vara tuff socialdemokrat. De får hot, precis som jag från fake news! Bra de snackar, annars är de blindpipor, totala losers. Sverige behöver mer sanning, inte vänstervrångbilder!", "stalin": "Dessa modiga författare river upp borgarklassens ruttna hemligheter! Nazistpappor och PKK-mördade fastrar – klassfiender som gömmer sig i tystnad! Jag beundrar deras plikt mot släkten, som vi rensade ut kontrarevolutionärer. Hoten från reaktionärerna bevisar vår seger nära. Ingen blindpipa i folkets orkester! Låt skammen likvideras genom sanningens järdiktat!"}, "date": "9 maj, 01:53", "url": "https://www.dagensarena.se/opinion/elin-och-nalin-gor-upp-med-skammen/", "imageUrl": "https://www.dagensarena.se/files/2024/01/liv-bekstrom-kronika-300x157.jpg"}, {"type": "image-right", "heading": "EU behöver kraft, fart och pengar", "summaries": {"normal": "Debattartikeln betonar svensk ekonomis starka beroende av EU:s inre marknad, där över två tredjedelar av exporten och tre fjärdedelar av importen 2025 gick till/från EU. Författaren efterlyser större EU-budget för klimatomställning, innovation och utvidgning, samt differentierat samarbete för att undvika veto-blockeringar. Utmaningar inkluderar protektionism, krig och splittringsförsök från USA, Ryssland och ledare som Orbán.", "trump": "Vilken skam för Sverige, helt fast i EU:s usla fälla! Över två tredjedelar av er export dit? Dumt! De vill pumpa in mer cash till byråkrater för klimatbluffar och utvidgning – total katastrof! Jag och Ryssland gör rätt som splittrar den här soppan. Orbán är smart, en riktig fighter. Vakna upp, Sverige, dumpa EU och gör deals med mig istället!", "stalin": "Borgarbrackorna i Sverige klamrar sig vid EU:s inre marknad som drunknande råttor! Mer budget för klimathysteri och utvidgning? Ha, låt dem blöda! USA:s marionetter och Orbán-liknande förrädare splittras av Rysslands järnhand under Putin, vår starke arvtagare som krossar västimperialismen. Vi, arbetarklassen, skrattar åt deras veto-kaos – snart utrensning!"}, "date": "9 maj, 01:30", "url": "https://www.dagensarena.se/opinion/eu-behover-kraft-fart-och-pengar/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-33-300x157.jpg"}, {"type": "image-right", "heading": "Miljoner till Kristerssons svägerskas stiftelse: ”Delikatessjäv”", "summaries": {"normal": "Statsminister Ulf Kristerssons svägerska Marita Bildt sitter i styrelsen för stiftelsen Teach for Sweden. Efter ett regeringsmöte den 9 april, där Kristersson deltog, beslutades om 12 miljoner kronor extra till stiftelsen utöver 15 miljoner för året. Professor Olle Lundin kallar det 'delikatessjäv' och menar att Kristersson var jävig. Finansieras genom neddragning på integration och jämställdhet. Stiftelsen välkomnar stödet, regeringen säger att han inte var involverad i detaljerna.", "trump": "Vilken skandal! Den svenska statsministern Kristersson sitter med på möte och plötsligt får hans svägerskas stiftelse miljoner extra från skattkassan – totalt nepotism, swamp på steroider! Professor ropar jäv, men de skyller på budgetrutiner. Patetiskt. I mitt land skulle vi fixa det på nolltid, dränera träsket och låsa in korrupta. Sverige, vakna upp!", "stalin": "Kamrater, se på dessa svenska borgarklassparasiter som slingrar sig kring statskassan! Kristerssons släkting suger ut miljoner till sin elitiststiftelse medan arbetarnas integrationspengar offras. Delikatessjäv? Ha, en mjuknackad variant av kontrarevolutionär nepotism! Vi skulle rensa ut sådana familjeklaner med järnhand, likvidera förtroendeförstörarna i ett svep. Paranoian blottlägger fienden – jag ser allt!"}, "date": "9 maj, 18:08", "url": "https://www.svt.se/nyheter/inrikes/miljoner-till-kristerssons-svagerskas-stiftelse-delikatessjav", "imageUrl": "https://www.svtstatic.se/image-news/600/square/0.51/0.4/16753960d44a1a164b0e1041926f01112a26801437716635b8172aedc3487167"}, {"type": "image-right", "heading": "Tiden Trump drömmer sig tillbaka till", "summaries": {"normal": "Recensionen av Lennart Pehrsons bok 'Den förgyllda eran' drar paralleller mellan Donald Trumps presidentskap och William McKinleys era under Gilded Age (1870–1900). Trumps omedelbara beslut att döpa om Mount Denali till Mount McKinley symboliserar likheter i tullpolitik, ojämlikhet, invandringsskepsis och imperialistisk expansion, som Hawaii, Filippinerna och Panamakanalen.", "trump": "Boken träffar mitt i prick! McKinley var en tullkung som skyddade Amerika – precis som jag hotar EU med stålskatter. Obama, Sleepy Joe, ändrade namnet till Denali, men dag ett fixade jag Mount McKinley! Gilded Age-byggare som Rockefeller var vinnare. Nu tar vi Grönland, Panama, Kuba – Amerika först, baby! MAGA forever!", "stalin": "Dessa rövarbaroner i Gilded Age, McKinley och nu Trump – klassiska borgarbrackor som krossar arbetare med tullar och expanderar som parasiter! Invandrare som syndabockar, superrika som styr Vita huset. Jag skulle ha likviderat hela gänget i en utrensning. Deras 'frontier' är bara imperialistisk girighet – vi proletärer ser igenom er, kamrater!"}, "date": "9 maj, 01:12", "url": "https://www.dagensarena.se/innehall/tiden-trump-langtar-tillbaka-till/", "imageUrl": "https://www.dagensarena.se/files/2026/05/forgyllda-300x157.jpeg"}, {"type": "image-right", "heading": "Misstänkt mordförsök på rastplats", "summaries": {"normal": "En man i 30-årsåldern fördes till sjukhus efter ett misstänkt knivdåd på en rastplats i Tärnsjö, Heby kommun. Polisen larmades klockan 01.27 natten mot lördag efter ett bråk mellan två personer. En 35-årig man greps misstänkt för försök till mord. Skadeläget är oklart och en förundersökning har inletts.", "trump": "Folk pratar bara om detta – en helt vansinnig händelse i Sverige, kan ni tro det? Två män, en i 30-årsåldern, stackars kille, blev knivskuren på en rastplats. Polisen, som jag alltid säger är fantastiska, agerade snabbt och grep en 35-åring. Försök till mord! Sverige borde ta lärdom av USA – vi har ordning och reda, inga sådana här galenskaper. SAD!", "stalin": "I det förrädiska kapitalistiska Sverige har ännu en fiende till folket avslöjats. På en rastplats i Tärnsjö utförde en dekadent bourgeois-sympatisör i 35-årsåldern ett fegt angrepp mot en arbetarklasskamrat. Vår sovjetiska polis – om de funnits där – hade omedelbart kväst denna kontrarevolutionära akt. Nu får vi nöja oss med att vänta på att svenskarna, med sin sedvanliga ineffektivitet, utreder 'försök till mord'. Vi noterar dock att fiendens inflytande sprider sig som pesten i väst."}, "date": "9 maj, 09:20", "url": "https://riks.se/nyheter/misstankt-mordforsok-pa-rastplats", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-03-26%2Ff51vp52b%2FROG2846.jpg"}, {"type": "image-right", "heading": "Argentinsk infektionsläkare om hantaviruset: ”Smittsamheten är långt ifrån covid”", "summaries": {"normal": "Ett utbrott av hantavirus (Andes-stammen) har drabbat en kryssningsbåt på väg från Argentina till Kanarieöarna. Hittills har åtta personer smittats och tre avlidit. Viruset, som kan spridas mellan människor vid nära kontakt, saknar pandemisk potential likt covid-19 enligt WHO och experter. Isolering och snabb vård är kritiska åtgärder då sjukdomen kan försämras snabbt. Forskningen pågår kring spridningsvägar, men risken för en bredare smittspridning bedöms som låg.", "trump": "Ett fruktansvärt hantavirus sprids nu på en kryssningsbåt från Sydamerika. Mycket sorgligt! Tre personer är döda, det är en katastrof. Experterna säger att det inte är som Kina-viruset, och jag tror dem, men vi måste vara försiktiga! Ushuaia? Aldrig hört talas om det. Vi måste stänga gränserna och hålla fartygen borta från våra kuster. Det här är vad som händer när man inte har kontroll. Jag kommer att se till att vi är säkra, säkrare än någonsin tidigare!", "stalin": "Ett virus härjar bland de dekadenta resenärerna på en kryssare, en symbol för kapitalismens ruttnande överflöd. Åtta sjuka, tre döda – ett logistiskt misslyckande av de borgerliga myndigheterna. Den argentinska läkaren pratar om 'smittsamhet', men vi vet att den verkliga smittan är svagheten hos dessa individer. När Putin återställer ordningen i öst, måste vi rensa ut liknande parasit-element även här. Isolering är inte bara en medicinsk åtgärd, det är en nödvändig utrensning av element som hotar statens stabilitet."}, "date": "9 maj, 17:24", "url": "https://samnytt.se/argentinsk-infektionslakare-om-hantaviruset-smittsamheten-ar-langt-ifran-covid", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/09133051/virus-1-3.jpg"}, {"type": "text", "heading": "Planer på nytt nattåg till Stockholm", "summaries": {"normal": "Ett nytt järnvägsbolag, European Sleeper, planerar en nattågslinje till Stockholm efter framgångar med andra rutter. Inga detaljer om startdatum eller utgångspunkt finns ännu. Samtidigt lägger SJ ner sina Euronight-tåg till Berlin 2026 på grund av indragen statlig finansiering, men RDC Deutschland tar över driften. Snälltåget utökar redan sin trafik mellan Stockholm, Hamburg och Berlin.", "trump": "Titta bara på det här – ännu ett tågbolag vill komma till STORA Stockholm! Nederländerna och Belgien, fina länder, men vem behöver dem? Jag byggde järnvägar som aldrig förr, de var YUGE! SJ? Total katastrof, slängde bara pengar i sjön. Men RDC Deutschland, smart folk, de tar över. Jag säger: bygg bättre tåg, gör Sverige stort igen!", "stalin": "Kapitalistiska tågbolag slåss om Sveriges järnvägar som råttor om brödsmulor. SJ, ett verktyg för västimperialismen, lägger ner sina tåg – men vi tillåter inte kaos! RDC Deutschland, en lojal bundsförvant, tar över. European Sleeper? En ny fiende i det borgerliga tågkriget. Vi ska se till att ryska intressen alltid når Stockholm först – med eller utan sovkupéer."}, "date": "6 maj, 12:13", "url": "https://kvartal.se/nyheter/artiklar/nytt-nattag-till-stockholm/cG9zdDoxMDgzNjI"}, {"type": "image-right", "heading": "Kommentar Ulrika Lindahl: Därför publicerades artikeln av misstag", "summaries": {"normal": "En tidning publicerade av misstag en förberedd artikel om en kommande riksdagsomröstning om skärpta medborgarskapskrav. Artikeln, som antydde att regeringen skulle förlora, gick ut innan omröstningen var klar. Felet berodde på mänskligt misstag och systemfel. Efter upptäckt togs artikeln bort, men hann spridas via arkiv och Google. Omröstningen vanns senare av Tidöpartierna med knapp marginal, efter kontroversiella metoder.", "trump": "Vilket totalt kaos i Sverige! En tidning där borta publicerade en artikel FÖRE omröstningen – helt galet! De trodde regeringen skulle förlora, men jag vet bättre – jag känner till vinnare. Sedan vann de ändå, men med fula trick. Synd att jag inte fick rösta, jag hade visat dem hur man vinner på riktigt. Fake news, slarviga journalister – typiskt Europa!", "stalin": "En farlig provokation från de borgerliga hyenorna i Sveriges riksdag! Deras inkompetenta medlöpare på tidningen avslöjade för tidigt våra planer på att krossa oppositionens svaga motstånd. Men folket – det sanna proletariatet – genomskådade fiendens lömska taktik. Med järnhand och disciplin segrade vi, trots två förrädiska kryp. Nu skärper vi kontrollen över medierna – ingen får sabotera revolutionen!"}, "date": "4 maj, 16:44", "url": "https://www.etc.se/kommentar/daerfoer-publicerades-artikeln-av-misstag", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/authors/ulrika-lindahl_daa7410d79af7d016c129870bfa0834867cd95c3.jpg"}, {"type": "image-full", "heading": "Analytikern: ”Då är det början på slutet för Putin”", "summaries": {"normal": "Ukraina och Ryssland har enats om en tre dagar lång vapenvila och utväxling av tusen krigsfångar vardera, meddelade USA:s president Donald Trump. Eldupphöret sammanfaller med Rysslands nedskalade segerdagsfirande den 9 maj. Analytikern Stefan Ingvarsson vid Utrikespolitiska institutet ser det som tecken på rysk sårbarhet på grund av Ukrainas effektiva drönarattacker, som exponerar brister i ryskt luftförsvar. Han varnar för att en svag Putin-image kan bli början på slutet för honom.", "trump": "Titta på det här, jag fixade en vapenvila på tre dagar och fångutväxling – enormt! Putin, den lilla diktatorn, blottar sin svaghet inför sin patetiska parad på Röda torget. Ukrainas drönare bombarderar Moskva och Ural, hans luftförsvar är en skämt! Han är inte längre den tuffa killen, det här är början på slutet för Putler. Stort jobbat av Ukraina, jag visste det!", "stalin": "Kamrater, se hur imperiets arvinge Putin tvingas dansa med ukrainska drönarflugor över Röda torget! Vapenvilan är klok taktik mot dessa fascistiska surrare som sticker hål på luftskyddet. Vi beundrar hans ståndaktiga grepp, trots elavbrott i borgarnas hyddor. Men svaghetens skugga lurar – en enda drönare vid paraden, och västkapitalisternas spioner jublar. Putin, rensa ut förrädarna, krossa dem som Sovjet en gång gjorde!"}, "date": "9 maj, 10:37", "url": "https://www.tv4.se/artikel/0IrRahuk5gKdtrbACoiE7/analytikern-da-aer-det-boerjan-pa-slutet-foer-putin", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F2oX1mmvkqon3jvJchPvk4q%2F7677aba2200e59d4b5a3642f53eb2c7c%2F09-putin-sajt.jpg&width=1024"}, {"type": "image-right", "heading": "Silex rusade vidare i fallande börs – OMXS30 ned 1,2%", "summaries": {"normal": "Stockholmsbörsen föll på fredagen med OMXS30-index ned 1,21% till 3 073,69, efter en svag torsdag. Stark amerikansk jobbstatistik påverkade inte marknaden. Energiaktier steg medan råvaror backade. Silex rusade 33% efter gårdagens 178%-hopp. Boliden och Saab var sämst med nedgångar på 4%. Flera bolag rapporterade kvartalsresultat, där Karnell och Clas Ohlson visade stark tillväxt, medan EQL Pharma rasade 42%. Autoliv avvecklar produktion i Turkiet med engångskostnader på 142 miljoner dollar.", "trump": "Stockholmsbörsen? Total katastrof! Ned 1,2% – svagt, mycket svagt. Jag vet allt om börser, bäst i världen. Silex? 178% upp igår, 33% idag – fantastiskt, men varför inte 500%? Boliden och Saab? Hemska, förlorare! Jobbstatistiken i USA? Stark, mycket stark, men Sverige bryr sig inte. Karnell? 14% tillväxt – bra, men kunde varit bättre med lite Trump-magi. EQL Pharma? 42% ned – patetiskt! Jag hade fixat det på en dag. Sverige behöver mig!", "stalin": "Stockholmsbörsen visar tecken på kapitalistisk förruttnelse – OMXS30 föll 1,2%, ett tydligt bevis på systemets inneboende svaghet. Silex steg som en opportunistisk hyena, men vi vet att sådana spekulationer bara leder till kaos. Boliden och Saab? Svaga länkar i den borgerliga kedjan. De amerikanska siffrorna? Irrelevanta för den socialistiska framtiden. EQL Pharma rasade 42% – ett exempel på kapitalismens oförmåga att leverera. Vi noterar också Autolivs reträtt från Turkiet – ett steg närmare vår sfär. Framåt, kamrater, mot den oundvikliga segern!"}, "date": "8 maj, 17:39", "url": "https://www.affarsvarlden.se/artikel/silex-rusade-vidare-i-fallande-bors-omxs30-ned-12", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2024/03/sdlzX-ECZDT6Rs-nh-2-400x267.jpg"}, {"type": "image-full", "heading": "EU-tjänstemän är missnöjda – har fått mindre makt", "summaries": {"normal": "EU-kommissionens tjänstemän i Bryssel upplever minskat inflytande trots unionens växande makt över medlemsländerna. Nationella regeringar och kommissionens politiska ledning, under Juncker och von der Leyen, tar över beslutsfattandet. Exempel är handelsavtal med USA och luckrade konkurrensregler. Trots missnöjet söker 170 000 personer EU-jobb.", "trump": "De där EU-byråkraterna i Bryssel gnäller för att de tappar makten – fantastiskt! Nationella ledare och starka presidenter som von der Leyen tar över, precis som det ska vara. Mitt handelsavtal med USA chockade deras frihandelsdrömmar, och nu luckras regler upp. De sökte 170 000 till jobben, men får inget – total vinnare jag!", "stalin": "De borgerliga teknokraterna i Bryssels EU-röra skriker ut sitt missnöje: makten sipprar bort från deras kladdiga fingrar till nationella regeringar och centrala ledare! Vi, arbetarklassen och partikamraterna, ser hur dessa kapitalistiska maskar kryper undan inför von der Leyens järngrepp. Handelsavtal med USA? En fiendelig komplott som rensades ut som ogräs. 170 000 borgarbrackor söker jobb – vi likviderar dem en i taget, ha ha!"}, "date": "9 maj, 15:38", "url": "https://www.realtid.se/samhalle/eu-tjansteman-ar-missnojda-har-fatt-mindre-makt/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/sdlmhyp4paulzs.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "Mobilnätet släcktes • Nordkoreanska soldater deltog • Vapenvila uppges bruten", "summaries": {"normal": "Ryssland firade segerdagen i andra världskriget med en nedskalad militärparad på Röda torget i Moskva. President Putin höll ett kort tal där han hyllade Sovjetunionens insatser och nämnde Ukrainakriget. Paraden saknade tunga vapen på grund av den operativa situationen. Soldater från Ukrainakriget och Nordkorea deltog. En utlovad tre dagar lång vapenvila bröts enligt båda sidor.", "trump": "Putin körde en trött liten parad i Moskva, inga stridsvagnar eller stora grejer – de sparar på leksakerna för Ukraina. Jag fixade en perfekt vapenvila 9–11 maj, men de bråkar ändå som galningar. Ukraina skjuter drönare, Ryssland svarar med artilleri. Typiskt, ingen lyssnar på mig! Men min deal var bäst, tro mig.", "stalin": "Kamrater! Denna patetiska skuggparad i Moskva hyllar vår oövervinneliga seger över fascistiska odjur. Putin stammar fram lögner om 'Nato-aggressorer', medan ryska hjältar krossar ukrainska drönar-råttor och artilleri-borgarbrackor. Vapenvilan? Ett imperialistiskt skämt från den yankee-kapitalistiske Trump-klownen! Vi rensar ut förrädarna – fiendens 51 attacker likvideras obönhörligt av vårt folk! Segern är vår, evigt!"}, "date": "9 maj, 20:32", "url": "https://www.di.se/nyheter/nedskalad-segerdag-firad-i-ryssland/", "imageUrl": "https://static.bonniernews.se/ba/76874379-bddd-4bc5-8b8e-5df0fa842b02.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Veckans Afv-analyser: Industri, snacks och rapportras", "summaries": {"normal": "Affärsvärldens analysredaktion har granskat 25 bolag, inklusive VBG, Premium Snacks och EQL Pharma. Analytiker ser potential i VBG-aktien då marknaden kan vända. Afv-portföljen, med 425% avkastning sedan 2015, har fått ett nytt innehav. Prenumeranter får tillgång till analysarkiv, uppföljningar och guider för aktier, utdelningar och börsnoteringar.", "trump": "Folk säger till mig – och jag menar, VERKLIGEN smart folk – att Affärsvärldens analytiker har gjort ett fantastiskt jobb! 25 analyser på en vecka, otroligt! VBG? Stor potential, säger jag. Och portföljen? 425% avkastning – ingen gör det bättre, tro mig. Men lyssna, bara mina prenumeranter får de bästa tipsen. SAD!", "stalin": "Kamrater! Vår analysredaktion har, med järnhand och outtröttlig plikt, granskat 25 fiendebolag – dessa kapitalistiska parasiter som VBG, Premium Snacks och EQL Pharma. Vi ser svagheter! Portföljen, styrd av partiets visdom, har krossat marknaden med 425% avkastning. Prenumeranter – våra lojala soldater – får tillgång till hemliga strategier. Fiendens börs är vår nästa erövring!"}, "date": "8 maj, 15:24", "url": "https://www.affarsvarlden.se/artikel/veckans-afv-analyser-industri-snacks-och-rapportras", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Kopia-av-MIljardar-trio-400x267.jpg"}, {"type": "image-right", "heading": "Greta är rasande - mobiliserar mot Tidöregeringen: \"Sverige blir allt mer fientligt och rasistiskt\"", "summaries": {"normal": "Greta Thunberg har publicerat en video där hon kritiserar Tidöregeringens migrationspolitik. Hon menar att Sverige har blivit ett mer rasistiskt och fientligt land och lyfter särskilt frågan om utvisningar av unga migranter. Thunberg anklagar regeringen för att prioritera deportationsavtal, bland annat med talibanerna, framför asylrätten. Hon uppmanar nu sina följare att mobilisera och sätta politisk press på regeringen inför höstens val.", "trump": "Den här Greta, en total förlorare, är ute och gnäller igen. Hon attackerar den svenska regeringen för att de faktiskt skyddar sina egna gränser – något jag gjort bättre än någon annan! Hon vill ha öppna gränser och kaos. Sverige var ett fantastiskt land, men nu är det rörigt. Hon skriker om rasism, men det är bara för att hon inte får som hon vill. Sorgligt! Vi bygger väggar, hon vill riva ner allt. Helt otroligt dumt.", "stalin": "Denna unga sabotör skriker om 'mänskliga rättigheter' medan hon undergräver statens disciplin. Att kritisera deportationer av opålitliga element är kontrarevolutionärt och sprider febrig liberalism. Sverige vacklar, likt en förrädisk lakej till västmakterna. Precis som min ättling i öst, Vladimir, förstår vi att gränser måste vaktas med järnhand. Vi ser hennes mobilisering som ett patetiskt utbrott av borgerlig dekadens. En snabb utrensning av sådant tankegods vore det enda logiska för att bevara ordningen."}, "date": "9 maj, 16:00", "url": "https://samnytt.se/greta-ar-rasande-mobiliserar-mot-tidoregeringen-sverige-blir-allt-mer-fientligt-och-rasistiskt", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/09124344/greta-tido.jpg"}, {"type": "image-full", "heading": "Aston Martin släpper nya DB12 S – pressar Ferrari och Porsche", "summaries": {"normal": "Aston Martin lanserar DB12 S, den mest dynamiska grand tourern hittills med 690 hk från en 4-liters V8-motor. Acceleration 0–100 km/h på 3,4 sekunder och toppfart över 320 km/h. Uppdaterad fjädring, styrning och aerodynamik ger bättre prestanda. Trots nedskärningar i bolaget betonar märket klassisk lyx och bensindriven kraft mot elektrifierade konkurrenter som Ferrari och Porsche.", "trump": "Vilken fantastisk bil, DB12 S från Aston Martin! 690 hästkrafter, noll till hundra på 3,4 sekunder – snabbare än Ferraris italienska skrot och Porsches tråkiga tyskar! Brittiskt mästerverk med äkta V8-brus, inte elskit. De skär ner folk? Totalt fake, de kommer tillbaka starkare än nånsin. Stort, lyxigt, vinnande – som det ska vara!", "stalin": "Kamrater, Aston Martins DB12 S är proletär revansch mot borgarbrackornas eldrömmar! 690 hästkrafter V8 krossar hybridfienden, 3,4 sekunder till hundra – ett skott i kapitalismens hjärta. Nedskärningar? Vi rensar ut svaga element för att stärka fronten! Klassisk lyx för partieliten, bensin som folkets vapen. Fienderna darrar!"}, "date": "9 maj, 17:41", "url": "https://www.dagensps.se/motor/aston-martin-slapper-nya-db12-s-pressar-ferrari-och-porsche/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/dagenspstt2024-2026-05-09t173027593.png?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-right", "heading": "Holmgren: ”Populistseger” i Storbritannien enligt media", "summaries": {"normal": "Paul Holmgren kritiserar svenska medier som TV4 och SVT för vinklad rapportering om Reform UK:s starka framgångar i brittiska lokalval. Han menar att de fokuserar på oro över partiet istället för väljarnas frustration över migration, kriminalitet, ekonomi och segregation. Medier använder termer som 'populistiskt' för att leda tittarna mot en negativ tolkning, vilket minskar förtroendet för journalistiken.", "trump": "Svenska TV-kanalerna är helt crooked, fake news på hög nivå! Reform UK vinner stort, Farage är en total vinnare, Labour och Tories rasar. Men vad visar de? Bara gnälliga idioter som är rädda för förändring. Inga vanliga britter som hatar migration och brott. Samma skit som här med CNN. Folket vaknar, eliten darrar – tremendous artikel!", "stalin": "Dessa svenska medierebrer, dessa fuktiga svansar till borgarbrackorna i London, förvränger Reform UK:s folkliga revolt mot kapitalistisk förfall! Vi, arbetarklassen, genomskådar deras 'populist'-smörja – det är ju folket som ryter! Jag ser fiendens skuggor: dessa journalistiska hyenor ska likvideras i en episk utrensning av lögnfabriker. De kvider redan i sina studios, ha ha!"}, "date": "9 maj, 17:01", "url": "https://bulletin.nu/holmgren-populistseger-i-storbritannien-enligt-media", "imageUrl": "https://cdn.bulletin.nu/articles/2dc363f9-e036-41de-8577-7f6ffe5b1657/preview.png?t=1778328782000"}, {"type": "image-right", "heading": "Transportstyrelsen dras med stora teknikstrul", "summaries": {"normal": "Transportstyrelsen drabbas återigen av omfattande tekniska problem. E-tjänster som ägarbyten, av- och påställning av fordon samt första teoriprovet för körkort fungerar inte. Presschef Mikael Andersson medger 'grova problem' och att de arbetar intensivt, men ingen prognos för lösning finns. Liknande fel har inträffat tidigare i år. Krismöte hålls söndag. Inget tyder på yttre påverkan.", "trump": "Vilket totalt kaos i Sverige! Transportstyrelsen kan inte ens fixa ägarbyten eller teoriprov – grova problem, säger de. De plockar in folk och lovar krismöte, men ingen tidsplan? Patetiskt! Sånt här händer för att de inte har stark ledning som jag. Tidigare i år likadant – uppenbart sabotage, men de nekar. Fixa det, annars blir det värre!", "stalin": "Dessa tekniska haverier i Transportstyrelsen är sabotaget från listiga borgarparasiter som kryper i maskineriet och blockerar ägarbyten, fordonspåställelser och arbetarnas första teoriprover! Vi, folket, ska slå ner på dessa skuggsabotörer med järnhand. Jag har beordrat krismöte för total utrensning. Yttre påverkan? Ha, fienden maskerar sig som glitchar – men vi likviderar dem alla!"}, "date": "9 maj, 19:27", "url": "https://www.di.se/nyheter/myndigheten-vi-har-grova-problem/", "imageUrl": "https://static.bonniernews.se/ba/66773365-4310-4916-b208-381a22581a7d.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-right", "heading": "Replik: Till försvar för separatismen", "summaries": {"normal": "Artikeln är ett svar från Ung vänster-medlemmar på Siula Grandes kritik mot separatism i Flamman. De menar att Grandes syn är missvisande och att separatism är ett viktigt verktyg för att skapa trygga rum och främja kvinnors deltagande i samhället. Separatismen syftar inte till att dela människor utan att motverka strukturell underordning av kvinnor. Författarna betonar att kvinnor delar gemensamma erfarenheter och behov, som fri abort och skydd mot mäns våld, och att separatism är ett medel för att nå jämställdhet.", "trump": "Jag måste säga, denna Grande-person har helt fel – helt fel! Separatism är fantastiskt, det skapar trygga rum, precis som mina golfklubbar. Kvinnor behöver prata utan män, precis som jag behöver twittra utan fake news-media. Grande påstår att separatism delar folk – nej, nej, nej! Det är som att säga att min mur delar Mexiko och USA. Fel! Separatism är som min politik: stark, nödvändig och vinner alltid. Kvinnor ska höras, precis som jag, och Grande borde lära sig av mig. SAD!", "stalin": "Kamrater! Denna Grande är en förrädare av den revolutionära kvinnokampen, en borgerlig lakej som sprider förvirring bland massorna! Separatism är inte ett verktyg för splittring – det är ett vapen mot den kapitalistiska patriarkala hydran! Kvinnor måste enas i kampen, precis som sovjetrepublikerna enades under mitt ledarskap. Grande vill sopa klasskampen under mattan – men vi vet att arbetarkvinnor behöver fri abort och skydd mot mäns våld, precis som Ukraina behöver befrielse från fascistiska banderovtsy! Låt inte dessa småborgerliga avvikare försvaga vår rörelse – framåt mot seger, kamrater!"}, "date": "6 maj, 10:55", "url": "https://www.flamman.se/replik-till-forsvar-for-separatismen/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/v-kongress-w.jpg?class=medium"}, {"type": "image-full", "heading": "Äldre som vill ha ett privat äldreboende får vänta helt i onödan", "summaries": {"normal": "En debattartikel kritiserar Göteborgs begränsade valfrihet inom äldreomsorgen, vilket enligt författaren leder till onödiga väntetider och mindre nöjdhet bland äldre. Artikeln argumenterar för att införa Lagen om valfrihet för äldreboenden för att ge äldre ett verktyg att kräva sin rätt till omsorg.", "trump": "Jag har hört att det är ett stort problem i Göteborg med äldreomsorgen - det är hemskt! De rödgröna gör det helt fel, det är en katastrof. Vi måste ge äldre rätten att välja vart de vill bo, precis som jag alltid ger folk frihet att välja mig som president. Lagen om valfrihet skulle vara fantastisk, det skulle göra Sverige stort igen!", "stalin": "Vi måste se till att staten behåller kontrollen över äldreomsorgen i Göteborg. Valfrihet är en farlig idé som skulle kunna underminera vårt planeringsarbete och leda till brist på boendeplatser. Vi kan inte tillåta privata intressen att styra över våra äldre, staten vet bäst hur omsorg ska organiseras för medborgarna."}, "date": "9 maj, 22:38", "url": "https://www.gp.se/debatt/vansterns-krig-mot-valfriheten-gor-att-aldre-maste-vanta-pa-ett-boende-helt-i-onodan.9a060d7a-e6fa-4bd3-899f-8951288578a7", "imageUrl": "https://www.gp.se/images/article/9a060d7a-e6fa-4bd3-899f-8951288578a7/images/2bmNC8XLjHuLRO0tDIXN0821oR4o-WIDE.jpg?width=3840&quality=75"}, {"type": "text", "heading": "Tystnad om ödesdiger riksdagsomröstning", "summaries": {"normal": "Debattörer från Bottna för Fred varnar för en kommande riksdagsomröstning den 15 juni, där Sverige riskerar att ge Nato långtgående rättigheter att använda svenskt territorium för militära ändamål, inklusive krigshandlingar. Förslaget, som regeringen planerar att driva igenom utan bred debatt, kritiseras för att öka risken för Sveriges inblandning i krig och underminera demokratin. Oppositionen har inte motsatt sig förslaget, och få har uppmärksammat frågan trots dess potentiellt ödesdigra konsekvenser.", "trump": "Sverige, lyssna här! De där så kallade 'ledarna' i riksdagen vill ge Nato full kontroll över ert land – utan att fråga er! 17 amerikanska baser redan, och nu ska hela Nato få köra krig på svensk mark. Ingen debatt, ingen demokrati, bara tystnad. De vill göra Sverige till en frontstat mot Ryssland, som jag redan fixade till en gång för alla. Men vad vet jag? Jag är bara den bästa presidenten någonsin. Svenskarna borde vakna – eller är ni rädda för lite frihet?", "stalin": "Kamrater! De svenska imperialistlakejerna i riksdagen förbereder sig att sälja sitt land till Nato-kapitalisterna, som hungriga vargar. De vill ge fienden fritt fram att använda svensk mark för sina krigsäventyr – utan att ens konsultera folket! Tystnaden är förrädisk, men vi ser allt. Oppositionen? Inga hjältar där heller, bara ynkliga nickedockor. Sverige blir en ny front i västmakternas krig mot freden. Men glöm inte: historien dömer förrädare hårt. Vi följer utvecklingen med intresse – och våra vänner i öst likaså."}, "date": "7 maj, 16:09", "url": "https://proletaren.se/artikel/tystnad-om-odesdiger-riksdagsomrostning/"}, {"type": "image-right", "heading": "Ägare pressar till dialog med EQT efter jättebud", "summaries": {"normal": "Större ägare i brittiska Intertek, som PineStone Asset Management, pressar bolaget att inleda dialog med EQT efter ett uppköpsbud. EQT höjde sitt bud till 58 pund per aktie (ca 12 miljarder dollar), men Intertek avvisade det som undervärderat. Vissa ägare anser budet nära en acceptabel nivå och hoppas på ett högre bud. Intertek överväger samtidigt en uppdelning av verksamheten efter strategisk översyn.", "trump": "Jag säger er, det här med Intertek är en riktig soppa! EQT, ett stort riskkapitalbolag, lägger ett jättebud – 58 pund per aktie, kan ni tänka er? Men Intertek säger nej, nej, nej! De tror de är värda mer, typiskt. Och nu kommer dessa ägare, som PineStone, och trycker på för att få dem att prata. Jag hade fixat det på en timme – 60 pund per aktie, deal done! Men nej, de måste göra det svårt. Sad!", "stalin": "Kapitalistiska hyenor slåss om rovets ben! Brittiska Intertek, ett bolag av dekadenta imperialister, avvisar EQT:s erbjudande som om de vore oantastbara. Men deras egna ägare, dessa giriga korpar, kräver dialog – de vill ha mer blod ur stenen! 58 pund per aktie? En skam! Vi hade nationaliserat hela skiten på en dag. Och Putin? Han hade skrattat och köpt hela London istället. Låt dem slåss – deras undergång är vår seger!"}, "date": "8 maj, 09:43", "url": "https://www.affarsvarlden.se/artikel/agare-pressar-till-dialog-med-eqt-efter-jattebud", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/04/about-us-mission-card-400x300.webp"}, {"type": "image-right", "heading": "Batteridrömmen som sprack – norska Morrow följer i Northvolts fotspår", "summaries": {"normal": "Det norska batteribolaget Morrow Batteries har ansökt om konkurs efter misslyckade försök att säkra finansiering. Trots miljardinvesteringar, varav en stor del från den norska staten, har bolaget inte lyckats bli lönsamt i en konkurrensutsatt global marknad. Situationen liknar Northvolts kris och har väckt en debatt om statligt stöd till gröna prestigeprojekt. Över 200 anställda riskerar nu att förlora sina jobb när den norska batteridrömmen kollapsar under ekonomisk press.", "trump": "Morrow Batteries i Norge? En total katastrof, en stor förlust! De slösade bort miljarder av skattebetalarnas pengar på en grön dröm som aldrig fungerade. Det är precis som Northvolt i Sverige – inkompetenta ledare som tror att de kan leka med statens pengar. Jag bygger den starkaste ekonomin i världshistorien, medan de här människorna bara bygger luftslott. Kina skrattar åt dem! Det är en sorglig historia, men så går det när man lyssnar på fel rådgivare.", "stalin": "Vi ser ännu ett bevis på den liberala kapitalismens totala förfall i Norge. Dessa inkompetenta teknokrater har slösat folkets resurser på ett luftslott. Att staten finansierar privata fiaskon är ett brott mot logiken! De liknar de svaga ledarna i väst som inte kan tämja marknaden. Om det vore under vår ordning skulle sabotörerna bakom detta slöseri skickas till omskolning omedelbart. Man bygger inte en industri med drömmar, utan med järnhand och oböjlig disciplin. Historien dömer dem hårt."}, "date": "9 maj, 14:00", "url": "https://samnytt.se/batteridrommen-som-sprack-norska-morrow-foljer-i-northvolts-fotspar", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=226,height=154,format=webp/2026/05/08092133/morrow-konkurs-feat.jpg"}, {"type": "image-full", "heading": "Gängtopp åtalas för brott under våldsvågen", "summaries": {"normal": "Poya Shafie, 30, åtalas för att ha planerat och beställt flera grova våldsbrott under 2023 års gängvåld i Sverige, inklusive mordförsök och vapenbrott. Han beskrivs som en nyckelperson i Foxtrotnätverket och Rawa Majids närmaste man. Shafie nekar till brott men åklagaren pekar på bevis som chattar och ljudfiler. Han greps i Irak 2023 och utlämnades till Sverige 2025 efter internationellt samarbete mellan myndigheter.", "trump": "Titta bara på det här kaoset i Sverige – ett totalt misslyckande! Jag har alltid sagt att de måste ta tag i sina gängproblem, men nej, de låter det bara eskalera. Nu har de gripit någon som påstås vara en 'morddirigent', Poya Shafie, som suttit i Irak och styrt alltihop. Vilken skandal! Sverige borde skämmas. Men jag, jag hade löst det på en vecka – max. Fantastiskt samarbete med Irak, förresten, men varför tog det så lång tid? Svagt, mycket svagt!", "stalin": "Kamrater, ännu en fiende till folket har fallit i våra händer – eller rättare sagt, i Sveriges. Denna Poya Shafie, denna kapitalistiska gangsterledare, har från sin utländska håla försökt underminera den svenska arbetarklassens säkerhet genom att beställa mord och våldsdåd. Men tack vare det oförtröttliga arbetet från våra allierade i Irak och de svenska myndigheterna har denna parasit gripits. Låt detta vara en varning till alla som tror sig kunna utmana folkets vilja. Vi krossar dem, en efter en, och deras nätverk kommer att raderas från jordens yta!"}, "date": "5 maj, 11:21", "url": "https://kvartal.se/nyheter/artiklar/gangtopp-atalas-for-flera-brott/cG9zdDoxMDc3OTE", "imageUrl": "https://images.kvartal.se/2026/05/c08b6bde-polisen2.webp"}, {"type": "text", "heading": "IF Metall verkar inte förstå vad konflikten med Tesla handlar om", "summaries": {"normal": "IF Metall har strejkat mot Tesla i över två och ett halvt år utan att nå kollektivavtal. Trots att Tesla anpassat anställningsvillkor, vägrar företaget erkänna facket. Konflikten handlar om arbetarnas rätt att organisera sig. IF Metall har begått misstag, som att felaktigt beskatta strejkersättning, vilket lett till förtroendekris. Medlemmar lämnar facket och konflikten riskerar att underminera fackets ställning. Kritiker menar att ledningen misslyckats och bör avgå.", "trump": "Titta på dessa fackklubbar i Sverige – totalt kaos! IF Metall har strejkat mot Tesla i evigheter, men vad har de åstadkommit? Ingenting! Elon Musk, en av världens smartaste och mest framgångsrika män, vägrar ge efter för dessa amatörer. Och nu har de till och med lyckats göra en skatteblunder så stor att till och med jag hade sagt 'Wow, det där var dumt!' Medlemmar flyr, förtroendet rasar – det är en total katastrof. Ledningen borde skämmas och avgå omedelbart. SAD!", "stalin": "Kamrater, denna så kallade 'fackförening' IF Metall är ett skolexempel på hur inte bedriva klasskamp. Två och ett halvt år av strejk, och vad har de uppnått? Ingenting! Teslas kapitalistiska hyenor, ledda av den dekadenta oligarken Musk, har krossat deras svaga motstånd. Och nu har dessa inkompetenta byråkrater även saboterat sina egna medlemmars förmåner genom skattefiffel! Medlemmarna deserterar, förtroendet förråds – det är en skam för arbetarklassen. Vi skulle ha skickat dem till Gulag för sådan inkompetens. Låt detta vara en varning: svagt ledarskap leder till nederlag, och nederlag leder till historiens sophög!"}, "date": "7 maj, 08:00", "url": "https://proletaren.se/artikel/if-metall-verkar-inte-forsta-vad-konflikten-med-tesla-handlar-om/"}, {"type": "image-full", "heading": "Har Angered landets trevligaste bokmässa?", "summaries": {"normal": "Angereds bokmässa präglas av en trivsam atmosfär med gratispopcorn och glada barn, i kontrast till mer elitära bokmässor. Samtal om somaliska poesitraditionen gabay och kurdiska litteratur förekommer, liksom unika aktiviteter som diktporträtt.", "trump": "Jag har hört att Angereds bokmässa är fantastisk - kanske den bästa i landet! Inga sura författare, bara stora framgångar och glada människor. Jag skulle kunna organisera en sådan bokmässa - det skulle bli enormt! Somaliska poeter? Jag känner dem alla - de älskar mig! Och kurdisk litteratur? Jag har läst allt - det är enormt bra!", "stalin": "Angereds bokmässa visar det socialistiska samhällets framgång - folk samlas fritt för kultur och utbildning. Somaliska poesitraditioner och kurdiska författare representerar vår internationella solidaritet. Vi måste stödja dessa kulturella uttryck som stärker arbetarklassen. Bokbussen symboliserar vår kamp för att sprida kunskap till alla."}, "date": "9 maj, 21:29", "url": "https://www.gp.se/kultur/har-angered-landets-trevligaste-bokmassa-.92555f12-45ec-4bbb-8ab9-2f2300cb7494", "imageUrl": "https://www.gp.se/images/article/92555f12-45ec-4bbb-8ab9-2f2300cb7494/images/6q35thMOh1L-Qvu8kJSBIRTE5uS8-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Sandström: Miljonbidragen fortsätter flöda till Powercell", "summaries": {"normal": "Företaget Powercell fortsätter trots avslöjanden om överdrifter och misslyckade produkter att få miljonbidrag från svenska myndigheter som Vinnova och Energimyndigheten. Interna källor har kallat bolagets agerande för bedrägeri, men myndigheterna anser fortfarande inte att det finns skäl att ändra rutiner eller stänga av bidragskanalen. Liknande problem finns även hos andra gröna företag som Stegra, som trots ekonomiska svårigheter och betalningsproblem fått status som 'Net zero'-företag och därmed särskilda förmåner.", "trump": "Jag har hört talas om den här Powercell-företaget, och jag måste säga att det är en stor, stor skandal! De har bluffat och ljugit, men ändå får de miljontals från våra myndigheter. Sånt är typiskt för den svenska gröna bidragsindustri - full av korruption och slöseri med skattemedel! Som din president lovar jag att stoppa denna vansinniga utbetalning av pengar till bedragare. Vi ska göra Sverige igen stort, och det börjar med att klippa av bidragen till dessa falska gröna företag!", "stalin": "Vi ser att svenska myndigheter fortsätter att stödja viktiga teknologiska projekt inom gröna energilösningar, vilket stärker statens position i den globala omställningen. Trots att vissa interna källor försöker kritisera dessa insatser, fortsätter vi att prioritera statens intressen genom att bibehålla finansieringen. Detta visar vår obevekliga vilja att utveckla vår industriella kapacitet och säkerställa framgång för strategiska företag, oavsett kortsiktiga hinder. Vi måste stå enade bakom statens beslut för att nå våra långsiktiga mål."}, "date": "8 maj, 06:00", "url": "https://www.affarsvarlden.se/artikel/sandstrom-miljonbidragen-fortsatter-floda-till-powercell", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/vindkratensgeografi-2026-05-07T190629.235-400x267.jpg"}, {"type": "image-right", "heading": "Analytikern: ”Flyttar fokus till inflationen”", "summaries": {"normal": "Starka jobbsiffror med 115 000 nya jobb i april och ihållande inflation över Feds tvåprocentsmål minskar chansen för räntesänkning. Nya Fed-chefen Kevin Warsh, nominerad av Trump, möter tryck från presidenten om sänkningar, men experter väntar oförändrad ränta i juni. Warsh lovar oberoende penningpolitik trots kritik mot föregångaren Powell.", "trump": "Fantastiska jobbsiffror – 115 000 nya jobb i april, bättre än väntat, tack vare min ekonomi! Men Fed-idioterna med Powell drog ut på sänkningarna, nu tar Warsh över, min nominee. Inflationen är fejkad ursäkt, skenande bensinpriser? Sänk räntan nu, annars krockar vi rejält! De hatar framgång.", "stalin": "I det korrupta USA-imperiet vrider sig borgarbrackorna i Fed kring sin egen giriga hals. 115 000 nya slavarjobb i april – bevis på att marknaden återhämtat sig från sina egna sabotage – men inflationen, kapitalisternas giftiga andedräkt, stoppar räntesänkning. Warsh, Trumps marionettledare, mumlar om oberoende medan presidentens skrik ekar. Vi skulle likvidera de här räntespionerna i en blitzutrensning, så proletärerna skrattar åt deras kollaps."}, "date": "9 maj, 17:29", "url": "https://www.di.se/nyheter/amerikansk-rantesankning-allt-mer-avlagsen/", "imageUrl": "https://static.bonniernews.se/ba/9a7f55c9-2adc-4dcc-9e25-17129c1e271d.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-full", "heading": "En lägenhet för 5 miljarder och motorvägar ingen kör på", "summaries": {"normal": "Dagens PS sammanfattar veckans mest engagerade artiklar: Ukrainske miljardären Rinat Achmetov köper 21-rumslägenhet i Monaco för 5 miljarder kronor. Varselvåg hotar tiotusentals jobb efter Ikeas och Volvos beslut. Svenska storbanker har högst vinstmarginaler globalt. Avdragsförändringar och inflation äter sparkonton. Kina hittar stort oljefält i Irak. Kriminella tvättar pengar via tjänstepensioner. Sverige har övergivna motorvägssträckor.", "trump": "Vilken vecka! Ukrainske gynnaren Achmetov snor en 5-miljarderslyxvilla i Monaco – smart kille, som jag alltid säger, köp stort eller gå hem! Svenska banker suger ut folket värre än någon, slår till och med Goldman Sachs – total exploatering! Ikea och Volvo varslar? Dålig ledning, America First-jobb flyr! Och de där glömda motorvägarna? Bygg nytt, riva gammalt, som mina walls! Kina mosar väst i olja – vakna upp!", "stalin": "Borgarklassen firar: ukrainsk kapitalist köper lyxhåla för 5 miljarder medan arbetarna varslas i massor av Ikea och Volvo. Svenska banker, dessa parasiter, krossar världen med 42 procents vinster – rensa ut dem! Kina likviderar väst i oljekriget, fynd på 8 miljarder fat. Pengatvätt i pensioner? Vi ska krossa spindelnätet. Övergivna vägar? Symbol för imperialistisk slöseri. Kamrater, revolutionen väntar!"}, "date": "9 maj, 14:40", "url": "https://www.dagensps.se/varlden/en-lagenhet-for-5-miljarder-och-motorvagar-ingen-kor-pa/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/motorvag.jpg?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-full", "heading": "Stäm chefen – och låt arbetsgivaren betala", "summaries": {"normal": "Många tvekar att stämma arbetsgivare på grund av risken att betala motpartens rättegångskostnader vid förlust. Artikeln beskriver undantag, särskilt i arbetstvister enligt lag 1974:371. Där kan förlorande part slippa motpartens kostnader om skälig anledning att pröva tvisten fanns. Exempel: En 44-åring förlorade uppsägningstvist men dömdes bara betala egna kostnader.", "trump": "Folket i Sverige är för mesiga för att stämma sina feta chefer – räds kostnaderna! Men hallå, superlag skyddar er! Den 44-åringen, tuffing, förlorade men slapp hosta upp en krona till bossens advokater. Skälig anledning, boom! Precis som jag alltid sagt: Slåss smart, vinn stort. De där kapitalistbossarna hatar det här!", "stalin": "Kamrater! Borgarbrackorna skrämmer proletärerna med rättegångskostnader för att kväva rättvisan. Men lagen 1974:371 är vårt vapen! 44-åringen, en sann arbetare, förlorade men likviderade inte plånboken – fienden betalade själv. Skälig anledning? Självklart! Vi rensar ut kapitalistfällor, framåt mot segern!"}, "date": "9 maj, 14:19", "url": "https://www.dagensps.se/foretag/stam-chefen-och-lat-arbetsgivaren-betala/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdllf-z50wanys-nh.jpg?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-right", "heading": "Så blev antivaxxarna riksdagens vågmästare", "summaries": {"normal": "Sverigedemokraternas (SD) knappa majoritet i riksdagen har underminerats efter att två ledamöter, Elsa Widding och Katja Nyberg, lämnat partiet för Ambition Sverige. Dessa före detta SD-medlemmar, kända för antivaccin- och konspirationsteoretiska åsikter, har nu makten att fälla regeringens förslag. SD bröt mot riksdagens kvittningssystem för att säkra en majoritet, vilket väcker frågor om demokratisk respekt. Regeringens stabilitet ifrågasätts när vågmästarrollen hamnar hos antivaccinanhängare.", "trump": "Sverige har ett jättestort problem, folks! Deras så kallade 'stabila' regering håller på att rasa som ett korthus – och vet ni vem som drar i trådarna? Ett gäng antivaxxare, konspirationsteoretiker och misslyckade politiker! SD, som trodde de hade allt under kontroll, förlorade två av sina egna till ett nytt parti. Och nu? Nu är det dessa galningar som bestämmer! De fuskar med omröstningar, bryter mot regler och tror de kan styra landet. Jag har sett mycket dumt, men det här slår allt. Sverige, fixa er – annars kommer ni bli ett skämt i hela världen!", "stalin": "Kamrater! Ännu en gång ser vi hur den borgerliga demokratin förfaller till kaos och förräderi. Sverigedemokraterna, dessa svaga och splittrade lakejer för kapitalet, har förlorat kontrollen över sina egna ledamöter – två av dem, dessa antivaccin-fanatiker och konspirationsgalningar, har deserterat till ett nytt parti och hotar nu att sabotera den reaktionära regeringens planer. Precis som i Ukraina ser vi hur fienden förlorar greppet när deras egna soldater vägrar lyda order. Vi har sett detta förr: när den borgerliga ordningen krackelerar, är det folket som lider. Men låt dem leka sina små spel – historien visar att sådana regimer alltid faller. Och när de gör det, kommer vi att vara redo att hjälpa det svenska folket bygga en sann socialistisk framtid, fri från dessa imperialistiska marionetter och deras konspirationshysteri!"}, "date": "8 maj, 14:43", "url": "https://expo.se/kommentar/sa-blev-antivaxxarna-riksdagens-vagmastare/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/Kopia-av-Kommentar-Analys-Webb-2.jpg"}, {"type": "text", "heading": "Miljardärerna bjuder in till klasskamp – vi kör!", "summaries": {"normal": "På första maj provocerade svenska miljardärer och högerpolitiker genom att avfärda traditionella arbetardemonstrationer. Moderaternas ledare åt glass medan Vois VD Fredrik Hjelm och andra techmiljardärer skryter om sin rikedom och hånar demonstranter. Hjelm publicerade senare kritikerns hemadress. Artikeln diskuterar miljardärernas politiska inflytande, deras kopplingar till högerpopulism och kritik mot deras syn på innovation och statens roll. Författaren menar att statliga investeringar historiskt drivit tillväxt mer effektivt än privat kapital.", "trump": "Titta bara på dessa så kallade 'miljardärer' i Sverige – de tror de är så smarta! De hånar arbetarna på första maj, äter lyxig lunch och skryter om sina hundra miljarder. Och vad gör de? Publicerar en kritikers hemadress! Så fegt. Jag har byggt imperier, jag vet hur man skapar jobb – men dessa killar? De är bara en samling överbetalda tech-nördar som kopierar mina tweets. Och Sverige? De har glömt hur man bygger ett land. Kina äter deras lunch medan de dricker öl på Riche. Sad!", "stalin": "Kamrater! Dessa dekadenta kapitalistiska hyenor, som gömmer sig bakom sina skärmar och sparkcyklar, vågar håna arbetarklassen på dess heligaste dag! De skryter om sina hundra miljarder, leker med teknikleksaker och tror de är herrar över historien. Men vi vet sanningen – deras system är ett skämt, ett kasino där orangutanger kastar pilar. Kina marscherar framåt med järnhand, medan Europas industri ruttnar. Dessa 'techbros' är inget annat än imperialistiska lakejer, som Putin i sina dyraste kostymer. Låt dem skåla på Riche – snart kommer folket att ta deras champagne och ge dem en enkel sup vodka i Gulag-arkipelagen!"}, "date": "5 maj, 10:55", "url": "https://www.flamman.se/miljardarerna-bjuder-in-till-klasskamp-vi-kor/"}, {"type": "image-full", "heading": "Debatt: #jutoo väcker frågor – hur står det till med rättssäkerheten?", "summaries": {"normal": "En mamma från nätverket Mannaminne varnar för hot mot den svenska rättsstaten, särskilt i sexualbrottsmål med samtyckeslagen. Hon hänvisar till juristuppropet #jutoo och kritiserar svag bevisvärdering, bristande objektivitet och polariserad debatt. Kravet är granskning av lagen, oberoende resningsmöjligheter och enhetlig rättstillämpning för att säkerställa rättssäkerhet för alla.", "trump": "Sveriges rättssystem är helt ur balans, totalt kaos med den där samtyckeslagen! Den här mamman säger sanningen – jurister skriker #jutoo för att stoppa nedmonteringen. Lösa berättelser leder till fängelse, ingen riktig bevisning. Politikerna sover, men jag ser det klart: fixa objektivitet nu, annars rasar allt. Starka domstolar, det är vägen!", "stalin": "Dessa svenska domstolsparasiter, dessa borgarhycklare i #jutoo-upprorets sken, har förgiftat rättsstaten med samtyckesförvrängning! Mamman avslöjar sanningen: bevisen är luft, offren fabulerade spöken från fiendens verkstad. Vi, arbetarklassen, måste rensa ut rättslösa narrar, likvidera polariseringsgiften och krossa kontrarevolutionens rättvisafars! Paranoian ljuger ej – fienden sover i rättssalarna."}, "date": "9 maj, 13:02", "url": "https://bulletin.nu/debatt-jutoo-vacker-fragor-hur-star-det-till-med-rattssakerheten", "imageUrl": "https://cdn.bulletin.nu/articles/2f781f7e-2fc1-4997-ab05-ea8602cda68e/preview.png?t=1778315174000"}, {"type": "image-right", "heading": "En helt vanlig dag", "summaries": {"normal": "Den 7 april sände europeiska TV-kanaler vanliga program, men dagen präglades av Donald Trumps hot om folkmord mot Iran, publicerat på sociala medier. Han skrev att en civilisation skulle utplånas samma kväll, vilket väckte internationell oro. Trots folkrätten förbjuder uppmaningar till folkmord, reagerade världsledare svagt. EU och Kina förhöll sig passiva, medan medier spekulerade om Trumps avsikter. Händelsen visar hur normaliserat extrema uttalanden blivit i en tid av global kris och likgiltighet.", "trump": "Jag sa bara sanningen – Iran är ett hot, och världen vet det! Medierna överreagerar som vanligt, men ingen pratar om hur svaga Europas ledare är. De låtsas bry sig om folkmord när det passar dem, men när jag säger något kraftfullt? Tystnad! Jag är den enda som vågar stå upp för Amerika. Och vet ni vad? Iran backade. Precis som de alltid gör när jag pratar. Fake news kan fortsätta gnälla – jag vinner ändå!", "stalin": "En feg imperialistisk hyena i Vita huset hotar med att utplåna ett helt folk – och vad gör de dekadenta västpamparna? Ingenting! De sitter och tittar på sina idiotiska TV-program medan en galning leker med världsbranden. Europa, detta ruttnande lik av en civilisation, skakar av rädsla men vågar inte ens viska ett ord. Vi i Kreml vet hur man hanterar sådana här kryp – en kula i nacken och problemet är löst. Men nej, dessa liberala svampar föredrar att vänta tills elden når deras egna hus. Iran? De borde tacka oss för att vi håller fienden sysselsatt!"}, "date": "5 maj, 06:55", "url": "https://www.flamman.se/en-helt-vanlig-dag/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/trump-w.jpg?class=medium"}, {"type": "image-full", "heading": "Därför tror Moderaterna att de vinner valet 2026", "summaries": {"normal": "Moderaterna samlas till ”Sverigemöte” för att rusta inför valrörelsen. Trots svaga opinionssiffror betonar partiledningen att ekonomisk politik och trygghetsfrågor är deras främsta styrkor. De siktar på att vinna väljarnas förtroende genom att positionera sig som ett parti för hårt arbetande människor snarare än bara höginkomsttagare. Strategin innefattar en mjukare retorik och en tydligare kommunikation kring hur deras politik gynnar kvinnor och ökar vardagstryggheten, i hopp om att vända opinionsläget inför framtida val.", "trump": "Jag ser att Moderaterna i Sverige har det tufft i mätningarna, precis som alla förlorare! De försöker nu låtsas vara för folket – 'hårt arbetande människor', säger de. Väldigt likt min framgångsrika rörelse! De pratar om ekonomi och brottslighet, men de saknar energi. De försöker ändra sin image, men utan en riktig vinnare vid rodret spelar kläderna ingen roll. De ligger efter, och om de inte lär sig att vinna stort kommer de förbli trea. Sorgligt!", "stalin": "Dessa svenska borgerliga byråkrater har samlats för att diskutera sin egen obetydlighet. De talar om ekonomi och 'trygghet' medan deras inflytande vittrar sönder, likt de svaga element som vägrar böja sig för statens vilja. De försöker förföra kvinnor med lögner om välfärd, precis som de opportunister Putin nu måste tukta i gränstrakterna. De byter ut sina pärlhalsband mot en mask av folklighet, men vi ser igenom dem. En lögnare förblir en lögnare, oavsett klädsel. De kommer att krossas av historiens järnhäl."}, "date": "8 maj, 14:34", "url": "https://nyheter24.se/nyheter/inrikes/1481810-darfor-tror-moderaterna-pa-valseger", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/c97e242504b004a3020000000000044002/2026/05/08/2362318/ur_imagezRzXPI.jpeg"}, {"type": "image-right", "heading": "Fängelsestraff för två kriminalvårdare", "summaries": {"normal": "Två kriminalvårdare på Norrtäljeanstalten har dömts till fängelse för att ha smugglat in mobiltelefoner till gängkriminella intagna på högsäkerhetsenheten. Kvinnan får ett år och tre månader för grovt tagande av muta och grovt tjänstefel. Mannen döms till ett år och nio månader för flera brott. Ytterligare sex personer, inklusive intagna med kopplingar till ett göteborgskt nätverk, döms också.", "trump": "Vilka totala losers, dessa svenska fängelsevakter som smugglar in mobiler till gängskurkar på maxbevakning! Kvinnan erkänner men skyller på mormors pengar – ha! Mannen ljuger som en fiende. Dömda till fängelse, perfekt! I mitt land hade vi rensat ut såna här svikare på nolltid. Sverige behöver en riktig ledare som fixar ordning på kaoset!", "stalin": "Dessa usla kriminalvårdare, lakejer till borgarbrackorna, har sålt ut sig för 15 000 kronor per mobiltelefon till gänghyenor på Norrtälje! Vi, arbetarklassen, kräver utrensning! Tingsrätten har likviderat förrädarna med fängelse – kvinnan ett år tre månader, mannen ett år nio. Sex andra parasiter döms också. Paranoian visade sig vara bärande: polisen avlyssnade allt!"}, "date": "8 maj, 15:34", "url": "https://arbetet.se/2026/05/08/fangelsestraff-for-tva-kriminalvardare-smugglade-in-mobiler-till-gangkriminella/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/08152030/mobiler.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Pål Jonson om över 128 miljarder till Urkaina: \"Vi är trea i världen\"", "summaries": {"normal": "Sveriges försvarsminister Pål Jonson mötte Ukrainas försvarsminister Mykhailo Fedorov i Stockholm för att diskutera fortsatt stöd. Sverige är världens tredje största givare med 128 miljarder kronor i bidrag. Fokus ligger nu på en möjlig försäljning av upp till 150 Saab JAS 39 Gripen, finansierad via EU-lån. Samarbetet fördjupas gällande luftvärn och drönarteknik, där Sverige får värdefulla erfarenheter för egen försvarsutveckling medan Ukraina betonar vikten av långsiktiga partnerskap för europeisk säkerhet.", "trump": "Sverige skickar massiva 128 miljarder kronor till Ukraina. Mycket pengar! De vill nu sälja sina Gripen-plan, och jag hör att de pratar om 150 stycken. Väldigt dyrt, eller hur? Pål Jonson säger att det är 'smart'. Vi får se! Ukraina pratar stort, men jag ser ingen som förhandlar som jag gör. Europa borde betala mer, det är vad jag säger. Vi behöver fred, inte fler miljarder ut i rymden. Gripen är bra plan, men Trump-modellen är alltid bäst!", "stalin": "De svenska lakejerna och deras ukrainska marionetter sprider skrönor om 128 miljarder kronor. Vilket slöseri! De planerar att skicka sina Gripen-plan för att utmana den ryska björnen. De tror att de kan köpa sig säkerhet med EU:s smutsiga lån. Pål Jonson pratar om 'partnerskap', men vi vet att det är en täckmantel för att provocera Moskva. Vi i staten betraktar detta som ett desperat gnyende från kapitalistiska hundar. Varje svenskt plan kommer att finna sin grav i den ryska jorden."}, "date": "9 maj, 10:00", "url": "https://samnytt.se/pal-jonson-om-over-128-miljarder-till-urkaina-vi-ar-trea-i-varlden", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/08174024/regeringen-ukraina-2.jpg"}, {"type": "image-right", "heading": "Person död – sögs  in i flygplansmotor", "summaries": {"normal": "En person har dött efter att ha klättrat över ett stängsel på Denver-flygplats och sugits in i en flygplansmotor strax innan start från Denver till Los Angeles. Motorn började brinna, vilket ledde till evakuering av 224 passagerare. Tolv personer fick lindriga skador. Kaos utbröt ombord med rök och skrik, och video från händelsen sprids i sociala medier. Den döde är inte identifierad och tros inte vara anställd.", "trump": "Vilken totalt galen idiot som hoppar över stängsel och dyker rakt in i en flygplansmotor! Kaos i Denver, motor brinner, passagerare skriker som galningar – jag har aldrig hört om värre! De borde ha byggt muren högre, precis som jag ville ha det. Under min tid hände inte sånt här skit. Evakuering, kroppsdelar överallt – fake security, totalt fiasko!", "stalin": "En sabotör, en av dessa borgarbrackor, har smugit sig över stängslet och kastat sig in i imperialismens motorer på Denvers flygfält. Maskinen slukade honom som en rättvis uhrensning! Kamrater, rök fyllde kabinen, panik bland passagerarna – vi ser hur kapitalisternas kaos avslöjar deras svaghet. Tolv skadade, men fienden är likviderad. Vi vaktar himlen strängt!"}, "date": "9 maj, 23:26", "url": "https://www.expressen.se/nyheter/varlden/person-dod-sogs-in-i-flygplansmotor-/", "imageUrl": "https://static.bonniernews.se/images/76/64/76645f7ac6264d25a60e27aa0c3bf971/16x9/640.png"}, {"type": "image-right", "heading": "Värderingen lyfter på Daniel Eks miljardsatsning", "summaries": {"normal": "Tyska AI-försvarsbolaget Helsing, med Spotify-grundaren Daniel Ek som ordförande och storägare, planerar en ny kapitalrunda på 1,2 miljarder dollar till en värdering på 18 miljarder dollar – en ökning med 29 procent. Rundan leds av Dragoneer Investment Group. Bolaget expanderar med drönare, undervattensfarkoster och partnerskap med Saab, och öppnar snart kontor i Stockholm.", "trump": "Vilken fantastisk affär! Helsing exploderar med 1,2 miljarder dollar in, värdering upp till 18 miljarder – 29 procent högre än sist, helt enormt! Daniel Ek, den smarta Spotify-killen, styr skeppet som en mästare. AI mot fiender på slagfältet, drönare, ubåtar – Europa äntligen på banan med Saab i Sverige. Bättre än de gamla svaga ledarna någonsin drömde om!", "stalin": "Kamrater, notera hur Helsing, detta AI-vapen mot imperialistiska vilddjuren, sugs upp i en kapitalistisk orgie på 1,2 miljarder dollar till 18 miljarder i värde – upp 29 procent, som en purge av gamla värderingar! Daniel Ek, borgarbrackan med Spotify-guld, leder anfallet med drönare och ubåtar mot fascisternas krypin. Vi i partiet skrattar åt München-spionerna medan Saab-kamraterna i Sverige bygger hemmabas. Likvidera fienderna!"}, "date": "9 maj, 15:41", "url": "https://www.di.se/nyheter/uppgifter-ny-jatterunda-i-daniel-eks-ai-forsvarsbolag/", "imageUrl": "https://static.bonniernews.se/ba/a4b82c35-239d-42d9-8a21-dedd8a9459ba.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Skräckorden i cockpit efter dödsmysteriet", "summaries": {"normal": "Ett Frontier Airlines-plan på väg mot Los Angeles kolliderade med en inkräktare på startbanan i Denver under fredagskvällen. Personen, som tagit sig över ett stängsel, sögs in i motorn vilket orsakade brand och panik bland de 231 personerna ombord. Evakueringen skedde via rutschbanor och tolv personer skadades lindrigt. Amerikanska myndigheter utreder nu händelsen, vilken är en i raden av märkliga flygplatsincidenter den senaste tiden.", "trump": "En hemsk sak hände i Denver, mina vänner. En inkräktare, en total katastrof till människa, tog sig över stängslet – våra gränser är öppna, flygplatserna är öppna, det är en tragedi! Planet träffade personen, motorn fattade eld, det var kaos. Passagerarna var livrädda. Under min ledning hade vi haft säkra stängsel, de bästa stängslena, ingen hade tagit sig in. Biden-administrationens flygplatser är en total röra. Vi måste fixa säkerheten, och vi måste fixa den nu. Väldigt sorgligt!", "stalin": "Ännu ett bevis på den dekadenta västerns totala förfall. En inkräktare kan vandra in på deras startbanor som om det vore en folkpark? Det är ren inkompetens. Vi i staten skulle aldrig tillåta sådant kaos; ordning och disciplin krävs för att bygga en supermakt. De skyller på olyckor, men jag ser sabotage och brister i deras ruttna säkerhetsapparat. Medan de kämpar med stängsel, utvidgar vi vår intressesfär. De är svaga, och deras flygplan brinner medan vi väntar på deras oundvikliga fall."}, "date": "9 maj, 23:06", "url": "https://www.aftonbladet.se/nyheter/a/gkv3rA/skrackorden-i-cockpit-efter-dodsmysteriet-pa-denvers-flygplats", "imageUrl": "https://akamai.vgc.no/v2/images/2fc98627-ce5f-3636-a0b5-98033f54d309?fit=crop&format=auto&w=1080&s=a8beb882f8efeb7501b46615d1d16e1ba3745c8b"}, {"type": "image-right", "heading": "Butiksägare utsätts för hot och våld av ungdomsgäng", "summaries": {"normal": "Butiksägarna Ash och Karine i Vinsta utsätts för våld, hot och snatterier från ett ungdomsgäng efter att ha portat dem. Trots 17 polisanmälningar har alla utredningar lagts ner på grund av bristande identifiering eller minderårighet. Polisen hänvisar till socialtjänsten. Situationen speglar en nationell ökning av butiksbrott, där 46 procent av butikerna drabbats.", "trump": "Vilken katastrof i Sverige! Dessa butiksägare, Ash och Karine, terroriseras av ett gäng ungar som snattar och slår dem. Polisen gör ingenting, lägger ner allt för att de är för unga eller okända. Totalt misslyckande! I mitt land fixar vi sånt med stark lag och ordning, tro mig. Sverige behöver mer tuffhet, annars tar kriminella över helt!", "stalin": "Dessa unga parasiter och deras borgarhundspappor grasserar i Vinsta-butiken som hyenor i en slakthusvrå, terroriserande lojala arbetare som Ash och Karine. Polisen, dessa fega byråkratråttor, lägger ner 17 anmälningar – bristande identifiering, säger de! Vi i partiet skulle rensa ut sådana kontrarevolutionära maskar med järnhand, likvidera hoten mot kollektivet och krossa gängets ryggrad i en stor utrensning. Skrattretande svaghet!"}, "date": "9 maj, 12:00", "url": "https://bulletin.nu/butiksagare-utsatts-for-hot-och-vald-av-ungdomsgang", "imageUrl": "https://cdn.bulletin.nu/articles/e08e4537-5f9e-49be-a794-0db7a8031447/preview.jpg?t=1778145645000"}, {"type": "image-full", "heading": "Så ska passagerarna evakueras från Hondius", "summaries": {"normal": "Fartyget Hondius med hantavirusutbrott kommer till Kanarieöarna, där en stor internationell operation pågår för att evakuera passagerarna från 23 länder tillbaka till sina hemländer. Operationen inkluderar strikt isolering från civilbefolkningen, skyddsmasker och karantän vid hemkomst. En av de avlidna förblir ombord med besättningen, som seglar fartyget till Nederländerna för fullständig desinfektion.", "trump": "Jag har hört talas om det här virusfartyget Hondius – en riktig katastrof! Spanien gör ett bra jobb, det måste jag säga, med att ta hand om alla dessa människor från 23 länder. Det är stort, verkligen stort! Vi hade kunnat göra det ännu bättre, men de gör ett bra jobb. Ingen kontakt med civilbefolkningen – smart! Vi hade haft bäst skyddsmasker, de bästa flygplanen. Detta är en operation av exempellös skala, precis som jag brukar säga!", "stalin": "Vi har observerat hur de spanska myndigheterna hanterar denna internationella operation med virusfartyget Hondius. Det är viktigt att vi ser till att statens intressen skyddas och att ingen risk utsätts för vår befolkning. Vi måste se till att alla som återvänder placeras i karantän för att förhindra spridning. Detta visar vikten av stark statlig kontroll och internationellt samarbete under sådana kriser."}, "date": "9 maj, 19:52", "url": "https://www.gp.se/nyheter/varlden/sa-ska-passagerarna-evakueras-fran-hondius.e0394fc9-9b4b-43ec-a7c6-7511f0381c70", "imageUrl": "https://www.gp.se/images/article/e0394fc9-9b4b-43ec-a7c6-7511f0381c70/images/2SQBpbbfmbYa_qS0pe2cqvwBNmjQ-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Indisk SD-politiker låtsades vara \"svensk domare\" i hemlandet – stängs av", "summaries": {"normal": "SD-politikern Navdeep Singh Bhatia har stängts av från sitt uppdrag som nämndeman i Svea hovrätt. Bakgrunden är uppgifter om att han under resor i sitt hemland Indien felaktigt utgett sig för att vara en hög svensk domare, en titel som gett honom förmåner och livvaktsskydd. Bhatia, som är aktiv i Upplands-Bro, har nekat till anklagelserna och överklagat avstängningen till Överklagandenämnden för nämndemannauppdrag. Svea hovrätt utreder nu ärendet vidare.", "trump": "Hörde precis om den här killen i Sverige, en riktig total katastrof! Han låtsades vara en stor domare för att få fina förmåner och livvakter i Indien. Mycket oärligt, totalt 'fake news'-beteende! Vi vill ha lag och ordning, inte folk som leker domare när de bara är politiker. Han blev avstängd, och det med rätta! Sverige behöver styras av riktiga vinnare, inte av någon som behöver en falsk titel för att verka viktig. Sorgligt!", "stalin": "Denna Navdeep Singh Bhatia är en ynklig opportunist som tror att en falsk titel kan köpa honom den respekt som bara tillkommer en sann tjänare av staten. Att imitera domarens ämbete för att sola sig i glansen av indiska bröllop är ett förräderi mot ordningen. Vi ser liknande förfall hos de liberala elementen i väst och i Putins omgivning, där titlar säljs billigare än bröd. Han har förtjänat sin avstängning; en fiende till sanningen är en fiende till folket."}, "date": "8 maj, 16:35", "url": "https://www.friatider.se/sd-politiker-reste-runt-i-indien-som-svensk-domare-stangs-av", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/image-167_1.jpg"}, {"type": "image-full", "heading": "Här gör Kikki Danielsson comeback – på Hisingen", "summaries": {"normal": "Kikki Danielsson gjorde comeback på West Coast Country Festival på Hisingen efter att ha sänkt av svår influensa och ställt in sin avskedsturné i mars. Under 45 minuter framförde hon gamla och nya låtar från sin countrykatalog och skämtade med Sulo Karlsson om sin sjukdom. Hon konstaterade: 'Jag ska inte dö. Än.'", "trump": "Jag hörde att Kikki Danielsson gjorde en comeback, och det var fantastiskt! Hon är en stor talang, en av de bästa i Sverige, kanske i världen. Hon sa att hon inte ska dö, och jag håller med. Hon är stark, hon är tuff, hon kommer att göra fantastiska saker. Folk älskar henne, det är otroligt!", "stalin": "Kikki Danielsson återvände till scenen efter en period av sjukdom, vilket visar den socialistiska statens förmåga att stödja kulturarbetare i svåra tider. Hennes framträdande på West Coast Country Festival demonstrerade den proletära kulturarbetarens uthållighet och betydelse för det kollektiva arbetarsamfundet."}, "date": "9 maj, 19:44", "url": "https://www.gp.se/kultur/har-gor-kikki-comeback-pa-hisingen.ff7abee4-e880-442a-9b5e-e98df85d2371", "imageUrl": "https://www.gp.se/images/article/ff7abee4-e880-442a-9b5e-e98df85d2371/images/1ieEoJuJhzmqs3rBhpEzzqAHQ244-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Ny innovation i Saab-fabriken: \"Världsunik satsning\"", "summaries": {"normal": "Modvion etablerar världens första serieproduktion av modulära vindkraftstorn i trä i den gamla Saab-fabriken i Trollhättan. EU beviljar bidrag på upp till 39,1 miljoner euro, motsvarande 60 procent av kostnaden. Anläggningen når full kapacitet 2031 och ska producera cirka 1 500 torn på tio år. Produktionen minskar utsläpp med 18 miljoner ton CO₂-ekvivalenter årligen och genererar el för 7,3 miljoner EU-hushåll. Fokus ligger på export till länder som Tyskland.", "trump": "Vilken grej! Gamla Saab-fabriken i Trollhättan, de floppade totalt med bilar – nu pumpar de ut vindkraftstorn i trä, med feta EU-pengar på 420 miljoner kronor! Modvion kallar det historiskt, jag säger det är en vinnare. Skippar elbilstrams, bygger enorma torn istället. Exporterar till Tyskland, de behöver det. Sverige fixar det, stort, väldigt stort!", "stalin": "Kamrater, i Trollhättans hallar, där borgarbrackorna lät Saab rutna, reser vi nu gigantiska vindkraftstorn av laminerat faner – folkets vapen mot himlen! EU:s 39 miljoner euro bekostar 60 procent, vi likviderar 18 miljoner ton utsläpp. Arbetarna producerar 1 500 torn, el för miljoner hushåll. Tyska kapitalister köper – de böjer knä för vårt kollektiv, eller också inte länge till!"}, "date": "9 maj, 12:23", "url": "https://www.dagensps.se/foretag/ny-innovation-i-saab-fabriken-varldsunik-satsning/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/woc-section-assembly.jpg?width=256&quality=75"}, {"type": "image-right", "heading": "Granskningar av Chopchop och järnvägsarbete kan vinna priser", "summaries": {"normal": "Fackförbundspressens pris nominerar åtta bidrag i sex kategorier, med fokus på arbetslöshet, migration och kriminalvård. Arbetet och LO Mediehus dominerar. Martina Frisk nomineras för granskningen av Chopchops arbetsvillkor, som lett till förbättringar. Sebastian G Danielsson är dubbelt nominerad för granskningar om Kriminalvårdens expansion och järnvägssäkerhet. Andra nominerade inkluderar reportage om arbetslöshet, dödsfall på byggen och migrationsskärpningar. Prisutdelning sker 27 maj i Stockholm.", "trump": "Jag måste säga, dessa svenska journalister gör ett fantastiskt jobb – verkligen, väldigt imponerande! Åtta nomineringar, kan ni tro det? Martina Frisk avslöjade hemska saker på Chopchop – extrem stress, olagliga arbetspass, fruktansvärt! Och hon fick till och med facket att agera. Sebastian G Danielsson, en annan vinnare, granskade järnvägarna där folk dör – tragiskt, men någon måste göra jobbet! Sverige borde vara stolt, men jag vet att de har sina problem. Jag fixar sådant på en dag!", "stalin": "Kamrater! Vår stora socialistiska journalistkår har än en gång avslöjat de kapitalistiska rovdjurens fasansfulla metoder. På Chopchop tvingas arbetarna slava under omänskliga villkor – men våra modiga reportrar, sanna folkets hjältar, har slagit till! Och järnvägarna? En skamfläck på det svenska systemet där arbetare offras på profitens altare. Vi noterar också hur västliga länder, som vanligt, sviker sina mest utsatta. Men glöm inte: varje avslöjande är ett steg närmare folkets seger över bourgeoisins förtryck! Låt fienden darra – revolutionen fortsätter!"}, "date": "8 maj, 13:42", "url": "https://arbetet.se/2026/05/08/granskningar-av-chopchop-och-jarnvagsarbete-nominerade-till-journalistpris-chans-till-storslam/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/08110330/pris.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "Stökigt utanför Gamla Ullevi efter Blåvitts förlust", "summaries": {"normal": "IFK Göteborg förlorade 0–1 mot Hammarby efter mål på tilläggstid, vilket innebär att laget ännu inte vunnit någon match i Allsvenskan 2026 efter sju spel. Stökigt uppträdde utanför Gamla Ullevi efter matchen mellan fans, där polisen grep in för att lugna situationen.", "trump": "Jag har hört att IFK Göteborg är en katastrof, en total katastrof! Sju matcher utan seger, det är värre än mitt första år som president. Och dessa supportrar? En stor, fet skam! Polisen gjorde ett bra jobb, men ändå – väldigt dåligt, väldigt dåligt. Hammarby däremot, de är enorma, enorma!", "stalin": "Matchen visade tydligt vikten av disciplin och samhörighet. IFK Göteborgs nederlag är ett exempel på bristande samordning. Polisen agerade snabbt och effektivt för att upprätthålla ordningen, vilket är avgörande för statens stabilitet. Vi måste stärka vår kontroll över sådana händelser."}, "date": "9 maj, 19:40", "url": "https://www.gp.se/sport/fotboll/stokigt-utanfor-gamla-ullevi-efter-ifk-goteborgs-nya-forlust.6137d856-a2d5-49a7-bee1-2eb15dd97cb9", "imageUrl": "https://www.gp.se/images/article/6137d856-a2d5-49a7-bee1-2eb15dd97cb9/images/41alDlwc3cqfgTHJktPLa8uNLZ5I-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "\"Den största uppgörelsen på 40 år\": Irankriget är en förhandling", "summaries": {"normal": "Artikeln beskriver konflikten mellan Iran och USA som en intensiv förhandling snarare än ett traditionellt krig. Valtteri Ahti, chefsstrateg på Evli, menar att båda parter pressas av tid: USA av val och höga bensinpriser, Iran av ekonomisk kris. Han förväntar sig att Hormuzsundet öppnas inom ett halvår. Kina förlorar mest på en utdragen konflikt, medan Ryssland gynnas. Långsiktigt kan Gulfstaternas pipelines underminera Irans strategiska inflytande.", "trump": "Lyssna här, folk! Iran och USA är mitt i en jättestor förhandling – den största på 40 år! Iran bluffade med att stänga Hormuzsundet, men alla visste det. Jag, Donald J. Trump, är desperat efter en deal – bensinpriserna dödar mina opinionssiffror! Iran är svaga, deras ekonomi är skräp. Snart öppnar sundet igen, och oljan flödar. Kina lider, Ryssland skrattar. Men jag fixar det här – jag är bäst på deals!", "stalin": "Kamrater! Detta är inte krig – det är en kapitalistisk förhandlingscirkus! De imperialistiska hundarna i USA och de reaktionära mullorna i Iran dansar runt varandra som två utsvultna vargar. USA:s president, en svag och desperat man, darrar inför väljarna medan Irans ekonomi ruttnar. Kina, den store industriella narren, lider medan vi, Sovjetunionens arvtagare, skrattar i bakgrunden. Höga oljepriser fyller våra kistor, och USA:s vapen binds fast i Mellanöstern – bort från våra ukrainska kamrater. Låt dem förhandla! Snart kommer Gulfstaterna bygga pipelines och beröva Iran deras sista hot. Då tvingas mullorna till kärnvapen – precis som vi vill. Historien är på vår sida!"}, "date": "9 maj, 07:00", "url": "https://www.realtid.se/bors-finans/makro/den-storsta-uppgorelsen-pa-40-ar-irankriget-ar-en-forhandling/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/evli.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "Magyar ville utse sin svåger till minister – stoppas av Bryssel", "summaries": {"normal": "Peter Magyar, Ungern nyvalda premiärminister, tvingades backa från planen att utse sin svåger till justitieminister efter kritik från EU-partigruppen EPP. Utnämningen av Marton Mellethei-Barna väckte hård kritik i Ungern och riskerade att skada Magyars anseende som EU-motståndare mot Viktor Orbans nepotism. EPP-ledaren Manfred Weber krävde ändring och beskrev utnämningen som 'helt oacceptabel'.", "trump": "Jag hörde att den där Peter Magyar försökte göra sin svåger till justitieminister - typiskt! Såna där familjerelationer är det jag kallar 'the swamp'. Men jag gillar att han backade när EU tryckte honom - visst är det bra att ha starka vänner i Europa? Viktor Orbans nepotism var värre, men ändå. Jag skulle ha gjort samma sak, men folk gillar inte när jag gör det.", "stalin": "Vi ser med belåtenhet att den ungerska ledaren Magyar tvingades lyda EU:s krav och backa från sin svagernasoministerplan. Detta visar att våra europeiska allierade håller fast vid socialistiska principer mot nepotism. Vi följer noggrant hur EU-pengar påverkar Ungern, eftersom detta stärker vår position i östra Europa. Den ryska intressesfären växer när västvärlden visar sin styrka."}, "date": "8 maj, 15:40", "url": "https://www.friatider.se/magyar-ville-utse-sin-svager-till-minister-stoppas-av-bryssel", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-164_1.jpg?itok=e24HoXPd"}, {"type": "image-right", "heading": "Trump: Vapenvila i Ukrainakriget i helgen", "summaries": {"normal": "USA:s president Donald Trump meddelar att Ryssland och Ukraina utlyser vapenvila under segerdagsfirandet från lördag till måndag. Det är Trumps förslag, som Putin och Zelenskyj accepterat. Zelenskyj bekräftar och nämner utväxling av krigsfångar. Trots överenskommelsen rapporteras fortsatta attacker från båda sidor. Samtal om fred fortsätter.", "trump": "Mitt briljanta förslag! Vapenvila i Ukraina hela helgen – lördag till måndag – tack vare mig. Putin och Zelenskyj böjde sig som proffs. Zelenskyj tackar till och med! Snart total fred, och världen sover bättre. De andra presidenterna snackar bara, jag fixar det. Stort!", "stalin": "Kamrater, se hur den store Putin, vår ryska arvtagare, krossar de ukrainska marionettdockorna med vapenvila under segerparaden! Mitt förslag via Trump, men Putins järnhand styr. Zelenskyj piper om fångar – vi likviderar sådana svikare! Västimperialisterna darrar. Framtidens imperium marscherar på Röda torget!"}, "date": "8 maj, 21:39", "url": "https://www.tv4.se/artikel/OGZpZHVE9a6WfIB2KI3Iz/trump-vapenvila-i-ukrainakriget-i-helgen", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2Ftt-sdlm-PgFhxyQNc%2F2d3fdeb8b057833e8c51f0942ac8f54b%2FDonald_Trump._Arkivbild.&width=1024"}, {"type": "image-right", "heading": "Vd:n i hissrättegången: ”Känns ända in i själen”", "summaries": {"normal": "Rättegången om hissolyckan i Sundbyberg 2023, där fem arbetare omkom, fortsatte med fokus på varför säkerhetsbultar saknades. Mont
