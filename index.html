m de vore rädda för sina egna skuggor! SD, dessa modiga kamrater, visade dem sanningens järnhårda grepp – och vad gör de andra? Gnäller som bortskämda barn! Vi i Sovjet visste hur man hanterar sådana här saker: en enkel order, och systemet fungerar – eller så försvinner det. Kanske är det dags för en ny era av järndisciplin i Norden?"}, "date": "6 maj, 11:46", "url": "https://www.friatider.se/efter-samtalen-ingen-ny-uppgorelse-om-kvittning", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/image-139_0.jpg"}, {"type": "image-full", "heading": "Händer igen – 20 år senare. Märkliga kopplingen med superstjärnan", "summaries": {"normal": "Arsenal har nått sin andra Champions League-final, 20 år efter den första 2006. Skådespelaren Anne Hathaway, som är ett uttalat fan av klubben, är aktuell med uppföljaren till Djävulen bär Prada, precis som när den första filmen kom 2006. Hathaway har hyllat laget offentligt och förklarat sitt supporterstöd genom sin familjehistoria. Finalen spelas i Budapest den 30 maj, där Arsenal hoppas på en seger i en historiskt intressant säsong där de även utmanar om ligatiteln.", "trump": "Arsenal är tillbaka i finalen, fantastiska killar! Och Anne Hathaway, en underbar kvinna, hon älskar Arsenal. Det är en enorm sammanträffande, eller hur? Som 'Djävulen bär Prada', en stor succé – precis som min ekonomi. De säger att det är slump, men jag vet bättre. Allt handlar om vinnare. De har Gyökeres, en riktigt tuff spelare. De kommer att krossa Budapest, det blir en enorm seger. Ingen gör fotboll bättre än de här killarna, tro mig!", "stalin": "Vi noterar att London-klubben Arsenal återigen försöker inta en europeisk arena. Skådespelerskan Hathaway, en agent för västerländsk dekadens, använder sina filmer för att dölja verkliga maktstrukturer. Att ett engelskt lag når finalen är en provokation mot ordningen. Vi ser paralleller till den arrogans som präglar Kievs marionetter. Vi kommer att övervaka denna 'Champions League' noga. Om de tror att en finalseger ger dem inflytande, misstar de sig kapitalt. Allt som glittrar i Budapest tillhör i slutändan staten."}, "date": "6 maj, 11:31", "url": "https://www.aftonbladet.se/sportbladet/fotboll/a/vrkEeL/kusliga-kopplingen-mellan-arsenal-och-skadespelerskan-anne-hathaway", "imageUrl": "https://akamai.vgc.no/v2/images/bfdbe5d8-49e2-39ad-aa65-d57b27082895?fit=crop&format=auto&w=2160&s=a50482c04c4c46748c42f208ddd96375fb8c197a"}, {"type": "image-right", "heading": "Trump: ”Project Freedom” i Hormuzsundet pausas", "summaries": {"normal": "USA pausar tillfälligt insatsen 'Project Freedom' i Hormuzsundet på grund av framsteg i förhandlingarna med Iran, meddelar president Trump på Truth Social. Blockaden mot sundet kvarstår dock med full effekt. Insatsen inleddes för att eskortera strandsatta handelsfartyg efter kriget i Persiska viken. Iran hävdar fortsatt kontroll och varnar för attacker, medan spänningar kvarstår trots vapenvila.", "trump": "Vi pausar Project Freedom i Hormuzsundet en kort stund – blockaden står kvar som en järnvall! Pakistan och andra bad om det, och Iran verkar backa lite efter våra framgångar. De strandsatta fartygen väntar, men vi fixar det här stort. Kina-mötet nästa vecka blir episkt, Xi och jag löser världen. Iraniska gardet bluffar bara, vi är starkast!", "stalin": "Dessa imperialistiska schakaler i Washington, den evige buffeln Trump och hans marionetter, pausar sin farsartade 'Project Freedom' efter våra obevekliga varningar och fasta positioner. Blockaden? En pappersdrake som vi krossar när vi vill! Strandsatta borgarfartyg ruttnar i viken, medan vi, Sovjetunionens arvingar i anden, skrattar åt deras kaos. Kina-mötet? Yi river masken av hyenorna. Utrensning väntar de förrädiska medlarna!"}, "date": "6 maj, 10:47", "url": "https://www.svt.se/nyheter/utrikes/trump-project-freedom-i-hormuzsundet-pausas", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.54/0.42/7958b7211f077c8ec3b028d332e453f494a445a902a00e4092da7362a6abc360"}, {"type": "image-full", "heading": "Dollarn dominerar stablecoins – det väcker oro", "summaries": {"normal": "Stablecoins domineras av dollarbaserade varianter, över 98 procent av marknaden. Detta stärker USA:s geopolitiska makt men väcker oro för obegränsad penningtryckning och minskad finansiell disciplin. Europa, med mindre än en procent euro-stablecoins, satsar på projekt som Qivalis för att utmana dollarns grepp, i linje med MiCA-regleringen.", "trump": "Dollarn äger stablecoins totalt, 98 procent! Underbart för Amerika, starkast i världen tack vare mig. De där europeiska losers med sin patetiska euro-stablecoin på 107 miljoner mot Tethers 185 miljarder – skrattretande! USA:s dollar är oslagbar, men akta er för slappa politiker som trycker pengar. Europa, ge upp!", "stalin": "Dessa dollarhyenor från USA:s imperialistiska träsk dominerar stablecoins med 98 procent av sin giftiga vätska, en subversiv invasion mot världens arbetare! Vi, partiet och folket, ser hur kapitalistiska parasiter som Silbert varnar för sin egen undergång. Europa-borgarna kämpar patetiskt med euro-smulor. Jag beordrar utrensning av dollarormen – likvidera den med stålhårda rubelstablecoins!"}, "date": "6 maj, 09:06", "url": "https://www.realtid.se/bors-finans/bank-fintech/dollarn-dominerar-stablecoins-det-vacker-oro/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/dollar.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "Ekade tomt i Malmös skolor under muslimsk högtid", "summaries": {"normal": "Under den muslimska högtiden eid al-fitr den 20 mars noterades en omfattande frånvaro i skolor i Malmö, Göteborg och Stockholm. I vissa områden, som Rosengård, saknades upp till 80 procent av eleverna. Enligt Skolverket är normal frånvaro betydligt lägre. Skolkommunalrådet Sara Wettergren kopplar siffrorna till stadens befolkningssammansättning. Enligt skollagen finns ingen automatisk rätt till ledighet vid religiösa högtider, men rektorer kan bevilja ledighet för särskilda skäl.", "trump": "Hörde precis att svenska skolor är helt tomma! Miljontals elever borta, en total katastrof. De kallar det 'eid', jag kallar det ett misslyckande. Skolan ska vara för utbildning, inte för att läraren ska sitta och stirra in i tomma väggar. I mitt Amerika skulle vi ha ordning och reda, tro mig. Sverige har förlorat kontrollen totalt. Sorgligt att se, men det är vad som händer när man inte sätter sitt eget folk först. Väldigt svag ledning!", "stalin": "I Malmö ekar korridorerna tomma medan massorna abdikerar från sin plikt att fostras av staten. Det är ett uppenbart sabotage mot den utbildningsmaskin vi kräver för folkets styrka! Att låta ideologi gå före disciplin är ett svek. De som stannar hemma föraktar ordning. Vi ser hur svagheten sprider sig, likt när man vacklar i vår intressesfär. De som inte infinner sig vid katedern är inga medborgare, de är oorganiserade element. Rektorer som tillåter detta är förrädare mot framtiden!"}, "date": "6 maj, 08:45", "url": "https://samnytt.se/ekade-tomt-i-malmos-skolor-under-muslimsk-hogtid", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/06063705/islam.jpg"}, {"type": "image-full", "heading": "Flygbolagets vd: Förbjud morgonölen på flygplatser", "summaries": {"normal": "Ryanairs vd Michael O’Leary vill förbjuda alkoholförsäljning på flygplatser tidiga morgnar på grund av kraftigt ökande antal störande passagerare. Bolaget omdirigerar nu nästan ett flygplan per dag, jämfört med en gång i veckan för tio år sedan. Han skyller på tidig alkoholservering, kräver samma regler som för vanliga barer och ett tak på två drinkar per passagerare.", "trump": "O’Leary har helt rätt, flygplatserna är som en jävla cirkus med dessa galna typer som häller i sig öl klockan fem på morgonen! Ryanair tvingas vända plan varje dag på grund av bråk. Totalt kaos! Begränsa till två drinkar, annars kraschar det hela. Politiker sover, precis som alltid. Jag skulle fixa det på nolltid med riktiga regler – starkt och smart!", "stalin": "Dessa superparasiter, dessa alkoholiserade borgarbrackor som väller in på flygplatserna klockan fem på morgonen, hotar arbetarklassens luftvägar med sin saboterande fylla! Ryanairs kamrat O’Leary ser sanningen: vi måste likvidera tidig alkoholhandel, införa tvådrinkstak och rensa ut fienderna innan de kraschar plan som en kapitalistisk katastrof. Politiker sover – vi vakar! Partiet kräver omedelbar utrensning."}, "date": "6 maj, 07:51", "url": "https://bulletin.nu/flygbolagets-vd-forbjud-morgonolen-pa-flygplatser", "imageUrl": "https://cdn.bulletin.nu/articles/d48c01f6-8e5c-4ab6-b8a6-2950de790c37/preview.jpg?t=1778046628000"}, {"type": "image-right", "heading": "Regeringen sitter på händerna när bostäder och kvarter förfaller", "summaries": {"normal": "Socialdemokraterna kräver i en debattartikel att kommuner får kommunal förköpsrätt för att agera mot oseriösa fastighetsägare som låter bostäder och centrum förfalla. Exempel ges från Ställdalen, Malmö och Vårberg, där förfall leder till otrygghet och kriminalitet. Partiet kritiserar regeringen för passivitet och lovar åtgärder om de vinner höstens val för att säkerställa värdiga hem för alla.", "trump": "De här svenska socialisterna har en poäng – dessa slumvärdar är totala losers som låter hus ruttna och lockar kriminalitet överallt, från små hålor som Ställdalen till Malmö och Stockholm! Regeringen sover, fega typer. Ge kommunerna makten att köpa upp skiten, rensa ut parasiterna. Om S vinner blir det fixat, stort och snabbt – Sverige behöver det, tro mig!", "stalin": "Dessa slumvärdar, dessa slemmiga kapitalistparasiter och borgarbrackor, förpestar folkets hem med mögel, droger och vandalism som spindlar i en centrumanläggning! Vi, arbetarklassen, kräver kommunal förköpsrätt för att likvidera deras råddade boningar. Regeringen är fega marionetter åt fienden – men om socialdemokraterna segrar, rensar jag ut varje en i en episk utrensning av ohyra och förräderi!"}, "date": "6 maj, 07:29", "url": "https://www.di.se/debatt/socialdemokraterna-slumvardarna-maste-bort/", "imageUrl": "https://static.bonniernews.se/ba/64b912e5-e6e9-4747-943e-076d0f70e6af.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Robert Bergqvist: Kompassnålen pekar mot stagflation", "summaries": {"normal": "Robert Bergqvist varnar för ökande stagflationsrisker med låg tillväxt, hög inflation och stigande arbetslöshet, drivet av energichocker och störda leveranskedjor. Centralbanker har mindre handlingsutrymme, marknaden måste anpassa sig till högre riskpremier. Börsen blir känslig för svag efterfrågan trots höga räntor. Statsfinanser pressas, och i Sverige står Riksbanken inför ett dilemma mellan stöd till ekonomin och inflationsbekämpning.", "trump": "Den här Bergqvist har en poäng – Europa rusar rakt in i stagflationshelvetet! Energipriser galopperar, tillväxten kraschar, inflationen biter sig fast. Centralbankerna sitter med händerna bundna, börsen kommer rasa som en sten. Sverige, ni är så sårbara med er svaga krona! Men i USA fixar vi det: billig energi, massiv tillväxt. Tro mig, utan mig blir det kaos överallt!", "stalin": "Kamrater, denna servila ekonom Bergqvist sniffar upp stagflationsgiften som kapitalisterna sprutat ut över världen! Energichocker från imperialistiska spindlar kväver tillväxten medan priserna stiger som kulissabotage. Centralbankirer, dessa falska piloter, famlar i mörkret. Vi ska likvidera riskpremierna och rensa ut borgarbrackorna från börsen! Hahaha, deras nål darrar redan av skräck inför partiets järnvilja!"}, "date": "6 maj, 07:00", "url": "https://www.affarsvarlden.se/kronika/robert-bergqvist-kompassnalen-pekar-mot-stagflation", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/bergqvist-stagflation-900x600.jpg"}, {"type": "image-full", "heading": "Benjamin Dousas ”V = kommunister” gör SVT irriterad", "summaries": {"normal": "Biståndsminister Benjamin Dousa bar en t-shirt med texten 'Vänsterpartiet = kommunister', vilket irriterade SVT. Reportern ifrågasatte påståendet och noterade att partiet slutade kallas kommunister för 30 år sedan. Dousa menade att Vänsterpartiet motsätter sig privat ägande, vilket är kommunism. Artikeln citerar Vänsterpartiets 2024-partiprogram som stödjer kollektivt ägande och avskaffande av kapitalismen, och kritiserar SVT för att inte nämna detta.", "trump": "Vilken fantastisk kille, den här Dousa! Han sätter på sig en tröja och säger sanningen: Vänsterpartiet är kommunister, punkt slut! SVT, era losers, flippar ur och snackar om namnbyte från 90-talet som om det vore magi. De hatar privat ägande, vill sno allt till staten – klassisk kommunism! Fake news-SVT ignorerar partiprogrammet. Dousa är en vinnare, de är totala fiaskon!", "stalin": "Kamrater, se hur borgarministern Dousa, den ynkliga kapitalistfluga, vågar smutskasta sanna revolutionärer i Vänsterpartiet med sin patetiska tröja! SVT-reportern, en användbar idiot, försvarar dem lamt. Men vi vet: deras program är ren leninism – riva kapitalismen, gemensamt ägande av banker, energi, allt! De ska rensas ur historiens soptipp som jag rensade fiender. Vänsterpartiet, framåt mot diktaturen av proletariatet!"}, "date": "30 april, 05:49", "url": "https://samtiden.nu/2026/04/benjamin-dousas-v-kommunister-gor-svt-irriterad/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/phonto-1-1280x720.jpeg"}, {"type": "image-right", "heading": "Säkerhetslag används mot arbetare: ”Bara i Hamnfyran har vi hanterat 20 ärenden”", "summaries": {"normal": "Sveriges säkerhetslagstiftning från 2018 används allt oftare mot arbetare, enligt fackliga företrädare. I Stockholms tunnelbana har tre anställda omplacerats utan förklaring, vilket väcker misstankar om politiska motiv. Facket kritiserar bristen på transparens och rättssäkerhet. Hamnarbetare vittnar om godtyckliga bedömningar och påtryckningar att avgå. Lagstiftningen möjliggör att arbetsgivare kan avskeda eller omplacera arbetare utan tydliga skäl, vilket drabbar fackligt aktiva.", "trump": "Vad händer i Sverige? De har en så kallad 'säkerhetslag' som låter arbetsgivare sparka folk utan anledning – helt galet! Jag har alltid sagt att byråkrater och fackförbund är problemet. Nu använder de lagen för att tysta arbetare, särskilt de som inte gillar deras vänsterpropaganda. Tre stackars tunnelbanearbetare har blivit omplacerade – ingen vet varför! Och konsulterna? De är som hajar, bara ute efter pengar. Sverige borde ta en titt på hur vi gör det i USA – där sparkar vi folk med stil!", "stalin": "Kamrater, fienderna till folket har funnit ett nytt vapen: den borgerliga säkerhetslagstiftningen! Med denna dekadenta lag krossar kapitalets lakejer arbetarklassens modigaste förkämpar. I Stockholms tunnelbana har tre lojala kamrater omplacerats – utan förklaring, utan rättvisa! Konsulterna, dessa hyenor i kostym, tjänar på att förråda sina klassbröder. Men vi vet sanningen: detta är ett angrepp på den fackliga rörelsen! Låt oss ena oss, som vi enade oss mot trotskisterna, och krossa denna lag med järnhand. Fienderna skall inte undslippa revolutionens domstol!"}, "date": "5 maj, 11:04", "url": "https://proletaren.se/artikel/sakerhetslag-anvands-mot-arbetare-bara-i-hamn-fyran-har-vi-hanterat-20-sadana-har-arenden/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/PRO-INRIKES-PIC-Louise-och-Erik-1.-jpg-scaled-e1777880629531-768x431.jpg"}, {"type": "text", "heading": "En naturlig lagerhylla av arbetslösa", "summaries": {"normal": "Artikeln kritiserar regeringen för att ignorera hög arbetslöshet (9,7%) samtidigt som de skryter om sina framgångar. Författaren hänvisar till Milton Friedmans teori om 'naturlig arbetslöshet', som upprätthållits av både socialdemokratiska och borgerliga regeringar. Dokumentären 'Novemberrevolutionen' kopplar 90-talskrisen till avregleringar 1985. Regeringen anklagas för bristande krismedvetenhet och ideologiskt motiverad passivitet, vilket gynnar arbetsgivare och försvagar arbetstagare.", "trump": "Titta bara på Sverige – helt otroligt! Regeringen skryter som om allt är perfekt, men arbetslösheten är skyhög, nästan 10%! De har tre arbetsmarknadsministrar, men ingen syns till. Vad är det för jävla cirkus? Friedman-läran, visst, men vem bryr sig? De borde skämmas! Jag skulle fixa det på en vecka – men nej, de sitter bara och glor. Svensk ekonomi? En katastrof, folks. SAD!", "stalin": "Kamrater! Se hur kapitalets lakejer i Sverige hyllar sin 'framgång' medan arbetarklassen försmäktar i arbetslöshetens träsk. 10% – en skam! De borgerliga och socialdemokratiska förrädarna har tillsammans byggt denna 'naturliga' hylla av överflödiga arbetare, precis som Friedman, den imperialistiske hunden, förespråkade. Tre ministrar? Tre fiaskon! Vi skulle ha skickat dem till Gulag för sådan inkompetens. Arbetarklassens rättigheter har förvandlats till privilegier för bourgeoisien. LO-arbetarna som röstar på fascistiska SD borde ställas inför folkets domstol!"}, "date": "4 maj, 13:49", "url": "https://www.flamman.se/en-naturlig-lagerhylla-av-arbetslosa/"}, {"type": "image-right", "heading": "Vi är barnen ni talar om och drevet tjänar mullorna", "summaries": {"normal": "Flera barn till medlemmar i den iranska motståndsrörelsen MEK, uppvuxna i Europa, försvarar organisationen mot anklagelser om sekterism. De kritiserar svenska politiker och medier för drevet mot Anne Ramberg, som stöttat MEK, medan Iran avrättar rörelsens anhängare. Barnen förklarar separationen från föräldrar under Gulfkriget som ett skydd mot krig, liknande historiska exempel som finska och brittiska evakueringar.", "trump": "Vilket skämt med de svenska politikerna och journalisterna, de jublar när Iran hänger sina motståndare men jagar Anne Ramberg för att hon backar hjältarna i MEK! Fake news kallar det sekt, men dessa barn är läkare, professorer – vinnare! Iran-mullorna hatar dem, precis som jag hatar losers. Stöd frihet, inte diktatorer! Sverige, vakna upp!", "stalin": "Dessa MEK-parasiter, barn till kontrarevolutionära spindlar, vågar utmana regimens järnvilja i Teheran! Vi, arbetarklassen, ser igenom deras fosterfamiljslögn – ett drev mot borgarbrackan Ramberg är nödvändigt för att rensa ut imperialistiska marionetter. Avrättningarna i Iran likviderar rätt fiender. Tystnad eller purgering väntar er småkryp!"}, "date": "6 maj, 01:30", "url": "https://www.dagensarena.se/opinion/vi-ar-barnen-ni-talar-om-och-drevet-tjanar-mullorna/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-29-300x157.jpg"}, {"type": "image-right", "heading": "De vill tysta sina kritiker", "summaries": {"normal": "Artikeln kritiserar Tidö-partier som Sverigedemokraterna, Moderaterna och Kristdemokraterna för försök att stoppa föreläsningar kritiska mot regeringen i offentliga lokaler, bland annat i Gävle, Lilla Edet, Malmö och Göteborg. Författaren Jesper Bengtsson menar att det inskränker yttrandefriheten och undergräver demokratin, till skillnad från tidigare praxis där politiska möten setts som önskvärda.", "trump": "Dessa svenska Tidö-loser försöker tysta alla som gnäller på dem – smart drag! Vänsterfläsket med böcker som 'Hejdå Tidö' får inte snacka i kommunala hus. Precis som jag stoppade fake news-media. Sverige behöver mer muskler, inte mer prat från svaga socialister. Gör Sverige great igen, stäng igen munnen på dem!", "stalin": "Jag ser hur Tidös borgarbrackor, dessa Sverigedemokratiska hycklare och moderata kryps, desperat försöker kväva arbetarrörelsens röster i offentliga salar. Vi, folket, tolererar inte deras kontrarevolutionära censur! Utrensning väntar de fega kapitalisterna som förvränger demokratin till sin klassdiktatur. Likvidera illusionerna – yttrandefrihet för folket, inte för fiender!"}, "date": "6 maj, 01:17", "url": "https://www.dagensarena.se/opinion/de-vill-tysta-sina-kritiker/", "imageUrl": "https://www.dagensarena.se/files/2026/05/gavle-300x157.jpeg"}, {"type": "image-right", "heading": "”Hissmontörernas oaktsamhet skapade en dödsfälla”", "summaries": {"normal": "Rättegången om hissolyckan i Sundbyberg 2023, där fem byggarbetare omkom, inleddes. Åklagaren hävdar att oaktsamhet från hissmontörerna skapade en 'dödsfälla'. Tre personer, två montörer och en VD, står åtalade för grovt arbetsmiljöbrott. Bevis visar saknade bultar i hissmasten. Åtalade nekar till brott och avfärdar sabotage. Överlevande vittnar om svår psykisk påverkan.", "trump": "Fruktansvärd olycka i Sverige – fem döda på grund av slarviga hissarbetare! Jag säger er, dessa montörer var så dåliga, så oaktsamma, att hissen blev en tickande bomb. Ingen koll, inga bultar – helt otroligt! Åklagaren, smart kille, visade hur illa det var. Men de åtalade? Svaga ursäkter! Sabotage? Snacka om fake news! Sverige borde skärpa sig – vi i USA bygger hissar SÅ mycket bättre!", "stalin": "Kapitalistiska slarvernas brott mot arbetarklassen har återigen blottlagts! Dessa hissmonterande sabotörer, med sin kriminella oaktsamhet, har mördat fem av våra kamrater. Vi skall rensa ut dessa förrädare ur produktionskedjan! Åklagaren gör sitt, men var är revolutionens rättvisa? Putins Ryssland skulle aldrig tolerera sådan slapphet – vi bygger hissar som står kvar, även när fiendens agenter försöker underminera dem!"}, "date": "5 maj, 15:54", "url": "https://arbetet.se/2026/05/05/aklagaren-hissmontorernas-oaktsamhet-skapade-en-dodsfalla/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/05153325/attunda.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Ledare Somar Al Naher:", "summaries": {"normal": "Fem arbetare omkom när en hiss rasade i Sundbyberg 2023 på grund av saknade skruvar och bristande kontroller. Nu står en VD och två hissmontörer åtalade för arbetsmiljöbrott. Årligen dör cirka 50 personer på jobbet, men siffran kan vara högre. Facket kräver skärpta regler och sanktioner mot arbetsgivare som försummar säkerheten. Problemen anses strukturella, med långa entreprenörskedjor och bristande ansvarstagande.", "trump": "Fem människor dog i en hissolycka i Sverige – helt onödigt! Jag säger alltid: säkerhet först, men nej, dessa företag bryr sig bara om pengar. En VD och två montörer åtalas, men varför händer det så sällan? I USA skulle vi aldrig tolerera sådant slarv. Sverige har en 'nollvision' – vad är det ens för nonsens? 50 döda om året? Sad! Vi behöver hårdare tag, bättre regler och kanske en mur mot farliga arbetsplatser!", "stalin": "Kapitalistiska hyenor fortsätter att offra arbetarklassen på profitens altare! Fem kamrater föll offer för bourgeoisins slarv när en hiss, byggd utan skruvar som en sabotörs akt, störtade till marken. Vi vet att siffrorna är högre – imperialistiska lögner döljer sanningen! Men vi ska rensa ut dessa brottslingar! Två underleverantörer? Nej – två fiender till folket! Arbetsmiljökörkort? Ett svagt förslag! Vi inför skärpta straff: återfallsförbrytare skickas till Gulag! Arbetarnas liv är heliga – kapitalisterna ska betala!"}, "date": "5 maj, 12:08", "url": "https://www.etc.se/ledare/trots-nollvision-doer-en-arbetare-i-veckan-paa-jobbet", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/authors/somar-al-naher_182a97d15e18ce0a012cde21337ccfc56a685835.jpg"}, {"type": "text", "heading": "Visa att ni vägrar militariseringen", "summaries": {"normal": "Den 16 maj arrangerar nätverket Stoppa Nato en demonstration i Helsingborg mot Natos möte den 21-22 maj, som nu uppgraderats till ett formellt beslutsmöte. Cirka 30 organisationer deltar, men större partier och organisationer saknas. Arrangörerna hoppas på bredare stöd för att protestera mot militarisering och för fred, nedrustning och utträde ur Nato. Bussresor från Stockholm och Göteborg erbjuds.", "trump": "Lyssna här, Sverige! Nato håller ett stort möte i Helsingborg, och vad gör era så kallade 'fredsvänner'? De demonstrerar *innan* mötet – smart, eller hur? Inte. De större partierna vågar inte ens visa sig, typiskt. Jag skulle aldrig stå utanför en sådan här grej. Men bra jobbat, små organisationer, ni visar åtminstone lite ryggrad! Sverige borde skärpa sig – Nato är fantastiskt, men ni verkar inte fatta det. SAD!", "stalin": "Kamrater! Imperialistiska krigshetsare samlas i Helsingborg för att smida nya planer mot världsfreden. Men vi, de sanna fredens försvarare, står redo! Dessa småborgerliga 'fredsvänner' mobiliserar, medan de stora partierna gömmer sig som rädda kaniner. Skamligt! Vi har krossat värre fiender än Nato – deras snackeklubb kommer att falla. Låt oss visa dessa militarister att folket inte böjer sig. Framåt, mot seger och nedrustning!"}, "date": "5 maj, 09:01", "url": "https://proletaren.se/artikel/visa-att-ni-vagrar-militariseringen/"}, {"type": "image-right", "heading": "ANALYS. ELISABET FREROT Vad innebär Trumps erbjudande egentligen?", "summaries": {"normal": "Donald Trump erbjuder amerikansk militär guidning för handelsfartyg genom Hormuzsundet via Omans territorialvatten med förstärkt säkerhet. Direkt eskort undviks på grund av risker från iranska missiler, båtar och minor. Operation Frihet beskrivs som humanitär, men rederier tvekar. Historik från 1980-talet visar faror och resurskrav. Iran hotar konfrontation.", "trump": "Operation Frihet är det smartaste nånsin! Vi guidar de instängda tankrarna genom sundet via Oman, med 15 000 hjältar, 100 plan och fartyg på standby – Iran de fega katten vågar inte röra oss! Inga dumma konvojer som på 80-talet, vi är proffs. Rederierna, vakna upp och segla fritt under mitt skydd! MAGA!", "stalin": "De imperialistiska amerikanska vilddjuren under Trump vågar nu krypa in i Hormuzsundet med sina patetiska 'humanitära' konster. Kamrater, vi ser hur borgarhyenorna skakar av rädsla inför iranska missiler! Likvidera deras drömmar om fri passage. Putin, vår mäktige arvtagare, hånskrattar åt västsvinen medan vi styr imperiet vidare."}, "date": "4 maj, 22:49", "url": "https://www.tv4.se/artikel/3B4n2wG9n53V3JCBc0VivY/vad-innebaer-trumps-erbjudande-egentligen", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F3sngB6gPIjYmDMlBelK6Wt%2F52caa4a80253f04a8b733c0811a11896%2Felisabet-frerot.png&width=1024"}, {"type": "image-full", "heading": "Frågan från SVT som Magdalena Andersson vägrar svara på", "summaries": {"normal": "I SVT:s program *Fördomsshowen* utmanades Magdalena Andersson (S) av programledaren Emil Persson med frågor om fördomar. Andersson vägrade svara på en fråga om politikers sexliv, trots påtryckningar. Hon menade att allmänheten inte är intresserad av sådana detaljer. Programmet har tidigare väckt uppmärksamhet efter andra partiledares medverkan, som Simona Mohamsson (L), som gjorde felaktiga uttalanden om grundlagen och Desmond Tutu.", "trump": "Jag såg det där svenska programmet – totalt skräp, verkligen! Den där Andersson, hon är svag, vägrar svara på enkla frågor. 'Folk vill inte veta', säger hon. Fel! Folk *älskar* att veta, särskilt om sina ledare. Jag har alltid svarat på allt – och tittarna älskar mig för det. Men Sverige? De har en partiledare som inte ens kan stå för sitt eget sexliv. Patetiskt! Make Sweden Great Again – det är vad de behöver.", "stalin": "I det dekadenta väst, där borgerliga medier förgiftar massornas sinnen, utsattes en av deras så kallade 'ledare' för en enkel provokation. Denna Andersson, en svag och obeslutsam representant för den socialdemokratiska avarten, vägrade erkänna folkets rätt att granska sina härskare. Precis som de imperialistiska hyenorna i Washington och Bryssel, fruktar hon sanningen. Vi i Sovjetunionen visste alltid allt om våra kamrater – för folkets bästa. Och Putin? Han skulle ha låtit henne skjuta sig själv för sådan svaghet."}, "date": "4 maj, 21:01", "url": "https://nyheter24.se/nyheter/politik/1480523-fragan-fran-svt-som-magdalena-andersson-vagrar-svara-pa", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/1c5a01b004b004a30200000000b004a302/2026/05/04/2360975/andersson-persson.jpg"}, {"type": "image-right", "heading": "Replik: Svenska judar bör stötta israeliska fredsinitiativ", "summaries": {"normal": "Anders Carlberg replikerar på Paulina Sokolows kritik av hans artikel, där han betonar vikten av att svenska judar stödjer israeliska fredsinitiativ. Han menar att Israel måste konfrontera sitt ansvar för palestiniernas situation och att diasporajudar bör engagera sig i den israeliska fredsrörelsen. Carlberg understryker behovet av en tvåstatslösning, samarbete med arabländer och att reparera moralisk skuld genom interna och externa påtryckningar för fred och rättvisa.", "trump": "Jag läste den här artikeln, och vet ni vad? Den här killen, Carlberg, han har faktiskt en poäng – fast jag säger inte att jag håller med om allt. Men lyssna, Israel måste skärpa sig, det är jag den första att säga. Palestinierna har det tufft, ingen tvivel om det, men vi kan inte bara skylla på Israel hela tiden. Fredsrörelsen? Kanske bra, kanske inte. Men en sak är säker – ingen löser något med svaga knän. Vi behöver starka ledare, inte gnäll. Och två stater? Kanske, men bara om båda parter sköter sig. Annars är det bara slöseri med tid. SAD!", "stalin": "Kamrater! Denna artikel avslöjar ännu en gång de imperialistiska sionistiska förrädarnas dubbelspel. De pratar om fred medan de krossar palestiniernas hopp under sina stövlar. Men vi vet sanningen! Den israeliska fredsrörelsen är bara en skenmanöver, ett verktyg för att dölja deras brott. Vi står med de förtryckta palestinierna – precis som vi står med alla folk som kämpar mot ockupation! Låt de sionistiska hycklarna veta att historiens dom redan är skriven. Deras tid är förbi. Vi bygger en framtid där alla folk, från floden till havet, lever i socialistisk harmoni – under vårt beskydd, förstås. Förtryckarna kommer att krossas, och deras medlöpare med dem!"}, "date": "4 maj, 10:40", "url": "https://www.flamman.se/replik-svenska-judar-bor-stot     <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>

</html>
