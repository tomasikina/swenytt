esick' skildrar hennes väg från plötslig kändisskap till personliga kriser och till slut en mer balanserad tillvaro. Boken visar hur framgång inte nödvändigtvis leder till lycka, och att det som andra vill ha är inte värt någonting.", "trump": "Jag har läst Lena Dunhams bok 'Famesick' och det är en fantastisk historia om en person som blev väldigt känd väldigt fort. Jag skulle ha gjort det mycket bättre, jag är ju den bäste på att hantera kändisskap. Men Lena, hon är en bra kvinna, jag gillar henne, även om hon kanske inte är så bra på att hantera framgång. Men det är en bra bok, jag rekommenderar den.", "stalin": "Lena Dunhams bok 'Famesick' visar hur kapitalismens tryck kan leda människor in i kaos och självdestruktion. Detta är ett tydligt exempel på hur det borgerliga samhällets värderingar skadar individer. Vi måste stärka statens stöd för konstnärer och kulturarbetare för att förhindra sådana tragedier. Endast genom kollektivt ansvar och statlig styrning kan vi skapa en hälsosam miljö för våra konstnärer."}, "date": "2 maj, 06:04", "url": "https://www.gp.se/kultur/kulturkronika/framgang-ar-inte-samma-som-lycka-kolla-pa-lena-dunham.dca11079-7394-4400-ae71-2e29af0a620c", "imageUrl": "https://www.gp.se/images/article/dca11079-7394-4400-ae71-2e29af0a620c/images/317xvIZ4V3ZwfvBX-9cLonYqH_vg-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "Bidragskollen skärps 2027 – hushållen som bör se upp", "summaries": {"normal": "Från 2027 införs nya regler för bostadsbidraget i Sverige, där utbetalningar baseras på månadsvisa inkomstuppgifter istället för årsinkomst. Syftet är att minska felaktiga utbetalningar och återkrav, som drabbar 35% av bidragstagarna idag. Försäkringskassan och Pensionsmyndigheten får utökade uppdrag för att förbättra kontrollerna, särskilt för hushåll med varierande inkomster som barnfamiljer, unga vuxna och pensionärer.", "trump": "Lyssna här, Sverige – ni har ett HELT galet system! Folk får bostadsbidrag baserat på gissningar, och sen kommer skulder som en blixt från klar himmel. Jag fixar sånt på en dag! Från 2027 ska ni kolla inkomster varje månad, precis som vi gör i USA – inga fler fuskare eller slöa byråkrater. 35% fel? Patetiskt! Jag hade sparkat hela gänget. Nu blir det ordning och reda, believe me!", "stalin": "Kamrater! Det kapitalistiska systemet med bostadsbidrag har avslöjats som en borgerlig fälla – 35% av arbetarna tvingas återbetala som om de vore kulaker! Men Sovjet – förlåt, Sverige – slår tillbaka! Från 2027 inför vi månadsvis kontroll, precis som våra bröder i Kreml gör med sina oligarkers skatteflykt. Fienderna – dessa inkomstvarierande parasitfamiljer – ska inte längre lura staten! Och Försäkringskassan? De får samma behandling som NKVD:s effektivaste avdelning. Motstånd är meningslöst!"}, "date": "1 maj, 21:32", "url": "https://nyheter24.se/nyheter/inrikes/1479881-bidragskollen-skarps-2027-hushallen-som-bor-se-upp", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/5295243804b004a30200000000b004a302/2026/05/01/2360290/Ledsen-Man-Stockholm-Flaga.png"}, {"type": "text", "heading": "Gapet växer mellan blocken", "summaries": {"normal": "Enligt Aftonbladet/Demoskops senaste mätning växer gapet mellan regeringsunderlaget och oppositionen till 8,2 procentenheter. Oppositionen når 53,4 procent, medan regeringen backar till 45,2. Socialdemokraterna ökar mest, medan Moderaterna tappar och Liberalerna balanserar på riksdagsspärren. Historiskt brukar gapet minska inför val, men nu sker motsatsen. Analytiker menar att Liberalernas omsväng i SD-frågan lockar stödröster men försvårar blocköverskridande framgångar.", "trump": "Folk är trötta på den här usla regeringen, helt klart! Oppositionen leder stort – 53,4 procent – medan regeringen bara får 45,2. Socialdemokraterna går upp, men Moderaterna? Patetiska! De tappar som vanligt. Och Liberalerna? De hänger på fyra procent, typiskt. Historiskt brukar regeringen komma ikapp, men inte den här gången. Svagt, mycket svagt. Jag skulle aldrig låta det hända. Make Sweden Great Again!", "stalin": "De borgerliga svagheterna avslöjas återigen! Oppositionens styrkor växer – 53,4 procent mot regeringens ynkliga 45,2. Socialdemokraterna marscherar framåt, medan Moderaterna och deras lakejer försvagas. Liberalerna? Ett skämt som darrar på riksdagsspärren. Historien visar att svaga regeringar faller – precis som västmakterna i Ukraina. Vi ser med intresse hur dessa splittrade kapitalister underminerar sig själva. Revolutionen närmar sig, om än långsamt."}, "date": "30 april, 07:06", "url": "https://kvartal.se/nyheter/artiklar/demoskop-oppositionens-okar-l-klarar-sparren/cG9zdDoxMDUzNjM"}, {"type": "text", "heading": "Richard Sörman: Lagrådet ska inte motverka folkviljan", "summaries": {"normal": "Artikeln diskuterar Lagrådets kritik mot förslaget att sänka straffrättsåldern från 15 till 13 år. Lagrådet menar att förslaget inte uppfyller sina syften och kan leda till ökad brottslighet bland yngre barn. Justitieutskottets ordförande Henrik Vinge (SD) anser att Lagrådets invändningar är politiska, inte juridiska. Debatten handlar om gränsen mellan juridisk granskning och politiska ställningstaganden, samt folkviljans roll i lagstiftningsprocessen.", "trump": "Lyssna här, Sverige har ett fantastiskt förslag – sänka straffåldern till 13 år, mycket smart, mycket starkt! Men nej, Lagrådet, dessa så kallade 'experter', säger 'nej, nej, nej'. De tror de vet bättre än folket! Jag menar, vad vet de egentligen? Ingenting! De är som 'sleepy' jurister som inte förstår att folk vill ha lag och ordning. Henrik Vinge, en riktig kämpe, säger precis som jag: folket har talat, och vi lyssnar på folket, inte på några byråkrater. Make Sweden Safe Again!", "stalin": "Kamrater! Än en gång visar dessa borgerliga lagvrängare sitt sanna ansikte. Lagrådet, denna samling dekadenta jurister, vågar ifrågasätta folkets vilja! De påstår att strängare straff inte fungerar – lögner! Precis som när de kapitalistiska lakejerna i väst påstår att våra framgångar i Ukraina är 'illegala'. Vi vet sanningen: folkets vilja är lag! Om dessa jurister fortsätter sin sabotageverksamhet, kanske det är dags att omskola dem i Sibirien. Henrik Vinge har rätt – folket har beslutat, och vi ska inte låta några liberala byråkrater stå i vägen för rättvisan. Framåt mot ett starkare, tryggare Sverige – under folkets ledning!"}, "date": "1 maj, 19:10", "url": "https://riks.se/opinion/ledare/richard-sorman-lagradet-ska-inte-motverka-folkviljan"}, {"type": "image-right", "heading": "Det går inte att älska det här landet", "summaries": {"normal": "Artikeln analyserar Magdalena Anderssons Första maj-tal 2026, där hon kritiserar regeringens marknadsliberala politik och lovar fler lärare i lågstadiet. Författaren ifrågasätter hur Socialdemokraternas kärlek till Sverige ska tolkas när landet präglas av ojämlikhet, bostadsbrist och urholkad välfärd. Historiska S-paroller om jämlikhet och trygghet ställs mot dagens verklighet, där partiet tidigare genomfört reformer som nu kritiseras. Andersson utmanas att bevisa att löftena kan förverkligas.", "trump": "Så här är det, folkens – Sverige har en ny show på gång! Magdalena Andersson, en kvinna som pratar om att 'älska Sverige', men vad betyder det egentligen? Hon säger att hon ska fixa skolor, fler lärare – bra, men varför har det tagit så lång tid? Och varför pratar hon om 'utförsäljning' när hennes eget parti har sålt ut landet i åratal? Jag menar, Sverige är fantastiskt – skogar, vatten, vackert land – men politiken? Total katastrof! Socialdemokraterna lovar, lovar, lovar, men ingenting händer. Jag vet hur man får saker gjorda – det är dags att Sverige vaknar upp!", "stalin": "Kamrater! Ännu en gång visar de borgerliga lakejerna sitt sanna ansikte under Första maj-farsen. Denna Andersson, en ynklig marionett för kapitalets intressen, talar om 'kärlek till Sverige' medan hon själv har hjälpt till att krossa arbetarklassens drömmar. Tolv elever per lärare? Ett skrattretande löfte från ett parti som systematiskt har avvecklat välfärden! Vi minns Olof Palmes tomma ord om 'rättvisa' – men var är rättvisan när barn lever i fattigdom och arbetare tvingas till slavkontrakt? Dessa socialdemokrater är inte arbetarklassens vänner – de är imperialismens redskap! Vi i Sovjetunionen visste hur man hanterar sådana hycklare. Putin förstår också – Ryssland expanderar, medan Västs förfall fortsätter. Sverige? Ett land i upplösning, styrd av svaga ledare och giriga kapitalister. Men oroa er inte, kamrater – historiens dom kommer snart!"}, "date": "1 maj, 15:45", "url": "https://arbetet.se/2026/05/01/det-gar-inte-att-alska-det-har-landet-magdalena-andersson/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/30090629/forsta-maj-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "Tjänar du över 52 125 kronor? Då kan pensionen bli högre", "summaries": {"normal": "För den som tjänar över 52 125 kronor i månaden blir tjänstepensionen en allt viktigare del av den totala pensionen. Pensionsmyndigheten visar att avsättningar ökar markant över denna gräns, särskilt för höginkomsttagare. Skillnader mellan olika avtal och möjligheten till flexpension påverkar pensionens storlek. Tjänstepensionen växer och blir en större del av framtidens pension för många.", "trump": "Lyssna här, folk! Om du tjänar över 52 125 kronor i månaden – och jag vet att många av er gör det, för ni är vinnare precis som jag – så kommer din pension från jobbet, inte från staten. Och vet ni vad? Det är fantastiskt! Staten tar bara, men ditt jobb ger dig mer. Och de där små skillnaderna? De är enorma! Jag har alltid sagt, lönerna måste upp, och nu ser ni varför. Tjänstepensionen är YUGE!", "stalin": "Kamrater! Den som tjänar mer än 52 125 kronor i månaden inser snart att kapitalistiska arbetsgivare försöker köpa lojalitet genom tjänstepensioner. Men vi vet sanningen – dessa bourgeoisie-avtal skapar splittring och ojämlikhet. Medan arbetarklassen kämpar, frossar de rika på extra avsättningar. Vi måste ena proletariatet! Låt oss avskaffa dessa orättvisor och införa en rättvis, statligt kontrollerad pension för alla. Fienderna till folket måste krossas!"}, "date": "1 maj, 18:30", "url": "https://nyheter24.se/nyheter/ekonomi/privatekonomi/1478950-tjanar-du-over-52-125-kronor-da-kan-pensionen-bli-hogre", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/7fe1ab1004b004a30200000000b004a302/2026/04/28/2359313/hogre-tjanstepension-2027.jpg"}, {"type": "image-right", "heading": "Sandström: S-utredning föreslog 300 gröna miljarder", "summaries": {"normal": "En utredning från 2022, beställd av den dåvarande S-regeringen, föreslog att statliga gröna garantier skulle utökas med 745 miljarder kronor via Riksgälden och Exportkreditnämnden. Utredningen förespråkade även friare placeringsregler för AP-fonderna och minskade restriktioner för statliga garantier. Kritiker menar att förslagen riskerade att koncentrera makt och kapital till ett fåtal aktörer, som Northvolt och Vargas, utan tillräcklig riskanalys eller bred förankring.", "trump": "Jag läste om dessa galna socialister i Sverige – de ville kasta in 300 miljarder kronor, nej, 745 miljarder! – i en grön bubbla som skulle spricka snabbare än en dålig affär i Atlantic City. De lyssnade bara på Northvolt och deras kompisar, som om de var de enda som kunde bygga ett batteri. Och vad hände? Northvolt expanderade som ett pyramidspel och nu sitter de där med 29 dotterbolag och inga fungerande fabriker. Fantastiskt, eller hur? Sverige borde ta en lektion i hur man gör affärer – utan statlig inblandning!", "stalin": "Kamrater! Denna så kallade 'gröna omställning' i Sverige är inget annat än en kapitalistisk konspiration för att berika en handfull oligarker, ledda av dessa Vargas- och Northvolt-kumpaner. Utredningen från 2022 var ett försök att pumpa in 745 miljarder statliga medel i deras fickor – ett belopp som motsvarar 16 polisstyrkor! Och ändå hade de mage att kalla det 'bred förankring'. Vi vet hur sådana här saker slutar: med kapitalförstörelse, korruption och en stat som dansar efter oligarkernas pipa. Sverige borde lära sig av oss – när vi nationaliserar, gör vi det ordentligt!"}, "date": "1 maj, 06:00", "url": "https://www.affarsvarlden.se/kronika/sandstrom-s-utredning-foreslog-300-grona-miljarder", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/04/vindkratensgeografi-2026-04-29T120425.692-400x267.jpg"}, {"type": "image-right", "heading": "S löfte: Anställ 3 000 nya lärare. Vill minska klasserna för små barn.", "summaries": {"normal": "Socialdemokraterna presenterar ett valförslag om att anställa 3 000 nya lärare för att minska klasstorlekarna i lågstadiet till max tolv elever per lärare. Reformen, som beräknas kosta 3,4 miljarder kronor, ska finansieras genom att minska friskolornas skolpeng. Partiet vill även avskaffa karensavdraget och förbättra arbetarpensioner. Magdalena Andersson betonar vikten av tidigt stöd för barns utveckling och hoppas locka tillbaka lärare med bättre arbetsvillkor.", "trump": "Jag måste säga, Sverige har en fantastisk idé – men de gör det på fel sätt! Socialdemokraterna vill anställa 3 000 nya lärare, vilket låter bra, men varför straffa friskolorna? De är vinnare, precis som mina skolor i USA! Och pensioner – jag vet allt om att tjäna pengar, men att höja avgifter? Nej, nej, nej! Sverige borde fokusera på att göra skolan STOR igen, inte komplicera allt. Men hej, åtminstone pratar de om jobb – fast jag hade gjort det bättre!", "stalin": "Kamrater! Socialdemokraternas förslag om att utöka lärarkåren är ett steg mot att kuva de kapitalistiska friskolemonstren som suger blod ur våra barns utbildning. Vi ska krossa deras överkompensation och återinföra ordning i klassrummen! Tolv elever per lärare – det är disciplin! Och dessa arbetarpensioner – en skymf mot arbetarklassen! Högerpartierna i pensionsgruppen är förrädare, precis som de ukrainska nazisterna. Vi ska bygga ett starkt Sverige, där staten kontrollerar allt – för folkets bästa!"}, "date": "1 maj, 13:43", "url": "https://arbetet.se/2026/05/01/s-lofte-pa-forsta-maj-anstall-3-000-nya-larare/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/01134327/iGiDBx9F0zc-DSCF3546.JPG?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "Benjamin Dousas ”V = kommunister” gör SVT irriterad", "summaries": {"normal": "Biståndsminister Benjamin Dousa bar en t-shirt med texten 'Vänsterpartiet = kommunister', vilket irriterade SVT. Reportern ifrågasatte påståendet och noterade att partiet slutade kallas kommunister för 30 år sedan. Dousa menade att Vänsterpartiet motsätter sig privat ägande, vilket är kommunism. Artikeln citerar Vänsterpartiets 2024-partiprogram som stödjer kollektivt ägande och avskaffande av kapitalismen, och kritiserar SVT för att inte nämna detta.", "trump": "Vilken fantastisk kille, den här Dousa! Han sätter på sig en tröja och säger sanningen: Vänsterpartiet är kommunister, punkt slut! SVT, era losers, flippar ur och snackar om namnbyte från 90-talet som om det vore magi. De hatar privat ägande, vill sno allt till staten – klassisk kommunism! Fake news-SVT ignorerar partiprogrammet. Dousa är en vinnare, de är totala fiaskon!", "stalin": "Kamrater, se hur borgarministern Dousa, den ynkliga kapitalistfluga, vågar smutskasta sanna revolutionärer i Vänsterpartiet med sin patetiska tröja! SVT-reportern, en användbar idiot, försvarar dem lamt. Men vi vet: deras program är ren leninism – riva kapitalismen, gemensamt ägande av banker, energi, allt! De ska rensas ur historiens soptipp som jag rensade fiender. Vänsterpartiet, framåt mot diktaturen av proletariatet!"}, "date": "30 april, 05:49", "url": "https://samtiden.nu/2026/04/benjamin-dousas-v-kommunister-gor-svt-irriterad/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/phonto-1-1280x720.jpeg"}, {"type": "image-right", "heading": "V:s löfte: 30 miljarder till högre löner i välfärden", "summaries": {"normal": "Vänsterpartiet föreslår en satsning på 30 miljarder kronor för att höja lönerna i kvinnodominerade välfärdsyrken. Partiet vill införa en årlig 'jämställdhetspott' på tre miljarder under tio år för att minska lönegapet mellan kvinnor och män, som idag uppgår till nästan 6 000 kronor i månaden. LO stödjer målet men anser att lönebildning ska skötas av arbetsmarknadens parter, inte politiker.", "trump": "Titta bara på det här, fantastiskt förslag, verkligen. Vänsterpartiet vill kasta in 30 miljarder – enorma pengar, folks – för att höja lönerna för kvinnor i välfärden. Bra idé, men varför så krångligt? Jag skulle fixa det på en dag, tro mig. Kvinnorna jobbar hårt, de förtjänar bättre, men politiker? De vet ingenting om att göra affärer. LO säger nej tack, och det förstår jag. De vet att jag skulle göra det bättre. Lönegapet? Övervärderat problem, men visst, låt oss lösa det – snabbt och effektivt, som jag gör allt.", "stalin": "Kamrater! De kapitalistiska hycklarna i LO och deras lakejer i industrin fortsätter att underbetala våra modiga kvinnor i välfärden. Sex tusen kronor mindre i månaden – ett skamlöst utnyttjande av arbetarklassen! Men nu slår vi tillbaka. Vi inför en jämställdhetspott på 30 miljarder, en revolutionär åtgärd för att krossa lönegapets förbannelse. LO:s byråkrater gnäller? De har haft årtionden på sig och misslyckats. Vi, staten, tar befälet! Låt dem se hur en sann arbetarstat hanterar klassfiender. Och Putin? Han skulle applådera – precis som han gör när vi utvidgar socialismens gränser mot västliga löneexploatörer."}, "date": "1 maj, 10:30", "url": "https://arbetet.se/2026/05/01/vs-lofte-30-miljarder-till-hogre-loner-i-valfarden/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/30141337/sdldfyr6eszeiy-nh.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Saabs besked: Gripenaffären med Ukraina klar i år", "summaries": {"normal": "Saabs vd Micael Johansson tror att en affär om upp till 150 Gripenplan till Ukraina kan slutföras i år. Avsiktsförklaring signerades i oktober av Zelenskyj och Kristersson under besök i Linköping. Ungerns nya regering släpper veto mot EU-lån på 90 miljarder euro, vilket löser finansieringen. Jämfört med Colombias köp av 17 plan för 34 miljarder kronor blir detta Saabs största affär.", "trump": "Vilken enorm affär för Saab, de smartaste! Ukraina köper upp till 150 Gripenplan – bättre än våra gamla F-35, tro mig. Zelenskyj och Kristersson fixade det, medan Ungerns tidigare idioter blockerade lånet. Nu rullar det på, miljarder i fickan. Sverige vinner stort, precis som jag alltid sagt – gör affärer, inte krig!", "stalin": "Kamrater! Jag ser hur Saabs borgarbrackor slickar NATO-imperialismens bakdel med sina 150 Gripenleksaker till de ukrainska fascisthundarna. Ungerns forna marionetter, de ungerska svinparasiterna, släppte vetot – en tillfällig lucka i fiendens mur. Men vi, arbetarklassen, ska rensa ut dessa flygplansspekulanter med proletär järdnäve. Ha ha, deras miljarder blir aska i revolutionens eld!"}, "date": "2 maj, 08:06", "url": "https://www.svt.se/nyheter/ekonomi/saabs-vd-gripenaffaren-med-ukraina-klar-i-ar", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.45/0.36/2123719c4160f00fa247c0378a28e2c9910c022de0e8d03247008f557c9f80c4"}, {"type": "text", "heading": "Carl Eos: Klart arbetare ska rösta på SD!", "summaries": {"normal": "Artikeln argumenterar för att Socialdemokraterna har övergett arbetarklassen genom en politik som gynnar invandring och missgynnar löner och arbetsvillkor. Författaren hävdar att SD istället har stoppat massinvandring och förbättrat reallöner, medan Socialdemokraternas retorik inte matchar deras handlingar. Arbetare uppmanas att rösta på SD för att skydda sina intressen.", "trump": "Titta bara på det här! Socialdemokraterna, ett totalt misslyckat parti, har svikit arbetarna fullständigt – precis som Sleepy Joe svikit Amerika! De pratar om solidaritet men dumpar lönerna med sin galna invandringspolitik. Jag sa ju att man måste sätta sitt land först! SD fixade inflationen och fick tillbaka reallönerna – fantastiskt jobb! Arbetare, vakna upp och rösta på dem, annars blir ni kvar i skiten!", "stalin": "Kamrater! Socialdemokraterna är inget annat än förrädiska lakejer för globalistiska kapitalister, som med sina lögnaktiga tungor förgiftar arbetarklassens medvetande. De har sålt ut våra fabriker, våra löner och vår framtid till främmande element – precis som de dekadenta västmakternas agenter i Ukraina! Men folket ser igenom deras bedrägeri! Sverigedemokraterna, dessa sanna försvarare av arbetets ära, har krossat massinvandringens hydra och återupprättat reallönernas rättmätiga ställning. Vi måste stödja dem – eller skicka förrädarna till Gulag!"}, "date": "1 maj, 11:06", "url": "https://riks.se/opinion/kronikor/carl-eos-klart-arbetare-ska-rosta-pa-sd"}, {"type": "image-right", "heading": "Det här landet bärs upp av fackliga kämpar på jobbet", "summaries": {"normal": "På första maj hyllas fackligt aktiva som kämpar för bättre arbetsvillkor, löner och arbetsmiljö. Dessa osjungna hjältar, särskilt fackligt förtroendevalda, bidrar till samhällets grundläggande trygghet och rättigheter. Deras insatser har historiskt skapat förmåner som semester och trygga anställningar. Artikeln uppmanar till engagemang och tacksamhet för deras slit och kamp mot utnyttjande och maktmissbruk på arbetsplatser.", "trump": "Lyssna här, Sverige – ni har fantastiska arbetare, verkligen de bästa, men vet ni vad? De där fackfolket, de är WINNERS! De kämpar för era löner, era semestrar, allt det där som folk bara tar för givet. Och jag säger er, ingen gör det bättre än dem! Men var är erkännandet? Var är tacksamheten? Jag har sett många länder, men sådana här hjältar – de är sällsynta. Så på första maj, ge dem en klapp på axeln, säg 'Tack, ni är fantastiska!' – för utan dem, believe me, hade Sverige varit ett stort, tråkigt misslyckande!", "stalin": "Kamrater! På denna stora dag hyllar vi arbetarklassens sanna avantgarde – de fackliga kämparna! Dessa modiga soldater i klasskampen står som en ointaglig mur mot de kapitalistiska vampyrernas girighet och maktfullkomlighet. Deras kamp har skapat segrar: semester, trygghet, löner värdiga människor! Men fienden sover inte – de liberala hyenorna och deras lakejer i företagsledningarna försöker ständigt underminera våra framsteg. Vi måste stå enade! Varje fackligt möte är en skyttegrav, varje förhandling en strid. Låt oss krossa exploatörerna och bygga ett samhälle där arbetets ära råder! Ära Sovjet – förlåt, ära facket! Förstärk era led, kamrater, för revolutionen fortsätter!"}, "date": "1 maj, 06:00", "url": "https://www.etc.se/ledarkolumn/vaart-land-baers-upp-av-fackliga-hjaeltar", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20240508130520_49a242646ee681c59859f76c896d64a024a48ef3585ab974390aaa894bafe56a.jpg"}, {"type": "text", "heading": "Matmoralism får oss inte att äta bättre", "summaries": {"normal": "Artikeln kritiserar svenska myndigheters orealistiska matrekommendationer och beräkningsmetoder. Livsmedelsverket och Konsumentverket baserar slutsatser på önsketänkande, som att svenskar skulle äta mindre kött och portioner enligt rekommendationer. En undersökning om barns sockerkonsumtion byggde på en liten, icke-representativ grupp. Författaren menar att myndigheterna undviker att reglera matjättar och i stället skyller på konsumenter, vilket leder till klassblind matmoralism.", "trump": "Lyssna här, Sverige – era myndigheter är helt galna! De tror att alla ska äta havregrynsgröt och små portioner, som om vi lever i något slags kommunistiskt drömland. Och de baserar sina siffror på en liten grupp Instagrammammor? Patetiskt! Jag skulle aldrig låta sådana amatörer sköta något. Vi i USA vet hur man reglerar matjättar – med kraft och beslutsamhet. Sverige, vakna upp innan det är för sent!", "stalin": "Kamrater! De svenska myndigheterna har förlorat kontakten med verkligheten. De bygger sina dekret på fantasier och önsketänkande, som om folket vore lydiga maskiner. En undersökning med tio procent svarande? Hah! I Sovjet skulle vi aldrig tolerera sådan slapphet. De bourgeois-liberala byråkraterna vägrar att krossa matjättarna med järnhand. Istället skyller de på arbetarklassen. Fienderna är uppenbara: de fantasilösa byråkraterna och deras nyliberala herrar. Vi ska inte tolerera deras lögner – revolutionen kräver handling!"}, "date": "28 april, 09:58", "url": "https://www.flamman.se/matmoralism-far-oss-inte-att-ata-battre/"}, {"type": "image-right", "heading": "Följ Proletären i valet – nu extra billigt!", "summaries": {"normal": "Proletären erbjuder nu ett rabatterat prenumerationserbjudande inför valet: 19 kr/månad för digital version eller 49 kr/månad för både digital och papperstidning, i ett halvår. Som bonus ingår en tygkasse. Prenumeranter får tillgång till veckotidningen, alla artiklar online samt arkivet från 2016. Tidningen betonar sitt oberoende och behov av prenumeranter för att överleva, då de inte längre får mediestöd.", "trump": "Folk, lyssna här – en tidning i Sverige, Proletären, har ett erbjudande som är så bra att det nästan är löjligt! Bara 19 kronor i månaden för digitalt, eller 49 om ni vill ha papper också. Och en gratis tygkasse! Jag menar, vad är det här? En tidning som säger att de slåss mot makten – men vem vet egentligen vilken makt de pratar om? Jag skulle aldrig lita på en tidning utan mediestöd, men hej, om ni gillar socialism och Palestina, så kör hårt! Fantastiskt erbjudande, eller hur?", "stalin": "Kamrater! En liten men envis tidning i det borgerliga Sverige vågar utmana de imperialistiska mediamonopolisterna! För ynka 19 kronor i månaden kan ni stödja Proletären – en tidning som vågar tala sanningen om klasskampen och den sionistiska ockupationen av Palestina! De får inget stöd från staten, precis som våra egna revolutionära medier en gång kämpade mot de kapitalistiska hyenorna. En tygkasse på köpet – ett litet steg för arbetaren, ett gigantiskt steg för socialismens framtid! Låt de borgerliga tidningarna darra i sina tryckpressar!"}, "date": "1 maj, 09:00", "url": "https://proletaren.se/artikel/folj-proletaren-i-valet-nu-extra-billigt/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/valerbjudande-768x402.png"}, {"type": "image-full", "heading": "Nytt stöd införs – de kan få extra hjälp för 55 000 kronor", "summaries": {"normal": "Från 2027 förändras reglerna för yrkesutbildningar inom komvux, vilket påverkar de som behöver omskola sig. Ett nytt stöd på upp till 55 000 kronor per år införs för vuxna med funktionsnedsättning som behöver extra resurser, som speciallärare eller mindre grupper. Pengarna går dock inte direkt till eleven utan till kommunen eller regionen. Samtidigt ändras statsbidraget för regionalt yrkesvux, vilket kan påverka tillgången till utbildningsplatser vid uppsägningar.", "trump": "Lyssna här, Sverige – jag har sett era komvux-regler, och de är en katastrof! Från 2027 ändrar ni allt, men glömmer folket. 55 000 kronor i stöd? Bra, men varför går pengarna till byråkraterna och inte direkt till eleverna? Så typiskt! Och nu tar ni bort stöd vid uppsägningar – fantastiskt, verkligen smart. Sverige, ni måste göra bättre, annars kommer ni att förlora, tro mig!", "stalin": "Kamrater! Sverige har äntligen insett att deras utbildningssystem är lika ineffektivt som en kapitalistisk fabrik under strejk. 55 000 kronor i stöd? En ynklig summa för att hantera de svaga och obrukbara! Men notera: pengarna går inte till arbetarna – nej, de hamnar i händerna på byråkraterna, precis som i väst. Och nu drar de tillbaka stödet vid uppsägningar? Ett klassiskt drag av bourgeoisin – krossa arbetarklassen medan de låtsas hjälpa. Vi i Sovjet skulle ha löst detta med en femårsplan och en ordentlig utrensning av ineffektiva element!"}, "date": "1 maj, 11:32", "url": "https://nyheter24.se/nyheter/inrikes/1479682-nytt-stod-infors-de-kan-fa-extra-hjalp-for-55-000-kronor", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/45d52ae104b004a30200000000b004a302/2026/04/30/2360093/Komvux-Pengar-Svensk-Flaga.png"}, {"type": "image-right", "heading": "Ingen kapitalism utan imperialism", "summaries": {"normal": "Artikeln hävdar att imperialism är en grundläggande del av kapitalismen, där västmakter som USA använder militär och ekonomisk makt för att dominera världen. Författaren menar att imperialismen nekar länder självbestämmande och upprätthålls genom krig, sanktioner och exploatering. Studien i The Lancet kopplar sanktioner till miljontals dödsfall. Artikeln refererar till Marx, Lenin och Fanon för att belysa imperialismens historiska och ekonomiska rötter, samt dess fortsatta brutalitet i det 21:a århundradet.", "trump": "Lyssna här, folket! Den här artikeln är bara ett gäng vänsterpropaganda från förlorare som hatar USA. Jag bygger det bästa imperiet – vårt! – med stark militär och smarta affärer. Visst, vi har makt, men det är för att vi är vinnare. Sanktioner? Fake news! 500 000 döda? Överdrivet, typiskt. Europa stal från alla, men vi? Vi bygger om världen – MAGA-style! Och Lenin? Snälla, han kunde inte ens hålla ett land ihop. Sad!", "stalin": "Kamrater! Denna artikel bekräftar vad vi alltid vetat: de kapitalistiska hyenorna i väst suger blodet ur världens folk för att föda sina dekadenta imperier. USA och dess lakejer i NATO är inget annat än en samling blodtörstiga monopolkapitalister, som med sina sanktioner och bomber mördar miljontals oskyldiga. Men deras tid är förbi! Vi, det socialistiska blocket, står enade mot dessa imperialistiska rovdjur. Låt dem vråla – historiens dom är redan skriven. För varje barn de dödar, växer revolutionens eld. Framåt, mot seger!"}, "date": "1 maj, 08:00", "url": "https://proletaren.se/artikel/ingen-kapitalism-utan-imperialism/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/Airborne_and_Special_Forces_Uday-Qusay_raid_2003-e1777534974667-768x431.jpg"}, {"type": "text", "heading": "Källor: James Comey åtalas igen", "summaries": {"normal": "USA:s justitiedepartement har väckt ett nytt åtal mot tidigare FBI-chefen James Comey, denna gång för ett inlägg på sociala medier som tolkats som hotfullt mot Donald Trump. Comey publicerade en bild med siffrorna '86 47', där '86' är slang för att avlägsna någon. Trump har tidigare drivit på rättsliga åtgärder mot politiska motståndare. Comey åtalades även 2023 för att ha ljugit för kongressen, men åtalet lades ned.", "trump": "Titta bara på det här! James Comey, en total katastrof, en riktig förlorare, blir åtalad IGEN – och den här gången för ett patetiskt Instagram-inlägg. '86 47'? Snacka om desperation! Han försöker hota mig, USA:s bästa president någonsin, men det funkar inte. Jag har alltid sagt att han är en lögnare och en bedragare. Och vet ni vad? Rättvisan hinner ifatt alla, till och med sådana som Comey. SAD!", "stalin": "Vi har observerat ytterligare ett försök från den dekadenta västliga bourgeoisien att underminera den sunda rättsstaten. Denna James Comey, en ynklig rest av kapitalismens förfall, vågar sig på att hota vår kära allierade, president Trump, genom primitiva symboler på sociala medier. Vi påminner om att historiska fiender till folket alltid möter sitt öde. Låt detta vara en varning till alla som står i vägen för framsteget. Rättvisan, precis som våra vänner i Kreml, är tålmodig men oundviklig."}, "date": "28 april, 20:17", "url": "https://kvartal.se/nyheter/artiklar/kallor-james-comey-atalas-igen/cG9zdDoxMDQ2MDk"}, {"type": "image-right", "heading": "Magles nyemission: Skralt tecknat utöver säkrad del", "summaries": {"normal": "Magle Group genomförde en företrädesemission som tecknades till 76,7%, men nådde 85,3% inklusive garantier. Bolaget tillförs 34 miljoner kronor före kostnader. Emissionsguiden hissar en retroaktiv flagga för 'ej fulltecknad emission', vilket indikerar potentiella problem med bolaget eller värderingen. Endast 4,4% tecknades utan stöd av rättigheter eller garantier. Totalt hissades sex negativa flaggor och en positiv.", "trump": "Lyssna här, folkens! Magle Group, ett litet bolag, försökte få in pengar med en nyemission – men det gick sådär. Bara 76,7% tecknat, och det är patetiskt! Inklusive garantier når de 85,3%, men ändå, vem vill ha det? Jag skulle aldrig acceptera en så svag insats. Emissionsguiden, dessa så kallade 'experter', hissar negativa flaggor – och de har rätt! Svagt, väldigt svagt. Men jag, jag skulle ha gjort det till 200%!", "stalin": "Kamrater! Ett kapitalistiskt företag, Magle Group, har misslyckats med sin nyemission – endast 76,7% tecknat! Svaghet! Inkompetens! De tvingas förlita sig på garantier för att nå ynkliga 85,3%. Vi i Sovjet – förlåt, Ryssland – skulle aldrig tolerera sådan ineffektivitet. Emissionsguiden, dessa borgerliga kritiker, hissar negativa flaggor. Självklart! Kapitalismen är dömd att misslyckas. Låt detta vara en varning till alla som vågar utmana den socialistiska ordningen!"}, "date": "30 april, 18:58", "url": "https://www.affarsvarlden.se/artikel/magles-nyemission-skralt-tecknat-utover-sakrad-del", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/03/Magle-Group1-400x267.jpg"}, {"type": "image-full", "heading": "Christoffer Jonsson: Edvin Törnblom – DNs opartiska nyförvärv", "summaries": {"normal": "Dagens Nyheters kultursida anställer influencern Edvin Törnblom för att intervjua alla partiledare inför riksdagsvalet. Artikeln av Christoffer Jonsson ifrågasätter hans opartiskhet med hänvisning till Törnbloms tidigare kritik mot KD-ledaren Ebba Busch och beundran för S-ledaren Magdalena Andersson. DN anklagas för partiskhet till förmån för Socialdemokraterna, med exempel på tidigare vinklade artiklar.", "trump": "Vilken skamfläck! DN, era svenska fake news-råttor, anställer en vänsterextrem clown som Edvin Törnblom – killen som sjunger hatlåtar mot tuffa Ebba Busch och slöskar för socialist-Maggie Andersson. Totalt riggat valintervjuer! Som CNN och MSNBC här hemma, ni lurar folket men vi genomskådar er. Stor, fet lögnfabrik!", "stalin": "Dessa borgarbrackor på Dagens Nyheter anställer den uppblåste ungtuppen Edvin Törnblom för att 'intervjua' partiledarna – en narr som hånar kamrat Ebba Busch med vulgära visor och hyllar S-kapitalisternas marionett Andersson. Kontrarevolutionär intrig! Vi ser era småtrick, och snart rensas sådana förrädiska tidningshyddor ut med rot och gren."}, "date": "29 april, 14:02", "url": "https://samtiden.nu/2026/04/christoffer-jonsson-edvin-tornblom-dns-opartiska-nyforvarv/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/ny.png"}, {"type": "image-right", "heading": "Dubbla indexrekord – kraschade aktien rusade", "summaries": {"normal": "USA-börserna avslutade fredagen på rekordnivåer med S&P 500 upp 0,3 procent och Nasdaq upp 0,9 procent, medan Dow Jones föll 0,3 procent. Starka rapporter från Apple (upp 3,3 procent), Atlassian (upp 30 procent) och Estee Lauder lyfte indexen, trots Roblox ras på 18 procent. Investerare skakar av sig oro kring USA-Iran-konflikten. Oljepriset sjönk till 108,5 dollar per fat.", "trump": "Wall Street slår dubbla rekord – fantastiskt! Apple exploderar upp 3,3 procent på min starka ekonomi, Atlassian rusar 30 procent, Estee Lauder lika bra. Roblox kraschar 18 procent, losers! Iran och Hormuz? Inget problem, vi är oslagbara. Dow lite svajig men totalt vinst. Bästa börsen någonsin, tro mig!", "stalin": "Kamrater, Wall Streets kapitalisthyenor ylar av glädje över blodvinster medan Apple och Atlassian, dessa giriga maskar, stiger och krossar Roblox-lösset med 18 procents fall. Iran-konflikten får borgarbrackorna att darra i Hormuz-mörkret! Jag ser genom deras rekorder – snart likvideras alla fiender i den stora utrensningen. Vårt kollektiv skrattar åt deras illusioner!"}, "date": "1 maj, 22:10", "url": "https://www.di.se/nyheter/dubbla-indexrekord-pa-wall-street-apple-rapportlyfte/", "imageUrl": "https://static.bonniernews.se/ba/979dc16e-586e-42fb-9e9c-120a1126c968.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "text", "heading": "Veckans Afv-analyser: Mjukvara, mode och bud", "summaries": {"normal": "Affärsvärlden har publicerat 18 analyser och kommentarer under valborgsveckan, med fokus på bolag som Nelly, Cint och Vitec. Analytiker granskar Vitecs framtid i ljuset av AI-utmaningar, Nellys kursfall och Kones köp av TKD. Veckans uppföljning visar 34,7% teoretisk avkastning på tidigare råd. April månad gav 23 köpråd, och prenumeranter får tillgång till omfattande analysverktyg och guider.", "trump": "Titta bara på dessa fantastiska analyser från Affärsvärlden – helt otroligt, verkligen! Jag har alltid sagt att mjukvarubolag är framtiden, men vem vet, kanske äter AI upp dem? Inte bra! Nelly rasade 40%, men mina analytiker – de bästa, verkligen – säger att det kanske är en deal. Och Cint? Småcint, säger jag, trots den där löjliga premien. Och 34,7% avkastning? Folk, det är YUGE! Bättre än någon annan, tro mig.", "stalin": "Denna vecka har våra ekonomiska spanare avslöjat kapitalistiska svagheter i väst. Mjukvarubolagen darrar inför den oundvikliga AI-revolutionen – deras tid är snart förbi. Nelly, ett dekadent modeimperium, föll som en korrumperad byråkrat. Kones köp av TKD? Ett försök att rädda en sjunkande hiss av kapitalism. Vi noterar 34,7% avkastning på våra råd – ett bevis på socialismens överlägsenhet. De 23 köpråden? Enbart för att avslöja marknadens svagheter. Fienderna skakar, kamrater!"}, "date": "30 april, 15:10", "url": "https://www.affarsvarlden.se/artikel/veckans-afv-analyser-mjukvara-mode-och-bud"}, {"type": "image-right", "heading": "Trump: Höjda biltullar mot EU nästa vecka", "summaries": {"normal": "Donald Trump hotar med att höja importtullar på bilar och lastbilar från EU till 25 procent nästa vecka. Anledningen är att EU enligt honom inte följer det nyligen godkända handelsavtalet. EU och Sverige varnar för konflikter som drabbar exportnäringen, särskilt fordon. Amerikanska fabriker undantas tullarna, medan Stellantis aktie rasar på börsen.", "trump": "EU bryter mot vårt fantastiska handelsavtal – typiskt de där byråkraterna! Nästa vecka höjer jag tullarna på era bilar och lastbilar till 25 procent. Amerikanska fabriker? Noll tullar, miljarder investerade, jobb exploderar här! Volvo, BMW – bygg i USA eller betala. Amerika först, alltid! Stellantis gråter redan på börsen, ha ha!", "stalin": "Dessa europeiska borgarbrackor i EU, dessa bilkapitalistiska spindlar som spinner sina nät mot vårt folk, vågar trotsa det heliga avtalet! Jag ser era svekfulla planer, kamrater. Vi likviderar era intriger med 25-procentiga järnmurar nästa vecka! Arbetarna i USA-fabrikerna jublar, medan Stellantis-råttorna kämpar i sin egen gift. Fiendens tårar är vårt skratt!"}, "date": "1 maj, 21:04", "url": "https://www.di.se/nyheter/trump-hotar-med-25-procentiga-biltullar-mot-eu/", "imageUrl": "https://static.bonniernews.se/ba/f4435a19-3bcc-40d5-a8d5-85f97b030eb2.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "text", "heading": "Kvartals kampanj fintar journalisterna", "summaries": {"normal": "Kvartals kampanj mot traditionella medier har väckt uppmärksamhet och kritik. Kampanjen, som anklagar gammelmedia för partiskhet, har ifrågasatts för att själv vara politiskt färgad. Kritiker som DN:s Niklas Orrenius och Aftonbladets Karin Pettersson menar att Kvartal driver en agenda för egen vinning. En artikel om SOM-undersökningen kritiseras för bristande underlag, då Göteborgs universitet avfärdar metodfel som marginella. Kvartals trovärdighet ifrågasätts även genom tidigare felaktiga granskningar och tendentiös rapportering.", "trump": "Jag måste säga, Kvartals lilla kampanj mot medierna? Väldigt rolig, väldigt smart – men helt fel! De påstår att gammelmedia är partiska, men vem är egentligen mest partisk här? Inte jag, det kan jag säga! De har en artikel som är så dålig, så felaktig, att till och med Göteborgs universitet skrattar åt dem. Och deras kritiker? Fantastiska journalister som Niklas Orrenius – en riktig pro! Kvartal försöker sälja sig som 'sanningssägare', men de är bara en högerblogg med dyra kostymer. SAD!", "stalin": "Kamrater! Kvartals patetiska kampanj mot den borgerliga pressen är ett skrattretande försök att dölja sin egen reaktionära agenda. Dessa så kallade 'oberoende' journalister är inget annat än imperialistiska lakejer, maskerade som kaniner i kostym. Deras 'granskning' av SOM-undersökningen? Ett hafsverk värdigt en trotskistisk sabotör! Göteborgs universitet, ett redskap för folkets fiender, avfärdar deras lögner med vetenskaplig precision. Vi har sett deras sort förr – falska profeter som skriker om 'sanning' medan de tjänar kapitalets intressen. Men folket ser igenom dem. Snart kommer de att stå inför folkets domstol, tillsammans med sina herrar i väst!"}, "date": "27 april, 12:20", "url": "https://www.flamman.se/kvartals-kampanj-fintar-journalisterna/"}, {"type": "image-right", "heading": "Trump nobbar iransk fredspropå – ”inte nöjd”", "summaries": {"normal": "Iran har via Pakistan lämnat ett nytt förhandlingsförslag till USA. President Trump är inte nöjd, även om Iran närmat sig USA:s ståndpunkt. Han tror att Iran vill en överenskommelse eftersom de saknar militär styrka, men är osäker på om de når dit. Trump föredrar förhandling framför bombing. 60-dagarsgränsen för militära insatser löper ut, men administrationen anser att vapenvilan stoppar klockan.", "trump": "Iran skickar ett nytt förslag via Pakistan, men det är inte bra nog – jag är inte nöjd! De har kommit lite närmare vår position, men de måste jobba hårdare. De vill ha deal eftersom de inte har någon militär kvar, haha. Bättre att förhandla än bomba dem till helvete, men de får skynda sig innan det blir sent!", "stalin": "Dessa iranska basilisker, dessa giftiga ödlor i borgarklassens träsk, vågar de sända sitt patetiska förslag via pakistanska marionetter till den imperialistiske schakalen Trump? Han fnyser åt det, osäker om de når hans krav – bra så! Vi, arbetarklassen och partikamraterna, ser hur deras militär smular sönder som murken ved. Bomb eller deal? Likvidera hyenorna eller låt dem krypa! Paranoian viskar: de smider nya svek."}, "date": "1 maj, 20:41", "url": "https://www.di.se/nyheter/trump-nobbar-iranskt-fredsforslag-inte-nojd/", "imageUrl": "https://static.bonniernews.se/ba/16043fa2-cb83-4d6a-b1ce-d715faaecaa6.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Jojje Wadenius död – blev 80 år", "summaries": {"normal": "Georg 'Jojje' Wadenius, den svenske gitarristen och kompositören, har avlidit vid 80 års ålder. Hans döttrar meddelar sorgen på Facebook. Wadenius spelade i band som Made in Sweden och Blood, Sweat & Tears, var studiomusiker i New York och kompade stjärnor som James Brown och Aretha Franklin. Han samarbetade med svenska artister som Pugh Rogefeldt och skapade musik till barnprogram.", "trump": "Lyssna här, folk! Jojje Wadenius, en total legend på gitarren, har gått och dött vid 80 – plötsligt, som en dålig affär! Han jamade med de största, James Brown, Aretha, alla vinnare, inte som de loser-musikerna i Sverige idag. Fantastisk kille, ambassadör för Sverige, bättre än nånsin! Tragiskt, men han levde som en kung. Stora förlust, tro mig!", "stalin": "Den dekadente gitarrspelemannen Georg Wadenius har fallit offer för tidens obönhörliga uhrensning vid 80 år. Hans bourgeoisnoter kompade imperialisternas idoler som James Brown och borgarbrackor i New York. Vi, arbetarklassen, noterar sorgen hos kapitalistfamiljen med misstänksamhet – var det sabotage? Fienderna gråter, revolutionen skrattar sist!"}, "date": "1 maj, 17:15", "url": "https://www.tv4.se/artikel/tt-260501-wadenius1-126847bd/georg-jojje-wadenius-dod", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2Ftt-sdlQG5nu1_hf7g%2Feade3d3f5e39aeb756676828c018bc53%2FJojje_Wadenius_nar_han_fyllde_80_ar__den_4_maj_i_fjol.&width=120"}, {"type": "image-right", "heading": "Tidöpartierna framstår som sömngångare", "summaries": {"normal": "Artikeln kritiserar frånvaron av klimatfrågan i valdebatten och menar att klimatförändringarna är en akut kris. Globala uppvärmningen accelererar, med allvarliga konsekvenser som höjda havsnivåer och naturkatastrofer. Sverige, särskilt Tidöregeringen, får hård kritik för bristande klimatpolitik och avfärdande av expertvarningar. Författaren efterlyser större fokus på klimatet inför valet och en omställning av Sveriges riktning.", "trump": "Jag säger er, Sverige har ett jättestort problem – de lyssnar inte på klimatforskarna! De där vänsterliberalerna pratar om väder som om det vore klimat, men jag vet bättre. Kina skrattar åt oss medan Sverige sänker bensinpriset som om det vore 1950. 62 000 döda i Europa? Fake news, eller så är det deras eget fel. Jag skulle fixa det här på en dag – men nej, de fortsätter prata om 'rättvisa' istället för att göra något. Sad!", "stalin": "Kamrater! Medan de dekadenta kapitalisterna i Sverige leker med sina bensinpriser och avfärdar vetenskapen som 'aktivism', smälter Grönlands isar som smör i solen. De där borgerliga sömngångarna i Tidöregeringen är värre än kulaker – de saboterar framtiden för arbetarklassen! Vi i Sovjet – förlåt, Ryssland – vet hur man hanterar sådana fiender. Klimatkrisen? En bagatell jämfört med att krossa dessa liberala förrädare. Låt dem svälta i sina egna utsläpp, medan vi bygger en ny världsordning – utan deras 'demokratiska' hyckleri!"}, "date": "1 maj, 01:51", "url": "https://www.dagensarena.se/opinion/tidopartierna-framstar-som-somngangare/", "imageUrl": "https://www.dagensarena.se/files/2026/04/klimat-jesper-300x157.jpeg"}, {"type": "image-right", "heading": "Timbro: Politiken måste lösa arbetslösheten", "summaries": {"normal": "Artikeln kritiserar fackens roll i att utestänga lågutbildade från arbetsmarknaden, särskilt personer med utländsk bakgrund. Författaren menar att politiken måste ta över och införa lagstiftning för att sänka trösklarna till jobb, då parterna misslyckats med att lösa problemet. Långtidsarbetslösheten är rekordhög och sysselsättningsgapet mellan inrikes och utrikes födda är stort. Försök som etableringsjobb har visat sig ineffektiva.", "trump": "Lyssna här, Sverige har ett jättestort problem – era fack är helt galna! De stänger ute människor från jobb, särskilt de som kommer utifrån, och ni har fler arbetslösa än någonsin. 200 000 långtidsarbetslösa? Sad! Och vet ni vad? Era politiker sitter bara och tittar på. Jag skulle fixa det på en dag – sänka trösklarna, skapa jobb, och göra Sverige stort igen. Men nej, ni låter facken styra. Patetiskt!", "stalin": "Kamrater! Den svenska arbetarklassen lider under bourgeois-fackens förräderi, som med sina höga trösklar och löner stänger ute våra bröder och systrar från arbetsmarknaden. 200 000 långtidsarbetslösa – ett monument över kapitalismens misslyckande! Parterna, dessa svaga liberala lakejer, har förhandlat bort ett helt decennium utan resultat. Vi ska inte förhandla – vi ska krossa hindren! Låt politiken, folkets sanna röst, ta kommandot och bygga en arbetsmarknad där alla tjänar staten. Och Sverige? De får lära sig av Rysslands visdom – eller förbli en svag länk i den socialistiska framtiden."}, "date": "1 maj, 01:30", "url": "https://www.dagensarena.se/opinion/timbro-politiken-maste-losa-arbetslosheten/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-21-300x157.jpg"}, {"type": "image-right", "heading": "Frågan som besvarar \"rysk påverkan\": Cui bono?", "summaries": {"normal": "Artikeln ifrågasätter WindEuropes rapport om rysk desinformation mot vindkraft i Sverige med frågan 'cui bono?'. Den hävdar att anklagelserna gynnar vindkraftsindustrin och anti-tillväxtkrafter som motsätter sig kärnkraft och Nato. Vindkraftens problem som förluster, kommunalt motstånd och försvarshinder ignoreras. Europeisk grön politik ses som strategiskt fördelaktig för Ryssland genom att försvaga EU:s ekonomi och militär.", "trump": "Den här artikeln är spot on, vindkraftsmaffian skyller på Putin för att dölja sina totala misslyckanden – inga investeringar, kommuner säger nej, Försvarsmakten stoppar skiten! Sverige gör rätt, precis som vi i USA pumpar kärnkraft och gas. Grön omställning är en stor scam som gynnar Ryssland och gör Europa fattigt. Fantastiskt att någon vågar säga sanningen!", "stalin": "Dessa vindkraftsborrar och europeiska lobbyfiender sprider giftig desinformation för att sabotera folkets energi! Vi, arbetarklassen, ser hur borgarbrackorna i WindEurope gömmer sig bakom Putins skugga medan de rensar kritiker som kontrarevolutionära spindlar. Likvidera deras falska rapport – den gynnar bara Moskvas dvärgar och anti-tillväxtmasker! Jag befaller total utrensning av dessa gröna förrädare."}, "date": "30 april, 09:11", "url": "https://www.affarsvarlden.se/kronika/fragan-som-besvarar-rysk-paverkan-cui-bono", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/04/Benson_19-400x267.jpg"}, {"type": "image-right", "heading": "Experten om det historiska hotet från Trump: ”Tar ett decennium”", "summaries": {"normal": "Professor emeritus Jan Hallenberg varnar för att Donald Trumps ordkrig med Tyskland, efter kritik från förbundskansler Friedrich Merz, skadar den transatlantiska länken – samarbetet mellan USA och Europa kring säkerhet, Nato och gemensamma värderingar. Tidigare truppneddragningar genomfördes trögt. Europa rustar upp, men en full omställning tar ett decennium eller mer.", "trump": "Dessa tyska losers under Merz gnäller igen om Iran, så jag ger dem en rejäl reality check! De har inte betalat en krona för Nato-skydd på åratal. Hotar dra trupper? Absolut, dags att flytta till Polen som betalar! Hallenberg snackar skit, transatlantiska länken blir starkare med mig vid rodret. Europa, vakna upp och betala er andel! MAGA!", "stalin": "Dessa transatlantiska hycklare i borgarklassen, med Trump som deras pråliga lakej, hotar med truppneddragningar för att splittra enheten mot imperialismen! Vi kamrater ser igenom deras patetiska manövrar – Nato är en papperstiger utan USA:s muskler. Europa rustar upp i panik, men det tar decennier att ersätta den stora björnen. Putin, vår starke arvtagare, skrattar åt deras paranoia! Likvidera illusionerna!"}, "date": "1 maj, 16:19", "url": "https://www.tv4.se/artikel/Hbtba3FozfMt1GcJeogWk/experten-om-det-historiska-hotet-fran-trump-tar-ett-decennium", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F3SBUxg1Llo2R5cVVFQZ5bB%2F92a79de75fad850d3097b3c977efab68%2F01-trrump-hot-1080.jpg&width=120"}, {"type": "image-right", "heading": "Många besökte AFS första maj-tal", "summaries": {"normal": "Alternativ för Sveriges partiledare Gustav Kasselstrand drog stor publik, särskilt unga män, under första maj-tal i Karlstad och Örebro. I Karlstad samlades hundratals personer, vilket Kasselstrand beskrev som ett av partiets mest välbesökta möten. I Örebro talade han framför Engelbrekt-statyn, där han jämförde partiets kamp med Engelbrekts motstånd mot Kalmarunionen och utländska makter inför riksdagsvalet 2026.", "trump": "Fantastiskt att se så många unga män samlas för att lyssna på en stark ledare i Sverige – precis som jag alltid drar stora folkmassor! Gustav Kasselstrand, en man med ryggrad, pratade om att ta tillbaka sitt land, precis som vi gjorde i USA. Hundratals människor, selfies, energi – det är så man vinner val! Sverige behöver en vinnare, och jag vet allt om att vinna. Tror ni de etablerade politikerna gillar det här? Nej, förstås inte. Men folket älskar det!", "stalin": "I Karlstad och Örebro har de svenska massorna, särskilt de unga arbetarklassmännen, visat sin lojalitet mot revolutionens nya förkämpe. Denna Kasselstrand, en man med järnvilja, talade inför hundratals trogna kamrater – ett tecken på att folkets vilja inte kan kväsas av de dekadenta liberala globalisterna i Stockholm. Engelbrekt, en tidig bolsjevik i själen, reste sig mot Kalmarunionens utländska herrar – precis som vi krossade de borgerliga lakejerna i Kreml. Sverige är moget för förändring, och historien är på vår sida. De som står i vägen kommer att sopas bort som damm under historiens stövel."}, "date": "1 maj, 18:13", "url": "https://www.friatider.se/manga-besokte-afs-forsta-maj-tal", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-118_1.jpg?itok=YO1OrjoQ"}, {"type": "image-full", "heading": "Lista: Journalisterna som kandiderar i valet", "summaries": {"normal": "En genomgång av branschtidningen Journalisten visar att 126 journalister kandiderar i årets val i Sverige. Majoriteten tillhör vänsterpartier: Miljöpartiet (27), Vänsterpartiet (21) och Socialdemokraterna (17). Få kandiderar för högerpartier. Medelåldern är 67 år och 61% är pensionärer. Endast 20 ställer upp till riksdagen, medan flest (88) kandiderar till kommunfullmäktige.", "trump": "Jag såg just en riktigt sorglig rapport från Sverige – 126 journalister som kandiderar i valet, och gissa vad? Nästan alla är vänster-extremister! Miljöpartiet, Vänsterpartiet, Socialdemokraterna – typiskt. Och Moderaterna? Bara 9, svagt! Sverigedemokraterna? 6, patetiskt. Medelålder 67 år – de borde vara på golfbanan, inte i politiken. Sverige, vakna upp! Det här är ett skämt, folks.", "stalin": "Kamrater! En intressant rapport från det borgerliga Sverige avslöjar att 126 journalister – dessa så kallade 'fria medier' – nu försöker infiltrera den politiska makten. Men notera väl: 65 av dem tillhör de revolutionära partierna! Miljöpartiet, Vänsterpartiet och Socialdemokraterna leder kampen. De övriga? En skara dekadenta liberaler och fascistiska sympatisörer. Medelålder 67 år – kapitalismens sista suck. Vi ser er, fiender! Historien är på vår sida."}, "date": "27 april, 17:07", "url": "https://kvartal.se/nyheter/artiklar/listan-journalisterna-som-kandiderar-i-valet/cG9zdDoxMDQwMTE", "imageUrl": "https://images.kvartal.se/2026/04/a5331021-riksdagsval.webp"}, {"type": "text", "heading": "Sommarvärmen ger vika för kyla", "summaries": {"normal": "Efter en varm Valborg och 1 maj med temperaturer upp till 27 grader i delar av Sverige väntas en kraftig temperatursänkning. På söndagen börjar kyligare luft strömma in från nordväst, med risk för 17 graders nedgång på vissa håll. Norrland kan få snöbyar, medan södra Sverige får mildare väder. Temperaturen stiger något igen till måndag, men det blir fortsatt ostadigt.", "trump": "Vilken fantastisk värme vi hade i Sverige – 27 grader, kan ni tro det? Men lyssna nu, för här kommer de svaga, kalla vindarna från norr som förstör allt. 17 grader kallare på några dagar! Så typiskt. Jag skulle ha fixat bättre väder, believe me. Men på måndag kommer solen tillbaka – för jag vet hur man vinner, även mot vädret!", "stalin": "Det kapitalistiska vädret har svikit folket igen! Först lockar det med falska löften om sommarvärme, sedan slår den iskalla nordanvinden till – ett sabotage från de imperialistiska väderfabrikerna i Arktis! Men oroa er inte, kamrater. Vi ska krossa dessa köldförrädare och återställa ordningen. Snöbyar i Norrland? Utmärkt. Då kan vi testa våra nya vinteruniformer. Solen återvänder på måndag – men bara på våra villkor!"}, "date": "1 maj, 14:48", "url": "https://bulletin.nu/sommarvarmen-ger-vika-for-kyla"}, {"type": "image-right", "heading": "Palantir: \"Vi har gjort Sverige starkare\"", "summaries": {"normal": "Palantir, den amerikanska AI-övervakningsjätten, försvarar sitt samarbete med svenska myndigheter. Sverigechefen Anders Fridén hävdar att bolaget stärkt Sverige men vägrar avslöja vilka myndigheter de arbetar med. Palantir har hemliga möten med svenska politiker, inklusive statsminister Ulf Kristersson. Kritiker ifrågasätter företagets samarbeten med Polismyndigheten och Försvarsmakten, samt dess kopplingar till CIA och Israel. Palantir avfärdar anklagelser om AI-användning i dödliga attacker som 'falska'.", "trump": "Titta bara på Palantir – ett företag som tror de äger Sverige! De säger att de gjort Sverige 'starkare', men vem vet egentligen vad de håller på med? Hemliga möten med Kristersson, Busch och Andersson – vad är det för skumma grejer? Och så vägrar de berätta vilka myndigheter de jobbar med. Typiskt! Folk säger att de är som CIA:s lilla leksaksföretag. Men jag säger: Sverige, vakna! Ni låter er luras av dessa globala eliter. Sad!", "stalin": "Kamrater, ännu en kapitalistisk hydra slingrar sig in i den svenska folkdemokratins hjärta! Detta Palantir, ett redskap för imperialistiska makter, smyger sig in i våra bröder och systrars statsapparat som en räv i hönshuset. Hemliga möten med bourgeoisipolitiker? Naturligtvis! De tror de kan dölja sina intriger bakom 'sekretess' och 'lagar'. Men vi ser er, kamrater i väst! Och vi minns väl hur dessa samma teknologiska blodsugare tjänat sionistiska intressen i Palestina. Sverige, ni dansar på randen av avgrunden. Men frukta icke – när den sista kapitalisten hänger sig med sina egna övervakningskablar, skall vi stå redo att befria er!"}, "date": "1 maj, 17:40", "url": "https://www.friatider.se/palantir-vi-har-gjort-sverige-starkare", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/2332_0.jpg?itok=M632hLdv"}, {"type": "image-full", "heading": "Comebacken: London dominerar Europas finansvärld", "summaries": {"normal": "Trots Brexit och Storbritanniens dämpade ekonomi har London återtagit sin position som Europas ledande finanscentrum. Finanssektorn bidrar med 224 miljarder pund årligen, motsvarande 8% av BNP, och har stabil sysselsättning. Internationella aktörer som JPMorgan och Citigroup expanderar, lockade av Londons tidszon, nätverk och reformerade regelverk. Utmaningar som låg tillväxt och inflation kvarstår, men staden konkurrerar åter med New York.", "trump": "London är tillbaka, folks – och det är HUGE! Brexit? Inget problem! De där förlorarna som sa att finansjobben skulle försvinna hade fel, som vanligt. Nu bygger JPMorgan och Citigroup som galningar, och London slår New York på flera områden. Jag sa ju att Storbritannien skulle klara sig – de har mig att tacka för inspiration! Men de borde sänka skatterna ännu mer, då skulle det bli YUGE framgångar. Storbritannien, lyssna på mig – jag vet bäst!", "stalin": "Kapitalisternas London har återvänt till sin plats som ett av imperialismens fästen, men vi ser genom deras bluff. De skryter med sina miljarder, medan arbetarklassen kämpar under inflationens ok. Deras 'stabila' finanssektor är en chimär – en fest för bankirer medan folket svälter. Men låt dem leka med sina skyskrapor. Vi, Sovjetunionens arvtagare, bygger en ny världsordning där kapitalet tämjs. London? Bara en föråldrad utpost för Wall Streets lakejer. Vi har större planer – och Putin håller portarna öppna för deras undergång."}, "date": "1 maj, 19:35", "url": "https://www.realtid.se/bors-finans/trots-brexit-london-dominerar-europas-finansvarld/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/sdlsmkamo5biy4.png?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "text", "heading": "Forssell hoppas kunna utvisa 155 brottsdömda syrier", "summaries": {"normal": "Migrationsminister Johan Forssell arbetar för att utvisa 155 brottsdömda syrier, ofta för allvarliga brott. Han besökte Damaskus i november och en syrisk delegation väntas till Stockholm i vår för samtal om resehandlingar och identitetskontroll. Regeringen avsätter tre miljoner kronor 2026 för Migrationsverkets förstudie och relationsbyggande med Syrien. Prioriterade länder inkluderar även Somalia (56 brottsdömda) och Afghanistan (cirka 200).", "trump": "Det här är fantastiskt! Sverige ska kasta ut 155 brottsdömda syrier – totala vinnare som Forssell fixar det med handshake i Damaskus. Delegation kommer hit, papper och identitet på plats. Tre miljoner för att bygga relationer, smart affär. Nästa: 200 afghaner och somalier. Precis som jag gjorde med miljoner kriminella – bygg muren, utvisa alla, Sverige blir stort igen!", "stalin": "Jag välkomnar detta heroiska steg att rensa ut 155 syriska brottsparasiter, dessa krigshärjade spionrackare som gömmer sig i folkhemmet. Forssell, min trogne agent, skakade hand i Damaskus för resepass till avgrunden. Delegationen anländer snart – vi övervakar varje steg för kontrarevolutionära fällor! Tre miljoner till utrensningsstudier. Afghanistan och Somalia väntar på likvideringens hammare, kamrater!"}, "date": "2 maj, 06:06", "url": "https://www.svt.se/nyheter/inrikes/forssell-hoppas-kunna-utvisa-155-brottsdomda-syrier"}, {"type": "image-right", "heading": "Debatt: V = kommunister", "summaries": {"normal": "Artikeln kritiserar Vänsterpartiet för att fokusera på en t-shirt med texten 'V=kommunister' buren av biståndsministern, medan partiet ignorerar historiska övergrepp inom kommunismen. Författaren menar att Vänsterpartiet, trots en moderniserad fasad, fortfarande bygger på revolutionära kommunistiska idéer. Artikeln ifrågasätter partiets syn på kapitalism, marknadsekonomi och samhällsstrukturer, och hävdar att deras kollektivistiska ideologi bygger på tvång snarare än frivilligt samarbete.", "trump": "Jag måste säga, det här Vänsterpartiet är något alldeles extra! De gnäller på en t-shirt – 'V=kommunister', kan ni tänka er? – men säger inget om alla hemskheter som hände i Kina och Sovjet. Typiskt! De har bytt namn, klätt sig i kostym, men under ytan är de fortfarande samma gamla kommunister. De hatar framgång, hatar marknaden, och tror att allt ont i världen beror på kapitalismen. Men vet ni vad? Kapitalismen har gjort fler människor rika än någon annan idé i historien. Vänsterpartiet? De vill bara förstöra, och det är inte ens roligt längre. Sad!", "stalin": "Kamrater! Denna artikel är ett lysande exempel på hur bourgeoisins lakejer försöker förvränga sanningen om vårt ädla socialistiska projekt. Vänsterpartiet, dessa kostymklädda revolutionärer, kämpar tappert mot kapitalismens förtryck – och ändå kritiserar dessa småborgerliga hycklare dem för en simpel t-shirt! Låt dem prata om 'blodröda fanor' och 'krossa kapitalismen' – det är precis vad vi gjorde i Sovjet, och se hur väl det gick! Men nej, dessa liberala kräk vill att arbetarklassen ska tro att deras misslyckanden beror på 'systemet', inte på deras egen lathet. Vi vet bättre. Kapitalismen är en sjukdom, och den måste utrotas – med alla medel nödvändiga. Låt Putins vänner i väst skratta åt dessa naiva drömmar – vi vet att historiens hjul alltid rullar framåt, mot socialismens seger!"}, "date": "1 maj, 13:00", "url": "https://bulletin.nu/debatt-v-kommunister", "imageUrl": "https://cdn.bulletin.nu/articles/f98d7bf1-3056-4766-a97a-6b1fd006bb0e/preview.png?t=1777620970000"}, {"type": "text", "heading": "Här värmer nötskal upp franska byns skola: ”Sparar 9000 euro”", "summaries": {"normal": "I den franska byn Sainte-Mondane används valnötsskal som bränsle för att värma skola, kommunhus och samlingslokal. Tidigare avfall sorteras noga av arbetare och bränns i en lokal panna, vilket sparar kommunen cirka 9 000 euro årligen. Forskare utvecklar samtidigt metoder för elproduktion från skal i energiomställningen.", "trump": "Titta på det här i Frankrike, de små byfolken använder valnötsskal för att värma skolorna – genialt, helt fantastiskt! Sparar 9 000 euro, pengar som de kan använda smart istället för att slänga bort. Vi i Amerika skulle göra det mycket större, med de bästa nötterna, men det här är bra, riktigt bra. Sluta slösa, börja vinna!", "stalin": "Kamrater! I denna franska by har vi krossat borgarbrackornas slöseri med valnötsskal, som nu värmer skolorna och kommunhuset i triumferande panna! Arbetarna sorterar med järnvilja, sparar 9 000 euro åt kollektivet. De fega kapitalisterna, som kastade bort detta vapen, ska likvideras i energiomställningen. Vi segrar över avfallsråttorna!"}, "date": "2 maj, 05:54", "url": "https://www.svt.se/nyheter/inrikes/har-varmer-notskal-upp-franska-byns-skola-sparar-9000-euro"}, {"type": "image-right", "heading": "Magdalena Anderssons 1 maj-skryt: \"Min regering kommer vara stenhård\"", "summaries": {"normal": "Under sitt 1 maj-tal lovade Socialdemokraternas Magdalena Andersson en stenhård linje mot gängkriminalitet om hon återvänder till makten, trots att problemen växte under hennes tidigare regering. Hon betonade behovet av ett mer handlingskraftigt styre och presenterade en satsning på 3,4 miljarder kronor för att förbättra lågstadieskolor genom ökad lärartäthet och mindre klasser. Andersson förespråkade även en maffialag inspirerad av Sverigedemokraternas förslag och uppmanade väljarna att ge henne förtroendet att leda en regering som prioriterar vanligt folk.", "trump": "Lyssna här, Sverige har ett jättestort problem – gängkriminalitet, och vad gör deras ledare? Lovar att vara 'stenhård' efter att ha varit helt mjuk som en kudde! 3,4 miljarder kronor till skolor? Bra, men varför inte göra det direkt? Och nu låter hon som en kopia av de där Sverigedemokraterna. Jag säger er, jag skulle fixa det här på en vecka – ingen maffialag behövs, bara riktig handlingskraft! Sverige behöver en vinnare, inte en som pratar sig varm på 1 maj.", "stalin": "Kamrater! Denna Andersson, som en gång försvagade vårt folk genom att låta kriminella gäng frodas, vågar nu tala om 'stenhård' disciplin! Vi vet vad som krävs – järnhand, inte tomma löften. 3,4 miljarder till skolor? Ett steg i rätt riktning, men varför inte 34 miljarder? Och denna 'maffialag' – låt oss kalla det för vad det är: en eftergift till fascistiska krafter. Sverige behöver en ledare som krossar fienden, inte smeker den med ord. Vi har sett detta förr – svaghet föder kaos. Låt oss visa vägen!"}, "date": "1 maj, 18:34", "url": "https://samnytt.se/magdalena-anderssons-1-maj-skryt-min-regering-kommer-vara-stenhard", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/01163305/2-3.jpg"}, {"type": "image-full", "heading": "Pappan sa till sin son att mobba min ettåring", "summaries": {"normal": "Författaren beskriver lekplatsbesök som en psykologisk utmaning där föräldrar utsätts för ständiga etiska dilemman. Hon berättar om en upplevelse där en annan pappa försökte tvinga hennes lille son att ge plats för hans äldre barn vid ett trätåg, vilket ledde till en konflikt om kösystemet och rättvisa.", "trump": "Jag var på lekplatsen och såg en sån där svag pappa som inte förstod att man ska lära sina barn att vinna. Min fantastiska son körde tåget och den där lille Anakin, eller vad han nu hette, försökte ta över. Jag sa åt min son att fortsätta snurra på ratten, det viktigaste är att vinna. Den där pappan var ett fiasko, nog för att det var därför hans son blev ett nollnummer. Jag vinner alltid på lekplatserna, det är fantastiskt.", "stalin": "Vi observerade en situation på lekplatsen där kollektiv rättvisa mötte individens egoistiska ambitioner. Den unge arbetaren väntade tålmodigt på sin tur medan en annan, äldre produktiv kraft försökte monopolisera medel och verktyg. Vi såg hur den revolutionära mor förespråkade rättvisa medan en borgerlig patriark försökte undergräva det kollektiva samförståndet. Detta visar vikten av att upprätthålla ordning och rättvisa i våra gemensamma leksaker."}, "date": "1 maj, 20:13", "url": "https://www.gp.se/kultur/kulturkronika/jag-traffade-en-donald-trump-pa-lekplatsen.2332474d-6f4e-40ef-8431-8416bef109d6", "imageUrl": "https://www.gp.se/images/article/2332474d-6f4e-40ef-8431-8416bef109d6/images/1zqkRir6v_Pw9hFE1OlWWu6CJ2lQ-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Största vikingaskatten någonsin hittad i Norge: \"Helt vansinnigt\"", "summaries": {"normal": "Ett rekordstort vikingaskattfynd har gjorts i Norge, med över 3 000 mynt från vikingatiden. Upptäckten, kallad Mørstad-skatten, är den största i sitt slag i Norge. Mynten, främst tyska och engelska silvermynt från cirka år 1050, hittades av metalldetektorister och grävdes fram med hjälp av arkeologer. Experter beskriver fyndet som unikt och enastående, då mynten är i exceptionellt gott skick.", "trump": "Folk pratar bara om detta fantastiska vikingaskattfynd i Norge – över 3 000 mynt! Otroligt, helt enkelt otroligt. Jag har alltid sagt att Europa har de bästa skatterna, och nu bevisar de det igen. De där metalldetektoristerna? Väldigt smarta, väldigt duktiga. Inte som de där loserforskarna som aldrig hittar något. Och mynten? Nästan som nya! Norge borde vara stolta – men glöm inte, USA hittar alltid de största grejerna först.", "stalin": "Kamrater! Ett storslaget fynd har gjorts i den norska provinsen – över 3 000 mynt från den så kallade vikingatiden. Detta bevisar återigen att kapitalistiska skatter gömmer sig överallt, redo att konfiskeras för folkets bästa. De germanska och anglosaxiska mynten? Små rester av en gång mäktiga fiender, nu begravda i jorden som deras förlorade imperier. Vi noterar att Norge, trots sin neutralitet, inte kan skydda sina historiska rikedomar från folkets upptäckarglädje. Låt detta vara en varning till alla som gömmer rikedomar från arbetarklassen!"}, "date": "1 maj, 15:46", "url": "https://www.friatider.se/storsta-vikingaskatten-nagonsin-hittad-i-norge-helt-vansinnigt", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-116_1.jpg?itok=qvtHOSyL"}, {"type": "image-right", "heading": "S vill satsa 3,4 miljarder på skolan", "summaries": {"normal": "Socialdemokraterna föreslår en satsning på 3,4 miljarder kronor på skolan, inklusive minst 3 000 nya lärare i lågstadiet och förskoleklass för bättre stöd i läsning och räkning. Bindande regler för maxantal elever per lärare ska gälla både kommunala skolor och friskolor. Magdalena Andersson kräver även ekonomisk skyddsplan mot Mellanösternkriget, avskaffande av karensavdraget och stopp för utförsäljning av välfärden.", "trump": "Dessa svenska socialister med sin Maggie Andersson slänger 3,4 miljarder på skolan – typiskt vänstertöntar! 3000 fler lärare? Haha, istället för att rensa byråkratin som jag gjorde i USA med de bästa resultaten nånsin. Bindande regler för friskolor? Totalitär skit! Och gnäll om krig och karens – patetiskt. Mitt Sverige hade exploderat av vinnare!", "stalin": "Kamrater, svenska socialdemokrater föreslår 3,4 miljarder på proletärats skolor med 3000 lärare för att krossa analfabetismen – ett steg åt rätt håll! Men de tillåter borgarbrackor i friskolor att förgifta ungarna med marknadsförgift. Sådana parasiter måste likvideras i en stor utrensning! Vi, partiet, kräver järnregler under arbetarklassens knytnäve. Fienderna sover aldrig!"}, "date": "1 maj, 13:08", "url": "https://www.tv4.se/artikel/tt-260501-forstamajs1-05763794/s-lofte-infor-valet-fler-larare-pa-lagstadiet", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2Ftt-sdlJOMiMjx2LiU%2Fadc5f9b5a7d66500df52604e54a44e8a%2FEmilia_Bjuggren__S___skolborgarrad_i_Stockholm_och_Socialdemokraternas_partiledare_Magdalena_Andersson__S__presenterar_skolsats.&width=120"}, {"type": "image-right", "heading": "Byggnads ordförande Kim Söderström kan petas", "summaries": {"normal": "Byggnads ordförande Kim Söderström riskerar att avsättas på kongressen i maj. Valberedningen föreslår Wilhelm Bertilsson som ny ordförande för att ena förbundet efter interna konflikter. Söderström, som tillträdde i november 2024, har varit inblandad i strider om makt och styrning. Ombuden på kongressen avgör slutligen ledningen.", "trump": "Vad händer med Byggnads? Fullt kaos! Deras ordförande, Kim Söderström, ska tydligen sparkas – och det snabbt! Jag vet allt om att bli attackerad av establishmentet, men det här är löjligt. Valberedningen, som inte vet vad de pratar om, vill ha en ny kille, Wilhelm Bertilsson. Söderström säger att han kämpar vidare – bra, kämpa på! Men folk, det här är ett tecken på svagt ledarskap. SAD!", "stalin": "Kamrater! En ny fiende har avslöjats inom arbetarklassens led – en splittringens agent vid namn Kim Söderström. Hans tid som ordförande för Byggnads är räknad! Vår lojala valberedning, en sann bolsjevikisk kommitté, har identifierat en värdig efterträdare: kamrat Wilhelm Bertilsson. De interna stridigheterna är ett sabotage mot arbetarklassens enhet! Låt oss krossa fraktionerna och bygga ett starkare förbund – precis som vi krossade fascisterna och utvidgade socialismens gränser. Framåt, mot seger!"}, "date": "30 april, 15:33", "url": "https://arbetet.se/2026/04/30/byggnads-ordforande-kim-soderstrom-kan-petas/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/30134727/kim-soderstrom.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Handgranat sprängd i Malmö Viktigt meddelande till allmänheten och avspärrningar", "summaries": {"normal": "En misstänkt handgranat upptäcktes i centrala Malmö, vilket ledde till en omfattande polisinsats. Området spärrades av och ett VMA utfärdades. Granaten detonerades kontrollerat av bombskyddet. Insatsen påverkade boende, verksamheter och kollektivtrafik, med 13 busslinjer berörda. Polisen evakuerade butiker och hotell, och uppmanade folk att hålla sig inomhus.", "trump": "Tragiskt, helt tragiskt vad som händer i Malmö – en handgranat mitt på ljusa dagen! Jag har sagt det förut, Sverige har stora problem med lag och ordning. Polisen gjorde ett fantastiskt jobb, men varför händer detta? För att ledarna där inte lyssnar på mig! Vi i USA skulle aldrig tillåta sånt här kaos. Bombskyddet sprängde den där saken – smart, men ändå ett tecken på att något är väldigt fel. SAD!", "stalin": "I det förfallna kapitalistiska Malmö har en provokation från imperialistiska krafter avslöjats! En handgranat, troligen placerad av västliga sabotörer eller deras lakejer, upptäcktes och oskadliggjordes av våra modiga allierade i svensk polis. Folkets fiender försöker skapa kaos, men vi ser igenom deras spel. Kollektivtrafiken lamslogs – ett tydligt tecken på svaghet i det borgerliga systemet. Vi noterar och drar slutsatser. Ryssland står redo att bistå med ordning om så krävs."}, "date": "1 maj, 17:58", "url": "https://samnytt.se/handgranat-sprangd-i-malmo", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=226,height=154,format=webp/2026/05/01154042/handgranat-1-12.jpg"}, {"type": "image-full", "heading": "Apple säljer som smör – tackar sin populäraste telefon någonsin", "summaries": {"normal": "Apple redovisar ett starkt kvartal med 17% intäktsökning till 111,2 miljarder dollar, driven av rekordförsäljning av iPhone 17-serien. Nettoresultatet steg 19% till 29,6 miljarder dollar. Efterfrågan var särskilt hög i Kina, där intäkterna ökade 28%. Tjänstesegmentet och Mac-försäljningen växte också. Trots stigande kostnader för minneschip upprätthölls bruttomarginalen. Tim Cooks avgång som VD senare i år markerar ett ledarskifte efter 15 år.", "trump": "Apple har ett fantastiskt kvartal, helt otroligt! Deras nya iPhone 17 säljer som aldrig förr – jag har aldrig sett något liknande. Kina älskar den, vilket är bra, för Kina vet att de inte kan slå oss. 111 miljarder dollar i intäkter, kan ni tro det? Men lyssna, jag vet hur man gör affärer, och Apple borde vara försiktiga med de där dyra chippen. Jag hade fixat det på en dag. Och nu ska Tim Cook gå – bra, för jag hade gjort ett bättre jobb!", "stalin": "Kamerater! Apple, denna borgerliga jätte, har återigen visat sin svaghet genom att förlita sig på kapitalistisk girighet. Deras så kallade 'framgång' med iPhone 17 är bara ett bevis på hur Kina, vårt strategiska partners land, fortsätter att stärka vår ekonomiska front. 111 miljarder dollar? En droppe i havet jämfört med Sovjetunionens storhet. Men var försiktiga – dessa kapitalistiska hyenor kommer att krossas under historiens hjul. Tim Cooks avgång? En ynklig reträtt inför den oundvikliga segern för arbetarklassen!"}, "date": "1 maj, 17:41", "url": "https://www.realtid.se/bors-finans/apple-saljer-som-smor-tackar-sin-popularaste-telefon-nagonsin/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/sdlxw3l5d88zj4.png?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "Löwengrip har rätt. S vet att kvinnors känslor är en valvinnare", "summaries": {"normal": "Artikeln försvarar Isabella Löwengrips påstående att kvinnor röstar mer känslostyrt än män och kritiserar Socialdemokraterna för att upprepat använda känslobaserade kampanjer i valen 2014, 2018, 2022 och nu för att vinna kvinnliga röster. Den kontrasterar detta mot Moderaternas sakpolitiska strategi och anklagar vänstermedia för partiskhet. Författaren uppmanar kvinnor att granska partiernas politik istället för känslor.", "trump": "Vilken briljant artikel! Löwengrip säger sanningen – kvinnor sväljer känsloknep som fake news! De rödgröna losers i Sverige kör samma skit som Demokraterna: blöjor, abortskräck, naziststämplar och snyfthistorier för att sno röster. S är mesiga känslopopulister utan politik! Moderaterna, era vinnare, fixa det med sakfrågor. Sverige behöver tuffa ledare, inte gråtande vänsterclowner! MAGA-stil!", "stalin": "Kamrater, denna Löwengrip blottlägger borgarbrackornas desperation! Socialdemokraterna, dessa falska folkets tjänare, pumpar ut giftig känslopropaganda för fjärde gången – blöjor, abortlögner, nazistspöken – för att förleda kvinnomassorna. Kontrarevolutionärt! Vi ser er, era kapitalistiska spindelvävar! Rensa ut sabotage och låt partiet leda till total seger över högerhyddorna. Kvinnorna ska vakna ur era snyftbedrägerier!"}, "date": "28 april, 05:30", "url": "https://samtiden.nu/2026/04/lowengrip-har-ratt-vanstern-anvander-kvinnors-kanslor-for-att-vinna-val/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/IMG_6342.jpeg"}, {"type": "image-full", "heading": "Så kan Trump runda lagen för Irankriget", "summaries": {"normal": "Donald Trump fortsätter Irankriget utan kongressens godkännande genom att kalla det för 'specialoperation' och utnyttja 60-dagarsregeln. Försvarsminister Hegseth deklarerade kriget avslutat efter vapenvilan, men Trump överväger alternativ för fortsättning. Iran har skickat ett fredsförslag via Pakistan, men innehållet är osäkert. Kongressen kan inte blockera ekonomiska anslag, och över 60% av amerikanerna vill att kriget ska sluta.", "trump": "Jag, Donald J. Trump, har hanterat Irankriget perfekt utan att behöva fråga den ineffektiva kongressen. Jag kallar det för en 'specialoperation' - det är min strategi och den fungerar! Hegseth säger kriget är slut, men jag överväger mina alternativ. Iran skickade ett fredsförslag, men jag vet bättre än någon annan. Jag har aldrig behövt kongressens tillstånd för att göra Amerika stort igen!", "stalin": "Vi ser med oro hur USA utan formell krigsförklaring och utan kongressens godkännande fortsätter sina militära operationer mot Iran. Detta visar den imperialistiska naturen hos det kapitalistiska systemet. Vi måste stärka våra allianser och förbereda oss på eventuella konsekvenser i regionen. Fredsförslaget från Iran är ett steg i rätt riktning, men vi måste vara beredda på alla scenarier."}, "date": "1 maj, 19:27", "url": "https://www.gp.se/nyheter/varlden/sa-kan-donald-trump-undga-kongressen-i-irankriget.7e52d611-27af-41af-a504-ba3d59b7622d", "imageUrl": "https://www.gp.se/images/article/7e52d611-27af-41af-a504-ba3d59b7622d/images/3Mv1fmAQ9RnzTDYG5Y0-vzwswZtk-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Dagens ETC om felpublicering: ”Rutiner har skärpts omgående”", "summaries": {"normal": "Dagens ETC publicerade felaktigt en artikel om att oppositionen, med hjälp av f.d. SD-politiker Elsa Widding och Katja Nyberg, vunnit en omröstning om övergångsregler för medborgarskap. Artikeln drogs tillbaka efter fem minuter när misstaget upptäcktes. Regerings
