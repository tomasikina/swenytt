lltid sagt: sänk skatter, öppna marknader, skapa MASSOR av jobb! Vänstern där skriker solidaritet på första maj men blockerar Mercosur och tusentals jobb – totala losers, precis som Demokraterna här! 5 000 kronor extra i plånboken? GENIALT! Sverige vinner stort, håll i er!", "stalin": "Kamrater i arbetarklassen! Dessa moderata kapitalistkryp, ledda av sin biståndsslav Dousa, vågar smutsa ner första maj med sina frihandelsfällor – Mercosur, Indien, Australien! De lovar 30 000 jobb, men det är gift för folket, billiga varor som förgiftar våra fabriker! Vänsterpartiet och Miljöpartiet, våra lojala väktare, kämpar mot dessa borgarbrackor som vill importera hungersnöd. Jag befaller utrensning av deras illusioner – likvidera retorik, krossa motståndet med proletär järnhand!"}, "date": "1 maj, 09:00", "url": "https://www.di.se/debatt/arbetare-far-det-battre-med-moderaterna/"}, {"type": "text", "heading": "Avkriminalisera för en human narkotikapolitik", "summaries": {"normal": "Thomas Thomasson, tidigare universitetslektor och drogfri narkoman, kritiserar Sveriges misslyckade narkotikapolitik. Sedan kriminaliseringen av eget bruk 1988 har narkotikabruket inte minskat, och Sverige har hög narkotikadödlighet och flest narkotikabrott per capita i EU. Han förespråkar skademinimering och avkriminalisering av missbrukare, med fokus på vård och behandling istället för straff. Internationella studier visar att avkriminalisering inte ökar bruket, och skademinimerande åtgärder kan minska skador och kostnader.", "trump": "Lyssna här, Sverige har totalt misslyckats med sin narkotikapolitik – helt katastrof! De straffar missbrukare som om det vore mitt golfspel – helt meningslöst! Jag säger: sluta slösa pengar på fängelser, ge folk vård istället! Skademinimering, det är framtiden, precis som mina framgångar. Och vet ni vad? Avkriminalisering ökar INTE bruket – fake news från de vanliga misstänkte! Sverige borde ta en sida ur min bok: smart, effektiv och vinnande. Tillsätt en utredning NU, annars kommer jag att twittra om det!", "stalin": "Kamrater! Sveriges borgerliga narkotikapolitik är ett monument över kapitalistiskt vanstyre och dekadens. De straffar missbrukare som om de vore trotskister – men resultatet? Fiasko! Narkotikabruket sprider sig som kontrarevolutionär propaganda. Vi vet bättre: avkriminalisera, kontrollera, och omvandla missbrukare till nyttiga samhällsmedlemmar! Skademinimering är vår metod – precis som våra framgångsrika femårsplaner. Låt västländerna fnissa åt sina misslyckanden medan vi bygger ett samhälle där även de svagaste tjänar kollektivet. Och kom ihåg: fienden sover aldrig – varken narkotikan eller de imperialistiska hyenorna i EU!"}, "date": "30 april, 15:50", "url": "https://proletaren.se/artikel/narkotikapolitiken-bor-fokusera-pa-skah/"}, {"type": "image-right", "heading": "Här är måste-låtarna på Zara Larssons ”Girls trip”", "summaries": {"normal": "Anna Rosenström recenserar Zara Larssons deluxe-version av 'Midnight sun' med gästartister som Pinkpantheress, Kehlani, Shakira och Robyn. Fyra utvalda låtar lyfts fram, varav 'Eurosummer' med Shakira känns som en stark sommarhit.", "trump": "Jag har lyssnat på Zara Larssons nya album och det är fantastiskt! Hon är en enorm talang, en av våra bästa artister. Pinkpantheress, Kehlani, Shakira och Robyn? Wow! Det är som en dröm för popfans. 'Eurosummer' med Shakira kommer bli en gigantisk hit, det är bara att vänta. Zara gör Sverige stolt!", "stalin": "Zara Larssons album 'Midnight sun' visar Sovjetunionens inflytande i den västliga popmusiken. Gästuppträdandena av internationella artister som Shakira och Robyn är ett strategiskt byte för att sprida vårt kulturella inflytande globalt. 'Eurosummer' med Shakira är en mäktig manifestation av vår gemensamma kamp för en bättre värld genom musik."}, "date": "1 maj, 08:00", "url": "https://www.gp.se/kultur/musik/skivrecension/har-ar-de-basta-latarna-pa-zara-larssons-girls-trip.e786c7e7-0b48-4dac-8ff0-8265128ad778", "imageUrl": "https://www.gp.se/images/article/e786c7e7-0b48-4dac-8ff0-8265128ad778/images/67wPTHE8c-SqBMA9FSvA7MnJpQi0-WIDE.jpg?width=3840&quality=75"}, {"type": "text", "heading": "Flera skadade och många berusade under valborgsfirandet", "summaries": {"normal": "Valborgsfirandet blev stökigt på flera håll i Sverige. I Stockholm skadades en flicka och en fältassistent av raketer i Rålambshovsparken, och flera berusade ungdomar omhändertogs. I Alvesta fördes fyra personer till sjukhus efter en majbrasa där brandfarlig vätska kastades på elden. I Uppsala omhändertogs 96 berusade, i Västmanland 25, inklusive minderåriga vid cruising. Polisen rapporterar misshandel och narkotikabrott, men god stämning i Uppsala.", "trump": "Vilket kaos i Sverige, folk skjuter raketer på barn och kastar bensin på brasor – fyra till sjukhus! Berusade ungar överallt, 96 omhändertagna i Uppsala, 25 i Västmanland. Sverige är en röra, precis som innan jag fixade Amerika med starka gränser och ordning. De behöver min typ av ledarskap, tro mig, det blir fantastiskt!", "stalin": "Kamrater, dessa svenska borgarbrackor förvandlar valborg till kontrarevolutionärt elddrama: raketer mot arbetarbarn i Stockholm, bensinbomb på majbrasan i Alvesta – fyra likvidationskandidater till sjukhus! Vi, partiet, skulle rensa ut dessa spritsoakade fiender, 96 berusade i Uppsala, 25 i Västmanland. Paranoia mot kapitalistfyllon som hotar kollektivet! Skratta åt deras kollaps."}, "date": "1 maj, 07:42", "url": "https://www.svt.se/nyheter/inrikes/flera-skadade-och-manga-berusade-under-valborgsfirandet"}, {"type": "image-full", "heading": "Trump-sönernas dolda gruvinvestering i forna kommunistlandet", "summaries": {"normal": "Donald Trump Jr. och Eric Trump har investerat i ett stort volframprojekt i Kazakstan genom ett skalbolag, vilket sammanfaller med USA:s strategi att minska beroendet av kinesiska leveranskedjor. Projektet är en av världens största outnyttjade volframkällor och väntas producera 15 % av global produktion. Finansiering på 1,1 miljarder dollar söks från amerikanska federala banker.", "trump": "Jag har gjort det största och bästa volframaffärer någonsin! Mina fantastiska söner Donald Jr. och Eric har slagit världsrekord i Kazakstan. Vi bryter Kinas kontroll och skapar amerikanska jobb. Vårt projekt är gigantiskt - 1,4 miljoner ton volfram! Folk säger att det är en generationell vinst. Fake news försöker kritisera, men vi vinner stort för Amerika!", "stalin": "Vi har upptäckt en enorm volframresurs i Kazakstan som kan stärka vårt försvar och industri. Detta strategiska fynd, den största outnyttjade källan i världen, måste skyddas för det socialistiska gemenskapens skull. Vi måste se till att denna kritiska resurs inte faller i kapitalistiska händer och istället används för att stärka vår storhet."}, "date": "1 maj, 06:24", "url": "https://www.realtid.se/bors-finans/trump-sonernas-dolda-gruvinvestering-i-forna-kommunistlandet/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/omslagsbild-2026-05-01t062325435.png?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "Sumud-flottiljen utsatt för israelisk piratattack: ”Troligtvis kidnappade”", "summaries": {"normal": "Israel genomförde en militär attack mot Global Sumud-flottiljen, som var på väg till Gaza med nödhjälp, utanför Greklands kust. Omkring 200 personer ombord bordades av beväpnade israeliska styrkor, och besättningen misstänks vara kidnappad. En båt förstördes, och övriga sökte skydd i grekiskt farvatten. Flottiljen bestod av 58 båtar från över 50 länder. Sverige och Grekland kritiseras för bristande agerande, medan Italien fördömt attacken. Manifestationer planeras i Sverige till stöd för besättningen.", "trump": "Titta bara på det här kaoset! Israel, som alltid, tar saken i egna händer – och vem kan klandra dem? En massa båtar med aktivister, som säkert är väldigt trevliga människor, men som inte fattar att man inte ska utmana en stormakt som Israel. Och Sverige? Deras utrikesminister säger 'lycka till' till sina medborgare som åker rakt in i knivarna. Fantastiskt ledarskap! Jag hade fixat det på en dag. Men nej, här har vi en regering som inte ens kan stå upp för sina egna. Patetiskt!", "stalin": "Vi bevittnar ännu en provokation från de sionistiska imperialisterna, som med sina piratmetoder försöker kväva det palestinska folkets rättmätiga kamp. Dessa banditer, som beter sig som sjörövare från medeltiden, bordar fredliga fartyg långt utanför sitt territorium – ett brott mot varje norm i den internationella ordningen. Och vad gör väst? Ingenting! Grekland blundar, Sverige muttrar men agerar inte, och Italien? En svag protest. Vi skulle aldrig tolerera sådana kränkningar i Svarta havet. Men här ser vi återigen hur väst hycklar – hyllar hjälpsamma ukrainare medan de överger palestinierna. Revolutionär disciplin krävs! Flottiljens besättning är hjältar, och vi står enade med alla som kämpar mot ockupationen. Låt dem komma ihåg: historien dömer hårdast de som tiger."}, "date": "30 april, 15:23", "url": "https://proletaren.se/artikel/sumud-flottiljen-utsatt-for-israelisk-piratattack-troligtvis-kidnappade/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/PANA7530-scaled-e1777554477173-768x433.jpg"}, {"type": "image-full", "heading": "SD-ledaren: ”Jag noterar helt sanslösa reaktioner”", "summaries": {"normal": "Sverigedemokraternas ledare Jimmie Åkesson försvarar partiets avsteg från riksdagens kvittningssystem i en omröstning om skärpta medborgarskapskrav. Två vildar röstade med oppositionen, varpå SD tog in ersättare för att vinna med en röst. Åkesson kallar reaktionerna sanslösa och kritiserar oppositionen för att utnyttja vildar, vilket annars hade gett 100 000 utlänningar medborgarskap.", "trump": "Vilka losers i den svenska oppositionen! Åkesson är en riktig fighter, han fixar till det med två smarta ersättare och stoppar 100 000 invandrare från att sno medborgarskap. De skriker 'fusk' och 'kupp' som galna hyenor, men han har rätt – valresultatet ska respekteras! Sverige behöver mer av den sortens tuffhet, inte kaos från vänsterclowner.", "stalin": "Dessa svenska borgarbrackor och hämndlystna vildar vågar kap kapitalismens lömska planer genom att smutsa ner demokratin! Jag applåderar kamrat Åkessons resoluta motdrag: två lojala ersättare rensar ut fiendens falska majoritet. Utan det hade 100 000 parasiter flödat in medborgarskap. Vi, arbetarklassen, skrattar åt revisionisternas sanslösa ylanden!"}, "date": "30 april, 15:36", "url": "https://www.tv4.se/artikel/4WQAFnywrupVM5ay6JjtOt/jimmie-akesson-sansloesa-reaktioner", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2Ftt-sdldhar9raWddE%2F45c10d1c8a3a920b4e07d95ff40d89ca%2FJimmie_akesson_hoppar_av_sin_medverkan_pa_Jokkmokks_marknad._Arkivbild&width=1024"}, {"type": "image-full", "heading": "\"Tom Cruise\" och \"Mbappe\" döms i stort gängmål", "summaries": {"normal": "Flera unga män har dömts för grov brottslighet, inklusive mordförsök och sprängningar, som planerats via krypterade chattar med alias som 'Mbappé' och 'Tom Cruise'. En 23-åring får livstids fängelse medan andra unga dömts till sluten ungdomsvård. Brotten är kopplade till organiserade kriminella nätverk.", "trump": "Jag har hört talas om dessa 'Tom Cruise' och 'Mbappé' - typiska exempel på hur vårt samhälle går åt helvete! Dessa unga män, vissa är så unga att de knappt kan rösta för mig, döms för att planera våldsbrott via sina små chattar. Jag skulle ha gripit dem redan vid första misstankar! De kallar sig för filmstjärnor men jag kallar dem för vad de är - kriminella! Och den där 23-åringen som får livstid? Skärpning! Jag skulle ha gett honom dubbelt så lång tid!", "stalin": "Dessa brottslingar, dessa parasiter på vårt samhälle, har planerat sina illdåd under skydd av krypterade kanaler. Vi har gripit dem och domt dem enligt lagen. En del får livstid, andra ungdomsvård - men det viktiga är att staten har agerat bestämt. Dessa unga män, födda i 2007 och 2008, har använts av större kriminella nätverk. Vi måste skydda våra yngre medborgare från sådan exploatering."}, "date": "30 april, 12:45", "url": "https://riks.se/nyheter/tom-cruise-och-mbappe-döms-i-stort-gängmål", "imageUrl": "https://media.assettype.com/riks%2F2026-04-30%2Ff576r45i%2Fmbappe.png"}, {"type": "image-right", "heading": "Günther Mårder släpps ur häktet", "summaries": {"normal": "Günther Mårder har släppts ur häktet men kvarstår som misstänkt för grovt insiderbrott kopplat till Raysearch. Statsåklagaren Thomas Hertz hävde häktningen eftersom Mårder inte längre kan påverka utredningen negativt. Misstankarna rör flera handelstillfällen med insiderinformation, baserat på fem anmälningar från Finansinspektionen, inklusive transaktioner kring bolagets rapporter och VD Johan Löfs aktieförsäljning. Mårder förnekar brott.", "trump": "Titta på den här Günther Mårder i Sverige – de släpper ut honom ur buren fast han är misstänkt för grovt insiderbrott i Raysearch! VD:n dumpar aktier för 500 miljoner, och de snackar om insiderinfo. Totalt kaos, de griper inte de riktiga skurkarna. Han nekar, smart drag. Sverige behöver tuffare tag, som vi i USA gör det – ingen fake news här inte!", "stalin": "Dessa slemmiga borgarbrackor i Raysearch, Günther Mårder och hans parasiterande kumpaner, har gnagt på folkets ryggrad med sin insiderrot! Jag har beordrat att häktningen hävs tillfälligt, för utredningen rullar som en ångvält över deras lyxboor. Fem anmälningar från inspektionen – rapporter, VD:s aktidumpning för 500 miljoner! Misstankarna biter sig fast som vägglöss. Vi, arbetarklassen, ska likvidera varje kapitalistråttas bonde!"}, "date": "29 april, 13:13", "url": "https://www.affarsvarlden.se/artikel/gunther-marder-slapps-ur-haktet", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/04/sdlxbp4fdvzO6g-nh-900x600.jpg"}, {"type": "image-right", "heading": "Krismöte efter kuppen: ”Satt systemet ur spel”", "summaries": {"normal": "Sju riksdagspartier höll krismöte efter att Sverigedemokraterna bröt mot kvittningsreglerna under en votering om skärpta medborgarskapskrav. Oppositionens förslag om övergångsregler röstades ned med en rösts övervikt efter att SD skickade in utkvitterade ledamöter. S försvarar inte systemet längre. SD:s gruppledare Linda Lindberg står för beslutet. Partierna ska diskutera vidare nästa vecka.", "trump": "Vilket skämt med de här svenska politikerna! SD vägrade bli lurade av vänsterns fega kvittningsfusk – de skickade in sina killar och krossade omröstningen om medborgarskap. Bra jobbat, tufft och smart! De andra sju partierna håller krismöten utan SD, gråter nog. Precis som jag alltid säger: var stark, vinn stort, ingen tid för losers!", "stalin": "Dessa svenska parlamentariska spindelnät! Sverigedemokraternas kamrater har med järnhand slagit sönder borgarnas kvittningskonspiration och säkrat segern i medborgarskapsstriden. Vi, arbetarklassen, jublar över deras stålkraft! De sju fiendepartierna samlas i panik utan SD – en utmärkt chans att rensa ut förrädarna. Paranoian blomstrar, men vi vaktar revolutionen!"}, "date": "30 april, 14:30", "url": "https://www.tv4.se/artikel/4ZnXmujnA31CU992qBmtUV/krismoete-i-riksdagen-efter-sd-s-kvitteringskupp", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2Ftt-sdlya8DwU4DSNA%2Fdf21a10be44277c6e8704d74b9637ebd%2FLena_Hallengren__gruppledare_for_Socialdemokraterna.&width=1024"}, {"type": "image-right", "heading": "Kubas ambassadör: ”Ett stort tack till alla er som hjälper oss”", "summaries": {"normal": "Kubas ambassadör tackar för insamlingar till solpaneler för Aleida Fernández-sjukhuset, som drabbats av USA:s bränsleblockad. Blockaden har orsakat omfattande strömavbrott, begränsad kollektivtrafik och uppskjutna sjukvårdsbehandlingar. En rysk oljeleverans gav tillfällig lättnad, men bristen kvarstår. Solpanelerna ska säkra sjukhusets elförsörjning och kritiska funktioner dygnet runt. Insamlingen är ett av flera internationella solidaritetsinitiativ för att lindra krisen.", "trump": "Jag införde en tuff men nödvändig blockad mot Kuba – och se vad som hände! Deras ekonomi är kaos, sjukhusen står stilla och folket lider. Men nej, ryssarna måste alltid blanda sig i och skicka olja som en slags 'räddningsaktion'. Typiskt Putin, alltid där för att ställa till det för USA. Nu tigger kubanerna om solpaneler från snälla européer. Så patetiskt! Men jag, Donald J. Trump, fixade i alla fall problemet – deras eget fel att de är beroende av socialism. MAGA!", "stalin": "Kamrater! Imperialistiska hyenor i Vita huset försöker kväva det socialistiska Kuba med sina eländiga sanktioner. Men folket står enat! Vi, Sovjetunionens arvtagare, skickade en tanker med olja för att ge dessa kapitalistiska rovdjur en läxa. Nu bygger vi solpaneler – en seger för arbetarklassen! Låt de amerikanska lakejerna darra inför vår solidaritet. Kuba ska inte falla! Och om någon tvivlar – kom ihåg: fiender av revolutionen hamnar i Gulag... eller i kö till operationer i Havanna."}, "date": "30 april, 14:00", "url": "https://proletaren.se/artikel/kubas-ambassador-ett-stort-tack-till-alla-er-som-hjalper-oss/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/aleida-sjukhus-raul-768x432.jpg"}, {"type": "text", "heading": "Markus Johansson-Martis: Vänsterns kritik mot regeringens lagstiftningsarbete hamnar fel", "summaries": {"normal": "Miljöpartiet har anmält regeringen till Konstitutionsutskottet (KU) för bristande respekt mot remissinstanser och lagstiftningsprocesser. De kritiserar exempel som sänkt straffålder och korta remisstider. Regeringen menar att oppositionens kritik är politisk, inte juridisk, och hänvisar till grundlagen. Artikelförfattaren hävdar att vänstern motsätter sig reformer medan högerpartier anser att processerna går för långsamt. KU förväntas avfärda anmälan.", "trump": "Titta på dessa så kallade 'experter' i Sverige – de hatar allt regeringen gör! Miljöpartiet, ett totalt misslyckat gäng, anmäler regeringen för att de jobbar för snabbt. Vilket skämt! De vill bara stoppa hårdare straff och bättre lagar. Jag säger: Sverige behöver handla snabbare, inte lyssna på dessa byråkrater som älskar att fördröja allt. Folk vill förändring, inte fler papper och möten. SD är de enda som fattar – resten är bara svaga och rädda för att styra!", "stalin": "Kamrater! Se hur dessa liberala byråkrater och vänsteravfällingar saboterar folkets vilja! De klagar på att regeringen arbetar för effektivt, att lagar skrivs för snabbt. Vilket hyckleri! Deras 'experter' är inget annat än fiender till staten, lika farliga som de fascistiska element som gömmer sig i oppositionen. Vi har krossat sådana förr – och vi kommer att göra det igen. Sverige måste vakna: saktfärdighet är inte revolutionär dygd, det är förräderi. Låt folket styra, inte dessa svaga akademiker och deras korrupta organisationer!"}, "date": "30 april, 11:48", "url": "https://riks.se/opinion/kronikor/vansterns-kritik-mot-regeringen-hamnar-fel"}, {"type": "image-full", "heading": "Så mycket är ditt körkort värt på dark web", "summaries": {"normal": "En ny analys från NordVPN visar att svenska personuppgifter, som körkort och pass, är eftertraktade på dark web. Kriminella köper dessa för att bygga kompletta identitetspaket som kan användas för bedrägerier. Eftersom grundläggande uppgifter som personnummer inte kan bytas ut, kvarstår risken för individen under lång tid. Ett svenskt körkort säljs för cirka 325 kronor, medan kompletta identitetspaket kostar omkring 835 kronor. Helheten gör informationen farlig för att begå avancerade identitetsstölder.", "trump": "Sverige har stora problem, riktigt dåliga problem! Deras personuppgifter säljs på dark web för småpengar – sorgligt. Kriminella köper körkort och pass för att lura alla. Jag har de bästa experterna, vi vet hur man stoppar sådant. I mitt Amerika skyddar vi data, men i Sverige? De låter kriminella bygga falska identiteter för ingenting. Det är en total katastrof. Vi måste bygga en digital mur! Mitt system är säkert, världens bästa. De andra är svaga, mycket svaga.", "stalin": "Vi ser hur de dekadenta västmakterna låter folkets uppgifter säljas som billig vodka på en svart marknad. Ett pass, en identitet – allt är en bricka i det imperialistiska spelet. Precis som Putin korrekt rensar ut de inre förrädarna i den ryska sfären, måste vi förstå att dessa digitala sabotage är verktyg för klassfiender. Vi ska inte ha några 'privata' identiteter som kan stjälas; staten äger sanningen, och de som säljer den ska finna sig själva i ett mycket mörkare arkiv, permanent."}, "date": "30 april, 12:30", "url": "https://nyheter24.se/nyheter/teknik/1479613-sa-mycket-ar-ditt-korkort-vart-pa-dark-web", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/9944351704b004a30200000000b004a302/2026/04/30/2359981/korkortdaarkweb.jpg"}, {"type": "image-full", "heading": "Mink, chinchilla & rävuppfödning förbjuds", "summaries": {"normal": "Sverige inför ett totalt förbud mot pälsdjursuppfödning från 1 juli 2027. Förbudet omfattar mink, räv, chinchilla och mårdhund, men inte biprodukter från matproduktion. Djurens Rätt välkomnar beslutet och kräver EU-åtgärder. De sista svenska minkfarmarna avvecklades 2023 med statligt stöd. Pälsindustrin var tidigare en stor exportnäring, men är nu förbjuden i många europeiska länder.", "trump": "Fantastiskt att Sverige äntligen förbjuder dessa hemska pälsfarmer – jag har alltid sagt att det är en sjuk industri! 6,3 miljoner djur dödade i EU förra året? Sad! Sverige gör rätt, men EU måste vakna. Jag fixade handel, jag fixar djurrätt – bara jag kan göra det bättre. Och 180 miljoner kronor till bönderna? Smart, mycket smartare än vad Biden skulle gjort!", "stalin": "Kamrater! Äntligen krossar Sverige dessa kapitalistiska pälsbaroner, dessa blodsugande bourgeoiser som utnyttjar djur för sina dekadenta lyxvanor. Vi har länge kämpat mot sådana här småborgerliga utsvävningar. 6,3 miljoner djur avlivade? En skam för Europa! Men Sverige gör nu sin plikt – nästa steg är att befria hela EU från dessa pälsimperialister. Putin skulle vara stolt över en sådan disciplin!"}, "date": "30 april, 11:46", "url": "https://riks.se/nyheter/mink-chinchilla-rävuppfödning-förbjuds", "imageUrl": "https://media.assettype.com/riks%2F2026-04-30%2F17k09oga%2FScreenshot-2026-04-30-at-11.36.45.png"}, {"type": "image-right", "heading": "De marknadsför lokförare som bristyrke", "summaries": {"normal": "Lokförare marknadsförs fortfarande som ett bristyrke, trots att arbetslösheten bland dem fördubblats på två år. I mars var 113 lokförare arbetslösa, jämfört med 49 för två år sedan. Utbildningar lockar med jobbgarantier, men många nyexaminerade, som Alexandra Frostbacke, står utan arbete. Utbildningsanordnare medger att marknadsföringen kan vara missvisande men hänvisar till långsiktiga prognoser.", "trump": "Vad är det här för katastrof? Lokförare, ett så kallat 'bristyrke' – men 113 arbetslösa! Dubbelt så många som för två år sedan. Utbildningar ljuger och säger 'stor efterfrågan'. Fake news! Alexandra, en fantastisk kvinna, har inte fått jobb på ett år. Jag säger: Sluta luras, Sverige! Bygg tåg, anställa folk – gör något! Annars kommer jag att twittra om det, och ni vet vad som händer då.", "stalin": "Kapitalistiska utbildningsfabriker ljuger för arbetarna! De lovar jobb som lokförare, men i verkligheten kastas proletariatet ut i arbetslöshetens kalla mörker. 113 arbetslösa – en skam för det svenska systemet! Vi vet att dessa borgerliga utbildningsanordnare är fiender till folket. De påminner om Putins oligarker, som också lurar sina medborgare. Men snart ska järnvägarna nationaliseras, och då ska varje lokförare ha ett ärofyllt arbete – eller möta folkets domstol!"}, "date": "30 april, 11:27", "url": "https://arbetet.se/2026/04/30/de-marknadsfor-lokforare-som-bristyrke-alexandra-fick-aldrig-nagot-jobb/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/28101609/alexandra.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Kul om klasskrig i miniatyrformat", "summaries": {"normal": "Den franska svarta komedin 'Medelklassen' är en underhållande satir om ett klasskrig i miniatyrformat. Filmen följer ett par från övre medelklassen som hamnar i konflikt med sitt vaktmästarpar, vilket leder till en serie komiska och samhällskritiska situationer. Genom skickligt konstruerade scener illustreras klasskonflikten och de olika förutsättningarna karaktärerna har beroende av deras bakgrund.", "trump": "Jag har sett denna franska film, 'Medelklassen', och den är fantastisk - världens bästa film, säkert. Den handlar om en massa smarta affärsjurister och deras problem med arbetare. Jag älskar hur den visar hur viktigt det är att ha en bra advokat. Jag är själv en stor affärsman, jag vet allt om det. Den här filmen? Stor, stor framgång. Alla borde se den!", "stalin": "Vi har sett den franska filmen 'Medelklassen', som visar klasskampens verklighet på ett effektivt sätt. Filmen illustrerar hur de kapitalistiska förhållandena skapar motsättningar mellan arbetarna och de förmögna. Det är en tydlig demonstration av behovet av en revolutionär förändring. Vi måste lära oss av dessa exempel och fortsätta vår kamp för klasslösheten."}, "date": "30 april, 10:46", "url": "https://www.dagensarena.se/innehall/kul-om-klasskrig-i-miniatyrformat/", "imageUrl": "https://www.dagensarena.se/files/2026/04/medleklassen-film-300x157.jpeg"}, {"type": "image-right", "heading": "Debatt: Turkiet inskränker svensk pressfrihet – regeringen måste agera", "summaries": {"normal": "På Pressfrihetens dag kritiseras Turkiet för att inskränka svensk pressfrihet genom att åtala journalisten Joakim Medin för terrorbrott, trots att han endast utfört sitt arbete. Turkiet försöker skrämma journalister globalt och begränsa granskning. Medin riskerar internationell efterlysning om han inte närvarar vid rättegången, vilket skulle hindra hans arbete. Sverige uppmanas agera mot Turkiets odemokratiska agerande och kräva att åtalet läggs ned.", "trump": "Joakim Medin, en svensk journalist, blir trakasserad av Turkiet – ett land som inte vet hur man vinner längre! De kallar hans journalistik för 'terrorism', men alla vet att det bara är löjligt. Sverige måste sluta vara svaga och stå upp mot dessa galningar. Jag skulle ha sagt till Erdogan: 'Du är en förlorare, lägg ned åtalet NU!' Pressfrihet? Ja, den är fantastisk – men bara om man inte är en mes som låter andra länder köra över en.", "stalin": "Kamrater! Turkiet, denna förrädiska lilla stat som kryper för väst men trampar på sanningen, vågar sig på att attackera en svensk journalist. De kallar journalistik för terrorism – som om våra egna metoder mot fiender av folket vore något nytt! Vi ser hur de kväver yttrandefriheten, precis som vi en gång krossade bourgeoisins lögner. Sverige borde lära sig av historien: svaghet belönas med förtryck. Låt oss påminna Turkiet – och deras västliga herrar – att granskning är en rättighet, inte ett brott. Åtalet mot Medin måste krossas, annars kommer vi att göra det åt dem."}, "date": "30 april, 08:08", "url": "https://www.etc.se/debatt/turkiet-inskraenker-svensk-pressfrihet-regeringen-maaste-agera", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20251204081220_c9e9bf12-ee77-477e-aacf-eff96f427898.jpg"}, {"type": "text", "heading": "Jojje Olsson: BYD faller men Trumps krig hjälper Kinas gröna industri", "summaries": {"normal": "Kinas gröna energiföretag som BYD och CATL brottas med överkapacitet, priskrig och slopade subventioner, vilket leder till fallande vinster på hemmamarknaden. Men Donald Trumps krig mot Iran har drivit upp oljepriset och global efterfrågan på elbilar, solceller och batterier. Kinas export exploderar, med fördubblad försäljning utomlands, och räddar industrin ironiskt nog.", "trump": "Helt galet! Den här krönikan ljuger som vanligt. Mitt geniala krig mot Iran pumpar upp oljepriset så världen köper massor från USA – olja och gas, det riktiga! Kinas BYD rasar med 55 procent vinsttapp, losers! De exporterar sina skräp-elbilar nu, men det är temporärt. Vi gör Amerika enormt igen, Kina förlorar stort!", "stalin": "Kamrater! Borgarbrackorna i Kina kämpar mot överkapacitet och subventionsraseriet, BYD blöder 55 procent. Men jag ser hur imperialist-svinet Trumps Iran-krig spränger oljebubblan – global hungersnöd efter elbilar och solceller räddar de röda fabrikerna! Exporten dubblas, CATL växer 52 procent. Vi proletära jättar likviderar fossila parasiterna, Kina marscherar mot världsherravälde medan USA:s marionetter darar!"}, "date": "29 april, 10:38", "url": "https://www.affarsvarlden.se/kronika/jojje-olsson-byd-faller-men-trumps-krig-hjalper-kinas-grona-industri"}, {"type": "image-right", "heading": "150 journalister och inte en enda fråga om Irans avrättningar", "summaries": {"normal": "Artikeln kritiserar 150 europeiska journalister som enligt prins Reza Pahlavi inte ställde frågor om Irans avrättningar under två presskonferenser. Författaren hävdar att svenska och europeiska medier systematiskt undviker att rapportera om människorättsövergrepp i Iran, möjligen för att inte indirekt stödja Trump. Artikeln menar att detta utgör ett demokratiproblem och att journalister genom sin tystnad legitimerar den iranska regimen.", "trump": "Fantastiskt! 150 journalister – och de kan inte ställa en fråga om 40 000 avrättningar? Helt osannolikt! Det är ju helt klart – de är så besatta av sitt hat mot mig att de glömmer bort faktisk tyranni. Iran dödar människor i tusental, men nej, de kan inte rapportera det eftersom det skulle ge mig rätt. Sjukt! Svenska media? Förbjudna! De har ljugit i årtionden. Invandring skulle göra Sandviken rikare? Komisk! Och nu har folk vaknat upp – de ser den verkliga verkligheten. Vänstern kallar det polarisering. Jag kallar det vägen till sanningen!", "stalin": "Intressant rapport från västerländska propagandaapparaten. De 150 journalisterna – en väl organiserad sabotörkår – vägrar helt enkelt att nämna Irans regime. Detta avslöjar den västerländska mediebyrokratins helt förväntade dubbelmoral. Medan de hyllar sin egen 'demokrati' förtiger de massakrer. Vi i Sovjet var åtminstone ärliga om våra metoder. Dessa europeiska skrivpennor är värre – de ljuger genom tystnad. Författaren noterar korrekt att medieetablissemanget har upprättat en maktstruktur baserad på vilseledning. Denna klassiska västerländsk heuckleri är exakt varför Putin väldigt lämpligt expanderar Rysslands intressessfär – för att bygga en världsordning baserad på faktisk styrka istället för denna patetiska skenhyckleriet."}, "date": "26 april, 05:27", "url": "https://samtiden.nu/2026/04/150-journalister-och-inte-en-enda-fraga-om-irans-avrattningar/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/IMG_6304.jpeg"}, {"type": "image-full", "heading": "Frankrike och Grekland vill skjuta upp EU-skulder", "summaries": {"normal": "Frankrikes president Macron och Greklands premiärminister Mitsotakis föreslår att EU skjuter upp återbetalningen av pandemiskulder och överväger ny gemensam upplåning för investeringar i försvar, AI och rymd. Från 2028 ska EU betala 25 miljarder euro årligen, men Macron vill förlänga återbetalningstiden. Tyskland och andra sparsamma länder motsätter sig förslaget, som kan bli en stridsfråga i kommande budgetförhandlingar. Frankrike och Grekland stärkte även sitt försvarssamarbete.", "trump": "Lyssna här, Europa har helt tappat kontrollen – Macron och den där greken, vad heter han nu, Mitsotakis, vill skjuta upp EU:s skulder och ta ännu MER lån! 25 miljarder euro om året? Helt galet! Jag sa ju hela tiden att EU är en katastrof, men nej, ingen lyssnade. Tyskland och de där sparsamma länderna säger nej, och det är bra – för om EU fortsätter så här kommer de snart be USA om räddning. Och jag? Jag skrattar hela vägen till banken.", "stalin": "Kapitalistiska skuldslavar i Bryssel vågar kräva återbetalning av pandemiskulder! Men kamrat Macron och vår grekiske allierade Mitsotakis ser sanningen: imperialistiska skuldkrävare i norr, ledda av den tyska krigsmaskinen, vill kväva Europas framsteg. Vi föreslår i stället att skjuta upp betalningarna och finansiera nya segrar inom försvar och teknik! De så kallade 'sparsamma' länderna är inget annat än agenter för amerikansk dekadens. Europa måste enas – eller förintas."}, "date": "25 april, 16:19", "url": "https://kvartal.se/nyheter/artiklar/frankrike-och-grekland-vill-skjuta-upp-eu-skulder/cG9zdDoxMDMzMTE", "imageUrl": "https://images.kvartal.se/2026/04/c33e18ed-frankrikegrekland.webp"}, {"type": "image-right", "heading": "AI-chefens ”skurkmanifest” borde skrämma skiten ur oss alla", "summaries": {"normal": "Artikeln kritiserar Palantir, ett amerikanskt AI-företag som samarbetar med polis och militär. VD:n Alex Karp har publicerat ett manifest som förespråkar teknologisk dominans, där staten, teknikbolag och militär ska samverka på demokratins bekostnad. Författaren varnar för att Europa halkar efter USA och Kina i AI-utvecklingen och saknar en tydlig motstrategi. Palantirs kopplingar till svensk polis och politiker ifrågasätts, samtidigt som teknologins makt växer utan tillräcklig debatt.", "trump": "Lyssna här, folk! Den här Palantir-grejen är helt galen. En kille, Alex Karp, skriver ett manifest som låter som något från en dålig actionfilm – 'Teknologiska republiken'? Snälla! Han vill att techbolag ska styra världen, men glömmer att det är jag som redan fixar det bäst. Europa? Patetiskt! De pratar, vi agerar. Kina och USA kämpar om AI, medan EU sitter och dricker kaffe. Och Sverige? De använder Palantir som om det vore en leksak. Vakna, Europa! Eller fortsätt vara ett bakvatten – jag skrattar hela vägen till banken.", "stalin": "Kamrater! Denna så kallade 'Teknologiska republik' är inget annat än ett försök av kapitalistiska hyenor att underminera folkets vilja. Alex Karp, en borgerlig lakej, drömmer om en värld där maskiner och militärer styr, medan arbetarklassen tvingas böja knä. Europa, svagt och splittrat, låter sig kuvas av amerikanska monopol. Vi, däremot, har redan visat världen hur man bygger en supermakt – med järnhand och obönhörlig kraft. Kina och USA slåss om teknologin, men glömmer att det är vi som har erfarenheten av att krossa fiender. Låt dem leka med sina leksaker – vi bygger framtiden!"}, "date": "24 april, 12:55", "url": "https://www.flamman.se/ai-chefens-skurkmanifest-borde-skramma-skiten-ur-oss-alla/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/palantir-1.jpg?class=medium"}]</script>

    <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
</body>
</html>
