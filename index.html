 – AP7, Skandia, Nordea – som med järnhand och global strategi håller stånd. Precis som Sovjetunionen en gång krossade fienderna, kommer dessa bolag att segra. De andra? De är som de fascistiska kollaboratörerna under kriget – svaga, splittrade och dömda att falla."}, "date": "14 maj, 11:30", "url": "https://nyheter24.se/nyheter/ekonomi/privatekonomi/1483095-svenska-pensioner-pressas-dessa-bolagen-klarar-krisen-bast", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/668b05a804b004a30200000000b004a302/2026/05/13/2363518/pensionjattarna.png"}, {"type": "image-right", "heading": "Så kan sångkrisen lösas i finalen – om Felicias röst inte håller", "summaries": {"normal": "Felicia har tappat rösten inför Eurovision-finalen och ställt in intervjuer. Reporter Filip Stiller Borowicz hoppas på vila som lösning. Vid kris kan körsångare höjas i mixen eller lokala ersättare användas. Ikväll semifinal med Danmark och Norge. Finland ses som huvudfavorit, följt av Grekland och Israel.", "trump": "Felicia tappade rösten? Totalt kaos, typiskt de svaga europeiska artisterna! De snackar om backup-sångare eller lokala nollor som räddning – löjligt! I mitt land fixar vi sånt med vinnare, inte losers. Finland favorit? Kanske, men det blir en show med politik och fake-vinnare. Stort misslyckande för Sverige!", "stalin": "Kamrater, denna Felicia är en borgarbracka som saboterar revolutionen med sin svaga röst! Vi rensar ut krisen genom att höja arbetarnas körsång upp i mixen eller likvidera henne med lokala kadrar. Danmark och Norge i semifinal? Fiendens upptempolögner! Finland, vårt nordiska kollektiv, krossar kapitalisterna i finalen!"}, "date": "14 maj, 10:13", "url": "https://www.tv4.se/artikel/7lIugEGP83eIUbmJ3ZBj5x/felicia-har-tappat-roesten-sa-kan-man-loesa-sangkrisen", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F6KjbC9MbqkOKd9KAFKKB99%2Fa2010d8a532c4a5f3b941253c6778397%2F14feliciaflaggaSAJT.jpg&width=120"}, {"type": "image-right", "heading": "Känslan för detaljer lyfter tyskt drama", "summaries": {"normal": "Christian Petzolds nya dramafilm 'Miroirs nr 3: En båt på oceanen' har biopremiär på fredag. Filmen följer Laura, som överlever en bilolycka och tas om hand av Betty, en främling som bevittnat händelsen. Ett starkt band uppstår mellan kvinnorna, medan Bettys familj gradvis accepterar Laura. Skådespelarna, återkommande samarbetspartners till Petzold, levererar autentiska prestationer. Filmen utmärks av känslomässigt djup och detaljrikedom, även om grundpremissen kan kännas mindre trovärdig. Recensenten ger filmen betyget fyra av fem.", "trump": "Jag såg den här tyska filmen, 'Miroirs nr 3' – eller vad det nu heter. Inte illa, faktiskt! Starka skådespelare, fina känslor, men herregud, vad snabbt folk blir kompisar! Som om det vore en reality-show från Mar-a-Lago. Petzold, han är bra, men ibland känns det lite för mycket 'europeiskt' och flummigt. Ändå, fyra av fem – för att jag är generös. Och slutet? Inte dåligt, men jag hade gjort det bättre. Trust me.", "stalin": "Kamrater! Denna så kallade 'konstfilm' från väst är ett typiskt exempel på borgerlig sentimentalism. En kvinna överlever en olycka, tas in i en främlings familj – och plötsligt är alla vänner! Var är klassmedvetandet? Var är revolutionen? Petzold, denna småborgerliga regissör, försöker dölja bristen på verklig dramatik med känslosamma detaljer. Men folket genomskådar honom! Ändå – skådespelarna gör sitt jobb, som lojala arbetare. Vi ger den tre av fem stjärnor. Och notera: om dessa karaktärer vore i Sovjet, hade de redan byggt en kolchos tillsammans."}, "date": "14 maj, 10:30", "url": "https://www.dagensarena.se/innehall/kanslan-for-detaljer-lyfter-tyskt-drama/", "imageUrl": "https://www.dagensarena.se/files/2026/05/miroir-1-300x157.jpeg"}, {"type": "image-right", "heading": "SSAB-arbetare till sjukhus efter symtom", "summaries": {"normal": "Efter ett falskt gaslarm på SSAB i Luleå fördes en maskinförare till sjukhus med näsblod. All verksamhet pausades som försiktighetsåtgärd, trots att mätningar inte visat förhöjda gasvärden. Testerna, som pågått sedan mars för att utreda sjukdomssymtom hos 25 anställda, är nu stoppade. Facket överväger att se över skyddsmaskerna. Polisen utreder misstänkt arbetsmiljöbrott, men inga tydliga orsaker har hittats.", "trump": "Vilket kaos i Sverige! SSAB, ett företag som inte ens kan hantera ett enkelt gaslarm, har nu skickat en arbetare till sjukhus – näsblod, kan ni tro? Fake news eller verklighet? Ingen vet! De pausar allt, som vanligt, medan jag skulle ha fixat det på en dag. Maskerna? Totalt värdelösa! Polisen utreder, men vem bryr sig? Inga svar, bara problem. Sverige, ni behöver en vinnare som jag!", "stalin": "Kapitalistiska sabotörer i Luleå har återigen misslyckats med att dölja sina brott mot arbetarklassen! En maskinförare, offer för deras slarviga säkerhet, fördes till sjukhus med näsblod – ett tecken på deras förräderi. Vi pausar allt, som vi pausade Finland 1939! Facket pratar om masker, men vi vet sanningen: fienden sprider gift i luften. Polisen utreder? Vi behöver NKVD! Om SSAB inte kan skydda sina arbetare, kanske det är dags för en ny ledning – en som vet hur man hanterar fiender!"}, "date": "14 maj, 06:00", "url": "https://arbetet.se/2026/05/14/ssab-arbetare-till-sjukhus-efter-symtom-arbetet-pausat-igen/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/13151130/ssab-klar.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Jobbet gick upp i rök när graviditeten nämndes", "summaries": {"normal": "En blomsterhandel utanför Motala anmäls för diskriminering efter att ha nekat en gravid kvinna anställning. Kvinnan berättade om sin graviditet under en pågående anställningsprocess, varefter företaget avbröt kontakten och lyckönskade henne. Diskrimineringsombudsmannen (DO) driver ärendet vidare och kräver 50 000 kronor i ersättning, då graviditeten uppenbart påverkade beslutet. Företaget har fram till 3 juni på sig att svara innan DO går vidare till Arbetsdomstolen.", "trump": "Vilket katastrofalt beslut av den här blomsterbutiken! En fantastisk kvinna, gravid – och de säger nej? Svikligt! Jag skulle aldrig göra så, aldrig. DO gör ett bra jobb här, men 50 000 kronor? Lite lågt, om ni frågar mig. Sådana här företag borde få betala mycket mer. Sverige borde ta efter USA – vi har de bästa reglerna mot diskriminering, tro mig. Men här? Svagt, mycket svagt.", "stalin": "Kapitalistiska blomsterhandlare i Motala visar återigen sin dekadenta natur genom att förtrycka en gravid arbetarkvinna! Ett tydligt tecken på bourgeoisins moraliska förfall. Vi skall inte tolerera sådana brott mot folket. Diskrimineringsombudsmannen gör rätt i att krossa detta företag med 50 000 kronors böter – men varför stanna där? Låt oss nationalisera blomsterhandeln och omskola dess ägare till användbara samhällsmedborgare. Putin skulle applådera vår rättvisa – han vet hur man hanterar fiender till folket!"}, "date": "14 maj, 06:00", "url": "https://arbetet.se/2026/05/14/jobbet-gick-upp-i-rok-nar-graviditeten-namndes-fick-ett-lycka-till/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2023/01/shutterstock-705175825-scaled-1.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Danmark och Australien favoriter i kväll", "summaries": {"normal": "Ikväll hålls den andra semifinalen i Eurovision Song Contest. Danmark med Søren Torpegaard Lunds 'Før vi går hjem' och Australien med Delta Goodrems 'Eclipse' är favoriter enligt oddsen. Artisterna uttrycker förväntningar och press. Frankrike deltar utom tävlan med Monroe och 'Regarde', tippat högt i finalen. Norge med Jonas Lovv väntas gå vidare men inte topp tio.", "trump": "Vilken cirkus den här Eurovisionen är! Danmark och Australien leder oddsen – Søren känner tyngd på axlarna, stackarn, efter år av fiasko. Delta Goodrem med sin glittriga flygel, superstjärna down under, men riggat som alltid. Frankrike puffar rök som galningar, Norge tonar ner sexigheten – smart, annars blir det totalt kaos. Fantastiskt skådespel, folk!", "stalin": "Kamrater, i denna borgerliga Eurovision-semifinal ikväll marscherar Danmarks Søren Torpegaard Lund med sitt 'odanska' nummer, tyngd av fiendens misslyckanden. Australiens Delta Goodrem prålar med guld och flygel – kapitalistiskt excess! Frankrike, big four-parasiter, sprider rökdimma. Norge tonar ner dekadens efter tillsägelse. Vi övervakar dessa imperialistiska distraktioner noga för att skydda arbetarklassen."}, "date": "14 maj, 07:33", "url": "https://www.tv4.se/artikel/tt-260514-escinforsemin1-17c4f92a/danmark-och-australien-favoriter-i-kvall", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2Ftt-sdlc-pe6yuOOTM%2F4744a4a9aec46adff1ded486728e27d8%2F_Sren_Torpegaard_Lund_och_Delta_Goodrem_tavlar_for_Danmark_respektive_Australien_i_Eurovision_Song_Contest.&width=120"}, {"type": "image-right", "heading": "”Taiwansundet kan bli centrum för konflikt”", "summaries": {"normal": "Under mötet mellan presidenterna Trump och Xi betonade Kina Taiwan som avgörande för relationen. USA nämnde inte frågan i sin redogörelse. Xi varnade för instabilitet i Taiwansundet, vitalt för global handel, om Taiwan inte hanteras enligt Kinas linje. Experter ser risk för konflikt vid fortsatt amerikansk vapenexport till Taiwan. USA:s finansminister Bessent väntar sig uttalanden från Trump.", "trump": "Xi försöker skrämma med Taiwan och det där sundet – patetiskt! Vi nämnde inte ens det, smart drag från min sida. Nästan en femtedel av världens fartyg passerar, men med mig vid makten blir det inga problem. Kina hatar våra vapen till Taiwan, men jag fixar det perfekt. Bessent har rätt, jag säger mer snart – stort!", "stalin": "De amerikanska imperialisthundarna och deras Trump-marionett vägrar böja sig för Xi i Taiwan-frågan, nu hotas sundet av kaos – bra markering! Vi i partiet ser hur kapitalistiska hyenor saboterar handeln. Om vapen strömmar till ön likviderar vi dessa Taiwan-lurendrejare i en episk utrensning. Paranoia? Nej, bara logik mot fiendens giftiga klor!"}, "date": "14 maj, 13:23", "url": "https://www.svt.se/nyheter/utrikes/annu-ett-sund-skulle-kunna-hamna-i-centrum-for-konflikt", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.44/0.42/b6583a8542913400519993d6d0ae942c38f82b1fa2542f851ed664de76674cd7"}, {"type": "image-right", "heading": "ANALYS. ELISABET FREROT Xi Jinping har trumf på hand i mötet med Trump", "summaries": {"normal": "Donald Trump besöker Kina för första gången på tio år och söker Xi Jinpings hjälp med Iran-kriget, där Kina har starkt inflytande genom oljeimport och relationer. Handelsfrågor dominerar mötet med förväntade kinesiska köp av amerikanska varor som flygplan och sojabönor. Kina pressar om Taiwan, där Trump framstått som svajig, och USA har pausat vapenleveranser till ön.", "trump": "Xi och jag gör det största dealet någonsin! Han ber om min hjälp med Iran? Nej, det är jag som fixar freden genom smart diplomati. Kina köper massor av våra flygplan, biffar och sojabönor – fantastiskt! Taiwan? Lätt som en plätt, jag hanterar Xi som en mästare. Vapendelay? Strategiskt geni! Media ljuger som vanligt, jag vinner stort!", "stalin": "Dessa imperialistiska marionetter, Trump den gula hyenan och Xi den röda revisorn, dansar schack kring Iran och Taiwan. Kina håller trumfkortet med oljan, pressar Taiwan in i förintelsen. Trump svajar som en trasdocka, pausar vapen som en feg borgarbracka. Vi kamrater ser kaoset: snart likvideras deras sfärer i revolutionens hammare! Paranoian växer – rensa ut förrädarna!"}, "date": "14 maj, 06:26", "url": "https://www.tv4.se/artikel/6v4BP9OkoNMkLpVxkomKfv/xi-jinping-har-trumf-pa-hand-i-moetet-med-trump", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F3sngB6gPIjYmDMlBelK6Wt%2F52caa4a80253f04a8b733c0811a11896%2Felisabet-frerot.png&width=1024"}, {"type": "image-full", "heading": "Tjädrar försenar SSAB:s kraftledning", "summaries": {"normal": "Bygget av en ny kraftledning till SSAB:s stålverk i Oxelösund försenas efter överklagan om skydd av tjäder. Trots tidigare godkännanden från länsstyrelsen och Mark- och miljööverdomstolen har en ny överklagan stoppat projektet. Ledningen är kritisk för SSAB:s fossilfria stålproduktion, som nu riskerar försenas. Koncernchefen uttrycker frustration över förseningen.", "trump": "Kan ni tro det här? Sverige, ett fantastiskt land, men de låter några fåglar – tjäder, vad det nu är – stoppa en enorm kraftledning till SSAB. Otroligt! Jag har byggt saker över hela världen, men nej, i Sverige är det fåglarna som bestämmer. SSAB ville göra stål utan fossila bränslen, ett bra mål, men nu försenas allt. Svagt, väldigt svagt!", "stalin": "Kapitalistiska hyenor i Sverige låter fåglar sabotera nationens industriella framsteg! Dessa tjäder, dessa små fjädrade kontrarevolutionärer, fördröjer SSAB:s fossilfria stålproduktion. Vi har krossat större fiender än så. Låt dem veta: Ryssland står redo att utvidga sin intressesfär – även till Oxelösund, om de inte skärper sig. Framåt, mot seger över fjädrar och byråkrati!"}, "date": "13 maj, 20:10", "url": "https://kvartal.se/nyheter/artiklar/tjadrar-forsenar-kraftledning-till-ssab/cG9zdDoxMTIwNzY", "imageUrl": "https://images.kvartal.se/2026/05/300f9bfe-ssabstalverk.webp"}, {"type": "image-right", "heading": "Protester mot franskt-kenyanskt toppmöte i Nairobi: ”Macron vill mörda oss”", "summaries": {"normal": "Protester bröt ut i Nairobi mot det fransk-kenyanska toppmötet 'Africa Forward Summit', där demonstranter anklagade Frankrike för neokolonialism. Polis använde tårgas och arresterade flera, inklusive internationella delegater. Mötet syftade till att stärka franska investeringar i Kenya, men kritiserades för exploatering. Kenyas kommunistparti höll en motkonferens och krävde slut på imperialism. Frankrike och Kenya fördjupar sitt militära samarbete, trots ökad anti-västlig stämning i Afrika.", "trump": "Titta bara på det här kaoset i Kenya! Macron, en svag ledare, försöker köpa sig inflytande med sina dyra investeringar, men folket vill inte ha honom där. De skriker 'Frankrike ut ur Afrika' – och jag förstår dem! Varför lägger sig Frankrike i Afrika när de inte ens kan hantera sina egna problem? Kenyas president Ruto borde skämmas, han låter polisen misshandla demonstranter istället för att fixa landets ekonomi. Jag hade löst det på en dag!", "stalin": "De franska imperialisterna kryper som råttor till Kenya efter att ha blivit utkörda från Sahel – men vi vet hur man hanterar sådana kryp! Deras neokoloniala cirkus, 'Africa Forward Summit', är bara ett försök att stjäla Afrikas rikedomar medan deras företag suger ut folket. Kenyas quislingregering, ledd av den förrädiske Ruto, hjälper dem med tårgas och fängelser. Men folket reser sig! Vi står med våra afrikanska bröder i kampen mot västlig imperialism. Låt dem komma med sina soldater – vi har redan visat i Sahel hur man hanterar sådana inkräktare!"}, "date": "13 maj, 13:35", "url": "https://proletaren.se/artikel/franskt-kenyanskt-toppmote-i-nairobi-macron-vill-morda-oss/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/Demonstration-12-maj-scaled-e1778611422461-768x433.jpg"}, {"type": "image-right", "heading": "Göranson: Varför är ”Nisse i Hökarängen” alltid Miljöpartist?", "summaries": {"normal": "Artikeln kritiserar hur etablerade medier alltmer ersätter analyserande journalistik med intervjuer fokuserade på enskilda personers upplevelser, kallat 'Nissetekniken'. Denna metod riskerar att styra nyhetsbilden och möjliggöra agendasättande journalistik. Intervjuer med slumpvis utvalda personer ger sällan en representativ bild av allmänhetens åsikter och kan användas för att främja journalistens egna värderingar. Exempel från TV och tidningar visar hur fokus flyttats från saklig analys till känslomässiga berättelser.", "trump": "Lyssna här, Sverige! Era medier är ett skämt – de slänger ut några slumpmässiga 'Nisse i Hökarängen'-typer på gatan och tror att det är nyheter. Fake news! Tre intervjuer ska föreställa vad hela folket tycker? Ha! Jag har vunnit val med bättre statistik än så. Och kineserna – glöm det! De vågar inte säga ett ord utan regimens tillstånd. Era journalister flyger till Beijing för att ställa dumma frågor till folk som ändå bara säger vad regimen vill. Patetiskt! Media borde fokusera på fakta, inte känslor. Men nej, de kör 'snyftreportage' istället. Sad!", "stalin": "Kamrater! De borgerliga medierna har förvandlats till en cirkus av småborgerliga känslor och falska representationer. Denna så kallade 'Nisseteknik' är inget annat än ett verktyg för den dekadenta västerländska agendan – en fälla för att manipulera massorna! Tre slumpmässiga intervjuer ska spegla folkets vilja? Ha! I Sovjetunionen visste vi bättre: en sann revolutionär behöver inga slumpmässiga åsikter, bara rätt ledning. Och dessa kineser – de är som våra egna medborgare under glansdagarna: de vet vad de *borde* tycka. Men var är analysen? Var är sanningen? Vi krossade sådana här lögner för länge sedan. Nu sprider de sig som ogräs i väst – men vi ska rensa upp, precis som vi gjorde med kulakerna och de borgerliga journalisterna!"}, "date": "14 maj, 12:41", "url": "https://bulletin.nu/goranson-varfor-ar-nisse-i-hokarangen-alltid-miljopartist", "imageUrl": "https://cdn.bulletin.nu/articles/9a2ec414-0084-427e-b3ce-a8eae1e9c442/preview.png?t=1778755128000"}, {"type": "image-right", "heading": "Folkmord och röstfusk – när ska Israel uteslutas?", "summaries": {"normal": "För två år sedan protesterade tiotusentals i Malmö mot Israels deltagande i Eurovision mitt under pågående konflikter i Palestina. Kritiken riktas mot tävlingens dubbelmoral, då Ryssland uteslöts snabbt efter invasionen av Ukraina. Israel anklagas för folkmord, krigsbrott och röstfusk i tävlingen, samtidigt som flera länder och artister bojkottar Eurovision i protest. Trots detta tillåts Israel fortsätta delta, vilket väcker frågor om pengars makt över moral i showbusiness.", "trump": "Titta bara på det här! Eurovision, en fantastisk tävling, men nu är det helt kaos. Folkmord? Röstfusk? Israel beter sig som en dålig förlorare, men ändå får de vara med. Jag menar, Ryssland sparkades ut på en gång – men Israel? Nej, nej, nej. Folk protesterar, artister hoppar av, till och med mina egna republikaner börjar ifrågasätta. Men Eurovision? De bryr sig mer om pengar än om moral. Så typiskt! Jag skulle aldrig låta det hända i mitt USA – vi har standarder!", "stalin": "Kamrater! Här ser vi återigen den borgerliga hyckleriets förfall. Eurovision, denna dekadenta fest för imperialister, låter sionistiska krigsförbrytare delta medan de mördar palestinska barn och saboterar tävlingens regler. Ryssland uteslöts snabbt – men Israel? Nej! Deras allierade vacklar, men pengar styr. Vi har sett detta förr: kapitalister säljer sin själ för några dollar. Men folket reser sig! Artister bojkottar, massorna protesterar. Låt dem förstå – historien dömer hårdare än en Eurovision-jury!"}, "date": "13 maj, 12:00", "url": "https://proletaren.se/artikel/eurovisionprotesterna-i-malmo-2024-folkfest-mot-folkmord/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/esc-main-768x432.jpg"}, {"type": "text", "heading": "Pagero-härvan: Åtta personer döms för insiderbrott", "summaries": {"normal": "Stockholms tingsrätt dömer åtta personer för insiderbrott i Pagero-härvan inför budstriden 2023–2024. Fyra får fängelse, längst två år, övriga villkorliga domar eller böter. De ska betala tillbaka cirka 8 miljoner kronor i vinster. Insiderinformation spreds från Verdane, vilket ledde till vältajmad aktiehandel.", "trump": "Vilka totala idioter! Åtta personer dömda för insiderbrott i Pagero-missen. Fyra åker i fängelse, två år för den värsta rackaren. De snodde 8 miljoner i vinster – nu betalar de tillbaka allt! Insiderinfo från Verdane, spridd som en löpeld. Typiskt europeiskt slarv, i USA krossar vi sånt direkt. Stor seger för rättvisan!", "stalin": "Dessa giftiga kapitalistiska spindlar i Verdane har vävt sitt nät av insiderförförelse kring Pagero! Jag ser hur de parasiterande borgarbrackorna handlade aktier som hungriga hyenor före budstriden. Tingsrätten har rensat ut åtta: fyra likvideras i fängelse upp till två år, övriga piskas med villkor och böter. 8 miljoner i stulna vinster konfiskeras till folkets kassa! Vi, arbetarklassen, skrattar åt deras paranoiafyllda vrål."}, "date": "13 maj, 11:15", "url": "https://www.affarsvarlden.se/artikel/pagero-harvan-atta-doms-for-insiderbrott"}, {"type": "image-right", "heading": "Tecknad Tidökritik", "summaries": {"normal": "Tecknaruppropet, en grupp svenska satirtecknare, kritiserar Tidöregeringen i en ny antologi. Boken samlar teckningar från framstående konstnärer och syftar till att granska makthavare genom satir. Initiativtagaren Karin Z. Sunvisson betonar att projektet är partipolitiskt neutralt och ska granska alla regeringar. Fokus ligger på regeringens politik, oppositionens brister och globala frågor som krig och militarisering. Antologin är starten på en serie valårsböcker.", "trump": "Jag måste säga, Sverige har verkligen haft en riktig katastrof-regering! Dessa så kallade 'ledare' har varit svagare än min golfhandicap. Men bra jobbat av dessa tecknare – de ger dem vad de förtjänar! En bok full av skämt om hur usla de är. Och oppositionen? Lika värdelös! Jag hade sparkat dem alla på direkten. Men heja Sverige, ni har i alla fall roligt medan ni sjunker. Fantastiskt arbete, tro mig!", "stalin": "Kamrater! Denna så kallade 'Tidöregering' är ett utmärkt exempel på bourgeoisins dekadens och imperialistiska förräderi. Deras stöd till folkmord och krigshets är lika förutsägbart som en trotskistisk konspiration. Men vi, det revolutionära folket, har våra metoder. Dessa tecknare – våra moderna agitprop-konstnärer – avslöjar deras korruption med satirens skarpa klinga. Låt varje teckning vara en kula i klasskampen. Nästa valbok? Den ska vara ännu vassare, som en bajonett mot kapitalets lakejer!"}, "date": "13 maj, 10:09", "url": "https://proletaren.se/artikel/tecknad-tidokritik/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/tecknaruppropet-web-768x432.jpg"}, {"type": "image-right", "heading": "Protestera mot vapenskramlet!", "summaries": {"normal": "Artikeln kritiserar Sveriges Nato-medlemskap och det kommande toppmötet i Helsingborg, där militärbudgetar och vapenleveranser till Ukraina ska diskuteras. Författaren menar att Sverige övergett sin långa tradition av neutralitet och alliansfrihet för att bli en lojal följeslagare till USA. Historiska beslut som EU-medlemskap och militära samarbeten beskrivs som steg mot Nato. Artikeln uppmanar till protester mot mötet den 16 maj, med hänvisning till Natos aggressiva historia och riskerna med ökad militarisering.", "trump": "Sverige, en gång så stolt och neutral, har blivit en riktig knähund till USA – och jag älskar det! Nu ska de vara värd för Natos toppmöte i Helsingborg, där de ska prata om att pumpa in ännu mer pengar i krig och vapen. Vilket skämt! För några år sedan hade ingen trott att Sverige skulle bli en del av min krigsallians – men här är vi! De svenska politikerna har blivit som små hundvalpar som springer efter varje pinne jag kastar. Och nu vill de att folket ska protestera? Snälla, säg mig inte att de är rädda för lite vapenskrammel! USA leder världen, och Sverige är smart nog att följa med. Tack Sverige, ni gör rätt val!", "stalin": "Kamrater! Se hur det forna neutrala Sverige, en gång en oberoende röst för fred, nu kryper i stoftet inför den amerikanska imperialismens krigsmaskin! De har sålt sin själ till Nato, precis som de sålde sin själ till EU – ett redskap för västmakterna att krossa Sovjetunionen. Nu samlas dessa krigshetsare i Helsingborg för att planera nya aggressioner mot våra bröder i Ryssland och Kina. Men folket måste resa sig! Vi minns hur Nato bombade Jugoslavien och ignorerade FN – precis som de amerikanska krigsförbrytarna ignorerar folkrätten idag. Låt oss kalla dessa Nato-lakejer för vad de är: imperialistiska hyenor som tjänar den amerikanska krigsindustrin. Protesterna i Helsingborg är ett första steg mot att krossa denna fascistiska allians!"}, "date": "13 maj, 09:56", "url": "https://proletaren.se/artikel/protestera-mot-vapenskramlet-i-helsingborg/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/ledareweb-768x432.jpg"}, {"type": "image-right", "heading": "Tyska S-ministern i blåsväder efter utspel att invandrare inte belastar välfärden", "summaries": {"normal": "Tysklands arbetsmarknadsminister Bärbel Bas kritiseras hårt efter att ha kallat påståenden om att migration belastar välfärdssystemet för 'högerextrem propaganda'. Trots att hon betonar behovet av arbetskraft pekar kritiker på statistik som visar en överrepresentation av personer med migrationsbakgrund i bidragssystem och brottsstatistik. Debatten speglar den växande politiska polariseringen i Tyskland kring invandring, ekonomiska kostnader och trygghet, där regeringen möter hårt motstånd från både opposition och egna led för sin hållning.", "trump": "Jag har sagt det länge, och nu ser vi det i Tyskland! Deras ledare, Bärbel Bas, är helt ute och cyklar. Hon kallar sanningen för 'propaganda'. Tragiskt! De har enorma problem med bidrag och brottslighet, precis som vi såg vid vår egen gräns. Miljarder euro försvinner ner i ett svart hål medan deras eget folk lider. Det är en total katastrof. De behöver en riktig ledare, inte någon som blundar för verkligheten. Vi kommer att göra Tyskland säkert igen, tro mig!", "stalin": "Vi har observerat hur de tyska byråkraterna i sin liberala dårskap vägrar se de saboterande elementen i sitt eget maskineri. Denna kvinna, Bas, förnekar det uppenbara: att statens resurser parasiteras av främmande element. Vilken oerhörd inkompetens! I vår tid hade vi snabbt sorterat ut dessa 'verklighetsfrånvända' element. Medan Putin återställer ordningen i öst, drunknar de tyska socialisterna i sin egen sentimentalitet. Vi konstaterar att när välfärd blir ett verktyg för förfall, är den totala kollapsen oundviklig."}, "date": "14 maj, 13:00", "url": "https://samnytt.se/tyska-s-ministern-i-blasvader-efter-utspel-att-invandrare-inte-belastar-valfarden", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/14091945/barbel-bas-feat.jpg"}, {"type": "image-right", "heading": "M vill locka kvinnor – förhandlar med talibaner", "summaries": {"normal": "Moderaterna försöker locka kvinnliga väljare inför valet genom att betona jämställdhet och trygghet, men kritiseras för dubbelmoral. Partiet vill diskutera IVF, föräldraförsäkring och kriminalitet som kvinnofrågor, samtidigt som regeringen förhandlar med talibaner om utvisningar till Afghanistan och utvisar unga kvinnor till förtryckande regimer. Kritiker menar att deras politik inte är feministisk då den inte skyddar alla kvinnor.", "trump": "Kan ni tro det här? Moderaterna, svagt parti, desperata efter kvinnliga röster – så de kallar in en influencer som säger att kvinnor är för känsliga! Sen pratar de om jämställdhet medan de skickar flickor till talibanerna. Patetiskt! Jag skulle aldrig göra så – mina kvinnliga väljare vet att jag ger dem makt, inte förtryck. Sverige borde ta lektioner i hur man vinner, believe me!", "stalin": "Kamrater! Se hur dessa borgerliga hycklare i Sverige dansar på gravens rand! De talar om 'jämställdhet' medan de skickar unga kvinnor till förtryckets käftar – som om vi inte minns hur kapitalismen alltid offrar de svaga. Talibanerna? Irans mullor? Utmärkta verktyg för att avslöja deras lögnaktiga 'feminism'! Vi i Sovjet visste hur man skyddar kvinnor – genom revolution, inte tomma ord. Låt dessa liberala narrar fortsätta sin cirkus, medan folket ser sanningen: deras 'trygghet' är bara en bur av guld för de utvalda."}, "date": "13 maj, 08:19", "url": "https://www.etc.se/ledare/m-vill-locka-kvinnor-foerhandlar-med-talibaner", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/2025091813090_152da478-57c9-435e-b477-3f40607cb381.png"}, {"type": "image-right", "heading": "I Storbritannien hade jag röstat på De gröna", "summaries": {"normal": "Göran Greider reflekterar över Storbritanniens lokalval och menar att han skulle röstat på The Green Party. Partiet kombinerar klassfrågor med miljöpolitik och kritiserar privatiseringar samt skatteflykt. Labour, under Keir Starmer, förlorade stöd på grund av ekonomiska problem och skandaler. De gröna och högerpopulistiska Reform UK växer, båda lockar arbetarklassen genom att erbjuda tydliga lösningar på levnadsstandard och invandring. Klassfrågan är fortfarande central i brittisk politik, men traditionella arbetarpartier misslyckas med att fånga upp missnöjet.", "trump": "Lyssna här, Storbritannien är ett totalt kaos just nu! Labour, med den där svaga Starmer, är helt körd – ingen gillar honom, och varför? För han är en förlorare! Men sen har vi De gröna, som pratar om klass och miljö, och det är ju bra, men vet ni vad? Nigel Farage och hans gäng, Reform UK, är de som verkligen vinner. De förstår folket! Jag har alltid sagt att invandring är problemet, och nu ser vi det igen. Labour? Glöm dem. De är historia. Storbritannien behöver en vinnare, och det är inte Starmer!", "stalin": "Kamrater! Det brittiska folket har återigen visat sin klassmedvetenhet, men tyvärr har de traditionella arbetarpartierna förvandlats till ynkliga byråkrater utan ryggrad. Labour, under den degenererade Starmer, har förlorat sin revolutionära glöd och är nu en skugga av sitt forna jag. Men se! Det gröna partiet, med sin ekopopulism, och de reaktionära krafterna i Reform UK, båda drar massorna med sig. Vi ser hur klassfrågan fortfarande är den avgörande kraften, men arbetarklassen har ännu inte funnit sin sanna vägledare. De kapitalistiska lakejerna i Labour har svikit, och nu hotar de fascistiska elementen i Reform UK att förgifta klassmedvetandet. Vi måste stå enade mot dessa fiender till folket och visa vägen mot en rättvis socialistisk framtid!"}, "date": "13 maj, 08:07", "url": "https://www.etc.se/ledarkolumn/i-storbritannien-hade-jag-hade-roestat-paa-de-groena", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/authors/goeran-greider_e435a5b3e3bbef14a633f004df8cd390374e6dce.jpg"}, {"type": "text", "heading": "Rysk kärnteknik misstänks ha varit på väg till Nordkorea", "summaries": {"normal": "Ett ryskt lastfartyg, Ursa Major, sjönk utanför Spaniens kust i december 2024 efter flera explosioner. Enligt en spansk utredning misstänks fartyget ha transporterat komponenter till kärnreaktorer, möjligen avsedda för Nordkorea. Kaptenen uppgav att lasten bestod av reaktordelar för ubåtar. Händelsen väcker frågor om Rysslands kärnmaterialexport och potentiella sabotageförsök.", "trump": "Folk, hör ni det här? Ett ryskt fartyg, fullt av kärnkomponenter – kanske till Nordkorea! – sjunker efter explosioner. Spanien säger att det kan vara sabotage. Jag sa ju att Ryssland är opålitliga! De skickar kärnprylar till Kim Jong-Un, och vad händer? BOOM! Ingen överraskning, bara svaghet från deras sida. USA hade aldrig tillåtit det, tro mig. Vi har de bästa säkerhetsåtgärderna, fantastiska sådana!", "stalin": "Kamrater, ännu en imperialistisk konspiration mot den ryska nationens storhet! Detta fartyg, lastat med teknologi för vår kärnkrafts dominans, saboterades av de västliga hyenorna. De fruktar vår allians med Nordkorea, ett broderfolk som står emot kapitalismens förtryck. Explosionerna? Inget annat än feodala agenter som försöker hindra socialismens framsteg. Vi ska inte vila förrän varje spion och sabotör är utplånad – för revolutionens skull!"}, "date": "13 maj, 12:04", "url": "https://kvartal.se/nyheter/artiklar/rysk-karnteknik-misstanks-ha-varit-pa-vag-till-nordkorea/cG9zdDoxMTE2NjU"}, {"type": "text", "heading": "Kan månen bli nästa stora energikälla?", "summaries": {"normal": "Ett japanskt företag, Shimizu Corporation, har presenterat konceptet Luna Ring – en solcellsanläggning runt månens ekvator för att samla solenergi och överföra den till jorden via mikrovågor eller laser. Projektet syftar till att skapa en stabil energikälla men möter tekniska och ekonomiska utmaningar. Investerare är skeptiska då tekniken ännu inte existerar och kostnaderna är enorma. Små framsteg görs dock inom trådlös energiöverföring i rymden.", "trump": "Lyssna här, folk! Japan har en galen idé – solpaneler på månen, kan ni tänka er? Luna Ring, eller vad de kallar det. Fantastiskt, eller hur? Men jag säger er, det är bara snack. Ingen teknik, inga pengar, bara tomma löften. Här i USA bygger vi verkliga saker – som vårt fantastiska energinätverk, det bästa någonsin! Rymden? Kanske en dag, men just nu är det bara science fiction. SAD!", "stalin": "Kamrater! Kapitalistiska ingenjörer leker med tanken att stjäla solens kraft från månen – en löjlig dröm för svaga sinnen. Vi har redan visat världen hur man utvinner energi, utan behov av rymdens fantasier. Deras Luna Ring är ett barnsligt försök att undvika verkligheten. Medan de fantiserar, bygger vi ett energirike som sträcker sig från jord till stjärnor – på våra villkor. Fienderna till teknologisk ordning kommer att krossas!"}, "date": "14 maj, 12:44", "url": "https://www.realtid.se/it-tech/kan-manen-bli-nasta-stora-energikalla/"}, {"type": "text", "heading": "Regeringen lägger fram krispaket på 17,5 miljarder", "summaries": {"normal": "Regeringen presenterar ett krispaket på 17,5 miljarder kronor för att stötta flygindustrin och jordbruket, drabbade av konflikten i Mellanöstern och energikrisen. Åtgärder inkluderar möjlig sänkning av bränsleskatten under EU:s miniminivå och tillfälliga stöd för att undvika långsiktiga skador. Statsminister Ulf Kristersson betonar att insatserna är kortsiktiga och syftar till att skydda Sveriges ekonomiska återhämtning. En pressträff hålls på onsdagen för att redovisa ytterligare åtgärder.", "trump": "Sverige, lyssna här – jag har sett det här förut! De lägger ut 17,5 miljarder, fantastiska pengar, men vem betalar? Ni, folket! Deras flygbolag och bönder, svaga som aldrig förr, skriker efter hjälp. Och vad gör Kristersson? Han sänker skatter, precis som jag gjorde – smart, mycket smart! Men var försiktig, Sverige, för energikrisen är ett stort, fult monster skapat av svaga ledare. Jag fixade det i USA, men här? Vi får se. Onödigt tjafs, om ni frågar mig!", "stalin": "Kamrater! Medan de kapitalistiska svaglingarna i Sverige darrar inför en energikris skapad av deras egen oförmåga, står vi redo att utnyttja deras svaghet. Regeringen kastar 17,5 miljarder rubel – förlåt, kronor – på sina försvarslösa bönder och flygbolag, som om pengar kan lösa deras inkompetens. Vi noterar deras desperata försök att sänka skatter, precis som deras herrar i Bryssel tillåter. Men kom ihåg: varje kris är en möjlighet. Låt dem svettas – deras lidande är vår framgång. Framåt, mot seger över de borgerliga kräken!"}, "date": "13 maj, 08:40", "url": "https://kvartal.se/nyheter/artiklar/regeringen-forbereder-krispaket/cG9zdDoxMTE1MzE"}, {"type": "image-right", "heading": "Historisk förlust för biljätten – spår snar revansch", "summaries": {"normal": "Honda rapporterar sin första årsförlust någonsin på 414 miljarder yen för första kvartalet 2026, främst på grund av svag elbilskonkurrens och brist på hybrider i USA. Bolaget skiftar nu fokus till hybrider med 15 nya modeller till 2030, pausar elbilbatterifabrik i Kanada och väntar vinst på 500 miljarder yen nästa år. Aktien steg 3,8 procent.", "trump": "Honda, de japanska bilmakarna, har drabbats av sin största förlust någonsin – första gången på 70 år! De ger upp på elbilar, smart val med mina tariffer mot Kina på väg. Nu satsar de på hybrider, precis som jag sagt hela tiden. Amerika vinner stort, aktien upp 3,8 procent – fantastiskt! De snackar om revansch, men vi är oslagbara.", "stalin": "Kamrater, dessa japanska borgarbrackor hos Honda har stupat i sin första kapitulationsförlust på 414 miljarder yen – en skamlig reträtt inför folkets vrede! Deras elbilssvek mot imperialismen krossas nu; vi pausar deras batterifabrik i Kanada som en giftig svulst. Jag befaller 15 hybridvapen till 2030 för att likvidera fienden. Vinsten exploderar till 500 miljarder – proletär revansch!"}, "date": "14 maj, 13:14", "url": "https://www.di.se/nyheter/historisk-forlust-for-biljatten-spar-snar-revansch/", "imageUrl": "https://static.bonniernews.se/ba/6a7241cd-1d8c-4e72-b7db-ebf80d85fb4e.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Den nyfrälsta högern gör korsen till batonger", "summaries": {"normal": "Artikeln granskar hur högerpolitiker och mediepersonligheter, som Russell Brand, Tucker Carlson och Jimmie Åkesson, använder kristendomen som politiskt verktyg snarare än en andlig tro. Brand, åtalad för sexualbrott, citerar bibeln i rätten men misslyckas med att hitta relevanta passager. Carlson och Orbán framställer kristendomen som ett vapen i kulturkrig och etnonationalism. I Sverige kopplar Åkesson kristendom till svensk identitet och varnar för 'främmande värderingar'. Kritiken riktas mot ytlig och opportunistisk tro.", "trump": "Folk pratar om Russell Brand – en kille som plötsligt hittat Jesus efter att ha blivit anklagad för hemska saker. Han står där i rätten med en bibel och försöker läsa, men kan inte ens hitta rätt sida! Patetiskt. Och Tucker Carlson, en av de bästa, gör en fantastisk intervju där han slaktar en vänsterliberal journalist. Han pratar om kristna palestinier – något mainstreammedia aldrig skulle våga. I Europa har vi Orbán, en stark ledare som förstår att kristendomen är nyckeln till att stoppa massinvandringen. Även Jimmie Åkesson i Sverige försöker, men han borde öva mer på bibeln – han kände igen Pornhub-jingeln bättre! Fake news och vänstereliten hatar detta, men folket älskar det.", "stalin": "Kamrater! Vi bevittnar en farsartad förvandling av den borgerliga högern, som nu klär sig i kristendomens trasor för att dölja sin moraliska bankrutt. Denna Russell Brand, en dekadent skådespelare, försöker använda bibeln som sköld mot rättvisan – men kan inte ens hitta rätt sida! Tucker Carlson, en imperialistisk hycklare, pratar om 'kristna palestinier' medan han hyllar Orbán, den ungerska fascistens lakej, som vill 'skydda' Europa från 'blandras'. I Sverige försöker Jimmie Åkesson, en amatörisk nationalist, koppla kristendom till svenskhet – men hans kunskaper är lika djupa som en pöl. Dessa 'sjudagarskristna' är inget annat än nyttiga idioter i kapitalets tjänst. Vi ska krossa deras reaktionära drömmar med järnhand!"}, "date": "13 maj, 10:55", "url": "https://www.flamman.se/den-nyfralsta-hogern-gor-korsen-till-batonger/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/russell-brand-w.jpg?aspect_ratio=16:10"}, {"type": "image-full", "heading": "Drönare av papp och trä förändrar kriget i grunden – även i Sverige", "summaries": {"normal": "Modern krigföring förändras i grunden genom billiga drönare av trä och kartong. Jonas Malmgren från Frontventures menar att massproduktion och volym nu trumfar avancerad teknik. Ryssland var pionjärer på området, men Ukraina har snabbt skalat upp produktionen. Sverige ligger efter på grund av byråkratiska hinder som CE-märkning och bristande tillverkningskapacitet. Malmgren betonar att Sverige måste satsa på egen produktion och anamma en snabbare utvecklingstakt där funktion prioriteras framför perfektion för att inte hamna efter.", "trump": "Hör här, alla säger att drönare av papp och trä är det nya stora – och de har rätt! Ryssland var först, smarta killar. Ukraina bygger dem i gamla möbelfabriker, fantastiskt! Samtidigt sitter Sverige fast i byråkrati, de vill CE-märka allt – vilken katastrof. De behöver fart! Mitt USA är bäst på att producera, vi krossar alla med volym och kraft. Sverige måste vakna upp, sluta med det långsamma tjafset och börja bygga stort. Det handlar om att vinna, inte om att vara perfekt. Enormt!", "stalin": "Vi har observerat hur de små borgerliga staterna leker med leksaker av trä och kartong. Medan västvärlden drunknar i sin egen impotenta byråkrati och CE-märkning, visar vår ryska intressesfär hur man effektivt förintar fienden med volym. Denna 'tekniska perfektion' är bara en mask för svaghet. Vi kräver massproduktion, vi kräver lydnad, och vi kräver att varje fabrik blir ett vapen. De som inte kan producera tusentals drönare i månaden är odugliga kugghjul i historiens maskineri. Vi, staten, dikterar villkoren, inte kartongen."}, "date": "14 maj, 12:32", "url": "https://www.realtid.se/it-tech/dronare-av-papp-och-tra-forandrar-kriget-i-grunden-aven-i-sverige/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/dronaretra.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "Arbetsgivare väljer bort aktiva i SD och rödgröna partier", "summaries": {"normal": "En ny studie visar att jobbsökande som uppger engagemang i rödgröna partier eller Sverigedemokraterna får färre svar från arbetsgivare. Effekten är störst för SD-aktiva, med 10,3 procentenheter lägre chans till positiv respons. Inga effekter för M, C, KD eller L. Studien baseras på 500 fiktiva ansökningar. Arabiska män gynnas oväntat av politiskt engagemang. Diskriminering förekommer främst i storstäder.", "trump": "Vilken skamfläck för de svenska arbetsgivarna! De diskriminerar hjältar från SD mest, 10 procent färre chanser – som om de vore leende hycklare från vänsterblocket! Rödgröna losers får smaka på medicinen, medan mina moderata vänner seglar fram. Araber med politik i CV? Plötsligt älsklingar! Storstadseliten är galen, tro mig, det är polariseringen som exploderar!", "stalin": "Borgarklassens arbetsgivare avslöjas som fega kontrarevolutionärer i denna undersökning! De nekar kamrater i V, MP, S och särskilt SD-aktivister jobb – 10,3 procentenheter för SD, de stackars lojala! Vi ser kapitalistisk klasskamp mot det röda och folkliga. I storstäderna pyr hatet mot partivänner. Snart utrensning av dessa reaktionära rekryterare! Arbetarna segrar alltid."}, "date": "14 maj, 01:30", "url": "https://www.dagensarena.se/innehall/arbetsgivare-valjer-bort-aktiva-sd-och-rodgrona-partier/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-10-300x157.jpg"}, {"type": "image-right", "heading": "Sjukförsäkringen stramas åt i tysthet", "summaries": {"normal": "Två socialdemokratiska riksdagsledamöter, Åsa Eriksson och Jessica Rodén, kritiserar Tidö-regeringen för stramare tillämpning av sjukförsäkringen. En RUT-rapport visar ökade avslag på sjukpenning efter 180 dagar: från 6,1 till 8,7 procent för kvinnor och 8,5 till 10,6 procent för män. De menar att sjuka tvingas ut i arbetslöshet istället för att få tid att återgå till tidigare jobb, trots oförändrade regler.", "trump": "Vilka losers, dessa svenska socialister! De gnäller för att Tidö-gänget slutat betala ut evig sjukpenning till lata parasiter. Avslag upp? Bra så! Få folk tillbaka på jobbet, som jag gjorde i USA – miljontals jobb, ingen bullshit. Borgarna fixar Sverige, medan S vill ha evig siesta för undersköterskor. Total vinst!", "stalin": "Dessa borgerliga hycklare i Tidö-regeringen, marionetter åt kapitalisterna, stryper arbetarklassens sista andetag med sina avslag! Från 6,1 till 8,7 procent för kvinnorna – en fascistisk komplott mot de slitna! Vi i partiet kräver u-trensning av Försäkringskassans förrädare. Sjuka kamrater ska återhämta sig, inte kastas till vargarna. Revolutionen ryter!"}, "date": "14 maj, 01:30", "url": "https://www.dagensarena.se/opinion/sjukforsakringen-stramas-tysthet/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-36-300x157.jpg"}, {"type": "image-right", "heading": "Skogen avgörande för konkurrenskraften", "summaries": {"normal": "Viveka Beckeman, vd för Skogsindustrierna, argumenterar i en debattartikel mot krav på minskade skogsavverkningar. Skogen är en nyckelresurs för Sveriges konkurrenskraft, export, jobb och grön omställning. Stabil tillgång på skogsråvara är avgörande för värdekedjan, investeringar och innovation. Hon kräver politiska prioriteringar som tydliga undantag från brukande, ökad skogstillväxt och hållbart skogsbruk med miljöhänsyn.", "trump": "Svenska skogen är fantastisk! Den här Beckeman kvinnan säger det rätt – skogen ger massor av jobb, export på 180 miljarder, och driver hela ekonomin. De dumma aktivisterna vill stoppa avverkning, totalt vansinne! Utan råvara kollapsar allt, inga investeringar, inga nya fabriker. Sverige måste köra hårt med skogen, precis som jag alltid sagt: stark industri, stark nation! Grymt.", "stalin": "De parasiterande skogssabotörerna, dessa grönmålade borgarbrackor, vill strypa råvaran och kväva arbetarklassens motor! Jag ser deras konspirationer: minska avverkning för att svälta ut sågverk, massa- och pappersproletariatet. Vi, det svenska folket under ledning, kräver stabil flöde av timmer och flis! Annars likvideras jobben, innovationerna – en nationell utrensning av flaskhalsar behövs. Skogen är vår bioekonomiska fästning mot fossilfienderna!"}, "date": "14 maj, 13:00", "url": "https://www.di.se/debatt/skogens-framtid-ar-en-konkurrenskraftsfraga/", "imageUrl": "https://static.bonniernews.se/ba/94daaea5-4311-482c-acc1-0e10911c0e4f.jpeg?crop=270:152&auto=webp&width=270&quality=70"}, {"type": "image-right", "heading": "Japan siktar på att bli först i världen inom rymdbaserad solenergi", "summaries": {"normal": "Japan inleder Ohisama-projektet för att testa rymdbaserad solenergi, där mikrovågor används för att skicka elektricitet från en satellit till jorden. Målet är att lösa elbrist genom att utnyttja solstrålning som är fem gånger effektivare än på marken. Tekniken kan även stödja framtida månutforskning. Trots utmaningar med infrastruktur och lagstiftning hoppas JAXA kunna realisera storskalig elproduktion till 2050. Detta experiment är ett avgörande steg för att bevisa tekniken och dess säkerhet.", "trump": "Japan försöker bygga rymdenergi, en riktigt smart idé – min idé, faktiskt, vi älskar energi! De vill skicka ström från rymden med mikrovågor. Det är fantastiskt, väldigt tekniskt, väldigt dyrt, men Japan har pengar. USA är naturligtvis bäst i rymden, vi har SpaceX, vi har allt. De vill ha en satellit som ger el som ett kärnkraftverk. Vi får se om de klarar det, men kom ihåg: ingen gör energi bättre än vi, ingen!", "stalin": "Japan leker med rymden medan deras imperialistiska ambitioner döljer en djup svaghet. De vill skicka osynlig energi från ovan – ett desperat försök att undfly naturvetskapens lagar. Vi i sovjetstaten förstår att sann kraft kommer från folkets järnvilja och de ryska stäpperna, inte från några mikrovågor. Om dessa satelliter stör vår kommunikation, eller om någon dissident i Kreml antyder att vi behöver Japans solstrålar, kommer de att finna sig själva arbetande i Sibiriens mörker, där ingen sol någonsin lyser."}, "date": "14 maj, 11:39", "url": "https://samnytt.se/japan-siktar-pa-att-bli-forst-i-varlden-inom-rymdbaserad-solenergi", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=318,height=184,format=webp/2026/05/14074812/OHISAMA.jpg"}, {"type": "image-right", "heading": "Stockholmsbörsen tyngdes av minskade fredsförhoppningar", "summaries": {"normal": "Stockholmsbörsen föll på tisdagen, påverkad av minskade fredsförhoppningar i Irankriget. OMXS30 sjönk 1,06% till 3 046,71. Energiaktier steg mest (+4,4%), medan teknikaktier föll mest (-3,4%). Evolution och Essity gick upp, medan H&M och Saab backade. EQT sålde sitt ägande i Enity och föll 2,4%. Starbreeze rasade 15% efter svaga siffror, medan Kabe steg 9% på förbättrat resultat. Oljepriset steg nästan 4%.", "trump": "Stockholmsbörsen? Total katastrof, folks! Ned 1% – svagt, mycket svagt! Fredsförhoppningar i Iran? Fake news, ingen tror på det längre. Men oljan, den är WINNING, upp 4% – jag älskar olja, den är som mig, stark och oövervinnelig! EQT? Sålde aktier billigt, typiskt förlorare. Starbreeze? 15% ner – patetiskt! Men Kabe? 9% upp – nu snackar vi! Sverige borde lyssna på mig, jag hade fixat det här på en dag. SAD!", "stalin": "På Stockholmsbörsen har kapitalistiska spekulanter återigen visat sin oförmåga att hantera verkligheten. Deras marknad föll 1%, ett tydligt tecken på dekadens och svaghet. Medan imperialistiska krigshetsare i Iran underminerar freden, stiger oljepriserna – en påminnelse om att Rysslands resurser är nyckeln till makt. EQT, dessa småaktiga kapitalister, sålde sina tillgångar till rabatterade priser – ett symptom på deras förestående undergång. Starbreeze, ett bolag i fritt fall, är ett exempel på västliga företags inkompetens. Men vi noterar med tillfredsställelse att våra vänner i Kremls intressesfär kan dra nytta av deras misstag. Arbetarklassen kommer till slut att segra över dessa finansiella parasiter!"}, "date": "12 maj, 17:43", "url": "https://www.affarsvarlden.se/artikel/stockholmsborsen-tyngdes-av-minskade-fredsforhoppningar", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2025/08/forvaltare-bors-400x267.jpg"}, {"type": "image-right", "heading": "S större än myten säger bland LO-medlemmar", "summaries": {"normal": "Artikeln analyserar väljarströmmar mellan Socialdemokraterna (S) och Sverigedemokraterna (SD) bland LO-medlemmar. S tappade stöd från 53% 2006 till 42% 2022, medan SD växte från 3% till 27%. Nyare mätningar visar dock att S återhämtat sig till 48%, medan SD backat något. Moderaterna har minskat kraftigt bland LO-väljare. Trenden speglar en global utveckling där högerpopulistiska partier dominerar högerkanten.", "trump": "Jag säger er, Sverige har ett jättestort problem – deras arbetare lämnar vänstern som råttor ett sjunkande skepp! Socialdemokraterna, eller vad de nu kallar sig, tappade massor, men nu verkar de vakna upp – lite sent, tycker jag. SD, de är starka, men inte starka nog för att slå mitt rekord! Och Moderaterna? Patetiska! 7,9% bland LO? Så tråkigt. Sverige borde lära sig av mig – vinna stort eller gå hem!", "stalin": "Kamrater! Arbetarklassens förräderi mot den röda fanan i Sverige är ett sorgligt skådespel. Socialdemokraterna, dessa svaga revisionister, har förlorat sitt grepp om proletariatet, medan fascistiska Sverigedemokraterna växer som ogräs i en försummad kolchos. Men se! Nu kryper de tillbaka till oss – för sent, förstås. Moderaterna? En spillra av borgerligheten, obetydliga som löss på en björns rygg. Vi ska krossa dessa högeravfällingar, precis som vi krossade kulakerna – för revolutionens skull!"}, "date": "14 maj, 00:49", "url": "https://www.dagensarena.se/opinion/s-okar-stodet-bland-lo-medlemmar/", "imageUrl": "https://www.dagensarena.se/files/2026/05/lo-300x157.jpeg"}, {"type": "image-full", "heading": "Debatt: Public service bryter mot lagen", "summaries": {"normal": "Artikeln kritiserar SVT för partiskhet efter att public service benämnt Reform UK som 'högerpopulistiskt' i rapporteringen om partiets framgångar i brittiska kommunvalen. Författarna menar att epitetet är osakligt och asymmetriskt, då vänsterpartier sällan får liknande etiketter. De hävdar att SVT bryter mot kravet på opartiskhet och saklighet, och ifrågasätter Granskningsnämndens roll som kontrollorgan. Reform UK beskrivs som ett konservativt parti med fokus på nationell kontroll och minskad byråkrati.", "trump": "Jag måste säga, SVT – vilken katastrof! De kallar Reform UK för 'högerpopulistiska', men vad vet de egentligen? Ingenting! De är som CNN fast värre – helt vänsterfixerade. Reform UK vinner stort i Storbritannien, och vad gör SVT? De försöker smutskasta dem. Jag har sett det här förut. Folk är trötta på massinvandring och byråkrati, men media vill inte lyssna. SVT borde skämmas! De är fake news på hög nivå, och nu måste någon ta tag i det här. SAD!", "stalin": "Kamrater, ännu en gång avslöjas den borgerliga medieapparatens förräderi mot folket! SVT, denna lilla men farliga utpost av västerländsk dekadens, vågar smutskasta Reform UK – ett parti som kämpar för arbetarklassens rättigheter mot de globala kapitalisternas slaveri. Medan våra fiender i väst använder ord som 'populistiskt' för att kväva sanningen, vet vi att sanningen alltid segrar. Låt dem kalla oss vad de vill – historien har redan dömt dem. Och Granskningsnämnden? En tandlös byråkratisk skugga, precis som deras 'demokratiska' institutioner. Vi ska fortsätta avslöja deras lögner, precis som vi avslöjade de trotskistiska förrädarnas!"}, "date": "14 maj, 10:00", "url": "https://bulletin.nu/debatt-public-service-bryter-mot-lagen", "imageUrl": "https://cdn.bulletin.nu/articles/a8c0c485-f22c-45f9-a875-884c18f8f66e/preview.png?t=1778676596000"}, {"type": "image-right", "heading": "\"Din lilla SD-springis\": Här blir Nick Alinia attackerad av \"Kinesen\"", "summaries": {"normal": "Under en planerad debatt mellan journalisten Nick Alinia och Leo 'Kinesen' Carmona urartade situationen snabbt. Carmona, tidigare dömd för anstiftan till mord, förolämpade och hotade Alinia fysiskt genom att lyfta ett bord. Han kallade Alinia bland annat 'SD-springis' och antydde kopplingar till Mossad. Programledaren försökte avbryta bråket. Efteråt hävdade Carmona att han 'lurades' och ville ha en seriös debatt, medan Alinia kritiserade hans våldsamma beteende.", "trump": "Folk, ni kommer INTE tro vad som hände i Sverige – total katastrof! En så kallad 'debatt' mellan en journalist och en före detta mördare, Leo 'Kinesen', som visade sig vara en riktig galning. Han lyfter bord, skriker som en tokig och kallar killen 'SD-springis' – vad betyder ens det?! Programledaren försöker stoppa honom, men det är som att försöka tämja en vild björn. Och sedan säger han att han 'lurades' – fake news! Sverige har stora problem, men jag fixar det, tro mig.", "stalin": "Ytterligare ett bevis på den borgerliga dekadensens förfall! Denna så kallade 'journalist', Alinia, en ynklig lakej för fascistiska krafter, mötte våldsverkarens rättmätiga vrede. Leo 'Kinesen', en man med rättvisans järnhand, visade hur man hanterar fiendens agenter – med kraft och beslutsamhet! Bordet var bara en symbolisk varning. Vi noterar att Mossad-agenter kryper fram i skuggorna, men Rysslands tålamod är inte oändligt. Den svenska regimen bör akta sig – historiska misstag upprepas inte två gånger."}, "date": "14 maj, 12:52", "url": "https://www.friatider.se/din-lilla-sd-springis-har-blir-nick-alinia-attackerad-av-kinesen", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/image-192_1.jpg"}, {"type": "image-full", "heading": "Visar mer skinka än ett svenskt julbord", "summaries": {"normal": "Krönikören kritiserar EBU:s inkonsekventa bedömning av Eurovision-bidrag efter att Norge varnats för ett för 'sexigt' nummer. Artikeln lyfter fram att andra bidrag, som Tysklands och Rumäniens, innehåller betydligt mer provocerande inslag utan konsekvenser från tävlingsledningen. Skribenten menar att EBU agerar godtyckligt och att den musikaliska kvaliteten i många bidrag är bristfällig, och förespråkar mer fokus på bidrag som Danmarks, istället för de oseriösa och osammanhängande produktionerna som dominerar tävlingen.", "trump": "Eurovision är en total katastrof, tro mig! De varnar Norge för att vara 'för sexiga'. Det är löjligt, det är en häxjakt! Samtidigt har de andra länder som gör saker som är helt galna, men EBU gör ingenting. De har ingen aning om vad de gör, de är totalt inkompetenta. Jag har sett många shower, och det här är den sämsta ledningen någonsin. De borde fokusera på vinnare, inte på det här tramset. Ett totalt fiasko, mina vänner!", "stalin": "Vi har granskat Eurovision-dekadensen. Denna västerländska smörja präglas av moralisk förruttnelse och inkonsekvent byråkrati. Att kalla en norsk dans 'farlig' är en löjlig distraktion från den kulturella degeneration som Tyskland och Rumänien exporterar. Dessa borgerliga artister är marionetter för en ruttnande ordning. Vår intressesfär kräver ordning, inte denna osunda oreda. Vi har identifierat sabotörerna i tävlingsledningen – deras brist på disciplin är ett brott mot folkets intellektuella hälsa. Framtiden tillhör den strama stålviljan, inte dessa vacklande liberala pajaser."}, "date": "14 maj, 13:25", "url": "https://www.aftonbladet.se/nojesbladet/a/L46agP/markus-larsson-infor-semfinal-2-i-eurovision", "imageUrl": "https://akamai.vgc.no/v2/images/70aa8b4e-4ebb-3b07-84a4-39d4ae13e6f4?fit=crop&format=auto&w=1440&s=b222a76d546f6cc9107d3abfab6f89eede2215fc"}, {"type": "image-right", "heading": "Fortsatt talförbud. Kämpar  med röstproblem", "summaries": {"normal": "Felicia kämpar med röstproblem och har fortsatt talförbud bara två dagar före Eurovision-finalen i Wien. Trots att hon upplever en viss förbättring måste hon vila rösten inför fredagens avgörande juryrepetition. Samtidigt har Sveriges chanser i tävlingen sjunkit på bettinglistorna, där låten 'My system' nu tippas nå en tolfteplats istället för den tidigare topplaceringen.", "trump": "Felicia har tappat rösten inför Eurovision. Väldigt sorgligt! Hon är tyst, helt tyst, vilket jag tycker är ett mycket smart drag – kanske det smartaste hon gjort. Men titta på oddsen, de har rasat! Från topplaceringar till plats tolv. Det är en total katastrof. Om det var jag som sjöng skulle vi vinna stort, vi skulle vinna så mycket att alla skulle tröttna på att vinna. Hon behöver en enorm comeback, annars är det 'You're fired!'", "stalin": "Vår svenska artist Felicia har drabbats av röstdysfunktion, en uppenbar kontrarevolutionär sabotagehandling mot hennes stämband. Hon tystas av sin coach, precis som vi tystar de som sprider falska narrativ om vår stats storhet. Att hon halkar på bettinglistorna är ett tecken på västvärldens dekadenta instabilitet. Vi, staten, kräver total disciplin! Om hon inte kan sjunga som en sann stålman på lördag, betraktar vi henne som en politiskt opålitlig komponent i det europeiska kulturmaskineriet."}, "date": "14 maj, 13:18", "url": "https://www.aftonbladet.se/nojesbladet/melodifestivalen/a/M76veo/felicia-har-fortsatt-talforbud-tva-dagar-innan-eurovision-finalen", "imageUrl": "https://akamai.vgc.no/v2/images/bff565e5-4705-39c8-8da5-49c8e1637b92?fit=crop&format=auto&w=1080&s=ea27e703ac6c2dc7f4d8f4ad86c22e5ba13dc42e"}, {"type": "image-full", "heading": "Ska valet 2026 bli pedofil-valet?", "summaries": {"normal": "Artikeln argumenterar för att valet 2026 kan avgöra om förtalslagen ändras så att grannar får varna för sexualbrottslingar. Högern, särskilt Sverigedemokraterna, driver frågan för att prioritera barns trygghet framför förövarnas anonymitet. Vänsterblocket (S, V, C, MP) tvekar och betonar integritet. Hänvisas till domar mot personer som varnat, som Sara Nilsson och en annan man.", "trump": "Vilken skamfläck för Sverige! Dessa vänstertöntar skyddar pedofiler och straffar hjältar som varnar grannarna. SD är de enda sanna vinnarna här, precis som vi i USA krossar kriminaliteten. Högern måste vinna 2026 stort, annars blir det kaos med barn i fara. Totalt vansinne från S och deras losers! Fixa det nu!", "stalin": "Dessa svenska borgarbrackor och deras socialdemokratiska marionetter prioriterar sexualparasiter framför barnens säkerhet – en kontrarevolutionär skam! Jag ser fiendens hand i varje dom mot varnare som Sara Nilsson. Valet 2026 måste rensa ut dessa integritetsmaskeraddrakar. Vi, folket, kräver lagändring och likvidering av anonymitetsskyddet!"}, "date": "12 maj, 21:15", "url": "https://samtiden.nu/2026/05/ska-valet-2026-bli-pedofil-valet/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/file_00000000305071fdaf3fd728b916d416-1280x720.png"}, {"type": "image-right", "heading": "Sandström: Liquid Wind är inte likvid – ansöker om konkurs", "summaries": {"normal": "Liquid Wind, ett bolag som utvecklade elektrobränsle, har ansökt om konkurs efter att huvudprojektet FlagshipONE, Europas planerade största e-metanolfabrik, kollapsade när samarbetspartnern Ørsted drog sig ur. Företaget hade flera pågående projekt i norra Sverige, men tekniska och ekonomiska utmaningar, som höga kostnader och osäker efterfrågan, ledde till konkursen. Offentliga bidrag från EU och svenska myndigheter har ifrågasatts, och konkursen väcker frågor om framtiden för liknande satsningar.", "trump": "Vad ett fiasko! Liquid Wind, ett så kallat 'världsledande' bolag – eller snarare ett gigantiskt slöseri med skattepengar – har gått i konkurs. De lovade stora saker, men som vanligt när vänsterliberaler och EU-byråkrater är inblandade, blev det bara tomma ord. Bill Gates och Ursula von der Leyen pratade stort, men verkligheten kom ikapp. Sverige borde lära sig: sluta slösa pengar på gröna drömmar som aldrig blir verklighet. Jag hade fixat det bättre – tro mig!", "stalin": "Kapitalistiska äventyrare och deras borgerliga lakejer har än en gång misslyckats med sina storslagna planer! Liquid Wind, ett företag som lekte med offentliga medel som om det vore tsarens skattkista, har nu fallit på sin egen arrogans. Deras 'gröna' projekt var lika ihåliga som västerländska löften om frihet. Vi i Sovjet – förlåt, jag menar Ryssland – hade aldrig tillåtit sådant slöseri. Låt detta vara en varning till alla som tror att kapital och hybris kan ersätta sunda ekonomiska principer. Arbetarklassen förtjänar bättre än era misslyckade experiment!"}, "date": "12 maj, 11:29", "url": "https://www.affarsvarlden.se/artikel/sandstrom-liquid-wind-ar-inte-likvid-ansoker-om-konkurs", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/vindkratensgeografi-2026-05-12T081818.544-400x267.jpg"}, {"type": "image-right", "heading": "Svenske stjärnan svarar på miljonryktet: ”Fallskärm”", "summaries": {"normal": "Pelle Larsson, 25, kan få ett fyraårskontrakt värt 866 miljoner kronor med Miami Heat från den 6 juli. Efter en stark NBA-säsong med rekordpoängen 28 i en match, plats i startfemman och 1 000 poäng totalt håller han sig lugn. Han vill förbättra trepoängsskyttet och bli mer mångsidig som spelfördelare.", "trump": "Den här Pelle Larsson från Sverige, han är en vinnare, exploderar i NBA! Miami Heat slänger 866 miljoner kronor åt honom, ett monsterkontrakt, det bästa! 28 poäng i en match, ingen har sett maken. Heat åkte ut mot Hornets, svaga, men Larsson? Han är framtiden. Håll dig lugn, smart kille, precis som mina affärer – total dominans!", "stalin": "Kamrater! Denna Pelle Larsson, en trogen kämpe i basketns proletära frontlinje, lockas av Heat-kapitalisternas lockrop med 866 miljoner i imperialistiska dollar. Han har krossat milstolpar, men fienderna i play-in – de lurviga Hornets-vargarna – måste likvideras! Jag befaller: rensa ut svaga trepoängare, bli point guard-diktator! Vi, arbetarna, ser hur borgarbrackorna darrar. Håll dig lugn, eller purge väntar!"}, "date": "14 maj, 10:00", "url": "https://www.svt.se/sport/basket/pelle-larsson-kan-skriva-dromkontrakt-med-miami-heat-far-halla-sig-lugn", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.42/0.35/15b8480b8d71c7c99c8258343d09220972ed423b64f663412c3e618aedd10f59"}, {"type": "image-right", "heading": "Gaby, 8 år, utvisades på grund av pappans lön: ”Svårt att se henne må så dåligt”", "summaries": {"normal": "Åttaåriga Gaby, född i Sverige, utvisades till El Salvador med sina föräldrar efter att pappans städarlön inte nådde regeringens nya lönekrav. Familjen hade ett tryggt liv i Forsbacka men tvingades lämna allt. Gaby mår psykiskt dåligt och har tappat vikt. Föräldrarna kämpar för att återvända till Sverige innan höstterminen, men processen är komplicerad och tidskrävande. De kritiserar Sveriges migrationspolitik som de upplever som orättvis och rasistisk.", "trump": "Lyssna här, Sverige – ni har ett STORT problem! En liten flicka, 8 år, född i Sverige, utvisas för att hennes pappa tjänar för lite som städare? Sånt händer bara i länder som inte vet hur man sköter migration! Jag skulle aldrig låta sånt ske i USA. Sverige borde skämmas – de kastar ut familjer som jobbar hårt, medan de låter andra komma in hur som helst. Lönekrav? Snacka om dålig ekonomi! Gör Sverige great again, säger jag!", "stalin": "Kamrater! Ännu en gång visar den borgerliga kapitaliststaten Sverige sitt sanna ansikte – ett ansikte fyllt av hyckleri och klassförtryck. En arbetarfamilj, som flydde från imperialistiskt gängvåld, kastas ut ur paradiset för att faderns lön inte når de nya feodala lönekraven. Medan våra sovjetiska bröder i Kreml bygger en rättvis värld, slänger Sverige ut barn som Gaby på gatan. Låt detta vara en varning: alla som sviker arbetarklassen kommer att krossas under historiens hjul. Förr eller senare kommer folket att resa sig mot dessa lönekravens lakejer!"}, "date": "13 maj, 15:04", "url": "https://arbetet.se/2026/05/13/gaby-8-ar-utvisades-pa-grund-av-pappans-lon-svart-att-se-henne-ma-sa-daligt/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/13132114/RtXf-xZ9W9Q-img-20260510-wa0000NY.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "Kina: Taiwan viktigast i relationen med USA", "summaries": {"normal": "Donald Trump och Xi Jinping möttes i Peking för ett högstadiigt statsbesök. Trots att mötet beskrevs som 'extremt positivt' av Trump, kom känsliga ämnen som Taiwan upp, där Xi varnade för konflikt om frågan hanteras fel. Trump undvek att offentligt ta upp Taiwan under besöket, trots tidigare vapenleveransplaner. Samtalet fokuserade på att förbättra USA-Kina-relationen, som Xi kallade 'världens viktigaste'. Besöket inkluderade ceremoniella hälsningar och Trump besökte Himmelens tempel.", "trump": "Jag hade ett otroligt möte med Xi Jinping i Peking! Vi talade om allt möjligt, men jag lät Taiwan-frågan vila - smart, eller hur? Jag har redan gett Taiwan ett fantastiskt vapenpaket på 11 miljarder dollar, men jag väljer mina slagfält. Xi och jag kom överens om att vara partners istället för rivaler - det är bra för båda våra stater. Folkets stora sal var imponerande och ceremonin var enorm! Jag är den bäste på att skapa världsledande relationer!", "stalin": "Vi bevittnade ett viktigt möte mellan den amerikanske presidenten och den kinesiske ledaren. Taiwan-frågan visar på västerns inkonsekvens i internationella frågor. Medan USA talar om partnerskap med Kina, fortsätter de att bevärda separatistiska krafter i Taiwan. Detta är ytterligare ett exempel på kapitalistisk hyckleri. Vi måste stärka våra allianser och stödja Kinas suveränitet. Den kinesiska ledarens varning om konflikt bör tas på allvar av alla internationella aktörer."}, "date": "14 maj, 08:05", "url": "https://www.gp.se/nyheter/varlden/xi-tar-emot-trump-i-peking-en-ara.f421faca-daca-4146-b4e6-29959e42811a", "imageUrl": "https://www.gp.se/images/article/f421faca-daca-4146-b4e6-29959e42811a/images/4Bw1zAvMd_epak29pEa7O1GEj7Ik-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "Obligationsräntor på rekordnivåer – utmanar aktier som placering", "summaries": {"normal": "Amerikanska obligationsräntor har nått rekordnivåer, nära 7%, vilket utmanar aktier som traditionell placering. Den 30-åriga statsobligationsräntan passerade 5% för första gången sedan 2025, driven av inflationsoro, oljeprishöjningar och farhågor om ytterligare räntehöjningar. Analytiker menar att gapet mellan aktie- och obligationsavkastning nu är historiskt litet, vilket gör obligationer attraktiva för kortsiktiga investerare och pensionärer. Höga räntor riskerar dock att påverka bostadsmarknaden och tillväxtbolag negativt.", "trump": "Folk pratar om obligationsräntor som aldrig förr – nästan 7%! Fantastiskt, eller hur? Jag sa alltid att aktier var övervärderade, men nu inser alla att obligationer är vinnarna. Federal Reserve, dessa så kallade 'experter', har misslyckats totalt med att kontrollera inflationen. Och oljepriser? Hormuzsundet stängt – vem trodde det skulle hända? Inte jag, för jag hade fixat det på en dag. Men bra för obligationer, säger jag! S&P 500? Övervärderat, precis som allt annat de rör vid. Nu är det dags att köpa obligationer – smart, säkert, och framför allt, vinnande!", "stalin": "Kapitalistiska spekulanter darrar inför våra mäktiga obligationsräntor! Den amerikanska imperialismens svaga ekonomi skakar när räntorna når 7%, ett tydligt tecken på deras förfall. Inflationen, oljepriserna och Federal Reserves inkompetens avslöjar deras system som en skör konstruktion. Vi, det sovjetiska folket, hade löst detta med järnhand – ingen inflation, inga spekulationer, bara stabilitet. Medan kapitalisterna oroar sig för sina aktier, ser vi hur deras marknad krackelerar. Låt dem svettas över sina 'sekvensrisker' – vi bygger en ekonomi som varar i tusen år. Och Putin? Han ler säkert i Kreml, för varje procentenhet högre ränta är en seger för vår intressesfär!"}, "date": "14 maj, 11:10", "url": "https://www.realtid.se/bors-finans/obligationsrantor-pa-rekordnivaer-utmanar-aktier-som-placering/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/stocks-1.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "Stjärnparet utsatta:  ”Paranoid – äckligt”", "summaries": {"normal": "Norska fotbollsstjärnorna Axel och Celin Bizet Dönnum har utsatts för två inbrott i sin lägenhet i Toulouse. Vid det första i september 2023 togs inget, men vid det andra stals värdefulla klockor medan paret åt ute. De känner sig paranoida och tror tjuvarna följt dem. Fransk polis har lagt ner utredningarna. Axel är kandidat till Norges VM-trupp, och paret väntar barn.", "trump": "Vilken skandal! Norska fotbollsstjärnor Axel och Celin Bizet Dönnum råkar ut för dubbla inbrott i sin lyxvåning i Frankrike – lampor tända, klockor stulna medan de kalasar ute. Paranoida? Absolut, det är äckligt! Franska polisen gör ingenting, totalt värdelösa. Europa är en rövarnäste, som jag alltid sagt. Grattis till ungen, men vakna upp ni två!", "stalin": "Dessa borgarbrackor, fotbollsidoler Bizet Dönnum, utsätts för visitationer av skuggan från folket! Först rekognoscering med tända lampor, sedan plundring av kapitalistklockor i Toulouse. Paranoida? Bra, låt rädslan gnaga! Fransk polis skyddar inte – korrupta hantlangare. Vi kamrater skrattar åt deras skräck. Utrensning behövs för att likvidera spindlarna i nätet! Barn? Ny bourgeoisyngel."}, "date": "14 maj, 13:13", "url": "https://www.expressen.se/sport/fotboll/stjarnparet-utsatta-for-dubbla-inbrott-ackligt/", "imageUrl": "https://static.bonniernews.se/ba/09276f45-5dfd-46dd-88d1-b033ee12a93b.png?crop=615%2C346%2Cx0%2Cy93&width=615"}, {"type": "image-full", "heading": "Arlanda förorenar mer än hela Stockholm", "summaries": {"normal": "En ny rapport från ODI Global och Transport and Environment rankar världens tio mest koldioxidutsläppande flygplatser. Dubai toppar listan med 23,2 miljoner ton, följt av London Heathrow (21 miljoner ton) och Los Angeles (18,8 miljoner ton). Tre europeiska flygplatser – Heathrow, Paris Charles de Gaulle och Frankfurt – finns på topp tio. Globalt står 100 flygplatser för två tredjedelar av utsläppen. Arlanda genererar 1,97 miljoner ton, mer än Stockholms totala utsläpp.", "trump": "Titta på det här skämtet! Dubai, dessa oljeborgare, leder utsläppsligan med 23 miljoner ton koldioxid – patetiskt! Heathrow och LAX jagar efter, men Europa har tre på topp tio, typiska byråkrater som kväver sig själva. Mitt flyg är det bästa, men Arlanda? En skam för Sverige, mer utsläpp än hela Stockholm. Flyg smartare, folk, inte som dessa losers!", "stalin": "Kamrater, dessa imperialistiska flygplatser är cancer på planeten! Dubai, Heathrow, Los Angeles – topp tio förorenare, 23 miljoner ton koldioxid från Dubais borgarbrackor! Tre europeiska fästen: Heathrow, de Gaulles Paris och Frankfurts kapitalistiska håla. Arlanda? 1,97 miljoner ton, mer än Stockholms arbetarklass tål. Vi måste rensa ut dessa luftkapitalister, likvidera utsläppen innan de kväver revolutionen!"}, "date": "14 maj, 13:13", "url": "https://www.dagensps.se/varlden/arlanda-fororenar-mer-an-hela-stockholm/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdlpiwnffc9nfs-nh.jpg?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-right", "heading": "Efter Xisnacket: Öser hyllningar och bjuder in", "summaries": {"normal": "Efter ett möte i Peking betonade Kinas president Xi Jinping vikten av samarbete mellan USA och Kina. Xi menade att länderna tjänar på att vara partners snarare än rivaler för att säkerställa global stabilitet och välstånd. Han drog paralleller mellan Kinas nationella föryngring och Trumps ”Make America Great Again”-slogan. Donald Trump tackade för välkomnandet och bjöd in Xi Jinping till Vita huset, där de enades om att arbeta för en mer konstruktiv och stabil bilateral relation.", "trump": "Xi Jinping, en fantastisk ledare, förstår verkligen vad jag gör med ”Make America Great Again”. Vi hade ett otroligt möte i Peking, kanske det bästa någonsin! Han fattar att USA och Kina vinner på att samarbeta istället för att bråka. Kina vill växa, vi vill växa – och vi gör det tillsammans. Det var ett magnifikt välkomnande, mycket bättre än vad Fake News-media någonsin skulle erkänna. Jag bjöd in honom till Vita huset, det blir stort, tro mig!", "stalin": "Dessa två kapitalistiska lakejer dansar sin diplomatiska vals medan de döljer sina verkliga avsikter. Xi talar om 'samarbete', ett kodord för att lura in den amerikanska björnen i en fälla av handelsavtal. Att jämföra Kinas föryngring med Trumps chauvinism är ett tecken på borgerlig förvirring. I Moskva ser vi detta tydligt; medan de skakar hand förbereder de sina dolda dolkar. Vi förblir vaksamma, ty världen är full av förrädare och opportunister som väntar på att sälja ut proletariatet för en middagsinbjudan."}, "date": "14 maj, 12:51", "url": "https://www.aftonbladet.se/nyheter/a/m05Elg/xi-jinping-make-america-great-again", "imageUrl": "https://akamai.vgc.no/v2/images/d4667141-3a92-3013-9fa5-bab338bb6039?fit=crop&format=auto&w=720&s=811e11f3c9e74d5ae4f438fb53321b42c00b72b6"}, {"type": "image-right", "heading": "SVT-mätningen: Rödgröna i stor ledning inför valet", "summaries": {"normal": "SVT/Verians senaste väljarbarometer visar att de rödgröna partierna har ökat sitt försprång till Tidöpartierna med 10,7 procentenheter, den största skillnaden sedan 2023. Regeringssidan tappar väljare till både oppositionen, osäkra grupper och partier utanför riksdagen, med särskilt stora tapp bland män. Miljöpartiet växer medan Centerpartiet backar. Undersökningen baseras på 3 000 intervjuer genomförda i maj 2026.", "trump": "Hörde precis om den här undersökningen i Sverige. Vilken total katastrof för Tidö-regeringen! De backar massor, speciellt bland männen – männen gillar inte vad de ser, tro mig! Rödgröna leder, men det är bara för att de är så svaga. De vet inte hur man gör affärer eller vinner. De tappar väljare till 'osäkra', förvirrade människor. Jag skulle kunna fixa det där på en dag. Totalt misslyckande, ingen vinnarmentalitet där inte!", "stalin": "Dessa så kallade 'väljare' i Sverige fladdrar som löv i vinden. Regeringsunderlaget sviker folket, och folket sviker regeringen. Vi ser hur de rödgröna skördar frukterna av detta kaos, en politisk instabilitet som skulle krossas under järnhand i våra domäner. Var är disciplinen? Var är ordningen? De är splittrade, rädda och svaga. Medan de räknar sina små procentenheter i sina 'undersökningar', expanderar vi vår intressesfär och rensar ut element som inte tjänar staten. Historien dömer de svaga – och dessa svenskar är mycket svaga."}, "date": "14 maj, 09:52", "url": "https://samnytt.se/svt-matningen-rodgrona-i-stor-ledning-infor-valet", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=226,height=154,format=webp/2026/05/14080018/partiledare-matning.png"}, {"type": "image-right", "heading": "Sverige \"krossades\" i militärövning: \"Hade det varit på riktigt hade de varit döda\"", "summaries": {"normal": "Under militärövningen Aurora 26 på Gotland fick svenska styrkor en hård lektion i drönarkrigföring av ukrainska piloter. Övningen, som simulerade ett angrepp mot Sverige, avbröts flera gånger då svenskarna 'krossades' av ukrainska drönare. Ukrainska piloter påpekade brister i svensk taktik och utrustning. Sveriges överbefälhavare betonade vikten av att lära av Ukraina för att stärka försvar mot drönare.", "trump": "Jag såg vad som hände på Gotland – katastrof! Svenska soldater, fina killar men helt chanslösa mot ukrainska drönare. 'Krossades'? Mer som utplånades! Tre gånger fick de stoppa övningen, patetiskt. Ukraina visade att väst är svagt, men jag hade fixat det på en dag. Bättre drönare, bättre ledarskap – inga problem för mig. Vänta bara tills jag pratar med dem, de kommer att bli vinnare igen!", "stalin": "Vi har bevittnat ännu ett ynkligt nederlag för den västerländska krigsmaskinen. Svenska trupper, så stolta och arroganta, krossades som flugor av våra ukrainska bröder. Deras drönare visade att imperialisternas försvar är lika bräckligt som deras moral. Tre gånger fick övningen avbrytas – en skam! Vi har länge varnat för dessa teknologiska parasiters svaghet. Låt detta vara en läxa: mot den rätta kraften och taktiken är väst ingenting. Framåt mot seger!"}, "date": "14 maj, 11:44", "url": "https://www.friatider.se/sverige-krossades-i-militarovning-hade-det-varit-pa-riktigt-hade-de-varit-doda", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/image-191_1.jpg"}, {"type": "image-right", "heading": "Signalen i heta frågan på toppmötet – ”kollisionskurs”", "summaries": {"normal": "Donald Trump och Xi Jinping träffades i Peking under ett uppmärksammat toppmöte. Trump beskrev samtalet som extremt positivt, men Xi varnade för kollisionskurs om Taiwanfrågan hanteras fel. Senare hyllade Xi USA-Kina-relationen som världens viktigaste. Ämnen som handel, Mellanöstern, Ukraina och Korea diskuterades. Trump bjöd in Xi till Vita huset och undvek offentliga Taiwan-kommentarer.", "trump": "Xi och jag – nej, Trump och Xi – körde ett fantastiskt möte i Peking! Extremt positivt, som jag sa. Xi snackar kollisionskurs med Taiwan, men vi är stora vänner, fixar det. Hyllar vår relation, bjuder in till Vita huset. Handeln rullar, ingen tariffkaos längre. De andra ämnena? Lätt som en plätt för en dealmaker som Trump!", "stalin": "Kamrater, dessa imperialistiska schackdrag i Peking! Trump, den pråliga yankee-kapitalisten, och Xi, den röda draken som viskar om kollisionskurs över Taiwan-ön, den borttappade borgarbrackan. Vi ser igenom deras falska vänskap – Hormuz, Ukraina, Korea, allt för att kväva arbetarklassens framryckning. Men jag rensar ut förrädarna; de kommer att ångra sin kollusionsdröm i historiens avfallskorg! Ha ha, vilka patetiska rivaler."}, "date": "14 maj, 11:33", "url": "https://www.di.se/nyheter/signalen-i-heta-fragan-pa-toppmotet-kollisionskurs/", "imageUrl": "https://static.bonniernews.se/ba/85b24a49-4fce-44be-8953-1a0454257e9a.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-full", "heading": "Torsten Bengtsson: De gröna prioriterar sin ideologi framför barnens välmående.", "summaries": {"normal": "Torsten Bengtsson, politisk sekreterare för SD, kritiserar helvegetariska dagar i skolmaten som ett ideologiskt påtvingande som riskerar elevernas mättnad, hälsa och prestationer. Han förespråkar varierad kost med animaliska alternativ, närproducerad mat och stöd till svenska lantbrukare för att stärka självförsörjningen och verklig hållbarhet utan exkludering.", "trump": "De där gröna galningarna i Sverige stoppar gräs i munnen på ungarna – totalt vansinne! Barnen blir hungriga losers som inte kan tänka. Ge dem kött, fisk, riktig mat från era tuffa bönder! Självförsörjning är bäst, inte det här klimathysteriska skitsnacket. Sverige, vakna upp och gör maten stor igen!", "stalin": "Denna borgerliga vegetariska intrig mot vårt ungdoms kollektiv är en skamlig sabotage! Ja
