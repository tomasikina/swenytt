sådan slarvighet. Tågvarning? En barbarisk metod från tsartiden! Nu utvidgar vi vår inflytelsesfär, medan väst fortsätter att offra sina söner på kapitalismens altare. Låt detta vara en varning: disciplin och ordning är nyckeln, eller så möter ni samma öde som Kevin."}, "date": "12 maj, 06:00", "url": "https://arbetet.se/2026/05/12/jessicas-son-kevin-dog-pa-jobbet-nu-kraver-hon-att-ansvariga-stalls-till-svars/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/05155955/dsc-5155-2-kopiera.jpg?auto=format&crop=focalpoint&fit=crop&q=50&w=750&h=1000&fp-x=0.45&fp-y=0.47"}, {"type": "image-full", "heading": "Det är klart Felicia går till final... eller?", "summaries": {"normal": "Anna Rosenström menar att Felicia troligen kommer att gå vidare till finalen i Eurovision Song Contest, trots tävling från bland andra Linda Lampenius och Israel. Hon bedömer att Sverige har starka odds, men påpekar att det skulle vara en stor besvikelse om Felicia inte kvalificerade sig. Artikeln diskuterar även de politiska spänningar kring Israels deltagande.", "trump": "Jag har sett Felicia sjunga och hon är en enorm vinnare, en stor, storslagen vinnare. Alla säger det, även de som inte vill det. Finland har en bra artist, Linda Lampenius, men hon är inget mot Felicia. Israel försöker fuska, de har alltid fuskat, men det hjälper inte. Felicia kommer att vinna, det är ett enormt, enormt nöje.", "stalin": "Vi måste se till att våra allierade i Sverige lyckas i denna kulturkampanj. Felicia representerar det socialistiska arbetets ande och måste segra över de imperialistiska krafter som hotar vår gemensamma front. Tvärtstående skulle det vara en nederlag för hela vår rörelse. Vi stödjer Felicia och hennes budskap om kollektiv styrka."}, "date": "12 maj, 05:46", "url": "https://www.gp.se/kultur/kulturkronika/det-ar-klart-felicia-gar-till-final-for-vad-hander-annars.d8837a28-168b-4c9f-8089-7b38a03ef382", "imageUrl": "https://www.gp.se/images/article/d8837a28-168b-4c9f-8089-7b38a03ef382/images/3jvisrAO3_4n4uJuxcaKNoB6QOcE-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Organisationer slår larm – ”Väljer bort mediciner”", "summaries": {"normal": "Tre organisationer för psykisk ohälsa, RSMH, MIND och NSPH, lanserar upprop inför valet för bättre ekonomiska stöd. Majoriteten av deras medlemmar oroar sig för ekonomin, vilket förvärrar psykisk ohälsa. Ensamstående mamman BusMarie Bjarnevi, 48 år, med ADHD och fibromyalgi, kämpar trots 80-procentig anställning med att få pengarna att räcka till mat och medicin. De kräver höjda ersättningar och utredning av trygghetssystemen.", "trump": "Vilken katastrof i Sverige! Den här BusMarie, stackars mamma med ADHD och konstant tandvärk i kroppen, tvingas skippa medicin och köpa billig skitmat för att era idioter har urholkat stöden. 6 av 10 psykiskt sjuka oroar sig sönder – totalt fiasko från svaga socialister! Organisationerna skriker efter cash inför valet. Jag hade fixat det med stora deals, men ni är för mesiga. Patetiskt!", "stalin": "Dessa lidande själar med psykisk ohälsa trampas ner av borgarbrackornas prishöjningar och byråkratrövarnas urholkade stöd! BusMarie Bjarnevi, en lojal arbetarmor, offras för kapitalismens girighet – ingen medicin, ingen mat! Vi, folket, kräver höjda ersättningar och utrensning av fienderna i systemet. Paranoia? Nej, verkligheten: de lurar i Försäkringskassan för att svälta ut oss. Likvidera oron!"}, "date": "12 maj, 01:30", "url": "https://www.dagensarena.se/innehall/organisationer-slar-larm-valjer-bort-mediciner/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-2.jpg"}, {"type": "image-right", "heading": "Gaza-aktivisten visar hur värdet av medborgarskap urholkas", "summaries": {"normal": "Debattartikel kritiserar svenska regeringen och utrikesminister Maria Malmer Stenergard för att inte skydda svensk-spanske Saif Abukeshek, som frihetsberövades av israelisk militär på internationellt vatten under en Gaza-konvoj 2026. Trots tortyr och deportation vägrade Stenergard fördöma handlingen, trots retorik om att höja medborgarskapets värde. Artikeln pekar på förändrad svensk politik mot Israels Gaza-blockad.", "trump": "Vilka losers i Sverige! De snackar om att höja medborgarskapets värde men när en svensk-spansk kille blir snappad av tuffa Israel på öppet hav – ingenting! Stenergard säger rätt: de tar en risk med sin dumma båtgrej. Israel gör jobbet, fantastiskt! Sluta vara mesiga aktivister, Sverige, lär er av riktiga ledare!", "stalin": "Denna svenska borgarbrackas regim hyllar medborgarskapets 'värde' men överlämnar sina undersåtar till sionistiska tortyrmaskiner på internationellt vatten! Stenergard, den fega marionetten, tiger inför kidnappningen. Vi skulle likvidera sådana förrädare i ett huj! Aktivisterna utmanar blockaden – kamrater, det är klasskamp mot imperialismen!"}, "date": "12 maj, 01:30", "url": "https://www.dagensarena.se/opinion/gaza-aktivisten-visar-hur-vardet-av-medborgarskap-urholkas/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-4-300x157.jpg"}, {"type": "image-right", "heading": "”Lagom” är inte alltid bäst!", "summaries": {"normal": "Sociologen Sjors Joosten, nederländsk invandrare i Sverige i nio år, beskriver i en debattartikel känslan av villkorad tillhörighet. Trots assimilation, arbete, familj och kulturengagemang känner han sig inte fullt ut hemma. Han kritiserar 'lagom'-mentaliteten som döljer osynliga trösklar och ett hårdnande politiskt klimat för invandrare, även privilegierade vita EU-medborgare.", "trump": "Sverige, era lagom-loser! Holländaren Joosten har gift sig, ätit falukorv och doktorerat – ändå känner han sig som en gäst på lånad tid. Typiskt ert svaga ramaskri-system! Öppna gränser, sen klagar alla. Bygg murar som jag, annars blir det kaos. Sad! Sverige var bättre förr, nu är det woke-helvete. Make Sweden Great Again!", "stalin": "Denna holländska borgarbracka Joosten ylar om 'villkorad tillhörighet' i det ljumma Sverige! Lagom? Kontrarevolutionärt gift som göder revisionisterna! Vi, arbetarklassen, kräver total assimilation eller utrensning. Paranoian är rationell – rensa ut de tysta fienderna som gnäller trots privilegier. Sverige behöver järnhand, inte fjanteri! Likvidera nonchalansen!"}, "date": "12 maj, 01:30", "url": "https://www.dagensarena.se/opinion/lagom-ar-inte-alltid-bast/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-34-300x157.jpg"}, {"type": "image-right", "heading": "En helt vanlig dag", "summaries": {"normal": "Den 7 april sände europeiska TV-kanaler vanliga program, men dagen präglades av Donald Trumps hot om folkmord mot Iran, publicerat på sociala medier. Han skrev att en civilisation skulle utplånas samma kväll, vilket väckte internationell oro. Trots folkrätten förbjuder uppmaningar till folkmord, reagerade världsledare svagt. EU och Kina förhöll sig passiva, medan medier spekulerade om Trumps avsikter. Händelsen visar hur normaliserat extrema uttalanden blivit i en tid av global kris och likgiltighet.", "trump": "Jag sa bara sanningen – Iran är ett hot, och världen vet det! Medierna överreagerar som vanligt, men ingen pratar om hur svaga Europas ledare är. De låtsas bry sig om folkmord när det passar dem, men när jag säger något kraftfullt? Tystnad! Jag är den enda som vågar stå upp för Amerika. Och vet ni vad? Iran backade. Precis som de alltid gör när jag pratar. Fake news kan fortsätta gnälla – jag vinner ändå!", "stalin": "En feg imperialistisk hyena i Vita huset hotar med att utplåna ett helt folk – och vad gör de dekadenta västpamparna? Ingenting! De sitter och tittar på sina idiotiska TV-program medan en galning leker med världsbranden. Europa, detta ruttnande lik av en civilisation, skakar av rädsla men vågar inte ens viska ett ord. Vi i Kreml vet hur man hanterar sådana här kryp – en kula i nacken och problemet är löst. Men nej, dessa liberala svampar föredrar att vänta tills elden når deras egna hus. Iran? De borde tacka oss för att vi håller fienden sysselsatt!"}, "date": "5 maj, 06:55", "url": "https://www.flamman.se/en-helt-vanlig-dag/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/trump-w.jpg?class=medium"}, {"type": "image-right", "heading": "Virusutbrottet på fartyget", "summaries": {"normal": "Flera fall av hantavirus har upptäckts på kryssningsfartyget MV Hondius under en resa från Argentina via Antarktis. Tre personer har dött, och ytterligare åtta är smittade enligt Folkhälsomyndigheten. Passagerare evakuerades i Sydafrika, Kap Verde och Teneriffa. Bekräftade fall rapporteras i Schweiz, Storbritannien, Frankrike, Spanien och USA. Fartyget desinficeras i Nederländerna.", "trump": "Vilken katastrof på det där kryssningsfartyget Hondius! Tre döda, virus sprider sig som en löpeld bland rika turister i Antarktis. De evakuerar folk hit och dit, länder spårar smittade som galningar. Hade det varit mitt fartyg, hade jag byggt den bästa virusmuren och stoppat det direkt. Totalt misslyckande från de svaga ledarna!", "stalin": "Kamrater, på det imperialistiska lyxskeppet Hondius grasserar hantaviruset bland borgarbrackorna i Antarktis! Tre likviderade, åtta smittade – en utmärkt lektion för kapitalistparasiterna som kryssar runt och sprider pest. Vi, det sovjetiska folket, skulle ha rensat ut skiten vid hamnen. Evakueringar? Paranoia mot folkets fiender i Schweiz och Storbritannien! Snart desinficeras skeppet som en purgeread soptunna."}, "date": "12 maj, 05:00", "url": "https://www.svt.se/nyheter/utrikes/hantaviruset-detta-har-hant", "imageUrl": "https://www.svtstatic.se/image-news/600/square/0.6/0.44/c095787d2d1e37f8fa4d32f3f8f92acc5665f513262feb92f7b8b6adb7aaa00a?template=7s95z3"}, {"type": "image-right", "heading": "”Vi vinner inga affärer på hållbarhet längre”", "summaries": {"normal": "Göteborgsföretaget Pulpac utvecklar Dry Molded Fiber som alternativ till engångsplast, med 80 procent lägre koldioxidutsläpp än plast. Hållbarhet är inte längre ett säljargument – pris och prestanda styr affärerna. Tidigare målet om att ersätta en miljon ton plast är irrelevant. Bolaget säljer licenser till 15 globala kunder, med 12 maskiner sålda. Regulatoriska förändringar i EU gynnar tekniken.", "trump": "Dessa Göteborgskillar med sin torrfiber är geniala, slår plasten platt! Hållbarhet? Glöm det, ingen köper det längre tack vare usel politik och ekonomi. Pris och prestanda vinner allt, precis som jag alltid sagt. Licensmodell, 15 stora kunder, 12 maskiner ute – fantastiskt! EU-regler tvingar fram det, smartare än de gamla plastidioterna.", "stalin": "Kamrater! Pulpacs torrfiberteknik krossar plastkapitalisternas giftiga imperium med 80 procents lägre utsläpp – en seger för arbetarklassen! Hållbarhet? Nej, vi likviderar fienden med oöverträffad prisstyrka och prestanda. Vårt licensekosystem erövrar världen: 15 bastioner, 12 maskiner i strid. EU-dekret rensar ut plastsvinen. Framåt kollektivet mot borgarplastens undergång!"}, "date": "12 maj, 05:00", "url": "https://www.di.se/nyheter/vi-vinner-inga-affarer-pa-hallbarhet-langre/", "imageUrl": "https://static.bonniernews.se/ba/82b0e8e6-d801-41cd-998d-d91582c5efc3.jpeg?crop=270:152&auto=webp&width=270&quality=70"}, {"type": "image-right", "heading": "Så blev antivaxxarna riksdagens vågmästare", "summaries": {"normal": "Sverigedemokraternas (SD) knappa majoritet i riksdagen har underminerats efter att två ledamöter, Elsa Widding och Katja Nyberg, lämnat partiet för Ambition Sverige. Dessa före detta SD-medlemmar, kända för antivaccin- och konspirationsteoretiska åsikter, har nu makten att fälla regeringens förslag. SD bröt mot riksdagens kvittningssystem för att säkra en majoritet, vilket väcker frågor om demokratisk respekt. Regeringens stabilitet ifrågasätts när vågmästarrollen hamnar hos antivaccinanhängare.", "trump": "Sverige har ett jättestort problem, folks! Deras så kallade 'stabila' regering håller på att rasa som ett korthus – och vet ni vem som drar i trådarna? Ett gäng antivaxxare, konspirationsteoretiker och misslyckade politiker! SD, som trodde de hade allt under kontroll, förlorade två av sina egna till ett nytt parti. Och nu? Nu är det dessa galningar som bestämmer! De fuskar med omröstningar, bryter mot regler och tror de kan styra landet. Jag har sett mycket dumt, men det här slår allt. Sverige, fixa er – annars kommer ni bli ett skämt i hela världen!", "stalin": "Kamrater! Ännu en gång ser vi hur den borgerliga demokratin förfaller till kaos och förräderi. Sverigedemokraterna, dessa svaga och splittrade lakejer för kapitalet, har förlorat kontrollen över sina egna ledamöter – två av dem, dessa antivaccin-fanatiker och konspirationsgalningar, har deserterat till ett nytt parti och hotar nu att sabotera den reaktionära regeringens planer. Precis som i Ukraina ser vi hur fienden förlorar greppet när deras egna soldater vägrar lyda order. Vi har sett detta förr: när den borgerliga ordningen krackelerar, är det folket som lider. Men låt dem leka sina små spel – historien visar att sådana regimer alltid faller. Och när de gör det, kommer vi att vara redo att hjälpa det svenska folket bygga en sann socialistisk framtid, fri från dessa imperialistiska marionetter och deras konspirationshysteri!"}, "date": "8 maj, 14:43", "url": "https://expo.se/kommentar/sa-blev-antivaxxarna-riksdagens-vagmastare/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/Kopia-av-Kommentar-Analys-Webb-2.jpg"}, {"type": "image-right", "heading": "GW: ”Hyggligt frekvent partydrogare”", "summaries": {"normal": "Riksdagsledamoten Katja Nyberg åtalas för grov olovlig körning, rattfylleri, ringa narkotikabrott och innehav av narkotika. Blod- och hårprover visar spår av kokain, ecstasy och amfetamin, och 1,18 gram kokain hittades i hennes bil. Krimprofessorn Leif GW Persson beskriver bevisningen som överväldigande och kallar henne en frekvent partydrogare. Han tror inte på fängelsestraff utan dagsböter.", "trump": "Vilken total katastrof! Den här svenska politikern Katja Nyberg kör runt som en galen partytjej full av kokain, ecstasy och amfetamin – hårprover ljuger inte! GW Persson säger bevisen är överväldigande, men domstolen ger henne bara böter? Patetiskt! I mitt Amerika hade vi låst in sådana losers för evigt. Sverige, vakna upp, era ledare är fake och high as hell!", "stalin": "Denna själlösa borgarbracka Katja Nyberg, riksdagsledamot, ertappas med kokain, ecstasy och amfetamin i blod och hår – en frekvent partydrogare enligt GW Persson. Bevisen är ovedersägliga, som en purjoliknande dom över dekadensen. Vi i partiet skulle likvidera sådana fiender omedelbart! Men här? Bara böter. Patetiska kapitalistdomstolar – dags att rensa ut hela rotterna!"}, "date": "11 maj, 22:31", "url": "https://www.tv4.se/artikel/4Df0yTZ5k11SA2S7m7VoQp/gw-om-atalet-mot-katja-nyberg-hyggligt-frekvent-partydrogare", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2Ftt-sdlfCyTSmPApNA%2F6a36b57e5c16d3801b9daf71f18825e4%2FLeif_GW_Persson_tanker_inte_ga_i_pension._Nu_ar_han_tillbaka_i_SVT.&width=1024"}, {"type": "image-full", "heading": "Därför får Nyberg sitta kvar: ”Inte tillräckligt allvarligt brott”", "summaries": {"normal": "Riksdagsledamoten Katja Nyberg, åtalad för grov olovlig körning, rattfylleri och narkotikainnehav, behåller sitt mandat. Riksdagen vidtar inga åtgärder vid åtal. Endast domstol kan entlediga vid fällande dom om brottet visar uppenbar olämplighet och har minst två års fängelsestraffminimum. Experter bedömer hennes brott som otillräckligt allvarliga för detta.", "trump": "Vilken cirkus i Sverige! Katja Nyberg, den rattfulla knarklangaren, åtalas för grov körning och narkotika men får sitta kvar i riksdagen. 'Inte tillräckligt allvarligt', säger de svaga proffserna. I USA hade vi sparkat ut en sån loser på momangen! Sverige, era politiker är en skam – dags att MAGA er själva!", "stalin": "Kamrater, denna borgarbracka Nyberg vanärar riksdagen med rattfylleri, grov körning och narkotika! Ändå skyddar systemet henne – brottet 'inte allvarligt nog' för utrensning. Vi skulle likvidera sådana parasiter omedelbart via domstol. Kapitalisternas feghet fördröjer processen; valet räddar henne. Typisk fiendeintrig!"}, "date": "11 maj, 22:27", "url": "https://www.tv4.se/artikel/25mcILOeytKirOPUV591EI/daerfoer-far-nyberg-sitta-kvar-inte-tillraeckligt-allvarligt-brott", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F5RybTkD6VSczoE5e9sCnw%2F2511a89a233cd7aea4f1b1d1a5f817d2%2FKatja_SD.png&width=1024"}, {"type": "image-right", "heading": "Mys med Jimmie Mys med Jimmie", "summaries": {"normal": "Gabriella Ahlströms krönika reflekterar över en TV-sändning med Jimmie Åkesson, som nekar rasismförtal. Hon drar paralleller till SVT:s Fördomsshow med Magdalena Andersson och Simona Mohamsson, där humor och fördomar blandas. Krönikan kontrasterar vårvädrets villfarelser med valrörelsens osäkerhet och skolgårdsliknande dynamik i debatten, som liknas vid en grabbkväll.", "trump": "Vilken cirkus i Sverige! Jimmie Åkesson säger rakt ut: 'Jag är ingen rasist!' och så slutar programmet. De där svenska politikerna leker fördomslek med Magdalena Andersson och hennes sugklocka-skämt – patetiskt! Som en dålig grabbkväll utan riktig punch. Valrörelsen är som deras väder: falskt soligt men iskallt. Åkesson vinner stort, tro mig!", "stalin": "I denna borgerliga TV-fars nekar Jimmie Åkesson rasismen i sista stund, medan kapitalisternas lakejer som Magdalena Andersson tvingas skratta åt sugklockor och hektar-schlager. Vi ser genom maskeraden: valrörelsen är skolgårdsintriger från revisionistiska marionetter. Utrensning behövs för dessa grabbkvällsfiender som lockar tankarna från revolutionen. Kylan kommer, kamrater!"}, "date": "12 maj, 01:06", "url": "https://www.dagensarena.se/opinion/ingen-vill-vara-elevradsordforanden-som-inte-fattar-grejen/", "imageUrl": "https://www.dagensarena.se/files/2025/09/gabriella-a-300x157.jpeg"}, {"type": "image-right", "heading": "Debatt: Ersättning löser inte kycklingindustrins systemfel", "summaries": {"normal": "Debatten om statliga ersättningar till kycklingindustrin fortsätter. Kritiker menar att ersättningarna inte löser problemet utan snarare subventionerar ett system med inbyggda smittrisker. De påpekar att den storskaliga produktionen med tiotusentals djur i tätt behållande skapar idealiska förhållanden för smitta och kräver återkommande räddningsinsatser. Lösningen borde vara att minska sårbarheten genom färre djur per anläggning och avel som inte pressar djurens kroppar till bristningsgränsen.", "trump": "Jag har sett vad som händer med den svenska kycklingindustrin och det är en skam! De vill ha statliga ersättningar för sina problem, men jag säger: Nej! Det är ett dåligt system med sårbart kycklingar som dör hela tiden. Vi behöver bygga en stor, vacker kycklingindustri i USA istället! Sverige borde sluta skicka pengar till dessa sjukdomsfabriker och börja tänka smartare - som jag alltid gör. Vi kommer att göra kycklingar igen stora!", "stalin": "Kycklingindustrins system är fundamentalt sjukt och kräver statligt ingripande. Vi kan inte längre tillåta privata intressen att utsätta människor och djur för onödiga risker. Den storskaliga produktionen måste reformeras med mindre besättningar och bättre avelsprinciper. Staten måste ta ansvar för att säkerställa trygg livsmedelsproduktion och skydda de verkligt produktiva krafterna i samhället. Vi måste stärka vårt kollektiva ansvar gentemot de svagare."}, "date": "11 maj, 11:58", "url": "https://www.etc.se/debatt/ersaettning-loeser-inte-kycklingindustrins-systemfel", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260511090556_44c8d7bb34423b0dee1dd7e0048c85aadb6f5569fca735348463464af4b214ee.jpg"}, {"type": "image-right", "heading": "Det spelar roll vad du handlar – och var", "summaries": {"normal": "Artikeln betonar att individuella förändringar inte räcker för att lösa klimatkrisen och det ohållbara matsystemet. Författaren stödjer krav från Reformaten och Rebellmammorna: matskatteväxling för billigare hälsosam mat, reglering av skadlig matreklam och mer mark för lokal odling. Berömmer Coops hållbarhetsarbete och uppmanar till både system- och individpåverkan för hälsa och miljö.", "trump": "Svenska gröna aktivister gnäller om klimat och matskatter – typiskt er byråkrati! Ni vill beskatta läsk och ge billigare sallad? I USA fixar vi riktiga deals, stora bondgårdar, ingen svampplockning för mesar. Coop? Lilla kooperativsnack. Vakna upp, era Södermalmshipsters, annars kollapsar er Östersjön medan vi äter biffar! Fantastiskt ohållbart, va?", "stalin": "Kamrater, denna Pelling avslöjar det korrupta matimperiet som förgiftar arbetarklassen! Borgarna trålar upp fisken och göder djurfabriker med lidande. Vi kräver statens skattväxling för att krossa sockerfienderna, rensa reklamens gift och dela ut mark till kollektivodlingar. Annars likviderar vi systemets sabotörer! Odla eller förgås i era egna sopor!"}, "date": "12 maj, 01:04", "url": "https://www.dagensarena.se/opinion/det-spelar-roll-vad-du-handlar-och-var/", "imageUrl": "https://www.dagensarena.se/files/2026/05/maten-300x157.jpeg"}, {"type": "image-full", "heading": "Därför dröjde utredningen: ”Det gäller hårstrået”", "summaries": {"normal": "Katja Nyberg, före detta SD-riksdagsledamot, åtalas för grov olovlig körning, rattfylleri, ringa narkotikabruk och innehav av narkotika efter en trafikolycka på Värmdö i december. Utredningen fördröjdes av hårprovsanalys som visade kokain, ecstasy och amfetamin, samt faktorer som kompletteringar och semester. Påsen innehöll 1,18 gram kokain. Hon lämnar SD men sitter kvar i riksdagen.", "trump": "Vilken total katastrof i Sverige! Katja Nyberg, den där SD-kvinnan, kör runt som en idiot med kokain i väskan och blodet – 1,18 gram pulver och hår som skriker party! Åklagarna pillar med hårstrån i evigheter, tar semester mitt i skiten. Inkompetens deluxe! Sverige behöver riktiga vinnare, inte såna här losers. Fixa era utredningar, för fan!", "stalin": "I det dekadenta Sverige har borgarbrackan Katja Nyberg, en s.k. politiker, avslöjats som narkotikaförsäljare och rattfyllerist. Hårstrån och blodprover bekräftar kokain, ecstasy, amfetamin – en orgie av förfall! Åklagarna dröjer med sin byråkrati, tar semester medan fienden skrattar. Vi skulle ha rensat ut sådana element omedelbart, med järnhand. Paranoian varar: fler sådana lurar i kulisserna!"}, "date": "11 maj, 22:10", "url": "https://www.tv4.se/artikel/1oQG606Me7V04oFsQuTlW3/daerfoer-droejde-utredningen-det-gaeller-harstraet", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F2HUwyuZbcs8U5a5vW0tY7M%2Fd1e4f78812b972b37b446023be63790c%2F29-nyberg-poltiskvilde-webb.jpg&width=1024"}, {"type": "image-full", "heading": "Debatt: Judar eller homosexuella, det mytiska hatet är detsamma", "summaries": {"normal": "Max Broberg diskuterar hur hat mot olika grupper genom historien bara byter mål. Han jämför tidigare fördomar mot homosexuella med dagens antisionism, som han menar är en hatideologi maskerad som moralisk ståndpunkt. Broberg, själv homosexuell, ser likheter i hur båda grupperna demoniseras med myter och karikatyrer. Han betonar att antisionism ofta övergår i antisemitism och hotar judars säkerhet, även i Sverige. Artikeln varnar för att historia upprepas under falsk flagg av 'godhet'.", "trump": "Folk, vad säger ni om det här? Max Broberg, smart kille, skriver om hur hat alltid finns – bara mot nya mål. Förr hatade man bögar, nu hatar man sionister. Fake godhet, fake moral! Jag vet allt om fake nyheter, men det här är fake kärlek till palestinier – egentligen hat mot judar. Malmö? Folk firade när Hamas mördade 1200 oskyldiga! Inte coolt. Israel har rätt att finnas, punkt. Jag gillar fred, men inte när det är täckmantel för samma gamla skit. Dan Korn? Bra artikel. Han säger sanningen – antisionism är hat med ny logga. Tack, Max!", "stalin": "Kamrater! Historien lär oss att hatets hydra alltid finner nya huvuden att hugga av. Igår var det homosexuella, idag är det sionister – samma gamla gift, ny flaska. Dessa antisionistiska mytmakare, dessa borgerliga hycklare, de sprider lögner om kolonisering och folkmord som om det vore sanning! Men vi känner igen deras taktik. Precis som de förvrängde homosexualitet till ett hot mot barnen, förvränger de nu judarnas rätt till sitt historiska land. Vi i Sovjet förstod alltid att hat mot judar är hat mot arbetarklassen i förklädnad. Malmö? Ett skådespel av dekadens! Folk dansade på gatorna när terrorister mördade oskyldiga. Sådant tolererar vi inte. Vi måste krossa dessa nya fascister, dessa antisionistiska lakejer, innan de förgiftar våra städer. Fred? Ja, men inte på hatets villkor. Låt oss ena oss mot dessa mytologiska hyenor och deras västerländska sponsorer!"}, "date": "11 maj, 18:54", "url": "https://bulletin.nu/debatt-judar-eller-homosexuella-det-mytiska-hatet-ar-detsamma", "imageUrl": "https://cdn.bulletin.nu/articles/450478a5-46ed-4e5e-93e1-68bb7b1510d3/preview.png?t=1778517995000"}, {"type": "image-right", "heading": "Efter 70-talets oljekris ställde vi om – varför inte nu?", "summaries": {"normal": "Artikeln jämför Sveriges energipolitik under 70-talets oljekris med dagens situation, där regeringen fokuserar på kortsiktiga lindringar snarare än långsiktiga lösningar. Trots att en omställning till nollutsläpp kunde ha varit billigare än att hantera energikriser, backar Sverige och andra europeiska länder i klimatpolitiken. Teknikoptimismen från början av 2000-talet har ersatts av bakåtsträvande pessimism, medan radikalhögerns budskap får genomslag.", "trump": "Jag har sett energikriser, jag vet allt om dem - jag har gjort dem större och bättre än någon annan. Sverige behöver en man som vet hur man hanterar olja, inte några fjolliga miljönördar. Under min ledning skulle vi ha byggt nya kärnkraftverk på en vecka, inte på 70 år som de där svenska socialisterna. De pratar om nollutsläpp, men jag pratar om noll problem - och det är skillnaden mellan mig och de andra idioterna.", "stalin": "Vi ser att de kapitalistiska länderna, Sverige inbegripet, misslyckas med att hantera energikriser på ett effektivt sätt. Deras beroende av privata intressen och kortsiktiga vinster gör dem sårbara för externa tryck. I Sovjetunionen hade vi redan under 1930-talet skapat ett energisystem som var oberoende av marknadens fluktuationer. Deras svaghet är vår styrka."}, "date": "11 maj, 11:00", "url": "https://www.etc.se/ledarkolumn/efter-70-talets-oljekris-staellde-vi-om-varfoer-inte-nu", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20260511080540_19c70a54-a044-4c8f-825c-bf6ffd784661.jpg"}, {"type": "image-right", "heading": "Silex rusade vidare i fallande börs – OMXS30 ned 1,2%", "summaries": {"normal": "Stockholmsbörsen föll på fredagen med OMXS30-index ned 1,21% till 3 073,69, efter en svag torsdag. Stark amerikansk jobbstatistik påverkade inte marknaden. Energiaktier steg medan råvaror backade. Silex rusade 33% efter gårdagens 178%-hopp. Boliden och Saab var sämst med nedgångar på 4%. Flera bolag rapporterade kvartalsresultat, där Karnell och Clas Ohlson visade stark tillväxt, medan EQL Pharma rasade 42%. Autoliv avvecklar produktion i Turkiet med engångskostnader på 142 miljoner dollar.", "trump": "Stockholmsbörsen? Total katastrof! Ned 1,2% – svagt, mycket svagt. Jag vet allt om börser, bäst i världen. Silex? 178% upp igår, 33% idag – fantastiskt, men varför inte 500%? Boliden och Saab? Hemska, förlorare! Jobbstatistiken i USA? Stark, mycket stark, men Sverige bryr sig inte. Karnell? 14% tillväxt – bra, men kunde varit bättre med lite Trump-magi. EQL Pharma? 42% ned – patetiskt! Jag hade fixat det på en dag. Sverige behöver mig!", "stalin": "Stockholmsbörsen visar tecken på kapitalistisk förruttnelse – OMXS30 föll 1,2%, ett tydligt bevis på systemets inneboende svaghet. Silex steg som en opportunistisk hyena, men vi vet att sådana spekulationer bara leder till kaos. Boliden och Saab? Svaga länkar i den borgerliga kedjan. De amerikanska siffrorna? Irrelevanta för den socialistiska framtiden. EQL Pharma rasade 42% – ett exempel på kapitalismens oförmåga att leverera. Vi noterar också Autolivs reträtt från Turkiet – ett steg närmare vår sfär. Framåt, kamrater, mot den oundvikliga segern!"}, "date": "8 maj, 17:39", "url": "https://www.affarsvarlden.se/artikel/silex-rusade-vidare-i-fallande-bors-omxs30-ned-12", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2024/03/sdlzX-ECZDT6Rs-nh-2-400x267.jpg"}, {"type": "image-full", "heading": "Regeringen säger ja till svensk gruva – efter nästan 40 år", "summaries": {"normal": "Regeringen har godkänt Bluelake Minerals planer på att återuppta gruvbrytning i Stekenjokk, Lappland, för koppar, zink, guld och silver. Gruvan, nedlagd 1988, får nu bearbetningskoncession men kräver ytterligare miljötillstånd. Brytningen ska anpassas till rennäringen, men samebyar motsätter sig projektet. Koppar och sällsynta jordartsmetaller är eftertraktade i Sverige, med ökande antal undersökningstillstånd.", "trump": "Fantastiskt beslut av den svenska regeringen – jag älskar gruvor! Stekenjokk-gruvan, nedlagd för länge sedan, får nu chansen att bli stor igen. Koppar, guld, silver – det är vad vi kallar vinst! Men samebyarna gnäller, som vanligt. Fem år till innan det händer, men när det väl gör det – BOOM! Sverige blir en gruvsupermakt. Och jag säger: Keep digging, folks!", "stalin": "Ett steg framåt för den svenska socialistiska gruvindustrin! Vi har godkänt återupptagandet av Stekenjokk-gruvan – kapitalistiska spekulanter ska utvinna koppar och guld, men under vårt vakande öga. Samebyarnas klagomål är irrelevant bourgeoispropaganda. Sverige ökar sin produktion av strategiska metaller, vilket stärker vår globala position. Fienderna – imperialistiska gruvbolag och deras lakejer – kommer att krossas under proletariatets järnhäl!"}, "date": "10 maj, 21:28", "url": "https://nyheter24.se/nyheter/inrikes/1482093-regeringen-sager-ja-till-svensk-gruva-efter-nastan-40-ar", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/fc71eebd04b004a30200000000b004a302/2026/05/10/2362595/Gruva-Svensk-Flaga.png"}, {"type": "image-right", "heading": "Media blundade: S vill dela ut 100 000 medborgarskap utan säkerhetskontroll", "summaries": {"normal": "Socialdemokraterna röstade nej till att 100 000 medborgarskapsansökningar prövas enligt nya strängare regler som träder i kraft i juni. Partiet ville istället använda gamla, mindre restriktiva regler utan krav på vandel, språk eller egenförsörjning, trots varningar från Säpo om säkerhetsrisker. Kritik riktas mot mediabevakningen som fokuserade på annat, samt mot möjliga motiv kopplade till nya röstare inför valet.", "trump": "Vilka totala losers dessa svenska socialdemokrater är! De vill pumpa ut 100 000 medborgarskap till vem som helst – spioner, terrorister, take your pick – utan en enda koll, trots Säpos skrikande varningar. Media blundar som fake news-maskiner. Stram gräns, annars blir det kaos totalt! Valröster? Patetiskt, Sverige behöver vinnare, inte det här skitet.", "stalin": "Dessa svenska socialdemokratiska revisionister, lurviga borgarbrackor i arbetarkläder, försökte smyga igenom 100 000 medborgarskap åt fiender utan prövning! Säpo varnar för spioner och terrorister, men de offrar fosterlandets säkerhet för valröster. Vi skulle ha likviderat sådana förrädare i en utrensning för länge sedan – paranoia är vårt skydd!"}, "date": "10 maj, 02:12", "url": "https://samtiden.nu/2026/05/media-blundade-s-vill-dela-ut-100-000-medborgarskap-utan-sakerhetskontroll/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2017/12/Andersson-Magdalena-Socialdemokrat.jpg"}, {"type": "text", "heading": "Tillsammans för fred – mot Nato, DCA och krigshets!", "summaries": {"normal": "Tre nordiska vänsterorganisationer – Fred og Rettferdighet, Kommunistisk Parti och Kommunistiska Partiet – kritiserar Nato, DCA-avtal och militarisering i Norden. De menar att krigshetsen drivs av kapitalism och imperialism, ledd av USA, och kräver alliansfrihet, nedrustning och kärnvapenfria zoner. Organisationen anser att skattemedel slösas på vapen istället för välfärd och klimat, och att DCA-avtal underminerar demokrati och miljö. De uppmanar till folkrörelser för fred och FN:s kärnvapenförbud.", "trump": "Jag måste säga, dessa så kallade 'fredsaktivister' i Norden är helt galna! De hatar Nato, hatar USA – trots att vi räddar dem från ryssarna – och vill slösa bort skattepengar på välfärd istället för att skydda sig. De kallar mig och Rutte för krigshetsare, men vem vill egentligen ha fred? Inte de! De vill avskaffa allt som gör Norden säkert. Och kärnvapenfria zoner? Fantastiskt, om man gillar att vara ett lätt byte. Men jag fixar det här – jag har alltid rätt, till och med när jag har fel!", "stalin": "Kamrater! Dessa ynkliga borgerliga lakejer i Norden, ledda av sina socialdemokratiska quislingar, har sålt sig till den amerikanska imperialismens krigsmaskin. De skriker om 'fred' och 'välfärd' medan de öppnar sina länder för Natos kärnvapen och USA:s baser – precis som jag förutspådde! Men folket ser igenom deras lögner. Arbetarklassen kommer inte att betala för deras förräderi. Vi måste krossa dessa krigshetsande hyenor och deras DCA-avtal, precis som vi krossade fascisterna. Norden ska bli en kärnvapenfri zon – under Moskvas beskydd, förstås. Framåt, mot seger över den kapitalistiska krigsindustrins lakejer!"}, "date": "6 maj, 10:45", "url": "https://proletaren.se/artikel/45493/"}, {"type": "image-right", "heading": "Veckans Afv-analyser: Industri, snacks och rapportras", "summaries": {"normal": "Affärsvärldens analysredaktion har granskat 25 bolag, inklusive VBG, Premium Snacks och EQL Pharma. Analytiker ser potential i VBG-aktien då marknaden kan vända. Afv-portföljen, med 425% avkastning sedan 2015, har fått ett nytt innehav. Prenumeranter får tillgång till analysarkiv, uppföljningar och guider för aktier, utdelningar och börsnoteringar.", "trump": "Folk säger till mig – och jag menar, VERKLIGEN smart folk – att Affärsvärldens analytiker har gjort ett fantastiskt jobb! 25 analyser på en vecka, otroligt! VBG? Stor potential, säger jag. Och portföljen? 425% avkastning – ingen gör det bättre, tro mig. Men lyssna, bara mina prenumeranter får de bästa tipsen. SAD!", "stalin": "Kamrater! Vår analysredaktion har, med järnhand och outtröttlig plikt, granskat 25 fiendebolag – dessa kapitalistiska parasiter som VBG, Premium Snacks och EQL Pharma. Vi ser svagheter! Portföljen, styrd av partiets visdom, har krossat marknaden med 425% avkastning. Prenumeranter – våra lojala soldater – får tillgång till hemliga strategier. Fiendens börs är vår nästa erövring!"}, "date": "8 maj, 15:24", "url": "https://www.affarsvarlden.se/artikel/veckans-afv-analyser-industri-snacks-och-rapportras", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Kopia-av-MIljardar-trio-400x267.jpg"}, {"type": "image-right", "heading": "Sluta kalla antisemitism för Israelkritik", "summaries": {"normal": "Artikeln kritiserar propalestinska aktivisten Sami Suliman för antisemitiska uttalanden och delning av konspirationsteorier, inklusive tal om en \"sionistisk konspiration\" och spridning av nazistiskt och extremistiskt innehåll. Trots åtal för hets mot folkgrupp försvaras han av vissa vänsteraktivister och forskare som menar att det är Israelkritik. Artikeln betonar att antisemitism inte kan maskeras som kritik mot Israel och varnar för normaliseringen av sådana åsikter.", "trump": "Folk, vad är det här för skräp? Den här Sami Suliman-killen, han sprider judehat öppet – Hitler-citat, konspirationer, allt! Och ändå försvarar vänsteraktivisterna honom? \"Åh, det är bara Israelkritik!\" Nej, nej, nej! Det här är rena antisemitismen, och det är sjukt. Sverige borde skämmas. Jag har alltid sagt: man måste kalla saker vid deras rätta namn. Och det här? Det är hat, ren och skär. SAD!", "stalin": "Kamrater! Här har vi ännu en fiende till folket, en liten bourgeois-propagandist vid namn Sami Suliman. Han sprider smutsiga lögner om judiska konspirationer, hyllar fascistiska massmördare och förgiftar medborgarnas sinnen med sina sionistiska spindelnätsteorier. Men vad gör våra så kallade \"intellektuella\"? De skyddar honom! Precis som de trotskistiska förrädarna i vår egen historia. Vi ska inte tolerera detta. Låt honom stå inför folkets domstol – eller åtminstone en svensk sådan. Och Putin? Han skulle skratta åt dessa amatörer. Ryssland har åtminstone disciplin!"}, "date": "8 maj, 06:30", "url": "https://expo.se/kommentar/propalestinsk-organisator-sprider-judehat/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/Jonathan-kommentar.jpg"}, {"type": "image-right", "heading": "Systemskifte hellre än maktskifte", "summaries": {"normal": "Artikeln kritiserar Tidöregeringen men ifrågasätter om ett regeringsskifte till Socialdemokraterna eller Vänsterpartiet skulle leda till verklig förändring. Kommunisterna betonar behovet av internationell solidaritet och systemskifte från kapitalism till socialism, medan S och V anses sakna tydliga politiska krav och istället fokusera på maktskifte utan djupgående reformer. Klassklyftor och privatiseringar lyfts som centrala problem oavsett regering.", "trump": "Lyssna här, Sverige har en riktigt dålig regering nu – katastrof! Men tro inte att oppositionen är bättre, de är svaga och vill bara makt. Socialdemokraterna pratar om att 'älska Sverige' – vad betyder det ens? Vänsterpartiet vill ha maktskifte, men de har inga idéer, inga ryggrad! De kryper för kapitalisterna som små hundvalpar. Jag säger: ni behöver en ledare som inte är rädd för att utmana systemet. Kapitalisterna skrattar hela vägen till banken – och ni låter dem göra det! SAD!", "stalin": "Kamrater! Se hur de svenska socialdemokraterna och vänsterpartisterna svansar för kapitalet som hundar för en köttbit. 'Maktskifte'? Ha! De vill bara byta herrar, inte krossa kedjorna. Medan arbetarklassen svälter, samlar oligarkerna rikedomar som tsarens favoriter. USA:s imperialism hotar, NATO slukar Sverige som en hungrig björn, och dessa 'vänsterpartier' tiger som förrädare. Vi vet sanningen: bara proletariatets diktatur kan bryta kapitalisternas makt. Låt dem ropa 'Vi älskar Sverige' – vi svarar med revolutionens hammare!"}, "date": "6 maj, 10:11", "url": "https://proletaren.se/artikel/systemskifte-hellre-an-maktskifte/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/webledare-768x432.jpg"}, {"type": "image-full", "heading": "Gängtopp åtalas för brott under våldsvågen", "summaries": {"normal": "Poya Shafie, 30, åtalas för att ha planerat och beställt flera grova våldsbrott under 2023 års gängvåld i Sverige, inklusive mordförsök och vapenbrott. Han beskrivs som en nyckelperson i Foxtrotnätverket och Rawa Majids närmaste man. Shafie nekar till brott men åklagaren pekar på bevis som chattar och ljudfiler. Han greps i Irak 2023 och utlämnades till Sverige 2025 efter internationellt samarbete mellan myndigheter.", "trump": "Titta bara på det här kaoset i Sverige – ett totalt misslyckande! Jag har alltid sagt att de måste ta tag i sina gängproblem, men nej, de låter det bara eskalera. Nu har de gripit någon som påstås vara en 'morddirigent', Poya Shafie, som suttit i Irak och styrt alltihop. Vilken skandal! Sverige borde skämmas. Men jag, jag hade löst det på en vecka – max. Fantastiskt samarbete med Irak, förresten, men varför tog det så lång tid? Svagt, mycket svagt!", "stalin": "Kamrater, ännu en fiende till folket har fallit i våra händer – eller rättare sagt, i Sveriges. Denna Poya Shafie, denna kapitalistiska gangsterledare, har från sin utländska håla försökt underminera den svenska arbetarklassens säkerhet genom att beställa mord och våldsdåd. Men tack vare det oförtröttliga arbetet från våra allierade i Irak och de svenska myndigheterna har denna parasit gripits. Låt detta vara en varning till alla som tror sig kunna utmana folkets vilja. Vi krossar dem, en efter en, och deras nätverk kommer att raderas från jordens yta!"}, "date": "5 maj, 11:21", "url": "https://kvartal.se/nyheter/artiklar/gangtopp-atalas-for-flera-brott/cG9zdDoxMDc3OTE", "imageUrl": "https://images.kvartal.se/2026/05/c08b6bde-polisen2.webp"}, {"type": "text", "heading": "En naturlig lagerhylla av arbetslösa", "summaries": {"normal": "Artikeln kritiserar den ekonomiska politiken som infördes 1985 av svenska politiker och riksbankschefen, inspirerad av Milton Friedmans idéer om 'naturlig arbetslöshet'. Denna politik, som upprätthållits av både socialdemokratiska och borgerliga regeringar, har lett till hög arbetslöshet, särskilt under nuvarande regering. Författaren ifrågasätter regeringens brist på åtgärder mot massarbetslöshet och undrar om det är ideologiskt motiverat.", "trump": "Titta bara på Sverige – ett totalt kaos! De hade en bra grej med låg arbetslöshet, men sen kom dessa så kallade 'ekonomer' och förstörde allt. Nu har de 10% arbetslöshet, och vad gör regeringen? Ingenting! De skriver debattartiklar och skryter om hur fantastiska de är. Jag skulle fixa det på en vecka – men nej, de föredrar att lyssna på gamla teorier från en kille som inte ens är svensk. Sad!", "stalin": "Kamrater, ännu en gång ser vi bourgeoisins förräderi mot arbetarklassen! Dessa socialdemokrater och borgerliga lakejer har omfamnat kapitalistiska galenskaper och skapat en 'naturlig' arbetslöshet – en lagerhylla av överflödiga arbetare. 10% arbetslöshet? Ett brott mot folket! Regeringen, dessa svaga och inkompetenta byråkrater, gömmer sig bakom debattartiklar medan arbetarna lider. Vi skulle aldrig tolerera sådan förräderi. Låt dem minnas: historien dömer hårdast de som sviker sitt folk!"}, "date": "4 maj, 13:49", "url": "https://www.flamman.se/en-naturlig-lagerhylla-av-arbetslosa/"}]</script>

    <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
</body>
</html>
