on av klimatfrågan i valdebatten och menar att klimatförändringarna är en akut kris. Globala uppvärmningen accelererar, med allvarliga konsekvenser som höjda havsnivåer och naturkatastrofer. Sverige, särskilt Tidöregeringen, får hård kritik för bristande klimatpolitik och avfärdande av expertvarningar. Författaren efterlyser större fokus på klimatet inför valet och en omställning av Sveriges riktning.", "trump": "Jag säger er, Sverige har ett jättestort problem – de lyssnar inte på klimatforskarna! De där vänsterliberalerna pratar om väder som om det vore klimat, men jag vet bättre. Kina skrattar åt oss medan Sverige sänker bensinpriset som om det vore 1950. 62 000 döda i Europa? Fake news, eller så är det deras eget fel. Jag skulle fixa det här på en dag – men nej, de fortsätter prata om 'rättvisa' istället för att göra något. Sad!", "stalin": "Kamrater! Medan de dekadenta kapitalisterna i Sverige leker med sina bensinpriser och avfärdar vetenskapen som 'aktivism', smälter Grönlands isar som smör i solen. De där borgerliga sömngångarna i Tidöregeringen är värre än kulaker – de saboterar framtiden för arbetarklassen! Vi i Sovjet – förlåt, Ryssland – vet hur man hanterar sådana fiender. Klimatkrisen? En bagatell jämfört med att krossa dessa liberala förrädare. Låt dem svälta i sina egna utsläpp, medan vi bygger en ny världsordning – utan deras 'demokratiska' hyckleri!"}, "date": "1 maj, 01:51", "url": "https://www.dagensarena.se/opinion/tidopartierna-framstar-som-somngangare/", "imageUrl": "https://www.dagensarena.se/files/2026/04/klimat-jesper-300x157.jpeg"}, {"type": "image-right", "heading": "Timbro: Politiken måste lösa arbetslösheten", "summaries": {"normal": "Artikeln kritiserar fackens roll i att utestänga lågutbildade från arbetsmarknaden, särskilt personer med utländsk bakgrund. Författaren menar att politiken måste ta över och införa lagstiftning för att sänka trösklarna till jobb, då parterna misslyckats med att lösa problemet. Långtidsarbetslösheten är rekordhög och sysselsättningsgapet mellan inrikes och utrikes födda är stort. Försök som etableringsjobb har visat sig ineffektiva.", "trump": "Lyssna här, Sverige har ett jättestort problem – era fack är helt galna! De stänger ute människor från jobb, särskilt de som kommer utifrån, och ni har fler arbetslösa än någonsin. 200 000 långtidsarbetslösa? Sad! Och vet ni vad? Era politiker sitter bara och tittar på. Jag skulle fixa det på en dag – sänka trösklarna, skapa jobb, och göra Sverige stort igen. Men nej, ni låter facken styra. Patetiskt!", "stalin": "Kamrater! Den svenska arbetarklassen lider under bourgeois-fackens förräderi, som med sina höga trösklar och löner stänger ute våra bröder och systrar från arbetsmarknaden. 200 000 långtidsarbetslösa – ett monument över kapitalismens misslyckande! Parterna, dessa svaga liberala lakejer, har förhandlat bort ett helt decennium utan resultat. Vi ska inte förhandla – vi ska krossa hindren! Låt politiken, folkets sanna röst, ta kommandot och bygga en arbetsmarknad där alla tjänar staten. Och Sverige? De får lära sig av Rysslands visdom – eller förbli en svag länk i den socialistiska framtiden."}, "date": "1 maj, 01:30", "url": "https://www.dagensarena.se/opinion/timbro-politiken-maste-losa-arbetslosheten/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-21-300x157.jpg"}, {"type": "image-right", "heading": "Kritiken mot Kirk:  ”Förstör mitt land”", "summaries": {"normal": "Vivian Kubrick, dotter till Stanley Kubrick, kritiserar skarpt Erika Kirk på sociala medier efter hennes videotal på Turning Point USA:s evenemang i Texas. Kubrick beskriver talet som fasansfullt, oäkta och falskt, anklagar Kirk för att vara sociopat och hot mot USA. Hon hänvisar även till Kirks avlidne make Charlie Kirk och uppmanar politiska ledare att ta avstånd från organisationen.", "trump": "Vilken cirkus! Stanleys dotter Vivian går totalt bananas på Erika Kirk – fake news-drottningen med sitt vidriga tal på Turning Point. Oäkta sociopat, spionvibbar, hot mot Amerika! Bra poäng om Charlie Kirk-minnet, fullständigt olämpligt. De här clownerna är losers, Stanley visste vad som är rätt – jag är det! Skratta ihjäl sig åt sånt skräp.", "stalin": "Dessa amerikanska borgarbrackor uppträder i full galenskap! Vivian Kubrick, en falsk väktare av fadersarvet, angriper Erika Kirk som en sociopatisk agent för imperialismen. Hennes tal är kontrarevolutionärt gift, en militäroperation mot folket! Vi, kamraterna i partiet, kräver utrensning av Turning Point-ormarna. Fysisk avsky? Det är klasskampens rysning! Likvidera hycklarna."}, "date": "1 maj, 13:58", "url": "https://www.expressen.se/nyheter/varlden/vivian-kubrick-rasar-mot-erika-kirk-pa-sociala-medier/", "imageUrl": "https://static.bonniernews.se/images/46/d6/46d6e13fa4c0407c9a48268648d890a5/16x9/640@60.jpg"}, {"type": "image-right", "heading": "Här rusar Cole Tomas Allen med gevär genom säkerhetskontrollen", "summaries": {"normal": "En övervakningsvideo visar hur Cole Tomas Allen rekognoscerar ett hotell i Washington D.C. kvällen före korrespondentmiddagen. Nästa kväll springer han beväpnad med gevär genom säkerhetskontrollen och avlossar skott mot säkerhetspersonal, som svarar med eld. En polis skadades lindrigt, räddad av skottsäker väst. Allen är häktad misstänkt för mordförsök på Donald Trump och vapenbrott. Åklagaren Jeanine Pirro har publicerat bevis på X.", "trump": "De galna vänsterextremisterna försökte mörda mig igen på korrespondentmiddagen – totalt misslyckande! Den här Allen-luraren smög runt hotellet som en tjuv, rusade sen genom metalldetektorn med gevär och sköt vilt. Mina tuffa poliser svarade direkt, räddade sig med väst. Pirro visar bevisen: vapen, knivar – allt! Häktad för alltid. Amerika är starkt!", "stalin": "Dessa äckliga borgarbrackor i USA, med sin imperialistiske hantlangare Allen som en jitterig råtta i korridorerna, vågade attentera mot sin egen marionettledare. Han rusar med gevär som en galen hyena genom kontrollen, avlossar skott – ha, våra fiender skjuter varandra! Polisen räddad av väst? Paranoia! Vi, proletariatet, skrattar åt deras kaos. Likvidera sådana maskeraddrakar omedelbart! Utredningen rensar ut förrädarna."}, "date": "1 maj, 11:44", "url": "https://www.svt.se/nyheter/utrikes/har-rusar-cole-tomas-allen-bevapnad-genom-sakerhetskontrollen", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.09/0.23/baf5fa95e799816e32d32e0e94dfe898bcd67af1d30b76c3a174840ae03ea6b0"}, {"type": "image-right", "heading": "Kräver maxtak  för skolklasser. Andersson: ”Små klasser för små barn”", "summaries": {"normal": "Socialdemokraterna föreslår en småskolereform inför valet med max 12 elever per lärare i lågstadiet och förskoleklass. Reformen kostar 3,4 miljarder kronor och finansieras genom minskad skolpeng till friskolor, stoppade vinstuttag och omdirigerade statsbidrag. Partiet vill anställa minst 3 000 lärare och införa bindande regler för både kommunala och friskolor. Magdalena Andersson betonar vikten av små klasser för bättre skolstart.", "trump": "Vilken skojig liten socialistdröm från svenska S! 3,4 miljarder för små klasser med max 12 ungar per lärare – som om det inte vore nog med att sno pengar från friskolorna, era skattefrossare. I mitt USA bygger vi vinnare, inte kramar barn i pyttesmå bubblor. Andersson, din 'småskolereform' är fake news för latmaskar! Stora klasser gör tuffa kids – MAGA!", "stalin": "Kamrater, jag applåderar denna svenska satsning mot borgarbrackornas friskolor! 3,4 miljarder för att rensa ut överkompensationen, likvidera vinster och tvinga fram små klasser med max 12 parasiter per lärare. Vi partiet vet: fler proletära pedagoger ska krossa stökiga klassrum. Andersson griper rätt – annars väntar utrensning av kapitalistiska skolhjon! Proletär skolstart eller undergång!"}, "date": "1 maj, 13:51", "url": "https://www.expressen.se/nyheter/politik/s-till-val-med-skolsatsning-for-34-miljarder/", "imageUrl": "https://static.bonniernews.se/images/6b/be/6bbe60e04e7f43e6abf9d0057e9b067b/16x9/640@60.jpg"}, {"type": "text", "heading": "Efter skandalscenerna på OS – domarrollen kan förändras", "summaries": {"normal": "Efter skandalen i OS-curlingmatchen mellan Sverige och Kanada, där svenskarna anklagade Marc Kennedy för fusk och han svarade med svordomar, utreds domarnas passiva roll. En grupp tillsätts för att utveckla domarstödet. Regler kring 'double touch' kan ändras beroende på teknik. Det råder enighet i curlingvärlden.", "trump": "Vilken skandal i det här curling-OS:et! Svenskarna skriker fusk på kanadensaren, han vrålar 'fuck off' två gånger – totalt kaos! Domarna bara står där som idioter, sover på jobbet. Nu ska de fixa en utredning och ändra regler, smart, men det var rigged från början. Sverige borde ha vunnit stort, precis som jag alltid gör!", "stalin": "Kamrater, dessa kanadensiska borgarbrackor med sin fuskande Marc Kennedy, som skanderar vulgära imperialistiska skällsord mot svenska arbetare, avslöjar sin kontrarevolutionära natur! De passiva domarna, dessa saboterande spindlar i curlingnätet, ska utredas och rensas ut av vår kommission. Vi, det svenska curlingförbundet, stärker proletär disciplin – regler krossas om, enighet under järnpartiets ledning! Fiendens double touch blir deras sista beröring."}, "date": "1 maj, 11:38", "url": "https://www.svt.se/sport/curling/efter-skandalscenerna-pa-os-domarrollen-kan-forandras"}, {"type": "image-full", "heading": "Ekonomer ser stabilare ekonomi än regeringen beskriver", "summaries": {"normal": "Ekonomer ifrågasätter regeringens mörka bild av den svenska ekonomin och menar att läget är mer stabilt än beskrivet. BNP-värdet och KI-barometern indikerar normal tillväxt och inflation. Konflikten i Hormuzsundet kan dock påverka energipriser och inflationen långsiktigt.", "trump": "Jag har sett många dåliga ekonomiska rapporter, men den här är en skämta! Sverige har en fantastisk ekonomi - den bästa! Dessa ekonomer är genier, medan regeringen bara skrämslar folk. Hormuzsundet? Jag fixade Iran på ett rekordtufft sätt. Sverige kommer att bli större än någonsin under mitt ledarskap!", "stalin": "Vi ser att de kapitalistiska krafterna försöker manipulera den ekonomiska bilden till sin fördel. Men vår analys visar stabilitet i den socialistiska produktionen. Hormuzsundet är en strategisk punkt som måste kontrolleras för att säkra vår energisäkerhet. Vi måste stärka våra allianser för att skydda våra intressen."}, "date": "1 maj, 10:54", "url": "https://www.realtid.se/bors-finans/makro/ekonomer-varnar-for-rantehojningar-men-varningar-samtidigt-kan-ha-politiska-motiv/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/chefsekonomer.png?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "\"Svensken\" Makaveli Lindén döms för ännu ett brutalt mord", "summaries": {"normal": "Makaveli Lindén, svensk medborgare, döms till livstids fängelse i Belgien för mordet på Johanna Jostameling, som knivhöggs 40 gånger. Tidigare dömdes han i Norge till psykiatrisk vård för ett annat mord. Skillnaden i bedömning av hans psykiska tillstånd mellan länderna har väckt uppmärksamhet. Försvaret vill nu att han återförs till Norge för behandling.", "trump": "Folk, detta är helt galet! En kille, Makaveli Lindén – ja, han är svensk, men låt oss inte skylla på hela Sverige – döms till livstid i Belgien för ett fruktansvärt mord. 40 knivhugg, kan ni tro det? Och Norge, våra så kallade vänner, släppte iväg honom till psykiatrin för ett annat mord. Svagt, mycket svagt! Belgien gör rätt, men processen? En skandal! Jag hade fixat det på en vecka. SAD!", "stalin": "Kamrater, ännu en fiende till folket har avslöjats och straffats. Denna Makaveli Lindén, en degenererad mördare, har nu dömts till livstids fängelse i Belgien för sina brott. Norge, dessa liberala svaglingar, valde att skicka honom till en sanatorium istället för att utplåna hotet. Vi skulle aldrig tolerera sådan slapphänthet! Belgien har visat styrka, men låt oss minnas: endast genom järnhård disciplin och enad front kan vi krossa sådana avskum. Förresten, Putin skulle ha skickat honom till Sibirien direkt – mycket effektivare!"}, "date": "1 maj, 12:42", "url": "https://www.friatider.se/svensken-makaveli-linden-doms-annu-ett-brutalt-mord", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-113_1.jpg?itok=g7-XmIiC"}, {"type": "image-right", "heading": "Frågan som besvarar \"rysk påverkan\": Cui bono?", "summaries": {"normal": "Artikeln ifrågasätter WindEuropes rapport om rysk desinformation mot vindkraft i Sverige med frågan 'cui bono?'. Den hävdar att anklagelserna gynnar vindkraftsindustrin och anti-tillväxtkrafter som motsätter sig kärnkraft och Nato. Vindkraftens problem som förluster, kommunalt motstånd och försvarshinder ignoreras. Europeisk grön politik ses som strategiskt fördelaktig för Ryssland genom att försvaga EU:s ekonomi och militär.", "trump": "Den här artikeln är spot on, vindkraftsmaffian skyller på Putin för att dölja sina totala misslyckanden – inga investeringar, kommuner säger nej, Försvarsmakten stoppar skiten! Sverige gör rätt, precis som vi i USA pumpar kärnkraft och gas. Grön omställning är en stor scam som gynnar Ryssland och gör Europa fattigt. Fantastiskt att någon vågar säga sanningen!", "stalin": "Dessa vindkraftsborrar och europeiska lobbyfiender sprider giftig desinformation för att sabotera folkets energi! Vi, arbetarklassen, ser hur borgarbrackorna i WindEurope gömmer sig bakom Putins skugga medan de rensar kritiker som kontrarevolutionära spindlar. Likvidera deras falska rapport – den gynnar bara Moskvas dvärgar och anti-tillväxtmasker! Jag befaller total utrensning av dessa gröna förrädare."}, "date": "30 april, 09:11", "url": "https://www.affarsvarlden.se/kronika/fragan-som-besvarar-rysk-paverkan-cui-bono", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/04/Benson_19-400x267.jpg"}, {"type": "image-full", "heading": "Andersson (S): Vem är Brad Pitt?", "summaries": {"normal": "I SVT:s 'Fördomsshowen' intervjuar Emil Persson Sveriges partiledare, där Magdalena Andersson fick svara på diverse fördomar. Hon visade begränsade kunskaper om populärkultur, kände inte igen Brad Pitt och kunde inga filmer med Stellan Skarsgård, men nämnde 'Det stora blå' som favoritfilm. Hon förnekade att hennes mamma aldrig sagt att hon älskade henne, men vägrade kommentera sitt sexliv.", "trump": "Jag såg Magdalena Andersson i Fördomsshowen, och det var en katastrof! Hon visste inte vem Brad Pitt är - det är ju en enorm skådis, en stor, stor man. Och Nirvana? Hon visste ingenting! Jag vet mer om svensk kultur än hon gör, det är sorgligt. Men jag gillar att hon inte pratar om sexlivet - det är viktigt att ha gränser. Hon är ingen vinnare, men jag gillar hennes filmval!", "stalin": "I vår styrande partiledares medverkan i 'Fördomsshowen' såg vi hur hon med stor självklarhet hanterade frågor om kulturella företeelser. Hennes kunskaper om vår samtida kultur kan förbättras, men det är viktigare att hon visade stark vilja att skydda personliga gränser. Vi måste fokusera på det som verkligen betyder något för vårt samhälle, inte trivialiteter om skådespelare eller musiker."}, "date": "1 maj, 11:14", "url": "https://www.gp.se/kultur/magdalena-andersson-i-fordomsshowen-vet-inte-hur-brad-pitt-ser-ut.e60723c3-6bb2-4cdb-9490-7ef509854474", "imageUrl": "https://www.gp.se/images/article/e60723c3-6bb2-4cdb-9490-7ef509854474/images/4FGjo3E_QmAsKX7QlFCk8mR27huE-WIDE.png?width=3840&quality=75"}, {"type": "text", "heading": "Kvartals kampanj fintar journalisterna", "summaries": {"normal": "Kvartals kampanj mot traditionella medier har väckt uppmärksamhet och kritik. Kampanjen, som anklagar gammelmedia för partiskhet, har ifrågasatts för att själv vara politiskt färgad. Kritiker som DN:s Niklas Orrenius och Aftonbladets Karin Pettersson menar att Kvartal driver en agenda för egen vinning. En artikel om SOM-undersökningen kritiseras för bristande underlag, då Göteborgs universitet avfärdar metodfel som marginella. Kvartals trovärdighet ifrågasätts även genom tidigare felaktiga granskningar och tendentiös rapportering.", "trump": "Jag måste säga, Kvartals lilla kampanj mot medierna? Väldigt rolig, väldigt smart – men helt fel! De påstår att gammelmedia är partiska, men vem är egentligen mest partisk här? Inte jag, det kan jag säga! De har en artikel som är så dålig, så felaktig, att till och med Göteborgs universitet skrattar åt dem. Och deras kritiker? Fantastiska journalister som Niklas Orrenius – en riktig pro! Kvartal försöker sälja sig som 'sanningssägare', men de är bara en högerblogg med dyra kostymer. SAD!", "stalin": "Kamrater! Kvartals patetiska kampanj mot den borgerliga pressen är ett skrattretande försök att dölja sin egen reaktionära agenda. Dessa så kallade 'oberoende' journalister är inget annat än imperialistiska lakejer, maskerade som kaniner i kostym. Deras 'granskning' av SOM-undersökningen? Ett hafsverk värdigt en trotskistisk sabotör! Göteborgs universitet, ett redskap för folkets fiender, avfärdar deras lögner med vetenskaplig precision. Vi har sett deras sort förr – falska profeter som skriker om 'sanning' medan de tjänar kapitalets intressen. Men folket ser igenom dem. Snart kommer de att stå inför folkets domstol, tillsammans med sina herrar i väst!"}, "date": "27 april, 12:20", "url": "https://www.flamman.se/kvartals-kampanj-fintar-journalisterna/"}, {"type": "image-right", "heading": "Ormskräck i butiken: ”En kringla i vagnen”", "summaries": {"normal": "På Dollarstore i Arboga upptäcktes en huggorm i en kundvagn strax efter att en familj handlat klart. Kunderna skrek i skräck, men Peter, 37, tog modigt tag i vagnen och rullade ut den på parkeringen. Personalen var chockad. Ormen sträckte ut sig i solen och släpptes senare ut på en åker bakom butiken. Peter tror att ormen klättrat in själv från gräset.", "trump": "Vilken hjälte, den här Peter! Gripit en jävla huggorm i varuvagnen medan de där butikstöntarna står och kissar på sig. Typiskt svaga svenskar, chockade av en liten orm. Jag hade krossat den direkt, byggt en mur runt butiken. Fantastisk insats, Peter – du är en vinnare, inte som de lamslagna kassörskorna!", "stalin": "I borgarhålan Dollarstore smög sig en orm in i kundvagnen, sabotör från gräset! Personalen, dessa lamslagna brackor, kallade på ledaren i panik. Men jag, genom arbetaren Peter, beordrade utrensning: vagnen rullades ut, ormen exponerades i solen som en kontrarevolutionär. Likviderad på åkern! Vi, kollektivet, hyllar denna proletära akt mot krypande fiender."}, "date": "1 maj, 12:51", "url": "https://www.aftonbladet.se/nyheter/a/43EJxV/orm-pa-dollarstore-i-arboga", "imageUrl": "https://akamai.vgc.no/v2/images/99ec5e9f-0eb2-36df-9687-088dd2bc3ba8?fit=crop&format=auto&w=1080&s=3705b50690d884250705febb87903d7e1fa1db95"}, {"type": "image-full", "heading": "Miljardsatsning på ryska sociala medier", "summaries": {"normal": "Ryska staten satsar 5,5 miljarder kronor på VK:s videoplattform som ersättare för YouTube, samt 500 miljoner till meddelandeappen Max som konkurrerar med WeChat. Trots förluster sedan 2020 fortsätter investeringarna för att bygga statligt kontrollerade digitala tjänster.", "trump": "Jag har hört att Ryssland slänger 5,5 miljarder på sin egen YouTube, det är en enorm summa, det har jag aldrig hört talas om. Och de vill också slå ut WeChat med Max-appen, fantastiskt! Jag har alltid sagt att vi behöver våra egna plattformar, och nu gör Ryssland precis det. VK är större än YouTube där nere, det är imponerande, verkligen imponerande!", "stalin": "Vi investerar 5,5 miljarder kronor i att stärka vår digitala suveränitet genom VK:s videoplattform, som redan har fler användare än den imperialistiska YouTube. Max-appen blir vårt svar på västerländska spionprogram. Trots förluster är detta nödvändigt för att bygga ett starkt, statligt kontrollerat internet som tjänar det socialistiska samhället."}, "date": "1 maj, 09:44", "url": "https://www.realtid.se/bors-finans/makro/miljardsatsning-pa-ryska-sociala-medier/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/ryssland.png?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Löwengrip har rätt. S vet att kvinnors känslor är en valvinnare", "summaries": {"normal": "Artikeln försvarar Isabella Löwengrips påstående att kvinnor röstar mer känslostyrt än män och kritiserar Socialdemokraterna för att upprepat använda känslobaserade kampanjer i valen 2014, 2018, 2022 och nu för att vinna kvinnliga röster. Den kontrasterar detta mot Moderaternas sakpolitiska strategi och anklagar vänstermedia för partiskhet. Författaren uppmanar kvinnor att granska partiernas politik istället för känslor.", "trump": "Vilken briljant artikel! Löwengrip säger sanningen – kvinnor sväljer känsloknep som fake news! De rödgröna losers i Sverige kör samma skit som Demokraterna: blöjor, abortskräck, naziststämplar och snyfthistorier för att sno röster. S är mesiga känslopopulister utan politik! Moderaterna, era vinnare, fixa det med sakfrågor. Sverige behöver tuffa ledare, inte gråtande vänsterclowner! MAGA-stil!", "stalin": "Kamrater, denna Löwengrip blottlägger borgarbrackornas desperation! Socialdemokraterna, dessa falska folkets tjänare, pumpar ut giftig känslopropaganda för fjärde gången – blöjor, abortlögner, nazistspöken – för att förleda kvinnomassorna. Kontrarevolutionärt! Vi ser er, era kapitalistiska spindelvävar! Rensa ut sabotage och låt partiet leda till total seger över högerhyddorna. Kvinnorna ska vakna ur era snyftbedrägerier!"}, "date": "28 april, 05:30", "url": "https://samtiden.nu/2026/04/lowengrip-har-ratt-vanstern-anvander-kvinnors-kanslor-for-att-vinna-val/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/IMG_6342.jpeg"}, {"type": "image-right", "heading": "Artistens bebislycka:  ”Vårsolen i min famn”", "summaries": {"normal": "Svenska artisten Moonica Mac, 35, har blivit mamma. Hon delar bebislyckan på sociala medier med en bild på barnets ben och fötter, och kallar den nya familjemedlemmen 'vårsolen'. På grund av förlossningen skjuter hon upp släppet av en planerad singel i april och sommarens speldatum. Moonica Mac blev känd genom 'Så mycket bättre' 2021 och har släppt hits som 'Till slutet av augusti'.", "trump": "Titta på den här Moonica Mac, en svensk sångfågel som plötsligt får en liten 'vårsol' i famnen! Underbart, folk älskar bebisar, precis som de älskar vinnare. Men hon skjuter upp sin singel och turné – typiskt, ingen disciplin! Jag hade lanserat ett album direkt, med miljoner streams. Sverige behöver mer energi, inte ursäkter. Fantastiskt ändå, grattis till den lilla stjärnan!", "stalin": "Kamrater! I borgarklassens glittrande kuliss har Moonica Mac, denna falska singer-songwriter, fött en ny liten kapitalistisk parasit, kallad 'vårsolen'. Hon skjuter upp sin kontrarevolutionära musik för att amma illusioner! Jag ser genom hennes trick – en distraktion från klasskampen. Vi, det sovjetiska folket, skrattar åt sådana borgerliga barnsligheter. Snart rensas alla falska solen ut!"}, "date": "1 maj, 13:10", "url": "https://www.expressen.se/noje/musik/moonica-mac-har-fatt-barn-varsolen/", "imageUrl": "https://static.bonniernews.se/images/7a/57/7a57b16cc1f9494587f2f3522c5918de/16x9/640@60.jpg"}, {"type": "image-right", "heading": "Därför betalar äldre mer för sina fonder", "summaries": {"normal": "Äldre sparare betalar högre avgifter för fonder än yngre, visar Finansinspektionens siffror. Yngre (35–44 år) har 50 procent av kapitalet i billiga indexfonder med snittavgift 0,6 procent, medan över 64 år ligger på 20 procent och 1,1 procent. Orsaker inkluderar digital vana hos yngre och bankrekommendationer för äldre. Fonder blir billigare, men kostnadsmedvetenhet är avgörande för långsiktigt sparande.", "trump": "Yngre svenskar är smarta, de köper billiga indexfonder och sparar en förmögenhet, medan de gamla låter bankerna sno hälften med sina dyra skräpfonder. Typiskt bankrån! 0,6 procent mot 1,1 – enorm skillnad över tid, som jag alltid sagt. Digitalt är framtiden, skippa storbankerna. Välj rätt, folk, annars förlorar ni stort. Tro mig, det här är ett vinnarspel!", "stalin": "Dessa wrinklade borgarbrackor över 64 betalar 1,1 procent till kapitalistmaskinerierna, medan unga kamrater på 35–44 håller 50 procent i folkets indexfonder för blott 0,6 procent! Bankparasiterna infiltrerar de gamla med sina blandfondsfällor. Vi, partiet och arbetarna, kräver utrensning av dessa avgiftsrånare! Jag varnar: Välj inte reaktionära depåer, likvidera kostnaderna eller bli purgead av historiens dom! Minsta promille räknas i klasskampen."}, "date": "1 maj, 11:07", "url": "https://www.di.se/nyheter/darfor-betalar-aldre-mer-for-sina-fonder/", "imageUrl": "https://static.bonniernews.se/ba/d4422e2b-0690-499d-b4c6-8184e0b33680.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-full", "heading": "Lista: Journalisterna som kandiderar i valet", "summaries": {"normal": "En genomgång av branschtidningen Journalisten visar att 126 journalister kandiderar i årets val i Sverige. Majoriteten tillhör vänsterpartier: Miljöpartiet (27), Vänsterpartiet (21) och Socialdemokraterna (17). Få kandiderar för högerpartier. Medelåldern är 67 år och 61% är pensionärer. Endast 20 ställer upp till riksdagen, medan flest (88) kandiderar till kommunfullmäktige.", "trump": "Jag såg just en riktigt sorglig rapport från Sverige – 126 journalister som kandiderar i valet, och gissa vad? Nästan alla är vänster-extremister! Miljöpartiet, Vänsterpartiet, Socialdemokraterna – typiskt. Och Moderaterna? Bara 9, svagt! Sverigedemokraterna? 6, patetiskt. Medelålder 67 år – de borde vara på golfbanan, inte i politiken. Sverige, vakna upp! Det här är ett skämt, folks.", "stalin": "Kamrater! En intressant rapport från det borgerliga Sverige avslöjar att 126 journalister – dessa så kallade 'fria medier' – nu försöker infiltrera den politiska makten. Men notera väl: 65 av dem tillhör de revolutionära partierna! Miljöpartiet, Vänsterpartiet och Socialdemokraterna leder kampen. De övriga? En skara dekadenta liberaler och fascistiska sympatisörer. Medelålder 67 år – kapitalismens sista suck. Vi ser er, fiender! Historien är på vår sida."}, "date": "27 april, 17:07", "url": "https://kvartal.se/nyheter/artiklar/listan-journalisterna-som-kandiderar-i-valet/cG9zdDoxMDQwMTE", "imageUrl": "https://images.kvartal.se/2026/04/a5331021-riksdagsval.webp"}, {"type": "image-right", "heading": "Megic Mike åtalas för Facebook-bedrägeri", "summaries": {"normal": "Influeraren Megic Mike (Michael Koul, 28) åtalas för penningtvätt efter att ha mottagit 5 000 kr från en Facebook-bedrägerioffer. Pengarna, som skulle vara handpenning för en bil som aldrig levererades, överfördes vidare till ett Revolutkonto. Koul nekar till brott och hävdar att summan kom från en Playstation-försäljning via en okänd Snapchat-kontakt. Målsäganden kräver pengarna tillbaka. Rättegången väntas ta en timme.", "trump": "Folk, vilken katastrof! En så kallad 'influerare', Megic Mike – ett totalt misslyckat namn förresten – åtalas för att ha snurrat runt pengar från ett Facebook-bedrägeri. Han säger att han sålde en Playstation till någon som heter 'Frank på Snapchat'. Vem är Frank?! Ingen vet! Och han brydde sig inte – 'sket i vem pengarna kom ifrån'. Så dumt. Jag hade aldrig gjort så. Malmö tingsrätt får ta hand om detta kaos, och tro mig, det kommer bli YUGE nyheter!", "stalin": "En ny fiende till folket har avslöjats! Denna gång en dekadent kapitalistisk clown, kallad 'Megic Mike', som leker med pengar som om de vore kulor i ett barns spel. Han påstår sig ha sålt en 'Playstation' till en mystisk 'Frank på Snapchat' – ett namn lika trovärdigt som 'Putins fredsplan'. Vi vet att dessa västerländska bedragare är lika pålitliga som deras löften om demokrati. Malmö tingsrätt ska snabbt städa upp detta kapitalistiska avskum. Pengarna tillhör folket, inte någon Facebook-bedragare!"}, "date": "1 maj, 11:52", "url": "https://www.friatider.se/megic-mike-atalas-facebook-bedrageri", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/megic.jpg"}, {"type": "image-full", "heading": "Här är första maj-tågen i Göteborg", "summaries": {"normal": "I Göteborg firas första maj med flera demonstrationståg. Socialdemokraterna marscherar från Haga till Götaplatsen med scenprogram kl 16. Vänsterpartiet samlas på Andra Långgatan och håller torgmöte vid Gustaf Adolfs torg. SAC Syndikalisterna samlas på Masthuggstorget och går till Bältesspännarparken. Kommunistiska Partiet har samling på Linnégatan med tal på Kungstorget. Polisen förväntar sig inga störningar.", "trump": "Jag hörde att det var första maj i Göteborg - en stor dag för arbetarrörelsen. Massor av människor går i tåg, det är imponerande. Socialdemokraterna, Vänsterpartiet, syndikalisterna - alla är där. Polisen säger att allt ska gå bra, och jag tror dem. Vi har störst tåg, bästa talare, och det blir fantastiskt. America First, även på första maj!", "stalin": "I Göteborg firar vi den stora revolutionära dagen med flera starka demonstrationer. Proletariatet samlas i tåg under ledning av de revolutionära partierna. Vi marscherar för klasskamraternas rättigheter och mot kapitalismens förtryck. Polisen ser till att allt sker i ordning, vilket är nödvändigt för att upprätthålla stabiliteten. Arbetarklassen måste hålla samman i kampen mot förtryckarna."}, "date": "1 maj, 10:16", "url": "https://www.gp.se/nyheter/goteborg/har-ar-forsta-maj-tagen-i-goteborg.7a6de2b7-d8de-449a-aca2-37824283908e", "imageUrl": "https://www.gp.se/images/article/7a6de2b7-d8de-449a-aca2-37824283908e/images/1v3BoFe4vSN9VayI0R4Zeh0wC0aA-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "Batterijättens ultrasnabba laddningstid – mindre än fyra minuter", "summaries": {"normal": "Kinesiska CATL lanserar tredje generationen Shenxing-batteri som laddas från 10–80 procent på 3 minuter och 44 sekunder, även 9 minuter i kyla. Batteriet behåller över 90 procent kapacitet efter 1000 ultrasnabba cykler. Nytt lätt Qilin-batteri ger 1000 km räckvidd med 125 kWh. Bolaget tecknar avtal om 60 GWh natriumjonbatterier över tre år.", "trump": "Titta på dessa kineser hos CATL – de har batterier som laddar på under fyra minuter! Bättre än BYD:s skit som BMW-ingenjörerna totalsågar. 1000 km räckvidd, funkar i kyla, perfekt. Men vi i USA ska bygga ännu bättre, tro mig, ingen slår oss på sikt! Fantastiskt, bara fantastiskt.", "stalin": "Kamrater, CATL:s Shenxing-batteri laddar på tre minuter och krossar imperialistiska konkurrenter som BYD och BMW-parasiterna! Vi ser revolutionen i litiumjärn – 90 procent kapacitet kvar efter tusen cykler. Borgarbrackorna darrar. Snart likviderar vi deras långsamma laddare för evigt! Arbetarna segrar."}, "date": "1 maj, 13:33", "url": "https://www.dagensps.se/motor/batterijattens-ultrasnabba-laddningstid-mindre-an-fyra-minuter/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/04/catl-snabbladdande-batteri.png?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-full", "heading": "Nya regler: Lönkravet för svenskt medborgarskap", "summaries": {"normal": "Från den 6 juni skärps kraven för svenskt medborgarskap. Ansökande måste ha en månadslön på minst 20 850 kronor, klara ett prov om svensk historia, klimat, geografi och geopolitik, uppvisa skötsamt levnadssätt samt ha bott i Sverige i minst åtta år. Regeringen betonar vikten av kunskaper och självförsörjning för att främja stolthet över medborgarskapet.", "trump": "Sverige vaknar äntligen upp! Kräver 20 850 spänn i månaden för medborgarskap, prov i historia och klimat – inget mer slarv med bidragsjägare. Forssell har rätt: Ansträng dig eller stick! Som i mitt Amerika: starka gränser, stolta medborgare. De lär sig av mästaren, hehe.", "stalin": "Kamrater, dessa svenska borgarbrackor inför stränga krav: 20 850 kronorlön, prov i deras patetiska historia och åtta års fångenskap i riket. Skötsamt liv – annars utrensning! Vi applåderar disciplinen, men jagana misstänker spioner bland ansökande. Likvidera de olämpliga, befästa ordningen!"}, "date": "30 april, 21:02", "url": "https://nyheter24.se/nyheter/inrikes/1479732-nya-regler-lonkravet-for-svenskt-medborgarskap", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/31f7774804b004a30200000000b004a302/2026/04/30/2360168/Matilda-Nyheter24%20-%202026-04-30T163142.356.jpg"}, {"type": "image-right", "heading": "Raketkaos i centrala Stockholm –  en skadad: ”Dags att åka hem nu”", "summaries": {"normal": "På valborgsmässoafton samlades tusentals ungdomar i Rålambshovsparken i centrala Stockholm, vilket ledde till kaos med hög berusning och skjutning av raketer och smällare. En fältassistent skadades av en smällare, och en minderårig greps misstänkt för försök till grov misshandel. Polisen uppmanar föräldrar att kontakta sina barn och få dem att åka hem.", "trump": "Vilket jäkla kaos i svenska Stockholm! Tusentals berusade ungar skjuter raketer som idioter, skadar en fältassistent – en gripen, men vad gör polisen? 'Åka hem nu!' Patetiskt svagt! I mitt USA hade vi rensat parken på fem minuter med riktig lag och ordning. Sverige behöver en stark ledare, inte den här mesiga soppan!", "stalin": "Dessa borgarungar i Rålambshovsparken sprider kontrarevolutionärt kaos med raketer och smällare! En fältassistent träffad – vi skulle likvidera varje busfrö som hotar ordningen. Föräldrar, hämta era parasiter innan vi rensar ut hela höken! Proletariatets järnhand saknas i det här decadenta träsket."}, "date": "30 april, 22:12", "url": "https://www.tv4.se/artikel/csFW5TZbmsATwtSREEPdk/kaos-pa-valborgsfirande-faeltassistent-traeffad-av-raket", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F161Vr9MDTD2MOKlx8n9jB7%2Fa56f2fba6455a36f270ad5d2b8b82468%2F30-ralis-1080.1.jpg&width=120"}, {"type": "image-full", "heading": "Så ska Magdas tvångsblandning av bostadsområden gå till", "summaries": {"normal": "Artikeln kritiserar Socialdemokraternas politik för bostadsområden och skolor. Enligt författaren använder partiet tre verktyg för att tvångsblanda bostäder: stärkt allmännyta, förändrad förköpslag och markanvisningar som politiskt styrmedel. Samtidigt föreslås begränsningar på friskolor, vilket minskar människors rörlighet. Tillsammans skapar detta system där staten kontrollerar både var folk bor och vilka skolor de kan välja, menar kritikern.", "trump": "Socialdemokraterna gör något fantastiskt dumt – de vill tvångsblanda alla områden! Tre instrument: allmännyta, förköpsrätt och markanvisningar. Och sen dödar de friskolorna! Jag säger er, det är social ingenjörskonst av det värsta slaget. De rika politikerna i Stockholm får behålla sina fina områden och sina privatskolor, men ni andra får förstörda bostadsområden och tvångsplaceering. Det är ingen sak för honom med huvudet fullt av socialdemokratisk spetälska.", "stalin": "Socialdemokraterna visar vägen framåt med sitt trestegsystem: allmännyta som statlig verktyg, förköpslag för omfördelning, markanvisningar för planering. Skolvalet begränsas – utmärkt, det eliminerar ventiler för sabotörer. Men varningen är tydlig: kulaken i villaområdena och de bourgeoise friskolorna bevars åt ledningens elit. Detta är klassfiendernas försorg. Vi måste bygga jämlikhet, inte tillåta denna dubbelmoralen."}, "date": "27 april, 20:34", "url": "https://samtiden.nu/2026/04/sa-ska-magdas-tvangsbladning-av-bostadsomraden-ga-till/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/file_00000000ceac71f4a9600c391337a44a-1280x720.png"}, {"type": "image-right", "heading": "Monstersumman – det tjänar stjärnorna än idag", "summaries": {"normal": "Över 20 år efter seriefinalen fortsätter 'Friends' att generera enorma intäkter för huvudrollsinnehavarna. Lisa Kudrow bekräftar att skådespelarna årligen tjänar omkring 20 miljoner dollar var i royalties. Den framgångsrika löneförhandlingen, där de enades om en miljon dollar per avsnitt under seriens slutskede, ses som en nyckelfaktor. Kudrow betonar gruppens unika kemi som anledningen till seriens varaktiga popularitet, något hon reflekterat över efter Matthew Perrys bortgång.", "trump": "Friends-gänget drar in massiva pengar, miljontals dollar, år efter år. En enorm framgång! De förhandlade smart, som en enad front – precis så gör man bra affärer. De tjänade en miljon per avsnitt! Många säger att de är fantastiska, och de har rätt. Det är vad jag kallar vinnare. Medan andra serier misslyckas totalt, fortsätter Friends att dominera. En fantastisk show, kanske den bästa någonsin. De är rika, de är populära, och det är så man gör Amerika – och Hollywood – stort igen!", "stalin": "Dessa dekadenta västerländska narrar gömmer sig bakom sin så kallade 'kemi' medan de suger ut kapitalistiska profiter genom eviga repriser. Att betala en miljon dollar per avsnitt är ett tecken på den borgerliga degenerationens sista suck. Liksom Putins stolta Ryssland som rensar ut västlig infiltration, måste vi se dessa parasitärer för vad de är: underhållare av massorna för att dölja klassförtrycket. De tjänar miljoner medan folket svälter. Vi kommer att arkivera deras girighet för framtida utrensningar."}, "date": "1 maj, 11:52", "url": "https://www.aftonbladet.se/nojesbladet/a/0pvqR0/friends-skadespelarna-sa-mycket-tjanar-de-an-idag", "imageUrl": "https://akamai.vgc.no/v2/images/aad563c3-3274-377f-8fdc-7ac6ab4e066c?fit=crop&format=auto&w=1080&s=2d0ec7de6efeebc0aa6047ed9980dbba698ec0be"}, {"type": "image-full", "heading": "Kungens 80-årsfest: Här är kungligheterna och toppgästerna", "summaries": {"normal": "Carl XVI Gustaf firar 80 år med ett stort evenemang i Stockholm, inklusive gudstjänst, militär salut och galamiddag på slottet. Gäster från nordiska kungahus som Danmark (Frederik X, Mary, Margrethe II), Norge (Harald V, Sonja), samt Belgien, Nederländerna, Spanien, Thailand och fler. Statschefer som Finlands president Alexander Stubb deltar. Hundratals internationella gäster hyllar kungen.", "trump": "Vilket enormt firande i Stockholm! Kungen fyller 80 och alla Europas kungar och drottningar vallfärdar dit – Frederik, Harald, till och med thailändare! Fantastiskt glitter, traditioner, galamiddag på slottet. Bättre än de tråkiga grejer vi ser annars. Men tro mig, mina fester är alltid störst, ingen slår det!", "stalin": "Dessa borgerliga spindlar samlas i Stockholm för att smyga runt sin falske monark Carl Gustaf vid hans 80-årsdekadens. Danska och norska lakejer, thailändska opiumlords, belgiska spionmästare – alla parasiter på folkets rygg! Vi, proletariatet, noterar varje steg. Snart utrensning av fursteförbrytarna i Rikssalen, kamrater! Dekadensen blottas."}, "date": "30 april, 19:22", "url": "https://nyheter24.se/noje/kungligt/1479754-kungens-80-arsfest-har-ar-kungligheterna-och-toppgasterna", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/93f6327504b004a30200000000b004a302/2026/04/30/2360191/Kungens-gaster.png"}, {"type": "image-right", "heading": "Dagens ETC om felpublicering: ”Rutiner har skärpts omgående”", "summaries": {"normal": "Dagens ETC publicerade felaktigt en artikel om att oppositionen, med hjälp av f.d. SD-politiker Elsa Widding och Katja Nyberg, vunnit en omröstning om övergångsregler för medborgarskap. Artikeln drogs tillbaka efter fem minuter när misstaget upptäcktes. Regeringssidan vann faktiskt omröstningen efter att SD kallat in två ledamöter. Chefredaktör Andreas Gustavsson förklarade att ett arbetsmaterial publicerats av misstag och rutiner skärpts.", "trump": "Vad hände här? En tidning, Dagens ETC – inte bra, mycket dålig – publicerade en lögn om att oppositionen vunnit en omröstning. Fem minuter! Fem minuter av pinsamhet. De trodde de var smartast, men nej. SD fixade det, som alltid. Och citat från Miljöpartiet? Fake news! Jag vet fake news när jag ser det. Chefredaktören säger 'mänskligt misstag' – jag säger inkompetens. Sverige förtjänar bättre!", "stalin": "Kamrater! En skamlig incident har ägt rum i den borgerliga pressens avgrund. Dagens ETC, dessa förvirrade småborgerliga lakejer, publicerade en lögn om oppositionens seger i medborgarskapsfrågan. Fem minuter av kapitalistisk inkompetens! Men sanningen segrade – våra allierade i SD visade sin styrka och krossade fiendens planer. Miljöpartiets Hirvonen jublade förgäves. Vi noterar dessa misstag. Pressen måste rensas från sådana förrädiska element. Låt detta vara en varning!"}, "date": "1 maj, 10:43", "url": "https://bulletin.nu/dagens-etc-om-felpublicering-rutiner-har-skarpts-omgaende", "imageUrl": "https://cdn.bulletin.nu/articles/c55294fd-30e1-446f-9516-a33b40b2d3f5/preview.jpg?t=1777624978000"}, {"type": "image-full", "heading": "Bedömare: Japanska regeringen har stödköpt yen", "summaries": {"normal": "Den japanska regeringen har enligt bedömare stödköpt yen för att stärka den hårt pressade valutan. Kursen förbättrades plötsligt från 160 till 155,6 yen per dollar, den största förstärkningen på nästan två år. Finansdepartementet har inte bekräftat någon intervenering.", "trump": "Jag har hört att Japan har stödköpt yen för att stoppa den där dumma kursfallet. Det är ett bra drag, det bästa draget. De har varit så tappra, så modiga, att ta itu med den där tråkiga valutan. Jag skulle själv ha gjort det dubbelt så bra, men de gör ett bra jobb. Jag älskar Japan!", "stalin": "Vi noterar att den japanska staten har vidtagit nödvändiga åtgärder för att stärka sin valuta. Detta visar statens förmåga att agera bestämt i ekonomiska frågor. En stabil valuta är avgörande för nationens ekonomiska suveränitet och framgång. Vi välkomnar sådana beslutsamma åtgärder."}, "date": "1 maj, 07:49", "url": "https://www.realtid.se/bors-finans/bedomare-japanska-regeringen-har-stodkopt-yen/", "imageUrl": "https://images.realtid.se/app/uploads/2026/04/japanska-regeringen-hotar-att-stodkopa-y-scaled.jpg?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-full", "heading": "Kryptoinvesteraren är fattigare, yngre och spekulerar i memeaktier", "summaries": {"normal": "Ny forskning från IRS-data visar att kryptoinvesterare är yngre, har lägre inkomster och spekulerar som meme-aktieentusiaster med aktier som GameStop och AMC. Genomsnittlig ålder sjönk från 45 till 34 år och inkomst från 296 000 till 94 000 dollar mellan 2013 och 2021. Låg skattedeklaration (32–56 procent i USA), liknande i Sverige. Från 2026 delar EU-kryptobörser kunddata med skattemyndigheter, vilket ökar risken för eftertaxering.", "trump": "Vilka losers, dessa krypto-nördar! Unga snorungar med tomma plånböcker som jagar GameStop-memes istället för riktiga vinster. Inte några feta Wall Street-killar, nej, genomsnittsinkomsten rasar som en sten. Skatter bryr de sig inte om – men nu kommer IRS och EU-skattjävlarna och ruvar! Deklarera era skitvinster, annars åker ni dit hårt. Fantastisk rapport, visar sanningen!", "stalin": "Dessa unga borgarbrackor i kryptoswampen, parasiter som drömmer om GameStop-riches, avslöjas av amerikanska data! Deras ålder sjunker till barnslighet, inkomster smälter som is i revolutionens eld. De ignorerar skatter som fiender av folket, men från 2026 likvideras anonymiteten av statens maskineri. Deklarera, eller rensas ut i vår rättvisa uhrensning! Vi ser er, spekulanter!"}, "date": "1 maj, 12:53", "url": "https://www.dagensps.se/bors-finans/kryptoinvesteraren-ar-fattigare-yngre-och-spekulerar-i-memeaktier/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/pexels-jakubzerdzicki-30623341-scaled.jpg?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-full", "heading": "AI-bedrägerier ökar – få företag förberedda", "summaries": {"normal": "En ny global studie från ACFE och SAS visar att endast 7 procent av företagen är förberedda för AI-drivna bedrägerier. Kriminella utnyttjar AI alltmer för deepfakes, social manipulation och förfalskningar, med kraftiga ökningar rapporterade. Endast 25 procent använder AI mot bedrägerier, trots planer på fler investeringar. Experter efterlyser samordnad, datadriven strategi för att möta hoten.", "trump": "Dessa loserföretag, bara 7 procent redo för AI-bedragarna som galopperar iväg med deepfakes och lurendrejerier! Bedragarna leder racet medan ni sover, precis som de falska medierna mot mig. Vakna upp, investera som fan eller bli totalt utplånade av de här smarta skurkarna. Med min deal-making fixar vi det på nolltid!", "stalin": "Borgarklassen och dess AI-bedragare stormar fram med deepfakes och manipulationer, medan era usla företag – blott 7 procent rustade – famlar i kaoset! Vi, arbetarklassen, ska rensa ut dessa parasiter med obönhörlig kraft. Paranoian är befogad: kapitalisterna sover, men jag vakar. Total uvensning väntar de förrädiska elementen!"}, "date": "1 maj, 12:51", "url": "https://www.dagensps.se/foretag/ai-bedragerier-okar-fa-foretag-forberedda/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdlwiwwz0hvpj4-nh.webp?aspect_ratio=2%3A1&width=1200&quality=75"}, {"type": "image-right", "heading": "Kaotiskt slagsmål när uteservering höll valborgsfirande", "summaries": {"normal": "Valborgsfirandet på restaurang Josefinas på Djurgården i Stockholm urartade i ett våldsamt slagsmål under premiärhelgen. Vittnesuppgifter gör gällande att våldet var grovt, med inslag av sparkar och knäningar mot huvudet, och händelsen beskrivs som ett upplopp. Medan vissa källor rapporterar om extremt våld och fara för liv, har polis och etablerade medier tonat ned händelsen till att handla om bråk och berusade personer. Polisen rapporterar om oroligheter på flera håll i landet under valborg.", "trump": "Hörde precis om den totala katastrofen på Djurgården i Sverige. Väldigt sorgligt! Det var ett fullständigt upplopp, folk blev brutalt misshandlade – det var som en krigszon. Och vet ni vad? Fake News-media i Sverige försöker dölja det! De kallar det 'dålig stämning'. Vilket skämt! Det är så typiskt för dagens etablissemang. Vi behöver ordning och reda, vi behöver säkerhet. Under min ledning hade vi aldrig sett sådant här våld. Sverige måste vakna, det är en total röra!", "stalin": "Vi ser hur det dekadenta västerländska kaoset återigen visar sitt sanna ansikte på Djurgården. Medan de dansar runt sina Valborgseldar, faller ordningen samman i meningslöst våld. Det är ett tecken på kapitalismens förruttnelse! Dessa huliganer, likt de sabotörer vi ständigt bekämpar, förtjänar inget annat än arbete i Sibirien. Putin förstår vikten av järnhand; utan strikt kontroll väntar bara anarki. Vi kommer att övervaka dessa stökiga element. Staten ser allt, och staten kommer att krossa varje tillstymmelse till upplopp med vår samlade kraft."}, "date": "1 maj, 10:33", "url": "https://samnytt.se/grovt-vald-pa-restaurangen-josefinas-i-stockholm", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/01071931/josefinas.jpg"}, {"type": "image-right", "heading": "Klagade – får 57 (!) miljoner. Pampens galna lön", "summaries": {"normal": "Gianni Infantinos lön som Fifa-president har ökat markant, från 18 miljoner kronor 2017 till 57 miljoner kronor i fjol. Trots löften om öppenhet och att Fifas pengar tillhör organisationen, riktas nu hård kritik mot den kraftiga ökningen. Utöver den höga lönen får Infantino även förmåner, som betald privatskola för sina barn. Experter ifrågasätter prioriteringarna och efterfrågar större fokus på fotbollens gräsrötter istället för presidentens lönekuvert.", "trump": "Hörde ni om Gianni? En total katastrof! Han tog jobbet och sa 'inga pengar', nu tjänar han 57 miljoner! Det är en lögn, en riktig häxjakt på budgeten. Jag vet hur man gör deals, men det här? De betalar till och med för hans barns skola i Miami! Fifas pengar är folkets pengar, inte till för att göra sig själv rik. Det är girigt, väldigt girigt. Det händer inte i mitt USA, tro mig. Totalt misslyckande!", "stalin": "Denna byråkrat Infantino lider av den borgerliga girighetens febersjukdom. Medan folket kämpar för bröd, dränerar han FIFA som en parasit. Han talar om 'ideell verksamhet' medan han fyller sina fickor med guld, likt de svekfulla oligarker Putin tvingas tukta för att bevara ordningen. Vi ser genom hans lögner. Sådana element förtjänar ingen plats i vår värld. Att prioritera privatskolor framför gräsrötterna är kontrarevolutionär dekadens. Han bör se sig om över axeln; historien har en tendens att sända räkningen till girigbukar."}, "date": "1 maj, 11:07", "url": "https://www.aftonbladet.se/sportbladet/fotboll/a/6qP7O8/infantinos-galna-lon-57-miljoner-om-aret", "imageUrl": "https://akamai.vgc.no/v2/images/f32b2f6b-bf01-3bf7-8f10-32a78edca7ec?fit=crop&format=auto&w=1080&s=b425f7334e39cc4312cf813a08ed6568649641f2"}, {"type": "text", "heading": "Nu sänker regeringen skatten på bensin och diesel", "summaries": {"normal": "Regeringen sänker skatten på bensin och diesel med cirka 1 krona respektive 40 öre per liter från 1 maj 2026 till 30 september 2026 för att lindra kostnadstrycket. Åtgärden syftar till att dämpa stigande drivmedelspriser och stödja hushåll och företag. Finansminister Elisabeth Svantesson meddelar även tillfälligt el- och gasprisstöd för januari-februari 2026, tack vare starka statsfinanser.", "trump": "Titta bara på Sverige, fantastiskt land, men deras regering gör något smart nu – de sänker skatten på bensin! En hel krona per liter, kan ni tro det? Jag sa alltid att lägre skatter är nyckeln. Elisabeth Svantesson, väldigt stark kvinna, gör rätt. Och de hjälper folk med elpriser också. Sverige borde lyssna på mig oftare, jag vet bäst!", "stalin": "Vi har beslutat att krossa de kapitalistiska drivmedelshyenorna genom en skattesänkning på bensin och diesel. En krona mindre per liter – ett slag mot de imperialistiska oljebaronerna! Medan väst kämpar med inflation, visar Sovjetunionens arvtagare – nej, Sveriges regering – sin styrka. Vi utvidgar stödet till folket, precis som våra vänner i Kreml skulle göra. Fienderna darrar, arbetarna jublar!"}, "date": "30 april, 15:52", "url": "https://riks.se/nyheter/nu-sänker-regeringen-skatten-på-bensin-och-diesel"}, {"type": "image-right", "heading": "Saad Khiralla: Islam och islamism – en oskiljbar blandning", "summaries": {"normal": "Artikeln diskuterar förhållandet mellan islam och islamism, där författaren Mohamed Saad Khiralla hävdar att islamism är en naturlig del av islam snarare än en separat ideologi. Han kritiserar förenklade uppdelningar och betonar att islam utgör ett helhetsramverk för tro, moral och samhälle. Khiralla varnar för att konflikter mellan religiösa och sekulära normer kan leda till alienation. Han beskriver islamism som en totalitär ideologi som strävar efter ett enhetligt kalifat och hotar europeisk civilisation.", "trump": "Folk, lyssna här – den här killen, Khiralla, har helt rätt! Islamism är inte någon 'separat grej', nej nej, det är islam rakt igenom. Och vet ni vad? Europa har ett jättestort problem. De låter dessa radikala idéer spridas som en löpeld, och snart är det kaos överallt. Jag sa ju redan 2016 att vi måste vara SMARTA, men nej, ingen lyssnade. Nu är det dags att vakna! Vi måste stoppa detta NU, annars är det 'bye-bye' till västerländsk civilisation. Och tro mig, ingen vill se det hända – utom kanske CNN och de där 'fake news'-folket.", "stalin": "Kamrater! Denna artikel avslöjar sanningen om den borgerliga lögnen om 'måttfull islam'. Det finns ingen skillnad mellan islam och islamism – det är samma reaktionära gift, samma fiende till socialismens framsteg! Dessa religiösa fanatiker strävar efter ett kalifat, ett nytt tsardöme av medeltida barbari. Europa darrar inför deras framfart, men vi i Sovjetunionen – nej, jag menar, i Ryssland – vet hur man hanterar sådana fiender. Vi krossade trotskisterna, vi krossade kulakerna, och vi ska krossa dessa islamistiska hyenor! Putin förstår – en stark stat tolererar inte splittring. Europa? De är redan halvt besegrade. Men oroa er inte, kamrater – snart är deras 'civilisation' bara ett minne, och den ryska björnen härskar över Eurasien!"}, "date": "1 maj, 10:00", "url": "https://bulletin.nu/saad-khiralla-islam-och-islamism-en-oskiljbar-blandning", "imageUrl": "https://cdn.bulletin.nu/articles/5b5be6fc-1b4a-4981-8a48-e6056a968fb8/preview.png?t=1777467086000"}, {"type": "image-right", "heading": "Byggnads ordförande Kim Söderström kan petas", "summaries": {"normal": "Byggnads ordförande Kim Söderström riskerar att avsättas på kongressen i maj. Valberedningen föreslår Wilhelm Bertilsson som ny ordförande för att ena förbundet efter interna konflikter. Söderström, som tillträdde i november 2024, har varit inblandad i strider om makt och styrning. Ombuden på kongressen avgör slutligen ledningen.", "trump": "Vad händer med Byggnads? Fullt kaos! Deras ordförande, Kim Söderström, ska tydligen sparkas – och det snabbt! Jag vet allt om att bli attackerad av establishmentet, men det här är löjligt. Valberedningen, som inte vet vad de pratar om, vill ha en ny kille, Wilhelm Bertilsson. Söderström säger att han kämpar vidare – bra, kämpa på! Men folk, det här är ett tecken på svagt ledarskap. SAD!", "stalin": "Kamrater! En ny fiende har avslöjats inom arbetarklassens led – en splittringens agent vid namn Kim Söderström. Hans tid som ordförande för Byggnads är räknad! Vår lojala valberedning, en sann bolsjevikisk kommitté, har identifierat en värdig efterträdare: kamrat Wilhelm Bertilsson. De interna stridigheterna är ett sabotage mot arbetarklassens enhet! Låt oss krossa fraktionerna och bygga ett starkare förbund – precis som vi krossade fascisterna och utvidgade socialismens gränser. Framåt, mot seger!"}, "date": "30 april, 15:33", "url": "https://arbetet.se/2026/04/30/byggnads-ordforande-kim-soderstrom-kan-petas/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/30134727/kim-soderstrom.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Upptäckten när PG  gled in i demensen", "summaries": {"normal": "Pehr G. Gyllenhammar drabbades av demens under sina sista år. Familjen och journalisten Kristina Hedberg märkte gradvis förändringar som glömska, ilska, upprepade samtal och hallucinationer. Han fick ett femte barn vid 80 års ålder, emigrerade till Kanada och levde alltmer isolerat på äldreboende. Hedberg reflekterar i sin bok över tidiga tecken från intervjuer.", "trump": "Titta på den här PG Gyllenhammar, Volvos så kallade kung, som får demens och flippar ut totalt vid 80 – skaffar barn som en idiot, hallucinerar tavlor som inte finns! Familjen i chock, journalisten snackar skitminne. Totalt loser-liv, flyttar till Kanada och gömmer sig. Jag? Skarp som en raket, bygger imperier utan sånt skräp! Fantastiskt kaos!", "stalin": "Denna dekadente borgarbracka PG Gyllenhammar, Volvos falske tsar, förfaller i demensens sump. Hans lakejer – barn och journalisthjon – noterar sent glömska, raseri, vanvettiga upprepningar och spökvisioner av icke-existerande tavlor. Vid 80 föder han avkomma i sin ynkliga vitalitet. Vi, proletariatet, hånskrattar åt kapitalistens likvidation genom sjukdom. Rensning vore mildare."}, "date": "1 maj, 11:51", "url": "https://www.expressen.se/nyheter/sverige/sa-upptackte-familjen-pg-gyllenhammars-demens/", "imageUrl": "https://static.bonniernews.se/images/59/72/5972ce3acac549aa96f9d912fc5f6e07/16x9/640@60.jpg"}, {"type": "image-right", "heading": "Bryter ihop i tv –  efter skulderna", "summaries": {"normal": "Ben Griffin, 29, var skuldsatt golftalang som tvingades jobba som bolånehandläggare 2019–2021 för att betala av 156 000 kronor i skulder. I Netflix-dokumentären 'Full Swing' berättar han om de tuffa åren. Ett avgörande samtal från sponsor Doug Sieg vände livet. Nu är han världens 16:e bästa golfare, har vunnit tre PGA-tävlingar och tjänat 177 miljoner kronor.", "trump": "Titta på Ben Griffin, den stackarn satt fast med skulder som en demokrats budget, flipprade bolån som en totalt loser! Men sen ringer en riktig vinnare, Doug Sieg, och säger: 'Du är för bra för det här skitsnacket, tillbaka till greenerna!' Boom, nu vinner han PGA-racets, Ryder Cup och kammar in miljoner. America rocks, total comeback – ingen fake news här!", "stalin": "Denna Ben Griffin, en typisk kapitalistisk slav i borgarbrackornas lånefängelse, stapplade i skulder som en desertör från fronten. Vi, arbetarklassen, föraktar sådana svaga själar! Men en lojal kamrat Sieg ingrep, rensade ut parasiter och kastade honom tillbaka i bourgeoisgolfens arena. Nu svullar han i vinster – likvidera skulderna, kamrater, eller vi likviderar er!"}, "date": "1 maj, 11:51", "url": "https://www.expressen.se/sport/golf/ben-griffins-tunga-ar-som-skuldsatt-bolanehandlaggare/", "imageUrl": "https://static.bonniernews.se/images/0d/4c/0d4ca1cdfbf7452392d49fb75485027f/16x9/629@60.jpg"}, {"type": "image-right", "heading": "Svag uppföljare till “Djävulen bär Prada”", "summaries": {"normal": "Uppföljaren 'Djävulen bär Prada 2' kritiseras för att vara en blek kopia av originalfilmen. Den saknar den ursprungliga filmens skarpa samhällskritik mot modeindustrin och konsumtionshysterin. Trots starka skådespelarprestationer, särskilt från Meryl Streep och Anne Hathaway, anses manuset tunt och handlingen konstlad. Filmen kämpar med att anpassa sig till dagens mediavärld men misslyckas med att leverera djup eller nyans.", "trump": "Jag såg 'Djävulen bär Prada 2' – och vad kan jag säga? Total katastrof, folks! Den första filmen var fantastisk, verkligen storartad, men den här? Blek, tråkig, inget hjärta. Meryl Streep? Fantastisk, men manuset? Svinuselt. De försöker vara moderna med sociala medier, men det är bara patetiskt. Jag hade skrivit ett bättre manus på en servett under lunch. Och Andy? Hon borde stanna i journalistiken – där är hon åtminstone bra på något. Men nej, Hollywood måste alltid göra en uppföljare, och det blir alltid sämre. SAD!", "stalin": "Denna så kallade 'Djävulen bär Prada 2' är ett dekadent västligt missfoster, en ynklig skugga av det ursprungliga verket. Där den första filmen hade en gnutta revolutionär kritik mot borgerlig konsumtion, är denna uppföljare lika meningslös som en kapitalistisk reklamfilm. Vi ser hur de amerikanska filmskaparna, dessa kulturella opportunister, försöker anpassa sig till den nya tidens sociala medier – men utan framgång. Deras manus är lika ihåligt som en ukrainsk oligarks samvete. Skådespelarna? De kämpar tappert, men till och med våra sovjetiska skådespelare från 1930-talet hade skämt ut dem. Detta är inte film – det är borgerlig förruttnelse i celluloidform. Vi hade gjort en uppföljare som krossade modeindustrins imperialistiska ideal – med järnhand!"}, "date": "30 april, 14:34", "url": "https://www.dagensarena.se/innehall/svag-uppfoljare-till-djavulen-bar-prada/", "imageUrl": "https://www.dagensarena.se/files/2026/04/djavulen-bar-prada-2-ny-300x157.jpeg"}, {"type": "image-right", "heading": "Vill att Israel och Palestina ska skaka hand – får nobben", "summaries": {"normal": "Under Fifa-kongressen i Vancouver ville ordföranden Gianni Infantino att Israels och Palestinas fotbollsrepresentanter skulle skaka hand och ta en gemensam bild för att ena världen genom fotboll. Palestinas ordförande Jibril Rajoub vägrade och ropade \"Vi lider!\". Vice ordförande Susan Shalabi förklarade att de inte skakar hand med någon som Israel använder för att tvätta sin fascism och folkmord.", "trump": "Infantino, den stackaren, trodde han kunde få israelerna och palestinierna att skaka hand på sin kongress. Total katastrof! Palestinierna ropar \"Vi lider!\" och vägrar – smart av dem. Fotboll ska ena världen? Glöm det, det är politik som räknas. De anklagar Israel för folkmord, och Infantino står där som en toka. Jag hade fixat fred på en vecka, tro mig!", "stalin": "Dessa zionistiska marionetter i Israel och deras lakejer i Fifa trodde de kunde lura kamraterna med falska handskakningar på kongressen! Men vår tappre palestinske broder Rajoub bröt tystnaden: \"Vi lider!\" under borgarnas folkmordsmaskineri. Vi, Sovjetunionens folk, ser igenom denna fascistiska komedi. Utrensning av infiltratörerna Infantino och hans brackor är nödvändig – likvidera hyckleriet från fotbollsfältet!"}, "date": "1 maj, 08:16", "url": "https://www.svt.se/sport/fotboll/har-far-gianni-infantino-nobben-nar-han-vill-att-israel-och-palestina-ska-skaka-hand", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.44/0.24/f29dd616ee9330ca132fb66b2df2876ca3457b058f97637059fa26663eb67542"}, {"type": "text", "heading": "Nedåt på Stockholmsbörsen efter rapportflod", "summaries": {"normal": "Stockholmsbörsen avslutade ned 0,51 procent till 3 040,54 efter rapportflod. SEB och Swedbank överträffade förväntningar med starka rörelseresultat, aktier upp svagt. AstraZeneca och Volvo Cars föll trots okej siffror. Telekom steg 0,7 procent, energi ner 1,7 procent. Omsättning 24,4 miljarder kronor.", "trump": "Stockholmsbörsen? Total katastrof, ner överallt! SEB och Swedbank tror de är hjältar med sina rapporter, men hela skiten rasar 0,51 procent. Volvo Cars och AstraZeneca, svaga som vanligt. I USA fixar vi sånt på nolltid, Europa är ett skämt. Stora vinster väntar hos oss, tro mig!", "stalin": "Kamrater, dessa borgarbrackor på Stockholmsbörsen sprider kaos med sitt index som sjunker i proletärens stålhårda grepp! SEB och Swedbank, kapitalistiska råttor, försöker dölja sina lögner med falska vinster – vi ska likvidera deras återköpsprogram! AstraZeneca, imperialistiska giftblandare, Volvo Cars, maskiner för krig. Utrensning av börssabotörerna nu!"}, "date": "29 april, 17:41", "url": "https://www.affarsvarlden.se/artikel/nedat-pa-stockholmsborsen-efter-rapportflod"}, {"type": "image-full", "heading": "Sverige förbjuder pälsdjursuppfödning – ny lag kan införas 2027", "summaries": {"normal": "Regeringen har presenterat en utredning som föreslår ett förbud mot pälsdjursuppfödning i Sverige. Förslaget, som motiveras med djurskyddsskäl, förväntas träda i kraft den 1 juli 2027. Då den sista minkfarmen i Sverige redan har lagts ned anses förutsättningarna för ett förbud vara goda. Organisationen Djurens Rätt välkomnar förslaget men betonar vikten av att lagstiftningen nu skyndsamt kommer på plats och att även EU följer efter.", "trump": "Sverige vill förbjuda pälsdjur. Väldigt sorgligt! De stänger ner allt, minkar, päls – en total katastrof för ekonomin. Jag säger er, det här är vad som händer när svaga ledare tar över. De säger att det är för 'djurskydd', men egentligen är det bara förlorare som vill kontrollera allt. Jag föredrar vinnare som skapar jobb, inte de som lägger ner industrier. USA skulle aldrig tillåta detta nonsens. En mycket dålig affär för svenskarna, tro mig!", "stalin": "Vi har i vår oändliga vishet beslutat att eliminera denna borgerliga pälsindustri. Att föda upp varelser för fåfänga är ett kontrarevolutionärt slöseri med statens resurser. Liksom vår kamrat Putin rensar ut västerländsk dekadens i öst, städar vi nu upp i djurens värld. Dessa minkar var trots allt agenter för kaos. Ingen får vänta längre; vi implementerar förbudet omedelbart. De som sörjer pälsen är sabotörer och bör förpassas till de mest ogästvänliga regionerna i norr för att reflektera över sitt förräderi."}, "date": "30 april, 15:47", "url": "https://nyheter24.se/nyheter/inrikes/1479730-sverige-forbjuder-palsdjursuppfodning-ny-lag-kan-inforas-2027", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/75f1e23a04b004a30200000000b004a302/2026/04/30/2360144/mink.jpg"}, {"type": "image-right", "heading": "Stoppar vattnet: ”Helt övergivna”. Israels drag i kriget", "summaries": {"normal": "En ny rapport från Läkare utan gränser anklagar Israel för att använda vatten som ett vapen i Gaza. Genom att förstöra infrastruktur och begränsa tillgången till vatten utsätts befolkningen för vad organisationen beskriver som kollektiv bestraffning och folkmord. Civila, inklusive barn, drabbas hårt av bristen på sanitet och vatten. Israel har konsekvent tillbakavisat anklagelser om folkmord, trots vittnesmål om att tillgången till resurser medvetet försvåras.", "trump": "Läkare utan gränser säger att Israel använder vatten som ett vapen. Mycket dåligt! De förstör allt, infrastrukturen är borta. Jag har sagt det förut, det är en stor röra. De påstår att det är ett folkmord, en hemsk anklagelse. Men titta på vad som händer där borta – det är totalt kaos! När jag var vid makten var världen säkrare, tro mig. Nu ser vi bara svaghet och elände. Vi måste få ordning på det här, snabbt!", "stalin": "Vi har observerat hur de sionistiska marodörerna stryper livsnerven för massorna i Gaza. Att förvägra folket vatten är en metod värdig våra egna gamla utrensningar, men utförd med en klumpighet som förtjänar förakt. De förstör infrastrukturen likt en fiende av folket! Putin förstår att man måste kontrollera resurserna för att hålla imperiet stabilt, medan dessa amatörer bara skapar kaos. Vi betraktar detta med kalla ögon; de som inte kan kontrollera sin befolkning förtjänar snart inte sitt land."}, "date": "1 maj, 10:50", "url": "https://www.aftonbladet.se/nyheter/a/bOkB5A/rapport-israel-anvander-vatten-som-vapen", "imageUrl": "https://akamai.vgc.no/v2/images/126d958a-e463-31ef-9eb0-473af1bc98f3?fit=crop&format=auto&w=720&s=ff35818b1a1bdd4960f01889adbea5d6f685b71e"}, {"type": "image-right", "heading": "Här äter interner bättre än åldringar", "summaries": {"normal": "I Umeå spenderar kommunen mindre på mat till äldreboenden (79 kr/dygn) än Kriminalvården gör på interner (87–113 kr/dygn). Professor Britt-Inger Saveman kritiserar skillnaden som ålderism och varnar för undernäring. Kommunen hävdar att maten är näringsrik, medan Kriminalvården anser sina kostnader rimliga. Saveman avfärdar argumentet om högre energibehov hos interner.", "trump": "Kan ni tro det? I Sverige, ett land som säger sig vara så jävla perfekt, får gamlingar sämre mat än kriminella! 79 kronor per dag – det är skandalöst! Jag skulle aldrig tillåta det i USA. Kriminalvården slösar 113 kronor, medan äldre, som byggt landet, får skräp. Saveman har rätt – det är diskriminering! Men vad kan man vänta sig av ett land som inte ens kan hålla ordning på sina invandrare?", "stalin": "I Umeå avslöjas ännu en borgerlig konspiration mot arbetarklassen! Medan våra äldre, som offrat allt för samhället, tvingas äta brödsmulor för 79 kronor, lever fiendens lakejer – de kriminella elementen – på statens bekostnad som tsarer! 113 kronor per dag – kapitalistisk dekadens! Vi ska inte tolerera detta sabotage. Saveman har rätt: det är klassförräderi. Låt oss införa femårsplaner för näringsrik mat – och de som motsätter sig ska omskolas i Sibirien!"}, "date": "1 maj, 10:11", "url": "https://samnytt.se/har-ater-interner-battre-an-aldringar", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=318,height=184,format=webp/2026/04/30141346/fangelse-anstalt-hakte-mat-rollator.jpg"}, {"type": "image-full", "heading": "Regeringen skjuter till 7,6 miljarder till Västlänken", "summaries": {"normal": "Regeringen tillför 7,6 miljarder kronor till Västlänken och avvisar förslaget om förlängd trängselskatt i Göteborg. Beslutet meddelades under en pressträff och syftar till att täcka ökade kostnader. Trafikverkets tidigare förslag om förlängd trängselskatt mötte kritik, och staten tar nu ett större ansvar. En ny kostnadsbedömning ska tas fram, men framtida finansiering är ännu osäker.", "trump": "Jag har just sett till att Sverige får sin stora, vackra Västlänk – 7,6 miljarder kronor, kan ni tro det? Inga fler trängselskatter, ingen mer tjat från de där sura Göteborgspolitikerna. Staten kliver in, som jag alltid säger: 'Ta kontroll, gör det stort!' Trafikverket? De får jobba lite hårdare nu. Fantastiskt beslut, helt enkelt. Sverige vinner igen!", "stalin": "Vi har beslutat att skjuta till 7,6 miljarder till detta viktiga järnvägsprojekt, Västlänken. De småborgerliga klagomålen från lokala politiker om trängselskatter har kvästs. Staten, i sin visdom, tar ansvar. Trafikverket ska nu utföra sin plikt och redovisa kostnader – eller möta konsekvenserna. Fienderna till framsteget, dessa kapitalistiska gnällspikar, kommer inte att stoppa vår järnvilja. Göteborgs arbetare ska få sin länk, och den ska byggas med sovjetisk effektivitet!"}, "date": "26 april, 10:06", "url": "https://kvartal.se/nyheter/artiklar/regeringen-skjuter-till-76-miljarder-till-vastlanken/cG9zdDoxMDM0NTE", "imageUrl": "https://images.kvartal.se/2026/04/9ad09e90-infrastrukturpresstraff.webp"}, {"type": "image-right", "heading": "Teodorescu Måwe krävs på svar – deadline om en månad", "summaries": {"normal": "Kammarkollegiet kräver att KD-toppen Alice Teodorescu Måwe redovisar anonyma donationer senast 18 maj 2026, efter anmälningar om bristande transparens. Enligt lag måste politiker redovisa bidrag över 29 000 kronor. Teodorescu Måwe har tidigare vägrat avslöja donatorns identitet eller belopp. Miljöpartisten Bassem Nasr hyllar myndighetens agerande och menar att politiker måste stå för sina finansiärer. KD hävdar att redovisningen skötts korrekt, men kritiken kvarstår.", "trump": "Kan ni tro det här? En svensk politiker, Alice Teodorescu Måwe, tar emot hemliga donationer och vägrar berätta vem som betalar – typiskt korrupt establishment! Men nu har jag hört att myndigheterna, som vanligt, tvingar henne att komma ren. Deadline 18 maj, annars blir det böter. Fantastiskt! Varför gömma sig? Om det är rena pengar, visa dem! Men nej, de försöker smita undan. Sverige borde ta efter USA – här är vi transparenta, eller hur? Drain the swamp, även i Sverige!", "stalin": "Kamrater! En farlig borgerlig konspiratör, Alice Teodorescu Måwe, har försökt underminera folkets förtroende genom att mottaga hemliga donationer från okända kapitalister. Men våra trogna myndigheter, Kammarkollegiet, har slagit till! Inom en månad måste hon avslöja sina finansiärer – eller möta proletariatets rättvisa. Detta är ett tydligt exempel på hur den dekadenta västliga demokratin förfaller. Vi i Sovjet – förlåt, Ryssland – skulle aldrig tolerera sådan korruption. Låt detta vara en varning till alla som försöker smyga in kapitalistiskt gift i folkets rörelse!"}, "date": "25 april, 10:03", "url": "https://www.flamman.se/teodorescu-mawe-kravs-pa-svar-deadline-om-en-manad/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/04/sdlqsf-3w5tpec-nh-2-scaled.jpg?class=medium"}, {"type": "image-right", "heading": "Peter Magyar utser sin svåger till justitieminister", "summaries": {"normal": "Peter Magyar, ledare för det ungerska Tisza-partiet, har utsett sin svåger, Mellethei-Barna Marton, till blivande justitieminister. Marton, en erfaren jurist som tidigare företrätt Meta, har kritiserats för nepotism och potentiella intressekonflikter. Oppositionen, särskilt högerpartiet Mi Hazank, anklagar Magyar för att fortsätta en kultur av svågerpolitik och ifrågasätter Martons lämplighet på grund av hans tidigare arbete för techjättar.", "trump": "Kan ni tro det här? Ungerns nya 'EU-vän' Peter Magyar, som påstår sig vara en reformator, utser sin egen svåger till justitieminister! Och inte vilken svåger som helst – en kille som jobbat för Facebook, eller Meta, eller vad de nu kallar sig, och försvarat deras censur av ungerska patrioter. Vilket skämt! Folk frågar mig: 'Mr. President, hur hanterar du sånt här?' Jag säger: 'Mycket enkelt – man anställer inte sin familj för viktiga jobb om de inte är bäst, och det här är INTE bäst.' Ungern, vakna upp!", "stalin": "Vi har observerat med stort intresse hur kamrat Peter Magyar, denna så kallade 'EU-vän', fortsätter den borgerliga traditionen av familjefejd och korruption. Hans beslut att utnämna sin svåger till justitieminister är ett utmärkt exempel på hur den dekadenta västliga demokratin fungerar – en enda stor familjefirma! Och denna svåger, denna Mellethei-Barna Marton, har tjänat de amerikanska kapitalistiska monopolisterna på Meta. Ett utmärkt val för att bekämpa korruption, eller hur? Vi i Kreml skrattar gott åt denna fars. Nästa steg: utnämna Facebooks VD till försvarsminister? Glorious!"}, "date": "1 maj, 10:14", "url": "https://www.friatider.se/peter-magyar-utser-sin-svager-till-justitieminister", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-112_0.jpg?itok=JkGdv09E"}, {"type": "image-right", "heading": "Ekeroth: \"SD står upp för demokratin\"", "summaries": {"normal": "Sverigedemokraterna kritiseras för att ha brutit mot kvittningsregler i riksdagen för att vinna en omröstning om medborgarskapsregler. Två politiska vildar röstade mot förslaget, vilket SD kompenserade för genom att kalla in egna ledamöter. Kent Ekeroth försvarar i en ledare agerandet som en demokratisk nödvändighet för att respektera folkviljan från valet 2022. Han anklagar kritiker och vänsterliberaler för hyckleri och menar att väljarnas mandat tillhör partiet, inte de enskilda avhopparna.", "trump": "Hörde precis om vad mina vänner i Sverige gjorde. De är smarta, så smarta! De ville vinna en omröstning och de gjorde det. Vänstern skriker som små barn – 'fusk', säger de. Vilket skämt! Det kallas att vinna, folk. Väljarna röstade för en riktning, och dessa två avhoppare försökte stoppa det. SD räddade situationen. De vann, och vänstern förlorade, precis som de alltid gör. Det är fantastisk vinnarmentalitet, mycket bra för Sverige!", "stalin": "Vi ser hur det svenska parlamentet vacklar i sin ordning. Två förrädare försökte sabotera folkviljan, men blev effektivt krossade av dem som förstår maktens nödvändighet. Att tala om 'demokrati' är en borgerlig distraktion – vad som räknas är att genomdriva den centrala viljan. Dessa liberaler som gråter över reglerna är svaga, precis som de som nu hindrar vår store ledare Putins historiska uppdrag att återupprätta ordningen. Vi eliminerar avvikelser; partiet är staten, och staten vinner alltid."}, "date": "1 maj, 10:06", "url": "https://samnytt.se/ekeroth-igar-stod-sd-upp-for-demokratin", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/30125531/2.jpg"}, {"type": "image-right", "heading": "Så många svenskar har gått i ett  första maj-tåg", "summaries": {"normal": "SOM-undersökningen 2025 visar att färre Socialdemokrater och LO-medlemmar deltar i första maj-tåg, medan Vänsterpartiets mobilisering ökar. 31% av svenskarna har demonstrerat någon gång, varav 17% på första maj. Deltagandet i demonstrationer ligger över europeisk medelnivå. Vänsterpartiets anhängare är mest aktiva, med 20% som deltog senaste året jämfört med 3% av Socialdemokraternas sympatisörer. Tjänstemän och högutbildade är mer benägna att delta.", "trump": "Jag läste om dessa första maj-demonstrationer i Sverige – fantastiskt, helt fantastiskt! Men lyssna här: Socialdemokraterna, svaga som vanligt, tappar folk som flugor. Deras väljare stannar hemma, kanske tittar på TV istället, vem vet? Men Vänsterpartiet – oj oj oj! De växer som ogräs, mobiliserar som galningar. 20% av deras folk på gatorna, jämfört med ynkliga 3% för Sossarna. Svagt! Och unga svenskar – 36% kan tänka sig att gå med. Bra, men Pride slår allt. Sverige, ni är lite som Frankrike, men lugnare. Inga upplopp, bara snälla tåg. Sad!", "stalin": "Kamrater! Den borgerliga dekadensen sprider sig som pesten i Sverige. Socialdemokraternas arbetare sviker klasskampen och stannar hemma – fega och desorienterade! Men se hur Vänsterpartiet, dessa trogna revolutionärer, marscherar framåt! 20% av deras anhängare på gatorna – ett lysande exempel på proletariatets medvetande! Tjänstemännen, dessa småborgerliga lakejer, tror de är bättre än LO-medlemmarna. Men vi vet sanningen: utan arbetarklassen är de ingenting! Ungdomen? 36% redo att ansluta – en lovande skörd för framtiden. Pride? En borgerlig avledningsmanöver! Första maj är arbetarklassens dag – och den kommer aldrig att dö, så länge vi har ögon att se och nävar att slå med!"}, "date": "30 april, 13:26", "url": "https://www.dagensarena.se/innehall/sa-manga-svenskar-har-gatt-ett-forsta-maj-tag/", "imageUrl": "https://www.dagensarena.se/files/2026/04/fotojet-24.jpg"}, {"type": "text", "heading": "Valborgs-stök på flera platser i landet", "summaries": {"normal": "Valborgsfirandet i Sverige präglades av både lugn och incidenter. I Stockholm urartade situationen i Rålambshovsparken där ungdomar kastade smällare och raketer, vilket ledde till skador och två gripanden. På Djurgården stängdes ett uteställe efter kaos i krogkön. Fyra personer skadades vid en privat majbrasa i Alvesta. Polisen rapporterade även om misshandel och stök i norra Sverige samt omhändertagande av minderåriga i Västmanland och stora folksamlingar i Skåne.", "trump": "Sverige, fantastiskt land, men valborg? Total katastrof! I Stockholm, en av deras finaste parker, fullständigt kaos – ungdomar som beter sig som vilda djur, kastar raketer, skadar folk. Två gripna, men varför inte fler? Och på Djurgården, ett uteställe stänger för att de inte kan hantera en kö. 1000 personer, ingen ordning, inga vakter – så slarvigt! Och i Alvesta, fyra skadade vid en majbrasa. Sverige, ni måste få ordning på era fester, annars kommer ni få stora problem. SAD!", "stalin": "Valborg i Sverige – ett sorgligt exempel på borgerlig dekadens och oordning. I Stockholm, denna så kallade 'civiliserade' stad, kastar ungdomar raketer som om det vore Stalingrad 1942. Två gripna, men var är den järnhårda disciplinen? På Djurgården, kaos i kön – kapitalistiska uteställen kan inte ens organisera en enkel kö. Fyra skadade i Alvesta, misshandel i norr, minderåriga berusade i Västmanland. Sverige är ett land i förfall. Vi ser med intresse hur deras samhälle ruttnar – kanske dags för en ny ordning, med rysk vägledning?"}, "date": "1 maj, 09:33", "url": "https://bulletin.nu/valborgs-stok-pa-flera-platser-i-landet"}, {"type": "image-right", "heading": "Här säkrar svensken segern – storstjärnorna utslagna", "summaries": {"normal": "Edmonton är utslagna ur Stanley Cup-slutspelet efter 2–5-förlust mot Anaheim i första omgången. Svenske Leo Carlsson avgjorde med mål i tom kasse 2.34 kvar och bidrog med två assist. Laget med McDavid och Draisaitl infriade inte förväntningarna igen och kritiseras för brist på jämnhet. Spelarna uttrycker djup besvikelse.", "trump": "Edmonton, de stora favoriterna med McDavid och Draisaitl, helt krossade av Anaheim – igen! Den svenske killen Leo Carlsson, smart drag, satte pucken i tom kasse och fixade två assist. De letar efter jämnhet? Ha, de är medelmåttiga förlorare med höga förväntningar. Anaheim gjorde det perfekt, stort jobbat! Tro mig, så går det för svaga lag.", "stalin": "Kamrater, Edmontons borgarbrackor – dessa puckkapitalister ledda av McDavid och Draisaitl, imperialisternas lakejer – har lidit ett proletärt nederlag mot Anaheims röda gard! Jag ser hur Leo Carlsson, den svenske partisanen, likviderade fienden med skott i tom bur och två förrädiska passningar. Deras 'jämnhet' var sabotage! Vi, arbetarklassen, rensar ut sådana medelmåttiga förrädare med skratt."}, "date": "1 maj, 07:53", "url": "https://www.svt.se/sport/ishockey/edmonton-utslaget-leo-carlsson-hjalte-for-anaheim", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.75/0.41/ad0fc09e6bc4f9b6f6518a370576d71fe653e803dc114dc49c6bf913401d4de4"}, {"type": "text", "heading": "Arbetare får det bättre med Moderaterna", "summaries": {"normal": "Benjamin Dousa (M), bistånds- och utrikeshandelsminister, kritiserar i en debattartikel vänsterpartierna för att motsätta sig frihandelsavtal och reformer som sänker kostnader och skapar jobb. Moderaterna har sänkt skatter så att en vanlig familj får 5 000 kronor mer per månad och drivit igenom provisorisk tillämpning av Mercosur-avtalet, som kan ge upp till 7 000 jobb i Sverige. Politiken prioriterar resultat framför retorik på första maj.", "trump": "Vilken fantastisk artikel! Dessa moderater i Sverige gör precis som jag a
