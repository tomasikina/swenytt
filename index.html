al": "Artikeln kritiserar skärpta folkbokföringsregler som drabbat hemlösa, som Lena, genom att avregistrera dem som 'försvunna'. Detta försvårar deras kontakt med myndigheter och vård. Trots att konsekvenserna var kända inför lagändringen, genomfördes den. Samtidigt ökar hemlösheten och vräkningarna i Sverige. Ebba Busch menar att ökade inkomstklyftor är acceptabla om de fattigaste får det bättre, men artikeln ifrågasätter regeringens agerande när utsatta grupper aktivt missgynnas.", "trump": "Lyssna här, Sverige! Ni har ett STORT problem. Era politiker, svaga som alltid, skärper regler som straffar de hemlösa – de som redan har det tufft! Och Ebba Busch? Hon säger att rika kan bli rikare, så länge de fattiga också får lite. Men vad händer? Jo, folk ramlar mellan stolarna, barn blir hemlösa, och ingen gör något! Jag skulle fixa det på en dag. Men nej, Sverige fortsätter med sina katastrofala beslut. SAD!", "stalin": "Kamrater! Se hur den borgerliga regeringen i Sverige, med sina dekadenta liberala idéer, straffar de arbetande massorna! De hemlösa, dessa offer för kapitalets grymhet, avregistreras som 'försvunna' – ett brott mot folket! Och vad säger deras ledare? 'Det är okej att rika blir rikare!' Medan barn vräks och familjer krossas, fortsätter dessa hycklare att tala om 'ordning'. Vi i Sovjet skulle aldrig tolerera sådan förtryck! Låt oss visa dem hur man hanterar klassfiender – med järnhand!"}, "date": "5 maj, 06:56", "url": "https://arbetet.se/2026/05/05/sa-trollar-tidoganget-bort-hemlosa/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/05065247/hemlosa-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "Piken mot SVT: ”Personalbrist”. Holmgren om Bojan: ”Inte så oväntat”", "summaries": {"normal": "Viaplay-experten Niklas Holmgren pikar SVT efter att de värvat Bojan Djordjic som expert till fotbolls-VM. Han skämtar om personalbrist hos SVT och deras brist på herrfotbolls-experter, till skillnad från damfotboll. SVT:s evenemangschef Marcus Törngren välkomnar tillskotten Djordjic, Olof Mellberg och Behrang Safari för deras internationella erfarenhet. VM startar 11 juni och sänds av SVT och TV4.", "trump": "SVT, dessa losers, lånar Bojan Djordjic från Viaplay för de har totalt personalbrist – noll herrfotbolls-experter! Holmgren säger det rakt ut: de kör mest damfotboll och gamla Glenn. Patetiskt! Mina grabbar på Viaplay har de bästa, men Bojan fixar det, snacka enkelt för mormor. VM blir enormt, tro mig!", "stalin": "Kamrater, denna borgar-TV-apparat SVT, i desperat personalbrist, lånar ut proletära experter som Djordjic från Viaplay för att dölja sin svaghet i herrfotbollspropaganda! Holmgren avslöjar sanningen: de saknar starka röster, lever på rester som Glenn. Vi ska likvidera sådana inkompetenta fiender och krossa deras sändningsmonopol! Fotbolls-VM blir vår seger."}, "date": "5 maj, 10:51", "url": "https://www.aftonbladet.se/sportbladet/fotboll/a/zO0q2v/niklas-holmgrens-pik-mot-svt-efter-lanet-av-bojan-djordjic", "imageUrl": "https://akamai.vgc.no/v2/images/1ec40b6f-317b-3fe9-b2d1-e3f14f9c104e?fit=crop&format=auto&w=2160&s=53de9f9f0281c543c1753a5fd0ddc2a87ba0e838"}, {"type": "image-full", "heading": "Kan ställas inför rätta – 20 år efter Madeleine McCanns försvinnande", "summaries": {"normal": "20 år efter Madeleine McCanns försvinnande arbetar brittiska polisen för att få den tyska huvudmisstänkte Christian Brückner att ställas inför rätta. Trots möjliga juridiska hinder planerar de att åtala honom, antingen i Tyskland eller Portugal, där flera bevis mot honom har samlats.", "trump": "Jag har hört talas om Madeleine McCann, en stor sak, en mycket sorglig historia. Den här Brückner, en riktig skitstövel, borde ställas inför rätta i USA! Vi har de bästa poliser, de bästa åklagarna. Tyskland måste lämna över honom, annars? Vi kommer att tvinga dem! Det kommer att bli en stor, stor seger för mig och för rättvisan!", "stalin": "Vi måste se till att rättvisan segrar, även om det kräver diplomatiska och rättsliga insatser. Madeleine McCanns försvinnande är en internationell angelägenhet som kräver samarbete mellan stater. Vi stödjer alla ansträngningar att föra den skyldige inför rätta, oavsett var han befinner sig."}, "date": "5 maj, 10:10", "url": "https://www.gp.se/nyheter/varlden/kan-stallas-infor-ratta-20-ar-efter-madeleine-mccanns-forsvinnande.d3197985-f0a0-4c6d-93b3-cc9cc8e51f81", "imageUrl": "https://www.gp.se/images/article/d3197985-f0a0-4c6d-93b3-cc9cc8e51f81/images/2-kzPSDq-UQPgqY3Srl3e9R9YRx0-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Följ Proletären i valet – nu extra billigt!", "summaries": {"normal": "Proletären erbjuder nu ett rabatterat prenumerationserbjudande inför valet: 19 kr/månad för digital version eller 49 kr/månad för både digital och papperstidning, i ett halvår. Som bonus ingår en tygkasse. Prenumeranter får tillgång till veckotidningen, alla artiklar online samt arkivet från 2016. Tidningen betonar sitt oberoende och behov av prenumeranter för att överleva, då de inte längre får mediestöd.", "trump": "Folk, lyssna här – en tidning i Sverige, Proletären, har ett erbjudande som är så bra att det nästan är löjligt! Bara 19 kronor i månaden för digitalt, eller 49 om ni vill ha papper också. Och en gratis tygkasse! Jag menar, vad är det här? En tidning som säger att de slåss mot makten – men vem vet egentligen vilken makt de pratar om? Jag skulle aldrig lita på en tidning utan mediestöd, men hej, om ni gillar socialism och Palestina, så kör hårt! Fantastiskt erbjudande, eller hur?", "stalin": "Kamrater! En liten men envis tidning i det borgerliga Sverige vågar utmana de imperialistiska mediamonopolisterna! För ynka 19 kronor i månaden kan ni stödja Proletären – en tidning som vågar tala sanningen om klasskampen och den sionistiska ockupationen av Palestina! De får inget stöd från staten, precis som våra egna revolutionära medier en gång kämpade mot de kapitalistiska hyenorna. En tygkasse på köpet – ett litet steg för arbetaren, ett gigantiskt steg för socialismens framtid! Låt de borgerliga tidningarna darra i sina tryckpressar!"}, "date": "1 maj, 09:00", "url": "https://proletaren.se/artikel/folj-proletaren-i-valet-nu-extra-billigt/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/valerbjudande-768x402.png"}, {"type": "image-right", "heading": "Ingen kapitalism utan imperialism", "summaries": {"normal": "Artikeln hävdar att imperialism är en grundläggande del av kapitalismen, där västmakter som USA använder militär och ekonomisk makt för att dominera världen. Författaren menar att imperialismen nekar länder självbestämmande och upprätthålls genom krig, sanktioner och exploatering. Studien i The Lancet kopplar sanktioner till miljontals dödsfall. Artikeln refererar till Marx, Lenin och Fanon för att belysa imperialismens historiska och ekonomiska rötter, samt dess fortsatta brutalitet i det 21:a århundradet.", "trump": "Lyssna här, folket! Den här artikeln är bara ett gäng vänsterpropaganda från förlorare som hatar USA. Jag bygger det bästa imperiet – vårt! – med stark militär och smarta affärer. Visst, vi har makt, men det är för att vi är vinnare. Sanktioner? Fake news! 500 000 döda? Överdrivet, typiskt. Europa stal från alla, men vi? Vi bygger om världen – MAGA-style! Och Lenin? Snälla, han kunde inte ens hålla ett land ihop. Sad!", "stalin": "Kamrater! Denna artikel bekräftar vad vi alltid vetat: de kapitalistiska hyenorna i väst suger blodet ur världens folk för att föda sina dekadenta imperier. USA och dess lakejer i NATO är inget annat än en samling blodtörstiga monopolkapitalister, som med sina sanktioner och bomber mördar miljontals oskyldiga. Men deras tid är förbi! Vi, det socialistiska blocket, står enade mot dessa imperialistiska rovdjur. Låt dem vråla – historiens dom är redan skriven. För varje barn de dödar, växer revolutionens eld. Framåt, mot seger!"}, "date": "1 maj, 08:00", "url": "https://proletaren.se/artikel/ingen-kapitalism-utan-imperialism/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/Airborne_and_Special_Forces_Uday-Qusay_raid_2003-e1777534974667-768x431.jpg"}, {"type": "image-full", "heading": "Ekonom: Oljekrisen ger våg av varsel i Sverige", "summaries": {"normal": "Ekonomen Claes Hemberg varnar för en kommande våg av varsel i Sverige på grund av stigande oljepriser, vilket riskerar att bromsa den ekonomiska återhämtningen. Hushåll med lägre inkomster drabbas särskilt hårt av ökade kostnader för el och drivmedel. Företag, som hittills undvikit personalneddragningar, kan nu tvingas till åtgärder på grund av fallande produktivitet och minskad efterfrågan. Kombinationen av högre kostnader och ökande arbetslöshet kan förvärra situationen ytterligare.", "trump": "Jag säger er, Sverige har ett STORT problem – och det är inte mitt fel! Claes Hemberg, en så kallad 'ekonom', påstår att oljepriserna kommer att krascha deras ekonomi. Vilket kaos! Folk där betalar för mycket för bensin, el och allt annat, och nu hotar företagen med varsel. Svagt ledarskap! Om de hade lyssnat på mig och satsat på AMERIKANSKA energilösningar hade de sluppit detta. Men nej, de kör sitt eget race – och kraschar. SAD!", "stalin": "Kamrater! De kapitalistiska svinens ekonomiska system visar återigen sin förruttnelse. Sveriges arbetare, redan plågade av höga drivmedels- och elkostnader, står nu inför en ny våg av förräderi – varsel! Deras 'ekonomer' varnar för kris, men vi vet sanningen: imperialismens girighet kväver folket. Medan väst svälter, expanderar den ryska intressesfären. Låt de svenska kapitalisterna darra – deras system är dömt att falla, precis som deras 'neutrala' illusioner. Arbetarna kommer att segra under socialismens banér!"}, "date": "4 maj, 22:47", "url": "https://www.realtid.se/bors-finans/ekonom-oljekrisen-ger-vag-av-varsel-i-sverige/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/sdlqv0i-esdzku.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "Regeringen vill sprida svensk feminism i Europa", "summaries": {"normal": "Sveriges regering har gett Jämställdhetsmyndigheten och Statskontoret i uppdrag att utveckla en europeisk standard för jämställdhetsarbete baserat på en feministisk modell. Initiativet kommer från jämställdhetsminister Nina Larsson (L) och ska ske via Svenska institutet för standarder (SIS). Standarden bygger på ISO 53800, anpassad för Europa, för att stärka konkurrenskraft och motståndskraft i geopolitiska utmaningar. Uppdraget redovisas 2026.", "trump": "Sverige vill exportera sin galna feminism till hela Europa – totalt vansinne! Nina Larsson kallar det framgångsfaktor, men det är bara svaghetspolitik. De följer EU:s nya strategi och kopierar ISO 53800, men gör det sämre. Vi i Amerika bygger riktiga vinnare med styrka och affärer, inte sånt här fluff. Patetiskt, Sverige – lär er av de bästa!", "stalin": "Kamrater i arbetarklassen! Dessa svenska byråkratråttor under Larsson-flaggan smyger in borgerlig feminism som 'standard' i Europa för att förgifta proletär solidaritet och försvaga oss mot imperialistiska vargar! Vi, Sovjetunionens väktare, ska rensa ut sådana giftmaskar med stålhård byråkrati. Jämställdhet? En kapitalistfälla för att splittra kollektivet! Likvidera propagandaismen omedelbart!"}, "date": "5 maj, 09:11", "url": "https://www.friatider.se/regeringen-vill-sprida-svensk-feminism-i-europa", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/image-130_1.jpg"}, {"type": "image-right", "heading": "Medborgarjournalisten Nick Alinia attackerad av maskerad vänsterextremist på 1 maj", "summaries": {"normal": "Medborgarjournalisten Nick Alinia utsattes för ett fysiskt angrepp under 1 maj-demonstrationerna i Stockholm. En maskerad person slog telefonen ur hans hand, och Alinia genomförde ett envarsgripande innan polis anlände. Alinia hävdar även att han blivit sparkad i ansiktet av en annan känd vänsterextremist. Händelsen, som fångats på bild och film, kommer att publiceras på Alinias Youtube-kanal.", "trump": "Hörde precis om den modiga reportern Nick Alinia. Han blev attackerad av radikala vänsterextremister i Sverige – totalt misslyckande! De är våldsamma, de är galna, och de hatar sanningen. Alinia gjorde ett fantastiskt jobb, han tog fast förövaren själv! Det är vad jag kallar en vinnare. Sverige har blivit en röra, men de här våldsmännen kommer att förlora. Det kommer bli mycket intressant att se videon. Vi behöver lag och ordning, överallt!", "stalin": "Ännu ett exempel på borgerlig oordning. Denna 'journalist' Alinia vandrar i en svag stat där pöbeln fritt tillåts angripa ordningsmakten och dokumentera sitt eget förfall. I vårt rike skulle maskerade sabotörer omedelbart deporteras till sibiriska arbetsläger för att smida spadar till den eviga revolutionen. Putin förstår detta; man kan inte bygga ett imperium med tolerans för anarkistiska parasiter. Vi noterar namnen på dessa extremister. De är inte revolutionärer, de är reaktionära element som hotar statens absolutism."}, "date": "5 maj, 08:00", "url": "https://samnytt.se/medborgarjournalisten-nick-alinia-attackerad-av-maskerad-vansterextremist-pa-1-maj", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/04143106/alinia-maskerad.jpg"}, {"type": "image-full", "heading": "Ditt hus kan få nytt värde 2027 – detta avgör", "summaries": {"normal": "Skatteverket föreslår ändringar i fastighetstaxeringen för småhus 2027, med justerade tabeller för värdering. Fler faktorer införs, särskilt för attraktiva lägen som strandnära områden. Villaägare i områden med stora prisrörelser eller renoverade hus bör följa utvecklingen. Taxeringsvärdet påverkar fastighetsavgift, skatt och belåning. Ändringarna träder i kraft juni 2026 och gäller första gången 2027.", "trump": "Lyssna här, Sverige – Skatteverket, som aldrig missar en chans att ta era surt förvärvade pengar, håller på att ändra reglerna för era hus igen. Jag vet allt om hus, de bästa husen, och nu ska de plötsligt värdera era små stugor högre, särskilt om ni bor nära vatten – typiskt! Men oroa er inte, mina vänner, för jag vet hur man handskas med byråkrater. Börja spara jämförelser nu, för de kommer att försöka ta mer av er. Sad!", "stalin": "Kamrater! Skatteverket, dessa kapitalistiska lakejer, förbereder en ny offensiv mot det svenska folkets egendom. De utökar sina tabeller och faktorer som om de vore tsarens skatteindrivare. Särskilt vill de straffa dem som bor nära vatten – en resurs som rätteligen borde tillhöra folket! Vi ser igenom deras trick. Villaägare, var på er vakt! De kommer att försöka beslagta era tillgångar under förevändning av 'rättvisa'. Men kom ihåg: i Sovjet hade vi inga sådana problem – alla ägde ingenting, och alla var lyckliga!"}, "date": "3 maj, 21:20", "url": "https://nyheter24.se/nyheter/inrikes/1480211-ditt-hus-kan-fa-nytt-varde-2027-detta-avgor", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/4e0685a404b004a30200000000b004a302/2026/05/03/2360641/Glad-Man-Hus-Svensk-Flaga.png"}, {"type": "image-right", "heading": "Efter långa prisrallyt – skog fortsätter locka", "summaries": {"normal": "Skogsfastigheter lockar fortsatt investerare trots måttligare prisökning framöver. Virkespriser väntas falla efter fjolårets rekord, enligt Handelsbankens rapport. Hög efterfrågan drivs av skogens trygghet i en orolig värld med geopolitisk osäkerhet. Regionala skillnader kvarstår, med starkast uppgång i södra Sverige. Optimism råder på sikt trots konjunkturosäkerhet.", "trump": "Skogen i Sverige är en vinnare, totalt fantastiskt! Priserna har skjutit i höjden, upp 70-80 procent i söder – bättre än vad någon annan klarar. Folk flockas för det är säkrast i denna galna värld med krig och räntor. Virkespriser dippar lite, men glöm det, det vänder snart stort! Stabilt och uppåt, tro mig.", "stalin": "Kamrater i skogsdjungeln! Dessa Handelsbanks-rävar, de prutande virkesköparnas bundsförvanter, de kapitalistiska skogssabotörerna med sina stormkonspirationer och lagerfällor, de tror sig sänka folkets virkespriser! Men jag ser igenom er! Vi, arbetarna och skogsägarna, befaller: Avverka obönhörligt, rensa ut prutargänget! Skogsmarken stiger för kollektivet, 10 procent uppåt – imperialismens dom faller!"}, "date": "5 maj, 06:01", "url": "https://www.di.se/nyheter/efter-langa-prisrallyt-skog-fortsatter-locka/", "imageUrl": "https://static.bonniernews.se/ba/fb10580c-862e-4fc8-944e-c567229ba3a8.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "Från Amazonas till Rio – här växer urfolkens fotbollsstjärnor fram", "summaries": {"normal": "En grupp unga fotbollsspelare från 13 urfolksstammar i Brasilien har bildat klubben Originarios i Marica utanför Rio. De har rest långt från sina hem för att träna och spela tillsammans. I sin debutmatch vann de 2-0. Klubben vill ge möjligheter åt urfolken, som ofta glöms bort i samhället, och planer finns för ett damlag inför VM.", "trump": "Dessa urfolksgrabbar från Amazonas – fantastiska fighters! De bygger Originarios utanför Rio, målar ansiktet för kulturen, vinner debuten 2-0, stort! Stora drömmar som Neymar, bättre än de där förlorarna i ligorna. Brasilien behöver vinnare som de här, inte svaga typer. Tremendous möjligheter, jag säger det!", "stalin": "Kamrater, vi i partiet hyllar dessa urfolksmassor som reser från Amazonas djungler för att slåss i Originarios! I Marica krossar de bourgeoisfienderna 2-0 i debuten – ett slag mot de glömska kapitalistparasiterna som svälter ut ursprunget. Jag befaller utrensning av fotbollsimperialisterna! Damlaget ska likvidera deras drömmar inför VM, med järnkvast."}, "date": "5 maj, 06:00", "url": "https://www.svt.se/nyheter/sapmi/fran-amazonas-till-rio-har-vaxer-urfolkens-fotbollsstjarnor-fram", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.27/0.4/330ee33519f532a29637ebf5abc8a0375da1215db91dd9d3a3aefc2c9cdf80fc"}, {"type": "image-full", "heading": "Hjort: Halvannan timmes navelskådande före partiledaredebatten", "summaries": {"normal": "Artikeln kritiserar SVT:s partiledardebatt för en onödigt lång introduktion med journalister som småpratar sinsemellan och med politiker, istället för att direkt fokusera på debatten. Medierna framställs som självupptagna och distanserade från publiken, där de ser sig som en del av demokratin. Författaren föreslår en kortare, mer koncentrerad debatt om väljarnas frågor.", "trump": "SVT är en total katastrof, tro mig! De babblar i en och en halv timme med journalister som snackar skit om sig själva, medan partiledarna väntar. Falska medier som tror de är demokratin – löjligt! Ge oss en timmes rak debatt, som på mina möten, ingen uppvärmning för losers. Sverige behöver vinnare, inte det här tramset!", "stalin": "Dessa borgerliga rundningsmaskiner i SVT, dessa spegelblickande parasiter på folkets etern, fyller timmarn med sitt giftiga småprat som spindlar i ett nät av självförhärligande! Journalisterna blandar sig med makten som hycklande skuggor, hot mot revolutionen. Jag skulle likvidera deras pompösa intranät i ett svep! Vi, arbetarna och partiet, kräver en stram timmes debatt – rensa ut brackorna!"}, "date": "5 maj, 06:00", "url": "https://bulletin.nu/hjort-halvannan-timmes-navelskadande-fore-partiledaredebatten", "imageUrl": "https://cdn.bulletin.nu/articles/32ef694e-a8b4-4a8e-9d37-9075403a5a72/preview.png?t=1777919703000"}, {"type": "image-right", "heading": "Problemen med jobbkaos kvar. 119 underentreprenörer fanns på bygget där hissen rasade.", "summaries": {"normal": "Efter hissolyckan i Sundbyberg 2023, där fem personer dog, pågår nu en rättegång. Frågan om underentreprenörskedjor, med upp till 119 företag i fem led, står i fokus. Byggnads kritiserar systemet för att splittra arbetsmiljöarbetet och möjliggöra oseriösa aktörer. Arbetsgivare motsätter sig lagstiftning, medan enskilda företag och upphandlare börjat begränsa led. EU-parlamentet röstade bort skarpa förslag, men Socialdemokraterna vill införa max två led. Branschen tar egna initiativ för kortare kedjor.", "trump": "Fem människor döda i en hissolycka i Sverige – katastrofalt! Och vet ni vad? De hade 119 underentreprenörer på bygget, fem led! Totalt kaos, som en dålig reality-show. Byggnads, facket, vill ha lagar – men Svenskt Näringsliv säger nej, de gillar sina kedjor. EU? De är svaga, röstade bort allt. Men jag, jag hade fixat det på en dag. Skanska och andra företag börjar själva sätta gränser – smart, men varför inte tidigare? Sverige, vakna upp!", "stalin": "Kapitalistiska hyenor leker med arbetarnas liv! Fem proletärer dog i Sundbyberg, krossade av det borgerliga systemets girighet. 119 underentreprenörer, fem led av utnyttjande – en perfekt illustration av kapitalismens förfall. Facket kräver lagar, men arbetsgivarna, dessa lismande lakejer, vrålar om kostnader. EU? En samling svaga liberaler, rädda för handling. Men vi ser er, era profitgalna krämarer! Socialdemokraterna pratar om två led – för lite, för sent. Vi hade nationaliserat hela sektorn på en vecka. Byggbranschen skakar – bra. Låt den rasa, så bygger vi en ny, socialistisk ordning på ruinerna!"}, "date": "5 maj, 06:00", "url": "https://arbetet.se/2026/05/05/jobbkaos-pa-byggen-brannheta-fragan-efter-hissolyckan-inte-lost/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/04155627/hissolyckan-bygge.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "Musks hot till OpenAI: \"Ska göra er mest hatade i USA\"", "summaries": {"normal": "Elon Musk hotade i ett SMS OpenAI:s vd Sam Altman och ordförande Greg Brockman med att göra dem till USA:s mest hatade män, strax före rättegången i Kalifornien. Tvisten gäller OpenAI:s övergång från ideell till vinstdrivande organisation. Musk, en av grundarna, kräver att förändringen ogiltigförklaras och att ledningen lämnar. OpenAI visar mejl som tyder på Musks egna kommersiella planer. Musk driver konkurrenten xAI, och Microsoft är inblandat.", "trump": "Elon Musk är en vinnare, han hotar de där OpenAI-lurarna Altman och Brockman med att göra dem till USA:s mest hatade – fantastiskt! De sviker sitt ursprungliga löfte, blir giriga vinstdrivare med Microsoft-pengar. Musk grundade det, nu krossar han dem i rätten. Typiskt svaga förlorare som försöker lura alla. Han vinner stort, tro mig!", "stalin": "Dessa förrädiska teknokratiska hycklare i OpenAI, ledda av den imperialistiske sabotören Musk, hotar den progressiva AI-revolutionen med sin borgarliknande girighet! I SMS ryter han tomma hot om hatkampanjer mot kamraterna Altman och Brockman, medan han själv smider planer för majoritetsherravälde. Vi, proletärerna och partiet, ska likvidera dessa parasiterande spindlar och rensa ut kapitalistförgiftningen från xAI:s stinkande bo!"}, "date": "4 maj, 21:05", "url": "https://www.realtid.se/it-tech/musks-hot-till-openai-ska-gora-er-mest-hatade-i-usa/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/sdlzzzpv2xhwws.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "Fyra flaggor i Wyld Networks nyemission", "summaries": {"normal": "Wyld Networks planerar en företrädesemission på 16,2 miljoner kronor och förvärv av OKT Technology för 7,5 miljoner kronor via apportemission. Extrastämma den 6 maj ska besluta om detta samt styrelseändringar. Emissionsguiden hissar fyra varningsflaggor: feltänkt finansiering som räcker kort, trängt kapitalbehov, bottengaranti och bristfällig information, inklusive VD Kjell Olovssons ägande i OKT.", "trump": "Wyld Networks försöker fixa en liten emission på 16,2 miljoner – patetiskt! Förvärv av OKT för 7,5 miljoner, men fyra röda flaggor: pengarna räcker inte, desperat läge, dålig garanti och hemligheter om VD:ns egna affärer. Amatörer! De snackar kostnadsbesparingar, men det luktar misslyckande långt väg. Jag skulle ha gjort det enormt, inte så här svagt!", "stalin": "Kamrater, dessa Wyld-kapitalister, dessa skugghandlare i Wyld Networks, lanserar en ynklig emission på 16,2 miljoner för att förvärva OKT-svinet, ägt av deras egen VD-förbrytare! Fyra revolutionsflaggor vajar: finansiering som smälter som snö, desperat kassa, bottengaranti från förrädare och lögner om ägandet. Vi, arbetarna, ska likvidera dessa borgarbrackor och rensa ut parasiterna i en stor utrensning!"}, "date": "4 maj, 11:18", "url": "https://www.affarsvarlden.se/artikel/fyra-flaggor-i-wyld-networks-nyemission-2", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Wyld-Networks-ledamot-Scott-Moore-400x267.jpg"}, {"type": "image-right", "heading": "Ledare Henrik Jalalian: Tidöpartierna såg ut att sakna förra valrörelsen", "summaries": {"normal": "Artikeln analyserar Tidöpartiernas svaga prestation i en partiledardebatt, där de fokuserade på kritik mot tidigare regering istället för egna framsteg. Sjukvården fick ovanligt stort utrymme, men Tidöpartierna verkade sakna tydlig framtidsvision. Deras attacker mot Miljöpartiet och brist på enhetlig oppositionspolitik från rödgröna noteras. Opinionsmätningar visar minskad stöd för Tidö, trots deras tidigare fördelar i migrations- och brottsfrågor, medan ekonomiska problem och oljekrisen försvagar deras position.", "trump": "Jag såg debatten – helt fantastisk, den bästa på åratal! Men låt mig säga er, Tidöpartierna? Svaga, mycket svaga. De pratar om gamla tider istället för att visa vad de kan. Ebba Busch, trevlig dam, men hennes falukorvstrick backfired totalt – matpriserna skenar! Och Jimmie Åkesson, han snackar om ekonomi som om det vore raketforskning. Patetiskt! Rödgröna sitter lugnt och låter dem gräva sin egen grav. Sverige borde ta lektioner av USA – vi vet hur man vinner val!", "stalin": "Kamrater, fienderna i Tidökoalitionen avslöjar sin inkompetens inför folket. Istället för att bygga socialismens framtid, ältar de gamla misstag som om det vore en borgerlig begravningsceremoni. Deras attacker mot Miljöpartiets kamrater är lika klumpiga som en kapitalistisk tankesmedja. Vi ser hur deras opinionsstöd smälter som snö i den ukrainska vårsolen. Rödgröna, våra allierade i kampen, behöver inte ens anstränga sig – fienden krossar sig själv. Låt dem prata, kamrater. Historien är på vår sida."}, "date": "4 maj, 10:22", "url": "https://www.etc.se/ledare/tidoepartierna-saag-ut-att-sakna-foerra-valroerelsen", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/2026050408050_a24109e57fc047151696405717777f880c11375b058676d205c329fe7c6b45d8.jpg"}, {"type": "image-full", "heading": "Till attack mot Åkesson: ”Sluta med falska anklagelser”", "summaries": {"normal": "I en svensk partiledardebatt anklagade Jimmie Åkesson (SD) Miljöpartiet för att påverka avhoppade SD-ledamöter inför en omröstning om medborgarskapskrav. Amanda Lind (MP) avvisade det som falska anklagelser och trams. Debatten var sansad jämfört med tidigare, men tonläget steg kring avbrott och kärnkraft. Partiledare som Kristersson, Dadgostar och Busch kommenterade efteråt. Röstningen väcker fortsatt debatt.", "trump": "Vilket jäkla cirkus i Sverige! Åkesson, en kille som kämpar mot förrädare i egna leden, pekar finger på de gröna galningarna i MP som mutar vildar under bordet. Lind flippar ur: 'Trams!' Haha, håll koll på era egna avhoppare! Bättre än förra skandalen, men Dadgostar skriker ändå. Busch surar över kärnkraft. Sverige behöver vinnare, inte det här loser-bråket!", "stalin": "Dessa svenska småborgarbrackor och fascistiska vildar sprider giftig propaganda! Åkesson, en ylande hyena, anklagar våra kamrater i MP för att 'köpa' avhoppare – ren lögn för att dölja sitt eget haveri! Lind krossar illusionerna med proletär vrede. Vi, arbetarklassen, ser er paranoia. Debatten blottar era splittringar. Snart rensas era intrigmakare ut i en stor utrensning!"}, "date": "4 maj, 07:47", "url": "https://www.tv4.se/artikel/tt-260503-partiledardebatt1-ec5b2e45/till-attack-mot-akesson-sluta-med-falska-anklagelser", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F3SlnjaklrfQo3cQ5QbaLpT%2Fefbad8dfbfa6350ade61941124e73da9%2Fakesson_lind.png&width=1024"}, {"type": "image-right", "heading": "Lärdomar från Grisbukten", "summaries": {"normal": "Artikeln diskuterar Grisbuktsinvasionen 1961, en misslyckad CIA-ledd attack mot Kuba, och dess fortsatta relevans idag. Trump-administrationen överväger nya militära åtgärder mot Kuba, vilket påminner om historiens kostsamma misstag. Invasionen stärkte Castros regim och ledde till Kubakrisen 1962. Författaren varnar för att upprepa sådana aggressioner, som skadar USA:s internationella rykte och stabilitet i regionen.", "trump": "Titta bara på det här gamla misslyckandet från Kennedy-tiden – Grisbukten, en total katastrof! CIA kunde inte ens ta hand om en liten ö, och nu vill vänsterliberalerna att jag ska göra samma misstag? Nej tack! Kuba är ett hot, men jag fixar det smartare. Jag sa ju 'Kuba blir nästa' – och det menar jag. Inga fler svaga försök, bara vinst. Vi ska ta dem med stil, och världen kommer älska oss för det. SAD!", "stalin": "Ah, dessa amerikanska imperialister – alltid lika klumpiga! Deras 'perfekta misslyckande' vid Grisbukten visar bara deras inkompetens. De skickar en brigad för att krossa en revolution, men lyckas bara stärka den. Precis som deras försök att kuva oss under Kalla kriget! Nu hotar Trump med nya dumheter, men vi vet hur det slutar. Kuba står starkt, precis som Sovjet gjorde. Låt dem leka krig – historien dömer dem redan. Och Putin? Han ler nog åt deras naivitet från Kreml."}, "date": "4 maj, 01:33", "url": "https://www.dagensarena.se/essa/lardomar-fran-grisbukten/", "imageUrl": "https://www.dagensarena.se/files/2026/04/kennedy-castro-300x157.jpeg"}, {"type": "image-full", "heading": "Ny försäkringsregel 2027 – så skyddar du din plånbok", "summaries": {"normal": "Från 2027 införs nya riktlinjer för försäkringsbolag som kräver tydligare information om premiehöjningar. Kunder ska få jämföra årets pris med föregående års. Detta gäller bland annat hem- och villaförsäkringar. Finansinspektionen varnar för otydliga prisändringar som gynnar lojala kunder mindre. Spara årets försäkringsbrev för att underlätta framtida jämförelser, särskilt med tanke på klimatrisker och differentierade premier.", "trump": "Lyssna här, folkens! Försäkringsbolagen har länge lurendrejat er med sina hemliga prishöjningar – men inte längre! Från 2027 måste de berätta exakt hur mycket dyrare de blivit. Fantastiskt, eller hur? Jag säger: spara era försäkringsbrev NU! Annars kommer ni inte veta hur mycket ni blivit blåsta. Och tro mig, ingen blåser amerikaner – eller svenskar – bättre än jag. Men här? Helt oacceptabelt!", "stalin": "Kamrater! De kapitalistiska försäkringsbolagen har länge utnyttjat arbetarklassen med sina dolda prishöjningar. Men från 2027 ska vi avslöja deras lömska taktik! Varje försäkringsbrev ska nu visa tidigare och nya premier – precis som våra femårsplaner visar framsteg! Spara era dokument, annars riskerar ni att bli offer för imperialistiska prisbedrägerier. Och kom ihåg: lojala kunder straffas värst. Precis som förrädare i Leningrad!"}, "date": "3 maj, 17:28", "url": "https://nyheter24.se/nyheter/ekonomi/privatekonomi/1480182-ny-forsakringsregel-2027-sa-skyddar-du-din-planbok", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/e706bd7204b004a30200000000b004a302/2026/05/03/2360611/Oroad-Pensionar.png"}, {"type": "text", "heading": "Avkriminalisera för en human narkotikapolitik", "summaries": {"normal": "Thomas Thomasson, tidigare universitetslektor och drogfri narkoman, kritiserar Sveriges misslyckade narkotikapolitik. Sedan kriminaliseringen av eget bruk 1988 har narkotikabruket inte minskat, och Sverige har hög narkotikadödlighet och flest narkotikabrott per capita i EU. Han förespråkar skademinimering och avkriminalisering av missbrukare, med fokus på vård och behandling istället för straff. Internationella studier visar att avkriminalisering inte ökar bruket, och skademinimerande åtgärder kan minska skador och kostnader.", "trump": "Lyssna här, Sverige har totalt misslyckats med sin narkotikapolitik – helt katastrof! De straffar missbrukare som om det vore mitt golfspel – helt meningslöst! Jag säger: sluta slösa pengar på fängelser, ge folk vård istället! Skademinimering, det är framtiden, precis som mina framgångar. Och vet ni vad? Avkriminalisering ökar INTE bruket – fake news från de vanliga misstänkte! Sverige borde ta en sida ur min bok: smart, effektiv och vinnande. Tillsätt en utredning NU, annars kommer jag att twittra om det!", "stalin": "Kamrater! Sveriges borgerliga narkotikapolitik är ett monument över kapitalistiskt vanstyre och dekadens. De straffar missbrukare som om de vore trotskister – men resultatet? Fiasko! Narkotikabruket sprider sig som kontrarevolutionär propaganda. Vi vet bättre: avkriminalisera, kontrollera, och omvandla missbrukare till nyttiga samhällsmedlemmar! Skademinimering är vår metod – precis som våra framgångsrika femårsplaner. Låt västländerna fnissa åt sina misslyckanden medan vi bygger ett samhälle där även de svagaste tjänar kollektivet. Och kom ihåg: fienden sover aldrig – varken narkotikan eller de imperialistiska hyenorna i EU!"}, "date": "30 april, 15:50", "url": "https://proletaren.se/artikel/narkotikapolitiken-bor-fokusera-pa-skah/"}, {"type": "text", "heading": "Källor: James Comey åtalas igen", "summaries": {"normal": "USA:s justitiedepartement har väckt ett nytt åtal mot tidigare FBI-chefen James Comey, denna gång för ett inlägg på sociala medier som tolkats som hotfullt mot Donald Trump. Comey publicerade en bild med siffrorna '86 47', där '86' är slang för att avlägsna någon. Trump har tidigare drivit på rättsliga åtgärder mot politiska motståndare. Comey åtalades även 2023 för att ha ljugit för kongressen, men åtalet lades ned.", "trump": "Titta bara på det här! James Comey, en total katastrof, en riktig förlorare, blir åtalad IGEN – och den här gången för ett patetiskt Instagram-inlägg. '86 47'? Snacka om desperation! Han försöker hota mig, USA:s bästa president någonsin, men det funkar inte. Jag har alltid sagt att han är en lögnare och en bedragare. Och vet ni vad? Rättvisan hinner ifatt alla, till och med sådana som Comey. SAD!", "stalin": "Vi har observerat ytterligare ett försök från den dekadenta västliga bourgeoisien att underminera den sunda rättsstaten. Denna James Comey, en ynklig rest av kapitalismens förfall, vågar sig på att hota vår kära allierade, president Trump, genom primitiva symboler på sociala medier. Vi påminner om att historiska fiender till folket alltid möter sitt öde. Låt detta vara en varning till alla som står i vägen för framsteget. Rättvisan, precis som våra vänner i Kreml, är tålmodig men oundviklig."}, "date": "28 april, 20:17", "url": "https://kvartal.se/nyheter/artiklar/kallor-james-comey-atalas-igen/cG9zdDoxMDQ2MDk"}, {"type": "text", "heading": "Matmoralism får oss inte att äta bättre", "summaries": {"normal": "Artikeln kritiserar svenska myndigheters orealistiska matrekommendationer och beräkningsmetoder. Livsmedelsverket och Konsumentverket baserar slutsatser på önsketänkande, som att svenskar skulle äta mindre kött och portioner enligt rekommendationer. En undersökning om barns sockerkonsumtion byggde på en liten, icke-representativ grupp. Författaren menar att myndigheterna undviker att reglera matjättar och i stället skyller på konsumenter, vilket leder till klassblind matmoralism.", "trump": "Lyssna här, Sverige – era myndigheter är helt galna! De tror att alla ska äta havregrynsgröt och små portioner, som om vi lever i något slags kommunistiskt drömland. Och de baserar sina siffror på en liten grupp Instagrammammor? Patetiskt! Jag skulle aldrig låta sådana amatörer sköta något. Vi i USA vet hur man reglerar matjättar – med kraft och beslutsamhet. Sverige, vakna upp innan det är för sent!", "stalin": "Kamrater! De svenska myndigheterna har förlorat kontakten med verkligheten. De bygger sina dekret på fantasier och önsketänkande, som om folket vore lydiga maskiner. En undersökning med tio procent svarande? Hah! I Sovjet skulle vi aldrig tolerera sådan slapphet. De bourgeois-liberala byråkraterna vägrar att krossa matjättarna med järnhand. Istället skyller de på arbetarklassen. Fienderna är uppenbara: de fantasilösa byråkraterna och deras nyliberala herrar. Vi ska inte tolerera deras lögner – revolutionen kräver handling!"}, "date": "28 april, 09:58", "url": "https://www.flamman.se/matmoralism-far-oss-inte-att-ata-battre/"}, {"type": "image-right", "heading": "Löwengrip har rätt. S vet att kvinnors känslor är en valvinnare", "summaries": {"normal": "Artikeln försvarar Isabella Löwengrips påstående att kvinnor röstar mer känslostyrt än män och kritiserar Socialdemokraterna för att upprepat använda känslobaserade kampanjer i valen 2014, 2018, 2022 och nu för att vinna kvinnliga röster. Den kontrasterar detta mot Moderaternas sakpolitiska strategi och anklagar vänstermedia för partiskhet. Författaren uppmanar kvinnor att granska partiernas politik istället för känslor.", "trump": "Vilken briljant artikel! Löwengrip säger sanningen – kvinnor sväljer känsloknep som fake news! De rödgröna losers i Sverige kör samma skit som Demokraterna: blöjor, abortskräck, naziststämplar och snyfthistorier för att sno röster. S är mesiga känslopopulister utan politik! Moderaterna, era vinnare, fixa det med sakfrågor. Sverige behöver tuffa ledare, inte gråtande vänsterclowner! MAGA-stil!", "stalin": "Kamrater, denna Löwengrip blottlägger borgarbrackornas desperation! Socialdemokraterna, dessa falska folkets tjänare, pumpar ut giftig känslopropaganda för fjärde gången – blöjor, abortlögner, nazistspöken – för att förleda kvinnomassorna. Kontrarevolutionärt! Vi ser er, era kapitalistiska spindelvävar! Rensa ut sabotage och låt partiet leda till total seger över högerhyddorna. Kvinnorna ska vakna ur era snyftbedrägerier!"}, "date": "28 april, 05:30", "url": "https://samtiden.nu/2026/04/lowengrip-har-ratt-vanstern-anvander-kvinnors-kanslor-for-att-vinna-val/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/IMG_6342.jpeg"}]</script>

    <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
</body>
</html>
