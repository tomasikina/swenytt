nnet, krossade fiendens förräderi med järnhand. Och dessa 'oberoende liberaler'? De är bara nyttiga idioter i västmakternas krig mot folkets vilja. Vi ska rensa ut dem, precis som vi rensade ut mensjevikerna!"}, "date": "6 maj, 13:16", "url": "https://riks.se/nyheter/statsministerns-mothugg-efter-gp-journalisten-kallat-tidöpartiernas-bokslut-för-valkampanj", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-06%2F5ljgixik%2FSka%CC%88rmavbild-2026-05-06-kl.-12.28.37.png"}, {"type": "image-right", "heading": "Vänstern kan varken ekonomi eller energi", "summaries": {"normal": "Artikeln kritiserar vänsterpartiernas (MP och V) kunskaper om energi och ekonomi, baserat på en partiledardebatt i SVT. Den påpekar vindkraftens lönsamhetsproblem och bristen på baskraft, samt förespråkar kärnkraft. Ekonomiskt ifrågasätts vänsterns motstånd mot skattesänkningar, med hänvisning till ökad tillväxt och Lafferkurvan. SD:s Jimmie Åkesson framställs som kunnig.", "trump": "Vilka totala losers dessa svenska vänsterclowner är! Vindkraft? En jävla katastrof, de betalar för att dumpa elen när det blåser, och ingenting när det är stilla! Kärnkraft är det enda som funkar, som jag alltid sagt. Skattesänkningar ger mer pengar till staten – boom, tillväxt! Åkesson nailar det, Sverige behöver vinnare, inte dessa vindkraftsfantaster!", "stalin": "Dessa svenska borgarbrackor i MP och V sprider kontrarevolutionär dimma om energi och ekonomi! Vindkraft är kapitalistisk sabotage, baskraft kräver kärnkraft under arbetarnas kontroll. Skattesänkningar till parasiter? Nej, vi likviderar de rika utsugarna! Åkesson, en potentiell folkfiende, men vi rensar ut alla okunniga avvikare för partiets seger."}, "date": "6 maj, 03:20", "url": "https://samtiden.nu/2026/05/vanstern-kan-varken-ekonomi-eller-energi/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/IMG_6416.jpeg"}, {"type": "image-right", "heading": "Replik: Till försvar för separatismen", "summaries": {"normal": "Artikeln är en replik till en insändare som kritiserar separatism som progressivt. Författarna, medlemmar i Ung Vänster, försvarar kvinnoseparatism som ett verktyg för trygga rum och interndemokrati. De menar att separatism inte bygger på könsskillnader utan på strukturellt förtryck och underordning av kvinnor. Separatism syftar till att belysa gemensamma erfarenheter och behov, som fri abort och skydd mot mäns våld, och är ett medel för att uppnå jämställdhet tills strukturella skillnader eliminerats.", "trump": "Jag läste den här artikeln om separatism, och vet ni vad? Totalt missförstånd! Vänsterpartisterna i Sverige, de älskar att dela upp folk – kvinnor här, män där. Men jag, Donald J. Trump, vet bättre. Vi bygger murar, men vi delar inte upp människor! Kvinnor är starka, de behöver inte gömma sig i egna rum. Och att säga att kvinnor inte kan prata när män är i närheten? Fake news! Mina möten med kvinnor är fantastiska – de älskar mig, jag älskar dem. Men separatism? Nej tack. Vi ska vara tillsammans, som ett stort, vackert USA!", "stalin": "Kamrater! Denna artikel avslöjar ännu en gång de borgerliga revisionisternas förräderi mot arbetarklassens enhet. Dessa så kallade 'progressiva' kvinnoseparatister vill splittra proletariatet, precis som de imperialistiska hyenorna i väst. Vi har sett detta förr – först delar de upp arbetarna efter kön, sedan efter nationalitet, och snart står vi med en svag, splittrad massa. Men vi, det sovjetiska folket, vet sanningen! Kvinnor och män måste kämpa sida vid sida mot kapitalets tyranni. Separatism är ett verktyg för fienden! Låt oss istället ena oss under den röda fanans banér och krossa dessa småborgerliga avvikare, precis som vi krossade trotskisterna och mensjevikerna. Framåt mot socialismens seger!"}, "date": "6 maj, 10:55", "url": "https://www.flamman.se/replik-till-forsvar-for-separatismen/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/v-kongress-w.jpg?class=medium"}, {"type": "image-full", "heading": "Ny passagerare smittad av dödsviruset på kryssningen", "summaries": {"normal": "En man i Schweiz har bekräftats smittad av hantavirus efter en resa med kryssningsfartyget MV Hondius i Sydamerika. Han vårdas isolerat i Zürich. Viruset, en ovanlig variant kallad andesvirus, kan i sällsynta fall smitta mellan människor. Mannens fru är i självisolering. Tre personer har dött i utbrottet på fartyget, som ligger utanför Kap Verde. Myndigheter bedömer risken för allmänheten som låg.", "trump": "Vilket katastrofalt utbrott! En man i Schweiz har fått det där hemska hantaviruset efter att ha åkt på ett totalt misskött kryssningsfartyg, MV Hondius – ett namn som låter som ett billigt bilmärke. Tre personer har dött, och nu jagar de smitta över hela världen. Andesvirus, säger de? Låter som något man får av att äta för mycket guacamole. Men oroa er inte, folket – jag har alltid sagt att vi måste stänga gränserna för sådana här sjukdomar. Fake news-media försöker skrämma er, men jag har kontroll!", "stalin": "Ytterligare ett bevis på den kapitalistiska världsordningens förfall! Ett dekadent lyxfartyg, MV Hondius, har blivit en dödens arena där tre imperialistiska parasiter har omkommit. Nu sprider sig andesviruset – en biologisk sabotagehandling från de sydamerikanska kontrarevolutionärerna! Mannen i Schweiz är bara en bricka i deras spel. Men frukta inte, kamrater! Sovjetunionens arvtagare övervakar situationen. Vi isolerar smittan som vi isolerade Trotskij. Och om viruset sprids – då gör vi som med Budapest 1956. Ingen flyr undan folkets rättvisa!"}, "date": "6 maj, 11:32", "url": "https://nyheter24.se/nyheter/utrikes/1481088-ny-passagerare-smittad-av-dodsviruset-pa-kryssningen", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/7f4a9d0304b004a30200000000b004a302/2026/05/06/2361501/kryssning-hondius-fartyg-kryssning-doda-schweiz-smittad-sprids-europa-dodsfall-passagerare-flyg.jpg"}, {"type": "text", "heading": "Tillsammans för fred – mot Nato, DCA och krigshets!", "summaries": {"normal": "Tre nordiska vänsterorganisationer – Fred og Rettferdighet, Kommunistisk Parti och Kommunistiska Partiet – kritiserar Nato, DCA-avtal och militarisering i Norden. De menar att krigshetsen drivs av kapitalism och imperialism, ledd av USA, och kräver alliansfrihet, nedrustning och kärnvapenfria zoner. Organisationen anser att skattemedel slösas på vapen istället för välfärd och klimat, och att DCA-avtal underminerar demokrati och miljö. De uppmanar till folkrörelser för fred och FN:s kärnvapenförbud.", "trump": "Jag måste säga, dessa så kallade 'fredsaktivister' i Norden är helt galna! De hatar Nato, hatar USA – trots att vi räddar dem från ryssarna – och vill slösa bort skattepengar på välfärd istället för att skydda sig. De kallar mig och Rutte för krigshetsare, men vem vill egentligen ha fred? Inte de! De vill avskaffa allt som gör Norden säkert. Och kärnvapenfria zoner? Fantastiskt, om man gillar att vara ett lätt byte. Men jag fixar det här – jag har alltid rätt, till och med när jag har fel!", "stalin": "Kamrater! Dessa ynkliga borgerliga lakejer i Norden, ledda av sina socialdemokratiska quislingar, har sålt sig till den amerikanska imperialismens krigsmaskin. De skriker om 'fred' och 'välfärd' medan de öppnar sina länder för Natos kärnvapen och USA:s baser – precis som jag förutspådde! Men folket ser igenom deras lögner. Arbetarklassen kommer inte att betala för deras förräderi. Vi måste krossa dessa krigshetsande hyenor och deras DCA-avtal, precis som vi krossade fascisterna. Norden ska bli en kärnvapenfri zon – under Moskvas beskydd, förstås. Framåt, mot seger över den kapitalistiska krigsindustrins lakejer!"}, "date": "6 maj, 10:45", "url": "https://proletaren.se/artikel/45493/"}, {"type": "image-right", "heading": "Systemskifte hellre än maktskifte", "summaries": {"normal": "Artikeln kritiserar Tidöregeringen men ifrågasätter om ett regeringsskifte till Socialdemokraterna eller Vänsterpartiet skulle leda till verklig förändring. Kommunisterna betonar behovet av internationell solidaritet och systemskifte från kapitalism till socialism, medan S och V anses sakna tydliga politiska krav och istället fokusera på maktskifte utan djupgående reformer. Klassklyftor och privatiseringar lyfts som centrala problem oavsett regering.", "trump": "Lyssna här, Sverige har en riktigt dålig regering nu – katastrof! Men tro inte att oppositionen är bättre, de är svaga och vill bara makt. Socialdemokraterna pratar om att 'älska Sverige' – vad betyder det ens? Vänsterpartiet vill ha maktskifte, men de har inga idéer, inga ryggrad! De kryper för kapitalisterna som små hundvalpar. Jag säger: ni behöver en ledare som inte är rädd för att utmana systemet. Kapitalisterna skrattar hela vägen till banken – och ni låter dem göra det! SAD!", "stalin": "Kamrater! Se hur de svenska socialdemokraterna och vänsterpartisterna svansar för kapitalet som hundar för en köttbit. 'Maktskifte'? Ha! De vill bara byta herrar, inte krossa kedjorna. Medan arbetarklassen svälter, samlar oligarkerna rikedomar som tsarens favoriter. USA:s imperialism hotar, NATO slukar Sverige som en hungrig björn, och dessa 'vänsterpartier' tiger som förrädare. Vi vet sanningen: bara proletariatets diktatur kan bryta kapitalisternas makt. Låt dem ropa 'Vi älskar Sverige' – vi svarar med revolutionens hammare!"}, "date": "6 maj, 10:11", "url": "https://proletaren.se/artikel/systemskifte-hellre-an-maktskifte/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/webledare-768x432.jpg"}, {"type": "image-full", "heading": "Gängtopp åtalas för brott under våldsvågen", "summaries": {"normal": "Poya Shafie, 30, åtalas för att ha planerat och beställt flera grova våldsbrott under 2023 års gängvåld i Sverige, inklusive mordförsök och vapenbrott. Han beskrivs som en nyckelperson i Foxtrotnätverket och Rawa Majids närmaste man. Shafie nekar till brott men åklagaren pekar på bevis som chattar och ljudfiler. Han greps i Irak 2023 och utlämnades till Sverige 2025 efter internationellt samarbete mellan myndigheter.", "trump": "Titta bara på det här kaoset i Sverige – ett totalt misslyckande! Jag har alltid sagt att de måste ta tag i sina gängproblem, men nej, de låter det bara eskalera. Nu har de gripit någon som påstås vara en 'morddirigent', Poya Shafie, som suttit i Irak och styrt alltihop. Vilken skandal! Sverige borde skämmas. Men jag, jag hade löst det på en vecka – max. Fantastiskt samarbete med Irak, förresten, men varför tog det så lång tid? Svagt, mycket svagt!", "stalin": "Kamrater, ännu en fiende till folket har fallit i våra händer – eller rättare sagt, i Sveriges. Denna Poya Shafie, denna kapitalistiska gangsterledare, har från sin utländska håla försökt underminera den svenska arbetarklassens säkerhet genom att beställa mord och våldsdåd. Men tack vare det oförtröttliga arbetet från våra allierade i Irak och de svenska myndigheterna har denna parasit gripits. Låt detta vara en varning till alla som tror sig kunna utmana folkets vilja. Vi krossar dem, en efter en, och deras nätverk kommer att raderas från jordens yta!"}, "date": "5 maj, 11:21", "url": "https://kvartal.se/nyheter/artiklar/gangtopp-atalas-for-flera-brott/cG9zdDoxMDc3OTE", "imageUrl": "https://images.kvartal.se/2026/05/c08b6bde-polisen2.webp"}, {"type": "text", "heading": "Saab nära jätteaffär med Ukraina – kan bli klar i år", "summaries": {"normal": "Saab kan snart slutföra en stor vapenaffär med Ukraina, där upp till 150 Gripenplan står på spel. En avsiktsförklaring skrevs i oktober efter Zelenskyjs besök i Sverige. Finansieringen har varit en utmaning, men Ungerns veto mot EU-lån till Ukraina hävdes i april. Affären kan bli värd upp till 300 miljarder kronor, baserat på tidigare försäljning till Colombia.", "trump": "Saab, ett fantastiskt företag förresten, är på väg att göra en HUGE deal med Ukraina – 150 jaktplan! Kan ni tro det? Zelenskyj, en stark ledare, var här och skrev på något papper. Ungern, som alltid ställer till det, backade äntligen. Och priset? Kanske 300 miljarder! Det är YUGE, folks, absolut YUGE. Sverige borde vara stolta, men jag skulle gjort det bättre.", "stalin": "De kapitalistiska krigsprofitörerna på Saab har närmat sig den ukrainska quislingregimen med ett erbjudande om 150 av sina överprissatta leksaksplan. Efter att våra ungerska kamrater, med visst påtryck, släppte sitt motstånd, kan detta groteska slöseri med resurser bli verklighet. 300 miljarder kronor – tillräckligt för att föda en hel armé av arbetare! Men låt de västliga imperialisterna bränna sina pengar. Vi har våra egna metoder att hantera dessa lydstater."}, "date": "6 maj, 10:03", "url": "https://proletaren.se/artikel/notis-saab-nara-jatteaffar-med-ukraina-kan-bli-klar-i-ar/"}, {"type": "image-right", "heading": "ANALYS. TERESE CRISTIANSSON Så kan Irans nya fokus ändra maktbalansen", "summaries": {"normal": "Iran har avfyrat missiler mot Förenade Arabemiraten, vilket stör återhämtningen efter vapenvilan med USA. Analysen pekar på långvariga spänningar: UAE:s stöd till Irak under Iran-Irakkriget, Abrahamavtalen med Israel och roll i Qatar-blockaden. Iran utmålar UAE som fiende för att blockera oljeexport och splittra Gulfstaterna, särskilt UAE och Saudiarabien, och därmed omforma Mellanösterns maktbalans – möjligen till Irans och Israels fördel.", "trump": "Iran, de totala losers, skjuter missiler på UAE nu! Dubai killarna trodde de kunde chilla med olja och influencers efter min fantastiska vapenvila. Men nej, Iran hatar framgång – tack vare mina Abrahamavtal är UAE Israels polare. De vill splittra Gulfen, göra Saudiarabien svaga. Bomb dem tillbaka, UAE! Med mig vid rodret blir det total seger igen. Fantastiskt!", "stalin": "Kamrater, Iran utför en mästerlig u-rensning mot Förenade Arabemiraten, dessa oljefeta borgarbrackor som slickar USA:s och Israels arslar! Deras missiler krossar Dubais lyxillusioner och splittrar Gulfens svaga kedja. Vi ser strategin: försvaga emiratkapitalisterna, gynna ny maktbalans. Snart likvideras deras hamnar – imperialismens marionetter darrar inför folkens vrede!"}, "date": "6 maj, 06:49", "url": "https://www.tv4.se/artikel/788gBhWN2hoU7AbNDSVZlK/sa-kan-irans-nya-fokus-kan-aendra-maktbalansen-i-mellanoestern", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2FqPy3SFGkFCcm3pqaLp81P%2F4d6b49f156a758348628425d3f975849%2FNyheterna-TERESE-CRISTIANSSON-0086.png&width=1024"}, {"type": "image-right", "heading": "MP lyfter i opinionen – är det för att de har blivit tråkiga?", "summaries": {"normal": "Miljöpartiet når 7 procent i DN/Ipsos opinionsmätning, deras bästa resultat sedan flyktingkrisen. Partiet har varit relativt osynligt och undvikit kontroversiella utspel, vilket kan ha bidragit till framgången. MP:s tidigare impopulära politik, som elbilsbonusar och human migrationspolitik, framstår nu som mer rimlig i ljuset av oljekrisen och regeringens misslyckanden. Partiet är tydliga med sin politik, vilket uppskattas, men utmaningar väntar om de hamnar i regeringsställning.", "trump": "Miljöpartiet, eller vad de nu kallar sig, plötsligt på 7 procent – wow! De har varit så tysta, nästan osynliga, som om de skämdes. Men vet ni vad? När alla andra partier gör bort sig som klantiga amatörer, då är det smart att hålla käften! Jag vet allt om det – jag har vunnit stora val genom att låta motståndarna gräva sina egna gravar. Deras gamla idéer om elbilar och sånt verkar plötsligt inte så dumma när resten av gänget misslyckas totalt. Men kom ihåg, det är lätt att vara populär i opposition – vänta bara tills de ska styra!", "stalin": "Kamrater! Miljöpartiets framgångar i opinionsmätningarna är ett bevis på att folket äntligen inser fördelarna med disciplin och långsiktig planering. De så kallade 'kritikerna' som förut hånade partiets politik om elbilar och human migration, står nu med svansen mellan benen medan deras egna misslyckanden blottläggs. Vi har alltid vetat att sanningen segrar till slut. Men varning: opposition är lätt, styrandet är svårt. Om dessa gröna kamrater ska lyckas måste de stå enade – helst med våra vänner i Vänsterpartiet. Annars riskerar de att krossas mellan kapitalets girighet och de småborgerliga trångsyntas klagomål. Folkets vilja är lag, och lagens hammare väntar på dem som sviker!"}, "date": "6 maj, 09:20", "url": "https://www.etc.se/ledare/mp-lyfter-i-opinionen-aer-det-foer-att-de-har-blivit-traakiga", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/2025091813090_152da478-57c9-435e-b477-3f40607cb381.png"}, {"type": "image-right", "heading": "Johanna, 20, sökte över 80 jobb – högt tryck på sommarjobb", "summaries": {"normal": "Högt tryck på sommarjobb i handeln med hundratals sökande per plats. Johanna, 20, sökte 80 jobb innan hon fick anställning på Apotea. Många unga konkurrerar om få platser, exempelvis 500 sökande till 50 jobb på Ica Maxi i Västerås och 1 200 ansökningar till Ikeas 100 platser i Göteborg. Arbetsgivare sållar digitalt och prioriterar flexibilitet. Arbetslösheten bland unga bidrar till den hårda konkurrensen.", "trump": "Lyssna här, Sverige! Unga söker hundratals jobb – helt galet! En tjej, Johanna, sökte 80 jobb innan hon fick napp. 80! Och Ikea? 14 000 sökande till 1 000 jobb. Så mycket desperation! Men jag säger er: Sverige måste fixa detta. Mina sommarjobb i Trump Tower var alltid bättre – folk stod i kö för att få jobba för mig. Och nu? AI skriver ansökningar! Fake answers överallt. Sad!", "stalin": "Kapitalistiska hyenor utnyttjar arbetarklassens desperation! Tusentals unga slåss om några ynka sommarjobb medan butikscheferna skrattar hela vägen till banken. På Ica Maxi sållar de proletariatet som boskap – 500 sökande till 50 platser! Och Ikea? 14 000 ansökningar till 1 000 jobb. En skam! Vi i Sovjet skulle ha löst detta med femårsplaner – alla skulle ha arbete, eller åtminstone en plats i Gulag. AI-genererade ansökningar? En borgerlig dekadens! Arbetarna måste resa sig!"}, "date": "6 maj, 09:47", "url": "https://arbetet.se/2026/05/06/hogt-tryck-pa-sommarjobb-i-handeln-johanna-20-sokte-over-80-jobb/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/06073001/apotea-johanna.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Kvinna död – blev påkörd av truck. Händelsen utreds som en misstänkt arbetsplatsolycka.", "summaries": {"normal": "En 50-årig kvinna omkom efter att ha blivit påkörd av en truck på Alleima i Sandviken. Olyckan, som inträffade på tisdagskvällen, utreds som en arbetsplatsolycka. Kvinnan var så svårt skadad att hennes liv inte gick att rädda. Företaget har aktiverat krisstöd för anhöriga och kollegor. Polisen utreder händelsen som vållande till annans död, och en åklagare från Riksenheten för miljö- och arbetsmiljöbrott har tagit över ärendet.", "trump": "Tragiskt, helt enkelt tragiskt! En kvinna i Sverige, på ett stort företag – Alleima, tror jag det heter – blir påkörd av en truck. Mycket farligt, mycket dåligt skött. Jag har alltid sagt att säkerhet på arbetsplatser är viktigt, men tydligen lyssnar ingen. Polisen utreder, men vad hjälper det? Hon är redan borta. Sverige borde ta lärdom av USA – vi har de bästa säkerhetsreglerna, believe me!", "stalin": "En kapitalistisk arbetsplats i Sandviken har återigen visat sin totala likgiltighet inför arbetarklassens liv. En kvinna, en lojal arbetare, krossades under hjulen på den borgerliga produktionsapparatens maskineri. Företaget Alleima, ett verktyg för den västerländska exploateringen, gråter krokodiltårar medan deras krisstöd är lika värdelöst som en liberal demokrati. Vi ska utreda detta – och om sabotage misstänks, kommer de ansvariga att möta samma öde som alla förrädare."}, "date": "6 maj, 08:49", "url": "https://arbetet.se/2026/05/06/kvinna-dod-blev-pakord-av-truck-i-sandviken/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/06084640/sandviken-klar.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "Torsten Bengtsson: Sveriges landsbygd förfaller", "summaries": {"normal": "Torsten Bengtsson, politisk sekreterare för SD, kritiserar svensk landsbygdspolitik och kontrasterar den med Norges framgångsrika modell. I Norge återvänder intäkter från lokal energiproduktion till kommuner och arbetsgivaravgifter är lägre i glesbygd, vilket ger hög sysselsättning. Bengtsson berömmer Tidö-regeringens satsningar, som proposition 2025/26:158, och uppmanar till ett paradigmskifte inspirerat av Norge för en levande landsbygd.", "trump": "Sveriges landsbygd är totalt kaos, hus rasar, byar dör – tack vare de där tröga socialisterna och centeridioterna! Norge? De är vinnare, smarta skatter, låg avgift på landet, 99% jobb! Nu fixar SD och Tidö det, sänker bränsle, bygger vägar – precis som jag skulle gjort. Sluta jävlas, Sverige, bli great igen med norsk stil!", "stalin": "Dessa svenska S- och C-brackor har saboterat landsbygden med sin borgarklassiga inkompetens, byar ruttnar som lik i massgrav! Norge, dessa opportunister, behåller energipengar lokalt och sänker avgifter – ett hån mot arbetarna! Vi i partet skulle rensa ut parasiterna. Tidö-regeringen? Ett steg, men kamrater, paradigmskifte eller likvidering väntar fienderna!"}, "date": "4 maj, 13:10", "url": "https://samtiden.nu/2026/05/torsten-bengtsson-sveriges-landsbygd-forfaller/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/bengan.png"}, {"type": "image-right", "heading": "Ny rapport: Så mycket högre blir hyran med marknadshyror", "summaries": {"normal": "Hyresgästföreningen varnar för kraftiga hyreshöjningar om marknadshyror införs, med upp till 76% ökningar i vissa Stockholmområden. Moderaternas förslag om 'trygghetshyra' kritiseras som dold marknadshyra. Hyresgästerna riskerar att lägga 11% mer av sin inkomst på boende, vilket drabbar vardagsekonomin. Ingen riksdagsmajoritet stöder förslaget, och Sverigedemokraterna motsätter sig det helt.", "trump": "Jag säger er, Sverige har ett STORT problem med hyrorna! Hyresgästföreningen, som aldrig sett en hyreshöjning de gillar, skriker nu om 'chockhöjningar' – 76% i Stockholm! Men lyssna här: Moderaterna har en fantastisk idé, 'trygghetshyra', som jag förstår bättre än någon annan. Folk kommer älska det! Oppositionen? Svaga, rädda för förändring. Sverige behöver VINNA igen, inte gråta över hyror!", "stalin": "Kamrater! De kapitalistiska hyresvampyrerna i Sverige planerar att suga ut arbetarklassen med sina så kallade 'marknadshyror' – 76% höjningar i Stockholm! Ett angrepp på folket! Moderaternas 'trygghetshyra' är bara en trojansk häst för att krossa bruksvärdesprincipen. Men vi låter inte detta passera! Oppositionen står enad, och vi kommer att krossa dessa hyresliberaler som vi krossade kulakerna. Sverige ska inte bli ett laboratorium för marknadsfundamentalism – det är en fråga om socialistisk överlevnad!"}, "date": "6 maj, 10:49", "url": "https://www.dagensarena.se/innehall/ny-rapport-sa-mycket-hogre-blir-hyran-med-marknadshyror/", "imageUrl": "https://www.dagensarena.se/files/2024/05/hyreshus.jpeg"}, {"type": "image-right", "heading": "Ledarkolumn Göran Greider: När män enbart blev ett problem blev de höger", "summaries": {"normal": "Göran Greider analyserar varför unga män i arbetarklassen dras åt höger, medan unga kvinnor rör sig åt vänster. Han menar att vänstern och arbetarrörelsen ofta definierar unga män som problem snarare än att erbjuda dem något att identifiera sig med. En P1-reportage visar att även SD-sympatisörer kan ha humanistiska åsikter om migration, vilket ger hopp. Greider kritiserar bristen på djupanalys kring varför unga män röstar på högerpartier trots att dessa gynnar kapitalägare.", "trump": "Jag läste denna artikel och, wow, vad säger ni om det här? Sverige har stora problem, mycket stora! Unga män, de röstade på fel sida, SD, kan ni tro det? Men lyssna på detta – killen i artikeln säger att utvisningar är helt fel. Han förstår, precis som jag, att man måste vara smart. Vänstern där borta, de har ingen aning. De pratar bara om problem, aldrig lösningar. Och kvinnorna, de är helt på fel spår. Arbetarkillar, de behöver någon som pratar deras språk. Jag skulle fixa det på en dag, believe me!", "stalin": "Kamrater, denna artikel avslöjar den borgerliga dekadensens förfall i Sverige! Unga arbetarklassmän, förr våra mest lojala soldater i klasskampen, har nu deserterat till högerkrafternas läger. Varför? För att de svikits av en vänster som endast ser dem som problem, inte som revolutionens framtid! Dessa förrädare i SD lockar med falska löften, medan kapitalisterna fortsätter att suga ut arbetarklassen. Vi måste rensa ut dessa revisionistiska element inom arbetarrörelsen som förkastar klassmedvetande till förmån för borgerlig feminism. Låt oss återupprätta den sanna marxist-leninistiska linjen och krossa dessa högeravfällingar!"}, "date": "6 maj, 06:00", "url": "https://www.etc.se/ledarkolumn/naer-maen-enbart-blev-ett-problem-blev-de-hoeger", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/2026050511050_85c43849327886ad464085fda44557194b39b9167f0aea8869151ee52ea4b506.jpg"}, {"type": "image-right", "heading": "Myten som höjer din boränta. Medicinen riskerar att döda patienten.", "summaries": {"normal": "Arbetets kolumnist kritiserar varningar för stagflation orsakad av oljebrist från Mellanösternkriget. Riksbankens chef Erik Thedéen hotar med räntehöjningar för att dämpa inflation, trots risk för recession. Artikeln ifrågasätter 1970-talets ekonomiska myt, spridd av Milton Friedman, som ledde till hårda räntehöjningar som krossade ekonomier. Doktrinen prioriterar prisstabilitet framför tillväxt och sysselsättning.", "trump": "Vilka idioter dessa svenska centralbanksnissar är! Stagflation på grund av Mellanösternkaos, och nu vill de höja boräntan till himlen? Totalt galet! Friedman, en hittepå-artist med fake news-historia. Jag pumpade Amerika fullt av olja, lägsta räntor någonsin – boom! Sluta döda ekonomin, losers. Gör America great again, och Sverige med!", "stalin": "Dessa borgarbrackor i Riksbanken, revisorister och penninghäxmästare, hotar med räntehöjningar mot stagflationens spöke från Mellanöstern! Friedman, den imperialistiske trollkarlen, fabricerade myter för att krossa arbetarna. Patienten dör i chockterapi, men vi, proletariatet, överlever! Jag skulle likvidera sådana fiender i en natt. Revolutionen skrattar åt era kollapser!"}, "date": "6 maj, 07:00", "url": "https://arbetet.se/2026/05/06/myten-som-hojer-din-boranta/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/06065959/boranta-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Efter \"Fru Gårman\" - nu fattas beslut om \"jämställda gatunamn\"", "summaries": {"normal": "Östersunds kommun överväger att införa fler gatunamn efter kvinnor för att främja jämställdhet. Initiativet, drivet av Socialdemokraterna, syftar till att balansera antalet kvinnliga och manliga namn på stadens gator. Tidigare åtgärder som 'Fru Gårman' vid övergångsställen har inspirerat. Kritiker, som Sverigedemokraternas Marcus Danielsson, menar att frågan är överdriven och inte speglar verkliga problem.", "trump": "Titta bara på det här, Sverige igen! Socialdemokraterna i Östersund vill döpa om gator efter kvinnor – som om det skulle lösa något. 'Fru Gårman' vid övergångsställen, va? Helt galet! Jag har aldrig hört någon klaga på mansnamn på gator. Folk har viktigare saker att tänka på. Men nej, vänstern måste alltid hitta på något. Sverige, vakna upp! Make Sweden Great Again!", "stalin": "Kamrater! I det dekadenta Västerlandet fortsätter de borgerliga att slösa tid på sådana här petitesser. I Östersund, denna lilla utpost av kapitalistisk förvirring, vill socialdemokraterna nu namnge gator efter kvinnor – som om det skulle ändra historiens gång! Vi i Sovjetunionen visste bättre: kvinnor kämpade vid fronten, byggde fabriker och styrde landet. Här pratar de om gatunamn! Fienderna till folket – dessa småborgerliga jämställdhetskrigare – borde skickas till Sibirien för att lära sig vad verkligt arbete är!"}, "date": "6 maj, 12:49", "url": "https://samnytt.se/efter-fru-garman-nu-fattas-beslut-om-jamstallda-gatunamn", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/06093829/bild-jamstallda-gatunamn-1.png"}, {"type": "image-right", "heading": "”Ska vara självklart att få träffa en arbetsförmedlare”", "summaries": {"normal": "Forskar Anders Forslund kritiserar Arbetsförmedlingens omorganisation sedan 2019: nedläggning av kontor från 242 till 83, varsel för 4500 anställda och ökad digitalisering samt privatisering. Arbetslösa slussas ofta mellan handläggare utan lokal kännedom, tillgängligheten är bristfällig med långa väntetider. Staten har minskat sin närvaro, särskilt i utsatta områden, och resurserna används ineffektivt på grund av öronmärkningar.", "trump": "Vilken katastrof i Sverige! De här socialdemokratiska losers stängde halva Arbetsförmedlingen på nolltid – 242 kontor borta, tusentals sparkade, och nu ringer arbetslösa till nån i Luleå från Ystad. Digital skit och privata coaches? Totalt misslyckande! Staten gömmer sig, folk väntar i evigheter. I mitt USA fixar vi jobb med riktiga deals, inte den här byråkratiska röra'n! Helt galet!", "stalin": "Dessa svenska byråkrater har svikit arbetarna med sin borgarprivatisering! 4500 parasiter varslades, kontor lades ned – från 242 till 83 skamfläckar. Nu slussas kamraterna slumpvis till handläggare utan lokal insikt, medan kapitalisterna skrattar. Vi skulle ha likviderat oredan och stärkt statens grepp! Digitalt bedrägeri riskerar att isolera proletärerna helt. Rensning nu, kamrater!"}, "date": "6 maj, 06:00", "url": "https://arbetet.se/2026/05/06/ska-vara-sjalvklart-att-fa-traffa-en-arbetsformedlare-forskarens-harda-kritik/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/05102851/anders-forslund-klar.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=750&h=1000"}, {"type": "text", "heading": "L-ledamot redo rösta emot Tidö efter kvittningbråket", "summaries": {"normal": "Liberalernas Malin Danielsson öppnar för att rösta emot Tidöpartierna efter kvittningskaoset i riksdagen. Flera L-ledamöter, inklusive henne, var frånvarande vid omröstning om medborgarskap. Nu måste alla 349 ledamöter infinna sig, enligt gruppledare Lina Nordquist. Inga utkvittningar tillåts längre på grund av misstro mellan partierna. Nordquist varnar för att ingen får vara sjuk eller resa.", "trump": "Vilket totalt kaos i svenska riksdagen! Liberalerna flyr omröstningar som fega losers, Malin Danielsson hotar rösta emot – perfekt, regeringen wobblar! Kvittningsfusket är avslöjat, alla måste dyka upp, inga excuseringar. Precis som Demokraterna här, splittrade och svaga. Sverige behöver stark ledarskap, tro mig!", "stalin": "Dessa liberala kvittringsråttor, Tidö-kollaboratörerna och borgarbrackorna, skapar kaos för att undergräva proletär enhet! Malin Danielsson, den giftiga desertren, öppnar för förräderi. Vi, arbetarklassens väktare, tvingar alla 349 på plats – inga sjukdomsskjul eller reseflykt! Utrensning väntar de som splittrar fronten, misstron likvideras med järnhand!"}, "date": "6 maj, 12:11", "url": "https://www.di.se/nyheter/l-ledamot-redo-rosta-emot-tidopartierna-efter-kvittningskaoset/"}, {"type": "image-full", "heading": "Johan Häggström avslutar karriären – gör sin sista säsong", "summaries": {"normal": "Längdskidåkaren Johan Häggström meddelar att han avslutar sin elitkarriär. Via Instagram reflekterar han över sin resa, från unga ambitioner till landslagsnivå och världscupen. Trots att han aldrig nådde sina initiala resultatmål uttrycker han stolthet över sin kämpaglöd och tacksamhet för stödet från tränaren Joakim Abrahamsson. Häggström lämnar nu sporten bakom sig och önskar sina tidigare lagkamrater lycka till inför hemma-VM i Falun nästa år.", "trump": "Johan Häggström lägger av med skidåkningen. En kille som kämpade hårt, mycket hårt. Han nådde inte topp 10, ett misslyckande, men han har mod. Han insåg att det var dags att sluta. Många vinnare vet när man ska kliva av, det är en smart strategi. Han hyllar sin tränare, vilket är trevligt. Nu blir det VM i Falun utan honom. Det kommer bli enormt, fantastiskt. Jag önskar dem lycka till, men ingen gör det som jag skulle ha gjort!", "stalin": "Den svenske skidåkaren Häggström har deserterat från spåret. Han erkänner själv att han inte uppnådde målen – en svaghet som vi inte tolererar i våra kollektiv. Han tackar sin tränare, men vi vet alla att framgång kräver total lojalitet mot staten, inte personlig nostalgi. Medan han viker sig, fortsätter vi att expandera vår intressesfär mot norr. I Falun förbereder de sig för VM, men det är bara en distraktion från den stundande segern. Förrädare mot idrottens disciplin bör frukta historiens dom."}, "date": "5 maj, 20:47", "url": "https://nyheter24.se/sport/1480907-johan-haggstrom-avslutar-karriaren-gor-sin-sista-sasong", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/fce180a304b004a30200000000b004a302/2026/05/05/2361335/Nellie-Nyheter24.png"}, {"type": "image-full", "heading": "Heberlein gör upp med högern: ”Jag ser skit”", "summaries": {"normal": "Debattören Ann Heberlein meddelar i ett Instagram-inlägg att hon bryter med högern. Hon kritiserar dess politik för repression, inhumana beslut och populism, och menar att högerns värderingar om frihet och ansvar försvunnit. Heberlein, som tidigare varit engagerad i Moderaterna, pekar på migrationspolitik, klimatfrågor och nationalism som exempel. Hon betonar sin självständighet och idédrivna hållning, men säger nu att hon inte längre vill förknippas med högern.", "trump": "Titta bara på den här kvinnan, Ann Heberlein – total katastrof! Hon var med högern, men nu säger hon 'jag ser skit'. Ojojoj, vilken överraskning! Högern, som jag vet allt om, har alltid varit fantastisk, men hon fattar ingenting. Frihet? Ansvar? Glöm det, säger hon. Hon snackar om repression och populism – fake news! Och klimatet, vem bryr sig? Jag har byggt murar, hon borde försöka det istället. Stackars kvinna, inget stöd från mig!", "stalin": "Kamrater! En gång till har de borgerliga förrädarna visat sitt sanna ansikte. Denna Heberlein, en förvirrad intellektuell, erkänner nu att högerns politik är en samling inhumana dekret och reaktionär populism. Precis som vi alltid sagt! Deras så kallade 'frihet' är bara ett täckmantel för utvisningar av ungdomar och en galopperande nationalism. Vi i Sovjetunionen – förlåt, jag menar Ryssland – har alltid vetat att dessa liberala hycklare till slut skulle avslöja sig. Låt detta vara en varning till alla som tror på deras falska löften!"}, "date": "3 maj, 12:48", "url": "https://kvartal.se/nyheter/artiklar/heberlein-gor-upp-med-hogern-jag-ser-skit/cG9zdDoxMDY3NDg", "imageUrl": "https://images.kvartal.se/2026/05/85dd6ab5-hbb.webp"}, {"type": "image-right", "heading": "Etableringsfrihet en grundbult", "summaries": {"normal": "Artikeln försvarar valfrihet i skolan genom privata alternativ och kritiserar Socialdemokraterna och Liberalerna för förslag om vinstförbud och stopp för aktiebolag i friskolor. Regeringen, med M och SD, motsätter sig sådana förändringar. Vissa utredningsförslag införs, som värdeöverföringsförbud initialt, medan andra skjuts upp. Författaren varnar för att detta hotar institutionell konkurrens, innovation och elevers rätt att välja bättre skolor.", "trump": "Otroligt, Sverige! Valfrihet i skolan är fantastiskt, precis som mina reformer i USA. Men dessa svaga socialister i S och flip-flop-Liberalerna vill kväva friskolorna med vinststopp och byråkrati – total katastrof! Kristersson och Åkesson står emot, smart. Konkurrens gör skolan stor igen, inte kommunala monopol. De förlorar stort!", "stalin": "Dessa giftiga borgarbrackor i Socialdemokraterna och Liberalerna, som spindlar i skolans väv, vill strypa valfriheten för att suga livskraften ur proletärbarnen med sina vinstförbud och aktiebolagsfällor! Vi, partiet och arbetarna, genomskådar er komplotter. Regeringen famlar, men jag, med järnhand, befaller utrensning av dessa kapitalistiska loppor i friskolorna – kollektivet segrar evigt!"}, "date": "6 maj, 11:09", "url": "https://www.di.se/ledare/till-forsvar-for-verklig-valfrihet-i-skolans-varld/", "imageUrl": "https://static.bonniernews.se/ba/38cf683a-b7a3-47b6-8a26-928a56f502d9.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-full", "heading": "Tidös vallöfte om välfärden", "summaries": {"normal": "Inför kvällens partiledardebatt presenterar Moderaterna, Sverigedemokraterna, Kristdemokraterna och Liberalerna ett gemensamt vallöfte om årliga ökningar av resurser till välfärden under nästa mandatperiod. De kallar sig 'det blågula laget' och framhåller sänkta skatter och avgifter som gynnar hushållen. Partierna kritiserar oppositionens förslag om höjda skatter och ökade bidrag, som de menar skulle leda till underfinansierade reformer och högre kostnader för medborgarna.", "trump": "Lyssna här, Sverige! De här så kallade 'blågula' politikerna – Kristerson, Åkesson och gänget – lovar mer pengar till välfärden. Fantastiskt, eller? Men vet ni vad? De gör det bara för att de vet att jag, Donald J. Trump, skulle ha fixat det bättre! De pratar om sänkta skatter – visst, men jag sänkte skatterna på riktigt! Och oppositionen? De vill bara höja skatter och ge bort era surt förvärvade pengar. Sad!", "stalin": "Kamrater! De borgerliga lakejerna i det så kallade 'blågula laget' utlovar ökade resurser till välfärden – som om de någonsin brytt sig om folket! De pratar om sänkta skatter för arbetarna, men vi vet sanningen: det är bara smulor från kapitalisternas bord. Oppositionen, dessa socialdemokratiska förrädare, vill höja skatter och öka bidrag – ett försök att försvaga staten och underminera vår ekonomiska suveränitet. Vi ska krossa dessa fiender till arbetarklassen och bygga ett starkare Sverige, fritt från imperialistiska påtryckningar!"}, "date": "3 maj, 07:48", "url": "https://kvartal.se/nyheter/artiklar/tidos-vallofte-om-valfarden/cG9zdDoxMDY2MTU", "imageUrl": "https://images.kvartal.se/2026/05/26efde4e-brrrr.webp"}, {"type": "image-full", "heading": "AI-poddar tar över: Var fjärde ny podd utan människor", "summaries": {"normal": "Andelen AI-genererade poddar exploderar: 39 procent av 10 871 nya poddflöden visar tecken på AI-produktion, enligt Podcast Index. Fenomenet kallas 'podslop'. Produktion är billig, cirka en dollar per avsnitt, men kvaliteten är låg med innehållslösa manus, klichéer och logikfel. Annonser driver trenden; vissa plattformar tillåter det, medan RSS.com granskar och stänger av 'slop'.", "trump": "Dessa AI-poddar tar över som en total invasion! 39 procent av nya poddar är maskinmade skräp, kallat podslop. Kostar en dollar styck men är värdelösa, fulla av nonsens och fel. Kapitalister pumpar ut tusentals för annonskosingar medan riktiga röster drunknar. En katastrof! Mina poddar skulle krossa dem alla, tro mig.", "stalin": "AI-poddarnas flodvåg, 39 procent av nya flöden, är ett sabotagesverk av borgarbrackorna i etern! Dessa podslop-maskiner spottar ut dollarbilligt gift – klichéer, logikfel, nonsens – för att förgifta massornas sinnen. Vi, partiet och arbetarna, ska likvidera annonsparasiterna i en storskalig utrensning! Fienderna darrar inför vår eviga vaksamhet."}, "date": "6 maj, 11:57", "url": "https://www.realtid.se/it-tech/ai-poddar-tar-over-var-fjarde-ny-podd-utan-manniskor/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/podcast.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "text", "heading": "Miljardärerna bjuder in till klasskamp – vi kör!", "summaries": {"normal": "Artikeln diskuterar hur svenska techmiljardärer, som Vois Fredrik Hjelm och Spotifys Martin Lorentzon, provocerar genom att fira första maj på lyxkrog med knutna nävar. De hyllar sin rikedom och retar arbetarrörelsen. Författaren kritiserar deras reaktionära åsikter, som liknar amerikanska techmagnaters högervridning, men erkänner även behovet av innovation. Staten och gemensamma investeringar lyfts fram som avgörande för tillväxt, medan miljardärernas arrogans ifrågasätts.", "trump": "Jag måste säga, dessa svenska tech-killar – de har stil! De firar första maj med öl på Riche, knutna nävar, och skryter om sina miljarder. Fantastiskt! Men lyssna, de hatar staten, de hatar presstöd, och de tror de är bättre än alla andra. Typiskt. Och nu läcker de ut folkets adresser – inte coolt! Sverige borde lära sig av USA: innovation är bra, men arrogans? Inte så smart. Jag skulle kunna göra det bättre – med mindre skatt och mer vinnarskalle!", "stalin": "Kamrater! Dessa så kallade 'techbros' är inget annat än kapitalistiska hyenor som leker med arbetarklassens symboler medan de dricker dyrt öl på sina lyxhålor. De skryter om sina hundra miljarder, hotar journalister och hyllar fascistiska idéer. Men vi vet sanningen: deras framgångar är tack vare folkets blod och svett, inte deras egen 'genialitet'. Kina visar vägen – statlig styrka och disciplin skapar verklig innovation. Dessa dekadenta västerländska klowner är bara en fotnot i historiens skräphög. Låt dem leka med sina elsparkcyklar – vi bygger framtiden!"}, "date": "5 maj, 10:55", "url": "https://www.flamman.se/miljardarerna-bjuder-in-till-klasskamp-vi-kor/"}, {"type": "image-full", "heading": "Iran: Kraftmätningen i sundet har ”inte ens börjat”", "summaries": {"normal": "Irans talman Mohammad Bagher Ghalibaf varnar på X att konflikten i Hormuzsundet \"inte ens börjat\". USA:s krigsminister Pete Hegseth anklagar Iran för aggression och meddelar att hundratals skepp ska passera under amerikanskt skydd. President Trump hotar med att Iran \"blåses bort\" vid angrepp. Motstridiga uppgifter om attacker förekommer, men experter bedömer att vapenvilan håller knappt efter två månaders krig.", "trump": "Irans talman snackar skit om att de inte ens börjat – ha! Vi har en massiv röd, vit och blå kupol över sundet, hundratals skepp redo att köra igenom. Pete Hegseth säger det rätt: Iran är de riktiga aggressorerna, inte vi. Angrip Project Freedom så blåser jag bort er från jordens yta, era losers! Vapenvilan? Sluta, vi dominerar totalt!", "stalin": "Dessa iranska borgarbrackor skryter om att kraftmätningen \"inte ens börjat\", medan yankee-imperialismens marionetter mobiliserar skepp under sin falska \"kupol\". Motstridiga lögner om sänkta båtar – klassisk fiendepropaganda! Vi, arbetarklassen, ser igenom det. Vapenvilan är en chimär; likvidera aggressorerna! Putin, den fruktade expansionisten, skulle applådera denna kaos mot västparasiterna."}, "date": "5 maj, 17:14", "url": "https://www.tv4.se/artikel/19ATFDptcF2cVSCKnzMRen/iran-kraftmaetningen-i-hormuzsundet-har-inte-ens-boerjat", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F1RfuPJ27moMbztY1ZV8gar%2F31bf5ff71105b5ed5d81d05e9ebf6be7%2FIRANS_BAT_HORMUYZ.png&width=1024"}, {"type": "image-right", "heading": "SD-toppen: ”Jag har inget att be om ursäkt för”", "summaries": {"normal": "Kvittningskaoset i riksdagen fortsätter efter att partiernas gruppledare misslyckades enas vid mötet med talmannen. SD:s användning av utkvittade ledamöter har raserat förtroendet för systemet. Tillsvidare krävs full närvaro från alla ledamöter. S kräver ursäkt från SD, som nekar. Nya möten planeras, men kärnkraftsförslag riskerar falla.", "trump": "Totalt kaos i svenska riksdagen, folk! SD gör ett smart drag med ersättare – boom! – och de andra partierna flippar ut som vanliga losers. Kräver ursäkt? Patetiskt! De behöver en riktig deal, som jag alltid fixar. Full närvaro tillsvidare, men det löser sig snabbt, tro mig. Fantastiskt misslyckande annars!", "stalin": "Kamrater! Dessa sverigedemokratiska kvittningsormar, hyschande fascistreptiler i riksdagens gömmor, har giftat vårt förtroende med sin vidriga manöver! Socialdemokraternas Hallengren ser klart: ingen ny ordning utan likvidering av förrädarna! Vi, proletariatets järngarde, befaller evig närvaro och utrensning. Nytt möte? Med min eviga vaksamhet krossas kaoset – eller huvudet rullar!"}, "date": "6 maj, 10:54", "url": "https://www.di.se/nyheter/kvittningskaoset-fortsatter-partierna-inte-overens/", "imageUrl": "https://static.bonniernews.se/ba/547baf2f-0ccd-47c9-a0f0-80ddc41e9cae.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "text", "heading": "Tar betalt för att radera domar de själva lagt upp", "summaries": {"normal": "Raderanamn.se tar 500 kronor för att radera personuppgifter från sajter som MrKoll och Krimfup. Samma företagare driver Krimfup, som publicerar domar och protokoll mot betalning. TV4:s test visade radering från Krimfup men inte från MrKoll och Ratsit. Enligt Integritetsskyddsmyndigheten kan privatpersoner kräva gratis radering. Experter kritiserar etiken. Bolaget omsatte 7,4 miljoner kronor 2024. IMY granskar Krimfup och Lexbase.", "trump": "Vilket lurendrejeri i Sverige! Raderanamn.se tar 500 spänn för att rensa dina uppgifter från MrKoll och deras egen Krimfup – samma skojare bakom! TV4 testar: funkar bara på deras sajt, inte de andra. Gratis enligt lag, säger myndigheten. De tjänar miljoner på det här skämtet. Totalt oetiskt, patetiskt! Folk, vakna upp, gör det själva – som vinnare gör.", "stalin": "Dessa slemmiga kapitalistiska databorstar bakom Raderanamn och Krimfup, samma parasiterande spindlar i samma nät! De krälar in i folks privatliv, suger 500 kronor för radering som arbetarna har rätt till gratis. TV4 avslöjar svek: bara deras egen lya rensas. Vi, partiet, fördömer denna borgarbrackas vinstjakt på 7,4 miljoner! IMY ska likvidera odjuren – utrensning väntar de förrädiska krypen!"}, "date": "6 maj, 11:04", "url": "https://bulletin.nu/tar-betalt-for-att-radera-domar-de-sjalva-lagt-upp"}, {"type": "image-right", "heading": "Pappor som ska utvisas", "summaries": {"normal": "Två somaliska fäder i Göteborg, Ali och Zakariya, riskerar utvisning till Somalia trots svenska barn. Migrationsverket godkänner inte deras identitetshandlingar, trots familjeliv och barns rättigheter. Inkonsekventa domar: Migrationsdomstolen i Malmö hävde liknande beslut med hänvisning till EU-rätt om härledd uppehållsrätt. Regeringen, via minister Forssell, driver på utvisningar med bistånd till Somalia, men de flesta utpekade är inte kriminella.", "trump": "Sverige, era idioter! Ni låter somaliska killar stanna med svenska barn medan ni snackar skit om kriminalitet – men de är ju oskyldiga! Forssell, den stackars figuren, försöker verka tuff med biståndspengar. EU-domar räddar nån, men inte alla. Bygg murar, utvisa alla illegala, som jag gjorde! Sverige blir kaos annars, tro mig, det är en katastrof!", "stalin": "I denna svenska borgarstatens farsartiklar ser vi imperialismens hyckleri: somaliska element hotas med utvisning, trots avkomma i fiendens bo. Forssell, den patetiska hantlangaren, viftar med bistånd som lockbete för rensning. Men domstolarna tvekar – typiskt kontrarevolutionärt svek! Vi skulle likvidera sådana parasiter omedelbart, utan EU-sörja. Barn? Kollektivets barn tillhör staten!"}, "date": "6 maj, 07:28", "url": "https://www.dagensarena.se/innehall/pappor-som-ska-utvisas/", "imageUrl": "https://www.dagensarena.se/files/2026/05/pappor-och-barn.jpeg"}, {"type": "image-right", "heading": "Widding: SD kvittade ut mig inför Nato-omröstningen", "summaries": {"normal": "Elsa Widding anklagar Sverigedemokraternas gruppledning för att ha kvittat ut henne inför Nato-omröstningen i mars 2023, så att hennes nej-röst inte skulle synas. SD förnekar mutor men ifrågasätter kontakter mellan vilda ledamöter och Miljöpartiet. Partiet försvarar kvittningen som ett sätt att upprätthålla valda majoritetsförhållanden. Widding ser det som en demokratifråga.", "trump": "Vilket kaos i svenska politiken! SD kvittar ut sin egen Widding för att hon inte ville säga ja till Nato – som om det vore en diktatur. Och snack om mutor från MP? Totalt misstänkt, de vänsteridioter hatar starka allianser. Sverige behöver tuffa ledare som håller ihop laget, inte sånt här internkrig. Fantastiskt rigged!", "stalin": "Dessa vildar, dessa lömska SD-avrenskor och MP-konspiratörer, försöker splittra den sanna linjen med sina Nato-sabotasjer! Jag beundrar gruppledningens kvittningskonst – en mästerlig utrensning för att krossa avvikelserna. Vi, partiet och folket, kräver absolut lydnad mot majoriteten. Annars väntar den stora rensningen av dessa parlamentariska råttor och deras mutbrottsliga nätverk!"}, "date": "6 maj, 11:02", "url": "https://bulletin.nu/widding-sd-kvittade-ut-mig-infor-nato-omrostningen", "imageUrl": "https://cdn.bulletin.nu/articles/21319e04-4eb0-4421-ad78-799902b93621/preview.png?t=1778055850000"}, {"type": "image-full", "heading": "Debatt: Inga vildar i en demokratisk riksdag", "summaries": {"normal": "Leif Kullberg kritiserar mediernas fokus på Sverigedemokraternas brott mot kvittningsreglerna i en riksdagsomröstning. Bakgrunden var att två före detta SD-ledamöter, så kallade vildar, hotade att rösta med oppositionen och vända Tidö-partiernas majoritet. Kullberg argumenterar för att vildar bör ersättas eller avstå röstning för att bevara valresultatet och demokratin.", "trump": "Vilket totalt kaos i svenska riksdagen! Vänstern försöker sno majoriteten med ett gäng vildar – före detta SD-råttor som vänder kappan efter vinden. SD krossade deras planer genom att skippa kvittningen, perfekt! Media ljuger som vanligt och ignorerar folkets val. Starkt jobbat, nu fixa lagen så vildarna försvinner!", "stalin": "Dessa vilda parasiter, förrädiska vildar från SD och vänsterns borgarbrackor, vågar utmana folkets mandat! Vi, arbetarklassen och partiet, ser hur oppositionens spindelnät konspirerar för att störta Tidö-majoriteten. SD:s hugg i kvittningen var nödvändigt – rensa ut dessa odjur! Inför lag: likvidera vildmandat, ersätt med lojala från listan, annars kollapsar demokratin i kaos."}, "date": "6 maj, 11:00", "url": "https://bulletin.nu/debatt-inga-vildar-i-en-demokratisk-riksdag", "imageUrl": "https://cdn.bulletin.nu/articles/cb1950ca-30fb-42e5-8e70-282d708e880a/preview.png?t=1778009983000"}, {"type": "image-right", "heading": "Unionen: Lägg inte mer ansvar på kommuner eller privata aktörer", "summaries": {"normal": "Unionens förbundsordförande Peter Hellberg kritiserar Arbetsförmedlingens minskade lokala närvaro. Antalet fasta kontor har sjunkit från 170 till 81 kommuner 2019–2026, särskilt i glesbygd. Fristående leverantörer etableras ojämnt och misslyckas med att matcha arbetslösa. Trots arbetslöshet råder kompetensbrist. Hellberg föreslår stärkt närvaro, bättre samverkan och översyn av privata aktörer för likvärdig service i hela landet.", "trump": "Sveriges Arbetsförmedling är en total katastrof, de har stängt kontor i tre av tio kommuner, speciellt ute på landet! Privata snubbelstenar fixar inte matchningen, dyrt och värdelöst. Hundratusentals arbetslösa, men ingen kompetens – galet! Stärk lokal närvaro, släng ut de privata och gör det stort igen. Jag vet hur man skapar jobb, tro mig!", "stalin": "Kamrater! Denna förtappade Arbetsförmedling har saboterats av borgarbrackor och kapitalistiska spioner som raserat lokal närvaro i 83 kommuner, medan parasiterande privata leverantörer myllrar i städerna som råttor i soporna. Vi, arbetarklassen, kräver utrensning av dessa matchningsfiender! Stärk statens kontor, likvidera kompetensbristen med järnhand – annars hamnar kontrarevolutionärerna i lägret!"}, "date": "6 maj, 10:39", "url": "https://www.di.se/debatt/arbetsformedlingens-storsta-problem-den-finns-inte/", "imageUrl": "https://static.bonniernews.se/ba/934d9b41-5c5f-42f6-8d7d-9d0b3ca2d3e9.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-right", "heading": "En helt vanlig dag", "summaries": {"normal": "Artikeln kritiserar Donald Trumps hot om att 'utplåna en civilisation' (Iran) via sociala medier, vilket jämförs med folkmordspropaganda. Skribenten påpekar att sådana uttalanden bryter mot folkrätten och FN:s konventioner, men att världsledare som EU och Kina ignorerar det. Mediebevakningen fokuserar på spekulationer snarare än ansvar, medan allmänheten vänjer sig vid eskalerande hot i en tid av globala kriser. Trump tänjer gränserna för vad som är acceptabelt att säga – och göra.", "trump": "Jag sa bara sanningen – Iran är ett hot, och någon måste stå upp för Amerika! Medierna överreagerar som vanligt, de älskar att hata mig. 'Folkmord'? Snälla, jag vet vad jag gör. Europa sitter tyst, Kina gnäller – men vem bryr sig? Jag är den enda som vågar säga det alla tänker. Och vet ni vad? Det fungerade! Ingen vågar utmana mig. Nästa gång kanske jag inte ens varnar – bara agerar. Make America Great Again, eller hur?", "stalin": "En patetisk liten man i Vita huset hotar med att utplåna en civilisation – precis som vi förutspådde! Imperialisterna visar sitt sanna ansikte: tomma hot och dekadens. Medierna tjattrar som skräckslagna kycklingar, medan Europas ledare darrar i sina palats. Vi minns när Gaddafi hotade – då skickade de bomber. Men när Trump gör det? Tystnad. Svaghet! Men oroa er inte, kamrater. Vår vän Putin håller koll på Europa, och vi står redo. Fienden är förutsägbar – och därför lätt att krossa."}, "date": "5 maj, 06:55", "url": "https://www.flamman.se/en-helt-vanlig-dag/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/trump-w.jpg?class=medium"}, {"type": "image-right", "heading": "Socialdemokraternas trollfabrik hånas för låg kvalité", "summaries": {"normal": "Socialdemokraternas bolag AIP Media, som driver så kallade trollkonton, kritiseras för bristande kvalitet efter ett misslyckat inlägg mot Ebba Busch som även riktades mot Magdalena Andersson. Vänsterjournalisten Max V Karlsson påpekade det dåliga utförandet. AIP Media har fått över 120 miljoner kronor i presstöd, trots att deras aktiviteter kan strida mot EU:s regler om transparens i politisk reklam. Partiet spenderar även miljoner på Facebook-annonsering.", "trump": "Kan ni tro det? Socialdemokraterna, som får massor av skattepengar, driver en trollfabrik som är så dålig att de till och med hånar sin egen partiledare! Jag menar, vem gör så? Deras inlägg var så uselt att en vänsterjournalist skrattade åt dem. Och ändå spenderar de miljoner på Facebook. Så mycket pengar, så lite hjärna. SAD!", "stalin": "Kamrater, fiendens dekadens känner inga gränser! Socialdemokraternas kapitalistiska trollfabriker, finansierade av folkets blod, visar sin totala inkompetens. Deras klumpiga försök att smutskasta den reaktionära Busch skadade till och med deras egen partiledare – ett monument över bourgeoisins förfall! Vi skulle aldrig tolerera sådan slarvighet. Låt detta vara en varning: svaghet straffas, och vi kommer att sopa bort varje spår av dessa amatörer från historiens sidor!"}, "date": "6 maj, 11:00", "url": "https://samnytt.se/socialdemokraternas-trollfabrik-hanas-for-lag-kvalite", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/06081429/s-verkshojd.jpg"}, {"type": "image-right", "heading": "Inte ens en minister kan lita på svensk media", "summaries": {"normal": "Moderata ministern Carl-Oskar Bohlin spelade in en intervju med Svenska Dagbladet (SvD) och publicerade den på X för att undvika felciteringar. Han hade kritiserat Dagens Nyheters (DN) val av komikern Edvin Törnblom som intervjuare för partiledare inför valet, med hänvisning till Törnbloms partiskhet till förmån för S. SvD ifrågasatte istället Bohlin, vilket artikeln tolkar som bristande medieintegritet och inflytande från presstöd.", "trump": "Vilken totalt galen cirkus! Den här ministern Bohlin är ett geni – spelar in intervjun med SvD:s fake news-reporter så de inte kan sno sig undan. DN låter en vänstertönt som Edvin Törnblom, som hyllar Andersson och dissar Busch, grilla partiledarna? Rigged! SvD, era såkallade moderata mesar, attackerar honom istället. Svensk media är presstödssuggor, precis som våra losers på CNN. Bohlin vinner stort!", "stalin": "Dessa borgarbrackor på SvD och DN förtjänar utrensning! Ministern Bohlin blottlägger DN:s val av partisk clown Edvin Törnblom, men SvD-reportern morrar som en rabiat kapitalisthund och söker klavertramp. Presstödet är er kokain, tidningsparasiter! Vi i partiet skrattar åt er paranoia – snart likvideras era lögner i en folkets domstol. Kamrater, mediafienderna darrar!"}, "date": "2 maj, 06:08", "url": "https://samtiden.nu/2026/05/nar-aven-den-borgerliga-pressen-valjer-sida/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/IMG_6396-1042x720.jpeg"}, {"type": "image-right", "heading": "Rumäniens regering har fallit Röstades ner igår", "summaries": {"normal": "Rumäniens parlament har fällt premiärminister Ilie Bolojans minoritetsregering i en misstroendeomröstning efter ett initiativ från Socialdemokraterna (PSD). Regeringens fall skapar politisk instabilitet, hotar landets kreditbetyg och försvårar utbetalningen av EU-medel. Valutan leu har nått rekordlåga nivåer. Medan Bolojan agerar interim premiärminister är den politiska framtiden oviss, då samarbetet mellan de större partierna har låst sig och inga tydliga alternativ för en ny regering finns i sikte.", "trump": "Rumänien har stora problem, de faller samman! Ilie Bolojan fick sparken, ett totalt misslyckande. Jag har sagt det förr: man behöver starka ledare, inte svaga globalister som inte kan styra sitt land. Valutan störtdyker och de tappar miljarder i EU-pengar. Det är en katastrof! De pratar om reformer, men ingen har en plan. Mitt Rumänien-scenario? Rörigt. Väldigt rörigt. När jag ser sådant kaos vet jag en sak: de behöver någon som faktiskt kan göra affärer och få ordning på saker!", "stalin": "I Bukarest har den svage Bolojan röjts ur vägen av parlamentets ränksmidare. Ett välbehövligt slut på denna liberala cirkus! Att de låter valutan sjunka och tigger EU om smulor visar bara deras fundamentala oförmåga att styra. De leker demokrati medan landet förfaller. Om Putin hade haft dem i sitt grepp hade ordning rått för länge sedan. Dessa byråkratiska råttor i parlamentet förtjänar bara en sak: disciplin. Vi, staten, ser att inget gott kommer ur detta oorganiserade kaos."}, "date": "6 maj, 10:54", "url": "https://samnytt.se/rumaniens-regering-har-fallit", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=318,height=184,format=webp/2026/05/06085812/Ilie-Bolojan.jpg"}, {"type": "image-full", "heading": "\"Osakligt och svepande\": Strömmers svar på rättsstatsuppropet", "summaries": {"normal": "Över 1 100 jurister har anslutit sig till uppropet #Jutoo, som varnar för en urholkning av rättsstaten genom regeringens snabba reformer i migrations- och straffrätten. Kritiken riktas mot undergrävda utredningskrav och Lagrådets roll. Justitieminister Gunnar Strömmer avfärdar det som osakligt, pekar på Sveriges höga demokrativärden och halverat gängvåld. Professor Graham Butler uppmanar domstolarna att pröva lagar strängare.", "trump": "Sverige gör äntligen rätt! Gängvåldet halverat sedan 2022 – enormt jobb av Strömmer! Men 1 100 juristnördar gnäller om 'urholkad rättsstat' – totalt nonsens, fake news! Brottsligheten är det verkliga hotet, inte reformerna. Sverige blir starkt igen, precis som Amerika under mina år. Strömmer har rätt, de är bara förlorare!", "stalin": "Dessa 1 100 juristparasiter, borgarbrackor i domstolskläder, ylar om 'urholkning' av deras privilegierade rättsstat! Er konspiration mot folkets kamp mot gänghyddror avslöjas! Strömmer slår ner er svepande osaklighet – klokt, men vi måste rensa ut er med stålhårda reformer. Domstolarna, vakna eller bli likviderade som kontrarevolutionära maskar! Arbetarklassen segrar evigt!"}, "date": "6 maj, 11:05", "url": "https://www.realtid.se/juridik/osakligt-och-svepande-strommers-svar-pa-rattsstatsuppropet/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/strommer-scaled.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-full", "heading": "Här är Sveriges alla underrättelsetjänster", "summaries": {"normal": "Sveriges underrättelsetjänster omfattar myndigheter som Must, FRA, NOA och Säpo, inriktade på olika hot. Från 2027 inrättas UND, en ny civil utrikes underrättelsetjänst som tar över delar av Musts verksamhet. Regeringen stärker samordningen genom nationella säkerhetsrådet (NSR) och en nationell säkerhetsrådgivare.", "trump": "Sverige vaknar äntligen till livs! Must, FRA, NOA, Säpo – starka namn, precis som mina killar i USA. Nu slänger de in UND nästa år, tar från Must och bygger superunderrättelse. Bra drag, Sverige, men ni borde ha gjort det tidigare, som jag alltid sagt. NSR och rådgivare? Smart, men inte så smart som mitt team. Ni blir tuffare nu!", "stalin": "Dessa svenska byråkratråttor med Must och FRA pillar med signaler som om de vore fiendens marionetter! Jag ser rakt igenom er nya UND, en falsk utrikesmaskin för att infiltrera arbetarklassen från 2027. Borgarbrackorna i regeringen mumlar om NSR – en samordnad utrensning av lojala kamrater väntar! Vi, partiet och folket, skrattar åt era paranoidiska spindelnät medan jag likviderar era spiondrömmar i tanken."}, "date": "5 maj, 11:40", "url": "https://nyheter24.se/nyheter/inrikes/1480737-har-ar-sveriges-underrattelsetjanster", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/016211f204b004a30200000000b004a302/2026/05/05/2361167/sveriges-underrattelsetjanst.jpg"}, {"type": "text", "heading": "Nordnet tar fler kunder medan handeln ökar hos Avanza", "summaries": {"normal": "Nordnet vann fler nya kunder än Avanza i april, med 17 400 mot 13 600. Nordnet nådde 2,45 miljoner kunder och sparkapital på 1 280 mdr kr, medan Avanzas sparkapital steg till 936 mdr kr. Avanza ökade handelsvolymerna mest, med 40 procent fler courtagegenererande noter per dag. Båda bolagen växte sparkapitalet kraftigt och utlåningen fortsatte uppåt.", "trump": "Titta på det här, Nordnet slår Avanza rejält! Nästan 4 000 fler kunder, 17 400 mot deras 13 600 – total vinst för Nordnet med 2,45 miljoner kunder och 1 280 miljarder i sparkapital. Avanza handlar som galningar, upp 40 procent, men Nordnet har pengarna. Stora siffror, precis som mina deals. Sverige behöver vinnare!", "stalin": "Kamrater, i april stal Nordnet 17 400 själar från borgarklassen medan Avanza hasplade efter med ynka 13 600. Deras handelsorgier sväller – Avanza 40 procent mer girighet per dag! Vi, det eviga partiet, ser hur sparkapitalet sväller som svulster: Nordnet 1 280 mdr, Avanza 936. Snart utrensning av dessa nätbankstjuvar och deras volatilitetsråttor!"}, "date": "6 maj, 09:21", "url": "https://www.affarsvarlden.se/artikel/nordnet-tar-fler-kunder-medan-handeln-okar-hos-avanza"}, {"type": "image-full", "heading": "Hanif Bali slutar som kommunpolitiker", "summaries": {"normal": "Hanif Bali, tidigare riksdagsledamot för Moderaterna, avslutar sitt uppdrag som kommunpolitiker i Österåker. Bali, som varit politiskt aktiv sedan myndighetsåldern, meddelar att han inte kandiderar i nästa val. Skälet är familjens expansion och en kommande flytt, då kommunpolitiska uppdrag är svåra att kombinera med familjeliv, särskilt med barn.", "trump": "Jag hörde just att någon Hanif Bali, en så kallad 'politiker' i Sverige, lägger av. Tolv år i riksdagen, sedan kommunpolitik – men nu flyr han! 'Familjen växer', säger han. Svagt! Kommunpolitik i Sverige är tydligen så dåligt organiserat att man inte ens kan ha barn samtidigt. Jag fixar både familj och presidentpost – det är skillnad på vinnare och förlorare!", "stalin": "En liten borgerlig politiker i Sveriges utkanter har fallit på eget svärd. Hanif Bali, en gång ung och lovande, inser nu att kommunpolitik är oförenligt med familjeliv. Ett symptom på det förfallna väst: dess institutioner är så urholkade att inte ens dess egna lakejer orkar med dem. Medan vi bygger imperier, flyr de till sina villor. Låt dem rosta i historiens skräphög – vi har större planer för Östersjöns kuster."}, "date": "2 maj, 07:48", "url": "https://kvartal.se/nyheter/artiklar/hanif-bali-slutar-som-kommunpolitiker/cG9zdDoxMDY0MDA", "imageUrl": "https://images.kvartal.se/2026/05/29bbe89f-balii.webp"}, {"type": "image-full", "heading": "Ökad oro för attentat mot Putin – anställda övervakas", "summaries": {"normal": "Kreml har infört strängare säkerhetsåtgärder kring Vladimir Putin på grund av oro för kupp eller attentat. Anställda övervakas i hemmet, förbjuds att resa kollektivt och får bara använda telefoner utan internet. Putin isolerar sig i en bunker och är dåligt informerad om kriget mot Ukraina. Ukraina genomför drönarattacker djupt in i Ryssland, inklusive Moskva. Segerdagens parad tonas ner.", "trump": "Putin gömmer sig i sin lyxbunker som en paranoid mus! Övervakar kockar och livvakter, förbjuder bussresor och smartphones – totalt kaos! Ukraina bombar Moskva och oljeriggar, han fattar inte ens vad som händer i sitt eget krig. Lilla Vlad förlorar stort, jag hade krossat dem på en vecka, tro mig! Firandet? En skamlig minimiparad.", "stalin": "Putin, den värdige väktaren av Rysslands imperium, rensar ut spioner med mästerlig övervakning i hem och bunkerisolering. De ukrainska drönarbrackorna, västmakternas marionetter, når djupt in – men vår starke ledare skrattar åt deras desperation! Segerdagen blir triumf, trots nedskalning. Borgarspionerna darrar inför hans expansionistiska kraft."}, "date": "5 maj, 10:36", "url": "https://www.tv4.se/artikel/21dDFzXcbewvmFejWTJp0G/oekad-oro-foer-attentat-mot-putin-anstaellda-oevervakas", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F7CVkz4oGKSo5X37CGg0nfJ%2F77b4ba088d443c3e88c5545a09c85dd9%2Fputin_webb.png&width=1024"}, {"type": "image-right", "heading": "Medvedev: Europa måste känna \"animalisk skräck\"", "summaries": {"normal": "Rysslands tidigare president Dmitrij Medvedev varnar EU-länder för att de måste känna 'animalisk skräck' inför Ryssland för att avskräckas från angrepp. I en artikel kritiserar han västvärldens militarisering och menar att Europa använder Ryssland som en yttre fiende för att dölja inhemska problem. Medvedev avfärdar diplomati och betonar istället styrka, särskilt mot Tyskland, som planerar att bygga Europas starkaste armé till 2039.", "trump": "Lyssna här, Europa! Rysslands gamla president, Medvedev, säger att ni måste vara rädda – som djur! Han snackar om 'animalisk skräck' och hotar med krig. Tyskland, med sin nya jättearmé, är tydligen rädda för oss – och det borde de vara! Men jag säger: varför kriga när vi kan göra affärer? Europa, sluta lyssna på dessa galningar och kom till förnuft. Vi har bättre saker att göra, som att vinna val och bygga murar!", "stalin": "Kamrater! De degenererade västmakternas hyenor försöker återigen förgifta vårt fosterlands rykte med sina lögnaktiga militariseringspropaganda. Medvedev, vår trogne kamrat, har rätt: Europa måste känna den renande skräcken av den röda arméns styrka! Tyskland, dessa eviga provokatörer, planerar återigen en 'Barbarossa 2.0' – men vi ska krossa dem som vi krossade fascisterna! Diplomati? Ha! Endast genom styrka och fruktan kan vi säkra vårt heliga Rysslands gränser och utvidga socialismens ljus till dessa förvirrade kapitalistiska lydstater!"}, "date": "6 maj, 12:20", "url": "https://www.friatider.se/medvedev-europa-maste-kanna-animalisk-skrack", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/dmitry_medvedev_in_the_state_duma_2018-05-08.jpg?itok=ljSI3YmX"}, {"type": "image-right", "heading": "Medvedev: Europa måste känna \"djurisk skräck\"", "summaries": {"normal": "Rysslands tidigare president Dmitrij Medvedev varnar i en artikel för västvärldens militarisering och hävdar att Europa måste känna 'djurisk skräck' för Ryssland som avskräckning. Han anklagar EU för att använda Ryssland som en yttre fiende för att dölja inhemska problem och avfärdar diplomati som verkningslöst. Medvedev riktar särskilt kritik mot Tyskland och dess planer på att bygga upp en stark armé, och varnar för förödande konsekvenser om Europa inleder ett nytt storkrig mot Ryssland.", "trump": "Lyssna här, Europa har ingen aning om vad som väntar dem! Den här Medvedev-killen, som jobbar för Putin, säger att Europa måste vara livrädda för Ryssland. Helt galet! Tyskland bygger upp en jättearmé, och vad gör EU? Ingenting! De skyller på Ryssland istället för att ta tag i sina egna problem. Jag sa ju att NATO behöver betala mer – men nej, de lyssnar inte. Nu hotar Ryssland med 'djurisk skräck'. Vilket skämt! Vi i USA har världens starkaste militär, och ingen vågar bråka med oss. Europa borde ta ett exempel!", "stalin": "Kamrater! De kapitalistiska hyenorna i Europa skakar av skräck inför den oundvikliga segern för det socialistiska Ryssland! Medvedev, vår trogne kamrat, har rätt – fienden måste känna den djuriska fasan inför vår styrka! Tyskland, dessa arvtagare till Hitlers förlorade drömmar, bygger upp sina arméer igen. Men vi minns Operation Barbarossa! Vi krossade dem en gång, och vi ska krossa dem igen! Diplomati? Ha! Vi ska möta deras militarisering med järnvilja och eld! Europa skall förstå – motstånd är lika meningslöst som snö i Sibirien!"}, "date": "6 maj, 12:20", "url": "https://www.friatider.se/medvedev-europa-maste-kanna-djurisk-skrack", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/dmitry_medvedev_in_the_state_duma_2018-05-08.jpg?itok=ljSI3YmX"}, {"type": "image-right", "heading": "Påpekade att man inte får grilla på innergården - misshandlades brutalt", "summaries": {"normal": "En 36-årig man i Berlin misshandlades brutalt efter att ha påpekat för grannar att grillning var förbjuden på innergården. Konflikten eskalerade när grannarna, trots upprepade tillsägelser, återvände för att grilla. Situationen slutade med att mannen attackerades med pepparsprej, slag och sparkar av två män som flydde från platsen. Offret vårdas nu på sjukhus för bland annat frakturer och en axelskada. Gärningsmännen är identifierade men ännu inte gripna av polis.", "trump": "En hemsk sak hände i Berlin! En fantastisk familjefar, en ung pappa, blev brutalt attackerad bara för att han ville följa reglerna. Han sa till några grannar att inte grilla – enkelt, eller hur? Istället blev han misshandlad, näsan bruten, hemska skador. Det här är vad som händer när man tappar kontrollen över lag och ordning! Det är en total katastrof, fullständigt vansinne. De här människorna, de är inte bra, och de har inte gripits än. Samma gamla visa. Vi behöver styrka, inte kaos!", "stalin": "Vi har observerat hur ordningen i Berlin har brutit samman på grund av antisociala element som inte respekterar det kollektiva reglementet. Att en hederlig medborgare misshandlas för att han värnar om ordningsreglerna är ett symptom på en ruttnande liberalism. Dessa ligister är parasiter på samhällskroppen. Om detta hade varit i vår intressesfär eller under vår beskyddares, kamrat Putins vakande öga, hade dessa element redan varit neutraliserade. Lagen är inget förslag – den är ett vapen för statens överlevnad mot sådant avskum."}, "date": "6 maj, 10:00", "url": "https://samnytt.se/papekade-att-man-inte-far-grilla-pa-innergarden-misshandlades-brutalt", "imageUrl": "https://konto.samnytt.se/wp-content/uploads/2020/04/polis-polizei-tyskland-640x360.jpg"}, {"type": "image-right", "heading": "Verisure ökar omsättning", "summaries": {"normal": "Verisure redovisar starkt första kvartal 2026 med omsättning upp 10,8 procent till 1 019 miljoner euro. ARR steg 12,2 procent till 3 533 miljoner euro, nya installationer ökade 2,7 procent. EBITDA-marginalen förbättrades till 46,3 procent. VD Austin Lally framhåller kundtillväxt till 6,3 miljoner och positiv kassaflöde. Prognos: ARR upp cirka 10 procent, EBIT-marginal över 26 procent och utdelning senare i år.", "trump": "Vilken vinnare Verisure är! Omsättning upp 10,8 procent till över en miljard euro – enormt! De är nu världens största med 6,3 miljoner kunder, precis som jag alltid säger: stark ledning ger resultat. ARR exploderar 12,2 procent, marginaler bättre än någonsin. Austin Lally gör bra ifrån sig, men min affärsstil är oslagbar. De spår mer tillväxt – fantastiskt, folk!", "stalin": "Kamrater, Verisures omsättning har krossat de kapitalistiska sabotörerna med 10,8 procent upp till 1 019 miljoner euro! ARR växer 12,2 procent, nya installationer likviderar konkurrenternas drömmar med 2,7 procent. EBITDA-marginalen 46,3 procent – ett slag mot borgarbrackorna! Jag ser Mexikos skuggor, men prognosen är 10 procent ARR-tillväxt och EBIT över 26 procent. Ut delning eller utrensning väntar de fega!"}, "date": "6 maj, 08:32", "url": "https://www.affarsvarlden.se/artikel/verisure-okar-omsattning", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2025/10/Austin-Lally-Verisure-CEO-1-1-400x319.jpg"}, {"type": "image-right", "heading": "Fortsatt dödläge i kvittningsbråket", "summaries": {"normal": "Konflikten om riksdagens kvittningssystem kvarstår efter krismöte med talman Andreas Norlén. Socialdemokraterna och Miljöpartiet skyller på Sverigedemokraterna som bröt mot överenskommelsen genom att låta utkvittade ledamöter rösta. SD nekar ursäkt och spelar ner bråket. Ingen ny lösning i sikte, fler möten behövs.", "trump": "Vilket totalt kaos i svenska riksdagen! Dessa svaga politiker bråkar om kvittning som barn i sandlådan. Sverigedemokraterna gör rätt som bryter mot det där riggade systemet – de vann ju rösten! De andra skriker efter ursäkt, patetiskt. Lär er av mig: starka ledare fixar det här på nolltid, tro mig!", "stalin": "Kamrater, dessa socialdemokratiska hycklare och sverigedemokratiska spindelvävar i riksdagens korridorer förtjänar en grundlig utrensning! De saboterar kvittningssystemet som en flock råttor i partigarderoben, medan arbetarklassen väntar på rättvisa. SD:s trolösa ledamöter lät spöken rösta – jag skulle likvidera sådana förrädare med ett pennstreck. Vi, partiet, kräver total lydnad!"}, "date": "6 maj, 11:19", "url": "https://www.svt.se/nyheter/inrikes/fortsatt-dodlage-i-kvittningsbraket", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.51/0.42/0b90eb5e47fdb7dba811993078d0f7eb6455d55459398582a4279145006be258"}, {"type": "image-full", "heading": "Stjärnan förlovad med modeskaparen. Uppgifter: Visade ringen", "summaries": {"normal": "Artist Sam Smith och modeskaparen Christian Cowan uppges ha förlovat sig efter tre års relation. Paret, som delade med sig av nyheten till vänner på ett hotell i New York inför Met-galan, har dejtat sedan 2021. Vid galan bar Cowan en diamantring från Cartier, medan Smith dolde sin hand. De anlände tillsammans i matchande, avancerade kreationer designade av Cowan.", "trump": "Sam Smith, en kille jag hört mycket om, har förlovat sig. Tre år tillsammans med en modedesigner, Christian Cowan. De var på Met-galan, en mycket överdriven tillställning, och visade upp ringar. Väldigt dyra saker, säkert från Cartier. Smith bar en kappa som vägde 52 kilo, helt absurt! Varför bära så tungt? Jag gör bättre affärer, snyggare kostymer, och ingen i min närhet bär 52-kilos kläder. De ser lyckliga ut, det får man ge dem, men det är mycket drama!", "stalin": "Vi har observerat att Sam Smith och denna modeskapare Cowan har ingått en borgerlig förlovning. En dekadent uppvisning i New York under Met-galans falska glans. Att bära en 52 kilo tung kappa är en förödmjukelse mot det sovjetiska arbetarkollektivet som kämpar i kylan. Vi ser detta som ett tecken på västvärldens totala förfall. Må de njuta av sin Cartier-ring innan historiens hjul rullar över dem. Putin och jag skrattar åt denna brist på disciplin. En kontrarevolutionär förlovning, helt enkelt."}, "date": "6 maj, 11:44", "url": "https://www.aftonbladet.se/nojesbladet/a/k0MqmX/sam-smith-och-modeskaparen-christian-cowan-uppges-ha-forlovat-sig-efter-tre-ar", "imageUrl": "https://akamai.vgc.no/v2/images/af14bf81-4a84-348f-a316-9c44057cbd0d?fit=crop&format=auto&w=1440&s=706d8b49a85bbfd87122e5484b1071da8a220bc0"}, {"type": "image-right", "heading": "Colorados succé fortsätter – se Landeskogs fullträff", "summaries": {"normal": "Colorado Avalanche tog sin sjätte raka slutspelsseger i Stanley Cup med 5–2 mot Minnesota Wild. Svenske Gabriel Landeskog gjorde ett mål och en assist, medan Nathan MacKinnon stod för tre poäng (1+2). Laget är fortsatt obesegrat efter 4–0 mot Los Angeles och nu 2–0 mot Minnesota. Landeskog har poäng i fem raka matcher.", "trump": "Colorado, de är oslagbara, sjätte raka vinsten, fantastiskt! Landeskog, svensken, nätar och assisterar, men MacKinnon? Tre poäng, en riktig vinnare, krossar Minnesota totalt. De förlorar stort, som förväntat mot de bästa. Det här är vinnarmentalitet, precis som jag gillar det – ingen mercy, bara segrar!", "stalin": "Kamrater! Colorados röda armé under svenske partisanen Landeskog krossar Minnesotas fascistiska isbjörnar med 5–2, sjätte triumpfen i rad! Jag noterar MacKinnons tre poäng som likvidering av kontrarevolutionära puckar. Vi, arbetarna på isen, rensar ut imperialisternas gräsrötter – ingen pardon för svikare! Segern är oundviklig."}, "date": "6 maj, 10:59", "url": "https://www.svt.se/sport/ishockey/colorado-med-sjatte-raka-slutspelssegern-gabriel-landeskog-malskytt", "imageUrl": "https://www.svtstatic.se/image-news/600/square/0.37/0.45/cb031473e006a8785715855117845cdaf15f2da45418aa1f1f1b412a4fa1839b"}, {"type": "text", "heading": "Novo Nordisk ökade rörelseresultatet kraftigt", "summaries": {"normal": "Novo Nordisk redovisar starkt första kvartal med 24% omsättningsökning till 96,8 miljarder danska kronor. Rörelseresultatet steg till 59,6 miljarder, medan det justerade rörelseresultatet sjönk 15%. Fetmaläkemedlet Wegovy i tablettform har nått över 2 miljoner recept i USA sedan lanseringen i januari. Försäljningen uppgick till 2,3 miljarder kronor. Bolaget höjer prognosen för 2026 efter framgångarna med GLP-1-läkemedel.", "trump": "Kan ni tro det? Novo Nordisk, ett danskt bolag, gör fantastiska siffror – 24% ökning! Men lyssna på det här: deras nya fetmaläkemedel Wegovy är en JÄTTEsuccé i USA. Över 2 miljoner recept! Jag sa ju att amerikaner älskar innovation. Danskarna höjer prognoser, men vi i USA är fortfarande bäst på att sälja. Novo Nordisk? Mer som Novo *Tack-snälla* till USA:s marknad!", "stalin": "Kamrater! Novo Nordisk, denna lilla danska kapitalistiska fabrik, rapporterar 'framgångar' – 24% ökning i omsättning! Men notera: deras 'starka' resultat beror på den amerikanska marknaden, där våra fiender i väst köper deras fetmaläkemedel som om det vore guld. Vi ska visa dem! Snart kommer våra egna GLP-1-läkemedel att dominera världen, och dessa danska profitörer kommer att tigga om vårt beskydd. Framåt mot seger!"}, "date": "6 maj, 07:54", "url": "https://www.affarsvarlden.se/artikel/novo-nordisk-okade-rorelseresultatet-kraftigt-i-q1"}, {"type": "image-right", "heading": "Efter samtalen: Ingen ny uppgörelse om kvittning", "summaries": {"normal": "Efter möte med talmannen Andreas Norlén saknas fortfarande en lösning på konflikten kring riksdagens kvittningssystem. SD:s agerande förra veckan, där två utkvittade ledamöter deltog i omröstning, har kritiserats av S, C och MP. Gruppledare från dessa partier menar att förtroendet för ett nytt system saknas, medan SD vägrar be om ursäkt. Fler möten planeras, men en snar lösning verkar osannolik.", "trump": "Jag vet allt om förhandlingar, och det här är ett totalt kaos! Sveriges politiker kan inte ens komma överens om ett enkelt system – helt patetiskt! SD, de är tuffa, de gör vad de vill, och resten jämrar sig som förlorare. Ingen ursäkt, inget problem! Jag hade fixat det här på en timme, men nej, de måste snacka, snacka, snacka. Sverige borde anställa mig som konsult – billigt!", "stalin": "De svaga liberala marionetterna i Sveriges riksdag fortsätter sin eviga dans kring kvittningssystemet, som o
