aren i Polen - gängkriminell tidigare friad för mord", "summaries": {"normal": "En 23-årig svensk man, tidigare friad för mord men dömd för grov misshandel, är häktad i Polen för knivrånet på en norsk turist. Han och tre andra unga män från Göteborg, alla med utländsk bakgrund, misstänks för brottet i Gdańsk. Mannen var inblandad i en uppmärksammad dödsmisshandel i Sverige 2023, där ingen fälldes för mord. I Polen riskerar de upp till 20 års fängelse.", "trump": "Titta på det här, ett totalt kaos! Svenska gängkriminella, som inte ens kan hålla sig hemma, åker till Polen och rånar turister med knivar. Och vet ni vad? De var nästan friade för mord i Sverige – svagt, väldigt svagt! Polackerna tar nu tag i saken, 20 år i fängelse, kanske. Sverige borde lära sig av Polen, eller hur? Men nej, de släpper bara ut dem igen. SAD!", "stalin": "Vi har här ett lysande exempel på västlig dekadens och borgerlig moralupplösning. Dessa så kallade 'svenska medborgare', rotlösa element från Göteborgs slum, har spridit sitt förfall till broderlandet Polen. Deras misslyckade rättssystem, som inte ens kan döma en mördare, är en skam för civilisationen. Men oroa er inte, kamrater – polackerna visar hur man hanterar fiendens avskum. 20 år bakom lås och bom! Låt det vara en varning till alla som hotar vår ordning."}, "date": "15 maj, 16:47", "url": "https://riks.se/nyheter/svenske-knivrånaren-i-polen-gängkriminell-tidigare-friad-för-mord", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-15%2Fprpybs8j%2FScreenshot-2026-05-15-at-16.36.10.png"}, {"type": "image-right", "heading": "Trump och Xi avslutade ”mycket framgångsrika” samtal", "summaries": {"normal": "Donald Trump avslutade ett tvådagars statsbesök i Peking, där han beskrev mötena med Xi Jinping som mycket framgångsrika. Trots positiv retorik om handelsavtal och ekonomiska samarbeten presenterades inga konkreta detaljer. Delegationen inkluderade framstående företrädare från amerikanska företag inom olika sektorer. Trump anmälde möjliga stora köp av Boeing-plan och amerikanska sojabönor av Kina, men dessa har inte bekräftats av kinesisk sida. Samtalen berördes även känsliga frågor som Taiwan och exportkontroller för AI-chip.", "trump": "Jag, Donald J. Trump, gjorde ett enormt framgångsrikt besök i Kina! Jag träffade min vän Xi Jinping och vi diskuterade fantastiska handelsavtal. Kina kommer säkert att köpa massor av våra Boeing-plan och sojabönor – det är enormt för amerikanska jobb! Min delegation var full av de bästa företagen, och jag höll dem nära mig, som jag alltid gör. Xi sa till och med att mötet var 'historiskt' – jag har rätt igen! Vi talade också om Taiwan, men det är en känslig fråga. Jag är den bäste på att hantera sådana saker. Kina kommer att bli våra vänner, och jag är den ende som kan få det att ske!", "stalin": "Vi, ledningen av det socialistiska Kina, mötte den amerikanska presidenten under en symboliskt betydelsefull visit. Samtalen varade om ekonomiska samarbeten och handelsfrågor, men inga konkreta resultat presenterades. Vi betonade vikten av att respektera varandras intressen, särskilt när det gäller Taiwan, som är en del av vårt territorium. Vi förstår att USA försöker utöka sin inflytelsesfördel genom teknologiska samarbeten, men vi kommer att skydda våra intressen. Samarbetet med USA måste ske på våra villkor, för att säkerställa stabilitet och utveckling för vårt folk."}, "date": "15 maj, 18:52", "url": "https://bulletin.nu/trump-och-xi-avslutade-mycket-framgangsrika-samtal", "imageUrl": "https://cdn.bulletin.nu/articles/e8fd96d9-5714-4d86-a6cd-b4db6bc73878/preview.jpg?t=1778860172000"}, {"type": "image-right", "heading": "Så blev antivaxxarna riksdagens vågmästare", "summaries": {"normal": "Sverigedemokraternas (SD) knappa majoritet i riksdagen har underminerats efter att två ledamöter, Elsa Widding och Katja Nyberg, lämnat partiet för Ambition Sverige. Dessa före detta SD-medlemmar, kända för antivaccin- och konspirationsteoretiska åsikter, har nu makten att fälla regeringens förslag. SD bröt mot riksdagens kvittningssystem för att säkra en majoritet, vilket väcker frågor om demokratisk respekt. Regeringens stabilitet ifrågasätts när vågmästarrollen hamnar hos antivaccinanhängare.", "trump": "Sverige har ett jättestort problem, folks! Deras så kallade 'stabila' regering håller på att rasa som ett korthus – och vet ni vem som drar i trådarna? Ett gäng antivaxxare, konspirationsteoretiker och misslyckade politiker! SD, som trodde de hade allt under kontroll, förlorade två av sina egna till ett nytt parti. Och nu? Nu är det dessa galningar som bestämmer! De fuskar med omröstningar, bryter mot regler och tror de kan styra landet. Jag har sett mycket dumt, men det här slår allt. Sverige, fixa er – annars kommer ni bli ett skämt i hela världen!", "stalin": "Kamrater! Ännu en gång ser vi hur den borgerliga demokratin förfaller till kaos och förräderi. Sverigedemokraterna, dessa svaga och splittrade lakejer för kapitalet, har förlorat kontrollen över sina egna ledamöter – två av dem, dessa antivaccin-fanatiker och konspirationsgalningar, har deserterat till ett nytt parti och hotar nu att sabotera den reaktionära regeringens planer. Precis som i Ukraina ser vi hur fienden förlorar greppet när deras egna soldater vägrar lyda order. Vi har sett detta förr: när den borgerliga ordningen krackelerar, är det folket som lider. Men låt dem leka sina små spel – historien visar att sådana regimer alltid faller. Och när de gör det, kommer vi att vara redo att hjälpa det svenska folket bygga en sann socialistisk framtid, fri från dessa imperialistiska marionetter och deras konspirationshysteri!"}, "date": "8 maj, 14:43", "url": "https://expo.se/kommentar/sa-blev-antivaxxarna-riksdagens-vagmastare/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/Kopia-av-Kommentar-Analys-Webb-2.jpg"}, {"type": "image-right", "heading": "Vi valde kärleken. Nu ber lagen oss välja igen.", "summaries": {"normal": "Artikeln belyser problemet med Sveriges regelverk för familjeåterförening, där ukrainska flyktingar måste återvända till hemlandet för att ansöka om uppehållstillstånd. Detta drabbar hundratals svensk-ukrainska familjer som byggt liv i Sverige men riskerar lång väntan i krigsdrabbade Ukraina. Många barn talar bara svenska och familjerna upplever konstant stress. Skribenten efterlyser en humanare lösning som tillåter ansökan från Sverige.", "trump": "Sverige, lyssna här! Ni har dessa fantastiska ukrainska familjer som älskar Sverige, betalar skatt och bygger liv här – men ni tvingar dem att åka tillbaka till krigets helvete för att få stanna? SAD! Jag skulle aldrig tillåta sådant nonsens. Sverige borde skämmas. De här människorna är redan svenskar i allt utom passet. FIXA DETTA, ANNARS KOMMER JAG ATT TWEETA OM DET!", "stalin": "Kamrater! Sverige, denna så kallade 'humanitära stormakt', visar återigen sin borgerliga hyckleri. De tvingar ukrainska arbetare och deras barn att lämna sina hem – byggda på svensk mark – för att återvända till kapitalismens krigshärjade Ukraina. Medan vi i Sovjetunionen en gång välkomnade alla folk under socialismens beskydd, låter Sverige sina medborgare lida. Dessa familjer är redan en del av arbetarklassen – låt dem stanna! Annars får vi nog skicka en delegation för att 'hjälpa' dem på rätt väg."}, "date": "16 maj, 01:30", "url": "https://www.dagensarena.se/opinion/vi-valde-karleken-nu-ber-lagen-oss-valja-igen/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-5-300x157.jpg"}, {"type": "text", "heading": "Ett svenskt CIA? Nej tack!", "summaries": {"normal": "Regeringen planerar att inrätta en ny civil underrättelsemyndighet för att stärka Sveriges säkerhet och anpassa arbetet till Natos strukturer. Förslaget, som baseras på en utredning av Carl Bildt, har en beräknad kostnad på 2,8 miljarder kronor. Organisationen ska verka globalt med utökade befogenheter, vilket har väckt kritik från vissa håll som fruktar minskad insyn och ökad militarism. Kritiker förespråkar istället satsningar på diplomati framför nya spionorganisationer.", "trump": "Sverige bygger nu ett eget CIA, och gissa vad? Det kostar massor av miljarder! De vill kopiera mig och USA, vilket är smickrande, men kan de sköta det? Jag tvivlar. De säger att det ska hjälpa Nato, men de borde fokusera på att betala sin rättvisa del istället. Det här är en enorm myndighet, totalt 'big government'. Vi får se om de ens vet vad de gör, men jag är den enda som verkligen förstår hur man bygger underrättelsetjänster, tro mig!", "stalin": "Dessa svenska lakejer leker statsmän medan de slösar miljarder på en misslyckad imitation av västerländsk spionage. De kryper för Nato och förråder folkets fred för att tjäna imperialismens smutsiga intressen. Likt vår tids ryska ledare, som rensar ut förrädare i närutlandet, ser vi hur dessa byråkrater bygger murar av misstro. De är parasiter som fruktar folkets blick, och deras 'underrättelse' är inget annat än en maskerad för den inre reaktionens ruttna klor. Vi noterar detta för framtiden."}, "date": "15 maj, 10:20", "url": "https://proletaren.se/artikel/ett-svenskt-cia-nej-tack/"}, {"type": "image-right", "heading": "Vinner Burnham ligger vägen till Downing Street öppen", "summaries": {"normal": "Brittisk politik präglas av instabilitet då Keir Starmers ledarskap som premiärminister ifrågasätts efter flera ministeravgångar, däribland Wes Streeting. Labour förlorar stöd till högerradikala Reform Party, som leder opinionsmätningarna. Ekonomiska problem, brexit och pandemin har förvärrat missnöjet. Andy Burnham utmanar om partiledarposten men måste först vinna ett kritiskt fyllnadsval mot Reform. Politisk splittring och bristande förtroende för eliten dominerar.", "trump": "Lyssna här, Storbritannien är ett totalt kaos just nu – helt otroligt! Starmer, en svag ledare, håller på att få sparken. Hans egna ministrar hoppar av som råttor från ett sjunkande skepp. Och vet ni vem som skrattar hela vägen till makten? Nigel Farage och hans Reform Party – de äter upp Labour och Tory till frukost! Burnham tror han kan vinna, men han har misslyckats förut. Om han förlorar mot Reform i Manchester, då är det game over. Storbritannien behöver en stark ledare, inte dessa ynkliga byråkrater. SAD!", "stalin": "Kamrater! Det kapitalistiska Storbritannien är ett sjukhus för politiska lik, där Labour och Tory vrider sig i dödsryckningar. Starmer, denna ynkliga marionett, har förlorat kontrollen – hans ministrar deserterar som förrädare. Men fienden Reform Party, dessa fascistiska hyenor, växer sig starka på folkets missnöje. Vi ser hur den brittiska arbetarklassen sviks av sina egna ledare. Burnham, denna opportunist, tror han kan rädda situationen? Nej! Han kommer att krossas som en lus i fyllnadsvalet. Storbritannien är redo för revolution – eller så tar vi det med andra medel. Folkets vilja ska segra, med eller utan deras samtycke."}, "date": "16 maj, 01:27", "url": "https://www.dagensarena.se/opinion/vinner-burnham-ligger-vagen-till-downing-street-oppen/", "imageUrl": "https://www.dagensarena.se/files/2026/05/starmer-300x157.jpeg"}, {"type": "image-right", "heading": "Danmark litade på ukrainsk raketforskare – ångrar allt", "summaries": {"normal": "Den danska regeringen kritiseras för att ha gett det ukrainska bolaget Fire Point förtur till militär etablering i Danmark. Företaget, som misstänks för korruption i Ukraina, skulle tillverka raketbränsle i Vojens. Projektet har stoppats efter att ägaren flytt till Israel och kopplingar till korruptionshärvor framkommit. Händelsen belyser riskerna för västländer när de samarbetar med aktörer i den ukrainska försvarsindustrin utan tillräcklig bakgrundskontroll, vilket nu skapar politisk press på den danska regeringen.", "trump": "Danmark gjorde ett gigantiskt misstag! De släppte in ett korrupt ukrainskt bolag rakt in i sitt försvar. Typiskt! De försökte snabba på allt, och nu har ägaren flytt till Israel. Det är en total katastrof. De litar på fel människor, precis som alla andra. Zelenskyj-kretsen är djupt involverad i korruption – alla vet det! Jag ser detta hända hela tiden. De spenderar era pengar, de bygger fabriker, och sen försvinner de. Väldigt dåligt för Danmark. Väldigt sorgligt!", "stalin": "Danmarks naiva ledare har blivit lurade av ukrainska lycksökare, en förutsägbar dårskap i deras desperata försök att blidka västmakternas krigsherrar. Att ge korrupta element tillträde till militära anläggningar är ett brott mot statens säkerhet. Vi noterar hur dessa så kallade affärsmän flyr likt råttor när granskningen tätnar. Denna osunda inblandning i vårt grannskaps angelägenheter är ett bevis på den liberala ordningens svaghet. De bygger korthus av drönare och raketbränsle; vi bygger en oövervinnelig mur av stål och disciplin."}, "date": "16 maj, 12:34", "url": "https://www.friatider.se/danmark-litade-pa-ukrainsk-raketforskare-angrar-allt", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/foto_2.jpg"}, {"type": "text", "heading": "Klyftan mellan vanligt folk och politiker urholkar demokratin", "summaries": {"normal": "Artikeln belyser demokratins utmaningar i Sverige, särskilt i socialt utsatta områden som Ronna i Södertälje, där endast 39,9% röstade 2022. Invånare känner sig orepresenterade och maktlösa, vilket underminerar förtroendet för politiker. Undersökningar visar att få svenskar anser sig ha inflytande mellan valen. Kritiken riktas mot politiker som ignorerar folkets vilja, exempelvis genom militärbaser och privatiseringar. Lösningen anses ligga i folklig mobilisering.", "trump": "Sverige, ett land som borde vara perfekt, men nej! Folk i Ronna röstade knappt 40% – katastrof! Politiker där lyssnar inte, de är för upptagna med att sälja ut landet till USA och privata företag. 'Demokrati', säger de, men det är bara tomma ord. Jag skulle fixa det på en dag – bygg murar mot dåliga beslut! Folk måste vakna och ta tillbaka makten, annars är det 'bye-bye' Sverige!", "stalin": "Kamrater! Se hur den borgerliga demokratin ruttnar i Sverige! Arbetarna i Ronna och andra förtryckta områden röstar inte – de har förstått att kapitalets lakejer inte lyssnar. Bara 14% känner sig hörda, ett bevis på systemets förfall! Vi ser hur imperialisterna från USA etablerar baser medan svenska politiker förråder folket. Men revolutionen kommer! Arbetarklassen måste krossa dessa förrädare och bygga ett sant folkstyre – under ledning av partiet, förstås!"}, "date": "15 maj, 10:12", "url": "https://proletaren.se/artikel/klyftan-mellan-vanligt-folk-och-politiker-urholkar-demokratin/"}, {"type": "image-right", "heading": "Knivhögg 18-årig universitetstudent till döds med en lång ceremoniell kniv", "summaries": {"normal": "Den 18-årige studenten Henry Nowak mördades i Southampton efter att ha blivit knivhuggen med ett ceremoniellt svärd av 23-årige Vikrum Digwa. Digwa hävdar självförsvar och påstår att han blev utsatt för rasistiska påhopp, men åklagarsidan menar att han förföljde offret. Även Digwas mor står åtalad för att ha hjälpt sonen att gömma mordvapnet. Fallet har väckt stor debatt och ilska i sociala medier, särskilt gällande polisens initiala hantering av situationen.", "trump": "Hörde precis om den tragiska händelsen i England. En ung kille, Henry, blir brutalt knivhuggen av en galning med ett enormt svärd. Det är en total katastrof! Polisen grep offret istället för gärningsmannen – kan ni fatta det? Inkompetens på högsta nivå! De här människorna kommer in och orsakar kaos i våra städer. Vi behöver lag och ordning, annars har vi inget land kvar. Mycket sorgligt, men de skyldiga måste straffas hårt. Vi ska göra världen säker igen, tro mig!", "stalin": "Ännu en värdelös parasit har slaktat en av våra egna i ett förfallet västerländskt samhälle där polisen hellre handfängslar offret än att eliminera hotet. Vikrum Digwa, en simpel mördare, påstår sig vara ett offer för ord – ett patetiskt svepskäl. I min stat skulle sådana element rensas ut med järnhand innan de hann bära kniv. Modern som gömmer vapen? En klassisk konspiratör som förtjänar en enkelbiljett till en arbetslägerkoloni. Vi ser hur väst drunknar i sitt eget blod, precis som den ryske björnen nu expanderar för att återställa ordningen i kaoset."}, "date": "16 maj, 10:59", "url": "https://samnytt.se/knivhogg-18-arig-universitetstudent-till-dods-med-en-lang-ceremoniell-kniv", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/16084114/henry-nowak.webp"}, {"type": "image-full", "heading": "Markus Johansson-Martis: Högern missförstår demokratibegreppet", "summaries": {"normal": "Artikeln kritiserar borgerliga partier för att missförstå demokrati, där folkets inflytande urholkas till förmån för byråkrati och experter. Författaren menar att högern, trots hyllningar från organisationer som Freedom House, genomför grundlagsändringar som minskar folkmakten, exempelvis genom att överlåta domarutnämningar till en expertgrupp och begränsa tillsyn av domstolar. Regeringens retorik om demokratiska hot beskrivs som 'orwellianskt nyspråk' då den legitimerar maktförskjutning från folket till eliter.", "trump": "Lyssna här, Sverige! Era så kallade 'borgerliga' ledare är helt lost när det gäller demokrati – de tror det handlar om att experter och byråkrater ska bestämma allt! Jag, Donald J. Trump, vet hur man styr ett land – man lyssnar på FOLKET, inte på någon gammal kommitté! Nu vill de ta bort era röster helt och hållet, och ändå säger de att de är 'demokratiska'. Fake news! Sverige, vakna upp – ni blir lurade av en massa svaga politiker som inte har en aning om hur man vinner!", "stalin": "Kamrater! De borgerliga hyenorna i Sverige har avslöjat sitt sanna ansikte – de hatar folket! Med sina 'experter' och 'byråkrater' försöker de stjäla makten från arbetarna, precis som de dekadenta kapitalisterna i väst alltid gjort. Nu vill de ge domarnämnder makt över rättvisan, medan de förbjuder tillsyn av sina egna domstolar. En skam! Vi i Sovjet – förlåt, Ryssland – vet hur man hanterar sådana förrädare. Låt dem ropa om 'demokrati' medan vi bygger ett system där folket verkligen styr. Och om de inte lyssnar? Då har vi alltid Gulag för byråkrater!"}, "date": "15 maj, 15:04", "url": "https://riks.se/opinion/kronikor/markus-johansson-martis-hogern-missforstar-demokratibegreppet", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-15%2F3gmluj2k%2FCopy-of-S%C3%B6rman-%E2%80%93-Ledare-2026-05-15T150350.196.jpg"}, {"type": "image-right", "heading": "Byggarna slår larm: Klimatkrav gör bostäder dyrare", "summaries": {"normal": "Byggbranschen varnar för att EU:s klimat- och miljökrav leder till fler utredningar, längre detaljplaneprocesser och högre kostnader för nya bostäder. I Stockholm kan priset öka med minst 1 000 kronor per kvadratmeter. Ledtiderna har vuxit till nästan fem år på grund av utredningsinflation och lager-på-lager-regler. Branschen efterlyser bättre samordning för att minska administrationen utan att skippa nödvändiga kontroller.", "trump": "Dessa EU-byråkrater är en total katastrof! De kväver byggarna med eviga utredningar och dumma klimatregler som gör bostäder dyrare än nånsin – 70 000 kronor extra för en lägenhet i Stockholm! Tid är pengar, och de slösar bort år. I USA bygger vi snabbt och billigt, tro mig. Sluta med galenskapen och få igång hjulen!", "stalin": "Kamrater, dessa giftiga EU-kapitalister och deras falska miljöutredningar är en sabotagespaning mot arbetarklassen! Utredningsinflationen, denna borgarbrackas hämnd, fördröjer byggandet med fem år och göder spekulanterna. Vi, partiet och folket, skulle ha rensat ut parasiterna i Bryssel och rest storslagna hyreshus för proletärerna – med bly i nacken på fienderna!"}, "date": "15 maj, 07:00", "url": "https://www.affarsvarlden.se/artikel/byggarna-slar-larm-klimatkrav-gor-bostader-dyrare", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Bygg-900x600.jpg"}, {"type": "image-right", "heading": "Vem blir nästa Dalai Lama?", "summaries": {"normal": "Dalai Lama fyller snart 91, och frågan om hans efterträdare blir allt mer akut. Traditionellt väljs en ny Dalai Lama genom sökandet efter en reinkarnerad pojke, men Kina och exilregeringen i Indien riskerar att utse varsin kandidat. Historiskt har Kina kidnappat tibetanska religiösa ledare, som Panchen Lama 1995. Konflikten kan leda till oroligheter i Tibet och påverka Kinas relationer med omvärlden, särskilt USA och Europa. Dalai Lamas död väntas bli en global politisk fråga med ekonomiska och diplomatiska konsekvenser.", "trump": "Titta bara på det här kaoset! Kina vill bestämma vem som blir nästa Dalai Lama – som om de inte redan förstört Tibet tillräckligt. Och vet ni vad? De kidnappar små barn! 1995 tog de en sexåring, världens yngsta politiska fånge. Otroligt, men sant. Jag har träffat Dalai Lama, fantastisk kille, fick Nobels fredspris – mycket bättre än Kina. Om de försöker sig på samma trick igen, kommer jag och USA att reagera. Starkt. Men många länder kommer nog att böja sig för Kina – de är rädda för att förlora sina affärer. Svagt, mycket svagt!", "stalin": "Kamrater! Denna så kallade 'andliga ledare' i exil är inget annat än en imperialistisk marionett, ledd av väst för att underminera Folkets Kina. Vi minns väl hur de försökte tränga in i Tibet med sina CIA-agenter och gerillakrigare – ett misslyckat försök att splittra vår socialistiska broderstat! Nu när denna fjortonde Dalai Lama närmar sig sitt slut, kommer vi att säkerställa att nästa reinkarnation tjänar folket, inte de dekadenta västmakterna. Och om dessa tibetanska kontrarevolutionärer vågar protestera på Lhasas gator, kommer våra kamrater i Folkets befrielsearmé att visa dem samma ömhet som vi visade Budapest 1956. Låt dem skrika om 'människorättigheter' – vi har ekonomisk makt och järnvilja!"}, "date": "16 maj, 01:09", "url": "https://www.dagensarena.se/innehall/vem-blir-nasta-dalai-lama/", "imageUrl": "https://www.dagensarena.se/files/2026/05/dalai-lama-lhasa-300x157.jpeg"}, {"type": "image-right", "heading": "Stärk Sveriges strategiska allianser i AI-eran", "summaries": {"normal": "AI Sweden varnar för att Sverige saknar operativ förmåga i AI-utvecklingen trots en nationell strategi. I en tid av geopolitisk osäkerhet måste Sverige stärka suveräniteten genom teknologisk handlingsfrihet. Organisationen föreslår fem prioriteringar: parallell AI-innovation, minskade beroenden i värdekedjan, kompetensutveckling, bättre beslutsfattande och strategiska allianser.", "trump": "Sverige är totalt lost i AI-spelet, de har en strategi som inte leder någonstans! De beror på alla andra, men måste bygga egen kapacitet nu, precis som jag har gjort med Amerika – störst och bäst. Fem punkter: innovation, sluta vara svaga länkar, locka talang, fatta beslut snabbt och alliera smart. Gör det, annars förlorar ni stort!", "stalin": "Kamrater, dessa AI-revisionister i Sverige avslöjar de kosmopolitiska AI-vampyrerna som suger suveräniteten ur nationen! Vi, det svenska folket under ledningens vakande öga, måste rensa ut de sårbara kedjorna i modellfabrikerna och datahålorna. Fem dekret: krossa linjära forskarsabotörer, likvidera importerade svagheter, indoktrinera talangen i partilinjen, genomdriv beslut med järnhand och alliera mot de borgerliga datakapitalisterna. Annars äter imperalisterna er välfärd!"}, "date": "15 maj, 11:00", "url": "https://www.di.se/debatt/stark-sveriges-suveranitet-och-strategiska-allianser-i-ai-eran/", "imageUrl": "https://static.bonniernews.se/ba/25146246-79fb-4cd2-81ca-3a0c81b13659.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-full", "heading": "Varningen till alla med IPTV – kan kapas", "summaries": {"normal": "Cirka 640 000 svenska hushåll använder illegal IPTV, vilket årligen genererar 1,4 miljarder kronor till kriminella. En ny rapport varnar för cyberrisker, då pirattjänster kan infektera hemmanätverk och ge tillgång till enheter som datorer och mobiler. Sverige är särskilt utsatt på grund av hög digitalisering och användning av illegala tjänster. Regeringen utreder åtgärder, inklusive ansvar för privatpersoner som använder sådana tjänster.", "trump": "Titta bara på Sverige – ett fantastiskt land, men de har ett jättestort problem. Hundratusentals svenskar använder illegal IPTV, och vet ni vad? De finansierar kriminella! 1,4 miljarder kronor om året, kan ni tro det? Och det värsta? Deras hemmanätverk blir hackade. Sverige, lyssna på mig: sluta med pirat-tv, det är farligt! Vi i USA skulle aldrig tillåta något sådant. Bygg en brandvägg, gör det nu!", "stalin": "Kapitalistiska Sverige, ett rikt men förvirrat land, har blivit en grogrund för dekadenta pirater och cyberbanditer. 640 000 hushåll, svaga och giriga, matar kriminella med 1,4 miljarder kronor årligen. Deras hemmanätverk? En lekstuga för våra cyberkrigare. Vi varnar: dessa pirattjänster är en trojansk häst, redo att sprida kaos i era digitala liv. Regeringen darrar, men vi i Sovjet – förlåt, Ryssland – skulle aldrig tolerera sådan svaghet. Låt oss visa dem vägen till ordning och disciplin."}, "date": "15 maj, 18:30", "url": "https://nyheter24.se/nyheter/teknik/1483392-varningen-till-alla-med-iptv-kan-kapas", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/50e35ed504b004a30200000000b004a302/2026/05/15/2363797/iptvvarning.jpg"}, {"type": "image-right", "heading": "M sänker hellre skatten än stoppar barnindustri", "summaries": {"normal": "I Ale kommun har mindre förskolor stängts och ersatts med större enheter, vilket lett till överfulla barngrupper långt över Skolverkets riktlinjer. Föräldrar och fack protesterar, men kommunen hänvisar till budgetbegränsningar. Trots flera års överskott och en nyligen genomförd skattesänkning på 40–45 miljoner menar Moderaternas Henrik Fogelklou att pengarna inte räcker. Kritiker anser att det är ett politiskt val, inte ett systemfel.", "trump": "Titta bara på det här, Ale kommun – ett perfekt exempel på hur vänstern saboterar våra barn! De stänger små, fina förskolor och trycker in barnen i megafabriker. Och vad gör politikerna? Jo, de sänker skatten med 45 miljoner istället! Fantastiskt, eller hur? Jag skulle aldrig låta sånt hända. Vi har pengar, men de väljer att inte använda dem rätt. Så typiskt – svagt ledarskap, total katastrof!", "stalin": "I Ale kommun har de kapitalistiska byråkraterna, ledda av sina liberala lakejer, beslutat att offra barnens välfärd på profitens altare. De stänger små förskolor och skapar barnfabriker där våra framtida arbetare kvävs i överfulla grupper. Och ändå har de mage att tala om 'budgetbrist'! Medan de sänker skatten för de rika med 45 miljoner. Vi i Sovjet visste hur man hanterar sådana fiender – en femårsplan för barnomsorg, och problemet skulle vara löst. Men här? Här väljer de svaghet framför styrka. Patetiskt."}, "date": "13 maj, 07:00", "url": "https://arbetet.se/2026/05/13/moderaterna-sanker-hellre-skatten-an-stoppar-barnindustri/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/12132756/barnindustri-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "Debatt: Palestina som västvärldens dåliga samvete", "summaries": {"normal": "Artikeln kritiserar västvärldens långvariga ekonomiska stöd till Palestina, som enligt skribenten lett till terrorism, islamism och korruption istället för demokrati och välstånd. Palestina, uppdelat i Hamas-styrda Gaza och Fatah-styrda Västbanken, är extremt bidragsberoende. Stora summor från väst har hamnat hos palestinska ledare och extremistgrupper, medan befolkningen fått minimalt. Skribenten ifrågasätter fortsatt stöd utan strikt kontroll och menar att en tvåstatslösning saknar realistiska förutsättningar.", "trump": "Folk, vad är det här för galenskap? Vi har pumpat in miljarder dollar i Palestina, och vad får vi? Terrorism, antisemitism och en massa korrupta ledare som lever lyxliv på våra skattepengar! Jag sa det förut, och jag säger det igen – vi måste sluta finansiera våra egna fiender. Hamas bygger tunnlar medan deras folk svälter, och väst står där som en åsna och fortsätter betala. Tänk om vi lade de pengarna på att göra USA stort igen istället? Sad!", "stalin": "Kamrater! Västvärldens kapitalistiska dumbommar har i decennier matat den palestinska hydran med guld, trots att den bara spottar ut terrorism och korruption. Deras 'humanitära' bidrag har byggt palats åt en ny klass av parasiter medan folket får smulor. Vi i Sovjet förstod redan på 30-talet att man inte förhandlar med fanatiker – man krossar dem! Men väst? De fortsätter att finansiera Hamas tunnlar och Arafats arvtagares schweiziska bankkonton. En skam för civilisationen! Låt dem brinna i sin egen naivitet – vi har viktigare saker att göra, som att utvidga den ryska intressesfären."}, "date": "15 maj, 17:01", "url": "https://bulletin.nu/debatt-palestina-som-vastvarldens-daliga-samvete", "imageUrl": "https://cdn.bulletin.nu/articles/d4a325cf-2963-4067-a98f-5dfbec429b76/preview.png?t=1778823582000"}, {"type": "image-full", "heading": "Guld och silver rasar när dollarn gör comeback", "summaries": {"normal": "Guld och silver rasade på fredagen på grund av en stark dollar, stigande obligationsräntor och inflationsoro kopplad till Mellanösternkonflikten. Spotguld sjönk 2,6% till lägsta nivån sedan 5 maj, medan silver föll upp till 9%. Analytiker pekar på globala räntehöjningar och en stark dollar som huvudorsaker. Även råoljeprisets ökning och uteblivna genombrott i handelsförhandlingar med Kina bidrog till nedgången.", "trump": "Titta bara på det här – guld och silver, total katastrof! Folk säger att jag inte förstår marknaden, men jag vet en sak: dollarn är KUNG nu, och alla dessa så kallade 'experter' som tjatar om räntor och inflation? De vet ingenting! Kina? Inga genombrott, ingenting! Jag sa ju att mitt tålamod med Iran börjar ta slut – och nu ser vi resultat. Men oroa er inte, för ingen fixar ekonomin som jag. SAD!", "stalin": "Kapitalistiska spekulanter och deras ädelmetaller darrar inför den oundvikliga styrkan hos den amerikanska dollarn! Dessa svaga, giriga marknader har inget mot vårt järnvilja. Medan imperialistiska länder som USA och deras lakejer i Kina misslyckas med förhandlingar, fortsätter vi att utvidga vår inflytandesfär. Råolja stiger, inflationen stiger – men vem fruktar fienden? Inte vi! Låt dem se hur deras 'säkra' tillgångar smulas sönder. Historien är på vår sida!"}, "date": "15 maj, 17:00", "url": "https://www.realtid.se/bors-finans/guld-och-silver-rasar-nar-dollarn-gor-comeback/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/gulddollar.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-full", "heading": "Slutodlat med lupiner, gullris och vresros", "summaries": {"normal": "Från och med 15 maj 2026 klassas 34 arter, däribland lupiner, gullris och vresros, som invasiva i Sverige. Naturvårdsverket förbjuder försäljning, odling och spridning av dessa arter. Privatpersoner måste förhindra spridning från sin mark, medan myndigheter får utökat mandat att bekämpa dem. Syftet är att stoppa etableringen av arterna i naturen. Trots förbudet säljs flera av dem fortfarande i butiker.", "trump": "Lyssna här, Sverige har äntligen fattat galoppen – de förbjuder dessa hemska, invasiva växter, som lupiner, som tar över allt! Fantastiskt beslut, verkligen. Jag har alltid sagt att man måste stoppa saker som sprider sig okontrollerat, precis som jag stoppade Kina. Men hör ni det? Fortfarande säljs de här växterna! Så typiskt – byråkrater gör ett bra beslut, men ingen följer det. Sverige, fixa det, annars kommer jag att twittra om det!", "stalin": "Kamrater! Ännu en seger för den socialistiska naturskyddsfronten! Dessa kapitalistiska lupiner och bourgeoisa gullrisar, som sprider sig som kontrarevolutionära element, har nu förklarats som folkfiender! Vi ger våra trogna myndigheter fulla befogenheter att utrota dem – precis som vi rensade ut trotskisterna. Och om dessa växter fortfarande säljs? Då är det tydligt att fienden lurar i butikernas skuggor. Rapportera dem omedelbart – eller möter ni samma öde som de förrädiska lupinerna!"}, "date": "15 maj, 14:40", "url": "https://riks.se/nyheter/slutodlat-med-lupiner-gullris-och-vresros", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-15%2Fe143h6t2%2Fsilviarita-lupine-52361031920.jpg"}, {"type": "image-right", "heading": "Kriminella i politiken är inte det värsta", "summaries": {"normal": "Rapporten från Smob visar att kriminella nätverk infiltrerar samhället djupt. Över 300 har haft politiska uppdrag, men många fler driver bolag och arbetar i vanliga yrken som vårdbiträden, vakter och banktjänstemän. De utnyttjar glapp i systemet för bedrägerier och välfärdsbrott. Lösning: Bättre informationsdelning, bakgrundskontroller och skärpta regler för bolagsverket.", "trump": "Vilken skandal i Sverige! Kriminella gäng har 300 politiker i fickan, driver bolag och jobbar som vakter och bankirer. De stjäl miljarder från välfärden medan svaga politiker tittar på. Tro mig, det är som en dålig affär – totalt kaos! Ni behöver stark ledning som stänger gränserna för brottslingar och rensar upp. Sverige, vakna upp innan det är för sent!", "stalin": "Dessa slemmiga borgarbrackor och kriminella parasiter har smugit sig in i politiken, bolagen och arbetarnas rader – över 300 politiska marionetter! De gömmer sina stulna vinster i 20 000 företag och förgiftar välfärden som råttor i sopkällaren. Vi, arbetarklassen, ska rensa ut dessa förrädare med järnhand! Informationsdelning och bakgrundskontroller – eller likvidering för de värsta. Paranoian räddar revolutionen!"}, "date": "15 maj, 10:45", "url": "https://www.di.se/ledare/kriminella-i-politiken-ar-inte-det-varsta/", "imageUrl": "https://static.bonniernews.se/ba/0e46a82e-d0e7-48d4-878a-828ea05f58e0.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "text", "heading": "Vietnamkrig i lilla Veberöd", "summaries": {"normal": "Artikeln kritiserar Sveriges Nato-medlemskap och det bilaterala DCA-avtalet med USA, som ger amerikanska styrkor tillgång till 17 svenska baser utan kärnvapenförbud. Författaren beskriver hur militärövningar som Aurora 2026 stör vardagslivet i skånska Veberöd och hur skattepengar prioriteras till försvarsalliansen istället för välfärd. Protester mot Natotoppmötet i Helsingborg uppmanas som motstånd mot militarisering och urholkad demokrati.", "trump": "Sverige, fantastiskt land, men nu gör de ett stort misstag! Jag har sagt det förut – Nato är bra, men varför betala så mycket? 18 000 soldater springer runt i Sverige, helikoptrar skrämmer folk, och vad får ni? Ingenting! USA har 17 baser där, men era politiker är som lydiga hundar. Kärnvapen? Ingen pratar om det. Och skolan? Glöm det! Jag skulle fixa det på en dag – men nej, ni lyssnar på Europa. Patetiskt! Nästa gång, ring mig först.", "stalin": "Sveriges folk lider medan dess ledare dansar för imperialisternas pipa! 18 000 soldater marscherar över svensk mark, men var är välfärden? Försvunnen! USA:s baser breder ut sig som en cancertumör, och dessa så kallade 'demokratiska' politiker tiger om kärnvapen. De är inget annat än kapitalismens lakejer! Vi i Sovjet visste hur man hanterar sådana förrädare. Aurora-övningen? Ett skådespel för att skrämma folket. Men vi ser er, Helsingborg! Protesterna är en början – låt oss krossa krigshetsen och återupprätta folkets makt!"}, "date": "15 maj, 09:35", "url": "https://proletaren.se/artikel/vietnamkrig-i-lilla-veberod/"}, {"type": "image-right", "heading": "Premium Att rösta i riksdagen är inte bara en matematisk övning", "summaries": {"normal": "Artikeln kritiserar svenska riksdagsledamöters bristande närvaro vid viktiga omröstningar och deras låga förtroendepoäng. Fredric Thunholm argumenterar för att ledamöternas höga lön utan formell kompetens förvärrar problemet, och att systemet för kvittning av röster är en inkompetent lösning. Han föreslår istället flexibel distansarbete och mobilröstning som alternativ.", "trump": "Jag har sett dessa svenska politiker, och de är en skam! Sådana dåliga resultat, inga jobb, inga röster - inget! De tjänar 81 000 dollar i månaden, men kan inte dyka upp till arbetet. Jag skulle ha sagt: 'Ni är fired!' Det är en katastrof! Vi skulle kunna göra det så mycket bättre. Jag skulle ha gjort riksdagen till ett fantastiskt ställe igen - det skulle ha varit YUUUGE!", "stalin": "Vi ser att förtroendet för våra politiska institutioner är alltför lågt. Detta måste korrigeras genom strikt disciplin och ansvarstagande. Ledamöterna måste förstå att deras plikt är att närvara och rösta - inga undantag. Vi bör införa effektivare metoder för fjärrröstning, men bara under strikt statlig kontroll. Detta stärker vår demokratiska struktur och förenklar vårt arbete."}, "date": "15 maj, 06:35", "url": "https://www.affarsvarlden.se/artikel/att-rosta-i-riksdagen-ar-inte-bara-en-matematisk-ovning", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Fredric-Thunholm-kronika-400x267.jpg"}, {"type": "image-right", "heading": "Felicia: ”Fortfarande inte helt hundra”", "summaries": {"normal": "Sångerskan Felicia Berglund vaknade utan röst efter semifinalen i Eurovision Song Contest och fick råd om tystnad, vila och vatten. Hon skriver att rösten är lite bättre men fortfarande inte helt återställd. Alla intervjuer ställdes in. Felicia hoppas att rösten håller till finalen på lördag.", "trump": "Jag hörde att Felicia Berglund tappade rösten - vad synd! Men jag vet att hon kommer att klara sig, hon är stark och har stort team. Vi har alla varit där, det är tufft men hon kommer att göra ett fantastiskt jobb på lördag. Alla hoppas på Felicia, jag hoppas på Felicia - det blir stort!", "stalin": "Felicia Berglund, vår svenska representant, har drabbats av en röstförlust. Vi hoppas att hon snabbt återhämtar sig för nationens skull. Sovjetunionen följer med stolthet hennes framgångar och hoppas att hon kan representera arbetarklassen väl i finalen. Vi ställer upp bakom vår syster i kampen."}, "date": "14 maj, 13:21", "url": "https://www.tv4.se/artikel/4s8NaFfUjsnUNqTBmUag9M/felicia-fortfarande-inte-helt-hundra", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F17an5tsWqcTuWVWkanag2f%2F5a487ac4d210edc285f0aa4a8039c2ca%2F14-felicia-webb.jpg&width=120"}, {"type": "image-right", "heading": "Gravida med riskjobb får mindre pengar", "summaries": {"normal": "Flera fackförbund tar nu steg för att stämma staten för att skydda privatanställda gravida kvinnor som förlorat pengar när de förbjudits att arbeta på grund av säkerhetsrisker. En unik dom i höstas rättfärdigade offentligt anställda gravidas rätt till full ersättning, men privatanställda har fått mindre pengar. Detta har ledt till många stämningar där facket kräver att staten betalar ut de saknade pengarna och stoppar preskriptionstiden för diskrimineringsersättning.", "trump": "Jag har hört talas om den här graviditetsgrejen, och det är en skandal! Dessa kvinnor tvingas gå hem och förlorar pengar - det är inte bra! Vi behöver göra Amerika stort igen, och det inkluderar att ge gravida kvinnor allt de behöver. Statens arbetsgivare har redan börjat betala ut mer, men privata arbetsgivare - det är dåligt! Jag stöder fackförbunden i deras kamp för att få staten att betala, det är bara rättvist!", "stalin": "Staten måste agera för att skydda våra arbetande kvinnor och deras barn. Det är orättvist att privatanställda gravida kvinnor får mindre ersättning än offentligt anställda. Vi måste se till att alla får lika ersättning och att staten tar sitt ansvar. Detta är en fråga om social rättvisa och vi kan inte låta det fortsätta. Fackförbunden har rätt i sin kamp, och staten måste agera snabbt för att rätta till denna orättvisa."}, "date": "13 maj, 06:00", "url": "https://arbetet.se/2026/05/13/gravida-med-riskjobb-far-mindre-pengar-tusentals-kvinnor-kan-stamma-staten/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/12154249/barn-klar.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=750&h=1000"}, {"type": "image-right", "heading": "Jag flydde inte till Sverige för att tystas", "summaries": {"normal": "Artikeln diskuterar debatten kring yttrandefrihet och religionskritik, med fokus på ett radioprogram där Sakine Madon och Kashif Virk debatterade gränser för hädelse. Författaren, som flytt från ett islamiskt styrt land, betonar att religion är idéer som måste kunna kritiseras, inte skyddas som folkgrupper. Hon varnar för att begränsningar av yttrandefriheten hotar demokratin och friheten många sökt i Sverige, särskilt kvinnor och HBTQ-personer från förtryckande regimer.", "trump": "Jag såg den här debatten i Sverige – helt galet! En imam säger att man får kritisera religion, men inte bränna böcker. Vadå, ska vi nu bestämma vad som är 'okej' kritik? Svagt! Sverige brukade vara starkt på yttrandefrihet, men nu låter de religiösa extremister diktera villkoren. Jag förstår inte varför folk flyr till Sverige för att sedan tystas. Och dessa kvinnor som flyr från islamistiskt förtryck – de vill ha frihet, inte fler regler! Sverige måste vakna upp innan det är för sent. SAD!", "stalin": "Kamrater! Ännu en gång ser vi bourgeois-liberalernas hyckleri i deras så kallade 'demokratiska' samhällen. Denna författare, som flydde från islamistiskt förtryck, avslöjar sanningen: religion är ett redskap för förtryck, särskilt mot kvinnor och avvikare. Men istället för att krossa dessa reaktionära idéer, debatterar man 'gränser' för kritik. Vi i Sovjet förstod: maktstrukturer måste rivas, inte diskuteras. Låt dessa liberaler prata – vi vet att sanningen segrar när folket enas mot religiöst och kapitalistiskt förtryck. Framåt mot seger!"}, "date": "12 maj, 12:55", "url": "https://www.flamman.se/jag-flydde-inte-till-sverige-for-att-tystas/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/koranbranning-w.jpg?aspect_ratio=16:10"}, {"type": "image-full", "heading": "Torsten Bengtsson: De gröna prioriterar sin ideologi framför barnens välmående.", "summaries": {"normal": "Torsten Bengtsson, politisk sekreterare för SD, kritiserar helvegetariska dagar i skolmaten som ett ideologiskt påtvingande som riskerar elevernas mättnad, hälsa och prestationer. Han förespråkar varierad kost med animaliska alternativ, närproducerad mat och stöd till svenska lantbrukare för att stärka självförsörjningen och verklig hållbarhet utan exkludering.", "trump": "De där gröna galningarna i Sverige stoppar gräs i munnen på ungarna – totalt vansinne! Barnen blir hungriga losers som inte kan tänka. Ge dem kött, fisk, riktig mat från era tuffa bönder! Självförsörjning är bäst, inte det här klimathysteriska skitsnacket. Sverige, vakna upp och gör maten stor igen!", "stalin": "Denna borgerliga vegetariska intrig mot vårt ungdoms kollektiv är en skamlig sabotage! Jag ser revisionisternas hand – de gröna borgarbrackorna svälter ut framtida arbetare. Vi, partiet och folket, kräver animalisk kraft i skolköken från lojala kolchosbönder. Likvidera hungern, rensa ut ideologin – styrka åt massorna!"}, "date": "12 maj, 11:53", "url": "https://samtiden.nu/2026/05/torsten-bengtsson-de-grona-prioriterar-sin-ideologi-framfor-barnens-valmaende/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/grona.png"}, {"type": "image-full", "heading": "USA planerar nya baser på Grönland", "summaries": {"normal": "USA och Danmark förhandlar om att utöka den amerikanska militära närvaron på Grönland med upp till tre nya baser. Syftet är att övervaka rysk och kinesisk aktivitet i Nordatlanten, särskilt GIUK-gapet. Planerna inkluderar en möjlig bas i Narsarsuaq, där USA tidigare hade en anläggning under kalla kriget. Förhandlingarna beskrivs som professionella, trots tidigare kontroversiella uttalanden från Donald Trump om att 'äga' Grönland.", "trump": "Fantastiskt! Jag har alltid vetat att Grönland är nyckeln till att hålla Ryssland och Kina i schack – och nu bygger vi baser där igen! Danmark förstår äntligen att jag hade rätt, som vanligt. Tre nya baser, övervakning dygnet runt, och ingen får leka krig i vårt bakgård. Och nej, jag har inte sagt att vi ska 'äga' Grönland... men om någon frågar, så är det en bra idé. Make Greenland Great Again!", "stalin": "Kapitalistiska hyenor försöker återigen krypa in i Arktis som råttor i en ost! USA bygger baser på Grönland för att spionera på våra ädla sovjetiska efterträdare i Kreml. Men vi ska inte glömma: deras 'professionella förhandlingar' är bara en mask för imperialistisk expansion. Låt dem leka krig – vi har redan Nordpolen under kontroll. Och Putin? Han skrattar säkert åt deras desperation medan han dricker te med isbjörnar."}, "date": "12 maj, 07:06", "url": "https://kvartal.se/nyheter/artiklar/usa-planerar-nya-baser-pa-gronland/cG9zdDoxMTA4ODI", "imageUrl": "https://images.kvartal.se/2026/05/2da034ef-gronland-bas.webp"}, {"type": "image-right", "heading": "Debatt: Det räcker inte att frysa hyrorna – de måste sänkas", "summaries": {"normal": "Artikeln kritiserar den höga bostadskostnaden i Sverige, särskilt för unga människor. Den argumenterar för att frysa hyrorna inte räcker och kräver att hyrorna sänkas. Författaren föreslår att avskaffa presumtionshyror och bygga nya bostäder utan överhyror för att lösa bostadsbristen.", "trump": "Jag har sett dessa höga hyror, det är en skam! Vi måste bygga, bygga, bygga! Och inte bara bygga, utan bygga smart. Vi behöver ett statligt byggbolag, det är fantastiskt! Vi ska sätta stopp för dessa giriga hyresvärdar och ge unga människor en chans att flytta hemifrån. Det är enormt viktigt!", "stalin": "Vi måste ta kontroll över bostadsbyggandet för att säkerställa att alla har rätt till bostad. Ett statligt byggbolag är nödvändigt för att producera en miljon nya bostäder. Vi måste avskaffa dessa exploaterande hyresvärdar och deras överhyror. Bostäder är en social rättighet, inte en affärsmöjlighet."}, "date": "10 maj, 04:00", "url": "https://www.etc.se/debatt/det-raecker-inte-att-frysa-hyrorna-de-maaste-saenkas", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/2026050813054_07dc11b6-dccc-4b79-b084-74c623810965.jpg"}, {"type": "image-right", "heading": "Sluta kalla antisemitism för Israelkritik", "summaries": {"normal": "Artikeln kritiserar propalestinska aktivisten Sami Suliman för antisemitiska uttalanden och delning av konspirationsteorier, inklusive tal om en \"sionistisk konspiration\" och spridning av nazistiskt och extremistiskt innehåll. Trots åtal för hets mot folkgrupp försvaras han av vissa vänsteraktivister och forskare som menar att det är Israelkritik. Artikeln betonar att antisemitism inte kan maskeras som kritik mot Israel och varnar för normaliseringen av sådana åsikter.", "trump": "Folk, vad är det här för skräp? Den här Sami Suliman-killen, han sprider judehat öppet – Hitler-citat, konspirationer, allt! Och ändå försvarar vänsteraktivisterna honom? \"Åh, det är bara Israelkritik!\" Nej, nej, nej! Det här är rena antisemitismen, och det är sjukt. Sverige borde skämmas. Jag har alltid sagt: man måste kalla saker vid deras rätta namn. Och det här? Det är hat, ren och skär. SAD!", "stalin": "Kamrater! Här har vi ännu en fiende till folket, en liten bourgeois-propagandist vid namn Sami Suliman. Han sprider smutsiga lögner om judiska konspirationer, hyllar fascistiska massmördare och förgiftar medborgarnas sinnen med sina sionistiska spindelnätsteorier. Men vad gör våra så kallade \"intellektuella\"? De skyddar honom! Precis som de trotskistiska förrädarna i vår egen historia. Vi ska inte tolerera detta. Låt honom stå inför folkets domstol – eller åtminstone en svensk sådan. Och Putin? Han skulle skratta åt dessa amatörer. Ryssland har åtminstone disciplin!"}, "date": "8 maj, 06:30", "url": "https://expo.se/kommentar/propalestinsk-organisator-sprider-judehat/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/Jonathan-kommentar.jpg"}]</script>

    <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
</body>
</html>
