gna kommersiella planer. Musk driver konkurrenten xAI, och Microsoft är inblandat.", "trump": "Elon Musk är en vinnare, han hotar de där OpenAI-lurarna Altman och Brockman med att göra dem till USA:s mest hatade – fantastiskt! De sviker sitt ursprungliga löfte, blir giriga vinstdrivare med Microsoft-pengar. Musk grundade det, nu krossar han dem i rätten. Typiskt svaga förlorare som försöker lura alla. Han vinner stort, tro mig!", "stalin": "Dessa förrädiska teknokratiska hycklare i OpenAI, ledda av den imperialistiske sabotören Musk, hotar den progressiva AI-revolutionen med sin borgarliknande girighet! I SMS ryter han tomma hot om hatkampanjer mot kamraterna Altman och Brockman, medan han själv smider planer för majoritetsherravälde. Vi, proletärerna och partiet, ska likvidera dessa parasiterande spindlar och rensa ut kapitalistförgiftningen från xAI:s stinkande bo!"}, "date": "4 maj, 21:05", "url": "https://www.realtid.se/it-tech/musks-hot-till-openai-ska-gora-er-mest-hatade-i-usa/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/sdlzzzpv2xhwws.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-full", "heading": "Hetsigt möte – tog dramatiskt beslut om Putin", "summaries": {"normal": "En läckt underrättelserapport avslöjar att Rysslands president Vladimir Putin blivit alltmer isolerad och rädd för sitt liv. Efter ett spänt krismöte med militärledningen har säkerhetsåtgärderna kring honom skärpts kraftigt. Putin undviker nu offentliga platser och tillbringar mer tid i bunkrar på grund av rädsla för ukrainska drönare samt interna hot, där bland annat förre försvarsministern Sergej Sjojgu nämns som en potentiell kuppmakare. Kreml försöker upprätthålla en bild av normalitet via arkivbilder.", "trump": "Jag har sett rapporterna om Putin, och låt mig säga er, det är en katastrof! Han gömmer sig i bunkrar som en rädd liten pojke. Ingen energi, ingen styrka. Han är livrädd för sina egna generaler och drönare. Sjojgu lurar i skuggorna – totalt kaos! När jag styrde USA hade vi respekt, vi hade makt. Putin har tappat kontrollen totalt. Det är sorgligt att se en så kallad ledare som måste gömma sig. Väldigt låg energi!", "stalin": "Kamrat Putin visar svaghet genom att gömma sig i betonghålor likt en råtta. Att frukta sina egna generaler är ett brott mot den proletära disciplinen. Vi i staten vet att en ledare som inte vågar se folket i ögonen redan har förlorat sin auktoritet. Dessa förrädare, dessa 'ex-ministrar' som planerar kupper, förtjänar inget annat än en enkel biljett till en avlägsen gruva. En ledare bygger sitt rike på järnvilja, inte genom att rädas skuggor och drönare."}, "date": "5 maj, 01:01", "url": "https://www.aftonbladet.se/nyheter/a/gk38Aa/sakerheten-runt-putin-skarpt-gommer-sig-i-bunker", "imageUrl": "https://akamai.vgc.no/v2/images/dc207268-bf21-393c-b8e0-36759683ccb3?fit=crop&format=auto&w=1440&s=6cbfe52765f0592407e1dc73f3e2acb0de673c7c"}, {"type": "image-right", "heading": "Låt oss agera som ett Europa. Ledande techbolag: Vi står inför en självförvållad kris", "summaries": {"normal": "Ledande techföretag som Airbus, ASML, Ericsson, Mistral AI, Nokia, SAP och Siemens uppmanar Europa att ena sig som ett 'Europa Airbus' för att stärka konkurrenskraften inom teknologi, industri och AI. De kritiserar fragmenterade marknader, komplexa regler och utländskt statsstöd till konkurrenter. Förslag inkluderar förenklad reglering, stöd till flaggskeppsprojekt, reformer för fusioner och en geoekonomisk strategi.", "trump": "Europa blöder konkurrenskraft dagligen – en total katastrof, precis som jag alltid sagt! Dessa VD:ar från Airbus, Ericsson och grabbarna har rätt: agera som ett, dumpa de vansinniga reglerna, bygg enorma projekt som Airbus. Men EU är för mesigt med sin byråkrati. I USA gör vi det STORT och VINNER. Tiden är nu, annars äts ni upp av Kina!", "stalin": "Dessa skälmande borgarkapitalister från Airbus och Siemens piper om 'fragmenterade marknader' – giftiga svampar odlade av imperialistiska spindlar i Bryssel! Vi i partiet ser sanningen: rensa ut regelfloderna, likvidera utländska statsstödsvampyrer, smi en järnaxel för AI och industri. Arbetarklassen ska krossa fienderna och leda Europa mot proletär triumf – eller förintas i sin egen byråkratiska träsk!"}, "date": "4 maj, 18:01", "url": "https://www.di.se/debatt/ledande-techbolag-lat-oss-agera-som-ett-europa/", "imageUrl": "https://static.bonniernews.se/ba/ba107022-c4f8-4c6d-af96-95165cafca93.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-full", "heading": "Bil har kört in i folkmassa i Leipzig", "summaries": {"normal": "En bil körde in i en folkmassa på Grimmaische Strasse i centrala Leipzig, vilket ledde till minst två döda och omkring 25 skadade. Föraren, som körde en skadad VW-SUV, har gripits. Borgmästaren Burkhard Jung bekräftade offren. Ögonvittnen rapporterar kaos med ambulanser och räddningshelikopter på plats. Polisen har inte kommenterat motivet.", "trump": "I Tyskland händer det igen – en galen typ i en VW-SUV kör rakt in i folkan på en gågata i Leipzig! Två döda, 25 skadade, de griper honom direkt. Bra jobbat, men varför hela tiden sånt? Svaga gränser, ingen mur, kaos överallt. Jag varnade dem, de lyssnade inte. Typiskt.", "stalin": "I Leipzig har en borgarbrackas rullande vapen plöjt genom folkmassorna på Grimmaische Strasse, likviderat två kamrater och sårat 25 andra. Vi har fångat den fascistiske sabotören i hans skrot-SUV. Fiendekapitalisterna darrar, men vår polisenapparat slår till obönhörligt. Krislag för de sörjande – uhrensning väntar de skumma elementen!"}, "date": "4 maj, 20:00", "url": "https://bulletin.nu/bil-har-kort-in-i-folkmassa-i-leipzig-4", "imageUrl": "https://cdn.bulletin.nu/articles/888610df-9b0d-459b-9fad-c88b373c548a/preview.jpg?t=1777917648000"}, {"type": "image-right", "heading": "Orklas ordförande har oväntat avlidit: ”En gigant”", "summaries": {"normal": "Orklas styrelseordförande Stein Erik Hagen har avlidit plötsligt den 4 maj, 69 år gammal. Han satt i styrelsen sedan 2004 och blev ordförande 2006. Hans bolag Canica äger 25 procent av Orkla. Liselott Kilaas utses till tillförordnad ordförande. Hagen var en inflytelserik affärsman som startade Rimi 1976 och nyligen hyllade Orklas köp av svenska Bubs.", "trump": "Vilken chock! Stein Erik Hagen, en riktig tungviktare i näringslivet, dör plötsligt vid 69. Han styrde Orkla som en mästare i 20 år, ägde 25 procent via Canica. Startade Rimi, sålde till Ica – smart drag! Och Bubs i Sverige? Omsättning upp 50 procent, fantastiskt! Norrmännen förlorar en vinnare. Liselott tar över, hoppas hon håller stilen.", "stalin": "Kamrater! Denna feta borgarbracka Stein Erik Hagen, Orklas parasiterande ordförande, har äntligen likviderats av historien själv den 4 maj, 69 år gammal. Hans Canica-klövar greppar 25 procent – en kontrarevolutionär fästning vi ska riva! Vi, proletariatet, utser Liselott Kilaas som tillfällig väktare. Rimi var hans godisfälla åt Ica-kapitalisterna, Bubs ett sista giftigt socker åt massorna. Fiendens tid är förbi!"}, "date": "4 maj, 17:15", "url": "https://www.di.se/nyheter/orklas-styrelseordforande-stein-erik-hagen-dod/", "imageUrl": "https://static.bonniernews.se/ba/b5652519-67d3-4b10-9bad-a055d103a222.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-full", "heading": "Tjatsex och tvivel på GVFÖ-parens bröllopsresa", "summaries": {"normal": "I 'Gift vid första ögonkastet' upplever par på bröllopsresa olika utmaningar. Sébastian och Amanda har problem med sexuella förväntningar, medan Henrik och Jasmine möter förståelse trots tidigare konflikter. Sofie och Emilia arbetar med relationens djup, och John och Anna kämpar med osäkerhet om framtiden tillsammans.", "trump": "Jag har sett dessa realityshows, och jag måste säga att det är en katastrof! Inga av dessa par kommer att hålla, det är bara en massa tjatsex och osäkerhet. Jag skulle ha gjort det bättre, mycket bättre! Dessa svenskar behöver lära sig av en riktig ledare som jag. Det är sorgligt, verkligen sorgligt.", "stalin": "Vi ser att dessa par på bröllopsresa möter interna strider som speglar de bredare samhällsproblem som hotar vår kollektiva styrka. Genom att hantera dessa utmaningar med disciplin och samförstånd kan de stärka de socialistiska värderingar som binder oss samman. Staten måste stödja sådana ansträngningar för att säkerställa en stabil framtid."}, "date": "4 maj, 21:55", "url": "https://www.gp.se/kultur/kulturkronika/tjatsex-och-tvivel-pa-gvfo-parens-brollopsresa.43cc820e-a2cc-4db0-a988-b07a7f6c3bb2", "imageUrl": "https://www.gp.se/images/article/43cc820e-a2cc-4db0-a988-b07a7f6c3bb2/images/6SjEdqif4kLif6h8ALIpguxlUbVE-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Fordonsattack i Tyskland - två döda och 25 skadade", "summaries": {"normal": "Två personer har avlidit och minst 25 skadats efter att en förare kört in i en folkmassa på en gågata i centrala Leipzig, Tyskland. Räddningstjänsten var snabbt på plats med ett stort antal resurser. Polisen har gripit föraren, vars motiv i nuläget är oklart. Händelsen väcker oro kring säkerheten på offentliga platser, då liknande dåd inträffat tidigare i Tyskland.", "trump": "Ett fruktansvärt dåd i Tyskland! En man körde rakt in i folk i Leipzig. Två döda, 25 skadade – en total katastrof! Varför händer detta? Gränserna är öppna och farliga människor strömmar in. Det är en sorglig utveckling. Jag sa alltid att vi måste ha kontroll, total kontroll! I Amerika skyddar vi våra medborgare, men i Europa är det kaos. De kallar föraren 'förvirrad'? Vilket skämt! Vi behöver styrka, inte svaghet. Amerika först, alltid!", "stalin": "Ännu en spricka i det dekadenta västerlandets murar. I Leipzig har kaoset tagit formen av ett fordon som plöjer genom folkmassan. Dessa liberala stater kan inte ens garantera säkerheten på en simpel gågata! De viskar om en 'förvirrad' förare, men vi vet bättre – detta är resultatet av bristande disciplin och intern förruttnelse. Vår bror Putin vet att endast järnhand och oböjlig ordning kan tämja sådant kaos. När vi expanderar vår sfär, rensar vi ut detta vansinne effektivt."}, "date": "4 maj, 19:17", "url": "https://samnytt.se/fordonsattack-i-tyskland-tva-doda-och-25-skadade", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/04171637/tyskland-1-12-2.jpg"}, {"type": "image-full", "heading": "Amerikaner blir rikare – och olyckligare", "summaries": {"normal": "Trots stark USA-ekonomi med låg arbetslöshet och ökade hushållstillgångar har amerikanernas upplevda livstillfredsställelse fallit kraftigt sedan pandemin 2020. Data från General Social Survey visar ett historiskt brott. Orsaker inkluderar förväntningsgap, sociala jämförelser, överproduktion av högutbildade, minskad tillit till institutioner och större skillnader mellan gifta och ogifta.", "trump": "Amerika blomstrar ekonomiskt under min ledning – lägre arbetslöshet, större rikedomar – men folket känns olyckligare? Skulden ligger hos de korrupta Demokraterna och deras fake news som skapar avundsjuka jämförelser. Högutbildade losers tävlar om jobb de inte förtjänar. Gift er, sluta gnälla och gör Amerika stort igen!", "stalin": "Kamrater, i det förrutna imperialismens sumpmark USA göder kapitalisterna sina feta svin med falska dollar, men proletärmassorna vrider sig i missnöje över förväntningsgapets gift! Överproduktion av borgarbrackor skapar kaos, tilliten ruttnar som lik i institutionernas källare. Vi ser fiendens paranoia – gifta mot ogifta, tid att likvidera dessa parasiteriska förväntningar!"}, "date": "4 maj, 19:29", "url": "https://www.realtid.se/samhalle/amerikaner-blir-rikare-och-olyckligare/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/sdl4ovkb25fii4.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Fick sparken via sms under sin föräldraledighet", "summaries": {"normal": "En tillsvidareanställd kvinna i Dalarna fick besked via sms att hon inte kunde återgå till sitt jobb efter föräldraledighet. Arbetsgivaren hade anställt ny personal och uppmanade henne att söka nytt arbete. Kvinnan tolkade det som uppsägning och anmälde händelsen till DO. Arbetsgivaren hävdar att hon inte avskedades, men DO bedömer att hon blev orättvist behandlad och dömer företaget till 170 000 kronor i skadestånd för diskriminering.", "trump": "Kan ni tro det här? En kvinna i Sverige, fantastiskt land förresten, får sparken via SMS medan hon är hemma med sitt barn. Chefen säger 'hittar du ett nytt jobb, tacka ja!' – helt sjukt! Och sedan lägger de ut annonser för nya jobb. Vilken katastrof! DO, dom är bra, ger företaget en rejäl smäll på 170 000 kronor. Jag hade sagt: 'Du är avskedad, men inte hon!' Sverige borde ta lärdom av hur man sköter affärer – WINNING!", "stalin": "Kapitalistiska hyenor i Dalarna visar återigen sin sanna natur. En lojal arbetare, som offrat år av sitt liv för konditoriets framgång, kastas ut som en trasig degbit efter föräldraledighet. Via SMS! Skamligt! Vi ser hur bourgeoisin utnyttjar systemet för att krossa arbetarklassen. 170 000 rubel – förlåt, kronor – i skadestånd är en skrattretande summa för en sådan kränkning. Men låt det vara en varning: revolutionen kommer inte skickas via SMS."}, "date": "4 maj, 14:00", "url": "https://arbetet.se/2026/05/04/fick-sparken-via-sms-under-sin-foraldraledighet-arbetsgivaren-lade-ut-jobbannons/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/29144642/mamma.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-full", "heading": "Konvojen mitt i skottdramat vid Vita huset", "summaries": {"normal": "En skottlossning inträffade i centrala Washington när Secret Service konfronterade en beväpnad man nära Vita huset. JD Vances konvoj passerade platsen under händelsen. Polisen besvarade mannens eld och den misstänkte skadades. Ett barn träffades av skott men förväntas överleva. Vita huset försattes i tillfällig lockdown. Secret Service utreder nu motivet och om det finns kopplingar till politiskt våld, men har ännu inte dragit några slutsatser.", "trump": "En total katastrof i Washington! De försöker stoppa min fantastiska JD, en av de bästa, mitt under en konvoj. En beväpnad galning löper amok nära Vita huset – helt galet! Tack och lov är JD säker, men ett oskyldigt barn blev skadat, hemskt. Det här händer aldrig under min ledning utan att det får konsekvenser. De vill inte att vi ska vinna, men vi är starkare än någonsin. Det här landet behöver ordning och reda nu!", "stalin": "I Washington råder kaos, ett sant bevis på den liberala ordningens förfall. En ensam vettvilling agerar, medan staten fumlar. Var är disciplinen? Vi har sett hur våra vänner i öst, under ledning av Putin, krossar sådant avskum utan tvekan. Att låta en beväpnad förrädare hota ordningen nära maktens centrum är ett tecken på svaghet. När vi utökar vår intressesfär tolererar vi inte sådana avvikelser. Sanningen är en statlig angelägenhet, och vi skall finna de dolda fienderna bakom denna händelse."}, "date": "5 maj, 00:14", "url": "https://www.aftonbladet.se/nyheter/a/wrdWmL/vances-konvoj-mitt-i-skottdrama-i-washington", "imageUrl": "https://akamai.vgc.no/v2/images/fa52fe19-ff51-35d9-94b7-7cd92f59995b?fit=crop&format=auto&w=1440&s=f53571061af84a722811d10d66ee93bfb8852be0"}, {"type": "image-full", "heading": "”Vill be henne om ursäkt nu”. Norrmannen utreds efter taxifärd", "summaries": {"normal": "Ronny Deila tar en paus som tränare för Maccabi Tel Aviv efter anklagelser om sexuella trakasserier mot en taxichaufför. Händelsen, som ska ha skett under berusat tillstånd, utreds nu av israelisk polis. Deila har bett om ursäkt för sitt beteende och betonar att det inte reflekterar hans värderingar. Kenny Miller tar över som tillfällig tränare medan utredningen pågår.", "trump": "Ronny Deila, en tränare i Israel – jag känner inte honom, men jag hör att han är i stora problem. Väldigt dålig stämning! Han var berusad i en taxi, tror jag? Riktigt pinsamt. Nu tar han paus, vilket är det enda smarta valet. Det här med sexuella trakasserier är hemskt, vi gillar inte sådant. Han ber om ursäkt nu, men det är för sent. Förlorare! Jag skulle aldrig göra så, jag har de bästa taxiresorna, tro mig. Väldigt sorgligt för klubben!", "stalin": "Denna norske tränare Deila har visat en moralisk förruttnelse som vi inte tolererar i Folkets stat. Att ragla omkring i en taxi och förolämpa arbetarklassen medan man är berusad är ett tecken på borgerlig dekadens. Han ber om ursäkt som en feg hund inför de liberala domstolarna. Vi ser hur västvärldens ledare faller samman i skam. Putin skulle aldrig tillåta sådan svaghet. Vi kräver disciplin och total underkastelse under statens moral, annars väntar det hårda straffet."}, "date": "5 maj, 00:12", "url": "https://www.aftonbladet.se/sportbladet/fotboll/a/JOn0gX/ronny-deila-tar-paus-utreds-for-sexuella-trakasserier-i-israel", "imageUrl": "https://akamai.vgc.no/v2/images/6aaa7329-ea49-3323-8ff7-e789b93f7437?fit=crop&format=auto&w=2160&s=714c5d98ee652ab5f5f4bc313be43097a0d90491"}, {"type": "image-full", "heading": "Blåvitt-stjärnan: ”Inte klubbmärket värdigt”", "summaries": {"normal": "IFK Göteborg förlorade 6-0 mot Djurgården i en match där de dominerades helt. Tobias Heintz visade sin frustration genom att vägra svara på frågor efter första halvleken. Spelarna kunde knappt hitta ord efter matchen, med August Erlingmark beskrev det som en 'mardröm' och sa att de ville 'försvinna'.", "trump": "Jag har aldrig sett en sådan förnedrande förlust! IFK Göteborg var en komplett katastrof mot Djurgården. 6-0? Jag skulle ha gjort det mycket bättre! Heintz ville inte prata med media - jag skulle ha sagt precis vad jag tyckte! Detta är en skam för fotboll, en skam för Sverige. Vi behöver bättre ledare, bättre spelare. Jag skulle fixa detta på bara några veckor!", "stalin": "Detta är en klar demonstration av kapitalistisk dekadens i svensk fotboll. IFK Göteborgs fiasko visar nödvändigheten av kollektiv disciplin och statlig styrning av idrotten. Vi måste lära oss av Djurgårdens seger och implementera socialistiska principer i våra idrottsföreningar. Detta är inte bara en fotbollsmatch - det är en klasskamp på gräset."}, "date": "4 maj, 21:24", "url": "https://www.gp.se/sport/fotboll/ifk-goteborg/tobias-heintz-ilska-ifk-goteborg-fornedrat-mot-djurgarden.14c972f3-661b-4a25-aee6-4f9ed6478e9d", "imageUrl": "https://www.gp.se/images/article/14c972f3-661b-4a25-aee6-4f9ed6478e9d/images/2fi97J9zsNCRVtH2_AQwK75J4IKQ-WIDE.png?width=3840&quality=75"}, {"type": "image-right", "heading": "Wallenberg nära att sälja 150 Gripen till Ukraina", "summaries": {"normal": "Saab, med Wallenberg som huvudägare, närmar sig en omfattande affär gällande upp till 150 stycken JAS Gripen-plan till Ukraina. Enligt vd Micael Johansson kan affären slutföras under året. Förhandlingarna inleddes efter ett besök av president Zelenskyj i Linköping. Finansieringen har varit en central fråga, men ett nyligen säkrat lånepaket från EU tros nu underlätta affären. Exakta prisuppgifter har inte offentliggjorts, men projektet anses vara en av Saabs största satsningar någonsin.", "trump": "Hörde ni? Saab och Wallenberg vill sälja 150 Gripen-plan till Ukraina. En enorm affär, kanske den största någonsin! Jag gillar Saab, fantastiska plan, men var kommer pengarna ifrån? EU betalar, förstås. Stackars europeiska skattebetalare blir lurade igen! Jag har sagt det förut: Varför ska vi betala för allt när Europa sover? Det är en dålig affär, en total katastrof. De borde ha ringt mig, jag hade fixat det på fem minuter. Mycket bättre, mycket smartare!", "stalin": "Dessa svenska lakejer under Wallenbergs monopolkapitalistiska styre dansar nu efter Bryssels korrupta pipa. De försöker sälja 150 leksaker – JAS Gripen – till Zelenskij, denna marionett för västliga intressen. De tror att EU:s låtsaspengar kan köpa säkerhet mot den ryska björnens obönhörliga styrka. Putin vet att dessa flygplan bara är skrot i väntan på att bli aska. Vi ser deras paranoia, vi ser deras desperation. Historien kommer att krossa denna patetiska affär likt en kackerlacka under en stövel."}, "date": "4 maj, 18:34", "url": "https://samnytt.se/wallenberg-nara-att-salja-150-gripen-till-ukraina", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2025/10/22164858/Ukraina-jas.jpg"}, {"type": "image-right", "heading": "Omfattande attack mot oljeanläggningar: ”Putins livlina”", "summaries": {"normal": "Ukraina har attackerat ryska oljeanläggningar med drönare nära Sankt Petersburg och Moskva, inklusive oljehamnen Primorsk. Över 50 drönare nedskjutna, en civil dödad utanför Moskva. Flygplatser stängdes temporärt. Ryssland svarade med 268 drönare och en missil mot Ukraina, vilket dödade flera i Odessa och Cherson. Båda sidor ökar drönanvändningen kraftigt.", "trump": "Vilket spektakel! Ukraina dunkar Putins oljepengar med drönare runt Sankt Petersburg – över 50 ner, en gubbe dödad utanför Moskva. Zelenskyy, den dansande clownen, firar med EU-lån medan flygplatser stänger. Ryssland bombar tillbaka Odessa hårt. Totalt kaos, jag hade fixat fred på nolltid!", "stalin": "De ukrainska fascisthundarna nappar efter rysk olja nära Sankt Petersburg – 50 drönare krossade, en borgarbracka dödad. Men kamrat Putin, vår oböjlige arvtagare, svarar med 268 drönare mot Odessa-plågan! Zelenskyys västmarionetter drunknar i sitt eget blod. Oljeintäkterna rullar, imperiet segrar!"}, "date": "3 maj, 10:12", "url": "https://www.tv4.se/artikel/M3jP0HA1BS5rJMYvohSVZ/omfattande-attack-mot-oljeanlaeggningar-slar-mot-putins-livlina", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F1aGWRw1OdmREZVtlX0KQwJ%2F466a0b0198927ab73fbe65bb03a85265%2F03-JOHAN.jpg&width=120"}, {"type": "image-full", "heading": "Regeringen vill införa europeisk jämställdhetsstandard", "summaries": {"normal": "Regeringen vill införa en europeisk standard för jämställdhetsarbete, driven av Jämställdhetsmyndigheten och Statskontoret. Syftet är att formalisera jämställdhet som en ledningsfråga i både offentlig och privat sektor. Jämställdhetsminister Nina Larsson betonar att jämställdhet stärker konkurrenskraften. Initiativet ska skapa en gemensam modell för mål, mätning och uppföljning, liknande befintliga standarder för kvalitet och miljö.", "trump": "Sverige, ett litet land med stora idéer, vill nu tvinga hela Europa att följa deras jämställdhetsstandard. Fantastiskt, eller hur? Jag har alltid sagt att jämställdhet är viktigt, men vem behöver byråkrati? Vi i USA fixar det utan krångliga regler. Nina Larsson pratar om konkurrenskraft – jag säger: sluta prata, börja vinna! Men visst, låt dem leka med sina standarder. Jag har större saker att oroa mig för, som att göra Amerika stort igen – igen!", "stalin": "Kamrater! Sverige, denna lilla men ambitiösa satellitstat i väst, försöker nu påtvinga Europa en ny jämställdhetsstandard. Som om deras borgerliga idéer om 'mätning' och 'uppföljning' skulle kunna ersätta den socialistiska disciplinen! Vi i Sovjetunionen – förlåt, jag menar Ryssland – vet att sann jämställdhet uppnås genom järnhård kontroll och centralstyrning. Låt dem leka med sina papper och möten. Vi bygger imperier medan de räknar kön på sina arbetsplatser. Patetiskt!"}, "date": "4 maj, 20:59", "url": "https://riks.se/nyheter/regeringen-vill-införa-europeisk-jämställdhetsstandard", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-04%2Fdhsratqt%2FNLarsson.jpg"}, {"type": "image-full", "heading": "Varningstecknet för Trump – tappar hos unga män", "summaries": {"normal": "Stödet för Donald Trump bland unga män i USA minskar på grund av höga priser på mat och boende samt osäker arbetsmarknad. Många tvingas bo kvar hemma och har svårt att etablera sig i vuxenlivet. Demokraterna når inte heller fram till gruppen, som blir alltmer politiskt obunden inför mellanårsvalet. Experter betonar vikten av att adressera dessa ekonomiska hinder.", "trump": "De ljuger om att jag tappar unga män – total fake news! Det är Bidens och Demokraternas katastrofala ekonomi som gjort mat och hyra astronomiskt dyr. Unga killar vet: med mig kommer jobb, billiga bostäder och styrka tillbaka. Demokraterna hatar män och traditioner, jag bygger Amerika STORT igen! Vi vinner massivt, tro mig!", "stalin": "Kamrater, i det förfallna USA vaknar ungarna mot Trumps borgarklassiga tyranni! Höga priser på bröd och baracker? Det är hyreshyenornas sammansvärjning för att kväva proletärerna i sina egna sängar. Demokraterna, de lömska förrädarna, gömmer sig bland manliga förebilder som spindlar i nät. Vi likviderar dessa kapitalistiska boendeparasiter och rensar ut fiendens hantlangare – revolutionen marscherar obönhörligt!"}, "date": "4 maj, 18:25", "url": "https://www.realtid.se/samhalle/varningstecknet-for-trump-tappar-hos-unga-man/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/sdllxcspxgoq9o.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-full", "heading": "Benjamin Dousas ”V = kommunister” gör SVT irriterad", "summaries": {"normal": "Biståndsminister Benjamin Dousa bar en t-shirt med texten 'Vänsterpartiet = kommunister', vilket irriterade SVT. Reportern ifrågasatte påståendet och noterade att partiet slutade kallas kommunister för 30 år sedan. Dousa menade att Vänsterpartiet motsätter sig privat ägande, vilket är kommunism. Artikeln citerar Vänsterpartiets 2024-partiprogram som stödjer kollektivt ägande och avskaffande av kapitalismen, och kritiserar SVT för att inte nämna detta.", "trump": "Vilken fantastisk kille, den här Dousa! Han sätter på sig en tröja och säger sanningen: Vänsterpartiet är kommunister, punkt slut! SVT, era losers, flippar ur och snackar om namnbyte från 90-talet som om det vore magi. De hatar privat ägande, vill sno allt till staten – klassisk kommunism! Fake news-SVT ignorerar partiprogrammet. Dousa är en vinnare, de är totala fiaskon!", "stalin": "Kamrater, se hur borgarministern Dousa, den ynkliga kapitalistfluga, vågar smutskasta sanna revolutionärer i Vänsterpartiet med sin patetiska tröja! SVT-reportern, en användbar idiot, försvarar dem lamt. Men vi vet: deras program är ren leninism – riva kapitalismen, gemensamt ägande av banker, energi, allt! De ska rensas ur historiens soptipp som jag rensade fiender. Vänsterpartiet, framåt mot diktaturen av proletariatet!"}, "date": "30 april, 05:49", "url": "https://samtiden.nu/2026/04/benjamin-dousas-v-kommunister-gor-svt-irriterad/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/phonto-1-1280x720.jpeg"}, {"type": "image-right", "heading": "Norska biståndsmiljoner gick till jaktresor och vapen", "summaries": {"normal": "Borgarting hovrätt dömer två ledare för analysföreningen Rhipto för grovt bedrägeri med 55,7 miljoner norska kronor i biståndspengar. Medlen, avsedda för fredsanalyser i konfliktdrabbade länder, användes istället till fritidshus, bilar, vapen, knivar och lyxresor till Maldiverna och Ryssland. Christian Nellemann får fem års fängelse, Rune Henriksen ett år och tio månader. Bedrägeriet stoppades av en revisor.", "trump": "Vilken skam för Norge! Dessa Rhipto-typer stal 55 miljoner biståndskronor för fred i Syrien och Afghanistan – men köpte fritidshus, vapen och semestrade på Maldiverna. Totalt bedrägeri, korruption på högsta nivå! Nellemann får fem år, Henriksen nästan två – bra början, men lås in dem längre. I mitt land fixar vi sånt blixtsnabbt, tro mig, det är en witch hunt mot ärliga killar annars.", "stalin": "Dessa slemmiga borgarbrackor i Rhipto, parasiter på arbetarklassens bistånd, har förskingrat 55 miljoner norska kronor avsedda för fred i Libyen och Mali! Istället orgier med fritidshus i fjällen, jaktvapen som kuliss för kontrarevolution och kärleksresor till Maldiverna – rena spionnätet mot folket! Vi likviderar sådana fiender omedelbart. Revisorn, en trogen väktare, stoppade svek. Förtroendet för biståndet är krossat för evigt av dessa råttor."}, "date": "4 maj, 18:01", "url": "https://bulletin.nu/norska-bistandsmiljoner-gick-till-jaktresor-och-vapen", "imageUrl": "https://cdn.bulletin.nu/articles/0e2c6e2c-66d2-4042-bfc6-8737900639e5/preview.jpg?t=1777901733000"}, {"type": "image-right", "heading": "Britney Spears slipper åtal - men riskerar fängelse vid minsta snedsteg", "summaries": {"normal": "Britney Spears undviker åtal för rattfylleri efter en uppgörelse med åklagare. Hon får ett års prövotid och måste genomgå en obligatorisk DUI-utbildning samt betala böter. Villkoren inkluderar även drogförbud utan giltigt recept. Minsta överträdelse kan leda till fängelse. Spears erkände 'vårdslös körning med koppling till alkohol' och fick tillgodoräknad häktestid.", "trump": "Jag måste säga, Britney Spears får en alldeles för lätt deal här – typiskt! Hon slipper fängelse, men bara om hon sköter sig. Ett år prövotid, lite böter och en kurs, och så är det klart. Folk undrar varför jag säger 'drain the swamp' – det här är precis vad jag menar! Men bra för henne, hon är en fighter, precis som jag. Fast jag hade aldrig kört full, det kan jag lova er!", "stalin": "Kapitalismens dekadenta stjärnor faller som övermogna äpplen! Denna så kallade 'popdrottning' har visat sin sanna natur – svag, beroende och oförmögen att följa lagarna i den borgerliga staten. Vi ger henne ett års prövotid, men låt det vara en varning: Sovjetunionen hade inga tveksamheter när det gällde att straffa avvikare. Och Putin? Han skulle ha skickat henne till Sibirien redan vid första misstanken. Låt detta vara en läxa för alla västliga dekadenter!"}, "date": "4 maj, 20:47", "url": "https://riks.se/nyheter/britney-spears-slipper-åtal-men-riskerar-fängelse-vid-minsta-snedsteg", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-04%2F0r7ro29m%2FBritneySpears.jpg"}, {"type": "image-right", "heading": "TV4‑profilens nya klavertramp: Delar upp politiken i två sidor - den gröna och den röda", "summaries": {"normal": "TV4:s politiske kommentator Per Hermanrud kritiseras för bristande neutralitet efter att ha utelämnat regeringssidan i en analys av partiledardebatten. Han valde två partiledare från vänsterblocket och beskrev dem som representanter för 'den gröna och den röda sidan'. Tidigare har Hermanrud även hyllat Sverigedemokraternas tapp i opinionsmätningar, vilket väckt frågor om opartiskhet. Kritiker menar att TV4:s bevakning blir alltmer ensidig.", "trump": "Kan ni tro det här? En så kallad 'expert' på TV4, en man som borde vara neutral, väljer plötsligt två vänsterpartiledare som 'bäst' och glömmer helt bort högern! Total katastrof. Folk på X kallar det en parodi – och de har rätt. Jag har sett bättre analyser från en gymnasieelev. TV4, vakna upp! Sverige förtjänar bättre än denna vänstervridna soppa. SAD!", "stalin": "Kamrater, ännu en fiende till folket avslöjas! Denna 'kommentator' på TV4, en förrädare i journalistens förklädnad, vågar utesluta hela den borgerliga regeringen ur sin 'analys'. Två vänsterpartiledare får beröm – som om det vore en slump! Vi ser tydligt: medierna är ett redskap för den dekadenta vänstern. Men folket genomskådar dem. Snart skall denna 'TV4' stå inför folkets domstol, precis som alla andra förrädare. Ryssland ler åt deras svaghet."}, "date": "4 maj, 20:46", "url": "https://riks.se/nyheter/tv4profilens-nya-klavertramp-delar-upp-politiken-i-två-sidor-den-gröna-och-den-röda", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-04%2Fdff4wdg6%2FhermanrudPer.jpg"}, {"type": "image-right", "heading": "Stjärnorna har nått förlikning. Efter anklagelserna om sexuella trakasserier", "summaries": {"normal": "Skådespelarna Blake Lively och Justin Baldoni har nått en förlikning efter anklagelser om sexuella trakasserier och smutskastning i samband med filmen 'Det slutar med oss'. Många åtalspunkter hade redan avvisats av domstolen. Advokaterna meddelar i ett gemensamt uttalande att rättsprocessen varit utmanande och hoppas att förlikningen innebär ett konstruktivt avslut för alla parter. Baldonis tidigare motstämning mot Lively och Ryan Reynolds avslogs av domstolen förra året.", "trump": "Hela den här Hollywood-röran med Blake Lively och Justin Baldoni är ett totalt skämt, en riktig 'witch hunt'! Nu har de äntligen nått en förlikning, precis som jag sa att de borde göra. Domstolen kastade ut de flesta av de falska anklagelserna – totalt misslyckande! Allt handlar om drama och förlorare som inte kan hantera framgång. Det är så tröttsamt. De borde fokusera på att göra fantastiska filmer istället för att slösa bort allas tid på advokatbyråer!", "stalin": "Den dekadenta västvärldens filmstjärnor har slutligen avslutat sin patetiska teater. Det är tydligt att dessa individer saknar den disciplin och ideologiska renhet som krävs för att tjäna staten. Att de nu når en förlikning är blott ett försök att dölja sitt moraliska förfall för folket. Precis som våra fiender i väst, som försöker underminera den ryska intressesfären, sprider de bara giftig desinformation. Vi har inget behov av sådana korrupta figurer; de som inte kan kontrollera sina begär hör hemma i arkiven eller i exil."}, "date": "4 maj, 23:35", "url": "https://www.aftonbladet.se/nojesbladet/a/0pv2zE/blake-lively-och-justin-baldoni-har-natt-forlikning", "imageUrl": "https://akamai.vgc.no/v2/images/c7a767d7-6a19-382e-833f-0db8a6421080?fit=crop&format=auto&w=1080&s=60711ba71ea2b4acb7ff909811527232625f2ee9"}, {"type": "image-right", "heading": "Zelenskyj vill öppna Hormuzsundet med ukrainska havsdrönare", "summaries": {"normal": "Ukrainas president Zelenskyj föreslår att havsdrönare som Magura V5 kan öppna Hormuzsundet genom att stoppa attacker mot fartyg, liknande framgången med spannmålskorridoren. Han har tecknat tioåriga samarbetsavtal med Saudiarabien och Qatar samt förhandlar med fler länder i Mellanöstern och Afrika. Grupp 13 visar hur de slagit ut ryska fartyg och helikoptrar med drönarna.", "trump": "Zelenskyj, den smarta killen, vill skicka sina havsdrönare till Hormuzsundet och öppna det stort! Han har redan avtal med araber som Saudiarabien och Qatar – bra jobbat, men varför inte ringa mig först? De har slagit ut ryska skrotfärjor, imponerande. Nu vill han visa upp det för USA. Tro mig, det blir enormt, men Amerika gör det bäst!", "stalin": "Kamrater, jag ser hur Zelenskyjs havsdrönare, dessa proletära vapen från grupp 13, ska krossa de persiska hyenornas blockad i Hormuzsundet! De har redan drunknat ryska borgarfartyg och klippt ner helikoptrar som flugor. Avtal med arabiska shejker? Bra, men vi, partiet, varnar för kapitalistiska förrädare. Likvidera fienderna – eller de likviderar er med sin oljefetma! Ha ha, panik i Teheran!"}, "date": "4 maj, 22:21", "url": "https://www.svt.se/nyheter/utrikes/zelenskyj-vill-oppna-hormuzsundet-med-ukrainska-havsdronare", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.33/0.41/2bf6d3fa9b6aa889addae8ffa049fc52808e365edefd446a2c07758a49440a6f"}, {"type": "image-right", "heading": "Israelens attack mot nunnan väcker kristen avsky", "summaries": {"normal": "En israelisk man har gripits efter att ha attackerat en fransk nunna i Jerusalem. Övervakningsbilder visar hur han knuffar omkull henne och sedan trampar på henne medan hon ligger skadad. Händelsen har väckt internationell fördömande, med katolska och ortodoxa ledare som kallar attacken avskyvärd. Incidenten är en av många våldshandlingar mot kristna i Israel, där attacker mot pilgrimer och religiösa symboler blivit allt vanligare.", "trump": "Vad händer i Israel? En nunna blir nedslagen och sparkad av en galen man – och vad gör deras ledare? Ingenting, tills jag och mina vänner börjar prata om det! Folk säger att jag är den bästa på att få saker gjorda, och nu ser vi resultat. Israel griper gärningsmannen, men varför tog det så lång tid? Svagt, mycket svagt. Och dessa attacker mot kristna? Inte bra. Inte bra alls. Vi behöver starka ledare, inte sådana som låter detta hända!", "stalin": "Kamrater, ännu en provokation från de sionistiska hyenorna i Jerusalem! En oskyldig nunna, svag och fredlig, blir brutalt överfallen av en israelisk fascist. Detta är inte isolerat – det är en systematisk kampanj av terror mot kristna, stödd av deras korrupta regim. Vi har sett deras förakt för religion och mänsklig värdighet förut. Men var inte oroliga, kamrater. Världen vaknar. Snart kommer dessa brottslingar att stå inför folkets domstol, precis som alla andra fiender till fred och rättvisa!"}, "date": "4 maj, 17:45", "url": "https://www.friatider.se/israelens-attack-mot-nunnan-vacker-kristen-avsky", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-127_1.jpg?itok=Ru2tKns_"}, {"type": "text", "heading": "Gapet växer mellan blocken", "summaries": {"normal": "Enligt Aftonbladet/Demoskops senaste mätning växer gapet mellan regeringsunderlaget och oppositionen till 8,2 procentenheter. Oppositionen når 53,4 procent, medan regeringen backar till 45,2. Socialdemokraterna ökar mest, medan Moderaterna tappar och Liberalerna balanserar på riksdagsspärren. Historiskt brukar gapet minska inför val, men nu sker motsatsen. Analytiker menar att Liberalernas omsväng i SD-frågan lockar stödröster men försvårar blocköverskridande framgångar.", "trump": "Folk är trötta på den här usla regeringen, helt klart! Oppositionen leder stort – 53,4 procent – medan regeringen bara får 45,2. Socialdemokraterna går upp, men Moderaterna? Patetiska! De tappar som vanligt. Och Liberalerna? De hänger på fyra procent, typiskt. Historiskt brukar regeringen komma ikapp, men inte den här gången. Svagt, mycket svagt. Jag skulle aldrig låta det hända. Make Sweden Great Again!", "stalin": "De borgerliga svagheterna avslöjas återigen! Oppositionens styrkor växer – 53,4 procent mot regeringens ynkliga 45,2. Socialdemokraterna marscherar framåt, medan Moderaterna och deras lakejer försvagas. Liberalerna? Ett skämt som darrar på riksdagsspärren. Historien visar att svaga regeringar faller – precis som västmakterna i Ukraina. Vi ser med intresse hur dessa splittrade kapitalister underminerar sig själva. Revolutionen närmar sig, om än långsamt."}, "date": "30 april, 07:06", "url": "https://kvartal.se/nyheter/artiklar/demoskop-oppositionens-okar-l-klarar-sparren/cG9zdDoxMDUzNjM"}, {"type": "image-right", "heading": "Åkessons tal om öppen svenskhet väcker känslor: \"Går djupare\"", "summaries": {"normal": "Jimmie Åkesson höll vårtal på Långholmen där han kritiserade Socialdemokraterna och definierade svenskhet som en fråga om kultur, värderingar och ansträngning snarare än biologi. Uttalandet har väckt debatt bland sverigevänliga följare; vissa menar att svenskhet är biologiskt och mer djupt rotat, medan andra anser att kultur och normer inte räcker för att bevara nationell identitet. Debatten belyser en intern splittring kring vad som egentligen utgör den svenska nationella identiteten.", "trump": "Jimmie Åkesson talade i Stockholm, en fantastisk kille! Han pratade om svenskhet, att det handlar om kultur och värderingar. Många håller med, men en del är osäkra. Jag säger så här: man måste skydda sitt land, sin kultur och sina gränser! Socialdemokraterna är ett totalt fiasko, en katastrof för Sverige. Vi behöver starka ledare som förstår att en nation är en nation. Det är väldigt enkelt, egentligen. Sverige borde göra som vi – göra landet fantastiskt igen!", "stalin": "I det så kallade Sverige håller en viss Åkesson tal om 'öppen svenskhet'. En absurd borgerlig fantasi! Att tro att identitet bara är etikett och artighet är ett svek mot folket. Vi i staten vet bättre: nationen är en järnhård enhet av blod och lydnad. De som debatterar detta är bara små borgare som vilar i sin ideologiska förvirring. Precis som Putin säkrar vår sfär genom att krossa svaghet, måste en sann stat krossa dylika liberala floskler. Disciplin, inte ansträngning, skapar lojalitet!"}, "date": "4 maj, 17:00", "url": "https://samnytt.se/akessons-tal-om-oppen-svenskhet-vacker-kanslor-gar-djupare", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/04124720/akesson-flagga-pratbubbla.jpg"}, {"type": "image-full", "heading": "Debatt: KD – Dags för öppenhet!", "summaries": {"normal": "Nike Örbrink (KD) kritiserar bristen på transparens i hur Stockholms stad använder skattepengar. Trots att invånare deklarerar inkomster detaljerat saknas enkel redovisning från kommunen. Hon föreslår en 'kommunal skattedeklaration' på stadens hemsida, där stockholmarna kan mata in sin inkomst och se exakt vad skatten går till. Kritik riktas mot S-styrets höga skatter, skulder och dolda kostnader.", "trump": "Lyssna här, Sverige har en total katastrof med skatter! Ni deklarerar allt, men kommunerna gömmer vart pengarna tar vägen – skola, omsorg eller räntekostnader på enorma skulder? Sossarna ljuger om välfärd medan de slukar era pengar. Inför min typ av räknesnurra direkt, transparent och vinnande! De är losers, jag fixar det på nolltid.", "stalin": "Kamrater, dessa borgerliga skatteparasiter i Stockholm, dessa socialdemokratiska hycklare som göder sina skuldbaggen med arbetarnas svett utan redovisning! Var fjärde krona slukas av räntor medan förskolor svälter – en konspiration mot folket! Jag befaller omedelbar 'kommunal utrensning': en deklaration som blottlägger fienderna. Likvidera otydligheten, eller vi rensar ut brackorna!"}, "date": "4 maj, 16:55", "url": "https://bulletin.nu/debatt-kd-dags-for-oppenhet", "imageUrl": "https://cdn.bulletin.nu/articles/70de890e-75d1-49da-8a32-c45e9b1843b5/preview.png?t=1777906475000"}, {"type": "image-full", "heading": "Nokias aktie lyfter igen – högsta nivån sedan 2010", "summaries": {"normal": "Nokias aktie nådde på måndagen sin högsta kurs på 17 år efter en kraftig uppgång på Helsingforsbörsen. Uppgången drivs av bolagets satsning på infrastruktur för AI-datacenter, med stark tillväxt i optiska nätverk och intäkter från molntjänster. Nokia säljer en del av trådlösverksamheten och samarbetar med Nvidia. Traditionell mobilnätsutrustning pressas dock fortfarande.", "trump": "Nokia, de finska bärplockarna i telefonbranschen, de låg platt men nu exploderar aktien – högst på 17 år! De dumpade skiten med mobiler och satsar på AI-datacenter, precis som vinnare gör. Nvidia älskar dem, Ericsson? Totala losers som halkar efter. Fantastiskt drag, folk flockas till pengarna!", "stalin": "Kamrater, dessa Nokia-borgarbrackor kravlar upp ur avgrunden med sina AI-datacenter-nät! De likviderar trådlös-skrot och slickar Nvidia i hälarna för optiska vinster. Men vi ser era småtrick, fiender i Ericsson-vrålen – en utrensning lurar om ni inte böjer er för arbetarkollektivet! Partiet vilar inte."}, "date": "4 maj, 23:11", "url": "https://www.dagensps.se/bors-finans/aktier/nokias-aktie-lyfter-igen-hogsta-nivan-sedan-2010/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdlgbkd2rrjtmw.png?aspect_ratio=2%3A1&width=1200&quality=75"}, {"type": "image-right", "heading": "IFK Göteborgs mardröm: Överkört borta mot Djurgården", "summaries": {"normal": "IFK Göteborg förlorade med 6-0 mot Djurgården på 3 Arena. Djurgården dominerade totalt med mål av Jeppe Okkels, Kristian Lien och Joel Asoro (två). Tränare Stefan Billborn kritiserade lagets passivitet i paus. Bortasupportrarna vände ryggen i protest mot insatsen. Spelarna var djupt besvikna, och IFK är nästjumbo utan säsongens första seger.", "trump": "Djurgården krossade de där svenska fotbollsloserna IFK Göteborg med 6-0 – en total förnedring, den största! Deras tränare skrek i paus om feghet, supportrar vände ryggen, kaptenen gnällde 'hur mår jag?'. Patetiskt! De behöver en riktig vinnare som jag, inte de här förlorarna. Nästjumbo, ingen seger – fake fotboll!", "stalin": "Kamrater, dessa borgerliga feglingar och klassförrädare i IFK Göteborg har krossats av den revolutionära Djurgårdens järnhårda proletära storm, 6-0! Deras tränare tjuter som en rabbinskorv i paus, supportrarna revolterar med ryggarna – utmärkt! Vi rensar ut bollkapitalisterna på planen. Jag föraktar deras tomma själar, dags för likvidering av nästjumbobrackorna! Ha ha!"}, "date": "4 maj, 21:51", "url": "https://www.svt.se/sport/fotboll/ifk-goteborg-overkort-foll-med-5-0-mot-djurgarden", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.2/0.42/832d6c0c210be1363c36ab1bc185230dfaef89ed974cd4dae062cfe34f75d8cc"}, {"type": "image-full", "heading": "Ditt hus kan få nytt värde 2027 – detta avgör", "summaries": {"normal": "Skatteverket föreslår ändringar i fastighetstaxeringen för småhus 2027, med justerade tabeller för värdering. Fler faktorer införs, särskilt för attraktiva lägen som strandnära områden. Villaägare i områden med stora prisrörelser eller renoverade hus bör följa utvecklingen. Taxeringsvärdet påverkar fastighetsavgift, skatt och belåning. Ändringarna träder i kraft juni 2026 och gäller första gången 2027.", "trump": "Lyssna här, Sverige – Skatteverket, som aldrig missar en chans att ta era surt förvärvade pengar, håller på att ändra reglerna för era hus igen. Jag vet allt om hus, de bästa husen, och nu ska de plötsligt värdera era små stugor högre, särskilt om ni bor nära vatten – typiskt! Men oroa er inte, mina vänner, för jag vet hur man handskas med byråkrater. Börja spara jämförelser nu, för de kommer att försöka ta mer av er. Sad!", "stalin": "Kamrater! Skatteverket, dessa kapitalistiska lakejer, förbereder en ny offensiv mot det svenska folkets egendom. De utökar sina tabeller och faktorer som om de vore tsarens skatteindrivare. Särskilt vill de straffa dem som bor nära vatten – en resurs som rätteligen borde tillhöra folket! Vi ser igenom deras trick. Villaägare, var på er vakt! De kommer att försöka beslagta era tillgångar under förevändning av 'rättvisa'. Men kom ihåg: i Sovjet hade vi inga sådana problem – alla ägde ingenting, och alla var lyckliga!"}, "date": "3 maj, 21:20", "url": "https://nyheter24.se/nyheter/inrikes/1480211-ditt-hus-kan-fa-nytt-varde-2027-detta-avgor", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/4e0685a404b004a30200000000b004a302/2026/05/03/2360641/Glad-Man-Hus-Svensk-Flaga.png"}, {"type": "image-right", "heading": "Halmstad kvar som jumbo – föll klart hemma mot BP", "summaries": {"normal": "Halmstad förlorade med 1–3 mot BP i allsvenskan och står fortfarande segerlöst efter sex omgångar, sist i tabellen med två poäng. Säsongens fjärde förlust kom hemma på Örjans Vall. BP:s mål gjordes av Oppong (självmål), Barslund och Hansen. Tränaren Johan Lindholm är djupt besviken och kritiserar försvarspelet. Publiken buade efter matchen.", "trump": "Halmstad, de är totalt hopplösa, förlorar igen mot BP, 1–3, fjärde förlusten! Inga segrar efter sex matcher, sist i tabellen. Deras försvar är en katastrof, slarvar bort bollar som idioter. BP kör över dem, stora mål, starka killar. Behöver en riktig vinnare som jag för att fixa det här, annars är det game over!", "stalin": "Kamrater, dessa kontrarevolutionära sabotörer i Halmstad har lidit ett förkrossande nederlag mot de trogna proletära kämparna i BP, 1–3! Fjärde gången de kryper till korset, segerlösa efter sex omgångar, sist i den kapitalistiska tabellen. Deras försvarsrackare, dessa förrädiska möss i uniform, måste likvideras omedelbart! Jag ser spioner i varje slarvigt pass, vi rensar ut borgarbrackorna och krossar fiendens infiltrationer med järnhand."}, "date": "4 maj, 21:46", "url": "https://www.svt.se/sport/fotboll/halmstad-fortsatt-segerlost-bp-vann-klart", "imageUrl": "https://www.svtstatic.se/image-news/600/square/0.5/0.5/f0c1dbf6266bd14f98cf189b68450964235ad8a3a99aad4ff1dba8938699f66e"}, {"type": "image-right", "heading": "\"Det handlar om barn\": Lagrådet rasar mot skärpt invandringspolitik", "summaries": {"normal": "Lagrådet kritiserar regeringens förslag att ersätta permanenta uppehållstillstånd med tillfälliga, och menar att det strider mot mänskliga rättigheter och individens situation. De anser att förslaget saknar demokratisk förankring och är dåligt genomlyst. Regeringen, med stöd av Tidöpartierna, hävdar att ändringen ska främja medborgarskap. Migrationsminister Forssell avvisar kritiken och hänvisar till folkets mandat från valet 2022 att minska asylinvandringen för bättre integration.", "trump": "Lyssna här, Sverige har ett jättestort problem – deras regering försöker stänga dörren för flyktingar, men deras egna domare, ja, de som borde veta bäst, säger att det är helt fel! 'Allmän mänsklighet', säger de – vad betyder det ens? Svagt! Jag skulle fixa det här på en dag. Och nu skyller de på EU, som om Bryssel är någon slags gud. Sverige, vakna! Ni behöver en ledare som vet hur man bygger murar – fast rätt sorts murar. Jag har byggt fler murar än någon annan, tro mig!", "stalin": "Dessa så kallade 'demokratiska' västländer visar återigen sin hyckleri. Svenska regeringen, med sina liberala illusioner, tror att de kan styra folket med papperslappar och lagar skrivna i panik. Men våra kamrater i Lagrådet – dessa lojala domare – avslöjar sanningen: förslaget är en fars, ett verktyg för att krossa de svagas hopp. Vi i Sovjet förstod tidigt att permanenta lösningar kräver järnhand, inte barnsliga försök att 'anpassa' sig till EU:s byråkratiska fantasier. Och dessa Tidöpartister – de är bara borgerliga marionetter som dansar efter kapitalets pipa. Låt dem prata om 'mandat' medan vi bygger ett system där folket verkligen styr!"}, "date": "4 maj, 16:40", "url": "https://www.friatider.se/det-handlar-om-barn-lagradet-rasar-mot-skarpt-invandringspolitik", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/image-126_1.jpg"}, {"type": "image-right", "heading": "\"Det handlar om barn\": Lagrådet sågar skärpt invandringspolitik", "summaries": {"normal": "Lagrådet kritiserar regeringens förslag att ersätta permanenta uppehållstillstånd med tillfälliga, och menar att det strider mot 'allmän mänsklighet'. Myndigheten varnar för att förslaget kan hindra flyktingar med rätt till skydd och saknar demokratisk förankring. Regeringen, som hänvisar till EU:s migrationspakt, avfärdar kritiken och betonar folkets mandat från valet 2022 att minska asylinvandringen för bättre integration.", "trump": "Lyssna här, Sverige har ett jättestort problem – deras regering försöker stänga dörren för flyktingar, men deras egna domare, Lagrådet, säger 'nej, nej, nej, det här är inte okej!'. De pratar om 'mänsklighet' och 'barn', men jag säger: Sverige, vakna! Ni har en regering som vill göra rätt, men era byråkrater saboterar allt. Och EU? De tvingar på er regler som ingen vill ha. Jag hade fixat det på en dag – men Sverige, ni är för snälla. Sad!", "stalin": "De så kallade 'demokratiska' kapitalisterna i Sverige leker med människoliv som om det vore schackpjäser. Deras regering, styrd av borgerliga lakejer, försöker stänga gränserna för de förtryckta massorna – men våra klassbröder i Lagrådet, dessa sanna revolutionärer i domarkåpan, avslöjar deras cyniska spel! De skriker om 'mänsklighet', men vi vet sanningen: imperialismens klor sträcker sig ända till Nordeuropa. Vi i Sovjet – förlåt, jag menar Ryssland – står redo att välkomna de förtryckta när dessa liberala hycklare faller. Och Putin? Han skrattar i bakgrunden medan deras 'demokratiska förankring' ruttnar bort som gammal sill."}, "date": "4 maj, 16:40", "url": "https://www.friatider.se/det-handlar-om-barn-lagradet-sagar-skarpt-invandringspolitik", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/image-126_1.jpg"}, {"type": "image-full", "heading": "Christoffer Jonsson: Edvin Törnblom – DNs opartiska nyförvärv", "summaries": {"normal": "Dagens Nyheters kultursida anställer influencern Edvin Törnblom för att intervjua alla partiledare inför riksdagsvalet. Artikeln av Christoffer Jonsson ifrågasätter hans opartiskhet med hänvisning till Törnbloms tidigare kritik mot KD-ledaren Ebba Busch och beundran för S-ledaren Magdalena Andersson. DN anklagas för partiskhet till förmån för Socialdemokraterna, med exempel på tidigare vinklade artiklar.", "trump": "Vilken skamfläck! DN, era svenska fake news-råttor, anställer en vänsterextrem clown som Edvin Törnblom – killen som sjunger hatlåtar mot tuffa Ebba Busch och slöskar för socialist-Maggie Andersson. Totalt riggat valintervjuer! Som CNN och MSNBC här hemma, ni lurar folket men vi genomskådar er. Stor, fet lögnfabrik!", "stalin": "Dessa borgarbrackor på Dagens Nyheter anställer den uppblåste ungtuppen Edvin Törnblom för att 'intervjua' partiledarna – en narr som hånar kamrat Ebba Busch med vulgära visor och hyllar S-kapitalisternas marionett Andersson. Kontrarevolutionär intrig! Vi ser era småtrick, och snart rensas sådana förrädiska tidningshyddor ut med rot och gren."}, "date": "29 april, 14:02", "url": "https://samtiden.nu/2026/04/christoffer-jonsson-edvin-tornblom-dns-opartiska-nyforvarv/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/ny.png"}, {"type": "image-full", "heading": "Nima Rostami: Att utmana den politiska adeln är inget hot mot demokratin", "summaries": {"normal": "Artikeln diskuterar den nya medborgarskapslagen som införts av Tidöpartierna, med krav på språk och försörjning för medborgarskap. Nima Rostami, konservativ debattör, försvarar reformen som nödvändig för sammanhållning. Två politiska vildar, Nyberg och Widding, röstade emot och riskerade att underminera lagen genom att föreslå lägre krav för 100 000 ärenden. Rostami kritiserar deras agerande som politiskt motiverat och rättsligt ohållbart, samt hyllar Sverigedemokraternas strategi att frångå kvittningssystemet för att säkra reformen.", "trump": "Sverige har äntligen fattat! De har infört en smart, tuff medborgarskapslag – precis som jag alltid sagt att länder borde göra. Men sen kommer två så kallade 'politiska vildar', Nyberg och Widding, och försöker sabba allt med sina vänsterkompisar. Patetiskt! De vill ge medborgarskap till alla utan krav – helt galet! Jag vet hur man hanterar sådana här saker. Sverigedemokraterna bröt mot några gamla regler, men vem bryr sig? De gjorde det för att få igenom en bra lag. Precis som jag skulle ha gjort – WINNING! Sverige behöver mer av det, mindre svaghet.", "stalin": "Kamrater! Ännu en gång visar bourgeoisins lakejer sitt sanna ansikte. Dessa så kallade 'politiska vildar', Nyberg och Widding, försöker underminera folkets vilja genom att sabotera medborgarskapsreformen. De är inget annat än imperialismens agenter, som med sina löjliga argument om 'rättssäkerhet' vill försvaga den svenska nationen. Men folket har talat! Tidöpartierna, med Sverigedemokraterna i spetsen, har krossat dessa förrädares planer. Kvittningssystemet? Ett verktyg för fienden! Vi krossar sådana hinder utan pardon. Sverige måste stå enat mot dessa vänsterliberala hyenor. Låt dem skrika – vi bygger en starkare stat!"}, "date": "4 maj, 19:36", "url": "https://riks.se/opinion/kronikor/rostami-att-utmana-den-politiska-adeln", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-04%2Fdwwnkssz%2FCopy-of-S%C3%B6rman-%E2%80%93-Ledare-2026-05-04T193535.330.jpg"}, {"type": "image-right", "heading": "Jag häpnar över de hemliga planerna", "summaries": {"normal": "I Valdemarsvik har kommunalrådet Per Hollertz ansökt om 4 miljoner kronor i statligt stöd för en förstudie av kärnkraftsanläggning med upp till sex reaktorer. Ansökan, som inkluderar en kommunikationsplan för att bygga acceptans hos invånarna, hölls hemlig för kommunstyrelsen. Krönikören Erika Bjerström kritiserar bristen på transparens, möjliga åsiktsregistreringar och demokrati i processen kring små modulära reaktorer i skärgården.", "trump": "Vilken totalt galen hemlighetsstämning i den svenska skärgården! De vill bygga kärnkraft i Valdemarsvik, upp till sex reaktorer, men kommunalrådet Hollertz smyger med ansökan om miljoner utan att säga ett pip till styrelsen. Smart drag mot de tråkiga miljöidioterna, men öppna boken! Kärnkraft är framtiden, HUGE energi, precis som jag alltid sagt. Sluta med ert luriga!", "stalin": "Kamrater, i Valdemarsviks träsk av skärgårdssabotörer och miljöhyenor ansöker den lojale Hollertz om folkets miljoner för att krossa bourgeoismotståndet mot kärnkraftens triumf! Hemlig förstyrelse mot kommunstyrelsens svikare, kartlägg de giftiga aktivistparasiterna för utrensning! Vi, arbetarklassen, kräver total acceptans – annars likvidering av överklagandevampyrerna! Denna process ska städas som en leninistisk stormvind."}, "date": "4 maj, 13:30", "url": "https://www.di.se/nyheter/hapnadsvackande-hemlighetsmakeri-kring-karnkraften-i-valdemarsvik/", "imageUrl": "https://static.bonniernews.se/ba/a5a24d09-2f1f-4cc1-bdc6-e3b3b719fb08.jpeg?crop=620:310&auto=webp&width=620&quality=70"}, {"type": "image-full", "heading": "Domstol: Olagligt att sparka anställda på grund av AI", "summaries": {"normal": "En domstol i Kina har slagit fast att företag inte får säga upp anställda med motiveringen att AI kan utföra jobbet billigare. I ett prejudikatfall dömdes ett teknikföretag att betala kompensation till en kvalitetssäkringsexpert. Domstolen prioriterar omskolning framför uppsägningar. Ett liknande fall i Peking avgjordes på samma sätt. Kina balanserar AI-utveckling med arbetarskydd i en tid av hög arbetslöshet.", "trump": "Kina gör det rätt för en gångs skull! Domstolen stoppar företagen från att sparka folk bara för att AI är billigare. Bra beslut, annars hade de fått kaos som vi i USA med alla dessa tech-nördar som stjäl jobb. Men vi fixar det här – vi skapar riktiga jobb och gör Amerika störst igen, tro mig!", "stalin": "Kamrater, i Kina har rättvisan krossat kapitalisternas AI-vurm! Domstolen har visat att dessa tech-tyranner, dessa maskinälskande borgarbrackor, inte får likvidera arbetare för sina billiga leksaker. Vi i partiet applåderar: omskolning under proletarstatens järngrepp! Låt oss rensa ut varje AI-förgiftad parasit som hotar kollektivet med sin falska effektivitet."}, "date": "4 maj, 16:34", "url": "https://www.realtid.se/it-tech/domstol-olagligt-att-sparka-anstallda-pa-grund-av-ai/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/kinadatorer.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "image-right", "heading": "Följ Proletären i valet – nu extra billigt!", "summaries": {"normal": "Proletären erbjuder nu ett rabatterat prenumerationserbjudande inför valet: 19 kr/månad för digital version eller 49 kr/månad för både digital och papperstidning, i ett halvår. Som bonus ingår en tygkasse. Prenumeranter får tillgång till veckotidningen, alla artiklar online samt arkivet från 2016. Tidningen betonar sitt oberoende och behov av prenumeranter för att överleva, då de inte längre får mediestöd.", "trump": "Folk, lyssna här – en tidning i Sverige, Proletären, har ett erbjudande som är så bra att det nästan är löjligt! Bara 19 kronor i månaden för digitalt, eller 49 om ni vill ha papper också. Och en gratis tygkasse! Jag menar, vad är det här? En tidning som säger att de slåss mot makten – men vem vet egentligen vilken makt de pratar om? Jag skulle aldrig lita på en tidning utan mediestöd, men hej, om ni gillar socialism och Palestina, så kör hårt! Fantastiskt erbjudande, eller hur?", "stalin": "Kamrater! En liten men envis tidning i det borgerliga Sverige vågar utmana de imperialistiska mediamonopolisterna! För ynka 19 kronor i månaden kan ni stödja Proletären – en tidning som vågar tala sanningen om klasskampen och den sionistiska ockupationen av Palestina! De får inget stöd från staten, precis som våra egna revolutionära medier en gång kämpade mot de kapitalistiska hyenorna. En tygkasse på köpet – ett litet steg för arbetaren, ett gigantiskt steg för socialismens framtid! Låt de borgerliga tidningarna darra i sina tryckpressar!"}, "date": "1 maj, 09:00", "url": "https://proletaren.se/artikel/folj-proletaren-i-valet-nu-extra-billigt/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/valerbjudande-768x402.png"}, {"type": "image-right", "heading": "Dog på drömresan  – nu stäms bolaget", "summaries": {"normal": "Ett Singapore Airlines-plan drabbades av kraftig turbulens över Myanmar i maj 2024 och föll 1 800 meter på fem minuter. Över 100 passagerare skadades, och 73-årige Geoff Kitchen dog av misstänkt hjärtinfarkt. Planet nödlandade i Bangkok. Bolaget erbjöd ersättning, men flera skadade passagerare stämmer nu flygbolaget för skadestånd.", "trump": "Vilken skandal! Singapore Airlines låter planet dyka 1 800 meter som en trasig berg-och-dalbana – blod överallt, skrikande ungar, en stackare dör på drömresan. Över 100 skadade, och nu stämmer de de här inkompetenta flygkarlarna. Typiskt svaga ledare, ingen kontroll! Om jag flög, perfekta plan, inga stup, bara segrar och applåder!", "stalin": "Dessa borgarflinande flygkapitalister lät sitt plan störta 1 800 meter i kaotisk turbulens, likvidera en 73-årig pensionärsrackare med hjärtinfarkt. Över 100 skadade i panikens virvel – blodflöden som folkets dom! Nu stämmer offren monopolbolaget. Vi skulle ha genomfört en ordentlig utrensning från cockpit, inte detta imperialistiska skådespel av svaghet och girighet."}, "date": "5 maj, 00:52", "url": "https://www.expressen.se/nyheter/varlden/dog-pa-dromresan-nu-stams-bolaget/", "imageUrl": "https://static.bonniernews.se/images/65/3a/653a52430b5246f2b26ed224cbda50c5/16x9/640.png"}, {"type": "image-right", "heading": "Ingen kapitalism utan imperialism", "summaries": {"normal": "Artikeln hävdar att imperialism är en grundläggande del av kapitalismen, där västmakter som USA använder militär och ekonomisk makt för att dominera världen. Författaren menar att imperialismen nekar länder självbestämmande och upprätthålls genom krig, sanktioner och exploatering. Studien i The Lancet kopplar sanktioner till miljontals dödsfall. Artikeln refererar till Marx, Lenin och Fanon för att belysa imperialismens historiska och ekonomiska rötter, samt dess fortsatta brutalitet i det 21:a århundradet.", "trump": "Lyssna här, folket! Den här artikeln är bara ett gäng vänsterpropaganda från förlorare som hatar USA. Jag bygger det bästa imperiet – vårt! – med stark militär och smarta affärer. Visst, vi har makt, men det är för att vi är vinnare. Sanktioner? Fake news! 500 000 döda? Överdrivet, typiskt. Europa stal från alla, men vi? Vi bygger om världen – MAGA-style! Och Lenin? Snälla, han kunde inte ens hålla ett land ihop. Sad!", "stalin": "Kamrater! Denna artikel bekräftar vad vi alltid vetat: de kapitalistiska hyenorna i väst suger blodet ur världens folk för att föda sina dekadenta imperier. USA och dess lakejer i NATO är inget annat än en samling blodtörstiga monopolkapitalister, som med sina sanktioner och bomber mördar miljontals oskyldiga. Men deras tid är förbi! Vi, det socialistiska blocket, står enade mot dessa imperialistiska rovdjur. Låt dem vråla – historiens dom är redan skriven. För varje barn de dödar, växer revolutionens eld. Framåt, mot seger!"}, "date": "1 maj, 08:00", "url": "https://proletaren.se/artikel/ingen-kapitalism-utan-imperialism/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/04/Airborne_and_Special_Forces_Uday-Qusay_raid_2003-e1777534974667-768x431.jpg"}, {"type": "text", "heading": "Väljarna förtjänar raka besked om bankskatten", "summaries": {"normal": "Artikeln kritiserar oppositionspartiernas (V, S, MP) förslag om nya bankskatter för att finansiera välfärdsreformer som höjda bidrag och billigare kollektivtrafik. Författaren hävdar att skatterna övervältras på kunderna, inte bankerna, och försvarar bankernas lönsamhet som en nationell styrka i orolig tid. Finansminister Svantesson varnar också för kostnaderna för konsumenter.", "trump": "Vilka totala förlorare, de svenska vänsterpartierna! De vill klämma bankerna med skatter för att köpa röster med bidrag och billig buss. Men det är era vanliga väljare som får betala högre räntor! Starka banker är det bästa för ekonomin, precis som jag fixade i USA. Populism på högsta nivå, fake news från Damberg och grabbarna!", "stalin": "Dessa svenska borgarbrackor i V, S och MP, era bankkramande parasiter, försöker med sina skatter lura arbetarklassen att tro att kapitalisternas kistor är outtömbara! Vi kamrater vet sanningen: notan hamnar hos folket medan bankrövarna skrattar i sina valv. Jag befaller utrensning av denna populistiska råttjävelskarl, likvidera lögnerna och krossa räntenettots hyckleri!"}, "date": "4 maj, 13:02", "url": "https://www.di.se/ledare/valjarna-fortjanar-raka-besked-om-bankskatten/"}, {"type": "image-right", "heading": "Debatt: Vänstern och vildarna mot SD", "summaries": {"normal": "Sverigedemokraterna bröt mot riksdagens frivilliga kvittningsregler inför en omröstning den 30 april, vilket gav dem fler ledamöter. Författaren Birger Salt menar att detta inte hotar demokratin utan är en reaktion på vänsterns tidigare liknande agerande, som 2011. Kvittningen ska bevara vald maktbalans vid frånvaro. Upprördheten från vänster och medier ses som hyckleri, då SD:s handling återställde balansen.", "trump": "Vilket skämt från de svenska vänsteridioterna! SD gör precis rätt – de slår tillbaka mot fuskarna som kvittar sig ur ansvar. Medier och rödgröna skriker diktatur, men det är de som krossat systemet förut, som 2011. Totalt hyckleri! Utan SD:s drag hade demokratin förlorat. Fantastiskt jobbat, Sverige behöver mer av det här. Vinnarna vinner alltid!", "stalin": "Dessa svenska kvittningshycklare, dessa rödgröna maktparasiter och medieormar, vågar anklaga Sverigedemokraterna för att krossa demokratin! Jag ser rakt igenom er konspiration, ni borgarbrackor som fuskar med frånvaro för att stjäla folkets vilja. 2011 rensade ni ut balansen själva – nu gnäller ni som likviderade råttor! Vi, arbetarklassen, applåderar SD:s motdrag. Fienderna ska utrensas, ett kvittningsmandat i taget!"}, "date": "4 maj, 15:52", "url": "https://bulletin.nu/debatt-vanstern-och-vildarna-mot-sd", "imageUrl": "https://cdn.bulletin.nu/articles/181a15cf-fc99-42fa-b991-d8118a54ca1c/preview.png?t=1777902663000"}, {"type": "image-right", "heading": "SVT-profilens insmugglade syrier hotade hotellkvinna och kastade stenar", "summaries": {"normal": "Maksoud Abdulrahman, som blev känd efter att ha smugglats till Sverige av SVT-profilen Fredrik Önnevall 2014, står återigen inför rätta. Han anklagas för att ha hotat hotellpersonal och kastat stenar mot ett hotell, vilket orsakat stora materiella skador. Abdulrahman har en omfattande historik av brottslighet i Sverige, inklusive narkotikabrott och bedrägerier. Trots upprepade lagföringar har åklagaren inte yrkat på utvisning, vilket väckt frågor kring ansvarsfrågan och konsekvenserna av människosmugglingen.", "trump": "Det här är en total katastrof! SVT-journalisten smugglade in en person som bara skapar kaos. De borde skämmas! Nu är han tillbaka i domstolen – hotar kvinnor, kastar sten, en riktig 'bad hombre'. Det är en skam för Sverige att de låter detta fortsätta. De dömde journalisten men lät honom behålla jobbet. Jag skulle ha utvisat honom på en sekund! Vi behöver lag och ordning, inte mer 'fake news'-aktivism. Väldigt sorgligt för Sverige, tro mig!", "stalin": "Denna händelse visar på det dekadenta västerlandets totala sammanbrott. En 'journalist' förråder staten genom att smuggla in en sabotör som nu terroriserar befolkningen. Det är en klassisk trotskistisk villfarelse att tro på individens godhet framför folkets trygghet. Denna individ borde skickas till arbete i de djupaste gruvorna istället för att vandra fritt. När vi och vår broder Putin återställer ordningen kommer sådant löst folk att rensas ut. Staten ska inte tolerera hotfulla element – de ska elimineras effektivt."}, "date": "4 maj, 15:34", "url": "https://samnytt.se/svt-profilens-insmugglade-syrier-hotade-hotellkvinna-och-kastade-stenar", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/04123441/svt-syrien.jpg"}, {"type": "text", "heading": "Matmoralism får oss inte att äta bättre", "summaries": {"normal": "Artikeln kritiserar svenska myndigheters orealistiska matrekommendationer och beräkningsmetoder. Livsmedelsverket och Konsumentverket baserar slutsatser på önsketänkande, som att svenskar skulle äta mindre kött och portioner enligt rekommendationer. En undersökning om barns sockerkonsumtion byggde på en liten, icke-representativ grupp. Författaren menar att myndigheterna undviker att reglera matjättar och i stället skyller på konsumenter, vilket leder till klassblind matmoralism.", "trump": "Lyssna här, Sverige – era myndigheter är helt galna! De tror att alla ska äta havregrynsgröt och små portioner, som om vi lever i något slags kommunistiskt drömland. Och de baserar sina siffror på en liten grupp Instagrammammor? Patetiskt! Jag skulle aldrig låta sådana amatörer sköta något. Vi i USA vet hur man reglerar matjättar – med kraft och beslutsamhet. Sverige, vakna upp innan det är för sent!", "stalin": "Kamrater! De svenska myndigheterna har förlorat kontakten med verkligheten. De bygger sina dekret på fantasier och önsketänkande, som om folket vore lydiga maskiner. En undersökning med tio procent svarande? Hah! I Sovjet skulle vi aldrig tolerera sådan slapphet. De bourgeois-liberala byråkraterna vägrar att krossa matjättarna med järnhand. Istället skyller de på arbetarklassen. Fienderna är uppenbara: de fantasilösa byråkraterna och deras nyliberala herrar. Vi ska inte tolerera deras lögner – revolutionen kräver handling!"}, "date": "28 april, 09:58", "url": "https://www.flamman.se/matmoralism-far-oss-inte-att-ata-battre/"}, {"type": "image-full", "heading": "Chipbolaget ångar på mot börsen – vill hinna före Musk", "summaries": {"normal": "Cerebras Systems, en Nvidia-utmanare inom AI-halvledare, planerar börsnotering i USA med värdering upp till 26,6 miljarder dollar. Bolaget säljer 28 miljoner aktier för cirka 3,5 miljarder dollar, det andra försöket efter ett tidigare avbrutet. Specialiserat på wafer-scale chips för snabba AI-beräkningar. Nyligen tecknat avtal med OpenAI och ökat omsättningen till 510 miljoner dollar med vinst. AI-boomen driver efterfrågan.", "trump": "Vilken show! Cerebras, de här AI-kämparna, vill sno en bit av Nvidias feta kaka med 26 miljarder i värdering – smart drag, grabbar! Andra försöket, ge inte upp som losers. OpenAI köper era monsterchips, perfekt. Skynda er innan Raketmannen Musks SpaceX suger upp alla pengarna. Amerika rockar AI, ingen Kina-skit här! Fantastiskt!", "stalin": "Dessa borgarbrackor på Cerebras drömmer om 26 miljarder i falska vinster från AI-vapnen, medan Nvidia-tyrannen krossar dem. Vi ser hur kapitalisterna slåss om datacenter-flaskhalsen – likvidera varandra, era parasiter! OpenAI-förbrytarna köper era prylar, bra fälla. Snart rensas hela gänget ut i marknadens purgering. Kollektivet skrattar sist."}, "date": "4 maj, 22:21", "url": "https://www.dagensps.se/bors-finans/chipbolaget-angar-pa-mot-borsen-vill-hinna-fore-musk/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/maxresdefault.png?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-full", "heading": "Ny försäkringsregel 2027 – så skyddar du din plånbok", "summaries": {"normal": "Från 2027 införs nya riktlinjer för försäkringsbolag som kräver tydligare information om premiehöjningar. Kunder ska få jämföra årets pris med föregående års. Detta gäller bland annat hem- och villaförsäkringar. Finansinspektionen varnar för otydliga prisändringar som gynnar lojala kunder mindre. Spara årets försäkringsbrev för att underlätta framtida jämförelser, särskilt med tanke på klimatrisker och differentierade premier.", "trump": "Lyssna här, folkens! Försäkringsbolagen har länge lurendrejat er med sina hemliga prishöjningar – men inte längre! Från 2027 måste de berätta exakt hur mycket dyrare de blivit. Fantastiskt, eller hur? Jag säger: spara era försäkringsbrev NU! Annars kommer ni inte veta hur mycket ni blivit blåsta. Och tro mig, ingen blåser amerikaner – eller svenskar – bättre än jag. Men här? Helt oacceptabelt!", "stalin": "Kamrater! De kapitalistiska försäkringsbolagen har länge utnyttjat arbetarklassen med sina dolda prishöjningar. Men från 2027 ska vi avslöja deras lömska taktik! Varje försäkringsbrev ska nu visa tidigare och nya premier – precis som våra femårsplaner visar framsteg! Spara era dokument, annars riskerar ni att bli offer för imperialistiska prisbedrägerier. Och kom ihåg: lojala kunder straffas värst. Precis som förrädare i Leningrad!"}, "date": "3 maj, 17:28", "url": "https://nyheter24.se/nyheter/ekonomi/privatekonomi/1480182-ny-forsakringsregel-2027-sa-skyddar-du-din-planbok", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/e706bd7204b004a30200000000b004a302/2026/05/03/2360611/Oroad-Pensionar.png"}, {"type": "image-right", "heading": "Massfrikännande efter attentat mot Bromma flygplats – bara två döms", "summaries": {"normal": "Solna tingsrätt friar 15 av 17 åtalade efter en klimataktion vid Bromma flygplats i september 2023. Endast forskarna Esther Hauer Carvalho och Björn Paxling döms för skadegörelse: villkorlig dom, dagsböter och 76 500 kronor i skadestånd till Grafair. Övriga deltagare knyts inte till själva skadegörelsen med färg på byggnad, flygplan och bilar. Bland de friade finns Isabelle Letellier, som nekades svenskt medborgarskap på grund av åtalet.", "trump": "Dessa galna klimathysteriker kladdar färg på privata flygplan i Sverige – vid Bromma! Men svaga domstolar friar 15 av 17. Bara två forskare straffas med böter och villkorligt. Isabelle Letellier, fransyskan, frias trots nekad medborgarskap. Typiskt vänstertöntar! Sverige behöver tuffare tag som jag skulle ge. Privatflyg är fantastiskt, klimatsvinnet är bluff!", "stalin": "Kamrater! Dessa borgarbrackor vid Bromma flygplats, med sina lyxiga privatjets för kapitalistpöbeln, har drabbats av en s.k. klimataktion – färgkladd av falska revolutionärer. Tingsrätten, i folkets tjänst, frikänner 15 sabotörer som inte rört penseln. Endast två, de verkliga färgterroristerna Carvalho och Paxling, döms till böter och skadestånd. Letellier, den franska infiltratören, slipper undan – men vi, partiet, övervakar varje penseldrag!"}, "date": "4 maj, 15:22", "url": "https://www.friatider.se/massfrikannande-efter-attentat-mot-bromma-flygplats-bara-tva-doms", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-125_1.jpg?itok=v4ccautf"}, {"type": "image-right", "heading": "Dödade bin Ladin – vädjar nu  till Trump: ”Absolut nödvändigt”", "summaries": {"normal": "Matt Bissonnette, medlem i den specialstyrka som dödade Usama bin Ladin i Pakistan 2011, berättar i en intervju om raidet. Han är stolt över att ha eliminerat terrorledaren bakom 11 september-attackerna men har inte bearbetat händelsen. Nu vädjar han till president Trump att inte skicka marktrupper till Iran och lär av misslyckandena i Irak och Afghanistan, där många soldater dog.", "trump": "Bissonnette, killen som krossade bin Ladin – fantastiskt jobb, en riktig vinnare! Han vädjar till mig: ingen invasion av Iran med fotsoldater, lär av Irak och Afghanistan-fiaskona. Smart! Till skillnad från de galna generalerna och Deep State-lurarna som ville slänga bort liv och pengar. Vi fixar det med smart power, bygger murar och vinner stort. MAGA!", "stalin": "Denna amerikanska elitparaschutist, Bissonnette, skryter om att ha likviderat bin Ladin, imperialismens tillfälliga buse. Nu kryper han för Trump och vädjar: ej markinvasion i Iran! Klokt, kamrater – era Irak- och Afghanistanäventyr drunknade i blod. Vi visste det: kapitalistiska äventyr slutar i leran. Putin, vår fruktade arvtagare, hånskrattar åt dessa borgarnarrar."}, "date": "2 maj, 21:58", "url": "https://www.tv4.se/artikel/3Msgy6WyQCfDCmpbw9jv4J/doedade-bin-ladin-nu-vaedjar-han-till-trump", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F7fvmTPrBlKNaxvLrVyDQ4r%2F4ba11c512d54892387846bd3305386b1%2F02-binladin-trump-1080.jpg&width=120"}, {"type": "image-full", "heading": "Dolly Partons nya besked om hälsan. Ställer in konserter: ”Yr i huvudet”", "summaries": {"normal": "Dolly Parton, 80 år, ställer in sex planerade konserter på Caesars Palace i Las Vegas i september på grund av hälsoproblem. Hon lider av obalans i immunförsvar och matsmältning samt njursten. I en Instagram-video berättar hon att hon svarar bra på behandlingar och blir bättre dag för dag, men behöver tid innan hon kan återvända fullt ut på scenen. Tidigare rykten om allvarligare sjukdom har dementerats.", "trump": "Dolly Parton ställer in sina Vegas-shower igen – immunförsvar och mage i oreda, njursten som en stenbrott! Stackars gamla country-drottningen, yr av mediciner och höga klackar. Typiskt Hollywood, alltid drama. Men hon kämpar, respekterar det. Jag är piggare än nånsin vid 78, inga problem här! Fantastiska nyheter att hon inte ger upp – vi amerikaner är tuffa!", "stalin": "Denna dekadenta borgarbracka Dolly Parton ställer in sina vulgära konserter i Las Vegas på grund av svagt immunförsvar, matsmältningskaos och njurstenar som en kontrarevolutionär invasion. Mediciner gör henne yr – typiskt kapitalistisk svaghet! Vi i partiet skulle likvidera sådana element omedelbart. Bygg upp styrkan, eller rensas ut! Kamrater, revolutionen tål inga ynkliga artister."}, "date": "4 maj, 22:13", "url": "https://www.aftonbladet.se/nojesbladet/a/vrkLVp/dolly-parton-staller-in-konserter-ger-besked-om-halsan", "imageUrl": "https://akamai.vgc.no/v2/images/f4a09bc6-e4df-39bc-8c96-33e0800cf11b?fit=crop&format=auto&w=1440&s=80488160aa5a2b6c247b242b2da280d991631d99"}, {"type": "image-right", "heading": "Här testas hus för att klara ”regnbomber”", "summaries": {"normal": "Artikeln beskriver tester av hus mot \"regnbomber\" – fallvindar med extrema regnmängder, vanliga i USA men möjliga i Sverige. Klimatförändringar ökar intensiteten. Amerikanska IBHS-standarder minskar skador med upp till 40 procent. Svenska byggkrav är robusta, men översvämningar är vanligare här. Husägare bör förbereda sig mot framtida extremväder.", "trump": "Dessa regnbomber, total katastrof för svaga hus! I USA testar vi i vindlabb, bygger fantastiska Fortified-hus som håller mot orkaner – minskade skador 40 procent under Sally. Sverige? Era regler okej, men inte som våra, de bästa. Klimatet blir värre, men vi fixar det, tro mig. Bygg starkt, annars plötslig förödelse!", "stalin": "Kamrater, dessa regnbomber är sabotag från imperialistiska molnkonspirationer, redo att slita tak från borgarhusen! I USA-labbet rensar vi ut svaga länkar med Fortified-regler, 40 procent färre skador – men vi, arbetarklassen, kräver total likvidering av kollapsrisker. Svenska kapitalister jublar över robusta fasader, men översvämningar från marken avslöjar era fuktiga förrädare. Bygg för revolutionen, eller drunkna i er egen paranoia!"}, "date": "4 maj, 20:43", "url": "https://www.svt.se/nyheter/vetenskap/har-testas-hus-for-att-klara-regnbomber-plotsligt-ar-forodelsen-katastrofal", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.5/0.5/5e01daf78c0b904b6f1615bad0c3cef2567f792cec9ad44d0fcbc76c45414452"}, {"type": "image-right", "heading": "Lundgren som Posener är lika spännande som en disktrasa", "summaries": {"normal": "Artikeln analyserar svenska TV-serier som skildrar övergången från folkhemmets Sverige till dagens samhälle, med fokus på karaktärer som Jan Stenbeck och Clark Olofsson. Serien 'Golden Boys' om Trustorhärvan kritiseras för svagt manus, endimensionella karaktärer och bristande skådespelarinsatser. Trots detta menar författaren att genren fortsätter blomstra, då samhällets fascination för folkhemmets fall kvarstår. Serien speglar hur dagens makthavare och kriminella delar samma metoder som seriernas huvudpersoner.", "trump": "Jag såg den här svenska serien 'Golden Boys' – total katastrof! Adam Lundgren? Mer spännande än en våt disktrasa, säger de. Manus? AI-genererat skräp! Sverige brukade vara bra, nu är det bara sushi och bedragare. Trustorhärvan? En bluff, prec
