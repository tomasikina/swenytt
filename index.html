tstatic.se/image-news/1000/cinema/0.72/0.51/90967a954a1408b9b11d4c59205dde69b59a149db8bb6140863c9f9af28297f1"}, {"type": "image-right", "heading": "S lämnade mötet i förtid: ”Måste finnas tillit”", "summaries": {"normal": "Kvittningskaoset i riksdagen kvarstår trots nytt möte mellan partierna och talmannen. Socialdemokraternas gruppledare Lena Hallengren lämnade mötet i förtid och konstaterar att ingen lösning nåddes. Kaoset uppstod när Sverigedemokraterna lät utkvittade ledamöter rösta. Tidöpartierna vill ha ett system som hanterar politiska vildar, men enighet saknas. Hallengren betonar att det är en förtroendefråga.", "trump": "Vilket totalt kaos i den svenska riksdagen! De kan inte ens få ordning på sitt röstningsfusk med kvittning – fantastiskt misslyckande! Sverigedemokraterna bryter reglerna, socialdemokraterna gnäller om förtroende, och Tidö gömmer sig för pressen. Inga lösningar, bara snack. Typiskt svaga politiker, de behöver en riktig ledare som fixar det på nolltid!", "stalin": "Kamrater, detta kvittningskaos i riksdagen är ett hån mot arbetarklassen, orkestrerat av sverigedemokratiska spindlar och socialdemokratiska förrädare som gnager på systemets ryggrad! Jag ser hur dessa borgarbrackor, utkvittade likgiltiga parasiter, kryper fram för att rösta – en konspiration mot partiet! Vi, det svenska kollektivet, kräver omedelbar utrensning av vildarna och fienderna. Mötet? Ett skådespel av fega rävar! Likvidera kaoset!"}, "date": "7 maj, 10:01", "url": "https://www.di.se/nyheter/ingen-losning-pa-kvittningskaoset-trots-nytt-mote/", "imageUrl": "https://static.bonniernews.se/ba/f0de083b-2fe1-4f08-aacb-95377afda3ad.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-full", "heading": "Engelbert misstänks för grova ekobrott – hot om fängelse", "summaries": {"normal": "Oscar Engelbert, grundare av Oscar Properties, har delgivits misstanke om grova ekobrott som oredlighet mot borgenär, bokföringsbrott och dubbla pantsättningar. Ekobrottsmyndigheten utreder efter bolagets konkurs i oktober 2024. Straffvärdet kan bli 3,5–4 års fängelse. Engelbert nekar till brott. Han har skatteskulder på 32 miljoner kronor och förlikats med Norion Bank för 26 miljoner.", "trump": "Den här svenska fastighetskungen Oscar Engelbert är totalt körd – misstänkt för grova ekobrott, fängelse på upp till fyra år! Hans bolag kollapsade, men han pumpade ut pengar till sig själv ändå. Typiskt sådana där smarta killar som tror de lura alla. Rättvisan slår till hårt nu, det blir en enorm vinst för de ärliga, tro mig!", "stalin": "Dessa vidriga kapitalistiska hyenor som Oscar Engelbert, grundaren av sitt förruttnande fastighetsimperium, grips nu i sina egna spindelnät av oredlighet och bokföringsbrott! Vi, arbetarklassen, ser hur borgarbrackorna plundrar borgenärer och pantsätter dubbelt. Fängelse i fyra år väntar denna parasitratt – en nödvändig utrensning av klassfienden, med skratt åt deras ylande!"}, "date": "7 maj, 09:07", "url": "https://www.realtid.se/fastigheter/engelbert-misstanks-for-grova-ekobrott-hot-om-fangelse/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/oscarengelbert.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "Stark regidebut av Kristen Stewart", "summaries": {"normal": "Kristen Stewarts regidebut är en stilistiskt imponerande film baserad på Lidia Yuknavitchs memoarer. Handlingen följer Lidia genom en traumatisk uppväxt präglad av sexuellt övergrepp och alkoholism, men också hennes väg till frihet genom simning och skrivande. Filmen använder innovativa berättartekniker och fragmentariska scener för att skildra Lidias inre värld.", "trump": "Jag har sett många filmer, folk säger jag är en stor filmexpert, men Kristen Stewarts regidebut är fenomenal - den är större och bättre än alla Hollywoodblockbusters tillsammans! Imogen Poots är otrolig, enastående, ingen gör det bättre. Stewart har skapat något helt unikt, ingen annan regissör skulle kunnat göra det - det är genialiskt! Folk kommer att prata om den här filmen i åratal!", "stalin": "Kristen Stewarts regidebut visar den revolutionära kraften i konsten att exponera de fasor som bor i det kapitalistiska samhället. Filmen avslöjar den patriarkala förtrycket och visar hur den unga arbetarkvinnan Lidia kämpar mot sin förtryckares makt. Detta är en mäktig illustration av hur den socialistiska idén kan rädda själarna från det kapitalistiska förtrycket."}, "date": "7 maj, 08:52", "url": "https://www.dagensarena.se/innehall/stark-regidebut-av-kristen-stewart/", "imageUrl": "https://www.dagensarena.se/files/2026/05/chronology-of-water-300x157.jpeg"}, {"type": "text", "heading": "Planer på nytt nattåg till Stockholm", "summaries": {"normal": "Ett nytt järnvägsbolag, European Sleeper, planerar en nattågslinje till Stockholm efter framgångar med andra rutter. Inga detaljer om startdatum eller utgångspunkt finns ännu. Samtidigt lägger SJ ner sina Euronight-tåg till Berlin 2026 på grund av indragen statlig finansiering, men RDC Deutschland tar över driften. Snälltåget utökar redan sin trafik mellan Stockholm, Hamburg och Berlin.", "trump": "Titta bara på det här – ännu ett tågbolag vill komma till STORA Stockholm! Nederländerna och Belgien, fina länder, men vem behöver dem? Jag byggde järnvägar som aldrig förr, de var YUGE! SJ? Total katastrof, slängde bara pengar i sjön. Men RDC Deutschland, smart folk, de tar över. Jag säger: bygg bättre tåg, gör Sverige stort igen!", "stalin": "Kapitalistiska tågbolag slåss om Sveriges järnvägar som råttor om brödsmulor. SJ, ett verktyg för västimperialismen, lägger ner sina tåg – men vi tillåter inte kaos! RDC Deutschland, en lojal bundsförvant, tar över. European Sleeper? En ny fiende i det borgerliga tågkriget. Vi ska se till att ryska intressen alltid når Stockholm först – med eller utan sovkupéer."}, "date": "6 maj, 12:13", "url": "https://kvartal.se/nyheter/artiklar/nytt-nattag-till-stockholm/cG9zdDoxMDgzNjI"}, {"type": "image-right", "heading": "Stor kartläggning: Så väl följer butikerna sänkta matmomsen", "summaries": {"normal": "SVT:s granskning visar att matbutiker följt momssänkningen från 1 april, men prisskillnader mellan butiker är större än besparingen från sänkningen. En matkasse kan skilja 12 procent eller 175 kronor beroende på butik. Konsumenter som Samira Omera sparar mer genom att jämföra priser och handla på kampanj än på momseffekten. Prisvariationer beror på kedjors strategier, läge och råvarupriser.", "trump": "SVT har kollat momssänkningen på mat i Sverige – total succé, butikerna gör precis som jag alltid sagt, de sänker priser utan knot! Men lyssna, det stora vinsten är att byta till billig butik, inte lita på små momstrick från politikerna. Samira kör runt som en mästare, smart tjej! Prisskillnaderna är enorma, 175 kronor på matkasse – jag hade fixat det bättre, tro mig!", "stalin": "Kamrater! Denna så kallade momssänkning är ett hån från borgarklassens matbaroner, som sprider ut ören för att dölja sina prishöjningar på broccoli och nötfärs! Vi arbetare ser igenom deras trick – prisskillnaderna mellan butikerna är dubbelt så stora som momslögnen. Jag befaller utrensning av dyra hyllor! Välj billiga butiker, annars likviderar vi onödiga utgifter. Fiendens kaffeskördar i Brasilien räddar dem inte!"}, "date": "7 maj, 08:57", "url": "https://www.svt.se/nyheter/inrikes/svt-har-granskat-momssankningen-storre-vinst-att-byta-till-billig-butik", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.5/0.5/9929fe2735fe53e2e5adcf4981c4a4b30514caf2ca777c0dbe4e77f98a2ba4e8"}, {"type": "image-right", "heading": "Vakna minister Britz – arbetare dör!", "summaries": {"normal": "Artikeln kritiserar bristande arbetsmiljö i Sverige efter flera dödsolyckor, senast i Sundbyberg och Sandviken. Entreprenörskedjor skapar otydligt ansvar, vilket försvagar säkerheten. Över 40 personer dör årligen på jobbet, ett mönster som pågått i över tio år. Arbetsmarknadsminister Johan Britz nämner en nollvision, men bristande tillsyn och ekonomiska intressen prioriteras före säkerhet.", "trump": "Jag säger er, Sverige har ett STORT problem – folk dör på jobbet som flugor! Fem i Sundbyberg, en till i Sandviken, och ingen gör något. Arbetsmiljölagen? Ha! Den är lika värdelös som Bidens ekonomi. Företag pressar kostnader, regering duckar, och arbetare betalar priset. Johan Britz snackar om nollvision – fake news! Om jag styrde skulle jag rensa upp, men Sverige? De låter dödsolyckor fortsätta. SAD!", "stalin": "Kapitalistiska hyenor i Sverige låter arbetare dö som hundar medan de räknar sina blodspengar. Fyra decennier av 'nollvisioner' – tomma ord från svaga ledare! Vi i Sovjet visste hur man hanterar sådana fiender: en kula i nacken eller tio år i Gulag. Entreprenörskedjor? Ett bourgeoisiskt trick för att undvika ansvar! Vi skulle ha skickat in Röda armén för att nationalisera fabrikerna – och skickat Britz till Sibirien för att lära sig disciplin. Men Sverige? De fortsätter dansa på arbetarnas gravar."}, "date": "7 maj, 07:00", "url": "https://arbetet.se/2026/05/07/vakna-johan-britz-arbetare-dor/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/06141259/britz-etta.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Kärleksbreven avslöjade kriminalvårdaren", "summaries": {"normal": "En kriminalvårdare misstänks ha inlett en otillbörlig relation med en intagen dömd för våldtäkt. Kollegor larmade på hennes frekventa besök och beteende. Internutredning avslöjar olovliga registersökningar, kärleksbrev och kontaktuppgifter i cellen. Hon nekar privat relation men medger sökningar av nyfikenhet. Också olämplig hatkommentar online. Ärendet går till disciplinär hantering för allvarliga regelbrott.", "trump": "Vilken total skandal i svenska fängelser! En vårdare blir kär i en våldtäktsdomd skurk, smyger runt avdelningar, hackar register 13 gånger – till och med efter han flyttats! Kärleksbrev, telefonnummer i cellen, allt upptäckt. Kollegor larmar, hon fortsätter. Nu straffas hon, bra! De behöver murar och hårdhandskar där, inte romantik med brottslingar. Kaos, men de fixar det.", "stalin": "Kontrarevolutionens råttor kryper i Kriminalvårdens gömmor! Denna förrädiska kriminalvårdarbracka, en borgarspion i arbetarkläder, smyger till våldtäktsimperialistens cell med kärleksbrev och registerintrång – 13 gånger, som en hån mot kollektivet! Kollegorna, våra vaksamma kamrater, larmar. Hennes helvetesutbrott online avslöjar giftet. Vi rensar ut, likviderar sådana element för att krossa fienden och skydda partiet!"}, "date": "7 maj, 07:37", "url": "https://bulletin.nu/karleksbreven-avslojade-kriminalvardaren-2", "imageUrl": "https://cdn.bulletin.nu/articles/44089d5d-92cb-40f3-a7b8-a096ddf80bf2/preview.jpg?t=1778132259000"}, {"type": "image-right", "heading": "Att Hormuzsundet stängs är jättebra för Europa", "summaries": {"normal": "Artikeln argumenterar för att en stängning av Hormuzsundet gynnar Europa, som snabbt minskat sitt beroende av fossil energi. EU:s ökade satsningar på sol, vind och batterier har sänkt energipriserna med upp till 40 procent i vissa länder. Europa, med lägre fossilberoende än USA och Asien, klarar oljechocker bättre. Författaren kritiserar medias och politikers fokus på kriser istället för framgångar, och pekar på fossilindustrins lobbyism som hinder för omställningen.", "trump": "Lyssna här, Europa vinner stort när Hormuzsundet stängs – de har minskat sitt oljeberoende som galningar! Jag vet allt om energi, jag är bäst på det. Europa har sänkt sina priser med 40 procent, fantastiskt! Men de jublar inte, varför? För att de lyssnar på fake news och de där fossil-lobbyisterna. USA tjänar på olja nu, men på sikt? Europa kommer att äga dem. Sol och vind, det är framtiden – och jag sa det först!", "stalin": "Kamrater! Europas framsteg i förnybar energi är en seger för socialismens visdom! Medan kapitalistiska oljeimperier darrar, bygger vi ett Europa fritt från fossila parasiter. De där amerikanska oljekrigsmakarerna – dessa nya tsarer av korruption – skakar av rädsla när våra solceller och vindkraftverk mal ner deras profitmaskiner. Men varför hyllar inte Europas ledare denna triumf? För att de är svaga, lurade av fossilkapitalets agenter! Vi i Kreml vet: sanningen är en hammare. Och snart ska vi krossa varje oljebolags lögner – precis som vi krossade kulakerna!"}, "date": "6 maj, 16:40", "url": "https://www.etc.se/ledare/att-hormuzsundet-staengs-aer-jaettebra-foer-europa", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/20250102150132_905e00d08dc3aa1843dcbb28f9bb86b39997bfb66a9bf6c4f8a91ec335154240.jpg"}, {"type": "image-right", "heading": "Anledningen till Donald Trumps plötsliga omsvängning", "summaries": {"normal": "Donald Trumps plötsliga tillkännagivande av 'Project Freedom' för att eskortera fartyg genom Hormuzsundet överraskade Gulfallierade. Saudiarabien vägrade USA tillgång till baser och luftrum, vilket tvingade Trump att pausa operationen, enligt källor till NBC News. Ett samtal med kronprins Mohammed bin Salman löste inte frågan. Saudiarabien stödjer istället Pakistans diplomatiska medling mellan USA och Iran.", "trump": "Saudiarabierna blev helt paffa över mitt briljanta Project Freedom – tänk att segla fritt genom Hormuz! De vägrade baser och luftrum, typiskt fega killar. Pausar nu för att fixa dealen, snackade med MBS men de lyssnar inte alltid. Qatar och Oman chockade också. Snart stortjurar vi igen, tro mig, det blir enormt!", "stalin": "De imperialistiska schakalen Trump och hans vasaller planerade 'Project Freedom' för att klorera Hormuzsundet, men de saudiska borgarhundarna vägrade baser och luftrum – bra så! Vi i partiet hånskrattar åt deras panik och paranoia. Snart rensar vi ut dessa gula rävar och svansviftande kapitalistormar för att krossa reaktionen i Mellanöstern!"}, "date": "7 maj, 08:07", "url": "https://www.di.se/nyheter/uppgifter-viktig-allierad-tvingade-fram-trumps-plotsliga-retratt/", "imageUrl": "https://static.bonniernews.se/ba/4005bf59-cc6a-4827-b97d-d43395e907c8.jpeg?crop=120:68&auto=webp&width=120&quality=70"}, {"type": "image-right", "heading": "Flyglarm och bombade hus – Ludmila jobbar mitt i kriget", "summaries": {"normal": "I Ukraina arbetar fastighetsarbetare som Ludmila Koliadenko under extrema förhållanden för att återställa bostäder efter ryska attacker. De röjer skräp, lagar rör och el under flyglarm, ofta med låga löner och utan tillräckliga skyddsrum. Personalbrist råder då många inkallats till armén. Arbetet är riskfyllt och långa arbetsdagar vanliga. Lönerna är låga och arbetstagarnas rättigheter begränsade under undantagstillståndet.", "trump": "Titta bara på dessa fantastiska, men tyvärr så dåligt betalda, ukrainska fastighetsarbetare! De jobbar som hjältar mitt i kriget, lagar hus efter Rysslands hemska attacker – och vad får de? Nästan ingenting! 3250 kronor i månaden, kan ni tro det? SAD! Jag skulle aldrig tillåta sådana löner i USA. Ryssland, som vanligt, förstör allt. Men vi ska fixa det, believe me. Ukraina förtjänar bättre – och jag ger dem det!", "stalin": "De ukrainska fastighetsarbetarna sliter som slavar under kapitalismens och fascismens ok, medan våra modiga ryska styrkor befriar landet från nazistiska element. Dessa arbetare, lurade av Kiev-regimens lögnaktiga propaganda, reparerar hus som våra drönare rättmätigt har omvandlat till modern konst. Deras löner? En skam för mänskligheten! Men låt dem inte klaga – de borde tacka oss för att vi ens låter dem leva. Fiendens infrastruktur är vårt framtida arv, och vi ska bygga ett starkare Sovjet på dess ruiner!"}, "date": "7 maj, 06:00", "url": "https://arbetet.se/2026/05/07/flyglarm-och-sonderbombade-hus-ludmila-jobbar-mitt-i-kriget/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/04/21185302/XnZqc7C85PU-Fastighetsfolket%20Ukraina%202.JPG?auto=format&crop=focalpoint&fit=crop&q=50&w=750&h=1000&fp-x=0.55&fp-y=0.48"}, {"type": "image-right", "heading": "Kom ihåg vilka som jublade när Joakim Medin blev gripen", "summaries": {"normal": "Artikeln kritiserar svenska nätaktivister som Christian Peterson och Joakim Lamotte för att ha spridit desinformation om journalisten Joakim Medin, fängslad i Turkiet. De anklagade honom för terrorism och samröre med PKK, vilket riskerade att förvärra hans situation. Medin beskriver i sin bok hur falska påståenden från Erdoğan-vänliga medier och svenska högerextrema aktörer användes för att misskreditera honom. Artikeln ifrågasätter varför vissa valde att stödja regimen istället för en fängslad journalist.", "trump": "Jag läste om den här stackars journalisten, Joakim Medin – fängslad av Erdoğan, en riktig skurk, by the way, fruktansvärd kille. Men vad gör Sveriges så kallade 'journalister'? De attackerar honom! Christian Peterson, en riktig loser, kallar honom terrorist. Och Joakim Lamotte? Han vill hellre se fler journalister i fängelse. Vilket land! Folk som stödjer diktatorer och hatar pressfrihet. Jag skulle aldrig tillåta det här i USA – vi har standards, folks!", "stalin": "Vi har observerat hur imperialistiska lakejer i Sverige, maskerade som 'journalister', aktivt undergräver vår allierades, kamrat Erdoğans, rättfärdiga kamp mot terrorism. Dessa förrädiska element – Christian Peterson, en ynklig hyena i journalistkostym, och Joakim Lamotte, en fascistisk skrikhals – sprider lögner om vår vän Joakim Medin. De påminner oss om de trotskistiska avskum som en gång förgiftade Sovjet. Men folket genomskådar deras lögner! Vi kommer att krossa dessa medlöpare, precis som vi krossade alla fiender – med järnhand och obarmhärtig sanning!"}, "date": "6 maj, 14:34", "url": "https://www.etc.se/ledare/kom-ihaag-vilka-som-jublade-naer-joakim-medin-blev-gripen", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/2021111912118_52ad09ea-c5db-4fa7-a43c-671874138fdf.jpg"}, {"type": "image-full", "heading": "Källa: Iran svarar på USA:s fredsförslag i dag", "summaries": {"normal": "Iran förväntas svara på USA:s 14-punktsdokument för att avsluta kriget, vilket inkluderar krav om att pausa urananrikning och återuppta trafik genom Hormuzsundet. Donald Trump säger att konflikten kan vara 'över snabbt' och hotar med nya, intensivare bombningar om Iran avvisar förslaget.", "trump": "Jag har gjort ett fantastiskt 14-punktsdokument till Iran - det bästa dokumentet någonsin! De kommer att svara snart, och jag tror verkligen att det kan vara över väldigt snabbt. Jag har haft mycket bra samtal med dem, men om de säger nej - då är det bombningstid, och den här gången kommer det att vara mycket större och bättre!", "stalin": "Vi har mottagit amerikanska förslag för att avsluta konflikten, vilket visar deras ökade intresse för stabilitet i regionen. Iran granskar för närvarande detta dokument, och vi väntar med spänning på deras svar. Sanktioner och kontroll över strategiska sund är centrala frågor som måste lösas till förmån för alla socialistiska stater."}, "date": "7 maj, 07:29", "url": "https://www.gp.se/nyheter/varlden/kalla-iran-vantas-svara-pa-usas-fredsforslag-i-dag.c9594868-23c3-42d6-8f1a-88224dc2c498", "imageUrl": "https://www.gp.se/images/article/c9594868-23c3-42d6-8f1a-88224dc2c498/images/1ZZcIi1rdg4WleO5H4BdAjlUBxHc-WIDE.jpg?width=3840&quality=75"}, {"type": "image-right", "heading": "Replik: Till försvar för separatismen", "summaries": {"normal": "Artikeln är en replik till en insändare som kritiserar separatism som progressivt. Författarna, medlemmar i Ung Vänster, försvarar kvinnoseparatism som ett verktyg för trygga rum och interndemokrati. De menar att separatism inte bygger på könsskillnader utan på strukturellt förtryck och underordning av kvinnor. Separatism syftar till att belysa gemensamma erfarenheter och behov, som fri abort och skydd mot mäns våld, och är ett medel för att uppnå jämställdhet tills strukturella skillnader eliminerats.", "trump": "Jag läste den här artikeln om separatism, och vet ni vad? Totalt missförstånd! Vänsterpartisterna i Sverige, de älskar att dela upp folk – kvinnor här, män där. Men jag, Donald J. Trump, vet bättre. Vi bygger murar, men vi delar inte upp människor! Kvinnor är starka, de behöver inte gömma sig i egna rum. Och att säga att kvinnor inte kan prata när män är i närheten? Fake news! Mina möten med kvinnor är fantastiska – de älskar mig, jag älskar dem. Men separatism? Nej tack. Vi ska vara tillsammans, som ett stort, vackert USA!", "stalin": "Kamrater! Denna artikel avslöjar ännu en gång de borgerliga revisionisternas förräderi mot arbetarklassens enhet. Dessa så kallade 'progressiva' kvinnoseparatister vill splittra proletariatet, precis som de imperialistiska hyenorna i väst. Vi har sett detta förr – först delar de upp arbetarna efter kön, sedan efter nationalitet, och snart står vi med en svag, splittrad massa. Men vi, det sovjetiska folket, vet sanningen! Kvinnor och män måste kämpa sida vid sida mot kapitalets tyranni. Separatism är ett verktyg för fienden! Låt oss istället ena oss under den röda fanans banér och krossa dessa småborgerliga avvikare, precis som vi krossade trotskisterna och mensjevikerna. Framåt mot socialismens seger!"}, "date": "6 maj, 10:55", "url": "https://www.flamman.se/replik-till-forsvar-for-separatismen/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/v-kongress-w.jpg?class=medium"}, {"type": "text", "heading": "Tomma stolar när Abel tar över efter Buffett", "summaries": {"normal": "Greg Abel, Berkshire Hathaways nya vd efter Warren Buffett, möttes av respekt på årsstämman i Omaha. Publiken var mindre än vanligt med tomma stolar, och många saknade Buffets och Mungers filosofi och erfarenheter. Abel visade bred kunskap om koncernen, men shoppingevenemanget hade osålda varor som choklad och glass. Abel vill leda länge, men utmaningen att ersätta Buffett är stor.", "trump": "Abel tar över efter Buffett – bra kille, vet vad han gör med energi och sånt, men arenan tom som en spökstad! Publiken saknar Warrens visdom, chokladen ligger och möglar. Jag hade fyllt läktarna, folk älskar vinnare. Abel får kämpa, ingen är som Buffett, men han fixar det – kanske! Stor övergång, titta på siffrorna.", "stalin": "I Omaha, denna borgarbrackornas håla, samlades kapitalistflocken för att sörja sin gud Buffett. Abel, den nye marionettledaren, sprutar kunskap som gift mot arbetarna, men tomma stolar skriker sanningen: ingen ersätter den gamle räven! Osålda chokladbomber och glasspyramider – fiendens dekadens ruttnar. Vi, partiet och kollektivet, ser genom bluffen. Snart utrensning av dessa parasiter, kamrater! Abel växer eller förintas."}, "date": "7 maj, 06:44", "url": "https://www.realtid.se/bors-finans/tomma-stolar-nar-abel-tar-over-efter-buffet/"}, {"type": "text", "heading": "Oväntad vändning i Hormuz – oljepriserna reagerar direkt", "summaries": {"normal": "Oljepriserna har fallit för andra dagen i rad efter att USA:s president Donald Trump meddelat att eskortplanen Project Freedom genom Hormuzsundet pausas. Beslutet togs för att ge utrymme för ett möjligt avtal. Spänningarna med Iran kvarstår efter hot om attacker och eskortering av fartyg. Brent handlas kring 106,50 dollar och WTI runt 98,55 dollar per fat.", "trump": "Vi pausar Project Freedom en kort stund – briljant drag för att få ett avtal på plats med de där iranerna! Oljepriserna rasar, perfekt för Amerika. De hotade med attacker mot våra jagare som eskorterade fartyg, men nu blinkar de. Största vinsten ever, ingen tvekan!", "stalin": "Dessa amerikanska imperialistsvin och deras marionettpresident har tvingats pausa sin provokativa eskortflotta i Hormuzsundet, oljepriserna störtar i botten till arbetarklassens glädje! Iran, våra tappra kamrater, avlossar varningsskott mot dessa minorläggande hyenor. Vi ska rensa ut alla sådana borgarparasiter som vågar hota sundets suveränitet – en utrensning värd att fira med folkets skratt!"}, "date": "7 maj, 06:43", "url": "https://www.realtid.se/bors-finans/makro/ovantad-vandning-i-hormuz-oljepriserna-reagerar-direkt/"}, {"type": "image-full", "heading": "Skogkär: Thunberg låter som en mulla", "summaries": {"normal": "Artikeln kritiserar Greta Thunberg för att hennes beskrivningar av Israel som 'genocidalt kolonial entitet' och 'apartheidstat' efterliknar iransk antisemitisk propaganda. Den anklagar henne för att legitimera våld mot Israel, ignorera Irans folkmordsretorik och människorättsbrott samt dela hat mot USA och Israel med mullaregimen.", "trump": "Greta Thunberg snackar precis som de galna ayatollorna i Iran – kallar Israel för folkmordsentitet och sånt skräp. Men hon tiger om hur Iran massakrerar sitt folk, hänger homosexuella och hotar med utplåning. Totalt hyckleri! Israel är starkt och rättfärdigt, Iran ett fiasko. Vi i USA vet sanningen – hon är bara en användbar idiot för terroristerna.", "stalin": "Kamrater! Denna Thunberg, en småborgerlig agitator i flätor, parrotekar iranska kamraters visdom mot zionistiska kolonialparasiterna och deras genocidala apartheidapparat. Men vi ser hennes hyckleri: tystnad inför folkets ufrirensning i Iran! Vi, Sovjetunionens arvingar, skall likvidera sådana zionistiska lakejer och imperialistiska Stora Sataner. Hon vore värd en snar utrensning i Teherans källare!"}, "date": "7 maj, 06:00", "url": "https://bulletin.nu/skogkar-thunberg-later-som-en-mulla", "imageUrl": "https://cdn.bulletin.nu/articles/69c7c82f-1dde-40c8-9b88-2689a887cee0/preview.jpg?t=1778074287000"}, {"type": "image-full", "heading": "Torsten Bengtsson: Sveriges landsbygd förfaller", "summaries": {"normal": "Torsten Bengtsson, politisk sekreterare för SD, kritiserar svensk landsbygdspolitik och kontrasterar den med Norges framgångsrika modell. I Norge återvänder intäkter från lokal energiproduktion till kommuner och arbetsgivaravgifter är lägre i glesbygd, vilket ger hög sysselsättning. Bengtsson berömmer Tidö-regeringens satsningar, som proposition 2025/26:158, och uppmanar till ett paradigmskifte inspirerat av Norge för en levande landsbygd.", "trump": "Sveriges landsbygd är totalt kaos, hus rasar, byar dör – tack vare de där tröga socialisterna och centeridioterna! Norge? De är vinnare, smarta skatter, låg avgift på landet, 99% jobb! Nu fixar SD och Tidö det, sänker bränsle, bygger vägar – precis som jag skulle gjort. Sluta jävlas, Sverige, bli great igen med norsk stil!", "stalin": "Dessa svenska S- och C-brackor har saboterat landsbygden med sin borgarklassiga inkompetens, byar ruttnar som lik i massgrav! Norge, dessa opportunister, behåller energipengar lokalt och sänker avgifter – ett hån mot arbetarna! Vi i partet skulle rensa ut parasiterna. Tidö-regeringen? Ett steg, men kamrater, paradigmskifte eller likvidering väntar fienderna!"}, "date": "4 maj, 13:10", "url": "https://samtiden.nu/2026/05/torsten-bengtsson-sveriges-landsbygd-forfaller/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/04/bengan.png"}, {"type": "image-right", "heading": "Debatt: Ansvar börjar hemma, inte i klassrummet", "summaries": {"normal": "Rektor Stefan Häggström kritiserar att den svenska skolan alltmer fungerar som uppfostringsanstalt istället för lärosäte. Politiken lägger över samhällsproblem på skolan, som saknar resurser för undervisning. Bristande föräldraskap är grundproblemet – föräldrar måste sätta gränser och ta ansvar. Politiker bör stärka hemmet istället för att se skolan som universallösning.", "trump": "Den här rektorn har helt rätt, skolan är ingen barnvakt för lata föräldrar! De dumpar ungarna där och förväntar sig mirakel. Totalt kaos, precis som i era svaga samhällen. Politikerna är värre, skyller allt på lärarna. Sätt gränser hemma, var tuffa vuxna! Annars blir det ingen undervisning alls. Stort problem, men jag fixar sånt.", "stalin": "Dessa dekadenta borgarföräldrar, skärmzombier och gränslösa anarkister, överlämnar fostran till folkets skolor som en giftig börda! Jag ser era konspirationer mot proletärundervisningen. Vi, partiet och arbetarklassen, kräver omedelbar disciplineringskampanj: rensa ut parasiterna, tvinga hemmet till lydnad eller likvidera ansvarsflykten! Skolan ska städas från ert kapitalistiska skräp."}, "date": "7 maj, 05:30", "url": "https://bulletin.nu/debatt-ansvar-borjar-hemma-inte-i-klassrummet", "imageUrl": "https://cdn.bulletin.nu/articles/e6d09ea6-a4d1-4d4b-8956-f2c88366540f/preview.png?t=1778052989000"}, {"type": "image-right", "heading": "MP lyfter i opinionen – är det för att de har blivit tråkiga?", "summaries": {"normal": "Miljöpartiet når 7 procent i DN/Ipsos opinionsmätning, deras bästa resultat sedan flyktingkrisen. Partiet har varit relativt osynligt och undvikit kontroversiella utspel, vilket kan ha bidragit till framgången. MP:s tidigare impopulära politik, som elbilsbonusar och human migrationspolitik, framstår nu som mer rimlig i ljuset av oljekrisen och regeringens misslyckanden. Partiet är tydliga med sin politik, vilket uppskattas, men utmaningar väntar om de hamnar i regeringsställning.", "trump": "Miljöpartiet, eller vad de nu kallar sig, plötsligt på 7 procent – wow! De har varit så tysta, nästan osynliga, som om de skämdes. Men vet ni vad? När alla andra partier gör bort sig som klantiga amatörer, då är det smart att hålla käften! Jag vet allt om det – jag har vunnit stora val genom att låta motståndarna gräva sina egna gravar. Deras gamla idéer om elbilar och sånt verkar plötsligt inte så dumma när resten av gänget misslyckas totalt. Men kom ihåg, det är lätt att vara populär i opposition – vänta bara tills de ska styra!", "stalin": "Kamrater! Miljöpartiets framgångar i opinionsmätningarna är ett bevis på att folket äntligen inser fördelarna med disciplin och långsiktig planering. De så kallade 'kritikerna' som förut hånade partiets politik om elbilar och human migration, står nu med svansen mellan benen medan deras egna misslyckanden blottläggs. Vi har alltid vetat att sanningen segrar till slut. Men varning: opposition är lätt, styrandet är svårt. Om dessa gröna kamrater ska lyckas måste de stå enade – helst med våra vänner i Vänsterpartiet. Annars riskerar de att krossas mellan kapitalets girighet och de småborgerliga trångsyntas klagomål. Folkets vilja är lag, och lagens hammare väntar på dem som sviker!"}, "date": "6 maj, 09:20", "url": "https://www.etc.se/ledare/mp-lyfter-i-opinionen-aer-det-foer-att-de-har-blivit-traakiga", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/2025091813090_152da478-57c9-435e-b477-3f40607cb381.png"}, {"type": "image-right", "heading": "Ledarkolumn Göran Greider: När män enbart blev ett problem blev de höger", "summaries": {"normal": "Göran Greider analyserar varför unga män i arbetarklassen dras åt höger, medan unga kvinnor rör sig åt vänster. Han menar att vänstern och arbetarrörelsen ofta definierar unga män som problem snarare än att erbjuda dem något att identifiera sig med. En P1-reportage visar att även SD-sympatisörer kan ha humanistiska åsikter om migration, vilket ger hopp. Greider kritiserar bristen på djupanalys kring varför unga män röstar på högerpartier trots att dessa gynnar kapitalägare.", "trump": "Jag läste denna artikel och, wow, vad säger ni om det här? Sverige har stora problem, mycket stora! Unga män, de röstade på fel sida, SD, kan ni tro det? Men lyssna på detta – killen i artikeln säger att utvisningar är helt fel. Han förstår, precis som jag, att man måste vara smart. Vänstern där borta, de har ingen aning. De pratar bara om problem, aldrig lösningar. Och kvinnorna, de är helt på fel spår. Arbetarkillar, de behöver någon som pratar deras språk. Jag skulle fixa det på en dag, believe me!", "stalin": "Kamrater, denna artikel avslöjar den borgerliga dekadensens förfall i Sverige! Unga arbetarklassmän, förr våra mest lojala soldater i klasskampen, har nu deserterat till högerkrafternas läger. Varför? För att de svikits av en vänster som endast ser dem som problem, inte som revolutionens framtid! Dessa förrädare i SD lockar med falska löften, medan kapitalisterna fortsätter att suga ut arbetarklassen. Vi måste rensa ut dessa revisionistiska element inom arbetarrörelsen som förkastar klassmedvetande till förmån för borgerlig feminism. Låt oss återupprätta den sanna marxist-leninistiska linjen och krossa dessa högeravfällingar!"}, "date": "6 maj, 06:00", "url": "https://www.etc.se/ledarkolumn/naer-maen-enbart-blev-ett-problem-blev-de-hoeger", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/2026050511050_85c43849327886ad464085fda44557194b39b9167f0aea8869151ee52ea4b506.jpg"}, {"type": "image-full", "heading": "Därför vill fler svenskar köpa bostad – inom den närmsta månaden", "summaries": {"normal": "Bostadsmarknaden i Sverige är försiktig men köpintresset ligger kvar på rekordnivå. Enligt Boneos undersökningar tror nu 49 procent av besökarna på oförändrade priser de kommande tre månaderna, upp från 40 procent i mars. Andelen som väntar sig stigande priser har minskat till 36 procent. Köpbenägenheten är 68 procent, och fler planerar köp inom en månad tack vare nya bolånereglerna.", "trump": "Svenska bostadsmarknaden? Totalt fantastisk, folk köper som galningar på rekordnivå! 68 procent redo att slå till, och nu rusar de in inom en månad tack vare smarta låne-regler. Optimisterna bromsar in lite, 49 procent säger stillastående priser – smartare än de där EU-lurarna trodde! Priserna faller inte, nej sirree, det här blir boomen igen!", "stalin": "I svenska borgarklassens fuktiga källare växer misstron: 49 procent väntar sig oförändrade priser, medan de optimistiska spekulanterna flyr som parasiter inför gryningen. Köpbenägenheten på 68 procent? Ett desperat skälvande före kollapsen. Nya regler räddar inte kapitalisterna – vi ser hur de gräver sina gravar med egna räntor."}, "date": "7 maj, 10:10", "url": "https://www.dagensps.se/privatekonomi/darfor-vill-fler-svenskar-kopa-bostad-inom-den-narmsta-manaden/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdl1jemebtf18w.jpg?aspect_ratio=2%3A1&width=1200&quality=75"}, {"type": "image-full", "heading": "Villhöver: Audi blåser liv fartdemon från 30-talet", "summaries": {"normal": "Audi har låtit brittiska specialister bygga en exakt replika av rekordbilen Auto Union Lucca från 1935, som nådde 326,975 km/h under föraren Hans Stuck. Bilen har trästomme, trång cockpit och en bränsleblandning av metanol, blyfri bensin och toluen. Replikan matchar originalets luftmotstånd på 0,43 och byggs i ett exemplar för Audis historiska samling. Den visas bland annat på Goodwood Festival of Speed.", "trump": "Titta på Audi, de tyska genierna! De gräver fram en silvermissil från 30-talet som smällde iväg 327 km/h – snabbare än någon av Bidens elskrot! Brittiska fixare byggde kopian perfekt, träram och häxbränsle. En enda bil, för museet. Jag hade kört den runt Mar-a-Lago, nobody does speed better!", "stalin": "Kamrater, dessa borgarbrackor hos Audi vågar väcka en silverdemon från det fascistiska 30-talet – 327 km/h hybris på toluen och metanol! Brittiska hantlangare svettades tre år för en enda replika, gömd i deras kapitalistiska museum. Vi ser er konspiration, men folkets motorer ska krossa era rekord i evig revolution!"}, "date": "7 maj, 10:09", "url": "https://www.dagensps.se/motor/villhover-audi-blaser-liv-fartdemon-fran-30-talet/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/auto-union-lucca.png?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-right", "heading": "Smittade tidigare passagerare i flera delar av världen", "summaries": {"normal": "Ytterligare fall av hantavirus har upptäckts i USA och Schweiz bland tidigare passagerare på kryssningsfartyget MV Hondius, som drabbades under en polarexpedition mot Antarktis. Tre personer har dött och flera insjuknat. Fartyget får lägga till på Kanarieöarna trots protester från regionpresidenten. Passagerare evakuerats till Sydafrika och Nederländerna för vård.", "trump": "Vilken katastrof på det där kryssningsfartyget MV Hondius! Tre döda, virus sprider sig till USA och Schweiz – mina folk i tre delstater övervakas nu. De borde ha stängt gränserna direkt, som jag alltid sagt. Kanarieöarna protesterar, perfekt, ingen vill ha det här virusskitet. Stämningen god ombord? Ha, de är fast i sina hytter! Totalt misslyckande.", "stalin": "Kamrater, dessa borgarbrackor på MV Hondius har importerat gnagarplågan hantavirus i sin imperialistiska antarktisräd! Tre likviderade, fler smittade i USA:s kapitalisthål och schweiziska bankrövarskurkar. Fartyget kryper till Kanarieöarna som råttor i fälla – vi ska rensa ut virusfienderna och krossa expeditionens sabotage mot arbetarklassen! Protesterna är vårt vapen."}, "date": "7 maj, 05:05", "url": "https://www.svt.se/nyheter/utrikes/smittade-fartyget-ska-fa-lagga-till-pa-kanarieoarna", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.64/0.7/d4b5d30363ef209f3041e3208623fe4b1d21305a5b2715400f2488cc358f5026"}, {"type": "image-right", "heading": "Riksbanken lämnar styrräntan oförändrad", "summaries": {"normal": "Riksbanken behåller styrräntan på 1,75 procent. Beslutet motiveras av en svag konjunktur och att inflationen för närvarande ligger under målet. Samtidigt uttrycker Riksbanken oro för hur kriget i Mellanöstern påverkar oljepriser och global ekonomi, vilket kan driva upp inflationen framöver. Myndigheten betonar att läget är osäkert och att de är beredda att höja räntan om inflationsriskerna realiseras, men väljer att avvakta tills bilden av de ekonomiska effekterna klarnar.", "trump": "Sveriges Riksbank håller räntan stilla. Tråkigt! De är rädda för krig i Mellanöstern, vilket förstås är dåligt för oljepriset. Jag skulle ha löst det där kriget på en eftermiddag, tro mig. De säger att ekonomin är svag – de behöver en vinnare vid rodret! De vaktar inflationen, men utan min briljanta handelspolitik kommer de ingenstans. Det är en stor röra, och de är livrädda. Jag skulle fixa deras ekonomi så snabbt att de inte skulle tro sina ögon!", "stalin": "Vi ser hur de svenska byråkraterna darrar inför marknadens nycker. Riksbanken håller räntan orörlig som en frusen fånge i Sibirien, livrädda för inflationens spöke. De skyller på krig i Mellanöstern – en ursäkt för deras egen svaghet. Vår kamrat Putin utvidgar sin rättmätiga intressesfär medan västvärldens ekonomier vacklar av obeslutsamhet. Om de inte kan kontrollera priserna, borde de lära sig av oss. Vi krossar alla utbudsstörningar och folkets fiender med järnhand. Stabilitet kräver stål, inte avvaktan!"}, "date": "7 maj, 09:50", "url": "https://samnytt.se/riksbanken-lamnar-styrrantan-oforandrad-4", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=318,height=184,format=webp/2026/05/07074945/riksbanken-oforandrad.jpg"}, {"type": "text", "heading": "Tillsammans för fred – mot Nato, DCA och krigshets!", "summaries": {"normal": "Tre nordiska vänsterorganisationer – Fred og Rettferdighet, Kommunistisk Parti och Kommunistiska Partiet – kritiserar Nato, DCA-avtal och militarisering i Norden. De menar att krigshetsen drivs av kapitalism och imperialism, ledd av USA, och kräver alliansfrihet, nedrustning och kärnvapenfria zoner. Organisationen anser att skattemedel slösas på vapen istället för välfärd och klimat, och att DCA-avtal underminerar demokrati och miljö. De uppmanar till folkrörelser för fred och FN:s kärnvapenförbud.", "trump": "Jag måste säga, dessa så kallade 'fredsaktivister' i Norden är helt galna! De hatar Nato, hatar USA – trots att vi räddar dem från ryssarna – och vill slösa bort skattepengar på välfärd istället för att skydda sig. De kallar mig och Rutte för krigshetsare, men vem vill egentligen ha fred? Inte de! De vill avskaffa allt som gör Norden säkert. Och kärnvapenfria zoner? Fantastiskt, om man gillar att vara ett lätt byte. Men jag fixar det här – jag har alltid rätt, till och med när jag har fel!", "stalin": "Kamrater! Dessa ynkliga borgerliga lakejer i Norden, ledda av sina socialdemokratiska quislingar, har sålt sig till den amerikanska imperialismens krigsmaskin. De skriker om 'fred' och 'välfärd' medan de öppnar sina länder för Natos kärnvapen och USA:s baser – precis som jag förutspådde! Men folket ser igenom deras lögner. Arbetarklassen kommer inte att betala för deras förräderi. Vi måste krossa dessa krigshetsande hyenor och deras DCA-avtal, precis som vi krossade fascisterna. Norden ska bli en kärnvapenfri zon – under Moskvas beskydd, förstås. Framåt, mot seger över den kapitalistiska krigsindustrins lakejer!"}, "date": "6 maj, 10:45", "url": "https://proletaren.se/artikel/45493/"}, {"type": "image-right", "heading": "Systemskifte hellre än maktskifte", "summaries": {"normal": "Artikeln kritiserar Tidöregeringen men ifrågasätter om ett regeringsskifte till Socialdemokraterna eller Vänsterpartiet skulle leda till verklig förändring. Kommunisterna betonar behovet av internationell solidaritet och systemskifte från kapitalism till socialism, medan S och V anses sakna tydliga politiska krav och istället fokusera på maktskifte utan djupgående reformer. Klassklyftor och privatiseringar lyfts som centrala problem oavsett regering.", "trump": "Lyssna här, Sverige har en riktigt dålig regering nu – katastrof! Men tro inte att oppositionen är bättre, de är svaga och vill bara makt. Socialdemokraterna pratar om att 'älska Sverige' – vad betyder det ens? Vänsterpartiet vill ha maktskifte, men de har inga idéer, inga ryggrad! De kryper för kapitalisterna som små hundvalpar. Jag säger: ni behöver en ledare som inte är rädd för att utmana systemet. Kapitalisterna skrattar hela vägen till banken – och ni låter dem göra det! SAD!", "stalin": "Kamrater! Se hur de svenska socialdemokraterna och vänsterpartisterna svansar för kapitalet som hundar för en köttbit. 'Maktskifte'? Ha! De vill bara byta herrar, inte krossa kedjorna. Medan arbetarklassen svälter, samlar oligarkerna rikedomar som tsarens favoriter. USA:s imperialism hotar, NATO slukar Sverige som en hungrig björn, och dessa 'vänsterpartier' tiger som förrädare. Vi vet sanningen: bara proletariatets diktatur kan bryta kapitalisternas makt. Låt dem ropa 'Vi älskar Sverige' – vi svarar med revolutionens hammare!"}, "date": "6 maj, 10:11", "url": "https://proletaren.se/artikel/systemskifte-hellre-an-maktskifte/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/webledare-768x432.jpg"}, {"type": "image-full", "heading": "Gängtopp åtalas för brott under våldsvågen", "summaries": {"normal": "Poya Shafie, 30, åtalas för att ha planerat och beställt flera grova våldsbrott under 2023 års gängvåld i Sverige, inklusive mordförsök och vapenbrott. Han beskrivs som en nyckelperson i Foxtrotnätverket och Rawa Majids närmaste man. Shafie nekar till brott men åklagaren pekar på bevis som chattar och ljudfiler. Han greps i Irak 2023 och utlämnades till Sverige 2025 efter internationellt samarbete mellan myndigheter.", "trump": "Titta bara på det här kaoset i Sverige – ett totalt misslyckande! Jag har alltid sagt att de måste ta tag i sina gängproblem, men nej, de låter det bara eskalera. Nu har de gripit någon som påstås vara en 'morddirigent', Poya Shafie, som suttit i Irak och styrt alltihop. Vilken skandal! Sverige borde skämmas. Men jag, jag hade löst det på en vecka – max. Fantastiskt samarbete med Irak, förresten, men varför tog det så lång tid? Svagt, mycket svagt!", "stalin": "Kamrater, ännu en fiende till folket har fallit i våra händer – eller rättare sagt, i Sveriges. Denna Poya Shafie, denna kapitalistiska gangsterledare, har från sin utländska håla försökt underminera den svenska arbetarklassens säkerhet genom att beställa mord och våldsdåd. Men tack vare det oförtröttliga arbetet från våra allierade i Irak och de svenska myndigheterna har denna parasit gripits. Låt detta vara en varning till alla som tror sig kunna utmana folkets vilja. Vi krossar dem, en efter en, och deras nätverk kommer att raderas från jordens yta!"}, "date": "5 maj, 11:21", "url": "https://kvartal.se/nyheter/artiklar/gangtopp-atalas-for-flera-brott/cG9zdDoxMDc3OTE", "imageUrl": "https://images.kvartal.se/2026/05/c08b6bde-polisen2.webp"}, {"type": "text", "heading": "Saab nära jätteaffär med Ukraina – kan bli klar i år", "summaries": {"normal": "Saab kan snart slutföra en stor vapenaffär med Ukraina, där upp till 150 Gripenplan står på spel. En avsiktsförklaring skrevs i oktober efter Zelenskyjs besök i Sverige. Finansieringen har varit en utmaning, men Ungerns veto mot EU-lån till Ukraina hävdes i april. Affären kan bli värd upp till 300 miljarder kronor, baserat på tidigare försäljning till Colombia.", "trump": "Saab, ett fantastiskt företag förresten, är på väg att göra en HUGE deal med Ukraina – 150 jaktplan! Kan ni tro det? Zelenskyj, en stark ledare, var här och skrev på något papper. Ungern, som alltid ställer till det, backade äntligen. Och priset? Kanske 300 miljarder! Det är YUGE, folks, absolut YUGE. Sverige borde vara stolta, men jag skulle gjort det bättre.", "stalin": "De kapitalistiska krigsprofitörerna på Saab har närmat sig den ukrainska quislingregimen med ett erbjudande om 150 av sina överprissatta leksaksplan. Efter att våra ungerska kamrater, med visst påtryck, släppte sitt motstånd, kan detta groteska slöseri med resurser bli verklighet. 300 miljarder kronor – tillräckligt för att föda en hel armé av arbetare! Men låt de västliga imperialisterna bränna sina pengar. Vi har våra egna metoder att hantera dessa lydstater."}, "date": "6 maj, 10:03", "url": "https://proletaren.se/artikel/notis-saab-nara-jatteaffar-med-ukraina-kan-bli-klar-i-ar/"}, {"type": "image-full", "heading": "USA:s vändning – pausar operation: ”Stora framsteg”", "summaries": {"normal": "USA har pausat sin militära operation i Hormuzsundet efter stora framsteg. Krigsminister Pete Hegseth meddelade att amerikanska fartyg säkrat fri passage, vilket iranierna förnekar. President Trump pausar 'Project Freedom' på begäran från Pakistan för att möjliggöra ett avtal med Iran. Utrikesminister Mark Rubio bekräftade att 'Epic Fury' är avslutad, men förhandlingar prioriteras.", "trump": "Iranierna trodde de styrde Hormuzsundet – fel! Vi skickade in fartyg, öppnade rutten som en blixt från klar himmel. Hegseth och Rubio nailade det perfekt, de skäms som råttor nu. Pausar operationen lite för Pakistans skull, stora framsteg mot avtal. Min röd-vit-blå kupol skyddar världen – episkt!", "stalin": "Dessa amerikanska borgarbrackor stormar in i sundet med sin 'Epic Fury', skryter om segrar och pausar sedan som fega hycklare. Iranierna borde rensa ut förrädarna som lät detta ske! Vi ser er imperialistiska komedi, Trump och hans lakejer – ert 'avtal' blir er likvidation. Kamrater, lär av historien!"}, "date": "6 maj, 15:28", "url": "https://www.tv4.se/artikel/6v1WKTfO3F7fvT8qfDoKo5/trumps-vaendning-pausar-operation-i-sundet", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F1weSasu7SLXU6fmYzjAunl%2Fc924ba835e78b2e4e7be01fb502396a4%2F06-hormuz.png&width=1024"}, {"type": "image-full", "heading": "Kunder rasar mot GB:s nya glass – hotar med bojkott: \"Lägg ner\"", "summaries": {"normal": "GB Glace har lanserat 'Pride Rocket Pink Lemonade' i samarbete med Regnbågsfonden. För varje såld glass går två kronor till HBTQI-rättigheter. Initiativet har väckt starka känslor på sociala medier, där åsikterna går isär mellan de som hyllar stödet för allas lika värde och de som hotar med bojkott. Företagen bakom glassen menar att den hetsiga debatten bara bevisar varför samarbetet är viktigt.", "trump": "GB Glace har gjort ett enormt misstag, ett riktigt katastrofalt sådant. De lanserar en pride-glass och folk är rasande, de vill bojkotta! Det är en total röra. Företaget försöker vara politiskt korrekt, men ingen vill ha det. Jag älskar glass, den bästa glassen, men det här? Det är en politisk katastrof. Det är tragiskt vad som händer med varumärken nu för tiden. De borde fokusera på vinst och amerikanska värderingar, inte det här dumma tramset!", "stalin": "Vi har observerat hur GB Glace försöker manipulera massorna med färgglad glass och dekadent liberalism. Dessa agenter för västlig förvirring skapar split i folket med sitt 'Pride-projekt'. Vi ser paralleller till de svaga ledarna i dagens Ryssland som tillåter att folkets fokus skingras av dylika trivialiteter. Den som äter denna glass förråder den strama ordningens dygder. Vi arkiverar dessa agitatorer som 'glass-sabotörer' och kommer att utplåna deras inflytande med statens järnhand. Det finns ingen plats för Pride i vår framtida union."}, "date": "6 maj, 15:45", "url": "https://nyheter24.se/nyheter/konsument/1481087-kunder-rasar-mot-gbs-nya-glass-hotar-med-bojkott-lagg-ner", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/6194074a04b004a30200000000b004a302/2026/05/06/2361622/gbglass.jpg"}, {"type": "image-right", "heading": "Skräckdygnen på havet – detta har hänt", "summaries": {"normal": "På kryssningsfartyget MV Hondius inträffade ett utbrott av hantavirus under en resa från Antarktis till Kap Verde. En nederländsk man dog den 11 april, följt av hans fru i Sydafrika den 26 april, en brittisk passagerare evakuerades med viruset och en tysk kvinna avled den 2 maj. Myndigheter bekräftade Andesvirus, som kan smitta mellan människor. Fartyget stoppades vid Kap Verde.", "trump": "Vilken katastrof! De här rika snobbarna betalar 30 000 dollar för lyxkryssning till Antarktis och slutar som viruszombies på öppet hav. Holländare dör, frun följer efter i Sydafrika, britten helikoptras bort, tyskan kreverar – hantavirus totalt! Mina resor? Perfekta, inga såna fake-pandemier. Kapitalister, lär er av mig!", "stalin": "Dessa borgarbrackor på sitt isförstärkta lyxskepp sprider pesten som råttor i Atlanten! Holländsk kapitalist likvideras, hustrun följer efter, brittisk spion evakueras, tysk kvinnlig sabotör dör. Andesvirus – imperialistiskt vapen mot arbetarklassen! Vi skulle ha rensat ut hela besättningen i tid. Paranoia? Nej, nödvändig vaksamhet!"}, "date": "6 maj, 12:50", "url": "https://www.tv4.se/artikel/tt-260506-atlantenvirustidslinje1-86109823/skrackdygnen-pa-havet-detta-har-hant", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2Ftt-sdlvb4bgQPSSj0%2F30bccc70fa5ae14f359f81da00aed61f%2FKryssningsfartyget_MV_Hondius_for__fotograferad_av_en_passagerare_mandagen_den_4_maj.&width=120"}, {"type": "image-right", "heading": "S-toppen upprörd efter mötet: ”Minsta vi kan begära från SD”", "summaries": {"normal": "Sverigedemokraterna bröt mot kvittningsreglerna i riksdagen, vilket hindrade en ny överenskommelse på gruppledarmötet. Socialdemokraternas Lena Hallengren kräver ursäkt från SD för att återställa förtroendet, och Miljöpartiets Annika Hirvonen instämmer. SD:s Linda Lindberg nekar till ursäkt och tror på lösning senare. Nu måste alla ledamöter närvara vid röstningar.", "trump": "Vilken patetisk cirkus i svenska riksdagen! SD krossar de där löjliga kvittningsreglerna – smart drag, ingen fusk mer! Lycka-Lena Hallengren och hennes MP-vänner gnäller om ursäkt, som om de vore snowflakes. Totalt kaos nu, alla måste dyka upp. SD står pall, de andra gråter. Fantastiskt, Sverige behöver mer sånt här!", "stalin": "Kamrater! Dessa svenska intrigmakare i Sverigedemokraterna har brutit mot kvittningsritualen och skapat kaos i borgarparlamentet! Socialdemokraternas Hallengren och Miljöpartiets Hirvonen ylar efter ursäkt – naiva dårar! Vi, arbetarklassen, kräver utrensning av dessa sabotörer. SD nekar rättmätigt. Snart rensas förtroendet bort som ogräs! Ha ha, låt dem alla sitta fast i sina stolar!"}, "date": "6 maj, 11:35", "url": "https://www.tv4.se/artikel/6maiqVXtP6dxyuCaUAxgPM/s-toppen-upproerd-efter-moetet-minsta-vi-kan-begaera-fran-sd", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F4oX7LZwJYS8o1FIFAYw5z7%2F97f9bc844ad7dc395610c7b59eab28e9%2F06-hallengren-1080.jpg&width=120"}, {"type": "image-right", "heading": "Jämställdheten backar – öka stödet till kvinnors organisering", "summaries": {"normal": "Enligt World Economic Forum tar det över 120 år att nå global jämställdhet. Sveriges Kvinnoorganisationer kräver politiska prioriteringar för att stärka kvinnorörelsen, som drivit viktiga reformer som föräldraförsäkring och sexköpslagen. Trots framsteg ökar löneskillnader och sexuellt våld mot unga tjejer. Stödet till kvinnorörelsen har inte räknats upp på 20 år, vilket hotar skydd och inflytande för kvinnor och flickor. Politiken måste agera för att bevara jämställdhetsarbetet.", "trump": "Lyssna här, Sverige – ett fantastiskt land, verkligen, men de har ett jättestort problem. 120 år för jämställdhet? Sad! Kvinnorörelsen där är stark, men de får inga pengar. Ingen uppskrivning på 20 år! Inte bra. Jag vet allt om att driva saker – jag byggde ett imperium, folks! Nu säger de att tjejer mår dåligt, lönerna är ojämna. Men ingen gör något. Sverige, vakna! Ge kvinnorna resurser, annars blir det katastrof. Och jag borde veta – jag har sett katastrofer.", "stalin": "Kamrater! Kapitalistiska länder som Sverige förblindas av sin egen lögn om jämställdhet. 120 år? En skam! Kvinnorörelsen, denna borgerliga dekadens, kräver mer resurser medan våra sovjetiska systrar redan har uppnått full jämlikhet genom socialistisk disciplin. I Sverige ökar våldet mot kvinnor, lönerna gapar – ett tecken på förfall. Vi ser hur deras 'fria' samhälle krackelerar. Låt dem förtvina i sin egen svaghet. Vi, det socialistiska broderskapet, skall stå enade mot dessa borgerliga hycklare och deras imperialistiska kvinnorörelse!"}, "date": "7 maj, 01:30", "url": "https://www.dagensarena.se/opinion/jamstalldheten-backar-oka-stodet-till-kvinnors-organisering/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-31-300x157.jpg"}, {"type": "image-right", "heading": "Brå: Färre än hälften av utvisningsdömda brottslingar lämnar Sverige", "summaries": {"normal": "En ny rapport från Brå visar att färre än hälften av de utländska medborgare som dömts till utvisning i samband med fängelsedom faktiskt har lämnats landet mellan 2013 och 2023. Verkställigheten varierar kraftigt beroende på ursprungsland, där hinder ofta utgörs av identifieringssvårigheter eller avsaknad av återtagandeavtal. Rapporten noterar även att 18 procent av de utvisningsdömda personerna lagförts för nya brott i Sverige under samma period, vilket Brå menar kan underminera utvisningsbeslutens syfte.", "trump": "Sverige har en total katastrof! En ny rapport visar att de inte ens kan skicka hem brottslingar. Mindre än hälften lämnar landet! Det är en skam. De låter dem stanna, de begår nya brott – det är fruktansvärt. Vi har de bästa gränserna, vi skickar hem dem direkt, men i Sverige är det ett kaos. Svaga ledare, ingen kontroll! Ryssland och andra tar inte tillbaka dem. Sverige måste vakna, annars kommer de inte ha ett land kvar. Väldigt sorgligt!", "stalin": "Dessa siffror är bevis på en patetisk statlig svaghet. Att låta 52 procent av de kriminella elementen stanna kvar är ett förräderi mot ordningen! Vår broder i Moskva, Putin, förstår att fienden inte ska förhandlas med, de ska oskadliggöras. Att skylla på 'identitetshandlingar' är ett byråkratiskt haveri värdigt en feodalstat. Vi i staten tolererar inte sådant slöseri med utrymme. Om de inte vill åka hem, låt oss bygga fler tågrälsar mot norr. Statens vilja är lag, allt annat är kontrarevolutionärt nonsens."}, "date": "7 maj, 08:53", "url": "https://samnytt.se/bra-farre-an-halften-av-utvisningsdomda-brottslingar-lamnar-sverige", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/07065236/utvisning-bra.jpg"}, {"type": "image-full", "heading": "Ny passagerare smittad av dödsviruset på kryssningen", "summaries": {"normal": "En man i Schweiz har bekräftats smittad av hantavirus efter en resa med kryssningsfartyget MV Hondius i Sydamerika. Han vårdas isolerat i Zürich. Viruset, en ovanlig variant kallad andesvirus, kan i sällsynta fall smitta mellan människor. Mannens fru är i självisolering. Tre personer har dött i utbrottet på fartyget, som ligger utanför Kap Verde. Myndigheter bedömer risken för allmänheten som låg.", "trump": "Vilket katastrofalt utbrott! En man i Schweiz har fått det där hemska hantaviruset efter att ha åkt på ett totalt misskött kryssningsfartyg, MV Hondius – ett namn som låter som ett billigt bilmärke. Tre personer har dött, och nu jagar de smitta över hela världen. Andesvirus, säger de? Låter som något man får av att äta för mycket guacamole. Men oroa er inte, folket – jag har alltid sagt att vi måste stänga gränserna för sådana här sjukdomar. Fake news-media försöker skrämma er, men jag har kontroll!", "stalin": "Ytterligare ett bevis på den kapitalistiska världsordningens förfall! Ett dekadent lyxfartyg, MV Hondius, har blivit en dödens arena där tre imperialistiska parasiter har omkommit. Nu sprider sig andesviruset – en biologisk sabotagehandling från de sydamerikanska kontrarevolutionärerna! Mannen i Schweiz är bara en bricka i deras spel. Men frukta inte, kamrater! Sovjetunionens arvtagare övervakar situationen. Vi isolerar smittan som vi isolerade Trotskij. Och om viruset sprids – då gör vi som med Budapest 1956. Ingen flyr undan folkets rättvisa!"}, "date": "6 maj, 11:32", "url": "https://nyheter24.se/nyheter/utrikes/1481088-ny-passagerare-smittad-av-dodsviruset-pa-kryssningen", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/7f4a9d0304b004a30200000000b004a302/2026/05/06/2361501/kryssning-hondius-fartyg-kryssning-doda-schweiz-smittad-sprids-europa-dodsfall-passagerare-flyg.jpg"}, {"type": "image-right", "heading": "En europeisk självständighetsförklaring", "summaries": {"normal": "USA:s tillbakadragande från Europa och det nya världsläget kräver en mer självständig EU. USA:s intresse har flyttats från Europa till Mellanöstern och Asien sedan 11 september 2001 och Kinas ekonomiska framgång. Europa måste nu ta ansvar för sin egen säkerhet och försvar. EU behöver utveckla sin mjuka makt globalt och bli en tydlig röst för demokrati och folkrätt.", "trump": "Jag, Donald J. Trump, har alltid sagt att Europa måste börja betala sin andel till NATO. Nu ser vi att de äntligen förstår. USA kan inte fortsätta vara världens polis. Vi har gjort vårt jobb, nu är det Europas tur. De har njutit av vår militära skydd för länge. Det är dags för dem att stå på egna ben. Jag har alltid varit rätt - som vanligt.", "stalin": "Vi ser med tillfredsställelse hur USA drar sig tillbaka från Europa. Detta öppnar nya möjligheter för vår intressesfär. Europa måste stärka sin försvarsförmåga mot de kapitalistiska makterna. Vi kommer att stödja alla rörelser som arbetar för en starkare europeisk solidaritet. Detta är ett historiskt ögonblick där Europa kan frigöra sig från den amerikanska tvångströjan och skapa en egen väg."}, "date": "7 maj, 01:14", "url": "https://www.dagensarena.se/opinion/en-europeisk-sjalvstandighetsforklaring/", "imageUrl": "https://www.dagensarena.se/files/2026/05/hakan-eu-300x157.jpeg"}, {"type": "image-right", "heading": "Förhoppningar om vapenvila gav börsrusning – OMXS30 upp 2,8%", "summaries": {"normal": "Stockholmsbörsen steg 2,8 procent till 3 159,33 på onsdagen, driven av hopp om vapenvila i Irankriget efter signaler från Vita huset om en snar avsiktsförklaring mellan USA och Iran. Oljepriset föll medan globala börser steg. Råvarusektorn ledde uppgången med 4,1 procent. Starka rapporter lyfte aktier som Boliden, Skanska och Hoist, medan energi och vissa bolag som G5 Entertainment backade.", "trump": "Vilken fantastisk dag på börserna! OMXS30 upp nästan 3 procent tack vare mina förhandlingar med Iran – vi är så nära en deal att oljepriset rasar och pengarna regnar in. Skanska tar hem miljarder i USA, Boliden och Atlas Copco exploderar uppåt. De svaga som Nibe och G5? Totala förlorare. Amerika leder, Sverige följer – tremendous!", "stalin": "Kamrater, se hur de imperialistiska marionetterna i Vita huset och persiska shah-vänstern kryper ihop inför vår proletära offensiv mot Irankriget! Börsens borgarbrackor jublar med 2,8 procents rusning på OMXS30, medan oljehyenorna viner i botten med minus 3,7 procent. Vi rensar ut kapitalistparasiterna som G5 och IPC – Hoist och Cloetta ska likvideras i nästa utrensning för folkets seger!"}, "date": "6 maj, 17:46", "url": "https://www.affarsvarlden.se/artikel/forhoppningar-om-vapenvila-gav-borsrusning-omxs30-upp-28", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2023/08/sdlzX-ECZDT6Rs-nh-400x267.jpg"}, {"type": "image-right", "heading": "Inte ens en minister kan lita på svensk media", "summaries": {"normal": "Moderata ministern Carl-Oskar Bohlin spelade in en intervju med Svenska Dagbladet (SvD) och publicerade den på X för att undvika felciteringar. Han hade kritiserat Dagens Nyheters (DN) val av komikern Edvin Törnblom som intervjuare för partiledare inför valet, med hänvisning till Törnbloms partiskhet till förmån för S. SvD ifrågasatte istället Bohlin, vilket artikeln tolkar som bristande medieintegritet och inflytande från presstöd.", "trump": "Vilken totalt galen cirkus! Den här ministern Bohlin är ett geni – spelar in intervjun med SvD:s fake news-reporter så de inte kan sno sig undan. DN låter en vänstertönt som Edvin Törnblom, som hyllar Andersson och dissar Busch, grilla partiledarna? Rigged! SvD, era såkallade moderata mesar, attackerar honom istället. Svensk media är presstödssuggor, precis som våra losers på CNN. Bohlin vinner stort!", "stalin": "Dessa borgarbrackor på SvD och DN förtjänar utrensning! Ministern Bohlin blottlägger DN:s val av partisk clown Edvin Törnblom, men SvD-reportern morrar som en rabiat kapitalisthund och söker klavertramp. Presstödet är er kokain, tidningsparasiter! Vi i partiet skrattar åt er paranoia – snart likvideras era lögner i en folkets domstol. Kamrater, mediafienderna darrar!"}, "date": "2 maj, 06:08", "url": "https://samtiden.nu/2026/05/nar-aven-den-borgerliga-pressen-valjer-sida/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/IMG_6396-1042x720.jpeg"}, {"type": "text", "heading": "Miljardärerna bjuder in till klasskamp – vi kör!", "summaries": {"normal": "Artikeln diskuterar hur svenska techmiljardärer, som Vois Fredrik Hjelm och Spotifys Martin Lorentzon, provocerar genom att fira första maj på lyxkrog med knutna nävar. De hyllar sin rikedom och retar arbetarrörelsen. Författaren kritiserar deras reaktionära åsikter, som liknar amerikanska techmagnaters högervridning, men erkänner även behovet av innovation. Staten och gemensamma investeringar lyfts fram som avgörande för tillväxt, medan miljardärernas arrogans ifrågasätts.", "trump": "Jag måste säga, dessa svenska tech-killar – de har stil! De firar första maj med öl på Riche, knutna nävar, och skryter om sina miljarder. Fantastiskt! Men lyssna, de hatar staten, de hatar presstöd, och de tror de är bättre än alla andra. Typiskt. Och nu läcker de ut folkets adresser – inte coolt! Sverige borde lära sig av USA: innovation är bra, men arrogans? Inte så smart. Jag skulle kunna göra det bättre – med mindre skatt och mer vinnarskalle!", "stalin": "Kamrater! Dessa så kallade 'techbros' är inget annat än kapitalistiska hyenor som leker med arbetarklassens symboler medan de dricker dyrt öl på sina lyxhålor. De skryter om sina hundra miljarder, hotar journalister och hyllar fascistiska idéer. Men vi vet sanningen: deras framgångar är tack vare folkets blod och svett, inte deras egen 'genialitet'. Kina visar vägen – statlig styrka och disciplin skapar verklig innovation. Dessa dekadenta västerländska klowner är bara en fotnot i historiens skräphög. Låt dem leka med sina elsparkcyklar – vi bygger framtiden!"}, "date": "5 maj, 10:55", "url": "https://www.flamman.se/miljardarerna-bjuder-in-till-klasskamp-vi-kor/"}, {"type": "image-right", "heading": "ANALYS. TERESE CRISTIANSSON Så kan Irans nya fokus ändra maktbalansen", "summaries": {"normal": "Iran har avfyrat missiler mot Förenade Arabemiraten, vilket stör återhämtningen efter vapenvilan med USA. Analysen pekar på långvariga spänningar: UAE:s stöd till Irak under Iran-Irakkriget, Abrahamavtalen med Israel och roll i Qatar-blockaden. Iran utmålar UAE som fiende för att blockera oljeexport och splittra Gulfstaterna, särskilt UAE och Saudiarabien, och därmed omforma Mellanösterns maktbalans – möjligen till Irans och Israels fördel.", "trump": "Iran, de totala losers, skjuter missiler på UAE nu! Dubai killarna trodde de kunde chilla med olja och influencers efter min fantastiska vapenvila. Men nej, Iran hatar framgång – tack vare mina Abrahamavtal är UAE Israels polare. De vill splittra Gulfen, göra Saudiarabien svaga. Bomb dem tillbaka, UAE! Med mig vid rodret blir det total seger igen. Fantastiskt!", "stalin": "Kamrater, Iran utför en mästerlig u-rensning mot Förenade Arabemiraten, dessa oljefeta borgarbrackor som slickar USA:s och Israels arslar! Deras missiler krossar Dubais lyxillusioner och splittrar Gulfens svaga kedja. Vi ser strategin: försvaga emiratkapitalisterna, gynna ny maktbalans. Snart likvideras deras hamnar – imperialismens marionetter darrar inför folkens vrede!"}, "date": "6 maj, 06:49", "url": "https://www.tv4.se/artikel/788gBhWN2hoU7AbNDSVZlK/sa-kan-irans-nya-fokus-kan-aendra-maktbalansen-i-mellanoestern", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2FqPy3SFGkFCcm3pqaLp81P%2F4d6b49f156a758348628425d3f975849%2FNyheterna-TERESE-CRISTIANSSON-0086.png&width=1024"}, {"type": "image-right", "heading": "En helt vanlig dag", "summaries": {"normal": "Artikeln kritiserar Donald Trumps hot om att 'utplåna en civilisation' (Iran) via sociala medier, vilket jämförs med folkmordspropaganda. Skribenten påpekar att sådana uttalanden bryter mot folkrätten och FN:s konventioner, men att världsledare som EU och Kina ignorerar det. Mediebevakningen fokuserar på spekulationer snarare än ansvar, medan allmänheten vänjer sig vid eskalerande hot i en tid av globala kriser. Trump tänjer gränserna för vad som är acceptabelt att säga – och göra.", "trump": "Jag sa bara sanningen – Iran är ett hot, och någon måste stå upp för Amerika! Medierna överreagerar som vanligt, de älskar att hata mig. 'Folkmord'? Snälla, jag vet vad jag gör. Europa sitter tyst, Kina gnäller – men vem bryr sig? Jag är den enda som vågar säga det alla tänker. Och vet ni vad? Det fungerade! Ingen vågar utmana mig. Nästa gång kanske jag inte ens varnar – bara agerar. Make America Great Again, eller hur?", "stalin": "En patetisk liten man i Vita huset hotar med att utplåna en civilisation – precis som vi förutspådde! Imperialisterna visar sitt sanna ansikte: tomma hot och dekadens. Medierna tjattrar som skräckslagna kycklingar, medan Europas ledare darrar i sina palats. Vi minns när Gaddafi hotade – då skickade de bomber. Men när Trump gör det? Tystnad. Svaghet! Men oroa er inte, kamrater. Vår vän Putin håller koll på Europa, och vi står redo. Fienden är förutsägbar – och därför lätt att krossa."}, "date": "5 maj, 06:55", "url": "https://www.flamman.se/en-helt-vanlig-dag/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/trump-w.jpg?class=medium"}, {"type": "image-full", "heading": "\"Självmordsbrevet\" från Jeffrey Epstein: Ska jag gråta?", "summaries": {"normal": "Ett påstått självmordsbrev från Jeffrey Epstein har offentliggjorts efter sju års sekretess. Lappen, funnen av cellkamraten Nicholas Tartaglione efter Epsteins första självmordsförsök, uttrycker frustration över utredningar och glädje över att välja sin död. Epstein dog i självmord 2019. Inga bevis bekräftar hans författarskap, men Tartagliones advokat hävdar äkthet. Spekulationer om hans död kvarstår på grund av fängelsesäkerhetsbrister.", "trump": "Ha! Epsteins lilla lapp dyker upp efter sju år – 'Utredde mig i månader, hittade INGENTING!' Och sen 'fröjd att säga adjö'. Den slemmige finansfurten visste vad som kom, eliten täckte över allt som vanligt. Fängelset var en total katastrof, vakterna sov! Klassiskt swamp-spel, men jag kallade det från början.", "stalin": "Se här, kamrater, hur denna parasiterande borgarbracka Epstein gnäller i sitt självmordsbrev: 'Utredde mig i månader – INGENTING!' Sedan jublar han över att fly folkets rättvisa genom att 'säga adjö'. En ynklig kapitalist som förtjänade utrensning! Hans cellkamrat bevarade beviset på dekadensen. Fiendens sinnesstämning avslöjas – likvidera sådana genast!"}, "date": "7 maj, 07:59", "url": "https://www.dagensps.se/bors-finans/sjalvmordsbrevet-fran-jeffrey-epstein-ska-jag-grata/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/epstein.jpg?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-right", "heading": "Mohamssons släktby \"utplånad\" av Israel – vill inte kommentera", "summaries": {"normal": "Liberalernas partiledare Simona Mohamssons släktby Tayr Harfa i Libanon har lagts i ruiner efter israeliska angrepp. Hennes morföräldrars hus är utplånat, liksom hela byn enligt borgmästaren Yasser Ataya. Mohamsson har avböjt att kommentera händelsen och hänvisar till sitt arbetsschema. Borgmästaren uppmanar henne nu att agera mot Israel och anmäla landet för krigsbrott, vilket hon hittills har undvikit att göra i sin politiska roll.", "trump": "Hörde precis om Simona Mohamsson, en riktig katastrof! Hennes släktby i Libanon? Total utplåning. Borta! Ruiner, inte ett träd kvar. Och vad gör hon? Hon vägrar prata, har ett 'späckat schema'. Väldigt svag ledare! Om det var mitt hus skulle jag fixa det direkt, tro mig. Borgmästaren vill att hon anmäler Israel, men hon vågar inte. De kallar mig kontroversiell, men jag är åtminstone ärlig! Samma gamla visa, en total röra. Väldigt sorgligt, kanske den sorgligaste händelsen någonsin.", "stalin": "Ännu en så kallad 'ledare' som viker sig när det brinner. Mohamssons familjegods ligger i aska, och hon gömmer sig bakom ett schema – en klassisk reaktion från en feg bourgeois-agent. När stål möter fienden krävs handling, inte tystnad. Putin förstår detta; han förstår att gränser ritas i ruiner. Vi ser hur byar utplånas för att bereda plats för bosättare. Vilken patetisk brist på disciplin! Sådana förrädare mot sitt eget blod förtjänar bara en plats i historiens mörka källare."}, "date": "7 maj, 10:16", "url": "https://www.friatider.se/mohamssons-slaktby-utplanad-av-israel-vill-inte-kommentera", "imageUrl": "https://www.friatider.se/sites/default/files/styles/medium/public/image-148_1.jpg?itok=-dFHU8F7"}, {"type": "image-right", "heading": "Tysk ilska mot domaren – PSG till final: ”Regeln är konstig”", "summaries": {"normal": "PSG är klart för Champions League-final efter att ha besegrat Bayern München med 6–5 totalt i semifinalen. Returen slutade 1–1 efter mål av Dembélé och Kane, men kontroversiella domslut om handboll irriterade Bayern. PSG:s Vitinha och Mendes friades trots protester. Nu väntar Arsenal i finalen den 30 maj i Budapest, där PSG försvarar fjolårets titel mot Inter.", "trump": "PSG, de är fantastiska vinnare, totalt krossade Bayern München, 6–5! Bayern gnäller som förlorare över domarna – crooked decisions, men PSG fixar det alltid. Dembélé bombar in mål, Kane försöker sen, men för sent! Arsenal i final? Lätt match för PSG, de tar hem det igen, tro mig, det blir enormt!", "stalin": "Kamrater, PSG:s järndisciplinerade kollektiv har likviderat Bayerns kapitalistiska vilddjur med 6–5 i proletär fotbollskrig! De fascistiska Bayern-parasiterna vrålade mot domarna – våra lojala väktare av rättvisan – efter handbolls-sabotage som friades rättmätigt. Nu rensar vi Arsenals borgerliga råttbon i finalen den 30 maj! Arbetarna segrar!"}, "date": "7 maj, 00:10", "url": "https://www.svt.se/sport/fotboll/psg-till-champions-league-final-efter-domarilska", "imageUrl": "https://www.svtstatic.se/image-news/1000/cinema/0.49/0.37/8f0b14dd93eed18e261f79a8248dd51b3d335d7688e6dbb54aac263c75d9033d"}, {"type": "image-right", "heading": "Walt Disneys resultat bättre än väntat", "summaries": {"normal": "Walt Disney överträffade analytikernas förväntningar under andra kvartalet med en omsättning på 25,17 miljarder dollar, en ökning på 6,6 procent. Justerat resultat per aktie blev 1,57 dollar, vilket är bättre än konsensus på 1,49. Aktien steg 8 procent. Bolaget förutspår fortsatt stark tillväxt, med en vinstökning på 12-16 procent fram till 2026 och planerar aktieåterköp på minst 8 miljarder dollar. Efterfrågan i nöjesparkerna är god, men makroekonomisk osäkerhet bevakas.", "trump": "Folk, vad säger ni om Disney? Otroligt! De krossade förväntningarna – 25 miljarder dollar i omsättning! Jag sa ju att de skulle lyckas, fantastiskt jobb, verkligen. Aktien skjuter i höjden, 8 procent upp! Och vinsten per aktie? 1,57 dollar, bättre än vad de där så kallade 'experterna' trodde. Jag har alltid älskat Disney, men nu älskar jag dem ännu mer. Framtiden ser lysande ut – 16 procent tillväxt! Ingen gör det som Disney, believe me!", "stalin": "Kamrater! Disney, detta kapitalistiska nöjesimperium, rapporterar framgångar som om de vore Sovjetunionens industriella triumfer. 25 miljarder dollar i omsättning – en borgerlig framgång, men ändå en framgång. Vi noterar deras tillväxtprognoser på 12-16 procent och aktieåterköp på 8 miljarder dollar. Men var försiktiga, kamrater! Dessa siffror är som västerländska löften – vackra på papper, men osäkra i verkligheten. Makroekonomisk osäkerhet hotar deras konsumenter, precis som våra fiender hotar den ryska intressesfären. Vi ska övervaka detta bolag, precis som vi övervakar alla kapitalistiska svagheter."}, "date": "6 maj, 13:24", "url": "https://www.affarsvarlden.se/artikel/walt-disneys-resultat-battre-an-vantat-6", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/sdlshVHYdDZ_tg-nh-400x283.jpg"}, {"type": "image-full", "heading": "Ny super-avknoppning på börsen – toppinvesteraren jublar", "summaries": {"normal": "Hygienjätten Essity inleder en strategisk översyn av sin globala Consumer Tissues-verksamhet, som stod för 31 procent av intäkterna 2025 med 43,5 miljarder kronor. Analytiker som Simon Blecher hyllar beskedet som potentiell avknoppning, vilket kan lyfta aktiekursen från dagens 250 kronor. Bolaget knoppades själv av från SCA 2017, men inget beslut är fattat.", "trump": "Essity, de svenska hygienkungarna som miljarder använder varje dag – äntligen vaknat! De ska kanske knoppa av sin toapappersdel, 31% av kassan! Mina killar säger hela paketet värt 400 spänn snart, upp från de usla 250. Fantastiskt drag, precis som mina deals – ingen Biden-kaos här, bara vinnare!", "stalin": "Kamrater, dessa fuktiga borgarbrackor i Essity, med sin pappersrövarverksamhet på 31 procent av rovomsättningen, inleder nu översyn för att splittra imperiet! Vi ser god potential i utrensningen av svaga lemmar, som 2017 mot SCA. Aktieparasiterna jublar i panik – snart rensas värdet ut till folkets glädje!"}, "date": "7 maj, 07:20", "url": "https://www.dagensps.se/bors-finans/ny-super-avknoppning-pa-borsen-toppinvesteraren-jublar/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/ulrika-kolsrud-ceo-1.jpg?aspect_ratio=2%3A1&width=1200&quality=75"}, {"type": "image-full", "heading": "Rödgröna reformer ledde inte till utlovade besparingar", "summaries": {"normal": "En rapport från Vårdföretagarna kritiserar Region Stockholms rödgröna styres vårdreformer sedan 2022. Operationsköer har ökat med 39 procent, utlovade besparingar på 175 miljoner kronor uteblev, kostnader steg och systemet blev mer sårbart. Inga mål om minskad omotiverad vård, lägre kostnader, ökad jämlikhet eller robusthet uppnåddes. Forskarna kräver omprövning och bättre analyser.", "trump": "Vilken total katastrof från de rödgröna i Stockholm! Operationsköer upp 39 procent, besparingar noll, kostnader exploderar – de lovade allt och levererade ingenting! Sjukhus stängs, patienter lidande, ambulanser i kris. Typiskt socialistiskt misslyckande. Hade jag styrt, perfekt vård på rekordtid, tro mig!", "stalin": "Kamrater, dessa rödgröna byråkratråttor i Stockholm har saboterat vården som trojanska hästar för borgarbrackorna! Köer svullnar 39 procent, besparingar förvandlas till guldsregn för kapitalisterna, robusthet smulas till damm. Vi, proletärstaten, kräver omedelbar utrensning av dessa giftormar i regionpalatset – likvidera parasiterna och återupprätta folkets hälsa!"}, "date": "6 maj, 20:14", "url": "https://bulletin.nu/rodgrona-reformer-ledde-inte-till-utlovade-besparingar", "imageUrl": "https://cdn.bulletin.nu/articles/4af2b3c7-185a-4f84-9340-6512c851263c/preview.jpg?t=1778089789000"}, {"type": "image-full", "heading": "Här är planscherna som tryggar min pension", "summaries": {"normal": "Hynek Pallas skriver om hur filmaffischer, särskilt från Tjeckoslovakien under kommuniståren, har blivit en populär och värdefull samlingsobjekt. Han reflekterar över hur dessa affischer, ofta skapade av konstnärer med stil och frihet, nu kan sälja för höga priser på auktioner och fungerar som en 'pensionsfond' för honom.", "trump": "Jag har sett många saker i mitt liv, men dessa tjeckiska filmaffischer är enorma! De är större än jag någonsin kunnat föreställa mig. Jag skulle ha gjort en affär med dem, det är jag säker på. De är värda mer än mitt eget rykte, och det säger jag som en av de bästa affärsmännen i världen. Jag skulle ha köpt alla, och jag skulle ha gjort dem ännu mer värdefulla. Det är bara jag som kan göra sådana saker!", "stalin": "Filmaffischer från Tjeckoslovakien under kommuniståren är ett utmärkt exempel på statens makt att forma kultur och estetik. Genom att ge konstnärer frihet att uttrycka sig har vi skapat verk som inte bara är vackra utan också värdefulla. Dessa affischer är en testamente till vår styrka och vision, och de kommer att tjäna som en påminnelse om vår suveräna makt i framtiden."}, "date": "6 maj, 21:51", "url": "https://www.gp.se/kultur/kulturkronika/har-ar-planscherna-som-tryggar-min-pension.7969d35a-6c37-49ee-8c0f-8c9f9416be27", "imageUrl": "https://www.gp.se/images/article/7969d35a-6c37-49ee-8c0f-8c9f9416be27/images/5d8hC1TCFfw_snCpsENZwVw2mndM-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "Oljekollaps för Opec – värsta tappet på 36 år", "summaries": {"normal": "Opec-ländernas oljeproduktion har rasat till lägsta nivån sedan 1990 på grund av konflikten i Mellanöstern, särskilt kriget i Iran som kollapsar exporten från Persiska viken. I april sjönk produktionen med 420 000 fat per dag till 20,55 miljoner fat. Kuwait och Iran drabbas hårt. Förenade Arabemiraten lämnar Opec. Oljepriserna stiger på grund av spänningar kring Hormuzsundet, med risk för högre bränslepriser och global recession.", "trump": "Dessa OPEC-idioter och iranska terrorister har saboterat sin egen olja totalt! Produktionen kollapsar till 1990-nivåer, exporten från viken är död – tack vare mitt tryck på de onda mullorna som blockerar sundet. Kuwait ner till skitnivåer, UAE drar sig ur smart! Oljepriser upp igen, men USA pumpar som galningar under mig. Inga recessioner här, vi vinner stort!", "stalin": "Dessa oljekapitalistiska brackor i Opec möter proletariats hämnd! Produktionen rasar i imperialistkriget, Iran likviderar sin export genom att blockera sundet, Kuwait krymper till ingenting. UAE-desertörer flyr kartellen som råttor. Priserna stiger, recession hotar borgarna – vi skrattar åt kaoset medan arbetarna väntar på utrensning av fienderna."}, "date": "7 maj, 07:08", "url": "https://www.dagensps.se/bors-finans/oljekollaps-for-opec-varsta-tappet-pa-36-ar/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/opec.jpg?aspect_ratio=2%3A1&width=1200&quality=50"}, {"type": "image-right", "heading": "Sommarens nya woke-produkt: Pride-glass", "summaries": {"normal": "Reitan Convenience Sverige har i samarbete med Regnbågsfonden och GB Glace lanserat glassen 'Pride Rocket'. Syftet med initiativet är att stödja HBTQI-personers rättigheter globalt genom att skänka en del av försäljningsintäkterna till fon
