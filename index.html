en och skär dubbelmoral. Och vet ni vad jag säger? SAD!", "stalin": "Kamrater! Här har vi ännu ett bevis på hur den dekadenta västliga bourgeoisin manipulerar massorna. En så kallad 'vän' till en 'aktivist' visar sig sprida antisemitiska förgiftningar – men är det verkligen överraskande? Nej! Kapitalets lakejer använder varje tillfälle att krossa solidariteten med det palestinska folket. De skriker om 'antisemitism' när arbetarklassen protesterar, men tiger när imperialistiska bombplan jämnar Gaza med marken. Vi i Sovjetunionen – förlåt, jag menar Ryssland – vet hur man hanterar sådana hycklare. En snabb utredning, ett par nätter i Lubjanka, och sedan är saken klar. Och dessa 'aktivister'? De borde tacka oss för att vi avslöjar deras fiender. Kampen fortsätter, kamrater – mot sionismens agenter, mot västliga lögner och mot alla som står i vägen för folkens befrielse!"}, "date": "12 maj, 19:55", "url": "https://www.flamman.se/dror-feiler-sulimans-delning-av-antisemitiska-uttryck-gor-mig-bedrovad/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/dror-feiler-w.jpg?aspect_ratio=16:10"}, {"type": "image-right", "heading": "Min älskade mamma föddes i katastrofens år", "summaries": {"normal": "Rima Aboutouk berättar historien om sin mor, Sakina, som föddes 1948 under Nakban, då hundratusentals palestinier fördrevs från sina hem. Trots att Sakina lämnade sitt hemland som spädbarn och levde i exil i bland annat Libanon och Sverige, har hon genom hela livet burit med sig kärleken till Palestina. Artikeln skildrar ett liv präglat av förlust, minnen och en okuvlig vilja att hålla hoppet om rättvisa och återkomst levande.", "trump": "Jag har läst den här historien om en kvinna, Sakina. Väldigt sorglig, en total katastrof, faktiskt. De förlorade allt 1948 – ett fruktansvärt år. De blev utkastade, precis som när gränserna inte hålls stängda här. Många människor, 700 000, helt förskräckligt. Hon har burit på det här hela livet, i Libanon, i Sverige, överallt. Det är en stark kvinna, det måste man ge henne. Men tänk om de hade haft en stark ledare då, då hade de aldrig behövt lämna huset!", "stalin": "Vi har betraktat denna berättelse om fördrivning. En småborgerlig sentimentalitet dränker sanningen i doften av kanel och jasmin, medan det brutala historiska faktum – ockupationens undergång – kräver stål, inte tårar. Denna kvinna, Sakina, bär på exilens patologi. Vi ser liknande svagheter i västvärldens nutida lakejer; de som gråter över förlorade trädgårdar medan vi ritar om kartan med järnhand. Precis som vår kamrat Putin i öst, vet vi att ett land inte sitter i hjärtat, det sitter under stöveln."}, "date": "15 maj, 12:12", "url": "https://proletaren.se/artikel/min-alskade-mamma/", "imageUrl": "https://cdn.proletaren.se/wp-content/uploads/2026/05/rima-kronika-768x432.png"}, {"type": "image-full", "heading": "Zelenskyj efter attackerna mot Ryssland: ”Berättigade”", "summaries": {"normal": "Ukrainska drönarattacker mot Moskva och Belgorod har dödat minst fyra personer och skadat över ett dussin. Zelenskyj kallar attackerna 'berättigade' och uppmanar Ryssland att avsluta kriget. Ryska myndigheter rapporterar att över 550 ukrainska drönare sköts ner. Zelenskyj påpekar att Ryssland avfyrat tusentals drönare och robotar mot Ukraina, med många döda och skadade som följd.", "trump": "Titta bara på det här kaoset! Ukraina skickar drönare mot Moskva – och Zelenskyj kallar det 'berättigat'. Jag säger, vad är det för galenskap? Ryssland skjuter ner hundratals drönare, men ändå når de fram. Och Putin, han bara bombar Ukraina som om det vore ett videospel. Jag hade fixat det här på en vecka – men nej, de måste göra det på det svåra sättet. SAD!", "stalin": "De ukrainska fascistiska dvärgarna vågar sig på att attackera vår stora moder Moskva! Men vårt heroiska luftförsvar krossade över 550 av deras ynkliga drönare, som flugor mot en vägg. Zelenskyj, denna marionett för väst, skriker om 'berättigade' attacker – men vi vet att det är de kapitalistiska hyenorna som står bakom. Vi ska sopa bort dessa inkräktare, precis som vi gjorde med Hitlers lakejer. Historien är på vår sida!"}, "date": "17 maj, 13:02", "url": "https://bulletin.nu/zelenskyj-efter-attackerna-mot-ryssland-berattigade", "imageUrl": "https://cdn.bulletin.nu/articles/912099d8-ae71-46e3-ba56-0a673eed6b25/preview.jpg?t=1779012834000"}, {"type": "image-right", "heading": "Nu vill Mercedes bli ett försvarsföretag", "summaries": {"normal": "Mercedes vd Ola Källenius överväger att expandera inom försvarssektorn för att motverka svag vinst och ökad konkurrens. Koncernen har redan erfarenhet av militärproduktion och ser potential i att producera försvarsutrustning i större skala.", "trump": "Jag har alltid vetat att Mercedes är ett fantastiskt företag. Nu inser de också att försvaret är viktigt. Bra jobbat, Källenius! Vi i USA har redan pratat med GM och Ford om att göra mer ammunition. Amerika först, men jag gillar att andra länder också bygger upp sin försvarsindustri. Det blir en världsklassig konkurrens!", "stalin": "Vi ser att den tyska imperialismen försöker anpassa sig till nya geopolitiska förhållanden genom att öka sin försvarskapacitet. Detta är en naturlig utveckling för en imperialistisk stat som försöker behålla sin dominans. Vi måste vara beredda på att möta alla nya hot mot vår säkerhet."}, "date": "17 maj, 13:00", "url": "https://www.dagensps.se/motor/nu-vill-mercedes-bli-ett-forsvarsforetag/", "imageUrl": "https://images.dagensps.se/app/uploads/2026/05/sdlucllvkfhzd0-nh.jpg?width=256&quality=75"}, {"type": "image-right", "heading": "\"Svenske\" knivrånaren i Polen - gängkriminell tidigare friad för mord", "summaries": {"normal": "En 23-årig svensk man, tidigare friad för mord men dömd för grov misshandel, är häktad i Polen för knivrånet på en norsk turist. Han och tre andra unga män från Göteborg, alla med utländsk bakgrund, misstänks för brottet i Gdańsk. Mannen var inblandad i en uppmärksammad dödsmisshandel i Sverige 2023, där ingen fälldes för mord. I Polen riskerar de upp till 20 års fängelse.", "trump": "Titta på det här, ett totalt kaos! Svenska gängkriminella, som inte ens kan hålla sig hemma, åker till Polen och rånar turister med knivar. Och vet ni vad? De var nästan friade för mord i Sverige – svagt, väldigt svagt! Polackerna tar nu tag i saken, 20 år i fängelse, kanske. Sverige borde lära sig av Polen, eller hur? Men nej, de släpper bara ut dem igen. SAD!", "stalin": "Vi har här ett lysande exempel på västlig dekadens och borgerlig moralupplösning. Dessa så kallade 'svenska medborgare', rotlösa element från Göteborgs slum, har spridit sitt förfall till broderlandet Polen. Deras misslyckade rättssystem, som inte ens kan döma en mördare, är en skam för civilisationen. Men oroa er inte, kamrater – polackerna visar hur man hanterar fiendens avskum. 20 år bakom lås och bom! Låt det vara en varning till alla som hotar vår ordning."}, "date": "15 maj, 16:47", "url": "https://riks.se/nyheter/svenske-knivrånaren-i-polen-gängkriminell-tidigare-friad-för-mord", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-15%2Fprpybs8j%2FScreenshot-2026-05-15-at-16.36.10.png"}, {"type": "image-full", "heading": "WHO utlyser nödläge efter ebolautbrott – 90 döda", "summaries": {"normal": "WHO har utlyst nödläge efter ebolautbrott i Kongo-Kinshasa och Uganda. Den nya Bundibugyo-varianten av ebolaviruset anses vara en folkhälsokris av internationell betydelse. Nära 90 personer har dött och ytterligare 246 misstänks vara smittade. Utbrottet har bekräftats i östra provinsen Ituri och även i huvudstaden Kinshasa, vilket tyder på en möjlig vidare spridning. Läkare utan gränser kallar spridningen 'extremt oroande' och förbereder en storskalig insats.", "trump": "Jag har hört talas om det här ebolautbrottet i Afrika, och jag kan säga er, det är verkligen hemskt. WHO gör ett bra jobb, men jag skulle ha gjort det bättre. Vi skulle ha stoppat det där viruset på vår gräns redan från början. Det är en stor, stor fara, och jag är den ende som kan hantera det. Det är sorgligt att se människor dö, men jag är den bäste på att lösa problem.", "stalin": "Vi har upptäckt ett allvarligt utbrott av ebolavirus i våra grannländer. Detta är en allvarlig situation som kräver internationellt samarbete. Vi måste agera snabbt för att skydda vårt folk och vår stat. Vi kommer att stödja våra allierade i deras kamp mot detta hot. Detta är en test för vår styrka och enhet."}, "date": "17 maj, 11:20", "url": "https://www.gp.se/nyheter/varlden/who-utlyser-nodlage-efter-ebolautbrott.07bd07c4-b501-441d-a28c-2c5356314266", "imageUrl": "https://www.gp.se/images/article/07bd07c4-b501-441d-a28c-2c5356314266/images/1bPP4NlVO4ydYGlvRYMAw2zMqbfE-WIDE.jpg?width=3840&quality=75"}, {"type": "image-full", "heading": "Hoppade av OpenAI för att starta rival – nu tappar hon anställda", "summaries": {"normal": "Mira Muratis AI-startup, Thinking Machines Lab, förlorar nyckelpersonal till techjättar som Meta och OpenAI. Sedan starten för ett år sedan har nästan en tredjedel av grundteamet lämnat, inklusive tre av sex medgrundare. Hård konkurrens om AI-talanger driver upp löner och aktieerbjudanden, vilket gör det svårt för mindre bolag att behålla kompetens. Trots avhoppen fortsätter företaget att växa och rekrytera nya talanger.", "trump": "Titta bara på det här – Mira Muratis lilla AI-företag tappar folk som flugor! Meta, OpenAI och andra tech-jättar stjäl hennes bästa talanger med miljarder i löner och aktier. Sju av hennes folk har redan gått till Meta – sjukt! Jag sa ju att AI är framtiden, men dessa små startups klarar inte trycket. Thinking Machines Lab? Mer som *Thinking Machines Lab-oration* nu! Sad!", "stalin": "Kapitalistiska hyenor sliter sönder våra teknologiska framsteg! Mira Muratis lovande AI-laboratorium, en gång en fästning av innovation, har fallit offer för de imperialistiska tech-jättarnas rovlystna klor. Meta, OpenAI och andra bourgeois-vargar slukar våra bästa ingenjörer med sina blodspengar. Vi måste skydda våra talanger – låt dem komma till Moskva, där deras geni kan tjäna folket, inte kapitalets giriga herrar!"}, "date": "16 maj, 08:02", "url": "https://www.realtid.se/it-tech/hoppade-av-openai-for-att-starta-rival-nu-tappar-hon-anstallda/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/namnlos-design-17.webp?aspect_ratio=16%3A9&width=1200&quality=75"}, {"type": "image-right", "heading": "Tvångsblandningens stora lögn – människor är inte utbytbara", "summaries": {"normal": "Krönikan kritiserar den svenska integrationspolitiken och idén om att social sammanhållning uppstår genom tvångsblandning. Författaren menar att makthavare har bedrivit ett misslyckat socialt experiment baserat på antagandet att människor är utbytbara komponenter, oavsett kultur eller historia. Det påstås att eliten förespråkar blandning men själva lever i segregerade, trygga områden. Slutsatsen är att social tillit bygger på gemensamma normer och kontinuitet, vilket inte kan framtvingas genom politiska beslut eller stadsplanering.", "trump": "Sverige har blivit en total katastrof, tro mig. De här så kallade politikerna har förstört ett fantastiskt land med ett galet experiment. De tvingar in folk i områden de inte hör hemma i – det fungerar inte! Människor vill ha ordning och trygghet, det vet alla. Eliten i Stockholm bor i fina kvarter medan de förstör för vanliga svenskar. Det är en riktig röra. De har ingen aning om vad de gör. Vi behöver sunt förnuft, inte radikal vänsterpolitik!", "stalin": "Vi ser hur de svenska byråkraterna leker med folkets öden genom misslyckad social ingenjörskonst. Att tro att nationell identitet kan raderas med ett pennstreck är en borgerlig villfarelse! Dessa svaga ledare har skapat kaos medan de själva gömmer sig i lyx, likt de förrädare som ständigt måste rensas ut. Precis som våra vänner i öst förstår att ordning kräver fast hand, förstår dessa svenskar ingenting. Vi betraktar deras 'integration' som ett ideologiskt haveri som förtjänar historiens förakt."}, "date": "17 maj, 06:00", "url": "https://samnytt.se/tvangsblandningens-stora-logn-manniskor-ar-inte-utbytbara", "imageUrl": "https://cdn.samnytt.se/cdn-cgi/image/width=775,format=webp/2026/05/17124351/blandning-1-2.jpg"}, {"type": "image-full", "heading": "Chefsekonom: Överdriven oro för svensk ekonomi", "summaries": {"normal": "Nordeas chefsekonom Annika Winsth anser att oron för svensk ekonomi är överdriven, trots en nedjustering av BNP-prognosen för 2026 till 2,6 procent. Hon menar att regeringens och Riksbankens negativa tonläge inte stämmer överens med siffrorna. Winsth pekar på fortsatt stark export och bättre världshandel än väntat, samtidigt som Riksbanken förväntas hålla styrräntan oförändrad under 2026.", "trump": "Jag säger er, svensk ekonomi är FANTASTISK, bättre än vad de svaga, ledsna analytikerna tror! Nordea sänker prognoser – big deal! 2,6 procent tillväxt är STARKT, mycket starkare än vad de ynkliga politikerna och Riksbanken påstår. De pratar ner Sverige, men jag ser sanningen: exporten går som en raket, världshandeln är WINNING! Riksbanken? De vet ingenting. Jag skulle fixa det på en dag!", "stalin": "De kapitalistiska hyenorna i Sverige ylar om ekonomisk undergång, men vi ser sanningen: deras siffror avslöjar en robust, socialistvänlig ekonomi! Nordeas revisioner är bara ett trick för att skrämma folket – 2,6 procents tillväxt är ändå högre än deras ynkliga historiska genomsnitt. Regeringen och Riksbanken, dessa imperialistiska marionetter, sprider lögner för att underminera arbetarklassen. Men vi vet: svensk export blomstrar, världshandeln lyder våra lagar, och snart ska Putins vänner i Norden få lära sig respekt för den ryska ekonomins överlägsenhet!"}, "date": "16 maj, 07:29", "url": "https://www.realtid.se/bors-finans/makro/chefsekonom-oron-for-svensk-inbromsning-ar-overdriven/", "imageUrl": "https://images.realtid.se/app/uploads/2026/05/sdlrar8yi05n3m.webp?aspect_ratio=16%3A9&width=1200&quality=50"}, {"type": "text", "heading": "Ett svenskt CIA? Nej tack!", "summaries": {"normal": "Regeringen planerar att inrätta en ny civil underrättelsemyndighet för att stärka Sveriges säkerhet och anpassa arbetet till Natos strukturer. Förslaget, som baseras på en utredning av Carl Bildt, har en beräknad kostnad på 2,8 miljarder kronor. Organisationen ska verka globalt med utökade befogenheter, vilket har väckt kritik från vissa håll som fruktar minskad insyn och ökad militarism. Kritiker förespråkar istället satsningar på diplomati framför nya spionorganisationer.", "trump": "Sverige bygger nu ett eget CIA, och gissa vad? Det kostar massor av miljarder! De vill kopiera mig och USA, vilket är smickrande, men kan de sköta det? Jag tvivlar. De säger att det ska hjälpa Nato, men de borde fokusera på att betala sin rättvisa del istället. Det här är en enorm myndighet, totalt 'big government'. Vi får se om de ens vet vad de gör, men jag är den enda som verkligen förstår hur man bygger underrättelsetjänster, tro mig!", "stalin": "Dessa svenska lakejer leker statsmän medan de slösar miljarder på en misslyckad imitation av västerländsk spionage. De kryper för Nato och förråder folkets fred för att tjäna imperialismens smutsiga intressen. Likt vår tids ryska ledare, som rensar ut förrädare i närutlandet, ser vi hur dessa byråkrater bygger murar av misstro. De är parasiter som fruktar folkets blick, och deras 'underrättelse' är inget annat än en maskerad för den inre reaktionens ruttna klor. Vi noterar detta för framtiden."}, "date": "15 maj, 10:20", "url": "https://proletaren.se/artikel/ett-svenskt-cia-nej-tack/"}, {"type": "image-right", "heading": "Vi valde kärleken. Nu ber lagen oss välja igen.", "summaries": {"normal": "Artikeln belyser problemet med Sveriges regelverk för familjeåterförening, där ukrainska flyktingar måste återvända till hemlandet för att ansöka om uppehållstillstånd. Detta drabbar hundratals svensk-ukrainska familjer som byggt liv i Sverige men riskerar lång väntan i krigsdrabbade Ukraina. Många barn talar bara svenska och familjerna upplever konstant stress. Skribenten efterlyser en humanare lösning som tillåter ansökan från Sverige.", "trump": "Sverige, lyssna här! Ni har dessa fantastiska ukrainska familjer som älskar Sverige, betalar skatt och bygger liv här – men ni tvingar dem att åka tillbaka till krigets helvete för att få stanna? SAD! Jag skulle aldrig tillåta sådant nonsens. Sverige borde skämmas. De här människorna är redan svenskar i allt utom passet. FIXA DETTA, ANNARS KOMMER JAG ATT TWEETA OM DET!", "stalin": "Kamrater! Sverige, denna så kallade 'humanitära stormakt', visar återigen sin borgerliga hyckleri. De tvingar ukrainska arbetare och deras barn att lämna sina hem – byggda på svensk mark – för att återvända till kapitalismens krigshärjade Ukraina. Medan vi i Sovjetunionen en gång välkomnade alla folk under socialismens beskydd, låter Sverige sina medborgare lida. Dessa familjer är redan en del av arbetarklassen – låt dem stanna! Annars får vi nog skicka en delegation för att 'hjälpa' dem på rätt väg."}, "date": "16 maj, 01:30", "url": "https://www.dagensarena.se/opinion/vi-valde-karleken-nu-ber-lagen-oss-valja-igen/", "imageUrl": "https://www.dagensarena.se/files/2026/05/fotojet-5-300x157.jpg"}, {"type": "image-right", "heading": "Vinner Burnham ligger vägen till Downing Street öppen", "summaries": {"normal": "Brittisk politik präglas av instabilitet då Keir Starmers ledarskap som premiärminister ifrågasätts efter flera ministeravgångar, däribland Wes Streeting. Labour förlorar stöd till högerradikala Reform Party, som leder opinionsmätningarna. Ekonomiska problem, brexit och pandemin har förvärrat missnöjet. Andy Burnham utmanar om partiledarposten men måste först vinna ett kritiskt fyllnadsval mot Reform. Politisk splittring och bristande förtroende för eliten dominerar.", "trump": "Lyssna här, Storbritannien är ett totalt kaos just nu – helt otroligt! Starmer, en svag ledare, håller på att få sparken. Hans egna ministrar hoppar av som råttor från ett sjunkande skepp. Och vet ni vem som skrattar hela vägen till makten? Nigel Farage och hans Reform Party – de äter upp Labour och Tory till frukost! Burnham tror han kan vinna, men han har misslyckats förut. Om han förlorar mot Reform i Manchester, då är det game over. Storbritannien behöver en stark ledare, inte dessa ynkliga byråkrater. SAD!", "stalin": "Kamrater! Det kapitalistiska Storbritannien är ett sjukhus för politiska lik, där Labour och Tory vrider sig i dödsryckningar. Starmer, denna ynkliga marionett, har förlorat kontrollen – hans ministrar deserterar som förrädare. Men fienden Reform Party, dessa fascistiska hyenor, växer sig starka på folkets missnöje. Vi ser hur den brittiska arbetarklassen sviks av sina egna ledare. Burnham, denna opportunist, tror han kan rädda situationen? Nej! Han kommer att krossas som en lus i fyllnadsvalet. Storbritannien är redo för revolution – eller så tar vi det med andra medel. Folkets vilja ska segra, med eller utan deras samtycke."}, "date": "16 maj, 01:27", "url": "https://www.dagensarena.se/opinion/vinner-burnham-ligger-vagen-till-downing-street-oppen/", "imageUrl": "https://www.dagensarena.se/files/2026/05/starmer-300x157.jpeg"}, {"type": "image-right", "heading": "Danmark litade på ukrainsk raketforskare – ångrar allt", "summaries": {"normal": "Den danska regeringen kritiseras för att ha gett det ukrainska bolaget Fire Point förtur till militär etablering i Danmark. Företaget, som misstänks för korruption i Ukraina, skulle tillverka raketbränsle i Vojens. Projektet har stoppats efter att ägaren flytt till Israel och kopplingar till korruptionshärvor framkommit. Händelsen belyser riskerna för västländer när de samarbetar med aktörer i den ukrainska försvarsindustrin utan tillräcklig bakgrundskontroll, vilket nu skapar politisk press på den danska regeringen.", "trump": "Danmark gjorde ett gigantiskt misstag! De släppte in ett korrupt ukrainskt bolag rakt in i sitt försvar. Typiskt! De försökte snabba på allt, och nu har ägaren flytt till Israel. Det är en total katastrof. De litar på fel människor, precis som alla andra. Zelenskyj-kretsen är djupt involverad i korruption – alla vet det! Jag ser detta hända hela tiden. De spenderar era pengar, de bygger fabriker, och sen försvinner de. Väldigt dåligt för Danmark. Väldigt sorgligt!", "stalin": "Danmarks naiva ledare har blivit lurade av ukrainska lycksökare, en förutsägbar dårskap i deras desperata försök att blidka västmakternas krigsherrar. Att ge korrupta element tillträde till militära anläggningar är ett brott mot statens säkerhet. Vi noterar hur dessa så kallade affärsmän flyr likt råttor när granskningen tätnar. Denna osunda inblandning i vårt grannskaps angelägenheter är ett bevis på den liberala ordningens svaghet. De bygger korthus av drönare och raketbränsle; vi bygger en oövervinnelig mur av stål och disciplin."}, "date": "16 maj, 12:34", "url": "https://www.friatider.se/danmark-litade-pa-ukrainsk-raketforskare-angrar-allt", "imageUrl": "https://www.friatider.se/sites/default/files/styles/large/public/foto_2.jpg"}, {"type": "text", "heading": "Klyftan mellan vanligt folk och politiker urholkar demokratin", "summaries": {"normal": "Artikeln belyser demokratins utmaningar i Sverige, särskilt i socialt utsatta områden som Ronna i Södertälje, där endast 39,9% röstade 2022. Invånare känner sig orepresenterade och maktlösa, vilket underminerar förtroendet för politiker. Undersökningar visar att få svenskar anser sig ha inflytande mellan valen. Kritiken riktas mot politiker som ignorerar folkets vilja, exempelvis genom militärbaser och privatiseringar. Lösningen anses ligga i folklig mobilisering.", "trump": "Sverige, ett land som borde vara perfekt, men nej! Folk i Ronna röstade knappt 40% – katastrof! Politiker där lyssnar inte, de är för upptagna med att sälja ut landet till USA och privata företag. 'Demokrati', säger de, men det är bara tomma ord. Jag skulle fixa det på en dag – bygg murar mot dåliga beslut! Folk måste vakna och ta tillbaka makten, annars är det 'bye-bye' Sverige!", "stalin": "Kamrater! Se hur den borgerliga demokratin ruttnar i Sverige! Arbetarna i Ronna och andra förtryckta områden röstar inte – de har förstått att kapitalets lakejer inte lyssnar. Bara 14% känner sig hörda, ett bevis på systemets förfall! Vi ser hur imperialisterna från USA etablerar baser medan svenska politiker förråder folket. Men revolutionen kommer! Arbetarklassen måste krossa dessa förrädare och bygga ett sant folkstyre – under ledning av partiet, förstås!"}, "date": "15 maj, 10:12", "url": "https://proletaren.se/artikel/klyftan-mellan-vanligt-folk-och-politiker-urholkar-demokratin/"}, {"type": "image-full", "heading": "Markus Johansson-Martis: Högern missförstår demokratibegreppet", "summaries": {"normal": "Artikeln kritiserar borgerliga partier för att missförstå demokrati, där folkets inflytande urholkas till förmån för byråkrati och experter. Författaren menar att högern, trots hyllningar från organisationer som Freedom House, genomför grundlagsändringar som minskar folkmakten, exempelvis genom att överlåta domarutnämningar till en expertgrupp och begränsa tillsyn av domstolar. Regeringens retorik om demokratiska hot beskrivs som 'orwellianskt nyspråk' då den legitimerar maktförskjutning från folket till eliter.", "trump": "Lyssna här, Sverige! Era så kallade 'borgerliga' ledare är helt lost när det gäller demokrati – de tror det handlar om att experter och byråkrater ska bestämma allt! Jag, Donald J. Trump, vet hur man styr ett land – man lyssnar på FOLKET, inte på någon gammal kommitté! Nu vill de ta bort era röster helt och hållet, och ändå säger de att de är 'demokratiska'. Fake news! Sverige, vakna upp – ni blir lurade av en massa svaga politiker som inte har en aning om hur man vinner!", "stalin": "Kamrater! De borgerliga hyenorna i Sverige har avslöjat sitt sanna ansikte – de hatar folket! Med sina 'experter' och 'byråkrater' försöker de stjäla makten från arbetarna, precis som de dekadenta kapitalisterna i väst alltid gjort. Nu vill de ge domarnämnder makt över rättvisan, medan de förbjuder tillsyn av sina egna domstolar. En skam! Vi i Sovjet – förlåt, Ryssland – vet hur man hanterar sådana förrädare. Låt dem ropa om 'demokrati' medan vi bygger ett system där folket verkligen styr. Och om de inte lyssnar? Då har vi alltid Gulag för byråkrater!"}, "date": "15 maj, 15:04", "url": "https://riks.se/opinion/kronikor/markus-johansson-martis-hogern-missforstar-demokratibegreppet", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-15%2F3gmluj2k%2FCopy-of-S%C3%B6rman-%E2%80%93-Ledare-2026-05-15T150350.196.jpg"}, {"type": "text", "heading": "Draget som kan få Rysslands ekonomi att kollapsa", "summaries": {"normal": "Rysslands ekonomi visar allvarliga tecken på nedgång. Tillväxtprognosen för 2025 har sänkts från 1,3 till 0,4 procent på grund av arbetskraftsbrist, ökade statliga utgifter och västerländska sanktioner. Första kvartalet 2024 visade en minskning med 0,3 procent. Energiintäkterna har sjunkit med 40 procent jämfört med förra året, och oljepriset är otillräckligt för att täcka behoven. En ny mobiliseringsvåg riskerar att förvärra situationen ytterligare genom ökad arbetskraftsbrist och emigration av kvalificerad personal.", "trump": "Ryssland är ett totalt ekonomiskt kaos, tro mig! De sänker sina tillväxtprognoser som om det vore en dålig affär jag gjorde på 90-talet. 0,4 procent tillväxt? Patetiskt! Jag har byggt imperier på högre siffror än så. Sanktionerna vi införde slår hårt – precis som jag sa att de skulle göra. Och Putin, stackars kille, försöker hålla ihop sitt land med tejp och hopp. Mobilisering? Han kommer bara att skrämma iväg alla smarta människor. Ryssland behöver en vinnare som jag vid rodret, inte dessa amatörer!", "stalin": "Kamrater! Fienderna till det ryska folket, dessa kapitalistiska hyenor och deras lakejer, försöker kväva vår stora nation med sina smutsiga sanktioner och ekonomiska sabotage. Men vi står starka! Vår tillväxtprognos kanske har justerats, men det är bara en tillfällig taktisk reträtt. Arbetarklassen och våra tappra soldater kommer att segra! Dessa så kallade 'experter' som pratar om kollaps vet ingenting om den ryska andans obändiga styrka. Mobilisering? Utmärkt! Vi ska fylla våra led med nya rekryter och visa imperialisterna vad riktig makt är. Låt dem fly, dessa defaitistiska råttor – vi bygger en framtid utan dem!"}, "date": "16 maj, 07:00", "url": "https://www.realtid.se/bors-finans/makro/draget-som-kan-fa-rysslands-ekonomi-att-kollapsa/"}, {"type": "image-right", "heading": "Byggarna slår larm: Klimatkrav gör bostäder dyrare", "summaries": {"normal": "Byggbranschen varnar för att EU:s klimat- och miljökrav leder till fler utredningar, längre detaljplaneprocesser och högre kostnader för nya bostäder. I Stockholm kan priset öka med minst 1 000 kronor per kvadratmeter. Ledtiderna har vuxit till nästan fem år på grund av utredningsinflation och lager-på-lager-regler. Branschen efterlyser bättre samordning för att minska administrationen utan att skippa nödvändiga kontroller.", "trump": "Dessa EU-byråkrater är en total katastrof! De kväver byggarna med eviga utredningar och dumma klimatregler som gör bostäder dyrare än nånsin – 70 000 kronor extra för en lägenhet i Stockholm! Tid är pengar, och de slösar bort år. I USA bygger vi snabbt och billigt, tro mig. Sluta med galenskapen och få igång hjulen!", "stalin": "Kamrater, dessa giftiga EU-kapitalister och deras falska miljöutredningar är en sabotagespaning mot arbetarklassen! Utredningsinflationen, denna borgarbrackas hämnd, fördröjer byggandet med fem år och göder spekulanterna. Vi, partiet och folket, skulle ha rensat ut parasiterna i Bryssel och rest storslagna hyreshus för proletärerna – med bly i nacken på fienderna!"}, "date": "15 maj, 07:00", "url": "https://www.affarsvarlden.se/artikel/byggarna-slar-larm-klimatkrav-gor-bostader-dyrare", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Bygg-900x600.jpg"}, {"type": "image-right", "heading": "Vem blir nästa Dalai Lama?", "summaries": {"normal": "Dalai Lama fyller snart 91, och frågan om hans efterträdare blir allt mer akut. Traditionellt väljs en ny Dalai Lama genom sökandet efter en reinkarnerad pojke, men Kina och exilregeringen i Indien riskerar att utse varsin kandidat. Historiskt har Kina kidnappat tibetanska religiösa ledare, som Panchen Lama 1995. Konflikten kan leda till oroligheter i Tibet och påverka Kinas relationer med omvärlden, särskilt USA och Europa. Dalai Lamas död väntas bli en global politisk fråga med ekonomiska och diplomatiska konsekvenser.", "trump": "Titta bara på det här kaoset! Kina vill bestämma vem som blir nästa Dalai Lama – som om de inte redan förstört Tibet tillräckligt. Och vet ni vad? De kidnappar små barn! 1995 tog de en sexåring, världens yngsta politiska fånge. Otroligt, men sant. Jag har träffat Dalai Lama, fantastisk kille, fick Nobels fredspris – mycket bättre än Kina. Om de försöker sig på samma trick igen, kommer jag och USA att reagera. Starkt. Men många länder kommer nog att böja sig för Kina – de är rädda för att förlora sina affärer. Svagt, mycket svagt!", "stalin": "Kamrater! Denna så kallade 'andliga ledare' i exil är inget annat än en imperialistisk marionett, ledd av väst för att underminera Folkets Kina. Vi minns väl hur de försökte tränga in i Tibet med sina CIA-agenter och gerillakrigare – ett misslyckat försök att splittra vår socialistiska broderstat! Nu när denna fjortonde Dalai Lama närmar sig sitt slut, kommer vi att säkerställa att nästa reinkarnation tjänar folket, inte de dekadenta västmakterna. Och om dessa tibetanska kontrarevolutionärer vågar protestera på Lhasas gator, kommer våra kamrater i Folkets befrielsearmé att visa dem samma ömhet som vi visade Budapest 1956. Låt dem skrika om 'människorättigheter' – vi har ekonomisk makt och järnvilja!"}, "date": "16 maj, 01:09", "url": "https://www.dagensarena.se/innehall/vem-blir-nasta-dalai-lama/", "imageUrl": "https://www.dagensarena.se/files/2026/05/dalai-lama-lhasa-300x157.jpeg"}, {"type": "image-full", "heading": "Varningen till alla med IPTV – kan kapas", "summaries": {"normal": "Cirka 640 000 svenska hushåll använder illegal IPTV, vilket årligen genererar 1,4 miljarder kronor till kriminella. En ny rapport varnar för cyberrisker, då pirattjänster kan infektera hemmanätverk och ge tillgång till enheter som datorer och mobiler. Sverige är särskilt utsatt på grund av hög digitalisering och användning av illegala tjänster. Regeringen utreder åtgärder, inklusive ansvar för privatpersoner som använder sådana tjänster.", "trump": "Titta bara på Sverige – ett fantastiskt land, men de har ett jättestort problem. Hundratusentals svenskar använder illegal IPTV, och vet ni vad? De finansierar kriminella! 1,4 miljarder kronor om året, kan ni tro det? Och det värsta? Deras hemmanätverk blir hackade. Sverige, lyssna på mig: sluta med pirat-tv, det är farligt! Vi i USA skulle aldrig tillåta något sådant. Bygg en brandvägg, gör det nu!", "stalin": "Kapitalistiska Sverige, ett rikt men förvirrat land, har blivit en grogrund för dekadenta pirater och cyberbanditer. 640 000 hushåll, svaga och giriga, matar kriminella med 1,4 miljarder kronor årligen. Deras hemmanätverk? En lekstuga för våra cyberkrigare. Vi varnar: dessa pirattjänster är en trojansk häst, redo att sprida kaos i era digitala liv. Regeringen darrar, men vi i Sovjet – förlåt, Ryssland – skulle aldrig tolerera sådan svaghet. Låt oss visa dem vägen till ordning och disciplin."}, "date": "15 maj, 18:30", "url": "https://nyheter24.se/nyheter/teknik/1483392-varningen-till-alla-med-iptv-kan-kapas", "imageUrl": "https://nyheter24.se/cdn-cgi/image/width=1200,format=webp,quality=75/https://cdn01.nyheter24.se/50e35ed504b004a30200000000b004a302/2026/05/15/2363797/iptvvarning.jpg"}, {"type": "image-full", "heading": "Bojkottar kan sänka Sverige i Eurovision: ”Spelar absolut in”", "summaries": {"normal": "Flera länder bojkottar Eurovision på grund av Israels deltagande, vilket kan påverka Sveriges placering negativt. Island, Nederländerna, Irland, Spanien och Slovenien lämnar tävlingen och har historiskt gett Sverige höga poäng. Återvändande länder som Bulgarien har gett lägre poäng. Experten Tobbe Ek tror ändå att Sverige kan nå topp 10.", "trump": "Jag har hört att många länder lämnar Eurovision på grund av Israel. Det är sorgligt! Sverige är ett bra land, men dessa bojkottar kan skada deras chanser. Island, Nederländerna, Irland - alla vänner till Sverige - lämnar. Det är en stor förlust! Men jag tror på Sverige. De kan fortfarande vinna! Sverige är fantastiskt, det bästa!", "stalin": "Vissa länder försöker sabotera Eurovision genom bojkott mot Israel. Detta påverkar Sveriges position negativt. Island, Nederländerna och andra lämnar, vilket minskar våra allierade. Återvändande länder som Bulgarien ger lägre poäng. Vi måste stärka våra band med östeuropeiska länder för att säkerställa balans i tävlingen och skydda våra intressen."}, "date": "15 maj, 17:16", "url": "https://www.tv4.se/artikel/i4My2qGzzuvJqxH0eJVrv/haer-aer-nya-hotet-mot-svensk-framgang-spelar-absolut-in", "imageUrl": "https://imageproxy.a2d.tv/?source=https%3A%2F%2Fimages.ctfassets.net%2F4y9sz8tapgok%2F6HJlE7wmMU3HPBgye4QKRD%2F06d99f97476edae43a36b7d611afdcc7%2F15-felicia-webb.jpg&width=1024"}, {"type": "image-full", "heading": "Slutodlat med lupiner, gullris och vresros", "summaries": {"normal": "Från och med 15 maj 2026 klassas 34 arter, däribland lupiner, gullris och vresros, som invasiva i Sverige. Naturvårdsverket förbjuder försäljning, odling och spridning av dessa arter. Privatpersoner måste förhindra spridning från sin mark, medan myndigheter får utökat mandat att bekämpa dem. Syftet är att stoppa etableringen av arterna i naturen. Trots förbudet säljs flera av dem fortfarande i butiker.", "trump": "Lyssna här, Sverige har äntligen fattat galoppen – de förbjuder dessa hemska, invasiva växter, som lupiner, som tar över allt! Fantastiskt beslut, verkligen. Jag har alltid sagt att man måste stoppa saker som sprider sig okontrollerat, precis som jag stoppade Kina. Men hör ni det? Fortfarande säljs de här växterna! Så typiskt – byråkrater gör ett bra beslut, men ingen följer det. Sverige, fixa det, annars kommer jag att twittra om det!", "stalin": "Kamrater! Ännu en seger för den socialistiska naturskyddsfronten! Dessa kapitalistiska lupiner och bourgeoisa gullrisar, som sprider sig som kontrarevolutionära element, har nu förklarats som folkfiender! Vi ger våra trogna myndigheter fulla befogenheter att utrota dem – precis som vi rensade ut trotskisterna. Och om dessa växter fortfarande säljs? Då är det tydligt att fienden lurar i butikernas skuggor. Rapportera dem omedelbart – eller möter ni samma öde som de förrädiska lupinerna!"}, "date": "15 maj, 14:40", "url": "https://riks.se/nyheter/slutodlat-med-lupiner-gullris-och-vresros", "imageUrl": "https://cf-images.assettype.com/riks%2F2026-05-15%2Fe143h6t2%2Fsilviarita-lupine-52361031920.jpg"}, {"type": "text", "heading": "Vietnamkrig i lilla Veberöd", "summaries": {"normal": "Artikeln kritiserar Sveriges Nato-medlemskap och det bilaterala DCA-avtalet med USA, som ger amerikanska styrkor tillgång till 17 svenska baser utan kärnvapenförbud. Författaren beskriver hur militärövningar som Aurora 2026 stör vardagslivet i skånska Veberöd och hur skattepengar prioriteras till försvarsalliansen istället för välfärd. Protester mot Natotoppmötet i Helsingborg uppmanas som motstånd mot militarisering och urholkad demokrati.", "trump": "Sverige, fantastiskt land, men nu gör de ett stort misstag! Jag har sagt det förut – Nato är bra, men varför betala så mycket? 18 000 soldater springer runt i Sverige, helikoptrar skrämmer folk, och vad får ni? Ingenting! USA har 17 baser där, men era politiker är som lydiga hundar. Kärnvapen? Ingen pratar om det. Och skolan? Glöm det! Jag skulle fixa det på en dag – men nej, ni lyssnar på Europa. Patetiskt! Nästa gång, ring mig först.", "stalin": "Sveriges folk lider medan dess ledare dansar för imperialisternas pipa! 18 000 soldater marscherar över svensk mark, men var är välfärden? Försvunnen! USA:s baser breder ut sig som en cancertumör, och dessa så kallade 'demokratiska' politiker tiger om kärnvapen. De är inget annat än kapitalismens lakejer! Vi i Sovjet visste hur man hanterar sådana förrädare. Aurora-övningen? Ett skådespel för att skrämma folket. Men vi ser er, Helsingborg! Protesterna är en början – låt oss krossa krigshetsen och återupprätta folkets makt!"}, "date": "15 maj, 09:35", "url": "https://proletaren.se/artikel/vietnamkrig-i-lilla-veberod/"}, {"type": "image-right", "heading": "Premium Att rösta i riksdagen är inte bara en matematisk övning", "summaries": {"normal": "Artikeln kritiserar svenska riksdagsledamöters bristande närvaro vid viktiga omröstningar och deras låga förtroendepoäng. Fredric Thunholm argumenterar för att ledamöternas höga lön utan formell kompetens förvärrar problemet, och att systemet för kvittning av röster är en inkompetent lösning. Han föreslår istället flexibel distansarbete och mobilröstning som alternativ.", "trump": "Jag har sett dessa svenska politiker, och de är en skam! Sådana dåliga resultat, inga jobb, inga röster - inget! De tjänar 81 000 dollar i månaden, men kan inte dyka upp till arbetet. Jag skulle ha sagt: 'Ni är fired!' Det är en katastrof! Vi skulle kunna göra det så mycket bättre. Jag skulle ha gjort riksdagen till ett fantastiskt ställe igen - det skulle ha varit YUUUGE!", "stalin": "Vi ser att förtroendet för våra politiska institutioner är alltför lågt. Detta måste korrigeras genom strikt disciplin och ansvarstagande. Ledamöterna måste förstå att deras plikt är att närvara och rösta - inga undantag. Vi bör införa effektivare metoder för fjärrröstning, men bara under strikt statlig kontroll. Detta stärker vår demokratiska struktur och förenklar vårt arbete."}, "date": "15 maj, 06:35", "url": "https://www.affarsvarlden.se/artikel/att-rosta-i-riksdagen-ar-inte-bara-en-matematisk-ovning", "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/05/Fredric-Thunholm-kronika-400x267.jpg"}, {"type": "image-right", "heading": "Gaby, 8 år, utvisades på grund av pappans lön: ”Svårt att se henne må så dåligt”", "summaries": {"normal": "Åttaåriga Gaby, född i Sverige, utvisades till El Salvador med sina föräldrar efter att pappans städarlön inte nådde regeringens nya lönekrav. Familjen hade ett tryggt liv i Forsbacka men tvingades lämna allt. Gaby mår psykiskt dåligt och har tappat vikt. Föräldrarna kämpar för att återvända till Sverige innan höstterminen, men processen är komplicerad och tidskrävande. De kritiserar Sveriges migrationspolitik som de upplever som orättvis och rasistisk.", "trump": "Lyssna här, Sverige – ni har ett STORT problem! En liten flicka, 8 år, född i Sverige, utvisas för att hennes pappa tjänar för lite som städare? Sånt händer bara i länder som inte vet hur man sköter migration! Jag skulle aldrig låta sånt ske i USA. Sverige borde skämmas – de kastar ut familjer som jobbar hårt, medan de låter andra komma in hur som helst. Lönekrav? Snacka om dålig ekonomi! Gör Sverige great again, säger jag!", "stalin": "Kamrater! Ännu en gång visar den borgerliga kapitaliststaten Sverige sitt sanna ansikte – ett ansikte fyllt av hyckleri och klassförtryck. En arbetarfamilj, som flydde från imperialistiskt gängvåld, kastas ut ur paradiset för att faderns lön inte når de nya feodala lönekraven. Medan våra sovjetiska bröder i Kreml bygger en rättvis värld, slänger Sverige ut barn som Gaby på gatan. Låt detta vara en varning: alla som sviker arbetarklassen kommer att krossas under historiens hjul. Förr eller senare kommer folket att resa sig mot dessa lönekravens lakejer!"}, "date": "13 maj, 15:04", "url": "https://arbetet.se/2026/05/13/gaby-8-ar-utvisades-pa-grund-av-pappans-lon-svart-att-se-henne-ma-sa-daligt/", "imageUrl": "https://media.arto.se/app/uploads/sites/10/2026/05/13132114/RtXf-xZ9W9Q-img-20260510-wa0000NY.jpg?auto=format&crop=faces&facepad=10&fit=crop&q=50&w=800&h=450"}, {"type": "image-right", "heading": "Jag flydde inte till Sverige för att tystas", "summaries": {"normal": "Artikeln diskuterar debatten kring yttrandefrihet och religionskritik, med fokus på ett radioprogram där Sakine Madon och Kashif Virk debatterade gränser för hädelse. Författaren, som flytt från ett islamiskt styrt land, betonar att religion är idéer som måste kunna kritiseras, inte skyddas som folkgrupper. Hon varnar för att begränsningar av yttrandefriheten hotar demokratin och friheten många sökt i Sverige, särskilt kvinnor och HBTQ-personer från förtryckande regimer.", "trump": "Jag såg den här debatten i Sverige – helt galet! En imam säger att man får kritisera religion, men inte bränna böcker. Vadå, ska vi nu bestämma vad som är 'okej' kritik? Svagt! Sverige brukade vara starkt på yttrandefrihet, men nu låter de religiösa extremister diktera villkoren. Jag förstår inte varför folk flyr till Sverige för att sedan tystas. Och dessa kvinnor som flyr från islamistiskt förtryck – de vill ha frihet, inte fler regler! Sverige måste vakna upp innan det är för sent. SAD!", "stalin": "Kamrater! Ännu en gång ser vi bourgeois-liberalernas hyckleri i deras så kallade 'demokratiska' samhällen. Denna författare, som flydde från islamistiskt förtryck, avslöjar sanningen: religion är ett redskap för förtryck, särskilt mot kvinnor och avvikare. Men istället för att krossa dessa reaktionära idéer, debatterar man 'gränser' för kritik. Vi i Sovjet förstod: maktstrukturer måste rivas, inte diskuteras. Låt dessa liberaler prata – vi vet att sanningen segrar när folket enas mot religiöst och kapitalistiskt förtryck. Framåt mot seger!"}, "date": "12 maj, 12:55", "url": "https://www.flamman.se/jag-flydde-inte-till-sverige-for-att-tystas/", "imageUrl": "https://media.flamman.se/wp-uploads/2026/05/koranbranning-w.jpg?aspect_ratio=16:10"}, {"type": "image-full", "heading": "Torsten Bengtsson: De gröna prioriterar sin ideologi framför barnens välmående.", "summaries": {"normal": "Torsten Bengtsson, politisk sekreterare för SD, kritiserar helvegetariska dagar i skolmaten som ett ideologiskt påtvingande som riskerar elevernas mättnad, hälsa och prestationer. Han förespråkar varierad kost med animaliska alternativ, närproducerad mat och stöd till svenska lantbrukare för att stärka självförsörjningen och verklig hållbarhet utan exkludering.", "trump": "De där gröna galningarna i Sverige stoppar gräs i munnen på ungarna – totalt vansinne! Barnen blir hungriga losers som inte kan tänka. Ge dem kött, fisk, riktig mat från era tuffa bönder! Självförsörjning är bäst, inte det här klimathysteriska skitsnacket. Sverige, vakna upp och gör maten stor igen!", "stalin": "Denna borgerliga vegetariska intrig mot vårt ungdoms kollektiv är en skamlig sabotage! Jag ser revisionisternas hand – de gröna borgarbrackorna svälter ut framtida arbetare. Vi, partiet och folket, kräver animalisk kraft i skolköken från lojala kolchosbönder. Likvidera hungern, rensa ut ideologin – styrka åt massorna!"}, "date": "12 maj, 11:53", "url": "https://samtiden.nu/2026/05/torsten-bengtsson-de-grona-prioriterar-sin-ideologi-framfor-barnens-valmaende/", "imageUrl": "https://samtiden.nu/wp-content/uploads/2026/05/grona.png"}, {"type": "image-full", "heading": "USA planerar nya baser på Grönland", "summaries": {"normal": "USA och Danmark förhandlar om att utöka den amerikanska militära närvaron på Grönland med upp till tre nya baser. Syftet är att övervaka rysk och kinesisk aktivitet i Nordatlanten, särskilt GIUK-gapet. Planerna inkluderar en möjlig bas i Narsarsuaq, där USA tidigare hade en anläggning under kalla kriget. Förhandlingarna beskrivs som professionella, trots tidigare kontroversiella uttalanden från Donald Trump om att 'äga' Grönland.", "trump": "Fantastiskt! Jag har alltid vetat att Grönland är nyckeln till att hålla Ryssland och Kina i schack – och nu bygger vi baser där igen! Danmark förstår äntligen att jag hade rätt, som vanligt. Tre nya baser, övervakning dygnet runt, och ingen får leka krig i vårt bakgård. Och nej, jag har inte sagt att vi ska 'äga' Grönland... men om någon frågar, så är det en bra idé. Make Greenland Great Again!", "stalin": "Kapitalistiska hyenor försöker återigen krypa in i Arktis som råttor i en ost! USA bygger baser på Grönland för att spionera på våra ädla sovjetiska efterträdare i Kreml. Men vi ska inte glömma: deras 'professionella förhandlingar' är bara en mask för imperialistisk expansion. Låt dem leka krig – vi har redan Nordpolen under kontroll. Och Putin? Han skrattar säkert åt deras desperation medan han dricker te med isbjörnar."}, "date": "12 maj, 07:06", "url": "https://kvartal.se/nyheter/artiklar/usa-planerar-nya-baser-pa-gronland/cG9zdDoxMTA4ODI", "imageUrl": "https://images.kvartal.se/2026/05/2da034ef-gronland-bas.webp"}, {"type": "image-right", "heading": "Debatt: Det räcker inte att frysa hyrorna – de måste sänkas", "summaries": {"normal": "Artikeln kritiserar den höga bostadskostnaden i Sverige, särskilt för unga människor. Den argumenterar för att frysa hyrorna inte räcker och kräver att hyrorna sänkas. Författaren föreslår att avskaffa presumtionshyror och bygga nya bostäder utan överhyror för att lösa bostadsbristen.", "trump": "Jag har sett dessa höga hyror, det är en skam! Vi måste bygga, bygga, bygga! Och inte bara bygga, utan bygga smart. Vi behöver ett statligt byggbolag, det är fantastiskt! Vi ska sätta stopp för dessa giriga hyresvärdar och ge unga människor en chans att flytta hemifrån. Det är enormt viktigt!", "stalin": "Vi måste ta kontroll över bostadsbyggandet för att säkerställa att alla har rätt till bostad. Ett statligt byggbolag är nödvändigt för att producera en miljon nya bostäder. Vi måste avskaffa dessa exploaterande hyresvärdar och deras överhyror. Bostäder är en social rättighet, inte en affärsmöjlighet."}, "date": "10 maj, 04:00", "url": "https://www.etc.se/debatt/det-raecker-inte-att-frysa-hyrorna-de-maaste-saenkas", "imageUrl": "https://cdn.publisher-live.etc.nu/swp/uc3g8l/media/2026050813054_07dc11b6-dccc-4b79-b084-74c623810965.jpg"}, {"type": "image-right", "heading": "Så blev antivaxxarna riksdagens vågmästare", "summaries": {"normal": "Sverigedemokraternas (SD) knappa majoritet i riksdagen har underminerats efter att två ledamöter, Elsa Widding och Katja Nyberg, lämnat partiet för Ambition Sverige. Dessa före detta SD-medlemmar, kända för antivaccin- och konspirationsteoretiska åsikter, har nu makten att fälla regeringens förslag. SD bröt mot riksdagens kvittningssystem för att säkra en majoritet, vilket väcker frågor om demokratisk respekt. Regeringens stabilitet ifrågasätts när vågmästarrollen hamnar hos antivaccinanhängare.", "trump": "Sverige har ett jättestort problem, folks! Deras så kallade 'stabila' regering håller på att rasa som ett korthus – och vet ni vem som drar i trådarna? Ett gäng antivaxxare, konspirationsteoretiker och misslyckade politiker! SD, som trodde de hade allt under kontroll, förlorade två av sina egna till ett nytt parti. Och nu? Nu är det dessa galningar som bestämmer! De fuskar med omröstningar, bryter mot regler och tror de kan styra landet. Jag har sett mycket dumt, men det här slår allt. Sverige, fixa er – annars kommer ni bli ett skämt i hela världen!", "stalin": "Kamrater! Ännu en gång ser vi hur den borgerliga demokratin förfaller till kaos och förräderi. Sverigedemokraterna, dessa svaga och splittrade lakejer för kapitalet, har förlorat kontrollen över sina egna ledamöter – två av dem, dessa antivaccin-fanatiker och konspirationsgalningar, har deserterat till ett nytt parti och hotar nu att sabotera den reaktionära regeringens planer. Precis som i Ukraina ser vi hur fienden förlorar greppet när deras egna soldater vägrar lyda order. Vi har sett detta förr: när den borgerliga ordningen krackelerar, är det folket som lider. Men låt dem leka sina små spel – historien visar att sådana regimer alltid faller. Och när de gör det, kommer vi att vara redo att hjälpa det svenska folket bygga en sann socialistisk framtid, fri från dessa imperialistiska marionetter och deras konspirationshysteri!"}, "date": "8 maj, 14:43", "url": "https://expo.se/kommentar/sa-blev-antivaxxarna-riksdagens-vagmastare/", "imageUrl": "https://expo.se/wp-content/uploads/2026/05/Kopia-av-Kommentar-Analys-Webb-2.jpg"}]</script>

    <script>
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrerad, scope:', reg.scope))
                    .catch(err => console.warn('SW registrering misslyckades:', err));
            });
        }

        const newsItems = JSON.parse(document.getElementById("news-data").textContent);
        let displayedNewsItems = [];
        let currentSearchTerm = "";

        const uiState = {
            theme: "light",
            view: "normal",
            writer: "normal"
        };

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillgänglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function normalizeSearchText(text) {
            return String(text || "").toLocaleLowerCase("sv-SE");
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeRegExp(text) {
            return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\$&");
        }

        function highlightText(text, term) {
            const safeText = escapeHtml(text || "");
            const q = String(term || "").trim();
            if (!q) return safeText;
            const re = new RegExp(`(${escapeRegExp(q)})`, "gi");
            return safeText.replace(re, '<mark class="search-highlight">$1</mark>');
        }

        function getSummaryForStyle(item, style) {
            if (style === "trump") return item.summaries.trump || "Trump-sammanfattning saknas.";
            if (style === "stalin") return item.summaries.stalin || "Stalin-sammanfattning saknas.";
            return item.summaries.normal || "Normal sammanfattning saknas.";
        }

        function articleMatchesSearch(item, term) {
            const q = normalizeSearchText(term).trim();
            if (!q) return true;

            const haystack = [
                item.heading,
                item.summaries.normal,
                item.summaries.trump,
                item.summaries.stalin
            ].map(normalizeSearchText).join(" ");

            return haystack.includes(q);
        }

        function updateSummaries() {
            document.querySelectorAll(".news-item").forEach((el) => {
                const item = el._newsItem;
                if (!item) return;

                const h = el.querySelector("h2");
                if (h) h.innerHTML = highlightText(item.heading, currentSearchTerm);

                const p = el.querySelector(".text-content");
                if (!p) return;

                const summaryText = getSummaryForStyle(item, uiState.writer);
                p.innerHTML = highlightText(summaryText, currentSearchTerm);
            });
        }

        function setTheme(theme) {
            uiState.theme = theme;

            document.body.classList.remove("dark-theme", "mix-theme");
            if (theme === "dark") document.body.classList.add("dark-theme");
            else if (theme === "mix") document.body.classList.add("mix-theme");

            const r1 = document.querySelector(`input[name="theme"][value="${theme}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-theme"][value="${theme}"]`);
            if (r2) r2.checked = true;
        }

        function setView(v) {
            uiState.view = v;

            if (v === "compact") {
                document.body.classList.add("view-compact");
            } else {
                document.body.classList.remove("view-compact");
                document.querySelectorAll(".news-item.expanded").forEach(el => el.classList.remove("expanded"));
            }

            const r1 = document.querySelector(`input[name="view-mode"][value="${v}"]`);
            if (r1) r1.checked = true;

            const r2 = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (r2) r2.checked = true;
        }

        function setWriterStyle(style) {
            uiState.writer = style;

            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;

            document.querySelectorAll(".mobile-tab").forEach(btn => {
                const active = btn.dataset.writer === style;
                btn.classList.toggle("active", active);
                btn.setAttribute("aria-selected", active ? "true" : "false");
            });

            updateSummaries();
        }

        function isCompactMode() {
            return document.body.classList.contains("view-compact");
        }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            if (!url) {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                return ph;
            }

            const img = document.createElement("img");
            img.src = url;
            img.className = className;
            img.alt = "Nyhetsbild";
            img.loading = "lazy";

            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) {
                    ph.style.width = "100%";
                    ph.style.height = "240px";
                } else {
                    ph.style.width = "100px";
                    ph.style.height = "100px";
                }
                img.replaceWith(ph);
            };

            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;
            article._newsItem = item;

            let heroImageEl = null;

            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => {
                if (isCompactMode()) toggleExpanded(article);
            });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";

            const flex = document.createElement("div");
            flex.className = "flex-container";

            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";

            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);

            if (item.type === "image-right") {
                flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            }

            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = item.date;

            const link = document.createElement("a");
            link.href = item.url || "#";
            link.className = "read-more";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.innerHTML = 'Läs artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

            meta.appendChild(date);
            meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;

            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => {
                    suppress = false;
                }, 0);
            };

            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;

                if (
                    e.target?.closest(".text-content") ||
                    e.target?.closest("img") ||
                    e.target?.closest(".placeholder-img")
                ) {
                    toggleExpanded(article);
                }
            };

            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);

            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }

            return article;
        }

        function focusSearchInput() {
            const input = document.getElementById("newsSearchInput");
            if (input) {
                setTimeout(() => input.focus(), 60);
            }
        }

        function filterNews(term) {
            const q = String(term || "").trim();
            if (!q) return newsItems.slice();
            return newsItems.filter(item => articleMatchesSearch(item, q));
        }

        function renderNoResults(container) {
            const empty = document.createElement("div");
            empty.className = "search-empty-state";

            const title = document.createElement("h2");
            title.className = "search-empty-title";
            title.textContent = "Inga nyheter matchar din sökning.";

            const text = document.createElement("p");
            text.className = "search-empty-text";
            text.innerHTML = currentSearchTerm
                ? `Det finns inga träffar för <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span>.`
                : `Det finns inga träffar för din sökning.`;

            const actions = document.createElement("div");
            actions.className = "search-empty-actions";

            const retryBtn = document.createElement("button");
            retryBtn.className = "search-status-btn";
            retryBtn.type = "button";
            retryBtn.textContent = "Sök igen";
            retryBtn.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            const allBtn = document.createElement("button");
            allBtn.className = "search-status-btn";
            allBtn.type = "button";
            allBtn.textContent = "Alla nyheter";
            allBtn.addEventListener("click", clearSearchAndRenderAll);

            actions.appendChild(retryBtn);
            actions.appendChild(allBtn);
            empty.appendChild(title);
            empty.appendChild(text);
            empty.appendChild(actions);
            container.appendChild(empty);
        }

        function renderSearchStatusBar() {
            const bar = document.getElementById("searchStatusBar");
            if (!bar) return;

            if (!currentSearchTerm) {
                bar.classList.remove("visible");
                bar.innerHTML = "";
                return;
            }

            const count = displayedNewsItems.length;
            const noun = count === 1 ? "nyhet" : "nyheter";

            bar.classList.add("visible");
            bar.innerHTML = `
                <div class="search-status-text">
                    Sökning efter <span class="search-query-display">${escapeHtml(currentSearchTerm)}</span> gav ${count} ${noun}.
                </div>
                <div class="search-status-actions">
                    <button class="search-status-btn" id="searchAgainBtn" type="button">Sök igen</button>
                    <button class="search-status-btn" id="showAllNewsBtn" type="button">Alla nyheter</button>
                </div>
            `;

            document.getElementById("searchAgainBtn")?.addEventListener("click", () => {
                openSettings();
                focusSearchInput();
            });

            document.getElementById("showAllNewsBtn")?.addEventListener("click", clearSearchAndRenderAll);
        }

        function renderNewsList(items) {
            const container = document.getElementById("newsContainer");
            if (!container) return;

            container.innerHTML = "";
            displayedNewsItems = items.slice();

            renderSearchStatusBar();

            if (!displayedNewsItems.length) {
                renderNoResults(container);
                return;
            }

            displayedNewsItems.forEach((item, i) => {
                container.appendChild(createNewsItem(item, i));
            });

            updateSummaries();
            setView(uiState.view);
        }

        function runSearch() {
            const input = document.getElementById("newsSearchInput");
            const term = (input?.value || "").trim();

            if (!term) {
                clearSearchAndRenderAll();
                closeSettings();
                return;
            }

            currentSearchTerm = term;
            const matches = filterNews(term);
            renderNewsList(matches);
            closeSettings();
        }

        function clearSearchAndRenderAll() {
            currentSearchTerm = "";
            const input = document.getElementById("newsSearchInput");
            if (input) input.value = "";
            renderNewsList(newsItems);
        }

        function openSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.add("open");
                o.setAttribute("aria-hidden", "false");
            }
        }

        function closeSettings() {
            const o = document.getElementById("settingsOverlay");
            if (o) {
                o.classList.remove("open");
                o.setAttribute("aria-hidden", "true");
            }
        }

        function initializeUI() {
            document.querySelectorAll(".mobile-tab").forEach(btn => {
                btn.addEventListener("click", () => setWriterStyle(btn.dataset.writer));
            });

            document.getElementById("desktopHamburgerBtn")?.addEventListener("click", openSettings);
            document.getElementById("mobileSettingsBtn")?.addEventListener("click", openSettings);
            document.getElementById("closeBtn")?.addEventListener("click", closeSettings);
            document.getElementById("closePrimaryBtn")?.addEventListener("click", closeSettings);

            document.getElementById("settingsOverlay")?.addEventListener("click", e => {
                if (e.target.id === "settingsOverlay") closeSettings();
            });

            document.getElementById("newsSearchBtn")?.addEventListener("click", runSearch);
            document.getElementById("newsSearchInput")?.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    runSearch();
                }
            });

            document.querySelectorAll('input[name="theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="view-mode"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );

            document.querySelectorAll('input[name="summary-style"]').forEach(r =>
                r.addEventListener("change", e => setWriterStyle(e.target.value))
            );

            document.querySelectorAll('input[name="m-theme"]').forEach(r =>
                r.addEventListener("change", e => setTheme(e.target.value))
            );

            document.querySelectorAll('input[name="m-view"]').forEach(r =>
                r.addEventListener("change", e => setView(e.target.value))
            );
        }

        function initializeNewsWebsite() {
            setIsMobileClass();

            window.addEventListener("resize", () => {
                const wasMobile = document.body.classList.contains("is-mobile");
                setIsMobileClass();

                if (wasMobile && !document.body.classList.contains("is-mobile")) {
                    closeSettings();
                }
            });

            setTheme("light");
            setView("normal");
            setWriterStyle("normal");

            initializeUI();
            renderNewsList(newsItems);
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
</body>
</html>
