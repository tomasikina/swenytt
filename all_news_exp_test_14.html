    {
        "type": "image-right",
        "heading": "Sandström: Så tog Kina kontroll över Northvolt",
        "summaries": {
            "normal": "Northvolt gick i konkurs i mars 2025 efter att ha byggt ett starkt beroende av kinesiska leverantörer. Enligt konkursförvaltarens rapport hade företaget obetalda fakturor på nästan 500 miljoner kronor till kinesiska maskintillverkaren Wuxi Lead. På grund av pandemin kunde inte en ordentlig Factory Acceptance Test genomföras, så Wuxi‑ingenjörer installerade utrustningen på plats. Bristande intern kompetens, många olyckor och dålig CE‑märkning förvärrade problemen och ledde till att produktionen stannade. Företaget hade dessutom 29 dotterbolag i sju länder.",
            "trump": "Jag såg hur Northvolt, en så kallad svensk grej, gick i konkurs efter att ha litat på kinesiska leverantörer. De hade nästan en halv miljard i obetalda fakturor till Wuxi Lead och kunde inte ens göra en ordentlig Factory Acceptance Test på grund av pandemin. Så de lät kineserna komma in och fixa allt, men resultatet var katastrofalt – maskiner som inte fungerade, massiva olyckor och dålig CE‑märkning. Det visar bara hur dåligt ledarskap och brist på amerikansk kvalitet kan förstöra ett företag.",
            "stalin": "Vi analyserar nederlaget av Northvolt, ett företag som föll på grund av dess förödande beroende av kinesiska maskinleverantörer. Redan 2018 gav vi vår tillåtelse till Wuxi Lead att leverera utrustning utan korrekt Factory Acceptance Test, på grund av pandemins tvång. Kinesiska ingenjörer tog kontrollen, men deras maskiner brast, olyckor och bristande CE‑märkning föll över fabrikerna. Detta visar hur västligt giriga projekt utan egen industriell styrka blir offer för främmande makters inflytande."
        },
        "date": "7 mars, 05:30",
        "url": "https://www.affarsvarlden.se/kronika/sandstrom-sa-tog-kina-kontroll-over-northvolt",
        "imageUrl": "https://www.affarsvarlden.se/wp-content/uploads/2026/03/vindkratensgeografi-100-400x267.jpg"
    },
    {
        "type": "text",
        "heading": "Vill vi ha jämställdhet måste vi tala om klasskamp och antiimperialism",
        "summaries": {
            "normal": "The article argues that true gender equality cannot be achieved without confronting class struggle and anti‑imperialism. It links the slogan “welfare, not weapons” to the suffering of women in conflict zones – Palestine, Iran, Cuba – and to the impact of military spending on Swedish welfare services, where 80 % of workers are women. Cuts to health, education and elder care disproportionately affect working‑class women. The author calls for prioritising welfare over armaments as essential for women’s liberation.",
            "trump": "I’m telling you, folks, the biggest problem for women today is the endless war machine. We see it in Palestine, Iran, Cuba – women are getting killed while the U.S. pushes bombs. Here at home, every dollar spent on weapons is a dollar stolen from our nurses, teachers and caregivers, who are 80% women. I know the solution: cut the defense budget, fund the welfare system, and finally give women the jobs and safety they deserve. Make welfare great again!",
            "stalin": "We declare that the emancipation of women is inseparable from the struggle of the working class against imperialist aggression. The horrors inflicted on Palestinian, Iranian and Cuban women by capitalist bombings prove the necessity of turning every weapon into tools for the people. In our socialist vision, each ruble spent on armaments must be redirected to health, education and elder care, where the majority of laborers are women. Only by crushing militarism and strengthening welfare can we achieve true gender equality for the proletariat."
        },
        "date": "6 mars, 14:00",
        "url": "https://proletaren.se/artikel/vill-vi-ha-jamstalldhet-maste-vi-tala-om-klasskamp-och-antiimperialism/"
    },
    {
        "type": "image-right",

        function createPlaceholderImage(className) {
            const div = document.createElement("div");
            div.className = `placeholder-img ${className}`;
            div.textContent = "Bild ej tillg\u00e4nglig";
            return div;
        }

        function setIsMobileClass() {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 768px)").matches;
            document.body.classList.toggle("is-mobile", !!isMobile);
        }

        function updateSummaries() {
            const style = document.querySelector('input[name="summary-style"]:checked')?.value || 'normal';
            document.querySelectorAll('.news-item').forEach((el, i) => {
                const p = el.querySelector('.text-content');
                if (!p) return;
                const s = newsItems[i].summaries;
                p.textContent = style === 'trump'  ? (s.trump  || "Trump-sammanfattning saknas.")
                              : style === 'stalin' ? (s.stalin || "Stalin-sammanfattning saknas.")
                              :                      (s.normal || "Normal sammanfattning saknas.");
            });
        }

        function updateTheme() {
            const t = document.querySelector('input[name="theme"]:checked')?.value || 'light';
            document.body.classList.remove('dark-theme','mix-theme');
            if (t === 'dark') document.body.classList.add('dark-theme');
            else if (t === 'mix') document.body.classList.add('mix-theme');
        }

        function updateViewMode() {
            const v = document.querySelector('input[name="view-mode"]:checked')?.value || 'normal';
            if (v === 'compact') {
                document.body.classList.add('view-compact');
            } else {
                document.body.classList.remove('view-compact');
                document.querySelectorAll('.news-item.expanded').forEach(el => el.classList.remove('expanded'));
            }
        }

        function isCompactMode() { return document.body.classList.contains("view-compact"); }

        function toggleExpanded(article) {
            if (!isCompactMode()) return;
            article.classList.toggle("expanded");
        }

        function hasSelectionInside(el) {
            const sel = window.getSelection && window.getSelection();
            if (!sel || !sel.rangeCount || !sel.toString().trim()) return false;
            return el.contains(sel.getRangeAt(0).commonAncestorContainer);
        }

        function createImageElement(url, className) {
            const img = document.createElement("img");
            img.src = url; img.className = className;
            img.alt = "Nyhetsbild"; img.loading = "lazy";
            img.onerror = () => {
                const ph = createPlaceholderImage(className);
                if (className.includes("full-width-image")) { ph.style.width="100%"; ph.style.height="240px"; }
                else { ph.style.width="100px"; ph.style.height="100px"; }
                img.replaceWith(ph);
            };
            return img;
        }

        function createNewsItem(item, index) {
            const article = document.createElement("article");
            article.className = "news-item";
            article.dataset.index = index;
            article.style.animationDelay = `${index * 0.05}s`;

            let heroImageEl = null;
            if (item.type === "image-full") {
                heroImageEl = createImageElement(item.imageUrl, "full-width-image hero-image");
                article.appendChild(heroImageEl);
            }

            const heading = document.createElement("h2");
            heading.textContent = item.heading;
            heading.addEventListener("click", () => { if (isCompactMode()) toggleExpanded(article); });
            article.appendChild(heading);

            const contentDiv = document.createElement("div");
            contentDiv.className = "news-item-content";
            const flex = document.createElement("div");
            flex.className = "flex-container";
            const textWrap = document.createElement("div");
            textWrap.className = "flex-1";
            const p = document.createElement("p");
            p.className = "text-content";
            p.textContent = item.summaries.normal;
            textWrap.appendChild(p);
            flex.appendChild(textWrap);
            if (item.type === "image-right") flex.appendChild(createImageElement(item.imageUrl, "right-image"));
            contentDiv.appendChild(flex);
            article.appendChild(contentDiv);

            const meta = document.createElement("div");
            meta.className = "meta-container";
            const date = document.createElement("span");
            date.className = "date"; date.textContent = item.date;
            const link = document.createElement("a");
            link.href = item.url; link.className = "read-more";
            link.target = "_blank"; link.rel = "noopener noreferrer";
            link.innerHTML = `L\u00e4s artikeln <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>`;
            meta.appendChild(date); meta.appendChild(link);
            article.appendChild(meta);

            let suppress = false;
            const onPointerUp = () => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                suppress = hasSelectionInside(article);
                setTimeout(() => { suppress = false; }, 0);
            };
            const onContentClick = (e) => {
                if (!isCompactMode() || !article.classList.contains("expanded")) return;
                if (suppress || hasSelectionInside(article)) return;
                if (e.target?.closest("a.read-more")) return;
                if (e.target?.closest(".text-content") || e.target?.closest("img") || e.target?.closest(".placeholder-img"))
                    toggleExpanded(article);
            };
            contentDiv.addEventListener("pointerup", onPointerUp);
            contentDiv.addEventListener("click", onContentClick);
            if (heroImageEl) {
                heroImageEl.addEventListener("pointerup", onPointerUp);
                heroImageEl.addEventListener("click", () => {
                    if (!isCompactMode() || !article.classList.contains("expanded")) return;
                    if (suppress || hasSelectionInside(article)) return;
                    toggleExpanded(article);
                });
            }
            return article;
        }

        function setWriterStyle(style) {
            const r = document.querySelector(`input[name="summary-style"][value="${style}"]`);
            if (r) r.checked = true;
            localStorage.setItem("newswriterpreference", style);
            document.querySelectorAll('.mobile-tab').forEach(btn => {
                const a = btn.dataset.writer === style;
                btn.classList.toggle('active', a);
                btn.setAttribute('aria-selected', a ? 'true' : 'false');
            });
            updateSummaries();
        }

        function openMobileSettings() {
            const o = document.getElementById("mobileSettingsOverlay");
            if (o) { o.classList.add("open"); o.setAttribute("aria-hidden","false"); }
        }
        function closeMobileSettings() {
            const o = document.getElementById("mobileSettingsOverlay");
            if (o) { o.classList.remove("open"); o.setAttribute("aria-hidden","true"); }
        }

        function syncMobileFromDesktop() {
            const t = document.querySelector('input[name="theme"]:checked')?.value || 'light';
            const mt = document.querySelector(`input[name="m-theme"][value="${t}"]`);
            if (mt) mt.checked = true;
            const v = document.querySelector('input[name="view-mode"]:checked')?.value || 'normal';
            const mv = document.querySelector(`input[name="m-view"][value="${v}"]`);
            if (mv) mv.checked = true;
            const w = document.querySelector('input[name="summary-style"]:checked')?.value || 'normal';
            document.querySelectorAll('.mobile-tab').forEach(btn => {
                const a = btn.dataset.writer === w;
                btn.classList.toggle('active', a);
                btn.setAttribute('aria-selected', a ? 'true' : 'false');
            });
        }

        function syncDesktopFromMobile() {
            const mt = document.querySelector('input[name="m-theme"]:checked')?.value;
            if (mt) {
                const r = document.querySelector(`input[name="theme"][value="${mt}"]`);
                if (r) r.checked = true;
                localStorage.setItem("newsthemepreference", mt);
                updateTheme();
            }
            const mv = document.querySelector('input[name="m-view"]:checked')?.value;
            if (mv) {
                const r = document.querySelector(`input[name="view-mode"][value="${mv}"]`);
                if (r) r.checked = true;
                localStorage.setItem("newsviewpreference", mv);
                updateViewMode();
            }
        }

        function initializeMobileUI() {
            document.querySelectorAll('.mobile-tab').forEach(btn => {
                btn.addEventListener('click', () => setWriterStyle(btn.dataset.writer));
            });
            const sBtn    = document.getElementById("mobileSettingsBtn");
            const cBtn    = document.getElementById("mobileCloseBtn");
            const cPrimBtn= document.getElementById("mobileClosePrimaryBtn");
            const overlay = document.getElementById("mobileSettingsOverlay");
            if (sBtn)    sBtn.addEventListener('click', () => { syncMobileFromDesktop(); openMobileSettings(); });
            if (cBtn)    cBtn.addEventListener('click', closeMobileSettings);
            if (cPrimBtn)cPrimBtn.addEventListener('click', closeMobileSettings);
            if (overlay) overlay.addEventListener('click', e => { if (e.target === overlay) closeMobileSettings(); });
            document.querySelectorAll('input[name="m-theme"]').forEach(r => r.addEventListener('change', syncDesktopFromMobile));
            document.querySelectorAll('input[name="m-view"]').forEach(r  => r.addEventListener('change', syncDesktopFromMobile));
        }

        function initializeNewsWebsite() {
            setIsMobileClass();
            window.addEventListener("resize", () => {
                const was = document.body.classList.contains("is-mobile");
                setIsMobileClass();
                if (was && !document.body.classList.contains("is-mobile")) closeMobileSettings();
            });

            const container = document.getElementById("newsContainer");
            newsItems.forEach((item, i) => container.appendChild(createNewsItem(item, i)));

            const restore = (name, key) => {
                const saved = localStorage.getItem(key);
                if (saved) { const r = document.querySelector(`input[name="${name}"][value="${saved}"]`); if (r) r.checked = true; }
            };
            restore("summary-style", "newswriterpreference");
            restore("theme",         "newsthemepreference");
            restore("view-mode",     "newsviewpreference");

            document.querySelectorAll('input[name="summary-style"]').forEach(r => r.addEventListener('change', e => {
                localStorage.setItem("newswriterpreference", e.target.value);
                updateSummaries(); syncMobileFromDesktop();
            }));
            document.querySelectorAll('input[name="theme"]').forEach(r => r.addEventListener('change', e => {
                localStorage.setItem("newsthemepreference", e.target.value);
                updateTheme(); syncMobileFromDesktop();
            }));
            document.querySelectorAll('input[name="view-mode"]').forEach(r => r.addEventListener('change', e => {
                localStorage.setItem("newsviewpreference", e.target.value);
                updateViewMode(); syncMobileFromDesktop();
            }));

            updateSummaries(); updateTheme(); updateViewMode();
            initializeMobileUI(); syncMobileFromDesktop();
            setWriterStyle(document.querySelector('input[name="summary-style"]:checked')?.value || "normal");
        }

        document.addEventListener("DOMContentLoaded", initializeNewsWebsite);
    </script>
